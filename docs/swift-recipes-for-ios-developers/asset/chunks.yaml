    '
- fmt: "### Building Blocks\n\nWhen you create a new SwiftUI project, you see two\
    \ controls:\n\n- `Text` – The closest control from UIKit is `UILabel`. Of course,\
    \ it has SwiftUI specifics.\n- `ContentView` – This `View` is the layout of the\
    \ screen. It has size of phone screen because it’s referred in your App struct.\n\
    \nFrom a SwiftUI point of view, there’s no difference between `Text` and `ContentView`.\
    \ For example, this code is totally valid:\n\n```swift\n@main\nstruct MyApp: App\
    \ {\n    var body: some Scene {\n        WindowGroup {\n            Text(\"I'm\
    \ the only element on the screen :)\")\n        }\n    }\n}\n```\n\nAt the same\
    \ time, `ContentView` can be used inside another `View`.\n\nThe most common controls\
    \ are as follows:\n\n- `Text` – A block of text similar to `UILabel`\n- `Image`\
    \ – A control displaying an image, similar to `UIImageView`\n- `HStack` and `VStack`\
    \ – Controls displaying a row or column of elements, one after another, similar\
    \ to `UIStackView`\n- `List` – A scrollable list of items, similar to `UITableView`\
    \ or `UICollectionView`\n- `ZStack` – A frame, showing child controls on top of\
    \ each other, like `UIView` in `UIKit`\n- `Spacer` – Used in stacks to make a\
    \ dynamic gap between controls\n- `Button` – A tappable element, allowing the\
    \ user to control the app. Like `UIButton`\n\nThe preceding list is not a full\
    \ list, but these controls are the most common.\n\n### Modifying Controls\n\n\
    You can make small modifications to controls without overriding them or creating\
    \ new ones. For example, you may want to change the font, color, padding, background,\
    \ and other properties. In SwiftUI, it’s done by calling methods following controls\
    \ constructors. For example:\n\n```swift\nText(\"Hello, world!\")\n    .font(.system(size:\
    \ 14))\n    .foregroundColor(.blue)\n```\n\nA modifier can be applied not only\
    \ to components, but to a group of controls. For example, if you apply a foreground\
    \ color to `HStack`, all the inner controls will get this color automatically,\
    \ unless it’s overridden.\n\n### Compositions\n\nWhen you create a new control,\
    \ you usually build it from existing blocks. This is a composition. SwiftUI has\
    \ three main controls for this purpose:\n\n- `HStack` – It shows controls horizontally\
    \ one after another.\n- `VStack` – It shows controls vertically one after another.\n\
    - `ZStack` – It shows controls on top of each other.\n\nRecipe [8-3](#515103_1_En_8_Chapter.xhtml#PC5)\
    \ is an example of such composition. It’s a custom control for a guest list shown\
    \ in Figure [8-1](#515103_1_En_8_Chapter.xhtml#Fig1). You have a list of contacts\
    \ with photos and names. On the right side, there’s a switch. When it’s on, the\
    \ contact is invited; otherwise, they are not in our guest list.\n\n![Figure 8-1](images/515103_1_En_8_Chapter/515103_1_En_8_Fig1_HTML.png)\n\
    \nA set of two images has the first one with a screenshot of codes written to\
    \ generate a guest list in the Swift user interface on the left and the preview\
    \ of the guest list in the iPhone schema on the right.\n\n**Figure 8-1** Guest\
    \ list written in SwiftUI. Code and preview\n\nPhotos will be loaded from the\
    \ Web using the URL provided in `pictureURL`. SwiftUI has a native `AsyncImage`\
    \ control, but it’s available only since iOS 15, so we’ll use `KFImage`.\n\n`KFImage`\
    \ is a part of the `Kingfisher` library. You can add it using Swift Package Manager:\
    \ [https://github.com/onevcat/Kingfisher](https://github.com/onevcat/Kingfisher).\n\
    \n```swift\nimport SwiftUI\nimport Kingfisher\n\nstruct ContactGuestView: View\
    \ {\n    let name: String\n    let pictureURL: URL?\n    @State private var isInvited\
    \ = false\n\n    var body: some View {\n        HStack(alignment: .center,\n \
    \              spacing: 8.0) {\n            KFImage(pictureURL)\n            \
    \    .resizable()\n                .aspectRatio(contentMode: .fill)\n        \
    \        .frame(width: 32, height: 32)\n                .clipShape(Circle())\n\
    \            Toggle(name, isOn: $isInvited)\n                .onChange(of: isInvited)\
    \ { newValue in\n                    print(newValue)\n                }\n    \
    \            .font(.system(size: 16))\n                .foregroundColor(.primary)\n\
    \        }\n        .padding(.leading, 16)\n        .padding(.trailing, 16)\n\
    \        .frame(height: 32, alignment: .center)\n    }\n}\n\nstruct ContactGuestView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContactGuestView(\n\
    \            name: \"John Doe\",\n            pictureURL: URL(string: \"https://picsum.photos/32/32\"\
    )\n        )\n    }\n}\n// Recipe 8-3\n// Custom Component for Guest List\n```\n\
    \nHere’s an interesting part in this line: `@State private var isInvited = false`.\
    \ It’s a state of your component, or a part of it. When toggle (in UIKit, it’s\
    \ called Switch) state is changed, the variable is automatically changed too.\
    \ You can access your state and take the necessary action.\n\nHow to handle state\
    \ change? In an ideal case, we should have a view model that handles all the changes\
    \ and stores the result in a repository. For this, we use method `.onChange`.\
    \ Full signature looks this way:\n\n```swift\n@inlinable public func onChange(of\
    \ value: V, perform action: @escaping (_ newValue: V) -> Void) -> some View where\
    \ V : Equatable\n```\n\nIn a provided closure, we change the value in the internal\
    \ storage or send a request to the back end. In this example, we just print it.\n\
    \n**Note:** `onChange` should be called right after the `Toggle` declaration,\
    \ before styling. Styling methods return simple `View`, not `Toggle`, which won’t\
    \ recognize the `onChange` method.\n\nTo wrap the SwiftUI basics up, Recipe [8-4](#515103_1_En_8_Chapter.xhtml#PC7)\
    \ shows how to use it.\n\n```swift\nimport SwiftUI\n\nstruct ContactGuest {\n\
    \    var id: String\n    var name: String\n    var pictureURL: URL?\n}\n\nstruct\
    \ GuestListView: View {\n    let contacts: [ContactGuest]\n\n    var body: some\
    \ View {\n        ScrollView(.vertical, showsIndicators: false) {\n          \
    \  LazyVStack {\n                ForEach(contacts, id: \\.id) { contact in\n \
    \                   ContactGuestView(\n                        name: contact.name,\n\
    \                        pictureURL: contact.pictureURL\n                    )\n\
    \                }\n            }\n        }\n    }\n}\n\nstruct GuestListView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        GuestListView(\n\
    \            contacts: [\n                ContactGuest(id: \"1\", name: \"John\
    \ Stone\", pictureURL: URL(string: \"https://picsum.photos/id/1/32/32\")),\n \
    \               ContactGuest(id: \"2\", name: \"Ponnappa Priya\", pictureURL:\
    \ URL(string: \"https://picsum.photos/id/2/32/32\")),\n                ContactGuest(id:\
    \ \"3\", name: \"Mia Wong\", pictureURL: URL(string: \"https://picsum.photos/id/3/32/32\"\
    )),\n                ContactGuest(id: \"4\", name: \"Peter Stanbridge\", pictureURL:\
    \ URL(string: \"https://picsum.photos/id/4/32/32\"))\n            ]\n        )\n\
    \    }\n}\n// Recipe 8-4\n// Guest List\n```\n\n`LazyVStack` is a variation of\
    \ `VStack` that doesn’t render invisible components. `LazyVStack` inside `ScrollView`\
    \ is like `UITableView`. SwiftUI has its own `List`, but when you have a static\
    \ set of items, it may be faster to use this composition.\n\n### Inserting UIKit\
    \ Components\n\nSwiftUI is a relatively new framework. Most of the available libraries,\
    \ including the popular ones, still don’t support it. Fortunately, there’s an\
    \ easy way to insert standard UIKit `UIView` (or any subclass) to a SwiftUI component\
    \ tree.\n\n#### Creating a SwiftUI Component from a UIKit Component\n\nLet’s say\
    \ you have a complicated custom `UIView` subclass `MyCustomOldView` that you’re\
    \ not ready to port to SwiftUI. You need to make a wrapper around it, which conforms\
    \ to the `UIViewRepresentable` protocol.\n\nThe second step is to add properties.\
    \ You can add them by adding variables to your struct.\n\nSteps 3 and 4 are implementing\
    \ two functions declared in the `UIViewRepresentable` protocol:\n\n```\nfunc makeUIView(context:\
    \ Self.Context) -> Self.UIViewType\n```\n\nThis function creates an instance of\
    \ your `MyCustomOldView` and returns it. If there are any constant settings of\
    \ that component, you can set them up in this function as well. It may be helpful\
    \ if you’re not using your own custom class, but standard UIKit class or class\
    \ from an external library, and you need some adjustments.\n\n```\nfunc updateUIView(Self.UIViewType,\
    \ context: Self.Context)\n```\n\nThis function needs to update the state of your\
    \ UIKit component. You shouldn’t (re)create your `UIView` in this function; only\
    \ apply all the changeable properties. Don’t return anything."
  raw: '### Building Blocks


    When you create a new SwiftUI project, you see two controls :


    *   `Text –` The closest control from UIKit is `UILabel`. Of course, it has SwiftUI
    specifics.


    *   `ContentView –` This `View` is the layout of the screen. It has size of phone
    screen because it’s referred in your App struct.


    From a SwiftUI point of view, there’s no difference between `Text` and `ContentView`.
    For example, this code is totally valid:


    ```

    @main

    struct MyApp: App {

    var body: some Scene {

    WindowGroup {

    Text("I''m the only element on the screen :)")

    }

    }

    }

    ```


    At the same time, `ContentView` can be used inside another `View`.


    The most common controls are as follows:


    *   `Text` – A block of text similar to `UILabel`


    *   `Image` – A control displaying an image, similar to `UIImageView`


    *   `HStack` and `VStack` – Controls displaying a row or column of elements, one
    after another, similar to `UIStackView`


    *   `List –` A scrollable list of items, similar to `UITableView` or `UICollectionView`


    *   `ZStack` – A frame, showing child controls on top of each other, like `UIView`
    in `UIKit`


    *   `Spacer` – Used in stacks to make a dynamic gap between controls


    *   `Button` – A tappable element, allowing the user to control the app. Like
    `UIButton`


    The preceding list is not a full list, but these controls are the most common
    .


    ### Modifying Controls


    You can make small modifications to controls without overriding them or creating
    new ones. For example, you may want to change the font, color, padding, background,
    and other properties.


    In SwiftUI, it’s done by calling methods following controls constructors. For
    example:


    ```

    Text("Hello, world!")

    .font(.system(size: 14))

    .foregroundColor(.blue)

    ```


    A modifier can be applied not only to components, but to a group of controls.
    For example, if you apply a foreground color to `HStack`, all the inner controls
    will get this color automatically, unless it’s overridden.


    ### Compositions


    When you create a new control, you usually build it from existing blocks. This
    is a composition . SwiftUI has three main controls for this purpose:


    *   `HStack –` It shows controls horizontally one after another.


    *   `VStack –` It shows controls vertically one after another.


    *   `ZStack –` It shows controls on top of each other.


    Recipe [8-3](#515103_1_En_8_Chapter.xhtml#PC5) is an example of such composition.
    It’s a custom control for a guest list shown in Figure [8-1](#515103_1_En_8_Chapter.xhtml#Fig1).
    You have a list of contacts with photos and names. On the right side, there’s
    a switch. When it’s on, the contact is invited; otherwise, they are not in our
    guest list.


    ![](images/515103_1_En_8_Chapter/515103_1_En_8_Fig1_HTML.png)


    A set of two images has the first one with a screenshot of codes written to generate
    a guest list in the Swift user interface on the left and the preview of the guest
    list in the iPhone schema on the right.


    Figure 8-1


    Guest list written in SwiftUI. Code and preview


    Photos will be loaded from the Web using the URL provided in pictureURL. SwiftUI
    has a native `AsyncImage` control, but it’s available only since iOS 15, so we’ll
    use `KFImage`.


    KFImage is a part of the `Kingfisher` library. You can add it using Swift Package
    Manager: [`https://github.com/onevcat/Kingfisher`](https://github.com/onevcat/Kingfisher)
    .


    ```

    import SwiftUI

    import Kingfisher

    struct ContactGuestView: View {

    let name: String

    let pictureURL: URL?

    @State private var isInvited = false

    var body: some View {

    HStack(alignment: .center,

    spacing: 8.0) {

    KFImage(pictureURL)

    .resizable()

    .aspectRatio(contentMode: .fill)

    .frame(width: 32, height: 32)

    .clipShape(Circle())

    Toggle(name, isOn: $isInvited)

    .onChange(of: isInvited) { newValue in

    print(newValue)

    }

    .font(.system(size: 16))

    .foregroundColor(.primary)

    }

    .padding(.leading, 16)

    .padding(.trailing, 16)

    .frame(height: 32, alignment: .center)

    }

    }

    struct ContactGuestView_Previews: PreviewProvider {

    static var previews: some View {

    ContactGuestView(

    name: "John Doe",

    pictureURL: URL(string: "https://picsum.photos/32/32")

    )

    }

    }

    Recipe 8-3

    Custom Component for Guest List

    ```


    Here’s an interesting part in this line: `@State private var isInvited = false`


    It’s a state of your component, or a part of it. When toggle (in UIKit, it’s called
    Switch) state is changed, the variable is automatically changed too. You can access
    your state and take the necessary action.


    How to handle state change? In an ideal case, we should have a view model that
    handles all the changes and stores the result in a repository. For this, we use
    method `.onChange`. Full signature looks this way:


    ```

    @inlinable public func onChange(of value: V, perform action: @escaping (_ newValue:
    V) -> Void) -> some View where V : Equatable

    ```


    In a provided closure, we change the value in the internal storage or send a request
    to the back end. In this example, we just print it.


    Note


    onChange should be called right after the Toggle declaration, before styling.
    Styling methods return simple View, not Toggle, which won’t recognize the onChange
    method.


    To wrap the SwiftUI basics up, Recipe [8-4](#515103_1_En_8_Chapter.xhtml#PC7)
    shows how to use it.


    ```

    import SwiftUI

    struct ContactGuest {

    var id: String

    var name: String

    var pictureURL: URL?

    }

    struct GuestListView: View {

    let contacts: [ContactGuest]

    var body: some View {

    ScrollView(.vertical, showsIndicators: false) {

    LazyVStack {

    ForEach(contacts, id: \.id) { contact in

    ContactGuestView(

    name: contact.name,

    pictureURL: contact.pictureURL

    )

    }

    }

    }

    }

    }

    struct GuestListView_Previews: PreviewProvider {

    static var previews: some View {

    GuestListView(

    contacts: [

    ContactGuest(

    id: "1",

    name: "John Stone",

    pictureURL: URL(string: "https://picsum.photos/id/1/32/32")

    ),

    ContactGuest(

    id: "2",

    name: "Ponnappa Priya",

    pictureURL: URL(string: "https://picsum.photos/id/2/32/32")

    ),

    ContactGuest(

    id: "3",

    name: "Mia Wong",

    pictureURL: URL(string: "https://picsum.photos/id/3/32/32")

    ),

    ContactGuest(

    id: "4",

    name: "Peter Stanbridge",

    pictureURL: URL(string: "https://picsum.photos/id/4/32/32")

    )

    ]

    )

    }

    }

    Recipe 8-4

    Guest List

    ```


    `LazyVStack` is a variation of `VStack` that doesn’t render invisible components.
    `LazyVStack` inside `ScrollView` is like `UITableView`. SwiftUI has its own List,
    but when you have a static set of items, it may be faster to use this composition.


    ## Inserting UIKit Components


    SwiftUI is a relatively new framework. Most of the available libraries, including
    the popular ones, still don’t support it. Fortunately, there’s an easy way to
    insert standard UIKit `UIView` (or any subclass) to a SwiftUI component tree.


    ### Creating a SwiftUI Component from a UIKit Component


    Let’s say you have a complicated custom `UIView` subclass `MyCustomOldView` that
    you’re not ready to port to SwiftUI. You need to make a wrapper around it, which
    conforms to the `UIViewRepresentable` protocol.


    The second step is to add properties. You can add them by adding variables to
    your struct.


    Steps 3 and 4 are implementing two functions declared in the `UIViewRepresentable`
    protocol:


    ```

    func makeUIView(context: Self.Context) -> Self.UIViewType

    ```


    This function creates an instance of your `MyCustomOldView` and returns it. If
    there are any constant settings of that component, you can set them up in this
    function as well. It may be helpful if you’re not using your own custom class,
    but standard UIKit class or class from an external library, and you need some
    adjustments.


    ```

    func updateUIView(Self.UIViewType, context: Self.Context)

    ```


    This function needs to update the state of your UIKit component. You shouldn’t
    (re)create your `UIView` in this function; only apply all the changeable properties.
    Don’t return anything.'
  trans: "\n### 构建块\n\n当你创建一个新的 SwiftUI 项目时，会看到两个控件：\n\n- `Text` – 来自 UIKit 的对应控件是\
    \ `UILabel`。当然，它也具有 SwiftUI 的特性。\n- `ContentView` – 这个 `View` 是屏幕的布局。它拥有手机屏幕的尺寸，因为它在你的\
    \ `App` 结构体中被引用。\n\n从 SwiftUI 的角度来看，`Text` 和 `ContentView` 之间没有区别。例如，以下代码是完全有效的：\n\
    \n```swift\n@main\nstruct MyApp: App {\n    var body: some Scene {\n        WindowGroup\
    \ {\n            Text(\"我是屏幕上唯一的元素 :)\")\n        }\n    }\n}\n```\n\n同时，`ContentView`\
    \ 也可以在另一个 `View` 内部使用。\n\n最常见的控件如下：\n\n- `Text` – 一段文本，类似于 `UILabel`\n- `Image`\
    \ – 一个显示图片的控件，类似于 `UIImageView`\n- `HStack` 和 `VStack` – 分别按行或列依次排列元素的控件，类似于 `UIStackView`\n\
    - `List` – 一个可滚动的列表，类似于 `UITableView` 或 `UICollectionView`\n- `ZStack` – 一个框架，将子控件叠加显示，类似于\
    \ `UIKit` 中的 `UIView`\n- `Spacer` – 用于在堆栈中的控件之间创建动态间距\n- `Button` – 一个可点击的元素，允许用户控制应用，类似于\
    \ `UIButton`\n\n上述列表并非完整列表，但这些控件是最常见的。\n\n### 修改控件\n\n你可以对控件进行小幅修改，而无需覆写或创建新控件。例如，你可能想改变字体、颜色、内边距、背景和其他属性。在\
    \ SwiftUI 中，可以通过在控件构造器之后调用方法来实现。例如：\n\n```swift\nText(\"你好，世界！\")\n    .font(.system(size:\
    \ 14))\n    .foregroundColor(.blue)\n```\n\n修饰符不仅可以应用于单个组件，还可以应用于一组控件。例如，如果你对\
    \ `HStack` 应用了前景色，那么除非被覆盖，否则其所有内部控件都会自动获得这个颜色。\n\n### 组合\n\n当你创建一个新控件时，通常是从现有的构建块组合而成。这就是组合。SwiftUI\
    \ 有三个主要的控件用于此目的：\n\n- `HStack` – 它水平地依次显示控件。\n- `VStack` – 它垂直地依次显示控件。\n- `ZStack`\
    \ – 它将控件互相叠放显示。\n\n配方 8-3 就是这种组合的一个例子。它是一个用于嘉宾列表的自定义控件，如图 8-1 所示。你有一个包含照片和姓名的联系人列表。右侧是一个开关。当开关打开时，该联系人被邀请；否则，他们不在我们的嘉宾列表中。\n\
    \n![图 8-1](img/515103_1_En_8_Fig1_HTML.png)\n\n一组两张图片，第一张是左侧在 Swift 用户界面中编写生成嘉宾列表的代码截图，右侧是\
    \ iPhone 模式下嘉宾列表的预览。\n\n**图 8-1** 用 SwiftUI 编写的嘉宾列表。代码与预览\n\n照片将使用 `pictureURL`\
    \ 中提供的 URL 从网络加载。SwiftUI 有一个原生的 `AsyncImage` 控件，但它仅从 iOS 15 开始可用，因此我们将使用 `KFImage`。\n\
    \n`KFImage` 是 `Kingfisher` 库的一部分。你可以通过 Swift Package Manager 添加它：[`github.com/onevcat/Kingfisher`](https://github.com/onevcat/Kingfisher)。\n\
    \n```swift\nimport SwiftUI\nimport Kingfisher\n\nstruct ContactGuestView: View\
    \ {\n    let name: String\n    let pictureURL: URL?\n    @State private var isInvited\
    \ = false\n\n    var body: some View {\n        HStack(alignment: .center,\n \
    \              spacing: 8.0) {\n            KFImage(pictureURL)\n            \
    \    .resizable()\n                .aspectRatio(contentMode: .fill)\n        \
    \        .frame(width: 32, height: 32)\n                .clipShape(Circle())\n\
    \            Toggle(name, isOn: $isInvited)\n                .onChange(of: isInvited)\
    \ { newValue in\n                    print(newValue)\n                }\n    \
    \            .font(.system(size: 16))\n                .foregroundColor(.primary)\n\
    \        }\n        .padding(.leading, 16)\n        .padding(.trailing, 16)\n\
    \        .frame(height: 32, alignment: .center)\n    }\n}\n\nstruct ContactGuestView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContactGuestView(\n\
    \            name: \"张三\",\n            pictureURL: URL(string: \"https://picsum.photos/32/32\"\
    )\n        )\n    }\n}\n// 配方 8-3\n// 嘉宾列表的自定义组件\n```\n\n这行代码中有一个有趣的部分：`@State\
    \ private var isInvited = false`。这是你的组件或其一部分的状态。当开关（在 UIKit 中称为 Switch）的状态改变时，变量会自动随之改变。你可以访问你的状态并采取必要的操作。\n\
    \n如何处理状态变化？理想情况下，我们应该有一个视图模型来处理所有变化，并将结果存储在一个仓库中。为此，我们使用 `.onChange` 方法。完整签名如下所示：\n\
    \n```swift\n@inlinable public func onChange(of value: V, perform action: @escaping\
    \ (_ newValue: V) -> Void) -> some View where V : Equatable\n```\n\n在提供的闭包中，我们更改内部存储中的值，或向后端发送请求。在这个例子中，我们只是打印它。\n\
    \n**注意：** `onChange` 应该在 `Toggle` 声明之后、样式设置之前立即调用。样式设置方法返回的是简单的 `View`，而不是 `Toggle`，后者将无法识别\
    \ `onChange` 方法。\n\n为了总结 SwiftUI 的基础知识，配方 8-4 展示了如何使用它。\n\n```swift\nimport SwiftUI\n\
    \nstruct ContactGuest {\n    var id: String\n    var name: String\n    var pictureURL:\
    \ URL?\n}\n\nstruct GuestListView: View {\n    let contacts: [ContactGuest]\n\n\
    \    var body: some View {\n        ScrollView(.vertical, showsIndicators: false)\
    \ {\n            LazyVStack {\n                ForEach(contacts, id: \\.id) {\
    \ contact in\n                    ContactGuestView(\n                        name:\
    \ contact.name,\n                        pictureURL: contact.pictureURL\n    \
    \                )\n                }\n            }\n        }\n    }\n}\n\n\
    struct GuestListView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        GuestListView(\n            contacts: [\n                ContactGuest(id:\
    \ \"1\", name: \"约翰·斯通\", pictureURL: URL(string: \"https://picsum.photos/id/1/32/32\"\
    )),\n                ContactGuest(id: \"2\", name: \"庞纳帕·普里亚\", pictureURL: URL(string:\
    \ \"https://picsum.photos/id/2/32/32\")),\n                ContactGuest(id: \"\
    3\", name: \"米娅·黄\", pictureURL: URL(string: \"https://picsum.photos/id/3/32/32\"\
    )),\n                ContactGuest(id: \"4\", name: \"彼得·斯坦布里奇\", pictureURL: URL(string:\
    \ \"https://picsum.photos/id/4/32/32\"))\n            ]\n        )\n    }\n}\n\
    // 配方 8-4\n// 嘉宾列表\n```\n\n`LazyVStack` 是 `VStack` 的一个变体，它不会渲染不可见的组件。`ScrollView`\
    \ 内部的 `LazyVStack` 就像 `UITableView`。SwiftUI 有自己的 `List`，但当你有一组静态项目时，使用这种组合可能会更快。\n\
    \n### 插入 UIKit 组件\n\nSwiftUI 是一个相对较新的框架。大多数可用的库，包括流行的库，仍然不支持它。幸运的是，有一种简单的方法可以将标准的\
    \ UIKit `UIView`（或任何子类）插入到 SwiftUI 的组件树中。\n\n#### 从 UIKit 组件创建 SwiftUI 组件\n\n\
    假设你有一个复杂的自定义 `UIView` 子类 `MyCustomOldView`，你还没有准备好将其移植到 SwiftUI。你需要为其创建一个包装器，该包装器遵循\
    \ `UIViewRepresentable` 协议。\n\n第二步是添加属性。你可以通过向结构体添加变量来添加它们。\n\n步骤 3 和 4 是实现 `UIViewRepresentable`\
    \ 协议中声明的两个函数：\n\n```\nfunc makeUIView(context: Self.Context) -> Self.UIViewType\n\
    ```\n\n该函数创建 `MyCustomOldView` 的一个实例并返回它。如果该组件有任何常量设置，你也可以在此函数中设置它们。如果你没有使用自己的自定义类，而是使用标准的\
    \ UIKit 类或来自外部库的类，并且需要一些调整，这可能很有用。\n\n```\nfunc updateUIView(Self.UIViewType,\
    \ context: Self.Context)\n```\n\n这个函数需要更新你的 UIKit 组件的状态。你不应该在这个函数中（重新）创建你的 `UIView`；只需应用所有可更改的属性。不要返回任何内容。\n"
- fmt: "### Example with Custom Label\n\nIn Recipe [8-5](#515103_1_En_8_Chapter.xhtml#PC10),\
    \ we’ll wrap a `UILabel` subclass into a SwiftUI structure. Many apps have a predefined\
    \ list of components with integrated styles and formatting. When the app starts\
    \ working with SwiftUI, there are two options:\n\n- To add all these components\
    \ in SwiftUI using `Text`\n- To wrap existing components into SwiftUI ones\n\n\
    The second way has an advantage if part of your app migrated to SwiftUI but another\
    \ part didn’t.\n\n```\nimport UIKit\nimport SwiftUI\nclass HeaderLabel: UILabel\
    \ {\n    required init?(coder: NSCoder) {\n        super.init(coder: coder)\n\
    \        commonInit()\n    }\n    override init(frame: CGRect) {\n        super.init(frame:\
    \ frame)\n        commonInit()\n    }\n    private func commonInit() {\n     \
    \   textAlignment = .center\n        font = .systemFont(ofSize: 20, weight: .bold)\n\
    \        textColor = .darkText\n        numberOfLines = 1\n    }\n}\nstruct HeaderText:\
    \ UIViewRepresentable {\n    var text: String\n    func makeUIView(context: Context)\
    \ -> HeaderLabel {\n        HeaderLabel()\n    }\n    func updateUIView(_ uiView:\
    \ HeaderLabel, context: Context) {\n        uiView.text = text\n    }\n}\nRecipe\
    \ 8-5\nWrapping UIKit Components into SwiftUI\n```\n\nInsert it in any SwiftUI\
    \ `View`:\n\n```\nstruct ContentView: View {\n    var body: some View {\n    \
    \    HeaderText(text: \"Hello, world!\")\n    }\n}\n```\n\nIf your properties\
    \ can be changed dynamically, you can add the `@Binding` keyword.\n\n## Applying\
    \ Styles with ViewModifier\n\nWe already applied several styles with modifiers.\
    \ We used `font`, `foregroundColor`, `frame`, and others.\n\nWhen you create your\
    \ own component, you don’t have to provide all the adjustable properties in a\
    \ constructor. It may be reasonable if you have two to three of them. But when\
    \ you create a more complicated `View`, there can be dozens of them, and it’s\
    \ very uncomfortable to use them all in a constructor.\n\nFor this purpose, you\
    \ can add extensions changing your custom `View` and view modifiers changing the\
    \ properties of `View` more globally.\n\n### Creating a ViewModifier\n\nTo create\
    \ your own modifier, you need to add a struct conforming to the `ViewModifier`\
    \ protocol.\n\nIn this struct, you need to implement one function:\n\n```\nfunc\
    \ body(content: Content) -> some View\n```\n\nIn this function, you need to set\
    \ up your `View` and return the result.\n\n```\nstruct ModifierName: ViewModifier\
    \ {\n    func body(content: Content) -> some View {\n        content\n       \
    \ ... // Do modifications here\n    }\n}\n```\n\n### Chaining Modifiers in SwiftUI\n\
    \nTo make your modifier look like the standard SwiftUI modifiers, you need to\
    \ create an extension. Depending on your modifier, you can make it globally available\
    \ by extending `View`, or make it more targeted to your own view or some tree\
    \ of components (subclasses of `Text`, for example).\n\n```\nextension View {\n\
    \    func applyMyStyle() -> some View {\n        modifier(ModifierName())\n  \
    \  }\n}\n```\n\n### HeaderText without UIKit\n\nRecipe [8-6](#515103_1_En_8_Chapter.xhtml#PC15)\
    \ shows how we can make a modifier for `Text` to make a header with style matching\
    \ the one from Recipe [8-5](#515103_1_En_8_Chapter.xhtml#PC10).\n\n```\nimport\
    \ SwiftUI\nstruct Header: ViewModifier {\n    func body(content: Content) -> some\
    \ View {\n        content\n            .font(.system(size: 20, weight: .bold))\n\
    \            .foregroundColor(Color(UIColor.darkText))\n            .fixedSize(horizontal:\
    \ false, vertical: true)\n            .lineLimit(1)\n            .frame(alignment:\
    \ .center)\n    }\n}\nextension Text {\n    func styleAsHeader() -> some View\
    \ {\n        modifier(Header())\n    }\n}\nRecipe 8-6\nHeaderText Using ViewModifier\n\
    ```\n\nUse it this way:\n\n```\nstruct ContentView: View {\n    var body: some\
    \ View {\n        Text(\"Hello, world!\")\n            .styleAsHeader()\n    }\n\
    }\n```\n\nIf there are properties specific to your `View` that can’t be applied\
    \ to `Context`, apply them in an extension directly, before calling the modifier\
    \ method. For example:\n\n```\nfunc changeMyView() -> some View {\n    doSomethingSpecific().modifier(SomeModifier())\n\
    }\n```\n\nUsing `ViewModifier`s, you can create your own style library without\
    \ subclassing `View`s.\n\n**Note**: If you apply a modifier on a container (e.g.,\
    \ `HStack` or `VStack`), it applies to all of its children. That’s why it’s usually\
    \ better to use pure modifiers without calling methods of the `View` subclass\
    \ and to extend `View` globally.\n\n## Creating Custom Views\n\nOne of the most\
    \ useful features of SwiftUI is creating custom reusable components. Creating\
    \ small adjustable building blocks gives endless possibilities in UI creation.\n\
    \nThere are three main ways of creating custom views:\n\n- Composition of existing\
    \ SwiftUI components adjusted for your needs\n- Wrapping UIKit components\n- Using\
    \ `Canvas` for drawing your own views using lines, circles, and other primitives\n\
    \nCustom views can have changeable data. There are two key property wrappers:\n\
    \n- `@State`\n- `@Binding`\n\nWe already discussed composition and wrapping UIKit\
    \ components earlier in this chapter. Let’s review `Canvas` drawing and property\
    \ wrappers in details.\n\n### Drawing on a Canvas\n\n`Canvas` is a SwiftUI control\
