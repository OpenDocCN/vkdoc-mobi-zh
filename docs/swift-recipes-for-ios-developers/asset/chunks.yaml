    \ }\n}\n```\n\n**配方 2-2**  \n生成 JSON\n\n## 使用 XML\n\n虽然 JSON 在数据交换中很流行，但 XML（可扩展标记语言）更常用于存储应用程序内部数据。Storyboard、nib、plist\
    \ 及其他结构都基于 XML。Android 和 UWP（通用 Windows 平台）的布局文件也使用 XML。\n\n某些 API 提供 XML 格式的响应，这可能是唯一选项，也可能是备选方案之一。\n\
    \n在讨论如何解析 XML 之前，重要的是要理解，与 JSON 不同，XML 不能直接转换为 Swift 的 `Dictionary` 或 `Array`。JSON\
    \ 是一种*对象表示法*，而 `Dictionary` 是表示对象（至少是其数据）的一种方式。在 JavaScript 中，对象本身就是字典。\n\nXML\
    \ 是一种*标记语言*，包含元素和属性。这些元素和属性在*模式*中声明。它还包含命名空间等 Swift 字典中不存在的结构。但如果只是解析 API 的响应或准备\
    \ API 调用的参数，我们不必深入这些内容。我们需要做的就是提取所需的数据。\n\n### 解析 XML\n\nSwift 提供了内置类 `XMLParser`。它可以提取\
    \ XML 中的数据，但其使用方式堪称噩梦。要解析 XML 字符串，你需要声明一个委托，每个 XML 元素（标签）都会触发一个回调：\n\n```\nclass\
    \ ParserDelegate: NSObject, XMLParserDelegate {\n    func parser(_ parser: XMLParser,\
    \ didStartElement elementName: String, namespaceURI: String?, qualifiedName qName:\
    \ String?, attributes attributeDict: [String : String] = [:]) {\n        print(\"\
    找到元素 \\(elementName)，属性为 \\(attributeDict)\")\n    }\n}\n```\n\n如果需要获取某些数据，这种做法可行，但用它来获取\
    \ `Dictionary` 则过于复杂。\n\n有一个好用的辅助库：SWXMLHash。它维护良好，兼容多个 Swift 版本，并可通过 CocoaPods、Carthage\
    \ 和 Swift Package Manager 获取。如果使用 CocoaPods，请将以下内容添加到 Podfile 中：\n\n```\npod 'SWXMLHash'\n\
    ```\n\n不要忘记运行 `pod install` 或 `pod update`。\n\n现在，只需一行代码即可完成解析：\n\n```\nlet xmlDict\
    \ = SWXMLHash.parse(xml)\n```\n\n然后，你可以从 `xmlDict` 中提取所需的数据。配方 2-3 展示了完整代码。\n\n\
    ```\nimport SWXMLHash\n\nlet xml: String = \"...\"\nlet xmlDict = SWXMLHash.parse(xml)\n\
    ```\n\n**配方 2-3**  \n解析 XML\n"
- fmt: '### Generating XML


    Generating XML is a very rare task for iOS apps, which we’ll discuss for the sake
    of completeness only. It’s unlikely that you’ll need to generate XML data and
    save or send it somewhere. On the other hand, unlikely doesn’t mean impossible.
    You can find the full code in Recipe [2-4](#515103_1_En_2_Chapter.xhtml#PC8).
    But first, let’s see how it works.


    As there are no standard solutions and no libraries compatible with the latest
    Swift version, we’ll write a simple XML generator. XML is a recursive structure
    – a tag can contain other tag, or tags, so this generator will be recursive as
    well.


    We’ll divide all elements into three groups:


    - Dictionaries

    - Arrays

    - Basic elements


    `Array` in XML is presented with several tags with the same name, but different
    content. `Dictionary` is a tag with tags inside. And a basic element is just a
    tag with a text string (representing any type) inside.


    Basic elements will be generated using the `String` interpolation that we discussed
    earlier. For the other two types of elements, we’ll use two functions:


    ```

    func convertArrayToXML(array: [Any], startElement: String) -> String {

    var xml = ""

    for value in array {

    if let value = value as? [String: Any] {

    xml += convertDictionaryToXML(dictionary: value, startElement: startElement, isFirstElement:
    false)

    }

    else if let value = value as? [Any] {

    xml += convertArrayToXML(array: value, startElement: startElement)

    }

    else {

    xml += "\(value)\n"

    }

    }

    return xml

    }

    func convertDictionaryToXML(dictionary: [String: Any], startElement: String, isFirstElement:
    Bool) -> String {

    var xml = ""

    let arr = dictionary.keys

    if isFirstElement {

    xml += "\n"

    }

    xml += "\n"

    for nodeName in arr {

    guard let nodeValue = dictionary[nodeName] else { continue }

    if let nodeValue = nodeValue as? [Any] {

    if !nodeValue.isEmpty {

    xml += convertArrayToXML(array: nodeValue, startElement: nodeName)

    }

    }

    else if let nodeValue = nodeValue as? [String: Any] {

    xml += convertDictionaryToXML(dictionary: nodeValue, startElement: nodeName, isFirstElement:
    false)

    }

    else {

    xml += "\(nodeValue)\n"

    }

    }

    xml += "\n"

    return xml.replacingOccurrences(of: "&", with: "&")

    }

    Recipe 2-4

    Generating XML

    ```


    **Usage**


    ```

    let dict: [String: Any] = ...

    let xml = convertDictionaryToXML(dictionary: dict, startElement: "root", isFirstElement:
    true)

    ```


    ## Working with YAML


    YAML (Yet Another Markup Language) is another popular format for storing and exchanging
    data. The advantage is that it’s easy and human readable. The disadvantage is
    that YAML has indented delimiting (meaning that using leading spaces separates
    data levels), similarly to Python or GDScript. You can edit a YAML file in a simple
    text editor, but it’s easy to make mistake.


    One of the most popular usages of YAML is configuration files. Flutter apps use
    YAML for main configuration files, and Google Cloud also uses YAML for configuration
    of its services.


    Luckily for us, there are many libraries on GitHub for parsing and/or generating
    YAML. One of them is `Yams`.


    If you use CocoaPods, add this line to your `Podfile`:


    ```

    pod ''Yams''

    ```


    Then you can generate and parse YAML as shown in Recipe [2-5](#515103_1_En_2_Chapter.xhtml#PC11).


    ```

    import Yaml

    // Generating YAML

    let strYAML: String? = try? Yams.dump(object: dictionary)

    // Parsing YAML

    let loadedDictionary = try? Yams.load(yaml: mapYAML) as? [String: Any]

    Recipe 2-5

    Parsing and Generating YAML

    ```


    ## URL-Encoded Strings


    One more way to encode data is a URL-encoded string. It’s useful for generating
    URLs with GET arguments, as well as POST data with `application/x-www-form-urlencoded`
    type.


    A URL-encoded string is a text string consisting of key-value pairs separated
    by the ampersand symbol: `key1=value1&key2=value2&...`. If you send it using the
    GET method (as a part of URL), it’s separated from the main URL with a question
    mark: `https://some_website.com?key1=value1&key2=value2&...`. As a POST data,
    it must be sent without any additional signs.


    If you send data to a server, you probably have a set of keys to provide, and
    they must contain only Latin letters, numbers, and maybe underscores. A situation
    that includes values is more complicated – they can contain spaces, equal signs,
    or other *forbidden* characters. For this reason, we should encode them. Swift
    has a standard `String` method, `addingPercentEncoding(withAllowedCharacters:)`.
    Recipe [2-6](#515103_1_En_2_Chapter.xhtml#PC12) shows the full extension.


    ```

    public extension Dictionary where Key: ExpressibleByStringLiteral {

    var urlEncodedString: String {

    var result: [String] = []

    for key in keys {

    let keyEncoded = "\(key)".addingPercentEncoding(withAllowedCharacters: .urlPathAllowed)!

    let valueEncoded = "\(self[key]!)".addingPercentEncoding(withAllowedCharacters:
    .urlPathAllowed)!

    result.append("\(keyEncoded)=\(valueEncoded)")

    }

    return result.joined(separator: "&")

    }

    }

    Recipe 2-6

    URL-Encoding Argument Dictionary

    ```


    The usage is pretty straightforward:


    ```

    let urlArgsDict: [String: Any] = [

    "firstName": "Luis Alberto",

    "lastName": "Lopez Garcia",

    "age": 15

    ]

    let urlArgs = urlArgsDict.urlEncodedString

    print(urlArgs)

    ```


    The output will be as follows:


    ```

    firstName=Luis%20Alberto&lastName=Lopez%20Garcia&age=15

    ```


    It’s totally suitable for sending to APIs:


    ```

    https://my_api.com/register_user?firstName=Luis%20Alberto&lastName=Lopez%20Garcia&age=15

    ```


    Note: Registering users via GET requests is a bad practice. Still, this example
    demonstrates how you can encode any data for further sending it to the API.


    ## Serialization and Deserialization


    In previous sections, we discussed how to parse JSON into a `Dictionary` or an
    `Array`, how to extract typed data from them, and how to turn JSON from API into
    an instance of a custom class or struct. Here, we’ll take a shortcut and turn
    JSON directly into an object.


    Note: If you ever developed an app for Android, you know that to pass arguments
    to another `Activity`, you need to add them to an `Intent`. This is an example
    of serialization. You can also pass an object of custom class, but it must implement
    `Parcelable` interface. This interface has functions for serialization and deserialization
    of class data.'
