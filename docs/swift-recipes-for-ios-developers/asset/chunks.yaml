  raw: '### Creating a Custom Transition


    If you’re not happy with standard animation, you can create your own custom transition.


    When we’re talking about custom transitions , we need to review several protocols:


    *   `UIViewControllerTransitioningDelegate` is a protocol you need to implement
    to make custom transitions. Implementation of this protocol defines animation
    and interaction controllers for presenting and dismissing.


    *   Implementation of the `UIViewControllerAnimatedTransitioning` protocol defines
    the duration of transitions and the transitions themselves and handles some callbacks.


    *   `UIViewControllerContextTransitioning` is a context. Implementation provides
    information about transitioning views and controllers.


    When you implement the first two protocols, you need to set `destinationViewController.transitioningDelegate`.
    Let’s see how it works, step by step.


    1.  When you trigger transition (using segue or manually), iOS checks if transitioningDelegate
    is set. If no, it uses one standard transition, the one you set or the default
    one.


    2.  If `transitioningDelegate` is set, it calls `animationController(forPresented:presenting:source)`
    of your `transitioningDelegate`. This function is optional; it’s valid to return
    `nil`. If it does, the transition will be standard, like if `transitioningDelegate`
    wasn’t set.


    3.  At this point, iOS concludes that custom animation must be used and creates
    a context.


    4.  `transitionDuration(using:)` is called to define transition time. Time should
    return in seconds. Usually, it’s around 0.3 seconds. Transitions longer than one
    second will probably be uncomfortable for users.


    5.  Next, `animateTransition(using:)` is called. With this method, you can apply
    animations. Having context (in using argument), you can apply any modifications
    to both screens. You can change colors, positions, transparency – whatever you
    like.


    6.  Finally, you need to call `completeTransition(_:)`. This will mark transitions
    as over and make the destination view controller live. If you don’t call it, it
    will remain inactive .


    Some things are easier shown than explained, so let’s have a look at Recipe [7-10](#515103_1_En_7_Chapter.xhtml#PC28)
    to see how it looks in action. We’ll make one of the simplest transitions: the
    first screen will fade out, the second, fade in. In the middle of the transition,
    there will be black screen because both screens will be invisible. Animation duration
    will be one second, enough to see the entire process.


    ```

    class FadeThroughBlackPresentAnimationController: NSObject, UIViewControllerAnimatedTransitioning
    {

    func transitionDuration(using transitionContext: UIViewControllerContextTransitioning?)
    -> TimeInterval {

    return 1.0

    }

    func animateTransition(using transitionContext: UIViewControllerContextTransitioning)
    {

    guard let fromView = transitionContext.viewController(forKey: .from)?.view,

    let toView = transitionContext.viewController(forKey: .to)?.view

    else { return }

    toView.isHidden = true

    transitionContext.containerView.addSubview(toView)

    UIView.animate(withDuration: 0.5) {

    fromView.alpha = 0.0

    } completion: { _ in

    fromView.isHidden = true

    toView.alpha = 0.0

    toView.isHidden = false

    UIView.animate(withDuration: 0.5) {

    toView.alpha = 1.0

    } completion: { _ in

    fromView.isHidden = false

    transitionContext.completeTransition(!transitionContext.transitionWasCancelled)

    }

    }

    }

    }

    class FromViewController: UIViewController, UIViewControllerTransitioningDelegate
    {

    func animationController(forPresented presented: UIViewController, presenting:
    UIViewController, source: UIViewController) -> UIViewControllerAnimatedTransitioning?
    {

    FadeThroughBlackPresentAnimationController()

    }

    func animationController(forDismissed dismissed: UIViewController) -> UIViewControllerAnimatedTransitioning?
    {

    FadeThroughBlackPresentAnimationController()

    }

    override func prepare(for segue: UIStoryboardSegue, sender: Any?) {

    segue.destination.modalPresentationStyle = .fullScreen

    segue.destination.transitioningDelegate = self

    }

    }

    class ToViewController: UIViewController {

    @IBAction func goBack() {

    dismiss(animated: true, completion: nil)

    }

    }

    Recipe 7-10

    Fade Through Black Transition

    ```


    This code includes backward transition, identical to the forward one.


    ### Transition Libraries


    If you want to create something new , look around – maybe someone created it already.
    There are many libraries offering transitions. Let’s have a look at some of them:


    *   The Hero ( [`https://github.com/HeroTransitions/Hero`](https://github.com/HeroTransitions/Hero)
    ) library offers an easy way to apply one of the predefined transitions with a
    good set of tools for customizations.


    *   The Jelly ( [`https://github.com/SebastianBoldt/Jelly`](https://github.com/SebastianBoldt/Jelly)
    ) library also allows interactive transitions.


    *   Shift ( [`https://github.com/wickwirew/Shift`](https://github.com/wickwirew/Shift)
    ) is an animation library for hero-like transitions. With relatively little effort,
    it makes beautiful animations.


    All these libraries are free, open source, and available via the Swift Package
    Manager and CocoaPods. You can use them free of charge in your apps, but don’t
    forget to donate if you like them.


    ## Summary


    Modern mobile apps should use animations to look more user-friendly. UIKit offers
    native solutions for simple UI animations. In this chapter we discussed fade animations
    and animated layout changes. We talked about popular in mobile apps parallax effect,
    hero animation as a part of transition between screens. Finally, we reviewed different
    ways of transition itself. This wraps up UIKit topic, but UIKit is not the only
    way to create UI in iOS apps. Since iOS 13 Apple introduces SwiftUI, which is
    already actively used in both iOS and macOS UI development. In the next chapter
    we’ll have a fast look at SwiftUI.


    # 8. SwiftUI


    SwiftUI is a modern way of building user interfaces. It appeared in iOS 13, macOS
    10.15, tvOS 13, and watchOS 6\. Nowadays, most apps don’t need to support iOS
    12, so it’s safe to use SwiftUI in your project.


    On the other hand, there’s huge code base written in UIKit. Hundreds of popular
    libraries appeared before SwiftUI or support old versions of iOS. That’s why in
    this chapter, we’ll talk not only about SwiftUI but also about mixing two frameworks.


    What is SwiftUI? Is it a wrapper around UIKit or an independent platform? It’s
    both. Some SwiftUI controls are built on top of UIKit; others are completely new.


    ## Basic Overview of SwiftUI


    SwiftUI uses the conception of building blocks. Each block is a `View`. Blocks
    can represent the whole screen, or part of it. Blocks can contain other blocks,
    and this structure can be deep. A similar architecture is used in other platforms
    like Flutter or React Native.


    ### Basic App


    SwiftUI apps contain two initial controls, App and View, shown in Recipes [8-1](#515103_1_En_8_Chapter.xhtml#PC1)
    and [8-2](#515103_1_En_8_Chapter.xhtml#PC2), respectively.


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    Recipe 8-2

    SwiftUI View

    ```


    ```

    import SwiftUI

    @main

    struct MyApp: App {

    var body: some Scene {

    WindowGroup {

    ContentView()

    }

    }

    }

    Recipe 8-1

    SwiftUI App

