  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的要求，将给定的英文文本翻译成中文。



    ### 图像缓冲区


    无论使用哪个类，它都有一个指向图像缓冲区的指针——要么是公开的，要么是在其内部实现中。图像缓冲区是一个像素数组。每个像素由一个或多个字节编码。最常见的图像数据存储方式是
    RGB 和 RGBA。RGB 格式为每个像素使用 3 个字节，每个字节代表以下分量之一：红色、绿色和蓝色。RGBA 为每个像素使用 4 个字节。除了红色、绿色和蓝色之外，还有
    alpha 分量，用于指示每个像素的透明度（图 5-1）。


    ![](img/515103_1_En_5_Fig1_HTML.jpg)


    该网格展示了像素的 R G B A 字节调色板。alpha 分量指示每个像素的透明度。


    图 5-1

    具有 RGBA 调色板的图片结构


    如果图像是灰度的，每个像素通常用 1 个字节编码。如果字节包含 0，则为黑色；如果为 255，则为白色。中间的所有值是不同深浅的灰色。


    公开图像缓冲区最多信息的类是 `CGImage`。它具有以下属性：


    -   `width` 和 `height` 包含图像大小。

    -   `bitsPerComponent` 包含单个分量的位数。

    -   `bitsPerPixel` 包含每个像素的位数。

    -   其他属性。


    要在设备屏幕上绘制图片，您需要将其传递给视频芯片。它理解前面提到的其中一种格式的像素缓冲区，或经过特殊准备的纹理。对于 UIKit，您无需直接执行此操作。相反，您只需将其传递给
    `UIImageView`，它会完成其余工作。


    ### 文件格式


    图像在文件中的存储方式与在内存中不同。最接近像素缓冲区图像格式的是 BMP（Windows 设备无关位图），但由于其文件大小，它很少被使用。单独存储每个像素，为其分配
    3 或 4 个字节的内存，非常消耗资源。例如，iPhone 11 的分辨率为 828 × 1792 像素。即使没有 alpha 通道（并且 BMP 不支持
    alpha 通道），这样的图片也需要大约 4.24 MB。11 英寸 iPad Pro 的分辨率更高——2388 × 1668 像素。以 BMP 格式保存的简单截图将占用近
    11.4 MB 的设备内存。它适用于活跃使用的纹理，但将所有图形资源以此格式存储是不可能的。


    对于 iOS 应用资源和网络图像，最流行的格式是 PNG（便携式网络图形）、JPEG/JPG（联合图像专家组）和 GIF（图形交换格式）。这些格式可以解析为
    `UIImage` 或 `CGImage`。另一种兼容格式是 TIF/TIFF（标签图像文件格式）。


    PNG 文件质量好且支持透明。同时，它们比 BMP 或图像缓冲区小得多。PNG 是应用资产的推荐格式，至少对于部分透明的图片是如此。


    最小的文件是使用 JPG 编码的。根据压缩率，它们可以更小但质量更差，或者更大但质量更好。JPG 将图片分割成方块，并允许每个方块中只使用一定范围的颜色。更好的质量需要每个方块使用更多字节，但提供了更大的颜色范围。更好的压缩则相反。JPG
    质量范围从 0 到 1 或从 0 到 10。


    GIF 图片是索引的。GIF 不使用颜色分量，而是使用颜色索引。每张图片最多可以有 256 种不同的颜色，这些颜色存储在调色板中。GIF 中不允许使用调色板之外的颜色。GIF
    的另一个众所周知的特点是动画。GIF 在一个文件中可能包含多张图片。一系列图片构成一个动画。GIF 动画在即时通讯工具和一些应用中很受欢迎。我们将在本章末尾讨论它们。


    ### 从文件加载（读取）图像


    在讨论了图像在文件和内存中的存储方式之后，让我们看看如何加载图像并获取 `UIImage` 或 `CGImage` 对象。


    图像文件可以存储在内存中、磁盘上（对于 iPhone 来说是闪存）或网络上。根据文件位置，我们将使用 `UIImage` 和 `CGImage` 的不同初始化方法。


    第一种情况是图像文件存储在内存中，具体来说，是在一个 `Data` 对象中。


    函数 `loadImageFromData(_:, into:)` 解码作为第一个参数传递的数据文件，并设置第二个参数中 `UIImageView` 的 image
    属性。如果提供的文件包含有效的图像文件，该函数返回 `true`，否则返回 `false`（代码段 5-1）。


    ```

    public func loadImageFromData(_ data: Data, into imageView: UIImageView) -> Bool
    {

    if let image = UIImage(data: data) {

    imageView.image = image

    return true

    } else {

    return false

    }

    }

    代码段 5-1

    从内存加载图像

    ```


    如果应用使用可下载的资源，您将需要从文件（代码段 5-2）打开图像，可能来自归档文件，但我们将其留作范围之外。


    此函数可能有三种结果：


    -   文件未找到。

    -   文件不是图像。

    -   图像加载成功。


    ```

    public enum LoadImageError: Error {

    case fileNotFound

    case notAnImage

    }

    public func loadImageFromFileWithError(_ file: String, into imageView: UIImageView)
    throws {

    guard let data = try? Data(contentsOf: URL(fileURLWithPath: file)) else {

    throw LoadImageError.fileNotFound

    }

    if !loadImageFromData(data, into: imageView) {

    throw LoadImageError.notAnImage

    }

    }

    代码段 5-2

    从文件加载图像

    ```


    最后一种可能性是直接从网络加载图片。而这种方式比看起来要复杂一些，首先是因为缓存的原因。在没有至少短期缓存的情况下从网络加载图像，对用户体验来说是一场灾难。想象一下，当用户离开又再次进入屏幕时，看到所有图片都重新加载。如果在
    `UITableView` 或 `UICollectionView` 中使用这些图片呢？


    一个简单的解决方案是使用外部库。其中之一是 Kingfisher。它是一个非常受欢迎的开源库，并且是免费的。


    如果您不喜欢第三方库，您可以在您的应用内部制作一个简单的缓存系统。我们将在本章后面讨论它。


    ### 将图像保存（写入）到文件


    当用户拍照并且我们处理它时，我们需要将其保存为我们之前提到的一种流行格式。我们不能将其作为 `UIImage`、`CGImage` 或图像缓冲区发送到服务器。


    这个过程与读取非常相似，但我们也需要添加一些参数——例如，JPG 格式的压缩率（见代码段 5-3）。


    ```

    func saveImageAsPNG(image: UIImage) -> Data? {

    return image.pngData()

    }

    func saveImageAsJPEG(image: UIImage, compressionQuality: CGFloat) -> Data? {

    return image.jpegData(compressionQuality: compressionQuality)

    }

    代码段 5-3

    将图像保存到内存

    ```


    代码段 5-4 中的函数不应在项目中使用，因为它们会增加代码量。但它们说明了将 `UIImage` 转换为 `Data` 是多么容易。


    将图像保存到文件也很有用，可用于缓存目的或在处理前制作备份副本。一些库还需要文件的 URL 而不是 `Data` 对象。


    ```

    public enum SaveImageError: Error {

    case dataNotAvailable

    }

    func saveImageAsPNGFile(image: UIImage, fileName: String) throws {

    if let data = image.pngData() {

    try data.write(to: URL(fileURLWithPath: fileName))

    } else {

    throw SaveImageError.dataNotAvailable

    }

    }

    func saveImageAsJPEGFile(image: UIImage, compressionQuality: CGFloat, fileName:
    String) throws {

    if let data = image.jpegData(compressionQuality: compressionQuality) {

    try data.write(to: URL(fileURLWithPath: fileName))

    } else {

    throw SaveImageError.dataNotAvailable

    }

    }

    代码段 5-4

    将图像保存到文件

    ```


    这两个函数都可能抛出异常，因此需要将它们包装在 do-try-catch 块中。


