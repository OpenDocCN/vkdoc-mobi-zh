  trans: '

    ### 盐值


    正如我们之前讨论密码哈希时提到的，有必要介绍一下*盐值*。它不是常见的调味料，而是应用在哈希计算前添加到密码开头和/或结尾的一段代码字符串。盐值必须保持一致，并且在应用的新版本中不应更改。


    盐值有助于保护密码隐私。如果两个不同的服务都使用 `SHA-256` 存储密码，那么相同的密码会生成相同的 `SHA-256`，这会造成安全漏洞。服务器管理员将能够利用你的密码哈希值登录到其他服务。使用盐值非常简单。你可以在配方
    3-14 中看到如何使用。


    **注意**：不建议在两个不同的服务中使用相同的密码，但作为开发者，你应该始终假设用户会忽略这个建议。


    ```

    let password = "..."

    let leftSalt = "..." // 字符串常量，应在所有版本的应用中保持一致

    let rightSalt = "..." // 字符串常量，应在所有版本的应用中保持一致

    let saltedPassword = "\(leftSalt)\(password)\(rightSalt)"

    let passwordHash = saltedPassword.sha256

    ```


    这是一种安全地将密码发送到服务器的方式。在服务器端，服务器脚本可以添加另一个盐值并计算另一个密码哈希值。


    在开发安全系统时，要富有创意。添加意想不到的保护层。黑客对这里描述的一切都了如指掌。要做更多。结合不同的方法来迷惑他们，并保持领先一步。


    ## 整数索引


    Swift 不接受整数作为 `String` 的索引。例如，你不能简单地获取一个 `String` 的第 5 个 `Character`。苹果公司解释这是由于内部编码的原因。由于字符可能具有不同的长度，用
    `Int` 来索引它们（如在 C 语言中那样）可能会造成混淆，索引到的可能不是第 5 个字符，而是第 5 个字节或第 5 对字节。


    与 `Int` 不同，`String.Index` 提供了上下文。它属于特定的 `String`，知道它引用的是哪个 `Character`，并知道它有*多宽*。


    在实际生活中，我们经常需要获取单词中的第 n 个字母，或者获取具有已知索引的范围，就像我们在“十六进制编码”小节的配方 3-9 中将十六进制 `String`
    转换为 `Data` 时那样。


    我们将在本节中编写的 `String` 扩展将添加使用基于 `Int` 的下标或范围从 `String` 获取 `Character` 或 `Substring`
    的功能。


    在继续之前，有一个细节需要注意。Swift 允许两种不同的结构：`String` 和 `Substring`。`String` 实际存储文本数据，而 `Substring`
    仅仅是对现有 `String` 的引用。


    `Substring` 可以轻松转换为 `String`：


    ```

    let substring: Substring = ...

    let string: String = String(substring)

    ```


    同时，如果你频繁操作子字符串，你可能会希望在函数中使用 `StringProtocol` 而不是 `String`。这将允许你同时传入 `String` 和
    `Substring`。如果你不修改它，两者没有区别；你无需相互转换。但这样做也有代价——当你将 `Substring` 转换为 `String` 时，Swift
    会将所有数据复制到一个新的内存片段中。如果你只对短字符串执行一两次操作，这可能不重要，但如果你需要一个高效的应用，就需要牢记这一点。


    配方 3-15 展示了如何向项目中的 `Strings` 添加整数索引功能，但首先让我们确定我们的需求：


    ```

    public extension String {

    subscript (i: Int) -> Character {

    return self[index(startIndex, offsetBy: i)]

    }

    subscript (bounds: CountableRange<Int>) -> Substring {

    let start = index(startIndex, offsetBy: bounds.lowerBound)

    let end = index(startIndex, offsetBy: bounds.upperBound)

    if end < startIndex { return "" }

    return self[start..<end]

    }

    subscript (bounds: CountableClosedRange<Int>) -> Substring {

    let start = index(startIndex, offsetBy: bounds.lowerBound)

    let end = index(startIndex, offsetBy: bounds.upperBound)

    if end < startIndex { return "" }

    return self[start...end]

    }

    subscript (bounds: PartialRangeThrough<Int>) -> Substring {

    let end = index(startIndex, offsetBy: bounds.upperBound)

    if end < startIndex { return "" }

    return self[startIndex...end]

    }

    subscript (bounds: PartialRangeUpTo<Int>) -> Substring {

    let end = index(startIndex, offsetBy: bounds.upperBound)

    if end < startIndex { return "" }

    return self[startIndex..<end]

    }

    subscript (bounds: PartialRangeFrom<Int>) -> Substring {

    let start = index(startIndex, offsetBy: bounds.lowerBound)

    let end = index(endIndex, offsetBy: -1)

    if end < startIndex { return "" }

    return self[start...end]

    }

    }

    ```


    ```

    let str = "Some string"

    let substring = str[5...] // "string" 单词被封装在 Substring 对象中

    let firstChar = substring[0] // Character "S"

    ```


    ## 本地化


    iOS 有自己的本地化系统。它会根据用户的设置自动选择首选语言，并且如果你提供了本地化内容，它会对故事板和源代码中的字符串进行本地化。


    ### NSLocalizedString 宏


    要获取源代码中字符串的本地化版本，应该使用一个宏：


    ```

    NSLocalizedString(key, comment)

    ```


    它在 iOS 应用的任何部分都可用。`key` 参数是字符串的标识符。标识符应该是唯一的，并且可以包含 Swift `String` 对象中允许的任何符号。`comment`
    用于为翻译人员生成文件。如果你不打算使用 Xcode 或 `genstrings` 工具生成翻译文件，可以将其保留为空。


    ### 翻译文件


    你应该添加扩展名为 `strings` 的文件（例如 `Localised.strings`）来提供翻译。你可以手动将它们放入对应语言的目录中，或者通过 Xcode
    进行操作。


    strings 文件是一个包含键值对的简单文本文件。键值对之间用分号分隔。键和值之间用等号分隔。键和值都应放在引号内：


    ```

    "firstName": "First Name";

    ```


    为了避免混淆，我们使用更精确的标识符，例如：


    ```

    "auth.firstName.title": "First Name";

    "auth.firstName.placeholder": "Enter your first name here";

    ```


    ### LocalizedStringKey 结构体


    SwiftUI 中的本地化通常使用 `LocalizedStringKey` 完成。它是一个 `struct`，但也遵循 `ExpressibleByStringLiteral`
    协议，这意味着我们可以将 `String` 赋值给它。


    ```

    let name: LocalizedStringKey = "name"

    let text = Text(name)

    ```


    此代码中的 `Text` 将从翻译中获取值。


    `LocalizedStringKey` 也遵循 `ExpressibleByStringInterpolation` 协议。你可以将它与 `\()` 构造一起使用。


    ```

    let name = "Alex"

    Text("hello \(name)")

    ```


    翻译文件应包含：


    ```

    "hello %@" = "Hello %@!";

    ```


    `Text` 视图将以字符串 "Hello Alex!" 创建。


    ### 语法糖


    当你有大量需要本地化的内容时，每次都输入 `NSLocalizedString` 可能会很烦人。使用配方 3-16 中的扩展，看起来不是好很多吗？


    ```

    public extension StringProtocol {

    var localised: String {

    NSLocalizedString(self, "")

    }

    }

    ```


    现在你可以这样使用它：


    ```

    label.text = "auth.firstName.title".localised

    ```


    **注意**：来自故事板或 nib 文件的 UI 元素可以在不编写代码的情况下进行本地化。在 Xcode Interface Builder 中将故事板或
    nib 文件标记为可本地化。Xcode 将自动生成必要的文件，你只需要更改文本即可。


    ## 总结


    像 C 语言这样的旧编程语言没有专门的字符串类型，程序员使用字节数组来存储它们。这在代码中造成了大量潜在的错误，并使字符串分析几乎不可能。Swift 凭借其
    `String` 类型和扩展，提供了完全不同的方法。


    在本章中，我们看到了如何检查 `String` 是否包含字母或数字，是否包含有效的姓名、电子邮件或其他数据。我们使用 `String` 来存储哈希值、验证数据以及加密密码。最后，我们讨论了
    iOS 应用的本地化。


    到目前为止，我们一直在讨论数据处理，但没有讨论呈现。在下一章中，我们将解决这个问题，并讨论用户界面。

    '
- fmt: '# UIKit and Storyboards


    For many years, UIKit was the only way to implement user interfaces in iOS apps,
    and storyboards mechanism was the main tool to make layouts. Recently, SwiftUI
    was introduced, which is a logical part of the transition from Objective-C to
    native Swift-only code. But UIKit still plays an important role in iOS development.


    First of all, there’s a lot of legacy code. Many apps and frameworks started long
    before the moment SwiftUI was introduced. The most popular iOS libraries gained
    developers’ trust for years, and we’re not ready to stop using them and make a
    full transition to SwiftUI.


    Secondly, SwiftUI was introduced only in iOS 13.0, macOS 10.15, etc. If your app
    needs to support iOS 12, which makes sense, at least for now, you can’t use SwiftUI.


    Thirdly, UIKit elements can be integrated into SwiftUI code. If you found a cool
    good-looking UI library on GitHub, but it’s written on UIKit, and your app uses
    SwiftUI, that’s not a reason not to use it. We’ll look into it in details in the
    chapter about SwiftUI.


    And now let’s see how can we get the most out of UIKit and iOS storyboards.


    ## Navigation Between App Screens


    Each iOS application has more than one screen. Web developers often call them
    pages, so many iOS developers started to do the same. Still, there are differences
    between app screens and web pages. At the same time, modern devices started to
    offer split-screen view, which makes mobile apps use only part of the device screen
    and use devices with external screens. In iOS 13.0, Apple introduced the conception
    of Scenes. Each scene can have one or more windows and contain one or more view
    controllers. Confusing, right? Let’s dive into it.


    ### Screens, Windows, and Views


    If you have an iOS device, you have a screen. A screen is represented by a `UIScreen`
    object. The main screen is a singleton; you can access it from any part of your
    app. If you’re writing a one-screen app, you can assume that there’s nothing else.


    `UIScreen` has a `UIWindow` object. It’s a visible window. The term *window* comes
    from desktop development. We all know the Windows operating system, which uses
    *window* as a core concept. Unlike desktop operating systems, in iOS, a `UIWindow`
    doesn’t have border or decorations.


    `UIWindow` was created to show user interface, and user interface consists of
    *views*. One of them is a root view. This root view shows one *app screen* or
    *app page* as web developers would say. In UIKit, it’s controlled by `UIViewController`,
    `UINavigationController`, or other controller.


    These controllers have other controllers or views inside. This way, we get a tree-style
    hierarchy of views and controllers.


    ### Navigation in iOS Apps


    UIKit offers two main ways to navigate:


    *   Modal presentation of new elements

    *   Pushing elements with `UINavigationController`


    Note: Tab-based navigation is common in mobile apps. The tab model in iOS is a
    controller `UITabBarController`, with up to five child controllers. We’ll leave
    them beyond the scope.


    The element here is one of the controllers, usually the `UIViewController`.


    `UIViewController` contains a tree of `UIView` objects of its subclasses. One
    of them is a root `UIView`, while the other ones are inside it, directly or through
    other objects.


    When we talk about navigation in iOS apps, we usually mean switching from one
    `UIViewController` to another (Figure [4-1](#515103_1_En_4_Chapter.xhtml#Fig1)).
    When you have `UINavigationController`, you can push a new controller to a navigation
    stack:


    ```

    pushViewController(_:animated:)

    ```


    When you present it modally, you do it with the following method:


    ```

    present(_:animated:completion:)

    ```


    What’s the difference?


    Besides visual effects, there’s a significant difference in logic. When you use
    `UINavigationController`, you have a navigation stack, and you can pop back to
    any of the previously pushed elements. You can also add an element to a stack,
    change order, and do many other operations.


    When you present a modal element, you can only dismiss it. You don’t have access
    to the whole stack, and you can’t dismiss several elements at a time. But it’s
    useful regardless. Imagine that you’re writing an app for food ordering. The user
    browses the menu, adds things to the cart, and then opens the cart. This is the
    case when it makes sense to use a modal presentation. But instead of `UIViewController`,
    we present `UINavigationController`, which has `UIViewController` elements with
    purchase flow. When the user finishes their purchase, you go back to the menu
    by dismissing the model element.


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig1_HTML.jpg)


    A schema representing navigation in iOS applications has the first image of an
    iPhone with the label as a navigation controller, followed by a root view controller,
    which is divided into two images of modal window and root view controller.


    **Figure 4-1** Navigation in an iOS app. Navigation controller, root controller,
    and view controllers with modal and push presentation (left to right)


    Besides these two methods of showing another screen, you can use, for example,
    a replacement. If you have a loading screen, we don’t want to keep it in the navigation
    stack or in the memory “behind” the active UI. We simply want to replace it. We’ll
    see how to do that later.


    The last important concept is dialog or popover presentation. Logically, it’s
    the same as modal presentation, but instead of replacing the screen behind, it
    shows it on top of it. Take your iPhone or iPad, tap any of the apps on Home Screen
    and hold. You’ll see a menu. It’s an example of popover presentation.


    ### Scenes


    Since iOS 13, Apple introduces *Scenes*. And if in the beginning using scenes
    was optional, Xcode 12 doesn’t give a choice anymore. You still can delete all
    the code related to scenes and use it the old-fashioned way, but probably in the
    future, that won’t be an option anymore.


    Note: Despite the fact that scenes were introduced together with SwiftUI, they’re
    used in UIKit as well.


    Scenes offer `UIWindowScene` objects, which control the windows and view controllers
    in your app. Basically, it’s a way to make a multi-window app. Each scene must
    have a delegate – a `UIWindowSceneDelegate` object, but they don’t have to be
    different. You can use one delegate for multiple scenes. Scenes share app memory
    and other resources.


    We will leave multiwindow apps behind the scope, but using scenes changes the
    way we access `UIWindow` and handle app life cycle; that’s why it’s important
    to know how to use scenes.'
