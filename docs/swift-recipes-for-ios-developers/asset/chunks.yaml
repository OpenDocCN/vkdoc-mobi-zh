- fmt: '## Coding Keys


    JSON structures have key-value pairs, and it’s not guaranteed that said keys will
    match the variable names in class or struct. There’s a universal solution for
    both `Encodable` and `Decodable` – `CodingKeys` enumeration (Recipe [2-10](#515103_1_En_2_Chapter.xhtml#PC28)):


    ```

    enum CodingKeys: String, CodingKey {

    case name = "firstName"

    case surname = "lastName"

    case age

    }

    Recipe 2-10

    Using Coding Keys

    ```


    *Example*


    ```

    struct User: Codable {

    var name: String

    var surname: String

    var age: Int?

    enum CodingKeys: String, CodingKey {

    case name = "firstName"

    case surname = "lastName"

    case age

    }

    }

    let decDict: [String: Any] = [

    "firstName": "John",

    "lastName": "Doe",

    "age": 30

    ]

    let decUser = User(dict: decDict)

    ```


    If fields have different names depending on the API, they can’t be presented with
    serializable Swift types, and in other complex cases, using `Codable` may not
    be the best decision. Parsing data field by field from a `Dictionary` is more
    universal.


    ## Using `@propertyWrapper`


    What do we do if we need both the flexibility and the comfort of strict types?
    For example, when you need a flexible structure, but with constrained fields.
    The `Dictionary` class gives full flexibility, like JSON itself. Serialization
    requires strict structure declaration. There’s another solution – `@propertyWrapper`.


    It’s an attribute that we give to a struct to declare it as a wrapper around its
    own property. In our case, property is data from a server presented as a `Dictionary`.


    We’ll make a wrapper around a structure representing the characteristics of an
    item in an electronics store. Different items may have different characteristics,
    and each of them has some limited range of values. It can be restriction of `String`
    length, minimum length, or any other characteristic. This approach helps to validate
    data and avoid showing values entered by mistake. Not all of them, unfortunately,
    but the most unrealistic.


    This is not the only usage of `@propertyWrapper`, it can be used for all dynamic
    structures with some reasonable number of rules. At the same time, it’s rarely
    a first-choice tool. Whenever possible, use parsing to native Swift structures.


    We write two structures:


    - `Item` – A struct holding all the data

    - `ItemProjection` – A struct giving access to wrapped data with necessary constraints


    An `Item` should be attributed as `@propertyWrapper` and have two fields:


    - `wrappedValue` of type `Dictionary`

    - `projectedValue` of type `ItemProjection`


    To access fields, we address a `wrappedValue` by a variable name and a `projectedValue`
    by the same name but starting with a dollar sign. Recipe [2-11](#515103_1_En_2_Chapter.xhtml#PC30)
    shows the full example of using property wrappers.


    ```

    public struct ItemProjection {

    var wrapper: Item

    public var title: String? {

    if let title = wrapper.wrappedValue.getString("title") {

    if title.count > ItemProjection.titleLengthLimit {

    let endIndex = title.index(title.startIndex, offsetBy: 100)

    return String(title[..<endIndex]) + "..."

    } else {

    return title

    }

    } else {

    return nil

    }

    }

    public var length: Double? {

    if let length = wrapper.wrappedValue.getDouble("length"),

    length > 0 {

    return length

    } else {

    return nil

    }

    }

    public var lengthInches: Double? {

    length?.cmAsInch

    }

    public var volts: Int {

    wrapper.wrappedValue.getInt("volts") ?? 220

    }

    public var watts: Int? {

    if let watts = wrapper.wrappedValue.getInt("watts"),

    watts > 0,

    watts < 10000 {

    return watts

    } else {

    return nil

    }

    }

    static let titleLengthLimit = 100

    }

    @propertyWrapper

    public struct Item {

    public var wrappedValue: [String: Any]

    public var projectedValue: ItemProjection {

    ItemProjection(wrapper: self)

    }

    public init() {

    wrappedValue = [:]

    }

    public init(wrappedValue: [String: Any]) {

    self.wrappedValue = wrappedValue

    }

    }

