    第二个方法应进行输入验证。我们只允许输入数字，且每个字段只允许输入一个。


    为了将焦点从一个字段移动到另一个字段，我们将使用 `editingChanged` 动作。让我们使用一个名为 `textChanged` 的方法：


    ```

    @IBAction func textChanged(_ textField: UITextField)

    ```


    为了方便起见，我们可以将文本框打包成一个数组。


