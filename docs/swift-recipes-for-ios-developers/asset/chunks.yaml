- fmt: "### Conversion from Number to String and Back\n\nThe easiest way to convert\
    \ numbers of any type to a `String` is a *string interpolation*. In Swift, you\
    \ can include any variable inside a `String` by adding `\\(` before a variable\
    \ name and `)` after. It works even with expressions and functions. For example:\n\
    \n```\nlet age = 30\nlet str = \"Your age is \\(age). Next year you'll be \\(age+1)\"\
    \n```\n\nIt’s more complicated if you need to format it. If you need to get a\
    \ string with a price, you probably want to have two digits for the monetary part.\n\
    \nThere are two ways. You can use the `String(format:_:...)` constructor. The\
    \ first argument is a template; others are variables. If you are familiar with\
    \ the C-family programming languages, you know the `sprintf` function. It works\
