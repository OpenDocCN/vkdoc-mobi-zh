    \ be achieved.\n\n```\nextension String {\n    func group(by groupSize: Int =\
    \ 4, separator: String = \" \") -> String {\n        if count < groupSize {\n\
    \            return self\n        }\n        let startIndex = self.startIndex\n\
    \        let endIndex = self.index(startIndex, offsetBy: groupSize)\n        let\
