- fmt: '### Going Back


    Storyboards allow us to create controllers, view controllers, and segues to go
    from one app screen to another. They allow us to choose the presentation method
    and set up the transition animation, but they don’t allow us to do such a simple
    thing as going back.


    Depending on the way you switched to your current view controller, going back
    can be done with one of these two ways:


    ```

    dismiss(animated:, completion:)

    // and

    navigationController?.popViewController(animated:)

    ```


    In both cases, we need to create an `@IBAction` function and connect it to a button.
    And this function should be the same in all view controllers – or almost the same.
    What if we write a function (Recipe [4-1](#515103_1_En_4_Chapter.xhtml#PC4)) that
    will go back exactly to a previous element, no matter if it was presented modally
    or pushed with `UINavigationController`?


    ```

    public extension UIViewController {

    @IBAction func goBack() {

    if let nc = navigationController,

    nc.viewControllers.count >= 2 {

    nc.popViewController(animated: true)

    } else {

    dismiss(animated: true, completion: nil)

    }

    }

    }

    Recipe 4-1

    Going Back to a Previous Screen

    ```


    First of all, we check if this `UIViewController` is inside `UINavigationController`.
    If yes, it has a non-nil `navigationController` property. In this case, we need
    to check if it’s a root `UIViewController` in that `UINavigationController`. If
    it’s a root, we can’t pop; it will be simply ignored. We need to dismiss it. If
    `navigationController` is `nil`, it means that it was never inside the `UINavigationController`
    stack, and we can only dismiss it.


    Written as a `UIViewController` extension, this function will be available for
    all view controllers in the app. If you have a simple “About” screen, which doesn’t
    have any logic, you won’t even need to create a subclass of `UIViewController`
    for it.


    **Note**


    This recipe doesn’t work inside more complex controllers like `UITabController`.
    If you need to go to a previous tab when the user taps a back button, you’ll have
    to create your own stack.


    ### Replacing Root View


    Another typical situation that we discussed previously is replacing. If you don’t
    need a screen and all the previous screens before it, you can instantiate a new
    view controller and show it as root.


    In a standard iOS app, there’s `AppDelegate` class. Xcode creates it automatically
    when you start a new project. Depending on the configuration, `AppDelegate` may
    have a window property, or this property may be in the `SceneDelegate` class.


    When you have a reference to a `UIWindow` object, you can replace the root view
    controller like shown in Recipe [4-2](#515103_1_En_4_Chapter.xhtml#PC5):


    ```

    public extension UIWindow {

    func replaceRootViewController(with viewController: UIViewController) {

    rootViewController = viewController

    makeKeyAndVisible()

    }

    }

    Recipe 4-2

    Replacing a Root View Controller

    ```


    The challenge here is to get a window. In old-style projects, we have a window
    as a property of `UIApplication`. Luckily, `UIApplication` in a project with scenes
    has another property – `connectedScenes`. Some of these “connected scenes” are
    of `UIWindowScene` type. From `UIWindowScene`, we can extract a reference to a
    `UIWindow` object (Recipes [4-3](#515103_1_En_4_Chapter.xhtml#PC6) through [4-5](#515103_1_En_4_Chapter.xhtml#PC8)).


    ```

    @available(iOS 13.0, *)

    public extension UIApplication {

    var currentWindow: UIWindow? {

    connectedScenes

    .filter {$0.activationState == .foregroundActive}

    .compactMap { $0 as? UIWindowScene }

    .first?

    .windows

    .first(where: { $0.isKeyWindow })

    }

    }

    Recipe 4-3

    Getting Main UIWindow in Projects with scenes

    ```


    In a project without scenes, you can get it easier.


    ```

    public extension UIWindow {

    static var main: UIWindow? {

    (UIApplication.shared.delegate as? AppDelegate)?.window

    }

    }

    Recipe 4-4

    Getting Main UIWindow in Projects without scenes

    ```


    **Note**


    This recipe assumes that your app has the `AppDelegate` class, which implements
    the `UIApplicationDelegate` protocol and is a main delegate of your app.


    And finally, we can wrap up all these methods up into one static function in a
    `UIWindow` extension.


    ```

    public extension UIWindow {

    static func replaceMainRootViewController(with viewController: UIViewController)
    -> Bool {

    var window: UIWindow?

    if #available(iOS 13, *) {

    window = UIApplication.shared.currentWindow

    } else {

    window = UIWindow.main

    }

    window?.replaceRootViewController(with: viewController)

    return window != nil

    }

    }

    Recipe 4-5

    Replacing Root View Controller (Static)

    ```


    The function `replaceMainRootViewController` replaces the root view controller
    in the main window if it exists. If the window doesn’t exist or the function can’t
    find it, it returns false, otherwise – true.


    ### Modifying UINavigationController Stack


    Let’s say you have a long sequence of screens where the user chooses something.
    For example, the user is presented with a test. They can submit questions or skip
    them. If they submit a question, it disappears forever; otherwise, it stays in
    the stack so they can come back and answer it later.


    Let’s see a different example. The user is ordering furniture. They choose the
    configuration, color, and all the details. Finally, the user pays for it, and
    since this moment, we don’t want to let them go back to configuring their purchase.
    We want to show the order tracking. But we don’t want to clear the whole stack
    – when the user taps on the back button, they should go back to the section of
    the app they’d used before, but the ordering flow should disappear until they
    make a new order.


    One more situation – adding a new screen. For example, we may want to warn the
    user that if they go back, their order will be cancelled. We don’t want them to
    get stuck on a screen; otherwise, they’ll just “kill” the app. But we need to
    warn them that the ordering process is not finished and they should finish it
    before going back. It can be done with a popup, but designers may have another
    opinion.


    We’ll have a look at the following cases:


    - Removing unnecessary `UIViewController`s from the stack

    - Returning the user to a specific `UIViewController` in the stack

    - Adding `UIViewController` to the stack


    As we discussed before, when `UIViewController` is a part of the navigation stack,
    it has the non-nil property `navigationController`. This `navigationController`
    has a very important property – `viewController`. This property contains the navigation
    stack – a list of `UIViewController` objects starting with a root element.


    **Note**


    When you access `navigationController?.viewControllers` from `UIViewController`,
    it always contains `self`.


    #### Removing Elements from the Navigation Stack


    Let’s suppose that the user finished a flow which we don’t want them to go back
    to, but we still allow returning to the view controllers preceding that flow.
    As unnecessary elements of the stack are always part of our app and always known,
    we know the class names of those elements. Recipe [4-6](#515103_1_En_4_Chapter.xhtml#PC9)
    shows how to remove unnecessary elements from navigation stack using `filter`
    method.


    ```

    public extension UINavigationController {

    func removeElements<T>(of type: T.Type) {

    viewControllers = viewControllers.filter {

    !($0 is T)

    }

    }

    }

    Recipe 4-6

    Removing Elements of a Known Type from the Navigation Stack

    ```


    *Usage*


    ```

    navigationController?.removeElements(of: UnnecessaryViewController.self)

    ```


    I advise you not to remove the current front view controller this way. If you
    need to remove it, use `navigationController?.popViewController(animated:)` or
    the `goBack` function from the beginning of this chapter instead. Also, it’s better
    to modify a stack when the front view controller is fully presented on the screen.
    It should be either in the `viewDidAppear(animated:)` function or later.'
