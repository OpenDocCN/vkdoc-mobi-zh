    ### Extracting Data from Array


    Extracting data from typed `Array` is straightforward:


    ```

    let arr: [String] = ["one", "two", "three"]

    let firstElement = arr[0]

    ```


    It would be better to confirm that there’s element `0` though. A more complex
    task is to get typed data from `[Any]`, and we get this type of `Array` from the
    parsers.


    The logic is the same as for `Dictionary`, but we need to check if the element
    with a given index exists as well. If it doesn’t, we return `nil`. The same as
    if we have a data type conflict. Recipe [1-9](#515103_1_En_1_Chapter.xhtml#PC29)
    shows the full Array extension.'
