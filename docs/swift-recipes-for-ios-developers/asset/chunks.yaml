- fmt: '### SwiftyGif


    SwiftyGif is a framework created specifically for playing GIF animations. Its
    biggest advantage is that it works inside a standard `UIImageView`. It supports
    both local and remote GIF files.


    To add SwiftyGif to your project using Swift Package Manager, add the following
    link: [`https://github.com/kirualex/SwiftyGif`](https://github.com/kirualex/SwiftyGif).


    To add it with CocoaPods, modify your Podfile:


    ```

    pod ''SwiftyGif''

    ```


    Recipes [5-28](#515103_1_En_5_Chapter.xhtml#PC45) and [5-29](#515103_1_En_5_Chapter.xhtml#PC46)
    show how we can repeat the previous recipe, but using SwiftyGif instead of Kingfisher.


    ```

    import SwiftyGif

    func createAndPlaySwiftyGif(parentView: UIView, gifURL: URL, delegate: SwiftyGifDelegate?)
    {

    let imageview = UIImageView(gifURL: gifURL, manager: .defaultManager, loopCount:
    -1)

    imageview.frame = parentView.bounds

    imageview.delegate = delegate

    parentView.addSubview(imageview)

    }

    Recipe 5-28

    Loading Remote GIF with SwiftyGif

    ```


    Another advantage of SwiftyGif is the ability to load animations from an app bundle.


    ```

    import SwiftyGif

    func loadLocalGif(name: String, into imageView: UIImageView) {

    if let gifImage = try? UIImage(gifName: name) {

    imageView.setGifImage(gifImage)

    }

    }

    Recipe 5-29

    Loading GIFs from an App Bundle

    ```


    When loaded, the animation can be controlled by `UIImageView` methods:


    ```

    imageView.startAnimatingGif()

    imageView.stopAnimatingGif()

    imageView.showFrameAtIndexDelta(delta: Int)

    imageView.showFrameAtIndex(index: Int)

    ```


    ## Summary


    Images present in all iOS apps, one way or another. Sometimes it’s as simple as
    showing bundled images, sometimes they require loading and processing. In this
    chapter we talked about different representations of images, in UIKit, in memory
    and in file system. We discussed loading images from web, with using external
    libraries and without, paying attention at caching as a part of this mechanism.
    We upscaled and downscaled images to get desired size, changed geometry and processed
    existing images. We reviewed simple effects like Gaussian blur. Finally, we looked
    at more complex case of showing images – showing animations. In the next chapter
    we’ll continue talking about UIKit, particularly, text editing.


    # 6. Text Editing


    Another important aspect of iOS development is text editing. On mobile platforms,
    adding text inputs is particularly difficult because of several complications:


    * The on-screen keyboard appears when you enter `UITextField`. It can hide other
    UI elements or even the text field itself.

    * The on-screen keyboard doesn’t disappear itself. In some cases, it can follow
    you to another screen.

    * The on-screen keyboard has different heights on different devices. Even if you
    know the sizes for all existing models, new iPhones or iPads will eventually appear,
    and the keyboard height on them may be different.

    * A physical keyboard can be connected to an iOS device. Besides special keyboards
    for iPads, any Bluetooth keyboard can be connected to said devices. When a physical
    keyboard is connected, the on-screen keyboard doesn’t appear.

    * Even setting the keyboard type doesn’t guarantee that the user won’t type a
    *forbidden* symbol.


    Besides these mobile-specific problems, we have common problems of all apps allowing
    user input:


    * We may need to format the text in a specific way, for example, phone number
    or credit card number.

    * We often need floating text, which follows your input. Or prefix. It’s especially
    popular when you need input for money. It may require both formatting and floating
    text with currency.


    We will discuss all these problems and their solutions in this chapter. And as
    a bonus, we’ll create a pin pad, a UI component containing four text inputs for
    four digits.


    *Ready? Open Xcode. Go!*


    ## Analyzing User Input in Real Time


    Many beginner developers don’t understand how to process text input in real time.
    There’s a `UITextFieldDelegate` delegate protocol containing many useful functions,
    but nothing like `whatUserJustTyped` or `afterThisInputTextWillBeLikeThis`.


    Why would we need it? After all, we can always catch the moment when the user
    ends editing or accesses the text property of `UITextField` as they tap some button.
    Even though that’s true, modern applications are not like web forms from the 1990s
    – they’re interactive, and they follow your actions and adjust the UI accordingly.
    Here are several examples:


    * If you can log in with a phone number or an email address, the text input can
    change its formatting when it understands what you’re entering exactly. The app
    can also change some texts and icons around.

    * When the user enters a bank card number, it’s a good practice to show the logo
    of the card system (Visa, MasterCard, or other) after entering the first couple
    of digits. Some apps even show the logo of the issuing bank. When you use an app
    like that, you feel much more confident, and you feel that you’re on the right
    path.

    * When the user fills in a form and makes a mistake, apps often highlight the
    problematic fields. The app should remove warnings or errors when the user starts
    typing.

    * When the user enters a correct phone number, bank account number, taxpayer number,
    or any other data of the sort that can be verified, some apps show a success icon
    and/or move focus to the next field.

    * Pin pad. We’ll discuss it later, but a pin pad requires real-time input processing.


    The key function for us is this:


    ```

    optional func textField(_ textField: UITextField,

    shouldChangeCharactersIn range: NSRange,

    replacementString string: String) -> Bool

    ```


    It looks complicated, but this callback is extremely powerful. It provides us
    with all the necessary information:


    * `textField` is a `UITextField` object (or a subclass of `UITextField`) where
    editing occurred.

    * `range` shows a range of symbols *removed* from text input. If it has zero length,
    it’s just a position of insertion.

    * `string` contains new characters. It can be one character if the user tapped
    a key on the on-screen keyboard, or a whole text string if the user pasted it
    from the clipboard.


    *Method* returns a Boolean value. If you return `true`, “replacement” (or insertion)
    will occur; otherwise, the input will be blocked.


    Two components are missing:


    * Text before change

    * Text after change


    *Text before change* is simply `textField.text`. *Text after change* requires
    some kind of *calculation* (*Recipe* [*6-1*](#515103_1_En_6_Chapter.xhtml#PC2)
    *)*.


    ```

    extension ViewController: UITextFieldDelegate {

    func textField(_ textField: UITextField, shouldChangeCharactersIn range: NSRange,
    replacementString string: String) -> Bool {

    if let text = textField.text,

    let textRange = Range(range, in: text) {

    let updatedText = text.replacingCharacters(in: textRange, with: string)

    // UpdatedText contains text after input is processed

    }

    return true

    }

    }

    Recipe 6-1

    Getting Text After Change

    ```


    Please note that you must be very careful with the return value of this method.
    For example, if you return `true` only if validation passes, the user won’t be
    able to enter even the first symbol.


    Usually, the code inside this delegate function should handle three situations:


    * The entered text is not valid and shouldn’t be entered at all.

    * The entered text is valid, but the result is not valid.

    * Everything is valid; we can show the user that they did well.


    `False` should be returned in the first situation only, for example, when the
    user enters a phone number, and the string argument has a letter or emoji.


    The second important note – *always* allow backspace or any other deletion method.
    If by mistake an *illegal* character appears in your text field, the user should
    be able to remove it. So if the string argument is empty, it should never return
    `false`.'
  raw: '### SwiftyGif


    SwiftyGif is a framework created specifically for playing GIF animations. Its
    biggest advantage is that it works inside a standard `UIImageView`. It supports
    both local and remote GIF files.


    To add SwiftyGif to your project using Swift Package Manager, add the following
    link: [`https://github.com/kirualex/SwiftyGif`](https://github.com/kirualex/SwiftyGif)
    .


    To add it with CocoaPods, modify your Podfile:


    ```

    pod ''SwiftyGif''

    ```


    Recipes [5-28](#515103_1_En_5_Chapter.xhtml#PC45) and [5-29](#515103_1_En_5_Chapter.xhtml#PC46)
    show how we can repeat the previous recipe, but using SwiftyGif instead of Kingfisher.


    ```

    import SwiftyGif

    func createAndPlaySwiftyGif(parentView: UIView, gifURL: URL, delegate: SwiftyGifDelegate?)
    {

    let imageview = UIImageView(gifURL: gifURL, manager: .defaultManager, loopCount:
    -1)

    imageview.frame = parentView.bounds

    imageview.delegate = delegate

    parentView.addSubview(imageview)

    }

    Recipe 5-28

    Loading Remote GIF with SwiftyGif

    ```


    Another advantage of SwiftyGif is the ability to load animations from an app bundle.


    ```

    import SwiftyGif

    func loadLocalGif(name: String, into imageView: UIImageView) {

    if let gifImage = try? UIImage(gifName: name) {

    imageView.setGifImage(gifImage)

    }

    }

    Recipe 5-29

    Loading GIFs from an App Bundle

    ```


    When loaded, the animation can be controlled by `UIImageView` methods:


    ```

    imageView.startAnimatingGif()

    imageView.stopAnimatingGif()

    imageView.showFrameAtIndexDelta(delta: Int)

    imageView.showFrameAtIndex(index: Int)

    ```


