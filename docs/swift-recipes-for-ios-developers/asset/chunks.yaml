    \n这两种方法可以合并为一个。内存缓存可以容纳少量数据，例如 10–15 Mb。文件系统缓存则可以容纳数倍于此的数据。当内存缓存达到极限时，它会将部分文件保存到磁盘，并在需要时重新读取。\n\
    \n这有什么实际用途？假设你在开发一个展示餐厅菜单的应用。菜单中包含`UITableView`或`UICollectionView`，并带有小图片。用户上下滑动屏幕，试图决定今天想吃什么。这种情况下非常适合使用内存缓存。反复从磁盘读取文件会消耗更长时间，即使磁盘是高速闪存。当用户进入购物车页面时，菜单图片不再需要，我们可以将其从内存中移除。另一方面，用户可能会返回菜单页面，或在点单后继续浏览菜单。我们只需从磁盘重新加载所有图片即可。\n\
    \n本书不深入讨论两级缓存，但你可以尝试自行实现作为练习。这将是一次宝贵的经验。\n\n最后，让我们回顾一个使用示例。我们将三个 UIKit 视图添加到屏幕上：\n\
    \n```swift\n// 显示当前缓存大小的 UILabel\n@IBOutlet weak var lblCacheSize: UILabel!\n\
    // 用于输入 URL 的 UITextField\n@IBOutlet weak var tfURL: UITextField!\n// 用于显示已加载（或缓存）图片的\
    \ UIImageView\n@IBOutlet weak var ivImage: UIImageView!\n```\n\n此外，我们添加两个按钮。一个通过内存缓存加载图片，另一个通过文件系统缓存加载图片。它们将触发以下操作：\n\
    \n```swift\n@IBAction func loadUsingMemory()\n@IBAction func loadUsingFiles()\n\
    ```\n\nStoryboard 的设计可能如图 5-2 所示。\n\n![一张显示图片缓存的手机屏幕示意图。图中列出了文件位置、通过内存缓存或文件缓存加载的选项以及缓存大小。](img/515103_1_En_5_Fig2_HTML.jpg)\n\
    \n**图 5-2** 图片缓存视图的 Storyboard\n\n为了更好地理解，现在我们来查看一个图片缓存的使用示例。\n\n示例很直观，只需明确以下几点：\n\
    \n1. 部分函数接受 `URL`，而其他函数要求 `String`。对于文件，URL 以 `file://` 开头，因此要转换为文件路径，需使用 `.path`\
    \ 而非 `.absoluteString`。\n\n2. 要从文本字段 `tfURLString` 输入的字符串创建 URL 对象，需要对字符进行转义；否则\
    \ URL 可能为 nil。为此，我们使用 `.addingPercentEncoding(withAllowedCharacters: CharacterSet.urlQueryAllowed)`\
    \ 方法。\n\n3. 空格也可能导致 URL 无效，因此需对输入的 `String` 进行修剪：`.trimmingCharacters(in: .whitespacesAndNewlines)`。\n\
    \n## 调整大小与裁剪\n\n通过访问 `CGImage` 中的图像缓冲区，我们可以对其进行修改——既可以在现有图像对象内部操作，也可以创建新的图像缓冲区并将其转换为新的\
    \ `CGImage` 或 `UIImage`。\n\n我们可以对图像进行哪些操作？\n\n* 缩放图像。可等比或非等比缩放，可放大或缩小。\n\n* 裁剪图像。我们可以将图像裁剪成所需比例的方形或矩形。裁剪后的图像始终比原始图像小。"
- fmt: "# Image Scaling\n\nThere are two types of scaling: upscaling and downscaling.\
    \ In the first case, the new image is bigger than the original one; in the second\
    \ case – smaller. If scaling is not proportional, it can be both upscaling and\
    \ downscaling. But we usually need to preserve the aspect ratio, so we won't investigate\
    \ this case here.\n\nFortunately, the `CoreImage` framework does everything for\
    \ us; we only need to calculate the new size. What can it be?\n\nWe may need to\
    \ set the maximum size of an image, for example, if the user chooses a profile\
    \ picture. Modern `iPhone` cameras have very high resolution. Image sizes around\
    \ 5000 × 5000 pixels are normal. But it's not necessary for profile pictures,\
    \ so the app needs to downscale it.\n\nIf the user chooses a picture from the\
    \ gallery, it can be too small. In this case, we need to upscale it. Alternatively,\
    \ the app can show an alert asking to choose a better-quality picture. Recipe\
    \ [5-14](#515103_1_En_5_Chapter.xhtml#PC20) shows a possible resizing solution,\
    \ while Recipe [5-15](#515103_1_En_5_Chapter.xhtml#PC21) only downscales the image.\n\
    \n```\nextension UIImage {\n    func downscaled(maxSize: CGFloat) -> UIImage?\
    \ {\n        let maxDimension = size.width > size.height ? size.width : size.height\n\
    \        if maxDimension > maxSize {\n            return resized(maxSize: maxSize)\n\
    \        } else {\n            return self\n        }\n    }\n}\nRecipe 5-15\n\
    Downscaling an Image\n```\n\n```\nextension UIImage {\n    func resized(maxSize:\
    \ CGFloat) -> UIImage? {\n        let scale: CGFloat\n        if size.width >\
    \ size.height {\n            scale = maxSize / size.width\n        } else {\n\
    \            scale = maxSize / size.height\n        }\n        let newWidth =\
    \ size.width * scale\n        let newHeight = size.height * scale\n        UIGraphicsBeginImageContext(CGSize(width:\
    \ newWidth, height: newHeight))\n        draw(in: CGRect(x: 0, y: 0, width: newWidth,\
    \ height: newHeight))\n        let newImage = UIGraphicsGetImageFromCurrentImageContext()\n\
    \        UIGraphicsEndImageContext()\n        return newImage\n    }\n}\nRecipe\
    \ 5-14\nScaling an Image to the Required Size\n```\n\nNow it's time to discuss\
    \ *Image Context*. Changing pixels in `UIImage` or `CGImage` is not efficient.\
    \ If we calculate pixels manually, we lose all graphic acceleration. The right\
    \ way to do it is to create an Image Context.\n\nYou can work with one Image Context\
    \ at a time. All work takes place between:\n\n```\nUIGraphicsBeginImageContext\n\
    // ... and ...\nUIGraphicsEndImageContext\n```\n\nYou can use the `UIImage` instances\
    \ to draw in the current context, or you can draw lines or other shapes using\
    \ `UIBezierPath` and other classes using Image Context.\n\nIn the end, you need\
    \ to turn the context into a new `UIImage` object using the `UIGraphicsGetImageFromCurrentImageContext`\
    \ function.\n\n# Image Cropping\n\nThis is required when we need a specific aspect\
    \ ratio. Many apps require square pictures. For example, all posts on `Instagram`\
    \ are square. Profile pictures are usually square as well. Sometimes rounded,\
    \ sometimes circular. From an image processing point of view, squares, rounded\
    \ squares, and circles are the same, because rounding is performed by `UIKit`,\
    \ and the difference is only in the corner radius.\n\nAnother option is a rectangle.\
    \ Computer displays often have a 16:9 ratio. Full HD is 1920 × 1080. If you divide\
    \ 1920 by 16 or 1080 by 9, you get 120. `UHD` or `4K` has twice more pixels in\
    \ each dimension – 3840 × 2160. If you divide width by 16 or height by 9, the\
    \ result is 240 in both cases.\n\n`iPad` screens have an aspect ratio of 4:3.\
    \ For example, a typical `iPad Pro` screen with retina has a resolution of 2048\
    \ × 1536 pixels. 512 × 4 = 2048, 512 × 3 = 1536. `iPad Pro`'s aspect ratio is\
    \ not a perfect 4:3, but it's rather close. For example, an 11-inch `iPad Pro`\
    \ has a resolution of 2388 × 1668 pixels. It's 1.43:1, or 4.29:3.\n\nWhen writing\
    \ an app, it's more important to keep the necessary aspect ratio rather than the\
    \ resolution. There are several ways to change the aspect ratio:\n\n*   Scaling\
    \ an image without preserving the aspect ratio. It's the easiest way, but the\
    \ result will be stretched.\n*   Cropping an image. If the original image is too\
    \ wide, we can remove some pixels from its sides.\n*   Adding padding. When you\
    \ watch movies at home, you can see that most of them have a black space on the\
    \ top and bottom of the screen. That's because at the cinema the aspect ratio\
    \ is different (the screen is wider), and movies are usually optimized for cinema.\n\
    \nLet's write two extensions of `UIImage`. The one from Recipe [5-16](#515103_1_En_5_Chapter.xhtml#PC23)\
    \ will crop it to a square using the smallest dimension. Another, from Recipe\
    \ [5-17](#515103_1_En_5_Chapter.xhtml#PC24), will crop it to the required aspect\
    \ ratio.\n\n```\nextension UIImage {\n    func changeAspectRatio(aspectRatio:\
    \ CGFloat) -> UIImage? {\n        guard let originalCGImage = self.cgImage else\
    \ {\n            return nil\n        }\n        // Create a copy of the image\
    \ without the imageOrientation property so it is in its native orientation\n \
    \       let contextImage: UIImage = UIImage(cgImage: originalCGImage)\n      \
    \  // Get the size of the contextImage\n        let contextSize: CGSize = contextImage.size\n\
    \        let posX: CGFloat\n        let posY: CGFloat\n        let width: CGFloat\n\
    \        let height: CGFloat\n        if aspectRatio == contextSize.width / contextSize.height\
    \ {\n            // New aspect ratio is the same as old\n            posX = 0\n\
    \            posY = 0\n            width = contextSize.width\n            height\
