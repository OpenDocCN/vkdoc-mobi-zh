    \ offset = textField.frame.origin.y - AutoscrollViewController.gap\n        DispatchQueue.main.async\
    \ {\n            self.scrollView.setContentOffset(CGPoint(x: 0, y: offset), animated:\
    \ true)\n        }\n    }\n    func textFieldShouldReturn(_ textField: UITextField)\
    \ -> Bool {\n        switch textField {\n        case textField1: textField2.becomeFirstResponder()\n\
    \        case textField2: textField3.becomeFirstResponder()\n        case textField3:\
    \ textField4.becomeFirstResponder()\n        case textField4: textField5.becomeFirstResponder()\n\
