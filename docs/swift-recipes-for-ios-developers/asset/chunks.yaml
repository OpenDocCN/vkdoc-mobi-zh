    \n图 4-11\n\n运行中的 iOS 应用中的自定义 UIView\n\n## 总结\n\nUIKit 是在 iOS 应用中开发 UI 的强大工具包。它出现在早期版本的\
    \ iOS 中，并一直活跃使用至今。尽管如此，UIKit 经常需要大量代码才能完成简单的事情。在本章中，我们简化了 iOS 应用导航，编写了仅用一行代码显示警报的函数，并回顾了不同的地图选项和\
    \ GPS 导航。在 iOS 应用中设计 UI 的主要方式是故事板。即使作为 UIKit 的一部分，许多功能也无法在其中使用。幸运的是，这很容易修复。最后几个配方展示了如何向故事板添加模糊、圆角和其他效果。在下一章中，我们将讨论\
    \ UI 开发的另一个重要部分——图像。\n\n# 5. 图像处理\n\n在设备屏幕上显示图像、使其半透明、移动、旋转和缩放——这些都是 UIKit 的标准功能。它们可以通过在\
    \ `UIImageView` 中显示 `UIImage` 来完成。但这并不是你在 iOS 上能获得的一切。Apple 提供了强大的框架来绘制和处理图像。除了标准框架之外，还有开源图像处理库。\n\
    \n我们可以对图像做什么？首先，我们将学习从文件加载图像并保存它们。文件可以存储在设备文件系统中，存储在内存中，甚至存储在网络上。然后我们将讨论图像下载和缓存，并了解像\
    \ Kingfisher 这样的库如何工作。\n\n其次，我们将进行非常简单的图像处理，而不使用外部库。这些包括调整大小和裁剪。这对于个人资料图片可能很有用。大多数应用要求它们具有正方形形状，可能圆角成圆形。我们已经知道如何显示带有圆角的图像，但在上传前将其裁剪为正方形则完全是另一个话题。\n\
    \n然后我们将讨论图像蒙版。你可以通过仅修改 `UIImageView` 的层来显示带有圆角的图像，但在某些情况下，我们需要更复杂的形状。你可能希望允许用户将物品（如眼镜或胡须）放在图片之上。\n\
    \n最后一个主题是效果和滤镜。更改亮度和对比度、伽马值和饱和度——所有这些都可以使用外部库完成。更重要的是，流行的类似 Instagram 的滤镜可以直接在你的应用中应用。这包括棕褐色、模糊、高通/低通、像素化、素描、晕影、漩涡以及数十种其他滤镜。\n\
    \n### 读取和写入图像\n\n在 iOS 中处理图像时有不同的框架。第一个是 UIKit。它有 `UIImage` 类。这是一个高级类，提供有限的功能；同时，它针对与\
    \ `UIImageView` 和其他 UIKit 组件的使用进行了优化。\n\n来自 CoreImage 框架的 `CIImage` 是 `UIImage`\
    \ 中的底层数据。它不为开发者提供任何功能，也不应该被直接访问。\n\n底层类是 `CGImage`，它是 Core Graphics 框架的一部分。这个类提供了对图像缓冲区及其特性的完全访问。如果你需要更改图像中的几个像素或应用某个滤镜，`CGImage`\
    \ 正是你所需要的。\n\n`UIImage`、`CGImage` 和 `CIImage` 可以相互转换。\n"
- fmt: '### Image Buffer


    No matter which class you use, it has a pointer to image buffer – publicly or
    privately inside its implementation. Image buffer is an array of pixels. Each
    pixel is encoded by one or several bytes. The most common ways of storing image
    data are RGB and RGBA. The RBG format uses 3 bytes for each pixel, each byte represents
    one of these components: red, green, and blue. RGBA uses 4 bytes for each pixel.
    Besides red, green, and blue, there’s also the alpha component indicating how
    transparent each pixel is (Figure [5-1](#515103_1_En_5_Chapter.xhtml#Fig1)).


    ![](images/515103_1_En_5_Chapter/515103_1_En_5_Fig1_HTML.jpg)


    The grid illustrates the R G B A byte palette for pixels. The alpha component
    indicates the transparency of each pixel.


    Figure 5-1


    Structure of a picture with RGBA palette


    If an image is grayscale, each pixel is usually encoded with 1 byte. If a byte
    contains 0, it’s black; if 255 – white. All values in the middle are different
    shades of gray.


    The class which exposes the most information about image buffer is `CGImage`.
    It has the following properties:


    - `width` and `height` contain image size.

    - `bitsPerComponent` contains the number of bits for a single component.

    - `bitsPerPixel` contains the number of bits per one pixel.

    - Other properties.


    To draw a picture on a device screen, you need to pass it to a video chip. It
    understands either pixel buffers in one of the formats mentioned before or in
    specially prepared textures. In the case of UIKit, you don’t need to do it directly.
    Instead, you just pass it to `UIImageView`, and it does the rest.


    ### File Formats


    Images are stored in files differently than in memory. The most like the pixel
    buffer image format is BMP (Windows Device Independent Bitmap), but it’s rarely
    used because of its file size. Storing each pixel individually, giving it 3 or
    4 bytes of memory, is very consuming. For example, iPhone 11 has a resolution
    of 828 × 1792 pixels. Even without alpha channel (and BMP doesn’t support alpha
    channel), such a picture needs about 4.24 Mb. An 11-inch iPad Pro’s resolution
    is even higher – 2388 × 1668 pixels. A simple screenshot saved in BMP will take
    almost 11.4 Mb of device memory. It’s suitable for actively used textures, but
    storing all graphical assets in this format is impossible.


    The most popular formats for both iOS app resources and web images are PNG (Portable
    Network Graphics), JPEG/JPG (Joint Photographic Experts Group), and GIF (Graphics
    Interchange Format). These formats can be parsed into `UIImage` or `CGImage`.
    Another compatible format is TIF/TIFF (Tagged Image File Format).


    PNG files have good quality and support transparency. At the same time, they’re
    much smaller than BMP or image buffers. PNG is a recommended format for app assets,
    at least for partially transparent pictures.


    The smallest files are encoded with JPG. Depending on the compression rate, they
    can be smaller with worse quality or larger with better quality. JPG splits the
    picture into squares and allows only a certain range of colors in each of them.
    Better quality requires more bytes per each square but gives bigger range. Better
    compression does the opposite. JPG quality has range from 0 to 1 or from 0 to
    10.


    GIF pictures are indexed. Instead of color components, GIF uses a color index.
    Each picture can have up to 256 different colors, which are stored in a palette.
    Colors outside the palette are not allowed in GIF. Another well-known feature
    of GIF is animations. GIF may have multiple pictures in one file. A sequence of
    pictures makes an animation. GIF animations are popular in messengers and in some
    apps. We’ll discuss them in the end of this chapter.


    ### Loading (Reading) Images from Files


    After having discussed the ways images are stored both in files and in memory,
    let’s see how to load an image and get an `UIImage` or `CGImage` object.


    Image files can be stored in memory, on a disk (flash memory in case of iPhones),
    or on the Web. Depending on the file location, we’ll use different initializers
    of `UIImage` and `CGImage`.


    The first case is when an image file is stored in memory, specifically, in a `Data`
    object.


    Function `loadImageFromData(_:, into:)` decodes a data file passed as a first
    argument and sets image property of `UIImageView` from the second argument. If
    the provided file contains a valid image file, the function returns `true`, otherwise
    `false` (Recipe [5-1](#515103_1_En_5_Chapter.xhtml#PC1)).


    ```

    public func loadImageFromData(_ data: Data, into imageView: UIImageView) -> Bool
    {

    if let image = UIImage(data: data) {

    imageView.image = image

    return true

    } else {

    return false

    }

    }

    Recipe 5-1

    Loading Images from Memory

    ```


    If an app uses downloadable resources, you’ll need to open an image from a file
    (Recipe [5-2](#515103_1_En_5_Chapter.xhtml#PC2)), possibly from an archive, but
    we’ll leave it behind the scope.


    There are three possible results of this function:


    - File not found.

    - File is not an image.

    - Image was successfully loaded.


    ```

    public enum LoadImageError: Error {

    case fileNotFound

    case notAnImage

    }

    public func loadImageFromFileWithError(_ file: String, into imageView: UIImageView)
    throws {

    guard let data = try? Data(contentsOf: URL(fileURLWithPath: file)) else {

    throw LoadImageError.fileNotFound

    }

    if !loadImageFromData(data, into: imageView) {

    throw LoadImageError.notAnImage

    }

    }

    Recipe 5-2

    Loading Image from Files

    ```


    The last possibility is loading a picture directly from the Web. And this way
    is a little more complicated than it seems to be, first of all, because of caching.
    Loading images from the Web without at least short-term caching is a user experience
    disaster. Imagine a user seeing how all the pictures get reloaded when they leave
    and enter the screen again. And what if the pictures are used in `UITableView`
    or `UICollectionView`?


    A simple solution is using an external library. One of them is Kingfisher. It’s
    an extremely popular open source library and free of charge.


    If you don’t like third-party libraries, you can make a simple caching system
    right inside your app. We’ll discuss it later in this chapter.


    ### Saving (Writing) Images to Files


    When the user takes a photo and we process it, we need to save it into one of
    the popular formats we have mentioned earlier. We can’t send it to the server
    instead of to `UIImage`, `CGImage`, or image buffer.


    The process is very similar to reading, but we also need to add some arguments
    – for example, compression rate for JPG format (see Recipe [5-3](#515103_1_En_5_Chapter.xhtml#PC3)).


    ```

    func saveImageAsPNG(image: UIImage) -> Data? {

    return image.pngData()

    }

    func saveImageAsJPEG(image: UIImage, compressionQuality: CGFloat) -> Data? {

    return image.jpegData(compressionQuality: compressionQuality)

    }

    Recipe 5-3

    Saving Images to Memory

    ```


    Functions from Recipe [5-4](#515103_1_En_5_Chapter.xhtml#PC4) are not supposed
    to be used in the project as they increase the amount of code. But they illustrate
    how converting `UIImage` to `Data` is easy.


    Saving images to files can be useful as well, for caching purposes or to make
    a backup copy before processing. Some libraries also require a URL of the file
    instead of a `Data` object.


    ```

    public enum SaveImageError: Error {

    case dataNotAvailable

    }

    func saveImageAsPNGFile(image: UIImage, fileName: String) throws {

    if let data = image.pngData() {

    try data.write(to: URL(fileURLWithPath: fileName))

    } else {

    throw SaveImageError.dataNotAvailable

    }

    }

    func saveImageAsJPEGFile(image: UIImage, compressionQuality: CGFloat, fileName:
    String) throws {

    if let data = image.jpegData(compressionQuality: compressionQuality) {

    try data.write(to: URL(fileURLWithPath: fileName))

    } else {

    throw SaveImageError.dataNotAvailable

    }

    }

    Recipe 5-4

    Saving Images to Files

    ```


    Both functions can throw an exception, so they need to be wrapped into do-try-catch
    block.'
