    Length and distance units are not the only difference between the metric and the
    imperial system. There are area, volume, and weight units as well. Let’s write
    extensions for them all.


    ### Area Units


    Commonly used area units are


    *   Square foot (sq. ft. or sqft in the code below)


    *   Rood


    *   Acre


    *   Square meter (sq. m. or sqm in the code below)


    *   Square centimeter (sq. cm. or sqcm in the code below)


    *   Hectare (ha. or hect in the code below)


    As rood is not in the `UnitArea` class, we’ll make conversion through acres, assuming
    that 4 roods equal to 1 acre. Recipe [2-13](#515103_1_En_2_Chapter.xhtml#PC36)
    shows the full extension.'
