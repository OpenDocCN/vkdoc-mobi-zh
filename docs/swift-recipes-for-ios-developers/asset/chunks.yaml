- fmt: "### Password\n\n多么令人烦恼——当你试图将`\"12345678\"`设置为密码，而应用或网站却不允许时，不是吗？根据应用的具体情况，密码的最低强度要求应有所不同。如果你正在开发一个金融服务应用，密码应该很强。如果是一个个人卡路里计数器或在线视频流媒体服务，那么允许使用简单得多的密码也无妨。但无论如何，有些密码是绝不应被允许的，例如`\"\
    12345678\"`。\n\n密码的基本建议如下：\n\n*   密码应至少包含一个大写字母和一个小写字母。\n*   密码应至少包含一个数字。\n* \
    \  密码应至少包含一个特殊字符（标点符号、百分号、美元符号等）。\n*   密码不应包含空格、换行符或制表符。\n\n最后一条建议是大多数服务的标准，尽管并非严格规则。前面的建议也并非绝对严格，但强制用户满足至少三条中的两条是一个好习惯。\n\
    \n来自配方[3-4](#515103_1_En_3_Chapter.xhtml#PC4)的扩展将验证：\n\n*   字符串仅包含字母数字字符，以及一些特殊字符（点号、逗号等）。\n\
    *   字符串至少包含一个英文字母。\n*   满足以下三个条件中的两个：\n    *   字符串同时包含小写和大写字母。\n    *   字符串至少包含一个数字字符。\n\
    \    *   字符串至少包含一个允许的非字母数字字符。\n\n```swift\npublic extension StringProtocol {\n\
    var isValidPassword: Bool {\nif containsIllegalCharacters || !containsOnlyPasswordAllowed\
    \ {\nreturn false\n}\nif !containsLetters {\nreturn false\n}\nvar strength = 0\n\
    if containsUppercaseLetters {\nstrength += 1\n}\nif containsLowercaseLetters {\n\
    strength += 1\n}\nif containsDigits {\nstrength += 1\n}\nif containsNonAlphanumericCharacters\
    \ {\nstrength += 1\n}\nreturn strength >= 3\n}\n}\nRecipe 3-4\nPassword Validation\n\
    ```\n\n### Phone Number\n\n电话号码验证是另一项常见操作。毫无疑问，服务器应进行自己的验证。但为了避免不必要的流量、提供快速的错误处理并保护服务器免受潜在有害请求的攻击，最好也在客户端进行验证。\n\
    \n虽然电子邮件地址有更大的灵活性，但电话号码受到数字、加号和分隔符的限制。长度范围很窄，并且因国家而异。我们可以使用正则表达式进行基本验证，但还有一种更高效的方式，我们将在后面讨论。\n\
    \n`PhoneNumberKit`库允许解析电话号码、验证其有效性，并将本地电话号码转换为国际格式。在配方[3-5](#515103_1_En_3_Chapter.xhtml#PC6)中，我们使用该库来验证电话号码的有效性。让我们将其添加到`Podfile`中：\n\
    \n```swift\nimport PhoneNumberKit\npublic extension String {\nvar isValidPhoneNumber:\
    \ Bool {\ndo {\ntry phoneNumberKit.parse(\"+33 6 89 017383\")\nreturn true\n}\n\
    catch {\nreturn false\n}\n}\n}\nRecipe 3-5\nPhone Number Verification\n```\n\n\
    ```ruby\npod 'PhoneNumberKit'\n```\n\n### Gender\n\n除非绝对必要，否则性别选择不应出现在注册表单中。如果确实需要，请尽量将其设为可选。首先，苹果要求你的应用遵循其《指南》，该指南不允许索要不必要的个人数据。要让苹果相信了解用户性别对应用功能来说是必要的，将会很复杂。其次，向用户提供哪一系列性别选项也并不明确。如果你只提供男性和女性之间的选择，可能会让LGBTQ+群体感到不满。他们同样是潜在客户，因此这一点需要谨记。\n\
    \n如果你仍然决定在应用中添加性别选择，请将其作为两个或更多选项的选择项来添加，无需使用键盘。这样会使字符串分析变得不必要。\n\n### Date of\
    \ Birth\n\n如果你有成人内容，这个字段可能是必需的。年龄（或出生日期）选择可以让你了解应显示或隐藏哪些内容。如果你的应用销售食品和饮料，你可以对未成年人隐藏酒精和烟草（具体年龄限制取决于地区）。\n\
    \n最佳实践是在你的UI中添加一个日期选择器组件，例如`UIDatePicker`。然后使用与你所在地区匹配的日期格式化器之一来格式化日期。例如：\n\n\
    ```swift\nlet selectedDate = Date()\nlet dateFormatter = DateFormatter()\ndateFormatter.dateFormat\
    \ = \"MM/dd/yyyy\"\ndateFormatter.string(from: selectedDate)\n```\n\n日期格式因国家而异。你的应用应使用你所在地区常用的格式，或根据设备设置提供几种选项。\n\
    \n如果你需要处理用户输入，又没有添加日期选择器的选项，`NSDataDetector`可以派上用场（参见配方[3-6](#515103_1_En_3_Chapter.xhtml#PC8)）。\n\
    \n```swift\npublic extension String {\nvar asDate: Date? {\nlet range = NSRange(location:\
    \ 0, length: count)\nreturn try? NSDataDetector(types: NSTextCheckingResult.CheckingType.date.rawValue)\n\
    .matches(in: self, range: range)\n.compactMap(\\.date)\n.first\n}\n}\nRecipe 3-6\n\
    Parsing Date from String\n```\n\n此扩展将尝试将任何用户输入的字符串转换为`Date`对象，如果无法转换则返回`nil`。"
  raw: "### Password\n\nHow annoying it is when you try to set `\"12345678\"` as your\
    \ password and the app or website you’re trying to set the password for won’t\
    \ allow, isn’t it? Depending on the specifics of your app, the minimum allowed\
    \ strength of a password should be different. If you’re writing an app for a financial\
    \ service, the password should be strong. If it’s a personal calorie counter or\
    \ an online video streaming service, you may be allowed to use a much more simple\
    \ password. But in any case, there are passwords that should never be allowed,\
    \ for example, `\"12345678\"`.\n\nThe basic recommendations for passwords are\
    \ as follows:\n\n*   They should contain at least one capital and one lowercase\
    \ letter.\n\n*   They should contain at least one digit.\n\n*   They should contain\
    \ at least one special character (punctuation mark, percent sign, dollar sign,\
    \ or similar).\n\n*   They shouldn’t have spaces, new lines, or tabs.\n\nThe last\
    \ recommendation is a standard for most services, though it’s not a strict rule.\
    \ The previous recommendations are not so strict either, but it’s a good practice\
    \ to force the user to fulfil at least two of three.\n\nThe extension from Recipe\
    \ [3-4](#515103_1_En_3_Chapter.xhtml#PC4) will verify that\n\n*   The string has\
    \ only alphanumeric characters, plus some special characters (dot, comma, and\
    \ others)\n\n*   The string has at least one English letter\n\n*   Two of these\
    \ three conditions are met:\n    *   The string has both lowercase and capital\
    \ letters.\n\n    *   The string has at least one numeric character.\n\n    *\
    \   The string has at least one allowed nonalphanumeric character.\n\n```\npublic\
    \ extension StringProtocol {\nvar isValidPassword: Bool {\nif containsIllegalCharacters\
    \ || !containsOnlyPasswordAllowed {\nreturn false\n}\nif !containsLetters {\n\
    return false\n}\nvar strength = 0\nif containsUppercaseLetters {\nstrength +=\
    \ 1\n}\nif containsLowercaseLetters {\nstrength += 1\n}\nif containsDigits {\n\
    strength += 1\n}\nif containsNonAlphanumericCharacters {\nstrength += 1\n}\nreturn\
    \ strength >= 3\n}\n}\nRecipe 3-4\nPassword Validation\n```\n\n### Phone Number\n\
    \nPhone number verification is another popular operation. Undoubtedly, the server\
    \ should make its own verification. But to avoid unnecessary traffic, provide\
    \ fast error handling, and protect the server from potentially harmful requests,\
    \ it’s better to make the verification on the client’s side as well.\n\nWhile\
    \ email address has more flexibility, phone numbers are limited with digits, plus\
    \ sign and separators. The length range is narrow, and it varies from country\
    \ to country. We can make basic verifications with regular expressions, but there\
    \ is a more efficient way that we will discuss in the following.\n\nThe PhoneNumberKit\
    \ library allows to parse phone numbers, verify their validity, and convert local\
    \ phone numbers to an international format. In Recipe [3-5](#515103_1_En_3_Chapter.xhtml#PC6)\
    \ we use this library to verify phone number validity. Let’s add it to our Podfile:\n\
    \n```\nimport PhoneNumberKit\npublic extension String {\nvar isValidPhoneNumber:\
    \ Bool {\ndo {\ntry phoneNumberKit.parse(\"+33 6 89 017383\")\nreturn true\n}\n\
    catch {\nreturn false\n}\n}\n}\nRecipe 3-5\nPhone Number Verification\n```\n\n\
    ```\npod 'PhoneNumberKit'\n```\n\n### Gender\n\nGender selection shouldn’t be\
    \ in the registration form unless it’s absolutely necessary. And if it is, try\
    \ to make it optional. First, Apple requires your app to follow their *Guidelines*,\
    \ which don’t allow asking for unnecessary personal data. Convincing Apple that\
    \ knowing the user’s gender is necessary for the app functionality will be complicated.\
    \ Second, it’s unclear which list of genders to present to the user. If you present\
    \ a choice between male and female only, you can upset the LGBTQ+ community. They\
    \ are potential clients as well, so that’s something to keep in mind.\n\nIf you\
    \ still decided to add gender selection in your app, add it as a selection of\
    \ two or more options without using the keyboard. This will make string analysis\
    \ unnecessary.\n\n### Date of Birth\n\nThis field may be necessary if you have\
    \ adult content. Age (or date of birth) selection can give you an idea of which\
    \ content to show or hide. If your app sells food and drinks, you can hide alcohol\
    \ and tobacco from minors (specific age restriction depends on the region).\n\n\
    The best practice is to add a date selector component to your UI, for example,\
    \ `UIDatePicker`. Then you format the date using one of the date formatters matching\
    \ your region. For example:\n\n```\nlet selectedDate = Date()\nlet dateFormatter\
    \ = DateFormatter()\ndateFormatter.dateFormat = \"MM/dd/yyyy\"\ndateFormatter.string(from:\
    \ selectedDate)\n```\n\nDate formats vary from country to country. Your app should\
    \ use the format that is commonly used in your region or offer several options\
    \ depending on device settings.\n\nIf you need to work with user input and you\
    \ don’t have an option to add a date picker, `NSDataDetector` comes to help (see\
    \ Recipe [3-6](#515103_1_En_3_Chapter.xhtml#PC8)).\n\n```\npublic extension String\
    \ {\nvar asDate: Date? {\nlet range = NSRange(location: 0, length: count)\nreturn\
    \ try? NSDataDetector(types: NSTextCheckingResult.CheckingType.date.rawValue)\n\
    .matches(in: self, range: range)\n.compactMap(\\.date)\n.first\n}\n}\nRecipe 3-6\n\
    Parsing Date from String\n```\n\nThis extension will try to convert any user-typed\
    \ string to a `Date` object, or return `nil` if it’s not possible ."
  trans: "\n### 密码\n\n多么令人烦恼——当你试图将`\"12345678\"`设置为密码，而应用或网站却不允许时，不是吗？根据应用的具体情况，密码的最低强度要求应有所不同。如果你正在开发一个金融服务应用，密码应该很强。如果是一个个人卡路里计数器或在线视频流媒体服务，那么允许使用简单得多的密码也无妨。但无论如何，有些密码是绝不应被允许的，例如`\"\
    12345678\"`。\n\n密码的基本建议如下：\n\n*   密码应至少包含一个大写字母和一个小写字母。\n*   密码应至少包含一个数字。\n* \
