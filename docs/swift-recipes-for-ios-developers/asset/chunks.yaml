    ## 圆角、阴影和其他效果


    如果你使用 storyboard 或 nib 进行 UI 设计，你会知道它们缺少许多功能。通常，你需要在代码中进行一些调整，这意味着你需要创建一个 `@IBOutlet`。这很不方便。


    通过添加几个扩展，你可以解决诸如添加圆角、阴影、内容裁剪等问题。图 4-8 展示了其效果。


    ### 圆角、内容裁剪和边框


    圆角是 iOS 和 macOS 应用中非常流行的设计特性。与越来越方正的 Windows 不同，Apple 产品拥有更多曲线。如果将 Big Sur（macOS
    11）与 Catalina（macOS 10.15）进行比较，你会立刻发现差异。


    `UIKit` 提供了一种原生方式来为几乎所有元素添加圆角，但这是通过在 `UILayer` 中实现，而不是在 `UIView` 中。Storyboard
    编辑器无法直接访问图层，因此你不能在其中添加圆角。配方 4-20 展示了一种简单的修复方法。


    ```

    public extension UIView {

    @IBInspectable var cornerRadius: CGFloat {

    set { layer.cornerRadius = newValue }

    get { layer.cornerRadius  }

    }

    }

    ```


    **配方 4-20** — 圆角


    当你设置圆角半径时，它会应用于图层本身的背景、边框和其他属性，但不会应用于内容。它也不会应用于 `UIView` 的子视图。如果你想将圆角应用于所有内容，你需要设置
    `masksToBounds` 属性。这是图层的一个属性。配方 4-21 展示了具体做法：


    ```

    public extension UIView {

    @IBInspectable var masksToBounds: Bool {

    set { layer.masksToBounds = newValue }

    get { layer.masksToBounds  }

    }

    }

    ```


    **配方 4-21** — 内容裁剪


    现在你可以直接在 storyboard 编辑器中设置它了。这里需要提醒一下——它确实会应用于所有内容。例如，如果你在 `UIView` 上设置它，那么它的所有子视图将永远不会超出
    `UIView` 父视图的边界。


    你可能需要这种行为的场景之一是 `UIViewController` 的根 `UIView`。当你添加一个可能大于根 `UIView` 的填充背景时，在过渡期间它将是可见的。当你将一个新的
    `UIViewController` 推送到 `UINavigationController` 时，它会出现在屏幕的右侧（或在从右到左布局中的左侧）。一些屏幕外的元素可能会可见。如果这不是你想要的行为，请设置
    `maskToBounds` 属性，这样所有屏幕外的元素在过渡期间将不可见。


    在我们继续之前，我们还需要另一个有用的扩展。问题是 Swift 有两个类：`UIColor` 和 `CGColor`。`UIColor` 对开发者更方便；它能更好地访问颜色分量，并且可以通过
    `@IBInspectable` 属性暴露给 storyboard 编辑器。`CGColor` 更像是一个内部的东西。尽管它们在 Swift 中都代表颜色，但它们是两种不同的类型。配方
    4-22 将 `CGColor` 转换为 `UIColor`。


    ```

    public extension CGColor {

    var UIColor: UIKit.UIColor {

    return UIKit.UIColor(cgColor: self)

    }

    }

    ```


    **配方 4-22** — 将 `CGColor` 转换为 `UIColor`


    配方 4-23 中的扩展允许我们添加边框。边框可以有颜色和宽度，因此我们向 `UIView` 类添加两个属性。在 UIKit 中，所有可见元素都是 `UIView`
    的子类，因此你可以为它们中的任何一个添加边框。


    ```

    extension UIView {

    @IBInspectable var borderWidth: CGFloat {

    set { layer.borderWidth = newValue }

    get { layer.borderWidth }

    }

    @IBInspectable var borderColor: UIColor? {

    set { layer.borderColor = newValue?.cgColor }

    get { layer.borderColor?.UIColor }

    }

    @IBInspectable var cornerRadius: CGFloat {

    set { layer.cornerRadius = newValue }

    get { layer.cornerRadius  }

    }

    @IBInspectable var masksToBounds: Bool {

    set { layer.masksToBounds = newValue }

    get { layer.masksToBounds  }

    }

    }

    ```


    **配方 4-23** — 边框


    ![](img/515103_1_En_4_Fig8_HTML.png)


    一张在 storyboard 编辑器中进行用户界面视图配置的截图，显示了一个 iPhone 的轮廓，其右侧边框内粘贴了两个方框。左侧图片有一个窗口，其中包含可修改的选项，如圆角半径、边框宽度、透明度等。


