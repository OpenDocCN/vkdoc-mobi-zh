    Storyboard of image cache view


    To better understand this, let’s now review an image cache usage example.


    The example is straightforward; let’s just make several clarifications:


    1.  Some functions accept URL; others require `String`. If we’re talking about
    files, URL starts with `file://`, so to convert it to a file path, we need `.path`
    instead of `.absoluteString`.


    2.  To create a URL object from a text string entered inside text field `tfURLString`,
    we need to escape characters; otherwise, the URL can be nil. For this purpose,
    we use the `.addingPercentEncoding(withAllowedCharacters: CharacterSet.urlQueryAllowed)`
    method.


    3.  Empty spaces can also *break* URL, so we need to trim entered `String`: `.trimmingCharacters(in:
    .whitespacesAndNewlines)`.


    ## Resizing and Cropping


    Having access to image buffer in `CGImage`, we can modify it – either inside an
    existing image object or by creating a new image buffer and turning it into a
    new `CGImage` or `UIImage`.


    What can we do with an image?


    *   Scale it. Proportionally or not. Upscale or downscale it.


    *   Crop it. We can crop an image to a square or rectangle of the proportions
    we need. The cropped image will be always smaller than the original one.'
