- fmt: "## Swift Versions and Compatibility\n\nUnlike Objective-C, Swift is not backward\
    \ compatible. Code written in Swift 1.0 may not be compiled by Swift 2.0 and very\
    \ likely won’t be compiled by Swift 5.0. At the same time, Swift 5.0 code may\
    \ use language features not available in Swift 4.0.\n\n> **Note**: Different versions\
    \ of Objective-C are not 100% compatible either, but there were only two major\
    \ versions of it in the past 37 years. All code used in iOS apps is written in\
    \ Objective-C 2.0.\n\nAt the same time, basic language elements are the same,\
    \ so the code will either work or work with little modifications on another version\
    \ of Swift.\n\nAll code in this book was compiled with Swift 5.5, which is the\
    \ latest at the moment of writing these code recipes. Yet, this code should compile\
    \ on all 5.x versions of Swift, and most of the recipes even on 4.x versions.\n\
    \n## Acknowledgments\n\nI want to thank everyone who has helped me with this book\
    \ and made it possible for me to write it. All my university teachers, the authors\
    \ of the books I’ve read and the teachers of the online courses I’ve watched,\
    \ the bloggers, and thousands of people on Stack Overflow who have helped me gain\
    \ the knowledge I have now.\n\nI want to thank all my clients and bosses who have\
    \ assigned me tasks that I couldn’t do then, pushing me to learn further, and\
    \ my fellow developers who wrote good code that I could read and learn from.\n\
    \nSpecial thanks go to my mother Nina Nekrasova, who, during the process of writing\
    \ this book, has asked me how I was doing and if I was fitting my deadline every\
    \ time we met, as if I was still a child and this was part of my homework.\n\n\
    And I got the biggest help and support from my wife Gaby Prestes, who patiently\
    \ read every chapter of this book, corrected my grammar mistakes, and gave valuable\
    \ feedback not even being a programmer herself. Thank you, Gaby. Without you,\
    \ this book would have never happened.\n\n## About the Author / About the Technical\
    \ Reviewer\n\n# 1. Working with Data\n\nData processing is a core feature of all\
    \ computing devices. And iPhones are mobile computers. Your profile on social\
    \ networks, cookies on websites, emails and SMS messages, even user interfaces\
    \ – all of them are data structures. For example, iOS storyboards have an XML\
    \ format; you can open them in a text editor.\n\nThat’s why it’s important to\
    \ learn how to handle data as a starting point. We will work with the `Data` class\
    \ representing binary data; we will convert data types and handle conversion errors,\
    \ extract data from `Dictionary` and `Array` (which are Swift representations\
    \ of XML, JSON, and other interchange formats), and we will create these structures\
    \ to pass data to APIs. In the end, we’ll talk about serialization and deserialization,\
    \ which are extremely important concepts in data processing.\n\n## Conversion\
    \ Between Data Types\n\nAll programming languages have basic data types and more\
    \ complex structures – and Swift is not an exception. The basic types in Swift\
    \ are as follows:\n\n- `Int` – An integer number. For example, 1, 15, or -1536.\
    \ Depending on the architecture, it can be a 32-bit or a 64-bit number. All modern\
    \ Apple devices have 64-bit processors. On these platforms, the `Int` range goes\
    \ from −2^(63) to 2^(63) − 1. If you need to use a bigger or smaller range, you\
    \ can add a width integer (the amount of memory bits needed to store a value)\
    \ to the type name. Examples are `Int16` and `Int64`. Unsigned integers have the\
    \ `UInt` type.\n- `Float` and `Double` – A floating-point number, 32-bit and 64-bit,\
    \ respectively. These types are actively used in UI development. All coordinates\
    \ on the screen are floating points. `Float` range is 1.2 * 10^(-38) to 3.4 *\
    \ 10^(38). `Double` range is 2.3 * 10^(-308) to 1.7 * 10^(308). An example of\
    \ a floating-point number is 3.14159265359.\n- `Bool` – A Boolean value, which\
    \ can take only one of two values: `true` or `false`. Used for logical expressions\
    \ and storing simple values (yes/no).\n- `String` – Textual data. In Swift, it’s\
    \ a Unicode text string, which means it may contain text in all languages and\
    \ even emojis.\n- `Character` – One character. In Swift, it’s a 16-bit value.\n\
    \nBesides the basic types, there are hundreds of more complex types, which are\
    \ structures containing basic types or other structures.\n\nWhat do we mean by\
    \ data conversion? Swift is a strictly typed language, and while languages like\
    \ C or JavaScript allow scenarios like this: `a = 1 if (a) ...`, in Swift, it’s\
    \ not acceptable. You can use Boolean variables only inside an `if` statement,\
    \ and you can only assign `Double` value to `Double` variables, not even to the\
    \ `Float` ones. It helps to avoid many mistakes but forces developers to perform\
    \ data conversion manually. There are more complex examples of data conversion.\
    \ For example, `1` and `\"1\"` are not the same thing, even though it may seem\
    \ so at first glance. The first case is an integer value, while the second one\
    \ is a text (`String` or `Character`). To convert one type to another, you need\
    \ to write additional code. And it’s important not to forget about possible problems.\
    \ What if the value in a `String` is too big for `Int`? What if it’s not a number?\
    \ What if it’s `\"1\"`, `true` or `false`?\n\n### Safe Number Conversion\n\nIf\
    \ you have several different number types, for example, `Int` and `Double`, you\
    \ can convert them this way:\n\n```\nlet d: Double = 1.0\nlet i = Int(d)\n```\n\
    \nIn the preceding example, the variable `i` will have the value `1`. If the value\
    \ of `d` doesn’t fit the range of `i`, you’ll get... a crash:\n\n```\nlet d: Double\
    \ = 1000000000.0\nlet i = Int16(d)\n```\n\nOutput: `Fatal error: Double value\
    \ cannot be converted to Int16 because the result would be greater than Int16.max.`\n\
    \nThe solution is to use optional constructor `init?(exactly:)`:\n\n```\nlet d:\
    \ Double = 1000000000.0\nlet i = Int16(exactly: d)\n```\n\nThe variable `i` will\
    \ be optional and will have the `Int16?` type, and instead of crashing the app,\
    \ it will become `nil`. There’s one serious problem left – `init?(exactly:)` returns\
    \ a non-nil value only if the floating-point value doesn’t have fractional parts.\
    \ If `d` is `10.5`, the conversion will return `nil`. This problem has a beautiful\
    \ solution – the `rounded()` method. It solves two problems:\n\n- It allows exact\
    \ conversions – `10.9` won’t return `nil` anymore.\n- It rounds numbers following\
    \ mathematical rules. For example, `10.9` will become `11`.\n\nIf rounding is\
    \ not a desired behavior, there’s another option – the `floor` function. For example:\n\
    \n```\nvar i = Int16(exactly: trunc(d))\n```\n\nFinally, let’s make it even more\
    \ universal and allow `d` to be optional:\n\n```\nextension Double {\n    var\
    \ asInt16: Int16? {\n        Int16(exactly: self.rounded())\n    }\n}\nlet d1:\
    \ Double? = 1000000000.0\nlet d2: Double? = 10.9\nlet i1 = d1?.asInt16    // nil\n\
    let i2 = d2?.asInt16    // 11\n```\n\nIn Recipe [1-1](#515103_1_En_1_Chapter.xhtml#PC6),\
    \ we make an extension of the `Double` class. It automatically works on `Double?`.\
    \ It’s simple, 100% safe, and universal."
  raw: '## Swift Versions and Compatibility


    Unlike Objective-C, Swift is not backward compatible. Code written in Swift 1.0
    may not be compiled by Swift 2.0 and very likely won’t be compiled by Swift 5.0\.
    At the same time, Swift 5.0 code may use language features not available in Swift
    4.0.


    Note


    Different versions of Objective-C are not 100% compatible either, but there were
    only two major versions of it in the past 37 years. All code used in iOS apps
    is written in Objective-C 2.0.


    At the same time, basic language elements are the same, so the code will either
    work or work with little modifications on another version of Swift.


    All code in this book was compiled with Swift 5.5, which is the latest at the
    moment of writing these code recipes. Yet, this code should compile on all 5.x
    versions of Swift, and most of the recipes even on 4.x versions.


    Acknowledgments


    I want to thank everyone who has helped me with this book and made it possible
    for me to write it. All my university teachers, the authors of the books I’ve
    read and the teachers of the online courses I’ve watched, the bloggers, and thousands
    of people on Stack Overflow who have helped me gain the knowledge I have now.


    I want to thank all my clients and bosses who have assigned me tasks that I couldn’t
    do then, pushing me to learn further, and my fellow developers who wrote good
    code that I could read and learn from.


    Special thanks go to my mother *Nina Nekrasova*, who, during the process of writing
    this book, has asked me how I was doing and if I was fitting my deadline every
    time we met, as if I was still a child and this was part of my homework.


    And I got the biggest help and support from my wife *Gaby Prestes*, who patiently
    read every chapter of this book, corrected my grammar mistakes, and gave valuable
    feedback not even being a programmer herself. Thank you, Gaby. Without you, this
    book would have never happened.


    About the Author About the Technical Reviewer


    # 1. Working with Data


    Data processing is a core feature of all computing devices. And iPhones are mobile
    computers. Your profile on social networks, cookies on websites, emails and SMS
    messages, even user interfaces – all of them are data structures. For example,
    iOS storyboards have an XML format; you can open them in a text editor.


    That’s why it’s important to learn how to handle data as a starting point. We
    will work with the `Data` class representing binary data; we will convert data
    types and handle conversion errors, extract data from `Dictionary` and `Array`
    (which are Swift representations of XML, JSON, and other interchange formats),
    and we will create these structures to pass data to APIs. In the end, we’ll talk
    about serialization and deserialization, which are extremely important concepts
    in data processing.


    ## Conversion Between Data Types


    All programming languages have basic data types and more complex structures –
    and Swift is not an exception. The basic types in Swift are as follows:


    *   `Int` – An integer number. For example, 1, 15, or -1536\. Depending on the
    architecture, it can be a 32-bit or a 64-bit number. All modern Apple devices
    have 64-bit processors. On these platforms, the Int range goes from −2^(63) to
    2^(63) − 1\. If you need to use a bigger or smaller range, you can add a width
    integer (the amount of memory bits needed to store a value) to the type name.
    Examples are Int16 and Int64. Unsigned integers have the `UInt` type.


    *   `Float` and `Double` – A floating-point number, 32-bit and 64-bit, respectively.
    These types are actively used in UI development. All coordinates on the screen
    are floating points. `Float` range is 1.2 * 10^(-38) to 3.4 * 10^(38). `Double`
    range is 2.3 * 10^(-308) to 1.7 * 10^(308). An example of a floating-point number
    is 3.14159265359.


    *   `Bool` – A Boolean value, which can take only one of two values: `true` or
    `false`. Used for logical expressions and storing simple values (yes/no).


    *   `String` – Textual data. In Swift, it’s a Unicode text string, which means
    it may contain text in all languages and even emojis.


    *   `Character` – One character. In Swift, it’s a 16-bit value.


    Besides the basic types, there are hundreds of more complex types, which are structures
    containing basic types or other structures.


    What do we mean by data conversion? Swift is a strictly typed language, and while
    languages like C or JavaScript allow scenarios like this: `a = 1 if (a) ...`,
    in Swift, it’s not acceptable. You can use Boolean variables only inside an if
    statement, and you can only assign `Double` value to `Double` variables, not even
    to the `Float` ones. It helps to avoid many mistakes but forces developers to
    perform data conversion manually. There are more complex examples of data conversion.
    For example, `1` and `"1"` are not the same thing, even though it may seem so
    at first glance. The first case is an integer value, while the second one is a
    text (`String` or `Character`). To convert one type to another, you need to write
    additional code. And it’s important not to forget about possible problems. What
    if the value in a `String` is too big for `Int`? What if it’s not a number? What
    if it’s `"1"`, `true` or `false`?


    ### Safe Number Conversion


    If you have several different number types, for example, `Int` and `Double`, you
    can convert them this way :


    ```

    let d: Double = 1.0

    let i = Int(d)

    ```


    In the preceding example, the variable `i` will have the value `1`. If the value
    of `d` doesn’t fit the range of `i`, you’ll get... a crash:


    ```

    let d: Double = 1000000000.0

    let i = Int16(d)

    ```


    Output: `Fatal error: Double value cannot be converted to Int16 because the result
    would be greater than Int16.max.`


    The solution is to use optional constructor `init?(exactly:)`:


    ```

    let d: Double = 1000000000.0

    let i = Int16(exactly: d)

    ```


    The variable `i` will be optional and will have the `Int16`? type, and instead
    of crashing the app, it will become `nil`. There’s one serious problem left –
    `init?(exactly:)` returns a non-nil value only if the floating-point value doesn’t
    have fractional parts. If `d` is `10.5`, the conversion will return `nil`. This
    problem has a beautiful solution - the `rounded()` method . It solves two problems:


    *   It allows exact conversions – `10.9` won’t return `nil` anymore.


    *   It rounds numbers following mathematical rules. For example, `10.9` will become
    `11`.


    If rounding is not a desired behavior, there’s another option `–` the floor function.
    For example:


    ```

    var i = Int16(exactly: trunk(d))

    ```


    Finally, let’s make it even more universal and allow `d` to be optional:


    ```

    extension Double {

    var asInt16: Int16? {

    Int16(exactly: self.rounded())

    }

    }

    let d1: Double? = 1000000000.0

    let d2: Double? = 10.9

    let i1 = d1?.asInt16    // nil

    let i2 = d2?.asInt16    // 11

    ```


    In Recipe [1-1](#515103_1_En_1_Chapter.xhtml#PC6), we make an extension of the
    `Double` class. It automatically works on `Double?`. It’s simple, 100% safe, and
    universal .'
  trans: "\n## Swift 版本与兼容性\n\n与 Objective-C 不同，Swift 不向后兼容。用 Swift 1.0 编写的代码可能无法通过\
    \ Swift 2.0 编译，而且极有可能无法通过 Swift 5.0 编译。同时，Swift 5.0 的代码可能使用了 Swift 4.0 中不具备的语言特性。\n\
    \n> **注意**：不同版本的 Objective-C 也并非 100% 兼容，但在过去 37 年中，它只有两个主要版本。iOS 应用中使用的所有代码都是用\
    \ Objective-C 2.0 编写的。\n\n与此同时，基本语言元素是相同的，因此代码要么能在另一个版本的 Swift 上直接工作，要么只需稍作修改即可。\n\
    \n本书中的所有代码均使用 Swift 5.5 编译，这是撰写这些代码示例时的最新版本。不过，这些代码应该能在所有 5.x 版本的 Swift 上编译，并且大多数示例甚至能在\
    \ 4.x 版本上编译。\n\n## 致谢\n\n我要感谢所有帮助我完成本书，并使我能够将其付诸实践的人。感谢我所有的大学老师、我所读书籍的作者、我所观看的在线课程的讲师、博主，以及\
    \ Stack Overflow 上成千上万的人，是他们帮助我获得了现在的知识。\n\n我要感谢我所有的客户和老板，他们给我分配了当时无法完成的任务，促使我进一步学习；还要感谢我的开发者同行们，他们编写了优秀的代码，让我能够阅读和学习。\n\
    \n特别感谢我的母亲尼娜·涅克拉索娃。在撰写本书期间，她每次见到我都会问我进展如何，是否赶得上截止日期，仿佛我还是个孩子，这只是我的家庭作业。\n\n我得到最大帮助和支持的是我的妻子加比·普雷斯特斯。她耐心地阅读了本书的每一章，纠正了我的语法错误，并提供了宝贵的反馈，尽管她本人并非程序员。谢谢你，加比。没有你，这本书永远不会问世。\n\
    \n## 关于作者 / 关于技术审校\n\n# 1. 处理数据\n\n数据处理是所有计算设备的核心功能。而 iPhone 就是移动计算机。你在社交网络上的个人资料、网站上的\
    \ Cookie、电子邮件和短信，甚至是用户界面——所有这些都是数据结构。例如，iOS storyboard 具有 XML 格式；你可以在文本编辑器中打开它们。\n\
    \n因此，将学习如何处理数据作为起点非常重要。我们将处理代表二进制数据的 `Data` 类；我们将转换数据类型并处理转换错误，从 `Dictionary`\
    \ 和 `Array`（它们是 XML、JSON 及其他交换格式的 Swift 表示）中提取数据，并创建这些结构以将数据传递给 API。最后，我们将讨论序列化和反序列化，这是数据处理中极其重要的概念。\n\
    \n## 数据类型之间的转换\n\n所有编程语言都有基本数据类型和更复杂的结构——Swift 也不例外。Swift 中的基本类型如下：\n\n- `Int`\
    \ – 整数。例如，1、15 或 -1536。根据架构，它可以是 32 位或 64 位数字。所有现代 Apple 设备都配备 64 位处理器。在这些平台上，`Int`\
    \ 的范围是从 −2⁶³ 到 2⁶³ − 1。如果你需要使用更大或更小的范围，可以在类型名称中添加位宽整数（存储一个值所需的内存位数）。例如 `Int16`\
    \ 和 `Int64`。无符号整数具有 `UInt` 类型。\n- `Float` 和 `Double` – 浮点数，分别为 32 位和 64 位。这些类型在\
    \ UI 开发中被广泛使用。屏幕上的所有坐标都是浮点数。`Float` 的范围是 1.2 * 10^(-38) 到 3.4 * 10³⁸。`Double`\
    \ 的范围是 2.3 * 10^(-308) 到 1.7 * 10³⁰⁸。浮点数的一个例子是 3.14159265359。\n- `Bool` – 布尔值，只能取两个值之一：`true`\
    \ 或 `false`。用于逻辑表达式和存储简单值（是/否）。\n- `String` – 文本数据。在 Swift 中，它是一个 Unicode 文本字符串，这意味着它可以包含所有语言的文本，甚至表情符号。\n\
    - `Character` – 单个字符。在 Swift 中，它是一个 16 位的值。\n\n除了基本类型之外，还有数百种更复杂的类型，这些类型是包含基本类型或其他类型的结构。\n\
    \n数据转换是什么意思？Swift 是一种强类型语言，虽然像 C 或 JavaScript 这样的语言允许这样的场景：`a = 1 if (a) ...`，但在\
    \ Swift 中是不允许的。你只能在 `if` 语句中使用布尔变量，并且只能将 `Double` 值赋值给 `Double` 变量，甚至不能赋值给 `Float`\
    \ 变量。这有助于避免许多错误，但迫使开发者手动执行数据转换。还有更复杂的数据转换示例。例如，`1` 和 `\"1\"` 不是一回事，尽管乍一看可能如此。第一种情况是整数值，而第二种情况是文本（`String`\
    \ 或 `Character`）。要将一种类型转换为另一种类型，需要编写额外的代码。并且务必不要忘记可能的问题。如果 `String` 中的值对于 `Int`\
    \ 来说太大怎么办？如果它不是一个数字怎么办？如果它是 `\"1\"`、`true` 或 `false` 怎么办？\n\n### 安全的数字转换\n\n如果你有几种不同的数字类型，例如\
    \ `Int` 和 `Double`，可以这样转换它们：\n\n```\nlet d: Double = 1.0\nlet i = Int(d)\n```\n\
    \n在前面的示例中，变量 `i` 的值将为 `1`。如果 `d` 的值不在 `i` 的范围内，你将会得到一个……崩溃：\n\n```\nlet d: Double\
    \ = 1000000000.0\nlet i = Int16(d)\n```\n\n输出：`Fatal error: Double value cannot\
    \ be converted to Int16 because the result would be greater than Int16.max.`\n\
    \n解决方案是使用可选的构造器 `init?(exactly:)`：\n\n```\nlet d: Double = 1000000000.0\nlet i\
    \ = Int16(exactly: d)\n```\n\n变量 `i` 将是可选的，并且具有 `Int16?` 类型，应用程序不会崩溃，而是会变成 `nil`。还有一个严重的问题——`init?(exactly:)`\
    \ 仅在浮点值没有小数部分时才返回非 nil 值。如果 `d` 是 `10.5`，转换将返回 `nil`。这个问题有一个很好的解决方案——`rounded()`\
    \ 方法。它解决了两个问题：\n\n- 它允许精确转换——`10.9` 不会再返回 `nil`。\n- 它按照数学规则对数字进行四舍五入。例如，`10.9`\
    \ 将变成 `11`。\n\n如果四舍五入不是期望的行为，还有另一个选项——`floor` 函数。例如：\n\n```\nvar i = Int16(exactly:\
    \ trunc(d))\n```\n\n最后，让我们使其更加通用，并允许 `d` 成为可选值：\n\n```\nextension Double {\n \
    \   var asInt16: Int16? {\n        Int16(exactly: self.rounded())\n    }\n}\n\
    let d1: Double? = 1000000000.0\nlet d2: Double? = 10.9\nlet i1 = d1?.asInt16 \
    \   // nil\nlet i2 = d2?.asInt16    // 11\n```\n\n在食谱 1-1 中，我们对 `Double` 类进行了扩展。它会自动在\
    \ `Double?` 上工作。它简单、100% 安全且通用。\n"
