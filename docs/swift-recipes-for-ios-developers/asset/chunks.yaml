    \ it groups digits by four and inserts spaces between."
  raw: 'Now let’s make a simple validator in Recipe [6-2](#515103_1_En_6_Chapter.xhtml#PC3).
    All validators are different, but the basic structure is similar. Let’s say we
    need the user’s email address. Our `EmailInputValidator` class should be assigned
    as a delegate of `UITextField`. It will remove all the characters that are not
    allowed in email addresses and make a call to its own delegate function when an
    address is valid.


    Please find String extension isValidEmail in Recipe 3-3 or in full version of
    Recipe [6-2](#515103_1_En_6_Chapter.xhtml#PC3) on GitHub.


    ```

    protocol EmailInputValidatorDelegate: AnyObject {

    func validityChanged(isValid: Bool)

    }

    class EmailInputValidator: NSObject, UITextFieldDelegate {

    weak var delegate: EmailInputValidatorDelegate?

    func textField(_ textField: UITextField, shouldChangeCharactersIn range: NSRange,
    replacementString string: String) -> Bool {

    let allowedRegEx = "[A-Z0-9a-z._%+-@]+"

    let allowedTest = NSPredicate(format: "SELF MATCHES %@", allowedRegEx)

    if !allowedTest.evaluate(with: string) && !string.isEmpty {

    return false

    }

    if let text = textField.text,

    let textRange = Range(range, in: text) {

    let updatedText = text.replacingCharacters(in: textRange, with: string)

    delegate?.validityChanged(isValid: updatedText.isValidEmail)

    }

    return true

    }

    }

    Recipe 6-2

    Email Input Validator

    ```


    You can use it in `UIViewController` like this:


    ```

    class ViewController: UIViewController {

    @IBOutlet weak var textField: UITextField!

    var emailValidator = EmailInputValidator()

    override func viewDidLoad() {

    super.viewDidLoad()

    textField.delegate = emailValidator

    emailValidator.delegate = self

    }

    }

    extension ViewController: EmailInputValidatorDelegate {

    func validityChanged(isValid: Bool) {

    print(isValid)

    }

    }

    ```


    ## Formatting User Input


    There’s a certain type of data that needs visual decoration to be understandable,
    for example, phone numbers. They have different lengths in different countries,
    but on average, they’re around ten digits long. Seeing ten digits without any
    separation is hard for humans – you’ll hardly recognize your own phone number
    if presented that way. Adding some spaces, brackets, and dashes makes a phone
    number much more readable and understandable.


    Another example is bank card numbers. It also varies, but the most common is separating
    digits in blocks by four.


    We can’t expect perfect text styling from users. Even more, we usually allow to
    type only digits in such fields – on-screen keyboards don’t have spaces, dashes,
    or brackets. We need to do it automatically.


    ### Formatting Phone Numbers


    The next recipe will use the libPhoneNumber library . You can add it from the
    following repository: [`https://github.com/iziz/libPhoneNumber-iOS`](https://github.com/iziz/libPhoneNumber-iOS)
    . If you use Swift Package Manager, type the URL there; otherwise, use pod:


    ```

    import libPhoneNumber_iOS

    class PhoneViewController: UIViewController, UITextFieldDelegate {

    @IBOutlet weak var phoneNumberTextField: UITextField!

    let countryId = "US"

    let phoneUtil = NBPhoneNumberUtil.sharedInstance()

    func textField(_ textField: UITextField, shouldChangeCharactersIn range: NSRange,
    replacementString string: String) -> Bool {

    if string.isEmpty {

    return true

    }

    if let text = textField.text,

    let textRange = Range(range, in: text) {

    let updatedText = text.replacingCharacters(in: textRange, with: string)

    if let phoneUtil = self.phoneUtil,

    let phoneNumber = try? phoneUtil.parse(updatedText, defaultRegion: countryId),

    let formattedString = try? phoneUtil.format(phoneNumber, numberFormat: .NATIONAL)
    {

    DispatchQueue.main.async {

    textField.text = formattedString

    }

    }

    }

    return true

    }

    }

    Recipe 6-3

    Formatting Phone Numbers in UITextField

    ```


    ```

    pod ''libPhoneNumber-iOS''

    ```


    Let’s review it line by line.


    In your UI file (storyboard or xib), add a country selector and a `UITextField`.
    The country selector is usually a list of flags, country names, or codes. Changing
    country should change the `countryId` variable. We’ll leave this behind our scope.
    `UITextField` should have an `@IBOutlet` and View Controller as a delegate.


    We create a constant `phoneUtil` as a reference to an `NBPhoneNumberUtil` singleton.


    All the logic is inside a delegate method. If the string is empty, we return true
    without any verifications. It will allow us to freely delete symbols even if the
    result is not a valid phone number. Letting users delete symbols from `UITextField`
    is very important for a friendly UI.


    ```

    if string.isEmpty {

    return true

    }

    ```


    Then we calculate `updatedText` the way we discussed before in this chapter .


    ```

    let updatedText = text.replacingCharacters(in: textRange, with: string)

    ```


    Now, when we have updated the text, we try to parse it and format it as a national
    number using countryId as a parameter. formattedString either has a formatted
    number or nil. If it has content, we set it as a new text.


    And this part requires our attention as it’s very important. We can’t set text
    directly because the change of `textField` occurs after true is returned. If we
    change the text property inside this function, it will be overridden. That’s why
    we wrap it into `DispatchQueue.main.async`.


    ```

    DispatchQueue.main.async {

    textField.text = formattedString

    }

    ```


    ### Formatting Bank Card Numbers


    The idea behind credit card number formatting is exactly the same as the one behind
    phone number formatting, but in this case, we don’t need any libraries. Recipe
    [6-4](#515103_1_En_6_Chapter.xhtml#PC10) shows how it can be achieved.


    ```

    extension String {

    func group(by groupSize: Int = 4, separator: String = " ") -> String {

    if count  Bool {

    if string.isEmpty {

    return true

    }

    if let text = textField.text,

    let textRange = Range(range, in: text) {

    let updatedText = text

    .replacingCharacters(in: textRange, with: string)

    .filter("0123456789".contains)

    let formattedString = updatedText.group()

    .trimmingCharacters(in: .whitespacesAndNewlines)

    DispatchQueue.main.async {

    textField.text = formattedString

    }

    }

    return true

    }

    }

    Recipe 6-4

    Formatting Bank Card Numbers in UITextField

    ```


    In real life, credit card numbers can be more complicated, but we just group digits
    by four. In more complex cases, we can detect the card type by the first digits
    and apply proper formatting.


    After getting `updatedText`, we leave only digits and drop all other characters
    (which are spaces). Then we add a space after each four digits and set new text
    inside the `DispatchQueue.main.async` block.


    As a helper function , we use the group extension method of String. It’s rather
    straightforward; it takes first `groupSize` characters of a string, adds a separator,
    and does the same with the rest of the string recursively. As a result, with default
    arguments, it groups digits by four and inserts spaces between.'
  trans: "\n# 现在让我们在配方 6-2 中创建一个简单的验证器。所有验证器都各不相同，但基本结构是相似的。假设我们需要用户的电子邮件地址。我们的`EmailInputValidator`类应被指定为`UITextField`的委托。它会移除电子邮件地址中不允许的所有字符，并在地址有效时调用自身的委托函数。\n\
    \n请在配方 3-3 或 GitHub 上配方 6-2 的完整版本中查找`String`扩展`isValidEmail`。\n\n```\nprotocol\
    \ EmailInputValidatorDelegate: AnyObject {\n    func validityChanged(isValid:\
    \ Bool)\n}\n\nclass EmailInputValidator: NSObject, UITextFieldDelegate {\n   \
    \ weak var delegate: EmailInputValidatorDelegate?\n\n    func textField(_ textField:\
    \ UITextField, shouldChangeCharactersIn range: NSRange, replacementString string:\
    \ String) -> Bool {\n        let allowedRegEx = \"[A-Z0-9a-z._%+-@]+\"\n     \
    \   let allowedTest = NSPredicate(format: \"SELF MATCHES %@\", allowedRegEx)\n\
    \        if !allowedTest.evaluate(with: string) && !string.isEmpty {\n       \
    \     return false\n        }\n        if let text = textField.text,\n       \
    \    let textRange = Range(range, in: text) {\n            let updatedText = text.replacingCharacters(in:\
    \ textRange, with: string)\n            delegate?.validityChanged(isValid: updatedText.isValidEmail)\n\
    \        }\n        return true\n    }\n}\n```\n\n**配方 6-2**  \n**电子邮件输入验证器**\n\
    \n你可以在`UIViewController`中这样使用它：\n\n```\nclass ViewController: UIViewController\
    \ {\n    @IBOutlet weak var textField: UITextField!\n    var emailValidator =\
    \ EmailInputValidator()\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        textField.delegate = emailValidator\n        emailValidator.delegate\
    \ = self\n    }\n}\n\nextension ViewController: EmailInputValidatorDelegate {\n\
    \    func validityChanged(isValid: Bool) {\n        print(isValid)\n    }\n}\n\
    ```\n\n## 格式化用户输入\n\n某些类型的数据需要视觉装饰才能易于理解，例如电话号码。不同国家的电话号码长度不同，但平均大约有十位数字。看到连续十位数字而没有分隔对人类来说难以辨认——如果以这种方式呈现，你几乎认不出自己的电话号码。添加一些空格、括号和破折号可以使电话号码更具可读性和易理解性。\n\
    \n另一个例子是银行卡号。其长度也不尽相同，但最常见的是将数字以四位一组进行分隔。\n\n我们不能期望用户提供完美的文本格式。更有甚者，我们通常只允许在此类字段中输入数字——屏幕键盘上没有空格、破折号或括号。我们需要自动完成这些操作。\n\
    \n### 格式化电话号码\n\n下一个配方将使用`libPhoneNumber`库。你可以从以下仓库添加它： [`https://github.com/iziz/libPhoneNumber-iOS`](https://github.com/iziz/libPhoneNumber-iOS)。如果你使用\
    \ Swift Package Manager，请在那里输入 URL；否则，使用 `pod`：\n\n```\nimport libPhoneNumber_iOS\n\
    \nclass PhoneViewController: UIViewController, UITextFieldDelegate {\n    @IBOutlet\
    \ weak var phoneNumberTextField: UITextField!\n    let countryId = \"US\"\n  \
    \  let phoneUtil = NBPhoneNumberUtil.sharedInstance()\n\n    func textField(_\
    \ textField: UITextField, shouldChangeCharactersIn range: NSRange, replacementString\
    \ string: String) -> Bool {\n        if string.isEmpty {\n            return true\n\
    \        }\n        if let text = textField.text,\n           let textRange =\
    \ Range(range, in: text) {\n            let updatedText = text.replacingCharacters(in:\
    \ textRange, with: string)\n            if let phoneUtil = self.phoneUtil,\n \
    \              let phoneNumber = try? phoneUtil.parse(updatedText, defaultRegion:\
    \ countryId),\n               let formattedString = try? phoneUtil.format(phoneNumber,\
    \ numberFormat: .NATIONAL) {\n                DispatchQueue.main.async {\n   \
    \                 textField.text = formattedString\n                }\n      \
    \      }\n        }\n        return true\n    }\n}\n```\n\n**配方 6-3**  \n**在 UITextField\
    \ 中格式化电话号码**\n\n```\npod 'libPhoneNumber-iOS'\n```\n\n让我们逐行分析一下。\n\n在你的 UI 文件（storyboard\
    \ 或 xib）中，添加一个国家选择器和一个`UITextField`。国家选择器通常是一个包含旗帜、国家名称或代码的列表。更改国家应更改`countryId`变量。我们将其留在此范围之外讨论。`UITextField`应有一个`@IBOutlet`，并将视图控制器作为其委托。\n\
    \n我们创建一个常量`phoneUtil`，作为对`NBPhoneNumberUtil`单例的引用。\n\n所有逻辑都位于委托方法内。如果字符串为空，我们直接返回`true`而不进行任何验证。这将允许我们自由删除符号，即使结果不是有效的电话号码。允许用户从`UITextField`中删除符号对于友好的用户界面非常重要。\n\
    \n```\nif string.isEmpty {\n    return true\n}\n```\n\n然后，我们按照本章之前讨论的方式计算`updatedText`。\n\
    \n```\nlet updatedText = text.replacingCharacters(in: textRange, with: string)\n\
    ```\n\n现在，当我们得到更新后的文本后，我们尝试将其解析为电话号码，并使用`countryId`作为参数，将其格式化为国家号码。`formattedString`要么包含格式化后的号码，要么为`nil`。如果它有内容，我们就将其设置为新文本。\n\
    \n这部分需要特别注意，因为它非常重要。我们不能直接设置文本，因为`textField`的更改发生在`true`返回之后。如果我们在此函数内部更改文本属性，它将被覆盖。这就是为什么我们将其包装在`DispatchQueue.main.async`中。\n\
    \n```\nDispatchQueue.main.async {\n    textField.text = formattedString\n}\n```\n\
    \n### 格式化银行卡号\n\n信用卡号格式化背后的思路与电话号码格式化完全相同，但在这种情况下，我们不需要任何库。配方 6-4 展示了如何实现。\n\n\
    ```\nextension String {\n    func group(by groupSize: Int = 4, separator: String\
    \ = \" \") -> String {\n        if count < groupSize {\n            return self\n\
    \        }\n        let startIndex = self.startIndex\n        let endIndex = self.index(startIndex,\
    \ offsetBy: groupSize)\n        let firstGroup = self[startIndex..<endIndex]\n\
    \        let rest = String(self[endIndex...])\n        return firstGroup + separator\
    \ + rest.group(by: groupSize, separator: separator)\n    }\n}\n\nclass CardViewController:\
    \ UIViewController, UITextFieldDelegate {\n    @IBOutlet weak var cardTextField:\
    \ UITextField!\n\n    func textField(_ textField: UITextField, shouldChangeCharactersIn\
    \ range: NSRange, replacementString string: String) -> Bool {\n        if string.isEmpty\
    \ {\n            return true\n        }\n        if let text = textField.text,\n\
    \           let textRange = Range(range, in: text) {\n            let updatedText\
    \ = text\n                .replacingCharacters(in: textRange, with: string)\n\
    \                .filter(\"0123456789\".contains)\n            let formattedString\
    \ = updatedText.group()\n                .trimmingCharacters(in: .whitespacesAndNewlines)\n\
    \            DispatchQueue.main.async {\n                textField.text = formattedString\n\
    \            }\n        }\n        return true\n    }\n}\n```\n\n**配方 6-4**  \n\
    **在 UITextField 中格式化银行卡号**\n\n在实际生活中，信用卡号可能更复杂，但我们只是将数字按四位一组进行分组。在更复杂的情况下，我们可以通过前几位数字检测卡的类型，并应用适当的格式化。\n\
    \n获取`updatedText`后，我们只保留数字并丢弃所有其他字符（即空格）。然后我们在每四位数字后添加一个空格，并在`DispatchQueue.main.async`块内设置新文本。\n\
    \n我们使用`String`的`group`扩展方法作为辅助函数。这个方法相当直观；它取出字符串的前`groupSize`个字符，添加一个分隔符，然后对剩余的字符串递归执行相同操作。结果，在默认参数下，它将数字按四位一组进行分组，并在每组之间插入空格。\n"
- fmt: "# Working with Emojis\n\nEmojis appeared in the 1980s and became popular in\
    \ the 1990s. Back then, there were no pictures, just text signs. Eyes were a colon;\
    \ noses, a dash; and mouths – brackets. Like this: `:-)`. You could see a face\
    \ only by turning your head to the side, but it was better than nothing. Without\
    \ seeing your interlocutor or hearing their voice, you didn’t know their intonation.\n\
    \nWithin time, emojis became a big part of Internet culture and little by little\
    \ migrated to other aspects of our lives. The Unicode Consortium adds more and\
    \ more emojis to the standard; on-screen keyboards have a separate layout with\
    \ emojis; finally, they became not just pictures, but often animated pictures.\n\
    \nAt the same time, emojis can be a problem for us, developers. Even being standardized,\
    \ emojis still can be encoded differently, and new emojis may not be supported\
    \ by old devices or old versions of operating systems. That’s why it’s better\
    \ to block them from most text inputs. They can be totally acceptable in social\
    \ network posts, comments, and video descriptions, but users shouldn’t be able\
    \ to use emojis in fields for email addresses, passwords, legal names, bank account\
    \ numbers, etc.\n\nTo block users from entering emojis, we need two steps:\n\n\
    - Detect that `String` has emojis.\n- Block texts with emojis from the `UITextField`\
    \ delegate.\n\n## Detecting Emojis in Strings\n\nSimilarly to string analyzers\
    \ from Chapter [3](#515103_1_En_3_Chapter.xhtml), let’s add some extensions to\
    \ detect if `String` has emojis (Recipe [6-5](#515103_1_En_6_Chapter.xhtml#PC11)).\
    \ As we know, `String` is a sequence of `Character` instances. To make sure `String`\
    \ doesn’t have emojis, we need to check each `Character`. To check if `String`\
    \ has emojis, we need to find at least one `Character`, which is an emoji.\n\n\
    ```\nextension Character {\n    var isSimpleEmoji: Bool {\n        guard let firstScalar\
    \ = unicodeScalars.first else { return false }\n        return firstScalar.properties.isEmoji\
    \ && firstScalar.value > 0x238C\n    }\n    var isCombinedIntoEmoji: Bool { unicodeScalars.count\
    \ > 1 && unicodeScalars.first?.properties.isEmoji ?? false }\n    var isEmoji:\
    \ Bool { isSimpleEmoji || isCombinedIntoEmoji }\n}\nRecipe 6-5\nChecking If Character\
    \ Is Emoji\n```\n\nWhat’s the difference between a simple emoji and a combined\
    \ one? The problem is that modern emojis are not just faces and flowers, they\
    \ have many other characteristics like skin tone, hair color, and gender. If a\
    \ simple yellow face can be represented as one Unicode symbol, more complicated\
    \ ones are sequences of symbols.\n\nThe computed property `isEmoji` tells if `Character`\
    \ is any type of emoji regardless of its complexity. Other extensions from Recipe\
    \ [6-6](#515103_1_En_6_Chapter.xhtml#PC12) can be used to detect if `String` contains\
    \ emojis.\n\n```\nextension String {\n    var isSingleEmoji: Bool { count == 1\
    \ && containsEmoji }\n    var containsEmoji: Bool { contains { $0.isEmoji } }\n\
    \    var containsOnlyEmoji: Bool { !isEmpty && !contains { !$0.isEmoji } }\n \
    \   var emojiString: String { emojis.map { String($0) }.reduce(\"\", +) }\n  \
    \  var emojis: [Character] { filter { $0.isEmoji } }\n    var emojiScalars: [UnicodeScalar]\
    \ { filter { $0.isEmoji }.flatMap { $0.unicodeScalars } }\n}\nRecipe 6-6\nChecking\
    \ If String Contains Emoji\n```\n\nWe don’t need all these computed properties\
    \ to analyze user input, but they can be useful for other purposes. For example,\
    \ if you ask your user to characterize some post with three emojis, the `containsOnlyEmoji`\
    \ function will be handy.\n\n## Blocking Emoji from User Input\n\nTo block emojis\
    \ from user input, we just need to combine some of our previous recipes. Recipe\
    \ [6-7](#515103_1_En_6_Chapter.xhtml#PC13) shows what we get.\n\n```\nextension\
    \ ViewController: UITextFieldDelegate {\n    func textField(_ textField: UITextField,\
    \ shouldChangeCharactersIn range: NSRange, replacementString string: String) ->\
    \ Bool {\n        if string.containsEmoji && !string.isEmpty {\n            return\
    \ false\n        }\n        // Validate if necessary\n        return true\n  \
    \  }\n}\nRecipe 6-7\nBlocking Emoji from User Input\n```\n\n## Floating Prefix\
    \ or Suffix\n\nSometimes, we need to add noneditable text strings to the beginning\
    \ or end of `UITextField`. It can be currency, a validation badge, or any other\
    \ information.\n\nDepending on the text position (prefix or suffix), there are\
    \ different methods. To add a prefix, we need to add padding to the text input.\
    \ Suffixes are more complicated; we need to move them every time the editable\
    \ text is changed.\n\n### Adding Prefix\n\nTo add a prefix, you need two steps:\n\
    \n- Add a `UILabel` object and properly align it.\n- Add padding to `UITextField`,\
    \ so the editable text will be to the right of the prefix.\n\nLet’s create two\
    \ objects and add outlets:\n\n```\n@IBOutlet weak var prefixLabel: UILabel!\n\
    @IBOutlet weak var mainText: TextFieldWithPadding!\n```\n\nNote\n\n`TextFieldWithPadding`\
    \ is a class created in the \"UITextField Paddings\" section in Chapter [4](#515103_1_En_4_Chapter.xhtml).\
    \ You can find its source code in Recipe [4-26](#515103_1_En_4_Chapter.xhtml#PC44).\n\
    \nWe need to know the width of `prefixLabel`. If it’s static, we can adjust it\
    \ in `viewDidLayoutSubviews`. If not, we need to readjust it every time the text\
    \ is changed.\n\n```\nmainText.paddingLeft = prefixLabel.bounds.width + 8\n```\n\
    \nWe add eight extra points for a gap between the prefix and the main text. The\
    \ full solution is shown in Recipe [6-8](#515103_1_En_6_Chapter.xhtml#PC16).\n\
    \n```\nclass FloatingPrefixViewController: UIViewController {\n    @IBOutlet weak\
    \ var prefixLabel: UILabel!\n    @IBOutlet weak var mainText: TextFieldWithPadding!\n\
    \    static let gapWidth = CGFloat(8)\n\n    override func viewDidLayoutSubviews()\
    \ {\n        mainText.paddingLeft = prefixLabel.bounds.width + FloatingPrefixViewController.gapWidth\n\
    \    }\n\n    func setPrefix(_ prefix: String) {\n        prefixLabel.text = prefix\n\
    \        DispatchQueue.main.async {\n            self.mainText.paddingLeft = self.prefixLabel.bounds.width\
    \ + FloatingPrefixViewController.gapWidth\n        }\n    }\n}\n\nextension FloatingPrefixViewController:\
    \ UITextFieldDelegate {\n    func textFieldShouldReturn(_ textField: UITextField)\
    \ -> Bool {\n        setPrefix(textField.text ?? \"\")\n        textField.text\
    \ = \"\"\n        return false\n    }\n}\nRecipe 6-8\nUITextField with Prefix\n\
    ```\n\nAs you can see, the `setPrefix` method has an asynchronous part. We need\
    \ it to let `UILabel` update before using its new width. If asynchronous parts\
    \ are not acceptable for you, you can calculate the text width manually.\n\nFor\
    \ demo purposes, this recipe contains an extension setting a new label text every\
    \ time the user taps *return*. Don’t use this extension in a real-life app."
  raw: '## Working with Emojis


    Emojis appeared in the 1980s and became popular in the 1990s. Back then, there
    were no pictures, just text signs. Eyes were a colon; noses, a dash; and mouths
    – brackets. Like this: `:-)`. You could see a face only by turning your head to
    the side, but it was better than nothing. Without seeing your interlocutor or
    hearing their voice, you didn’t know their intonation.


    Within time, emojis became a big part of Internet culture and little by little
    migrated to other aspects of our lives. The Unicode Consortium adds more and more
    emojis to the standard; on-screen keyboards have a separate layout with emojis;
    finally, they became not just pictures, but often animated pictures.


    At the same time, emojis can be a problem for us, developers. Even being standardized,
    emojis still can be encoded differently, and new emojis may not be supported by
    old devices or old versions of operating systems. That’s why it’s better to block
    them from most text inputs. They can be totally acceptable in social network posts,
    comments, and video descriptions, but users shouldn’t be able to use emojis in
    fields for email addresses, passwords, legal names, bank account numbers, etc.


    To block users from entering emojis, we need two steps:


    *   Detect that String has emojis.


    *   Block texts with emojis from the `UITextField` delegate.


    ### Detecting Emojis in Strings


    Similarly to string analyzers from Chapter [3](#515103_1_En_3_Chapter.xhtml),
    let’s add some extensions to detect if `String` has emojis (Recipe [6-5](#515103_1_En_6_Chapter.xhtml#PC11)).
    As we know, `String` is a sequence of `Character` instances. To make sure `String`
    doesn’t have emojis, we need to check each `Character`. To check if `String` has
    emojis, we need to find at least one `Character`, which is an emoji.


    ```

    extension Character {

    var isSimpleEmoji: Bool {

    guard let firstScalar = unicodeScalars.first else { return false }

    return firstScalar.properties.isEmoji && firstScalar.value > 0x238C

    }

    var isCombinedIntoEmoji: Bool { unicodeScalars.count > 1 && unicodeScalars.first?.properties.isEmoji
    ?? false }

    var isEmoji: Bool { isSimpleEmoji || isCombinedIntoEmoji }

    }

    Recipe 6-5

    Checking If Character Is Emoji

    ```


    What’s the difference between a simple emoji and a combined one? The problem is
    that modern emojis are not just faces and flowers, they have many other characteristics
    like skin tone, hair color, and gender. If a simple yellow face can be represented
    as one Unicode symbol, more complicated ones are sequences of symbols.


    The computed property `isEmoji` tells if `Character` is any type of emoji regardless
    of its complexity. Other extensions from Recipe [6-6](#515103_1_En_6_Chapter.xhtml#PC12)
    can be used to detect if String contains emojis.


    ```

    extension String {

    var isSingleEmoji: Bool { count == 1 && containsEmoji }

    var containsEmoji: Bool { contains { $0.isEmoji } }

    var containsOnlyEmoji: Bool { !isEmpty && !contains { !$0.isEmoji } }

    var emojiString: String { emojis.map { String($0) }.reduce("", +) }

    var emojis: [Character] { filter { $0.isEmoji } }

    var emojiScalars: [UnicodeScalar] { filter { $0.isEmoji }.flatMap { $0.unicodeScalars
    } }

    }

    Recipe 6-6

    Checking If String Contains Emoji

    ```


    We don’t need all these computer properties to analyze user input, but they can
    be useful for other purposes. For example, if you ask your user to characterize
    some post with three emojis, the `containsOnlyEmoji` function will be handy.


    ### Blocking Emoji from User Input


    To block emojis from user input, we just need to combine some of our previous
    recipes. Recipe [6-7](#515103_1_En_6_Chapter.xhtml#PC13) shows what we get.


    ```

    extension ViewController: UITextFieldDelegate {

    func textField(_ textField: UITextField, shouldChangeCharactersIn range: NSRange,
    replacementString string: String) -> Bool {

    if string.containsEmoji && !string.isEmpty {

    return false

    }

    // Validate if necessary

    return true

    }

    }

    Recipe 6-7

    Blocking Emoji from User Input

    ```


    ## Floating Prefix or Suffix


    Sometimes, we need to add noneditable text strings to the beginning or end of
    `UITextField`. It can be currency, a validation badge, or any other information.


    Depending on the text position (prefix or suffix), there are different methods.
    To add a prefix, we need to add padding to the text input. Suffixes are more complicated;
    we need to move them every time the editable text is changed.


    ### Adding Prefix


    To add a prefix, you need two steps :


    *   Add a `UILabel` object and properly align it.


    *   Add padding to `UITextField`, so the editable text will be to the right of
    the prefix.


    Let’s create two objects and add outlets:


    ```

    @IBOutlet weak var prefixLabel: UILabel!

    @IBOutlet weak var mainText: TextFieldWithPadding!

    ```


    Note


    TextFieldWithPadding is a class created in the "UITextField Paddings" section
    in Chapter [4](#515103_1_En_4_Chapter.xhtml). You can find its source code in
    Recipe [4-26](#515103_1_En_4_Chapter.xhtml#PC44).


    We need to know the width of `prefixLabel`. If it’s static, we can adjust it in
    `viewDidLayoutSubviews`. If not, we need to readjust it every time the text is
    changed.


    ```

    mainText.paddingLeft = prefixLabel.bounds.width + 8

    ```


    We add eight extra points for a gap between the prefix and the main text. The
    full solution is shown in Recipe [6-8](#515103_1_En_6_Chapter.xhtml#PC16).


    ```

    class FloatingPrefixViewController: UIViewController {

    @IBOutlet weak var prefixLabel: UILabel!

    @IBOutlet weak var mainText: TextFieldWithPadding!

    static let gapWidth = CGFloat(8)

    override func viewDidLayoutSubviews() {

    mainText.paddingLeft = prefixLabel.bounds.width + FloatingPrefixViewController.gapWidth

    }

    func setPrefix(_ prefix: String) {

    prefixLabel.text = prefix

    DispatchQueue.main.async {

    self.mainText.paddingLeft = self.prefixLabel.bounds.width + FloatingPrefixViewController.gapWidth

    }

    }

    }

    extension FloatingPrefixViewController: UITextFieldDelegate {

    func textFieldShouldReturn(_ textField: UITextField) -> Bool {

    setPrefix(textField.text ?? "")

    textField.text = ""

    return false

    }

    }

    Recipe 6-8

    UITextField with Prefix

    ```


    As you can see, the `setPrefix` method has an asynchronous part. We need it to
    let `UILabel` update before using its new width. If asynchronous parts are not
    acceptable for you, you can calculate the text width manually .


    For demo purposes, this recipe contains an extension setting a new label text
    every time the user taps *return*. Don’t use this extension in a real-life app.'
  trans: "\n# 使用表情符号\n\n表情符号出现在 20 世纪 80 年代，并在 90 年代流行起来。那时还没有图片，只有文字符号。眼睛是冒号，鼻子是短横线，嘴巴是括号。像这样：`:-)`。你只有把头侧过来才能看到一张脸，但总比没有好。看不到对方的脸也听不到他们的声音，你就无法知道他们的语调。\n\
    \n随着时间的推移，表情符号成了互联网文化的重要组成部分，并逐渐渗透到我们生活的其他方面。统一码联盟不断向标准中添加更多表情符号；屏幕键盘上也有了单独的表情符号布局；最终，它们不仅仅是图片，还常常是动画图片。\n\
    \n与此同时，表情符号对我们开发者来说可能是一个问题。即使有了标准化，表情符号的编码方式仍然可能不同，而且旧设备或旧版本的操作系统可能不支持新的表情符号。这就是为什么最好在大多数文本输入中屏蔽它们。在社交媒体帖子、评论和视频描述中，表情符号完全可以接受，但用户不应当在电子邮件地址、密码、法定姓名、银行账号等字段中使用表情符号。\n\
    \n要阻止用户输入表情符号，我们需要两个步骤：\n\n-   检测`String`中是否包含表情符号。\n-   通过`UITextField`代理阻止包含表情符号的文本。\n\
    \n## 检测字符串中的表情符号\n\n与第 3 章中的字符串分析器类似，让我们添加一些扩展来检测`String`中是否有表情符号（方案 6-5）。我们知道，`String`是一个`Character`实例的序列。为了确保`String`中没有表情符号，我们需要检查每个`Character`。要检查`String`中是否有表情符号，我们需要找到至少一个`Character`，它是一个表情符号。\n\
    \n```\nextension Character {\n    var isSimpleEmoji: Bool {\n        guard let\
    \ firstScalar = unicodeScalars.first else { return false }\n        return firstScalar.properties.isEmoji\
    \ && firstScalar.value > 0x238C\n    }\n    var isCombinedIntoEmoji: Bool { unicodeScalars.count\
    \ > 1 && unicodeScalars.first?.properties.isEmoji ?? false }\n    var isEmoji:\
    \ Bool { isSimpleEmoji || isCombinedIntoEmoji }\n}\n方案 6-5\n检查字符是否为表情符号\n```\n\
    \n简单表情符号和组合表情符号有什么区别？问题在于现代表情符号不仅仅是脸和花朵，它们还有许多其他特征，比如肤色、发色和性别。如果一个简单的黄脸可以用一个 Unicode\
    \ 符号表示，那么更复杂的表情符号就是符号序列。\n\n计算属性 `isEmoji` 告诉我们`Character`是否是任何类型的表情符号，无论其复杂性如何。方案\
    \ 6-6 中的其他扩展可用于检测`String`是否包含表情符号。\n\n```\nextension String {\n    var isSingleEmoji:\
    \ Bool { count == 1 && containsEmoji }\n    var containsEmoji: Bool { contains\
    \ { $0.isEmoji } }\n    var containsOnlyEmoji: Bool { !isEmpty && !contains {\
    \ !$0.isEmoji } }\n    var emojiString: String { emojis.map { String($0) }.reduce(\"\
    \", +) }\n    var emojis: [Character] { filter { $0.isEmoji } }\n    var emojiScalars:\
    \ [UnicodeScalar] { filter { $0.isEmoji }.flatMap { $0.unicodeScalars } }\n}\n\
    方案 6-6\n检查字符串是否包含表情符号\n```\n\n我们不需要所有这些计算属性来分析用户输入，但它们对其他目的可能有用。例如，如果你让用户用三个表情符号来描述某篇帖子，`containsOnlyEmoji`\
    \ 函数就会很方便。\n\n## 阻止用户在输入中使用表情符号\n\n要阻止用户在输入中使用表情符号，我们只需要结合之前的一些方案。方案 6-7 展示了我们得到的结果。\n\
    \n```\nextension ViewController: UITextFieldDelegate {\n    func textField(_ textField:\
    \ UITextField, shouldChangeCharactersIn range: NSRange, replacementString string:\
    \ String) -> Bool {\n        if string.containsEmoji && !string.isEmpty {\n  \
    \          return false\n        }\n        // 如有必要进行验证\n        return true\n\
    \    }\n}\n方案 6-7\n阻止用户在输入中使用表情符号\n```\n\n## 浮动前缀或后缀\n\n有时，我们需要在`UITextField`的开头或结尾添加不可编辑的文本字符串。可以是货币符号、验证徽章或任何其他信息。\n\
    \n根据文本的位置（前缀或后缀），有不同的方法。要添加前缀，我们需要给文本输入添加内边距。后缀则更复杂；每次可编辑文本发生变化时，我们都需要移动它们。\n\n\
    ### 添加前缀\n\n要添加前缀，你需要两个步骤：\n\n-   创建一个`UILabel`对象并正确对齐。\n-   给`UITextField`添加内边距，这样可编辑文本就会位于前缀的右侧。\n\
    \n让我们创建两个对象并添加插座变量：\n\n```\n@IBOutlet weak var prefixLabel: UILabel!\n@IBOutlet\
    \ weak var mainText: TextFieldWithPadding!\n```\n\n注意\n\n`TextFieldWithPadding`\
    \ 是在第 4 章“UITextField 内边距”部分创建的一个类。你可以在方案 4-26 中找到它的源代码。\n\n我们需要知道`prefixLabel`的宽度。如果它是静态的，我们可以在`viewDidLayoutSubviews`中调整它。如果不是，每次文本改变时我们都需要重新调整。\n\
    \n```\nmainText.paddingLeft = prefixLabel.bounds.width + 8\n```\n\n我们额外增加了 8 个点作为前缀和主文本之间的间距。完整的解决方案如方案\
    \ 6-8 所示。\n\n```\nclass FloatingPrefixViewController: UIViewController {\n   \
    \ @IBOutlet weak var prefixLabel: UILabel!\n    @IBOutlet weak var mainText: TextFieldWithPadding!\n\
    \    static let gapWidth = CGFloat(8)\n\n    override func viewDidLayoutSubviews()\
    \ {\n        mainText.paddingLeft = prefixLabel.bounds.width + FloatingPrefixViewController.gapWidth\n\
    \    }\n\n    func setPrefix(_ prefix: String) {\n        prefixLabel.text = prefix\n\
    \        DispatchQueue.main.async {\n            self.mainText.paddingLeft = self.prefixLabel.bounds.width\
    \ + FloatingPrefixViewController.gapWidth\n        }\n    }\n}\n\nextension FloatingPrefixViewController:\
    \ UITextFieldDelegate {\n    func textFieldShouldReturn(_ textField: UITextField)\
    \ -> Bool {\n        setPrefix(textField.text ?? \"\")\n        textField.text\
    \ = \"\"\n        return false\n    }\n}\n方案 6-8\n带前缀的 UITextField\n```\n\n如你所见，`setPrefix`\
    \ 方法中包含一个异步部分。我们需要它来让`UILabel`在用到其新宽度之前完成更新。如果异步部分对你来说不可接受，你可以手动计算文本宽度。\n\n出于演示目的，此方案包含一个扩展，每次用户点击*返回*键时都会设置一个新的标签文本。请勿在实际应用中使用此扩展。\n"
- fmt: "### Adding Suffix\n\nUnlike prefixes, suffixes are not static; they move every\
    \ time you enter a piece of text. Instead of adding padding when the layout is\
    \ ready, we need to add the `UITextField` delegate and override `func textField(_:\
    \ UITextField, shouldChangeCharactersIn: NSRange, replacementString: String) ->\
    \ Bool`.\n\nThe vertical alignment is the same as in the previous recipe, but\
    \ horizontally, `UILabel` should be aligned with the left (leading) side of `UITextField`.\
    \ We will change this constraint every time the user changes input.\n\nAnother\
    \ possible problem is the space on the right (trailing) side. If the entered text\
    \ with a suffix is wider than our area, the label will go beyond the area, or\
    \ the text will be cropped. That’s why we need to use the same class `TextFieldWithPadding`,\
    \ but with `rightPadding` instead of `leftPadding`. Recipe [6-9](#515103_1_En_6_Chapter.xhtml#PC17)\
    \ provides a solution for a floating suffix problem.\n\n```\nclass FloatingSuffixViewController:\
    \ UIViewController, UITextFieldDelegate {\n    @IBOutlet weak var suffixLabel:\
    \ UILabel!\n    @IBOutlet weak var mainText: TextFieldWithPadding!\n    @IBOutlet\
    \ weak var suffixLeadingSpace: NSLayoutConstraint!\n    static let gapWidth =\
    \ CGFloat(8)\n    override func viewDidLayoutSubviews() {\n        mainText.paddingRight\
    \ = suffixLabel.bounds.width + FloatingPrefixViewController.gapWidth\n    }\n\
    \    func setSuffix(_ suffix: String) {\n        suffixLabel.text = suffix\n \
    \       DispatchQueue.main.async {\n            self.mainText.paddingLeft = self.suffixLabel.bounds.width\
    \ + FloatingPrefixViewController.gapWidth\n        }\n    }\n    func textField(_\
    \ textField: UITextField, shouldChangeCharactersIn range: NSRange, replacementString\
    \ string: String) -> Bool {\n        if let text = textField.text,\n         \
    \  let textRange = Range(range, in: text) {\n            let updatedText = text.replacingCharacters(in:\
    \ textRange, with: string)\n            if let font = mainText.font {\n      \
    \          let fontAttributes = [NSAttributedString.Key.font: font]\n        \
    \        let size = (updatedText as NSString).size(withAttributes: fontAttributes)\n\
    \                suffixLeadingSpace.constant = size.width\n                view.layoutIfNeeded()\n\
    \            }\n        }\n        return true\n    }\n}\nRecipe 6-9\nUITextField\
    \ with Suffix\n```\n\nWidth calculation here is performed through the `NSString`\
    \ method `size`. It returns a `CGSize` structure containing text width and height\
    \ with given attributes. The only attribute we set is `NSAttributedString.Key.font`.\
    \ In iOS, the `UIFont` object contains not only the font but also font size, so\
    \ the size method has enough information to calculate.\n\n## Keyboard Handling\n\
    \nAs we discussed in the beginning of this chapter, on-screen keyboards can be\
    \ a big problem for a developer. By default, the keyboard will appear when the\
    \ user taps `UITextField` or `UITextView`, but it won’t disappear itself, and\
    \ it will do nothing but to overlap `UITextField` or `UITextView`. If you add\
    \ a field in the bottom of the screen, the keyboard will overlap it.\n\n### Hiding\
    \ the Keyboard When the User Clicks the Outside Text Field\n\nIf the text field\
    \ is not inside a scrollable area, it’s rather easy to hide it. You only need\
    \ to override one function in `UIViewController` and call `view.endEditing(true)`\
    \ as shown in Recipe [6-10](#515103_1_En_6_Chapter.xhtml#PC18).\n\n```\nclass\
    \ HidingKeyboardViewController: UIViewController {\n    override func touchesBegan(_\
    \ touches: Set<UITouch>, with event: UIEvent?) {\n        super.touchesBegan(touches,\
    \ with: event)\n        view.endEditing(true)\n    }\n}\nRecipe 6-10\nHiding the\
    \ Keyboard\n```\n\n### Hiding the Keyboard in Scrollable Areas\n\nIf you need\
    \ text input inside a scrollable area , which is rather typical for forms, the\
    \ previous recipe won’t work. It doesn’t mean you shouldn’t use it; the user can\
    \ tap the outside scrollable area, but it won’t be enough.\n\nThere are two solutions\
    \ depending on your desired behavior:\n\n- Hiding the keyboard when the user scrolls\n\
    - Hiding the keyboard when the user taps outside text fields\n\nThe first solution\
    \ requires setting one attribute of `UIScrollView`. In Interface Builder (a storyboard\
    \ editor), select your `UIScrollView` and set *Keyboard* to *Dismiss on drag*.\n\
    \nYou can do the same using code:\n\n```\nscrollView.keyboardDismissMode = .onDrag\n\
    ```\n\n### Hiding the Keyboard When the User Leaves the Screen\n\nWhen the user\
    \ leaves the screen , it’s a good practice to hide the on-screen keyboard. There\
    \ are usually two directions:\n\n- Moving to the next screen\n- Going back to\
    \ the previous screen\n\nLet’s say, you have a Next button with the `@IBAction`\
    \ function. The first line of code in this function should be\n\n```\nview.endEditing(true)\n\
    ```\n\nAs for going back, the solution is similar. In Chapter [4](#515103_1_En_4_Chapter.xhtml),\
    \ we created a universal function `goBack`. Recipe [6-11](#515103_1_En_6_Chapter.xhtml#PC21)\
    \ updates it to hide the keyboard. If the keyboard is not shown, it won’t harm\
    \ the app.\n\n```\npublic extension UIViewController {\n    @IBAction func goBack()\
    \ {\n        view.endEditing(true)\n        if let nc = navigationController,\n\
    \           nc.viewControllers.count >= 2 {\n            nc.popViewController(animated:\
    \ true)\n        } else {\n            dismiss(animated: true, completion: nil)\n\
    \        }\n    }\n}\nRecipe 6-11\nUpdated goBack Function\n```"
  raw: '### Adding Suffix


    Unlike prefixes, suffixes are not static; they move every time you enter a piece
    of text. Instead of adding padding when the layout is ready, we need to add the
    `UITextField` delegate and override `func textField(_: UITextField, shouldChangeCharactersIn:
    NSRange, replacementString: String) -> Bool`.


    The vertical alignment is the same as in the previous recipe, but horizontally,
    `UILabel` should be aligned with the left (leading) side of UITextField. We will
    change this constraint every time the user changes input.


    Another possible problem is the space on the right (trailing) side. If the entered
    text with a suffix is wider than our area, the label will go beyond the area,
    or the text will be cropped. That’s why we need to use the same class `TextFieldWithPadding`,
    but with `rightPadding` instead of `leftPadding`. Recipe [6-9](#515103_1_En_6_Chapter.xhtml#PC17)
    provides a solution for a floating suffix problem.


    ```

    class FloatingSuffixViewController: UIViewController, UITextFieldDelegate {

    @IBOutlet weak var suffixLabel: UILabel!

    @IBOutlet weak var mainText: TextFieldWithPadding!

    @IBOutlet weak var suffixLeadingSpace: NSLayoutConstraint!

    static let gapWidth = CGFloat(8)

    override func viewDidLayoutSubviews() {

    mainText.paddingRight = suffixLabel.bounds.width + FloatingPrefixViewController.gapWidth

    }

    func setSuffix(_ suffix: String) {

    suffixLabel.text = suffix

    DispatchQueue.main.async {

    self.mainText.paddingLeft = self.suffixLabel.bounds.width + FloatingPrefixViewController.gapWidth

    }

    }

    func textField(_ textField: UITextField, shouldChangeCharactersIn range: NSRange,
    replacementString string: String) -> Bool {

    if let text = textField.text,

    let textRange = Range(range, in: text) {

    let updatedText = text.replacingCharacters(in: textRange, with: string)

    if let font = mainText.font {

    let fontAttributes = [NSAttributedString.Key.font: font]

    let size = (updatedText as NSString).size(withAttributes: fontAttributes)

    suffixLeadingSpace.constant = size.width

    view.layoutIfNeeded()

    }

    }

    return true

    }

    }

    Recipe 6-9

    UITextField with Suffix

    ```


    Width calculation here is performed through the `NSString` method size. It returns
    a `CGSize` structure containing text width and height with given attributes. The
    only attribute we set is `NSAttributedString.Key.font`. In iOS, the `UIFont` object
    contains not only the font but also font size, so the size method has enough information
    to calculate.


    ## Keyboard Handling


    As we discussed in the beginning of this chapter, on-screen keyboards can be a
    big problem for a developer. By default, the keyboard will appear when the user
    taps `UITextField` or `UITextView`, but it won’t disappear itself, and it will
    do nothing but to overlap `UITextField` or `UITextView`. If you add a field in
    the bottom of the screen, the keyboard will overlap it.


    ### Hiding the Keyboard When the User Clicks the Outside Text Field


    If the text field is not inside a scrollable area, it’s rather easy to hide it.
    You only need to override one function in `UIViewController` and call `view.endEditing(true)`
    as shown in Recipe [6-10](#515103_1_En_6_Chapter.xhtml#PC18).


    ```

    class HidingKeyboardViewController: UIViewController {

    override func touchesBegan(_ touches: Set, with event: UIEvent?) {

    super.touchesBegan(touches, with: event)

    view.endEditing(true)

    }

    }

    Recipe 6-10

    Hiding the Keyboard

    ```


    ### Hiding the Keyboard in Scrollable Areas


    If you need text input inside a scrollable area , which is rather typical for
    forms, the previous recipe won’t work. It doesn’t mean you shouldn’t use it; the
    user can tap the outside scrollable area, but it won’t be enough.


    There are two solutions depending on your desired behavior:


    *   Hiding the keyboard when the user scrolls


    *   Hiding the keyboard when the user taps outside text fields


    The first solution requires setting one attribute of `UIScrollView`. In Interface
    Builder (a storyboard editor), select your `UIScrollView` and set *Keyboard* to
    *Dismiss on drag*.


    You can do the same using code:


    ```

    scrollView.keyboardDismissMode = .onDrag

    ```


    ### Hiding the Keyboard When the User Leaves the Screen


    When the user leaves the screen , it’s a good practice to hide the on-screen keyboard.
    There are usually two directions:


    *   Moving to the next screen


    *   Going back to the previous screen


    Let’s say, you have a Next button with the `@IBAction` function. The first line
    of code in this function should be


    ```

    view.endEditing(true)

    ```


    As for going back, the solution is similar. In Chapter [4](#515103_1_En_4_Chapter.xhtml),
    we created a universal function `goBack`. Recipe [6-11](#515103_1_En_6_Chapter.xhtml#PC21)
    updates it to hide the keyboard. If the keyboard is not shown, it won’t harm the
    app.


    ```

    public extension UIViewController {

    @IBAction func goBack() {

    view.endEditing(true)

    if let nc = navigationController,

    nc.viewControllers.count >= 2 {

    nc.popViewController(animated: true)

    } else {

    dismiss(animated: true, completion: nil)

    }

    }

    }

    Recipe 6-11

    Updated goBack Function

    ```'
  trans: "\n### 添加后缀\n\n与前缀不同，后缀并非静态；每次输入文本时，它们都会移动。我们不需要在布局准备就绪时添加内边距，而是需要添加 `UITextField`\
    \ 委托，并重写 `func textField(_: UITextField, shouldChangeCharactersIn: NSRange, replacementString:\
    \ String) -> Bool`。\n\n垂直对齐方式与之前的食谱相同，但在水平方向上，`UILabel` 应与 `UITextField` 的左侧（前导）对齐。每次用户更改输入时，我们都需要更改此约束。\n\
    \n另一个可能的问题是右侧（尾部）的空间。如果输入的文本加上后缀后宽度超过我们的可用区域，标签将超出区域，或者文本将被裁剪。这就是为什么我们需要使用相同的\
    \ `TextFieldWithPadding` 类，但使用 `rightPadding` 而不是 `leftPadding`。食谱 6-9 提供了浮动后缀问题的解决方案。\n\
    \n```\nclass FloatingSuffixViewController: UIViewController, UITextFieldDelegate\
    \ {\n    @IBOutlet weak var suffixLabel: UILabel!\n    @IBOutlet weak var mainText:\
