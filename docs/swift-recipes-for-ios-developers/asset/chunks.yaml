  trans: "\n### 返回操作\n\n故事板允许我们创建控制器、视图控制器以及用于在应用屏幕间切换的 Segue。它们让我们可以选择展示方式并设置转场动画，但却无法实现像“返回”这样简单的操作。\n\
    \n根据你切换到当前视图控制器的方式，可以通过以下两种方法之一实现返回：\n\n```\ndismiss(animated:, completion:)\n\
    // 以及\nnavigationController?.popViewController(animated:)\n```\n\n在这两种情况下，我们都需要创建一个\
    \ `@IBAction` 函数并将其连接到按钮上。而且这个函数在所有视图控制器中应该相同——或者几乎相同。如果我们编写一个函数（配方 4-1），无论当前视图是通过模态展示还是通过\
    \ `UINavigationController` 压入栈中，它都能精确地返回到上一个元素，那会怎样呢？\n\n```\npublic extension\
    \ UIViewController {\n    @IBAction func goBack() {\n        if let nc = navigationController,\n\
    \           nc.viewControllers.count >= 2 {\n            nc.popViewController(animated:\
    \ true)\n        } else {\n            dismiss(animated: true, completion: nil)\n\
    \        }\n    }\n}\n配方 4-1\n返回到上一个屏幕\n```\n\n首先，我们检查该 `UIViewController` 是否位于\
    \ `UINavigationController` 内。如果是，则它具有非空的 `navigationController` 属性。在这种情况下，我们需要检查它是否是那个\
    \ `UINavigationController` 的根 `UIViewController`。如果是根控制器，则无法执行 pop 操作，该操作会被直接忽略，我们需要将其\
    \ dismiss。如果 `navigationController` 为 `nil`，则意味着它从未进入 `UINavigationController`\
    \ 的栈，我们只能将其 dismiss。\n\n作为 `UIViewController` 的扩展编写，此函数将对应用中所有视图控制器可用。如果你有一个简单的“关于”屏幕，没有任何逻辑，你甚至无需为其创建\
    \ `UIViewController` 的子类。\n\n**注意**\n\n此配方在更复杂的控制器（如 `UITabController`）内部无法工作。如果你需要在用户点击返回按钮时返回到上一个标签页，你必须自行创建栈管理。\n\
    \n### 替换根视图\n\n我们之前讨论过的另一种典型情况是替换。如果你不需要某个屏幕及其之前的所有屏幕，你可以实例化一个新的视图控制器并将其设置为根视图。\n\
    \n在标准的 iOS 应用中，存在 `AppDelegate` 类。Xcode 会在你创建新项目时自动生成它。根据配置的不同，`AppDelegate` 可能拥有一个\
    \ window 属性，或者该属性可能位于 `SceneDelegate` 类中。\n\n当你获取到 `UIWindow` 对象的引用时，可以像配方 4-2\
    \ 所示那样替换根视图控制器：\n\n```\npublic extension UIWindow {\n    func replaceRootViewController(with\
    \ viewController: UIViewController) {\n        rootViewController = viewController\n\
    \        makeKeyAndVisible()\n    }\n}\n配方 4-2\n替换根视图控制器\n```\n\n这里的难点在于获取 window\
    \ 实例。在旧式项目中，我们通过 `UIApplication` 的属性获取 window。幸运的是，在包含场景的项目中，`UIApplication` 还有另一个属性——\
    \ `connectedScenes`。其中一些“连接的场景”属于 `UIWindowScene` 类型。从 `UIWindowScene` 中，我们可以提取到\
    \ `UIWindow` 对象的引用（配方 4-3 至 4-5）。\n\n```\n@available(iOS 13.0, *)\npublic extension\
    \ UIApplication {\n    var currentWindow: UIWindow? {\n        connectedScenes\n\
    \            .filter { $0.activationState == .foregroundActive }\n           \
    \ .compactMap { $0 as? UIWindowScene }\n            .first?\n            .windows\n\
    \            .first(where: { $0.isKeyWindow })\n    }\n}\n配方 4-3\n在含场景的项目中获取主\
    \ UIWindow\n```\n\n在不含场景的项目中，获取方式更简单。\n\n```\npublic extension UIWindow {\n  \
    \  static var main: UIWindow? {\n        (UIApplication.shared.delegate as? AppDelegate)?.window\n\
    \    }\n}\n配方 4-4\n在不含场景的项目中获取主 UIWindow\n```\n\n**注意**\n\n此配方假设你的应用拥有 `AppDelegate`\
    \ 类，该类实现了 `UIApplicationDelegate` 协议，并且是你的应用的主代理。\n\n最后，我们可以将所有方法封装到 `UIWindow`\
