    ## Summary


    In this chapter, we showed that even simple data types require attention, especially
    when it comes to type conversion and extracting data from complex types like dictionaries
    and arrays.


    In the next chapter, we’ll review such concepts as serialization, data exchange,
    and data semantics, when number is not just a set of bits and bytes, but length,
    weight, or distance.


    # 2. Working with JSON and Other Popular Formats


    Data in Swift is much more than basic types, arrays, and dictionaries. Also, a
    mobile app is rarely isolated from the outer world. It makes API requests and
    processes responses; it exchanges data with cloud services and works with SDKs.
    Let’s see how to work with data exchange and safely convert numbers between different
    units.


    ## How Devices Exchange Data


    Nowadays, it’s hard to imagine a computing device without external data interfaces.
    Even simple electronic devices like a coffee machine and a heater start to get
    Wi-Fi and Bluetooth interfaces to heat the room for you and make coffee when you
    come home from the cold streets.


    Fortunately for us – mobile developers – we don’t need to go deep into Wi-Fi or
    Bluetooth protocols. There’s one universal standard of data exchange, which mobile
    developers need in order to write almost any app: HTTP.


    HTTP (Hypertext Transfer Protocol) and HTTPS (the secure version of it) are application-layer
    protocols of data exchange. They use the client-server model : the client sends
    a request, and the server returns a response. Format, encoding, and other properties
    are defined by headers.


    The HTTP protocol is so popular that it’s often used to communicate within one
    device. One app becomes the server, and another – the client. To address a server,
    you need to know the URL (Uniform Resource Locator) . It has several components:
    scheme, host, port, path, arguments, and fragment.


    Desktop server apps usually reserve a port for themselves. That’s how several
    servers can coexist within one computer. Mobile apps often reserve a scheme matching
    their unique app ID. This way, one app can call another, for example, for authentication.
    Remember signing in with Facebook or Google? It works exactly this way.


    When client and server apps establish a connection, they need to exchange data.
    The data format is defined in headers, and it can have one of the predefined MIME
    (Multipurpose Internet Mail Extensions) types. If you send a request to the API,
    you can find the accepted data formats in the pertinent documentation.


    The most popular data format for APIs (Application Programming Interfaces) is
    JSON. Its MIME type is `application/json`. Another possible format is XML – `text/xml`.
    You may ask why JSON belongs to the application group while XML is text. JSON
    is JavaScript restricted with data structures, without functions. You can copy-paste
    or import JSON files to JavaScript apps, and it will read and parse it as JavaScript
    without any modifications. XML is not source code; it’s always data. If XML is
    not readable by humans and can be only processed by a parser, it can have the
    `application/xml` MIME type.


    To send data to the server as JSON, you should add a header:


    ```

    Content-Type: application/json

    ```


    The server does the same when it responds with JSON. What if you don’t include
    this header in the mobile app? Or what if the server doesn’t include it into the
    response? Depending on the server software, it can accept data and detect JSON
    automatically, or reject the request as invalid. When the server doesn’t include
    a header, your mobile app can handle it the way it wants. Generally speaking,
    developers don’t want to add unnecessary error messages and make apps more fragile,
    so if you know that the server is going to respond with JSON, parse it as JSON
    regardless of headers.'
