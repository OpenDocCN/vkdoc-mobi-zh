- fmt: "# Downloading and Caching Images\n\nWe don’t usually need to do the downloading\
    \ and caching of images manually, but it’s important to understand the principles.\
    \ We have an image URL and a cache storage. The storage is basically a `Dictionary`.\
    \ Keys are URLs, or for better performance, they can be URL hashes. Values are\
    \ either images or image paths in the local filesystem.\n\nLet’s start with the\
    \ algorithm:\n\n- We get the URL and check if it’s in cache.\n- If it’s in cache,\
    \ we return the existing image.\n- If it’s not in cache, we download it and add\
    \ it to cache.\n- Before adding the image to cache, we need to check the cache\
    \ size. If it has too many elements, we need to clean some of the old data. If\
    \ the cache contains references to the local filesystem, we can have more items.\
    \ If all the images are stored in memory, we’d better limit it to 10`–`20 elements.\n\
    \n## Downloading Files\n\nWe will review two ways of downloading files. One is\
    \ using native iOS frameworks – another is with the help of a very popular framework:\
    \ Alamofire.\n\nFile, or specifically image downloading, is no different from\
    \ any GET request. We compose a request from the URL, headers, arguments, and\
    \ other data. Depending on the HTTP framework, it can be done differently, but\
    \ the idea behind it is the same.\n\nAs we discuss image processing in this chapter,\
    \ we’ll simplify network components to a minimum. We’ll assume that the image\
    \ is openly located on the Web and doesn’t require authorization for downloading.\n\
    \n### Downloading Files with Alamofire\n\nBefore using Alamofire, you should add\
    \ it to your project. If you use Swift Package Manager, add this package: [`https://github.com/Alamofire/Alamofire`](https://github.com/Alamofire/Alamofire).\n\
    \nFor CocoaPods, add this line to your `Podfile`:\n\n```\npod 'Alamofire'\n```\n\
    \nHaving the file URL, you can download it with an asynchronous request (see Recipe\
    \ 5-5). *Asynchronous* means that method call doesn’t do all its functionality\
    \ instantly. Some of it (in our case, downloading) takes time, and this method\
    \ doesn’t hold the app execution until the file is downloaded.\n\n> **Note** \
    \ \n> Swift 5.5 offers `async`/`await` keywords, making the asynchronous method\
    \ calls act almost like they’re synchronous, removing closures and twisted code.\
    \ This technology is new, and most of the frameworks don’t support it natively,\
    \ but it’s rather easy to turn any function with completion handler into asynchronous\
    \ function. We’ll review it later in this chapter.\n\n```\nimport Alamofire\n\
    func downloadFile(url: String, delegate: @escaping (_ data: Data?, _ error: Error?)\
    \ -> Void) {\nAF.request(url)\n.responseData { response in\nDispatchQueue.main.async\
    \ {\nif let data = response.data {\n// We have Data object here\ndelegate(data,\
    \ nil)\n} else {\ndelegate(nil, response.error)\n}\n}\n}\n}\nRecipe 5-5\nDownloading\
    \ Data with Alamofire\n```\n\n### Downloading Files with URLSession/URLRequest\n\
    \nUsing external libraries simplifies the code, but it makes your app heavier\
    \ in the process. If you’re writing a big app, you may want to download files\
    \ natively as shown in Recipe 5-6 to keep the app as small and fast as possible.\n\
    \n```\nfunc downloadFileNatively(url: URL, delegate: @escaping (_ data: Data?,\
    \ _ error: Error?) -> Void) {\nlet sessionConfig = URLSessionConfiguration.default\n\
    let session = URLSession(configuration: sessionConfig)\nlet request = URLRequest(url:\
    \ url)\nlet task = session.dataTask(with: request) { data, response, error in\n\
    DispatchQueue.main.async {\nif let data = data {\n// We have Data object here\n\
    delegate(data, nil)\n} else {\ndelegate(nil, error)\n}\n}\n}\ntask.resume()\n\
    }\nRecipe 5-6\nDownloading Files Natively\n```\n\nHaving a `Data` object, we can\
    \ move on to the next step.\n\n## Turning Function with Completion Handler into\
    \ an Asynchronous One\n\nMultiple asynchronous calls make app logic twisted and\
    \ potentially buggy. When you make an API call, then process it and make more\
    \ calls depending on the result of the first one, you get either many small functions\
    \ or one big and nonmaintainable.\n\nIn Swift 5.5, Apple introduced a new technology\
    \ – asynchronous functions. If you work with other programming languages, like\
    \ JavaScript or Dart, you may already know the concept.\n\nRegular function with\
    \ completion handler does some work in the background thread and then returns\
    \ the result into an escaping function passed as an argument. This function usually\
    \ takes two arguments – correct result and error. For example:\n\n```\nfunc download(url:\
    \ URL, completion: @escaping (_ result: Data?, _ error: Error?) -> Void)\n```\n\
    \nIf downloading is successful, the result `Data` object is returned, and `error`\
    \ is `nil`. Otherwise, `result` is `nil`, and `error` indicates the problem.\n\
    \nIn Swift 5.5, you can rewrite it this way:\n\n```\nfunc downloadAsync(url: URL)\
    \ async throws -> Data\n```\n\nHaving the original function with completion handler,\
    \ we can write the second one as shown in Recipe 5-7.\n\n```\nfunc downloadAsync(url:\
    \ URL) async throws -> Data {\ntry await withUnsafeThrowingContinuation { continuation\
    \ in\ndownload(url: url) { data, error in\nif let error = error {\ncontinuation.resume(throwing:\
    \ error)\n} else if let data = data {\ncontinuation.resume(returning: data)\n\
    }\nfatalError(\"Error in download function\")\n}\n}\n}\nRecipe 5-7\nAsync Wrapper\n\
    ```\n\nReplace `download` with `downloadFile` or `downloadFileNatively`, and you’ll\
    \ get an async version of any of these functions. This is how to use it:\n\n```\n\
    do {\nlet downloadResult = try await downloadAsync(url: url)\n// downloadedResult\
    \ has a Data object, non-optional\n} catch {\nprint(error)\n}\n```\n\n## Caching\
    \ Files in Memory\n\nThe simplest and fastest way is to keep downloaded files\
    \ in memory. The disadvantage is that the memory of iOS apps is rather limited.\
    \ Even though the limit is high (an app can take up to 5 GB), using a lot of memory\
    \ is not recommended. iOS may close background apps while your app is in the foreground,\
    \ and even worse, as soon as your app goes to the background, it will be likely\
    \ unloaded together with your cache.\n\nRecipe 5-8 shows the simplest implementation\
    \ of cache without size control.\n\n```\npublic class SimpleImageCache {\nprivate\
    \ var cache: [Int: Data] = [:]\npublic func addToCache(url: String, data: Data)\
    \ {\ncache[url.hash] = data\n}\npublic func getFromCache(url: String) -> Data?\
    \ {\ncache[url.hash]\n}\npublic static let sharedInstance = SimpleImageCache()\n\
    }\nRecipe 5-8\nSimple Memory Cache\n```\n\nRecipe 5-9 uses this class to implement\
    \ image loading with cache.\n\n```\nfunc downloadFileWithCache(url: URL, delegate:\
    \ @escaping (_ data: Data?, _ error: Error?) -> Void) {\nif let data = SimpleImageCache.sharedInstance.getFromCache(url:\
    \ url.absoluteString) {\ndelegate(data, nil)\nreturn\n}\nlet sessionConfig = URLSessionConfiguration.default\n\
    let session = URLSession(configuration: sessionConfig)\nlet request = URLRequest(url:\
    \ url)\nlet task = session.dataTask(with: request) { data, response, error in\n\
    if let data = data {\nSimpleImageCache.sharedInstance.addToCache(url: url.absoluteString,\
    \ data: data)\ndelegate(data, nil)\n} else {\ndelegate(nil, error ?? NSError())\n\
    }\n}\ntask.resume()\n}\nRecipe 5-9\nDownloading Files with Cache\n```\n\nWhen\
    \ writing asynchronous functions with delegates, we should always remember that\
    \ all parts of the code should call `delegate`. Otherwise, the user may get blocked\
    \ with an eternal loading. It’s better to show an error, even if it doesn’t have\
    \ any useful information other than to block the user and force them to close\
    \ your app (probably forever).\n\n## Caching Files in Filesystem\n\nThere are\
    \ two big differences between caching files in memory and in filesystem:\n\n-\
    \ The memory gets cleaned every time the app is restarted, so we don’t need to\
    \ clean the cache ourselves.\n- Cached files aren’t stored in a structure like\
    \ `Dictionary`; we must take care of them ourselves.\n\nThe rest is similar."
  raw: '## Downloading and Caching Images


    We don’t usually need to do the downloading and caching of images manually, but
    it’s important to understand the principles. We have an image URL and a cache
    storage. The storage is basically a `Dictionary`. Keys are URLs, or for better
    performance, they can be URL hashes. Values are either images or image paths in
    the local filesystem.


    Let’s start with the algorithm:


    *   We get the URL and check if it’s in cache.


    *   If it’s in cache, we return the existing image.


    *   If it’s not in cache, we download it and add it to cache.


    *   Before adding the image to cache, we need to check the cache size. If it has
    too many elements, we need to clean some of the old data. If the cache contains
    references to the local filesystem, we can have more items. If all the images
    are stored in memory, we’d better limit it to 10`–`20 elements.


    ### Downloading Files


    We will review two ways of downloading files. One is using native iOS frameworks
    – another is with the help of a very popular framework: Alamofire.


    File, or specifically image downloading, is no different from any GET request.
    We compose a request from the URL, headers, arguments, and other data. Depending
    on the HTTP framework, it can be done differently, but the idea behind it is the
    same.


    As we discuss image processing in this chapter, we’ll simplify network components
    to a minimum. We’ll assume that the image is openly located on the Web and doesn’t
    require authorization for downloading.


    #### Downloading Files with Alamofire


    Before using Alamofire, you should add it to your project . If you use Swift Package
    Manager, add this package: [`https://github.com/Alamofire/Alamofire`](https://github.com/Alamofire/Alamofire)
    .


    For CocoaPods, add this line to your Podfile:


    ```

    pod ''Alamofire''

    ```


    Having the file URL, you can download it with an asynchronous request (see Recipe
    [5-5](#515103_1_En_5_Chapter.xhtml#PC6)). *Asynchronous* means that method call
    doesn’t do all its functionality instantly. Some of it (in our case, downloading)
    takes time, and this method doesn’t hold the app execution until the file is downloaded.


    Note


    Swift 5.5 offers async/await keywords, making the asynchronous method calls act
    almost like they’re synchronous, removing closures and twisted code. This technology
    is new, and most of the frameworks don’t support it natively, but it’s rather
    easy to turn any function with completion handler into asynchronous function.
    We’ll review it later in this chapter.


    ```

    import Alamofire

    func downloadFile(url: String, delegate: @escaping (_ data: Data?, _ error: Error?)
    -> Void) {

    AF.request(url)

    .responseData { response in

    DispatchQueue.main.async {

    if let data = response.data {

    // We have Data object here

    delegate(data, nil)

    } else {

    delegate(nil, response.error)

    }

    }

    }

    }

    Recipe 5-5

    Downloading Data with Alamofire

    ```


    #### Downloading Files with URLSession/URLRequest


    Using external libraries simplifies the code , but it makes your app heavier in
    the process. If you’re writing a big app, you may want to download files natively
    as shown in Recipe [5-6](#515103_1_En_5_Chapter.xhtml#PC7) to keep the app as
    small and fast as possible.


    ```

    func downloadFileNatively(url: URL, delegate: @escaping (_ data: Data?, _ error:
    Error?) -> Void) {

    let sessionConfig = URLSessionConfiguration.default

    let session = URLSession(configuration: sessionConfig)

    let request = URLRequest(url: url)

    let task = session.dataTask(with: request) { data, response, error in

    DispatchQueue.main.async {

    if let data = data {

    // We have Data object here

    delegate(data, nil)

    } else {

    delegate(nil, error)

    }

    }

    }

    task.resume()

    }

    Recipe 5-6

    Downloading Files Natively

    ```


    Having a `Data` object, we can move on to the next step.


    ### Turning Function with Completion Handler into an Asynchronous One


    Multiple asynchronous calls make app logic twisted and potentially buggy. When
    you make an API call, then process it and make more calls depending on the result
    of the first one, you get either many small functions or one big and nonmaintainable.


    In Swift 5.5, Apple introduced a new technology – asynchronous functions . If
    you work with other programming languages, like JavaScript or Dart, you may already
    know the concept.


    Regular function with completion handler does some work in the background thread
    and then returns the result into an escaping function passed as an argument. This
    function usually takes two arguments – correct result and error. For example:


    ```

    func download(url: URL, completion: @escaping (_ result: Data?, _ error: Error?)
    -> Void)

    ```


    If downloading is successful, the result `Data` object is returned, and `error`
    is `nil`. Otherwise, `result` is `nil`, and `error` indicates the problem.


    In Swift 5.5, you can rewrite it this way:


    ```

    func downloadAsync(url: URL) async throws -> Data

    ```


    Having the original function with completion handler, we can write the second
    one as shown in Recipe [5-7](#515103_1_En_5_Chapter.xhtml#PC10).


    ```

    func downloadAsync(url: URL) async throws -> Data {

    try await withUnsafeThrowingContinuation { continuation in

    download(url: url) { data, error in

    if let error = error {

    continuation.resume(throwing: error)

    } else if let data = data {

    continuation.resume(returning: data)

    }

    fatalError("Error in download function")

    }

    }

    }

    Recipe 5-7

    Async Wrapper

    ```


    Replace download with `downloadFile` or `downloadFileNatively`, and you’ll get
    an async version of any of these functions. This is how to use it:


    ```

    do {

    let downloadResult = try await downloadAsync(url: url)

    // downloadedResult has a Data object, non-optional

    } catch {

    print(error)

    }

    ```


    ### Caching Files in Memory


    The simplest and fastest way is to keep downloaded files in memory . The disadvantage
    is that the memory of iOS apps is rather limited. Even though the limit is high
    (an app can take up to 5 GB), using a lot of memory is not recommended. iOS may
    close background apps while your app is in the foreground, and even worse, as
    soon as your app goes to the background, it will be likely unloaded together with
    your cache.


    Recipt [5-8](#515103_1_En_5_Chapter.xhtml#PC12) shows the simplest implementation
    of cache without size control.


    ```

    public class SimpleImageCache {

    private var cache: [Int: Data] = [:]

    public func addToCache(url: String, data: Data) {

    cache[url.hash] = data

    }

    public func getFromCache(url: String) -> Data? {

    cache[url.hash]

    }

    public static let sharedInstance = SimpleImageCache()

    }

    Recipe 5-8

    Simple Memory Cache

    ```


    Recipe [5-9](#515103_1_En_5_Chapter.xhtml#PC13) uses this class to implement image
    loading with cache.


    ```

    func downloadFileWithCache(url: URL, delegate: @escaping (_ data: Data?, _ error:
    Error?) -> Void) {

    if let data = SimpleImageCache.sharedInstance.getFromCache(url: url.absoluteString)
    {

    delegate(data, nil)

    return

    }

    let sessionConfig = URLSessionConfiguration.default

    let session = URLSession(configuration: sessionConfig)

    let request = URLRequest(url: url)

    let task = session.dataTask(with: request) { data, response, error in

    if let data = data {

    SimpleImageCache.sharedInstance.addToCache(url: url.absoluteString, data: data)

    delegate(data, nil)

    } else {

    delegate(nil, error ?? NSError())

    }

    }

    task.resume()

    }

    Recipe 5-9

    Downloading Files with Cache

    ```


    When writing asynchronous functions with delegates, we should always remember
    that all parts of the code should call delegate. Otherwise, the user may get blocked
    with an eternal loading. It’s better to show an error, even if it doesn’t have
    any useful information other than to block the user and force them to close your
    app (probably forever).


    ### Caching Files in Filesystem


    There are two big differences between caching files in memory and in filesystem
    :


    *   The memory gets cleaned every time the app is restarted, so we don’t need
    to clean the cache ourselves.


    *   Cached files aren’t stored in a structure like `Dictionary`; we must take
    care of them ourselves.


    The rest is similar.'
  trans: "\n# 下载与缓存图像\n\n通常我们不需要手动完成图像的下载和缓存，但理解其原理十分重要。我们有一个图像 URL 和一个缓存存储器。该存储器本质上是一个`Dictionary`。键是\
    \ URL，或者为了获得更好的性能，也可以是 URL 的哈希值。值可以是图像本身，也可以是本地文件系统中的图像路径。\n\n让我们从算法开始：\n\n- 获取\
    \ URL，检查它是否在缓存中。\n- 如果在缓存中，则返回已有的图像。\n- 如果不在缓存中，则下载图像并将其添加到缓存中。\n- 在将图像添加到缓存之前，需要检查缓存的大小。如果其中元素过多，则需要清理一些旧数据。如果缓存包含对本地文件系统的引用，则可以容纳更多项目。如果所有图像都存储在内存中，最好将其限制在\
    \ 10`–`20 个元素。\n\n## 下载文件\n\n我们将回顾两种下载文件的方式。一种是使用 iOS 原生框架，另一种是借助一个非常流行的框架：Alamofire。\n\
    \n文件下载，具体来说就是图像下载，与任何 GET 请求并无二致。我们根据 URL、请求头、参数和其他数据构建一个请求。根据所使用的 HTTP 框架，实现方式可能有所不同，但其背后的理念是相同的。\n\
    \n由于本章讨论的是图像处理，我们将会把网络组件简化到最低限度。我们假设图像在网络上公开可访问，并且下载无需授权。\n\n### 使用 Alamofire\
    \ 下载文件\n\n在使用 Alamofire 之前，你应该将其添加到你的项目中。如果你使用 Swift Package Manager，请添加这个包：[`https://github.com/Alamofire/Alamofire`](https://github.com/Alamofire/Alamofire)。\n\
    \n对于 CocoaPods，请在你的`Podfile`中添加这一行：\n\n```\npod 'Alamofire'\n```\n\n拥有文件 URL 后，你可以通过异步请求来下载它（参见配方\
    \ 5-5）。*异步*意味着方法调用不会立即执行其全部功能。部分功能（在我们的例子中是下载）需要耗时，但该方法不会在文件下载完成前阻塞应用的执行。\n\n\
    > **注意**  \n> Swift 5.5 提供了 `async`/`await` 关键字，使得异步方法调用几乎像同步调用一样，去除了闭包和扭曲的代码。这项技术是新的，大多数框架尚未原生支持，但将任何带有完成处理器的函数转换为异步函数是相当容易的。我们将在本章后面部分进行回顾。\n\
    \n```\nimport Alamofire\nfunc downloadFile(url: String, delegate: @escaping (_\
    \ data: Data?, _ error: Error?) -> Void) {\nAF.request(url)\n.responseData { response\
    \ in\nDispatchQueue.main.async {\nif let data = response.data {\n// 我们在这里得到了 Data\
    \ 对象\ndelegate(data, nil)\n} else {\ndelegate(nil, response.error)\n}\n}\n}\n\
    }\n配方 5-5\n使用 Alamofire 下载数据\n```\n\n### 使用 URLSession/URLRequest 下载文件\n\n使用外部库可以简化代码，但这会使你的应用变得臃肿。如果你正在编写一个大型应用，可能希望像配方\
    \ 5-6 所示那样原生下载文件，以保持应用尽可能轻量和快速。\n\n```\nfunc downloadFileNatively(url: URL, delegate:\
    \ @escaping (_ data: Data?, _ error: Error?) -> Void) {\nlet sessionConfig = URLSessionConfiguration.default\n\
    let session = URLSession(configuration: sessionConfig)\nlet request = URLRequest(url:\
    \ url)\nlet task = session.dataTask(with: request) { data, response, error in\n\
    DispatchQueue.main.async {\nif let data = data {\n// 我们在这里得到了 Data 对象\ndelegate(data,\
    \ nil)\n} else {\ndelegate(nil, error)\n}\n}\n}\ntask.resume()\n}\n配方 5-6\n原生下载文件\n\
    ```\n\n获得一个`Data`对象后，我们就可以进入下一步了。\n\n## 将带有完成处理器的函数转换为异步函数\n\n多个异步调用会使应用逻辑变得扭曲，并可能产生错误。当你进行一个\
    \ API 调用，然后处理它，并根据第一次调用的结果进行更多调用时，你会得到许多小函数，或者一个庞大且难以维护的函数。\n\n在 Swift 5.5 中，苹果引入了一项新技术——异步函数。如果你使用过其他编程语言，比如\
    \ JavaScript 或 Dart，你可能已经熟悉了这个概念。\n\n带有完成处理器的常规函数会在后台线程中执行一些工作，然后将结果返回到作为参数传入的一个逃逸函数中。这个函数通常接受两个参数——正确结果和错误信息。例如：\n\
    \n```\nfunc download(url: URL, completion: @escaping (_ result: Data?, _ error:\
    \ Error?) -> Void)\n```\n\n如果下载成功，返回结果`Data`对象，`error`为`nil`。否则，`result`为`nil`，`error`指示问题所在。\n\
    \n在 Swift 5.5 中，你可以这样重写：\n\n```\nfunc downloadAsync(url: URL) async throws ->\
    \ Data\n```\n\n有了原始的带有完成处理器的函数，我们可以像配方 5-7 所示那样编写第二个函数。\n\n```\nfunc downloadAsync(url:\
    \ URL) async throws -> Data {\ntry await withUnsafeThrowingContinuation { continuation\
    \ in\ndownload(url: url) { data, error in\nif let error = error {\ncontinuation.resume(throwing:\
    \ error)\n} else if let data = data {\ncontinuation.resume(returning: data)\n\
    }\nfatalError(\"Error in download function\")\n}\n}\n}\n配方 5-7\n异步包装器\n```\n\n\
    将 `download` 替换为 `downloadFile` 或 `downloadFileNatively`，你将得到这些函数的异步版本。使用方法如下：\n\
    \n```\ndo {\nlet downloadResult = try await downloadAsync(url: url)\n// downloadedResult\
    \ 包含一个非可选的 Data 对象\n} catch {\nprint(error)\n}\n```\n\n## 在内存中缓存文件\n\n最简单且最快的方法是将下载的文件保存在内存中。缺点在于\
    \ iOS 应用的内存相当有限。尽管限制很高（一个应用最多可以占用 5 GB），但不建议使用大量内存。当你的应用在前台运行时，iOS 可能会关闭后台应用；更糟的是，一旦你的应用进入后台，它很可能连同你的缓存一起被卸载。\n\
    \n配方 5-8 展示了一个没有大小控制的最简单的缓存实现。\n\n```\npublic class SimpleImageCache {\nprivate\
    \ var cache: [Int: Data] = [:]\npublic func addToCache(url: String, data: Data)\
    \ {\ncache[url.hash] = data\n}\npublic func getFromCache(url: String) -> Data?\
    \ {\ncache[url.hash]\n}\npublic static let sharedInstance = SimpleImageCache()\n\
    }\n配方 5-8\n简单内存缓存\n```\n\n配方 5-9 使用了这个类来实现带缓存的图像加载。\n\n```\nfunc downloadFileWithCache(url:\
    \ URL, delegate: @escaping (_ data: Data?, _ error: Error?) -> Void) {\nif let\
    \ data = SimpleImageCache.sharedInstance.getFromCache(url: url.absoluteString)\
    \ {\ndelegate(data, nil)\nreturn\n}\nlet sessionConfig = URLSessionConfiguration.default\n\
    let session = URLSession(configuration: sessionConfig)\nlet request = URLRequest(url:\
    \ url)\nlet task = session.dataTask(with: request) { data, response, error in\n\
    if let data = data {\nSimpleImageCache.sharedInstance.addToCache(url: url.absoluteString,\
    \ data: data)\ndelegate(data, nil)\n} else {\ndelegate(nil, error ?? NSError())\n\
    }\n}\ntask.resume()\n}\n配方 5-9\n带缓存下载文件\n```\n\n在编写带有委托的异步函数时，我们应始终牢记，代码的所有部分都应该调用`delegate`。否则，用户可能会被永久的加载状态卡住。最好显示一个错误，即使它除了阻止用户并迫使他们关闭你的应用（可能永远不再打开）之外，没有任何有用的信息。\n\
    \n## 在文件系统中缓存文件\n\n在内存中缓存文件和在文件系统中缓存文件有两个主要区别：\n\n- 每次应用重启时，内存都会被清理，因此我们无需自行清理缓存。\n\
    - 缓存的文件不会存储在像 `Dictionary` 这样的结构中；我们必须自己管理它们。\n\n其余部分相似。\n"
- fmt: "### Obtaining Directory Paths\n\nBefore writing any file, we should get a\
    \ location. There are three possible locations for cache:\n\n*   Documents directory\n\
    *   Caches directory\n*   Temporary directory\n\nWe’re not forced to use caches\
    \ directory to store our cache, but it’s a good practice. In different situations,\
    \ iOS will treat these locations differently. For example, if the phone memory\
    \ is full, we expect iOS to clean caches and temporary directories. Documents\
    \ directories of installed apps, on the other hand, shouldn’t be touched without\
    \ the user’s direct instruction. Recipe [5-10](#515103_1_En_5_Chapter.xhtml#PC14)\
    \ shows how to obtain the most common paths.\n\n```\n// Get user's documents directory\
    \ path\nfunc getDocumentDirectoryPath() -> URL {\n    let arrayPaths = FileManager.default.urls(for:\
    \ .documentDirectory, in: .userDomainMask)\n    let docDirectoryPath = arrayPaths[0]\n\
    \    return docDirectoryPath\n}\n// Get user's cache directory path\nfunc getCacheDirectoryPath()\
    \ -> URL {\n    let arrayPaths = FileManager.default.urls(for: .cachesDirectory,\
    \ in: .userDomainMask)\n    let cacheDirectoryPath = arrayPaths[0]\n    return\
    \ cacheDirectoryPath\n}\n// Get user's temp directory path\nfunc getTempDirectoryPath()\
    \ -> URL {\n    let tempDirectoryPath = URL(fileURLWithPath: NSTemporaryDirectory(),\
    \ isDirectory: true)\n    return tempDirectoryPath\n}\nRecipe 5-10\nObtaining\
    \ Directory Paths\n```\n\n### Saving Files to Cache\n\nNow when we decided that\
    \ we store our cache in a folder created specifically for this purpose, and we\
    \ have its path in a URL object, we can save downloaded files and retrieve them\
    \ as needed.\n\nApart from the files themselves, we need to store extra data about\
    \ them – for example, the original URL. As we’ll see soon enough, having the last\
    \ use date and size would be also useful for the next step.\n\nWe need to have\
    \ a known URL as well as the local file name. An obvious solution would be to\
    \ give the files names that match their URL. Obvious, but wrong. The problem is\
    \ that file names have restrictions in both length and allowed characters. The\
    \ good news is that we don’t need a full URL; we only need the hash. We can use\
    \ a hash instead of a URL.\n\nIn Recipe [5-11](#515103_1_En_5_Chapter.xhtml#PC15),\
    \ we’ll modify the `SimpleImageCache` class and turn it into `FileImageCache`.\n\
    \n```\npublic class SimpleFileImageCache {\n    private func getCacheDirectoryPath()\
    \ -> URL {\n        let arrayPaths = FileManager.default.urls(for: .cachesDirectory,\
    \ in: .userDomainMask)\n        let cacheDirectoryPath = arrayPaths[0]\n     \
    \   return cacheDirectoryPath\n    }\n    private func getLocalURL(url: String)\
    \ -> URL {\n        let baseURL = getCacheDirectoryPath()\n        return baseURL.appendingPathComponent(\"\
    \\(url.hash)\")\n    }\n    public func addToCache(url: String, data: Data) {\n\
    \        let localURL = getLocalURL(url: url)\n        _ = try? data.write(to:\
    \ localURL, options: .atomic)\n    }\n    public func getFromCache(url: String)\
    \ -> Data? {\n        let localURL = getLocalURL(url: url)\n        return try?\
    \ Data(contentsOf: localURL)\n    }\n    public static let sharedInstance = SimpleFileImageCache()\n\
    }\nRecipe 5-11\nFile Image Cache\n```\n\nThe `getCacheDirectoryPath` function\
    \ is turned into a private method, but it can be used from our previous recipe\
    \ directly.\n\nThe `addToCache` method doesn’t always succeed. For example, if\
    \ the memory is full, it will fail. But this shouldn’t completely break the app;\
    \ it will just make it glitchy. It’s not good, but there’s not much to do to handle\
    \ this situation. We don’t even need to show error popups. With many failed attempts,\
    \ it can break the app much worse.\n\n### Verifying Cache Size\n\nDepending on\
    \ the storage place, there are two different ways to verify the cache size:\n\n\
    *   If the cached files are stored in memory, we can go through all `Data` objects\
    \ and sum up their sizes.\n*   If the cached files are stored in filesystem, we\
    \ need either to calculate all sizes or store them in an indexing file.\n\nNow\
    \ when we’re having cleaner cache, we’ll need to store date and time to remove\
    \ the oldest ones. And here’s the question: Do we need to delete the files that\
    \ were downloaded earlier, or the ones that were used earlier? Both solutions\
    \ are valid, but the second one is more effective. Recipe [5-12](#515103_1_En_5_Chapter.xhtml#PC16)\
    \ offers a new `ImageCache` class based on previous solutions to keep the data\
    \ of the last use and update it every time the image is accessed. When the cache\
    \ is full, we’ll delete 30% of the images, which are out of use longer than others.\n\
    \nEnough words, back to coding!\n\n```\npublic class ImageCache {\n    private\
    \ struct CachedFile {\n        var hash: Int\n        var size: Int {\n      \
    \      data.count\n        }\n        var data: Data\n        var lastAccess:\
    \ Date\n    }\n    private var cache: [Int: CachedFile] = [:]\n    var totalSize:\
    \ Int {\n        var size = 0\n        for f in cache.values {\n            size\
    \ += f.size\n        }\n        return size\n    }\n    var sizeThreshold = 104_857_600\
    \ // 100Mb\n    public func addToCache(url: String, data: Data) {\n        var\
    \ totalSize = self.totalSize\n        if totalSize + data.count > sizeThreshold\
    \ {\n            // Remove 10% of cached files\n            let sortedFiles =\
    \ cache.values.sorted { cf1, cf2 in\n                cf1.lastAccess.timeIntervalSince1970\
    \ < cf2.lastAccess.timeIntervalSince1970\n            }\n            while totalSize\
    \ + data.count > sizeThreshold * 9 / 10 {\n                guard let lastFile\
    \ = sortedFiles.last else {\n                    break\n                }\n  \
    \              totalSize -= lastFile.size\n                cache.removeValue(forKey:\
    \ lastFile.hash)\n            }\n        }\n        cache[url.hash] = CachedFile(hash:\
    \ url.hash, data: data, lastAccess: Date())\n    }\n    public func getFromCache(url:\
    \ String) -> Data? {\n        guard var cacheFile = cache[url.hash] else {\n \
    \           return nil\n        }\n        cacheFile.lastAccess = Date()\n   \
    \     return cacheFile.data\n    }\n    public static let sharedInstance = ImageCache()\n\
    }\nRecipe 5-12\nMemory Caching System\n```\n\nThe `CachedFile` structure contains\
    \ all necessary information about the cached file. The `lastAccess` field is modified\
    \ every time the image is requested.\n\nThe `sizeThreshold` field defines how\
    \ much memory can be used for cache. By default, it’s 100 megabytes. The `addToCache`\
    \ method checks if the new image fits, and if it doesn’t, it removes files until\
    \ the cache has at least 10% free memory after adding a new file.\n\nThe next\
    \ version of our caching system (Recipe [5-13](#515103_1_En_5_Chapter.xhtml#PC17)),\
    \ `FileImageCache`, has the same principle behind. It creates cache in `init`\
    \ and cleans 10% in `deinit`, if necessary."
  raw: '#### Obtaining Directory Paths


    Before writing any file, we should get a location. There are three possible locations
    for cache:


    *   Documents directory


    *   Caches directory


    *   Temporary directory


    We’re not forced to use caches directory to store our cache, but it’s a good practice.
    In different situations, iOS will treat these locations differently. For example,
    if the phone memory is full, we expect iOS to clean caches and temporary directories.
    Documents directories of installed apps, on the other hand, shouldn’t be touched
    without the user’s direct instruction. Recipe [5-10](#515103_1_En_5_Chapter.xhtml#PC14)
    shows how to obtain the most common paths.


    ```

    // Get user''s documents directory path

    func getDocumentDirectoryPath() -> URL {

    let arrayPaths = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)

    let docDirectoryPath = arrayPaths[0]

    return docDirectoryPath

    }

    // Get user''s cache directory path

    func getCacheDirectoryPath() -> URL {

    let arrayPaths = FileManager.default.urls(for: .cachesDirectory, in: .userDomainMask)

    let cacheDirectoryPath = arrayPaths[0]

    return cacheDirectoryPath

    }

    // Get user''s temp directory path

    func getTempDirectoryPath() -> URL {

    let tempDirectoryPath = URL(fileURLWithPath: NSTemporaryDirectory(), isDirectory:
    true)

    return tempDirectoryPath

    }

    Recipe 5-10

    Obtaining Directory Paths

    ```


    #### Saving Files to Cache


    Now when we decided that we store our cache in a folder created specifically for
    this purpose, and we have its path in a URL object, we can save downloaded files
    and retrieve them as needed.


    Apart from the files themselves, we need to store extra data about them – for
    example, the original URL. As we’ll see soon enough, having the last use date
    and size would be also useful for the next step.


    We need to have a known URL as well as the local file name. An obvious solution
    would be to give the files names that match their URL. Obvious, but wrong. The
    problem is that file names have restrictions in both length and allowed characters.
    The good news is that we don’t need a full URL; we only need the hash. We can
    use a hash instead of a URL.


    In Recipe [5-11](#515103_1_En_5_Chapter.xhtml#PC15), we’ll modify the `SimpleImageCache`
    class and turn it into `FileImageCache` .


    ```

    public class SimpleFileImageCache {

    private func getCacheDirectoryPath() -> URL {

    let arrayPaths = FileManager.default.urls(for: .cachesDirectory, in: .userDomainMask)

    let cacheDirectoryPath = arrayPaths[0]

    return cacheDirectoryPath

    }

    private func getLocalURL(url: String) -> URL {

    let baseURL = getCacheDirectoryPath()

    return baseURL.appendingPathComponent("\(url.hash)")

    }

    public func addToCache(url: String, data: Data) {

    let localURL = getLocalURL(url: url)

    _ = try? data.write(to: localURL, options: .atomic)

    }

    public func getFromCache(url: String) -> Data? {

    let localURL = getLocalURL(url: url)

    return try? Data(contentsOf: localURL)

    }

    public static let sharedInstance = SimpleFileImageCache()

    }

    Recipe 5-11

    File Image Cache

    ```


    The `getCacheDirectoryPathfunction` is turned into a private method, but it can
    be used from our previous recipe directly.


    The `addToCachemethod` doesn’t always succeed. For example, if the memory is full,
    it will fail. But this shouldn’t completely break the app; it will just make it
    glitchy. It’s not good, but there’s not much to do to handle this situation. We
    don’t even need to show error popups. With many failed attempts, it can break
    the app much worse.


    ### Verifying Cache Size


    Depending on the storage place, there are two different ways to verify the cache
    size :


    *   If the cached files are stored in memory, we can go through all Data objects
    and sum up their sizes.


    *   If the cached files are stored in filesystem, we need either to calculate
    all sizes or store them in an indexing file.


    Now when we’re having cleaner cache, we’ll need to store date and time to remove
    the oldest ones. And here’s the question: Do we need to delete the files that
    were downloaded earlier, or the ones that were used earlier? Both solutions are
    valid, but the second one is more effective. Recipe [5-12](#515103_1_En_5_Chapter.xhtml#PC16)
    offers a new `ImageCache` class based on previous solutions to keep the data of
    the last use and update it every time the image is accessed. When the cache is
    full, we’ll delete 30% of the images, which are out of use longer than others.


    Enough words, back to coding!


    ```

    public class ImageCache {

    private struct CachedFile {

    var hash: Int

    var size: Int {

    data.count

    }

    var data: Data

    var lastAccess: Date

    }

    private var cache: [Int: CachedFile] = [:]

    var totalSize: Int {

    var size = 0

    for f in cache.values {

    size += f.size

    }

    return size

    }

    var sizeThreshold = 104_857_600 // 100Mb

    public func addToCache(url: String, data: Data) {

    var totalSize = self.totalSize

    if totalSize + data.count > sizeThreshold {

    // Remove 10% of cached files

    let sortedFiles = cache.values.sorted { cf1, cf2 in

    cf1.lastAccess.timeIntervalSince1970  sizeThreshold * 9 / 10 {

    guard let lastFile = sortedFiles.last else {

    break

    }

    totalSize -= lastFile.size

    cache.removeValue(forKey: lastFile.hash)

    }

    }

    cache[url.hash] = CachedFile(hash: url.hash, data: data, lastAccess: Date())

    }

    public func getFromCache(url: String) -> Data? {

    guard var cacheFile = cache[url.hash] else {

    return nil

    }

    cacheFile.lastAccess = Date()

    return cacheFile.data

    }

    public static let sharedInstance = ImageCache()

    }

    Recipe 5-12

    Memory Caching System

    ```


    The `CachedFile` structure contains all necessary information about the cached
    file. The `lastAccess` field is modified every time the image is requested.


    The `sizeThreshold` field defines how much memory can be used for cache. By default,
    it’s 100 megabytes. The `addToCache` method checks if the new image fits, and
    if it doesn’t, it removes files until the cache has at least 10% free memory after
    adding a new file.


    The next version of our caching system (Recipe [5-13](#515103_1_En_5_Chapter.xhtml#PC17)),
    `FileImageCache`, has the same principle behind. It creates cache in `init` and
    cleans 10% in `deinit`, if necessary.'
  trans: "\n### 获取目录路径\n\n在写入任何文件之前，我们需要先确定存储位置。缓存数据有三种可能的存储位置：\n\n*   Documents 目录\n\
    *   Caches 目录\n*   Temporary 目录\n\n我们并非必须使用 Caches 目录来存储缓存，但这是一种良好的实践。在不同情况下，iOS\
    \ 会以不同方式对待这些目录。例如，当手机内存已满时，我们希望 iOS 能清理 caches 和 temporary 目录。另一方面，已安装应用的 Documents\
    \ 目录，在没有用户明确指令的情况下不应被改动。技巧 5-10 展示了如何获取最常见的路径。\n\n```\n// 获取用户的 documents 目录路径\n\
    func getDocumentDirectoryPath() -> URL {\n    let arrayPaths = FileManager.default.urls(for:\
    \ .documentDirectory, in: .userDomainMask)\n    let docDirectoryPath = arrayPaths[0]\n\
    \    return docDirectoryPath\n}\n// 获取用户的 cache 目录路径\nfunc getCacheDirectoryPath()\
    \ -> URL {\n    let arrayPaths = FileManager.default.urls(for: .cachesDirectory,\
    \ in: .userDomainMask)\n    let cacheDirectoryPath = arrayPaths[0]\n    return\
    \ cacheDirectoryPath\n}\n// 获取用户的 temp 目录路径\nfunc getTempDirectoryPath() -> URL\
    \ {\n    let tempDirectoryPath = URL(fileURLWithPath: NSTemporaryDirectory(),\
    \ isDirectory: true)\n    return tempDirectoryPath\n}\n技巧 5-10\n获取目录路径\n```\n\n\
    ### 将文件保存到缓存\n\n既然我们决定将缓存存储在一个为此目的专门创建的文件夹中，并且已经通过 URL 对象获得了该文件夹的路径，那么我们就可以保存下载的文件，并在需要时进行检索。\n\
    \n除了文件本身，我们还需要存储关于它们的额外数据——例如，原始 URL。我们很快就会发现，记录最后使用日期和文件大小对于下一步操作也很有用。\n\n我们需要一个已知的\
    \ URL 以及本地文件名。一个显而易见的解决方案是让文件名与其 URL 相匹配。这个方案看似合理，但其实是错误的。问题在于文件名在长度和允许使用的字符上都有限制。好消息是，我们不需要完整的\
    \ URL，我们只需要它的哈希值。我们可以用哈希值来代替 URL。\n\n在技巧 5-11 中，我们将修改 `SimpleImageCache` 类，并将其转变为\
    \ `FileImageCache`。\n\n```\npublic class SimpleFileImageCache {\n    private func\
    \ getCacheDirectoryPath() -> URL {\n        let arrayPaths = FileManager.default.urls(for:\
    \ .cachesDirectory, in: .userDomainMask)\n        let cacheDirectoryPath = arrayPaths[0]\n\
    \        return cacheDirectoryPath\n    }\n    private func getLocalURL(url: String)\
    \ -> URL {\n        let baseURL = getCacheDirectoryPath()\n        return baseURL.appendingPathComponent(\"\
    \\(url.hash)\")\n    }\n    public func addToCache(url: String, data: Data) {\n\
    \        let localURL = getLocalURL(url: url)\n        _ = try? data.write(to:\
    \ localURL, options: .atomic)\n    }\n    public func getFromCache(url: String)\
    \ -> Data? {\n        let localURL = getLocalURL(url: url)\n        return try?\
    \ Data(contentsOf: localURL)\n    }\n    public static let sharedInstance = SimpleFileImageCache()\n\
    }\n技巧 5-11\n文件图像缓存\n```\n\n`getCacheDirectoryPath` 函数被改成了一个私有方法，但它仍然可以像前一个技巧中那样被直接使用。\n\
    \n`addToCache` 方法并不总是能成功。例如，如果内存已满，它就会失败。但这不应导致应用完全崩溃，只会使其变得不太稳定。这当然不好，但对此我们也没有太多办法来处理。我们甚至不需要显示错误弹窗。但如果多次尝试都失败，情况可能会变得更糟，甚至可能导致应用崩溃。\n\
    \n### 验证缓存大小\n\n根据存储位置的不同，验证缓存大小有两种不同的方法：\n\n*   如果缓存文件存储在内存中，我们可以遍历所有 `Data`\
    \ 对象并汇总它们的大小。\n*   如果缓存文件存储在文件系统中，我们需要计算所有文件的大小，或者将它们的大小存储在一个索引文件中。\n\n现在，既然我们有了更智能的缓存清理机制，就需要存储日期和时间信息，以便移除最早的文件。于是问题来了：我们是应该删除那些下载时间较早的文件，还是删除那些使用时间较早的文件？两种方案都可行，但第二种更有效。技巧\
    \ 5-12 基于之前的方案提供了一个新的 `ImageCache` 类，用于记录最后一次使用数据，并在每次访问图像时更新该数据。当缓存满了之后，我们会删除其中\
    \ 30% 的、较长时间未被使用的图像。\n\n话不多说，回到编码环节！\n\n```\npublic class ImageCache {\n    private\
    \ struct CachedFile {\n        var hash: Int\n        var size: Int {\n      \
    \      data.count\n        }\n        var data: Data\n        var lastAccess:\
    \ Date\n    }\n    private var cache: [Int: CachedFile] = [:]\n    var totalSize:\
    \ Int {\n        var size = 0\n        for f in cache.values {\n            size\
    \ += f.size\n        }\n        return size\n    }\n    var sizeThreshold = 104_857_600\
    \ // 100Mb\n    public func addToCache(url: String, data: Data) {\n        var\
    \ totalSize = self.totalSize\n        if totalSize + data.count > sizeThreshold\
    \ {\n            // 移除 10% 的缓存文件\n            let sortedFiles = cache.values.sorted\
    \ { cf1, cf2 in\n                cf1.lastAccess.timeIntervalSince1970 < cf2.lastAccess.timeIntervalSince1970\n\
    \            }\n            while totalSize + data.count > sizeThreshold * 9 /\
    \ 10 {\n                guard let lastFile = sortedFiles.last else {\n       \
    \             break\n                }\n                totalSize -= lastFile.size\n\
    \                cache.removeValue(forKey: lastFile.hash)\n            }\n   \
    \     }\n        cache[url.hash] = CachedFile(hash: url.hash, data: data, lastAccess:\
    \ Date())\n    }\n    public func getFromCache(url: String) -> Data? {\n     \
    \   guard var cacheFile = cache[url.hash] else {\n            return nil\n   \
    \     }\n        cacheFile.lastAccess = Date()\n        return cacheFile.data\n\
    \    }\n    public static let sharedInstance = ImageCache()\n}\n技巧 5-12\n内存缓存系统\n\
    ```\n\n`CachedFile` 结构体包含了缓存文件的所有必要信息。每次请求图像时，`lastAccess` 字段都会被更新。\n\n`sizeThreshold`\
