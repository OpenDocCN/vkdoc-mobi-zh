- fmt: '### Component State


    We already used the `@State` keyword in several recipes. What is `@State` and
    how does it change our `View`?


    `@State` is a property wrapper, which means it generates some code behind the
    scenes. It creates a storage and moves our variable out of struct as it’s a value
    type. It’s recommended to make `@State` variables private and initialize them
    right after the declaration, without a constructor.


    `@State` variables are used to keep the `View` state. Depending on component logic,
    it can be a text string, a Boolean value, a number, or a structure. `@State` variables
    can be directly used in layout, and even more, the layout can change them in response
    to the user’s actions.


    `@State` variables shouldn’t be shared between objects. They’re not observable,
    and their changes can’t be handled by `willSet` or `didSet`. To run some code
    when the `@State` variable is changed, you can use three ways:


    *   Use UI control callbacks, like `onChange` or `onEditingChanged`.

    *   Use bindings.

    *   Use observable objects (e.g., your view model can conform to `ObservableObject`).


    To see the `@State` wrapper in action, please review Recipes [8-3](#515103_1_En_8_Chapter.xhtml#PC5)
    and [8-7](#515103_1_En_8_Chapter.xhtml#PC18).


    ### Data Binding


    Using `@Binding` instead of `@State` allows you to have a more powerful connection
    between variables and UI elements using it and share state between objects.


    If you use a view model and declare some variable there, you can set up a connection
    with UI elements passing the binding itself, not the value.


    The advantages of this approach are as follows:


    *   When you change Toggle or type text, it will change the value directly in
    your view model. It’s much easier to use it later.

    *   If a variable changes several UI components, they’ll be automatically updated
    when the variable is changed.


    For example, if some text field should appear only when `Toggle` is on, `@State`
    won’t solve the problem, but `@Binding` will (Recipe [8-8](#515103_1_En_8_Chapter.xhtml#PC19)).


    ```

    import SwiftUI

    class LoginViewModel: ObservableObject {

    @Published var login: String = ""

    @Published var password: String = ""

    @Published var rememberMe: Bool = false

    }

    struct LoginView: View {

    @Binding var login: String

    @Binding var password: String

    @Binding var rememberMe: Bool

    var body: some View {

    VStack {

    TextField("Login", text: $login)

    TextField("Password", text: $password)

    Toggle(isOn: $rememberMe) {

    Text("Remember me")

    }

    }

    }

    }

    struct LoginScreenView: View {

    @ObservedObject var viewModel = LoginViewModel()

    private var loginAvailable: Bool {

    !viewModel.login.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty &&

    !viewModel.password.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty

    }

    var body: some View {

    VStack {

    LoginView(

    login: $viewModel.login,

    password: $viewModel.password,

    rememberMe: $viewModel.rememberMe

    )

    Button("Login") {

    print("Your login: \(viewModel.login)")

    print("Your password: \(viewModel.password)")

    if viewModel.rememberMe {

    print("We will remember you")

    } else {

    print("You will be automatically logged out")

    }

    }.disabled(!loginAvailable)

    }

    }

    }

    struct LoginView_Previews: PreviewProvider {

    static var previews: some View {

    LoginScreenView()

    }

    }

    Recipe 8-8

    Using @Binding

    ```


    In this recipe, we use both bindings and observable objects. By using a publishable
    view model and bindings, we can control the *Login* button (it becomes inactive
    when one of the fields is empty) with minimum code. We can also access the entered
    values from the *Login* button callback without referencing the text fields themselves.


    These features show the power of SwiftUI and its advantages compared to UIKit
    (Figure [8-3](#515103_1_En_8_Chapter.xhtml#Fig3)).


    ![](images/515103_1_En_8_Chapter/515103_1_En_8_Fig3_HTML.png)


    A set of two images. A screenshot of data binding codes in the swift user interface
    is on the left and a preview of the login page creation in the iPhone outline
    is on the right.


    Figure 8-3


    Data binding in SwiftUI


    ## Summary


    SwiftUI is a future of iOS UI development. The purpose of this chapter is not
    to give a comprehensive SwiftUI course, it’s too big topic for one chapter. But
    we talked about several interesting concepts showing power of SwiftUI, such as
    building user interface from building blocks, using UIKit components in SwiftUI,
    using `ViewModifier`, Canvas and Binding.'
  raw: '### Component State


    We already used the `@State` keyword in several recipes. What is `@State` and
    how does it change our `View`?


    `@State` is a property wrapper , which means it generates some code behind the
    scenes. It creates a storage and moves our variable out of struct as it’s a value
    type. It’s recommended to make `@State` variables private and initialize them
    right after the declaration, without a constructor.


    `@State` variables are used to keep the `View` state. Depending on component logic,
    it can be a text string, a Boolean value, a number, or a structure. `@State` variables
    can be directly used in layout, and even more, the layout can change them in response
    to the user’s actions.


    `@State` variables shouldn’t be shared between objects. They’re not observable,
    and their changes can’t be handled by `willSet` or `didSet`. To run some code
    when the `@State` variable is changed, you can use three ways:


    *   Use UI control callbacks, like `onChange` or `onEditingChanged`.


    *   Use bindings.


    *   Use observable objects (e.g., your view model can conform to `ObservableObject`).


    To see the `@State` wrapper in action, please review Recipes [8-3](#515103_1_En_8_Chapter.xhtml#PC5)
    and [8-7](#515103_1_En_8_Chapter.xhtml#PC18).


    ### Data Binding


    Using `@Binding` instead of `@State` allows you to have a more powerful connection
    between variables and UI elements using it and share state between objects .


    If you use a view model and declare some variable there, you can set up a connection
    with UI elements passing the binding itself, not the value.


    The advantages of this approach are as follows:


    *   When you change Toggle or type text, it will change the value directly in
    your view model. It’s much easier to use it later.


    *   If a variable changes several UI components, they’ll be automatically updated
    when the variable is changed.


    For example, if some text field should appear only when `Toggle` is on, `@State`
    won’t solve the problem, but @Binding will (Recipe [8-8](#515103_1_En_8_Chapter.xhtml#PC19)).


    ```

    import SwiftUI

    class LoginViewModel: ObservableObject {

    @Published var login: String = ""

    @Published var password: String = ""

    @Published var rememberMe: Bool = false

    }

    struct LoginView: View {

    @Binding var login: String

    @Binding var password: String

    @Binding var rememberMe: Bool

    var body: some View {

    VStack {

    TextField("Login", text: $login)

    TextField("Password", text: $password)

    Toggle(isOn: $rememberMe) {

    Text("Remember me")

    }

    }

    }

    }

    struct LoginScreenView: View {

    @ObservedObject var viewModel = LoginViewModel()

    private var loginAvailable: Bool {

    !viewModel.login.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty &&

    !viewModel.password.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty

    }

    var body: some View {

    VStack {

    LoginView(

    login: $viewModel.login,

    password: $viewModel.password,

    rememberMe: $viewModel.rememberMe

    )

    Button("Login") {

    print("Your login: \(viewModel.login)")

    print("Your password: \(viewModel.password)")

    if viewModel.rememberMe {

    print("We will remember you")

    } else {

    print("You will be automatically logged out")

    }

    }.disabled(!loginAvailable)

    }

    }

    }

    struct LoginView_Previews: PreviewProvider {

    static var previews: some View {

    LoginScreenView()

    }

    }

    Recipe 8-8

    Using @Binding

    ```


    In this recipe, we use both bindings and observable objects. By using a publishable
    view model and bindings, we can control the *Login* button (it becomes inactive
    when one of the fields is empty) with minimum code. We can also access the entered
    values from the *Login* button callback without referencing the text fields themselves.


    These features show the power of SwiftUI and its advantages compared to UIKit
    (Figure [8-3](#515103_1_En_8_Chapter.xhtml#Fig3)).


    ![](images/515103_1_En_8_Chapter/515103_1_En_8_Fig3_HTML.png)


    A set of two images. A screenshot of data binding codes in the swift user interface
    is on the left and a preview of the login page creation in the iPhone outline
    is on the right.


    Figure 8-3


    Data binding in SwiftUI


    ## Summary


    SwiftUI is a future of iOS UI development. The purpose of this chapter is not
    to give a comprehensive SwiftUI course, it’s too big topic for one chapter. But
    we talked about several interesting concepts showing power of SwiftUI, such as
    building user interface from building blocks, using UIKit components in SwiftUI,
    using ViewModifier, Canvas and Binding.'
  trans: '

    ### 组件状态


    我们在多个示例中已经使用了 `@State` 关键字。`@State` 是什么？它又如何改变我们的 `View`？


    `@State` 是一个属性包装器，意味着它会在后台生成一些代码。它会创建一个存储空间，并将我们的变量移出结构体（因为结构体是值类型）。建议将 `@State`
    变量设为私有，并在声明后立即初始化，而不使用构造函数。


    `@State` 变量用于保持 `View` 的状态。根据组件逻辑，它可以是一个文本字符串、布尔值、数字或结构体。`@State` 变量可以直接在布局中使用，甚至可以根据用户的操作在布局中改变它们。


    `@State` 变量不应在对象之间共享。它们不可观察，其变化也无法通过 `willSet` 或 `didSet` 来处理。要在 `@State` 变量变化时运行某些代码，可以使用以下三种方式：


    *   使用 UI 控件回调，例如 `onChange` 或 `onEditingChanged`。

    *   使用绑定。

    *   使用可观察对象（例如，你的视图模型可以遵循 `ObservableObject` 协议）。


    要查看 `@State` 包装器的实际操作，请参考示例 8-3 和 8-7。


    ### 数据绑定


    使用 `@Binding` 替代 `@State`，可以让变量与 UI 元素之间建立更强大的连接，并在对象之间共享状态。


    如果你使用了视图模型并在其中声明了某个变量，你可以通过传递绑定本身（而不是值）来建立与 UI 元素的连接。


    这种方法的优势如下：


    *   当你切换开关或输入文本时，它会在视图模型中直接更改值。后续使用起来会非常方便。

    *   如果一个变量改变了多个 UI 组件，那么当该变量发生变化时，这些组件会自动更新。


    例如，如果某个文本字段只应在 `Toggle` 开启时出现，`@State` 无法解决这个问题，但 `@Binding` 可以（示例 8-8）。


    ```

    import SwiftUI

    class LoginViewModel: ObservableObject {

    @Published var login: String = ""

    @Published var password: String = ""

    @Published var rememberMe: Bool = false

    }

    struct LoginView: View {

    @Binding var login: String

    @Binding var password: String

    @Binding var rememberMe: Bool

    var body: some View {

    VStack {

    TextField("Login", text: $login)

    TextField("Password", text: $password)

    Toggle(isOn: $rememberMe) {

    Text("Remember me")

    }

    }

    }

    }

    struct LoginScreenView: View {

    @ObservedObject var viewModel = LoginViewModel()

    private var loginAvailable: Bool {

    !viewModel.login.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty &&

    !viewModel.password.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty

    }

    var body: some View {

    VStack {

    LoginView(

    login: $viewModel.login,

    password: $viewModel.password,

    rememberMe: $viewModel.rememberMe

    )

    Button("Login") {

    print("Your login: \(viewModel.login)")

    print("Your password: \(viewModel.password)")

    if viewModel.rememberMe {

    print("We will remember you")

    } else {

    print("You will be automatically logged out")

    }

    }.disabled(!loginAvailable)

    }

    }

    }

    struct LoginView_Previews: PreviewProvider {

    static var previews: some View {

    LoginScreenView()

    }

    }

    示例 8-8

    使用 @Binding

    ```


    在此示例中，我们同时使用了绑定和可观察对象。通过使用可发布的视图模型和绑定，我们只需极少的代码就能控制*登录*按钮（当其中一个字段为空时，该按钮会变为不可用）。我们还可以从*登录*按钮的回调中访问输入的值，而无需引用文本字段本身。


    这些功能展示了 SwiftUI 的强大之处，以及相比 UIKit 的优势（图 8-3）。


    ![](img/515103_1_En_8_Fig3_HTML.png)


    两张图片的集合。左侧是 Swift 用户界面中数据绑定代码的截图，右侧是 iPhone 轮廓中登录页面创建的预览。


    图 8-3


    SwiftUI 中的数据绑定


    ## 总结


    SwiftUI 是 iOS UI 开发的未来。本章的目的并非提供全面的 SwiftUI 课程——这个话题对于一章而言过于庞大。但我们讨论了几个有趣的概念，展示了
    SwiftUI 的强大功能，例如用构建块搭建用户界面、在 SwiftUI 中使用 UIKit 组件、使用 `ViewModifier`、Canvas 和 Binding。

    '
