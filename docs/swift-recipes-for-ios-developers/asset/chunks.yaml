    # 图像遮罩


    本章前面部分介绍了如何进行基本图像处理。下一步是将两个或多个图片合并为一个。所有流行的即时通讯软件、社交网络、博客平台及其他应用都提供添加效果的功能，这些效果不会改变图像本身，而是在其上添加一些内容。可以是文字、简单绘图、贴纸、烟雾、星星等。


    这可以通过在底层图片上添加一个带有透明度的图片来实现。顶层图片可以是预定义图片、用户选择的图片或新生成的图片。


    这里的关键概念是 Alpha 通道。图像由像素组成。每个像素都有表示颜色或透明度级别的通道。包括智能手机在内的计算机设备上最常见的调色板是 RGBA。RGBA
    代表红色、绿色、蓝色和 Alpha。


    红色、绿色和蓝色是颜色分量。这些颜色的混合构成了整个显示调色板。红色和绿色混合产生黄色；红色和蓝色混合产生洋红色；蓝色和绿色混合产生青色。当所有通道都达到最大值时，显示为白色。


    Alpha 分量是透明度级别。如果它占用 1 个字节，其范围是 0 到 255，其中 0 表示完全透明的像素，255 表示完全不透明的像素。


    但这一切为什么重要呢？

    '
- fmt: '### Merging Images


    When we merge images into one , we merge each channel separately using alpha as
    a multiplier. Assuming that the background image is not transparent, we can merge
    them this way:


    ```

    r = (r1 * (255 - a2) + r2 * a2) / 255

    g = (g1 * (255 - a2) + g2 * a2) / 255

    b = (b1 * (255 - a2) + b2 * a2) / 255

    ```


    Or if the colors are represented as `Float` or `Double` values, we can merge them
    like this:


    ```

    r = r1 * (1.0 - a2) + r2 * a2

    g = g1 * (1.0 - a2) + g2 * a2

    b = b1 * (1.0 - a2) + b2 * a2

    ```


    These formulas can be nonlinear, but this is the simplest solution, and it demonstrates
    how the alpha channel is used.


    In Recipe [5-21](#515103_1_En_5_Chapter.xhtml#PC30), we have two images. The first
    image can be fully opaque. The second one is partially transparent, and its size
    is the same as that of the first image or smaller.


    ```

    extension UIImage {

    func simpleMerge(with topImage: UIImage, x: CGFloat, y: CGFloat) -> UIImage? {

    UIGraphicsBeginImageContext(CGSize(width: size.width, height: size.height))

    draw(at: CGPoint(x: 0, y: 0))

    topImage.draw(at: CGPoint(x: x, y: y))

    let newImage = UIGraphicsGetImageFromCurrentImageContext()

    UIGraphicsEndImageContext()

    return newImage

    }

    }

    Recipe 5-21

    Merging Two Images – Simple Case

    ```


    Let’s take it to the next level (Recipe [5-22](#515103_1_En_5_Chapter.xhtml#PC31)).
    Now, we’ll assume that images can have any size; the resulting image will contain
    both source images without cropping.


    ```

    extension UIImage {

    func universalMerge(with topImage: UIImage, x: CGFloat, y: CGFloat) -> UIImage?
    {

    let x1 = (x < 0) ? -x : 0

    let y1 = (y < 0) ? -y : 0

    let x2 = (x < 0) ? 0 : x

    let y2 = (y < 0) ? 0 : y

    let newWidth = max(x1 + size.width, x2 + topImage.size.width)

    let newHeight = max(y1 + size.height, y2 + topImage.size.height)

    UIGraphicsBeginImageContext(CGSize(width: newWidth, height: newHeight))

    draw(at: CGPoint(x: x1, y: y1))

    topImage.draw(at: CGPoint(x: x2, y: y2))

    let newImage = UIGraphicsGetImageFromCurrentImageContext()

    UIGraphicsEndImageContext()

    return newImage

    }

    }

    Recipe 5-22

    Merging Two Images – Universal Case

    ```


    Sometimes we need to keep the original size and make the resulting image the same
    as the background one. In this case we ignore the pixels of the second image which
    are outside the background picture as shown in Recipe [5-23](#515103_1_En_5_Chapter.xhtml#PC32).


    ```

    extension UIImage {

    func croppingMerge(with topImage: UIImage, x: CGFloat, y: CGFloat) -> UIImage?
    {

    let cropX = (x < 0) ? -x : 0

    let cropY = (y < 0) ? -y : 0

    let cropW: CGFloat

    let cropH: CGFloat

    if x < 0 {

    cropW = min(topImage.size.width + x, size.width)

    } else {

    cropW = min(topImage.size.width, size.width - x - cropX)

    }

    if y < 0 {

    cropH = min(topImage.size.height + y, size.height)

    } else {

    cropH = min(topImage.size.height, size.height - y - cropY)

    }

    if cropW <= 0 || cropH <= 0 {

    return self

    }

    let topImageCropped: UIImage

    if cropW == topImage.size.width && cropH == topImage.size.height {

    topImageCropped = topImage

    } else {

    guard let topCGImage = topImage.cgImage,

    let imageRef = topCGImage.cropping(to: CGRect(x: cropX, y: cropY, width: cropW,
    height: cropH))

    else {

    return nil

    }

    topImageCropped = UIImage(cgImage: imageRef)

    }

    UIGraphicsBeginImageContext(CGSize(width: size.width, height: size.height))

    draw(at: CGPoint(x: 0, y: 0))

    topImageCropped.draw(at: CGPoint(x: max(x, 0), y: max(y, 0)))

    let newImage = UIGraphicsGetImageFromCurrentImageContext()

    UIGraphicsEndImageContext()

    return newImage

    }

    }

    Recipe 5-23

    Merging Two Images with Cropping

    ```


    **Note**


    If you tested these recipes, you probably noticed that simple merge and merge
    with cropping give the same result. It happens because the `UIImage` `draw` method
    crops the image if part of it is out of bounds. Basically, Recipe [5-23](#515103_1_En_5_Chapter.xhtml#PC32)
    shows what happens under the hood. It’s totally valid to use any of these options.


    ### Applying Mask


    If you have a rectangular image, for example, one from an iPhone camera, and you
    want to give it some other shape, you may need to apply a mask. A mask is an image
    containing only one channel – alpha. As using alpha as the only channel is not
    allowed in any image format, usually grayscale images are used as masks.


    The white color represents fully opaque pixels, while black represents fully transparent
    ones. Let’s say that `m` is a level of whiteness of a mask pixel.


    ```

    a = a1 * m // If m has a range from 0.0 to 1.0

    // or

    a = a1 * m / 255 // If m has a range from 0 to 255

    ```


    Red, green, and blue channels stay untouched when we apply a mask.


    In Recipe [5-24](#515103_1_En_5_Chapter.xhtml#PC34), we will apply a mask. If
    the mask is smaller than the original image, we’ll assume that the pixels outside
    the mask are transparent. If the mask partially goes beyond the image bounds,
    we’ll ignore those pixels.


    Unlike previous recipes, in this one, we’ll work directly with image buffer .


    ```

    extension UIImage {

    func apply(mask: UIImage) -> UIImage? {

    guard let originalCGImage = cgImage,

    let maskCGImage = mask.cgImage

    else {

    return nil

    }

    let colorSpace = CGColorSpaceCreateDeviceRGB()

    let bytesPerPixel = 4

    let bytesPerRow = bytesPerPixel * originalCGImage.width

    let bytesPerRowMask = bytesPerPixel * maskCGImage.width

    let bitsPerComponent = 8

    let bitmapInfo: UInt32 = CGImageAlphaInfo.premultipliedLast.rawValue

    guard let context = CGContext(data: nil, width: originalCGImage.width, height:
    originalCGImage.height, bitsPerComponent: bitsPerComponent, bytesPerRow: bytesPerRow,
    space: colorSpace, bitmapInfo: bitmapInfo),

    let ptr = context.data?.assumingMemoryBound(to: UInt8.self) else {

    return nil

    }

    guard let contextMask = CGContext(data: nil, width: maskCGImage.width, height:
    maskCGImage.height, bitsPerComponent: bitsPerComponent, bytesPerRow: bytesPerRowMask,
    space: colorSpace, bitmapInfo: bitmapInfo),

    let ptrMask = contextMask.data?.assumingMemoryBound(to: UInt8.self) else {

    return nil

    }

    context.draw(originalCGImage, in: CGRect(x: 0, y: 0, width: originalCGImage.width,
    height: originalCGImage.height))

    contextMask.draw(maskCGImage, in: CGRect(x: 0, y: 0, width: maskCGImage.width,
    height: maskCGImage.height))

    for y in 0..<originalCGImage.height {

    for x in 0..<originalCGImage.width {

    let pixelOffset = (y * originalCGImage.width + x) * 4

    let maskX = x

    let maskY = originalCGImage.height - 1 - y

    let maskPixelOffset = (maskY * maskCGImage.width + maskX) * 4

    if maskX >= maskCGImage.width || y >= maskCGImage.height {

    ptr[pixelOffset + 3] = 0

    } else {

    ptr[pixelOffset + 3] = UInt8((UInt(ptrMask[maskPixelOffset]) + UInt(ptrMask[maskPixelOffset
    + 1]) + UInt(ptrMask[maskPixelOffset])) / 3)

    }

    ptr[pixelOffset] = UInt8(UInt(ptr[pixelOffset]) * UInt(ptr[pixelOffset + 3]) /
    255)

    ptr[pixelOffset + 1] = UInt8(UInt(ptr[pixelOffset + 1]) * UInt(ptr[pixelOffset
    + 3]) / 255)

    ptr[pixelOffset + 2] = UInt8(UInt(ptr[pixelOffset + 2]) * UInt(ptr[pixelOffset
    + 3]) / 255)

    }

    }

    guard let resultCGImage = context.makeImage() else {

    return nil

    }

    return UIImage(cgImage: resultCGImage)

    }

    }

