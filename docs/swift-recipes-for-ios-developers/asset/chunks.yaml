    credit card number is a whole thing – for example, we validate the month and year
    together, so we won’t separate them into a group of extensions.


    Before that, the validation structure needs to be filled with data. Use the `isCardValid`
    property to get the result as a Boolean value. If you need to know which component
    of a number is invalid, use `isNameValid`, `isNumberValid`, and other functions.


