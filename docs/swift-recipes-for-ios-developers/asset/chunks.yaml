    \n来自配方 3-4 的扩展将验证：\n\n*   字符串仅包含字母数字字符，以及一些特殊字符（点号、逗号等）。\n*   字符串至少包含一个英文字母。\n\
    *   满足以下三个条件中的两个：\n    *   字符串同时包含小写和大写字母。\n    *   字符串至少包含一个数字字符。\n    *   字符串至少包含一个允许的非字母数字字符。\n\
