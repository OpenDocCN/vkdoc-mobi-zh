    ### 创建自定义转场动画


    如果你对标准动画不满意，可以创建自己的自定义转场动画。


    当我们谈论自定义转场时，需要回顾几个协议：


    *   `UIViewControllerTransitioningDelegate` 是实现自定义转场所需遵循的协议。实现此协议可以定义用于呈现和解除的动画控制器和交互控制器。

    *   `UIViewControllerAnimatedTransitioning` 协议的实现定义了转场动画的时长、转场动画本身，并处理一些回调。

    *   `UIViewControllerContextTransitioning` 是一个上下文。其实现提供了关于转场视图和控制器（view controllers）的信息。


    当你实现前两个协议时，需要设置 `destinationViewController.transitioningDelegate`。让我们一步步看看它是如何工作的。


    1.  当你触发转场（使用 segue 或手动方式）时，iOS 会检查 `transitioningDelegate` 是否已设置。如果没有设置，它将使用你设置的标准转场或默认转场。

    2.  如果 `transitioningDelegate` 已设置，它会调用你的 `transitioningDelegate` 的 `animationController(forPresented:presenting:source)`
    方法。这个方法是可选的，返回 `nil` 是有效的。如果返回 `nil`，转场将恢复为标准转场，就像没有设置 `transitioningDelegate`
    一样。

    3.  此时，iOS 断定必须使用自定义动画，并创建一个上下文。

    4.  调用 `transitionDuration(using:)` 来定义转场时间。时间应以秒为单位返回。通常，大约是 0.3 秒。超过一秒的转场动画可能会让用户感到不适。

    5.  接下来，调用 `animateTransition(using:)` 方法。使用此方法，你可以应用动画。拥有上下文（在 `using` 参数中），你可以对两个屏幕应用任何修改。你可以更改颜色、位置、透明度——任何你喜欢的属性。

    6.  最后，你需要调用 `completeTransition(_:)`。这将标记转场结束，并使目标视图控制器（destination view controller）变为活跃状态。如果你不调用它，它将继续保持非活跃状态。


    有些事情做起来比解释起来更容易，所以让我们看看 Recipe 7-10 的实际效果。我们将制作一个最简单的转场：第一个屏幕淡出，第二个屏幕淡入。在转场的中间会有一个黑屏，因为两个屏幕都会不可见。动画时长设为一秒，足以观察整个过程。


    ```

    class FadeThroughBlackPresentAnimationController: NSObject, UIViewControllerAnimatedTransitioning
    {

    func transitionDuration(using transitionContext: UIViewControllerContextTransitioning?)
    -> TimeInterval {

    return 1.0

    }

    func animateTransition(using transitionContext: UIViewControllerContextTransitioning)
    {

    guard let fromView = transitionContext.viewController(forKey: .from)?.view,

    let toView = transitionContext.viewController(forKey: .to)?.view

    else { return }

    toView.isHidden = true

    transitionContext.containerView.addSubview(toView)

    UIView.animate(withDuration: 0.5) {

    fromView.alpha = 0.0

    } completion: { _ in

    fromView.isHidden = true

    toView.alpha = 0.0

    toView.isHidden = false

    UIView.animate(withDuration: 0.5) {

    toView.alpha = 1.0

    } completion: { _ in

    fromView.isHidden = false

    transitionContext.completeTransition(!transitionContext.transitionWasCancelled)

    }

    }

    }

    }

    class FromViewController: UIViewController, UIViewControllerTransitioningDelegate
    {

    func animationController(forPresented presented: UIViewController, presenting:
    UIViewController, source: UIViewController) -> UIViewControllerAnimatedTransitioning?
    {

    FadeThroughBlackPresentAnimationController()

    }

    func animationController(forDismissed dismissed: UIViewController) -> UIViewControllerAnimatedTransitioning?
    {

    FadeThroughBlackPresentAnimationController()

    }

    override func prepare(for segue: UIStoryboardSegue, sender: Any?) {

    segue.destination.modalPresentationStyle = .fullScreen

    segue.destination.transitioningDelegate = self

    }

    }

    class ToViewController: UIViewController {

    @IBAction func goBack() {

    dismiss(animated: true, completion: nil)

    }

    }

    Recipe 7-10

    黑色淡入淡出转场

    ```


    这段代码包含了返回转场，与正向转场完全相同。


    ### 转场动画库


    如果你想创建一些新东西，不妨四处看看——也许别人已经创建过了。有很多提供转场动画的库。让我们看看其中的一些：


    *   Hero ( [`https://github.com/HeroTransitions/Hero`](https://github.com/HeroTransitions/Hero)
    ) 库提供了一种简单的方法来应用预定义的转场动画之一，并附带一套很好的自定义工具。

    *   Jelly ( [`https://github.com/SebastianBoldt/Jelly`](https://github.com/SebastianBoldt/Jelly)
    ) 库也支持交互式转场动画。

    *   Shift ( [`https://github.com/wickwirew/Shift`](https://github.com/wickwirew/Shift)
    ) 是一个用于类似 Hero 转场动画的动画库。它只需相对较少的努力就能制作出漂亮的动画。


    所有这些库都是免费、开源的，并且可以通过 Swift Package Manager 和 CocoaPods 获取。你可以在你的应用程序中免费使用它们，但如果喜欢，别忘了捐赠支持。


    ## 总结


    现代移动应用应使用动画来显得更用户友好。UIKit 为简单的 UI 动画提供了原生解决方案。在本章中，我们讨论了淡入淡出动画和动画布局变化。我们讨论了移动应用中流行的视差效果、作为屏幕间转场一部分的
    Hero 动画。最后，我们回顾了转场动画本身的不同方式。至此，UIKit 话题告一段落，但 UIKit 并不是在 iOS 应用中创建 UI 的唯一方式。自
    iOS 13 起，Apple 引入了 SwiftUI，它已在 iOS 和 macOS 的 UI 开发中得到积极使用。在下一章中，我们将快速了解 SwiftUI。


    # 8. SwiftUI


    SwiftUI 是一种构建用户界面的现代方式。它出现在 iOS 13、macOS 10.15、tvOS 13 和 watchOS 6 中。如今，大多数应用不需要支持
    iOS 12，因此在你的项目中使用 SwiftUI 是安全的。


    另一方面，存在大量用 UIKit 编写的代码库。成百上千的流行库出现在 SwiftUI 之前，或者支持旧版本的 iOS。这就是为什么在本章中，我们不仅要讨论
    SwiftUI，还要讨论混合使用这两个框架。


    什么是 SwiftUI？它是 UIKit 的包装器还是一个独立的平台？两者都是。一些 SwiftUI 控件构建在 UIKit 之上；另一些则是全新的。


    ## SwiftUI 基本概述


    SwiftUI 使用构建块的构想。每个块都是一个 `View`。块可以代表整个屏幕，也可以代表屏幕的一部分。块可以包含其他块，并且这种结构可以很深。类似架构也用于其他平台，如
    Flutter 或 React Native。


    ### 基础应用


    SwiftUI 应用包含两个初始控件，App 和 View，分别如 Recipe 8-1 和 8-2 所示。


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    Recipe 8-2

    SwiftUI 视图

    ```


    ```

    import SwiftUI

    @main

    struct MyApp: App {

    var body: some Scene {

    WindowGroup {

    ContentView()

    }

    }

    }

    Recipe 8-1

    SwiftUI 应用

