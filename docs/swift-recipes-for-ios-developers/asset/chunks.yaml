- fmt: '### Animating `UIView`’s Own Properties


    The most popular animation of `UIView` is “fade”. “Fade in” makes `UIView` appear;
    “fade out” makes it disappear. What is appearing and disappearing? It’s changing
    `alpha` property from `0.0` to `1.0` and back. Why do we change `alpha` instead
    of `isHidden`? It’s a *Boolean* value. *Boolean* values cannot gradually change.
    They’re always either `true` or `false`. Will this animation work anyway? Well,
    try it as an exercise. We’ll stick to `alpha` here, as it’s a gradually changeable
    property.


    Animation can be done using `UIView` type `animation(withDuration:animations:)`.
    It’s a type method, so you call it directly on type `UIView`, not on instance.


    Let’s see how it looks in code. Make `UIView` or any subclass an outlet `fadeView`.
    Be careful, don’t name it just `view` because it’s reserved for root view (Recipe
    [7-1](#515103_1_En_7_Chapter.xhtml#PC1)).


    ```

    class FadeInViewController: UIViewController {

    @IBOutlet weak var fadeView: UIView!

    func fadeIn() {

    fadeView.isHidden = false

    fadeView.alpha = 1.0

    UIView.animate(withDuration: 0.3) {

    self.fadeView.alpha = 0.0

    }

    }

    }

    Recipe 7-1

    Fade-in Effect

    ```


    Before performing an animation, we set initial parameters. It’s not compulsory,
    especially if you want to animate it from its current state. Adjust it for your
    needs.


    You can also see a magic number in this recipe – `0.3`. Magic numbers are unnamed
    numeric constants. It’s a bad practice because the developer working on this code
    after you (or even you in several months or years) may not understand why this
    constant is there and what it means.


    We’re talking about animation, and this code is part of the book, so it’s acceptable
    to give an explanation here. `0.3` seconds is a common time interval for animations.
    It’s slow enough to let the user see it, but fast enough not to delay them.


    If you use this code, adjust this time interval for your needs and define a named
    constant for it.


    In Recipe [7-2](#515103_1_En_7_Chapter.xhtml#PC3) we have another version of `animate`
    method:


    ```

    class FadeOutViewController: UIViewController {

    @IBOutlet weak var fadeView: UIView!

    func fadeOut() {

    fadeView.alpha = 0.0

    fadeView.isHidden = false

    UIView.animate(withDuration: 0.3) {

    self.fadeView.alpha = 1.0

    } completion: { _ in

    self.fadeView.isHidden = true

    }

    }

    }

    Recipe 7-2

    Fade-Out Effect

    ```


    ```

    func animate(with Duration:animations:completion:)

    ```


    `UIView` object can animate the following properties:


    - Frame

    - Bounds

    - Center

    - Transform

    - Alpha

    - BackgroundColor


    Subclasses of `UIView` may have other properties to animate; you can refer to
    documentation to see a full list for each class.


    ### Animating Layout by Changing Constraints


    When iPhone just appeared, it had only one resolution. Later, when new models
    appeared, screen became taller. On iPad, the opposite, it became wider. Now we
    have many aspect ratios. The way to survive in all this variety is to use constraints.
    If you’re reading this, you probably already know what are constraints. If not,
    you can always find documentation, books, articles, or tutorials explaining how
    they work.


    If you have constraints, you shouldn’t animate frame and other position-related
    properties. You should animate changes in constraints.


    To animate a constraint, you should make an outlet first. Let’s say, we have some
    `UIView`, and we need to move it up. It has a constraint defining distance with
    an object on top. By default, it’s `50`, but we want it to be `20`. Why? Maybe
    the keyboard appeared, or something else happened that we need to shrink our spaces.


    ```

    @IBOutlet weak var distanceConstraint: NSLayoutConstraint!

    ```


    Note


    Up to the present day, constraints are objects of class `NSLayoutConstraint`;
    it starts with `NS`, and it doesn’t have an alternative.


    Here’s the trick. Layout changes aren’t performed when you change the constraint
    properties. They’re performed when view is getting laid out. We need to prepare
    new layout *before* calling `animate(withDuration:animations:)`. And in this method,
    we only call `layoutIfNeeded` of a parent or root `UIView`. You can see how it''s
    done in Recipe [7-3](#515103_1_En_7_Chapter.xhtml#PC5).


    ```

    class AnimatedConstraintsViewController: UIViewController {

    @IBOutlet weak var distanceConstraint: NSLayoutConstraint!

    func changeDistanceAnimated(_ newDistance: CGFloat) {

    distanceConstraint.constant = newDistance

    UIView.animate(withDuration: 0.3) {

    self.view.layoutIfNeeded()

    }

    }

    }

    Recipe 7-3

    Animating Constraints

    ```


    ### Restrictions


    Animations in iOS have their own restrictions. We already discussed that you can’t
    animate values that can’t be gradually changed.


    Another restriction is simultaneous animations. You can animate several properties
    or different objects at the same time, but they must be wrapped into the same
    block.


    If you have complex animations, you have two solutions:


    - Split them into small blocks, each of them with a set of changes ending at the
    same moment. When one block ends, start the next block. It may need some calculating.

    - Make a timer to animate manually. The `UIView.animate(withDuration:animations:)`
    method is not the only way.


    ### Animating Layout When Keyboard Appears


    In the “Keyboard Handling” section in Chapter [6](#515103_1_En_6_Chapter.xhtml),
    we discussed changes in keyboard layout. We changed a constraint without animation:


    ```

    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]
    as? NSValue)?.cgRectValue.size { bottomConstraint.constant = keyboardSize.height

    view.layoutIfNeeded()}

    ```


    In Recipe [7-4](#515103_1_En_7_Chapter.xhtml#PC7) we improve the code to make
    it look smoother.


    ```

    class AnimatedKeyboardListenerViewController: UIViewController {

    @IBOutlet weak var bottomConstraint: NSLayoutConstraint!

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(keyboardWillShow(notification:)),

    name: UIResponder.keyboardWillShowNotification,

    object: nil

    )

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(keyboardWillHide),

    name: UIResponder.keyboardWillHideNotification,

    object: nil

    )

    }

    override func viewDidDisappear(_ animated: Bool) {

    NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillShowNotification,
    object: nil)

    NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillHideNotification,
    object: nil)

    super.viewWillDisappear(animated)

    }

    @objc func keyboardWillShow(notification: NSNotification) {

    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]
    as? NSValue)?.cgRectValue.size {

    bottomConstraint.constant = keyboardSize.height

    UIView.animate(withDuration: 0.3) {

    self.view.layoutIfNeeded()

    }

    }

    }

    @objc func keyboardWillHide() {

    bottomConstraint.constant = 0

    UIView.animate(withDuration: 0.3) {

    self.view.layoutIfNeeded()

    }

    }

    }

    Recipe 7-4

    Animating Layout Changes When Keyboard Appears

    ```


    Note


    Recipe [7-4](#515103_1_En_7_Chapter.xhtml#PC7) is almost identical to Recipe [6-13](#515103_1_En_6_Chapter.xhtml#PC23).
    The only difference is animation. Compare them.'
