- fmt: '# Analyzing String Content


    Let’s suppose for a minute that we have a `String` object. We want to know what’s
    inside. Does it have Latin letters? Or numbers? Is it a strong password? A valid
    email?


    `UIKit` offers two classes to get text input from the user: `UITextField` and
    `UITextView`. Both of them return data as a test. Even if we request a number
    from the user (their age, bank card number, a number they should guess) and choose
    an on-screen keyboard with numbers only, we’ll get a `String` (Recipe [3-1](#515103_1_En_3_Chapter.xhtml#PC1)).


    ```

    public extension StringProtocol {

    var containsOnlyDigits: Bool {

    let notDigits = NSCharacterSet.decimalDigits.inverted

    return rangeOfCharacter(from: notDigits, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    var containsOnlyLetters: Bool {

    let notLetters = NSCharacterSet.letters.inverted

    return rangeOfCharacter(from: notLetters, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    var containsIllegalCharacters: Bool {

    rangeOfCharacter(from: NSCharacterSet.illegalCharacters, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsOnlyPasswordAllowed: Bool {

    var allowedCharacters = CharacterSet()

    allowedCharacters.insert(charactersIn: "!"..."~")

    let forbiddenCharacters = allowedCharacters.inverted

    return rangeOfCharacter(from: forbiddenCharacters, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    var isAlphanumeric: Bool {

    let notAlphanumeric = NSCharacterSet.decimalDigits.union(NSCharacterSet.letters).inverted

    return rangeOfCharacter(from: notAlphanumeric, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    var containsLetters: Bool {

    rangeOfCharacter(from: NSCharacterSet.letters, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsDigits: Bool {

    rangeOfCharacter(from: NSCharacterSet.decimalDigits, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsUppercaseLetters: Bool {

    rangeOfCharacter(from: NSCharacterSet.uppercaseLetters, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsLowercaseLetters: Bool {

    rangeOfCharacter(from: NSCharacterSet.lowercaseLetters, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsNonAlphanumericCharacters: Bool {

    let notAlphanumeric = NSCharacterSet.decimalDigits.union(NSCharacterSet.letters).inverted

    return rangeOfCharacter(from: notAlphanumeric, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    }

    Recipe 3-1

    Checking String for Digits and Letters

    ```


    These three extensions allow us to make fast (but simple) content analysis:


    * `containsOnlyDigits` returns `true` if `String` contains nothing but digits.
    No decimal separators, no spaces, no special characters. We can get similar results
    by casting `String` to `Int`, but without the potential overflow problem, and
    we handle negative numbers differently.


    * `containsOnlyLetters` returns `true` if `String` contains nothing but letters.
    Without modifications, it doesn’t have much use, but we’ll update it later to
    make it more powerful.


    * `isAlphanumeric` returns `true` if `String` contains letters and numbers. For
    example, a Firestore document ID is always alphanumeric, as well as the `String`
    representation of MD5 hashes.


    As we’re discussing real-life examples, let’s talk about use cases. Registration
    forms may contain:


    * First and last names

    * Email address

    * Password

    * Phone number

    * Gender

    * Date of birth or age

    * Credit card information

    * Address


    When Apple reviewers see such a list on the registration screen, they reject the
    app. But any of these fields may be necessary for specific functionality.


    We’ll leave address verification behind the scope, as it’s specific for every
    country, and discuss other fields. For all extensions described in the following,
    we’ll use names starting with `isValid`, for example, `isValidName` and `isValidEmail`,
    and write them as calculated properties.


    **Note**


    Using function or calculated property is always the programmer’s choice. There’s
    a popular opinion that calculated properties should be used when the function
    reflects a property of an object and doesn’t change it.


    ## First, Last, and Other Names


    Depending on your app’s region and your preferences, it can be one field for the
    full name, separate fields for the first and last names, or a more detailed set
    of fields, including middle name or patronymic. They can only contain letters,
    spaces, dashes, and maybe the dot symbol for titles like "Jr." or "Mr.". An example
    of name verification is shown in Recipe [3-2](#515103_1_En_3_Chapter.xhtml#PC2).


    ```

    public extension StringProtocol {

    var isValidName: Bool {

    let allowedCharactgers = NSCharacterSet.letters.union(NSCharacterSet.whitespaces).union(CharacterSet(charactersIn:
    ".-"))

    let forbiddenCharacters = allowedCharactgers.inverted

    return rangeOfCharacter(from: forbiddenCharacters, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    }

    Recipe 3-2

    Name Verification

    ```


    This extension merges three character sets:


    * Whitespaces

    * Letters

    * Characters `.` and `-`


    It inverts the resulting set and verifies that no forbidden characters are found
    in the `String`.


    **Note**


    In May 2020, famous business magnate Elon Musk (PayPal, Tesla, SpaceX) and Canadian
    musician Grimes had a son who immediately got his share of fame because of a very
    unusual name – X Æ A-12. However, the Office of Vital Records in California requires
    that names contain only the 26 alphabetical characters of the English language
    (plus hyphens and apostrophes); thus, this name was rejected. The couple had to
    change the name to X AE A-XII, where X is the first name and AE A-XII is the middle
    name. Just like the administration of California, our extension would reject the
    first option and accept the final one.


    ## Email Address


    This topic always causes a lot of controversy. While some developers try to restrict
    email addresses to a problem-free territory, others want to give users as much
    freedom as possible – up to lack of verification on the client’s side. For example,
    is the email address `root@localhost` valid? It actually is. But when the user
    registers in an app, there’s not much use to it, as we can’t send any emails to
    it and it’s not unique.


    We’ll discuss email verification in the context of user registration. And we will
    allow only emails with the following format: `some-string@some-domain.ext`, where
    `some-string` may contain Latin letters, numbers, and the symbols `.`, `_`, `-`,
    `%`, and `+`; `some-domain` may contain Latin letters, numbers, `-`, and `.` for
    subdomains; and `ext` must have only Latin letters and be no shorter than two
    characters and no longer than 64.


    Analysis can be done with regular expressions as shown in Recipe [3-3](#515103_1_En_3_Chapter.xhtml#PC3).
    We won’t discuss regular expressions in detail. In short, it’s a pattern. There’s
    standard syntax for regular expressions, which is universal for different platforms
    and languages. Regular expression for email verification looks like this: `[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,64}`.


    It’s not the only option when it comes to regular expressions. There are other
    options, but this expression works quite well and has been tested by hundreds
    of thousands of users. It can be used with a Firebase Auth framework, filtering
    unnecessary requests, but it’s even more useful if you have a custom back end.


    ```

    extension StringProtocol {

    var isValidEmail: Bool {

    let emailRegEx = "[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,64}"

    let emailTest = NSPredicate(format: "SELF MATCHES %@", emailRegEx)

    return emailTest.evaluate(with: self)

    }

    }

    Recipe 3-3

    Email Verification

    ```'
