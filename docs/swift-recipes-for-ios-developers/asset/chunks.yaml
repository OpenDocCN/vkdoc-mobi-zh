    \        view.endEditing(true)\n    }\n}\n食谱 6-10\n隐藏键盘\n```\n\n### 在可滚动区域中隐藏键盘\n\
    \n如果您需要在可滚动区域内进行文本输入（这在表单中很常见），那么之前的食谱将不起作用。这并不意味着您不应该使用它；用户可以点击可滚动区域的外部，但这还不够。\n\
    \n根据您期望的行为，有两种解决方案：\n\n-   用户滚动时隐藏键盘\n-   用户点击文本字段外部时隐藏键盘\n\n第一个解决方案需要设置 `UIScrollView`\
    \ 的一个属性。在 Interface Builder（故事板编辑器）中，选择您的 `UIScrollView`，并将 *Keyboard* 设置为 *Dismiss\
