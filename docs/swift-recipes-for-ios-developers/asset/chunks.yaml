    ## Summary


    We had a look at three popular data representations: JSON, XML, and YAML. JSON
    is the most popular for data exchange, but other formats also have their place
    in the IT world. We also reviewed `Encodable` and `Decodable` structures, the
    core of data serialization in Swift. Property wrappers may be useful as well if
    you want to keep flexibility, add data processing, but keep data structured.


    Finally, we added semantics to data and introduced number units and conversion
    between them.


    In the next chapter, we’ll switch to one of the most popular data types in all
    modern languages – `String`. We already saw that it can represent literally everything
    using JSON. But it can also be analyzed, verified, used to represent binary data,
    secure data, and much more.


    # 3. Working with Strings


    Strings are also data `–` they’re arrays of bytes. But unlike simple `Data`, the
    `String` class knows how to interpret that data. To interpret data correctly,
    we need to know encoding. The most widespread options are UTF-8 and UTF-16, also
    known as Unicode.


    UTF-8 uses one to four bytes to encode one character. Latin characters from the
    ASCII range use one byte. If the text contains only Latin characters, spaces,
    and standard punctuation symbols, ASCII and UTF-8 text strings are identical.


    UTF-16 uses two of four bytes per character. As two bytes make 65536 combinations,
    they cover most of existing symbols. But not all of them. That’s why some symbols
    need four bytes.


    We don’t need to know which encoding is used inside `String` or `Character` structures
    (yes, in Swift, they’re defined as structs, not classes). But knowing that it’s
    a `String`, we can get a lot of information about stored data compared to a `Data`
    object.


    We know that text strings consist of characters, so we can get one of them. We
    can also get a range, which is called a `Substring`. And we don’t need to think
    how wide is one `Character`; Swift will calculate width in bytes automatically.
    We can remove whitespaces and/or newlines, we can make it lowercase or uppercase,
    and we can analyze its content and much more.'
