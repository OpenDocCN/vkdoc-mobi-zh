- fmt: "# Now let’s make a simple validator in Recipe [6-2](#515103_1_En_6_Chapter.xhtml#PC3).\
    \ All validators are different, but the basic structure is similar. Let’s say\
    \ we need the user’s email address. Our `EmailInputValidator` class should be\
    \ assigned as a delegate of `UITextField`. It will remove all the characters that\
    \ are not allowed in email addresses and make a call to its own delegate function\
    \ when an address is valid.\n\nPlease find `String` extension `isValidEmail` in\
    \ Recipe 3-3 or in full version of Recipe [6-2](#515103_1_En_6_Chapter.xhtml#PC3)\
    \ on GitHub.\n\n```\nprotocol EmailInputValidatorDelegate: AnyObject {\n    func\
    \ validityChanged(isValid: Bool)\n}\n\nclass EmailInputValidator: NSObject, UITextFieldDelegate\
    \ {\n    weak var delegate: EmailInputValidatorDelegate?\n\n    func textField(_\
    \ textField: UITextField, shouldChangeCharactersIn range: NSRange, replacementString\
    \ string: String) -> Bool {\n        let allowedRegEx = \"[A-Z0-9a-z._%+-@]+\"\
    \n        let allowedTest = NSPredicate(format: \"SELF MATCHES %@\", allowedRegEx)\n\
    \        if !allowedTest.evaluate(with: string) && !string.isEmpty {\n       \
    \     return false\n        }\n        if let text = textField.text,\n       \
    \    let textRange = Range(range, in: text) {\n            let updatedText = text.replacingCharacters(in:\
    \ textRange, with: string)\n            delegate?.validityChanged(isValid: updatedText.isValidEmail)\n\
    \        }\n        return true\n    }\n}\n```\n\n**Recipe 6-2**  \n**Email Input\
    \ Validator**\n\nYou can use it in `UIViewController` like this:\n\n```\nclass\
    \ ViewController: UIViewController {\n    @IBOutlet weak var textField: UITextField!\n\
    \    var emailValidator = EmailInputValidator()\n\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        textField.delegate = emailValidator\n\
    \        emailValidator.delegate = self\n    }\n}\n\nextension ViewController:\
    \ EmailInputValidatorDelegate {\n    func validityChanged(isValid: Bool) {\n \
    \       print(isValid)\n    }\n}\n```\n\n## Formatting User Input\n\nThere’s a\
    \ certain type of data that needs visual decoration to be understandable, for\
    \ example, phone numbers. They have different lengths in different countries,\
    \ but on average, they’re around ten digits long. Seeing ten digits without any\
    \ separation is hard for humans – you’ll hardly recognize your own phone number\
    \ if presented that way. Adding some spaces, brackets, and dashes makes a phone\
    \ number much more readable and understandable.\n\nAnother example is bank card\
    \ numbers. It also varies, but the most common is separating digits in blocks\
    \ by four.\n\nWe can’t expect perfect text styling from users. Even more, we usually\
    \ allow to type only digits in such fields – on-screen keyboards don’t have spaces,\
    \ dashes, or brackets. We need to do it automatically.\n\n### Formatting Phone\
    \ Numbers\n\nThe next recipe will use the `libPhoneNumber` library. You can add\
    \ it from the following repository: [`https://github.com/iziz/libPhoneNumber-iOS`](https://github.com/iziz/libPhoneNumber-iOS).\
    \ If you use Swift Package Manager, type the URL there; otherwise, use `pod`:\n\
    \n```\nimport libPhoneNumber_iOS\n\nclass PhoneViewController: UIViewController,\
    \ UITextFieldDelegate {\n    @IBOutlet weak var phoneNumberTextField: UITextField!\n\
    \    let countryId = \"US\"\n    let phoneUtil = NBPhoneNumberUtil.sharedInstance()\n\
    \n    func textField(_ textField: UITextField, shouldChangeCharactersIn range:\
    \ NSRange, replacementString string: String) -> Bool {\n        if string.isEmpty\
    \ {\n            return true\n        }\n        if let text = textField.text,\n\
    \           let textRange = Range(range, in: text) {\n            let updatedText\
    \ = text.replacingCharacters(in: textRange, with: string)\n            if let\
    \ phoneUtil = self.phoneUtil,\n               let phoneNumber = try? phoneUtil.parse(updatedText,\
    \ defaultRegion: countryId),\n               let formattedString = try? phoneUtil.format(phoneNumber,\
    \ numberFormat: .NATIONAL) {\n                DispatchQueue.main.async {\n   \
    \                 textField.text = formattedString\n                }\n      \
    \      }\n        }\n        return true\n    }\n}\n```\n\n**Recipe 6-3**  \n\
    **Formatting Phone Numbers in UITextField**\n\n```\npod 'libPhoneNumber-iOS'\n\
    ```\n\nLet’s review it line by line.\n\nIn your UI file (storyboard or xib), add\
    \ a country selector and a `UITextField`. The country selector is usually a list\
    \ of flags, country names, or codes. Changing country should change the `countryId`\
    \ variable. We’ll leave this behind our scope. `UITextField` should have an `@IBOutlet`\
    \ and View Controller as a delegate.\n\nWe create a constant `phoneUtil` as a\
    \ reference to an `NBPhoneNumberUtil` singleton.\n\nAll the logic is inside a\
