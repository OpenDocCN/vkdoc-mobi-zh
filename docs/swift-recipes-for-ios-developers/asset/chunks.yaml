    data (one song in an mp3 format contains millions of bytes), you may want to make
    sure it safely reaches the other end. The stack or protocols we use on the Internet
    guarantee it for us – they use hashes and control sequences under the hood. But
    sometimes, we need to verify the data ourselves. For example, to confirm that
    the data was downloaded completely after the app crashed or was terminated to
    save battery. For this purpose, we can calculate the hash of a file in advance
    and store it on a server. On an app side, we calculate the hash of a downloaded
    file; then we compare them. If hashes match, very likely it’s the same data. And
    as a hash is only 16 bytes long (in the case of MD5), it’s not a big trouble to
    verify it.


    Now let’s see how we can calculate hashes, starting with the most popular one
    – MD5.'
  trans: '

    ### 十六进制编码


    十六进制表示法更易读且更简单。我们不需要任何填充；每个字节用两个十六进制符号表示。十六进制符号是 0 到 9 的数字或 A 到 F 的字母。每个十六进制符号编码
    4 位信息。


    让我们重复对字符串 `"Swift"` 的编码过程（表 3-3）。


    **表 3-3** 单词“Swift”的二进制表示


    | S | w | i | f | t |

    | --- | --- | --- | --- | --- |

    | 0101 0011 | 0111 0111 | 0110 1001 | 0110 0110 | 0111 0100 |


    表 3-4 展示了它在十六进制表示中的样子。


    **表 3-4** 单词“Swift”的十六进制表示


    | 0101 | 0011 | 0111 | 0111 | 0110 | 1001 | 0110 | 0110 | 0111 | 0100 |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | 5 | 3 | 7 | 7 | 6 | 9 | 6 | 6 | 7 | 4 |


    如你所见，十六进制比 Base64 更长。在这个特定案例中，它看起来像一个数字。但通过一些练习，你可以学会阅读它。例如，S 将始终编码为 53，w 编码为
    77，以此类推。


    **注意**


    在源代码中，十六进制数字以 `0x` 开头，以避免与十进制数字混淆。如果十六进制表示为 `String`，它会被引号包裹，但没有任何前缀。


    让我们切换到代码。来自配方 3-9 的扩展提供了一个计算属性，将 `Data` 转换为十六进制编码的 `String`，以及一个执行反向操作的可选构造函数。


    ```

    public extension Data {

    init?(hexString: String) {

    if hexString.count % 2 != 0 {

    return nil

    }

    let allowedCharacters = CharacterSet(charactersIn: "01234567890abcdefABCDEF")

    if hexString.rangeOfCharacter(from: allowedCharacters.inverted, options: String.CompareOptions.literal,
    range: nil) != nil {

    return nil

    }

    self.init(capacity: hexString.count / 2)

    for i in stride(from: 0, to: hexString.count, by: 2) {

    let startIndex = hexString.index(hexString.startIndex, offsetBy: i)

    let endIndex = hexString.index(hexString.startIndex, offsetBy: i + 1)

    let hexPair = String(hexString[startIndex...endIndex])

    let num = UInt8(hexPair, radix: 16)!

    self.append(num)

    }

    }

    var hexString: String {

    map { String(format: "%02hhx", $0) }.joined()

    }

    }

    ```


    **配方 3-9** 在十六进制字符串与 Data 之间相互转换


    请注意，该构造器是可选的，因为并非每个 `String` 都能转换为 `Data`。我们还使用了强制解包，因为我们提前完成了所有必要的检查，知道将 `hexPair`
    转换为 `UInt8` 永远不会失败。


    下面的示例将一个十六进制编码的 `"Swift"` 字符串转换为可读文本。


    ```

    let hexSwift = "5377696674"

    let hexData = Data(hexString: hexSwift)!

    let hexString = String(data: hexData, encoding: .utf8)!

    print(hexString)

    ```


    类似地，这些转换可以作为 `String` 扩展来呈现（配方 3-10）：


    ```

    public extension String {

    init(hexFromData: Data) {

    append(contentsOf: hexFromData.map { String(format: "%02hhx", $0) }.joined())

    }

    func hexToData() -> Data? {

    if hexString.count % 2 != 0 {

    return nil

    }

    let allowedCharacters = CharacterSet(charactersIn: "01234567890abcdefABCDEF")

    if hexString.rangeOfCharacter(from: allowedCharacters.inverted, options: String.CompareOptions.literal,
    range: nil) != nil {

    return nil

    }

    var result = Data(capacity: self.count / 2)

    for i in stride(from: 0, to: hexString.count, by: 2) {

    let startIndex = hexString.index(hexString.startIndex, offsetBy: i)

    let endIndex = hexString.index(hexString.startIndex, offsetBy: i + 1)

    let hexPair = String(hexString[startIndex...endIndex])

    let num = UInt8(hexPair, radix: 16)!

    result.append(num)

    }

    return result

    }

    }

    ```


    **配方 3-10** 在十六进制字符串与 Data 之间相互转换（作为字符串扩展）


    ### MD5、SHA 与其他哈希


    当你需要将数据转换为短字符串，且无需恢复原始数据时，哈希非常有用。哈希无法被还原，但可以进行比较。相同的数据总是产生相同的哈希值。


    最常见的用例之一是存储密码。你可能知道，需要注册的网站和应用在尝试恢复密码时，绝不会将你的密码发给你——而是建议创建一个新密码。它们之所以这样做，是因为它们不存储你的密码（这并不安全）。它们所做的是存储你密码的哈希值。当你下次登录时输入相同的密码，它们的哈希值匹配，服务器就会返回一个成功的响应。该响应通常是一个会话令牌。如果你至少输错了一个字符，哈希值就会不同，服务器将返回一个错误。哈希值匹配的可能性微乎其微，小到可以忽略不计。


    **注意**


    一个 MD5 哈希的长度是 128 位（16 字节）。这意味着有 2¹²⁸ 个唯一的哈希值。两个哈希值意外相同的概率是 1/2¹²⁸，大约为 3 × 10^(−39)，即
    3 × 10^(−37)%，即 0.0000000000003 幺分比。


    哈希的另一个常见用途是数据校验。如果你发送一大块数据（一首 mp3 格式的歌曲包含数百万个字节），你可能希望确保它安全地到达另一端。我们在互联网上使用的协议栈能够为我们保证这一点——它们在底层使用了哈希和控制序列。但有时，我们需要自己验证数据。例如，在应用崩溃或为了省电而终止后，确认数据已完整下载。为此，我们可以预先计算文件的哈希值并将其存储在服务器上。在应用端，我们计算下载文件的哈希值，然后进行比较。如果哈希值匹配，则极有可能是同一份数据。而且，由于哈希值只有
    16 字节长（以 MD5 为例），验证起来并不麻烦。


    现在让我们看看如何计算哈希值，从最流行的 MD5 开始。

    '
- fmt: "### MD5 Hash\n\nMD5（message-digest algorithm，版本5）最初用于密码学，但如今已在其他领域得到应用。另一方面，由于其广泛存在的漏洞，密码学已不再广泛使用它。\n\
    \n任何数据都可以被编码，但通常涉及的是`Data`和`String`对象。在计算哈希之前，`String`需要先转换为`Data`。结果始终是一个`Data`对象，可以使用十六进制或Base64表示形式来打印。\n\
    \nSwift 本身不提供原生的 MD5 哈希实现，但我们可以使用`CommonCrypto`库。请记住，如果您使用的是生产环境的应用（而非 playground），则需要创建一个桥接头文件并包含`CommonCrypto`头文件：\n\
    \n```objc\n#import <CommonCrypto/CommonCrypto.h>\n```\n\n此外，如果您测试以下代码，可能会收到此警告：\n\
    \n```\n'CC_MD5' was deprecated in iOS 13.0: This function is cryptographically\
    \ broken and should not be used in security contexts. Clients should migrate to\
    \ SHA256 (or stronger).\n```\n\n这意味着 Swift 认为 MD5 算法不适用于加密目的，但可以用于数据验证。至于 SHA-256\
    \ 及其他算法，我们将在本章后面介绍。配方 [3-11](#515103_1_En_3_Chapter.xhtml#PC16) 展示了如何计算`Data`和`String`的\
    \ MD5 哈希。\n\n```swift\nimport var CommonCrypto.CC_MD5_DIGEST_LENGTH\nimport func\
    \ CommonCrypto.CC_MD5\nimport typealias CommonCrypto.CC_LONG\n\npublic extension\
    \ String {\n    var md5: Data? {\n        data(using: .utf8)?.md5\n    }\n}\n\n\
    public extension Data {\n    var md5: Data {\n        let length = Int(CC_MD5_DIGEST_LENGTH)\n\
    \        var hash = Data(count: length)\n        _ = hash.withUnsafeMutableBytes\
    \ { digestBytes -> UInt8 in\n            self.withUnsafeBytes { messageBytes ->\
    \ UInt8 in\n                if let messageBytesBaseAddress = messageBytes.baseAddress,\
    \ \n                   let digestBytesBlindMemory = digestBytes.bindMemory(to:\
    \ UInt8.self).baseAddress {\n                    let messageLength = CC_LONG(self.count)\n\
    \                    CC_MD5(messageBytesBaseAddress, messageLength, digestBytesBlindMemory)\n\
    \                }\n                return 0\n            }\n        }\n     \
    \   return hash\n    }\n}\n\n// Recipe 3-11\n// Calculating an MD5 Hash\n```\n\
    \n上述扩展允许我们计算`String`和`Data`对象的 MD5 哈希。为了计算`String`的哈希，它会获取其 UTF-8 表示形式。\n\n> **注意**\
    \  \n> 尽管这是一个函数，并且不是最简单的，但我们将其表示为计算属性，因为首先它不会更改原始对象，其次它是该对象的一个属性或特征。\n\n如果您的应用目标平台为\
    \ iOS 13 或更高版本，可以使用`CryptoKit`，如配方 [3-12](#515103_1_En_3_Chapter.xhtml#PC17) 所示。\n\
    \n```swift\nimport CryptoKit\n\npublic extension Data {\n    var md5: Data {\n\
    \        let bytes = Insecure.MD5.hash(data: self).map { $0 as UInt8 }\n     \
    \   return Data(bytes: bytes, count: bytes.count)\n    }\n}\n\n// Recipe 3-12\n\
    // Calculating MD5 Using CryptoKit (iOS 13 or Later)\n```\n\n这两种实现返回的结果相同。区别在于，第一种适用于较旧版本的\
    \ iOS，而第二种则更短、更清晰。一旦您放弃对 iOS 12 及更早版本的支持，建议立即迁移到新算法。\n\n> **注意**  \n> 此扩展不会生成警告，但其中包含单词“Insecure”。这应提醒开发者，此函数的使用必须受到限制。\n\
    \n### SHA 哈希\n\n正如我们之前所讨论的，MD5 不适用于安全目的。它速度太快且过于简单。用于密码存储和其他安全目的的良好解决方案是使用 SHA\
    \ 组的哈希。SHA 代表安全哈希算法（Secure Hash Algorithm）。该组中有多种算法，但最常见的是 SHA-1 和 SHA-256。\n\n\
    SHA-1 生成 160 位哈希。自 1995 年起为人所知，它被认为不够安全，但比 MD5 安全得多。\n\nSHA-256 是 SHA-2 算法的一个变体。它生成\
    \ 256 位哈希。它在性能和安全性之间提供了良好的平衡，并被推荐用于安全目的。计算`Data`和`String`的 SHA-1、SHA-256 和 SHA-512\
    \ 的方法如配方 [3-13](#515103_1_En_3_Chapter.xhtml#PC18) 所示。\n\n```swift\npublic extension\
    \ String {\n    var sha1: Data? {\n        data(using: .utf8)?.sha1\n    }\n \
    \   var sha256: Data? {\n        data(using: .utf8)?.sha256\n    }\n    var sha512:\
    \ Data? {\n        data(using: .utf8)?.sha512\n    }\n}\n\npublic extension Data\
    \ {\n    var sha1: Data {\n        let bytes = Insecure.SHA1.hash(data: self).map\
    \ { $0 as UInt8 }\n        return Data(bytes: bytes, count: bytes.count)\n   \
    \ }\n    var sha256: Data {\n        let bytes = SHA256.hash(data: self).map {\
    \ $0 as UInt8 }\n        return Data(bytes: bytes, count: bytes.count)\n    }\n\
    \    var sha512: Data {\n        let bytes = SHA512.hash(data: self).map { $0\
    \ as UInt8 }\n        return Data(bytes: bytes, count: bytes.count)\n    }\n}\n\
    \n// Recipe 3-13\n// Calculating SHA Hashes\n```\n\n如您所见，从 SHA-256 开始，不安全前缀消失了。类似地，您可以实现其他算法。\n\
    \n### Hashable 协议与 Swift 哈希\n\nSwift 提供了自己的哈希功能。任何符合`Hashable`协议的类、结构体或其他语言构造都可以被哈希。此功能用于`Dictionary`和`Set`。Swift\
    \ 不存储键，而是存储哈希值。`Hashable`协议有一个函数`hash(into:)`：\n\n```swift\nfunc hash(into hasher:\
    \ inout Hasher) {\n    hasher.combine(property1)\n    hasher.combine(property2)\n\
    \    // ... other properties\n}\n```\n\n您通常不需要实现此函数。如果您的类或结构体的所有成员都是可哈希的，您只需要声明对`Hashable`协议的遵循即可。\n\
    \n`Hashable`的类也应是可相等的（遵循`Equatable`协议）。这意味着它们应声明一个函数来检查两个实例是否相等。\n\n> **注意** \
    \ \n> Swift 提供了两个不同的运算符：`==`和`===`。第一个是相等运算符，遵循`Equatable`协议需要实现它。第二个是恒等运算符，它比较两个类的内存地址。如果两个可等价的类是恒等的，则它们也必然是相等的；但如果它们是相等的，并不能保证它们是恒等的。\n\
    \nSwift `Hasher`在底层使用的算法在不同的 Swift 版本中并不相同。我们不需要知道具体使用了哪种算法；对我们来说，这是一种抽象。如果尝试使用类实现的特定细节，当新版本的\
    \ Swift 再次更改实现时，将会引发问题。\n\n此外，生成的哈希值绝不应在应用外部使用，甚至不应被存储。它们仅用于比较`Set`或`Dictionary`等结构中的键。要将哈希值发送到服务器，您需要使用标准算法之一，如\
    \ SHA 或 MD5。"
  raw: "### MD5 Hash\n\nMD5 (message-digest algorithm, version 5) was originally used\
    \ in cryptography, but nowadays, it has found usages in other areas. Cryptography,\
    \ on the other hand, stopped widely using it because of its extensive vulnerabilities.\n\
    \nAny data can be encoded, but more often than not, it comes to `Data` and `String`\
    \ objects. `String` needs to be converted to `Data` before a hash calculation\
    \ can be made. The result is always a `Data` object, which can be printed using\
    \ hex or Base64 representation.\n\nSwift doesn’t provide native MD5 hashing implementation,\
    \ but we can use the CommonCrypto library. Remember that if you’re using a production\
    \ app, not a playground, you need to create a bridging header and include a CommonCrypto\
    \ header:\n\n```\n#import \n```\n\nMoreover, if you test the following code, you\
    \ may get this warning:\n\n```\n'CC_MD5' was deprecated in iOS 13.0: This function\
    \ is cryptographically broken and should not be used in security contexts. Clients\
    \ should migrate to SHA256 (or stronger).\n```\n\nThis means that Swift considers\
    \ MD5 algorithm not suitable for cryptographic purposes, but it’s ok to use for\
    \ data validation. As for SHA-256 and other algorithms, we’ll go over them later\
    \ in this chapter. Recipe [3-11](#515103_1_En_3_Chapter.xhtml#PC16) shows how\
    \ to calculate MD5 hash of Data and String.\n\n```\nimport var CommonCrypto.CC_MD5_DIGEST_LENGTH\n\
    import func CommonCrypto.CC_MD5\nimport typealias CommonCrypto.CC_LONG\npublic\
    \ extension String {\nvar md5: Data? {\ndata(using: .utf8)?.md5\n}\n}\npublic\
    \ extension Data {\nvar md5: Data {\nlet length = Int(CC_MD5_DIGEST_LENGTH)\n\
    var hash = Data(count: length)\n_ = hash.withUnsafeMutableBytes { digestBytes\
    \ -> UInt8 in\nself.withUnsafeBytes { messageBytes -> UInt8 in\nif let messageBytesBaseAddress\
    \ = messageBytes.baseAddress, let digestBytesBlindMemory = digestBytes.bindMemory(to:\
    \ UInt8.self).baseAddress {\nlet messageLength = CC_LONG(self.count)\nCC_MD5(messageBytesBaseAddress,\
    \ messageLength, digestBytesBlindMemory)\n}\nreturn 0\n}\n}\nreturn hash\n}\n\
    }\nRecipe 3-11\nCalculating an MD5 Hash\n```\n\nThe preceding extension allows\
    \ us to calculate MD5 hashes of both `String` and `Data` objects. In order to\
    \ calculate a `String` hash, it gets a UTF-8 representation of it.\n\nNote\n\n\
    Even though it’s a function, and not the simplest one, we present it as a computed\
    \ property because, first, it doesn’t change the original object and, second,\
    \ it’s a property or characteristic of it.\n\nIf your app targets iOS 13 or later,\
    \ you can use CryptoKit as shown in Recipe [3-12](#515103_1_En_3_Chapter.xhtml#PC17).\n\
    \n```\nimport CryptoKit\npublic extension Data {\nvar md5: Data {\nlet bytes =\
    \ Insecure.MD5.hash(data: self).map { $0 as UInt8 }\nreturn Data(bytes: bytes,\
    \ count: bytes.count)\n}\n}\nRecipe 3-12\nCalculating MD5 Using CryptoKit (iOS\
    \ 13 or Later)\n```\n\nThese two implementations return identical results. The\
    \ difference is that the first one works in older versions of iOS while the second\
    \ one is much shorter and clearer. It’s recommended to migrate to a new algorithm\
    \ as soon as you drop support of iOS 12 and earlier.\n\nNote\n\nThis extension\
    \ doesn’t generate a warning, but it has the word “Insecure” in it. It should\
    \ give the developer an idea that the usage of this function must be limited.\n\
    \n### SHA Hashes\n\nAs we discussed earlier, MD5 is not suitable for security\
    \ purposes. It’s too fast and easy. A good solution for password storing and other\
    \ security purposes is using hashes from the SHA group. SHA stands for Secure\
    \ Hash Algorithm. There are many algorithms in this group, but the most common\
    \ ones are SHA-1 and SHA-256.\n\nSHA-1 produces a 160-bit hash. Known since 1995,\
    \ it’s considered not to be safe enough, yet much safer than MD5.\n\nSHA-256 is\
    \ a variant of the SHA-2 algorithm. It produces a 256-bit hash. It provides a\
    \ good balance between performance and security, and it is recommended for security\
    \ purposes. Calculation of SHA-1, SHA-256 and SHA-512 from Data and String is\
    \ shown in Recipe [3-13](#515103_1_En_3_Chapter.xhtml#PC18).\n\n```\npublic extension\
    \ String {\nvar sha1: Data? {\ndata(using: .utf8)?.sha1\n}\nvar sha256: Data?\
    \ {\ndata(using: .utf8)?.sha256\n}\nvar sha512: Data? {\ndata(using: .utf8)?.sha512\n\
    }\n}\npublic extension Data {\nvar sha1: Data {\nlet bytes = Insecure.SHA1.hash(data:\
    \ self).map { $0 as UInt8 }\nreturn Data(bytes: bytes, count: bytes.count)\n}\n\
    var sha256: Data {\nlet bytes = SHA256.hash(data: self).map { $0 as UInt8 }\n\
    return Data(bytes: bytes, count: bytes.count)\n}\nvar sha512: Data {\nlet bytes\
    \ = SHA512.hash(data: self).map { $0 as UInt8 }\nreturn Data(bytes: bytes, count:\
    \ bytes.count)\n}\n}\nRecipe 3-13\nCalculating SHA Hashes\n```\n\nAs you can see,\
    \ since SHA-256, the insecure prefix disappears. Similarly, you can implement\
    \ other algorithms .\n\n### Hashable Protocol and Swift Hashes\n\nSwift offers\
    \ its own hashing functionality. Any class, struct, or other language construct\
    \ conforming to the Hashable protocol can be hashed. This functionality is used\
    \ for `Dictionary` and `Set`. Instead of storing keys, Swift stores hashes. The\
    \ Hashable protocol has a function `hash(into:)`:\n\n```\nfunc hash(into hasher:\
    \ inout Hasher) {\nhasher.combine(property1)\nhasher.combine(property2)\n// ...\
    \ other properties\n}\n```\n\nYou don’t usually need to implement this function.\
    \ If all members of your class or struct are hashable, you only need to declare\
    \ conformance to the `Hashable` protocol.\n\n`Hashable` classes should be also\
    \ equatable (conforming to the `Equatable` protocol). It means that they should\
    \ declare a function to check the equality of the two instances.\n\nNote\n\nSwift\
    \ offers two different operators: == and ===. The first one is equality, and this\
    \ operator is required to conform to the Equatable protocol. The second one is\
    \ the identity operator, and it compares memory addresses of two classes. If two\
    \ equatable classes are identical, it means they’re also equal, but if they’re\
    \ equal, it doesn’t guarantee that they’re identical.\n\nThe algorithm under the\
    \ hood of Swift `Hasher` is not the same in different Swift versions. We don’t\
    \ need to know which exact algorithm is used; for us, that’s an abstraction. Trying\
    \ to use the specifics of class implementation will cause problems if new versions\
    \ of Swift change implementation again.\n\nWhat’s more, generated hashes should\
    \ never be used outside an app, or even stored somewhere. They’re used for comparing\
    \ keys in structures like `Set` or `Dictionary` only. To send a hash to a server,\
    \ you need to use one of the standard algorithms, like SHA or MD5."
  trans: "\n### MD5 哈希\n\nMD5（消息摘要算法第五版）最初是为密码学应用而设计的，但如今已在其他领域得到应用。另一方面，由于存在广泛的安全漏洞，密码学领域已不再广泛使用它。\n\
    \n任何数据都可以进行编码，但通常涉及的是`Data`和`String`对象。在计算哈希值之前，`String`需要先转换为`Data`。结果始终是一个`Data`对象，可以通过十六进制或\
    \ Base64 表示形式来打印。\n\nSwift 本身不提供原生的 MD5 哈希实现，但我们可以使用`CommonCrypto`库。请记住，如果您使用的是生产环境的应用（而非\
    \ playground），则需要创建一个桥接头文件并包含`CommonCrypto`头文件：\n\n```objc\n#import <CommonCrypto/CommonCrypto.h>\n\
    ```\n\n此外，如果您测试以下代码，可能会收到此警告：\n\n```\n'CC_MD5' was deprecated in iOS 13.0: This\
    \ function is cryptographically broken and should not be used in security contexts.\
    \ Clients should migrate to SHA256 (or stronger).\n```\n\n这意味着 Swift 认为 MD5 算法不适用于加密目的，但可以用于数据验证。至于\
    \ SHA-256 及其他算法，我们将在本章后面介绍。配方 3-11 展示了如何计算`Data`和`String`的 MD5 哈希。\n\n```swift\n\
    import var CommonCrypto.CC_MD5_DIGEST_LENGTH\nimport func CommonCrypto.CC_MD5\n\
    import typealias CommonCrypto.CC_LONG\n\npublic extension String {\n    var md5:\
    \ Data? {\n        data(using: .utf8)?.md5\n    }\n}\n\npublic extension Data\
    \ {\n    var md5: Data {\n        let length = Int(CC_MD5_DIGEST_LENGTH)\n   \
    \     var hash = Data(count: length)\n        _ = hash.withUnsafeMutableBytes\
    \ { digestBytes -> UInt8 in\n            self.withUnsafeBytes { messageBytes ->\
    \ UInt8 in\n                if let messageBytesBaseAddress = messageBytes.baseAddress,\
    \ \n                   let digestBytesBlindMemory = digestBytes.bindMemory(to:\
    \ UInt8.self).baseAddress {\n                    let messageLength = CC_LONG(self.count)\n\
    \                    CC_MD5(messageBytesBaseAddress, messageLength, digestBytesBlindMemory)\n\
    \                }\n                return 0\n            }\n        }\n     \
    \   return hash\n    }\n}\n\n// 配方 3-11\n// 计算 MD5 哈希\n```\n\n上述扩展允许我们计算`String`和`Data`对象的\
    \ MD5 哈希。为了计算`String`的哈希，它会获取其 UTF-8 表示形式。\n\n> **注意**  \n> 尽管这是一个函数，并且并非最简单的方式，但我们将其表示为计算属性，因为首先它不会更改原始对象，其次它是该对象的一个属性或特征。\n\
    \n如果您的应用目标平台为 iOS 13 或更高版本，可以使用`CryptoKit`，如配方 3-12 所示。\n\n```swift\nimport CryptoKit\n\
    \npublic extension Data {\n    var md5: Data {\n        let bytes = Insecure.MD5.hash(data:\
    \ self).map { $0 as UInt8 }\n        return Data(bytes: bytes, count: bytes.count)\n\
    \    }\n}\n\n// 配方 3-12\n// 使用 CryptoKit 计算 MD5（iOS 13 或更高版本）\n```\n\n这两种实现返回的结果相同。区别在于，第一种适用于较旧版本的\
    \ iOS，而第二种则更短、更清晰。一旦您放弃对 iOS 12 及更早版本的支持，建议立即迁移到新算法。\n\n> **注意**  \n> 此扩展不会生成警告，但其中包含单词“Insecure”。这应提醒开发者，此函数的使用必须受到限制。\n\
    \n### SHA 哈希\n\n正如我们之前所讨论的，MD5 不适用于安全目的。它速度太快且过于简单。用于密码存储和其他安全目的的良好解决方案是使用 SHA\
    \ 组的哈希。SHA 代表安全哈希算法（Secure Hash Algorithm）。该组中有多种算法，但最常见的是 SHA-1 和 SHA-256。\n\n\
    SHA-1 生成 160 位哈希。自 1995 年起为人所知，它被认为不够安全，但比 MD5 安全得多。\n\nSHA-256 是 SHA-2 算法的一个变体。它生成\
    \ 256 位哈希。它在性能和安全性之间提供了良好的平衡，并被推荐用于安全目的。计算`Data`和`String`的 SHA-1、SHA-256 和 SHA-512\
    \ 的方法如配方 3-13 所示。\n\n```swift\npublic extension String {\n    var sha1: Data?\
    \ {\n        data(using: .utf8)?.sha1\n    }\n    var sha256: Data? {\n      \
    \  data(using: .utf8)?.sha256\n    }\n    var sha512: Data? {\n        data(using:\
    \ .utf8)?.sha512\n    }\n}\n\npublic extension Data {\n    var sha1: Data {\n\
    \        let bytes = Insecure.SHA1.hash(data: self).map { $0 as UInt8 }\n    \
    \    return Data(bytes: bytes, count: bytes.count)\n    }\n    var sha256: Data\
    \ {\n        let bytes = SHA256.hash(data: self).map { $0 as UInt8 }\n       \
    \ return Data(bytes: bytes, count: bytes.count)\n    }\n    var sha512: Data {\n\
    \        let bytes = SHA512.hash(data: self).map { $0 as UInt8 }\n        return\
    \ Data(bytes: bytes, count: bytes.count)\n    }\n}\n\n// 配方 3-13\n// 计算 SHA 哈希\n\
    ```\n\n如您所见，从 SHA-256 开始，不安全前缀消失了。类似地，您可以实现其他算法。\n\n### Hashable 协议与 Swift 哈希\n\
    \nSwift 提供了自己的哈希功能。任何符合`Hashable`协议的类、结构体或其他语言构造都可以被哈希。此功能用于`Dictionary`和`Set`。Swift\
    \ 不存储键，而是存储哈希值。`Hashable`协议有一个函数`hash(into:)`：\n\n```swift\nfunc hash(into hasher:\
    \ inout Hasher) {\n    hasher.combine(property1)\n    hasher.combine(property2)\n\
    \    // ... 其他属性\n}\n```\n\n您通常不需要实现此函数。如果您的类或结构体的所有成员都是可哈希的，您只需要声明对`Hashable`协议的遵循即可。\n\
    \n`Hashable`的类也应是可相等的（遵循`Equatable`协议）。这意味着它们应声明一个函数来检查两个实例是否相等。\n\n> **注意** \
    \ \n> Swift 提供了两个不同的运算符：`==`和`===`。第一个是相等运算符，遵循`Equatable`协议需要实现它。第二个是恒等运算符，它比较两个类的内存地址。如果两个可等价的类是恒等的，则它们也必然是相等的；但如果它们是相等的，并不能保证它们是恒等的。\n\
    \nSwift `Hasher`在底层使用的算法在不同的 Swift 版本中并不相同。我们不需要知道具体使用了哪种算法；对我们来说，这是一种抽象。如果尝试使用类实现的特定细节，当新版本的\
    \ Swift 再次更改实现时，将会引发问题。\n\n此外，生成的哈希值绝不应在应用外部使用，甚至不应被存储。它们仅用于比较`Set`或`Dictionary`等结构中的键。要将哈希值发送到服务器，您需要使用标准算法之一，如\
    \ SHA 或 MD5。\n"
- fmt: '### Salt


    As we discussed password hashing earlier, it’s important to give a mention to
    *salt*. Not the widespread seasoning, but the string or two of code that an app
    adds to the beginning and/or end of your password before hash calculation. Salt
    must be the same and shouldn’t change in new versions of an app.


    Salt helps to keep your password private. If two different services use `SHA-256`
    to store passwords, the same password will generate the same `SHA-256`, which
    will create a vulnerability. The server administrator will be able to use your
    password hash to log in to another service. Using salt is pretty straightforward.
    You can see how to use it in Recipe [3-14](#515103_1_En_3_Chapter.xhtml#PC20).


    **Note**: It’s not recommended to use the same password for two different services,
    but as a developer, you should always assume that users will ignore this recommendation.


    ```

    let password = "..."

    let leftSalt = "..." // String constant, which should be the same in all versions
    of your app

    let rightSalt = "..." // String constant, which should be the same in all versions
    of your app

    let saltedPassword = "\(leftSalt)\(password)\(rightSalt)"

    let passwordHash = saltedPassword.sha256

    ```


    This is a safe way to send a password to the server. On its side, the server script
    can add another salt and calculate another password hash.


    While developing a security system, be creative. Add unexpected layers of protection.
    Hackers know perfectly well everything described here. Do more. Use a combination
    of different methods to confuse them and to stay one step ahead.


    ## Integer Indexing


    Swift doesn’t accept integer numbers as `String` indexes. For example, you can’t
    just get the 5th `Character` of a `String`. Apple explains it with internal encoding.
    As characters may have different lengths, indexing them with `Int`, like in C,
    may create confusion and index not a 5th character, but a 5th byte or 5th pair
    of bytes.


    Unlike `Int`, `String.Index` gives context. Belonging to a particular `String`,
    it knows which `Character` it refers to and knows how *wide* it is.


    In real life, we often need to get n-th letter in word or range with known indices
    like in our Recipe [3-9](#515103_1_En_3_Chapter.xhtml#PC11) in Section “Hex encoding”,
    converting hex `String` to `Data`.


    The `String` extensions we’ll write in this section will add functionality to
    get a `Character` or a `Substring` from a `String` using `Int`-based subscripts
    or ranges.


    Before we move on, there’s one detail that needs some attention. Swift allows
    two different structures: `String` and `Substring`. While `String` actually stores
    text data, `Substring` is only a reference to an existing `String`.


    `Substring` can be easily converted to `String`:


    ```

    let substring: Substring = ...

    let string: String = String(substring)

    ```


    At the same time, if you actively work with substrings, you may want to use `StringProtocol`
    in your functions instead of `String`. It will allow you to pass both `String`
    and `Substring`. If you don’t modify it, there’s no difference; you won’t need
    to convert one into another. But that decision has a price as well – when you
    turn a `Substring` into a `String`, Swift copies all the data into a new memory
    fragment. It may not be important if you do it once or twice with short strings,
    but if you need an efficient app, you need to keep this in mind.


    Recipe [3-15](#515103_1_En_3_Chapter.xhtml#PC23) shows how to add integer indexing
    to `Strings` in your project, but first let’s decide what we want:


    ```

    public extension String {

    subscript (i: Int) -> Character {

    return self[index(startIndex, offsetBy: i)]

    }

    subscript (bounds: CountableRange<Int>) -> Substring {

    let start = index(startIndex, offsetBy: bounds.lowerBound)

    let end = index(startIndex, offsetBy: bounds.upperBound)

    if end < startIndex { return "" }

    return self[start..<end]

    }

    subscript (bounds: CountableClosedRange<Int>) -> Substring {

    let start = index(startIndex, offsetBy: bounds.lowerBound)

    let end = index(startIndex, offsetBy: bounds.upperBound)

    if end < startIndex { return "" }

    return self[start...end]

    }

    subscript (bounds: PartialRangeThrough<Int>) -> Substring {

    let end = index(startIndex, offsetBy: bounds.upperBound)

    if end < startIndex { return "" }

    return self[startIndex...end]

    }

    subscript (bounds: PartialRangeUpTo<Int>) -> Substring {

    let end = index(startIndex, offsetBy: bounds.upperBound)

    if end < startIndex { return "" }

    return self[startIndex..<end]

    }

    subscript (bounds: PartialRangeFrom<Int>) -> Substring {

    let start = index(startIndex, offsetBy: bounds.lowerBound)

    let end = index(endIndex, offsetBy: -1)

    if end < startIndex { return "" }

    return self[start...end]

    }

    }

    ```


    ```

    let str = "Some string"

    let substring = str[5...] // "string" word wrapped into Substring object

    let firstChar = substring[0] // Character "S"

    ```


    ## Localization


    iOS has its own localization system. It automatically chooses the preferred language
    based on the user’s settings and localizes both storyboards and strings in the
    source code if you provide a localization for them.


    ### NSLocalizedString Macro


    To get a localized version of a string in the source code, you should use a macro:


    ```

    NSLocalizedString(key, comment)

    ```


    It’s available in any part of an iOS app. A key argument is an identifier of a
    string. Identifiers should be unique, and they can contain any symbol allowed
    in a Swift `String` object. A comment is used for generating files for translators.
    It’s allowed to keep it empty if you’re not generating a translation file with
    Xcode or `genstrings` utility.


    ### Files with Translations


    You should add files with a `strings` extension – for example, `Localised.strings`
    to provide a translation. You can either put them manually in directories corresponding
    to languages or do it using Xcode.


    A strings file is a simple text file with key-value pairs. Pairs are separated
    with a semicolon. Key and value are separated with an equal sign. Both keys and
    values should be inside quotation marks:


    ```

    "firstName": "First Name";

    ```


    To avoid confusion, we use more precise identifiers, for example:


    ```

    "auth.firstName.title": "First Name";

    "auth.firstName.placeholder": "Enter your first name here";

    ```


    ### LocalizedStringKey Struct


    Localization in SwiftUI is usually done with `LocalizedStringKey`. It’s a `struct`,
    but it also conforms to protocol `ExpressibleByStringLiteral`, which means that
    we can assign a `String` to it.


    ```

    let name: LocalizedStringKey = "name"

    let text = Text(name)

    ```


    `Text` in this code will get a value from translation.


    `LocalizedStringKey` also conforms to `ExpressibleByStringInterpolation`. You
    can use it with `\()` construction.


    ```

    let name = "Alex"

    Text("hello \(name)")

    ```


    Translation file should contain:


    ```

    "hello %@" = "Hello %@!";

    ```


    `Text` view will be created with string “Hello Alex!”.


    ### Syntactic Sugar


    When you have a lot of localizable content, it can be annoying to type `NSLocalizedString`
    every time. Wouldn’t it look much better with an extension from Recipe [3-16](#515103_1_En_3_Chapter.xhtml#PC30)?


    ```

    public extension StringProtocol {

    var localised: String {

    NSLocalizedString(self, "")

    }

    }

    ```


    Now you can use it this way:


    ```

    label.text = "auth.firstName.title".localised

    ```


    **Note**: UI elements from storyboards or nibs can be localized without writing
    code. Mark a storyboard or nib file as localizable in Xcode Interface Builder.
    Xcode will generate the necessary files automatically, you’ll only need to change
    texts.


    ## Summary


    Old programming languages like C didn’t have a special type for strings, programmers
    used array of bytes to store them. It created a lot of potential bugs in code
    and made string analysis nearly impossible. Swift with its `String` type and extensions
    offers completely different approach.


    In this chapter we saw how to check if a `String` has letters or digits, it has
    contains valid name, email or other data. We used `String` for storing hashes,
    verifying data and encrypting passwords. Finally, we talked about localization
    of iOS apps.


    Until now we were discussing data processing, but didn’t discuss presentation.
    In the next chapter we’ll fix it and talk about user interface.'
