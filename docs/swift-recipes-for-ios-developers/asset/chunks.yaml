  trans: '

    ### 生成 XML


    对于 iOS 应用来说，生成 XML 是一项非常罕见的任务，我们为了完整性才讨论它。你不太可能需要生成 XML 数据并保存或发送到某个地方。另一方面，不太可能并不意味着不可能。你可以在配方
    2-4 中找到完整代码。但首先，让我们看看它是如何工作的。


    由于没有标准的解决方案，也没有与最新 Swift 版本兼容的库，我们将编写一个简单的 XML 生成器。XML 是一种递归结构——一个标签可以包含其他标签或多个标签，因此这个生成器也将是递归的。


    我们将把所有元素分为三组：


    - 字典（Dictionaries）

    - 数组（Arrays）

    - 基础元素（Basic elements）


    XML 中的`Array`由多个同名但内容不同的标签表示。`Dictionary`是一个内部包含标签的标签。而基础元素只是一个内部包含文本字符串（表示任何类型）的标签。


    基础元素将使用我们之前讨论过的`String`插值生成。对于其他两种类型的元素，我们将使用两个函数：


    ```

    func convertArrayToXML(array: [Any], startElement: String) -> String {

    var xml = ""

    for value in array {

    if let value = value as? [String: Any] {

    xml += convertDictionaryToXML(dictionary: value, startElement: startElement, isFirstElement:
    false)

    }

    else if let value = value as? [Any] {

    xml += convertArrayToXML(array: value, startElement: startElement)

    }

    else {

    xml += "\(value)\n"

    }

    }

    return xml

    }

    func convertDictionaryToXML(dictionary: [String: Any], startElement: String, isFirstElement:
    Bool) -> String {

    var xml = ""

    let arr = dictionary.keys

    if isFirstElement {

    xml += "\n"

    }

    xml += "\n"

    for nodeName in arr {

    guard let nodeValue = dictionary[nodeName] else { continue }

    if let nodeValue = nodeValue as? [Any] {

    if !nodeValue.isEmpty {

    xml += convertArrayToXML(array: nodeValue, startElement: nodeName)

    }

    }

    else if let nodeValue = nodeValue as? [String: Any] {

    xml += convertDictionaryToXML(dictionary: nodeValue, startElement: nodeName, isFirstElement:
    false)

    }

    else {

    xml += "\(nodeValue)\n"

    }

    }

    xml += "\n"

    return xml.replacingOccurrences(of: "&", with: "&")

    }

    配方 2-4

    生成 XML

    ```


    **用法**


    ```

    let dict: [String: Any] = ...

    let xml = convertDictionaryToXML(dictionary: dict, startElement: "root", isFirstElement:
    true)

    ```


    ## 处理 YAML


    YAML（Yet Another Markup Language）是另一种流行的数据存储和交换格式。其优点是易于阅读，对人类友好。缺点在于 YAML 使用缩进作为分隔符（意味着使用前导空格来分隔数据层级），这与
    Python 或 GDScript 类似。你可以用简单的文本编辑器编辑 YAML 文件，但很容易出错。


    YAML 最流行的用途之一是配置文件。Flutter 应用使用 YAML 作为主配置文件，Google Cloud 也使用 YAML 配置其服务。


    对我们来说幸运的是，GitHub 上有许多用于解析和/或生成 YAML 的库。其中一个是`Yams`。


    如果你使用 CocoaPods，将这一行添加到你的`Podfile`中：


    ```

    pod ''Yams''

    ```


    然后，你可以像配方 2-5 所示那样生成和解析 YAML。


    ```

    import Yaml

    // 生成 YAML

    let strYAML: String? = try? Yams.dump(object: dictionary)

    // 解析 YAML

    let loadedDictionary = try? Yams.load(yaml: mapYAML) as? [String: Any]

    配方 2-5

    解析和生成 YAML

    ```


    ## URL 编码字符串


    另一种编码数据的方式是 URL 编码字符串。这对于生成带有 GET 参数的 URL 以及使用`application/x-www-form-urlencoded`类型的
    POST 数据非常有用。


    URL 编码字符串是一个由 & 符号分隔的键值对组成的文本字符串：`key1=value1&key2=value2&...`。如果使用 GET 方法（作为
    URL 的一部分）发送，它通过问号与主 URL 分隔：`https://some_website.com?key1=value1&key2=value2&...`。作为
    POST 数据，它必须不带任何额外符号发送。


    如果你向服务器发送数据，你可能需要提供一组键，这些键必须仅包含拉丁字母、数字和可能的千分号。涉及值的情况则更复杂——它们可以包含空格、等号或其他*禁止*字符。因此，我们应该对它们进行编码。Swift
    有一个标准的`String`方法`addingPercentEncoding(withAllowedCharacters:)`。配方 2-6 展示了完整的扩展。


    ```

    public extension Dictionary where Key: ExpressibleByStringLiteral {

    var urlEncodedString: String {

    var result: [String] = []

    for key in keys {

    let keyEncoded = "\(key)".addingPercentEncoding(withAllowedCharacters: .urlPathAllowed)!

    let valueEncoded = "\(self[key]!)".addingPercentEncoding(withAllowedCharacters:
    .urlPathAllowed)!

    result.append("\(keyEncoded)=\(valueEncoded)")

    }

    return result.joined(separator: "&")

    }

    }

    配方 2-6

    URL 编码参数字典

    ```


    用法非常直接：


    ```

    let urlArgsDict: [String: Any] = [

    "firstName": "Luis Alberto",

    "lastName": "Lopez Garcia",

    "age": 15

    ]

    let urlArgs = urlArgsDict.urlEncodedString

    print(urlArgs)

    ```


    输出将如下所示：


    ```

    firstName=Luis%20Alberto&lastName=Lopez%20Garcia&age=15

    ```


    它完全适合发送给 API：


    ```

    https://my_api.com/register_user?firstName=Luis%20Alberto&lastName=Lopez%20Garcia&age=15

    ```


    注意：通过 GET 请求注册用户是一种不好的做法。不过，这个例子演示了如何对任何数据进行编码，以便进一步发送给 API。


    ## 序列化和反序列化


    在前面的章节中，我们讨论了如何将 JSON 解析为`Dictionary`或`Array`，如何从中提取类型化数据，以及如何将 API 的 JSON 转换为自定义类或结构体的实例。在这里，我们将走一条捷径，直接将
    JSON 转换为对象。


    注意：如果你曾经为 Android 开发过应用，你会知道要将参数传递给另一个`Activity`，你需要将它们添加到`Intent`中。这是一个序列化的例子。你也可以传递自定义类的对象，但它必须实现`Parcelable`接口。该接口具有用于序列化和反序列化类数据的函数。

