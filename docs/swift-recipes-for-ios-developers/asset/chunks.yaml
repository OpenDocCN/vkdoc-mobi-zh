    Figure 3-1


    Credit card visualization in an iOS app


    ## Base64 and Hex Encoding


    Oftentimes, we need to present `Data` in the form of a `String`. We may need it
    for debug output, for passing it to the server, or for JSON integration. There
    are two common ways to do it: Base64 and hex encoding.


    ### Base64 Encoding


    Base64 is a way to represent binary data as a text string. It splits data into
    6-bit fragments and encodes it using human-readable characters:


    *   26 uppercase Latin letters


    *   26 lowercase Latin letters


    *   10 digits


    *   + (plus sign)


    *   / (slash sign)


    As we can only encode integer amount of bytes, and 1 byte equals 8 bits, the data
    length needs to be divisible by three. If it isn’t, padding is used. The equal
    sign (=) is used for padding when you need to add empty bits to the end of data.
    By adding one or two paddings, you can always get a number of bits, which is divisible
    by both 6 and 8.


    The advantage of Base64 encoding is that characters used for encoding are basic
    ASCII characters, which means they’re represented the same in all 1-byte encodings.


    Table [3-1](#515103_1_En_3_Chapter.xhtml#Tab1) encodes the word `"Swift"` into
    Base64.


    Table 3-1


    Binary representation of the word “Swift”


    | S | w | i | f | t |

    | --- | --- | --- | --- | --- |

    | 0101 0011 | 0111 0111 | 0110 1001 | 0110 0110 | 0111 0100 |


    Totally, we get 40 bytes, which is not divisible by 6, so we’ll need padding.
    Table [3-2](#515103_1_En_3_Chapter.xhtml#Tab2) splits it into 6-bit fragments.


    Table 3-2


    Base64 representation of the word “Swift”


    | 010100 | 110111 | 011101 | 101001 | 011001 | 100111 | 0100XX |

    | --- | --- | --- | --- | --- | --- | --- |

    | U | 3 | d | p | Z | n | Q= |


    Result: “Swift” -> U3dpZnQ=.


    Encoding ASCII text to Base64 doesn’t usually make sense, but using the same method,
    we can encode pictures, audio files, and basically anything to strings. It’s more
    compact than hex encoding, using two symbols to encode each byte, and it’s easily
    encodable and decodable. Typical examples of Base64-encoded binaries are email
    attachments. Recipe [3-8](#515103_1_En_3_Chapter.xhtml#PC10) shows how to decode
    from Base64 and encode to this format.


    ```

    let base64String = "U3dpZnQ="

    let data = Data(base64Encoded: base64String)!

    // Check if we got correct text

    let decodedString = String(data: data, encoding: .utf8)!

    print(decodedString)

    let base64Again = data.base64EncodedString()

    print(base64Again)

    Recipe 3-8

    Encoding and Decoding Base64

    ```


    In the preceding example, we decode Base64 String into Data using the optional
    constructor `Data(base64Encoded:)`. In this case, we use force unwrapping because
    we know that it’s valid. Keep in mind that in production code, it’s not an advisable
    practice.


    `Data` has a method `base64EncodedString` for encoding. These are standard Swift
    functions; no extra code is needed in this case .'
  trans: "\n### 信用卡信息\n\n如果想为应用添加任何付费功能，就需要使用应用内购买。苹果不允许你使用直接付款，否则应用将被拒绝。\n\n另一方面，如果你销售的商品或服务不属于应用本身，那么你可能需要获取用户的信用卡号。典型的例子包括外卖应用、在线商店和预订服务。\n\
    \n最常用的信用卡包含以下四个组成部分：\n\n- `Number`（卡号）\n- `Expiration`（有效期）月份和年份\n- `Security\
    \ code`（安全码）（`CVC`/`CVV`）\n- `Name`（持卡人姓名）\n\n根据卡类型的不同，卡号位数从 16 到 19 位不等。通常，卡号每四位用空格分隔，但这并非强制要求。因此，我们会在验证之前移除所有空格。\n\
    \n至于有效期月份和年份，一切都很直接。月份是 1 到 12 之间的数字，年份有两位或四位数字。我们需要验证有效期是否在当前年月的当月或之后。\n\n安全码始终是一个数字，由三位或四位组成。由于它可能以零开头，因此其整数表示范围是\
    \ 0 到 9999。\n\n姓名的验证与注册表单上用户名的验证方式相同，因此我们只需复用现有代码即可。完整的信用卡验证代码在示例 3-7 中给出。\n\n\
    ```\npublic struct CreditCard {\n    public var number: String\n    public var\
    \ expMonth: Int\n    public var expYear: Int\n    public var securityCode: Int\n\
    \    public var nameOnCard: String\n    public init(number: String, expMonth:\
    \ Int, expYear: Int, securityCode: Int, nameOnCard: String) {\n        self.number\
    \ = number\n        self.expMonth = expMonth\n        self.expYear = expYear\n\
    \        self.securityCode = securityCode\n        self.nameOnCard = nameOnCard\n\
    \    }\n    var isNumberValid: Bool {\n        let numberProcessed = String(number.filter\
    \ { !\" \".contains($0) })\n        return numberProcessed.containsOnlyDigits\
    \ && numberProcessed.count >= 16 && numberProcessed.count <= 19\n    }\n    var\
    \ isExpirationValid: Bool {\n        if expMonth < 1 || expMonth > 12 {\n    \
    \        return false\n        }\n        let expYear4Digits = (expYear < 100\
    \ ? 2000 : 0) + expYear\n        let monthToday = Calendar.current.component(.month,\
    \ from: Date())\n        let yearToday = Calendar.current.component(.year, from:\
    \ Date())\n        switch expYear4Digits - yearToday {\n        case ..<0: return\
    \ false\n        case 0: return expMonth >= monthToday\n        default: return\
    \ true\n        }\n    }\n    var isSecurityCodeValid: Bool {\n        securityCode\
    \ < 10000\n    }\n    var isNameValid: Bool {\n        nameOnCard.isValidName\n\
    \    }\n    public var isCardValid: Bool {\n        isNumberValid && isExpirationValid\
    \ && isSecurityCodeValid && isNameValid\n    }\n}\n```\n\n与我们之前的大多数示例不同，这个示例是一个类，而不是扩展。信用卡卡号是一个整体概念——例如，我们同时验证月份和年份，因此不会将它们拆分成一组扩展。\n\
    \n在此之前，需要向验证结构中填入数据。使用 `isCardValid` 属性来获取布尔类型的验证结果。如果你需要知道哪个号码组件无效，可以使用 `isNameValid`、`isNumberValid`\
    \ 等函数。\n\n注意：本章我们讨论的是信息处理，而非用户界面，但有时在应用中（而非 playground）尝试代码可能更为实用。为此，你可以使用用于输入（扫描）和展示银行卡的库。在图\
    \ 3-1 中，你可以看到由 `CreditCardView` 库（ [`github.com/jboullianne/CreditCardView`](https://github.com/jboullianne/CreditCardView)\
    \ ）生成的展示效果。至于扫描，你可以使用 `card.io`（ [`github.com/card-io/card.io-iOS-SDK`](https://github.com/card-io/card.io-iOS-SDK)\
    \ ）。\n\n![](img/515103_1_En_3_Fig1_HTML.jpg)\n\n一张典型的 VISA 卡图片，包含用于容纳 16 位卡号的占位符。持卡人姓名为\
    \ Jean Marc Boullianne。有效期是 02/30。\n\n**图 3-1** iOS 应用中的信用卡可视化展示\n\n## Base64\
    \ 与十六进制编码\n\n我们经常需要将 `Data` 以 `String` 的形式呈现。这可能出于调试输出、传递给服务器或 JSON 集成的需要。有两种常见方式：Base64\
    \ 编码和十六进制编码。\n\n### Base64 编码\n\nBase64 是一种将二进制数据表示为文本字符串的方法。它将数据分割成 6 位的片段，并使用人类可读的字符进行编码：\n\
    \n- 26 个大写拉丁字母\n- 26 个小写拉丁字母\n- 10 个数字\n- `+`（加号）\n- `/`（斜杠）\n\n由于我们只能编码整数个字节，而\
    \ 1 字节等于 8 位，数据长度需要能被 3 整除。如果不能，则使用填充。当你需要在数据末尾添加空位时，会使用等号（`=`）进行填充。通过添加一个或两个填充位，你总能得到一个同时能被\
    \ 6 和 8 整除的位数。\n\nBase64 编码的优势在于，用于编码的字符是基本的 ASCII 字符，这意味着它们在所有单字节编码中表示方式相同。\n\
    \n表 3-1 将单词 `\"Swift\"` 编码为 Base64。\n\n**表 3-1** 单词“Swift”的二进制表示\n\n| S | w |\
    \ i | f | t |\n| --- | --- | --- | --- | --- |\n| 0101 0011 | 0111 0111 | 0110\
    \ 1001 | 0110 0110 | 0111 0100 |\n\n总共得到 40 位，不能被 6 整除，因此我们需要填充。表 3-2 将其分割成 6\
    \ 位的片段。\n\n**表 3-2** 单词“Swift”的 Base64 表示\n\n| 010100 | 110111 | 011101 | 101001\
    \ | 011001 | 100111 | 0100XX |\n| --- | --- | --- | --- | --- | --- | --- |\n\
    | U | 3 | d | p | Z | n | Q= |\n\n结果：“Swift” -> U3dpZnQ=。\n\n将 ASCII 文本编码为 Base64\
    \ 通常没有意义，但使用同样的方法，我们可以将图片、音频文件以及几乎所有内容编码为字符串。它比十六进制编码更紧凑，后者每个字节需要两个符号来表示，而 Base64\
    \ 易于编码和解码。Base64 编码的二进制文件的典型例子是电子邮件附件。示例 3-8 展示了如何从 Base64 解码以及如何编码为这种格式。\n\n\
    ```\nlet base64String = \"U3dpZnQ=\"\nlet data = Data(base64Encoded: base64String)!\n\
    // 检查我们是否得到了正确的文本\nlet decodedString = String(data: data, encoding: .utf8)!\n\
    print(decodedString)\nlet base64Again = data.base64EncodedString()\nprint(base64Again)\n\
    ```\n\n在前面的例子中，我们使用可选构造器 `Data(base64Encoded:)` 将 Base64 字符串解码为 `Data`。在这种情况下，我们使用了强制解包，因为我们知道它有效。请记住，在生产代码中，这不是推荐的做法。\n\
    \n`Data` 有一个用于编码的方法 `base64EncodedString`。这些是标准的 Swift 函数；在这种情况下不需要额外的代码。\n"
- fmt: '### Hex Encoding


    Hex representation is more human-readable and more simple. We don’t need any paddings;
    each byte is represented with two hex symbols. A hex symbol is a number from 0
    to 9 or a letter from A to F. Each hex symbol encodes 4 bytes of information.


    Let’s repeat the `"Swift"` encoding string (Table [3-3](#515103_1_En_3_Chapter.xhtml#Tab3)).


    **Table 3-3** Binary representation of the word “Swift”


    | S | w | i | f | t |

    | --- | --- | --- | --- | --- |

    | 0101 0011 | 0111 0111 | 0110 1001 | 0110 0110 | 0111 0100 |


    Table [3-4](#515103_1_En_3_Chapter.xhtml#Tab4) shows how it looks in hex representation.


    **Table 3-4** Hex representation of the word “Swift”


    | 0101 | 0011 | 0111 | 0111 | 0110 | 1001 | 0110 | 0110 | 0111 | 0100 |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | 5 | 3 | 7 | 7 | 6 | 9 | 6 | 6 | 7 | 4 |


    As you can see, hex is longer than Base64. And in this particular case, it looks
    like a number. But with some practice, you can learn to read it. For example,
    S will always be encoded to 53, w to 77, and so on.


    **Note**


    In source code, hex numbers start with `0x` to avoid confusion with decimal numbers.
    If hex is represented as a `String`, it’s wrapped in quotes but doesn’t have any
    prefixes.


    Let’s switch to code. The extension from Recipe [3-9](#515103_1_En_3_Chapter.xhtml#PC11)
    offers a computed property turning `Data` to hex-encoded `String` and optional
    constructor doing the opposite.


    ```

    public extension Data {

    init?(hexString: String) {

    if hexString.count % 2 != 0 {

    return nil

    }

    let allowedCharacters = CharacterSet(charactersIn: "01234567890abcdefABCDEF")

    if hexString.rangeOfCharacter(from: allowedCharacters.inverted, options: String.CompareOptions.literal,
    range: nil) != nil {

    return nil

    }

    self.init(capacity: hexString.count / 2)

    for i in stride(from: 0, to: hexString.count, by: 2) {

    let startIndex = hexString.index(hexString.startIndex, offsetBy: i)

    let endIndex = hexString.index(hexString.startIndex, offsetBy: i + 1)

    let hexPair = String(hexString[startIndex...endIndex])

    let num = UInt8(hexPair, radix: 16)!

    self.append(num)

    }

    }

    var hexString: String {

    map { String(format: "%02hhx", $0) }.joined()

    }

    }

    ```


    **Recipe 3-9** Converting Hex String to Data and Back


    Please note that the initializer is optional as not every `String` can be converted
    to `Data`. We also used force unwrapping because we made all the necessary checks
    in advance and we know that converting `hexPair` to `UInt8` will never fail.


    The following example converts a hex-encoded `"Swift"` string to readable text.


    ```

    let hexSwift = "5377696674"

    let hexData = Data(hexString: hexSwift)!

    let hexString = String(data: hexData, encoding: .utf8)!

    print(hexString)

    ```


    Similarly, these conversions can be presented as `String` extensions (Recipe [3-10](#515103_1_En_3_Chapter.xhtml#PC13)):


    ```

    public extension String {

    init(hexFromData: Data) {

    append(contentsOf: hexFromData.map { String(format: "%02hhx", $0) }.joined())

    }

    func hexToData() -> Data? {

    if hexString.count % 2 != 0 {

    return nil

    }

    let allowedCharacters = CharacterSet(charactersIn: "01234567890abcdefABCDEF")

    if hexString.rangeOfCharacter(from: allowedCharacters.inverted, options: String.CompareOptions.literal,
    range: nil) != nil {

    return nil

    }

    var result = Data(capacity: self.count / 2)

    for i in stride(from: 0, to: hexString.count, by: 2) {

    let startIndex = hexString.index(hexString.startIndex, offsetBy: i)

    let endIndex = hexString.index(hexString.startIndex, offsetBy: i + 1)

    let hexPair = String(hexString[startIndex...endIndex])

    let num = UInt8(hexPair, radix: 16)!

    result.append(num)

    }

    return result

    }

    }

    ```


    **Recipe 3-10** Converting Hex String to Data and Back (As String Extensions)


    ### MD5, SHA, and Other Hashes


    Hashes are useful when you need to convert data into a short string without the
    possibility to restore the original data. Hashes can’t be restored, but they can
    be compared. The same data always produces the same hash.


    One of the most popular use cases is storing passwords. As you probably know,
    websites and apps that require registration never send you your password when
    you try to restore it – they offer to create a new one instead. It works this
    way because they don’t store your password as it’s unsafe. What they do is to
    store a hash of your password. When you type the same password during the next
    login, their hashes match, and the server returns a successful response. Said
    response is usually a session token. If you made a mistake at least in one character,
    the hash will be different, and the server will return an error. There’s a tiny
    chance that hashes will match, but it’s so small that we can ignore it.


    **Note**


    An MD5 hash is 128 bits long (16 bytes). It means there are 2^(128) unique hashes.
    The chance that two hashes will be accidentally the same is 1/2^(128), which is
    around 3 ∗ 10^(−39), or 3 ∗ 10^(−37)%, or 0.0000000000003 yoctopercent.


    Another common use of hashes is data verification. If you send a big portion of
    data (one song in an mp3 format contains millions of bytes), you may want to make
    sure it safely reaches the other end. The stack or protocols we use on the Internet
    guarantee it for us – they use hashes and control sequences under the hood. But
    sometimes, we need to verify the data ourselves. For example, to confirm that
    the data was downloaded completely after the app crashed or was terminated to
    save battery. For this purpose, we can calculate the hash of a file in advance
    and store it on a server. On an app side, we calculate the hash of a downloaded
    file; then we compare them. If hashes match, very likely it’s the same data. And
    as a hash is only 16 bytes long (in the case of MD5), it’s not a big trouble to
    verify it.


    Now let’s see how we can calculate hashes, starting with the most popular one
    – MD5.'
