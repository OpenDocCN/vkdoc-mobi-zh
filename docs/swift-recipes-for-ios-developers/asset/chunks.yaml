    \n在 Swift 中，数据远不止基本类型、数组和字典。此外，移动应用程序很少与外界隔绝。它会发出 API 请求并处理响应；会与云服务交换数据并同 SDK\
    \ 协作。下面，我们来了解如何处理数据交换，并在不同单位之间安全地转换数字。\n\n## 设备如何交换数据\n\n如今，很难想象一台计算设备没有外部数据接口。即使是像咖啡机和加热器这样简单的电子设备，也开始配备\
    \ Wi-Fi 和蓝牙接口，以便你从寒冷的街头回家时为你加热房间并煮好咖啡。\n\n对我们移动开发者来说，幸运的是，我们不需要深入研究 Wi-Fi 或蓝牙协议。移动开发者编写几乎任何应用都需要一种通用的数据交换标准：HTTP。\n\
    \nHTTP（超文本传输协议）和 HTTPS（其安全版本）是数据交换的应用层协议。它们采用客户端-服务器模型：客户端发送请求，服务器返回响应。格式、编码和其他属性由头部定义。\n\
    \nHTTP 协议非常流行，以至于它常被用于同一设备内的通信。一个应用充当服务器，另一个则作为客户端。要访问服务器，你需要知道 URL（统一资源定位符）。它包含几个部分：协议方案、主机、端口、路径、参数和片段。\n\
    \n桌面服务器应用通常会为自己预留一个端口。这样，多个服务器就可以在同一台计算机上共存。移动应用通常会预留一个与其唯一应用 ID 相匹配的协议方案。这样，一个应用就可以调用另一个应用，例如用于身份验证。还记得用\
    \ Facebook 或 Google 登录吗？它的工作原理正是如此。\n\n当客户端和服务器应用建立连接后，它们需要交换数据。数据格式在头部中定义，它可以采用预定义的\
    \ MIME（多用途互联网邮件扩展）类型之一。如果你向 API 发送请求，可以在相关文档中找到可接受的数据格式。\n\n对于 API（应用程序编程接口）而言，最流行的数据格式是\
    \ JSON。它的 MIME 类型是 `application/json`。另一种可能的格式是 XML——`text/xml`。你可能会问，为什么 JSON\
    \ 属于应用程序组，而 XML 属于文本组？JSON 是受数据结构限制的 JavaScript，不含函数。你可以将 JSON 文件复制粘贴或导入到 JavaScript\
    \ 应用中，它无需任何修改就能像 JavaScript 一样被读取和解析。XML 不是源代码；它始终是数据。如果 XML 不可人工阅读，只能由解析器处理，那么它可以采用\
    \ `application/xml` 的 MIME 类型。\n\n要以 JSON 格式向服务器发送数据，你应该添加一个头部：\n\n```\nContent-Type:\
    \ application/json\n```\n\n服务器在响应 JSON 时也会做同样的事情。如果你在移动应用中不包含这个头部会怎样？或者如果服务器在响应中不包含它呢？根据服务器软件的不同，它可以自动接受数据并检测\
    \ JSON，或者拒绝将请求视为无效。当服务器不包含头部时，你的移动应用可以按自己的方式处理。一般来说，开发者不希望添加不必要的错误消息，从而使应用变得更脆弱，因此如果你知道服务器会以\
    \ JSON 格式响应，无论头部如何，都将其作为 JSON 解析。"
- fmt: "# What Are Serialization and Deserialization\n\n*Serialization* means turning\
    \ a custom object or data structure into an array of bytes. In Swift, that would\
    \ be a `Data` object. Serialization to `String` is another option – after all,\
    \ `String` is a sequence of bytes. We can say that a JSON-formatted `String` is\
    \ a serialized version of a `Dictionary` or an `Array`.\n\n*Deserialization* is\
    \ a reversed process. It turns an array of bytes into a Swift object.\n\n## Working\
    \ with JSON\n\nAs we discussed earlier, JSON is the most popular format for data\
    \ exchange with APIs. Most SDKs, like Facebook SDK, Firebase SDK, and others,\
    \ use JSON under the hood. Firestore database and MongoDB have data as JSON (yes,\
    \ with indexes and other features of a database, but it’s still JSON). This makes\
    \ import, export, and data exchange easy.\n\n### Parsing JSON to Dictionary or\
    \ Array\n\nWhen you parse JSON using `JSONSerialization` in a Swift app, you get\
    \ `Any` as a result. The reason for this is uncertainty regarding the data type.\
    \ JSON has one root element, but it can be an object `{ ... }` or an array `[\
    \ ... ]`. If the root element is an object, `Any` can be cast to `Dictionary`,\
    \ particularly `[String: Any]`. Otherwise, it’s an `Array` – `[Any]`.\n\n**Note**:\
    \ A more common way to work with JSON is `JSONEncoder`/`JSONDecoder`. It will\
    \ be reviewed later in this chapter.\n\nMost networking libraries allow you to\
    \ get data from the server as `Data`, `String`, and sometimes as more complex\
    \ structures. If it’s JSON, you need to receive `Data` even though it’s more text.\
    \ We’ll use the Alamofire library, which is the most popular for iOS networking,\
    \ as an example.\n\nThe next step is to turn `Data` into `Any`, where `Any` is\
    \ either `Dictionary` or `Array`. We’ll check the data type later, but first,\
    \ we need to parse it. Swift has a standard JSON parser, which we will use. In\
    \ case of error, it will throw an exception, so we need to surround it with a\
    \ `do ... try ... catch` block. The exception is thrown if the document is not\
    \ a valid JSON document or if it has data that can’t be parsed.\n\nThe last step\
    \ is to check the data type. A JSON document can’t be parsed as an `Int` or a\
    \ `String`. It’s always either `Dictionary` or `Array`. We check if our document\
    \ has one of these types, and if it doesn’t, we return `nil`. The last scenario\
    \ should never happen, but we can’t be sure that all Swift libraries are bug-free.\
    \ The full version of this parsing is shown in Recipe [2-1](#515103_1_En_2_Chapter.xhtml#PC2).\n\
    \n```\npublic extension Data {\n    var parsedFromJSON: Any? {\n        guard\
    \ let json = try? JSONSerialization.jsonObject(with: self, options: .allowFragments)\
    \ else {\n            return nil\n        }\n        if let jsonDictionary = json\
    \ as? [String: Any] {\n            return jsonDictionary\n        } else if let\
    \ jsonArray = json as? [Any] {\n            return jsonArray\n        } else {\n\
    \            return nil\n        }\n    }\n    var parsedAsJSONDictionary: [String:\
    \ Any]? {\n        try? JSONSerialization.jsonObject(with: self, options: .allowFragments)\
    \ as? [String: Any]\n    }\n    var parsedAsJSONArray: [Any]? {\n        try?\
    \ JSONSerialization.jsonObject(with: self, options: .allowFragments) as? [Any]\n\
    \    }\n}\n\npublic extension String {\n    var parsedFromJSON: Any? {\n     \
    \   asUtf8Data.parsedFromJSON\n    }\n    var parsedAsJSONDictionary: [String:\
    \ Any]? {\n        asUtf8Data.parsedAsJSONDictionary\n    }\n    var parsedAsJSONArray:\
    \ [Any]? {\n        asUtf8Data.parsedAsJSONArray\n    }\n}\n```\n\n**Recipe 2-1**\
    \  \nParsing JSON\n\n### Generating JSON from Dictionary or Array\n\nThe reverse\
    \ process is even easier, as we don’t need to check data types or do any other\
    \ preparations. We convert `Dictionary` or `Array` into `Data` containing JSON\
    \ and then pass it to the API (or use any other way). This is shown in Recipe\
    \ [2-2](#515103_1_En_2_Chapter.xhtml#PC3).\n\nThere’s one thing we need to keep\
    \ in mind: certain data types can’t be converted into JSON. That’s the case, for\
    \ example, if your `Dictionary` has a `UIImage` or `UIView` – it can’t be serialized\
    \ to a JSON element. We’ll go deeper into serialization in the next section. We\
    \ need either to convert them to one of the basic types, to `Dictionary`, or to\
    \ exclude them from the original structure.\n\n```\npublic extension Dictionary\
    \ where Key: ExpressibleByStringLiteral {\n    var asJSONData: Data? {\n     \
    \   try? JSONSerialization.data(withJSONObject: self, options: .fragmentsAllowed)\n\
    \    }\n    var asJSONString: String? {\n        asJSONData?.asUtf8String\n  \
    \  }\n}\n\npublic extension Array {\n    var asJSONData: Data? {\n        try?\
    \ JSONSerialization.data(withJSONObject: self, options: .fragmentsAllowed)\n \
    \   }\n    var asJSONString: String? {\n        asJSONData?.asUtf8String\n   \
    \ }\n}\n```\n\n**Recipe 2-2**  \nGenerating JSON\n\n## Working with XML\n\nWhile\
    \ JSON is popular for data exchange, XML (eXtensible Markup Language) is more\
    \ commonly used for storing internal app data. Storyboards, nibs, plists, and\
    \ other structures are based on XML. XML files are used for Android and UWP (Universal\
    \ Windows Platform) layouts as well.\n\nSome APIs offer a response in XML either\
    \ as the only option or as one of the possibilities.\n\nBefore discussing how\
    \ to parse XML, it’s important to understand that unlike JSON, XML can’t be directly\
    \ converted to Swift `Dictionary` or `Array`. JSON is an *object notation*, and\
    \ `Dictionary` is a way to represent an object, at least its data. In JavaScript,\
    \ an object is a dictionary.\n\nXML is a *markup language*. It has elements and\
    \ attributes. These elements and attributes are declared in a *schema*. There\
    \ are namespaces and other constructs that don’t exist in Swift dictionaries.\
    \ But we don’t need to go deep into this if we only parse a response from an API\
    \ or prepare arguments for an API call. What we need is to extract the data we\
    \ need.\n\n### Parsing XML\n\nSwift offers an internal class `XMLParser`. It can\
    \ extract data from XML, but the usage of it is a nightmare. To parse an XML string,\
    \ you need to declare a delegate, and each XML element (tag) will make a callback:\n\
    \n```\nclass ParserDelegate: NSObject, XMLParserDelegate {\n    func parser(_\
    \ parser: XMLParser, didStartElement elementName: String, namespaceURI: String?,\
    \ qualifiedName qName: String?, attributes attributeDict: [String : String] =\
    \ [:]) {\n        print(\"Found element \\(elementName) with attributes \\(attributeDict)\"\
    )\n    }\n}\n```\n\nIt can be used if we need to get some data, but it’s too difficult\
    \ to get a `Dictionary`.\n\nThere’s a good helper library: SWXMLHash. It’s well\
    \ maintained, compatible with multiple Swift versions, and available via CocoaPods,\
    \ Carthage, and Swift Package Manager. If you use CocoaPods, add this to your\
    \ Podfile:\n\n```\npod 'SWXMLHash'\n```\n\nDon’t forget to run `pod install` or\
    \ `pod update`.\n\nNow you can parse it with just one line of code:\n\n```\nlet\
    \ xmlDict = SWXMLHash.parse(xml)\n```\n\nFrom `xmlDict`, you can extract the data\
    \ you need. Recipe [2-3](#515103_1_En_2_Chapter.xhtml#PC7) shows the full code.\n\
    \n```\nimport SWXMLHash\n\nlet xml: String = \"...\"\nlet xmlDict = SWXMLHash.parse(xml)\n\
    ```\n\n**Recipe 2-3**  \nParsing XML"
  raw: '## What Are Serialization and Deserialization


    *Serialization* means turning a custom object or data structure into an array
    of bytes. In Swift, that would be a `Data` object. Serialization to `String` is
    another option `–` after all, `String` is a sequence of bytes. We can say that
    a JSON-formatted `String` is a serialized version of a `Dictionary` or an `Array`.


    *Deserialization* is a reversed process . It turns an array of bytes into a Swift
    object.


    ## Working with JSON


    As we discussed earlier, JSON is the most popular format for data exchange with
    APIs. Most SDKs, like Facebook SDK, Firebase SDK, and others, use JSON under the
    hood. Firestore database and MongoDB have data as JSON (yes, with indexes and
    other features of a database, but it’s still JSON). This makes import, export,
    and data exchange easy.


    ### Parsing JSON to Dictionary or Array


    When you parse JSON using `JSONSerialization` in a Swift app, you get `Any` as
    a result. The reason of it is uncertainty regarding the data type. JSON has one
    root element, but it can be an object `{ ... }` or an array `[ ... ]`. If the
    root element is an object, `Any` can be casted to `Dictionary`, particularly `[String:
    Any]`. Otherwise, it’s an `Array` – `[Any]`.


    Note


    More common way to work with JSON – JSONEncoder/JSONDecoder. It will be reviewed
    later in this chapter.


    Most networking libraries allow to get data from the server as `Data`, `String`,
    and sometimes as more complex structures. If it’s JSON, you need to receive `Data`
    even though it’s more text. We’ll use the Alamofire library, which is the most
    popular for iOS networking, as an example.


    The next step is to turn `Data` into `Any`, where `Any` is either `Dictionary`
    or `Array`. We’ll check the data type later, but first, we need to parse it. Swift
    has a standard JSON parser, which we will use. In case of error, it will throw
    an exception, so we need to surround it with a `do ... try ... catch` block. The
    exception is thrown if the document is not a valid JSON document or if it has
    data that can’t be parsed.


    The last step is to check the data type. A JSON document can’t be parsed as an
    Int or a `String`. It’s always either `Dictionary` or `Array`. We check if our
    document has one of these types, and if it doesn’t, we return `nil`. The last
    scenario should never happen, but we can’t be sure that all Swift libraries are
    bug-free. Full version of this parsing is shown in Recipe [2-1](#515103_1_En_2_Chapter.xhtml#PC2).


    ```

    public extension Data {

    var parsedFromJSON: Any? {

    guard let json = try? JSONSerialization.jsonObject(with: self, options: .allowFragments)
    else {

    return nil

    }

    if let jsonDictionary = json as? [String: Any] {

    return jsonDictionary

    } else if let jsonArray = json as? [Any] {

    return jsonArray

    } else {

    return nil

    }

    }

    var parsedAsJSONDictionary: [String: Any]? {

    try? JSONSerialization.jsonObject(with: self, options: .allowFragments) as? [String:
    Any]

    }

    var parsedAsJSONArray: [Any]? {

    try? JSONSerialization.jsonObject(with: self, options: .allowFragments) as? [Any]

    }

    }

    public extension String {

    var parsedFromJSON: Any? {

    asUtf8Data.parsedFromJSON

    }

    var parsedAsJSONDictionary: [String: Any]? {

    asUtf8Data.parsedAsJSONDictionary

    }

    var parsedAsJSONArray: [Any]? {

    asUtf8Data.parsedAsJSONArray

    }

    }

    Recipe 2-1

    Parsing JSON

    ```


    ### Generating JSON from Dictionary or Array


    The reverse process is even easier as we don’t need to check data types or do
    any other preparations. We convert `Dictionary` or `Array` into `Data` containing
    JSON and then pass it to the API (or use any other way). This is shown in Recipe
    [2-2](#515103_1_En_2_Chapter.xhtml#PC3).


    There’s one thing we need to keep in mind: certain data types can’t be converted
    into JSON. That’s the case, for example, if your `Dictionary` has an `UIImage`
    or `UIView` – it can’t be serialized to a JSON element. We’ll go deeper into serialization
    in the next section. We need either to convert them to one of the basic types,
    to `Dictionary`, or to exclude them from the original structure.


    ```

    public extension Dictionary where Key: ExpressibleByStringLiteral {

    var asJSONData: Data? {

    try? JSONSerialization.data(withJSONObject: self, options: .fragmentsAllowed)

    }

    var asJSONString: String? {

    asJSONData?.asUtf8String

    }

    }

    public extension Array {

    var asJSONData: Data? {

    try? JSONSerialization.data(withJSONObject: self, options: .fragmentsAllowed)

    }

    var asJSONString: String? {

    asJSONData?.asUtf8String

    }

    }

    Recipe 2-2

    Generating JSON

    ```


    ## Working with XML


    While JSON is popular for data exchange, XML (eXtensible Markup Language) is more
    commonly used for storing internal app data. Storyboards, nibs, plists, and other
    structures are based on XML. XML files are used for Android and UWP (Universal
    Windows Platform) layouts as well.


    Some APIs offer a response in XML either as the only option or as one of the possibilities.


    Before discussing how to parse XML, it’s important to understand that unlike JSON,
    XML can’t be directly converted to Swift Dictionary or Array. JSON is an *object
    notation* , and `Dictionary` is a way to represent an object, at least it’s data.
    In JavaScript, object is a dictionary.


    XML is a *markup language*. It has elements and attributes. These elements and
    attributes are declared in *schema* . There are namespaces and other constructs
    that don’t exist in Swift dictionaries. But we don’t need to go deep into this
    if we only parse response from API or prepare arguments for an API call. What
    we need is to extract the data we need.


    ### Parsing XML


    Swift offers an internal class XMLParser . It can extract data from XML, but the
    usage of it is a nightmare. To parse an XML string, you need to declare a delegate,
    and each XML element (tag) will make a callback:


    ```

    class ParserDelegate: NSObject, XMLParserDelegate {

    func parser(_ parser: XMLParser, didStartElement elementName: String, namespaceURI:
    String?, qualifiedName qName: String?, attributes attributeDict: [String : String]
    = [:]) {

    print("Found element \(elementName) with attributes \(attributeDict)")

    }

    }

    ```


    It can be used if we need to get some data, but it’s too difficult to get a `Dictionary`.


    There’s a good helper library: SWXMLHash. It’s well maintained, compatible with
    multiple Swift versions, and available via CocoaPods, Carthage, and Swift Package
    Manager. If you use CocoaPods, add this to your Podfile:


    ```

    pod ''SWXMLHash''

    ```


    Don’t forget to run pod install or pod update.


    Now you can parse it with just one line of code:


    ```

    let xmlDict = SWXMLHash.parse(xml)

    ```


    From `xmlDict`, you can extract the data you need. Recipe [2-3](#515103_1_En_2_Chapter.xhtml#PC7)
    shows the full code.


    ```

    import SWXMLHash

    let xml: String = "..."

    let xmlDict = SWXMLHash.parse(xml)

    Recipe 2-3

    Parsing XML

