    # Hero Animation


    "Hero" animation is a view, "flying" from screen to screen, visually resembling
    a superhero (Figure [7-2](#515103_1_En_7_Chapter.xhtml#Fig2)). When you tap a
    photo, or a dish in a menu, it increases its size and changes its position, while
    other views change in background.


    ![](images/515103_1_En_7_Chapter/515103_1_En_7_Fig2_HTML.png)


    A set of four screenshots to represent the hero animation. The first image has
    a relatively small colored square in the middle and the text, ''fly, Hero'' at
    the bottom. In the consecutive screenshots, the area of the square increases and
    seems to move to the top of the phone screen.


    Figure 7-2


    Hero animation


    ## Hero Animation Within the Same UIViewController


    Now, if we know how to make regular animations, we can create hero animation.
    To do it, we need to perform the following steps:


    - Create and hide `UIView` in its destination point.

    - Calculate the difference in position and size between source and destination
    points.

    - Apply transformation to this `UIView` to make it look exactly like source `UIView`.

    - Hide source `UIView` and show destination `UIView`.

    - Animate destination `UIView` to return it to destination.


    Assuming you don''t rotate it, there are two transformations:


    - Translation – Difference in position

    - Scale – Difference in size


    Let''s build the entire algorithm, step by step; then wrap it up in a recipe.


    ### Create and Show UIView


    Hero animation is always the movement of an element, which looks the same but
    becomes larger. Original (source) `UIView` is smaller, so upscaling it will lead
    to quality loss. We need to create another `UIView`. Possibly, it''s already created.
    In this case, we need to set it up. If you choose audio tracks with thumbnails,
    and the user selects one, you need to apply image and track name to the destination
    `UIView`.


    At some point, we should have two `UIViews` (or subclasses), which look identical,
    but in different locations and with different sizes.


    ```

    var destinationView: UIView

    var sourceView: UIView

    ```


    If you create it, make it hidden. If you have it in storyboard, it must be marked
    as hidden there.


    ### Calculate Transformation


    First, let''s calculate the location in root view. If your `sourceView` and `destinationView`
    are both children of root `UIView`, you can skip this step.


    ```

    let sourceCenter = view.convert(sourceView.center, to: nil)

    let destinationCenter = view.convert(destinationView.center, to: nil)

    ```


    Then we need to calculate the distance between scales, horizontal and vertical.


    ```

    let scaleX = sourceView.frame.width / destinationView.frame.width

    let scaleY = sourceView.frame.height / destinationView.frame.height

    ```


    ### Apply Transformation


    On this step, we only apply a calculated transformation.


    ```

    destinationView.transform = CGAffineTransform(scaleX: scaleX, y: scaleY)

    destinationView.center = sourceCenter

    ```


    ### Hide Source UIView and Show Destination UIView


    This is pretty straightforward. Until this step, destination `UIView` must be
    hidden.


    ```

    destinationView.isHidden = false

    sourceView.isHidden = true

    ```


    ### Animate


    Finally, we apply an animation the same way we reviewed earlier in the chapter.


    ```

    UIView.animate(withDuration: 1.0)

    {destinationView.transform = CGAffineTransform.identity

    destinationView.center = destinationCenter}

    ```


    That''s it! Your hero can be a simple `UIImage` or a complex layout inside `UIView`.'
