    ### 动态导航


    让我们更仔细地分析一个相当典型的场景：我们有坐标（纬度和经度）以及一个地名。我们需要打开用户最喜欢的应用来导航到目的地（见图 4-7）。我们不会尝试在应用内部集成导航功能，因为通常这并不值得。导航应用具备许多功能，例如后台导航、通知等，这些功能实现起来并不容易。


