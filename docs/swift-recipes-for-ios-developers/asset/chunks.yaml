    \      view.endEditing(true)\n        if let nc = navigationController,\n    \
    \       nc.viewControllers.count >= 2 {\n            nc.popViewController(animated:\
    \ true)\n        } else {\n            dismiss(animated: true, completion: nil)\n\
    \        }\n    }\n}\n食谱 6-11\n更新后的 goBack 函数\n```\n"
- fmt: "### Changing Your Layout When the Keyboard Appears\n\nWhen the keyboard appears,\
    \ your layout needs to change. Always. Even if your text fields are always on\
    \ top of the screen, there are objects in the bottom, which need to be moved.\
    \ In case of using scrollable areas like `UIScrollView`, the content offset can\
    \ be adjusted as well.\n\nThis can be done by handling keyboard notifications\
    \ as shown in Recipe [6-12](#515103_1_En_6_Chapter.xhtml#PC22).\n\n```\nclass\
    \ KeyboardListenerViewController: UIViewController {\n    override func viewWillAppear(_\
    \ animated: Bool) {\n        super.viewWillAppear(animated)\n        NotificationCenter.default.addObserver(\n\
    \            self,\n            selector: #selector(keyboardWillShow(notification:)),\n\
    \            name: UIResponder.keyboardWillShowNotification,\n            object:\
    \ nil\n        )\n        NotificationCenter.default.addObserver(\n          \
    \  self,\n            selector: #selector(keyboardWillHide(notification:)),\n\
    \            name: UIResponder.keyboardWillHideNotification,\n            object:\
    \ nil\n        )\n    }\n    override func viewDidDisappear(_ animated: Bool)\
    \ {\n        NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillShowNotification,\
    \ object: nil)\n        NotificationCenter.default.removeObserver(self, name:\
    \ UIResponder.keyboardWillHideNotification, object: nil)\n        super.viewWillDisappear(animated)\n\
    \    }\n    @objc func keyboardWillShow(notification: NSNotification) {\n    \
    \    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue.size {\n            // Keyboard height is in keyboardSize.height\n\
    \        }\n    }\n    @objc func keyboardWillHide(notification: NSNotification)\
    \ {\n        // We don't usually need keyboard size when it's disappearing, so\
    \ just set back your constraints\n    }\n}\nRecipe 6-12\nHandling Keyboard Notifications\n\
    ```\n\nThe `notification` argument is optional; you can create handlers without\
    \ it if you don't need keyboard size. Don't forget that if the function signature\
    \ changes, `#selector` should reflect these changes.\n\nNow, when we know the\
    \ moments of keyboard appearance and disappearance, let's adjust our layout. One\
    \ of the possible solutions is to create a constraint; let's call it `bottomConstraint`,\
    \ which defines the distance between the bottom of the screen (or safe area) and\
    \ the lowest view. Usually, it's the Next button.\n\nFrom passed notification,\
    \ we can extract keyboard height and move layout accordingly as shown in Recipe\
    \ [6-13](#515103_1_En_6_Chapter.xhtml#PC23).\n\n```\nclass KeyboardListenerViewController2:\
    \ UIViewController {\n    @IBOutlet weak var bottomConstraint: NSLayoutConstraint!\n\
    \    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        NotificationCenter.default.addObserver(\n            self,\n        \
    \    selector: #selector(keyboardWillShow(notification:)),\n            name:\
    \ UIResponder.keyboardWillShowNotification,\n            object: nil\n       \
    \ )\n        NotificationCenter.default.addObserver(\n            self,\n    \
    \        selector: #selector(keyboardWillHide),\n            name: UIResponder.keyboardWillHideNotification,\n\
    \            object: nil\n        )\n    }\n    override func viewDidDisappear(_\
    \ animated: Bool) {\n        NotificationCenter.default.removeObserver(self, name:\
    \ UIResponder.keyboardWillShowNotification, object: nil)\n        NotificationCenter.default.removeObserver(self,\
    \ name: UIResponder.keyboardWillHideNotification, object: nil)\n        super.viewWillDisappear(animated)\n\
    \    }\n    @objc func keyboardWillShow(notification: NSNotification) {\n    \
    \    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]\
    \ as? NSValue)?.cgRectValue.size {\n            bottomConstraint.constant = keyboardSize.height\n\
    \            view.layoutIfNeeded()\n        }\n    }\n    @objc func keyboardWillHide()\
    \ {\n        bottomConstraint.constant = 0\n        view.layoutIfNeeded()\n  \
    \  }\n}\nRecipe 6-13\nChanging Layout When Keyboard Is Appearing and Disappearing\n\
    ```\n\n### Scrolling to Show Current Text Field\n\nWhen the form is big like shown\
    \ on Figure [6-1](#515103_1_En_6_Chapter.xhtml#Fig1), we use a scrollable area,\
    \ usually `UIScrollView`. When the keyboard is shown, we have a rather small area,\
    \ and after two to three text fields, the cursor goes beyond its bounds. We need\
    \ to automatically scroll `UIScrollView` to make the field that is being edited\
    \ now visible.\n\nThere are two ways of handling it. First, you can shrink `UIScrollView`\
    \ and make it completely above the keyboard. This way has a big disadvantage –\
    \ every time the keyboard appears, the size of `UIScrollView` changes, and it\
    \ can create unpleasant visual effects. The second way is to change the content\
    \ offset (scroll position) every time the user enters another `UITextField`. As\
    \ we know the position in parent, we know which content offset to set. Recipe\
    \ [6-14](#515103_1_En_6_Chapter.xhtml#PC24) shows this solution.\n\n![](images/515103_1_En_6_Chapter/515103_1_En_6_Fig1_HTML.png)\n\
    \nAn image displays a mobile screen with empty text fields and a keyboard. The\
    \ cursor is placed on the first textbox. The keyboard displays suggestions for\
    \ text filling.\n\nFigure 6-1\n\nMoving `UITextField`s when the keyboard appears\n\
    \n```\nclass AutoscrollViewController: UIViewController {\n    @IBOutlet weak\
    \ var scrollView: UIScrollView!\n    @IBOutlet weak var textField1: UITextField!\n\
    \    @IBOutlet weak var textField2: UITextField!\n    @IBOutlet weak var textField3:\
    \ UITextField!\n    @IBOutlet weak var textField4: UITextField!\n    @IBOutlet\
    \ weak var textField5: UITextField!\n    @IBOutlet weak var textField6: UITextField!\n\
    \    @IBOutlet weak var textField7: UITextField!\n    @IBOutlet weak var textField8:\
    \ UITextField!\n    // ...\n    static let gap = CGFloat(40)\n}\n\nextension AutoscrollViewController:\
    \ UITextFieldDelegate {\n    func textFieldDidBeginEditing(_ textField: UITextField)\
    \ {\n        let offset = textField.frame.origin.y - AutoscrollViewController.gap\n\
    \        DispatchQueue.main.async {\n            self.scrollView.setContentOffset(CGPoint(x:\
    \ 0, y: offset), animated: true)\n        }\n    }\n    func textFieldShouldReturn(_\
    \ textField: UITextField) -> Bool {\n        switch textField {\n        case\
    \ textField1: textField2.becomeFirstResponder()\n        case textField2: textField3.becomeFirstResponder()\n\
    \        case textField3: textField4.becomeFirstResponder()\n        case textField4:\
    \ textField5.becomeFirstResponder()\n        case textField5: textField6.becomeFirstResponder()\n\
    \        case textField6: textField7.becomeFirstResponder()\n        case textField7:\
    \ textField8.becomeFirstResponder()\n        default: textField.resignFirstResponder()\n\
    \        }\n        return false\n    }\n}\nRecipe 6-14\nScrolling to Make Text\
    \ Field Visible\n```\n\nThis code also includes a *Return* button handler. When\
    \ you tap *Return/Next/Submit* or another button (it is always located in the\
    \ bottom-right corner, and the name depends on the `UITextField` configuration),\
    \ it goes to the next field.\n\nYou can invent a more interesting scrolling mechanism,\
    \ for example, to make the previous field visible, or scroll only when the field\
    \ is partially or fully covered. But this is a totally working solution, so feel\
    \ free to use it as is."
  raw: '### Changing Your Layout When the Keyboard Appears


    When the keyboard appears, your layout needs to change. Always. Even if your text
    fields are always on top of the screen, there are objects in the bottom, which
    need to be moved. In case of using scrollable areas like `UIScrollView`, the content
    offset can be adjusted as well.


    This can be done by handling keyboard notifications as shown in Recipe [6-12](#515103_1_En_6_Chapter.xhtml#PC22).


    ```

    class KeyboardListenerViewController: UIViewController {

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(keyboardWillShow(notification:)),

    name: UIResponder.keyboardWillShowNotification,

    object: nil

    )

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(keyboardWillHide(notification:)),

    name: UIResponder.keyboardWillHideNotification,

    object: nil

    )

    }

    override func viewDidDisappear(_ animated: Bool) {

    NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillShowNotification,
    object: nil)

    NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillHideNotification,
    object: nil)

    super.viewWillDisappear(animated)

    }

    @objc func keyboardWillShow(notification: NSNotification) {

    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]
    as? NSValue)?.cgRectValue.size {

    // Keyboard height is in keyboardSize.height

    }

    }

    @objc func keyboardWillHide(notification: NSNotification) {

    // We don''t usually need keyboard size when it''s disappearing, so just set back
    your constraints

    }

    }

    Recipe 6-12

    Handling Keyboard Notifications

    ```


    The `notification` argument is optional; you can create handlers without it if
    you don’t need keyboard size. Don’t forget that if the function signature changes,
    `#selector` should reflect these changes.


    Now, when we know the moments of keyboard appearance and disappearance, let’s
    adjust our layout. One of the possible solutions is to create a constraint; let’s
    call it `bottomConstraint`, which defines the distance between the bottom of the
    screen (or safe area) and the lowest view. Usually, it’s the Next button.


    From passed notification, we can extract keyboard height and move layout accordingly
    as shown in Recipe [6-13](#515103_1_En_6_Chapter.xhtml#PC23).


    ```

    class KeyboardListenerViewController2: UIViewController {

    @IBOutlet weak var bottomConstraint: NSLayoutConstraint!

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(keyboardWillShow(notification:)),

    name: UIResponder.keyboardWillShowNotification,

    object: nil

    )

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(keyboardWillHide),

    name: UIResponder.keyboardWillHideNotification,

    object: nil

    )

    }

    override func viewDidDisappear(_ animated: Bool) {

    NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillShowNotification,
    object: nil)

    NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillHideNotification,
    object: nil)

    super.viewWillDisappear(animated)

    }

    @objc func keyboardWillShow(notification: NSNotification) {

    if let keyboardSize = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey]
    as? NSValue)?.cgRectValue.size {

    bottomConstraint.constant = keyboardSize.height

    view.layoutIfNeeded()

    }

    }

    @objc func keyboardWillHide() {

    bottomConstraint.constant = 0

    view.layoutIfNeeded()

    }

    }

    Recipe 6-13

    Changing Layout When Keyboard Is Appearing and Disappearing

    ```


    ### Scrolling to Show Current Text Field


    When the form is big like shown on Figure [6-1](#515103_1_En_6_Chapter.xhtml#Fig1),
    we use a scrollable area, usually `UIScrollView`. When the keyboard is shown,
    we have a rather small area, and after two to three text fields, the cursor goes
    beyond its bounds. We need to automatically scroll `UIScrollView` to make the
    field that is being edited now visible.


    There are two ways of handling it. First, you can shrink `UIScrollView` and make
    it completely above the keyboard. This way has a big disadvantage – every time
    the keyboard appears, the size of `UIScrollView` changes, and it can create unpleasant
    visual effects. The second way is to change the content offset (scroll position)
    every time the user enters another `UITextField`. As we know the position in parent,
    we know which content offset to set. Recipe [6-14](#515103_1_En_6_Chapter.xhtml#PC24)
    shows this solution.


    ![](images/515103_1_En_6_Chapter/515103_1_En_6_Fig1_HTML.png)


    An image displays a mobile screen with empty text fields and a keyboard. The cursor
    is placed on the first textbox. The keyboard displays suggestions for text filling.


    Figure 6-1


    Moving UITextFields when the keyboard appears


    ```

    class AutoscrollViewController: UIViewController {

    @IBOutlet weak var scrollView: UIScrollView!

    @IBOutlet weak var textField1: UITextField!

    @IBOutlet weak var textField2: UITextField!

    @IBOutlet weak var textField3: UITextField!

    @IBOutlet weak var textField4: UITextField!

    @IBOutlet weak var textField5: UITextField!

    @IBOutlet weak var textField6: UITextField!

    @IBOutlet weak var textField7: UITextField!

    @IBOutlet weak var textField8: UITextField!

    // ...

    static let gap = CGFloat(40)

    }

    extension AutoscrollViewController: UITextFieldDelegate {

    func textFieldDidBeginEditing(_ textField: UITextField) {

    let offset = textField.frame.origin.y - AutoscrollViewController.gap

    DispatchQueue.main.async {

    self.scrollView.setContentOffset(CGPoint(x: 0, y: offset), animated: true)

    }

    }

    func textFieldShouldReturn(_ textField: UITextField) -> Bool {

    switch textField {

    case textField1: textField2.becomeFirstResponder()

    case textField2: textField3.becomeFirstResponder()

    case textField3: textField4.becomeFirstResponder()

    case textField4: textField5.becomeFirstResponder()

    case textField5: textField6.becomeFirstResponder()

    case textField6: textField7.becomeFirstResponder()

    case textField7: textField8.becomeFirstResponder()

    default: textField.resignFirstResponder()

    }

    return false

    }

    }

    Recipe 6-14

    Scrolling to Make Text Field Visible

    ```


    This code also includes a *Return* button handler. When you tap *Return/Next/Submit*
    or another button (it is always located in the bottom-right corner, and the name
    depends on the UITextField configuration), it goes to the next field.


    You can invent a more interesting scrolling mechanism, for example, to make the
    previous field visible, or scroll only when the field is partially or fully covered.
    But this is a totally working solution, so feel free to use it as is.'
