    ## Summary


    我们了解了三种流行的数据表示形式：JSON、XML 和 YAML。JSON 是最流行的数据交换格式，但其他格式在 IT 领域也有其位置。我们还回顾了`Encodable`和`Decodable`结构，它们是
    Swift 中数据序列化的核心。如果你想保持灵活性、添加数据处理但保持数据结构化，属性包装器也可能很有用。


    最后，我们为数据添加了语义，并介绍了数字单位及其之间的转换。


    在下一章中，我们将转向所有现代语言中最流行的数据类型之一——`String`。我们已经看到，它可以使用 JSON 表示几乎所有内容。但它还可以被分析、验证，用于表示二进制数据、安全数据等。


    # 3. 使用字符串


    字符串也是数据——它们是字节数组。但与简单的`Data`不同，`String`类知道如何解释这些数据。为了正确解释数据，我们需要知道编码。最广泛使用的选项是
    UTF-8 和 UTF-16，也称为 Unicode。


    UTF-8 使用 1 到 4 个字节来编码一个字符。ASCII 范围内的拉丁字符使用一个字节。如果文本仅包含拉丁字符、空格和标准标点符号，则 ASCII 和
    UTF-8 文本字符串是相同的。


    UTF-16 每个字符使用 2 或 4 个字节。由于两个字节有 65536 种组合，它们覆盖了大多数现有符号，但并非全部。这就是为什么某些符号需要四个字节。


    我们不需要知道`String`或`Character`结构内部使用哪种编码（是的，在 Swift 中，它们被定义为结构体，而不是类）。但是，知道它是一个`String`，我们可以获取关于存储数据的更多信息，相比`Data`对象而言。


    我们知道文本字符串由字符组成，因此我们可以获取其中的一个字符。我们还可以获取一个范围，称为`Substring`。我们不需要考虑一个`Character`有多宽；Swift
    会自动计算字节宽度。我们可以去除空格和/或换行符，可以将其转换为小写或大写，并且可以分析其内容等。'
