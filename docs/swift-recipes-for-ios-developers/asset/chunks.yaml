    \    let camera = GMSCameraPosition.camera(withLatitude: 41.6168, longitude: 41.6367,\
    \ zoom: 6.0)\n    mapView.camera = camera\n  }\n}\n```\n\n**方法 4-14** – 通过故事板设置地图视图\n\
    \n```\nGMSServices.provideAPIKey(\"你的 _API_ 密钥\")\n```\n\n谷歌地图功能强大。你可以添加标记、绘制区域、缩放至特定区域，以及为相机添加动画效果。\n\
    \nGooglePlaces 库提供了用于处理地点和地址的 SDK。你可以解析坐标、搜索附近地点，并提供其他基于位置的功能。\n\n更多信息可访问谷歌地图平台门户：[`https://developers.google.com/maps`](https://developers.google.com/maps)。\n"
- fmt: '### Dynamic Navigation


    Let’s look closer into a rather typical situation: we have coordinates (latitude
    and longitude) and a place name. We need to open the user’s favorite app to navigate
    to the desired place (see Figure [4-7](#515103_1_En_4_Chapter.xhtml#Fig7)). We
    won’t try to integrate navigation inside the app as it’s usually not worth it.
    The Navigation app has many features like navigation in the background, notification,
    and others, which are not easy to implement.


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig7_HTML.png)


    A screenshot of the map has three options of application for navigation arising
    from the button labeled, ''Navigate'' at the bottom of the screen. The three applications
    are Apple maps, Google maps, and Waze.


    **Figure 4-7** — Choosing an app for navigation


    Each service has a way to start navigation (Recipes [4-16](#515103_1_En_4_Chapter.xhtml#PC33)
    through [4-18](#515103_1_En_4_Chapter.xhtml#PC35)).


    ```

    let wazeURL = "waze://?ll=\(latitude),\(longitude)&navigate=false"

    if UIApplication.shared.canOpenURL(wazeURL) {

    UIApplication.shared.open(wazeURL, options: [:], completionHandler: nil)

    }

    ```


    **Recipe 4-18** — Opening Location in Waze


    ```

    let googleURL = "comgooglemaps://?daddr=\(latitude),\(longitude)&directionsmode=driving"

    if UIApplication.shared.canOpenURL(googleURL) {

    UIApplication.shared.open(googleURL, options: [:], completionHandler: nil)

    }

    ```


    **Recipe 4-17** — Opening Location in Google Maps


    ```

    let appleURL = "http://maps.apple.com/?daddr=\(latitude),\(longitude)"

    if UIApplication.shared.canOpenURL(appleURL) {

    UIApplication.shared.open(appleURL, options: [:], completionHandler: nil)

    }

    ```


    **Recipe 4-16** — Opening Location in Apple Maps


    Google and Waze have custom URLs. Recipe [4-19](#515103_1_En_4_Chapter.xhtml#PC36)
    shows how we can check if they’re available in your current system or not.


    ```

    public extension UIViewController {

    func openMapButtonAction(latitude: Double, longitude: Double) {

    let appleURL = "http://maps.apple.com/?daddr=\(latitude),\(longitude)"

    let googleURL = "comgooglemaps://?daddr=\(latitude),\(longitude)&directionsmode=driving"

    let wazeURL = "waze://?ll=\(latitude),\(longitude)&navigate=false"

    let googleItem = ("Google Map", URL(string:googleURL)!)

    let wazeItem = ("Waze", URL(string:wazeURL)!)

    var installedNavigationApps = [("Apple Maps", URL(string:appleURL)!)]

    if UIApplication.shared.canOpenURL(googleItem.1) {

    installedNavigationApps.append(googleItem)

    }

    if UIApplication.shared.canOpenURL(wazeItem.1) {

    installedNavigationApps.append(wazeItem)

    }

    let alert = UIAlertController(title: "Select an app for navigation", message:
    nil, preferredStyle: .actionSheet)

    for app in installedNavigationApps {

    let button = UIAlertAction(title: app.0, style: .default, handler: { _ in

    UIApplication.shared.open(app.1, options: [:], completionHandler: nil)

    })

    alert.addAction(button)

    }

    let cancel = UIAlertAction(title: "Cancel", style: .cancel, handler: nil)

    if let popoverController = alert.popoverPresentationController {

    popoverController.sourceView = self.view

    }

    alert.addAction(cancel)

    present(alert, animated: true)

    }

    }

    ```


    **Recipe 4-19** — Universal Navigation


    ## Rounded Corners, Shadows, and Other Effects


    If you use storyboards or nibs for your UI design, you know that it lacks many
    features. Oftentimes, you need to make some adjustments in the code, which means
    you need to create an `@IBOutlet`. And that is uncomfortable.


    By adding several extensions, you can fix problems like adding rounded corners,
    shadows, content cropping, and many others. Figure [4-8](#515103_1_En_4_Chapter.xhtml#Fig8)
    shows how it looks.


    ### Rounded Corners, Content Cropping, and Borders


    Rounded corners are a very popular design feature in iOS and macOS apps. Unlike
    Windows, which becomes more and more square, Apple products get more curves. If
    you compare Big Sur (macOS 11) with Catalina (macOS 10.15), you’ll spot the difference
    right away.


    `UIKit` has a native way to add rounded corners to basically anything, but it’s
    done implementing it in `UILayer`, not in `UIView`. The storyboard editor doesn’t
    have direct access to layers, so you can’t add rounded corners there. Recipe [4-20](#515103_1_En_4_Chapter.xhtml#PC37)
    shows an easy way to fix it.


    ```

    public extension UIView {

    @IBInspectable var cornerRadius: CGFloat {

    set { layer.cornerRadius = newValue }

    get { layer.cornerRadius  }

    }

    }

    ```


    **Recipe 4-20** — Rounded Corners


    When you set the corner radius, it will apply to the background, border, and other
    properties of a layer itself, but not to the content. It won’t apply to `UIView`’s
    children either. If you want to apply rounded corners to everything, you need
    to set the `masksToBounds` property. It’s a property of a layer. Recipe [4-21](#515103_1_En_4_Chapter.xhtml#PC38)
    shows how to do it:


    ```

    public extension UIView {

    @IBInspectable var masksToBounds: Bool {

    set { layer.masksToBounds = newValue }

    get { layer.masksToBounds  }

    }

    }

    ```


    **Recipe 4-21** — Content Cropping


    Now you can set it directly in the storyboard editor. A word of caution here –
    it will really apply to everything. For example, if you set it in `UIView`, all
    its children will never leave the bounds of the `UIView` parent.


    One of the cases when you may need such behavior is in the root `UIView` of the
    `UIViewController`. When you add a filling background, which may be larger than
    the root `UIView`, it will be visible during transition. When you push a new `UIViewController`
    to the `UINavigationController`, it will appear on the right side of the screen
    (or left in right-to-left layouts). Some out-of-screen elements may be visible.
    If it’s not your desired behavior, set the `maskToBounds` property and its all
    out-of-screen elements won’t be visible during transition.


    Before we move on, we’ll need another useful extension. The thing is that Swift
    has two classes: `UIColor` and `CGColor`. `UIColor` is more handy for developers;
    it gives better access to color components, and it can be exposed to the storyboard
    editor with the `@IBInspectable` attribute. `CGColor` is more of an internal thing.
    Even though they both represent color in Swift, they’re two different types. Recipe
    [4-22](#515103_1_En_4_Chapter.xhtml#PC39) converts `CGColor` to `UIColor`.


    ```

    public extension CGColor {

    var UIColor: UIKit.UIColor {

    return UIKit.UIColor(cgColor: self)

    }

    }

    ```


    **Recipe 4-22** — Converting `CGColor` to `UIColor`


    The extension from Recipe [4-23](#515103_1_En_4_Chapter.xhtml#PC40) allows us
    to add borders. Borders can have color and width, so we add two properties to
    the `UIView` class. As in UIKit, all visible elements are subclasses of `UIView`;
    you can add borders to any of them.


    ```

    extension UIView {

    @IBInspectable var borderWidth: CGFloat {

    set { layer.borderWidth = newValue }

    get { layer.borderWidth }

    }

    @IBInspectable var borderColor: UIColor? {

    set { layer.borderColor = newValue?.cgColor }

    get { layer.borderColor?.UIColor }

    }

    @IBInspectable var cornerRadius: CGFloat {

    set { layer.cornerRadius = newValue }

    get { layer.cornerRadius  }

    }

    @IBInspectable var masksToBounds: Bool {

    set { layer.masksToBounds = newValue }

    get { layer.masksToBounds  }

    }

    }

    ```


    **Recipe 4-23** — Borders


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig8_HTML.png)


    A screenshot of the user interface view configuration in the storyboard editor
    has the outline of an iPhone with two boxes pasted inside the border on the right.
    The left image has a window with options to modify like, corner radius, border
    width, alpha, etc.


    **Figure 4-8** — `UIView` configuration in the storyboard editor'
