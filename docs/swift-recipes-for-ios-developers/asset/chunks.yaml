  raw: '### Example with Custom Label


    In Recipe [8-5](#515103_1_En_8_Chapter.xhtml#PC10), we’ll wrap a `UILabel` subclass
    into a SwiftUI structure. Many apps have a predefined list of components with
    integrated styles and formatting. When the app starts working with SwiftUI, there
    are two options:


    *   To add all these components in SwiftUI using `Text`


    *   To wrap existing components into SwiftUI ones


    The second way has an advantage if part of your app migrated to SwiftUI but another
    part didn’t.


    ```

    import UIKit

    import SwiftUI

    class HeaderLabel: UILabel {

    required init?(coder: NSCoder) {

    super.init(coder: coder)

    commonInit()

    }

    override init(frame: CGRect) {

    super.init(frame: frame)

    commonInit()

    }

    private func commonInit() {

    textAlignment = .center

    font = .systemFont(ofSize: 20, weight: .bold)

    textColor = .darkText

    numberOfLines = 1

    }

    }

    struct HeaderText: UIViewRepresentable {

    var text: String

    func makeUIView(context: Context) -> HeaderLabel {

    HeaderLabel()

    }

    func updateUIView(_ uiView: HeaderLabel, context: Context) {

    uiView.text = text

    }

    }

    Recipe 8-5

    Wrapping UIKit Components into SwiftUI

    ```


    Insert it in any SwiftUI `View`:


    ```

    struct ContentView: View {

    var body: some View {

    HeaderText(text: "Hello, world!")

    }

    }

    ```


    If your properties can be changed dynamically, you can add the `@Binding keyword`
    `.`


    ## Applying Styles with ViewModifier


    We already applied several styles with modifiers. We used `font`, `foregroundColor`,
    `frame`, and others.


    When you create your own component, you don’t have to provide all the adjustable
    properties in a constructor. It may be reasonable if you have two to three of
    them. But when you create a more complicated `View`, there can be dozens of them,
    and it’s very uncomfortable to use them all in a constructor.


    For this purpose, you can add extensions changing your custom View and view modifiers
    changing the properties of `View` more globally.


    ### Creating a ViewModifier


    To create your own modifier, you need to add a struct conforming to the `ViewModifier`
    protocol .


    In this struct, you need to implement one function:


    ```

    func body(content: Content) -> some View

    ```


    In this function, you need to set up your `View` and return the result.


    ```

    struct ModifierName: ViewModifier {

    func body(content: Content) -> some View {

    content

    ... // Do modifications here

    }

    }

    ```


    ### Chaining Modifiers in SwiftUI


    To make your modifier look like the standard SwiftUI modifiers, you need to create
    an extension. Depending on your modifier, you can make it globally available by
    extending `View`, or make it more targeted to your own view or some tree of components
    (subclasses of `Text`, for example).


    ```

    extension View {

    func applyMyStyle() -> some View {

    modifier(ModifierName())

    }

    }

    ```


    ### HeaderText without UIKit


    Recipe [8-6](#515103_1_En_8_Chapter.xhtml#PC15) shows how we can make a modifier
    for `Text` to make a header with style matching the one from Recipe [8-5](#515103_1_En_8_Chapter.xhtml#PC10)
    .


    ```

    import SwiftUI

    struct Header: ViewModifier {

    func body(content: Content) -> some View {

    content

    .font(.system(size: 20, weight: .bold))

    .foregroundColor(Color(UIColor.darkText))

    .fixedSize(horizontal: false, vertical: true)

    .lineLimit(1)

    .frame(alignment: .center)

    }

    }

    extension Text {

    func styleAsHeader() -> some View {

    modifier(Header())

    }

    }

    Recipe 8-6

    HeaderText Using ViewModifier

    ```


    Use it this way:


    ```

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    .styleAsHeader()

    }

    }

    ```


    If there are properties specific to your `View` that can’t be applied to `Context`,
    apply them in an extension directly, before calling the modifier method. For example:


    ```

    func changeMyView() -> some View {

    doSomethingSpecific().modifier(SomeModifier())

    }

    ```


    Using `ViewModifier`s, you can create your own style library without subclassing
    `View`s.


    Note


    If you apply a modifier on a container (e.g., HStack or VStack), it applies to
    all of its children. That’s why it’s usually better to use pure modifiers without
    calling methods of the View subclass and to extend View globally.


    ## Creating Custom Views


    One of the most useful features of SwiftUI is creating custom reusable components
    . Creating small adjustable building blocks gives endless possibilities in UI
    creation.


    There are three main ways of creating custom views:


    *   Composition of existing SwiftUI components adjusted for your needs


    *   Wrapping UIKit components


    *   Using Canvas for drawing your own views using lines, circles, and other primitives


    Custom views can have changeable data. There are two key property wrappers:


    *   @State


    *   @Binding


    We already discussed composition and wrapping UIKit components earlier in this
    chapter. Let’s review `Canvas` drawing and property wrappers in details.


    ### Drawing on a Canvas


    Canvas is a SwiftUI control allowing to get access directly to CoreGraphics’ `CGContext`.
    `CGContext` has a number of methods for drawing, such as follows:


    *   `func addRect(CGRect)` – Draws a rectangle


    *   `func addEllipse(in: CGRect)` – Draws an ellipse


    *   `func addArc(center: CGPoint, radius: CGFloat, startAngle: CGFloat, endAngle:
    CGFloat, clockwise: Bool)` – Draws an arc (part of an ellipse)


    *   And others


    If we draw a filled circle with dashed border and spin it around its center, it
    can look like a loading indicator (see Figure [8-2](#515103_1_En_8_Chapter.xhtml#Fig2)).
    Let’s review an example in Recipe [8-7](#515103_1_En_8_Chapter.xhtml#PC18).


    ```

    import SwiftUI

    let loaderTimer = Timer.publish(every: 0.1, on: .main, in: .common).autoconnect()

    struct LoaderView: View {

    let circleColor: UIColor

    let spinnerColor: UIColor

    @State private var phase: CGFloat = 0

    @State private var length: CGFloat = Double.pi*12

    var body: some View {

    Canvas { context, size in

    context.withCGContext { cgContext in

    let rect = CGRect(origin: .zero, size: size).insetBy(dx: 4, dy: 4)

    let path = CGPath(ellipseIn: rect, transform: nil)

    cgContext.addPath(path)

    cgContext.setStrokeColor(spinnerColor.cgColor)

    cgContext.setFillColor(circleColor.cgColor)

    cgContext.setLineWidth(4)

    cgContext.setAlpha(0.5)

    cgContext.setLineDash(phase: 0, lengths: [length])

    cgContext.drawPath(using: .eoFillStroke)

    }

    }

    .frame(width: 32, height: 32)

    .transformEffect(

    CGAffineTransform(translationX: 16, y: 16)

    .rotated(by: phase / 8)

    .translatedBy(x: -16, y: -16)

    )

    .onReceive(loaderTimer) { _ in

    phase += 1

    let sinPhase = sin(phase / 20)

    length = Double.pi * (CGFloat(12) + abs(sinPhase) * CGFloat(11))

    }

    }

    }

    struct LoaderView_Previews: PreviewProvider {

    static var previews: some View {

    ZStack {

    Color.black

    .edgesIgnoringSafeArea(.all)

    LoaderView(

    circleColor: .blue,

    spinnerColor: .white

    )

    }

    }

    }

    Recipe 8-7

    Using Canvas in SwiftUI

    ```


    ![](images/515103_1_En_8_Chapter/515103_1_En_8_Fig2_HTML.png)


    A set of two images has the first one with a screenshot of codes written to generate
    a custom spinner in the swift user interface on the left and the preview of the
    custom spinner as a blue dot in the iPhone schema on the right.


    Figure 8-2


    Custom spinner written in SwiftUI


    You can see many magic numbers here. Try to play with them to see how the result
    changes.'
