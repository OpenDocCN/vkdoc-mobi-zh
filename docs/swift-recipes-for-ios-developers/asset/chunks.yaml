- fmt: "### Gradients\n\nAnother popular design element is gradients. Like in most\
    \ of the previous cases, gradients can be easily done but can’t be done directly\
    \ from the storyboard editor. And like in previous cases, it’s easy to fix.\n\n\
    Our gradient will have the following properties:\n\n- `startColor`\n- `endColor`\n\
    - `direction`.\n\nIn UIKit gradients can be implemented by adding a layer to `UIView`.\
    \ There’s a layer capable of rendering gradients – `CAGradientLayer`.\n\nAs it\
    \ will be a class, not an extension, we can directly override the `layoutSubviews`\
    \ method to update the gradient when the geometry is changed (Recipe [4-28](#515103_1_En_4_Chapter.xhtml#PC46)).\n\
    \n```\n@IBDesignable\nclass GradientView: UIView {\n    enum Direction: Int {\n\
    \        case horizontal\n        case vertical\n    }\n    @IBInspectable var\
    \ startColor: UIColor = .white {\n        didSet {\n            gradientLayer?.colors\
    \ = [\n                startColor.cgColor,\n                endColor.cgColor\n\
    \            ]\n        }\n    }\n    @IBInspectable var endColor: UIColor = .black\
    \ {\n        didSet {\n            gradientLayer?.colors = [\n               \
    \ startColor.cgColor,\n                endColor.cgColor\n            ]\n     \
    \   }\n    }\n    @IBInspectable var direction: Int = Direction.horizontal.rawValue\
    \ {\n        didSet {\n            if direction == Direction.horizontal.rawValue\
    \ {\n                gradientLayer?.startPoint = CGPoint(x: 0.0, y: 0.5)\n   \
    \             gradientLayer?.endPoint = CGPoint(x: 1.0, y: 0.5)\n            }\
    \ else {\n                gradientLayer?.startPoint = CGPoint(x: 0.5, y: 0.0)\n\
    \                gradientLayer?.endPoint = CGPoint(x: 0.5, y: 1.0)\n         \
    \   }\n        }\n    }\n    var gradientLayer: CAGradientLayer? = nil\n    override\
    \ func layoutSubviews() {\n        super.layoutSubviews()\n        if gradientLayer\
    \ == nil {\n            gradientLayer = CAGradientLayer()\n            gradientLayer!.colors\
    \ = [\n                startColor.cgColor,\n                endColor.cgColor\n\
    \            ]\n            if direction == Direction.horizontal.rawValue {\n\
    \                gradientLayer!.startPoint = CGPoint(x: 0.0, y: 0.5)\n       \
    \         gradientLayer!.endPoint = CGPoint(x: 1.0, y: 0.5)\n            } else\
    \ {\n                gradientLayer!.startPoint = CGPoint(x: 0.5, y: 0.0)\n   \
    \             gradientLayer!.endPoint = CGPoint(x: 0.5, y: 1.0)\n            }\n\
    \            layer.addSublayer(gradientLayer!)\n        }\n        gradientLayer?.cornerRadius\
    \ = layer.cornerRadius\n        gradientLayer?.frame = self.bounds\n    }\n}\n\
    Recipe 4-28\nGradients\n```\n\nThe `GradientView` class supports horizontal and\
    \ vertical gradients only but you can modify it by adding diagonal gradients or\
    \ even custom angles. A little math in setting the `startPoint` and `endPoint`\
    \ of the `gradientLayer` will do the trick.\n\n### Blurs\n\nThe last popular effect,\
    \ which is particularly popular in iOS, is blur. Blur is a smoothing filter making\
    \ the whole screen or some part of it... blurry. The effect is so popular that\
    \ you’ll hardly find an iOS user who wouldn’t be familiar with it. iPhone and\
    \ iPad UIs get blurred when you open the notification bar, widget panel, task\
    \ manager or any other panel on the iOS Home Screen or Lock Screen.\n\nUIKit has\
    \ a class `UIVisualEffectView` which can apply blur effect to all underlying views\
    \ with hardware acceleration. Recipe [4-29](#515103_1_En_4_Chapter.xhtml#PC47)\
    \ uses it with minimum changes. As we need to apply blur effect not to the view\
    \ itself, but to views behind it, we need a clear background. By default it’s\
    \ not clear and it can be confusing.\n\n```\nclass BlurView: UIVisualEffectView\
    \ {\n    override init(effect: UIVisualEffect?) {\n        super.init(effect:\
    \ effect)\n        commonInit()\n    }\n    required init?(coder: NSCoder) {\n\
    \        super.init(coder: coder)\n        effect = UIBlurEffect(style: .dark)\n\
    \        commonInit()\n    }\n    private func commonInit() {\n        backgroundColor\
    \ = .clear\n    }\n}\nRecipe 4-29\nBlurs\n```\n\nThe `BlurView` class creates\
    \ a blur effect and automatically clears the background so it’s ready to use.\
    \ Add `UIView` in the storyboard editor, change the class name to `BlurView` and\
    \ set the desired blur type – that’s it!\n\n![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig10_HTML.png)\n\
    \nA screenshot of setting up the user interface view in an iPhone has an outline\
    \ of an iPhone with two boxes pasted inside the border on the left. The right\
    \ image has a window with selections.\n\nFigure 4-10\n\nUsing BlurView in the\
    \ storyboard\n\nThe power of these classes and extensions is that you can use\
    \ them together. Add a blurry panel with rounded corners, border or even shadow\
    \ and you’ll see how your UI starts to look professional and appealing.\n\nFigure\
    \ [4-11](#515103_1_En_4_Chapter.xhtml#Fig11) shows how three UIViews shown in\
    \ Figures [4-8](#515103_1_En_4_Chapter.xhtml#Fig8), [4-9](#515103_1_En_4_Chapter.xhtml#Fig9),\
    \ and [4-10](#515103_1_En_4_Chapter.xhtml#Fig10) look in a running iOS app. This\
    \ example doesn’t use a single line of code, only design in the storyboard.\n\n\
    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig11_HTML.jpg)\n\nA schema of\
    \ different colors overlapping represents a custom user interface view in a running\
    \ iOS application. It has a rectangular box with a border and a circle connected\
    \ by a bluish square.\n\nFigure 4-11\n\nCustom UIViews in a running iOS app\n\n\
    ## Summary\n\nUIKit is a powerful toolkit for developing UI in iOS apps. It appeared\
    \ in early versions of iOS and actively used up to present day. Still, UIKit often\
    \ requires a lot of code to do simple things. In this chapter we simplified iOS\
    \ app navigation, wrote functions to show alerts with just one line of code, reviewed\
    \ different map options and GPS navigation. The main way to design UI in iOS app\
    \ is Storyboards. Many features are not available there even being parts of UIKit.\
    \ Fortunately, it can be easily fixed. Last several recipes show how to add to\
    \ Storyboards blurs, rounded corners and other effects. In the next chapter we’ll\
    \ talk about another important part of UI development – images.\n\n# 5. Image\
    \ Processing\n\nShowing images on device screens, making them semitransparent,\
    \ moving them, rotating and scaling them – these are standard features of UIKit.\
    \ They can be done by showing `UIImage` inside `UIImageView`. But it’s not everything\
    \ you can get on iOS. Apple provides great frameworks to draw and process images.\
    \ Apart from standard frameworks, there are open source image processing libraries.\n\
    \nWhat can we do with images? First, we’ll learn to load images from files and\
    \ save them. Files can be stored in the device filesystem, in memory, or even\
    \ on the Web. Then we’ll talk about image downloading and caching and see how\
    \ libraries like Kingfisher work.\n\nSecond, we’ll do very simple image processing\
    \ without using external libraries. They include resizing and cropping. This can\
    \ be useful for profile pictures. Most apps require them to have a square shape,\
    \ possibly rounded up to a circle. We already know how to show images with rounded\
    \ corners, but cropping them to a square before uploading is completely a different\
    \ topic.\n\nThen we’ll discuss image masks. You can show an image with rounded\
    \ corners by just modifying `UIImageView`’s layer, but in some cases, we need\
    \ more complex shapes. You may want to allow the user to put an item on top of\
    \ the picture, like glasses or a beard.\n\nThe last topic will be effects and\
    \ filters. Changing brightness and contrast, gamma, and saturation – all these\
    \ can be done using external libraries. And even more, popular Instagram-like\
    \ filters can be applied right in your app. This includes sepia, blur, high/low\
    \ pass, pixilation, sketch, vignette, swirl, and dozens of other filters.\n\n\
    ### Reading and Writing Images\n\nThere are different frameworks when it comes\
    \ to working with images in iOS. The first one is UIKit. It has class `UIImage`.\
    \ It’s a high-level class giving access to a limited functionality; at the same\
    \ time it’s optimized for working with `UIImageView` and other UIKit components.\n\
    \n`CIImage` from the CoreImage framework is underlying data in `UIImage`. It doesn’t\
    \ provide any functionality for developers, and it’s not supposed to be touched\
    \ directly.\n\nThe low-level class is `CGImage`, part of the Core Graphics framework.\
    \ This class gives full access to image buffer and its characteristics. If you\
    \ need to change several pixels in an image or apply some filter, `CGImage` is\
    \ just what you need.\n\n`UIImage`, `CGImage`, and `CIImage` can be converted\
    \ to each other."
  raw: '### Gradients


    Another popular design element is gradients . Like in most of the previous cases,
    gradients can be easily done but can’t be done directly from the storyboard editor.
    And like in previous cases, it’s easy to fix.


    Our gradient will have the following properties:


    *   `startColor`


    *   `endColor`


    *   `direction`.


    In UIKit gradients can be implemented by adding a layer to `UIView`. There’s a
    layer capable of rendering gradients – `CAGradientLayer`.


    As it will be a class, not an extension, we can directly override the `layoutSubviews`
    method to update the gradient when the geometry is changed (Recipe [4-28](#515103_1_En_4_Chapter.xhtml#PC46)).


    ```

    @IBDesignable

    class GradientView: UIView {

    enum Direction: Int {

    case horizontal

    case vertical

    }

    @IBInspectable var startColor: UIColor = .white {

    didSet {

    gradientLayer?.colors = [

    startColor.cgColor,

    endColor.cgColor

    ]

    }

    }

    @IBInspectable var endColor: UIColor = .black {

    didSet {

    gradientLayer?.colors = [

    startColor.cgColor,

    endColor.cgColor

    ]

    }

    }

    @IBInspectable var direction: Int = Direction.horizontal.rawValue {

    didSet {

    if direction == Direction.horizontal.rawValue {

    gradientLayer?.startPoint = CGPoint(x: 0.0, y: 0.5)

    gradientLayer?.endPoint = CGPoint(x: 1.0, y: 0.5)

    } else {

    gradientLayer?.startPoint = CGPoint(x: 0.5, y: 0.0)

    gradientLayer?.endPoint = CGPoint(x: 0.5, y: 1.0)

    }

    }

    }

    var gradientLayer: CAGradientLayer? = nil

    override func layoutSubviews() {

    super.layoutSubviews()

    if gradientLayer == nil {

    gradientLayer = CAGradientLayer()

    gradientLayer!.colors = [

    startColor.cgColor,

    endColor.cgColor

    ]

    if direction == Direction.horizontal.rawValue {

    gradientLayer!.startPoint = CGPoint(x: 0.0, y: 0.5)

    gradientLayer!.endPoint = CGPoint(x: 1.0, y: 0.5)

    } else {

    gradientLayer!.startPoint = CGPoint(x: 0.5, y: 0.0)

    gradientLayer!.endPoint = CGPoint(x: 0.5, y: 1.0)

    }

    layer.addSublayer(gradientLayer!)

    }

    gradientLayer?.cornerRadius = layer.cornerRadius

    gradientLayer?.frame = self.bounds

    }

    }

    Recipe 4-28

    Gradients

    ```


    The `GradientView` class supports horizontal and vertical gradients only but you
    can modify it by adding diagonal gradients or even custom angles. A little math
    in setting the `startPoint` and `endPoint` of the `gradientLayer` will do the
    trick.


    ### Blurs


    The last popular effect, which is particularly popular in iOS, is blur. Blur is
    a smoothing filter making the whole screen or some part of it... blurry. The effect
    is so popular that you’ll hardly find an iOS user who wouldn’t be familiar with
    it. iPhone and iPad UIs get blurred when you open the notification bar, widget
    panel, task manager or any other panel on the iOS Home Screen or Lock Screen.


    UIKit has a class `UIVisualEffectView` which can apply blur effect to all underlying
    views with hardware acceleration. Recipe [4-29](#515103_1_En_4_Chapter.xhtml#PC47)
    uses it with minimum changes. As we need to apply blur effect not to the view
    itself, but to views behind it, we need a clear background. By default it’s not
    clear and it can be confusing.


    ```

    class BlurView: UIVisualEffectView {

    override init(effect: UIVisualEffect?) {

    super.init(effect: effect)

    commonInit()

    }

    required init?(coder: NSCoder) {

    super.init(coder: coder)

    effect = UIBlurEffect(style: .dark)

    commonInit()

    }

    private func commonInit() {

    backgroundColor = .clear

    }

    }

    Recipe 4-29

    Blurs

    ```


    The `BlurView` class creates a blur effect and automatically clears the background
    so it’s ready to use. Add `UIView` in the storyboard editor, change the class
    name to `BlurView` and set the desired blur type – that’s it!


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig10_HTML.png)


    A screenshot of setting up the user interface view in an iPhone has an outline
    of an iPhone with two boxes pasted inside the border on the left. The right image
    has a window with selections.


    Figure 4-10


    Using BlurView in the storyboard


    The power of these classes and extensions is that you can use them together. Add
    a blurry panel with rounded corners, border or even shadow and you’ll see how
    your UI starts to look professional and appealing.


    Figure [4-11](#515103_1_En_4_Chapter.xhtml#Fig11) shows how three UIViews shown
    in Figures [4-8](#515103_1_En_4_Chapter.xhtml#Fig8), [4-9](#515103_1_En_4_Chapter.xhtml#Fig9),
    and [4-10](#515103_1_En_4_Chapter.xhtml#Fig10) look in a running iOS app. This
    example doesn’t use a single line of code, only design in the storyboard.


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig11_HTML.jpg)


    A schema of different colors overlapping represents a custom user interface view
    in a running i O S application. It has a rectangular box with a border and a circle
    connected by a bluish square.


    Figure 4-11


    Custom UIViews in a running iOS app


    ## Summary


    UIKit is a powerful toolkit for developing UI in iOS apps. It appeared in early
    versions of iOS and actively used up to present day. Still, UIKit often requires
    a lot of code to do simple things. In this chapter we simplified iOS app navigation,
    wrote functions to show alerts with just one line of code, reviewed different
    map options and GPS navigation, The main way to design UI in iOS app is Storyboards.
    Many features are not available there even being parts of UIKit. Fortunately,
    it can be easily fixed. Last several recipes show how to add to Storyboards blurs,
    rounded corners and other effects. In the next chapter we’ll talk about another
    important part of UI development – images.


    # 5. Image Processing


    Showing images on device screens, making them semitransparent, moving them, rotating
    and scaling them – these are standard features of UIKit. They can be done by showing
    `UIImage` inside `UIImageView`. But it’s not everything you can get on iOS. Apple
    provides great frameworks to draw and process images. Apart from standard frameworks,
    there are open source image processing libraries.


    What can we do with images? First, we’ll learn to load images from files and save
    them. Files can be stored in the device filesystem, in memory, or even on the
    Web. Then we’ll talk about image downloading and caching and see how libraries
    like Kingfisher work.


    Second, we’ll do very simple image processing without using external libraries.
    They include resizing and cropping. This can be useful for profile pictures. Most
    apps require them to have a square shape, possibly rounded up to a circle. We
    already know how to show images with rounded corners, but cropping them to a square
    before uploading is completely a different topic.


    Then we’ll discuss image masks. You can show an image with rounded corners by
    just modifying `UIImageView`’s layer, but in some cases, we need more complex
    shapes. You may want to allow the user to put an item on top of the picture, like
    glasses or a beard.


    The last topic will be effects and filters. Changing brightness and contrast,
    gamma, and saturation – all these can be done using external libraries. And even
    more, popular Instagram-like filters can be applied right in your app. This includes
    sepia, blur, high/low pass, pixilation, sketch, vignette, swirl, and dozens of
    other filters.


    ## Reading and Writing Images


    There are different frameworks when it comes to working with images in iOS. The
    first one is UIKit. It has class `UIImage`. It’s a high-level class giving access
    to a limited functionality; at the same time it’s optimized for working with `UIImageView`
    and other UIKit components.


    `CIImage` from the CoreImage framework is underlying data in `UIImage`. It doesn’t
    provide any functionality for developers, and it’s not supposed to be touched
    directly.


    The low-level class is `CGImage`, part of the Core Graphics framework. This class
    gives full access to image buffer and its characteristics. If you need to change
    several pixels in an image or apply some filter, `CGImage` is just what you need.


    `UIImage`, `CGImage`, and `CIImage` can be converted to each other.'
