- fmt: '# Pin Pad UI Component


    Passwords are being used less and less, and it makes sense. Most users either
    forget their passwords or use the same password in all websites and mobile apps,
    which is extremely unsafe.


    Many modern apps offer either a two-step verification with an SMS code or a code
    from a verification app (like Google Authenticator or Authy). This code contains
    four to six digits. Sometimes, they replace the password altogether.


    The most beautiful and comfortable way to handle this is a *pin pad*. A regular
    `UITextField` doesn’t look good for this purpose.


    Let’s write a simple four-digit pin pad.


    First, add four `UITextField` objects to your view as shown in Figure [6-2](#515103_1_En_6_Chapter.xhtml#Fig2).
    You can locate them wherever you like, but it will be better to make center alignment
    and put them on top, so we won’t need to change the layout when the keyboard appears.


    ![](images/515103_1_En_6_Chapter/515103_1_En_6_Fig2_HTML.png)


    An image displays a mobile screen with empty text boxes and a number keypad. Out
    of 4 spaces, numbers 1 and 5 are entered, and the cursor is placed in the 3rd
    position.


    Figure 6-2


    Pin pad example


    Choose Number Pad as the keyboard type for all four of them. Assign them tags
    from 0 to 3 in order.


    Make four outlets:


    ```

    @IBOutlet weak var digit1TextField: UITextField!

    ...

    @IBOutlet weak var digit4TextField: UITextField!

    ```


    Make your `UIViewController` subclass (in our case, it’s `PinPadViewController`)
    a delegate for all of them. Implement `UITextFieldDelegate`. We will need these
    methods:


    ```

    func textFieldShouldBeginEditing(_ textField: UITextField) -> Bool

    func textField(_ textField: UITextField, shouldChangeCharactersIn range: NSRange,
    replacementString string: String) -> Bool

    ```


    The first method should clean the selected text field and all text fields after
    it.


    The second method should make input validation. We allow only digits and only
    one per field.


    To move focus from one field to another, we’ll use the `editingChanged` action.
    Let’s use a method called `textChanged`:


    ```

    @IBAction func textChanged(_ textField: UITextField)

    ```


    To make it easier, we can pack text fields into an array.


    ```

    class PinPadViewController: UIViewController {

    @IBOutlet weak var digit1TextField: UITextField!

    @IBOutlet weak var digit2TextField: UITextField!

    @IBOutlet weak var digit3TextField: UITextField!

    @IBOutlet weak var digit4TextField: UITextField!

    private var pinDigitTextFields: [UITextField] = []

    override func viewDidLoad() {

    super.viewDidLoad()

    pinDigitTextFields = [

    digit1TextField,

    digit2TextField,

    digit3TextField,

    digit4TextField

    ]

    }

    override func viewDidAppear(_ animated: Bool) {

    super.viewDidAppear(animated)

    clear()

    }

    @IBAction func textChanged(_ textField: UITextField) {

    if textField.tag == 3 {

    view.endEditing(true)

    validateAndGo()

    } else {

    pinDigitTextFields[textField.tag + 1].becomeFirstResponder()

    }

    }

    private func clear() {

    pinDigitTextFields.forEach {

    $0.text = ""

    }

    digit1TextField.becomeFirstResponder()

    }

    private func getPin() -> String {

    let digit1 = digit1TextField.text ?? ""

    let digit2 = digit2TextField.text ?? ""

    let digit3 = digit3TextField.text ?? ""

    let digit4 = digit4TextField.text ?? ""

    return "\(digit1)\(digit2)\(digit3)\(digit4)"

    }

    private func validateAndGo() {

    let pin = getPin()

    if pin.count != 4 {

    clear()

    return

    }

    // Here you can send PIN to API to verify it (or do it locally)

    }

    }

    extension PinPadViewController: UITextFieldDelegate {

    func textFieldShouldBeginEditing(_ textField: UITextField) -> Bool {

    for i in textField.tag..<pinDigitTextFields.count {

    pinDigitTextFields[i].text = ""

    }

    return true

    }

    func textField(_ textField: UITextField, shouldChangeCharactersIn range: NSRange,
    replacementString string: String) -> Bool {

    if let text = textField.text,

    let textRange = Range(range, in: text) {

    let updatedText = text.replacingCharacters(in: textRange,

    with: string)

    if updatedText.count > 1 {

    return false

    }

    if !updatedText.containsOnlyDigits {

    return false

    }

    return true

    }

    return false

    }

    }

    Recipe 6-15

    Pin Pad

    ```


    You should make validation in method `validateAndGo`.


    There are always many ways to implement one feature or another. This is a very
    simple way; it can be more complicated if you need visual effects or decorations.


    ## Summary


    In this chapter we described how to validate text while editing, how to block
    some characters from user input, how to add prefix or suffix to text field. As
    most of mobile devices don’t have keyboard, we should never forget about on-screen
    keyboard covering part of our user interface. To handle it, we need to subscribe
    to notifications and update layout. We also need to remember to hide keyboard
    when screen is changed. The last recipe shows one interesting use case of text
    fields – pin pad. Component for entering pin code or verification code from SMS.
    In the next chapter we’ll finish discussing UIKit and talk about animations and
    visual effects.


    # 7. UI Animation and Effects


    Animations and effects are important elements/aspects of modern mobile apps. Each
    app has dozens of similar apps available in the stores/gallery; you need to make
    yours stand out so customers will download yours. Beautiful animated UI helps
    it stand out.


    We will review the most popular animation types :


    * Moving `UIView` from one point to another, (e.g., when the keyboard appears/disappears)

    * Animating properties like color or transparency

    * Parallax effect with `UIScrollView`, `UITableView`, or `UICollectionView`

    * “Hero” animation – moving the item from one view to another

    * Overriding default transition between `UIViewControllers`


    ## Animating Views


    `UIView` and its subclasses have several properties that can be animated. We will
    split them into two groups:


    * Animating own properties of views, like color, transparency, or scale

    * Animating layout by changing constraints'
