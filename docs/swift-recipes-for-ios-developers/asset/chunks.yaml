    # Image Masks


    The previous sections of this chapter explained how to do basic image processing.
    The next step is to combine two or more pictures into one. All popular messengers,
    social networks, blogging platforms, and other apps offer to add effects that
    don''t change the image itself but add something on top of it. It can be text,
    a simple drawing, a sticker, smoke, stars, etc.


    This can be done by adding an image with transparency on top of another. The top
    image can be one of the predefined images, an image selected by the user or a
    newly generated one.


    The key concept here is alpha channel. Images consist of pixels. Each pixel has
    channels representing either one of the colors or level of transparency. The most
    common palette on computer devices, including smartphones, is RGBA. RGBA stands
    for red, green, blue, and alpha.


    Red, green, and blue are color components. The mixture of these colors gives the
    whole display palette. Red and green make yellow; red and blue make magenta; blue
    and green make cyan. When all channels are at their maximum value, it''s white.


    The alpha component is a level of transparency. If it takes 1 byte, its range
    is from 0 to 255, where 0 means a fully transparent pixel and 255 is a fully opaque
    pixel.


    But why is all this important?'
  raw: '## Preparing and Showing Profile Pictures


    We can’t control the geometry of the photos the user takes. If we pull said photos
    from social networks, we have even less control. There’s always the option to
    show an error if the user tries to download a picture of wrong size or wrong aspect
    ratio, but it will create a bad user experience.


    A better solution is to process the picture before uploading. We usually want
    to limit the picture size and make it square. Let’s say, in our example, we’ll
    limit it to 512 `×` 512 pixels.


    ### Processing Profile Pictures Before Uploading


    Having previously written extensions, we can prepare profile picture in just one
    like of code as shown in Recipe [5-18](#515103_1_En_5_Chapter.xhtml#PC25). Here’s
    our algorithm :


    *   The user takes a picture. The source doesn’t matter; it can be a camera or
    gallery.


    *   If both width and height are bigger than 512 pixels, we downscale it, so at
    least one of the dimensions will be 512 pixels (the other one will be bigger).


    *   If the width is not equal to the height, we crop the image. To make it simple,
    we’ll cut pixels equally from both sides.


    ```

    extension UIImage {

    func prepareProfilePicture() -> UIImage {

    squared?.downscaled(maxSize: 512) ?? self

    }

    }

