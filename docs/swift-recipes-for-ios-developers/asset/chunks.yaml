  raw: '### Image Scaling


    There are two types of scaling : upscaling and downscaling . In the first case,
    the new image is bigger than the original one; in the second case – smaller. If
    scaling is not proportional, it can be both upscaling and downscaling. But we
    usually need to preserve the aspect ratio, so we won’t investigate this case here.


    Fortunately, the `CoreImage` framework does everything for us; we only need to
    calculate the new size. What can it be?


    We may need to set the maximum size of an image, for example, if the user chooses
    a profile picture. Modern iPhone cameras have very high resolution. Image sizes
    around 5000 × 5000 pixels are normal. But it’s not necessary for profile pictures,
    so the app needs to downscale it.


    If the user chooses a picture from the gallery, it can be too small. In this case,
    we need to upscale it. Alternatively, the app can show an alert asking to choose
    a better-quality picture. Recipe [5-14](#515103_1_En_5_Chapter.xhtml#PC20) shows
    a possible resizing solution, while Recipe [5-15](#515103_1_En_5_Chapter.xhtml#PC21)
    only downscales the image.


    ```

    extension UIImage {

    func downscaled(maxSize: CGFloat) -> UIImage? {

    let maxDimension = size.width > size.height ? size.width : size.height

    if maxDimension > maxSize {

    return resized(maxSize: maxSize)

    } else {

    return self

    }

    }

    }

    Recipe 5-15

    Downscaling an Image

    ```


    ```

    extension UIImage {

    func resized(maxSize: CGFloat) -> UIImage? {

    let scale: CGFloat

    if size.width > size.height {

    scale = maxSize / size.width

    }

    else {

    scale = maxSize / size.height

    }

    let newWidth = size.width * scale

    let newHeight = size.height * scale

    UIGraphicsBeginImageContext(CGSize(width: newWidth, height: newHeight))

    draw(in: CGRect(x: 0, y: 0, width: newWidth, height: newHeight))

    let newImage = UIGraphicsGetImageFromCurrentImageContext()

    UIGraphicsEndImageContext()

    return newImage

    }

    }

    Recipe 5-14

    Scaling an Image to the Required Size

    ```


    Now it’s time to discuss *Image Context* . Changing pixels in `UIImage` or `CGImage`
    is not efficient. If we calculate pixels manually, we lose all graphic acceleration.
    The right way to do it is to create an Image Context.


    You can work with one Image Context at a time. All work takes place between :


    ```

    UIGraphicsBeginImageContext

    // ... and ...

    UIGraphicsEndImageContext

    ```


    You can use the `UIImage` instances to draw in the current context, or you can
    draw lines or other shapes using `UIBezierPath` and other classes using Image
    Context.


    In the end, you need to turn the context into a new `UIImage` object using the
    `UIGraphicsGetImageFromCurrentImageContext` function .


    ### Image Cropping


    This is required when we need a specific aspect ratio . Many apps require square
    pictures. For example, all posts on Instagram are square. Profile pictures are
    usually square as well. Sometimes rounded, sometimes circular. From an image processing
    point of view, squares, rounded squares, and circles are the same, because rounding
    is performed by UIKit, and the difference is only in the corner radius.


    Another option is a rectangle. Computer displays often have a 16:9 ratio. Full
    HD is 1920 × 1080\. If you divide 1920 by 16 or 1080 by 9, you get 120\. UHD or
    4K has twice more pixels in each dimension – 3840 × 2160\. If you divide width
    by 16 or height by 9, the result is 240 in both cases.


    iPad screens have an aspect ratio of 4:3\. For example, a typical iPad Pro screen
    with retina has a resolution of 2048 `×` 1536 pixels. 512 `×` 4 = 2048, 512 `×`
    3 = 1536. iPad Pro’s aspect ratio is not a perfect 4:3, but it’s rather close.
    For example, an 11-inch iPad Pro has a resolution of 2388 `×` 1668 pixels. It’s
    1.43:1, or 4.29:3.


    When writing an app, it’s more important to keep the necessary aspect ratio rather
    than the resolution. There are several ways to change the aspect ratio:


    *   Scaling an image without preserving the aspect ratio. It’s the easiest way,
    but the result will be stretched.


    *   Cropping an image. If the original image is too wide, we can remove some pixels
    from its sides.


    *   Adding padding. When you watch movies at home, you can see that most of them
    have a black space on the top and bottom of the screen. That’s because at the
    cinema the aspect ratio is different (the screen is wider), and movies are usually
    optimized for cinema.


    Let’s write two extensions of `UIImage` . The one from Recipe [5-16](#515103_1_En_5_Chapter.xhtml#PC23)
    will crop it to a square using the smallest dimension. Another, from Recipe [5-17](#515103_1_En_5_Chapter.xhtml#PC24),
    will crop it to the required aspect ratio.


    ```

    extension UIImage {

    func changeAspectRatio(aspectRatio: CGFloat) -> UIImage? {

    guard let originalCGImage = self.cgImage else {

    return nil

    }

    // Create a copy of the image without the imageOrientation property so it is in
    its native orientation

    let contextImage: UIImage = UIImage(cgImage: originalCGImage)

    // Get the size of the contextImage

    let contextSize: CGSize = contextImage.size

    let posX: CGFloat

    let posY: CGFloat

    let width: CGFloat

    let height: CGFloat

    if aspectRatio == contextSize.width / contextSize.height {

    // New aspect ratio is the same as old

    posX = 0

    posY = 0

    width = contextSize.width

    height = contextSize.height

    } else if aspectRatio < contextSize.width / contextSize.height {

    // New aspect ratio is less then original

    // Cut from left/right

    posX = (contextSize.width - contextSize.height * aspectRatio) / 2

    posY = 0

    width = contextSize.height * aspectRatio

    height = contextSize.height

    } else {

    // Cut from top/bottom

    posX = 0

    posY = (contextSize.height - contextSize.width / aspectRatio) / 2

    width = contextSize.width

    height = contextSize.width / aspectRatio

    }

    let rect: CGRect = CGRect(x: posX, y: posY, width: width, height: height)

    // Create bitmap image from context using the rect

    if let imageRef = contextImage.cgImage?.cropping(to: rect) {

    return UIImage(cgImage: imageRef, scale: self.scale, orientation: self.imageOrientation)

    } else {

    return nil

    }

    }

    }

    Recipe 5-17

    Cropping an Image to a Custom Aspect Ratio

    ```


    ```

    extension UIImage {

    var squared: UIImage? {

    guard let originalCGImage = self.cgImage else {

    return nil

    }

    // Create a copy of the image without the imageOrientation property so it is in
    its native orientation

    let contextImage: UIImage = UIImage(cgImage: originalCGImage)

    // Get the size of the contextImage

    let contextSize: CGSize = contextImage.size

    let posX: CGFloat

    let posY: CGFloat

    let width: CGFloat

    let height: CGFloat

    // Check to see which length is the longest and create the offset based on that
    length, then set the width and height of our rect

    if contextSize.width > contextSize.height {

    posX = (contextSize.width - contextSize.height) / 2

    posY = 0

    width = contextSize.height

    height = contextSize.height

    } else {

    posX = 0

    posY = (contextSize.height - contextSize.width) / 2

    width = contextSize.width

    height = contextSize.width

    }

    let rect: CGRect = CGRect(x: posX, y: posY, width: width, height: height)

    if let imageRef = contextImage.cgImage?.cropping(to: rect) {

    // Create a new image based on the imageRef and rotate back to the original orientation

    return UIImage(cgImage: imageRef, scale: self.scale, orientation: self.imageOrientation)

    } else {

    return nil

    }

    }

    }

    Recipe 5-16

    Cropping an Image to a Square

    ```


    Note


    These computed property and function should always succeed, but if something can
    go wrong, we assume it will. That’s why the result is optional. What could be
    wrong exactly? For example, the aspect ratio can be so small or so big that one
    of the dimensions will be zero; or the device can run out of memory – in these
    cases, we may really get nil.'
