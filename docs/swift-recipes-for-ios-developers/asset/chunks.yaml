    \ \",\", with: \".\")) }\n}\n配方 1-4\n将字符串解析为数字类型\n```\n\n### 布尔值转换\n\n尽管 `Bool`\
    \ 是最简单的类型，只有两个值，但解析它可能是一个挑战。为了理解原因，请尝试判断 `1` 是 `true` 还是 `false`。大多数开发者会说 `1`\
    \ 无疑是 `true`，因为 `0` 是 `false`，而任何其他值都是 `true`。这在 Swift 和大多数其他编程语言中正是这样运作的。在某些情况下，`0`\
    \ 可能表示成功（无错误），而其他值则表示错误代码。如果你遇到这种情况，请记住这一点，但我们将假设 `Int` 在等于 `0` 时转换为 `false`，否则转换为\
    \ `true`。\n\n其他问题包括：是否应该将 `\"yes\"` 或 `\"true\"` 解析为 `true`，以及如何处理像 `5` 或 `\"\
    success\"` 这样的自定义值。这取决于数据的来源。你应该阅读所使用的 API 或库的文档并据此做出决定。\n\n配方 1-5 遵循表 1-1 中指定的规则集。\n\
    \n**表 1-1** 任意类型到 Bool 的转换规则\n\n| 解析类型 | 规则 |\n| --- | --- |\n| `Bool` | 按原样返回解析后的值。\
    \ |\n| `Int` | 如果值为 `0`，则返回 `false`，否则返回 `true`。 |\n| `Float` 或 `Double` | 返回\
    \ `nil` 以避免混淆。布尔值绝不应表示为浮点数。 |\n| `String` | 如果值为 `\"true\"` 或 `\"yes\"`，则返回 `true`；如果值为\
    \ `\"false\"` 或 `\"no\"`，则返回 `false`；在所有其他情况下返回 `nil`。字符串比较应不区分大小写。 |\n| 其他类型\
    \ | 返回 `nil`。 |\n\n```\n// Any 无法被扩展，因此它是一个函数\nfunc parseAsBool(value: Any?) ->\
    \ Bool? {\n    if let boolValue = value as? Bool {\n        return boolValue\n\
    \    } else if let intValue = value as? Int {\n        return intValue != 0\n\
    \    } else if value is Float || value is Double {\n        return nil\n    }\
    \ else if let strValue = value as? String {\n        let strPrepared = strValue.trimmingCharacters(in:\
    \ .whitespacesAndNewlines).lowercased()\n        if strPrepared == \"true\" ||\
    \ strPrepared == \"yes\" {\n            return true\n        } else if strPrepared\
    \ == \"false\" || strPrepared == \"no\" {\n            return false\n        }\
    \ else {\n            return nil\n        }\n    } else {\n        return nil\n\
    \    }\n}\n配方 1-5\n从变量中提取布尔值\n```\n\n如果你希望所有数字类型都转换为 `Bool`，你可以使用 `isZero` 函数，而不是返回\
    \ `nil`。如果 `Double.isZero` 返回 `true`，则返回 `false`。否则，返回 `true`。\n"
- fmt: "### String to Data and Back\n\n`String` and `Data` are highly used types in\
    \ Swift. `Data` has a buffer of bytes without any particular semantics. `String`\
    \ is basically the same, but Swift interprets this buffer as a sequence of characters,\
    \ including special symbols, such as spaces and newlines.\n\nDepending on the\
    \ use case, you may need to turn `String` to `Data` or vice versa.\n\n```\nlet\
    \ data = Data()\nlet str = String(data: data, encoding: .utf8)\n```\n\nIf data\
    \ can’t be parsed using specified encoding (UTF-8 in this case), this code will\
    \ return `nil`. For example, if you read a JPEG file from an iPhone storage (or\
    \ download it from the Internet) and send it to a `String` constructor, it will\
    \ always return `nil`.\n\nThe conversion from `String` to `Data` rarely fails\
    \ with UTF-8 encoding:\n\n```\nlet str = \"I'm a string\"\nlet data = str.data(using:\
    \ .utf8)\n```\n\nBut potentially you may need to get it encoded into ASCII (American\
    \ Standard Code for Information Interchange), which was the standard before UTF\
    \ was introduced. ASCII uses 7 bits per symbol and supports only 128 characters,\
    \ including special ones. Arabic, Japanese, or Cyrillic symbols can’t be encoded\
    \ this way, so the conversion will fail. `Data` will be `nil`. Conversion of UTF8\
    \ data is shown in Recipe [1-6](#515103_1_En_1_Chapter.xhtml#PC18).\n\nWe will\
    \ discuss the `String` type and its features in more details in the second chapter.\n\
    \n```\npublic extension StringProtocol {\n    var asUtf8Data: Data {\n       \
    \ data(using: .utf8)!\n    }\n}\n\npublic extension Data {\n    var asUtf8String:\
    \ String? {\n        String(data: self, encoding: .utf8)\n    }\n}\n\nRecipe 1-6\n\
    Conversion Between String and Data\n```\n\n### Dates, Timestamps, and ISO 8601\
    \ Format\n\nWe often need to represent dates as a string. Swift has an integrated\
    \ `Date` structure. It represents both date and time, it supports time zones,\
    \ and it’s used as an argument or return type in many functions and methods. The\
    \ biggest problem of using `Date` is that it’s an internal Swift format – you\
    \ can’t pass it to a server; you have to convert it to a `String`, `Int`, or another\
    \ universal format.\n\nOne of the standards is called *Timestamp* or *UNIX Timestamp*.\
    \ It’s an integer value, indicating the amount of seconds or milliseconds since\
    \ *epoch*. Epoch is the midnight of January 1, 1970. In Swift, timestamps are\
    \ represented as `Double`; they have an integer part (seconds) and a fractional\
    \ part (fractions of seconds).\n\nThese two functions – one method and one constructor\
    \ – convert `Date` to `Double` and back:\n\n```\nlet date = Date()\nlet timestamp\
    \ = date.timeIntervalSince1970\nlet restoredDate = Date(timeIntervalSince1970:\
    \ timestamp)\n```\n\nThe biggest problem in timestamps is the lack of information\
    \ about time zones. Swift `Date` returns the amount of seconds since January 1,\
    \ 1970, UTC (Coordinated Universal Time). So if you convert it to a `Date` object,\
    \ you need to make correct time zone conversion.\n\nAnother way to represent time\
    \ is the ISO 8601 format. ISO stands for International Organization for Standardization.\
    \ Everything starting with ISO means that it’s a standard.\n\nSwift doesn’t offer\
    \ a conversion option between ISO 8601 `String` and `Date` out of the box, but\
    \ it’s rather easy to implement it using the `DateFormatter` class as shown in\
    \ Recipe [1-7](#515103_1_En_1_Chapter.xhtml#PC20).\n\n```\npublic extension Formatter\
    \ {\n    static let iso8601withFractionalSeconds: DateFormatter = {\n        let\
    \ formatter = DateFormatter()\n        formatter.calendar = Calendar(identifier:\
    \ .iso8601)\n        formatter.locale = Locale(identifier: \"en_US_POSIX\")\n\
    \        formatter.dateFormat = \"yyyy-MM-dd'T'HH:mm:ss.SSSZZZZZ\"\n        return\
    \ formatter\n    }()\n}\n\npublic extension Date {\n    var iso8601String: String\
    \ {\n        Formatter.iso8601withFractionalSeconds.string(from: self)\n    }\n\
    \n    init?(iso8601String: String) {\n        guard let date = Formatter.iso8601withFractionalSeconds.date(from:\
    \ iso8601String) else {\n            return nil\n        }\n        self = date\n\
    \    }\n}\n\nRecipe 1-7\nDate to ISO 8601\n```\n\n*Usage*\n\n```\nlet dateWrong\
    \ = Date(iso8601String: \"It's 5 o'clock\")\n// dateWrong is nil\n\nlet dateCorrect\
    \ = Date(iso8601String: \"2021-07-01T18:30:00.000+04:00\")\n// dateCorrect is\
    \ a valid Date object\n```\n\nPlease note that in a debug session, you’ll see\
    \ time in your local time zone, which is what you usually want to show to the\
    \ user.\n\n## Extracting Data from Dictionaries and Arrays\n\nYou can’t do much\
    \ with simple data types. In real-life apps, more complex types are used. You\
    \ can have a structure containing different data types and different structures\
    \ inside. It’s called `Dictionary`. Basically, a `Dictionary` is a set of keys\
    \ and values. They can be limited with particular data types. You’ll rarely see\
    \ the keyword `Dictionary` in Swift code. A more common syntax is:\n\n```\nvar\
    \ dict: [String: Any] = [:]\n```\n\nThis code created a `Dictionary` variable.\
    \ Each key must be a `String`. The value can have any type, including another\
    \ dictionary.\n\nIn case if you need an ordered list of values of the same type,\
    \ you can use an `Array`. It doesn’t have keys but uses indexes instead.\n\n```\n\
    var arr: [String] = []\n```\n\n### Complex Data Types\n\nThe composition of dictionaries\
    \ and arrays allows you to create data structures of any complexity.\n\nIt’s easy\
    \ to spot the similarity with JSON (JavaScript Object Notation) structures. JSON\
    \ is the most popular format for API requests and responses. When a mobile app\
    \ requests a reading of the weather forecast, user info, or any other data from\
    \ the server, it’s almost guaranteed it gets JSON.\n\nParsing JSON structures\
    \ from `String` or `Data` returned by API will be discussed later. Let’s focus\
    \ on extracting data from `Dictionary` and `Array` now.\n\n### Extracting Data\
    \ from Dictionary\n\nLet’s say we have a `Dictionary`:\n\n```\nvar dict: [String:\
    \ Any] = [\n    \"name\": \"John\",\n    \"surname\": \"Doe\",\n    \"age\": 30\n\
    ]\n```\n\nIt’s John’s birthday, so we need to make him one year older:\n\n```\n\
    if var age = dict[\"age\"] {\n    age += 1\n    dict[\"age\"] = age\n}\n```\n\n\
    And here we have a problem – the code won’t compile. `age` is not a number; it’s\
    \ `Any`. We can’t increment `Any`; it doesn’t make sense. Type casting could solve\
    \ the problem:\n\n```\nif var age = dict[\"age\"] as? Int {\n    age += 1\n  \
    \  dict[\"age\"] = age\n}\n```\n\nAnd this is a working code, except for one situation.\
    \ API responses are usually generated by scripting, not strictly typed languages,\
    \ like JavaScript. There’s a big chance that age will be `\"30\"` instead of `30`.\
    \ The opposite problem is also possible. If the text string consists of digits,\
    \ it can be parsed as a number. For example, a bank card number can be parsed\
    \ as a big `Int`, and you may need it as a `String`. Or user’s password `123456`\
    \ can be parsed as an `Int` instead of `String`.\n\nAs we already know, Swift\
    \ type casting doesn’t turn `Int` into `String` automatically. And `Bool` variables\
    \ are completely uncertain. `Dictionary` extension from Recipe [1-8](#515103_1_En_1_Chapter.xhtml#PC27)\
    \ will help us to solve this problem."
  raw: '### String to Data and Back


    `String` and `Data` are highly used types in Swift. Data has a buffer of bytes
    without any particular semantics. `String` is basically the same, but Swift interprets
    this buffer as a sequence of characters, including special symbols, such as spaces
    and newlines.


    Depending on the use case, you may need to turn `String` to `Data` or vice versa.


    ```

    let data = Data()

    let str = String(data: data, encoding: .utf8)

    ```


    If data can’t be parsed using specified encoding (UTF-8 in this case), this code
    will return `nil`. For example, if you read a JPEG file from an iPhone storage
    (or download it from the Internet) and send it to a `String` constructor, it will
    always return `nil`.


    The conversion from `String` to `Data` rarely fails with UTF-8 encoding:


    ```

    let str = "I''m a string"

    let data = str.data(using: .utf8)

    ```


    But potentially you may need to get it encoded into ASCII (American Standard Code
    for Information Interchange), which was the standard before UTF was introduced.
    ASCII uses 7 bits per symbol and supports only 128 characters, including special
    ones. Arabic, Japanese, or Cyrillic symbols can’t be encoded this way, so the
    conversion will fail. Data will be `nil`. Conversion of UTF8 data is shown in
    Recipe [1-6](#515103_1_En_1_Chapter.xhtml#PC18).


    We will discuss the `String` type and its features in more details in the second
    chapter.


    ```

    public extension StringProtocol {

    var asUtf8Data: Data {

    data(using: .utf8)!

    }

    }

    public extension Data {

    var asUtf8String: String? {

    String(data: self, encoding: .utf8)

    }

    }

    Recipe 1-6

    Conversion Between String and Data

    ```


    ### Dates, Timestamps, and ISO 8601 Format


    We often need to represent dates as a string . Swift has an integrated `Date`
    structure. It represents both date and time, it supports time zones, and it’s
    used as an argument or return type in many functions and methods. The biggest
    problem of using `Date` is that it’s an internal Swift format – you can’t pass
    it to a server; you have to convert it to a `String`, Int, or another universal
    format.


    One of the standards is called *Timestamp* or *UNIX Timestamp* . It’s an integer
    value, indicating the amount of seconds or milliseconds since *epoch*. Epoch is
    the midnight of January 1, 1970\. In Swift, timestamps are represented as `Double`;
    they have an integer part (seconds) and a fractional part (fractions of seconds).


    These two functions – one method and one constructor – convert `Date` to `Double`
    and back:


    ```

    let date = Date()

    let timestamp = date.timeIntervalSince1970

    let restoredDate = Date(timeIntervalSince1970: timestamp)

    ```


    The biggest problem in timestamps is the lack of information about time zones.
    Swift `Date` returns the amount of seconds since January 1, 1970, UTC (Coordinated
    Universal Time). So if you convert it to a `Date` object, you need to make correct
    time zone conversion.


    Another way to represent time is the ISO 8601 format . ISO stands for International
    Organization for Standardization. Everything starting with ISO means that it’s
    a standard.


    Swift doesn’t offer a conversion option between ISO 8601 `String` and `Date` out
    of the box, but it’s rather easy to implement it using the `DateFormatter` class
    as shown in Recipe [1-7](#515103_1_En_1_Chapter.xhtml#PC20).


    ```

    public extension Formatter {

    static let iso8601withFractionalSeconds: DateFormatter = {

    let formatter = DateFormatter()

    formatter.calendar = Calendar(identifier: .iso8601)

    formatter.locale = Locale(identifier: "en_US_POSIX")

    formatter.dateFormat = "yyyy-MM-dd''T''HH:mm:ss.SSSZZZZZ"

    return formatter

    }()

    }

    public extension Date {

    var iso8601String: String {

    Formatter.iso8601withFractionalSeconds.string(from: self)

    }

    init?(iso8601String: String) {

    guard let date = Formatter.iso8601withFractionalSeconds.date(from: iso8601String)
    else {

    return nil

    }

    self = date

    }

    }

    Recipe 1-7

    Date to ISO 8601

    ```


    *Usage*


    ```

    let dateWrong = Date(iso8601String: "It''s 5 o''clock")

    // dateWrong is nil

    let dateCorrect = Date(iso8601String: "2021-07-01T18:30:00.000+04:00")

    // dateCorrect is a valid Date object

    ```


    Please note that in a debug session, you’ll see time in your local time zone,
    which is what you usually want to show to the user.


    ## Extracting Data from Dictionaries and Arrays


    You can’t do much with simple data types. In real-life apps, more complex types
    are used. You can have a structure containing different data types and different
    structures inside. It’s called `Dictionary` . Basically, a `Dictionary` is a set
    of keys and values. They can be limited with particular data types. You’ll rarely
    see the keyword `Dictionary` in Swift code. A more common syntax is


    ```

    var dict: [String: Any] = [:]

    ```


    This code created a `Dictionary` variable. Each key must be a `String`. The value
    can have any type, including another dictionary.


    In case if you need an ordered list of values of the same type, you can use an
    `Array`. It doesn’t have keys but uses indexes instead.


    ```

    var arr: [String] = []

    ```


    ### Complex Data Types


    The composition of dictionaries and arrays allows you to create data structures
    of any complexity.


    It’s easy to spot the similarity with JSON (JavaScript Object Notation) structures
    . JSON is the most popular format for API requests and responses. When a mobile
    app requests a reading of the weather forecast, user info, or any other data from
    the server, it’s almost guaranteed it gets JSON.


    Parsing JSON structures from `String` or `Data` returned by API will be discussed
    later. Let’s focus on extracting data from `Dictionary` and `Array` now.


    ### Extracting Data from Dictionary


    Let’s say we have a `Dictionary` :


    ```

    var dict: [String: Any] = [

    "name": "John",

    "surname": "Doe",

    "age": 30

    ]

    ```


    It’s John’s birthday, so we need to make him one year older:


    ```

    if var age = dict["age"] {

    age += 1

    dict["age"] = age

    }

    ```


    And here we have a problem – the code won’t compile. `age` is not a number; it’s
    `Any`. We can’t increment `Any`; it doesn’t make sense. Type casting could solve
    the problem:


    ```

    if var age = dict["age"] as? Int {

    age += 1

    dict["age"] = age

    }

    ```


    And this is a working code, except for one situation. API responses are usually
    generated by scripting, not strictly typed languages, like JavaScript. There’s
    a big chance that age will be `"30"` instead of `30`. The opposite problem is
    also possible. If the text string consists of digits, it can be parsed as a number.
    For example, a bank card number can be parsed as a big `Int`, and you may need
    it as a `String`. Or user’s password `123456` can be parsed as an `Int` instead
    of `String`.


    As we already know, Swift type casting doesn’t turn Int into `String` automatically.
    And `Bool` variables are completely uncertain. `Dictionary` extension from Recipe
    [1-8](#515103_1_En_1_Chapter.xhtml#PC27) will help us to solve this problem.'
  trans: "\n### 字符串与数据的相互转换\n\n`String`和`Data`是 Swift 中两种高度常用的类型。`Data`拥有一个不带有特定语义的字节缓冲区。`String`本质上是相同的，但\
    \ Swift 将这一缓冲区解释为字符序列，包括空格和换行等特殊符号。\n\n根据不同的使用场景，你可能需要将`String`转换为`Data`，或者反之。\n\
    \n```\nlet data = Data()\nlet str = String(data: data, encoding: .utf8)\n```\n\
    \n如果数据无法使用指定的编码（此处为 UTF-8）进行解析，这段代码将返回`nil`。例如，如果你从 iPhone 的存储中读取一个 JPEG 文件（或从互联网上下载它）并将其传递给`String`构造器，它将始终返回`nil`。\n\
    \n从`String`到`Data`的转换在使用 UTF-8 编码时很少失败：\n\n```\nlet str = \"I'm a string\"\nlet\
    \ data = str.data(using: .utf8)\n```\n\n但有些情况下，你可能需要将其编码为 ASCII（美国信息交换标准码），它是\
    \ UTF 引入之前的标准。ASCII 每个符号使用 7 位，仅支持 128 个字符（包括特殊字符）。阿拉伯语、日语或西里尔字母无法以此方式编码，因此转换会失败，`Data`将为`nil`。UTF8\
    \ 数据的转换在秘籍 1-6 中展示。\n\n我们将在第二章更详细地讨论`String`类型及其特性。\n\n```\npublic extension StringProtocol\
    \ {\n    var asUtf8Data: Data {\n        data(using: .utf8)!\n    }\n}\n\npublic\
    \ extension Data {\n    var asUtf8String: String? {\n        String(data: self,\
    \ encoding: .utf8)\n    }\n}\n\n秘籍 1-6\n字符串与数据的相互转换\n```\n\n### 日期、时间戳与 ISO 8601\
    \ 格式\n\n我们经常需要将日期表示为字符串。Swift 内置了`Date`结构体。它同时表示日期和时间，支持时区，并作为许多函数和方法的参数或返回类型使用。使用`Date`的最大问题在于它是\
    \ Swift 的内部格式——你无法直接将其传递给服务器；必须将其转换为`String`、`Int`或其他通用格式。\n\n其中一种标准称为*时间戳*或*UNIX\
    \ 时间戳*。它是一个整数值，表示自*纪元*以来的秒数或毫秒数。纪元是指 1970 年 1 月 1 日午夜。在 Swift 中，时间戳以`Double`表示；它们包含整数部分（秒）和小数部分（秒的分数）。\n\
    \n这两个函数——一个方法和一个构造器——用于`Date`与`Double`之间的相互转换：\n\n```\nlet date = Date()\nlet\
    \ timestamp = date.timeIntervalSince1970\nlet restoredDate = Date(timeIntervalSince1970:\
    \ timestamp)\n```\n\n时间戳最大的问题在于缺少时区信息。Swift 的`Date`返回自 1970 年 1 月 1 日 UTC（协调世界时）以来的秒数。因此，如果你将其转换为`Date`对象，需要进行正确的时区转换。\n\
    \n另一种表示时间的方式是 ISO 8601 格式。ISO 代表国际标准化组织。任何以 ISO 开头的事物都意味着它是一个标准。\n\nSwift 并未直接提供\
    \ ISO 8601 格式的`String`与`Date`之间的转换选项，但使用`DateFormatter`类可以相当容易地实现它，如秘籍 1-7 所示。\n\
    \n```\npublic extension Formatter {\n    static let iso8601withFractionalSeconds:\
    \ DateFormatter = {\n        let formatter = DateFormatter()\n        formatter.calendar\
    \ = Calendar(identifier: .iso8601)\n        formatter.locale = Locale(identifier:\
    \ \"en_US_POSIX\")\n        formatter.dateFormat = \"yyyy-MM-dd'T'HH:mm:ss.SSSZZZZZ\"\
    \n        return formatter\n    }()\n}\n\npublic extension Date {\n    var iso8601String:\
    \ String {\n        Formatter.iso8601withFractionalSeconds.string(from: self)\n\
    \    }\n\n    init?(iso8601String: String) {\n        guard let date = Formatter.iso8601withFractionalSeconds.date(from:\
    \ iso8601String) else {\n            return nil\n        }\n        self = date\n\
    \    }\n}\n\n秘籍 1-7\n日期转换为 ISO 8601\n```\n\n*用法*\n\n```\nlet dateWrong = Date(iso8601String:\
    \ \"现在是 5 点\")\n// dateWrong 为 nil\n\nlet dateCorrect = Date(iso8601String: \"\
    2021-07-01T18:30:00.000+04:00\")\n// dateCorrect 是一个有效的 Date 对象\n```\n\n请注意，在调试会话中，你将看到你本地时区的时间，这通常就是你想要展示给用户的内容。\n\
    \n## 从字典和数组中提取数据\n\n仅靠简单的数据类型能做的工作有限。在真实的应用中，会使用更复杂的类型。你可以拥有一个包含不同数据类型和内部嵌套不同结构体的结构体。这被称为`Dictionary`。基本上，`Dictionary`是一组键和值的集合。它们可以被特定的数据类型限制。在\
    \ Swift 代码中你很少会看到`Dictionary`这个关键字。更常见的语法是：\n\n```\nvar dict: [String: Any] =\
    \ [:]\n```\n\n这段代码创建了一个`Dictionary`变量。每个键必须是`String`类型。值可以是任何类型，包括另一个字典。\n\n如果你需要一个相同类型值的有序列表，可以使用`Array`。它没有键，但使用索引代替。\n\
    \n```\nvar arr: [String] = []\n```\n\n### 复杂数据类型\n\n字典和数组的组合允许你创建任意复杂度的数据结构。\n\
    \n很容易看出它与 JSON（JavaScript 对象表示法）结构的相似性。JSON 是 API 请求和响应中最流行的格式。当移动应用请求读取天气预报、用户信息或服务器上的任何其他数据时，几乎可以确定它得到的是\
    \ JSON。\n\n从 API 返回的`String`或`Data`中解析 JSON 结构将在后面讨论。现在让我们专注于从`Dictionary`和`Array`中提取数据。\n\
    \n### 从字典中提取数据\n\n假设我们有一个`Dictionary`：\n\n```\nvar dict: [String: Any] = [\n \
    \   \"name\": \"John\",\n    \"surname\": \"Doe\",\n    \"age\": 30\n]\n```\n\n\
    今天是 John 的生日，所以我们需要让他年长一岁：\n\n```\nif var age = dict[\"age\"] {\n    age += 1\n\
    \    dict[\"age\"] = age\n}\n```\n\n这里我们遇到了一个问题——代码无法编译。`age`不是数字；它是`Any`。我们不能对`Any`进行递增操作，这没有意义。类型转换可以解决这个问题：\n\
    \n```\nif var age = dict[\"age\"] as? Int {\n    age += 1\n    dict[\"age\"] =\
    \ age\n}\n```\n\n这是一段可工作的代码，除了一种情况。API 响应通常由脚本语言生成，而不是像 JavaScript 这样的严格类型语言。年龄很有可能是`\"\
    30\"`而不是`30`。相反的问题也可能发生。如果文本字符串由数字组成，它可能被解析为一个数字。例如，银行卡号可能被解析为一个很大的`Int`，而你可能需要它作为`String`。或者用户的密码`123456`可能被解析为`Int`而不是`String`。\n\
    \n正如我们已经知道的，Swift 的类型转换不会自动将`Int`变成`String`。而`Bool`变量则完全不确定。秘籍 1-8 中的`Dictionary`扩展将帮助我们解决这个问题。\n"
