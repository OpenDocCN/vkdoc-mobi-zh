    These two methods can be joined into one. Memory cache can have a small amount
    of data, for example, 10`–`15 Mb. Filesystem cache – several times more. When
    memory cache reaches its limit, it saves some files on the disk and then retrieves
    them when necessary.


    How could it be useful? Imagine that you’re writing an app showing a restaurant
    menu. It has `UITableView` or `UICollectionView` with small pictures. The user
    scrolls up and down trying to decide what they’re in the mood to eat this day.
    This is a good situation for memory cache. It will take longer to read files from
    the disk again and again, even if this disk is a high-speed flash memory. Then
    the user goes to their cart, and we no longer need menu pictures, so we can remove
    them from the memory. On the other hand, they can go back to the menu or browse
    it after ordering. We simply load all the pictures back from the disk.


    We’ll leave two-level cache out of scope in this book, but you can try to make
    your own as an exercise. It would be a valuable experience.


    To wrap it up, let’s review a usage example. We’ll put three UIKit views to the
    screen :


    ```

    // UILabel showing current cache size

    @IBOutlet weak var lblCacheSize: UILabel!

    // UITextField to enter URL

    @IBOutlet weak var tfURL: UITextField!

    // UIImageView to show loaded (or cached) image

    @IBOutlet weak var ivImage: UIImageView!

    ```


    Plus, we add two buttons. One will load an image using memory cache; another will
    use filesystem cache. They’ll trigger the following actions:


    ```

    @IBAction func loadUsingMemory()

    @IBAction func loadUsingFiles()

    ```


    Storyboard design may look like Figure [5-2](#515103_1_En_5_Chapter.xhtml#Fig2).


    ![](images/515103_1_En_5_Chapter/515103_1_En_5_Fig2_HTML.jpg)


    An image of a mobile screen displaying the image cache. The location of the file,
    options to load it using memory cache or file cache, and cache size are listed.


