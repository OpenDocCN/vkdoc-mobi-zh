    space: colorSpace, bitmapInfo: bitmapInfo),

    let ptrMask = contextMask.data?.assumingMemoryBound(to: UInt8.self) else {

    return nil

    }

    ```


    `ptr` 和 `ptrMask` 的类型均为 `UnsafeMutablePointer<UInt8>`。如果你熟悉 C 语言家族（包括 Objective-C），这等同于
    `unsigned char *`，可以像数组一样通过索引访问。


    由于两个上下文均以 `nil` 初始化，我们需要在这些上下文中绘制原始图像和蒙版：


    ```

    context.draw(originalCGImage, in: CGRect(x: 0, y: 0, width: originalCGImage.width,
    height: originalCGImage.height))

    contextMask.draw(maskCGImage, in: CGRect(x: 0, y: 0, width: maskCGImage.width,
    height: maskCGImage.height))

    ```


    然后逐像素应用蒙版：


    ```

    for y in 0..= maskCGImage.width || y >= maskCGImage.height {

    ptr[pixelOffset + 3] = 0

    } else {

    ptr[pixelOffset + 3] = UInt8((UInt(ptrMask[maskPixelOffset]) + UInt(ptrMask[maskPixelOffset
    + 1]) + UInt(ptrMask[maskPixelOffset])) / 3)

    }

    ptr[pixelOffset] = UInt8(UInt(ptr[pixelOffset]) * UInt(ptr[pixelOffset + 3]) /
    255)

    ptr[pixelOffset + 1] = UInt8(UInt(ptr[pixelOffset + 1]) * UInt(ptr[pixelOffset
    + 3]) / 255)

    ptr[pixelOffset + 2] = UInt8(UInt(ptr[pixelOffset + 2]) * UInt(ptr[pixelOffset
    + 3]) / 255)

    }

    }

    ```


    常量 `lineOffset` 和 `maskLineOffset` 表示每行的起始指针。我们可以为每个像素单独计算，但为每行保存它们速度更快。


    多次转换为 `UInt` 和 `UInt8` 是计算中的关键部分。我们不能安全地将两个 `UInt8` 变量相加而不冒溢出的风险。在将结果赋值回 `ptr`
    之前，需要将其转换回 `UInt8`。当然，计算结果应在 0 到 255 范围内。


    该算法并非最优，只是一个通用解决方案。针对特定任务，可以按需优化。


    ## 效果与滤镜


    可以直接操作像素缓冲区或图像上下文来应用滤镜，但这并非最高效的方式。现代 iOS 设备拥有性能优异的 GPU，专门用于图像处理。


    ### CoreImage


    Apple 提供了 CoreImage 框架，其中包含硬件加速的图像滤镜。配方 [5-25](#515103_1_En_5_Chapter.xhtml#PC40)
    展示了如何对 `UIImage` 对象应用高斯模糊：


    ```

    import CoreImage

    extension UIImage {

    func gaussianBlur(radius: CGFloat) -> UIImage? {

    let ciContext = CIContext(options: nil)

    guard let blurFilter = CIFilter(name: "CIGaussianBlur") else {

    return nil

    }

    blurFilter.setValue(CIImage(image: self), forKey: "inputImage")

    blurFilter.setValue(radius, forKey: "inputRadius")

    guard let outputImageData = blurFilter.value(forKey: "outputImage") as? CIImage,

    let outputImage = ciContext.createCGImage(outputImageData, from: outputImageData.extent)

    else {

    return nil

    }

    return UIImage(cgImage: outputImage)

    }

    }

    Recipe 5-25

    Gaussian Blur with CoreImage

    ```


    该框架的问题在于缺乏良好的协议。它使用 `String` 参数来指定滤镜类型和参数，而非预定义的常量、方法和类。


    ### GPUImage


    GPUImage 框架是一个开源的库，托管在 GitHub 上。该框架的第一代于 2013 年用 Objective-C 编写，更新的版本是 GPUImage2
    和 GPUImage3，它们具有相似的接口，区别在于 Swift 版本。


    要添加该框架，请访问 Brad Larson 的 GitHub 账户上的仓库：[`https://github.com/BradLarson`](https://github.com/BradLarson)。该账户下的仓库包含所有必要的文档。


    注意


    GPUImage2 和 GPUImage3 不能通过 CocoaPods 获取。你可以使用 Swift Package Manager 替代。


    使用 GPUImage，你可以获得 CoreImage 功能的便捷快捷方式，以及额外的滤镜和效果。配方 [5-26](#515103_1_En_5_Chapter.xhtml#PC41)
    展示了如何使用 GPUImage 应用相同的高斯模糊：


    ```

    import GPUImage

    extension UIImage {

    func gaussianBlurGPU(radius: CGFloat) -> UIImage? {

    let blurFilter = GPUImageGaussianBlurFilter()

    blurFilter.blurRadiusInPixels = radius

    return blurFilter.image(byFilteringImage: self)

    }

    }

    Recipe 5-26

    Gaussian Blur with GPUImage

    ```


    ## GIF 动画


    GIF 动画出现于 1987 年，但现在它们比以往任何时候都更流行。但它们有两个严重的限制：


    *   它们使用索引颜色。每个 GIF 文件包含一个最多 256 种颜色的调色板。它可以重复使用相同颜色，但同一张图片中不能使用更多颜色。

    *   GIF 不支持半透明像素。如果在另一张图片上显示 GIF 图片或动画，将会有明显的锐利边缘。


    GIF 适用于小型动画，而非剪辑或电影。


    iOS 并不能直接播放 GIF 动画。你需要编写一些代码或使用相应的库。


    ### Kingfisher 中的 AnimatedImageView


    Kingfisher 是一个流行的用于从网络下载图片的框架。它集成了缓存系统，提供实时图像处理和即用的视图。


    要使用 Swift Package Manager 添加 Kingfisher，请添加以下链接：[`https://github.com/onevcat/Kingfisher`](https://github.com/onevcat/Kingfisher)


    也有对应的 CocoaPods pod。如果你更倾向于使用 CocoaPods，请添加以下行：


    ```

    pod ''Kingfisher''

    ```


    其中一个视图是 `AnimatedImageView`。它是 `UIImageView` 的子类，使用起来非常方便。你可以在 `AnimatedImageView`
    中本地使用或加载远程 GIF 文件。配方 [5-27](#515103_1_En_5_Chapter.xhtml#PC43) 展示了如何以编程方式创建它，并循环播放在线
    GIF。


    ```

    import Kingfisher

    func createAndPlayAnimatedImageView(parentView: UIView, gifURL: URL, delegate:
    AnimatedImageViewDelegate?) {

    let animatedImageView = AnimatedImageView(frame: parentView.bounds)

    animatedImageView.delegate = delegate

    animatedImageView.kf.setImage(with: gifURL, placeholder: nil, options: nil) {
    result in

    switch result {

    case .success:

    animatedImageView.startAnimating()

    case .failure(let error):

    print(error.localizedDescription)

    }

    }

    parentView.addSubview(animatedImageView)

    }

    Recipe 5-27

    Using AnimatedImageView

    ```


    注意


    如果你在生产环境中使用此代码，请勿忘记考虑可能的布局变化。'
