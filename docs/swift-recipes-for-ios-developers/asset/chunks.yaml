    \n`PhoneNumberKit`库允许解析电话号码、验证其有效性，并将本地电话号码转换为国际格式。在配方 3-5 中，我们使用该库来验证电话号码的有效性。让我们将其添加到`Podfile`中：\n\
    \n```swift\nimport PhoneNumberKit\npublic extension String {\nvar isValidPhoneNumber:\
    \ Bool {\ndo {\ntry phoneNumberKit.parse(\"+33 6 89 017383\")\nreturn true\n}\n\
    catch {\nreturn false\n}\n}\n}\n配方 3-5\n电话号码验证\n```\n\n```ruby\npod 'PhoneNumberKit'\n\
