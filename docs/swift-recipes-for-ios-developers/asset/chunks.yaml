- fmt: '### Serializing an Object


    To make a data structure serializable, you need to implement an `Encodable` protocol.
    This protocol has one method – `encode(to: Encoder)`. You don’t need to implement
    it yourself; it has a default implementation. But this default implementation
    works only if all the stored variables in your class or struct are `Encodable`.
    All basic types (`Int`, `String`, `Double`, and others) are `Encodable`. All custom
    types are not, unless they implement `Encodable`. For example:


    ```

    struct User: Encodable {

    var name: String

    var surname: String

    var age: Int

    }

    ```


    Why would we need it? Why make a struct or a class serializable (or `Encodable`
    as Swift calls it)? The magic starts when you need to turn it into JSON or save
    it to a file. The following example converts `Encodable` to `Data` and `Dictionary`:


    ```

    struct User: Encodable {

    var name: String

    var surname: String

    var age: Int

    var asData: Data? {

    return try? JSONEncoder().encode(self)

    }

    var asDictionary: [String: Any]? {

    guard let data = self.asData else { return nil }

    return (try? JSONSerialization.jsonObject(with: data, options: .allowFragments)).flatMap
    { $0 as? [String: Any] }

    }

    }

    ```


    As you can see in the preceding listing, an `Encodable` object can be turned into
    a JSON-encoded `Data` or Swift `Dictionary` with just a couple of lines of code.
    You can add more variables to your `Encodable` structure, and they’ll be automatically
    serialized by the `Encodable` protocol, or more precisely by the default implementation
    of its `encode(to: Encodable)` method.


    ```

    let encUser = User(name: "John", surname: "Doe", age: 30)

    let userDict = encUser.asDictionary

    print(userDict ?? {})

    ```


    *Output*


    ```

    ["surname": Doe, "name": John, "age": 30]

    ```


    If for some reason serialization fails, `nil` will be returned.


    As we discussed in the beginning, good code must be universal. It should be easy
    to copy it to another project without modifications or with minimum modifications.
    Swift extensions from Recipe [2-7](#515103_1_En_2_Chapter.xhtml#PC20) come to
    help.


    ```

    public extension Encodable {

    var asJSONData: Data? {

    try? JSONEncoder().encode(self)

    }

    var asJSONString: String? {

    guard let data = self.asData else { return nil }

    return String(data: data, encoding: .utf8)

    }

    var asDictionary: [String: Any]? {

    guard let data = self.asData else { return nil }

    return (try? JSONSerialization.jsonObject(with: data, options: .allowFragments)).flatMap
    { $0 as? [String: Any] }

    }

    }

    Recipe 2-7

    Encodable to JSON

    ```


    Now everything conforming to the `Encodable` protocol will have methods `asJSONData`,
    `asJSONDictionary`, and `asString`. The following code snippet shows an encodable
    structure (which has methods `asJSONData`, `asJSONString`, and `asDictionary`):


    ```

    struct User: Encodable {

    var name: String

    var surname: String

    var age: Int

    }

    ```


    These methods are extremely useful when you work with API accepting JSON-formatted
    arguments. Also, `asData` and `asString` methods can be used to save a file to
    flash memory, hard drive, or solid-state drive (if you write code compatible with
    macOS).


    ### Deserializing an Object


    Similarly to `Encodable`, Swift offers a `Decodable` protocol. Instead of a method,
    it declares a constructor `init(from: Decoder)`. It has a default implementation
    as well.


    Deserializing objects is a little more of a complicated task because of four reasons:


    - The provided data structure may not have some fields declared in a `Decodable`
    structure.

    - The provided data structure may have extra fields.

    - The names in the provided data and the declared structures may not match.

    - The types should be an exact match.


    Before we continue, we’ll need one more interface – `Codable`. It’s not an independent
    interface; it’s a composition of `Encodable` and `Decodable`, or in Swift terminology,
    it’s a typealias.


    ```

    typealias Codable = Decodable & Encodable

    ```


    Generally, when we need to serialize a class, we need to deserialize it as well.
    Let’s change our `User` structure to conform to `Codable` instead of `Encodable`.


    ```

    struct User: Codable {

    var name: String

    var surname: String

    var age: Int

    }

    ```


    We don’t write any extensions to `Codable`; it’s just an alias. Instead, we extend
    a `Decodable` protocol as shown in Recipe [2-8](#515103_1_En_2_Chapter.xhtml#PC24).


    ```

    public extension Decodable {

    init?(data: Data) {

    do {

    self = try JSONDecoder().decode(Self.self, from: data)

    } catch {

    return nil

    }

    }

    init?(dict: [String: Any]) {

    guard let jsonData = try? JSONSerialization.data(withJSONObject: dict, options:
    .fragmentsAllowed) else { return nil }

    do {

    self = try JSONDecoder().decode(Self.self, from: jsonData)

    } catch {

    return nil

    }

    }

    init?(jsonString: String) {

    guard let jsonData = jsonString.data(using: .utf8) else { return nil }

    do {

    self = try JSONDecoder().decode(Self.self, from: jsonData)

    } catch {

    return nil

    }

    }

    }

    Recipe 2-8

    JSON to Decodable

    ```


    This code will return a valid object from a JSON-encoded `String`, `Data`, or
    `Dictionary` object, but only if the provided structure has name, surname, and
    age fields. And they must be spelled exactly like in the `User` declaration. The
    following is a user dictionary sample:


    ```

    let decDict: [String: Any] = [

    "name": "John",

    "surname": "Doe",

    "age": 30

    ]

    let decUser = User(dict: decDict)

    ```


    What if one of the fields is missing? For example, we don’t know the user’s age.
    In this case, `decUser` will be `nil`. The problem can be fixed with making the
    fields optional. If some fields are required, they should be nonoptional; for
    example, the user ID is hardly optional. Other fields can be missing, and it’s
    ok.


    Another problem we’ve discussed previously is the type mismatch. Look at the following
    example:


    ```

    struct User: Codable {

    var name: String

    var surname: String

    var age: Int?

    }

    let decDict: [String: Any] = [

    "name": "John",

    "surname": "Doe",

    "age": "30"

    ]

    let decUser = User(dict: decDict)

    ```


    `The decUser` object will have `nil` age. There are two solutions to this problem.
    The first solution is to take care of the server outputs. If you (or your team)
    write the API yourself, you can make strictly typed data. When you work with a
    third-party API, it’s not an option. Here comes the second solution. You can manually
    define an `init(from: Decoder)` constructor. You need to do it for each class
    and struct individually – there’s no universal solution here. You can see an example
    of this solution in Recipe [2-9](#515103_1_En_2_Chapter.xhtml#PC27).


    ```

    public struct User: Codable {

    var name: String

    var surname: String

    var age: Int?

    init(name: String, surname: String, age: Int?) {

    self.name = name

    self.surname = surname

    self.age = age

    }

    init(from decoder: Decoder) throws {

    let container = try decoder.container(keyedBy: CodingKeys.self)

    name = try container.decode(String.self, forKey: .name)

    surname = try container.decode(String.self, forKey: .surname)

    do {

    age = try container.decode(Int.self, forKey: .age)

    } catch DecodingError.typeMismatch {

    age = Int(try container.decode(String.self, forKey: .age))

    }

    }

    }

    Recipe 2-9

    Manual Decoding

    ```


    Please note that if you add a custom constructor to a struct, you need to provide
    a default constructor if needed.


    Even with this inconvenience, we still can define constructors in `Decodable`
    extension, which makes it more comfortable than using `Dictionary` extensions.'
  raw: '### Serializing an Object


    To make a data structure serializable , you need to implement an `Encodable` protocol.
    This protocol has one method – `encode(to: Encoder)`. You don’t need to implement
    it yourself; it has a default implementation. But this default implementation
    works only if all the stored variables in your class or struct are `Encodable`.
    All basic types (`Int`, `String`, `Double`, and others) are `Encodable`. All custom
    types are not, unless they implement `Encodable`. For example:


    ```

    struct User: Encodable {

    var name: String

    var surname: String

    var age: Int

    }

    ```


    Why would we need it? Why make a struct or a class serializable (or `Encodable`
    as Swift calls it)? The magic starts when you need to turn it into JSON or save
    it to a file. The following example converts Encodable to Data and Dictionary
    :


    ```

    struct User: Encodable {

    var name: String

    var surname: String

    var age: Int

    var asData: Data? {

    return try? JSONEncoder().encode(self)

    }

    var asDictionary: [String: Any]? {

    guard let data = self.asData else { return nil }

    return (try? JSONSerialization.jsonObject(with: data, options: .allowFragments)).flatMap
    { $0 as? [String: Any] }

    }

    }

    ```


    As you can see in the preceding listing, an `Encodable` object can be turned into
    a JSON-encoded `Data` or Swift `Dictionary` with just a couple of lines of code.
    You can add more variables to your `Encodable` structure, and they’ll be automatically
    serialized by the `Encodable` protocol, or more precisely by the default implementation
    of its `encode(to: Encodable)` method.


