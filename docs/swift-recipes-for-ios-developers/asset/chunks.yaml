    # 分析字符串内容


    假设我们有一个 `String` 对象，想要知道里面具体是什么内容。它包含拉丁字母吗？还是数字？它是一个强密码吗？或者是一个有效的电子邮件地址？


    `UIKit` 提供了两个用于获取用户文本输入的类：`UITextField` 和 `UITextView`。两者都将输入数据作为字符串返回。即使我们要求用户输入一个数字（例如他们的年龄、银行卡号、需要猜的数字），并选择仅显示数字的屏幕键盘，我们得到的仍然是一个
    `String`（参见方法 3-1）。


    ```

    public extension StringProtocol {

    var containsOnlyDigits: Bool {

    let notDigits = NSCharacterSet.decimalDigits.inverted

    return rangeOfCharacter(from: notDigits, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    var containsOnlyLetters: Bool {

    let notLetters = NSCharacterSet.letters.inverted

    return rangeOfCharacter(from: notLetters, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    var containsIllegalCharacters: Bool {

    rangeOfCharacter(from: NSCharacterSet.illegalCharacters, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsOnlyPasswordAllowed: Bool {

    var allowedCharacters = CharacterSet()

    allowedCharacters.insert(charactersIn: "!"..."~")

    let forbiddenCharacters = allowedCharacters.inverted

    return rangeOfCharacter(from: forbiddenCharacters, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    var isAlphanumeric: Bool {

    let notAlphanumeric = NSCharacterSet.decimalDigits.union(NSCharacterSet.letters).inverted

    return rangeOfCharacter(from: notAlphanumeric, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    var containsLetters: Bool {

    rangeOfCharacter(from: NSCharacterSet.letters, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsDigits: Bool {

    rangeOfCharacter(from: NSCharacterSet.decimalDigits, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsUppercaseLetters: Bool {

    rangeOfCharacter(from: NSCharacterSet.uppercaseLetters, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsLowercaseLetters: Bool {

    rangeOfCharacter(from: NSCharacterSet.lowercaseLetters, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    var containsNonAlphanumericCharacters: Bool {

    let notAlphanumeric = NSCharacterSet.decimalDigits.union(NSCharacterSet.letters).inverted

    return rangeOfCharacter(from: notAlphanumeric, options: String.CompareOptions.literal,
    range: nil) != nil

    }

    }

    方法 3-1

    检查字符串中的数字和字母

    ```


    这三个扩展使我们能够进行快速（但简单）的内容分析：


    *   如果 `String` 只包含数字，则 `containsOnlyDigits` 返回 `true`。没有小数点分隔符，没有空格，没有特殊字符。通过将
    `String` 转换为 `Int` 也可以得到类似结果，但不会出现潜在溢出问题，并且我们可以区别处理负数。

    *   `containsOnlyLetters` 在 `String` 仅包含字母时返回 `true`。未经修改时，它的用途不大，但我们稍后会对其进行更新，使其更强大。

    *   `isAlphanumeric` 在 `String` 包含字母和数字时返回 `true`。例如，Firestore 文档 ID 和 MD5 哈希值的
    `String` 表示形式始终是字母数字的。


    既然我们在讨论现实世界的例子，就让我们谈谈用例吧。注册表单可能包含：


    *   名和姓

    *   电子邮件地址

    *   密码

    *   电话号码

    *   性别

    *   出生日期或年龄

    *   信用卡信息

    *   地址


    当 Apple 的审核人员在注册屏幕上看到这样的列表时，他们会拒绝该应用。但对于特定功能来说，其中任何字段都是必需的。


    我们将地址验证排除在讨论范围之外，因为它因国家而异，然后讨论其他字段。对于接下来描述的所有扩展，我们将使用以 `isValid` 开头的名称，例如 `isValidName`
    和 `isValidEmail`，并将它们写为计算属性。


    **注意**


    使用函数还是计算属性始终由程序员决定。有一种流行的观点认为：当函数反映对象的属性且不改变该属性时，应使用计算属性。


    ## 名、姓和其他名称


    根据应用的目标地区和你的偏好，可以是一个全名字段，也可以是分开的名和姓字段，还可以是一组更详细的字段（包括中间名或父名）。这些字段只能包含字母、空格、连字符，或许还可以包含像
    "Jr." 或 "Mr." 这种头衔中的点符号。名称验证的示例如方法 3-2 所示。


    ```

    public extension StringProtocol {

    var isValidName: Bool {

    let allowedCharactgers = NSCharacterSet.letters.union(NSCharacterSet.whitespaces).union(CharacterSet(charactersIn:
    ".-"))

    let forbiddenCharacters = allowedCharactgers.inverted

    return rangeOfCharacter(from: forbiddenCharacters, options: String.CompareOptions.literal,
    range: nil) == nil

    }

    }

    方法 3-2

    名称验证

    ```


    此扩展合并了三个字符集：


    *   空格

    *   字母

    *   字符 `.` 和 `-`


    它反转结果集，并验证在 `String` 中未发现任何禁止字符。


    **注意**


    2020 年 5 月，著名商业巨头埃隆·马斯克（PayPal、特斯拉、SpaceX）和加拿大音乐人格莱姆斯有了一个儿子，这个儿子因其非常不寻常的名字 – X
    Æ A-12 – 而立即声名鹊起。然而，加利福尼亚州的户籍登记处要求名字仅包含英语的 26 个字母字符（外加连字符和撇号）；因此，这个名字被拒绝了。这对夫妇不得不将名字改为
    X AE A-XII，其中 X 是名字，AE A-XII 是中间名。就像加利福尼亚州的管理部门一样，我们的扩展也会拒绝第一个选项，而接受最终版本。


    ## 电子邮件地址


    这个话题总是引起很多争议。一些开发者试图将电子邮件地址限制在无问题的范围内，而另一些人则希望给予用户尽可能多的自由——甚至放弃客户端的验证。例如，电子邮件地址
    `root@localhost` 有效吗？它实际上是有效的。但是，当用户在应用中注册时，它没什么用，因为我们无法向它发送任何电子邮件，而且它也不是唯一的。


    我们将在用户注册的上下文中讨论电子邮件验证。我们将只允许以下格式的电子邮件：`some-string@some-domain.ext`。其中 `some-string`
    可以包含拉丁字母、数字以及符号 `.`、`_`、`-`、`%` 和 `+`；`some-domain` 可以包含拉丁字母、数字、`-` 以及用于子域的 `.`；`ext`
    必须只包含拉丁字母，长度不小于 2 个字符且不超过 64 个字符。


    可以使用正则表达式进行分析，如方法 3-3 所示。我们不会详细讨论正则表达式。简而言之，它是一种模式。正则表达式有标准的语法，该语法在不同的平台和语言中是通用的。用于电子邮件验证的正则表达式如下所示：`[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,64}`。


    这并不是正则表达式的唯一选择。还有其他选项，但这个表达式效果很好，并且已经经过数十万用户的测试。它可以与 Firebase Auth 框架一起使用，用于过滤不必要的请求，但如果你有自定义后端，它会更加有用。


    ```

    extension StringProtocol {

    var isValidEmail: Bool {

    let emailRegEx = "[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,64}"

    let emailTest = NSPredicate(format: "SELF MATCHES %@", emailRegEx)

    return emailTest.evaluate(with: self)

    }

    }

    方法 3-3

    电子邮件验证

    ```

