    \            }\n        }\n        return true\n    }\n}\n食谱 6-9\n带后缀的 UITextField\n\
    ```\n\n此处的宽度计算是通过 `NSString` 方法 `size` 执行的。它返回一个 `CGSize` 结构体，其中包含给定属性下文本的宽度和高度。我们设置的唯一属性是\
    \ `NSAttributedString.Key.font`。在 iOS 中，`UIFont` 对象不仅包含字体，还包含字号，因此 `size` 方法拥有足够的信息来进行计算。\n\
    \n## 键盘处理\n\n正如我们在本章开头所讨论的，屏幕键盘对开发者来说可能是一个大问题。默认情况下，当用户点击 `UITextField` 或 `UITextView`\
    \ 时，键盘将会弹出，但它不会自行消失，并且除了遮挡 `UITextField` 或 `UITextView` 之外，什么也不做。如果您在屏幕底部添加一个输入框，键盘将会遮挡它。\n\
    \n### 用户点击文本框外部时隐藏键盘\n\n如果文本字段不在可滚动区域内，隐藏它就相当容易。您只需要在 `UIViewController` 中重写一个函数并调用\
    \ `view.endEditing(true)`，如食谱 6-10 所示。\n\n```\nclass HidingKeyboardViewController:\
    \ UIViewController {\n    override func touchesBegan(_ touches: Set<UITouch>,\
