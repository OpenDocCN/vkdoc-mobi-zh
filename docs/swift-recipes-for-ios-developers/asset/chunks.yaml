    \ {\n            // New aspect ratio is less then original\n            // Cut\
    \ from left/right\n            posX = (contextSize.width - contextSize.height\
    \ * aspectRatio) / 2\n            posY = 0\n            width = contextSize.height\
    \ * aspectRatio\n            height = contextSize.height\n        } else {\n \
    \           // Cut from top/bottom\n            posX = 0\n            posY = (contextSize.height\
    \ - contextSize.width / aspectRatio) / 2\n            width = contextSize.width\n\
    \            height = contextSize.width / aspectRatio\n        }\n        let\
    \ rect: CGRect = CGRect(x: posX, y: posY, width: width, height: height)\n    \
    \    // Create bitmap image from context using the rect\n        if let imageRef\
    \ = contextImage.cgImage?.cropping(to: rect) {\n            return UIImage(cgImage:\
    \ imageRef, scale: self.scale, orientation: self.imageOrientation)\n        }\
    \ else {\n            return nil\n        }\n    }\n}\nRecipe 5-17\nCropping an\
    \ Image to a Custom Aspect Ratio\n```\n\n```\nextension UIImage {\n    var squared:\
    \ UIImage? {\n        guard let originalCGImage = self.cgImage else {\n      \
    \      return nil\n        }\n        // Create a copy of the image without the\
    \ imageOrientation property so it is in its native orientation\n        let contextImage:\
    \ UIImage = UIImage(cgImage: originalCGImage)\n        // Get the size of the\
    \ contextImage\n        let contextSize: CGSize = contextImage.size\n        let\
    \ posX: CGFloat\n        let posY: CGFloat\n        let width: CGFloat\n     \
    \   let height: CGFloat\n        // Check to see which length is the longest and\
    \ create the offset based on that length, then set the width and height of our\
    \ rect\n        if contextSize.width > contextSize.height {\n            posX\
    \ = (contextSize.width - contextSize.height) / 2\n            posY = 0\n     \
    \       width = contextSize.height\n            height = contextSize.height\n\
    \        } else {\n            posX = 0\n            posY = (contextSize.height\
    \ - contextSize.width) / 2\n            width = contextSize.width\n          \
    \  height = contextSize.width\n        }\n        let rect: CGRect = CGRect(x:\
    \ posX, y: posY, width: width, height: height)\n        if let imageRef = contextImage.cgImage?.cropping(to:\
