    ```


    Since iOS 10, which includes all available iOS versions now, you can use the `Measurement`
    struct. In all extensions related to conversions, we’ll use it and show how it
    can be done under the hood in a comment. Using `Measurement` is a preferred method
    as it gives better precision and less potential mistakes. Use it unless you have
    exotic units not supported by iOS.


    Another use case for direct conversions (see comments in the following code) is
    performance. If you need to make too many conversions, the `Measurement` class
    may be slower than multiplications and divisions.


    In Recipe [2-12](#515103_1_En_2_Chapter.xhtml#PC35) we write extensions for the
    `Double` type. We have three commonly used imperial and three metric units:


    - Inch

    - Foot (ft)

    - Mile

    - Centimeter (cm)

    - Meter (m)

    - Kilometer (km)'
