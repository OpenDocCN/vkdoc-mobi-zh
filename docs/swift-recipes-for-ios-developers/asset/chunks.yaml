    \ `View` 使其全局可用，或者使其更针对你特定的视图或某个组件树（例如 `Text` 的子类）。\n\n```\nextension View {\n\
    \    func applyMyStyle() -> some View {\n        modifier(ModifierName())\n  \
    \  }\n}\n```\n\n### 不依赖 UIKit 的 HeaderText\n\n公式 8-6 展示了如何为 `Text` 创建一个修饰符，以生成与公式\
