    \ is: 1 New York Plaza, New York, NY 10004, U.S.A.\n\n# How to Use This Book\n\
    \nThe answer depends on your current level of knowledge on Swift.\n\nIf you’re\
    \ new to Swift and iOS/iPadOS platforms, you need to learn the Swift basics first.\
    \ Make sure you can answer these questions before you dive into this book:\n\n\
    - What is a class and what’s the difference between a class and a struct?\n- How\
    \ to run one or another branch of code depending on different conditions?\n- How\
    \ to run the same fragment of code multiple times?\n- What is a nib/xib and a\
    \ storyboard?\n- How to declare a function or a variable?\n- What’s the difference\
    \ between `let` and `var`?\n\nYou know the answers? Then you’re good to go!\n\n\
    The simplest way to try Swift code is a Playground. You can create one in Xcode\
    \ instead of a project. A Playground can contain one or more files; you can declare\
    \ classes, variables, constants, and functions there. Basically, it’s the same\
    \ as a project, except that it won’t compile into an executable. In a Swift Playground,\
    \ you can run code without an iOS device or simulator, and you’ll see the content\
    \ of all variables without setting breakpoints.\n\nIf you’re at the beginning\
    \ of your Swift learning journey, it will be better for you to type the code instead\
    \ of copying and pasting it. While typing, you’re actively learning.\n\nIf you\
    \ know other programming languages already, it will be much easier. But even if\
    \ that’s not the case, Swift is not a bad option to start with.\n\nIf you already\
    \ know Swift but haven’t written your own app yet, try to do so. Think of this:\
    \ Which app would you like to have on your iPhone or iPad? It doesn’t matter if\
    \ such app already exists – make your own version of it! You can even publish\
    \ it on the App Store in the end. Unless you violate some of their rules, there’s\
    \ no problem in it. Make it free, get feedback from users, fix bugs, and upload\
    \ updates.\n\nYou can use recipes from this book without any limitations, but\
    \ don’t forget that programming is more of an art than a science. Modify the code\
    \ for yourself; make it yours. While it’s still better to read from beginning\
    \ to end, it’s not a requirement. Be creative, find the recipes you need now,\
    \ and use them. It’s important that you understand what you use, and for this\
    \ reason, each recipe has an explanation.\n\nIf you’re an experienced developer,\
    \ you can simply pick code snippets from GitHub. You know what to do. If something\
    \ doesn’t work for you or you know a better way of implementing a feature, send\
    \ your feedback to `swiftrecipes@foxicorn.com`. It will be highly appreciated!\n\
    \n## Good Code\n\nThe purpose of this book is to give you good code snippets that\
    \ you can use in your projects or modify for your own needs. But what is good\
    \ code and what’s the difference between good and bad code?\n\nLet’s imagine that\
    \ you have a function that compiles, doesn’t generate errors or warnings, and\
    \ works perfectly well in production. Is that good code?\n\n```\nfunc f1(aaa:\
    \ Int) -> Int {\nvar bbb: Int? = aaa\nbbb = bbb! + 1\nreturn bbb!\n}\n```\n\n\
    What is this code about? If you know Swift, you’ll figure out that it’s a simple\
    \ increment function. But it looks ugly… so we can say that this is bad code.\
    \ Programming is beautiful!\n\n```\nfunc inc(i: Int) -> Int {\ni + 1\n}\n```\n\
    \nLooking at the second code snippet, a programmer (including yourself) will tell\
    \ what it is instantly. And that it will work faster and consume less memory as\
    \ well. Swift may optimize the first function to work without temporary variables,\
    \ but it will remain a bad code nonetheless.\n\nGood code must:\n\n- Do the work\
    \ it’s supposed to do for all types of arguments. If arguments are not valid for\
    \ the function, it must be handled correctly.\n- Never cause crashes or other\
    \ critical situations. If the code can’t work, it must throw an exception or return\
    \ `nil`.\n- Use as little code as necessary to do its function. Use language constructs\
    \ only when they make sense.\n- Have names of functions, types, and variables\
    \ explaining their purpose. Must be readable and understandable by other developers\
    \ and by yourself if you look at it a year later.\n- Use the minimum required\
    \ system resources: calculation power, memory, disk space, and network.\n- Be\
    \ testable. Each function should do one task, and it must be covered with tests.\n\
    \nAs you can see, even though the first code snippet works, it’s not readable,\
    \ it’s not optimal, it uses an unnecessary optional variable… For such a small\
    \ function, it may not be critical, but if the function was at least 15–20 lines\
    \ long, it would end up being nonunderstandable code, and you would end up rewriting\
    \ it instead of reusing it when you need it in the future.\n\nWell-written code\
    \ doesn’t require many comments. Sometimes, comments are necessary, but the code\
    \ should be as self-explanatory as possible. If the code is understandable for\
    \ other programmers without comments, it’s probably well-written code.\n\nWhat\
    \ we called good code here is often called clean code. There are more principles\
    \ that make your code even better (and often have funny names):\n\n- DRY (Don’t\
    \ Repeat Yourself). Each function is written once and called from different parts\
    \ of the code. If the code is not DRY, it’s WET (Write Every Time, We Enjoy Typing,\
    \ Waste Everyone’s Time).\n- Two or more, use a for. This rule means that you\
    \ shouldn’t write the same line of code twice, giving preference to a loop.\n\
    - SoC (Separation of Concerns). This design principle offers to do only one task\
    \ in each code fragment (function, method, or even class).\n\nThe recipes offered\
    \ in the following chapters strictly follow these principles."
