  raw: '#### Final Code


    In Recipe [7-7](#515103_1_En_7_Chapter.xhtml#PC22), we simply have a `UIView`
    with background color. If you need a more complex structure , you’ll have to duplicate
    it manually. There’s no guaranteed way of copying a view structure in `UIKit`.


    ```

    class HeroViewController: UIViewController {

    @IBOutlet weak var sourceView: UIView!

    @IBOutlet weak var targetView: UIView!

    @IBAction func animateHero() {

    let destinationView = UIView(frame: targetView.frame)

    destinationView.backgroundColor = sourceView.backgroundColor

    view.addSubview(destinationView)

    let sourceCenter = view.convert(sourceView.center, to: nil)

    let destinationCenter = view.convert(destinationView.center, to: nil)

    let scaleX = sourceView.frame.width / destinationView.frame.width

    let scaleY = sourceView.frame.height / destinationView.frame.height

    destinationView.transform = CGAffineTransform(scaleX: scaleX, y: scaleY)

    destinationView.center = sourceCenter

    UIView.animate(withDuration: 1.0) {

    destinationView.transform = CGAffineTransform.identity

    destinationView.center = destinationCenter

    }

    }

    }

    Recipe 7-7

    Hero Animation

    ```


    Also, we use another `UIView` – `targetView`. It’s an invisible instance of `UIView`,
    allowing us to set the geometry of destination in a storyboard.


    ### Hero Flying to a New UIViewController


    The difference between animation within the same `UIViewController` and two different
    `UIViewControllers` is that we can’t use destination `UIView` from a storyboard.


    The algorithm will be a little different:


    *   Run a segue or push destination UIViewController. Hide destination UIView
    on start.


    *   Create a transition UIView matching destination UIView.


    *   Calculate source and destination positions and scales.


    *   Add transition UIView to UIWindow and apply the source transformation.


    *   Hide source UIView.


    *   Apply animation of transition UIView’s transformation. Transition between
    screens; the animation of UIView should be synchronous.


    *   When the animation ends, hide the transition UIView and show the destination
    UIView.


    *   Show the source `UIView` to make it visible when the user goes back.


    Looks rather complicated, but it looks clearer in code. (Please find the currentWindow
    extension function in Recipe 4-3 or use the full version of Recipe [7-8](#515103_1_En_7_Chapter.xhtml#PC23)
    on GitHub.


    ```

    // In projects without scenes get window using this code instead: (UIApplication.shared.delegate
    as? AppDelegate)?.window

    class Hero1ViewController: ViewController {

    @IBOutlet weak var sourceView: UIView!

    @IBAction func animateHero() {

    performSegue(withIdentifier: "Hero", sender: nil)

    }

    override func prepare(for segue: UIStoryboardSegue, sender: Any?) {

    if let destinationVC = segue.destination as? Hero2ViewController {

    guard let window = UIApplication.shared.currentWindow else {

    return

    }

    destinationVC.loadViewIfNeeded()

    destinationVC.view.layoutSubviews()

    let heroView = UIView(frame: destinationVC.destinationView.frame)

    heroView.backgroundColor = self.sourceView.backgroundColor

    destinationVC.destinationView.backgroundColor = self.sourceView.backgroundColor

    window.addSubview(heroView)

    self.sourceView.isHidden = true

    let sourceCenter = window.convert(self.sourceView.center, to: nil)

    var destinationCenter = window.convert(destinationVC.destinationView.center, to:
    nil)

    destinationCenter.y += self.view.safeAreaInsets.top

    let scaleX = self.sourceView.frame.width / heroView.frame.width

    let scaleY = self.sourceView.frame.height / heroView.frame.height

    heroView.transform = CGAffineTransform(scaleX: scaleX, y: scaleY)

    heroView.center = sourceCenter

    destinationVC.destinationView.isHidden = true

    UIView.animate(withDuration: 1.0) {

    heroView.transform = CGAffineTransform.identity

    heroView.center = destinationCenter

    } completion: { _ in

    destinationVC.destinationView.isHidden = false

    self.sourceView.isHidden = false

    heroView.removeFromSuperview()

    }

    }

    }

    }

    class Hero2ViewController: ViewController {

    @IBOutlet weak var destinationView: UIView!

    }

    Recipe 7-8

    Hero Animation Between Screens

    ```


    #### Getting and Using UIWindow


    In this recipe, we assume that the project uses Scenes. `currentWindow` computed
    property is defined in Recipe 4-3\. If you don’t use Scenes in your project, use
    Recipe 4-4 instead.


    It may sound strange, but `UIWindow` is a subclass of `UIView`. That means we
    can use any `UIView` method on `UIWindow`. This includes `addSubview` and converse.


    #### Details


    Several more explanations to make it clear.


    When destination `UIViewController` is created, view is not loaded. We need to
    do it manually:


    ```

    destinationVC.loadViewIfNeeded()

    ```


    We also need to layout views manually. Otherwise, they’ll be in the same positions
    as in your storyboard editor. And it’s not always the same after calculation.
    They match only when the device is the same as in your storyboard settings.


    ```

    destinationVC.view.layoutSubviews

    ```


    Another detail is that at the moment of calculation, the screen doesn’t have any
    bars on top of the screen because the screen is not visible yet. So, the “y” coordinate
    of your destination `UIView` will be calculated incorrectly. Assuming that the
    top insets are the same on both screens, we make the following correction:


    ```

    destinationCenter.y += self.view.safeAreaInsets.top

    ```


    The rest of the code is basically the same as in the previous section with minor
    adjustments.


    ## Transition Between Screens


    By default, there are two types of animation:


    *   Appearing from right to left inside `UINavigationController`


    *   Appearing from bottom to top when you present a modal `UIViewController`


    You can change animation in the “storyboard editor” or in code, but there’s very
    limited choice. Luckily, iOS allows us to create a custom transition animation.


    ### Standard Transitions


    Depending on navigation type, there are two cases :


    *   If it happens inside UINavigationController, there is only one animation.
    The second screen covers the first one from the right side (or left side for right-to-left
    languages).


    *   When you present new `UIViewController` modally, there are several default
    options. We can choose the animation type in storyboard or in code before presenting.


    If you use storyboards and segues, you need to choose the type of segue (*Show*
    for pushing and *Present Modally* for... presenting modally). Others are also
    used, but less often, and they have less customization options, so we’ll set them
    aside for now.


    The most interesting, from a transition point of view, is modal presentation.
    If you choose this type, you’ll have two additional options:


    *   Presentation defines how the result looks. By default, it covers about 90%
    of the screen, leaving a piece of the previous screen on top.


    *   Transition defines the effect.


    These options are accessible from code as shown in Recipe [7-9](#515103_1_En_7_Chapter.xhtml#PC27).
    You can instantiate the view controller from code or override parameters from
    segue.


    ```

    extension UIViewController {

    func openViewControllerDefinedWithStyle(destinationViewController: UIViewController)
    {

    destinationViewController.modalPresentationStyle = .fullScreen

    destinationViewController.modalTransitionStyle = .crossDissolve

    }

    }

    Recipe 7-9

    Changing Presentation and Transition

