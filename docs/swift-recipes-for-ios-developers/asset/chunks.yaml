- fmt: '### Shadows


    阴影（图 [4-9](#515103_1_En_4_Chapter.xhtml#Fig9)）是一种更复杂的效果，不是因为实现困难，而是因为当布局发生变化时必须更新它。当
    iPhone 或 iPad 改变方向，或者屏幕上元素出现或消失时，阴影应该重新渲染。为 `UIView` 添加阴影的扩展如食谱 [4-24](#515103_1_En_4_Chapter.xhtml#PC41)
    所示：


    ```swift

    public extension UIView {

    @IBInspectable var dropShadow: Bool {

    set {

    layer.shadowOffset = CGSize(width: 0, height: 0)

    if newValue {

    updateShadow()

    } else {

    layer.shadowColor = UIColor.clear.cgColor

    layer.shadowOpacity = 0.0

    layer.shadowRadius = 0

    layer.shadowPath = nil

    layer.shouldRasterize = false

    }

    }

    get {

    layer.shadowOpacity > 0.0 && layer.shadowRadius > 0

    }

    }

    func updateShadow() {

    layer.shadowColor = UIColor.black.cgColor

    layer.shadowOpacity = 0.5

    layer.shadowRadius = 4

    layer.shadowPath = UIBezierPath(roundedRect: bounds, cornerRadius: layer.cornerRadius).cgPath

    layer.shouldRasterize = true

    layer.rasterizationScale = UIScreen.main.scale

    }

    func updateShadows() {

    if self.dropShadow {

    self.updateShadow()

    }

    subviews.forEach {

    $0.updateShadows()

    }

    }

    }

    ```


    > 注：颜色、半径和阴影透明度在此食谱中已硬编码。这通常是最佳解决方案，因为这些参数在整个应用中保持一致。如果需要使其动态化，可以将它们添加为其他可检查属性，并且每个属性应在设置时触发
    `updateShadow` 函数。


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig9_HTML.png)


    设置带有阴影、边框等效果的用户界面视图的屏幕截图：左侧显示了一个 iPhone 轮廓，轮廓内部粘贴了两个方框；右侧图像显示了一个带有选项的窗口。


    **图 4-9** 使用阴影、边框和其他效果设置 `UIView`


    此扩展提供了一个可检查属性和两个方法。`dropShadow` 属性用于添加或移除阴影。`updateShadow` 方法使用实际的 `UIView` 大小创建阴影。为了方便起见，还有另一个方法——`updateShadows`。它更新
    `UIView` 及其所有子视图中的阴影。每次布局更改时都应调用此方法。调用它的好位置是 `UIViewController` 的生命周期方法 `viewDidLayoutSubviews`。


    ```swift

    override func viewDidLayoutSubviews() {

    super.viewDidLayoutSubviews()

    view.updateShadows()

    }

    ```


    如果你的 UI 需要不同的阴影配置，可以将所有属性暴露给故事板编辑器。食谱 [4-25](#515103_1_En_4_Chapter.xhtml#PC43)
    展示了具体做法。


    ```swift

    @IBDesignable

    class ShadowView: UIView {

    @IBInspectable var shadowOffset: CGSize {

    get {

    layer.shadowOffset

    }

    set {

    layer.shadowOffset = newValue

    }

    }

    @IBInspectable var shadowColor: UIColor? {

    get {

    if let sc = layer.shadowColor {

    return UIColor(cgColor: sc)

    } else {

    return nil

    }

    }

    set {

    layer.shadowColor = newValue?.cgColor

    }

    }

    @IBInspectable var shadowRadius: CGFloat {

    get {

    layer.shadowRadius

    }

    set {

    layer.shadowRadius = newValue

    }

    }

    @IBInspectable var shadowOpacity: Float {

    get {

    layer.shadowOpacity

    }

    set {

    layer.shadowOpacity = newValue

    }

    }

    override init(frame: CGRect) {

    super.init(frame: frame)

    }

    required init?(coder: NSCoder) {

    super.init(coder: coder)

    }

    }

    ```


    这是一个单独的类。如果在同一项目中同时使用了这两种方法，则不应在此 `ShadowView` 实例中设置 `dropShadow` 属性。相反，应根据所需结果单独配置所有参数。


    ### UITextField 内边距


    故事板编辑器中另一个缺失的功能是向 `UITextField` 元素添加内边距。内边距可用于不同目的，从改善视觉外观到在 `UITextField` 两侧添加图标和按钮。同时，我们通常希望保持此区域处于激活状态。当用户点击它时，我们希望键盘弹出。食谱
    [4-26](#515103_1_En_4_Chapter.xhtml#PC44) 展示了如何实现。


    ```swift

    @IBDesignable

    class TextFieldWithPadding: UITextField {

    @IBInspectable var paddingLeft: CGFloat = 0.0

    @IBInspectable var paddingRight: CGFloat = 0.0

    var padding: UIEdgeInsets {

    UIEdgeInsets(top: 0, left: paddingLeft, bottom: 0, right: paddingRight)

    }

    required init?(coder aDecoder: NSCoder) {

    super.init(coder: aDecoder)

    }

    override func textRect(forBounds bounds: CGRect) -> CGRect {

    bounds.inset(by: padding)

    }

    override func placeholderRect(forBounds bounds: CGRect) -> CGRect {

    bounds.inset(by: padding)

    }

    override func editingRect(forBounds bounds: CGRect) -> CGRect {

    bounds.inset(by: padding)

    }

    }

    ```


    `TextFieldWithPadding` 类提供了两个额外属性：


    - `paddingLeft`

    - `paddingRight`


    不幸的是，它必须是一个新类，而不仅仅是 `UITextField` 的扩展，因为我们需要重写 `textRect`、`placeholderRect` 和
    `editingRect` 方法。


    要使用它，只需在故事板编辑器中添加 `UITextField`，将类更改为 `TextFieldWithPadding`，然后设置 `leftPadding`
    和 `rightPadding`。


    ### UITextView 占位符


    与具有原生占位符的 `UITextField` 不同，`UITextView` 不提供类似功能。这相当奇怪，尤其是考虑到 `UITextView` 只是 `UITextField`
    的多行版本，可能还带有一些额外功能。


    令人惊讶的是，这个问题也可以通过扩展来解决。但这次，它已经存在了，我们无需重新发明。该库名为 `UITextView+Placeholder`，使用 Objective-C
    编写。


    与 `UITextField` 一样，`UITextView` 可能也需要内边距。食谱 [4-27](#515103_1_En_4_Chapter.xhtml#PC45)
    提供了一个类似的扩展来为 `UITextView` 添加内边距。


    ```swift

    @IBDesignable

    class TextViewWithPadding: UITextView {

    @IBInspectable var paddingLeft: CGFloat = 0.0 {

    didSet {

    updateInsets()

    }

    }

    @IBInspectable var paddingRight: CGFloat = 0.0 {

    didSet {

    updateInsets()

    }

    }

    @IBInspectable var paddingTop: CGFloat = 0.0 {

    didSet {

    updateInsets()

    }

    }

    @IBInspectable var paddingBottom: CGFloat = 0.0 {

    didSet {

    updateInsets()

    }

    }

    required init?(coder aDecoder: NSCoder) {

    super.init(coder: aDecoder)

    updateInsets()

    }

    func updateInsets() {

    textContainerInset = UIEdgeInsets(top: paddingTop, left: paddingLeft, bottom:
    paddingBottom, right: paddingRight)

    }

    }

    ```


    你可以像使用 `TextFieldWithPadding` 一样使用 `TextViewWithPadding`。'
  raw: '### Shadows


    Shadow (Figure [4-9](#515103_1_En_4_Chapter.xhtml#Fig9)) is a more complex effect,
    but not because it’s hard to implement, but because it must be updated when the
    layout changes. When iPhone or iPad changes orientation or when elements appear
    or disappear on a screen, shadow should be re-rendered. Extension adding a shadow
    to UIView is shown in Recipe [4-24](#515103_1_En_4_Chapter.xhtml#PC41):


    ```

    public extension UIView {

    @IBInspectable var dropShadow: Bool {

    set {

    layer.shadowOffset = CGSize(width: 0, height: 0)

    if newValue {

    updateShadow()

    } else {

    layer.shadowColor = UIColor.clear.cgColor

    layer.shadowOpacity = 0.0

    layer.shadowRadius = 0

    layer.shadowPath = nil

    layer.shouldRasterize = false

    }

    }

    get {

    layer.shadowOpacity > 0.0 && layer.shadowRadius > 0

    }

    }

    func updateShadow() {

    layer.shadowColor = UIColor.black.cgColor

    layer.shadowOpacity = 0.5

    layer.shadowRadius = 4

    layer.shadowPath = UIBezierPath(roundedRect: bounds, cornerRadius: layer.cornerRadius).cgPath

    layer.shouldRasterize = true

    layer.rasterizationScale = UIScreen.main.scale

    }

    func updateShadows() {

    if self.dropShadow {

    self.updateShadow()

    }

    subviews.forEach {

    $0.updateShadows()

    }

    }

    }

    Recipe 4-24

    Shadows

    ```


    Note


    Color, radius, and shadow opacity are hard-coded in this recipe. This is usually
    the best solution because these parameters are consistent throughout the app.
    If you need to make them dynamic, they can be added as other inspectable properties,
    and each of them should trigger an updateShadow function when set.


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig9_HTML.png)


    A screenshot of setting up the user interface view with effects like shadow, border,
    and others has an outline of an iPhone with two boxes pasted inside the border
    on the left. The right image has a window with options.


    Figure 4-9


    Setting up UIView with shadow, border, and other effects


    This extension offers one inspectable property and two methods. The `dropShadow`
    property adds or removes shadow. The `updateShadow` method creates the shadow
    using the actual `UIView` size. For more comfort, there’s another method – `updateShadows`.
    It updates shadows in `UIView` and all of its children. You should call it every
    time the layout changes. A good place for it is the `viewDidLayoutSubviews` life
    cycle method of `UIViewController`.


    ```

    override func viewDidLayoutSubviews() {

    super.viewDidLayoutSubviews()

    view.updateShadows()

    }

    ```


    If your UI requires a different configuration of shadows, you can expose all the
    properties to the storyboard editor. Recipe [4-25](#515103_1_En_4_Chapter.xhtml#PC43)
    shows how it’s done.


    ```

    @IBDesignable

    class ShadowView: UIView {

    @IBInspectable var shadowOffset: CGSize {

    get {

    layer.shadowOffset

    }

    set {

    layer.shadowOffset = newValue

    }

    }

    @IBInspectable var shadowColor: UIColor? {

    get {

    if let sc = layer.shadowColor {

    return UIColor(cgColor: sc)

    } else {

    return nil

    }

    }

    set {

    layer.shadowColor = newValue?.cgColor

    }

    }

    @IBInspectable var shadowRadius: CGFloat {

    get {

    layer.shadowRadius

    }

    set {

    layer.shadowRadius = newValue

    }

    }

    @IBInspectable var shadowOpacity: Float {

    get {

    layer.shadowOpacity

    }

    set {

    layer.shadowOpacity = newValue

    }

    }

    override init(frame: CGRect) {

    super.init(frame: frame)

    }

    required init?(coder: NSCoder) {

    super.init(coder: coder)

    }

    }

    Recipe 4-25

    Shadows with Properties

    ```


    It’s a separate class, and if you use both methods in the same project, you shouldn’t
    set the `dropShadow` property in this `ShadowView` instance. Instead configure
    all the parameters individually for the desired result.


    ### UITextField Paddings


    One more missing feature of the storyboard editor is adding padding to `UITextField`
    elements. Padding may be used for different purposes, starting with better visual
    appearance and ending with icons and buttons on the sides of the `UITextField`.
    At the same time, we often want to keep this space active. When the user taps
    on it, we want the keyboard to open. Recipe [4-26](#515103_1_En_4_Chapter.xhtml#PC44)
    shows how to do it.


    ```

    @IBDesignable

    class TextFieldWithPadding: UITextField {

    @IBInspectable var paddingLeft: CGFloat = 0.0

    @IBInspectable var paddingRight: CGFloat = 0.0

    var padding: UIEdgeInsets {

    UIEdgeInsets(top: 0, left: paddingLeft, bottom: 0, right: paddingRight)

    }

    required init?(coder aDecoder: NSCoder) {

    super.init(coder: aDecoder)

    }

    override func textRect(forBounds bounds: CGRect) -> CGRect {

    bounds.inset(by: padding)

    }

    override func placeholderRect(forBounds bounds: CGRect) -> CGRect {

    bounds.inset(by: padding)

    }

    override func editingRect(forBounds bounds: CGRect) -> CGRect {

    bounds.inset(by: padding)

    }

    }

    Recipe 4-26

    UITextField padding

    ```


    The class `TextFieldWithPadding` offers two extra properties:


    *   `paddingLeft`


    *   `paddingRight`


    Unfortunately, it has to be a new class, not just an `UITextField` extension,
    because we need to override the `textRect`, `placeholderRect` and `editingRect`
    methods.


    To use it, simply add `UITextField` in the storyboard editor, change the class
    to `TextFieldWithPadding` and set `leftPadding` and `rightPadding`.


    ### UITextView placeholder


    Unlike `UITextField`, which has a native placeholder, `UITextView` doesn’t offer
    anything like it. It’s rather strange, especially assuming that `UITextView` is
    just a multiline version of `UITextField`. Maybe with some extra features.


    Surprisingly, it can be also solved with an extension. But this time, it already
    exists, we don’t need to re-invent it. The library is called UITextView+Placeholder
    and it’s written in Objective-C.


    Like `UITextField`, `UITextView` may also need padding. Recipe [4-27](#515103_1_En_4_Chapter.xhtml#PC45)
    offers a similar extension to add padding to `UITextView` as well.


    ```

    @IBDesignable

    class TextViewWithPadding: UITextView {

    @IBInspectable var paddingLeft: CGFloat = 0.0 {

    didSet {

    updateInsets()

    }

    }

    @IBInspectable var paddingRight: CGFloat = 0.0 {

    didSet {

    updateInsets()

    }

    }

    @IBInspectable var paddingTop: CGFloat = 0.0 {

    didSet {

    updateInsets()

    }

    }

    @IBInspectable var paddingBottom: CGFloat = 0.0 {

    didSet {

    updateInsets()

    }

    }

    required init?(coder aDecoder: NSCoder) {

    super.init(coder: aDecoder)

    updateInsets()

    }

    func updateInsets() {

    textContainerInset = UIEdgeInsets(top: paddingTop, left: paddingLeft, bottom:
    paddingBottom, right: paddingRight)

    }

    }

    Recipe 4-27

    UITextView padding

    ```


    You can use TextViewWithPadding the same way as TextFieldWithPadding.'
