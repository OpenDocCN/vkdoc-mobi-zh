    \ viewController)\n        return window != nil\n    }\n}\n配方 4-5\n替换根视图控制器（静态方法）\n\
    ```\n\n函数 `replaceMainRootViewController` 会替换主窗口中的根视图控制器（如果存在）。如果窗口不存在或函数无法找到它，则返回\
    \ false，否则返回 true。\n\n### 修改 UINavigationController 栈\n\n假设你有一个很长的屏幕序列，用户在其中进行选择。例如，用户正在参加一个测试。他们可以提交问题或跳过问题。如果提交了问题，该问题就会永久消失；否则，它会保留在栈中，以便用户以后回来回答。\n\
    \n再看另一个例子。用户正在订购家具。他们选择配置、颜色以及所有细节。最后，用户完成支付，从这一刻起，我们不想让他们再返回去修改购买配置。我们想显示订单跟踪。但我们也不想清除整个栈——当用户点击返回按钮时，他们应该回到之前使用过的应用部分，而订购流程应该消失，直到他们再次下单。\n\
    \n还有一种情况——添加一个新屏幕。例如，我们可能想警告用户，如果返回，他们的订单将被取消。我们不想让用户卡在某个屏幕上，否则他们只会“杀掉”应用。但我们需要提醒他们订购流程尚未完成，他们应该在返回前完成它。这可以通过弹窗实现，但设计师可能有其他意见。\n\
    \n我们将研究以下情况：\n\n- 从栈中移除不必要的 `UIViewController`\n- 将用户返回到栈中的特定 `UIViewController`\n\
    - 向栈中添加 `UIViewController`\n\n正如我们之前讨论过的，当 `UIViewController` 是导航栈的一部分时，它具有非空的\
    \ `navigationController` 属性。这个 `navigationController` 有一个非常重要的属性——`viewController`。该属性包含导航栈——一个以根元素开头的\
    \ `UIViewController` 对象列表。\n\n**注意**\n\n当你从 `UIViewController` 中访问 `navigationController?.viewControllers`\
    \ 时，结果始终包含 `self`。\n\n#### 从导航栈中移除元素\n\n假设用户完成了一个流程，我们不希望他们返回该流程，但允许他们返回到该流程之前的视图控制器。由于栈中不必要的元素始终是我们应用的一部分且是已知的，我们了解这些元素的类名。配方\
    \ 4-6 展示了如何使用 `filter` 方法从导航栈中移除不必要的元素。\n\n```\npublic extension UINavigationController\
    \ {\n    func removeElements<T>(of type: T.Type) {\n        viewControllers =\
    \ viewControllers.filter {\n            !($0 is T)\n        }\n    }\n}\n配方 4-6\n\
    从导航栈中移除已知类型的元素\n```\n\n*用法*\n\n```\nnavigationController?.removeElements(of: UnnecessaryViewController.self)\n\
    ```\n\n我建议你不要通过这种方式移除当前的前台视图控制器。如果你需要移除它，请改用 `navigationController?.popViewController(animated:)`\
    \ 或本章开头部分的 `goBack` 函数。此外，最好在前台视图控制器完全呈现在屏幕上时修改栈。这应该在 `viewDidAppear(animated:)`\
    \ 函数中或之后进行。\n"
- fmt: "### Returning the User to a Specific View Controller\n\nImagine that you’re\
    \ starting a new game, and the first thing you need to do is to create your own\
    \ character. You choose their body, their face, color of their hair, the shape\
    \ of their nose, and... you end up not liking it at all! You can go back to the\
    \ previous step or start over. This “start over” function is an example of navigation\
    \ to a specific view controller.\n\nLike in the previous recipe, we’ll identify\
    \ the view controller by its class, and as a matter of fact, it should be a subclass\
    \ of `UIViewController`. All view controllers between a chosen one and a front\
    \ one should be removed from the stack as shown in Recipe [4-7](#515103_1_En_4_Chapter.xhtml#PC11).\n\
    \n```\npublic extension UINavigationController {\n    func returnToElement<T:\
    \ UIViewController>(of type: T.Type, animated: Bool) -> Bool {\n        guard\
    \ let lastIndex = viewControllers.lastIndex(where: { $0 is T }) else {\n     \
    \       return false\n        }\n        if viewControllers[lastIndex] == viewControllers.last\
    \ {\n            return false\n        }\n        viewControllers.removeSubrange(lastIndex.advanced(by:\
    \ 1)..<viewControllers.endIndex.advanced(by: -1))\n        popViewController(animated:\
    \ animated)\n        return true\n    }\n}\n```\n\n**Recipe 4-7** Returning the\
    \ User to a Specific View Controller\n\n*Usage*\n\n```\nnavigationController?.returnToElement(of:\
    \ StartViewController.self, animated: true)\n```\n\nIf you want to return to the\
    \ beginning of a stack, you can use a standard method:\n\n```\nnavigationController?.popToRootViewController(animated:\
    \ true)\n```\n\n### Popups and Dialogs\n\nPopup windows with information or questions\
    \ are very common for user interfaces (Figures [4-2](#515103_1_En_4_Chapter.xhtml#Fig2),\
    \ [4-3](#515103_1_En_4_Chapter.xhtml#Fig3) and [4-4](#515103_1_En_4_Chapter.xhtml#Fig4)).\
    \ iOS offers us `UIAlertController` to show a popup, but it takes three lines\
    \ of code to show a simple message. For something more complex, we need to write\
    \ more code. When we have multiple branches of code verifying data and showing\
    \ error messages, creating and setting up `UIAlertController` in each of them\
    \ is not DRY.\n\n#### Showing Alerts, Errors, and Warnings\n\nApart from shorter\
    \ and cleaner code, these functions are useful if you want to use custom styles\
    \ in the future. Instead of replacing standard popups in the whole project, you’ll\
    \ have them all in one place. Recipe [4-8](#515103_1_En_4_Chapter.xhtml#PC14)\
    \ shows simple extensions of `UIViewController` showing alert dialog.\n\n![A screenshot\
    \ of an error dialog box has the window with the title 'Error' in bold letters\
    \ followed by the text and 'OK' button at the bottom.](images/515103_1_En_4_Chapter/515103_1_En_4_Fig2_HTML.jpg)\n\
    \n**Figure 4-2** Error dialog\n\n```\npublic extension UIViewController {\n  \
    \  func show(error: String) {\n        let alert = UIAlertController(title: \"\
    Error\", message: error, preferredStyle: .alert)\n        alert.addAction(UIAlertAction(title:\
    \ \"OK\", style: .cancel, handler: nil))\n        present(alert, animated: true,\
    \ completion: nil)\n    }\n    func show(warning: String) {\n        let alert\
    \ = UIAlertController(title: \"Warning\", message: warning, preferredStyle: .alert)\n\
    \        alert.addAction(UIAlertAction(title: \"OK\", style: .cancel, handler:\
    \ nil))\n        present(alert, animated: true, completion: nil)\n    }\n}\n```\n\
    \n**Recipe 4-8** Showing Simple Popups\n\nThese popups are written as a `UIViewController`\
    \ extension. It’s the most common place to call them. They don’t give any feedback,\
    \ just show a popup. If your app is localized to more than one language, you can\
    \ change hard-coded strings like `\"Error\"` or `\"OK\"` with localized versions.\n\
    \nIf you’re inside `UIViewController`, you can call them this way:\n\n```\nlet\
    \ error: Error // Error from API call\nself.show(error: error.localizedDescription)\n\
    ```\n\nDon’t forget that you must be in the main thread. If you’re not sure, modify\
    \ these functions to make sure you’re always in the main thread.\n\n#### Asking\
    \ General Questions\n\nA general question (also known as a polar question) is\
    \ a question with two possible answers – positive or negative. Usually, it’s `\"\
    yes\"` or `\"no\"`. “Are you sure you want to quit?” “Overwrite this file?” “Couldn’t\
    \ connect. Would you like to reenter the password?” ... Sounds familiar? They’re\
    \ all popups with general questions. Recipe [4-9](#515103_1_En_4_Chapter.xhtml#PC16)\
    \ shows how to make a function asking such a question and called with a single\
    \ line of code.\n\n![A screenshot of a confirmation dialog window has a box with\
    \ the title 'Confirm' in bold letters followed by the text, \"would you like to\
    \ delete this photo?\". Two buttons of 'No' and 'Yes' are present at the bottom.](images/515103_1_En_4_Chapter/515103_1_En_4_Fig3_HTML.jpg)\n\
    \n**Figure 4-3** Confirm dialog\n\n```\npublic extension UIViewController {\n\
    \    func ask(title: String?, question: String?, positiveButtonTitle: String =\
    \ \"Yes\", negativeButtonTitle: String = \"No\", isDangerousAction: Bool = false,\
    \ delegate: @escaping (_ agreed: Bool) -> Void) {\n        let alert = UIAlertController(title:\
    \ title, message: question, preferredStyle: .alert)\n        alert.addAction(UIAlertAction(title:\
    \ positiveButtonTitle, style: isDangerousAction ? .destructive : .default) { (_)\
    \ in\n            delegate(true)\n        })\n        alert.addAction(UIAlertAction(title:\
    \ negativeButtonTitle, style: .cancel) { (_) in\n            delegate(false)\n\
    \        })\n        present(alert, animated: true, completion: nil)\n    }\n\
    }\n```\n\n**Recipe 4-9** General Question Popup\n\n#### Asking Questions with\
    \ a One-Line String Answer\n\nAnother typical popup is a dialog asking a simple\
    \ question with a text answer. For example, if you join a network, it can ask\
    \ for a password. It must always have two buttons – `\"OK\"` and `\"Cancel\"`.\
    \ Recipe [4-10](#515103_1_En_4_Chapter.xhtml#PC17) shows how to write such a dialog\
    \ as `UIViewController` extension.\n\n![A screenshot of a text entry dialog window\
    \ has a box with the title, 'Your name' in bold letters followed by the text,\
    \ \"Please enter your name\". A text box is present below the text with two buttons\
    \ of 'Cancel' and 'Ok' at the bottom.](images/515103_1_En_4_Chapter/515103_1_En_4_Fig4_HTML.jpg)\n\
    \n**Figure 4-4** Text entry dialog\n\n```\npublic extension UIViewController {\n\
    \    func ask(title: String?, question: String?, placeholder: String?, keyboardType:\
    \ UIKeyboardType = .default, delegate: @escaping (_ answer: String?) -> Void)\
    \ {\n        let alert = UIAlertController(title: title, message: question, preferredStyle:\
    \ .alert)\n        alert.addTextField { (textField) in\n            textField.placeholder\
    \ = placeholder\n            textField.keyboardType = keyboardType\n        }\n\
    \        alert.addAction(UIAlertAction(title: \"OK\", style: .default) { (_) in\n\
    \            let answer = alert.textFields?.first?.text\n            delegate(answer)\n\
    \        })\n        alert.addAction(UIAlertAction(title: \"Cancel\", style: .cancel)\
    \ { (_) in\n            delegate(nil)\n        })\n        present(alert, animated:\
    \ true, completion: nil)\n    }\n}\n```\n\n**Recipe 4-10** Simple Text Question\
    \ Popup\n\n#### Picking Date and Time\n\nIn Chapter [2](#515103_1_En_2_Chapter.xhtml),\
    \ we discussed the validation of user form and decided that the best solution\
    \ for dates is to show a date picker. We can show it in place of an on-screen\
    \ keyboard or show a popup.\n\nIs it possible to add `UIDatePicker` to `UIAlertView`?\
    \ Yes, but it’s not a good idea. The problem is that `UIAlertView` doesn’t have\
    \ a component stack; it can natively contain `UILabel` and `UITextField`. The\
    \ size of `UIAlertView` is calculated based on the size of these components. `UIView`\
    \ can have children, so you *can* add other `UIView` subclasses to it, but there’s\
    \ no guarantee it will fit well.\n\nRecipe [4-11](#515103_1_En_4_Chapter.xhtml#PC21)\
    \ shows how to create a completely custom popup and add it on top of your layout.\
    \ How to request this popup is shown in Recipe [4-12](#515103_1_En_4_Chapter.xhtml#PC22).\
    \ To create a layout using the Auto Layout feature, we’ll use the SnapKit framework\
    \ available on GitHub: [`https://github.com/SnapKit/SnapKit`](https://github.com/SnapKit/SnapKit)."
  raw: '#### Returning the User to a Specific View Controller


    Imagine that you’re starting a new game , and the first thing you need to do is
    to create your own character. You choose their body, their face, color of their
    hair, the shape of their nose, and... you end up not liking it at all! You can
    go back to the previous step or start over. This “start over” function is an example
    of navigation to a specific view controller.


    Like in the previous recipe, we’ll identify the view controller by its class,
    and as a matter of fact, it should be a subclass of `UIViewController` . All view
    controllers between a chosen one and a front one should be removed from the stack
    as shown in Recipe [4-7](#515103_1_En_4_Chapter.xhtml#PC11).


    ```

    public extension UINavigationController {

    func returnToElement(of type: T.Type, animated: Bool) -> Bool {

    guard let lastIndex = viewControllers.lastIndex(where: { $0 is T }) else {

    return false

    }

    if viewControllers[lastIndex] == viewControllers.last {

    return false

    }

    viewControllers.removeSubrange(lastIndex.advanced(by: 1)..<viewControllers.endIndex.advanced(by:
    -1))

    popViewController(animated: animated)

    return true

    }

    }

    Recipe 4-7

    Returning the User to a Specific View Controller

    ```


    *Usage*


    ```

    navigationController?.returnToElement(of: StartViewController.self, animated:
    true)

    ```


    If you want to return to the beginning of a stack, you can use a standard method
    :


    ```

    navigationController?.popToRootViewController(animated: true)

    ```


    ## Popups and Dialogs


    Popup windows with information or question are very common for user interface
    (Figures [4-2](#515103_1_En_4_Chapter.xhtml#Fig2), [4-3](#515103_1_En_4_Chapter.xhtml#Fig3)
    and [4-4](#515103_1_En_4_Chapter.xhtml#Fig4)). iOS offers us `UIAlertController`
    to show a popup, but it takes three lines of code to show a simple message. For
    something more complex, we need to write more code. When we have multiple branches
    of code verifying data and showing error messages, creating and setting up `UIAlertController`
    in each of them is not *DRY*.


    ### Showing Alerts, Errors, and Warnings


    Apart from shorter and cleaner code, these functions are useful if you want to
    use custom styles in the future. Instead of replacing standard popups in the whole
    project, you’ll have them all in one place. Recipe [4-8](#515103_1_En_4_Chapter.xhtml#PC14)
    shows simple extensions of `UIViewController` showing alert dialog.


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig2_HTML.jpg)


    A screenshot of an error dialog box has the window with the title ''Error'' in
    bold letters followed by the text and ''OK'' button at the bottom.


    Figure 4-2


    Error dialog


    ```

    public extension UIViewController {

    func show(error: String) {

    let alert = UIAlertController(title: "Error", message: error, preferredStyle:
    .alert)

    alert.addAction(UIAlertAction(title: "OK", style: .cancel, handler: nil))

    present(alert, animated: true, completion: nil)

    }

    func show(warning: String) {

    let alert = UIAlertController(title: "Warning", message: warning, preferredStyle:
    .alert)

    alert.addAction(UIAlertAction(title: "OK", style: .cancel, handler: nil))

    present(alert, animated: true, completion: nil)

    }

    }

    Recipe 4-8

    Showing Simple Popups

    ```


    These popups are written as a `UIViewController` extension. It’s the most common
    place to call them. They don’t give any feedback, just show a popup. If your app
    is localized to more than one language, you can change hard-coded strings like
    `"Error"` or `"OK"` with localized versions.


    If you’re inside `UIViewController`, you can call them this way:


    ```

    let error: Error // Error from API call

    self.show(error: error.localizedDescription)

    ```


    Don’t forget that you must be in the main thread. If you’re not sure, modify these
    functions to make sure you’re always in the main thread.


    ### Asking General Questions


    A general question (also known as a polar question) is a question with two possible
    answers `–` positive or negative. Usually, it’s `"yes"` or `"no"`. “Are you sure
    you want to quit?” “Overwrite this file?” “Couldn’t connect. Would you like to
    reenter the password?” ... Sounds familiar? They’re all popups with general questions.
    Recipe [4-9](#515103_1_En_4_Chapter.xhtml#PC16) shows how to make a function asking
    such a question and called with a single line of code.


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig3_HTML.jpg)


    A screenshot of a confirmation dialog window has a box with the title ''Confirm''
    in bold letters followed by the text, "would you like to delete this photo?".
    Two buttons of ''No'' and ''Yes'' are present at the bottom.


    Figure 4-3


    Confirm dialog


    ```

    public extension UIViewController {

    func ask(title: String?, question: String?, positiveButtonTitle: String = "Yes",
    negativeButtonTitle: String = "No", isDangerousAction: Bool = false, delegate:
    @escaping (_ agreed: Bool) -> Void) {

    let alert = UIAlertController(title: title, message: question, preferredStyle:
    .alert)

    alert.addAction(UIAlertAction(title: positiveButtonTitle, style: isDangerousAction
    ? .destructive : .default) { (_) in

    delegate(true)

    })

    alert.addAction(UIAlertAction(title: negativeButtonTitle, style: .cancel) { (_)
    in

    delegate(false)

    })

    present(alert, animated: true, completion: nil)

    }

    }

    Recipe 4-9

    General Question Popup

    ```


    ### Asking Questions with a One-Line String Answer


    Another typical popup is a dialog asking a simple question with a text answer.
    For example, if you join a network, it can ask for a password. It must always
    have two buttons – `"OK"` and `"Cancel"`. Recipe [4-10](#515103_1_En_4_Chapter.xhtml#PC17)
    shows how to write such a dialog as `UIViewController` extension.


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig4_HTML.jpg)


    A screenshot of a text entry dialog window has a box with the title, ''Your name''
    in bold letters followed by the text, "Please enter your name". A text box is
    present below the text with two buttons of ''Cancel'' and ''Ok'' at the bottom.


    Figure 4-4


    Text entry dialog


    ```

    public extension UIViewController {

    func ask(title: String?, question: String?, placeholder: String?, keyboardType:
    UIKeyboardType = .default, delegate: @escaping (_ answer: String?) -> Void) {

    let alert = UIAlertController(title: title, message: question, preferredStyle:
    .alert)

    alert.addTextField { (textField) in

    textField.placeholder = placeholder

    textField.keyboardType = keyboardType

    }

    alert.addAction(UIAlertAction(title: "OK", style: .default) { (_) in

    let answer = alert.textFields?.first?.text

    delegate(answer)

    })

    alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { (_) in

    delegate(nil)

    })

    present(alert, animated: true, completion: nil)

    }

    }

    Recipe 4-10

    Simple Text Question Popup

    ```


    ### Picking Date and Time


    In Chapter [2](#515103_1_En_2_Chapter.xhtml), we discussed the validation of user
    form and decided that the best solution for dates is to show a date picker. We
    can show it in place of an on-screen keyboard or show a popup.


    Is it possible to add `UIDatePicker` to `UIAlertView`? Yes, but it’s not a good
    idea. The problem is that `UIAlertView` doesn’t have a component stack; it can
    natively contain `UILabel` and `UITextField` . The size of `UIAlertView` is calculated
    based on the size of these components. `UIView` can have children, so you *can*
    add other `UIView` subclasses to it, but there’s no guarantee it will fit well.


    Recipe [4-11](#515103_1_En_4_Chapter.xhtml#PC21) shows how to create a completely
    custom popup and add it on top of your layout. How to request this popup is shown
    in Recipe [4-12](#515103_1_En_4_Chapter.xhtml#PC22). To create a layout using
    the Auto Layout feature, we’ll use the SnapKit framework available on GitHub:
    [`https://github.com/SnapKit/SnapKit`](https://github.com/SnapKit/SnapKit) .'
  trans: "\n### 将用户返回到特定的视图控制器\n\n假设您正在开始一个新游戏，第一件事就是创建自己的角色。您选择他们的身体、面部、发色、鼻子的形状……然后您发现自己完全不喜欢这个角色！您可以返回上一步，或者重新开始。这个“重新开始”功能就是导航到特定视图控制器的一个示例。\n\
    \n与上一节类似，我们将通过类来识别视图控制器，实际上，它应该是 `UIViewController` 的一个子类。从选定的视图控制器到最前面的视图控制器之间的所有视图控制器都应从堆栈中移除，如代码\
    \ 4-7 所示。\n\n```\npublic extension UINavigationController {\n    func returnToElement<T:\
    \ UIViewController>(of type: T.Type, animated: Bool) -> Bool {\n        guard\
    \ let lastIndex = viewControllers.lastIndex(where: { $0 is T }) else {\n     \
    \       return false\n        }\n        if viewControllers[lastIndex] == viewControllers.last\
    \ {\n            return false\n        }\n        viewControllers.removeSubrange(lastIndex.advanced(by:\
    \ 1)..<viewControllers.endIndex.advanced(by: -1))\n        popViewController(animated:\
    \ animated)\n        return true\n    }\n}\n```\n\n**代码 4-7** 将用户返回到特定的视图控制器\n\
    \n*用法*\n\n```\nnavigationController?.returnToElement(of: StartViewController.self,\
    \ animated: true)\n```\n\n如果您想返回到导航堆栈的起点，可以使用标准方法：\n\n```\nnavigationController?.popToRootViewController(animated:\
    \ true)\n```\n\n### 弹窗与对话框\n\n带有信息或问题的弹窗在用户界面中非常常见（图 4-2、4-3 和 4-4）。iOS 提供了 `UIAlertController`\
    \ 来显示弹窗，但显示一条简单的消息就需要三行代码。对于更复杂的情况，我们需要编写更多代码。当我们有多个代码分支需要验证数据并显示错误消息时，在每个分支中创建和设置\
    \ `UIAlertController` 就违背了 DRY 原则。\n\n#### 显示提示、错误和警告\n\n除了代码更短更清晰之外，如果您将来想使用自定义样式，这些函数也很有用。您无需在整个项目中替换标准弹窗，而是可以将它们集中在一个地方。代码\
    \ 4-8 展示了 `UIViewController` 显示警告对话框的简单扩展。\n\n![一个错误对话框的屏幕截图，窗口中包含粗体标题“错误”，其后是文本，底部有“确定”按钮。](img/515103_1_En_4_Fig2_HTML.jpg)\n\
    \n**图 4-2** 错误对话框\n\n```\npublic extension UIViewController {\n    func show(error:\
    \ String) {\n        let alert = UIAlertController(title: \"Error\", message:\
    \ error, preferredStyle: .alert)\n        alert.addAction(UIAlertAction(title:\
    \ \"OK\", style: .cancel, handler: nil))\n        present(alert, animated: true,\
    \ completion: nil)\n    }\n    func show(warning: String) {\n        let alert\
    \ = UIAlertController(title: \"Warning\", message: warning, preferredStyle: .alert)\n\
    \        alert.addAction(UIAlertAction(title: \"OK\", style: .cancel, handler:\
    \ nil))\n        present(alert, animated: true, completion: nil)\n    }\n}\n```\n\
    \n**代码 4-8** 显示简单弹窗\n\n这些弹窗被编写为 `UIViewController` 的扩展。这是调用它们最常见的地方。它们不提供任何反馈，只显示一个弹窗。如果您的应用已本地化为多种语言，您可以将\
    \ `\"Error\"` 或 `\"OK\"` 这样的硬编码字符串替换为本地化版本。\n\n如果您在 `UIViewController` 内部，可以这样调用它们：\n\
    \n```\nlet error: Error // 来自 API 调用的错误\nself.show(error: error.localizedDescription)\n\
    ```\n\n不要忘记，您必须在主线程中执行此操作。如果不确定，请修改这些函数以确保始终在主线程中执行。\n\n#### 询问一般性问题\n\n一般性问题（也称为极性问句）是一个带有两种可能答案（肯定或否定）的问题。通常是“是”或“否”。“您确定要退出吗？”“要覆盖此文件吗？”“无法连接。您要重新输入密码吗？”……听着耳熟吗？这些都是带有一般性问题的弹窗。代码\
    \ 4-9 展示了如何创建一个询问此类问题的函数，并且只需一行代码即可调用。\n\n![一个确认对话框的屏幕截图，窗口中包含粗体标题“确认”，其后是文本“您要删除这张照片吗？”。底部有“否”和“是”两个按钮。](img/515103_1_En_4_Fig3_HTML.jpg)\n\
    \n**图 4-3** 确认对话框\n\n```\npublic extension UIViewController {\n    func ask(title:\
    \ String?, question: String?, positiveButtonTitle: String = \"Yes\", negativeButtonTitle:\
    \ String = \"No\", isDangerousAction: Bool = false, delegate: @escaping (_ agreed:\
    \ Bool) -> Void) {\n        let alert = UIAlertController(title: title, message:\
    \ question, preferredStyle: .alert)\n        alert.addAction(UIAlertAction(title:\
    \ positiveButtonTitle, style: isDangerousAction ? .destructive : .default) { (_)\
    \ in\n            delegate(true)\n        })\n        alert.addAction(UIAlertAction(title:\
    \ negativeButtonTitle, style: .cancel) { (_) in\n            delegate(false)\n\
    \        })\n        present(alert, animated: true, completion: nil)\n    }\n\
    }\n```\n\n**代码 4-9** 一般性问题弹窗\n\n#### 询问单行字符串答案的问题\n\n另一种典型的弹窗是询问简单问题并要求文本答案的对话框。例如，当您加入网络时，可能会要求输入密码。它必须始终有两个按钮——“确定”和“取消”。代码\
    \ 4-10 展示了如何将此对话框编写为 `UIViewController` 扩展。\n\n![一个文本输入对话框的屏幕截图，窗口中包含粗体标题“您的姓名”，其后是文本“请输入您的姓名”。文本下方有一个文本框，底部有“取消”和“确定”两个按钮。](img/515103_1_En_4_Fig4_HTML.jpg)\n\
    \n**图 4-4** 文本输入对话框\n\n```\npublic extension UIViewController {\n    func ask(title:\
    \ String?, question: String?, placeholder: String?, keyboardType: UIKeyboardType\
    \ = .default, delegate: @escaping (_ answer: String?) -> Void) {\n        let\
    \ alert = UIAlertController(title: title, message: question, preferredStyle: .alert)\n\
    \        alert.addTextField { (textField) in\n            textField.placeholder\
    \ = placeholder\n            textField.keyboardType = keyboardType\n        }\n\
    \        alert.addAction(UIAlertAction(title: \"OK\", style: .default) { (_) in\n\
    \            let answer = alert.textFields?.first?.text\n            delegate(answer)\n\
    \        })\n        alert.addAction(UIAlertAction(title: \"Cancel\", style: .cancel)\
    \ { (_) in\n            delegate(nil)\n        })\n        present(alert, animated:\
    \ true, completion: nil)\n    }\n}\n```\n\n**代码 4-10** 简单文本问题弹窗\n\n#### 选择日期和时间\n\
    \n在第 2 章中，我们讨论了用户表单的验证，并决定日期的最佳解决方案是显示日期选择器。我们可以将其显示在屏幕键盘的位置，或者以弹窗形式显示。\n\n能否将\
    \ `UIDatePicker` 添加到 `UIAlertView` 中？可以，但这并不是一个好主意。问题在于 `UIAlertView` 没有组件堆栈；它原生只能包含\
    \ `UILabel` 和 `UITextField`。`UIAlertView` 的大小是根据这些组件的大小计算的。`UIView` 可以有子视图，因此您*可以*将其他\
    \ `UIView` 子类添加进去，但不能保证其适配良好。\n\n代码 4-11 展示了如何创建一个完全自定义的弹窗并将其添加到布局顶层。如何请求此弹窗如代码\
    \ 4-12 所示。要使用 Auto Layout 功能创建布局，我们将使用 GitHub 上可用的 SnapKit 框架：[`https://github.com/SnapKit/SnapKit`](https://github.com/SnapKit/SnapKit)。\n"
- fmt: '### What Is SnapKit?


    `SnapKit` is a popular and well-maintained library allowing you to create layouts
    programmatically, without storyboards or nibs, but also without manually adding
    every single constraint with a long line of code. Basically, this library just
    adds syntactic sugar to constraint-making code.


    For example, this code snippet from the official `SnapKit` website creates a green
    box and adds it to root view.


    ```

    import SnapKit

    class MyViewController: UIViewController {

    lazy var box = UIView()

    override func viewDidLoad() {

    super.viewDidLoad()

    self.view.addSubview(box)

    box.backgroundColor = .green

    box.snp.makeConstraints { (make) -> Void in

    make.width.height.equalTo(50)

    make.center.equalTo(self.view)

    }

    }

    }

    ```


    ### Date and Time Selector Popup


    To get a popup, we need an `UIView` with four children:


    *   Title label

    *   Date picker

    *   OK button

    *   Cancel button


    ```

    private var frameView: UIView!

    private var titleLabel: UILabel!

    private var datePicker: UIDatePicker!

    private var okButton: UIButton!

    private var cancelButton: UIButton!

    ```


    It should have a delegate returning a `Date` object or `nil`.


    ```

    var delegate: (_ date: Date?) -> Void = { _ in }

    ```


    The base class for our popup will be `UIView`. Keep in mind that it can be done
    differently. We’ll just show one example, but you can adjust it to your needs.


    ```

    import SnapKit

    public class DatePickerPopup: UIView {

    private var frameView: UIView!

    private var titleLabel: UILabel!

    private var datePicker: UIDatePicker!

    private var okButton: UIButton!

    private var cancelButton: UIButton!

    var delegate: (_ date: Date?) -> Void = { _ in }

    var title: String {

    get {

    titleLabel.text ?? ""

    }

    set {

    titleLabel.text = newValue

    }

    }

    override init(frame: CGRect) {

    super.init(frame: frame)

    commonInit()

    }

    required init?(coder: NSCoder) {

    super.init(coder: coder)

    commonInit()

    }

    func commonInit() {

    // Dark shade

    backgroundColor = UIColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 0.3)

    // Frame view

    frameView = UIView()

    frameView.layer.cornerRadius = 10

    frameView.layer.masksToBounds = true

    frameView.backgroundColor = .white

    addSubview(frameView)

    frameView.snp.makeConstraints { (make) in

    make.center.equalTo(self)

    }

    // Title label

    titleLabel = UILabel()

    titleLabel.font = UIFont.systemFont(ofSize: 16, weight: .bold)

    titleLabel.textColor = .black

    titleLabel.textAlignment = .center

    frameView.addSubview(titleLabel)

    titleLabel.snp.makeConstraints { (make) in

    make.top.equalToSuperview().offset(40)

    make.leading.equalToSuperview().offset(40)

    make.trailing.equalToSuperview().offset(-40)

    }

    // Date picker

    datePicker = UIDatePicker()

    datePicker.preferredDatePickerStyle = .wheels

    datePicker.datePickerMode = .date

    datePicker.date = Date()

    frameView.addSubview(datePicker)

    datePicker.snp.makeConstraints { (make) in

    make.top.equalTo(titleLabel.snp.bottom).offset(20)

    make.leading.equalToSuperview().offset(20)

    make.trailing.equalToSuperview().offset(-20)

    }

    // Buttons

    cancelButton = UIButton()

    cancelButton.setTitle("Cancel", for: .normal)

    cancelButton.setTitleColor(UIColor(red: 0.0, green: 0.478431, blue: 1.0, alpha:
    1.0), for: .normal)

    cancelButton.addTarget(self, action: #selector(cancelPressed), for: .touchUpInside)

    okButton = UIButton()

    okButton.setTitle("OK", for: .normal)

    okButton.setTitleColor(UIColor(red: 0.0, green: 0.478431, blue: 1.0, alpha: 1.0),
    for: .normal)

    okButton.addTarget(self, action: #selector(okPressed), for: .touchUpInside)

    frameView.addSubview(cancelButton)

    frameView.addSubview(okButton)

    cancelButton.snp.makeConstraints { (make) in

    make.top.equalTo(datePicker.snp.bottom)

    make.left.equalToSuperview()

    make.height.equalTo(40)

    make.bottom.equalToSuperview().offset(-40)

    }

    okButton.snp.makeConstraints { (make) in

    make.top.equalTo(datePicker.snp.bottom)

    make.left.equalTo(cancelButton.snp.right)

    make.right.equalToSuperview()

    make.height.equalTo(40)

    make.width.equalTo(cancelButton.snp.width)

    }

    }

    @objc func cancelPressed() {

    disappearAndReturn(date: nil)

    }

    @objc func okPressed() {

    disappearAndReturn(date: datePicker.date)

    }

    private func disappearAndReturn(date: Date?) {

    UIView.animate(withDuration: 0.3) {

    self.alpha = 0.0

    } completion: { (_) in

    self.removeFromSuperview()

    self.delegate(date)

    }

    }

    static func createAndShow(in viewController: UIViewController, title: String,
    delegate: @escaping (_ date: Date?) -> Void) -> DatePickerPopup {

    let popup = DatePickerPopup(frame: viewController.view.bounds)

    popup.title = title

    popup.delegate = delegate

    popup.alpha = 0.0

    viewController.view.addSubview(popup)

    UIView.animate(withDuration: 0.3) {

    popup.alpha = 1.0

    }

    return popup

    }

    }

    Recipe 4-11

    Date Picker Popup

    ```


    The following extension allows to request this popup inside `UIViewController`
    shorter.


    ```

    public extension UIViewController {

    func askDate(title: String, delegate: @escaping (_ date: Date?) -> Void) {

    _ = DatePickerPopup.createAndShow(in: self, title: title, delegate: delegate)

    }

    }

    Recipe 4-12

    Asking Date from UIViewController

    ```


    Now, when you have this class, you can ask for a date with one line of code, plus
    another line to process the result:


    ```

    self.askDate(title: "Date of Birth") { (date) in

    print(date)

    }

    ```


    The result will be either a panel with rounded corners (Figure 4-5) in the center
    of the screen or a central section of the screen. It depends on the screen size
    of your iPhone.


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig5_HTML.png)


    A screenshot of a date selection dialog window has a box with the title as ''Date
    of birth'' in bold letters followed by the months, date, and year in three columns.
    Two buttons of ''Cancel'' and ''Ok'' at the bottom are also present.


    **Figure 4-5** Date selection dialog


    ### Date and Time Inside the Bottom Sheet


    Showing a popup may be not the best way of asking for date and/or time. Another
    way is showing it instead of an on-screen keyboard. If you have a sequence of
    `UITextFields`, it will be more comfortable for the user to see a date picker
    in the same place as the keyboard.


    This time, it can’t be an extension; it needs to be integrated in your `UIViewController`
    or other class, depending on your project architecture. Recipe 4-13 shows an example
    of `UIViewController` subclass showing date picker instead of keyboard.


    ```

    public class DateSelectorViewController: UIViewController {

    @IBOutlet weak var tfDOB: UITextField!

    @IBOutlet weak var tfNextField: UITextField!

    var selectedDOB: Date? = nil

    let datePicker = UIDatePicker(frame: CGRect(x: 0, y: 0, width: UIScreen.main.bounds.width,
    height: 216))

    override func viewDidLoad() {

    super.viewDidLoad()

    if #available(iOS 13.4, *) {

    datePicker.preferredDatePickerStyle = .wheels

    }

    datePicker.datePickerMode = .date

    tfDOB.inputView = datePicker

    addDoneButtonOnKeyboard()

    // ...

    }

    func addDoneButtonOnKeyboard() {

    let doneToolbar: UIToolbar = UIToolbar(frame: CGRect.init(x: 0, y: 0, width: UIScreen.main.bounds.width,
    height: 50))

    doneToolbar.barStyle = .default

    let flexSpace = UIBarButtonItem(barButtonSystemItem: .flexibleSpace, target: nil,
    action: nil)

    let done: UIBarButtonItem = UIBarButtonItem(title: "Done", style: .done, target:
    self, action: #selector(self.doneButtonAction))

    let items = [flexSpace, done]

    doneToolbar.items = items

    doneToolbar.sizeToFit()

    tfDOB.inputAccessoryView = doneToolbar

    }

    @objc func doneButtonAction() {

    tfDOB.text = df.string(from: datePicker.date)

    selectedDOB = datePicker.date

    tfNextField.becomeFirstResponder()

    }

    }

    Recipe 4-13

    Showing Date and Time Picker in a Bottom Sheet

    ```'
