    \ false\n    }\n}\n代码清单 6-14\n滚动以显示文本字段\n```\n\n这段代码还包含一个*回车*按钮的处理程序。当你点击*回车/下一步/提交*或其他按钮（该按钮通常位于右下角，名称取决于\
