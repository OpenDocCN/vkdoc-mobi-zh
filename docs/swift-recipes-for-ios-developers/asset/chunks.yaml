  trans: '

    # UIKit 与 Storyboards


    多年来，UIKit 一直是 iOS 应用中实现用户界面的唯一方式，而 Storyboards 机制则是进行界面布局的主要工具。近期，SwiftUI 被引入，它是从
    Objective-C 向纯 Swift 原生代码过渡的必然环节。但 UIKit 在 iOS 开发中仍然扮演着重要角色。


    首先，存在大量遗留代码。许多应用和框架早在 SwiftUI 推出之前就已开始开发。那些最流行的 iOS 库历经数年才赢得开发者信任，我们尚未准备好停止使用它们并全面转向
    SwiftUI。


    其次，SwiftUI 仅在 iOS 13.0、macOS 10.15 等版本中引入。如果你的应用需要支持 iOS 12（至少目前来看，这很有必要），你就无法使用
    SwiftUI。


    第三，UIKit 元素可以集成到 SwiftUI 代码中。如果你在 GitHub 上发现了一个外观酷炫的 UI 库，但它是用 UIKit 编写的，而你的应用使用的是
    SwiftUI，这并不能成为不使用它的理由。我们将在关于 SwiftUI 的章节中详细探讨这一点。


    现在，让我们看看如何充分利用 UIKit 和 iOS Storyboards。


    ## 应用界面间的导航


    每个 iOS 应用都有多个界面。Web 开发者通常称其为页面，许多 iOS 开发者也开始沿用此说法。不过，应用界面和网页之间仍存在差异。与此同时，现代设备开始支持分屏视图，这使得移动应用仅使用设备屏幕的一部分，并支持使用外接屏幕的设备。在
    iOS 13.0 中，Apple 引入了 Scene（场景）的概念。每个场景可以有一个或多个窗口，并包含一个或多个视图控制器。有点令人困惑，对吧？让我们深入了解一下。


    ### 屏幕、窗口与视图


    如果你有一台 iOS 设备，你就拥有一个屏幕。屏幕由 `UIScreen` 对象表示。主屏幕是一个单例；你可以从应用的任何部分访问它。如果你正在编写一个单屏应用，可以认为不存在其他内容。


    `UIScreen` 拥有一个 `UIWindow` 对象。这是一个可见的窗口。术语 *window* 源于桌面开发。我们都熟悉 Windows 操作系统，它将
    *window* 作为核心概念。与桌面操作系统不同，在 iOS 中，`UIWindow` 没有边框或装饰。


    创建 `UIWindow` 是为了显示用户界面，而用户界面则由 *视图* 组成。其中之一是根视图。这个根视图显示一个 *应用界面* 或 *应用页面*（正如
    Web 开发者所称）。在 UIKit 中，它由 `UIViewController`、`UINavigationController` 或其他控制器管理。


    这些控制器内部包含其他控制器或视图。这样，我们就得到了一个树状结构的视图和控制器层次体系。


    ### iOS 应用中的导航


    UIKit 提供了两种主要的导航方式：


    *   模态呈现新元素

    *   使用 `UINavigationController` 压入元素


    注意：基于标签的导航在移动应用中很常见。iOS 中的标签模型是一个控制器 `UITabBarController`，最多可有五个子控制器。我们将其留作超出本文范围的内容。


    这里的元素是某个控制器，通常是 `UIViewController`。


    `UIViewController` 包含一个由 `UIView` 对象及其子类构成的树。其中之一是根 `UIView`，而其他 `UIView` 则直接或通过其他对象位于其内部。


    当我们在 iOS 应用中谈论导航时，通常指的是从一个 `UIViewController` 切换到另一个（图 4-1）。当你拥有 `UINavigationController`
    时，你可以将一个新的控制器压入导航栈：


    ```

    pushViewController(_:animated:)

    ```


    当你以模态方式呈现时，使用以下方法：


    ```

    present(_:animated:completion:)

    ```


    有什么区别呢？


    除了视觉效果外，它们在逻辑上也有显著差异。使用 `UINavigationController` 时，你有一个导航栈，可以返回到之前压入的任何元素。你还可以向栈中添加元素、更改顺序以及执行许多其他操作。


    当你呈现一个模态元素时，你只能将其关闭。你无法访问整个栈，也无法一次性关闭多个元素。但这仍然很有用。假设你正在编写一个订餐应用。用户浏览菜单，将商品添加到购物车，然后打开购物车。这种情况下，使用模态呈现是合理的。但我们呈现的不是
    `UIViewController`，而是包含购买流程的 `UIViewController` 元素的 `UINavigationController`。当用户完成购买后，你通过关闭模态元素返回到菜单。


    ![](img/515103_1_En_4_Fig1_HTML.jpg)


    描述 iOS 应用导航的示意图：第一张 iPhone 图片上标注为导航控制器，随后是根视图控制器，该控制器被分为两张图片：模态窗口和根视图控制器。


    **图 4-1** iOS 应用中的导航。导航控制器、根控制器以及使用模态和推送方式呈现的视图控制器（从左到右）


    除了这两种显示另一个界面的方法，你还可以使用替换等方式。如果你有一个加载界面，我们不想将其保留在导航栈中，或保留在活动 UI “背后”的内存中。我们只想替换它。稍后我们将看到如何实现。


    最后一个重要概念是对话框或弹出式呈现。从逻辑上讲，它与模态呈现相同，但不是在后台替换界面，而是将其显示在界面上方。拿起你的 iPhone 或 iPad，在主屏幕上点击任意应用并长按。你会看到一个菜单。这就是弹出式呈现的一个例子。


    ### 场景


    自 iOS 13 起，Apple 引入了 *Scenes*。如果最初使用场景是可选的，那么 Xcode 12 已经不再提供选择。你仍然可以删除所有与场景相关的代码，使用传统方式，但未来这可能不再可行。


    注意：尽管场景是与 SwiftUI 一起引入的，但它们同样用于 UIKit。


    场景提供 `UIWindowScene` 对象，用于管理应用中的窗口和视图控制器。基本上，这是一种创建多窗口应用的方式。每个场景必须有一个代理——一个 `UIWindowSceneDelegate`
    对象，但它们不必不同。你可以为多个场景使用同一个代理。场景共享应用内存和其他资源。


    我们将多窗口应用留作本文范围之外的内容，但使用场景改变了我们访问 `UIWindow` 和处理应用生命周期的方式；这就是了解如何使用场景很重要的原因。

