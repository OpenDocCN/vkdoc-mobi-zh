- fmt: "# Maps and Navigation\n\nThe iOS platform has a native map framework – `MapKit`\
    \ – as well as the preinstalled Maps app that is based on said framework. Writing\
    \ iOS apps, you can be sure that the user has these tools and you can use them\
    \ too. Apple Maps is suitable for most cases, but there are alternative map frameworks\
    \ giving better functionality. Many people prefer Google Maps and Waze for navigation.\n\
    \nIn this section, we’ll review three situations:\n\n- Showing Apple Map in your\
    \ app\n- Showing Google Maps in your app\n- Dynamic navigation using the user’s\
    \ preferred app\n\n## Showing Apple Map in an iOS App\n\nSince iOS 3.0, Apple\
    \ introduced `MapKit`, which allows you to show a map right in your app as a regular\
    \ view (see Figure [4-6](#515103_1_En_4_Chapter.xhtml#Fig6)).\n\n![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig6_HTML.png)\n\
    \n*A screenshot of the Apple map view on an iPhone has a map with several labels.\
    \ The top of the image has the time and other icons.*\n\n**Figure 4-6** – Apple\
    \ map as a view\n\nTo add a map, open the storyboard (or xib) editor, click the\
    \ + (plus) button, and choose `Map Kit View` in the list. Add constraints if you\
    \ use them and create an outlet. The class name of this view is `MKMapView`.\n\
    \n```\n@IBOutlet weak var mapView: MKMapView!\n```\n\n`MKMapView` is a dynamic\
    \ component. By default, it allows to interact with the map. If you need it to\
    \ be static, uncheck `User Interaction Enabled`.\n\n> **Note**  \n> This property\
    \ works for all views. If you uncheck `User Interaction Enabled` (or set `isUserInteractionEnabled`\
    \ to `false` in code), view and its subviews won’t respond to user touches and\
    \ gestures.\n\nIn the Map View section in the storyboard/xib editor, you can modify\
    \ the map type and restrict specific actions, like zoom, scroll, etc.\n\nThere\
    \ are two typical actions you need to do with a map: set position/zoom level and\
    \ add an *annotation* (also called *pin* and *marker*).\n\nHaving latitude and\
    \ longitude of a point, you can zoom around it:\n\n```\nlet center = CLLocationCoordinate2D(latitude:\
    \ latitude, longitude: longitude)\nlet region = MKCoordinateRegion(center: center,\
    \ span: MKCoordinateSpan(latitudeDelta: 0.01, longitudeDelta: 0.01))\nmapView.setRegion(region,\
    \ animated: true)\n```\n\n`latitudeDelta` and `longitudeDelta` specify how much\
    \ space will you see around the center point.\n\nThe second typical action is\
    \ adding a marker (also called a pin):\n\n```\nlet annotation = MKPointAnnotation()\n\
    let centerCoordinate = CLLocationCoordinate2D(latitude: latitude, longitude: longitude)\n\
    annotation.coordinate = centerCoordinate\nannotation.title = \"Title\"\nmapView.addAnnotation(annotation)\n\
    ```\n\nYou can add multiple annotations to your map.\n\nTo remove an annotation,\
    \ you can call:\n\n```\nfunc removeAnnotations(_ annotations: [MKAnnotation])\n\
    ```\n\nTo remove all annotations, use `mapView.annotations` as an argument.\n\n\
    ## Showing Google Maps in an iOS App\n\nUnlike Apple Maps, which is included in\
    \ a set of standard libraries, Google Maps needs to be installed separately, which\
    \ requires an API key.\n\nIf you use CocoaPods as a dependency manager, add it\
    \ this way:\n\n```\npod 'GoogleMaps'\n```\n\nIf you prefer not to use CocoaPods,\
    \ you can download XCFramework from the official website and add it to your project\
    \ manually. There’s no official support of Swift Package Manager. The walkaround\
    \ is to use a third-party library: [`https://github.com/YAtechnologies/GoogleMaps-SP`](https://github.com/YAtechnologies/GoogleMaps-SP).\
    \ It can be added via Swift Package Manager, and it contains the Google Maps framework.\
    \ Users generally give positive feedback to this library, but whenever possible,\
    \ it’s better to avoid unofficial solutions.\n\nYou can get an API key at [`https://cloud.google.com`](https://cloud.google.com).\
    \ You need to create an app and follow two more steps:\n\n- Create an API key.\
    \ You can restrict it, so it can be used only from an iOS app. This way, it can\
    \ be used only from your app and not any other.\n- Enable Maps SDK for iOS.\n\n\
    If you integrated other Google services to the same iOS app, you don’t need to\
    \ create another Google app – you can use the same. For example, if you use Analytics\
    \ or Crashlytics, your Google app has already been created.\n\nGoogle Maps is\
    \ free only within some range. That’s why you need to enable billing if you haven’t\
    \ done it earlier. Prices may change within time, but in June 2021, map loads\
    \ were free, while street views were paid. Even if you’re not going to use street\
    \ views, you should enable billing.\n\nSince this moment, you can add `GMSMapView`\
    \ to your app. `GMSMapView` is a `UIView` object, which you can add both via storyboards\
    \ and programmatically.\n\nThe map requires an area to show. In case of Google\
    \ Maps, you need to set up a camera. A `GMSCameraPosition` object specifies latitude,\
    \ longitude, and zoom.\n\nLet’s add a map to our app via storyboard first (Recipe\
    \ [4-14](#515103_1_En_4_Chapter.xhtml#PC31)); then we’ll see how to do it programmatically\
    \ (Recipe [4-15](#515103_1_En_4_Chapter.xhtml#PC32)).\n\nIn both scenarios, you\
    \ need to add a key before using maps; otherwise, the app will crash. The best\
    \ place for it is `AppDelegate`:\n\n```\nimport GoogleMaps\n// Don't forget to\
    \ call:\n// GMSServices.provideAPIKey(\"YOUR_API_KEY\")\n// in AppDelegate\n\n\
    class ViewController: UIViewController {\n  override func viewDidLoad() {\n  \
    \  super.viewDidLoad()\n    let camera = GMSCameraPosition.camera(withLatitude:\
    \ 41.6168, longitude: 41.6367, zoom: 6.0)\n    let mapView = GMSMapView.map(withFrame:\
    \ self.view.frame, camera: camera)\n    self.view.addSubview(mapView)\n  }\n}\n\
    ```\n\n**Recipe 4-15** – Setting Up Map View Programmatically\n\n```\nimport GoogleMaps\n\
    // Don't forget to call:\n// GMSServices.provideAPIKey(\"YOUR_API_KEY\")\n// in\
    \ AppDelegate\n\nclass ViewController: UIViewController {\n  @IBOutlet var mapView:\
    \ GMSMapView!\n  override func viewDidLoad() {\n    super.viewDidLoad()\n    let\
    \ camera = GMSCameraPosition.camera(withLatitude: 41.6168, longitude: 41.6367,\
    \ zoom: 6.0)\n    mapView.camera = camera\n  }\n}\n```\n\n**Recipe 4-14** – Setting\
    \ Up Map View via Storyboard\n\n```\nGMSServices.provideAPIKey(\"YOUR_API_KEY\"\
    )\n```\n\nGoogle Maps has a great functionality. You can add markers, draw areas,\
    \ zoom around a specific area, and animate the camera.\n\nThe GooglePlaces library\
    \ provides SDK for working with places and addresses. You can resolve coordinates,\
    \ search nearby places, and provide other location-aware features.\n\nYou can\
    \ read more about it on the Google Maps Platform portal: [`https://developers.google.com/maps`](https://developers.google.com/maps)."
  raw: '## Maps and Navigation


    The iOS platform has a native map framework – MapKit – as well as the preinstalled
    Maps app that is based on said framework. Writing iOS apps, you can be sure that
    the user has these tools and you can use them too. Apple Maps is suitable for
    most cases, but there are alternative map frameworks giving better functionality.
    Many people prefer Google Maps and Waze for navigation.


    In this section, we’ll review three situations:


    *   Showing Apple Map in your app


    *   Showing Google Maps in your app


    *   Dynamic navigation using the user’s preferred app


    ### Showing Apple Map in an iOS App


    Since iOS 3.0, Apple introduced MapKit , which allows you to show a map right
    in your app as a regular view (see Figure [4-6](#515103_1_En_4_Chapter.xhtml#Fig6)).


    ![](images/515103_1_En_4_Chapter/515103_1_En_4_Fig6_HTML.png)


    A screenshot of the Apple map view on an iPhone has a map with several labels.
    The top of the image has the time and other icons.


    Figure 4-6


    Apple map as a view


    To add a map, open the storyboard (or xib) editor, click the + (plus) button,
    and choose `Map Kit View` in the list. Add constraints if you use them and create
    an outlet. The class name of this view is `MKMapView` .


    ```

    @IBOutlet weak var mapView: MKMapView!

    ```


    `MKMapView` is a dynamic component. By default, it allows to interact with the
    map. If you need it to be static, uncheck `User Interaction Enabled`.


    Note


    This property works for all views. If you uncheck User Interaction Enabled (or
    set isUserInteractionEnabled to false in code), view and its subviews won’t respond
    to user touches and gestures.


    In the Map View section in the storyboard/xib editor, you can modify the map type
    and restrict specific actions, like zoom, scroll, etc.


    There are two typical actions you need to do with a map: set position/zoom level
    and add an *annotation* (also called *pin* and *marker*).


    Having latitude and longitude of a point, you can zoom around it:


    ```

    let center = CLLocationCoordinate2D(latitude: latitude, longitude: longitude)

    let region = MKCoordinateRegion(center: center, span: MKCoordinateSpan(latitudeDelta:
    0.01, longitudeDelta: 0.01))

    mapView.setRegion(region, animated: true)

    ```


    `latitudeDelta` and `longitudeDelta` specify how much space will you see around
    the center point.


    The second typical action is adding a marker (also called a pin):


    ```

    let annotation = MKPointAnnotation()

    let centerCoordinate = CLLocationCoordinate2D(latitude: latitude, longitude: longitude)

    annotation.coordinate = centerCoordinate

    annotation.title = "Title"

    mapView.addAnnotation(annotation)

    ```


    You can add multiple annotations to your map.


    To remove an annotation, you can call


    ```

    func removeAnnotations(_ annotations: [MKAnnotation])

    ```


    To remove all annotations, use `mapView.annotations` as an argument .


    ### Showing Google Maps in an iOS App


    Unlike Apple Maps , which is included in a set of standard libraries, Google Maps
    needs to be installed separately, which requires an API key.


    If you use CocoaPods as a dependency manager, add it this way:


    ```

    pod ''GoogleMaps''

    ```


    If you prefer not to use CocoaPods, you can download XCFramework from the official
    website and add it to your project manually. There’s no official support of Swift
    Package Manager. The walkaround is to use a third-party library: [`https://github.com/YAtechnologies/GoogleMaps-SP`](https://github.com/YAtechnologies/GoogleMaps-SP)
    . It can be added via Swift Package Manager, and it contains the Google Maps framework.
    Users generally give positive feedback to this library, but whenever possible,
    it’s better to avoid unofficial solutions.


    You can get an API key at [`https://cloud.google.com`](https://cloud.google.com)
    . You need to create an app and follow two more steps:


    *   Create an API key. You can restrict it, so it can be used only from an iOS
    app. This way, it can be used only from your app and not any other.


    *   Enable Maps SDK for iOS.


    If you integrated other Google services to the same iOS app, you don’t need to
    create another Google app – you can use the same. For example, if you use Analytics
    or Crashlytics, your Google app has already been created.


    Google Maps is free only within some range. That’s why you need to enable billing
    if you haven’t done it earlier. Prices may change within time, but in June 2021,
    map loads were free, while street views were paid. Even if you’re not going to
    use street views, you should enable billing.


    Since this moment, you can add `GMSMapView` to your app. `GMSMapView` is a `UIView`
    object, which you can add both via storyboards and programmatically.


    The map requires an area to show. In case of Google Maps, you need to set up a
    camera. A `GMSCameraPosition` object specifies latitude, longitude, and zoom.


    Let’s add a map to our app via storyboard first (Recipe [4-14](#515103_1_En_4_Chapter.xhtml#PC31));
    then we’ll see how to do it programmatically (Recipe [4-15](#515103_1_En_4_Chapter.xhtml#PC32)).


    In both scenarios, you need to add a key before using maps; otherwise, the app
    will crash. The best place for it is `AppDelegate`:


    ```

    import GoogleMaps

    // Don’t forget to call:

    // GMSServices.provideAPIKey("YOUR_API_KEY")

    // in AppDelegate

    class ViewController: UIViewController {

    override func viewDidLoad() {

    super.viewDidLoad()

    let camera = GMSCameraPosition.camera(withLatitude: 41.6168, longitude: 41.6367,
    zoom: 6.0)

    let mapView = GMSMapView.map(withFrame: self.view.frame, camera: camera)

    self.view.addSubview(mapView)

    }

    }

    Recipe 4-15

    Setting Up Map View Programmatically

    ```


    ```

    import GoogleMaps

    // Don''t forget to call:

    // GMSServices.provideAPIKey("YOUR_API_KEY")

    // in AppDelegate

    class ViewController: UIViewController {

    @IBOutlet var mapView: GMSMapView!

    override func viewDidLoad() {

    super.viewDidLoad()

    let camera = GMSCameraPosition.camera(withLatitude: 41.6168, longitude: 41.6367,
    zoom: 6.0)

    mapView.camera = camera

    }

    }

    Recipe 4-14

    Setting Up Map View via Storyboard

    ```


    ```

    GMSServices.provideAPIKey("YOUR_API_KEY")

    ```


    Google Maps has a great functionality. You can add markers, draw areas, zoom around
    a specific area, and animate the camera.


    The GooglePlaces library provides SDK for working with places and addresses. You
    can resolve coordinates, search nearby places, and provide other location-aware
    features.


    You can read more about it on the Google Maps Platform portal: [`https://developers.google.com/maps`](https://developers.google.com/maps)
    .'
  trans: "\n# 地图与导航\n\niOS 平台拥有原生地图框架 `MapKit`，以及基于该框架预装的系统地图应用。在编写 iOS 应用时，你可以确信用户已拥有这些工具，并且你也可以直接调用它们。苹果地图适用于大多数场景，但也存在功能更优的替代地图框架。许多人更偏好使用谷歌地图与\
    \ Waze 进行导航。\n\n在本节中，我们将探讨三种场景：\n\n- 在应用内显示苹果地图\n- 在应用内显示谷歌地图\n- 使用用户偏好的应用进行动态导航\n\
    \n## 在 iOS 应用中显示苹果地图\n\n自 iOS 3.0 开始，苹果推出了 `MapKit`，允许你将地图作为常规视图直接嵌入应用（见图 4-6）。\n\
    \n![](img/515103_1_En_4_Fig6_HTML.png)\n\n*iPhone 上苹果地图视图的截图，地图上带有多个标签。图片顶部显示时间及其他图标。*\n\
    \n**图 4-6** – 作为视图的苹果地图\n\n要添加地图，请打开故事板（或 xib）编辑器，点击 +（加号）按钮，在列表中选择 `Map Kit View`。如果使用约束，请添加约束并创建插座变量。该视图的类名为\
    \ `MKMapView`。\n\n```\n@IBOutlet weak var mapView: MKMapView!\n```\n\n`MKMapView`\
    \ 是一个动态组件。默认情况下，它允许与地图进行交互。如果需要静态显示，请取消勾选 `User Interaction Enabled`。\n\n> **提示**\
    \  \n> 此属性适用于所有视图。如果取消勾选 `User Interaction Enabled`（或在代码中将 `isUserInteractionEnabled`\
    \ 设置为 `false`），视图及其子视图将不会响应用户的触摸和手势操作。\n\n在故事板/xib 编辑器的 Map View 部分，你可以修改地图类型，并限制缩放、滚动等特定操作。\n\
    \n使用地图时有两个典型操作：设置位置/缩放级别，以及添加*标注*（也称为*图钉*和*标记*）。\n\n已知某点的经纬度后，可以缩放至该点附近：\n\n```\n\
    let center = CLLocationCoordinate2D(latitude: latitude, longitude: longitude)\n\
    let region = MKCoordinateRegion(center: center, span: MKCoordinateSpan(latitudeDelta:\
    \ 0.01, longitudeDelta: 0.01))\nmapView.setRegion(region, animated: true)\n```\n\
    \n`latitudeDelta` 和 `longitudeDelta` 指定了中心点周围可见的空间范围。\n\n第二个典型操作是添加标记（也称为图钉）：\n\
    \n```\nlet annotation = MKPointAnnotation()\nlet centerCoordinate = CLLocationCoordinate2D(latitude:\
    \ latitude, longitude: longitude)\nannotation.coordinate = centerCoordinate\n\
    annotation.title = \"标题\"\nmapView.addAnnotation(annotation)\n```\n\n你可以在地图上添加多个标注。\n\
    \n要移除标注，可以调用：\n\n```\nfunc removeAnnotations(_ annotations: [MKAnnotation])\n\
    ```\n\n要移除所有标注，请使用 `mapView.annotations` 作为参数。\n\n## 在 iOS 应用中显示谷歌地图\n\n与包含在标准库中的苹果地图不同，谷歌地图需要单独安装，并且需要\
    \ API 密钥。\n\n如果你使用 CocoaPods 作为依赖管理工具，可以通过以下方式添加：\n\n```\npod 'GoogleMaps'\n```\n\
    \n如果你不想使用 CocoaPods，可以从官方网站下载 XCFramework 并手动添加到项目。谷歌官方并未支持 Swift Package Manager。解决方法之一是使用第三方库：[`https://github.com/YAtechnologies/GoogleMaps-SP`](https://github.com/YAtechnologies/GoogleMaps-SP)。该库可以通过\
    \ Swift Package Manager 添加，并且包含了谷歌地图框架。用户普遍对该库给予正面反馈，但尽量还是避免使用非官方解决方案。\n\n你可以在\
    \ [`https://cloud.google.com`](https://cloud.google.com) 获取 API 密钥。需要创建一个应用并完成以下两个步骤：\n\
    \n- 创建 API 密钥。可以对其进行限制，使其只能从 iOS 应用中使用。这样，该密钥只能被你的应用使用，而不能被其他应用使用。\n- 启用 iOS 版\
    \ Maps SDK。\n\n如果你已经为同一个 iOS 应用集成了其他谷歌服务，则无需再创建新的谷歌应用——可以使用同一个应用。例如，如果你使用了 Analytics\
    \ 或 Crashlytics，你的谷歌应用应该已经创建好了。\n\n谷歌地图仅在特定用量范围内免费。因此，如果你之前未启用结算功能，现在需要启用。价格可能会随时间变化，但截至\
    \ 2021 年 6 月，地图加载是免费的，而街景功能则需要付费。即使你不打算使用街景功能，也建议启用结算。\n\n从此时起，你可以将 `GMSMapView`\
    \ 添加到应用中。`GMSMapView` 是一个 `UIView` 对象，你可以通过故事板或编程方式进行添加。\n\n地图需要显示区域。对于谷歌地图，你需要设置相机。`GMSCameraPosition`\
    \ 对象指定了纬度、经度和缩放级别。\n\n我们先通过故事板将地图添加到应用中（方法 4-14）；然后介绍如何通过编程方式实现（方法 4-15）。\n\n\
