- fmt: "### Credit Card Information\n\nIf you want to add any paid functionalities\
    \ to the app, you need to use In-App Purchases. Apple won’t allow you to use direct\
    \ payment; otherwise, the app will be rejected.\n\nOn the other hand, if you sell\
    \ goods or services that are not part of the app, you may need to get the user’s\
    \ credit card number. Typical examples are food delivery apps, online shops, and\
    \ booking services.\n\nThe most popular credit cards have these four components:\n\
    \n- `Number`\n- `Expiration` month and year\n- `Security code` (`CVC`/`CVV`)\n\
    - `Name`\n\nDepending on the card type, the number varies from 16 to 19 digits.\
    \ Usually, the number is separated by spaces after each four digits, but it’s\
    \ not compulsory. For that reason, we will remove all spaces before verification.\n\
    \nWhen it comes to expiration month and year, everything is pretty straightforward.\
    \ Month is a number from 1 to 12, and year has two or four digits. We’ll verify\
    \ if the expiration date is during the current month of the current year or later.\n\
    \nThe security code is always a number. It has three or four digits. As it can\
    \ start with leading zeros, integer representation is a number between 0 and 9999.\n\
    \nThe verification of names is identical to the verification of the user name\
    \ on the registration form, so we’ll simply reuse our existing code. Full credit\
    \ card verification code is shown in Recipe [3-7](#515103_1_En_3_Chapter.xhtml#PC9).\n\
    \n```\npublic struct CreditCard {\n    public var number: String\n    public var\
    \ expMonth: Int\n    public var expYear: Int\n    public var securityCode: Int\n\
    \    public var nameOnCard: String\n    public init(number: String, expMonth:\
    \ Int, expYear: Int, securityCode: Int, nameOnCard: String) {\n        self.number\
    \ = number\n        self.expMonth = expMonth\n        self.expYear = expYear\n\
    \        self.securityCode = securityCode\n        self.nameOnCard = nameOnCard\n\
    \    }\n    var isNumberValid: Bool {\n        let numberProcessed = String(number.filter\
    \ { !\" \".contains($0) })\n        return numberProcessed.containsOnlyDigits\
    \ && numberProcessed.count >= 16 && numberProcessed.count <= 19\n    }\n    var\
    \ isExpirationValid: Bool {\n        if expMonth < 1 || expMonth > 12 {\n    \
    \        return false\n        }\n        let expYear4Digits = (expYear < 100\
    \ ? 2000 : 0) + expYear\n        let monthToday = Calendar.current.component(.month,\
    \ from: Date())\n        let yearToday = Calendar.current.component(.year, from:\
    \ Date())\n        switch expYear4Digits - yearToday {\n        case ..<0: return\
    \ false\n        case 0: return expMonth >= monthToday\n        default: return\
    \ true\n        }\n    }\n    var isSecurityCodeValid: Bool {\n        securityCode\
    \ < 10000\n    }\n    var isNameValid: Bool {\n        nameOnCard.isValidName\n\
    \    }\n    public var isCardValid: Bool {\n        isNumberValid && isExpirationValid\
    \ && isSecurityCodeValid && isNameValid\n    }\n}\n```\n\nUnlike most of our previous\
    \ recipes, this one is a class, not an extension. A credit card number is a whole\
    \ thing – for example, we validate the month and year together, so we won’t separate\
    \ them into a group of extensions.\n\nBefore that, the validation structure needs\
    \ to be filled with data. Use the `isCardValid` property to get the result as\
    \ a `Boolean` value. If you need to know which component of a number is invalid,\
    \ use `isNameValid`, `isNumberValid`, and other functions.\n\nNote: In this chapter,\
    \ we discuss work with information, not UI, but sometimes, it may be useful to\
    \ try code in an app, not in a playground. For this, you can use libraries for\
    \ entering (scanning) and visualizing bank cards. In Figure [3-1](#515103_1_En_3_Chapter.xhtml#Fig1),\
    \ you can see visualization made by the `CreditCardView` library ( [https://github.com/jboullianne/CreditCardView](https://github.com/jboullianne/CreditCardView)\
    \ ). For scanning, you can use `card.io` ( [https://github.com/card-io/card.io-iOS-SDK](https://github.com/card-io/card.io-iOS-SDK)\
    \ ).\n\n![](images/515103_1_En_3_Chapter/515103_1_En_3_Fig1_HTML.jpg)\n\nAn image\
    \ of a typical VISA card contains a placeholder for the 16 digit card number.\
    \ The card holder's name is Jean Marc Boullianne. The expiry date is 02/30.\n\n\
    **Figure 3-1** Credit card visualization in an iOS app\n\n## Base64 and Hex Encoding\n\
    \nOftentimes, we need to present `Data` in the form of a `String`. We may need\
    \ it for debug output, for passing it to the server, or for JSON integration.\
    \ There are two common ways to do it: Base64 and hex encoding.\n\n### Base64 Encoding\n\
    \nBase64 is a way to represent binary data as a text string. It splits data into\
    \ 6-bit fragments and encodes it using human-readable characters:\n\n- 26 uppercase\
    \ Latin letters\n- 26 lowercase Latin letters\n- 10 digits\n- `+` (plus sign)\n\
    - `/` (slash sign)\n\nAs we can only encode integer amount of bytes, and 1 byte\
    \ equals 8 bits, the data length needs to be divisible by three. If it isn’t,\
    \ padding is used. The equal sign (`=`) is used for padding when you need to add\
    \ empty bits to the end of data. By adding one or two paddings, you can always\
    \ get a number of bits, which is divisible by both 6 and 8.\n\nThe advantage of\
    \ Base64 encoding is that characters used for encoding are basic ASCII characters,\
    \ which means they’re represented the same in all 1-byte encodings.\n\nTable [3-1](#515103_1_En_3_Chapter.xhtml#Tab1)\
    \ encodes the word `\"Swift\"` into Base64.\n\n**Table 3-1** Binary representation\
    \ of the word “Swift”\n\n| S | w | i | f | t |\n| --- | --- | --- | --- | ---\
    \ |\n| 0101 0011 | 0111 0111 | 0110 1001 | 0110 0110 | 0111 0100 |\n\nTotally,\
    \ we get 40 bytes, which is not divisible by 6, so we’ll need padding. Table [3-2](#515103_1_En_3_Chapter.xhtml#Tab2)\
    \ splits it into 6-bit fragments.\n\n**Table 3-2** Base64 representation of the\
    \ word “Swift”\n\n| 010100 | 110111 | 011101 | 101001 | 011001 | 100111 | 0100XX\
    \ |\n| --- | --- | --- | --- | --- | --- | --- |\n| U | 3 | d | p | Z | n | Q=\
    \ |\n\nResult: “Swift” -> U3dpZnQ=.\n\nEncoding ASCII text to Base64 doesn’t usually\
    \ make sense, but using the same method, we can encode pictures, audio files,\
    \ and basically anything to strings. It’s more compact than hex encoding, using\
    \ two symbols to encode each byte, and it’s easily encodable and decodable. Typical\
    \ examples of Base64-encoded binaries are email attachments. Recipe [3-8](#515103_1_En_3_Chapter.xhtml#PC10)\
    \ shows how to decode from Base64 and encode to this format.\n\n```\nlet base64String\
    \ = \"U3dpZnQ=\"\nlet data = Data(base64Encoded: base64String)!\n// Check if we\
    \ got correct text\nlet decodedString = String(data: data, encoding: .utf8)!\n\
    print(decodedString)\nlet base64Again = data.base64EncodedString()\nprint(base64Again)\n\
    ```\n\nIn the preceding example, we decode Base64 String into `Data` using the\
    \ optional constructor `Data(base64Encoded:)`. In this case, we use force unwrapping\
    \ because we know that it’s valid. Keep in mind that in production code, it’s\
    \ not an advisable practice.\n\n`Data` has a method `base64EncodedString` for\
    \ encoding. These are standard Swift functions; no extra code is needed in this\
    \ case."
  raw: '### Credit Card Information


    If you want to add any paid functionalities to the app, you need to use In-App
    Purchases. Apple won’t allow you to use direct payment; otherwise, the app will
    be rejected.


    On the other hand, if you sell goods or services that are not part of the app,
    you may need to get the user’s credit card number. Typical examples are food delivery
    apps, online shops, and booking services.


    The most popular credit cards have these four components:


    *   Number


    *   Expiration month and year


    *   Security code (CVC/CVV)


    *   Name


    Depending on the card type, the number varies from 16 to 19 digits. Usually, the
    number is separated by spaces after each four digits, but it’s not compulsory.
    For that reason, we will remove all spaces before verification.


    When it comes to expiration month and year, everything is pretty straightforward.
    Month is a number from 1 to 12, and year has two or four digits. We’ll verify
    if the expiration date is during the current month of the current year or later.


    The security code is always a number. It has three or four digits. As it can start
    with leading zeros, integer representation is a number between 0 and 9999.


    The verification of names is identical to the verification of the user name on
    the registration form, so we’ll simply reuse our existing code. Full credit card
    verification code is shown in Recipe [3-7](#515103_1_En_3_Chapter.xhtml#PC9).


    ```

    public struct CreditCard {

    public var number: String

    public var expMonth: Int

    public var expYear: Int

    public var securityCode: Int

