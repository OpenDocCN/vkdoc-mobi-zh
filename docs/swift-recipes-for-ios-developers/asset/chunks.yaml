  raw: '### Conversion from Number to String and Back


    The easiest way to convert numbers of any type to a String is a *string interpolation*
    . In Swift, you can include any variable inside a String by adding `\(` before
    a variable name and `)` after. It works even with expressions and functions. For
    example:


    ```

    let age = 30

    let str = "Your age is \(age). Next year you''ll be \(age+1)"

    ```


    It’s more complicated if you need to format it. If you need to get a string with
    a price, you probably want to have two digits for the monetary part.


    There are two ways. You can use the `String(format:_:...)` constructor. The first
    argument is a template; others are variables. If you are familiar with the C-family
    programming languages, you know the `sprintf` function. It works exactly the same
    way. Example:


    ```

    let price = 14.50

    let priceString = String(format: "Price: $%.02f", price)

    ```


    Sometimes, you need to be more flexible. While most countries use two digits for
    monetary units, others need three digits. One Bahraini dinar equals 1000 fils,
    one Chinese yuan equals 10 jiao, and so on.


    Depending on the app functionality, you can write formatters for all necessary
    data types. If you use `Double` to store prices, you can write an extension to
    format it and use it wherever you need. Such extension is shown in Recipe [1-2](#515103_1_En_1_Chapter.xhtml#PC9).


    Note


    It’s not a good idea to use `Double` for prices. Even though they have high precision,
    losing 0.000...1 may change your visible price from 1.00 to 0.99\. A more reliable
    way is to use simple Ints and keep prices in monetary units. Alternatively, you
    can use more complex data structures storing as two `Int` variables – for full
    units and monetary units.


    ```

    public extension Double {

    var asPrice: String {

    guard let cents = (self * 100.0).asInt else {

    return ""

    }

    return String(format: "%d.%02d", cents / 100, cents % 100)

    }

    }

    public extension Int {

    var asPrice: String {

    String(format: "%d.%02d", self / 100, self % 100)

    }

    }

    Recipe 1-2

    Formatting Price

    ```


    *Usage*


    ```

    let price = 14.5

    let priceString = "Price: $\(price.asPrice)"

    ```


    Similarly, you can format any other data.


    Another way to format numbers is extending `String.StringInterpolation`. It gives
    you access to interpolation logic. Typically, it’s used for dates and custom types,
    but you can use it for numbers as well. Unless the app has scientific purposes,
    you won’t need more than three decimals for doubles.


    The fast solution is the following:


    ```

    public extension String.StringInterpolation {

    mutating func appendInterpolation(_ value: Double) {

    let formatter = NumberFormatter()

    formatter.decimalSeparator = "."

    formatter.maximumFractionDigits = 3

    if let result = formatter.string(from: value as NSNumber) {

    appendLiteral(result)

    }

    }

    }

    ```


    The preceding extension limits the amount of fraction digits to three and adds
    decimal separators.


    But it’s fast only to write when you use it in `UITableView` or `UICollectionView`;
    it may cause performance issues. Why? Because we create and set up `NumberFormatter`
    every time.


    The correct solution is to create a lazy variable, which will create our `NumberFormatter`
    once, and then reuse it every time. We can’t create variables in extensions, so
    we’ll have to create a helper class as shown in Recipe [1-3](#515103_1_En_1_Chapter.xhtml#PC12).


    ```

    class MyFormatters {

    static var formatterWithThreeFractionDigits: NumberFormatter = {

    let formatter = NumberFormatter()

    formatter.decimalSeparator = "."

    formatter.maximumFractionDigits = 3

    return formatter

    }()

    }

    public extension String.StringInterpolation {

    mutating func appendInterpolation(_ value: Double) {

    let formatter = MyFormatters.formatterWithThreeFractionDigits

    if let result = formatter.string(from: value as NSNumber) {

    appendLiteral(result)

    }

    }

    }

    Recipe 1-3

    Custom String Interpolation

    ```


    Note


    All static variables are lazy, so you don’t have to add lazy keyword. Even more,
    you can’t do it.


    What about the opposite conversion? If we get a `String`, how can we convert it
    to `Int` or `Double` to perform numeric operations? A simple answer is


    ```

    let str = "123.5"

    let i = Int(str)

    let d = Double(str)

    ```


    This code is safe because it returns optionals. `i` in the preceding example will
    be `nil`, while `d` will be `123.5`. It’s a really good working code, but there
    are two problematic situations:


    1.  If str is optional, it won’t compile. This can be solved with a nil-coalescing
    operator (`str ?? ""`). If str is `nil`, it will be replaced with an empty string.
    As empty strings can’t be parsed as a number (neither `Double` nor `Int`), the
    result will be `nil`.


    2.  In some locales, decimal separator is “`,`” instead of “`.`”. This can be
    a problem when we parse user input. A quick fix is replacing commas with dots:
    `.replacingOccurrences(of: ",", with: ".")`.


    Let’s wrap it up and make an easy-to-use `String` extension (Recipe [1-4](#515103_1_En_1_Chapter.xhtml#PC14)).


    ```

    public extension StringProtocol {

    var asInt8: Int8? {

    Int8(self)

    }

    var asUInt8: UInt8? {

    UInt8(self)

    }

    var asInt16: Int16? {

    Int16(self)

    }

    var asUInt16: UInt16? {

    UInt16(self)

    }

    var asInt32: Int32? {

    Int32(self)

    }

    var asUInt32: UInt32? {

    UInt32(self)

    }

    var asInt64: Int64? {

    Int64(self)

    }

    var asUInt64: UInt64? {

    UInt64(self)

    }

    var asInt: Int? {

    Int(self)

    }

    var asUInt: UInt? {

    UInt(self)

    }

    var asDouble: Double? {

    Double(self.replacingOccurrences(of: ",", with: "."))

    }

    var asFloat: Float? {

    Float(self.replacingOccurrences(of: ",", with: "."))

    }

    }

    Recipe 1-4

    Parsing Strings to Numeric Types

    ```


    ### Boolean Conversions


    Even though `Bool` is the simplest type with only two values, parsing it can be
    a challenge. To understand why, try to figure out if `1` is `true` or `false`.
    Most developers will say that `1` is undoubtedly `true` because `0` is `false`
    and any other value is `true`. This is how it works under the hood in Swift and
    most other programming languages. In some cases, `0` may mean success (no error),
    and other values – error code. Keep it in mind if you have such case, but we’ll
    assume that `Int` should convert to `false` if it’s `0`, and to `true` otherwise
    .


    Other questions are if `"yes"` or `"true"` should be parsed as `true` and what
    to do with custom values like `5` or `"success"`. It depends on the source of
    the data. You should read the documentation of the API or library you use and
    decide accordingly.


    Recipe [1-5](#515103_1_En_1_Chapter.xhtml#PC15) follows the set of rules specified
    in Table [1-1](#515103_1_En_1_Chapter.xhtml#Tab1).


    Table 1-1


    Any to Bool conversion rules


    | Parsed type | Rules |

    | --- | --- |

    | Bool | Return parsed value as is. |

    | Int | Return `false` if the value is `0`, otherwise `true`. |

    | Float or Double | Return `nil` to avoid confusion. Booleans should never be
    represented as floating-point numbers. |

    | String | Return `true` if the value is `"true"` or `"yes"`; return `false` if
    the value is `"false"` or `"no"`; return `nil` in all other cases. String comparison
    should be case-insensitive. |

    | Other types | Return `nil`. |


    ```

    // Any can''t be extended, so it''s a function

    func parseAsBool(value: Any?) -> Bool? {

    if let boolValue = value as? Bool {

    return boolValue

    } else if let intValue = value as? Int {

    return intValue != 0

    } else if value is Float || value is Double {

    return nil

    } else if let strValue = value as? String {

    let strPrepared = strValue.trimmingCharacters(in: .whitespacesAndNewlines).lowercased()

    if strPrepared == "true" || strPrepared == "yes" {

    return true

    } else if strPrepared == "false" || strPrepared == "no" {

    return false

    } else {

    return nil

    }

    } else {

    return nil

    }

    }

    Recipe 1-5

    Extracting Boolean Value from a Variable

    ```


    If you prefer all numeric types to be converted to `Bool`, you can use the `isZero`
    function instead of returning `nil`. If `Double.isZero` returns `true`, you return
    `false`. Otherwise, you return `true` .'
