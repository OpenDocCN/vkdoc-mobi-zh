  trans: '

    ### 序列化对象


    要使数据结构可序列化，你需要实现一个 `Encodable` 协议。该协议只有一个方法——`encode(to: Encoder)`。你无需自行实现，因为它有一个默认实现。但这个默认实现仅在类或结构体中的所有存储变量均为
    `Encodable` 类型时才生效。所有基本类型（如 `Int`、`String`、`Double` 等）都是 `Encodable` 的。而所有自定义类型则不然，除非它们实现了
    `Encodable` 协议。例如：


    ```

    struct User: Encodable {

    var name: String

    var surname: String

    var age: Int

    }

    ```


    我们为什么需要它？为什么要让一个结构体或类可序列化（或者如 Swift 所称的 `Encodable`）？当你需要将其转换为 JSON 或保存到文件时，魔力便开始了。以下示例展示了如何将
    `Encodable` 转换为 `Data` 和 `Dictionary`：


    ```

    struct User: Encodable {

    var name: String

    var surname: String

    var age: Int

    var asData: Data? {

    return try? JSONEncoder().encode(self)

    }

    var asDictionary: [String: Any]? {

    guard let data = self.asData else { return nil }

    return (try? JSONSerialization.jsonObject(with: data, options: .allowFragments)).flatMap
    { $0 as? [String: Any] }

    }

    }

    ```


    如上面的清单所示，只需几行代码，一个 `Encodable` 对象就可以被转换为 JSON 编码的 `Data` 或 Swift 的 `Dictionary`。你可以向
    `Encodable` 结构体添加更多变量，它们将被 `Encodable` 协议自动序列化，或者更准确地说，由其默认的 `encode(to: Encodable)`
    方法实现自动处理。


    ```

    let encUser = User(name: "John", surname: "Doe", age: 30)

    let userDict = encUser.asDictionary

    print(userDict ?? {})

    ```


    *输出*


    ```

    ["surname": Doe, "name": John, "age": 30]

    ```


    如果出于某种原因序列化失败，将返回 `nil`。


    正如我们在开头所讨论的，优秀的代码必须是通用的。它应该易于复制到其他项目中，而无需修改或只需极少的修改。来自配方 2-7 的 Swift 扩展即提供了这种帮助。


    ```

    public extension Encodable {

    var asJSONData: Data? {

    try? JSONEncoder().encode(self)

    }

    var asJSONString: String? {

    guard let data = self.asData else { return nil }

    return String(data: data, encoding: .utf8)

    }

    var asDictionary: [String: Any]? {

    guard let data = self.asData else { return nil }

    return (try? JSONSerialization.jsonObject(with: data, options: .allowFragments)).flatMap
    { $0 as? [String: Any] }

    }

    }

    配方 2-7

    将 Encodable 转换为 JSON

    ```


    现在，任何遵循 `Encodable` 协议的类型都将拥有 `asJSONData`、`asJSONDictionary` 和 `asString` 方法。以下代码片段展示了一个可编码的结构体（该结构体拥有
    `asJSONData`、`asJSONString` 和 `asDictionary` 方法）：


    ```

    struct User: Encodable {

    var name: String

    var surname: String

    var age: Int

    }

    ```


    当你处理接受 JSON 格式参数的 API 时，这些方法极其有用。此外，`asData` 和 `asString` 方法也可用于将文件保存到闪存、硬盘或固态硬盘（如果你编写的代码兼容
    macOS）。


    ### 反序列化对象


    与 `Encodable` 类似，Swift 也提供了一个 `Decodable` 协议。该协议声明了一个构造器 `init(from: Decoder)`，而不是方法。它同样拥有默认实现。


    反序列化对象是一个稍微复杂的任务，原因有四：


    - 提供的数据结构可能缺少 `Decodable` 结构中声明的某些字段。

    - 提供的数据结构可能包含额外的字段。

    - 提供的数据中的字段名称与声明的结构体不匹配。

    - 数据类型必须完全匹配。


    在继续之前，我们还需要一个接口——`Codable`。它不是一个独立的接口，而是 `Encodable` 和 `Decodable` 的组合，用 Swift
    的术语来说，它是一个类型别名。


    ```

    typealias Codable = Decodable & Encodable

    ```


    通常，当我们需要序列化一个类时，我们也需要对其进行反序列化。让我们将 `User` 结构体改为遵循 `Codable` 而非 `Encodable`。


    ```

    struct User: Codable {

    var name: String

    var surname: String

    var age: Int

    }

    ```


    我们不需要为 `Codable` 编写任何扩展；它只是一个别名。相反，我们扩展了 `Decodable` 协议，如配方 2-8 所示。


    ```

    public extension Decodable {

    init?(data: Data) {

    do {

    self = try JSONDecoder().decode(Self.self, from: data)

    } catch {

    return nil

    }

    }

    init?(dict: [String: Any]) {

    guard let jsonData = try? JSONSerialization.data(withJSONObject: dict, options:
    .fragmentsAllowed) else { return nil }

    do {

    self = try JSONDecoder().decode(Self.self, from: jsonData)

    } catch {

    return nil

    }

    }

    init?(jsonString: String) {

    guard let jsonData = jsonString.data(using: .utf8) else { return nil }

    do {

    self = try JSONDecoder().decode(Self.self, from: jsonData)

    } catch {

    return nil

    }

    }

    }

    配方 2-8

    将 JSON 转换为 Decodable

    ```


    这段代码可以从 JSON 编码的 `String`、`Data` 或 `Dictionary` 对象中返回一个有效的对象，但前提是所提供的结构体包含 name、surname
    和 age 字段。而且这些字段的拼写必须与 `User` 声明中的完全一致。以下是一个用户字典的示例：


    ```

    let decDict: [String: Any] = [

    "name": "John",

    "surname": "Doe",

    "age": 30

    ]

    let decUser = User(dict: decDict)

    ```


    如果缺少其中一个字段怎么办？例如，我们不知道用户的年龄。在这种情况下，`decUser` 将为 `nil`。这个问题可以通过将字段设为可选项来解决。如果某些字段是必需的，则它们应设为非可选项；例如，用户
    ID 几乎不可能是可选的。其他字段可以缺失，这没问题。


    我们之前讨论的另一个问题是类型不匹配。请看以下示例：


    ```

    struct User: Codable {

    var name: String

    var surname: String

    var age: Int?

    }

    let decDict: [String: Any] = [

    "name": "John",

    "surname": "Doe",

    "age": "30"

    ]

    let decUser = User(dict: decDict)

    ```


    `decUser` 对象的 age 将为 `nil`。解决这个问题有两种方案。第一种方案是处理好服务端输出。如果你（或你的团队）自己编写 API，你可以创建严格类型化的数据。当处理第三方
    API 时，这就不太可行了。于是便有了第二种方案。你可以手动定义一个 `init(from: Decoder)` 构造器。你需要为每个类和结构体单独执行此操作——这里没有通用的解决方案。你可以在配方
    2-9 中看到此方案的一个示例。


    ```

    public struct User: Codable {

    var name: String

    var surname: String

    var age: Int?

    init(name: String, surname: String, age: Int?) {

    self.name = name

    self.surname = surname

    self.age = age

    }

    init(from decoder: Decoder) throws {

    let container = try decoder.container(keyedBy: CodingKeys.self)

    name = try container.decode(String.self, forKey: .name)

    surname = try container.decode(String.self, forKey: .surname)

    do {

    age = try container.decode(Int.self, forKey: .age)

    } catch DecodingError.typeMismatch {

    age = Int(try container.decode(String.self, forKey: .age))

    }

    }

    }

    配方 2-9

    手动解码

    ```


    请注意，如果你为结构体添加了自定义构造器，那么如果需要，你还必须提供一个默认构造器。


    即使存在这种不便，我们仍然可以在 `Decodable` 扩展中定义构造器，这比使用 `Dictionary` 扩展要方便得多。

