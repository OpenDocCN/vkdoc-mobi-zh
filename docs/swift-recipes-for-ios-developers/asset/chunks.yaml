    ```\n\n### 用户离开屏幕时隐藏键盘\n\n用户离开屏幕时，隐藏屏幕键盘是一个好习惯。通常有两种导航方向：\n\n-   移动到下一个屏幕\n- \
    \  返回到上一个屏幕\n\n假设您有一个带有 `@IBAction` 函数的“下一步”按钮。该函数中的第一行代码应该是：\n\n```\nview.endEditing(true)\n\
    ```\n\n至于返回，解决方案类似。在第 4 章中，我们创建了一个通用函数 `goBack`。食谱 6-11 对其进行了更新以隐藏键盘。如果键盘未显示，这也不会对应用程序造成损害。\n\
