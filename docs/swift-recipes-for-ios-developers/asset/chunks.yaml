    return nil

    }

    ```


    Types of both `ptr` and `ptrMask` are `UnsafeMutablePointer<UInt8>`. If you worked
    with the C language family (including Objective-C), it’s the same as `unsigned
    char *`. It can be indexed the same way as an array.


    As both contexts were initialized with `nil`, we need to draw the original image
    and mask on these contexts:


    ```

    context.draw(originalCGImage, in: CGRect(x: 0, y: 0, width: originalCGImage.width,
    height: originalCGImage.height))

    contextMask.draw(maskCGImage, in: CGRect(x: 0, y: 0, width: maskCGImage.width,
    height: maskCGImage.height))

    ```


    Then pixel by pixel, we apply the mask:


    ```

    for y in 0..= maskCGImage.width || y >= maskCGImage.height {

    ptr[pixelOffset + 3] = 0

    } else {

    ptr[pixelOffset + 3] = UInt8((UInt(ptrMask[maskPixelOffset]) + UInt(ptrMask[maskPixelOffset
    + 1]) + UInt(ptrMask[maskPixelOffset])) / 3)

    }

    ptr[pixelOffset] = UInt8(UInt(ptr[pixelOffset]) * UInt(ptr[pixelOffset + 3]) /
    255)

    ptr[pixelOffset + 1] = UInt8(UInt(ptr[pixelOffset + 1]) * UInt(ptr[pixelOffset
    + 3]) / 255)

    ptr[pixelOffset + 2] = UInt8(UInt(ptr[pixelOffset + 2]) * UInt(ptr[pixelOffset
    + 3]) / 255)

    }

    }

    ```


    The constants `lineOffset` and `maskLineOffset` indicate the start pointer of
    each line. We can calculate it for each pixel, but it’s faster to save them for
    each line.


    Multiple conversions to `UInt` and `UInt8` are an essential part of the calculation.
    We can’t safely add two UInt8 variables without a risk of overflow. Before assigning
    it back to `ptr`, we need to convert the result back to `UInt8`. Of course, after
    calculation, it should be in the range from 0 to 255.


    This algorithm is not the most optimized. This is just a generic solution. Having
    a particular task, it’s possible to optimize it as needed.


    ## Effects and Filters


    It’s possible to apply filters working directly with pixel buffer or with Image
    Context, but it’s not the most efficient way. Modern iOS devices have good GPUs,
    which are optimized to do image processing.


    ### CoreImage


    Apple offers the CoreImage framework, which has hardware-accelerated filters for
    images. Recipe [5-25](#515103_1_En_5_Chapter.xhtml#PC40) shows how to apply a
    Gaussian blur to the `UIImage` object :


    ```

    import CoreImage

    extension UIImage {

    func gaussianBlur(radius: CGFloat) -> UIImage? {

    let ciContext = CIContext(options: nil)

    guard let blurFilter = CIFilter(name: "CIGaussianBlur") else {

    return nil

    }

    blurFilter.setValue(CIImage(image: self), forKey: "inputImage")

    blurFilter.setValue(radius, forKey: "inputRadius")

    guard let outputImageData = blurFilter.value(forKey: "outputImage") as? CIImage,

    let outputImage = ciContext.createCGImage(outputImageData, from: outputImageData.extent)

    else {

    return nil

    }

    return UIImage(cgImage: outputImage)

    }

    }

    Recipe 5-25

    Gaussian Blur with CoreImage

    ```


    The problem of this framework is the lack of good protocols. Instead of predefined
    constants, methods, and classes, it uses `String` arguments for the filter type
    and arguments.


    ### GPUImage


    The GPUImage framework is an open-source library available on GitHub. The first
    generation of this framework was written in Objective-C back in 2013. More modern
    versions are GPUImage2 and GPUImage3\. They have similar interfaces; the difference
    is in the version of Swift.


    To add it, use one of the repositories on Brad Larson’s GitHub account: [`https://github.com/BradLarson`](https://github.com/BradLarson)
    . Repositories on this account have all the necessary documentation.


    Note


    GPUImage2 and GPUImage3 are not available via CocoaPods. You can use the Swift
    Package Manager instead.


    Using GPUImage, you can get comfortable shortcuts for the CoreImage features,
    plus additional filters and effects. Recipe [5-26](#515103_1_En_5_Chapter.xhtml#PC41)
    shows how to apply the same Gaussian blur with GPUImage:


    ```

    import GPUImage

    extension UIImage {

    func gaussianBlurGPU(radius: CGFloat) -> UIImage? {

    let blurFilter = GPUImageGaussianBlurFilter()

    blurFilter.blurRadiusInPixels = radius

    return blurFilter.image(byFilteringImage: self)

    }

    }

    Recipe 5-26

    Gaussian Blur with GPUImage

    ```


    ## GIF Animations


    Animated GIFs appeared in 1987 , but now they’re popular as never before. But
    they have two serious restrictions:


    *   They have indexed colors. Each GIF file has a palette containing up to 256
    colors. It can use the same color twice or more, but it can’t use more colors
    in the same picture.


    *   GIFs don’t support semitransparent pixels. If you show a GIF picture or animation
    over another picture, it will have a sharp edge.


    GIFs are good for small animations, not for clips or movies.


    iOS doesn’t show GIF animations out of the box. You need to write some code or
    use a library that will do it for you.


    ### AnimatedImageView from Kingfisher


    Kingfisher is a popular framework for downloading images from the Internet. It
    has an integrated caching system; it offers real-time image processing and ready-to-use
    views.


    To add Kingfisher using the Swift Package Manager, add the following link: [`https://github.com/onevcat/Kingfisher`](https://github.com/onevcat/Kingfisher)


    There’s also a pod for this. If you prefer CocoaPods, add this line:


    ```

    pod ''Kingfisher''

    ```


    One of those views is `AnimatedImageView` . It’s a subclass of `UIImageView`,
    which makes it easy to use. You can use it both locally and remove GIF files inside
    `AnimatedImageView`. Recipe [5-27](#515103_1_En_5_Chapter.xhtml#PC43) shows how
    to create it programmatically and play online GIFs in a loop.


    ```

    import Kingfisher

    func createAndPlayAnimatedImageView(parentView: UIView, gifURL: URL, delegate:
    AnimatedImageViewDelegate?) {

    let animatedImageView = AnimatedImageView(frame: parentView.bounds)

    animatedImageView.delegate = delegate

    animatedImageView.kf.setImage(with: gifURL, placeholder: nil, options: nil) {
    result in

    switch result {

    case .success:

    animatedImageView.startAnimating()

    case .failure(let error):

    print(error.localizedDescription)

    }

    }

    parentView.addSubview(animatedImageView)

    }

    Recipe 5-27

    Using AnimatedImageView

    ```


    Note


    If you use this code in a production environment, don’t forget about possible
    layout changes.'
