- fmt: "# Parallax Effect\n\nParallax effect in general is creating several layers\
    \ moving with different speeds. This effect is often used in 2D platformer games\
    \ or runners. Clouds behind the player move much slower than the player themselves.\
    \ At the same time, the front layer covering the character moves faster.\n\nIn\
    \ mobile apps, the parallax effect is often used as a screen header when content\
    \ is scrollable. It can be a food ordering app, showing the restaurant photo above\
    \ the menu. When the user scrolls the menu, the header should become smaller,\
    \ leaving the back button and restaurant name, possibly with the restaurant logo\
    \ or a card icon.\n\nThe parallax scrolling effect is not only moving from point\
    \ A to point B, but it should also be responsive. The header should dynamically\
    \ change when the user scrolls up and down (Figure [7-1](#515103_1_En_7_Chapter.xhtml#Fig1)).\n\
    \n![](images/515103_1_En_7_Chapter/515103_1_En_7_Fig1_HTML.png)\n\nA set of four\
    \ images represents the parallax effect in the user interface scroll view. The\
    \ first image has the label as the title on a grey background and labels for line\
    \ 1 to line 16\\. The consecutive images also have labels for line.\n\n**Figure\
    \ 7-1** Parallax effect\n\n## Parallax Header with UIScrollView\n\nA big part\
    \ of this feature is the user interface, so let’s prepare it first.\n\n### Preparing\
    \ User Interface\n\nIn this example, we’ll use a header containing the following\
    \ objects:\n\n*   `UIImageView` on the background. *Content mode* should be set\
    \ to *Aspect Fill*. This way, the background image will scale automatically, leaving\
    \ only part of the picture visible, but it will always fill the whole screen.\n\
    *   `UIView` shading. Background color will be black, but transparency (`alpha`)\
    \ will change from 0.3 to 0.8.\n*   `UIButton` will be a static back button, always\
    \ located in the top-left corner of the header.\n*   `UILabel` will display a\
    \ title. Large and centered when the header is expanded and small when the header\
    \ is shrunk.\n\nWhen the user scrolls `UIScrollView`, the header will change height\
    \ from 180 to 40\\. Scrolling back will reverse the process. In the full version\
    \ of code, all numbers will be declared as constants.\n\nThe `UIScrollView` object\
    \ should be located behind the header; otherwise, it will overlap the entire header.\
    \ At the same time, we can’t put it below. This needs a detailed explanation.\n\
    \nIf our scrollable area is located below the header, its position and size will\
    \ change every time the header height is changed. As the user’s finger won’t move,\
    \ it will change its position in a scrollable area system of coordinates. It may\
    \ look good, but usually it creates undesired shaking of scrolling offset.\n\n\
    Finally, we need to add some content to the scrollable area. Don’t forget that\
    \ it must have the margin from the top border, at least 180; otherwise, it will\
    \ be hidden behind the header. If you want to scroll the bar, you should also\
    \ add an inset in the Indicator Insets section in the storyboard editor. If not,\
    \ hide it.\n\nIf you’re done with storyboard editing, create the following outlets:\n\
    \n```\n// Views\n@IBOutlet weak var scrollView: UIScrollView!\n@IBOutlet weak\
    \ var headerView: UIView!\n@IBOutlet weak var shadeView: UIView!\n@IBOutlet weak\
    \ var titleLabel: UILabel!\n// Layout constraints\n@IBOutlet weak var headerHeightConstraint:\
    \ NSLayoutConstraint!\n@IBOutlet weak var titleLeadingConstraint: NSLayoutConstraint!\n\
    ```\n\nStarting values of constraints, `alpha`, font, and other parameters should\
    \ be the following:\n\n*   `shadeView.alpha` is 0.3.\n*   `titleLabel.font` is\
    \ `UIFont.systemFont(ofSize: 32)`.\n*   `headerHeightConstraint.constaint` is\
    \ 180.\n*   `titleLeadingConstraint.constaint` is 16.\n\nIf the layout is too\
    \ complicated, and you can’t build it using this instruction, you can find an\
    \ example in the GitHub repository.\n\n### Parallax Functionality\n\nWe need to\
    \ set a delegate of `UIScrollView`. It will be our `UIViewController`. This method\
    \ is called for every time the scroll position is changed:\n\n```\nfunc scrollViewDidScroll(_\
    \ scrollView: UIScrollView)\n```\n\nThe current scroll position is:\n\n```\nlet\
    \ scrollPosition = scrollView.contentOffset.y\n```\n\nTo calculate all the values,\
    \ we need to know current progress, which is a value from 0.0 to 1.0, where 0.0\
    \ is fully expanded and 1.0 is fully shrunk. How do we calculate shrink progress\
    \ from `scrollPosition`?\n\nWe need to decide the speed. The header range is 180\
    \ - 40 = 140\\. We could change from 0.0 to 1.0 when the user scrolls it by 140\
    \ pixels, but we’re building parallax effect, not another section in `UIScrollView`.\
    \ Let’s make it scroll half as slow. To make it happen, we need to divide `scrollPosition`\
    \ by 280\\. Recipe [7-5](#515103_1_En_7_Chapter.xhtml#PC11) shows the full version\
    \ of parallax effect code.\n\n```\nclass ParallaxViewController: UIViewController\
    \ {\n    // Views\n    @IBOutlet weak var scrollView: UIScrollView!\n    @IBOutlet\
    \ weak var headerView: UIView!\n    @IBOutlet weak var shadeView: UIView!\n  \
    \  @IBOutlet weak var titleLabel: UILabel!\n    // Layout constraints\n    @IBOutlet\
    \ weak var headerHeightConstraint: NSLayoutConstraint!\n    @IBOutlet weak var\
    \ titleLeadingConstraint: NSLayoutConstraint!\n\n    func setHeaderShrinkProgress(_\
    \ progress: CGFloat) {\n        let progressClamped = max(min(progress, 1.0),\
    \ 0.0)\n        headerHeightConstraint.constant =\n            ParallaxViewController.maxHeaderHeight\
    \ * (1.0 - progressClamped) +\n            ParallaxViewController.minHeaderHeight\
    \ * progressClamped\n        titleLeadingConstraint.constant =\n            ParallaxViewController.maxLabelOffset\
    \ * progressClamped +\n            ParallaxViewController.minLabelOffset * (1.0\
    \ - progressClamped)\n        titleLabel.font = UIFont.systemFont(\n         \
    \   ofSize: ParallaxViewController.minTitleFontSize * progressClamped +\n    \
    \        ParallaxViewController.maxTitleFontSize * (1.0 - progressClamped))\n\
    \        shadeView.alpha =\n            ParallaxViewController.minShadeAlpha *\
    \ (1.0 - progressClamped) +\n            ParallaxViewController.maxShadeAlpha\
    \ * progressClamped\n        headerView.layoutIfNeeded()\n    }\n\n    static\
    \ let minHeaderHeight = CGFloat(40)\n    static let maxHeaderHeight = CGFloat(180)\n\
    \    static let minTitleFontSize = CGFloat(14)\n    static let maxTitleFontSize\
    \ = CGFloat(32)\n    static let minLabelOffset = CGFloat(16)\n    static let maxLabelOffset\
    \ = CGFloat(56)\n    static let minShadeAlpha = CGFloat(0.3)\n    static let maxShadeAlpha\
    \ = CGFloat(0.8)\n}\n\nextension ParallaxViewController: UIScrollViewDelegate\
    \ {\n    func scrollViewDidScroll(_ scrollView: UIScrollView) {\n        let scrollPosition\
    \ = scrollView.contentOffset.y\n        let progress = scrollPosition / 280.0\n\
    \        setHeaderShrinkProgress(progress)\n    }\n}\n```\n\n**Recipe 7-5** Parallax\
    \ Effect\n\nCongratulations! This is our working parallax header. Method `setHeaderShrinkProgress`\
    \ is just doing math using the same formula:\n\n```\nfinalValue = expandedValue\
    \ * (1.0 - progress) + shrinkedValue * progress\n```\n\nTo make sure all our values\
    \ stay in range, we clamp progress, limiting its values from 0.0 to 1.0 in the\
    \ first line."
  raw: '## Parallax Effect


    Parallax effect in general is creating several layers moving with different speeds.
    This effect is often used in 2D platformer games or runners. Clouds behind the
    player move much slower than the player themselves. At the same time, the front
    layer covering the character moves faster.


    In mobile apps, the parallax effect is often used as a screen header when content
    is scrollable. It can be a food ordering app, showing the restaurant photo above
    the menu. When the user scrolls the menu, the header should become smaller, leaving
    the back button and restaurant name, possibly with the restaurant logo or a card
    icon.


    The parallax scrolling effect is not only moving from point A to point B, but
    it should also be responsive. The header should dynamically change when the user
    scrolls up and down (Figure [7-1](#515103_1_En_7_Chapter.xhtml#Fig1)).


    ![](images/515103_1_En_7_Chapter/515103_1_En_7_Fig1_HTML.png)


    A set of four images represents the parallax effect in the user interface scroll
    view. The first image has the label as the title on a grey background and labels
    for line 1 to line 16\. The consecutive images also have labels for line.


    Figure 7-1


    Parallax effect


    ### Parallax Header with UIScrollView


    A big part of this feature is the user interface, so let’s prepare it first.


    #### Preparing User Interface


    In this example, we’ll use a header containing the following objects:


    *   `UIImageView` on the background. *Content mode* should be set to *Aspect Fill*.
    This way, the background image will scale automatically, leaving only part of
    the picture visible, but it will always fill the whole screen.


    *   `UIView` shading. Background color will be black, but transparency (alpha)
    will change from 0.3 to 0.8.


    *   `UIButton` will be a static back button, always located in the top-left corner
    of the header.


    *   `UILabel` will display a title. Large and centered when the header is expanded
    and small when the header is shrunk.


    When the user scrolls `UIScrollView`, the header will change height from 180 to
    40\. Scrolling back will reverse the process. In the full version of code, all
    numbers will be declared as constants.


    `The UIScrollView` object should be located behind the header; otherwise, it will
    overlap the entire header. At the same time, we can’t put it below. This needs
    a detailed explanation.


    If our scrollable area is located below the header, its position and size will
    change every time the header height is changed. As the user’s finger won’t move,
    it will change its position in a scrollable area system of coordinates. It may
    look good, but usually it creates undesired shaking of scrolling offset.


    Finally, we need to add some content to the scrollable area. Don’t forget that
    it must have the margin from the top border, at least 180; otherwise, it will
    be hidden behind the header. If you want to scroll the bar, you should also add
    an inset in the Indicator Insets section in the storyboard editor. If not, hide
    it.


    If you’re done with storyboard editing, create the following outlets:


    ```

    // Views

    @IBOutlet weak var scrollView: UIScrollView!

    @IBOutlet weak var headerView: UIView!

    @IBOutlet weak var shadeView: UIView!

    @IBOutlet weak var titleLabel: UILabel!

    // Layout constraints

    @IBOutlet weak var headerHeightConstraint: NSLayoutConstraint!

    @IBOutlet weak var titleLeadingConstraint: NSLayoutConstraint!

    ```


    Starting values of constraints, alpha, font, and other parameters should be the
    following:


    *   shadeView.alpha is 0.3.


    *   titleLabel.font is UIFont.systemFont(ofSize: 32).


    *   headerHeightConstraint.constaint is 180.


    *   titleLeadingConstraint.constaint is 16.


    If the layout is too complicated, and you can’t build it using this instruction,
    you can find an example in the GitHub repository .


    #### Parallax Functionality


    We need to set a delegate of `UIScrollView` . It will be our `UIViewController`.
    This method is called for every time the scroll position is changed:


    ```

    func scrollViewDidScroll(_ scrollView: UIScrollView)

    ```


    The current scroll position is


    ```

    let scrollPosition = scrollView.contentOffset.y

    ```


    To calculate all the values, we need to know current progress, which is a value
    from 0.0 to 1.0, where 0.0 is fully expanded and 1.0 is fully shrunk. How do we
    calculate shrink progress from `scrollPosition`?


    We need to decide the speed. The header range is 180 - 40 = 140\. We could change
    from 0.0 to 1.0 when the user scrolls it by 140 pixels, but we’re building parallax
    effect, not another section in `UIScrollView`. Let’s make it scroll half as slow.
    To make it happen, we need to divide `scrollPosition` by 280\. Recipe [7-5](#515103_1_En_7_Chapter.xhtml#PC11)
    shows the full version of parallax effect code.


    ```

    class ParallaxViewController: UIViewController {

    // Views

    @IBOutlet weak var scrollView: UIScrollView!

    @IBOutlet weak var headerView: UIView!

    @IBOutlet weak var shadeView: UIView!

    @IBOutlet weak var titleLabel: UILabel!

    // Layout constraints

    @IBOutlet weak var headerHeightConstraint: NSLayoutConstraint!

    @IBOutlet weak var titleLeadingConstraint: NSLayoutConstraint!

    func setHeaderShrinkProgress(_ progress: CGFloat) {

    let progressClamped = max(min(progress, 1.0), 0.0)

    headerHeightConstraint.constant =

    ParallaxViewController.maxHeaderHeight * (1.0 - progressClamped) +

    ParallaxViewController.minHeaderHeight * progressClamped

    titleLeadingConstraint.constant =

    ParallaxViewController.maxLabelOffset * progressClamped +

    ParallaxViewController.minLabelOffset * (1.0 - progressClamped)

    titleLabel.font = UIFont.systemFont(

    ofSize: ParallaxViewController.minTitleFontSize * progressClamped +

    ParallaxViewController.maxTitleFontSize * (1.0 - progressClamped))

    shadeView.alpha =

    ParallaxViewController.minShadeAlpha * (1.0 - progressClamped) +

    ParallaxViewController.maxShadeAlpha * progressClamped

    headerView.layoutIfNeeded()

    }

    static let minHeaderHeight = CGFloat(40)

    static let maxHeaderHeight = CGFloat(180)

    static let minTitleFontSize = CGFloat(14)

    static let maxTitleFontSize = CGFloat(32)

    static let minLabelOffset = CGFloat(16)

    static let maxLabelOffset = CGFloat(56)

    static let minShadeAlpha = CGFloat(0.3)

    static let maxShadeAlpha = CGFloat(0.8)

    }

    extension ParallaxViewController: UIScrollViewDelegate {

    func scrollViewDidScroll(_ scrollView: UIScrollView) {

    let scrollPosition = scrollView.contentOffset.y

    let progress = scrollPosition / 280.0

    setHeaderShrinkProgress(progress)

    }

    }

    Recipe 7-5

    Parallax Effect

    ```


    Congratulations! This is our working parallax header. Method `setHeaderShrinkProgress`
    is just doing math using the same formula:


    ```

    finalValue = expandedValue * (1.0 - progress) + shrinkedValue * progress

    ```


    To make sure all our values stay in range, we clamp progress, limiting its values
    from 0.0 to 1.0 in the first line.'
  trans: "\n# 视差效果\n\n视差效果通常指创建多个以不同速度移动的图层。这种效果常用于 2D 平台游戏或跑酷类游戏中。玩家身后的云层移动速度远慢于玩家本身，而覆盖角色的前景层则移动得更快。\n\
    \n在移动应用中，视差效果常被用作可滚动内容的屏幕标题栏。例如在订餐应用中，菜单上方会显示餐厅照片。当用户滚动菜单时，标题栏会缩小，仅保留返回按钮和餐厅名称，有时还会显示餐厅标识或购物车图标。\n\
    \n视差滚动效果不仅是从 A 点移动到 B 点，还应当具备响应性。当用户上下滚动时，标题栏需要动态变化（图 7-1）。\n\n![](img/515103_1_En_7_Fig1_HTML.png)\n\
    \n一组四张图片展示了用户界面滚动视图中的视差效果。第一张图片在灰色背景上显示标题标签，以及第 1 行到第 16 行的标签。后续图片也包含行标签。\n\n\
    **图 7-1** 视差效果\n\n## 使用 UIScrollView 实现视差标题栏\n\n此功能的核心在于用户界面，因此我们先准备好界面。\n\n###\
    \ 准备用户界面\n\n在本示例中，我们将使用一个包含以下对象的标题栏：\n\n*   背景中的 `UIImageView`。其*内容模式*应设置为*等比例填充*。这样，背景图像会自动缩放，虽然只显示部分画面，但始终充满整个屏幕。\n\
    *   `UIView` 遮罩层。背景色设为黑色，透明度（`alpha`）从 0.3 变化到 0.8。\n*   `UIButton` 作为静态返回按钮，始终位于标题栏的左上角。\n\
    *   `UILabel` 用于显示标题。标题栏展开时字号大且居中；标题栏收缩时字号小。\n\n当用户滚动 `UIScrollView` 时，标题栏高度从\
    \ 180 变为 40。向上滚动则逆转此过程。在完整代码中，所有数值均声明为常量。\n\n`UIScrollView` 对象应位于标题栏后方，否则会覆盖整个标题栏。同时，我们也不能将其置于标题栏下方，这需要详细解释。\n\
    \n如果可滚动区域位于标题栏下方，则其位置和尺寸会随标题栏高度变化而改变。由于用户手指位置不变，这会在可滚动区域的坐标系中改变位置。效果看似不错，但通常会导致滚动偏移量出现不期望的抖动。\n\
    \n最后，我们需要向可滚动区域添加一些内容。别忘了，它必须与顶部边界保持至少 180 的边距，否则会被标题栏遮挡。如果需要滚动条，还应在故事板编辑器的指示器边距（Indicator\
    \ Insets）部分添加内边距。否则，请隐藏滚动条。\n\n完成故事板编辑后，创建以下插口：\n\n```\n// 视图\n@IBOutlet weak\
    \ var scrollView: UIScrollView!\n@IBOutlet weak var headerView: UIView!\n@IBOutlet\
    \ weak var shadeView: UIView!\n@IBOutlet weak var titleLabel: UILabel!\n// 布局约束\n\
    @IBOutlet weak var headerHeightConstraint: NSLayoutConstraint!\n@IBOutlet weak\
    \ var titleLeadingConstraint: NSLayoutConstraint!\n```\n\n约束、`alpha`、字体等参数的初始值应为：\n\
    \n*   `shadeView.alpha` 为 0.3。\n*   `titleLabel.font` 为 `UIFont.systemFont(ofSize:\
    \ 32)`。\n*   `headerHeightConstraint.constaint` 为 180。\n*   `titleLeadingConstraint.constaint`\
    \ 为 16。\n\n如果布局过于复杂，无法按此说明构建，你可以在 GitHub 仓库中找到示例。\n\n### 视差功能\n\n我们需要为 `UIScrollView`\
    \ 设置代理。代理将是我们自己的 `UIViewController`。每次滚动位置变化时，都会调用以下方法：\n\n```\nfunc scrollViewDidScroll(_\
    \ scrollView: UIScrollView)\n```\n\n当前滚动位置为：\n\n```\nlet scrollPosition = scrollView.contentOffset.y\n\
    ```\n\n要计算所有值，我们需要知道当前进度，这是一个从 0.0 到 1.0 的值，其中 0.0 表示完全展开，1.0 表示完全收缩。如何根据 `scrollPosition`\
    \ 计算收缩进度呢？\n\n我们需要确定速度。标题栏的高度范围是 180 - 40 = 140。当用户滚动 140 像素时，进度可从 0.0 变为 1.0，但我们在构建视差效果，而不是\
    \ `UIScrollView` 中的另一个分段。让我们将滚动速度减慢一半。为此，我们需要将 `scrollPosition` 除以 280。代码清单 7-5\
    \ 展示了视差效果的完整代码。\n\n```\nclass ParallaxViewController: UIViewController {\n   \
    \ // 视图\n    @IBOutlet weak var scrollView: UIScrollView!\n    @IBOutlet weak\
    \ var headerView: UIView!\n    @IBOutlet weak var shadeView: UIView!\n    @IBOutlet\
    \ weak var titleLabel: UILabel!\n    // 布局约束\n    @IBOutlet weak var headerHeightConstraint:\
    \ NSLayoutConstraint!\n    @IBOutlet weak var titleLeadingConstraint: NSLayoutConstraint!\n\
    \n    func setHeaderShrinkProgress(_ progress: CGFloat) {\n        let progressClamped\
    \ = max(min(progress, 1.0), 0.0)\n        headerHeightConstraint.constant =\n\
    \            ParallaxViewController.maxHeaderHeight * (1.0 - progressClamped)\
    \ +\n            ParallaxViewController.minHeaderHeight * progressClamped\n  \
    \      titleLeadingConstraint.constant =\n            ParallaxViewController.maxLabelOffset\
    \ * progressClamped +\n            ParallaxViewController.minLabelOffset * (1.0\
    \ - progressClamped)\n        titleLabel.font = UIFont.systemFont(\n         \
    \   ofSize: ParallaxViewController.minTitleFontSize * progressClamped +\n    \
    \        ParallaxViewController.maxTitleFontSize * (1.0 - progressClamped))\n\
    \        shadeView.alpha =\n            ParallaxViewController.minShadeAlpha *\
    \ (1.0 - progressClamped) +\n            ParallaxViewController.maxShadeAlpha\
    \ * progressClamped\n        headerView.layoutIfNeeded()\n    }\n\n    static\
    \ let minHeaderHeight = CGFloat(40)\n    static let maxHeaderHeight = CGFloat(180)\n\
    \    static let minTitleFontSize = CGFloat(14)\n    static let maxTitleFontSize\
    \ = CGFloat(32)\n    static let minLabelOffset = CGFloat(16)\n    static let maxLabelOffset\
    \ = CGFloat(56)\n    static let minShadeAlpha = CGFloat(0.3)\n    static let maxShadeAlpha\
    \ = CGFloat(0.8)\n}\n\nextension ParallaxViewController: UIScrollViewDelegate\
    \ {\n    func scrollViewDidScroll(_ scrollView: UIScrollView) {\n        let scrollPosition\
    \ = scrollView.contentOffset.y\n        let progress = scrollPosition / 280.0\n\
    \        setHeaderShrinkProgress(progress)\n    }\n}\n```\n\n**代码清单 7-5** 视差效果\n\
    \n恭喜！这就是我们可用的视差标题栏。`setHeaderShrinkProgress` 方法只是使用相同的公式进行计算：\n\n```\nfinalValue\
    \ = expandedValue * (1.0 - progress) + shrinkedValue * progress\n```\n\n为确保所有值保持在范围内，我们在第一行对进度进行了钳制，将其值限制在\
    \ 0.0 到 1.0 之间。\n"
- fmt: '# Parallax Header with UITableView and UICollectionView


    Having code for parallax effect with `UIScrollView`, we can easily make parallax
    effect with `UITableView` or `UICollectionView`. The thing is that both of these
    views are subclasses of `UIScrollView`, so when you set a delegate, it automatically
    sets `UIScrollViewDelegate`.


    Still, we need to make some changes both in the code and in the storyboard.


    First, change `UIScrollView` to `UITableView`. Add indicator inset like you did
    before and create a cell prototype to make some demo content. In the following
    recipe, it’s just one `UILabel` with tag property equal to 1.


    Then we need to add content inset:


    ```

    tableView.contentInset = UIEdgeInsets(top: ParallaxTableViewController.maxHeaderHeight,
    left: 0, bottom: 0, right: 0)

    ```


    Progress calculation is also changed, as now it counts from -180, not from 0.


    ```

    func scrollViewDidScroll(_ scrollView: UIScrollView)

    { let scrollPosition = scrollView.contentOffset.y

    let progress = (scrollPosition + ParallaxTableViewController.maxHeaderHeight)
    / 280.0

    setHeaderShrinkProgress(progress)}

    ```


    And finally, we need to implement `UITableViewDataSource`. Don’t forget to set
    both `delegate` and `dataSource`. Recipe [7-6](#515103_1_En_7_Chapter.xhtml#PC15)
    has the final code:


    ```

    class ParallaxTableViewController: UIViewController {

    // Views

    @IBOutlet weak var tableView: UIScrollView!

    @IBOutlet weak var headerView: UIView!

    @IBOutlet weak var shadeView: UIView!

    @IBOutlet weak var titleLabel: UILabel!

    // Layout constraints

    @IBOutlet weak var headerHeightConstraint: NSLayoutConstraint!

    @IBOutlet weak var titleLeadingConstraint: NSLayoutConstraint!

    override func viewDidLoad() {

    super.viewDidLoad()

    tableView.contentInset = UIEdgeInsets(

    top: ParallaxTableViewController.maxHeaderHeight, left: 0,

    bottom: 0, right: 0)

    }

    func setHeaderShrinkProgress(_ progress: CGFloat) {

    let progressClamped = max(min(progress, 1.0), 0.0)

    headerHeightConstraint.constant =

    ParallaxTableViewController.maxHeaderHeight * (1.0 - progressClamped) +

    ParallaxTableViewController.minHeaderHeight * progressClamped

    titleLeadingConstraint.constant =

    ParallaxTableViewController.maxLabelOffset * progressClamped +

