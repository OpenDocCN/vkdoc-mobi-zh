    ## Unit Conversion


    In certain cases, you need to make a conversion within the same data type, for
    example, if you get a measurement in centimeters but you need the data in inches.
    Or you got miles from the API, but you understand distance in kilometers.


    As conversion multipliers are not integers, it’s better to use a `Double` type
    even if values don’t have fractional parts.


    ### Distance and Length Units


    Let’s assume that we need to calculate the total travel distance between London
    and Berlin. The airline company tells us that the flight is 580 miles long. The
    trip to the airport is 24300 yards. And to reach our hotel in Berlin, we need
    to travel 10400 meters. All is well, but you want the result in kilometers.


    Computers were created for such calculations. After we write all the extensions,
    the resulting code will be like this:


    ```

