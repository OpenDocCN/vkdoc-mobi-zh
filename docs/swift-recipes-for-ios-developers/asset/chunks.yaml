- fmt: '# Preparing and Showing Profile Pictures


    We can''t control the geometry of the photos the user takes. If we pull said photos
    from social networks, we have even less control. There''s always the option to
    show an error if the user tries to download a picture of wrong size or wrong aspect
    ratio, but it will create a bad user experience.


    A better solution is to process the picture before uploading. We usually want
    to limit the picture size and make it square. Let''s say, in our example, we''ll
    limit it to 512 `×` 512 pixels.


    ## Processing Profile Pictures Before Uploading


    Having previously written extensions, we can prepare profile picture in just one
    line of code as shown in Recipe [5-18](#515103_1_En_5_Chapter.xhtml#PC25). Here''s
    our algorithm:


    - The user takes a picture. The source doesn''t matter; it can be a camera or
    gallery.

    - If both width and height are bigger than 512 pixels, we downscale it, so at
    least one of the dimensions will be 512 pixels (the other one will be bigger).

    - If the width is not equal to the height, we crop the image. To make it simple,
    we''ll cut pixels equally from both sides.


    ```

    extension UIImage {

    func prepareProfilePicture() -> UIImage {

    squared?.downscaled(maxSize: 512) ?? self

    }

    }

    Recipe 5-18

    Processing an Image to Upload As Profile Picture

    ```


    As you can see, this is a combination of previously written functions. We can
    return an optional `UIImage` if one of them fails. An alternative option is to
    return the original image as in the preceding recipe.


    ## Showing Profile Pictures


    If the profile picture is properly prepared, we can be sure that it''s going to
    be a square, each dimension not bigger than 512 pixels. On the other hand, mistakes
    happen. Fortunately, `UIImageView` can show any picture as a square, a rounded
    square, or even a circle, depending on the design needed (see Figure [5-3](#515103_1_En_5_Chapter.xhtml#Fig3)
    and Recipe [5-19](#515103_1_En_5_Chapter.xhtml#PC26)).


    ![](images/515103_1_En_5_Chapter/515103_1_En_5_Fig3_HTML.jpg)


    An image of a mobile screen displaying pictures in a rectangle and circle outline,
    and its properties. Some of the properties such as shadow offset, border color
    and semantic are given.


    **Figure 5-3** Universal profile picture view


    ```

    class ProfilePicture: UIImageView {

    override init(frame: CGRect) {

    super.init(frame: frame)

    commonInit()

    }

    required init?(coder: NSCoder) {

