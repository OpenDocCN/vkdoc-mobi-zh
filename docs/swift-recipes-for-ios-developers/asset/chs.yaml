- "# 1. 处理数据\n\n数据处理是所有计算设备的核心功能。而 iPhone 就是移动计算机。你在社交网络上的个人资料、网站上的 Cookie、电子邮件和短信，甚至是用户界面——所有这些都是数据结构。例如，iOS\
  \ storyboard 具有 XML 格式；你可以在文本编辑器中打开它们。\n\n因此，将学习如何处理数据作为起点非常重要。我们将处理代表二进制数据的 `Data`\
  \ 类；我们将转换数据类型并处理转换错误，从 `Dictionary` 和 `Array`（它们是 XML、JSON 及其他交换格式的 Swift 表示）中提取数据，并创建这些结构以将数据传递给\
  \ API。最后，我们将讨论序列化和反序列化，这是数据处理中极其重要的概念。\n\n## 数据类型之间的转换\n\n所有编程语言都有基本数据类型和更复杂的结构——Swift\
  \ 也不例外。Swift 中的基本类型如下：\n\n- `Int` – 整数。例如，1、15 或 -1536。根据架构，它可以是 32 位或 64 位数字。所有现代\
  \ Apple 设备都配备 64 位处理器。在这些平台上，`Int` 的范围是从 −2⁶³ 到 2⁶³ − 1。如果你需要使用更大或更小的范围，可以在类型名称中添加位宽整数（存储一个值所需的内存位数）。例如\
  \ `Int16` 和 `Int64`。无符号整数具有 `UInt` 类型。\n- `Float` 和 `Double` – 浮点数，分别为 32 位和 64\
  \ 位。这些类型在 UI 开发中被广泛使用。屏幕上的所有坐标都是浮点数。`Float` 的范围是 1.2 * 10^(-38) 到 3.4 * 10³⁸。`Double`\
  \ 的范围是 2.3 * 10^(-308) 到 1.7 * 10³⁰⁸。浮点数的一个例子是 3.14159265359。\n- `Bool` – 布尔值，只能取两个值之一：`true`\
  \ 或 `false`。用于逻辑表达式和存储简单值（是/否）。\n- `String` – 文本数据。在 Swift 中，它是一个 Unicode 文本字符串，这意味着它可以包含所有语言的文本，甚至表情符号。\n\
  - `Character` – 单个字符。在 Swift 中，它是一个 16 位的值。\n\n除了基本类型之外，还有数百种更复杂的类型，这些类型是包含基本类型或其他类型的结构。\n\
  \n数据转换是什么意思？Swift 是一种强类型语言，虽然像 C 或 JavaScript 这样的语言允许这样的场景：`a = 1 if (a) ...`，但在\
  \ Swift 中是不允许的。你只能在 `if` 语句中使用布尔变量，并且只能将 `Double` 值赋值给 `Double` 变量，甚至不能赋值给 `Float`\
  \ 变量。这有助于避免许多错误，但迫使开发者手动执行数据转换。还有更复杂的数据转换示例。例如，`1` 和 `\"1\"` 不是一回事，尽管乍一看可能如此。第一种情况是整数值，而第二种情况是文本（`String`\
  \ 或 `Character`）。要将一种类型转换为另一种类型，需要编写额外的代码。并且务必不要忘记可能的问题。如果 `String` 中的值对于 `Int`\
  \ 来说太大怎么办？如果它不是一个数字怎么办？如果它是 `\"1\"`、`true` 或 `false` 怎么办？\n\n### 安全的数字转换\n\n如果你有几种不同的数字类型，例如\
  \ `Int` 和 `Double`，可以这样转换它们：\n\n```\nlet d: Double = 1.0\nlet i = Int(d)\n```\n\n\
  在前面的示例中，变量 `i` 的值将为 `1`。如果 `d` 的值不在 `i` 的范围内，你将会得到一个……崩溃：\n\n```\nlet d: Double\
  \ = 1000000000.0\nlet i = Int16(d)\n```\n\n输出：`Fatal error: Double value cannot\
  \ be converted to Int16 because the result would be greater than Int16.max.`\n\n\
  解决方案是使用可选的构造器 `init?(exactly:)`：\n\n```\nlet d: Double = 1000000000.0\nlet i = Int16(exactly:\
  \ d)\n```\n\n变量 `i` 将是可选的，并且具有 `Int16?` 类型，应用程序不会崩溃，而是会变成 `nil`。还有一个严重的问题——`init?(exactly:)`\
  \ 仅在浮点值没有小数部分时才返回非 nil 值。如果 `d` 是 `10.5`，转换将返回 `nil`。这个问题有一个很好的解决方案——`rounded()`\
  \ 方法。它解决了两个问题：\n\n- 它允许精确转换——`10.9` 不会再返回 `nil`。\n- 它按照数学规则对数字进行四舍五入。例如，`10.9` 将变成\
  \ `11`。\n\n如果四舍五入不是期望的行为，还有另一个选项——`floor` 函数。例如：\n\n```\nvar i = Int16(exactly:\
  \ trunc(d))\n```\n\n最后，让我们使其更加通用，并允许 `d` 成为可选值：\n\n```\nextension Double {\n   \
  \ var asInt16: Int16? {\n        Int16(exactly: self.rounded())\n    }\n}\nlet d1:\
  \ Double? = 1000000000.0\nlet d2: Double? = 10.9\nlet i1 = d1?.asInt16    // nil\n\
  let i2 = d2?.asInt16    // 11\n```\n\n在食谱 1-1 中，我们对 `Double` 类进行了扩展。它会自动在 `Double?`\
  \ 上工作。它简单、100% 安全且通用。\n\n\n\n```swift\npublic extension Int8 {\n    var asInt16:\
  \ Int16 { Int16(self) }\n    var asInt32: Int32 { Int32(self) }\n    var asInt64:\
  \ Int64 { Int64(self) }\n    var asInt: Int { Int(self) }\n    var asUInt8: UInt8?\
  \ { UInt8(exactly: self) }\n    var asUInt16: UInt16? { UInt16(exactly: self) }\n\
  \    var asUInt32: UInt32? { UInt32(exactly: self) }\n    var asUInt64: UInt64?\
  \ { UInt64(exactly: self) }\n    var asUInt: UInt? { UInt(exactly: self) }\n   \
  \ var asFloat: Float { Float(self) }\n    var asDouble: Double { Double(self) }\n\
  }\n\npublic extension UInt8 {\n    var asInt8: Int8? { Int8(exactly: self) }\n \
  \   var asInt16: Int16 { Int16(self) }\n    var asInt32: Int32 { Int32(self) }\n\
  \    var asInt64: Int64 { Int64(self) }\n    var asInt: Int { Int(self) }\n    var\
  \ asUInt16: UInt16 { UInt16(self) }\n    var asUInt32: UInt32 { UInt32(self) }\n\
  \    var asUInt64: UInt64 { UInt64(self) }\n    var asUInt: UInt { UInt(self) }\n\
  \    var asFloat: Float { Float(self) }\n    var asDouble: Double { Double(self)\
  \ }\n}\n\npublic extension Int16 {\n    var asInt8: Int8? { Int8(exactly: self)\
  \ }\n    var asInt32: Int32 { Int32(self) }\n    var asInt64: Int64 { Int64(self)\
  \ }\n    var asInt: Int { Int(self) }\n    var asUInt8: UInt8? { UInt8(exactly:\
  \ self) }\n    var asUInt16: UInt16? { UInt16(exactly: self) }\n    var asUInt32:\
  \ UInt32? { UInt32(exactly: self) }\n    var asUInt64: UInt64? { UInt64(exactly:\
  \ self) }\n    var asUInt: UInt? { UInt(exactly: self) }\n    var asFloat: Float\
  \ { Float(self) }\n    var asDouble: Double { Double(self) }\n}\n\npublic extension\
  \ UInt16 {\n    var asInt8: Int8? { Int8(exactly: self) }\n    var asInt16: Int16?\
  \ { Int16(exactly: self) }\n    var asInt32: Int32 { Int32(self) }\n    var asInt64:\
  \ Int64 { Int64(self) }\n    var asInt: Int { Int(self) }\n    var asUInt8: UInt8?\
  \ { UInt8(exactly: self) }\n    var asUInt32: UInt32 { UInt32(self) }\n    var asUInt64:\
  \ UInt64 { UInt64(self) }\n    var asUInt: UInt { UInt(self) }\n    var asFloat:\
  \ Float { Float(self) }\n    var asDouble: Double { Double(self) }\n}\n\npublic\
  \ extension Int32 {\n    var asInt8: Int8? { Int8(exactly: self) }\n    var asInt16:\
  \ Int16? { Int16(exactly: self) }\n    var asInt64: Int64 { Int64(self) }\n    var\
  \ asInt: Int { Int(self) }\n    var asUInt8: UInt8? { UInt8(exactly: self) }\n \
