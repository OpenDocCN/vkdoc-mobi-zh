  \n```\nif string.isEmpty {\n    return true\n}\n```\n\n然后，我们按照本章之前讨论的方式计算`updatedText`。\n\
  \n```\nlet updatedText = text.replacingCharacters(in: textRange, with: string)\n\
  ```\n\n现在，当我们得到更新后的文本后，我们尝试将其解析为电话号码，并使用`countryId`作为参数，将其格式化为国家号码。`formattedString`要么包含格式化后的号码，要么为`nil`。如果它有内容，我们就将其设置为新文本。\n\
  \n这部分需要特别注意，因为它非常重要。我们不能直接设置文本，因为`textField`的更改发生在`true`返回之后。如果我们在此函数内部更改文本属性，它将被覆盖。这就是为什么我们将其包装在`DispatchQueue.main.async`中。\n\
  \n```\nDispatchQueue.main.async {\n    textField.text = formattedString\n}\n```\n\
  \n### 格式化银行卡号\n\n信用卡号格式化背后的思路与电话号码格式化完全相同，但在这种情况下，我们不需要任何库。配方 6-4 展示了如何实现。\n\n```\n\
  extension String {\n    func group(by groupSize: Int = 4, separator: String = \"\
  \ \") -> String {\n        if count < groupSize {\n            return self\n   \
  \     }\n        let startIndex = self.startIndex\n        let endIndex = self.index(startIndex,\
  \ offsetBy: groupSize)\n        let firstGroup = self[startIndex..<endIndex]\n \
  \       let rest = String(self[endIndex...])\n        return firstGroup + separator\
  \ + rest.group(by: groupSize, separator: separator)\n    }\n}\n\nclass CardViewController:\
  \ UIViewController, UITextFieldDelegate {\n    @IBOutlet weak var cardTextField:\
  \ UITextField!\n\n    func textField(_ textField: UITextField, shouldChangeCharactersIn\
  \ range: NSRange, replacementString string: String) -> Bool {\n        if string.isEmpty\
  \ {\n            return true\n        }\n        if let text = textField.text,\n\
  \           let textRange = Range(range, in: text) {\n            let updatedText\
  \ = text\n                .replacingCharacters(in: textRange, with: string)\n  \
  \              .filter(\"0123456789\".contains)\n            let formattedString\
  \ = updatedText.group()\n                .trimmingCharacters(in: .whitespacesAndNewlines)\n\
  \            DispatchQueue.main.async {\n                textField.text = formattedString\n\
  \            }\n        }\n        return true\n    }\n}\n```\n\n**配方 6-4**  \n\
  **在 UITextField 中格式化银行卡号**\n\n在实际生活中，信用卡号可能更复杂，但我们只是将数字按四位一组进行分组。在更复杂的情况下，我们可以通过前几位数字检测卡的类型，并应用适当的格式化。\n\
  \n获取`updatedText`后，我们只保留数字并丢弃所有其他字符（即空格）。然后我们在每四位数字后添加一个空格，并在`DispatchQueue.main.async`块内设置新文本。\n\
  \n我们使用`String`的`group`扩展方法作为辅助函数。这个方法相当直观；它取出字符串的前`groupSize`个字符，添加一个分隔符，然后对剩余的字符串递归执行相同操作。结果，在默认参数下，它将数字按四位一组进行分组，并在每组之间插入空格。\n\
  \n\n\n## 使用表情符号\n\n表情符号出现在 20 世纪 80 年代，并在 90 年代流行起来。那时还没有图片，只有文字符号。眼睛是冒号，鼻子是短横线，嘴巴是括号。像这样：`:-)`。你只有把头侧过来才能看到一张脸，但总比没有好。看不到对方的脸也听不到他们的声音，你就无法知道他们的语调。\n\
  \n随着时间的推移，表情符号成了互联网文化的重要组成部分，并逐渐渗透到我们生活的其他方面。统一码联盟不断向标准中添加更多表情符号；屏幕键盘上也有了单独的表情符号布局；最终，它们不仅仅是图片，还常常是动画图片。\n\
  \n与此同时，表情符号对我们开发者来说可能是一个问题。即使有了标准化，表情符号的编码方式仍然可能不同，而且旧设备或旧版本的操作系统可能不支持新的表情符号。这就是为什么最好在大多数文本输入中屏蔽它们。在社交媒体帖子、评论和视频描述中，表情符号完全可以接受，但用户不应当在电子邮件地址、密码、法定姓名、银行账号等字段中使用表情符号。\n\
  \n要阻止用户输入表情符号，我们需要两个步骤：\n\n-   检测`String`中是否包含表情符号。\n-   通过`UITextField`代理阻止包含表情符号的文本。\n\
  \n### 检测字符串中的表情符号\n\n与第 3 章中的字符串分析器类似，让我们添加一些扩展来检测`String`中是否有表情符号（方案 6-5）。我们知道，`String`是一个`Character`实例的序列。为了确保`String`中没有表情符号，我们需要检查每个`Character`。要检查`String`中是否有表情符号，我们需要找到至少一个`Character`，它是一个表情符号。\n\
  \n```\nextension Character {\n    var isSimpleEmoji: Bool {\n        guard let firstScalar\
  \ = unicodeScalars.first else { return false }\n        return firstScalar.properties.isEmoji\
  \ && firstScalar.value > 0x238C\n    }\n    var isCombinedIntoEmoji: Bool { unicodeScalars.count\
  \ > 1 && unicodeScalars.first?.properties.isEmoji ?? false }\n    var isEmoji: Bool\
  \ { isSimpleEmoji || isCombinedIntoEmoji }\n}\n方案 6-5\n检查字符是否为表情符号\n```\n\n简单表情符号和组合表情符号有什么区别？问题在于现代表情符号不仅仅是脸和花朵，它们还有许多其他特征，比如肤色、发色和性别。如果一个简单的黄脸可以用一个\
  \ Unicode 符号表示，那么更复杂的表情符号就是符号序列。\n\n计算属性 `isEmoji` 告诉我们`Character`是否是任何类型的表情符号，无论其复杂性如何。方案\
  \ 6-6 中的其他扩展可用于检测`String`是否包含表情符号。\n\n```\nextension String {\n    var isSingleEmoji:\
  \ Bool { count == 1 && containsEmoji }\n    var containsEmoji: Bool { contains {\
  \ $0.isEmoji } }\n    var containsOnlyEmoji: Bool { !isEmpty && !contains { !$0.isEmoji\
  \ } }\n    var emojiString: String { emojis.map { String($0) }.reduce(\"\", +) }\n\
  \    var emojis: [Character] { filter { $0.isEmoji } }\n    var emojiScalars: [UnicodeScalar]\
  \ { filter { $0.isEmoji }.flatMap { $0.unicodeScalars } }\n}\n方案 6-6\n检查字符串是否包含表情符号\n\
  ```\n\n我们不需要所有这些计算属性来分析用户输入，但它们对其他目的可能有用。例如，如果你让用户用三个表情符号来描述某篇帖子，`containsOnlyEmoji`\
  \ 函数就会很方便。\n\n### 阻止用户在输入中使用表情符号\n\n要阻止用户在输入中使用表情符号，我们只需要结合之前的一些方案。方案 6-7 展示了我们得到的结果。\n\
  \n```\nextension ViewController: UITextFieldDelegate {\n    func textField(_ textField:\
  \ UITextField, shouldChangeCharactersIn range: NSRange, replacementString string:\
  \ String) -> Bool {\n        if string.containsEmoji && !string.isEmpty {\n    \
  \        return false\n        }\n        // 如有必要进行验证\n        return true\n   \
  \ }\n}\n方案 6-7\n阻止用户在输入中使用表情符号\n```\n\n## 浮动前缀或后缀\n\n有时，我们需要在`UITextField`的开头或结尾添加不可编辑的文本字符串。可以是货币符号、验证徽章或任何其他信息。\n\
  \n根据文本的位置（前缀或后缀），有不同的方法。要添加前缀，我们需要给文本输入添加内边距。后缀则更复杂；每次可编辑文本发生变化时，我们都需要移动它们。\n\n\
  ### 添加前缀\n\n要添加前缀，你需要两个步骤：\n\n-   创建一个`UILabel`对象并正确对齐。\n-   给`UITextField`添加内边距，这样可编辑文本就会位于前缀的右侧。\n\
  \n让我们创建两个对象并添加插座变量：\n\n```\n@IBOutlet weak var prefixLabel: UILabel!\n@IBOutlet\
  \ weak var mainText: TextFieldWithPadding!\n```\n\n注意\n\n`TextFieldWithPadding`\
  \ 是在第 4 章“UITextField 内边距”部分创建的一个类。你可以在方案 4-26 中找到它的源代码。\n\n我们需要知道`prefixLabel`的宽度。如果它是静态的，我们可以在`viewDidLayoutSubviews`中调整它。如果不是，每次文本改变时我们都需要重新调整。\n\
  \n```\nmainText.paddingLeft = prefixLabel.bounds.width + 8\n```\n\n我们额外增加了 8 个点作为前缀和主文本之间的间距。完整的解决方案如方案\
  \ 6-8 所示。\n\n```\nclass FloatingPrefixViewController: UIViewController {\n    @IBOutlet\
  \ weak var prefixLabel: UILabel!\n    @IBOutlet weak var mainText: TextFieldWithPadding!\n\
  \    static let gapWidth = CGFloat(8)\n\n    override func viewDidLayoutSubviews()\
  \ {\n        mainText.paddingLeft = prefixLabel.bounds.width + FloatingPrefixViewController.gapWidth\n\
  \    }\n\n    func setPrefix(_ prefix: String) {\n        prefixLabel.text = prefix\n\
  \        DispatchQueue.main.async {\n            self.mainText.paddingLeft = self.prefixLabel.bounds.width\
  \ + FloatingPrefixViewController.gapWidth\n        }\n    }\n}\n\nextension FloatingPrefixViewController:\
  \ UITextFieldDelegate {\n    func textFieldShouldReturn(_ textField: UITextField)\
  \ -> Bool {\n        setPrefix(textField.text ?? \"\")\n        textField.text =\
  \ \"\"\n        return false\n    }\n}\n方案 6-8\n带前缀的 UITextField\n```\n\n如你所见，`setPrefix`\
  \ 方法中包含一个异步部分。我们需要它来让`UILabel`在用到其新宽度之前完成更新。如果异步部分对你来说不可接受，你可以手动计算文本宽度。\n\n出于演示目的，此方案包含一个扩展，每次用户点击*返回*键时都会设置一个新的标签文本。请勿在实际应用中使用此扩展。\n\
  \n\n\n### 添加后缀\n\n与前缀不同，后缀并非静态；每次输入文本时，它们都会移动。我们不需要在布局准备就绪时添加内边距，而是需要添加 `UITextField`\
  \ 委托，并重写 `func textField(_: UITextField, shouldChangeCharactersIn: NSRange, replacementString:\
  \ String) -> Bool`。\n\n垂直对齐方式与之前的食谱相同，但在水平方向上，`UILabel` 应与 `UITextField` 的左侧（前导）对齐。每次用户更改输入时，我们都需要更改此约束。\n\
  \n另一个可能的问题是右侧（尾部）的空间。如果输入的文本加上后缀后宽度超过我们的可用区域，标签将超出区域，或者文本将被裁剪。这就是为什么我们需要使用相同的 `TextFieldWithPadding`\
  \ 类，但使用 `rightPadding` 而不是 `leftPadding`。食谱 6-9 提供了浮动后缀问题的解决方案。\n\n```\nclass FloatingSuffixViewController:\
  \ UIViewController, UITextFieldDelegate {\n    @IBOutlet weak var suffixLabel: UILabel!\n\
  \    @IBOutlet weak var mainText: TextFieldWithPadding!\n    @IBOutlet weak var\
  \ suffixLeadingSpace: NSLayoutConstraint!\n    static let gapWidth = CGFloat(8)\n\
  \    override func viewDidLayoutSubviews() {\n        mainText.paddingRight = suffixLabel.bounds.width\
  \ + FloatingPrefixViewController.gapWidth\n    }\n    func setSuffix(_ suffix: String)\
  \ {\n        suffixLabel.text = suffix\n        DispatchQueue.main.async {\n   \
  \         self.mainText.paddingLeft = self.suffixLabel.bounds.width + FloatingPrefixViewController.gapWidth\n\
  \        }\n    }\n    func textField(_ textField: UITextField, shouldChangeCharactersIn\
  \ range: NSRange, replacementString string: String) -> Bool {\n        if let text\
  \ = textField.text,\n           let textRange = Range(range, in: text) {\n     \
  \       let updatedText = text.replacingCharacters(in: textRange, with: string)\n\
  \            if let font = mainText.font {\n                let fontAttributes =\
  \ [NSAttributedString.Key.font: font]\n                let size = (updatedText as\
  \ NSString).size(withAttributes: fontAttributes)\n                suffixLeadingSpace.constant\
  \ = size.width\n                view.layoutIfNeeded()\n            }\n        }\n\
  \        return true\n    }\n}\n食谱 6-9\n带后缀的 UITextField\n```\n\n此处的宽度计算是通过 `NSString`\
  \ 方法 `size` 执行的。它返回一个 `CGSize` 结构体，其中包含给定属性下文本的宽度和高度。我们设置的唯一属性是 `NSAttributedString.Key.font`。在\
  \ iOS 中，`UIFont` 对象不仅包含字体，还包含字号，因此 `size` 方法拥有足够的信息来进行计算。\n\n## 键盘处理\n\n正如我们在本章开头所讨论的，屏幕键盘对开发者来说可能是一个大问题。默认情况下，当用户点击\
  \ `UITextField` 或 `UITextView` 时，键盘将会弹出，但它不会自行消失，并且除了遮挡 `UITextField` 或 `UITextView`\
  \ 之外，什么也不做。如果您在屏幕底部添加一个输入框，键盘将会遮挡它。\n\n### 用户点击文本框外部时隐藏键盘\n\n如果文本字段不在可滚动区域内，隐藏它就相当容易。您只需要在\
  \ `UIViewController` 中重写一个函数并调用 `view.endEditing(true)`，如食谱 6-10 所示。\n\n```\nclass\
  \ HidingKeyboardViewController: UIViewController {\n    override func touchesBegan(_\
  \ touches: Set<UITouch>, with event: UIEvent?) {\n        super.touchesBegan(touches,\
  \ with: event)\n        view.endEditing(true)\n    }\n}\n食谱 6-10\n隐藏键盘\n```\n\n\
  ### 在可滚动区域中隐藏键盘\n\n如果您需要在可滚动区域内进行文本输入（这在表单中很常见），那么之前的食谱将不起作用。这并不意味着您不应该使用它；用户可以点击可滚动区域的外部，但这还不够。\n\
  \n根据您期望的行为，有两种解决方案：\n\n-   用户滚动时隐藏键盘\n-   用户点击文本字段外部时隐藏键盘\n\n第一个解决方案需要设置 `UIScrollView`\
  \ 的一个属性。在 Interface Builder（故事板编辑器）中，选择您的 `UIScrollView`，并将 *Keyboard* 设置为 *Dismiss\
  \ on drag*。\n\n您也可以通过代码实现相同的效果：\n\n```\nscrollView.keyboardDismissMode = .onDrag\n\
  ```\n\n### 用户离开屏幕时隐藏键盘\n\n用户离开屏幕时，隐藏屏幕键盘是一个好习惯。通常有两种导航方向：\n\n-   移动到下一个屏幕\n-   返回到上一个屏幕\n\
  \n假设您有一个带有 `@IBAction` 函数的“下一步”按钮。该函数中的第一行代码应该是：\n\n```\nview.endEditing(true)\n\
  ```\n\n至于返回，解决方案类似。在第 4 章中，我们创建了一个通用函数 `goBack`。食谱 6-11 对其进行了更新以隐藏键盘。如果键盘未显示，这也不会对应用程序造成损害。\n\
  \n```\npublic extension UIViewController {\n    @IBAction func goBack() {\n    \
  \    view.endEditing(true)\n        if let nc = navigationController,\n        \
  \   nc.viewControllers.count >= 2 {\n            nc.popViewController(animated:\
  \ true)\n        } else {\n            dismiss(animated: true, completion: nil)\n\
  \        }\n    }\n}\n食谱 6-11\n更新后的 goBack 函数\n```\n\n\n\n### 键盘出现时调整布局\n\n当键盘出现时，你的布局必须随之改变。这一点始终是必要的。即使你的文本字段始终位于屏幕顶部，屏幕底部也有需要移动的对象。在使用可滚动区域（如\
  \ `UIScrollView`）时，内容偏移量也需要相应调整。\n\n这可以通过处理键盘通知来实现，如代码清单 6-12 所示。\n\n```\nclass\
  \ KeyboardListenerViewController: UIViewController {\n    override func viewWillAppear(_\
  \ animated: Bool) {\n        super.viewWillAppear(animated)\n        NotificationCenter.default.addObserver(\n\
  \            self,\n            selector: #selector(keyboardWillShow(notification:)),\n\
  \            name: UIResponder.keyboardWillShowNotification,\n            object:\
  \ nil\n        )\n        NotificationCenter.default.addObserver(\n            self,\n\
  \            selector: #selector(keyboardWillHide(notification:)),\n           \
  \ name: UIResponder.keyboardWillHideNotification,\n            object: nil\n   \
  \     )\n    }\n    override func viewDidDisappear(_ animated: Bool) {\n       \
  \ NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillShowNotification,\
  \ object: nil)\n        NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillHideNotification,\
  \ object: nil)\n        super.viewWillDisappear(animated)\n    }\n    @objc func\
  \ keyboardWillShow(notification: NSNotification) {\n        if let keyboardSize\
  \ = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey] as? NSValue)?.cgRectValue.size\
  \ {\n            // 键盘高度在 keyboardSize.height 中\n        }\n    }\n    @objc func\
  \ keyboardWillHide(notification: NSNotification) {\n        // 键盘消失时通常不需要键盘尺寸，因此只需重置约束即可\n\
  \    }\n}\n代码清单 6-12\n处理键盘通知\n```\n\n`notification` 参数是可选的；如果你不需要键盘尺寸，可以创建不带此参数的处理程序。别忘了，如果函数签名发生改变，`#selector`\
  \ 也需要相应更新。\n\n现在，当我们知道了键盘出现和消失的时机，接下来调整布局。一种可行的方案是创建一个约束，我们将其命名为 `bottomConstraint`，用于定义屏幕（或安全区域）底部与最底层视图之间的距离。通常，这个最底层视图就是“下一步”按钮。\n\
  \n通过传递过来的通知，我们可以提取键盘高度并相应地移动布局，如代码清单 6-13 所示。\n\n```\nclass KeyboardListenerViewController2:\
  \ UIViewController {\n    @IBOutlet weak var bottomConstraint: NSLayoutConstraint!\n\
  \    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
  \        NotificationCenter.default.addObserver(\n            self,\n          \
  \  selector: #selector(keyboardWillShow(notification:)),\n            name: UIResponder.keyboardWillShowNotification,\n\
  \            object: nil\n        )\n        NotificationCenter.default.addObserver(\n\
  \            self,\n            selector: #selector(keyboardWillHide),\n       \
  \     name: UIResponder.keyboardWillHideNotification,\n            object: nil\n\
  \        )\n    }\n    override func viewDidDisappear(_ animated: Bool) {\n    \
  \    NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillShowNotification,\
  \ object: nil)\n        NotificationCenter.default.removeObserver(self, name: UIResponder.keyboardWillHideNotification,\
  \ object: nil)\n        super.viewWillDisappear(animated)\n    }\n    @objc func\
  \ keyboardWillShow(notification: NSNotification) {\n        if let keyboardSize\
  \ = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey] as? NSValue)?.cgRectValue.size\
  \ {\n            bottomConstraint.constant = keyboardSize.height\n            view.layoutIfNeeded()\n\
  \        }\n    }\n    @objc func keyboardWillHide() {\n        bottomConstraint.constant\
  \ = 0\n        view.layoutIfNeeded()\n    }\n}\n代码清单 6-13\n在键盘出现和消失时更改布局\n```\n\n\
  ### 滚动以显示当前文本字段\n\n当表单较大时（如图 6-1 所示），我们会使用一个可滚动区域，通常是 `UIScrollView`。当键盘出现时，可供显示的区域变得相当狭小，在填写两到三个文本字段后，光标就会超出显示范围。我们需要自动滚动\
  \ `UIScrollView`，使正在编辑的字段保持可见。\n\n有两种处理方式。第一种是缩小 `UIScrollView` 的高度，使其完全位于键盘上方。这种方式有一个重大缺点：每次键盘出现时，`UIScrollView`\
  \ 的大小都会发生变化，这可能会产生不悦目的视觉效果。第二种方式是每当用户进入另一个 `UITextField` 时，改变内容偏移量（滚动位置）。由于我们知道该字段在父视图中的位置，因此知道需要设置哪个内容偏移量。代码清单\
  \ 6-14 展示了这种解决方案。\n\n![](img/515103_1_En_6_Fig1_HTML.png)\n\n图片显示了一个移动设备屏幕，上面有空的文本字段和一个键盘。光标位于第一个文本框内。键盘显示了文本输入的预测建议。\n\
  \n图 6-1\n\n当键盘出现时移动 `UITextField`\n\n```\nclass AutoscrollViewController: UIViewController\
  \ {\n    @IBOutlet weak var scrollView: UIScrollView!\n    @IBOutlet weak var textField1:\
  \ UITextField!\n    @IBOutlet weak var textField2: UITextField!\n    @IBOutlet weak\
  \ var textField3: UITextField!\n    @IBOutlet weak var textField4: UITextField!\n\
  \    @IBOutlet weak var textField5: UITextField!\n    @IBOutlet weak var textField6:\
  \ UITextField!\n    @IBOutlet weak var textField7: UITextField!\n    @IBOutlet weak\
  \ var textField8: UITextField!\n    // ...\n    static let gap = CGFloat(40)\n}\n\
  \nextension AutoscrollViewController: UITextFieldDelegate {\n    func textFieldDidBeginEditing(_\
  \ textField: UITextField) {\n        let offset = textField.frame.origin.y - AutoscrollViewController.gap\n\
  \        DispatchQueue.main.async {\n            self.scrollView.setContentOffset(CGPoint(x:\
  \ 0, y: offset), animated: true)\n        }\n    }\n    func textFieldShouldReturn(_\
  \ textField: UITextField) -> Bool {\n        switch textField {\n        case textField1:\
  \ textField2.becomeFirstResponder()\n        case textField2: textField3.becomeFirstResponder()\n\
  \        case textField3: textField4.becomeFirstResponder()\n        case textField4:\
  \ textField5.becomeFirstResponder()\n        case textField5: textField6.becomeFirstResponder()\n\
  \        case textField6: textField7.becomeFirstResponder()\n        case textField7:\
  \ textField8.becomeFirstResponder()\n        default: textField.resignFirstResponder()\n\
  \        }\n        return false\n    }\n}\n代码清单 6-14\n滚动以显示文本字段\n```\n\n这段代码还包含一个*回车*按钮的处理程序。当你点击*回车/下一步/提交*或其他按钮（该按钮通常位于右下角，名称取决于\
  \ `UITextField` 的配置）时，焦点会移到下一个输入框。\n\n你可以设计更有趣的滚动机制，例如，让前一个字段也可见，或者仅在字段被部分或完全遮挡时才滚动。但这是一个完全可用的解决方案，因此你可以放心地直接使用。\n\
  \n\n## 密码键盘 UI 组件\n\n密码的使用频率越来越低，这合情合理。大多数用户要么忘记密码，要么在所有网站和移动应用中使用相同的密码，这极其不安全。\n\
  \n许多现代应用会提供短信验证码或验证器应用（如 Google Authenticator 或 Authy）生成的验证码，作为两步验证的方式。这种验证码通常由四到六位数字组成。有时，它们甚至完全替代了密码。\n\
  \n处理这种情况最优雅、最舒适的方式是使用一个*密码键盘*。普通的 `UITextField` 在这方面的视觉效果并不理想。\n\n让我们来编写一个简单的四位数字密码键盘。\n\
  \n首先，将四个 `UITextField` 对象添加到你的视图中，如图 6-2 所示。你可以将它们放在任何你喜欢的位置，但最好采用居中对齐并将它们置于顶部，这样当键盘出现时，我们无需调整布局。\n\
  \n![](img/515103_1_En_6_Fig2_HTML.png)\n\n一张图片展示了一个带有空文本框和数字键盘的移动屏幕。在四个空格中，已输入了数字\
  \ 1 和 5，光标位于第三个位置。\n\n图 6-2\n\n密码键盘示例\n\n为所有四个文本框选择数字键盘作为键盘类型。按顺序为它们分配从 0 到 3 的标签（tag）。\n\
  \n创建四个输出口：\n\n```\n@IBOutlet weak var digit1TextField: UITextField!\n...\n@IBOutlet\
  \ weak var digit4TextField: UITextField!\n```\n\n让你的 `UIViewController` 子类（本例中为\
  \ `PinPadViewController`）成为所有文本框的代理。实现 `UITextFieldDelegate` 协议。我们将需要以下方法：\n\n```\n\
  func textFieldShouldBeginEditing(_ textField: UITextField) -> Bool\nfunc textField(_\
  \ textField: UITextField, shouldChangeCharactersIn range: NSRange, replacementString\
  \ string: String) -> Bool\n```\n\n第一个方法应清空选中的文本框及其之后的所有文本框。\n\n第二个方法应进行输入验证。我们只允许输入数字，且每个字段只允许输入一个。\n\
  \n为了将焦点从一个字段移动到另一个字段，我们将使用 `editingChanged` 动作。让我们使用一个名为 `textChanged` 的方法：\n\n\
  ```\n@IBAction func textChanged(_ textField: UITextField)\n```\n\n为了方便起见，我们可以将文本框打包成一个数组。\n\
  \n```\nclass PinPadViewController: UIViewController {\n@IBOutlet weak var digit1TextField:\
  \ UITextField!\n@IBOutlet weak var digit2TextField: UITextField!\n@IBOutlet weak\
  \ var digit3TextField: UITextField!\n@IBOutlet weak var digit4TextField: UITextField!\n\
  private var pinDigitTextFields: [UITextField] = []\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\npinDigitTextFields = [\ndigit1TextField,\ndigit2TextField,\n\
  digit3TextField,\ndigit4TextField\n]\n}\noverride func viewDidAppear(_ animated:\
  \ Bool) {\nsuper.viewDidAppear(animated)\nclear()\n}\n@IBAction func textChanged(_\
  \ textField: UITextField) {\nif textField.tag == 3 {\nview.endEditing(true)\nvalidateAndGo()\n\
  } else {\npinDigitTextFields[textField.tag + 1].becomeFirstResponder()\n}\n}\nprivate\
  \ func clear() {\npinDigitTextFields.forEach {\n$0.text = \"\"\n}\ndigit1TextField.becomeFirstResponder()\n\
  }\nprivate func getPin() -> String {\nlet digit1 = digit1TextField.text ?? \"\"\n\
  let digit2 = digit2TextField.text ?? \"\"\nlet digit3 = digit3TextField.text ??\
  \ \"\"\nlet digit4 = digit4TextField.text ?? \"\"\nreturn \"\\(digit1)\\(digit2)\\\
  (digit3)\\(digit4)\"\n}\nprivate func validateAndGo() {\nlet pin = getPin()\nif\
  \ pin.count != 4 {\nclear()\nreturn\n}\n// 在此处你可以将 PIN 发送到 API 进行验证（或本地验证）\n}\n\
  }\nextension PinPadViewController: UITextFieldDelegate {\nfunc textFieldShouldBeginEditing(_\
  \ textField: UITextField) -> Bool {\nfor i in textField.tag..<pinDigitTextFields.count\
  \ {\npinDigitTextFields[i].text = \"\"\n}\nreturn true\n}\nfunc textField(_ textField:\
  \ UITextField, shouldChangeCharactersIn range: NSRange, replacementString string:\
  \ String) -> Bool {\nif let text = textField.text,\nlet textRange = Range(range,\
  \ in: text) {\nlet updatedText = text.replacingCharacters(in: textRange,\nwith:\
  \ string)\nif updatedText.count > 1 {\nreturn false\n}\nif !updatedText.containsOnlyDigits\
  \ {\nreturn false\n}\nreturn true\n}\nreturn false\n}\n}\n秘方 6-15\n密码键盘\n```\n\n\
  你应该在 `validateAndGo` 方法中进行验证。\n\n实现某个功能的方式总是多种多样的。这是一种非常简单的实现方式；如果需要视觉效果或装饰，实现起来可能会更复杂。\n\
  \n## 总结\n\n在本章中，我们描述了如何在编辑时验证文本，如何阻止用户输入某些字符，以及如何为文本字段添加前缀或后缀。由于大多数移动设备没有物理键盘，我们绝不应忘记屏幕上的键盘会覆盖部分用户界面。为了处理这种情况，我们需要订阅通知并更新布局。我们还需要记得在屏幕切换时隐藏键盘。最后一个秘方展示了文本字段的一个有趣用例——密码键盘。这是一个用于输入密码或短信验证码的组件。在下一章中，我们将完成对\
  \ UIKit 的讨论，并开始讲解动画和视觉效果。\n\n"
- "# 7. UI 动画与效果\n\n动画和效果是现代移动应用的重要元素/方面。每个应用在商店/画廊中都有数十个类似的竞品；你需要让自己的应用脱颖而出，以便用户下载。精美的动画\
  \ UI 有助于它脱颖而出。\n\n我们将回顾最流行的动画类型：\n\n* 将 `UIView` 从一个点移动到另一个点（例如，当键盘出现/消失时）\n* 对颜色或透明度等属性进行动画处理\n\
  * 使用 `UIScrollView`、`UITableView` 或 `UICollectionView` 实现视差效果\n* “英雄”动画——将元素从一个视图移动到另一个视图\n\
  * 覆盖 `UIViewController` 之间的默认转场效果\n\n## 视图动画\n\n`UIView` 及其子类有多个可以进行动画处理的属性。我们将它们分为两组：\n\
  \n* 对视图自身属性进行动画处理，如颜色、透明度或缩放\n* 通过更改约束来对布局进行动画处理\n\n\n\n### 对 `UIView` 自身属性进行动画\n\
  \n`UIView` 最流行的动画是“淡入淡出”。“淡入”让 `UIView` 出现；“淡出”让它消失。出现和消失具体指什么？指的是将 `alpha` 属性从\
  \ `0.0` 变为 `1.0` 或反之。为什么我们改变 `alpha` 而不是 `isHidden`？因为 `isHidden` 是一个*布尔*值。*布尔*值无法渐变。它们始终要么是\
  \ `true`，要么是 `false`。那么这种动画还能生效吗？嗯，你可以试试作为练习。我们这里坚持使用 `alpha`，因为它是一个可渐变属性。\n\n动画可以通过使用\
  \ `UIView` 类型的 `animation(withDuration:animations:)` 方法来完成。它是一个类型方法，因此你可以直接在 `UIView`\
  \ 类型上调用它，而不是在实例上。\n\n让我们看看它在代码中是什么样子。将 `UIView` 或其任何子类设置为一个出口 `fadeView`。注意，不要直接命名为\
  \ `view`，因为它被保留给根视图使用（代码清单 7-1）。\n\n```\nclass FadeInViewController: UIViewController\
  \ {\n@IBOutlet weak var fadeView: UIView!\nfunc fadeIn() {\nfadeView.isHidden =\
  \ false\nfadeView.alpha = 1.0\nUIView.animate(withDuration: 0.3) {\nself.fadeView.alpha\
  \ = 0.0\n}\n}\n}\n代码清单 7-1\n淡入效果\n```\n\n在执行动画之前，我们设置了初始参数。这不是必须的，尤其是当你希望从其当前状态开始动画时。根据你的需求进行调整。\n\
  \n你还会在这个代码清单中看到一个魔法数字——`0.3`。魔法数字是未命名的数值常量。这是一种不良实践，因为在你之后处理这段代码的开发者（甚至几个月或几年后的你自己）可能不理解为什么这个常量存在以及它代表什么。\n\
  \n我们正在讨论动画，而且这段代码是本书的一部分，因此在此给出解释是可以接受的。`0.3` 秒是动画的一个常见时间间隔。它足够慢，可以让用户看到，同时又足够快，不会耽误他们。\n\
  \n如果你使用这段代码，请根据你的需求调整这个时间间隔，并为它定义一个具名常量。\n\n在代码清单 7-2 中，我们有 `animate` 方法的另一个版本：\n\
  \n```\nclass FadeOutViewController: UIViewController {\n@IBOutlet weak var fadeView:\
  \ UIView!\nfunc fadeOut() {\nfadeView.alpha = 0.0\nfadeView.isHidden = false\nUIView.animate(withDuration:\
  \ 0.3) {\nself.fadeView.alpha = 1.0\n} completion: { _ in\nself.fadeView.isHidden\
  \ = true\n}\n}\n}\n代码清单 7-2\n淡出效果\n```\n\n```\nfunc animate(with Duration:animations:completion:)\n\
  ```\n\n`UIView` 对象可以对以下属性进行动画处理：\n\n- Frame\n- Bounds\n- Center\n- Transform\n-\
  \ Alpha\n- BackgroundColor\n\n`UIView` 的子类可能还有其他可动画属性；你可以参考文档以查看每个类的完整列表。\n\n###\
  \ 通过改变约束来对布局进行动画\n\n当 iPhone 刚出现时，它只有一种分辨率。后来，随着新型号的推出，屏幕变得更高。而在 iPad 上，情况相反，它变得更宽了。现在我们有了多种宽高比。要在如此多的变化中存活下来的方法就是使用约束。如果你正在阅读这段内容，你可能已经知道什么是约束了。如果不知道，你总能找到解释其工作原理的文档、书籍、文章或教程。\n\
  \n如果你使用了约束，就不应该再对 frame 和其他与位置相关的属性进行动画了。你应该对约束的变化进行动画。\n\n要对一个约束进行动画，你首先需要创建一个出口。假设，我们有一些\
  \ `UIView`，需要将它向上移动。它有一个约束，定义了与顶部某个对象的距离。默认是 `50`，但我们希望它是 `20`。为什么？可能是因为键盘出现了，或者发生了其他需要缩小间距的情况。\n\
  \n```\n@IBOutlet weak var distanceConstraint: NSLayoutConstraint!\n```\n\n注意\n\n\
  迄今为止，约束仍然是 `NSLayoutConstraint` 类的对象；它以 `NS` 开头，并且没有替代品。\n\n诀窍在于：布局的变化并非在你更改约束属性时执行，而是在视图进行布局时执行。我们需要在调用\
  \ `animate(withDuration:animations:)` *之前*准备好新的布局。然后在这个方法中，我们只需调用父视图或根 `UIView`\
  \ 的 `layoutIfNeeded`。你可以在代码清单 7-3 中看到具体做法。\n\n```\nclass AnimatedConstraintsViewController:\
  \ UIViewController {\n@IBOutlet weak var distanceConstraint: NSLayoutConstraint!\n\
  func changeDistanceAnimated(_ newDistance: CGFloat) {\ndistanceConstraint.constant\
  \ = newDistance\nUIView.animate(withDuration: 0.3) {\nself.view.layoutIfNeeded()\n\
  }\n}\n}\n代码清单 7-3\n对约束进行动画\n```\n\n### 限制条件\n\niOS 中的动画有其自身的限制。我们已经讨论过，你无法对不能渐变的值进行动画。\n\
  \n另一个限制是同时动画。你可以同时对多个属性或不同对象进行动画，但它们必须被封装在同一个代码块中。\n\n如果你有复杂的动画，有两种解决方案：\n\n- 将它们拆分为多个小的代码块，每个代码块包含一组在同一时刻结束的变化。当一个代码块结束时，开始下一个代码块。这可能需要进行一些计算。\n\
  - 使用一个定时器手动进行动画。`UIView.animate(withDuration:animations:)` 方法并不是唯一的方式。\n\n### 当键盘出现时对布局进行动画\n\
  \n在第 6 章的“键盘处理”部分，我们讨论了键盘布局的变化。当时我们是在没有动画的情况下改变了一个约束：\n\n```\nif let keyboardSize\
  \ = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey] as? NSValue)?.cgRectValue.size\
  \ { bottomConstraint.constant = keyboardSize.height\nview.layoutIfNeeded()}\n```\n\
  \n在代码清单 7-4 中，我们改进了代码，使其看起来更平滑。\n\n```\nclass AnimatedKeyboardListenerViewController:\
  \ UIViewController {\n@IBOutlet weak var bottomConstraint: NSLayoutConstraint!\n\
  override func viewWillAppear(_ animated: Bool) {\nsuper.viewWillAppear(animated)\n\
  NotificationCenter.default.addObserver(\nself,\nselector: #selector(keyboardWillShow(notification:)),\n\
  name: UIResponder.keyboardWillShowNotification,\nobject: nil\n)\nNotificationCenter.default.addObserver(\n\
  self,\nselector: #selector(keyboardWillHide),\nname: UIResponder.keyboardWillHideNotification,\n\
  object: nil\n)\n}\noverride func viewDidDisappear(_ animated: Bool) {\nNotificationCenter.default.removeObserver(self,\
  \ name: UIResponder.keyboardWillShowNotification, object: nil)\nNotificationCenter.default.removeObserver(self,\
  \ name: UIResponder.keyboardWillHideNotification, object: nil)\nsuper.viewWillDisappear(animated)\n\
  }\n@objc func keyboardWillShow(notification: NSNotification) {\nif let keyboardSize\
  \ = (notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey] as? NSValue)?.cgRectValue.size\
  \ {\nbottomConstraint.constant = keyboardSize.height\nUIView.animate(withDuration:\
  \ 0.3) {\nself.view.layoutIfNeeded()\n}\n}\n}\n@objc func keyboardWillHide() {\n\
  bottomConstraint.constant = 0\nUIView.animate(withDuration: 0.3) {\nself.view.layoutIfNeeded()\n\
  }\n}\n}\n代码清单 7-4\n当键盘出现时对布局变化进行动画\n```\n\n注意\n\n代码清单 7-4 与代码清单 6-13 几乎完全相同。唯一的区别在于动画。请对比它们。\n\
  \n\n\n## 视差效果\n\n视差效果通常指创建多个以不同速度移动的图层。这种效果常用于 2D 平台游戏或跑酷类游戏中。玩家身后的云层移动速度远慢于玩家本身，而覆盖角色的前景层则移动得更快。\n\
  \n在移动应用中，视差效果常被用作可滚动内容的屏幕标题栏。例如在订餐应用中，菜单上方会显示餐厅照片。当用户滚动菜单时，标题栏会缩小，仅保留返回按钮和餐厅名称，有时还会显示餐厅标识或购物车图标。\n\
  \n视差滚动效果不仅是从 A 点移动到 B 点，还应当具备响应性。当用户上下滚动时，标题栏需要动态变化（图 7-1）。\n\n![](img/515103_1_En_7_Fig1_HTML.png)\n\
  \n一组四张图片展示了用户界面滚动视图中的视差效果。第一张图片在灰色背景上显示标题标签，以及第 1 行到第 16 行的标签。后续图片也包含行标签。\n\n**图\
  \ 7-1** 视差效果\n\n### 使用 UIScrollView 实现视差标题栏\n\n此功能的核心在于用户界面，因此我们先准备好界面。\n\n####\
  \ 准备用户界面\n\n在本示例中，我们将使用一个包含以下对象的标题栏：\n\n*   背景中的 `UIImageView`。其*内容模式*应设置为*等比例填充*。这样，背景图像会自动缩放，虽然只显示部分画面，但始终充满整个屏幕。\n\
  *   `UIView` 遮罩层。背景色设为黑色，透明度（`alpha`）从 0.3 变化到 0.8。\n*   `UIButton` 作为静态返回按钮，始终位于标题栏的左上角。\n\
  *   `UILabel` 用于显示标题。标题栏展开时字号大且居中；标题栏收缩时字号小。\n\n当用户滚动 `UIScrollView` 时，标题栏高度从 180\
  \ 变为 40。向上滚动则逆转此过程。在完整代码中，所有数值均声明为常量。\n\n`UIScrollView` 对象应位于标题栏后方，否则会覆盖整个标题栏。同时，我们也不能将其置于标题栏下方，这需要详细解释。\n\
  \n如果可滚动区域位于标题栏下方，则其位置和尺寸会随标题栏高度变化而改变。由于用户手指位置不变，这会在可滚动区域的坐标系中改变位置。效果看似不错，但通常会导致滚动偏移量出现不期望的抖动。\n\
  \n最后，我们需要向可滚动区域添加一些内容。别忘了，它必须与顶部边界保持至少 180 的边距，否则会被标题栏遮挡。如果需要滚动条，还应在故事板编辑器的指示器边距（Indicator\
  \ Insets）部分添加内边距。否则，请隐藏滚动条。\n\n完成故事板编辑后，创建以下插口：\n\n```\n// 视图\n@IBOutlet weak var\
  \ scrollView: UIScrollView!\n@IBOutlet weak var headerView: UIView!\n@IBOutlet weak\
  \ var shadeView: UIView!\n@IBOutlet weak var titleLabel: UILabel!\n// 布局约束\n@IBOutlet\
  \ weak var headerHeightConstraint: NSLayoutConstraint!\n@IBOutlet weak var titleLeadingConstraint:\
  \ NSLayoutConstraint!\n```\n\n约束、`alpha`、字体等参数的初始值应为：\n\n*   `shadeView.alpha` 为\
  \ 0.3。\n*   `titleLabel.font` 为 `UIFont.systemFont(ofSize: 32)`。\n*   `headerHeightConstraint.constaint`\
  \ 为 180。\n*   `titleLeadingConstraint.constaint` 为 16。\n\n如果布局过于复杂，无法按此说明构建，你可以在\
  \ GitHub 仓库中找到示例。\n\n#### 视差功能\n\n我们需要为 `UIScrollView` 设置代理。代理将是我们自己的 `UIViewController`。每次滚动位置变化时，都会调用以下方法：\n\
  \n```\nfunc scrollViewDidScroll(_ scrollView: UIScrollView)\n```\n\n当前滚动位置为：\n\n\
  ```\nlet scrollPosition = scrollView.contentOffset.y\n```\n\n要计算所有值，我们需要知道当前进度，这是一个从\
  \ 0.0 到 1.0 的值，其中 0.0 表示完全展开，1.0 表示完全收缩。如何根据 `scrollPosition` 计算收缩进度呢？\n\n我们需要确定速度。标题栏的高度范围是\
  \ 180 - 40 = 140。当用户滚动 140 像素时，进度可从 0.0 变为 1.0，但我们在构建视差效果，而不是 `UIScrollView` 中的另一个分段。让我们将滚动速度减慢一半。为此，我们需要将\
  \ `scrollPosition` 除以 280。代码清单 7-5 展示了视差效果的完整代码。\n\n```\nclass ParallaxViewController:\
  \ UIViewController {\n    // 视图\n    @IBOutlet weak var scrollView: UIScrollView!\n\
  \    @IBOutlet weak var headerView: UIView!\n    @IBOutlet weak var shadeView: UIView!\n\
  \    @IBOutlet weak var titleLabel: UILabel!\n    // 布局约束\n    @IBOutlet weak var\
  \ headerHeightConstraint: NSLayoutConstraint!\n    @IBOutlet weak var titleLeadingConstraint:\
  \ NSLayoutConstraint!\n\n    func setHeaderShrinkProgress(_ progress: CGFloat) {\n\
  \        let progressClamped = max(min(progress, 1.0), 0.0)\n        headerHeightConstraint.constant\
  \ =\n            ParallaxViewController.maxHeaderHeight * (1.0 - progressClamped)\
  \ +\n            ParallaxViewController.minHeaderHeight * progressClamped\n    \
  \    titleLeadingConstraint.constant =\n            ParallaxViewController.maxLabelOffset\
  \ * progressClamped +\n            ParallaxViewController.minLabelOffset * (1.0\
  \ - progressClamped)\n        titleLabel.font = UIFont.systemFont(\n           \
  \ ofSize: ParallaxViewController.minTitleFontSize * progressClamped +\n        \
  \    ParallaxViewController.maxTitleFontSize * (1.0 - progressClamped))\n      \
  \  shadeView.alpha =\n            ParallaxViewController.minShadeAlpha * (1.0 -\
  \ progressClamped) +\n            ParallaxViewController.maxShadeAlpha * progressClamped\n\
  \        headerView.layoutIfNeeded()\n    }\n\n    static let minHeaderHeight =\
  \ CGFloat(40)\n    static let maxHeaderHeight = CGFloat(180)\n    static let minTitleFontSize\
  \ = CGFloat(14)\n    static let maxTitleFontSize = CGFloat(32)\n    static let minLabelOffset\
  \ = CGFloat(16)\n    static let maxLabelOffset = CGFloat(56)\n    static let minShadeAlpha\
  \ = CGFloat(0.3)\n    static let maxShadeAlpha = CGFloat(0.8)\n}\n\nextension ParallaxViewController:\
  \ UIScrollViewDelegate {\n    func scrollViewDidScroll(_ scrollView: UIScrollView)\
  \ {\n        let scrollPosition = scrollView.contentOffset.y\n        let progress\
  \ = scrollPosition / 280.0\n        setHeaderShrinkProgress(progress)\n    }\n}\n\
  ```\n\n**代码清单 7-5** 视差效果\n\n恭喜！这就是我们可用的视差标题栏。`setHeaderShrinkProgress` 方法只是使用相同的公式进行计算：\n\
  \n```\nfinalValue = expandedValue * (1.0 - progress) + shrinkedValue * progress\n\
  ```\n\n为确保所有值保持在范围内，我们在第一行对进度进行了钳制，将其值限制在 0.0 到 1.0 之间。\n\n\n\n### 支持 UITableView\
  \ 和 UICollectionView 的视差标题\n\n由于我们已经掌握了使用 `UIScrollView` 实现视差效果的代码，因此可以轻松地让 `UITableView`\
  \ 或 `UICollectionView` 也拥有视差效果。关键在于，这两个视图都是 `UIScrollView` 的子类，因此当你设置代理时，它会自动设置\
  \ `UIScrollViewDelegate`。\n\n即便如此，我们仍然需要对代码和 storyboard 做一些修改。\n\n首先，将 `UIScrollView`\
  \ 替换为 `UITableView`。像之前一样添加指示器缩进，并创建一个单元格原型来制作一些演示内容。在下面的示例中，它只是一个带有 `tag` 属性为 1\
  \ 的 `UILabel`。\n\n然后，我们需要添加内容缩进：\n\n```\ntableView.contentInset = UIEdgeInsets(top:\
  \ ParallaxTableViewController.maxHeaderHeight, left: 0, bottom: 0, right: 0)\n```\n\
  \n进度计算也发生了变化，因为现在它是从 -180 开始计算，而不是从 0 开始。\n\n```\nfunc scrollViewDidScroll(_ scrollView:\
  \ UIScrollView)\n{ let scrollPosition = scrollView.contentOffset.y\nlet progress\
  \ = (scrollPosition + ParallaxTableViewController.maxHeaderHeight) / 280.0\nsetHeaderShrinkProgress(progress)}\n\
  ```\n\n最后，我们需要实现 `UITableViewDataSource`。不要忘记同时设置 `delegate` 和 `dataSource`。示例 7-6\
  \ 包含了最终代码：\n\n```\nclass ParallaxTableViewController: UIViewController {\n// 视图\n\
  @IBOutlet weak var tableView: UIScrollView!\n@IBOutlet weak var headerView: UIView!\n\
  @IBOutlet weak var shadeView: UIView!\n@IBOutlet weak var titleLabel: UILabel!\n\
  // 布局约束\n@IBOutlet weak var headerHeightConstraint: NSLayoutConstraint!\n@IBOutlet\
  \ weak var titleLeadingConstraint: NSLayoutConstraint!\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\ntableView.contentInset = UIEdgeInsets(\ntop: ParallaxTableViewController.maxHeaderHeight,\
  \ left: 0,\nbottom: 0, right: 0)\n}\nfunc setHeaderShrinkProgress(_ progress: CGFloat)\
  \ {\nlet progressClamped = max(min(progress, 1.0), 0.0)\nheaderHeightConstraint.constant\
  \ =\nParallaxTableViewController.maxHeaderHeight * (1.0 - progressClamped) +\nParallaxTableViewController.minHeaderHeight\
  \ * progressClamped\ntitleLeadingConstraint.constant =\nParallaxTableViewController.maxLabelOffset\
  \ * progressClamped +\nParallaxTableViewController.minLabelOffset * (1.0 - progressClamped)\n\
  titleLabel.font = UIFont.systemFont(\nofSize: ParallaxTableViewController.minTitleFontSize\
  \ * progressClamped +\nParallaxTableViewController.maxTitleFontSize * (1.0 - progressClamped))\n\
  shadeView.alpha =\nParallaxTableViewController.minShadeAlpha * (1.0 - progressClamped)\
  \ +\nParallaxTableViewController.maxShadeAlpha * progressClamped\nheaderView.layoutIfNeeded()\n\
  }\nstatic let minHeaderHeight = CGFloat(40)\nstatic let maxHeaderHeight = CGFloat(180)\n\
  static let minTitleFontSize = CGFloat(14)\nstatic let maxTitleFontSize = CGFloat(32)\n\
  static let minLabelOffset = CGFloat(16)\nstatic let maxLabelOffset = CGFloat(56)\n\
  static let minShadeAlpha = CGFloat(0.3)\nstatic let maxShadeAlpha = CGFloat(0.8)\n\
  }\nextension ParallaxTableViewController: UIScrollViewDelegate {\nfunc scrollViewDidScroll(_\
  \ scrollView: UIScrollView) {\nlet scrollPosition = scrollView.contentOffset.y\n\
  let progress = (scrollPosition + ParallaxTableViewController.maxHeaderHeight) /\
  \ 280.0\nsetHeaderShrinkProgress(progress)\n}\n}\nextension ParallaxTableViewController:\
  \ UITableViewDataSource {\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\n\n}\nfunc tableView(_ tableView: UITableView, cellForRowAt\
  \ indexPath: IndexPath) -> UITableViewCell {\nlet cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"DemoCell\", for: indexPath)\nif let label = cell.viewWithTag(1) as? UILabel\
  \ {\nlabel.text = \"Line \\(indexPath.row + 1)\"\n}\nreturn cell\n}\n}\n示例 7-6\n\
  使用 UITableView 实现视差效果\n```\n\n同样地，你也可以为 `UICollectionView` 实现此效果。\n\n请随意自定义标题效果。添加更多元素；让运动变得非线性，或发挥你的任何创意。\n\
  \n## 英雄动画\n\n\"英雄\"动画是指一个视图从一个屏幕\"飞\"到另一个屏幕，视觉上类似于超级英雄（图 7-2）。当你点击一张照片或菜单中的一道菜时，它会放大并改变位置，同时其他视图在后台发生变化。\n\
  \n![](img/515103_1_En_7_Fig2_HTML.png)\n\n一组四张截图展示了英雄动画。第一张图片中间有一个相对较小的彩色方块，底部有文字\"\
  飞吧，英雄\"。在随后的截图中，方块面积逐渐增大，并似乎移向手机屏幕顶部。\n\n图 7-2\n\n英雄动画\n\n### 在同一个 UIViewController\
  \ 内的英雄动画\n\n既然我们知道如何制作常规动画，就可以创建英雄动画了。为此，我们需要执行以下步骤：\n\n- 在目标点创建并隐藏 `UIView`。\n\
  - 计算源点和目标点之间的位置和大小的差值。\n- 对此 `UIView` 应用变换，使其看起来与源 `UIView` 完全一致。\n- 隐藏源 `UIView`\
  \ 并显示目标 `UIView`。\n- 对目标 `UIView` 进行动画处理，使其恢复到目标状态。\n\n假设你不旋转它，这里有两种变换：\n\n- 平移\
  \ – 位置的差值\n- 缩放 – 大小的差值\n\n让我们逐步构建整个算法；然后将其封装成一个示例。\n\n#### 创建并显示 UIView\n\n英雄动画始终是某个元素的移动，该元素外观相同但尺寸变大。原始（源）`UIView`\
  \ 较小，因此将其放大会导致画质损失。我们需要创建另一个 `UIView`。可能它已经创建好了。在这种情况下，我们需要对其进行设置。如果你选择了带有缩略图的音轨，并且用户选择了一个，你需要将图片和音轨名称应用到目标\
  \ `UIView` 上。\n\n在某个时刻，我们应该拥有两个外观一致，但位于不同位置、具有不同大小的 `UIViews`（或子类）。\n\n```\nvar\
  \ destinationView: UIView\nvar sourceView: UIView\n```\n\n如果是你创建的，请将其隐藏。如果你在 storyboard\
  \ 中已有该视图，则必须在那里将其标记为隐藏。\n\n#### 计算变换\n\n首先，让我们计算在根视图中的位置。如果你的 `sourceView` 和 `destinationView`\
  \ 都是根 `UIView` 的子视图，则可以跳过此步骤。\n\n```\nlet sourceCenter = view.convert(sourceView.center,\
  \ to: nil)\nlet destinationCenter = view.convert(destinationView.center, to: nil)\n\
  ```\n\n然后，我们需要计算水平和垂直方向上的缩放比例差值。\n\n```\nlet scaleX = sourceView.frame.width / destinationView.frame.width\n\
  let scaleY = sourceView.frame.height / destinationView.frame.height\n```\n\n####\
  \ 应用变换\n\n在此步骤中，我们只应用计算出的变换。\n\n```\ndestinationView.transform = CGAffineTransform(scaleX:\
  \ scaleX, y: scaleY)\ndestinationView.center = sourceCenter\n```\n\n#### 隐藏源 UIView\
  \ 并显示目标 UIView\n\n这一步非常直接。在此之前，目标 `UIView` 必须处于隐藏状态。\n\n```\ndestinationView.isHidden\
  \ = false\nsourceView.isHidden = true\n```\n\n#### 动画\n\n最后，我们按照本章前面介绍的方式应用动画。\n\
  \n```\nUIView.animate(withDuration: 1.0)\n{destinationView.transform = CGAffineTransform.identity\n\
  destinationView.center = destinationCenter}\n```\n\n就是这样！你的英雄可以是一个简单的 `UIImage`，也可以是\
  \ `UIView` 内的复杂布局。\n\n\n\n#### 最终代码\n\n在 7-7 范例中，我们仅使用了一个带有背景色的`UIView`。如果你需要更复杂的结构，则必须手动复制。在`UIKit`中，没有可靠的方法来复制视图结构。\n\
  \n```\nclass HeroViewController: UIViewController {\n    @IBOutlet weak var sourceView:\
  \ UIView!\n    @IBOutlet weak var targetView: UIView!\n    @IBAction func animateHero()\
  \ {\n        let destinationView = UIView(frame: targetView.frame)\n        destinationView.backgroundColor\
  \ = sourceView.backgroundColor\n        view.addSubview(destinationView)\n     \
  \   let sourceCenter = view.convert(sourceView.center, to: nil)\n        let destinationCenter\
  \ = view.convert(destinationView.center, to: nil)\n        let scaleX = sourceView.frame.width\
  \ / destinationView.frame.width\n        let scaleY = sourceView.frame.height /\
  \ destinationView.frame.height\n        destinationView.transform = CGAffineTransform(scaleX:\
  \ scaleX, y: scaleY)\n        destinationView.center = sourceCenter\n        UIView.animate(withDuration:\
  \ 1.0) {\n            destinationView.transform = CGAffineTransform.identity\n \
  \           destinationView.center = destinationCenter\n        }\n    }\n}\n范例\
  \ 7-7\n英雄动画\n```\n\n此外，我们还使用了另一个`UIView`——`targetView`。它是一个不可见的`UIView`实例，允许我们在故事板中设置目标位置的几何属性。\n\
  \n### 英雄飞入新 UIViewController\n\n在同一个`UIViewController`内部与在两个不同的`UIViewController`之间进行动画的区别在于，我们无法使用故事板中的目标`UIView`。\n\
  \n算法会略有不同：\n\n- 执行转场或推入目标`UIViewController`。在启动时隐藏目标`UIView`。\n- 创建一个与目标`UIView`匹配的过渡`UIView`。\n\
  - 计算源位置与目标位置及缩放比例。\n- 将过渡`UIView`添加到`UIWindow`并应用源变换。\n- 隐藏源`UIView`。\n- 对过渡`UIView`的变换应用动画。屏幕间的转场；`UIView`的动画应同步进行。\n\
  - 动画结束时，隐藏过渡`UIView`并显示目标`UIView`。\n- 显示源`UIView`，以便用户返回时能看到它。\n\n看起来相当复杂，但在代码中会更清晰。（请参见范例\
  \ 4-3 中的`currentWindow`扩展函数，或使用 GitHub 上 7-8 范例的完整版本。）\n\n```\n// 在没有场景的项目中，请使用以下代码获取窗口：(UIApplication.shared.delegate\
  \ as? AppDelegate)?.window\nclass Hero1ViewController: ViewController {\n    @IBOutlet\
  \ weak var sourceView: UIView!\n    @IBAction func animateHero() {\n        performSegue(withIdentifier:\
  \ \"Hero\", sender: nil)\n    }\n    override func prepare(for segue: UIStoryboardSegue,\
  \ sender: Any?) {\n        if let destinationVC = segue.destination as? Hero2ViewController\
  \ {\n            guard let window = UIApplication.shared.currentWindow else {\n\
  \                return\n            }\n            destinationVC.loadViewIfNeeded()\n\
  \            destinationVC.view.layoutSubviews()\n            let heroView = UIView(frame:\
  \ destinationVC.destinationView.frame)\n            heroView.backgroundColor = self.sourceView.backgroundColor\n\
  \            destinationVC.destinationView.backgroundColor = self.sourceView.backgroundColor\n\
  \            window.addSubview(heroView)\n            self.sourceView.isHidden =\
  \ true\n            let sourceCenter = window.convert(self.sourceView.center, to:\
  \ nil)\n            var destinationCenter = window.convert(destinationVC.destinationView.center,\
  \ to: nil)\n            destinationCenter.y += self.view.safeAreaInsets.top\n  \
  \          let scaleX = self.sourceView.frame.width / heroView.frame.width\n   \
  \         let scaleY = self.sourceView.frame.height / heroView.frame.height\n  \
  \          heroView.transform = CGAffineTransform(scaleX: scaleX, y: scaleY)\n \
  \           heroView.center = sourceCenter\n            destinationVC.destinationView.isHidden\
  \ = true\n            UIView.animate(withDuration: 1.0) {\n                heroView.transform\
  \ = CGAffineTransform.identity\n                heroView.center = destinationCenter\n\
  \            } completion: { _ in\n                destinationVC.destinationView.isHidden\
  \ = false\n                self.sourceView.isHidden = false\n                heroView.removeFromSuperview()\n\
  \            }\n        }\n    }\n}\nclass Hero2ViewController: ViewController {\n\
  \    @IBOutlet weak var destinationView: UIView!\n}\n范例 7-8\n屏幕间的英雄动画\n```\n\n####\
  \ 获取并使用 UIWindow\n\n在本范例中，我们假设项目使用了场景。`currentWindow`计算属性定义在范例 4-3 中。如果你的项目未使用场景，请改用范例\
  \ 4-4。\n\n听起来可能有些奇怪，但`UIWindow`是`UIView`的子类。这意味着我们可以在`UIWindow`上使用任何`UIView`的方法，包括`addSubview`和反向操作。\n\
  \n#### 细节\n\n再做几点说明以使其更清晰。\n\n当目标`UIViewController`被创建时，视图并未加载。我们需要手动加载它：\n\n```\n\
  destinationVC.loadViewIfNeeded()\n```\n\n我们还需要手动布局视图，否则它们会保持与故事板编辑器中相同的位置。这在进行计算后并不总是相同：它们仅当设备与故事板设置中的设备一致时才匹配。\n\
  \n```\ndestinationVC.view.layoutSubviews()\n```\n\n另一个细节是，在计算时，屏幕顶部没有任何栏，因为屏幕尚不可见。因此，目标`UIView`的“y”坐标将被错误计算。假设两个屏幕的顶部插入量相同，我们进行以下修正：\n\
  \n```\ndestinationCenter.y += self.view.safeAreaInsets.top\n```\n\n其余代码与上一节基本相同，仅做了微小调整。\n\
  \n## 屏幕间的转场\n\n默认情况下，有两种类型的动画：\n\n- 在`UINavigationController`内从右向左出现\n- 以模态方式呈现`UIViewController`时从下向上出现\n\
  \n你可以在“故事板编辑器”或代码中更改动画，但选项非常有限。幸运的是，iOS 允许我们创建自定义转场动画。\n\n### 标准转场\n\n根据导航类型，有两种情况：\n\
  \n- 如果在`UINavigationController`内部发生，则只有一种动画：第二个屏幕从右侧覆盖第一个屏幕（对于从右向左的语言，则从左侧覆盖）。\n\
  - 当你以模态方式呈现新的`UIViewController`时，有几个默认选项。我们可以在故事板中或呈现前的代码中选择动画类型。\n\n如果你使用故事板和 segue，需要选择\
  \ segue 的类型（*Show* 用于推入，*Present Modally* 用于模态呈现）。其他类型也会用到，但频率较低，且自定义选项较少，因此我们暂时不讨论它们。\n\
  \n从转场的角度来看，最有趣的是模态呈现。如果你选择此类型，将有两个额外选项：\n\n- *Presentation*（呈现）定义最终效果。默认情况下，它覆盖大约\
  \ 90%的屏幕，在顶部留出上一屏幕的一部分。\n- *Transition*（转场）定义动画效果。\n\n这些选项可以通过代码访问，如范例 7-9 所示。你可以从代码中实例化视图控制器，或通过\
  \ segue 覆盖参数。\n\n```\nextension UIViewController {\n    func openViewControllerDefinedWithStyle(destinationViewController:\
  \ UIViewController) {\n        destinationViewController.modalPresentationStyle\
  \ = .fullScreen\n        destinationViewController.modalTransitionStyle = .crossDissolve\n\
  \    }\n}\n范例 7-9\n更改呈现与转场\n```\n\n\n\n### 创建自定义转场动画\n\n如果你对标准动画不满意，可以创建自己的自定义转场动画。\n\
  \n当我们谈论自定义转场时，需要回顾几个协议：\n\n*   `UIViewControllerTransitioningDelegate` 是实现自定义转场所需遵循的协议。实现此协议可以定义用于呈现和解除的动画控制器和交互控制器。\n\
  *   `UIViewControllerAnimatedTransitioning` 协议的实现定义了转场动画的时长、转场动画本身，并处理一些回调。\n* \
  \  `UIViewControllerContextTransitioning` 是一个上下文。其实现提供了关于转场视图和控制器（view controllers）的信息。\n\
  \n当你实现前两个协议时，需要设置 `destinationViewController.transitioningDelegate`。让我们一步步看看它是如何工作的。\n\
  \n1.  当你触发转场（使用 segue 或手动方式）时，iOS 会检查 `transitioningDelegate` 是否已设置。如果没有设置，它将使用你设置的标准转场或默认转场。\n\
  2.  如果 `transitioningDelegate` 已设置，它会调用你的 `transitioningDelegate` 的 `animationController(forPresented:presenting:source)`\
  \ 方法。这个方法是可选的，返回 `nil` 是有效的。如果返回 `nil`，转场将恢复为标准转场，就像没有设置 `transitioningDelegate`\
  \ 一样。\n3.  此时，iOS 断定必须使用自定义动画，并创建一个上下文。\n4.  调用 `transitionDuration(using:)` 来定义转场时间。时间应以秒为单位返回。通常，大约是\
  \ 0.3 秒。超过一秒的转场动画可能会让用户感到不适。\n5.  接下来，调用 `animateTransition(using:)` 方法。使用此方法，你可以应用动画。拥有上下文（在\
  \ `using` 参数中），你可以对两个屏幕应用任何修改。你可以更改颜色、位置、透明度——任何你喜欢的属性。\n6.  最后，你需要调用 `completeTransition(_:)`。这将标记转场结束，并使目标视图控制器（destination\
  \ view controller）变为活跃状态。如果你不调用它，它将继续保持非活跃状态。\n\n有些事情做起来比解释起来更容易，所以让我们看看 Recipe\
  \ 7-10 的实际效果。我们将制作一个最简单的转场：第一个屏幕淡出，第二个屏幕淡入。在转场的中间会有一个黑屏，因为两个屏幕都会不可见。动画时长设为一秒，足以观察整个过程。\n\
  \n```\nclass FadeThroughBlackPresentAnimationController: NSObject, UIViewControllerAnimatedTransitioning\
  \ {\nfunc transitionDuration(using transitionContext: UIViewControllerContextTransitioning?)\
  \ -> TimeInterval {\nreturn 1.0\n}\nfunc animateTransition(using transitionContext:\
  \ UIViewControllerContextTransitioning) {\nguard let fromView = transitionContext.viewController(forKey:\
  \ .from)?.view,\nlet toView = transitionContext.viewController(forKey: .to)?.view\n\
  else { return }\ntoView.isHidden = true\ntransitionContext.containerView.addSubview(toView)\n\
  UIView.animate(withDuration: 0.5) {\nfromView.alpha = 0.0\n} completion: { _ in\n\
  fromView.isHidden = true\ntoView.alpha = 0.0\ntoView.isHidden = false\nUIView.animate(withDuration:\
  \ 0.5) {\ntoView.alpha = 1.0\n} completion: { _ in\nfromView.isHidden = false\n\
  transitionContext.completeTransition(!transitionContext.transitionWasCancelled)\n\
  }\n}\n}\n}\nclass FromViewController: UIViewController, UIViewControllerTransitioningDelegate\
  \ {\nfunc animationController(forPresented presented: UIViewController, presenting:\
  \ UIViewController, source: UIViewController) -> UIViewControllerAnimatedTransitioning?\
  \ {\nFadeThroughBlackPresentAnimationController()\n}\nfunc animationController(forDismissed\
  \ dismissed: UIViewController) -> UIViewControllerAnimatedTransitioning? {\nFadeThroughBlackPresentAnimationController()\n\
  }\noverride func prepare(for segue: UIStoryboardSegue, sender: Any?) {\nsegue.destination.modalPresentationStyle\
  \ = .fullScreen\nsegue.destination.transitioningDelegate = self\n}\n}\nclass ToViewController:\
  \ UIViewController {\n@IBAction func goBack() {\ndismiss(animated: true, completion:\
  \ nil)\n}\n}\nRecipe 7-10\n黑色淡入淡出转场\n```\n\n这段代码包含了返回转场，与正向转场完全相同。\n\n### 转场动画库\n\
  \n如果你想创建一些新东西，不妨四处看看——也许别人已经创建过了。有很多提供转场动画的库。让我们看看其中的一些：\n\n*   Hero ( [`https://github.com/HeroTransitions/Hero`](https://github.com/HeroTransitions/Hero)\
  \ ) 库提供了一种简单的方法来应用预定义的转场动画之一，并附带一套很好的自定义工具。\n*   Jelly ( [`https://github.com/SebastianBoldt/Jelly`](https://github.com/SebastianBoldt/Jelly)\
  \ ) 库也支持交互式转场动画。\n*   Shift ( [`https://github.com/wickwirew/Shift`](https://github.com/wickwirew/Shift)\
  \ ) 是一个用于类似 Hero 转场动画的动画库。它只需相对较少的努力就能制作出漂亮的动画。\n\n所有这些库都是免费、开源的，并且可以通过 Swift Package\
  \ Manager 和 CocoaPods 获取。你可以在你的应用程序中免费使用它们，但如果喜欢，别忘了捐赠支持。\n\n## 总结\n\n现代移动应用应使用动画来显得更用户友好。UIKit\
  \ 为简单的 UI 动画提供了原生解决方案。在本章中，我们讨论了淡入淡出动画和动画布局变化。我们讨论了移动应用中流行的视差效果、作为屏幕间转场一部分的 Hero\
  \ 动画。最后，我们回顾了转场动画本身的不同方式。至此，UIKit 话题告一段落，但 UIKit 并不是在 iOS 应用中创建 UI 的唯一方式。自 iOS 13\
  \ 起，Apple 引入了 SwiftUI，它已在 iOS 和 macOS 的 UI 开发中得到积极使用。在下一章中，我们将快速了解 SwiftUI。\n\n"
- "# 8. SwiftUI\n\nSwiftUI 是一种构建用户界面的现代方式。它出现在 iOS 13、macOS 10.15、tvOS 13 和 watchOS\
  \ 6 中。如今，大多数应用不需要支持 iOS 12，因此在你的项目中使用 SwiftUI 是安全的。\n\n另一方面，存在大量用 UIKit 编写的代码库。成百上千的流行库出现在\
  \ SwiftUI 之前，或者支持旧版本的 iOS。这就是为什么在本章中，我们不仅要讨论 SwiftUI，还要讨论混合使用这两个框架。\n\n什么是 SwiftUI？它是\
  \ UIKit 的包装器还是一个独立的平台？两者都是。一些 SwiftUI 控件构建在 UIKit 之上；另一些则是全新的。\n\n## SwiftUI 基本概述\n\
  \nSwiftUI 使用构建块的构想。每个块都是一个 `View`。块可以代表整个屏幕，也可以代表屏幕的一部分。块可以包含其他块，并且这种结构可以很深。类似架构也用于其他平台，如\
  \ Flutter 或 React Native。\n\n### 基础应用\n\nSwiftUI 应用包含两个初始控件，App 和 View，分别如 Recipe\
  \ 8-1 和 8-2 所示。\n\n```\nimport SwiftUI\nstruct ContentView: View {\nvar body: some\
  \ View {\nText(\"Hello, world!\")\n}\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\nstatic var previews: some View {\nContentView()\n}\n}\nRecipe 8-2\nSwiftUI\
  \ 视图\n```\n\n```\nimport SwiftUI\n@main\nstruct MyApp: App {\nvar body: some Scene\
  \ {\nWindowGroup {\nContentView()\n}\n}\n}\nRecipe 8-1\nSwiftUI 应用\n```\n\n这两个结构体是运行应用所需的全部代码。应用中间只会有一个文本标签，但它可以运行。\n\
  \n\n\n### 构建块\n\n当你创建一个新的 SwiftUI 项目时，会看到两个控件：\n\n- `Text` – 来自 UIKit 的对应控件是 `UILabel`。当然，它也具有\
  \ SwiftUI 的特性。\n- `ContentView` – 这个 `View` 是屏幕的布局。它拥有手机屏幕的尺寸，因为它在你的 `App` 结构体中被引用。\n\
  \n从 SwiftUI 的角度来看，`Text` 和 `ContentView` 之间没有区别。例如，以下代码是完全有效的：\n\n```swift\n@main\n\
  struct MyApp: App {\n    var body: some Scene {\n        WindowGroup {\n       \
  \     Text(\"我是屏幕上唯一的元素 :)\")\n        }\n    }\n}\n```\n\n同时，`ContentView` 也可以在另一个\
  \ `View` 内部使用。\n\n最常见的控件如下：\n\n- `Text` – 一段文本，类似于 `UILabel`\n- `Image` – 一个显示图片的控件，类似于\
  \ `UIImageView`\n- `HStack` 和 `VStack` – 分别按行或列依次排列元素的控件，类似于 `UIStackView`\n- `List`\
  \ – 一个可滚动的列表，类似于 `UITableView` 或 `UICollectionView`\n- `ZStack` – 一个框架，将子控件叠加显示，类似于\
  \ `UIKit` 中的 `UIView`\n- `Spacer` – 用于在堆栈中的控件之间创建动态间距\n- `Button` – 一个可点击的元素，允许用户控制应用，类似于\
  \ `UIButton`\n\n上述列表并非完整列表，但这些控件是最常见的。\n\n### 修改控件\n\n你可以对控件进行小幅修改，而无需覆写或创建新控件。例如，你可能想改变字体、颜色、内边距、背景和其他属性。在\
  \ SwiftUI 中，可以通过在控件构造器之后调用方法来实现。例如：\n\n```swift\nText(\"你好，世界！\")\n    .font(.system(size:\
  \ 14))\n    .foregroundColor(.blue)\n```\n\n修饰符不仅可以应用于单个组件，还可以应用于一组控件。例如，如果你对 `HStack`\
  \ 应用了前景色，那么除非被覆盖，否则其所有内部控件都会自动获得这个颜色。\n\n### 组合\n\n当你创建一个新控件时，通常是从现有的构建块组合而成。这就是组合。SwiftUI\
  \ 有三个主要的控件用于此目的：\n\n- `HStack` – 它水平地依次显示控件。\n- `VStack` – 它垂直地依次显示控件。\n- `ZStack`\
  \ – 它将控件互相叠放显示。\n\n配方 8-3 就是这种组合的一个例子。它是一个用于嘉宾列表的自定义控件，如图 8-1 所示。你有一个包含照片和姓名的联系人列表。右侧是一个开关。当开关打开时，该联系人被邀请；否则，他们不在我们的嘉宾列表中。\n\
  \n![图 8-1](img/515103_1_En_8_Fig1_HTML.png)\n\n一组两张图片，第一张是左侧在 Swift 用户界面中编写生成嘉宾列表的代码截图，右侧是\
  \ iPhone 模式下嘉宾列表的预览。\n\n**图 8-1** 用 SwiftUI 编写的嘉宾列表。代码与预览\n\n照片将使用 `pictureURL`\
  \ 中提供的 URL 从网络加载。SwiftUI 有一个原生的 `AsyncImage` 控件，但它仅从 iOS 15 开始可用，因此我们将使用 `KFImage`。\n\
  \n`KFImage` 是 `Kingfisher` 库的一部分。你可以通过 Swift Package Manager 添加它：[`github.com/onevcat/Kingfisher`](https://github.com/onevcat/Kingfisher)。\n\
  \n```swift\nimport SwiftUI\nimport Kingfisher\n\nstruct ContactGuestView: View {\n\
  \    let name: String\n    let pictureURL: URL?\n    @State private var isInvited\
  \ = false\n\n    var body: some View {\n        HStack(alignment: .center,\n   \
  \            spacing: 8.0) {\n            KFImage(pictureURL)\n                .resizable()\n\
  \                .aspectRatio(contentMode: .fill)\n                .frame(width:\
  \ 32, height: 32)\n                .clipShape(Circle())\n            Toggle(name,\
  \ isOn: $isInvited)\n                .onChange(of: isInvited) { newValue in\n  \
  \                  print(newValue)\n                }\n                .font(.system(size:\
  \ 16))\n                .foregroundColor(.primary)\n        }\n        .padding(.leading,\
  \ 16)\n        .padding(.trailing, 16)\n        .frame(height: 32, alignment: .center)\n\
  \    }\n}\n\nstruct ContactGuestView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n        ContactGuestView(\n            name: \"张三\",\n\
  \            pictureURL: URL(string: \"https://picsum.photos/32/32\")\n        )\n\
  \    }\n}\n// 配方 8-3\n// 嘉宾列表的自定义组件\n```\n\n这行代码中有一个有趣的部分：`@State private var isInvited\
  \ = false`。这是你的组件或其一部分的状态。当开关（在 UIKit 中称为 Switch）的状态改变时，变量会自动随之改变。你可以访问你的状态并采取必要的操作。\n\
  \n如何处理状态变化？理想情况下，我们应该有一个视图模型来处理所有变化，并将结果存储在一个仓库中。为此，我们使用 `.onChange` 方法。完整签名如下所示：\n\
  \n```swift\n@inlinable public func onChange(of value: V, perform action: @escaping\
  \ (_ newValue: V) -> Void) -> some View where V : Equatable\n```\n\n在提供的闭包中，我们更改内部存储中的值，或向后端发送请求。在这个例子中，我们只是打印它。\n\
  \n**注意：** `onChange` 应该在 `Toggle` 声明之后、样式设置之前立即调用。样式设置方法返回的是简单的 `View`，而不是 `Toggle`，后者将无法识别\
  \ `onChange` 方法。\n\n为了总结 SwiftUI 的基础知识，配方 8-4 展示了如何使用它。\n\n```swift\nimport SwiftUI\n\
  \nstruct ContactGuest {\n    var id: String\n    var name: String\n    var pictureURL:\
  \ URL?\n}\n\nstruct GuestListView: View {\n    let contacts: [ContactGuest]\n\n\
  \    var body: some View {\n        ScrollView(.vertical, showsIndicators: false)\
  \ {\n            LazyVStack {\n                ForEach(contacts, id: \\.id) { contact\
  \ in\n                    ContactGuestView(\n                        name: contact.name,\n\
  \                        pictureURL: contact.pictureURL\n                    )\n\
  \                }\n            }\n        }\n    }\n}\n\nstruct GuestListView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        GuestListView(\n\
  \            contacts: [\n                ContactGuest(id: \"1\", name: \"约翰·斯通\"\
  , pictureURL: URL(string: \"https://picsum.photos/id/1/32/32\")),\n            \
  \    ContactGuest(id: \"2\", name: \"庞纳帕·普里亚\", pictureURL: URL(string: \"https://picsum.photos/id/2/32/32\"\
  )),\n                ContactGuest(id: \"3\", name: \"米娅·黄\", pictureURL: URL(string:\
  \ \"https://picsum.photos/id/3/32/32\")),\n                ContactGuest(id: \"4\"\
  , name: \"彼得·斯坦布里奇\", pictureURL: URL(string: \"https://picsum.photos/id/4/32/32\"\
  ))\n            ]\n        )\n    }\n}\n// 配方 8-4\n// 嘉宾列表\n```\n\n`LazyVStack`\
  \ 是 `VStack` 的一个变体，它不会渲染不可见的组件。`ScrollView` 内部的 `LazyVStack` 就像 `UITableView`。SwiftUI\
  \ 有自己的 `List`，但当你有一组静态项目时，使用这种组合可能会更快。\n\n### 插入 UIKit 组件\n\nSwiftUI 是一个相对较新的框架。大多数可用的库，包括流行的库，仍然不支持它。幸运的是，有一种简单的方法可以将标准的\
  \ UIKit `UIView`（或任何子类）插入到 SwiftUI 的组件树中。\n\n#### 从 UIKit 组件创建 SwiftUI 组件\n\n假设你有一个复杂的自定义\
  \ `UIView` 子类 `MyCustomOldView`，你还没有准备好将其移植到 SwiftUI。你需要为其创建一个包装器，该包装器遵循 `UIViewRepresentable`\
  \ 协议。\n\n第二步是添加属性。你可以通过向结构体添加变量来添加它们。\n\n步骤 3 和 4 是实现 `UIViewRepresentable` 协议中声明的两个函数：\n\
  \n```\nfunc makeUIView(context: Self.Context) -> Self.UIViewType\n```\n\n该函数创建 `MyCustomOldView`\
  \ 的一个实例并返回它。如果该组件有任何常量设置，你也可以在此函数中设置它们。如果你没有使用自己的自定义类，而是使用标准的 UIKit 类或来自外部库的类，并且需要一些调整，这可能很有用。\n\
  \n```\nfunc updateUIView(Self.UIViewType, context: Self.Context)\n```\n\n这个函数需要更新你的\
  \ UIKit 组件的状态。你不应该在这个函数中（重新）创建你的 `UIView`；只需应用所有可更改的属性。不要返回任何内容。\n\n\n\n### 自定义标签示例\n\
  \n在公式 8-5 中，我们将一个 `UILabel` 子类包装到 SwiftUI 结构中。许多应用都预定义了带有集成样式和格式的组件列表。当应用开始使用 SwiftUI\
  \ 时，有两种选择：\n\n-   使用 `Text` 在 SwiftUI 中添加所有这些组件\n-   将现有组件包装成 SwiftUI 组件\n\n如果你的应用部分迁移到了\
  \ SwiftUI 而另一部分尚未迁移，那么第二种方式具有优势。\n\n```\nimport UIKit\nimport SwiftUI\nclass HeaderLabel:\
  \ UILabel {\n    required init?(coder: NSCoder) {\n        super.init(coder: coder)\n\
  \        commonInit()\n    }\n    override init(frame: CGRect) {\n        super.init(frame:\
  \ frame)\n        commonInit()\n    }\n    private func commonInit() {\n       \
  \ textAlignment = .center\n        font = .systemFont(ofSize: 20, weight: .bold)\n\
  \        textColor = .darkText\n        numberOfLines = 1\n    }\n}\nstruct HeaderText:\
  \ UIViewRepresentable {\n    var text: String\n    func makeUIView(context: Context)\
  \ -> HeaderLabel {\n        HeaderLabel()\n    }\n    func updateUIView(_ uiView:\
  \ HeaderLabel, context: Context) {\n        uiView.text = text\n    }\n}\n公式 8-5\n\
  将 UIKit 组件包装为 SwiftUI 组件\n```\n\n将其插入任意 SwiftUI `View` 中：\n\n```\nstruct ContentView:\
  \ View {\n    var body: some View {\n        HeaderText(text: \"Hello, world!\"\
  )\n    }\n}\n```\n\n如果你的属性可以动态更改，可以添加 `@Binding` 关键字。\n\n## 使用 ViewModifier 应用样式\n\
  \n我们已经使用修饰符应用了几种样式。我们使用了 `font`、`foregroundColor`、`frame` 等。\n\n当你创建自己的组件时，不必在构造函数中提供所有可调整的属性。如果你只有两三个属性，这可能是合理的。但当你创建更复杂的\
  \ `View` 时，可能有几十个属性，在构造函数中使用它们会非常不便。\n\n为此，你可以添加扩展来更改自定义 `View`，并使用视图修饰符更全局地更改 `View`\
  \ 的属性。\n\n### 创建 ViewModifier\n\n要创建你自己的修饰符，你需要添加一个符合 `ViewModifier` 协议的结构体。\n\n\
  在这个结构体中，你需要实现一个函数：\n\n```\nfunc body(content: Content) -> some View\n```\n\n在这个函数中，你需要设置你的\
  \ `View` 并返回结果。\n\n```\nstruct ModifierName: ViewModifier {\n    func body(content:\
  \ Content) -> some View {\n        content\n        ... // 在此处进行修改\n    }\n}\n```\n\
  \n### SwiftUI 中的链式修饰符\n\n为了让你的修饰符看起来像标准的 SwiftUI 修饰符，你需要创建一个扩展。根据你的修饰符，你可以通过扩展 `View`\
  \ 使其全局可用，或者使其更针对你特定的视图或某个组件树（例如 `Text` 的子类）。\n\n```\nextension View {\n    func\
  \ applyMyStyle() -> some View {\n        modifier(ModifierName())\n    }\n}\n```\n\
  \n### 不依赖 UIKit 的 HeaderText\n\n公式 8-6 展示了如何为 `Text` 创建一个修饰符，以生成与公式 8-5 样式匹配的标题。\n\
  \n```\nimport SwiftUI\nstruct Header: ViewModifier {\n    func body(content: Content)\
  \ -> some View {\n        content\n            .font(.system(size: 20, weight: .bold))\n\
  \            .foregroundColor(Color(UIColor.darkText))\n            .fixedSize(horizontal:\
  \ false, vertical: true)\n            .lineLimit(1)\n            .frame(alignment:\
  \ .center)\n    }\n}\nextension Text {\n    func styleAsHeader() -> some View {\n\
  \        modifier(Header())\n    }\n}\n公式 8-6\n使用 ViewModifier 的 HeaderText\n```\n\
  \n像这样使用它：\n\n```\nstruct ContentView: View {\n    var body: some View {\n      \
  \  Text(\"Hello, world!\")\n            .styleAsHeader()\n    }\n}\n```\n\n如果你的\
  \ `View` 具有无法应用于 `Context` 的特定属性，请在调用修饰符方法之前，直接在扩展中应用它们。例如：\n\n```\nfunc changeMyView()\
  \ -> some View {\n    doSomethingSpecific().modifier(SomeModifier())\n}\n```\n\n\
  使用 `ViewModifier`，你可以创建自己的样式库，而无需对 `View` 进行子类化。\n\n**注意**：如果你在容器（例如 `HStack` 或\
  \ `VStack`）上应用修饰符，它将应用于其所有子元素。这就是为什么通常最好使用纯修饰符，而不调用 `View` 子类的方法，并全局扩展 `View`。\n\
  \n## 创建自定义视图\n\nSwiftUI 最有用的特性之一就是创建可重用的自定义组件。创建小的、可调整的构建块为 UI 创作提供了无限可能。\n\n创建自定义视图主要有三种方式：\n\
  \n-   组合现有的 SwiftUI 组件并根据你的需求进行调整\n-   包装 UIKit 组件\n-   使用 `Canvas` 通过线条、圆形和其他图元绘制你自己的视图\n\
  \n自定义视图可以拥有可变数据。有两个关键的属性包装器：\n\n-   `@State`\n-   `@Binding`\n\n我们在本章前面已经讨论了组合和包装\
  \ UIKit 组件。让我们详细回顾一下 `Canvas` 绘制和属性包装器。\n\n### 在 Canvas 上绘制\n\n`Canvas` 是一个 SwiftUI\
  \ 控件，允许直接访问 CoreGraphics 的 `CGContext`。`CGContext` 有许多绘制方法，例如：\n\n-   `func addRect(CGRect)`\
  \ – 绘制一个矩形\n-   `func addEllipse(in: CGRect)` – 绘制一个椭圆\n-   `func addArc(center:\
  \ CGPoint, radius: CGFloat, startAngle: CGFloat, endAngle: CGFloat, clockwise: Bool)`\
  \ – 绘制一条弧线（椭圆的一部分）\n-   以及其他方法\n\n如果我们绘制一个带有虚线边框的实心圆，并让其围绕中心旋转，它看起来就像一个加载指示器（见图\
  \ 8-2）。让我们回顾一下公式 8-7 中的示例。\n\n```\nimport SwiftUI\nlet loaderTimer = Timer.publish(every:\
  \ 0.1, on: .main, in: .common).autoconnect()\nstruct LoaderView: View {\n    let\
  \ circleColor: UIColor\n    let spinnerColor: UIColor\n    @State private var phase:\
  \ CGFloat = 0\n    @State private var length: CGFloat = Double.pi*12\n    var body:\
  \ some View {\n        Canvas { context, size in\n            context.withCGContext\
  \ { cgContext in\n                let rect = CGRect(origin: .zero, size: size).insetBy(dx:\
  \ 4, dy: 4)\n                let path = CGPath(ellipseIn: rect, transform: nil)\n\
  \                cgContext.addPath(path)\n                cgContext.setStrokeColor(spinnerColor.cgColor)\n\
  \                cgContext.setFillColor(circleColor.cgColor)\n                cgContext.setLineWidth(4)\n\
  \                cgContext.setAlpha(0.5)\n                cgContext.setLineDash(phase:\
  \ 0, lengths: [length])\n                cgContext.drawPath(using: .eoFillStroke)\n\
  \            }\n        }\n        .frame(width: 32, height: 32)\n        .transformEffect(\n\
  \            CGAffineTransform(translationX: 16, y: 16)\n                .rotated(by:\
  \ phase / 8)\n                .translatedBy(x: -16, y: -16)\n        )\n       \
  \ .onReceive(loaderTimer) { _ in\n            phase += 1\n            let sinPhase\
  \ = sin(phase / 20)\n            length = Double.pi * (CGFloat(12) + abs(sinPhase)\
  \ * CGFloat(11))\n        }\n    }\n}\nstruct LoaderView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ZStack {\n            Color.black\n\
  \                .edgesIgnoringSafeArea(.all)\n            LoaderView(\n       \
  \         circleColor: .blue,\n                spinnerColor: .white\n          \
  \  )\n        }\n    }\n}\n公式 8-7\n在 SwiftUI 中使用 Canvas\n```\n\n![](img/515103_1_En_8_Fig2_HTML.png)\n\
  \n两幅图像中，第一幅展示了用于在左侧 SwiftUI 界面中生成自定义旋转器的代码截图，第二幅展示了右侧 iPhone 模拟器中自定义旋转器（一个蓝色圆点）的预览。\n\
  \n**图 8-2**: 用 SwiftUI 编写的自定义旋转器\n\n这里你可以看到许多魔数。尝试改动它们，看看结果如何变化。\n\n\n\n### 组件状态\n\
  \n我们在多个示例中已经使用了 `@State` 关键字。`@State` 是什么？它又如何改变我们的 `View`？\n\n`@State` 是一个属性包装器，意味着它会在后台生成一些代码。它会创建一个存储空间，并将我们的变量移出结构体（因为结构体是值类型）。建议将\
  \ `@State` 变量设为私有，并在声明后立即初始化，而不使用构造函数。\n\n`@State` 变量用于保持 `View` 的状态。根据组件逻辑，它可以是一个文本字符串、布尔值、数字或结构体。`@State`\
  \ 变量可以直接在布局中使用，甚至可以根据用户的操作在布局中改变它们。\n\n`@State` 变量不应在对象之间共享。它们不可观察，其变化也无法通过 `willSet`\
  \ 或 `didSet` 来处理。要在 `@State` 变量变化时运行某些代码，可以使用以下三种方式：\n\n*   使用 UI 控件回调，例如 `onChange`\
  \ 或 `onEditingChanged`。\n*   使用绑定。\n*   使用可观察对象（例如，你的视图模型可以遵循 `ObservableObject`\
  \ 协议）。\n\n要查看 `@State` 包装器的实际操作，请参考示例 8-3 和 8-7。\n\n### 数据绑定\n\n使用 `@Binding` 替代\
  \ `@State`，可以让变量与 UI 元素之间建立更强大的连接，并在对象之间共享状态。\n\n如果你使用了视图模型并在其中声明了某个变量，你可以通过传递绑定本身（而不是值）来建立与\
  \ UI 元素的连接。\n\n这种方法的优势如下：\n\n*   当你切换开关或输入文本时，它会在视图模型中直接更改值。后续使用起来会非常方便。\n*   如果一个变量改变了多个\
  \ UI 组件，那么当该变量发生变化时，这些组件会自动更新。\n\n例如，如果某个文本字段只应在 `Toggle` 开启时出现，`@State` 无法解决这个问题，但\
  \ `@Binding` 可以（示例 8-8）。\n\n```\nimport SwiftUI\nclass LoginViewModel: ObservableObject\
  \ {\n@Published var login: String = \"\"\n@Published var password: String = \"\"\
  \n@Published var rememberMe: Bool = false\n}\nstruct LoginView: View {\n@Binding\
  \ var login: String\n@Binding var password: String\n@Binding var rememberMe: Bool\n\
  var body: some View {\nVStack {\nTextField(\"Login\", text: $login)\nTextField(\"\
  Password\", text: $password)\nToggle(isOn: $rememberMe) {\nText(\"Remember me\"\
  )\n}\n}\n}\n}\nstruct LoginScreenView: View {\n@ObservedObject var viewModel = LoginViewModel()\n\
  private var loginAvailable: Bool {\n!viewModel.login.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty\
  \ &&\n!viewModel.password.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty\n\
  }\nvar body: some View {\nVStack {\nLoginView(\nlogin: $viewModel.login,\npassword:\
  \ $viewModel.password,\nrememberMe: $viewModel.rememberMe\n)\nButton(\"Login\")\
  \ {\nprint(\"Your login: \\(viewModel.login)\")\nprint(\"Your password: \\(viewModel.password)\"\
  )\nif viewModel.rememberMe {\nprint(\"We will remember you\")\n} else {\nprint(\"\
  You will be automatically logged out\")\n}\n}.disabled(!loginAvailable)\n}\n}\n\
  }\nstruct LoginView_Previews: PreviewProvider {\nstatic var previews: some View\
  \ {\nLoginScreenView()\n}\n}\n示例 8-8\n使用 @Binding\n```\n\n在此示例中，我们同时使用了绑定和可观察对象。通过使用可发布的视图模型和绑定，我们只需极少的代码就能控制*登录*按钮（当其中一个字段为空时，该按钮会变为不可用）。我们还可以从*登录*按钮的回调中访问输入的值，而无需引用文本字段本身。\n\
  \n这些功能展示了 SwiftUI 的强大之处，以及相比 UIKit 的优势（图 8-3）。\n\n![](img/515103_1_En_8_Fig3_HTML.png)\n\
  \n两张图片的集合。左侧是 Swift 用户界面中数据绑定代码的截图，右侧是 iPhone 轮廓中登录页面创建的预览。\n\n图 8-3\n\nSwiftUI\
  \ 中的数据绑定\n\n## 总结\n\nSwiftUI 是 iOS UI 开发的未来。本章的目的并非提供全面的 SwiftUI 课程——这个话题对于一章而言过于庞大。但我们讨论了几个有趣的概念，展示了\
  \ SwiftUI 的强大功能，例如用构建块搭建用户界面、在 SwiftUI 中使用 UIKit 组件、使用 `ViewModifier`、Canvas 和 Binding。\n\
  \n\n\n"
