  \ { Int16(exactly: self.rounded()) }\n    var asInt32: Int32? { Int32(exactly: self.rounded())\
  \ }\n    var asInt64: Int64? { Int64(exactly: self.rounded()) }\n    var asInt:\
  \ Int? { Int(exactly: self.rounded()) }\n    var asUInt8: UInt8? { UInt8(exactly:\
  \ self.rounded()) }\n    var asUInt16: UInt16? { UInt16(exactly: self.rounded())\
  \ }\n    var asUInt32: UInt32? { UInt32(exactly: self.rounded()) }\n    var asUInt64:\
  \ UInt64? { UInt64(exactly: self.rounded()) }\n    var asUInt: UInt? { UInt(exactly:\
  \ self.rounded()) }\n    var asDouble: Double { Double(self) }\n}\n\npublic extension\
  \ Double {\n    var asInt8: Int8? { Int8(exactly: self.rounded()) }\n    var asInt16:\
  \ Int16? { Int16(exactly: self.rounded()) }\n    var asInt32: Int32? { Int32(exactly:\
  \ self.rounded()) }\n    var asInt64: Int64? { Int64(exactly: self.rounded()) }\n\
  \    var asInt: Int? { Int(exactly: self.rounded()) }\n    var asUInt8: UInt8? {\
  \ UInt8(exactly: self.rounded()) }\n    var asUInt16: UInt16? { UInt16(exactly:\
  \ self.rounded()) }\n    var asUInt32: UInt32? { UInt32(exactly: self.rounded())\
  \ }\n    var asUInt64: UInt64? { UInt64(exactly: self.rounded()) }\n    var asUInt:\
  \ UInt? { UInt(exactly: self.rounded()) }\n    var asFloat: Float? { Float(exactly:\
  \ self) }\n}\n```\n\n## 秘籍 1-1：安全的数值转换\n\n本秘籍可让你安全地将一种数值类型转换为另一种数值类型，并支持此类转换的链式调用。例如，如果你有一个\
  \ `Int`，但函数是以 `Double` 扩展的形式提供的，那么这种链式调用就能解决问题：`x.asDouble.process.asInt`。\n\n>\
  \ **注意**\n> \n> 最佳学习方式就是动手尝试。而尝试 Swift 代码的最佳方式就是 Xcode Playground（图 1-1）。要创建新的 playground，请打开\
  \ Xcode，打开“File”菜单，选择“New”，然后点击“Playground…”。\n\n![图 1-1 - Swift Playground](img/515103_1_En_1_Fig1_HTML.png)\n\
  \n*一个 IDE 界面，其中打开了名为“recipe 1 safe number conversion”的代码文件。左侧面板列出了各种源代码和资源。其中定义了\
  \ 16 位、32 位和 64 位整数。*\n\n**图 1-1**  \nSwift Playground\n\n\n\n### 数字与字符串的相互转换\n\n\
  将任何类型的数字转换为 `String` 的最简单方法是*字符串插值*。在 Swift 中，你可以通过在变量名前添加 `\\(` 并在其后添加 `)`，将任何变量包含在\
  \ `String` 中。它甚至适用于表达式和函数。例如：\n\n```\nlet age = 30\nlet str = \"Your age is \\(age).\
  \ Next year you'll be \\(age+1)\"\n```\n\n如果需要格式化，情况会更复杂。如果你需要获取一个包含价格的字符串，你可能希望货币部分有两位数字。\n\
  \n有两种方法。你可以使用 `String(format:_:...)` 构造器。第一个参数是模板，其余参数是变量。如果你熟悉 C 家族编程语言，你应该知道 `sprintf`\
  \ 函数。它的工作原理完全相同。示例：\n\n```\nlet price = 14.50\nlet priceString = String(format:\
  \ \"Price: $%.02f\", price)\n```\n\n有时，你需要更灵活的处理。虽然大多数国家使用两位数字表示货币单位，但其他一些国家需要三位数字。一个巴林第纳尔等于\
  \ 1000 费尔，一个人民币元等于 10 角，依此类推。\n\n根据应用程序的功能，你可以为所有必要的数据类型编写格式化器。如果你使用 `Double` 来存储价格，你可以编写一个扩展来格式化它，并在需要的地方使用它。这样的扩展如配方\
  \ 1-2 所示。\n\n> **注意**\n> 使用 `Double` 来表示价格并不是一个好主意。尽管它们具有高精度，但丢失 0.000...1 可能会使你的显示价格从\
  \ 1.00 变为 0.99。更可靠的方法是使用简单的 `Int` 并以货币单位来存储价格。或者，你可以使用更复杂的数据结构，将其存储为两个 `Int` 变量——一个表示整数单位，另一个表示货币单位。\n\
  \n```\npublic extension Double {\n    var asPrice: String {\n        guard let cents\
  \ = (self * 100.0).asInt else {\n            return \"\"\n        }\n        return\
  \ String(format: \"%d.%02d\", cents / 100, cents % 100)\n    }\n}\npublic extension\
  \ Int {\n    var asPrice: String {\n        String(format: \"%d.%02d\", self / 100,\
  \ self % 100)\n    }\n}\n配方 1-2\n格式化价格\n```\n\n*用法*\n\n```\nlet price = 14.5\nlet\
  \ priceString = \"Price: $\\(price.asPrice)\"\n```\n\n类似地，你可以格式化任何其他数据。\n\n另一种格式化数字的方法是扩展\
  \ `String.StringInterpolation`。它使你可以访问插值逻辑。通常，它用于日期和自定义类型，但你也可以将其用于数字。除非应用程序用于科学目的，否则你不需要超过三位小数来表示双精度浮点数。\n\
  \n快速的解决方案如下：\n\n```\npublic extension String.StringInterpolation {\n    mutating\
  \ func appendInterpolation(_ value: Double) {\n        let formatter = NumberFormatter()\n\
  \        formatter.decimalSeparator = \".\"\n        formatter.maximumFractionDigits\
  \ = 3\n        if let result = formatter.string(from: value as NSNumber) {\n   \
  \         appendLiteral(result)\n        }\n    }\n}\n```\n\n上述扩展将小数位数限制为三位，并添加了小数点分隔符。\n\
  \n但在 `UITableView` 或 `UICollectionView` 中使用时，它只是写起来很快；这可能会导致性能问题。为什么？因为我们每次都会创建并设置\
  \ `NumberFormatter`。\n\n正确的解决方案是创建一个惰性变量，它只会创建一次 `NumberFormatter`，然后每次都重用。我们不能在扩展中创建变量，因此我们必须创建一个辅助类，如配方\
  \ 1-3 所示。\n\n```\nclass MyFormatters {\n    static var formatterWithThreeFractionDigits:\
  \ NumberFormatter = {\n        let formatter = NumberFormatter()\n        formatter.decimalSeparator\
  \ = \".\"\n        formatter.maximumFractionDigits = 3\n        return formatter\n\
  \    }()\n}\npublic extension String.StringInterpolation {\n    mutating func appendInterpolation(_\
  \ value: Double) {\n        let formatter = MyFormatters.formatterWithThreeFractionDigits\n\
  \        if let result = formatter.string(from: value as NSNumber) {\n         \
  \   appendLiteral(result)\n        }\n    }\n}\n配方 1-3\n自定义字符串插值\n```\n\n> **注意**\n\
  > 所有静态变量都是惰性的，因此你无需添加 `lazy` 关键字。更甚至，你也不能这样做。\n\n那么反向转换呢？如果我们得到一个 `String`，如何将其转换为\
  \ `Int` 或 `Double` 来执行数值运算？一个简单的答案是：\n\n```\nlet str = \"123.5\"\nlet i = Int(str)\n\
  let d = Double(str)\n```\n\n这段代码是安全的，因为它返回可选值。在上面的例子中，`i` 将是 `nil`，而 `d` 将是 `123.5`。这是一段非常好用的代码，但存在两种有问题的情形：\n\
  \n1. 如果 `str` 是可选的，它将无法编译。这可以通过 nil 合并运算符（`str ?? \"\"`）来解决。如果 `str` 是 `nil`，它将被替换为空字符串。由于空字符串无法解析为数字（无论是\
  \ `Double` 还是 `Int`），结果将为 `nil`。\n\n2. 在某些语言环境中，小数点分隔符是“`,`”而不是“`.`”。这在解析用户输入时可能会成为一个问题。快速修复方法是将逗号替换为点号：`.replacingOccurrences(of:\
  \ \",\", with: \".\")`。\n\n让我们总结一下，并创建一个易于使用的 `String` 扩展（配方 1-4）。\n\n```\npublic\
  \ extension StringProtocol {\n    var asInt8: Int8? { Int8(self) }\n    var asUInt8:\
  \ UInt8? { UInt8(self) }\n    var asInt16: Int16? { Int16(self) }\n    var asUInt16:\
  \ UInt16? { UInt16(self) }\n    var asInt32: Int32? { Int32(self) }\n    var asUInt32:\
  \ UInt32? { UInt32(self) }\n    var asInt64: Int64? { Int64(self) }\n    var asUInt64:\
  \ UInt64? { UInt64(self) }\n    var asInt: Int? { Int(self) }\n    var asUInt: UInt?\
  \ { UInt(self) }\n    var asDouble: Double? { Double(self.replacingOccurrences(of:\
  \ \",\", with: \".\")) }\n    var asFloat: Float? { Float(self.replacingOccurrences(of:\
  \ \",\", with: \".\")) }\n}\n配方 1-4\n将字符串解析为数字类型\n```\n\n### 布尔值转换\n\n尽管 `Bool`\
  \ 是最简单的类型，只有两个值，但解析它可能是一个挑战。为了理解原因，请尝试判断 `1` 是 `true` 还是 `false`。大多数开发者会说 `1` 无疑是\
  \ `true`，因为 `0` 是 `false`，而任何其他值都是 `true`。这在 Swift 和大多数其他编程语言中正是这样运作的。在某些情况下，`0`\
  \ 可能表示成功（无错误），而其他值则表示错误代码。如果你遇到这种情况，请记住这一点，但我们将假设 `Int` 在等于 `0` 时转换为 `false`，否则转换为\
  \ `true`。\n\n其他问题包括：是否应该将 `\"yes\"` 或 `\"true\"` 解析为 `true`，以及如何处理像 `5` 或 `\"success\"\
  ` 这样的自定义值。这取决于数据的来源。你应该阅读所使用的 API 或库的文档并据此做出决定。\n\n配方 1-5 遵循表 1-1 中指定的规则集。\n\n**表\
  \ 1-1** 任意类型到 Bool 的转换规则\n\n| 解析类型 | 规则 |\n| --- | --- |\n| `Bool` | 按原样返回解析后的值。\
  \ |\n| `Int` | 如果值为 `0`，则返回 `false`，否则返回 `true`。 |\n| `Float` 或 `Double` | 返回 `nil`\
  \ 以避免混淆。布尔值绝不应表示为浮点数。 |\n| `String` | 如果值为 `\"true\"` 或 `\"yes\"`，则返回 `true`；如果值为\
  \ `\"false\"` 或 `\"no\"`，则返回 `false`；在所有其他情况下返回 `nil`。字符串比较应不区分大小写。 |\n| 其他类型 |\
  \ 返回 `nil`。 |\n\n```\n// Any 无法被扩展，因此它是一个函数\nfunc parseAsBool(value: Any?) -> Bool?\
  \ {\n    if let boolValue = value as? Bool {\n        return boolValue\n    } else\
  \ if let intValue = value as? Int {\n        return intValue != 0\n    } else if\
  \ value is Float || value is Double {\n        return nil\n    } else if let strValue\
  \ = value as? String {\n        let strPrepared = strValue.trimmingCharacters(in:\
  \ .whitespacesAndNewlines).lowercased()\n        if strPrepared == \"true\" || strPrepared\
  \ == \"yes\" {\n            return true\n        } else if strPrepared == \"false\"\
  \ || strPrepared == \"no\" {\n            return false\n        } else {\n     \
  \       return nil\n        }\n    } else {\n        return nil\n    }\n}\n配方 1-5\n\
  从变量中提取布尔值\n```\n\n如果你希望所有数字类型都转换为 `Bool`，你可以使用 `isZero` 函数，而不是返回 `nil`。如果 `Double.isZero`\
  \ 返回 `true`，则返回 `false`。否则，返回 `true`。\n\n\n\n### 字符串与数据的相互转换\n\n`String`和`Data`是\
  \ Swift 中两种高度常用的类型。`Data`拥有一个不带有特定语义的字节缓冲区。`String`本质上是相同的，但 Swift 将这一缓冲区解释为字符序列，包括空格和换行等特殊符号。\n\
  \n根据不同的使用场景，你可能需要将`String`转换为`Data`，或者反之。\n\n```\nlet data = Data()\nlet str = String(data:\
  \ data, encoding: .utf8)\n```\n\n如果数据无法使用指定的编码（此处为 UTF-8）进行解析，这段代码将返回`nil`。例如，如果你从\
  \ iPhone 的存储中读取一个 JPEG 文件（或从互联网上下载它）并将其传递给`String`构造器，它将始终返回`nil`。\n\n从`String`到`Data`的转换在使用\
  \ UTF-8 编码时很少失败：\n\n```\nlet str = \"I'm a string\"\nlet data = str.data(using:\
  \ .utf8)\n```\n\n但有些情况下，你可能需要将其编码为 ASCII（美国信息交换标准码），它是 UTF 引入之前的标准。ASCII 每个符号使用\
  \ 7 位，仅支持 128 个字符（包括特殊字符）。阿拉伯语、日语或西里尔字母无法以此方式编码，因此转换会失败，`Data`将为`nil`。UTF8 数据的转换在秘籍\
  \ 1-6 中展示。\n\n我们将在第二章更详细地讨论`String`类型及其特性。\n\n```\npublic extension StringProtocol\
  \ {\n    var asUtf8Data: Data {\n        data(using: .utf8)!\n    }\n}\n\npublic\
  \ extension Data {\n    var asUtf8String: String? {\n        String(data: self,\
  \ encoding: .utf8)\n    }\n}\n\n秘籍 1-6\n字符串与数据的相互转换\n```\n\n### 日期、时间戳与 ISO 8601\
  \ 格式\n\n我们经常需要将日期表示为字符串。Swift 内置了`Date`结构体。它同时表示日期和时间，支持时区，并作为许多函数和方法的参数或返回类型使用。使用`Date`的最大问题在于它是\
  \ Swift 的内部格式——你无法直接将其传递给服务器；必须将其转换为`String`、`Int`或其他通用格式。\n\n其中一种标准称为*时间戳*或*UNIX\
  \ 时间戳*。它是一个整数值，表示自*纪元*以来的秒数或毫秒数。纪元是指 1970 年 1 月 1 日午夜。在 Swift 中，时间戳以`Double`表示；它们包含整数部分（秒）和小数部分（秒的分数）。\n\
  \n这两个函数——一个方法和一个构造器——用于`Date`与`Double`之间的相互转换：\n\n```\nlet date = Date()\nlet timestamp\
  \ = date.timeIntervalSince1970\nlet restoredDate = Date(timeIntervalSince1970: timestamp)\n\
  ```\n\n时间戳最大的问题在于缺少时区信息。Swift 的`Date`返回自 1970 年 1 月 1 日 UTC（协调世界时）以来的秒数。因此，如果你将其转换为`Date`对象，需要进行正确的时区转换。\n\
  \n另一种表示时间的方式是 ISO 8601 格式。ISO 代表国际标准化组织。任何以 ISO 开头的事物都意味着它是一个标准。\n\nSwift 并未直接提供\
  \ ISO 8601 格式的`String`与`Date`之间的转换选项，但使用`DateFormatter`类可以相当容易地实现它，如秘籍 1-7 所示。\n\
  \n```\npublic extension Formatter {\n    static let iso8601withFractionalSeconds:\
  \ DateFormatter = {\n        let formatter = DateFormatter()\n        formatter.calendar\
  \ = Calendar(identifier: .iso8601)\n        formatter.locale = Locale(identifier:\
  \ \"en_US_POSIX\")\n        formatter.dateFormat = \"yyyy-MM-dd'T'HH:mm:ss.SSSZZZZZ\"\
  \n        return formatter\n    }()\n}\n\npublic extension Date {\n    var iso8601String:\
  \ String {\n        Formatter.iso8601withFractionalSeconds.string(from: self)\n\
  \    }\n\n    init?(iso8601String: String) {\n        guard let date = Formatter.iso8601withFractionalSeconds.date(from:\
  \ iso8601String) else {\n            return nil\n        }\n        self = date\n\
  \    }\n}\n\n秘籍 1-7\n日期转换为 ISO 8601\n```\n\n*用法*\n\n```\nlet dateWrong = Date(iso8601String:\
  \ \"现在是 5 点\")\n// dateWrong 为 nil\n\nlet dateCorrect = Date(iso8601String: \"2021-07-01T18:30:00.000+04:00\"\
  )\n// dateCorrect 是一个有效的 Date 对象\n```\n\n请注意，在调试会话中，你将看到你本地时区的时间，这通常就是你想要展示给用户的内容。\n\
  \n## 从字典和数组中提取数据\n\n仅靠简单的数据类型能做的工作有限。在真实的应用中，会使用更复杂的类型。你可以拥有一个包含不同数据类型和内部嵌套不同结构体的结构体。这被称为`Dictionary`。基本上，`Dictionary`是一组键和值的集合。它们可以被特定的数据类型限制。在\
  \ Swift 代码中你很少会看到`Dictionary`这个关键字。更常见的语法是：\n\n```\nvar dict: [String: Any] = [:]\n\
  ```\n\n这段代码创建了一个`Dictionary`变量。每个键必须是`String`类型。值可以是任何类型，包括另一个字典。\n\n如果你需要一个相同类型值的有序列表，可以使用`Array`。它没有键，但使用索引代替。\n\
  \n```\nvar arr: [String] = []\n```\n\n### 复杂数据类型\n\n字典和数组的组合允许你创建任意复杂度的数据结构。\n\n\
  很容易看出它与 JSON（JavaScript 对象表示法）结构的相似性。JSON 是 API 请求和响应中最流行的格式。当移动应用请求读取天气预报、用户信息或服务器上的任何其他数据时，几乎可以确定它得到的是\
  \ JSON。\n\n从 API 返回的`String`或`Data`中解析 JSON 结构将在后面讨论。现在让我们专注于从`Dictionary`和`Array`中提取数据。\n\
  \n### 从字典中提取数据\n\n假设我们有一个`Dictionary`：\n\n```\nvar dict: [String: Any] = [\n   \
  \ \"name\": \"John\",\n    \"surname\": \"Doe\",\n    \"age\": 30\n]\n```\n\n今天是\
  \ John 的生日，所以我们需要让他年长一岁：\n\n```\nif var age = dict[\"age\"] {\n    age += 1\n  \
  \  dict[\"age\"] = age\n}\n```\n\n这里我们遇到了一个问题——代码无法编译。`age`不是数字；它是`Any`。我们不能对`Any`进行递增操作，这没有意义。类型转换可以解决这个问题：\n\
  \n```\nif var age = dict[\"age\"] as? Int {\n    age += 1\n    dict[\"age\"] = age\n\
  }\n```\n\n这是一段可工作的代码，除了一种情况。API 响应通常由脚本语言生成，而不是像 JavaScript 这样的严格类型语言。年龄很有可能是`\"\
  30\"`而不是`30`。相反的问题也可能发生。如果文本字符串由数字组成，它可能被解析为一个数字。例如，银行卡号可能被解析为一个很大的`Int`，而你可能需要它作为`String`。或者用户的密码`123456`可能被解析为`Int`而不是`String`。\n\
  \n正如我们已经知道的，Swift 的类型转换不会自动将`Int`变成`String`。而`Bool`变量则完全不确定。秘籍 1-8 中的`Dictionary`扩展将帮助我们解决这个问题。\n\
