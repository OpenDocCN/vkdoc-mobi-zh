  \ }\n    var asDouble: Double { Double(self) }\n}\n\npublic extension UInt32 {\n\
  \    var asInt8: Int8? { Int8(exactly: self) }\n    var asInt16: Int16? { Int16(exactly:\
  \ self) }\n    var asInt32: Int32? { Int32(exactly: self) }\n    var asInt64: Int64\
  \ { Int64(self) }\n    var asInt: Int? { Int(exactly: self) }\n    var asUInt8:\
  \ UInt8? { UInt8(exactly: self) }\n    var asUInt16: UInt16? { UInt16(exactly: self)\
  \ }\n    var asUInt64: UInt64 { UInt64(self) }\n    var asUInt: UInt { UInt(self)\
  \ }\n    var asFloat: Float { Float(self) }\n    var asDouble: Double { Double(self)\
  \ }\n}\n\npublic extension Int64 {\n    var asInt8: Int8? { Int8(exactly: self)\
  \ }\n    var asInt16: Int16? { Int16(exactly: self) }\n    var asInt32: Int32? {\
  \ Int32(exactly: self) }\n    var asInt: Int? { Int(exactly: self) }\n    var asUInt8:\
  \ UInt8? { UInt8(exactly: self) }\n    var asUInt16: UInt16? { UInt16(exactly: self)\
  \ }\n    var asUInt32: UInt32? { UInt32(exactly: self) }\n    var asUInt64: UInt64?\
  \ { UInt64(exactly: self) }\n    var asUInt: UInt? { UInt(exactly: self) }\n   \
  \ var asFloat: Float { Float(self) }\n    var asDouble: Double { Double(self) }\n\
  }\n\npublic extension UInt64 {\n    var asInt8: Int8? { Int8(exactly: self) }\n\
  \    var asInt16: Int16? { Int16(exactly: self) }\n    var asInt32: Int32? { Int32(exactly:\
  \ self) }\n    var asInt64: Int64? { Int64(exactly: self) }\n    var asInt: Int?\
  \ { Int(exactly: self) }\n    var asUInt8: UInt8? { UInt8(exactly: self) }\n   \
  \ var asUInt16: UInt16? { UInt16(exactly: self) }\n    var asUInt32: UInt32? { UInt32(exactly:\
  \ self) }\n    var asUInt: UInt? { UInt(exactly: self) }\n    var asFloat: Float\
  \ { Float(self) }\n    var asDouble: Double { Double(self) }\n}\n\npublic extension\
  \ Int {\n    var asInt8: Int8? { Int8(exactly: self) }\n    var asInt16: Int16?\
  \ { Int16(exactly: self) }\n    var asInt32: Int32? { Int32(exactly: self) }\n \
  \   var asInt64: Int64 { Int64(self) }\n    var asUInt8: UInt8? { UInt8(exactly:\
  \ self) }\n    var asUInt16: UInt16? { UInt16(exactly: self) }\n    var asUInt32:\
  \ UInt32? { UInt32(exactly: self) }\n    var asUInt64: UInt64? { UInt64(exactly:\
  \ self) }\n    var asUInt: UInt? { UInt(exactly: self) }\n    var asFloat: Float\
  \ { Float(self) }\n    var asDouble: Double { Double(self) }\n}\n\npublic extension\
  \ UInt {\n    var asInt8: Int8? { Int8(exactly: self) }\n    var asInt16: Int16?\
  \ { Int16(exactly: self) }\n    var asInt32: Int32? { Int32(exactly: self) }\n \
  \   var asInt64: Int64? { Int64(exactly: self) }\n    var asInt: Int? { Int(exactly:\
  \ self) }\n    var asUInt8: UInt8? { UInt8(exactly: self) }\n    var asUInt16: UInt16?\
  \ { UInt16(exactly: self) }\n    var asUInt32: UInt32? { UInt32(exactly: self) }\n\
  \    var asUInt64: UInt64 { UInt64(self) }\n    var asFloat: Float { Float(self)\
  \ }\n    var asDouble: Double { Double(self) }\n}\n\npublic extension Float {\n\
