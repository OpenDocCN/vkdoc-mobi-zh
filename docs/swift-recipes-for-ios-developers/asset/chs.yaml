  \n我们了解了三种流行的数据表示形式：JSON、XML 和 YAML。JSON 是最流行的数据交换格式，但其他格式在 IT 领域也有其位置。我们还回顾了`Encodable`和`Decodable`结构，它们是\
  \ Swift 中数据序列化的核心。如果你想保持灵活性、添加数据处理但保持数据结构化，属性包装器也可能很有用。\n\n最后，我们为数据添加了语义，并介绍了数字单位及其之间的转换。\n\
  \n在下一章中，我们将转向所有现代语言中最流行的数据类型之一——`String`。我们已经看到，它可以使用 JSON 表示几乎所有内容。但它还可以被分析、验证，用于表示二进制数据、安全数据等。\n\
  \n"
- "# 3. 使用字符串\n\n字符串也是数据——它们是字节数组。但与简单的`Data`不同，`String`类知道如何解释这些数据。为了正确解释数据，我们需要知道编码。最广泛使用的选项是\
  \ UTF-8 和 UTF-16，也称为 Unicode。\n\nUTF-8 使用 1 到 4 个字节来编码一个字符。ASCII 范围内的拉丁字符使用一个字节。如果文本仅包含拉丁字符、空格和标准标点符号，则\
  \ ASCII 和 UTF-8 文本字符串是相同的。\n\nUTF-16 每个字符使用 2 或 4 个字节。由于两个字节有 65536 种组合，它们覆盖了大多数现有符号，但并非全部。这就是为什么某些符号需要四个字节。\n\
  \n我们不需要知道`String`或`Character`结构内部使用哪种编码（是的，在 Swift 中，它们被定义为结构体，而不是类）。但是，知道它是一个`String`，我们可以获取关于存储数据的更多信息，相比`Data`对象而言。\n\
  \n我们知道文本字符串由字符组成，因此我们可以获取其中的一个字符。我们还可以获取一个范围，称为`Substring`。我们不需要考虑一个`Character`有多宽；Swift\
  \ 会自动计算字节宽度。我们可以去除空格和/或换行符，可以将其转换为小写或大写，并且可以分析其内容等。\n\n\n\n## 分析字符串内容\n\n假设我们有一个\
  \ `String` 对象，想要知道里面具体是什么内容。它包含拉丁字母吗？还是数字？它是一个强密码吗？或者是一个有效的电子邮件地址？\n\n`UIKit` 提供了两个用于获取用户文本输入的类：`UITextField`\
  \ 和 `UITextView`。两者都将输入数据作为字符串返回。即使我们要求用户输入一个数字（例如他们的年龄、银行卡号、需要猜的数字），并选择仅显示数字的屏幕键盘，我们得到的仍然是一个\
  \ `String`（参见方法 3-1）。\n\n```\npublic extension StringProtocol {\nvar containsOnlyDigits:\
  \ Bool {\nlet notDigits = NSCharacterSet.decimalDigits.inverted\nreturn rangeOfCharacter(from:\
  \ notDigits, options: String.CompareOptions.literal, range: nil) == nil\n}\nvar\
  \ containsOnlyLetters: Bool {\nlet notLetters = NSCharacterSet.letters.inverted\n\
  return rangeOfCharacter(from: notLetters, options: String.CompareOptions.literal,\
  \ range: nil) == nil\n}\nvar containsIllegalCharacters: Bool {\nrangeOfCharacter(from:\
  \ NSCharacterSet.illegalCharacters, options: String.CompareOptions.literal, range:\
  \ nil) != nil\n}\nvar containsOnlyPasswordAllowed: Bool {\nvar allowedCharacters\
  \ = CharacterSet()\nallowedCharacters.insert(charactersIn: \"!\"...\"~\")\nlet forbiddenCharacters\
  \ = allowedCharacters.inverted\nreturn rangeOfCharacter(from: forbiddenCharacters,\
  \ options: String.CompareOptions.literal, range: nil) == nil\n}\nvar isAlphanumeric:\
  \ Bool {\nlet notAlphanumeric = NSCharacterSet.decimalDigits.union(NSCharacterSet.letters).inverted\n\
  return rangeOfCharacter(from: notAlphanumeric, options: String.CompareOptions.literal,\
  \ range: nil) == nil\n}\nvar containsLetters: Bool {\nrangeOfCharacter(from: NSCharacterSet.letters,\
  \ options: String.CompareOptions.literal, range: nil) != nil\n}\nvar containsDigits:\
  \ Bool {\nrangeOfCharacter(from: NSCharacterSet.decimalDigits, options: String.CompareOptions.literal,\
  \ range: nil) != nil\n}\nvar containsUppercaseLetters: Bool {\nrangeOfCharacter(from:\
  \ NSCharacterSet.uppercaseLetters, options: String.CompareOptions.literal, range:\
  \ nil) != nil\n}\nvar containsLowercaseLetters: Bool {\nrangeOfCharacter(from: NSCharacterSet.lowercaseLetters,\
  \ options: String.CompareOptions.literal, range: nil) != nil\n}\nvar containsNonAlphanumericCharacters:\
  \ Bool {\nlet notAlphanumeric = NSCharacterSet.decimalDigits.union(NSCharacterSet.letters).inverted\n\
  return rangeOfCharacter(from: notAlphanumeric, options: String.CompareOptions.literal,\
  \ range: nil) != nil\n}\n}\n方法 3-1\n检查字符串中的数字和字母\n```\n\n这三个扩展使我们能够进行快速（但简单）的内容分析：\n\
  \n*   如果 `String` 只包含数字，则 `containsOnlyDigits` 返回 `true`。没有小数点分隔符，没有空格，没有特殊字符。通过将\
  \ `String` 转换为 `Int` 也可以得到类似结果，但不会出现潜在溢出问题，并且我们可以区别处理负数。\n*   `containsOnlyLetters`\
  \ 在 `String` 仅包含字母时返回 `true`。未经修改时，它的用途不大，但我们稍后会对其进行更新，使其更强大。\n*   `isAlphanumeric`\
  \ 在 `String` 包含字母和数字时返回 `true`。例如，Firestore 文档 ID 和 MD5 哈希值的 `String` 表示形式始终是字母数字的。\n\
  \n既然我们在讨论现实世界的例子，就让我们谈谈用例吧。注册表单可能包含：\n\n*   名和姓\n*   电子邮件地址\n*   密码\n*   电话号码\n\
  *   性别\n*   出生日期或年龄\n*   信用卡信息\n*   地址\n\n当 Apple 的审核人员在注册屏幕上看到这样的列表时，他们会拒绝该应用。但对于特定功能来说，其中任何字段都是必需的。\n\
  \n我们将地址验证排除在讨论范围之外，因为它因国家而异，然后讨论其他字段。对于接下来描述的所有扩展，我们将使用以 `isValid` 开头的名称，例如 `isValidName`\
  \ 和 `isValidEmail`，并将它们写为计算属性。\n\n**注意**\n\n使用函数还是计算属性始终由程序员决定。有一种流行的观点认为：当函数反映对象的属性且不改变该属性时，应使用计算属性。\n\
  \n## 名、姓和其他名称\n\n根据应用的目标地区和你的偏好，可以是一个全名字段，也可以是分开的名和姓字段，还可以是一组更详细的字段（包括中间名或父名）。这些字段只能包含字母、空格、连字符，或许还可以包含像\
  \ \"Jr.\" 或 \"Mr.\" 这种头衔中的点符号。名称验证的示例如方法 3-2 所示。\n\n```\npublic extension StringProtocol\
  \ {\nvar isValidName: Bool {\nlet allowedCharactgers = NSCharacterSet.letters.union(NSCharacterSet.whitespaces).union(CharacterSet(charactersIn:\
  \ \".-\"))\nlet forbiddenCharacters = allowedCharactgers.inverted\nreturn rangeOfCharacter(from:\
  \ forbiddenCharacters, options: String.CompareOptions.literal, range: nil) == nil\n\
  }\n}\n方法 3-2\n名称验证\n```\n\n此扩展合并了三个字符集：\n\n*   空格\n*   字母\n*   字符 `.` 和 `-`\n\n\
  它反转结果集，并验证在 `String` 中未发现任何禁止字符。\n\n**注意**\n\n2020 年 5 月，著名商业巨头埃隆·马斯克（PayPal、特斯拉、SpaceX）和加拿大音乐人格莱姆斯有了一个儿子，这个儿子因其非常不寻常的名字\
  \ – X Æ A-12 – 而立即声名鹊起。然而，加利福尼亚州的户籍登记处要求名字仅包含英语的 26 个字母字符（外加连字符和撇号）；因此，这个名字被拒绝了。这对夫妇不得不将名字改为\
  \ X AE A-XII，其中 X 是名字，AE A-XII 是中间名。就像加利福尼亚州的管理部门一样，我们的扩展也会拒绝第一个选项，而接受最终版本。\n\n\
  ## 电子邮件地址\n\n这个话题总是引起很多争议。一些开发者试图将电子邮件地址限制在无问题的范围内，而另一些人则希望给予用户尽可能多的自由——甚至放弃客户端的验证。例如，电子邮件地址\
  \ `root@localhost` 有效吗？它实际上是有效的。但是，当用户在应用中注册时，它没什么用，因为我们无法向它发送任何电子邮件，而且它也不是唯一的。\n\
  \n我们将在用户注册的上下文中讨论电子邮件验证。我们将只允许以下格式的电子邮件：`some-string@some-domain.ext`。其中 `some-string`\
  \ 可以包含拉丁字母、数字以及符号 `.`、`_`、`-`、`%` 和 `+`；`some-domain` 可以包含拉丁字母、数字、`-` 以及用于子域的 `.`；`ext`\
  \ 必须只包含拉丁字母，长度不小于 2 个字符且不超过 64 个字符。\n\n可以使用正则表达式进行分析，如方法 3-3 所示。我们不会详细讨论正则表达式。简而言之，它是一种模式。正则表达式有标准的语法，该语法在不同的平台和语言中是通用的。用于电子邮件验证的正则表达式如下所示：`[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\\
  .[A-Za-z]{2,64}`。\n\n这并不是正则表达式的唯一选择。还有其他选项，但这个表达式效果很好，并且已经经过数十万用户的测试。它可以与 Firebase\
  \ Auth 框架一起使用，用于过滤不必要的请求，但如果你有自定义后端，它会更加有用。\n\n```\nextension StringProtocol {\n\
  var isValidEmail: Bool {\nlet emailRegEx = \"[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\\\\
  .[A-Za-z]{2,64}\"\nlet emailTest = NSPredicate(format: \"SELF MATCHES %@\", emailRegEx)\n\
  return emailTest.evaluate(with: self)\n}\n}\n方法 3-3\n电子邮件验证\n```\n\n\n\n### 密码\n\
  \n多么令人烦恼——当你试图将`\"12345678\"`设置为密码，而应用或网站却不允许时，不是吗？根据应用的具体情况，密码的最低强度要求应有所不同。如果你正在开发一个金融服务应用，密码应该很强。如果是一个个人卡路里计数器或在线视频流媒体服务，那么允许使用简单得多的密码也无妨。但无论如何，有些密码是绝不应被允许的，例如`\"\
  12345678\"`。\n\n密码的基本建议如下：\n\n*   密码应至少包含一个大写字母和一个小写字母。\n*   密码应至少包含一个数字。\n*   密码应至少包含一个特殊字符（标点符号、百分号、美元符号等）。\n\
  *   密码不应包含空格、换行符或制表符。\n\n最后一条建议是大多数服务的标准，尽管并非严格规则。前面的建议也并非绝对严格，但强制用户满足至少三条中的两条是一个好习惯。\n\
  \n来自配方 3-4 的扩展将验证：\n\n*   字符串仅包含字母数字字符，以及一些特殊字符（点号、逗号等）。\n*   字符串至少包含一个英文字母。\n*\
  \   满足以下三个条件中的两个：\n    *   字符串同时包含小写和大写字母。\n    *   字符串至少包含一个数字字符。\n    *   字符串至少包含一个允许的非字母数字字符。\n\
  \n```swift\npublic extension StringProtocol {\nvar isValidPassword: Bool {\nif containsIllegalCharacters\
  \ || !containsOnlyPasswordAllowed {\nreturn false\n}\nif !containsLetters {\nreturn\
  \ false\n}\nvar strength = 0\nif containsUppercaseLetters {\nstrength += 1\n}\n\
  if containsLowercaseLetters {\nstrength += 1\n}\nif containsDigits {\nstrength +=\
  \ 1\n}\nif containsNonAlphanumericCharacters {\nstrength += 1\n}\nreturn strength\
  \ >= 3\n}\n}\n配方 3-4\n密码验证\n```\n\n### 电话号码\n\n电话号码验证是另一项常见操作。毫无疑问，服务器应进行自己的验证。但为了避免不必要的流量、提供快速的错误处理并保护服务器免受潜在有害请求的攻击，最好也在客户端进行验证。\n\
  \n虽然电子邮件地址有更大的灵活性，但电话号码受到数字、加号和分隔符的限制。长度范围很窄，并且因国家而异。我们可以使用正则表达式进行基本验证，但还有一种更高效的方式，我们将在后面讨论。\n\
  \n`PhoneNumberKit`库允许解析电话号码、验证其有效性，并将本地电话号码转换为国际格式。在配方 3-5 中，我们使用该库来验证电话号码的有效性。让我们将其添加到`Podfile`中：\n\
  \n```swift\nimport PhoneNumberKit\npublic extension String {\nvar isValidPhoneNumber:\
  \ Bool {\ndo {\ntry phoneNumberKit.parse(\"+33 6 89 017383\")\nreturn true\n}\n\
  catch {\nreturn false\n}\n}\n}\n配方 3-5\n电话号码验证\n```\n\n```ruby\npod 'PhoneNumberKit'\n\
  ```\n\n### 性别\n\n除非绝对必要，否则性别选择不应出现在注册表单中。如果确实需要，请尽量将其设为可选。首先，苹果要求你的应用遵循其《指南》，该指南不允许索要不必要的个人数据。要让苹果相信了解用户性别对应用功能来说是必要的，将会很复杂。其次，向用户提供哪一系列性别选项也并不明确。如果你只提供男性和女性之间的选择，可能会让\
  \ LGBTQ+群体感到不满。他们同样是潜在客户，因此这一点需要谨记。\n\n如果你仍然决定在应用中添加性别选择，请将其作为两个或更多选项的选择项来添加，无需使用键盘。这样会使字符串分析变得不必要。\n\
  \n### 出生日期\n\n如果你有成人内容，这个字段可能是必需的。年龄（或出生日期）选择可以让你了解应显示或隐藏哪些内容。如果你的应用销售食品和饮料，你可以对未成年人隐藏酒精和烟草（具体年龄限制取决于地区）。\n\
  \n最佳实践是在你的 UI 中添加一个日期选择器组件，例如`UIDatePicker`。然后使用与你所在地区匹配的日期格式化器之一来格式化日期。例如：\n\n\
  ```swift\nlet selectedDate = Date()\nlet dateFormatter = DateFormatter()\ndateFormatter.dateFormat\
  \ = \"MM/dd/yyyy\"\ndateFormatter.string(from: selectedDate)\n```\n\n日期格式因国家而异。你的应用应使用你所在地区常用的格式，或根据设备设置提供几种选项。\n\
  \n如果你需要处理用户输入，又没有添加日期选择器的选项，`NSDataDetector`可以派上用场（参见配方 3-6）。\n\n```swift\npublic\
  \ extension String {\nvar asDate: Date? {\nlet range = NSRange(location: 0, length:\
  \ count)\nreturn try? NSDataDetector(types: NSTextCheckingResult.CheckingType.date.rawValue)\n\
  .matches(in: self, range: range)\n.compactMap(\\.date)\n.first\n}\n}\n配方 3-6\n从字符串解析日期\n\
  ```\n\n此扩展将尝试将任何用户输入的字符串转换为`Date`对象，如果无法转换则返回`nil`。\n\n\n\n### 信用卡信息\n\n如果想为应用添加任何付费功能，就需要使用应用内购买。苹果不允许你使用直接付款，否则应用将被拒绝。\n\
  \n另一方面，如果你销售的商品或服务不属于应用本身，那么你可能需要获取用户的信用卡号。典型的例子包括外卖应用、在线商店和预订服务。\n\n最常用的信用卡包含以下四个组成部分：\n\
  \n- `Number`（卡号）\n- `Expiration`（有效期）月份和年份\n- `Security code`（安全码）（`CVC`/`CVV`）\n\
  - `Name`（持卡人姓名）\n\n根据卡类型的不同，卡号位数从 16 到 19 位不等。通常，卡号每四位用空格分隔，但这并非强制要求。因此，我们会在验证之前移除所有空格。\n\
  \n至于有效期月份和年份，一切都很直接。月份是 1 到 12 之间的数字，年份有两位或四位数字。我们需要验证有效期是否在当前年月的当月或之后。\n\n安全码始终是一个数字，由三位或四位组成。由于它可能以零开头，因此其整数表示范围是\
  \ 0 到 9999。\n\n姓名的验证与注册表单上用户名的验证方式相同，因此我们只需复用现有代码即可。完整的信用卡验证代码在示例 3-7 中给出。\n\n```\n\
  public struct CreditCard {\n    public var number: String\n    public var expMonth:\
  \ Int\n    public var expYear: Int\n    public var securityCode: Int\n    public\
  \ var nameOnCard: String\n    public init(number: String, expMonth: Int, expYear:\
  \ Int, securityCode: Int, nameOnCard: String) {\n        self.number = number\n\
  \        self.expMonth = expMonth\n        self.expYear = expYear\n        self.securityCode\
  \ = securityCode\n        self.nameOnCard = nameOnCard\n    }\n    var isNumberValid:\
  \ Bool {\n        let numberProcessed = String(number.filter { !\" \".contains($0)\
  \ })\n        return numberProcessed.containsOnlyDigits && numberProcessed.count\
  \ >= 16 && numberProcessed.count <= 19\n    }\n    var isExpirationValid: Bool {\n\
  \        if expMonth < 1 || expMonth > 12 {\n            return false\n        }\n\
  \        let expYear4Digits = (expYear < 100 ? 2000 : 0) + expYear\n        let\
  \ monthToday = Calendar.current.component(.month, from: Date())\n        let yearToday\
  \ = Calendar.current.component(.year, from: Date())\n        switch expYear4Digits\
  \ - yearToday {\n        case ..<0: return false\n        case 0: return expMonth\
  \ >= monthToday\n        default: return true\n        }\n    }\n    var isSecurityCodeValid:\
  \ Bool {\n        securityCode < 10000\n    }\n    var isNameValid: Bool {\n   \
  \     nameOnCard.isValidName\n    }\n    public var isCardValid: Bool {\n      \
  \  isNumberValid && isExpirationValid && isSecurityCodeValid && isNameValid\n  \
  \  }\n}\n```\n\n与我们之前的大多数示例不同，这个示例是一个类，而不是扩展。信用卡卡号是一个整体概念——例如，我们同时验证月份和年份，因此不会将它们拆分成一组扩展。\n\
  \n在此之前，需要向验证结构中填入数据。使用 `isCardValid` 属性来获取布尔类型的验证结果。如果你需要知道哪个号码组件无效，可以使用 `isNameValid`、`isNumberValid`\
  \ 等函数。\n\n注意：本章我们讨论的是信息处理，而非用户界面，但有时在应用中（而非 playground）尝试代码可能更为实用。为此，你可以使用用于输入（扫描）和展示银行卡的库。在图\
  \ 3-1 中，你可以看到由 `CreditCardView` 库（ [`github.com/jboullianne/CreditCardView`](https://github.com/jboullianne/CreditCardView)\
  \ ）生成的展示效果。至于扫描，你可以使用 `card.io`（ [`github.com/card-io/card.io-iOS-SDK`](https://github.com/card-io/card.io-iOS-SDK)\
  \ ）。\n\n![](img/515103_1_En_3_Fig1_HTML.jpg)\n\n一张典型的 VISA 卡图片，包含用于容纳 16 位卡号的占位符。持卡人姓名为\
  \ Jean Marc Boullianne。有效期是 02/30。\n\n**图 3-1** iOS 应用中的信用卡可视化展示\n\n## Base64 与十六进制编码\n\
  \n我们经常需要将 `Data` 以 `String` 的形式呈现。这可能出于调试输出、传递给服务器或 JSON 集成的需要。有两种常见方式：Base64 编码和十六进制编码。\n\
  \n### Base64 编码\n\nBase64 是一种将二进制数据表示为文本字符串的方法。它将数据分割成 6 位的片段，并使用人类可读的字符进行编码：\n\n\
  - 26 个大写拉丁字母\n- 26 个小写拉丁字母\n- 10 个数字\n- `+`（加号）\n- `/`（斜杠）\n\n由于我们只能编码整数个字节，而 1\
  \ 字节等于 8 位，数据长度需要能被 3 整除。如果不能，则使用填充。当你需要在数据末尾添加空位时，会使用等号（`=`）进行填充。通过添加一个或两个填充位，你总能得到一个同时能被\
  \ 6 和 8 整除的位数。\n\nBase64 编码的优势在于，用于编码的字符是基本的 ASCII 字符，这意味着它们在所有单字节编码中表示方式相同。\n\n\
  表 3-1 将单词 `\"Swift\"` 编码为 Base64。\n\n**表 3-1** 单词“Swift”的二进制表示\n\n| S | w | i |\
  \ f | t |\n| --- | --- | --- | --- | --- |\n| 0101 0011 | 0111 0111 | 0110 1001\
  \ | 0110 0110 | 0111 0100 |\n\n总共得到 40 位，不能被 6 整除，因此我们需要填充。表 3-2 将其分割成 6 位的片段。\n\
  \n**表 3-2** 单词“Swift”的 Base64 表示\n\n| 010100 | 110111 | 011101 | 101001 | 011001\
  \ | 100111 | 0100XX |\n| --- | --- | --- | --- | --- | --- | --- |\n| U | 3 | d\
  \ | p | Z | n | Q= |\n\n结果：“Swift” -> U3dpZnQ=。\n\n将 ASCII 文本编码为 Base64 通常没有意义，但使用同样的方法，我们可以将图片、音频文件以及几乎所有内容编码为字符串。它比十六进制编码更紧凑，后者每个字节需要两个符号来表示，而\
  \ Base64 易于编码和解码。Base64 编码的二进制文件的典型例子是电子邮件附件。示例 3-8 展示了如何从 Base64 解码以及如何编码为这种格式。\n\
  \n```\nlet base64String = \"U3dpZnQ=\"\nlet data = Data(base64Encoded: base64String)!\n\
  // 检查我们是否得到了正确的文本\nlet decodedString = String(data: data, encoding: .utf8)!\nprint(decodedString)\n\
  let base64Again = data.base64EncodedString()\nprint(base64Again)\n```\n\n在前面的例子中，我们使用可选构造器\
  \ `Data(base64Encoded:)` 将 Base64 字符串解码为 `Data`。在这种情况下，我们使用了强制解包，因为我们知道它有效。请记住，在生产代码中，这不是推荐的做法。\n\
  \n`Data` 有一个用于编码的方法 `base64EncodedString`。这些是标准的 Swift 函数；在这种情况下不需要额外的代码。\n\n\n\n\
  ### 十六进制编码\n\n十六进制表示法更易读且更简单。我们不需要任何填充；每个字节用两个十六进制符号表示。十六进制符号是 0 到 9 的数字或 A 到 F\
  \ 的字母。每个十六进制符号编码 4 位信息。\n\n让我们重复对字符串 `\"Swift\"` 的编码过程（表 3-3）。\n\n**表 3-3** 单词“Swift”的二进制表示\n\
  \n| S | w | i | f | t |\n| --- | --- | --- | --- | --- |\n| 0101 0011 | 0111 0111\
  \ | 0110 1001 | 0110 0110 | 0111 0100 |\n\n表 3-4 展示了它在十六进制表示中的样子。\n\n**表 3-4** 单词“Swift”的十六进制表示\n\
  \n| 0101 | 0011 | 0111 | 0111 | 0110 | 1001 | 0110 | 0110 | 0111 | 0100 |\n| ---\
  \ | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| 5 | 3 | 7 | 7 | 6 |\
  \ 9 | 6 | 6 | 7 | 4 |\n\n如你所见，十六进制比 Base64 更长。在这个特定案例中，它看起来像一个数字。但通过一些练习，你可以学会阅读它。例如，S\
  \ 将始终编码为 53，w 编码为 77，以此类推。\n\n**注意**\n\n在源代码中，十六进制数字以 `0x` 开头，以避免与十进制数字混淆。如果十六进制表示为\
  \ `String`，它会被引号包裹，但没有任何前缀。\n\n让我们切换到代码。来自配方 3-9 的扩展提供了一个计算属性，将 `Data` 转换为十六进制编码的\
  \ `String`，以及一个执行反向操作的可选构造函数。\n\n```\npublic extension Data {\ninit?(hexString:\
  \ String) {\nif hexString.count % 2 != 0 {\nreturn nil\n}\nlet allowedCharacters\
  \ = CharacterSet(charactersIn: \"01234567890abcdefABCDEF\")\nif hexString.rangeOfCharacter(from:\
  \ allowedCharacters.inverted, options: String.CompareOptions.literal, range: nil)\
  \ != nil {\nreturn nil\n}\nself.init(capacity: hexString.count / 2)\nfor i in stride(from:\
  \ 0, to: hexString.count, by: 2) {\nlet startIndex = hexString.index(hexString.startIndex,\
  \ offsetBy: i)\nlet endIndex = hexString.index(hexString.startIndex, offsetBy: i\
  \ + 1)\nlet hexPair = String(hexString[startIndex...endIndex])\nlet num = UInt8(hexPair,\
  \ radix: 16)!\nself.append(num)\n}\n}\nvar hexString: String {\nmap { String(format:\
  \ \"%02hhx\", $0) }.joined()\n}\n}\n```\n\n**配方 3-9** 在十六进制字符串与 Data 之间相互转换\n\n\
  请注意，该构造器是可选的，因为并非每个 `String` 都能转换为 `Data`。我们还使用了强制解包，因为我们提前完成了所有必要的检查，知道将 `hexPair`\
  \ 转换为 `UInt8` 永远不会失败。\n\n下面的示例将一个十六进制编码的 `\"Swift\"` 字符串转换为可读文本。\n\n```\nlet hexSwift\
  \ = \"5377696674\"\nlet hexData = Data(hexString: hexSwift)!\nlet hexString = String(data:\
  \ hexData, encoding: .utf8)!\nprint(hexString)\n```\n\n类似地，这些转换可以作为 `String` 扩展来呈现（配方\
  \ 3-10）：\n\n```\npublic extension String {\ninit(hexFromData: Data) {\nappend(contentsOf:\
  \ hexFromData.map { String(format: \"%02hhx\", $0) }.joined())\n}\nfunc hexToData()\
  \ -> Data? {\nif hexString.count % 2 != 0 {\nreturn nil\n}\nlet allowedCharacters\
  \ = CharacterSet(charactersIn: \"01234567890abcdefABCDEF\")\nif hexString.rangeOfCharacter(from:\
  \ allowedCharacters.inverted, options: String.CompareOptions.literal, range: nil)\
  \ != nil {\nreturn nil\n}\nvar result = Data(capacity: self.count / 2)\nfor i in\
  \ stride(from: 0, to: hexString.count, by: 2) {\nlet startIndex = hexString.index(hexString.startIndex,\
  \ offsetBy: i)\nlet endIndex = hexString.index(hexString.startIndex, offsetBy: i\
  \ + 1)\nlet hexPair = String(hexString[startIndex...endIndex])\nlet num = UInt8(hexPair,\
  \ radix: 16)!\nresult.append(num)\n}\nreturn result\n}\n}\n```\n\n**配方 3-10** 在十六进制字符串与\
  \ Data 之间相互转换（作为字符串扩展）\n\n### MD5、SHA 与其他哈希\n\n当你需要将数据转换为短字符串，且无需恢复原始数据时，哈希非常有用。哈希无法被还原，但可以进行比较。相同的数据总是产生相同的哈希值。\n\
  \n最常见的用例之一是存储密码。你可能知道，需要注册的网站和应用在尝试恢复密码时，绝不会将你的密码发给你——而是建议创建一个新密码。它们之所以这样做，是因为它们不存储你的密码（这并不安全）。它们所做的是存储你密码的哈希值。当你下次登录时输入相同的密码，它们的哈希值匹配，服务器就会返回一个成功的响应。该响应通常是一个会话令牌。如果你至少输错了一个字符，哈希值就会不同，服务器将返回一个错误。哈希值匹配的可能性微乎其微，小到可以忽略不计。\n\
  \n**注意**\n\n一个 MD5 哈希的长度是 128 位（16 字节）。这意味着有 2¹²⁸ 个唯一的哈希值。两个哈希值意外相同的概率是 1/2¹²⁸，大约为\
  \ 3 × 10^(−39)，即 3 × 10^(−37)%，即 0.0000000000003 幺分比。\n\n哈希的另一个常见用途是数据校验。如果你发送一大块数据（一首\
  \ mp3 格式的歌曲包含数百万个字节），你可能希望确保它安全地到达另一端。我们在互联网上使用的协议栈能够为我们保证这一点——它们在底层使用了哈希和控制序列。但有时，我们需要自己验证数据。例如，在应用崩溃或为了省电而终止后，确认数据已完整下载。为此，我们可以预先计算文件的哈希值并将其存储在服务器上。在应用端，我们计算下载文件的哈希值，然后进行比较。如果哈希值匹配，则极有可能是同一份数据。而且，由于哈希值只有\
  \ 16 字节长（以 MD5 为例），验证起来并不麻烦。\n\n现在让我们看看如何计算哈希值，从最流行的 MD5 开始。\n\n\n\n### MD5 哈希\n\
  \nMD5（消息摘要算法第五版）最初是为密码学应用而设计的，但如今已在其他领域得到应用。另一方面，由于存在广泛的安全漏洞，密码学领域已不再广泛使用它。\n\n\
  任何数据都可以进行编码，但通常涉及的是`Data`和`String`对象。在计算哈希值之前，`String`需要先转换为`Data`。结果始终是一个`Data`对象，可以通过十六进制或\
  \ Base64 表示形式来打印。\n\nSwift 本身不提供原生的 MD5 哈希实现，但我们可以使用`CommonCrypto`库。请记住，如果您使用的是生产环境的应用（而非\
  \ playground），则需要创建一个桥接头文件并包含`CommonCrypto`头文件：\n\n```objc\n#import <CommonCrypto/CommonCrypto.h>\n\
  ```\n\n此外，如果您测试以下代码，可能会收到此警告：\n\n```\n'CC_MD5' was deprecated in iOS 13.0: This\
  \ function is cryptographically broken and should not be used in security contexts.\
  \ Clients should migrate to SHA256 (or stronger).\n```\n\n这意味着 Swift 认为 MD5 算法不适用于加密目的，但可以用于数据验证。至于\
  \ SHA-256 及其他算法，我们将在本章后面介绍。配方 3-11 展示了如何计算`Data`和`String`的 MD5 哈希。\n\n```swift\n\
  import var CommonCrypto.CC_MD5_DIGEST_LENGTH\nimport func CommonCrypto.CC_MD5\n\
  import typealias CommonCrypto.CC_LONG\n\npublic extension String {\n    var md5:\
  \ Data? {\n        data(using: .utf8)?.md5\n    }\n}\n\npublic extension Data {\n\
  \    var md5: Data {\n        let length = Int(CC_MD5_DIGEST_LENGTH)\n        var\
  \ hash = Data(count: length)\n        _ = hash.withUnsafeMutableBytes { digestBytes\
  \ -> UInt8 in\n            self.withUnsafeBytes { messageBytes -> UInt8 in\n   \
  \             if let messageBytesBaseAddress = messageBytes.baseAddress, \n    \
  \               let digestBytesBlindMemory = digestBytes.bindMemory(to: UInt8.self).baseAddress\
  \ {\n                    let messageLength = CC_LONG(self.count)\n             \
  \       CC_MD5(messageBytesBaseAddress, messageLength, digestBytesBlindMemory)\n\
  \                }\n                return 0\n            }\n        }\n       \
  \ return hash\n    }\n}\n\n// 配方 3-11\n// 计算 MD5 哈希\n```\n\n上述扩展允许我们计算`String`和`Data`对象的\
  \ MD5 哈希。为了计算`String`的哈希，它会获取其 UTF-8 表示形式。\n\n> **注意**  \n> 尽管这是一个函数，并且并非最简单的方式，但我们将其表示为计算属性，因为首先它不会更改原始对象，其次它是该对象的一个属性或特征。\n\
  \n如果您的应用目标平台为 iOS 13 或更高版本，可以使用`CryptoKit`，如配方 3-12 所示。\n\n```swift\nimport CryptoKit\n\
  \npublic extension Data {\n    var md5: Data {\n        let bytes = Insecure.MD5.hash(data:\
  \ self).map { $0 as UInt8 }\n        return Data(bytes: bytes, count: bytes.count)\n\
  \    }\n}\n\n// 配方 3-12\n// 使用 CryptoKit 计算 MD5（iOS 13 或更高版本）\n```\n\n这两种实现返回的结果相同。区别在于，第一种适用于较旧版本的\
  \ iOS，而第二种则更短、更清晰。一旦您放弃对 iOS 12 及更早版本的支持，建议立即迁移到新算法。\n\n> **注意**  \n> 此扩展不会生成警告，但其中包含单词“Insecure”。这应提醒开发者，此函数的使用必须受到限制。\n\
  \n### SHA 哈希\n\n正如我们之前所讨论的，MD5 不适用于安全目的。它速度太快且过于简单。用于密码存储和其他安全目的的良好解决方案是使用 SHA 组的哈希。SHA\
  \ 代表安全哈希算法（Secure Hash Algorithm）。该组中有多种算法，但最常见的是 SHA-1 和 SHA-256。\n\nSHA-1 生成 160\
  \ 位哈希。自 1995 年起为人所知，它被认为不够安全，但比 MD5 安全得多。\n\nSHA-256 是 SHA-2 算法的一个变体。它生成 256 位哈希。它在性能和安全性之间提供了良好的平衡，并被推荐用于安全目的。计算`Data`和`String`的\
  \ SHA-1、SHA-256 和 SHA-512 的方法如配方 3-13 所示。\n\n```swift\npublic extension String {\n\
  \    var sha1: Data? {\n        data(using: .utf8)?.sha1\n    }\n    var sha256:\
  \ Data? {\n        data(using: .utf8)?.sha256\n    }\n    var sha512: Data? {\n\
  \        data(using: .utf8)?.sha512\n    }\n}\n\npublic extension Data {\n    var\
  \ sha1: Data {\n        let bytes = Insecure.SHA1.hash(data: self).map { $0 as UInt8\
  \ }\n        return Data(bytes: bytes, count: bytes.count)\n    }\n    var sha256:\
  \ Data {\n        let bytes = SHA256.hash(data: self).map { $0 as UInt8 }\n    \
  \    return Data(bytes: bytes, count: bytes.count)\n    }\n    var sha512: Data\
  \ {\n        let bytes = SHA512.hash(data: self).map { $0 as UInt8 }\n        return\
  \ Data(bytes: bytes, count: bytes.count)\n    }\n}\n\n// 配方 3-13\n// 计算 SHA 哈希\n\
  ```\n\n如您所见，从 SHA-256 开始，不安全前缀消失了。类似地，您可以实现其他算法。\n\n### Hashable 协议与 Swift 哈希\n\n\
  Swift 提供了自己的哈希功能。任何符合`Hashable`协议的类、结构体或其他语言构造都可以被哈希。此功能用于`Dictionary`和`Set`。Swift\
  \ 不存储键，而是存储哈希值。`Hashable`协议有一个函数`hash(into:)`：\n\n```swift\nfunc hash(into hasher:\
  \ inout Hasher) {\n    hasher.combine(property1)\n    hasher.combine(property2)\n\
  \    // ... 其他属性\n}\n```\n\n您通常不需要实现此函数。如果您的类或结构体的所有成员都是可哈希的，您只需要声明对`Hashable`协议的遵循即可。\n\
  \n`Hashable`的类也应是可相等的（遵循`Equatable`协议）。这意味着它们应声明一个函数来检查两个实例是否相等。\n\n> **注意**  \n\
  > Swift 提供了两个不同的运算符：`==`和`===`。第一个是相等运算符，遵循`Equatable`协议需要实现它。第二个是恒等运算符，它比较两个类的内存地址。如果两个可等价的类是恒等的，则它们也必然是相等的；但如果它们是相等的，并不能保证它们是恒等的。\n\
  \nSwift `Hasher`在底层使用的算法在不同的 Swift 版本中并不相同。我们不需要知道具体使用了哪种算法；对我们来说，这是一种抽象。如果尝试使用类实现的特定细节，当新版本的\
  \ Swift 再次更改实现时，将会引发问题。\n\n此外，生成的哈希值绝不应在应用外部使用，甚至不应被存储。它们仅用于比较`Set`或`Dictionary`等结构中的键。要将哈希值发送到服务器，您需要使用标准算法之一，如\
  \ SHA 或 MD5。\n\n\n\n### 盐值\n\n正如我们之前讨论密码哈希时提到的，有必要介绍一下*盐值*。它不是常见的调味料，而是应用在哈希计算前添加到密码开头和/或结尾的一段代码字符串。盐值必须保持一致，并且在应用的新版本中不应更改。\n\
  \n盐值有助于保护密码隐私。如果两个不同的服务都使用 `SHA-256` 存储密码，那么相同的密码会生成相同的 `SHA-256`，这会造成安全漏洞。服务器管理员将能够利用你的密码哈希值登录到其他服务。使用盐值非常简单。你可以在配方\
  \ 3-14 中看到如何使用。\n\n**注意**：不建议在两个不同的服务中使用相同的密码，但作为开发者，你应该始终假设用户会忽略这个建议。\n\n```\n\
  let password = \"...\"\nlet leftSalt = \"...\" // 字符串常量，应在所有版本的应用中保持一致\nlet rightSalt\
  \ = \"...\" // 字符串常量，应在所有版本的应用中保持一致\nlet saltedPassword = \"\\(leftSalt)\\(password)\\\
  (rightSalt)\"\nlet passwordHash = saltedPassword.sha256\n```\n\n这是一种安全地将密码发送到服务器的方式。在服务器端，服务器脚本可以添加另一个盐值并计算另一个密码哈希值。\n\
  \n在开发安全系统时，要富有创意。添加意想不到的保护层。黑客对这里描述的一切都了如指掌。要做更多。结合不同的方法来迷惑他们，并保持领先一步。\n\n## 整数索引\n\
  \nSwift 不接受整数作为 `String` 的索引。例如，你不能简单地获取一个 `String` 的第 5 个 `Character`。苹果公司解释这是由于内部编码的原因。由于字符可能具有不同的长度，用\
  \ `Int` 来索引它们（如在 C 语言中那样）可能会造成混淆，索引到的可能不是第 5 个字符，而是第 5 个字节或第 5 对字节。\n\n与 `Int` 不同，`String.Index`\
  \ 提供了上下文。它属于特定的 `String`，知道它引用的是哪个 `Character`，并知道它有*多宽*。\n\n在实际生活中，我们经常需要获取单词中的第\
  \ n 个字母，或者获取具有已知索引的范围，就像我们在“十六进制编码”小节的配方 3-9 中将十六进制 `String` 转换为 `Data` 时那样。\n\n\
  我们将在本节中编写的 `String` 扩展将添加使用基于 `Int` 的下标或范围从 `String` 获取 `Character` 或 `Substring`\
  \ 的功能。\n\n在继续之前，有一个细节需要注意。Swift 允许两种不同的结构：`String` 和 `Substring`。`String` 实际存储文本数据，而\
  \ `Substring` 仅仅是对现有 `String` 的引用。\n\n`Substring` 可以轻松转换为 `String`：\n\n```\nlet\
  \ substring: Substring = ...\nlet string: String = String(substring)\n```\n\n同时，如果你频繁操作子字符串，你可能会希望在函数中使用\
  \ `StringProtocol` 而不是 `String`。这将允许你同时传入 `String` 和 `Substring`。如果你不修改它，两者没有区别；你无需相互转换。但这样做也有代价——当你将\
  \ `Substring` 转换为 `String` 时，Swift 会将所有数据复制到一个新的内存片段中。如果你只对短字符串执行一两次操作，这可能不重要，但如果你需要一个高效的应用，就需要牢记这一点。\n\
  \n配方 3-15 展示了如何向项目中的 `Strings` 添加整数索引功能，但首先让我们确定我们的需求：\n\n```\npublic extension\
  \ String {\nsubscript (i: Int) -> Character {\nreturn self[index(startIndex, offsetBy:\
  \ i)]\n}\nsubscript (bounds: CountableRange<Int>) -> Substring {\nlet start = index(startIndex,\
  \ offsetBy: bounds.lowerBound)\nlet end = index(startIndex, offsetBy: bounds.upperBound)\n\
  if end < startIndex { return \"\" }\nreturn self[start..<end]\n}\nsubscript (bounds:\
  \ CountableClosedRange<Int>) -> Substring {\nlet start = index(startIndex, offsetBy:\
  \ bounds.lowerBound)\nlet end = index(startIndex, offsetBy: bounds.upperBound)\n\
  if end < startIndex { return \"\" }\nreturn self[start...end]\n}\nsubscript (bounds:\
  \ PartialRangeThrough<Int>) -> Substring {\nlet end = index(startIndex, offsetBy:\
  \ bounds.upperBound)\nif end < startIndex { return \"\" }\nreturn self[startIndex...end]\n\
  }\nsubscript (bounds: PartialRangeUpTo<Int>) -> Substring {\nlet end = index(startIndex,\
  \ offsetBy: bounds.upperBound)\nif end < startIndex { return \"\" }\nreturn self[startIndex..<end]\n\
  }\nsubscript (bounds: PartialRangeFrom<Int>) -> Substring {\nlet start = index(startIndex,\
  \ offsetBy: bounds.lowerBound)\nlet end = index(endIndex, offsetBy: -1)\nif end\
  \ < startIndex { return \"\" }\nreturn self[start...end]\n}\n}\n```\n\n```\nlet\
  \ str = \"Some string\"\nlet substring = str[5...] // \"string\" 单词被封装在 Substring\
  \ 对象中\nlet firstChar = substring[0] // Character \"S\"\n```\n\n## 本地化\n\niOS 有自己的本地化系统。它会根据用户的设置自动选择首选语言，并且如果你提供了本地化内容，它会对故事板和源代码中的字符串进行本地化。\n\
  \n### NSLocalizedString 宏\n\n要获取源代码中字符串的本地化版本，应该使用一个宏：\n\n```\nNSLocalizedString(key,\
  \ comment)\n```\n\n它在 iOS 应用的任何部分都可用。`key` 参数是字符串的标识符。标识符应该是唯一的，并且可以包含 Swift `String`\
  \ 对象中允许的任何符号。`comment` 用于为翻译人员生成文件。如果你不打算使用 Xcode 或 `genstrings` 工具生成翻译文件，可以将其保留为空。\n\
  \n### 翻译文件\n\n你应该添加扩展名为 `strings` 的文件（例如 `Localised.strings`）来提供翻译。你可以手动将它们放入对应语言的目录中，或者通过\
  \ Xcode 进行操作。\n\nstrings 文件是一个包含键值对的简单文本文件。键值对之间用分号分隔。键和值之间用等号分隔。键和值都应放在引号内：\n\n\
  ```\n\"firstName\": \"First Name\";\n```\n\n为了避免混淆，我们使用更精确的标识符，例如：\n\n```\n\"auth.firstName.title\"\
  : \"First Name\";\n\"auth.firstName.placeholder\": \"Enter your first name here\"\
  ;\n```\n\n### LocalizedStringKey 结构体\n\nSwiftUI 中的本地化通常使用 `LocalizedStringKey` 完成。它是一个\
  \ `struct`，但也遵循 `ExpressibleByStringLiteral` 协议，这意味着我们可以将 `String` 赋值给它。\n\n```\n\
  let name: LocalizedStringKey = \"name\"\nlet text = Text(name)\n```\n\n此代码中的 `Text`\
  \ 将从翻译中获取值。\n\n`LocalizedStringKey` 也遵循 `ExpressibleByStringInterpolation` 协议。你可以将它与\
  \ `\\()` 构造一起使用。\n\n```\nlet name = \"Alex\"\nText(\"hello \\(name)\")\n```\n\n\
  翻译文件应包含：\n\n```\n\"hello %@\" = \"Hello %@!\";\n```\n\n`Text` 视图将以字符串 \"Hello Alex!\"\
  \ 创建。\n\n### 语法糖\n\n当你有大量需要本地化的内容时，每次都输入 `NSLocalizedString` 可能会很烦人。使用配方 3-16 中的扩展，看起来不是好很多吗？\n\
  \n```\npublic extension StringProtocol {\nvar localised: String {\nNSLocalizedString(self,\
  \ \"\")\n}\n}\n```\n\n现在你可以这样使用它：\n\n```\nlabel.text = \"auth.firstName.title\"\
  .localised\n```\n\n**注意**：来自故事板或 nib 文件的 UI 元素可以在不编写代码的情况下进行本地化。在 Xcode Interface\
  \ Builder 中将故事板或 nib 文件标记为可本地化。Xcode 将自动生成必要的文件，你只需要更改文本即可。\n\n## 总结\n\n像 C 语言这样的旧编程语言没有专门的字符串类型，程序员使用字节数组来存储它们。这在代码中造成了大量潜在的错误，并使字符串分析几乎不可能。Swift\
  \ 凭借其 `String` 类型和扩展，提供了完全不同的方法。\n\n在本章中，我们看到了如何检查 `String` 是否包含字母或数字，是否包含有效的姓名、电子邮件或其他数据。我们使用\
  \ `String` 来存储哈希值、验证数据以及加密密码。最后，我们讨论了 iOS 应用的本地化。\n\n到目前为止，我们一直在讨论数据处理，但没有讨论呈现。在下一章中，我们将解决这个问题，并讨论用户界面。\n\
  \n\n\n"
- "# UIKit 与 Storyboards\n\n多年来，UIKit 一直是 iOS 应用中实现用户界面的唯一方式，而 Storyboards 机制则是进行界面布局的主要工具。近期，SwiftUI\
  \ 被引入，它是从 Objective-C 向纯 Swift 原生代码过渡的必然环节。但 UIKit 在 iOS 开发中仍然扮演着重要角色。\n\n首先，存在大量遗留代码。许多应用和框架早在\
  \ SwiftUI 推出之前就已开始开发。那些最流行的 iOS 库历经数年才赢得开发者信任，我们尚未准备好停止使用它们并全面转向 SwiftUI。\n\n其次，SwiftUI\
  \ 仅在 iOS 13.0、macOS 10.15 等版本中引入。如果你的应用需要支持 iOS 12（至少目前来看，这很有必要），你就无法使用 SwiftUI。\n\
  \n第三，UIKit 元素可以集成到 SwiftUI 代码中。如果你在 GitHub 上发现了一个外观酷炫的 UI 库，但它是用 UIKit 编写的，而你的应用使用的是\
  \ SwiftUI，这并不能成为不使用它的理由。我们将在关于 SwiftUI 的章节中详细探讨这一点。\n\n现在，让我们看看如何充分利用 UIKit 和 iOS\
  \ Storyboards。\n\n## 应用界面间的导航\n\n每个 iOS 应用都有多个界面。Web 开发者通常称其为页面，许多 iOS 开发者也开始沿用此说法。不过，应用界面和网页之间仍存在差异。与此同时，现代设备开始支持分屏视图，这使得移动应用仅使用设备屏幕的一部分，并支持使用外接屏幕的设备。在\
  \ iOS 13.0 中，Apple 引入了 Scene（场景）的概念。每个场景可以有一个或多个窗口，并包含一个或多个视图控制器。有点令人困惑，对吧？让我们深入了解一下。\n\
  \n### 屏幕、窗口与视图\n\n如果你有一台 iOS 设备，你就拥有一个屏幕。屏幕由 `UIScreen` 对象表示。主屏幕是一个单例；你可以从应用的任何部分访问它。如果你正在编写一个单屏应用，可以认为不存在其他内容。\n\
  \n`UIScreen` 拥有一个 `UIWindow` 对象。这是一个可见的窗口。术语 *window* 源于桌面开发。我们都熟悉 Windows 操作系统，它将\
  \ *window* 作为核心概念。与桌面操作系统不同，在 iOS 中，`UIWindow` 没有边框或装饰。\n\n创建 `UIWindow` 是为了显示用户界面，而用户界面则由\
  \ *视图* 组成。其中之一是根视图。这个根视图显示一个 *应用界面* 或 *应用页面*（正如 Web 开发者所称）。在 UIKit 中，它由 `UIViewController`、`UINavigationController`\
  \ 或其他控制器管理。\n\n这些控制器内部包含其他控制器或视图。这样，我们就得到了一个树状结构的视图和控制器层次体系。\n\n### iOS 应用中的导航\n\
  \nUIKit 提供了两种主要的导航方式：\n\n*   模态呈现新元素\n*   使用 `UINavigationController` 压入元素\n\n注意：基于标签的导航在移动应用中很常见。iOS\
  \ 中的标签模型是一个控制器 `UITabBarController`，最多可有五个子控制器。我们将其留作超出本文范围的内容。\n\n这里的元素是某个控制器，通常是\
  \ `UIViewController`。\n\n`UIViewController` 包含一个由 `UIView` 对象及其子类构成的树。其中之一是根 `UIView`，而其他\
  \ `UIView` 则直接或通过其他对象位于其内部。\n\n当我们在 iOS 应用中谈论导航时，通常指的是从一个 `UIViewController` 切换到另一个（图\
  \ 4-1）。当你拥有 `UINavigationController` 时，你可以将一个新的控制器压入导航栈：\n\n```\npushViewController(_:animated:)\n\
  ```\n\n当你以模态方式呈现时，使用以下方法：\n\n```\npresent(_:animated:completion:)\n```\n\n有什么区别呢？\n\
  \n除了视觉效果外，它们在逻辑上也有显著差异。使用 `UINavigationController` 时，你有一个导航栈，可以返回到之前压入的任何元素。你还可以向栈中添加元素、更改顺序以及执行许多其他操作。\n\
  \n当你呈现一个模态元素时，你只能将其关闭。你无法访问整个栈，也无法一次性关闭多个元素。但这仍然很有用。假设你正在编写一个订餐应用。用户浏览菜单，将商品添加到购物车，然后打开购物车。这种情况下，使用模态呈现是合理的。但我们呈现的不是\
  \ `UIViewController`，而是包含购买流程的 `UIViewController` 元素的 `UINavigationController`。当用户完成购买后，你通过关闭模态元素返回到菜单。\n\
  \n![](img/515103_1_En_4_Fig1_HTML.jpg)\n\n描述 iOS 应用导航的示意图：第一张 iPhone 图片上标注为导航控制器，随后是根视图控制器，该控制器被分为两张图片：模态窗口和根视图控制器。\n\
  \n**图 4-1** iOS 应用中的导航。导航控制器、根控制器以及使用模态和推送方式呈现的视图控制器（从左到右）\n\n除了这两种显示另一个界面的方法，你还可以使用替换等方式。如果你有一个加载界面，我们不想将其保留在导航栈中，或保留在活动\
  \ UI “背后”的内存中。我们只想替换它。稍后我们将看到如何实现。\n\n最后一个重要概念是对话框或弹出式呈现。从逻辑上讲，它与模态呈现相同，但不是在后台替换界面，而是将其显示在界面上方。拿起你的\
  \ iPhone 或 iPad，在主屏幕上点击任意应用并长按。你会看到一个菜单。这就是弹出式呈现的一个例子。\n\n### 场景\n\n自 iOS 13 起，Apple\
  \ 引入了 *Scenes*。如果最初使用场景是可选的，那么 Xcode 12 已经不再提供选择。你仍然可以删除所有与场景相关的代码，使用传统方式，但未来这可能不再可行。\n\
  \n注意：尽管场景是与 SwiftUI 一起引入的，但它们同样用于 UIKit。\n\n场景提供 `UIWindowScene` 对象，用于管理应用中的窗口和视图控制器。基本上，这是一种创建多窗口应用的方式。每个场景必须有一个代理——一个\
  \ `UIWindowSceneDelegate` 对象，但它们不必不同。你可以为多个场景使用同一个代理。场景共享应用内存和其他资源。\n\n我们将多窗口应用留作本文范围之外的内容，但使用场景改变了我们访问\
  \ `UIWindow` 和处理应用生命周期的方式；这就是了解如何使用场景很重要的原因。\n\n\n\n### 返回操作\n\n故事板允许我们创建控制器、视图控制器以及用于在应用屏幕间切换的\
  \ Segue。它们让我们可以选择展示方式并设置转场动画，但却无法实现像“返回”这样简单的操作。\n\n根据你切换到当前视图控制器的方式，可以通过以下两种方法之一实现返回：\n\
  \n```\ndismiss(animated:, completion:)\n// 以及\nnavigationController?.popViewController(animated:)\n\
  ```\n\n在这两种情况下，我们都需要创建一个 `@IBAction` 函数并将其连接到按钮上。而且这个函数在所有视图控制器中应该相同——或者几乎相同。如果我们编写一个函数（配方\
  \ 4-1），无论当前视图是通过模态展示还是通过 `UINavigationController` 压入栈中，它都能精确地返回到上一个元素，那会怎样呢？\n\n\
  ```\npublic extension UIViewController {\n    @IBAction func goBack() {\n      \
  \  if let nc = navigationController,\n           nc.viewControllers.count >= 2 {\n\
  \            nc.popViewController(animated: true)\n        } else {\n          \
  \  dismiss(animated: true, completion: nil)\n        }\n    }\n}\n配方 4-1\n返回到上一个屏幕\n\
  ```\n\n首先，我们检查该 `UIViewController` 是否位于 `UINavigationController` 内。如果是，则它具有非空的 `navigationController`\
  \ 属性。在这种情况下，我们需要检查它是否是那个 `UINavigationController` 的根 `UIViewController`。如果是根控制器，则无法执行\
  \ pop 操作，该操作会被直接忽略，我们需要将其 dismiss。如果 `navigationController` 为 `nil`，则意味着它从未进入 `UINavigationController`\
  \ 的栈，我们只能将其 dismiss。\n\n作为 `UIViewController` 的扩展编写，此函数将对应用中所有视图控制器可用。如果你有一个简单的“关于”屏幕，没有任何逻辑，你甚至无需为其创建\
  \ `UIViewController` 的子类。\n\n**注意**\n\n此配方在更复杂的控制器（如 `UITabController`）内部无法工作。如果你需要在用户点击返回按钮时返回到上一个标签页，你必须自行创建栈管理。\n\
  \n### 替换根视图\n\n我们之前讨论过的另一种典型情况是替换。如果你不需要某个屏幕及其之前的所有屏幕，你可以实例化一个新的视图控制器并将其设置为根视图。\n\
  \n在标准的 iOS 应用中，存在 `AppDelegate` 类。Xcode 会在你创建新项目时自动生成它。根据配置的不同，`AppDelegate` 可能拥有一个\
  \ window 属性，或者该属性可能位于 `SceneDelegate` 类中。\n\n当你获取到 `UIWindow` 对象的引用时，可以像配方 4-2 所示那样替换根视图控制器：\n\
  \n```\npublic extension UIWindow {\n    func replaceRootViewController(with viewController:\
  \ UIViewController) {\n        rootViewController = viewController\n        makeKeyAndVisible()\n\
  \    }\n}\n配方 4-2\n替换根视图控制器\n```\n\n这里的难点在于获取 window 实例。在旧式项目中，我们通过 `UIApplication`\
  \ 的属性获取 window。幸运的是，在包含场景的项目中，`UIApplication` 还有另一个属性—— `connectedScenes`。其中一些“连接的场景”属于\
  \ `UIWindowScene` 类型。从 `UIWindowScene` 中，我们可以提取到 `UIWindow` 对象的引用（配方 4-3 至 4-5）。\n\
  \n```\n@available(iOS 13.0, *)\npublic extension UIApplication {\n    var currentWindow:\
  \ UIWindow? {\n        connectedScenes\n            .filter { $0.activationState\
  \ == .foregroundActive }\n            .compactMap { $0 as? UIWindowScene }\n   \
  \         .first?\n            .windows\n            .first(where: { $0.isKeyWindow\
  \ })\n    }\n}\n配方 4-3\n在含场景的项目中获取主 UIWindow\n```\n\n在不含场景的项目中，获取方式更简单。\n\n```\n\
  public extension UIWindow {\n    static var main: UIWindow? {\n        (UIApplication.shared.delegate\
  \ as? AppDelegate)?.window\n    }\n}\n配方 4-4\n在不含场景的项目中获取主 UIWindow\n```\n\n**注意**\n\
  \n此配方假设你的应用拥有 `AppDelegate` 类，该类实现了 `UIApplicationDelegate` 协议，并且是你的应用的主代理。\n\n\
  最后，我们可以将所有方法封装到 `UIWindow` 扩展中的一个静态函数里。\n\n```\npublic extension UIWindow {\n  \
  \  static func replaceMainRootViewController(with viewController: UIViewController)\
  \ -> Bool {\n        var window: UIWindow?\n        if #available(iOS 13, *) {\n\
  \            window = UIApplication.shared.currentWindow\n        } else {\n   \
  \         window = UIWindow.main\n        }\n        window?.replaceRootViewController(with:\
  \ viewController)\n        return window != nil\n    }\n}\n配方 4-5\n替换根视图控制器（静态方法）\n\
  ```\n\n函数 `replaceMainRootViewController` 会替换主窗口中的根视图控制器（如果存在）。如果窗口不存在或函数无法找到它，则返回\
  \ false，否则返回 true。\n\n### 修改 UINavigationController 栈\n\n假设你有一个很长的屏幕序列，用户在其中进行选择。例如，用户正在参加一个测试。他们可以提交问题或跳过问题。如果提交了问题，该问题就会永久消失；否则，它会保留在栈中，以便用户以后回来回答。\n\
  \n再看另一个例子。用户正在订购家具。他们选择配置、颜色以及所有细节。最后，用户完成支付，从这一刻起，我们不想让他们再返回去修改购买配置。我们想显示订单跟踪。但我们也不想清除整个栈——当用户点击返回按钮时，他们应该回到之前使用过的应用部分，而订购流程应该消失，直到他们再次下单。\n\
  \n还有一种情况——添加一个新屏幕。例如，我们可能想警告用户，如果返回，他们的订单将被取消。我们不想让用户卡在某个屏幕上，否则他们只会“杀掉”应用。但我们需要提醒他们订购流程尚未完成，他们应该在返回前完成它。这可以通过弹窗实现，但设计师可能有其他意见。\n\
  \n我们将研究以下情况：\n\n- 从栈中移除不必要的 `UIViewController`\n- 将用户返回到栈中的特定 `UIViewController`\n\
  - 向栈中添加 `UIViewController`\n\n正如我们之前讨论过的，当 `UIViewController` 是导航栈的一部分时，它具有非空的 `navigationController`\
  \ 属性。这个 `navigationController` 有一个非常重要的属性——`viewController`。该属性包含导航栈——一个以根元素开头的\
  \ `UIViewController` 对象列表。\n\n**注意**\n\n当你从 `UIViewController` 中访问 `navigationController?.viewControllers`\
  \ 时，结果始终包含 `self`。\n\n#### 从导航栈中移除元素\n\n假设用户完成了一个流程，我们不希望他们返回该流程，但允许他们返回到该流程之前的视图控制器。由于栈中不必要的元素始终是我们应用的一部分且是已知的，我们了解这些元素的类名。配方\
  \ 4-6 展示了如何使用 `filter` 方法从导航栈中移除不必要的元素。\n\n```\npublic extension UINavigationController\
  \ {\n    func removeElements<T>(of type: T.Type) {\n        viewControllers = viewControllers.filter\
  \ {\n            !($0 is T)\n        }\n    }\n}\n配方 4-6\n从导航栈中移除已知类型的元素\n```\n\n\
  *用法*\n\n```\nnavigationController?.removeElements(of: UnnecessaryViewController.self)\n\
  ```\n\n我建议你不要通过这种方式移除当前的前台视图控制器。如果你需要移除它，请改用 `navigationController?.popViewController(animated:)`\
  \ 或本章开头部分的 `goBack` 函数。此外，最好在前台视图控制器完全呈现在屏幕上时修改栈。这应该在 `viewDidAppear(animated:)`\
  \ 函数中或之后进行。\n\n\n\n### 将用户返回到特定的视图控制器\n\n假设您正在开始一个新游戏，第一件事就是创建自己的角色。您选择他们的身体、面部、发色、鼻子的形状……然后您发现自己完全不喜欢这个角色！您可以返回上一步，或者重新开始。这个“重新开始”功能就是导航到特定视图控制器的一个示例。\n\
  \n与上一节类似，我们将通过类来识别视图控制器，实际上，它应该是 `UIViewController` 的一个子类。从选定的视图控制器到最前面的视图控制器之间的所有视图控制器都应从堆栈中移除，如代码\
  \ 4-7 所示。\n\n```\npublic extension UINavigationController {\n    func returnToElement<T:\
  \ UIViewController>(of type: T.Type, animated: Bool) -> Bool {\n        guard let\
  \ lastIndex = viewControllers.lastIndex(where: { $0 is T }) else {\n           \
  \ return false\n        }\n        if viewControllers[lastIndex] == viewControllers.last\
  \ {\n            return false\n        }\n        viewControllers.removeSubrange(lastIndex.advanced(by:\
  \ 1)..<viewControllers.endIndex.advanced(by: -1))\n        popViewController(animated:\
  \ animated)\n        return true\n    }\n}\n```\n\n**代码 4-7** 将用户返回到特定的视图控制器\n\n\
  *用法*\n\n```\nnavigationController?.returnToElement(of: StartViewController.self,\
  \ animated: true)\n```\n\n如果您想返回到导航堆栈的起点，可以使用标准方法：\n\n```\nnavigationController?.popToRootViewController(animated:\
  \ true)\n```\n\n### 弹窗与对话框\n\n带有信息或问题的弹窗在用户界面中非常常见（图 4-2、4-3 和 4-4）。iOS 提供了 `UIAlertController`\
  \ 来显示弹窗，但显示一条简单的消息就需要三行代码。对于更复杂的情况，我们需要编写更多代码。当我们有多个代码分支需要验证数据并显示错误消息时，在每个分支中创建和设置\
  \ `UIAlertController` 就违背了 DRY 原则。\n\n#### 显示提示、错误和警告\n\n除了代码更短更清晰之外，如果您将来想使用自定义样式，这些函数也很有用。您无需在整个项目中替换标准弹窗，而是可以将它们集中在一个地方。代码\
  \ 4-8 展示了 `UIViewController` 显示警告对话框的简单扩展。\n\n![一个错误对话框的屏幕截图，窗口中包含粗体标题“错误”，其后是文本，底部有“确定”按钮。](img/515103_1_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2** 错误对话框\n\n```\npublic extension UIViewController {\n    func show(error:\
  \ String) {\n        let alert = UIAlertController(title: \"Error\", message: error,\
  \ preferredStyle: .alert)\n        alert.addAction(UIAlertAction(title: \"OK\",\
  \ style: .cancel, handler: nil))\n        present(alert, animated: true, completion:\
  \ nil)\n    }\n    func show(warning: String) {\n        let alert = UIAlertController(title:\
  \ \"Warning\", message: warning, preferredStyle: .alert)\n        alert.addAction(UIAlertAction(title:\
  \ \"OK\", style: .cancel, handler: nil))\n        present(alert, animated: true,\
  \ completion: nil)\n    }\n}\n```\n\n**代码 4-8** 显示简单弹窗\n\n这些弹窗被编写为 `UIViewController`\
  \ 的扩展。这是调用它们最常见的地方。它们不提供任何反馈，只显示一个弹窗。如果您的应用已本地化为多种语言，您可以将 `\"Error\"` 或 `\"OK\"\
  ` 这样的硬编码字符串替换为本地化版本。\n\n如果您在 `UIViewController` 内部，可以这样调用它们：\n\n```\nlet error:\
  \ Error // 来自 API 调用的错误\nself.show(error: error.localizedDescription)\n```\n\n不要忘记，您必须在主线程中执行此操作。如果不确定，请修改这些函数以确保始终在主线程中执行。\n\
  \n#### 询问一般性问题\n\n一般性问题（也称为极性问句）是一个带有两种可能答案（肯定或否定）的问题。通常是“是”或“否”。“您确定要退出吗？”“要覆盖此文件吗？”“无法连接。您要重新输入密码吗？”……听着耳熟吗？这些都是带有一般性问题的弹窗。代码\
  \ 4-9 展示了如何创建一个询问此类问题的函数，并且只需一行代码即可调用。\n\n![一个确认对话框的屏幕截图，窗口中包含粗体标题“确认”，其后是文本“您要删除这张照片吗？”。底部有“否”和“是”两个按钮。](img/515103_1_En_4_Fig3_HTML.jpg)\n\
  \n**图 4-3** 确认对话框\n\n```\npublic extension UIViewController {\n    func ask(title:\
  \ String?, question: String?, positiveButtonTitle: String = \"Yes\", negativeButtonTitle:\
  \ String = \"No\", isDangerousAction: Bool = false, delegate: @escaping (_ agreed:\
  \ Bool) -> Void) {\n        let alert = UIAlertController(title: title, message:\
  \ question, preferredStyle: .alert)\n        alert.addAction(UIAlertAction(title:\
  \ positiveButtonTitle, style: isDangerousAction ? .destructive : .default) { (_)\
  \ in\n            delegate(true)\n        })\n        alert.addAction(UIAlertAction(title:\
  \ negativeButtonTitle, style: .cancel) { (_) in\n            delegate(false)\n \
  \       })\n        present(alert, animated: true, completion: nil)\n    }\n}\n\
  ```\n\n**代码 4-9** 一般性问题弹窗\n\n#### 询问单行字符串答案的问题\n\n另一种典型的弹窗是询问简单问题并要求文本答案的对话框。例如，当您加入网络时，可能会要求输入密码。它必须始终有两个按钮——“确定”和“取消”。代码\
  \ 4-10 展示了如何将此对话框编写为 `UIViewController` 扩展。\n\n![一个文本输入对话框的屏幕截图，窗口中包含粗体标题“您的姓名”，其后是文本“请输入您的姓名”。文本下方有一个文本框，底部有“取消”和“确定”两个按钮。](img/515103_1_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4** 文本输入对话框\n\n```\npublic extension UIViewController {\n    func ask(title:\
  \ String?, question: String?, placeholder: String?, keyboardType: UIKeyboardType\
  \ = .default, delegate: @escaping (_ answer: String?) -> Void) {\n        let alert\
  \ = UIAlertController(title: title, message: question, preferredStyle: .alert)\n\
  \        alert.addTextField { (textField) in\n            textField.placeholder\
  \ = placeholder\n            textField.keyboardType = keyboardType\n        }\n\
  \        alert.addAction(UIAlertAction(title: \"OK\", style: .default) { (_) in\n\
  \            let answer = alert.textFields?.first?.text\n            delegate(answer)\n\
  \        })\n        alert.addAction(UIAlertAction(title: \"Cancel\", style: .cancel)\
  \ { (_) in\n            delegate(nil)\n        })\n        present(alert, animated:\
  \ true, completion: nil)\n    }\n}\n```\n\n**代码 4-10** 简单文本问题弹窗\n\n#### 选择日期和时间\n\
  \n在第 2 章中，我们讨论了用户表单的验证，并决定日期的最佳解决方案是显示日期选择器。我们可以将其显示在屏幕键盘的位置，或者以弹窗形式显示。\n\n能否将 `UIDatePicker`\
  \ 添加到 `UIAlertView` 中？可以，但这并不是一个好主意。问题在于 `UIAlertView` 没有组件堆栈；它原生只能包含 `UILabel`\
  \ 和 `UITextField`。`UIAlertView` 的大小是根据这些组件的大小计算的。`UIView` 可以有子视图，因此您*可以*将其他 `UIView`\
  \ 子类添加进去，但不能保证其适配良好。\n\n代码 4-11 展示了如何创建一个完全自定义的弹窗并将其添加到布局顶层。如何请求此弹窗如代码 4-12 所示。要使用\
  \ Auto Layout 功能创建布局，我们将使用 GitHub 上可用的 SnapKit 框架：[`https://github.com/SnapKit/SnapKit`](https://github.com/SnapKit/SnapKit)。\n\
  \n\n\n### 什么是 SnapKit？\n\n`SnapKit` 是一个流行且维护良好的库，它允许你以编程方式创建布局，无需使用 storyboard 或\
  \ nib 文件，也无需手动编写冗长的单行约束代码。简单来说，这个库为约束编写代码添加了语法糖。\n\n例如，下面这段来自官方 `SnapKit` 网站的代码创建了一个绿色方块，并将其添加到根视图中。\n\
  \n```\nimport SnapKit\nclass MyViewController: UIViewController {\nlazy var box\
  \ = UIView()\noverride func viewDidLoad() {\nsuper.viewDidLoad()\nself.view.addSubview(box)\n\
  box.backgroundColor = .green\nbox.snp.makeConstraints { (make) -> Void in\nmake.width.height.equalTo(50)\n\
  make.center.equalTo(self.view)\n}\n}\n}\n```\n\n### 日期与时间选择器弹出窗口\n\n要获得一个弹出窗口，我们需要一个包含四个子视图的\
  \ `UIView`：\n\n*   标题标签\n*   日期选择器\n*   确定按钮\n*   取消按钮\n\n```\nprivate var frameView:\
  \ UIView!\nprivate var titleLabel: UILabel!\nprivate var datePicker: UIDatePicker!\n\
  private var okButton: UIButton!\nprivate var cancelButton: UIButton!\n```\n\n它应该有一个代理，返回一个\
  \ `Date` 对象或 `nil`。\n\n```\nvar delegate: (_ date: Date?) -> Void = { _ in }\n```\n\
  \n弹出窗口的基类将是 `UIView`。请记住，实现方式可以不同。我们只是展示一个示例，但你可以根据自己的需求进行调整。\n\n```\nimport SnapKit\n\
  public class DatePickerPopup: UIView {\nprivate var frameView: UIView!\nprivate\
  \ var titleLabel: UILabel!\nprivate var datePicker: UIDatePicker!\nprivate var okButton:\
  \ UIButton!\nprivate var cancelButton: UIButton!\nvar delegate: (_ date: Date?)\
  \ -> Void = { _ in }\nvar title: String {\nget {\ntitleLabel.text ?? \"\"\n}\nset\
  \ {\ntitleLabel.text = newValue\n}\n}\noverride init(frame: CGRect) {\nsuper.init(frame:\
  \ frame)\ncommonInit()\n}\nrequired init?(coder: NSCoder) {\nsuper.init(coder: coder)\n\
  commonInit()\n}\nfunc commonInit() {\n// 深色遮罩\nbackgroundColor = UIColor(red: 0.0,\
  \ green: 0.0, blue: 0.0, alpha: 0.3)\n// 框架视图\nframeView = UIView()\nframeView.layer.cornerRadius\
  \ = 10\nframeView.layer.masksToBounds = true\nframeView.backgroundColor = .white\n\
  addSubview(frameView)\nframeView.snp.makeConstraints { (make) in\nmake.center.equalTo(self)\n\
  }\n// 标题标签\ntitleLabel = UILabel()\ntitleLabel.font = UIFont.systemFont(ofSize:\
  \ 16, weight: .bold)\ntitleLabel.textColor = .black\ntitleLabel.textAlignment =\
  \ .center\nframeView.addSubview(titleLabel)\ntitleLabel.snp.makeConstraints { (make)\
  \ in\nmake.top.equalToSuperview().offset(40)\nmake.leading.equalToSuperview().offset(40)\n\
  make.trailing.equalToSuperview().offset(-40)\n}\n// 日期选择器\ndatePicker = UIDatePicker()\n\
  datePicker.preferredDatePickerStyle = .wheels\ndatePicker.datePickerMode = .date\n\
  datePicker.date = Date()\nframeView.addSubview(datePicker)\ndatePicker.snp.makeConstraints\
  \ { (make) in\nmake.top.equalTo(titleLabel.snp.bottom).offset(20)\nmake.leading.equalToSuperview().offset(20)\n\
  make.trailing.equalToSuperview().offset(-20)\n}\n// 按钮\ncancelButton = UIButton()\n\
  cancelButton.setTitle(\"取消\", for: .normal)\ncancelButton.setTitleColor(UIColor(red:\
  \ 0.0, green: 0.478431, blue: 1.0, alpha: 1.0), for: .normal)\ncancelButton.addTarget(self,\
  \ action: #selector(cancelPressed), for: .touchUpInside)\nokButton = UIButton()\n\
  okButton.setTitle(\"确定\", for: .normal)\nokButton.setTitleColor(UIColor(red: 0.0,\
  \ green: 0.478431, blue: 1.0, alpha: 1.0), for: .normal)\nokButton.addTarget(self,\
  \ action: #selector(okPressed), for: .touchUpInside)\nframeView.addSubview(cancelButton)\n\
  frameView.addSubview(okButton)\ncancelButton.snp.makeConstraints { (make) in\nmake.top.equalTo(datePicker.snp.bottom)\n\
  make.left.equalToSuperview()\nmake.height.equalTo(40)\nmake.bottom.equalToSuperview().offset(-40)\n\
  }\nokButton.snp.makeConstraints { (make) in\nmake.top.equalTo(datePicker.snp.bottom)\n\
  make.left.equalTo(cancelButton.snp.right)\nmake.right.equalToSuperview()\nmake.height.equalTo(40)\n\
  make.width.equalTo(cancelButton.snp.width)\n}\n}\n@objc func cancelPressed() {\n\
  disappearAndReturn(date: nil)\n}\n@objc func okPressed() {\ndisappearAndReturn(date:\
  \ datePicker.date)\n}\nprivate func disappearAndReturn(date: Date?) {\nUIView.animate(withDuration:\
  \ 0.3) {\nself.alpha = 0.0\n} completion: { (_) in\nself.removeFromSuperview()\n\
  self.delegate(date)\n}\n}\nstatic func createAndShow(in viewController: UIViewController,\
  \ title: String, delegate: @escaping (_ date: Date?) -> Void) -> DatePickerPopup\
  \ {\nlet popup = DatePickerPopup(frame: viewController.view.bounds)\npopup.title\
  \ = title\npopup.delegate = delegate\npopup.alpha = 0.0\nviewController.view.addSubview(popup)\n\
  UIView.animate(withDuration: 0.3) {\npopup.alpha = 1.0\n}\nreturn popup\n}\n}\n\
  配方 4-11\n日期选择器弹出窗口\n```\n\n以下扩展允许在 `UIViewController` 内部更简短地请求此弹出窗口。\n\n```\npublic\
  \ extension UIViewController {\nfunc askDate(title: String, delegate: @escaping\
  \ (_ date: Date?) -> Void) {\n_ = DatePickerPopup.createAndShow(in: self, title:\
  \ title, delegate: delegate)\n}\n}\n配方 4-12\n从 UIViewController 请求日期\n```\n\n现在，当你拥有了这个类，你可以用一行代码来请求日期，再用另一行代码来处理结果：\n\
  \n```\nself.askDate(title: \"出生日期\") { (date) in\nprint(date)\n}\n```\n\n结果要么是一个位于屏幕中央的圆角面板（图\
  \ 4-5），要么是屏幕的中央部分。这取决于你 iPhone 的屏幕尺寸。\n\n![](img/515103_1_En_4_Fig5_HTML.png)\n\n\
  一个日期选择对话框窗口的屏幕截图，其中包含一个带有粗体标题“出生日期”的方框，后面是三列的月份、日期和年份。底部还有“取消”和“确定”两个按钮。\n\n**图\
  \ 4-5** 日期选择对话框\n\n### 底部面板中的日期与时间\n\n显示弹出窗口可能不是请求日期和/或时间的最佳方式。另一种方式是将其显示在屏幕键盘的位置。如果你有一系列\
  \ `UITextFields`，对用户来说，在键盘的同一位置看到日期选择器会更方便。\n\n这一次，它不能是扩展；需要将其集成到你的 `UIViewController`\
  \ 或其他类中，具体取决于你的项目架构。配方 4-13 展示了一个 `UIViewController` 子类的示例，它在键盘位置显示日期选择器。\n\n```\n\
  public class DateSelectorViewController: UIViewController {\n@IBOutlet weak var\
  \ tfDOB: UITextField!\n@IBOutlet weak var tfNextField: UITextField!\nvar selectedDOB:\
  \ Date? = nil\nlet datePicker = UIDatePicker(frame: CGRect(x: 0, y: 0, width: UIScreen.main.bounds.width,\
  \ height: 216))\noverride func viewDidLoad() {\nsuper.viewDidLoad()\nif #available(iOS\
  \ 13.4, *) {\ndatePicker.preferredDatePickerStyle = .wheels\n}\ndatePicker.datePickerMode\
  \ = .date\ntfDOB.inputView = datePicker\naddDoneButtonOnKeyboard()\n// ...\n}\n\
  func addDoneButtonOnKeyboard() {\nlet doneToolbar: UIToolbar = UIToolbar(frame:\
  \ CGRect.init(x: 0, y: 0, width: UIScreen.main.bounds.width, height: 50))\ndoneToolbar.barStyle\
  \ = .default\nlet flexSpace = UIBarButtonItem(barButtonSystemItem: .flexibleSpace,\
  \ target: nil, action: nil)\nlet done: UIBarButtonItem = UIBarButtonItem(title:\
  \ \"完成\", style: .done, target: self, action: #selector(self.doneButtonAction))\n\
  let items = [flexSpace, done]\ndoneToolbar.items = items\ndoneToolbar.sizeToFit()\n\
  tfDOB.inputAccessoryView = doneToolbar\n}\n@objc func doneButtonAction() {\ntfDOB.text\
  \ = df.string(from: datePicker.date)\nselectedDOB = datePicker.date\ntfNextField.becomeFirstResponder()\n\
  }\n}\n配方 4-13\n在底部面板中显示日期和时间选择器\n```\n\n\n\n"
- "# 地图与导航\n\niOS 平台拥有原生地图框架 `MapKit`，以及基于该框架预装的系统地图应用。在编写 iOS 应用时，你可以确信用户已拥有这些工具，并且你也可以直接调用它们。苹果地图适用于大多数场景，但也存在功能更优的替代地图框架。许多人更偏好使用谷歌地图与\
  \ Waze 进行导航。\n\n在本节中，我们将探讨三种场景：\n\n- 在应用内显示苹果地图\n- 在应用内显示谷歌地图\n- 使用用户偏好的应用进行动态导航\n\
  \n## 在 iOS 应用中显示苹果地图\n\n自 iOS 3.0 开始，苹果推出了 `MapKit`，允许你将地图作为常规视图直接嵌入应用（见图 4-6）。\n\
  \n![](img/515103_1_En_4_Fig6_HTML.png)\n\n*iPhone 上苹果地图视图的截图，地图上带有多个标签。图片顶部显示时间及其他图标。*\n\
  \n**图 4-6** – 作为视图的苹果地图\n\n要添加地图，请打开故事板（或 xib）编辑器，点击 +（加号）按钮，在列表中选择 `Map Kit View`。如果使用约束，请添加约束并创建插座变量。该视图的类名为\
  \ `MKMapView`。\n\n```\n@IBOutlet weak var mapView: MKMapView!\n```\n\n`MKMapView`\
  \ 是一个动态组件。默认情况下，它允许与地图进行交互。如果需要静态显示，请取消勾选 `User Interaction Enabled`。\n\n> **提示**\
  \  \n> 此属性适用于所有视图。如果取消勾选 `User Interaction Enabled`（或在代码中将 `isUserInteractionEnabled`\
  \ 设置为 `false`），视图及其子视图将不会响应用户的触摸和手势操作。\n\n在故事板/xib 编辑器的 Map View 部分，你可以修改地图类型，并限制缩放、滚动等特定操作。\n\
  \n使用地图时有两个典型操作：设置位置/缩放级别，以及添加*标注*（也称为*图钉*和*标记*）。\n\n已知某点的经纬度后，可以缩放至该点附近：\n\n```\n\
  let center = CLLocationCoordinate2D(latitude: latitude, longitude: longitude)\n\
  let region = MKCoordinateRegion(center: center, span: MKCoordinateSpan(latitudeDelta:\
  \ 0.01, longitudeDelta: 0.01))\nmapView.setRegion(region, animated: true)\n```\n\
  \n`latitudeDelta` 和 `longitudeDelta` 指定了中心点周围可见的空间范围。\n\n第二个典型操作是添加标记（也称为图钉）：\n\n\
  ```\nlet annotation = MKPointAnnotation()\nlet centerCoordinate = CLLocationCoordinate2D(latitude:\
  \ latitude, longitude: longitude)\nannotation.coordinate = centerCoordinate\nannotation.title\
  \ = \"标题\"\nmapView.addAnnotation(annotation)\n```\n\n你可以在地图上添加多个标注。\n\n要移除标注，可以调用：\n\
  \n```\nfunc removeAnnotations(_ annotations: [MKAnnotation])\n```\n\n要移除所有标注，请使用\
  \ `mapView.annotations` 作为参数。\n\n## 在 iOS 应用中显示谷歌地图\n\n与包含在标准库中的苹果地图不同，谷歌地图需要单独安装，并且需要\
  \ API 密钥。\n\n如果你使用 CocoaPods 作为依赖管理工具，可以通过以下方式添加：\n\n```\npod 'GoogleMaps'\n```\n\
  \n如果你不想使用 CocoaPods，可以从官方网站下载 XCFramework 并手动添加到项目。谷歌官方并未支持 Swift Package Manager。解决方法之一是使用第三方库：[`https://github.com/YAtechnologies/GoogleMaps-SP`](https://github.com/YAtechnologies/GoogleMaps-SP)。该库可以通过\
  \ Swift Package Manager 添加，并且包含了谷歌地图框架。用户普遍对该库给予正面反馈，但尽量还是避免使用非官方解决方案。\n\n你可以在 [`https://cloud.google.com`](https://cloud.google.com)\
  \ 获取 API 密钥。需要创建一个应用并完成以下两个步骤：\n\n- 创建 API 密钥。可以对其进行限制，使其只能从 iOS 应用中使用。这样，该密钥只能被你的应用使用，而不能被其他应用使用。\n\
  - 启用 iOS 版 Maps SDK。\n\n如果你已经为同一个 iOS 应用集成了其他谷歌服务，则无需再创建新的谷歌应用——可以使用同一个应用。例如，如果你使用了\
  \ Analytics 或 Crashlytics，你的谷歌应用应该已经创建好了。\n\n谷歌地图仅在特定用量范围内免费。因此，如果你之前未启用结算功能，现在需要启用。价格可能会随时间变化，但截至\
  \ 2021 年 6 月，地图加载是免费的，而街景功能则需要付费。即使你不打算使用街景功能，也建议启用结算。\n\n从此时起，你可以将 `GMSMapView`\
  \ 添加到应用中。`GMSMapView` 是一个 `UIView` 对象，你可以通过故事板或编程方式进行添加。\n\n地图需要显示区域。对于谷歌地图，你需要设置相机。`GMSCameraPosition`\
  \ 对象指定了纬度、经度和缩放级别。\n\n我们先通过故事板将地图添加到应用中（方法 4-14）；然后介绍如何通过编程方式实现（方法 4-15）。\n\n在这两种场景中，使用地图前都需要添加密钥；否则应用会崩溃。最佳位置是\
  \ `AppDelegate`：\n\n```\nimport GoogleMaps\n// 别忘了调用：\n// GMSServices.provideAPIKey(\"\
  你的 _API_ 密钥\")\n// 在 AppDelegate 中\n\nclass ViewController: UIViewController {\n\
  \  override func viewDidLoad() {\n    super.viewDidLoad()\n    let camera = GMSCameraPosition.camera(withLatitude:\
  \ 41.6168, longitude: 41.6367, zoom: 6.0)\n    let mapView = GMSMapView.map(withFrame:\
  \ self.view.frame, camera: camera)\n    self.view.addSubview(mapView)\n  }\n}\n\
  ```\n\n**方法 4-15** – 通过编程方式设置地图视图\n\n```\nimport GoogleMaps\n// 别忘了调用：\n// GMSServices.provideAPIKey(\"\
  你的 _API_ 密钥\")\n// 在 AppDelegate 中\n\nclass ViewController: UIViewController {\n\
  \  @IBOutlet var mapView: GMSMapView!\n  override func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    let camera = GMSCameraPosition.camera(withLatitude: 41.6168, longitude: 41.6367,\
  \ zoom: 6.0)\n    mapView.camera = camera\n  }\n}\n```\n\n**方法 4-14** – 通过故事板设置地图视图\n\
  \n```\nGMSServices.provideAPIKey(\"你的 _API_ 密钥\")\n```\n\n谷歌地图功能强大。你可以添加标记、绘制区域、缩放至特定区域，以及为相机添加动画效果。\n\
  \nGooglePlaces 库提供了用于处理地点和地址的 SDK。你可以解析坐标、搜索附近地点，并提供其他基于位置的功能。\n\n更多信息可访问谷歌地图平台门户：[`https://developers.google.com/maps`](https://developers.google.com/maps)。\n\
  \n\n\n### 动态导航\n\n让我们更仔细地分析一个相当典型的场景：我们有坐标（纬度和经度）以及一个地名。我们需要打开用户最喜欢的应用来导航到目的地（见图\
  \ 4-7）。我们不会尝试在应用内部集成导航功能，因为通常这并不值得。导航应用具备许多功能，例如后台导航、通知等，这些功能实现起来并不容易。\n\n![](img/515103_1_En_4_Fig7_HTML.png)\n\
  \n一张地图的截图显示，通过屏幕底部名为“导航”的按钮，弹出了三个用于导航的应用选项。这三个应用分别是 Apple 地图、Google 地图和 Waze。\n\n\
  **图 4-7** — 选择导航应用\n\n每个服务都有启动导航的方式（配方 4-16 至 4-18）。\n\n```\nlet wazeURL = \"waze://?ll=\\\
  (latitude),\\(longitude)&navigate=false\"\nif UIApplication.shared.canOpenURL(wazeURL)\
  \ {\nUIApplication.shared.open(wazeURL, options: [:], completionHandler: nil)\n\
  }\n```\n\n**配方 4-18** — 在 Waze 中打开位置\n\n```\nlet googleURL = \"comgooglemaps://?daddr=\\\
  (latitude),\\(longitude)&directionsmode=driving\"\nif UIApplication.shared.canOpenURL(googleURL)\
  \ {\nUIApplication.shared.open(googleURL, options: [:], completionHandler: nil)\n\
  }\n```\n\n**配方 4-17** — 在 Google 地图中打开位置\n\n```\nlet appleURL = \"http://maps.apple.com/?daddr=\\\
  (latitude),\\(longitude)\"\nif UIApplication.shared.canOpenURL(appleURL) {\nUIApplication.shared.open(appleURL,\
  \ options: [:], completionHandler: nil)\n}\n```\n\n**配方 4-16** — 在 Apple 地图中打开位置\n\
  \nGoogle 和 Waze 拥有自定义 URL。配方 4-19 展示了如何检查它们当前系统中是否可用。\n\n```\npublic extension UIViewController\
  \ {\nfunc openMapButtonAction(latitude: Double, longitude: Double) {\nlet appleURL\
  \ = \"http://maps.apple.com/?daddr=\\(latitude),\\(longitude)\"\nlet googleURL =\
  \ \"comgooglemaps://?daddr=\\(latitude),\\(longitude)&directionsmode=driving\"\n\
  let wazeURL = \"waze://?ll=\\(latitude),\\(longitude)&navigate=false\"\nlet googleItem\
  \ = (\"Google Map\", URL(string:googleURL)!)\nlet wazeItem = (\"Waze\", URL(string:wazeURL)!)\n\
  var installedNavigationApps = [(\"Apple Maps\", URL(string:appleURL)!)]\nif UIApplication.shared.canOpenURL(googleItem.1)\
  \ {\ninstalledNavigationApps.append(googleItem)\n}\nif UIApplication.shared.canOpenURL(wazeItem.1)\
  \ {\ninstalledNavigationApps.append(wazeItem)\n}\nlet alert = UIAlertController(title:\
  \ \"Select an app for navigation\", message: nil, preferredStyle: .actionSheet)\n\
  for app in installedNavigationApps {\nlet button = UIAlertAction(title: app.0, style:\
  \ .default, handler: { _ in\nUIApplication.shared.open(app.1, options: [:], completionHandler:\
  \ nil)\n})\nalert.addAction(button)\n}\nlet cancel = UIAlertAction(title: \"Cancel\"\
  , style: .cancel, handler: nil)\nif let popoverController = alert.popoverPresentationController\
  \ {\npopoverController.sourceView = self.view\n}\nalert.addAction(cancel)\npresent(alert,\
  \ animated: true)\n}\n}\n```\n\n**配方 4-19** — 通用导航\n\n## 圆角、阴影和其他效果\n\n如果你使用 storyboard\
  \ 或 nib 进行 UI 设计，你会知道它们缺少许多功能。通常，你需要在代码中进行一些调整，这意味着你需要创建一个 `@IBOutlet`。这很不方便。\n\n\
  通过添加几个扩展，你可以解决诸如添加圆角、阴影、内容裁剪等问题。图 4-8 展示了其效果。\n\n### 圆角、内容裁剪和边框\n\n圆角是 iOS 和 macOS\
  \ 应用中非常流行的设计特性。与越来越方正的 Windows 不同，Apple 产品拥有更多曲线。如果将 Big Sur（macOS 11）与 Catalina（macOS\
  \ 10.15）进行比较，你会立刻发现差异。\n\n`UIKit` 提供了一种原生方式来为几乎所有元素添加圆角，但这是通过在 `UILayer` 中实现，而不是在\
  \ `UIView` 中。Storyboard 编辑器无法直接访问图层，因此你不能在其中添加圆角。配方 4-20 展示了一种简单的修复方法。\n\n```\n\
  public extension UIView {\n@IBInspectable var cornerRadius: CGFloat {\nset { layer.cornerRadius\
  \ = newValue }\nget { layer.cornerRadius  }\n}\n}\n```\n\n**配方 4-20** — 圆角\n\n当你设置圆角半径时，它会应用于图层本身的背景、边框和其他属性，但不会应用于内容。它也不会应用于\
  \ `UIView` 的子视图。如果你想将圆角应用于所有内容，你需要设置 `masksToBounds` 属性。这是图层的一个属性。配方 4-21 展示了具体做法：\n\
  \n```\npublic extension UIView {\n@IBInspectable var masksToBounds: Bool {\nset\
  \ { layer.masksToBounds = newValue }\nget { layer.masksToBounds  }\n}\n}\n```\n\n\
  **配方 4-21** — 内容裁剪\n\n现在你可以直接在 storyboard 编辑器中设置它了。这里需要提醒一下——它确实会应用于所有内容。例如，如果你在\
  \ `UIView` 上设置它，那么它的所有子视图将永远不会超出 `UIView` 父视图的边界。\n\n你可能需要这种行为的场景之一是 `UIViewController`\
  \ 的根 `UIView`。当你添加一个可能大于根 `UIView` 的填充背景时，在过渡期间它将是可见的。当你将一个新的 `UIViewController`\
  \ 推送到 `UINavigationController` 时，它会出现在屏幕的右侧（或在从右到左布局中的左侧）。一些屏幕外的元素可能会可见。如果这不是你想要的行为，请设置\
  \ `maskToBounds` 属性，这样所有屏幕外的元素在过渡期间将不可见。\n\n在我们继续之前，我们还需要另一个有用的扩展。问题是 Swift 有两个类：`UIColor`\
  \ 和 `CGColor`。`UIColor` 对开发者更方便；它能更好地访问颜色分量，并且可以通过 `@IBInspectable` 属性暴露给 storyboard\
  \ 编辑器。`CGColor` 更像是一个内部的东西。尽管它们在 Swift 中都代表颜色，但它们是两种不同的类型。配方 4-22 将 `CGColor` 转换为\
  \ `UIColor`。\n\n```\npublic extension CGColor {\nvar UIColor: UIKit.UIColor {\n\
  return UIKit.UIColor(cgColor: self)\n}\n}\n```\n\n**配方 4-22** — 将 `CGColor` 转换为\
  \ `UIColor`\n\n配方 4-23 中的扩展允许我们添加边框。边框可以有颜色和宽度，因此我们向 `UIView` 类添加两个属性。在 UIKit 中，所有可见元素都是\
  \ `UIView` 的子类，因此你可以为它们中的任何一个添加边框。\n\n```\nextension UIView {\n@IBInspectable var\
  \ borderWidth: CGFloat {\nset { layer.borderWidth = newValue }\nget { layer.borderWidth\
  \ }\n}\n@IBInspectable var borderColor: UIColor? {\nset { layer.borderColor = newValue?.cgColor\
  \ }\nget { layer.borderColor?.UIColor }\n}\n@IBInspectable var cornerRadius: CGFloat\
  \ {\nset { layer.cornerRadius = newValue }\nget { layer.cornerRadius  }\n}\n@IBInspectable\
  \ var masksToBounds: Bool {\nset { layer.masksToBounds = newValue }\nget { layer.masksToBounds\
  \  }\n}\n}\n```\n\n**配方 4-23** — 边框\n\n![](img/515103_1_En_4_Fig8_HTML.png)\n\n\
  一张在 storyboard 编辑器中进行用户界面视图配置的截图，显示了一个 iPhone 的轮廓，其右侧边框内粘贴了两个方框。左侧图片有一个窗口，其中包含可修改的选项，如圆角半径、边框宽度、透明度等。\n\
  \n**图 4-8** — Storyboard 编辑器中的 `UIView` 配置\n\n\n\n### 阴影\n\n阴影（图 4-9）是一种更复杂的效果，不是因为实现困难，而是因为当布局发生变化时必须更新它。当\
  \ iPhone 或 iPad 改变方向，或者屏幕上元素出现或消失时，阴影应该重新渲染。为 `UIView` 添加阴影的扩展如食谱 4-24 所示：\n\n```swift\n\
  public extension UIView {\n@IBInspectable var dropShadow: Bool {\nset {\nlayer.shadowOffset\
  \ = CGSize(width: 0, height: 0)\nif newValue {\nupdateShadow()\n} else {\nlayer.shadowColor\
  \ = UIColor.clear.cgColor\nlayer.shadowOpacity = 0.0\nlayer.shadowRadius = 0\nlayer.shadowPath\
  \ = nil\nlayer.shouldRasterize = false\n}\n}\nget {\nlayer.shadowOpacity > 0.0 &&\
  \ layer.shadowRadius > 0\n}\n}\nfunc updateShadow() {\nlayer.shadowColor = UIColor.black.cgColor\n\
  layer.shadowOpacity = 0.5\nlayer.shadowRadius = 4\nlayer.shadowPath = UIBezierPath(roundedRect:\
  \ bounds, cornerRadius: layer.cornerRadius).cgPath\nlayer.shouldRasterize = true\n\
  layer.rasterizationScale = UIScreen.main.scale\n}\nfunc updateShadows() {\nif self.dropShadow\
  \ {\nself.updateShadow()\n}\nsubviews.forEach {\n$0.updateShadows()\n}\n}\n}\n```\n\
  \n> 注：颜色、半径和阴影透明度在此食谱中已硬编码。这通常是最佳解决方案，因为这些参数在整个应用中保持一致。如果需要使其动态化，可以将它们添加为其他可检查属性，并且每个属性应在设置时触发\
  \ `updateShadow` 函数。\n\n![](img/515103_1_En_4_Fig9_HTML.png)\n\n设置带有阴影、边框等效果的用户界面视图的屏幕截图：左侧显示了一个\
  \ iPhone 轮廓，轮廓内部粘贴了两个方框；右侧图像显示了一个带有选项的窗口。\n\n**图 4-9** 使用阴影、边框和其他效果设置 `UIView`\n\
  \n此扩展提供了一个可检查属性和两个方法。`dropShadow` 属性用于添加或移除阴影。`updateShadow` 方法使用实际的 `UIView` 大小创建阴影。为了方便起见，还有另一个方法——`updateShadows`。它更新\
  \ `UIView` 及其所有子视图中的阴影。每次布局更改时都应调用此方法。调用它的好位置是 `UIViewController` 的生命周期方法 `viewDidLayoutSubviews`。\n\
  \n```swift\noverride func viewDidLayoutSubviews() {\nsuper.viewDidLayoutSubviews()\n\
  view.updateShadows()\n}\n```\n\n如果你的 UI 需要不同的阴影配置，可以将所有属性暴露给故事板编辑器。食谱 4-25 展示了具体做法。\n\
  \n```swift\n@IBDesignable\nclass ShadowView: UIView {\n@IBInspectable var shadowOffset:\
  \ CGSize {\nget {\nlayer.shadowOffset\n}\nset {\nlayer.shadowOffset = newValue\n\
  }\n}\n@IBInspectable var shadowColor: UIColor? {\nget {\nif let sc = layer.shadowColor\
  \ {\nreturn UIColor(cgColor: sc)\n} else {\nreturn nil\n}\n}\nset {\nlayer.shadowColor\
  \ = newValue?.cgColor\n}\n}\n@IBInspectable var shadowRadius: CGFloat {\nget {\n\
  layer.shadowRadius\n}\nset {\nlayer.shadowRadius = newValue\n}\n}\n@IBInspectable\
  \ var shadowOpacity: Float {\nget {\nlayer.shadowOpacity\n}\nset {\nlayer.shadowOpacity\
  \ = newValue\n}\n}\noverride init(frame: CGRect) {\nsuper.init(frame: frame)\n}\n\
  required init?(coder: NSCoder) {\nsuper.init(coder: coder)\n}\n}\n```\n\n这是一个单独的类。如果在同一项目中同时使用了这两种方法，则不应在此\
  \ `ShadowView` 实例中设置 `dropShadow` 属性。相反，应根据所需结果单独配置所有参数。\n\n### UITextField 内边距\n\
  \n故事板编辑器中另一个缺失的功能是向 `UITextField` 元素添加内边距。内边距可用于不同目的，从改善视觉外观到在 `UITextField` 两侧添加图标和按钮。同时，我们通常希望保持此区域处于激活状态。当用户点击它时，我们希望键盘弹出。食谱\
  \ 4-26 展示了如何实现。\n\n```swift\n@IBDesignable\nclass TextFieldWithPadding: UITextField\
  \ {\n@IBInspectable var paddingLeft: CGFloat = 0.0\n@IBInspectable var paddingRight:\
  \ CGFloat = 0.0\nvar padding: UIEdgeInsets {\nUIEdgeInsets(top: 0, left: paddingLeft,\
  \ bottom: 0, right: paddingRight)\n}\nrequired init?(coder aDecoder: NSCoder) {\n\
  super.init(coder: aDecoder)\n}\noverride func textRect(forBounds bounds: CGRect)\
  \ -> CGRect {\nbounds.inset(by: padding)\n}\noverride func placeholderRect(forBounds\
  \ bounds: CGRect) -> CGRect {\nbounds.inset(by: padding)\n}\noverride func editingRect(forBounds\
  \ bounds: CGRect) -> CGRect {\nbounds.inset(by: padding)\n}\n}\n```\n\n`TextFieldWithPadding`\
  \ 类提供了两个额外属性：\n\n- `paddingLeft`\n- `paddingRight`\n\n不幸的是，它必须是一个新类，而不仅仅是 `UITextField`\
  \ 的扩展，因为我们需要重写 `textRect`、`placeholderRect` 和 `editingRect` 方法。\n\n要使用它，只需在故事板编辑器中添加\
  \ `UITextField`，将类更改为 `TextFieldWithPadding`，然后设置 `leftPadding` 和 `rightPadding`。\n\
  \n### UITextView 占位符\n\n与具有原生占位符的 `UITextField` 不同，`UITextView` 不提供类似功能。这相当奇怪，尤其是考虑到\
  \ `UITextView` 只是 `UITextField` 的多行版本，可能还带有一些额外功能。\n\n令人惊讶的是，这个问题也可以通过扩展来解决。但这次，它已经存在了，我们无需重新发明。该库名为\
  \ `UITextView+Placeholder`，使用 Objective-C 编写。\n\n与 `UITextField` 一样，`UITextView`\
  \ 可能也需要内边距。食谱 4-27 提供了一个类似的扩展来为 `UITextView` 添加内边距。\n\n```swift\n@IBDesignable\n\
  class TextViewWithPadding: UITextView {\n@IBInspectable var paddingLeft: CGFloat\
  \ = 0.0 {\ndidSet {\nupdateInsets()\n}\n}\n@IBInspectable var paddingRight: CGFloat\
  \ = 0.0 {\ndidSet {\nupdateInsets()\n}\n}\n@IBInspectable var paddingTop: CGFloat\
  \ = 0.0 {\ndidSet {\nupdateInsets()\n}\n}\n@IBInspectable var paddingBottom: CGFloat\
  \ = 0.0 {\ndidSet {\nupdateInsets()\n}\n}\nrequired init?(coder aDecoder: NSCoder)\
  \ {\nsuper.init(coder: aDecoder)\nupdateInsets()\n}\nfunc updateInsets() {\ntextContainerInset\
  \ = UIEdgeInsets(top: paddingTop, left: paddingLeft, bottom: paddingBottom, right:\
  \ paddingRight)\n}\n}\n```\n\n你可以像使用 `TextFieldWithPadding` 一样使用 `TextViewWithPadding`。\n\
  \n\n\n### 渐变\n\n另一种流行的设计元素是渐变。与之前的大多数情况类似，渐变很容易实现，但不能直接从故事板编辑器中完成。和之前的情况一样，修复起来也很简单。\n\
  \n我们的渐变将具有以下属性：\n\n-   `startColor`\n-   `endColor`\n-   `direction`\n\n在 UIKit\
  \ 中，可以通过向 `UIView` 添加一个图层来实现渐变。有一个能够渲染渐变的图层——`CAGradientLayer`。\n\n由于它是一个类，而不是扩展，因此我们可以直接重写\
  \ `layoutSubviews` 方法，以便在几何形状发生变化时更新渐变（参见配方 4-28）。\n\n```\n@IBDesignable\nclass\
  \ GradientView: UIView {\n    enum Direction: Int {\n        case horizontal\n \
  \       case vertical\n    }\n    @IBInspectable var startColor: UIColor = .white\
  \ {\n        didSet {\n            gradientLayer?.colors = [\n                startColor.cgColor,\n\
  \                endColor.cgColor\n            ]\n        }\n    }\n    @IBInspectable\
  \ var endColor: UIColor = .black {\n        didSet {\n            gradientLayer?.colors\
  \ = [\n                startColor.cgColor,\n                endColor.cgColor\n \
  \           ]\n        }\n    }\n    @IBInspectable var direction: Int = Direction.horizontal.rawValue\
  \ {\n        didSet {\n            if direction == Direction.horizontal.rawValue\
  \ {\n                gradientLayer?.startPoint = CGPoint(x: 0.0, y: 0.5)\n     \
  \           gradientLayer?.endPoint = CGPoint(x: 1.0, y: 0.5)\n            } else\
  \ {\n                gradientLayer?.startPoint = CGPoint(x: 0.5, y: 0.0)\n     \
  \           gradientLayer?.endPoint = CGPoint(x: 0.5, y: 1.0)\n            }\n \
  \       }\n    }\n    var gradientLayer: CAGradientLayer? = nil\n    override func\
  \ layoutSubviews() {\n        super.layoutSubviews()\n        if gradientLayer ==\
  \ nil {\n            gradientLayer = CAGradientLayer()\n            gradientLayer!.colors\
  \ = [\n                startColor.cgColor,\n                endColor.cgColor\n \
  \           ]\n            if direction == Direction.horizontal.rawValue {\n   \
  \             gradientLayer!.startPoint = CGPoint(x: 0.0, y: 0.5)\n            \
  \    gradientLayer!.endPoint = CGPoint(x: 1.0, y: 0.5)\n            } else {\n \
  \               gradientLayer!.startPoint = CGPoint(x: 0.5, y: 0.0)\n          \
  \      gradientLayer!.endPoint = CGPoint(x: 0.5, y: 1.0)\n            }\n      \
  \      layer.addSublayer(gradientLayer!)\n        }\n        gradientLayer?.cornerRadius\
  \ = layer.cornerRadius\n        gradientLayer?.frame = self.bounds\n    }\n}\n配方\
  \ 4-28\n渐变\n```\n\n`GradientView` 类仅支持水平和垂直渐变，但你可以通过添加对角线渐变甚至自定义角度来修改它。在设置 `gradientLayer`\
  \ 的 `startPoint` 和 `endPoint` 时进行一些数学运算即可实现。\n\n### 模糊\n\n最后一个流行效果，也是在 iOS 中特别流行的，是模糊。模糊是一种平滑滤镜，能使整个屏幕或部分屏幕变得……模糊。这种效果非常流行，以至于你几乎找不到不熟悉它的\
  \ iOS 用户。当你打开通知栏、小组件面板、任务管理器或 iOS 主屏幕或锁定屏幕上的任何其他面板时，iPhone 和 iPad 的界面会变得模糊。\n\n\
  UIKit 有一个类 `UIVisualEffectView`，它可以借助硬件加速将模糊效果应用于所有底层视图。配方 4-29 以最小的改动使用了它。由于我们需要将模糊效果应用于视图后面的视图，而不是视图本身，因此需要一个清晰的背景。默认情况下背景不清晰，这可能会造成混淆。\n\
  \n```\nclass BlurView: UIVisualEffectView {\n    override init(effect: UIVisualEffect?)\
  \ {\n        super.init(effect: effect)\n        commonInit()\n    }\n    required\
  \ init?(coder: NSCoder) {\n        super.init(coder: coder)\n        effect = UIBlurEffect(style:\
  \ .dark)\n        commonInit()\n    }\n    private func commonInit() {\n       \
  \ backgroundColor = .clear\n    }\n}\n配方 4-29\n模糊\n```\n\n`BlurView` 类创建一个模糊效果并自动清除背景，因此它已准备好使用。在故事板编辑器中添加一个\
  \ `UIView`，将类名更改为 `BlurView` 并设置所需的模糊类型——就这样！\n\n![](img/515103_1_En_4_Fig10_HTML.png)\n\
  \n在 iPhone 中设置用户界面视图的屏幕截图，左侧有一个 iPhone 轮廓，边框内粘有两个方框。右侧图像有一个带有选择项的窗口。\n\n图 4-10\n\
  \n在故事板中使用 BlurView\n\n这些类和扩展的强大之处在于你可以将它们一起使用。添加一个带有圆角、边框甚至阴影的模糊面板，你会看到你的界面如何开始看起来专业且吸引人。\n\
  \n图 4-11 显示了图 4-8、4-9 和 4-10 中所示的三个 UIView 在运行的 iOS 应用中的样子。此示例没有使用一行代码，仅在故事板中进行设计。\n\
  \n![](img/515103_1_En_4_Fig11_HTML.jpg)\n\n一个不同颜色重叠的示意图，代表运行中的 iOS 应用程序中的自定义用户界面视图。它有一个带边框的矩形框和一个由淡蓝色方块连接的圆形。\n\
  \n图 4-11\n\n运行中的 iOS 应用中的自定义 UIView\n\n## 总结\n\nUIKit 是在 iOS 应用中开发 UI 的强大工具包。它出现在早期版本的\
  \ iOS 中，并一直活跃使用至今。尽管如此，UIKit 经常需要大量代码才能完成简单的事情。在本章中，我们简化了 iOS 应用导航，编写了仅用一行代码显示警报的函数，并回顾了不同的地图选项和\
  \ GPS 导航。在 iOS 应用中设计 UI 的主要方式是故事板。即使作为 UIKit 的一部分，许多功能也无法在其中使用。幸运的是，这很容易修复。最后几个配方展示了如何向故事板添加模糊、圆角和其他效果。在下一章中，我们将讨论\
  \ UI 开发的另一个重要部分——图像。\n\n"
- "# 5. 图像处理\n\n在设备屏幕上显示图像、使其半透明、移动、旋转和缩放——这些都是 UIKit 的标准功能。它们可以通过在 `UIImageView`\
  \ 中显示 `UIImage` 来完成。但这并不是你在 iOS 上能获得的一切。Apple 提供了强大的框架来绘制和处理图像。除了标准框架之外，还有开源图像处理库。\n\
  \n我们可以对图像做什么？首先，我们将学习从文件加载图像并保存它们。文件可以存储在设备文件系统中，存储在内存中，甚至存储在网络上。然后我们将讨论图像下载和缓存，并了解像\
  \ Kingfisher 这样的库如何工作。\n\n其次，我们将进行非常简单的图像处理，而不使用外部库。这些包括调整大小和裁剪。这对于个人资料图片可能很有用。大多数应用要求它们具有正方形形状，可能圆角成圆形。我们已经知道如何显示带有圆角的图像，但在上传前将其裁剪为正方形则完全是另一个话题。\n\
  \n然后我们将讨论图像蒙版。你可以通过仅修改 `UIImageView` 的层来显示带有圆角的图像，但在某些情况下，我们需要更复杂的形状。你可能希望允许用户将物品（如眼镜或胡须）放在图片之上。\n\
  \n最后一个主题是效果和滤镜。更改亮度和对比度、伽马值和饱和度——所有这些都可以使用外部库完成。更重要的是，流行的类似 Instagram 的滤镜可以直接在你的应用中应用。这包括棕褐色、模糊、高通/低通、像素化、素描、晕影、漩涡以及数十种其他滤镜。\n\
  \n### 读取和写入图像\n\n在 iOS 中处理图像时有不同的框架。第一个是 UIKit。它有 `UIImage` 类。这是一个高级类，提供有限的功能；同时，它针对与\
  \ `UIImageView` 和其他 UIKit 组件的使用进行了优化。\n\n来自 CoreImage 框架的 `CIImage` 是 `UIImage`\
  \ 中的底层数据。它不为开发者提供任何功能，也不应该被直接访问。\n\n底层类是 `CGImage`，它是 Core Graphics 框架的一部分。这个类提供了对图像缓冲区及其特性的完全访问。如果你需要更改图像中的几个像素或应用某个滤镜，`CGImage`\
  \ 正是你所需要的。\n\n`UIImage`、`CGImage` 和 `CIImage` 可以相互转换。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的要求，将给定的英文文本翻译成中文。\n\
  \n\n### 图像缓冲区\n\n无论使用哪个类，它都有一个指向图像缓冲区的指针——要么是公开的，要么是在其内部实现中。图像缓冲区是一个像素数组。每个像素由一个或多个字节编码。最常见的图像数据存储方式是\
  \ RGB 和 RGBA。RGB 格式为每个像素使用 3 个字节，每个字节代表以下分量之一：红色、绿色和蓝色。RGBA 为每个像素使用 4 个字节。除了红色、绿色和蓝色之外，还有\
  \ alpha 分量，用于指示每个像素的透明度（图 5-1）。\n\n![](img/515103_1_En_5_Fig1_HTML.jpg)\n\n该网格展示了像素的\
  \ R G B A 字节调色板。alpha 分量指示每个像素的透明度。\n\n图 5-1\n具有 RGBA 调色板的图片结构\n\n如果图像是灰度的，每个像素通常用\
  \ 1 个字节编码。如果字节包含 0，则为黑色；如果为 255，则为白色。中间的所有值是不同深浅的灰色。\n\n公开图像缓冲区最多信息的类是 `CGImage`。它具有以下属性：\n\
  \n-   `width` 和 `height` 包含图像大小。\n-   `bitsPerComponent` 包含单个分量的位数。\n-   `bitsPerPixel`\
  \ 包含每个像素的位数。\n-   其他属性。\n\n要在设备屏幕上绘制图片，您需要将其传递给视频芯片。它理解前面提到的其中一种格式的像素缓冲区，或经过特殊准备的纹理。对于\
  \ UIKit，您无需直接执行此操作。相反，您只需将其传递给 `UIImageView`，它会完成其余工作。\n\n### 文件格式\n\n图像在文件中的存储方式与在内存中不同。最接近像素缓冲区图像格式的是\
  \ BMP（Windows 设备无关位图），但由于其文件大小，它很少被使用。单独存储每个像素，为其分配 3 或 4 个字节的内存，非常消耗资源。例如，iPhone\
  \ 11 的分辨率为 828 × 1792 像素。即使没有 alpha 通道（并且 BMP 不支持 alpha 通道），这样的图片也需要大约 4.24 MB。11\
  \ 英寸 iPad Pro 的分辨率更高——2388 × 1668 像素。以 BMP 格式保存的简单截图将占用近 11.4 MB 的设备内存。它适用于活跃使用的纹理，但将所有图形资源以此格式存储是不可能的。\n\
  \n对于 iOS 应用资源和网络图像，最流行的格式是 PNG（便携式网络图形）、JPEG/JPG（联合图像专家组）和 GIF（图形交换格式）。这些格式可以解析为\
  \ `UIImage` 或 `CGImage`。另一种兼容格式是 TIF/TIFF（标签图像文件格式）。\n\nPNG 文件质量好且支持透明。同时，它们比 BMP\
  \ 或图像缓冲区小得多。PNG 是应用资产的推荐格式，至少对于部分透明的图片是如此。\n\n最小的文件是使用 JPG 编码的。根据压缩率，它们可以更小但质量更差，或者更大但质量更好。JPG\
  \ 将图片分割成方块，并允许每个方块中只使用一定范围的颜色。更好的质量需要每个方块使用更多字节，但提供了更大的颜色范围。更好的压缩则相反。JPG 质量范围从 0\
  \ 到 1 或从 0 到 10。\n\nGIF 图片是索引的。GIF 不使用颜色分量，而是使用颜色索引。每张图片最多可以有 256 种不同的颜色，这些颜色存储在调色板中。GIF\
  \ 中不允许使用调色板之外的颜色。GIF 的另一个众所周知的特点是动画。GIF 在一个文件中可能包含多张图片。一系列图片构成一个动画。GIF 动画在即时通讯工具和一些应用中很受欢迎。我们将在本章末尾讨论它们。\n\
  \n### 从文件加载（读取）图像\n\n在讨论了图像在文件和内存中的存储方式之后，让我们看看如何加载图像并获取 `UIImage` 或 `CGImage` 对象。\n\
  \n图像文件可以存储在内存中、磁盘上（对于 iPhone 来说是闪存）或网络上。根据文件位置，我们将使用 `UIImage` 和 `CGImage` 的不同初始化方法。\n\
  \n第一种情况是图像文件存储在内存中，具体来说，是在一个 `Data` 对象中。\n\n函数 `loadImageFromData(_:, into:)` 解码作为第一个参数传递的数据文件，并设置第二个参数中\
  \ `UIImageView` 的 image 属性。如果提供的文件包含有效的图像文件，该函数返回 `true`，否则返回 `false`（代码段 5-1）。\n\
  \n```\npublic func loadImageFromData(_ data: Data, into imageView: UIImageView)\
  \ -> Bool {\nif let image = UIImage(data: data) {\nimageView.image = image\nreturn\
  \ true\n} else {\nreturn false\n}\n}\n代码段 5-1\n从内存加载图像\n```\n\n如果应用使用可下载的资源，您将需要从文件（代码段\
  \ 5-2）打开图像，可能来自归档文件，但我们将其留作范围之外。\n\n此函数可能有三种结果：\n\n-   文件未找到。\n-   文件不是图像。\n-  \
  \ 图像加载成功。\n\n```\npublic enum LoadImageError: Error {\ncase fileNotFound\ncase notAnImage\n\
  }\npublic func loadImageFromFileWithError(_ file: String, into imageView: UIImageView)\
  \ throws {\nguard let data = try? Data(contentsOf: URL(fileURLWithPath: file)) else\
  \ {\nthrow LoadImageError.fileNotFound\n}\nif !loadImageFromData(data, into: imageView)\
  \ {\nthrow LoadImageError.notAnImage\n}\n}\n代码段 5-2\n从文件加载图像\n```\n\n最后一种可能性是直接从网络加载图片。而这种方式比看起来要复杂一些，首先是因为缓存的原因。在没有至少短期缓存的情况下从网络加载图像，对用户体验来说是一场灾难。想象一下，当用户离开又再次进入屏幕时，看到所有图片都重新加载。如果在\
  \ `UITableView` 或 `UICollectionView` 中使用这些图片呢？\n\n一个简单的解决方案是使用外部库。其中之一是 Kingfisher。它是一个非常受欢迎的开源库，并且是免费的。\n\
  \n如果您不喜欢第三方库，您可以在您的应用内部制作一个简单的缓存系统。我们将在本章后面讨论它。\n\n### 将图像保存（写入）到文件\n\n当用户拍照并且我们处理它时，我们需要将其保存为我们之前提到的一种流行格式。我们不能将其作为\
  \ `UIImage`、`CGImage` 或图像缓冲区发送到服务器。\n\n这个过程与读取非常相似，但我们也需要添加一些参数——例如，JPG 格式的压缩率（见代码段\
  \ 5-3）。\n\n```\nfunc saveImageAsPNG(image: UIImage) -> Data? {\nreturn image.pngData()\n\
  }\nfunc saveImageAsJPEG(image: UIImage, compressionQuality: CGFloat) -> Data? {\n\
  return image.jpegData(compressionQuality: compressionQuality)\n}\n代码段 5-3\n将图像保存到内存\n\
  ```\n\n代码段 5-4 中的函数不应在项目中使用，因为它们会增加代码量。但它们说明了将 `UIImage` 转换为 `Data` 是多么容易。\n\n将图像保存到文件也很有用，可用于缓存目的或在处理前制作备份副本。一些库还需要文件的\
  \ URL 而不是 `Data` 对象。\n\n```\npublic enum SaveImageError: Error {\ncase dataNotAvailable\n\
  }\nfunc saveImageAsPNGFile(image: UIImage, fileName: String) throws {\nif let data\
  \ = image.pngData() {\ntry data.write(to: URL(fileURLWithPath: fileName))\n} else\
  \ {\nthrow SaveImageError.dataNotAvailable\n}\n}\nfunc saveImageAsJPEGFile(image:\
  \ UIImage, compressionQuality: CGFloat, fileName: String) throws {\nif let data\
  \ = image.jpegData(compressionQuality: compressionQuality) {\ntry data.write(to:\
  \ URL(fileURLWithPath: fileName))\n} else {\nthrow SaveImageError.dataNotAvailable\n\
  }\n}\n代码段 5-4\n将图像保存到文件\n```\n\n这两个函数都可能抛出异常，因此需要将它们包装在 do-try-catch 块中。\n\n\n\n\
  \n## 下载与缓存图像\n\n通常我们不需要手动完成图像的下载和缓存，但理解其原理十分重要。我们有一个图像 URL 和一个缓存存储器。该存储器本质上是一个`Dictionary`。键是\
  \ URL，或者为了获得更好的性能，也可以是 URL 的哈希值。值可以是图像本身，也可以是本地文件系统中的图像路径。\n\n让我们从算法开始：\n\n- 获取\
  \ URL，检查它是否在缓存中。\n- 如果在缓存中，则返回已有的图像。\n- 如果不在缓存中，则下载图像并将其添加到缓存中。\n- 在将图像添加到缓存之前，需要检查缓存的大小。如果其中元素过多，则需要清理一些旧数据。如果缓存包含对本地文件系统的引用，则可以容纳更多项目。如果所有图像都存储在内存中，最好将其限制在\
  \ 10`–`20 个元素。\n\n### 下载文件\n\n我们将回顾两种下载文件的方式。一种是使用 iOS 原生框架，另一种是借助一个非常流行的框架：Alamofire。\n\
  \n文件下载，具体来说就是图像下载，与任何 GET 请求并无二致。我们根据 URL、请求头、参数和其他数据构建一个请求。根据所使用的 HTTP 框架，实现方式可能有所不同，但其背后的理念是相同的。\n\
  \n由于本章讨论的是图像处理，我们将会把网络组件简化到最低限度。我们假设图像在网络上公开可访问，并且下载无需授权。\n\n#### 使用 Alamofire 下载文件\n\
  \n在使用 Alamofire 之前，你应该将其添加到你的项目中。如果你使用 Swift Package Manager，请添加这个包：[`https://github.com/Alamofire/Alamofire`](https://github.com/Alamofire/Alamofire)。\n\
  \n对于 CocoaPods，请在你的`Podfile`中添加这一行：\n\n```\npod 'Alamofire'\n```\n\n拥有文件 URL 后，你可以通过异步请求来下载它（参见配方\
  \ 5-5）。*异步*意味着方法调用不会立即执行其全部功能。部分功能（在我们的例子中是下载）需要耗时，但该方法不会在文件下载完成前阻塞应用的执行。\n\n> **注意**\
  \  \n> Swift 5.5 提供了 `async`/`await` 关键字，使得异步方法调用几乎像同步调用一样，去除了闭包和扭曲的代码。这项技术是新的，大多数框架尚未原生支持，但将任何带有完成处理器的函数转换为异步函数是相当容易的。我们将在本章后面部分进行回顾。\n\
  \n```\nimport Alamofire\nfunc downloadFile(url: String, delegate: @escaping (_ data:\
  \ Data?, _ error: Error?) -> Void) {\nAF.request(url)\n.responseData { response\
  \ in\nDispatchQueue.main.async {\nif let data = response.data {\n// 我们在这里得到了 Data\
  \ 对象\ndelegate(data, nil)\n} else {\ndelegate(nil, response.error)\n}\n}\n}\n}\n\
  配方 5-5\n使用 Alamofire 下载数据\n```\n\n#### 使用 URLSession/URLRequest 下载文件\n\n使用外部库可以简化代码，但这会使你的应用变得臃肿。如果你正在编写一个大型应用，可能希望像配方\
  \ 5-6 所示那样原生下载文件，以保持应用尽可能轻量和快速。\n\n```\nfunc downloadFileNatively(url: URL, delegate:\
  \ @escaping (_ data: Data?, _ error: Error?) -> Void) {\nlet sessionConfig = URLSessionConfiguration.default\n\
  let session = URLSession(configuration: sessionConfig)\nlet request = URLRequest(url:\
  \ url)\nlet task = session.dataTask(with: request) { data, response, error in\n\
  DispatchQueue.main.async {\nif let data = data {\n// 我们在这里得到了 Data 对象\ndelegate(data,\
  \ nil)\n} else {\ndelegate(nil, error)\n}\n}\n}\ntask.resume()\n}\n配方 5-6\n原生下载文件\n\
  ```\n\n获得一个`Data`对象后，我们就可以进入下一步了。\n\n### 将带有完成处理器的函数转换为异步函数\n\n多个异步调用会使应用逻辑变得扭曲，并可能产生错误。当你进行一个\
  \ API 调用，然后处理它，并根据第一次调用的结果进行更多调用时，你会得到许多小函数，或者一个庞大且难以维护的函数。\n\n在 Swift 5.5 中，苹果引入了一项新技术——异步函数。如果你使用过其他编程语言，比如\
  \ JavaScript 或 Dart，你可能已经熟悉了这个概念。\n\n带有完成处理器的常规函数会在后台线程中执行一些工作，然后将结果返回到作为参数传入的一个逃逸函数中。这个函数通常接受两个参数——正确结果和错误信息。例如：\n\
  \n```\nfunc download(url: URL, completion: @escaping (_ result: Data?, _ error:\
  \ Error?) -> Void)\n```\n\n如果下载成功，返回结果`Data`对象，`error`为`nil`。否则，`result`为`nil`，`error`指示问题所在。\n\
  \n在 Swift 5.5 中，你可以这样重写：\n\n```\nfunc downloadAsync(url: URL) async throws -> Data\n\
  ```\n\n有了原始的带有完成处理器的函数，我们可以像配方 5-7 所示那样编写第二个函数。\n\n```\nfunc downloadAsync(url:\
  \ URL) async throws -> Data {\ntry await withUnsafeThrowingContinuation { continuation\
  \ in\ndownload(url: url) { data, error in\nif let error = error {\ncontinuation.resume(throwing:\
  \ error)\n} else if let data = data {\ncontinuation.resume(returning: data)\n}\n\
  fatalError(\"Error in download function\")\n}\n}\n}\n配方 5-7\n异步包装器\n```\n\n将 `download`\
  \ 替换为 `downloadFile` 或 `downloadFileNatively`，你将得到这些函数的异步版本。使用方法如下：\n\n```\ndo {\n\
  let downloadResult = try await downloadAsync(url: url)\n// downloadedResult 包含一个非可选的\
  \ Data 对象\n} catch {\nprint(error)\n}\n```\n\n### 在内存中缓存文件\n\n最简单且最快的方法是将下载的文件保存在内存中。缺点在于\
  \ iOS 应用的内存相当有限。尽管限制很高（一个应用最多可以占用 5 GB），但不建议使用大量内存。当你的应用在前台运行时，iOS 可能会关闭后台应用；更糟的是，一旦你的应用进入后台，它很可能连同你的缓存一起被卸载。\n\
  \n配方 5-8 展示了一个没有大小控制的最简单的缓存实现。\n\n```\npublic class SimpleImageCache {\nprivate\
  \ var cache: [Int: Data] = [:]\npublic func addToCache(url: String, data: Data)\
  \ {\ncache[url.hash] = data\n}\npublic func getFromCache(url: String) -> Data? {\n\
  cache[url.hash]\n}\npublic static let sharedInstance = SimpleImageCache()\n}\n配方\
  \ 5-8\n简单内存缓存\n```\n\n配方 5-9 使用了这个类来实现带缓存的图像加载。\n\n```\nfunc downloadFileWithCache(url:\
  \ URL, delegate: @escaping (_ data: Data?, _ error: Error?) -> Void) {\nif let data\
  \ = SimpleImageCache.sharedInstance.getFromCache(url: url.absoluteString) {\ndelegate(data,\
  \ nil)\nreturn\n}\nlet sessionConfig = URLSessionConfiguration.default\nlet session\
  \ = URLSession(configuration: sessionConfig)\nlet request = URLRequest(url: url)\n\
  let task = session.dataTask(with: request) { data, response, error in\nif let data\
  \ = data {\nSimpleImageCache.sharedInstance.addToCache(url: url.absoluteString,\
  \ data: data)\ndelegate(data, nil)\n} else {\ndelegate(nil, error ?? NSError())\n\
  }\n}\ntask.resume()\n}\n配方 5-9\n带缓存下载文件\n```\n\n在编写带有委托的异步函数时，我们应始终牢记，代码的所有部分都应该调用`delegate`。否则，用户可能会被永久的加载状态卡住。最好显示一个错误，即使它除了阻止用户并迫使他们关闭你的应用（可能永远不再打开）之外，没有任何有用的信息。\n\
  \n### 在文件系统中缓存文件\n\n在内存中缓存文件和在文件系统中缓存文件有两个主要区别：\n\n- 每次应用重启时，内存都会被清理，因此我们无需自行清理缓存。\n\
  - 缓存的文件不会存储在像 `Dictionary` 这样的结构中；我们必须自己管理它们。\n\n其余部分相似。\n\n\n\n#### 获取目录路径\n\n\
  在写入任何文件之前，我们需要先确定存储位置。缓存数据有三种可能的存储位置：\n\n*   Documents 目录\n*   Caches 目录\n*   Temporary\
  \ 目录\n\n我们并非必须使用 Caches 目录来存储缓存，但这是一种良好的实践。在不同情况下，iOS 会以不同方式对待这些目录。例如，当手机内存已满时，我们希望\
  \ iOS 能清理 caches 和 temporary 目录。另一方面，已安装应用的 Documents 目录，在没有用户明确指令的情况下不应被改动。技巧 5-10\
  \ 展示了如何获取最常见的路径。\n\n```\n// 获取用户的 documents 目录路径\nfunc getDocumentDirectoryPath()\
  \ -> URL {\n    let arrayPaths = FileManager.default.urls(for: .documentDirectory,\
  \ in: .userDomainMask)\n    let docDirectoryPath = arrayPaths[0]\n    return docDirectoryPath\n\
  }\n// 获取用户的 cache 目录路径\nfunc getCacheDirectoryPath() -> URL {\n    let arrayPaths\
  \ = FileManager.default.urls(for: .cachesDirectory, in: .userDomainMask)\n    let\
  \ cacheDirectoryPath = arrayPaths[0]\n    return cacheDirectoryPath\n}\n// 获取用户的\
  \ temp 目录路径\nfunc getTempDirectoryPath() -> URL {\n    let tempDirectoryPath = URL(fileURLWithPath:\
  \ NSTemporaryDirectory(), isDirectory: true)\n    return tempDirectoryPath\n}\n\
  技巧 5-10\n获取目录路径\n```\n\n#### 将文件保存到缓存\n\n既然我们决定将缓存存储在一个为此目的专门创建的文件夹中，并且已经通过 URL\
  \ 对象获得了该文件夹的路径，那么我们就可以保存下载的文件，并在需要时进行检索。\n\n除了文件本身，我们还需要存储关于它们的额外数据——例如，原始 URL。我们很快就会发现，记录最后使用日期和文件大小对于下一步操作也很有用。\n\
  \n我们需要一个已知的 URL 以及本地文件名。一个显而易见的解决方案是让文件名与其 URL 相匹配。这个方案看似合理，但其实是错误的。问题在于文件名在长度和允许使用的字符上都有限制。好消息是，我们不需要完整的\
  \ URL，我们只需要它的哈希值。我们可以用哈希值来代替 URL。\n\n在技巧 5-11 中，我们将修改 `SimpleImageCache` 类，并将其转变为\
  \ `FileImageCache`。\n\n```\npublic class SimpleFileImageCache {\n    private func\
  \ getCacheDirectoryPath() -> URL {\n        let arrayPaths = FileManager.default.urls(for:\
  \ .cachesDirectory, in: .userDomainMask)\n        let cacheDirectoryPath = arrayPaths[0]\n\
  \        return cacheDirectoryPath\n    }\n    private func getLocalURL(url: String)\
  \ -> URL {\n        let baseURL = getCacheDirectoryPath()\n        return baseURL.appendingPathComponent(\"\
  \\(url.hash)\")\n    }\n    public func addToCache(url: String, data: Data) {\n\
  \        let localURL = getLocalURL(url: url)\n        _ = try? data.write(to: localURL,\
  \ options: .atomic)\n    }\n    public func getFromCache(url: String) -> Data? {\n\
  \        let localURL = getLocalURL(url: url)\n        return try? Data(contentsOf:\
  \ localURL)\n    }\n    public static let sharedInstance = SimpleFileImageCache()\n\
  }\n技巧 5-11\n文件图像缓存\n```\n\n`getCacheDirectoryPath` 函数被改成了一个私有方法，但它仍然可以像前一个技巧中那样被直接使用。\n\
  \n`addToCache` 方法并不总是能成功。例如，如果内存已满，它就会失败。但这不应导致应用完全崩溃，只会使其变得不太稳定。这当然不好，但对此我们也没有太多办法来处理。我们甚至不需要显示错误弹窗。但如果多次尝试都失败，情况可能会变得更糟，甚至可能导致应用崩溃。\n\
  \n#### 验证缓存大小\n\n根据存储位置的不同，验证缓存大小有两种不同的方法：\n\n*   如果缓存文件存储在内存中，我们可以遍历所有 `Data` 对象并汇总它们的大小。\n\
  *   如果缓存文件存储在文件系统中，我们需要计算所有文件的大小，或者将它们的大小存储在一个索引文件中。\n\n现在，既然我们有了更智能的缓存清理机制，就需要存储日期和时间信息，以便移除最早的文件。于是问题来了：我们是应该删除那些下载时间较早的文件，还是删除那些使用时间较早的文件？两种方案都可行，但第二种更有效。技巧\
  \ 5-12 基于之前的方案提供了一个新的 `ImageCache` 类，用于记录最后一次使用数据，并在每次访问图像时更新该数据。当缓存满了之后，我们会删除其中\
  \ 30% 的、较长时间未被使用的图像。\n\n话不多说，回到编码环节！\n\n```\npublic class ImageCache {\n    private\
  \ struct CachedFile {\n        var hash: Int\n        var size: Int {\n        \
  \    data.count\n        }\n        var data: Data\n        var lastAccess: Date\n\
  \    }\n    private var cache: [Int: CachedFile] = [:]\n    var totalSize: Int {\n\
  \        var size = 0\n        for f in cache.values {\n            size += f.size\n\
  \        }\n        return size\n    }\n    var sizeThreshold = 104_857_600 // 100Mb\n\
  \    public func addToCache(url: String, data: Data) {\n        var totalSize =\
  \ self.totalSize\n        if totalSize + data.count > sizeThreshold {\n        \
  \    // 移除 10% 的缓存文件\n            let sortedFiles = cache.values.sorted { cf1, cf2\
  \ in\n                cf1.lastAccess.timeIntervalSince1970 < cf2.lastAccess.timeIntervalSince1970\n\
  \            }\n            while totalSize + data.count > sizeThreshold * 9 / 10\
  \ {\n                guard let lastFile = sortedFiles.last else {\n            \
  \        break\n                }\n                totalSize -= lastFile.size\n\
  \                cache.removeValue(forKey: lastFile.hash)\n            }\n     \
  \   }\n        cache[url.hash] = CachedFile(hash: url.hash, data: data, lastAccess:\
  \ Date())\n    }\n    public func getFromCache(url: String) -> Data? {\n       \
  \ guard var cacheFile = cache[url.hash] else {\n            return nil\n       \
  \ }\n        cacheFile.lastAccess = Date()\n        return cacheFile.data\n    }\n\
  \    public static let sharedInstance = ImageCache()\n}\n技巧 5-12\n内存缓存系统\n```\n\n\
  `CachedFile` 结构体包含了缓存文件的所有必要信息。每次请求图像时，`lastAccess` 字段都会被更新。\n\n`sizeThreshold`\
  \ 字段定义了可用于缓存的内存大小上限。默认情况下，这个值是 100 兆字节。`addToCache` 方法会检查新图像是否能被容纳，如果不能，则会移除文件，直到在添加新文件后缓存至少还有\
  \ 10% 的空闲内存。\n\n我们缓存系统的下一个版本（技巧 5-13），即 `FileImageCache`，也遵循相同的原则。它在 `init` 方法中创建缓存，并在\
  \ `deinit` 方法中（如有必要）清理 10% 的缓存空间。\n\n\n```swift\npublic class FileImageCache {\n\
  \    private struct CachedFile {\n        var hash: Int\n        var size: Int\n\
  \        var lastAccess: Date\n    }\n    \n    private var cache: [Int: CachedFile]\
  \ = [:]\n    \n    var totalSize: Int {\n        var size = 0\n        for f in\
  \ cache.values {\n            size += f.size\n        }\n        return size\n \
  \   }\n    \n    private func getCacheDirectoryPath() -> URL {\n        let arrayPaths\
  \ = FileManager.default.urls(for: .cachesDirectory, in: .userDomainMask)\n     \
  \   let cacheDirectoryPath = arrayPaths[0]\n        if !FileManager.default.fileExists(atPath:\
  \ cacheDirectoryPath.path) {\n            do {\n                try FileManager.default.createDirectory(at:\
  \ cacheDirectoryPath, withIntermediateDirectories: true, attributes: nil)\n    \
  \        } catch {\n                print(error)\n            }\n        }\n   \
  \     return cacheDirectoryPath\n    }\n    \n    private func getLocalURL(url:\
  \ String) -> URL {\n        let baseURL = getCacheDirectoryPath()\n        return\
  \ baseURL.appendingPathComponent(\"\\(url.hash)\")\n    }\n    \n    init() {\n\
  \        // Get a list of files from filesystem\n        do {\n            let fileURLs\
  \ = try FileManager.default.contentsOfDirectory(at: getCacheDirectoryPath(), includingPropertiesForKeys:\
  \ nil, options: [.skipsHiddenFiles, .skipsSubdirectoryDescendants])\n          \
  \  for fileURL in fileURLs {\n                guard let hash = Int(fileURL.lastPathComponent)\
  \ else {\n                    continue\n                }\n                let attributes\
  \ = try? FileManager.default.attributesOfItem(atPath: fileURL.path)\n          \
  \      let fileSize = attributes?[.size] as? UInt64 ?? 0\n                cache[hash]\
  \ = CachedFile(hash: hash, size: Int(fileSize), lastAccess: Date())\n          \
  \  }\n        } catch {\n            print(\"Error loadign cache from filesystem\"\
  )\n        }\n    }\n    \n    deinit {\n        cleanIfNeeded()\n    }\n    \n\
  \    var sizeThreshold = 104_857_600 // 100Mb\n    \n    private func cleanIfNeeded(newFileSize:\
  \ Int = 0) {\n        var totalSize = self.totalSize\n        if totalSize + newFileSize\
  \ > sizeThreshold {\n            // Remove 10% of cached files\n            let\
  \ sortedFiles = cache.values.sorted { cf1, cf2 in\n                cf1.lastAccess.timeIntervalSince1970\
  \ > cf2.lastAccess.timeIntervalSince1970\n            }\n            while totalSize\
  \ > sizeThreshold * 9 / 10 {\n                guard let lastFile = sortedFiles.last\
  \ else {\n                    break\n                }\n                do {\n \
  \                   try FileManager.default.removeItem(atPath: getLocalURL(url:\
  \ \"\\(lastFile.hash)\").absoluteString)\n                    totalSize -= lastFile.size\n\
  \                } catch {\n                    print(error.localizedDescription)\n\
  \                }\n                cache.removeValue(forKey: lastFile.hash)\n \
  \           }\n        }\n    }\n    \n    public func addToCache(url: String, data:\
  \ Data) {\n        cleanIfNeeded(newFileSize: data.count)\n        do {\n      \
  \      try data.write(to: getLocalURL(url: url))\n            cache[url.hash] =\
  \ CachedFile(hash: url.hash, size: data.count, lastAccess: Date())\n        } catch\
  \ {\n            print(error.localizedDescription)\n        }\n    }\n    \n   \
  \ public func getFromCache(url: String) -> Data? {\n        guard var cacheFile\
  \ = cache[url.hash] else {\n            return nil\n        }\n        cacheFile.lastAccess\
  \ = Date()\n        let fullURL = getLocalURL(url: url)\n        do {\n        \
  \    return try Data(contentsOf: fullURL)\n        } catch {\n            print(error)\n\
  \            return nil\n        }\n    }\n    \n    public static let sharedInstance\
  \ = FileImageCache()\n}\n```\n\n## 配方 5-13：文件系统缓存系统\n\n这两种方法可以合并为一个。内存缓存可以容纳少量数据，例如\
  \ 10–15 Mb。文件系统缓存则可以容纳数倍于此的数据。当内存缓存达到极限时，它会将部分文件保存到磁盘，并在需要时重新读取。\n\n这有什么实际用途？假设你在开发一个展示餐厅菜单的应用。菜单中包含`UITableView`或`UICollectionView`，并带有小图片。用户上下滑动屏幕，试图决定今天想吃什么。这种情况下非常适合使用内存缓存。反复从磁盘读取文件会消耗更长时间，即使磁盘是高速闪存。当用户进入购物车页面时，菜单图片不再需要，我们可以将其从内存中移除。另一方面，用户可能会返回菜单页面，或在点单后继续浏览菜单。我们只需从磁盘重新加载所有图片即可。\n\
  \n本书不深入讨论两级缓存，但你可以尝试自行实现作为练习。这将是一次宝贵的经验。\n\n最后，让我们回顾一个使用示例。我们将三个 UIKit 视图添加到屏幕上：\n\
  \n```swift\n// 显示当前缓存大小的 UILabel\n@IBOutlet weak var lblCacheSize: UILabel!\n//\
  \ 用于输入 URL 的 UITextField\n@IBOutlet weak var tfURL: UITextField!\n// 用于显示已加载（或缓存）图片的\
  \ UIImageView\n@IBOutlet weak var ivImage: UIImageView!\n```\n\n此外，我们添加两个按钮。一个通过内存缓存加载图片，另一个通过文件系统缓存加载图片。它们将触发以下操作：\n\
  \n```swift\n@IBAction func loadUsingMemory()\n@IBAction func loadUsingFiles()\n\
  ```\n\nStoryboard 的设计可能如图 5-2 所示。\n\n![一张显示图片缓存的手机屏幕示意图。图中列出了文件位置、通过内存缓存或文件缓存加载的选项以及缓存大小。](img/515103_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 图片缓存视图的 Storyboard\n\n为了更好地理解，现在我们来查看一个图片缓存的使用示例。\n\n示例很直观，只需明确以下几点：\n\
  \n1. 部分函数接受 `URL`，而其他函数要求 `String`。对于文件，URL 以 `file://` 开头，因此要转换为文件路径，需使用 `.path`\
  \ 而非 `.absoluteString`。\n\n2. 要从文本字段 `tfURLString` 输入的字符串创建 URL 对象，需要对字符进行转义；否则\
  \ URL 可能为 nil。为此，我们使用 `.addingPercentEncoding(withAllowedCharacters: CharacterSet.urlQueryAllowed)`\
  \ 方法。\n\n3. 空格也可能导致 URL 无效，因此需对输入的 `String` 进行修剪：`.trimmingCharacters(in: .whitespacesAndNewlines)`。\n\
  \n## 调整大小与裁剪\n\n通过访问 `CGImage` 中的图像缓冲区，我们可以对其进行修改——既可以在现有图像对象内部操作，也可以创建新的图像缓冲区并将其转换为新的\
  \ `CGImage` 或 `UIImage`。\n\n我们可以对图像进行哪些操作？\n\n* 缩放图像。可等比或非等比缩放，可放大或缩小。\n\n* 裁剪图像。我们可以将图像裁剪成所需比例的方形或矩形。裁剪后的图像始终比原始图像小。\n\
  \n\n### 图像缩放\n\n缩放分为两种类型：放大和缩小。第一种情况，新图像比原始图像更大；第二种情况则更小。如果缩放不成比例，则可能同时涉及放大和缩小。但我们通常需要保持宽高比，因此这里不讨论这种情况。\n\
  \n幸运的是，`CoreImage` 框架为我们处理了一切；我们只需要计算新的尺寸。这个尺寸会是什么样呢？\n\n我们可能需要设置图像的最大尺寸，例如，当用户选择头像时。现代\
  \ `iPhone` 相机的分辨率非常高。图像尺寸在 5000 × 5000 像素左右是正常的。但对于头像来说，这并非必要，因此应用程序需要将其缩小。\n\n\
  如果用户从图库中选择图片，图片可能会太小。在这种情况下，我们需要将其放大。或者，应用程序可以弹出一个提示，要求用户选择质量更好的图片。配方 5-14 展示了一种可能的尺寸调整方案，而配方\
  \ 5-15 则仅对图像进行缩小。\n\n```\nextension UIImage {\n    func downscaled(maxSize: CGFloat)\
  \ -> UIImage? {\n        let maxDimension = size.width > size.height ? size.width\
  \ : size.height\n        if maxDimension > maxSize {\n            return resized(maxSize:\
  \ maxSize)\n        } else {\n            return self\n        }\n    }\n}\n配方 5-15\n\
  缩小图像\n```\n\n```\nextension UIImage {\n    func resized(maxSize: CGFloat) -> UIImage?\
  \ {\n        let scale: CGFloat\n        if size.width > size.height {\n       \
  \     scale = maxSize / size.width\n        } else {\n            scale = maxSize\
  \ / size.height\n        }\n        let newWidth = size.width * scale\n        let\
  \ newHeight = size.height * scale\n        UIGraphicsBeginImageContext(CGSize(width:\
  \ newWidth, height: newHeight))\n        draw(in: CGRect(x: 0, y: 0, width: newWidth,\
  \ height: newHeight))\n        let newImage = UIGraphicsGetImageFromCurrentImageContext()\n\
  \        UIGraphicsEndImageContext()\n        return newImage\n    }\n}\n配方 5-14\n\
  将图像缩放到所需尺寸\n```\n\n现在是时候讨论*图像上下文*了。直接在 `UIImage` 或 `CGImage` 中更改像素效率不高。如果我们手动计算像素，就会失去所有图形加速能力。正确的做法是创建一个图像上下文。\n\
  \n一次只能处理一个图像上下文。所有工作都在以下两个调用之间进行：\n\n```\nUIGraphicsBeginImageContext\n// ... 和\
  \ ...\nUIGraphicsEndImageContext\n```\n\n你可以使用 `UIImage` 实例在当前上下文中绘制，也可以使用 `UIBezierPath`\
  \ 和其他利用图像上下文的类绘制线条或其他形状。\n\n最后，你需要使用 `UIGraphicsGetImageFromCurrentImageContext`\
  \ 函数将上下文转换为一个新的 `UIImage` 对象。\n\n### 图像裁剪\n\n当我们需要特定的宽高比时，就需要进行图像裁剪。许多应用程序需要方形图片。例如，`Instagram`\
  \ 上的所有帖子都是方形的。头像通常也是方形的。有时是圆角方形，有时是圆形。从图像处理的角度来看，方形、圆角方形和圆形是相同的，因为圆角处理由 `UIKit`\
  \ 执行，区别仅在于圆角半径。\n\n另一种选择是矩形。电脑显示器通常具有 16:9 的比例。全高清是 1920 × 1080。如果你将 1920 除以 16\
  \ 或 1080 除以 9，结果都是 120。`UHD` 或 `4K` 在每个维度上的像素是其两倍——3840 × 2160。如果你将宽度除以 16 或高度除以\
  \ 9，两种情况下结果都是 240。\n\n`iPad` 屏幕的宽高比为 4:3。例如，配备视网膜屏的典型 `iPad Pro` 屏幕分辨率为 2048 × 1536\
  \ 像素。512 × 4 = 2048，512 × 3 = 1536。`iPad Pro` 的宽高比并非完美的 4:3，但非常接近。例如，11 英寸的 `iPad\
  \ Pro` 分辨率为 2388 × 1668 像素。其比例是 1.43:1，或 4.29:3。\n\n编写应用程序时，保持必要的宽高比比保持分辨率更重要。有几种更改宽高比的方法：\n\
  \n*   不保持宽高比缩放图像。这是最简单的方法，但结果会拉伸变形。\n*   裁剪图像。如果原始图像太宽，我们可以移除其两侧的一些像素。\n*   添加边距。在家看电影时，你会注意到大多数电影屏幕的顶部和底部都有黑色区域。这是因为在电影院中宽高比不同（屏幕更宽），而电影通常针对电影院进行了优化。\n\
  \n让我们为 `UIImage` 编写两个扩展。来自配方 5-16 的一个扩展将使用最短的维度将图像裁剪为正方形。来自配方 5-17 的另一个扩展将图像裁剪为所需的宽高比。\n\
  \n```\nextension UIImage {\n    func changeAspectRatio(aspectRatio: CGFloat) ->\
  \ UIImage? {\n        guard let originalCGImage = self.cgImage else {\n        \
  \    return nil\n        }\n        // Create a copy of the image without the imageOrientation\
  \ property so it is in its native orientation\n        let contextImage: UIImage\
  \ = UIImage(cgImage: originalCGImage)\n        // Get the size of the contextImage\n\
  \        let contextSize: CGSize = contextImage.size\n        let posX: CGFloat\n\
  \        let posY: CGFloat\n        let width: CGFloat\n        let height: CGFloat\n\
  \        if aspectRatio == contextSize.width / contextSize.height {\n          \
  \  // New aspect ratio is the same as old\n            posX = 0\n            posY\
  \ = 0\n            width = contextSize.width\n            height = contextSize.height\n\
  \        } else if aspectRatio < contextSize.width / contextSize.height {\n    \
  \        // New aspect ratio is less then original\n            // Cut from left/right\n\
  \            posX = (contextSize.width - contextSize.height * aspectRatio) / 2\n\
  \            posY = 0\n            width = contextSize.height * aspectRatio\n  \
  \          height = contextSize.height\n        } else {\n            // Cut from\
  \ top/bottom\n            posX = 0\n            posY = (contextSize.height - contextSize.width\
  \ / aspectRatio) / 2\n            width = contextSize.width\n            height\
  \ = contextSize.width / aspectRatio\n        }\n        let rect: CGRect = CGRect(x:\
  \ posX, y: posY, width: width, height: height)\n        // Create bitmap image from\
  \ context using the rect\n        if let imageRef = contextImage.cgImage?.cropping(to:\
  \ rect) {\n            return UIImage(cgImage: imageRef, scale: self.scale, orientation:\
  \ self.imageOrientation)\n        } else {\n            return nil\n        }\n\
  \    }\n}\n配方 5-17\n将图像裁剪为自定义宽高比\n```\n\n```\nextension UIImage {\n    var squared:\
  \ UIImage? {\n        guard let originalCGImage = self.cgImage else {\n        \
  \    return nil\n        }\n        // Create a copy of the image without the imageOrientation\
  \ property so it is in its native orientation\n        let contextImage: UIImage\
  \ = UIImage(cgImage: originalCGImage)\n        // Get the size of the contextImage\n\
  \        let contextSize: CGSize = contextImage.size\n        let posX: CGFloat\n\
  \        let posY: CGFloat\n        let width: CGFloat\n        let height: CGFloat\n\
  \        // Check to see which length is the longest and create the offset based\
  \ on that length, then set the width and height of our rect\n        if contextSize.width\
  \ > contextSize.height {\n            posX = (contextSize.width - contextSize.height)\
  \ / 2\n            posY = 0\n            width = contextSize.height\n          \
  \  height = contextSize.height\n        } else {\n            posX = 0\n       \
  \     posY = (contextSize.height - contextSize.width) / 2\n            width = contextSize.width\n\
  \            height = contextSize.width\n        }\n        let rect: CGRect = CGRect(x:\
  \ posX, y: posY, width: width, height: height)\n        if let imageRef = contextImage.cgImage?.cropping(to:\
  \ rect) {\n            // Create a new image based on the imageRef and rotate back\
  \ to the original orientation\n            return UIImage(cgImage: imageRef, scale:\
  \ self.scale, orientation: self.imageOrientation)\n        } else {\n          \
  \  return nil\n        }\n    }\n}\n配方 5-16\n将图像裁剪为正方形\n```\n\n**注意**\n\n这些计算属性和函数通常应该成功，但如果可能出现问题，我们假定它会出错。这就是为什么结果是可选的。究竟可能出什么问题？例如，宽高比可能过小或过大，导致其中一个维度为零；或者设备内存不足——在这些情况下，我们可能会得到\
  \ `nil`。\n\n\n\n## 准备与展示个人头像\n\n我们无法控制用户拍摄照片的几何形状。如果从社交网络获取这些照片，可控性就更低了。用户尝试下载尺寸或宽高比错误的图片时，虽然可以选择显示错误信息，但这会造成不良用户体验。\n\
  \n更好的解决方案是在上传前处理图片。我们通常希望限制图片尺寸并使其成为正方形。在本例中，我们将限制为 512 `×` 512 像素。\n\n### 上传前处理个人头像\n\
  \n基于之前编写的扩展，我们只需一行代码即可准备好个人头像，如示例 5-18 所示。以下是我们的算法：\n\n-   用户拍照。来源无关紧要，可以是相机或相册。\n\
  -   如果宽度和高度都大于 512 像素，则缩小图片，使至少一个维度变为 512 像素（另一个维度会更大）。\n-   如果宽度不等于高度，则裁剪图片。为简化操作，我们将从两侧均匀裁剪像素。\n\
  \n```\nextension UIImage {\nfunc prepareProfilePicture() -> UIImage {\nsquared?.downscaled(maxSize:\
  \ 512) ?? self\n}\n}\n示例 5-18\n处理用作个人头像的图片\n```\n\n如您所见，这是之前编写的函数的组合。如果其中一个函数失败，我们可以返回一个可选的`UIImage`。另一种选择是像前面的示例那样返回原始图片。\n\
  \n### 展示个人头像\n\n如果个人头像已妥善准备，我们可以确保它将是正方形，且每个维度不超过 512 像素。另一方面，错误也时有发生。幸运的是，`UIImageView`可以根据设计需求，将任何图片显示为正方形、圆角正方形甚至圆形（见图\
  \ 5-3 和示例 5-19）。\n\n![](img/515103_1_En_5_Fig3_HTML.jpg)\n\n一张手机屏幕图像，显示矩形和圆形轮廓中的图片及其属性。给出了诸如阴影偏移、边框颜色和语义等属性。\n\
  \n**图 5-3** 通用个人头像视图\n\n```\nclass ProfilePicture: UIImageView {\noverride init(frame:\
  \ CGRect) {\nsuper.init(frame: frame)\ncommonInit()\n}\nrequired init?(coder: NSCoder)\
  \ {\nsuper.init(coder: coder)\ncommonInit()\n}\nprivate func commonInit() {\ncontentMode\
  \ = .scaleAspectFill\nlayer.masksToBounds = true\n}\noverride func layoutSubviews()\
  \ {\nsuper.layoutSubviews()\nlayer.cornerRadius = min(bounds.width, bounds.height)\
  \ / 2.0\n}\n}\n示例 5-19\n自定义个人头像视图\n```\n\n示例 5-20 为我们提供了通过效果增强应用外观的方法。结合之前学到的几个技巧，让我们创建一个通用的个人头像组件，包含阴影、轮廓，以及如果未上传头像则显示用户首字母的功能。\n\
  \n```\n@IBDesignable\nclass UniversalProfilePicture: UIView {\n@IBInspectable var\
  \ shadowOffset: CGSize {\nget {\nlayer.shadowOffset\n}\nset {\nlayer.shadowOffset\
  \ = newValue\n}\n}\n@IBInspectable var shadowColor: UIColor? {\nget {\nif let sc\
  \ = layer.shadowColor {\nreturn UIColor(cgColor: sc)\n} else {\nreturn nil\n}\n\
  }\nset {\nlayer.shadowColor = newValue?.cgColor\n}\n}\n@IBInspectable var shadowRadius:\
  \ CGFloat {\nget {\nlayer.shadowRadius\n}\nset {\nlayer.shadowRadius = newValue\n\
  }\n}\n@IBInspectable var shadowOpacity: Float {\nget {\nlayer.shadowOpacity\n}\n\
  set {\nlayer.shadowOpacity = newValue\n}\n}\n@IBInspectable var borderWidth: CGFloat\
  \ = 2.0 {\ndidSet {\nlayer.borderWidth = borderWidth\n}\n}\n@IBInspectable var borderColor:\
  \ UIColor = .white {\ndidSet {\nlayer.borderColor = borderColor.cgColor\n}\n}\n\
  @IBInspectable var lettersColor: UIColor = .white {\ndidSet {\nself.setInitials()\n\
  }\n}\n@IBInspectable var name: String = \"John Doe\" {\ndidSet {\nself.setInitials()\n\
  }\n}\n@IBInspectable var image: UIImage? {\ndidSet {\npicture?.image = image\n}\n\
  }\n@IBInspectable var fontSize: CGFloat = 32 {\ndidSet {\nself.setInitials()\n}\n\
  }\nvar picture: UIImageView?\nvar initials: UILabel?\noverride init(frame: CGRect)\
  \ {\nsuper.init(frame: frame)\ncommonInit()\n}\nrequired init?(coder: NSCoder) {\n\
  super.init(coder: coder)\ncommonInit()\n}\nprivate func commonInit() {\npicture\
  \ = UIImageView(frame: bounds)\ninitials = UILabel(frame: bounds)\naddSubview(initials!)\n\
  addSubview(picture!)\npicture?.contentMode = .scaleToFill\npicture?.layer.masksToBounds\
  \ = true\npicture?.image = image\ninitials?.textAlignment = .center\nsetInitials()\n\
  }\noverride func layoutSubviews() {\nsuper.layoutSubviews()\npicture?.frame = bounds\n\
  initials?.frame = bounds\nlayer.cornerRadius = min(bounds.width, bounds.height)\
  \ / 2.0\npicture?.layer.cornerRadius = min(bounds.width, bounds.height) / 2.0\n\
  initials?.layer.cornerRadius = min(bounds.width, bounds.height) / 2.0\n}\nprivate\
  \ func setInitials() {\ninitials?.font = UIFont.systemFont(ofSize: fontSize)\nlet\
  \ initialsText = name\n.components(separatedBy: \" \")\n.reduce(\"\") {\n($0 ==\
  \ \"\" ? \"\" : \"\\($0.first!)\") + \"\\($1.first!)\"\n}\ninitials?.text = initialsText\n\
  initials?.textColor = lettersColor\n}\n}\n示例 5-20\n通用个人头像组件\n```\n\n最后一个示例复制了前面描述的一些功能。利用第\
  \ 3 章的`UIView`扩展，`UniversalProfilePicture`类可以更简洁。\n\n## 图像遮罩\n\n本章前面部分介绍了如何进行基本图像处理。下一步是将两个或多个图片合并为一个。所有流行的即时通讯软件、社交网络、博客平台及其他应用都提供添加效果的功能，这些效果不会改变图像本身，而是在其上添加一些内容。可以是文字、简单绘图、贴纸、烟雾、星星等。\n\
  \n这可以通过在底层图片上添加一个带有透明度的图片来实现。顶层图片可以是预定义图片、用户选择的图片或新生成的图片。\n\n这里的关键概念是 Alpha 通道。图像由像素组成。每个像素都有表示颜色或透明度级别的通道。包括智能手机在内的计算机设备上最常见的调色板是\
  \ RGBA。RGBA 代表红色、绿色、蓝色和 Alpha。\n\n红色、绿色和蓝色是颜色分量。这些颜色的混合构成了整个显示调色板。红色和绿色混合产生黄色；红色和蓝色混合产生洋红色；蓝色和绿色混合产生青色。当所有通道都达到最大值时，显示为白色。\n\
  \nAlpha 分量是透明度级别。如果它占用 1 个字节，其范围是 0 到 255，其中 0 表示完全透明的像素，255 表示完全不透明的像素。\n\n但这一切为什么重要呢？\n\
  \n\n\n### 合并图像\n\n当我们将图像合并为一张时，我们会使用 alpha 通道作为乘数，分别合并每个通道。假设背景图像不透明，我们可以通过以下方式进行合并：\n\
  \n```\nr = (r1 * (255 - a2) + r2 * a2) / 255\ng = (g1 * (255 - a2) + g2 * a2) /\
  \ 255\nb = (b1 * (255 - a2) + b2 * a2) / 255\n```\n\n或者，如果颜色用 `Float` 或 `Double`\
  \ 值表示，我们可以像这样合并：\n\n```\nr = r1 * (1.0 - a2) + r2 * a2\ng = g1 * (1.0 - a2) + g2\
  \ * a2\nb = b1 * (1.0 - a2) + b2 * a2\n```\n\n这些公式可以是非线性的，但这是最简单的解决方案，并且它展示了 alpha\
  \ 通道的用法。\n\n在方案 5-21 中，我们有两张图像。第一张图像可以是完全不透明的。第二张图像是部分透明的，其大小与第一张图像相同或更小。\n\n```\n\
  extension UIImage {\nfunc simpleMerge(with topImage: UIImage, x: CGFloat, y: CGFloat)\
  \ -> UIImage? {\nUIGraphicsBeginImageContext(CGSize(width: size.width, height: size.height))\n\
  draw(at: CGPoint(x: 0, y: 0))\ntopImage.draw(at: CGPoint(x: x, y: y))\nlet newImage\
  \ = UIGraphicsGetImageFromCurrentImageContext()\nUIGraphicsEndImageContext()\nreturn\
  \ newImage\n}\n}\n方案 5-21\n合并两张图像——简单情况\n```\n\n让我们进入下一阶段（方案 5-22）。现在，我们假设图像可以有任意尺寸；最终结果图像将包含两个源图像且不裁剪。\n\
  \n```\nextension UIImage {\nfunc universalMerge(with topImage: UIImage, x: CGFloat,\
  \ y: CGFloat) -> UIImage? {\nlet x1 = (x < 0) ? -x : 0\nlet y1 = (y < 0) ? -y :\
  \ 0\nlet x2 = (x < 0) ? 0 : x\nlet y2 = (y < 0) ? 0 : y\nlet newWidth = max(x1 +\
  \ size.width, x2 + topImage.size.width)\nlet newHeight = max(y1 + size.height, y2\
  \ + topImage.size.height)\nUIGraphicsBeginImageContext(CGSize(width: newWidth, height:\
  \ newHeight))\ndraw(at: CGPoint(x: x1, y: y1))\ntopImage.draw(at: CGPoint(x: x2,\
  \ y: y2))\nlet newImage = UIGraphicsGetImageFromCurrentImageContext()\nUIGraphicsEndImageContext()\n\
  return newImage\n}\n}\n方案 5-22\n合并两张图像——通用情况\n```\n\n有时我们需要保持原始尺寸，并使结果图像与背景图像相同。在这种情况下，我们忽略第二张图像超出背景图片范围的像素，如方案\
  \ 5-23 所示。\n\n```\nextension UIImage {\nfunc croppingMerge(with topImage: UIImage,\
  \ x: CGFloat, y: CGFloat) -> UIImage? {\nlet cropX = (x < 0) ? -x : 0\nlet cropY\
  \ = (y < 0) ? -y : 0\nlet cropW: CGFloat\nlet cropH: CGFloat\nif x < 0 {\ncropW\
  \ = min(topImage.size.width + x, size.width)\n} else {\ncropW = min(topImage.size.width,\
  \ size.width - x - cropX)\n}\nif y < 0 {\ncropH = min(topImage.size.height + y,\
  \ size.height)\n} else {\ncropH = min(topImage.size.height, size.height - y - cropY)\n\
  }\nif cropW <= 0 || cropH <= 0 {\nreturn self\n}\nlet topImageCropped: UIImage\n\
  if cropW == topImage.size.width && cropH == topImage.size.height {\ntopImageCropped\
  \ = topImage\n} else {\nguard let topCGImage = topImage.cgImage,\nlet imageRef =\
  \ topCGImage.cropping(to: CGRect(x: cropX, y: cropY, width: cropW, height: cropH))\n\
  else {\nreturn nil\n}\ntopImageCropped = UIImage(cgImage: imageRef)\n}\nUIGraphicsBeginImageContext(CGSize(width:\
  \ size.width, height: size.height))\ndraw(at: CGPoint(x: 0, y: 0))\ntopImageCropped.draw(at:\
  \ CGPoint(x: max(x, 0), y: max(y, 0)))\nlet newImage = UIGraphicsGetImageFromCurrentImageContext()\n\
  UIGraphicsEndImageContext()\nreturn newImage\n}\n}\n方案 5-23\n带裁剪的合并图像\n```\n\n**注意**\n\
  \n如果你测试了这些方法，可能已经注意到简单合并和带裁剪的合并会得到相同的结果。这是因为 `UIImage` 的 `draw` 方法会在图像部分超出边界时进行裁剪。基本上，方案\
  \ 5-23 展示了其内部机制。使用其中任何一种方法都是完全有效的。\n\n### 应用蒙版\n\n如果你有一张矩形图像，例如来自 iPhone 相机拍摄的，并且想要赋予它其他形状，你可能需要应用一个蒙版。蒙版是仅包含一个通道——alpha\
  \ 通道的图像。由于在任何图像格式中都不允许将 alpha 作为唯一通道，因此通常使用灰度图像作为蒙版。\n\n白色表示完全不透明的像素，而黑色表示完全透明的像素。假设\
  \ `m` 是蒙版像素的白度级别。\n\n```\na = a1 * m // 如果 m 的范围是 0.0 到 1.0\n// 或者\na = a1 * m /\
  \ 255 // 如果 m 的范围是 0 到 255\n```\n\n当我们应用蒙版时，红、绿、蓝通道保持不变。\n\n在方案 5-24 中，我们将应用一个蒙版。如果蒙版比原始图像小，我们会假定蒙版之外的像素是透明的。如果蒙版部分超出图像边界，我们将忽略这些像素。\n\
  \n与之前的方案不同，在这个方案中，我们将直接使用图像缓冲区进行操作。\n\n```\nextension UIImage {\nfunc apply(mask:\
  \ UIImage) -> UIImage? {\nguard let originalCGImage = cgImage,\nlet maskCGImage\
  \ = mask.cgImage\nelse {\nreturn nil\n}\nlet colorSpace = CGColorSpaceCreateDeviceRGB()\n\
  let bytesPerPixel = 4\nlet bytesPerRow = bytesPerPixel * originalCGImage.width\n\
  let bytesPerRowMask = bytesPerPixel * maskCGImage.width\nlet bitsPerComponent =\
  \ 8\nlet bitmapInfo: UInt32 = CGImageAlphaInfo.premultipliedLast.rawValue\nguard\
  \ let context = CGContext(data: nil, width: originalCGImage.width, height: originalCGImage.height,\
  \ bitsPerComponent: bitsPerComponent, bytesPerRow: bytesPerRow, space: colorSpace,\
  \ bitmapInfo: bitmapInfo),\nlet ptr = context.data?.assumingMemoryBound(to: UInt8.self)\
  \ else {\nreturn nil\n}\nguard let contextMask = CGContext(data: nil, width: maskCGImage.width,\
  \ height: maskCGImage.height, bitsPerComponent: bitsPerComponent, bytesPerRow: bytesPerRowMask,\
  \ space: colorSpace, bitmapInfo: bitmapInfo),\nlet ptrMask = contextMask.data?.assumingMemoryBound(to:\
  \ UInt8.self) else {\nreturn nil\n}\ncontext.draw(originalCGImage, in: CGRect(x:\
  \ 0, y: 0, width: originalCGImage.width, height: originalCGImage.height))\ncontextMask.draw(maskCGImage,\
  \ in: CGRect(x: 0, y: 0, width: maskCGImage.width, height: maskCGImage.height))\n\
  for y in 0..<originalCGImage.height {\nfor x in 0..<originalCGImage.width {\nlet\
  \ pixelOffset = (y * originalCGImage.width + x) * 4\nlet maskX = x\nlet maskY =\
  \ originalCGImage.height - 1 - y\nlet maskPixelOffset = (maskY * maskCGImage.width\
  \ + maskX) * 4\nif maskX >= maskCGImage.width || y >= maskCGImage.height {\nptr[pixelOffset\
  \ + 3] = 0\n} else {\nptr[pixelOffset + 3] = UInt8((UInt(ptrMask[maskPixelOffset])\
  \ + UInt(ptrMask[maskPixelOffset + 1]) + UInt(ptrMask[maskPixelOffset])) / 3)\n\
  }\nptr[pixelOffset] = UInt8(UInt(ptr[pixelOffset]) * UInt(ptr[pixelOffset + 3])\
  \ / 255)\nptr[pixelOffset + 1] = UInt8(UInt(ptr[pixelOffset + 1]) * UInt(ptr[pixelOffset\
  \ + 3]) / 255)\nptr[pixelOffset + 2] = UInt8(UInt(ptr[pixelOffset + 2]) * UInt(ptr[pixelOffset\
  \ + 3]) / 255)\n}\n}\nguard let resultCGImage = context.makeImage() else {\nreturn\
  \ nil\n}\nreturn UIImage(cgImage: resultCGImage)\n}\n}\n方案 5-24\n为图像应用蒙版\n```\n\n\
  如果你从未直接操作过图像缓冲区，这可能看起来有些复杂，因为这对程序员来说并不常见。但如果你正在编写使用图像处理的应用程序或游戏，这会非常有用。\n\n让我们详细回顾一下。首先，我们需要获取对\
  \ `CGImage` 对象的非可选引用。\n\n```\nguard let originalCGImage = cgImage,\nlet maskCGImage\
  \ = mask.cgImage\nelse {\nreturn nil\n}\n```\n\n然后我们定义图像的参数。我们需要它们来创建上下文。即使原始图像没有\
  \ alpha 通道，新图像也应当包含 alpha 通道。\n\n```\nlet colorSpace = CGColorSpaceCreateDeviceRGB()\n\
  let bytesPerPixel = 4\nlet bytesPerRow = bytesPerPixel * originalCGImage.width\n\
  let bytesPerRowMask = bytesPerPixel * maskCGImage.width\nlet bitsPerComponent =\
  \ 8\nlet bitmapInfo: UInt32 = CGImageAlphaInfo.premultipliedLast.rawValue\n```\n\
  \n最复杂的部分是*预乘 alpha*。这是什么意思？在具有预乘 alpha 的图像或*预乘图像*中，每个像素的所有分量都乘以该像素的 alpha 值。这是视频加速的工作方式。\n\
  \n**注意**\n\n\n\n非透明像素的值与无 alpha 通道的像素相同，范围为 0 到 255。完全透明的像素四个分量均为 0。\n\n下一步是为图像和蒙版分别创建上下文和原始指针。\n\
  \n```\nguard let context = CGContext(data: nil, width: originalCGImage.width, height:\
  \ originalCGImage.height, bitsPerComponent: bitsPerComponent, bytesPerRow: bytesPerRow,\
  \ space: colorSpace, bitmapInfo: bitmapInfo),\nlet ptr = context.data?.assumingMemoryBound(to:\
  \ UInt8.self) else {\nreturn nil\n}\nguard let contextMask = CGContext(data: nil,\
  \ width: maskCGImage.width, height: maskCGImage.height, bitsPerComponent: bitsPerComponent,\
  \ bytesPerRow: bytesPerRowMask, space: colorSpace, bitmapInfo: bitmapInfo),\nlet\
  \ ptrMask = contextMask.data?.assumingMemoryBound(to: UInt8.self) else {\nreturn\
  \ nil\n}\n```\n\n`ptr` 和 `ptrMask` 的类型均为 `UnsafeMutablePointer<UInt8>`。如果你熟悉 C 语言家族（包括\
  \ Objective-C），这等同于 `unsigned char *`，可以像数组一样通过索引访问。\n\n由于两个上下文均以 `nil` 初始化，我们需要在这些上下文中绘制原始图像和蒙版：\n\
  \n```\ncontext.draw(originalCGImage, in: CGRect(x: 0, y: 0, width: originalCGImage.width,\
  \ height: originalCGImage.height))\ncontextMask.draw(maskCGImage, in: CGRect(x:\
  \ 0, y: 0, width: maskCGImage.width, height: maskCGImage.height))\n```\n\n然后逐像素应用蒙版：\n\
  \n```\nfor y in 0..<originalCGImage.height {\nlet lineOffset = y * bytesPerRow\n\
  let maskLineOffset = y * bytesPerRowMask\nfor x in 0..<originalCGImage.width {\n\
  let pixelOffset = lineOffset + x * 4\nlet maskPixelOffset = maskLineOffset + x *\
  \ 4\nif x >= maskCGImage.width || y >= maskCGImage.height {\nptr[pixelOffset + 3]\
  \ = 0\n} else {\nptr[pixelOffset + 3] = UInt8((UInt(ptrMask[maskPixelOffset]) +\
  \ UInt(ptrMask[maskPixelOffset + 1]) + UInt(ptrMask[maskPixelOffset])) / 3)\n}\n\
  ptr[pixelOffset] = UInt8(UInt(ptr[pixelOffset]) * UInt(ptr[pixelOffset + 3]) / 255)\n\
  ptr[pixelOffset + 1] = UInt8(UInt(ptr[pixelOffset + 1]) * UInt(ptr[pixelOffset +\
  \ 3]) / 255)\nptr[pixelOffset + 2] = UInt8(UInt(ptr[pixelOffset + 2]) * UInt(ptr[pixelOffset\
  \ + 3]) / 255)\n}\n}\n```\n\n常量 `lineOffset` 和 `maskLineOffset` 表示每行的起始指针。我们可以为每个像素单独计算，但为每行保存它们速度更快。\n\
  \n多次转换为 `UInt` 和 `UInt8` 是计算中的关键部分。我们不能安全地将两个 `UInt8` 变量相加而不冒溢出的风险。在将结果赋值回 `ptr`\
  \ 之前，需要将其转换回 `UInt8`。当然，计算结果应在 0 到 255 范围内。\n\n该算法并非最优，只是一个通用解决方案。针对特定任务，可以按需优化。\n\
  \n## 效果与滤镜\n\n可以直接操作像素缓冲区或图像上下文来应用滤镜，但这并非最高效的方式。现代 iOS 设备拥有性能优异的 GPU，专门用于图像处理。\n\
  \n### CoreImage\n\nApple 提供了 CoreImage 框架，其中包含硬件加速的图像滤镜。配方 5-25 展示了如何对 `UIImage`\
  \ 对象应用高斯模糊：\n\n```\nimport CoreImage\nextension UIImage {\nfunc gaussianBlur(radius:\
  \ CGFloat) -> UIImage? {\nlet ciContext = CIContext(options: nil)\nguard let blurFilter\
  \ = CIFilter(name: \"CIGaussianBlur\") else {\nreturn nil\n}\nblurFilter.setValue(CIImage(image:\
  \ self), forKey: \"inputImage\")\nblurFilter.setValue(radius, forKey: \"inputRadius\"\
  )\nguard let outputImageData = blurFilter.value(forKey: \"outputImage\") as? CIImage,\n\
  let outputImage = ciContext.createCGImage(outputImageData, from: outputImageData.extent)\n\
  else {\nreturn nil\n}\nreturn UIImage(cgImage: outputImage)\n}\n}\nRecipe 5-25\n\
  Gaussian Blur with CoreImage\n```\n\n该框架的问题在于缺乏良好的协议。它使用 `String` 参数来指定滤镜类型和参数，而非预定义的常量、方法和类。\n\
  \n### GPUImage\n\nGPUImage 框架是一个开源的库，托管在 GitHub 上。该框架的第一代于 2013 年用 Objective-C 编写，更新的版本是\
  \ GPUImage2 和 GPUImage3，它们具有相似的接口，区别在于 Swift 版本。\n\n要添加该框架，请访问 Brad Larson 的 GitHub\
  \ 账户上的仓库：[`https://github.com/BradLarson`](https://github.com/BradLarson)。该账户下的仓库包含所有必要的文档。\n\
  \n注意\n\nGPUImage2 和 GPUImage3 不能通过 CocoaPods 获取。你可以使用 Swift Package Manager 替代。\n\
  \n使用 GPUImage，你可以获得 CoreImage 功能的便捷快捷方式，以及额外的滤镜和效果。配方 5-26 展示了如何使用 GPUImage 应用相同的高斯模糊：\n\
  \n```\nimport GPUImage\nextension UIImage {\nfunc gaussianBlurGPU(radius: CGFloat)\
  \ -> UIImage? {\nlet blurFilter = GPUImageGaussianBlurFilter()\nblurFilter.blurRadiusInPixels\
  \ = radius\nreturn blurFilter.image(byFilteringImage: self)\n}\n}\nRecipe 5-26\n\
  Gaussian Blur with GPUImage\n```\n\n## GIF 动画\n\nGIF 动画出现于 1987 年，但现在它们比以往任何时候都更流行。但它们有两个严重的限制：\n\
  \n*   它们使用索引颜色。每个 GIF 文件包含一个最多 256 种颜色的调色板。它可以重复使用相同颜色，但同一张图片中不能使用更多颜色。\n*   GIF\
  \ 不支持半透明像素。如果在另一张图片上显示 GIF 图片或动画，将会有明显的锐利边缘。\n\nGIF 适用于小型动画，而非剪辑或电影。\n\niOS 并不能直接播放\
  \ GIF 动画。你需要编写一些代码或使用相应的库。\n\n### Kingfisher 中的 AnimatedImageView\n\nKingfisher\
  \ 是一个流行的用于从网络下载图片的框架。它集成了缓存系统，提供实时图像处理和即用的视图。\n\n要使用 Swift Package Manager 添加 Kingfisher，请添加以下链接：[`https://github.com/onevcat/Kingfisher`](https://github.com/onevcat/Kingfisher)\n\
  \n也有对应的 CocoaPods pod。如果你更倾向于使用 CocoaPods，请添加以下行：\n\n```\npod 'Kingfisher'\n```\n\
  \n其中一个视图是 `AnimatedImageView`。它是 `UIImageView` 的子类，使用起来非常方便。你可以在 `AnimatedImageView`\
  \ 中本地使用或加载远程 GIF 文件。配方 5-27 展示了如何以编程方式创建它，并循环播放在线 GIF。\n\n```\nimport Kingfisher\n\
  func createAndPlayAnimatedImageView(parentView: UIView, gifURL: URL, delegate: AnimatedImageViewDelegate?)\
  \ {\nlet animatedImageView = AnimatedImageView(frame: parentView.bounds)\nanimatedImageView.delegate\
  \ = delegate\nanimatedImageView.kf.setImage(with: gifURL, placeholder: nil, options:\
  \ nil) { result in\nswitch result {\ncase .success:\nanimatedImageView.startAnimating()\n\
  case .failure(let error):\nprint(error.localizedDescription)\n}\n}\nparentView.addSubview(animatedImageView)\n\
  }\nRecipe 5-27\nUsing AnimatedImageView\n```\n\n注意\n\n如果你在生产环境中使用此代码，请勿忘记考虑可能的布局变化。\n\
  \n\n\n### SwiftyGif\n\nSwiftyGif 是一个专用于播放 GIF 动画的框架，其最大优势在于能在标准的 `UIImageView` 中运行。它既支持本地\
  \ GIF 文件，也支持远程 GIF 文件。\n\n要使用 Swift Package Manager 将 SwiftyGif 添加到你的项目中，请添加以下链接：[`https://github.com/kirualex/SwiftyGif`](https://github.com/kirualex/SwiftyGif)。\n\
  \n如果使用 CocoaPods 添加，请修改你的 Podfile：\n\n```\npod 'SwiftyGif'\n```\n\n配方 5-28 和 5-29\
  \ 展示了如何重复之前的配方，但这次使用 SwiftyGif 代替 Kingfisher。\n\n```\nimport SwiftyGif\nfunc createAndPlaySwiftyGif(parentView:\
  \ UIView, gifURL: URL, delegate: SwiftyGifDelegate?) {\nlet imageview = UIImageView(gifURL:\
  \ gifURL, manager: .defaultManager, loopCount: -1)\nimageview.frame = parentView.bounds\n\
  imageview.delegate = delegate\nparentView.addSubview(imageview)\n}\n配方 5-28\n使用\
  \ SwiftyGif 加载远程 GIF\n```\n\nSwiftyGif 的另一个优势是从应用程序包中加载动画的能力。\n\n```\nimport SwiftyGif\n\
  func loadLocalGif(name: String, into imageView: UIImageView) {\nif let gifImage\
  \ = try? UIImage(gifName: name) {\nimageView.setGifImage(gifImage)\n}\n}\n配方 5-29\n\
  从应用程序包加载 GIF\n```\n\n加载后，动画可以通过 `UIImageView` 的方法进行控制：\n\n```\nimageView.startAnimatingGif()\n\
  imageView.stopAnimatingGif()\nimageView.showFrameAtIndexDelta(delta: Int)\nimageView.showFrameAtIndex(index:\
  \ Int)\n```\n\n## 总结\n\n图像以各种方式存在于所有 iOS 应用中。有时只是简单地显示捆绑的图片，有时则需要加载和处理。在本章中，我们讨论了图像的不同表现方式：在\
  \ UIKit 中、在内存中以及在文件系统中。我们探讨了如何从网络加载图像，包括使用外部库和不使用外部库的方法，并关注了作为此机制一部分的缓存。我们对图像进行了放大和缩小以获得所需尺寸，更改了几何形状，并对现有图像进行了处理。我们回顾了诸如高斯模糊等简单效果。最后，我们研究了更复杂的图像显示场景——显示动画。在下一章中，我们将继续讨论\
  \ UIKit，特别是文本编辑。\n\n"
- '# 6. 文本编辑


  iOS 开发的另一个重要方面是文本编辑。在移动平台上，添加文本输入尤其困难，因为存在以下几个复杂因素：


  *   当你进入 `UITextField` 时，屏幕键盘会弹出。它可能会遮挡其他 UI 元素，甚至文本输入框本身。

  *   屏幕键盘不会自动消失。在某些情况下，它可能会跟随你进入另一个屏幕。

  *   屏幕键盘在不同设备上有不同的高度。即使你知道了所有现有型号的尺寸，新的 iPhone 或 iPad 也终将出现，而它们的键盘高度可能不同。

  *   物理键盘可以连接到 iOS 设备。除了 iPad 的专用键盘外，任何蓝牙键盘都可以连接到这些设备。当连接了物理键盘时，屏幕键盘不会出现。

  *   即使设置了键盘类型，也不能保证用户不会输入一个*不允许*的符号。


  除了这些移动设备特有的问题，我们还面临着所有允许用户输入的应用所共有的问题：


  *   我们可能需要以特定方式格式化文本，例如电话号码或信用卡号。

  *   我们通常需要浮动文本，它会跟随你的输入。或者需要前缀。这在需要输入金额时尤其常见。它可能同时需要格式化和带有货币符号的浮动文本。


  我们将在本章中讨论所有这些问题及其解决方案。作为额外内容，我们将创建一个密码输入板，一个包含四个数字文本输入框的 UI 组件。


  *准备好了吗？打开 Xcode。开始！*


  ## 实时分析用户输入


  许多初学者开发者不理解如何实时处理文本输入。`UITextFieldDelegate` 代理协议包含许多有用的函数，但并没有类似 `whatUserJustTyped`
  或 `afterThisInputTextWillBeLikeThis` 这样的方法。


  为什么我们需要这个？毕竟，我们总是可以捕捉到用户结束编辑的时刻，或者在用户点击某个按钮时访问 `UITextField` 的 text 属性。尽管这没错，但现代应用已不像
  1990 年代的网页表单——它们是交互式的，能跟随你的操作并相应地调整 UI。以下是几个例子：


  *   如果你可以通过手机号码或电子邮件地址登录，文本输入框可以在识别出你正在输入什么后改变其格式。应用还可以更改周围的文本和图标。

  *   当用户输入银行卡号时，在输入前几位数字后显示卡组织（Visa、MasterCard 或其他）的徽标是一个好做法。有些应用甚至能显示发卡银行的徽标。当你使用这样的应用时，你会感到更加自信，并觉得方向正确。

  *   当用户填写表单并出错时，应用通常会高亮显示有问题的字段。当用户开始输入时，应用应移除警告或错误提示。

  *   当用户输入正确的电话号码、银行账号、纳税人识别号或其他任何可以验证的数据时，某些应用会显示成功图标和/或将焦点移到下一个输入框。

  *   密码输入板。我们稍后会讨论，但密码输入板需要实时输入处理。


  对我们来说，关键函数是：


  ```

  optional func textField(_ textField: UITextField,

  shouldChangeCharactersIn range: NSRange,

  replacementString string: String) -> Bool

  ```


  看起来有点复杂，但这个回调函数功能极其强大。它提供了我们所需的所有信息：


  *   `textField` 是发生编辑的 `UITextField` 对象（或 `UITextField` 的子类）。

  *   `range` 显示从文本输入中*移除*的符号范围。如果其长度为零，则仅是插入位置。

  *   `string` 包含新的字符。如果用户点击了屏幕键盘上的一个键，它可能是一个字符；如果用户从剪贴板粘贴了文本，则可能是一个完整的文本字符串。


  *方法*返回一个布尔值。如果返回 `true`，则“替换”（或插入）将发生；否则，输入将被阻止。


  缺少两个部分：


  *   更改前的文本

  *   更改后的文本


  *更改前的文本* 很简单，就是 `textField.text`。*更改后的文本* 则需要某种“计算”（*配方* *6-1* *）*。


  ```

