  \n```\npod 'libPhoneNumber-iOS'\n```\n\n让我们逐行分析一下。\n\n在你的 UI 文件（storyboard 或 xib）中，添加一个国家选择器和一个`UITextField`。国家选择器通常是一个包含旗帜、国家名称或代码的列表。更改国家应更改`countryId`变量。我们将其留在此范围之外讨论。`UITextField`应有一个`@IBOutlet`，并将视图控制器作为其委托。\n\
