    ### 生成配置文件


    在设备上直接运行应用前的最后一步，是生成配置文件。


    配置文件是一个连接前述所有三个步骤的文件：


    > - 签名证书

    > - 设备 UDID

    > - App ID/包标识符


    选中 `Provisioning` 菜单选项后，你将创建一个可用于调试 *Birthday Reminder* 的配置文件。你需要执行以下步骤（参见图 2-14）：


    > 1. 点击 `New Profile` 按钮。

    > 2. 将配置文件命名为 `Birthday Reminder Developer`。

    > 3. 选择你的开发证书。

    > 4. 从下拉菜单中选择 `BirthdayReminder`。

    > 5. 选择你在上一步中添加的所有设备。


    将来，每当你创建新应用时，都需要为应用的开发创建新的 App ID 和新的配置文件，但无需生成新的签名证书。


    ![Image](img/9781430243748_Fig02-14.jpg)


    **图 2-14.** 为 *Birthday Reminder* 开发生成配置文件


    默认情况下，`iOS Provisioning Portal` 显示的是*开发*配置文件（参见图 2-15）。


    ![Image](img/9781430243748_Fig02-15.jpg)


    **图 2-15.** 生成的配置文件


    如果新配置文件最初显示为 `Pending`，只需刷新页面几次，直到显示为可下载状态即可。


    你会注意到，在图 2-15 中的 `Provisioning Portal` 里，我还有一个名为 `iOS Team Provisioning Profile`
    的开发者配置文件。这是 Xcode 自动为我创建的通用配置文件。一旦你开始使用 Xcode 的 Organizer，系统会提示你登录 Apple Developer
    账户。之后，Xcode 会询问你是否希望它创建一个团队配置文件。我建议你这样做。团队配置文件由 Xcode 管理。每次你将新开发设备连接到 Mac 时，Xcode
    的 Organizer 会自动将设备 UDID 添加到你的 `Provisioning Portal` 和团队配置文件中。这意味着你无需为每个应用单独创建开发配置文件，就能直接从
    Xcode 在开发设备上快速构建和运行 iOS 测试项目。这是 Xcode 4 中一个非常实用的功能。


    生成的配置文件是一个文件，你将其下载到 Mac 上，双击即可自动安装。安装过程会打开 Xcode。切换到 Xcode 的 Organizer 窗口（`Window`
    > `Organizer` 或 ``![Image](img/U002.jpg)![Image](img/U003.jpg)`2``），然后在左侧栏的 `Library`
    下选择 `Provisioning Profiles`，应能显示你新安装的开发配置文件（参见图 2-16）。


    ![Image](img/9781430243748_Fig02-16.jpg)


    **图 2-16.** Xcode 的 Organizer 窗口中已安装的 *Birthday Reminder* 配置文件


    现在你已经创建了开发配置文件，在下一章中就可以在 iPhone 上运行 *Birthday Reminder* 了。该配置文件只允许 *Birthday Reminder*
    在你已添加并通过 `iOS Provisioning Portal` 关联到配置文件的设备上运行。


    如果你购买了另一台 iPhone，需要注意的是，这个生成的配置文件不允许 *Birthday Reminder* 在新设备上运行。同样，除非你已将朋友的 UDID
    添加到 `iOS Provisioning Portal` 中，否则 *Birthday Reminder* 也无法在他朋友的 iPhone 上运行。


    向已安装的配置文件中添加新设备，你需要：


    > 1. 通过 `iOS Provisioning Portal` 编辑和修改配置文件。

    > 2. 将更新后的配置文件下载到 Mac 上。

    > 3. *在*双击安装之前，先在 Xcode 的 Organizer 中删除过时的配置文件。

    > 4. 双击新下载的配置文件以自动安装。


    至此，如果你正在创建一个计划通过 App Store 分发或给 Beta 测试者测试的应用，那么为你的应用再重复生成两个额外的配置文件，将为你将来节省时间：


    > - Ad Hoc 配置文件

    > - App Store 配置文件（应用提交流程参见第 14 章）


    ### Ad Hoc 分发


    Ad Hoc 分发的目的是在开发过程中构建应用的内部发布版本。例如，如果你将应用分发给 Beta 测试者，那么你可以根据 Ad Hoc 配置文件来生成这些
    Beta 版本。


    你仍然需要添加所有希望参与 Beta 测试的设备的 UDID。在 `iOS Provisioning Portal` 中，你最多拥有 100 个设备名额。


    ### 总结


    如果你已经跟上了本章中配置的复杂流程，那么请为自己鼓掌！这个过程在刚起步时确实有些麻烦。


    但我向你保证，这是值得的。现在我们已经准备好开始使用 Xcode 了。那么，让我们从设置项目开始吧。


    ![Image](img/ch.jpg)


    ## 第 3 章


    ## 设置我们的 Xcode 项目


    欢迎使用 Xcode！是时候动手实践了。


    到目前为止，我们还没有犯过任何会搞砸应用的错误。让我们努力保持这个状态吧！


    在本章中，你将熟悉如何与 Xcode 协作。你将直接上手，为你的 *Birthday Reminder* 应用创建一个新的 iOS 项目。我会教你如何嵌入和指定图标，以及为应用设置启动画面。到了上午结束时，我们将探讨如何将你的项目部署和调试为一个可在
    iPhone 或 iPod Touch 上运行的应用。

