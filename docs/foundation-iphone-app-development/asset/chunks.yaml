    Now to finish the `didTapPhoto:` method:


    `- (IBAction)didTapPhoto:(id)sender {`

    `    NSLog(@"Did Tap Photo!");`

    **`    if (![UIImagePickerController`**

    **`isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]) {`**

    **`        NSLog(@"No camera detected!");`**

    **`        return;`**

    **`    }`**


    **`    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:nil delegate:self`**

    **`cancelButtonTitle:@"Cancel" destructiveButtonTitle:nil otherButtonTitles:@"Take
    a`**

    **`Photo",@"Pick from Photo Library", nil];`**

    **`    [actionSheet showInView:self.view];`**

    `}`


    Build and run. Do you get the resulting action menu displayed in [Figure 6-20](#Chapter06.html#fig_6_20)?
    No? Are you running it on the iOS simulator? You are? Well, that’s the reason
    then. The iOS simulator doesn’t have a camera, so it gets caught by our conditional
    statement; that is, no camera source type is available, so don’t give the user
