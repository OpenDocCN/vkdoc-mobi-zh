  trans: '

    ### 多视图应用


    到目前为止，我们在*生日提醒*和二十一点应用中都只包含了一个视图和一个视图控制器。对于某些应用，例如简单的游戏，单个视图就足够了。然而，多视图应用能够通过小屏幕设备以清晰且结构化的形式向用户呈现大量内容。


    *生日提醒*就是一个多视图应用。我们模型中的每个生日对象都包含姓名、出生日期、个人资料照片、礼物备注，以及指向 Facebook 用户详细信息的链接，或从原生通讯录导入的电话和电子邮件详细信息。对于可能数百个生日来说，要在单个视图中清晰显示如此多的数据，工作量巨大！通过在首页视图上创建多视图应用，我们的用户将只看到每个已存储生日的摘要信息，例如一张小尺寸个人资料照片、姓名以及距离每个生日的天数。当用户点击某个特定的生日时，它会在导航中深入一层，显示生日详情视图，其中包含一张更大的个人资料照片以及关于我们的朋友及其生日的完整详细信息（参见图
    5-1）。


    ![图片](img/9781430243748_Fig05-01.jpg)


    **图 5-1.** 多视图应用非常适合在小屏幕设备上呈现大量内容。


    在本书的剩余部分，我们将继续开发我们的主要*生日提醒*应用。请打开你在第 3 章中构建的*生日提醒* Xcode 项目。或者，打开本章的起始源代码。


    *注意：如果你决定在书中的任何时刻从源代码开始工作，请务必将 `Info.plist` 中的包标识符从 `com.apress.BirthdayReminder`
    更新为 `com.yourdomain.BirthdayReminder`。*


    ### 掌握视图和视图控制器


    在本章的前半部分，我将带你了解视图和视图控制器的基础知识。通过使用故事板，你将学会在应用的不同屏幕之间构建导航层级结构是多么容易。你还将理解视图的生命周期，以及何时何地向视图控制器添加代码以响应用户在你的应用中的导航操作。


    打开你的*生日提醒*项目后，首先删除之前在 Hello World 示例中添加到主视图的任何标签或其他子视图。


    #### 添加导航控制器


    为了添加生日详情场景，我们首先要在故事板中添加一个导航控制器实例。导航控制器管理多个视图控制器的深入堆栈。当一个新视图控制器被推入导航控制器堆栈时，导航控制器会将当前视图以动画方式移出屏幕左侧，并从右侧滑入新视图。


    目前，我们的故事板中只有一个视图控制器和一个视图。我希望你选择视图控制器，而不是视图。为此，请点击视图下方和左侧的橙色圆形图标（参见图 5-2）。


    ![图片](img/9781430243748_Fig05-02.jpg)


    **图 5-2.** 选择视图控制器


    在故事板中选中视图控制器后，从 Xcode 的菜单栏添加一个新的父导航控制器就很简单了：Editor ![图片](img/U001.jpg) Embed In
    ![图片](img/U001.jpg) Navigation Controller。结果应类似于图 5-3。


    ![图片](img/9781430243748_Fig05-03.jpg)


    **图 5-3.** 嵌入在导航控制器中的视图控制器


    一旦嵌入到导航控制器中，视图控制器就会从其新的父容器视图控制器继承一个导航栏。双击视图控制器的模拟导航栏，输入导航标题 **Birthdays**（参见图
    5-3）。


    #### 故事板场景和根视图控制器


    iOS 应用中的每个主视图或屏幕通常由 Apple 的 `UIViewController` 类的一个实例拥有和管理。为了创建我们的多视图应用，我们将向故事板添加额外的视图控制器，每个控制器将管理自己的视图。视图和视图控制器的组合在故事板术语中被称为*场景*。


    你的应用所呈现的第一个视图控制器被称为*根视图控制器*。你注意到我们故事板中的新导航控制器左侧有一个指向它的箭头吗？这是 Xcode 指示此视图控制器为根视图控制器的方式。请务必不要从故事板中删除根视图控制器，否则
    Xcode 的编译器将无法再解析你的故事板。![图片](img/smile.jpg)


    尽管我们的首页视图控制器现在已嵌入导航控制器中，但我们的应用中仍然只有一个场景，尽管它带有导航栏。现在我们要向故事板添加第二个场景，它最终将成为生日详情视图。我们通过将新的视图控制器实例从对象库拖放到故事板上来添加新场景。我发现将故事板稍微缩小一些会更方便操作。为此，点击故事板上的减号放大镜按钮一次（编辑器窗格的右下角）。然后从对象库中拖放一个新的视图控制器（`UIViewController`）实例到故事板上（参见图
    5-4）。


    ![图片](img/9781430243748_Fig05-04.jpg)


    **图 5-4.** 添加新的视图控制器场景


    你注意到新的视图控制器没有像我们的第一个视图控制器那样添加导航栏吗？那是因为我们还没有将它连接到我们的导航控制器。除了在视图切换时，导航控制器一次只显示其堆栈中的一个视图控制器：即位于顶部的那个。要将我们的新视图控制器推入导航控制器，我们需要创建一个*转场*连接。


    #### 通过转场推入视图控制器


    转场或 `UIStoryboardSegue` 是一个定义从一个视图控制器到另一个视图控制器的视觉过渡的对象。在你的第一个视图控制器上添加一个按钮，将其命名为
    Push Birthday Detail View Controller（嗯，挺朗朗上口的！），然后通过按住 Control 键从该按钮拖拽到第二个视图控制器，创建一个从按钮到第二个视图控制器的转场（参见图
    5-5）。


    ![图片](img/9781430243748_Fig05-05.jpg)


    **图 5-5.** Control-拖拽以创建转场


    一个上下文菜单会向你显示三种类型的转场：Push、Modal 和 Custom。选择 Push。Xcode 会自动将继承自我们导航控制器的导航栏添加到新的视图控制器，并显示一个指向第一个和第二个视图控制器之间的箭头，以指示新的转场连接（参见图
    5-6）。


    ![图片](img/9781430243748_Fig05-06.jpg)


    **图 5-6.** 新的转场连接


    为第二个视图控制器添加标题：Birthday Detail。构建并运行你的应用。你应该能够使用第一个控制器上的按钮和第二个控制器上的动态生成的返回按钮，在第一个和第二个视图控制器之间导航。非常简单，对吧？

