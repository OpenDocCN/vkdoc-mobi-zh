    ![Image](images/9781430243748_Fig04-16.jpg)


    **Figure 4-16.** Dissecting BJDGameModel


    *Note**:** You can use the jumpbar to quickly find method and property declarations
    and implementations in the header and source files (see [Figure 4-16](#Chapter04.html#fig_4_16)).*


    There’s one other property in our model: `maxPlayerCards`. As I mentioned earlier
