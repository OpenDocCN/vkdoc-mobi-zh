    \    }\n    else {\n        NSLog(@\"Facebook SSO Authentication Failed: %@\"\
    ,error);\n    }\n}\n}];\n}\n```\n\nIn the code above, ensure that you have replaced\
    \ my Facebook.com app id, `125381334264255`, with your own Facebook.com app id.\n\
    \nApple supports three social network account types natively in iOS 6: Twitter,\
    \ Facebook, and Sina Weibo. In order to check and access any of these social network\
    \ accounts, our code queries the `ACAccountStore`, passing in the social network\
    \ type of the account we’re interested in accessing; in our case, this is an account\
    \ type with the identifier `ACAccountTypeIdentifierFacebook`.\n\nNow that we’ve\
    \ stated that we’re checking for a Facebook account, we also need to let iOS know\
    \ our intentions for the data we’re requesting access to. With Facebook, we need\
    \ to pass in an options dictionary that includes the Facebook.com app ID and the\
    \ Facebook permissions that we require access to. For certain Facebook features,\
    \ it’s mandatory to specify an array of *extended permissions*: retrieving friends’\
    \ birthdays requires the `friends_birthday` permission. For the full list of extended\
    \ permissions, visit the following web page: [`http://developers.facebook.com/docs/reference/api/permissions/`](http://developers.facebook.com/docs/reference/api/permissions/).\n\
    \nThe `ACAccountStore` method `requestAccessToAccountsWithType:` requires us to\
    \ pass in a completion block of code that is invoked when the user taps either\
    \ Don’t Allow or OK in response to the account access request.\n\nLet’s now begin\
    \ implementing `fetchFacebookBirthdays` in `BRDModel.m`:\n\n```objectivec\n- (void)fetchFacebookBirthdays\n\
    {\n    NSLog(@\"fetchFacebookBirthdays\");\n    if (self.facebookAccount == nil)\
    \ {\n        self.currentFacebookAction = FacebookActionGetFriendsBirthdays;\n\
    \        [self authenticateWithFacebook];\n        return;\n    }\n    //We've\
    \ got an authenticated Facebook Account if the code executes here\n}\n```\n\n\
    Our Facebook import view controller shouldn’t need to know anything about the\
    \ authorization process; it just needs to know which birthdays to import and when\
    \ that list updates. Each time the Facebook import view controller appears, we’ll\
    \ set it up to call `fetchFacebookBirthdays` on the model which, in turn, first\
    \ checks if a `self.facebookAccount` exists (has been authorized by the user already).\
    \ If it doesn’t, then at this point, our model will start the single sign-on process\
    \ by executing the `authenticateWithFacebook` method we’ve just written.\n\nOpen\
    \ `BRImportFacebookViewController.m`, import `BRDModel`, and let’s add the `fetchFacebookBirthdays`\
    \ method call when the Facebook import view has appeared, as follows:\n\n```objectivec\n\
    #import \"BRImportFacebookViewController.h\"\n#import \"BRDModel.h\"\n@interface\
    \ BRImportFacebookViewController ()\n\n@end\n\n@implementation BRImportFacebookViewController\n\
    \n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [[BRDModel sharedInstance] fetchFacebookBirthdays];\n}\n\n@end\n```\n\nTry\
    \ a build and run. Tap the Facebook button. As long as you have a Facebook account\
    \ associated to your device or the simulator, then you should see a data privacy\
    \ alert, as shown in [Figure 11-7](#Chapter11.html#fig_11_7).\n\n![Image](images/9781430243748_Fig11-07.jpg)\n\
    \n**Figure 11-7.** Apple’s Accounts framework prompts the user to permit access\
    \ to her Facebook account\n\nThe import from Facebook view controller calls the\
    \ model’s `fetchFacebookBirthdays` method as it appears. `BRDModel.m` checks for\
    \ the existence of its private `facebookAccount` property, and if it’s not set,\
    \ then it calls the `authenticateWithFacebook` method we wrote earlier.\n\nClicking\
    \ OK in the Permissions Alert view triggers the completion block of code in the\
    \ `authenticateWithFacebook` method to run, which stores `facebookAccount` in\
    \ the model, and then recalls `fetchFacebookBirthdays` so that our code to fetch\
    \ the Facebook birthdays can now run with authorization. We haven’t yet written\
    \ the birthday fetching code, so let’s get to that now."
