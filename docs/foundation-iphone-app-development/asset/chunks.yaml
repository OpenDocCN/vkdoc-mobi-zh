  trans: "\n#### 用户默认设置：iOS 的 Cookies\n\n在 iOS 中存储偏好设置数据的最简单方法是使用苹果的 `NSUserDefaults`\
    \ 类。它相当于 iOS 中的 HTML Cookies。我们可以使用 `NSUserDefaults` 存储字符串和数字等数据对象类型。保存字符串的语法如下所示：\n\
    \n```\nNSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    [userDefaults setObject:@\"Nick Kuh\" forKey:@\"name\"];\n[userDefaults synchronize];\n\
    ```\n\n调用 `synchronize` 会将你的更改写入磁盘，因此如果你要保存多个属性，可以在设置完所有键值后再调用 `synchronize`。\n\
    \n要访问并检查保存到 `NSUserDefaults` 中的属性，上述示例的代码如下：\n\n```\nNSUserDefaults *userDefaults\
    \ = [NSUserDefaults standardUserDefaults];\nNSString *name = [userDefaults objectForKey:@\"\
    name\"];\nif (name == nil) {\n    NSLog(@\"没有保存过名字\");\n}\nelse {\n    NSLog(@\"\
    已保存的名字: %@\",name);\n}\n```\n\n接下来，让我们创建新的设置单例类，并将这个逻辑应用到我们的应用程序中。在 Xcode 项目的\
    \ *data* 组中，创建一个名为 `BRDSettings` 的 `NSObject` 子类。我们先从头文件开始：\n\n```\n#import <Foundation/Foundation.h>\n\
    \ntypedef enum : int {\n    BRDaysBeforeTypeOnBirthday = 0,\n    BRDaysBeforeTypeOneDay,\n\
    \    BRDaysBeforeTypeTwoDays,\n    BRDaysBeforeTypeThreeDays,\n    BRDaysBeforeTypeFiveDays,\n\
    \    BRDaysBeforeTypeOneWeek,\n    BRDaysBeforeTypeTwoWeeks,\n    BRDaysBeforeTypeThreeWeeks\n\
    }BRDaysBeforeType;\n\n#import <Foundation/Foundation.h>\n\n@interface BRDSettings\
    \ : NSObject\n\n+ (BRDSettings*)sharedInstance;\n\n@property (nonatomic) int notificationHour;\n\
    @property (nonatomic) int notificationMinute;\n@property (nonatomic) BRDaysBeforeType\
    \ daysBefore;\n\n-(NSString *) titleForNotificationTime;\n-(NSString *) titleForDaysBefore:(BRDaysBeforeType)daysBefore;\n\
    \n@end\n```\n\n就像 `BRDModel` 一样，我们将通过 `sharedInstance` 类方法提供对 `BRDSettings` 单例实例的访问。通知的小时和分钟以整数形式返回：在设置数据类的实现中，我们将检查用户是否之前设置了提醒的小时/分钟通知时间，如果没有，则返回一个默认时间——也许是上午\
    \ 9:00？\n\n我们将为用户提供一组“提前天数”选项，范围从生日当天提醒到每个生日前三周提醒。我们创建了一个自定义枚举类型，用于提供这个范围内的不同选项，而无需创建从\
    \ 0 到 21 天的选项，那样在应用中会显得杂乱。`titleForDaysBefore:` 方法会为每个选项返回一个人类可读的字符串，例如“生日当天”或“提前\
    \ 3 周”。\n\n切换到 `BRDSettings.m` 源文件，并添加我们在头文件中声明的方法和属性的实现：\n\n```\n#import \"BRDSettings.h\"\
    \n\n@implementation BRDSettings\n\nstatic BRDSettings *_sharedInstance = nil;\n\
    static NSDateFormatter *dateFormatter;\n\n@synthesize notificationHour;\n@synthesize\
    \ notificationMinute;\n\n//单例实例的访问方法\n+ (BRDSettings*)sharedInstance {\n    if(\
    \ !_sharedInstance ) {\n        _sharedInstance = [[BRDSettings alloc] init];\n\
    \    }\n    return _sharedInstance;\n}\n\n-(int) notificationHour\n{\n    //检查用户是否保存了通知小时数——如果没有，则默认为上午\
    \ 9 点\n    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    \    NSNumber *hour = [userDefaults objectForKey:@\"notificationHour\"];\n   \
    \ if (hour == nil) {\n        return 9;\n    }\n    return [hour intValue];\n\
    }\n\n-(void) setNotificationHour:(int)notificationHourNew\n{\n    NSUserDefaults\
    \ *userDefaults = [NSUserDefaults standardUserDefaults];\n    [userDefaults setObject:[NSNumber\
    \ numberWithInt:notificationHourNew] forKey:@\"notificationHour\"];\n    [userDefaults\
    \ synchronize];\n}\n```\n"
