  trans: '

    ### App Store 标题


    已注册的 Apple 开发者（参见第 2 章）通过 `iTunes Connect` 网站（参见第 14 章）向 App Store 提交应用。如果标题已被占用，`iTunes
    Connect` 将不允许你为应用设置该 App Store 标题。你会看到有些开发者通过添加“+”或“Pro”或其他后缀来（大致）获得他们想要的 App
    Store 标题。


    不要将你的 App Store 标题与*Bundle 显示名称*混淆，后者是你的应用在 iPhone 主屏幕上的标题。两者截然不同。显示名称在你的应用 bundle
    的 `Info.plist`（参见第 3 章）中设置，且长度限制在约 12 个字符，超出部分会被截断。


    与你的图标一样，App Store 标题将是应用销售/下载的主要切入点。潜在用户在浏览一排排的竞品应用时，只能看到你的图标和 App Store 标题的前几个词。


    避免 App Store 标题过于晦涩。你应该包含你希望用户搜索并找到你的应用的关键词。App Store 的搜索算法非常重视应用标题中的词语。除非你已在
    iTunes 之外建立了强大的品牌，否则你需要非常谨慎地选择标题中的词语。


    标题中词语的顺序同样重要。在 iOS 6 中，当在 iPhone 上浏览时，你的标题大约有 40 个字符的空间，超过后 App Store 会截断标题。对于仍在使用
    iOS 5 的用户，App Store 标题限制为单行，并在约 18 个字符后截断。充分利用这些字符！确保标题的前一两个词与你的图标结合，能够准确传达你的应用功能。


    不要回避在 App Store 标题中使用其他相关关键词；例如，*Portfolio Pro for iPad — 可定制的照片和视频应用*。在标题中包含副标题可以提高你在相关
    App Store 搜索中出现的机会。


    我当初在构建 *Birthday Reminder for Facebook* 这个应用的第一个版本时，很幸运地抢到了这个标题。Facebook 用户在 App
    Store 中是一个庞大的市场。他们每次使用该应用在好友的墙上发布生日祝福时，都会帮助推广它。瞄准这些用户是非常值得的。


    ### 图标设计


    或许你在制作 iPhone 应用方面是个多面手。你既能编写优秀的面相对象代码，又拥有设计精美用户界面的艺术眼光。那你可太幸运了！


    对于我们大多数人来说，只能擅长其中一项。本书面向开发者，所以给个实用小提示：如果你想把应用的设计工作外包给一位才华横溢的 iOS 设计大师，我强烈推荐从 `www.dribbble.com`
    开始。Dribbble 是一个寻找才华横溢的设计师的绝佳网站。它是一个设计师分享和评论最新作品的社交网站。尝试搜索“iOS”或“iPhone”，浏览相关设计的众多页面。这是发现与你应用创意风格相符的设计师的好方法。


    通过 Dribbble，我找到了《生日提醒》应用图标和用户界面的设计师。


    与你的 App Store 标题一样，你的图标是 iPhone 应用的第一印象。潜在用户会根据图标初步决定是否要进一步了解你的应用。所以，不要等到最后一刻才设计图标——它不是一个事后想法，它和应用本身一样重要！


    新款 iPhone 和 iPod Touch 设备都配备了视网膜显示屏。因此，一个引人注目、设计精美并能充分利用视网膜屏幕上 114×114 像素图标尺寸的图标是必不可少的。


    图 1-1 展示了我们应用的图标。一个设计感强、有趣且色彩丰富，并带有微妙 3D 效果的图标，将使我们在竞品图标中脱颖而出。


    ![图片](img/9781430243748_Fig01-01.jpg)


    **图 1-1.** 《生日提醒》的图标：简洁、色彩丰富且引人注目


    与你的 App Store 标题一样，不要试图把图标设计得过于花哨。重要的是你的潜在用户能够从图标设计中立即理解你的应用是做什么的。我为我们应用的图标选择了生日蛋糕设计，这一设计也延续到了我们应用的用户界面设计中。


    ### 用户界面设计


    与我合作的大多数设计师在为 iOS 应用进行设计时，都使用 Photoshop 作为首选工具。感谢 Teehan+Lax 的才华横溢的团队，设计师们可以访问一个非常实用的
    PSD 文件，该文件将所有原生 iOS 控件模拟成 Photoshop 图层，并整合在一个 iOS GUI（图形用户界面）PSD 文件中。这为 iOS 设计提供了一个理想的起点。该
    PSD 文件可从 `www.teehanlax.com/downloads` 免费下载（参见图 1-2）。


    ![图片](img/9781430243748_Fig01-02.jpg)


    **图 1-2.** Teehan+Lax 制作的 iOS GUI PSD 文件


    #### 视网膜显示屏、状态栏和 iPhone 5


    iPhone 5 之前的 iPhone 屏幕大小为 320×480 *点*。视网膜屏幕和非视网膜屏幕都是如此。点与像素不同。在 Objective-C 中，所有对视图大小或位置的引用都是以点为单位测量的。iPhone
    5 的屏幕是 320×568 点。


    在 iPhone 4 之前，每个点由单个像素组成。然而，在视网膜显示屏上，每个点中挤入了四个像素（2×2 网格），导致 iPhone 4 或 iPhone
    4s 视网膜显示屏的总尺寸为 640×960 像素（参见图 1-3）。iPhone 5 的屏幕则容纳了 640×1136 像素（参见图 1-3）。状态栏高度为
    20 点，因此在视网膜显示屏上高度为 40 像素。


    我建议始终在你的应用设计中包含 iOS 状态栏。默认情况下，应用内会显示状态栏，但开发者可以通过代码或 `Info.plist`（参见第 3 章）隐藏状态栏，让应用全屏显示。除非有非常充分的理由，比如过渡到全屏照片幻灯片放映，否则请避免这样做。


    状态栏为用户提供了宝贵的信息，例如当前的手机信号和互联网信号强度、时间以及剩余电池电量。即使没有状态栏，你的应用视图仍然拥有高达 320×460 点（iPhone
    5 上为 320×548 点！）的屏幕空间——这是黑莓开发者只能梦寐以求的空间！


    ![图片](img/9781430243748_Fig01-03.jpg)


    **图 1-3.** 视网膜显示屏的点与像素

    '
- fmt: '# Paper prototyping: starting with the design


    I strongly recommend completing the design of your app in advance of writing a
    single line of code. I always start with a pencil and paper, sketching out every
    view of the user interface. This method should result in a good, well-thought-out
    design layout for each view in your app, and reduce the risk of future code refactoring.


    Typically, I’ll draw several iterations of each view of my app until I’m happy
    with the layout. Then I’ll photograph the results and e-mail them to my designer
    with detailed instructions to mock up the final designs in Photoshop. The designer
    then creates 640×960 pixel retina-ready PSD files for each view of the app.


    When working with clients, insist that the design be signed off before you start
    coding their app. Clients often fight this requirement, claiming that their app
    is a work in progress, and therefore the design is subject to change. This is
    just bad planning on their part.


    By taking the time to sketch out every screen design before starting code, your
    clients will save you copious amounts of wasted development time—and, therefore,
    wasted budget. They will save money if they invest in good planning!


    It’s amazing how many potential user interface design problems can be solved on
    paper. This process of sketching out screens in advance of code is also known
    as *paper prototyping*. It enables individuals and teams to examine each screen
    and discuss the implications of one type of layout vs. another.


    Designing an intuitive and engaging user interface is a process that this book
    will frequently reference, but if you want to delve in deeper at this stage, then
    who better to learn from than the gurus of user interface design themselves: Apple.


    Let me introduce you to the HIG—Apple’s Human Interface Guidelines, which you
    can read at your leisure on the Apple Developer web site at [`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html).


    The HIG takes you, very clearly, through every aspect of good user interface design
    for iOS apps. Everything from the minimum hit area of a button (44×44 points)
    through every finger gesture (tap, slide, flick, etc.), and exactly how your user
    will expect your app to respond.


    People become very familiar with the way apps and the operating system functions
    on their smartphone. Unexpected user interface behavior results in annoyance from
    our users. It’s not that difficult to keep them happy and enjoy using our app.
    The HIG provides you with everything you need to do just that.


    # A walk-through of app designs


    In order to get you thinking in the terminology of the iOS SDK, I’m going to refer
    to each of the screens in our app as *views*. I’ll go further into the details
    of views and view controllers in [Chapter 3](#Chapter03.html#ch3), but it’s good
    to recognize at this early stage that each screen in our app is a view.


    In iOS, each of our main views has a corresponding view controller class.


    This is our first introduction to Apple’s implementation of the Model-View-Controller
    (MVC) paradigm in the iOS SDK. Don’t worry if you’re already getting confused.
    I’ll be fleshing out more details about views, view controllers, and MVC in iOS
    in [Chapters 4](#Chapter04.html#ch4), [5](#Chapter05.html#ch5), and [6](#Chapter06.html#ch6).


    *Birthday Reminder* will consist of the following main views (each controlled
    by its own view controller):


    > * Home view (birthday listings)

    > * Birthday detail view

    > * Birthday notes view

    > * Add or edit a birthday view

    > * Import from Address Book view

    > * Import from Facebook view

    > * Settings view and subviews


    ## The home view


    When our app first launches, it will have an empty database. There will be no
    birthdays to display. So rather than display an empty birthdays list, we’ll hide
    the table view and render two big call-to-action buttons to encourage the user
    to get started by importing birthdays from their Address Book and from Facebook
    (see [Figure 1-4](#Chapter01.html#fig_1_4)a).


    As soon as one or more birthdays have been added to the app, we’ll show the populated
    table view of birthdays. We’ll still give the user easy access to the Address
    Book and Facebook import buttons, but they will take less prominence in our screen
    design (see [Figure 1-4](#Chapter01.html#fig_1_4)b).


    ![Image](images/9781430243748_Fig01-04.jpg)


    **Figure 1-4.** (**a**) Home view on first launch (**b**) Home view populated
    with birthdays


    Our home view ([Figures 1-4a](#Chapter01.html#fig_1_4) and [1-4b](#Chapter01.html#fig_1_4))
    includes standard control components from the iOS SDK: a navigation bar (`UINavigationBar`),
    labels (`UILabel`), buttons (`UIButton`), a table view (`UITableView`), table
    view cells (`UITableViewCell`), image views (`UIImageView`), a toolbar (`UIToolbar`),
    and bar button items (`UIBarButtonItem`). These are not custom-made components.
    What you’ll notice, however, is the extent to which we can re-skin these standard
    components to make a beautiful user interface design.


    In iOS 5, Apple added Appearance APIs, which have continued to evolve in iOS 6.
    These APIs make skinning Apple’s UI components much easier than with previous
    versions of the iOS SDK. *Birthday Reminder* will exploit these features to full
    effect.


    The design concept of using a birthday cake for our icon is also prominent throughout
    the main views of our app, such as the home view and import birthdays views, where
    each of the birthdays will be represented as a layer of a cake. Each of these
    cake layers will be rendered by a custom-designed table cell (`UITableViewCell`)
    in our app.


    It is common in iPhone apps for the app navigation to be controlled via a special
    type of view controller: a view controller that organizes multiple child view
    controllers. The main examples of these parent view controllers are the navigation
    controller (`UINavigationController`) and the tab bar controllers (`UITabBarController`)
    that control the flow of child views and view controllers in a manageable way
    for a small screen device.


    The navigation bar at the top of our home view is owned by our app’s main navigation
    controller. When populated with birthdays, the home view displays a table view
    with multiple table cells to render the details of each birthday.


    When the user taps one of listed birthdays in the table view, our app will respond
    to the tap gesture and create an instance of the birthday detail view. The birthday
    detail view will be “pushed” onto the main navigation controller. The navigation
    controller will animate the current home view, sliding it off to the left, and
