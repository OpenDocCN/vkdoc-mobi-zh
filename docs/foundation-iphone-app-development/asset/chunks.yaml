  trans: '

    #### 生成证书


    首次访问预置门户的“证书”部分时，你会发现默认情况下没有任何签名证书。你需要生成一个证书，以便在 iPhone 或其他 iOS 设备上调试和安装应用。


    ![Image](img/9781430243748_Fig02-05.jpg)


    **图 2-5.** 生成证书前的预置门户“证书”部分


    要生成证书，首先需要创建一个证书请求文件。该证书请求文件必须通过 Mac 生成。通过“应用程序”>“实用工具”>“钥匙串访问”打开钥匙串访问。在钥匙串访问中，你需要选择“从证书颁发机构请求证书...”菜单选项（参见
    图 2-6）。


    ![Image](img/9781430243748_Fig02-06.jpg)


    **图 2-6.** 在 OS X 上通过钥匙串访问发起证书请求


    钥匙串访问会弹出一个对话框（参见 图 2-7），你需要在其中进行以下操作：


    > 1.  输入你的电子邮件地址。

    > 2.  输入常用名称。你输入的名称会在完成证书生成过程后显示在钥匙串访问中。当你准备将应用提交到 App Store 时，需要重复此证书生成过程，为你的
    App Store 预置创建证书。请选择一个能标识此证书为开发版本的名称。

    > 3.  选择“存储到磁盘”选项。

    > 4.  点击“继续”并将证书请求保存到桌面。


    ![Image](img/9781430243748_Fig02-07.jpg)


    **图 2-7.** 在钥匙串访问中设置开发证书请求的选项


    最终桌面上的证书请求文件名为 `CertificateSigningRequest.certSigningRequest`。这只是一个临时文件，仅用于下一步操作。


    切换回浏览器中的 iOS 预置门户。点击“请求证书”按钮（在浏览器窗口中）后，系统会要求你选择通过钥匙串访问生成的证书请求文件（参见 图 2-8）。


    ![Image](img/9781430243748_Fig02-08.jpg)


    **图 2-8.** 浏览到桌面上的证书请求文件


    提交你的证书请求。恭喜！你刚刚生成了第一个开发证书。现在应该可以在预置门户中看到它列出来了（参见 图 2-9）。


    ![Image](img/9781430243748_Fig02-09.jpg)


    **图 2-9.** 已生成的开发证书


    从预置门户下载证书。双击下载的 `developer_identity.cer` 文件。钥匙串访问会提示你添加证书（参见 图 2-10）。


    ![Image](img/9781430243748_Fig02-10.jpg)


    **图 2-10.** 添加并自动安装下载的证书


    至此，你已经完成了开发的证书生成过程。Xcode 在编译应用的调试版本以在你已在预置门户中注册的设备上运行时，会使用你的开发签名证书。为了构建可以分享给 Beta
    测试者并提交到 App Store 的应用发布版本，你还需要创建一个分发证书。创建过程与创建设开发证书完全相同，不同之处在于你需要先从预置门户“证书”部分选择“分发”标签。趁现在记忆犹新，你可能想立即重复整个证书生成过程来创建分发证书。


    在预置门户的“证书”部分，你会看到 Apple 提供了一个下载 WWDR 中间证书的链接。下载并双击此证书，将其安装到 Mac 的钥匙串中。WWDR（Apple
    Worldwide Developer Relations Certification Authority）证书仅用于确认你的开发或分发配置文件证书是由 Apple
    颁发的。


    #### 添加设备


    每部 iPhone、iPod 和 iPad 都有一个唯一的设备标识符。你需要为每个想在提交到 App Store 之前用于测试应用的设备提供此 UDID。


    将你的 iPhone 连接到 Mac，打开 Xcode 并切换到“管理”窗口（“窗口”>“管理”或 ![Image](img/U002.jpg)![Image](img/U003.jpg)`2`）。在“设备”下，你应该能看到你的
    iPhone 列出。选择你的手机，详细信息视图会显示你的 iPhone 标识符以及其他信息（参见 图 2-11）。UDID 是一个 40 位的字母数字字符串。


    ![Image](img/9781430243748_Fig02-11.jpg)


    **图 2-11.** 通过 Xcode 的管理器访问你的 iPhone UDID


    向预置门户添加设备的过程相当简单。浏览到预置门户的“设备”部分。点击“添加设备”，然后输入你 iPhone 的 UDID。一旦设备保存到预置门户，它就会出现在与你开发者账户关联的设备列表中（参见
    图 2-12）。


    ![Image](img/9781430243748_Fig02-12.jpg)


    **图 2-12.** 添加了一台设备（我的 iPhone）后的预置门户


    *注意：当你的设备通过 USB 连接到 Mac 时，也可以在 iTunes 中访问设备 UDID。不过，在向客户索取 UDID 时，我通常只要求他们下载 App
    Store 中列出的众多免费 UDID 发送应用之一。可以尝试搜索 **UDID**。*


    #### 创建 App ID


    对于你开发的每个应用，只需创建一个 App ID。你会为每个应用创建多个预置配置文件，但只有一个 App ID（参见 图 2-13）。


    ![Image](img/9781430243748_Fig02-13.jpg)


    **图 2-13.** 通过预置门户创建 App ID


    要创建 App ID，我们需要提供以下两项输入：


    > *   *描述*。我输入了 **BirthdayReminder**——你也可以这样做。

    > *   *捆绑标识符*。这必须是一个唯一的字符串，App Store 和 iOS 设备将用它来从成千上万个其他应用中识别你的应用。如 图 2-13 所示，通常提供你网站的反向域名路径，例如
    `com.domainname.BirthdayReminder`。预置门户不允许你使用示例中所示的 `com.apress.BirthdayReminder`，因为该标识符已被我使用！

    > *   在你的捆绑标识符中，更改 `com` 和 `domainname` 占位符，但保留 `BirthdayReminder`（区分大小写）部分。这确保在第
    3 章中，Xcode 能够自动检测到我们应用项目的正确预置配置文件，该文件也名为 `BirthdayReminder`（区分大小写）。

    '
- fmt: '### Generating provisioning profiles


    The final stage of preparation to run our app directly on a device is to generate
    a provisioning profile.


    The provisioning profile is a file that connects all three of the previous steps:


    > - Signing certificate

    > - Device UDID(s)

    > - App ID/bundle identifier


    With the `Provisioning` menu option selected, you’ll create a provisioning profile
    that you can use to debug *Birthday Reminder*. You’ll need to perform the following
    steps (see [Figure 2-14](#Chapter02.html#fig_2_14)):


    > 1. Click the `New Profile` button.

    > 2. Name the profile `Birthday Reminder Developer`.

    > 3. Select your development certificate.

    > 4. Select `BirthdayReminder` from the drop-down menu.

    > 5. Select all of the devices you added in the last step.


    In the future, each time you create a new app, you’ll need to create a new App
    ID and new provisioning profiles for the development of your app. You won’t need
    to generate new signing certificates.


    ![Image](images/9781430243748_Fig02-14.jpg)


    **Figure 2-14.** Generating a provisioning profile for *Birthday Reminder* development


    By default, the `iOS Provisioning Portal` displays the *development* provisioning
    profiles (see [Figure 2-15](#Chapter02.html#fig_2_15)).


    ![Image](images/9781430243748_Fig02-15.jpg)


    **Figure 2-15.** The resulting provisioning profile


    If the new provisioning profile initially displays as `Pending`, simply refresh
    the page a couple of times until it displays as ready for download.


    You’ll note from [Figure 2-15](#Chapter02.html#fig_2_15) that in my `Provisioning
    Portal`, I have a second developer provisioning profile named `iOS Team Provisioning
    Profile`. This is a generic profile that Xcode created automatically for me. Once
    you start using Xcode and Xcode’s Organizer, you’ll be prompted to log in to your
    Apple Developer account. From there, Xcode will ask you if you’d like it to create
    a team provisioning profile. I recommend you do this. The team provisioning profile
    is managed by Xcode. Each time you connect a new development device to your Mac,
    Xcode’s Organizer automatically adds the device UDID to your `Provisioning Portal`
    and to the team provisioning profile. This means you’ll be able to quickly build
    and run test iOS projects from Xcode on your development devices without having
    to create a separate development profile for every app. It’s a handy feature in
    Xcode 4.


    The resulting provisioning profile is a file that you download to your Mac and
    double-click to autoinstall. The installation process opens Xcode. Switching to
    Xcode’s Organizer window (`Window` > `Organizer` or ``![Image](images/U002.jpg)![Image](images/U003.jpg)`2``)
    and selecting `Provisioning Profiles` under `Library` in the left column should
    display your newly installed development provisioning profile (see [Figure 2-16](#Chapter02.html#fig_2_16)).


    ![Image](images/9781430243748_Fig02-16.jpg)


    **Figure 2-16.** Installed *Birthday Reminder* provisioning profile in Xcode’s
    Organizer window


    Now that you’ve created your development provisioning profile, you’ll be able
    to run *Birthday Reminder* on your iPhone in the next chapter. The provisioning
    profile will only permit *Birthday Reminder* to run on devices that you added
    and connected with the profile via the `iOS Provisioning Portal`.


    If you buy another iPhone, it’s important to note that this generated profile
    will not permit *Birthday Reminder* to run on the new device. Likewise, *Birthday
    Reminder* will not run on your friend’s iPhone unless you’ve added his UDID to
    the `iOS Provisioning Portal`.


    Adding new devices to a provisioning profile that you’ve already installed requires
    you to:


    > 1. Edit and modify the provisioning profile via the `iOS Provisioning Portal`.

    > 2. Download the updated profile to your Mac.

    > 3. Delete the out-of-date profile in Xcode’s Organizer *before* double-click
    installing.

    > 4. Double-click the newly downloaded provisioning profile to autoinstall.


    At this point, if you’re creating an app that you plan to distribute via the App
    Store or to beta testers, you will save yourself time in the future by repeating
    the provisioning profile generation process for two additional profiles for your
    app:


    > - the Ad Hoc provisioning profile

    > - the App Store provisioning profile (see [Chapter 14](#Chapter14.html#ch14)
    for the app submission process)


    ### Ad Hoc distribution


    The purpose of Ad Hoc distribution is to build internal release versions of your
    app during development. For example, if you distribute your app to beta testers,
    you’ll generate these beta builds against an Ad Hoc provisioning profile.


    You will still need to add the UDID’s of all the devices that you wish to include
    in beta testing. You have up to 100 device slots within the `iOS Provisioning
    Portal`.


    ### Summary


    If you’ve kept up with the complex process of provisioning throughout this chapter,
    then pat yourself on the back! This process is a bit of a pain when you’re starting
    out.


    I assure you it’s worth it. We’re now ready to roll with Xcode. So let’s start
    by setting up our project.


    ![Image](images/ch.jpg)


    ## Chapter 3


    ## Setting Up Our Xcode Project


    Welcome to Xcode! It’s time to get our hands dirty.


    At this point, there’s nothing we could have done wrong to mess up our app. Let’s
    try to keep it that way!


    Throughout this chapter, you’ll become familiar with working with Xcode. You’ll
    jump right in and create a new iOS project for your *Birthday Reminder* app. I’ll
    teach you how to embed and assign icons, and launch screens for your app. By the
    end of the morning, we’ll look at how to deploy and debug your project as a working
    app on your iPhone or iPod Touch.'
