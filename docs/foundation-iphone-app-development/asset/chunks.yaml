    **Figure 6-18.** Drag and drop the new tap gesture recognizer onto the container
    view in the document outline pane


    Xcode displays the newly added tap gesture recognizer instance in the document
    outline pane (at the bottom of the list of objects). Control-click the added tap
    gesture recognizer to open its contextual menu. You’ll see the new `gestureRecognizers`
    outlet collection that connects the recognizer to the photo container view.


    We’ve already done enough to detect a tap on the photo container view, but we
    need to also create an action connection from the tap gesture recognizer to `BRBirthdayEditViewController.h`.


    Using the Assistant Editor with `BRBirthdayEditViewController.h` displaying in
    the right pane and the storyboard in the left pane, Control-drag from the tap
    gesture recognizer to `BRBirthdayEditViewController.h` to create a new action
    called `didTapPhoto`, as shown in [Figure 6-19](#Chapter06.html#fig_6_19).


    ![Image](images/9781430243748_Fig06-19.jpg)


    **Figure 6-19.** Creating an action from the tap gesture recognizer named `didTapPhoto:`


    Jump into `BRBirthdayEditViewController.m` and add a call to `NSLog` to check
    the photo tapping is working:


    `- (IBAction)didTapPhoto:(id)sender {`

    **`NSLog(@"Did Tap Photo!");`**

    `}`


    Build and run. Does the debug print our Did Tap Photo! each time you tap on the
    cake? Excellent. ![Image](images/smile.jpg)


    #### Implementing an action sheet


    We want to give the user the option to pick a photo from their library *or* take
    a photo with the camera. We’re going to present these two options via an *action
    sheet*. Before we extend the `didTapPhoto:` method, we need to declare in our
    header file that `BRBirthdayEditViewController` implements the `UIActionSheetDelegate`
    protocol:


    `@interface BRBirthdayEditViewController : BRCoreViewController<UITextFieldDelegate`**`,`**

