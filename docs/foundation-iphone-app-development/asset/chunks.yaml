    `delegate:nil cancelButtonTitle:nil otherButtonTitles:@"Play Again", nil];`

    `    [alert show];`

    `}`


    In our notification handler, we’re able to extract the winner via the `userInfo`
    property. We’re expecting a dictionary with an `NSNumber` property that’s wrapping
    a Boolean primitive. So we also have to extract the primitive Boolean to check
    if the dealer won or not:


    `NSString *message = [num boolValue] ? @"Dealer won!" : @"You won!";`


    We end up with a winning message that we then display in an alert view (see [Figure
    4-19](#Chapter04.html#fig_4_19)).


    ![Image](images/9781430243748_Fig04-19.jpg)


    **Figure 4-19.** Yay! It only took me five build and run attempts to get a winning
    screenshot!


    #### Protocols and the delegate pattern


    But we’re not quite done yet. Our app is no longer crashing, but as soon as we
    dismiss the alert, our game is over. The buttons are disabled and we have no way
    to play again. That’s no good! What we’ll do is change our OK button to read Play
    Again, and then restart the game as soon as the button is pressed.


    How do we know when the button is pressed? The `UIAlertView` class does not expose
    its button properties, so we can’t tap into the target-action mechanism in this
    instance. Instead, like many of Apple’s iOS SDK components, `UIAlertView` subscribes
    to the delegate pattern.


    `UIAlertView` has a weak reference property called a *delegate*. `UIAlertView`
    doesn’t care which object wishes to be its delegate as long as the object implements
    the `UIAlertViewDelegate` protocol. A *protocol* is similar to a class interface:
    it defines a set of method signatures that the protocol will implement. However,
    a protocol can also define *optional* method signatures. In order for `BJViewController`
    to set itself as the delegate of the alert view, it first needs to declare that
    it implements the `UIAlertViewDelegate` protocol. To do this, we switch momentarily
    to the header file of `BJViewController`.


    Change the first line of the interface declaration from


    `@interface BJViewController : UIViewController`


    to


    `@interface BJViewController : UIViewController` **`<UIAlertViewDelegate>`**


