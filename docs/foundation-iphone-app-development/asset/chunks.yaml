    ### Adding an icon and launch screen


    Xcode created three, default, plain black launch screen images when we created
    our new project. We’ll learn about each of these default images shortly, but for
    now, I’d like you to delete these files from Xcode. Open the Supporting Files
    group and multiselect `Default.png`, `Default@2x.png`, and `Default-568h@2x.png`.
    Click the Delete key and then select the Move to Trash button.


    Xcode’s Project Navigator lists a hierarchy of files and groups. Groups are not
    the same thing as folders in the Finder. You can create groups and subgroups in
    Xcode, and drag and drop your class files within the group hierarchy. However,
    your modified structure will not be mirrored in the Finder; that is, you could
    have a complex group and file hierarchy in Xcode, but in the Finder, all your
    class files could be on the root project level.


    I found this group concept quite confusing initially. One solution is to first
    create new folders in the Finder and then add those folders as groups to your
    Xcode project. A little weird, but it works.


    We’re now going to add to our project the icon and launch screen images included
    in the source code for this chapter. To do so, open your project folder in the
    Finder, and create a new folder named `resources`. Within `resources`*,* create
    a subfolder named `images`. Now copy across all the images from the `assets` folder
    of the supplied source code into your new `images` directory (see [Figure 3-14](#Chapter03.html#fig_3_14)).


    ![Image](images/9781430243748_Fig03-14.jpg)


    **Figure 3-14.** Adding all the image resources for the project via the Finder


    Now switch back to Xcode. Notice how nothing has changed here? We’ve added directories
    and files to our `BirthdayReminder` directory in the Finder, but until we add
    these files to our Xcode project through the IDE, they will remain ignored.


    Select the main `BirthdayReminder` group in the Project Navigator. Then, using
    the keyboard shortcut ![Image](images/U002a.jpg)![Image](images/U002a.jpg)A or
    File ![Image](images/U001.jpg) Add Files to BirthdayReminder, navigate to our
    `resources` directory.


    Ensure that Create Groups for Any Added Folders is selected (see [Figure 3-15](#Chapter03.html#fig_3_15))
    and click the Add button.


    ![Image](images/9781430243748_Fig03-15.jpg)


    **Figure 3-15.** Adding all of the image resources to the Xcode project


    Another way to add Finder folders and files to an Xcode project is to drag the
    new folder from the Finder directly into the Xcode IDE, and then drop the folder
    straight into the Project Navigator. Xcode will then present you with a dialog
    box. Unless you prefer to reference the new files outside of your main project
    directory, then select the Copy Items into Destination Group’s Folder check box
    and the Create Groups for Any Added Folders option before clicking the Add button.


    Run and debug. Did you spot any new changes to your app? If you’re quick, you’ll
    have seen the new launch image that appears on the screen for a few milliseconds
    before our Hello World view. Tap the home button on the simulator to view the
