  raw: '##### Appearance styles for containers


    Excellent. Let’s continue with the `initStyles` method of `BRStyleSheet.m`. Add
    the next block of appearance API styling code:


    `NSDictionary *barButtonItemTextAttributes;`


    `//NAVIGATION BUTTONS`


    `    //Tint of the navigation button backgrounds`

    `    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar class],nil]`

    `setTintColor:kNavigationButtonBackgroundColour];`


    `    barButtonItemTextAttributes = [NSDictionary dictionaryWithObjectsAndKeys:`

    `                                  kFontNavigationTextColour, UITextAttributeTextColor,`

    `                                   [UIColor whiteColor], UITextAttributeTextShadowColor,`

    `                                   [NSValue valueWithUIOffset:UIOffsetMake(0,
    1)],`

    `UITextAttributeTextShadowOffset,nil];`

    `    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar class], nil]`

    `setTitleTextAttributes:barButtonItemTextAttributes forState:UIControlStateNormal];`


    `    NSDictionary *disabledBarButtonItemTextAttributes = [NSDictionary`

    `dictionaryWithObjectsAndKeys:`

    `                                    kFontNavigationDisabledTextColour,`

    `UITextAttributeTextColor,`

    `                                   [UIColor whiteColor], UITextAttributeTextShadowColor,`

    `                                   [NSValue valueWithUIOffset:UIOffsetMake(0,
    1)],`

    `UITextAttributeTextShadowOffset,nil];`

    `    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar class], nil]`

    `setTitleTextAttributes:disabledBarButtonItemTextAttributes forState:UIControlStateDisabled];`


    Build and run. The result should be tinted bar button items, as shown in [Figure
    9-17](#Chapter09.html#fig_9_17).


    ![Image](images/9781430243748_Fig09-17.jpg)


    **Figure 9-17.** Tinted bar button items


    In the latest code, I’ve introduced the `appearanceWhenContainedIn:` styling method.
    The significance of this second appearance API is that we can specify that iOS
    only apply the cream-color style to instances of `UIBarButtonItem` that appear
    within the `UINavigationBar` container class. If we stick to setting a global
    style on all instances of the `UIBarButtonItem` class, then our style is also
    applied to the Address Book and Facebook bar button item instances in the toolbar.
    Our app design has a very different skin for the toolbar and its bar button items,
    so that wouldn’t be ideal. Let’s now add toolbar styling to our `initStyles` method:


    `//TOOLBAR`


    `    //Toolbar cake background image`

    `    [[UIToolbar appearance] setBackgroundImage:[UIImage imageNamed:@"tool-bar-background.png"]`

    `forToolbarPosition:UIToolbarPositionAny barMetrics:UIBarMetricsDefault];`


    `    //TOOLBAR BUTTONS`

    `    //Dark background of Toolbar Buttons`

    `    //Tint of the toolbar button backgrounds`

    `    [[UIBarButtonItem appearanceWhenContainedIn:[UIToolbar class],nil]`

    `setTintColor:kToolbarButtonBackgroundColour];`


    `    //White text on UIBarButtonItems`

    `    barButtonItemTextAttributes = [NSDictionary dictionaryWithObjectsAndKeys:[UIColor`

    `whiteColor], UITextAttributeTextColor,nil];`

    `    [[UIBarButtonItem appearanceWhenContainedIn:[UIToolbar class], nil]`

    `     setTitleTextAttributes:barButtonItemTextAttributes forState:UIControlStateNormal];`


    Build and run. Your home screen should be looking almost identical to our home
    screen design by now (see [Figure 9-18](#Chapter09.html#fig_9_18)).


    ![Image](images/9781430243748_Fig09-18.jpg)


    **Figure 9-18.** Stylized toolbar and bar button items in the toolbar


    #### Applying our style sheet to the rest of the app


    We’re almost done with our style sheet class, but we need to apply the label and
    image styling to the other screens in our app, so let’s get that done now.


    ##### Styling the alert time view


    The navigation bar and custom view background styling are automatically applied
    to all screens in our app, but the instruction text in `BRNotificationTimeViewController`
    is too dark against the checkered background, so open `BRNotificationTimeViewController.m`,
    import `BRStyleSheet.h`, and add a `viewDidLoad` implementation:


    `-(void) viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    [BRStyleSheet styleLabel:self.whatTimeLabel withType:BRLabelTypeLarge];`

    `}`


    Build and run. The instruction text should now be styled, as shown in [Figure
    9-19](#Chapter09.html#fig_9_19).


    ![Image](images/9781430243748_Fig09-19.jpg)


    **Figure 9-19.** Styled Alert Time setting view


    ##### Styling the birthday edit view


    We’ll apply the same styling process to the Birthday Edit view controller. Open
    `BRBirthdayEditViewController.m`, import `BRStyleSheet.h`, and then style the
    Include Year text label and photo container by adding a `viewDidLoad` implementation:


    `-(void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    [BRStyleSheet styleLabel:self.includeYearLabel withType:BRLabelTypeLarge];`

    `    [BRStyleSheet styleRoundCorneredView:self.photoContainerView];`

    `}`


    Build and run (see [Figure 9-20](#Chapter09.html#fig_9_20)).


    ![Image](images/9781430243748_Fig09-20.jpg)


    **Figure 9-20.** Stylized Birthday Edit view


    ##### Styling the notes edit view


    The Notes Edit view controller displays a text view rather than a label, so we’ll
    need to add a new text view styling method to our style sheet. In the `BRStyleSheet.h`
    header, declare the new method:


    `+(void)styleTextView:(UITextView *)textView;`


    Then implement the new `styleTextView:` class method into the `BRStyleSheet.m`
    source file:


    `+(void)styleTextView:(UITextView *)textView`

    `{`

    `    textView.backgroundColor = [UIColor clearColor];`

    `    textView.font = kFontNotes;`

    `    textView.textColor = kFontLightOnDarkTextColour;`

    `    textView.layer.shadowColor = kFontDropShadowColour.CGColor;`

    `    textView.layer.shadowOffset = CGSizeMake(1.0f, 1.0f);`

    `    textView.layer.shadowRadius = 0.0f;`

    `    textView.layer.masksToBounds = NO;`

    `}`


    Open `BRNotesEditViewController.m`, import `BRStyleSheet.h`, and then style the
    text view in the `viewDidLoad` implementation:


    `-(void) viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    [BRStyleSheet styleTextView:self.textView];`

    `}`


    Build and run (see [Figure 9-21](#Chapter09.html#fig_9_21)).


    ![Image](images/9781430243748_Fig09-21.jpg)


    **Figure 9-21.** Stylized edit notes view


    ##### Creating and styling the birthday detail view


    Our Birthday Detail view is looking pretty empty of content at the moment, but
    we’ll soon fix that (see [Figure 9-22](#Chapter09.html#fig_9_22)).


    ![Image](images/9781430243748_Fig09-22.jpg)


    **Figure 9-22.** Birthday detail view: before'
  trans: "\n#### 容器的外观样式\n\n很好。让我们继续处理 `BRStyleSheet.m` 中的 `initStyles` 方法。添加下一个外观\
