    \n![Image](images/9781430243748_Fig11-16.jpg)\n\n**Figure 11-16.** Nicely skinned\
    \ Post to the Facebook Wall view with an enabling/disabling Post button\n\nGreat,\
    \ the UI for our custom Post to the Facebook Wall view and view controller are\
    \ complete. Now to actually send a post to Facebook!\n\nWe’ll keep all Facebook\
    \ API calls centralized in our `BRDModel` singleton, so open `BRDModel.h` and\
    \ declare a new `postToFacebookWall:withFacebookID:` public method:\n\n```\n-\
    \ (void)postToFacebookWall:(NSString *)message withFacebookID:(NSString *)facebookID;\n\
    ```\n\nBefore implementing the method, jump back to the `BRPostToFacebookWallViewController.m`\
    \ file, import `BRDModel.h`, and complete the `postToFacebook` action method:\n\
    \n```\n- (IBAction)postToFacebook:(id)sender {\n    [[BRDModel sharedInstance]\
    \ postToFacebookWall:self.textView.text withFacebookID:self.facebookID];\n   \
    \ [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\nNow to add\
    \ the posting logic to our model. Open `BRDModel.m`. We’re going to apply very\
    \ similar logic to the Post to Facebook process as we did with the fetching of\
    \ Facebook friends’ birthdays. That is, we’re not going to assume that the user\
    \ has already authenticated with Facebook. On that basis, that we may need to\
    \ wait for the authentication process to complete before we can post. So if the\
    \ authentication process has not completed in the user’s current session, we’ll\
    \ store the Facebook ID and message for the post in a couple of new private properties.\
    \ Add the following private properties to `BRDModel.m` private interface:\n\n\
    ```\n@interface BRDModel()\n\n@property (strong) ACAccount *facebookAccount;\n\
    @property FacebookAction currentFacebookAction;\n@property (nonatomic,strong)\
    \ NSString *postToFacebookMessage;\n@property (nonatomic,strong) NSString *postToFacebookID;\n\
    \n@end\n```\n\nNow to implement the first part of the new `postToFacebookWall`\
    \ method:\n\n```\n- (void)postToFacebookWall:(NSString *)message withFacebookID:(NSString\
    \ *)facebookID\n{\n    NSLog(@\"postToFacebookWall\");\n\n    if (self.facebookAccount\
    \ == nil) {\n        //We're not authorized yet so store the Facebook message\
    \ and id and start the authentication flow\n        self.postToFacebookMessage\
    \ = message;\n        self.postToFacebookID = facebookID;\n        self.currentFacebookAction\
    \ = FacebookActionPostToWall;\n        [self authenticateWithFacebook];\n    \
    \    return;\n    }\n\n    NSLog(@\"We're authorized so post to Facebook!\");\n\
    \n}    \n```\n\nThis code should look pretty similar to the initial `fetchFacebookBirthdays`\
    \ code. If we need to authorize the `facebookAccount` property, then we store\
    \ the message and Facebook ID, and set the current Facebook action to our `FacebookActionPostToWall`\
    \ enumerator value.\n\nBefore we complete the `postToFacebookWall` method, first\
    \ locate the `authenticateWithFacebook` method and complete the `TODO` part of\
    \ the switch statement for the completion block when the user authenticates:\n\
    \n```\nswitch (self.currentFacebookAction) {\n                case FacebookActionGetFriendsBirthdays:\n\
    \                    [self fetchFacebookBirthdays];\n                    break;\n\
    \                case FacebookActionPostToWall:\n                    [self postToFacebookWall:self.postToFacebookMessage\n\
    withFacebookID:self.postToFacebookID];\n                    break;\n         \
    \   }\n```\n\nGreat. Let's finish the posting logic back in the `postToFacebookWall:withFacebookID`\
    \ method:\n\n```\n- (void)postToFacebookWall:(NSString *)message withFacebookID:(NSString\
    \ *)facebookID\n{\n    NSLog(@\"postToFacebookWall\");\n\n    if (self.facebookAccount\
    \ == nil) {\n        //We're not authorized yet so store the Facebook message\
    \ and id and start the\nauthentication flow\n        self.postToFacebookMessage\
    \ = message;\n        self.postToFacebookID = facebookID;\n        self.currentFacebookAction\
    \ = FacebookActionPostToWall;\n        [self authenticateWithFacebook];\n    \
    \    return;\n    }\n\n    NSLog(@\"We're authorized so post to Facebook!\");\n\
    \n    NSDictionary *params = @{@\"message\":message};\n\n    //Use the user's\
    \ Facebook ID to call the post to friend feed Graph API path\n    NSString *postGraphPath\
    \ = [NSString\nstringWithFormat:@\"https://graph.facebook.com/%@/feed\",facebookID];\n\
    \n    NSURL *requestURL = [NSURL URLWithString:postGraphPath];\n\n    SLRequest\
    \ *request = [SLRequest requestForServiceType:SLServiceTypeFacebook requestMethod:SLRequestMethodPOST\
    \ URL:requestURL parameters:params];\n    request.account = self.facebookAccount;\n\
    \n    [request performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\n\
    *urlResponse, NSError *error) {\n        if (error != nil) {\n            NSLog(@\"\
    Error posting to Facebook: %@\",error);\n        }\n        else\n        {\n\
    \            //Facebook returns a dictionary with the id of the new post - this\
    \ might be\nuseful for other projects\n            NSDictionary *dict = (NSDictionary\
    \ *) [NSJSONSerialization JSONObjectWithData:responseData options:0 error:nil];\n\
    \            NSLog(@\"Successfully posted to Facebook! Post ID: %@\",dict);\n\
    \        }\n    }];\n\n}\n```\n\nBuild and run. You should be able to post to\
    \ your friend's Facebook Walls straight from *Birthday Reminder*!\n\nExperiment\
    \ with the params dictionary that you're passing to the `SLRequest` instance in\
    \ code. There are additional parameters you can add, such as a link or the URL\
    \ to a picture to include in the Wall post. Once you get to this point, you have\
    \ the basis for a very powerful social component. You can read all about the different\
    \ parameter values that Facebook accepts in the `post` object at [`http://developers.facebook.com/docs/reference/api/post/`](http://developers.facebook.com/docs/reference/api/post/).\n\
    \nI would urge you to tread carefully when it comes to enabling friend-to-friend\
    \ Facebook Wall posts and ensure that the way you using this feature fits with\
    \ the way your users expect it to work. As we're helping our users to post Happy\
    \ Birthday messages, I've purposely avoided adding any app advertising in the\
    \ `post` object, as we don't want our users to accuse us of spamming their friends!"
