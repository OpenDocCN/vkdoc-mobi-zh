- fmt: '# 设置应用方向与自动布局


    `Birthday Reminder`不打算为此项目支持多方向，因此我们现在将应用的支持界面方向设置为仅"竖屏"。在项目导航器中选择`BirthdayReminder`项目，然后选择`BirthdayReminder`目标。您将看到一个摘要屏幕，其中包含"支持的界面方向"部分。取消选中"横向左"和"横向右"选项，如图3-12所示。这样，我们的应用将不再旋转到横向方向。构建并运行以测试。


    ![Image](images/9781430243748_Fig03-12.jpg)


    **Figure 3-12.** 配置应用支持的界面方向


    我还希望您关闭苹果在iOS 6中引入的一项新技术——`Auto Layout`。`Auto Layout`是一个强大的工具包，它将处理应用的所有视图位置和大小变化。对于有经验的iOS开发者来说，这也是一个高级主题；由于我们不支持多方向，我向您保证，它带来的麻烦将多于其价值！


    在项目导航器中选择您的故事板，然后在实用工具面板中选择文件检查器的第一个标签，取消选中`Use Autolayout`，如图3-13所示。


    *注意：如果您想了解更多关于`Auto Layout`的信息，我建议查看Matthijs Hollemans的教程：[`www.raywenderlich.com/20881/beginning-auto-layout-part-1-of-2`](http://www.raywenderlich.com/20881/beginning-auto-layout-part-1-of-2)。*


    ![Image](images/9781430243748_Fig03-13.jpg)


    **Figure 3-13.** 为应用关闭`Auto Layout`


    ## 添加图标和启动屏幕


    当我们创建新项目时，Xcode创建了三个默认的纯黑色启动屏幕图像。我们很快将了解每个默认图像，但现在，我希望您从Xcode中删除这些文件。打开"支持文件"组，多选`Default.png`、`Default@2x.png`和`Default-568h@2x.png`。按Delete键，然后选择"移到废纸篓"按钮。


    Xcode的项目导航器列出了文件和组的层次结构。组与Finder中的文件夹不同。您可以在Xcode中创建组和子组，并在组层次结构中拖放类文件。然而，您修改后的结构不会在Finder中镜像；也就是说，您可以在Xcode中拥有复杂的组和文件层次结构，但在Finder中，所有类文件可能都位于根项目级别。


    我最初觉得这个组概念相当令人困惑。一种解决方案是先在Finder中创建新文件夹，然后将这些文件夹作为组添加到Xcode项目中。这有点奇怪，但有效。


    现在我们将在项目中添加本章源代码中包含的图标和启动屏幕图像。为此，在Finder中打开项目文件夹，创建一个名为`resources`的新文件夹。在`resources`中，创建一个名为`images`的子文件夹。现在将提供的源代码中`assets`文件夹中的所有图像复制到新的`images`目录中（见图3-14）。


    ![Image](images/9781430243748_Fig03-14.jpg)


    **Figure 3-14.** 通过Finder添加项目的所有图像资源


    现在切换回Xcode。注意到这里没有任何变化吗？我们在Finder中向`BirthdayReminder`目录添加了目录和文件，但除非我们通过IDE将这些文件添加到Xcode项目中，否则它们将保持被忽略状态。


    在项目导航器中选择主`BirthdayReminder`组。然后使用键盘快捷键![Image](images/U002a.jpg)![Image](images/U002a.jpg)A或文件![Image](images/U001.jpg)
    > 添加文件到"BirthdayReminder"，导航到我们的`resources`目录。


    确保选中"为添加的文件夹创建组"（见图3-15），然后点击"添加"按钮。


    ![Image](images/9781430243748_Fig03-15.jpg)


    **Figure 3-15.** 将所有图像资源添加到Xcode项目


    将Finder文件夹和文件添加到Xcode项目的另一种方法是：将新文件夹从Finder直接拖入Xcode IDE，然后将文件夹直接放入项目导航器。Xcode将弹出一个对话框。除非您更喜欢在主项目目录之外引用新文件，否则请选中"将项目复制到目标组的文件夹中"复选框和"为添加的文件夹创建组"选项，然后点击"添加"按钮。


    运行并调试。您是否注意到应用有任何新变化？如果您眼疾手快，会看到新的启动图像在屏幕上显示了几毫秒，然后才出现"Hello World"视图。点击模拟器上的主页按钮，查看主屏幕上的`Birthday
    Reminder`图标。如果它仍然是一个白色圆角矩形，则通过按住图标并点击"删除"按钮，从模拟器中移除`Birthday Reminder`。然后再次构建并运行。现在您应该看到白色主屏幕图标已变成`Birthday
    Reminder`图标（见图3-16）。神奇吧？


    *提示：如果Xcode未能显示应用中的预期更改（例如替换图标），请始终尝试产品 ![Image](images/U001.jpg) 清理以清除调试缓存。*


    ![Image](images/9781430243748_Fig03-16.jpg)


    **Figure 3-16.** 在iOS模拟器中显示的`Birthday Reminder`图标'
