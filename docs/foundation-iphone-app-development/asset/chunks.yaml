    \        self.selectedIndexPathToBirthday[indexPath] = birthdayImport;\n    }\n\
    \n    [self.tableView reloadData];\n    [self updateImportButton];\n}\n\n- (IBAction)didTapSelectNoneButton:(id)sender\
    \ {\n    [self.selectedIndexPathToBirthday removeAllObjects];\n    [self.tableView\
    \ reloadData];\n    [self updateImportButton];\n}\n```\n\n构建并运行（参见 Figure 10-24）。\n\
    \n![Image](img/9781430243748_Fig10-24.jpg)\n\n**图 10-24.** 点击“全选”后的效果。\n"
- fmt: "### Importing address book birthdays into the Core Data store\n\nNow that\
    \ our users are able to multiselect their birthday contacts from the Address Book,\
    \ the next step is to import the data for those selected contacts into *Birthday\
    \ Reminder* when the Import button is tapped. Let's turn our attention back to\
    \ our main model class, `BRDModel`, and add a method for importing multiple instances\
    \ of `BRDBirthdayImport` into `BRDBirthday` Core Data entities.\n\nDefine a new\
    \ `importBirthdays:` public method in `BRDModel.h`:\n\n```\n- (void)importBirthdays:(NSArray\
    \ *)birthdaysToImport;\n```\n\nYesterday, in [Chapter 8](#Chapter08.html#ch8)'s\
    \ “Duplicate Entities and Synchronization of the Core Data Persistence” section,\
    \ we created a utility method in our model to retrieve all existing birthday entities\
    \ in our Core Data model with matching unique ids from any list of birthdays ids.\
    \ We're going to use the same logic in our new `importBirthdays:` implementation\
    \ in `BRDModel.m`:\n\n```\n- (void)importBirthdays:(NSArray *)birthdaysToImport\n\
    {\n    int i;\n    int max = [birthdaysToImport count];\n\n    BRDBirthday *importBirthday;\n\
    \    BRDBirthday *birthday;\n\n    NSString *uid;\n    NSMutableArray *newUIDs\
    \ = [NSMutableArray array];\n\n    for (i=0;i<max;i++)\n    {\n        importBirthday\
    \ = birthdaysToImport[i];\n        uid = importBirthday.uid;\n        [newUIDs\
    \ addObject:uid];\n    }\n\n    //use BRDModel's utility method to retrive existing\
    \ birthdays with matching IDs\n    //to the array of birthdays to import\n   \
    \ NSMutableDictionary *existingBirthdays = [self getExistingBirthdaysWithUIDs:newUIDs];\n\
    \n    NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
    \n    for (i=0;i<max;i++)\n    {\n        importBirthday = birthdaysToImport[i];\n\
    \        uid = importBirthday.uid;\n\n        birthday = existingBirthdays[uid];\n\
    \        if (birthday) {\n            //a birthday with this udid already exists\
    \ in Core Data, don't create a duplicate\n        }\n        else {\n        \
    \    birthday = [NSEntityDescription insertNewObjectForEntityForName:@\"BRDBirthday\"\
    \ inManagedObjectContext:context];\n            birthday.uid = uid;\n        \
    \    existingBirthdays[uid] = birthday;\n        }\n\n        //update the new\
    \ or previously saved birthday entity\n        birthday.name = importBirthday.name;\n\
    \        birthday.uid = importBirthday.uid;\n        birthday.picURL = importBirthday.picURL;\n\
    \        birthday.imageData = importBirthday.imageData;\n        birthday.addressBookID\
    \ = importBirthday.addressBookID;\n        birthday.facebookID = importBirthday.facebookID;\n\
    \n        birthday.birthDay = importBirthday.birthDay;\n        birthday.birthMonth\
    \ = importBirthday.birthMonth;\n        birthday.birthYear = importBirthday.birthYear;\n\
    \n        [birthday updateNextBirthdayAndAge];\n    }\n\n    //save our new and\
    \ updated changes to the Core Data store\n    [self saveChanges];\n\n}\n```\n\n\
    The following is the logic of the import code:\n\n> 1. Loop through the birthdays\
    \ to import and collect their unique ids.\n> 2. Pass the unique ids to `getExistingBirthdaysWithUIDs:`\
    \ to retrieve a mutable dictionary of existing birthday entities with matching\
    \ ids.\n> 3. Loop through the birthdays to import again, either creating or updating\
    \ stored Core Data birthday entities.\n> 4. Save our updates.\n\nLet's test out\
    \ the import code. Back in `BRImportViewController.m`, import `BRDModel.h`, and\
    \ then implement the `didTapImportButton:` action method:\n\n```\n- (IBAction)didTapImportButton:(id)sender\
    \ {\n    NSArray *birthdaysToImport = [self.selectedIndexPathToBirthday allValues];\n\
    \    [[BRDModel sharedInstance] importBirthdays:birthdaysToImport];\n    [self\
    \ dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\nBuild and run.\
    \ You should now be able to pick and choose birthdays to import from your iPhone\
    \ Address Book onto *Birthday Reminder* (see [Figure 10-25](#Chapter10.html#fig_10_25)).\n\
    \n![Image](images/9781430243748_Fig10-25.jpg)\n\n**Figure 10-25.** Importing birthdays\
    \ from the Address Book all up and running\n\n### Activating phone calls, SMS,\
    \ and e-mails\n\nUsers of *Birthday Reminder* can now import any contact in their\
    \ Address Book with an assigned birthday. But why stop there? We're already saving\
    \ the unique `ABRecordID` property of each imported contact in `BRDBirthday.addressBookID`.\
    \ We can use Apple's unique contact record id for each imported birthday to access\
    \ other information about the contact: information like phone numbers and e-mail\
    \ addresses.\n\nWe'll use this detection code in our Birthday Detail view. If\
    \ a birthday was imported from the Address Book, then we'll check to see if the\
    \ iPhone has a phone number for the contact and then Display buttons to call or\
    \ SMS the friend to wish them a Happy Birthday! Likewise, if we detect an e-mail\
    \ for the Address Book contact, then we'll present the user with an option to\
    \ e-mail their friend birthday wishes.\n\nOpen `BRBirthdayDetailViewController.m`\
    \ source file and begin by importing the `AddressBook`:\n\n```\n#import <AddressBook/AddressBook.h>\n\
    ```\n\nWe're going to create private helper methods in `BRBirthdayDetailViewController.m`\
    \ that generate iOS links to initiate phone calls, SMS, and e-mails. We'll begin\
    \ by adding a `telephoneNumber` method that retrieves a reference to the Address\
    \ Book record of the current contact and checks for the existence of the `kABPersonPhoneProperty`\
    \ (phone number) property:\n\n```\n#pragma mark Address Book contact helper methods\n\
    \n- (NSString *)telephoneNumber\n{\n    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL,\
    \ NULL);\n\n    ABRecordRef record =  ABAddressBookGetPersonWithRecordID (addressBook,(ABRecordID)[self.birthday.addressBookID\
    \ intValue]);\n\n    ABMultiValueRef multi = ABRecordCopyValue(record, kABPersonPhoneProperty);\n\
    \n    NSString *telephone = nil;\n\n    if (ABMultiValueGetCount(multi) > 0) {\n\
    \        telephone = (__bridge_transfer NSString*)ABMultiValueCopyValueAtIndex(multi,\
    \ 0);\n        telephone = [telephone stringByReplacingOccurrencesOfString:@\"\
    \ \" withString:@\"\"];\n    }\n    CFRelease(multi);\n    CFRelease(addressBook);\n\
    \n    return telephone;\n}\n```\n\nIf our new method finds a phone number associated\
    \ to this contact, then it removes any white space in the number because this\
    \ is a requirement for creating in-app links to Apple's Phone and Messages apps\
    \ when activating a phone call or SMS. If our method cannot find a phone number\
    \ associated with the contact, then it returns `nil`."
  raw: '### Importing address book birthdays into the Core Data store


    Now that our users are able to multiselect their birthday contacts from the Address
    Book, the next step is to import the data for those selected contacts into *Birthday
    Reminder* when the Import button is tapped. Let''s turn our attention back to
    our main model class, `BRDModel`, and add a method for importing multiple instances
    of `BRDBirthdayImport` into `BRDBirthday` Core Data entities.


    Define a new `importBirthdays:` public method in `BRDModel.h`:


    `-(void) importBirthdays:(NSArray *)birthdaysToImport;`


    Yesterday, in [Chapter 8](#Chapter08.html#ch8)''s “Duplicate Entities and Synchronization
    of the Core Data Persistence” section, we created a utility method in our model
    to retrieve all existing birthday entities in our Core Data model with matching
    unique ids from any list of birthdays ids. We''re going to use the same logic
    in our new `importBirthdays:` implementation in `BRDModel.m`:


    `-(void) importBirthdays:(NSArray *)birthdaysToImport`

    `{`

    `    int i;`

    `    int max = [birthdaysToImport count];`


    `    BRDBirthday *importBirthday;`

    `    BRDBirthday *birthday;`


    `    NSString *uid;`

    `    NSMutableArray *newUIDs = [NSMutableArray array];`


    `    for (i=0;i<max;i++)`

    `    {`

    `        importBirthday = birthdaysToImport[i];`

    `        uid = importBirthday.uid;`

    `        [newUIDs addObject:uid];`

    `    }`


    `    //use BRDModel''s utility method to retrive existing birthdays with matching
    IDs`

    `    //to the array of birthdays to import`

    `    NSMutableDictionary *existingBirthdays = [self getExistingBirthdaysWithUIDs:newUIDs];`


    `    NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;`


    `    for (i=0;i<max;i++)`

    `    {`

    `        importBirthday = birthdaysToImport[i];`

    `        uid = importBirthday.uid;`


    `        birthday = existingBirthdays[uid];`

    `        if (birthday) {`

    `            //a birthday with this udid already exists in Core Data, don''t create
    a duplicate`

    `        }`

    `        else {`

    `            birthday = [NSEntityDescription insertNewObjectForEntityForName:@"BRDBirthday"
    inManagedObjectContext:context];`

    `            birthday.uid = uid;`

    `            existingBirthdays[uid] = birthday;`

    `        }`


    `        //update the new or previously saved birthday entity`

    `        birthday.name = importBirthday.name;`

    `        birthday.uid = importBirthday.uid;`

    `        birthday.picURL = importBirthday.picURL;`

    `        birthday.imageData = importBirthday.imageData;`

    `        birthday.addressBookID = importBirthday.addressBookID;`

    `        birthday.facebookID = importBirthday.facebookID;`


    `        birthday.birthDay = importBirthday.birthDay;`

    `        birthday.birthMonth = importBirthday.birthMonth;`

    `        birthday.birthYear = importBirthday.birthYear;`


    `        [birthday updateNextBirthdayAndAge];`

    `    }`


    `    //save our new and updated changes to the Core Data store`

    `    [self saveChanges];`


    `}`


    The following is the logic of the import code:


    > 1.  Loop through the birthdays to import and collect their unique ids.

    > 2.  Pass the unique ids to `getExistingBirthdaysWithUIDs:` to retrieve a mutable
    dictionary of existing birthday entities with matching ids.

    > 3.  Loop through the birthdays to import again, either creating or updating
    stored Core Data birthday entities.

    > 4.  Save our updates.


    Let''s test out the import code. Back in `BRImportViewController.m`, import `BRDModel.h`,
    and then implement the `didTapImportButton:` action method:


    `- (IBAction)didTapImportButton:(id)sender {`

    **`NSArray *birthdaysToImport = [self.selectedIndexPathToBirthday allValues];`**

    **`    [[BRDModel sharedInstance] importBirthdays:birthdaysToImport];`**

    **`    [self dismissViewControllerAnimated:YES completion:nil];`**

    `}`


    Build and run. You should now be able to pick and choose birthdays to import from
    your iPhone Address Book onto *Birthday Reminder* (see [Figure 10-25](#Chapter10.html#fig_10_25)).


    ![Image](images/9781430243748_Fig10-25.jpg)


    **Figure 10-25.** Importing birthdays from the Address Book all up and running


    ### Activating phone calls, SMS, and e-mails


    Users of *Birthday Reminder* can now import any contact in their Address Book
    with an assigned birthday. But why stop there? We''re already saving the unique
    `ABRecordID` property of each imported contact in `BRDBirthday.addressBookID`.
    We can use Apple''s unique contact record id for each imported birthday to access
    other information about the contact: information like phone numbers and e-mail
    addresses.


    We''ll use this detection code in our Birthday Detail view. If a birthday was
    imported from the Address Book, then we''ll check to see if the iPhone has a phone
    number for the contact and then Display buttons to call or SMS the friend to wish
    them a Happy Birthday! Likewise, if we detect an e-mail for the Address Book contact,
    then we''ll present the user with an option to e-mail their friend birthday wishes.


    Open `BRBirthdayDetailViewController.m` source file and begin by importing the
    `AddressBook` :


    `#import <AddressBook/AddressBook.h>`


    We''re going to create private helper methods in `BRBirthdayDetailViewController.m`
    that generate iOS links to initiate phone calls, SMS, and e-mails. We''ll begin
    by adding a `telephoneNumber` method that retrieves a reference to the Address
    Book record of the current contact and checks for the existence of the `kABPersonPhoneProperty`
    (phone number) property:


    `#pragma mark Address Book contact helper methods`


    `-(NSString *)telephoneNumber`

    `{`

    `    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL, NULL);`


    `    ABRecordRef record =  ABAddressBookGetPersonWithRecordID (addressBook,(ABRecordID)[self.birthday.addressBookID
    intValue]);`


    `    ABMultiValueRef multi = ABRecordCopyValue(record, kABPersonPhoneProperty);`


    `    NSString *telephone = nil;`


    `    if (ABMultiValueGetCount(multi) > 0) {`

    `        telephone = (__bridge_transfer NSString*)ABMultiValueCopyValueAtIndex(multi,
    0);`

    `        telephone = [telephone stringByReplacingOccurrencesOfString:@" " withString:@""];`

    `    }`

    `    CFRelease(multi);`

    `    CFRelease(addressBook);`


    `    return telephone;`

    `}`


    If our new method finds a phone number associated to this contact, then it removes
    any white space in the number because this is a requirement for creating in-app
    links to Apple''s Phone and Messages apps when activating a phone call or SMS.
    If our method cannot find a phone number associated with the contact, then it
    returns `nil`.'
  trans: "\n### 将通讯录生日导入 Core Data 存储\n\n现在，用户已经能够从通讯录中多选生日联系人，下一步就是在点击“导入”按钮时，将所选联系人的数据导入到\
    \ *Birthday Reminder* 中。让我们将注意力转回主模型类 `BRDModel`，并添加一个方法，用于将多个 `BRDBirthdayImport`\
    \ 实例导入到 `BRDBirthday` Core Data 实体中。\n\n在 `BRDModel.h` 中定义一个 `importBirthdays:`\
    \ 公共方法：\n\n```\n- (void)importBirthdays:(NSArray *)birthdaysToImport;\n```\n\n\
    昨天，在第 8 章的“重复实体与 Core Data 持久化同步”一节中，我们在模型中创建了一个实用方法，用于检索 Core Data 模型中所有与任何生日\
    \ ID 列表中的唯一 ID 匹配的现有生日实体。我们将在 `BRDModel.m` 中新的 `importBirthdays:` 实现里使用相同的逻辑：\n\
    \n```\n- (void)importBirthdays:(NSArray *)birthdaysToImport\n{\n    int i;\n \
    \   int max = [birthdaysToImport count];\n\n    BRDBirthday *importBirthday;\n\
    \    BRDBirthday *birthday;\n\n    NSString *uid;\n    NSMutableArray *newUIDs\
    \ = [NSMutableArray array];\n\n    for (i=0;i<max;i++)\n    {\n        importBirthday\
    \ = birthdaysToImport[i];\n        uid = importBirthday.uid;\n        [newUIDs\
    \ addObject:uid];\n    }\n\n    //使用 BRDModel 的实用方法，根据要导入的生日数组检索具有匹配 ID 的现有生日\n\
    \    NSMutableDictionary *existingBirthdays = [self getExistingBirthdaysWithUIDs:newUIDs];\n\
    \n    NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
    \n    for (i=0;i<max;i++)\n    {\n        importBirthday = birthdaysToImport[i];\n\
    \        uid = importBirthday.uid;\n\n        birthday = existingBirthdays[uid];\n\
    \        if (birthday) {\n            // Core Data 中已存在具有此 UDID 的生日，不创建重复项\n \
    \       }\n        else {\n            birthday = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    BRDBirthday\" inManagedObjectContext:context];\n            birthday.uid = uid;\n\
    \            existingBirthdays[uid] = birthday;\n        }\n\n        //更新新建或之前保存的生日实体\n\
    \        birthday.name = importBirthday.name;\n        birthday.uid = importBirthday.uid;\n\
    \        birthday.picURL = importBirthday.picURL;\n        birthday.imageData\
    \ = importBirthday.imageData;\n        birthday.addressBookID = importBirthday.addressBookID;\n\
    \        birthday.facebookID = importBirthday.facebookID;\n\n        birthday.birthDay\
    \ = importBirthday.birthDay;\n        birthday.birthMonth = importBirthday.birthMonth;\n\
    \        birthday.birthYear = importBirthday.birthYear;\n\n        [birthday updateNextBirthdayAndAge];\n\
    \    }\n\n    //将新建和更新后的更改保存到 Core Data 存储中\n    [self saveChanges];\n\n}\n```\n\
    \n以下是导入代码的逻辑：\n\n> 1. 遍历要导入的生日，收集它们的唯一 ID。\n> 2. 将唯一 ID 传递给 `getExistingBirthdaysWithUIDs:`，以获取包含匹配\
    \ ID 的现有生日实体的可变字典。\n> 3. 再次遍历要导入的生日，创建或更新已存储的 Core Data 生日实体。\n> 4. 保存更新内容。\n\n\
    让我们测试一下导入代码。回到 `BRImportViewController.m`，导入 `BRDModel.h`，然后实现 `didTapImportButton:`\
    \ 操作方法：\n\n```\n- (IBAction)didTapImportButton:(id)sender {\n    NSArray *birthdaysToImport\
    \ = [self.selectedIndexPathToBirthday allValues];\n    [[BRDModel sharedInstance]\
    \ importBirthdays:birthdaysToImport];\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\n构建并运行。现在你应该能够从 iPhone 通讯录中挑选生日并将其导入到 *Birthday Reminder*\
    \ 中（参见图 10-25）。\n\n![Image](img/9781430243748_Fig10-25.jpg)\n\n**图 10-25.** 从通讯录导入生日功能已全面运行\n\
    \n### 启用电话、短信和电子邮件功能\n\n*Birthday Reminder* 的用户现在可以导入通讯录中任何已分配生日的联系人。但为什么要止步于此呢？我们已经将每个导入联系人的唯一\
    \ `ABRecordID` 属性保存在 `BRDBirthday.addressBookID` 中。我们可以利用苹果为每个导入生日提供的唯一联系人记录 ID，来访问联系人的其他信息，例如电话号码和电子邮件地址。\n\
    \n我们将在生日详情视图中使用这段检测代码。如果生日信息是从通讯录导入的，那么我们将检查 iPhone 是否存储了该联系人的电话号码，如果是，则显示按钮，以便用户通过电话或短信向朋友发送生日祝福！同样，如果我们检测到该通讯录联系人拥有电子邮件地址，那么我们将为用户提供通过电子邮件发送生日祝福的选项。\n\
    \n打开 `BRBirthdayDetailViewController.m` 源文件，首先导入 `AddressBook`：\n\n```\n#import\
    \ <AddressBook/AddressBook.h>\n```\n\n我们将在 `BRBirthdayDetailViewController.m`\
    \ 中创建私有辅助方法，用于生成启动电话、短信和电子邮件的 iOS 链接。首先添加一个 `telephoneNumber` 方法，该方法获取当前联系人的通讯录记录引用，并检查\
    \ `kABPersonPhoneProperty`（电话号码）属性是否存在：\n\n```\n#pragma mark Address Book contact\
    \ helper methods\n\n- (NSString *)telephoneNumber\n{\n    ABAddressBookRef addressBook\
    \ = ABAddressBookCreateWithOptions(NULL, NULL);\n\n    ABRecordRef record =  ABAddressBookGetPersonWithRecordID\
    \ (addressBook,(ABRecordID)[self.birthday.addressBookID intValue]);\n\n    ABMultiValueRef\
    \ multi = ABRecordCopyValue(record, kABPersonPhoneProperty);\n\n    NSString *telephone\
    \ = nil;\n\n    if (ABMultiValueGetCount(multi) > 0) {\n        telephone = (__bridge_transfer\
    \ NSString*)ABMultiValueCopyValueAtIndex(multi, 0);\n        telephone = [telephone\
    \ stringByReplacingOccurrencesOfString:@\" \" withString:@\"\"];\n    }\n    CFRelease(multi);\n\
    \    CFRelease(addressBook);\n\n    return telephone;\n}\n```\n\n如果我们的新方法找到了与该联系人关联的电话号码，它会移除号码中的所有空格，因为这是在激活电话或短信时，创建指向苹果电话和短信应用的应用内链接所必需的。如果我们的方法找不到与该联系人关联的电话号码，则返回\
    \ `nil`。\n"
- fmt: "# URL schemes and linking between multitasking apps\n\nThere are several URL\
    \ schemes supported by native iOS applications that enable developers to create\
    \ buttons or links that open other apps on the user's iPhone, such as the Phone\
    \ app or Safari. Many apps also include support for passing in additional characters\
    \ via the URL string, such as an id that the linked app is able to interpret to\
    \ drill the user straight into a particular piece of content. You can find a list\
    \ of the URL schemes supported by Apple's own suite of apps on this web page:\n\
    \n`http://developer.apple.com/library/ios/#featuredarticles/iPhoneURLScheme_Reference/Introduction/Introduction.html`\n\
    \nIf you visit this page, you'll discover that the `tel:` URL scheme launches\
    \ Apple's Phone app on iPhone, and that `sms:` launches the Messages app.\n\n\
    **Tip:** you can also define a custom URL scheme for your own app (via the info\
    \ plist) to enable direct linking from other apps to yours.\n\nNext, we create\
    \ call and SMS link-retrieving methods in `BRBirthdayDetailViewController.m`.\
    \ These are virtually identical, and both make use of our `telephoneNumber` method:\n\
    \n```\n-(NSString *)callLink\n{\n    if (!self.birthday.addressBookID || [self.birthday.addressBookID\
    \ intValue]==0) return nil;\n    NSString *telephoneNumber = [self telephoneNumber];\n\
    \    if (!telephoneNumber) return nil;\n\n    NSString *callLink = [NSString stringWithFormat:@\"\
    tel:%@\",telephoneNumber];\n\n    if ([[UIApplication sharedApplication] canOpenURL:[NSURL\
    \ URLWithString:callLink]]) return callLink;\n\n    return nil;\n}\n```\n\n```\n\
    -(NSString *)smsLink\n{\n    if (!self.birthday.addressBookID || [self.birthday.addressBookID\
    \ intValue]==0) return nil;\n    NSString *telephoneNumber = [self telephoneNumber];\n\
    \    if (!telephoneNumber) return nil;\n\n    NSString *smsLink = [NSString stringWithFormat:@\"\
    sms:%@\",telephoneNumber];\n\n    if ([[UIApplication sharedApplication] canOpenURL:[NSURL\
    \ URLWithString:smsLink]]) return smsLink;\n\n    return nil;\n}\n```\n\nNotice\
    \ how in both methods we can actually check that the system links we're creating\
    \ are compatible with the device using `UIApplication`'s `canOpenURL:` method.\
    \ This is really handy because it enables us to check whether the user has installed\
    \ other apps with URL schemes that our app knows about and can link to directly.\n\
    \nThe `emailLink` method is very similar to the `telephoneNumber` method we wrote\
    \ earlier. Just like telephone numbers, multiple e-mails can be associated with\
    \ a contact. We'll check if the `email` property (`kABPersonEmailProperty`) exists\
    \ for the contact, and if it does, we'll check that there are one or more e-mails\
    \ associated with the contact and return the first by default:\n\n```\n-(NSString\
    \ *)emailLink\n{\n    if (!self.birthday.addressBookID || [self.birthday.addressBookID\
    \ intValue]==0) return nil;\n\n    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL,\
    \ NULL);\n\n    ABRecordRef record =  ABAddressBookGetPersonWithRecordID (addressBook,(ABRecordID)[self.birthday.addressBookID\
    \ intValue]);\n\n    ABMultiValueRef multi = ABRecordCopyValue(record, kABPersonEmailProperty);\n\
    \n    NSString *email = nil;\n    if (ABMultiValueGetCount(multi) > 0) {//check\
    \ if the contact has 1 or more emails assigned\n         email = (__bridge_transfer\
    \ NSString*)ABMultiValueCopyValueAtIndex(multi, 0);\n    }\n    CFRelease(multi);\n\
    \    CFRelease(addressBook);\n\n    if (email) {\n        NSString *emailLink\
    \ = [NSString stringWithFormat:@\"mailto:%@\",email];\n        //we can pre-populate\
    \ the email subject with the words Happy Birthday\n        emailLink = [emailLink\
    \ stringByAppendingString:@\"?subject=Happy%20Birthday\"];\n        if ([[UIApplication\
    \ sharedApplication] canOpenURL:[NSURL URLWithString:emailLink]]) return emailLink;\n\
    \    }\n\n    return nil;\n}\n```\n\nNow that we've created utility methods to\
    \ detect whether we can call, SMS, or e-mail a birthday contact, we'll check these\
    \ methods when we layout the list of buttons. We'll display a Call Friend button\
    \ only if we have a telephone number for the friend and are running on a device\
    \ that permits us to use the `tel:` URL scheme. *Birthday Reminder* might be installed\
    \ on an iPod Touch, for example, where the `tel:` URL scheme would not be recognized\
    \ by the operating system; therefore, we won't display a Call Friend button on\
    \ iPod Touch.\n\nNavigate to the `viewWillAppear:` method implementation of `BRBirthdayDetailViewController.m`\
    \ and modify the last part of the method code with the changes highlighted in\
    \ the following:\n\n```\nNSMutableArray *buttonsToShow = [NSMutableArray arrayWithObjects:self.facebookButton,self.callButton,\
    \ self.smsButton, self.emailButton, self.deleteButton, nil];\n\nNSMutableArray\
    \ *buttonsToHide = [NSMutableArray array];\n\n    if (self.birthday.facebookID\
    \ == nil) {\n        [buttonsToShow removeObject:self.facebookButton];\n     \
    \   [buttonsToHide addObject:self.facebookButton];\n    }\n\n    if ([self callLink]\
    \ == nil) {\n        [buttonsToShow removeObject:self.callButton];\n        [buttonsToHide\
    \ addObject:self.callButton];\n    }\n\n    if ([self smsLink] == nil) {\n   \
    \     [buttonsToShow removeObject:self.smsButton];\n        [buttonsToHide addObject:self.smsButton];\n\
    \    }\n\n    if ([self emailLink] == nil) {\n        [buttonsToShow removeObject:self.emailButton];\n\
    \        [buttonsToHide addObject:self.emailButton];\n    }\n\n    UIButton *button;\n\
    \nfor (button in buttonsToHide) {\n        button.hidden = YES;\n    }\n\n   \
    \ int i;\n\n    for (i=0;i<[buttonsToShow count];i++) {\n        button = [buttonsToShow\
    \ objectAtIndex:i];\nbutton.hidden = NO;\n        frame = button.frame;\n    \
    \    frame.origin.y = cY;\n        button.frame = frame;\n        cY += button.frame.size.height\
    \ + buttonGap;\n    }\n\n    self.scrollView.contentSize = CGSizeMake(320, cY);\n\
    ```\n\nIn this code, we now have two arrays: one containing references to the\
    \ buttons that we should display in the detail view and one containing references\
    \ to the buttons that we should hide for this birthday. If we can find an e-mail\
    \ for the birthday contact using the Address Book framework, then we'll show the\
    \ Email Friend button. If we can't, we won't show the Email button (see [Figure\
    \ 10-26](#Chapter10.html#fig_10_26)).\n\n![Image](images/9781430243748_Fig10-26.jpg)\n\
    \n**Figure 10-26.** Call/SMS/Email buttons are all displayed for this friend,\
    \ because, believe it or not, I have all my wife's contact details in my phone!\n\
    \nIt's all very well knowing that we can e-mail, call, or SMS a contact, but,\
    \ at the moment, our button actions do nothing at all. Let's implement the action\
    \ code:\n\n```\n- (IBAction)callButtonTapped:(id)sender {\nNSString *link = [self\
    \ callLink];\n    [[UIApplication sharedApplication] openURL:[NSURL URLWithString:link]];\n\
    }\n\n- (IBAction)smsButtonTapped:(id)sender {\nNSString *link = [self smsLink];\n\
    \    [[UIApplication sharedApplication] openURL:[NSURL URLWithString:link]];\n\
    }\n\n- (IBAction)emailButtonTapped:(id)sender {\nNSString *link = [self emailLink];\n\
    \    [[UIApplication sharedApplication] openURL:[NSURL URLWithString:link]];\n\
    }\n```\n\nBuild and run. Awesome, we can make calls, trigger SMS, and send Happy\
    \ Birthday from our app. ![Image](images/smile.jpg)\n\n**Note:** It's also possible\
    \ to create e-mail and SMS messages directly in our app using Apple's `MessageUI`\
    \ framework. Personally, I prefer to make the most of multitasking instead, but\
    \ check out the `MessageUI` framework documentation to handle the whole experience\
    \ inside your apps."
  raw: '#### URL schemes and linking between multitasking apps


    There are several URL schemes supported by native iOS applications that enable
    developers to create buttons or links that open other apps on the user''s iPhone,
    such as the Phone app or Safari. Many apps also include support for passing in
    additional characters via the URL string, such as an id that the linked app is
    able to interpret to drill the user straight into a particular piece of content.
    You can find a list of the URL schemes supported by Apple''s own suite of apps
    on this web page:


    `http://developer.apple.com/library/ios/#featuredarticles/iPhoneURLScheme_Reference/Introduction/Introduction.html.`


    If you visit this page, you''ll discover that the `tel:` URL scheme launches Apple''s
    Phone app on iPhone, and that `sms:` launches the Messages app.


    ***Tip:** you can also define a custom URL scheme for your own app (via the info
    plist) to enable direct linking from other apps to yours.*


    Next, we create call and SMS link-retrieving methods in `BRBirthdayDetailViewController.m`.
    These are virtually identical, and both make use of our `telephoneNumber` method:


    `-(NSString *)callLink`

    `{`

    `    if (!self.birthday.addressBookID || [self.birthday.addressBookID intValue]==0)
    return nil;`

    `    NSString *telephoneNumber = [self telephoneNumber];`

    `    if (!telephoneNumber) return nil;`


    `    NSString *callLink = [NSString stringWithFormat:@"tel:%@",telephoneNumber];`


    `    if ([[UIApplication sharedApplication] canOpenURL:[NSURL URLWithString:callLink]])
    return callLink;`


    `    return nil;`

    `}`


    `-(NSString *)smsLink`

    `{`

    `    if (!self.birthday.addressBookID || [self.birthday.addressBookID intValue]==0)
    return nil;`

    `    NSString *telephoneNumber = [self telephoneNumber];`

    `    if (!telephoneNumber) return nil;`


    `    NSString *smsLink = [NSString stringWithFormat:@"sms:%@",telephoneNumber];`


    `    if ([[UIApplication sharedApplication] canOpenURL:[NSURL URLWithString:smsLink]])
    return smsLink;`


    `    return nil;`

    `}`


    Notice how in both methods we can actually check that the system links we''re
    creating are compatible with the device using `UIApplication`''s `canOpenURL:`
    method. This is really handy because it enables us to check whether the user has
    installed other apps with URL schemes that our app knows about and can link to
    directly.


    The `emailLink` method is very similar to the `telephoneNumber` method we wrote
    earlier. Just like telephone numbers, multiple e-mails can be associated with
    a contact. We''ll check if the `email` property (`kABPersonEmailProperty`) exists
    for the contact, and if it does, we''ll check that there are one or more e-mails
    associated with the contact and return the first by default:


    `-(NSString *)emailLink`

    `{`

    `    if (!self.birthday.addressBookID || [self.birthday.addressBookID intValue]==0)
    return nil;`


    `    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL, NULL);`


    `    ABRecordRef record =  ABAddressBookGetPersonWithRecordID (addressBook,(ABRecordID)[self.birthday.addressBookID
    intValue]);`


    `    ABMultiValueRef multi = ABRecordCopyValue(record, kABPersonEmailProperty);`


    `    NSString *email = nil;`

    `    if (ABMultiValueGetCount(multi) > 0) {//check if the contact has 1 or more
    emails assigned`

    `         email = (__bridge_transfer NSString*)ABMultiValueCopyValueAtIndex(multi,
    0);`

    `    }`

    `    CFRelease(multi);`

    `    CFRelease(addressBook);`


    `    if (email) {`

    `        NSString *emailLink = [NSString stringWithFormat:@"mailto:%@",email];`

    `        //we can pre-populate the email subject with the words Happy Birthday`

    `        emailLink = [emailLink stringByAppendingString:@"?subject=Happy%20Birthday"];`

    `        if ([[UIApplication sharedApplication] canOpenURL:[NSURL URLWithString:emailLink]])
    return emailLink;`

    `    }`


    `    return nil;`

    `}`


    Now that we''ve created utility methods to detect whether we can call, SMS, or
    e-mail a birthday contact, we''ll check these methods when we layout the list
    of buttons. We''ll display a Call Friend button only if we have a telephone number
    for the friend and are running on a device that permits us to use the `tel:` URL
    scheme. *Birthday Reminder* might be installed on an iPod Touch, for example,
    where the `tel:` URL scheme would not be recognized by the operating system; therefore,
    we won''t display a Call Friend button on iPod Touch.


    Navigate to the `viewWillAppear:` method implementation of `BRBirthdayDetailViewController.m`
    and modify the last part of the method code with the changes highlighted in the
    following:


    `NSMutableArray *buttonsToShow = [NSMutableArray arrayWithObjects:self.facebookButton,self.callButton,
    self.smsButton, self.emailButton, self.deleteButton, nil];`


    **`NSMutableArray *buttonsToHide = [NSMutableArray array];`**


    **`    if (self.birthday.facebookID == nil) {`**

    **`        [buttonsToShow removeObject:self.facebookButton];`**

    **`        [buttonsToHide addObject:self.facebookButton];`**

    **`    }`**


    **`    if ([self callLink] == nil) {`**

    **`        [buttonsToShow removeObject:self.callButton];`**

    **`        [buttonsToHide addObject:self.callButton];`**

    **`    }`**


    **`    if ([self smsLink] == nil) {`**

    **`        [buttonsToShow removeObject:self.smsButton];`**

    **`        [buttonsToHide addObject:self.smsButton];`**

    **`    }`**


    **`    if ([self emailLink] == nil) {`**

    **`        [buttonsToShow removeObject:self.emailButton];`**

    **`        [buttonsToHide addObject:self.emailButton];`**

    **`    }`**


    `    UIButton *button;`


    **`for (button in buttonsToHide) {`**

    **`        button.hidden = YES;`**

    **`    }`**


    `    int i;`


    `    for (i=0;i<[buttonsToShow count];i++) {`

    `        button = [buttonsToShow objectAtIndex:i];`

    **`button.hidden = NO;`**

    `        frame = button.frame;`

    `        frame.origin.y = cY;`

    `        button.frame = frame;`

    `        cY += button.frame.size.height + buttonGap;`

    `    }`


    `    self.scrollView.contentSize = CGSizeMake(320, cY);`


    In this code, we now have two arrays: one containing references to the buttons
    that we should display in the detail view and one containing references to the
    buttons that we should hide for this birthday. If we can find an e-mail for the
    birthday contact using the Address Book framework, then we''ll show the Email
    Friend button. If we can''t, we won''t show the Email button (see [Figure 10-26](#Chapter10.html#fig_10_26)).


    ![Image](images/9781430243748_Fig10-26.jpg)


    **Figure 10-26.** Call/SMS/Email buttons are all displayed for this friend, because,
    believe it or not, I have all my wife''s contact details in my phone!


    It''s all very well knowing that we can e-mail, call, or SMS a contact, but, at
    the moment, our button actions do nothing at all. Let''s implement the action
    code:


    `- (IBAction)callButtonTapped:(id)sender {`

    **`NSString *link = [self callLink];`**

    **`    [[UIApplication sharedApplication] openURL:[NSURL URLWithString:link]];`**

    `}`


    `- (IBAction)smsButtonTapped:(id)sender {`

    **`NSString *link = [self smsLink];`**

    **`    [[UIApplication sharedApplication] openURL:[NSURL URLWithString:link]];`**

    `}`


    `- (IBAction)emailButtonTapped:(id)sender {`

    **`NSString *link = [self emailLink];`**

    **`    [[UIApplication sharedApplication] openURL:[NSURL URLWithString:link]];`**

    `}`


    Build and run. Awesome, we can make calls, trigger SMS, and send Happy Birthday
    from our app. ![Image](images/smile.jpg)


    ***Note:** It''s also possible to create e-mail and SMS messages directly in our
    app using Apple''s* `MessageUI` *framework. Personally, I prefer to make the most
    of multitasking instead, but check out the* `MessageUI` *framework documentation
    to handle the whole experience inside your apps.*'
  trans: "\n# 多任务应用中的 URL 方案与跨应用链接\n\niOS 原生应用支持多种 URL 方案，使开发者能够创建按钮或链接，以打开用户 iPhone\
    \ 上的其他应用（如电话应用或 Safari）。许多应用还支持通过 URL 字符串传递额外参数，例如链接应用可识别的 ID，从而将用户直接导航到特定内容。你可以在以下网页中找到苹果自家应用所支持的\
    \ URL 方案列表：\n\n`http://developer.apple.com/library/ios/#featuredarticles/iPhoneURLScheme_Reference/Introduction/Introduction.html`\n\
    \n访问该页面后，你会发现 `tel:` URL 方案可在 iPhone 上启动苹果的电话应用，而 `sms:` 方案则可启动信息应用。\n\n**提示：**\
    \ 你也可以通过 info plist 为自己的应用定义自定义 URL 方案，以实现其他应用到你的应用的直接链接。\n\n接下来，我们在 `BRBirthdayDetailViewController.m`\
    \ 中创建电话和短信链接的获取方法。这两个方法几乎完全相同，并且都使用了我们的 `telephoneNumber` 方法：\n\n```\n-(NSString\
    \ *)callLink\n{\n    if (!self.birthday.addressBookID || [self.birthday.addressBookID\
    \ intValue]==0) return nil;\n    NSString *telephoneNumber = [self telephoneNumber];\n\
    \    if (!telephoneNumber) return nil;\n\n    NSString *callLink = [NSString stringWithFormat:@\"\
    tel:%@\",telephoneNumber];\n\n    if ([[UIApplication sharedApplication] canOpenURL:[NSURL\
    \ URLWithString:callLink]]) return callLink;\n\n    return nil;\n}\n```\n\n```\n\
    -(NSString *)smsLink\n{\n    if (!self.birthday.addressBookID || [self.birthday.addressBookID\
    \ intValue]==0) return nil;\n    NSString *telephoneNumber = [self telephoneNumber];\n\
    \    if (!telephoneNumber) return nil;\n\n    NSString *smsLink = [NSString stringWithFormat:@\"\
    sms:%@\",telephoneNumber];\n\n    if ([[UIApplication sharedApplication] canOpenURL:[NSURL\
    \ URLWithString:smsLink]]) return smsLink;\n\n    return nil;\n}\n```\n\n注意，在这两个方法中，我们都可以通过\
    \ `UIApplication` 的 `canOpenURL:` 方法，实际检查所创建的系统链接是否与设备兼容。这非常实用，因为它使我们能够检查用户是否安装了我们的应用已知且可直连的其他包含\
    \ URL 方案的应用。\n\n`emailLink` 方法与我们之前编写的 `telephoneNumber` 方法非常相似。与电话号码一样，一个联系人也可以关联多个电子邮件地址。我们将检查该联系人是否存在\
    \ `email` 属性（`kABPersonEmailProperty`），如果存在，则检查是否关联了一个或多个电子邮件地址，并默认返回第一个：\n\n\
    ```\n-(NSString *)emailLink\n{\n    if (!self.birthday.addressBookID || [self.birthday.addressBookID\
    \ intValue]==0) return nil;\n\n    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL,\
    \ NULL);\n\n    ABRecordRef record =  ABAddressBookGetPersonWithRecordID (addressBook,(ABRecordID)[self.birthday.addressBookID\
    \ intValue]);\n\n    ABMultiValueRef multi = ABRecordCopyValue(record, kABPersonEmailProperty);\n\
    \n    NSString *email = nil;\n    if (ABMultiValueGetCount(multi) > 0) {//检查该联系人是否分配了一个或多个电子邮件地址\n\
    \         email = (__bridge_transfer NSString*)ABMultiValueCopyValueAtIndex(multi,\
    \ 0);\n    }\n    CFRelease(multi);\n    CFRelease(addressBook);\n\n    if (email)\
    \ {\n        NSString *emailLink = [NSString stringWithFormat:@\"mailto:%@\",email];\n\
    \        //我们可以预填充邮件主题为“生日快乐”\n        emailLink = [emailLink stringByAppendingString:@\"\
    ?subject=Happy%20Birthday\"];\n        if ([[UIApplication sharedApplication]\
    \ canOpenURL:[NSURL URLWithString:emailLink]]) return emailLink;\n    }\n\n  \
    \  return nil;\n}\n```\n\n现在我们已经创建了用于检测是否可以向生日联系人拨打电话、发送短信或邮件的工具方法，我们将在布局按钮列表时检查这些方法。只有当朋友有电话号码且当前设备允许使用\
    \ `tel:` URL 方案时，我们才会显示“拨打电话”按钮。*生日提醒* 应用可能安装在 iPod Touch 上，例如，在该设备上操作系统无法识别 `tel:`\
    \ URL 方案；因此，我们不会在 iPod Touch 上显示“拨打电话”按钮。\n\n导航到 `BRBirthdayDetailViewController.m`\
    \ 的 `viewWillAppear:` 方法实现，并按照以下突出显示的更改修改方法代码的最后部分：\n\n```\nNSMutableArray *buttonsToShow\
    \ = [NSMutableArray arrayWithObjects:self.facebookButton,self.callButton, self.smsButton,\
    \ self.emailButton, self.deleteButton, nil];\n\nNSMutableArray *buttonsToHide\
    \ = [NSMutableArray array];\n\n    if (self.birthday.facebookID == nil) {\n  \
    \      [buttonsToShow removeObject:self.facebookButton];\n        [buttonsToHide\
    \ addObject:self.facebookButton];\n    }\n\n    if ([self callLink] == nil) {\n\
    \        [buttonsToShow removeObject:self.callButton];\n        [buttonsToHide\
    \ addObject:self.callButton];\n    }\n\n    if ([self smsLink] == nil) {\n   \
    \     [buttonsToShow removeObject:self.smsButton];\n        [buttonsToHide addObject:self.smsButton];\n\
    \    }\n\n    if ([self emailLink] == nil) {\n        [buttonsToShow removeObject:self.emailButton];\n\
    \        [buttonsToHide addObject:self.emailButton];\n    }\n\n    UIButton *button;\n\
    \nfor (button in buttonsToHide) {\n        button.hidden = YES;\n    }\n\n   \
    \ int i;\n\n    for (i=0;i<[buttonsToShow count];i++) {\n        button = [buttonsToShow\
    \ objectAtIndex:i];\nbutton.hidden = NO;\n        frame = button.frame;\n    \
    \    frame.origin.y = cY;\n        button.frame = frame;\n        cY += button.frame.size.height\
    \ + buttonGap;\n    }\n\n    self.scrollView.contentSize = CGSizeMake(320, cY);\n\
    ```\n\n在这段代码中，我们现在有两个数组：一个包含应在详情视图中显示的按钮引用，另一个包含针对该生日应隐藏的按钮引用。如果我们能通过通讯录框架找到生日联系人的电子邮件地址，则显示“发送邮件”按钮。如果找不到，则不显示发送邮件按钮（参见图\
    \ 10-26）。\n\n![图片](img/9781430243748_Fig10-26.jpg)\n\n**图 10-26.** 这个朋友的所有通话/短信/邮件按钮都显示出来了，因为信不信由你，我手机里存了我妻子的所有联系方式！\n\
    \n知道我们可以给联系人发送邮件、拨打电话或发送短信固然很好，但目前，我们的按钮操作还没有任何实际功能。让我们来实现操作代码：\n\n```\n- (IBAction)callButtonTapped:(id)sender\
    \ {\nNSString *link = [self callLink];\n    [[UIApplication sharedApplication]\
    \ openURL:[NSURL URLWithString:link]];\n}\n\n- (IBAction)smsButtonTapped:(id)sender\
    \ {\nNSString *link = [self smsLink];\n    [[UIApplication sharedApplication]\
    \ openURL:[NSURL URLWithString:link]];\n}\n\n- (IBAction)emailButtonTapped:(id)sender\
    \ {\nNSString *link = [self emailLink];\n    [[UIApplication sharedApplication]\
    \ openURL:[NSURL URLWithString:link]];\n}\n```\n\n构建并运行。太棒了，我们现在可以从应用内拨打电话、触发短信并发送“生日快乐”祝福了。![图片](img/smile.jpg)\n\
    \n**注意：** 我们也可以使用苹果的 `MessageUI` 框架，直接在应用内创建邮件和短信。个人而言，我更倾向于充分利用多任务功能，但也可以查阅 `MessageUI`\
    \ 框架文档，在应用内部处理完整的体验。\n"
- fmt: "### Deleting Birthdays from the Data Store\n\nWhile we're implementing button\
    \ functions in the detail view controller, let's get the Delete Birthday button\
    \ up and running. Rather than deleting a data item immediately, it's good manners\
    \ to ask the user to confirm a delete before executing the permanent action. Momentarily\
    \ switch to the `BRBirthdayDetailViewController.h` header and declare that our\
    \ Birthday Detail controller implements the `UIActionSheetDelegate` protocol:\n\
    \n```\n@interface BRBirthdayDetailViewController : BRCoreViewController <UIActionSheetDelegate>\n\
    ```\n\nNow back in `BRBirthdayDetailViewController.m`, let's implement the `deleteButtonTapped:`\
    \ action and display a `Delete [Person Name]` action sheet:\n\n```\n- (IBAction)deleteButtonTapped:(id)sender\
    \ {\n    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:nil\
    \ delegate:self cancelButtonTitle:@\"Cancel\" destructiveButtonTitle:[NSString\
    \ stringWithFormat:@\"Delete %@\",self.birthday.name] otherButtonTitles:nil];\n\
    \    [actionSheet showInView:self.view];\n}\n```\n\nThe results should look like\
    \ [Figure 10-27](#Chapter10.html#fig_10_27) when you build and run.\n\n![Image](images/9781430243748_Fig10-27.jpg)\n\
    \n**Figure 10-27.** I'm deleting the wife, but that's between you and me!\n\n\
    Finally, we'll action the delete instruction if our user presses that big red\
    \ button. First, import `BRDModel.h` into `BRBirthdayDetailViewController.m`.\n\
    \nNow it's time to implement the `actionSheet:willDismissWithButtonIndex:` method\
    \ of the `UIActionSheetDelegate` protocol in `BRBirthdayDetailViewController.m`:\n\
    \n```\n#pragma mark - UIActionSheetDelegate\n\n- (void)actionSheet:(UIActionSheet\
    \ *)actionSheet willDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    //check\
    \ whether the user cancelled the delete instruction via the action sheet cancel\
    \ button\n    if (buttonIndex == actionSheet.cancelButtonIndex) return;\n\n  \
    \  //grab a reference to the Core Data managed object context\n    NSManagedObjectContext\
    \ *context = [BRDModel sharedInstance].managedObjectContext;\n    //delete this\
    \ birthday entity from the managed object context\n    [context deleteObject:self.birthday];\n\
    \    //save our delete change to the persistent Core Data store\n    [[BRDModel\
    \ sharedInstance] saveChanges];\n\n    //pop this view controller off the stack\
    \ and slide back to the home screen\n    [self.navigationController popViewControllerAnimated:YES];\n\
    }\n```\n\nDeleting a Core Data entity is pretty simple when it has no relationships\
    \ to other entities. We just grab a reference to the Core Data managed object\
    \ context and pass our reference to the birthday entity to the context's `deleteObject:`\
    \ method. We save our delete change to the Core Data persistent store via `BRDModel`'s\
    \ `saveChanges` utility method. Finally, we pop the detail view controller off\
    \ the navigation stack and instruct the navigation controller to slide back to\
    \ the Home view controller. You'll see the home table view updates automatically.\n\
    \n### Summary\n\nWhat a great start to [Day 4](#Part04.html#p4)! We've explored\
    \ some of the features of the Address Book framework that Apple provides third-party\
    \ apps access too.\n\nBeing able to access a user's contact list gives our app\
    \ a lot of responsibility and a trust that we won't share or misuse this sensitive\
    \ data. Very successful apps like *Path* got a lot of bad press in 2012 when it\
    \ was discovered that they were passing users' contacts to their server-side systems.\
    \ Events like this led to Apple tightening up privacy in iOS 6 and putting users\
    \ in control of the data they permit or don't permit apps access to. This is a\
    \ great change to iOS because it puts the power in the hands of the user, solves\
    \ the abuse of data privacy problem, and makes private data access more transparent\
    \ to the owners of the data—your users.\n\nAs long as the trust is not misused,\
    \ having this kind of access to the user's contacts can enable us to build really\
    \ useful features into our apps that facilitate fast and easy personalization\
    \ and data import that just makes life easier for the app user.\n\nNext up, we'll\
    \ learn how to work with Apple's new Social Framework in iOS 6 to enable users\
    \ to import details of their Facebook friend birthdays and before you know it,\
    \ we'll be presenting import lists of all the user's Facebook friends. The best\
    \ part is we've already written most of the user interface code for importing\
    \ from Facebook in this chapter thanks to the wonders of object-oriented code\
    \ design.\n\nGrab a coffee and I'll see you in five!\n\n![Image](images/ch.jpg)\n\
    \n## Chapter 11: Working with Facebook and the iOS 6 Social Framework\n\nEarlier\
    \ today, we succeeded in setting up *Birthday Reminder* to batch import birthdays\
    \ from the iPhone Address Book. But what would really enhance our app for millions\
    \ of potential users is to enable them to import friends’ birthdays from their\
    \ Facebook account.\n\nIn this chapter, we’ll take advantage of the new native\
    \ Facebook integration in iOS 6. Working with Apple's Accounts framework, you’ll\
    \ learn how to enable your users to authenticate *Birthday Reminder* with Facebook.\
    \ From there, you’ll discover how to use the new Social framework to access Facebook's\
    \ Graph API and enable users to import Facebook friends’ birthdays.\n\nBut we’re\
    \ not going to stop there. I’ll show you how to create your own custom view controller\
    \ for posting messages directly to friends’ Facebook Walls. It’s a helpful feature\
    \ for our users and has the added advantage of autogenerating a link back to the\
    \ *Birthday Reminder* Facebook page next to every Happy Birthday post shared!\n\
    \nFacebook has its own iOS SDK. But we won’t be using that at all. Everything\
    \ we need for integrating with Facebook's Graph API is built right into iOS 6.\n\
    \n### Registering a New App with Facebook.com\n\nIn order to create any kind of\
    \ app, iOS or otherwise, capable of integrating Facebook features such as posting\
    \ to friend's Facebook Walls, accessing the user's Facebook friends, reading the\
    \ user's Facebook newsfeed, and so on, you need to have a Facebook.com account\
    \ of your own. You also need to register as a Facebook developer at [`www.facebook.com/developer`](http://www.facebook.com/developer).\n\
    \nOnce you become a registered developer and gain access to Facebook's developer\
    \ web site, you’ll be able to navigate to the main Apps section. Click the Create\
    \ New App button. You are then prompted to enter a new App Name (see [Figure 11-1](#Chapter11.html#fig_11_1)).\n\
    \n![Image](images/9781430243748_Fig11-01.jpg)\n\n**Figure 11-1.** Creating a new\
    \ Facebook app on Facebook.com\n\nThe App Namespace is optional, so once you've\
    \ entered a valid App Display Name that isn't already taken, you're all set. Facebook\
    \ immediately supplies you with a new app ID for your app.\n\nYou don't have to\
    \ use the name *Birthday Reminder*, but whatever name you use, that is the name\
    \ that Facebook displays to new users when they go through the authentication\
    \ process before importing their Facebook friends into your app.\n\nThere is one\
    \ required modification to your new Facebook.com app to enable Apple's native\
    \ Accounts authentication code to work with Facebook: you need to add your iOS\
    \ app's bundle identifier to your Facebook app's settings. Tap the Edit Settings\
    \ link and scroll down to the tab titled Native iOS App. Open the tab and type\
    \ the bundle identifier of your app into the first text field. In my case, this\
    \ was `com.apress.BirthdayReminder`; but in your case, *this needs to match your\
    \ app's bundle identifier* (see [Figure 11-2](#Chapter11.html#fig_11_2)).\n\n\
    ![Image](images/9781430243748_Fig11-02.jpg)\n\n**Figure 11-2.** Adding an iOS\
    \ bundle identifier to the Facebook.com settings for our app\n\nIt's very important\
    \ that this bundle identifier matches your app's own native bundle identifier\
    \ because this is checked and referenced by the Account framework automatically\
    \ during the single sign-on authentication process."
  raw: '### Deleting birthdays from the data store


    While we''re implementing button functions in the detail view controller, let''s
    get the Delete Birthday button up and running. Rather than deleting a data item
    immediately, it''s good manners to ask the user to confirm a delete before executing
    the permanent action. Momentarily switch to the `BRBirthdayDetailViewController.h`
    header and declare that our Birthday Detail controller implements the `UIActionSheetDelegate`
    protocol:


    `@interface BRBirthdayDetailViewController : BRCoreViewController` **`<UIActionSheetDelegate>`**


    Now back in `BRBirthdayDetailViewController.m`, let''s implement the `deleteButtonTapped:`
    action and display a `Delete [Person Name]` action sheet:


    `- (IBAction)deleteButtonTapped:(id)sender {`

    **`    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:nil delegate:self
    cancelButtonTitle:@"Cancel" destructiveButtonTitle:[NSString stringWithFormat:@"Delete
    %@",self.birthday.name] otherButtonTitles:nil];`**

    **`    [actionSheet showInView:self.view];`**

    `}`


    The results should look like [Figure 10-27](#Chapter10.html#fig_10_27) when you
    build and run.


    ![Image](images/9781430243748_Fig10-27.jpg)


    **Figure 10-27.** I''m deleting the wife, but that''s between you and me!


    Finally, we''ll action the delete instruction if our user presses that big red
    button. First, import `BRDModel.h` into `BRBirthdayDetailViewController.m`.


    Now it''s time to implement the `actionSheet:willDismissWithButtonIndex:` method
    of the `UIActionSheetDelegate` protocol in `BRBirthdayDetailViewController.m`:


    `#pragma mark - UIActionSheetDelegate`


    `- (void)actionSheet:(UIActionSheet *)actionSheet willDismissWithButtonIndex:(NSInteger)buttonIndex`

    `{`

    `    //check whether the user cancelled the delete instruction via the action
    sheet cancel button`

    `    if (buttonIndex == actionSheet.cancelButtonIndex) return;`


    `    //grab a reference to the Core Data managed object context`

    `    NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;`

    `    //delete this birthday entity from the managed object context`

    `    [context deleteObject:self.birthday];`

    `    //save our delete change to the persistent Core Data store`

    `    [[BRDModel sharedInstance] saveChanges];`


    `    //pop this view controller off the stack and slide back to the home screen`

    `    [self.navigationController popViewControllerAnimated:YES];`

    `}`


    Deleting a Core Data entity is pretty simple when it has no relationships to other
    entities. We just grab a reference to the Core Data managed object context and
    pass our reference to the birthday entity to the context''s `deleteObject:` method.
    We save our delete change to the Core Data persistent store via `BRDModel`''s
    `saveChanges` utility method. Finally, we pop the detail view controller off the
    navigation stack and instruct the navigation controller to slide back to the Home
    view controller. You''ll see the home table view updates automatically.


    ### Summary


    What a great start to [Day 4](#Part04.html#p4)! We''ve explored some of the features
    of the Address Book framework that Apple provides third-party apps access too.


    Being able to access a user''s contact list gives our app a lot of responsibility
    and a trust that we won''t share or misuse this sensitive data. Very successful
    apps like *Path* got a lot of bad press in 2012 when it was discovered that they
    were passing users'' contacts to the their server-side systems. Events like this
    led to Apple tightening up privacy in iOS 6 and putting users in control of the
    data they permit or don''t permit apps access to. This is a great change to iOS
    because it puts the power in the hands of the user, solves the abuse of data privacy
    problem, and makes private data access more transparent to the owners of the data—your
    users.


    As long as the trust is not misused, having this kind of access to the user''s
    contacts can enable us to build really useful features into our apps that facilitate
    fast and easy personalization and data import that just makes life easier for
    the app user.


    Next up, we''ll learn how to work with Apple''s new Social Framework in iOS 6
    to enable users to import details of their Facebook friend birthdays and before
    you know it, we''ll be presenting import lists of all the user''s Facebook friends.
    The best part is we''ve already written most of the user interface code for importing
    from Facebook in this chapter thanks to the wonders of object-oriented code design.


    Grab a coffee and I''ll see you in five!


    ![Image](images/ch.jpg)


    ## **Chapter 11**


    ## **Working with Facebook and the iOS 6 Social Framework**


    Earlier today, we succeeded in setting up *Birthday Reminder* to batch import
    birthdays from the iPhone Address Book. But what would really enhance our app
    for millions of potential users is to enable them to import friends’ birthdays
    from their Facebook account.


    In this chapter, we’ll take advantage of the new native Facebook integration in
    iOS 6\. Working with Apple’s Accounts framework, you’ll learn how to enable your
    users to authenticate *Birthday Reminder* with Facebook. From there, you’ll discover
    how to use the new Social framework to access Facebook’s Graph API and enable
    users to import Facebook friends’ birthdays.


    But we’re not going to stop there. I’ll show you how to create your own custom
    view controller for posting messages directly to friends’ Facebook Walls. It’s
    a helpful feature for our users and has the added advantage of autogenerating
    a link back to the *Birthday Reminder* Facebook page next to every Happy Birthday
    post shared!


    Facebook has its own iOS SDK. But we won’t be using that at all. Everything we
    need for integrating with Facebook’s Graph API is built right into iOS 6.


    ### Registering a new app with Facebook.com


    In order to create any kind of app, iOS or otherwise, capable of integrating Facebook
    features such as posting to friend’s Facebook Walls, accessing the user’s Facebook
    friends, reading the user’s Facebook newsfeed, and so on, you need to have a Facebook.com
    account of your own. You also need to register as a Facebook developer at [`www.facebook.com/developer`](http://www.facebook.com/developer).


    Once you become a registered developer and gain access to Facebook’s developer
    web site, you’ll be able to navigate to the main Apps section. Click the Create
    New App button. You are then prompted to enter a new App Name (see [Figure 11-1](#Chapter11.html#fig_11_1)).


    ![Image](images/9781430243748_Fig11-01.jpg)


    **Figure 11-1.** Creating a new Facebook app on Facebook.com


    The App Namespace is optional, so once you’ve entered a valid App Display Name
    that isn’t already taken, you’re all set. Facebook immediately supplies you with
    a new app ID for your app.


    You don’t have to use the name *Birthday Reminder*, but whatever name you use,
    that is the name that Facebook displays to new users when they go through the
    authentication process before importing their Facebook friends into your app.


    There is one required modification to your new Facebook.com app to enable Apple’s
    native Accounts authentication code to work with Facebook: you need to add your
    iOS app’s bundle identifier to your Facebook app’s settings. Tap the Edit Settings
    link and scroll down to the tab titled Native iOS App. Open the tab and type the
    bundle identifier of your app into the first text field. In my case, this was
    `com.apress.BirthdayReminder`; but in your case, *this needs to match your app’s
    bundle identifier* (see [Figure 11-2](#Chapter11.html#fig_11_2)).


    ![Image](images/9781430243748_Fig11-02.jpg)


    **Figure 11-2.** Adding an iOS bundle identifier to the Facebook.com settings
    for our app


    It’s very important that this bundle identifier matches your app’s own native
    bundle identifier because this is checked and referenced by the Account framework
    automatically during the single sign-on authentication process.'
  trans: "\n### 从数据存储中删除生日\n\n在详细视图控制器中实现按钮功能时，让我们让“删除生日”按钮运转起来。在执行永久操作之前，请求用户确认删除是一种良好做法。现在切换到\
    \ `BRBirthdayDetailViewController.h` 头文件，声明生日详细控制器实现了 `UIActionSheetDelegate`\
    \ 协议：\n\n```\n@interface BRBirthdayDetailViewController : BRCoreViewController\
    \ <UIActionSheetDelegate>\n```\n\n现在回到 `BRBirthdayDetailViewController.m`，实现 `deleteButtonTapped:`\
    \ 操作并显示一个“删除 [姓名]”操作表单：\n\n```\n- (IBAction)deleteButtonTapped:(id)sender {\n\
    \    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:nil delegate:self\
    \ cancelButtonTitle:@\"取消\" destructiveButtonTitle:[NSString stringWithFormat:@\"\
    删除 %@\",self.birthday.name] otherButtonTitles:nil];\n    [actionSheet showInView:self.view];\n\
    }\n```\n\n构建并运行后，结果应如图 10-27 所示。\n\n![图片](img/9781430243748_Fig10-27.jpg)\n\n\
    **图 10-27.** 我正在删除老婆，但这事只有你知我知！\n\n最后，如果用户按下了那个大红按钮，我们将执行删除指令。首先，将 `BRDModel.h`\
    \ 导入 `BRBirthdayDetailViewController.m`。\n\n现在是时候在 `BRBirthdayDetailViewController.m`\
    \ 中实现 `UIActionSheetDelegate` 协议的 `actionSheet:willDismissWithButtonIndex:` 方法了：\n\
    \n```\n#pragma mark - UIActionSheetDelegate\n\n- (void)actionSheet:(UIActionSheet\
    \ *)actionSheet willDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    //检查用户是否通过操作表单的取消按钮取消了删除指令\n\
    \    if (buttonIndex == actionSheet.cancelButtonIndex) return;\n\n    //获取 Core\
    \ Data 托管对象上下文的引用\n    NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
    \    //从托管对象上下文中删除此生日实体\n    [context deleteObject:self.birthday];\n    //将删除更改保存到持久化\
    \ Core Data 存储中\n    [[BRDModel sharedInstance] saveChanges];\n\n    //将此视图控制器从导航堆栈中弹出，并滑动返回主屏幕\n\
    \    [self.navigationController popViewControllerAnimated:YES];\n}\n```\n\n删除一个\
    \ Core Data 实体在它与其他实体没有关系时相当简单。我们只需获取 Core Data 托管对象上下文的引用，然后将生日实体的引用传递给上下文的 `deleteObject:`\
    \ 方法。我们通过 `BRDModel` 的 `saveChanges` 工具方法将删除更改保存到 Core Data 持久化存储中。最后，我们将详细视图控制器从导航堆栈中弹出，并指示导航控制器滑动回主视图控制器。你会看到主页表格视图自动更新。\n\
    \n### 总结\n\n第 4 天 真是一个好的开始！我们已经探索了苹果提供给第三方应用访问权限的通讯录框架的一些特性。\n\n能够访问用户的联系人列表赋予了我们应用巨大的责任，以及用户信任我们不会分享或滥用这些敏感数据。像\
    \ *Path* 这样非常成功的应用在 2012 年遭遇了大量负面报道，当时发现它们将用户联系人传递给服务器端系统。诸如此类的事件促使苹果在 iOS 6 中加强了隐私保护，让用户能够控制允许或不允许应用访问的数据。这是\
    \ iOS 的一项重大改变，因为它将权力交到了用户手中，解决了数据隐私滥用问题，并使私有数据访问对数据所有者——也就是你的用户——更加透明。\n\n只要不滥用这种信任，能访问用户的联系人列表，我们就可以在应用中构建真正有用的功能，实现快速简便的个性化和数据导入，让应用用户的生活更轻松。\n\
    \n接下来，我们将学习如何使用苹果在 iOS 6 中新增的社交框架，让用户能够导入他们 Facebook 好友的生日信息。很快，我们将展示所有用户 Facebook\
    \ 好友的导入列表。最棒的是，得益于面向对象代码设计的奇妙之处，我们在本章中已经编写了大部分用于从 Facebook 导入数据的用户界面代码。\n\n喝杯咖啡，我们五分钟后见！\n\
    \n![图片](img/ch.jpg)\n\n## 第 11 章：使用 Facebook 和 iOS 6 社交框架\n\n今天早些时候，我们成功设置了 *生日提醒*\
    \ 应用，从 iPhone 通讯录批量导入了生日信息。但真正能增强我们应用对数百万潜在用户吸引力的，是让他们能够从 Facebook 账户导入朋友的生日。\n\
    \n在本章中，我们将利用 iOS 6 原生的 Facebook 集成功能。通过使用苹果的账户框架，你将学习如何让用户使用 Facebook 认证 *生日提醒*。在此基础上，你将发现如何使用新的社交框架访问\
    \ Facebook 的 Graph API，并让用户导入 Facebook 好友的生日。\n\n但我们不会止步于此。我将向你展示如何创建你自己的自定义视图控制器，用于直接向好友的\
    \ Facebook 动态发布消息。这对我们的用户来说是一个有用的功能，并且还有一个额外的好处：每个分享的生日快乐帖子旁会自动生成一个回到 *生日提醒* Facebook\
    \ 页面的链接！\n\nFacebook 有自己的 iOS SDK，但我们完全不会用到它。我们与 Facebook Graph API 集成所需的一切都已内置于\
    \ iOS 6 中。\n\n### 在 Facebook.com 上注册新应用\n\n为了创建任何能够集成 Facebook 功能（例如发布到好友的 Facebook\
    \ 动态、访问用户的 Facebook 好友、读取用户的 Facebook 新闻推送等）的应用（无论是 iOS 还是其他平台），你需要拥有自己的 Facebook.com\
    \ 账户。你还需要在 [`www.facebook.com/developer`](http://www.facebook.com/developer) 注册成为\
    \ Facebook 开发者。\n\n一旦你成为注册开发者并访问 Facebook 的开发者网站，你将能够导航到主应用部分。点击“创建新应用”按钮。系统会提示你输入一个新的应用名称（参见图\
    \ 11-1）。\n\n![图片](img/9781430243748_Fig11-01.jpg)\n\n**图 11-1.** 在 Facebook.com\
    \ 上创建新的 Facebook 应用\n\n应用命名空间是可选的，因此一旦你输入了一个未被占用的有效应用显示名称，就一切就绪了。Facebook 会立即为你的应用提供一个新应用\
    \ ID。\n\n你不必使用 *生日提醒* 这个名称，但无论你使用什么名称，当新用户在将 Facebook 好友导入你的应用之前进行认证时，Facebook\
    \ 都会向用户显示这个名称。\n\n为了让苹果原生的账户认证代码能与 Facebook 协同工作，你需要对你的新 Facebook.com 应用进行一项必要的修改：将你的\
    \ iOS 应用包标识符添加到你的 Facebook 应用设置中。点击“编辑设置”链接，滚动到标题为“原生 iOS 应用”的选项卡。打开该选项卡，在第一个文本字段中输入你应用的包标识符。就我而言，它是\
    \ `com.apress.BirthdayReminder`；但对你来说，*这必须与你应用的包标识符匹配*（参见图 11-2）。\n\n![图片](img/9781430243748_Fig11-02.jpg)\n\
    \n**图 11-2.** 为我们的应用在 Facebook.com 设置中添加 iOS 包标识符\n\n这个包标识符与你应用的原生包标识符匹配非常重要，因为在单点登录认证过程中，账户框架会自动检查并引用它。\n"
- fmt: "### Creating a Facebook Import View Controller\n\nEarlier today (in [Chapter\
    \ 10](#Chapter10.html#ch10)), we put a lot of hard work into creating our Address\
    \ Book Import view controller. During that process, we created `BRImportViewController`,\
    \ a class that both the address book and Facebook import view controllers would\
    \ subclass. Now we’ll see how those development steps will save us a great deal\
    \ of time creating an Import view controller for Facebook in this stage of the\
    \ project. Open your storyboard. Use your mouse to multiselect the Address Book\
    \ view controller and its parent navigation controller scenes, as shown in [Figure\
    \ 11-3](#Chapter11.html#fig_11_3).\n\n![Image](images/9781430243748_Fig11-03.jpg)\n\
    \n**Figure 11-3.** Multiselecting storyboard scenes\n\nUsing the keyboard, perform\
    \ a ![Image](images/U002a.jpg)C shortcut or click Edit ![Image](images/U001.jpg)\
    \ Copy, and then ![Image](images/U002a.jpg)V or Edit ![Image](images/U001.jpg)\
    \ Paste. You should be able to duplicate the two view controllers in your storyboard.\
    \ Drag your duplicate view controllers to a new space in the storyboard and change\
    \ the navigation bar title to **Facebook**. Select the new navigation controller,\
    \ and using the attributes inspector change, its `Identifier` property to `ImportFacebook`.\n\
    \nOpen `BRHomeViewController.m` and just like presenting the Address Book view\
    \ controller, implement the `importFromFacebookTapped:` action method:\n\n```\n\
    - (IBAction)importFromFacebookTapped:(id)sender {\n    UINavigationController\
    \ *navigationController = [self.storyboard\n        instantiateViewControllerWithIdentifier:@\"\
    ImportFacebook\"];\n    [self.navigationController presentViewController:navigationController\
    \ animated:YES\n        completion:nil];\n}\n```\n\nLet’s now subclass our core\
    \ Import view controller to create the Facebook import view controller. Select\
    \ the `view-controllers` group in the Project Navigator, and then create a new\
    \ subclass of `BRImportViewController` and name it `BRImportFacebookViewController`.\n\
    \nWith your Facebook import view controller selected in the storyboard, use the\
    \ identity inspector to change its custom class to our new `BRImportFacebookViewController`\
    \ class, as shown in [Figure 11-4](#Chapter11.html#fig_11_4).\n\n![Image](images/9781430243748_Fig11-04.jpg)\n\
    \n**Figure 11-4.** Changing the custom class to the new Facebook subclass in our\
    \ storyboard\n\nBuild and run. You should now be able to present and dismiss (Cancel)\
    \ the Facebook view controller in your app (see [Figure 11-5](#Chapter11.html#fig_11_5)).\n\
    \n![Image](images/9781430243748_Fig11-05.jpg)\n\n**Figure 11-5.** Modally presented\
    \ empty Facebook import view controller\n\n### Authenticating with Facebook Using\
    \ the Accounts Framework\n\nIn order for *Birthday Reminder* to be permitted to\
    \ retrieve Facebook friends’ birthdays, our user needs to first authorize our\
    \ app to communicate with Facebook’s API on their behalf. We’re going to handle\
    \ all the Facebook authentication process in our model singleton class, `BRDModel`.\n\
    \nLet’s begin by adding the Accounts and Social frameworks to our project. As\
    \ you’ve done in previous chapters, select the `BirthdayReminder` project in the\
    \ Project Navigator, then select the `BirthdayReminder` target, and finally select\
    \ the Build Phases tab. Then tap the Add Framework button under Link Binary with\
    \ Libraries, and add both the Accounts and Social frameworks. Once you’ve added\
    \ both frameworks to your project, drag and drop them both inside the `Frameworks`\
    \ group of the Project Navigator, as shown in [Figure 11-6](#Chapter11.html#fig_11_6).\n\
    \n![Image](images/9781430243748_Fig11-06.jpg)\n\n**Figure 11-6.** Accounts and\
    \ Social frameworks added to our project\n\nNow open `BRDModel.h` and declare\
    \ a new public method, `fetchFacebookBirthdays`, which our Facebook import view\
    \ controller will invoke when it appears:\n\n```\n- (void)fetchFacebookBirthdays;\n\
    ```\n\nSwitch to the `BRDModel.m` source file and import the Accounts and Social\
    \ frameworks:\n\n```\n#import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\
    ```\n\nOnce our user successfully authenticates with Facebook, we’ll have a reference\
    \ to an authenticated account. By retaining that Facebook account reference in\
    \ our model, we’ll be able to call Facebook’s API, post to a Facebook Wall—or\
    \ any of the other features offered by Facebook’s Graph API.\n\nRight at the top\
    \ of `BRDModel.m`, before the class implementation, let’s now add a new Facebook\
    \ action enumerator and a private interface for `BRDModel` that declares two new\
    \ private properties `facebookAccount` (our reference to the authenticated Facebook\
    \ account) and `currentFacebookAction` (a property to track the current Facebook\
    \ Graph API action in process):\n\n```\ntypedef enum : int\n{\n    FacebookActionGetFriendsBirthdays\
    \ = 1,\n    FacebookActionPostToWall\n}FacebookAction;\n\n@interface BRDModel()\n\
    \n@property (strong) ACAccount *facebookAccount;\n@property FacebookAction currentFacebookAction;\n\
    \n@end\n```\n\nLater in this chapter, we’re going to write code to post to a friend’s\
    \ Facebook Wall; so we’re planning ahead here for multiple Facebook processes.\n\
