  raw: '#### Subclassing: creating a core view controller


    We now have three custom view controllers in our project. Each of those view controllers
    is a subclass of Apple’s `UIViewController` class. Now here’s a very handy technique
    I’d like to introduce: we can create a core sub class of `UIViewController` and
    then tweak all of our individual view controller classes to subclass the core
    view controller rather than `UIViewController` directly. The benefit of doing
    this is that we can then add common/shared methods and properties to the core
    view controller class, and all individual view controllers will inherit those
    methods and properties automatically.


    Confused? Or does that make perfect sense?! It should become clearer once we get
    into the code.


    First, let’s create our new core view controller class. Select the `view-controllers`
    group in the project navigator and then File ![Image](images/U001.jpg) New ![Image](images/U001.jpg)
    File to choose the Objective-C class option from the Cocoa Touch file templates.
    Name the new class `BRCoreViewController` and ensure the subclass is set to `UIViewController`.


    Type in the following two Interface Builder action method signatures directly
    into the `BRCoreViewController.h` header:


    `#import <UIKit/UIKit.h>`


    `@interface BRCoreViewController : UIViewController`


    **`- (IBAction)cancelAndDismiss:(id)sender;`**

    **`- (IBAction)saveAndDismiss:(id)sender;`**


    `@end`


    Switch to `BRCoreViewController.m` and begin deleting all the default method code
    that Xcode has added from the file template. Replace it with the following implementation:


    `#import "BRCoreViewController.h"`


    `@interface BRCoreViewController ()`


    `@end`


    `@implementation BRCoreViewController`


    **`-(void) viewDidLoad`**

    **`{`**

    **`    [super viewDidLoad];`**

    **`    self.view.backgroundColor = [UIColor grayColor];`**

    **`}`**


    **`-(IBAction)cancelAndDismiss:(id)sender`**

    **`{`**

    **`    NSLog(@"Cancel");`**

    **`    [self dismissViewControllerAnimated:YES completion:^{`**

    **`        //view controller dismiss animation completed`**

    **`    }];`**

    **`}`**


    **`- (IBAction)saveAndDismiss:(id)sender`**

    **`{`**

    **`    NSLog(@"Save");`**

    **`    [self dismissViewControllerAnimated:YES completion:^{`**

    **`        //view controller dismiss animation completed`**

    **`    }];`**

    **`}`**


    `@end`


    In addition to the `cancelAndDismiss:` and `saveAndDismiss:` action methods, we’re
    setting our view’s background color to gray via the `viewDidLoad` method; this
    results in any subclass of `BRCoreViewController` automatically inheriting this
    code and coloring their own view gray. Clever!


    Open the header files of the view controllers we’ve created so far: `BRHomeViewController.h`,
    `BRBirthdayDetailViewController.h`, and `BRBirthdayEditViewController.h`. All
    three classes currently inherit from `UIViewController` directly. Change this
    so that they each inherit from `BRCoreViewController` instead:


    For `BRHomeViewController.h`:


    `#import <UIKit/UIKit.h>`

    **`#import "BRCoreViewController.h"`**


    **`@interface BRHomeViewController : BRCoreViewController`**


    `@end`


    For `BRBirthdayDetailViewController.h`:


    `#import <UIKit/UIKit.h>`

    **`#import "BRCoreViewController.h"`**


    **`@interface BRHomeViewController : BRCoreViewController`**


    `@end`


    For `BRBirthdayEditViewController.h`:


    `#import <UIKit/UIKit.h>`

    **`#import "BRCoreViewController.h"`**


    **`@interface BRBirthdayEditViewController : BRCoreViewController`**

    ~~`- (IBAction)cancelAndDismiss:(id)sender;`~~


    `@end`


    Note how we should also delete the `cancelAndDismiss:` action method from `BRBirthdayEditViewController.h`
    because this action is now handled by the `BRCoreViewController` superclass. Switch
    to `BRBirthdayEditViewController.m` and remove the entire implementation of `cancelAndDismiss:`.


    We have yet to connect our Save button in the birthday edit view to our newly
    added `saveAndDismiss:` action. Control-drag from the Save button to its view
    controller owner, as shown in [Figure 5-19](#Chapter05.html#fig_5_19). You’ll
    be prompted with all of the Interface Builder outlets and action connections.
    Select the `saveAndDismiss` action. Do you see how it was inherited from our core
    view controller?


    ![Image](images/9781430243748_Fig05-19.jpg)


    **Figure 5-19.** Connecting the Save bar button item to the saveAndDismiss: action


    Build and run (see [Figure 5-20](#Chapter05.html#fig_5_20)). Hey, has every view
    turned gray?! Here’s where the penny should (hopefully) drop. By taking advantage
    of adding a core view controller subclass, we’re able to change every single instance
    of any view controller that subclasses our core view controller in just one place:
    the core view controller class code. At the moment, every view controller inherits
    the gray background view color setting code. Can you see how we might extend this
    technique further for *Birthday Reminder*? All of our views have a custom background
    image in the designs, a checkered background like our launch image. In one convenient
    place, we’ll be able to add this image to the background of every view in our
    app that subclasses core view controller. We’ll do this when we get to the chapter
    on skinning, but for now, we’ve got a bunch of scenes to add to our storyboard.


    ![Image](images/9781430243748_Fig05-20.jpg)


    **Figure 5-20.** The benefits of subclassing view controllers—if you like gray,
    that is


    Our Edit Birthday view controller is used for both adding and editing birthdays.
    So we’ll create a second segue connection to the Edit Birthday navigation controller.
    Add an Edit bar button item to the right side of the Birthday Detail navigation
    bar, and then Control-drag from the new button to the Edit Birthday navigation
    controller. Select Modal from the Storyboard Segue transition options (see [Figure
    5-21](#Chapter05.html#fig_5_21)).


    ![Image](images/9781430243748_Fig05-21.jpg)


    **Figure 5-21.** Multiple segue connections to the Edit Birthday navigation controller'
  trans: "\n### 子类化：创建核心视图控制器\n\n现在我们的项目中有了三个自定义视图控制器。每个视图控制器都是苹果 `UIViewController`\
    \ 类的子类。接下来我要介绍一个非常实用的技巧：我们可以创建一个 `UIViewController` 的核心子类，然后调整所有独立的视图控制器类，让它们继承这个核心视图控制器，而不是直接继承\
    \ `UIViewController`。这样做的好处是，我们可以将公共/共享的方法和属性添加到核心视图控制器类中，而所有独立的视图控制器将自动继承这些方法和属性。\n\
    \n有点困惑？还是觉得完全合理？等我们进入代码环节后，一切就会变得更清晰。\n\n首先，创建新的核心视图控制器类。在项目导航器中选择 `view-controllers`\
    \ 组，然后依次点击 File ![Image](img/U001.jpg) New ![Image](img/U001.jpg) File，从 Cocoa\
    \ Touch 文件模板中选择 Objective-C 类选项。将新类命名为 `BRCoreViewController`，并确保父类设置为 `UIViewController`。\n\
    \n将以下两个 Interface Builder 操作方法签名直接输入到 `BRCoreViewController.h` 头文件中：\n\n```\n\
    #import <UIKit/UIKit.h>\n\n@interface BRCoreViewController : UIViewController\n\
    \n- (IBAction)cancelAndDismiss:(id)sender;\n- (IBAction)saveAndDismiss:(id)sender;\n\
    \n@end\n```\n\n切换到 `BRCoreViewController.m`，开始删除 Xcode 从文件模板中添加的所有默认方法代码，并用以下实现替换：\n\
    \n```\n#import \"BRCoreViewController.h\"\n\n@interface BRCoreViewController ()\n\
    \n@end\n\n@implementation BRCoreViewController\n\n- (void)viewDidLoad\n{\n   \
    \ [super viewDidLoad];\n    self.view.backgroundColor = [UIColor grayColor];\n\
    }\n\n- (IBAction)cancelAndDismiss:(id)sender\n{\n    NSLog(@\"Cancel\");\n   \
    \ [self dismissViewControllerAnimated:YES completion:^{\n        //视图控制器解除动画完成\n\
    \    }];\n}\n\n- (IBAction)saveAndDismiss:(id)sender\n{\n    NSLog(@\"Save\");\n\
    \    [self dismissViewControllerAnimated:YES completion:^{\n        //视图控制器解除动画完成\n\
    \    }];\n}\n\n@end\n```\n\n除了 `cancelAndDismiss:` 和 `saveAndDismiss:` 这两个操作方法外，我们还通过\
    \ `viewDidLoad` 方法将视图的背景色设置为灰色；这样一来，任何 `BRCoreViewController` 的子类都会自动继承这段代码，并将自己的视图背景设为灰色。非常巧妙！\n\
    \n打开我们已经创建的视图控制器的头文件：`BRHomeViewController.h`、`BRBirthdayDetailViewController.h`\
    \ 和 `BRBirthdayEditViewController.h`。目前这三个类都直接继承自 `UIViewController`。请修改它们，使其分别继承自\
    \ `BRCoreViewController`：\n\n对于 `BRHomeViewController.h`：\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"BRCoreViewController.h\"\n\n@interface BRHomeViewController : BRCoreViewController\n\
    \n@end\n```\n\n对于 `BRBirthdayDetailViewController.h`：\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"BRCoreViewController.h\"\n\n@interface BRBirthdayDetailViewController\
    \ : BRCoreViewController\n\n@end\n```\n\n对于 `BRBirthdayEditViewController.h`：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface\
    \ BRBirthdayEditViewController : BRCoreViewController\n- (IBAction)cancelAndDismiss:(id)sender;\n\
    \n@end\n```\n\n请注意，我们还应该从 `BRBirthdayEditViewController.h` 中删除 `cancelAndDismiss:`\
    \ 操作方法，因为该操作现在由父类 `BRCoreViewController` 处理。切换到 `BRBirthdayEditViewController.m`，删除\
    \ `cancelAndDismiss:` 的整个实现。\n\n我们还没有将生日编辑视图中的“保存”按钮连接到新添加的 `saveAndDismiss:`\
    \ 操作。从“保存”按钮按住 Control 键拖动到其视图控制器的所有者，如图 Figure 5-19 所示。系统会提示你所有 Interface Builder\
    \ 的出口和操作连接。选择 `saveAndDismiss` 操作。你是否看到了它是如何从核心视图控制器继承而来的？\n\n![Image](img/9781430243748_Fig05-19.jpg)\n\
    \n**图 5-19.** 将“保存”栏按钮项连接到 `saveAndDismiss:` 操作\n\n构建并运行（参见 Figure 5-20）。嘿，每个视图都变成灰色了吗？！现在你应该（希望如此）恍然大悟了。通过利用添加核心视图控制器子类的方式，我们只需在一个地方——核心视图控制器类的代码中——就能修改所有继承核心视图控制器的视图控制器的每个实例。目前，每个视图控制器都继承了灰色背景视图颜色的设置代码。你能看出我们如何将这一技巧进一步扩展到\
    \ *Birthday Reminder* 中吗？在我们设计中，所有视图都有自定义的背景图片，就像启动画面一样的棋盘格背景。在一个方便的位置，我们将能够为应用中所有继承核心视图控制器的视图添加此背景图片。我们会在关于界面皮肤化的章节中实现这个功能，但现在，我们还有一堆场景需要添加到故事板中。\n\
    \n![Image](img/9781430243748_Fig05-20.jpg)\n\n**图 5-20.** 视图控制器子类化的好处——如果你喜欢灰色的话\n\
    \n我们的编辑生日视图控制器既用于添加生日也用于编辑生日。因此，我们将创建第二个到编辑生日导航控制器的 Segue 连接。在生日详情导航栏的右侧添加一个编辑栏按钮项，然后从新按钮按住\
    \ Control 键拖动到编辑生日导航控制器。从故事板 Segue 转换选项中选择 Modal（参见 Figure 5-21）。\n\n![Image](img/9781430243748_Fig05-21.jpg)\n\
    \n**图 5-21.** 到编辑生日导航控制器的多个 Segue 连接\n"
- fmt: '#### Adding a note-taking view controller


    When users view one of their friend’s birthdays in the `Birthday Detail` view,
    they’ll be able to edit notes on their friends, such as gift ideas. As a general
    rule, I recommend presenting modal view controllers whenever your app is enabling
    your user to edit or add data. This technique creates a distinction between viewing
    saved data and editing saved data.


    Add a new view controller scene to your storyboard to the right of the `Birthday
    Detail` scene. As we’re going to present the new note editing view controller
    modally, we’ll embed it in its own navigation controller like we did with the
    `Edit Birthday` view controller. Select the new view controller. From the menu
    bar, select `Editor` `Embed In` `Navigation Controller`. Now title the new notes
    view controller `Edit Notes` and add `Cancel` and `Save` buttons like we did for
    the `Edit Birthday` view controller (see [Figure 5-22](#Chapter05.html#fig_5_22)).


    Drag and drop a new Round Rect button (not to be confused with the bar button
    item) from the Object Library onto the `Birthday Detail` view, and title it `Edit
    Notes`.


    Your new view controller and navigation controller should resemble [Figure 5-22](#Chapter05.html#fig_5_22).


    ![Image](images/9781430243748_Fig05-22.jpg)


    **Figure 5-22.** Adding a note-taking view


    Now connect the new view controller with a modal segue by control-dragging from
    the `Edit Notes` button to the new navigation controller. Select the `Modal` option.


    Now to create a view controller class for the `Edit Notes` scene. Create and add
    a new class to the `view-controllers` group and name it `BRNotesEditViewController`.
    This time, instead of subclassing `UIViewController`, simply subclass `BRCoreViewController`
    (see [Figure 5-23](#Chapter05.html#fig_5_23)).


    ![Image](images/9781430243748_Fig05-23.jpg)


    **Figure 5-23.** `BRNotesEditViewController` subclasses `BRCoreViewController`


    Back in your storyboard, select the new `Edit Notes` view controller, and using
    the identity inspector, change the custom class to `BRNotesEditViewController`.
    Now Control-drag from the `Cancel` and `Save` bar button items to create Interface
    Builder connections to the `cancelAndDismiss:` and `saveAndDismiss:` action methods
    of the owning view controller respectively.


    Build and run to confirm that you can now open and dismiss the new `Edit Notes`
    view controller.


    #### Flip to a settings view


    Let’s continue to build our web of view controller navigation. Add a new view
    controller to your storyboard just below the `Birthday Detail` view controller.
    Embed it in a navigation controller. Add a title, `Settings`, and a `Done` bar
    button item to the right of the title (see [Figure 5-24](#Chapter05.html#fig_5_24)).


    ![Image](images/9781430243748_Fig05-24.jpg)


    **Figure 5-24.** A new `Settings` view controller embedded in a navigation controller


    Control-drag from the `Settings` bar button item on the home view to the `Settings`
    navigation controller and create a new modal segue connection.


    The iOS SDK includes multiple built-in transition animation options when pushing
    and presenting view controllers. Rather than sticking with the default slide in
    from the bottom of the screen animation, we’ll set our new segue to flip in the
    `Settings` navigation controller. As highlighted in [Figure 5-25](#Chapter05.html#fig_5_25),
    you can click and select the new segue, and then using the attributes inspector,
    change the `Transition` setting to `Flip Horizontal`.


    ![Image](images/9781430243748_Fig05-25.jpg)


    **Figure 5-25.** Changing the transition style of a modal segue to `Flip Horizontal`


    Build and run—and take it for a spin (pun intended!).


    In order to dismiss the `Settings` view controller, we need to add a new `BRCoreViewController`
    subclass to our `view-controller` group and name it `BRSettingsViewController`.
    Then, with the `Settings` view controller selected in the storyboard, use the
    identity inspector to assign the new `BRSettingsViewController` class. Now Control-drag
    and connect the `Done` button to the view controller’s `saveAndDismiss:` action
    method.


    While we’re working on the `Settings` view controller, let’s add one last view
    controller, linked from the `Settings` scene. The new notification time view controller
    is the view controller that enables our users to change the default notification
    time of their birthday reminders.


    First, add a new Round Rect button to the `Settings` view and title it `Set Alert
    Time`. Then add a new view controller scene to the right of the `Settings` scene.
    Give it a title, `Alert Time`, and then Control-drag from the `Set Alert Time`
    button to the newly added view controller, and create a push segue. This should
    add a simulated navigation bar to the new view controller. Enter a title, `Alert
    Time`, as shown in [Figure 5-26](#Chapter05.html#fig_5_26).


    ![Image](images/9781430243748_Fig05-26.jpg)


    **Figure 5-26.** Pushing a view controller onto the modally presented `Settings`
    view controller


    In keeping with all of our view controllers so far, let’s create another subclass
    of `BRCoreViewController`, name it `BRNotificationTimeViewController`, and with
    the notification time view controller selected in the storyboard, use the identity
    inspector to assign the newly created `BRNotificationTimeViewController` class.


    Build and run. If all of your views are gray, then the view controller class association
    should have worked as expected.


    ### Summary


    We came a long way in this chapter.


    We explored how to build a complex navigation hierarchy using Xcode’s drag-and-drop
    storyboarding technology. You should now be familiar with the limitations of storyboarding:
    we need to subclass `UIViewController` and assign our subclasses to storyboard
    view controllers in order to do anything fun with our user interface.


    We touched on the benefits of adding a shared core view controller. As your app
    grows, so does the number of views and view controllers in your project. By using
    the core view controller approach, you can centralize many of your reusable methods
    and properties. Apart from the benefit of writing less code, this means bugs should
    be resolvable in one place and not require fixes in every one of your view controller
    classes. Skinning views also becomes a centralized procedure: much cleaner and
    more manageable, as we shall see in [Chapter 9](#Chapter09.html#ch9).


    #### A challenge


    Here’s a challenge to test your newfound storyboarding knowledge. Build a new
    app from scratch using the `Single View Application` Xcode project template. Embed
    the default view controller into a navigation controller. Add a button or bar
    button item that pushes on another view controller to the first view controller.
    Finally, see if you can also create a modally presented view controller that can
    be dismissed. Let me know how it works out.


    ![Image](images/ch.jpg)


    ## Chapter 6


    ## Views, Controls, Camera, Action!


    It’s time for us to start working with user interface controls and learn how to
    handle view interaction. We’ll spend the rest of the day developing the user interface
    of the edit birthday, edit notes, and notification time views. These three candidates
    utilize a number of controls from the iOS SDK (such as date pickers, switches,
    and text fields), which we’ll add to our views along with code to handle control
    interaction.


    By the end of the day (and chapter), we’ll have progressed to the use of gesture
    recognizers to catch finger interaction events. We’ll even get as far as learning
    how to utilize the iPhone’s camera and Photo Library directly from our app. There’s
    plenty to learn here, so we’d better get started!'
