  trans: '

    # 视图控制器初始化方法


    在整个生命周期中由视图控制器持有的模型数据，最佳创建时机是在实例化时，而非调用 `viewDidLoad` 的时候。iOS 新手程序员常犯的错误，就是在 `viewDidLoad`
    方法里初始化所有内容。


    接入 `UIViewController` 的初始化方法并不像看起来那么直观。有两个重要的初始化方法需要了解：`initWithNibName:bundle:`
    和 `initWithCoder:`。通常，视图控制器要么通过 NIB/XIB 文件进行初始化，要么通过故事板文件进行初始化。在 *Birthday Reminder*
    中，我们将始终使用故事板进行所有初始化，因此在实例化模型或映射字典时，应该接入的是 `initWithCoder:` 初始化方法。


    ## `dealloc`


    `dealloc` 是任何 `NSObject` 子类实例在从内存释放前调用的最后一个方法。因此你可以看到，当你将生日详情视图控制器从导航栈中弹出时，它会被
    iOS 丢弃而不再持有，从而使我们应用的内存占用保持在最低水平。


    得益于 ARC，对属性 iVar 的所有强引用都会自动释放，因此不再需要直接在 `dealloc` 中将 iVar 设为 `nil`。在 ARC 和 iOS
    5 出现之前，这曾是导致内存泄漏的主要原因。


    **注意：** 编译器不允许直接调用 `[super dealloc]`。但你完全可以保证，`dealloc` 会被继承树中所有 `NSObject` 的子类所调用。


    # 导航视图控制器


    在接下来的上午时间里，我们将加快速度实现应用的导航功能。你将学习如何用栏按钮项填充导航栏和工具栏，以及如何在应用中呈现和关闭模态视图控制器。


    今天上午我们将继续使用故事板，并发现通过 Xcode 故事板的所见即所得拖放 UI，构建 *Birthday Reminder* 导航层级是多么简单。


    ## 栏与栏按钮项


    导航栏和工具栏出现在成千上万的 iPhone 和 iPad 应用中。正如我们将在第 9 章中学到的，它们易于定制，并且 iOS 用户能立即识别。


    你将在本章剩余部分发现，在 iOS 中用按钮填充导航栏和工具栏非常容易——这些按钮不是我们之前使用的标准按钮，而是 iOS 中的一种称为**栏按钮项**（`UIBarButtonItem`）的组件。


    ### 导航栏


    导航栏位于屏幕顶部，通常包含一个标题和栏按钮项：在居中标题的左侧和右侧各有一个或多个按钮。默认情况下，由导航控制器控制的导航栏会自动在标题左侧显示一个返回按钮项，使用户能够轻松地通过他们在应用层级中深入浏览的一系列屏幕返回。


    我们的导航控制器标配包含一个导航栏（`UINavigationBar`）。我们已经知道如何通过故事板修改导航中每个视图控制器的标题。现在，让我们在主视图导航栏上添加几个栏按钮项。操作简单，只需将它们从对象库拖到导航栏的左侧和右侧即可（参见图
    5-11）。


    ![图](img/9781430243748_Fig05-11.jpg)


    **图 5-11.** 向导航栏添加栏按钮项


    栏按钮项（`UIBarButtonItem`）与常规按钮（`UIButton`）不同；它们只能存在于导航栏和工具栏中。栏按钮项可以显示文本标题、图像图标或自定义视图。当我们进入第
    9 章讨论外观皮肤时，会探索这些选项。现在，我们将坚持使用文本，因此为左侧按钮输入**设置**，为右侧按钮输入**添加生日**。


    **注意：** 在早期版本的 iOS 中，导航栏仅限于三个项目：一个标题以及单个左侧和右侧栏按钮项。在 iOS 5 和 6 中，我们有更多的灵活性。我们可以添加多个左侧和右侧栏按钮项，但由于空间限制，在
    iPhone 上我不建议每侧超过一个项目。


    ### 工具栏


    我们已经知道，当我们将视图控制器嵌入导航控制器时，会自动生成一个导航栏。导航控制器还免费附带一个工具栏。默认情况下，它是隐藏的，但我们可以更改这一点。选择导航控制器，然后打开“显示工具栏”选项（参见图
    5-12）。瞧！所有视图控制器的工具栏都出现了！


    ![图](img/9781430243748_Fig05-12.jpg)


    **图 5-12.** 通过导航控制器开启工具栏


    现在，导航栈中的所有视图控制器都将继承父导航控制器的工具栏。这正是我们希望主视图拥有的，但详情视图除外。解决这个问题很简单。在故事板中选择详情视图控制器，然后打开“推送时隐藏底部栏”属性。构建并运行，你应该会看到第一个视图有工具栏，而第二个视图没有。


    现在，为主视图控制器（Home view controller）的工具栏添加一些栏按钮项。在故事板中选择主视图控制器，然后从对象库中拖入两个栏按钮项实例。分别将它们命名为“通讯录”和“Facebook”。注意工具栏与导航栏的不同之处：新的栏按钮项向左对齐，而不是像导航栏标题那样分布在两侧。我们可以通过添加三个灵活间距栏按钮项实例来使这两个按钮居中（参见图
    5-13）。


    ![图](img/9781430243748_Fig05-13.jpg)


    **图 5-13.** 使工具栏栏按钮项居中

