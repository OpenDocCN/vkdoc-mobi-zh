  trans: '

    ### 注册成为苹果开发者


    在将应用安装到 iPhone 上测试并提交至 App Store 之前，需要完成两个注册阶段：


    > - 免费注册成为苹果开发者

    > - 加入 iOS 开发者计划，费用为 99 美元


    通过苹果开发者网站可免费注册：


    [`http://developer.apple.com/programs/register/`](http://developer.apple.com/programs/register/)


    注册后你可以访问示例代码、文档以及 WWDC（苹果全球开发者大会）教程视频。


    要注册成为苹果开发者，你需要使用现有的 Apple ID 或创建一个新的。如果你曾在 iPhone 上从 App Store 下载过应用，那么你当时使用的就是自己的
    Apple ID。或者，如果你用过 MobileMe、iCloud 或 Game Center，用的也是你的 Apple ID。


    你还在等什么？现在就完成苹果开发者注册步骤，完成后返回即可！这不会花费太长时间。一旦完成，你就能立即访问 iOS 开发中心。图 2-2 展示了免费注册与 99
    美元 iOS 开发者计划之间的区别。


    ![图片](img/9781430243748_Fig02-02.jpg)


    **图 2-2.** iOS 开发中心：左侧截图显示的是免费注册窗口；右侧截图显示的是已注册的开发者窗口。


    在图 2-2 中，你会看到 iOS 开发中心右侧列最初显示的是 iOS 开发者计划的促销广告。一旦你完成开发者计划的注册申请，该列就会填满准备发布应用所需的所有额外资源（图
    2-2 右侧截图显示的是已登录的付费会员）。


    *注意：完成本书的课程并非 100% 必须成为 iOS 开发者计划的付费会员。你可以在 Mac 的 iOS 模拟器中测试代码。*


    为了在 iPhone 上测试应用（并最终提交应用到 App Store），你需要成为苹果开发者计划的付费会员。接下来进入下一阶段。


    ### 加入 iOS 开发者计划


    如果你打算开发自己的 App Store 或企业应用，需要完成申请流程并加入 iOS 开发者计划。


    标准计划费用为每年 99 美元。还有一种更昂贵的版本：iOS 开发者企业计划，年费为 299 美元。选择企业计划的主要优势在于，你可以在公司内部发布应用，而无需通过
    App Store。该计划针对大型企业，企业需要经过单独流程证明资格（这超出了本书的讨论范围）。


    对我们大多数人来说，标准的 iOS 开发者计划就足够了。成为注册 iOS 开发者后，你可以访问：


    > - iOS 配置门户

    > - iTunes Connect

    > - 苹果开发者论坛

    > - 新的 iOS SDK 测试版。在编写本书时，iOS 6 仍处于测试阶段。如图 2-2 所示，在我成为 iOS 开发者计划的付费会员之前，无法访问新的测试版。


    为了直接在 iPhone 上调试并分发应用，你需要创建配置文件。这些是 Xcode 在编译时嵌入应用的配置文件。配置文件决定了哪些设备可以安装你的应用。一旦可以访问
    iOS 配置门户，我们就能生成并下载这些配置文件。


    iTunes Connect（[`https://itunesconnect.apple.com`](https://itunesconnect.apple.com)）是用于管理
    App Store 应用的内容管理系统。向 App Store 提交新应用和应用更新均由 iTunes Connect 处理。此外，开发者登录 iTunes
    Connect 可管理：


    > - 银行与税务信息/合同

    > - 销售趋势与报告


    苹果开发者论坛为 iOS 和 Mac 软件编程问题提供了极好的在线资源。


    在获得这些 iOS 开发者工具和资源的访问权限之前，你需要等待苹果批准你的 iOS 开发者计划申请（见图 2-3）。


    ![图片](img/9781430243748_Fig02-03.jpg)


    **图 2-3.** 加入 iOS 开发者计划


    首先，通过苹果开发者网站完成注册流程：


    [`http://developer.apple.com/programs/ios/`](http://developer.apple.com/programs/ios/)


    这不会花费太长时间。不过之后，你可能要等待长达两周时间，直到苹果受理你的计划申请。需要走不少繁琐的程序。不过别担心。在此期间，你可以跳到第 3 章。一旦申请通过，再翻回本章，我会带你完成配置应用以在设备上测试的这个有些令人困惑的过程。


    ### iOS 配置门户


    欢迎来到 iOS 配置门户（见图 2-4）。现在我们将一步步完成生成配置文件所需的所有流程。


    ![图片](img/9781430243748_Fig02-04.jpg)


    **图 2-4.** iOS 配置门户


    请查看图 2-4 的左侧列。菜单按我们即将操作的顺序列出了以下配置阶段：


    > - *证书*：你需要为当前应用及未来所有应用创建一个开发者证书和一个分发签名证书。

    > - *设备*：在此处添加你希望测试应用的所有 iPhone、iPod 和 iPad 的唯一设备标识符（UDID）。

    > - *应用 ID*：在创建配置文件之前，你需要为应用创建一个唯一标识符。Xcode 将使用该标识符，将你的编译项目与正确的配置文件关联起来。

    > - *配置*：至此，你终于可以生成我前面一直提到的配置文件了。每个配置文件都关联了上述三个阶段创建的证书、设备和应用 ID。

    '
- fmt: '#### Generating certificates


    When you first access the Certificates section of the Provisioning Portal, you’ll
    discover that you don’t have any signing certificate by default. You’ll need to
    generate one in order to debug and install your apps on your iPhone or other iOS
    devices.


    ![Image](images/9781430243748_Fig02-05.jpg)


    **Figure 2-5.** The Certificates section of the Provisioning Portal before generating
    a certificate


    To generate the certificate, you’ll first need to create a certificate request
    file. The certificate request file must be generated via your Mac. Open up Keychain
    Access via Applications Utilities Keychain Access. From within Keychain Access,
    you’ll need to select the Request a Certificate From a Certificate Authority...
    menu option (see [Figure 2-6](#Chapter02.html#fig_2_6)).


    ![Image](images/9781430243748_Fig02-06.jpg)


    **Figure 2-6.** Initiating a certificate request from Keychain Access on OS X


    Keychain Access will now present you with a dialog box (see [Figure 2-7](#Chapter02.html#fig_2_7))
    where you’ll need to:


    > 1.  Enter your e-mail address.

    > 2.  Enter a Common Name. The name you enter is displayed in Keychain Access
    once you complete the certificate generation process. When you reach the point
    where you’re ready to submit your app to the App Store, you’ll need to repeat
    this certificate generation process to create a certificate for your App Store
    provisioning. Choose a name that identifies this certificate as the development
    version.

    > 3.  Select the Saved to Disk option.

    > 4.  Tap Continue and save the certificate request to your desktop.


    ![Image](images/9781430243748_Fig02-07.jpg)


    **Figure 2-7.** Setting options for a development certificate request, still in
    Keychain Access


    The resulting certificate request file on your desktop is titled `CertificateSigningRequest.certSigningRequest`.
    This is just a temporary file that is only needed for the next step.


    Switch back to the iOS Provisioning Portal in your browser. Once you’ve tapped
    the Request Certificate button (in the browser window), you’ll be asked to choose
    the certificate request file generated via Keychain Access (see [Figure 2-8](#Chapter02.html#fig_2_8)).


    ![Image](images/9781430243748_Fig02-08.jpg)


    **Figure 2-8.** Browse to the certificate request file on your desktop


    Submit your certificate request. Congratulations! You’ve just generated your first
    development certificate. You should now be able to see it listed in the Provisioning
    Portal (see [Figure 2-9](#Chapter02.html#fig_2_9)).


    ![Image](images/9781430243748_Fig02-09.jpg)


    **Figure 2-9.** The generated developer certificate


    Download the certificate from the Provisioning Portal. Double-click the downloaded
    `developer_identity.cer` file. You will be prompted by Keychain Access to add
    the certificate (see [Figure 2-10](#Chapter02.html#fig_2_10)).


    ![Image](images/9781430243748_Fig02-10.jpg)


    **Figure 2-10.** Add and autoinstall the downloaded certificate.


    At this point, you’ve completed the certificate generation process for development.
    Xcode will use your development signing certificate when it compiles debug versions
    of your apps to run on devices that you’ve registered in the Provisioning Portal.
    In order to build release versions of your apps that you can both share with beta
    testers and submit to the App Store, you’ll also need to create a distribution
    certificate. The process is exactly the same as creating a developer certificate,
    except that you’ll begin by selecting the Distribution tab from the Certificates
    section of the Provisioning Portal. While it’s still fresh in your memory, you
    may want to repeat the whole certificate generation process for creating a distribution
    certificate now.


    Within the Certificates section of the Provisioning Portal, you see that Apple
    includes a link to download the WWDR Intermediate Certificate. Download and double-click
    to install this certificate to your Mac’s keychain. The WWDR (Apple Worldwide
    Developer Relations Certification Authority) certificate simply confirms that
    your development or distribution profile certificate was issued by Apple.


    #### Adding devices


    Every iPhone, iPod, and iPad has a Unique Device Identifier. It is this UDID that
    you’ll need for every device you want included for testing your app prior to App
    Store submission.


    With your iPhone connected to your Mac, open Xcode and switch to the Organizer
    window (Window Organizer or ![Image](images/U002.jpg)![Image](images/U003.jpg)`2`).
    Under Devices, you should see your iPhone listed. Select your phone and the detail
    view will populate to show, among other things, your iPhone’s Identifier (see
    [Figure 2-11](#Chapter02.html#fig_2_11)). The UDID is a 40-character alphanumeric
    string.


    ![Image](images/9781430243748_Fig02-11.jpg)


    **Figure 2-11.** Accessing your iPhone UDID via Xcode’s Organizer


    The process of adding devices to the Provisioning Portal is fairly straightforward.
    Browse to the Devices section of the Provisioning Portal. Tap Add Devices and
    then enter your iPhone’s UDID. Once a device is saved to the Provisioning Portal,
    it appears on the list of devices associated with your developer account (see
    [Figure 2-12](#Chapter02.html#fig_2_12)).


    ![Image](images/9781430243748_Fig02-12.jpg)


    **Figure 2-12.** The Provisioning Portal with one added device (my iPhone)


    *Note: Device UDIDs can also be accessed in iTunes when your device is connected
    via USB to your Mac. However, when it comes to requesting UDIDs from clients,
    I usually just ask them to download one of the numerous free UDID-sending apps
    listed in the App Store. Try a search on **UDID**.*


    #### Creating an App ID


    For each app you develop, you only create a single App ID. You’ll create multiple
    provisioning profiles for each app, but only a single App ID (see [Figure 2-13](#Chapter02.html#fig_2_13)).


    ![Image](images/9781430243748_Fig02-13.jpg)


    **Figure 2-13.** Creating an App ID via the Provisioning Portal


    To create an App ID, we need to supply the following two inputs:


    > *   *A description*. I’ve entered **BirthdayReminder**—you can do the same.

    > *   *A bundle identifier*. This must be a unique string that the App Store and
    iOS devices will use to identify your app from the hundreds of thousands of other
    apps. As [Figure 2-13](#Chapter02.html#fig_2_13) indicates, it’s customary to
    provide a reverse domain path of your web site, such as `com.domainname.BirthdayReminder`.
    The Provisioning Portal won’t permit you to use the `com.apress.BirthdayReminder`
    shown in the example because this identifier is already in use by me!

    > *   In your bundle identifier, change the `com` and the `domainname` placeholders,
    but keep the `BirthdayReminder` (case sensitive) part. This ensures that in [Chapter
    3](#Chapter03.html#ch3), Xcode will be able to automatically detect the correct
    provisioning profile for our app project, also titled `BirthdayReminder` (case
    sensitive).'
  raw: '#### Generating certificates


