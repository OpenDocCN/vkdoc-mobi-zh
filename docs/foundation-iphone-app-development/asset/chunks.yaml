    Keeping your new subview selected, use the size inspector to position, and size
    the subview (x=0, y=0, width=320, and height=372). We''ll also make the background
    of the subview transparent using the attributes inspector. Open the Background
    drop-down menu and select Clear Color from the default list of Apple colors (see
    [Figure 10-4](#Chapter10.html#fig_10_4)).


    ![Image](images/9781430243748_Fig10-04.jpg)


    **Figure 10-4.** Making a view transparent using Apple''s Clear color


    Next, add one label and two buttons to your subview, and set the position, size,
    and additional attribute values as listed:


    > *   Label (`UILabel`): x=14, y=92, width=293, height=21, text aligned: center,
    font system: 17, text: **Import Birthdays from....**

    > *   Button1 (`UIButton`): change the text to **Address Book** and then position
    and size (x=7, y=127, width=307, height=60). Set the `Image` property to `icon-addressbook.png`.
    Using the identity inspector, change the custom class of the button to `BRBlueButton`
    just as we did yesterday.

    > *   Button2 (`UIButton`): change the text to **Facebook** and then position
    and size (x=7, y=202, width=307, height=60). Set the `Image` property to `icon-facebook.png`.
    Using the identity inspector, change the custom class of the button to `BRBlueButton`.


    Build and run (see [Figure 10-5](#Chapter10.html#fig_10_5)).


    ![Image](images/9781430243748_Fig10-05.jpg)


    **Figure 10-5.** Creating big blue buttons was a piece of cake thanks to yesterday''s
    style sheet class.'
  trans: '

    # 从通讯录导入生日


    我们的项目已经进行到一半了。今天是第 4 天，大部分繁重的工作已经完成。今天我们将专注于从通讯录导入亲朋好友的生日到*生日提醒*中。我们会让这个过程对用户来说超级简单。只需轻点几下，他们的应用里就会装满生日提醒。


    在构建任何应用时，设计简单易用的用户体验至关重要。我们要避免让用户经历手动将每个朋友的生日逐一输入应用的繁琐过程。那样很快就会让他们感到厌倦！苹果的电话通讯录应用（即地址簿）除了电话号码、电子邮件等信息外，还为每个联系人提供了多种字段。其中一项允许
    iPhone 用户为每个联系人输入生日，如图 10-1 所示。


    ![图片](img/9781430243748_Fig10-01.jpg)


    **图 10-1.** 苹果电话通讯录应用：为联系人指定生日


    为联系人指定生日可能是某些用户会做、而另一些用户不会做的操作。因此，直接从地址簿导入到*生日提醒*是一个只有部分用户会使用的功能。


    作为开发者，我们需要测试这个功能是否正常工作，所以在这个阶段，我建议你在 iPhone 通讯录中添加几个生日。


    ## 优化空数据库的主页视图


    是时候和我们的名人说再见了。我们不会在发布的应用中预填充随机名人列表，所以让我们先移除应用中的测试功能。


    打开`BRHomeViewController.m`源文件，删除整个`initWithCoder:`方法。如果你之前已将*生日提醒*安装到模拟器或 iPhone
    上，现在将其删除。构建并运行。你的应用应该看起来像图 10-2 那样。当*生日提醒*首次启动时，一个空白的生日屏幕对新用户来说并不是最吸引人的启动画面。


    ![图片](img/9781430243748_Fig10-02.jpg)


    **图 10-2.** 生日数据库为空的主页视图


    当用户首次启动*生日提醒*并面对空数据库时，我们希望邀请并鼓励他们添加或导入一些生日来开始使用。还记得我们昨天在“生日详情”视图中设计的那些漂亮的大蓝色按钮吗？我认为我们应该在空主页的中心添加几个这样的按钮，邀请用户从通讯录和
    Facebook 导入生日。


    为此，我们将向主页视图添加一个子视图。这个子视图显示文字“从……导入生日”，并附带两个大蓝色按钮，一个用于从通讯录导入，另一个用于从 Facebook 导入。


    在我们开始修改故事板布局之前，先将另外两个图片资源导入到 Xcode 项目的`resources/images`分组中：`icon-addressbook.png`
    和 `icon-addressbook@2x.png`。


    在 Xcode 中打开故事板，并聚焦于主页视图控制器场景。确保文档大纲面板已打开，然后从对象库中拖拽一个新的视图实例，直接放到文档大纲面板中的主屏幕视图上，如图
    10-3 高亮所示。


    ![图片](img/9781430243748_Fig10-03.jpg)


    **图 10-3.** 将子视图拖放至主页视图


    你的新子视图不应是表格视图的子视图，而应是主视图的子视图。这有点麻烦，但如果你的子视图放错了位置，可以使用文档大纲面板重新定位。此外，在文档大纲面板中将新子视图移到表格视图下方，这样它会显示在表格视图的前面，让你更容易操作。


    保持新子视图选中状态，使用尺寸检查器来定位和调整大小（x=0, y=0, width=320, height=372）。我们还将使用属性检查器将子视图的背景设为透明。打开背景下拉菜单，从苹果默认颜色列表中选择清除颜色（见图
    10-4）。


    ![图片](img/9781430243748_Fig10-04.jpg)


    **图 10-4.** 使用苹果的清除颜色使视图透明


    接下来，向子视图中添加一个标签和两个按钮，并按以下列表设置位置、大小和额外的属性值：


    *   标签（`UILabel`）：x=14, y=92, width=293, height=21，文本对齐：居中，字体系统：17，文本：**从……导入生日**

    *   按钮 1（`UIButton`）：将文本改为**通讯录**，然后定位并调整大小（x=7, y=127, width=307, height=60）。将`Image`属性设置为`icon-addressbook.png`。使用身份检查器将按钮的自定义类更改为`BRBlueButton`，就像我们昨天做的那样。

    *   按钮 2（`UIButton`）：将文本改为**Facebook**，然后定位并调整大小（x=7, y=202, width=307, height=60）。将`Image`属性设置为`icon-facebook.png`。使用身份检查器将按钮的自定义类更改为`BRBlueButton`。


    构建并运行（见图 10-5）。


    ![图片](img/9781430243748_Fig10-05.jpg)


    **图 10-5.** 得益于昨天的样式表类，创建大蓝色按钮简直是小菜一碟。

