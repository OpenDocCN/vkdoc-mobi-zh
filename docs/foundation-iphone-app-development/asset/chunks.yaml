    \ = kFontDropShadowColour.CGColor;\n            label.layer.shadowOffset = CGSizeMake(1.0f,\
    \ 1.0f);\n            label.layer.shadowRadius = 0.0f;\n            label.layer.masksToBounds\
    \ = NO;\n            break;\n        default:\n            label.textColor = kFontLightOnDarkTextColour;\n\
    \            break;\n    }\n}\n\n+(void)styleRoundCorneredView:(UIView *)view\n\
    {\n    view.layer.cornerRadius = 4.f;\n    view.layer.masksToBounds = YES;\n \
    \   view.clipsToBounds = YES;\n}\n\n@end\n```\n\n在样式化标签时，我们直接访问标签视图的图层（`CALayer`）属性，以定义图层上的阴影设置。同样，对于视图的样式化，我们设置视图底层核心动画图层的`cornerRadius`属性。\n\
    \n是时候测试我们的样式表类了！打开`BRBirthdayTableViewCell.m`源文件。首先在文件顶部导入`BRStyleSheet.h`。`BRBirthdayTableViewCell`是`UITableViewCell`的子类。因此，这个类是一个视图类，而不是视图控制器类。与我们之前的视图控制器输出口不同，我们无法通过钩入`viewDidLoad`方法来修改\
    \ Interface Builder 输出口属性。在样式化自定义表格视图单元格中的图像视图和标签时，我们只需在 iOS 首次生成输出口时运行一次这段代码。因此，覆盖输出口访问器的设置器并在其中添加样式代码是一个理想的位置。以下是需要添加到`BRBirthdayTableViewCell.m`中的代码：\n\
    \n```objectivec\n-(void) setIconView:(UIImageView *)iconView\n{\n    _iconView\
    \ = iconView;\n    if (_iconView) {\n        [BRStyleSheet styleRoundCorneredView:_iconView];\n\
    \    }\n}\n\n-(void) setNameLabel:(UILabel *)nameLabel\n{\n    _nameLabel = nameLabel;\n\
    \    if (_nameLabel) {\n        [BRStyleSheet styleLabel:_nameLabel withType:BRLabelTypeName];\n\
    \    }\n}\n\n-(void) setBirthdayLabel:(UILabel *)birthdayLabel\n{\n    _birthdayLabel\
    \ = birthdayLabel;\n    if (_birthdayLabel) {\n        [BRStyleSheet styleLabel:_birthdayLabel\
    \ withType:BRLabelTypeBirthdayDate];\n    }\n}\n\n-(void) setRemainingDaysLabel:(UILabel\
    \ *)remainingDaysLabel\n{\n    _remainingDaysLabel = remainingDaysLabel;\n   \
    \ if (_remainingDaysLabel) {\n        [BRStyleSheet styleLabel:_remainingDaysLabel\
    \ withType:BRLabelTypeDaysUntilBirthday];\n    }\n}\n\n-(void) setRemainingDaysSubTextLabel:(UILabel\
    \ *)remainingDaysSubTextLabel\n{\n    _remainingDaysSubTextLabel = remainingDaysSubTextLabel;\n\
    \    if (_remainingDaysSubTextLabel) {\n        [BRStyleSheet styleLabel:_remainingDaysSubTextLabel\
    \ withType:BRLabelTypeDaysUntilBirthdaySubText];\n    }\n}\n```\n\n构建并运行。你应该会看到标签样式和图片圆角效果被应用，就像图\
    \ 9-14 中所示。当 iOS 连接每个标签输出口时，我们将标签引用传递给`BRStyleSheet`的`styleLabel:withType:`类方法，该方法会依次设置字体、文本颜色、阴影等。\n\
    \n![图片](img/9781430243748_Fig09-14.jpg)\n\n**图 9-14.** 样式化文本和圆角图像视图\n\n### 自定义导航栏和工具栏外观\n\
    \n我们对主屏幕导航栏做的第一个修改是，将左右两侧的栏按钮项改为显示图标而不是文本。从本章源文件夹中的资源中，将`icon-add-new.png`、`icon-add-new@2x.png`、`icon-settings.png`和`icon-settings@2x.png`图像文件添加到你的项目中。在故事板中选择主视图控制器场景，删除左侧栏按钮项的标题，然后从`Image`属性下拉菜单中选择`icon-settings.png`文件。对右侧栏按钮项重复此过程，这次选择`icon-add-new.png`图像文件（参见图\
    \ 9-15）。\n\n![图片](img/9781430243748_Fig09-15.jpg)\n\n**图 9-15.** 为 UIBarButtonItems\
    \ 分配图像图标\n\n在我们进一步操作之前，如果你还没有将本章源代码资源文件夹中的剩余图像添加到项目中，请立即添加：`button-blue.png`、`button-blue@2x.png`、`button-red.png`、`button-red@2x.png`、`icon-call.png`、`icon-call@2x.png`、`icon-delete.png`、`icon-delete@2x.png`、`icon-email.png`、`icon-email@2x.png`、`icon-facebook.png`、`icon-facebook@2x.png`、`icon-notes.png`、`icon-notes@2x.png`、`navigation-bar-background.png`、`navigation-bar-background@2x.png`、`icon-sms.png`、`icon-sms@2x.png`、`tool-bar-background.png`和`tool-bar-background@2x.png`。"
- fmt: "### Appearance APIs: simple yet powerful\n\nApple introduced the Appearance\
    \ APIs into the iOS SDK in version 5.0. Prior to iOS 5, it was a fairly complex\
    \ process to change the design of common user interface components like navigation\
    \ bars, toolbars, and bar button items further than a little tinting.\n\nWhen\
    \ iOS 5 launched, Apple added a number of new public methods to many of the iOS\
    \ UI components that are solely for the purpose of modifying the component appearances:\
    \ changing background images and tinting individual parts of complex UI components\
    \ like `UISlider` or `UIProgressBar`.\n\nBefore iOS 5, if we desired the title\
    \ of our navigation bar to use a custom font or wanted to add a shadow, we didn’t\
    \ have direct access to the label in the navigation bar. Instead, we’d have to\
    \ implement a workaround involving creating a new label, dynamically sizing it,\
    \ and assigning the custom label as the `titleView` property of each navigation\
    \ bar. What a hassle! Thankfully, Apple made a gigantic leap forward with iOS\
    \ 5’s appearance APIs. Not only do we now have many additional customization options\
    \ for the majority of the UI components, we can even define our appearance settings\
    \ on a global level. For example, we can state in code that every single instance\
    \ of a navigation bar should use a particular custom background image, or that\
    \ every bar button item should be tinted with a certain color and styled with\
    \ a certain font. This means that we can actually define all of our appearance\
    \ APIs in one place. Where do you think would be a suitable place? How about our\
    \ global style sheet class?\n\nLet’s now switch to the `BRStyleSheet.h` header\
    \ file. We’re going to declare one more public class method:\n\n`+(void)initStyles;`\n\
    \nIn the `BRStyleSheet.m` source file, add an empty implementation of our new\
    \ `initStyles` method for now:\n\n```\n+(void) initStyles\n{\n\n}\n```\n\nWe’ll\
    \ invoke `initStyles` just once when our app first launches. Open your app delegate\
    \ class `BRAppDelegate.m` source file. Import `BRStyleSheet.h` and then add one\
    \ line of code to the `application:didFinishLaunchingWithOptions:` method:\n\n\
    ```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary*)launchOptions\n\
    {\n    [BRStyleSheet initStyles];\n    return YES;\n}\n```\n\nThe `application:didFinishLaunchingWithOptions:`\
    \ method is the first code in our program to execute and it will run only once.\
    \ This is the place to initialize all of our global custom appearance styles.\
    \ So let’s now switch back to `BRStyleSheet.m` and see exactly what’s possible\
    \ with appearance APIs. Here’s the first few lines of styling code to add to `initStyles`:\n\
    \n```\n//NAVIGATION BAR\n    NSDictionary *titleTextAttributes = [NSDictionary\
    \ dictionaryWithObjectsAndKeys:\n                                         kFontNavigationTextColour,\
    \ UITextAttributeTextColor,\n                                         [UIColor\
    \ whiteColor], UITextAttributeTextShadowColor,\n                             \
    \            [NSValue valueWithUIOffset:UIOffsetMake(0, 2)], UITextAttributeTextShadowOffset,\n\
    \                                         kFontNavigation, UITextAttributeFont,nil];\n\
    \    [[UINavigationBar appearance] setTitleTextAttributes:titleTextAttributes];\n\
    \n    //Setting a background image with the birthday cake icing\n    [[UINavigationBar\
    \ appearance] setBackgroundImage:[UIImage imageNamed:@\"navigation-bar-background.png\"\
    ] forBarMetrics:UIBarMetricsDefault];\n```\n\nIn iOS 5, Apple added a new `titleTextAttributes`\
    \ property to `UINavigationBar`, enabling us to pass in a dictionary of optional\
    \ style attributes for the navigation bar title: text color, shadow color, shadow\
    \ offset, and the font. Note that `titleTextAttributes` is a property of `UINavigationBar`.\
    \ Rather than style each of the navigation bars in our app individually, however,\
    \ we can optionally set the `titleTextAttributes` property on a global level via\
    \ the appearance proxy of the `UINavigationBar` class (i.e., `[UINavigationBar\
    \ appearance]`). Likewise, `UINavigationBar` has another instance method, `setBackgroundImage:forBarMetrics:`,\
    \ which we can access globally through the appearance proxy of the `UINavigationBar`\
    \ class. Build and run your project (see [Figure 9-16](#Chapter09.html#fig_9_16)).\n\
    \n![Image](images/9781430243748_Fig09-16.jpg)\n\n**Figure 9-16.** Stylized navigation\
    \ bar title and background icing image\n\nOur `navigation-bar-background.png`\
    \ image is higher than the default navigation bar height of 44 points. Our custom\
    \ dripping-icing image is 60 points in height and includes alpha transparency.\
    \ This will work just fine in iOS. Your icing should now be dripping nicely over\
    \ the table view!"
  raw: '##### Appearance APIs: simple yet powerful


    Apple introduced the Appearance APIs into the iOS SDK in version 5.0. Prior to
    iOS 5, it was a fairly complex process to change the design of common user interface
    components like navigation bars, toolbars, and bar button items further than a
    little tinting.


    When iOS 5 launched, Apple added a number of new public methods to many of the
    iOS UI components that are solely for the purpose of modifying the component appearances:
    changing background images and tinting individual parts of complex UI components
    like `UISlider` or `UIProgressBar`.


    Before iOS 5, if we desired the title of our navigation bar to use a custom font
    or wanted to add a shadow, we didn’t have direct access to the label in the navigation
    bar. Instead, we’d have to implement a workaround involving creating a new label,
    dynamically sizing it, and assigning the custom label as the `titleView` property
    of each navigation bar. What a hassle! Thankfully, Apple made a gigantic leap
    forward with iOS 5’s appearance APIs. Not only do we now have many additional
    customization options for the majority of the UI components, we can even define
    our appearance settings on a global level. For example, we can state in code that
    every single instance of a navigation bar should use a particular custom background
    image, or that every bar button item should be tinted with a certain color and
    styled with a certain font. This means that we can actually define all of our
    appearance APIs in one place. Where do you think would be a suitable place? How
    about our global style sheet class?


    Let’s now switch to the `BRStyleSheet.h` header file. We’re going to declare one
    more public class method:


    `+(void)initStyles;`


    In the `BRStyleSheet.m` source file, add an empty implementation of our new `initStyles`
    method for now:


    `+(void) initStyles`

    `{`


    `}`


    We’ll invoke `initStyles` just once when our app first launches. Open your app
    delegate class `BRAppDelegate.m` source file. Import `BRStyleSheet.h` and then
    add one line of code to the `application:didFinishLaunchingWithOptions:` method:


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary`

    `*)launchOptions`

    `{`

    **`    [BRStyleSheet initStyles];`**

    `    return YES;`

    `}`


    The `application:didFinishLaunchingWithOptions:` method is the first code in our
    program to execute and it will run only once. This is the place to initialize
    all of our global custom appearance styles. So let’s now switch back to `BRStyleSheet.m`
    and see exactly what’s possible with appearance APIs. Here’s the first few lines
    of styling code to add to `initStyles`:


    `//NAVIGATION BAR`

    `    NSDictionary *titleTextAttributes = [NSDictionary dictionaryWithObjectsAndKeys:`

    `                                         kFontNavigationTextColour, UITextAttributeTextColor,`

    `                                         [UIColor whiteColor], UITextAttributeTextShadowColor,`

    `                                         [NSValue valueWithUIOffset:UIOffsetMake(0,
    2)], UITextAttributeTextShadowOffset,`

    `                                         kFontNavigation, UITextAttributeFont,nil];`

    `    [[UINavigationBar appearance] setTitleTextAttributes:titleTextAttributes];`


    `    //Setting a background image with the birthday cake icing`

    `    [[UINavigationBar appearance] setBackgroundImage:[UIImage imageNamed:@"navigation-bar-`

    `background.png"] forBarMetrics:UIBarMetricsDefault];`


    In iOS 5, Apple added a new `titleTextAttributes` property to `UINavigationBar`,
    enabling us to pass in a dictionary of optional style attributes for the navigation
    bar title: text color, shadow color, shadow offset, and the font. Note that `titleTextAttributes`
    is a property of `UINavigationBar`. Rather than style each of the navigation bars
    in our app individually, however, we can optionally set the `titleTextAttributes`
    property on a global level via the appearance proxy of the `UINavigationBar` class
    (i.e., `[UINavigationBar appearance])`. Likewise, `UINavigationBar` has another
    instance method, `setBackgroundImage:forBarMetrics:`, which we can access globally
    through the appearance proxy of the `UINavigationBar` class. Build and run your
    project (see [Figure 9-16](#Chapter09.html#fig_9_16)).


    ![Image](images/9781430243748_Fig09-16.jpg)


    **Figure 9-16.** Stylized navigation bar title and background icing image


    Our `navigation-bar-background.png` image is higher than the default navigation
    bar height of 44 points. Our custom dripping-icing image is 60 points in height
    and includes alpha transparency. This will work just fine in iOS. Your icing should
    now be dripping nicely over the table view!'
  trans: "\n### 外观 API：简洁而强大\n\nApple 在 iOS 5.0 版本的 SDK 中引入了外观 API。在 iOS 5 之前，要更改导航栏、工具栏和栏按钮项等常见用户界面组件的设计，哪怕只是稍微调整一下色调，都是一个相当复杂的过程。\n\
    \n当 iOS 5 发布时，Apple 为许多 iOS UI 组件添加了大量新的公开方法，这些方法专门用于修改组件外观：更换背景图片，并为像 `UISlider`\
    \ 或 `UIProgressBar` 这样复杂的 UI 组件中的各个部分设置色调。\n\n在 iOS 5 之前，如果我们希望导航栏的标题使用自定义字体或添加阴影，我们是无法直接访问导航栏中的标签的。相反，我们必须实现一种变通方法，包括创建一个新标签、动态调整其大小，然后将该自定义标签设置为每个导航栏的\
    \ `titleView` 属性。真是麻烦！值得庆幸的是，Apple 通过 iOS 5 的外观 API 向前迈出了一大步。现在，我们不仅对大多数 UI 组件有了更多自定义选项，甚至可以在全局级别定义我们的外观设置。例如，我们可以在代码中声明，每个导航栏实例都应使用特定的自定义背景图片，或者每个栏按钮项都应使用某种颜色并采用某种字体样式。这意味着，我们实际上可以在一个地方定义所有的外观\
    \ API。你认为哪里是合适的地方呢？我们的全局样式表类怎么样？\n\n现在，让我们切换到 `BRStyleSheet.h` 头文件。我们将再声明一个公开类方法：\n\
    \n`+(void)initStyles;`\n\n在 `BRStyleSheet.m` 源文件中，暂时为我们的新 `initStyles` 方法添加一个空实现：\n\
    \n```\n+(void) initStyles\n{\n\n}\n```\n\n我们将在应用首次启动时仅调用一次 `initStyles`。打开你的应用委托类\
    \ `BRAppDelegate.m` 源文件。导入 `BRStyleSheet.h`，然后在 `application:didFinishLaunchingWithOptions:`\
    \ 方法中添加一行代码：\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary*)launchOptions\n\
    {\n    [BRStyleSheet initStyles];\n    return YES;\n}\n```\n\n`application:didFinishLaunchingWithOptions:`\
    \ 方法是程序中第一个执行的代码，并且只会运行一次。这是初始化所有全局自定义外观样式的地方。那么，现在让我们切换回 `BRStyleSheet.m`，看看外观\
    \ API 究竟能做什么。以下是添加到 `initStyles` 中的前几行样式代码：\n\n```\n//导航栏\n    NSDictionary *titleTextAttributes\
    \ = [NSDictionary dictionaryWithObjectsAndKeys:\n                            \
    \             kFontNavigationTextColour, UITextAttributeTextColor,\n         \
    \                                [UIColor whiteColor], UITextAttributeTextShadowColor,\n\
    \                                         [NSValue valueWithUIOffset:UIOffsetMake(0,\
    \ 2)], UITextAttributeTextShadowOffset,\n                                    \
    \     kFontNavigation, UITextAttributeFont,nil];\n    [[UINavigationBar appearance]\
    \ setTitleTextAttributes:titleTextAttributes];\n\n    //设置带有生日蛋糕糖霜的背景图片\n    [[UINavigationBar\
    \ appearance] setBackgroundImage:[UIImage imageNamed:@\"navigation-bar-background.png\"\
    ] forBarMetrics:UIBarMetricsDefault];\n```\n\n在 iOS 5 中，Apple 为 `UINavigationBar`\
    \ 添加了一个新的 `titleTextAttributes` 属性，使我们能够传入一个包含导航栏标题可选样式属性的字典：文本颜色、阴影颜色、阴影偏移量和字体。请注意，`titleTextAttributes`\
    \ 是 `UINavigationBar` 的一个属性。然而，我们并非逐个为应用中的每个导航栏设置样式，而是可以通过 `UINavigationBar` 类的外观代理（即\
    \ `[UINavigationBar appearance]`）在全局级别设置 `titleTextAttributes` 属性。同样地，`UINavigationBar`\
    \ 有另一个实例方法 `setBackgroundImage:forBarMetrics:`，我们可以通过 `UINavigationBar` 类的外观代理在全局范围内访问它。构建并运行你的项目（参见图\
    \ 9-16）。\n\n![图片](img/9781430243748_Fig09-16.jpg)\n\n**图 9-16.** 样式化的导航栏标题和背景糖霜图片\n\
    \n我们的 `navigation-bar-background.png` 图片比默认的 44 点导航栏高度要高。我们定制的滴落糖霜图片高度为 60 点，并包含\
    \ alpha 透明度。这在 iOS 中运行良好。现在，你的糖霜应该漂亮地滴落在表格视图上了！"
- fmt: "#### Appearance styles for containers\n\nExcellent. Let’s continue with the\
    \ `initStyles` method of `BRStyleSheet.m`. Add the next block of appearance API\
    \ styling code:\n\n```\nNSDictionary *barButtonItemTextAttributes;\n```\n\n```\n\
    //NAVIGATION BUTTONS\n\n    //Tint of the navigation button backgrounds\n    [[UIBarButtonItem\
    \ appearanceWhenContainedIn:[UINavigationBar class],nil]\nsetTintColor:kNavigationButtonBackgroundColour];\n\
    \n    barButtonItemTextAttributes = [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \                                  kFontNavigationTextColour, UITextAttributeTextColor,\n\
    \                                   [UIColor whiteColor], UITextAttributeTextShadowColor,\n\
    \                                   [NSValue valueWithUIOffset:UIOffsetMake(0,\
    \ 1)],\nUITextAttributeTextShadowOffset,nil];\n    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar\
    \ class], nil]\nsetTitleTextAttributes:barButtonItemTextAttributes forState:UIControlStateNormal];\n\
    \n    NSDictionary *disabledBarButtonItemTextAttributes = [NSDictionary\ndictionaryWithObjectsAndKeys:\n\
    \                                    kFontNavigationDisabledTextColour,\nUITextAttributeTextColor,\n\
    \                                   [UIColor whiteColor], UITextAttributeTextShadowColor,\n\
    \                                   [NSValue valueWithUIOffset:UIOffsetMake(0,\
    \ 1)],\nUITextAttributeTextShadowOffset,nil];\n    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar\
    \ class], nil]\nsetTitleTextAttributes:disabledBarButtonItemTextAttributes forState:UIControlStateDisabled];\n\
    ```\n\nBuild and run. The result should be tinted bar button items, as shown in\
    \ [Figure 9-17](#Chapter09.html#fig_9_17).\n\n![Image](images/9781430243748_Fig09-17.jpg)\n\
    \n**Figure 9-17.** Tinted bar button items\n\nIn the latest code, I’ve introduced\
    \ the `appearanceWhenContainedIn:` styling method. The significance of this second\
    \ appearance API is that we can specify that iOS only apply the cream-color style\
    \ to instances of `UIBarButtonItem` that appear within the `UINavigationBar` container\
    \ class. If we stick to setting a global style on all instances of the `UIBarButtonItem`\
    \ class, then our style is also applied to the Address Book and Facebook bar button\
    \ item instances in the toolbar. Our app design has a very different skin for\
    \ the toolbar and its bar button items, so that wouldn’t be ideal. Let’s now add\
    \ toolbar styling to our `initStyles` method:\n\n```\n//TOOLBAR\n\n    //Toolbar\
    \ cake background image\n    [[UIToolbar appearance] setBackgroundImage:[UIImage\
    \ imageNamed:@\"tool-bar-background.png\"]\nforToolbarPosition:UIToolbarPositionAny\
    \ barMetrics:UIBarMetricsDefault];\n\n    //TOOLBAR BUTTONS\n    //Dark background\
    \ of Toolbar Buttons\n    //Tint of the toolbar button backgrounds\n    [[UIBarButtonItem\
    \ appearanceWhenContainedIn:[UIToolbar class],nil]\nsetTintColor:kToolbarButtonBackgroundColour];\n\
    \n    //White text on UIBarButtonItems\n    barButtonItemTextAttributes = [NSDictionary\
    \ dictionaryWithObjectsAndKeys:[UIColor\nwhiteColor], UITextAttributeTextColor,nil];\n\
    \    [[UIBarButtonItem appearanceWhenContainedIn:[UIToolbar class], nil]\n   \
    \  setTitleTextAttributes:barButtonItemTextAttributes forState:UIControlStateNormal];\n\
    ```\n\nBuild and run. Your home screen should be looking almost identical to our\
    \ home screen design by now (see [Figure 9-18](#Chapter09.html#fig_9_18)).\n\n\
    ![Image](images/9781430243748_Fig09-18.jpg)\n\n**Figure 9-18.** Stylized toolbar\
    \ and bar button items in the toolbar\n\n#### Applying our style sheet to the\
    \ rest of the app\n\nWe’re almost done with our style sheet class, but we need\
    \ to apply the label and image styling to the other screens in our app, so let’s\
    \ get that done now.\n\n##### Styling the alert time view\n\nThe navigation bar\
    \ and custom view background styling are automatically applied to all screens\
    \ in our app, but the instruction text in `BRNotificationTimeViewController` is\
    \ too dark against the checkered background, so open `BRNotificationTimeViewController.m`,\
    \ import `BRStyleSheet.h`, and add a `viewDidLoad` implementation:\n\n```\n-(void)\
    \ viewDidLoad\n{\n    [super viewDidLoad];\n    [BRStyleSheet styleLabel:self.whatTimeLabel\
    \ withType:BRLabelTypeLarge];\n}\n```\n\nBuild and run. The instruction text should\
    \ now be styled, as shown in [Figure 9-19](#Chapter09.html#fig_9_19).\n\n![Image](images/9781430243748_Fig09-19.jpg)\n\
    \n**Figure 9-19.** Styled Alert Time setting view\n\n##### Styling the birthday\
    \ edit view\n\nWe’ll apply the same styling process to the Birthday Edit view\
    \ controller. Open `BRBirthdayEditViewController.m`, import `BRStyleSheet.h`,\
    \ and then style the Include Year text label and photo container by adding a `viewDidLoad`\
    \ implementation:\n\n```\n-(void)viewDidLoad\n{\n    [super viewDidLoad];\n  \
    \  [BRStyleSheet styleLabel:self.includeYearLabel withType:BRLabelTypeLarge];\n\
    \    [BRStyleSheet styleRoundCorneredView:self.photoContainerView];\n}\n```\n\n\
    Build and run (see [Figure 9-20](#Chapter09.html#fig_9_20)).\n\n![Image](images/9781430243748_Fig09-20.jpg)\n\
    \n**Figure 9-20.** Stylized Birthday Edit view\n\n##### Styling the notes edit\
    \ view\n\nThe Notes Edit view controller displays a text view rather than a label,\
    \ so we’ll need to add a new text view styling method to our style sheet. In the\
    \ `BRStyleSheet.h` header, declare the new method:\n\n```\n+(void)styleTextView:(UITextView\
