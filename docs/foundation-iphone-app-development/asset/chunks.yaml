- fmt: '### Adding and editing birthdays


    Users of our app will be able to add and edit an unlimited number of birthdays.
    We’ll include the option to assign a photo to each birthday via the iPhone camera
    or Photo Library.


    All birthdays will be stored offline in a local database on the iPhone. We’ll
    read and write to the database via Apple’s `Core Data` framework (you’ll learn
    more about `Core Data` in [Chapter 8](#Chapter08.html#ch8)).


    ### Importing birthdays from the Address Book and Facebook


    We’ll program an import mechanism into our app that facilitates our users to batch-import
    birthdays using the latest iOS 6 Facebook social integration and native Address
    Book frameworks. We won’t force our users to import every one of his or her Facebook
    friends, however. We’ll allow them to pick and choose. This is one of the great
    benefits of creating our own custom offline storage solution: we control the data.


    Saving selected birthdays persistently in our app also means that we won’t lose
    this data and have to resync our app with the Address Book or Facebook, even if
    the OS shuts it down—which of course it never will because we’re building an optimized
    app here.


    ### Note taking


    We’ll include a note-taking option in our app—the perfect way for our user to
    keep track of gift ideas. Notes will also be saved and stored in our offline `Core
    Data` store.


    ### Reminder notifications


    Our app will take advantage of local notifications in the iOS SDK. In our app
    code, we’ll schedule these notification alerts, which will fire on the user’s
    iPhone in time for each birthday reminder—even when our app isn’t running. We’ll
    also play a little Happy Birthday jingle with our birthday reminders.


    ### Facebook social integration and in-app marketing


    We won’t stop at just importing Facebook birthdays into our App. We’ll learn how
    to deeply integrate with Facebook’s Graph API and Apple’s iOS 6 social framework
    to enable users to post directly to their friends’ Facebook Walls without having
    to exit the app. In addition to this being a useful feature for our users, we
    automatically gain free advertising for *Birthday Reminder*. Every Facebook post
    via a third-party app includes a direct link back to the originating app. This
    helps to publicize *Birthday Reminder* every time any of our users post Happy
    Birthday messages to their Facebook friends.


    We’ll also make it easy for our user to call, SMS, or e-mail birthday wishes to
    friends imported from the Address Book.


    ### The competition


    We have our app idea, but before we get into the design and coding stages, now
    might be a good time to take a look at the competition.


    It’s always worth looking at your app’s most successful competitors at the beginning
    of a project.


    Search the App Store for your target keywords. Which apps regularly come up at
    the top of the search list? Typically, those are the apps getting the most downloads.
    What are these successful competitors doing right? It is likely to be a combination
    of the following:


    > *   They have a great icon.

    > *   They’ve built a great app.

    > *   They’ve designed a beautiful UI (user interface).

    > *   Their app is easy to use and has an intuitive user experience.

    > *   They’ve integrated social networking into their app effectively.

    > *   They’ve run a strong marketing campaign.

    > *   They’ve been featured by Apple in the App Store.

    > *   They’ve got lots of 4- and 5-star ratings.

    > *   They had the idea first and launched ahead of the competition.


    The last point in this list is often one of the most likely scenarios. A great
    number of those app makers who got into the App Store early with a good idea are
    still holding strong in their category. Being in the top 100 of your category
    gives your app a great deal of publicity. If you’re lucky enough to hit that position,
    your app gets much greater App Store visibility—and therefore a greater continued
    chance of success.


    As a new app developer, I recommend that you focus on the first six points on
    that list (the only points that are under your control) and in turn, with good
    marketing, you may rise up the charts based on your hard work.


    At its peak, *Tap to Chat* was in the top 50 free social networking apps in the
    US App Store—it was getting 4,000+ daily downloads. This remained the case for
    a good few months. My team then released a better version of our app under a new
    company. However, the new version never got lucky enough to reach the same chart
    position as the original. It didn’t matter that the second version of our app
    was totally awesome, it mattered that our first version had reached a powerful
    position and maintained its popularity.


    In preparation for this book, I built the first version of *Birthday Reminder*
    in only five days. Before doing so, I took a good look at competitor apps. I checked
    out the search results, and I downloaded and paid for a few of the other birthday
    reminder apps that stood out from the crowd. I actually discovered 120 competitor
    iPhone apps in search results for “birthday reminder”. This didn’t put me off
    the idea, however. For starters, I was confident that I could implement at least
    the first five points on my list of what it takes to be successful: I could build
    a beautiful app with an intuitive user experience that would deliver on its core
    task of reminding users of all their friends’ birthdays. The app would incorporate
    Facebook social media in a useful way for users, but also be an effective method
    for empowering peer-to-peer marketing.


    I was actually encouraged by the search results. Yes, some of the competitor apps
    are good, but without pulling any punches, the majority of them were not.


    Some of the top results have hundreds of ratings and reviews. This is also encouraging
    because it shows there’s a strong market for birthday reminder apps if you can
    get noticed.


    If you want to check out the app you’ll be building from scratch throughout the
    course of this book, then you can download *Birthday Reminder for Facebook* from
    the App Store right now.'
