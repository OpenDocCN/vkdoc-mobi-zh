- fmt: '### Registering as an Apple Developer


    There are two stages of registration required before we can test our app on an
    iPhone and submit apps to the App Store:


    > - Registering as an Apple developer, which is free

    > - Enrolling in the iOS Developer Program, which costs $99


    Registering as an Apple developer is free via Apple’s Developer web site:


    [`http://developer.apple.com/programs/register/`](http://developer.apple.com/programs/register/)


    Registration gives you access to sample code, documentation, and WWDC (Apple Worldwide
    Developers Conference) tutorial videos.


    To register as an Apple developer, you’ll need to use an existing Apple ID or
    create a new one. If you’ve ever downloaded an app from the App Store to your
    iPhone, then you used your Apple ID to do so. Alternatively, if you’ve ever used
    MobileMe, iCloud, or Game Center, you used your Apple ID.


    So what are you waiting for? Go through the Apple developer registration stages
    and report back when you’re done! This shouldn’t take too long, and once completed,
    you’ll gain immediate access to the iOS Dev Center. [Figure 2-2](#Chapter02.html#fig_2_2)
    highlights the differences between the free registration and the $99 iOS Developer
    Program.


    ![Image](images/9781430243748_Fig02-02.jpg)


    **Figure 2-2.** The iOS Dev Center: The left screenshot shows the free registration
    window; the right screenshot shows the enrolled developer window.


    In [Figure 2-2](#Chapter02.html#fig_2_2), you’ll see that the right-hand column
    of the iOS Dev Center is initially populated with a promotional advertisement
    for the iOS Developer Program. Once you’ve completed the application to enroll
    in the Developer Program, this column becomes populated with all the additional
    resources needed to prepare your apps for distribution (the right screenshot in
    [Figure 2-2](#Chapter02.html#fig_2_2) shows a paid member logged in).


    *Note: It is not 100 percent essential to become a paid member of the iOS Developer
    Program to complete the course in this book. You can test your code in the iOS
    simulator on your Mac.*


    In order to test our apps on iPhones (and eventually, to submit apps to the App
    Store), you need to become a paid member of the Apple Developer Program. So, on
    to the next stage.


    ### Enrolling in the iOS Developer Program


    If you plan to develop your own App Store or Enterprise apps, you need to complete
    the application process and enroll in the iOS Developer Program.


    The standard program fee costs $99 per year. There is also a more expensive version:
    the iOS Developer Enterprise Program, which has a $299 annual fee. The main advantage
    of choosing the Enterprise Program is that it enables you to distribute apps in-house
    without having to publish via the App Store. The Enterprise Program is intended
    for large companies. There’s a separate process that companies need to go through
    to prove eligibility (this is outside of the scope of this book).


    For most of us, the standard iOS Developer Program will suffice. Becoming an enrolled
    iOS Developer gives you access to:


    > - The iOS Provisioning Portal

    > - iTunes Connect

    > - Apple Developer Forums

    > - The new iOS SDK betas. At the time of writing this book, iOS 6 was still in
    beta. As you can see in [Figure 2-2](#Chapter02.html#fig_2_2), until I became
    a paid member of the iOS Developer Program, I didn’t have access to the new beta.


    In order to debug directly on your iPhone and distribute your apps, you need to
    create provisioning profiles. These are files that Xcode bakes into your app when
    it compiles. The provisioning profile determines which devices your app can be
    installed on. Once we have access to the iOS Provisioning Portal, we are able
    to generate and download these provisioning profiles.


    iTunes Connect ([`https://itunesconnect.apple.com`](https://itunesconnect.apple.com))
    is a content management system for your App Store apps. Submitting new apps and
    app updates to the App Store is handled by iTunes Connect. In addition, developers
    log in to iTunes Connect to manage:


    > - Bank and tax info/contracts

    > - Sales trends and reports


    The Apple Developer Forums provide a great online resource for iOS and Mac software
    programming questions.


    Before you can get access to these iOS developer tools and resources, you’ll need
    to wait for Apple to approve your iOS Developer Program application (see [Figure
    2-3](#Chapter02.html#fig_2_3)).


    ![Image](images/9781430243748_Fig02-03.jpg)


    **Figure 2-3.** Enrolling in the iOS Developer Program


    First, go through the enrollment process on Apple’s Developer web site:


    [`http://developer.apple.com/programs/ios/`](http://developer.apple.com/programs/ios/)


    That shouldn’t take too long. Afterward, however, you’ll probably wait for as
    long as two weeks until Apple accepts your application to the program. There’s
    quite a lot of red tape to get through. Don’t worry though. In the meantime, you
    can skip to [Chapter 3](#Chapter03.html#ch3). Once you get approved, flip back
    to this chapter and I’ll walk you through the somewhat confusing process of provisioning
    our app for testing on devices.


    ### iOS Provisioning Portal


    Welcome to the iOS Provisioning Portal (see [Figure 2-4](#Chapter02.html#fig_2_4)).
    We’re now going to step through each stage of the process required to generate
    provisioning profiles.


    ![Image](images/9781430243748_Fig02-04.jpg)


    **Figure 2-4.** iOS Provisioning Portal


    Take a look at the left-hand column of [Figure 2-4](#Chapter02.html#fig_2_4).
    The menu lists the following stages of provisioning in the exact order we’re going
    to step through them:


    > - *Certificates*: You’ll need to create one developer certificate and one distribution
    signing certificate for use with this app and all future apps.

    > - *Devices*: Here’s where you will add the Unique Device Identifiers (UDID)
    of all the iPhones, iPods, and iPads that you wish to test your apps on.

    > - *App IDs*: Before you can create a provisioning profile for our app, you’ll
    need to create a unique identifier for the app, which Xcode will use to associate
    your compiling project with the correct provisioning profile.

    > - *Provisioning*: At this point, you’ll finally be generating the provision
    profile(s) I’ve been referencing. Each profile ties together the certificate(s),
    devices, and App ID created in the three preceding stages.'
