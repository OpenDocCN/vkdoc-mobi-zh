- fmt: "#### Presenting a modal view controller\n\nEarlier in the chapter, we learned\
    \ how to *push* a view controller onto a navigation controller stack using view\
    \ controllers and segue transitions. Another common method of changing the front\
    \ visible view controller is by *presenting* a modal view controller.\n\nModal\
    \ view controllers are not added to the navigation stack, but rather placed in\
    \ front of the topmost view controller: in front of the actual navigation controller\
    \ in the case of *Birthday Reminder*.\n\nWe’re now going to present a new `Edit\
    \ Birthday` view controller that is displayed in our app whenever the user is\
    \ either adding or editing a birthday. The process to set up and present a modal\
    \ view controller is very similar to setting up a new view controller to push.\
    \ First, drag a new view controller instance from the Object Library onto the\
    \ storyboard. You can place new storyboard scenes wherever you like, but to keep\
    \ things organized for our project, place the new `Edit Birthday` view controller\
    \ above the `Birthday Detail` view controller.\n\nNow to create a new segue transition\
    \ and connect the new view controller into our hierarchy. Control-drag from the\
    \ `Add Birthday` button in the `Birthday Detail` view to the new `Edit Birthday`\
    \ view controller. From the choice of storyboard segues, this time select `Modal`.\
    \ The results should look like [Figure 5-14](#Chapter05.html#fig_5_14).\n\n![Image](images/9781430243748_Fig05-14.jpg)\n\
    \n**Figure 5-14.** Creating a modal segue\n\nTry a build and run. You should be\
    \ presented with the new view controller when tapping the `Add Birthday` button,\
    \ which animates in from the bottom of the screen. Why do you think the new view\
    \ doesn’t have a navigation bar like all the other views in our app? Because the\
    \ new modal view controller has no navigation controller as its parent container:\
    \ it’s simply presented in front of the existing navigation. To remedy this, we\
    \ actually need to place our `Edit Birthday` view controller within its own navigation\
    \ controller. We’ve done this before. Simply select the new `Edit Birthday` view\
    \ controller and from Xcode’s menu: `Editor` ![Image](images/U001.jpg) `Embed\
    \ In` ![Image](images/U001.jpg) `Navigation Controller`. The `Edit Birthday` view\
    \ controller slides right in the storyboard to make way for the newly added navigation\
    \ controller (see [Figure 5-15](#Chapter05.html#fig_5_15)).\n\n![Image](images/9781430243748_Fig05-15.jpg)\n\
    \n**Figure 5-15.** A navigation controller presented modally\n\nXcode is intelligent\
    \ enough to replace the `Edit Birthday` view controller with its new navigation\
    \ controller. The navigation controller becomes the actual view controller that\
    \ is presented when `Add Birthday` is tapped. In the storyboard, select the `Edit\
    \ Birthday` view controller again and enter the title `Edit Birthday`, and add\
    \ `Cancel` and `Save` bar button items either side of the title (see [Figure 5-16](#Chapter05.html#fig_5_16)).\n\
    \n![Image](images/9781430243748_Fig05-16.jpg)\n\n**Figure 5-16.** `Edit Birthday`\
    \ bar button items and title\n\n#### Dismissing a modal view controller\n\nNow\
    \ we reach a minor roadblock: how do we dismiss the modal navigation controller\
    \ when the `Cancel` button is tapped? The answer is not to drag a new segue from\
    \ the `Cancel` button to the root navigation controller. You can do this to create\
    \ a new segue, but the result is that a duplicate of the root view controller\
    \ is created by the storyboard, and pushed or presented on top of the existing\
    \ modal view controller. That’s not what we’re after.\n\nThere are two ways we\
    \ can dismiss our modal view controller, and both require us to write code. Let’s\
    \ step through option 1, by creating an *unwind segue* (new in iOS 6).\n\n#####\
    \ Unwind segues\n\nUnwind segues can be created in storyboards as long as you’ve\
    \ created an *unwind action* in the view controller you wish to unwind to (navigate\
    \ back to). An unwind action is recognized by the compiler based on the following\
    \ method signature format:\n\n`-(IBAction)unwindActionMethodName:(UIStoryboardSegue\
    \ *)segue;`\n\nThe method name can be whatever we like, as long as it matches\
    \ this signature format. In our app, we want to unwind back to the `Home` view\
    \ controller when the `Cancel` button is tapped, so that’s where we’ll declare\
    \ and implement an unwind action.\n\nAdd the following method declaration to `BRHomeViewController.h`:\n\
    \n`-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue;`\n\n\
    Switch to the `BRHomeViewController.m` source file and implement the unwind action:\n\
    \n```\n-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue\n\
    {\n    NSLog(@\"unwindBackToHomeViewController!\");\n}\n```\n\nBack with the focus\
    \ on the `Edit Birthday` view controller in your storyboard, Control-drag from\
    \ the `Cancel` button to the Exit icon below and to the right of the Exit view\
    \ controller. A contextual menu should appear and enable you to select your `unwindBackToHomeViewController:`\
    \ unwind action, as shown in [Figure 5-17](#Chapter05.html#fig_5_17). You’ve just\
    \ created an unwind segue!\n\n![Image](images/9781430243748_Fig05-17.jpg)\n\n\
    **Figure 5-17.** Creating an unwind segue\n\nBuild and run. You should now be\
    \ able to dismiss the modally presented `Edit Birthday` view controller when you\
    \ tap the `Cancel` bar button item.\n\nWhen performing an unwind segue, iOS automatically\
    \ unwinds the exiting view controller to the view controller that owns the unwind\
    \ action. That’s why we don’t have to write any execution code to deal with dismissing\
    \ the modal view controller. But hold on, what if we do want to dismiss a modal\
    \ view controller with code? I’m glad you asked that!\n\n##### Dismissing a modal\
    \ view controller with code\n\nIn your storyboard, remove the exit segue you just\
    \ created. To do this, Control-click the `Cancel` button and tap the X button\
    \ next to the `unwindBackToHomeViewController:` action.\n\nNow create a new view\
    \ controller subclass for your `Edit Birthday` scene, naming it `BRBirthdayEditViewController`,\
    \ and assign it to your `Edit Birthday` view on the storyboard using the identity\
    \ inspector. If you need help with this, flip back to the “Creating View Controller\
    \ Classes” section of this chapter for step-by-step instructions.\n\nUsing the\
    \ Assistant Editor layout, control-drag to create a new `action` from the `Cancel`\
    \ button to the `BRBirthdayEditViewController.h` header named `cancelAndDismiss`\
    \ (see [Figure 5-18](#Chapter05.html#fig_5_18)).\n\n![Image](images/9781430243748_Fig05-18.jpg)\n\
    \n**Figure 5-18.** Adding a `cancelAndDismiss:` action\n\nSwitching to implement\
    \ the new `cancelAndDismiss:` action in `BRBirthdayEditViewController.m` source\
    \ file, we dismiss the modal view controller by calling `UIViewController`’s `dismissModalViewControllerAnimated:completion:`\
    \ method.\n\n```\n- (IBAction)cancelAndDismiss:(id)sender {\n    NSLog(@\"Cancel!\"\
    );\n    [self dismissViewControllerAnimated:YES completion:^{\n        //any code\
    \ we place inside this block will\n        //run once the view controller has\
    \ been dismissed\n        NSLog(@\"Dismiss complete!\");\n    }];\n}\n```\n\n\
    In Objective-C, a block is a segment of code that is passed around like a variable.\
    \ The second parameter in `UIViewController`’s `dismissModalViewControllerAnimated:completion:`\
    \ method is a block. When the dismiss animation completes, our block of code executes.\n\
    \nBuild and run. You should be able to dismiss the `Birthday Edit` view controller\
    \ and see a delay between the `Cancel!` and `Dismiss Complete!` debug logs.\n\n\
    But what if we want to present other modal view controllers in our app? We’ll\
    \ end up having to copy and paste the `cancelAndDismiss:` method into other view\
    \ controller subclasses. Duplicate code is never a good thing for a good programmer!\
    \ Luckily for us, Objective-C is an object-oriented language, so we can solve\
    \ this thanks to inheritance and subclassing."
  raw: '#### Presenting a modal view controller


    Earlier in the chapter, we learned how to *push* a view controller onto a navigation
    controller stack using view controllers and segue transitions. Another common
    method of changing the front visible view controller is by *presenting* a modal
    view controller.


    Modal view controllers are not added to the navigation stack, but rather placed
    in front of the topmost view controller: in front of the actual navigation controller
    in the case of *Birthday Reminder*.


    We’re now going to present a new Edit Birthday view controller that is displayed
    in our app whenever the user is either adding or editing a birthday. The process
    to set up and present a modal view controller is very similar to setting up a
    new view controller to push. First, drag a new view controller instance from the
    Object Library onto the storyboard. You can place new storyboard scenes wherever
    you like, but to keep things organized for our project, place the new Edit Birthday
    view controller above the Birthday Detail view controller.


    Now to create a new segue transition and connect the new view controller into
    our hierarchy. Control-drag from the Add Birthday button in the Birthday Detail
    view to the new Edit Birthday view controller. From the choice of storyboard segues,
    this time select Modal. The results should look like [Figure 5-14](#Chapter05.html#fig_5_14).


    ![Image](images/9781430243748_Fig05-14.jpg)


    **Figure 5-14.** Creating a modal segue


    Try a build and run. You should be presented with the new view controller when
    tapping the Add Birthday button, which animates in from the bottom of the screen.
    Why do you think the new view doesn’t have a navigation bar like all the other
    views in our app? Because the new modal view controller has no navigation controller
    as its parent container: it’s simply presented in front of the existing navigation.
    To remedy this, we actually need to place our Edit Birthday view controller within
    its own navigation controller. We’ve done this before. Simply select the new Edit
    Birthday view controller and from Xcode’s menu: Editor ![Image](images/U001.jpg)
    Embed In ![Image](images/U001.jpg) Navigation Controller. The Edit Birthday view
    controller slides right in the storyboard to make way for the newly added navigation
    controller (see [Figure 5-15](#Chapter05.html#fig_5_15)).


    ![Image](images/9781430243748_Fig05-15.jpg)


    **Figure 5-15.** A navigation controller presented modally


    Xcode is intelligent enough to replace the Edit Birthday view controller with
    its new navigation controller. The navigation controller becomes the actual view
    controller that is presented when Add Birthday is tapped. In the storyboard, select
    the Edit Birthday view controller again and enter the title **Edit Birthday**,
    and add Cancel and Save bar button items either side of the title (see [Figure
    5-16](#Chapter05.html#fig_5_16)).


    ![Image](images/9781430243748_Fig05-16.jpg)


    **Figure 5-16.** Edit Birthday bar button items and title


    #### Dismissing a modal view controller


    Now we reach a minor roadblock: how do we dismiss the modal navigation controller
    when the Cancel button is tapped? The answer is not to drag a new segue from the
    Cancel button to the root navigation controller. You can do this to create a new
    segue, but the result is that a duplicate of the root view controller is created
    by the storyboard, and pushed or presented on top of the existing modal view controller.
    That’s not what we’re after.


    There are two ways we can dismiss our modal view controller, and both require
    us to write code. Let’s step through option 1, by creating an *unwind segue* (new
    in iOS 6).


    ##### Unwind segues


    Unwind segues can be created in storyboards as long as you’ve created an *unwind
    action* in the view controller you wish to unwind to (navigate back to). An unwind
    action is recognized by the compiler based on the following method signature format:


    `-(IBAction)unwindActionMethodName:(UIStoryboardSegue *)segue;`


    The method name can be whatever we like, as long as it matches this signature
    format. In our app, we want to unwind back to the Home view controller when the
    Cancel button is tapped, so that’s where we’ll declare and implement an unwind
    action.


    Add the following method declaration to `BRHomeViewController.h`:


    `-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue;`


    Switch to the `BRHomeViewController.m` source file and implement the unwind action:


    `-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue`

    `{`

    `    NSLog(@"unwindBackToHomeViewController!");`

    `}`


    Back with the focus on the Edit Birthday view controller in your storyboard, Control-drag
    from the Cancel button to the Exit icon below and to the right of the Exit view
    controller. A contextual menu should appear and enable you to select your `unwindBackToHomeViewController:`
    unwind action, as shown in [Figure 5-17](#Chapter05.html#fig_5_17). You’ve just
    created an unwind segue!


    ![Image](images/9781430243748_Fig05-17.jpg)


    **Figure 5-17.** Creating an unwind segue


    Build and run. You should now be able to dismiss the modally presented Edit Birthday
    view controller when you tap the Cancel bar button item.


    When performing an unwind segue, iOS automatically unwinds the exiting view controller
    to the view controller that owns the unwind action. That’s why we don’t have to
    write any execution code to deal with dismissing the modal view controller. But
    hold on, what if we do want to dismiss a modal view controller with code? I’m
    glad you asked that!


    ##### Dismissing a modal view controller with code


    In your storyboard, remove the exit segue you just created. To do this, Control-click
    the Cancel button and tap the X button next to the `unwindBackToHomeViewController:`
    action.


    Now create a new view controller subclass for your Edit Birthday scene, naming
    it `BRBirthdayEditViewController`, and assign it to your Edit Birthday view on
    the storyboard using the identity inspector. If you need help with this, flip
    back to the “Creating View Controller Classes” section of this chapter for step-by-step
    instructions.


    Using the Assistant Editor layout, control-drag to create a new `action` from
    the Cancel button to the `BRBirthdayEditViewController.h` header named `cancelAndDismiss`
    (see [Figure 5-18](#Chapter05.html#fig_5_18)).


    ![Image](images/9781430243748_Fig05-18.jpg)


    **Figure 5-18.** Adding a cancelAndDismiss: action


    Switching to implement the new `cancelAndDismiss:` action `in BRBirthdayEditViewController.m`
    source file, we dismiss the modal view controller by calling UIViewController’s
    `dismissModalViewControllerAnimated:completion:` method.


    `- (IBAction)cancelAndDismiss:(id)sender {`

    **`    NSLog(@"Cancel!");`**

    **`    [self dismissViewControllerAnimated:YES completion:^{`**

    **`        //any code we place inside this block will`**

    **`        //run once the view controller has been dismissed`**

    **`        NSLog(@"Dismiss complete!");`**

    **`    }];`**

    `}`


    In Objective-C, a block is a segment of code that is passed around like a variable.
    The second parameter in `UIViewController`’s `dismissModalViewControllerAnimated:completion:`
    method is a block. When the dismiss animation completes, our block of code executes.


    Build and run. You should be able to dismiss the Birthday Edit view controller
    and see a delay between the Cancel! and Dismiss Complete! debug logs.


    But what if we want to present other modal view controllers in our app? We’ll
    end up having to copy and paste the `cancelAndDismiss:` method into other view
    controller subclasses. Duplicate code is never a good thing for a good programmer!
    Luckily for us, Objective-C is an object-oriented language, so we can solve this
    thanks to inheritance and subclassing.'
  trans: "\n#### 呈现模态视图控制器\n\n在本章前面，我们学习了如何使用视图控制器和转场过渡*推入*一个视图控制器到导航控制器栈中。另一种改变当前可见视图控制器的常见方法是通过*呈现*一个模态视图控制器。\n\
    \n模态视图控制器不会添加到导航栈中，而是放置在顶层视图控制器之前：在*Birthday Reminder*应用中，它被放置在导航控制器本身的前面。\n\n\
    现在我们即将呈现一个新的 `Edit Birthday` 视图控制器，当用户添加或编辑生日时，它会在应用中显示。设置并呈现模态视图控制器的过程与设置并推入新视图控制器非常相似。首先，从对象库中拖拽一个新的视图控制器实例到故事板。你可以将新的故事板场景放置在任何你喜欢的位置，但为了保持项目组织有序，请将新的\
    \ `Edit Birthday` 视图控制器放置在 `Birthday Detail` 视图控制器的上方。\n\n现在创建一个新的转场过渡，并将新的视图控制器连接到我们的层级结构中。从\
    \ `Birthday Detail` 视图中的 `Add Birthday` 按钮按住 Control 键拖拽到新的 `Edit Birthday` 视图控制器。在故事板转场的选择中，这次选择\
    \ `Modal`。结果应如图 5-14 所示。\n\n![图片](img/9781430243748_Fig05-14.jpg)\n\n**图 5-14.**\
    \ 创建模态转场\n\n尝试构建并运行。当点击 `Add Birthday` 按钮时，你应该会看到新视图控制器从屏幕底部动画呈现。你认为为什么新视图不像应用中其他视图那样有导航栏？因为新的模态视图控制器没有导航控制器作为其父容器：它只是简单地呈现在现有导航的前面。为了解决这个问题，我们需要将\
    \ `Edit Birthday` 视图控制器放入它自己的导航控制器中。我们之前做过这个操作。只需选择新的 `Edit Birthday` 视图控制器，然后从\
    \ Xcode 菜单中选择：`Editor` ![图片](img/U001.jpg) `Embed In` ![图片](img/U001.jpg) `Navigation\
    \ Controller`。`Edit Birthday` 视图控制器会在故事板中滑动，为新添加的导航控制器腾出空间（见图 5-15）。\n\n![图片](img/9781430243748_Fig05-15.jpg)\n\
    \n**图 5-15.** 模态呈现的导航控制器\n\nXcode 足够智能，会将 `Edit Birthday` 视图控制器替换为其新的导航控制器。这个导航控制器成为了点击\
    \ `Add Birthday` 时实际呈现的视图控制器。在故事板中，再次选择 `Edit Birthday` 视图控制器，输入标题 `Edit Birthday`，并在标题两侧添加\
    \ `Cancel` 和 `Save` 栏按钮项（见图 5-16）。\n\n![图片](img/9781430243748_Fig05-16.jpg)\n\n\
    **图 5-16.** `Edit Birthday` 栏按钮项和标题\n\n#### 关闭模态视图控制器\n\n现在我们遇到了一个小障碍：当点击 `Cancel`\
    \ 按钮时，我们如何关闭模态导航控制器？答案不是从 `Cancel` 按钮拖拽一个新的转场到根导航控制器。你可以这样做来创建一个新转场，但结果是故事板会创建一个根视图控制器的副本，并将其推入或呈现在现有模态视图控制器的顶部。这不是我们想要的结果。\n\
    \n有两种方法可以关闭我们的模态视图控制器，这两种方法都需要我们编写代码。让我们逐步了解选项 1，即创建一个*展开转场*（iOS 6 新增）。\n\n#####\
    \ 展开转场\n\n只要在你希望展开（导航回）到的视图控制器中创建了一个*展开动作*，就可以在故事板中创建展开转场。编译器通过以下方法签名格式来识别展开动作：\n\
    \n`-(IBAction)unwindActionMethodName:(UIStoryboardSegue *)segue;`\n\n方法名可以是任何我们喜欢的名称，只要它符合这个签名格式。在我们的应用中，当点击\
    \ `Cancel` 按钮时，我们希望展开回 `Home` 视图控制器，所以我们要在那里声明并实现一个展开动作。\n\n将以下方法声明添加到 `BRHomeViewController.h`\
    \ 中：\n\n`-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue;`\n\
    \n切换到 `BRHomeViewController.m` 源文件并实现展开动作：\n\n```\n-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue\
    \ *)segue\n{\n    NSLog(@\"unwindBackToHomeViewController!\");\n}\n```\n\n回到故事板中，聚焦于\
    \ `Edit Birthday` 视图控制器，从 `Cancel` 按钮按住 Control 键拖拽到 Exit 视图控制器下方和右侧的 Exit 图标。应该会弹出一个上下文菜单，让你选择\
    \ `unwindBackToHomeViewController:` 展开动作，如图 5-17 所示。你刚刚创建了一个展开转场！\n\n![图片](img/9781430243748_Fig05-17.jpg)\n\
    \n**图 5-17.** 创建展开转场\n\n构建并运行。现在当你点击 `Cancel` 栏按钮项时，应该能够关闭模态呈现的 `Edit Birthday`\
    \ 视图控制器。\n\n当执行展开转场时，iOS 会自动将现有的视图控制器展开到拥有展开动作的视图控制器。这就是为什么我们不必编写任何执行代码来处理关闭模态视图控制器的原因。但等等，如果我们想用代码关闭模态视图控制器呢？很高兴你问到这个问题！\n\
    \n##### 用代码关闭模态视图控制器\n\n在你的故事板中，删除你刚刚创建的退出转场。为此，按住 Control 键点击 `Cancel` 按钮，然后点击\
    \ `unwindBackToHomeViewController:` 动作旁边的 X 按钮。\n\n现在为你的 `Edit Birthday` 场景创建一个新的视图控制器子类，命名为\
    \ `BRBirthdayEditViewController`，并使用身份检查器将其分配到故事板上的 `Edit Birthday` 视图。如果你需要帮助，请翻回本章的“创建视图控制器类”部分查看逐步说明。\n\
    \n使用助理编辑器布局，从 `Cancel` 按钮按住 Control 键拖拽到 `BRBirthdayEditViewController.h` 头文件，创建一个名为\
    \ `cancelAndDismiss` 的新 `action`（见图 5-18）。\n\n![图片](img/9781430243748_Fig05-18.jpg)\n\
    \n**图 5-18.** 添加 `cancelAndDismiss:` 动作\n\n切换到在 `BRBirthdayEditViewController.m`\
    \ 源文件中实现新的 `cancelAndDismiss:` 动作，我们通过调用 `UIViewController` 的 `dismissModalViewControllerAnimated:completion:`\
    \ 方法来关闭模态视图控制器。\n\n```\n- (IBAction)cancelAndDismiss:(id)sender {\n    NSLog(@\"\
    Cancel!\");\n    [self dismissViewControllerAnimated:YES completion:^{\n     \
    \   //我们放在这个块中的任何代码\n        //都将在视图控制器被关闭后运行\n        NSLog(@\"Dismiss complete!\"\
    );\n    }];\n}\n```\n\n在 Objective-C 中，块是一段像变量一样传递的代码。`UIViewController` 的 `dismissModalViewControllerAnimated:completion:`\
    \ 方法的第二个参数就是一个块。当关闭动画完成时，我们的代码块就会执行。\n\n构建并运行。你应该能够关闭 `Birthday Edit` 视图控制器，并看到\
    \ `Cancel!` 和 `Dismiss Complete!` 调试日志之间的延迟。\n\n但是，如果我们想在应用中呈现其他模态视图控制器呢？我们最终将不得不将\
    \ `cancelAndDismiss:` 方法复制粘贴到其他视图控制器子类中。重复代码对于一个优秀的程序员来说从来都不是好事！幸运的是，Objective-C\
    \ 是一种面向对象的语言，所以我们可以通过继承和子类化来解决这个问题。\n"
- fmt: "### Subclassing: Creating a Core View Controller\n\nWe now have three custom\
    \ view controllers in our project. Each of those view controllers is a subclass\
    \ of Apple's `UIViewController` class. Now here's a very handy technique I'd like\
    \ to introduce: we can create a core subclass of `UIViewController` and then tweak\
    \ all of our individual view controller classes to subclass the core view controller\
    \ rather than `UIViewController` directly. The benefit of doing this is that we\
    \ can then add common/shared methods and properties to the core view controller\
    \ class, and all individual view controllers will inherit those methods and properties\
    \ automatically.\n\nConfused? Or does that make perfect sense?! It should become\
    \ clearer once we get into the code.\n\nFirst, let's create our new core view\
    \ controller class. Select the `view-controllers` group in the project navigator\
    \ and then File ![Image](images/U001.jpg) New ![Image](images/U001.jpg) File to\
    \ choose the Objective-C class option from the Cocoa Touch file templates. Name\
    \ the new class `BRCoreViewController` and ensure the subclass is set to `UIViewController`.\n\
    \nType in the following two Interface Builder action method signatures directly\
    \ into the `BRCoreViewController.h` header:\n\n```\n#import <UIKit/UIKit.h>\n\n\
    @interface BRCoreViewController : UIViewController\n\n- (IBAction)cancelAndDismiss:(id)sender;\n\
    - (IBAction)saveAndDismiss:(id)sender;\n\n@end\n```\n\nSwitch to `BRCoreViewController.m`\
    \ and begin deleting all the default method code that Xcode has added from the\
    \ file template. Replace it with the following implementation:\n\n```\n#import\
    \ \"BRCoreViewController.h\"\n\n@interface BRCoreViewController ()\n\n@end\n\n\
    @implementation BRCoreViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.view.backgroundColor = [UIColor grayColor];\n}\n\n- (IBAction)cancelAndDismiss:(id)sender\n\
    {\n    NSLog(@\"Cancel\");\n    [self dismissViewControllerAnimated:YES completion:^{\n\
    \        //view controller dismiss animation completed\n    }];\n}\n\n- (IBAction)saveAndDismiss:(id)sender\n\
    {\n    NSLog(@\"Save\");\n    [self dismissViewControllerAnimated:YES completion:^{\n\
    \        //view controller dismiss animation completed\n    }];\n}\n\n@end\n```\n\
    \nIn addition to the `cancelAndDismiss:` and `saveAndDismiss:` action methods,\
    \ we're setting our view's background color to gray via the `viewDidLoad` method;\
    \ this results in any subclass of `BRCoreViewController` automatically inheriting\
    \ this code and coloring their own view gray. Clever!\n\nOpen the header files\
    \ of the view controllers we've created so far: `BRHomeViewController.h`, `BRBirthdayDetailViewController.h`,\
    \ and `BRBirthdayEditViewController.h`. All three classes currently inherit from\
    \ `UIViewController` directly. Change this so that they each inherit from `BRCoreViewController`\
    \ instead:\n\nFor `BRHomeViewController.h`:\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"BRCoreViewController.h\"\n\n@interface BRHomeViewController : BRCoreViewController\n\
    \n@end\n```\n\nFor `BRBirthdayDetailViewController.h`:\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"BRCoreViewController.h\"\n\n@interface BRBirthdayDetailViewController\
    \ : BRCoreViewController\n\n@end\n```\n\nFor `BRBirthdayEditViewController.h`:\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface\
    \ BRBirthdayEditViewController : BRCoreViewController\n- (IBAction)cancelAndDismiss:(id)sender;\n\
    \n@end\n```\n\nNote how we should also delete the `cancelAndDismiss:` action method\
    \ from `BRBirthdayEditViewController.h` because this action is now handled by\
    \ the `BRCoreViewController` superclass. Switch to `BRBirthdayEditViewController.m`\
    \ and remove the entire implementation of `cancelAndDismiss:`.\n\nWe have yet\
    \ to connect our Save button in the birthday edit view to our newly added `saveAndDismiss:`\
    \ action. Control-drag from the Save button to its view controller owner, as shown\
    \ in [Figure 5-19](#Chapter05.html#fig_5_19). You'll be prompted with all of the\
    \ Interface Builder outlets and action connections. Select the `saveAndDismiss`\
    \ action. Do you see how it was inherited from our core view controller?\n\n![Image](images/9781430243748_Fig05-19.jpg)\n\
    \n**Figure 5-19.** Connecting the Save bar button item to the `saveAndDismiss:`\
    \ action\n\nBuild and run (see [Figure 5-20](#Chapter05.html#fig_5_20)). Hey,\
    \ has every view turned gray?! Here's where the penny should (hopefully) drop.\
    \ By taking advantage of adding a core view controller subclass, we're able to\
    \ change every single instance of any view controller that subclasses our core\
    \ view controller in just one place: the core view controller class code. At the\
    \ moment, every view controller inherits the gray background view color setting\
    \ code. Can you see how we might extend this technique further for *Birthday Reminder*?\
    \ All of our views have a custom background image in the designs, a checkered\
    \ background like our launch image. In one convenient place, we'll be able to\
    \ add this image to the background of every view in our app that subclasses core\
    \ view controller. We'll do this when we get to the chapter on skinning, but for\
    \ now, we've got a bunch of scenes to add to our storyboard.\n\n![Image](images/9781430243748_Fig05-20.jpg)\n\
