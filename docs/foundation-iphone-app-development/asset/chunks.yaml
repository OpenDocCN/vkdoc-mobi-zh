    ### 摘要


    今天上午开发社交分享功能的时间花得很值。我向你展示的分享和应用评分代码可以应用于任何项目（只需确保更新文本、图片和链接！）。如果你将应用内营销工作推迟到应用
    1.1 或 2.0 版本，那就犯了一个新手级的错误！苹果公司一直在让 iOS 应用实现社交功能变得越来越简单。你实在没有理由不利用它们那些易于实现的功能。


    你已经完成了 iPhone 应用的开发阶段！你走过了一段多么重要的旅程。


    在过去的四天半时间里，我们涵盖了 iOS SDK 的大量内容。你已经吸收了作为一名 iOS 开发者日常工作中所需的技能和代码。虽然`Birthday Reminder`只是一个为期五天的小型应用，但我在课程中向你介绍的众多技术可以应用于更大的项目。


    那么还有什么要做的？当然是提交我们的应用！在我们旅程的最后一章，我将带你了解 iTunes Connect，并指导你完成向 App Store 提交应用的步骤。我们一会儿见。


    ![图片](img/ch.jpg)


    # 第 14 章


    # 提交我们的应用


    你已经构建了你的 iPhone 应用，并准备上线！那么……具体该怎么做呢？答案是：使用 iTunes Connect。iTunes Connect 是苹果公司为
    iOS 和 Mac 开发者提供的基于 Web 的工具，用于通过 App Store 提交和分发他们的应用。


    应用提交流程主要有两个步骤：


    > 1.  通过 iTunes Connect 网站创建一个新的应用提交。

    > 2.  直接从 Xcode 构建并上传你的应用的 release 二进制文件到 iTunes Connect。


    完成第一步后，你将立即获得应用的 iTunes Apple ID，正如我们在第 13 章中学到的，该 ID 可用于在 App Store 中直接链接到你的应用。


    苹果允许你在完成初始的 iTunes Connect 应用提交表格后，有长达六个月的时间来上传你的应用二进制文件。因此，你完全可以在最终完成应用构建之前，提前预订一个
    App Store 名称。


    ### 使用 iTunes Connect 创建新的应用提交


    只有付费注册的 iOS 开发者才能访问 iTunes Connect。正如我在第 2 章中提到的，要成为一名注册的 iOS 开发者，首先需要处理很多繁琐的手续，所以如果你还没有完成第一步——那就回到第
    2 章去看看吧！


    那么，现在房间里只剩下已注册的 iOS 开发者了吗？启动 Safari，将浏览器指向 iTunes Connect 的网址 [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com)。


    首先，使用你的 iOS 开发者 Apple ID 和密码登录（见图 14-1）。


    ![图片](img/9781430243748_Fig14-01.jpg)


    **图 14-1.** iTunes Connect 首页


    除了向苹果提交新应用和应用更新，你还可以使用 iTunes Connect 查看你的销售和下载统计数据；填写合同、税务和账单表格；以及如果你使用苹果的 iAd
    平台，还可以管理和追踪广告收入。


    我们将专注于提交流程，因此请点击“管理你的应用”链接开始。接下来，点击蓝色的大“添加新应用”按钮。


    如图 14-2 所示，下一步是添加一些基本的应用信息。


    ![图片](img/9781430243748_Fig14-02.jpg)


    **图 14-2.** 设置基本应用信息，例如 App Store 名称


    #### 设置默认语言


    如果你的应用的基础语言是法语，那么现在是时候告诉苹果了！无论你选择哪种语言，它都将成为 App Store 关联到你应用的主要语言。另外值得注意的是，你可以在之后添加本地化的
    App Store 描述，甚至是一个本地化的名称。


    #### 输入应用名称


    App 名称是显示在你应用图标旁边的名称，用户在浏览 App Store 时会看到它。不要将其与你的应用显示名称混淆——后者是显示在 iPhone 主屏幕上应用下方的名称。与显示名称不同，App
    Store 名称可以相当长——最多 255 个字节，这大约相当于相同数量的常规字符。就 App Store 搜索优化而言，我建议你利用这些额外的字符，并在你的
    App Store 标题中包含相关关键词。这可以提高你的应用在 App Store 常规搜索和预测搜索结果中被发现或展示的机会。


    你可以等到填写完此表单中的所有四个字段后再提交，也可以点击“继续”来检查你输入的 App 名称是否已被 App Store 占用（见图 14-3）。


    ![图片](img/9781430243748_Fig14-03.jpg)


    **图 14-3.** 检查 App 名称是否已存在


    在图 14-3 中，请注意“您输入的 App 名称已被使用”这条错误信息。继续尝试不同的名称，直到不再出现该错误，这时你就知道你选择了一个唯一的 App Store
    名称。


    #### 输入 SKU 编号


    苹果关于处理 SKU 字段的在线文档如下：


    > 在 SKU 字段中，输入你的应用的唯一 UTF-8 字母数字标识符。SKU 可以是任何你希望用来在我们的系统中唯一标识你的字母和数字序列。只要该字符串对你的开发者账户是唯一的，你可以创建任何由
    UTF-8 字母和数字组成的字符串。此 SKU 仅限内部使用，用户在任何时候都不会看到。在你提交元数据后，此 SKU 将不可编辑。


    我倾向于简单地将我的应用的 bundle identifier 用作 SKU 编号（见图 14-2）。


    #### 关联 Bundle Identifier


    在配置门户中，iTunes Connect 会自动检测你所有尚未被你的 App Store 在线应用使用的有效 bundle identifier。你早在第
    2 章中就设置了一个 bundle identifier，因此使用下拉菜单，你应该能够选择你的 bundle identifier。当你选择一个有效的 bundle
    identifier 时，iTunes Connect 会提醒你“如果应用的第一版已获批准，则无法更改 Bundle ID”——所以请确保在点击“继续”按钮之前，你已经选择了正确的
    bundle identifier。


    ### 安排应用的上架时间和定价


    在应用提交表格的下一页，你需要设置应用的发布可用日期和价格（见图 14-4）。


    ![图片](img/9781430243748_Fig14-04.jpg)


    **图 14-4.** 设置应用的发布可用日期和价格


    #### 延迟应用发布


    如果你希望你的应用在苹果批准后立即上线，那么只需将可用日期保留为默认值（即今天日期）。然而，这是另一个营销你的应用的绝佳机会。在应用发布之前，没有人能公平地评判它是成功还是失败。根据我的经验，一旦你上传了二进制文件，苹果通常需要大约七天时间来进行审查，然后批准或拒绝一个应用。如果你将应用的可用日期安排在提交后的两周，那么一旦你的应用获得批准，你就能掌控它在
    App Store 上线的时机。充分利用这个主动权！一旦我知道某个应用已被苹果批准，我就会开始通过电子邮件通知记者们关于我应用发布的消息。此时，我确切地知道我的应用何时会在
    App Store 上线：因为苹果已经批准了提交，所以不存在任何不确定性。因此，我可以给记者们提供一条消息：我的酷应用将于 8 月 24 日星期五（或我选择的任何日期）发布。你看到这样发布的好处了吗？保持控制权，延迟你的应用发布。按*你*的条件发布，而不是按苹果的！

