    Within the `BJDGameModel` source file, you’ll find a private property named `cards`,
    which is a mutable array where we store our pack of 52 `BJDCard` instances. We’ve
    declared the array as mutable because we’ll be popping cards off the array as
    they are dealt into the `playerCards` and `dealerCards` mutable arrays. However,
    I haven’t provided you with prewritten code for generating a pack of cards. So
