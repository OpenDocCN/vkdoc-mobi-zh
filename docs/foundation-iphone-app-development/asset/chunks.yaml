    ## About the Author


    ![Image](images/fm-1.jpg)


    `Nick Kuh` is a iOS Consultant and Developer based in the UK with 14 years experience
    developing mobile, desktop and web applications for clients such as the BBC, ESPN,
    Channel 4, Pearson and Novartis. He works on large commercial iOS projects as
    well as helping start-ups to launch on the App Store.


    Nick balances his commercial work with the development of his own successful indie
    apps like *Tap to Chat*, *Poker Royale* and *Portfolio Pro*.


    You can find Nick on Twitter as @nickkuh or on his website [www.nickkuh.com](http://www.nickkuh.com).


    ## About the Technical Reviewer


    ![Image](images/fm-2.jpg)


    `Felipe Laso Marsetti` is a self-taught software developer specializing in iOS
    development and currently employed as a Systems Engineer at Lextech Global Services.
    Despite having worked with many languages throughout his life, nothing makes him
    happier than working on projects for iPhone and iPad. Felipe has over 2 years
    of professional iOS experience. He likes to write on his blog at [http://iFe.li](http://iFe.li),
    create iOS tutorials and articles as a member of [http://www.raywenderlich.com](http://www.raywenderlich.com)
    or work as a technical reviewer for Objective-C and iOS related books. You can
    find Felipe on Twitter as @Airjordan12345, on Facebook under his name or on App.net
    as @iFeli. When he’s not working or programming, Felipe loves to read and learn
    new languages and technologies, watch sports, cook or play the guitar and violin.


    ## About the Cover Image Artist


    ![Image](images/fm-3.jpg)


    `Corné van Dooren` designed the front cover image for this book. After taking
    a break from friends of ED to create a new design for the Foundation series, he
    worked at combining technological and organic forms, with the results now appearing
    on the cover of this and other books.


    Corné spent his childhood drawing on everything at hand and then began exploring
    the infinite world of multimedia—and his journey of discovery hasn’t stopped since.
    His mantra has always been “the only limit to multimedia is the imagination,”
    a saying that keeps him moving forward constantly.


    Corné works for many international clients, writes features for multimedia magazines,
    reviews and tests software, authors multimedia studies, and works on many other
    friends of ED books. If you like Corné’s work, be sure to check out his chapter
    in *New Masters of Photoshop: Volume 2* (friends of ED, 2004). You can see more
    of his work (and contact him) at his website, [www.cornevandooren.com](http://www.cornevandooren.com).


    ## Introduction


    My programming roots originated with Flash in 1999 when I first started writing
    object-oriented Games and Applications in ActionScript. More recently, in 2009,
    shortly after Apple launched the App Store and opened up their exciting new mobile
    platform to third parties, I decided to jump ship and become an iPhone Developer.


    The transition from developing for the Flash Player to the iPhone was not the
    smoothest ride, but one key factor that helped me more than anything is that the
    same foundation principals of object-oriented programming for Flash are also at
    the heart of Objective-C and the iOS SDK.


    If you are already working with another object-oriented language then you should
    be able to apply that knowledge to Objective-C and soon be up-and-running building
    apps for the iPhone.'
