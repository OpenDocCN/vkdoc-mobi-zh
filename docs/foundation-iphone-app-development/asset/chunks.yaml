    We’re going to set the view controller of the table view to be both the data source
    and the delegate. To do this, we have to indicate in the `BRHomeViewController.h`
    header that this class will adhere to both the `UITableViewDataSource` and `UITableViewDelegate`
    protocols. Modify your header by adding the delegate and data source implementation
    declaration:


    `@interface BRHomeViewController : BRCoreViewController` **`<UITableViewDelegate,
    UITableViewDataSource>`**


    Next, we need to assign the delegate and the `dataSource` outlets of the table
    view to `BRBirthdayTableViewController`. We’ll do this via the storyboard: Control-drag
    from the table view to the view controller object in the bar beneath the view,
    and you’ll be prompted to select the `dataSource` or delegate properties. Assign
    both to the Home view controller (see [Figure 7-6](#Chapter07.html#fig_7_6)).


    ![Image](images/9781430243748_Fig07-06.jpg)


    **Figure 7-6.** Setting the dataSource and delegate of the table view to BRHomeViewController


    The assigned `dataSource` object of a table view must implement the `UITableViewDataSource`
    protocol. When the table view loads, it requests from its `dataSource` the number
    of table sections and number of rows in each section. The designated `dataSource`
    object also generates instances of `UITableViewCell` in response to requests from
    the table view. The `UITableViewDataSource` protocol has two required method signatures
    that the compiler should warn you about if you don’t implement them:


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section;`


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath`

    `*)indexPath;`


    So we’d better add these methods to the source implementation of `BRHomeViewController`:


    `#pragma mark UITableViewDataSource`


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath`

    `*)indexPath`

    `{`

    `    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@"Cell"];`

    `    return cell;`

    `}`


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `    return 100;`

    `}`


    Did you notice how we’re referencing the `Cell` reuse identifier to grab reusable
    instances of the table cell prototype from our storyboard? Table views manage
    the reuse process directly: as soon as a table cell is scrolled out of the visible
    view, it is added to a reuse stack of cells and returned by the table view when
    we call `dequeueReusableCellWithIdentifier:`.


    Our implementation of `tableView:numberOfRowsInSection:` returns an integer of
    100\. We’re letting our table view know that there should be 100 rows in the table.


    Build and run your app. You should see lots of table rows of the subtitle style
    we set earlier (see [Figure 7-7](#Chapter07.html#fig_7_7)).


    ![Image](images/9781430243748_Fig07-07.jpg)


    **Figure 7-7.** One hundred table rows!


    If you select any of the table rows in the simulator or on your device, you’ll
    find that the selected row turns blue and remains selected. We’re going to modify
    the selection handling by implementing one of the `UITableViewDelegate` methods
    in our Home view controller:


    `#pragma mark UITableViewDelegate`


    `- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    [self.tableView deselectRowAtIndexPath:indexPath animated:YES];`

    `}`


    You should now find that when you run the app, the rows fade out elegantly on
    touch to indicate that the user interaction was recognized.


    The rows of our *Birthday Reminder* cells are 72 points high. The default height
    of a table cell is only 44 points. With our table view selected, we can modify
    the cell height in our storyboard using the size inspector by incrementing the
    Row Height to 72 (see [Figure 7-8](#Chapter07.html#fig_7_8)).


    ![Image](images/9781430243748_Fig07-08.jpg)


    **Figure 7-8.** Modifying the default row height of our table view


    *Note: Table views also support variable row height. You can determine individual
    row heights by implementing the `tableView:heightForRowAtIndexPath` method of
    the* `UITableViewDelegate` *protocol*.


    I think we need to load in some real data from our `birthdays.plist`. Let’s get
    to work loading dynamic data into our table.'
  trans: "\n在 Storyboard 中选中 Home 视图控制器场景后，从 `BRHomeViewController.h` 头文件新建一个指向表格视图的\
    \ Interface Builder 输出口，并将其命名为 `tableView`。\n\n`BRHomeViewController.h` 现在应如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface\
    \ BRHomeViewController : BRCoreViewController\n\n-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue\
    \ *)segue;\n@property (weak, nonatomic) IBOutlet UITableView *tableView;\n\n@end\n\
    ```\n\n### 表格数据源与委托协议\n\n在第 4 章中，我们首次学习了警告视图组件（`UIAlertView`），并了解到为了捕获 Alert 按钮的点击事件，需要让视图控制器订阅为其委托。同样的委托模式也适用于表格视图，只是表格视图拥有两种类型的委托：一种用于控制器，另一种用于数据模型。\n\
    \n我们将把表格视图的视图控制器同时设置为数据源和委托。为此，我们必须在 `BRHomeViewController.h` 头文件中指明该类将遵循 `UITableViewDataSource`\
    \ 和 `UITableViewDelegate` 两个协议。通过添加委托和数据源实现声明来修改头文件：\n\n`@interface BRHomeViewController\
    \ : BRCoreViewController <UITableViewDelegate, UITableViewDataSource>`\n\n接下来，我们需要将表格视图的委托和\
    \ `dataSource` 输出口分配给 `BRBirthdayTableViewController`。我们将通过 Storyboard 来操作：按住\
    \ Control 键从表格视图拖拽至视图下方栏中的视图控制器对象，系统会提示你选择 `dataSource` 或 delegate 属性。将两者都分配给\
    \ Home 视图控制器（如下图所示）。\n\n![Image](img/9781430243748_Fig07-06.jpg)\n\n**图 7-6.**\
    \ 将表格视图的 `dataSource` 和 delegate 设置为 `BRHomeViewController`\n\n表格视图的已分配 `dataSource`\
    \ 对象必须实现 `UITableViewDataSource` 协议。当表格视图加载时，它会向 `dataSource` 请求表格的分区数量以及每个分区中的行数。指定的\
    \ `dataSource` 对象还会根据表格视图的请求生成 `UITableViewCell` 实例。`UITableViewDataSource` 协议有两个必需的方法签名，如果你未实现它们，编译器会发出警告：\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section;\n\
    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath;\n```\n\n因此，我们最好将这些方法添加到 `BRHomeViewController` 的源实现中：\n\n```\n\
    #pragma mark UITableViewDataSource\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    UITableViewCell\
    \ *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"Cell\"];\n    return\
    \ cell;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return 100;\n}\n```\n\n你是否注意到我们是如何引用 `Cell` 重用标识符，从 Storyboard 中获取表格单元格原型的可重用实例的？表格视图直接管理重用过程：一旦表格单元格滚动到可见视图之外，它就会被添加到单元格的重用堆栈中，并在我们调用\
    \ `dequeueReusableCellWithIdentifier:` 时由表格视图返回。\n\n我们对 `tableView:numberOfRowsInSection:`\
    \ 的实现返回了一个整数 100。我们让表格视图知道表格中应该有 100 行。\n\n构建并运行你的应用。你应该会看到大量的表格行，采用我们之前设置的副标题样式（如下图所示）。\n\
    \n![Image](img/9781430243748_Fig07-07.jpg)\n\n**图 7-7.** 一百个表格行！\n\n如果你在模拟器或设备上选中任意表格行，会发现选中的行会变为蓝色并保持选中状态。我们将通过在\
    \ Home 视图控制器中实现一个 `UITableViewDelegate` 方法来修改选中处理逻辑：\n\n```\n#pragma mark UITableViewDelegate\n\
    \n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    [self.tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
    }\n```\n\n现在运行应用时，你会发现这些行在触摸时会优雅地淡出，表明用户交互已被识别。\n\n我们的 *Birthday Reminder* 单元格的行高为\
    \ 72 点。表格单元格的默认高度仅为 44 点。选中表格视图后，我们可以在 Storyboard 中使用尺寸检查器，将行高增加至 72 来修改单元格高度（如下图所示）。\n\
    \n![Image](img/9781430243748_Fig07-08.jpg)\n\n**图 7-8.** 修改表格视图的默认行高\n\n*注意：表格视图也支持可变行高。你可以通过实现\
    \ `UITableViewDelegate` 协议的 `tableView:heightForRowAtIndexPath` 方法来确定各个行的行高。*\n\
    \n我认为我们需要从 `birthdays.plist` 中加载一些真实数据。让我们开始着手将动态数据加载到表格中吧。\n"
- fmt: "### Populating the table view with an array and a plist\n\nThe `birthdays.plist`\
    \ file we added to our project at the beginning of this chapter contains an array\
    \ of ten celebrity birthday dictionaries. Plists or *property lists* are XML files\
    \ that adhere to a scheme that Objective-C understands and can convert into native\
    \ objects: arrays, dictionaries, numbers, strings, and so forth.\n\n*Tip: You\
    \ can create your own* `plists` *via File  New  File. Chose the Property List\
    \ option from the Resource templates.*\n\nWhen our Home view controller instantiates,\
    \ we’re going to create an array of birthday dictionaries loaded from `birthdays.plist`.\
    \ Declare a new `birthdays` array property in the private interface of `BRHomeViewController.m`:\n\
    \n```\n@interface BRHomeViewController()\n@property (nonatomic,strong) NSMutableArray\
    \ *birthdays;\n@end\n```\n\nNow to instantiate our `birthdays` array. As we learned\
    \ in [Chapter 5](#Chapter05.html#ch5), view controllers instantiated from storyboards\
    \ have a designated initializer, `initWithCoder:`. So we’ll generate our new array\
    \ by overriding the designated initializer:\n\n```\n- (id) initWithCoder:(NSCoder\
    \ *)aDecoder\n{\n    self = [super initWithCoder:aDecoder];\n\n    if (self) {\n\
    \        NSString* plistPath = [[NSBundle mainBundle] pathForResource:@\"birthdays\"\
    \ ofType:@\"plist\"];\n        NSArray *nonMutableBirthdays = [NSArray arrayWithContentsOfFile:plistPath];\n\
    \n        self.birthdays = [NSMutableArray array];\n\n        NSMutableDictionary\
    \ *birthday;\n        NSDictionary *dictionary;\n        NSString *name;\n   \
    \     NSString *pic;\n        UIImage *image;\n        NSDate *birthdate;\n\n\
    \        for (int i=0;i<[nonMutableBirthdays count];i++) {\n            dictionary\
    \ = [nonMutableBirthdays objectAtIndex:i];\n            name = dictionary[@\"\
    name\"];\n            pic = dictionary[@\"pic\"];\n            image = [UIImage\
    \ imageNamed:pic];\n            birthdate = dictionary[@\"birthdate\"];\n    \
    \        birthday = [NSMutableDictionary dictionary];\n            birthday[@\"\
    name\"] = name;\n            birthday[@\"image\"] = image;\n            birthday[@\"\
    birthdate\"] = birthdate;\n\n            [self.birthdays addObject:birthday];\n\
    \        }\n    }\n\n    return self;\n}\n```\n\nThe root node of the `birthdays.plist`\
    \ file is an array: an array of dictionary objects. `NSArray` has a convenience\
    \ method `arrayWithContentsOfFile:` that creates and populates a non-mutable array\
    \ with non-mutable objects from a `plist` file. However, we want the dictionaries\
    \ in our `birthdays` array to be mutable because we’ll be enabling the user of\
    \ our app to change the celebrity names and photos via the edit birthday view.\
    \ The only option we have to make these non-mutable dictionaries mutable is to\
    \ create new mutable versions from the non-mutable versions. So we loop through\
    \ all the non-mutable dictionaries and create new mutable birthday dictionaries:\n\
    \n```\nbirthday = [NSMutableDictionary dictionary];\nbirthday[@\"name\"] = name;\n\
    birthday[@\"image\"] = image;\nbirthday[@\"birthdate\"] = birthdate;\n[self.birthdays\
    \ addObject:birthday];\n```\n\nNote how we also initialize new `UIImage` instances\
    \ based on the `pic` string value of each birthday dictionary loaded from the\
    \ `plist`:\n\n```\npic = dictionary[@\"pic\"];\nimage = [UIImage imageNamed:pic];\n\
    ```\n\nThe resulting `self.birthdays` array is mutable and contains mutable birthday\
    \ dictionaries with the `name`, `birthdate`, and `image` properties that we’ll\
    \ use to populate each cell of our table view.\n\nCheck that your app still compiles\
    \ and runs OK. You shouldn’t have any errors or warnings if the `plist` data is\
    \ loading and parsing OK.\n\n*Note: Your storyboard may include a warning about\
    \ the Birthday Detail scene being unreachable, but we’ll fix that later. It shouldn’t\
    \ prevent your project from compiling.*\n\nCurrently, we’re telling the table\
    \ view that it contains 100 rows. Instead, modify the returned value to the count\
    \ of birthdays in our array:\n\n```\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return [self.birthdays count];\n\
    }\n```\n\nNow to populate the table view cells. Whenever the table view requests\
    \ a table view cell instance from its data source (our Home view controller),\
    \ it passes in a reference to itself and a reference to the index path of the\
    \ cell. An index path contains two values: *section* and *row*. In this example,\
    \ the row value is equivalent to the index of the birthday object in our `birthdays`\
    \ array. The section value is always 0 in our app because we’re only going to\
    \ implement a single section table view.\n\nHere’s the new implementation of `tableView:cellForRowAtIndexPath:`\
    \ in your Home view controller.\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath\n*)indexPath\n{\n    UITableViewCell\
    \ *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"Cell\"];\n\n  \
    \  NSMutableDictionary *birthday = self.birthdays[indexPath.row];\n\n    NSString\
    \ *name = birthday[@\"name\"];\n    NSDate *birthdate = birthday[@\"birthdate\"\
    ];\n    UIImage *image = birthday[@\"image\"];\n\n    cell.textLabel.text = name;\n\
    \    cell.detailTextLabel.text = birthdate.description;\n    cell.imageView.image\
    \ = image;\n\n    return cell;\n}\n```\n\nUsing the `indexPath.row` value, we\
    \ can obtain the mutable birthday dictionary associated with the requested table\
    \ cell row. Table view cells (`UITableViewCell`) have two default label properties:\
    \ `textLabel` and `detailTextLabel`, which we then populate with the `name` and\
    \ `birthdate` string values, respectively. Table view cells also contain an image\
    \ view property (`imageView`) that we set to the value of the image (`UIImage`)\
    \ property stored in our birthday dictionary.\n\nBuild and run. You should see\
    \ the populated celebrity table view, as shown in [Figure 7-9](#Chapter07.html#fig_7_9).\n\
    \n![Image](images/9781430243748_Fig07-09.jpg)\n\n**Figure 7-9.** Our first table\
    \ view with dynamically generated data!"
  raw: '### Populating the table view with an array and a plist


    The `birthdays.plist` file we added to our project at the beginning of this chapter
    contains an array of ten celebrity birthday dictionaries. Plists or *property
    lists* are XML files that adhere to a scheme that Objective-C understands and
    can convert into native objects: arrays, dictionaries, numbers, strings, and so
    forth.


    *Tip: You can create your own* `plists` *via File  New  File. Chose the Property
    List option from the Resource templates.*


    When our Home view controller instantiates, we’re going to create an array of
    birthday dictionaries loaded from `birthdays.plist`. Declare a new `birthdays`
    array property in the private interface of `BRHomeViewController.m`:


    `@interface BRHomeViewController()`

    **`@property (nonatomic,strong) NSMutableArray *birthdays;`**

    `@end`


    Now to instantiate our `birthdays` array. As we learned in [Chapter 5](#Chapter05.html#ch5),
    view controllers instantiated from storyboards have a designated initializer,
    `initWithCoder:`. So we’ll generate our new array by overriding the designated
    initializer:


    `- (id) initWithCoder:(NSCoder *)aDecoder`

    `{`

    `    self = [super initWithCoder:aDecoder];`


    `    if (self) {`

    `        NSString* plistPath = [[NSBundle mainBundle] pathForResource:@"birthdays"
    ofType:@"plist"];`

    `        NSArray *nonMutableBirthdays = [NSArray arrayWithContentsOfFile:plistPath];`


    `        self.birthdays = [NSMutableArray array];`


    `        NSMutableDictionary *birthday;`

    `        NSDictionary *dictionary;`

    `        NSString *name;`

    `        NSString *pic;`

    `        UIImage *image;`

    `        NSDate *birthdate;`


    `        for (int i=0;i<[nonMutableBirthdays count];i++) {`

    `            dictionary = [nonMutableBirthdays objectAtIndex:i];`

    `            name = dictionary[@"name"];`

    `            pic = dictionary[@"pic"];`

    `            image = [UIImage imageNamed:pic];`

    `            birthdate = dictionary[@"birthdate"];`

    `            birthday = [NSMutableDictionary dictionary];`

    `            birthday[@"name"] = name;`

    `            birthday[@"image"] = image;`

    `            birthday[@"birthdate"] = birthdate;`


    `            [self.birthdays addObject:birthday];`

    `        }`

    `    }`


    `    return self;`

    `}`


    The root node of the `birthdays.plist` file is an array: an array of dictionary
    objects. `NSArray` has a convenience method `arrayWithContentsOfFile:` that creates
    and populates a non-mutable array with non-mutable objects from a `plist` file.
    However, we want the dictionaries in our `birthdays` array to be mutable because
    we’ll be enabling the user of our app to change the celebrity names and photos
    via the edit birthday view. The only option we have to make these non-mutable
    dictionaries mutable is to create new mutable versions from the non-mutable versions.
    So we loop through all the non-mutable dictionaries and create new mutable birthday
    dictionaries:


    `birthday = [NSMutableDictionary dictionary];`

    `birthday[@"name"] = name;`

    `birthday[@"image"] = image;`

    `birthday[@"birthdate"] = birthdate;`

    `[self.birthdays addObject:birthday];`


    Note how we also initialize new `UIImage` instances based on the `pic` string
    value of each birthday dictionary loaded from the `plist`:


    `pic = dictionary[@"pic"];`

    `image = [UIImage imageNamed:pic];`


    The resulting `self.birthdays` array is mutable and contains mutable birthday
    dictionaries with the `name`, `birthdate`, and `image` properties that we’ll use
    to populate each cell of our table view.


    Check that your app still compiles and runs OK. You shouldn’t have any errors
    or warnings if the `plist` data is loading and parsing OK.


    *Note: Your storyboard may include a warning about the Birthday Detail scene being
    unreachable, but we’ll fix that later. It shouldn’t prevent your project from
    compiling.*


    Currently, we’re telling the table view that it contains 100 rows. Instead, modify
    the returned value to the count of birthdays in our array:


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    ~~`return 100;`~~

    **`return [self.birthdays count];`**

    `}`


    Now to populate the table view cells. Whenever the table view requests a table
    view cell instance from its data source (our Home view controller), it passes
    in a reference to itself and a reference to the index path of the cell. An index
    path contains two values: *section* and *row*. In this example, the row value
    is equivalent to the index of the birthday object in our `birthdays` array. The
    section value is always 0 in our app because we’re only going to implement a single
    section table view.


    Here’s the new implementation of `tableView:cellForRowAtIndexPath:` in your Home
    view controller.


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath`

    `*)indexPath`

    `{`

    `    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@"Cell"];`


    `    NSMutableDictionary *birthday = self.birthdays[indexPath.row];`


    **`    NSString *name = birthday[@"name"];`**

    **`    NSDate *birthdate = birthday[@"birthdate"];`**

    **`    UIImage *image = birthday[@"image"];`**


    **`    cell.textLabel.text = name;`**

    **`    cell.detailTextLabel.text = birthdate.description;`**

    **`    cell.imageView.image = image;`**


    `    return cell;`

    `}`


    Using the `indexPath.row` value, we can obtain the mutable birthday dictionary
    associated with the requested table cell row. Table view cells (`UITableViewCell`)
    have two default label properties: `textLabel` and `detailTextLabel`, which we
    then populate with the `name` and `birthdate` string values, respectively. Table
    view cells also contain an image view property (`imageView`) that we set to the
    value of the image (`UIImage`) property stored in our birthday dictionary.


    Build and run. You should see the populated celebrity table view, as shown in
    [Figure 7-9](#Chapter07.html#fig_7_9).


    ![Image](images/9781430243748_Fig07-09.jpg)


    **Figure 7-9.** Our first table view with dynamically generated data!'
  trans: "\n### 使用数组和 plist 填充表格视图\n\n我们在本章开始时添加到项目中的 `birthdays.plist` 文件包含一个由十个名人生日字典组成的数组。Plist（或称*属性列表*）是遵循某种格式的\
    \ XML 文件，Objective-C 可以理解该格式并将其转换为原生对象：数组、字典、数字、字符串等等。\n\n*提示：您可以通过“文件  → 新建  →\
    \ 文件”来创建自己的 `plist`。从资源模板中选择“属性列表”选项。*\n\n当我们的主页视图控制器实例化时，我们将从 `birthdays.plist`\
    \ 加载数据，创建一个生日字典数组。在 `BRHomeViewController.m` 的私有接口中声明一个新的 `birthdays` 数组属性：\n\n\
    ```\n@interface BRHomeViewController()\n@property (nonatomic,strong) NSMutableArray\
    \ *birthdays;\n@end\n```\n\n现在来实例化我们的 `birthdays` 数组。正如我们在第 5 章中学到的，从故事板实例化的视图控制器有一个指定的初始化方法\
    \ `initWithCoder:`。因此，我们将重写该指定初始化方法来生成新数组：\n\n```\n- (id) initWithCoder:(NSCoder\
    \ *)aDecoder\n{\n    self = [super initWithCoder:aDecoder];\n\n    if (self) {\n\
    \        NSString* plistPath = [[NSBundle mainBundle] pathForResource:@\"birthdays\"\
    \ ofType:@\"plist\"];\n        NSArray *nonMutableBirthdays = [NSArray arrayWithContentsOfFile:plistPath];\n\
    \n        self.birthdays = [NSMutableArray array];\n\n        NSMutableDictionary\
    \ *birthday;\n        NSDictionary *dictionary;\n        NSString *name;\n   \
    \     NSString *pic;\n        UIImage *image;\n        NSDate *birthdate;\n\n\
    \        for (int i=0;i<[nonMutableBirthdays count];i++) {\n            dictionary\
    \ = [nonMutableBirthdays objectAtIndex:i];\n            name = dictionary[@\"\
    name\"];\n            pic = dictionary[@\"pic\"];\n            image = [UIImage\
    \ imageNamed:pic];\n            birthdate = dictionary[@\"birthdate\"];\n    \
    \        birthday = [NSMutableDictionary dictionary];\n            birthday[@\"\
    name\"] = name;\n            birthday[@\"image\"] = image;\n            birthday[@\"\
    birthdate\"] = birthdate;\n\n            [self.birthdays addObject:birthday];\n\
    \        }\n    }\n\n    return self;\n}\n```\n\n`birthdays.plist` 文件的根节点是一个数组：由字典对象组成的数组。`NSArray`\
    \ 有一个便捷方法 `arrayWithContentsOfFile:`，它可以创建一个不可变数组，并从 `plist` 文件中填充不可变对象。但是，我们希望\
    \ `birthdays` 数组中的字典是可变的，因为我们后续将允许用户通过编辑生日视图来更改名人的姓名和照片。要将这些不可变字典变为可变，唯一的办法就是基于不可变版本创建新的可变版本。因此，我们遍历所有不可变字典，并创建新的可变生日字典：\n\
    \n```\nbirthday = [NSMutableDictionary dictionary];\nbirthday[@\"name\"] = name;\n\
    birthday[@\"image\"] = image;\nbirthday[@\"birthdate\"] = birthdate;\n[self.birthdays\
    \ addObject:birthday];\n```\n\n请注意，我们还根据从 `plist` 加载的每个生日字典中的 `pic` 字符串值，初始化了新的\
    \ `UIImage` 实例：\n\n```\npic = dictionary[@\"pic\"];\nimage = [UIImage imageNamed:pic];\n\
    ```\n\n最终得到的 `self.birthdays` 数组是可变的，其中包含可变的生日字典，这些字典拥有 `name`、`birthdate` 和 `image`\
    \ 属性，我们将用它们来填充表格视图中的每个单元格。\n\n检查你的应用能否正常编译和运行。如果 `plist` 数据加载和解析无误，就不应该出现任何错误或警告。\n\
    \n*注意：你的故事板可能会显示“生日详情场景不可达”的警告，我们稍后会修复这个问题。这不会影响项目的编译。*\n\n目前，我们告诉表格视图它包含 100\
    \ 行。现在，将返回值修改为数组中生日的数量：\n\n```\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return [self.birthdays count];\n\
    }\n```\n\n现在来填充表格视图单元格。每当表格视图从其数据源（我们的主页视图控制器）请求一个表格视图单元格实例时，它都会传入一个对自身和单元格索引路径的引用。一个索引路径包含两个值：*section（分区）*和*row（行）*。在本例中，行值等同于\
    \ `birthdays` 数组中生日对象的索引。在我们的应用中，分区值始终为 0，因为我们只实现一个分区的表格视图。\n\n以下是主页视图控制器中 `tableView:cellForRowAtIndexPath:`\
    \ 的新实现：\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\n\
    *)indexPath\n{\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n\n    NSMutableDictionary *birthday = self.birthdays[indexPath.row];\n\
    \n    NSString *name = birthday[@\"name\"];\n    NSDate *birthdate = birthday[@\"\
    birthdate\"];\n    UIImage *image = birthday[@\"image\"];\n\n    cell.textLabel.text\
    \ = name;\n    cell.detailTextLabel.text = birthdate.description;\n    cell.imageView.image\
    \ = image;\n\n    return cell;\n}\n```\n\n利用 `indexPath.row` 值，我们可以获取与所请求的表格单元格行相关联的可变生日字典。表格视图单元格（`UITableViewCell`）有两个默认的标签属性：`textLabel`\
    \ 和 `detailTextLabel`，我们分别用 `name` 和 `birthdate` 字符串值来填充它们。表格视图单元格还包含一个图像视图属性（`imageView`），我们将其设置为生日字典中存储的图像（`UIImage`）属性的值。\n\
    \n构建并运行。你应该会看到填充了名人数据的表格视图，如图 7-9 所示。\n\n![Image](img/9781430243748_Fig07-09.jpg)\n\
    \n**图 7-9.** 我们的第一个动态生成数据的表格视图！\n"
- fmt: "### Passing Data with Segues\n\nOur next challenge is to push the `Birthday\
    \ Detail` view controller onto the main navigation controller when a celebrity\
    \ birthday cell is tapped. There are two typical ways to achieve this. One way\
    \ is to expand our `tableView:didSelectRowAtIndexPath:` method to create a new\
    \ view controller instance in code and then pushing the view controller onto the\
    \ navigation controller containing our `Home` view controller:\n\n```\n[self.navigationController\
    \ pushViewController:myViewControllerInstance animated:YES];\n```\n\nHowever,\
    \ we’re going to stick with the more visual approach we learned in [Chapter 5](#Chapter05.html#ch5):\
    \ by pushing a view controller with a storyboard segue. Control-drag from the\
    \ prototype table cell in your `Home` view controller to the `Birthday Detail`\
    \ view controller, and then release and select the *push* segue option (see [Figure\
    \ 7-10](#Chapter07.html#fig_7_10)).\n\n![Image](images/9781430243748_Fig07-10.jpg)\n\
    \n**Figure 7-10.** Creating a push segue from a prototype table cell\n\nXcode\
    \ creates the new push segue and reapplies the inferred navigation bar to the\
    \ `Birthday Detail` view controller that we set up in [Chapter 5](#Chapter05.html#ch5).\
    \ Now, when any instance of our prototyped table cell is selected, it pushes our\
    \ `Birthday Detail` view controller onto the navigation stack.\n\nAdd a new image\
    \ view (`UIImageView`) instance to the `Birthday Detail` view controller, position\
    \ it x=10, y=20, and size it to 71×71 points. Keeping the new image view selected\
    \ and using the attributes inspector, change the view mode to Aspect Fill and\
    \ toggle on Clip Subviews, as shown in [Figure 7-11](#Chapter07.html#fig_7_11).\
    \ This results in a nicely clipped, square thumbnail when an image is assigned\
    \ to this image view, just like we implemented into our edit birthday view in\
    \ [Chapter 6](#Chapter06.html#ch6).\n\n![Image](images/9781430243748_Fig07-11.jpg)\n\
    \n**Figure 7-11.** Adding and configuring an image view for square thumbnail display\
    \ within the Birthday Detail view\n\nContinuing work with storyboards and using\
    \ the Assistant Editor layout, control-drag from the new image view to create\
    \ a new outlet in the `BRBirthdayDetailViewController.h` header file named `photoView`:\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface\
    \ BRBirthdayDetailViewController : BRCoreViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UIImageView *photoView;\n\n@end\n```\n\nWe’re also going to add a new\
    \ mutable birthday dictionary property to our `Birthday Detail` view controller.\
    \ The new property is set from the `Home` view controller when a birthday in the\
    \ table view is tapped by the user. Update `BRBirthdayDetailViewController.h`\
    \ and add the new mutable dictionary property:\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"BRCoreViewController.h\"\n\n@interface BRBirthdayDetailViewController\
    \ : BRCoreViewController\n\n@property(nonatomic,strong) NSMutableDictionary *birthday;\n\
    @property (weak, nonatomic) IBOutlet UIImageView *photoView;\n\n@end\n```\n\n\
    Now toggle to the `BRBirthdayDetailViewController.m` source and extend the current\
    \ `viewWillAppear:` method of `BRBirthdayDetailViewController.m` to read and render\
    \ the details of the new birthday dictionary property each time our detail view\
    \ appears:\n\n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    NSLog(@\"viewWillAppear\");\n    NSString *name = self.birthday[@\"name\"\
    ];\n    self.title = name;\n    UIImage *image = self.birthday[@\"image\"];\n\
    \    if (image == nil) {\n        //default to the birthday cake pic if there's\
    \ no birthday image\n        self.photoView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n    }\n    else {\n        self.photoView.image = image;\n    }\n}\n```\n\n\
    Setting the `title` property of a view controller updates the centered text on\
    \ the navigation bar when a view controller is displayed within a navigation controller.\
    \ We’ll also set the image value of our new image view to the image contained\
    \ in the birthday dictionary, or fallback onto our cake image if none exists.\n\
    \nWe’ve finished preparing our `Birthday Detail` view for data. We’ll now switch\
    \ our attention back to the `Home` view controller and write code to pass the\
    \ selected birthday dictionary to the `Birthday Detail` view controller when it’s\
    \ pushed onto the navigation stack via the segue transition."
