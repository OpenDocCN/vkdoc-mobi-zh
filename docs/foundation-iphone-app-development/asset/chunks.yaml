  trans: "\n### 手势识别器\n\n我们将提示用户使用相机拍摄新照片，或从 iPhone 照片库中选择一张照片，分配给其正在添加或编辑的生日。我们的“点击照片”标签已经表明，用户需要点击图像图标来替换默认的蛋糕图像。\n\
    \n我们的应用需要响应用户点击照片容器视图的操作。我们无法使用“目标-动作”模式，因为 `UIView` 并非 `UIControl` 的子类。因此，我们需要添加一个点击手势识别器来捕捉用户用手指点击视图的操作。\n\
    \n向下滚动对象库，直到找到点击手势识别器（`UITapGestureRecognizer`）对象。将一个新实例拖放到文档大纲中的照片容器视图上（请参见图\
    \ 6-18）。\n\n![Image](img/9781430243748_Fig06-18.jpg)\n\n**图 6-18.** 将新的点击手势识别器拖放到文档大纲窗格的容器视图上\n\
    \nXcode 会在文档大纲窗格（对象列表底部）显示新添加的点击手势识别器实例。按住 Control 键单击添加的手势识别器以打开其上下文菜单。您会看到一个新的\
    \ `gestureRecognizers` 出口集合，它将识别器连接到照片容器视图。\n\n我们已经做了足够的工作来检测照片容器视图上的点击，但我们还需要从点击手势识别器创建一个动作连接至\
    \ `BRBirthdayEditViewController.h`。\n\n使用辅助编辑器，在右侧窗格中显示 `BRBirthdayEditViewController.h`，在左侧窗格中显示故事板，然后按住\
    \ Control 键从点击手势识别器拖拽到 `BRBirthdayEditViewController.h`，以创建一个名为 `didTapPhoto`\
    \ 的新动作，如图 图 6-19 所示。\n\n![Image](img/9781430243748_Fig06-19.jpg)\n\n**图 6-19.**\
    \ 从点击手势识别器创建名为 `didTapPhoto:` 的动作\n\n跳转到 `BRBirthdayEditViewController.m` 并添加一个\
    \ `NSLog` 调用来检查点击照片是否工作：\n\n```\n- (IBAction)didTapPhoto:(id)sender {\n    NSLog(@\"\
    Did Tap Photo!\");\n}\n```\n\n构建并运行。每次点击蛋糕时，调试区是否都会打印“Did Tap Photo!”？太棒了。![Image](img/smile.jpg)\n\
    \n### 实现操作列表\n\n我们希望为用户提供从相册选择照片*或*用相机拍照的选项。我们将通过一个操作列表来呈现这两个选项。在扩展 `didTapPhoto:`\
    \ 方法之前，我们需要在头文件中声明 `BRBirthdayEditViewController` 实现了 `UIActionSheetDelegate`\
    \ 协议：\n\n```\n@interface BRBirthdayEditViewController : BRCoreViewController<UITextFieldDelegate,\
    \ UIActionSheetDelegate>\n```\n\n现在来完成 `didTapPhoto:` 方法：\n\n```\n- (IBAction)didTapPhoto:(id)sender\
    \ {\n    NSLog(@\"Did Tap Photo!\");\n    if (![UIImagePickerController\nisSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
    \ {\n        NSLog(@\"No camera detected!\");\n        return;\n    }\n    \n\
    \    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:nil delegate:self\n\
    cancelButtonTitle:@\"Cancel\" destructiveButtonTitle:nil otherButtonTitles:@\"\
    Take a\nPhoto\",@\"Pick from Photo Library\", nil];\n    [actionSheet showInView:self.view];\n\
    }\n```\n\n构建并运行。您是否看到了像图 6-20 中显示的操作菜单？没有？您是在 iOS 模拟器上运行的吗？您确实是在模拟器上运行的？好吧，这就是原因了。iOS\
    \ 模拟器没有摄像头，所以它会被我们的条件语句拦截；也就是说，没有可用的摄像头源类型，因此不要给用户提供用相机拍照的选项：\n\n```\nif (![UIImagePickerController\
    \ isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\n{\n       \
    \     NSLog(@\"No camera detected!\");\n            return;\n        }\n``` \n\
    ![Image](img/9781430243748_Fig06-20.jpg)\n\n**图 6-20.** 显示一个操作列表\n\n您需要在带有摄像头的设备上运行该应用，才能拥有用相机拍照的选项。\n"
- fmt: "# `UIImagePickerController`: Taking Photos and Browsing the Photo Library\n\
    \nThere are a number of ways that iOS apps can take photos with the iPhone camera\
    \ and access the user's Photo Library. The easiest by far is to use a component\
    \ from the iOS SDK called `UIImagePickerController`. It does all the hard work\
    \ for us. We're going to lazy load an instance of Apple's `UIImagePickerController`\
    \ class and create two new private methods in `BRBirthdayEditViewController`:\
    \ one for taking photos and one for selecting photos from the Photo Library.\n\
    \n`BRBirthdayEditViewController` assigns itself as a delegate of `UIImagePickerController`.\
    \ So first, let's update our interface header:\n\n```\n@interface BRBirthdayEditViewController\
    \ : BRCoreViewController<UITextFieldDelegate,\nUIActionSheetDelegate, UIImagePickerControllerDelegate,\
    \ UINavigationControllerDelegate>\n```\n\nThe delegate property of `UIImagePickerController`\
    \ is defined as an object that implements both `UIImagePickerControllerDelegate`\
    \ and `UINavigationControllerDelegate` protocols; so even though we're not going\
    \ to implement any `UINavigationControllerDelegate` method signatures, we'll still\
    \ include this protocol in the `BRBirthdayEditViewController` header to avoid\
    \ compiler warnings.\n\nSwitch back to the `BRBirthdayEditViewController.m` source\
    \ file and add the following private property declaration:\n\n```\n@interface\
    \ BRBirthdayEditViewController()\n\n@property (nonatomic, strong) UIImagePickerController\
    \ *imagePicker;\n\n@end;\n```\n\nWe can override the getter for our new image\
    \ picker property and only instantiate an instance of the imager picker controller\
    \ when it's first referenced. This is known as *lazy loading*. Add the accessor\
    \ method to the `BRBirthdayEditViewController.m` implementation:\n\n```\n-(UIImagePickerController\
    \ *) imagePicker\n{\n    if (_imagePicker == nil) {\n        _imagePicker = [[UIImagePickerController\
    \ alloc] init];\n        _imagePicker.delegate = self;\n    }\n    return _imagePicker;\n\
    }\n```\n\nNow let's implement our two new methods for taking and browsing photos:\n\
    \n```\n-(void) takePhoto\n{\n    self.imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
    \    [self.navigationController presentViewController:self.imagePicker animated:YES\
    \ completion:nil];\n}\n\n-(void) pickPhoto\n{\n    self.imagePicker.sourceType\
    \ = UIImagePickerControllerSourceTypePhotoLibrary;\n    [self.navigationController\
    \ presentViewController:self.imagePicker animated:YES completion:nil];\n}\n```\n\
    \nJust like dismissing a modal view controller, we can pass in a block as the\
    \ third parameter of the `presentViewController:animated:completion:` view controller\
    \ method. However, as we don't have any code to run once the presentation animation\
    \ completes, we can simply pass in `nil` instead.\n\nTo invoke our `takePhoto`\
    \ and `pickPhoto` methods, we need to add a delegate method from the `UIActionSheetDelegate`\
    \ protocol to our class so that we respond to the user selecting one of the two\
    \ action options from action sheet:\n\n```\n#pragma mark UIActionSheetDelegate\n\
    \n- (void)actionSheet:(UIActionSheet *)actionSheet\ndidDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    if (buttonIndex == actionSheet.cancelButtonIndex) return;\n\n    switch\
    \ (buttonIndex) {\n        case 0:\n            [self takePhoto];\n          \
    \  break;\n        case 1:\n            [self pickPhoto];\n            break;\
    \   \n    }\n}\n```\n\nBuild and run. You should now be able to browse, select,\
    \ and take photos with `UIImagePickerController`, as per [Figure 6-21](#Chapter06.html#fig_6_21).\n\
    \n![Image](images/9781430243748_Fig06-21.jpg)\n\n**Figure 6-21.** Not quite looking\
    \ my best!\n\nIf you're running the app on the simulator, then you still won't\
    \ see the `UIImagePickerController`. However, the simulator does have a Photo\
    \ Library, so rather than displaying an action sheet with options, we'll just\
    \ present the user with the Photo Library if no camera is detected:\n\nModify\
    \ the `didTapPhoto:` method to the following:\n\n```\n- (IBAction)didTapPhoto:(id)sender\
    \ {\n    NSLog(@\"Did Tap Photo!\");\n    if (![UIImagePickerController\nisSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
    \ {\n        NSLog(@\"No camera detected!\");\n        [self pickPhoto];\n   \
    \     return;\n    }\n    UIActionSheet *actionSheet = [[UIActionSheet alloc]\
    \ initWithTitle:nil delegate:self\ncancelButtonTitle:@\"Cancel\"    destructiveButtonTitle:nil\
    \    otherButtonTitles:@\"Take a\nPhoto\",@\"Pick from Photo Library\", nil];\n\
    \    [actionSheet showInView:self.view];\n}\n```\n\nWe've just added a direct\
    \ call to the new `pickPhoto` method if no camera is detected for the device.\n\
    \nWe're not quite done yet. `UIImagePickerController` appears to be taking photos,\
    \ but how do we get hold of the photo data when it completes? Via a delegate callback\
    \ method, of course! We've already declared that `BRBirthdayEditViewController`\
    \ implements `UIImagePickerControllerDelegate` protocol, so add the following\
    \ code to grab the image data from our `UIImagePickerController` instance:\n\n\
    ```\n#pragma mark UIImagePickerControllerDelegate\n\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary *)info {\n\n    [picker\
    \ dismissViewControllerAnimated:YES completion:nil];\n\n    UIImage *image = info[UIImagePickerControllerOriginalImage];\n\
    \n    self.photoView.image = image;\n}\n```\n\nBy defining the `UIImagePickerControllerDelegate`\
    \ protocol method, `imagePickerController:didFinishPickingMediaWithInfo:`, we\
    \ are returned the image data from `UIImagePickerController` as one of the properties\
    \ of an `info` `NSDictionary` passed into the callback method as a parameter.\
    \ We set the image property of our `photoView` image view and swap the birthday\
    \ cake image for the newly taken or selected photo."
