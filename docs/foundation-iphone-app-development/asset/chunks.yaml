  raw: '#### Initializing a Core Data model


    In summary, the anatomy of a Core Data stack can be presented as shown in [Figure
    8-5](#Chapter08.html#fig_8_5).


    ![Image](images/9781430243748_Fig08-05.jpg)


    **Figure 8-5.** The anatomy of a Core Data stack


    At the bottom of the stack, the persistent store (SQLite database by default).
    We add the persistent store to the persistent store coordinator, which we initiate
    with a managed object model. The managed object model is based on the `xcdatamodeld`
    file we just looked at in Xcode. Finally, we create a managed object context (`NSManagedObjectContext`)
    instance with which we can both create and access managed object instances to
    use in our application. But what’s a managed object context?


    The `NSManagedObjectContext` is the only class we’ll really care about once our
    Core Data model has initialized when our program first runs. Adding, editing,
    and deleting entities will be achieved directly via the managed object context.


    A little confused? Don’t worry, for fairly simple applications like *Birthday
    Reminder*, the code to initialize a Core Data store and model can be virtually
    identical for every app you build. All better now? Good stuff!


    #### What is a managed object context?


    A *managed object context* is the representation of all the Core Data objects
    in our application, and their relationships to one another. Although we’ll only
    use a single managed object context in our *Birthday Reminder* app, it’s not uncommon
    to create multiple managed object contexts in an iOS App. Multiple managed object
    contexts can share a persistent store. However, if we make changes to the entities
    in one managed object context, they will not be reflected in another unless we
    save and merge the contexts.


    With a single managed object context of our Core Data model, we’ll be able to
    add new entities, change attributes, and when required, delete entities. When
    we want to write our managed object context changes to disk, we’ll need to save
    the managed object context.


    #### Adding, editing, deleting, and saving entities


    In the Master-Detail example app, once the `AppDelegate` has initialized the model,
    store, and managed object context, it passes a reference to the managed object
    context onto the master view controller:


    `controller.managedObjectContext = self.managedObjectContext;`


    The master view controller can now add, edit, delete, and save Core Data entities
    all via its reference to the managed object context.


    To understand the code required to add, edit, delete, and save Core Data entities,
    we can simplify a great deal of the code in Apple’s master view controller to
    the following examples:


    ##### Adding


    `NSManagedObject *newManagedObject = [NSEntityDescription`

    `insertNewObjectForEntityForName:@”Event” inManagedObjectContext:self.managedObjectContext];`


    All Core Data entities are instances or subclass instances of the `NSManagedObject`
    class. However, unlike most other Objective-C classes, we don’t create instances
    of `NSManagedObject` via `alloc init`. Instead, we invoke the class method of
    `NSEntityDescription` and pass in our entity name and a reference to the managed
    object context.


    ##### Editing


    By default, entities defined in our Core Data model are instances of Apple’s `NSManagedObject`
    class. In order to set a property, we call the `setValue:forKey:` method of `NSManagedObject`:


    `[aManagedObject setValue:[NSDate date] forKey:@"timeStamp"];`


    With the data model inspector, however, we can also specify custom value object
    classes for entities that Xcode can build for use in our apps. The advantage of
    this is strict data-typing; so the preceding code would change to:


    `aManagedObject.timeStamp = [NSDate date];`


    We’ll learn more about custom entity classes when we integrate a new Core Data
    model into our *Birthday Reminder* app later in the chapter.


    ##### Deleting


    Deleting Core Data entities is a simple as:


    `[self.managedObjectContext deleteObject:aManagedObject];`


    ##### Saving


    When we’re ready for Core Data to write our changes to disk (the persistent store),
    we call `save:` on the managed object context:


    `NSError *error = nil;`

    `    if ([self.managedObjectContext hasChanges]) {`

    `        if (![self.managedObjectContext save:&error]) {//save failed`

    `            NSLog(@"Save failed: %@",[error localizedDescription]);`

    `        }`

    `        else {`

    `            NSLog(@"Save succeeded");`

    `        }`

    `    }`


    Examples of when we’d call save are at the point a user taps the Save button in
    the edit birthday view controller or after we’ve finished importing a batch of
    birthdays.


    ### Implementing Core Data into Birthday Reminder


    Before we can start implementing Core Data into our *Birthday Reminder* app, we
    need to add the Core Data framework to our project’s target. The target is the
    resulting iPhone app that Xcode compiles for us whenever we build our project.


    #### Adding the Core Data framework


    To add an Apple framework to our project, first select the `BirthdayReminder`
    project in the Project Navigator, then select the `BirthdayReminder` target and
    finally select Build Phases tab, as shown in [Figure 8-6](#Chapter08.html#fig_8_6).


    ![Image](images/9781430243748_Fig08-06.jpg)


    **Figure 8-6.** Preparing to add a new framework


    Expand the Link Binary With Libraries pane and you’ll see the frameworks already
    linked into our project: `UIKit`, `Foundation`, and `CoreGraphics`. To add Core
    Data, tap the highlighted + button and double-click `CoreData.framework`, listed
    in the modal window. Great, Core Data framework has been added! We can now reference
    Core Data classes in our app. Before we do, though, there’s an easy way to import
    the Core Data framework header for all classes in our app: by defining the import
    declaration in our project’s prefix file. Locate and select `BirthdayReminder-Prefix.pch`
    in the Project Navigator. Now add the Core Data import declaration alongside the
    `Foundation` and `UIKit` import declarations:


    `#ifdef __OBJC__`

    `    #import <UIKit/UIKit.h>`

    `    #import <Foundation/Foundation.h>`

    **`#import <CoreData/CoreData.h>`**

    `#endif`


    We will now be able to make references to Core Data framework classes without
    having to repeatedly import the main Core Data framework header.


    Let’s move on to creating a Core Data model for our app.


    #### Creating a Core Data model


    Up until this point, we’ve focused primarily on the user interface of our app.
    Now that we’re moving our attention to the dark data side, let’s create a new
    folder to store all Core Data and Model classes. Add a new folder named `data`
    to the root directory of your *Birthday Reminder* project, and then add the new
    `data` folder as a new group to your Xcode project (see [Figure 8-7](#Chapter08.html#fig_8_7)).


    ![Image](images/9781430243748_Fig08-07.jpg)


    **Figure 8-7.** New data group added to project directory


    In the Project Navigator, select the newly added `data` group, and with the ![Image](images/flower.jpg)N
    keyboard shortcut or File ![Image](images/U001.jpg) New ![Image](images/U001.jpg)
    File, choose the Data Model option from the Core Data file templates. Name the
    new data model `BirthdayReminder.xcdatamodeld` and tap the Create button, as shown
    in [Figure 8-8](#Chapter08.html#fig_8_8).


    ![Image](images/9781430243748_Fig08-08.jpg)


    **Figure 8-8.** Creating a new Core Data model'
