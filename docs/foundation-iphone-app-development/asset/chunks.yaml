  trans: '

    # 为你的应用定价


    要通过 App Store 销售应用，你可以选择免费分发应用，或者选择一个定价等级。定价等级基于美元计算。等级 1 为 $0.99，等级 2 为 $1.99，等级
    3 为 $2.99，以此类推。每个等级都对应着不同货币的等级价格，你可以通过“定价矩阵”链接进行查询。我截取了当前定价矩阵的示意图（参见图 14-5）。Apple
    会不定期更新定价矩阵，尤其是在汇率发生显著波动之后。


    ![图像](img/9781430243748_Fig14-05.jpg)


    **图 14-5.** Apple 的 App Store 定价矩阵


    根据当前的定价矩阵，如果一位美国客户以 $0.99 的价格购买了一款应用，那么同样这款应用，英国客户需支付 £0.69，而通过欧洲 App Store 购买的客户则需支付
    €0.79。


    定价矩阵还会显示你从 Apple 获得的每笔应用销售的收益金额（以各国家/地区货币计）。例如，在美国每售出一款 $0.99 的应用，你将收到 Apple 支付的
    $0.70。


    ## 将应用限制在特定国家/地区销售


    默认情况下，Apple 会在其所有 App Store 中分发你的应用，但你可以根据需要更改此设置。点击“特定商店”链接，即可选择在哪些国家/地区销售你的应用（参见图
    14-6）。


    ![图像](img/9781430243748_Fig14-06.jpg)


    **图 14-6.** 为你的应用选择特定的 App Store


    *提示：如果出于任何原因，你需要将应用暂时下架，无需从商店中删除它。只需点击“权限和定价”链接编辑你的应用，即可回到可用性和定价页面。取消选择所有商店并保存。这样，你的应用就会从所有
    App Store 中移除，直到你返回此页面并将其重新上架销售为止。*


    有许多开发者曾在提交一个出色的应用更新后，等到 Apple 审核通过并在商店上线时，才发现自己忽略了测试从旧版本升级的用户的数据迁移过程。结果就是“崩溃之城”降临。一旦应用更新获得批准，就无法回退到旧版本。依我看，最好的解决方案是暂时将应用下架，然后提交另一个更新。好吧，实际上最理想的方案是在新用户和更新应用的现有用户中彻底进行测试。只要确保永不犯错就行，对吧？![图像](img/smile.jpg)


    我们假设你愿意在全球所有 App Store 中销售你的应用。


    你为应用选择好定价等级了吗？之后是可以更改的。


    我还建议勾选“为教育机构提供折扣”。Apple 为学校和大学提供批量购买折扣。如果有教育机构一次性购买你的应用超过 30 份，那么它们理应获得折扣，不是吗？


    点击“继续”按钮。


    ## 配置版本信息


    接下来，我们需要为应用提供版本号、版权文本，以及主要和次要的 App Store 类别（参见图 14-7）。


    ![图像](img/9781430243748_Fig14-07.jpg)


    **图 14-7.** 为我们的应用设置版本号、版权信息和类别


    提交应用时，请使用常规的版本号格式。避免使用诸如 alpha、beta 等词语；而是坚持使用 1.0、1.20、2.0 等格式。由于这是我们发布应用的首次提交，我建议使用
    1.0。我们在 iTunes Connect 中设置的版本号需要与 Xcode 项目中 `Info.plist` 文件里的 `Bundle versions
    string, short` 值保持一致，该值默认也是 1.0。


    ### 选择 App Store 类别


    你必须为应用选择一个主要类别，并可以选择一个次要类别。如果你的应用可以合理地归入多个类别，那么我建议你查看 148Apps 网站提供的最新 App Store
    指标：[`http://148apps.biz/app-store-metrics`](http://148apps.biz/app-store-metrics)。


    148Apps 的 App Store 指标包含许多其他有用的统计数据，例如按类别划分的应用数量统计（参见图 14-8）。


    ![图像](img/9781430243748_Fig14-08.jpg)


    **图 14-8.** 148Apps 提供的 App Store 指标揭示了最受欢迎且竞争最激烈的类别


    从图 14-8 中我们可以看到，游戏类之后，第二受欢迎（因此竞争也最激烈）的类别是教育类，第三受欢迎的是娱乐类。这是非常有价值的信息，因为你在所属类别中排名越高，你在
    App Store 中的曝光度就越好。因此，如果可能的话，选择一个竞争不那么激烈的类别吧！


    148Apps 的 App Store 指标还包括应用价格分布。你知道吗？App Store 中大约 50% 的应用是免费的。许多免费应用通过应用内购买和广告盈利，但了解竞争激烈这一点非常有用——即使你选择免费分发你的应用！


    提交过程中的“审核备注”部分可以留空，但如果你的应用要求用户拥有第三方网站的账户，那么你应该在审核备注中包含一个测试账户的用户名和密码，以帮助 Apple
    的审核人员。


    ## 设置应用评级


    接下来的一系列选择与你的应用内容有关。为每项选择最适用的单选按钮，表单将自动生成 Apple 认为适用于你应用的应用年龄评级（参见图 14-9）。


    ![图像](img/9781430243748_Fig14-09.jpg)


    **图 14-9.** 我认为我们的 Apple 用户不会在 *生日提醒* 应用中发现任何过于争议的内容！


    ## 添加描述和元数据


    当用户第一次阅读你的应用描述时，你已经吸引他进门了——凭借精美的图标和有力、信息丰富的应用名称，诱使他进一步了解你的应用。此时距离成交仅有一步之遥，因此请务必确保你的描述清晰、简洁地总结了你应用的功能（参见图
    14-10）。


    ![图像](img/9781430243748_Fig14-10.jpg)


    **图 14-10.** 输入描述性文本、关键词和其他元数据


    描述的第一行最为重要。App Store 的描述会在 iPhone、iPad、iTunes 和网络上显示。在许多情况下，描述只会显示前几行，因此请务必在第一句话中概括你的应用。


    另外请注意，你的描述文本和截图一旦应用上线，就会被诸如 App Shopper（[`www.appshopper.com`](http://www.appshopper.com)）之类的网站汇总抓取，所以不要写类似“描述稍后补充”这样愚蠢的内容，并且在应用发布前忘记填写一些有用的细节信息！


    ### 添加关键词


    关键词最多支持 100 个字节（大约 100 个字符）——请充分利用。Apple 的搜索算法会检查应用标题、关键词和描述以查找搜索结果。关键词比描述更重要，因此请谨慎选择！用逗号分隔你的关键词。


    请注意，一旦 Apple 批准了你的应用提交，你将无法再编辑应用的关键词。这同样适用于你的 App Store 标题。你只能在提交未来应用更新时编辑这些详细信息。'
- fmt: '### Uploading Screenshots and iTunes Artwork


    In order to complete the first step of our App Store submission, we need to upload
    a large version of our app icon and at least one screenshot for our app (see [Figure
    14-11](#Chapter14.html#fig_14_11)).


    ![Image](images/9781430243748_Fig14-11.jpg)


    **Figure 14-11.** A large app icon and up to five screenshots per device uploaded


    Apple specifies that the large app icon for iTunes now needs to be 1024×1024 pixels.
    Your very large icon will pop on the retina iPad and iOS 6 App Store.


    Just like the app icons in your app binary, ensure the corners of your iTunes
    icon bleed all the way to the edge, and don’t add your own round corners—Apple
    does this for you.


    You have the choice of uploading iPhone/iPod Touch, iPhone 5/iPod Touch (5th generation)
    and iPad screenshots. In *Birthday Reminder*, we’re only targeting the iPhone
    and iPod Touch devices, so we should only upload screenshots for the iPhone. iPhone
    and iPod Touch screenshots should be targeted at the following retina sizes: 640×960
    pixels for portrait-oriented screenshots and 960×640 pixels for landscape-oriented
    screenshots. The 20-point iOS status bar is optional, so you can also upload 640×920
    or 960×600 pixel screenshots. We’re supporting the iPhone 5’s 4 inch display so
    we must also upload native 640x1136 pixel iPhone 5 screenshots (see [Figure 14-11](#Chapter14.html#fig_14_11)).


    If you were uploading an iPad-only app or a universal app (one app with a native
    UI for both iPhone and iPad), then you’d also be required to upload at least one
    screenshot for iPad.


    You can actually change your screenshots and edit your description text at any
    point—even when your app is live; you won’t need to wait for Apple to approve
    your changes.


    Save your App Store submission. Don’t worry, it won’t actually start the App Store
    submission process yet. After all, you haven’t uploaded an app yet.


    ### App Name Secured and We Have an iTunes App ID


    Having completed Apple’s submission form, you should receive an automated e-mail
    from Apple confirming your submission and letting you know that your app status
    is `Waiting for Upload`.


    At this point, you’ll also have access to our app’s Apple ID, as highlighted in
    [Figure 14-12](#Chapter14.html#fig_14_12).


    ![Image](images/9781430243748_Fig14-12.jpg)


    **Figure 14-12.** Our app now has an Apple ID and our app submission is in a `Prepare
    for Upload` state


    We still have some work to do before we can sit back and wait for our app to reach
    Apple’s reviewers. Tapping the `View Details` button, shown in [Figure 14-12](#Chapter14.html#fig_14_12),
    takes you to the all the details you entered in the app submission form (see [Figure
    14-13](#Chapter14.html#fig_14_13)).


    ![Image](images/9781430243748_Fig14-13.jpg)


    **Figure 14-13.** Details about version 1.0 of our app


    Now click the `Read to Upload Binary` button. You’ll have to first answer `No`
    to our app incorporating or containing cryptography, but once you click the `Save`
    button, you have completed all the steps required in `iTunes Connect` prior to
    uploading your app to Apple’s submission queue. Your app’s status will have changed
    to `Waiting For Upload`.


    ### Preparing Our App for App Store Submission


    In order to compile an App Store–ready app for distribution, you’ll need to first
    visit Apple’s provisioning portal just as you did in [Chapter 2](#Chapter02.html#ch2)
    ([`https://developer.apple.com/ios/manage/overview/index.action`](https://developer.apple.com/ios/manage/overview/index.action)).


    In [Chapter 2](#Chapter02.html#ch2), we created a **development certificate**
    and a **development provisioning profile**. Now that we’re ready to submit our
    app to the App Store, if you haven’t already then now you’ll need to repeat the
    exact same process but this time generate a **distribution certificate** and a
    **distribution provisioning profile** for App Store submission. In the provisioning
    portal, you’ll find that both the `Certificates` and `Provisioning` sections both
    have a `Distribution` tabs. The process to generate the distribution certificate
    and App Store provision profile is virtually identical to the process described
    in [Chapter 2](#Chapter02.html#ch2), apart from device selection that is disabled
    for App Store provisioning profiles (see [Figure 14-14](#Chapter14.html#fig_14_14)).


    ![Image](images/9781430243748_Fig14-14.jpg)


    **Figure 14-14.** Creating an App Store provisioning profile for our app


    Have you created your distribution certificate and App Store provisioning profile?
    Ensure that you’ve downloaded and double-clicked both of these files to install
    them.


    The process of submitting an app binary to the App Store requires us to archive
    our *Birthday Reminder* project before signing the archive build with our distribution
    certificate and App Store provisioning profile. All archive builds remain accessible
    though `Xcode`’s `Organizer` window.


    Unfortunately, `Xcode`’s `Organizer` will only recognize and display our app icon
    alongside our app archive if we add a reference to the icon via the `BirthdayReminder-Info.plist`
    file. So we’re going to make a minor change to our project to reference the icons
    via the `plist`. The simplest way to do this is to let `Xcode` do it for us. First,
    open the `resources/images` `Xcode` group and scroll to the bottom of the list
    of image assets in our project. Multiselect `Icon.png` and `Icon@2x.png`, and
    hit the `Delete` key on your keyboard. Select the `Move to Trash` option from
    the dialog box, as shown in [Figure 14-15](#Chapter14.html#fig_14_15).


    ![Image](images/9781430243748_Fig14-15.jpg)


    **Figure 14-15.** Temporarily deleting icons from our project


    Now select your *Birthday Reminder* project in `Xcode`’s project navigator, and
    then select the *Birthday Reminder* target. Scroll down the summary panel until
    you reach the `App Icons` section (see [Figure 14-16](#Chapter14.html#fig_14_16)).
    In the Finder, open the `assets` folder of the source files for this chapter,
    and drag-and-drop `Icon.png` onto the first icon tray, and `Icon@2x.png` onto
    the second icon tray, as shown in [Figure 14-16](#Chapter14.html#fig_14_16).


    ![Image](images/9781430243748_Fig14-16.jpg)


    **Figure 14-16.** Importing icons into our project that will appear in the `info
    plist`


    As you see in [Figure 14-17](#Chapter14.html#fig_14_17), this import process has
    automatically generated some new data entries in our project’s `info plist`, referencing
    the two main icons.


    ![Image](images/9781430243748_Fig14-17.jpg)


    **Figure 14-17.** Primary icon file references have automatically been added to
    `BirthdayReminder-Info.plist`


    ### Creating an Archive Build of Our Project


    In order to create an archive build of your *Birthday Reminder* project, you’ll
    need to set the active scheme to your iPhone device and not the simulator, as
    shown in [Figure 14-18](#Chapter14.html#fig_14_18).


    ![Image](images/9781430243748_Fig14-18.jpg)


    **Figure 14-18.** Setting the active scheme to “iOS Device” or your iPhone/iPod,
    if it’s connected to your Mac


    Now create an archive build with the menu command `Product Archive`. When the
    build of your archive completes, `Xcode` automatically opens the `Organizer` window
    on the Archives tab (see [Figure 14-19](#Chapter14.html#fig_14_19)).


    ![Image](images/9781430243748_Fig14-19.jpg)


    **Figure 14-19.** The project archives in `Xcode`’s `Organizer` window


    `Xcode` stores all of your archived projects. This means that if you ever need
    access to an older build of a project for testing purposes, you can access it
    through the `Organizer`.


    Ready to upload and submit your app? There’s one last step to take!'
