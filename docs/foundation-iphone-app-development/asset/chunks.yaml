    Before the dealer can go, we need to write the code for the Hit and Stand button
    action methods. Stand is pretty straightforward:


    `- (IBAction)didTapStandButton:(id)sender {`

    **`self.gameModel.gameStage = BJGameStageDealer;`**

    **`    [self playDealerTurn];`**

    `}`


    The controller tells the model that the game stage has progressed to the dealer’s
    turn and we’ll then call `playDealerTurn`.


    There’s a bit more to the Hit method:


    `- (IBAction)didTapHitButton:(id)sender {`

    **`    BJDCard *card = [self.gameModel nextPlayerCard];`**

    **`    card.isFaceUp = YES;`**

    **`    [self renderCards];`**


    **`    [self.gameModel updateGameStage];`**

    **`    if (self.gameModel.gameStage == BJGameStageDealer) {`**

    **`        [self playDealerTurn];`**

    **`    }`**

    `}`


    First, the controller asks the model to deal another player card. The controller
    renders the card face-up in the view. Now the controller tells the model to update
    the game stage; that is, the game may now be over because the player has gone
    bust or reached the maximum five-card limit. `BJViewController` checks to see
    if the player’s turn is over and if so, plays the automated dealer methods:


    `if (self.gameModel.gameStage == BJGameStageDealer) {`

    `    [self playDealerTurn];`

    `}`


    Awesome. You can now play an entire game of blackjack! Build and run to give it
    a go.


    Oops, did your app crash at the end of the game? What did we miss?


    Ah yes, we never got round to implementing the `handleNotificationGameDidEnd:`
    method in `BJViewController`. Do you remember the notification we subscribed to
    in the designated initializer of this class? We need to add that method! Here’s
    the code:


    `-(void) handleNotificationGameDidEnd:(NSNotification *)notification`

    `{`

    `    NSDictionary *userInfo = notification.userInfo;`


    `    NSNumber *num = userInfo[@"didDealerWin"];`


    `    NSString *message = [num boolValue] ? @"Dealer won!" : @"You won!";`


