    `self.cards = [BJDCard generateAPackOfCards];`


    Great, we have 52 cards in our array! Only thing is that the cards aren’t shuffled.
    Hmm… this will be a pretty boring game of blackjack. What’s the solution?


    ##### Shuffling the cards: Objective-C categories


    Objective-C’s `NSMutableArray` class doesn’t have a shuffle method, unfortunately.
    So we’re going to have to write one ourselves. But isn’t a shuffle quite a useful
    additional method for a mutable array? Wouldn’t it be cool if we could add our
    method to the `NSMutableArray` class? Well, guess what? We can with Objective-C
    categories!


    Adding a category to an existing class is typically achieved by creating a new
    Objective-C header and source file. We’ll add the file to the `data` group, so
    open the Project Navigator and ensure that `data` is selected. Now, again with
    the ![Image](images/U002a.jpg)N shortcut or File ![Image](images/U001.jpg) New
    ![Image](images/U001.jpg) New File, select the Objective-C category option from
    the Cocoa Touch file templates. On the next screen type **Shuffle** into the Category
    text field and **NSMutableArray** into the Category On text field (see [Figure
    4-17](#Chapter04.html#fig_4_17)).


    ![Image](images/9781430243748_Fig04-17.jpg)


    **Figure 4-17.** Adding an Objective-C category to NSMutableArray


    Create the new file in the data folder of the Finder. Ensure that you’re viewing
    the newly created `NSMutableArray+Shuffle` header and source files in the Assistant
    Editor layout.


    *Tip: Occasionally Xcode doesn’t automatically display the counter part header/source
    file in the Assistant Layout. To resolve this, click the jumpbar and change the
    selected option to Counterparts.*


    You’ll see that a category file has a similar layout to a class file, but note
    the category name added within parenthesis after the interface keyword. Modify
    the category header as follows:


    `#import <Foundation/Foundation.h>`

    `@interface NSMutableArray (Shuffle)`


    **`-(void) shuffle;`**


    `@end`


    Now modify the source implementation to include the new shuffle method:


    `#import "NSMutableArray+Shuffle.h"`


    `@implementation NSMutableArray (Shuffle)`


    **`- (void)shuffle`**

    **`{`**

    **`    int count = [self count];`**


    **`    NSMutableArray *dupeArr = [self mutableCopy];`**

    **`    count = [dupeArr count];`**

    **`    [self removeAllObjects];`**


    **`    for (int i = 0; i < count; ++i) {`**

    **`        // Select a random element between i and the end of the array to swap
    with.`**

    **`        int nElements = count - i;`**

    **`        int n = (arc4random() % nElements);`**

    **`        [self addObject:dupeArr[n]];`**

    **`        [dupeArr removeObjectAtIndex:n];`**

    **`    }`**


    **`}`**


    `@end`


    Our custom shuffle method performs the following process:


    > *   Creates a duplicate copy of the mutable array.

    > *   Empties the array.

    > *   Loops through the duplicate array randomly extracting elements (in our app’s
    case these are the instances of `BJDCard`), re-adds them to the mutable array,
    and removes them from the duplicate.


    We’re done creating the shuffle category: so back to `BJDGameModel`.


    In order for the compiler to allow us to call our new shuffle category method
    on `NSMutableArray`, we’ll need to import the file we just created. So, at the
    top `of BJDGameModel.m` add the import declaration:


    `#import "NSMutableArray+Shuffle.h"`


    Now you should be able to call the `shuffle` method directly on `self.cards` after
    generating the pack. So the `resetGame` method should end up looking like this:


    `-(void) resetGame`

    `{`

    `    self.cards = [BJDCard generateAPackOfCards];`


    **`    [self.cards shuffle];`**


    `    self.playerCards = [NSMutableArray array];`

    `    self.dealerCards = [NSMutableArray array];`

    `    self.gameStage = BJGameStagePlayer;`

    `}`


    Cool, huh?'
  trans: "\n### 类方法\n\n在 `BJDGameModel` 源文件中，你会发现一个名为 `cards` 的私有属性，它是一个可变数组，用于存储由\
    \ 52 个 `BJDCard` 实例组成的牌组。我们将该数组声明为可变的，因为当牌被发到 `playerCards` 和 `dealerCards` 这两个可变数组中时，我们需要从该数组中弹出（pop）牌。不过，我并未提供预先生成牌组的代码。那么，现在我们就来实现它！\n\
    \n控制器会调用 `BJDGameModel` 的 `resetGame` 方法。这正是我们需要生成一副牌的地方。目前，`cards` 被设置为一个空数组：\n\
    \n```\nself.cards = [NSMutableArray array];\n```\n\n我们可以直接在 `BJDGameModel` 类中编写一个循环，但在其他纸牌游戏中，我们可能也需要生成一副\
    \ 52 张的牌。在我看来，为 `BJDCard` 类本身创建一个便捷方法会更合适。我们已经看到一些类，比如 `NSArray` 和 `NSDictionary`，如何通过工厂/便捷方法来生成自身的实例。在本例中，我们将在\
    \ `BJDCard` 上创建一个类方法，用于生成一个包含 52 个 `BJDCard` 实例的可变数组！\n\n切换到助理编辑器，开始处理 `BJDCard`\
    \ 类。你是否发现，在 Xcode 中，你可以同时打开多个 Objective-C 文件？你甚至可以设置多个文件全部使用助理编辑器布局。在 Xcode 中，默认情况下，双击项目导航器中的文件会打开一个新窗口。我更喜欢使用多个标签页而非窗口。要将\
    \ Xcode 设置为打开新标签页而非新窗口，请进入 Xcode 的通用偏好设置，在“双击导航”下，将所选选项更改为“使用单独的标签页”。\n\n现在查看\
    \ `BJDCard.h`，让我们在头文件中声明这个新的类方法：\n\n```\n+(NSMutableArray *) generateAPackOfCards;\n\
    ```\n\n你是否注意到类方法与实例方法（该类中的其他三个方法）在语法上的细微差别？声明类方法的语法是在声明开头使用“`+`”而不是“–”。现在切换到源文件中的\
    \ `BJDCard.m`，并添加以下代码：\n\n```\n+(NSMutableArray *) generateAPackOfCards\n{\n \
    \   NSMutableArray *arr = [NSMutableArray array];\n\n    BJDCard *card;\n\n  \
    \  int suit,digit;\n\n    for (suit=0;suit<4;suit++) {\n        for (digit=1;digit<=13;digit++)\n\
    \        {\n            card = [[BJDCard alloc] init];\n            card.suit\
    \ = suit;\n            card.digit = digit;\n            [arr addObject:card];\n\
    \        }\n    }\n\n    return arr;\n}\n```\n\n浏览这段代码，你会发现我们建立了一个嵌套循环。第一个外层循环迭代四次：每种花色一次。因此，生成牌的四分之一的花色设为\
    \ 0，四分之一的花色设为 1，以此类推。你还记得我们自定义的花色枚举器 `BJCardSuit` 吗？以下是帮助回想的代码：\n\n```\ntypedef\
    \ enum : int\n{\n    BJCardSuitClub = 0,\n    BJCardSuitSpade,\n    BJCardSuitDiamond,\n\
    \    BJCardSuitHeart\n}BJCardSuit;\n```\n\n通过这种声明语法，编译器将整数 0 分配为 `BJCardSuitClub`，整数\
    \ 1 分配为 `BJCardSuitSpade`，依此类推。因此，在我们的 `generateAPackOfCards` 方法中，这些花色值将与原始枚举声明中的枚举值相匹配。\n\
    \n回到 `generateAPackOfCards` 的分析，你会看到我们首先声明了一个空的局部作用域可变数组：\n\n```\nNSMutableArray\
    \ *arr = [NSMutableArray array];\n```\n\n然后，在我们循环的核心部分，我们 `alloc`/`init` 了新的 `BJDCard`\
    \ 实例，设置其花色和数字，然后通过可变数组的实例方法 `addObject:` 将它们添加到局部数组中。\n\n完成后，我们返回该数组。\n\n编译并运行你的应用，确认仍然没有错误！\n\
    \n我们完成了二十一点游戏中 `BJDCard` 类的开发。现在，我们将对 `BJDGameModel` 进行一些修改，以利用刚刚编写的新的 `generateAPackOfCards`\
    \ 方法。\n\n在 `BJDGameModel` 中，将 `resetGame` 方法实现中的这行代码：\n\n```\nself.cards = [NSMutableArray\
    \ array];\n```\n\n替换为：\n\n```\nself.cards = [BJDCard generateAPackOfCards];\n\
    ```\n\n太好了，我们的数组里有了 52 张牌！唯一的问题是牌没有洗过。嗯……这样的二十一点游戏会相当无聊。解决方案是什么呢？\n\n### 洗牌：Objective-C\
    \ 类别\n\n遗憾的是，Objective-C 的 `NSMutableArray` 类没有洗牌方法。因此，我们需要自己编写一个。但是，对于可变数组来说，洗牌不是一种非常有用的附加方法吗？如果能把我们的方法添加到\
    \ `NSMutableArray` 类中，是不是很酷？猜猜怎么着？我们可以通过 Objective-C 类别来实现！\n\n向现有类添加类别通常需要创建一个新的\
    \ Objective-C 头文件和源文件。我们将文件添加到 `data` 组中，因此打开项目导航器并确保选中了 `data`。现在，再次使用 ![图像](img/U002a.jpg)N\
    \ 快捷键或 文件 ![图像](img/U001.jpg) 新建 ![图像](img/U001.jpg) 新建文件，从 Cocoa Touch 文件模板中选择\
    \ Objective-C 类别选项。在下一个屏幕中，在“类别”文本字段中输入 **Shuffle**，在“类别于”文本字段中输入 **NSMutableArray**（参见图\
    \ 4-17）。\n\n![图像](img/9781430243748_Fig04-17.jpg)\n\n**图 4-17.** 向 NSMutableArray\
    \ 添加 Objective-C 类别\n\n在 Finder 的 data 文件夹中创建新文件。确保你在助理编辑器布局中查看新创建的 `NSMutableArray+Shuffle`\
    \ 头文件和源文件。\n\n*提示：偶尔 Xcode 不会在助理布局中自动显示对应的头文件/源文件。要解决此问题，请点击跳转栏，并将所选选项更改为“对应文件”。*\n\
    \n你会看到，类别文件的布局与类文件类似，但请注意，在接口关键字后的括号内添加了类别名称。按如下方式修改类别头文件：\n\n```\n#import <Foundation/Foundation.h>\n\
    @interface NSMutableArray (Shuffle)\n\n- (void) shuffle;\n\n@end\n```\n\n现在修改源实现，包含新的洗牌方法：\n\
    \n```\n#import \"NSMutableArray+Shuffle.h\"\n\n@implementation NSMutableArray\
    \ (Shuffle)\n\n- (void)shuffle\n{\n    int count = [self count];\n\n    NSMutableArray\
    \ *dupeArr = [self mutableCopy];\n    count = [dupeArr count];\n    [self removeAllObjects];\n\
    \n    for (int i = 0; i < count; ++i) {\n        // 选择一个介于 i 和数组末尾之间的随机元素进行交换。\n\
    \        int nElements = count - i;\n        int n = (arc4random() % nElements);\n\
    \        [self addObject:dupeArr[n]];\n        [dupeArr removeObjectAtIndex:n];\n\
    \    }\n\n}\n\n@end\n```\n\n我们的自定义洗牌方法执行以下过程：\n\n> * 创建可变数组的副本。\n> * 清空数组。\n>\
    \ * 循环遍历副本数组，随机抽取元素（在我们的应用中，这些是 `BJDCard` 的实例），将它们重新添加到可变数组中，并从副本中移除它们。\n\n洗牌类别创建完毕：现在回到\
    \ `BJDGameModel`。\n\n为了让编译器允许我们在 `NSMutableArray` 上调用新的洗牌类别方法，我们需要导入刚刚创建的文件。因此，在\
    \ `BJDGameModel.m` 的顶部添加 import 声明：\n\n```\n#import \"NSMutableArray+Shuffle.h\"\
    \n```\n\n现在，你应该能够在生成牌组后，直接在 `self.cards` 上调用 `shuffle` 方法。因此，`resetGame` 方法最终应如下所示：\n\
    \n```\n-(void) resetGame\n{\n    self.cards = [BJDCard generateAPackOfCards];\n\
    \n    [self.cards shuffle];\n\n    self.playerCards = [NSMutableArray array];\n\
    \    self.dealerCards = [NSMutableArray array];\n    self.gameStage = BJGameStagePlayer;\n\
    }\n```\n\n很酷，对吧？\n"
- fmt: "# In our blackjack game\n\nIn our blackjack game, it’s the model that determines\
    \ when the game has ended. The game could end for a few reasons: the player goes\
    \ bust, the dealer goes bust, the dealer hits a fifth maximum card, or the dealer\
    \ stands. The controller, `BJViewController`, needs to update the view when the\
    \ game is over, let the user know who won, and permit him to play again. However,\
    \ as per the rules of the MVC pattern, the model must remain ignorant of the view\
    \ and the controller. So how can we alert `BJViewController` to the game over\
    \ event?\n\nThe answer is Apple’s `NSNotificationCenter`.\n\n## Dispatching notifications\
    \ between classes\n\nApple has kindly provided Cocoa developers with the `NSNotificationCenter`,\
    \ which negates most reasons to use any kind of third-party architectural framework.\
    \ I remember when being a good Flash and Flex developer wasn’t just about knowing\
    \ how to write good ActionScript, it was also about which of the numerous third-party\
    \ frameworks to use when building complex web applications and games—PureMVC,\
    \ Cairngorm, Swiz, and Robotlegs to name but a few.\n\nWell, forget third-party\
    \ architectural frameworks for iOS SDK app development; the notification center\
    \ adds a native broadcast and observer mechanism to all Objective-C objects. Our\
    \ model will be able to fire off a notification into the abyss of our program.\
    \ As long as our view controller (or any other object) has registered as an observer\
    \ of our custom notification, we can rest assured that the view controller will\
    \ catch the event, and respond and update the view accordingly.\n\nSo let’s add\
    \ a notification dispatch to from the model.\n\nEach dispatched notification must\
    \ be an instance of `NSNotification`, which has a name property that is used by\
    \ observing classes when registering for notifications. So we’ll define the name\
    \ of our game over notification in a constant string.\n\nRight at the top of the\
    \ `BJDGameModel.h` header file, define the notification name:\n\n`#define BJNotificationGameDidEnd\
    \    @\"BJNotificationGameDidEnd\"`\n\nSome developers keep a single file just\
    \ for constant declarations. In the case of declaring notification names, another\
    \ common convention is to add the notification name declarations to the header\
    \ file of the dispatching class like we’ve just done.\n\nNow, switch to the source\
    \ file for `BJGameModel` and locate the `notifyGameDidEnd` method. The method\
    \ is currently empty. However, `BJDGameModel` is already calling this method at\
    \ all the points when the game has ended. We need to achieve two things when we\
    \ send our notification: alerting any observing objects that the game has ended\
    \ and letting them know who won. Update `notifyGameDidEnd` as follows:\n\n```\n\
    -(void) notifyGameDidEnd\n{\n    NSNotificationCenter *notificationCenter = [NSNotificationCenter\
    \ defaultCenter];\n\n    //wrapping a Boolean into an NSNumber object using literals\
    \ syntax\n    NSNumber *didDealerWin = @(self.didDealerWin);\n\n    //creating\
    \ a dictionary using literals syntax\n    NSDictionary *dict = @{@\"didDealerWin\"\
    : didDealerWin};\n\n    [notificationCenter postNotificationName:BJNotificationGameDidEnd\
    \ object:self\nuserInfo:dict];\n}\n```\n\nI realize that’s a lot of new code to\
    \ digest, so let’s step through it. The notification broadcasts are sent through\
    \ an instance of `NSNotificationCenter`. We don’t even need to worry about instantiating\
    \ that class because Cocoa has created a default, single instance behind the scenes\
    \ that we can access through the `NSNotificationCenter` convenience method `defaultCenter`.\n\
    \nNext, we need to include the details of whether the dealer or player won in\
    \ our notification. The notification object we’re going to send permits us to\
    \ include an `NSDictionary` instance in its `userInfo` property. This is the reason\
    \ we’re creating an `NSDictionary` on the following line of code.\n\nThe problem\
    \ is that the `self.didDealerWin` property is a Boolean primitive. Primitive data\
    \ types cannot be set as values in dictionaries or arrays. The solution is to\
    \ wrap the Boolean primitive in an object and pass the pointer into the dictionary.\
    \ We do this by creating an instance of the `NSNumber` class.\n\n**Note:** Primitive\
    \ data types cannot be set as values in dictionaries or arrays. Wrap the primitive\
    \ in an instance of the `NSNumber` class. You can wrap float, integers, and Booleans\
    \ in `NSNumber` instances.\n\nFinally, we post our notification via the single,\
    \ default `NSNotificationCenter`:\n\n```\n[notificationCenter postNotificationName:BJNotificationGameDidEnd\
    \ object:self userInfo:dict];\n```\n\nThis method creates a notification with\
    \ the given name (`BJNotificationGameDidEnd` constant string), sender (our `BJDGameModel`\
    \ class instance), and information (our dictionary instance and winner data) and\
    \ posts it to the registered notification observers.\n\nBuild and run, and then\
    \ check that your code compiles OK. We’re done with our model: back to `BJViewController`\
    \ to hook everything up!"
  raw: 'In our blackjack game, it’s the model that determines when the game has ended.
    The game could end for a few reasons: the player goes bust, the dealer goes bust,
    the dealer hits a fifth maximum card, or the dealer stands. The controller, `BJViewController`,
    needs to update the view when the game is over, let the user know who won, and
    permit him to play again. However, as per the rules of the MVC pattern, the model
    must remain ignorant of the view and the controller. So how can we alert `BJViewController`
    to the game over event?


    The answer is Apple’s `NSNotificationCenter`.


    ##### Dispatching notifications between classes


    Apple has kindly provided Cocoa developers with the `NSNotificationCenter`, which
    negates most reasons to use any kind of third-party architectural framework. I
    remember when being a good Flash and Flex developer wasn’t just about knowing
    how to write good ActionScript, it was also about which of the numerous third-party
    frameworks to use when building complex web applications and games—PureMVC, Cairngorm,
    Swiz, and Robotlegs to name but a few.


    Well, forget third-party architectural frameworks for iOS SDK app development;
    the notification center adds a native broadcast and observer mechanism to all
    Objective-C objects. Our model will be able to fire off a notification into the
    abyss of our program. As long as our view controller (or any other object) has
    registered as an observer of our custom notification, we can rest assured that
    the view controller will catch the event, and respond and update the view accordingly.


    So let’s add a notification dispatch to from the model.


    Each dispatched notification must be an instance of `NSNotification`, which has
    a name property that is used by observing classes when registering for notifications.
    So we’ll define the name of our game over notification in a constant string.


    Right at the top of the `BJDGameModel.h` header file, define the notification
    name:


    `#define BJNotificationGameDidEnd    @"BJNotificationGameDidEnd"`


    Some developers keep a single file just for constant declarations. In the case
    of declaring notification names, another common convention is to add the notification
    name declarations to the header file of the dispatching class like we’ve just
    done.


    Now, switch to the source file for `BJGameModel` and locate the `notifyGameDidEnd`
    method. The method is currently empty. However, `BJDGameModel` is already calling
    this method at all the points when the game has ended. We need to achieve two
    things when we send our notification: alerting any observing objects that the
    game has ended and letting them know who won. Update `notifyGameDidEnd` as follows:


    `-(void) notifyGameDidEnd`

    `{`

    **`NSNotificationCenter *notificationCenter = [NSNotificationCenter defaultCenter];`**


    **`    //wrapping a Boolean into an NSNumber object using literals syntax`**

    **`    NSNumber *didDealerWin = @(self.didDealerWin);`**


    **`    //creating a dictionary using literals syntax`**

    **`    NSDictionary *dict = @{@"didDealerWin": didDealerWin};`**


    **`    [notificationCenter postNotificationName:BJNotificationGameDidEnd object:self`**

    **`userInfo:dict];`**

    `}`


    I realize that’s a lot of new code to digest, so let’s step through it. The notification
    broadcasts are sent through an instance of `NSNotificationCenter`. We don’t even
    need to worry about instantiating that class because Cocoa has created a default,
    single instance behind the scenes that we can access through the `NSNotificationCenter`
    convenience method `defaultCenter`.


    Next, we need to include the details of whether the dealer or player won in our
    notification. The notification object we’re going to send permits us to include
    an `NSDictionary` instance in its `userInfo` property. This is the reason we’re
    creating an `NSDictionary` on the following line of code.


    The problem is that the `self.didDealerWin` property is a Boolean primitive. Primitive
    data types cannot be set as values in dictionaries or arrays. The solution is
    to wrap the Boolean primitive in an object and pass the pointer into the dictionary.
    We do this by creating an instance of the `NSNumber` class.


    *Note: Primitive data types cannot be set as values in dictionaries or arrays.
    Wrap the primitive in an instance of the* `NSNumber` *class. You can wrap float,
    integers, and Booleans in* `NSNumber` *instances.*


    Finally, we post our notification via the single, default `NSNotificationCenter`:


    `[notificationCenter postNotificationName:BJNotificationGameDidEnd object:self
    userInfo:dict];`


    This method creates a notification with the given name (`BJNotificationGameDidEnd`
    constant string), sender (our `BJDGameModel` class instance), and information
    (our dictionary instance and winner data) and posts it to the registered notification
    observers.


    Build and run, and then check that your code compiles OK. We’re done with our
    model: back to `BJViewController` to hook everything up!'
  trans: "\n# 在我们的二十一点游戏中\n\n在我们的二十一点游戏中，由模型来决定游戏何时结束。游戏结束可能有几种原因：玩家点数爆掉、庄家点数爆掉、庄家拿到第五张牌达到上限、或者庄家停牌。控制器\
    \ `BJViewController` 需要在游戏结束时更新视图，告知用户谁赢了，并允许他重新开始游戏。然而，根据 MVC 模式的规则，模型必须对视图和控制器保持无知。那么，我们该如何向\
    \ `BJViewController` 发出游戏结束的事件警报呢？\n\n答案是苹果的 `NSNotificationCenter`。\n\n## 在类之间分发通知\n\
    \n苹果友好地为 Cocoa 开发者提供了 `NSNotificationCenter`，这消除了使用任何第三方架构框架的大部分理由。我记得过去，成为一名优秀的\
    \ Flash 和 Flex 开发者不仅仅在于知道如何编写优秀的 ActionScript，还在于在构建复杂的 Web 应用和游戏时，该从众多第三方框架中选择哪一个——例如\
    \ PureMVC、Cairngorm、Swiz 和 Robotlegs。\n\n不过，对于 iOS SDK 应用开发来说，忘掉那些第三方架构框架吧；通知中心为所有\
    \ Objective-C 对象添加了原生的广播和观察者机制。我们的模型将能够向程序的无尽深处发送一个通知。只要我们的视图控制器（或任何其他对象）已注册为自定义通知的观察者，我们就可以放心，视图控制器会捕获该事件，做出响应，并相应地更新视图。\n\
    \n那么，让我们从模型中添加一个通知分发。\n\n每个分发的通知必须是 `NSNotification` 的一个实例，它有一个 `name` 属性，供观察类在注册通知时使用。因此，我们需要在常量字符串中定义游戏结束通知的名称。\n\
    \n就在 `BJDGameModel.h` 头文件的顶部，定义通知名称：\n\n`#define BJNotificationGameDidEnd    @\"\
    BJNotificationGameDidEnd\"`\n\n有些开发者会单独用一个文件来存放常量声明。在声明通知名称的情况下，另一种常见的做法是将通知名称声明添加到分发类的头文件中，就像我们刚刚做的那样。\n\
    \n现在，切换到 `BJGameModel` 的源文件，找到 `notifyGameDidEnd` 方法。该方法目前是空的。不过，`BJDGameModel`\
    \ 已经在游戏结束的所有节点调用了这个方法。在发送通知时，我们需要实现两个目标：提醒所有观察对象游戏已结束，并让他们知道谁赢了。按照以下方式更新 `notifyGameDidEnd`：\n\
    \n```\n-(void) notifyGameDidEnd\n{\n    NSNotificationCenter *notificationCenter\
    \ = [NSNotificationCenter defaultCenter];\n\n    // 使用字面量语法将布尔值包装成 NSNumber 对象\n\
    \    NSNumber *didDealerWin = @(self.didDealerWin);\n\n    // 使用字面量语法创建字典\n  \
    \  NSDictionary *dict = @{@\"didDealerWin\": didDealerWin};\n\n    [notificationCenter\
    \ postNotificationName:BJNotificationGameDidEnd object:self\nuserInfo:dict];\n\
    }\n```\n\n我知道这包含了很多新代码需要消化，让我们一步步来理解。通知广播是通过 `NSNotificationCenter` 的一个实例发送的。我们甚至不需要担心实例化这个类，因为\
    \ Cocoa 已经在后台创建了一个默认的单一实例，我们可以通过 `NSNotificationCenter` 的便捷方法 `defaultCenter`\
    \ 来访问它。\n\n接下来，我们需要在通知中包含庄家或玩家是否获胜的详细信息。我们要发送的通知对象允许我们在其 `userInfo` 属性中包含一个 `NSDictionary`\
    \ 实例。这就是我们在下一行代码中创建 `NSDictionary` 的原因。\n\n问题在于 `self.didDealerWin` 属性是一个布尔型原始值。原始数据类型不能直接作为字典或数组中的值来设置。解决方案是将布尔型原始值包装在一个对象中，并将指针传递给字典。我们通过创建\
    \ `NSNumber` 类的一个实例来实现这一点。\n\n**注意：** 原始数据类型不能直接作为字典或数组中的值来设置。请将原始值包装在 `NSNumber`\
    \ 类的实例中。你可以在 `NSNumber` 实例中包装浮点数、整数和布尔值。\n\n最后，我们通过单一的默认 `NSNotificationCenter`\
    \ 发布通知：\n\n```\n[notificationCenter postNotificationName:BJNotificationGameDidEnd\
    \ object:self userInfo:dict];\n```\n\n此方法使用给定的名称（`BJNotificationGameDidEnd` 常量字符串）、发送者（我们的\
    \ `BJDGameModel` 类实例）和信息（我们的字典实例及获胜者数据）创建一个通知，并将其发布给已注册的通知观察者。\n\n构建并运行，然后检查你的代码是否能成功编译。我们的模型部分已经完成：现在回到\
    \ `BJViewController` 来将所有内容串联起来！\n"
- fmt: "### Hooking it all together\n\nThe rest of our work is in the source implementation\
    \ file for `BJViewController`. We’re finally going to see the results of our hard\
    \ work building the model represented in our view!\n\nClose all the model classes\
    \ and open only `BJViewController.m` in the standard editor. Begin by importing\
    \ `BJDGameModel.h` and `BJDCard.h`:\n\n```\n#import \"BJViewController.h\"\n#import\
    \ \"BJDGameModel.h\"\n#import \"BJDCard.h\"\n```\n\nNow to add a new private model\
    \ property to the private class extension of `BJViewController.m` source:\n\n\
    ```\n@interface BJViewController ()\n\n@property (nonatomic,strong) NSArray *dealerCardViews;\n\
    @property (nonatomic,strong) NSArray *playerCardViews;\n@property (nonatomic,strong)\
    \ BJDGameModel *gameModel;\n@end\n```\n\nWithin the implementation of `BJViewController.m`,\
    \ add place holders for two new private methods:\n\n```\n- (void)renderCards\n\
    {\n\n}\n\n- (void)restartGame\n{\n\n}\n```\n\n*Note: To avoid compiler warnings\
    \ prior to Xcode 4.5, it was necessary to either declare private method signatures\
    \ in your class extension or place the method implementations high in the implementation\
    \ file and before any callers. This is now a thing of the past and you can order\
    \ your private methods however you like and without declaring method signatures.*\n\
    \nIn addition, we’re going to override the designated initializer of `UIViewController`\
    \ in our subclass as follows:\n\n```\n-(id) initWithCoder:(NSCoder *)aDecoder\n\
    {\n    self = [super initWithCoder:aDecoder];\n    if (self) {\n        self.gameModel\
    \ = [[BJDGameModel alloc] init];\n        [[NSNotificationCenter defaultCenter]\
    \ addObserver:self\n                                                selector:@selector(handleNotificationGameDidEnd:)\n\
    \                                                    name:BJNotificationGameDidEnd\n\
    \                                                  object:self.gameModel];\n \
    \   }\n    return self;\n}\n```\n\n`UIViewController` has multiple designated\
    \ initializers: `initWithCoder:` and `initWithNibName:bundle:`. However, when\
    \ instantiated from a storyboard `initWithCoder:` is the initializer that gets\
    \ automatically invoked.\n\nIn our `BJViewController` designated initializer,\
    \ we’re doing two things here: instantiating an instance of `BJDGameModel` and\
    \ registering to receive notifications from the model when the game ends. We’ve\
    \ registered for the game end notification to fire a method in our view controller\
    \ that we’ve yet to write: `handleNotificationGameDidEnd:`.\n\nUsing the `@selector`\
    \ directive in the `addObserver` method of `NSNotificationCenter` is similar to\
    \ the target-action mechanism we covered in Interface Builder `UIControl` target-actions\
    \ at the beginning of the chapter. When the game ends, `BJDGameModel` sends a\
    \ new notification via the notification center that, in turn, invokes the `handleNotificationGameDidEnd`\
    \ method in the `BJViewController` observing class.\n\nWe’ll implement the `handleNotificationGameDidEnd`\
    \ method at the end of this chapter. Next, I’d like you to add the full code for\
    \ the new `restartGame` method:\n\n```\n- (void)restartGame\n{\n    [self.gameModel\
    \ resetGame];\n    BJDCard *card;\n\n    card = [self.gameModel nextPlayerCard];\n\
    \    card.isFaceUp = YES;\n    card = [self.gameModel nextDealerCard];\n    card.isFaceUp\
    \ = YES;\n\n    card = [self.gameModel nextPlayerCard];\n    card.isFaceUp = YES;\n\
    \n    [self.gameModel nextDealerCard];\n\n    [self renderCards];\n\n    self.standButton.enabled\
    \ = self.hitButton.enabled = YES;\n}\n```\n\nThe `restartGame` method initially\
    \ calls `resetGame` on the model. We recently worked on the `resetGame` method\
    \ in `BJDGameModel`—we generate a new shuffled pack of cards and empty the arrays\
    \ for tracking dealer and player cards.\n\nNext, we instruct the model to deal\
    \ two cards to the dealer and to the player. Note how we set the first dealer\
    \ card face-up and not the second. This instruction is rendered into our view\
    \ in the `renderCards` method we’ve not yet written.\n\nWe also enable the player’s\
    \ Stand and Hit buttons because the player goes first in blackjack. When it’s\
    \ the dealer’s turn, we’ll disable these buttons."
