  trans: '

    ### 开始上手


    首次启动 `Xcode` 时，您会看到一个“欢迎使用 Xcode”窗口，其中提供了一些初始选项（参见图 3-1）。


    ![图片](img/9781430243748_Fig03-01.jpg)


    **图 3-1.** “欢迎使用 Xcode”窗口


    您随时可以通过 `Window > Welcome to Xcode` 或按 `` 1 快捷键重新打开 Xcode 的欢迎窗口。欢迎窗口中提供的选项包括：


    - **创建新 Xcode 项目**：这将是我们入门的起点。

    - **连接到仓库**：Xcode 内置了对 Git 和 Subversion 的版本控制兼容性。如果您像我一样，希望您的编码 IDE（集成开发环境）专注于本职工作（编码），那么也没问题。我本人不使用
    Xcode 的这一功能，而是更喜欢通过命令行运行 Git。如果您想在 Xcode 中直接使用 Git 或 Subversion，也可以——尽管深入探讨此内容超出了本书的范围。

    - **了解 Xcode**：此选项会打开 Organizer 窗口的文档部分。值得先浏览一下“关于 Xcode”的文档。第一个屏幕包含一张图表，高亮显示了
    Xcode 工作区的各个区域和面板，这些内容将在本书中反复用到（参见图 3-2）。

    - **前往 Apple 开发者门户**：一个跳转到 Apple 开发者网站的快捷链接。


    首先选择第三个选项：**了解 Xcode**。您将进入 Organizer 内的 Xcode 文档部分。图 3-2 截取自文档的第一页。值得先查看一下 Xcode
    用户界面各部分对应的 IDE 面板。我会在本书的后续章节中多次提及它们。


    ![图片](img/9781430243748_Fig03-02.jpg)


    **图 3-2.**：Xcode 文档中的 IDE 分解图


    请注意左侧的导航区；在这里，您通常可以通过项目导航器窗格访问项目层级结构中的任何文件。中央的编辑区是您编写类代码文件或使用 Storyboard 文件创建用户界面的地方。IDE
    的右侧称为实用工具区；它由检查器和资料库窗格组成。例如，当处理 Storyboard 或定义 Core Data 实体的 UML（统一建模语言）时，您可以在这里使用属性检查器修改所选对象的属性。IDE
    底部的窗格是调试区，在应用调试会话期间，日志和错误会输出到控制台。


    让我们创建一个新项目！从菜单中选择 `File > New > Project` 或按 `` N 快捷键。Xcode 随即会提供一系列项目模板供您选择作为起点（参见图
    3-3）。


    对于某些项目，特定模板可以节省您的开发时间。例如，**Master-Detail** 模板会生成一个包含导航控制器和嵌入式根视图控制器的项目——然后您就可以直接开始工作了。


    ![图片](img/9781430243748_Fig03-03.jpg)


    **图 3-3.** 选择起始项目模板


    您可以说我吹毛求疵（好吧，尽管说吧！），但我喜欢尽可能多地控制应用中的代码。有些 Xcode 模板——尤其是那些包含 Core Data 模型的——会在您的项目中注入大量初始代码。您可以在项目生成后进行清理。但对于我们的项目，我希望您选择最简单的模板之一：**Single
    View Application**。


    接下来，Xcode 会要求您为我们的新项目填写一些额外选项（参见图 3-4）。


    ![图片](img/9781430243748_Fig03-04.jpg)


    **图 3-4.** 为 *Birthday Reminder* 设置项目选项会动态生成应用的包标识符。


    - **Product Name**：输入 `BirthdayReminder`（区分大小写，无空格）。我们需要此项与开发配置文件（在第 2 章中设置）中嵌入的应用包标识符的最后一部分匹配。

    - **Organization Name**：Xcode 会使用作者/公司的详细信息预填充任何新类文件，这些信息设置在代码上方的注释中。如果我在此字段中输入“Nick
    Kuh”，那么我在项目中创建的每个新类都会在其头部注释中包含 Copyright (c) Nick Kuh。对于您的项目，请输入您的姓名或公司名称。

    - **Company Identifier**：您需要输入与您在第 2 章中为配置文件使用的相同反向域名路径：`[com/co.uk/etc].[your_domainname]`。

    - **Class Prefix**：输入 `BR`，这是 *Birthday Reminder* 的缩写。您会发现，大多数第三方 Objective-C
    代码库都会使用两到三个首字母作为其类的前缀。对于我自己的可重用类库，我使用 `NK`（Nick Kuh）。对于您不打算在项目之外重用的项目特定类，请使用合适的前缀。类前缀并非强制要求，但作为良好实践，现在实施是值得的。


    您还可以指定应用的目标设备是 iPhone、iPad 还是通用应用：一个带有两个用户界面（一个用于 iPhone，一个用于 iPad）的应用。对于我们的项目，我们仅选择
    iPhone。


    最后，确保选中 **Storyboarding** 和 **ARC**（自动引用计数）。然后我们就可以开始了。


    在接下来的屏幕上，选择硬盘上的一个位置来保存新的 *Birthday Reminder* 项目。取消选中 **Create Local Git Repository**
    选项，除非您希望 Xcode 为您初始化一个 Git 源代码仓库。


    ### 分解项目结构


    因为我们选择了 **Single View Application** 项目模板，所以 Xcode 已自动向我们的项目添加了一个包含单个视图的 Storyboard。正如我在第
    1 章中提到的，应用中的每个主视图都应始终由一个视图控制器类控制。Xcode 生成了 `BRViewController` 来控制当前项目中的单个视图。


    默认情况下，Xcode 左侧的导航面板显示项目导航器。项目导航器列出了我们项目中包含的所有文件、组和框架（参见图 3-5）。


    *注意：在项目导航器中选择文件会在 Xcode 的编辑区显示该文件。*


    当 iOS 尝试加载我们的 *Birthday Reminder* 应用时，它会期望找到一个名为 `main.m` 的 Objective-C 文件作为入口点。对于此应用或任何其他应用，您都不需要修改
    `main.m`，因此请不要进一步触碰此文件！


    您会注意到 `main.m` 引用了 `BRAppDelegate` 类。`main.m` 包含一个函数，当 iOS 启动我们的应用时，该函数会生成应用代理类的一个实例。


    ![图片](img/9781430243748_Fig03-05.jpg)


    **图 3-5.** 初始生成的项目结构

