  raw: '### The Game


    We’re going to build a simplified version of blackjack, so there are a few caveats:


    > *   Players will have just two options during gameplay: Stand or Hit.

    > *   There’ll be no betting (sorry!).

    > *   We’re going to implement a maximum card limit per player of five cards.


    #### How to play


    For those of you not familiar with the game, blackjack is a card game in which
    the players compete against the dealer.


    The objective of the game is to make 21 points with your hand.


    You have to beat the dealer to win the game. At the end of the game, if you have
    the same number as or fewer points than the dealer, you lose (this is the version
    we’ll make).


    If your hand goes over 21, then you’ve bust—and you lose.


    At the start of the game, two cards are dealt to each player and the dealer: the
    hole cards. You get to see both of your hole cards. In some versions of the game,
    you get to see one of the dealer’s cards but not the other, so you have some indication
    of the strength of his hand. That’s the version we’re going to build.


    In blackjack, each card has a points value, as follows:


    > *   *Ace*: Either 11 points or 1 point, whichever gives you a better score without
    going bust

    > *   *Face cards (jack, queen, king)*: 10 points

    > *   *Everything else*: The value of the card


    You have to make all of your decisions before the dealer. You repeatedly decide
    whether to *hit*—and have another card added to your hand from the pack. When
    you’re happy with your hand (it’s as close to 21 as you’re prepared to risk),
    you *stand*—and it’s the dealers turn. He plays out his hand and only has to match
    or beat your cards to win.


    There are other rules to the game, but I think we’ve got plenty here for a good
    demo app.


    Ready to start? First, make a duplicate of the Starting Code project folder from
    the Source Files for [Chapter 4](#Chapter04.html#ch4) to work from.


    You’ll find that I’ve already embedded the image and icon assets for our project.
    As per [Chapter 3](#Chapter03.html#ch3), I selected the Single View Application
    template as a starting point for this project.


    There’s just one view and view controller in our blackjack game, so select the
    main storyboard file and let’s build our view.


    ### Creating the view


    In this first stage of our blackjack game development, we’ll begin by learning
    how to create basic user interfaces in Xcode: how to add and configure buttons,
    labels, and images in a view, and how to create connections to those subviews
    to control them with code at runtime.


    #### Setting the background color of a view


    Open the blackjack project’s storyboard file and ensure that the document outline
    pane is visible; this makes view selection simpler and more accurate when working
    with user interfaces.


    Using the outline inspector, select the main view in the storyboard and then change
    the background color to a suitable blackjack green using the attributes inspector,
    as shown in [Figure 4-1](#Chapter04.html#fig_4_1).


    ![Image](images/9781430243748_Fig04-01.jpg)


    **Figure 4-1.** Setting the background color of a view


    #### Adding labels, images, and buttons


    Next, drag and drop two label views (`UILabel`) from the Object Library onto the
    view: one to display above the dealer’s cards and one to display above the player’s
    cards (see [Figure 4-2](#Chapter04.html#fig_4_2)).


    Using the attributes inspector again, change the font face and size of the labels
    to System Bold/17 points, and type in the text **Dealer** and **Player**, respectively.


    ![Image](images/9781430243748_Fig04-02.jpg)


    **Figure 4-2.** Adding Label Views (UILabel)


    Now drag a new image view (UIImageView) onto the main view. Using the size inspector,
    set the dimensions of the image view to 118×176 points. These are the fixed dimensions
    of the card face and back images assets that I’ve already added to the blackjack
    project (I’ve added both the non-retina versions (118×176 pixels) and the retina
    versions (236×352 pixels)).


    Keeping the image view selected in the Editor, switch back to the attributes inspector
    and select the `card-back.png` image asset to set the image property of the image
    view (see [Figure 4-3](#Chapter04.html#fig_4_3)).


    ![Image](images/9781430243748_Fig04-03.jpg)


    **Figure 4-3.** Adding an image view (UIImageView) and setting its image property


    *Tip: By selecting* `card-back.png` *and not* `card-back@2x.png`, *iOS SDK will
    automatically use* `card-back@2x.png` *on retina devices and* `card-back.png`
    *on non-retina devices like the iPhone 3GS.*


    With the card image view selected in the Editor, create nine additional duplicate
    cards: ![Image](images/U002.jpg)D or Edit ![Image](images/U001.jpg) Duplicate.
    Layer the cards into two hands of five, layering up from left to right for each
    hand (see [Figure 4-4](#Chapter04.html#fig_4_4)). To arrange the layering of cards,
    use Editor ![Image](images/U001.jpg) Arrange ![Image](images/U001.jpg) Send to
    Front.


    Drag and drop two round rect buttons (UIButton) from the Object Library onto the
    main view.


    *Tip:* `UIButton` *is confusingly named Round Rect button in the Object Library.
    This* is *the main iOS button component, however, and it can also be used for
    custom buttons with graphic skin images.*


    Resize, position, and enter the titles for each button, as per [Figure 4-4](#Chapter04.html#fig_4_4).


    ![Image](images/9781430243748_Fig04-04.jpg)


    **Figure 4-4.** The final view layout


    You should now have a final view layout that resembles [Figure 4-4](#Chapter04.html#fig_4_4).


    We’ve added labels, image views, and buttons to the main view of our storyboard.
    In iOS, each view or screen is controlled by a view controller class instance.
    Our main blackjack view’s view controller is an instance of the `BJViewController`
    class in our project. At this point, we haven’t made any modifications to the
    view controller itself: the view controller doesn’t know anything about these
    newly added subviews.'
  trans: '

    ### 游戏规则


    我们将构建一个简化版的二十一点游戏，因此有以下几点说明：


    > * 玩家在游戏中只有两个选项：停牌或拿牌。

    > * 不涉及下注（抱歉！）。

    > * 我们将实现每位玩家最多持有五张牌的上限。


    #### 游戏玩法


    对于不熟悉该游戏的读者，二十一点是一种玩家与庄家对战的纸牌游戏。


    游戏的目标是让手中的牌点数尽可能接近 21 点。


    你必须击败庄家才能获胜。游戏结束时，如果你的点数与庄家相同或更少，则你输（这是我们即将构建的版本）。


    如果你手中的牌点数超过 21 点，则爆牌——你也输了。


    游戏开始时，每位玩家和庄家各发两张牌：即底牌。你可以看到自己的两张底牌。在某些游戏版本中，你只能看到庄家的一张牌，而看不到另一张，这样你就能对庄家手牌的强弱有所了解。这正是我们将要构建的版本。


    在二十一点中，每张牌都有相应的点数，具体如下：


    > * *A 牌*：可以是 11 点或 1 点，以不爆牌为前提，取更有利于你的分数

    > * *人头牌（J、Q、K）*：均为 10 点

    > * *其他牌*：按牌面数字计算


    所有决策都必须在庄家之前完成。你需要反复决定是“拿牌”——从牌堆中再拿一张牌加入手牌，还是“停牌”——当你对手牌满意时（即你认为点数已接近 21 点且愿意承担风险），轮到庄家行动。庄家打出自己的手牌，只需点数不低于你的牌即可获胜。


    游戏还有其他规则，但我想现有内容已足够构建一个出色的演示应用。


    准备开始了吗？首先，从第 4 章的源文件中复制一份起始代码项目文件夹，作为你的工作基础。


    你会发现我已经为我们的项目嵌入了图片和图标资源。按照第 3 章的做法，我选择了“单视图应用程序”模板作为本项目的起点。


    我们的二十一点游戏中只有一个视图和视图控制器，因此请选择主故事板文件，我们开始构建视图。


    ### 创建视图


    在二十一点游戏开发的第一阶段，我们将学习如何在 Xcode 中创建基本的用户界面：包括如何在视图中添加和配置按钮、标签和图片，以及如何建立到这些子视图的连接，以便在运行时通过代码控制它们。


    #### 设置视图的背景颜色


    打开二十一点项目的故事板文件，并确保文档大纲窗格可见；这在处理用户界面时能更简单、更精确地选择视图。


    使用大纲检查器，选择故事板中的主视图，然后通过属性检查器将背景颜色更改为合适的二十一点绿色，如图 4-1 所示。


    ![图片](img/9781430243748_Fig04-01.jpg)


    **图 4-1. 设置视图的背景颜色**


    #### 添加标签、图片和按钮


    接下来，从对象库中拖拽两个标签视图（`UILabel`）到主视图上：一个显示在庄家牌的上方，另一个显示在玩家牌的上方（参见图 4-2）。


    再次使用属性检查器，将标签的字体和字号更改为系统粗体/17 磅，并分别输入文本**庄家**和**玩家**。


    ![图片](img/9781430243748_Fig04-02.jpg)


    **图 4-2. 添加标签视图（`UILabel`）**


    现在，将一个图片视图（`UIImageView`）拖拽到主视图上。使用大小检查器，将图片视图的尺寸设置为 118×176 磅。这些是我已添加到二十一点项目中的牌面与牌背图片资源的固定尺寸（我同时添加了非视网膜版本（118×176
    像素）和视网膜版本（236×352 像素））。


    在编辑器中保持图片视图被选中状态，切换回属性检查器，选择`card-back.png`图片资源来设置图片视图的图片属性（参见图 4-3）。


    ![图片](img/9781430243748_Fig04-03.jpg)


    **图 4-3. 添加图片视图（`UIImageView`）并设置其图片属性**


    *提示：选择* `card-back.png` *而非* `card-back@2x.png`，*iOS SDK 会自动在视网膜设备上使用* `card-back@2x.png`，*在非视网膜设备（如
    iPhone 3GS）上使用* `card-back.png`。


    在编辑器中选中牌面图片视图后，创建九个额外的副本：![图片](img/U002.jpg)⌘D 或 编辑 ![图片](img/U001.jpg) 复制。将这些牌分层排列成两手牌，每手五张，每手牌从左到右叠放（参见图
    4-4）。要调整牌的叠放次序，请使用 编辑 ![图片](img/U001.jpg) 排列 ![图片](img/U001.jpg) 置于顶层。


    从对象库中拖拽两个圆角矩形按钮（`UIButton`）到主视图上。


    *提示：在对象库中，* `UIButton` *被令人困惑地命名为“Round Rect button”。然而，这* 就是 *iOS 的主要按钮组件，它也可以用于带有图形皮肤图片的自定义按钮。*


    按照图 4-4 所示，调整每个按钮的大小、位置并输入标题。


    ![图片](img/9781430243748_Fig04-04.jpg)


    **图 4-4. 最终视图布局**


    你现在应该得到了一个类似图 4-4 的最终视图布局。


    我们已在故事板的主视图中添加了标签、图片视图和按钮。在 iOS 中，每个视图或屏幕由一个视图控制器类实例控制。我们二十一点主视图的视图控制器是项目中`BJViewController`类的一个实例。目前，我们尚未对视图控制器本身进行任何修改：这个视图控制器对这些新添加的子视图一无所知。

    '
- fmt: '#### Outlets: connecting the view


    To clear up any confusion at this point, views and view controllers are not the
    same thing. The view controller owns the view. In MVC terms, the view controller
    is the controller and the view is, as you’d expect, the view!


    The view should have no knowledge of the view controller that owns it whereas,
    the view controller can have as much, or as little, knowledge of the view it owns
    as you deem necessary.


    In our blackjack app, we need to keep references to all the cards and buttons.
    We’re going to hide and show cards, and change the image associated with each
    card to simulate dealt hands. Keeping references to the `Hit` and `Stand` buttons
    enables us to switch user interactivity on and off. For example, we don’t want
    the player to be able to tap the `Hit` or `Stand` buttons when it’s the dealer’s
    turn.


    So, how do we connect up the view to its view controller?


    Well, first it will be helpful to see both the storyboard and `BJViewController`
    class simultaneously. Xcode makes this possible in a split editor pane. On the
    right-hand side of the Xcode toolbar, toggle the selected Editor option to select
    Assistant Editor. This should change the Editor layout to a split pane. If the
    right jump bar isn’t already set to `Automatic`, then select this option. Xcode
    should now automatically select the header file that defines the public interface
    of the `BJViewController` class (see [Figure 4-5](#Chapter04.html#fig_4_5)).


    You can also modify Xcode’s view layout and hide the Navigator, Inspector, and
    Debug areas via the View toggle buttons next to the Editor buttons.


    You should be left with a better workspace layout for connecting your view and
    view controller, as shown in [Figure 4-5](#Chapter04.html#fig_4_5).


    ![Image](images/9781430243748_Fig04-05.jpg)


    **Figure 4-5.** Ctrl+drag between view and view controller to create outlets and
    action connections


    Back to business: we want to create references in `BJViewController` to each of
    the card image views and `Hit` and `Stand` buttons in our view. To do this, we’re
    going to Ctrl+drag from each image view and button to the view controller interface,
    as shown in [Figure 4-5](#Chapter04.html#fig_4_5). It seems a little odd at first,
    but it’s pretty cool once you get used to the process. When you release the mouse,
    Xcode presents you with options to create an outlet in `BJViewController`. Assuming
    you’ve dragged from the first dealer card, name the outlet `dealerCard1` (see
    [Figure 4-6](#Chapter04.html#fig_4_6)). Ensure the Storage setting is set to `Weak`
    and click Connect.


    ![Image](images/9781430243748_Fig04-06.jpg)


    **Figure 4-6.** Ctrl+drag between view and view controller to create outlets and
    action connections


    Xcode automatically generates the following Objective-C code for our new outlet
    in the `BJViewController` header file:


    ```

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard1;

    ```


    Repeat this process for the remaining dealer card image views, naming the outlets
    `dealerCard1`, `dealerCard2`, and so forth. Then do the same for the player cards,
    again naming them `playerCard1`, `playerCard2`, and so on.


    Now create outlets to the `Stand` and `Hit` buttons, naming them `standButton`
    and `hitButton`, respectively. The generated code in `BJViewController.h` interface
    should end up as follows:


    ```

    #import <UIKit/UIKit.h>


    @interface BJViewController : UIViewController


    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard1;

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard2;

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard3;

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard4;

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard5;


    @property (weak, nonatomic) IBOutlet UIImageView *playerCard1;

    @property (weak, nonatomic) IBOutlet UIImageView *playerCard2;

    @property (weak, nonatomic) IBOutlet UIImageView *playerCard3;

    @property (weak, nonatomic) IBOutlet UIImageView *playerCard4;

    @property (weak, nonatomic) IBOutlet UIImageView *playerCard5;


    @property (weak, nonatomic) IBOutlet UIButton *standButton;

    @property (weak, nonatomic) IBOutlet UIButton *hitButton;


    @end

    ```


    #### Actions: Responding to controls


    We’ve created references to all the card image views and buttons, so we’ll now
    be able to access and control their attributes at runtime, in the code of our
    `BJViewController` implementation file: setting the image property and visibility
    of the image views, and enabling and disabling the buttons.


    Notice anything else we’ve missed? How will our view controller class capture
    button tap events?


    We only specify outlets in one direction between view controller and view. So
    the view has no knowledge of its owner view controller. Our view controller class
    needs to know when the user taps the `Stand` or `Hit` buttons.


    Buttons are controls. `UIButton` not only inherits from `UIView` but, like all
    other user interface controls in the iOS SDK, `UIButton` inherits directly from
    `UIControl`. Because Xcode recognizes instances of `UIButton` as subclasses of
    `UIControl`, it automatically offers us an additional connection type: `Action`.


    The Objective-C mechanism for handling user interaction events and passing them
    from user interface controls to methods of any Objective-C class type is called
    target-action. When a button is tapped, the tap event can be passed to a method.
    We’re going to create two new methods in our view controller that will be triggered
    in response to a `Touch Up Inside` event for either the `Hit` or `Stand` buttons.
    A `Touch Up Inside` event is triggered when the user touches a control and lifts
    up her finger on top of it. It’s the equivalent action of a mouseup event on a
    computer.


    Xcode can automatically generate target-action code using a similar Ctrl+drag
    process we implemented when creating outlets. Ctrl+drag from each button to the
    `BJViewController.h` interface but change the connection type to `Action`, ensure
    that `Touch Up Inside` is the selected event type, and repeat the process to create
    the following two action method handlers in your view controller interface header
    file (see [Figure 4-7](#Chapter04.html#fig_4_7)):


    ```

    - (IBAction)didTapStandButton:(id)sender;

    - (IBAction)didTapHitButton:(id)sender;

    ```


    ![Image](images/9781430243748_Fig04-07.jpg)


    **Figure 4-7.** Connecting actions from the button controls to `BJViewController`


    *Note: Xcode can also create outlets and actions by control-clicking views and
    then dragging outlets and actions from the contextual menu.*


    We’re done with the view for our basic blackjack game. We’ve learned the basics
    of adding and arranging labels, buttons, and image views to create a view using
    Xcode’s built-in UI layout tool. With storyboards, Xcode enables us to layout
    our app’s views and create connections between them. We’ll learn more about storyboarding
    tomorrow in [Chapters 5](#Chapter05.html#ch5) and [6](#Chapter06.html#ch6), but
    for now we’re going to move on to studying the basics of Objective-C classes,
    properties, methods, and object types.


    ### Objective-C basics


    Not only has Xcode autogenerated the outlet declarations in `BJViewController.h`
    header files, it’s also added code to the `BJViewController.m` source file.


    Sticking with the Assistant Editor layout, select `BJViewController.h` in the
    main left split pane so that we can examine both the header and implementation
    files for the view controller simultaneously (see [Figure 4-8](#Chapter04.html#fig_4_8)).
    There are a few ways to do this:


    > *   Using the left-side jump bar, navigate to `BJViewController.h`.

    > *   Revealing the navigator pane temporarily, select `BJViewController.h`, and
    then hide the navigator pane once more.


    ![Image](images/9781430243748_Fig04-08.jpg)


    **Figure 4-8.** Xcode has autogenerated Objective-C code for our outlet and action
    connections


    So what’s a header and source file? I’m glad you asked!'
