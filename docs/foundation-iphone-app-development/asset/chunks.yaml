    ## Chapter 7


    ## Table Views, Arrays, and Dictionaries—Oh My!


    Day 3 is data day! Up until now, we’ve focused on the user interface and navigation
    of our *Birthday Reminder* app. Today, we’re going to learn how to integrate data
    into our app.


    In this chapter, we’ll learn how to create and manipulate an array of dictionaries,
    and populate our app from the data. In [Chapter 8](#Chapter08.html#ch8), we’ll
    modify our data implementation to use a persistent storage solution using Apple’s
    Core Data framework.


    ### Table views


    Table views are a central component for many iPhone apps—and *Birthday Reminder*
    is no exception. Table views enable iPhone apps to display large amounts of content
    on a small screen device in a long scrollable list.


    [Figure 7-1](#Chapter07.html#fig_7_1) displays the final table view we’ll present
    on the home screen of our app—listing as many birthdays as the user has friends
    and relations! The user will also be able to pick any birthday in the list, and
    the app will navigate to display the details of the chosen birthday, sliding the
    table view off to the left and replacing it with the Birthday Detail view sliding
    in from the right.


    ![Image](images/9781430243748_Fig07-01.jpg)


    **Figure 7-1.** `UITableView`: a core component of the *Birthday Reminder* app


    The initial challenge we’re going to master is to load an array of celebrity birthdays
    from a local property list file in our project into a native array of birthday
    dictionaries. We’ll display the celebrity names, birthdays, and locally stored
    photos in a table view.


    From the assets folder included in the source code for this chapter, begin by
    importing the `birthdays.plist` file and the Celebrity Pics folder into the `resources`
    group of your Xcode project, as shown in [Figure 7-2](#Chapter07.html#fig_7_2).


    ![Image](images/9781430243748_Fig07-02.jpg)


    **Figure 7-2.** Celebrity pics and `birthdays.plist` resources added to our project


    Focus your storyboard on the Home view controller. Begin by deleting the Push
    Birthday Detail View Controller button. This automatically deletes the temporary
    segue from the Home view controller to the Birthday Detail view controller. Now
    drag a new table view instance (not to be confused with a table view controller
    instance) from the Object Library onto the home view (see [Figure 7-3](#Chapter07.html#fig_7_3)).
    The table view becomes a subview of our main home view (don’t replace your home
    view!).


    ![Image](images/9781430243748_Fig07-03.jpg)


    **Figure 7-3.** Adding a table view to our home view


    Select the new table view and use the attributes inspector to increment the Prototype
    Cells setting to 1, which adds a new prototype cell to the table view for us to
    work with (see [Figure 7-4](#Chapter07.html#fig_7_4)).


    ![Image](images/9781430243748_Fig07-04.jpg)


    **Figure 7-4.** Adding a prototype cell to the table view


    We can style our prototype cell from a list of table cell styles designed by Apple,
    or we can customize the prototype table view cell directly and add subviews, setting
    background colors, and so forth. We’ll learn about creating custom table view
    cells in [Chapter 9](#Chapter09.html#ch9); but for now, select the prototype cell
    and use the attributes inspector to change its style to Subtitle (see [Figure
    7-5](#Chapter07.html#fig_7_5)). The subtitle-style table cell provides a bold
    title and subtitle labels that we can set text for at runtime.


    Now enter a reuse identifier value into the Identifier text field of the attributes
    inspector. Enter `Cell` as the text (see [Figure 7-5](#Chapter07.html#fig_7_5)).


    ![Image](images/9781430243748_Fig07-05.jpg)


    **Figure 7-5.** Setting up a reusable prototype table cell


    Apple designed table views to be very optimized. The purpose of the reuse identifier
    is to enable instances of `UITableViewCell` to be reused for multiple table rows;
    for example, if your table is 416 points high and the height of each table cell
    is 100 pixels, then the table view only needs to generate five instances of `UITableViewCell`
    to display hundreds and hundreds of rows! If you don’t supply a reuse identifier,
    then each instance of a `UITableViewCell` generated for our table view will only
    be used once, and that could result in a very memory hungry app, not to mention
    the performance implications.


    You should be able to build and run your app at this point, although the table
    view will just show empty rows for the time being.'
  raw: '#### Tweaking image view rendering


    Depending on the dimensions of the photo you’re taking or selecting with the image
    picker, you may have noticed that the resulting image doesn’t retain its aspect
    ratio. Instead, it’s squashed or stretched to fit the image view bounds. When
    I first started learning iOS and came across this problem, my initial thoughts
    were to either resize and center the image view or to generate a new cropped image
    to fit the dimensions of the image view. It turns out that the solution is a great
    deal simpler than either of these approaches. `UIView` has a property called `contentMode`
    that determines how the content of the view is rendered. `contentMode` defaults
    to `UIViewContentModeScaleToFill`, that is, it simply stretches or squashes its
    drawn contents to the dimensions of its bounds. If we change the `contentMode`
    property value to `UIViewContentModeScaleAspectFill`, the aspect ratio of our
    image will be respected and the image will fill the bounds of the image view it’s
    being rendered into.


    Back in the storyboard, select the `photoView` image view. Using the attributes
    inspector change the Mode setting to Aspect Fill. Build and run. This time, you
    should find that your selected photo is now sized to fill the bounds of the image
    view without distorting the image. The only problem is that the overlapping sides
    or the top and bottom of the image are not getting cropped. Again, that’s an easy
    one to solve. Keeping the image view selected, in the attributes inspector you’ll
    find an attribute called Clip Subviews (`UIView.clipsToBounds`). Switch Clip Subviews
    on. Build and run. How about that? Nicely cropped and centered square thumbnails
    that match the bounds of our image view (see [Figure 6-22](#Chapter06.html#fig_6_22))!
    How easy was that?!


    *Note: At the moment, we’re filling a small thumbnail image view with a potentially
    very large photograph. At a later stage of development, we generate thumbnails
    from large images; otherwise, our app very quickly consumes a lot of memory from
    rendering, unnecessarily large images.*


    ![Image](images/9781430243748_Fig06-22.jpg)


    **Figure 6-22.** Bad, Better, Best!


    ### Summary


    You’ve reached the end of Day 2! Today has been all about building basic iOS user
    interfaces and navigation. You learned


    > *   How to build a navigation hierarchy of view controllers as scenes in a storyboard.

    > *   How to create view controller subclasses and assign them to view controllers
    in our storyboard.

    > *   How to connect our views and subviews with custom view controllers through
    Interface Builder outlets and actions.

    > *   How to understand the delegate pattern, to implement protocols in our view
    controllers, and respond to protocol method callbacks.

    > *   How to implement the native iPhone camera and Photo Library into our app.


    We’ve made a great start on the navigation and user interface, but we’ve not tackled
    data handling in iOS. Guess what we’re up to tomorrow? That’s right, *working
    with data*. Sleep well. ![Image](images/smile.jpg)


    ![Image](images/ch.jpg)


