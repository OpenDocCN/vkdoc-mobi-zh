- fmt: '### Getting Started


    Firing up `Xcode` for the first time presents you with a few initial options in
    a Welcome to Xcode window (see [Figure 3-1](#Chapter03.html#fig_3_1)).


    ![Image](images/9781430243748_Fig03-01.jpg)


    **Figure 3-1.** The Welcome to Xcode window


    You can reopen Xcode’s welcome window at any point via `Window > Welcome to Xcode`
    or with the `` 1 shortcut. The options available to you from the welcome window
    include:


    - **Create a new Xcode project**: This will be our starting point.

    - **Connect to a repository**: Xcode has built-in version control compatibility
    with Git and Subversion. If, like me, you prefer your coding IDE (integrated development
    environment) to mind its own business and stick to what it does best (coding),
    then that’s fine too. I don’t use this feature of Xcode. I prefer running Git
    via the command line. If you want to use Git or Subversion directly in Xcode,
    then go right ahead—although it’s beyond the scope of this book to delve further
    into it.

    - **Learn about Xcode**: This option opens the documentation section of the Organizer
    window. It’s worth taking an initial look at the About Xcode documentation. The
    first screen includes a diagram that highlights the section areas and panels of
    the Xcode workspace that we’ll be making use of throughout this book (see [Figure
    3-2](#Chapter03.html#fig_3_2)).

    - **Go to Apple’s developer portal**: A springboard hyperlink to the Apple Developer
    web site.


    Begin by selecting the third option, **Learn about Xcode**. You’ll enter Xcode’s
    documentation section within the Organizer. [Figure 3-2](#Chapter03.html#fig_3_2)
    is a screenshot taken from the first page of documentation. It’s worth taking
    an initial look at the various IDE panels for each section of Xcode’s user interface.
    I’ll make references to them throughout the remainder of the book.


    ![Image](images/9781430243748_Fig03-02.jpg)


    **Figure 3-2.**: A breakdown of the IDE from Xcode’s documentation


    Note the Navigation area on the left; this is where you’ll typically access any
    file in your project’s hierarchy via the Project Navigator pane. The Editor area
    in the center is where you’ll work on writing class code files or creating user
    interfaces with a Storyboard file. The right side of the IDE is known as the Utility
    area; it consists of the Inspector and Library panes. Here’s where you’ll use
    the attributes inspector to modify selected object attributes when working with
    storyboards or defining the UML (Unified Modeling Language) of your Core Data
    entities, for example. The pane at the bottom of the IDE is the Debug area, where
    logs and errors are printed to the console during the debug sessions for your
    apps.


    Let’s create a new project! From the menu, select `File > New > Project` or use
    the `` N shortcut. Xcode will now present you with a range of project templates
    to choose from as a starting point (see [Figure 3-3](#Chapter03.html#fig_3_3)).


    For some projects, certain templates will save you development time. The **Master-Detail**
    template, for example, generates a project with a navigation controller and an
    embedded root view controller—and you’re good to go.


    ![Image](images/9781430243748_Fig03-03.jpg)


    **Figure 3-3.** Choosing a starting project template


    Call me anal-retentive (well, go on then!), but I like to keep as much control
    of the code in my apps as I can. Some of these Xcode templates—especially the
    ones that include a Core Data model—inject a lot of initial code into your project.
    You can clean this up after your project generates. For our project, however,
    I’d like you to choose one of the simplest templates: the **Single View Application**.


    Xcode will now ask you to fill in a few additional options for our new project
    (see [Figure 3-4](#Chapter03.html#fig_3_4)).


    ![Image](images/9781430243748_Fig03-04.jpg)


    **Figure 3-4.** Setting up project options for *Birthday Reminder* dynamically
    generates a bundle identifier for our app.


    - **Product Name**: Enter `BirthdayReminder` (case sensitive with no spaces).
    We need this to match the last section of our app bundle identifier embedded in
    our development provisioning profile (this was set up in [Chapter 2](#Chapter02.html#ch2)).

    - **Organization Name**: Xcode prepopulates any new class file with details about
    the author/company, set here in the comments above the code. If I put “Nick Kuh”
    in this field, then each new class I create in my project will include Copyright
    (c) Nick Kuh in its header comments. For your project, enter either your name
    or company name.

    - **Company Identifier**: You’ll need to enter the same reverse domain path you
    used for your provisioning profile in [Chapter 2](#Chapter02.html#ch2): `[com/co.uk/etc].[your_domainname]`.

    - **Class Prefix**: Enter `BR`, short for *Birthday Reminder*. You’ll discover
    that most third-party Objective-C code libraries prefix their classes with two
    or three initials. With my own reusable class libraries, I use `NK` (Nick Kuh).
    For project-specific classes that you don’t intend to reuse outside of your project,
    use a suitable prefix. Class prefixing is not compulsory, but it’s worth implementing
    now as a good practice.


    You’ll also be able to specify whether the app you’re building targets iPhone,
    iPad, or is a universal app: a single app with two user interfaces—one for iPhone
    and one for iPad. For our project, we’re iPhone only.


    Finally, ensure that **Storyboarding** and **ARC** (Automatic Reference Counting)
    are selected. Then we’re good to go.


    On the following screen, choose a location on your hard drive to save the new
    *Birthday Reminder* project. Deselect the **Create Local Git Repository** option
    unless you want Xcode to initiate a Git source control repository for you.


    ### Breaking Down the Project Structure


    Because we chose the **Single View Application** project template, Xcode has automatically
    added a storyboard to our project containing a single view. As I mentioned in
    [Chapter 1](#Chapter01.html#ch1), each of the main views in an app should always
    be controlled by a view controller class. Xcode has generated `BRViewController`
    to control the single view in the current project.


    By default, the left navigator panel of Xcode displays the Project Navigator.
    The Project Navigator lists all the files, groups, and frameworks included in
    our project (see [Figure 3-5](#Chapter03.html#fig_3_5)).


    *Note: Selecting files within the Project Navigator displays the file in Xcode’s
    Editor area.*


    When iOS attempts to load our *Birthday Reminder* app, it expects to find an Objective-C
    file titled `main.m` as its entry point. There should be no need for you to modify
    `main.m` for this app or any other, so please don’t touch this file further!


    What you will notice is that `main.m` references the `BRAppDelegate` class. `main.m`
    includes a single function that generates a single instance of our Application
    Delegate class when iOS launches our app.


    ![Image](images/9781430243748_Fig03-05.jpg)


    **Figure 3-5.** The initial generated project structure'
