    ## 关于作者


    ![Image](img/fm-1.jpg)


    `Nick Kuh` 是一位常驻英国的 iOS 顾问和开发者，拥有 14 年为 BBC、ESPN、Channel 4、Pearson 和 Novartis
    等客户开发移动、桌面和网络应用的经验。他既参与大型商业 iOS 项目，也帮助初创公司在 App Store 上发布应用。


    Nick 在商业工作之余，还开发了自己成功的独立应用，例如 *Tap to Chat*、*Poker Royale* 和 *Portfolio Pro*。


    你可以在 Twitter 上通过 @nickkuh 找到 Nick，或访问他的网站 [www.nickkuh.com](http://www.nickkuh.com)。


    ## 关于技术审校


    ![Image](img/fm-2.jpg)


    `Felipe Laso Marsetti` 是一位自学成才的软件开发者，专攻 iOS 开发，目前受雇于 Lextech Global Services 担任系统工程师。尽管他职业生涯中使用过多种语言，但没有什么比在
    iPhone 和 iPad 项目上工作更让他开心。Felipe 拥有超过 2 年的专业 iOS 开发经验。他喜欢在 [`iFe.li`](http://iFe.li)
    上写博客，作为 [`www.raywenderlich.com`](http://www.raywenderlich.com) 的成员制作 iOS 教程和文章，或担任
    Objective-C 及 iOS 相关书籍的技术审校。你可以在 Twitter 上通过 @Airjordan12345 找到 Felipe，在 Facebook
    上通过他的姓名找到他，或在 App.net 上通过 @iFeli 找到他。当不工作或不编程时，Felipe 喜欢阅读、学习新语言和技术、观看体育比赛、烹饪或弹吉他和拉小提琴。


    ## 关于封面图片作者


    ![Image](img/fm-3.jpg)


    `Corné van Dooren` 设计了本书的封面图片。在暂时离开 friends of ED 为基础系列设计新封面后，他致力于将技术形态与有机形态相结合，其成果现在出现在本书及其他书籍的封面上。


    Corné 的童年是在随手可得的东西上涂鸦中度过的，随后他开始探索多媒体的无限世界——而他的发现之旅自此从未停止。他的座右铭始终是“多媒体的唯一限制是想象力”，这句话不断推动他前进。


    Corné 为众多国际客户工作，为多媒体杂志撰写特稿、评测和测试软件、编写多媒体研究文章，并参与许多其他 friends of ED 的图书项目。如果你喜欢
    Corné 的作品，一定要看看他在《New Masters of Photoshop: Volume 2》（friends of ED，2004）中的章节。你可以在他的网站
    [www.cornevandooren.com](http://www.cornevandooren.com) 上看到他的更多作品（并联系他）。


    ## 引言


    我的编程根源始于 1999 年的 Flash，当时我开始用 ActionScript 编写面向对象的游戏和应用。后来在 2009 年，Apple 推出 App
    Store 并向第三方开放其激动人心的新移动平台后不久，我决定转行成为一名 iPhone 开发者。


    从 Flash Player 开发过渡到 iPhone 开发并非一帆风顺，但对我帮助最大的一个关键因素是：Flash 面向对象编程的相同基础原则，也正是 Objective-C
    和 iOS SDK 的核心。


    如果你已经在使用另一种面向对象语言，那么你应该能够将这些知识应用到 Objective-C 中，并很快上手为 iPhone 构建应用。'
- fmt: '#### Who should buy this book


    Are you a Flash or Java Developer? PHP or Ruby Programmer? You’re already proficient
    in at least one other object-oriented programming language and want to extend
    you skillset to include the hugely popular iOS platform. This book is for you.


    Or perhaps you’re a beginner iPhone Developer. You’ve already worked through many
    of the code examples that other books provide. You’re now looking to learn how
    to build a larger scale app and pooling together knowledge you’ve gained from
    working through these example code snippets isn’t at all obvious.


    If you’re completely new to programming then you may find this book quite challenging.
    However, I’ve always found that getting stuck in, even at the deep-end, is often
    a great way to face new challenges. If you’re a newbie but also a fast learner
    then welcome aboard! I’ll keep you in mind during our journey.


    My book will help you to conquer the challenges of getting up-and-running with
    `Objective-C`. I will help you to effectively exploit your knowledge of object-oriented
    programming to code great iOS Apps. Don’t worry if your object-oriented code is
    a bit patchy though. Throughout this book I will regularly highlight how iOS applies
    the Model View Controller (`MVC`) paradigm.


    I’ll get your hands dirty with `Xcode` from the off. This is going to be a very
    hands-on book. After all, we’ve only got 5 days to build an app!


    You can even download the app we’ll be developing right now as it’s live in the
    App Store under the title `*Birthday Reminder for Facebook*`.


    #### What this book with teach you


    Other books will provide you with chapter after chapter of code examples for the
    various frameworks in the iOS SDK but when it comes to building your app you’ll
    then need to figure out how best to combine those concepts together.


    This book employs a very different method to learning. I will teach you how to
    build a professional, custom-designed, object-oriented iPhone App in just 5 days.


    We’ll start with a Photoshop PSD design and an app idea. Then, throughout the
    remainder of the book, I will guide you through each stage of building this app.
    But it’s *you* who will build the app. You will learn how to think like an app
    developer, how to turn an idea into a beautiful iPhone app and a great number
    of tips and tricks along the way.


    You’ll learn a development process that I’ve devised over the last 3+ years that
    you will be able to apply to your own apps after completing the course.


    The App that you’ll be developing is quite simple on the surface, but the development
    principals it introduces are equally suitable for the development of larger, more
    complex apps.


    Over time I’ve discovered there are often many different ways to solve the programmatic
    challenges that one faces on a daily basis when building iOS apps. Challenges
    like:


    *   The best way to load remote images into a scrolling table view that won’t
    lock up the user interface and keep the app optimized.

    *   How to persistently store user data such as text and images and facilitate
    the user to edit and change that data, or cancel their changes.

    *   How to implement a custom app design without having to build custom iOS view
    components.


    This book will address these kinds of challenges with solutions that I make use
    of in my own commercial projects. Solutions that will save you days, months, even
    years of invested time!


    The process I’ll exercise to teach you the skill of programming iOS Apps will
    be a step-by-step process. We are going to build an App from conception to completion.
    *You* are going to build this app! Along the way you’ll learn:


    *   How to capitalize on making your beautiful app design resonate thanks to Apple’s
    high resolution retina displays on all the new iPhone and iPod Touch devices

    *   How to map out/mock-up all the views of your app very quickly using Storyboards
    in `Xcode` and iOS 6

    *   How to build view controllers with object-oriented inheritance – centralizing
    core, reusable methods. Less code. Fewer bugs. Easier to make future changes.

    *   How Core Data will solve all of your app’s data persistence needs. Although,
    this is quite an advanced topic I’ll provide you with an easy-to-follow introduction
    to Core Data that will form the foundation for more complex projects. Stay friends
    with Core Data. It’s worth it ![Image](images/smile.jpg)

    *   How to deeply integrate Facebook’s Graph API using the very latest Social
    framework introduced by Apple in iOS 6.

    *   How to take advantage of in-app social network marketing – get your users
    promoting your great app to their friends!


    There’s a lot to cover here!


    #### What this book won’t teach you


    This is not a reference book for the iOS SDK. I won’t be providing examples of
    every iOS framework. There are many other great books that do this already.


    ![Image](images/ch.jpg)


    ## Day 1


    ## Objective C, Xcode and iOS SDK Foundation Work


    ![Image](images/ch.jpg)


    ## Chapter 1


    ## Designing and Planning Our App


    Author: Throughout the course of this book, you will build an app from conception
    to completion!


    You: Yes, Sensei!


    Author: I expect you to build this app yourself. That’s the only way you’re going
    to learn!


    You: Yes, Sensei!


    OK, enough of `*The Karate Kid*` references (well, there may be a few more along
    the way ![Image](images/smile.jpg)). The point I’m making is that via a step-by-step,
    chapter-by-chapter process, I will be your tutor—but *you* will have to put in
    the donkeywork. You are expected to write every line of code for this app. You
    are expected to create every class and view in this app.


    I will provide you with all the design assets for this project. I’ve even cut
    them up into the actual image assets that you’ll embed into your own app.


    If you want to really challenge yourself, don’t even look at the staged source
    code—throw it away! Just work with the exported image asset files and write all
    the code yourself.


    I will also provide the start and finish source code for each chapter of your
    app development journey. So if you ever get stuck or want to jump ahead to a specific
    section of the app, go right ahead. How’s the Sensei going to find out anyway?


    Throughout this chapter, we’ll focus on the initial planning and design stage
    of building a new iPhone app: how to get started once you have your app idea,
    a look at the competition for your app, and a number of tips and tricks to help
    your app stand out from the hundreds of thousands of apps in Apple’s App Store.


    ### The app idea


    We’ve all forgotten a birthday before, right?


    The app you’re going to build is a birthday reminder app. `*Birthday Reminder*`
    will ensure that our users never forget a birthday again! It’s a simple but useful
    idea and just the sort of thing that makes for a good iPhone app idea.


    With `*Birthday Reminder*`, all of your friends’ and family members’ birthdays
    are stored in one place. You’ll get a notification reminder on the day of or in
    advance of every birthday. No more embarrassing late cards and presents. Our app
    will solve this core problem for our users. It’s a single task that the app will
    do seamlessly—making the user’s life a little easier.


    A common misconception by some app developers is to think that adding more features
    to their app will increase its popularity and App Store ranking. Instead, keep
    your app ideas simple—and deliver a beautiful, intuitive user experience. Focus
    on doing one thing really well with your app rather than doing ten things badly.


    This app is going to stand out from the competition. Its icons and user interface
    are going to be so beautiful, it’s going to make you want to lick your iPhone!
    The user experience is going to be instantly intuitive to new users. The app will
    also be zippy and responsive to touch—just what iOS users have come to expect
    from great iPhone and iPad apps!'
