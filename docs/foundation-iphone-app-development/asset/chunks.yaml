    \            // 完成处理程序可能不在主线程中触发，由于我们要\n            NSLog(@\"Facebook 授权成功！\"\
    );\n            NSArray *accounts = [accountStore accountsWithAccountType:accountTypeFacebook];\n\
    \            self.facebookAccount = [accounts lastObject];\n```\n"
