    # 纸上原型：从设计开始


    我强烈建议在编写任何代码之前先完成应用的设计。我总是从铅笔和纸开始，勾勒出用户界面的每一个视图。这种方法应该能为应用中的每个视图生成一个经过深思熟虑的优秀设计布局，并降低未来代码重构的风险。


    通常，我会为应用的每个视图绘制多个迭代版本，直到对布局满意为止。然后我会拍下结果，通过电子邮件发送给我的设计师，并附上详细说明，让他们在 Photoshop
    中制作最终设计稿。设计师随后会为应用的每个视图创建 640×960 像素的视网膜屏幕就绪 PSD 文件。


    在与客户合作时，坚持要求在开始编写他们的应用代码之前，设计方案必须获得批准。客户常常会抗拒这一要求，声称他们的应用是一个进行中的工作，因此设计可能随时更改。这其实只是他们规划不周的表现。


    通过在编写代码前花时间勾勒出每个屏幕的设计，你的客户将为你节省大量浪费的开发时间——从而也节省了浪费的预算。如果他们在良好的规划上投入，他们就能省下钱！


    令人惊讶的是，有多少潜在的 UI 设计问题可以在纸上解决。这种在编码前勾勒屏幕的过程也被称为*纸上原型*。它使个人和团队能够检查每个屏幕，并讨论一种布局相对于另一种布局的影响。


    设计一个直观且吸引人的 UI 是一个本书会经常参考的过程，但如果你希望在这个阶段深入探索，那么还有谁比 UI 设计大师本人——苹果公司——更适合学习呢？


    让我向你介绍 HIG——苹果的人机界面指南，你可以在苹果开发者网站上随意阅读，网址是 [`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html)。


    HIG 非常清晰地引导你了解 iOS 应用优秀 UI 设计的各个方面。从按钮的最小点击区域（44×44 点）到每一种手指手势（点击、滑动、轻扫等），以及用户期望你的应用如何做出响应。


    人们对应用和操作系统在智能手机上的功能变得非常熟悉。出乎意料的 UI 行为会导致用户不满。让他们满意并享受使用我们的应用并不那么困难。HIG 为你提供了做到这一点所需的一切。


    # 应用设计逐一讲解


    为了让你们熟悉 iOS SDK 的术语，我会将我们应用中的每个屏幕称为*视图*。我将在第 3 章中进一步深入探讨视图和视图控制器的细节，但在早期阶段认识到我们应用中的每个屏幕都是一个视图是很好的。


    在 iOS 中，我们的每个主视图都有一个对应的视图控制器类。


    这是我们首次接触到苹果在 iOS SDK 中实现 Model-View-Controller (MVC) 范式。如果你已经开始感到困惑，别担心。我将在第 4
    章、第 5 章和第 6 章中进一步详细阐述视图、视图控制器以及 iOS 中的 MVC。


    *生日提醒* 将包含以下主视图（每个视图由各自的视图控制器控制）：


    > * 主视图（生日列表）

    > * 生日详情视图

    > * 生日备注视图

    > * 添加或编辑生日视图

    > * 从通讯录导入视图

    > * 从 Facebook 导入视图

    > * 设置视图及其子视图


    ## 主视图


    当我们的应用首次启动时，它将是一个空数据库。没有任何生日可以显示。因此，与其显示一个空的生日列表，我们将隐藏表格视图，并渲染两个大的行动号召按钮，以鼓励用户开始从他们的通讯录和
    Facebook 导入生日（参见图 1-4a）。


    只要应用中添加了一个或多个生日，我们就会显示填充了生日的表格视图。我们仍然会为用户提供访问通讯录和 Facebook 导入按钮的便捷途径，但它们在屏幕设计中的重要性会降低（参见图
    1-4b）。


    ![图片](img/9781430243748_Fig01-04.jpg)


    **图 1-4.** (**a**) 首次启动时的主视图 (**b**) 填充了生日的主视图


    我们的主视图（图 1-4a 和 1-4b）包含了 iOS SDK 中的标准控件组件：导航栏（`UINavigationBar`）、标签（`UILabel`）、按钮（`UIButton`）、表格视图（`UITableView`）、表格视图单元格（`UITableViewCell`）、图像视图（`UIImageView`）、工具栏（`UIToolbar`）以及栏按钮项（`UIBarButtonItem`）。这些不是定制的组件。然而，你会注意到的是，我们可以在多大程度上重新“换肤”这些标准组件，以打造一个美观的
    UI 设计。


    在 iOS 5 中，苹果引入了外观 API，并且在 iOS 6 中继续发展。这些 API 使得为苹果的 UI 组件换肤比以往版本的 iOS SDK 容易得多。*生日提醒*将充分利用这些功能。


    使用生日蛋糕作为我们图标的设计概念也在应用的主视图中随处可见，例如主视图和导入生日视图，其中每个生日都被表示为一个蛋糕层。这些蛋糕层中的每一个都将由我们应用中定制设计的表格单元格（`UITableViewCell`）来渲染。


    在 iPhone 应用中，应用导航通常通过一种特殊类型的视图控制器来控制：一种管理多个子视图控制器的视图控制器。这些父视图控制器的主要例子是导航控制器（`UINavigationController`）和标签栏控制器（`UITabBarController`），它们以适用于小屏幕设备的方式管理子视图和视图控制器的流程。


    我们主视图顶部的导航栏由应用的主导航控制器拥有。当填充了生日后，主视图会显示一个包含多个表格单元格的表格视图，以呈现每个生日的详细信息。


    当用户点击表格视图中列出的某个生日时，我们的应用将响应点击手势，并创建生日详情视图的一个实例。生日详情视图将被“推入”主导航控制器。导航控制器将动画变换当前的主视图，将其滑向左侧，同时将新的详情视图从右侧滑入。毫无疑问，你在日常使用的许多
    iPhone 应用中都见过这种行为。

    '
- fmt: '### The birthday detail view


    At the point that the home view controller creates the birthday detail view controller
    and view, it will also pass data (birthday data) to the birthday detail view controller.
    The birthday detail view controller will dynamically update its view to display
    the user details and any birthday notes saved for this entry in the database.


    `Birthday Reminder` will need to aggregate three types of birthdays, but it will
    display them all in the same detail view:


    > - Birthdays imported from the iPhone Address Book

    > - Birthdays imported from Facebook

    > - Birthdays added manually to the app


    ![Image](images/9781430243748_Fig01-05.jpg)


    **Figure 1-5.** (a) Birthday detail view displaying a Facebook import (b) Birthday
    detail view displaying an Address Book import


    If the displayed birthday is an import from Facebook, then `Birthday Reminder`
    will enable the user to post a birthday message to the friend’s Facebook Wall
    directly inside our app using Apple’s social framework and Facebook’s Graph API.


    If this birthday was imported from the user’s iPhone contacts, then our app will
    also be able to access the telephone number and e-mail associated with the contact.
    Adding direct links to enable our user to SMS, call, or e-mail birthday greetings
    to a friend is a great way to make the most of the native access our app has been
    granted to the user’s Address Book.


    ### Editing birthdays and adding notes: going modal


    The birthday data in our app will remain editable. So we’re going to include an
    Edit button in the navigation bar when the user is viewing the birthday detail
    view. When tapped, our app will present an editable version of the current birthday
    details, and the user will be able to make changes (see [Figure 1-6](#Chapter01.html#fig_1_6)a).


    Do you see the note-taking icon under the birthday image on the screens shown
    in [Figure 1-5](#Chapter01.html#fig_1_5)? When the user taps on the pencil, the
    birthday detail view controller will respond to this gesture by presenting our
    note-taking view (see [Figure 1-6](#Chapter01.html#fig_1_6)b).


    ![Image](images/9781430243748_Fig01-06.jpg)


    **Figure 1-6.** (a) Add/edit birthday detail view (b) Edit birthday notes view


    Both of these choices enable the user to *edit* the data he is currently viewing
    in our app. We need to make this very clear to our user. We do this by presenting
    these editing views modally. Again, it’s our parent navigation controller that
    animates in the modal view(s) from the bottom of the iPhone screen. The user will
    be presented with Cancel and Save options: two very clear choices for them to
    manipulate the data model.


    We’re going to use Apple’s Core Data framework for all of the local data persistence
    in our app. This has a number of advantages, such as making any birthday editable
    directly in our app—regardless of whether it was added manually or imported from
    the user’s Address Book or Facebook.


    Core Data is an Apple framework for object graph management and data persistence.
    The default backing store used by Core Data is an SQLite database, but there are
    alternative storage options. Although Core Data is generally considered an advanced
    topic, I’ll introduce you to the basics of adding object, text, and binary data
    persistence into your apps; in our case, simply by being able to save and edit
    birthdays between sessions (see [Chapter 8](#Chapter08.html#ch8)).


    ### Native Facebook integration


    Because `Birthday Reminder` will keep its own store of birthday data, we will
    enable users to pick and choose the friends they wish to import into the app from
    Facebook (see [Figure 1-7](#Chapter01.html#fig_1_7)b), and then save the birthday
    data, friend names, and profile icon URLs locally into our Core Data store.


    ![Image](images/9781430243748_Fig01-07.jpg)


    **Figure 1-7.** (a) Handling Facebook authorization (b) Preparing to import birthdays
    from Facebook


    Prior to iOS 6, Facebook enabled and encouraged iOS developers to integrate social
    features into iOS apps. In iOS 6, Apple has now partnered with Facebook to include
    Facebook’s Single Sign-On mechanism directly into the iOS platform.


    In iOS 6, Apple has tightened up data privacy to ensure that users need to opt-in
    when either sharing data from Facebook or their Address Book. We’ll learn how
    to handle the authorization flow (see [Figure 1-7](#Chapter01.html#fig_1_7)a).


    The Import from Address Book View will look identical to the Import from Facebook
    View, with multiple selection and select all/none shortcut buttons. These import
    views will be presented modally in our app. When a user taps a button to import
    from a list of Facebook friends or Address Book contacts, they will be making
    direct changes to the data model by adding new birthdays to the store. It makes
    sense to present these import views modally and include the option for the user
    to cancel their import action.


    ### Settings views


    `Birthday Reminder` will fire local iOS notifications for every birthday stored
    in its data model prior to or on the date of each stored birthday. Via our Settings
    views, we’ll allow our app users to set when they want to get their reminder alerts
    (see [Figures 1-8a](#Chapter01.html#fig_1_8), [b](#Chapter01.html#fig_1_8), and
    [c](#Chapter01.html#fig_1_8)).


    ![Image](images/9781430243748_Fig01-08.jpg)


    **Figure 1-8.** (a) Main Settings view (b) Days Before settings view (c) Alert
    Time settings view


    Settings views are also a good place to add promotional links. Goad your user
    to add a nice App Store review. Increase your Facebook likes and enable users
    to share your app by e-mail, Twitter, or Facebook. You’ve done all the hard work
    of getting your app into the hands of your users, don’t miss out on a perfect
    opportunity to increase the popularity ranking of your app in the App Store and
    to take advantage of marketing on social networks!'
