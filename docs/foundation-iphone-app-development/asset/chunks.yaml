    all the methods of the `UIAlertViewDelegate` are optional. So the compiler won’t
    generate any warnings about our code, even though we haven’t added any `UIAlertViewDelegate`
    protocol methods yet.


    *Note: When a class declares that it implements a protocol that includes mandatory
    methods, the compiler will display a warning if your class doesn’t actually implement
    those methods.*


    Now back to the source file for `BJViewController`. We need to make a small change
    to the code that displays the alert in the `handleNotificationGameDidEnd:` method:


    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Game Over" message:message`

    `delegate:`**`self`** `cancelButtonTitle:nil otherButtonTitles:@"Play Again",
    nil];`

    `[alert show]`


    Notice how we’ve now set ourselves as the delegate of the alert view?


    Finally, we’re going to add one of the `UIAlertViewDelegate` methods to our implementation
    of `BJViewController`:


    `- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex`

    `{`

    `    [self restartGame];`

    `}`


    *Tip: When adding delegate methods, a quick way to implement the method code is
    to copy it directly from the Organizer’s documentation and paste it into your
    class.*


