- fmt: '#### Exporting design image assets


    Now that we’re 100 percent happy with our design PSD (well, I’m going to assume
    you’re happy!), we can start to break apart and export the icons and background
    images that will be part of our Xcode project.


    Throughout the remainder of the book, I’ll provide you with the exported PNG image
    assets when they are required for each chapter and stage of our project.


    Within the [Chapter 1](#Chapter01.html#ch1) source design/code, you’ll also find
    seven Photoshop PSD files for the retina designs of the main views in our app.
    The inclusion of these design files gives you a good starting point for what you
    should expect when commissioning a designer for your own projects.


    After completing this book and as you start building your own apps, you will need
    to go through the process of creating asset PNGs and JPGs for yourself. You won’t
    always be able to predict the best way to slice up your design PSD. It’s a process
    that I often action during development when I need an asset for the view I’m working
    on.


    We’re going to create an app that is optimized for retina displays. With four
    times as many pixels on a retina display to non-retina, all of our retina-optimized
    images will look smooth and crisp on the user’s iPhone.


    The trick is to create two versions of every icon and background image: (1) one
    for non-retina and (2) one twice the non-retina size and of a higher quality for
    retina screens.


    The iOS SDK will automatically detect retina-ready imagery as long as you adhere
    to the following naming convention:


    Standard: `my-image.png`


    Retina: `my-image@2x.png`


    In this example, if `my-image.png` is 150×100 pixels in size, then `my-image@2x.png`
    is 300×200 pixels in size and automatically used by retina devices instead of
    the standard image, making the most of all additional pixels.


    Assuming this example image is not stretchable, then the dimensions of the image
    view that is rendering this image on screen is 150×100 *points*.


    In the source code for this chapter, you’ll find that I’ve provided a couple of
    example exported PNG assets: `navigation-bar-background.png` (320×60 pixels) and
    `navigation-bar-background@2x.png` (640×120 pixels). Older non-retina devices
    like the iPhone 3G iOS display the `navigation-bar-background.png` version of
    the image. On the newer retina devices, `navigation-bar-background@2x.png` is
    automatically used by iOS, resulting in a much crisper and less pixelated version
    of the image, but still displayed within the 320×60 point rectangle.


    The PSDs for our *Birthday Reminder* app have all been designed for the dimensions
    of a retina screen—640×960 pixels. So in exporting each asset, I initially exported
    all of the retina assets using the `[filename]@2x.[fileformat]` naming convention.
    Then, I flattened and downsized each exported image to half its retina size, and
    exported the smaller versions without the `@2x` for the older non-retina screens.


    *Tip: Make sure that your retina assets are an even pixel width and height so
    that when you downsize them by half, the resulting size is a full pixel width
    and height.*


    ### A little extra help


    Throughout this book, I guide and assist you at every stage of the journey. After
    the course, however, when you start your own app development journey, you will
    probably encounter occasional roadblocks. We all do.


    Perhaps you won’t be able to figure out how to make a certain framework work,
    or you struggle with provisioning for an App Store submission. Whatever the problem,
    you’re unlikely to be the first to experience it. Help is at hand!


    Apple’s own documentation is extensive—you can browse through the docs online
    via the iOS Developer Center. Alternatively, Xcode enables you to jump straight
    to the specific class, framework, or method that you’re struggling with via the
    `^?` keyboard shortcut.


    When you come up against specific bugs in your iOS code, there are some very handy
    reference web sites and blogs to turn to. Stack Overflow (`stackoverflow.com`)
    is by far my favorite. It is a geeks’ question/answer site for all programming
    languages. Other geeks vote on the best answers to each technical question posted.
    If you come up against a problem, you can bet that someone on Stack Overflow has
    already provided the answer.


    In addition, the Apple Developer Forum on the iOS Developer Center is another
    great resource for developers to post and search for answers to iOS specific questions.
    Some questions are even answered by Apple’s own engineers—answers straight from
    the source!


    ### Summary


    We now know what we’re going to build. We’ve planned all the screens of our app.


    We’ve learned that the best way to start making an app is to sketch out your views
    with a pencil and pad; work out the best user experience and user interface design
    on paper; and resolve design challenges before getting into the code. This is
    the most robust way to build an app and keep future refactoring to an absolute
    minimum.


    But we haven’t yet touched Xcode or written any code yet. Unfortunately, we still
    have a few more core tasks to do before we can start coding.


    Let’s move on to registering as an Apple developer and provisioning our app for
    device testing!


    ![Image](images/ch.jpg)


    ## Chapter 2


    ## Provisioning Our App for Development


    For some, this will be the slow-going chapter. It covers all of the tasks that
    we need to do before we can really get started developing our app. These tasks
    are kind of dull, but you won’t get very far until they’re complete.


    The process of becoming a fully paid and enrolled member of the iOS Developer
    Program is a bit of an uphill battle, but once you’re through it, you’ll be able
    to build and submit as many apps to the App Store as you have the time to make!


    Once you’ve completed enrollment in the iOS Developer Program, then you’ll be
    able to return to this chapter and we’ll explore the iOS Provisioning Portal in
    detail. We’ll also go through the step-by-step process necessary to prepare your
    own provisioning environment for on-device testing of your apps.


    ### Download Xcode for free


    To start developing apps, we only need one piece of Apple software: Xcode (see
    [Figure 2-1](#Chapter02.html#fig_2_1)).


    ![Image](images/9781430243748_Fig02-01.jpg)


    **Figure 2-1.** Xcode: Apple’s developer tool for creating Mac and iOS applications


    Xcode is distributed by Apple for free via the Mac App Store. The first thing
    to do is open the App Store on your Mac, and then download and install Xcode straight
    from the store. You’ll need to be working on an Intel-based Mac running Lion or
    Mountain Lion to install Xcode 4.5 (or greater). While Xcode downloads and installs
    in the background, you can just keep reading.


    Here’s a direct link to Xcode in the US Mac App Store:


    [`http://itunes.apple.com/us/app/xcode/id448457090?mt=12`](http://itunes.apple.com/us/app/xcode/id448457090?mt=12)


    When Apple shipped Xcode 4.1, the original download size was a whopping 4GB! There
    were a lot of impatient developers out there hogging up their Internet connection
    for hours—or even days—at a time while the mighty Xcode downloaded. The install
    process also used to be more cumbersome: Apple distributed an installer rather
    than an app via the store, and once downloaded, developers then had to step through
    a secondary install process. The installer added files and folders to the Developer
    directory of your hard drive alongside numerous separate developer tools like
    Instruments and Application Loader.


    Xcode 4.5+ is less than a 100MB download and is distributed as a single application
    that automatically installs when the short download-time completes. Debug tools
    like Instruments are now packaged inside the Xcode application bundle. Various
    versions of the iOS simulator are downloaded in the background as required (for
    example, if your app needs to support iOS 4 or 5, Apple provides iOS simulators
    to enable you to run and check your app in older versions of iOS).'
