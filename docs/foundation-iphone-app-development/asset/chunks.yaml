- fmt: "With the Home view controller scene selected in your storyboard, create a\
    \ new Interface Builder outlet from the `BRHomeViewController.h` header file to\
    \ the table view and name it `tableView`.\n\n`BRHomeViewController.h` should now\
    \ look like the following:\n\n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\
    \n\n@interface BRHomeViewController : BRCoreViewController\n\n-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue\
    \ *)segue;\n@property (weak, nonatomic) IBOutlet UITableView *tableView;\n\n@end\n\
    ```\n\n### Table data source and delegate protocols\n\nIn Chapter 4, we first\
    \ looked at the alert view component (`UIAlertView`) and learned that we need\
    \ our view controller to subscribe as its delegate in order to catch Alert button\
    \ click events. The same delegate pattern applies when working with table views,\
    \ only a table view has two types of delegates: one for the controller and one\
    \ for the data model.\n\nWe’re going to set the view controller of the table view\
    \ to be both the data source and the delegate. To do this, we have to indicate\
    \ in the `BRHomeViewController.h` header that this class will adhere to both the\
    \ `UITableViewDataSource` and `UITableViewDelegate` protocols. Modify your header\
    \ by adding the delegate and data source implementation declaration:\n\n`@interface\
    \ BRHomeViewController : BRCoreViewController <UITableViewDelegate, UITableViewDataSource>`\n\
    \nNext, we need to assign the delegate and the `dataSource` outlets of the table\
    \ view to `BRBirthdayTableViewController`. We’ll do this via the storyboard: Control-drag\
    \ from the table view to the view controller object in the bar beneath the view,\
    \ and you’ll be prompted to select the `dataSource` or delegate properties. Assign\
    \ both to the Home view controller (see the following figure).\n\n![Image](images/9781430243748_Fig07-06.jpg)\n\
    \n**Figure 7-6.** Setting the `dataSource` and delegate of the table view to `BRHomeViewController`\n\
    \nThe assigned `dataSource` object of a table view must implement the `UITableViewDataSource`\
    \ protocol. When the table view loads, it requests from its `dataSource` the number\
    \ of table sections and number of rows in each section. The designated `dataSource`\
    \ object also generates instances of `UITableViewCell` in response to requests\
    \ from the table view. The `UITableViewDataSource` protocol has two required method\
    \ signatures that the compiler should warn you about if you don’t implement them:\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section;\n\
    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath;\n```\n\nSo we’d better add these methods to the source implementation\
    \ of `BRHomeViewController`:\n\n```\n#pragma mark UITableViewDataSource\n\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n    return cell;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return 100;\n}\n```\n\nDid\
    \ you notice how we’re referencing the `Cell` reuse identifier to grab reusable\
    \ instances of the table cell prototype from our storyboard? Table views manage\
    \ the reuse process directly: as soon as a table cell is scrolled out of the visible\
    \ view, it is added to a reuse stack of cells and returned by the table view when\
    \ we call `dequeueReusableCellWithIdentifier:`.\n\nOur implementation of `tableView:numberOfRowsInSection:`\
    \ returns an integer of 100\\. We’re letting our table view know that there should\
    \ be 100 rows in the table.\n\nBuild and run your app. You should see lots of\
    \ table rows of the subtitle style we set earlier (see the following figure).\n\
    \n![Image](images/9781430243748_Fig07-07.jpg)\n\n**Figure 7-7.** One hundred table\
    \ rows!\n\nIf you select any of the table rows in the simulator or on your device,\
    \ you’ll find that the selected row turns blue and remains selected. We’re going\
    \ to modify the selection handling by implementing one of the `UITableViewDelegate`\
    \ methods in our Home view controller:\n\n```\n#pragma mark UITableViewDelegate\n\
    \n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    [self.tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
    }\n```\n\nYou should now find that when you run the app, the rows fade out elegantly\
    \ on touch to indicate that the user interaction was recognized.\n\nThe rows of\
    \ our *Birthday Reminder* cells are 72 points high. The default height of a table\
    \ cell is only 44 points. With our table view selected, we can modify the cell\
    \ height in our storyboard using the size inspector by incrementing the Row Height\
    \ to 72 (see the following figure).\n\n![Image](images/9781430243748_Fig07-08.jpg)\n\
    \n**Figure 7-8.** Modifying the default row height of our table view\n\n*Note:\
    \ Table views also support variable row height. You can determine individual row\
    \ heights by implementing the `tableView:heightForRowAtIndexPath` method of the\
    \ `UITableViewDelegate` protocol.*\n\nI think we need to load in some real data\
    \ from our `birthdays.plist`. Let’s get to work loading dynamic data into our\
    \ table."
