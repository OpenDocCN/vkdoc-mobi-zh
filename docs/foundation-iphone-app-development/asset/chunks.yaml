    ### Summary


    We came a long way in this chapter.


    We explored how to build a complex navigation hierarchy using Xcode’s drag-and-drop
    storyboarding technology. You should now be familiar with the limitations of storyboarding:
    we need to subclass `UIViewController` and assign our subclasses to storyboard
    view controllers in order to do anything fun with our user interface.


    We touched on the benefits of adding a shared core view controller. As your app
    grows, so does the number of views and view controllers in your project. By using
    the core view controller approach, you can centralize many of your reusable methods
    and properties. Apart from the benefit of writing less code, this means bugs should
    be resolvable in one place and not require fixes in every one of your view controller
    classes. Skinning views also becomes a centralized procedure: much cleaner and
    more manageable, as we shall see in [Chapter 9](#Chapter09.html#ch9).


    #### A challenge


    Here’s a challenge to test your newfound storyboarding knowledge. Build a new
    app from scratch using the Single View Application Xcode project template. Embed
    the default view controller into a navigation controller. Add a button or bar
    button item that pushes on another view controller to the first view controller.
    Finally, see if you can also create a modally presented view controller that can
    be dismissed. Let me know how it works out.


    ![Image](images/ch.jpg)


    ## Chapter 6


    ## Views, Controls, Camera, Action!


    It’s time for us to start working with user interface controls and learn how to
    handle view interaction. We’ll spend the rest of the day developing the user interface
    of the edit birthday, edit notes, and notification time views. These three candidates
    utilize a number of controls from the iOS SDK (such as date pickers, switches,
    and text fields), which we’ll add to our views along with code to handle control
    interaction.


    By the end of the day (and chapter), we’ll have progressed to the use of gesture
    recognizers to catch finger interaction events. We’ll even get as far as learning
    how to utilize the iPhone’s camera and Photo Library directly from our app. There’s
    plenty to learn here, so we’d better get started!'
  trans: '#### 添加备注视图控制器


    当用户在“生日详情”视图中查看好友的生日时，他们将能够编辑好友的备注，例如礼物建议。作为一般规则，我建议在应用程序允许用户编辑或添加数据时，使用模态视图控制器。这种技术能够清晰区分“查看已保存数据”与“编辑已保存数据”两种操作。


    在故事板中，于“生日详情”场景右侧添加一个新的视图控制器场景。由于我们将以模态方式呈现新的备注编辑视图控制器，我们需像处理“编辑生日”视图控制器一样，将其嵌入到自己的导航控制器中。选中新视图控制器，在菜单栏中选择`Editor`
    -> `Embed In` -> `Navigation Controller`。现在，将新的备注视图控制器标题命名为`编辑备注`，并像处理“编辑生日”视图控制器那样添加“取消”和“保存”按钮（参见图
    5-22）。


    从对象库中拖拽一个“圆角矩形按钮”（注意不要与栏按钮项混淆）到“生日详情”视图中，并将其标题设置为`编辑备注`。


    新的视图控制器和导航控制器应类似于图 5-22。


    ![图片](img/9781430243748_Fig05-22.jpg)


    **图 5-22.** 添加备注视图


    现在，通过按住 Control 键从“编辑备注”按钮拖拽到新的导航控制器，来连接新的视图控制器与模态转场。选择`Modal`选项。


    接下来，为“编辑备注”场景创建一个视图控制器类。在`view-controllers`组中创建并添加一个新类，命名为`BRNotesEditViewController`。这次，我们不继承`UIViewController`，而是直接继承`BRCoreViewController`（参见图
    5-23）。


    ![图片](img/9781430243748_Fig05-23.jpg)


    **图 5-23.** `BRNotesEditViewController` 继承自 `BRCoreViewController`


    回到故事板，选中新的“编辑备注”视图控制器，使用身份检查器将自定义类更改为`BRNotesEditViewController`。然后，按住 Control
    键从“取消”和“保存”栏按钮项拖拽，分别创建界面生成器连接到所属视图控制器的`cancelAndDismiss:`和`saveAndDismiss:`动作方法。


    构建并运行，确认现在可以打开并关闭新的“编辑备注”视图控制器。


    #### 翻转至设置视图


    让我们继续构建视图控制器导航网络。在故事板中，“生日详情”视图控制器下方添加一个新的视图控制器。将其嵌入导航控制器。添加标题`设置`，并在标题右侧添加一个“完成”栏按钮项（参见图
    5-24）。


    ![图片](img/9781430243748_Fig05-24.jpg)


    **图 5-24.** 嵌入导航控制器的新“设置”视图控制器


    按住 Control 键从主页视图上的“设置”栏按钮项拖拽到“设置”导航控制器，创建一个新的模态转场连接。


    iOS SDK 在推送和呈现视图控制器时内置了多种转场动画选项。我们不使用默认的从屏幕底部滑入动画，而是将新转场设置为翻转进入“设置”导航控制器。如图 5-25
    所示，您可以点击并选中该新转场，然后使用属性检查器将`Transition`设置更改为`Flip Horizontal`。


    ![图片](img/9781430243748_Fig05-25.jpg)


    **图 5-25.** 将模态转场的过渡样式更改为`Flip Horizontal`


    构建并运行——然后试试看（双关语，意为“试试它的旋转效果”）。


    为了关闭“设置”视图控制器，我们需要在`view-controller`组中添加一个`BRCoreViewController`子类，并命名为`BRSettingsViewController`。然后，在故事板中选中“设置”视图控制器，使用身份检查器指定新的`BRSettingsViewController`类。接着，按住
    Control 键将“完成”按钮拖拽连接到视图控制器的`saveAndDismiss:`动作方法。


    在我们处理“设置”视图控制器的同时，让我们再添加一个由“设置”场景链接的视图控制器。新的通知时间视图控制器允许用户更改生日提醒的默认通知时间。


    首先，在“设置”视图中添加一个“圆角矩形按钮”，并将其标题设置为`设置提醒时间`。然后，在“设置”场景右侧添加一个新的视图控制器场景。将其标题设置为`提醒时间`，接着按住
    Control 键从“设置提醒时间”按钮拖拽到新添加的视图控制器，创建一个推送转场。这应该会为新的视图控制器添加一个模拟导航栏。输入标题`提醒时间`，如图
    5-26 所示。


    ![图片](img/9781430243748_Fig05-26.jpg)


    **图 5-26.** 将视图控制器推送到模态呈现的“设置”视图控制器上


    按照目前所有视图控制器的做法，我们创建另一个`BRCoreViewController`的子类，命名为`BRNotificationTimeViewController`。在故事板中选中通知时间视图控制器，使用身份检查器指定新创建的`BRNotificationTimeViewController`类。


    构建并运行。如果所有视图显示为灰色，则说明视图控制器类的关联已按预期生效。


    ### 总结


    本章我们取得了长足的进步。


    我们探索了如何使用 Xcode 的拖放式故事板技术构建复杂的导航层级。您现在应该熟悉故事板的局限性：我们需要继承`UIViewController`并将子类分配给故事板视图控制器，才能对用户界面进行任何有趣的操作。


    我们提到了添加共享核心视图控制器的好处。随着应用程序的增长，项目中的视图和视图控制器数量也会增加。通过使用核心视图控制器方法，您可以集中管理许多可重用的方法和属性。除了编写更少代码的好处外，这意味着错误可以在一个地方解决，而无需在每个视图控制器类中修复。视图的皮肤化也变成了集中化的流程：更清晰、更易于管理，正如我们将在第
    9 章中看到的那样。


    #### 一项挑战


    这里有一个挑战来测试您新学到的故事板知识。使用`Single View Application` Xcode 项目模板从头构建一个新应用。将默认视图控制器嵌入导航控制器。添加一个按钮或栏按钮项，将另一个视图控制器推送到第一个视图控制器上。最后，尝试创建一个可被关闭的模态呈现视图控制器。请告诉我效果如何。


    ![图片](img/ch.jpg)


    ## 第 6 章


    ## 视图、控件、相机、行动！


    现在，是时候开始使用用户界面控件并学习如何处理视图交互了。今天剩下的时间里，我们将开发编辑生日、编辑备注和通知时间视图的用户界面。这三个目标视图使用了 iOS
    SDK 中的多个控件（如日期选择器、开关和文本字段），我们将把它们添加到视图中，并编写代码来处理控件交互。


    到本章结束时，我们将进一步使用手势识别器来捕捉手指交互事件。我们甚至将学习如何直接在应用中使用 iPhone 的相机和照片库。这里有很多东西要学，所以我们最好现在就开始！'
- fmt: "### User interface controls and components\n\nAs developers, we have two choices\
    \ when adding user interface instance components to our views: create and add\
    \ them in code, or add them via drag-and-drop to nibs and storyboard files. Throughout\
    \ the development of the *Birthday Reminder* app, we primarily use the simpler\
    \ drag-and-drop approach of developing our UIs directly in our storyboard files.\n\
    \nAs you become a more advanced iOS developer, you may find that occasionally\
    \ creating a component in code is the better or only option you have. Storyboarding\
    \ is always going to have its limitations. For *Birthday Reminder*, however, the\
    \ vast majority of our user interface design and layout is achieved perfectly\
    \ well with storyboarding.\n\n### Edit birthday view: date pickers, switches,\
    \ and text fields\n\nWith your *Birthday Reminder* project open in Xcode, select\
    \ the edit birthday view and begin by adding an instance of each of the following\
    \ from the Object Library to the view (see [Figure 6-1](#Chapter06.html#fig_6_1)).\
    \ Use the size inspector to set the position and size values listed.\n\n> * A\
    \ text field (`UITextField`): x=89, y=22, width=221.\n> * A label (`UILabel`):\
    \ Change the text to **Include Year**, and then position and size (x=125, y=165,\
    \ width=99, height=27).\n> * A switch (`UISwitch`): x=231, y=165.\n> * A date\
    \ picker (`UIDatePicker`): x=0, y=200, width=320.\n\n![Image](images/9781430243748_Fig06-01.jpg)\n\
    \n**Figure 6-1.** Edit birthday view populated with text field, label, switch,\
    \ and date picker\n\nWith our current implementation of this view, the date picker,\
    \ Include Year label, and switch are going to float above an 88-point high empty\
    \ space on the taller iPhone 5 display. By using autosizing, however, we can change\
    \ this and force these components to remain pinned to the bottom of the UI. On\
    \ each of these three components, set the bottom margin to remain fixed by modifying\
    \ the autosize mask values as shown in [Figure 6-1](#Chapter06.html#fig_6_1).\
    \ Select each of the components in turn to apply the new autosizing values.\n\n\
    Next, we’re going to create Interface Builder outlets in `BRBirthdayEditViewController`\
    \ for our four new user interface components as well as an outlet for the Save\
    \ bar button item.\n\nEnsure the Edit Birthday view controller scene is selected\
    \ in your storyboard, hide the right-side Inspector pane, and switch Xcode to\
    \ the Assistant Editor mode (see [Figure 6-2](#Chapter06.html#fig_6_2)).\n\n![Image](images/9781430243748_Fig06-02.jpg)\n\
    \n**Figure 6-2.** Xcode’s Assistant Editor layout: perfect for creating Interface\
    \ Builder connections\n\nControl-drag from the Save bar button item, name text\
    \ field, year label, switch, and date picker to create five weak outlets in the\
    \ `BRBirthdayEditViewController.h` header with the following names: `saveButton`,\
    \ `nameTextField`, `includeYearLabel`, `includeYearSwitch`, and `datePicker`,\
    \ respectively. The end result should add the following code to your header file:\n\
    \n```objc\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface\
    \ BRBirthdayEditViewController : BRCoreViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UIBarButtonItem *saveButton;\n@property (weak, nonatomic) IBOutlet\
    \ UITextField *nameTextField;\n@property (weak, nonatomic) IBOutlet UILabel *includeYearLabel;\n\
    @property (weak, nonatomic) IBOutlet UISwitch *includeYearSwitch;\n@property (weak,\
    \ nonatomic) IBOutlet UIDatePicker *datePicker;\n\n@end\n```\n\n#### Configuring\
    \ text fields and responding to text changes\n\nBack in the storyboard, let’s\
    \ set a couple of attributes for the name text field. Select the text field, and\
    \ using the attributes inspector, begin by entering **Name**, the placeholder\
    \ text. Placeholder text displays in a light-gray color when a text field is empty.\
    \ It’s a great way to prompt a user to enter text without having to add another\
    \ label above or next to the text entry field.\n\nChange the Clear button attribute\
    \ to Appears While Editing. This instructs iOS to display a handy X button to\
    \ the inside right of the text field so that the user can easily clear the name\
    \ text with one tap and enter a new name.\n\n##### Hiding the keyboard\n\nThe\
    \ final attribute we’re going to modify is the Return key. Change the default\
    \ value to Done. When the user taps the name text field and begins to enter text,\
    \ the keyboard automatically appears, covering the date picker. We need to consider\
    \ this and ensure we provide the user with the means to dismiss the keyboard and\
    \ modify the birthday date. By changing the Return key value to Done, we indicate\
    \ to the user that tapping the Return key will clear the keyboard. To dismiss\
    \ the keyboard when a text field’s Return button is tapped requires our view controller\
    \ to subscribe as the text field’s delegate.\n\nIn the `BRBirthdayEditViewController.h`\
    \ header, we must declare that this class implements the `UITextFieldDelegate`\
    \ protocol:\n\n```objc\n@interface BRBirthdayEditViewController : BRCoreViewController\
    \ <UITextFieldDelegate>\n```\n\nNow Control-drag from the text field to the view\
    \ controller in the storyboard to assign the Edit Birthday view controller as\
    \ the delegate of the text field (see [Figure 6-3](#Chapter06.html#fig_6_3)).\
    \ Select Delegate from the Outlets list that pops up.\n\n![Image](images/9781430243748_Fig06-03.jpg)\n\
    \n**Figure 6-3.** Control-drag from the text field to the view controller to connect\
    \ the delegate outlet\n\nThere are no mandatory methods in the `UITextFieldDelegate`\
    \ protocol, so we should get no errors or warnings from the compiler at this point.\
    \ However, if we want to catch the user tapping the Done button, we need to add\
    \ the `textFieldShouldReturn:` `UITextFieldDelegate` method to our view controller\
    \ class. In the `BRBirthdayEditViewController.m` source file, add the following\
    \ code:\n\n```objc\n#pragma mark UITextFieldDelegate\n\n- (BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [self.nameTextField resignFirstResponder];\n    return NO;\n\
    }\n```\n\nYou don’t need to add the pragma mark, but it’s a handy way to divvy\
    \ up sections of code and keep things tidy: I like to keep a tidy ship! Pragma\
    \ marks are recognized by the Jump bar in Xcode and highlighted to help you navigate\
    \ groups of class methods and properties: clever comments.\n\nSetting and removing\
    \ the focus on editable text components in iOS is achieved via the `becomeFirstResponder`\
    \ and `resignFirstResponder` methods, respectively. Build and run your app. You\
    \ should now find that tapping the name text field automatically presents a keyboard\
    \ with the Done button, and that tapping Done dismisses the keyboard.\n\n#####\
    \ Tracking and responding to text changes\n\nNow to track when the user enters\
    \ or clears text from the name text field. Just like all the other buttons and\
    \ control components, `UITextField` is a subclass of `UIControl`. Any subclass\
    \ of `UIControl` implements the target-action design pattern. We set our view\
    \ controller as a target of the text field, specify which action event we wish\
    \ to respond to, and the selector method of our class to call when that event\
    \ occurs.\n\nCreate an Interface Builder action connection by dragging from the\
    \ text field to the `BRBirthdayEditViewController.h` header interface. Change\
    \ the connection type to Action, enter the name `didChangeNameText`, and change\
    \ the event type to Editing Changed (see [Figure 6-4](#Chapter06.html#fig_6_4)).\
    \ Click Connect!\n\n![Image](images/9781430243748_Fig06-04.jpg)\n\n**Figure 6-4.**\
    \ Creating an action to detect text editing changes\n\nXcode should generate our\
    \ `didChangeNameText:` action method signature:\n\n```objc\n- (IBAction)didChangeNameText:(id)sender;\n\
    ```\n\nSwitch to `BRBirthdayEditViewController.m` and enter the following implementation\
    \ for this method:\n\n```objc\n- (IBAction)didChangeNameText:(id)sender {\n  \
    \  NSLog(@\"The text was changed: %@\",self.nameTextField.text);\n}\n```\n\nBuild\
    \ and run. As you enter and modify text in the name field, you should see your\
    \ changes printed out in the Debug panel. Awesome!"
  raw: '### User interface controls and components


    As developers, we have two choices when adding user interface instance components
    to our views: create and add them in code, or add them via drag-and-drop to nibs
    and storyboard files. Throughout the development of the *Birthday Reminder* app,
    we primarily use the simpler drag-and-drop approach of developing our UIs directly
    in our storyboard files.


    As you become a more advanced iOS developer, you may find that occasionally creating
    a component in code is the better or only option you have. Storyboarding is always
    going to have its limitations. For *Birthday Reminder*, however, the vast majority
    of our user interface design and layout is achieved perfectly well with storyboarding.


    #### Edit birthday view: date pickers, switches, and text fields


    With your *Birthday Reminder* project open in Xcode, select the edit birthday
    view and begin by adding an instance of each of the following from the Object
    Library to the view (see [Figure 6-1](#Chapter06.html#fig_6_1)). Use the size
    inspector to set the position and size values listed.


    > *   A *text field* (`UITextField`): x=89, y=22, width=221.

    > *   A *label* (`UILabel`): Change the text to **Include Year**, and then position
    and size (x=125, y=165, width=99, height=27).

    > *   A *switch* (`UISwitch`): x=231, y=165.

    > *   A *date picker* (`UIDatePicker`): x=0, y=200, width=320.


    ![Image](images/9781430243748_Fig06-01.jpg)


    **Figure 6-1.** Edit birthday view populated with text field, label, switch, and
    date picker


    With our current implementation of this view, the date picker, Include Year label,
    and switch are going to float above an 88-point high empty space on the taller
    iPhone 5 display. By using autosizing, however, we can change this and force these
    components to remain pinned to the bottom of the UI. On each of these three components,
    set the bottom margin to remain fixed by modifying the autosize mask values as
    shown in [Figure 6-1](#Chapter06.html#fig_6_1). Select each of the components
    in turn to apply the new autosizing values.


    Next, we’re going to create Interface Builder outlets in `BRBirthdayEditViewController`
    for our four new user interface components as well as an outlet for the Save bar
    button item.


    Ensure the Edit Birthday view controller scene is selected in your storyboard,
    hide the right-side Inspector pane, and switch Xcode to the Assistant Editor mode
    (see [Figure 6-2](#Chapter06.html#fig_6_2)).


    ![Image](images/9781430243748_Fig06-02.jpg)


    **Figure 6-2.** Xcode’s Assistant Editor layout: perfect for creating Interface
    Builder connections


    Control-drag from the Save bar button item, name text field, year label, switch,
    and date picker to create five weak outlets in the `BRBirthdayEditViewController.h`
    header with the following names: `saveButton`, `nameTextField`, `includeYearLabel`,
    `includeYearSwitch`, and `datePicker`, respectively. The end result should add
    the following code to your header file:


    `#import <UIKit/UIKit.h>`

    `#import "BRCoreViewController.h"`


    `@interface BRBirthdayEditViewController : BRCoreViewController`


    **`@property (weak, nonatomic) IBOutlet UIBarButtonItem *saveButton;`**

    **`@property (weak, nonatomic) IBOutlet UITextField *nameTextField;`**

    **`@property (weak, nonatomic) IBOutlet UILabel *includeYearLabel;`**

    **`@property (weak, nonatomic) IBOutlet UISwitch *includeYearSwitch;`**

    **`@property (weak, nonatomic) IBOutlet UIDatePicker *datePicker;`**


    `@end`


    ##### Configuring text fields and responding to text changes


    Back in the storyboard, let’s set a couple of attributes for the name text field.
    Select the text field, and using the attributes inspector, begin by entering **Name**,
    the placeholder text. Placeholder text displays in a light-gray color when a text
    field is empty. It’s a great way to prompt a user to enter text without having
    to add another label above or next to the text entry field.


    Change the Clear button attribute to Appears While Editing. This instructs iOS
    to display a handy X button to the inside right of the text field so that the
    user can easily clear the name text with one tap and enter a new name.


    ###### Hiding the keyboard


    The final attribute we’re going to modify is the Return key. Change the default
    value to Done. When the user taps the name text field and begins to enter text,
    the keyboard automatically appears, covering the date picker. We need to consider
    this and ensure we provide the user with the means to dismiss the keyboard and
    modify the birthday date. By changing the Return key value to Done, we indicate
    to the user that tapping the Return key will clear the keyboard. To dismiss the
    keyboard when a text field’s Return button is tapped requires our view controller
    to subscribe as the text field’s delegate.


    In the `BRBirthdayEditViewController.h` header, we must declare that this class
    implements the `UITextFieldDelegate` protocol:


    `@interface BRBirthdayEditViewController : BRCoreViewController`**`<UITextFieldDelegate>`**


    Now Control-drag from the text field to the view controller in the storyboard
    to assign the Edit Birthday view controller as the delegate of the text field
    (see [Figure 6-3](#Chapter06.html#fig_6_3)). Select Delegate from the Outlets
    list that pops up.


    ![Image](images/9781430243748_Fig06-03.jpg)


    **Figure 6-3.** Control-drag from the text field to the view controller to connect
    the delegate outlet


    There are no mandatory methods in the `UITextFieldDelegate` protocol, so we should
    get no errors or warnings from the compiler at this point. However, if we want
    to catch the user tapping the Done button, we need to add the `textFieldShouldReturn:`
    `UITextFieldDelegate` method to our view controller class. In the `BRBirthdayEditViewController.m`
    source file, add the following code:


    `#pragma mark UITextFieldDelegate`


    `- (BOOL)textFieldShouldReturn:(UITextField *)textField`

    `{`

    `    [self.nameTextField resignFirstResponder];`

    `    return NO;`

    `}`


    You don’t need to add the pragma mark, but it’s a handy way to divvy up sections
    of code and keep things tidy: I like to keep a tidy ship! Pragma marks are recognized
    by the Jump bar in Xcode and highlighted to help you navigate groups of class
    methods and properties: clever comments.


    Setting and removing the focus on editable text components in iOS is achieved
    via the `becomeFirstResponder` and `resignFirstResponder` methods, respectively.
    Build and run your app. You should now find that tapping the name text field automatically
    presents a keyboard with the Done button, and that tapping Done dismisses the
    keyboard.


    ###### Tracking and responding to text changes


    Now to track when the user enters or clears text from the name text field. Just
    like all the other buttons and control components, `UITextField` is a subclass
    of `UIControl`. Any subclass of `UIControl` implements the target-action design
    pattern. We set our view controller as a target of the text field, specify which
    action event we wish to respond to, and the selector method of our class to call
    when that event occurs.


    Create an Interface Builder action connection by dragging from the text field
    to the `BRBirthdayEditViewController.h` header interface. Change the connection
    type to Action, enter the name `didChangeNameText`, and change the event type
    to Editing Changed (see [Figure 6-4](#Chapter06.html#fig_6_4)). Click Connect!


    ![Image](images/9781430243748_Fig06-04.jpg)


    **Figure 6-4.** Creating an action to detect text editing changes


    Xcode should generate our `didChangeNameText:` action method signature:


    `- (IBAction)didChangeNameText:(id)sender;`


    Switch to `BRBirthdayEditViewController.m` and enter the following implementation
    for this method:


    `- (IBAction)didChangeNameText:(id)sender {`

    `    NSLog(@"The text was changed: %@",self.nameTextField.text);`

    `}`


    Build and run. As you enter and modify text in the name field, you should see
    your changes printed out in the Debug panel. Awesome!'
  trans: "\n### 用户界面控件与组件\n\n作为开发者，在视图上添加用户界面实例组件时有两种选择：通过代码创建并添加，或通过拖放操作添加到 nib 文件和\
    \ Storyboard 文件中。在开发*生日提醒*应用的过程中，我们主要采用更简单的拖放方式，直接在 Storyboard 文件中设计用户界面。\n\n\
    随着你成长为更资深的 iOS 开发者，你可能会发现有些时候通过代码创建组件是更好或唯一的选择。Storyboard 永远有其局限性。不过，对于*生日提醒*应用来说，绝大多数用户界面设计和布局都能完美地通过\
    \ Storyboard 实现。\n\n### 编辑生日视图：日期选择器、开关和文本字段\n\n在 Xcode 中打开你的*生日提醒*项目，选择编辑生日视图，然后从对象库中向该视图添加以下每个组件的一个实例（参见图\
    \ 6-1）。使用尺寸检查器设置列出的位置和尺寸值。\n\n> * 一个文本字段（`UITextField`）：x=89，y=22，宽度=221。\n> *\
    \ 一个标签（`UILabel`）：将文本改为**包含年份**，然后定位并设置尺寸（x=125，y=165，宽度=99，高度=27）。\n> * 一个开关（`UISwitch`）：x=231，y=165。\n\
    > * 一个日期选择器（`UIDatePicker`）：x=0，y=200，宽度=320。\n\n![Image](img/9781430243748_Fig06-01.jpg)\n\
    \n**图 6-1.** 已填入文本字段、标签、开关和日期选择器的编辑生日视图\n\n根据我们目前对该视图的实现，日期选择器、“包含年份”标签和开关会悬浮在较长的\
    \ iPhone 5 屏幕上 88 点高的空白区域上方。然而，通过使用自动调整尺寸，我们可以改变这一情况，强制这些组件固定对齐到用户界面的底部。在这三个组件上，通过修改图\
    \ 6-1 所示的自动尺寸蒙版值，将下边距设置为固定。依次选中每个组件以应用新的自动调整尺寸值。\n\n接下来，我们要在 `BRBirthdayEditViewController`\
    \ 中为四个新的用户界面组件创建界面构建器（Interface Builder）输出口，并为“保存”栏按钮项创建一个输出口。\n\n确保在你的 Storyboard\
    \ 中选中了“编辑生日”视图控制器场景，隐藏右侧的检查器面板，并将 Xcode 切换到助理编辑器模式（参见图 6-2）。\n\n![Image](img/9781430243748_Fig06-02.jpg)\n\
    \n**图 6-2.** Xcode 的助理编辑器布局：非常适合创建界面构建器连接\n\n按住 Control 键从“保存”栏按钮项、名称文本字段、年份标签、开关和日期选择器拖拽，在\
    \ `BRBirthdayEditViewController.h` 头文件中创建五个弱引用输出口，名称分别为：`saveButton`、`nameTextField`、`includeYearLabel`、`includeYearSwitch`\
    \ 和 `datePicker`。最终结果会向头文件添加如下代码：\n\n```objc\n#import <UIKit/UIKit.h>\n#import\
    \ \"BRCoreViewController.h\"\n\n@interface BRBirthdayEditViewController : BRCoreViewController\n\
    \n@property (weak, nonatomic) IBOutlet UIBarButtonItem *saveButton;\n@property\
    \ (weak, nonatomic) IBOutlet UITextField *nameTextField;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *includeYearLabel;\n@property (weak, nonatomic) IBOutlet UISwitch\
    \ *includeYearSwitch;\n@property (weak, nonatomic) IBOutlet UIDatePicker *datePicker;\n\
    \n@end\n```\n\n#### 配置文本字段并响应文本变化\n\n回到 Storyboard 中，让我们为名称文本字段设置几个属性。选中该文本字段，使用属性检查器，首先输入占位文本\
    \ **名称**。当文本字段为空时，占位文本会以浅灰色显示。这是一种极好的方式来提示用户输入文本，而无需在文本输入字段上方或旁边添加另一个标签。\n\n将清除按钮属性更改为“编辑时出现”。这会让\
    \ iOS 在文本字段内部右侧显示一个方便的 X 按钮，以便用户只需轻点一下即可轻松清除名称文本并输入新名称。\n\n##### 隐藏键盘\n\n我们要修改的最后一个属性是回车键。将默认值更改为“完成”。当用户轻点名称文本字段并开始输入文本时，键盘会自动出现，覆盖日期选择器。我们需要考虑到这一点，并确保为用户提供关闭键盘并修改生日日期的方法。通过将回车键值更改为“完成”，我们向用户提示轻点回车键将关闭键盘。要在文本字段的回车按钮被轻点时关闭键盘，需要我们的视图控制器订阅为文本字段的委托。\n\
    \n在 `BRBirthdayEditViewController.h` 头文件中，我们必须声明此类实现了 `UITextFieldDelegate` 协议：\n\
    \n```objc\n@interface BRBirthdayEditViewController : BRCoreViewController <UITextFieldDelegate>\n\
    ```\n\n现在，在 Storyboard 中按住 Control 键从文本字段拖拽到视图控制器，以将“编辑生日”视图控制器指定为文本字段的委托（参见图\
    \ 6-3）。从弹出的输出口列表中选择“Delegate”。\n\n![Image](img/9781430243748_Fig06-03.jpg)\n\n\
    **图 6-3.** 从文本字段按住 Control 键拖拽到视图控制器以连接委托输出口\n\n`UITextFieldDelegate` 协议中没有必须实现的方法，所以此时编译器应该不会报错或警告。不过，如果我们要捕捉用户轻点“完成”按钮的操作，就需要将\
    \ `textFieldShouldReturn:` `UITextFieldDelegate` 方法添加到视图控制器类中。在 `BRBirthdayEditViewController.m`\
    \ 源文件中添加以下代码：\n\n```objc\n#pragma mark UITextFieldDelegate\n\n- (BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [self.nameTextField resignFirstResponder];\n    return NO;\n\
    }\n```\n\n你不需要添加 pragma 标记，但这是一个划分代码区块并保持整洁的便捷方法：我喜欢保持井井有条！Pragma 标记会被 Xcode 的跳转栏识别并高亮显示，以帮助你浏览类方法和属性组：聪明的注释。\n\
    \n在 iOS 中，设置和移除可编辑文本组件的焦点分别通过 `becomeFirstResponder` 和 `resignFirstResponder`\
    \ 方法实现。构建并运行你的应用。你现在应该会发现，轻点名称文本字段会自动弹出一个带有“完成”按钮的键盘，并且轻点“完成”会关闭键盘。\n\n##### 跟踪并响应文本变化\n\
    \n现在来跟踪用户何时在名称文本字段中输入或清除文本。就像所有其他按钮和控件组件一样，`UITextField` 是 `UIControl` 的子类。任何\
    \ `UIControl` 的子类都实现了目标-动作设计模式。我们将视图控制器设置为文本字段的目标，指定我们想要响应哪个动作事件，以及当该事件发生时调用我们类的选择器方法。\n\
    \n通过从文本字段拖拽到 `BRBirthdayEditViewController.h` 头文件接口，创建一个界面构建器动作连接。将连接类型更改为 Action，输入名称\
    \ `didChangeNameText`，并将事件类型更改为 Editing Changed（参见图 6-4）。点击 Connect！\n\n![Image](img/9781430243748_Fig06-04.jpg)\n\
    \n**图 6-4.** 创建用于检测文本编辑变化的动作\n\nXcode 应该会生成我们的 `didChangeNameText:` 动作方法签名：\n\n\
    ```objc\n- (IBAction)didChangeNameText:(id)sender;\n```\n\n切换到 `BRBirthdayEditViewController.m`，为该方法输入以下实现代码：\n\
    \n```objc\n- (IBAction)didChangeNameText:(id)sender {\n    NSLog(@\"文本已被更改: %@\"\
    ,self.nameTextField.text);\n}\n```\n\n构建并运行。当你在名称字段中输入和修改文本时，你应该会在调试面板中看到你的更改被打印出来。太棒了！\n"
- fmt: "###### Enabling and disabling the Save button\n\nBetter user experience often\
    \ means fewer choices, keeping things simple. We don’t want our user to attempt\
    \ to save new and edited birthdays without providing a name. Displaying an alert\
    \ message error when not all the conditions of a save are met is an unnecessary,\
    \ aggressive user experience (see [Figure 6-5](#Chapter06.html#fig_6_5)).\n\n\
    ![Image](images/9781430243748_Fig06-05.jpg)\n\n**Figure 6-5.** Alert views are\
    \ not always the best solution.\n\nAnother (and in my opinion, better) solution\
    \ is to disable the Save bar button item and automatically enable it as soon as\
    \ the user has entered one or more characters into the Name text field. We’ll\
    \ first add a private method to `BRBirthdayEditViewController.m` to check whether\
    \ text has been entered, and enable or disable the Save button accordingly. Add\
    \ a new method to `BRBirthdayEditViewController.m` named `updateSaveButton`. We\
    \ won’t declare the method signature for `updateSaveButton` in the header file\
    \ because it’s private and only for use within the `BRBirthdayEditViewController`\
    \ class code:\n\n```\n-(void) updateSaveButton\n{\n    self.saveButton.enabled\
    \ = self.nameTextField.text.length > 0;\n}\n```\n\nNow, when to call our new `updateSaveButton`\
    \ method? There are two places we should update our Save button: when our view\
    \ is about to appear and when the name text field is edited. We know exactly when\
    \ these events occur: in `viewWillAppear:` and when our new custom action method\
    \ `didChangeNameText:` fires. Here’s the code to add to `BRBirthdayEditViewController.m`:\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [self updateSaveButton];\n}\n```\n\n```\n- (IBAction)didChangeNameText:(id)sender\
    \ {\n    NSLog(@\"The text was changed: %@\",self.nameTextField.text);\n    [self\
    \ updateSaveButton];\n}\n```\n\nBuild and run. You should find that the Save button\
    \ autoenables when you start typing into the name text field. Cool, huh?\n\n####\
    \ Capturing toggling switches\n\nSome people don’t really want to share their\
    \ actual age, just their birthday. We’re going to respect their wishes and make\
    \ the year of birth optional with a flick of a switch. But how do you think we\
    \ hook into a switch as soon as it’s toggled? Does “target-action” ring any bells?\
    \ A `UISwitch` is also a subclass of `UIControl`, so we just need to know which\
    \ event gets dispatched when the switch is toggled.\n\nIn the same way that we\
    \ connected the Editing Changed action of the text field to `BRBirthdayEditViewController.h`,\
    \ we perform the same Control-drag procedure from the switch to the `BRBirthdayEditViewController.h`\
    \ interface. Change the new connection to an Action. Xcode should automatically\
    \ pick the most typical event type based on the currently selected `UIControl`.\
    \ For switches, the Value Changed event is the one we’re after. Name the new action\
    \ `didToggleSwitch` and click Connect (see [Figure 6-6](#Chapter06.html#fig_6_6)).\n\
    \n![Image](images/9781430243748_Fig06-06.jpg)\n\n**Figure 6-6.** Creating a new\
    \ switch Value Changed action callback\n\nNow to implement the new action method:\n\
    \n```\n- (IBAction)didToggleSwitch:(id)sender {\n    if (self.includeYearSwitch.on)\
    \ {\n        NSLog(@\"Sure, I'll share my age with you!\");\n    }\n    else {\n\
    \        NSLog(@\"I'd prefer to keep my birthday year to myself thank you very\
    \ much!\");\n    }\n}\n```\n\nBuild and run, and give it a go.\n\n#### Monitoring\
    \ date picker updates\n\nThe date picker (`UIDatePicker`) control has a number\
    \ of different modes: Time, Date, Date and Time, and Countdown Timer. Feel free\
    \ to experiment with the four different options, but for the purposes of *Birthday\
    \ Reminder*, select the date picker in the storyboard, and via the attributes\
    \ inspector, change the mode to Date.\n\nJust like the switch control, the date\
    \ picker also supports the Value Changed event, so in the same way as you did\
    \ with the switch, Control-drag to create a new Value Changed action from the\
    \ date picker and name it `didChangeDatePicker`. Now implement the new action\
    \ method in `BRBirthdayEditViewController.m`:\n\n```\n- (IBAction)didChangeDatePicker:(id)sender\
    \ {\n    NSLog(@\"New Birthdate Selected: %@\",self.datePicker.date);\n}\n```\n\
    \nBuild and run. Piece of cake, right?"
  raw: '###### Enabling and disabling the Save button


    Better user experience often means fewer choices, keeping things simple. We don’t
    want our user to attempt to save new and edited birthdays without providing a
    name. Displaying an alert message error when not all the conditions of a save
    are met is an unnecessary, aggressive user experience (see [Figure 6-5](#Chapter06.html#fig_6_5)).


    ![Image](images/9781430243748_Fig06-05.jpg)


    **Figure 6-5.** Alert views are not always the best solution.


    Another (and in my opinion, better) solution is to disable the Save bar button
    item and automatically enable it as soon as the user has entered one or more characters
    into the Name text field. We’ll first add a private method to `BRBirthdayEditViewController.m`
    to check whether text has been entered, and enable or disable the Save button
    accordingly. Add a new method to `BRBirthdayEditViewController.m` named `updateSaveButton`.
    We won’t declare the method signature for `updateSaveButton` in the header file
    because it’s private and only for use within the `BRBirthdayEditViewController`
    class code:


    `-(void) updateSaveButton`

    `{`

    `    self.saveButton.enabled = self.nameTextField.text.length > 0;`

    `}`


    Now, when to call our new `updateSaveButton` method? There are two places we should
    update our Save button: when our view is about to appear and when the name text
    field is edited. We know exactly when these events occur: in `viewWillAppear:`
    and when our new custom action method `didChangeNameText:` fires. Here’s the code
    to add to `BRBirthdayEditViewController.m`:


    **`-(void) viewWillAppear:(BOOL)animated`**

    **`{`**

    **`    [super viewWillAppear:animated];`**

    **`    [self updateSaveButton];`**

    **`}`**


    `- (IBAction)didChangeNameText:(id)sender {`

    `    NSLog(@"The text was changed: %@",self.nameTextField.text);`

    **`[self updateSaveButton];`**

    `}`


    Build and run. You should find that the Save button autoenables when you start
    typing into the name text field. Cool, huh?


    ##### Capturing toggling switches


    Some people don’t really want to share their actual age, just their birthday.
    We’re going to respect their wishes and make the year of birth optional with a
    flick of a switch. But how do you think we hook into a switch as soon as it’s
    toggled? Does “target-action” ring any bells? A `UISwitch` is also a subclass
    of `UIControl`, so we just need to know which event gets dispatched when the switch
    is toggled.


    In the same way that we connected the Editing Changed action of the text field
    to `BRBirthdayEditViewController.h`, we perform the same Control-drag procedure
    from the switch to the `BRBirthdayEditViewController.h` interface. Change the
    new connection to an Action. Xcode should automatically pick the most typical
    event type based on the currently selected `UIControl`. For switches, the Value
    Changed event is the one we’re after. Name the new action `didToggleSwitch` and
    click Connect (see [Figure 6-6](#Chapter06.html#fig_6_6)).


    ![Image](images/9781430243748_Fig06-06.jpg)


    **Figure 6-6.** Creating a new switch Value Changed action callback


    Now to implement the new action method:


    `- (IBAction)didToggleSwitch:(id)sender {`

    **`if (self.includeYearSwitch.on) {`**

    **`        NSLog(@"Sure, I''ll share my age with you!");`**

    **`    }`**

    **`    else {`**

    **`        NSLog(@"I''d prefer to keep my birthday year to myself thank you very
    much!");`**

    **`    }`**

    `}`


    Build and run, and give it a go.


    ##### Monitoring date picker updates


    The date picker (`UIDatePicker`) control has a number of different modes: Time,
    Date, Date and Time, and Countdown Timer. Feel free to experiment with the four
    different options, but for the purposes of *Birthday Reminder*, select the date
    picker in the storyboard, and via the attributes inspector, change the mode to
    Date.


    Just like the switch control, the date picker also supports the Value Changed
    event, so in the same way as you did with the switch, Control-drag to create a
    new Value Changed *action* from the date picker and name it `didChangeDatePicker`.
    Now implement the new action method in `BRBirthdayEditViewController.m`:


    `- (IBAction)didChangeDatePicker:(id)sender {`

    **`NSLog(@"New Birthdate Selected: %@",self.datePicker.date);`**

    `}`


    Build and run. Piece of cake, right?'
  trans: "\n###### 启用和禁用保存按钮\n\n更好的用户体验通常意味着更少的选择，保持事情简洁。我们不希望用户在没有提供姓名的情况下尝试保存新增或编辑的生日信息。当保存条件未全部满足时显示警告消息错误是一种不必要的、带有攻击性的用户体验（参见图\
    \ 6-5）。\n\n![图片](img/9781430243748_Fig06-05.jpg)\n\n**图 6-5.** 警告视图并非总是最佳解决方案。\n\
    \n另一种（在我看来更好的）解决方案是禁用保存栏按钮项，并在用户向姓名文本字段中输入一个或多个字符后自动启用它。我们首先在 `BRBirthdayEditViewController.m`\
    \ 中添加一个私有方法，用于检查是否已输入文本，并相应地启用或禁用保存按钮。在 `BRBirthdayEditViewController.m` 中添加一个名为\
    \ `updateSaveButton` 的新方法。我们不会在头文件中声明 `updateSaveButton` 的方法签名，因为它是私有方法，仅用于 `BRBirthdayEditViewController`\
    \ 类代码内部：\n\n```\n-(void) updateSaveButton\n{\n    self.saveButton.enabled = self.nameTextField.text.length\
    \ > 0;\n}\n```\n\n现在，何时调用我们的新方法 `updateSaveButton` 呢？有两个地方需要更新保存按钮：当视图即将显示时，以及当姓名文本字段被编辑时。我们确切知道这些事件发生的时间：在\
    \ `viewWillAppear:` 方法中，以及当我们的新自定义操作方法 `didChangeNameText:` 被触发时。以下是需要添加到 `BRBirthdayEditViewController.m`\
    \ 中的代码：\n\n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [self updateSaveButton];\n}\n```\n\n```\n- (IBAction)didChangeNameText:(id)sender\
    \ {\n    NSLog(@\"文本已更改: %@\",self.nameTextField.text);\n    [self updateSaveButton];\n\
    }\n```\n\n构建并运行。你会发现，当你在姓名文本字段中开始输入时，保存按钮会自动启用。很酷吧？\n\n#### 捕获开关切换\n\n有些人并不想分享自己的实际年龄，只想分享生日。我们将尊重他们的意愿，通过一个开关让出生年份变为可选。但是，你认为我们如何能在开关被切换时立即捕获到事件呢？“目标-动作”这个词有没有让你想到什么？`UISwitch`\
    \ 也是 `UIControl` 的子类，所以我们只需要知道开关被切换时分发了哪个事件。\n\n与我们之前将文本字段的“编辑已更改”动作连接到 `BRBirthdayEditViewController.h`\
    \ 的方式类似，我们对开关执行相同的 Control-拖拽操作，将其连接到 `BRBirthdayEditViewController.h` 接口。将新连接更改为动作（Action）。Xcode\
    \ 通常会根据当前选中的 `UIControl` 自动选择最典型的事件类型。对于开关来说，我们需要的正是“值已更改”事件。将新动作命名为 `didToggleSwitch`\
    \ 并点击连接（参见图 6-6）。\n\n![图片](img/9781430243748_Fig06-06.jpg)\n\n**图 6-6.** 创建新的开关值已更改动作回调\n\
    \n现在实现新的动作方法：\n\n```\n- (IBAction)didToggleSwitch:(id)sender {\n    if (self.includeYearSwitch.on)\
    \ {\n        NSLog(@\"当然，我愿意和你分享我的年龄！\");\n    }\n    else {\n        NSLog(@\"\
    我更愿意对我的出生年份保密，非常感谢！\");\n    }\n}\n```\n\n构建并运行，然后试试看。\n\n#### 监控日期选择器更新\n\n日期选择器（`UIDatePicker`）控件有多种不同的模式：时间、日期、日期和时间以及倒计时器。你可以随意尝试这四种不同的选项，但为了《生日提醒》这个应用，请在故事板中选择日期选择器，并通过属性检查器将模式更改为“日期”。\n\
    \n与开关控件类似，日期选择器也支持“值已更改”事件。所以，按照你操作开关时的方式，Control-拖拽从日期选择器创建一个新的“值已更改”动作，并将其命名为\
    \ `didChangeDatePicker`。现在在 `BRBirthdayEditViewController.m` 中实现新的动作方法：\n\n```\n\
    - (IBAction)didChangeDatePicker:(id)sender {\n    NSLog(@\"已选择新出生日期: %@\",self.datePicker.date);\n\
    }\n```\n\n构建并运行。小菜一碟，对吧？\n"
- fmt: "#### 多行文本视图（编辑笔记视图）\n\n我们已探讨如何处理文本字段交互，但文本字段仅允许输入单行文本。对于我们的笔记编辑器，仅用一行文本来记下礼物创意显然是不够的！\n\
    \n如果需要多行文本输入字段，你需要在应用中添加一个可编辑的文本视图（`UITextView`）组件。\n\n在故事板中，将注意力移至编辑笔记视图控制器。将一个文本视图实例拖到视图上，并设置其位置：`x=0`、`y=10`、`width=320`、`height=190`（参见[图6-7](#Chapter06.html#fig_6_7)）。\n\
    \n![Image](images/9781430243748_Fig06-07.jpg)\n\n**图6-7.** 在编辑笔记视图中添加文本视图\n\n\
    将文本视图设置为这个位置和大小是出于充分理由的。它正好在文本视图下方留下216点的屏幕空间。在竖屏方向下，键盘高度为216点，因此我们确保当用户输入生日礼物备注时，键盘不会遮挡视图中的任何重要元素。\n\
    \n尽管我们的190点高文本视图在iPhone 4S上看起来很棒，但在iPhone 5屏幕上，文本视图底部与键盘之间会有88点的空白空间。我们可以通过将文本视图的自动调整遮罩设置为灵活的宽度和高度，但固定上、下、左、右值来解决这个问题。更改自动调整属性以匹配[图6-7](#Chapter06.html#fig_6_7)中高亮显示的内容。\n\
    \n保持文本视图处于选中状态，切换到属性检查器。你将会注意到（并非双关！）文本视图可以包含可编辑和不可编辑的多行文本。我们可以根据需要切换可编辑属性。使用属性检查器删除\
    \ *lorem ipsum* 文本。\n\n使用辅助编辑器布局，通过Control-拖拽技术在`BRNotesEditViewController.h`中为“保存”栏按钮项和文本视图创建插座。将新插座分别命名为`saveButton`和`textView`。你的头文件最终应包含以下代码：\n\
    \n```\n#import \"BRCoreViewController.h\"\n\n@interface BRNotesEditViewController\
    \ : BRCoreViewController\n\n@property (weak, nonatomic) IBOutlet UIBarButtonItem\
    \ *saveButton;\n@property (weak, nonatomic) IBOutlet UITextView *textView;\n\n\
    @end\n```\n\n文本视图允许用户输入无限量的文本。如果文本高度超过其边界，文本会自动变为可滚动。因此，`UITextView`是`UIScrollView`的子类。`UITextView`不是`UIControl`的子类，所以我们没有像添加`UITextField`时那样的目标-动作事件可用。要在`UITextView`实例中捕获文本变化，我们需要订阅为文本视图的委托，并实现`UITextViewDelegate`协议。修改`BRNotesEditViewController.h`的接口声明，在尖括号中包含`UITextViewDelegate`协议引用：\n\
    \n```\n@interface BRNotesEditViewController : BRCoreViewController <UITextViewDelegate>\n\
    ```\n\n从文本视图Control-拖拽到编辑笔记视图控制器，以将文本视图的委托插座属性分配给编辑笔记视图控制器（参见[图6-8](#Chapter06.html#fig_6_8)）。\n\
    \n![Image](images/9781430243748_Fig06-08.jpg)\n\n**图6-8.** 分配文本视图委托插座\n\n我们感兴趣的`UITextViewDelegate`协议方法是`textViewDidChange:`回调。每当文本视图中的文本发生变化时，该方法都会被触发。以下是添加到`BRNotesEditViewController.m`中的实现：\n\
    \n```\n#pragma mark UITextViewDelegate\n\n- (void)textViewDidChange:(UITextView\
    \ *)textView\n{\n    NSLog(@\"User changed the notes text: %@\",self.textView.text);\n\
    }\n```\n\n构建并运行。检查你对笔记文本字段所做的更改是否打印到Xcode的调试器中。\n\n##### 显示文本控件和视图的键盘\n\n理想情况下，我们希望不必等到用户点击文本视图才显示键盘。最好是在编辑笔记视图一出现时，键盘就立即显示在屏幕上。添加一个`viewWillAppear:`回调即可通过一行代码实现：\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [self.textView becomeFirstResponder];\n}\n```\n\n与在编辑生日视图控制器中点击回车键时调用`resignFirstResponder`来关闭键盘类似，我们也可以通过调用`becomeFirstResponder`方法来聚焦文本字段和可编辑文本视图。\n\
    \n#### 准备通知时间视图控制器\n\n通知时间视图控制器显示一个子设置视图，用户可以在其中选择希望生日提醒触发的时间。\n\n##### 多行居中标签\n\
    \n首先，在故事板的通知时间视图中添加一个标签和一个日期选择器组件。在标签中输入以下文本：\n\n**你希望生日提醒在一天的什么时间触发？**\n\n设置标签的位置和大小（`x=20`、`y=20`、`width=280`、`height=87`）。默认情况下，标签组件只显示单行垂直居中的文本。你可能还会发现文本被缩小以适应你刚设置的新尺寸。使用属性检查器，你可以将“行数”值增加到3，并将“对齐”值更改为居中对齐标签文本（参见[图6-9](#Chapter06.html#fig_6_9)）。\n\
    \n![Image](images/9781430243748_Fig06-09.jpg)\n\n**图6-9.** 添加文本居中显示的多行`UILabel`"
  raw: '#### Multilined text view in the edit notes view


    We’ve explored how to handle text field interactions, but text fields only permit
    a single line of text to be entered. For our notes editor, one line of text for
    jotting down gift ideas is unlikely to be adequate!


    If you need a text entry field for multiple lines, then you’ll need to add an
    editable text view (`UITextView`) component to your app.


    In your storyboard, move your attention to the Edit Notes view controller. Drag
    a text view instance onto the view and position it: x=0, y=10, width=320, and
    height=190 (see [Figure 6-7](#Chapter06.html#fig_6_7)).


    ![Image](images/9781430243748_Fig06-07.jpg)


    **Figure 6-7.** Adding a text view to the edit notes view


    There’s a good reason for setting our text view at this position and size. It
    leaves precisely 216 points of screen space below the text view. In portrait orientation,
    the keyboard is 216 points high, so we’re ensuring that the keyboard will not
    cover any important elements in our view when the user is typing in birthday present
    notes.


    Although our 190-point high text view will look great on an iPhone 4S, on the
    iPhone 5 screen, there’s going to be an 88-point space between the bottom of the
    text view and the keyboard. We can fix this by setting the autosize mask of the
    text view to a flexible width and height, but fixed top, bottom, left, and right
    values. Change the autosizing properties to match those highlighted in [Figure
    6-7](#Chapter06.html#fig_6_7).


    Keeping the text view selected, toggle to the attributes inspector. You’ll note
    (no pun intended!) that text views can contain editable and noneditable multilined
    text. We can toggle the editable attribute as required. Delete the *lorem ipsum*
    text using the attributes inspector.


    Working with the Assistant Editor layout, use the Control-drag technique to create
    outlets from the Save bar button item and text view in `BRNotesEditViewController.h`.
    Name the new outlets `saveButton` and `textView`, respectively. You should end
    up with the following code in your header file:


    `#import "BRCoreViewController.h"`


    `@interface BRNotesEditViewController : BRCoreViewController`


    **`@property (weak, nonatomic) IBOutlet UIBarButtonItem *saveButton;`**

    **`@property (weak, nonatomic) IBOutlet UITextView *textView;`**


    `@end`


    Text views enable users to write an unlimited amount of text. If the text is greater
    in height than its bounds, the text automatically becomes scrollable. For this
    reason, `UITextView` is a subclass of `UIScrollView`. `UITextView` is therefore
    not a subclass of `UIControl`, so we don’t have any target-action events to work
    with like when we added a `UITextField`. To capture text changes in an instance
    of `UITextView`, we’ll need to subscribe as the text view’s delegate and implement
    the `UITextViewDelegate` protocol. Modify the interface declaration of `BRNotesEditViewController.h`
    to include the `UITextViewDelegate` protocol reference in angled brackets:


    `@interface BRNotesEditViewController : BRCoreViewController` **`<UITextViewDelegate>`**


    Control-drag from the text view to the Edit Notes view controller to assign the
    delegate outlet property of the text view to the Edit Notes view controller (see
    [Figure 6-8](#Chapter06.html#fig_6_8)).


    ![Image](images/9781430243748_Fig06-08.jpg)


    **Figure 6-8.** Assigning the text view delegate outlet


    The method from the `UITextViewDelegate` protocol that we’re interested in is
    the `textViewDidChange:` callback. This method fires every time there’s a change
    to the text in the text view. Here’s the implementation to add to `BRNotesEditViewController.m`:


    `#pragma mark UITextViewDelegate`


    `- (void)textViewDidChange:(UITextView *)textView`

    `{`

    `    NSLog(@"User changed the notes text: %@",self.textView.text);`

    `}`


    Build and run. Check that your changes to the notes text field are printed to
    Xcode’s debugger.


    ##### Displaying the keyboard for text controls and views


    What would be great is if we didn’t have to wait until the user taps the text
    view to show the keyboard. Ideally, we just want the keyboard onscreen as soon
    as our edit notes view appears. One line of code achieves this if we add a `viewWillAppear:`
    callback:


    `-(void) viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`

    `    [self.textView becomeFirstResponder];`

    `}`


    Similar to the way we called `resignFirstResponder` to dismiss the keyboard when
    the Return key was tapped for the text field in the Edit Birthday view controller,
    we can also focus on text fields and editable text views by invoking the `becomeFirstResponder`
    method.


    #### Preparing the notification time view controller


    The Notification Time view controller displays a subsetting view in which users
    can select the time of day they’d like their birthday reminders to fire.


    ##### Multiline centered labels


    First, add a label and a date picker component to the notification time view in
    your storyboard. Enter the following text into the label:


    **What time of day do you want your Birthday Reminders?**


    Position and size the label (x=20, y=20, width=280, height=87). By default, label
    components only display a single line of vertically centered text. You may find
    that your text is also shrunk to fit the new size you’ve just imposed. Using the
    attributes inspector, you can increment the Lines value to 3 and change the Alignment
    value to center the label text (see [Figure 6-9](#Chapter06.html#fig_6_9)).


    ![Image](images/9781430243748_Fig06-09.jpg)


    **Figure 6-9.** Adding a multiline UILabel with the text centered'
