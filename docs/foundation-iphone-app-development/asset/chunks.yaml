    \ `BRDSettings.h`。接下来，添加以下 `viewWillAppear:` 方法：\n\n```objective-c\n-(void) viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n\n    self.tableCellNotificationTime.detailTextLabel.text\
    \ = [[BRDSettings sharedInstance] titleForNotificationTime];\n    self.tableCellDaysBefore.detailTextLabel.text\
    \ =  [[BRDSettings sharedInstance] titleForDaysBefore:[BRDSettings sharedInstance].daysBefore];\n\
    }\n```\n\nXcode 允许我们直接访问通过 Interface Builder 连接创建的静态表格单元格。因此，在设置视图即将显示时，我们可以更新这两个静态单元格的\
    \ `detailTextLabel` 值，以反映 `BRDSettings` 单例中当前的用户设置。\n\n设置视图控制器并非我们核心视图控制器的子类，因此它不会继承\
    \ `viewDidLoad` 中添加自定义背景图片的代码。我们需要直接添加该代码以显示棋盘格背景：\n\n```objective-c\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    UIImageView *backgroundView = [[UIImageView alloc]\
    \ initWithImage:[UIImage imageNamed:@\"app-background.png\"]];\n    self.tableView.backgroundView\
    \ = backgroundView;\n}\n```\n\n设置视图控制器还将在两行表格上方显示一个风格化的奶油色标题标签“提醒事项”。我们将使用样式表类以及\
    \ `BRSettingsViewController` 实现源码中的一个新的私有方法来实现这一点。首先，导入 `BRStyleSheet.h`，然后添加以下代码：\n\
    \n```objective-c\n-(UIView *) createSectionHeaderWithLabel:(NSString *)text\n\
    {\n    UIView *view = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 320, 40.f)];\n\
    \    UILabel *label = [[UILabel alloc] initWithFrame:CGRectMake(10.f, 15.f, 300.f,\
    \ 20.f)];\n    label.backgroundColor = [UIColor clearColor];\n    [BRStyleSheet\
    \ styleLabel:label withType:BRLabelTypeLarge];\n    label.text = text;\n    [view\
    \ addSubview:label];\n    return view;\n}\n\n- (CGFloat)tableView:(UITableView\
    \ *)tableView heightForHeaderInSection:(NSInteger)section\n{\n    return 40.f;\n\
    }\n\n- (UIView *)tableView:(UITableView *)tableView viewForHeaderInSection:(NSInteger)section\n\
    {\n    return [self createSectionHeaderWithLabel:@\"提醒事项\"];\n}\n```\n\n`tableView:heightForHeaderInSection:`\
    \ 和 `tableView:viewForHeaderInSection:` 是 `UITableViewDelegate` 协议中的方法，它们使我们能够为表格视图的节标题定义自定义视图和视图高度。自定义方法\
    \ `createSectionHeaderWithLabel:` 创建了一个透明视图来填充标题部分，以及一个带有透明背景的 `UILabel` 子视图。它根据传入的字符串参数设置标签文本。在模拟器中运行时，结果应类似于图\
    \ 12-8。\n\n![图片](img/9781430243748_Fig12-08.jpg)\n\n**图 12-8.** 为表格视图添加风格化的自定义标签标题\n\
    \n接下来我们完成 `BRNotificationTimeViewController.m` 的实现。首先，导入 `BRDSettings.h`，然后添加一个新的\
    \ `viewWillAppear:` 实现：\n\n```objective-c\n-(void) viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n\n    //检索存储的用户设置中的通知小时和分钟\n    int hour\
    \ = [BRDSettings sharedInstance].notificationHour;\n    int minute = [BRDSettings\
    \ sharedInstance].notificationMinute;\n\n    //使用 NSDateComponents 创建当前日期，并设置小时/分钟为存储的用户通知设置\n\
    \    NSDateComponents *components = [[NSCalendar currentCalendar] components:NSHourCalendarUnit|NSMinuteCalendarUnit\
    \ fromDate:[NSDate date]];\n    components.hour = hour;\n    components.minute\
    \ = minute;\n    //更新日期/时间选择器，使其显示与存储用户设置匹配的小时/分钟\n    self.timePicker.date =\
    \ [[NSCalendar currentCalendar] dateFromComponents:components];\n}\n```\n\n每当通知时间视图控制器出现时，它会根据存储的用户设置的生日通知提醒时间更新所显示的时间。我们现在需要确保当用户在此视图中更改时间时，我们相应地更新存储的设置。按如下方式完成\
    \ `didChangeTime:` 方法：\n\n```objective-c\n- (IBAction)didChangeTime:(id)sender\
    \ {\n    NSDateComponents *components = [[NSCalendar currentCalendar] components:NSHourCalendarUnit|NSMinuteCalendarUnit\
    \ fromDate:self.timePicker.date];\n    //NSLog(@\"时间已更改为：%d:%d\",components.hour,components.minute);\n\
    \n    [BRDSettings sharedInstance].notificationHour = components.hour;\n    [BRDSettings\
    \ sharedInstance].notificationMinute = components.minute;\n}\n```"
- fmt: "Build and run. You should not only find that the settings are getting saved\
    \ when you make changes to the notification alert time, but that the time is also\
    \ updated in the main Settings view controller, because our Settings view controller\
    \ updates its static table view cells each time its view appears.\n\nTo finish\
    \ the *Birthday Reminder* settings, we now need to create a class for our Days\
    \ Before view controller. With the `user-interface/view-controllers` Xcode group\
    \ selected in the Project Navigator, create a new Objective-C class named `BRDaysBeforeViewController`\
    \ that subclasses Apple’s `UITableViewController`. In your storyboard, select\
    \ the Days Before table view controller and using the identity inspector, change\
    \ the custom class to your new `BRDaysBeforeViewController` class.\n\nWhile we’re\
    \ working on the storyboard, select the prototype table cell for the Days Before\
    \ scene, change its style to Basic, and set its reuse identifier to `Cell`. Finally,\
    \ select the table view and change its Style to Grouped.\n\nClear out any Xcode\
    \ stub code and replace it with the following, commented implementation of `BRDaysBeforeViewController.m`:\n\
    \n```\n#import \"BRDaysBeforeViewController.h\"\n#import \"BRDSettings.h\"\n\n\
    @implementation BRDaysBeforeViewController\n\n-(void) viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    UIImageView *backgroundView = [[UIImageView alloc] initWithImage:[UIImage\n\
    imageNamed:@\"app-background.png\"]];\n    [self.tableView setBackgroundView:backgroundView];\n\
    }\n\n#pragma mark - UITableViewDataSource\n\n-(UITableViewCell *) tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath\n*)indexPath\n{\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\"];\n    cell.textLabel.text\
    \ = [[BRDSettings sharedInstance] titleForDaysBefore:indexPath.row];\n    //if\
    \ this index path row is the stored days before setting then display a checkmark\
    \ tick\nin the table cell\n    cell.accessoryType = ([BRDSettings sharedInstance].daysBefore\
    \ == indexPath.row) ? UITableViewCellAccessoryCheckmark : UITableViewCellAccessoryNone;\n\
    \    return cell;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    //we could alternatively just return a total row count of 8 but this makes\
    \ use of the last enumerated value to get the total count\n    return BRDaysBeforeTypeThreeWeeks\
    \ + 1;\n}\n\n#pragma mark - UITableViewDelegate\n\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n\n    if (indexPath.row\
    \ == [BRDSettings sharedInstance].daysBefore) {\n        //if it's the current\
    \ ticked row then ignore\n        [tableView deselectRowAtIndexPath:indexPath\
    \ animated:YES];\n        return;\n    }\n\n    NSIndexPath *oldIndexPath = [NSIndexPath\
    \ indexPathForRow:[BRDSettings sharedInstance].daysBefore inSection:0];\n    //Update\
    \ the stored days before setting for the user\n    [BRDSettings sharedInstance].daysBefore\
    \ = indexPath.row;\n    //The user has changed the selected days before row so\
    \ we need to reload the table cells\nfor the old and new rows\n    [tableView\
    \ reloadRowsAtIndexPaths:@[oldIndexPath,indexPath] withRowAnimation:UITableViewRowAnimationNone];\n\
    }\n\n@end\n```\n\nBuild and run. You should be able to modify the Days Before\
    \ setting, and again see changes reflected in the main settings screen, as shown\
    \ in [Figure 12-9](#Chapter12.html#fig_12_9).\n\n![Image](images/9781430243748_Fig12-09.jpg)\n\
    \n**Figure 12-9.** User-controlled Days Before settings\n\n### Updating birthdays\n\
    \nWe’re going to move our attention to the data model of our app once more. We’re\
    \ currently storing two persistent properties in our birthday entities that won’t\
    \ remain constant over time: `nextBirthday` and `nextBirthdayAge`. So one task\
    \ that we will need to address before our app is complete is to regularly update\
    \ any cached birthdays when the `nextBirthday` property passes and becomes the\
    \ friend’s last birthday!\n\nWe’re going to create a public method in our model\
    \ singleton for looping through the database of birthday entities, updating any\
    \ `nextBirthday` values that are out-of-date.\n\nOpen `BRDModel.h` in Xcode and\
    \ add the new public method declaration to the interface:\n\n`-(void) updateCachedBirthdays;`\n\
    \nEach time the cached birthdays are updated, we’ll also dispatch a notification\
    \ so that any view controller can update its view when the order of the next birthdays\
    \ changes. At the top of `BRDModel.h` and above the interface declaration, add\
    \ a new constant string declaration for this notification name:\n\n`#define BRNotificationCachedBirthdaysDidUpdate\
    \ @\"BRNotificationCachedBirthdaysDidUpdate\"`\n\nSwitch to the `BRDModel.m` implementation\
    \ and add the following birthday entity update code `updateCachedBirthdays`:\n\
    \n```\n-(void) updateCachedBirthdays\n{\n\n    NSFetchRequest *fetchRequest =\
    \ [[NSFetchRequest alloc] init];\n\n    NSManagedObjectContext *context = self.managedObjectContext;\n\
    \n    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"BRDBirthday\"\
    \ inManagedObjectContext:context];\n    fetchRequest.entity = entity;\n\n    //Fetch\
    \ all the birthday entities in order of next birthday\n    NSSortDescriptor *sortDescriptor\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"nextBirthday\" ascending:YES];\n\
    \    NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n    fetchRequest.sortDescriptors = sortDescriptors;\n\n    NSFetchedResultsController\
    \ *fetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\
    \ managedObjectContext:context sectionNameKeyPath:nil cacheName:nil];\n\n    NSError\
    \ *error = nil;\n    if (![fetchedResultsController performFetch:&error]) {\n\n\
    \        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n     \
    \   abort();\n    }\n\n    NSArray *fetchedObjects = fetchedResultsController.fetchedObjects;\n\
    \    NSInteger resultCount = [fetchedObjects count];\n\n    BRDBirthday *birthday;\n\
    \n    NSDate *now = [NSDate date];\n    NSDateComponents *dateComponentsToday\
    \ = [[NSCalendar currentCalendar] components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
    \ fromDate:now];\n    //This creates a date with time 00:00 today\n    NSDate\
    \ *today = [[NSCalendar currentCalendar] dateFromComponents:dateComponentsToday];\n\
    \n    for (int i = 0; i < resultCount; i++) {\n        birthday = (BRDBirthday\
    \ *) fetchedObjects[i];\n        //if next birthday has past then we'll need to\
    \ update the birthday entity\n        if ([today compare:birthday.nextBirthday]\
    \ == NSOrderedDescending) {\n            //next birthday is now incorrect and\
    \ is in the past...\n            [birthday updateNextBirthdayAndAge];\n      \
    \  }\n    }\n\n    [self saveChanges];\n\n    //Let any observer's know that the\
    \ birthdays in our database have been updated\n    [[NSNotificationCenter defaultCenter]\
    \ postNotificationName:BRNotificationCachedBirthdaysDidUpdate object:self userInfo:nil];\n\
    }\n```\n\nThe method begins by retrieving all Core Data birthday entities in our\
    \ cached store. The results set is ordered by the `nextBirthday` property. We\
    \ loop through the results set, and compare the `nextBirthday` value to midnight\
    \ on the start of today’s date. If the next birthday is now the user’s latest\
    \ birthday, then we invoke `updateNextBirthdayAndAge` on the out-of-date birthday\
    \ entity, and it updates itself accordingly."
  raw: 'Build and run. You should not only find that the settings are getting saved
    when you make changes to the notification alert time, but that the time is also
    updated in the main Settings view controller, because our Settings view controller
    updates its static table view cells each time its view appears.


    To finish the *Birthday Reminder* settings, we now need to create a class for
    our Days Before view controller. With the `user-interface/view-controllers` Xcode
    group selected in the Project Navigator, create a new Objective-C class named
    `BRDaysBeforeViewController` that subclasses Apple’s `UITableViewController`.
    In your storyboard, select the Days Before table view controller and using the
    identity inspector, change the custom class to your new `BRDaysBeforeViewController`
    class.


    While we’re working on the storyboard, select the prototype table cell for the
    Days Before scene, change its style to Basic, and set its reuse identifier to
    Cell. Finally, select the table view and change its Style to Grouped.


    Clear out any Xcode stub code and replace it with the following, commented implementation
    of `BRDaysBeforeViewController.m`:


    `#import "BRDaysBeforeViewController.h"`

    `#import "BRDSettings.h"`


    `@implementation BRDaysBeforeViewController`


    `-(void) viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    UIImageView *backgroundView = [[UIImageView alloc] initWithImage:[UIImage`

    `imageNamed:@"app-background.png"]];`

    `    [self.tableView setBackgroundView:backgroundView];`

    `}`


    `#pragma mark - UITableViewDataSource`


    `-(UITableViewCell *) tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath`

    `*)indexPath`

    `{`

    `    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"Cell"];`

    `    cell.textLabel.text = [[BRDSettings sharedInstance] titleForDaysBefore:indexPath.row];`

    `    //if this index path row is the stored days before setting then display a
    checkmark tick`

    `in the table cell`

    `    cell.accessoryType = ([BRDSettings sharedInstance].daysBefore == indexPath.row)
    ? UITableViewCellAccessoryCheckmark : UITableViewCellAccessoryNone;`

    `    return cell;`

    `}`


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `    //we could alternatively just return a total row count of 8 but this makes
    use of the last enumerated value to get the total count`

    `    return BRDaysBeforeTypeThreeWeeks + 1;`

    `}`


    `#pragma mark - UITableViewDelegate`


    `- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`


    `    if (indexPath.row == [BRDSettings sharedInstance].daysBefore) {`

    `        //if it''s the current ticked row then ignore`

    `        [tableView deselectRowAtIndexPath:indexPath animated:YES];`

    `        return;`

    `    }`


    `    NSIndexPath *oldIndexPath = [NSIndexPath indexPathForRow:[BRDSettings sharedInstance].daysBefore
    inSection:0];`

    `    //Update the stored days before setting for the user`

    `    [BRDSettings sharedInstance].daysBefore = indexPath.row;`

    `    //The user has changed the selected days before row so we need to reload
    the table cells`

    `for the old and new rows`

    `    [tableView reloadRowsAtIndexPaths:@[oldIndexPath,indexPath] withRowAnimation:UITableViewRowAnimationNone];`

    `}`


    `@end`


    Build and run. You should be able to modify the Days Before setting, and again
    see changes reflected in the main settings screen, as shown in [Figure 12-9](#Chapter12.html#fig_12_9).


    ![Image](images/9781430243748_Fig12-09.jpg)


    **Figure 12-9.** User-controlled Days Before settings


    ### Updating birthdays


    We’re going to move our attention to the data model of our app once more. We’re
    currently storing two persistent properties in our birthday entities that won’t
    remain constant over time: `nextBirthday` and `nextBirthdayAge`. So one task that
    we will need to address before our app is complete is to regularly update any
    cached birthdays when the `nextBirthday` property passes and becomes the friend’s
    last birthday!


    We’re going to create a public method in our model singleton for looping through
    the database of birthday entities, updating any `nextBirthday` values that are
    out-of-date.


    Open `BRDModel.h` in Xcode and add the new public method declaration to the interface:


    `-(void) updateCachedBirthdays;`


    Each time the cached birthdays are updated, we’ll also dispatch a notification
    so that any view controller can update its view when the order of the next birthdays
    changes. At the top of `BRDModel.h` and above the interface declaration, add a
    new constant string declaration for this notification name:


    `#define BRNotificationCachedBirthdaysDidUpdate`

    `@"BRNotificationCachedBirthdaysDidUpdate"`


    Switch to the `BRDModel.m` implementation and add the following birthday entity
    update code `updateCachedBirthdays`:


    `-(void) updateCachedBirthdays`

    `{`


    `    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];`


    `    NSManagedObjectContext *context = self.managedObjectContext;`


    `    NSEntityDescription *entity = [NSEntityDescription entityForName:@"BRDBirthday"
    inManagedObjectContext:context];`

    `    fetchRequest.entity = entity;`


    `    //Fetch all the birthday entities in order of next birthday`

    `    NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@"nextBirthday"
    ascending:YES];`

    `    NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,
    nil];`

    `    fetchRequest.sortDescriptors = sortDescriptors;`


    `    NSFetchedResultsController *fetchedResultsController = [[NSFetchedResultsController
    alloc] initWithFetchRequest:fetchRequest managedObjectContext:context sectionNameKeyPath:nil
    cacheName:nil];`


    `    NSError *error = nil;`

    `    if (![fetchedResultsController performFetch:&error]) {`


    `        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `        abort();`

    `    }`


    `    NSArray *fetchedObjects = fetchedResultsController.fetchedObjects;`

    `    NSInteger resultCount = [fetchedObjects count];`


    `    BRDBirthday *birthday;`


    `    NSDate *now = [NSDate date];`

    `    NSDateComponents *dateComponentsToday = [[NSCalendar currentCalendar] components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit
    fromDate:now];`

    `    //This creates a date with time 00:00 today`

    `    NSDate *today = [[NSCalendar currentCalendar] dateFromComponents:dateComponentsToday];`


    `    for (int i = 0; i < resultCount; i++) {`

    `        birthday = (BRDBirthday *) fetchedObjects[i];`

    `        //if next birthday has past then we''ll need to update the birthday entity`

    `        if ([today compare:birthday.nextBirthday] == NSOrderedDescending) {`

    `            //next birthday is now incorrect and is in the past...`

    `            [birthday updateNextBirthdayAndAge];`

    `        }`

    `    }`


    `    [self saveChanges];`


    `    //Let any observer''s know that the birthdays in our database have been updated`

    `    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationCachedBirthdaysDidUpdate
    object:self userInfo:nil];`

    `}`


    The method begins by retrieving all Core Data birthday entities in our cached
    store. The results set is ordered by the `nextBirthday` property. We loop through
    the results set, and compare the `nextBirthday` value to midnight on the start
    of today’s date. If the next birthday is now the user’s latest birthday, then
    we invoke `updateNextBirthdayAndAge` on the out-of-date birthday entity, and it
    updates itself accordingly.'
  trans: "\n构建并运行。你会发现，不仅更改通知提醒时间时设置会保存，而且主设置视图控制器中的时间也会更新，因为我们的设置视图控制器每次视图出现时都会更新其静态表格视图单元格。\n\
    \n为了完成*生日提醒*的设置，我们现在需要为“天数提前”视图控制器创建一个类。在项目导航器中选中 `user-interface/view-controllers`\
    \ 这个 Xcode 组，然后创建一个新的 Objective-C 类，命名为 `BRDaysBeforeViewController`，它应继承自 Apple\
    \ 的 `UITableViewController`。在你的故事板中，选中“天数提前”表格视图控制器，然后使用标识检查器，将自定义类改为你的新 `BRDaysBeforeViewController`\
    \ 类。\n\n当我们处理故事板时，选中“天数提前”场景的原型表格单元格，将其样式改为 Basic，并将其复用标识符设置为 `Cell`。最后，选中表格视图，将其样式改为\
    \ Grouped。\n\n清空所有 Xcode 的存根代码，并将其替换为以下带有注释的 `BRDaysBeforeViewController.m` 实现：\n\
    \n```\n#import \"BRDaysBeforeViewController.h\"\n#import \"BRDSettings.h\"\n\n\
    @implementation BRDaysBeforeViewController\n\n-(void) viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    UIImageView *backgroundView = [[UIImageView alloc] initWithImage:[UIImage\n\
    imageNamed:@\"app-background.png\"]];\n    [self.tableView setBackgroundView:backgroundView];\n\
    }\n\n#pragma mark - UITableViewDataSource\n\n-(UITableViewCell *) tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath\n*)indexPath\n{\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\"];\n    cell.textLabel.text\
    \ = [[BRDSettings sharedInstance] titleForDaysBefore:indexPath.row];\n    // 如果当前索引路径的行是存储的天数提前设置，则在表格单元格中显示勾选标记\n\
    \    cell.accessoryType = ([BRDSettings sharedInstance].daysBefore == indexPath.row)\
    \ ? UITableViewCellAccessoryCheckmark : UITableViewCellAccessoryNone;\n    return\
    \ cell;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    // 我们也可以直接返回总行数 8，但这利用了最后一个枚举值来获取总数\n    return BRDaysBeforeTypeThreeWeeks\
    \ + 1;\n}\n\n#pragma mark - UITableViewDelegate\n\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n\n    if (indexPath.row\
    \ == [BRDSettings sharedInstance].daysBefore) {\n        // 如果它是当前勾选的行，则忽略\n \
    \       [tableView deselectRowAtIndexPath:indexPath animated:YES];\n        return;\n\
    \    }\n\n    NSIndexPath *oldIndexPath = [NSIndexPath indexPathForRow:[BRDSettings\
    \ sharedInstance].daysBefore inSection:0];\n    // 为用户更新存储的天数提前设置\n    [BRDSettings\
    \ sharedInstance].daysBefore = indexPath.row;\n    // 用户更改了选中的天数提前行，因此我们需要重新加载旧行和新行的表格单元格\n\
    \    [tableView reloadRowsAtIndexPaths:@[oldIndexPath,indexPath] withRowAnimation:UITableViewRowAnimationNone];\n\
    }\n\n@end\n```\n\n构建并运行。你应该能够修改“天数提前”设置，并再次看到更改反映在主设置屏幕上，如图 12-9 所示。\n\n![Image](img/9781430243748_Fig12-09.jpg)\n\
    \n**图 12-9.** 用户控制的天数提前设置\n\n### 更新生日\n\n我们再次将注意力转向应用的数据模型。目前，我们在生日实体中存储了两个不会随时间保持不变的持久化属性：`nextBirthday`\
    \ 和 `nextBirthdayAge`。因此，在应用完成之前，我们需要解决的一个任务是，当 `nextBirthday` 属性过期并变成朋友的上一个生日时，定期更新任何缓存的生日！\n\
    \n我们将在模型单例中创建一个公开方法，用于遍历生日实体数据库，更新任何过期的 `nextBirthday` 值。\n\n在 Xcode 中打开 `BRDModel.h`，并将新的公开方法声明添加到接口中：\n\
    \n`-(void) updateCachedBirthdays;`\n\n每次更新缓存的生日时，我们还会分发一个通知，以便当下次生日的顺序发生变化时，任何视图控制器都能更新其视图。在\
    \ `BRDModel.h` 的顶部、接口声明之上，为此通知名称添加一个新的常量字符串声明：\n\n`#define BRNotificationCachedBirthdaysDidUpdate\
    \ @\"BRNotificationCachedBirthdaysDidUpdate\"`\n\n切换到 `BRDModel.m` 实现，并添加以下生日实体更新代码\
    \ `updateCachedBirthdays`：\n\n```\n-(void) updateCachedBirthdays\n{\n\n    NSFetchRequest\
    \ *fetchRequest = [[NSFetchRequest alloc] init];\n\n    NSManagedObjectContext\
    \ *context = self.managedObjectContext;\n\n    NSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"BRDBirthday\" inManagedObjectContext:context];\n    fetchRequest.entity\
    \ = entity;\n\n    // 按下一次生日的顺序获取所有生日实体\n    NSSortDescriptor *sortDescriptor\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"nextBirthday\" ascending:YES];\n\
    \    NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n    fetchRequest.sortDescriptors = sortDescriptors;\n\n    NSFetchedResultsController\
    \ *fetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\
    \ managedObjectContext:context sectionNameKeyPath:nil cacheName:nil];\n\n    NSError\
    \ *error = nil;\n    if (![fetchedResultsController performFetch:&error]) {\n\n\
    \        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n     \
    \   abort();\n    }\n\n    NSArray *fetchedObjects = fetchedResultsController.fetchedObjects;\n\
    \    NSInteger resultCount = [fetchedObjects count];\n\n    BRDBirthday *birthday;\n\
    \n    NSDate *now = [NSDate date];\n    NSDateComponents *dateComponentsToday\
    \ = [[NSCalendar currentCalendar] components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
    \ fromDate:now];\n    // 这会创建一个时间为今天 00:00 的日期\n    NSDate *today = [[NSCalendar\
    \ currentCalendar] dateFromComponents:dateComponentsToday];\n\n    for (int i\
    \ = 0; i < resultCount; i++) {\n        birthday = (BRDBirthday *) fetchedObjects[i];\n\
    \        // 如果下一次生日已经过去，那么我们需要更新生日实体\n        if ([today compare:birthday.nextBirthday]\
    \ == NSOrderedDescending) {\n            // 下一次生日现在不正确，并且已经过去了...\n          \
    \  [birthday updateNextBirthdayAndAge];\n        }\n    }\n\n    [self saveChanges];\n\
    \n    // 让所有观察者知道我们数据库中的生日已更新\n    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationCachedBirthdaysDidUpdate\
    \ object:self userInfo:nil];\n}\n```\n\n该方法首先从缓存存储中检索所有 Core Data 生日实体。结果集按 `nextBirthday`\
    \ 属性排序。我们遍历结果集，并将 `nextBirthday` 值与今天日期的午夜时间进行比较。如果下一次生日现在是用户最近的生日，那么我们在过期的生日实体上调用\
    \ `updateNextBirthdayAndAge`，它会相应地更新自身。\n"
- fmt: "# 排版后\n\nWhere and when should we call our new `updateCachedBirthdays` method?\
    \ At minimum, we should call it each time the *Birthday Reminder* app is brought\
    \ into the foreground by the user. That would be each time our app becomes the\
    \ active multitasking app—or whenever the user relaunches our app. Apps can remain\
    \ in the background for days and weeks, depending on their memory footprint, so\
    \ we need to cater for that scenario.\n\nOpen the `BRAppDelegate.m` source file.\
    \ Begin by importing `BRDModel.h`, and then modify the `applicationDidBecomeActive:`\
    \ method to the following:\n\n```\n- (void)applicationDidBecomeActive:(UIApplication\
    \ *)application\n{\n    [[BRDModel sharedInstance] updateCachedBirthdays];\n}\n\
    ```\n\nOne view that we will need to update when the cache updates is our Home\
    \ view controller table view, if it’s currently the foremost view controller.\
    \ The ordered table of birthdays changes each time the most recent birthday elapses.\
    \ That birthday will need to be updated and become the furthermost, or last, birthday\
    \ at the very end of our table. We deal with this scenario by observing the `BRNotificationCachedBirthdaysDidUpdate`\
    \ notification and simply reload the table view on the home screen. Open `BRHomeViewController.m`\
    \ and add the following highlighted code changes:\n\n```\n-(void) viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    [self.tableView reloadData];\n  \
    \  self.hasFriends = [self.fetchedResultsController.fetchedObjects count] > 0;\n\
    \    [[NSNotificationCenter defaultCenter] addObserver:self\n                \
    \                             selector:@selector(handleCachedBirthdaysDidUpdate:)\n\
    \                                                 name:BRNotificationCachedBirthdaysDidUpdate\
    \ object:nil];\n}\n\n-(void) viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    [[NSNotificationCenter defaultCenter] removeObserver:self name:BRNotificationCachedBirthdaysDidUpdate\
    \ object:nil];\n}\n\n-(void) handleCachedBirthdaysDidUpdate:(NSNotification *)notification\n\
    {\n    //if the cache updates simply reload the table view\n    [self.tableView\
    \ reloadData];\n}\n```\n\nWe only need to handle the cache update notification\
    \ when the Home view controller is already displayed because our home table view\
    \ reloads each time it’s about to appear in the existing `viewWillAppear:` method.\
    \ So, we add the Home view controller as an observer of the `BRNotificationCachedBirthdaysDidUpdate`\
    \ notification when it appears, and we remove it as an observer when it disappears.\n\
    \nCheck at this point that your app still compiles OK. Any previously cached birthdays\
    \ with passed *next birthday*s should update and the Home view controller should\
    \ now send them to the bottom of the table.\n\n## Scheduling and firing reminder\
    \ local notifications\n\nWe’re also going to implement scheduled local notification\
    \ reminders for the soonest upcoming birthdays. Local notifications display just\
    \ like push notifications in iOS: they are fired by the operating system even\
    \ when our app isn’t running (see [Figure 12-10](#Chapter12.html#fig_12_10)).\n\
    \n![Image](images/9781430243748_Fig12-10.jpg)\n\n**Figure 12-10.** A scheduled\
    \ local notification\n\niOS permits each third-party app to schedule up to 64\
    \ local notifications. Go over this limit and additional notifications are ignored.\
    \ Sixty-four notifications are plenty of birthday reminders for us; in fact, 20\
    \ should be more than sufficient. As long as we regularly reset and reschedule\
    \ the 20 soonest birthdays, that should be enough for *Birthday Reminder* to achieve\
    \ its core reminder functionality.\n\nJust like push notifications, local notifications\
    \ can play a custom sound when they fire. I’ve actually created a `HappyBirthday.m4a`\
    \ sound file using Apple’s Garage Band software. It’s a bit amateur to say the\
    \ least— but it’s kind of fun too. ![Image](images/smile.jpg) Add the `HappyBirthday.m4a`\
    \ file to your project resources, you’ll find it in the assets source for this\
    \ chapter.\n\nShortly, we’re going to expand the code for our new `updateCachedBirthdays`\
    \ method in our model singleton to schedule the next 20 birthday reminders. Before\
    \ we do this, we’re going to add a couple of helper methods to our `BRDSettings`\
    \ class for two purposes:\n\n> *   To calculate the reminder date/time for a birthday\
    \ based on user preferences.\n> *   To configure the notification text of the\
    \ reminder based on the difference between the reminder date and the friend’s\
    \ next birthday.\n\nOpen `BRDSettings.h` and add the following modifications to\
    \ its header:\n\n```\n@class BRDBirthday;\n\n@interface BRDSettings : NSObject\n\
    \n+ (BRDSettings*)sharedInstance;\n\n@property (nonatomic) int notificationHour;\n\
    @property (nonatomic) int notificationMinute;\n@property (nonatomic) BRDaysBeforeType\
    \ daysBefore;\n\n-(NSString *) titleForNotificationTime;\n-(NSString *) titleForDaysBefore:(BRDaysBeforeType)daysBefore;\n\
    \n-(NSDate *) reminderDateForNextBirthday:(NSDate *)nextBirthday;\n-(NSString\
    \ *) reminderTextForNextBirthday:(BRDBirthday *)birthday;\n\n@end\n```\n\nWe’ve\
    \ added a forward class declaration for the `BRDBirthday` entity class so that\
    \ we are able to reference a birthday entity in the new `reminderTextForNextBirthday:`\
    \ method. Switch to the implementation of these two new public methods. In `BRDSettings.m`,\
    \ import `BRDBirthday.h`, and then implement the `reminderDateForNextBirthday:`\
    \ method, commented as follows:\n\n```\n-(NSDate *) reminderDateForNextBirthday:(NSDate\
    \ *)nextBirthday\n{\n    NSTimeInterval timeInterval;\n    NSTimeInterval secondsInOneDay\
    \ = 60.f * 60.f * 24.f;\n\n    //work out how many days to detract from the friend's\
    \ next birthday for the reminder date\n    switch (self.daysBefore) {\n      \
    \  case BRDaysBeforeTypeOnBirthday:\n            timeInterval = 0.f;\n       \
    \     break;\n        case BRDaysBeforeTypeOneDay:\n            timeInterval =\
    \ secondsInOneDay;\n            break;\n        case BRDaysBeforeTypeTwoDays:\n\
    \            timeInterval = secondsInOneDay * 2.f;\n            break;\n     \
    \   case BRDaysBeforeTypeThreeDays:\n            timeInterval = secondsInOneDay\
    \ * 3.f;\n            break;\n        case BRDaysBeforeTypeFiveDays:\n       \
    \     timeInterval = secondsInOneDay * 5.f;\n            break;\n        case\
    \ BRDaysBeforeTypeOneWeek:\n            timeInterval = secondsInOneDay * 7.f;\n\
    \            break;\n        case BRDaysBeforeTypeTwoWeeks:\n            timeInterval\
    \ = secondsInOneDay * 14.f;\n            break;\n        case BRDaysBeforeTypeThreeWeeks:\n\
    \            timeInterval = secondsInOneDay * 21.f;\n            break;\n    }\n\
    \n    //This creates the day of the reminder at time 00:00\n    NSDate *reminderDate\
    \ = [nextBirthday dateByAddingTimeInterval:-timeInterval];\n```"
  raw: 'Where and when should we call our new `updateCachedBirthdays` method? At minimum,
    we should call it each time the *Birthday Reminder* app is brought into the foreground
    by the user. That would be each time our app becomes the active multitasking app—or
    whenever the user relaunches our app. Apps can remain in the background for days
    and weeks, depending on their memory footprint, so we need to cater for that scenario.


    Open the `BRAppDelegate.m` source file. Begin by importing `BRDModel.h`, and then
    modify the `applicationDidBecomeActive:` method to the following:


    `- (void)applicationDidBecomeActive:(UIApplication *)application`

    `{`

    `    [[BRDModel sharedInstance] updateCachedBirthdays];`

    `}`


    One view that we will need to update when the cache updates is our Home view controller
    table view, if it’s currently the foremost view controller. The ordered table
    of birthdays changes each time the most recent birthday elapses. That birthday
    will need to be updated and become the furthermost, or last, birthday at the very
    end of our table. We deal with this scenario by observing the `BRNotificationCachedBirthdaysDidUpdate`
    notification and simply reload the table view on the home screen. Open `BRHomeViewController.m`
    and add the following highlighted code changes:


    `-(void) viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`

    `    [self.tableView reloadData];`

    `    self.hasFriends = [self.fetchedResultsController.fetchedObjects count] >
    0;`

    **`    [[NSNotificationCenter defaultCenter] addObserver:self`

    `selector:@selector(handleCachedBirthdaysDidUpdate:)`

    `name:BRNotificationCachedBirthdaysDidUpdate object:nil];`**

    `}`


    **`-(void) viewWillDisappear:(BOOL)animated`**

    **`{`**

    **`    [super viewWillDisappear:animated];`**

    **`    [[NSNotificationCenter defaultCenter] removeObserver:self name:BRNotificationCachedBirthdaysDidUpdate
    object:nil];`**

    **`}`**


    **`-(void) handleCachedBirthdaysDidUpdate:(NSNotification *)notification`**

    **`{`**

    **`    //if the cache updates simply reload the table view`**

    **`    [self.tableView reloadData];`**

    **`}`**


    We only need to handle the cache update notification when the Home view controller
    is already displayed because our home table view reloads each time it’s about
    to appear in the existing `viewWillAppear:` method. So, we add the Home view controller
    as an observer of the `BRNotificationCachedBirthdaysDidUpdate` notification when
    it appears, and we remove it as an observer when it disappears.


    Check at this point that your app still compiles OK. Any previously cached birthdays
    with passed *next birthday*s should update and the Home view controller should
    now send them to the bottom of the table.


    ### Scheduling and firing reminder local notifications


    We’re also going to implement scheduled local notification reminders for the soonest
    upcoming birthdays. Local notifications display just like push notifications in
    iOS: they are fired by the operating system even when our app isn’t running (see
    [Figure 12-10](#Chapter12.html#fig_12_10)).


    ![Image](images/9781430243748_Fig12-10.jpg)


    **Figure 12-10.** A scheduled local notification


    iOS permits each third-party app to schedule up to 64 local notifications. Go
    over this limit and additional notifications are ignored. Sixty-four notifications
    are plenty of birthday reminders for us; in fact, 20 should be more than sufficient.
    As long as we regularly reset and reschedule the 20 soonest birthdays, that should
    be enough for *Birthday Reminder* to achieve its core reminder functionality.


    Just like push notifications, local notifications can play a custom sound when
    they fire. I’ve actually created a `HappyBirthday.m4a` sound file using Apple’s
    Garage Band software. It’s a bit amateur to say the least— but it’s kind of fun
    too. ![Image](images/smile.jpg) Add the `HappyBirthday.m4a` file to your project
    resources, you’ll find it in the assets source for this chapter.


    Shortly, we’re going to expand the code for our new `updateCachedBirthdays` method
    in our model singleton to schedule the next 20 birthday reminders. Before we do
    this, we’re going to add a couple of helper methods to our `BRDSettings` class
    for two purposes:


    > *   To calculate the reminder date/time for a birthday based on user preferences.

    > *   To configure the notification text of the reminder based on the difference
    between the reminder date and the friend’s next birthday.


    Open `BRDSettings.h` and add the following modifications to its header:


    **`@class BRDBirthday;`**


    `@interface BRDSettings : NSObject`


    `+ (BRDSettings*)sharedInstance;`


    `@property (nonatomic) int notificationHour;`

    `@property (nonatomic) int notificationMinute;`

    `@property (nonatomic) BRDaysBeforeType daysBefore;`


    `-(NSString *) titleForNotificationTime;`

    `-(NSString *) titleForDaysBefore:(BRDaysBeforeType)daysBefore;`


    **`-(NSDate *) reminderDateForNextBirthday:(NSDate *)nextBirthday;`**

    **`-(NSString *) reminderTextForNextBirthday:(BRDBirthday *)birthday;`**


    `@end`


    We’ve added a forward class declaration for the `BRDBirthday` entity class so
    that we are able to reference a birthday entity in the new `reminderTextForNextBirthday:`
    method. Switch to the implementation of these two new public methods. In `BRDSettings.m`,
    import `BRDBirthday.h`, and then implement the `reminderDateForNextBirthday:`
    method, commented as follows:


    `-(NSDate *) reminderDateForNextBirthday:(NSDate *)nextBirthday`

    `{`

    `    NSTimeInterval timeInterval;`

    `    NSTimeInterval secondsInOneDay = 60.f * 60.f * 24.f;`


    `    //work out how many days to detract from the friend''s next birthday for
    the reminder date`

    `    switch (self.daysBefore) {`

    `        case BRDaysBeforeTypeOnBirthday:`

    `            timeInterval = 0.f;`

    `            break;`

    `        case BRDaysBeforeTypeOneDay:`

    `            timeInterval = secondsInOneDay;`

    `            break;`

    `        case BRDaysBeforeTypeTwoDays:`

    `            timeInterval = secondsInOneDay * 2.f;`

    `            break;`

    `        case BRDaysBeforeTypeThreeDays:`

    `            timeInterval = secondsInOneDay * 3.f;`

    `            break;`

    `        case BRDaysBeforeTypeFiveDays:`

    `            timeInterval = secondsInOneDay * 5.f;`

    `            break;`

    `        case BRDaysBeforeTypeOneWeek:`

    `            timeInterval = secondsInOneDay * 7.f;`

    `            break;`

    `        case BRDaysBeforeTypeTwoWeeks:`

    `            timeInterval = secondsInOneDay * 14.f;`

    `            break;`

    `        case BRDaysBeforeTypeThreeWeeks:`

    `            timeInterval = secondsInOneDay * 21.f;`

    `            break;`

    `    }`


    `    //This creates the day of the reminder at time 00:00`

    `    NSDate *reminderDate = [nextBirthday dateByAddingTimeInterval:-timeInterval];`'
  trans: "\n# 排版后\n\n我们应在何时何地调用新的 `updateCachedBirthdays` 方法？至少，每次用户将 *Birthday Reminder*\
    \ 应用带到前台时都应调用它。也就是说，每当我们的应用成为活跃的多任务应用，或者用户重新启动应用时，都需要调用。应用可能在后台停留数天甚至数周（具体取决于其内存占用），因此我们需要应对这种情况。\n\
    \n打开 `BRAppDelegate.m` 源文件。首先导入 `BRDModel.h`，然后修改 `applicationDidBecomeActive:`\
    \ 方法如下：\n\n```\n- (void)applicationDidBecomeActive:(UIApplication *)application\n\
    {\n    [[BRDModel sharedInstance] updateCachedBirthdays];\n}\n```\n\n当缓存更新时，如果我们的主页视图控制器（Home\
    \ view controller）的表格视图当前处于最前，则需要更新它。每次最近的生日过去时，有序的生日表格就会发生变化。那个已经过去的生日需要被更新，并移动到表格的末尾，成为最远（即最后一个）生日。我们通过观察\
    \ `BRNotificationCachedBirthdaysDidUpdate` 通知来处理这种情况，并简单地重新加载主页屏幕上的表格视图。打开 `BRHomeViewController.m`，并添加以下高亮显示的代码更改：\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [self.tableView reloadData];\n    self.hasFriends = [self.fetchedResultsController.fetchedObjects\
    \ count] > 0;\n    [[NSNotificationCenter defaultCenter] addObserver:self\n  \
    \                                           selector:@selector(handleCachedBirthdaysDidUpdate:)\n\
    \                                                 name:BRNotificationCachedBirthdaysDidUpdate\
    \ object:nil];\n}\n\n-(void) viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    [[NSNotificationCenter defaultCenter] removeObserver:self name:BRNotificationCachedBirthdaysDidUpdate\
    \ object:nil];\n}\n\n-(void) handleCachedBirthdaysDidUpdate:(NSNotification *)notification\n\
    {\n    //如果缓存更新，只需重新加载表格视图\n    [self.tableView reloadData];\n}\n```\n\n我们只需要在主页视图控制器已经显示时处理缓存更新通知，因为我们的主页表格视图在现有\
    \ `viewWillAppear:` 方法中每次即将出现时都会重新加载。因此，我们在主页视图控制器出现时将其添加为 `BRNotificationCachedBirthdaysDidUpdate`\
    \ 通知的观察者，并在其消失时移除观察者。\n\n此时检查一下，确保应用仍能正常编译。任何之前缓存的、*下一个生日* 已过去的生日应该会被更新，并且主页视图控制器现在会将它们移动到表格底部。\n\
    \n## 调度和触发提醒本地通知\n\n我们还将为即将到来的最近几个生日实现调度的本地通知提醒。在 iOS 中，本地通知的显示方式与推送通知相同：即使我们的应用未运行，操作系统也会触发它们（请参见\
    \ 图 12-10）。\n\n![Image](img/9781430243748_Fig12-10.jpg)\n\n**图 12-10.** 一个调度的本地通知\n\
    \niOS 允许每个第三方应用最多调度 64 个本地通知。如果超过此限制，额外的通知将被忽略。对我们来说，64 个生日提醒绰绰有余；事实上，20 个应该就足够了。只要我们有规律地重置并重新调度最近的\
    \ 20 个生日，就足以让 *Birthday Reminder* 实现其核心提醒功能。\n\n与推送通知一样，本地通知在触发时可以播放自定义声音。我实际上使用苹果的\
    \ Garage Band 软件创建了一个 `HappyBirthday.m4a` 声音文件。至少可以说它有点业余——但也挺有趣的。![Image](img/smile.jpg)\
    \ 将 `HappyBirthday.m4a` 文件添加到你的项目资源中，你可以在本章的资源文件中找到它。\n\n稍后，我们将扩展模型单例中新的 `updateCachedBirthdays`\
    \ 方法的代码，以调度接下来的 20 个生日提醒。在此之前，我们将为 `BRDSettings` 类添加几个辅助方法，用于两个目的：\n\n> *   根据用户偏好计算生日的提醒日期/时间。\n\
    > *   根据提醒日期与朋友下一个生日之间的差异，配置提醒的通知文本。\n\n打开 `BRDSettings.h`，并向其头文件添加以下修改：\n\n```\n\
    @class BRDBirthday;\n\n@interface BRDSettings : NSObject\n\n+ (BRDSettings*)sharedInstance;\n\
    \n@property (nonatomic) int notificationHour;\n@property (nonatomic) int notificationMinute;\n\
    @property (nonatomic) BRDaysBeforeType daysBefore;\n\n-(NSString *) titleForNotificationTime;\n\
    -(NSString *) titleForDaysBefore:(BRDaysBeforeType)daysBefore;\n\n-(NSDate *)\
    \ reminderDateForNextBirthday:(NSDate *)nextBirthday;\n-(NSString *) reminderTextForNextBirthday:(BRDBirthday\
    \ *)birthday;\n\n@end\n```\n\n我们为 `BRDBirthday` 实体类添加了一个向前类声明，以便能够在新的 `reminderTextForNextBirthday:`\
    \ 方法中引用生日实体。切换到这两个新公共方法的实现。在 `BRDSettings.m` 中，导入 `BRDBirthday.h`，然后实现 `reminderDateForNextBirthday:`\
    \ 方法，注释如下：\n\n```\n-(NSDate *) reminderDateForNextBirthday:(NSDate *)nextBirthday\n\
    {\n    NSTimeInterval timeInterval;\n    NSTimeInterval secondsInOneDay = 60.f\
    \ * 60.f * 24.f;\n\n    // 计算应从朋友的下一个生日中减去多少天，以得到提醒日期\n    switch (self.daysBefore)\
    \ {\n        case BRDaysBeforeTypeOnBirthday:\n            timeInterval = 0.f;\n\
    \            break;\n        case BRDaysBeforeTypeOneDay:\n            timeInterval\
    \ = secondsInOneDay;\n            break;\n        case BRDaysBeforeTypeTwoDays:\n\
    \            timeInterval = secondsInOneDay * 2.f;\n            break;\n     \
    \   case BRDaysBeforeTypeThreeDays:\n            timeInterval = secondsInOneDay\
    \ * 3.f;\n            break;\n        case BRDaysBeforeTypeFiveDays:\n       \
    \     timeInterval = secondsInOneDay * 5.f;\n            break;\n        case\
    \ BRDaysBeforeTypeOneWeek:\n            timeInterval = secondsInOneDay * 7.f;\n\
    \            break;\n        case BRDaysBeforeTypeTwoWeeks:\n            timeInterval\
    \ = secondsInOneDay * 14.f;\n            break;\n        case BRDaysBeforeTypeThreeWeeks:\n\
    \            timeInterval = secondsInOneDay * 21.f;\n            break;\n    }\n\
