    ![图片](img/9781430243748_Fig11-05.jpg)\n\n**图 11-5.** 模态呈现的空 Facebook 导入视图控制器\n\
    \n### 使用账户框架进行 Facebook 身份验证\n\n为了让 *Birthday Reminder* 能够获取 Facebook 好友的生日信息，用户需要先授权我们的应用代表他们与\
