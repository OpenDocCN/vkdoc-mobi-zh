- fmt: 'There’s some new code at the end of the `SLRequest` response handler, the
    `dispatch_sync` function call. The `SLRequest` instance is optimized to execute
    the request on a background thread to avoid freezing up the user interface while
    it runs. However, by dispatching the `BRNotificationFacebookBirthdaysDidUpdate`
    notification in this way, we utilize Apple’s Grand Central Dispatch, and our notification
    will fire on the main thread. This is necessary because our Facebook import view
    controller redraws itself in response to the notification and all user interface
    rendering must be made on the main thread.


    You’ll also spot that we’ve got a `TODO` comment in the code loop where we’ll
    be creating instances of `BRDBirthdayImport`. Our birthday import class already
    has an `initWithAddressBookRecord:` initializer, so we’re now going to write another
    initializer to handle the creation of `BRDBirthdayImport` instances from Facebook
    user dictionaries. Open `BRDBirthdayImport.h` and add the new initializer signature
    to the interface:


    `-(id)initWithFacebookDictionary:(NSDictionary *)facebookDictionary;`


    Now switch to `BRDBirthdayImport.m` and implement the new initializer. I’ve commented
    the code throughout:


    ```

    -(id)initWithFacebookDictionary:(NSDictionary *)facebookDictionary

    {

        self = [super init];

        if (self) {

            self.name = [facebookDictionary objectForKey:@"name"];

            self.uid = [NSString stringWithFormat:@"fb-%@",facebookDictionary[@"id"]];

            self.facebookID = [NSString stringWithFormat:@"%@",facebookDictionary[@"id"]];


            //Facebook provides a convenience URL for Facebook profile pics as long
    as you have the Facebook ID

            self.picURL = [NSString

    stringWithFormat:@"http://graph.facebook.com/%@/picture?type=large",self.facebookID];


            // Facebook returns birthdays in the string format [month]/[day]/[year]
    or

    [month]/[day]

            NSString *birthDateString = [facebookDictionary objectForKey:@"birthday"];

            NSArray *birthdaySegments = [birthDateString componentsSeparatedByString:@"/"];


            self.birthDay =  [NSNumber numberWithInt:[birthdaySegments[1] intValue]];

            self.birthMonth = [NSNumber numberWithInt:[birthdaySegments[0] intValue]];


            if ([birthdaySegments count] > 2) {//includes year

                self.birthYear = [NSNumber numberWithInt:[birthdaySegments[2] intValue]];

            }


            [self updateNextBirthdayAndAge];

        }

        return self;

    }

    ```


    Facebook’s Graph API request returns Facebook user representations as dictionaries
    with keys and values matching the Facebook user fields listed in the parameters
    passed when we initiated the request: `name`, `id`, and `birthday`. As documented
    in the preceding code comments, Facebook will return birthdays in the `[month]/[day]/[year]`
    or `[month]/[day]` string format, so we don’t even need to use `NSDateComponents`
    to break up the birthdays; we can just split the string to extract the month,
    day, and optional year values.


    Most Facebook users have a profile photo. We store a reference to each user’s
    profile photo in the `picURL` of each birthday import object. Thankfully, Facebook
    provides a handy convenience URL for Facebook profile photos as long as you have
    the Facebook ID of the user, which of course we do!


    Let’s head back to `BRDModel.m` to finish off the `fetchFacebookBirthdays` method
    and complete the `TODO` code comment:


    ```

    //TODO - create instances of BRDBirthdayImport

    birthday = [[BRDBirthdayImport alloc] initWithFacebookDictionary:facebookDictionary];

    [birthdays addObject: birthday];

    ```


    ### Loading Facebook friends into the table view


    It’s time to display those Facebook friends and their birthdays in our Facebook
    import table view. The Facebook user birthdays are processed by the model and
    converted to birthday import instances. The array of birthday import objects is
    then dispatched via a notification to any observing objects. Therefore, we need
    to assign our Facebook import view controller as an observer of the `BRNotificationFacebookBirthdaysDidUpdate`
    notification. We’ll add the Import view controller as an observer when it appears,
    and we’ll remove it when it disappears.


    Open `BRImportFacebookViewController.m` and complete the class with the highlighted
    new code:


    ```

    #import "BRImportFacebookViewController.h"

    #import "BRDModel.h"


    @interface BRImportFacebookViewController ()


    @end


    @implementation BRImportFacebookViewController


    -(void) viewWillAppear:(BOOL)animated

    {

        [super viewWillAppear:animated];

        [[NSNotificationCenter defaultCenter] addObserver:self

                                                 selector:@selector(handleFacebookBirthdaysDidUpdate:)

                                                     name:BRNotificationFacebookBirthdaysDidUpdate

                                                   object:[BRDModel sharedInstance]];

        [[BRDModel sharedInstance] fetchFacebookBirthdays];

    }


    - (void) viewWillDisappear:(BOOL)animated

    {

        [super viewWillDisappear:animated];

        [[NSNotificationCenter defaultCenter] removeObserver:self

                                                        name:BRNotificationFacebookBirthdaysDidUpdate

                                                      object:[BRDModel sharedInstance]];

    }


    -(void)handleFacebookBirthdaysDidUpdate:(NSNotification *)notification

    {

        NSDictionary *userInfo = [notification userInfo];


        self.birthdays = userInfo[@"birthdays"];

        [self.tableView reloadData];

    }


    @end

    ```


    When we add the Facebook import view controller as a notification observer, we
    have to specify a method handler in `handleFacebookBirthdaysDidUpdate:`—our class
    for the Facebook birthdays update notification. When `BRDModel.m` posts the notification,
    it also packages the `birthdays` array into the `userInfo` dictionary of the notification.
    The following is a recap from the `BRDModel` code we wrote previously:


    ```

    NSDictionary *userInfo = @{@"birthdays":birthdays};

    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationFacebookBirthdaysDidUpdate

                                                        object:self

                                                      userInfo:userInfo];

    ```


    In the view controller, we’re able to retrieve the `birthdays` array from the
    `userInfo` dictionary, assign it to the local `birthdays` array of the controller,
    and then reload the table view. Then the `BRImportViewController` superclass does
    the rest of the work for us!


    Build and run. After authorizing with Facebook and returning to the app after
    a few seconds waiting for the Graph API request to complete, your Facebook friends
    should appear in the Facebook import table view and you should be able to multiselect
    them (see [Figure 11-8](#Chapter11.html#fig_11_8)).


    ![Image](images/9781430243748_Fig11-08.jpg)


    **Figure 11-8.** Facebook import view controller displaying the returned birthdays


    ### Importing Facebook birthdays into the Core Data store


    But there’s more… Try to import a few Facebook friends… Whoa there, guess what—it
    just works! The `importBirthdays:` code we wrote in [Chapter 10](#Chapter10.html#ch10)
    was written for importing `BRDBirthdayImport` instances. We’ve already converted
    the Facebook birthday dictionaries to `BRDBirthdayImport` instances, and all of
    our import view rendering of birthdays are already taken care of by the `BRImportViewController`
    super view controller class. Do you see all the time and effort we saved ourselves
    just by using a superclass and a generic birthday import class?


    The only missing function is that we have remote URLs for the images of our Facebook
    friends, and currently we’ve not coded our table views to download and render
    remote images. So let’s do that now!'
