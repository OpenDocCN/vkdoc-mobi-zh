  trans: "\n### 串联所有组件\n\n剩下的工作都在 `BJViewController` 的源实现文件中。我们终于能看到在视图中构建模型所付出的辛勤劳动的成果了！\n\
    \n关闭所有模型类，在标准编辑器中仅打开 `BJViewController.m`。首先导入 `BJDGameModel.h` 和 `BJDCard.h`：\n\
    \n```\n#import \"BJViewController.h\"\n#import \"BJDGameModel.h\"\n#import \"\
    BJDCard.h\"\n```\n\n现在向 `BJViewController.m` 源文件的私有类扩展中添加新的私有模型属性：\n\n```\n@interface\
    \ BJViewController ()\n\n@property (nonatomic,strong) NSArray *dealerCardViews;\n\
    @property (nonatomic,strong) NSArray *playerCardViews;\n@property (nonatomic,strong)\
    \ BJDGameModel *gameModel;\n@end\n```\n\n在 `BJViewController.m` 的实现中，为两个新的私有方法添加占位符：\n\
    \n```\n- (void)renderCards\n{\n\n}\n\n- (void)restartGame\n{\n\n}\n```\n\n*注意：为避免在\
    \ Xcode 4.5 之前的版本中产生编译器警告，你需要在类扩展中声明私有方法签名，或者将方法实现放在实现文件的高处并位于所有调用者之前。现在这已成为过去式，你可以按照自己的喜好排列私有方法顺序，无需声明方法签名。*\n\
    \n此外，我们将在子类中重写 `UIViewController` 的指定初始化方法，如下所示：\n\n```\n-(id) initWithCoder:(NSCoder\
    \ *)aDecoder\n{\n    self = [super initWithCoder:aDecoder];\n    if (self) {\n\
    \        self.gameModel = [[BJDGameModel alloc] init];\n        [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          \
    \      selector:@selector(handleNotificationGameDidEnd:)\n                   \
    \                                 name:BJNotificationGameDidEnd\n            \
    \                                      object:self.gameModel];\n    }\n    return\
    \ self;\n}\n```\n\n`UIViewController` 有多个指定初始化方法：`initWithCoder:` 和 `initWithNibName:bundle:`。然而，当从故事板实例化时，`initWithCoder:`\
    \ 是自动调用的初始化方法。\n\n在我们的 `BJViewController` 指定初始化方法中，我们做了两件事：实例化 `BJDGameModel`\
    \ 的实例，并注册在游戏结束时接收来自模型的通知。我们已经为游戏结束通知进行了注册，以便触发我们在视图控制器中尚未编写的方法：`handleNotificationGameDidEnd:`。\n\
    \n在 `NSNotificationCenter` 的 `addObserver` 方法中使用 `@selector` 指令，类似于本章开头介绍的 Interface\
    \ Builder 中 `UIControl` 目标-动作机制。当游戏结束时，`BJDGameModel` 通过通知中心发送一条新通知，该通知进而调用观察类\
    \ `BJViewController` 中的 `handleNotificationGameDidEnd` 方法。\n\n我们将在本章末尾实现 `handleNotificationGameDidEnd`\
    \ 方法。接下来，请你为新方法 `restartGame` 添加完整代码：\n\n```\n- (void)restartGame\n{\n    [self.gameModel\
    \ resetGame];\n    BJDCard *card;\n\n    card = [self.gameModel nextPlayerCard];\n\
    \    card.isFaceUp = YES;\n    card = [self.gameModel nextDealerCard];\n    card.isFaceUp\
    \ = YES;\n\n    card = [self.gameModel nextPlayerCard];\n    card.isFaceUp = YES;\n\
    \n    [self.gameModel nextDealerCard];\n\n    [self renderCards];\n\n    self.standButton.enabled\
    \ = self.hitButton.enabled = YES;\n}\n```\n\n`restartGame` 方法首先调用模型的 `resetGame`\
    \ 方法。我们最近在 `BJDGameModel` 中完成了 `resetGame` 方法——我们生成了一个新的洗牌牌组，并清空用于跟踪庄家和玩家手牌的数组。\n\
    \n接下来，我们指示模型向庄家和玩家各发两张牌。请注意，我们仅将庄家的第一张牌设置为正面朝上，而不是第二张。这一指令将在我们尚未编写的 `renderCards`\
    \ 方法中渲染到视图中。\n\n我们还启用了玩家的停牌和要牌按钮，因为在二十一点中玩家先出牌。当轮到庄家出牌时，我们将禁用这些按钮。\n"
- fmt: "在我们的视图控制器中，有两个地方需要调用`restartGame`：1）当游戏结束且玩家希望重新游戏时，2）视图首次显示在屏幕上时。为了适应第二种场景，我们需要在`BJViewController`的哪个方法中添加对`restartGame`的调用？你还记得本章开头介绍的视图生命周期吗？我们之前在`viewDidLoad`方法中初始化了`dealerCardViews`和`playerCardViews`数组属性。对于我们的应用来说，这个方法非常适合调用`[self\
    \ restartGame]`。另一个同样合适的方法是`viewWillAppear:`。`viewWillAppear:`在视图显示在屏幕上的前一刻被调用。我们将在应用显示视图之前重启游戏并渲染视图：\n\
    \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [self restartGame];\n}\n```\n\n准备好了吗？现在让我们实现`renderCards`方法：\n\n```\n- (void)renderCards\n\
    {\n    int maxCard = self.gameModel.maxPlayerCards;\n\n    BJDCard *dealerCard;\n\
    \    BJDCard *playerCard;\n    UIImageView *dealerCardView;\n    UIImageView *playerCardView;\n\
    \n    for (int i=0; i<maxCard; i++) {\n        dealerCardView = self.dealerCardViews[i];\n\
    \        playerCardView = self.playerCardViews[i];\n\n        dealerCard = [self.gameModel\
    \ dealerCardAtIndex:i];\n        playerCard = [self.gameModel playerCardAtIndex:i];\n\
    \n        dealerCardView.hidden = (dealerCard == nil);\n        if (dealerCard\
    \ && dealerCard.isFaceUp) {\n            dealerCardView.image = [dealerCard getCardImage];\n\
    \        }\n        else {\n            dealerCardView.image = [UIImage imageNamed:@\"\
    card-back.png\"];\n        }\n\n        playerCardView.hidden = (playerCard ==\
    \ nil);\n        if (playerCard && playerCard.isFaceUp) {\n            playerCardView.image\
    \ = [playerCard getCardImage];\n        }\n        else {\n            playerCardView.image\
    \ = [UIImage imageNamed:@\"card-back.png\"];\n        }\n    }\n}\n```\n\n好，激动人心的时刻到了。首先，我们在本地方法作用域中声明了一些变量：`maxCard`（每位玩家五张牌）；`dealerCard`和`playerCard`（`BJDCard`的实例）；以及`dealerCardView`和`playerCardView`（我们在本章开头添加到故事板中的`UIImageView`实例）。\n\
    \n我们循环执行主代码块五次，在每次迭代中，为卡牌模型和视图变量赋值。请注意，我们直接从`BJDGameModel`类的公开方法`dealerCardAtIndex`和`playerCardAtIndex`中获取`dealerCard`和`playerCard`的卡牌模型。如果你研究这些方法，会发现它们要么返回`BJDCard`实例，要么在索引大于玩家卡牌数组最高索引时返回`nil`，例如`[self.gameModel\
    \ dealerCardAtIndex:2]`在庄家只有两张牌（索引0和1）时会返回`nil`。\n\n如果返回的卡牌是`nil`，我们就简单地隐藏对应的卡牌视图，因为这表示该牌尚未被发放：\n\
    \n```\ndealerCardView.hidden = (dealerCard == nil);\n```\n\n以及\n\n```\nplayerCardView.hidden\
    \ = (playerCard == nil);\n```\n\n如果对应的卡牌不是`nil`，我们还会检查`BJDCard`实例是否是正面朝上的。如果是正面朝上，我们会使用我们编写的`getCardImage`方法来获取一张图片，并设置到`UIImageView`上。如果卡牌是背面朝上的，我们将`UIImageView`中显示的图片默认设置为卡牌背面图片：\n\
    \n```\ndealerCardView.image = [UIImage imageNamed:@\"card-back.png\"];\n```\n\n\
    一旦你将这些代码全部添加到`renderCards`方法中，你会发现当你构建并运行应用时，发给庄家和玩家的卡牌将会被渲染出来（参见[图4-18](#Chapter04.html#fig_4_18)）。\n\
    \n![Image](images/9781430243748_Fig04-18.jpg)\n\n**图4-18.** 嗯……我应该停牌还是叫牌？\n\n\
    事情开始有眉目了！我想玩游戏，但“停牌”和“叫牌”按钮目前什么都没做。让我们来改变这一点。\n\n好吧，我又作弊了，行吗？我预先编写了一些用于自动化庄家回合的代码，所以首先，向下滚动`BJViewController`并取消注释以下三个私有庄家方法：\n\
    \n```\n#pragma mark - Automated Dealer Play\n\n-(void) showSecondDealerCard\n\
    {\n    BJDCard *card = [self.gameModel lastDealerCard];\n    card.isFaceUp = YES;\n\
    \    [self renderCards];\n    [self.gameModel updateGameStage];\n    if (self.gameModel.gameStage\
    \ != BJGameStageGameOver) {\n        [self performSelector:@selector(showNextDealerCard)\
    \ withObject:nil afterDelay:0.8];\n    }\n\n}\n\n-(void) showNextDealerCard\n\
    {\n    //next card\n    BJDCard *card = [self.gameModel nextDealerCard];\n   \
    \ card.isFaceUp = YES;\n    [self renderCards];\n    [self.gameModel updateGameStage];\n\
    \    if (self.gameModel.gameStage != BJGameStageGameOver) {\n        [self performSelector:@selector(showNextDealerCard)\
    \ withObject:nil afterDelay:0.8];\n    }\n}\n\n- (void)playDealerTurn {\n    self.standButton.enabled\
    \ = self.hitButton.enabled = NO;\n    [self performSelector:@selector(showSecondDealerCard)\
    \ withObject:nil afterDelay:0.8];\n}\n```\n\n`showSecondDealerCard`、`showNextDealerCard`和`playDealerTurn`都是我编写的用于自动化庄家回合的方法。因此，一旦玩家的回合结束，想法是首先调用`playDealerTurn`。这个方法做的第一件事是通过禁用“停牌”和“叫牌”按钮来阻止任何按钮交互。\n\
    \n接下来，我们利用`NSObject`中非常方便的`performSelector:withObject:afterDelay`方法，该方法支持延迟方法调用。延迟以秒为单位定义，因此我们在每次发牌和渲染给庄家之间设置了0.8秒的延迟。\n\
    \n`showNextDealerCard`和`playDealerTurn`几乎完全相同。唯一的区别在于，当庄家的第二张牌被翻开时，它已经被发过了，所以我们调用：\n\
    \n```\nBJDCard *card = [self.gameModel lastDealerCard];\n```\n\n而不是：\n\n```\n\
    BJDCard *card = [self.gameModel nextDealerCard];\n```\n\n每张牌发完后并渲染后，控制器还会让模型更新游戏阶段；也就是说，如果庄家达到了五张牌的上限或爆牌，游戏结束。"
  raw: 'There are two places in our view controller where we’ll call `restartGame`:
    1) when a game ends and the player wishes to play again, and 2) the first time
    the view appears on screen. In order to cater for the second scenario,  which
    method of `BJViewController` do we need to add a call to `restartGame`? Do you
    remember the view life cycle I introduced at the beginning of this chapter? We
    initiated our `dealerCardViews` and `playerCardViews` array properties in the
    `viewDidLoad` method. For our app, this method is a perfectly reasonable place
    to call `[self restartGame]`. An equally suitable candidate is the `viewWillAppear:`
    method. `viewWillAppear:` is invoked the moment before it is displayed on screen.
    We will restart our game and render our view just before the app displays it:


    `- (void)viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`

    `    [self restartGame];`

    `}`


    All set? Let’s now implement the `renderCards` method:


    `- (void)renderCards`

    `{`

    `    int maxCard = self.gameModel.maxPlayerCards;`


    `    BJDCard *dealerCard;`

    `    BJDCard *playerCard;`

    `    UIImageView *dealerCardView;`

    `    UIImageView *playerCardView;`


    `    for (int i=0; i<maxCard; i++) {`

    `        dealerCardView = self.dealerCardViews[i];`

    `        playerCardView = self.playerCardViews[i];`


    `        dealerCard = [self.gameModel dealerCardAtIndex:i];`

    `        playerCard = [self.gameModel playerCardAtIndex:i];`


    `        dealerCardView.hidden = (dealerCard == nil);`

    `        if (dealerCard && dealerCard.isFaceUp) {`

    `            dealerCardView.image = [dealerCard getCardImage];`

    `        }`

    `        else {`

    `            dealerCardView.image = [UIImage imageNamed:@"card-back.png"];`

    `        }`


    `        playerCardView.hidden = (playerCard == nil);`

    `        if (playerCard && playerCard.isFaceUp) {`

    `            playerCardView.image = [playerCard getCardImage];`

    `        }`

    `        else {`

    `            playerCardView.image = [UIImage imageNamed:@"card-back.png"];`

    `        }`

    `    }`

    `}`


    OK, here’s where things get exciting. First, we declare some variables in the
    local method scope: `maxCard` (five cards per player); `dealerCard` and `playerCard`
    (instances of `BJDCard`); and `dealerCardView` and `playerCardView` (instances
    of `UIImageView` that we added to our storyboard right at the beginning of the
    chapter).


    We loop through the main code block five times, and for each iteration, we assign
    the values of our card model and view variables. Note that we populate the card
    model for `dealerCard` and `playerCard` directly from the public methods `dealerCardAtIndex`
    and `playerCardAtIndex` of the `BJDGameModel` class. If you investigate these
    methods, you’ll see at they either return a `BJDCard` instance or `nil` if the
    index is greater than the highest index of the array of player cards, that is
    `[self.gameModel dealerCardAtIndex:2]` will return `nil` if the dealer only has
    two cards (indexes 0 and 1).


    If the returned card is `nil`, then we simply hide the corresponding card view
    because it means that card has not yet been dealt:


    `dealerCardView.hidden = (dealerCard == nil);`


    and


    `playerCardView.hidden = (playerCard == nil);`


    If the corresponding card is not `nil`, we also check whether the `BJDCard` instance
    is face-up or not. If it’s face-up, then we use the `getCardImage` method we wrote
    to retrieve an image to set on the `UIImageView`. If the card is face-down, then
    we default the image displayed in the `UIImageView` to our card back image:


    `dealerCardView.image = [UIImage imageNamed:@"card-back.png"];`


    Once you’ve added all this code to the `renderCards` method, you should find that
    when you build and run your app, the cards dealt to the dealer and player will
    render (see [Figure 4-18](#Chapter04.html#fig_4_18)).


    ![Image](images/9781430243748_Fig04-18.jpg)


    **Figure 4-18.** Hmm… Should I stand or hit?


    Things are starting to take shape! I want to play the game, but the Stand and
    Hit buttons are currently doing nothing. Let’s change that.


    Look, I cheated again, OK? I prewrote some of the code for automating the dealer’s
    turn, so first off, scroll down `BJViewController` and uncomment the following
    three private dealer methods:


    `#pragma mark - Automated Dealer Play`


    `-(void) showSecondDealerCard`

    `{`

    `    BJDCard *card = [self.gameModel lastDealerCard];`

    `    card.isFaceUp = YES;`

    `    [self renderCards];`

    `    [self.gameModel updateGameStage];`

    `    if (self.gameModel.gameStage != BJGameStageGameOver) {`

    `        [self performSelector:@selector(showNextDealerCard) withObject:nil afterDelay:0.8];`

    `    }`


    `}`


    `-(void) showNextDealerCard`

    `{`

    `    //next card`

    `    BJDCard *card = [self.gameModel nextDealerCard];`

    `    card.isFaceUp = YES;`

    `    [self renderCards];`

    `    [self.gameModel updateGameStage];`

    `    if (self.gameModel.gameStage != BJGameStageGameOver) {`

    `        [self performSelector:@selector(showNextDealerCard) withObject:nil afterDelay:0.8];`

    `    }`

    `}`


    `- (void)playDealerTurn {`

    `    self.standButton.enabled = self.hitButton.enabled = NO;`

    `    [self performSelector:@selector(showSecondDealerCard) withObject:nil afterDelay:0.8];`

    `}`


    `showSecondDealerCard`, `showNextDealerCard`, and `playDealerTurn` are all methods
    I wrote to automate the dealer’s turn. So, once the player’s turn finishes, the
    idea is that `playDealerTurn` should be called first. The first thing this method
    does is prevent any button interaction by disabling the Stand and Hit buttons.


    Next, we make use of the super-handy `performSelector:withObject:afterDelay` method
    of `NSObject` that enables delayed method calls. The delay is defined in seconds,
    so we’re setting a 0.8-second delay between each card rendered and dealt to the
    dealer.


    The `showNextDealerCard` and `playDealerTurn` are virtually identical. The only
    difference is that when the second dealer card is turned face-up, it’s already
    been dealt so we call


    `BJDCard *card = [self.gameModel lastDealerCard];`


    rather than


    `BJDCard *card = [self.gameModel nextDealerCard];`


    After each card is dealt and rendered, the controller also asks the model to update
    the game stage; that is, the game ends if the dealer hits the five-card limit
    or goes bust.'
  trans: "\n在我们的视图控制器中，有两个地方需要调用`restartGame`：1）当游戏结束且玩家希望重新游戏时，2）视图首次显示在屏幕上时。为了适应第二种场景，我们需要在`BJViewController`的哪个方法中添加对`restartGame`的调用？你还记得本章开头介绍的视图生命周期吗？我们之前在`viewDidLoad`方法中初始化了`dealerCardViews`和`playerCardViews`数组属性。对于我们的应用来说，这个方法非常适合调用`[self\
