- fmt: '# Pricing your app


    Pricing an app for sale via the App Store is achieved either by choosing to distribute
    your app for free or by selecting a pricing tier. The pricing tiers are based
    on dollars. Tier 1 is $0.99, Tier 2 is $1.99, Tier 3 is $2.99, and so on. Each
    tier has a corresponding tier price on a currency-by-currency basis, which you
    can look up via the Pricing Matrix link. I’ve taken a snapshot of the current
    pricing matrix (see [Figure 14-5](#Chapter14.html#fig_14_5)). Apple updates the
    pricing matrix every once in a while, particularly after significant currency
    exchange rate fluctuation.


    ![Image](images/9781430243748_Fig14-05.jpg)


    **Figure 14-5.** Apple’s App Store Pricing Matrix


    Based on the current pricing matrix, if a customer buys an app for $0.99 in the
    United States, then the same app will sell for £0.69 to UK customers or €0.79
    when purchased through a European App Store.


    The pricing matrix also shows you the sales proceeds value you’ll receive from
    Apple for each app sale (the amount in each country’s currency). For each sale
    of a $0.99 app in the United States, for example, you’ll receive $0.70 from Apple.


    ## Limiting your app to specific countries


    By default, Apple distributes your app through all of its App Stores, but you
    can change that if you wish. Tapping the Specific Stores link enables you to pick
    and choose the countries to sell your app in (see [Figure 14-6](#Chapter14.html#fig_14_6)).


    ![Image](images/9781430243748_Fig14-06.jpg)


    **Figure 14-6.** Selecting specific App Stores for your app


    *Tip: If, for any reason, you have to take your app offline temporarily, you can
    do so without deleting it from the store. Simply tap the Rights and Pricing link
    to edit your app, and you’ll return to the availability and pricing screen. Deselect
    all stores and save. This simply removes your app from all App Stores until you
    return to this screen to switch your app back on for sale.*


    There are many horror stories from developers who submitted a fantastic update
    to their app, and only when it was approved by Apple and live in the store did
    they discover that they’d neglected to test the migration process of users updating
    from older versions of the app. Crash City ensued. Once an app update gets approved,
    there’s no way to revert it back to an older version. The best solution in my
    book is to switch your app off temporarily and submit another update. Well, no,
    actually the best solution is to test thoroughly with new users and existing users
    updating their apps. Just never make a mistake, OK? ![Image](images/smile.jpg)


    Let’s assume that we’re happy selling our app in all global App Stores.


    Have you selected a price tier for your app? You can change this later.


    I also recommend leaving the Discount for Educational Institutions ticked. Apple
    provide schools and universities bulk purchase discounts. If there are educational
    institutions purchasing 30 or more copies of your app in one go, then they deserve
    a discount, don’t they?


    Tap the Continue button.


    ## Configuring version information


    The next details we have to supply for our app are version numbers, copyright
    text, and primary and secondary App Store categories (see [Figure 14-7](#Chapter14.html#fig_14_7)).


    ![Image](images/9781430243748_Fig14-07.jpg)


    **Figure 14-7.** Setting a version number, copyright information, and categories
    for our app


    Use a conventional version-number format when submitting your apps. Avoid using
    words like alpha, beta, and the like; instead, stick to 1.0, 1.20, 2.0, and so
    on. Because this is the first submission of our release app, I recommend using
    1.0. The version number we set in iTunes Connect needs to match the `Bundle versions
    string, short` value in the `Info.plist` of our Xcode project, which by default
    is also 1.0.


    ### Selecting an App Store category


    You must select a primary category for your app, and you can optionally select
    a second category. If your app can be fairly placed within multiple categories,
    then I recommend looking at the latest App Store metrics by 148Apps at [`http://148apps.biz/app-store-metrics`](http://148apps.biz/app-store-metrics).


    Among many other useful statistics, the 148Apps App Store metrics include a category-by-category
    app count (see [Figure 14-8](#Chapter14.html#fig_14_8)).


    ![Image](images/9781430243748_Fig14-08.jpg)


    **Figure 14-8.** App Store metrics by 148Apps provide insight into the most popular,
    competitive categories


    We can see in [Figure 14-8](#Chapter14.html#fig_14_8) that after Games, the second
    most popular (and therefore competitive) category is Education, and third most
    popular is Entertainment. This is incredibly valuable information because the
    higher we can climb in our category, the better App Store–visibility we get. So
    if you can pick a less busy category, do so!


    148Apps App Store metrics include app price distribution. Did you know that about
    50 percent of the apps in the App Store are free? Many of the free apps monetize
    via in-app purchase and advertising, but it’s very useful to know that there’s
    a lot of competition—even if you choose to distribute your app for free!


    You can leave the Review Notes section of the submission process blank, but if,
    for example, your app required that users have an account with a third-party web
    site, then you should help out the Apple reviewer by including a test-account
    username and password in the review notes.


    ## Setting up an app rating


    The next set of choices to make relate to your app content. Select the most applicable
    radio button choice for each, and the form will automatically generate an app
    age rating that Apple deems applicable to your app (see [Figure14-9](#Chapter14.html#fig_14_9)).


    ![Image](images/9781430243748_Fig14-09.jpg)


    **Figure 14-9.** I don’t think our Apple audience will find anything too controversial
    in our *Birthday Reminder* app!


    ## Adding a description and metadata


    At the point that a user first reads your app’s description, you have already
    got him through the door, enticing him to learn more about your app thanks to
    a beautiful icon and a strong and informative app name. You are now close to a
    sale, so be sure that your description clearly and concisely summarizes what your
    app does (see [Figure 14-10](#Chapter14.html#fig_14_10)).


    ![Image](images/9781430243748_Fig14-10.jpg)


    **Figure 14-10.** Entering descriptive text, keywords, and other metadata


    The very first line of your description is the most important. The App Store description
    is shown on iPhones, iPads, in iTunes, and on the Web. In many cases, it also
    gets truncated to just the first couple of lines, so be sure that you summarize
    your app in your first sentence.


    Also note that your descriptive text and screen grabs will be aggregated by sites
    like App Shopper ([`www.appshopper.com`](http://www.appshopper.com)) as soon as
    your app goes live, so don’t write anything dumb like “Description to be added
    at a later point” and forget to fill in some useful details about your app before
    launch!


    ### Adding keywords


    You’ve got a maximum of 100 bytes for your keywords (about 100 characters)—use
    them all. Apple’s search algorithm checks your app title, keywords, and description
    to find search results. Keywords take more importance than the description, so
    choose them wisely! Separate your keywords with commas.


    Note that once Apple has approved your app submission, then you will no longer
    be able to edit your app’s keywords. The same applies to your App Store title.
    You can only edit these details when you submit future updates of your app.'
