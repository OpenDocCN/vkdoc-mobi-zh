    returning the cell:


    `    UIImageView *imageView = [[UIImageView alloc] initWithImage:[UIImage imageNamed:@"icon-import-not-selected.png"]];`

    `    brTableCell.accessoryView = imageView;`


    Instances of table view cells have an `accessoryView` property that we can set
    to any view instance, and our designated view will be displayed to the right of
    our table cell. Build and run to test if the empty circles appear (see [Figure
    10-21](#Chapter10.html#fig_10_21)).


    ![Image](images/9781430243748_Fig10-21.jpg)


    **Figure 10-21.** The circle appears for each table cell, but it is obscured by
    the calendar icon.


    Although you may not be able to see it clearly in [Figure 10-21](#Chapter10.html#fig_10_21),
    the empty circle is visible, but obscured by the calendar icon behind it. We can
    resolve this problem back in our storyboard. With the prototype cell of our Address
    Book view controller in focus, multiselect the calendar icon and two labels. Using
    the size inspector, change the autosizing properties of these subviews so that
    the only the space to the right is fixed and not to the left, as highlighted in
    [Figure 10-22](#Chapter10.html#fig_10_22).


    ![Image](images/9781430243748_Fig10-22.jpg)


    **Figure 10-22.** Changing the autosize mask of the calendar icon and labels


    Build and run. The results should resemble [Figure 10-23](#Chapter10.html#fig_10_23).


    ![Image](images/9781430243748_Fig10-23.jpg)


    **Figure 10-23.** Much better!


    We can update the `accessoryView` property of each of our table cells at any time.
    If a contact has been selected by the user, we''ll display a green tick image
    next in the `accessoryView`. Otherwise, we''ll display an empty circle.


    We''ll keep track of selected birthdays to import using a mutable dictionary.
    Ensure you''re working on `BRImportViewController.m`. Begin by adding a new property
    to the private interface of `BRImportViewController` just above the class implementation
    code:


    `@interface BRImportViewController()`


    **`//Keeps track of selected rows`**

    **`@property (nonatomic, strong) NSMutableDictionary *selectedIndexPathToBirthday;`**


    `@end`


    We''ll use this new `selectedIndexPathToBirthday` dictionary to keep track of
    which rows are selected and which aren''t. As the selection changes, we''ll also
    update the Import button, disabling it if there are zero selected rows.


    Now override the getter of your new `selectedIndexPathToBirthday` property to
    ensure it is automatically lazy loaded when first accessed:


    `-(NSMutableDictionary *) selectedIndexPathToBirthday`

    `{`

    `    if (_selectedIndexPathToBirthday == nil) {`

    `        _selectedIndexPathToBirthday = [NSMutableDictionary dictionary];`

    `    }`

    `    return _selectedIndexPathToBirthday;`

    `}`


    Next, implement two new private methods: `updateImportButton` and `isSelectedAtIndexPath:`


    **`//Enables/Disables the import button if there are zero rows selected`**

    **`- (void) updateImportButton`**

    **`{`**

    **`    self.importButton.enabled = [self.selectedIndexPathToBirthday count] >
    0;`**

    **`}`**


    **`//Helper method to check whether a row is selected or not`**

    **`-(BOOL) isSelectedAtIndexPath:(NSIndexPath *)indexPath`**

    **`{`**

    **`    return self.selectedIndexPathToBirthday[indexPath] ? YES : NO;`**

    **`}`**'
  trans: "\n### 将联系人照片和数据加载到表格视图中\n\n如图 10-19 所示，我们需要在通讯录视图控制器中填充表格单元格。我们将在共享的父类`BRImportViewController`中完成填充。这样，在后续构建从\
    \ Facebook 视图控制器导入的功能时，父类中已包含此逻辑，从而节省时间。\n\n表格视图中的每个表格单元格都是自定义表格视图单元格类`BRBirthdayTableViewCell`的实例。我们已经编写了在该类中直接显示`BRDBirthday`实体的渲染逻辑，因此首先在\
    \ Xcode 中打开`BRBirthdayTableViewCell.h`，并将以下代码添加到接口代码中：\n\n```\n@class BRDBirthday;\n\
    @class BRDBirthdayImport;\n\n@interface BRBirthdayTableViewCell : UITableViewCell\n\
    \n@property(nonatomic,strong) BRDBirthday *birthday;\n@property(nonatomic,strong)\
    \ BRDBirthdayImport *birthdayImport;\n```\n\n切换到`BRBirthdayTableViewCell.m`源文件，导入`BRDBirthdayImport.h`，然后按如下方式重写`birthdayImport`的\
    \ setter 方法：\n\n```\n-(void) setBirthdayImport:(BRDBirthdayImport *)birthdayImport\n\
    {\n    _birthdayImport = birthdayImport;\n    self.nameLabel.text = _birthdayImport.name;\n\
    \n    int days = _birthdayImport.remainingDaysUntilNextBirthday;\n\n    if (days\
    \ == 0) {\n        //生日就在今天！\n        self.remainingDaysLabel.text = self.remainingDaysSubTextLabel.text\
    \ = @\"\";\n        self.remainingDaysImageView.image = [UIImage imageNamed:@\"\
    icon-birthday-cake.png\"];\n    }\n    else {\n        self.remainingDaysLabel.text\
    \ = [NSString stringWithFormat:@\"%d\",days];\n        self.remainingDaysSubTextLabel.text\
    \ = (days == 1) ? @\"more day\" : @\"more days\";\n        self.remainingDaysImageView.image\
    \ = [UIImage imageNamed:@\"icon-days-remaining.png\"];\n    }\n\n    self.birthdayLabel.text\
    \ = _birthdayImport.birthdayTextToDisplay;\n\n}\n```\n\n这段代码再次与`birthday`托管对象的\
    \ setter 方法几乎完全相同。\n\n回到`BRImportViewController.m`，导入`BRBirthdayTableViewCell.h`和`BRDBirthdayImport.h`，然后修改`tableView:cellForRowAtIndexPath:`方法：\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n\n    BRDBirthdayImport *birthdayImport = self.birthdays[indexPath.row];\n\
    \n    BRBirthdayTableViewCell *brTableCell = (BRBirthdayTableViewCell *)cell;\n\
    \n    brTableCell.birthdayImport = birthdayImport;\n\n    if (birthdayImport.imageData\
    \ == nil)\n    {\n        brTableCell.iconView.image = [UIImage imageNamed:@\"\
    icon-birthday-cake.png\"];\n    }\n    else {\n        brTableCell.iconView.image\
    \ = [UIImage imageWithData:birthdayImport.imageData];\n    }\n\n    UIImage *backgroundImage\
    \ = (indexPath.row == 0) ? [UIImage imageNamed:@\"table-row-background.png\"]\
    \ : [UIImage imageNamed:@\"table-row-icing-background.png\"];\n    brTableCell.backgroundView\
    \ = [[UIImageView alloc] initWithImage:backgroundImage];\n\n    return cell;\n\
    }\n```\n\n这段代码与主屏幕表格视图单元格的渲染代码非常相似，因此应该看起来很熟悉。构建并运行。现在应该能看到通讯录联系人的姓名、生日和照片（参见图\
    \ 10-20）。\n\n![Image](img/9781430243748_Fig10-20.jpg)\n\n**图 10-20.** 这是我的通讯录联系人——看起来更棒了！\n\
    \n### 创建用于导入生日的多选表格视图\n\n我们已经创建了一个“导入通讯录”视图，其中包含一个表格视图，用于显示通讯录中的联系人及其生日，但我们如何实现多选呢？我们的表格视图会显示一个空心圆圈或一个带对勾的圆圈，具体取决于该联系人当前是否被选中用于导入。让我们将这些图片资源添加到项目的`resources/images`目录中：`icon-import-not-selected.png`、`icon-import-not-selected@2x.png`、`icon-import-selected.png`和`icon-import-selected@2x.png`。\n\
    \n首先，在自定义表格视图单元格的右侧显示未选中的空心圆圈图片。在`BRImportViewController.m`的`tableView:cellForRowAtIndexPath:`方法末尾，但在返回单元格之前，添加以下两行代码：\n\
    \n```\n    UIImageView *imageView = [[UIImageView alloc] initWithImage:[UIImage\
    \ imageNamed:@\"icon-import-not-selected.png\"]];\n    brTableCell.accessoryView\
    \ = imageView;\n```\n\n表格视图单元格的实例具有一个`accessoryView`属性，我们可以将其设置为任何视图实例，我们指定的视图将显示在表格单元格的右侧。构建并运行，测试空心圆圈是否出现（参见图\
    \ 10-21）。\n\n![Image](img/9781430243748_Fig10-21.jpg)\n\n**图 10-21.** 每个表格单元格都显示了一个圆圈，但它被日历图标遮挡了。\n\
    \n虽然在图 10-21 中可能看不太清楚，但空心圆圈是可见的，只是被其后面的日历图标遮挡了。我们可以在故事板中解决这个问题。聚焦通讯录视图控制器的原型单元格，然后多选日历图标和两个标签。使用大小检查器，更改这些子视图的自动调整大小属性，使得只有右侧的空间固定，而左侧不固定，如图\
    \ 10-22 中突出显示的那样。\n\n![Image](img/9781430243748_Fig10-22.jpg)\n\n**图 10-22.**\
    \ 更改日历图标和标签的自动调整大小掩码\n\n构建并运行。结果应类似于图 10-23。\n\n![Image](img/9781430243748_Fig10-23.jpg)\n\
    \n**图 10-23.** 好多了！\n\n我们可以随时更新每个表格单元格的`accessoryView`属性。如果用户选中了一个联系人，我们将在`accessoryView`中显示一个绿色的对勾图片。否则，我们显示一个空心圆圈。\n\
    \n我们将使用一个可变字典来跟踪要导入的已选生日。确保你在`BRImportViewController.m`中工作。首先，在类实现代码的上方，为`BRImportViewController`的私有接口添加一个新属性：\n\
    \n```\n@interface BRImportViewController()\n\n//跟踪已选行的字典\n@property (nonatomic,\
    \ strong) NSMutableDictionary *selectedIndexPathToBirthday;\n\n@end\n```\n\n我们将使用这个新的`selectedIndexPathToBirthday`字典来跟踪哪些行被选中，哪些未被选中。随着选择的变化，我们还将更新“导入”按钮，如果没有行被选中，则将其禁用。\n\
    \n现在，重写新属性`selectedIndexPathToBirthday`的 getter 方法，以确保它在首次访问时自动进行懒加载：\n\n```\n\
    -(NSMutableDictionary *) selectedIndexPathToBirthday\n{\n    if (_selectedIndexPathToBirthday\
    \ == nil) {\n        _selectedIndexPathToBirthday = [NSMutableDictionary dictionary];\n\
    \    }\n    return _selectedIndexPathToBirthday;\n}\n```\n\n接下来，实现两个新的私有方法：`updateImportButton`和`isSelectedAtIndexPath:`：\n\
    \n```\n//如果没有选中的行，则启用/禁用导入按钮\n- (void) updateImportButton\n{\n    self.importButton.enabled\
    \ = [self.selectedIndexPathToBirthday count] > 0;\n}\n\n//检查某一行是否被选中的辅助方法\n-(BOOL)\
    \ isSelectedAtIndexPath:(NSIndexPath *)indexPath\n{\n    return self.selectedIndexPathToBirthday[indexPath]\
    \ ? YES : NO;\n}\n```\n"
- fmt: "`updateImportButton`方法检查选择字典中是否有任何键/值。如果有，则启用导入按钮。`isSelectedAtIndexPath:`方法检查是否已为索引路径的行存储了导入生日对象。如果已存储，则该行已被选中。\n\
    \n为了确保视图首次显示时禁用导入按钮，我们只需在`viewWillAppear:`实现中调用`updateImportButton`：\n\n```\n\
    -(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [self updateImportButton];\n}\n```\n\n现在，通过将辅助视图设置为勾选或空圆圈图像，使表格单元格选择动态化。添加最后一个新的私有方法：\n\
    \n```\n//Refreshes the selection tick of a table cell\n- (void)updateAccessoryForTableCell:(UITableViewCell\
    \ *)tableCell atIndexPath:(NSIndexPath *)indexPath\n{\n    UIImageView *imageView;\n\
    \    if ([self isSelectedAtIndexPath:indexPath]) {\n        imageView = [[UIImageView\
    \ alloc] initWithImage:[UIImage imageNamed:@\"icon-import-selected.png\"]];\n\
    \    }\n    else {\n        imageView = [[UIImageView alloc] initWithImage:[UIImage\
    \ imageNamed:@\"icon-import-not-selected.png\"]];\n    }\n    tableCell.accessoryView\
    \ = imageView;\n}\n```\n\n重新访问`tableView:cellForRowAtIndexPath:`方法，并按如下方式修改`accessoryView`设置代码：\n\
    \n~~`UIImageView *imageView = [[UIImageView alloc] initWithImage:[UIImage imageNamed:@\"\
    icon-import-not-selected.png\"]];`~~\n~~`brTableCell.accessoryView = imageView;`~~\n\
    ```\n[self updateAccessoryForTableCell:cell atIndexPath:indexPath];\n```\n\n为确保代码正常工作，请构建并运行。假设一切编译正常，唯一明显的变化是导入按钮被禁用。每个表格视图单元格应显示一个空圆圈作为其辅助视图。\n\
    \n我们的导入表格视图的预期行为是，点击任意行可以切换其选择状态。导入视图控制器已分配为表格视图的委托，因此通过实现`UITableViewDelegate`协议的`tableView:didSelectRowAtIndexPath:`方法，我们可以在点击行时更新选择：\n\
    \n```\n#pragma mark UITableViewDelegate\n\n-(void)tableView:(UITableView *)tableView\
    \ didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n\n    BOOL isSelected =\
    \ [self isSelectedAtIndexPath:indexPath];\n\n    BRDBirthdayImport *birthdayImport\
    \ = self.birthdays[indexPath.row];\n\n    if (isSelected) {//already selected,\
    \ so deselect\n        [self.selectedIndexPathToBirthday removeObjectForKey:indexPath];\n\
    \    }\n    else {//not currently selected, so select\n        [self.selectedIndexPathToBirthday\
    \ setObject:birthdayImport forKey:indexPath];\n    }\n\n    //update the accessory\
    \ view image\n    [self updateAccessoryForTableCell:[self.tableView cellForRowAtIndexPath:indexPath]\
    \ atIndexPath:indexPath];\n\n    //enable/disable the import button\n    [self\
    \ updateImportButton];\n}\n```\n\n构建并运行以测试。\n\n接下来，实现“全选”和“全不选”按钮操作：\n\n```\n\
    - (IBAction)didTapSelectAllButton:(id)sender {\n\n    BRDBirthdayImport *birthdayImport;\n\
    \n    int maxLoop = [self.birthdays count];\n\n    NSIndexPath *indexPath;\n\n\
    \    for (int i=0;i<maxLoop;i++) {//loop through all the birthday import objects\n\
    \        birthdayImport = self.birthdays[i];\n        indexPath = [NSIndexPath\
    \ indexPathForRow:i inSection:0];\n        //create the selection reference\n\
    \        self.selectedIndexPathToBirthday[indexPath] = birthdayImport;\n    }\n\
    \n    [self.tableView reloadData];\n    [self updateImportButton];\n}\n\n- (IBAction)didTapSelectNoneButton:(id)sender\
    \ {\n    [self.selectedIndexPathToBirthday removeAllObjects];\n    [self.tableView\
    \ reloadData];\n    [self updateImportButton];\n}\n```\n\n构建并运行（参见[Figure 10-24](#Chapter10.html#fig_10_24)）。\n\
    \n![Image](images/9781430243748_Fig10-24.jpg)\n\n**Figure 10-24.** 点击“全选”后的效果。"
  raw: 'The `updateImportButton` method checks to see if our selection dictionary
    has any keys/values. If it does, then the Import button is enabled for the user.
    Our `isSelectedAtIndexPath:` method checks if we''ve stored an import birthday
    object for the index path''s row. If we have, then the row has been selected.


    To ensure that the Import button is disabled when the view first displays, we''ll
    just call `updateImportButton` in a `viewWillAppear:` implementation:


    `-(void) viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`

    `    [self updateImportButton];`

    `}`


    Now it''s time to make our table cell selection dynamic by setting the accessory
    view to either our tick or empty circle image. Add one last new private method:


    **`//Refreshes the selection tick of a table cell`**

    `- (void)updateAccessoryForTableCell:(UITableViewCell *)tableCell atIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    UIImageView *imageView;`

    `    if ([self isSelectedAtIndexPath:indexPath]) {`

    `        imageView = [[UIImageView alloc] initWithImage:[UIImage imageNamed:@"icon-import-selected.png"]];`

    `    }`

    `    else {`

    `        imageView = [[UIImageView alloc] initWithImage:[UIImage imageNamed:@"icon-import-not-selected.png"]];`

    `    }`

    `    tableCell.accessoryView = imageView;`

    `}`


    Revisit the `tableView:cellForRowAtIndexPath:` method and modify your `accessoryView`
    setting code as follows:


    ~~`UIImageView *imageView = [[UIImageView alloc] initWithImage:[UIImage imageNamed:@"icon-import-not-selected.png"]];`~~

    ~~`brTableCell.accessoryView = imageView;`~~

    **`[self updateAccessoryForTableCell:cell atIndexPath:indexPath];`**


    To ensure your code is working OK, build and run. Assuming everything compiles
    OK, the only noticeable change should be that the Import button is disabled. Each
    table view cell should display an empty circle as its accessory view.


    The expected behavior of our import table view is that tapping any row toggles
    its selection. Our Import view controller is already assigned as the delegate
    of the table view, so by implementing the `tableView:didSelectRowAtIndexPath:`
    method of the `UITableViewDelegate` protocol, we''ll be able to update the selection
    whenever a row is tapped:


    `#pragma mark UITableViewDelegate`


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`


    `    BOOL isSelected = [self isSelectedAtIndexPath:indexPath];`


    `    BRDBirthdayImport *birthdayImport = self.birthdays[indexPath.row];`


    `    if (isSelected) {//already selected, so deselect`

    `        [self.selectedIndexPathToBirthday removeObjectForKey:indexPath];`

    `    }`

    `    else {//not currently selected, so select`

    `        [self.selectedIndexPathToBirthday setObject:birthdayImport forKey:indexPath];`

    `    }`


    `    //update the accessory view image`

    `    [self updateAccessoryForTableCell:[self.tableView cellForRowAtIndexPath:indexPath]
    atIndexPath:indexPath];`


    `    //enable/disable the import button`

    `    [self updateImportButton];`

    `}`


    Build and run to test it out.


    Next, let''s implement our Select All and Select None button actions:


    `- (IBAction)didTapSelectAllButton:(id)sender {`


    **`    BRDBirthdayImport *birthdayImport;`**


    **`    int maxLoop = [self.birthdays count];`**


    **`    NSIndexPath *indexPath;`**


    **`    for (int i=0;i<maxLoop;i++) {//loop through all the birthday import objects`**

    **`        birthdayImport = self.birthdays[i];`**

    **`        indexPath = [NSIndexPath indexPathForRow:i inSection:0];`**

    **`        //create the selection reference`**

    **`        self.selectedIndexPathToBirthday[indexPath] = birthdayImport;`**

    **`    }`**


    **`    [self.tableView reloadData];`**

    **`    [self updateImportButton];`**

    `}`


    `- (IBAction)didTapSelectNoneButton:(id)sender {`

    **`    [self.selectedIndexPathToBirthday removeAllObjects];`**

    **`    [self.tableView reloadData];`**

    **`    [self updateImportButton];`**

    `}`


    Build and run (see [Figure 10-24](#Chapter10.html#fig_10_24)).


    ![Image](images/9781430243748_Fig10-24.jpg)


    **Figure 10-24.** After tapping Select All.'
