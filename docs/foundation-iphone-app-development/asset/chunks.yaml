  trans: '

    #### 应用程序委托


    应用程序委托（Application Delegate）是一个你可以修改的类。`BRAppDelegate` 继承自 `UIResponder`，并实现了
    `UIApplicationDelegate` 协议中的方法。


    你会看到 Xcode 已经自动填充了一些主要的 `UIApplicationDelegate` 方法。`UIApplicationDelegate` 协议中的主要方法用于响应关键的应用事件，例如：


    > - `application:didFinishLaunchingWithOptions`：在你的应用首次启动时立即执行一次。

    > - `applicationDidEnterBackground`：每当用户通过点击 iPhone 主页按钮等方式退出应用时执行。此时应用仍然存活，但处于冻结的非活跃状态。在此之后，其他应用代码将不会执行。当委托方法被调用时，我们可以在这里执行代码，但主要用于数据保存或释放内存。

    > - `applicationDidBecomeActive`：当用户通过主屏幕或多任务栏重新启动应用时，应用变为活跃状态。


    *注意：要了解某个方法（或类）的更多信息，请高亮该方法并使用 `^![Image](img/U002.jpg)?` 快捷键，以显示所选内容的快速帮助（参见
    图 3-6）。*


    ![Image](img/9781430243748_Fig03-06.jpg)


    **图 3-6.** 快速帮助。点击链接可访问完整文档。


    #### Info.plist


    选择并查看 `BirthdayReminder-Info.plist`。你会在 Supporting Files 组中找到这个重要文件。这是 Xcode 打包到我们应用中的配置文件。`Info.plist`
    文件中的设置决定了 iOS 如何实例化我们的应用。


    因为在选择项目设置选项时我们选择了使用故事板（Use Storyboard），项目模板已经创建了一个故事板，并设置了主故事板文件基名（Main Storyboard
    File Base Name）配置属性（参见 图 3-7）。


    ![Image](img/9781430243748_Fig03-07.jpg)


    **图 3-7.** 由 Xcode 项目模板自动生成并在 `Info.plist` 中定义的主故事板


    你可以在 `Info.plist` 中分配许多配置设置，包括嵌入的字体列表；状态栏的显示或隐藏；以及 URL 类型（iOS 关联并链接到你的应用的其他应用的本地
    URL 方案）。


    #### 前缀头文件


    Xcode 还在我们的项目中添加了一个 `BirthdayReminder-Prefix.pch` 文件。这是一个全局文件头，Xcode 编译器会将其预编译到项目中每一个
    Objective-C 源类中。你可以在前缀头文件中定义全局函数或导入常见类的声明，以避免在各个类中重复导入声明。


    #### 故事板


    故事板是 iOS 开发者工作流程中的一个关键工具。Apple 在 iOS 5 中为 Xcode 添加了故事板，并在 iOS 6 中对其进行了改进。根据 Apple
    文档的定义，“故事板是 iOS 应用程序用户界面的可视化表示，显示了内容屏幕以及这些屏幕之间的连接。”


    我们的 *Birthday Reminder* 项目将包含一个单一的故事板，该故事板定义了应用中的每一个屏幕，以及这些屏幕之间的连接和转场。使用 Xcode
    的编辑器，我们将在故事板的每个屏幕中布置按钮、标签和其他子视图，并创建屏幕之间的连接。


    Xcode 中的故事板使得构建 iOS 应用的速度比 iOS 5 之前快得多。在第 5 章和第 6 章中，我们将为应用中的每个视图构建故事板。


    按照代码学习的传统，我认为是时候写一个 Hello World 示例了。


    ### Hello World


    让我们来看看 Xcode 自动生成的故事板。从项目导航器（Project Navigator）的文件中选择 `MainStoryboard.storyboard`。编辑器区域将显示两个子面板：文档大纲面板（Document
    Outline panel）和故事板面板（Storyboard panel）。如果文档大纲面板被隐藏，你可以按照我在图 3-8 中所示的方法将其打开。


    ![Image](img/9781430243748_Fig03-08.jpg)


    **图 3-8.** 查看故事板文件时，你可以隐藏/显示文档大纲面板。


    我们的主视图（也是唯一视图）应该会显示在故事板上。点击并选择该视图。文档大纲面板应会更新以高亮当前选择。注意到视图下方那个深色条了吗？这代表分配给该视图的视图控制器。点击并选择这个深色条。文档大纲的选择应该会更新，表明你已经选中了视图控制器。


    保持视图控制器被选中的状态，将顶部的实用工具面板（Utilities pane）切换到第三个标签页，这会显示身份检查器（identity inspector）（参见
    图 3-9）。


    ![Image](img/9781430243748_Fig03-09.jpg)


    **图 3-9.** 通过身份检查器查看所属的视图控制器类


    身份检查器会显示当前在故事板中选择的自定义类：`BRViewController`。在第 5 章中，我们将学习如何使用身份检查器为视图控制器和视图分配自定义类。


    如果还未选择，则将底部的实用工具面板切换到第三个标签页，即对象库（Object Library），如图 3-9 所示。


    *提示：根据你的偏好设置 Xcode 的面板布局。你会在工具栏右侧找到三个切换按钮，用于隐藏/显示导航器（Navigator）、调试（Debug）和实用工具（Utilities）区域。*


