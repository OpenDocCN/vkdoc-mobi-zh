- fmt: "### Loading contact photos and data into our table view\n\nAs you see in [Figure\
    \ 10-19](#Chapter10.html#fig_10_19), we need to populate our table cells in our\
    \ Address Book view controller. We'll populate them in the shared superclass `BRImportViewController`.\
    \ Then when we move on to building our import from the Facebook view controller,\
    \ we'll already have this logic in the superclass, which will be a time-saver.\n\
    \nEach table cell in our table view is an instance of the custom table view cell\
    \ class `BRBirthdayTableViewCell`. We've already written the rendering logic for\
    \ displaying a `BRDBirthday` entity directly in this class, so begin by opening\
    \ `BRBirthdayTableViewCell.h` in Xcode and making the following additions to the\
    \ interface code:\n\n```\n@class BRDBirthday;\n@class BRDBirthdayImport;\n\n@interface\
    \ BRBirthdayTableViewCell : UITableViewCell\n\n@property(nonatomic,strong) BRDBirthday\
    \ *birthday;\n@property(nonatomic,strong) BRDBirthdayImport *birthdayImport;\n\
    ```\n\nSwitch to the `BRBirthdayTableViewCell.m` source file, import `BRDBirthdayImport.h`\
    \ and then override the `birthdayImport` setter as follows:\n\n```\n-(void) setBirthdayImport:(BRDBirthdayImport\
    \ *)birthdayImport\n{\n    _birthdayImport = birthdayImport;\n    self.nameLabel.text\
    \ = _birthdayImport.name;\n\n    int days = _birthdayImport.remainingDaysUntilNextBirthday;\n\
    \n    if (days == 0) {\n        //Birthday is today!\n        self.remainingDaysLabel.text\
    \ = self.remainingDaysSubTextLabel.text = @\"\";\n        self.remainingDaysImageView.image\
    \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n   \
    \     self.remainingDaysLabel.text = [NSString stringWithFormat:@\"%d\",days];\n\
    \        self.remainingDaysSubTextLabel.text = (days == 1) ? @\"more day\" : @\"\
    more days\";\n        self.remainingDaysImageView.image = [UIImage imageNamed:@\"\
    icon-days-remaining.png\"];\n    }\n\n    self.birthdayLabel.text = _birthdayImport.birthdayTextToDisplay;\n\
    \n}\n```\n\nThe code is again almost identical to the `birthday` managed object\
    \ setter.\n\nBack in `BRImportViewController.m`, import `BRBirthdayTableViewCell.h`\
    \ and `BRDBirthdayImport.h`, and then modify `tableView:cellForRowAtIndexPath:`:\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n\n    BRDBirthdayImport *birthdayImport = self.birthdays[indexPath.row];\n\
    \n    BRBirthdayTableViewCell *brTableCell = (BRBirthdayTableViewCell *)cell;\n\
    \n    brTableCell.birthdayImport = birthdayImport;\n\n    if (birthdayImport.imageData\
    \ == nil)\n    {\n        brTableCell.iconView.image = [UIImage imageNamed:@\"\
    icon-birthday-cake.png\"];\n    }\n    else {\n        brTableCell.iconView.image\
    \ = [UIImage imageWithData:birthdayImport.imageData];\n    }\n\n    UIImage *backgroundImage\
    \ = (indexPath.row == 0) ? [UIImage imageNamed:@\"table-row-background.png\"]\
    \ : [UIImage imageNamed:@\"table-row-icing-background.png\"];\n    brTableCell.backgroundView\
    \ = [[UIImageView alloc] initWithImage:backgroundImage];\n\n    return cell;\n\
    }\n```\n\nThis is very similar code to the home screen table view cell rendering,\
    \ so it should all look pretty familiar. Build and run. You should now see the\
    \ names, birthdays, and photos of your Address Book contacts (see [Figure 10-20](#Chapter10.html#fig_10_20)).\n\
    \n![Image](images/9781430243748_Fig10-20.jpg)\n\n**Figure 10-20.** There are my\
    \ Address Book contacts—looking better!\n\n### Creating a multiselect table view\
    \ for importing birthdays\n\nWe've got an Import Address Book view with a table\
    \ view displaying contacts and their birthdays from our Address Book, but how\
    \ do we multiselect them? Our table view shows either an empty circle or a tick\
    \ in a circle, depending on whether the contact is currently selected for import\
    \ or not. Let's add these image assets to the `resources/images` group of our\
    \ project: `icon-import-not-selected.png`, `icon-import-not-selected@2x.png`,\
    \ `icon-import-selected.png`, and `icon-import-selected@2x.png`.\n\nLet's begin\
    \ by showing our nonselected circle image on the right side of our custom table\
    \ view cell. Add the following two lines of code to the `tableView:cellForRowAtIndexPath:`\
    \ method of `BRImportViewController.m` at the end of the method, but just before\
    \ returning the cell:\n\n```\n    UIImageView *imageView = [[UIImageView alloc]\
    \ initWithImage:[UIImage imageNamed:@\"icon-import-not-selected.png\"]];\n   \
    \ brTableCell.accessoryView = imageView;\n```\n\nInstances of table view cells\
    \ have an `accessoryView` property that we can set to any view instance, and our\
    \ designated view will be displayed to the right of our table cell. Build and\
    \ run to test if the empty circles appear (see [Figure 10-21](#Chapter10.html#fig_10_21)).\n\
    \n![Image](images/9781430243748_Fig10-21.jpg)\n\n**Figure 10-21.** The circle\
    \ appears for each table cell, but it is obscured by the calendar icon.\n\nAlthough\
    \ you may not be able to see it clearly in [Figure 10-21](#Chapter10.html#fig_10_21),\
    \ the empty circle is visible, but obscured by the calendar icon behind it. We\
    \ can resolve this problem back in our storyboard. With the prototype cell of\
    \ our Address Book view controller in focus, multiselect the calendar icon and\
    \ two labels. Using the size inspector, change the autosizing properties of these\
    \ subviews so that the only the space to the right is fixed and not to the left,\
    \ as highlighted in [Figure 10-22](#Chapter10.html#fig_10_22).\n\n![Image](images/9781430243748_Fig10-22.jpg)\n\
    \n**Figure 10-22.** Changing the autosize mask of the calendar icon and labels\n\
    \nBuild and run. The results should resemble [Figure 10-23](#Chapter10.html#fig_10_23).\n\
    \n![Image](images/9781430243748_Fig10-23.jpg)\n\n**Figure 10-23.** Much better!\n\
    \nWe can update the `accessoryView` property of each of our table cells at any\
    \ time. If a contact has been selected by the user, we'll display a green tick\
    \ image next in the `accessoryView`. Otherwise, we'll display an empty circle.\n\
    \nWe'll keep track of selected birthdays to import using a mutable dictionary.\
    \ Ensure you're working on `BRImportViewController.m`. Begin by adding a new property\
    \ to the private interface of `BRImportViewController` just above the class implementation\
    \ code:\n\n```\n@interface BRImportViewController()\n\n//Keeps track of selected\
    \ rows\n@property (nonatomic, strong) NSMutableDictionary *selectedIndexPathToBirthday;\n\
    \n@end\n```\n\nWe'll use this new `selectedIndexPathToBirthday` dictionary to\
    \ keep track of which rows are selected and which aren't. As the selection changes,\
    \ we'll also update the Import button, disabling it if there are zero selected\
    \ rows.\n\nNow override the getter of your new `selectedIndexPathToBirthday` property\
    \ to ensure it is automatically lazy loaded when first accessed:\n\n```\n-(NSMutableDictionary\
    \ *) selectedIndexPathToBirthday\n{\n    if (_selectedIndexPathToBirthday == nil)\
    \ {\n        _selectedIndexPathToBirthday = [NSMutableDictionary dictionary];\n\
    \    }\n    return _selectedIndexPathToBirthday;\n}\n```\n\nNext, implement two\
    \ new private methods: `updateImportButton` and `isSelectedAtIndexPath:`:\n\n\
    ```\n//Enables/Disables the import button if there are zero rows selected\n- (void)\
    \ updateImportButton\n{\n    self.importButton.enabled = [self.selectedIndexPathToBirthday\
    \ count] > 0;\n}\n\n//Helper method to check whether a row is selected or not\n\
    -(BOOL) isSelectedAtIndexPath:(NSIndexPath *)indexPath\n{\n    return self.selectedIndexPathToBirthday[indexPath]\
    \ ? YES : NO;\n}\n```"
