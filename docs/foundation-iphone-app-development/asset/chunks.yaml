    This morning (this chapter), we’ll explore the relationship between views and
    view controllers, as well as how to storyboard our app’s navigation: pushing,
    popping, presenting, and dismissing view controllers on and off the navigation
    stack.


    This afternoon ([Chapter 6](#Chapter06.html#ch6)), we’ll have fun with views and
    user interface controls, implementing and handling interactivity in some of the
    main screens of the *Birthday Reminder* app. We’ll complete the day by spending
    some time integrating the iPhone’s Photo Library and camera directly into our
    project.'
  trans: "\n#### 响应用户交互\n\n在庄家行动之前，我们需要编写`Hit`和`Stand`按钮的操作方法代码。`Stand`方法很直接：\n\n\
    ```\n- (IBAction)didTapStandButton:(id)sender {\n    self.gameModel.gameStage\
    \ = BJGameStageDealer;\n    [self performDealerTurn];\n}\n```\n\n控制器告知模型游戏阶段已推进到庄家回合，随后我们将调用`performDealerTurn()`方法。\n\
    \n`Hit`方法稍复杂一些：\n\n```\n- (IBAction)didTapHitButton:(id)sender {\n    BJDCard\
    \ *card = [self.gameModel nextPlayerCard];\n    card.isFaceUp = YES;\n    [self\
    \ renderCards];\n\n    [self.gameModel updateGameStage];\n    if (self.gameModel.gameStage\
    \ == BJGameStageDealer) {\n        [self performDealerTurn];\n    }\n}\n```\n\n\
    首先，控制器请求模型发一张玩家牌。控制器在视图中正面朝上渲染这张牌。接着控制器告知模型更新游戏阶段——即游戏可能已结束，因为玩家爆牌或摸到五张牌的上限。`BJViewController`通过检查确认玩家回合是否结束，若是则执行自动庄家方法：\n\
    \n```\nif (self.gameModel.gameStage == BJGameStageDealer) {\n    [self performDealerTurn];\n\
    }\n```\n\n太棒了！现在你可以完整玩一局二十一点了！构建并运行试试看。\n\n哎呀，你的应用是不是在游戏结束时崩溃了？我们遗漏了什么？\n\n啊对了，我们从未在`BJViewController`中实现`handleNotificationGameDidEnd:`方法。还记得我们在该类的指定初始化方法中订阅的那个通知吗？我们需要添加那个方法！代码如下：\n\
    \n```\n-(void) handleNotificationGameDidEnd:(NSNotification *)notification\n{\n\
    \    NSDictionary *userInfo = notification.userInfo;\n\n    NSNumber *num = userInfo[@\"\
    didDealerWin\"];\n\n    NSString *message = [num boolValue] ? @\"庄家赢了！\" : @\"\
    你赢了！\";\n\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"游戏结束\"\
    \ message:message\n    delegate:nil cancelButtonTitle:nil otherButtonTitles:@\"\
    再来一局\", nil];\n    [alert show];\n}\n```\n\n在我们的通知处理程序中，通过`userInfo`属性就能提取获胜者信息。我们预期得到一个字典，其中包含包装了布尔基本类型的`NSNumber`属性。因此我们还需提取基本布尔值来判断庄家是否获胜：\n\
    \n```\nNSString *message = [num boolValue] ? @\"庄家赢了！\" : @\"你赢了！\";\n```\n\n\
    最终得到获胜信息，并在警告视图中显示（参见图 4-19）。\n\n![图片](img/9781430243748_Fig04-19.jpg)\n\n**图\
    \ 4-19** 耶！我花了五次构建运行才截到一张获胜截图！\n\n#### 协议与委托模式\n\n不过我们还没完全完成。应用不再崩溃，但一旦关闭警告视图，游戏就结束了。按钮被禁用，我们无法重新开始游戏。这可不行！我们要将确定按钮改为\"\
    再来一局\"，并在按钮按下时重新开始游戏。\n\n如何知道按钮被按下？`UIAlertView`类并未暴露其按钮属性，因此我们无法在此实例中利用目标-动作机制。相反，与\
    \ Apple iOS SDK 的许多组件一样，`UIAlertView`采用了委托模式。\n\n`UIAlertView`有一个名为**委托**的弱引用属性。只要对象实现了`UIAlertViewDelegate`协议，`UIAlertView`不关心哪个对象想成为其委托。**协议**类似于类接口：它定义了协议将要实现的一组方法签名。但协议也可以定义*可选*方法签名。为了让`BJViewController`将自己设为警告视图的委托，它需要先声明实现了`UIAlertViewDelegate`协议。为此，我们暂时切换到`BJViewController`的头文件。\n\
    \n将接口声明的第一行从\n\n`@interface BJViewController : UIViewController`\n\n改为\n\n`@interface\
    \ BJViewController : UIViewController <UIAlertViewDelegate>`\n\n如果你查看`UIAlertViewDelegate`的头文件，会发现其所有方法都是可选的。因此即使我们尚未添加任何`UIAlertViewDelegate`协议方法，编译器也不会生成任何关于代码的警告。\n\
    \n**注：**当一个类声明实现包含必需方法的协议时，如果类没有实际实现这些方法，编译器会显示警告。\n\n现在回到`BJViewController`的源文件。我们需要对`handleNotificationGameDidEnd:`方法中显示警告的代码做一点小改动：\n\
    \n```\nUIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"游戏结束\" message:message\n\
    \    delegate:self cancelButtonTitle:nil otherButtonTitles:@\"再来一局\", nil];\n\
    [alert show]\n```\n\n注意到我们现在已将自身设为警告视图的委托了吗？\n\n最后，我们要向`BJViewController`的实现中添加一个`UIAlertViewDelegate`方法：\n\
    \n```\n- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
    {\n    [self restartGame];\n}\n```\n\n**提示：**添加委托方法时，快速实现方法代码的方式是从 Organizer 文档中直接复制并粘贴到你的类中。\n\
    \n就是这样，我们完成了！现在你应该可以构建并运行游戏——并且一遍又一遍地玩二十一点了。\n\n### 本章小结\n\n这是一段史诗般的旅程！在本章中我们接触了\
    \ Objective-C 的许多部分。我相信其中一些部分仍然令人困惑。不过，这正是你继续阅读本书剩余内容的原因：随着我们推进*生日提醒*应用，Objective-C\
    \ 方法、属性、实例变量、协议、选择器、Interface Builder 输出口、动作等的语法声明和实现会变得越来越熟悉。\n\n第一天到此结束！明天我们将回到主项目*生日提醒*。如果你觉得我们涉及了大量代码且有些迷失方向，请不要担心，我们将在明天全天投入第\
    \ 5 章和第 6 章，为应用的用户界面绘制故事板。虽然会有编码，但绝不会像本章这样信息过载。\n\n![图片](img/ch.jpg)\n\n## 第二天\n\
    \n## 故事板绘制用户界面\n\n![图片](img/ch.jpg)\n\n## 第 5 章\n\n## iPhone 应用导航、视图与视图控制器\n\n\
    今天是第二天，阳光灿烂（至少布莱顿这里是这样！）。我们回到主项目*生日提醒*。今天全天，我们将百分之百地致力于应用的用户界面工作。\n\n今天上午（本章），我们将探讨视图与视图控制器之间的关系，以及如何为应用的导航绘制故事板：在导航堆栈上推入、弹出、呈现和关闭视图控制器。\n\
    \n今天下午（第 6 章），我们将享受视图和用户界面控件的乐趣，在*生日提醒*应用的几个主要屏幕中实现并处理交互性。最后，我们将花一些时间将 iPhone\
    \ 的照片库和相机直接集成到项目中，以此结束今天的工作。"
- fmt: '### Multiple view apps


    Up until now, we’ve only included a single view and view controller in both the
    *Birthday Reminder* and blackjack apps. For some apps, like simple games, a single
    view is sufficient. However, multiple view apps enable large amounts of content
    to be presented to users through a small screen device in a clear and structured
    form.


    *Birthday Reminder* is a multiview application. Each birthday object in our model
    includes a name, birth date, profile photo, gift notes, and a link to Facebook
    user details, or phone and e-mail details imported from the native Address Book.
    That would be a lot of data to display clearly in a single view for potentially
    hundreds of birthdays! By creating a multiview application on the home view, our
    user will see just summary information about each stored birthday, such as a small-profile
    photo, name, and the number of days until each birthday. When the user taps on
    a particular birthday, it drills down a level in the navigation, presenting the
    Birthday Detail view that includes a larger-profile photo display and full details
    about our friend and his or her birthday (see [Figure 5-1](#Chapter05.html#fig_5_1)).


    ![Image](images/9781430243748_Fig05-01.jpg)


    **Figure 5-1.** Multiple view apps are ideal for presenting large amounts of content
    on a small screen device.


    We’ll continue working on our main *Birthday Reminder* app throughout the remainder
    of this book. Open the *Birthday Reminder* Xcode project you built in [Chapter
    3](#Chapter03.html#ch3). Alternatively, open the starting source code for this
    chapter.


    *Note: If you decide to start working from the source code at any point during
    the book, be sure to update the bundle identifier in the `Info.plist` from `com.apress.BirthdayReminder`
    to `com.yourdomain.BirthdayReminder`.*


    ### Mastering views and view controllers


    In the first half of this chapter, I walk you through the basics of views and
    view controllers. By working with storyboards, you’ll learn how easy it is to
    build up a navigation hierarchy between screens in your app. You’ll also gain
    understanding of the view life cycle and when and where to add code to view controllers
    in response to users navigating your app.


    With your *Birthday Reminder* project open, begin by deleting any label or other
    subview you previously added to the main view in the Hello World example.


    #### Adding a navigation controller


    In order to add a Birthday Detail scene, we’ll first add a navigation controller
    instance to our storyboard. Navigation controllers manage drilldown stacks of
    multiple view controllers. As a new view controller is pushed onto the navigation
    controller stack, the navigation controller animates the current view off screen
    left and slides in the new view from the right.


    Currently, we have a single view controller and a single view in our storyboard.
    I’d like you to select the view controller and not the view. To do this, click
    the circular orange icon below and to the left of the view (see [Figure 5-2](#Chapter05.html#fig_5_2)).


    ![Image](images/9781430243748_Fig05-02.jpg)


    **Figure 5-2.** Selecting the view controller


    With the view controller selected in the storyboard, adding a new parent navigation
    controller is simple work from Xcode’s menu bar: Editor ![Image](images/U001.jpg)
    Embed In ![Image](images/U001.jpg) Navigation Controller. The result should look
    like [Figure 5-3](#Chapter05.html#fig_5_3).


    ![Image](images/9781430243748_Fig05-03.jpg)


    **Figure 5-3.** A view controller embedded in a navigation controller


    Once embedded in a navigation controller, the view controller inherits a navigation
    bar from its new parent container view controller. Double-click the simulated
    navigation bar of the view controller to enter the navigation title **Birthdays**
    (see [Figure 5-3](#Chapter05.html#fig_5_3)).


    #### Storyboard scenes and the root view controller


    Every main view or screen in iOS Apps is typically owned and managed by an instance
    of Apple’s `UIViewController` class. In order to create our multiple-view app,
    we’ll add additional view controllers to the storyboard, each of which will control
    its own view. The combination of a view and view controller is referred to as
    a *scene* in storyboard terminology.


    The very first view controller that is presented by your app is known as the *root
    view controller*. Did you notice that the new navigation controller in our storyboard
    has an arrow pointing to it from its left side? That is Xcode’s way of indicating
    that this is the root view controller. Be sure not to delete the root view controller
    from your storyboard, or else Xcode’s compiler won’t be able to interpret your
    storyboard anymore. ![Image](images/smile.jpg)


    Although our home view controller is now embedded in a navigation controller,
    we still only have a single scene in our app, albeit with a navigation bar. We’re
    now going to add a second scene to our storyboard, which will eventually become
    the Birthday Detail view. We add new scenes by dragging new view controller instances
    from the Object Library onto the storyboard. I find it easier to do this with
    the storyboard zoomed out a little. To achieve this, tap the minus magnifying
    glass button on the storyboard once (bottom-right corner of the editor pane).
    Then drag and drop a new view controller (`UIViewController`) instance from the
    Object Library onto the storyboard (see [Figure 5-4](#Chapter05.html#fig_5_4)).


    ![Image](images/9781430243748_Fig05-04.jpg)


    **Figure 5-4.** Adding a new view controller scene


    Did you notice that the new view controller doesn’t have a navigation bar added
    to it like our first view controller? That’s because we haven’t connected it to
    our navigation controller yet. Apart from when it’s transitioning views, a navigation
    controller only shows one view controller from its stack at a time: the top one.
    To push our new view controller onto the navigation controller, we need to create
    a *segue* connection.


    #### Pushing a view controller with a segue


    A segue or `UIStoryboardSegue` is an object that defines a visual transition from
    one view controller to another. Add a button to your first view controller, name
    it Push Birthday Detail View Controller (hmmm, catchy!), and then create a segue
    from the button to the second view controller by control-dragging from the button
    to the second view controller (see [Figure 5-5](#Chapter05.html#fig_5_5)).


    ![Image](images/9781430243748_Fig05-05.jpg)


    **Figure 5-5.** Control-drag to create a segue


    A contextual menu presents you with three types of segue: Push, Modal, and Custom.
    Select Push. Xcode automatically adds the inherited navigation bar from our navigation
    controller to the new view controller, and displays an arrow between the first
    and second view controllers to indicate the new segue connection (see [Figure
    5-6](#Chapter05.html#fig_5_6)).


    ![Image](images/9781430243748_Fig05-06.jpg)


    **Figure 5-6.** The new segue connection


    Add a title to the second view controller, Birthday Detail. Build and run your
    app. You should be able to navigate between the first and second view controllers
    using the button on the first controller and the dynamically generated Back button
    on the second. Pretty easy, huh?'
