- fmt: "### Creating a Core Data application\n\nApple includes Core Data as an option\
    \ for many of their Xcode templates, so let’s check one out now. Fire up Xcode\
    \ and create a new iPhone project based on the Master-Detail template, as shown\
    \ in [Figure 8-1](#Chapter08.html#fig_8_1).\n\n![Image](images/9781430243748_Fig08-01.jpg)\n\
    \n**Figure 8-1.** New Master-Detail Core Data example project options\n\nName\
    \ your project `CoreDataExample` and ensure that the Use Core Data option is selected.\
    \ Build and run the new project in the simulator. Tap the Add button a few times,\
    \ and then the Edit button; you should see similar results to [Figure 8-2](#Chapter08.html#fig_8_2).\n\
    \n![Image](images/9781430243748_Fig08-02.jpg)\n\n**Figure 8-2.** Master-Detail\
    \ Core Data project running\n\nAs you can see in [Figure 8-2](#Chapter08.html#fig_8_2),\
    \ the iPhone application generated from the Master-Detail template using Core\
    \ Data enables the user to create, view, and delete data model objects containing\
    \ a time stamp property. Rebuild and run the app. You’ll discover the data model\
    \ objects are still displayed; they are persistent and have been saved to disk\
    \ by a little Core Data magic. However, it’s important that we understand a little\
    \ more about how Core Data works and what’s behind that magic.\n\n### The persistent\
    \ store\n\nUnder the hood, Core Data translates and stores any saved data changes\
    \ to the *persistent store*. The persistent store can be set to any of the follow\
    \ three storage types:\n\n> *   *In memory* (`NSInMemoryStoreType`): This type\
    \ of storage isn’t actually persistent if an app is forced to quit. It’s often\
    \ used for runtime caching of data objects.\n> *   *Flat binary file* (`NSBinaryStoreType`):\
    \ In some cases, using a flat binary file might improve performance of data retrieval;\
    \ but the downside is that as stored data grows, so too will the size of the binary\
    \ file and initial loading time.\n> *   *SQLite database* (`NSSQLiteStoreType`):\
    \ This is the most common storage type by Core Data driven applications and the\
    \ default used by the Apple project templates.\n\nWe’ll be opting for the SQLite\
    \ database storage type. It should ensure that our app remains scalable for large\
    \ data sets. I’d generally recommend sticking with this default choice for the\
    \ majority of Core Data powered apps.\n\nAt runtime, initializing a Core Data\
    \ driven app involves creating an instance of a persistent store coordinator (`NSPersistentStoreCoordinator`)\
    \ to create Core Data’s connection to the persistent store.\n\nLet’s take a quick\
    \ look at this code in our `CoreDataExample` project in the `AppDelegate.m` file:\n\
    \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{\n    if\
    \ (_persistentStoreCoordinator != nil) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    CoreDataExample.sqlite\"];\n\n    NSError *error = nil;\n    _persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\
    \    \n\n    return _persistentStoreCoordinator;\n}\n```\n\nIn the highlighted\
    \ code, you can see that we’re defining a local URL to an SQLite database file.\
    \ We’re also connecting the instantiated persistent store coordinator to the persistent\
    \ store, passing in `NSSQLiteStoreType` as the storage type. These are the only\
    \ references to the underlying database we’ll make: Core Data will take care of\
    \ the rest. Core Data will create the SQLite database at the location specified\
    \ (if it hasn’t already created it in a previous session) and will manage the\
    \ database for us. In the future, if our data model changes and requires migration,\
    \ in most cases Core Data can update and modify the database for us automatically.\n\
    \n*Note: I recommend researching Core Data’s migration options for initializing\
    \ a persistent store coordinator. By switching on lightweight migration for most\
    \ projects, you’ll ensure that future changes you make to your data model are\
    \ automatically migrated by Core Data.*\n\nYou may also have noticed in the preceding\
    \ code that the persistent store coordinator is instantiated with a reference\
    \ to a *managed object model*, which is your custom model object graph: a definition\
    \ of each data object in your model, the attributes of each object, and the relationships\
    \ between objects. But what exactly are those objects?\n\n### Entities and managed\
    \ objects\n\nIn Core Data, the native Objective-C data objects that are created,\
    \ edited, and modified are defined by class descriptions known as *entities*.\
    \ From these entity descriptions, Core Data generates object instances called\
    \ *managed objects*, which can have attribute types such as strings, numbers,\
    \ and dates. Managed objects can also have relationships to other managed objects\
    \ in the model. All managed objects are either instances or subclasses of the\
    \ `NSManagedObject` class.\n\nWe access the attributes of a managed object using\
    \ key-value methods. Delving into the `MasterViewController.m` source file, we\
    \ can see how to set a managed object attribute:\n\n```\n[newManagedObject setValue:[NSDate\
    \ date] forKey:@\"timeStamp\"];\n```\n\nAnd how to retrieve the value of a managed\
    \ object attribute:\n\n```\n[object valueForKey:@\"timeStamp\"];\n```\n\nAs we’ll\
    \ discover later in the chapter, we can also subclass `NSManagedObject`, a step\
    \ up from key-value coding because it enables us to strongly type attributes.\n\
    \nBut how do we define entities and create managed objects? Xcode includes a UML\
    \ modeling tool for developers that we’ll look at next.\n\n### The Core Data model\
    \ file\n\nLet’s take a closer look at the Core Data model from the Master-Detail\
    \ project template. The model file will have the same name as your project, so\
    \ select `CoreDataExample.xcdatamodeld` in the Project Navigator (see [Figure\
    \ 8-3](#Chapter08.html#fig_8_3)).\n\n![Image](images/9781430243748_Fig08-03.jpg)\n\
    \n**Figure 8-3.** A basic Core Data model\n\nIn [Figure 8-3](#Chapter08.html#fig_8_3),\
    \ you can see that I’ve kept the utility pane open because it includes the data\
    \ model inspector when working with a Core Data model file, so we can view entity\
    \ and attribute details depending on the selection in the main editor pane. You\
    \ can toggle between a UML graph-style display of your data model and a table-style\
    \ display of your data model, as shown in [Figure 8-4](#Chapter08.html#fig_8_4).\n\
    \n![Image](images/9781430243748_Fig08-04.jpg)\n\n**Figure 8-4.** Viewing the data\
    \ model with the table-style editor\n\nAs you can see in [Figures 8-3](#Chapter08.html#fig_8_3)\
    \ and [8-4](#Chapter08.html#fig_8_4), our model has just one entity, named `Event`.\
    \ The `Event` entity has one attribute, named `timeStamp`. In [Figure 8-3](#Chapter08.html#fig_8_3),\
    \ with the `Event` entity selected, we can see that managed objects based on this\
    \ entity will automatically be assigned to the default `NSManagedObject` class.\n\
    \nIn [Figure 8-4](#Chapter08.html#fig_8_4), viewing the data model with the table-style\
    \ editor option, I’ve selected the `Event` entity and the editor lists the attributes\
    \ (similar to properties) of the `Event` entity. In the case of Apple’s example\
    \ project, `Event` has just one attribute: `timeStamp`. Selecting `timeStamp`\
    \ in the editor will also reveal the details for this entity attribute: it’s an\
    \ optional property with a data type of `NSDate`. So each time the Add button\
    \ is tapped, the master view controller creates a new `Event` instance and sets\
    \ its `timeStamp` value to the current date. It then saves the Core Data context."
  raw: '#### Creating a Core Data application


    Apple includes Core Data as an option for many of their Xcode templates, so let’s
    check one out now. Fire up Xcode and create a new iPhone project based on the
    Master-Detail template, as shown in [Figure 8-1](#Chapter08.html#fig_8_1).


    ![Image](images/9781430243748_Fig08-01.jpg)


    **Figure 8-1.** New Master-Detail Core Data example project options


    Name your project `CoreDataExample` and ensure that the Use Core Data option is
    selected. Build and run the new project in the simulator. Tap the Add button a
    few times, and then the Edit button; you should see similar results to [Figure
    8-2](#Chapter08.html#fig_8_2).


    ![Image](images/9781430243748_Fig08-02.jpg)


    **Figure 8-2.** Master-Detail Core Data project running


    As you can see in [Figure 8-2](#Chapter08.html#fig_8_2), the iPhone application
    generated from the Master-Detail template using Core Data enables the user to
    create, view, and delete data model objects containing a time stamp property.
    Rebuild and run the app. You’ll discover the data model objects are still displayed;
    they are persistent and have been saved to disk by a little Core Data magic. However,
    it’s important that we understand a little more about how Core Data works and
    what’s behind that magic.


    #### The persistent store


    Under the hood, Core Data translates and stores any saved data changes to the
    *persistent store*. The persistent store can be set to any of the follow three
    storage types:


    > *   *In memory* (**`NSInMemoryStoreType`**): This type of storage isn’t actually
    persistent if an app is forced to quit. It’s often used for runtime caching of
    data objects.

    > *   *Flat binary file* (**`NSBinaryStoreType`**): In some cases, using a flat
    binary file might improve performance of data retrieval; but the downside is that
    as stored data grows, so too will the size of the binary file and initial loading
    time.

    > *   *SQLite database* (**`NSSQLiteStoreType`**): This is the most common storage
    type by Core Data driven applications and the default used by the Apple project
    templates.


    We’ll be opting for the SQLite database storage type. It should ensure that our
    app remains scalable for large data sets. I’d generally recommend sticking with
    this default choice for the majority of Core Data powered apps.


    At runtime, initializing a Core Data driven app involves creating an instance
    of a persistent store coordinator (`NSPersistentStoreCoordinator`) to create Core
    Data’s connection to the persistent store.


    Let’s take a quick look at this code in our `CoreDataExample` project in the `AppDelegate.m`
    file:


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator`

    `{`

    `    if (_persistentStoreCoordinator != nil) {`

    `        return _persistentStoreCoordinator;`

    `    }`


    `    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@"`**`CoreDataExample.sqlite`**`"];`


    `    NSError *error = nil;`

    `    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self
    managedObjectModel]];`

    `    if (![_persistentStoreCoordinator addPersistentStoreWithType:`**`NSSQLiteStoreType`**
    `configuration:nil URL:storeURL options:nil error:&error]) {`

    `        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `        abort();`

    `    }    `


    `    return _persistentStoreCoordinator;`

    `}`


    In the highlighted code, you can see that we’re defining a local URL to an SQLite
    database file. We’re also connecting the instantiated persistent store coordinator
    to the persistent store, passing in `NSSQLiteStoreType` as the storage type. These
    are the only references to the underlying database we’ll make: Core Data will
    take care of the rest. Core Data will create the SQLite database at the location
    specified (if it hasn’t already created it in a previous session) and will manage
    the database for us. In the future, if our data model changes and requires migration,
    in most cases Core Data can update and modify the database for us automatically.


    *Note: I recommend researching Core Data’s migration options for initializing
    a persistent store coordinator. By switching on lightweight migration for most
    projects, you’ll ensure that future changes you make to your data model are automatically
    migrated by Core Data.*


    You may also have noticed in the preceding code that the persistent store coordinator
    is instantiated with a reference to a *managed object model*, which is your custom
    model object graph: a definition of each data object in your model, the attributes
    of each object, and the relationships between objects. But what exactly are those
    objects?


    #### Entities and managed objects


    In Core Data, the native Objective-C data objects that are created, edited, and
    modified are defined by class descriptions known as *entities*. From these entity
    descriptions, Core Data generates object instances called *managed objects*, which
    can have attribute types such as strings, numbers, and dates. Managed objects
    can also have relationships to other managed objects in the model. All managed
    objects are either instances or subclasses of the `NSManagedObject` class.


    We access the attributes of a managed object using key-value methods. Delving
    into the `MasterViewController.m` source file, we can see how to set a managed
    object attribute:


    `[newManagedObject setValue:[NSDate date] forKey:@"timeStamp"];`


    And how to retrieve the value of a managed object attribute:


    `[object valueForKey:@"timeStamp"];`


    As we’ll discover later in the chapter, we can also subclass `NSManagedObject`,
    a step up from key-value coding because it enables us to strongly type attributes.


    But how do we define entities and create managed objects? Xcode includes a UML
    modeling tool for developers that we’ll look at next.


    #### The Core Data model file


    Let’s take a closer look at the Core Data model from the Master-Detail project
    template. The model file will have the same name as your project, so select `CoreDataExample.xcdatamodeld`
    in the Project Navigator  (see [Figure 8-3](#Chapter08.html#fig_8_3)).


    ![Image](images/9781430243748_Fig08-03.jpg)


    **Figure 8-3.** A basic Core Data model


    In [Figure 8-3](#Chapter08.html#fig_8_3), you can see that I’ve kept the utility
    pane open because it includes the data model inspector when working with a Core
    Data model file, so we can view entity and attribute details depending on the
    selection in the main editor pane. You can toggle between a UML graph-style display
    of your data model and a table-style display of your data model, as shown in [Figure
    8-4](#Chapter08.html#fig_8_4).


    ![Image](images/9781430243748_Fig08-04.jpg)


    **Figure 8-4.** Viewing the data model with the table-style editor


    As you can see in [Figures 8-3](#Chapter08.html#fig_8_3) and [8-4](#Chapter08.html#fig_8_4),
    our model has just one entity, named `Event`. The `Event` entity has one attribute,
    named `timeStamp`. In [Figure 8-3](#Chapter08.html#fig_8_3), with the `Event`
    entity selected, we can see that managed objects based on this entity will automatically
    be assigned to the default `NSManagedObject` class.


    In [Figure 8-4](#Chapter08.html#fig_8_4), viewing the data model with the table-style
    editor option, I’ve selected the `Event` entity and the editor lists the attributes
    (similar to properties) of the `Event` entity. In the case of Apple’s example
    project, `Event` has just one attribute: `timeStamp`. Selecting `timeStamp` in
    the editor will also reveal the details for this entity attribute: it’s an optional
    property with a data type of `NSDate`. So each time the Add button is tapped,
    the master view controller creates a new `Event` instance and sets its `timeStamp`
    value to the current date. It then saves the Core Data context.'
  trans: "### 创建 Core Data 应用程序\n\nApple 在其许多 Xcode 模板中将 Core Data 作为一个选项提供，现在让我们来查看一个模板。启动\
    \ Xcode，并基于 Master-Detail 模板创建一个新的 iPhone 项目，如 图 8-1 所示。\n\n![Image](img/9781430243748_Fig08-01.jpg)\n\
    \n**图 8-1.** 新的 Master-Detail Core Data 示例项目选项\n\n将项目命名为 `CoreDataExample`，并确保选中“使用\
    \ Core Data”选项。在模拟器中构建并运行新项目。点击“添加”按钮几次，然后点击“编辑”按钮；您应该会看到类似 图 8-2 的结果。\n\n![Image](img/9781430243748_Fig08-02.jpg)\n\
    \n**图 8-2.** 正在运行的 Master-Detail Core Data 项目\n\n如 图 8-2 所示，从使用 Core Data 的 Master-Detail\
    \ 模板生成的 iPhone 应用程序允许用户创建、查看和删除包含时间戳属性的数据模型对象。重新构建并运行该应用程序。您会发现数据模型对象仍然显示；它们是持久的，并且已通过\
    \ Core Data 的神奇功能保存到了磁盘。然而，更重要的是，我们需要对 Core Data 的工作原理以及这种神奇功能背后的机制有更多了解。\n\n\
    ### 持久化存储\n\n在底层，Core Data 会将所有保存的数据更改翻译并存储到*持久化存储*中。持久化存储可以设置为以下三种存储类型之一：\n\n\
    > *   *内存存储* (`NSInMemoryStoreType`)：如果应用程序被强制退出，这种存储类型实际上并不持久。它通常用于数据对象的运行时缓存。\n\
    > *   *平面二进制文件* (`NSBinaryStoreType`)：在某些情况下，使用平面二进制文件可能会提高数据检索的性能；但缺点是随着存储数据的增长，二进制文件的大小和初始加载时间也会增加。\n\
    > *   *SQLite 数据库* (`NSSQLiteStoreType`)：这是 Core Data 驱动的应用程序中最常见的存储类型，也是 Apple\
    \ 项目模板使用的默认类型。\n\n我们将选择 SQLite 数据库存储类型。这应确保我们的应用程序在处理大型数据集时保持可扩展性。我通常建议在大多数基于\
    \ Core Data 的应用程序中坚持使用这个默认选择。\n\n在运行时，初始化一个 Core Data 驱动的应用程序涉及创建一个持久化存储协调器实例\
    \ (`NSPersistentStoreCoordinator`)，以建立 Core Data 与持久化存储的连接。\n\n让我们快速查看 `CoreDataExample`\
    \ 项目中 `AppDelegate.m` 文件里的这段代码：\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n    if (_persistentStoreCoordinator != nil) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
    CoreDataExample.sqlite\"];\n\n    NSError *error = nil;\n    _persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\
    \    \n\n    return _persistentStoreCoordinator;\n}\n```\n\n在高亮代码中，您可以看到我们定义了一个指向\
    \ SQLite 数据库文件的本地 URL。同时，我们还将实例化的持久化存储协调器连接到持久化存储，并传入 `NSSQLiteStoreType` 作为存储类型。这些是我们对底层数据库进行的唯一引用：其余工作将由\
    \ Core Data 处理。Core Data 会在指定位置创建 SQLite 数据库（如果它在之前的会话中尚未创建），并为我们管理该数据库。将来，如果我们的数据模型发生变化并需要迁移，在大多数情况下，Core\
    \ Data 可以自动为我们更新和修改数据库。\n\n*注意：我建议研究用于初始化持久化存储协调器的 Core Data 迁移选项。通过对大多数项目启用轻量级迁移，您将确保将来对数据模型所做的更改能由\
    \ Core Data 自动迁移。*\n\n您可能还注意到，在前面的代码中，持久化存储协调器是使用对*托管对象模型*的引用进行实例化的，该模型是您的自定义模型对象图：模型中每个数据对象的定义、每个对象的属性以及对象之间的关系。但这些对象到底是什么呢？\n\
    \n### 实体与托管对象\n\n在 Core Data 中，被创建、编辑和修改的原生 Objective-C 数据对象由称为*实体*的类描述来定义。根据这些实体描述，Core\
    \ Data 会生成称为*托管对象*的对象实例，这些实例可以包含字符串、数字和日期等属性类型。托管对象还可以与模型中的其他托管对象建立关系。所有托管对象要么是\
    \ `NSManagedObject` 类的实例，要么是其子类。\n\n我们使用键值方法来访问托管对象的属性。深入查看 `MasterViewController.m`\
    \ 源文件，我们可以看到如何设置托管对象属性：\n\n```\n[newManagedObject setValue:[NSDate date] forKey:@\"\
    timeStamp\"];\n```\n\n以及如何检索托管对象属性的值：\n\n```\n[object valueForKey:@\"timeStamp\"\
    ];\n```\n\n正如我们将在本章后面发现的，我们还可以对 `NSManagedObject` 进行子类化，这是键值编码的升级，因为它使我们能够对属性进行强类型化。\n\
    \n但是，我们如何定义实体并创建托管对象呢？Xcode 包含一个面向开发者的 UML 建模工具，接下来我们将介绍它。\n\n### Core Data 模型文件\n\
    \n让我们更仔细地查看来自 Master-Detail 项目模板的 Core Data 模型。模型文件将与项目同名，因此在项目导航器中选择 `CoreDataExample.xcdatamodeld`（参见\
    \ 图 8-3）。\n\n![Image](img/9781430243748_Fig08-03.jpg)\n\n**图 8-3.** 一个基本的 Core\
    \ Data 模型\n\n在 图 8-3 中，您可以看到我让实用工具面板保持打开，因为当处理 Core Data 模型文件时，它包含数据模型检查器，这样我们就可以根据主编辑器面板中的选择来查看实体和属性的详细信息。您可以切换数据模型的\
    \ UML 图形化显示和表格化显示，如 图 8-4 所示。\n\n![Image](img/9781430243748_Fig08-04.jpg)\n\n\
    **图 8-4.** 使用表格式编辑器查看数据模型\n\n如 图 8-3 和 8-4 所示，我们的模型只有一个名为 `Event` 的实体。`Event`\
    \ 实体有一个名为 `timeStamp` 的属性。在 图 8-3 中，选中 `Event` 实体后，我们可以看到基于该实体的托管对象将自动分配给默认的 `NSManagedObject`\
    \ 类。\n\n在 图 8-4 中，使用表格式编辑器选项查看数据模型时，我选中了 `Event` 实体，编辑器列出了 `Event` 实体的属性（类似于属性）。在\
    \ Apple 的示例项目中，`Event` 只有一个属性：`timeStamp`。在编辑器中选择 `timeStamp` 还会显示该实体属性的详细信息：它是一个可选的属性，数据类型为\
    \ `NSDate`。因此，每次点击“添加”按钮时，主视图控制器都会创建一个新的 `Event` 实例，并将其 `timeStamp` 值设置为当前日期。然后它会保存\
    \ Core Data 上下文。"
- fmt: '#### Initializing a Core Data Model


    In summary, the anatomy of a Core Data stack can be presented as shown in [Figure
    8-5](#Chapter08.html#fig_8_5).


    ![Image](images/9781430243748_Fig08-05.jpg)


    **Figure 8-5.** The anatomy of a Core Data stack


    At the bottom of the stack, the persistent store (SQLite database by default).
    We add the persistent store to the persistent store coordinator, which we initiate
    with a managed object model. The managed object model is based on the `xcdatamodeld`
    file we just looked at in Xcode. Finally, we create a managed object context (`NSManagedObjectContext`)
    instance with which we can both create and access managed object instances to
    use in our application. But what’s a managed object context?


    The `NSManagedObjectContext` is the only class we’ll really care about once our
    Core Data model has initialized when our program first runs. Adding, editing,
    and deleting entities will be achieved directly via the managed object context.


    A little confused? Don’t worry, for fairly simple applications like *Birthday
    Reminder*, the code to initialize a Core Data store and model can be virtually
    identical for every app you build. All better now? Good stuff!


    #### What Is a Managed Object Context?


    A *managed object context* is the representation of all the Core Data objects
    in our application, and their relationships to one another. Although we’ll only
    use a single managed object context in our *Birthday Reminder* app, it’s not uncommon
    to create multiple managed object contexts in an iOS App. Multiple managed object
    contexts can share a persistent store. However, if we make changes to the entities
    in one managed object context, they will not be reflected in another unless we
    save and merge the contexts.


    With a single managed object context of our Core Data model, we’ll be able to
    add new entities, change attributes, and when required, delete entities. When
    we want to write our managed object context changes to disk, we’ll need to save
    the managed object context.


    #### Adding, Editing, Deleting, and Saving Entities


    In the Master-Detail example app, once the `AppDelegate` has initialized the model,
    store, and managed object context, it passes a reference to the managed object
    context onto the master view controller:


    `controller.managedObjectContext = self.managedObjectContext;`


    The master view controller can now add, edit, delete, and save Core Data entities
    all via its reference to the managed object context.


    To understand the code required to add, edit, delete, and save Core Data entities,
    we can simplify a great deal of the code in Apple’s master view controller to
    the following examples:


    ##### Adding


    ```

    NSManagedObject *newManagedObject = [NSEntityDescription

    insertNewObjectForEntityForName:@”Event” inManagedObjectContext:self.managedObjectContext];

    ```


    All Core Data entities are instances or subclass instances of the `NSManagedObject`
    class. However, unlike most other Objective-C classes, we don’t create instances
    of `NSManagedObject` via `alloc init`. Instead, we invoke the class method of
    `NSEntityDescription` and pass in our entity name and a reference to the managed
    object context.


    ##### Editing


    By default, entities defined in our Core Data model are instances of Apple’s `NSManagedObject`
    class. In order to set a property, we call the `setValue:forKey:` method of `NSManagedObject`:


    ```

    [aManagedObject setValue:[NSDate date] forKey:@"timeStamp"];

    ```


    With the data model inspector, however, we can also specify custom value object
    classes for entities that Xcode can build for use in our apps. The advantage of
    this is strict data-typing; so the preceding code would change to:


    ```

    aManagedObject.timeStamp = [NSDate date];

    ```


    We’ll learn more about custom entity classes when we integrate a new Core Data
    model into our *Birthday Reminder* app later in the chapter.


    ##### Deleting


    Deleting Core Data entities is a simple as:


    ```

    [self.managedObjectContext deleteObject:aManagedObject];

    ```


    ##### Saving


    When we’re ready for Core Data to write our changes to disk (the persistent store),
    we call `save:` on the managed object context:


    ```

    NSError *error = nil;

        if ([self.managedObjectContext hasChanges]) {

            if (![self.managedObjectContext save:&error]) {//save failed

                NSLog(@"Save failed: %@",[error localizedDescription]);

            }

            else {

                NSLog(@"Save succeeded");

            }

        }

    ```


    Examples of when we’d call save are at the point a user taps the Save button in
    the edit birthday view controller or after we’ve finished importing a batch of
    birthdays.


    ### Implementing Core Data into Birthday Reminder


    Before we can start implementing Core Data into our *Birthday Reminder* app, we
    need to add the Core Data framework to our project’s target. The target is the
    resulting iPhone app that Xcode compiles for us whenever we build our project.


    #### Adding the Core Data Framework


    To add an Apple framework to our project, first select the `BirthdayReminder`
    project in the Project Navigator, then select the `BirthdayReminder` target and
    finally select Build Phases tab, as shown in [Figure 8-6](#Chapter08.html#fig_8_6).


    ![Image](images/9781430243748_Fig08-06.jpg)


    **Figure 8-6.** Preparing to add a new framework


    Expand the Link Binary With Libraries pane and you’ll see the frameworks already
    linked into our project: `UIKit`, `Foundation`, and `CoreGraphics`. To add Core
    Data, tap the highlighted + button and double-click `CoreData.framework`, listed
    in the modal window. Great, Core Data framework has been added! We can now reference
    Core Data classes in our app. Before we do, though, there’s an easy way to import
    the Core Data framework header for all classes in our app: by defining the import
    declaration in our project’s prefix file. Locate and select `BirthdayReminder-Prefix.pch`
    in the Project Navigator. Now add the Core Data import declaration alongside the
    `Foundation` and `UIKit` import declarations:


    ```

    #ifdef __OBJC__

        #import <UIKit/UIKit.h>

        #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>

    #endif

    ```


    We will now be able to make references to Core Data framework classes without
    having to repeatedly import the main Core Data framework header.


    Let’s move on to creating a Core Data model for our app.


    #### Creating a Core Data Model


    Up until this point, we’ve focused primarily on the user interface of our app.
    Now that we’re moving our attention to the dark data side, let’s create a new
    folder to store all Core Data and Model classes. Add a new folder named `data`
    to the root directory of your *Birthday Reminder* project, and then add the new
