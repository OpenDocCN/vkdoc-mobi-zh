- fmt: "### Creating view controller classes\n\nAt this point, we could happily continue\
    \ to add new view controller scenes to our storyboard, and connect them with segues\
    \ to our hearts’ content. Our storyboard would grow, but no new Objective-C classes\
    \ would be added to our project. Storyboarding has its limitations, and our app\
    \ will be kind of boring if we can’t add view controller–specific code at some\
    \ point. The solution is to create subclasses of `UIViewController` and assign\
    \ them to each view controller in our storyboard via the identity inspector.\n\
    \nBefore we create the new subclasses of `UIViewController`, let’s organize our\
    \ Xcode project to keep our user interface classes separate from our data classes.\
    \ In the Finder, create a new folder within your project titled `user-interface`,\
    \ and within that folder create a subfolder titled `view-controllers`. Then select\
    \ the top-level `BirthdayReminder` group in Xcode, and add the folders to your\
    \ project as new groups: File ![Image](images/U001.jpg) Add Files to “BirthdayReminder”\
    \ (see [Figure 5-7](#Chapter05.html#fig_5_7)).\n\n![Image](images/9781430243748_Fig05-07.jpg)\n\
    \n**Figure 5-7.** Keeping our project organized\n\nIn the project navigator, select\
    \ the newly added `view-controllers` group and with the ![Image](images/U002.jpg)N\
    \ shortcut or File ![Image](images/U001.jpg) New ![Image](images/U001.jpg) File,\
    \ choose the `Objective-C class` option from the Cocoa Touch file templates. Name\
    \ the new class `BRHomeViewController` and change the subclass to `UIViewController`.\
    \ As shown in [Figure 5-8](#Chapter05.html#fig_5_8), leave Targeted for iPad and\
    \ With XIB for User Interface unchecked.\n\n![Image](images/9781430243748_Fig05-08.jpg)\n\
    \n**Figure 5-8.** Subclassing UIViewController\n\nOnce you’ve created `BRHomeViewController`\
    \ header and source files, repeat the process to create another `UIViewController`\
    \ subclass named `BRBirthdayDetailViewController`.\n\nWe now need to connect our\
    \ new view controller subclasses to our two storyboard view controllers. To do\
    \ so, select the first view controller and change its custom class via the identity\
    \ inspector to `BRHomeViewController` (see [Figure 5-9](#Chapter05.html#fig_5_9)).\n\
    \n![Image](images/9781430243748_Fig05-09.jpg)\n\n**Figure 5-9.** Setting the custom\
    \ class of the first home view controller\n\nRepeat this process for the Birthday\
    \ Detail view controller, changing its custom class to `BRBirthdayDetailViewController`.\n\
    \n`BRViewController` header and source files are now redundant. This was the default\
    \ view controller class that Xcode originally generated for us when we first created\
    \ our project. By default, `BRViewController` was assigned to our first view controller;\
    \ we’ve just changed that, reassigning the first view controller so that it is\
    \ now owned by the new `BRHomeViewController` class. Let’s clean up and get rid\
    \ of the redundant `BRViewController` header and source files. Multiselect `BRViewController.h`\
    \ and `BRViewController.m` files in the project navigator, and then hit the Delete\
    \ key. Next, click the Move to Trash button in the dialog window (see [Figure\
    \ 5-10](#Chapter05.html#fig_5_10)).\n\n![Image](images/9781430243748_Fig05-10.jpg)\n\
    \n**Figure 5-10.** Deleting redundant BRViewController files\n\n### View and view\
    \ controller life cycle\n\nTo become a good iOS programmer, it’s essential to\
    \ understand the life cycle of views and view controllers. In our app, we currently\
    \ have one navigation controller that manages the flow of child view controllers\
    \ and their views. When the navigation controller transitions from the home to\
    \ the detail view controller, it moves the home view off the screen and slides\
    \ the detail view onto the screen. During this process, the navigation controller\
    \ invokes the following important view controller methods in our two view controller\
    \ subclasses:\n\n- `(void)viewWillAppear:(BOOL)animated;`\n- `(void)viewDidAppear:(BOOL)animated;`\n\
    - `(void)viewWillDisappear:(BOOL)animated;`\n- `(void)viewDidDisappear:(BOOL)animated;`\n\
    \nIf the Birthday Detail view controller is pushed onto the navigation controller,\
    \ then `viewWillDisappear:` is invoked on the home view controller just before\
    \ its view begins to animate off screen. As soon as the animation completes, the\
    \ view is automatically removed from the view hierarchy and `viewDidDisappear:`\
    \ is invoked on the home view controller.\n\nLikewise, just before the Birthday\
    \ Detail view controller is animated onto the navigation controller stack, `viewWillAppear:`\
    \ is invoked on the Birthday Detail view controller. Once the slide in push animation\
    \ completes, `viewDidAppear:` is then triggered.\n\nThe Birthday Detail view controller\
    \ is popped off the navigation stack when the Back button is tapped. The Birthday\
    \ Detail view controller receives a `viewWillDisappear:` callback, followed shortly\
    \ afterward by `viewDidDisappear:`.\n\nLet’s try this for ourselves. Replace the\
    \ current `BRBirthdayDetailViewController.m` source file implementation with the\
    \ following:\n\n```\n#import \"BRBirthdayDetailViewController.h\"\n\n@implementation\
    \ BRBirthdayDetailViewController\n\n-(id) initWithCoder:(NSCoder *)aDecoder\n\
    {\n    self = [super initWithCoder:aDecoder];\n    if (self) {\n        NSLog(@\"\
    initWithCoder\");\n    }\n    return self;\n}\n\n-(void) dealloc\n{\n    NSLog(@\"\
    dealloc\");\n}\n\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n    NSLog(@\"\
    viewDidLoad\");\n}\n\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    NSLog(@\"viewWillAppear\");\n}\n\n-(void) viewDidAppear:(BOOL)animated\n\
    {\n    [super viewDidAppear:animated];\n    NSLog(@\"viewDidAppear\");\n}\n\n\
    -(void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    NSLog(@\"viewWillDisappear\");\n}\n\n-(void)viewDidDisappear:(BOOL)animated\n\
    {\n    [super viewDidDisappear:animated];\n    NSLog(@\"viewDidDisappear\");\n\
    }\n\n@end\n```\n\n*Note: When overriding `UIViewController` methods, be sure to\
    \ call the super method implementation to avoid any problems at runtime.*\n\n\
    Build and run the project and check out the debug log as you push and pop `BRBirthdayDetailViewController`.\n\
    \nFamiliarize yourself with the order that these methods are invoked. There are\
    \ also a few additional view controller methods in the new code that you should\
    \ also be aware of.\n\n#### `viewDidLoad`\n\n`viewDidLoad` is a method triggered\
    \ in all subclasses of `UIViewController` as soon as its main view first loads;\
    \ any storyboard outlets are available at this point in your view controller code.\
    \ But be careful of `viewDidLoad`. It is not a view controller initializer. Indeed,\
    \ `viewDidLoad` can be called multiple times during the life of a view controller.\
    \ If the system gets short of memory, the default behavior for `UIViewController`\
    \ instances is to release their view if it’s not on screen. It’s perfectly reasonable\
    \ that `BRHomeViewController`’s view might be removed if a memory warning is triggered\
    \ by the system and the Birthday Detail view is the current on-screen view. Note,\
    \ however, that a memory warning will not remove the `BRHomeViewController` instance\
    \ from the navigation stack, just its view. If the user then navigates back to\
    \ the Home view controller, iOS rebuilds the home view from the storyboard and\
    \ `viewDidLoad` is invoked a second time on the Home view controller.\n\n*Tip:\
    \ `viewDidLoad` is the first point of access to your Interface Builder outlets.\
    \ So when `viewDidLoad` is invoked, you should execute any view customization\
    \ code.*"
  raw: '#### Creating view controller classes


    At this point, we could happily continue to add new view controller scenes to
    our storyboard, and connect them with segues to our hearts’ content. Our storyboard
    would grow, but no new Objective-C classes would be added to our project. Storyboarding
    has its limitations, and our app will be kind of boring if we can’t add view controller–specific
    code at some point. The solution is to create subclasses of `UIViewController`
    and assign them to each view controller in our storyboard via the identity inspector.


    Before we create the new subclasses of `UIViewController`, let’s organize our
    Xcode project to keep our user interface classes separate from our data classes.
    In the Finder, create a new folder within your project titled `user-interface`,
    and within that folder create a subfolder titled `view-controllers`. Then select
    the top-level `BirthdayReminder` group in Xcode, and add the folders to your project
    as new groups: File ![Image](images/U001.jpg) Add Files to “BirthdayReminder”
    (see [Figure 5-7](#Chapter05.html#fig_5_7)).


    ![Image](images/9781430243748_Fig05-07.jpg)


    **Figure 5-7.** Keeping our project organized


    In the project navigator, select the newly added `view-controllers` group and
    with the ![Image](images/U002.jpg)N shortcut or File ![Image](images/U001.jpg)
    New ![Image](images/U001.jpg) File, choose the Objective-C class option from the
    Cocoa Touch file templates. Name the new class `BRHomeViewController` and change
    the subclass to `UIViewController`. As shown in [Figure 5-8](#Chapter05.html#fig_5_8),
    leave Targeted for iPad and With XIB for User Interface unchecked.


    ![Image](images/9781430243748_Fig05-08.jpg)


    **Figure 5-8.** Subclassing UIViewController


    Once you’ve created `BRHomeViewController` header and source files, repeat the
    process to create another `UIViewController` subclass named `BRBirthdayDetailViewController`.


    We now need to connect our new view controller subclasses to our two storyboard
    view controllers. To do so, select the first view controller and change its custom
    class via the identity inspector to `BRHomeViewController` (see [Figure 5-9](#Chapter05.html#fig_5_9)).


    ![Image](images/9781430243748_Fig05-09.jpg)


    **Figure 5-9.** Setting the custom class of the first home view controller


    Repeat this process for the Birthday Detail view controller, changing its custom
    class to `BRBirthdayDetailViewController`.


    `BRViewController` header and source files are now redundant. This was the default
    view controller class that Xcode originally generated for us when we first created
    our project. By default, `BRViewController` was assigned to our first view controller;
    we’ve just changed that, reassigning the first view controller so that it is now
    owned by the new `BRHomeViewController` class. Let’s clean up and get rid of the
    redundant `BRViewController` header and source files. Multiselect `BRViewController.h`
    and `BRViewController.m` files in the project navigator, and then hit the Delete
    key. Next, click the Move to Trash button in the dialog window (see [Figure 5-10](#Chapter05.html#fig_5_10)).


    ![Image](images/9781430243748_Fig05-10.jpg)


    **Figure 5-10.** Deleting redundant BRViewController files


    #### View and view controller life cycle


    To become a good iOS programmer, it’s essential to understand the life cycle of
    views and view controllers. In our app, we currently have one navigation controller
    that manages the flow of child view controllers and their views. When the navigation
    controller transitions from the home to the detail view controller, it moves the
    home view off the screen and slides the detail view onto the screen. During this
    process, the navigation controller invokes the following important view controller
    methods in our two view controller subclasses:


    `- (void)viewWillAppear:(BOOL)animated;`


    `- (void)viewDidAppear:(BOOL)animated;`


    `- (void)viewWillDisappear:(BOOL)animated;`


    `- (void)viewDidDisappear:(BOOL)animated;`


    If the Birthday Detail view controller is pushed onto the navigation controller,
    then `viewWillDisappear:` is invoked on the home view controller just before its
    view begins to animate off screen. As soon as the animation completes, the view
    is automatically removed from the view hierarchy and `viewDidDisappear:` is invoked
    on the home view controller.


    Likewise, just before the Birthday Detail view controller is animated onto the
    navigation controller stack, `viewWillAppear:` is invoked on the Birthday Detail
    view controller. Once the slide in push animation completes, `viewDidAppear:`
    is then triggered.


    The Birthday Detail view controller is popped off the navigation stack when the
    Back button is tapped. The Birthday Detail view controller receives a `viewWillDisappear:`
    callback, followed shortly afterward by `viewDidDisappear:`.


    Let’s try this for ourselves. Replace the current `BRBirthdayDetailViewController.m`
    source file implementation with the following:


    `#import "BRBirthdayDetailViewController.h"`


    `@implementation BRBirthdayDetailViewController`


    **`-(id) initWithCoder:(NSCoder *)aDecoder`**

    **`{`**

    **`    self = [super initWithCoder:aDecoder];`**

    **`    if (self) {`**

    **`        NSLog(@"initWithCoder");`**

    **`    }`**

    **`    return self;`**

    **`}`**


    **`-(void) dealloc`**

    **`{`**

    **`    NSLog(@"dealloc");`**

    **`}`**


    **`-(void) viewDidLoad`**

    **`{`**

    **`    [super viewDidLoad];`**

    **`    NSLog(@"viewDidLoad");`**

    **`}`**


    **`-(void) viewWillAppear:(BOOL)animated`**

    **`{`**

    **`    [super viewWillAppear:animated];`**

    **`    NSLog(@"viewWillAppear");`**

    **`}`**


    **`-(void) viewDidAppear:(BOOL)animated`**

    **`{`**

    **`    [super viewDidAppear:animated];`**

    **`    NSLog(@"viewDidAppear");`**

    **`}`**


    **`-(void)viewWillDisappear:(BOOL)animated`**

    **`{`**

    **`    [super viewWillDisappear:animated];`**

    **`    NSLog(@"viewWillDisappear");`**

    **`}`**


    **`-(void)viewDidDisappear:(BOOL)animated`**

    **`{`**

    **`    [super viewDidDisappear:animated];`**

    **`    NSLog(@"viewDidDisappear");`**

    **`}`**


    `@end`


    *Note: When overriding `UIViewController` methods, be sure to call the super method
    implementation to avoid any problems at runtime.*


    Build and run the project and check out the debug log as you push and pop `BRBirthdayDetailViewController`.


    Familiarize yourself with the order that these methods are invoked. There are
    also a few additional view controller methods in the new code that you should
    also be aware of.


    ##### viewDidLoad


    `viewDidLoad` is a method triggered in all subclasses of `UIViewController` as
    soon as its main view first loads; any storyboard outlets are available at this
    point in your view controller code. But be careful of `viewDidLoad`. It is not
    a view controller initializer. Indeed, `viewDidLoad` can be called multiple times
    during the life of a view controller. If the system gets short of memory, the
    default behavior for `UIViewController` instances is to release their view if
    it’s not on screen. It’s perfectly reasonable that `BRHomeViewController`’s view
    might be removed if a memory warning is triggered by the system and the Birthday
    Detail view is the current on-screen view. Note, however, that a memory warning
    will not remove the `BRHomeViewController` instance from the navigation stack,
    just its view. If the user then navigates back to the Home view controller, iOS
    rebuilds the home view from the storyboard and `viewDidLoad` is invoked a second
    time on the Home view controller.


    *Tip: `viewDidLoad` is the first point of access to your Interface Builder outlets.
    So when `viewDidLoad` is invoked, you should execute any view customization code.*'
  trans: "\n### 创建视图控制器类\n\n至此，我们可以愉快地继续向故事板中添加新的视图控制器场景，并根据需要将它们与 Segue 连接起来。故事板会越来越庞大，但项目中不会新增任何\
    \ Objective-C 类。故事板有其局限性，如果我们无法在适当的时候为视图控制器添加特定代码，应用就会显得单调乏味。解决方案是创建 `UIViewController`\
    \ 的子类，并通过身份检查器将其分配给故事板中的每个视图控制器。\n\n在创建 `UIViewController` 的新子类之前，让我们先整理一下 Xcode\
    \ 项目，将用户界面类与数据类分开。在访达中，于项目目录下创建一个名为 `user-interface` 的新文件夹，并在该文件夹内创建一个名为 `view-controllers`\
    \ 的子文件夹。然后在 Xcode 中选择顶层的 `BirthdayReminder` 组，并将这些文件夹作为新分组添加到项目中：文件 ![Image](img/U001.jpg)\
    \ 添加到 \"BirthdayReminder\"（参见 图 5-7）。\n\n![Image](img/9781430243748_Fig05-07.jpg)\n\
    \n**图 5-7.** 保持项目整洁有序\n\n在项目导航器中，选择新添加的 `view-controllers` 组，然后使用 ![Image](img/U002.jpg)N\
    \ 快捷键或通过文件 ![Image](img/U001.jpg) 新建 ![Image](img/U001.jpg) 文件，从 Cocoa Touch 文件模板中选择\
    \ `Objective-C class` 选项。将新类命名为 `BRHomeViewController`，并将父类改为 `UIViewController`。如图\
    \ 图 5-8 所示，取消勾选 \"Targeted for iPad\" 和 \"With XIB for User Interface\"。\n\n![Image](img/9781430243748_Fig05-08.jpg)\n\
    \n**图 5-8.** 创建 UIViewController 的子类\n\n创建完 `BRHomeViewController` 的头文件和源文件后，重复此过程，再创建一个名为\
    \ `BRBirthdayDetailViewController` 的 `UIViewController` 子类。\n\n现在，我们需要将新建的视图控制器子类连接到故事板中的两个视图控制器。为此，选择第一个视图控制器，通过身份检查器将其自定义类改为\
    \ `BRHomeViewController`（参见 图 5-9）。\n\n![Image](img/9781430243748_Fig05-09.jpg)\n\
    \n**图 5-9.** 设置首页视图控制器的自定义类\n\n对生日详情视图控制器重复此操作，将其自定义类改为 `BRBirthdayDetailViewController`。\n\
    \n`BRViewController` 的头文件和源文件现在已是冗余文件。这是 Xcode 在最初创建项目时为我们生成的默认视图控制器类。默认情况下，`BRViewController`\
    \ 被分配给了第一个视图控制器；我们刚刚修改了这一设置，将第一个视图控制器重新分配给了新的 `BRHomeViewController` 类。现在让我们清理项目，删除冗余的\
    \ `BRViewController` 头文件和源文件。在项目导航器中多选 `BRViewController.h` 和 `BRViewController.m`\
    \ 文件，然后按下 Delete 键。接着，在弹出的对话框窗口中点击 \"Move to Trash\" 按钮（参见 图 5-10）。\n\n![Image](img/9781430243748_Fig05-10.jpg)\n\
    \n**图 5-10.** 删除冗余的 BRViewController 文件\n\n### 视图与视图控制器的生命周期\n\n要成为一名优秀的 iOS 程序员，理解视图和视图控制器的生命周期至关重要。在我们的应用中，当前有一个导航控制器负责管理子视图控制器及其视图的流程。当导航控制器从首页视图控制器跳转到详情视图控制器时，它会将首页视图移出屏幕，并将详情视图滑入屏幕。在此过程中，导航控制器会在我们的两个视图控制器子类中调用以下重要的视图控制器方法：\n\
    \n- `(void)viewWillAppear:(BOOL)animated;`\n- `(void)viewDidAppear:(BOOL)animated;`\n\
    - `(void)viewWillDisappear:(BOOL)animated;`\n- `(void)viewDidDisappear:(BOOL)animated;`\n\
    \n如果生日详情视图控制器被推入导航控制器，那么在其视图开始动画移出屏幕之前，首页视图控制器上会调用 `viewWillDisappear:` 方法。动画一完成，该视图会自动从视图层次结构中移除，并在首页视图控制器上调用\
    \ `viewDidDisappear:` 方法。\n\n同样地，在生日详情视图控制器被动画推入导航控制器栈之前，会在该视图控制器上调用 `viewWillAppear:`\
    \ 方法。一旦滑入推行动画完成，便会触发 `viewDidAppear:` 方法。\n\n当点击返回按钮时，生日详情视图控制器会从导航栈中弹出。该视图控制器会先收到\
    \ `viewWillDisappear:` 回调，紧接着是 `viewDidDisappear:`。\n\n让我们亲自尝试一下。用以下代码替换 `BRBirthdayDetailViewController.m`\
    \ 源文件的当前实现：\n\n```\n#import \"BRBirthdayDetailViewController.h\"\n\n@implementation\
    \ BRBirthdayDetailViewController\n\n-(id) initWithCoder:(NSCoder *)aDecoder\n\
    {\n    self = [super initWithCoder:aDecoder];\n    if (self) {\n        NSLog(@\"\
    initWithCoder\");\n    }\n    return self;\n}\n\n-(void) dealloc\n{\n    NSLog(@\"\
    dealloc\");\n}\n\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n    NSLog(@\"\
    viewDidLoad\");\n}\n\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    NSLog(@\"viewWillAppear\");\n}\n\n-(void) viewDidAppear:(BOOL)animated\n\
    {\n    [super viewDidAppear:animated];\n    NSLog(@\"viewDidAppear\");\n}\n\n\
    -(void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    NSLog(@\"viewWillDisappear\");\n}\n\n-(void)viewDidDisappear:(BOOL)animated\n\
    {\n    [super viewDidDisappear:animated];\n    NSLog(@\"viewDidDisappear\");\n\
    }\n\n@end\n```\n\n*注意：覆写 `UIViewController` 的方法时，务必调用父类的实现，以避免运行时出现任何问题。*\n\n\
    构建并运行项目，在推入和弹出 `BRBirthdayDetailViewController` 时查看调试日志。\n\n请熟悉这些方法的调用顺序。新代码中还有一些其他的视图控制器方法，你也应当了解。\n\
    \n#### `viewDidLoad`\n\n`viewDidLoad` 是 `UIViewController` 的所有子类中，在其主视图首次加载时触发的方法；此时，视图控制器代码中的任何故事板输出口都已可用。但请注意\
    \ `viewDidLoad`。它并不是视图控制器的初始化方法。实际上，在视图控制器的生命周期内，`viewDidLoad` 可能会被多次调用。如果系统内存不足，`UIViewController`\
    \ 实例的默认行为是释放不在屏幕上的视图。如果系统触发了内存警告，且当前屏幕显示的是生日详情视图，那么 `BRHomeViewController` 的视图被移除是完全合理的。但请注意，内存警告不会将\
    \ `BRHomeViewController` 实例从导航栈中移除，只会移除其视图。如果用户随后导航回首页视图控制器，iOS 会从故事板中重建首页视图，并且首页视图控制器上的\
    \ `viewDidLoad` 会被第二次调用。\n\n*提示：`viewDidLoad` 是访问 Interface Builder 输出口的第一个时机。因此，当调用\
    \ `viewDidLoad` 时，你应该执行所有视图自定义代码。*\n"
- fmt: '# View Controller Initializers


    The best place to create model data retained by your view controller throughout
    its life cycle is at the point of instantiation and not when `viewDidLoad` is
    invoked. A common mistake by new iOS programmers is to initialize everything during
    the `viewDidLoad` method.


    Hooking into the initializer of a `UIViewController` is not as obvious as it could
    be. There are two important initializers to be aware of: `initWithNibName:bundle:`
    and `initWithCoder:`. Typically, a view controller is either initialized with
    an NIB/XIB file or a storyboard file. We''re sticking with Storyboards for all
    the initialization in *Birthday Reminder*, so it''s the `initWithCoder:` initializer
    that we should hook into when instantiating models or mapping dictionaries.


    ## `dealloc`


    `dealloc` is the last method that is invoked in any `NSObject` subclass instance
    just before being released from memory. So you can see that when you pop the Birthday
    Detail view controller off the navigation stack, it is discarded by iOS and not
    retained, keeping our app''s memory footprint to a minimum.


    Thanks to ARC, any strong references to property iVars are released automatically,
    so there''s no need to directly `nil` out iVars in `dealloc` anymore. This used
    to be a major cause of memory leaks prior to ARC and iOS 5.


    **Note:** The compiler will not permit direct calls to `[super dealloc]`. You
    can guarantee that `dealloc` will be invoked for all subclasses of `NSObject`
    in the inheritance tree, however.


    # Navigating View Controllers


    For the remainder of the morning, we''ll pick up speed implementing our app navigation.
    You''ll learn how to populate navigation bars and toolbars with bar button items,
    and how and when to present and dismiss modal view controllers in your app.


    We''ll continue to storyboard this morning and discover just how easy it is to
    build out our *Birthday Reminder* navigation hierarchy via Xcode''s storyboard
    WYSIWYG drag-and-drop UI.


    ## Bars and Bar Button Items


    Navigation and toolbars feature in thousands of iPhone and iPad apps. As we''ll
    learn in [Chapter 9](#Chapter09.html#ch9), they are easy to customize and instantly
    recognizable by iOS users.


    As you''ll discover in the remainder of this chapter, in iOS it''s very easy to
    populate both navigation bars and toolbars with buttons—not the standard buttons
    we''ve used previously, but a component in iOS known as a *bar button item* (`UIBarButtonItem`).


    ### Navigation Bars


    Navigation bars reside at the top of the screen and typically comprise of a title
    and bar button items: one or more buttons to the left and to the right of the
    centered title. By default, a navigation bar controlled by a navigation controller
    automatically displays a Back button item to the left of the title, enabling users
    to easily back up through a series of screens they''ve delved through in the hierarchy
    of our app.


    Our navigation controller includes a navigation bar (`UINavigationBar`) as standard.
    We already know how to modify the title of each view controller in our navigation
    through storyboarding. Now let''s add a couple of bar button items to the home
    view navigation bar. It''s as simple as dragging them from the Object Library
    onto the left and right side of the navigation bar (see [Figure 5-11](#Chapter05.html#fig_5_11)).


    ![Image](images/9781430243748_Fig05-11.jpg)


    **Figure 5-11.** Adding bar button items to a navigation bar


    Bar button items (`UIBarButtonItem`) are not the same as regular buttons (`UIButton`);
    they can reside only in navigation bars and toolbars. A bar button item can display
    a text title, an image icon, or a custom view. We''ll explore these options when
    we move onto appearance skinning in [Chapter 9](#Chapter09.html#ch9). For now,
    we''re going stick to text, so type in **Settings** for the left button and **Add
    Birthday** for the right button.


    **Note:** In earlier versions of iOS, navigation bars were limited to three items:
    a title and single left and right bar button items. In iOS 5 and 6, we have more
    flexibility. We can add multiple left and right bar button items, but due to space
    constraints, I''d not recommend more than one item per side on iPhone.


    ### Toolbars


    We''ve already learned that a navigation bar is automatically generated when we
    embed a view controller within a navigation controller. Navigation controllers
    also include a toolbar free of charge. By default, it''s hidden, but we can change
    that. Select the navigation controller and toggle on the Shows Toolbar option
    (see [Figure 5-12](#Chapter05.html#fig_5_12)). Voilà! A toolbar appears for all
    of our view controllers!


    ![Image](images/9781430243748_Fig05-12.jpg)


    **Figure 5-12.** Switching on a toolbar via the navigation controller


    Now all of the view controllers in the navigation stack will inherit the parent
    navigation controller''s toolbar. That''s what we want for the home view, but
    not the detail view. That''s easy enough to solve. Select the detail view controller
    in the storyboard and toggle on the Hides Bottom Bar on Push attribute. Build
    and run, and you should see a toolbar for the first view, but not the second.


    Now to add some bar button items to the toolbar for our Home view controller.
    Select the Home view controller in the storyboard and drag two bar button item
    instances onto it from the Object Library. Name them Address Book and Facebook
    respectively. Notice the way toolbars are different from navigation bars: the
    new bar button items align to the left rather than one on either side of a title.
    We can center our two buttons by adding three instances of the Flexible Space
    bar button item (see [Figure 5-13](#Chapter05.html#fig_5_13)).


    ![Image](images/9781430243748_Fig05-13.jpg)


    **Figure 5-13.** Centering Toolbar bar button items'
