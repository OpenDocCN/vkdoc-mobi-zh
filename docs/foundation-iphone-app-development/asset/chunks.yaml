    虽然还有其他方法可以为视网膜和非视网膜的 iPhone 及 iPad 指定图标，但这是最简单的方式。创建符合以下尺寸和命名规则的图标及启动画面，你会发现它们适用于任何
    iOS 项目：


    > *   `Default.png` 和 `Default@2x.png`：这是你的启动图像。如果你的应用是全屏应用，那么 `Default.png` 的尺寸应为
    320×480 像素，`Default@2x.png` 应为 640×960 像素。*Birthday Reminder* 允许显示 iOS 状态栏，因此我们需要从启动图像的高度中扣除
    20 点。因此，`Default.png` 应为 320×460 像素，`Default@2x.png` 应为 640×920 像素。

    > *   `Default-568h@2x.png`：这是针对 iPhone 5 屏幕的启动图像。尺寸应为 640×1136 像素，因为所有 iPhone
    5 都支持视网膜显示屏。如果你不包含此文件，iOS 会认为你的应用不支持更高的原生 iPhone 5 屏幕，并会以信箱模式（屏幕顶部和底部显示黑条）显示你的应用。

    > *   `Icon.png` 和 `Icon@2x.png`：这是显示在 iPhone 主屏幕上的应用图标 PNG。`Icon.png` 应为 57×57
    像素，`Icon@2x.png` 应为 114×114 像素。

    > *   `Icon-72.png` 和 `Icon-72@2x.png`：这是为安装你 iPhone 应用的 iPad 用户显示的图标（即使目标设备仅为
    iPhone）。如果你不包含此版本的图标，则将使用默认的 57×57 iPhone 图标；在 iPad 上调整大小时，它会显得像素化且丑陋。`Icon-72.png`
    应为 72×72 像素，显示在非视网膜 iPad 上；`Icon-72@2x.png` 应为 114×114 像素，显示在视网膜 iPad 上。

    > *   `Icon-Small.png` 和 `Icon-Small@2x.png`：这是在 iOS 设置、通知屏幕以及聚焦搜索中显示的图标。同样，如果你不提供此图标，iOS
    将使用你主要的 57×57 图标并将其调整为 29×29 点。


    在 Photoshop 或预览中仔细查看我们的图标图形。圆角和光泽效果是由 iOS 动态添加的。我们的图标设计延伸到了每个角落和边缘。


    *Birthday Reminder* 图标在没有 iOS 光泽效果时看起来更好。没问题——我们可以通过项目的 `Info.plist` 配置文件轻松解决此问题（见图
    3-17）。


    虽然默认未列出，但有一个名为“图标已包含光泽效果”的设置，我们可以将其作为新行添加到 `.plist` 文件中。在项目导航器中选中 `BirthdayReminder-Info.plist`，按住
    Control 键单击编辑器区域，然后从上下文菜单中选择“添加行”。一个新行会添加到 `.plist` 中，你就能找到图标光泽设置。你还需要将该值更改为“是”。保存更改，然后构建并运行。你的图标应该会失去光泽效果，在模拟器主屏幕上看起来更干净。


    *提示：图标更改有时需要多次构建和运行或清理产品才能生效。*


    我们还需要对应用图标做一项外观调整。默认情况下，`Info.plist` 会将项目名称指定为 iPhone 主屏幕上图标下方显示的标题。`BirthdayReminder`
    超过了 12 个字符的显示标题限制，因此 iOS 会对其进行截断。通过将 `Info.plist` 中的“Bundle 显示名称”属性更改为 `Birthdays`，可以轻松修复此问题（见图
    3-17）。构建并运行。不再截断了——太好了！


    ![Image](img/9781430243748_Fig03-17.jpg)


    **图 3-17.** 更改 Bundle 显示名称并移除图标光泽


