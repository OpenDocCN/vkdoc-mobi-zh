  trans: "\n# NSPredicate 与生日提醒优化\n\n`NSPredicate` 类用于过滤结果集。此代码应优化结果集以实现可扩展性，因为我们仅请求结果集中那些\
    \ `uid` 属性与 `uids` 数组参数中一个或多个值匹配的 `BRDBirthday` 托管对象。\n\n## 更新主视图控制器\n\n回到主视图控制器中，我们现在将在\
    \ `initWithCoder:` 方法中添加代码，以利用我们模型的 `getExistingBirthdaysWithUIDs:` 方法：\n\n```\n\
    - (id) initWithCoder:(NSCoder *)aDecoder\n{\n    self = [super initWithCoder:aDecoder];\n\
    \n    if (self) {\n        NSString* plistPath = [[NSBundle mainBundle] pathForResource:@\"\
    birthdays\" ofType:@\"plist\"];\n        NSArray *nonMutableBirthdays = [NSArray\
    \ arrayWithContentsOfFile:plistPath];\n\n        BRDBirthday *birthday;\n    \
    \    NSDictionary *dictionary;\n        NSString *name;\n        NSString *pic;\n\
    \        NSString *pathForPic;\n        NSData *imageData;\n        NSDate *birthdate;\n\
    \        NSCalendar *calendar = [NSCalendar currentCalendar];\n\n        NSString\
    \ *uid;\n        NSMutableArray *uids = [NSMutableArray array];\n        for (int\
    \ i=0;i<[nonMutableBirthdays count];i++) {\n            dictionary = [nonMutableBirthdays\
    \ objectAtIndex:i];\n            uid = dictionary[@\"name\"];\n            [uids\
    \ addObject:uid];\n        }\n        NSMutableDictionary *existingEntities =\
    \ [[BRDModel sharedInstance] getExistingBirthdaysWithUIDs:uids];\n\n        NSManagedObjectContext\
    \ *context = [BRDModel sharedInstance].managedObjectContext;\n\n        for (int\
    \ i=0;i<[nonMutableBirthdays count];i++) {\n            dictionary = nonMutableBirthdays[i];\n\
    \n            uid = dictionary[@\"name\"];\n\n            birthday = existingEntities[uid];\n\
    \n            if (birthday) {//生日已存在\n\n            }\n            else {//生日不存在，因此创建它\n\
    \                birthday = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    BRDBirthday\" inManagedObjectContext:context];\n                existingEntities[uid]\
    \ = birthday;\n                birthday.uid = uid;\n\n            }\n\n      \
    \      name = dictionary[@\"name\"];\n            pic = dictionary[@\"pic\"];\n\
    \            birthdate = dictionary[@\"birthdate\"];\n            pathForPic =\
    \ [[NSBundle mainBundle] pathForResource:pic ofType:nil];\n            imageData\
    \ = [NSData dataWithContentsOfFile:pathForPic];\n            birthday.name = name;\n\
    \            birthday.imageData = imageData;\n            NSDateComponents *components\
    \ = [calendar components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
    \ fromDate:birthdate];\n            //新字面量语法，等同于\n            //birthday.birthDay\
    \ = [NSNumber numberWithInt:components.day];\n            birthday.birthDay =\
    \ @(components.day);\n            birthday.birthMonth = @(components.month);\n\
    \            birthday.birthYear = @(components.year);\n            [birthday updateNextBirthdayAndAge];\n\
    \        }\n        [[BRDModel sharedInstance] saveChanges];\n    }\n\n    return\
    \ self;\n}\n```\n\n在测试新代码之前，你需要从模拟器或设备中删除旧版本的 *生日提醒*，因为我们还没有编写任何代码来清除现有的重复项。这只是为了确保在导入新生日时不会出现重复。现在构建并运行几次。你应该不会再看到表格视图中列出重复的名人。\n\
    \n我们模型的 `getExistingBirthdaysWithUIDs:` 方法返回一个可变字典，其中包含现有生日实体，其唯一 ID 作为键。对于要导入的每个生日字典，我们可以引用这个可变字典：\n\
    \n```\nbirthday = existingEntities[uid];\nif (birthday) {\n      //生日已存在\n}\n\
    else {\n      //生日不存在\n}\n```\n\n如果生日实体不存在，我们就创建它。如果它已经存在，我们就不创建新的，只更新其属性。\n\n\
    ## 从字典过渡到实体\n\n我们现在要将项目中当前对生日字典的引用替换为对我们新的 `BRDBirthday` 托管对象的引用。我们将修改生日详情和编辑视图控制器，然后解决主视图控制器中的\
    \ `prepareForSegue:sender:` 方法，使其解析托管生日对象而不是字典。让我们开始吧！\n\n### 生日详情视图控制器\n\n修改\
    \ `BRBirthdayDetailViewController.h` 接口：\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ \"BRCoreViewController.h\"\n@class BRDBirthday;\n\n@interface BRBirthdayDetailViewController\
    \ : BRCoreViewController\n\n@property(nonatomic,strong) BRDBirthday *birthday;\n\
    @property (weak, nonatomic) IBOutlet UIImageView *photoView;\n\n@end\n```\n\n\
    切换到 `BRBirthdayDetailViewController.m` 源文件并导入 `BRDBirthday`：\n\n```\n#import \"\
    BRDBirthday.h\"\n```\n\n然后修改 `viewWillAppear:` 方法，使标题和图像直接从 `BRDBirthday` 实体属性更新：\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    NSLog(@\"viewWillAppear\");\n    self.title = self.birthday.name;\n    UIImage\
    \ *image = [UIImage imageWithData:self.birthday.imageData];\n    if (image ==\
    \ nil) {\n        //如果没有生日图片，则默认使用生日蛋糕图\n        self.photoView.image = [UIImage\
    \ imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n        self.photoView.image\
    \ = image;\n    }\n}\n```\n\n通过这些更改，你应该能够顺利构建并运行，但编译器会在主视图控制器和生日详情视图控制器中生成几个与\
    \ `prepareForSegue: sender:` 实现相关的警告。暂时忽略这些警告。只要你能成功构建应用程序，就没问题。\n"
- fmt: "### Birthday edit view controller\n\nModify the `BRBirthdayEditViewController.h`\
    \ interface (as you just did for the `BRBirthdayDetailViewController.h` interface)\
    \ by adding a forward class declaration for our `BRDBirthday` entity:\n\n```\n\
    #import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n@class BRDBirthday;\n\
    ```\n\nAnd replacing the birthday class type with `BRDBirthday`:\n\n```\n@property\
    \ (nonatomic, strong) NSMutableDictionary *birthday;\n```\n```\n@property(nonatomic,strong)\
    \ BRDBirthday *birthday;\n```\n\nDon’t worry about the new compiler errors in\
    \ `BRBirthdayEditViewController.m`. We’re going to work our way through resolving\
    \ them next.\n\nSwitch to the `BRBirthdayEditViewController.m` source file and\
    \ import the `BRDBirthday.h` and `BRDModel.h` headers:\n\n```\n#import \"BRDBirthday.h\"\
    \n#import \"BRDModel.h\"\n```\n\nBegin by adding a new private method to break\
    \ apart the date selected by the date picker:\n\n```\n- (void)updateBirthdayDetails\
    \ {\n    NSCalendar *calendar = [NSCalendar currentCalendar];\n    NSDateComponents\
    \ *components = [calendar components:NSYearCalendarUnit |\nNSMonthCalendarUnit\
    \ |NSDayCalendarUnit fromDate:self.datePicker.date];\n    self.birthday.birthMonth\
    \ = @(components.month);\n    self.birthday.birthDay = @(components.day);\n  \
    \  if (self.includeYearSwitch.on) {\n        self.birthday.birthYear = @(components.year);\n\
    \    }\n    else {\n        self.birthday.birthYear = @0;\n    }\n    [self.birthday\
    \ updateNextBirthdayAndAge];\n}\n```\n\nWhen manipulating the date selected, we’re\
    \ utilizing an Objective-C class called `NSDateComponents`. Apple’s `NSDateComponents`\
    \ class is a utility class that enables us to break `NSDate` instances into their\
    \ individual components—years, months, days, and so forth.\n\nWe need our new\
    \ `updateBirthdayDetails` method to be invoked whenever the user changes the date\
    \ picker value or the Include Year switch, so let’s modify those methods accordingly:\n\
    \n```\n- (IBAction)didChangeDatePicker:(id)sender {\nNSLog(@\"New Birthdate Selected:\
    \ %@\",self.datePicker.date);\n    self.birthday[@\"birthdate\"] = self.datePicker.date;\n\
    [self updateBirthdayDetails];\n}\n```\n\n```\n- (IBAction)didToggleSwitch:(id)sender\
    \ {\n    if (self.includeYearSwitch.on) {\n        NSLog(@\"Sure, I'll share my\
    \ age with you!\");\n    }\n    else {\n        NSLog(@\"I'd prefer to keep my\
    \ birthday year to myself thank you very much!\");\n    }\n    [self updateBirthdayDetails];\n\
    }\n```\n\nNext, let’s get rid of the error when the name text field is modified\
    \ by the user:\n\n```\n- (IBAction)didChangeNameText:(id)sender {\nNSLog(@\"The\
    \ text was changed: %@\",self.nameTextField.text);\n    self.birthday[@\"name\"\
    ] = self.nameTextField.text;\nself.birthday.name = self.nameTextField.text;\n\
    \    [self updateSaveButton];\n}\n```\n\nWe also need to amend our `viewWillAppear:animated:`\
    \ method to account for the changes to the way `BRDBirthday` stores birthdays\
    \ into their day, month, and year components rather than date. Delete and replace\
    \ the current implementation of `viewWillAppear:` with the following:\n\n```\n\
    -(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \n    self.nameTextField.text = self.birthday.name;\n\n    NSCalendar *calendar\
    \ = [NSCalendar currentCalendar];\n    NSDateComponents *components = [calendar\
    \ components:NSYearCalendarUnit |\nNSMonthCalendarUnit | NSDayCalendarUnit fromDate:[NSDate\
    \ date]];\n\n    if ([self.birthday.birthDay intValue] > 0) components.day = [self.birthday.birthDay\n\
    intValue];\n    if ([self.birthday.birthMonth intValue] > 0) components.month\
    \ = [self.birthday.birthMonth\nintValue];\n    if ([self.birthday.birthYear intValue]\
    \ > 0) {\n        components.year = [self.birthday.birthYear intValue];\n    \
    \    self.includeYearSwitch.on = YES;\n    }\n    else {\n        self.includeYearSwitch.on\
    \ = NO;\n    }\n    [self.birthday updateNextBirthdayAndAge];\n    self.datePicker.date\
    \ = [calendar dateFromComponents:components];\n\n    if (self.birthday.imageData\
    \ == nil)\n    {\n        self.photoView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n    }\n    else {\n        self.photoView.image = [UIImage imageWithData:self.birthday.imageData];\n\
    \    }\n\n    [self updateSaveButton];\n}\n```"
