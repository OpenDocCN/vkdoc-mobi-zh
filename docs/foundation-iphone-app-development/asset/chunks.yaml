    Note that in our current implementation, Save and Cancel do exactly the same thing:
    nothing! A new birthday dictionary is created by the Home view controller and
    is added to the `birthdays` array.


    In order to implement Cancel functionality, we could consider two options:


    > *   Passing the birthdays array to the edit view controller, as well as the
    selected `birthday` dictionary, and setting up the `cancelAndDismiss:` method
    to delete the birthday object from the array: **`[self.birthdays removeObject:self.birthday]`.**

    > *   Creating your own delegate protocol for birthday editing, subscribing the
    Home view controller as the delegate of the Edit Birthday view controller, and
    removing the birthday dictionary from the **`birthdays`** array in the Home view
    controller code in response to a delegate callback method.


    We won’t, however, be implementing the Cancel and Save buttons in this chapter
    because we’ll work in these features using Core Data in the next chapter.'
  trans: "\n### 添加新生日\n\n在 Xcode 中打开 `BRBirthdayEditViewController.h` 头文件，然后像我们之前对生日详情视图控制器所做的那样，添加一个新的生日字典属性：\n\
    \n`@property (nonatomic, strong) NSMutableDictionary *birthday;`\n\n在 `BRBirthdayEditViewController.m`\
    \ 源文件中，修改 `viewWillAppear:` 的实现，使其根据 `birthday` 字典中的键值更新子视图：\n\n```\n-(void) viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n\n    NSString *name = self.birthday\
    \ [@\"name\"];\n    NSDate *birthdate = self.birthday[@\"birthdate\"];\n    UIImage\
    \ *image = self.birthday[@\"image\"];\n\n    self.nameTextField.text = name;\n\
    \    self.datePicker.date = birthdate;\n    if (image == nil) {\n        //如果没有生日图片，默认使用生日蛋糕图片\n\
    \        self.photoView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n    }\n    else {\n        self.photoView.image = image;\n    }\n\n    [self\
    \ updateSaveButton];\n}\n```\n\n回到故事板中，选择主页视图与编辑生日导航控制器之间的转场（segue），然后为其指定一个 `AddBirthday`\
    \ 标识符。\n\n在 `BRHomeViewController.m` 源文件中，首先导入 `BRBirthdayEditViewController.h`：\n\
    \n`#import \"BRBirthdayEditViewController.h\"`\n\n现在我们将完成 `prepareForSegue:sender:`\
    \ 的实现，并处理当用户点击“添加生日”栏按钮项时所调用的转场：\n\n```\n-(void) prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    NSString *identifier = segue.identifier;\n\
    \n    if ([identifier isEqualToString:@\"BirthdayDetail\"]) {\n        //首先获取数据\n\
    \        NSIndexPath *selectedIndexPath = self.tableView.indexPathForSelectedRow;\n\
    \        NSMutableDictionary *birthday = self.birthdays[selectedIndexPath.row];\n\
    \n        BRBirthdayDetailViewController *birthdayDetailViewController = segue.destinationViewController;\n\
    \        birthdayDetailViewController.birthday = birthday;\n    }\n    else if\
    \ ([identifier isEqualToString:@\"AddBirthday\"]) {\n        //向生日数组添加一个新的生日字典\n\
    \n        NSMutableDictionary *birthday = [NSMutableDictionary dictionary];\n\n\
    \        birthday[@\"name\"] = @\"我的朋友\";\n        birthday[@\"birthdate\"] =\
    \ [NSDate date];\n        [self.birthdays addObject:birthday];\n\n        UINavigationController\
    \ *navigationController = segue.destinationViewController;\n\n        BRBirthdayEditViewController\
    \ *birthdayEditViewController = (BRBirthdayEditViewController *)\nnavigationController.topViewController;\n\
    \        birthdayEditViewController.birthday = birthday;\n    }\n}\n```\n\n当用户从主页视图控制器点击“添加生日”并且我们的\
    \ `prepareForSegue:sender:` 方法被调用时，我们会立即创建一个新的可变生日字典，为其分配默认的名称和生日日期值，并将其添加到 `self.birthdays`\
    \ 数组中：\n\n```\nNSMutableDictionary *birthday = [NSMutableDictionary dictionary];\n\
    \nbirthday[@\"name\"] = @\"我的朋友\";\nbirthday[@\"birthdate\"] = [NSDate date];\n\
    [self.birthdays addObject:birthday];\n```\n\n由于我们的“编辑生日”视图控制器是一个以模态方式呈现的导航视图控制器的子控制器，因此转场的\
    \ `destinationViewController` 属性就是该导航控制器。通过该导航控制器的引用，我们还可以获取对编辑生日视图控制器的引用，并最终在编辑视图控制器上设置新的生日属性：\n\
    \n```\nBRBirthdayEditViewController *birthdayEditViewController = (BRBirthdayEditViewController\
    \ *)\nnavigationController.topViewController;\nbirthdayEditViewController.birthday\
    \ = birthday;\n```\n\n尽管我们已经修改了模型（生日数组），但主页视图控制器中的表格视图并不会自动刷新。由于我们通过主页视图控制器持有了表格视图的出口引用，因此修复起来很容易。在\
    \ `BRHomeViewController.m` 源文件中，重写 `viewWillAppear:` 以确保每次主页视图控制器即将出现时表格视图都会重新加载：\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [self.tableView reloadData];\n}\n```\n\n构建并运行。现在你可以添加生日了（参见图 7-14）！\n\n![图片](img/9781430243748_Fig07-14.jpg)\n\
    \n**图 7-14.** 添加朋友和生日！\n\n好吧，你现在可以多次添加名为“我的朋友”的人，但仅此而已！我们稍后会对此进行改进。\n\n请注意，在当前实现中，“保存”和“取消”按钮的功能完全相同：什么都不做！新的生日字典由主页视图控制器创建并添加到\
    \ `birthdays` 数组中。\n\n为了实现“取消”功能，我们可以考虑两种方案：\n\n> *   将生日数组以及选中的 `birthday` 字典都传递给编辑视图控制器，并设置\
    \ `cancelAndDismiss:` 方法从数组中删除该生日对象：`[self.birthdays removeObject:self.birthday]`。\n\
    > *   为生日编辑创建你自己的委托协议，让主页视图控制器成为编辑生日视图控制器的委托，并在主页视图控制器的代码中，响应委托回调方法，将生日字典从 `birthdays`\
    \ 数组中移除。\n\n不过，我们不会在本章中实现“取消”和“保存”按钮，因为这些功能将在下一章中结合 Core Data 来实现。"
- fmt: "#### 编辑现有生日\n\n在故事板中，找到`Birthday Detail`和`Edit Birthday`视图控制器之间的转场，并将其标识符设置为`EditBirthday`。正如我们为`Home`视图控制器所做的那样，现在将在`BRBirthdayDetailViewController.m`源文件中实现`prepareForSegue:sender:`方法。首先，导入`BRBirthdayEditViewController.h`：\n\
    \n```\n#import \"BRBirthdayEditViewController.h\"\n```\n\n然后添加自定义的`prepareForSegue:sender:`方法：\n\
    \n```\n-(void) prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n\
    {\n    NSString *identifier = segue.identifier;\n\n    if ([identifier isEqualToString:@\"\
    EditBirthday\"]) {\n        //编辑此生日\n        UINavigationController *navigationController\
    \ = segue.destinationViewController;\n\n        BRBirthdayEditViewController *birthdayEditViewController\
    \ =\n(BRBirthdayEditViewController *) navigationController.topViewController;\n\
    \        birthdayEditViewController.birthday = self.birthday;\n    }\n}\n```\n\
    \n我们将`Birthday Detail`视图控制器中对`birthday`字典的引用传递给`Edit Birthday`视图控制器。其余代码应该看起来很熟悉！\n\
    \n构建并运行。现在你可以选择名人生日，在`Birthday Detail`视图控制器中显示它们，然后点击编辑按钮，将选中的生日传递并显示在`Edit Birthday`视图控制器中。\n\
    \n我们最后的挑战是，通过`Edit Birthday`视图控制器更新应用中传递的可变生日字典。\n\n重新打开`BRBirthdayEditViewController.m`源文件。首先更新名称文本字段和日期选择器交互的目标-动作处理器：\n\
    \n```\n- (IBAction)didChangeNameText:(id)sender {\n    NSLog(@\"The text was changed:\
    \ %@\",self.nameTextField.text);\n    self.birthday[@\"name\"] = self.nameTextField.text;\n\
    \    [self updateSaveButton];\n}\n```\n\n以及……\n\n```\n- (IBAction)didChangeDatePicker:(id)sender\
    \ {\n    NSLog(@\"New Birthdate Selected: %@\",self.datePicker.date);\n    self.birthday[@\"\
    birthdate\"] = self.datePicker.date;\n}\n```\n\n每当用户编辑生日名称文本字段时，我们都会更新所引用生日字典的`name`键值。同样，如果用户在日期选择器中更改了所选日期，我们也会更新`birthdate`。\n\
    \n最后，我们还将允许用户更改生日字典中存储的照片图像：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary *)info {\n\n    [picker\
    \ dismissViewControllerAnimated:YES completion:nil];\n\n    UIImage *image = info[UIImagePickerControllerOriginalImage];\n\
    \n    self.photoView.image = image;\n\n    self.birthday[@\"image\"] = image;\n\
    }\n```\n\n构建并运行。\n\n现在你可以添加新的生日，并设置名称、出生日期和照片。你甚至可以编辑现有的名人生日（参见[图7-15](#Chapter07.html#fig_7_15)）！\n\
    \n![Image](images/9781430243748_Fig07-15.jpg)\n\n**图7-15.** 这张图哪里不对劲？！\n\n###\
    \ 总结\n\n在本章中，我们学习了如何处理基本的表视图和表视图单元格。我们发现了如何使用自定义字典对象数组动态填充表视图是多么容易。\n\n我们还学习了如何允许一个视图控制器修改另一个视图控制器也引用的数据，并在`viewWillAppear:`被调用时（就在视图控制器被你的应用呈现之前）刷新显示。\n\
    \n我们学习了如何接入视图控制器子类的`prepareForSegue:sender:`方法，并在视图控制器之间传递数据对象。\n\n你可能已经注意到我们的应用有一个显著的缺陷：会话之间没有任何数据是持久的。一旦你重新运行应用，它会重新加载`birthdays.plist`并清除所有数据修改。别担心，年轻的丹尼尔桑。接下来，我们将解锁Core\
    \ Data持久化的奥秘。![Image](images/smiley.jpg)\n\n![Image](images/ch.jpg)\n\n## 第8章\n\
    \n## **使用Core Data实现数据持久化**\n\n继续我们的数据发现之旅，你将学习如何使用Core Data构建数据存储解决方案：Apple用于将数据持久化到文件系统的强大框架。当你读完本章时，你的应用将能够使用Core\
    \ Data将生日对象读写到磁盘。即使你的应用因任何原因关闭，生日对象也会保持可用。\n\nCore Data为你许多喜爱的应用提供数据管理支持，从Twitter和Instagram到Apple的邮件和日历应用。这些应用让你即使iPhone离线也能查看数据：日历中的日记条目、最近收到的电子邮件、之前下载的推文。让你的应用能够存储数据以供离线使用，可以极大地改善用户体验，实现快速数据访问，并且无需保持持久的互联网连接。\n\
    \n*Birthday Reminder*将向用户提供三种添加新生日的方式：从Facebook导入、从iPhone通讯录导入，或通过编辑生日视图控制器手动添加。一旦生日被导入，就不再需要访问其原始来源；换句话说，从Facebook导入的生日不需要我们的应用持续连接Facebook，它将在我们的应用中独立持久化，即使我们的用户离线。\n\
    \n尽管Core Data的初始学习曲线相当陡峭，但我还是想在这本书中向你介绍它，因为一旦你掌握了基础知识，它就会为你的应用中的持久数据管理带来各种可能性。我们为*Birthday\
    \ Reminder*编写的代码只是触及了Core Data的皮毛，使我们的应用能够读取、写入和更新包含文本、数字、日期和二进制（图像缩略图）属性的生日模型对象。然而，如果你未来的应用需要更复杂的数据模型，请放心，Core\
    \ Data将成为你最好的朋友，并且你将拥有可以继续构建的基础知识。\n\n### Core Data简介\n\nCore Data是Apple为本地数据存储提供的对象关系映射（ORM）解决方案。这意味着，作为Cocoa开发者，我们可以用我们的原生编程语言Objective-C生成和操作数据对象。然后Core\
    \ Data负责将这些数据对象和关系转换为可以保存到磁盘的另一种形式。默认情况下，Core Data的底层存储是一个SQLite数据库。然而，我们的应用永远不需要直接连接到底层数据库。Core\
    \ Data充当通往文件存储系统的网关，并包含我们的应用程序代码为了创建、编辑和删除模型类实例以及保存持久更改而需要访问的管理和模型类。\n\n为了向你介绍Core\
    \ Data，让我们从Apple的项目模板开始创建一个示例项目。"
  raw: '#### Editing existing birthdays


    In your storyboard, locate the segue between the Birthday Detail and the Edit
    Birthday view controllers, and give it an `EditBirthday` identifier. Just as we’ve
    done for the Home view controller, we’ll now implement a `prepareForSegue:sender:`
    method in the `BRBirthdayDetailViewController.m` source. First, import `BRBirthdayEditViewController.h`:


    `#import "BRBirthdayEditViewController.h"`


    And then add our custom `prepareForSegue:sender:` method:


    `-(void) prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender`

    `{`

    `    NSString *identifier = segue.identifier;`


    `    if ([identifier isEqualToString:@"EditBirthday"]) {`

    `        //Edit this birthday`

    `        UINavigationController *navigationController = segue.destinationViewController;`


    `        BRBirthdayEditViewController *birthdayEditViewController =`

    `(BRBirthdayEditViewController *) navigationController.topViewController;`

    `        birthdayEditViewController.birthday = self.birthday;`

    `    }`

    `}`


    We pass our reference to the `birthday` dictionary in the Birthday Detail view
    controller along to the Edit Birthday view controller. The rest of the code should
    look very familiar!


    Build and run. You can now select celebrity birthdays, display them in the Birthday
    Detail view controller, and then tap the Edit button to pass and display the selected
    birthday in the Edit Birthday view controller.


    Our final challenge is to update the mutable birthday dictionaries that we’re
    passing around the application via the Edit Birthday view controller.


    Reopen the `BRBirthdayEditViewController.m` source file. Let’s first update our
    target-action handlers for the name text field and date picker interaction:


    `- (IBAction)didChangeNameText:(id)sender {`

    `    NSLog(@"The text was changed: %@",self.nameTextField.text);`

    **`    self.birthday[@"name"] = self.nameTextField.text;`**

    `    [self updateSaveButton];`

    `}`


    and…


    `- (IBAction)didChangeDatePicker:(id)sender {`

    `    NSLog(@"New Birthdate Selected: %@",self.datePicker.date);`

    **`    self.birthday[@"birthdate"] = self.datePicker.date;`**

    `}`


    We’re updating the `name` key value of the referenced birthday dictionary whenever
    the user edits the birthday name text field. Likewise, we update the `birthdate`
    if the user changed the selected date in the date picker.


    Finally, we’re also going to enable the user to change the photo image stored
    in the birthday dictionary:


    `- (void)imagePickerController:(UIImagePickerController *)picker`

    `didFinishPickingMediaWithInfo:(NSDictionary *)info {`


    `    [picker dismissViewControllerAnimated:YES completion:nil];`


    `    UIImage *image = info[UIImagePickerControllerOriginalImage];`


    `    self.photoView.image = image;`


    **`self.birthday[@"image"] = image;`**

    `}`


    Build and run.


    You can now add new birthdays and set the name, birth date, and photo. You can
    even edit existing celebrity birthdays (see [Figure 7-15](#Chapter07.html#fig_7_15))!


    ![Image](images/9781430243748_Fig07-15.jpg)


    **Figure 7-15.** What’s wrong with this picture?!


    ### Summary


    In this chapter, we learned how to work with basic table views and table view
    cells. We discovered how easy it is to dynamically populate table views with an
    array of custom dictionary objects.


    We also learned how to allow one view controller to modify data also referenced
    by another view controller and refresh the display whenever `viewWillAppear:`
    is invoked (just before a view controller is presented by your app).


    We learned how to hook into the `prepareForSegue:sender:` method of view controller
    subclasses and pass data objects between view controllers.


    You may have noticed a significant flaw in our application: none of the data is
    persistent between sessions. As soon as you re-run the app, it reloads the `birthdays.plist`
    and clears any data modifications. Fear not, young Daniel-san. Next up, we shall
    be unlocking the mysteries of Core Data persistence. ![Image](images/smiley.jpg)


    ![Image](images/ch.jpg)


    ## Chapter 8


    ## **Data Persistence with Core Data**


    Continuing our data discovery day, you’re going to learn how to build a data storage
    solution using Core Data: Apple’s powerful framework for persisting data to the
    file system. When you reach the end of this chapter, your app will be reading
    and writing birthday objects to disk using Core Data. Birthday objects will remain
    available even if your app gets shut down for any reason.


    Core Data powers the data management of many of your favorite apps, from Twitter
    and Instagram to Apple’s Mail and Calendar apps. These apps enable you to view
    data even when your iPhone is offline: diary entries in your Calendar, recently
    received e-mails, previously downloaded tweets. Enabling your apps to store data
    for offline usage dramatically improves user experience, enables fast access to
    data, and negates the need to keep a persistent Internet connection.


    *Birthday Reminder* will provide users with three ways to add new birthdays: by
    importing from Facebook, by importing from the iPhone Address Book, or by adding
    them manually via the edit birthday view controller. Once a birthday is imported,
    it no longer needs to access its original source; in other words, a birthday imported
    from Facebook will not require our app to keep connecting to Facebook, it will
    remain independently persistent in our app, even if our user is offline.


    Although the initial learning curve of Core Data is quite steep, I wanted to introduce
    you to it in this book because once you get a handle on the basics, it presents
    all kinds of possibilities for persistent data management in your apps. The code
    we’ll write for *Birthday Reminder* only scratches the surface of Core Data, enabling
    our app to read, write, and update birthday model objects containing text, number,
    date, and binary (image thumbnails) attributes. However, should your future apps
    require a more complex data model, rest assured that Core Data will become your
    best friend and you’ll have the foundation knowledge to build upon.


    ### An introduction to Core Data


    Core Data is Apple’s object-relational mapping (ORM) solution for local data storage.
    This means that as Cocoa developers, we get to generate and work with data objects
    in our native programming language, Objective-C. Core Data then takes care of
    translating those data objects and relationships into another form that can be
    saved to disk. By default, the underlying storage for Core Data is an SQLite database.
    However, our apps should never need to connect directly to the underlying database.
    Core Data acts as the gateway to the file storage system and includes the management
    and model classes that our application code needs access to in order to create,
    edit, and delete model class instances and save persistent changes.


    To introduce you to Core Data, let’s begin by creating an example project from
    Apple’s project templates.'
