  trans: "\n# `UIImagePickerController`：拍照与浏览照片库\n\niOS 应用有多种方式通过 iPhone 摄像头拍照并访问用户的照片库。最简单的方法莫过于使用\
    \ iOS SDK 中的 `UIImagePickerController` 组件。它替我们完成了所有复杂的工作。我们将在 `BRBirthdayEditViewController`\
    \ 中懒加载一个 Apple 的 `UIImagePickerController` 类的实例，并创建两个新的私有方法：一个用于拍照，另一个用于从照片库中选择照片。\n\
    \n`BRBirthdayEditViewController` 将自己设置为`UIImagePickerController` 的代理。因此，首先更新我们的接口头文件：\n\
    \n```\n@interface BRBirthdayEditViewController : BRCoreViewController<UITextFieldDelegate,\n\
    UIActionSheetDelegate, UIImagePickerControllerDelegate, UINavigationControllerDelegate>\n\
    ```\n\n`UIImagePickerController` 的代理属性被定义为实现了 `UIImagePickerControllerDelegate`\
    \ 和 `UINavigationControllerDelegate` 协议的对象。因此，即使我们不会实现任何 `UINavigationControllerDelegate`\
    \ 方法签名，仍然需要在 `BRBirthdayEditViewController` 头文件中包含该协议，以避免编译器警告。\n\n切换回 `BRBirthdayEditViewController.m`\
    \ 源文件，并添加以下私有属性声明：\n\n```\n@interface BRBirthdayEditViewController()\n\n@property\
    \ (nonatomic, strong) UIImagePickerController *imagePicker;\n\n@end;\n```\n\n\
    我们可以重写新图片选择器属性的 getter 方法，仅在第一次引用时才实例化图片选择器控制器的一个实例。这被称为*懒加载*。在 `BRBirthdayEditViewController.m`\
    \ 的实现中添加该访问器方法：\n\n```\n-(UIImagePickerController *) imagePicker\n{\n    if (_imagePicker\
    \ == nil) {\n        _imagePicker = [[UIImagePickerController alloc] init];\n\
    \        _imagePicker.delegate = self;\n    }\n    return _imagePicker;\n}\n```\n\
    \n现在实现我们的两个新方法，用于拍照和浏览照片：\n\n```\n-(void) takePhoto\n{\n    self.imagePicker.sourceType\
    \ = UIImagePickerControllerSourceTypeCamera;\n    [self.navigationController presentViewController:self.imagePicker\
    \ animated:YES completion:nil];\n}\n\n-(void) pickPhoto\n{\n    self.imagePicker.sourceType\
    \ = UIImagePickerControllerSourceTypePhotoLibrary;\n    [self.navigationController\
    \ presentViewController:self.imagePicker animated:YES completion:nil];\n}\n```\n\
    \n与关闭模态视图控制器类似，我们可以将一个代码块作为 `presentViewController:animated:completion:` 视图控制器方法的第三个参数传入。不过，由于我们没有任何需要在呈现动画完成后运行的代码，因此直接传入\
    \ `nil` 即可。\n\n为了调用我们的 `takePhoto` 和 `pickPhoto` 方法，需要从 `UIActionSheetDelegate`\
    \ 协议中添加一个代理方法到我们的类中，以便响应用户从操作表中选择两个操作选项之一：\n\n```\n#pragma mark UIActionSheetDelegate\n\
    \n- (void)actionSheet:(UIActionSheet *)actionSheet\ndidDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    if (buttonIndex == actionSheet.cancelButtonIndex) return;\n\n    switch\
    \ (buttonIndex) {\n        case 0:\n            [self takePhoto];\n          \
    \  break;\n        case 1:\n            [self pickPhoto];\n            break;\
    \   \n    }\n}\n```\n\n构建并运行。现在您应该能够通过 `UIImagePickerController` 浏览、选择并拍照，如图 6-21\
    \ 所示。\n\n![图片](img/9781430243748_Fig06-21.jpg)\n\n**图 6-21。** 状态并非最佳！\n\n如果您在模拟器上运行应用，仍然无法看到\
    \ `UIImagePickerController`。不过，模拟器确实包含照片库，因此如果没有检测到摄像头，我们就不显示带有选项的操作表，而是直接向用户展示照片库：\n\
    \n将 `didTapPhoto:` 方法修改如下：\n\n```\n- (IBAction)didTapPhoto:(id)sender {\n    NSLog(@\"\
    已点击照片！\");\n    if (![UIImagePickerController\nisSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
    \ {\n        NSLog(@\"未检测到摄像头！\");\n        [self pickPhoto];\n        return;\n\
    \    }\n    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:nil\
    \ delegate:self\ncancelButtonTitle:@\"取消\"    destructiveButtonTitle:nil    otherButtonTitles:@\"\
    拍照\",@\"从照片库选取\", nil];\n    [actionSheet showInView:self.view];\n}\n```\n\n我们刚刚添加了一个直接调用，如果设备未检测到摄像头，则直接调用新的\
    \ `pickPhoto` 方法。\n\n我们还没完全完成。`UIImagePickerController` 似乎正在拍照，但如何在完成时获取照片数据呢？当然是通过代理回调方法！我们已经声明了\
    \ `BRBirthdayEditViewController` 实现了 `UIImagePickerControllerDelegate` 协议，因此添加以下代码来从\
    \ `UIImagePickerController` 实例中获取图像数据：\n\n```\n#pragma mark UIImagePickerControllerDelegate\n\
    \n- (void)imagePickerController:(UIImagePickerController *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary\
    \ *)info {\n\n    [picker dismissViewControllerAnimated:YES completion:nil];\n\
    \n    UIImage *image = info[UIImagePickerControllerOriginalImage];\n\n    self.photoView.image\
    \ = image;\n}\n```\n\n通过定义 `UIImagePickerControllerDelegate` 协议方法 `imagePickerController:didFinishPickingMediaWithInfo:`，我们从\
    \ `UIImagePickerController` 中获取到了图像数据，该数据作为参数传入的回调方法中的 `info` `NSDictionary` 的一个属性。我们设置了\
    \ `photoView` 图像视图的 image 属性，将生日蛋糕图片替换为新拍摄或选择的照片。\n"
- fmt: '#### Tweaking image view rendering


    Depending on the dimensions of the photo you’re taking or selecting with the image
    picker, you may have noticed that the resulting image doesn’t retain its aspect
    ratio. Instead, it’s squashed or stretched to fit the image view bounds. When
    I first started learning iOS and came across this problem, my initial thoughts
    were to either resize and center the image view or to generate a new cropped image
    to fit the dimensions of the image view. It turns out that the solution is a great
    deal simpler than either of these approaches. `UIView` has a property called `contentMode`
    that determines how the content of the view is rendered. `contentMode` defaults
    to `UIViewContentModeScaleToFill`, that is, it simply stretches or squashes its
    drawn contents to the dimensions of its bounds. If we change the `contentMode`
    property value to `UIViewContentModeScaleAspectFill`, the aspect ratio of our
    image will be respected and the image will fill the bounds of the image view it’s
    being rendered into.


    Back in the storyboard, select the `photoView` image view. Using the attributes
    inspector change the Mode setting to Aspect Fill. Build and run. This time, you
    should find that your selected photo is now sized to fill the bounds of the image
    view without distorting the image. The only problem is that the overlapping sides
    or the top and bottom of the image are not getting cropped. Again, that’s an easy
    one to solve. Keeping the image view selected, in the attributes inspector you’ll
    find an attribute called Clip Subviews (`UIView.clipsToBounds`). Switch Clip Subviews
    on. Build and run. How about that? Nicely cropped and centered square thumbnails
    that match the bounds of our image view (see [Figure 6-22](#Chapter06.html#fig_6_22))!
    How easy was that?!


    *Note: At the moment, we’re filling a small thumbnail image view with a potentially
    very large photograph. At a later stage of development, we generate thumbnails
    from large images; otherwise, our app very quickly consumes a lot of memory from
    rendering, unnecessarily large images.*


    ![Image](images/9781430243748_Fig06-22.jpg)


    **Figure 6-22.** Bad, Better, Best!


    ### Summary


    You’ve reached the end of Day 2! Today has been all about building basic iOS user
    interfaces and navigation. You learned


    > *   How to build a navigation hierarchy of view controllers as scenes in a storyboard.

    > *   How to create view controller subclasses and assign them to view controllers
    in our storyboard.

    > *   How to connect our views and subviews with custom view controllers through
    Interface Builder outlets and actions.

    > *   How to understand the delegate pattern, to implement protocols in our view
    controllers, and respond to protocol method callbacks.

    > *   How to implement the native iPhone camera and Photo Library into our app.


    We’ve made a great start on the navigation and user interface, but we’ve not tackled
    data handling in iOS. Guess what we’re up to tomorrow? That’s right, *working
    with data*. Sleep well. ![Image](images/smile.jpg)


    ![Image](images/ch.jpg)


    ## Day 3


