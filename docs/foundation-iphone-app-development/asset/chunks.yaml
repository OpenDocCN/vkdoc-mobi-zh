    \n既然我们已经声明正在检查 Facebook 账户，我们还需要让 iOS 了解我们请求访问数据的意图。对于 Facebook，我们需要传入一个选项字典，其中包含\
    \ Facebook 应用 ID 以及我们需要访问的 Facebook 权限。对于某些 Facebook 功能，必须指定一个*扩展权限*数组：获取朋友生日需要`friends_birthday`权限。关于扩展权限的完整列表，请访问以下网页：[`http://developers.facebook.com/docs/reference/api/permissions/`](http://developers.facebook.com/docs/reference/api/permissions/)。\n\
    \n`ACAccountStore`的方法`requestAccessToAccountsWithType:`要求我们传入一个完成代码块，当用户点击\"不允许\"\
    或\"好\"以响应账户访问请求时，该代码块会被调用。\n\n现在让我们开始在`BRDModel.m`中实现`fetchFacebookBirthdays`：\n\
    \n```objectivec\n- (void)fetchFacebookBirthdays\n{\n    NSLog(@\"fetchFacebookBirthdays\"\
    );\n    if (self.facebookAccount == nil) {\n        self.currentFacebookAction\
    \ = FacebookActionGetFriendsBirthdays;\n        [self authenticateWithFacebook];\n\
    \        return;\n    }\n    // 如果代码执行到这里，说明我们已有经过验证的 Facebook 账户\n}\n```\n\n\
    我们的 Facebook 导入视图控制器不需要了解授权过程的任何细节；它只需要知道导入哪些生日以及列表何时更新。每次 Facebook 导入视图控制器出现时，我们都会设置它调用模型上的`fetchFacebookBirthdays`方法，该方法首先检查`self.facebookAccount`是否存在（即是否已由用户授权）。如果不存在，此时我们的模型将通过执行我们刚编写的`authenticateWithFacebook`方法来启动单点登录过程。\n\
    \n打开`BRImportFacebookViewController.m`，导入`BRDModel`，然后在 Facebook 导入视图出现时添加`fetchFacebookBirthdays`方法调用，如下所示：\n\
    \n```objectivec\n#import \"BRImportFacebookViewController.h\"\n#import \"BRDModel.h\"\
    \n@interface BRImportFacebookViewController ()\n\n@end\n\n@implementation BRImportFacebookViewController\n\
    \n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [[BRDModel sharedInstance] fetchFacebookBirthdays];\n}\n\n@end\n```\n\n尝试编译并运行。点击\
    \ Facebook 按钮。只要你的设备或模拟器上关联了 Facebook 账户，你就能看到数据隐私提示，如图 Figure 11-7 所示。\n\n![图像](img/9781430243748_Fig11-07.jpg)\n\
    \n**图 11-7.** 苹果的 Accounts 框架提示用户允许访问其 Facebook 账户\n\n来自 Facebook 导入的视图控制器在出现时调用了模型的`fetchFacebookBirthdays`方法。`BRDModel.m`检查其私有属性`facebookAccount`是否存在，如果未设置，则调用我们之前编写的`authenticateWithFacebook`方法。\n\
    \n在权限提示视图中点击\"好\"会触发`authenticateWithFacebook`方法中的完成代码块运行，该代码块将`facebookAccount`存储到模型中，然后重新调用`fetchFacebookBirthdays`，这样我们获取\
    \ Facebook 生日的代码现在就可以在授权下运行了。我们还没有编写获取生日的代码，所以现在开始编写。"
- fmt: "### Fetching Facebook birthdays\n\nOnce our users complete the Facebook single\
    \ sign-on process and authorize *Birthday Reminder* to communicate with Facebook\
    \ on their behalf, we can do just that! So let’s extend the `BRDModel.m`’s `fetchFacebookBirthdays`\
    \ method to make a Facebook API request to fetch the birthday details of a user’s\
    \ Facebook friends:\n\n```\n- (void)fetchFacebookBirthdays\n{\n    NSLog(@\"fetchFacebookBirthdays\"\
    );\n    if (self.facebookAccount == nil) {\n        self.currentFacebookAction\
    \ = FacebookActionGetFriendsBirthdays;\n        [self authenticateWithFacebook];\n\
    \        return;\n    }\n    //We've got an authenticated Facebook Account if\
    \ the code executes here\n    NSURL *requestURL = [NSURL URLWithString:@\"https://graph.facebook.com/me/friends\"\
    ];\n    NSDictionary *params = @{ @\"fields\" : @\"name,id,birthday\"};\n    SLRequest\
    \ *request = [SLRequest requestForServiceType:SLServiceTypeFacebook requestMethod:SLRequestMethodGET\
    \ URL:requestURL parameters:params];\n    request.account = self.facebookAccount;\n\
    \    [request performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\n\
    *urlResponse, NSError *error) {\n        if (error != nil) {\n            NSLog(@\"\
    Error getting my Facebook friend birthdays: %@\",error);\n        }\n        else\n\
    \        {\n            // Facebook's me/friends Graph API returns a root dictionary\n\
    \            NSDictionary *resultD = (NSDictionary *) [NSJSONSerialization\nJSONObjectWithData:responseData\
    \ options:0 error:nil];\n            NSLog(@\"Facebook returned friends: %@\"\
    ,resultD);\n        }\n    }];\n}\n```\n\nThe new code uses the `SLRequest` class\
    \ from Apple’s Social framework to call the `me/friends` path of Facebook’s Graph\
    \ API and requests only the `name`, `id`, and `birthday` fields of the array of\
    \ friend dictionaries returned. For a full list of user fields, visit the following\
    \ web page:\n\n[http://developers.facebook.com/docs/reference/api/user/](http://developers.facebook.com/docs/reference/api/user/).\n\
    \nIt’s beyond the scope of this book to explore Facebook’s Graph API in further\
    \ detail but if you want to learn about all the Facebook API’s your app can access\
    \ natively then check out Facebook’s own API documentation at [http://developers.facebook.com/docs/reference/api/](http://developers.facebook.com/docs/reference/api/).\n\
    \nYou should be able to build and run your app. Try to import from Facebook, and\
    \ the debugger should print all the JSON data returned by the Facebook API request.\n\
    \nNote how we assign the `account` property of the `SLRequest` instance to the\
    \ authorized Facebook `ACAccount`.\n\nThe HTTP request to Facebook is executed\
    \ by the `performRequestWithHandler` method of `SLRequest` that runs in a background\
    \ thread. When the request returns a response from Facebook, a completion block\
    \ of code runs.\n\n*Note: All Apple’s user interface code runs on the main thread.\
    \ By running processes like HTTP requests on background threads, we ensure that\
    \ our app UI remains responsive, even while requests are still running.*\n\nWe’re\
    \ going to process the returned Facebook birthday data next. `BRDModel` will generate\
    \ an array of `BRDBirthdayImport` objects just like in [Chapter 10](#Chapter10.html#ch10)\
    \ with importing Address Book birthdays. Once we’ve created an array of birthday\
    \ import objects, we’ll dispatch a notification from the model that the list of\
    \ Facebook birthdays was updated. We’ve looked at the notification/observer feature\
    \ of Objective-C when we built the blackjack app in [Chapter 4](#Chapter04.html#ch4)\
    \ and when we dispatched an array of birthdays imported from the Address Book\
    \ in the last chapter. Basic MVC rules dictate that our model cannot have direct\
    \ access to the view. Instead, the model dispatches a notification when its data\
    \ changes and our Facebook import view controller is able to catch that notification\
    \ and update its view.\n\nBefore processing the data returned by Facebook, let’s\
    \ define a new notification name constant at the top of the `BRDModel.h` header\
    \ file, just as we did for the Address Book birthdays:\n\n```\n#define BRNotificationFacebookBirthdaysDidUpdate\n\
    @\"BRNotificationFacebookBirthdaysDidUpdate\"\n```\n\nNow to continue work on\
    \ the `fetchFacebookBirthdays` method for handling, processing, and notifying\
    \ observers of the full list of Facebook birthdays to display, which our users\
    \ will be able to pick and choose from.\n\n```\n- (void)fetchFacebookBirthdays\n\
    {\n    NSLog(@\"fetchFacebookBirthdays\");\n    if (self.facebookAccount == nil)\
    \ {\n        self.currentFacebookAction = FacebookActionGetFriendsBirthdays;\n\
    \        [self authenticateWithFacebook];\n        return;\n    }\n    //We've\
    \ got an authenticated Facebook Account if the code executes here\n    NSURL *requestURL\
    \ = [NSURL URLWithString:@\"https://graph.facebook.com/me/friends\"];\n    NSDictionary\
    \ *params = @{ @\"fields\" : @\"name,id,birthday\"};\n    SLRequest *request =\
    \ [SLRequest requestForServiceType:SLServiceTypeFacebook requestMethod:SLRequestMethodGET\
    \ URL:requestURL parameters:params];\n    request.account = self.facebookAccount;\n\
    \    [request performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\
    \ *urlResponse,\nNSError *error) {\n        if (error != nil) {\n            NSLog(@\"\
    Error getting my Facebook friend birthdays: %@\",error);\n        }\n        else\n\
    \        {\n            // Facebook's me/friends Graph API returns a root dictionary\n\
    \            NSDictionary *resultD = (NSDictionary *) [NSJSONSerialization JSONObjectWithData:responseData\
    \ options:0 error:nil];\n            NSLog(@\"Facebook returned friends: %@\"\
    ,resultD);\n// with a 'data' key - an array of Facebook friend dictionaries\n\
    \            NSArray *birthdayDictionaries = resultD[@\"data\"];\n           \
    \ int birthdayCount = [birthdayDictionaries count];\n            NSDictionary\
    \ *facebookDictionary;\n            NSMutableArray *birthdays = [NSMutableArray\
    \ array];\n            BRDBirthdayImport *birthday;\n            NSString *birthDateS;\n\
    \            for (int i = 0; i < birthdayCount; i++)\n            {\n        \
    \        facebookDictionary = birthdayDictionaries[i];\n                birthDateS\
    \ = facebookDictionary[@\"birthday\"];\n                if (!birthDateS) continue;\n\
    \                //create an instance of BRDBirthdayImport\n                NSLog(@\"\
    Found a Facebook Birthday: %@\",facebookDictionary);\n                //TODO -\
    \ create instances of BRDBirthdayImport\n            }\n            //Order the\
    \ birthdays by name\n            NSSortDescriptor *sortDescriptor = [[NSSortDescriptor\
    \ alloc]\ninitWithKey:@\"name\" ascending:YES];\n            NSArray *sortDescriptors\
    \ = [NSArray arrayWithObject:sortDescriptor];\n            [birthdays sortUsingDescriptors:sortDescriptors];\n\
    \            dispatch_sync(dispatch_get_main_queue(), ^{\n                //update\
    \ the view on the main thread\n                NSDictionary *userInfo = @{@\"\
    birthdays\":birthdays};\n                [[NSNotificationCenter defaultCenter]\
    \ postNotificationName:BRNotificationFacebookBirthdaysDidUpdate object:self\n\
    userInfo:userInfo];\n            });\n        }\n    }];\n}\n```\n\nThe Graph\
    \ API returns JSON, which we parse using a handy utility class called `NSJSONSerialization`\
    \ that Apple added in iOS 5 for JSON reading and serialization. We then extract\
    \ a `data` array of Facebook friend dictionaries, loop through the list, and check\
    \ each for a valid `birthday` key value. Facebook users select the information\
    \ they share, so there’s no guarantee that we’ll find a birthday for each friend\
    \ in the results set."
  raw: '### Fetching Facebook birthdays


    Once our users complete the Facebook single sign-on process and authorize *Birthday
    Reminder* to communicate with Facebook on their behalf, we can do just that! So
    let’s extend the `BRDModel.m`’s `fetchFacebookBirthdays` method to make a Facebook
    API request to fetch the birthday details of a user’s Facebook friends:


    `- (void)fetchFacebookBirthdays`

    `{`

    `    NSLog(@"fetchFacebookBirthdays");`

    `    if (self.facebookAccount == nil) {`

    `        self.currentFacebookAction = FacebookActionGetFriendsBirthdays;`

    `        [self authenticateWithFacebook];`

    `        return;`

    `    }`

    `    //We''ve got an authenticated Facebook Account if the code executes here`

    **`    NSURL *requestURL = [NSURL URLWithString:@"https://graph.facebook.com/me/friends"];`**


    **`    NSDictionary *params = @{ @"fields" : @"name,id,birthday"};`**


    **`    SLRequest *request = [SLRequest requestForServiceType:SLServiceTypeFacebook
    requestMethod:SLRequestMethodGET URL:requestURL parameters:params];`**


    **`    request.account = self.facebookAccount;`**


    **`    [request performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse`**

    **`*urlResponse, NSError *error) {`**

    **`        if (error != nil) {`**

    **`            NSLog(@"Error getting my Facebook friend birthdays: %@",error);`**

    `        }`

    **`        else`**

    `        {`

    **`            // Facebook''s me/friends Graph API returns a root dictionary`**

    **`            NSDictionary *resultD = (NSDictionary *) [NSJSONSerialization`**

    **`JSONObjectWithData:responseData options:0 error:nil];`**

    **`            NSLog(@"Facebook returned friends: %@",resultD);`**

    **`        }`**

    **`    }];`**

    `}`


    The new code uses the `SLRequest` class from Apple’s Social framework to call
    the `me/friends` path of Facebook’s Graph API and requests only the `name`, `id`,
    and `birthday` fields of the array of friend dictionaries returned. For a full
    list of user fields, visit the following web page:


    [`http://developers.facebook.com/docs/reference/api/user/`](http://developers.facebook.com/docs/reference/api/user/).


    It’s beyond the scope of this book to explore Facebook’s Graph API in further
    detail but if you want to learn about all the Facebook API’s your app can access
    natively then check out Facebook’s own API documentation at [`http://developers.facebook.com/docs/reference/api/`](http://developers.facebook.com/docs/reference/api/).


    You should be able to build and run your app. Try to import from Facebook, and
    the debugger should print all the JSON data returned by the Facebook API request.


    Note how we assign the `account` property of the `SLRequest` instance to the authorized
    Facebook ACAccount.


    The HTTP request to Facebook is executed by the `performRequestWithHandler` method
    of `SLRequest` that runs in a background thread. When the request returns a response
    from Facebook, a completion block of code runs.


    ***Note:** All Apple’s user interface code runs on the main thread. By running
    processes like HTTP requests on background threads, we ensure that our app UI
    remains responsive, even while requests are still running*.


    We’re going to process the returned Facebook birthday data next. `BRDModel` will
    generate an array of `BRDBirthdayImport` objects just like in [Chapter 10](#Chapter10.html#ch10)
    with importing Address Book birthdays. Once we’ve created an array of birthday
    import objects, we’ll dispatch a notification from the model that the list of
    Facebook birthdays was updated. We’ve looked at the notification/observer feature
    of Objective-C when we built the blackjack app in [Chapter 4](#Chapter04.html#ch4)
    and when we dispatched an array of birthdays imported from the Address Book in
    the last chapter. Basic MVC rules dictate that our model cannot have direct access
    to the view. Instead, the model dispatches a notification when its data changes
    and our Facebook import view controller is able to catch that notification and
    update its view.


    Before processing the data returned by Facebook, let’s define a new notification
    name constant at the top of the `BRDModel.h` header file, just as we did for the
    Address Book birthdays:


    `#define BRNotificationFacebookBirthdaysDidUpdate`

    `@"BRNotificationFacebookBirthdaysDidUpdate"`


    Now to continue work on the `fetchFacebookBirthdays` method for handling, processing,
    and notifying observers of the full list of Facebook birthdays to display, which
    our users will be able to pick and choose from.


    `- (void)fetchFacebookBirthdays`

    `{`

    `    NSLog(@"fetchFacebookBirthdays");`

    `    if (self.facebookAccount == nil) {`

    `        self.currentFacebookAction = FacebookActionGetFriendsBirthdays;`

    `        [self authenticateWithFacebook];`

    `        return;`

    `    }`

    `    //We''ve got an authenticated Facebook Account if the code executes here`

    `    NSURL *requestURL = [NSURL URLWithString:@"https://graph.facebook.com/me/friends"];`

    `    NSDictionary *params = @{ @"fields" : @"name,id,birthday"};`


    `    SLRequest *request = [SLRequest requestForServiceType:SLServiceTypeFacebook
    requestMethod:SLRequestMethodGET URL:requestURL parameters:params];`


    `    request.account = self.facebookAccount;`


    `    [request performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse
    *urlResponse,`

    `NSError *error) {`

    `        if (error != nil) {`

    `            NSLog(@"Error getting my Facebook friend birthdays: %@",error);`

    `        }`

    `        else`

    `        {`

    `            // Facebook''s me/friends Graph API returns a root dictionary`

    `            NSDictionary *resultD = (NSDictionary *) [NSJSONSerialization JSONObjectWithData:responseData
    options:0 error:nil];`

    `            NSLog(@"Facebook returned friends: %@",resultD);`

    **`// with a ''data'' key - an array of Facebook friend dictionaries`**

    **`            NSArray *birthdayDictionaries = resultD[@"data"];`**


    **`            int birthdayCount = [birthdayDictionaries count];`**

    **`            NSDictionary *facebookDictionary;`**


    **`            NSMutableArray *birthdays = [NSMutableArray array];`**

    **`            BRDBirthdayImport *birthday;`**

    **`            NSString *birthDateS;`**


    **`            for (int i = 0; i < birthdayCount; i++)`**

    `            {`

    **`                facebookDictionary = birthdayDictionaries[i];`**

    **`                birthDateS = facebookDictionary[@"birthday"];`**

    **`                if (!birthDateS) continue;`**

    **`                //create an instance of BRDBirthdayImport`**

    **`                NSLog(@"Found a Facebook Birthday: %@",facebookDictionary);`**

    **`                //TODO - create instances of BRDBirthdayImport`**

    **`            }`**


    **`            //Order the birthdays by name`**

    **`            NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc]`

    `initWithKey:@"name" ascending:YES];`**

    **`            NSArray *sortDescriptors = [NSArray arrayWithObject:sortDescriptor];`**

    **`            [birthdays sortUsingDescriptors:sortDescriptors];`**


    **`            dispatch_sync(dispatch_get_main_queue(), ^{`**

    **`                //update the view on the main thread`**

    **`                NSDictionary *userInfo = @{@"birthdays":birthdays};`**

    **`                [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationFacebookBirthdaysDidUpdate
    object:self`

    `userInfo:userInfo];`**

    **`            });`**

    `        }`

    `    }];`

    `}`


    The Graph API returns JSON, which we parse using a handy utility class called
    `NSJSONSerialization` that Apple added in iOS 5 for JSON reading and serialization.
    We then extract a `data` array of Facebook friend dictionaries, loop through the
    list, and check each for a valid `birthday` key value. Facebook users select the
    information they share, so there’s no guarantee that we’ll find a birthday for
    each friend in the results set.'
  trans: "\n### 获取 Facebook 生日信息\n\n当用户完成 Facebook 单点登录流程，并授权*生日提醒*应用代表他们与 Facebook\
    \ 通信后，我们就能实现这一功能了！因此，让我们扩展 `BRDModel.m` 中的 `fetchFacebookBirthdays` 方法，使其能够发起\
    \ Facebook API 请求，以获取用户 Facebook 好友的生日详情：\n\n```\n- (void)fetchFacebookBirthdays\n\
    {\n    NSLog(@\"fetchFacebookBirthdays\");\n    if (self.facebookAccount == nil)\
    \ {\n        self.currentFacebookAction = FacebookActionGetFriendsBirthdays;\n\
    \        [self authenticateWithFacebook];\n        return;\n    }\n    //如果代码执行到这里，说明我们已经有了经过认证的\
    \ Facebook 账户\n    NSURL *requestURL = [NSURL URLWithString:@\"https://graph.facebook.com/me/friends\"\
    ];\n    NSDictionary *params = @{ @\"fields\" : @\"name,id,birthday\"};\n    SLRequest\
    \ *request = [SLRequest requestForServiceType:SLServiceTypeFacebook requestMethod:SLRequestMethodGET\
    \ URL:requestURL parameters:params];\n    request.account = self.facebookAccount;\n\
    \    [request performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\n\
    *urlResponse, NSError *error) {\n        if (error != nil) {\n            NSLog(@\"\
    Error getting my Facebook friend birthdays: %@\",error);\n        }\n        else\n\
    \        {\n            // Facebook 的 me/friends Graph API 返回一个根字典\n         \
    \   NSDictionary *resultD = (NSDictionary *) [NSJSONSerialization\nJSONObjectWithData:responseData\
    \ options:0 error:nil];\n            NSLog(@\"Facebook returned friends: %@\"\
    ,resultD);\n        }\n    }];\n}\n```\n\n这段新代码使用了 Apple 社交框架中的 `SLRequest` 类，来调用\
    \ Facebook Graph API 的 `me/friends` 路径，并且只请求返回的好友字典数组中每个好友的 `name`、`id` 和 `birthday`\
    \ 字段。如需查看完整的用户字段列表，请访问以下网页：\n\n[`developers.facebook.com/docs/reference/api/user/`](http://developers.facebook.com/docs/reference/api/user/).\n\
    \n深入探讨 Facebook 的 Graph API 超出了本书的范围。但如果你想了解你的应用可以原生访问的所有 Facebook API，可以查看 Facebook\
    \ 官方的 API 文档：[`developers.facebook.com/docs/reference/api/`](http://developers.facebook.com/docs/reference/api/)。\n\
    \n现在你应该能够构建并运行你的应用了。尝试从 Facebook 导入数据，调试器会打印出 Facebook API 请求返回的所有 JSON 数据。\n\n\
    请注意，我们将 `SLRequest` 实例的 `account` 属性赋值为已授权的 Facebook `ACAccount`。\n\n发向 Facebook\
    \ 的 HTTP 请求由 `SLRequest` 的 `performRequestWithHandler` 方法执行，该方法运行在后台线程中。当请求收到来自\
    \ Facebook 的响应时，会执行一个完成的代码块。\n\n*注意：Apple 的所有用户界面代码都在主线程上运行。通过在后台线程上运行 HTTP 请求等进程，我们可以确保即使请求仍在运行，应用的用户界面也能保持响应。*\n\
    \n接下来，我们将处理返回的 Facebook 生日数据。就像第 10 章中导入通讯录生日那样，`BRDModel` 将生成一个 `BRDBirthdayImport`\
    \ 对象的数组。创建好生日导入对象数组后，我们将从模型中发送通知，告知 Facebook 生日列表已更新。在第 4 章构建二十一点应用时，以及上一章发送从通讯录导入的生日数组时，我们都了解过\
    \ Objective-C 的通知/观察者特性。基本的 MVC 规则规定，我们的模型不能直接访问视图。相反，模型在其数据发生变化时会发送通知，而我们的 Facebook\
    \ 导入视图控制器能够捕获该通知并更新其视图。\n\n在开始处理 Facebook 返回的数据之前，让我们在 `BRDModel.h` 头文件的顶部定义一个通知名称常量，就像之前为通讯录生日所做的那样：\n\
    \n```\n#define BRNotificationFacebookBirthdaysDidUpdate\n@\"BRNotificationFacebookBirthdaysDidUpdate\"\
    \n```\n\n现在，继续完善 `fetchFacebookBirthdays` 方法，使其能够处理、加工数据并通知观察者，提供完整的 Facebook\
    \ 生日列表以供显示，我们的用户将能够从中进行挑选。\n\n```\n- (void)fetchFacebookBirthdays\n{\n    NSLog(@\"\
    fetchFacebookBirthdays\");\n    if (self.facebookAccount == nil) {\n        self.currentFacebookAction\
    \ = FacebookActionGetFriendsBirthdays;\n        [self authenticateWithFacebook];\n\
    \        return;\n    }\n    //如果代码执行到这里，说明我们已经有了经过认证的 Facebook 账户\n    NSURL\
    \ *requestURL = [NSURL URLWithString:@\"https://graph.facebook.com/me/friends\"\
    ];\n    NSDictionary *params = @{ @\"fields\" : @\"name,id,birthday\"};\n    SLRequest\
    \ *request = [SLRequest requestForServiceType:SLServiceTypeFacebook requestMethod:SLRequestMethodGET\
    \ URL:requestURL parameters:params];\n    request.account = self.facebookAccount;\n\
    \    [request performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\
    \ *urlResponse,\nNSError *error) {\n        if (error != nil) {\n            NSLog(@\"\
    Error getting my Facebook friend birthdays: %@\",error);\n        }\n        else\n\
    \        {\n            // Facebook 的 me/friends Graph API 返回一个根字典\n         \
    \   NSDictionary *resultD = (NSDictionary *) [NSJSONSerialization JSONObjectWithData:responseData\
    \ options:0 error:nil];\n            NSLog(@\"Facebook returned friends: %@\"\
    ,resultD);\n// 带有一个 'data' 键 - 它是一个由 Facebook 好友字典构成的数组\n            NSArray *birthdayDictionaries\
    \ = resultD[@\"data\"];\n            int birthdayCount = [birthdayDictionaries\
    \ count];\n            NSDictionary *facebookDictionary;\n            NSMutableArray\
