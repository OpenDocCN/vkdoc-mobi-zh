  trans: "\n# 初始化 Core Data 数据模型\n\n在查看 Apple 的 Core Data 示例代码时，我们发现所有初始化代码都位于应用代理类中。不过，通常的做法是创建一个单例模型类，并在该单例实例中一次性完成\
    \ Core Data 模型的初始化。这样，项目中的任何类都可以通过模型单例直接访问托管对象上下文。\n\n让我们先创建一个单例模型类。在 `data` 组中新建一个\
    \ `NSObject` 的子类，并将类命名为 `BRDModel`。为了设置我们的单例类，我们将仅通过一个名为 `sharedInstance` 的类方法来提供对模型的访问。`BRDModel`\
    \ 的 `sharedInstance` 方法会创建 `BRDModel` 的唯一实例，如果实例已存在则直接返回。首先，在 `BRDModel.h` 中定义该类方法：\n\
    \n```\n#import <Foundation/Foundation.h>\n@interface BRDModel : NSObject\n\n+\
    \ (BRDModel*)sharedInstance;\n\n@end\n```\n\n现在切换到 `BRDModel.m`，实现这个新的类方法：\n\n\
    ```\n#import \"BRDModel.h\"\n\n@implementation BRDModel\n\nstatic BRDModel *_sharedInstance\
    \ = nil;\n+ (BRDModel*)sharedInstance\n{\n    if( !_sharedInstance ) {\n     \
    \          _sharedInstance = [[BRDModel alloc] init];\n}\n       return _sharedInstance;\n\
    }\n\n@end\n```\n\n`sharedInstance` 方法初始化了其自身类的一个实例。这是在 Objective-C 中实现单例的常用技术。每当我们需要在应用中访问模型时，只需引用\
    \ `[BRDModel sharedInstance]` 即可。接下来，我们从本章前面创建的 Apple 自带的 Master-Detail 应用中获取\
    \ Core Data 初始化代码。找到 `AppDelegate.h` 头文件，复制持久化存储协调器、托管对象模型和托管对象上下文的声明，并直接粘贴到 `BRDModel.h`\
    \ 头文件中，如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface BRDModel\
    \ : NSObject\n\n+ (BRDModel*)sharedInstance;\n\n@property (readonly, strong, nonatomic)\
    \ NSManagedObjectContext *managedObjectContext;\n@property (readonly, strong,\
    \ nonatomic) NSManagedObjectModel *managedObjectModel;\n@property (readonly, strong,\
    \ nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\n@end\n\
    ```\n\n切换到 `BRDModel.m` 源文件，并像在 `AppDelegate.m` 源文件中一样，合成这三个新的 Core Data 属性：\n\
    \n```\n@implementation BRDModel\n\n@synthesize managedObjectContext = _managedObjectContext;\n\
    @synthesize managedObjectModel = _managedObjectModel;\n@synthesize persistentStoreCoordinator\
    \ = _persistentStoreCoordinator;\n```\n\n*注意：在此处我们手动添加了合成代码，以确保每个属性都指向一个带下划线的实例变量。Xcode\
    \ 的编译器不会为 `readonly` 属性自动执行此操作。*\n\n然后，从 Master-Detail 项目的 `AppDelegate.m` 中 Apple\
    \ 自带的代码里，复制三个 Core Data 访问器方法以及 `applicationDocumentsDirectory` 辅助私有方法的实现。如果愿意，可以移除注释，但更重要的是，将两处\
    \ `CoreDataExample` 字符串替换为我们 *Birthday Reminder* Core Data 模型的名称 `BirthdayReminder`，如下方高亮代码所示：\n\
    \n```\n- (NSManagedObjectContext *)managedObjectContext\n{\n    if (_managedObjectContext\
    \ != nil) {\n        return _managedObjectContext;\n    }\n\n    NSPersistentStoreCoordinator\
    \ *coordinator = [self persistentStoreCoordinator];\n    if (coordinator != nil)\
    \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
    \        [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \    }\n    return _managedObjectContext;\n}\n\n// 返回应用的托管对象模型。\n// 如果模型不存在，则从应用的模型文件中创建。\n\
    - (NSManagedObjectModel *)managedObjectModel\n{\n    if (_managedObjectModel !=\
    \ nil) {\n        return _managedObjectModel;\n    }\n    NSURL *modelURL = [[NSBundle\
    \ mainBundle] URLForResource:@\"BirthdayReminder\"\n    withExtension:@\"momd\"\
    ];\n    _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n\
    \    return _managedObjectModel;\n}\n\n// 返回应用的持久化存储协调器。\n// 如果协调器不存在，则创建它并添加应用的存储。\n\
    - (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{\n    if (_persistentStoreCoordinator\
    \ != nil) {\n        return _persistentStoreCoordinator;\n    }\n\n    NSURL *storeURL\
    \ = [[self applicationDocumentsDirectory]\nURLByAppendingPathComponent:@\"BirthdayReminder.sqlite\"\
    ];\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc]\ninitWithManagedObjectModel:[self managedObjectModel]];\n    if (![_persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType\nconfiguration:nil URL:storeURL\
    \ options:nil error:&error]) {\n        NSLog(@\"未解决的错误 %@, %@\", error, [error\
    \ userInfo]);\n        abort();\n    }\n\n    return _persistentStoreCoordinator;\n\
    }\n\n#pragma mark - 应用的 Documents 目录\n\n// 返回应用 Documents 目录的 URL。\n- (NSURL *)applicationDocumentsDirectory\n\
    {\n    return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory\n\
    inDomains:NSUserDomainMask] lastObject];\n}\n```\n\n现在正是检查应用是否能正常编译的好时机，尽管你还看不到任何变化，因为我们仍处于\
    \ Core Data 实现的准备阶段。\n"
- fmt: "# Connecting table views to result sets with `NSFetchedResultsController`\n\
    \nIn order to retrieve stored result sets of Core Data entities, Apple provides\
    \ a handy fetching class named `NSFetchedResultsController`. Not only will a fetched\
    \ results controller perform an initial ordered fetch of Core Data entities based\
    \ on a query, it also provides delegate callback methods to alert its delegate\
    \ of changes to the results set. Changes like newly added, modified or removed\
    \ managed objects. It’s a very powerful class and we’ll be using it to keep track\
    \ of the list of `BRDBirthday` entities in our Core Data store and display them\
    \ in our Home view controller.\n\nOpen the header file for `BRHomeViewController.h`\
    \ and declare that our Home view controller implements the `NSFetchedResultsControllerDelegate`\
    \ protocol:\n\n`@interface BRHomeViewController :`\n`BRCoreViewController<UITableViewDelegate,UITableViewDataSource,`\n\
    `NSFetchedResultsControllerDelegate>`\n\nOpen the `BRHomeViewController.m` source\
    \ file, import our new `BRDBirthday.h` and `BRDModel.h` headers, and declare a\
    \ new fetched results controller private property in the Home view controller:\n\
    \n```\n#import \"BRHomeViewController.h\"\n#import \"BRBirthdayDetailViewController.h\"\
    \n#import \"BRBirthdayEditViewController.h\"\n#import \"BRDBirthday.h\"\n#import\
    \ \"BRDModel.h\"\n\n@interface BRHomeViewController()\n@property (nonatomic, strong)\
    \ NSFetchedResultsController *fetchedResultsController;\n@property (nonatomic,strong)\
    \ NSMutableArray *birthdays;\n\n@end\n```\n\nWe’ll lazy-load our fetched results\
    \ controller; that is, we’ll only instantiate it at the first moment it’s required\
    \ in code. To do this, we override the getter accessor method for `self.fetchedResultsController`.\
    \ We check to see if the instance variable `_fetchedResultsController` has not\
    \ yet been instantiated before we create the stored fetched results controller\
    \ instance. Add the new accessor method for `fetchedResultsController` to `BRHomeViewController.m`:\n\
    \n```\n#pragma mark Fetched Results Controller to keep track of the Core Data\
    \ BRDBirthday managed objects\n\n- (NSFetchedResultsController *)fetchedResultsController\
    \ {\n    if (_fetchedResultsController == nil) {\n\n        NSFetchRequest *fetchRequest\
    \ = [[NSFetchRequest alloc] init];\n\n        //access the single managed object\
    \ context through model singleton\n        NSManagedObjectContext *context = [BRDModel\
    \ sharedInstance].managedObjectContext;\n\n        //fetch request requires an\
    \ entity description - we're only interested in BRDBirthday managed objects\n\
    \        NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    BRDBirthday\" inManagedObjectContext:context];\n        fetchRequest.entity =\
    \ entity;\n\n        //we'll order the BRDBirthday objects in name sort order\
    \ for now\n        NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc]\n\
    initWithKey:@\"nextBirthday\" ascending:YES];\n        NSArray *sortDescriptors\
    \ = [[NSArray alloc] initWithObjects:sortDescriptor, nil];\n        fetchRequest.sortDescriptors\
    \ = sortDescriptors;\n\n        self.fetchedResultsController = [[NSFetchedResultsController\
    \ alloc]\ninitWithFetchRequest:fetchRequest managedObjectContext:context sectionNameKeyPath:nil\n\
    cacheName:nil];\n        self.fetchedResultsController.delegate = self;\n    \
    \    NSError *error = nil;\n        if (![self.fetchedResultsController performFetch:&error])\
    \ {\n\n            NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \            abort();\n        }\n\n    }\n\n        return _fetchedResultsController;\n\
    }\n```\n\nA fetched results controller needs a fetch request: it needs to know\
    \ the type of managed objects it should be fetching and the order of the results\
    \ it should return. So we first create an `NSFetchRequest` instance and then pass\
    \ it to our new `NSFetchedResultsController`. We set the entity of the fetch request\
    \ to be our only entity, `BRDBirthday`, and we specify that the results should\
    \ be returned in order of the `nextBirthday` string attribute of `BRDBirthday`.\n\
    \nFinally, we invoke the results controller to run the fetch request via the `performFetch:`\
    \ method to populate our fetched results controller with all the `BRDBirthday`\
    \ managed objects in the store (none for now!).\n\nThere’s a good reason that\
    \ we set the Home view controller as a delegate of the fetched results controller:\
    \ we want any changes to the results set as newly added or edited birthday managed\
    \ objects to be caught by our retained fetched results controller. Apple’s developer\
    \ documentation states: *A delegate must implement at least one of the change\
    \ tracking delegate methods in order for change tracking to be enabled.* Providing\
    \ an empty implementation of `controllerDidChangeContent:` is sufficient.^([1](#Chapter08.html#fn1))\n\
    \nSo, in order to ensure our fetched results controller is kept up-to-date, we’ll\
    \ implement an empty `NSFetchedResultsControllerDelegate` protocol method into\
    \ the `BRHomeViewController.m` class:\n\n```\n#pragma mark NSFetchedResultsControllerDelegate\n\
    \n- (void)controllerDidChangeContent:(NSFetchedResultsController *)controller\
    \ {\n    //The fetched results changed\n}\n```\n\nLocate the two `UITableViewDataSource`\
    \ protocol methods for populating our table view (`tableView:cellForRowAtIndexPath:`\
    \ and `tableView:numberOfRowsInSection:`) and replace them with the following:\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\n\
    *)indexPath\n{\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n\n    BRDBirthday *birthday = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
    \n    cell.textLabel.text = birthday.name;\n    cell.detailTextLabel.text = birthday.birthdayTextToDisplay;\n\
    \    cell.imageView.image = [UIImage imageWithData:birthday.imageData];\n    return\
    \ cell;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    id <NSFetchedResultsSectionInfo> sectionInfo = [[self.fetchedResultsController\
    \ sections] objectAtIndex:section];\n    return [sectionInfo numberOfObjects];\n\
    }\n```\n\n____________________\n\n¹ iOS Developer Library, “NSFetchedResultsController\
    \ Class Reference,”\n[`http://developer.apple.com/library/ios/#DOCUMENTATION/CoreData/Reference/NSFetchedResultsController_Class/Reference/Reference.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/CoreData/Reference/NSFetchedResultsController_Class/Reference/Reference.html).\n\
    \nWe access entities in the results set of our fetched results controller via\
    \ the `objectAtIndexPath:` method. Like tables, fetched results controllers can\
    \ have multiple sections. In our case, there will be just one section containing\
    \ all the `BRDBirthday` entities in our Core Data store.\n\nYour app will now\
    \ be attempting to initialize the new empty Core Data model. With a bit of luck,\
    \ you should now be able to build and run your app without error. However, if\
    \ it compiles but crashes, then ensure that you replaced any reference to `CoreDataExample`\
    \ to `BirthdayReminder` in the code copied from Apple’s example Master-Detail\
    \ template project. Additionally, the new Core Data model may not have been copied\
    \ into the target bundle; this can be easily resolved by trying one or both of\
    \ the following:\n\n> * Run a product clean with the ![Image](images/uarr.jpg)![Image](images/flower.jpg)K\
    \ shortcut or Product ![Image](images/U001.jpg) Clean.\n> * If that fails, then\
    \ delete Birthday Reminder from the simulator or device, and build and run afresh.\n\
    \nAssuming you can now build and run, our app is now empty of birthdays (see [Figure\
    \ 8-12](#Chapter08.html#fig_8_12)).\n\n![Image](images/9781430243748_Fig08-12.jpg)\n\
    \n**Figure 8-12.** Connected to the Core Data model, but without any birthdays"
  raw: '#### Connecting table views to result sets with NSFetchedResultsController


    In order to retrieve stored result sets of Core Data entities, Apple provides
    a handy fetching class named `NSFetchedResultsController`. Not only will a fetched
    results controller perform an initial ordered fetch of Core Data entities based
    on a query, it also provides delegate callback methods to alert its delegate of
    changes to the results set. Changes like newly added, modified or removed managed
    objects. It’s a very powerful class and we’ll be using it to keep track of the
    list of `BRDBirthday` entities in our Core Data store and display them in our
    Home view controller.


    Open the header file for `BRHomeViewController.h` and declare that our Home view
    controller implements the `NSFetchedResultsControllerDelegate` protocol:


    `@interface BRHomeViewController :`

    `BRCoreViewController<UITableViewDelegate,UITableViewDataSource,`

    **`NSFetchedResultsControllerDelegate`**`>`


    Open the `BRHomeViewController.m` source file, import our new `BRDBirthday.h`
    and `BRDModel.h` headers, and declare a new fetched results controller private
    property in the Home view controller:


    `#import "BRHomeViewController.h"`

    `#import "BRBirthdayDetailViewController.h"`

    `#import "BRBirthdayEditViewController.h"`

    **`#import "BRDBirthday.h"`**

    **`#import "BRDModel.h"`**


    `@interface BRHomeViewController()`

    **`@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;`**

    `@property (nonatomic,strong) NSMutableArray *birthdays;`


    `@end`


    We’ll lazy-load our fetched results controller; that is, we’ll only instantiate
    it at the first moment it’s required in code. To do this, we override the getter
    accessor method for `self.fetchedResultsController`. We check to see if the instance
    variable `_fetchedResultsController` has not yet been instantiated before we create
    the stored fetched results controller instance. Add the new accessor method for
    `fetchedResultsController` to `BRHomeViewController.m`:


    `#pragma mark Fetched Results Controller to keep track of the Core Data BRDBirthday
    managed objects`


    `- (NSFetchedResultsController *)fetchedResultsController {`

    `    if (_fetchedResultsController == nil) {`


    `        NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];`


    `        //access the single managed object context through model singleton`

    `        NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;`


    `        //fetch request requires an entity description - we''re only interested
    in BRDBirthday managed objects`

    `        NSEntityDescription *entity = [NSEntityDescription entityForName:@"BRDBirthday"
    inManagedObjectContext:context];`

    `        fetchRequest.entity = entity;`


    `        //we''ll order the BRDBirthday objects in name sort order for now`

    `        NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc]`

    `initWithKey:@"nextBirthday" ascending:YES];`

    `        NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,
    nil];`

    `        fetchRequest.sortDescriptors = sortDescriptors;`


    `        self.fetchedResultsController = [[NSFetchedResultsController alloc]`

    `initWithFetchRequest:fetchRequest managedObjectContext:context sectionNameKeyPath:nil`

    `cacheName:nil];`

    `        self.fetchedResultsController.delegate = self;`

    `        NSError *error = nil;`

    `        if (![self.fetchedResultsController performFetch:&error]) {`


    `            NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `            abort();`

    `        }`


    `    }`


    `        return _fetchedResultsController;`

    `}`


    A fetched results controller needs a fetch request: it needs to know the type
    of managed objects it should be fetching and the order of the results it should
    return. So we first create an `NSFetchRequest` instance and then pass it to our
    new `NSFetchedResultsController`. We set the entity of the fetch request to be
    our only entity, `BRDBirthday`, and we specify that the results should be returned
    in order of the `nextBirthday` string attribute of `BRDBirthday`.


    Finally, we invoke the results controller to run the fetch request via the `performFetch:`
    method to populate our fetched results controller with all the `BRDBirthday` managed
    objects in the store (none for now!).


    There’s a good reason that we set the Home view controller as a delegate of the
    fetched results controller: we want any changes to the results set as newly added
    or edited birthday managed objects to be caught by our retained fetched results
    controller. Apple’s developer documentation states: *A delegate must implement
    at least one of the change tracking delegate methods in order for change tracking
    to be enabled`.` Providing an empty implementation of* `controllerDidChangeContent:`
    *is sufficient.*^([1](#Chapter08.html#fn1))


    So, in order to ensure our fetched results controller is kept up-to-date, we’ll
    implement an empty `NSFetchedResultsControllerDelegate` protocol method into the
    `BRHomeViewController.m` class:


    `#pragma mark NSFetchedResultsControllerDelegate`


    `- (void)controllerDidChangeContent:(NSFetchedResultsController *)controller {`

    `    //The fetched results changed`

    `}`


    Locate the two `UITableViewDataSource` protocol methods for populating our table
    view (`tableView:cellForRowAtIndexPath:` and `tableView:numberOfRowsInSection:`)
    and replace them with the following:


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath`

    `*)indexPath`

    `{`

    `    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@"Cell"];`


    `    BRDBirthday *birthday = [self.fetchedResultsController objectAtIndexPath:indexPath];`


    `    cell.textLabel.text = birthday.name;`

    `    cell.detailTextLabel.text = birthday.birthdayTextToDisplay;`

    `    cell.imageView.image = [UIImage imageWithData:birthday.imageData];`

    `    return cell;`

    `}`


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `    id <NSFetchedResultsSectionInfo> sectionInfo = [[self.fetchedResultsController
    sections] objectAtIndex:section];`

    `    return [sectionInfo numberOfObjects];`

    `}`


    ____________________


    ¹ iOS Developer Library, “NSFetchedResultsController Class Reference,”

    [`http://developer.apple.com/library/ios/#DOCUMENTATION/CoreData/Reference/NSFetchedResultsController_Class/Reference/Reference.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/CoreData/Reference/NSFetchedResultsController_Class/Reference/Reference.html).


    We access entities in the results set of our fetched results controller via the
    `objectAtIndexPath:` method. Like tables, fetched results controllers can have
    multiple sections. In our case, there will be just one section containing all
    the `BRDBirthday` entities in our Core Data store.


    Your app will now be attempting to initialize the new empty Core Data model. With
    a bit of luck, you should now be able to build and run your app without error.
    However, if it compiles but crashes, then ensure that you replaced any reference
    to `CoreDataExample` to `BirthdayReminder` in the code copied from Apple’s example
    Master-Detail template project. Additionally, the new Core Data model may not
    have been copied into the target bundle; this can be easily resolved by trying
    one or both of the following:


    > *   Run a product clean with the ![Image](images/uarr.jpg)![Image](images/flower.jpg)K
    shortcut or Product ![Image](images/U001.jpg) Clean.

    > *   If that fails, then delete Birthday Reminder from the simulator or device,
    and build and run afresh.


    Assuming you can now build and run, our app is now empty of birthdays (see [Figure
    8-12](#Chapter08.html#fig_8_12)).


    ![Image](images/9781430243748_Fig08-12.jpg)


    **Figure 8-12.** Connected to the Core Data model, but without any birthdays'
  trans: "\n# 使用 `NSFetchedResultsController` 将表格视图与结果集关联\n\n为了检索 Core Data 实体的存储结果集，Apple\
    \ 提供了一个名为 `NSFetchedResultsController` 的便捷抓取类。获取的结果控制器不仅能根据查询对 Core Data 实体执行有初始顺序的抓取，还提供了委托回调方法，以提醒其委托结果集发生了变化。例如新增、修改或删除托管对象等变更。这是一个非常强大的类，我们将使用它来追踪\
    \ Core Data 存储中 `BRDBirthday` 实体列表，并在主页视图控制器中显示它们。\n\n打开 `BRHomeViewController.h`\
    \ 的头文件，声明我们的主页视图控制器实现了 `NSFetchedResultsControllerDelegate` 协议：\n\n`@interface\
    \ BRHomeViewController :`\n`BRCoreViewController<UITableViewDelegate,UITableViewDataSource,`\n\
    `NSFetchedResultsControllerDelegate>`\n\n打开 `BRHomeViewController.m` 源文件，导入新的\
    \ `BRDBirthday.h` 和 `BRDModel.h` 头文件，并在主页视图控制器中声明一个新的获取结果控制器私有属性：\n\n```\n#import\
    \ \"BRHomeViewController.h\"\n#import \"BRBirthdayDetailViewController.h\"\n#import\
    \ \"BRBirthdayEditViewController.h\"\n#import \"BRDBirthday.h\"\n#import \"BRDModel.h\"\
    \n\n@interface BRHomeViewController()\n@property (nonatomic, strong) NSFetchedResultsController\
    \ *fetchedResultsController;\n@property (nonatomic,strong) NSMutableArray *birthdays;\n\
    \n@end\n```\n\n我们将对获取结果控制器进行懒加载；也就是说，只有在代码中首次需要它时才会实例化。为此，我们重写了 `self.fetchedResultsController`\
    \ 的 getter 访问方法。在创建存储的获取结果控制器实例之前，我们会检查实例变量 `_fetchedResultsController` 是否尚未实例化。在\
    \ `BRHomeViewController.m` 中添加 `fetchedResultsController` 的新访问方法：\n\n```\n#pragma\
    \ mark 用于追踪 Core Data 中 BRDBirthday 托管对象的获取结果控制器\n\n- (NSFetchedResultsController\
    \ *)fetchedResultsController {\n    if (_fetchedResultsController == nil) {\n\n\
    \        NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n\n   \
    \     // 通过模型单例访问唯一的托管对象上下文\n        NSManagedObjectContext *context = [BRDModel\
    \ sharedInstance].managedObjectContext;\n\n        // 获取请求需要实体描述——我们只对 BRDBirthday\
    \ 托管对象感兴趣\n        NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    BRDBirthday\" inManagedObjectContext:context];\n        fetchRequest.entity =\
    \ entity;\n\n        // 目前我们将按名称排序顺序排列 BRDBirthday 对象\n        NSSortDescriptor\
    \ *sortDescriptor = [[NSSortDescriptor alloc]\ninitWithKey:@\"nextBirthday\" ascending:YES];\n\
    \        NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n        fetchRequest.sortDescriptors = sortDescriptors;\n\n        self.fetchedResultsController\
    \ = [[NSFetchedResultsController alloc]\ninitWithFetchRequest:fetchRequest managedObjectContext:context\
    \ sectionNameKeyPath:nil\ncacheName:nil];\n        self.fetchedResultsController.delegate\
    \ = self;\n        NSError *error = nil;\n        if (![self.fetchedResultsController\
    \ performFetch:&error]) {\n\n            NSLog(@\"未解决的错误 %@, %@\", error, [error\
    \ userInfo]);\n            abort();\n        }\n\n    }\n\n        return _fetchedResultsController;\n\
    }\n```\n\n获取结果控制器需要一个获取请求：它需要知道应获取的托管对象类型以及应返回结果的顺序。因此，我们首先创建一个 `NSFetchRequest`\
    \ 实例，然后将其传递给新的 `NSFetchedResultsController`。我们将获取请求的实体设置为唯一的实体 `BRDBirthday`，并指定结果应按\
    \ `BRDBirthday` 的 `nextBirthday` 字符串属性顺序返回。\n\n最后，我们调用结果控制器通过 `performFetch:`\
    \ 方法执行获取请求，从而用存储中所有的 `BRDBirthday` 托管对象填充获取结果控制器（目前还没有！）。\n\n将主页视图控制器设置为获取结果控制器的委托有一个很好的理由：我们希望通过保留的获取结果控制器捕获结果集发生的任何变更，例如新增或编辑的生日托管对象。Apple\
    \ 的开发者文档指出：*委托必须至少实现一个变更跟踪委托方法，才能启用变更跟踪。* 提供 `controllerDidChangeContent:` 的空实现就足够了。^(1)\n\
    \n因此，为了确保获取结果控制器保持最新，我们将在 `BRHomeViewController.m` 类中实现一个空的 `NSFetchedResultsControllerDelegate`\
    \ 协议方法：\n\n```\n#pragma mark NSFetchedResultsControllerDelegate\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
    \ *)controller {\n    // 获取的结果已更改\n}\n```\n\n找到用于填充表格视图的两个 `UITableViewDataSource`\
    \ 协议方法（`tableView:cellForRowAtIndexPath:` 和 `tableView:numberOfRowsInSection:`），并将其替换为以下内容：\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\n\
    *)indexPath\n{\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n\n    BRDBirthday *birthday = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
    \n    cell.textLabel.text = birthday.name;\n    cell.detailTextLabel.text = birthday.birthdayTextToDisplay;\n\
    \    cell.imageView.image = [UIImage imageWithData:birthday.imageData];\n    return\
    \ cell;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    id <NSFetchedResultsSectionInfo> sectionInfo = [[self.fetchedResultsController\
    \ sections] objectAtIndex:section];\n    return [sectionInfo numberOfObjects];\n\
    }\n```\n\n____________________\n\n¹ iOS 开发者库，“NSFetchedResultsController 类参考”，\n\
    [`http://developer.apple.com/library/ios/#DOCUMENTATION/CoreData/Reference/NSFetchedResultsController_Class/Reference/Reference.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/CoreData/Reference/NSFetchedResultsController_Class/Reference/Reference.html)。\n\
    \n我们通过 `objectAtIndexPath:` 方法访问获取结果控制器结果集中的实体。与表格类似，获取结果控制器可以有多个分区。在我们的案例中，只有一个分区包含\
    \ Core Data 存储中的所有 `BRDBirthday` 实体。\n\n你的应用现在将尝试初始化新的空 Core Data 模型。如果运气好的话，你现在应该能够构建并运行应用而不会出错。但是，如果编译成功但崩溃，请确保你将从\
    \ Apple 示例 Master-Detail 模板项目复制的代码中所有 `CoreDataExample` 引用都替换为 `BirthdayReminder`。此外，新的\
    \ Core Data 模型可能未被复制到目标包中；这可以通过尝试以下一种或两种方法轻松解决：\n\n> * 使用快捷键 ![Image](img/uarr.jpg)![Image](img/flower.jpg)K\
    \ 或菜单 Product ![Image](img/U001.jpg) Clean 执行产品清理。\n> * 如果清理失败，则从模拟器或设备中删除 Birthday\
    \ Reminder，然后重新构建并运行。\n\n假设你现在可以构建并运行，那么我们的应用目前没有生日数据（参见图 8-12）。\n\n![Image](img/9781430243748_Fig08-12.jpg)\n\
    \n**图 8-12.** 已连接到 Core Data 模型，但没有任何生日数据\n"
- fmt: "### Populating the Core Data store\n\nBefore we start creating new `BRDBirthday`\
    \ instances from our Core Data model, we’ll add a new `saveChanges` method to\
    \ `BRDModel`. It’s a public instance method, so add the declaration to `BRDModel.h`:\n\
    \n`- (void)saveChanges;`\n\nAnd then the implementation into `BRDModel.m` source\
    \ file:\n\n```\n- (void)saveChanges\n{\n    NSError *error = nil;\n    if ([self.managedObjectContext\
    \ hasChanges]) {\n        if (![self.managedObjectContext save:&error]) {//save\
    \ failed\n            NSLog(@\"Save failed: %@\",[error localizedDescription]);\n\
    \        }\n        else {\n            NSLog(@\"Save succeeded\");\n        }\n\
    \    }\n}\n```\n\nLet’s populate our database and birthdays table view in the\
    \ Home view controller by importing the celebrity birthdays into our Core Data\
    \ model. Delete and replace your current version of `initWithCoder:` in `BRHomeViewController.m`\
    \ with the following:\n\n```\n- (id) initWithCoder:(NSCoder *)aDecoder\n{\n  \
    \  self = [super initWithCoder:aDecoder];\n\n    if (self) {\n        NSString*\
    \ plistPath = [[NSBundle mainBundle] pathForResource:@\"birthdays\" ofType:@\"\
    plist\"];\n        NSArray *nonMutableBirthdays = [NSArray arrayWithContentsOfFile:plistPath];\n\
    \n        BRDBirthday *birthday;\n        NSDictionary *dictionary;\n        NSString\
    \ *name;\n        NSString *pic;\n        NSString *pathForPic;\n        NSData\
    \ *imageData;\n        NSDate *birthdate;\n        NSCalendar *calendar = [NSCalendar\
    \ currentCalendar];\n\n        NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
    \n        for (int i=0;i<[nonMutableBirthdays count];i++) {\n            dictionary\
    \ = nonMutableBirthdays[i];\n\n            birthday = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    BRDBirthday\"\ninManagedObjectContext:context];\n\n            name = dictionary[@\"\
    name\"];\n            pic = dictionary[@\"pic\"];\n            birthdate = dictionary[@\"\
    birthdate\"];\n            pathForPic = [[NSBundle mainBundle] pathForResource:pic\
    \ ofType:nil];\n            imageData = [NSData dataWithContentsOfFile:pathForPic];\n\
    \            birthday.name = name;\n            birthday.imageData = imageData;\n\
    \            NSDateComponents *components = [calendar\ncomponents:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
    \ fromDate:birthdate];\n            //New literals syntax, same as\n         \
    \   //birthday.birthDay = [NSNumber numberWithInt:components.day];\n         \
    \   birthday.birthDay = @(components.day);\n            birthday.birthMonth =\
    \ @(components.month);\n            birthday.birthYear = @(components.year);\n\
    \            [birthday updateNextBirthdayAndAge];\n        }\n        [[BRDModel\
    \ sharedInstance] saveChanges];\n    }\n\n    return self;\n}\n```\n\nFor now,\
    \ we’re just creating new Core Data `BRDBirthday` entities and setting the attributes\
    \ `name`, `imageData`, `birthDay`, `birthMonth`, and `birthYear` for each of the\
    \ celebrity birthdays. We also invoke our extended `updateNextBirthdayAndAge`\
    \ method for each newly created birthday managed object, which will populate the\
    \ `nextBirthday` and `nextBirthdayAge` attributes. Once we’ve looped through the\
    \ `plist` of birthday dictionaries and inserted a new birthday entity for each,\
    \ we call our new `saveChanges` method on the model.\n\nNow build and run. You\
    \ should see the celebrities. Build and run a couple more times. Are you noticing\
    \ anything odd, like what’s shown in [Figure 8-13](#Chapter08.html#fig_8_13)?\n\
    \n![Image](images/9781430243748_Fig08-13.jpg)\n\n**Figure 8-13.** Too many Biebers?\n\
    \nEvery time we rebuild and run the app, we create and save a batch of new `BRDBirthday`\
    \ managed objects in the Home view controller’s `initWithCoder:` initializer.\
    \ As long as we’ve saved once to Core Data on a previous app session, we’re also\
    \ able to pre-populate the fetched results controller’s results set even before\
    \ importing from the celebrity `plist` birthdays. So the data is indeed persisting\
    \ as expected. The problem is we just keep creating new duplicate birthday instances\
    \ and adding them to the data store each time we run our app. We need to add a\
    \ way to avoid importing duplicates.\n\n### Duplicate entities and synchronization\n\
    \nAn effective way to avoid adding duplicate birthday managed objects is by referencing\
    \ a unique identifier on the `BRDBirthday` instances to check whether we’ve already\
    \ created a matching birthday in our store. That’s the reason we created a `uid`\
    \ string attribute when we defined `BRDBirthday` entity in our Core Data model.\n\
    \nWe’ll use the celebrity names as the unique identifier (when we move on to importing\
    \ from Facebook or the Address Book, we’ll use unique profile identifiers). Before\
    \ creating new birthday managed objects, we’ll loop through the birthday dictionaries\
    \ from the `plist` and concatenate all the names into an array of unique ids.\
    \ We’ll then use the array of ids to create a Core Data fetch request that returns\
    \ any existing `BRDBirthday` entities with matching `uids`. We’ll create the fetch\
    \ request for existing birthdays within a new method of our `BRDModel` singleton\
    \ class, as this duplicate-checking functionality will also come in handy when\
    \ we start importing from other sources, like Facebook and the Address Book.\n\
    \nSwitch to `BRDModel`.\n\nAdd a new public method declaration to `BRDModel.h`:\n\
    \n`-(NSMutableDictionary *) getExistingBirthdaysWithUIDs:(NSArray *)uids;`\n\n\
    Switch to the `BRDModel.m` source file and import `BRDBirthday`:\n\n`#import \"\
    BRDBirthday.h\"`\n\nAnd then the implementation:\n\n```\n-(NSMutableDictionary\
    \ *) getExistingBirthdaysWithUIDs:(NSArray *)uids\n{\n    NSFetchRequest *fetchRequest\
    \ = [[NSFetchRequest alloc] init];\n\n    NSManagedObjectContext *context = self.managedObjectContext;\n\
    \n    //NSPredicates are used to filter results sets.\n    //This predicate specifies\
    \ that the uid attribute from any results must match one or more of the values\
    \ in the uids array\n    NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    uid IN %@\", uids];\n    fetchRequest.predicate = predicate;\n\n    NSEntityDescription\
    \ *entity = [NSEntityDescription entityForName:@\"BRDBirthday\"\ninManagedObjectContext:context];\n\
    \    fetchRequest.entity = entity;\n\n    NSSortDescriptor *sortDescriptor = [[NSSortDescriptor\
    \ alloc] initWithKey:@\"uid\"\nascending:YES];\n    NSArray *sortDescriptors =\
    \ [[NSArray alloc] initWithObjects:sortDescriptor, nil];\n    fetchRequest.sortDescriptors\
    \ = sortDescriptors;\n\n    NSFetchedResultsController *fetchedResultsController\
    \ = [[NSFetchedResultsController alloc]\ninitWithFetchRequest:fetchRequest managedObjectContext:context\
    \ sectionNameKeyPath:nil\ncacheName:nil];\n\n    NSError *error = nil;\n    if\
    \ (![fetchedResultsController performFetch:&error]) {\n\n        NSLog(@\"Unresolved\
    \ error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\n    NSArray\
    \ *fetchedObjects = fetchedResultsController.fetchedObjects;\n\n    NSInteger\
    \ resultCount = [fetchedObjects count];\n\n        if (resultCount == 0) return\
    \ [NSMutableDictionary dictionary];//nothing in the Core\nData store\n\n    BRDBirthday\
    \ *birthday;\n\n        NSMutableDictionary *tmpDict = [NSMutableDictionary dictionary];\n\
    \n    int i;\n\n    for (i = 0; i < resultCount; i++) {\n        birthday =  fetchedObjects[i];\n\
    \        tmpDict[birthday.uid] = birthday;\n    }\n\n    return tmpDict;\n}\n\
    ```\n\nWe’re creating another fetched results controller, but only in the temporary\
    \ scope of our new `getExistingBirthdaysWithUIDs:` method. Once the results have\
    \ been retrieved from the managed object context, they are packaged into a dictionary\
    \ using the `uid` attribute as the keys and the `BRDBirthday` managed objects\
    \ as the values.\n\nNotice that we now create an `NSPredicate` instance so that\
    \ the fetched request is restricted only to `BRDBirthday` entities that match\
    \ the predicate query:\n\n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    uid IN %@\", uids];\nfetchRequest.predicate = predicate;\n```"
