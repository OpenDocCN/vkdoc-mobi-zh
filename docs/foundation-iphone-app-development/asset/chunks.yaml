- fmt: "# Initializing our Core Data Model\n\nWhen we looked at Apple’s example Core\
    \ Data code, we found all of the initialization code in the application delegate\
    \ class. However, it’s common practice to create a singleton model class and initialize\
    \ the Core Data model once in the singleton instance. That way any class in our\
    \ project can access the managed object context directly though the model singleton.\n\
    \nLet’s begin by creating a singleton model class. Create a new subclass of `NSObject`\
    \ in the `data` group and name the class `BRDModel`. To set up our singleton class,\
    \ we’ll provide access to our model only via a class method called `sharedInstance`.\
    \ The `BRDModel` `sharedInstance` method will create the single instance of `BRDModel`\
    \ or simply return it if it already exists. First, define the class method in\
    \ `BRDModel.h`:\n\n```\n#import <Foundation/Foundation.h>\n@interface BRDModel\
    \ : NSObject\n\n+ (BRDModel*)sharedInstance;\n\n@end\n```\n\nNow switch to the\
    \ implementation of the new class method in `BRDModel.m`:\n\n```\n#import \"BRDModel.h\"\
    \n\n@implementation BRDModel\n\nstatic BRDModel *_sharedInstance = nil;\n+ (BRDModel*)sharedInstance\n\
    {\n    if( !_sharedInstance ) {\n               _sharedInstance = [[BRDModel alloc]\
    \ init];\n}\n       return _sharedInstance;\n}\n\n@end\n```\n\nThe `sharedInstance`\
    \ method initializes an instance of its own class. This is a fairly common technique\
    \ for implementing singletons in Objective-C. Whenever we wish to access the model\
    \ in our application, we’ll just reference `[BRDModel sharedInstance]`. Next,\
    \ let’s grab the Core Data initialization code from Apple’s own Master-Detail\
    \ app we created earlier in the chapter. Locate the `AppDelegate.h` header file\
    \ and copy the declarations of the persistent store coordinator, the managed object\
    \ model, and the managed object context and paste them straight into the `BRDModel.h`\
    \ header as highlighted in the following:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface BRDModel : NSObject\n\n+ (BRDModel*)sharedInstance;\n\n@property\
    \ (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
    @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    \n@end\n```\n\nSwitch to the `BRDModel.m` source file and synthesize the three\
    \ new Core Data properties, just like in the `AppDelegate.m` source file:\n\n\
    ```\n@implementation BRDModel\n\n@synthesize managedObjectContext = _managedObjectContext;\n\
    @synthesize managedObjectModel = _managedObjectModel;\n@synthesize persistentStoreCoordinator\
    \ = _persistentStoreCoordinator;\n```\n\n*Note: We manually add synthesize code\
    \ on this occasion to ensure that each property points to an underbar instance\
    \ variable. Xcode’s compiler doesn’t automatically do this with `readonly` properties.*\n\
    \nThen copy over the implementations of the three Core Data accessor methods and\
    \ the `applicationDocumentsDirectory` helper private method from Apple’s own code\
    \ in `AppDelegate.m` from the Master-Detail project. Remove the comments if you\
    \ like, but more importantly replace the two string occurrences of `CoreDataExample`\
    \ with the name of our *Birthday Reminder* Core Data model, `BirthdayReminder`,\
    \ as highlighted in the following code:\n\n```\n- (NSManagedObjectContext *)managedObjectContext\n\
    {\n    if (_managedObjectContext != nil) {\n        return _managedObjectContext;\n\
    \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \    if (coordinator != nil) {\n        _managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n        [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \    }\n    return _managedObjectContext;\n}\n\n// Returns the managed object\
    \ model for the application.\n// If the model doesn't already exist, it is created\
    \ from the application's model.\n- (NSManagedObjectModel *)managedObjectModel\n\
    {\n    if (_managedObjectModel != nil) {\n        return _managedObjectModel;\n\
    \    }\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"BirthdayReminder\"\
    \n    withExtension:@\"momd\"];\n    _managedObjectModel = [[NSManagedObjectModel\
    \ alloc] initWithContentsOfURL:modelURL];\n    return _managedObjectModel;\n}\n\
    \n// Returns the persistent store coordinator for the application.\n// If the\
    \ coordinator doesn't already exist, it is created and the application's store\
    \ added\nto it.\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n    if (_persistentStoreCoordinator != nil) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory]\nURLByAppendingPathComponent:@\"\
    BirthdayReminder.sqlite\"];\n\n    NSError *error = nil;\n    _persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc]\ninitWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
    \n    return _persistentStoreCoordinator;\n}\n\n#pragma mark - Application's Documents\
    \ directory\n\n// Returns the URL to the application's Documents directory.\n\
    - (NSURL *)applicationDocumentsDirectory\n{\n    return [[[NSFileManager defaultManager]\
    \ URLsForDirectory:NSDocumentDirectory\ninDomains:NSUserDomainMask] lastObject];\n\
    }\n```\n\nNow would be a good time to check that your app still compiles OK, although\
    \ you won’t see any changes yet because we’re still in the preparation stage of\
    \ the Core Data implementation."
  raw: '#### Initializing our Core Data model


    When we looked at Apple’s example Core Data code, we found all of the initialization
