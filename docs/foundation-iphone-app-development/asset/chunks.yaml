- fmt: "### Creating image thumbnails\n\nOur birthday edit view controller still has\
    \ one last compiler error in our implementation of `imagePickerController:didFinishPickingMediaWithInfo`.\
    \ Let’s fix that with the following change:\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary *)info {\n    [picker\
    \ dismissModalViewControllerAnimated:YES];\n    UIImage *image = info[UIImagePickerControllerOriginalImage];\n\
    \    self.photoView.image = image;\n    // [self.birthday setObject:image forKey:@\"\
    image\"];\n    self.birthday.imageData = UIImageJPEGRepresentation (image,1.f);\n\
    }\n```\n\nCore Data allows us to store binary data attributes for entities. This\
    \ doesn’t mean we can pass an instance of `UIImage` to the `BRDBirthday.imageData`\
    \ attribute. Instead, we pass an instance of `NSData`. `UIKit` includes a utility\
    \ method to convert a `UIImage` instance into a JPG `NSData` representation—`UIImageJPGRepresentation`\
    \ and set a JPG compression quality from 0 to 1 (1 meaning one hundred percent\
    \ quality).\n\nWe have a bit of a problem here. We’re currently saving potentially\
    \ very large images taken by the iPhone camera into our Core Data model. These\
    \ images will only ever be displayed in our app in small thumbnail image views.\
    \ It’s bad practice to display a very large image in a small image view. iOS will\
    \ still need to iterate over every pixel in our very large image before it can\
    \ draw the small thumbnail. Our app will suffer a significant performance hit\
    \ if our users start adding and editing birthdays, picking large photo files.\
    \ We need to generate optimized smaller versions of any photo added to a birthday.\
    \ We’ll achieve this by creating a new Objective-C category file and adding our\
    \ own custom `createThumbnailToFillSize:` method on `UIImage`.\n\nAdd a `categories`\
    \ folder to your `user-interface` folder and then add the `categories` folder\
    \ as a new group in your Xcode project. In the Project Navigator, select the newly\
    \ added `categories` group; and with the ![Image](images/flower.jpg) N keyboard\
    \ shortcut or File ![Image](images/U001.jpg) New ![Image](images/U001.jpg) File,\
    \ choose the Objective-C category option from the Cocoa Touch file templates.\
    \ Input `Thumbnail` into the Category text field and `UIImage` into the Category\
    \ on text field (see [Figure 8-14](#Chapter08.html#fig_8_14)).\n\n![Image](images/9781430243748_Fig08-14.jpg)\n\
    \n**Figure 8-14.** Creating an Objective-C category on UIImage\n\nNow for the\
    \ code. In `UIImage+Thumbnail.h`, we add our declaration of the new custom `createThumbnailToFillSize:`\
    \ method:\n\n```\n@interface UIImage (Thumbnail)\n-(UIImage *) createThumbnailToFillSize:(CGSize)size;\n\
    @end\n```\n\nSwitching to `UIImage+Thumbnail.m`, add the implementation:\n\n```\n\
    #import \"UIImage+Thumbnail.h\"\n@implementation UIImage (Thumbnail)\n-(UIImage\
    \ *) createThumbnailToFillSize:(CGSize)size\n{\n    CGSize mainImageSize = self.size;\n\
    \    UIImage *thumb;\n    CGFloat widthScaler = size.width / mainImageSize.width;\n\
    \    CGFloat heightScaler = size.height / mainImageSize.height;\n    CGSize repositionedMainImageSize\
    \ = mainImageSize;\n    CGFloat scaleFactor;\n    // Determine if we should shrink\
    \ based on width or hight\n    if(widthScaler > heightScaler)\n    {\n       \
    \ // calculate based on width scaler\n        scaleFactor = widthScaler;\n   \
    \     repositionedMainImageSize.height = ceil(size.height / scaleFactor);\n  \
    \  }\n    else {\n        // calculate based on height scaler\n        scaleFactor\
    \ = heightScaler;\n        repositionedMainImageSize.width = ceil(size.width /\
    \ heightScaler);\n    }\n    UIGraphicsBeginImageContext(size);\n    CGFloat xInc\
    \ = ((repositionedMainImageSize.width-mainImageSize.width) / 2.f) *scaleFactor;\n\
    \    CGFloat yInc = ((repositionedMainImageSize.height-mainImageSize.height) /\
    \ 2.f) *scaleFactor;\n    [self drawInRect:CGRectMake(xInc, yInc, mainImageSize.width\
    \ * scaleFactor,\nmainImageSize.height * scaleFactor)];\n    thumb = UIGraphicsGetImageFromCurrentImageContext();\n\
    \    UIGraphicsEndImageContext();\n    return thumb;\n}\n@end\n```\n\nOur new\
    \ `UIImage` category will create a cropped and resized image that fills the size\
    \ passed into the `createThumbnailToFillSize:` method. By implementing this functionality\
    \ into a category, we simply need to import our category file into any file that\
    \ needs to create optimized images. Then we’ll be able to call `createThumbnailToFillSize:`\
    \ on any instance of `UIImage` to create thumbnails to fit the dimensions that\
    \ we specify. How cool is that?!\n\nLet’s try it now. First, import the new category\
    \ into `BRBirthdayEditViewController.m`:\n\n```\n#import \"UIImage+Thumbnail.h\"\
    \n```\n\nNow modify the `imagePickerController:didFinishPickingMediaWithInfo:`\
    \ implementation to the following:\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary *)info {\n    [picker\
    \ dismissViewControllerAnimated:YES completion:nil];\n    UIImage *image = info[UIImagePickerControllerOriginalImage];\n\
    \    CGFloat side = 71.f;\n    side *= [[UIScreen mainScreen] scale];\n    UIImage\
    \ *thumbnail = [image createThumbnailToFillSize:CGSizeMake(side, side)];\n   \
    \ self.photoView.image = thumbnail;\n    self.birthday.imageData = UIImageJPEGRepresentation\
    \ (thumbnail,1.f);\n    // self.photoView.image = image;\n    // self.birthday.imageData\
    \ = UIImageJPEGRepresentation (image,1.f);\n}\n```\n\nSeventy-one points is the\
    \ maximum length side of the square thumbnail images in our app. However, we also\
    \ want to cater for retina displays. To do this we multiply the 71 points by the\
    \ screen scale value; the screen scale is 2 on retina displays; the screen scale\
    \ is 1 on non-retina displays.\n\n### Cancelling Core Data changes\n\nIn the last\
    \ chapter, we implemented `cancelAndDismiss:` and `saveAndDismiss:` methods into\
    \ our core view controller, enabling any subclassed view controller to easily\
    \ dismiss itself when presented modally. In the case of our birthday edit view\
    \ controller, we need to add further functionality when the Save and Cancel buttons\
    \ are tapped. We need to cancel or save the changes to our Core Data store. We’ve\
    \ already added a `saveChanges` public method to our model that will do just that,\
    \ so first let’s invoke `saveChanges` from `BRBirthdayEditViewController.m`:\n\
    \n```\n- (IBAction)saveAndDismiss:(id)sender\n{\n    [[BRDModel sharedInstance]\
    \ saveChanges];\n    [super saveAndDismiss:sender];\n}\n```\n\nYou’ll be pleased\
    \ to discover that cancelling changes to `CoreData` is even simpler than saving\
    \ changes. Here’s the new public method to add to `BRDModel`:\n\n`BRDModel.h`:\n\
    \n```\n- (void)cancelChanges;\n```\n\n`BRDModel.m`:\n\n```\n- (void)cancelChanges\n\
    {\n    [self.managedObjectContext rollback];\n}\n```\n\nCalling the managed object\
    \ context’s rollback method will remove any changes from the Core Data model since\
    \ the last save. That includes newly inserted `BRDBirthday` entities that have\
    \ never been saved/written to the persistent store. This is incredibly handy because\
    \ it means we can create a new `BRDBirthday` entity in our Home view controller\
    \ when the user taps the Add Birthday button; and by the miracle of Core Data,\
    \ this temporary entity is thrown away simply by rolling back the managed object\
    \ context when the Cancel button is tapped via the birthday edit view controller.\n\
    \nBack in `BRBirthdayEditViewController.m`, let’s override the `cancelAndDismiss:`\
    \ implementation:\n\n```\n- (IBAction)cancelAndDismiss:(id)sender {\n    [[BRDModel\
    \ sharedInstance] cancelChanges];\n    [super cancelAndDismiss:sender];\n}\n```"
  raw: '##### Creating image thumbnails


    Our birthday edit view controller still has one last compiler error in our implementation
    of `imagePickerController: didFinishPickingMediaWithInfo`. Let’s fix that with
    the following change:


    `- (void)imagePickerController:(UIImagePickerController *)picker`

    `didFinishPickingMediaWithInfo:(NSDictionary *)info {`


    `    [picker dismissModalViewControllerAnimated:YES];`


    `    UIImage *image = info[UIImagePickerControllerOriginalImage];`


    `    self.photoView.image = image;`


    ~~`[self.birthday setObject:image forKey:@"image"];`~~

    **`self.birthday.imageData = UIImageJPEGRepresentation (image,1.f);`**


    `}`


    Core Data allows us to store binary data attributes for entities. This doesn’t
    mean we can pass an instance of `UIImage` to the `BRDBirthday.imageData` attribute.
    Instead, we pass an instance of `NSData`. `UIKit` includes a utility method to
    convert a `UIImage` instance into a JPG `NSData` representation—`UIImageJPGRepresentation`
    and set a JPG compression quality from 0 to 1 (1 meaning one hundred percent quality).


    We have a bit of a problem here. We’re currently saving potentially very large
    images taken by the iPhone camera into our Core Data model. These images will
    only ever be displayed in our app in small thumbnail image views. It’s bad practice
    to display a very large image in a small image view. iOS will still need to iterate
    over every pixel in our very large image before it can draw the small thumbnail.
    Our app will suffer a significant performance hit if our users start adding and
    editing birthdays, picking large photo files. We need to generate optimized smaller
    versions of any photo added to a birthday. We’ll achieve this by creating a new
    Objective-C category file and adding our own custom `createThumbnailToFillSize:`
    method on `UIImage`.


    Add a `categories` folder to your `user-interface` folder and then add the `categories`
    folder as a new group in your Xcode project. In the Project Navigator, select
    the newly added `categories` group; and with the ![Image](images/flower.jpg)N
    keyboard shortcut or File ![Image](images/U001.jpg) New ![Image](images/U001.jpg)
    File, choose the Objective-C category option from the Cocoa Touch file templates.
    Input `Thumbnail` into the Category text field and `UIImage` into the Category
    on text field (see [Figure 8-14](#Chapter08.html#fig_8_14)).


    ![Image](images/9781430243748_Fig08-14.jpg)


    **Figure 8-14.** Creating an Objective-C category on UIImage


    Now for the code. In `UIImage+Thumbnail.h`, we add our declaration of the new
    custom `createThumbnailToFillSize:` method:


    `@interface UIImage (Thumbnail)`


    `-(UIImage *) createThumbnailToFillSize:(CGSize)size;`


    `@end`


    Switching to `UIImage+Thumbnail.m`, add the implementation:


    `#import "UIImage+Thumbnail.h"`


    `@implementation UIImage (Thumbnail)`


    `-(UIImage *) createThumbnailToFillSize:(CGSize)size`

    `{`

    `    CGSize mainImageSize = self.size;`


    `    UIImage *thumb;`


    `    CGFloat widthScaler = size.width / mainImageSize.width;`

    `    CGFloat heightScaler = size.height / mainImageSize.height;`


    `    CGSize repositionedMainImageSize = mainImageSize;`


    `    CGFloat scaleFactor;`

    `    // Determine if we should shrink based on width or hight`

    `    if(widthScaler > heightScaler)`

    `    {`

    `        // calculate based on width scaler`

    `        scaleFactor = widthScaler;`

    `        repositionedMainImageSize.height = ceil(size.height / scaleFactor);`

    `    }`

    `    else {`

    `        // calculate based on height scaler`

    `        scaleFactor = heightScaler;`

    `        repositionedMainImageSize.width = ceil(size.width / heightScaler);`

    `    }`


    `    UIGraphicsBeginImageContext(size);`


    `    CGFloat xInc = ((repositionedMainImageSize.width-mainImageSize.width) / 2.f)
    *scaleFactor;`

    `    CGFloat yInc = ((repositionedMainImageSize.height-mainImageSize.height) /
    2.f) *scaleFactor;`


    `    [self drawInRect:CGRectMake(xInc, yInc, mainImageSize.width * scaleFactor,`

    `mainImageSize.height * scaleFactor)];`

    `    thumb = UIGraphicsGetImageFromCurrentImageContext();`

    `    UIGraphicsEndImageContext();`


    `    return thumb;`

    `}`


    `@end`


    Our new `UIImage` category will create a cropped and resized image that fills
    the size passed into the `createThumbnailToFillSize:` method. By implementing
    this functionality into a category, we simply need to import our category file
    into any file that needs to create optimized images. Then we’ll be able to call
    `createThumbnailToFillSize:` on any  instance of `UIImage` to create thumbnails
    to fit the dimensions that we specify. How cool is that?!


    Let’s try it now. First, import the new category into `BRBirthdayEditViewController.m`:


    `#import "UIImage+Thumbnail.h"`


    Now modify the `imagePickerController:didFinishPickingMediaWithInfo:` implementation
    to the following:


    `- (void)imagePickerController:(UIImagePickerController *)picker`

    `didFinishPickingMediaWithInfo:(NSDictionary *)info {`


    `    [picker dismissViewControllerAnimated:YES completion:nil];`


    `    UIImage *image = info[UIImagePickerControllerOriginalImage];`


    **`CGFloat side = 71.f;`**

    **`    side *= [[UIScreen mainScreen] scale];`**


    **`    UIImage *thumbnail = [image createThumbnailToFillSize:CGSizeMake(side,
    side)];`**

    **`    self.photoView.image = thumbnail;`**

    **`    self.birthday.imageData = UIImageJPEGRepresentation (thumbnail,1.f);`**


    ~~`    self.photoView.image = image;`~~

    ~~`    self.birthday.imageData = UIImageJPEGRepresentation (image,1.f);`~~

    `}`


    Seventy-one points is the maximum length side of the square thumbnail images in
    our app. However, we also want to cater for retina displays. To do this we multiply
    the 71 points by the screen scale value; the screen scale is 2 on retina displays;
    the screen scale is 1 on non-retina displays.


    ##### Cancelling Core Data changes


    In the last chapter, we implemented `cancelAndDismiss:` and `saveAndDismiss:`
    methods into our core view controller, enabling any subclassed view controller
    to easily dismiss itself when presented modally. In the case of our birthday edit
    view controller, we need to add further functionality when the Save and Cancel
    buttons are tapped. We need to cancel or save the changes to our Core Data store.
    We’ve already added a `saveChanges` public method to our model that will do just
    that, so first let’s invoke `saveChanges` from `BRBirthdayEditViewController.m`:


    `- (IBAction)saveAndDismiss:(id)sender`

    `{`

    `    [[BRDModel sharedInstance] saveChanges];`

    `    [super saveAndDismiss:sender];`

    `}`


    You’ll be pleased to discover that cancelling changes to `CoreData` is even simpler
    than saving changes. Here’s the new public method to add to `BRDModel`:


    `BRDModel.h`:


    `- (void)cancelChanges;`


    `BRDModel.m`:


    `- (void)cancelChanges`

    `{`

    `    [self.managedObjectContext rollback];`

    `}`


    Calling the managed object context’s rollback method will remove any changes from
    the Core Data model since the last save. That includes newly inserted `BRDBirthday`
    entities that have never been saved/written to the persistent store. This is incredibly
    handy because it means we can create a new `BRDBirthday` entity in our Home view
    controller when the user taps the Add Birthday button; and by the miracle of Core
    Data, this temporary entity is thrown away simply by rolling back the managed
    object context when the Cancel button is tapped via the birthday edit view controller.


    Back in `BRBirthdayEditViewController.m`, let’s override the `cancelAndDismiss:`
    implementation:


    `- (IBAction)cancelAndDismiss:(id)sender {`

    `    [[BRDModel sharedInstance] cancelChanges];`

    `    [super cancelAndDismiss:sender];`

    `}`'
  trans: "\n### 创建图片缩略图\n\n我们的生日编辑视图控制器中，在 `imagePickerController:didFinishPickingMediaWithInfo`\
    \ 的实现里仍然存在一个编译错误。接下来我们通过如下修改来修复它：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary *)info {\n    [picker\
    \ dismissModalViewControllerAnimated:YES];\n    UIImage *image = info[UIImagePickerControllerOriginalImage];\n\
    \    self.photoView.image = image;\n    // [self.birthday setObject:image forKey:@\"\
    image\"];\n    self.birthday.imageData = UIImageJPEGRepresentation (image,1.f);\n\
    }\n```\n\nCore Data 允许我们为实体存储二进制数据属性。但这并不意味着我们可以直接将 `UIImage` 的实例传递给 `BRDBirthday.imageData`\
    \ 属性。相反，我们需要传递一个 `NSData` 的实例。`UIKit` 包含一个实用方法，可以将 `UIImage` 实例转换为 JPG 格式的 `NSData`\
    \ 表示——`UIImageJPGRepresentation`，并可设置 0 到 1 之间的 JPG 压缩质量（1 表示百分之百质量）。\n\n这里我们存在一个小问题。目前我们正在将\
    \ iPhone 相机拍摄的、可能非常大的图片保存到 Core Data 模型中。而这些图片在应用中仅会显示在小型缩略图图像视图中。在小型图像视图中显示非常大的图片是一种不良实践。iOS\
    \ 在绘制小缩略图之前，仍然需要遍历大图片中的每一个像素。如果用户开始添加和编辑生日并选择大尺寸照片文件，我们的应用将遭受显著的性能损失。我们需要为添加到生日的任何照片生成优化后的较小版本。我们将通过创建一个新的\
    \ Objective-C 类别文件，并在 `UIImage` 上添加自定义的 `createThumbnailToFillSize:` 方法来实现这一点。\n\
    \n在你的 `user-interface` 文件夹中添加一个 `categories` 文件夹，然后将该 `categories` 文件夹作为新组添加到你的\
    \ Xcode 项目中。在项目导航器中，选择新添加的 `categories` 组；然后使用 ![Image](img/flower.jpg) N 键盘快捷键或\
    \ 文件 ![Image](img/U001.jpg) 新建 ![Image](img/U001.jpg) 文件，从 Cocoa Touch 文件模板中选择\
    \ Objective-C 类别选项。在“类别”文本框中输入 `Thumbnail`，在“类别于”文本框中输入 `UIImage`（参见图 8-14）。\n\
    \n![Image](img/9781430243748_Fig08-14.jpg)\n\n**图 8-14.** 在 UIImage 上创建 Objective-C\
    \ 类别\n\n接下来是代码。在 `UIImage+Thumbnail.h` 中，我们添加新的自定义方法 `createThumbnailToFillSize:`\
    \ 的声明：\n\n```\n@interface UIImage (Thumbnail)\n-(UIImage *) createThumbnailToFillSize:(CGSize)size;\n\
    @end\n```\n\n切换到 `UIImage+Thumbnail.m`，添加实现代码：\n\n```\n#import \"UIImage+Thumbnail.h\"\
    \n@implementation UIImage (Thumbnail)\n-(UIImage *) createThumbnailToFillSize:(CGSize)size\n\
    {\n    CGSize mainImageSize = self.size;\n    UIImage *thumb;\n    CGFloat widthScaler\
    \ = size.width / mainImageSize.width;\n    CGFloat heightScaler = size.height\
    \ / mainImageSize.height;\n    CGSize repositionedMainImageSize = mainImageSize;\n\
    \    CGFloat scaleFactor;\n    // 判断是否应基于宽度或高度进行缩小\n    if(widthScaler > heightScaler)\n\
    \    {\n        // 基于宽度缩放因子进行计算\n        scaleFactor = widthScaler;\n        repositionedMainImageSize.height\
    \ = ceil(size.height / scaleFactor);\n    }\n    else {\n        // 基于高度缩放因子进行计算\n\
    \        scaleFactor = heightScaler;\n        repositionedMainImageSize.width\
    \ = ceil(size.width / heightScaler);\n    }\n    UIGraphicsBeginImageContext(size);\n\
    \    CGFloat xInc = ((repositionedMainImageSize.width-mainImageSize.width) / 2.f)\
    \ *scaleFactor;\n    CGFloat yInc = ((repositionedMainImageSize.height-mainImageSize.height)\
    \ / 2.f) *scaleFactor;\n    [self drawInRect:CGRectMake(xInc, yInc, mainImageSize.width\
    \ * scaleFactor,\nmainImageSize.height * scaleFactor)];\n    thumb = UIGraphicsGetImageFromCurrentImageContext();\n\
    \    UIGraphicsEndImageContext();\n    return thumb;\n}\n@end\n```\n\n我们新的 `UIImage`\
    \ 类别将创建一个经过裁剪和调整大小、并填满传递给 `createThumbnailToFillSize:` 方法尺寸的图片。通过将这一功能实现在类别中，我们只需将我们的类别文件导入到任何需要创建优化图片的文件中。然后，我们就能在任何\
    \ `UIImage` 实例上调用 `createThumbnailToFillSize:` 来创建符合我们指定尺寸的缩略图。这太酷了，不是吗？！\n\n\
    现在让我们尝试一下。首先，将新类别导入到 `BRBirthdayEditViewController.m` 中：\n\n```\n#import \"UIImage+Thumbnail.h\"\
    \n```\n\n现在将 `imagePickerController:didFinishPickingMediaWithInfo:` 的实现修改如下：\n\
    \n```\n- (void)imagePickerController:(UIImagePickerController *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary\
    \ *)info {\n    [picker dismissViewControllerAnimated:YES completion:nil];\n \
    \   UIImage *image = info[UIImagePickerControllerOriginalImage];\n    CGFloat\
    \ side = 71.f;\n    side *= [[UIScreen mainScreen] scale];\n    UIImage *thumbnail\
    \ = [image createThumbnailToFillSize:CGSizeMake(side, side)];\n    self.photoView.image\
    \ = thumbnail;\n    self.birthday.imageData = UIImageJPEGRepresentation (thumbnail,1.f);\n\
    \    // self.photoView.image = image;\n    // self.birthday.imageData = UIImageJPEGRepresentation\
    \ (image,1.f);\n}\n```\n\n71 点是我们应用中方形缩略图侧边的最大长度。然而，我们还需要支持视网膜显示屏。为此，我们将 71 点乘以屏幕缩放值；在视网膜显示屏上，屏幕缩放值为\
    \ 2；在非视网膜显示屏上，屏幕缩放值为 1。\n\n### 取消 Core Data 更改\n\n在上一章中，我们在核心视图控制器中实现了 `cancelAndDismiss:`\
    \ 和 `saveAndDismiss:` 方法，使得任何子类视图控制器在以模态方式呈现时都能轻松地自行消失。对于我们的生日编辑视图控制器，当点击“保存”和“取消”按钮时，我们需要添加进一步的功能。我们需要取消或保存对\
    \ Core Data 存储的更改。我们已经为模型添加了一个 `saveChanges` 公共方法来实现这一点，所以首先让我们从 `BRBirthdayEditViewController.m`\
    \ 中调用 `saveChanges`：\n\n```\n- (IBAction)saveAndDismiss:(id)sender\n{\n    [[BRDModel\
    \ sharedInstance] saveChanges];\n    [super saveAndDismiss:sender];\n}\n```\n\n\
    你将会高兴地发现，取消对 `CoreData` 的更改比保存更改更简单。以下是添加到 `BRDModel` 的新公共方法：\n\n`BRDModel.h`：\n\
    \n```\n- (void)cancelChanges;\n```\n\n`BRDModel.m`：\n\n```\n- (void)cancelChanges\n\
    {\n    [self.managedObjectContext rollback];\n}\n```\n\n调用托管对象上下文的 `rollback`\
    \ 方法将移除自上次保存以来对 Core Data 模型所做的所有更改。这包括从未保存/写入持久化存储的新插入的 `BRDBirthday` 实体。这非常方便，因为它意味着当用户点击“添加生日”按钮时，我们可以在主视图控制器中创建一个新的\
    \ `BRDBirthday` 实体；并且借助 Core Data 的神奇力量，当通过生日编辑视图控制器点击“取消”按钮时，只需回滚托管对象上下文，这个临时实体就会被丢弃。\n\
    \n回到 `BRBirthdayEditViewController.m` 中，让我们覆写 `cancelAndDismiss:` 的实现：\n\n```\n\
    - (IBAction)cancelAndDismiss:(id)sender {\n    [[BRDModel sharedInstance] cancelChanges];\n\
    \    [super cancelAndDismiss:sender];\n}\n```\n"
- fmt: "### Back to the home view controller\n\nBack working on our `BRHomeViewController.m`\
    \ source file, we’re now going to modify the `prepareForSegue:sender:` method\
    \ to work with the birthday managed objects rather than the dictionaries from\
    \ the previous chapter. The following are the code changes:\n\n```\n-(void) prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    NSString *identifier = segue.identifier;\n\
    \n    if ([identifier isEqualToString:@\"BirthdayDetail\"]) {\n        //First\
    \ get the data\n        NSIndexPath *selectedIndexPath = self.tableView.indexPathForSelectedRow;\n\
    \        BRDBirthday *birthday = [self.fetchedResultsController objectAtIndexPath:selectedIndexPath];\n\
    \        //NSMutableDictionary *birthday = [self.birthdays objectAtIndex:selectedIndexPath.row];\n\
    \n        BRBirthdayDetailViewController *birthdayDetailViewController =\nsegue.destinationViewController;\n\
    \        birthdayDetailViewController.birthday = birthday;\n\n    }\n    else\
    \ if ([identifier isEqualToString:@\"AddBirthday\"]) {\n        //Add a new birthday\n\
    \n        NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
    \        BRDBirthday *birthday = [NSEntityDescription\ninsertNewObjectForEntityForName:@\"\
    BRDBirthday\" inManagedObjectContext:context];\n        [birthday updateWithDefaults];\n\
    \        //NSMutableDictionary *birthday = [NSMutableDictionary dictionary];\n\
    \n        //        [birthday setObject:@\"My Friend\" forKey:@\"name\"];\n  \
    \      //        [birthday setObject:[NSDate date] forKey:@\"birthdate\"];\n \
    \       //        [self.birthdays addObject:birthday];\n\n        UINavigationController\
    \ *navigationController = segue.destinationViewController;\n\n        BRBirthdayEditViewController\
    \ *birthdayEditViewController =\n(BRBirthdayEditViewController *) navigationController.topViewController;\n\
    \        birthdayEditViewController.birthday = birthday;\n    }\n}\n```\n\nWhen\
    \ the user taps the Add Birthday button, we create a new `BRDBirthday` entity\
    \ in the Core Data managed object context, but we don’t save the context. That\
    \ way, if the user cancels her action to create a new birthday, the managed object\
    \ context will rollback and our new birthday entity will be erased.\n\nBuild and\
    \ run! You should be able to add and edit birthdays, and your changes should remain\
    \ persistent between sessions.\n\n### Saving notes\n\nNow that we’ve got our Core\
    \ Data saving model up and running, let’s save the birthday notes that we’re enabling\
    \ our users to write. Open the `BRNotesEditViewController.h` header, and begin\
    \ by adding a forward class declaration for our `BRDBirthday` entity, and add\
    \ a new `birthday` property:\n\n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\
    \n@class BRDBirthday;\n\n@interface BRNotesEditViewController : BRCoreViewController\
    \ <UITextViewDelegate>\n\n@property(nonatomic,strong) BRDBirthday *birthday;\n\
    @property (weak, nonatomic) IBOutlet UIBarButtonItem *saveButton;\n@property (weak,\
    \ nonatomic) IBOutlet UITextView *textView;\n\n@end\n```\n\nImport `BRDBirthday`\
    \ and `BRDModel` and synthesize the new `birthday` property in `BRNotesEditViewController.m`:\n\
    \n```\n#import \"BRNotesEditViewController.h\"\n#import \"BRDModel.h\"\n#import\
    \ \"BRDBirthday.h\"\n```\n\nJust like the birthday edit and detail view controllers,\
    \ we’ll update the view with content from the birthday entity when the view is\
    \ about to be displayed:\n\n```\n-(void) viewWillAppear:(BOOL)animated\n{\n  \
    \  [super viewWillAppear:animated];\n    self.textView.text = self.birthday.notes;\n\
    \    [self.textView becomeFirstResponder];\n}\n```\n\nAs the user makes changes\
    \ to birthday notes, we’ll update the birthday entity:\n\n```\n- (void)textViewDidChange:(UITextView\
    \ *)textView\n{\n    //NSLog(@\"User changed the notes text: %@\",textView.text);\n\
    \    self.birthday.notes = self.textView.text;\n}\n```\n\nFinally, just like the\
    \ edit birthday view controller, we’ll ask the model singleton to save or cancel\
    \ the user’s changes when he taps the Cancel or Save buttons:\n\n```\n- (IBAction)cancelAndDismiss:(id)sender\
    \ {\n    [[BRDModel sharedInstance] cancelChanges];\n    [super cancelAndDismiss:sender];\n\
    }\n\n- (IBAction)saveAndDismiss:(id)sender\n{\n    [[BRDModel sharedInstance]\
    \ saveChanges];\n    [super saveAndDismiss:sender];\n}\n```\n\nIn order to see\
    \ our hard work pay off, we still need to pass in a reference to the birthday\
    \ entity being viewed in the Birthday Detail view controller when the notes editor\
    \ is presented by the segue transition. Open your storyboard and locate the segue\
    \ between the Birthday Detail view controller and the edit birthday navigation\
    \ view controller. Select the segue, and then enter the identifier `EditNotes`\
    \ (see [Figure 8-15](#Chapter08.html#fig_8_15)).\n\n![Image](images/9781430243748_Fig08-15.jpg)\n\
    \n**Figure 8-15.** Adding a segue identifier for the note editor navigation controller\n\
    \nNow open `BRBirthdayDetailViewController.m` and import the notes editor view\
    \ controller:\n\n```\n#import \"BRNotesEditViewController.h\"\n```\n\nAnd update\
    \ the `prepareForSegue:sender` method so that it passes a reference to its birthday\
    \ entity when it presents the notes editor:\n\n```\n-(void) prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    NSString *identifier = segue.identifier;\n\
    \n    if ([identifier isEqualToString:@\"EditBirthday\"]) {\n        //Edit this\
    \ birthday\n        UINavigationController *navigationController = segue.destinationViewController;\n\
    \n        BRBirthdayEditViewController *birthdayEditViewController =\n(BRBirthdayEditViewController\
    \ *) navigationController.topViewController;\n        birthdayEditViewController.birthday\
    \ = self.birthday;\n    }\n    else if ([identifier isEqualToString:@\"EditNotes\"\
    ]) {\n        //Edit this birthday\n        UINavigationController *navigationController\
    \ = segue.destinationViewController;\n\n        BRNotesEditViewController *birthdayNotesEditViewController\
    \ = (BRNotesEditViewController *) navigationController.topViewController;\n  \
    \      birthdayNotesEditViewController.birthday = self.birthday;\n    }\n}\n```\n\
    \nBuild and run. Pick a celebrity or one of your own added birthdays. Edit the\
    \ notes associated with that birthday and save them. Repeat this process a few\
    \ times. You’ll see the notes persisting between sessions.\n\n### Cleaning up\n\
    \nNow that we’re done implementing Core Data storage, we can dispose of the redundant\
    \ birthdays array property in `BRHomeViewController.m`:\n\n```\n@interface BRHomeViewController\
    \ ()\n\n//@property (nonatomic,strong) NSMutableArray *birthdays;\n@property (nonatomic,\
    \ strong) NSFetchedResultsController *fetchedResultsController;\n\n@end\n```\n\
    \nThat’s it. We’re done with Core Data! Build and run. You should be able to add\
    \ and edit birthdays, photos, and notes. Your changes should reflect immediately\
    \ in all view controllers, and even after shutting down *Birthday Reminder*. This\
    \ is the beauty of Core Data.\n\n![Image](images/9781430243748_Fig08-16.jpg)\n\
    \n**Figure 8-16.** Happy Birthday Katy!\n\n### Summary\n\nWell done getting through\
    \ the Core Data chapter! This is as hard as it gets in this book. You’ve had to\
    \ digest a lot of new information this morning because Core Data is quite an advanced\
    \ iOS framework. We’ve only really skimmed the surface of its capabilities, but\
    \ for storing birthdays persistently—or any other data type for that matter—Core\
    \ Data really is the way to go.\n\nUp next this afternoon, we’re going to look\
    \ at iOS skinning approaches and how to make *Birthday Reminder* look pretty.\
    \ So grab a quick lunch—and I’ll see you back here in an hour!\n\n![Image](images/ch.jpg)\n\
