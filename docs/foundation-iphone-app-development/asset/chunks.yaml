    \n**图 6-9.** 添加文本居中显示的多行`UILabel`\n"
- fmt: "### Using the Date Picker as a Time Setting Control\n\nEnsure the date picker\
    \ is pinned to the bottom of the view (just as you did for the Edit Birthday view)\
    \ and then change its `Mode` attribute to `Time`. Set the `Interval` attribute\
    \ of the date picker to five minutes (see [Figure 6-10](#Chapter06.html#fig_6_10)).\n\
    \n![Image](images/9781430243748_Fig06-10.jpg)\n\n**Figure 6-10.** Configuring\
    \ the date picker as a time setting control\n\nControl-drag to create outlets\
    \ for both the label and the date picker in the `BRNotificationTimeViewController.h`\
    \ header: `whatTimeLabel` and `timePicker`, respectively. Control-drag again from\
    \ the date picker to `BRNotificationTimeViewController.h` to create an Interface\
    \ Builder action for the Value Changed event, and name the action `didChangeTime:`.\
    \ `BRNotificationTimeViewController.h` should end up as follows:\n\n```\n#import\
    \ \"BRCoreViewController.h\"\n\n@interface BRNotificationTimeViewController :\
    \ BRCoreViewController\n@property (weak, nonatomic) IBOutlet UILabel *whatTimeLabel;\n\
    @property (weak, nonatomic) IBOutlet UIDatePicker *timePicker;\n- (IBAction)didChangeTime:(id)sender;\n\
    \n@end\n```\n\nNow, when the user changes the time displayed on our date picker,\
    \ our new `didChangeTime:` action is invoked. This enables us to grab the date\
    \ value of `UIDatePicker`, but how can we extract just the hour and minutes that\
    \ the user has set? Here’s the code to add to the implementation of `didChangeTime:`:\n\
    \n```\n- (IBAction)didChangeTime:(id)sender {\n    NSDateComponents *components\
    \ = [[NSCalendar currentCalendar]\n        components:NSHourCalendarUnit|NSMinuteCalendarUnit\
    \ fromDate:self.timePicker.date];\n\n    NSLog(@\"Changed time to: %d:%d\",components.hour,components.minute);\
    \  \n}\n```\n\nWe’re going to become best friends with the `NSDateComponents`\
    \ over the next few days. It’s a very powerful class for manipulating a date and\
    \ dividing it into individual year, month, day, minute, and second components.\
    \ We instantiate an instance of `NSDateComponents` from the current calendar of\
    \ the user’s device, and we pass in unit flags, specifying which components we’re\
    \ interested in—just hour and minutes for this example. We also pass in the date\
    \ from our date picker. We can then directly access the hour and minute properties\
    \ of our `NSDateComponents` instance. We’ll explore more uses of `NSDateComponents`\
    \ in latter chapters when we have to figure our the number of days remaining until\
    \ each saved birthday, the age users will be on their next birthday, and many\
    \ other date-related values.\n\n### More User Interface Action with the Camera\
    \ and Photo Library\n\nAny birthday added or imported into our *Birthday Reminder*\
    \ app will be able to have an associated photo. The photo, however, is optional.\
    \ If a birthday has an associated photo, then we’ll display it on the home screen\
    \ birthday list. It will display even larger on the birthday detail and edit screens.\
    \ If there’s no photo associated with a birthday, then we’ll display a birthday\
    \ cake instead. ![Image](images/smile.jpg)\n\nLet’s start this photo feature by\
    \ adding some new subviews to the edit birthday view in our storyboard. Drag a\
    \ new view (`UIView`) instance onto the edit birthday view from the Object Library.\
    \ Use the size inspector to position the subview (x=10 and y=20). Resize the view\
    \ to width=71 and height=71 (see [Figure 6-11](#Chapter06.html#fig_6_11)).\n\n\
    ![Image](images/9781430243748_Fig06-11.jpg)\n\n**Figure 6-11.** Adding an image\
    \ view holder\n\nThe newly added view is a container view for a thumbnail background\
    \ image, the birthday photo, and a Pic Photo label. By default, Xcode sets an\
    \ opaque white background color on any new view added to a storyboard. Our holder\
    \ needs to be transparent, but not invisible because it will eventually have round\
    \ rectangle corners. Keeping the container view selected, use the attributes inspector\
    \ to change the background color of the view to Apple’s built-in clear color (see\
    \ [Figure 6-12](#Chapter06.html#fig_6_12)).\n\n![Image](images/9781430243748_Fig06-12.jpg)\n\
    \n**Figure 6-12.** Making a view’s background transparent with a clear color\n\
    \nWithin the source code for this chapter, you’ll find four new retina and non-retina\
    \ image assets to add to your project. Drag, drop, and add the images to the `resources/images`\
    \ group in your Xcode project (see [Figure 6-13](#Chapter06.html#fig_6_13)).\n\
    \n![Image](images/9781430243748_Fig06-13.jpg)\n\n**Figure 6-13.** Birthday cake\
    \ and thumbnail background image assets added to the project\n\nBack in our edit\
    \ birthday view, drag a new image view (`UIImageView`) from the Object Library\
    \ into the container view. Then position it (x=0, y=0, width=71, height=71) to\
    \ match its parent view. With your new image view selected, use the attributes\
    \ inspector to change its `image` property to `thumbnail-background.png`, one\
    \ of the image assets we just added to our project. The image displayed should\
    \ be a round cornered thumbnail background PNG.\n\nRepeat the process of adding,\
    \ positioning, and sizing a new image view again; but this time, select the `icon-birthday-cake.png`\
    \ image to sit in front of the thumbnail background (see [Figure 6-14](#Chapter06.html#fig_6_14)).\n\
    \n![Image](images/9781430243748_Fig06-14.jpg)\n\n**Figure 6-14.** A container\
    \ view with two subviews: thumbnail background and birthday cake image views\n\
    \nAdd a third subview to the container view. This time it’s a new label (`UILabel`)\
    \ instance. Using the attributes inspector, change the label’s alignment to Center,\
    \ its font size to system 12, its text color to Light Text Color, and its text\
    \ to `Pic Photo`. Scrolling through the attributes inspector to the View attributes\
    \ of the label, tap the Background color swatch. Using the Gray Scale Slider,\
    \ create and apply a new Black color with 50 percent opacity to the label (see\
    \ [Figure 6-15](#Chapter06.html#fig_6_15)).\n\n![Image](images/9781430243748_Fig06-15.jpg)\n\
    \n**Figure 6-15.** Creating a new translucent color with 50 percent opacity\n\n\
    Finally, position the new label (x=0, y=56, width=71, height=15). The results\
    \ should look like [Figure 6-16](#Chapter06.html#fig_6_16).\n\n![Image](images/9781430243748_Fig06-16.jpg)\n\
    \n**Figure 6-16.** Our holder complete with images and label\n\nUsing the Assistant\
    \ Editor layout, create new outlets in `BRBirthdayEditViewController.h` for the\
    \ container view, image view with the cake, and label view, naming them `photoContainerView`,\
    \ `photoView`, and `picPhotoLabel`, respectively. When views are layered on top\
