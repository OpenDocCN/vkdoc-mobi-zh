- fmt: "# Defining Core Data Entities\n\nWe’ve created a Core Data model file. Next\
    \ up, we’ll create a birthday entity in the model. With the new `BirthdayReminder.xcdatamodeld`\
    \ file selected in the Project Navigator, tap the Add Entity button in the editor\
    \ and name the new entity `BRDBirthday`.\n\nNow with the new `BRDBirthday` entity\
    \ selected, we’re going to add our first attribute, `birthDay`, by tapping the\
    \ Add Attribute button at the bottom of the editor pane, then typing in `birthDay`\
    \ as the attribute name. With the new `birthDay` attribute selected, ensure that\
    \ the utility panel is open and toggle to the data model inspector pane if it’s\
    \ not currently visible. Then set the attribute type to Integer 16 (see [Figure\
    \ 8-9](#Chapter08.html#fig_8_9)).\n\n![Image](images/9781430243748_Fig08-09.jpg)\n\
    \n**Figure 8-9.** Defining Core Data entity attributes\n\nLet’s now add the rest\
    \ of the attributes for our `Birthday` entity as follows. Be sure to pay careful\
    \ attention to case sensitivity:\n\n- `addressBookID` Integer 16\n- `birthDay`\
    \ Integer 16\n- `birthMonth` Integer 16\n- `birthYear` Integer 16\n- `facebookID`\
    \ String\n- `imageData` Binary Data\n- `name` String\n- `nextBirthday` Date\n\
    - `nextBirthdayAge` Integer 16\n- `notes` String\n- `picURL` String\n- `uid` String\n\
    \nNotice how we can also store binary data in Core Data entity attributes? This\
    \ is perfect for storing image icon data. `picURL` will solely be used for the\
    \ Facebook birthdays profile photo URLs. Facebook users regularly change their\
    \ profile photo, so rather than caching their pics, we’ll ensure that we regularly\
    \ download the latest Facebook profile photos.\n\nI’ve purposefully avoided including\
    \ a birth date attribute. As we’ll discover tomorrow, both Facebook and Address\
    \ Book birthdays often don’t include the birth year, so we won’t actually always\
    \ know the full birth date for our birthdays, just the month and day in some cases.\n\
    \nNow select the `BRDBirthday` entity rather than its attributes. The data model\
    \ inspector should update and permit you to modify the default `NSManagedObject`\
    \ class that the `BRDBirthday` entity is currently assigned to. Change this to\
    \ `BRDBirthday` (see [Figure 8-10](#Chapter08.html#fig_8_10)).\n\n![Image](images/9781430243748_Fig08-10.jpg)\n\
    \n**Figure 8-10.** Assigning `BRDBirthday` entity to `BRDBirthday` class\n\nXcode\
    \ is going to generate an `NSManagedObject` subclass named `BRDBirthday` for us\
    \ with all of the birthday attributes we’ve specified.\n\nWith the `data` group\
    \ selected in the Project Navigator, begin the process of creating a new `NSManagedObject`\
    \ subclass for birthdays using the ![Image](images/flower.jpg) keyboard shortcut\
    \ or File ![Image](images/U001.jpg) New ![Image](images/U001.jpg) File, and selecting\
    \ the `NSManagedObject` subclass from the Core Data collection (see [Figure 8-11](#Chapter08.html#fig_8_11)).\n\
    \n![Image](images/9781430243748_Fig08-11.jpg)\n\n**Figure 8-11.** Creating an\
    \ `NSManagedObject` subclass\n\nOn the next dialog screen, select the `data` folder\
    \ in the Finder as the designation for the new class. Leave Use Scalar Properties\
    \ for Primitive Data Types deselected and click Create.\n\nTake a look at the\
    \ `BRDBirthday` class that Xcode has generated for us. Notice how all of our integers\
    \ are now `NSNumber` objects rather than primitives? As with dictionaries and\
    \ arrays, Core Data can’t use primitives as attributes; this is why they are wrapped\
    \ in `NSNumber` instances.\n\n## Extending Entities\n\nCreating `BRDBirthday`\
    \ as a subclass of `NSManagedObject` has additional advantages. We can add new\
    \ methods and non-persistent properties directly to the `BRDBirthday` subclass.\
    \ The birthdays in our store will be listed in order of the next pending birthday\
    \ in the Home view controller. We’ve already created attributes on `BRDBirthday`\
    \ to store the next birthday date and the next birthday age, but we have yet to\
    \ set their values.\n\n> **Note:** The one caveat to adding code to `NSManagedObject`\
    \ subclasses is that you will need to ensure that you don’t overwrite the Xcode-generated\
    \ entity classes if you ever make changes to your Core Data model. You will just\
    \ need to manually add/remove your changes to your entity subclasses.\n\nOpen\
    \ the `BRDBirthday.h` header and add the following new public methods and property\
    \ declarations:\n\n```\n@property (nonatomic,readonly) int remainingDaysUntilNextBirthday;\n\
    @property (nonatomic,readonly) NSString *birthdayTextToDisplay;\n@property (nonatomic,readonly)\
    \ BOOL isBirthdayToday;\n\n-(void)updateNextBirthdayAndAge;\n-(void)updateWithDefaults;\n\
    ```\n\nThe following is a rundown on how these new properties and methods will\
    \ be used in *Birthday Reminder*:\n\n- `remainingDaysUntilNextBirthday`: Provides\
    \ our users with a day count until each friend’s next birthday.\n- `birthdayTextToDisplay`:\
    \ Human-readable text string such as “44 Tomorrow” or “34 on May 26”.\n- `isBirthdayToday`:\
    \ If it’s the user’s birthday today, then we’ll display a birthday cake image\
    \ instead of their birthday countdown (see [Chapter 9](#Chapter09.html#ch9)).\n\
    - `updateNextBirthdayAndAge`: We’ll use this method to update the `nextBirthday`\
    \ and `nextBirthdayAge`.\n- `updateWithDefaults`: We’ll call this method when\
    \ the **Add Birthday** button is tapped to set the basic attributes required by\
    \ `BRDBirthday` entities, namely `birthdayDay` and `birthMonth`.\n\nSwitch to\
    \ `BRDBirthday.m` source file, and let’s add the implementations of these new\
    \ instance methods and properties:\n\n```\n-(void)updateNextBirthdayAndAge\n{\n\
    \    NSDate *now = [NSDate date];\n\n    NSCalendar *calendar = [NSCalendar currentCalendar];\n\
    \n    NSDateComponents *dateComponents = [[NSCalendar currentCalendar]\ncomponents:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
    \ fromDate:now];\n    NSDate *today = [calendar dateFromComponents:dateComponents];\n\
    \n    dateComponents.day = [self.birthDay intValue];\n    dateComponents.month\
    \ = [self.birthMonth intValue];\n\n    NSDate *birthdayThisYear = [calendar dateFromComponents:dateComponents];\n\
    \n    if ([today compare:birthdayThisYear] == NSOrderedDescending) {\n       \
    \ //birthday this year has passed so next birthday will be next year\n       \
    \ dateComponents.year++;\n        self.nextBirthday = [calendar dateFromComponents:dateComponents];\n\
    \    }\n    else {\n        self.nextBirthday = [birthdayThisYear copy];\n   \
    \ }\n\n    if ([self.birthYear intValue] > 0) {\n        self.nextBirthdayAge\
    \ = [NSNumber numberWithInt:dateComponents.year - [self.birthYear intValue]];\n\
    \    }\n    else {\n        self.nextBirthdayAge = [NSNumber numberWithInt:0];\n\
    \    }\n\n}\n```\n\nOur code assumes that the `birthDay` and `birthMonth` properties\
    \ will always be set for instances of `BRDBirthday`. This gives us enough to calculate\
    \ our friend’s birthday this year. We create an instance of `NSDateComponents`\
    \ with the date right now. This ensures that the year property of our `NSDateComponents`\
    \ instance is automatically set to the current year. Then, we override the day\
    \ and month properties of `NSDateComponents` with the day and month of this friend’s\
    \ birthday. Now our instance of `NSDateComponents` has enough data to calculate\
    \ the date of our friend’s birthday this year. From our `birthdayThisYear` value,\
    \ we can ascertain whether the date has passed or not, and set `BRDBirthday`’s\
    \ `nextBirthday` value to the friend’s birthday this year or next year."
  raw: '##### Defining Core Data entities


    We’ve created a Core Data model file. Next up, we’ll create a birthday entity
    in the model. With the new `BirthdayReminder.xcdatamodeld` file selected in the
    Project Navigator, tap the Add Entity button in the editor and name the new entity
    `BRDBirthday`.


    Now with the new `BRDBirthday` entity selected, we’re going to add our first attribute,
    `birthDay`, by tapping the Add Attribute button at the bottom of the editor pane,
    then typing in `birthDay` as the attribute name. With the new `birthDay` attribute
    selected, ensure that the utility panel is open and toggle to the data model inspector
    pane if it’s not currently visible. Then set the attribute type to Integer 16
    (see [Figure 8-9](#Chapter08.html#fig_8_9)).


    ![Image](images/9781430243748_Fig08-09.jpg)


    **Figure 8-9.** Defining Core Data entity attributes


    Let’s now add the rest of the attributes for our `Birthday` entity as follows.
    Be sure to pay careful attention to case sensitivity:


    > *   `addressBookID`        Integer 16

    > *   `birthDay`                     Integer 16

    > *   `birthMonth`                Integer 16

    > *   `birthYear`                   Integer 16

    > *   `facebookID`                String

    > *   `imageData`                   Binary Data

    > *   `name`                                String

    > *   `nextBirthday`           Date

    > *   `nextBirthdayAge`   Integer 16

    > *   `notes`                             String

    > *   `picURL`                          String

    > *   `uid`                                  String


    Notice how we can also store binary data in Core Data entity attributes? This
    is perfect for storing image icon data. picURL will solely be used for the Facebook
    birthdays profile photo URLs. Facebook users regularly change their profile photo,
    so rather than caching their pics, we’ll ensure that we regularly download the
    latest Facebook profile photos.


    I’ve purposefully avoided including a birth date attribute. As we’ll discover
    tomorrow, both Facebook and Address Book birthdays often don’t include the birth
    year, so we won’t actually always know the full birth date for our birthdays,
    just the month and day in some cases.


    Now select the `BRDBirthday` entity rather than its attributes. The data model
    inspector should update and permit you to modify the default `NSManagedObject`
    class that the `BRDBirthday` entity is currently assigned to. Change this to `BRDBirthday`
    (see [Figure 8-10](#Chapter08.html#fig_8_10)).


    ![Image](images/9781430243748_Fig08-10.jpg)


    **Figure 8-10.** Assigning BRDBirthday entity to BRDBirthday class


    Xcode is going to generate an `NSManagedObject` subclass named `BRDBirthday` for
    us with all of the birthday attributes we’ve specified.


    With the `data` group selected in the Project Navigator, begin the process of
    creating a new `NSManagedObject` subclass for birthdays using the ![Image](images/flower.jpg)N
    keyboard shortcut or File ![Image](images/U001.jpg) New ![Image](images/U001.jpg)
    File, and selecting the `NSManagedObject` subclass from the Core Data collection
    (see [Figure 8-11](#Chapter08.html#fig_8_11)).


    ![Image](images/9781430243748_Fig08-11.jpg)


    **Figure 8-11.** Creating an NSManagedObject subclass


    On the next dialog screen, select the `data` folder in the Finder as the designation
    for the new class. Leave Use Scalar Properties for Primitive Data Types deselected
    and click Create.


    Take a look at the `BRDBirthday` class that Xcode has generated for us. Notice
    how all of our integers are now `NSNumber` objects rather than primitives? As
    with dictionaries and arrays, Core Data can’t use primitives as attributes; this
    is why they are wrapped in `NSNumber` instances.


    #### Extending entities


    Creating `BRDBirthday` as a subclass of `NSManagedObject` has additional advantages.
    We can add new methods and non-persistent properties directly to the `BRDBirthday`
    subclass. The birthdays in our store will be listed in order of the next pending
    birthday in the Home view controller. We’ve already created attributes on `BRDBirthday`
    to store the next birthday date and the next birthday age, but we have yet to
    set their values.


    *Note: The one caveat to adding code to* `NSManagedObject` *subclasses is that
    you will need to ensure that you don’t overwrite the Xcode-generated entity classes
    if you ever make changes to your Core Data model. You will just need to manually
    add/remove your changes to your entity subclasses.*


    Open the `BRDBirthday.h` header and add the following new public methods and property
    declarations:


    `@property (nonatomic,readonly) int remainingDaysUntilNextBirthday;`

    `@property (nonatomic,readonly) NSString *birthdayTextToDisplay;`

    `@property (nonatomic,readonly) BOOL isBirthdayToday;`


    `-(void)updateNextBirthdayAndAge;`

    `-(void)updateWithDefaults;`


    The following is a rundown on how these new properties and methods will be used
    in *Birthday Reminder*:


    > *   `remainingDaysUntilNextBirthday`: Provides our users with a day count until
    each friend’s next birthday.

    > *   `birthdayTextToDisplay`: Human-readable text string such as “44 Tomorrow”
    or “34 on May 26”.

    > *   `isBirthdayToday`: If it’s the user’s birthday today, then we’ll display
    a birthday cake image instead of their birthday countdown (see [Chapter 9](#Chapter09.html#ch9)).

    > *   `updateNextBirthdayAndAge`: We’ll use this method to update the `nextBirthday`
    and `nextBirthdayAge`.

    > *   `updateWithDefaults`: We’ll call this method when the **Add Birthday** button
    is tapped to set the basic attributes required by `BRDBirthday` entities, namely
    `birthdayDay` and `birthMonth`.


    Switch to `BRDBirthday.m` source file, and let’s add the implementations of these
    new instance methods and properties:


    `-(void)updateNextBirthdayAndAge`

    `{`

    `    NSDate *now = [NSDate date];`


    `    NSCalendar *calendar = [NSCalendar currentCalendar];`


    `    NSDateComponents *dateComponents = [[NSCalendar currentCalendar]`

    `components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit fromDate:now];`

    `    NSDate *today = [calendar dateFromComponents:dateComponents];`


    `    dateComponents.day = [self.birthDay intValue];`

    `    dateComponents.month = [self.birthMonth intValue];`


    `    NSDate *birthdayThisYear = [calendar dateFromComponents:dateComponents];`


    `    if ([today compare:birthdayThisYear] == NSOrderedDescending) {`

    `        //birthday this year has passed so next birthday will be next year`

    `        dateComponents.year++;`

    `        self.nextBirthday = [calendar dateFromComponents:dateComponents];`

    `    }`

    `    else {`

    `        self.nextBirthday = [birthdayThisYear copy];`

    `    }`


    `    if ([self.birthYear intValue] > 0) {`

    `        self.nextBirthdayAge = [NSNumber numberWithInt:dateComponents.year -
    [self.birthYear intValue]];`

    `    }`

    `    else {`

    `        self.nextBirthdayAge = [NSNumber numberWithInt:0];`

    `    }`


    `}`


    Our code assumes that the `birthDay` and `birthMonth` properties will always be
    set for instances of `BRDBirthday`. This gives us enough to calculate our friend’s
    birthday this year. We create an instance of `NSDateComponents` with the date
    right now. This ensures that the year property of our `NSDateComponents` instance
    is automatically set to the current year. Then, we override the day and month
    properties of `NSDateComponents` with the day and month of this friend’s birthday.
    Now our instance of `NSDateComponents` has enough data to calculate the date of
    our friend’s birthday this year. From our `birthdayThisYear` value, we can ascertain
    whether the date has passed or not, and set `BRDBirthday`’s `nextBirthday` value
    to the friend’s birthday this year or next year.'
  trans: "\n# 定义核心数据实体\n\n我们已经创建了一个 Core Data 模型文件。接下来，我们将在模型中创建一个生日实体。在项目导航器中选中新的\
    \ `BirthdayReminder.xcdatamodeld` 文件，点击编辑器中的添加实体按钮，并将新实体命名为 `BRDBirthday`。\n\n\
    现在选中新的 `BRDBirthday` 实体，我们将通过点击编辑器面板底部的添加属性按钮来添加第一个属性 `birthDay`，然后输入 `birthDay`\
    \ 作为属性名称。选中新的 `birthDay` 属性后，确保工具面板已打开，如果当前不可见，请切换到数据模型检查器面板。然后将属性类型设置为 Integer\
    \ 16（参见 图 8-9）。\n\n![图片](img/9781430243748_Fig08-09.jpg)\n\n**图 8-9.** 定义 Core\
    \ Data 实体属性\n\n现在让我们为 `Birthday` 实体添加其余属性，如下所示。请务必注意大小写：\n\n- `addressBookID`\
    \ Integer 16\n- `birthDay` Integer 16\n- `birthMonth` Integer 16\n- `birthYear`\
    \ Integer 16\n- `facebookID` String\n- `imageData` Binary Data\n- `name` String\n\
    - `nextBirthday` Date\n- `nextBirthdayAge` Integer 16\n- `notes` String\n- `picURL`\
    \ String\n- `uid` String\n\n注意到我们也可以在 Core Data 实体属性中存储二进制数据了吗？这对于存储图像图标数据非常理想。`picURL`\
    \ 将专门用于 Facebook 生日的个人资料照片 URL。Facebook 用户会定期更换他们的个人资料照片，因此我们不会缓存他们的照片，而是确保定期下载最新的\
    \ Facebook 个人资料照片。\n\n我有意避免包含出生日期属性。正如我们明天将发现的，Facebook 和通讯录中的生日通常不包括出生年份，因此我们实际上并不总是知道生日的完整日期，在某些情况下只知道月份和日期。\n\
    \n现在选择 `BRDBirthday` 实体而不是它的属性。数据模型检查器应该会更新，并允许您修改 `BRDBirthday` 实体当前分配的默认 `NSManagedObject`\
    \ 类。将其更改为 `BRDBirthday`（参见 图 8-10）。\n\n![图片](img/9781430243748_Fig08-10.jpg)\n\
    \n**图 8-10.** 将 `BRDBirthday` 实体分配给 `BRDBirthday` 类\n\nXcode 将为我们生成一个名为 `BRDBirthday`\
    \ 的 `NSManagedObject` 子类，其中包含我们指定的所有生日属性。\n\n在项目导航器中选中 `data` 组，使用 ![图片](img/flower.jpg)\
    \ 键盘快捷键或通过 文件 ![图片](img/U001.jpg) 新建 ![图片](img/U001.jpg) 文件，并从 Core Data 集合中选择\
    \ `NSManagedObject` 子类，开始为生日创建新的 `NSManagedObject` 子类的过程（参见 图 8-11）。\n\n![图片](img/9781430243748_Fig08-11.jpg)\n\
    \n**图 8-11.** 创建 `NSManagedObject` 子类\n\n在下一个对话框屏幕上，在 Finder 中选择 `data` 文件夹作为新类的目标位置。保持“为原始数据类型使用标量属性”选项未选中，然后点击创建。\n\
    \n查看 Xcode 为我们生成的 `BRDBirthday` 类。注意到我们所有的整数现在都是 `NSNumber` 对象而不是基本类型了吗？与字典和数组一样，Core\
    \ Data 不能使用基本类型作为属性；这就是为什么它们被包装在 `NSNumber` 实例中。\n\n## 扩展实体\n\n将 `BRDBirthday`\
    \ 创建为 `NSManagedObject` 的子类还有额外的好处。我们可以直接向 `BRDBirthday` 子类添加新的方法和非持久化属性。我们存储中的生日将按照主视图控制器中下一个即将到来的生日顺序列出。我们已经在\
    \ `BRDBirthday` 上创建了属性来存储下一个生日日期和下一个生日年龄，但我们尚未设置它们的值。\n\n> **注意：** 向 `NSManagedObject`\
    \ 子类添加代码的一个注意事项是，如果您对 Core Data 模型做了更改，需要确保不会覆盖 Xcode 生成的实体类。您只需手动添加/删除对实体子类的更改。\n\
    \n打开 `BRDBirthday.h` 头文件，并添加以下新的公共方法和属性声明：\n\n```\n@property (nonatomic,readonly)\
    \ int remainingDaysUntilNextBirthday;\n@property (nonatomic,readonly) NSString\
    \ *birthdayTextToDisplay;\n@property (nonatomic,readonly) BOOL isBirthdayToday;\n\
    \n-(void)updateNextBirthdayAndAge;\n-(void)updateWithDefaults;\n```\n\n以下是对这些新属性和方法在\
    \ *Birthday Reminder* 中如何使用的简要说明：\n\n- `remainingDaysUntilNextBirthday`：为用户提供每个朋友下一个生日前的天数倒计时。\n\
    - `birthdayTextToDisplay`：人类可读的文本字符串，例如“还有 44 天”或“5 月 26 日，34 岁”。\n- `isBirthdayToday`：如果今天是用户的生日，我们将显示生日蛋糕图像，而不是生日倒计时（参见\
    \ 第 9 章）。\n- `updateNextBirthdayAndAge`：我们将使用此方法来更新 `nextBirthday` 和 `nextBirthdayAge`。\n\
    - `updateWithDefaults`：当点击**添加生日**按钮时，我们将调用此方法来设置 `BRDBirthday` 实体所需的基本属性，即 `birthdayDay`\
    \ 和 `birthMonth`。\n\n切换到 `BRDBirthday.m` 源文件，让我们添加这些新实例方法和属性的实现：\n\n```\n-(void)updateNextBirthdayAndAge\n\
    {\n    NSDate *now = [NSDate date];\n\n    NSCalendar *calendar = [NSCalendar\
    \ currentCalendar];\n\n    NSDateComponents *dateComponents = [[NSCalendar currentCalendar]\n\
    components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit fromDate:now];\n\
    \    NSDate *today = [calendar dateFromComponents:dateComponents];\n\n    dateComponents.day\
    \ = [self.birthDay intValue];\n    dateComponents.month = [self.birthMonth intValue];\n\
    \n    NSDate *birthdayThisYear = [calendar dateFromComponents:dateComponents];\n\
    \n    if ([today compare:birthdayThisYear] == NSOrderedDescending) {\n       \
    \ //今年的生日已过，所以下一个生日是明年\n        dateComponents.year++;\n        self.nextBirthday\
    \ = [calendar dateFromComponents:dateComponents];\n    }\n    else {\n       \
    \ self.nextBirthday = [birthdayThisYear copy];\n    }\n\n    if ([self.birthYear\
    \ intValue] > 0) {\n        self.nextBirthdayAge = [NSNumber numberWithInt:dateComponents.year\
    \ - [self.birthYear intValue]];\n    }\n    else {\n        self.nextBirthdayAge\
    \ = [NSNumber numberWithInt:0];\n    }\n\n}\n```\n\n我们的代码假设 `BRDBirthday` 实例的\
    \ `birthDay` 和 `birthMonth` 属性始终被设置。这为我们提供了足够的信息来计算朋友今年的生日。我们使用当前日期创建一个 `NSDateComponents`\
    \ 实例。这确保了 `NSDateComponents` 实例的年份属性自动设置为当前年份。然后，我们用朋友生日的日期和月份覆盖 `NSDateComponents`\
    \ 的日期和月份属性。现在我们的 `NSDateComponents` 实例拥有了足够的数据来计算朋友今年生日的日期。根据 `birthdayThisYear`\
    \ 的值，我们可以判断日期是否已过，并将 `BRDBirthday` 的 `nextBirthday` 值设置为朋友今年或明年的生日。\n"
- fmt: '*Note: By extracting the `nextBirthday` from an instance of `NSDateComponents`,
    which we’ve initiated with the unit flags `NSYearCalendarUnit`, `NSMonthCalendarUnit`,
    and `NSDayCalendarUnit`, we will retrieve a date that corresponds to 00:00 on
    the morning of the birthday day. This is important to understand when making date
    comparisons between days of the year rather than hours, minutes, and seconds.*


    If a birth year has been set for the birthday entity, then we set the `nextBirthdayAge`
    to the difference between the friend’s birth year and the year of their next birthday
    (this year or next). Alternatively, if the friend has kept his/her birth year
    private, then we default the `nextBirthdayAge` to 0.


    Let’s implement the `updateWithDefaults` method:


    ```

    -(void) updateWithDefaults

    {

        NSDateComponents *dateComponents = [[NSCalendar currentCalendar]

    components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit fromDate:[NSDate
    date]];


        self.birthDay = @(dateComponents.day);

        self.birthMonth = @(dateComponents.month);

        self.birthYear = @0;


        [self updateNextBirthdayAndAge];

    }

    ```


    Now to add our three `readonly` getter methods: `remainingDaysUntilNextBirthday`,
    `birthdayTextToDisplay`, and `isBirthdayToday`:


    ```

    -(int) remainingDaysUntilNextBirthday

    {

        NSDate *now = [NSDate date];

        NSCalendar *calendar = [NSCalendar currentCalendar];

        NSDateComponents *componentsToday = [calendar

    components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit fromDate:now];

        NSDate *today = [calendar dateFromComponents:componentsToday];


        NSTimeInterval timeDiffSecs = [self.nextBirthday timeIntervalSinceDate:today];


        int days = floor(timeDiffSecs/(60.f*60.f*24.f));


        return days;

    }


    -(BOOL) isBirthdayToday

    {

        return [self remainingDaysUntilNextBirthday] == 0;

    }


    -(NSString *) birthdayTextToDisplay {


        NSDate *now = [NSDate date];

        NSCalendar *calendar = [NSCalendar currentCalendar];

        NSDateComponents *componentsToday = [calendar

    components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit fromDate:now];

        NSDate *today = [calendar dateFromComponents:componentsToday];


        NSDateComponents *components = [calendar components:NSMonthCalendarUnit|NSDayCalendarUnit

    fromDate:today toDate:self.nextBirthday options:0];


        if (components.month == 0) {

            if (components.day == 0) {

                //today!


                if ([self.nextBirthdayAge intValue] > 0) {

                    return [NSString stringWithFormat:@"%@ Today!",self.nextBirthdayAge];

                }

                else {

                    return @"Today!";

                }

            }

            if (components.day == 1) {

                //tomorrow!

                if ([self.nextBirthdayAge intValue] > 0) {

                    return [NSString stringWithFormat:@"%@ Tomorrow!",self.nextBirthdayAge];

                }

                else {

                    return @"Tomorrow!";

                }

            }

        }


        NSString *text = @"";


        if ([self.nextBirthdayAge intValue] > 0) {

            text = [NSString stringWithFormat:@"%@ on ",self.nextBirthdayAge];

        }


        static NSDateFormatter *dateFormatterPartial;


        if (dateFormatterPartial == nil) {

            dateFormatterPartial = [[NSDateFormatter alloc] init];

            [dateFormatterPartial setDateFormat:@"MMM d"];

        }


        return [text stringByAppendingFormat:@"%@",[dateFormatterPartial

    stringFromDate:self.nextBirthday]];

    }

    ```


    You should be able to read through and make sense of the code for the `remainingDaysUntilNextBirthday`
    and `isBirthdayToday` methods, but `birthdayTextToDisplay` needs some additional
    explanation. The most important line of code is the following one:


    ```

    NSDateComponents *components = [calendar components:NSMonthCalendarUnit|NSDayCalendarUnit

    fromDate:today toDate:self.nextBirthday options:0];

    ```


    `NSDateComponents` class can also be used to calculate the difference between
    two dates. By initializing the `NSDateComponents` instance with the `NSMonthCalendarUnit`
    and `NSDayCalendarUnit` unit flags, we can obtain the number of months and days
    between today and the friend’s next birthday. If both of these values are equal
    to 0, then the friend’s birthday must be today! Or if the month difference value
    is 0 and the day value is 1, then the friend’s next birthday is one day away—
    tomorrow!


    Be sure that your version of the app still compiles OK. You won’t see any differences
    in the app for the time being because we’ve yet to convert our birthdays array
    data model to the new Core Data storage model. We’re not even initializing our
    Core Data model yet in code. That’s our next task.'
