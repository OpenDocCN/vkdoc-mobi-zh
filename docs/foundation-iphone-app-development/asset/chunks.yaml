  trans: "\n### 使用 Segue 传递数据\n\n我们的下一个挑战是，当点击某个名人生日的单元格时，将`生日详情`视图控制器推送到主导航控制器上。有两种典型方式可以实现这一点。一种方法是在`tableView:didSelectRowAtIndexPath:`方法中扩展代码，创建一个新的视图控制器实例，然后将其推送到包含`主页`视图控制器的导航控制器上：\n\
    \n```\n[self.navigationController pushViewController:myViewControllerInstance\
    \ animated:YES];\n```\n\n然而，我们将坚持使用在第 5 章中学到的更直观的方法：通过故事板 Segue 推送视图控制器。从`主页`视图控制器中的原型表格单元格按住\
    \ Control 键拖动到`生日详情`视图控制器，然后释放并选择*推送* Segue 选项（参见图 7-10）。\n\n![图片](img/9781430243748_Fig07-10.jpg)\n\
    \n**图 7-10.** 从原型表格单元格创建推送 Segue\n\nXcode 会创建新的推送 Segue，并为我们之前在第 5 章中设置的`生日详情`视图控制器重新应用推断出的导航栏。现在，当原型表格单元格的任何实例被选中时，它都会将我们的`生日详情`视图控制器推送到导航栈中。\n\
    \n在`生日详情`视图控制器中添加一个新的图像视图（`UIImageView`）实例，将其位置设为 x=10, y=20，大小设为 71x71 点。保持新图像视图的选中状态，使用属性检查器，将视图模式更改为“Aspect\
    \ Fill”，并开启“Clip Subviews”（剪裁子视图），如图 7-11 所示。这样，当为该图像视图分配图片时，会得到一个裁剪工整的正方形缩略图，就像我们在第\
    \ 6 章中为编辑生日视图实现的那样。\n\n![图片](img/9781430243748_Fig07-11.jpg)\n\n**图 7-11.** 在生日详情视图中添加并配置用于显示正方形缩略图的图像视图\n\
    \n继续使用故事板，并借助助理编辑器布局，从新的图像视图按住 Control 键拖动，在`BRBirthdayDetailViewController.h`头文件中创建一个名为`photoView`的新输出口：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface\
    \ BRBirthdayDetailViewController : BRCoreViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UIImageView *photoView;\n\n@end\n```\n\n我们还要给`生日详情`视图控制器添加一个新的可变生日字典属性。当用户点击表格视图中的某个生日时，该属性由`主页`视图控制器进行设置。更新`BRBirthdayDetailViewController.h`，添加新的可变字典属性：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface\
    \ BRBirthdayDetailViewController : BRCoreViewController\n\n@property(nonatomic,strong)\
    \ NSMutableDictionary *birthday;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *photoView;\n\n@end\n```\n\n现在切换到`BRBirthdayDetailViewController.m`源码，扩展`BRBirthdayDetailViewController.m`中现有的`viewWillAppear:`方法，使其在每次详情视图出现时读取并渲染新生日字典属性的详细信息：\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    NSLog(@\"viewWillAppear\");\n    NSString *name = self.birthday[@\"name\"\
    ];\n    self.title = name;\n    UIImage *image = self.birthday[@\"image\"];\n\
    \    if (image == nil) {\n        //如果生日图片不存在，默认使用生日蛋糕图片\n        self.photoView.image\
    \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n   \
    \     self.photoView.image = image;\n    }\n}\n```\n\n设置视图控制器的`title`属性，当视图控制器在导航控制器内显示时，会更新导航栏上居中的文本。我们还会将新图像视图的图片值设为生日字典中包含的图片，如果没有图片，则回退使用蛋糕图片。\n\
    \n至此，我们已经完成了`生日详情`视图接收数据的准备工作。现在，我们把注意力转回`主页`视图控制器，并编写代码，以便在通过 Segue 转换将选中的生日字典推送到导航栈时，将其传递给`生日详情`视图控制器。\n"
- fmt: "# Understanding segue identifiers\n\nIn addition to view lifecycle methods\
    \ (`viewDidLoad`, `viewWillAppear:`, etc.), subclasses of Apple’s `UIViewController`\
    \ class can override callback methods that relate to segue transitions. That’s\
    \ exactly what we’re going to do now by overriding the `prepareForSegue:sender:`\
    \ method in our Home view controller class. Add the following new code to `BRHomeViewController.m`\
    \ implementation:\n\n```\n#pragma mark Segues\n\n-(void) prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    NSLog(@\"prepareForSegue!\");\n}\n```\n\n\
    If you build and run the app, you should see the newly added log statement, `prepareForSegue!`,\
    \ appear each time you select a celebrity birthday from the home screen; that\
    \ is, just at the point that the segue transition is invoked.\n\nIn the `prepareForSegue:sender:`\
    \ method, we are provided with a reference to the segue we added to our storyboard.\
    \ However, any code we add to `prepareForSegue:sender:` will be invoked for *any*\
    \ segue transition from our home screen to any other screen—our add birthday segue,\
    \ for example! We need to be able to identify which segue transition is currently\
    \ executing, and from that, we can determine the view controller that is transitioning\
    \ onto the screen and how to handle the event.\n\nIn your storyboard, select the\
    \ segue linking the Home view controller to the Birthday Detail view controller,\
    \ and using the attributes inspector, add a string identifier to the segue itself.\
    \ Name the segue identifier `BirthdayDetail` (see [Figure 7-12](#Chapter07.html#fig_7_12)).\n\
    \n![Image](images/9781430243748_Fig07-12.jpg)\n\n**Figure 7-12.** Adding a segue\
    \ identifier\n\nNow that we have a method for identifying which view controller\
    \ is being pushed or presented, we can extend `prepareForSegue:sender:` in our\
    \ `BRHomeViewController.m` implementation:\n\n```\n-(void) prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n     //NSLog(@\"prepareForSegue!\");\n     NSString\
    \ *identifier = segue.identifier;\n\n     if ([identifier isEqualToString:@\"\
    BirthdayDetail\"]) {\n         //First get the data\n         NSIndexPath *selectedIndexPath\
    \ = self.tableView.indexPathForSelectedRow;\n         NSMutableDictionary *birthday\
    \ = self.birthdays[selectedIndexPath.row];\n\n         BRBirthdayDetailViewController\
    \ *birthdayDetailViewController = segue.destinationViewController;\n         birthdayDetailViewController.birthday\
    \ = birthday;\n\n     }\n}\n```\n\nBefore I get into the details of this code,\
    \ you’ll need to first import `BRBirthdayDetailViewController.h` into `BRHomeViewController.m`.\
    \ Scroll up to the top of the `BRHomeViewController.m` source file and add the\
    \ import statement:\n\n```\n#import \"BRBirthdayDetailViewController.h\"\n```\n\
    \nExploring the `prepareForSegue:sender:` code, our home to birthday detail segue\
    \ has a `BirthdayDetail` identifier. We can check and access this string via the\
    \ `segue.identifier` property. If the identifier matches the `BirthdayDetail`\
    \ string, then we know that the current segue transition is between the Home and\
    \ Birthday Detail view controllers, and so the new view controller must be an\
    \ instance of `BRBirthdayDetailViewController`.\n\nWe can grab the selected birthday\
    \ dictionary by obtaining the index path of the currently selected table row:\n\
    \n```\nNSIndexPath *selectedIndexPath = self.tableView.indexPathForSelectedRow;\n\
    ```\n\nFrom the selected index path, we can extract the `row` property that matches\
    \ the index of the related birthday dictionary in our `self.birthdays` array.\n\
    \nThe segue also exposes a reference to the Birthday Detail view controller via\
    \ its `destinationViewController` property.\n\nFinally, we set the `birthday`\
    \ dictionary property of our detail view controller:\n\n```\nBRBirthdayDetailViewController\
    \ *birthdayDetailViewController = segue.destinationViewController;\nbirthdayDetailViewController.birthday\
    \ = birthday;\n```\n\nThis code runs before the Birthday Detail view controller\
    \ is added to the navigation stack, and so when `viewWillAppear:` is invoked in\
    \ the detail view controller, it already has access to the `birthday` dictionary\
    \ and can update its title and `photoView` image properties, respectively.\n\n\
    Build and run. The Birthday Detail view updates to display the selected celebrity\
    \ name in its navigation bar title and the image in the photo view (see [Figure\
    \ 7-13](#Chapter07.html#fig_7_13)).\n\n![Image](images/9781430243748_Fig07-13.jpg)\n\
    \n**Figure 7-13.** Passing data to an updating Birthday Detail view"
  raw: '#### Understanding segue identifiers


