    of getting your app into the hands of your users, don’t miss out on a perfect
    opportunity to increase the popularity ranking of your app in the App Store and
    to take advantage of marketing on social networks!'
  trans: '

    ### 生日详情视图


    当主视图控制器创建生日详情视图控制器和视图时，它还会将数据（生日数据）传递给生日详情视图控制器。生日详情视图控制器将动态更新其视图，以显示用户详细信息以及为此条目保存在数据库中的任何生日备忘。


    `生日提醒` 需要聚合三种类型的生日，但它们都将显示在同一个详情视图中：


    > - 从 iPhone 通讯录导入的生日

    > - 从 Facebook 导入的生日

    > - 手动添加到应用的生日


    ![Image](img/9781430243748_Fig01-05.jpg)


    **图 1-5.** (a) 显示 Facebook 导入结果的生日详情视图 (b) 显示通讯录导入结果的生日详情视图


    如果显示的生日是从 Facebook 导入的，那么 `生日提醒` 将允许用户在我们的应用内，直接使用 Apple 的社交框架和 Facebook 的 Graph
    API，在朋友的 Facebook 墙贴上一段生日祝福。


    如果此生日是从用户的 iPhone 通讯录导入的，那么我们的应用也能获取与该联系人关联的电话号码和电子邮件。添加直接链接，让用户可以通过短信、电话或电子邮件向朋友发送生日祝福，这是充分利用我们应用已获得的用户通讯录原生访问权限的好方法。


    ### 编辑生日与添加备忘：模态呈现


    我们应用中的生日数据将保持可编辑状态。因此，当用户查看生日详情视图时，我们将在导航栏中包含一个“编辑”按钮。点击后，我们的应用将展示当前生日详情的一个可编辑版本，用户将能够进行修改（参见图
    1-6 a）。


    你看到图 1-5 所示屏幕中生日图片下方的备忘图标了吗？当用户点击铅笔图标时，生日详情视图控制器将通过展示我们的备忘视图来响应此操作（参见图 1-6 b）。


    ![Image](img/9781430243748_Fig01-06.jpg)


    **图 1-6.** (a) 添加/编辑生日详情视图 (b) 编辑生日备忘视图


    这两种选择都使用户能够*编辑*他们当前在应用中查看的数据。我们需要向用户非常清晰地表明这一点。我们通过以模态方式呈现这些编辑视图来实现。同样，是父导航控制器负责从
    iPhone 屏幕底部以动画方式呈现这些模态视图。用户将看到“取消”和“保存”选项：两个非常清晰的选择，供他们操作数据模型。


    我们将使用 Apple 的 Core Data 框架来处理应用中所有本地数据的持久化。这带来了许多优势，例如，允许直接在应用中编辑任何生日——无论它是手动添加的，还是从用户的通讯录或
    Facebook 导入的。


    Core Data 是 Apple 的一个框架，用于对象图管理和数据持久化。Core Data 默认使用的后端存储是 SQLite 数据库，但也有一些其他的存储选项可供选择。尽管
    Core Data 通常被认为是一个高级主题，但我将向您介绍在应用中添加对象、文本和二进制数据持久化的基础知识；在我们的案例中，简单来说，就是能够在不同的使用会话之间保存和编辑生日（参见第
    8 章）。


    ### 原生 Facebook 集成


    因为 `生日提醒` 会维护自己的生日数据存储，所以我们将允许用户从 Facebook 中挑选他们想要导入应用的朋友（参见图 1-7 b），然后将生日数据、朋友姓名和个人资料图标
    URL 本地保存到我们的 Core Data 存储中。


    ![Image](img/9781430243748_Fig01-07.jpg)


    **图 1-7.** (a) 处理 Facebook 授权 (b) 准备从 Facebook 导入生日


    在 iOS 6 之前，Facebook 就支持并鼓励 iOS 开发者将社交功能集成到 iOS 应用中。在 iOS 6 中，Apple 已与 Facebook
    合作，将 Facebook 的单点登录机制直接集成到 iOS 平台中。


    在 iOS 6 中，Apple 加强了数据隐私保护，以确保用户在分享来自 Facebook 或通讯录的数据时需要主动选择加入。我们将学习如何处理授权流程（参见图
    1-7 a）。


    从通讯录导入视图的外观将与从 Facebook 导入视图完全相同，并附带多选和全选/全不选快捷键按钮。这些导入视图将以模态方式呈现在我们的应用中。当用户点击按钮从
    Facebook 好友列表或通讯录联系人导入时，他们将通过向存储中添加新生日来直接修改数据模型。以模态方式呈现这些导入视图，并为用户提供取消导入操作的选项，是合理的做法。


    ### 设置视图


    `生日提醒` 会根据其数据模型中存储的每个生日，在生日当天或之前触发本地的 iOS 通知。通过我们的设置视图，我们将允许用户设置何时想要收到提醒通知（参见图
    1-8 a、b 和 c）。


    ![Image](img/9781430243748_Fig01-08.jpg)


    **图 1-8.** (a) 主设置视图 (b) 提前天数设置视图 (c) 提醒时间设置视图


    设置视图也是添加推广链接的好地方。鼓励你的用户去撰写一个好评。增加你的 Facebook 点赞数，并让用户能够通过电子邮件、Twitter 或 Facebook
    分享你的应用。你已经付出了所有艰辛努力让应用到达用户手中，不要错过这个绝佳的机会来提高你的应用在 App Store 中的流行度排名，并充分利用社交网络上的营销！

