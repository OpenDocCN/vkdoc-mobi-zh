    \ BRDBirthday;\n\n@interface BRNotesEditViewController : BRCoreViewController\
    \ <UITextViewDelegate>\n\n@property(nonatomic,strong) BRDBirthday *birthday;\n\
    @property (weak, nonatomic) IBOutlet UIBarButtonItem *saveButton;\n@property (weak,\
    \ nonatomic) IBOutlet UITextView *textView;\n\n@end\n```\n\n在 `BRNotesEditViewController.m`\
    \ 中导入 `BRDBirthday` 和 `BRDModel`，并合成新的 `birthday` 属性：\n\n```\n#import \"BRNotesEditViewController.h\"\
    \n#import \"BRDModel.h\"\n#import \"BRDBirthday.h\"\n```\n\n与生日编辑和详情视图控制器类似，我们将在视图即将显示时，根据生日实体内容更新视图：\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    self.textView.text = self.birthday.notes;\n    [self.textView becomeFirstResponder];\n\
    }\n```\n\n当用户修改生日备注时，我们将同步更新生日实体：\n\n```\n- (void)textViewDidChange:(UITextView\
    \ *)textView\n{\n    //NSLog(@\"用户修改了备注文本: %@\",textView.text);\n    self.birthday.notes\
    \ = self.textView.text;\n}\n```\n\n最后，与编辑生日视图控制器一样，当用户点击“取消”或“保存”按钮时，我们会调用模型单例来保存或取消用户的修改：\n\
    \n```\n- (IBAction)cancelAndDismiss:(id)sender {\n    [[BRDModel sharedInstance]\
    \ cancelChanges];\n    [super cancelAndDismiss:sender];\n}\n\n- (IBAction)saveAndDismiss:(id)sender\n\
    {\n    [[BRDModel sharedInstance] saveChanges];\n    [super saveAndDismiss:sender];\n\
    }\n```\n\n为了让我们的辛勤工作得以体现，我们仍需在通过转场呈现备注编辑器时，将生日详情视图控制器中正在查看的生日实体引用传递进去。打开你的故事板，找到生日详情视图控制器与编辑生日导航视图控制器之间的转场。选中该转场，然后输入标识符\
    \ `EditNotes`（见图 8-15）。\n\n![图片](img/9781430243748_Fig08-15.jpg)\n\n**图 8-15.**\
    \ 为备注编辑器导航控制器添加转场标识符\n\n现在打开 `BRBirthdayDetailViewController.m`，并导入备注编辑器视图控制器：\n\
    \n```\n#import \"BRNotesEditViewController.h\"\n```\n\n然后更新 `prepareForSegue:sender:`\
    \ 方法，使其在呈现备注编辑器时传递其生日实体的引用：\n\n```\n-(void) prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    NSString *identifier = segue.identifier;\n\
    \n    if ([identifier isEqualToString:@\"EditBirthday\"]) {\n        //编辑此生日\n\
    \        UINavigationController *navigationController = segue.destinationViewController;\n\
    \n        BRBirthdayEditViewController *birthdayEditViewController =\n(BRBirthdayEditViewController\
    \ *) navigationController.topViewController;\n        birthdayEditViewController.birthday\
    \ = self.birthday;\n    }\n    else if ([identifier isEqualToString:@\"EditNotes\"\
    ]) {\n        //编辑此生日\n        UINavigationController *navigationController =\
    \ segue.destinationViewController;\n\n        BRNotesEditViewController *birthdayNotesEditViewController\
    \ = (BRNotesEditViewController *) navigationController.topViewController;\n  \
    \      birthdayNotesEditViewController.birthday = self.birthday;\n    }\n}\n```\n\
    \n编译并运行。选择一个名人或你自己添加的生日。编辑与该生日关联的备注并保存。重复此过程几次。你会发现备注在多次运行之间依然保持。\n\n### 清理工作\n\
    \n既然我们已经完成了 Core Data 存储的实现，可以移除 `BRHomeViewController.m` 中冗余的生日数组属性：\n\n```\n\
    @interface BRHomeViewController ()\n\n//@property (nonatomic,strong) NSMutableArray\
    \ *birthdays;\n@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;\n\
    \n@end\n```\n\n就这样。Core Data 部分大功告成！编译并运行。现在你应该能够添加和编辑生日、照片以及备注。所有修改会立即在所有视图控制器中反映，即使关闭了\
    \ *Birthday Reminder* 应用也不受影响。这就是 Core Data 的魅力所在。\n\n![图片](img/9781430243748_Fig08-16.jpg)\n\
    \n**图 8-16.** 生日快乐凯蒂！\n\n### 总结\n\n恭喜你顺利完成了 Core Data 章节！这是本书中最难的部分之一。因为 Core\
    \ Data 是一个相当高级的 iOS 框架，你今天上午消化了大量新知识。我们只是浅尝了其能力的一角，但对于持久化存储生日数据——乃至其他任何数据类型——Core\
    \ Data 确实是首选方案。\n\n今天下午，我们将探讨 iOS 界面美化的方法，以及如何让 *Birthday Reminder* 变得更美观。所以快去快速吃个午饭——一小时后我们继续！\n\
    \n![图片](img/ch.jpg)\n\n## 第 9 章\n"
- fmt: "# iOS Skinning: Make Your Apps Lickable\n\nBy the end of today, our *Birthday\
    \ Reminder* app is going to look very much like the final product. We’re not going\
    \ to add a load of new features this afternoon; instead, our work will focus on\
    \ improving the look and feel of our user interface and making it stand out from\
    \ the hundreds of other birthday reminder apps in the App Store.\n\nBut before\
    \ we dive into code, let’s take a moment out of our busy iPhone developer day\
    \ to let me tell you a short story. One beautiful spring day last year, I was\
    \ at the park with my nine-year-old son, eating ice cream in the sun. We had a\
    \ bit of an accident with the ice cream and big blob of it landed on my iPhone.\
    \ As is the way in the modern world, soon my Twitter followers were treated to\
    \ the breaking news that I had just licked my iPhone (see [Figure 9-1](#Chapter09.html#fig_9_1)).\n\
    \n![Image](images/9781430243748_Fig09-01.jpg)\n\n**Figure 9-1.** Ice cream and\
    \ iPhones don’t mix well together!\n\nNo context. I just had to lick my iPhone.\
    \ Ice cream aside, these days we iOS users are treated to more and more beautiful\
    \ user interface design. I put it to you that some iPhone apps are just so darn\
    \ beautiful and the user-experience so utterly polished that you do want to grab\
    \ these apps and lick ’em! Or is that just me? So we’re going to call these *lickable*\
    \ apps from now on! ![Image](images/smile.jpg)\n\nI want my apps to have that\
    \ lickable quality. What is it that makes these apps stand out? What makes an\
    \ app lickable?\n\n## What makes an app lickable?\n\nGreat design is influenced\
    \ by personal choice, so here are a few of my favorite iPhone app user interface\
    \ designs (see [Figure 9-2](#Chapter09.html#fig_9_2)). I’ve selected AirBnB, Jamie’s\
    \ Recipes, Momento, and Path. These apps all have beautiful user interface designs\
    \ and icons. They stand out from the hundreds of thousands of apps that iPhone\
    \ users get to pick and choose from. It’s not enough anymore just to have a great\
    \ idea for an app. Your app needs the level of polish and quality that these kind\
    \ of chart-leading apps bring to the table.\n\n![Image](images/9781430243748_Fig09-02.jpg)\n\
    \n**Figure 9-2.** A selection of lickable apps: AirBnB, Jamie’s Recipes, Momento,\
    \ Path\n\nSo let’s look a little more closely at these example apps. What makes\
    \ them lickable? Design-wise, what do these four apps have in common? Here’s what\
    \ I’ve noticed. All of them have made extensive use of common user interface components\
    \ that Apple has included in the iOS SDK. Navigation bars, toolbars, table views,\
    \ image views, and so on. Even though these apps each have a unique, exquisite\
    \ design, iPhone users instantly recognize the common user controls that we use\
    \ every day in most other iPhone apps. We know to flick and scroll a table view—it\
    \ comes instinctively because it’s deeply integrated into the Apple iOS user experience.\
    \ We know that the navigation bar for all of these apps will keep us updated on\
    \ our location in the app hierarchy. We know what the tab bar at the bottom of\
    \ the first three apps is for—we’ll happily jump between the top section levels\
    \ and won’t get lost or confused by the app navigation.\n\nThese apps all have\
    \ beautiful and distinctive designs, and at the same time, they are immediately\
    \ user-friendly for regular iOS users. As a user, I don’t want to have to learn\
    \ how to use your app. I don’t want to have to trawl through any help pages to\
    \ get up and running, I just want the experience to be intuitive. How many of\
    \ Apple’s own apps include a Help section? Zero, that’s how many!\n\nThe lesson\
    \ to learn here is that you can make beautiful apps without breaking the rules\
    \ of the HIG (Apple’s Human Interface Guidelines) by attempting to create a new\
    \ kind of user experience simply to be original. It’s not worth it! One of the\
    \ main reasons that the iPhone has been so phenomenally successful comes down\
    \ to the software and user experience conventions that Apple invented and then\
    \ opened to third-party developers. We already have the tools to make wonderful\
    \ user interfaces, and now with iOS 5 and 6, we have so many new ways to reskin\
    \ the existing `UIKit` components that we can make beautiful, lickable apps very\
    \ efficiently.\n\n*Tip: I recommend that you read and learn the HIG, Apple’s iOS\
    \ Human Interface Guidelines document. You’ll find it on Apple’s web site at*\
    \ [`http://developer.apple.com/library/ios/#DOCUMENTATION/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html)`.`\n\
    \nIf you’re not a designer, then I suggest you flick back to [Chapter 1](#Chapter01.html#ch1)\
    \ at some point and have a reread through my description of the design process\
    \ I work through for each app I build.\n\n> 1.  Sketch out every screen on paper.\n\
    > 2.  Find a designer on dribbble.com to turn your sketches into beautiful, retina\
    \ Photoshop designs.\n> 3.  Get skinning. We’ll cover it in detail throughout\
    \ this chapter.\n\n## Let’s get skinning!\n\nThe rules for skinning iOS apps are\
    \ not set in stone. There’s no CSS. There’s no XML user interface layout language\
    \ or equivalent. The code for skinning iOS components is just that: code. Objective-C\
    \ code.\n\n### Create a core view controller\n\nRemember how we created a core\
    \ view controller back in [Chapter 5](#Chapter05.html#ch5)? Every view controller\
    \ in our app subclasses `BRCoreViewController`, which in turn subclasses Apple’s\
    \ `UIViewController`. We did this to take advantage of object-oriented programming,\
    \ whereby we can centralize common code and logic into the core view controller.\
    \ That’s how we made the background of every view in our app a gray color. This\
    \ existing code in `BRCoreViewController` makes every main screen view a gray\
    \ color.\n\n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.view.backgroundColor\
    \ = [UIColor grayColor];\n}\n```\n\nThe *Birthday Reminder* user interface design\
    \ makes extensive use of a dark, checkered background image. So let’s add this\
    \ background image to every view controlled by a `BRCoreViewController` subclass.\n\
    \nAdd `app-background.png` and `app-background@2x.png` image files to your project.\
    \ You’ll find them in the assets folder within the source code for this chapter.\
    \ Now add two more lines of code to `BRCoreViewController`’s `viewDidLoad` method:\n\
    \n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n    self.view.backgroundColor\
    \ = [UIColor grayColor];\n    UIImageView *backgroundView = [[UIImageView alloc]\
    \ initWithImage:[UIImage\nimageNamed:@\"app-background.png\"]];\n    [self.view\
    \ insertSubview:backgroundView atIndex:0];\n}\n```\n\nBuild and run. Our background\
    \ image is now set on every screen (see [Figure 9-3](#Chapter09.html#fig_9_3)).\
    \ How cool was that?!\n\n![Image](images/9781430243748_Fig09-03.jpg)\n\n**Figure\
    \ 9-3.** By adding just two lines of code, the checkered background image now\
    \ appears in the view of every view controller subclass of `BRCoreViewController`\
    \ in our app.\n\n*Note: Apple’s* `UIImageView` *class caches images generated\
    \ via the *`imageNamed:`* class method, so even though this method will be called\
    \ by every view controller in our app, the image is only loaded into memory by\
    \ iOS once.*\n\nOn retina devices, `UIImageView` automatically loads the `app-background@2x.png`\
    \ version of our background image simply because of the `@2x` naming convention.\
    \ You do need to ensure that your `@2x` images are exactly double the width and\
    \ height of your non-retina images. So for this image, the non-retina `app-background.png`\
    \ image file is 320×460 pixels and the retina version is 640×920 pixels to fill\
    \ the iPhone screen (minus the status bar)."
  raw: '## iOS Skinning: Make Your Apps Lickable


    By the end of today, our *Birthday Reminder* app is going to look very much like
    the final product. We’re not going to add a load of new features this afternoon;
    instead, our work will focus on improving the look and feel of our user interface
    and making it stand out from the hundreds of other birthday reminder apps in the
    App Store.


    But before we dive into code, let’s take a moment out of our busy iPhone developer
    day to let me tell you a short story. One beautiful spring day last year, I was
    at the park with my nine-year-old son, eating ice cream in the sun. We had a bit
    of an accident with the ice cream and big blob of it landed on my iPhone. As is
    the way in the modern world, soon my Twitter followers were treated to the breaking
    news that I had just licked my iPhone (see [Figure 9-1](#Chapter09.html#fig_9_1)).


    ![Image](images/9781430243748_Fig09-01.jpg)


    **Figure 9-1.** Ice cream and iPhones don’t mix well together!


    No context. I just had to lick my iPhone. Ice cream aside, these days we iOS users
    are treated to more and more beautiful user interface design. I put it to you
    that some iPhone apps are just so darn beautiful and the user-experience so utterly
    polished that you do want to grab these apps and lick ’em! Or is that just me?
    So we’re going to call these *lickable* apps from now on! ![Image](images/smile.jpg)


    I want my apps to have that lickable quality. What is it that makes these apps
    stand out? What makes an app lickable?


    ### What makes an app lickable?


    Great design is influenced by personal choice, so here are a few of my favorite
    iPhone app user interface designs (see [Figure 9-2](#Chapter09.html#fig_9_2)).
    I’ve selected AirBnB, Jamie’s Recipes, Momento, and Path. These apps all have
    beautiful user interface designs and icons. They stand out from the hundreds of
    thousands of apps that iPhone users get to pick and choose from. It’s not enough
    anymore just to have a great idea for an app. Your app needs the level of polish
    and quality that these kind of chart-leading apps bring to the table.


    ![Image](images/9781430243748_Fig09-02.jpg)


    **Figure 9-2.** A selection of lickable apps: AirBnB, Jamie’s Recipes, Momento,
    Path


    So let’s look a little more closely at these example apps. What makes them lickable?
    Design-wise, what do these four apps have in common? Here’s what I’ve noticed.
    All of them have made extensive use of common user interface components that Apple
    has included in the iOS SDK. Navigation bars, toolbars, table views, image views,
    and so on. Even though these apps each have a unique, exquisite design, iPhone
    users instantly recognize the common user controls that we use every day in most
    other iPhone apps. We know to flick and scroll a table view—it comes instinctively
    because it’s deeply integrated into the Apple iOS user experience. We know that
    the navigation bar for all of these apps will keep us updated on our location
    in the app hierarchy. We know what the tab bar at the bottom of the first three
    apps is for—we’ll happily jump between the top section levels and won’t get lost
    or confused by the app navigation.


    These apps all have beautiful and distinctive designs, and at the same time, they
    are immediately user-friendly for regular iOS users. As a user, I don’t want to
    have to learn how to use your app. I don’t want to have to trawl through any help
    pages to get up and running, I just want the experience to be intuitive. How many
    of Apple’s own apps include a Help section? Zero, that’s how many!


    The lesson to learn here is that you can make beautiful apps without breaking
    the rules of the HIG (Apple’s Human Interface Guidelines) by attempting to create
    a new kind of user experience simply to be original. It’s not worth it! One of
    the main reasons that the iPhone has been so phenomenally successful comes down
    to the software and user experience conventions that Apple invented and then opened
    to third-party developers. We already have the tools to make wonderful user interfaces,
    and now with iOS 5 and 6, we have so many new ways to reskin the existing `UIKit`
    components that we can make beautiful, lickable apps very efficiently.


    *Tip: I recommend that you read and learn the HIG, Apple’s iOS Human Interface
    Guidelines document. You’ll find it on Apple’s web site at* [`http://developer.apple.com/library/ios/#DOCUMENTATION/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html)`.`


    If you’re not a designer, then I suggest you flick back to [Chapter 1](#Chapter01.html#ch1)
    at some point and have a reread through my description of the design process I
    work through for each app I build.


    > 1.  Sketch out every screen on paper.

    > 2.  Find a designer on dribbble.com to turn your sketches into beautiful, retina
    Photoshop designs.

    > 3.  Get skinning. We’ll cover it in detail throughout this chapter.


    ### Let’s get skinning!


    The rules for skinning iOS apps are not set in stone. There’s no CSS. There’s
    no XML user interface layout language or equivalent. The code for skinning iOS
    components is just that: code. Objective-C code.


    #### Create a core view controller


    Remember how we created a core view controller back in [Chapter 5](#Chapter05.html#ch5)?
    Every view controller in our app subclasses `BRCoreViewController`, which in turn
    subclasses Apple’s `UIViewController`. We did this to take advantage of object-oriented
    programming, whereby we can centralize common code and logic into the core view
    controller. That’s how we made the background of every view in our app a gray
    color. This existing code in `BRCoreViewController` makes every main screen view
    a gray color.


    `-(void) viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    self.view.backgroundColor = [UIColor grayColor];`

    `}`


    The *Birthday Reminder* user interface design makes extensive use of a dark, checkered
    background image. So let’s add this background image to every view controlled
    by a `BRCoreViewController` subclass.


    Add `app-background.png` and `app-background@2x.png` image files to your project.
    You’ll find them in the assets folder within the source code for this chapter.
    Now add two more lines of code to `BRCoreViewController`’s `viewDidLoad` method:


    `-(void) viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    self.view.backgroundColor = [UIColor grayColor];`

    **`UIImageView *backgroundView = [[UIImageView alloc] initWithImage:[UIImage`

    `imageNamed:@"app-background.png"]];`**

    **`    [self.view insertSubview:backgroundView atIndex:0];`**

    `}`


    Build and run. Our background image is now set on every screen (see [Figure 9-3](#Chapter09.html#fig_9_3)).
    How cool was that?!


    ![Image](images/9781430243748_Fig09-03.jpg)


    **Figure 9-3.** By adding just two lines of code, the checkered background image
    now appears in the view of every view controller subclass of  BRCoreViewController
    in our app.


    *Note: Apple’s* `UIImageView` *class caches images generated via the *`imageNamed:`*
    class method, so even though this method will be called by every view controller
    in our app, the image is only loaded into memory by iOS once.*


    On retina devices, `UIImageView` automatically loads the `app-background@2x.png`
    version of our background image simply because of the `@2x` naming convention.
    You do need to ensure that your `@2x` images are exactly double the width and
    height of your non-retina images. So for this image, the non-retina `app-background.png`
    image file is 320×460 pixels and the retina version is 640×920 pixels to fill
    the iPhone screen (minus the status bar).'
  trans: "\n# iOS 界面美化：让你的应用“秀色可餐”\n\n到今天结束时，我们的*生日提醒*应用将非常接近最终产品。今天下午我们不会添加大量新功能；相反，我们的工作将集中在改进用户界面的外观和感觉上，让它从\
    \ App Store 中成百上千个其他生日提醒应用中脱颖而出。\n\n但在深入代码之前，让我们从忙碌的 iPhone 开发者日程中抽点时间，听我讲一个小故事。去年一个美丽的春日，我和九岁的儿子在公园里，沐浴着阳光吃冰淇淋。冰淇淋出了点小意外，一大块掉在了我的\
    \ iPhone 上。就像现代世界的惯例一样，我的 Twitter 粉丝们很快就收到了这条爆炸性新闻：我刚刚舔了我的 iPhone（见图 9-1）。\n\n\
    ![图片](img/9781430243748_Fig09-01.jpg)\n\n**图 9-1.** 冰淇淋和 iPhone 真的不搭！\n\n没有上下文。我就是不得不舔了我的\
    \ iPhone。撇开冰淇淋不谈，如今我们 iOS 用户享受到的漂亮用户界面设计越来越多。我认为有些 iPhone 应用实在太美，用户体验打磨得如此精致，以至于你会忍不住想抓住这些应用狠狠舔上一口！还是只有我这样想？所以从现在开始，我们就称它们为*秀色可餐*的应用吧！![图片](img/smile.jpg)\n\
    \n我希望我的应用也具有这种“秀色可餐”的品质。是什么让这些应用脱颖而出？是什么让一个应用“秀色可餐”？\n\n## 是什么让一个应用“秀色可餐”？\n\n\
    伟大的设计受到个人偏好的影响，以下是我最喜欢的一些 iPhone 应用用户界面设计（见图 9-2）。我选择了 AirBnB、Jamie's Recipes、Momento\
    \ 和 Path。这些应用都拥有漂亮的用户界面设计和图标。它们从 iPhone 用户可以挑选的成千上万个应用中脱颖而出。仅仅为应用拥有一个好主意已经不够了。你的应用需要达到这些排行榜领先应用所带来的那种精致水平和质量。\n\
    \n![图片](img/9781430243748_Fig09-02.jpg)\n\n**图 9-2.** 一系列“秀色可餐”的应用：AirBnB、Jamie's\
    \ Recipes、Momento、Path\n\n那么，让我们更仔细地看看这些示例应用。是什么让它们“秀色可餐”？从设计来看，这四个应用有什么共同点？以下是我的观察。它们都广泛使用了苹果在\
    \ iOS SDK 中包含的通用用户界面组件。比如导航栏、工具栏、表格视图、图像视图等等。尽管这些应用各有独特、精美的设计，但 iPhone 用户能立即认出那些我们在大多数其他\
    \ iPhone 应用中每天使用的通用用户控件。我们知道如何轻拂和滚动表格视图——这几乎是本能，因为它已经深植于苹果 iOS 用户体验中。我们知道所有这些应用的导航栏会告知我们在应用层级中的当前位置。我们知道前三个应用底部的标签栏是干什么用的——我们可以愉快地在顶层部分之间切换，而不会迷失方向或被应用导航搞糊涂。\n\
    \n这些应用都有漂亮且独特的设计，同时对于普通 iOS 用户来说又非常友好。作为一名用户，我不想费劲去学习如何使用你的应用。我不想翻阅任何帮助页面才能开始使用，我只希望体验是直观的。苹果自己的应用有多少包含“帮助”部分？零个，没错就是零！\n\
    \n这里的教训是：你可以制作出漂亮的应用，而不必为了追求原创而试图创造一种新的用户体验，从而打破 HIG（苹果人机界面指南）的规则。这不值得！iPhone\
    \ 取得如此巨大成功的主要原因之一，在于苹果发明并随后向第三方开发者开放的那些软件和用户体验惯例。我们已经拥有了制作出色用户界面的工具，而现在通过 iOS\
    \ 5 和 6，我们有了许多重新定义现有`UIKit`组件外观的新方法，可以非常高效地制作出漂亮、“秀色可餐”的应用。\n\n*提示：我建议你阅读并学习 HIG，即苹果的\
    \ iOS 人机界面指南文档。你可以在苹果网站上找到它：* [`http://developer.apple.com/library/ios/#DOCUMENTATION/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html)`.`\n\
    \n如果你不是设计师，那么我建议你稍后翻回第 1 章，重新阅读一下我对我为每个应用构建时所采用的设计流程的描述。\n\n> 1.  在纸上草绘出每一个屏幕。\n\
    > 2.  在 dribbble.com 上找一位设计师，将你的草图变成漂亮的 Retina 级别 Photoshop 设计图。\n> 3.  开始美化界面。我们将在本章详细讨论。\n\
    \n## 让我们开始美化界面吧！\n\niOS 应用界面美化的规则并非一成不变。没有 CSS。没有 XML 用户界面布局语言或类似的东西。用于美化 iOS\
    \ 组件外观的代码就是：代码。Objective-C 代码。\n\n### 创建核心视图控制器\n\n还记得我们在第 5 章中是如何创建核心视图控制器的吗？我们应用中的每个视图控制器都继承自`BRCoreViewController`，而`BRCoreViewController`又继承自苹果的`UIViewController`。我们这样做是为了利用面向对象编程的优势，通过将通用代码和逻辑集中到核心视图控制器中。这就是我们让应用中每个视图的背景都成为灰色的方法。`BRCoreViewController`中已有的这段代码使每个主屏幕视图都变成灰色。\n\
    \n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.view.backgroundColor\
    \ = [UIColor grayColor];\n}\n```\n\n*生日提醒*用户界面设计大量使用了一种深色的棋盘格背景图像。那么，让我们将这个背景图像添加到所有由`BRCoreViewController`子类控制的视图中。\n\
    \n将`app-background.png`和`app-background@2x.png`图像文件添加到你的项目中。你可以在本章源代码的 assets\
    \ 文件夹中找到它们。现在，在`BRCoreViewController`的`viewDidLoad`方法中添加两行代码：\n\n```\n-(void)\
    \ viewDidLoad\n{\n    [super viewDidLoad];\n    self.view.backgroundColor = [UIColor\
    \ grayColor];\n    UIImageView *backgroundView = [[UIImageView alloc] initWithImage:[UIImage\n\
    imageNamed:@\"app-background.png\"]];\n    [self.view insertSubview:backgroundView\
    \ atIndex:0];\n}\n```\n\n构建并运行。现在我们的背景图像已设置在每个屏幕上（见图 9-3）。这有多酷？！\n\n![图片](img/9781430243748_Fig09-03.jpg)\n\
    \n**图 9-3.** 仅通过添加两行代码，棋盘格背景图像现在出现在我们应用中每个`BRCoreViewController`子类视图控制器的视图中。\n\
    \n*注意：苹果的* `UIImageView` *类会缓存通过`imageNamed:`类方法生成的图像，所以即使这个方法会被我们应用中的每个视图控制器调用，iOS\
    \ 也只会将图像加载到内存一次。*\n\n在 Retina 设备上，`UIImageView`会自动加载背景图像的`app-background@2x.png`版本，这仅仅是因为`@2x`命名约定。你需要确保你的`@2x`图像的宽度和高度恰好是非\
    \ Retina 图像的两倍。因此，对于这张图片，非 Retina 的`app-background.png`图像文件大小为 320×460 像素，而 Retina\
    \ 版本为 640×920 像素，以填充 iPhone 屏幕（减去状态栏）。\n"
- fmt: "### Custom table view cells\n\nLet’s take a closer look at the Photoshop design\
    \ for our table of home screen birthdays (see [Figure 9-4](#Chapter09.html#fig_9_4)).\n\
    \n![Image](images/9781430243748_Fig09-04.jpg)\n\n**Figure 9-4.** Close-up of the\
    \ custom table cell design\n\nThe standard Apple table cell styles support a maximum\
    \ of two labels: an image and an accessory view on the right side of the table\
    \ cell. This won’t be enough to meet the requirements of our custom design (see\
    \ [Figure 9-5](#Chapter09.html#fig_9_5)). Take a look at the birthday reminder\
    \ cells for Nicole and Nick Kuh. Each cell has four labels: one for the friend’s\
    \ name, one for the birthday text, one for the number of days until the next birthday,\
    \ and one for the *more days* or *more day* text. In addition, the thumbnail image\
    \ view for each friend has round corners, and it nicely centers and crops portrait\
    \ and landscape images. This isn’t the default behavior for the `imageView` property\
    \ of the `UITableViewCell` class. We’ll have to subclass `UITableViewCell` and\
    \ create a custom table cell for reuse when displaying birthdays.\n\nOpen the\
    \ storyboard file in Xcode, then center and focus in on the home view controller\
    \ scene. Select the prototype table cell. Using the attributes inspector, change\
    \ the style of the cell to Custom. Change the Selection parameter to None. Get\
    \ rid of the disclosure indicator (right arrow) by changing the accessory setting\
    \ to None.\n\n![Image](images/9781430243748_Fig09-05.jpg)\n\n**Figure 9-5.** Creating\
    \ a custom table view cell\n\nAdd two image views to the custom table cell by\
    \ dragging them in from the Object Library. Using the size inspector, position\
    \ one image view (x=11 points and y=13 points) and set both its width and height\
    \ to 52 points. This will be the icon view that displays photos of our friends.\
    \ Keeping the icon image view selected, use the attributes inspector to change\
    \ the view’s Mode value to Aspect Fill, and switch on the Clip Subviews option\
    \ (see [Figure 9-6](#Chapter09.html#fig_9_6)).\n\n![Image](images/9781430243748_Fig09-06.jpg)\n\
    \n**Figure 9-6.** Configuring the icon image view\n\nNow select the second image\
    \ view you added. We’ll use this image view to display either a calendar icon\
    \ background behind the remaining days’ labels or a birthday cake image if it’s\
    \ our friend’s birthday today. Position the second image view (x=261 points, y=14\
    \ points) and set its width to 48 points and height to 50 points. We’re going\
    \ to set the default background of this image right in our storyboard. From the\
    \ assets folder in the source code, locate and add the `icon-days-remaining.png`\
    \ and `icon-days-remaining@2x.png` image files to your project. Now set the `Image`\
    \ property of the right-side image view to the newly added `icon-days-remaining.png`\
    \ file using the attributes inspector, as shown in [Figure 9-7](#Chapter09.html#fig_9_7).\n\
    \n![Image](images/9781430243748_Fig09-07.jpg)\n\n**Figure 9-7.** Configuring the\
    \ days remaining background image view\n\nDrag and drop four label view instances\
    \ onto your custom table view cell. Using a combination of the attributes inspector\
    \ to set the font attributes and the size inspector to set the position and size,\
    \ configure the four labels as shown in [Table 9-1](#Chapter09.html#tab_9_1).\n\
    \n![Image](images/tab9-1.jpg)\n\nThe end result should look like [Figure 9-8](#Chapter09.html#fig_9_8).\n\
    \n![Image](images/9781430243748_Fig09-08.jpg)\n\n**Figure 9-8.** Configuring our\
    \ prototype cell’s labels and image views\n\nWe’ve added and configured all the\
    \ custom subviews required for our birthday table view cell, but until we hook\
    \ up some outlets to the subviews, we don’t have any way to target and style the\
    \ labels or image views. The question is where do we define these outlets? Not\
    \ in our home view controller. The custom prototype cell that we’ve been working\
    \ on is going to be the view layout that iOS will use when generating reusable\
    \ instances of Apple’s `UITableViewCell` class. So the logical way to create a\
    \ custom table view cell with custom subviews is by subclassing `UITableViewCell`.\n\
    \nAdd a `components` folder to your `user-interface` folder in the Finder, and\
    \ then add the `components` folder as a new group in your Xcode project. In the\
    \ project navigator, select the newly added `components` group and create a new\
    \ Objective-C class file within it. Name your subclass `BRBirthdayTableViewCell`\
    \ and select `UITableViewCell` from the drop-down menu of the Subclass of text\
    \ field (see [Figure 9-9](#Chapter09.html#fig_9_9)).\n\n![Image](images/9781430243748_Fig09-09.jpg)\n\
    \n**Figure 9-9.** Subclassing `UITableViewCell`\n\nOnce you’ve created the new\
    \ `BRBirthdayTableViewCell` class, open the header and source files in the Assistant\
    \ Editor layout, and add the following code for each:\n\n`BRBirthdayTableViewCell.h:`\n\
    \n```\n#import <UIKit/UIKit.h>\n@class BRDBirthday;\n@interface BRBirthdayTableViewCell\
    \ : UITableViewCell\n@property(nonatomic,strong) BRDBirthday *birthday;\n@property\
    \ (nonatomic, weak) IBOutlet UIImageView* iconView;\n@property (nonatomic, weak)\
    \ IBOutlet UIImageView* remainingDaysImageView;\n@property (nonatomic, weak) IBOutlet\
    \ UILabel* nameLabel;\n@property (nonatomic, weak) IBOutlet UILabel* birthdayLabel;\n\
    @property (nonatomic, weak) IBOutlet UILabel* remainingDaysLabel;\n@property (nonatomic,\
    \ weak) IBOutlet UILabel* remainingDaysSubTextLabel;\n@end\n```\n\nSource:\n\n\
    ```\n#import \"BRBirthdayTableViewCell.h\"\n#import \"BRDBirthday.h\"\n@implementation\
    \ BRBirthdayTableViewCell\n-(void) setBirthday:(BRDBirthday *)birthday\n{\n  \
    \  _birthday = birthday;\n    self.nameLabel.text = _birthday.name;\n    int days\
    \ = _birthday.remainingDaysUntilNextBirthday;\n    if (days == 0) {\n        //Birthday\
    \ is today!\n        self.remainingDaysLabel.text = self.remainingDaysSubTextLabel.text\
    \ = @\"\";\n        self.remainingDaysImageView.image = [UIImage imageNamed:@\"\
    icon-birthday-cake.png\"];\n    }\n    else {\n        self.remainingDaysLabel.text\
    \ = [NSString stringWithFormat:@\"%d\",days];\n        self.remainingDaysSubTextLabel.text\
    \ = (days == 1) ? @\"more day\" : @\"more days\";\n        self.remainingDaysImageView.image\
    \ = [UIImage imageNamed:@\"icon-days-remaining.png\"];\n    }\n    self.birthdayLabel.text\
    \ = _birthday.birthdayTextToDisplay;\n}\n@end\n```\n\nTable view cells get reused.\
    \ This makes scrolling a long table very efficient because the table view reuses\
    \ just a few table cells to give the impression of a very long table of rows.\
    \ We’ve created a `birthday` property on our custom table view cell. When the\
    \ home view controller configures each table view cell, it will pass the `birthday`\
    \ entity to the table view cell via `cell.birthday = aBirthday`. By overriding\
    \ the birthday setter of our table view cell, we can update the labels and images\
    \ of our table cell whenever the birthday property is set.\n\nLet’s leave the\
    \ `BRBirthdayTableViewCell` class files for the time being and return to the storyboard.\
    \ With the custom table view cell selected, we can change the class of the prototype\
    \ cell using the Identity Inspector. `BRBirthdayTableViewCell` will be recognized\
    \ automatically by Xcode because it’s a `UITableViewCell` subclass (see [Figure\
    \ 9-10](#Chapter09.html#fig_9_10)).\n\n![Image](images/9781430243748_Fig09-10.jpg)\n\
    \n**Figure 9-10.** Assigning our custom class to the table view cell prototype\
    \ with the identity inspector"
  raw: '#### Custom table view cells


    Let’s take a closer look at the Photoshop design for our table of home screen
    birthdays (see [Figure 9-4](#Chapter09.html#fig_9_4)).


    ![Image](images/9781430243748_Fig09-04.jpg)


    **Figure 9-4.** Close-up of the custom table cell design


    The standard Apple table cell styles support a maximum of two labels: an image
    and an accessory view on the right side of the table cell. This won’t be enough
    to meet the requirements of our custom design (see [Figure 9-5](#Chapter09.html#fig_9_5)).
    Take a look at the birthday reminder cells for Nicole and Nick Kuh. Each cell
    has four labels: one for the friend’s name, one for the birthday text, one for
    the number of days until the next birthday, and one for the *more days* or *more
    day* text. In addition, the thumbnail image view for each friend has round corners,
    and it nicely centers and crops portrait and landscape images. This isn’t the
    default behavior for the `imageView` property of the `UITableViewCell` class.
    We’ll have to subclass `UITableViewCell` and create a custom table cell for reuse
    when displaying birthdays.


    Open the storyboard file in Xcode, then center and focus in on the home view controller
    scene. Select the prototype table cell. Using the attributes inspector, change
    the style of the cell to Custom. Change the Selection parameter to None. Get rid
    of the disclosure indicator (right arrow) by changing the accessory setting to
    None.


    ![Image](images/9781430243748_Fig09-05.jpg)


    **Figure 9-5.** Creating a custom table view cell


    Add two image views to the custom table cell by dragging them in from the Object
    Library. Using the size inspector, position one image view (x=11 points and y=13
    points) and set both its width and height to 52 points. This will be the icon
    view that displays photos of our friends. Keeping the icon image view selected,
    use the attributes inspector to change the view’s Mode value to Aspect Fill, and
    switch on the Clip Subviews option (see [Figure 9-6](#Chapter09.html#fig_9_6)).


    ![Image](images/9781430243748_Fig09-06.jpg)


    **Figure 9-6.** Configuring the icon image view


    Now select the second image view you added. We’ll use this image view to display
    either a calendar icon background behind the remaining days’ labels or a birthday
    cake image if it’s our friend’s birthday today. Position the second image view
    (x=261 points, y=14 points) and set its width to 48 points and height to 50 points.
    We’re going to set the default background of this image right in our storyboard.
    From the assets folder in the source code, locate and add the `icon-days-remaining.png`
    and `icon-days-remaining@2x.png` image files to your project. Now set the `Image`
    property of the right-side image view to the newly added `icon-days-remaining.png`
    file using the attributes inspector, as shown in [Figure 9-7](#Chapter09.html#fig_9_7).


    ![Image](images/9781430243748_Fig09-07.jpg)


    **Figure 9-7.** Configuring the days remaining background image view


    Drag and drop four label view instances onto your custom table view cell. Using
    a combination of the attributes inspector to set the font attributes and the size
    inspector to set the position and size, configure the four labels as shown in
    [Table 9-1](#Chapter09.html#tab_9_1).


    ![Image](images/tab9-1.jpg)


    The end result should look like [Figure 9-8](#Chapter09.html#fig_9_8).


    ![Image](images/9781430243748_Fig09-08.jpg)


    **Figure 9-8.** Configuring our prototype cell’s labels and image views


    We’ve added and configured all the custom subviews required for our birthday table
    view cell, but until we hook up some outlets to the subviews, we don’t have any
    way to target and style the labels or image views. The question is where do we
    define these outlets? Not in our home view controller. The custom prototype cell
    that we’ve been working on is going to be the view layout that iOS will use when
    generating reusable instances of Apple’s `UITableViewCell` class. So the logical
    way to create a custom table view cell with custom subviews is by subclassing
    `UITableViewCell`.


    Add a `components` folder to your `user-interface` folder in the Finder, and then
    add the `components` folder as a new group in your Xcode project. In the project
    navigator, select the newly added `components` group and create a new Objective-C
    class file within it. Name your subclass `BRBirthdayTableViewCell` and select
    `UITableViewCell` from the drop-down menu of the Subclass of text field (see [Figure
    9-9](#Chapter09.html#fig_9_9)).


    ![Image](images/9781430243748_Fig09-09.jpg)


    **Figure 9-9.** Subclassing UITableViewCell


    Once you’ve created the new `BRBirthdayTableViewCell` class, open the header and
    source files in the Assistant Editor layout, and add the following code for each:


    `BRBirthdayTableViewCell.h:`


    `#import <UIKit/UIKit.h>`


    **`@class BRDBirthday;`**


    `@interface BRBirthdayTableViewCell : UITableViewCell`


    **`@property(nonatomic,strong) BRDBirthday *birthday;`**

    **`@property (nonatomic, weak) IBOutlet UIImageView* iconView;`**

    **`@property (nonatomic, weak) IBOutlet UIImageView* remainingDaysImageView;`**

    **`@property (nonatomic, weak) IBOutlet UILabel* nameLabel;`**

    **`@property (nonatomic, weak) IBOutlet UILabel* birthdayLabel;`**

    **`@property (nonatomic, weak) IBOutlet UILabel* remainingDaysLabel;`**

    **`@property (nonatomic, weak) IBOutlet UILabel* remainingDaysSubTextLabel;`**


    `@end`


    Source:


    `#import "BRBirthdayTableViewCell.h"`

    **`#import "BRDBirthday.h"`**


    `@implementation BRBirthdayTableViewCell`


    **`-(void) setBirthday:(BRDBirthday *)birthday`**

    **`{`**

    **`    _birthday = birthday;`**

    **`    self.nameLabel.text = _birthday.name;`**


    **`    int days = _birthday.remainingDaysUntilNextBirthday;`**


    **`    if (days == 0) {`**

    **`        //Birthday is today!`**

    **`        self.remainingDaysLabel.text = self.remainingDaysSubTextLabel.text
    = @"";`**

    **`        self.remainingDaysImageView.image = [UIImage imageNamed:@"icon-birthday-`

    `cake.png"];`**

    **`    }`**

    **`    else {`**

    **`        self.remainingDaysLabel.text = [NSString stringWithFormat:@"%d",days];`**

    **`        self.remainingDaysSubTextLabel.text = (days == 1) ? @"more day" : @"more
    days";`**

    **`        self.remainingDaysImageView.image = [UIImage imageNamed:@"icon-days-`

    `remaining.png"];`**

    **`    }`**


    **`    self.birthdayLabel.text = _birthday.birthdayTextToDisplay;`**


    **`}`**


    `@end`


    Table view cells get reused. This makes scrolling a long table very efficient
    because the table view reuses just a few table cells to give the impression of
    a very long table of rows. We’ve created a `birthday` property on our custom table
    view cell. When the home view controller configures each table view cell, it will
    pass the `birthday` entity to the table view cell via `cell.birthday = aBirthday`.
    By overriding the birthday setter of our table view cell, we can update the labels
    and images of our table cell whenever the birthday property is set.


    Let’s leave the `BRBirthdayTableViewCell` class files for the time being and return
    to the storyboard. With the custom table view cell selected, we can change the
    class of the prototype cell using the Identity Inspector. `BRBirthdayTableViewCell`
    will be recognized automatically by Xcode because it’s a `UITableViewCell` subclass
    (see [Figure 9-10](#Chapter09.html#fig_9_10)).


    ![Image](images/9781430243748_Fig09-10.jpg)


    **Figure 9-10.** Assigning our custom class to the table view cell prototype with
    the identity inspector'
  trans: "\n### 自定义表格视图单元格\n\n让我们仔细看看主屏幕生日列表的 Photoshop 设计（参见图 9-4）。\n\n![图片](img/9781430243748_Fig09-04.jpg)\n\
    \n**图 9-4.** 自定义表格单元格设计特写\n\n标准的 Apple 表格单元格样式最多支持两个标签：一个图片视图和一个位于表格单元格右侧的附件视图。这不足以满足我们自定义设计的需求（参见图\
    \ 9-5）。看看 Nicole 和 Nick Kuh 的生日提醒单元格。每个单元格包含四个标签：一个用于朋友姓名，一个用于生日文本，一个用于距离下一个生日的天数，以及一个用于显示*更多天*或*更多天*的文本。此外，每位朋友的头像图片视图都带有圆角，并能很好地将横向和纵向图片居中并裁剪。这不是\
    \ `UITableViewCell` 类的 `imageView` 属性的默认行为。我们需要创建 `UITableViewCell` 的子类，并创建一个可复用的自定义表格单元格来显示生日。\n\
    \n在 Xcode 中打开 Storyboard 文件，然后居中并聚焦于主页视图控制器场景。选择原型表格单元格。使用属性检查器，将单元格样式更改为自定义。将“选择”参数更改为“无”。将附件设置更改为“无”，以移除披露指示器（右箭头）。\n\
    \n![图片](img/9781430243748_Fig09-05.jpg)\n\n**图 9-5.** 创建自定义表格视图单元格\n\n通过从对象库中拖放两个图片视图到自定义表格单元格中。使用尺寸检查器，将第一个图片视图定位（x=11\
    \ 点，y=13 点），并设置其宽度和高度均为 52 点。这将用作显示朋友照片的图标视图。保持图标图片视图处于选中状态，使用属性检查器将视图的“模式”值更改为“Aspect\
    \ Fill”，并开启“裁剪子视图”选项（参见图 9-6）。\n\n![图片](img/9781430243748_Fig09-06.jpg)\n\n**图\
    \ 9-6.** 配置图标图片视图\n\n现在，选择你添加的第二个图片视图。我们将使用这个图片视图来显示剩余天数标签后面的日历图标背景，或者如果是朋友的生日，则显示生日蛋糕图片。将第二个图片视图定位（x=261\
    \ 点，y=14 点），并设置其宽度为 48 点，高度为 50 点。我们将直接在 Storyboard 中设置此图片的默认背景。从源代码的资源文件夹中，找到并将\
    \ `icon-days-remaining.png` 和 `icon-days-remaining@2x.png` 图片文件添加到你的项目中。然后，使用属性检查器将右侧图片视图的“Image”属性设置为新添加的\
    \ `icon-days-remaining.png` 文件，如图 9-7 所示。\n\n![图片](img/9781430243748_Fig09-07.jpg)\n\
    \n**图 9-7.** 配置剩余天数背景图片视图\n\n将四个标签视图实例拖放到你的自定义表格视图单元格上。结合使用属性检查器设置字体属性，尺寸检查器设置位置和大小，按照表\
    \ 9-1 所示配置这四个标签。\n\n![图片](img/tab9-1.jpg)\n\n最终结果应类似于图 9-8。\n\n![图片](img/9781430243748_Fig09-08.jpg)\n\
    \n**图 9-8.** 配置原型单元格的标签和图片视图\n\n我们已为生日表格视图单元格添加并配置了所有必需的自定义子视图，但在将这些子视图连接到输出口之前，我们没有任何方法来定位和样式化标签或图片视图。问题在于我们在哪里定义这些输出口？不是在主页视图控制器中。我们正在处理的自定义原型单元格将成为\
    \ iOS 在生成 Apple 的 `UITableViewCell` 类可复用实例时使用的视图布局。因此，创建带有自定义子视图的自定义表格视图单元格的逻辑方法是通过创建\
    \ `UITableViewCell` 的子类。\n\n在 Finder 中，向你的 `user-interface` 文件夹添加一个 `components`\
    \ 文件夹，然后在你的 Xcode 项目中将 `components` 文件夹添加为一个新组。在项目导航器中，选择新添加的 `components` 组，并在其中创建一个新的\
    \ Objective-C 类文件。将你的子类命名为 `BRBirthdayTableViewCell`，并在“Subclass of”文本字段的下拉菜单中选择\
    \ `UITableViewCell`（参见图 9-9）。\n\n![图片](img/9781430243748_Fig09-09.jpg)\n\n**图\
    \ 9-9.** 创建 `UITableViewCell` 的子类\n\n创建新的 `BRBirthdayTableViewCell` 类后，在 Assistant\
    \ Editor 布局中打开头文件和源文件，并为每个文件添加以下代码：\n\n`BRBirthdayTableViewCell.h:`\n\n```\n#import\
    \ <UIKit/UIKit.h>\n@class BRDBirthday;\n@interface BRBirthdayTableViewCell : UITableViewCell\n\
    @property(nonatomic,strong) BRDBirthday *birthday;\n@property (nonatomic, weak)\
    \ IBOutlet UIImageView* iconView;\n@property (nonatomic, weak) IBOutlet UIImageView*\
    \ remainingDaysImageView;\n@property (nonatomic, weak) IBOutlet UILabel* nameLabel;\n\
    @property (nonatomic, weak) IBOutlet UILabel* birthdayLabel;\n@property (nonatomic,\
    \ weak) IBOutlet UILabel* remainingDaysLabel;\n@property (nonatomic, weak) IBOutlet\
    \ UILabel* remainingDaysSubTextLabel;\n@end\n```\n\n源文件：\n\n```\n#import \"BRBirthdayTableViewCell.h\"\
    \n#import \"BRDBirthday.h\"\n@implementation BRBirthdayTableViewCell\n-(void)\
    \ setBirthday:(BRDBirthday *)birthday\n{\n    _birthday = birthday;\n    self.nameLabel.text\
    \ = _birthday.name;\n    int days = _birthday.remainingDaysUntilNextBirthday;\n\
    \    if (days == 0) {\n        //今天是生日！\n        self.remainingDaysLabel.text\
    \ = self.remainingDaysSubTextLabel.text = @\"\";\n        self.remainingDaysImageView.image\
    \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n   \
    \     self.remainingDaysLabel.text = [NSString stringWithFormat:@\"%d\",days];\n\
    \        self.remainingDaysSubTextLabel.text = (days == 1) ? @\"more day\" : @\"\
    more days\";\n        self.remainingDaysImageView.image = [UIImage imageNamed:@\"\
    icon-days-remaining.png\"];\n    }\n    self.birthdayLabel.text = _birthday.birthdayTextToDisplay;\n\
    }\n@end\n```\n\n表格视图单元格会被复用。这使得滚动长表格非常高效，因为表格视图通过复用少量表格单元来营造出拥有超长行数表格的视觉效果。我们在自定义表格视图单元格上创建了一个\
    \ `birthday` 属性。当主页视图控制器配置每个表格视图单元格时，它会通过 `cell.birthday = aBirthday` 将 `birthday`\
    \ 实体传递给表格视图单元格。通过重写表格视图单元格的 birthday setter 方法，我们可以在设置 birthday 属性时更新表格单元格的标签和图片。\n\
    \n暂时离开 `BRBirthdayTableViewCell` 类文件，返回 Storyboard。选中自定义表格视图单元格后，我们可以使用身份检查器更改原型单元格的类。Xcode\
    \ 会自动识别 `BRBirthdayTableViewCell`，因为它是 `UITableViewCell` 的子类（参见图 9-10）。\n\n![图片](img/9781430243748_Fig09-10.jpg)\n\
    \n**图 9-10.** 使用身份检查器将自定义类分配给表格视图单元格原型\n"
- fmt: "Now to hook up the table cell outlets. Control-drag directly from the background\
    \ of the prototype table cell to each of the added subviews. You’ll discover that\
    \ Xcode has recognized the outlets from the `BRBirthdayTableViewCell` code and\
    \ will enable you to connect them to the subviews (see [Figure 9-11](#Chapter09.html#fig_9_11)).\
    \ Awesome!\n\n![Image](images/9781430243748_Fig09-11.jpg)\n\n**Figure 9-11.**\
    \ Hooking up the label and image view outlets from `BRBirthdayTableViewCell`.\n\
    \nConnect the outlets as follows:\n\n- `iconView`: the image view on the left\
    \ of the table cell\n- `remainingDaysImageView`: the image view on the right of\
    \ the table cell\n- `nameLabel`: the top-left label\n- `birthdayLabel`: the bottom-left\
    \ label\n- `remainingDaysLabel`: the top-right label\n- `remainingDaysSubTextLabel`:\
    \ the bottom-right label\n\nLeave the view for now and make a few modifications\
    \ to the `BRHomeViewController.m` source file.\n\nImport `BRBirthdayTableViewCell.h`\
    \ into `BRHomeViewController.m`. Then scan through the implementation file and\
    \ modify `tableView:cellForRowAtIndexPath:` as follows:\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n\n    BRDBirthday *birthday = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
    \n    BRBirthdayTableViewCell *brTableCell = (BRBirthdayTableViewCell *)cell;\n\
    \    brTableCell.birthday = birthday;\n    if (birthday.imageData == nil)\n  \
    \  {\n        brTableCell.iconView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n    }\n    else {\n        brTableCell.iconView.image = [UIImage imageWithData:birthday.imageData];\n\
    \    }\n    cell.textLabel.text = birthday.name;\n    cell.detailTextLabel.text\
    \ = birthday.birthdayTextToDisplay;\n    cell.imageView.image = [UIImage imageWithData:birthday.imageData];\n\
    \n    return cell;\n}\n```\n\nBuild and run. You should see something like [Figure\
    \ 9-12](#Chapter09.html#fig_9_12).\n\n![Image](images/9781430243748_Fig09-12.jpg)\n\
    \n**Figure 9-12.** Nicely cropped square thumbnails and custom labels displaying\
    \ birthday data\n\n### Table view cell background images\n\nTime to add the custom\
    \ chocolate sponge and icing to our table view. This should be a piece of cake\
    \ (pun intended)! Add `table-row-icing-background.png`, `table-row-icing-background@2x.png`,\
    \ `table-row-background.png`, and `table-row-background@2x.png` image files to\
    \ your project. Instances of `UITableViewCell` have a `backgroundView` property\
    \ that we can set to any `UIView` instance. So we’ll create an image and an image\
    \ view to display the image, and then set the image view as the background view\
    \ of the cell. Unless this is the top layer of the cake, we’ll use our newly added\
    \ table row background image that includes a layer of icing. If it’s the top layer\
    \ of the cake (the first row), then we will use the table row background image\
    \ without icing.\n\nWe’ll add the code directly to the `tableView:cellForRowAtIndexPath:`\
    \ in `BRHomeViewController.m` source, because that’s the point when we’ll know\
    \ which row of the table we’re skinning. Add the following code at the end of\
    \ this method, but before the last `return cell;` line:\n\n```\n    UIImage *backgroundImage\
    \ = (indexPath.row == 0) ? [UIImage imageNamed:@\"table-row-background.png\"]\
    \ : [UIImage imageNamed:@\"table-row-icing-background.png\"];\n    brTableCell.backgroundView\
    \ = [[UIImageView alloc] initWithImage:backgroundImage];\n```\n\nBuild and run.\
    \ Nice cake layers are added (see [Figure 9-13](#Chapter09.html#fig_9_13)).\n\n\
    ![Image](images/9781430243748_Fig09-13.jpg)\n\n**Figure 9-13.** Table cell cake\
    \ layers with added icing!\n\n### Creating a “style sheet”\n\nAs I pointed out\
    \ earlier, iOS skinning doesn’t work like CSS, so we’re not going to create a\
    \ traditional style sheet file. We’re going to create a single Objective-C class\
    \ that will take care of all our app’s styling needs in one, centralized place.\
    \ Our style sheet class will work like a utility class, whereby we’ll call styling\
    \ methods, passing in a reference to labels and views, and let our utility class\
    \ take care of adding rounded corners, setting fonts and colors, and so forth.\n\
    \nSelect the `user-interface` Xcode group and create a new Objective-C class file\
    \ within it. Name your subclass `BRStyleSheet` and enter `NSObject` into the Subclass\
    \ of text field.\n\nWork the following code into the new `BRStyleSheet.h` header:\n\
    \n```\n#import <Foundation/Foundation.h>\n\ntypedef enum : int {\n    BRLabelTypeName\
    \ = 0,\n    BRLabelTypeBirthdayDate,\n    BRLabelTypeDaysUntilBirthday,\n    BRLabelTypeDaysUntilBirthdaySubText,\n\
    \    BRLabelTypeLarge\n}BRLabelType;\n\n@interface BRStyleSheet : NSObject\n\n\
    +(void)styleLabel:(UILabel *)label withType:(BRLabelType)labelType;\n+(void)styleRoundCorneredView:(UIView\
    \ *)view;\n\n@end\n```\n\nNotice how the two public methods of our new style sheet\
    \ class are both class methods? We’re not going to instantiate an instance of\
    \ `BRStyleSheet`, we’ll just use it like a utility class from anywhere in our\
    \ app where we want to style a label or view.\n\nWe created custom enumerators\
    \ back in [Chapter 4](#Chapter04.html#ch4) when we pieced together the blackjack\
    \ app. We had an enumerator to keep track of the game state. Here we’re creating\
    \ a label type enumerator so that whenever we pass a reference to a label view\
    \ into the `styleLabel:withType:` method, we also pass a type that determines\
    \ the font, text color, and so forth, that the style sheet method will apply.\
    \ We create a different enumerator label type for each different style. So if\
    \ we want the same styling to be applied to two different labels, we’ll pass in\
    \ the same `BRLabelType` value for them both.\n\nOur styling code is going to\
    \ utilize properties of Core Animation layers to add shadows and round corners.\
    \ We won’t cover Core Animation in any detail in this book, but it’s worth noting\
    \ that in iOS, every `UIView` is actually rendered in a Core Animation Layer and\
    \ `CALayers` have shadow and corner radius properties. In order to set shadow\
    \ and corner radius values on our labels and views, we’ll first need to import\
    \ Apple’s QuartzCore framework, otherwise Xcode will not recognize the `CALayer`\
    \ properties we’ll access with our styling code.\n\nWe’ll import the QuartzCore\
    \ framework just as we imported the Core Data framework. Select your `BirthdayReminder`\
    \ project in the Project Navigator and then select the `BirthdayReminder` target.\
    \ Now select the Build Phases tab in the Editor. Expand the Link Binary With Libraries\
    \ collection. Click the + button and then locate the `QuartzCore.framework` from\
    \ the iOS folder to add it to your project.\n\nBack in the `BRStyleSheet.m` source\
    \ file, we’ll define some fonts and colors for our style sheet. These are fonts\
    \ and colors that we’ll use for our styling methods so if we ever need to change\
    \ a font or color in the future, the process will be quick and painless in our\
    \ single styling class. We’re going to define these style value constants as follows:\n\
    \n```\n#import \"BRStyleSheet.h\"\n#import <QuartzCore/QuartzCore.h>\n\n#define\
    \ kFontLightOnDarkTextColour [UIColor colorWithRed:255.0/255 green:251.0/255 blue:218.0/255\
    \ alpha:1.0]\n#define kFontDarkOnLightTextColour [UIColor colorWithRed:1.0/255\
    \ green:1.0/255 blue:1.0/255 alpha:1.0]\n```"
  raw: 'Now to hook up the table cell outlets. Control-drag directly from the background
    of the prototype table cell to each of the added subviews. You’ll discover that
    Xcode has recognized the outlets from the `BRBirthdayTableViewCell` code and will
    enable you to connect them to the subviews (see [Figure 9-11](#Chapter09.html#fig_9_11)).
    Awesome!


    ![Image](images/9781430243748_Fig09-11.jpg)


    **Figure 9-11.** Hooking up the label and image view outlets from `BRBirthdayTableViewCell.`


    Connect the outlets as follows:


    *   `iconView`: the image view on the left of the table cell

    *   `remainingDaysImageView`: the image view on the right of the table cell

    *   `nameLabel`: the top-left label

    *   `birthdayLabel`: the bottom-left label

    *   `remainingDaysLabel`: the top-right label

    *   `remainingDaysSubTextLabel`: the bottom-right label


    Leave the view for now and make a few modifications to the `BRHomeViewController.m`
    source file.


    Import `BRBirthdayTableViewCell.h` into `BRHomeViewController.m`. Then scan through
    the implementation file and modify `tableView:cellForRowAtIndexPath:` as follows:


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath`

    `*)indexPath`

    `{`

    `    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"Cell"];`


    `    BRDBirthday *birthday = [self.fetchedResultsController objectAtIndexPath:indexPath];`


    **`BRBirthdayTableViewCell *brTableCell = (BRBirthdayTableViewCell *)cell;`**

    **`    brTableCell.birthday = birthday;`**

    **`if (birthday.imageData == nil)`**

    **`    {`**

    **`        brTableCell.iconView.image = [UIImage imageNamed:@"icon-birthday-cake.png"];`**

    **`    }`**

    **`    else {`**

    **`        brTableCell.iconView.image = [UIImage imageWithData:birthday.imageData];`**

    **`    }`**

    ~~`    cell.textLabel.text = birthday.name;`~~

    ~~`    cell.detailTextLabel.text = birthday.birthdayTextToDisplay;`~~

    ~~`    cell.imageView.image = [UIImage imageWithData:birthday.imageData];`~~


    `    return cell;`

    `}`


    Build and run. You should see something like [Figure 9-12](#Chapter09.html#fig_9_12).


    ![Image](images/9781430243748_Fig09-12.jpg)


    **Figure 9-12.** Nicely cropped square thumbnails and custom labels displaying
    birthday data


    #### Table view cell background images


    Time to add the custom chocolate sponge and icing to our table view. This should
    be a piece of cake (pun intended)! Add `table-row-icing-background.png`, `table-row-icing-background@2x.png`,
    `table-row-background.png`, and `table-row-background@2x.png` image files to your
    project. Instances of `UITableViewCell` have a `backgroundView` property that
    we can set to any `UIView` instance. So we’ll create an image and an image view
    to display the image, and then set the image view as the background view of the
    cell. Unless this is the top layer of the cake, we’ll use our newly added table
    row background image that includes a layer of icing. If it’s the top layer of
    the cake (the first row), then we will use the table row background image without
    icing.


    We’ll add the code directly to the `tableView:cellForRowAtIndexPath:` in `BRHomeViewController.m`
    source, because that’s the point when we’ll know which row of the table we’re
    skinning. Add the following code at the end of this method, but before the last
    `return cell;` line:


    `    UIImage *backgroundImage = (indexPath.row == 0) ? [UIImage imageNamed:@"table-row-`

    `background.png"] : [UIImage imageNamed:@"table-row-icing-background.png"];`

    `    brTableCell.backgroundView = [[UIImageView alloc] initWithImage:backgroundImage];`


    Build and run. Nice cake layers are added (see [Figure 9-13](#Chapter09.html#fig_9_13)).


    ![Image](images/9781430243748_Fig09-13.jpg)


    **Figure 9-13.** Table cell cake layers with added icing!


    #### Creating a “style sheet”


    As I pointed out earlier, iOS skinning doesn’t work like CSS, so we’re not going
    to create a traditional style sheet file. We’re going to create a single Objective-C
    class that will take care of all our app’s styling needs in one, centralized place.
    Our style sheet class will work like a utility class, whereby we’ll call styling
    methods, passing in a reference to labels and views, and let our utility class
    take care of adding rounded corners, setting fonts and colors, and so forth.


    Select the `user-interface` Xcode group and create a new Objective-C class file
    within it. Name your subclass `BRStyleSheet` and enter `NSObject` into the Subclass
    of text field.


    Work the following code into the new `BRStyleSheet.h` header:


    `#import <Foundation/Foundation.h>`


    **`typedef enum : int {`**

    **`    BRLabelTypeName = 0,`**

    **`    BRLabelTypeBirthdayDate,`**

    **`    BRLabelTypeDaysUntilBirthday,`**

    **`    BRLabelTypeDaysUntilBirthdaySubText,`**

    **`    BRLabelTypeLarge`**

    **`}BRLabelType;`**


    `@interface BRStyleSheet : NSObject`


    **`+(void)styleLabel:(UILabel *)label withType:(BRLabelType)labelType;`**

    **`+(void)styleRoundCorneredView:(UIView *)view;`**


    `@end`


    Notice how the two public methods of our new style sheet class are both class
    methods? We’re not going to instantiate an instance of `BRStyleSheet`, we’ll just
    use it like a utility class from anywhere in our app where we want to style a
    label or view.


    We created custom enumerators back in [Chapter 4](#Chapter04.html#ch4) when we
    pieced together the blackjack app. We had an enumerator to keep track of the game
    state. Here we’re creating a label type enumerator so that whenever we pass a
    reference to a label view into the `styleLabel:withType:` method, we also pass
    a type that determines the font, text color, and so forth, that the style sheet
    method will apply. We create a different enumerator label type for each different
    style. So if we want the same styling to be applied to two different labels, we’ll
    pass in the same `BRLabelType` value for them both.


    Our styling code is going to utilize properties of Core Animation layers to add
    shadows and round corners. We won’t cover Core Animation in any detail in this
    book, but it’s worth noting that in iOS, every `UIView` is actually rendered in
    a Core Animation Layer and `CALayers` have shadow and corner radius properties.
    In order to set shadow and corner radius values on our labels and views, we’ll
    first need to import Apple’s QuartzCore framework, otherwise Xcode will not recognize
    the `CALayer` properties we’ll access with our styling code.


    We’ll import the QuartzCore framework just as we imported the Core Data framework.
    Select your `BirthdayReminder` project in the Project Navigator and then select
    the `BirthdayReminder` target. Now select the Build Phases tab in the Editor.
    Expand the Link Binary With Libraries collection. Click the + button and then
    locate the `QuartzCore.framework` from the iOS folder to add it to your project.


    Back in the `BRStyleSheet.m` source file, we’ll define some fonts and colors for
    our style sheet. These are fonts and colors that we’ll use for our styling methods
    so if we ever need to change a font or color in the future, the process will be
    quick and painless in our single styling class. We’re going to define these style
    value constants as follows:


    `#import "BRStyleSheet.h"`

    **`#import <QuartzCore/QuartzCore.h>`**


    **`#define kFontLightOnDarkTextColour [UIColor colorWithRed:255.0/255 green:251.0/255`

    `blue:218.0/255 alpha:1.0]`**

    **`#define kFontDarkOnLightTextColour [UIColor colorWithRed:1.0/255 green:1.0/255
    blue:1.0/255 alpha:1.0]`**'
  trans: "\n现在来连接表格单元格的出口。从原型表格单元格的背景按住 Control 键拖拽到每个添加的子视图上。你会发现 Xcode 已经识别了 `BRBirthdayTableViewCell`\
    \ 代码中的出口，并允许你将它们连接到子视图（见图 9-11）。太棒了！\n\n![Image](img/9781430243748_Fig09-11.jpg)\n\
    \n**图 9-11.** 连接 `BRBirthdayTableViewCell` 中的标签和图像视图出口。\n\n按以下方式连接出口：\n\n- `iconView`:\
    \ 表格单元格左侧的图像视图\n- `remainingDaysImageView`: 表格单元格右侧的图像视图\n- `nameLabel`: 左上角的标签\n\
    - `birthdayLabel`: 左下角的标签\n- `remainingDaysLabel`: 右上角的标签\n- `remainingDaysSubTextLabel`:\
    \ 右下角的标签\n\n现在，先不管这个视图，对 `BRHomeViewController.m` 源文件做一些修改。\n\n将 `BRBirthdayTableViewCell.h`\
    \ 导入到 `BRHomeViewController.m` 中。然后浏览实现文件，并如下修改 `tableView:cellForRowAtIndexPath:`：\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n\n    BRDBirthday *birthday = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
    \n    BRBirthdayTableViewCell *brTableCell = (BRBirthdayTableViewCell *)cell;\n\
    \    brTableCell.birthday = birthday;\n    if (birthday.imageData == nil)\n  \
    \  {\n        brTableCell.iconView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n    }\n    else {\n        brTableCell.iconView.image = [UIImage imageWithData:birthday.imageData];\n\
    \    }\n    cell.textLabel.text = birthday.name;\n    cell.detailTextLabel.text\
    \ = birthday.birthdayTextToDisplay;\n    cell.imageView.image = [UIImage imageWithData:birthday.imageData];\n\
    \n    return cell;\n}\n```\n\n构建并运行。你应该会看到类似图 9-12 的效果。\n\n![Image](img/9781430243748_Fig09-12.jpg)\n\
    \n**图 9-12.** 裁剪得当的方形缩略图和显示生日数据的自定义标签\n\n### 表格视图单元格背景图像\n\n现在该为我们的表格视图添加定制的巧克力海绵蛋糕和糖霜了。这应该是小菜一碟（双关语）！将\
    \ `table-row-icing-background.png`、`table-row-icing-background@2x.png`、`table-row-background.png`\
    \ 和 `table-row-background@2x.png` 图像文件添加到你的项目中。`UITableViewCell` 的实例有一个 `backgroundView`\
    \ 属性，我们可以将其设置为任何 `UIView` 实例。因此，我们将创建一个图像和一个用于显示该图像的图像视图，然后将该图像视图设置为单元格的背景视图。除非这是蛋糕的顶层，否则我们将使用新添加的、包含一层糖霜的表格行背景图像。如果是蛋糕的顶层（第一行），则使用不带糖霜的表格行背景图像。\n\
    \n我们将直接把代码添加到 `BRHomeViewController.m` 源文件中的 `tableView:cellForRowAtIndexPath:`\
    \ 方法里，因为在这里我们才能知道正在设置样式的具体表格行。在该方法的末尾，但倒数第一个 `return cell;` 行之前，添加以下代码：\n\n```\n\
    \    UIImage *backgroundImage = (indexPath.row == 0) ? [UIImage imageNamed:@\"\
    table-row-background.png\"] : [UIImage imageNamed:@\"table-row-icing-background.png\"\
    ];\n    brTableCell.backgroundView = [[UIImageView alloc] initWithImage:backgroundImage];\n\
    ```\n\n构建并运行。漂亮的蛋糕层次出现了（见图 9-13）。\n\n![Image](img/9781430243748_Fig09-13.jpg)\n\
    \n**图 9-13.** 添加了糖霜的表格单元格蛋糕层！\n\n### 创建“样式表”\n\n正如我之前指出的，iOS 的皮肤设置不像 CSS 那样工作，所以我们不会创建一个传统的样式表文件。我们将创建一个单独的\
    \ Objective-C 类，在一个集中的位置负责处理我们应用的所有样式需求。我们的样式表类将像一个工具类一样工作，我们会调用样式方法，传递标签和视图的引用，然后由工具类负责添加圆角、设置字体和颜色等。\n\
    \n选择 `user-interface` Xcode 组，并在其中创建一个新的 Objective-C 类文件。将子类命名为 `BRStyleSheet`，并在“Subclass\
    \ of”文本字段中输入 `NSObject`。\n\n将以下代码写入新的 `BRStyleSheet.h` 头文件中：\n\n```\n#import <Foundation/Foundation.h>\n\
    \ntypedef enum : int {\n    BRLabelTypeName = 0,\n    BRLabelTypeBirthdayDate,\n\
    \    BRLabelTypeDaysUntilBirthday,\n    BRLabelTypeDaysUntilBirthdaySubText,\n\
    \    BRLabelTypeLarge\n}BRLabelType;\n\n@interface BRStyleSheet : NSObject\n\n\
    +(void)styleLabel:(UILabel *)label withType:(BRLabelType)labelType;\n+(void)styleRoundCorneredView:(UIView\
    \ *)view;\n\n@end\n```\n\n注意到我们新样式表类的两个公开方法都是类方法了吗？我们不会实例化 `BRStyleSheet` 的实例，而会像使用工具类一样，在我们的应用中对标签或视图进行样式设置时随时随地调用它。\n\
    \n我们在第 4 章中拼凑 21 点应用时就创建过自定义枚举。当时我们用一个枚举器来跟踪游戏状态。这里我们创建一个标签类型枚举器，这样每当我们将标签视图的引用传递给\
    \ `styleLabel:withType:` 方法时，也会传递一个类型参数，该参数决定了样式表方法将应用的字体、文本颜色等。我们为每种不同的样式创建一个不同的枚举器标签类型。因此，如果我们希望对两个不同的标签应用相同的样式，就可以为它们传递相同的\
    \ `BRLabelType` 值。\n\n我们的样式代码将利用 Core Animation 层的属性来添加阴影和圆角。本书不会详细讲解 Core Animation，但值得注意的一点是，在\
    \ iOS 中，每个 `UIView` 实际上都是在 Core Animation 层中渲染的，而 `CALayers` 具有阴影和圆角半径属性。为了给我们的标签和视图设置阴影和圆角半径值，首先需要导入\
    \ Apple 的 QuartzCore 框架，否则 Xcode 将无法识别我们在样式代码中访问的 `CALayer` 属性。\n\n我们将像导入 Core\
    \ Data 框架一样导入 QuartzCore 框架。在项目导航器中选择你的 `BirthdayReminder` 项目，然后选择 `BirthdayReminder`\
    \ 目标。接着在编辑器中选择“Build Phases”选项卡。展开“Link Binary With Libraries”集合。点击 + 按钮，然后在 iOS\
    \ 文件夹中找到 `QuartzCore.framework` 并将其添加到你的项目中。\n\n回到 `BRStyleSheet.m` 源文件中，我们将为样式表定义一些字体和颜色。这些是我们在样式方法中使用的字体和颜色，因此如果将来需要更改某种字体或颜色，我们只需在这个单一的样式类中进行操作，过程将快速又简单。我们将按如下方式定义这些样式值常量：\n\
    \n```\n#import \"BRStyleSheet.h\"\n#import <QuartzCore/QuartzCore.h>\n\n#define\
    \ kFontLightOnDarkTextColour [UIColor colorWithRed:255.0/255 green:251.0/255 blue:218.0/255\
