- fmt: '#### Application delegate


    The Application Delegate is a class that you can modify. `BRAppDelegate` subclasses
    `UIResponder` and implements the protocol methods of `UIApplicationDelegate`.


    You’ll see that Xcode has automatically stubbed out some of the main `UIApplicationDelegate`
    methods. The main methods in the `UIApplicationDelegate` protocol respond to key
    application events, such as the following:


    > - `application:didFinishLaunchingWithOptions`: Executes once, as soon as your
    app first launches.

    > - `applicationDidEnterBackground`: Executes every time the user exits our app—by
    tapping the iPhone home button, for example. Our app remains alive—but in a frozen,
    inactive state. Other app code will not execute after this point. We can execute
    code here when the delegation method is called, but primarily for any data saving
    or freeing up of memory.

    > - `applicationDidBecomeActive`: Our app has become active because the user relaunched
    via the home screen or multitasking bar.


    *Note: To learn more about any method (or class), highlight the method and use
    the `^![Image](images/U002.jpg)?` keyboard shortcut to display quick help for
    the selected item (see [Figure 3-6](#Chapter03.html#fig_3_6)).*


    ![Image](images/9781430243748_Fig03-06.jpg)


    **Figure 3-6.** Quick Help. Click the links to access the full documentation.


    #### Info.plist


    Select and view `BirthdayReminder-Info.plist`. You’ll find this important file
    within the Supporting Files group. This is the configuration file that Xcode bundles
    into our app. The settings within the `Info.plist` file determine how iOS instantiates
    our app.


    Because we selected Use Storyboard earlier when selecting our project setup options,
    the project template has created a storyboard and assigned the Main Storyboard
    File Base Name configuration property (see [Figure 3-7](#Chapter03.html#fig_3_7)).


    ![Image](images/9781430243748_Fig03-07.jpg)


    **Figure 3-7.** MainStoryboard automatically generated by Xcode project template
    and defined in the `Info.plist`


    There are many configuration settings that you assign within the `Info.plist`,
    including embedded font lists; whether the status bar is on or off; and URL types
    (local URL schemes that iOS associates and links to your app from other apps).


    #### Prefix header


    Xcode has also added a `BirthdayReminder-Prefix.pch` file to our project. This
    is a global file header that the Xcode compiler precompiles into every one of
    the Objective-C source classes in our project. You can define global functions
    or import declarations of common classes in the prefix header to avoid repetitive
    import declarations throughout your classes.


    #### Storyboards


    Storyboards are a key tool in the iOS developer’s workflow. Apple added storyboards
    to Xcode in iOS 5, and they’ve gotten even better in iOS 6. The definition of
    a storyboard from Apple’s documentation reads “a storyboard is a visual representation
    of the user interface of an iOS application, showing screens of content and the
    connections between those screens.”


    Our *Birthday Reminder* project will include a single storyboard that defines
    every screen in our app, as well as the connections and transitions between those
    screens. Using Xcode’s editor, we’ll lay out buttons, labels, and other subviews
    within each screen of our storyboard and create the connections between screens.


    Storyboards in Xcode make it much quicker to build iOS apps than was possible
    prior to iOS 5. In [Chapters 5](#Chapter05.html#ch5) and [6](#Chapter06.html#ch6),
    we’ll storyboard every view in our app.


    In keeping with code learning traditions, I think it’s about time for a Hello
    World example.


    ### Hello World


    Let’s take a look at the storyboard that Xcode has autogenerated. Select `MainStoryboard.storyboard`
    from the files in the Project Navigator. The Editor area will become populated
    with two subpanels: the Document Outline panel and the Storyboard panel. If the
    Document Outline panel is hidden, you can open it, as I’ve illustrated in [Figure
    3-8](#Chapter03.html#fig_3_8).


    ![Image](images/9781430243748_Fig03-08.jpg)


    **Figure 3-8.** When viewing storyboard files, you can hide/show the Document
    Outline panel.


    Our main and only view should be visible on the storyboard. Click and select the
    view. The Document Outline panel should update to highlight the current selection.
    Notice the dark bar beneath the view? This represents the view controller assigned
    to this view. Click and select the dark bar. The Document Outline selection should
    update to indicate that you have selected the view controller.


    Keeping the view controller selected, switch the top Utilities pane to the third
    tab, which should present the identity inspector (see [Figure 3-9](#Chapter03.html#fig_3_9)).


    ![Image](images/9781430243748_Fig03-09.jpg)


    **Figure 3-9.** Viewing the owning view controller class via the identity inspector


    The identity inspector reveals the custom class of the current selection in our
    storyboard: `BRViewController`. In [Chapter 5](#Chapter05.html#ch5), we’ll learn
    how to use the identity inspector to assign custom classes to view controllers
    and views.


    If it’s not already selected, then switch the bottom utility pane to the third
    tab, the Object Library, as shown in [Figure 3-9](#Chapter03.html#fig_3_9).


    *Tip: Set up Xcode’s panel layout to your preferences. You’ll find three toggle
    buttons in the right side of the toolbar for hiding/showing the Navigator, Debug,
    and Utilities areas.*


    With the view rather than the view controller in our storyboard selected, scroll
    down through the Object Library. You’ll find all the user interface components
    of the iOS SDK listed. Find the label object. Drag a label instance out of the
    library and drop it in the center of the main view. Double-click the label and
    change the text to **Hello World** (see [Figure 3-10](#Chapter03.html#fig_3_10)).


    ![Image](images/9781430243748_Fig03-10.jpg)


    **Figure 3-10.** Hello World


    Note in [Figure 3-10](#Chapter03.html#fig_3_10) that I’ve toggled the top-right
    utility pane to the attributes inspector that displays the text, font name and
    size, text color, alignment, and so on.


    Now that you’ve added the label to the view, you’ve successfully created a subview
    within your main view. If you select the main view again, you’ll be able to modify
    the view properties, such as the background color.


    If you haven’t discovered this already, the Build and Run button on the left side
    of Xcode’s toolbar compiles and launches our project in the iOS simulator (see
    [Figure 3-11](#Chapter03.html#fig_3_11)). You can toggle the destination in the
    Active Scheme drop-down bar between the iPhone and iPad simulators.


    ![Image](images/9781430243748_Fig03-11.jpg)


    **Figure 3-11.** An app running in the iOS simulator


    You should see your project launch and display the Hello World label you added
    to the view.


    You can emulate device rotation in the simulator with the `![Image](images/U002.jpg)![Image](images/U004.jpg)`
    and `![Image](images/U002.jpg)![Image](images/U005.jpg)` keyboard shortcuts, or
    Hardware `![Image](images/U001.jpg)` Rotate Left / Hardware `![Image](images/U001.jpg)`
    Rotate Right.'
