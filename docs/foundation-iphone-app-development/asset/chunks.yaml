    `@property (weak, nonatomic) IBOutlet UIImageView *playerCard2;`

    `@property (weak, nonatomic) IBOutlet UIImageView *playerCard3;`

    `@property (weak, nonatomic) IBOutlet UIImageView *playerCard4;`

    `@property (weak, nonatomic) IBOutlet UIImageView *playerCard5;`


    `@property (weak, nonatomic) IBOutlet UIButton *standButton;`

    `@property (weak, nonatomic) IBOutlet UIButton *hitButton;`


    `@end`


    #### Actions: Responding to controls


    We’ve created references to all the card image views and buttons, so we’ll now
    be able to access and control their attributes at runtime, in the code of our
    `BJViewController` implementation file: setting the image property and visibility
    of the image views, and enabling and disabling the buttons.


    Notice anything else we’ve missed? How will our view controller class capture
    button tap events?


    We only specify outlets in one direction between view controller and view. So
    the view has no knowledge of its owner view controller. Our view controller class
    needs to know when the user taps the Stand or Hit buttons.


    Buttons are controls. `UIButton` not only inherits from `UIView` but, like all
    other user interface controls in the iOS SDK, `UIButton` inherits directly from
    `UIControl`. Because Xcode recognizes instances of `UIButton` as subclasses of
    `UIControl`, it automatically offers us an additional connection type: `Action`.


    The Objective-C mechanism for handling user interaction events and passing them
    from user interface controls to methods of any Objective-C class type is called
    target-action. When a button is tapped, the tap event can be passed to a method.
    We’re going to create two new methods in our view controller that will be triggered
    in response to a Touch Up Inside event for either the Hit or Stand buttons. A
    Touch Up Inside event is triggered when the user touches a control and lifts up
    her finger on top of it. It’s the equivalent action of a mouseup event on a computer.


    Xcode can automatically generate target-action code using a similar Ctrl+drag
    process we implemented when creating outlets. Ctrl+drag from each button to the
    `BJViewController.h` interface but change the connection type to `Action`, ensure
    that Touch Up Inside is the selected event type, and repeat the process to create
    the following two action method handlers in your view controller interface header
    file (see [Figure 4-7](#Chapter04.html#fig_4_7)):


    `- (IBAction)didTapStandButton:(id)sender;`

    `- (IBAction)didTapHitButton:(id)sender;` ![Image](images/9781430243748_Fig04-07.jpg)


    **Figure 4-7.** Connecting actions from the button controls to BJViewController


    *Note: Xcode can also create outlets and actions by control-clicking views and
    then dragging outlets and actions from the contextual menu.*


    We’re done with the view for our basic blackjack game. We’ve learned the basics
    of adding and arranging labels, buttons, and image views to create a view using
    Xcode’s built-in UI layout tool. With storyboards, Xcode enables us to layout
    our app’s views and create connections between them. We’ll learn more about storyboarding
    tomorrow in [Chapters 5](#Chapter05.html#ch5) and [6](#Chapter06.html#ch6), but
    for now we’re going to move on to studying the basics of Objective-C classes,
    properties, methods, and object types.


    ### Objective-C basics


    Not only has Xcode autogenerated the outlet declarations in `BJViewController.h`
    header files, it’s also added code to the `BJViewController.m` source file.


    Sticking with the Assistant Editor layout, select `BJViewController.h` in the
    main left split pane so that we can examine both the header and implementation
    files for the view controller simultaneously (see [Figure 4-8](#Chapter04.html#fig_4_8)).
    There are a few ways to do this:


    > *   Using the left-side jump bar, navigate to `BJViewController.h`.

    > *   Revealing the navigator pane temporarily, select `BJViewController.h`, and
    then hide the navigator pane once more.


    ![Image](images/9781430243748_Fig04-08.jpg)


    **Figure 4-8.** Xcode has autogenerated Objective-C code for our outlet and action
    connections


    So what’s a header and source file? I’m glad you asked!'
  trans: '

    #### 输出口：连接视图


    为了澄清这一点，视图和视图控制器不是同一个东西。视图控制器拥有视图。用 MVC 术语来说，视图控制器是控制器，而视图正如你所料，就是视图本身！


    视图不应该知晓其所属的视图控制器，而视图控制器则可以根据需要，对其拥有的视图了解或多或少的信息。


    在我们的二十一点应用中，需要保留对所有牌和按钮的引用。我们将要隐藏和显示牌，并更改每张牌关联的图片，以模拟发牌过程。保留对 `Hit` 和 `Stand`
    按钮的引用，可以让我们开启或关闭用户交互。例如，当轮到庄家时，我们不想让玩家能够点击 `Hit` 或 `Stand` 按钮。


    那么，我们如何将视图与其视图控制器连接起来呢？


    首先，同时查看故事板和 `BJViewController` 类会很有帮助。Xcode 通过分割编辑器面板实现了这一点。在 Xcode 工具栏的右侧，切换选中的
    Editor 选项，选择 Assistant Editor。这将使编辑器布局变为分割面板。如果右侧跳转栏尚未设置为 `Automatic`，请选择此选项。Xcode
    现在应该会自动选择定义 `BJViewController` 类公共接口的头文件（参见图 4-5）。


    你也可以通过 Editor 按钮旁边的 View 切换按钮，修改 Xcode 的视图布局，并隐藏 Navigator、Inspector 和 Debug 区域。


    这样一来，你会得到一个更适合连接视图和视图控制器的工作区布局，如图 4-5 所示。


    ![Image](img/9781430243748_Fig04-05.jpg)


    **图 4-5.** 在视图和视图控制器之间 Ctrl+拖动以创建输出口和操作连接


    回到正题：我们想在 `BJViewController` 中为视图里的每张牌图片视图以及 `Hit` 和 `Stand` 按钮创建引用。为此，我们将从每个图片视图和按钮
    Ctrl+拖动到视图控制器接口，如图 4-5 所示。起初这看起来有点奇怪，但一旦你习惯了这个过程，就会发现它非常酷。释放鼠标时，Xcode 会提供选项，让你在
    `BJViewController` 中创建一个输出口。假设你从第一张庄家牌拖出，将输出口命名为 `dealerCard1`（参见图 4-6）。确保 Storage
    设置为 `Weak`，然后点击 Connect。


    ![Image](img/9781430243748_Fig04-06.jpg)


    **图 4-6.** 在视图和视图控制器之间 Ctrl+拖动以创建输出口和操作连接


    Xcode 会自动在 `BJViewController` 头文件中为我们的新输出口生成以下 Objective-C 代码：


    ```

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard1;

    ```


    对其余的庄家牌图片视图重复此过程，将输出口命名为 `dealerCard1`、`dealerCard2`，依此类推。然后对玩家牌重复相同操作，同样将它们命名为
    `playerCard1`、`playerCard2`，等等。


    现在为 `Stand` 和 `Hit` 按钮创建输出口，分别命名为 `standButton` 和 `hitButton`。`BJViewController.h`
    接口中生成的代码最终应如下所示：


    ```

    #import <UIKit/UIKit.h>


    @interface BJViewController : UIViewController


    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard1;

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard2;

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard3;

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard4;

    @property (weak, nonatomic) IBOutlet UIImageView *dealerCard5;


    @property (weak, nonatomic) IBOutlet UIImageView *playerCard1;

    @property (weak, nonatomic) IBOutlet UIImageView *playerCard2;

    @property (weak, nonatomic) IBOutlet UIImageView *playerCard3;

    @property (weak, nonatomic) IBOutlet UIImageView *playerCard4;

    @property (weak, nonatomic) IBOutlet UIImageView *playerCard5;


    @property (weak, nonatomic) IBOutlet UIButton *standButton;

    @property (weak, nonatomic) IBOutlet UIButton *hitButton;


    @end

    ```


    #### 操作：响应控件


    我们已经创建了对所有牌图片视图和按钮的引用，现在可以在 `BJViewController` 实现文件的代码中，在运行时访问和控制它们的属性：设置图片视图的图片属性和可见性，以及启用和禁用按钮。


    有没有注意到我们还遗漏了什么？我们的视图控制器类将如何捕获按钮点击事件？


    我们只在视图控制器和视图之间指定了一个方向的输出口。因此，视图并不知道其所属的视图控制器。我们的视图控制器类需要知道用户何时点击了 `Stand` 或 `Hit`
    按钮。


    按钮是控件。`UIButton` 不仅继承自 `UIView`，而且像 iOS SDK 中所有其他用户界面控件一样，`UIButton` 直接继承自 `UIControl`。因为
    Xcode 将 `UIButton` 的实例识别为 `UIControl` 的子类，所以它会自动为我们提供一个额外的连接类型：`Action`。


    用于处理用户交互事件并将其从用户界面控件传递给任何 Objective-C 类类型方法的机制，称为目标-动作。当按钮被点击时，点击事件可以传递给一个方法。我们将在视图控制器中创建两个新方法，它们将响应
    `Hit` 或 `Stand` 按钮的 `Touch Up Inside` 事件而被触发。`Touch Up Inside` 事件在用户触摸控件并在其上抬起手指时触发。这相当于计算机上的鼠标弹起事件。


    Xcode 可以使用与创建输出口时类似的 Ctrl+拖动过程，自动生成目标-动作代码。从每个按钮 Ctrl+拖动到 `BJViewController.h`
    接口，但将连接类型更改为 `Action`，确保 `Touch Up Inside` 是选中的事件类型，然后重复此过程，在你的视图控制器接口头文件中创建以下两个操作方法处理器（参见图
    4-7）：


    ```

    - (IBAction)didTapStandButton:(id)sender;

    - (IBAction)didTapHitButton:(id)sender;

    ```


    ![Image](img/9781430243748_Fig04-07.jpg)


    **图 4-7.** 将按钮控件的操作连接到 `BJViewController`


    *注意：Xcode 也可以通过 Control+点击视图，然后从上下文菜单中拖出输出口和操作来创建它们。*


    我们基本的二十一点游戏的视图部分就完成了。我们已经学习了使用 Xcode 内置的 UI 布局工具添加和排列标签、按钮以及图片视图来创建视图的基础知识。借助故事板，Xcode
    使我们能够布局应用中的视图，并在它们之间创建连接。我们将在明天的第 5 章和第 6 章中学习更多关于故事板的知识，但现在，我们将继续学习 Objective-C
    类、属性、方法和对象类型的基础知识。


    ### Objective-C 基础


    Xcode 不仅在 `BJViewController.h` 头文件中自动生成了输出口声明，还在 `BJViewController.m` 源文件中添加了代码。


    保持 Assistant Editor 布局，在主左侧分割面板中选择 `BJViewController.h`，这样我们就可以同时查看视图控制器的头文件和实现文件（参见图
    4-8）。有几种方法可以做到这一点：


    > *   使用左侧跳转栏，导航到 `BJViewController.h`。

    > *   临时显示导航面板，选择 `BJViewController.h`，然后再次隐藏导航面板。


    ![Image](img/9781430243748_Fig04-08.jpg)


    **图 4-8.** Xcode 已为我们的输出口和操作连接自动生成了 Objective-C 代码


    那么，头文件和源文件是什么呢？问得好！

    '
- fmt: "### Understanding the Header and Source Files\n\nAn Objective-C class typically\
    \ consists of two files: the header file and the source file. The header uses\
    \ the file extension `.h` and the source uses the extension `.m`. The header is\
    \ the public interface for your class: its API (application programming interface).\
    \ The source is where you’ll define the implementation of your class properties\
    \ and methods.\n\nOther classes wishing to reference or create instances of your\
    \ class need to import `YourClass.h` file. You’ll notice in [Figure 4-8](#Chapter04.html#fig_4_8)\
    \ that `BJViewController.m` also imports `BJViewController.h`. Any Objective-C\
    \ implementation file imports its counterpart header file before presenting the\
    \ implementation of the class properties and methods.\n\n### Properties and iVars\
    \ (Instance Variables)\n\nClass properties in Objective-C must be declared in\
    \ the interface of a class. By default, properties are read and writable. A read/write\
    \ property consists of two accessor methods: one to retrieve the value of the\
    \ property and one to set the value. The actual value of the property is stored\
    \ in an *iVar* (instance variable).\n\nAs an example, the header interface file\
    \ of a class might look like this:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Person : NSObject\n{\n        NSString *personName;\n}\n@property\
    \ (strong, nonatomic) NSString *personName;\n@end\n```\n\nIn the header file example,\
    \ we’re declaring a new custom class: `Person`. `Person` inherits from parent\
    \ class `NSObject`. `Person` contains a property named `personName`, which sets\
    \ or returns an `NSString` value. The example header file also declares an iVar\
    \ named `personName`. Although the two declarations have identical names, one\
    \ is the property name and one is the iVar name. The iVar is the private variable\
    \ that the `Person` class uses to store the string pointer. When the `personName`\
    \ property is accessed, the property getter is invoked and it returns a reference\
    \ to the `personName` iVar.\n\nNow that we’ve declared that `Person` has a string\
    \ property of `personName`, the Xcode compiler expects us to create the property’s\
    \ getter and setter accessor methods. In the source file `Person.m`, this would\
    \ look like the following:\n\n```\n#import \"Person.h\"\n@implementation Person\n\
    //personName property setter\n-(void) setPersonName:(NSString *)personNameNew\n\
    {\n    personName = personNameNew;\n}\n\n//personName property getter\n-(NSString\
    \ *)personName\n{\n    return personName;\n}\n@end\n```\n\nWow, that’s a lot of\
    \ code just to get and set a string! Luckily, Xcode can automate the process of\
    \ creating getters and setters using the `synthesize` directive in the class implementation\
    \ file as follows:\n\n```\n#import \"Person.h\"\n\n@implementation Person\n\n\
    @synthesize personName;\n\n@end\n```\n\nThe `synthesize` directive automatically\
    \ generates getter/setter code just like in the first, more verbose implementation\
    \ example. Xcode’s compiler also recognizes the identically named iVar we’ve declared,\
    \ and assigns it as the private storage variable for the property `personName`.\n\
    \nWhat’s *not* ideal is to use an identical name for our property and our iVar:\
    \ like in the example we’ve just seen! Luckily, the compiler allows us to declare\
    \ a private iVar for property storage directly in the `synthesize` directive.\
    \ Here’s how:\n\n`@synthesize personName = _personName;`\n\nWe don’t have to use\
    \ an underscore, but it’s a commonly used convention by Cocoa developers to differentiate\
    \ between properties and iVar names.\n\nAt WWDC 2012, Apple announced improvements\
    \ to property and iVar declaration in modern Objective-C. With Xcode 4.5+, there’s\
    \ *no longer any need to add `synthesize` declarations to your class implementation*.\
    \ The compiler now does it for you automatically. However, it is important to\
    \ understand the code that the compiler automates.\n\nIf you don’t synthesize,\
    \ then your implementation code will look like this:\n\n```\nPerson.m:\n#import\
    \ \"Person.h\"\n@implementation Person\n@end\n```\n\nNice and clean. Xcode automatically\
    \ adds the following synthesis code:\n\n`@synthesize personName = _personName;`\n\
    \nSo if you don’t synthesize, then Xcode now *automatically creates an underscore\
    \ iVar* for you.\n\nIf you synthesize like this:\n\n```\nPerson.m:\n#import \"\
    Person.h\"\n@implementation Person\n@synthesize personName;\n@end\n```\n\nThen\
    \ your iVar is named `personName` and not `_personName`. So in the case of the\
    \ blackjack outlets we added earlier in the chapter, Xcode added synthesize code\
    \ to `BJViewController.m` automatically:\n\n`@synthesize dealerCard1;`\n\nThe\
    \ resulting iVar is named `dealerCard1` and not `_dealerCard1`. The main reason\
    \ for this difference in iVar naming behavior is to ensure backward compatibility\
    \ with older code, before Apple’s 2012 modifications to Objective-C.\n\n### Creating\
    \ a Private Class Interface: Class Extensions\n\nIn `BJViewController.m`, notice\
    \ the code that Xcode has added before the implementation code:\n\n```\n@interface\
    \ BJViewController ()\n\n@end\n```\n\nThis is known in Objective-C as a *class\
    \ extension*. A class extension enables us to define private properties. So with\
    \ our blackjack app, we can declare properties within the `BJViewController.m`\
    \ class extension that are only accessible internally by the `BJViewController.m`\
    \ source file. Other classes only import the `BJViewController.h` header file,\
    \ so the interface remains hidden from external access but is available within\
    \ our source implementation for this class. Let’s add a couple of private properties\
    \ to `BJViewController.m`:\n\n```\n@interface BJViewController ()\n\n@property\
    \ (nonatomic,strong) NSArray *dealerCardViews;\n@property (nonatomic,strong) NSArray\
    \ *playerCardViews;\n\n@end\n```\n\nDid you spot the brackets after the class\
    \ name, indicating to the compiler that we’re declaring a class extension?\n\n\
    We don’t need to synthesize the two new array properties; Xcode’s compiler does\
    \ this for us."
  raw: '#### Understanding the header and source files


    An Objective-C class typically consists of two files: the header file and the
    source file. The header uses the file extension `.h` and the source uses the extension
    `.m`. The header is the public interface for your class: its API (application
    programming interface). The source is where you’ll define the implementation of
    your class properties and methods.


    Other classes wishing to reference or create instances of your class need to import
    `YourClass.h` file. You’ll notice in [Figure 4-8](#Chapter04.html#fig_4_8) that
    `BJViewController.m` also imports `BJViewController.h`. Any Objective-C implementation
    file imports its counterpart header file before presenting the implementation
    of the class properties and methods.


    #### Properties and iVars (instance variables)


    Class properties in Objective-C must be declared in the interface of a class.
    By default, properties are read and writable. A read/write property consists of
    two accessor methods: one to retrieve the value of the property and one to set
    the value. The actual value of the property is stored in an *iVar* (instance variable).


    As an example, the header interface file of a class might look like this:


    `#import <Foundation/Foundation.h>`


    `@interface Person : NSObject`

    `{`

    `        NSString *personName;`

    `}`

    `@property (strong, nonatomic) NSString *personName;`

    `@end`


    In the header file example, we’re declaring a new custom class: `Person`. `Person`
    inherits from parent class `NSObject`. `Person` contains a property named `personName`*,*
    which sets or returns an `NSString` value. The example header file also declares
    an iVar named `personName`. Although the two declarations have identical names,
    one is the property name and one is the iVar name. The iVar is the private variable
    that the `Person` class uses to store the string pointer. When the `personName`
    property is accessed, the property getter is invoked and it returns a reference
    to the `personName` iVar.


    Now that we’ve declared that `Person` has a string property of `personName`, the
    Xcode compiler expects us to create the property’s getter and setter accessor
    methods. In the source file `Person.m`, this would look like the following:


    `#import "Person.h"`

    `@implementation Person`

    `//personName property setter`

    `-(void) setPersonName:(NSString *)personNameNew`

    `{`

    `    personName = personNameNew;`

    `}`


    `//personName property getter`

    `-(NSString *)personName`

    `{`

    `    return personName;`

    `}`

    `@end`


    Wow, that’s a lot of code just to get and set a string! Luckily, Xcode can automate
    the process of creating getters and setters using the `synthesize` directive in
    the class implementation file as follows:


    `#import "Person.h"`


    `@implementation Person`


    `@synthesize personName;`


    `@end`


    The `synthesize` directive automatically generates getter/setter code just like
    in the first, more verbose implementation example. Xcode’s compiler also recognizes
    the identically named iVar we’ve declared, and assigns it as the private storage
    variable for the property `personName`.


    What’s *not* ideal is to use an identical name for our property and our iVar:
    like in the example we’ve just seen! Luckily, the compiler allows us to declare
    a private iVar for property storage directly in the synthesize directive. Here’s
    how:


    `@synthesize personName = _personName;`


    We don’t have to use an underscore, but it’s a commonly used convention by Cocoa
    developers to differentiate between properties and iVar names.


    At WWDC 2012, Apple announced improvements to property and iVar declaration in
    modern Objective-C. With Xcode 4.5+, there’s *no longer any need to add synthesize
    declarations to your class implementation*. The compiler now does it for you automatically.
    However, it is important to understand the code that the compiler automates.


    If you don’t synthesize, then your implementation code will look like this:


    `Person.m:`

    `#import "Person.h"`

    `@implementation Person`

    `@end`


    Nice and clean. Xcode automatically adds the following synthesis code:


    `@synthesize personName = _personName;`


    So if you don’t synthesize, then Xcode now *automatically creates an underscore*
    iVar for you.


    If you synthesize like this:


    `Person.m:`

    `#import "Person.h"`

    `@implementation Person`

    `@synthesize personName;`

    `@end`


    Then your iVar is named `personName` and not `_personName`. So in the case of
    the blackjack outlets we added earlier in the chapter, Xcode added synthesize
    code to `BJViewController.m` automatically:


    `@synthesize dealerCard1;`


    The resulting iVar is named `dealerCard1` and not `_dealerCard1`. The main reason
    for this difference in iVar naming behavior is to ensure backward compatibility
    with older code, before Apple’s 2012 modifications to Objective-C.


    #### Creating a private class interface: class extensions


    In `BJViewController.m`, notice the code that Xcode has added before the implementation
    code:


    `@interface BJViewController ()`


    `@end`


    This is known in Objective-C as a *class extension*. A class extension enables
    us to define private properties. So with our blackjack app, we can declare properties
    within the `BJViewController.m` class extension that are only accessible internally
    by the `BJViewController.m` source file. Other classes only import the `BJViewController.h`
    header file, so the interface remains hidden from external access but is available
    within our source implementation for this class. Let’s add a couple of private
    properties to `BJViewController.m`:


    `@interface BJViewController ()`


    **`@property (nonatomic,strong) NSArray *dealerCardViews;`**

    **`@property (nonatomic,strong) NSArray *playerCardViews;`**


    `@end`


    Did you spot the brackets after the class name, indicating to the compiler that
    we’re declaring a class extension?


    We don’t need to synthesize the two new array properties; Xcode’s compiler does
    this for us.'
  trans: "\n### 理解头文件和源文件\n\nObjective-C 类通常由两个文件组成：头文件和源文件。头文件使用扩展名 `.h`，源文件使用扩展名\
    \ `.m`。头文件是类的公共接口：即其 API（应用程序编程接口）。源文件则用于定义类属性和方法的实现。\n\n其他类若想引用或创建你的类的实例，需要导入\
    \ `YourClass.h` 文件。你会在图 4-8 中看到 `BJViewController.m` 也导入了 `BJViewController.h`。任何\
    \ Objective-C 实现文件在呈现类属性和方法的实现之前，都会先导入对应的头文件。\n\n### 属性和实例变量 (iVars)\n\nObjective-C\
    \ 中的类属性必须在类的接口中声明。默认情况下，属性是可读写的。一个读/写属性包含两个访问方法：一个用于获取属性的值，另一个用于设置属性的值。属性的实际值存储在*实例变量*（iVar）中。\n\
    \n例如，一个类的头文件接口可能如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Person : NSObject\n{\n        NSString *personName;\n}\n@property (strong, nonatomic)\
    \ NSString *personName;\n@end\n```\n\n在头文件的示例中，我们声明了一个新的自定义类：`Person`。`Person`\
    \ 继承自父类 `NSObject`。`Person` 包含一个名为 `personName` 的属性，该属性设置或返回一个 `NSString` 值。示例头文件还声明了一个名为\
    \ `personName` 的 iVar。尽管这两个声明的名称相同，但一个是属性名，另一个是 iVar 名。iVar 是 `Person` 类用于存储字符串指针的私有变量。当访问\
    \ `personName` 属性时，属性的 getter 方法被调用，并返回对 `personName` iVar 的引用。\n\n现在我们已经声明 `Person`\
    \ 有一个名为 `personName` 的字符串属性，Xcode 编译器期望我们创建该属性的 getter 和 setter 访问方法。在源文件 `Person.m`\
    \ 中，实现如下所示：\n\n```\n#import \"Person.h\"\n@implementation Person\n//personName\
    \ 属性的 setter\n-(void) setPersonName:(NSString *)personNameNew\n{\n    personName\
    \ = personNameNew;\n}\n\n//personName 属性的 getter\n-(NSString *)personName\n{\n\
    \    return personName;\n}\n@end\n```\n\n哇，仅仅为了获取和设置一个字符串就要写这么多代码！幸运的是，Xcode 可以通过在类实现文件中使用\
    \ `synthesize` 指令来自动化创建 getter 和 setter 的过程，如下所示：\n\n```\n#import \"Person.h\"\
    \n\n@implementation Person\n\n@synthesize personName;\n\n@end\n```\n\n`synthesize`\
    \ 指令会自动生成 getter/setter 代码，就像第一个更冗长的实现示例一样。Xcode 的编译器也能识别出我们声明的同名 iVar，并将其分配为属性\
    \ `personName` 的私有存储变量。\n\n但*并不理想*的是，我们的属性和 iVar 使用了相同的名称：就像我们刚刚看到的示例那样！幸运的是，编译器允许我们在\
    \ `synthesize` 指令中直接为属性存储声明一个私有的 iVar。操作方法如下：\n\n`@synthesize personName = _personName;`\n\
    \n我们不必使用下划线，但这是 Cocoa 开发者之间一种常用的约定，用于区分属性和 iVar 的名称。\n\n在 2012 年的 WWDC 上，Apple\
    \ 宣布了对现代 Objective-C 中属性和 iVar 声明的改进。使用 Xcode 4.5+ 后，*不再需要向类实现中添加 `synthesize`\
    \ 声明*。编译器现在会自动为你完成这一操作。然而，理解编译器自动生成的代码非常重要。\n\n如果你不进行合成，那么你的实现代码将如下所示：\n\n```\n\
    Person.m:\n#import \"Person.h\"\n@implementation Person\n@end\n```\n\n简洁且干净。Xcode\
    \ 会自动添加以下合成代码：\n\n`@synthesize personName = _personName;`\n\n所以，如果你不进行合成，那么 Xcode\
    \ 现在会*自动为你创建一个带下划线的 iVar*。\n\n如果你像这样进行合成：\n\n```\nPerson.m:\n#import \"Person.h\"\
    \n@implementation Person\n@synthesize personName;\n@end\n```\n\n那么你的 iVar 将被命名为\
    \ `personName` 而不是 `_personName`。因此，考虑到我们本章前面添加的二十一点 outlets 案例，Xcode 自动向 `BJViewController.m`\
    \ 添加了合成代码：\n\n`@synthesize dealerCard1;`\n\n由此产生的 iVar 被命名为 `dealerCard1` 而不是\
    \ `_dealerCard1`。这种 iVar 命名行为差异的主要原因是为了确保与 Apple 2012 年修改 Objective-C 之前的旧代码保持向后兼容性。\n\
    \n### 创建私有类接口：类扩展\n\n在 `BJViewController.m` 中，注意 Xcode 在实现代码之前添加的代码：\n\n```\n\
    @interface BJViewController ()\n\n@end\n```\n\n这在 Objective-C 中被称为*类扩展*。类扩展使我们能够定义私有属性。因此，在我们的二十一点应用中，我们可以在\
    \ `BJViewController.m` 的类扩展中声明属性，这些属性仅能被 `BJViewController.m` 源文件内部访问。其他类只导入 `BJViewController.h`\
    \ 头文件，因此该接口对外部访问保持隐藏，但在我们的源实现中对此类可用。让我们向 `BJViewController.m` 添加几个私有属性：\n\n```\n\
    @interface BJViewController ()\n\n@property (nonatomic,strong) NSArray *dealerCardViews;\n\
    @property (nonatomic,strong) NSArray *playerCardViews;\n\n@end\n```\n\n你注意到类名后面的括号了吗？这向编译器表明我们正在声明一个类扩展。\n\
    \n我们不需要对这两个新的数组属性进行合成；Xcode 的编译器会为我们自动完成。\n"
- fmt: "### Arrays\n\n注意，声明类扩展的语法与公共接口类似，但不完全相同：\n\n```\n@interface BJViewController\
    \ ()\n@property (nonatomic,strong) NSArray *dealerCardViews;\n@property (nonatomic,strong)\
    \ NSArray *playerCardViews;\n@end\n```\n\n我们正在创建两个数组，一个用于保留对庄家卡视图的引用，另一个用于保留对玩家卡视图的引用。这两个数组将用于索引显示的卡片；也就是说，`dealerCardViews`\
    \ 数组的第一个元素是对 `dealerCard1` 的引用。\n\n默认情况下，Objective-C 将所有指针合成为 `nil`。那么什么时候是实例化这两个数组的好时机呢？在视图生命周期的哪个时间点，我们才能访问已配置的卡片图像视图输出口？\n\
    \n有人知道吗？有人吗？……Bueller？……Bueller？……Bueller？……\n\n你在 `BJViewController.m` 中发现了 `viewDidLoad`\
    \ 方法吗？这是视图控制器能够访问其视图的第一个时间点。此时，编译器已经为我们连接好了所有输出口。因此，`viewDidLoad` 是实例化新的 `dealerCardViews`\
    \ 和 `playerCardViews` 数组的理想位置。以下是需要添加的代码：\n\n```\n- (void)viewDidLoad\n{\n   \
    \ [super viewDidLoad];\n    self.dealerCardViews =\n@[self.dealerCard1,self.dealerCard2,self.dealerCard3,self.dealerCard4,self.dealerCard5];\n\
    \    self.playerCardViews =\n@[self.playerCard1,self.playerCard2,self.playerCard3,self.playerCard4,self.playerCard5];\n\
    }\n```\n\n在 Xcode 4.5 之前，我们会使用更冗长的 `[NSArray arrayWithObjects:]` 语法来定义数组，如下所示：\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.dealerCardViews\
    \ = [NSArray\narrayWithObjects:self.dealerCard1,self.dealerCard2,self.dealerCard3,self.dealerCard4,self.dealerCard5,\
    \ nil];\n    self.playerCardViews = [NSArray\narrayWithObjects:self.playerCard1,self.playerCard2,self.playerCard3,self.playerCard4,self.playerCard5,\
    \ nil];\n\n}\n```\n\n这两种实现方式的效果完全相同，但第一种方式需要的代码更少——在我看来，少即是多！在第一个示例中，我们使用了新的 Objective-C\
    \ 字面量语法。本书中我们将大量使用字面量，因为它更简洁、更清晰且更易读。\n\nObjective-C 中有两种数组类型：`NSArray` 和 `NSMutableArray`。正如类名所示，一个是可变的，另一个是不可变的。一旦\
    \ `NSArray` 被实例化，它就不能被修改，也就是说，你不能向数组中添加或移除元素。对于索引卡视图的目的来说，一个不可变的 `NSArray` 完全适用于这些属性：我们不会移除或添加卡视图，只会显示和隐藏它们。\n\
    \n### Init、初始化器和指定初始化器（构造器）\n\nObjective-C 类结构中与构造函数最接近的是被称为初始化器的方法。这个初始化器是类的一个方法，在类实例化时只调用一次。回到我们的\
    \ `Person` 示例，如果我们不对该类做进一步修改，那么我们就可以像这样实例化 `Person` 的新实例：\n\n```\nPerson *p =\
    \ [[Person alloc] init];\n```\n\n`alloc` 是一个底层类方法，你永远不需要覆盖它。当 `alloc` 被调用时，内存被分配给该类，并且（如我们示例中的情况）会实例化一个\
    \ `Person` 实例，然后在该实例上调用 `init`。\n\n目前，我们还没有为 `Person` 创建初始化器。但是 `Person` 继承自 `NSObject`，而\
    \ `NSObject` 有一个名为 `init` 的初始化器。所以我们仍然需要调用超类的初始化器。\n\n在源文件 `Person.m` 中，我们可以像这样覆盖\
    \ `init`：\n\n```\n-(id)init\n{\n    self = [super init];\n    if (self) {\n  \
    \      //设置一些默认属性值？\n    }\n    return self;\n}\n```\n\n初始化器方法应该始终返回对自身的引用。我们使用通用对象类型\
    \ `id` 来使初始化器能够被子类化。`id` 仅仅意味着返回值将是一个对象。\n\n在不进行子类化的情况下，还有其他创建初始化器的方法；例如，我们可能希望向\
    \ `Person` 类的初始化器中传递一个自定义参数：\n\n```\n-(id)initWithName:(NSString *)name\n{\n \
    \   self = [super init];\n    if (self) {\n        self.personName = name;\n \
    \   }\n    return self;\n}\n```\n\n注意到我们的自定义初始化器是如何在超类 `NSObject` 上调用 `init` 的吗？`init`\
    \ 也是 `NSObject` 的*指定初始化器*——所有子类在其自身的初始化方法中都必须调用的初始化器。这有点令人困惑，所以我再强调一下：*指定初始化器*是在直接实例化一个类或通过其子类实例化时，必须首先调用的初始化方法。\n\
    \n在我们的示例中，如果我们决定强制 `Person` 的每个实例在实例化时都设置其 `personName` 属性，那么 `initWithName` 就可以是\
    \ `Person` 的指定初始化器。\n\n*提示：像 `NSObject` 这样的顶层类有一个名为 `init` 的初始化方法。由于 Cocoa 中几乎所有类都继承自\
    \ `NSObject`，通常的做法是让你的类初始化器在其自身的初始化器中调用 `[super init]`。*\n\n有些类有多个初始化器：例如数组：\n\
    \n- `initWithArray:`\n- `initWithArray:copyItems:`\n- `initWithContentsOfFile:`\n\
    - `initWithContentsOfURL:`\n- `initWithObjects:`\n- `initWithObjects:count:`\n\
    \n因此，由你来选择最合适的初始化器。"
  raw: '#### Arrays


    Note that the syntax for declaring the class extension is similar to the public
    interface but not identical:


    `@interface BJViewController ()`

    `@property (nonatomic,strong) NSArray *dealerCardViews;`

    `@property (nonatomic,strong) NSArray *playerCardViews;`

    `@end`


    We’re creating two arrays, one to retain references to the dealer’s card views
    and one to retain references to the player’s card views. The arrays will be used
    to index the displayed cards; that is, the first element of the `dealerCardViews`
    array will be a reference to `dealerCard1`.


    By default, Objective-C synthesizes all pointers to `nil`. So when would be a
    good time for us to instantiate the two arrays? At what point in the view life
    cycle will we have access to the card image view outlets we’ve configured?


    Anyone? Anyone? Bueller?… Bueller?… Bueller?…


    Did you spot the `viewDidLoad` method in `BJViewController.m`? That’s the first
    point at which our view controller has access to its view. Any outlets will have
    been connected for us at that point by the compiler. So `viewDidLoad` is the perfect
    place to instantiate the new `dealerCardViews` and `playerCardViews` arrays. Here’s
    the code to add:


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    **`    self.dealerCardViews =`**

    **`@[self.dealerCard1,self.dealerCard2,self.dealerCard3,self.dealerCard4,self.dealerCard5];`**

    **`    self.playerCardViews =`**

    **`@[self.playerCard1,self.playerCard2,self.playerCard3,self.playerCard4,self.playerCard5];`**

    `}`


    Prior to Xcode 4.5, we’d have defined our arrays with the more verbose `[NSArray
    arrayWithObjects:]` syntax as follows:


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    self.dealerCardViews = [NSArray`

    `arrayWithObjects:self.dealerCard1,self.dealerCard2,self.dealerCard3,self.dealerCard4,self.deal`

    `erCard5, nil];`

    `    self.playerCardViews = [NSArray`

    `arrayWithObjects:self.playerCard1,self.playerCard2,self.playerCard3,self.playerCard4,self.play`

    `erCard5, nil];`


    `}`


    Both of these implementations work identically, but the first requires less code—and
    less is more in my book! In the first example, we’re using the new Objective-C
    literals syntax. We’ll be using literals a lot throughout the book because it’s
    cleaner, more concise, and easier to read.


    There are two types of arrays in Objective-C: `NSArray` and `NSMutableArray`.
    As the class names imply, one is mutable and the other is not. Once an `NSArray`
    has been instantiated, it cannot be modified, that is, you cannot add and remove
    elements to/from the array. For the purpose of indexing card views, a non-mutable
    `NSArray` works just fine for these properties: we’re not going to be removing
    and adding card views, just showing and hiding them.


    #### Init, Initializers, and designated initializers (constructors)


    The closest thing Objective-C has to a constructor in its class structure is a
    method referred to as an *initializer*. This initializer is a method of a class
    that is called just once, at the moment the class is instantiated. Returning to
    our `Person` example, if we made no further changes to the class, then we would
    instantiate new instances of `Person`, like this:


    `Person *p = [[Person alloc] init];`


    `alloc` is a low-level class method that you should never need to override. When
    `alloc` is called, memory is allocated to the class and, as in the case of our
    example, an instance of `Person` is instantiated and `init` is then called on
    that instance.


    At the moment, we haven’t created an initializer for `Person`. But `Person` inherits
    from `NSObject`, which has an initializer called `init`. So we still need to call
    the initializer of the superclass.


    Within the source file `Person.m`, we can override `init` as follows:


    `-(id)init`

    `{`

    `    self = [super init];`

    `    if (self) {`

    `        //set up some default property values?`

    `    }`

    `    return self;`

    `}`


    Initializer methods should always return a reference to themselves. We use the
    generic object type `id` to enable the initializer to be subclassed. `id` simply
    implies that the return value will be an object.


    There are other ways to create initializers without subclassing; for example,
    we may want to pass in a custom parameter to the initializer of our `Person` class:


    `-(id)initWithName:(NSString *)name`

    `{`

    `    self = [super init];`

    `    if (self) {`

    `        self.personName = name;`

    `    }`

    `    return self;`

    `}`


    Notice how our custom initializer calls `init` on the superclass `NSObject`? `init`
    is also the designated initializer of `NSObject`—the initializer that all subclasses
    must call in their own initialization methods. It’s a little confusing, so I’ll
    reinforce that: the *designated initializer* is the initialization method that
    must be called first when instantiating instances of a class directly or via its
    subclasses.


    In our example, `initWithName` could be the designated initializer of `Person`
    if we decided to enforce every instance of `Person` to have its `personName` property
    set on instantiation.


    *Tip: Top-level classes like* `NSObject` *have an initializer method called init.
    As almost all classes in Cocoa inherit from* `NSObject` *it is customary for your
    class initializer to call* `[super init]` *within its own initializer(s).*


    Some classes have multiple initializers: arrays, for example:


    `– initWithArray:`

    `– initWithArray:copyItems:`

    `– initWithContentsOfFile:`

    `– initWithContentsOfURL:`

    `– initWithObjects:`

    `– initWithObjects:count:`


    So it’s up to you to pick the most suitable initializer.'
