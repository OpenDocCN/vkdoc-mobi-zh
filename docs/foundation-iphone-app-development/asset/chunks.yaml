    与编辑视图控制器类似，我们采用相似的方法来启用/禁用“发布”按钮：通过一个私有的 `updatePostButton` 方法，该方法在视图出现以及用户编辑文本时被调用：\n\
    \n```\n-(void) updatePostButton\n{\n    self.postButton.enabled = self.textView.text.length\
    \ > 0;\n}\n```\n\n如果你构建并运行，结果应类似于图 11-16。\n\n![Image](img/9781430243748_Fig11-16.jpg)\n\
    \n**图 11-16.** 优化后的“发布到 Facebook 墙”视图，包含可启用/禁用的“发布”按钮\n\n太好了，我们自定义的“发布到 Facebook\
    \ 墙”视图和视图控制器的 UI 已经完成。现在，我们来实际向 Facebook 发送一条帖子！\n\n我们将所有 Facebook API 调用集中在 `BRDModel`\
    \ 单例中。因此，打开 `BRDModel.h` 并声明一个新的公有方法 `postToFacebookWall:withFacebookID:`：\n\n\
    ```\n- (void)postToFacebookWall:(NSString *)message withFacebookID:(NSString *)facebookID;\n\
    ```\n\n在实现该方法之前，跳转到 `BRPostToFacebookWallViewController.m` 文件，导入 `BRDModel.h`，并完成\
    \ `postToFacebook` 动作方法：\n\n```\n- (IBAction)postToFacebook:(id)sender {\n   \
    \ [[BRDModel sharedInstance] postToFacebookWall:self.textView.text withFacebookID:self.facebookID];\n\
    \    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n现在，我们将发布逻辑添加到模型中。打开\
    \ `BRDModel.m`。我们将对“发布到 Facebook”流程应用与获取 Facebook 好友生日非常相似的逻辑。也就是说，我们不会假设用户已经通过了\
    \ Facebook 认证。基于这一点，我们可能需要等待认证流程完成才能发布。因此，如果用户当前会话中认证流程尚未完成，我们将把要发布的 Facebook\
    \ ID 和消息存储到几个新的私有属性中。在 `BRDModel.m` 的私有接口中添加以下私有属性：\n\n```\n@interface BRDModel()\n\
    \n@property (strong) ACAccount *facebookAccount;\n@property FacebookAction currentFacebookAction;\n\
    @property (nonatomic,strong) NSString *postToFacebookMessage;\n@property (nonatomic,strong)\
    \ NSString *postToFacebookID;\n\n@end\n```\n\n现在来实现新方法 `postToFacebookWall` 的第一部分：\n\
    \n```\n- (void)postToFacebookWall:(NSString *)message withFacebookID:(NSString\
    \ *)facebookID\n{\n    NSLog(@\"postToFacebookWall\");\n\n    if (self.facebookAccount\
    \ == nil) {\n        //我们尚未获得授权，因此存储 Facebook 消息和 ID，并启动认证流程\n        self.postToFacebookMessage\
    \ = message;\n        self.postToFacebookID = facebookID;\n        self.currentFacebookAction\
    \ = FacebookActionPostToWall;\n        [self authenticateWithFacebook];\n    \
    \    return;\n    }\n\n    NSLog(@\"我们已获得授权，开始发布到 Facebook！\");\n\n}    \n```\n\
    \n这段代码看起来与最初的 `fetchFacebookBirthdays` 代码非常相似。如果我们需要授权 `facebookAccount` 属性，则存储消息和\
    \ Facebook ID，并将当前 Facebook 动作设置为枚举值 `FacebookActionPostToWall`。\n\n在完成 `postToFacebookWall`\
    \ 方法之前，首先找到 `authenticateWithFacebook` 方法，并补全用户认证完成后 switch 语句中的 `TODO` 部分：\n\n\
    ```\nswitch (self.currentFacebookAction) {\n                case FacebookActionGetFriendsBirthdays:\n\
    \                    [self fetchFacebookBirthdays];\n                    break;\n\
    \                case FacebookActionPostToWall:\n                    [self postToFacebookWall:self.postToFacebookMessage\n\
    withFacebookID:self.postToFacebookID];\n                    break;\n         \
    \   }\n```\n\n很好。让我们回到 `postToFacebookWall:withFacebookID` 方法中完成发布逻辑：\n\n```\n\
    - (void)postToFacebookWall:(NSString *)message withFacebookID:(NSString *)facebookID\n\
    {\n    NSLog(@\"postToFacebookWall\");\n\n    if (self.facebookAccount == nil)\
    \ {\n        //我们尚未获得授权，因此存储 Facebook 消息和 ID，并启动认证流程\n        self.postToFacebookMessage\
    \ = message;\n        self.postToFacebookID = facebookID;\n        self.currentFacebookAction\
    \ = FacebookActionPostToWall;\n        [self authenticateWithFacebook];\n    \
    \    return;\n    }\n\n    NSLog(@\"我们已获得授权，开始发布到 Facebook！\");\n\n    NSDictionary\
    \ *params = @{@\"message\":message};\n\n    //使用用户的 Facebook ID 调用发布到好友动态的 Graph\
    \ API 路径\n    NSString *postGraphPath = [NSString\nstringWithFormat:@\"https://graph.facebook.com/%@/feed\"\
    ,facebookID];\n\n    NSURL *requestURL = [NSURL URLWithString:postGraphPath];\n\
    \n    SLRequest *request = [SLRequest requestForServiceType:SLServiceTypeFacebook\
    \ requestMethod:SLRequestMethodPOST URL:requestURL parameters:params];\n    request.account\
    \ = self.facebookAccount;\n\n    [request performRequestWithHandler:^(NSData *responseData,\
    \ NSHTTPURLResponse\n*urlResponse, NSError *error) {\n        if (error != nil)\
    \ {\n            NSLog(@\"发布到 Facebook 时出错：%@\",error);\n        }\n        else\n\
    \        {\n            //Facebook 返回一个包含新帖子 ID 的字典——这对其他项目可能有用\n            NSDictionary\
    \ *dict = (NSDictionary *) [NSJSONSerialization JSONObjectWithData:responseData\
    \ options:0 error:nil];\n            NSLog(@\"成功发布到 Facebook！帖子 ID：%@\",dict);\n\
    \        }\n    }];\n\n}\n```\n\n构建并运行。你应该能够直接从 *生日提醒* 应用发布到好友的 Facebook 动态！\n\
    \n尝试修改代码中传递给 `SLRequest` 实例的 `params` 字典。你可以添加其他参数，例如链接或图片的 URL，以包含在动态帖子中。一旦你达到这一步，你就拥有了一个功能强大的社交组件基础。你可以在\
    \ [`http://developers.facebook.com/docs/reference/api/post/`](http://developers.facebook.com/docs/reference/api/post/)\
    \ 上阅读关于 Facebook 在 `post` 对象中接受的不同参数值的所有内容。\n\n我强烈建议你在启用好友间 Facebook 动态发布功能时要谨慎行事，并确保你使用此功能的方式符合用户期望。由于我们正在帮助用户发送生日祝福消息，我特意避免了在\
    \ `post` 对象中添加任何应用广告，因为我们不希望用户指责我们向其好友发送垃圾信息！"
- fmt: '### Summary


    Today we learned how Facebook’s Graph API and Apple’s Accounts and new Social
    framework make a very powerful combination for integrating all kinds of Facebook
    features natively into your apps. We worked with just two of the Facebook API
    methods for retrieving friends and for posting to friends’ Walls, but there are
    many other accessible methods to enhance the content and social features for all
    kinds of iPhone and iPad apps.


    For example, one of my apps, *Portfolio Pro for iPad*, is an app for photographers
    and designers to take their portfolio offline and make available for client presentations.
    In addition to its core, the offline presentation feature Portfolio Pro allows
    photographers to sign on to Facebook and upload any of their photos directly to
    any of their existing Facebook albums. This feature greatly simplifies the workflow
    for many photographers because they can import photos from Flickr, Dropbox, or
    their iPad, and easily add and upload them to Facebook albums as well. The benefits
    are two-fold: the app makes life easier for the photographer and Facebook adds
    a “via Portfolio Pro for iPad” link next to every photo posted by my users. So
    I get a subtle promotional link back to my app’s Facebook page and more app exposure
    to the photographer’s Facebook friends.


    As we developers add Facebook features to our apps, the challenge is to find the
    right balance between being helpful and taking advantage of social sharing and
    advertising. The primary focus needs to be to create features that are relevant
    to our app’s primary function and to help our users—rather than get in the way!


    ![Image](images/ch.jpg)


    ## Chapter 12


    ## Settings and Local Notifications


    We’re nearing the end of Day 4. In terms of function and feel, our app is almost
    complete. However, it is still missing its key feature: birthday reminder notifications!
    In this chapter, we’ll develop our in-app settings functionality so that users
    can define how many days notice and what time of day they’d like their birthday
    reminders. We’ll then apply those settings to automatically schedule birthday
    reminder notifications for our user.


    ### Working with static table view controllers


    We’ll begin by replacing our main settings screen with a table view controller
    populated with two table cells to enable our user to change the default alert
    time and number of advance days to get birthday reminder notifications.


    Our current implementation of an empty Settings view controller with a lonely
    Set Alert Time button needs to go. So to begin, we’re going to get rid of our
    current Settings view controller entirely—but don’t worry, sometimes you’ve gotta
    be cruel to be kind. ![Image](images/smile.jpg)


    Open your storyboard and select the Settings view controller scene (as highlighted
    in [Figure 12-1](#Chapter12.html#fig_12_1)). Then tap the Backspace key to delete
    the scene from your storyboard. You should be left with a navigation controller
    on the left, the Alert Time view controller on the right, and a big space between
    them! Now multiselect `BRSettingsViewController.h` and `BRSettingsViewController.m`
    in the Project Navigator (also highlighted in [Figure 12-1](#Chapter12.html#fig_12_1)).
    Delete those files! Be sure to select the Move to Trash option when deleting in
    order to enable us to re-create files of the same names shortly.


    ![Image](images/9781430243748_Fig12-01.jpg)


    **Figure 12-1.** Delete the highlighted storyboard scene and Settings view controller
    class files


    Now to replace the old Settings view controller. We’re going to build the new
    Settings view controller using static table cells: table cells that remain in
    memory and aren’t reused by their table view. In order to use static table cells,
    Xcode requires us to subclass a table view controller rather than the standard
    view controller to create our new Settings view controller. A table view controller
    is a view controller with a table view as its main view, and, by default, the
    controller is set as the delegate and data source of the table view.


    Drag a new table view controller (`UITableViewController`) object onto the storyboard.
    Control-drag from the Settings navigation controller to the new table view controller
    in your storyboard, and select the Relationship Root View Controller option from
    the contextual menu (see [Figure 12-2](#Chapter12.html#fig_12_2)).


    ![Image](images/9781430243748_Fig12-02.jpg)


    **Figure 12-2.** Defining a root view controller relationship via the storyboard


    A connection between the navigation controller and new setting controller scene
    should appear. Title the navigation bar of the new settings scene, Settings, and
    add a bar button item to the right side of the navigation bar. Set its title to
    Done (see [Figure 12-3](#Chapter12.html#fig_12_3)).


    ![Image](images/9781430243748_Fig12-03.jpg)


    **Figure 12-3.** Storyboarding the new settings scene


    Select the table view in the new settings scene. With the attributes inspector,
    change the table view style from Plain to Grouped. Change the content setting
    of the table view from Dynamic Prototypes to Static Cells. Scroll down the attributes
    inspector to the View attributes, and change the view background color to Clear
    Color.


    Xcode auto generates three static table cells for you. Select and delete two of
    them. With the one remaining static table cell, change its style to Right Detail
    (`UITableViewCellStyleValue1`), enter the title **Days Before**, and set the detail
    text to On Birthday (see [Figure 12-4](#Chapter12.html#fig_12_4)).


    ![Image](images/9781430243748_Fig12-04.jpg)


    **Figure 12-4.** Creating a static table cell with the Right Detail (`UITableViewCellStyleValue1`)
    style


    Now select the Table View Section in the document outline pane of the editor.
    In the attributes inspector, increment the row count of the table view section
    to 2. Xcode automatically applies identical style and text from the first static
    table cell.


    Modify the title of the second table cell to Alert Time and change its detail
    text to 9:00 a.m. (see [Figure 12-5](#Chapter12.html#fig_12_5)).


    ![Image](images/9781430243748_Fig12-05.jpg)'
