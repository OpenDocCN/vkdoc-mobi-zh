  trans: "\n```objectivec\n//UIImageView 上一个额外的、隐藏的依赖分类。主要用于为 UIImageView 添加两个动态属性：url\
    \ 和 downloadHelper\n\n@interface UIImageView(RemoteFileHidden) <DownloadHelperDelegate>\n\
    \n@property (nonatomic,strong,setter = setUrl:) NSString *url;\n@property (nonatomic,strong,setter\
    \ = setDownloadHelper:) DownloadHelper *downloadHelper;\n\n@end\n\n@implementation\
    \ UIImageView(RemoteFileHidden)\n\n@dynamic url;\n@dynamic downloadHelper;\n\n\
    static char kImageUrlObjectKey;\nstatic char kImageDownloadHelperObjectKey;\n\n\
    + (ImageCache *)imageCache {\n    static ImageCache *_imageCache;\n\n    //返回\
    \ UIImageCache 的单例实例\n    if (_imageCache == nil) {\n        _imageCache = [[ImageCache\
    \ alloc] init];\n    }\n    return _imageCache;\n}\n\n- (NSString *)url {\n  \
    \  return (NSString *)objc_getAssociatedObject(self, &kImageUrlObjectKey);\n}\n\
    \n- (void)setUrl:(NSString *)url {\n    objc_setAssociatedObject(self, &kImageUrlObjectKey,\
    \ url,\nOBJC_ASSOCIATION_RETAIN_NONATOMIC);\n}\n\n- (DownloadHelper *)downloadHelper\
    \ {\n\n    DownloadHelper *helper = (DownloadHelper *)objc_getAssociatedObject(self,\
    \ &kImageDownloadHelperObjectKey);\n\n    if (helper == nil) {//helper 类的懒加载\n\
    \        helper = [[DownloadHelper alloc] init];\n        //当 helper 完成远程图片数据下载后，会调用其代理（即该\
    \ image view）\n        helper.delegate = self;\n        self.downloadHelper =\
    \ helper;\n    }\n\n    return helper;\n}\n\n- (void)setDownloadHelper:(DownloadHelper\
    \ *)downloadHelper {\n    objc_setAssociatedObject(self, &kImageDownloadHelperObjectKey,\
    \ downloadHelper, OBJC_ASSOCIATION_RETAIN_NONATOMIC);\n}\n\n-(void) dealloc\n\
    {\n    if (self.url != nil) [self.downloadHelper cancelConnection];\n}\n\n#pragma\
    \ mark DownloadHelperDelegate\n\n-(void)didCompleteDownloadForURL:(NSString *)url\
    \ withData:(NSMutableData *)data\n{\n    //处理下载的图片数据，将其转换为图片实例，并保存到 ImageCache\
    \ 单例中。\n\n    UIImage *image = [UIImage imageWithData:data];\n\n    if (image\
    \ == nil) {//可能有问题——数据可能已损坏或 url 无效\n        return;\n    }\n\n    //缓存图片\n  \
    \  ImageCache *imageCache = [UIImageView imageCache];\n    [imageCache storeCachedImage:image\
    \ forURL:url];\n\n    //更新此 UIImageView 的占位图片显示\n    self.image = image;\n\n}\n\
    \n@end\n```\n\n除了为 `UIImageView` 添加动态的 `url` 和 `downloadHelper` 属性外，这段代码还为 `UIImageView`\
    \ 的实例新增了一个类访问器方法 `imageCache`。调用 `imageCache` 会返回一个指向我们 `ImageCache` 类单例实例的引用。当\
    \ `DownloadHelper` 实例从 `NSURLConnection` 收到 `connectionDidFinishLoading:` 回调时，它会通过\
    \ `didCompleteDownloadForURL: withData:` 方法调用其代理（即 image view），并传入从服务器连接获取的完整数据。`UIImageView`\
    \ 的 `didCompleteDownloadForURL: withData:` 方法随后会根据这些数据创建一张图片，并使用远程 URL 作为访问键，将其存储到单例图片缓存中。占位图片也会被替换为新的缓存数据图片。\n\
    \n最后，让我们实现主要的分类方法 `setImageWithRemoteFileURL:placeHolderImage:`。\n\n```objectivec\n\
    @implementation UIImageView (RemoteFile)\n\n- (void)setImageWithRemoteFileURL:(NSString\
    \ *)urlString placeHolderImage:(UIImage\n*)placeholderImage\n{\n\n    if (self.url\
    \ != nil && [self.url isEqualToString:urlString]) {\n        //如果 url 与现有 url\
    \ 相同，则忽略\n        return;\n    }\n\n    [self.downloadHelper cancelConnection];\n\
    \n    self.url = urlString;\n\n    //获取图片缓存单例的引用\n    ImageCache *imageCache =\
    \ [UIImageView imageCache];\n\n    UIImage *image = [imageCache cachedImageForURL:urlString];\n\
    \    //检查是否已有该图片的缓存版本\n    if (image) {\n        self.image = image;\n       \
    \ return;\n    }\n\n    //没有缓存版本，因此开始下载远程文件\n    self.image = placeholderImage;\n\
    \n    NSURL *url = [NSURL URLWithString:urlString];\n    NSURLRequest *request\
    \ = [NSURLRequest requestWithURL:url];\n\n    self.downloadHelper.url = urlString;\n\
    \    //将 download helper 设置为数据下载更新的代理\n    self.downloadHelper.connection =(NSURLConnection\
    \ *)[[NSURLConnection alloc]\ninitWithRequest:request delegate:self.downloadHelper\
    \ startImmediately:YES];\n    if (self.downloadHelper.connection) {\n        //创建一个空的可变数据容器来添加数据字节\n\
    \        self.downloadHelper.data = [NSMutableData data];\n    }\n}\n\n@end\n\
    ```\n\n假设我们的 Facebook 好友表格视图显示了 500 行好友及其远程照片。你还记得表格视图是如何高效渲染这么多行的吗？它只创建足够填满可见区域所需的表格视图单元格。当用户向下滚动表格时，它会重复使用那五六个表格单元格。这意味着\
    \ `iconView` 图片视图也被重复使用。因此，当调用 `setImageWithRemoteFileURL:placeHolderImage:` 方法时，我们做的第一件事就是取消任何现有的文件下载：\n\
    \n```objectivec\n[self.downloadHelper cancelConnection];\n```\n\n正是这行代码阻止了我们的应用程序尝试同时下载数百张\
    \ Facebook 好友照片。在我们的方法启动新的文件下载之前，它会检查是否已有该 URL 对应的缓存图片：\n\n```objectivec\nUIImage\
    \ *image = [imageCache cachedImageForURL:urlString];\n```\n\n如果我们已有缓存版本，那么就会使用现有的缓存图片，而不是尝试重新下载远程图片。如果这是我们的程序首次尝试下载该远程图片，那么我们会创建一个新的\
    \ URL 连接，并将 download helper 实例设置为数据连接更新的代理，例如数据下载完成事件：\n\n```objectivec\nself.downloadHelper.connection\
    \ =(NSURLConnection *)[[NSURLConnection alloc]\ninitWithRequest:request delegate:self.downloadHelper\
    \ startImmediately:YES];\n```\n\n我们还会创建一个可变数据容器，用于存储远程文件的增量数据下载：\n\n```objectivec\n\
    self.downloadHelper.data = [NSMutableData data];\n```\n\n我们已经完成了 `UIImageView`\
    \ 分类，现在来测试一下。打开 `BRBirthdayTableViewCell.m`，导入 `UIImageView+RemoteFile.h`，然后在\
    \ `setBirthdayImport:` 方法末尾添加以下代码：\n\n```objectivec\nif (_birthdayImport.imageData\
    \ == nil)\n    {\n        if ([_birthdayImport.picURL length] > 0) {\n       \
    \     [self.iconView setImageWithRemoteFileURL:birthdayImport.picURL\nplaceHolderImage:[UIImage\
    \ imageNamed:@\"icon-birthday-cake.png\"]];\n        }\n        else self.iconView.image\
    \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n}\nelse {\n        self.iconView.image\
    \ = [UIImage imageWithData:birthdayImport.imageData];\n}\n```\n\n在此处，在 `setBirthday:`\
    \ 方法末尾添加以下类似代码：\n\n```objectivec\nif (_birthday.imageData == nil)\n    {\n   \
    \     if ([_birthday.picURL length] > 0) {\n            [self.iconView setImageWithRemoteFileURL:_birthday.picURL\n\
    placeHolderImage:[UIImage imageNamed:@\"icon-birthday-cake.png\"]];\n        }\n\
    \        else self.iconView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n    }\nelse {\n        self.iconView.image = [UIImage imageWithData:_birthday.imageData];\n\
    }\n```\n\n这段代码会检查生日实体和生日导入对象是否存在远程图片 URL（`picURL`）。如果存在图片 URL，那么表格单元格就会调用我们分类的\
    \ `setImageWithRemoteFileURL:placeHolderImage:` 远程图片显示方法。\n"
- fmt: "We’ve got one last chance to make before testing the code. Open `BRImportViewController.m`\
    \ and scroll down to the `tableView:cellForRowAtIndexPath:` method. Remove the\
    \ old code for setting the image property of `iconView`:\n\n```\nif (birthdayImport.imageData\
    \ == nil)\n{\n        brTableCell.iconView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n}\nelse {\n        brTableCell.iconView.image = [UIImage imageWithData:birthdayImport.imageData];\n\
    }\n```\n\nNow do the same thing in the `BRHomeViewController.m`'s `tableView:cellForRowAtIndexPath:`\
    \ method:\n\n```\nif (birthday.imageData == nil)\n    {\n        brTableCell.iconView.image\
    \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n   \
    \     brTableCell.iconView.image = [UIImage imageWithData:birthday.imageData];\n\
    \    }\n```\n\nBuild and run. Remote Facebook profile photos should now download\
    \ and appear in both the home and Facebook import screens (see [Figure 11-10](#Chapter11.html#fig_11_10)).\n\
    \n![Image](images/9781430243748_Fig11-10.jpg)\n\n**Figure 11-10.** Remote images\
    \ downloading and rendering thanks to our new `UIImageView` category\n\nIf you\
    \ ran into any difficulties writing the 250 lines of code for `UIImageView+RemoteFile.m`,\
    \ then grab the category files from the source code for this chapter and overwrite\
    \ your version.\n\nWe can also utilize our new category in the birthday detail\
    \ and birthday edit views. Let’s start with `BRBirthdayEditViewController.m`.\
    \ Import `UIImageView+RemoteFile.h` and then update the `photoView.image` setting\
    \ code within `viewWillAppear:`.\n\n```\nif (self.birthday.imageData == nil)\n\
    \    {\n        self.photoView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
