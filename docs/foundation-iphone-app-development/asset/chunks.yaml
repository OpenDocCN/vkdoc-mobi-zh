- fmt: '图标和启动画面能够被自动检测的原因，在于你为项目中某些图像设置的文件名。iOS 会自动为你的应用绘制视网膜和非视网膜图标与启动图像，并根据设备自动选用尺寸最合适的版本。


    虽然还有其他方法可以为视网膜和非视网膜的 iPhone 及 iPad 指定图标，但这是最简单的方式。创建符合以下尺寸和命名规则的图标及启动画面，你会发现它们适用于任何
    iOS 项目：


    > *   `Default.png` 和 `Default@2x.png`：这是你的启动图像。如果你的应用是全屏应用，那么 `Default.png` 的尺寸应为
    320×480 像素，`Default@2x.png` 应为 640×960 像素。*Birthday Reminder* 允许显示 iOS 状态栏，因此我们需要从启动图像的高度中扣除
    20 点。因此，`Default.png` 应为 320×460 像素，`Default@2x.png` 应为 640×920 像素。

    > *   `Default-568h@2x.png`：这是针对 iPhone 5 屏幕的启动图像。尺寸应为 640×1136 像素，因为所有 iPhone
    5 都支持视网膜显示屏。如果你不包含此文件，iOS 会认为你的应用不支持更高的原生 iPhone 5 屏幕，并会以信箱模式（屏幕顶部和底部显示黑条）显示你的应用。

    > *   `Icon.png` 和 `Icon@2x.png`：这是显示在 iPhone 主屏幕上的应用图标 PNG。`Icon.png` 应为 57×57
    像素，`Icon@2x.png` 应为 114×114 像素。

    > *   `Icon-72.png` 和 `Icon-72@2x.png`：这是为安装你 iPhone 应用的 iPad 用户显示的图标（即使目标设备仅为
    iPhone）。如果你不包含此版本的图标，则将使用默认的 57×57 iPhone 图标；在 iPad 上调整大小时，它会显得像素化且丑陋。`Icon-72.png`
    应为 72×72 像素，显示在非视网膜 iPad 上；`Icon-72@2x.png` 应为 114×114 像素，显示在视网膜 iPad 上。

    > *   `Icon-Small.png` 和 `Icon-Small@2x.png`：这是在 iOS 设置、通知屏幕以及聚焦搜索中显示的图标。同样，如果你不提供此图标，iOS
    将使用你主要的 57×57 图标并将其调整为 29×29 点。


    在 Photoshop 或预览中仔细查看我们的图标图形。圆角和光泽效果是由 iOS 动态添加的。我们的图标设计延伸到了每个角落和边缘。


    *Birthday Reminder* 图标在没有 iOS 光泽效果时看起来更好。没问题——我们可以通过项目的 `Info.plist` 配置文件轻松解决此问题（见图
    3-17）。


    虽然默认未列出，但有一个名为“图标已包含光泽效果”的设置，我们可以将其作为新行添加到 `.plist` 文件中。在项目导航器中选中 `BirthdayReminder-Info.plist`，按住
    Control 键单击编辑器区域，然后从上下文菜单中选择“添加行”。一个新行会添加到 `.plist` 中，你就能找到图标光泽设置。你还需要将该值更改为“是”。保存更改，然后构建并运行。你的图标应该会失去光泽效果，在模拟器主屏幕上看起来更干净。


    *提示：图标更改有时需要多次构建和运行或清理产品才能生效。*


    我们还需要对应用图标做一项外观调整。默认情况下，`Info.plist` 会将项目名称指定为 iPhone 主屏幕上图标下方显示的标题。`BirthdayReminder`
    超过了 12 个字符的显示标题限制，因此 iOS 会对其进行截断。通过将 `Info.plist` 中的“Bundle 显示名称”属性更改为 `Birthdays`，可以轻松修复此问题（见图
    3-17）。构建并运行。不再截断了——太好了！


    ![Image](images/9781430243748_Fig03-17.jpg)


    **图 3-17.** 更改 Bundle 显示名称并移除图标光泽


    ### 在你的 iPhone 上运行应用


    要使你的项目能够在 iPhone 上运行和调试，你需要按照第 2 章中的步骤成功创建一个开发预置描述文件。


    你为预置描述文件设置的应用 Bundle ID 需要与 Xcode 项目中列出的 Bundle 标识符匹配。


    在我的项目中，Bundle 标识符是 `com.apress.BirthdayReminder`。对于你的预置描述文件和项目，这应为 `[com/co.uk/etc].[domainname].BirthdayReminder`。


    *提示：如有需要，你可以修改目标摘要面板或项目 `Info.plist` 文件中的 Bundle 标识符。*


    通过 USB 数据线将 iPhone 连接到 Mac。


    几秒钟后，Xcode 应能识别该设备，并将你的 iPhone 添加为“活动方案”下拉菜单（位于“运行”按钮左侧，顶部）中的一个可选目标。


    将目标设置从模拟器切换到你的 iPhone，然后你就可以直接在设备上运行你的项目了。试试看！


    如果失败，可能是由于以下一个或多个原因：


    > *   你的签名证书有问题。

    > *   你的预置描述文件有问题，例如嵌入的应用 Bundle ID 与项目 Bundle ID 不匹配；你的证书未添加到预置描述文件中；或者你的 iPhone
    UDID 未添加到预置描述文件中。

    > *   你的项目应命名为 `BirthdayReminder`（区分大小写）。如果你选择了不同的名称，可能需要重新开始本章。不幸的是，在 Xcode 中重命名项目并非易事！


    在 Xcode 的项目导航器中选择你的 `BirthdayReminder` 项目。然后选择 `BirthdayReminder` 目标。接着，依次选择“构建设置”
    ![Image](images/U001.jpg) “全部” ![Image](images/U001.jpg) “代码签名” ![Image](images/U001.jpg)
    “调试” ![Image](images/U001.jpg) “iPhone 开发者”。如果一切设置正确，你会发现 Xcode 已经识别并将项目的调试构建与你开发的预置描述文件关联起来（见图
    3-18）。此连接使你能够成功地在 iPhone 上运行你的 *Birthday Reminder* 版本。


    ![Image](images/9781430243748_Fig03-18.jpg)


    **图 3-18.** 将活动方案的目标更改为你的 iPhone，并检查项目与预置描述文件之间的连接


    ### 总结


    现在你应该熟悉 Xcode 中 iOS 项目的结构了。


    > *   你已经使用 Xcode 的单视图应用项目模板生成了 `BirthdayReminder` 项目。

    > *   你已经修改了 `Info.plist`（应用的配置设置），并在 iOS 模拟器中查看了结果。

    > *   我们初步了解了故事板和对象库。现在我们知道如何通过拖放将 iOS SDK UI 组件视图添加到故事板。

    > *   我们学会了如何将外部资源文件夹添加到 Xcode 项目。同样的过程也适用于添加其他文件类型，如第三方代码库。

    > *   我们学会了如何为应用添加多个优化的图标和启动图像。

    > *   你（希望如此）已经成功在 iPhone 上运行和调试了你的应用。


    我们还未开始做的一件事是编写代码。好吧，我想我们已经推迟得够久了。让我们开始认真学习 Objective-C 吧！


    ![Image](images/ch.jpg)


    ## 第 4 章


    ## Objective-C 和 Xcode：开发一个二十一点游戏


    在本章中，你将学习 Objective-C！按照本书的实践性特点，你将边做边学，构建一个实现 MVC（模型-视图-控制器）范式的面向对象二十一点游戏。


    这里的目标是熟悉 Objective-C 的结构和语法：如何创建类；方法语法；指针和基本类型——以及更多内容。'
  raw: 'The reason the icon and launch screen are automatically detected is due to
    some of the file names that I set for certain images you just added to your project.
    iOS draws the retina and non-retina icon and launch image for your app, automatically
    utilizing the most suitably sized version depending on the device it’s running
    on.


    There are other ways to specify the icons for retina and non-retina iPhones and
    iPads, but this is the simplest approach. Create icons and splash screens that
    adhere to the following size and naming rules, and you’ll discover that they work
    for any iOS project:


    > *   `Default.png` and `Default@2x.png`: This is your launch image. If your app
    is a full-screen app, then the dimensions of `Default.png` should be 320×480 pixels
    and `Default@2x.png` should be 640×960 pixels. *Birthday Reminder* allows the
    iOS status bar to display, so we need to remove 20 points off the height of our
    launch image. Thus, `Default.png` should be 320×460 pixels and `Default@2x.png`
    should be 640×920 pixels.

    > *   `Default-568h@2x.png`: This is your launch image for the iPhone 5 display.
    It should be 640×1136 pixels since all iPhone 5s support a retina display. If
    you don’t include this file, then iOS will assume that your app doesn’t support
    the taller native iPhone 5 screen and will display your app letterboxed (black
    bars across the top and bottom of the screen).

    > *   `Icon.png` and `Icon@2x.png`: This is your app’s icon PNG that is displayed
    on the iPhone home screen. `Icon.png` should be 57×57 pixels and `Icon@2x.png`
    should be 114×114 pixels.

    > *   `Icon-72.png` and `Icon-72@2x.png`: This is the icon that displays for iPad
    users who install your iPhone app (even though the targeted device is iPhone only).
    If you don’t include this version of the icon, then the default 57×57 iPhone icon
    will be used; it will look pixilated and ugly when resized on an iPad. `Icon-72.png`
    should be 72×72 pixels; it displays on non-retina iPads. `Icon-72@2x.png` should
    be 114×114 pixels; it displays on retina iPads.

    > *   `Icon-Small.png` and `Icon-Small@2x.png`: This is the icon displayed in
    the iOS Settings, notifications screens, and in Spotlight searches. Again, if
    you don’t supply this, then iOS will use your main 57×57 icon and resize it to
    29×29 points.


    Take a closer look at our icon graphic in Photoshop or Preview. The rounded corners
    and the shine are added dynamically by iOS. Our icon design bleeds to the edge
    of every corner and side.


    The *Birthday Reminder* icon looks better without the iOS shine. No problem—we
    can easily fix this via our project’s `Info.plist` configuration file (see [Figure
    3-17](#Chapter03.html#fig_3_17)).


    Although it’s not listed by default, there’s a setting titled Icon Already Includes
    Gloss Effect that we can add as a new row to the .`plist` file. With `BirthdayReminder-Info.plist`
    selected in the Project Navigator, control-click the Editor area and select Add
    Row from the contextual menu. A new row is added to the .`plist` and you’ll be
    able to locate the icon gloss setting. You’ll also need to change the value to
    Yes. Save your changes, then build and run. Your icon should lose the shine and
    look cleaner on the simulator’s home screen.


    *Tip: Changes to icons sometimes require a couple of build and runs or product
    cleans to take effect.*


    We have one additional aesthetic change to make to our app icon. By default, the
    `Info.plist` assigns the name of your project as the title displayed on the iPhone
    home screen beneath the icon. `BirthdayReminder` is more than the 12-character
    display title limit and will therefore be truncated by iOS. This is easy to fix
    by changing the Bundle Display Name property in the `Info.plist` to `Birthdays`
    (see [Figure 3-17](#Chapter03.html#fig_3_17)). Build and run. No more truncation—hooray!


    ![Image](images/9781430243748_Fig03-17.jpg)


    **Figure 3-17.** Changing the bundle display name and removing the icon gloss


    ### Running the app on your iPhone


    To enable your project to run and debug on your iPhone, you’ll need to have successfully
    created a development provisioning profile in [Chapter 2](#Chapter02.html#ch2).


    The app bundle ID that you set for your provisioning profile needs to match the
    bundle identifier listed in your Xcode project.


    In my project, the bundle identifier is `com.apress.BirthdayReminder`. For your
    profile and project, this should be `[com/co.uk/etc].[domainname].BirthdayReminder`.


    *Tip: If required, you can modify the bundle identifier in the target summary
    pane or Info.plist file for your project.*


    Plug your iPhone into your Mac via a USB cable.


    After a few seconds, Xcode should recognize the device and add your iPhone as
    an optional destination in the Active Scheme drop-down menu, top left, next to
    the Run button.


    Toggling the destination setting from the simulator to your iPhone will then set
    you up to run your project directly on your device. Try it!


    If this fails, then it could be because of one or more of the following reasons:


    > *   There’s a problem with your signing certificate.

    > *   There’s a problem with your provisioning profile, such as the embedded app
    bundle ID doesn’t match your project bundle ID; your certificate wasn’t added
    to the provisioning profile; or your iPhone UDID wasn’t added to the provisioning
    profile.

    > *   Your project should be named `BirthdayReminder` (case sensitive). You might
    want to restart this chapter if you’ve chosen something different. Renaming a
    project in Xcode is no easy task, unfortunately!


    Select your `BirthdayReminder` project in Xcode’s Project Navigator. Then select
    the `BirthdayReminder` target. Next, select Build Settings ![Image](images/U001.jpg)
    All ![Image](images/U001.jpg) Code Signing ![Image](images/U001.jpg) Debug ![Image](images/U001.jpg)
    iPhone Developer. If everything is set up correctly, then you should find that
    Xcode has recognized and associated the Debug build of your project with your
    development provisioning profile (see [Figure 3-18](#Chapter03.html#fig_3_18)).
    This is the connection that successfully allows you to run your version of *Birthday
    Reminder* on your iPhone.


    ![Image](images/9781430243748_Fig03-18.jpg)


    **Figure 3-18.** Changing the destination of the Active Scheme to your iPhone
    and checking the connection between project and provisioning profile


    ### Summary


    You should now be familiar with the structure of iOS projects in Xcode.


    > *   You’ve generated your `BirthdayReminder` project using Xcode’s Single View
    Application project template.

    > *   You’ve modified the `Info.plist`, your app’s configuration settings, and
    seen the results in the iOS simulator.

    > *   We’ve taken a first look at Storyboarding and the Object Library. We now
    know how to add the iOS SDK UI component views to our storyboard via drag-and-drop.

    > *   We’ve learned how to add external resource folders to our Xcode project.
    The same process works for adding other file types like third-party code libraries.

    > *   We’ve learned how to add multiple optimized icons and launch images to our
    app.

    > *   You’ve (hopefully) managed to run and debug your app on your iPhone.


    One thing we haven’t yet embarked on is writing code. Well, I think we’ve put
    it off long enough. Let’s get tough with Objective-C!


    ![Image](images/ch.jpg)


    ## Chapter 4


    ## Objective-C and Xcode: Developing a Blackjack Game


    You’re going to learn Objective-C in this chapter! As per the hands-on nature
    of this book, you’ll be learning on the job, building an object-oriented blackjack
    game that implements the MVC (Model-View-Controller) paradigm.


    The aim here is to get familiar with the structure and syntax of Objective-C:
    how to create classes; the syntax of methods; pointers and primitives—and a whole
    lot more.'
