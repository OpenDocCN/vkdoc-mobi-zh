    a pack of 52 cards might be something we want to do in other card games. Seems
    to me this would make a suitable convenience method for the actual `BJDCard` class.
    We’ve already seen how some classes, like `NSArray` and `NSDictionary`, expose
    factory/convenience methods for generating instances of themselves. In this case,
    we’ll create a class method on `BJDCard` that generates a mutable array of 52
    instances of `BJDCard`!


    Switch back to work on the `BJDCard` class in the Assistant Editor. Have you discovered
    that in Xcode, you can have multiple Objective-C files open simultaneously? You
    can even set your multiple files to all use the Assistant Editor layout. Double-clicking
    a file in the Project Navigator opens a new window by default in Xcode. I prefer
    viewing multiple tabs than windows. To set Xcode to open a new tab rather than
    a new window, go into the Xcode General Preferences, and under Double-Click Navigation,
    change the selected option to Uses Separate Tab.


    Now viewing `BJDCard.h`, let’s declare our new class method in the header:


    `+(NSMutableArray *) generateAPackOfCards;`


    Do you notice the subtle difference between the syntax of class methods and instance
    methods (the other three in this class)? The syntax for declaring a class method
    uses a “`+”` rather than a “–” at the beginning of the declaration. Now switch
    to working on `BJDCard.m` in the source file, and add the following code:


    `+(NSMutableArray *) generateAPackOfCards`

    `{`

    `    NSMutableArray *arr = [NSMutableArray array];`


    `    BJDCard *card;`


    `    int suit,digit;`


    `    for (suit=0;suit<4;suit++) {`

    `        for (digit=1;digit<=13;digit++)`

    `        {`

    `            card = [[BJDCard alloc] init];`

    `            card.suit = suit;`

    `            card.digit = digit;`

    `            [arr addObject:card];`

    `        }`

    `    }`


    `    return arr;`

    `}`


    Looking through the code, you’ll see that we’ve set up one loop inside another.
    The first outer loop iterates four times: once for each card suit. So, a quarter
    of the generated cards have their suit set to 0, a quarter have their suit set
    to 1, and so on. Do you remember our custom suit enumerator `BJCardSuit`? Here’s
    the code to jog your memory:


    `typedef enum : int`

    `{`

    `    BJCardSuitClub = 0,`

    `    BJCardSuitSpade,`

    `    BJCardSuitDiamond,`

    `    BJCardSuitHeart`

    `}BJCardSuit;`


    With this declaration syntax, the compiler assigns integer 0 as a `BJCardSuitClub`,
    integer 1 as a `BJCardSuitSpade`, and so on. So in our `generateAPackOfCards`
    method, those suit values will match the enumerator values in the original enumerator
    declaration.


    Getting back to `generateAPackOfCards` analysis, you’ll see that we start by declaring
    an empty local scope mutable array:


    `NSMutableArray *arr = [NSMutableArray array];`


    And then in the heart of our loop(s), we `alloc`/`init` new instances of `BJDCard`,
    set the suit and digit, and then add them to the local array with the mutable
    array instance method `addObject:`.


    Once complete, we return our array.


    Build and run your app to check there are still no errors!


    We’re done with the `BJDCard` class for our blackjack game. So we’re now going
    to make some changes to `BJDGameModel` to take advantage of the new `generateAPackOfCards`
    method we just wrote.


