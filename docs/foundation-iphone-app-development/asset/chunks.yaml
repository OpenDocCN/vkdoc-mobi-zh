    **`        self.photoView.image = [UIImage imageNamed:@"icon-birthday-cake.png"];`**

    **`    }`**

    **`    else {`**

    **`        self.photoView.image = image;`**

    **`    }`**

    `}`


    Setting the `title` property of a view controller updates the centered text on
    the navigation bar when a view controller is displayed within a navigation controller.
    We’ll also set the image value of our new image view to the image contained in
    the birthday dictionary, or fallback onto our cake image if none exists.


    We’ve finished preparing our Birthday Detail view for data. We’ll now switch our
