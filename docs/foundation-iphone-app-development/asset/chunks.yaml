- fmt: "### `Figure 12-5.` Modifying the rows of a static table view section\n\nDrag\
    \ another new table view controller onto your storyboard, which will become the\
    \ Days Before table view controller.\n\nWith static table cells, you can create\
    \ segue connections directly from table cells to other view controller scenes.\
    \ Control-drag from the first static table cell in the main Settings view to the\
    \ new Days Before table view controller, and select `Push` from the selection\
    \ of segue transition options. Name the new table view controller’s navigation\
    \ bar **Days Before**.\n\nRepeat the segue creation process for the second static\
    \ table cell, creating a push segue to the Notification Time view controller (see\
    \ `[Figure 12-6](#Chapter12.html#fig_12_6)`).\n\n![Image](images/9781430243748_Fig12-06.jpg)\n\
    \n### `Figure 12-6.` Creating segue navigation from static table view cells\n\n\
    You should be able to build and run your app at this point: be able to present\
    \ the settings table view and navigate between Days Before and Notification Time\
    \ view controllers.\n\nAt the moment, there are a number of problems with the\
    \ current Settings view:\n\n> * It can’t be dismissed.\n> * The Alert Time for\
    \ in the settings screen does not update when the user changes it in the Notification\
    \ Time screen.\n> * The background of the table view is transparent, but still\
    \ requires the custom-designed screen background for our app.\n\nWe’re going to\
    \ have to subclass `UITableViewController` and fix these issues.\n\nCreate a new\
    \ class named `BRSettingsViewController` in the settings `user-interface/view-controllers`\
    \ group of your Xcode project. From the Cocoa Touch templates, select `Objective-C`\
    \ class, and on the next screen type `BRSettingsViewController` into the Class\
    \ text field and `UITableViewController` into the Subclass text field. Ensure\
    \ that **Targeted for iPad** and **With XIB for User Interface** are left deselected,\
    \ and create the new class.\n\nBecause `BRSettingsViewController` is a subclass\
    \ of `UITableViewController`, Xcode automatically adds a bunch of table-controlling\
    \ delegate methods to the implementation source file. We need to get rid of most\
    \ of this code because we’re building a static table view and most of the UI work\
    \ is achieved directly in our storyboard. So open `BRSettingsViewController.m`\
    \ and strip it right down to the following:\n\n```\n#import \"BRSettingsViewController.h\"\
    \n\n@interface BRSettingsViewController ()\n\n@end\n\n@implementation BRSettingsViewController\n\
    \n@end\n```\n\nJust an empty private interface and class implementation.\n\nSelect\
    \ your main Settings view controller in the storyboard. Use the identity inspector\
    \ to change the custom class of the view controller to the new `BRSettingsViewController`\
    \ class you just created (see `[Figure 12-7](#Chapter12.html#fig_12_7)`).\n\n\
    ![Image](images/9781430243748_Fig12-07.jpg)\n\n### `Figure 12-7.` Assigning `BRSettingsViewController`\
    \ to the main Settings view controller in the storyboard\n\nUsing the Assistant\
    \ Editor layout and by Control-dragging from the cells, hook up outlets for each\
    \ of the two static table cells:\n\n```\n@property (weak, nonatomic) IBOutlet\
    \ UITableViewCell *tableCellDaysBefore;\n@property (weak, nonatomic) IBOutlet\
    \ UITableViewCell *tableCellNotificationTime;\n```\n\nWe’re also going to create\
    \ an Interface Builder action for our **Done** button to dismiss the modal view.\
    \ To create a new action, Control-drag from your Done button to `BRSettingsViewController.h`\
    \ header interface file. Be sure to switch the connection type to `Action` and\
    \ name the new action `didClickDoneButton`:\n\n```\n- (IBAction)didClickDoneButton:(id)sender;\n\
    ```\n\nLet’s get to work on the implementation of `BRSettingsViewController.m`.\
    \ The implementation for the `didClickDoneButton:` is simply a call to dismiss\
    \ the view controller:\n\n```\n- (IBAction)didClickDoneButton:(id)sender {\n \
    \   [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n`BRSettingsViewController`\
    \ can now be dismissed – build and run.\n\n## Building the settings singleton\
    \ class\n\nWe’re going to build a new abstracted data class that we’ll access\
    \ through a singleton instance. The setting singleton provides a few accessor\
    \ properties and methods to the user’s global birthday reminder notification settings:\
    \ the number of days in advance to get a birthday notification and the hour and\
    \ minute of the day for those reminders."
  raw: '**Figure 12-5.** Modifying the rows of a static table view section


    Drag another new table view controller onto your storyboard, which will become
    the Days Before table view controller.


    With static table cells, you can create segue connections directly from table
    cells to other view controller scenes. Control-drag from the first static table
    cell in the main Settings view to the new Days Before table view controller, and
    select Push from the selection of segue transition options. Name the new table
    view controller’s navigation bar **Days Before**.


    Repeat the segue creation process for the second static table cell, creating a
    push segue to the Notification Time view controller (see [Figure 12-6](#Chapter12.html#fig_12_6)).


    ![Image](images/9781430243748_Fig12-06.jpg)


    **Figure 12-6.** Creating segue navigation from static table view cells


    You should be able to build and run your app at this point: be able to present
    the settings table view and navigate between Days Before and Notification Time
    view controllers.


    At the moment, there are a number of problems with the current Settings view:


    > *   It can’t be dismissed.

    > *   The Alert Time for in the settings screen does not update when the user
    changes it in the Notification Time screen.

    > *   The background of the table view is transparent, but still requires the
    custom-designed screen background for our app.


    We’re going to have to subclass `UITableViewController` and fix these issues.


    Create a new class named `BRSettingsViewController` in the settings `user-interface/view-controllers`
    group of your Xcode project. From the Cocoa Touch templates, select Objective-C
    class, and on the next screen type `BRSettingsViewController` into the Class text
    field and `UITableViewController` into the Subclass text field. Ensure that Targeted
    for iPad and With XIB for User Interface are left deselected, and create the new
    class.


    Because `BRSettingsViewController` is a subclass of `UITableViewController`, Xcode
    automatically adds a bunch of table-controlling delegate methods to the implementation
    source file. We need to get rid of most of this code because we’re building a
    static table view and most of the UI work is achieved directly in our storyboard.
    So open `BRSettingsViewController.m` and strip it right down to the following:


    `#import "BRSettingsViewController.h"`


    `@interface BRSettingsViewController ()`


    `@end`


    `@implementation BRSettingsViewController`


    `@end`


    Just an empty private interface and class implementation.


    Select your main Settings view controller in the storyboard. Use the identity
    inspector to change the custom class of the view controller to the new `BRSettingsViewController`
    class you just created (see [Figure 12-7](#Chapter12.html#fig_12_7)).


    ![Image](images/9781430243748_Fig12-07.jpg)


    **Figure 12-7.** Assigning BRSettingsViewController to the main Settings view
    controller in the storyboard


    Using the Assistant Editor layout and by Control-dragging from the cells, hook
    up outlets for each of the two static table cells:


    `@property (weak, nonatomic) IBOutlet UITableViewCell *tableCellDaysBefore;`

    `@property (weak, nonatomic) IBOutlet UITableViewCell *tableCellNotificationTime;`


    We’re also going to create an Interface Builder action for our Done button to
    dismiss the modal view. To create a new action, Control-drag from your Done button
    to BRSettingsViewController.h header interface file. Be sure to switch the connection
    type to Action and name the new action `didClickDoneButton`:


    `- (IBAction)didClickDoneButton:(id)sender;`


    Let’s get to work on the implementation of `BRSettingsViewController.m`. The implementation
    for the `didClickDoneButton:` is simply a call to dismiss the view controller:


    `- (IBAction)didClickDoneButton:(id)sender {`

    **`    [self dismissViewControllerAnimated:YES completion:nil];`**

    `}`


    `BRSettingsViewController` can now be dismissed – build and run.


    ### Building the settings singleton class


    We’re going to build a new abstracted data class that we’ll access through a singleton
    instance.  The setting singleton provides a few accessor properties and methods
    to the user’s global birthday reminder notification settings: the number of days
    in advance to get a birthday notification and the hour and minute of the day for
    those reminders.'
  trans: "\n### `Figure 12-5.` 修改静态表格视图分区的行\n\n将另一个新的表格视图控制器拖到故事板中，它将作为“提前天数”表格视图控制器。\n\
    \n使用静态表格单元格，可以直接从表格单元格到其他视图控制器场景创建转场连接。从主设置视图的第一个静态表格单元格按住 Control 键拖拽至新的“提前天数”表格视图控制器，并在转场选项中选择\
    \ `Push`。将新表格视图控制器的导航栏命名为**提前天数**。\n\n重复创建转场的过程，为第二个静态表格单元格创建一个推送到“通知时间”视图控制器的转场（参见\
    \ `Figure 12-6`）。\n\n![图片](img/9781430243748_Fig12-06.jpg)\n\n### `Figure 12-6.`\
    \ 从静态表格视图单元格创建转场导航\n\n至此，你应该能够构建并运行应用了：可以显示设置表格视图，并在“提前天数”和“通知时间”两个视图控制器之间导航。\n\
    \n目前，当前设置视图存在几个问题：\n\n> * 无法关闭该视图。\n> * 当用户在“通知时间”屏幕更改设置时，设置屏幕中的“提醒时间”不会更新。\n\
    > * 表格视图的背景是透明的，但仍然需要应用自定的屏幕背景。\n\n我们需要创建 `UITableViewController` 的子类来修复这些问题。\n\
    \n在 Xcode 项目的设置 `user-interface/view-controllers` 组中创建一个名为 `BRSettingsViewController`\
    \ 的新类。从 Cocoa Touch 模板中选择 `Objective-C` 类，在下一个屏幕的“Class”文本框中输入 `BRSettingsViewController`，“Subclass”文本框中输入\
    \ `UITableViewController`。确保**不选中**“Targeted for iPad”和“With XIB for User Interface”，然后创建新类。\n\
    \n由于 `BRSettingsViewController` 是 `UITableViewController` 的子类，Xcode 会自动向实现源文件添加大量表格控制委托方法。我们需要移除大部分此类代码，因为我们构建的是静态表格视图，大部分\
    \ UI 工作直接在故事板中完成。因此，打开 `BRSettingsViewController.m` 并将其精简为以下内容：\n\n```\n#import\
    \ \"BRSettingsViewController.h\"\n\n@interface BRSettingsViewController ()\n\n\
    @end\n\n@implementation BRSettingsViewController\n\n@end\n```\n\n只保留一个空的私有接口和类实现。\n\
    \n在故事板中选择主设置视图控制器。使用身份检查器将视图控制器的自定义类更改为刚创建的 `BRSettingsViewController` 类（参见 `Figure\
    \ 12-7`）。\n\n![图片](img/9781430243748_Fig12-07.jpg)\n\n### `Figure 12-7.` 在故事板中将\
    \ `BRSettingsViewController` 分配给主设置视图控制器\n\n使用助理编辑器布局，并通过按住 Control 键从单元格拖拽，为两个静态表格单元格建立插座连接：\n\
    \n```\n@property (weak, nonatomic) IBOutlet UITableViewCell *tableCellDaysBefore;\n\
    @property (weak, nonatomic) IBOutlet UITableViewCell *tableCellNotificationTime;\n\
    ```\n\n我们还要为**完成**按钮创建界面生成器操作，以关闭模态视图。要创建新操作，请按住 Control 键从“完成”按钮拖拽至 `BRSettingsViewController.h`\
    \ 头文件接口中。确保将连接类型切换为 `Action`，并将新操作命名为 `didClickDoneButton`：\n\n```\n- (IBAction)didClickDoneButton:(id)sender;\n\
    ```\n\n现在开始实现 `BRSettingsViewController.m`。`didClickDoneButton:` 的实现只是简单地调用关闭视图控制器的方法：\n\
    \n```\n- (IBAction)didClickDoneButton:(id)sender {\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\n现在 `BRSettingsViewController` 可以被关闭了——构建并运行。\n\n\
    ## 构建设置单例类\n\n我们将构建一个新的抽象数据类，通过单例实例进行访问。该设置单例为用户提供几个访问器属性和方法，用于全局生日提醒通知设置：提前多少天接收生日通知，以及这些提醒的时和分。\n"
- fmt: "#### User defaults: iOS cookies\n\nThe simplest way to store preference data\
    \ in iOS is by using Apple’s `NSUserDefaults` class. It’s the iOS equivalent of\
    \ HTML cookies. We can store the data object types such as strings and numbers\
    \ using `NSUserDefaults`. The syntax for saving a string looks like the following:\n\
    \n```\nNSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    [userDefaults setObject:@\"Nick Kuh\" forKey:@\"name\"];\n[userDefaults synchronize];\n\
    ```\n\nCalling `synchronize` writes your changes to disk, so if you were saving\
    \ more than one property you would call `synchronize` once you’d set all the keys\
    \ and values.\n\nTo access and check for properties saved to `NSUserDefaults`,\
    \ the code for the preceding example would be as follows:\n\n```\nNSUserDefaults\
    \ *userDefaults = [NSUserDefaults standardUserDefaults];\nNSString *name = [userDefaults\
    \ objectForKey:@\"name\"];\nif (name == nil) {\n    NSLog(@\"No previous name\
    \ saved\");\n}\nelse {\n    NSLog(@\"Saved name: %@\",name);\n}\n```\n\nLet’s\
    \ create the new settings singleton class and put this logic into practice for\
    \ our app. Within the *data* group of your Xcode project, create a new subclass\
    \ of `NSObject` named `BRDSettings`. Let’s get to work on the header:\n\n```\n\
    #import <Foundation/Foundation.h>\n\ntypedef enum : int {\n    BRDaysBeforeTypeOnBirthday\
    \ = 0,\n    BRDaysBeforeTypeOneDay,\n    BRDaysBeforeTypeTwoDays,\n    BRDaysBeforeTypeThreeDays,\n\
    \    BRDaysBeforeTypeFiveDays,\n    BRDaysBeforeTypeOneWeek,\n    BRDaysBeforeTypeTwoWeeks,\n\
    \    BRDaysBeforeTypeThreeWeeks\n}BRDaysBeforeType;\n\n#import <Foundation/Foundation.h>\n\
    \n@interface BRDSettings : NSObject\n\n+ (BRDSettings*)sharedInstance;\n\n@property\
    \ (nonatomic) int notificationHour;\n@property (nonatomic) int notificationMinute;\n\
    @property (nonatomic) BRDaysBeforeType daysBefore;\n\n-(NSString *) titleForNotificationTime;\n\
    -(NSString *) titleForDaysBefore:(BRDaysBeforeType)daysBefore;\n\n@end\n```\n\n\
    Just like `BRDModel`, we’ll provide access to the singleton instance of `BRDSettings`\
    \ via a `sharedInstance` class method. The notification hour and minute are returned\
    \ as integers: within the implementation of our settings data class we’ll check\
    \ if the user has previously set hour/minute notification time for reminders,\
    \ and if not, we’ll return a default time—9:00 a.m. perhaps?\n\nWe’re going to\
    \ provide the user with a set of Days Before options ranging from a reminder on\
    \ the day of to as far back as three weeks before each birthday. We’ve created\
    \ a custom enumerator type to provide the different options in this range without\
    \ creating 0 to 21 days/options that would look messy in our app. The `titleForDaysBefore:`\
    \ method returns a human-readable string for each option, such as “On Birthday”\
    \ or “3 Weeks Before”.\n\nSwitch to work on the `BRDSettings.m` source file, and\
    \ add the implementation of the methods and properties that we’ve declared in\
    \ the header:\n\n```\n#import \"BRDSettings.h\"\n\n@implementation BRDSettings\n\
    \nstatic BRDSettings *_sharedInstance = nil;\nstatic NSDateFormatter *dateFormatter;\n\
    \n@synthesize notificationHour;\n@synthesize notificationMinute;\n\n//accessor\
    \ method for the singleton instance\n+ (BRDSettings*)sharedInstance {\n    if(\
    \ !_sharedInstance ) {\n        _sharedInstance = [[BRDSettings alloc] init];\n\
    \    }\n    return _sharedInstance;\n}\n\n-(int) notificationHour\n{\n    //checks\
    \ if user has saved a notification hour - if not, defaults to 9am\n    NSUserDefaults\
    \ *userDefaults = [NSUserDefaults standardUserDefaults];\n    NSNumber *hour =\
    \ [userDefaults objectForKey:@\"notificationHour\"];\n    if (hour == nil) {\n\
    \        return 9;\n    }\n    return [hour intValue];\n}\n\n-(void) setNotificationHour:(int)notificationHourNew\n\
    {\n    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    \    [userDefaults setObject:[NSNumber numberWithInt:notificationHourNew] forKey:@\"\
    notificationHour\"];\n    [userDefaults synchronize];\n}\n```"
  raw: '#### User defaults: iOS cookies


    The simplest way to store preference data in iOS is by using Apple’s `NSUserDefaults`
    class. It’s the iOS equivalent of HTML cookies. We can store the data object types
    such as strings and numbers using `NSUserDefaults`. The syntax for saving a string
    looks like the following:


    `    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];`

    `    [userDefaults setObject:@"Nick Kuh" forKey:@"name"];`

    `    [userDefaults synchronize];`


    Calling `synchronize` writes your changes to disk, so if you were saving more
    than one property you would call `synchronize` once you’d set all the keys and
    values.


    To access and check for properties saved to `NSUserDefaults`, the code for the
    preceding example would be as follows:


    `    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];`

    `    NSString *name = [userDefaults objectForKey:@"name"];`

    `    if (name == nil) {`

    `        NSLog(@"No previous name saved");`

    `    }`

    `    else {`

    `        NSLog(@"Saved name: %@",name);`

    `    }`


    Let’s create the new settings singleton class and put this logic into practice
    for our app. Within the *data* group of your Xcode project, create a new subclass
    of `NSObject` named `BRDSettings`. Let’s get to work on the header:


    `#import <Foundation/Foundation.h>`


    `typedef enum : int {`

    `    BRDaysBeforeTypeOnBirthday = 0,`

    `    BRDaysBeforeTypeOneDay,`

    `    BRDaysBeforeTypeTwoDays,`

    `    BRDaysBeforeTypeThreeDays,`

    `    BRDaysBeforeTypeFiveDays,`

    `    BRDaysBeforeTypeOneWeek,`

    `    BRDaysBeforeTypeTwoWeeks,`

    `    BRDaysBeforeTypeThreeWeeks`

    `}BRDaysBeforeType;`


    `#import <Foundation/Foundation.h>`


    `@interface BRDSettings : NSObject`


    `+ (BRDSettings*)sharedInstance;`


    `@property (nonatomic) int notificationHour;`

    `@property (nonatomic) int notificationMinute;`

    `@property (nonatomic) BRDaysBeforeType daysBefore;`


    `-(NSString *) titleForNotificationTime;`

    `-(NSString *) titleForDaysBefore:(BRDaysBeforeType)daysBefore;`


    `@end`


    Just like `BRDModel`, we’ll provide access to the singleton instance of `BRDSettings`
    via a `sharedInstance` class method. The notification hour and minute are returned
    as integers: within the implementation of our settings data class we’ll check
    if the user has previously set hour/minute notification time for reminders, and
    if not, we’ll return a default time—9:00 a.m. perhaps?


    We’re going to provide the user with a set of Days Before options ranging from
    a reminder on the day of to as far back as three weeks before each birthday. We’ve
    created a custom enumerator type to provide the different options in this range
    without creating 0 to 21 days/options that would look messy in our app. The `titleForDaysBefore:`
    method returns a human-readable string for each option, such as “On Birthday”
    or “3 Weeks Before”.


    Switch to work on the `BRDSettings.m` source file, and add the implementation
    of the methods and properties that we’ve declared in the header:


    `#import "BRDSettings.h"`


    `@implementation BRDSettings`


    `static BRDSettings *_sharedInstance = nil;`

    `static NSDateFormatter *dateFormatter;`


    `@synthesize notificationHour;`

    `@synthesize notificationMinute;`


    `//accessor method for the singleton instance`

    `+ (BRDSettings*)sharedInstance {`

    `        if( !_sharedInstance ) {`

    `                _sharedInstance = [[BRDSettings alloc] init];`

    `        }`

    `        return _sharedInstance;`

    `}`


    `-(int) notificationHour`

    `{`

    `    //checks if user has saved a notification hour - if not, defaults to 9am`

    `    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];`

    `    NSNumber *hour = [userDefaults objectForKey:@"notificationHour"];`

    `    if (hour == nil) {`

    `        return 9;`

    `    }`

