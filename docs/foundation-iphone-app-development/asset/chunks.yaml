    #### 初始化 Core Data 模型


    总结来说，Core Data 堆栈的结构可以如图 8-5 所示。


    ![Image](img/9781430243748_Fig08-05.jpg)


    **图 8-5.** Core Data 堆栈的结构


    在堆栈的底部是持久化存储区（默认为 SQLite 数据库）。我们将持久化存储区添加到持久化存储协调器中，该协调器通过一个托管对象模型进行初始化。这个托管对象模型基于我们刚刚在
    Xcode 中看到的 `xcdatamodeld` 文件。最后，我们创建一个托管对象上下文（`NSManagedObjectContext`）实例，通过它我们既可以创建也可以访问应用中的托管对象实例。但什么是托管对象上下文呢？


    一旦我们的 Core Data 模型在程序首次运行时初始化完毕，`NSManagedObjectContext` 将是唯一真正需要关心的类。添加、编辑和删除实体将直接通过托管对象上下文完成。


    有点困惑吗？别担心，对于像 *Birthday Reminder* 这样相当简单的应用程序，用于初始化 Core Data 存储区和模型的代码几乎可以与你构建的每个应用完全相同。现在感觉好多了吗？很好！


    #### 什么是托管对象上下文？


    *托管对象上下文* 是应用程序中所有 Core Data 对象及其相互关系的表示。尽管在 *Birthday Reminder* 应用中我们只使用单个托管对象上下文，但在
    iOS 应用中创建多个托管对象上下文的情况并不少见。多个托管对象上下文可以共享一个持久化存储区。但是，如果我们在一个托管对象上下文中对实体进行了更改，除非我们保存并合并上下文，否则这些更改不会反映在另一个上下文中。


    通过 Core Data 模型中的单个托管对象上下文，我们将能够添加新实体、更改属性，并在需要时删除实体。当我们要将托管对象上下文的更改写入磁盘时，我们需要保存该上下文。


    #### 添加、编辑、删除和保存实体


    在 Master-Detail 示例应用中，一旦 `AppDelegate` 初始化了模型、存储区和托管对象上下文，它就会将托管对象上下文的引用传递给主视图控制器：


    `controller.managedObjectContext = self.managedObjectContext;`


    现在，主视图控制器可以通过其对托管对象上下文的引用来添加、编辑、删除和保存 Core Data 实体。


    为了理解添加、编辑、删除和保存 Core Data 实体所需的代码，我们可以将 Apple 主视图控制器中的大量代码简化为以下示例：


    ##### 添加


    ```

    NSManagedObject *newManagedObject = [NSEntityDescription

    insertNewObjectForEntityForName:@”Event” inManagedObjectContext:self.managedObjectContext];

    ```


    所有 Core Data 实体都是 `NSManagedObject` 类的实例或子类实例。然而，与大多数其他 Objective-C 类不同，我们不会通过
    `alloc init` 创建 `NSManagedObject` 的实例。取而代之，我们调用 `NSEntityDescription` 的类方法，并传入我们的实体名称和托管对象上下文的引用。


    ##### 编辑


    默认情况下，在我们的 Core Data 模型中定义的实体是 Apple 的 `NSManagedObject` 类的实例。为了设置属性，我们调用 `NSManagedObject`
    的 `setValue:forKey:` 方法：


    ```

    [aManagedObject setValue:[NSDate date] forKey:@"timeStamp"];

    ```


    然而，通过数据模型检查器，我们还可以为实体指定自定义值对象类，Xcode 可以构建这些类供我们的应用使用。这样做的好处是严格的数据类型化；因此前面的代码将变为：


    ```

    aManagedObject.timeStamp = [NSDate date];

    ```


    当我们在本章后面将一个新的 Core Data 模型集成到 *Birthday Reminder* 应用中时，我们将学习更多关于自定义实体类的知识。


    ##### 删除


    删除 Core Data 实体非常简单：


    ```

    [self.managedObjectContext deleteObject:aManagedObject];

    ```


    ##### 保存


    当我们准备好让 Core Data 将更改写入磁盘（持久化存储区）时，我们在托管对象上下文上调用 `save:` 方法：


    ```

    NSError *error = nil;

        if ([self.managedObjectContext hasChanges]) {

            if (![self.managedObjectContext save:&error]) {//保存失败

                NSLog(@"保存失败: %@",[error localizedDescription]);

            }

            else {

                NSLog(@"保存成功");

            }

        }

    ```


    调用保存的时机示例包括用户点击编辑生日视图控制器中的保存按钮时，或者在我们完成导入一批生日之后。


    ### 在 Birthday Reminder 中实现 Core Data


    在我们开始在 *Birthday Reminder* 应用中实现 Core Data 之前，我们需要将 Core Data 框架添加到项目的 target
    中。target 是当我们构建项目时 Xcode 为我们编译生成的 iPhone 应用程序。


    #### 添加 Core Data 框架


    要向我们的项目添加 Apple 框架，首先在项目导航器中选择 `BirthdayReminder` 项目，然后选择 `BirthdayReminder` target，最后选择“构建阶段”选项卡，如图
    8-6 所示。


    ![Image](img/9781430243748_Fig08-06.jpg)


    **图 8-6.** 准备添加新框架


    展开“将二进制文件与库链接”窗格，您将看到已链接到项目中的框架：`UIKit`、`Foundation` 和 `CoreGraphics`。要添加 Core
    Data，点击突出显示的 + 按钮，然后在模态窗口中双击列出的 `CoreData.framework`。太好了，Core Data 框架已添加！我们现在可以在应用中引用
    Core Data 类。不过在此之前，有一种简单的方法可以为应用中的所有类导入 Core Data 框架头文件：在我们的项目前缀文件中定义导入声明。找到并在项目导航器中选择
    `BirthdayReminder-Prefix.pch`。现在，在 `Foundation` 和 `UIKit` 导入声明旁边添加 Core Data 导入声明：


    ```

    #ifdef __OBJC__

        #import <UIKit/UIKit.h>

        #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>

    #endif

    ```


    现在，我们将能够引用 Core Data 框架类，而无需重复导入主要的 Core Data 框架头文件。


    接下来，我们为应用创建一个 Core Data 模型。


    #### 创建 Core Data 模型


    到目前为止，我们主要关注应用的用户界面。现在将注意力转向黑暗的数据侧，让我们创建一个新文件夹来存储所有 Core Data 和模型类。在您的 *Birthday
    Reminder* 项目的根目录中添加一个名为 `data` 的新文件夹，然后将新 `data` 文件夹作为新组添加到您的 Xcode 项目中（见图 8-7）。


    ![Image](img/9781430243748_Fig08-07.jpg)


    **图 8-7.** 添加到项目目录的新数据组


    在项目导航器中，选择新添加的 `data` 组，然后使用 ![Image](img/flower.jpg)N 键盘快捷键或 文件 ![Image](img/U001.jpg)
    新建 ![Image](img/U001.jpg) 文件，从 Core Data 文件模板中选择“数据模型”选项。将新的数据模型命名为 `BirthdayReminder.xcdatamodeld`
    并点击“创建”按钮，如图 8-8 所示。


    ![Image](img/9781430243748_Fig08-08.jpg)


    **图 8-8.** 创建新的 Core Data 模型

