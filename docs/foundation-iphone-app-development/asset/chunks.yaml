    //导航按钮\n\n    //导航按钮背景的色调\n    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar\
    \ class],nil]\nsetTintColor:kNavigationButtonBackgroundColour];\n\n    barButtonItemTextAttributes\
    \ = [NSDictionary dictionaryWithObjectsAndKeys:\n                            \
    \      kFontNavigationTextColour, UITextAttributeTextColor,\n                \
    \                   [UIColor whiteColor], UITextAttributeTextShadowColor,\n  \
    \                                 [NSValue valueWithUIOffset:UIOffsetMake(0, 1)],\n\
    UITextAttributeTextShadowOffset,nil];\n    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar\
    \ class], nil]\nsetTitleTextAttributes:barButtonItemTextAttributes forState:UIControlStateNormal];\n\
    \n    NSDictionary *disabledBarButtonItemTextAttributes = [NSDictionary\ndictionaryWithObjectsAndKeys:\n\
    \                                    kFontNavigationDisabledTextColour,\nUITextAttributeTextColor,\n\
    \                                   [UIColor whiteColor], UITextAttributeTextShadowColor,\n\
    \                                   [NSValue valueWithUIOffset:UIOffsetMake(0,\
    \ 1)],\nUITextAttributeTextShadowOffset,nil];\n    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar\
    \ class], nil]\nsetTitleTextAttributes:disabledBarButtonItemTextAttributes forState:UIControlStateDisabled];\n\
    ```\n\n构建并运行。结果应该会显示带有色调的栏按钮项，如图 9-17 所示。\n\n![Image](img/9781430243748_Fig09-17.jpg)\n\
    \n**图 9-17.** 带有色调的栏按钮项\n\n在最新的代码中，我引入了 `appearanceWhenContainedIn:` 样式方法。这种第二种外观\
    \ API 的重要性在于，我们可以指定 iOS 仅将奶油色样式应用于出现在 `UINavigationBar` 容器类中的 `UIBarButtonItem`\
    \ 实例。如果我们坚持对所有 `UIBarButtonItem` 类的实例设置全局样式，那么我们的样式也会被应用到工具栏中的“通讯录”和“Facebook”栏按钮项实例上。我们的应用设计对工具栏及其栏按钮项采用了截然不同的皮肤，因此这并不理想。现在让我们为\
    \ `initStyles` 方法添加工具栏样式：\n\n```\n//工具栏\n\n    //工具栏背景图片（蛋糕风格）\n    [[UIToolbar\
    \ appearance] setBackgroundImage:[UIImage imageNamed:@\"tool-bar-background.png\"\
    ]\nforToolbarPosition:UIToolbarPositionAny barMetrics:UIBarMetricsDefault];\n\n\
    \    //工具栏按钮\n    //工具栏按钮的深色背景\n    //工具栏按钮背景的色调\n    [[UIBarButtonItem appearanceWhenContainedIn:[UIToolbar\
    \ class],nil]\nsetTintColor:kToolbarButtonBackgroundColour];\n\n    //UIBarButtonItem\
    \ 上的白色文字\n    barButtonItemTextAttributes = [NSDictionary dictionaryWithObjectsAndKeys:[UIColor\n\
    whiteColor], UITextAttributeTextColor,nil];\n    [[UIBarButtonItem appearanceWhenContainedIn:[UIToolbar\
    \ class], nil]\n     setTitleTextAttributes:barButtonItemTextAttributes forState:UIControlStateNormal];\n\
    ```\n\n构建并运行。此时，你的主屏幕应该看起来与我们的主屏幕设计几乎完全相同（见图 9-18）。\n\n![Image](img/9781430243748_Fig09-18.jpg)\n\
    \n**图 9-18.** 经过样式化的工具栏及其中的栏按钮项\n\n#### 将样式表应用到应用的其他部分\n\n我们的样式表类几乎完成了，但我们需要将标签和图片样式应用到应用的其他屏幕中，所以现在就来完成这部分工作。\n\
    \n##### 样式化提醒时间视图\n\n导航栏和自定义视图背景样式会自动应用到应用的所有屏幕上，但 `BRNotificationTimeViewController`\
    \ 中的说明文字在棋盘格背景下显得太暗，因此请打开 `BRNotificationTimeViewController.m`，导入 `BRStyleSheet.h`，并添加一个\
    \ `viewDidLoad` 实现：\n\n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    [BRStyleSheet styleLabel:self.whatTimeLabel withType:BRLabelTypeLarge];\n\
    }\n```\n\n构建并运行。说明文字现在应该已经应用了样式，如图 9-19 所示。\n\n![Image](img/9781430243748_Fig09-19.jpg)\n\
    \n**图 9-19.** 经过样式的提醒时间设置视图\n\n##### 样式化生日编辑视图\n\n我们将对生日编辑视图控制器应用相同的样式流程。打开 `BRBirthdayEditViewController.m`，导入\
    \ `BRStyleSheet.h`，然后通过添加 `viewDidLoad` 实现来样式化“包含年份”文本标签和照片容器：\n\n```\n-(void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    [BRStyleSheet styleLabel:self.includeYearLabel\
    \ withType:BRLabelTypeLarge];\n    [BRStyleSheet styleRoundCorneredView:self.photoContainerView];\n\
    }\n```\n\n构建并运行（见图 9-20）。\n\n![Image](img/9781430243748_Fig09-20.jpg)\n\n**图 9-20.**\
    \ 经过样式的生日编辑视图\n\n##### 样式化备注编辑视图\n\n备注编辑视图控制器显示的是一个文本视图而不是标签，因此我们需要在样式表中添加一个新的文本视图样式方法。在\
    \ `BRStyleSheet.h` 头文件中声明新方法：\n\n```\n+(void)styleTextView:(UITextView *)textView;\n\
    ```\n\n然后在 `BRStyleSheet.m` 源文件中实现新的 `styleTextView:` 类方法：\n\n```\n+(void)styleTextView:(UITextView\
    \ *)textView\n{\n    textView.backgroundColor = [UIColor clearColor];\n    textView.font\
    \ = kFontNotes;\n    textView.textColor = kFontLightOnDarkTextColour;\n    textView.layer.shadowColor\
    \ = kFontDropShadowColour.CGColor;\n    textView.layer.shadowOffset = CGSizeMake(1.0f,\
    \ 1.0f);\n    textView.layer.shadowRadius = 0.0f;\n    textView.layer.masksToBounds\
    \ = NO;\n}\n```\n\n打开 `BRNotesEditViewController.m`，导入 `BRStyleSheet.h`，然后在 `viewDidLoad`\
    \ 实现中样式化文本视图：\n\n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n    [BRStyleSheet\
    \ styleTextView:self.textView];\n}\n```\n\n构建并运行（见图 9-21）。\n\n![Image](img/9781430243748_Fig09-21.jpg)\n\
    \n**图 9-21.** 经过样式的编辑备注视图\n\n##### 创建并样式化生日详情视图\n\n目前，我们的生日详情视图内容显得很空，但我们很快就会解决这个问题（见图\
    \ 9-22）。\n\n![Image](img/9781430243748_Fig09-22.jpg)\n\n**图 9-22.** 生日详情视图：修改前\n"
- fmt: "# Scroll Views and Scrollable Content\n\nWe're going to set up our Birthday\
    \ Detail view to be scrollable if its content height is greater than the available\
    \ view height. The height of the content on this screen will vary because we'll\
    \ display the user-generated birthday notes and buttons to allow the user to post\
    \ on their friend's Facebook wall, or to e-mail, SMS, or call their friend on\
    \ his/her birthday. The content height will vary depending on the user-generated\
    \ note text length, so we'll need to calculate the content height in our view\
    \ controller at runtime.\n\nIn your storyboard, drag a scroll view onto the Birthday\
    \ Detail view from the Object Library. Resize the scroll view to fit the bounds\
    \ of the Birthday Detail view. Using the document outline pane, multiselect the\
    \ button and image view, and drag them onto the scroll view. Xcode will move the\
    \ button and image view to become children of the scroll view rather than the\
    \ main view, as shown in [Figure 9-23](#Chapter09.html#fig_9_23).\n\n![Image](images/9781430243748_Fig09-23.jpg)\n\
    \n**Figure 9-23.** Button and image view, now subviews of the scroll view\n\n\
    We want the scroll view to always fill the available space of its parent view.\
    \ Although this won't change because our app doesn't support portrait orientation,\
    \ it's worth setting up the scroll view autosizing settings to a flexible width,\
    \ a flexible height, and a fixed top, bottom, and sides, as shown in [Figure 9-24](#Chapter09.html#fig_9_24).\n\
    \n![Image](images/9781430243748_Fig09-24.jpg)\n\n**Figure 9-24.** Configuring\
    \ our scroll view autosizing\n\nBefore we fix the positioning of our subviews,\
    \ let's add two more image views to the scroll view. Position, size, and configure\
    \ the image views as shown in [Table 9-2](#Chapter09.html#tab_9_2).\n\n![Image](images/tab9-2.jpg)\n\
    \nThe layout of your view should resemble [Figure 9-25](#Chapter09.html#fig_9_25).\n\
    \n![Image](images/9781430243748_Fig09-25.jpg)\n\n**Figure 9-25.** Image views\
    \ configured and positioned\n\nNow to add five new label views. Position, size,\
    \ and configure the label views as shown in [Table 9-3](#Chapter09.html#tab_9_3).\n\
    \n![Image](images/tab9-3.jpg)\n\nThe layout of your view should now resemble [Figure\
    \ 9-26](#Chapter09.html#fig_9_26).\n\n![Image](images/9781430243748_Fig09-26.jpg)\n\
    \n**Figure 9-26.** Labels configured and positioned\n\nWe're going to modify the\
    \ Edit Notes button and turn it into a pencil icon. Delete the Edit Notes text.\
    \ Using the attributes inspector, set the `Image` property to `icon-notes.png`.\
    \ Change the button type to Custom to remove the round rectangle border. Now position\
    \ the button (x=51, y=91) and size it (w=44 and h=44).\n\nNext up, buttons. Add\
    \ five buttons to the scroll view and position, size, and configure them as shown\
    \ in [Table 9-4](#Chapter09.html#tab_9_4).\n\n![Image](images/tab9-4.jpg)\n\n\
    Even though the Email and Delete buttons move out of sight, you can use the document\
    \ outline pane to select them and then configure with the attributes and size\
    \ inspectors. You should end up with a layout that looks like [Figure 9-27](#Chapter09.html#fig_9_27).\n\
    \n![Image](images/9781430243748_Fig09-27.jpg)\n\n**Figure 9-27.** Buttons configured\
    \ and positioned\n\nUsing the Assistant Editor layout, I'd now like you to Control-drag\
    \ to create new outlets and actions in `BRBirthdayDetailViewController.h` for\
    \ the new views and buttons we've just added to the Birthday Edit view. If you\
    \ can't access a view because it's hidden behind another, then you can optionally\
    \ drag from the document outline pane to `BRBirthdayDetailViewController.h`. Here's\
    \ the resulting `BRBirthdayDetailViewController.h` file with the new outlets and\
    \ actions. Make sure yours matches when you're done:\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"BRCoreViewController.h\"\n@class BRDBirthday;\n\n@interface BRBirthdayDetailViewController\
    \ : BRCoreViewController\n\n@property(nonatomic,strong) BRDBirthday *birthday;\n\
    @property (weak, nonatomic) IBOutlet UIImageView *photoView;\n@property (weak,\
    \ nonatomic) IBOutlet UIScrollView *scrollView;\n@property (weak, nonatomic) IBOutlet\
    \ UILabel *birthdayLabel;\n@property (weak, nonatomic) IBOutlet UILabel *remainingDaysLabel;\n\
    @property (weak, nonatomic) IBOutlet UILabel *remainingDaysSubTextLabel;\n@property\
    \ (weak, nonatomic) IBOutlet UILabel *notesTitleLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *notesTextLabel;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *remainingDaysImageView;\n@property (weak, nonatomic) IBOutlet UIButton *facebookButton;\n\
    @property (weak, nonatomic) IBOutlet UIButton *callButton;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *smsButton;\n@property (weak, nonatomic) IBOutlet UIButton\
    \ *emailButton;\n@property (weak, nonatomic) IBOutlet UIButton *deleteButton;\n\
    \n- (IBAction)facebookButtonTapped:(id)sender;\n- (IBAction)callButtonTapped:(id)sender;\n\
    - (IBAction)smsButtonTapped:(id)sender;\n- (IBAction)emailButtonTapped:(id)sender;\n\
    - (IBAction)deleteButtonTapped:(id)sender;\n\n@end\n```\n\nUsing the regular editor,\
    \ switch to `BRBirthdayDetailViewController.m` and begin by importing `BRStyleSheet.h`.\
    \ Just like earlier, we'll add the label and round-corner styling in the `viewDidLoad`\
    \ implementation:\n\n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n\n\
    \    [BRStyleSheet styleRoundCorneredView:self.photoView];\n\n    [BRStyleSheet\
    \ styleLabel:self.birthdayLabel withType:BRLabelTypeLarge];\n    [BRStyleSheet\
    \ styleLabel:self.notesTitleLabel withType:BRLabelTypeLarge];\n    [BRStyleSheet\
    \ styleLabel:self.notesTextLabel withType:BRLabelTypeLarge];\n    [BRStyleSheet\
    \ styleLabel:self.remainingDaysLabel withType:BRLabelTypeDaysUntilBirthday];\n\
    \    [BRStyleSheet styleLabel:self.remainingDaysSubTextLabel\nwithType:BRLabelTypeDaysUntilBirthdaySubText];\n\
    }\n```\n\nBuild and run. The labels and photo view should be nicely styled, as\
    \ shown in [Figure 9-28](#Chapter09.html#fig_9_28).\n\n![Image](images/9781430243748_Fig09-28.jpg)\n\
    \n**Figure 9-28.** Labels and photo view styled in the Birthday Detail view\n\n\
    To add the birthday content to the detail view, we'll first add the highlighted\
    \ code to `BRBirthdayDetailViewController.m`'s `viewWillAppear:` method:\n\n```\n\
    -(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \n    self.title = self.birthday.name;\n    UIImage *image = [UIImage imageWithData:self.birthday.imageData];\n\
    \    if (image == nil) {\n        //default to the birthday cake pic if there's\
    \ no birthday image\n        self.photoView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n    }\n    else {\n        self.photoView.image = image;\n    }\n\n    int\
    \ days = self.birthday.remainingDaysUntilNextBirthday;\n\n    if (days == 0) {\n\
    \        //Birthday is today!\n        self.remainingDaysLabel.text = self.remainingDaysSubTextLabel.text\
    \ = @\"\";\n        self.remainingDaysImageView.image = [UIImage imageNamed:@\"\
    icon-birthday-cake.png\"];\n    }\n    else {\n        self.remainingDaysLabel.text\
    \ = [NSString stringWithFormat:@\"%d\",days];\n        self.remainingDaysSubTextLabel.text\
    \ = (days == 1) ? @\"more day\" : @\"more days\";\n        self.remainingDaysImageView.image\
    \ = [UIImage imageNamed:@\"icon-days-remaining.png\"];\n    }\n\n    self.birthdayLabel.text\
    \ = self.birthday.birthdayTextToDisplay;\n}\n```\n\nThe code is virtually the\
    \ same as the code we used in `BRBrithdayTableViewCell.m`. The results should\
    \ look like [Figure 9-29](#Chapter09.html#fig_9_29).\n\n![Image](images/9781430243748_Fig09-29.jpg)\n\
    \n**Figure 9-29.** **(a)** A day countdown is displayed **(b)** or a cake if it's\
    \ the friend's birthday"
  raw: '##### Scroll views and scrollable content


    We’re going to set up our Birthday Detail view to be scrollable if its content
    height is greater than the available view height. The height of the content on
    this screen will vary because we’ll display the user-generated birthday notes
    and buttons to allow the user to post on their friend’s Facebook wall, or to e-mail,
    SMS, or call their friend on his/her birthday. The content height will vary depending
    on the user-generated note text length, so we’ll need to calculate the content
    height in our view controller at runtime.


    In your storyboard, drag a scroll view onto the Birthday Detail view from the
    Object Library. Resize the scroll view to fit the bounds of the Birthday Detail
    view. Using the document outline pane, multiselect the button and image view,
    and drag them onto the scroll view. Xcode will move the button and image view
    to become children of the scroll view rather than the main view, as shown in [Figure
    9-23](#Chapter09.html#fig_9_23).


    ![Image](images/9781430243748_Fig09-23.jpg)


    **Figure 9-23.** Button and image view, now subviews of the scroll view


    We want the scroll view to always fill the available space of its parent view.
    Although this won’t change because our app doesn’t support portrait orientation,
    it’s worth setting up the scroll view autosizing settings to a flexible width,
    a flexible height, and a fixed top, bottom, and sides, as shown in [Figure 9-24](#Chapter09.html#fig_9_24).


    ![Image](images/9781430243748_Fig09-24.jpg)


    **Figure 9-24.** Configuring our scroll view autosizing


    Before we fix the positioning of our subviews, let’s add two more image views
    to the scroll view. Position, size, and configure the image views as shown in
    [Table 9-2](#Chapter09.html#tab_9_2).


    ![Image](images/tab9-2.jpg)


    The layout of your view should resemble [Figure 9-25](#Chapter09.html#fig_9_25).


    ![Image](images/9781430243748_Fig09-25.jpg)


    **Figure 9-25.** Image views configured and positioned


    Now to add five new label views. Position, size, and configure the label views
    as shown in [Table 9-3](#Chapter09.html#tab_9_3).


    ![Image](images/tab9-3.jpg)


    The layout of your view should now resemble [Figure 9-26](#Chapter09.html#fig_9_26).


    ![Image](images/9781430243748_Fig09-26.jpg)


    **Figure 9-26.** Labels configured and positioned


    We’re going to modify the Edit Notes button and turn it into a pencil icon. Delete
    the Edit Notes text. Using the attributes inspector, set the `Image` property
    to `icon-notes.png`. Change the button type to Custom to remove the round rectangle
    border. Now position the button (x=51, y=91) and size it (w=44 and h=44).


    Next up, buttons. Add five buttons to the scroll view and position, size, and
    configure them as shown in [Table 9-4](#Chapter09.html#tab_9_4).


    ![Image](images/tab9-4.jpg)


    Even though the Email and Delete buttons move out of sight, you can use the document
    outline pane to select them and then configure with the attributes and size inspectors.
    You should end up with a layout that looks like [Figure 9-27](#Chapter09.html#fig_9_27).


    ![Image](images/9781430243748_Fig09-27.jpg)


    **Figure 9-27.** Buttons configured and positioned


    Using the Assistant Editor layout, I’d now like you to Control-drag to create
    new outlets and actions in `BRBirthdayDetailViewController.h` for the new views
    and buttons we’ve just added to the Birthday Edit view. If you can’t access a
    view because it’s hidden behind another, then you can optionally drag from the
    document outline pane to `BRBirthdayDetailViewController.h`. Here’s the resulting
    `BRBirthdayDetailViewController.h` file with the new outlets and actions. Make
    sure yours matches when you’re done:


    `#import <UIKit/UIKit.h>`

    `#import "BRCoreViewController.h"`

    `@class BRDBirthday;`


    `@interface BRBirthdayDetailViewController : BRCoreViewController`


    `@property(nonatomic,strong) BRDBirthday *birthday;`

    `@property (weak, nonatomic) IBOutlet UIImageView *photoView;`


    **`@property (weak, nonatomic) IBOutlet UIScrollView *scrollView;`**

    **`@property (weak, nonatomic) IBOutlet UILabel *birthdayLabel;`**

    **`@property (weak, nonatomic) IBOutlet UILabel *remainingDaysLabel;`**

    **`@property (weak, nonatomic) IBOutlet UILabel *remainingDaysSubTextLabel;`**

    **`@property (weak, nonatomic) IBOutlet UILabel *notesTitleLabel;`**

    **`@property (weak, nonatomic) IBOutlet UILabel *notesTextLabel;`**

    **`@property (weak, nonatomic) IBOutlet UIImageView *remainingDaysImageView;`**

    **`@property (weak, nonatomic) IBOutlet UIButton *facebookButton;`**

    **`@property (weak, nonatomic) IBOutlet UIButton *callButton;`**

    **`@property (weak, nonatomic) IBOutlet UIButton *smsButton;`**

    **`@property (weak, nonatomic) IBOutlet UIButton *emailButton;`**

    **`@property (weak, nonatomic) IBOutlet UIButton *deleteButton;`**


    **`- (IBAction)facebookButtonTapped:(id)sender;`**

    **`- (IBAction)callButtonTapped:(id)sender;`**

    **`- (IBAction)smsButtonTapped:(id)sender;`**

    **`- (IBAction)emailButtonTapped:(id)sender;`**

    **`- (IBAction)deleteButtonTapped:(id)sender;`**


    `@end`


    Using the regular editor, switch to `BRBirthdayDetailViewController.m` and begin
    by importing `BRStyleSheet.h`. Just like earlier, we’ll add the label and round-corner
    styling in the `viewDidLoad` implementation:


    `-(void) viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    [BRStyleSheet styleRoundCorneredView:self.photoView];`


    `    [BRStyleSheet styleLabel:self.birthdayLabel withType:BRLabelTypeLarge];`

    `    [BRStyleSheet styleLabel:self.notesTitleLabel withType:BRLabelTypeLarge];`

    `    [BRStyleSheet styleLabel:self.notesTextLabel withType:BRLabelTypeLarge];`

    `    [BRStyleSheet styleLabel:self.remainingDaysLabel withType:BRLabelTypeDaysUntilBirthday];`

    `    [BRStyleSheet styleLabel:self.remainingDaysSubTextLabel`

    `withType:BRLabelTypeDaysUntilBirthdaySubText];`

    `}`


    Build and run. The labels and photo view should be nicely styled, as shown in
    [Figure 9-28](#Chapter09.html#fig_9_28).


    ![Image](images/9781430243748_Fig09-28.jpg)


    **Figure 9-28.** Labels and photo view styled in the Birthday Detail view


    To add the birthday content to the detail view, we’ll first add the highlighted
    code to *BRBirthdayDetailViewController.m’s* `viewWillAppear:` method:


    `-(void) viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`


    `    self.title = self.birthday.name;`

    `    UIImage *image = [UIImage imageWithData:self.birthday.imageData];`

    `    if (image == nil) {`

    `        //default to the birthday cake pic if there''s no birthday image`

    `        self.photoView.image = [UIImage imageNamed:@"icon-birthday-cake.png"];`

    `    }`

    `    else {`

    `        self.photoView.image = image;`

    `    }`


    **`int days = self.birthday.remainingDaysUntilNextBirthday;`**


    **`    if (days == 0) {`**

    **`        //Birthday is today!`**

    **`        self.remainingDaysLabel.text = self.remainingDaysSubTextLabel.text
    = @"";`**

    **`        self.remainingDaysImageView.image = [UIImage imageNamed:@"icon-birthday-`

    `cake.png"];`**

    **`    }`**

    **`    else {`**

    **`        self.remainingDaysLabel.text = [NSString stringWithFormat:@"%d",days];`**

    **`        self.remainingDaysSubTextLabel.text = (days == 1) ? @"more day" : @"more
    days";`**

    **`        self.remainingDaysImageView.image = [UIImage imageNamed:@"icon-days-`

    `remaining.png"];`**

    **`    }`**


    **`    self.birthdayLabel.text = self.birthday.birthdayTextToDisplay;`**

    `}`


    The code is virtually the same as the code we used in `BRBrithdayTableViewCell.m`.
    The results should look like [Figure 9-29](#Chapter09.html#fig_9_29).


    ![Image](images/9781430243748_Fig09-29.jpg)


    **Figure 9-29.** **(a)** A day countdown is displayed **(b)** or a cake if it’s
    the friend’s birthday'
  trans: "\n# 滚动视图与可滚动内容\n\n当生日详情视图的内容高度超过可用视图高度时，我们将使其支持滚动。该屏幕的内容高度会变化，因为我们会显示用户生成的生日备注和按钮，让用户能在朋友生日时在其\
    \ Facebook 墙上发帖、发送电子邮件、短信或拨打电话。内容高度会随用户备注文本长度变化，因此需要在视图控制器中**运行时**计算内容高度。\n\n\
    在故事板中，从对象库拖一个滚动视图到生日详情视图上。调整滚动视图大小以适配生日详情视图的边界。利用文档大纲面板，多选按钮和图片视图，将其拖入滚动视图中。Xcode\
    \ 会将按钮和图片视图移动为滚动视图的子视图（而非主视图），如图 9-23 所示。\n\n![图片](img/9781430243748_Fig09-23.jpg)\n\
    \n**图 9-23.** 按钮和图片视图，现为滚动视图的子视图\n\n我们希望滚动视图始终填充其父视图的可用空间。虽然我们的应用不支持横屏方向，因此这一点不会改变，但仍有必要将滚动视图的自动调整大小设置为：宽度灵活、高度灵活，以及顶部、底部和两侧固定，如图\
    \ 9-24 所示。\n\n![图片](img/9781430243748_Fig09-24.jpg)\n\n**图 9-24.** 配置滚动视图的自动调整大小设置\n\
    \n在固定子视图位置之前，我们先在滚动视图中添加两个图片视图。按表 9-2 所示，对图片视图进行定位、调整大小和配置。\n\n![图片](img/tab9-2.jpg)\n\
    \n视图布局应类似于图 9-25。\n\n![图片](img/9781430243748_Fig09-25.jpg)\n\n**图 9-25.** 图片视图已配置并定位\n\
    \n现在添加五个标签视图。按表 9-3 所示，对标签视图进行定位、调整大小和配置。\n\n![图片](img/tab9-3.jpg)\n\n视图布局现在应类似于图\
    \ 9-26。\n\n![图片](img/9781430243748_Fig09-26.jpg)\n\n**图 9-26.** 标签已配置并定位\n\n我们要修改“编辑备注”按钮，将其变为铅笔图标。删除“编辑备注”文本。使用属性检查器，将`Image`属性设置为`icon-notes.png`。将按钮类型改为自定义以移除圆角矩形边框。现在定位按钮（x=51,\
    \ y=91）并调整其大小（宽=44，高=44）。\n\n接下来是按钮。在滚动视图中添加五个按钮，按表 9-4 所示，对其进行定位、调整大小和配置。\n\n\
    ![图片](img/tab9-4.jpg)\n\n即使电子邮件和删除按钮移出了视野，你也可以通过文档大纲面板选中它们，然后使用属性检查器和尺寸检查器进行配置。最终布局应如图\
    \ 9-27 所示。\n\n![图片](img/9781430243748_Fig09-27.jpg)\n\n**图 9-27.** 按钮已配置并定位\n\n\
    使用助理编辑器布局，请按住 Control 键拖拽，为我们在生日编辑视图中新增的视图和按钮，在`BRBirthdayDetailViewController.h`中创建新的输出口和操作方法。如果你无法访问被其他视图遮挡的视图，也可以从文档大纲面板拖拽到`BRBirthdayDetailViewController.h`。以下是已添加新输出口和操作方法的`BRBirthdayDetailViewController.h`文件结果。请确保你的文件与之匹配：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n@class BRDBirthday;\n\
    \n@interface BRBirthdayDetailViewController : BRCoreViewController\n\n@property(nonatomic,strong)\
    \ BRDBirthday *birthday;\n@property (weak, nonatomic) IBOutlet UIImageView *photoView;\n\
    @property (weak, nonatomic) IBOutlet UIScrollView *scrollView;\n@property (weak,\
    \ nonatomic) IBOutlet UILabel *birthdayLabel;\n@property (weak, nonatomic) IBOutlet\
    \ UILabel *remainingDaysLabel;\n@property (weak, nonatomic) IBOutlet UILabel *remainingDaysSubTextLabel;\n\
    @property (weak, nonatomic) IBOutlet UILabel *notesTitleLabel;\n@property (weak,\
    \ nonatomic) IBOutlet UILabel *notesTextLabel;\n@property (weak, nonatomic) IBOutlet\
    \ UIImageView *remainingDaysImageView;\n@property (weak, nonatomic) IBOutlet UIButton\
    \ *facebookButton;\n@property (weak, nonatomic) IBOutlet UIButton *callButton;\n\
    @property (weak, nonatomic) IBOutlet UIButton *smsButton;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *emailButton;\n@property (weak, nonatomic) IBOutlet UIButton\
    \ *deleteButton;\n\n- (IBAction)facebookButtonTapped:(id)sender;\n- (IBAction)callButtonTapped:(id)sender;\n\
    - (IBAction)smsButtonTapped:(id)sender;\n- (IBAction)emailButtonTapped:(id)sender;\n\
    - (IBAction)deleteButtonTapped:(id)sender;\n\n@end\n```\n\n使用常规编辑器，切换到`BRBirthdayDetailViewController.m`，首先导入`BRStyleSheet.h`。与之前一样，我们在`viewDidLoad`实现中添加标签和圆角样式：\n\
    \n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n\n    [BRStyleSheet styleRoundCorneredView:self.photoView];\n\
    \n    [BRStyleSheet styleLabel:self.birthdayLabel withType:BRLabelTypeLarge];\n\
    \    [BRStyleSheet styleLabel:self.notesTitleLabel withType:BRLabelTypeLarge];\n\
    \    [BRStyleSheet styleLabel:self.notesTextLabel withType:BRLabelTypeLarge];\n\
    \    [BRStyleSheet styleLabel:self.remainingDaysLabel withType:BRLabelTypeDaysUntilBirthday];\n\
    \    [BRStyleSheet styleLabel:self.remainingDaysSubTextLabel\nwithType:BRLabelTypeDaysUntilBirthdaySubText];\n\
    }\n```\n\n构建并运行。标签和图片视图应已应用了美观的样式，如图 9-28 所示。\n\n![图片](img/9781430243748_Fig09-28.jpg)\n\
    \n**图 9-28.** 生日详情视图中的标签和图片视图已应用样式\n\n为了将生日内容添加到详情视图中，我们首先将高亮显示的代码添加到`BRBirthdayDetailViewController.m`的`viewWillAppear:`方法中：\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \n    self.title = self.birthday.name;\n    UIImage *image = [UIImage imageWithData:self.birthday.imageData];\n\
    \    if (image == nil) {\n        //如果没有生日图片，则默认使用生日蛋糕图片\n        self.photoView.image\
    \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n   \
    \     self.photoView.image = image;\n    }\n\n    int days = self.birthday.remainingDaysUntilNextBirthday;\n\
    \n    if (days == 0) {\n        //今天就是生日！\n        self.remainingDaysLabel.text\
    \ = self.remainingDaysSubTextLabel.text = @\"\";\n        self.remainingDaysImageView.image\
    \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n   \
    \     self.remainingDaysLabel.text = [NSString stringWithFormat:@\"%d\",days];\n\
    \        self.remainingDaysSubTextLabel.text = (days == 1) ? @\"more day\" : @\"\
    more days\";\n        self.remainingDaysImageView.image = [UIImage imageNamed:@\"\
    icon-days-remaining.png\"];\n    }\n\n    self.birthdayLabel.text = self.birthday.birthdayTextToDisplay;\n\
    }\n```\n\n这段代码与我们之前在`BRBrithdayTableViewCell.m`中使用的代码几乎相同。效果应如图 9-29 所示。\n\n![图片](img/9781430243748_Fig09-29.jpg)\n\
    \n**图 9-29.** **(a)** 显示天数倒计时 **(b)** 如果当天是朋友生日，则显示蛋糕图标\n"
- fmt: "### Calculating text size\n\nOur Birthday Detail view controller should also\
    \ display any user-generated notes. We want the notes to display immediately below\
    \ the Notes title label and then the row of buttons to appear after the notes.\
    \ So we need to make the contents of our scroll view layout dynamically based\
    \ on the height of the notes text. We’re enabling our users to write multiple\
    \ lines of notes, so we need to dynamically measure the height that the note text\
    \ label requires. `NSString` has a method, `sizeWithFont:constrainedToSize:lineBreakMode:`,\
    \ which is perfect for calculating the height required. We’ll now incorporate\
    \ this by adding the following code to the end of our `viewWillAppear:` implementation\
    \ of `BRBirthdayDetailViewController.m`:\n\n```\n    NSString *notes = (self.birthday.notes\
    \ && self.birthday.notes.length > 0) ?\nself.birthday.notes : @\"\";\n\n    CGFloat\
    \ cY = self.notesTextLabel.frame.origin.y;\n\n    CGSize notesLabelSize = [notes\
    \ sizeWithFont:self.notesTextLabel.font\nconstrainedToSize:CGSizeMake(300.f, 300.f)\
    \ lineBreakMode:NSLineBreakByWordWrapping];\n\n    CGRect frame = self.notesTextLabel.frame;\n\
    \    frame.size.height = notesLabelSize.height;\n    self.notesTextLabel.frame\
    \ = frame;\n\n    self.notesTextLabel.text = notes;\n\n    cY += frame.size.height;\n\
    \    cY += 10.f;\n\n    CGFloat buttonGap = 6.f;\n\n    cY += buttonGap * 2;\n\
    \n    NSMutableArray *buttonsToShow = [NSMutableArray\narrayWithObjects:self.facebookButton,self.callButton,\
    \ self.smsButton, self.emailButton,\nself.deleteButton, nil];\n\n    UIButton\
    \ *button;\n\n    int i;\n\n    for (i=0;i<[buttonsToShow count];i++) {\n    \
    \    button = [buttonsToShow objectAtIndex:i];\n        frame = button.frame;\n\
    \        frame.origin.y = cY;\n        button.frame = frame;\n        cY += button.frame.size.height\
    \ + buttonGap;\n    }\n\n    self.scrollView.contentSize = CGSizeMake(320, cY);\n\
    ```\n\nBuild and run. You should now see our note text label sizes to fit the\
    \ text entered up to a maximum 300 points height. The five buttons also layout\
    \ neatly under the text, and the scroll view scrolls to the exact height of our\
    \ content as shown in [Figure 9-30](#Chapter09.html#fig_9_30).\n\n![Image](images/9781430243748_Fig09-30.jpg)\n\
    \n**Figure 9-30.** Note text height dynamically calculated in code and buttons\
    \ laid out neatly below the notes text view\n\nLet’s examine how the code works.\
    \ We create a temporary variable named `cY` to keep track of the current y value\
    \ as we layout each button below the notes text label. Take a look at our last\
    \ line of code:\n\n```\nself.scrollView.contentSize = CGSizeMake(320, cY);\n```\n\
    \nWe use the `cY` value to determine the total height of the content of the scroll\
    \ view.\n\nWe start `cY` at the top-left point of the notes text label (origin):\n\
    \n```\nCGFloat cY = self.notesTextLabel.frame.origin.y;\n```\n\nWe do this because\
    \ nothing above the notes text label needs to be laid out dynamically, only everything\
    \ below it.\n\nThere’s one bit of skinning left to do: those ugly white buttons\
    \ need a makeover!\n\n### Skinning buttons\n\nHere’s the last of my iOS skinning\
    \ tips. We want to create two button styles for the buttons in our Birthday Detail\
    \ view: a big blue button style and a big red Delete button style. We can define\
    \ button styles using the appearance APIs. Great. There’s a problem, however:\
    \ we want buttons in the same container class to have different styles. Apple’s\
    \ `appearanceWhenContainedIn:` method is not going to work for this scenario.\
    \ The best solution I’ve found to this problem is to create multiple subclasses\
    \ of `UIButton` and apply different appearance styles to the different subclasses.\n\
    \nIn your Xcode project, select the `user-interface/components` group and create\
    \ a new Objective-C class file there. Name your class `BRBlueButton` and subclass\
    \ `UIButton`. All done? Great. Now repeat that process and add a new class to\
    \ the same `components` group named `BRRedButton`, but this time subclass your\
    \ original `BRBlueButton`. We don’t need to add any code to these new classes\
    \ because we’ve only created them for skinning purposes.\n\nFor each of the buttons\
    \ in the Birthday Detail view controller scene back in your storyboard, select\
    \ the button in the document outline pane. Using the identity inspector, change\
    \ the custom class of the first four buttons to `BRBlueButton` and the last (Delete)\
    \ button to `BRRedButton` (see [Figure 9-31](#Chapter09.html#fig_9_31)).\n\n![Image](images/9781430243748_Fig09-31.jpg)\n\
    \n**Figure 9-31.** Selecting button subclasses in the identity inspector\n\nOpen\
    \ `BRStyleSheet.m` and, after importing `BRBlueButton.h` and `BRRedButton.h`,\
    \ add the following code to the end of the `initStyles` method:\n\n```\n     //BUTTONS\n\
    \    [[BRBlueButton appearance] setBackgroundImage:[UIImage imageNamed:@\"button-blue.png\"\
    ]\nforState:UIControlStateNormal];\n    [[BRBlueButton appearance] setTitleColor:kLargeButtonTextColour\n\
    forState:UIControlStateNormal];\n    [[BRBlueButton appearance] setFont:kFontLarge];\n\
    \n    [[BRRedButton appearance] setBackgroundImage:[UIImage imageNamed:@\"button-red.png\"\
    ]\nforState:UIControlStateNormal];\n    [[BRRedButton appearance] setTitleColor:kLargeButtonTextColour\n\
    forState:UIControlStateNormal];\n    [[BRRedButton appearance] setFont:kFontLarge];\n\
    ```\n\nBuild and run. Presto! We now have lickable blue and red buttons, and a\
    \ very easy way to create new blue or red buttons in any other view in our app\
    \ (see [Figure 9-32](#Chapter09.html#fig_9_32))!\n\n![Image](images/9781430243748_Fig09-32.jpg)\n\
    \n**Figure 9-32.** Lickable blue and red buttons!\n\nIn the styling code, notice\
    \ how we only apply the title color to the blue buttons, yet it still gets inherited\
    \ by the red button style? Subclasses also inherit appearance styles from their\
    \ parent class.\n\nOne final styling niggle that you may or may not have spotted\
    \ is that the table view on the home screen has a white background. You’ll notice\
    \ this when the table view bounces at the top and bottom of its scrollable content\
    \ area. We can fix this and make the table view background color transparent for\
    \ all table views globally by adding the following code to our `initStyles` method:\n\
    \n```\n    //TABLE VIEW\n    [[UITableView appearance] setBackgroundColor:[UIColor\
    \ clearColor]];\n    [[UITableViewCell appearance] setSelectionStyle:UITableViewCellSelectionStyleNone];\n\
    \    [[UITableView appearance] setSeparatorStyle:UITableViewCellSeparatorStyleNone];\n\
    ```\n\nI’ve also thrown in a couple of lines of code to ensure that we never see\
    \ Apple’s default blue selection style or line separator style in our table view\
    \ cells, because it doesn’t look good with the *Birthday Reminder* design.\n\n\
    ### Summary\n\nThat’s Day 3 down. Congratulations! Our iPhone app is really taking\
    \ form now, looking like the original Photoshop designs. I guess the cake design\
    \ lends itself well to being considered lickable!\n\nWe learned a great deal about\
    \ how to skin and style an iPhone app this afternoon. *Birthday Reminder* no longer\
    \ looks like an Apple example test project. It looks like a cool app. Its core\
    \ functionality is also up and running. We mastered the basics of Core Data this\
    \ morning and now we can add, edit, and save birthdays or any other type of data\
    \ entity for that matter.\n\nTomorrow morning, we’ll begin exploring how to populate\
    \ our app by batch importing birthdays from the user’s iPhone Address Book and\
    \ Facebook. We’ll also learn how to schedule local notifications even when our\
    \ app isn’t running.\n\nSee you in the morning, bright-eyed and bushy-tailed!\n\
    \n![Image](images/ch.jpg)\n\n## Day 4\n\n## Importing Birthdays from the Address\
    \ Book and Facebook\n\n![Image](images/ch.jpg)\n\n## Chapter 10"
  raw: '#### Calculating text size


    Our Birthday Detail view controller should also display any user-generated notes.
    We want the notes to display immediately below the Notes title label and then
    the row of buttons to appear after the notes. So we need to make the contents
    of our scroll view layout dynamically based on the height of the notes text. We’re
    enabling our users to write multiple lines of notes, so we need to dynamically
    measure the height that the note text label requires. `NSString` has a method,  `sizeWithFont:constrainedToSize:lineBreakMode:`,
    which is perfect for calculating the height required. We’ll now incorporate this
    by adding the following code to the end of our `viewWillAppear:` implementation
    of `BRBirthdayDetailViewController.m`:


    `    NSString *notes = (self.birthday.notes && self.birthday.notes.length > 0)
    ?`

    `self.birthday.notes : @"";`


    `    CGFloat cY = self.notesTextLabel.frame.origin.y;`


    `    CGSize notesLabelSize = [notes sizeWithFont:self.notesTextLabel.font`

    `constrainedToSize:CGSizeMake(300.f, 300.f) lineBreakMode:NSLineBreakByWordWrapping];`


    `    CGRect frame = self.notesTextLabel.frame;`

    `    frame.size.height = notesLabelSize.height;`

    `    self.notesTextLabel.frame = frame;`


    `    self.notesTextLabel.text = notes;`


    `    cY += frame.size.height;`

    `    cY += 10.f;`


    `    CGFloat buttonGap = 6.f;`


    `    cY += buttonGap * 2;`


    `    NSMutableArray *buttonsToShow = [NSMutableArray`

    `arrayWithObjects:self.facebookButton,self.callButton, self.smsButton, self.emailButton,`

    `self.deleteButton, nil];`


    `    UIButton *button;`


    `    int i;`


    `    for (i=0;i<[buttonsToShow count];i++) {`

    `        button = [buttonsToShow objectAtIndex:i];`

    `        frame = button.frame;`

    `        frame.origin.y = cY;`

    `        button.frame = frame;`

    `        cY += button.frame.size.height + buttonGap;`

    `    }`


    `    self.scrollView.contentSize = CGSizeMake(320, cY);`


    Build and run. You should now see our note text label sizes to fit the text entered
    up to a maximum 300 points height. The five buttons also layout neatly under the
    text, and the scroll view scrolls to the exact height of our content as shown
    in [Figure 9-30](#Chapter09.html#fig_9_30).


    ![Image](images/9781430243748_Fig09-30.jpg)


    **Figure 9-30.** Note text height dynamically calculated in code and buttons laid
    out neatly below the notes text view


    Let’s examine how the code works. We create a temporary variable named `cY` to
    keep track of the current y value as we layout each button below the notes text
    label. Take a look at our last line of code:


    `self.scrollView.contentSize = CGSizeMake(320, cY);`


    We use the `cY` value to determine the total height of the content of the scroll
    view.


    We start `cY` at the top-left point of the notes text label (origin):


    `CGFloat cY = self.notesTextLabel.frame.origin.y;`


    We do this because nothing above the notes text label needs to be laid out dynamically,
    only everything below it.


    There’s one bit of skinning left to do: those ugly white buttons need a makeover!


    #### Skinning buttons


    Here’s the last of my iOS skinning tips. We want to create two button styles for
    the buttons in our Birthday Detail view: a big blue button style and a big red
    Delete button style. We can define button styles using the appearance APIs. Great.
    There’s a problem, however: we want buttons in the same container class to have
    different styles. Apple’s `appearanceWhenContainedIn:` method is not going to
    work for this scenario. The best solution I’ve found to this problem is to create
    multiple subclasses of `UIButton` and apply different appearance styles to the
    different subclasses.


    In your Xcode project, select the `user-interface/components` group and create
    a new Objective-C class file there. Name your class `BRBlueButton` and subclass
    `UIButton`. All done? Great. Now repeat that process and add a new class to the
    same `components` group named `BRRedButton`, but this time subclass your original
    `BRBlueButton`. We don’t need to add any code to these new classes because we’ve
    only created them for skinning purposes.


    For each of the buttons in the Birthday Detail view controller scene back in your
    storyboard, select the button in the document outline pane. Using the identity
    inspector, change the custom class of the first four buttons to `BRBlueButton`
    and the last (Delete) button to `BRRedButton` (see [Figure 9-31](#Chapter09.html#fig_9_31)).


    ![Image](images/9781430243748_Fig09-31.jpg)


    **Figure 9-31.** Selecting button subclasses in the identity inspector


    Open `BRStyleSheet.m` and, after importing `BRBlueButton.h` and `BRRedButton.h`,
    add the following code to the end of the `initStyles` method:


    `     //BUTTONS`

    `    [[BRBlueButton appearance] setBackgroundImage:[UIImage imageNamed:@"button-blue.png"]`

    `forState:UIControlStateNormal];`

    `    [[BRBlueButton appearance] setTitleColor:kLargeButtonTextColour`

    `forState:UIControlStateNormal];`

    `    [[BRBlueButton appearance] setFont:kFontLarge];`


    `    [[BRRedButton appearance] setBackgroundImage:[UIImage imageNamed:@"button-red.png"]`

    `forState:UIControlStateNormal];`

    `    [[BRRedButton appearance] setTitleColor:kLargeButtonTextColour`

    `forState:UIControlStateNormal];`

    `    [[BRRedButton appearance] setFont:kFontLarge];`


    Build and run. Presto! We now have lickable blue and red buttons, and a very easy
    way to create new blue or red buttons in any other view in our app (see [Figure
    9-32](#Chapter09.html#fig_9_32))!


    ![Image](images/9781430243748_Fig09-32.jpg)


    **Figure 9-32.** Lickable blue and red buttons!


    In the styling code, notice how we only apply the title color to the blue buttons,
    yet it still gets inherited by the red button style? Subclasses also inherit appearance
    styles from their parent class.


    One final styling niggle that you may or may not have spotted is that the table
    view on the home screen has a white background. You’ll notice this when the table
    view bounces at the top and bottom of its scrollable content area. We can fix
    this and make the table view background color transparent for all table views
    globally by adding the following code to our `initStyles` method:


    `    //TABLE VIEW`

    `    [[UITableView appearance] setBackgroundColor:[UIColor clearColor]];`

    `    [[UITableViewCell appearance] setSelectionStyle:UITableViewCellSelectionStyleNone];`

    `    [[UITableView appearance] setSeparatorStyle:UITableViewCellSeparatorStyleNone];`


    I’ve also thrown in a couple of lines of code to ensure that we never see Apple’s
    default blue selection style or line separator style in our table view cells,
    because it doesn’t look good with the *Birthday Reminder* design.


    ### Summary


    That’s Day 3 down. Congratulations! Our iPhone app is really taking form now,
    looking like the original Photoshop designs. I guess the cake design lends itself
    well to being considered lickable!


    We learned a great deal about how to skin and style an iPhone app this afternoon.
    *Birthday Reminder* no longer looks like an Apple example test project. It looks
    like a cool app. Its core functionality is also up and running. We mastered the
    basics of Core Data this morning and now we can add, edit, and save birthdays
    or any other type of data entity for that matter.


    Tomorrow morning, we’ll begin exploring how to populate our app by batch importing
    birthdays from the user’s iPhone Address Book and Facebook. We’ll also learn how
    to schedule local notifications even when our app isn’t running.


    See you in the morning, bright-eyed and bushy-tailed!


    ![Image](images/ch.jpg)


    ## Day 4


    ## Importing Birthdays from the Address Book and Facebook


    ![Image](images/ch.jpg)


