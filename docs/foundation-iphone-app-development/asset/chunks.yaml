  trans: '

    ### 签名并上传构建版本


    在归档构建窗口中选中你的`Birthday Reminder`应用后，点击`Distribute`按钮。系统将显示三个选项，如图 14-20 所示。


    ![Image](img/9781430243748_Fig14-20.jpg)


    **图 14-20.** 导出 App Store 构建、Ad-Hoc 构建或 Xcode 归档


    你的项目有以下三种分发选项：


    > - **提交至 iOS App Store**：接下来我们将学习此流程的具体运作方式。

    > - **保存用于企业或 Ad-Hoc 部署**：你可以创建并分发应用的发布构建版本，无需经过 App Store。企业应用可安装到任何 iOS 设备，但需要使用
    iOS 企业许可证证书签名。Ad-Hoc 构建是一种发布版本，用于分发到已添加到 Ad-Hoc 分发配置文件中的设备。你可能有一群 Beta 测试人员，希望在提交
    App Store 之前先向他们分发应用。

    > - **导出为 Xcode 归档**：导出 Xcode 归档会将你的应用与一个`dSYM`文件打包在一起，使团队中的其他开发者能够测试你的应用、获得调试访问权限，以及分析详细的崩溃报告。有些第三方系统（如
    Test Flight）要求你导出并上传 Ad-Hoc 应用的`dSYM`文件，以便在所有 Beta 测试者运行你的应用时进行远程调试。


    我们将保留默认选项`提交至 iOS App Store`，然后点击`Next`按钮。Xcode 会要求你登录你的 iOS 开发者账户。完成登录后再次点击`Next`。


    只要你已从配置门户成功安装了有效的 iOS 分发证书和 App Store 配置文件，此时你应该会看到一个与图 14-21 相似的屏幕。


    ![Image](img/9781430243748_Fig14-21.jpg)


    **图 14-21.** 准备对归档构建进行签名


    第一个下拉菜单列出了待处理的 iTunes Connect 应用提交，这些应用与我们应用的捆绑标识符和捆绑版本相匹配。太好了！我们的`Birthday Reminder`
    1.0 版本提交就在其中！


    第二个下拉菜单应自动查找并自动选中你的分发证书。


    点击`Next`进行提交。


    我们的应用捆绑包将首先通过验证流程，检查配置文件及签名证书是否有效，以及我们是否包含了有效的应用图标。若验证失败，Xcode 将提供错误信息和修复建议。


    假设一切正常，Xcode 随后会直接从 Organizer 窗口开始将你的应用上传到 iTunes Connect（见图 14-22）。


    ![Image](img/9781430243748_Fig14-22.jpg)


    **图 14-22.** 将验证后的应用捆绑包从 Xcode 上传到 iTunes Connect


    几分钟后（取决于应用的文件大小），上传应会完成。不久之后，你将收到一封来自 iTunes Connect 的自动邮件，主题为：Your App Status
    is Waiting for Review。


    此时，你的应用已进入 App Store 提交队列。根据我的经验，每次新应用提交或更新等待 Apple 审核（批准或拒绝）的时间通常为连续七个工作日。有时我比较幸运，等待时间较短，偶尔也会超过第七天。


    请注意：在圣诞节前夕提交应用时需谨慎——预计等待时间会更长，可能长达 14 天——因为 Apple 在节日前会收到大量新应用和应用更新。开发者们都希望在圣诞节当天新
    iOS 设备用户激增之际从中获利！


    ### 但如果我在待审核的应用中发现了一个 Bug 怎么办？


    这种情况经常发生。尤其如果你像我一样有点完美主义的话。你已经在提交队列中等待了三天，但你当然还在测试你的应用。突然，你发现了一个之前未曾注意到的 Bug。你在
    Xcode 项目中修复了这个 Bug。很好。


    但现在你面临一个两难境地：为了提交替换的二进制文件，你必须拒绝现有的二进制文件，上传新版本，然后不幸地再次回到 App Store 提交队列的最末尾。


    要替换当前处于提交队列中的应用的二进制文件，你首先需要登录 iTunes Connect，访问应用详情页面，并点击`Binary Details`链接。二进制详情页面提供了一个`Reject
    this Binary`按钮链接，使你可以删除带有 Bug 的应用二进制文件，然后上传修复后的新应用。


    ### 总结


    虽然我们现在已经完成了五天的课程，但对于应用开发者来说，真正的激动人心的时刻才刚刚开始。你构建了一个出色的应用。你已经提交了应用。大约一周后，你的应用将在
    App Store 上线——可供数百万潜在 iPhone 用户下载。这是多么令人振奋的前景啊！


    在第 13 章中，我们添加了许多应用内营销功能，以帮助推广我们的应用。但一旦应用公开上线，你还可以做更多事情：联系记者、告诉所有朋友、为你的应用创建 Facebook
    页面和 Twitter 账户——仅举几例营销策略。


    一旦应用上线，你还想跟踪应用的下载量、评分、评论，以及如果你创造了真正酷炫且原创的内容，Apple 可能给予的任何推荐。试试 AppAnnie.com，这是一个出色的
    App Store 分析工具，可以跟踪你所有应用并每天通过邮件发送报告。或者，如果你是那种喜欢实时查看 App Store 分类排名的开发者，可以尝试 AppViz，这是一个出色的桌面工具，用于跟踪和缓存你所有的应用销售报告、统计数据及评论。


    至此，我要向大家道别，并祝愿你们未来的 iPhone 开发者生涯好运。希望你们喜欢本书。你可以在 Twitter 上通过`@nickkuh`或我的网站[`www.nickkuh.com`](http://www.nickkuh.com)找到我。


    ![Image](img/ch.jpg)


