    When the user taps Add Birthday from the Home view controller and our `prepareForSegue:sender:`
    method is invoked, we immediately create a new mutable birthday dictionary, assign
    it a default name and birth date values, and add it to the `self.birthdays` array:


    `NSMutableDictionary *birthday = [NSMutableDictionary dictionary];`


    `birthday[@"name"] = @"My Friend";`

