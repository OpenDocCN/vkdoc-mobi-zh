    once you complete the certificate generation process. When you reach the point
    where you’re ready to submit your app to the App Store, you’ll need to repeat
    this certificate generation process to create a certificate for your App Store
    provisioning. Choose a name that identifies this certificate as the development
    version.

    > 3.  Select the Saved to Disk option.

    > 4.  Tap Continue and save the certificate request to your desktop.


