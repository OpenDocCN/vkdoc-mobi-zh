    \ 有一个方法 `sizeWithFont:constrainedToSize:lineBreakMode:`，非常适合计算所需高度。现在，我们将通过在 `BRBirthdayDetailViewController.m`\
    \ 的 `viewWillAppear:` 实现末尾添加以下代码来整合此功能：\n\n```\n    NSString *notes = (self.birthday.notes\
    \ && self.birthday.notes.length > 0) ?\nself.birthday.notes : @\"\";\n\n    CGFloat\
    \ cY = self.notesTextLabel.frame.origin.y;\n\n    CGSize notesLabelSize = [notes\
    \ sizeWithFont:self.notesTextLabel.font\nconstrainedToSize:CGSizeMake(300.f, 300.f)\
    \ lineBreakMode:NSLineBreakByWordWrapping];\n\n    CGRect frame = self.notesTextLabel.frame;\n\
    \    frame.size.height = notesLabelSize.height;\n    self.notesTextLabel.frame\
    \ = frame;\n\n    self.notesTextLabel.text = notes;\n\n    cY += frame.size.height;\n\
    \    cY += 10.f;\n\n    CGFloat buttonGap = 6.f;\n\n    cY += buttonGap * 2;\n\
    \n    NSMutableArray *buttonsToShow = [NSMutableArray\narrayWithObjects:self.facebookButton,self.callButton,\
    \ self.smsButton, self.emailButton,\nself.deleteButton, nil];\n\n    UIButton\
    \ *button;\n\n    int i;\n\n    for (i=0;i<[buttonsToShow count];i++) {\n    \
    \    button = [buttonsToShow objectAtIndex:i];\n        frame = button.frame;\n\
    \        frame.origin.y = cY;\n        button.frame = frame;\n        cY += button.frame.size.height\
    \ + buttonGap;\n    }\n\n    self.scrollView.contentSize = CGSizeMake(320, cY);\n\
    ```\n\n构建并运行。现在您应该能看到，我们的备注文本标签尺寸会根据输入的文本自动调整，最大高度为 300 点。五个按钮也整齐地排列在文本下方，并且滚动视图会精确滚动到内容的高度，如图\
    \ 9-30 所示。\n\n![Image](img/9781430243748_Fig09-30.jpg)\n\n**图 9-30.** 通过代码动态计算备注文本高度，按钮整齐地排列在备注文本视图下方\n\
    \n让我们检查一下代码的工作原理。我们创建了一个名为 `cY` 的临时变量，用于在备注文本标签下方布局每个按钮时跟踪当前的 y 值。看看我们的最后一行代码：\n\
    \n```\nself.scrollView.contentSize = CGSizeMake(320, cY);\n```\n\n我们使用 `cY` 值来确定滚动视图内容的总高度。\n\
    \n我们将 `cY` 初始化为备注文本标签的左上角点（原点）：\n\n```\nCGFloat cY = self.notesTextLabel.frame.origin.y;\n\
    ```\n\n之所以这样做，是因为备注文本标签上方的内容无需动态布局，只有它下方的所有内容才需要。\n\n还剩下一点外观美化工作：那些难看的白色按钮需要改造！\n\
    \n### 美化按钮\n\n这是我最后一条 iOS 美化技巧。我们想为生日详情视图中的按钮创建两种按钮样式：一种是大蓝色按钮样式，一种是大红色删除按钮样式。我们可以使用外观\
    \ API 来定义按钮样式。太棒了。然而，有一个问题：我们希望同一容器类中的按钮具有不同的样式。Apple 的 `appearanceWhenContainedIn:`\
    \ 方法在这种场景下行不通。针对这个问题，我找到的最佳解决方案是创建 `UIButton` 的多个子类，并对不同的子类应用不同的外观样式。\n\n在你的 Xcode\
    \ 项目中，选择 `user-interface/components` 分组，并在此创建一个新的 Objective-C 类文件。将你的类命名为 `BRBlueButton`，并设置其父类为\
    \ `UIButton`。都完成了？太棒了。现在重复这个过程，在同一个 `components` 分组中添加一个名为 `BRRedButton` 的新类，但这次将其父类设置为你刚刚创建的\
    \ `BRBlueButton`。我们不需要向这些新类添加任何代码，因为创建它们仅用于美化目的。\n\n回到你的故事板中的生日详情视图控制器场景，在文档大纲窗格中选择每个按钮。使用标识检查器，将前四个按钮的自定义类更改为\
    \ `BRBlueButton`，将最后一个（删除）按钮更改为 `BRRedButton`（参见 图 9-31）。\n\n![Image](img/9781430243748_Fig09-31.jpg)\n\
    \n**图 9-31.** 在标识检查器中选择按钮子类\n\n打开 `BRStyleSheet.m`，在导入 `BRBlueButton.h` 和 `BRRedButton.h`\
    \ 之后，将以下代码添加到 `initStyles` 方法的末尾：\n\n```\n     //按钮\n    [[BRBlueButton appearance]\
    \ setBackgroundImage:[UIImage imageNamed:@\"button-blue.png\"]\nforState:UIControlStateNormal];\n\
    \    [[BRBlueButton appearance] setTitleColor:kLargeButtonTextColour\nforState:UIControlStateNormal];\n\
    \    [[BRBlueButton appearance] setFont:kFontLarge];\n\n    [[BRRedButton appearance]\
    \ setBackgroundImage:[UIImage imageNamed:@\"button-red.png\"]\nforState:UIControlStateNormal];\n\
    \    [[BRRedButton appearance] setTitleColor:kLargeButtonTextColour\nforState:UIControlStateNormal];\n\
    \    [[BRRedButton appearance] setFont:kFontLarge];\n```\n\n构建并运行。神奇吧！我们现在有了诱人的蓝色和红色按钮，并且有了一种非常简单的方法可以在我们应用的任何其他视图中创建新的蓝色或红色按钮（参见\
    \ 图 9-32）！\n\n![Image](img/9781430243748_Fig09-32.jpg)\n\n**图 9-32.** 诱人的蓝色和红色按钮！\n\
    \n在样式代码中，注意到我们只对蓝色按钮应用了标题颜色，但它仍然被红色按钮样式继承了吗？子类也会从其父类继承外观样式。\n\n你可能注意到或没注意到最后一个样式小问题：主屏幕上的表格视图有白色背景。当表格视图在其可滚动内容区域的顶部和底部弹动时，你会注意到这一点。我们可以修复这个问题，并通过在\
    \ `initStyles` 方法中添加以下代码，使所有表格视图的表格视图背景颜色变为透明：\n\n```\n    //表格视图\n    [[UITableView\
    \ appearance] setBackgroundColor:[UIColor clearColor]];\n    [[UITableViewCell\
    \ appearance] setSelectionStyle:UITableViewCellSelectionStyleNone];\n    [[UITableView\
    \ appearance] setSeparatorStyle:UITableViewCellSeparatorStyleNone];\n```\n\n我还顺便添加了几行代码，以确保在我们的表格视图单元格中永远不会看到\
    \ Apple 的默认蓝色选中样式或线条分隔符样式，因为这与 *Birthday Reminder* 的设计不协调。\n\n### 总结\n\n第 3 天到此结束。恭喜！我们的\
    \ iPhone 应用现在已初具雏形，看起来像最初的 Photoshop 设计稿了。我想蛋糕设计本身就很诱人吧！\n\n今天下午我们学到了很多关于如何美化和设计\
    \ iPhone 应用样式的知识。*Birthday Reminder* 看起来不再像一个 Apple 示例测试项目，而是一个很酷的应用。它的核心功能也已启动并运行。今天上午我们掌握了\
    \ Core Data 的基础知识，现在我们可以添加、编辑和保存生日或任何其他类型的数据实体了。\n\n明天上午，我们将开始探索如何通过从用户的 iPhone\
    \ 通讯录和 Facebook 批量导入生日来填充我们的应用。我们还将学习如何在应用未运行时安排本地通知。\n\n明早见，精神饱满！\n\n![Image](img/ch.jpg)\n\
    \n## 第 4 天\n\n## 从通讯录和 Facebook 导入生日\n\n![Image](img/ch.jpg)\n\n## 第 10 章\n"
- fmt: '# Importing Birthdays from the Address Book


    We''ve passed the halfway mark in our project. It''s [Day 4](#Part04.html#p4)
    and most of the hard work is now behind us. Today we''ll focus on importing friends
    and family birthdays into *Birthday Reminder*. We''ll make this process super
    easy for our users. In just a few taps, they will have an app full of birthdays.


    With any app that you build, designing your user experience to be simple and easy
    to use is essential. We want to avoid putting our users through the laborious
    process of manually entering every friend''s birthday into the app. They will
    quickly get very bored! Apple''s Phone Contacts app, a.k.a. the Address Book,
    includes an array of fields for each contact in addition to telephone number,
    e-mail, and so forth. One of those permits iPhone users to enter a birthday for
    each contact, as shown in [Figure 10-1](#Chapter10.html#fig_10_1).


    ![Image](images/9781430243748_Fig10-01.jpg)


    **Figure 10-1.** Apple''s Phone Contacts app: assigning a birthday to a contact


    Assigning birthdays to contacts is perhaps the sort of process that some of our
    users will go through and others won''t. So importing directly from the Address
    Book into *Birthday Reminder* is a feature that only a selection of our users
    will use.


    As developers, we''ll need to test that this feature works OK, so at this stage
    I suggest you add a few birthdays to your iPhone contacts.


    ## Enhancing the home view for an empty database


    It''s time to say au revoir to our celebrities. We won''t be prepopulating our
    release app with a random list of celebs, so let''s kick off by removing that
    test functionality from our app.


    Open the `BRHomeViewController.m` source file and delete the entire `initWithCoder:`
    method. Now delete *Birthday Reminder* from the simulator and your iPhone if you''ve
    previously installed it to your device. Build and run. Your app should look just
    like [Figure 10-2](#Chapter10.html#fig_10_2). An app screen empty of birthdays
    when *Birthday Reminder* is first launched is not the most inviting launch screen
    for new users.


    ![Image](images/9781430243748_Fig10-02.jpg)


    **Figure 10-2.** The Home view with an empty database of birthdays


    When our users first launch *Birthday Reminder* and start with an empty database,
    we want to invite and encourage them to either add or import some birthdays to
    get started. Do you remember those nice-looking big blue buttons we skinned yesterday
    in the Birthday Detail view? I think we should add a couple of those to the center
    of our empty home screen to invite the user to import birthdays from the Address
    Book and Facebook.


    To do this, we''re going to add a subview to our Home view. A subview that displays
    the text Import Birthdays from… with two big blue buttons, one for importing from
    the Address Book, and one for importing from Facebook.


    Before we start work on modifying our storyboard layout, import a couple more
    image assets into the `resources/images` group in your Xcode project: `icon-addressbook.png`
    and `icon-addressbook@2x.png`.


    Open your storyboard in Xcode and focus on the Home view controller scene. Ensure
    the document outline pane is open and then drag a new view instance from the objects
    library right onto the main home screen view in the document outline pane, as
    highlighted in [Figure 10-3](#Chapter10.html#fig_10_3).


    ![Image](images/9781430243748_Fig10-03.jpg)


    **Figure 10-3.** Drag and dropping a subview into the Home view


    Your new subview should not be a subview of the table view. It should be a subview
    of the main Home view. It''s a little fiddly, but if your subview ended up in
    the wrong location, then you can relocate it using the document outline pane.
    Also, move the new subview below the table view in the document outline pane,
    this will place it in front of the table view and will make it easier for you
    to work with it.


    Keeping your new subview selected, use the size inspector to position, and size
    the subview (x=0, y=0, width=320, and height=372). We''ll also make the background
    of the subview transparent using the attributes inspector. Open the Background
    drop-down menu and select Clear Color from the default list of Apple colors (see
    [Figure 10-4](#Chapter10.html#fig_10_4)).


    ![Image](images/9781430243748_Fig10-04.jpg)


    **Figure 10-4.** Making a view transparent using Apple''s Clear color


    Next, add one label and two buttons to your subview, and set the position, size,
    and additional attribute values as listed:


    *   Label (`UILabel`): x=14, y=92, width=293, height=21, text aligned: center,
    font system: 17, text: **Import Birthdays from....**

    *   Button1 (`UIButton`): change the text to **Address Book** and then position
    and size (x=7, y=127, width=307, height=60). Set the `Image` property to `icon-addressbook.png`.
    Using the identity inspector, change the custom class of the button to `BRBlueButton`
    just as we did yesterday.

    *   Button2 (`UIButton`): change the text to **Facebook** and then position and
    size (x=7, y=202, width=307, height=60). Set the `Image` property to `icon-facebook.png`.
    Using the identity inspector, change the custom class of the button to `BRBlueButton`.


    Build and run (see [Figure 10-5](#Chapter10.html#fig_10_5)).


    ![Image](images/9781430243748_Fig10-05.jpg)


    **Figure 10-5.** Creating big blue buttons was a piece of cake thanks to yesterday''s
    style sheet class.'
