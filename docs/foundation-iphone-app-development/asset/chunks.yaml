  raw: '`- (IBAction)didClickDoneButton:(id)sender {`

    **`    [[BRDModel sharedInstance] updateCachedBirthdays];`**

    `    [self dismissViewControllerAnimated:YES completion:nil];`

    `}`


    The logic of calling `updateCachedBirthdays` when Done is tapped on the setting
    screen is that if a user changes their time of day or number of advance days for
    birthday notifications, then those changes are applied to the schedule reminders
    as soon as they dismiss the main settings screen.


    Open `BRBirthdayEditViewController.m` and make the following modification to the
    `saveAndDismiss:` method:


    `- (IBAction)saveAndDismiss:(id)sender`

    `{`

    `    [[BRDModel sharedInstance] saveChanges];`

    **`[[BRDModel sharedInstance] updateCachedBirthdays];`**

    `    [super saveAndDismiss:sender];`

    `}`


    #### Resetting the icon badge


    On your device, you should be able to test the notification reminders by populating
    a few birthdays either manually or by importing from Facebook or the Address Book.
    If the next friend’s birthday is tomorrow, for example, then set the Days Before
    setting to one day before, and then change the alert time to 5 to 10 minutes from
    now. If all is well, after your first test birthday reminder notification fires,
    you’ll also see an unread badge count of 1 on your *Birthday Reminder* app icon,
    as shown in [Figure 12-11](#Chapter12.html#fig_12_11).


    ![Image](images/9781430243748_Fig12-11.jpg)


    **Figure 12-11.** A badge on the home screen icon


    The only problem is that the badge won’t go away, even when you enter the *Birthday
    Reminder* app. This is easily solvable. Open `BRAppDelegate.m` and tweak the `applicationDidBecomeActive:`
    implementation to the following:


    `- (void)applicationDidBecomeActive:(UIApplication *)application`

    `{`

    **`//reset the application badge count`**

    **`    [[UIApplication sharedApplication] setApplicationIconBadgeNumber:0];`**

    `    [[BRDModel sharedInstance] updateCachedBirthdays];`

    `}`


    Now, whenever the app launches, the badge on the home screen should get reset.
    Job done!


    ### Summary


    Congratulations! You have built your first iPhone App! It’s only the end of Day
    4 and already we have a fully working *Birthday Reminder* app.  In this chapter,
    we discovered how to schedule local notification alerts in iOS that display even
    when our app isn’t running. From a user’s perspective, the local notifications
    look and function identically to push notifications.


    We also created an in-app settings screen that enables our users to control when
    they get their birthday reminder notifications.


    But hold on, isn’t this book meant to be about how to build an iPhone app in five
    days, not four?! That’s correct, Daniel-san. Although we’ve built an app, our
    job as iPhone developers does not stop there. If we are to stand any chance whatsoever
    of being found in the App Store’s hundreds of thousands of iPhone apps, we are
    going to have to consider our marketing approach very carefully.


    Tomorrow we’ll primarily focus on how to market our new iPhone app using in-app
    marketing by empowering our *Birthday Reminder* users to spread the word about
    our app through social networking. We’ll also encourage good App Store reviews
    and ratings directly from our app. This is going to require additional work on
    our iPhone app before we submit it to Apple. We’re also going to learn about the
    iTunes Connect submission process and how to ensure our app stands the best possible
    chance of App Store discovery!


    Until tomorrow my friend. I bid you, *adieu*.


    ![Image](images/ch.jpg)


    ## **Day 5**


    ## **The Finishing Touches**


    ![Image](images/ch.jpg)


    ## **Chapter 13**


    ## **Before You Launch: Increasing Your Chances of App Store Success**


    Congratulations, you’ve made it to Day 5! In fact, you made it to Day 5 and you’ve
    already built a complete iPhone app.


    But the work isn’t over yet. If, like many other app developers, you make the
    mistake of thinking that once you’ve built a good app, submitted it to the App
    Store, and now you just need to sit back and watch the money roll in—then, oh
    boy, you’ve failed before you’ve even started.


    Your app will be a small fish in the App Store ocean. No matter how great your
    app may be, if people can’t discover it, then you are destined for a very depressing
    journey ahead! It’s not nearly enough to make a great product, you have to spend
    even more time marketing that product. This is not a unique concept to the App
    Store, but it’s certainly prevalent in Apple’s ecosystem.


    What can we add to *Birthday Reminder* to take advantage of the millions of potential
    users of our app? The answer is in-app marketing: encouraging and enabling existing
    users to spread the word about what a great app discovery they’ve made.


    In a world where communication is powered by the Internet and social networking
    is king, we’d be fools not to take advantage of Twitter and Facebook integration
    at minimum to enable our users to share details of *Birthday Reminder* with their
    friends and followers.


    In [Chapter 11](#Chapter11.html#ch11) yesterday, we learned how to deeply integrate
    Facebook into our app. There’s plenty more that we can do with the powerful Graph
    API when it comes to sharing. When Chris and I built *Tap to Chat*, an Instant
    Messenger app for Facebook Chat and Google Talk, we managed to total up over a
    million downloads in our first year. One of the reasons for the success of *Tap
    to Chat* (apart from it being an awesome app!) was that we built a custom sharing
    component into the app that enabled users to post to multiple Friend Walls very,
    very easily. With a lot of users sharing details of our app directly to Friend
    Walls, friends of friends were discovering our app and our audience grew very
    rapidly as a result. This type of in-app marketing can be very powerful if your
    target audience is power-Facebook users: ours was.'
  trans: "\n`- (IBAction)didClickDoneButton:(id)sender {`\n```\n    [[BRDModel sharedInstance]\
    \ updateCachedBirthdays];\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\n在设置界面点击“完成”时调用`updateCachedBirthdays`的逻辑是：如果用户更改了生日通知的提醒时间或提前天数，那么这些更改会在他们关闭主设置界面后立即应用到日程提醒中。\n\
    \n打开`BRBirthdayEditViewController.m`，对`saveAndDismiss:`方法进行如下修改：\n\n`- (IBAction)saveAndDismiss:(id)sender`\n\
    `{`\n`    [[BRDModel sharedInstance] saveChanges];`\n```\n    [[BRDModel sharedInstance]\
    \ updateCachedBirthdays];\n```\n`    [super saveAndDismiss:sender];`\n`}`\n\n\
    ### 重置应用角标\n\n在你的设备上，你可以通过手动添加或从 Facebook、通讯录导入几个生日来测试通知提醒。例如，如果下一个朋友的生日是明天，那么将“提前天数”设置为\
    \ 1 天，并将提醒时间设置为从现在起 5 到 10 分钟后。如果一切正常，在第一个测试生日提醒通知触发后，你会看到*生日提醒*应用图标上显示一个未读角标数字\
    \ 1，如图 12-11 所示。\n\n![图片](img/9781430243748_Fig12-11.jpg)\n\n**图 12-11.** 主屏幕图标上的角标\n\
    \n唯一的问题是，即使你进入*生日提醒*应用，角标也不会消失。这个问题很容易解决。打开`BRAppDelegate.m`，将`applicationDidBecomeActive:`的实现修改为以下内容：\n\
    \n`- (void)applicationDidBecomeActive:(UIApplication *)application`\n`{`\n```\n\
    \    //重置应用角标计数\n    [[UIApplication sharedApplication] setApplicationIconBadgeNumber:0];\n\
    \    [[BRDModel sharedInstance] updateCachedBirthdays];\n}\n```\n\n现在，每当应用启动时，主屏幕上的角标就会被重置。搞定！\n\
    \n### 总结\n\n恭喜！你已经构建了你的第一个 iPhone 应用！虽然才到第四天结束，但我们已经拥有一个功能完备的*生日提醒*应用了。在本章中，我们学习了如何在\
    \ iOS 中安排本地通知提醒，即使应用未运行也能显示。从用户角度来看，本地通知在外观和功能上都与推送通知完全相同。\n\n我们还创建了一个应用内设置界面，让用户能够控制何时接收生日提醒通知。\n\
    \n但是等等，这本书不是教你如何在五天内（而不是四天！）构建一个 iPhone 应用吗？没错，Daniel 同学。虽然我们已经构建了一个应用，但作为 iPhone\
    \ 开发者的工作并未就此结束。如果我们想在 App Store 数十万款 iPhone 应用中被用户发现，就必须非常认真地考虑市场推广策略。\n\n明天我们将专注于如何通过应用内营销来推广我们的新\
    \ iPhone 应用，赋予*生日提醒*用户通过社交网络传播我们应用的能力。我们还会直接在应用内鼓励用户提供良好的 App Store 评价和评分。这需要我们在向苹果提交应用之前进行额外的工作。我们还将学习\
    \ iTunes Connect 的提交流程，以及如何确保我们的应用在 App Store 中有最大的被发现机会！\n\n明天见，我的朋友。在此与你道别，*再会*。\n\
    \n![图片](img/ch.jpg)\n\n# 第五天\n\n# 最终润色\n\n![图片](img/ch.jpg)\n\n# 第 13 章\n\n# 发布前：提高在\
    \ App Store 成功的机会\n\n恭喜，你已经坚持到了第五天！事实上，你不仅坚持到了第五天，而且还已经构建了一个完整的 iPhone 应用。\n\n\
    但工作尚未结束。如果你像许多其他应用开发者一样，错误地认为一旦构建了一个好应用、提交到 App Store 后，就可以坐等收钱——那么，哦，孩子，你还没开始就已经失败了。\n\
    \n你的应用只是 App Store 海洋中的一条小鱼。无论你的应用有多出色，如果人们无法发现它，那么前方的旅程注定令人沮丧！仅仅做出优秀的产品远远不够，你还需要花更多时间进行市场营销。这在\
    \ App Store 并非独特的概念，但在苹果生态系统中确实普遍存在。\n\n我们可以在*生日提醒*中添加什么，来利用数百万潜在用户？答案是应用内营销：鼓励并让现有用户传播他们发现了一款出色应用的消息。\n\
    \n在一个由互联网驱动通信、社交网络为王的世界里，如果我们不至少利用 Twitter 和 Facebook 集成来让用户与朋友和关注者分享*生日提醒*的详细信息，那我们就太傻了。\n\
    \n在昨天的第 11 章中，我们学习了如何将 Facebook 深度集成到应用中。在分享方面，我们还可以利用强大的 Graph API 做更多事情。当 Chris\
    \ 和我构建*Tap to Chat*（一款用于 Facebook Chat 和 Google Talk 的即时通讯应用）时，我们在第一年就实现了超过一百万次下载。*Tap\
    \ to Chat*成功的原因之一（除了它本身就是一款出色的应用！）是我们在应用中构建了一个自定义分享组件，使用户能够非常、非常轻松地发布到多个好友墙。由于大量用户直接将应用详情分享到好友墙，朋友的朋友发现了我们的应用，我们的用户群因此迅速增长。如果你的目标用户是重度\
    \ Facebook 使用者，这种应用内营销可以非常强大：而我们的用户正是如此。"
- fmt: "### Getting more 5-star App Store ratings\n\nBack in [Chapter 1](#Chapter01.html#ch1),\
    \ I also talked about the importance of getting good App Store reviews. The more\
    \ 5-stars you can get for your app, the better (see [Figure 13-1](#Chapter13.html#fig_13_1)).\n\
    \n![Image](images/9781430243748_Fig13-01.jpg)\n\n**Figure 13-1.** The official\
    \ version of *Birthday Reminder* in the US App Store\n\nBrowsing App Store users\
    \ are more likely to download an app with a lot of good reviews and star ratings\
    \ than an app with a lot of 1-star ratings and poor reviews. That’s just common\
    \ sense.\n\nHowever, there are a lot of App Store facts that you need to be aware\
    \ of. Every country has its own App Store. The App Store version that a user browses\
    \ is directly related to his Apple account: if a user has registered an Apple\
    \ account in the United States, then he will browse the US App Store by default.\
    \ If a user’s Apple ID is registered in the UK, then she’ll browse the UK App\
    \ Store. This means that all of the reviews, ratings, and chart positions are\
    \ all country-specific. Your app may do brilliantly in the UK, but the exact same\
    \ app is invisible in the United States if you have few US downloads (yep, that’s\
    \ happened to me!). On that point, it’s also worth noting that typically an app\
    \ that rises to the top of its category in the UK, France, Germany, and so forth,\
    \ is making a great deal less money than an app that rises to the top of the US\
    \ chart. US iOS users spend more money on paid apps than any other country. That\
    \ doesn’t mean you should target only US users; your target market is going to\
    \ depend on the type of app that you build.\n\nOne thing is for certain though:\
    \ if your app is getting downloads, you need to ensure that your happy users rate\
    \ and review your app. In order for a user to rate and review your app, they need\
    \ to either (a) love (or hate) your app enough to make the effort, and then (b)\
    \ have to visit the App Store to search and find your app before reviewing it.\
    \ So why not make their job a little easier by encouraging users to rate your\
    \ app after they’ve used it for a number of days—presumably a number of enjoyable\
    \ days! There’s a great open-source Objective-C class for iOS apps called `Appirater`\
    \ that will do just that. You can download `Appirater` from GitHub at [`https://github.com/arashpayan/appirater`](https://github.com/arashpayan/appirater).\n\
    \nUp until now, we haven’t used any third-party code or libraries, but with a\
    \ tried-and-tested method to encourage users to rate iOS apps, I see no reason\
    \ to reinvent the wheel for our project.\n\nCreate a new folder named `support`\
    \ at the root level of your project in the Finder. Add a subfolder named `Appirater`\
    \ and then copy across the files that you’ve just downloaded from GitHub, as shown\
    \ in [Figure 13-2](#Chapter13.html#fig_13_2). It’s quite possible that `Appirater`\
    \ will have changed since I wrote this chapter, so I’ve also included the version\
    \ I worked with in the source code.\n\n![Image](images/9781430243748_Fig13-02.jpg)\n\
    \n**Figure 13-2.** Adding `Appirater`, keeping third-party code separate in a\
    \ `support` folder\n\nNow add the `support` folder and its contents to your *Birthday\
    \ Reminder* project. At this point, you will probably find that your project will\
    \ no longer compile and you now have compiler errors. This is because our app\
    \ uses ARC (Automatic Reference Counting) and `Appirater` does not. Do not panic\
    \ young Daniel-san. Luckily, Apple had the foresight to realize that there would\
    \ be times when ARC-compatible projects might also need to include non-ARC-compatible\
    \ classes. Here’s how to get rid of those compiler errors. Select your *BirthdayReminder*\
    \ project and then `BirthdayReminder` target. Select the Build Phases tab and\
    \ open the Compile Sources section. We are going to add a Compiler Flag for the\
    \ problem file, `Appirater.m`, which should be listed at the end of the Compile\
    \ Sources list. Double-click the class file and type in the `fno-objc-arc` compiler\
    \ flag, as shown in [Figure 13-3](#Chapter13.html#fig_13_3).\n\n![Image](images/9781430243748_Fig13-03.jpg)\n\
    \n**Figure 13-3.** Integrating non-ARC files into an ARC project\n\nThat should\
    \ solve the ARC-related errors and generate some new ones. Hurray! The new errors\
    \ relate to missing frameworks that `Appirater` is also dependent on. We need\
    \ to add Apple’s `CFNetwork` and `SystemConfiguration` frameworks to our project.\
    \ Do you remember how to do that? Stay in the Build Phases tab of your target’s\
    \ project settings and open the Link Binary Files with Libraries pane. Tap the\
    \ + button to add `CFNetwork.framework` and `SystemConfiguration.framework`, as\
    \ shown in [Figure 13-4](#Chapter13.html#fig_13_4).\n\n![Image](images/9781430243748_Fig13-04.jpg)\n\
    \n**Figure 13-4.** Adding `CFNetwork.framework` and `SystemConfiguration.framework`\
    \ to our project\n\nYou should now be able to build and run your app without problems.\n\
    \nFollowing `Appirater`’s *Getting Started* instructions in the README file, we\
    \ next need to open `BRAppDelegate.m` and import `Appirater.h`. Then locate the\
    \ `application:didFinishLaunchingWithOptions:` method and modify it to let `Appirater`\
    \ know the app has launched:\n\n```\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    [BRStyleSheet\
    \ initStyles];\n    [Appirater appLaunched:YES];\n    return YES;\n}\n```\n\n\
    Now add the following modification to the delegate’s `applicationWillEnterForeground:`\
    \ method:\n\n```\n- (void)applicationWillEnterForeground:(UIApplication *)application\n\
    {\n    [Appirater appEnteredForeground:YES];\n}\n```"
