- fmt: "#### Responding to user interaction\n\nBefore the dealer can go, we need to\
    \ write the code for the `Hit` and `Stand` button action methods. `Stand` is pretty\
    \ straightforward:\n\n```\n- (IBAction)didTapStandButton:(id)sender {\n    self.gameModel.gameStage\
    \ = BJGameStageDealer;\n    [self playDealerTurn];\n}\n```\n\nThe controller tells\
    \ the model that the game stage has progressed to the dealer’s turn and we’ll\
    \ then call `playDealerTurn()`.\n\nThere’s a bit more to the `Hit` method:\n\n\
    ```\n- (IBAction)didTapHitButton:(id)sender {\n    BJDCard *card = [self.gameModel\
    \ nextPlayerCard];\n    card.isFaceUp = YES;\n    [self renderCards];\n\n    [self.gameModel\
    \ updateGameStage];\n    if (self.gameModel.gameStage == BJGameStageDealer) {\n\
    \        [self playDealerTurn];\n    }\n}\n```\n\nFirst, the controller asks the\
    \ model to deal another player card. The controller renders the card face-up in\
    \ the view. Now the controller tells the model to update the game stage; that\
    \ is, the game may now be over because the player has gone bust or reached the\
    \ maximum five-card limit. `BJViewController` checks to see if the player’s turn\
    \ is over and if so, plays the automated dealer methods:\n\n```\nif (self.gameModel.gameStage\
    \ == BJGameStageDealer) {\n    [self playDealerTurn];\n}\n```\n\nAwesome. You\
    \ can now play an entire game of blackjack! Build and run to give it a go.\n\n\
    Oops, did your app crash at the end of the game? What did we miss?\n\nAh yes,\
    \ we never got round to implementing the `handleNotificationGameDidEnd:` method\
    \ in `BJViewController`. Do you remember the notification we subscribed to in\
    \ the designated initializer of this class? We need to add that method! Here’s\
    \ the code:\n\n```\n-(void) handleNotificationGameDidEnd:(NSNotification *)notification\n\
    {\n    NSDictionary *userInfo = notification.userInfo;\n\n    NSNumber *num =\
    \ userInfo[@\"didDealerWin\"];\n\n    NSString *message = [num boolValue] ? @\"\
    Dealer won!\" : @\"You won!\";\n\n    UIAlertView *alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"Game Over\" message:message\n    delegate:nil cancelButtonTitle:nil\
    \ otherButtonTitles:@\"Play Again\", nil];\n    [alert show];\n}\n```\n\nIn our\
    \ notification handler, we’re able to extract the winner via the `userInfo` property.\
    \ We’re expecting a dictionary with an `NSNumber` property that’s wrapping a Boolean\
    \ primitive. So we also have to extract the primitive Boolean to check if the\
    \ dealer won or not:\n\n```\nNSString *message = [num boolValue] ? @\"Dealer won!\"\
    \ : @\"You won!\";\n```\n\nWe end up with a winning message that we then display\
    \ in an alert view (see [Figure 4-19](#Chapter04.html#fig_4_19)).\n\n![Image](images/9781430243748_Fig04-19.jpg)\n\
    \n**Figure 4-19.** Yay! It only took me five build and run attempts to get a winning\
    \ screenshot!\n\n#### Protocols and the delegate pattern\n\nBut we’re not quite\
    \ done yet. Our app is no longer crashing, but as soon as we dismiss the alert,\
    \ our game is over. The buttons are disabled and we have no way to play again.\
    \ That’s no good! What we’ll do is change our OK button to read Play Again, and\
    \ then restart the game as soon as the button is pressed.\n\nHow do we know when\
    \ the button is pressed? The `UIAlertView` class does not expose its button properties,\
    \ so we can’t tap into the target-action mechanism in this instance. Instead,\
    \ like many of Apple’s iOS SDK components, `UIAlertView` subscribes to the delegate\
    \ pattern.\n\n`UIAlertView` has a weak reference property called a **delegate**.\
    \ `UIAlertView` doesn’t care which object wishes to be its delegate as long as\
    \ the object implements the `UIAlertViewDelegate` protocol. A **protocol** is\
    \ similar to a class interface: it defines a set of method signatures that the\
    \ protocol will implement. However, a protocol can also define *optional* method\
    \ signatures. In order for `BJViewController` to set itself as the delegate of\
    \ the alert view, it first needs to declare that it implements the `UIAlertViewDelegate`\
    \ protocol. To do this, we switch momentarily to the header file of `BJViewController`.\n\
    \nChange the first line of the interface declaration from\n\n`@interface BJViewController\
    \ : UIViewController`\n\nto\n\n`@interface BJViewController : UIViewController\
    \ <UIAlertViewDelegate>`\n\nIf you check out the header file of `UIAlertViewDelegate`,\
    \ you’ll discover that all the methods of the `UIAlertViewDelegate` are optional.\
    \ So the compiler won’t generate any warnings about our code, even though we haven’t\
    \ added any `UIAlertViewDelegate` protocol methods yet.\n\n**Note:** When a class\
    \ declares that it implements a protocol that includes mandatory methods, the\
    \ compiler will display a warning if your class doesn’t actually implement those\
    \ methods.\n\nNow back to the source file for `BJViewController`. We need to make\
    \ a small change to the code that displays the alert in the `handleNotificationGameDidEnd:`\
    \ method:\n\n```\nUIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    Game Over\" message:message\n    delegate:self cancelButtonTitle:nil otherButtonTitles:@\"\
    Play Again\", nil];\n[alert show]\n```\n\nNotice how we’ve now set ourselves as\
    \ the delegate of the alert view?\n\nFinally, we’re going to add one of the `UIAlertViewDelegate`\
    \ methods to our implementation of `BJViewController`:\n\n```\n- (void)alertView:(UIAlertView\
    \ *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    [self restartGame];\n\
    }\n```\n\n**Tip:** When adding delegate methods, a quick way to implement the\
    \ method code is to copy it directly from the Organizer’s documentation and paste\
    \ it into your class.\n\nThat’s it, we’re done! You should find that you can now\
    \ build and run the game—and play blackjack again and again and again.\n\n###\
    \ Summary\n\nThat was an epic journey! We touched on many parts of Objective-C\
    \ in this chapter. I’m sure that some of them are still quite confusing. However,\
    \ that’s the reason you’ll read the rest of this book: the syntax declaration\
    \ and implementation for Objective-C methods, properties, instance variables,\
    \ protocols, selectors, Interface Builder outlets, actions, and so on, will become\
    \ more and more familiar as we progress with the *Birthday Reminder* app.\n\n\
    You’ve reached the end of Day 1! Tomorrow we’ll return to our main project, *Birthday\
    \ Reminder*. If you feel that we’ve covered a lot of code and you’re a little\
    \ lost, do not worry, we’re going to spend the whole day tomorrow on [Chapters\
    \ 5](#Chapter05.html#ch5) and [6](#Chapter06.html#ch6), storyboarding the user\
    \ interface of our app. There will be coding, but without the level of information\
    \ overload you’ve experienced in this chapter.\n\n![Image](images/ch.jpg)\n\n\
    ## Day 2\n\n## Storyboarding the User Interface\n\n![Image](images/ch.jpg)\n\n\
    ## Chapter 5\n\n## iPhone App Navigation, Views, and View Controllers\n\nIt’s\
    \ Day 2 and the sun is shining (well, it is here in Brighton anyway!). We’re back\
    \ with our main *Birthday Reminder* project. Throughout today, we’ll spend 100\
    \ percent of our time working on the user interface of our app.\n\nThis morning\
    \ (this chapter), we’ll explore the relationship between views and view controllers,\
    \ as well as how to storyboard our app’s navigation: pushing, popping, presenting,\
    \ and dismissing view controllers on and off the navigation stack.\n\nThis afternoon\
    \ ([Chapter 6](#Chapter06.html#ch6)), we’ll have fun with views and user interface\
    \ controls, implementing and handling interactivity in some of the main screens\
    \ of the *Birthday Reminder* app. We’ll complete the day by spending some time\
    \ integrating the iPhone’s Photo Library and camera directly into our project."
