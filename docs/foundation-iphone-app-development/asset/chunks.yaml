- fmt: "### Enumerators\n\nApple uses a lot of enumerators in Cocoa Touch and iOS\
    \ SDK. We’ve already encountered the device orientation enumerator `UIInterfaceOrientation`,\
    \ where we’re only supporting the orientation enumerator value `UIInterfaceOrientationPortrait`\
    \ in our app.\n\nIt’s easy enough to create our own custom enumerators. We’re\
    \ going to do that now in `BJDCard.h`.\n\n```\ntypedef enum : int\n{\n    BJCardSuitClub\
    \ = 0,\n    BJCardSuitSpade,\n    BJCardSuitDiamond,\n    BJCardSuitHeart\n} BJCardSuit;\n\
    ```\n\nType this code into the header file of your `BJDCard` class, *before* the\
    \ interface declaration. Our custom enumerator is a new Objective-C type we’re\
    \ defining as `BJCardSuit`. By defining the suit in the header file outside of\
    \ the interface declaration, we’re making this enumerator available for other\
    \ classes to use. `BJDCard` is really just a value object, so we should enable\
    \ external classes to change the suit of our card. We’re stating that each element\
    \ of the enumerator should be an integer and that the first `enum` value listed\
    \ (`BJCardSuitClub`) is equal to zero. `BJCardSuitSpade` is equal to 1, `BJCardSuitDiamond`\
    \ is equal to 2, and so on.\n\nNow that we’ve defined the custom suit enumerator,\
    \ we can create a new property of `BJDCard` called `suit`, as follows:\n\n`@property\
    \ (nonatomic) BJCardSuit suit;`\n\nYou should end up with the changes to `BJDCard`,\
    \ as illustrated in [Figure 4-13](#Chapter04.html#fig_4_13).\n\n![Image](images/9781430243748_Fig04-13.jpg)\n\
    \n**Figure 4-13.** BJDCard with the new suit enumerator property\n\n### Methods\n\
    \nLet’s add a few public methods to `BJDCard`. Similar to public properties, if\
    \ we wish to add public methods to a class, then we first declare the method signature\
    \ in the public interface of the class in the header file. So, within the interface\
    \ declaration of `BJDCard.h`, add the following three method signatures:\n\n`-(BOOL)\
    \ isAnAce;`\n`-(BOOL) isAFaceOrTenCard;`\n`-(UIImage *)getCardImage;`\n\nWe have\
    \ added three instance method signatures to our class. Within our application,\
    \ whenever an instance of `BJDCard` exists, the app assumes that it is possible\
    \ for any of these three methods to be called on the instance. We haven’t actually\
    \ defined the implementation of any of these methods, but the compiler now allows\
    \ us to attempt to call these methods. In reality, this would crash our app at\
    \ runtime. The compiler also warns us that we haven’t actually implemented the\
    \ methods for which we’ve declared signatures.\n\nIt’s time to implement the first\
    \ two of these methods. In the implementation source file, add the following code:\n\
    \n```\n-(BOOL) isAnAce\n{\n    if (self.digit == 1) return YES;\n    return NO;\n\
    }\n\n-(BOOL) isAFaceOrTenCard\n{\n    if (self.digit > 9) return YES;\n    return\
    \ NO;\n}\n```\n\nAs I explained at the start of this chapter, in blackjack, aces\
    \ and face cards have a different points value, so we’re creating a couple of\
    \ useful methods that will be used by the game model logic to determine whether\
    \ instances of `BJDCard` are aces or face cards. The `digit` property of `BJDCard`\
    \ instances is a value between 1 and 13: 1 being an ace, 11 a jack, 12 a queen,\
    \ and 13 a king.\n\nThese methods check the value of the `digit` property and\
    \ then return a Boolean value, which in Objective-C is defined as `YES` (true)\
    \ or `NO` (false).\n\nThe methods of `BJDCard` don’t implement any parameters,\
    \ but now is a good time for us to familiarize ourselves with the syntax of a\
    \ method declaration in Objective-C. Here’s a diagram from Apple’s own documentation:\n\
    \n![Image](images/9781430243748_Fig04-14.jpg)\n\n**Figure 4-14.** Objective-C\
    \ method declaration syntax\n\nMethod declarations in Objective-C are fairly verbose\
    \ to say the least! Each parameter has a *method signature keyword* and a *parameter\
    \ name* (see [Figure 4-14](#Chapter04.html#fig_4_14)). Note that the actual reference\
    \ to each parameter is defined after the parameter type. So if you were implementing\
    \ Apple’s method in the preceding example, the `anObject` and `index` keywords\
    \ would be the names of the incoming parameters.\n\nWe’ll be revisiting method\
    \ syntax throughout this book, so don’t worry too much if this example has totally\
    \ thrown you!\n\nLet’s implement our third `BJDCard` method, `getCardImage`. This\
    \ method is called by our view controller every time it wants to render a card\
    \ face-up on the screen. Internally, the method checks the suit of the card (thanks\
    \ to our custom enumerator `BJCardSuit`) and dynamically creates a string that\
    \ matches the file name of the correct image from the bank of retina and non-retina\
    \ PNG files that I’ve already linked into this project for you. Here’s the code:\n\
    \n```\n-(UIImage *)getCardImage\n{\n    NSString *suit;\n\n    switch (self.suit)\
    \ {\n        case BJCardSuitClub:\n            suit = @\"club\";\n           \
    \ break;\n        case BJCardSuitSpade:\n            suit = @\"spade\";\n    \
    \        break;\n        case BJCardSuitDiamond:\n            suit = @\"diamond\"\
    ;\n            break;\n        case BJCardSuitHeart:\n            suit = @\"heart\"\
    ;\n            break;\n\n        default:\n            break;\n    }\n\n    NSString\
    \ *filename = [NSString stringWithFormat:@\"%@-%d.png\", suit, self.digit];\n\n\
    \    return [UIImage imageNamed:filename];\n}\n```\n\nWe’ve used a switch statement\
    \ on the `suit` property of our `BJDCard` instance and translated that value to\
    \ populate a local string variable called `suit`. Notice how we must use the syntax\
    \ `self.suit` to refer to the property. Calling `suit` without `self` results\
    \ in a compiler error because the compiler assumes you’re trying to call an instance\
    \ variable. Remember how the compiler synthesizes our `suit` property and creates\
    \ an iVar named `_suit` for us? So we could run a switch statement on `_suit`\
    \ instead, and we’d get the same results.\n\nThe `getCardImage` method finally\
    \ generates a string with the full file name of the corresponding face-up image\
    \ for the card. We’re using a factory method of `NSString` to achieve this. In\
    \ `NSString`’s `stringWithFormat` initializer, it automatically replaces placeholder\
    \ variables in the declared format with the variables we pass in as additional\
    \ parameters. To declare a string variable in the format, use the `%@` syntax.\
    \ To declare an integer variable, use the `%d` syntax. Use `%@` when replacing\
    \ any object like `NSString`, `NSNumber`, `NSArray`, and so on. This is useful\
    \ for debugging purposes. If you need to print the contents of an array to the\
    \ debugger, for example, you can use the following code:\n\n`NSLog(@\"My arr contents:\
    \ %@\", myAppVariable);`\n\nFinally, we generate a new image instance using `UIImage`’s\
    \ factory method `imageNamed` and pass the file name of the image in our application\
    \ bundle:\n\n`[UIImage imageNamed:filename];`\n\nWe return the image instance.\n\
    \nWe’ve learned how to create a new class in Xcode that extends `NSObject`. We’ve\
    \ also learned the syntax for adding properties and methods to our class, as well\
    \ as how to reference properties and their underlying iVars. Things are heating\
    \ up. If I’m moving too fast for you, don’t panic, I’m rapidly introducing you\
    \ to code and syntax that you will get plenty of chances to revisit in our main\
    \ *Birthday Reminder* app after this chapter."
  raw: '##### Enumerators


    Apple uses a lot of enumerators in Cocoa Touch and iOS SDK. We’ve already encountered
    the device orientation enumerator `UIInterfaceOrientation`, where we’re only supporting
    the orientation enumerator value `UIInterfaceOrientationPortrait` in our app.


    It’s easy enough to create our own custom enumerators. We’re going to do that
    now in `BJDCard.h`.


    `typedef enum : int`

    `{`

    `    BJCardSuitClub = 0,`

    `    BJCardSuitSpade,`

    `    BJCardSuitDiamond,`

    `    BJCardSuitHeart`

    `}BJCardSuit;`


    Type this code into the header file of your `BJDCard` class, *before* the interface
    declaration. Our custom enumerator is a new Objective-C type we’re defining as
    `BJCardSuit`. By defining the suit in the header file outside of the interface
    declaration, we’re making this enumerator available for other classes to use.
    `BJDCard` is really just a value object, so we should enable external classes
    to change the suit of our card. We’re stating that each element of the enumerator
    should be an integer and that the first `enum` value listed (`BJCardSuitClub`)
    is equal to zero. `BJCardSuitSpade` is equal to 1, `BJCardSuitDiamond` is equal
    to 2, and so on.


    Now that we’ve defined the custom suit enumerator, we can create a new property
    of `BJDCard` called `suit`, as follows:


    `@property (nonatomic) BJCardSuit suit;`


    You should end up with the changes to `BJDCard`, as illustrated in [Figure 4-13](#Chapter04.html#fig_4_13).


    ![Image](images/9781430243748_Fig04-13.jpg)


    **Figure 4-13.** BJDCard with the new suit enumerator property


    ##### Methods


    Let’s add a few public methods to `BJDCard`. Similar to public properties, if
    we wish to add public methods to a class, then we first declare the method signature
    in the public interface of the class in the header file. So, within the interface
    declaration of `BJDCard.h`, add the following three method signatures:


    `-(BOOL) isAnAce;`

    `-(BOOL) isAFaceOrTenCard;`

    `-(UIImage *)getCardImage;`


    We have added three instance method signatures to our class. Within our application,
    whenever an instance of `BJDCard` exists, the app assumes that it is possible
    for any of these three methods to be called on the instance. We haven’t actually
    defined the implementation of any of these methods, but the compiler now allows
    us to attempt to call these methods. In reality, this would crash our app at runtime.
    The compiler also warns us that we haven’t actually implemented the methods for
    which we’ve declared signatures.


    It’s time to implement the first two of these methods. In the implementation source
    file, add the following code:


    `-(BOOL) isAnAce`

    `{`

    `    if (self.digit == 1) return YES;`

    `    return NO;`

    `}`


    `-(BOOL) isAFaceOrTenCard`

    `{`

    `    if (self.digit > 9) return YES;`

    `    return NO;`

    `}`


    As I explained at the start of this chapter, in blackjack, aces and face cards
    have a different points value, so we’re creating a couple of useful methods that
    will be used by the game model logic to determine whether instances of `BJDCard`
    are aces or face cards. The digit property of `BJDCard` instances is a value between
    1 and 13: 1 being an ace, 11 a jack, 12 a queen, and 13 a king.


    These methods check the value of the digit property and then return a Boolean
    value, which in Objective-C is defined as `YES` (true) or `NO` (false).


    The methods of `BJDCard` don’t implement any parameters, but now is a good time
    for us to familiarize ourselves with the syntax of a method declaration in Objective-C.
    Here’s a diagram from Apple’s own documentation:


    ![Image](images/9781430243748_Fig04-14.jpg)


    **Figure 4-14.** Objective-C method declaration syntax


    Method declarations in Objective-C are fairly verbose to say the least! Each parameter
    has a *method signature keyword* and a *parameter name* (see [Figure 4-14](#Chapter04.html#fig_4_14)).
    Note that the actual reference to each parameter is defined after the parameter
    type. So if you were implementing Apple’s method in the preceding example, the
    `anObject` and `index` keywords would be the names of the incoming parameters.


    We’ll be revisiting method syntax throughout this book, so don’t worry too much
    if this example has totally thrown you!


    Let’s implement our third `BJDCard` method, `getCardImage`. This method is called
    by our view controller every time it wants to render a card face-up on the screen.
    Internally, the method checks the suit of the card (thanks to our custom enumerator
    `BJCardSuit`*)* and dynamically creates a string that matches the file name of
    the correct image from the bank of retina and non-retina PNG files that I’ve already
    linked into this project for you. Here’s the code:


    `-(UIImage *)getCardImage`

    `{`

    `    NSString *suit;`


    `    switch (self.suit) {`

    `        case BJCardSuitClub:`

    `            suit = @"club";`

    `            break;`

    `        case BJCardSuitSpade:`

    `            suit = @"spade";`

    `            break;`

    `        case BJCardSuitDiamond:`

    `            suit = @"diamond";`

    `            break;`

    `        case BJCardSuitHeart:`

    `            suit = @"heart";`

    `            break;`


    `        default:`

    `            break;`

    `    }`


    `    NSString *filename = [NSString stringWithFormat:@"%@-%d.png",suit,self.digit];`


    `    return [UIImage imageNamed:filename];`


    `}`


    We’ve used a switch statement on the suit property of our `BJDCard` instance and
    translated that value to populate a local string variable called `suit`. Notice
    how we must use the syntax `self.suit` to refer to the property. Calling `suit`
    without `self` results in a compiler error because the compiler assumes you’re
    trying to call an instance variable. Remember how the compiler synthesizes our
    `suit` property and creates an iVar named `_suit` for us? So we could run a switch
    statement on `_suit` instead, and we’d get the same results.


    The `getCardImage` method finally generates a string with the full file name of
    the corresponding face-up image for the card. We’re using a factory method of
    `NSString` to achieve this. In `NSString`’s `stringWithFormat` initializer, it
    automatically replaces placeholder variables in the declared format with the variables
    we pass in as additional parameters. To declare a string variable in the format,
    use the `%@` syntax. To declare an integer variable, use the `%d` syntax. Use
    `%@` when replacing any object like `NSString`, `NSNumber`, `NSArray`, and so
    on. This is useful for debugging purposes. If you need to print the contents of
    an array to the debugger, for example, you can use the following code:


    `NSLog(@"My arr contents: %@",myAppVariable);`


    Finally, we generate a new image instance using `UIImage`’s factory method `imageNamed`
    and pass the file name of the image in our application bundle:


    `[UIImage imageNamed:filename];`


    We return the image instance.


    We’ve learned how to create a new class in Xcode that extends `NSObject`. We’ve
    also learned the syntax for adding properties and methods to our class, as well
    as how to reference properties and their underlying iVars. Things are heating
    up. If I’m moving too fast for you, don’t panic, I’m rapidly introducing you to
    code and syntax that you will get plenty of chances to revisit in our main *Birthday
    Reminder* app after this chapter.'
  trans: "\n### 枚举器\n\nApple 在 Cocoa Touch 和 iOS SDK 中使用了大量枚举器。我们已经遇到过设备方向枚举器 `UIInterfaceOrientation`，在我们的应用中只支持方向枚举值\
    \ `UIInterfaceOrientationPortrait`。\n\n创建我们自己的自定义枚举器也很简单。现在我们就在 `BJDCard.h` 中来实现。\n\
    \n```\ntypedef enum : int\n{\n    BJCardSuitClub = 0,\n    BJCardSuitSpade,\n\
    \    BJCardSuitDiamond,\n    BJCardSuitHeart\n} BJCardSuit;\n```\n\n将这段代码输入到 `BJDCard`\
    \ 类的头文件中，要放在接口声明*之前*。我们的自定义枚举器是一个我们定义为 `BJCardSuit` 的 Objective-C 新类型。通过在接口声明之外的头文件中定义花色，我们就能让其他类使用这个枚举器。`BJDCard`\
    \ 实际上只是一个值对象，因此我们应该允许外部类改变我们卡片的花色。我们声明枚举器中的每个元素都应为整数，并且列出的第一个 `enum` 值 (`BJCardSuitClub`)\
    \ 等于 0。`BJCardSuitSpade` 等于 1，`BJCardSuitDiamond` 等于 2，以此类推。\n\n现在我们已经定义了自定义的花色枚举器，可以为\
    \ `BJDCard` 创建一个名为 `suit` 的新属性，如下所示：\n\n`@property (nonatomic) BJCardSuit suit;`\n\
    \n最终你对 `BJDCard` 所做的修改应如图 4-13 所示。\n\n![Image](img/9781430243748_Fig04-13.jpg)\n\
    \n**图 4-13.** 添加了新的花色枚举器属性的 BJDCard\n\n### 方法\n\n让我们为 `BJDCard` 添加几个公开方法。与公开属性类似，如果我们想为类添加公开方法，首先要将方法签名声明在头文件的类公开接口中。因此，在\
    \ `BJDCard.h` 的接口声明中，添加以下三个方法签名：\n\n`-(BOOL) isAnAce;`\n`-(BOOL) isAFaceOrTenCard;`\n\
    `-(UIImage *)getCardImage;`\n\n我们已经为类添加了三个实例方法签名。在我们的应用中，只要存在 `BJDCard` 的实例，应用就会假定这三个方法中的任何一个都有可能在该实例上被调用。虽然我们还没有真正定义这些方法的实现，但编译器现在允许我们尝试调用这些方法。实际上，这会在运行时导致应用崩溃。编译器还会警告我们，尚未实现已声明签名的方法。\n\
    \n现在是时候实现前两个方法了。在实现源文件中，添加以下代码：\n\n```\n-(BOOL) isAnAce\n{\n    if (self.digit\
    \ == 1) return YES;\n    return NO;\n}\n\n-(BOOL) isAFaceOrTenCard\n{\n    if\
    \ (self.digit > 9) return YES;\n    return NO;\n}\n```\n\n正如我在本章开头所述，在二十一点中，A\
    \ 牌和人头牌的点数不同，因此我们创建了几个有用的方法，供游戏模型逻辑使用，以判断 `BJDCard` 的实例是否为 A 牌或人头牌。`BJDCard` 实例的\
    \ `digit` 属性是介于 1 到 13 之间的值：1 代表 A，11 代表 J，12 代表 Q，13 代表 K。\n\n这些方法会检查 `digit`\
    \ 属性的值，然后返回一个布尔值，在 Objective-C 中定义为 `YES`（真）或 `NO`（假）。\n\n`BJDCard` 的这些方法没有实现任何参数，但现在是让我们熟悉\
    \ Objective-C 中方法声明语法的最好时机。以下是 Apple 官方文档中的图示：\n\n![Image](img/9781430243748_Fig04-14.jpg)\n\
    \n**图 4-14.** Objective-C 方法声明语法\n\n至少可以说，Objective-C 中的方法声明相当冗长！每个参数都有一个*方法签名关键字*和一个*参数名称*（参见\
    \ 图 4-14）。注意，对每个参数的实际引用是在参数类型之后定义的。因此，如果你在前面的示例中实现 Apple 的方法，`anObject` 和 `index`\
    \ 关键字将是传入参数的名称。\n\n我们会在本书中反复讨论方法语法，所以如果这个示例让你完全摸不着头脑，也不必过于担心！\n\n现在来实现我们的第三个 `BJDCard`\
    \ 方法 `getCardImage`。每当视图控制器想要在屏幕上正面渲染一张牌时，就会调用这个方法。在内部，该方法会检查牌的花色（得益于我们的自定义枚举器\
    \ `BJCardSuit`），并动态生成一个字符串，该字符串与我已经为您链接到此项目中的视网膜和非视网膜 PNG 文件库中正确图片的文件名相匹配。代码如下：\n\
    \n```\n-(UIImage *)getCardImage\n{\n    NSString *suit;\n\n    switch (self.suit)\
    \ {\n        case BJCardSuitClub:\n            suit = @\"club\";\n           \
    \ break;\n        case BJCardSuitSpade:\n            suit = @\"spade\";\n    \
    \        break;\n        case BJCardSuitDiamond:\n            suit = @\"diamond\"\
    ;\n            break;\n        case BJCardSuitHeart:\n            suit = @\"heart\"\
    ;\n            break;\n\n        default:\n            break;\n    }\n\n    NSString\
    \ *filename = [NSString stringWithFormat:@\"%@-%d.png\", suit, self.digit];\n\n\
    \    return [UIImage imageNamed:filename];\n}\n```\n\n我们在 `BJDCard` 实例的 `suit`\
    \ 属性上使用了 switch 语句，并将该值转换后填入一个名为 `suit` 的局部字符串变量。注意，我们必须使用 `self.suit` 语法来引用该属性。不带\
    \ `self` 直接调用 `suit` 会导致编译器错误，因为编译器会认为你试图调用一个实例变量。还记得编译器是如何为我们合成 `suit` 属性并创建名为\
    \ `_suit` 的 iVar 的吗？因此，我们也可以对 `_suit` 执行 switch 语句，得到的结果相同。\n\n`getCardImage`\
    \ 方法最终会生成一个字符串，包含该牌对应正面图片的完整文件名。我们使用了一个 `NSString` 的工厂方法来实现这一点。在 `NSString` 的\
    \ `stringWithFormat` 初始化器中，它会自动将声明格式中的占位变量替换为我们作为额外参数传入的变量。若要声明格式中的字符串变量，请使用 `%@`\
    \ 语法。若要声明整型变量，请使用 `%d` 语法。当替换任何对象，如 `NSString`、`NSNumber`、`NSArray` 等时，请使用 `%@`。这对于调试非常有用。例如，如果需要在调试器中打印数组的内容，可以使用以下代码：\n\
    \n`NSLog(@\"My arr contents: %@\", myAppVariable);`\n\n最后，我们使用 `UIImage` 的工厂方法\
    \ `imageNamed` 生成一个新的图像实例，并传入应用包中图像的文件名：\n\n`[UIImage imageNamed:filename];`\n\
    \n我们返回这个图像实例。\n\n我们已经学习了如何在 Xcode 中创建继承自 `NSObject` 的新类。还学习了向类添加属性和方法的语法，以及如何引用属性和其底层的\
    \ iVar。事情正在升温。如果你觉得我讲得太快，别慌，我正在快速向你介绍代码和语法，在读完本章之后的主项目——*生日提醒* 应用中，你还将有很多机会重新回顾它们。\n"
- fmt: "# The game model\n\nLet’s leave `BJDCard` for the time being, but before you\
    \ do, be sure that the app compiles OK. Build and run the app. You should just\
    \ see the view layout we created at the beginning of the chapter. As long as your\
    \ version of the app doesn’t crash, you’re doing just fine!\n\nI’m afraid I cheated\
    \ a little in the preparation for this app. I have written some of the code for\
    \ you. The aim of this chapter is to introduce you to Objective-C, and if I stepped\
    \ you through every line of code for a blackjack app, this chapter might start\
    \ to resemble a book itself!\n\nLet’s add a new class to our app. I’ve already\
    \ written the majority of the new `BJDGameModel` class, so you need to add the\
    \ actual class files to your project rather than creating the file from scratch.\n\
    \nFirst select the `data` group in the Project Navigator, and using the ![Image](images/U002a.jpg)\
    \ A keyboard shortcut or File ![Image](images/U001.jpg) Add Files to “Blackjack”,\
    \ navigate to the `BJDGameModel` header and source files, multiselect them both,\
    \ and add them to your project (see [Figure 4-15](#Chapter04.html#fig_4_15)).\n\
    \n![Image](images/9781430243748_Fig04-15.jpg)\n\n**Figure 4-15.** Adding `BJDGameModel`\
    \ header and source files to the Xcode project\n\n`BJDGameModel` references `BJDCard`,\
    \ so just to check you haven’t missed anything during the development of `BJDCard`,\
    \ it would be worthwhile building and running again to ensure that your project\
    \ still compiles without error.\n\nLet’s take a look at the code I’ve provided\
    \ for you in `BJDGameModel`. Remaining in Assistant Editor layout, we can quickly\
    \ scan the public interface properties and methods in the header file (see [Figure\
    \ 4-16](#Chapter04.html#fig_4_16)). `BJDGameModel` is a class that manages a pack\
    \ of cards and dealer and player hands; each array contains multiple instances\
    \ of `BJDCard`. `BJDGameModel` also manages the game stages. In each game of blackjack,\
    \ the player goes first, followed by the dealer, and then the game is over. So\
    \ you’ll see that I’ve created another custom enumerator to track these three\
    \ game stages:\n\n```\ntypedef enum : int\n{\n    BJGameStagePlayer,\n    BJGameStageDealer,\n\
    \    BJGameStageGameOver\n}BJGameStage;\n```\n\nOur game model exposes a public\
    \ `gameStage` property. Our view controller, `BJViewController`, has access to\
    \ the model and is therefore able to check the game stage at any point and determine\
    \ how to render the view based on the model.\n\n![Image](images/9781430243748_Fig04-16.jpg)\n\
    \n**Figure 4-16.** Dissecting `BJDGameModel`\n\n*Note**:** You can use the jumpbar\
    \ to quickly find method and property declarations and implementations in the\
    \ header and source files (see [Figure 4-16](#Chapter04.html#fig_4_16)).*\n\n\
    There’s one other property in our model: `maxPlayerCards`. As I mentioned earlier\
    \ in the chapter, this is one of the caveats of our implementation of blackjack:\
    \ we’re permitting a maximum of five cards per dealer or player hand. If the player’s\
    \ hand reaches five cards and he hasn’t yet gone bust, then his turn is over and\
    \ the game stage progresses to the dealer’s turn.\n\nDid you spot this code in\
    \ the header:\n\n```\n@class BJDCard;\n```\n\nThis is what’s known as a forward\
    \ class declaration. Some of the public methods in `BJDGameModel` return instances\
    \ of `BJDCard`. The compiler will complain if we don’t either import `BJDCard`\
    \ in the header like this:\n\n```\n#import \"BJDCard.h\"\n```\n\nOr add a forward\
    \ class declaration like the one I’ve implemented. The forward class declaration\
    \ lets the compiler know that although we haven’t yet declared the `BJDCard` class,\
    \ it will be declared—trust us, compiler! You’ll see that I’ve actually imported\
    \ `BJDCard.h` in the source implementation of `BJDGameModel.m`. In general, this\
    \ is the best way to include references to other classes in your header files,\
    \ via forward class declarations. Then be sure to import the header(s) in the\
    \ source file.\n\nAlthough importing `BJDCard.h` in the `BJDGameModel.h` header\
    \ file works fine on this occasion, you will run into horrible compiler errors\
    \ at some point if you continue to work this way. An error will occur if you have\
    \ two classes that both reference each other in the header file. They are both\
    \ relying on the other file to be imported by the compiler first, so the compiler\
    \ gets its knickers in a twist! The solution: use forward class declarations in\
    \ your header files rather than import declarations.\n\n## Our MVC blackjack implementation\n\
    \nThe way our game will work is that `BJViewController` is the controller in our\
    \ MVC implementation. The controller has access to the model, but the model has\
    \ no knowledge whatsoever of the controller. It’s a similar one-way relationship\
    \ with the controller and the view.\n\n`BJViewController` will control the show:\
    \ when the app first loads, `BJViewController` calls `resetGame` on the model\
    \ and then renders the view to represent the model. During the player’s turn,\
    \ `BJViewController` listens for the Touch Up Inside action on the Stand and Hit\
    \ buttons, and tells the model to deal a new card. Again, `BJViewController` renders\
    \ the view. `BJViewController` also calls the `updateGameStage` method of the\
    \ model, which checks whether the player has gone bust or reached his maximum\
    \ five-card hand, and progresses the game stage accordingly.\n\nOnce it’s the\
    \ dealer’s turn, `BJViewController` renders the second card face-up and asks the\
    \ model to check whether the dealer should stand, again via the `updateGameStage`\
    \ method. If the dealer needs to hit, then `BJViewController` implements a delay\
    \ timer to simulate the dealing of a third card. `BJViewController` calls `updateGameStage`\
    \ again, and then deals another delayed card until the dealer goes bust or wins."
  raw: '#### The game model


    Let’s leave `BJDCard` for the time being, but before you do, be sure that the
    app compiles OK. Build and run the app. You should just see the view layout we
    created at the beginning of the chapter. As long as your version of the app doesn’t
    crash, you’re doing just fine!


