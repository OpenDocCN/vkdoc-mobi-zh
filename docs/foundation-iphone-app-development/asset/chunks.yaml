    \ `NSObject`，通常的做法是让你的类初始化器在其自身的初始化器中调用 `[super init]`。*\n\n有些类有多个初始化器：例如数组：\n\
    \n- `initWithArray:`\n- `initWithArray:copyItems:`\n- `initWithContentsOfFile:`\n\
    - `initWithContentsOfURL:`\n- `initWithObjects:`\n- `initWithObjects:count:`\n\
    \n因此，由你来选择最合适的初始化器。\n"
- fmt: "# Factory/convenience methods\n\nSome Objective-C classes include *factory*\
    \ or *convenience methods*. These are class methods that take care of the `alloc\
    \ init` instantiation process and return new class instances. The following are\
    \ the factory methods of an array:\n\n`+ array`\n`+ arrayWithArray:`\n`+ arrayWithContentsOfFile:`\n\
    `+ arrayWithContentsOfURL:`\n`+ arrayWithObject:`\n`+ arrayWithObjects:`\n`+ arrayWithObjects:count:`\n\
    \nI typically use factory methods to create arrays and dictionaries (hash tables).\n\
    \n`NSMutableArray *arr = [NSMutableArray arrayWithObjects:@\"one\",@\"two\",@\"\
    three\", nil];`\n\n`NSMutableArray *arrWithOneObject = [NSMutableArray arrayWithObject:@\"\
    one\"];`\n\n`NSMutableDictionary *dictionary = [NSMutableDictionary dictionaryWithObjectsAndKeys:@\"\
    value1\",@\"key1\",\"value2\",@\"key2\", nil];`\n\n`NSMutableDictionary *dictionaryWithOneObject\
    \ = [NSMutableDictionary dictionaryWithObject:@\"myValue\" forKey:@\"myKey\"];`\n\
    \n*Note: We could also use literals to simplify the creation of arrays and dictionaries\
    \ in these examples. However, literals create non-mutable objects, so we’d additionally\
    \ need to call* `mutableCopy` *to generate mutable copies of our dictionaries\
    \ and arrays.*\n\nLet’s get back to our blackjack game.\n\nDo you remember earlier\
    \ when I said that views and view controllers are not the same? In some circumstances,\
    \ your view may get discarded by iOS but your view controller remain. Consider\
    \ a complex navigation controller. The user has drilled deep into the navigation\
    \ of the app, and so the view controlled by the first view controller in the navigation\
    \ stack is no longer visible. If your app is running low on memory, then all of\
    \ your view controllers may receive intermittent memory warnings via the `didReceiveMemoryWarning`\
    \ method of `UIViewController`. By default, `didReceiveMemoryWarning` releases\
    \ its main view if the view no longer has a parent view to free up unrequired\
    \ memory. The `UIViewController` itself will not be released from memory because\
    \ it remains one of the view controllers of the navigation controller.\n\nWe’ll\
    \ explore more of the details of the view life cycle in [Chapter 5](#Chapter05.html#ch5),\
    \ but at this stage, it’s just worth noting that the view property of a view controller\
    \ may be released and reloaded by iOS.\n\nIn `viewDidUnload` of `BJViewController`\
    \ our outlets to the image views will be nullified, so it’s important that we\
    \ clear the two arrays we created earlier to reference all the dealer and player\
    \ cards. If we do nothing, then the cards remain in memory because arrays retain\
    \ references to their elements—and we’ll leak memory.\n\nAdd the following code\
    \ to the `viewDidUnload` method, after the call to `[super viewDidUnload]`:\n\n\
    ```\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n    self.dealerCardViews\
    \ = nil;\n    self.playerCardViews = nil;\n}\n```\n\nPlease note that the following\
    \ code produces identical results:\n\n```\n- (void)viewDidUnload\n{\n    [super\
    \ viewDidUnload];\n    [self setDealerCardViews:nil];\n    [self setPlayerCardViews:nil];\n\
    }\n```\n\nIn Objective-C, you can use either dot syntax to reference the setter\
    \ through the property, or directly call the synthesized setter method as shown\
    \ in the second example.\n\nThe code calls the synthesized setters for the `dealerCardViews`\
    \ and `playerCardViews` properties, and releases the iVar storage references `_dealerCardViews`\
    \ and `_playerCardViews`, which, in turn, release the array element references\
    \ to each card view, and avoids potential memory leaks.\n\n*Note: Arrays and dictionaries\
    \ retain references to pointers. To avoid memory leaks, it’s up to you to manage\
    \ your arrays and dictionary properties.*\n\n## Switching off/on multiorientation\
    \ support\n\nAt this point, let’s also switch off multiorientation for our app.\
    \ Our blackjack game is intended only to be viewed in portrait orientation.\n\n\
    Scroll further down `BJViewController.m` and override the following view controller\
    \ method:\n\n```\n- (NSUInteger)supportedInterfaceOrientations\n{\n    // We're\
    \ not going to support multiple device orientation for this game\n    return UIInterfaceOrientationMaskPortrait;\n\
    }\n```\n\nIn addition to defining supported orientations in the target summary\
    \ panel as we learned in [Chapter 3](#Chapter03.html#ch3), we can optionally define\
    \ supported orientations directly within our view controller sub classes. We have\
    \ the following orientation options to return:\n\n`UIInterfaceOrientationMaskPortrait`\n\
    `UIInterfaceOrientationMaskLandscapeLeft`\n`UIInterfaceOrientationMaskLandscapeRight`\n\
    `UIInterfaceOrientationMaskPortraitUpsideDown`\n`UIInterfaceOrientationMaskLandscape`\n\
    `UIInterfaceOrientationMaskAll`\n`UIInterfaceOrientationMaskAllButUpsideDown`\n\
    \nOn iPhone, by default, view controllers return `UIInterfaceOrientationMaskAllButUpsideDown`\
    \ so all orientations are supported except upside-down orientation. Now you should\
    \ find that the app will no longer rotate.\n\nAs we learned in [Chapter 3](#Chapter03.html#ch3),\
    \ we can switch off multiorientation support globally in our app in Xcode by selecting\
    \ the Blackjack project in the Project Navigator and then the Blackjack target.\
    \ Then, from the target’s Summary tab, toggle off Landscape Left and Landscape\
    \ Right in the Supported Interface Orientations section of the summary screen,\
    \ as shown in [Figure 4-9](#Chapter04.html#fig_4_9).\n\n![Image](images/9781430243748_Fig04-09.jpg)\n\
    \n**Figure 4-9.** Switching off device orientation\n\nI’ve introduced you to the\
    \ structure of Objective-C classes, properties, iVars, initializers, class, and\
    \ instance methods. It’s been a brief introduction, but should form the foundation\
    \ understanding you’ll require for the hands-on learning you’ll experience by\
    \ building blackjack and *Birthday Reminder* apps.\n\n## The Model\n\nIn this\
    \ next section of the chapter, we’ll learn about object-oriented Objective-C.\
    \ We’ll learn about `NSObject`, the core foundation object class, and how to subclass\
    \ and extend it. We’ll further develop our blackjack game and learn how to implement\
    \ basic MVC patterns in Objective-C.\n\nWe haven’t quite finished with the controller\
    \ yet, but for now we’re going to switch to our model. The model for our app is\
    \ going to comprise two custom classes: a card value object class and the game\
    \ model. We could break the model down further and add a model class for the player\
    \ and dealer, but for illustration purposes, two classes will suffice.\n\n###\
    \ The card model\n\nWe’re going to create a class that will represent the data\
    \ of each card in a pack. This is a single-pack game of blackjack, so there will\
    \ be 52 instances of our card class instantiated at the beginning of each hand.\
    \ Don’t worry. We’ll make sure the cards get shuffled. It’s good practice when\
    \ creating model classes to subclass Apple’s `NSObject` class because we inherit\
    \ a few basic methods for free. Let’s get started."
  raw: '#### Factory/convenience methods


    Some Objective-C classes include *factory* or *convenience methods*. These are
    class methods that take care of the `alloc init` instantiation process and return
    new class instances. The following are the factory methods of an array:


    `+ array`

    `+ arrayWithArray:`

    `+ arrayWithContentsOfFile:`

    `+ arrayWithContentsOfURL:`

    `+ arrayWithObject:`

    `+ arrayWithObjects:`

    `+ arrayWithObjects:count:`


    I typically use factory methods to create arrays and dictionaries (hash tables).


    `NSMutableArray *arr = [NSMutableArray arrayWithObjects:@"one",@"two",@"three",
    nil];`


    `NSMutableArray *arrWithOneObject = [NSMutableArray arrayWithObject:@"one"];`


    `NSMutableDictionary *dictionary = [NSMutableDictionary`

    `dictionaryWithObjectsAndKeys:@"value1",@"key1","value2",@"key2", nil];`


    `NSMutableDictionary *dictionaryWithOneObject = [NSMutableDictionary`

    `dictionaryWithObject:@"myValue" forKey:@"myKey"];`


    *Note: We could also use literals to simplify the creation of arrays and dictionaries
    in these examples. However, literals create non-mutable objects, so we’d additionally
    need to call* `mutableCopy` *to generate mutable copies of our dictionaries and
    arrays.*


    Let’s get back to our blackjack game.


    Do you remember earlier when I said that views and view controllers are not the
    same? In some circumstances, your view may get discarded by iOS but your view
    controller remain. Consider a complex navigation controller. The user has drilled
    deep into the navigation of the app, and so the view controlled by the first view
    controller in the navigation stack is no longer visible. If your app is running
    low on memory, then all of your view controllers may receive intermittent memory
    warnings via the `didReceiveMemoryWarning` method of `UIViewController`. By default,
    `didReceiveMemoryWarning` releases its main view if the view no longer has a parent
    view to free up unrequired memory. The `UIViewController` itself will not be released
    from memory because it remains one of the view controllers of the navigation controller.


    We’ll explore more of the details of the view life cycle in [Chapter 5](#Chapter05.html#ch5),
    but at this stage, it’s just worth noting that the view property of a view controller
    may be released and reloaded by iOS. .


    In `viewDidUnload` of `BJViewController` our outlets to the image views will be
    nullified, so it’s important that we clear the two arrays we created earlier to
    reference all the dealer and player cards*.* If we do nothing, then the cards
    remain in memory because arrays retain references to their elements—and we’ll
    leak memory.


    Add the following code to the `viewDidUnload` method, after the call to `[super
    viewDidUnload]`:


    `- (void)viewDidUnload`

    `{`

    `    [super viewDidUnload];`

    **`    self.dealerCardViews = nil;`**

    **`    self.playerCardViews = nil;`**

    `}`


    Please note that the following code produces identical results:


    `- (void)viewDidUnload`

    `{`

    `    [super viewDidUnload];`

    **`    [self setDealerCardViews:nil];`**

    **`    [self setPlayerCardViews:nil];`**

    `}`


    In Objective-C, you can use either dot syntax to reference the setter through
    the property, or directly call the synthesized setter method as shown in the second
    example.


    The code calls the synthesized setters for the `dealerCardViews` and `playerCardViews`
    properties, and releases the iVar storage references `_dealerCardViews` and `_playerCardViews`,
    which, in turn, release the array element references to each card view, and avoids
    potential memory leaks.


    *Note: Arrays and dictionaries retain references to pointers. To avoid memory
    leaks, it’s up to you to manage your arrays and dictionary properties.*


    #### Switching off/on multiorientation support


    At this point, let’s also switch off multiorientation for our app. Our blackjack
    game is intended only to be viewed in portrait orientation.


    Scroll further down BJViewController.m and override the following view controller
    method:


    `- (NSUInteger)supportedInterfaceOrientations`

    `{`

    `     // We''re not going to support multiple device orientation for this game`

    `    return UIInterfaceOrientationMaskPortrait;`

    `}`


    In addition to defining supported orientations in the target summary panel as
    we learned in [Chapter 3](#Chapter03.html#ch3), we can optionally define supported
    orientations directly within our view controller sub classes. We have to following
    orientation options to return:


    `UIInterfaceOrientationMaskPortrait`

    `UIInterfaceOrientationMaskLandscapeLeft`

    `UIInterfaceOrientationMaskLandscapeRight`

    `UIInterfaceOrientationMaskPortraitUpsideDown`

    `UIInterfaceOrientationMaskLandscape`

    `UIInterfaceOrientationMaskAll`

    `UIInterfaceOrientationMaskAllButUpsideDown`


    On iPhone, by default, view controllers return UIInterfaceOrientationMaskAllButUpsideDown
    so all orientations are supported except upside-down orientation. Now you should
    find that the app will no longer rotate.


    As we learned in [Chapter 3](#Chapter03.html#ch3), we can switch off multiorientation
    support globally in our app in Xcode by selecting the Blackjack project in the
    Project Navigator and then the Blackjack target. Then, from the target’s Summary
    tab, toggle off Landscape Left and Landscape Right in the Supported Interface
    Orientations section of the summary screen, as shown in [Figure 4-9](#Chapter04.html#fig_4_9).


    ![Image](images/9781430243748_Fig04-09.jpg)


    **Figure 4-9.** Switching off device orientation


    I’ve introduced you to the structure of Objective-C classes, properties, iVars,
    initializers, class, and instance methods. It’s been a brief introduction, but
    should form the foundation understanding you’ll require for the hands-on learning
    you’ll experience by building blackjack and *Birthday Reminder* apps.


    ### The Model


    In this next section of the chapter, we’ll learn about object-oriented Objective-C.
    We’ll learn about `NSObject`, the core foundation object class, and how to subclass
    and extend it. We’ll further develop our blackjack game and learn how to implement
    basic MVC patterns in Objective-C.


    We haven’t quite finished with the controller yet, but for now we’re going to
    switch to our model. The model for our app is going to comprise two custom classes:
    a card value object class and the game model. We could break the model down further
    and add a model class for the player and dealer, but for illustration purposes,
    two classes will suffice.


    #### The card model


    We’re going to create a class that will represent the data of each card in a pack.
    This is a single-pack game of blackjack, so there will be 52 instances of our
    card class instantiated at the beginning of each hand. Don’t worry. We’ll make
    sure the cards get shuffled. It’s good practice when creating model classes to
    subclass Apple’s `NSObject` class because we inherit a few basic methods for free.
    Let’s get started.'
  trans: "\n# 工厂方法/便捷方法\n\n部分 Objective-C 类包含*工厂方法*或*便捷方法*。这些类方法负责处理 `alloc init`\
    \ 的实例化流程，并返回新的类实例。以下是数组的工厂方法：\n\n`+ array`\n`+ arrayWithArray:`\n`+ arrayWithContentsOfFile:`\n\
    `+ arrayWithContentsOfURL:`\n`+ arrayWithObject:`\n`+ arrayWithObjects:`\n`+ arrayWithObjects:count:`\n\
    \n我通常使用工厂方法来创建数组和字典（哈希表）。\n\n`NSMutableArray *arr = [NSMutableArray arrayWithObjects:@\"\
    one\",@\"two\",@\"three\", nil];`\n\n`NSMutableArray *arrWithOneObject = [NSMutableArray\
    \ arrayWithObject:@\"one\"];`\n\n`NSMutableDictionary *dictionary = [NSMutableDictionary\
    \ dictionaryWithObjectsAndKeys:@\"value1\",@\"key1\",\"value2\",@\"key2\", nil];`\n\
    \n`NSMutableDictionary *dictionaryWithOneObject = [NSMutableDictionary dictionaryWithObject:@\"\
    myValue\" forKey:@\"myKey\"];`\n\n*注意：在这些示例中，我们也可以使用字面量来简化数组和字典的创建。然而，字面量创建的是不可变对象，因此我们还需要额外调用*\
    \ `mutableCopy` *来生成字典和数组的可变副本。*\n\n让我们回到二十一点游戏。\n\n还记得我之前说过视图和视图控制器并不相同吗？在某些情况下，你的视图可能会被\
    \ iOS 丢弃，但视图控制器仍然保留。考虑一个复杂的导航控制器：用户深入导航到应用层级中，导航堆栈中第一个视图控制器所控制的视图已不再可见。如果你的应用内存不足，那么所有视图控制器都可能通过\
    \ `UIViewController` 的 `didReceiveMemoryWarning` 方法间歇性收到内存警告。默认情况下，如果视图不再拥有父视图，`didReceiveMemoryWarning`\
    \ 会释放其主视图以释放不必要的内存。`UIViewController` 自身则不会从内存中释放，因为它仍是导航控制器的视图控制器之一。\n\n我们将在第\
    \ 5 章中进一步探讨视图生命周期的细节，但现阶段只需注意视图控制器的视图属性可能会被 iOS 释放并重新加载。\n\n在 `BJViewController`\
    \ 的 `viewDidUnload` 方法中，我们指向图像视图的输出口将被置空，因此清除之前创建的两个数组（用于引用所有庄家和玩家的牌）非常重要。如果不处理，这些卡牌会因数组保留对其元素的引用而继续留在内存中，从而导致内存泄漏。\n\
    \n在 `viewDidUnload` 方法中调用 `[super viewDidUnload]` 之后，添加以下代码：\n\n```\n- (void)viewDidUnload\n\
    {\n    [super viewDidUnload];\n    self.dealerCardViews = nil;\n    self.playerCardViews\
    \ = nil;\n}\n```\n\n请注意，以下代码产生的结果完全相同：\n\n```\n- (void)viewDidUnload\n{\n    [super\
    \ viewDidUnload];\n    [self setDealerCardViews:nil];\n    [self setPlayerCardViews:nil];\n\
    }\n```\n\n在 Objective-C 中，你可以使用点语法通过属性引用 setter，也可以像第二个示例那样直接调用合成的 setter 方法。\n\
    \n这段代码调用了 `dealerCardViews` 和 `playerCardViews` 属性的合成 setter，并释放了实例变量存储引用 `_dealerCardViews`\
    \ 和 `_playerCardViews`，这进而释放了每个卡牌视图的数组元素引用，从而避免了潜在的内存泄漏。\n\n*注意：数组和字典会保留对指针的引用。为避免内存泄漏，管理好你的数组和字典属性是你的责任。*\n\
    \n## 开启/关闭多方向支持\n\n现在，让我们也为应用关闭多方向支持。我们的二十一点游戏仅需在竖屏模式下查看。\n\n向下滚动 `BJViewController.m`\
    \ 文件，并重写以下视图控制器方法：\n\n```\n- (NSUInteger)supportedInterfaceOrientations\n{\n \
    \   // 我们不会为这个游戏支持多设备方向\n    return UIInterfaceOrientationMaskPortrait;\n}\n```\n\
    \n除了像我们在第 3 章中学习的在目标摘要面板中定义支持的方向外，我们还可以选择直接在视图控制器子类中定义支持的方向。我们可以返回以下方向选项：\n\n\
    `UIInterfaceOrientationMaskPortrait`\n`UIInterfaceOrientationMaskLandscapeLeft`\n\
    `UIInterfaceOrientationMaskLandscapeRight`\n`UIInterfaceOrientationMaskPortraitUpsideDown`\n\
    `UIInterfaceOrientationMaskLandscape`\n`UIInterfaceOrientationMaskAll`\n`UIInterfaceOrientationMaskAllButUpsideDown`\n\
    \n在 iPhone 上，默认情况下视图控制器返回 `UIInterfaceOrientationMaskAllButUpsideDown`，因此除倒置方向外，所有方向都受支持。现在你会发现应用将不再旋转。\n\
    \n正如我们在第 3 章中学到的，我们可以在 Xcode 中通过选择项目导航器中的 Blackjack 项目，然后选择 Blackjack 目标，在全局范围内关闭应用的多方向支持。接着，在目标的“摘要”选项卡中，切换“支持的方向”部分下的“左横屏”和“右横屏”开关，如图\
    \ 4-9 所示。\n\n![图片](img/9781430243748_Fig04-09.jpg)\n\n**图 4-9.** 关闭设备方向支持\n\n\
    我已经向你介绍了 Objective-C 类、属性、实例变量、初始化方法、类方法和实例方法的结构。这虽然只是一个简要介绍，但应该为你在动手开发二十一点和*生日提醒*应用时所需的基础理解打下基础。\n\
    \n## 模型\n\n在本章的下一节中，我们将学习面向对象的 Objective-C。我们将学习 `NSObject`（核心基础对象类）以及如何对其子类化并扩展。我们将进一步开发二十一点游戏，并学习如何在\
    \ Objective-C 中实现基本 MVC 模式。\n\n我们尚未完全完成控制器的开发，但现在我们将转向模型。应用的模型将由两个自定义类组成：一个卡牌值对象类和一个游戏模型。我们可以进一步拆分模型，为玩家和庄家添加模型类，但出于演示目的，两个类就足够了。\n\
    \n### 卡牌模型\n\n我们将创建一个类，用于表示一副牌中每张牌的数据。这是一个单副牌的二十一点游戏，因此在每手牌开始时，我们的卡牌类会实例化 52 个对象。别担心，我们会确保牌被洗乱。在创建模型类时，继承\
    \ Apple 的 `NSObject` 类是一个好做法，因为我们可以免费继承一些基本方法。让我们开始吧。\n"
- fmt: '```markdown

    #### Subclassing NSObject


    我们已经见过一个基本示例，通过之前的`Person`示例来演示如何创建`NSObject`的子类。我还没展示的是在Xcode中创建新自定义类的流程。


    打开项目导航面板，同样通过Xcode工具栏右上角的切换按钮操作。然后在项目层次结构中选择`data`组。


    *提示：在Xcode项目中创建新类或添加文件时，始终先在项目导航器中为新文件选择目标位置。*


    使用`![Image](images/U002a.jpg) N`键盘快捷键或`File` > `New` > `File`，系统会呈现新文件模板选择界面。如果尚未选中，则从Cocoa
    Touch集合中选择`Objective-C Class`选项（参见[图4-10](#Chapter04.html#fig_4_10)）。


    `![Image](images/9781430243748_Fig04-10.jpg)`


    **图4-10.** 创建一个新的Objective-C类


    在下一屏幕中，确保子类选项设置为`NSObject`，并将你的类命名为`BJDCard`。这里引入另一个常见命名约定。通过在BJ类前缀中添加`D`，表示这是一个数据类，我们将对其他数据或值对象模型类使用此约定。


    Xcode会询问你保存新类文件的位置。由于`data`组映射到Xcode项目中一个同样名为`data`的文件夹，默认情况下，你应该会自动看到正确的保存位置。如果没有，则导航到你所操作的Xcode项目中的`data`文件夹，然后点击“Create”按钮（参见[图4-11](#Chapter04.html#fig_4_11)）。


    `![Image](images/9781430243748_Fig04-11.jpg)`


    **图4-11.** 将新的`BJDCard`类保存到data文件夹


    如果尚未选择，请在项目导航器中选择新生成的`BJDCard`头文件，然后再次关闭导航器。现在你应该在Xcode的助理编辑器布局中同时看到新`BJDCard`类的头文件和源文件。


    我们将开始向`BJDCard`添加几个属性。


    头文件：


    ```

    #import <Foundation/Foundation.h>


    @interface BJDCard : NSObject


    @property (nonatomic) int digit;

    @property (nonatomic) BOOL isFaceUp;


    @end

    ```


    你暂时不需要对源文件做任何更改，因为Xcode的编译器会自动合成我们的两个新属性。结果应如图4-12所示。


    `![Image](images/9781430243748_Fig04-12.jpg)`


    **图4-12.** 向`BJDCard`添加属性和合成的实例变量


    #### 声明指针和基本类型


    属性声明语法应该与我们之前在`BJViewController`中的工作非常相似。然而，我们之前的属性声明语法看起来略有不同。例如，`BJViewController`中的`dealerCardViews`数组是这样声明的：


    ```

    @property (nonatomic,strong) NSArray *dealerCardViews;

    ```


    而`BJDCard`中的`digit`是这样声明的：


    ```

    @property (nonatomic) int digit;

    ```


    这两个属性之间的区别在于：数组是指向对象的指针（引用），而整数是基本数据类型，基本类型的实际值就是属性本身。在像ActionScript这样的面向对象语言中，指针和基本类型的声明方式相同。在Objective-C中，你需要适应语法上的差异。


    所有作用域中的指针声明都在属性或变量名之前使用`*`。而像整数、浮点数和布尔值这样的基本类型声明则不需要。数组、字典以及对任何Objective-C类实例的引用都是指针。


    #### 保留与释放，以及ARC（自动引用计数）


    在iOS中，对指针的引用要么是弱引用，要么是强引用。iOS中的内存管理会跟踪一个对象的强指针引用数量，一旦强引用计数降为零，系统就会判定该对象不再被你的应用需要，释放对象占用的所有内存，并销毁该对象。


    在过去（iOS 5之前），开发者需要自行管理所有强引用计数。旧的语法如下：


    ```

    [myObject retain]; // 将对象的强引用计数增加1

    // 执行某些操作

    [myObject release]; // 将强引用计数减少1

    ```


    开发者必须非常小心，确保当一个对象不再需要时，其强引用计数降为零，以防止应用出现内存泄漏。当应用消耗的内存超过系统可接受的范围时，系统会终止内存泄漏的应用。


    苹果在2011年发布的Xcode 4.2中引入了一项广受好评的新技术，称为自动引用计数，简称ARC。在编译时，ARC会自动在所有`retain`和`release`引用处添加代码，这使得开发者现在可以更轻松地专注于编写优秀的代码，而无需花费大量时间跟踪强对象引用。


    然而，了解应用底层发生了什么仍然非常重要。


    让我们重新审视我们在`BJViewController`中创建的两个指针引用：


    ```

    @property (nonatomic, weak) IBOutlet UIImageView *dealerCard1;

    @property (nonatomic,strong) NSArray *dealerCardViews;

    ```


    我想提醒你注意的两个属性指针声明之间的主要区别在于关键字`weak`和`strong`。这些关键字指示编译器如何处理这些属性的指针引用。默认情况下，指针属性引用是`strong`的。这对于像我们的`dealerCardViews`数组这样的属性是有意义的。这个数组是在视图控制器类中创建的，并且在应用的其他地方没有引用。如果我们向编译器暗示该属性是`weak`的，那么一旦应用执行了`viewDidLoad`，`dealerCardViews`属性就会被编译器设置为`nil`。由于没有其他对该数组的强引用，一旦我们离开了`viewDidLoad`的作用域，编译器就会认为该对象不再需要，可以被释放。


    然而，对于像`dealerCard1`这样的Interface Builder输出口，引用应该是`weak`的。通过简单地将`dealerCard1`图像视图添加到其父视图中，我们已经在父视图和子视图之间创建了一个强引用。我们不希望视图控制器中对`dealerCard1`的引用是强引用，因为如果主视图被卸载，其子视图将不再可用，我们希望系统能够释放这些被移除视图所占用的内存。因此，我们对子视图的输出口使用弱引用。


    这条规则也有例外。可以将视图和其他对象添加到故事板场景的顶层，即那些不是视图子视图的对象。在这种情况下，你需要从视图控制器类建立一个强输出口引用，以确保对象不会因为零强引用而被系统销毁。

    ```'
  raw: '##### Subclassing NSObject


    We’ve already seen a basic example of how to subclass `NSObject` with my earlier
    `Person` example. What I haven’t shown you is the Xcode process to create new
    custom classes.


    Open the Project Navigator pane, again via the toggle buttons top-right in the
    Xcode toolbar. Then select the `data` group within the project hierarchy.


    *Tip: When creating new classes or adding files to an Xcode project, always first
    select the destination for the new files within the Project Navigator.*


    Use the ![Image](images/U002a.jpg)N keyboard shortcut or File ![Image](images/U001.jpg)
    New ![Image](images/U001.jpg) File to be presented with a selection of new file
    templates. If it’s not already selected, then choose the Objective-C Class option
    from the Cocoa Touch collection (see [Figure 4-10](#Chapter04.html#fig_4_10)).


    ![Image](images/9781430243748_Fig04-10.jpg)


    **Figure 4-10.** Creating a new Objective-C class


    On the next screen, ensure that the subclass option is set to `NSObject` and name
    your class `BJDCard`. I’m introducing another common naming convention. By adding
    a D to our BJ class prefix*,* we’re indicating that this is a data class and we’ll
    use this convention for other data or value object model classes.


    Xcode will ask you where to save the new class file(s). As the `data` group is
    mapped to a folder within the Xcode project also called `data`*,* you should,
    by default, be automatically presented with the correct location to save the file.
    If not, then navigate to the `data` folder within the Xcode project you’re working
    from and click the Create button (see [Figure 4-11](#Chapter04.html#fig_4_11)).


    ![Image](images/9781430243748_Fig04-11.jpg)


    **Figure 4-11.** Saving the new BJDCard class to the data folder


    If it’s not already selected, then select the newly generated `BJDCard` header
    file in the Project Navigator and close the navigator again. You should now be
    viewing both the header and the source files for the new `BJDCard` class in Xcode’s
    Assistant Editor layout.


    We’ll start by adding a couple of properties to `BJDCard`.


    Header:


    `#import <Foundation/Foundation.h>`


    `@interface BJDCard : NSObject`


    **`@property (nonatomic) int digit;`**

    **`@property (nonatomic) BOOL isFaceUp;`**


    `@end`


    You won’t need to make any changes to the source file for now because Xcode’s
    compiler automates the synthesis of our two new properties. The result should
    look like [Figure 4-12](#Chapter04.html#fig_4_12).


    ![Image](images/9781430243748_Fig04-12.jpg)


    **Figure 4-12.** Adding properties and synthesized iVars to BJDCard


    ##### Declaring pointers and primitives


    The property declaration syntax should look pretty familiar from our work on `BJViewController`.
    However, the syntax of our previous property declarations looked slightly different
    than this. Our `dealerCardViews` array in `BJViewController`, for example, was
    declared like this:


    `@property (nonatomic,strong) NSArray *dealerCardViews;`


    Whereas `digit` in `BJDCard` is declared like this:


    `@property (nonatomic) int digit;`


    The difference between the two properties is that arrays are pointers (references)
    to objects and integers are primitive data types where the actual value of the
    primitive is the property. In object-oriented languages like ActionScript, pointers
    and primitives are declared identically. In Objective-C, you’ll need to get used
    to the differences in syntax.


    Pointer declarations in all scopes use an * before the property or variable name.
    Primitive declarations like integers, floats, and Booleans do not. Arrays, dictionaries,
    and every reference to an instance of any Objective-C class are pointers.


    ##### Retain and release, and ARC (Automatic Reference Counting)


    In iOS, references to pointers are either weak or strong. The memory management
    in iOS tracks the number of strong pointer references to an object and, as soon
    as the strong reference count hits zero, the system determines that the object
    is no longer needed by your application, deallocates any memory to the object,
    and disposes of the object.


    In the past (pre–iOS 5) developers were responsible for all their strong reference
    counts. The old syntax for this was:


    `[myObject retain];//increments the strong reference count to the object by 1`

    `//do something`

    `[myObject release];//deducts  the strong reference count by 1`


    Developers had to be very careful to ensure that strong reference count hit zero
    when an object was no longer needed to ensure apps were not leaking memory. An
    app that leaks memory is terminated by the system when it consumes more memory
    than the system deems acceptable.


    Apple introduced a very well-received new piece of technology in the 2011 release
    of Xcode 4.2\. It’s called Automatic Reference Counting or ARC for short. At compile
    time, ARC adds all the retain and release references to your code automatically,
    so it’s now much easier for developers to get on with writing great code, and
    not spending a great deal of time keeping track of strong object references.


    However, it’s still really important that you have some idea about what’s going
    on under the hood of your application.


    Let’s re-examine two pointer references we created in `BJViewController`:


    `@property (nonatomic, weak) IBOutlet UIImageView *dealerCard1;`

    `@property (nonatomic,strong) NSArray *dealerCardViews;`


    The main differences between the two property pointer declarations that I want
    to alert you to are the keywords *weak* and *strong*. These keywords instruct
    the compiler how to treat these property pointer references. By default, a pointer
    property reference will be *strong*. That makes sense for properties like our
    array of `dealerCardViews`. This array is created in our view controller class
    and not referenced anywhere else in the app. If we hint to the compiler that the
    property is *weak*, then as soon as the app has executed `viewDidLoad`, the `dealerCardViews`
    property is set to `nil` by the compiler. There are no other strong references
    to the array, so once we’re out of the `viewDidLoad` scope, the compiler assumes
    that the object is no longer needed and can be released.


    With Interface Builder outlets like `dealerCard1`, however, the reference should
    be weak. By simply adding the `dealerCard1` image view to its parent view, we’ve
    created a strong reference between the parent and child view. We don’t want the
    reference to `dealerCard1` in our view controller to be strong, because in the
    event of the main view being unloaded, its child views will no longer be available,
    and we want the system to be able to dispose of the memory these removed views
    are consuming. Hence. we use weak references for outlets to subviews.


    There are exceptions to this rule. It’s possible to add views and other objects
    to the top level of a storyboard scene; that is, objects that are not subviews
    of the view. In this case, you would require a strong outlet reference from your
    view controller class to ensure the object isn’t trashed by the system for having
    zero strong references.'
