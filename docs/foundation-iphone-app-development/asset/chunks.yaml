- fmt: '### Signing and uploading the build


    With your `Birthday Reminder` app selected in the archive builds window, tap the
    `Distribute` button. You’ll be presented with three options, as shown in [Figure
    14-20](#Chapter14.html#fig_14_20).


    ![Image](images/9781430243748_Fig14-20.jpg)


    **Figure 14-20.** Export App Store, Ad-Hoc builds, or an Xcode Archive


    There are three distribution options for your project:


    > - **Submit to the iOS App Store**: We’ll learn how this process works next.

    > - **Save for Enterprise or Ad-Hoc Deployment**: You can create and distribute
    release builds of your app that you can distribute without having to go through
    the App Store. Enterprise apps can be installed to any iOS device, but need to
    be signed with an iOS Enterprise license certificate. An Ad-Hoc build is a release
    build intended for distribution to any of the devices already added to your Ad-Hoc
    distribution provisioning profile. You might have a group of beta testers to distribute
    your app to in advance of App Store submission.

    > - **Export as Xcode Archive**: Exporting an Xcode archive packages up your app
    along with a `dSYM` file that enables other developers in a team to test your
    app, gain debug access to your app, and the ability to analyze detailed crash
    reports. There are third-party systems like Test Flight that require you to export
    and upload your Ad-Hoc app’s `dSYM` file in order to remotely debug your app while
    it’s being run by all of your beta testers.


    We’ll stick with the `Submit to the iOS App Store` default selection and tap the
    `Next` button. Xcode will ask you to sign-in to your iOS developer account. Do
    so and tap `Next` again.


    As long as you’ve successfully installed a valid iOS distribution certificate
    and App Store provisioning profile from the provisioning portal, then at this
    point you should see a similar screen to [Figure 14-21](#Chapter14.html#fig_14_21).


    ![Image](images/9781430243748_Fig14-21.jpg)


    **Figure 14-21.** Preparing our archive build for signature


    The first drop-down menu lists pending iTunes Connect app submissions that match
    the bundle identifier and bundle version of our app. Great! There’s our `Birthday
    Reminder` 1.0 submission!


    The second drop-down should automatically find and autoselect your distribution
    certificate.


    Tap `Next` to submit.


    Our app bundle will first go through a validation process, checking that the provisioning
    profile and signing certificate validate, and that we’ve included valid app icons.
    Should validation fail, then Xcode will supply errors and suggestions to remedy
    the problems.


    Assuming that all is well, Xcode then begins to upload your app to iTunes Connect
    directly from the Organizer window (see [Figure 14-22](#Chapter14.html#fig_14_22)).


    ![Image](images/9781430243748_Fig14-22.jpg)


    **Figure 14-22.** Uploading the verified app bundle from Xcode to iTunes Connect


    After a few minutes, depending on the file size of your app, the upload should
    complete, and shortly afterward, you’ll receive an automated e-mail from iTunes
    Connect with the subject: Your App Status is Waiting for Review.


    At this point, your app is now in the App Store submission queue. In my experience,
    the waiting time until each new app submission and update gets to be reviewed
    by Apple and approved or rejected, is typically seven consecutive days. Sometimes
    I get lucky and the wait is shorter, and occasionally the wait slips past the
    seventh day.


    Beware of submitting apps in the run-up to Christmas—expect to wait a little longer,
    possibly 14 days—as Apple gets inundated with new apps and app updates just before
    the festive season. Developers are trying to cash in on the influx of new iOS
    device owners on Christmas Day!


    ### But what if I spot a bug in my pending app?


    This happens quite a lot. Especially if, like me, you’re a bit of a perfectionist.
    You’ve been waiting in the submission queue for three days but you’re still testing
    your app, of course. Suddenly, you spot a bug you hadn’t spotted before. You fix
    the bug in your Xcode project. Great.


    But now you have a dilemma: in order to submit a replacement binary, you have
    to reject your existing binary, upload the new version, and unfortunately, move
    right to the back to the beginning of the App Store submission queue once more.


    To replace a binary for an app currently in the submission queue, you have to
    first login to iTunes Connect, visit your app details page, and click the `Binary
    Details` link. The binary details page provides a `Reject this Binary` button
    link, enabling you to delete the app binary with the bug and then upload your
    new, fixed app.


    ### Summary


    Although we’ve now reached the end of the five-day course, this is the point where
    the excitement really begins for an app developer. You’ve built a great app. You’ve
    submitted your app. In about a week, your app should be live in the App Store—available
    for download to millions of potential iPhone owners. What an exciting prospect
    that is!


    In [Chapter 13](#Chapter13.html#ch13), we added a number of in-app marketing features
    to help spread the word about our app. But there’s plenty more you can do and
    will be able to do once your app is publically available: contact journalists,
    tell all your friends, start a Facebook page, and create a Twitter account for
    your app—to name but a few marketing strategies.


    Once your app goes live, you’ll also want to keep track of your app downloads,
    ratings, reviews, and any potential features by Apple if you create something
    really cool and original. Check out AppAnnie.com, a wonderful tool for App Store
    analytics that keeps track of all of your apps and e-mails you daily reports.
    Or if you’re the kind of developer that likes to check out your App Store category
    ranking on an up-to-the-minute basis, then try out AppViz, a great desktop tool
    for tracking and caching all of your app sales reports, stats, and reviews.


    At this point, I’m going to bid you good-bye and wish you good luck with your
    future iPhone developer career. I hope you’ve enjoyed the book. You can find me
    on Twitter at `@nickkuh` or via my web site [`www.nickkuh.com`](http://www.nickkuh.com).


    ![Image](images/ch.jpg)


