  trans: '

    #### 导出设计图像资源


    现在，我们已经对我们的设计 PSD 百分百满意了（好吧，我就假设你很满意！），我们可以开始分解并导出那些将要成为 Xcode 项目一部分的图标和背景图像了。


    在本书的剩余部分，当项目各章和阶段需要时，我会为你提供已导出的 PNG 图像资源。


    在第 1 章 的源代码设计/代码中，你还会找到七个用于我们应用中主要视图的视网膜设计的 Photoshop PSD 文件。包含这些设计文件为你提供了一个良好的起点，让你了解在为你的项目委托设计师时应该期待什么。


    完成本书后，当你开始构建自己的应用时，你将需要自己经历创建资源 PNG 和 JPG 的过程。你无法总能预测切割设计 PSD 的最佳方式。这是一个我在开发过程中，当需要为我正在处理的视图创建资源时常采取的行动。


    我们将要创建一个针对视网膜显示优化过的应用。由于视网膜显示器的像素是非视网膜的四倍，我们所有针对视网膜优化的图像在用户的 iPhone 上看起来都会平滑而清晰。


    诀窍是为每个图标和背景图像创建两个版本：（1）一个用于非视网膜显示，（2）另一个是非视网膜大小的两倍，并且质量更高，用于视网膜屏幕。


    只要你遵循以下命名约定，iOS SDK 将自动识别为视网膜准备的图像：


    标准版本：`my-image.png`


    视网膜版本：`my-image@2x.png`


    在这个例子中，如果 `my-image.png` 的尺寸是 150×100 像素，那么 `my-image@2x.png` 的尺寸就是 300×200 像素，并且会被视网膜设备自动使用，以充分利所有额外的像素。


    假设这个示例图像是不可拉伸的，那么在屏幕上渲染此图像的图像视图的尺寸是 150×100 *点*。


    在本章的源代码中，你会发现我提供了一些已导出的示例 PNG 资源：`navigation-bar-background.png`（320×60 像素）和 `navigation-bar-background@2x.png`（640×120
    像素）。像 iPhone 3G 这样的旧款非视网膜 iOS 设备会显示 `navigation-bar-background.png` 版本的图像。而在较新的视网膜设备上，`navigation-bar-background@2x.png`
    会被 iOS 自动使用，从而得到一个更清晰、像素化更少的图像版本，但仍然显示在 320×60 点的矩形内。


    我们的*生日提醒*应用的 PSD 文件都是按照视网膜屏幕的尺寸——640×960 像素来设计的。因此，在导出每个资源时，我首先使用 `[filename]@2x.[fileformat]`
    的命名约定导出了所有的视网膜资源。然后，我将每个导出的图像压平并缩小到其视网膜尺寸的一半，并为旧款非视网膜屏幕导出了不带 `@2x` 的较小版本。


    *提示：确保你的视网膜资源的像素宽度和高度都是偶数，这样当你将它们缩小一半时，得到的尺寸仍然是整数像素宽度和高度。*


    ### 一点额外帮助


    在本书中，我会在旅程的每一个阶段引导并帮助你。然而，在课程结束后，当你开始自己的应用开发之旅时，你可能会偶尔遇到障碍。我们都会遇到。


    也许你无法弄清楚如何让某个框架工作，或者你在为向 App Store 提交应用而进行配置时遇到困难。无论问题是什么，你都不太可能是第一个遇到它的人。求助就在眼前！


    Apple 自己的文档非常详尽——你可以通过 iOS 开发者中心在线浏览文档。或者，Xcode 允许你通过 `^?` 键盘快捷键直接跳转到你所遇到问题的具体类、框架或方法。


    当你在 iOS 代码中遇到特定的错误时，有一些非常方便的参考网站和博客可以去查阅。Stack Overflow (`stackoverflow.com`)
    是我目前最喜欢的。这是一个面向所有编程语言的极客问答网站。其他极客会对发布的每个技术问题的最佳答案进行投票。如果你遇到问题，可以打赌 Stack Overflow
    上已经有人提供了答案。


    此外，iOS 开发者中心上的 Apple 开发者论坛是另一个很好的资源，开发者可以在这里发布和搜索特定于 iOS 问题的答案。有些问题甚至是由 Apple
    自己的工程师回答的——直接来自源头的答案！


    ### 总结


    我们现在知道我们要构建什么了。我们已经规划好了应用的所有屏幕。


    我们了解到，开始制作应用的最佳方式是先用铅笔和画板勾勒出你的视图；在纸上确定最佳的用户体验和用户界面设计；并在编写代码之前解决设计挑战。这是构建应用并将未来的重构工作降至最低的最稳健的方法。


    但我们还没有接触 Xcode 或编写任何代码。不幸的是，在我们可以开始编码之前，我们仍然有几个核心任务要完成。


    让我们继续，注册成为 Apple 开发者并为我们的应用进行设备测试的配置吧！


    ![Image](img/ch.jpg)


    ## 第 2 章


    ## 为开发配置我们的应用


    对某些人来说，这将是进展缓慢的一章。它涵盖了我们真正开始开发应用之前需要完成的所有任务。这些任务有点枯燥，但在它们完成之前，你无法取得太大进展。


    成为 iOS 开发者计划中全额付费并注册会员的过程有点像一场艰苦的战斗，但一旦你通过了，你就能构建并向 App Store 提交尽可能多的应用，只要有时间去做！


    一旦你完成了 iOS 开发者计划的注册，你就可以回到这一章，我们将详细探索 iOS 配置门户。我们还将逐步完成必要的流程，以便为在你的设备上测试应用准备你自己的配置环境。


    ### 免费下载 Xcode


    要开始开发应用，我们只需要一个 Apple 软件：Xcode（见图 2-1）。


    ![Image](img/9781430243748_Fig02-01.jpg)


    **图 2-1.** Xcode：用于创建 Mac 和 iOS 应用的 Apple 开发者工具


    Xcode 由 Apple 通过 Mac App Store 免费分发。首先要做的是在你的 Mac 上打开 App Store，然后直接从商店下载并安装 Xcode。你需要使用一台运行
    Lion 或 Mountain Lion 的基于 Intel 的 Mac 来安装 Xcode 4.5（或更高版本）。当 Xcode 在后台下载和安装时，你可以继续阅读。


    以下是美国 Mac App Store 中 Xcode 的直接链接：


    [`http://itunes.apple.com/us/app/xcode/id448457090?mt=12`](http://itunes.apple.com/us/app/xcode/id448457090?mt=12)


    当 Apple 发布 Xcode 4.1 时，最初的下载大小高达 4GB！当时有很多不耐烦的开发者一次连续几小时——甚至几天——占用着他们的互联网连接，等待庞大的
    Xcode 下载完成。安装过程也曾更加繁琐：Apple 分发的是一个安装程序，而不是通过商店分发一个应用，下载后，开发者还必须经历一个二级安装过程。该安装程序将文件和文件夹添加到硬盘的
    Developer 目录中，以及许多独立的开发者工具，如 Instruments 和 Application Loader。


    Xcode 4.5+ 的下载量不到 100MB，并且是作为一个单一应用分发的，在短暂的下载时间完成后会自动安装。像 Instruments 这样的调试工具现在打包在
    Xcode 应用包内。各种版本的 iOS 模拟器会根据需要（例如，如果你的应用需要支持 iOS 4 或 5，Apple 会提供 iOS 模拟器，使你能够在旧版
    iOS 中运行和检查你的应用）在后台下载。

