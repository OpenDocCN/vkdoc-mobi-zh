    `}`


    Before I get into the details of this code, you’ll need to first import `BRBirthdayDetailViewController.h`
    into `BRHomeViewController.m`. Scroll up to the top of the `BRHomeViewController.m`
    source file and add the import statement:


    `#import "BRBirthdayDetailViewController.h"`


    Exploring the `prepareForSegue:sender:` code, our home to birthday detail segue
    has a `BirthdayDetail` identifier. We can check and access this string via the
    `segue.identifier` property. If the identifier matches the `BirthdayDetail` string,
    then we know that the current segue transition is between the Home and Birthday
    Detail view controllers, and so the new view controller must be an instance of
    `BRBirthdayDetailViewController`.


    We can grab the selected birthday dictionary by obtaining the index path of the
    currently selected table row:


    `NSIndexPath *selectedIndexPath = self.tableView.indexPathForSelectedRow;`


    From the selected index path, we can extract the `row` property that matches the
    index of the related birthday dictionary in our `self.birthdays` array.


    The segue also exposes a reference to the Birthday Detail view controller via
    its `destinationViewController` property.


    Finally, we set the `birthday` dictionary property of our detail view controller:


    `BRBirthdayDetailViewController *birthdayDetailViewController = segue.destinationViewController;`

    `birthdayDetailViewController.birthday = birthday;`


    This code runs before the Birthday Detail view controller is added to the navigation
    stack, and so when `viewWillAppear:` is invoked in the detail view controller,
    it already has access to the `birthday` dictionary and can update its title and
    `photoView` image properties, respectively.


    Build and run. The Birthday Detail view updates to display the selected celebrity
    name in its navigation bar title and the image in the photo view (see [Figure
    7-13](#Chapter07.html#fig_7_13)).


    ![Image](images/9781430243748_Fig07-13.jpg)


    **Figure 7-13.** Passing data to an updating Birthday Detail view'
  trans: "\n# 理解 Segue 标识符\n\n除了视图生命周期方法（`viewDidLoad`、`viewWillAppear:` 等）之外，Apple\
    \ 的 `UIViewController` 类的子类还可以重写与转场过渡（segue）相关的回调方法。这正是我们接下来要做的事情——在 Home 视图控制器类中重写\
    \ `prepareForSegue:sender:` 方法。将以下新代码添加到 `BRHomeViewController.m` 的实现中：\n\n```\n\
    #pragma mark 转场\n\n-(void) prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n\
    {\n    NSLog(@\"prepareForSegue!\");\n}\n```\n\n如果你构建并运行这个应用，每次从主屏幕选择一个名人的生日时，都会看到新添加的日志语句\
    \ `prepareForSegue!` 出现；也就是说，正好在调用转场过渡的时刻。\n\n在 `prepareForSegue:sender:` 方法中，我们获得了一个指向\
    \ storyboard 中添加的转场（segue）的引用。然而，我们添加到 `prepareForSegue:sender:` 中的任何代码都会在 *任意*\
    \ 从主屏幕到其他屏幕的转场过渡中被调用——例如我们的添加生日转场！我们需要能够识别当前正在执行的是哪个转场过渡，并据此确定将要过渡到屏幕上的视图控制器以及如何处理该事件。\n\
    \n在你的 storyboard 中，选择连接 Home 视图控制器到 Birthday Detail 视图控制器的转场，使用属性检查器为该转场添加一个字符串标识符。将转场标识符命名为\
    \ `BirthdayDetail`（请参见 图 7-12）。\n\n![图片](img/9781430243748_Fig07-12.jpg)\n\n**图\
    \ 7-12.** 添加转场标识符\n\n现在我们有了一个方法来识别哪个视图控制器正在被推入或呈现，我们可以扩展 `BRHomeViewController.m`\
    \ 实现中的 `prepareForSegue:sender:` 方法：\n\n```\n-(void) prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n     //NSLog(@\"prepareForSegue!\");\n     NSString\
    \ *identifier = segue.identifier;\n\n     if ([identifier isEqualToString:@\"\
    BirthdayDetail\"]) {\n         //首先获取数据\n         NSIndexPath *selectedIndexPath\
    \ = self.tableView.indexPathForSelectedRow;\n         NSMutableDictionary *birthday\
    \ = self.birthdays[selectedIndexPath.row];\n\n         BRBirthdayDetailViewController\
    \ *birthdayDetailViewController = segue.destinationViewController;\n         birthdayDetailViewController.birthday\
    \ = birthday;\n\n     }\n}\n```\n\n在我深入讲解这段代码的细节之前，你首先需要将 `BRBirthdayDetailViewController.h`\
    \ 导入到 `BRHomeViewController.m` 中。滚动到 `BRHomeViewController.m` 源文件的顶部，并添加导入语句：\n\
    \n```\n#import \"BRBirthdayDetailViewController.h\"\n```\n\n探究 `prepareForSegue:sender:`\
    \ 代码，我们的从主页到生日详情的转场有一个 `BirthdayDetail` 标识符。我们可以通过 `segue.identifier` 属性来检查并访问这个字符串。如果标识符匹配\
    \ `BirthdayDetail` 字符串，那么我们就知道当前的转场过渡发生在 Home 和 Birthday Detail 视图控制器之间，因此新的视图控制器必须是\
    \ `BRBirthdayDetailViewController` 的一个实例。\n\n我们可以通过获取当前选中表格行的索引路径来抓取选中的生日字典：\n\
    \n```\nNSIndexPath *selectedIndexPath = self.tableView.indexPathForSelectedRow;\n\
    ```\n\n从选中的索引路径中，我们可以提取 `row` 属性，该属性对应于 `self.birthdays` 数组中相关生日字典的索引。\n\n转场还通过其\
    \ `destinationViewController` 属性暴露了一个指向 Birthday Detail 视图控制器的引用。\n\n最后，我们设置详情视图控制器的\
    \ `birthday` 字典属性：\n\n```\nBRBirthdayDetailViewController *birthdayDetailViewController\
    \ = segue.destinationViewController;\nbirthdayDetailViewController.birthday =\
    \ birthday;\n```\n\n这段代码在 Birthday Detail 视图控制器被添加到导航堆栈之前执行，因此当 `viewWillAppear:`\
    \ 在详情视图控制器中被调用时，它已经可以访问 `birthday` 字典，并能够分别更新其标题和 `photoView` 图片属性。\n\n构建并运行。Birthday\
    \ Detail 视图会更新，在其导航栏标题中显示选定的名人姓名，并在图片视图中显示图像（请参见 图 7-13）。\n\n![图片](img/9781430243748_Fig07-13.jpg)\n\
    \n**图 7-13.** 将数据传递到更新中的 Birthday Detail 视图\n"
- fmt: "### Adding new birthdays\n\nOpen the `BRBirthdayEditViewController.h` header\
    \ file in Xcode and then add a new birthday dictionary property, just like we\
    \ did for the Birthday Detail view controller:\n\n`@property (nonatomic, strong)\
    \ NSMutableDictionary *birthday;`\n\nIn the `BRBirthdayEditViewController.m` source\
    \ file, modify the `viewWillAppear:` implementation to update its subviews based\
    \ on the key values in the `birthday` dictionary:\n\n```\n-(void) viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n\n    NSString *name = self.birthday\
    \ [@\"name\"];\n    NSDate *birthdate = self.birthday[@\"birthdate\"];\n    UIImage\
    \ *image = self.birthday[@\"image\"];\n\n    self.nameTextField.text = name;\n\
    \    self.datePicker.date = birthdate;\n    if (image == nil) {\n        //default\
    \ to the birthday cake pic if there's no birthday image\n        self.photoView.image\
    \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n   \
    \     self.photoView.image = image;\n    }\n\n    [self updateSaveButton];\n}\n\
    ```\n\nBack in the storyboard, select the segue between the home view and Edit\
    \ Birthday navigation controllers, and then give it an `AddBirthday` identifier.\n\
    \nIn the `BRHomeViewController.m` source file, begin by importing `BRBirthdayEditViewController.h`:\n\
    \n`#import \"BRBirthdayEditViewController.h\"`\n\nWe’ll now complete the `prepareForSegue:sender:`\
    \ implementation and handle the segue that’s invoked when the Add Birthday bar\
    \ button item is tapped by the user:\n\n```\n-(void) prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    NSString *identifier = segue.identifier;\n\
    \n    if ([identifier isEqualToString:@\"BirthdayDetail\"]) {\n        //First\
    \ get the data\n        NSIndexPath *selectedIndexPath = self.tableView.indexPathForSelectedRow;\n\
    \        NSMutableDictionary *birthday = self.birthdays[selectedIndexPath.row];\n\
    \n        BRBirthdayDetailViewController *birthdayDetailViewController = segue.destinationViewController;\n\
    \        birthdayDetailViewController.birthday = birthday;\n    }\n    else if\
    \ ([identifier isEqualToString:@\"AddBirthday\"]) {\n        //Add a new birthday\
    \ dictionary to the array of birthdays\n\n        NSMutableDictionary *birthday\
    \ = [NSMutableDictionary dictionary];\n\n        birthday[@\"name\"] = @\"My Friend\"\
    ;\n        birthday[@\"birthdate\"] = [NSDate date];\n        [self.birthdays\
    \ addObject:birthday];\n\n        UINavigationController *navigationController\
    \ = segue.destinationViewController;\n\n        BRBirthdayEditViewController *birthdayEditViewController\
    \ = (BRBirthdayEditViewController *)\nnavigationController.topViewController;\n\
    \        birthdayEditViewController.birthday = birthday;\n    }\n}\n```\n\nWhen\
    \ the user taps Add Birthday from the Home view controller and our `prepareForSegue:sender:`\
    \ method is invoked, we immediately create a new mutable birthday dictionary,\
    \ assign it a default name and birth date values, and add it to the `self.birthdays`\
    \ array:\n\n```\nNSMutableDictionary *birthday = [NSMutableDictionary dictionary];\n\
    \nbirthday[@\"name\"] = @\"My Friend\";\nbirthday[@\"birthdate\"] = [NSDate date];\n\
    [self.birthdays addObject:birthday];\n```\n\nBecause our Edit Birthday view controller\
    \ is a child of a navigation view controller that is presented modally, the segue’s\
    \ `destinationViewController` property is that navigation controller. From that\
    \ navigation controller reference, we can also obtain a reference to the edit\
    \ birthday view controller and finally set the new birthday property on the edit\
    \ view controller:\n\n```\nBRBirthdayEditViewController *birthdayEditViewController\
    \ = (BRBirthdayEditViewController *)\nnavigationController.topViewController;\n\
    birthdayEditViewController.birthday = birthday;\n```\n\nAlthough we’ve modified\
    \ the model (the array of birthdays), the table view in our Home view controller\
    \ will not automatically refresh. That’s easy to fix since we have an outlet reference\
    \ to the table view from the Home view controller. In the `BRHomeViewController.m`\
    \ source file, override `viewWillAppear:` to ensure that our table view is reloaded\
    \ every time the Home view controller is about to appear:\n\n```\n-(void) viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    [self.tableView reloadData];\n}\n\
    ```\n\nBuild and run. You can now add birthdays (see [Figure 7-14](#Chapter07.html#fig_7_14))!\n\
    \n![Image](images/9781430243748_Fig07-14.jpg)\n\n**Figure 7-14.** Adding friends\
    \ and birthdays!\n\nOK, well you can add someone called My Friend as many times\
    \ as you like, but not much more! We’ll improve on this shortly.\n\nNote that\
    \ in our current implementation, Save and Cancel do exactly the same thing: nothing!\
    \ A new birthday dictionary is created by the Home view controller and is added\
    \ to the `birthdays` array.\n\nIn order to implement Cancel functionality, we\
    \ could consider two options:\n\n> *   Passing the birthdays array to the edit\
    \ view controller, as well as the selected `birthday` dictionary, and setting\
    \ up the `cancelAndDismiss:` method to delete the birthday object from the array:\
    \ `[self.birthdays removeObject:self.birthday]`.\n> *   Creating your own delegate\
    \ protocol for birthday editing, subscribing the Home view controller as the delegate\
    \ of the Edit Birthday view controller, and removing the birthday dictionary from\
    \ the `birthdays` array in the Home view controller code in response to a delegate\
    \ callback method.\n\nWe won’t, however, be implementing the Cancel and Save buttons\
    \ in this chapter because we’ll work in these features using Core Data in the\
    \ next chapter."
