  trans: '

    #### 调整图像视图渲染


    根据你用图像选择器拍摄或选取的照片尺寸，你可能会注意到生成的图像没有保持其宽高比。相反，图像会被压缩或拉伸以适应图像视图的边界。在我刚开始学习 iOS 并遇到这个问题时，我的第一反应是要么调整图像视图的大小并使其居中，要么生成一张新的裁剪图像来匹配图像视图的尺寸。结果发现，解决方案比这两种方法都要简单得多。`UIView`
    有一个名为 `contentMode` 的属性，它决定了视图内容如何渲染。`contentMode` 默认为 `UIViewContentModeScaleToFill`，即它会简单地拉伸或压缩其绘制的内容，以适应视图边界的尺寸。如果我们将
    `contentMode` 属性值改为 `UIViewContentModeScaleAspectFill`，图像的宽高比会得到保留，并且图像会填满它被渲染到的图像视图的边界。


    回到故事板中，选中 `photoView` 图像视图。使用属性检查器将模式（Mode）设置改为 Aspect Fill。构建并运行。这次，你应该会发现选中的照片现在会调整大小以填满图像视图的边界，而不会使图像变形。唯一的问题是，图像重叠的侧边或顶部和底部没有被裁剪。不过，这也很容易解决。保持图像视图选中状态，在属性检查器中你会找到一个名为
    Clip Subviews（`UIView.clipsToBounds`）的属性。打开 Clip Subviews 的开关。构建并运行。怎么样？完美裁剪并居中的方形缩略图，正好匹配图像视图的边界（参见图
    6-22）！这多简单啊？！


    *注：目前，我们是在用一个可能非常大的照片来填充一个小缩略图图像视图。在开发后期，我们会从大图中生成缩略图；否则，我们的应用会因渲染不必要的大图而迅速消耗大量内存。*


    ![Image](img/9781430243748_Fig06-22.jpg)


    **图 6-22.** 差，较好，最好！


    ### 总结


    你已经完成了第二天的学习！今天的内容全是关于构建基本的 iOS 用户界面和导航。你学到了


    > *   如何在故事板中构建由视图控制器场景组成的导航层级。

    > *   如何创建视图控制器子类并将它们分配给故事板中的视图控制器。

    > *   如何通过 Interface Builder 的 Outlet 和 Action 将我们的视图和子视图与自定义视图控制器连接起来。

    > *   如何理解委托模式，在我们的视图控制器中实现协议，并响应协议方法的回调。

    > *   如何将原生的 iPhone 相机和相册库集成到我们的应用中。


    我们在导航和用户界面上有了一个很好的开始，但我们还没有处理 iOS 中的数据。猜猜我们明天要做什么？没错，*处理数据*。睡个好觉。![Image](img/smile.jpg)


    ![Image](img/ch.jpg)


    ## 第三天


    ## 处理数据


    ![Image](img/ch.jpg)


    ## 第 7 章


    ## 表格视图、数组和字典——天哪！


    第三天是数据日！到目前为止，我们一直专注于*生日提醒*应用的用户界面和导航。今天，我们将学习如何将数据集成到我们的应用中。


    在本章中，我们将学习如何创建和操作一个字典数组，并根据数据填充我们的应用。在第 8 章中，我们将修改数据实现，使用苹果的 Core Data 框架来提供持久化存储解决方案。


    ### 表格视图


    表格视图是许多 iPhone 应用的核心组件——*生日提醒*也不例外。表格视图使 iPhone 应用能够在小型屏幕设备上以长滚动列表的形式显示大量内容。


    图 7-1 展示了我们最终将在应用主屏幕上呈现的表格视图——列出了用户所有亲朋好友的生日！用户还可以选择列表中的任意生日，应用将导航到显示所选生日的详细信息，将表格视图向左滑出，并让生日详情视图从右侧滑入替换它。


    ![Image](img/9781430243748_Fig07-01.jpg)


    **图 7-1.** `UITableView`：*生日提醒*应用的核心组件


    我们要掌握的首要挑战是，从项目中的本地属性列表文件加载一个名人生日数组，存入一个原生的生日字典数组中。我们将在一个表格视图中显示名人姓名、生日和本地存储的照片。


    从本章源代码附带的 assets 文件夹开始，将 `birthdays.plist` 文件和 Celebrity Pics 文件夹导入到你 Xcode 项目的
    `resources` 组中，如图 7-2 所示。


    ![Image](img/9781430243748_Fig07-02.jpg)


    **图 7-2.** 添加到项目中的名人图片和 `birthdays.plist` 资源


    将故事板的焦点放在 Home 视图控制器上。首先，删除 Push Birthday Detail View Controller 按钮。这会自动删除从 Home
    视图控制器到 Birthday Detail 视图控制器的临时 Segue。现在，从对象库中拖拽一个新的表格视图实例（不要与表格视图控制器实例混淆）到主视图上（参见图
    7-3）。该表格视图成为我们主视图的一个子视图（不要替换你的主视图！）。


    ![Image](img/9781430243748_Fig07-03.jpg)


    **图 7-3.** 向主视图添加表格视图


    选中新的表格视图，使用属性检查器将原型单元格（Prototype Cells）设置增加到 1，这会为表格视图添加一个新的原型单元格供我们使用（参见图 7-4）。


    ![Image](img/9781430243748_Fig07-04.jpg)


    **图 7-4.** 向表格视图添加原型单元格


    我们可以从苹果设计的表格单元格样式列表中选择样式来设计我们的原型单元格，或者我们可以直接自定义原型表格视图单元格，添加子视图、设置背景颜色等等。我们将在第
    9 章中学习创建自定义表格视图单元格；但现在，选择原型单元格，使用属性检查器将其样式改为 Subtitle（参见图 7-5）。副标题样式的表格单元格提供了粗体标题和副标题标签，我们可以在运行时为它们设置文本。


    现在，在属性检查器的 Identifier 文本字段中输入一个重用标识符值。输入 `Cell` 作为文本（参见图 7-5）。


    ![Image](img/9781430243748_Fig07-05.jpg)


    **图 7-5.** 设置可重用的原型表格单元格


    苹果设计的表格视图非常优化。重用标识符的目的是使 `UITableViewCell` 的实例能够被多个表格行重用；例如，如果你的表格高度为 416 点，并且每个表格单元格的高度为
    100 像素，那么表格视图只需要生成五个 `UITableViewCell` 实例就能显示成百上千行！如果你不提供重用标识符，那么为我们的表格视图生成的每个
    `UITableViewCell` 实例将只会被使用一次，这可能导致应用非常占用内存，更不用说性能方面的影响了。


    此时你应该能够构建并运行你的应用，尽管表格视图暂时只会显示空行。

