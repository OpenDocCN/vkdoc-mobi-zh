  trans: '

    ### 添加与编辑生日


    我们应用的用户将能够无限制地添加和编辑生日记录。我们还将提供通过 iPhone 相机或照片库为每个生日分配照片的选项。


    所有生日数据将离线存储在 iPhone 本地的数据库中。我们将通过苹果的`Core Data`框架对数据库进行读写操作（你将在第 8 章中更深入地了解`Core
    Data`）。


    ### 从通讯录和 Facebook 导入生日


    我们将在应用中编程实现一个导入机制，方便用户利用最新的 iOS 6 Facebook 社交集成和原生通讯录框架批量导入生日。不过，我们不会强迫用户导入其所有
    Facebook 好友，而是允许他们自行选择。这正是创建自定义离线存储方案的巨大优势之一：由我们掌控数据。


    将选定的生日持久保存在我们的应用中，还意味着即使操作系统关闭了应用（当然，因为我们正在构建一款经过优化的应用，这种情况绝不会发生），我们也不会丢失这些数据，无需重新与通讯录或
    Facebook 同步。


    ### 笔记功能


    我们将在应用中加入笔记功能——这是用户记录礼物灵感的完美方式。笔记同样会保存并存储在我们的离线`Core Data`存储中。


    ### 提醒通知


    我们的应用将利用 iOS SDK 中的本地通知功能。在应用代码中，我们将安排这些通知提醒，它们会在用户的 iPhone 上按时触发每个生日提醒——即使我们的应用并未运行。我们还会在生日提醒中播放一小段《生日快乐》铃声。


    ### Facebook 社交集成与应用内营销


    我们不会仅仅止步于将 Facebook 生日导入应用。我们将学习如何深度集成 Facebook 的 Graph API 和苹果的 iOS 6 社交框架，让用户无需离开应用即可直接在其好友的
    Facebook 墙上发帖。除了对用户来说是一项实用功能外，我们也为*生日提醒*自动获得了免费广告。通过第三方应用发布的每条 Facebook 帖子都包含一个直接链接，指向源应用。这有助于在每次用户向
    Facebook 好友发送生日快乐祝福时宣传*生日提醒*。


    我们还会让用户轻松地向从通讯录导入的好友发送生日祝福电话、短信或电子邮件。


    ### 竞争分析


    我们已经有了应用创意，但在进入设计与编码阶段之前，现在可能是审视竞争对手的好时机。


    在项目开始时，研究应用最成功的竞争对手总是值得的。


    在 App Store 中搜索你的目标关键词。哪些应用经常出现在搜索结果的前列？通常，这些是下载量最高的应用。这些成功的竞争对手做对了什么？可能包括以下因素的组合：


    > *  他们拥有出色的图标。

    > *  他们构建了一款优秀的应用。

    > *  他们设计了精美的 UI（用户界面）。

    > *  他们的应用易于使用，用户体验直观。

    > *  他们将社交网络有效地集成到应用中。

    > *  他们开展了强有力的营销活动。

    > *  他们的应用被苹果在 App Store 中推荐。

    > *  他们获得了大量 4 星和 5 星评价。

    > *  他们率先有了这个想法，并抢在竞争对手之前发布。


    列表中的最后一点通常是最常见的情况之一。许多早期带着好创意进入 App Store 的应用开发者，至今仍在他们的类别中占据强势地位。进入你所在类别的前 100
    名，会为你的应用带来大量曝光。如果你幸运地达到这个位置，你的应用在 App Store 中的可见度将大大提高——从而获得更大的持续成功机会。


    作为一名新的应用开发者，我建议你重点关注列表中的前六点（也是唯一受你控制的几点），进而通过良好的市场营销，你的辛勤工作可能会让你在排行榜上稳步上升。


    在其巅峰时期，*Tap to Chat* 曾位列美国 App Store 免费社交网络应用的前 50 名——每天获得超过 4000 次下载。这种情况持续了相当长一段时间。随后，我的团队在一家新公司旗下发布了该应用的改进版本。然而，新版本从未幸运地达到与原版相同的排名位置。这并不重要，因为我们的第一个版本已经占据了强势地位，并保持了其受欢迎程度。


    在准备这本书时，我只用了五天就构建了*生日提醒*的第一个版本。在此之前，我仔细研究了竞争对手的应用。我查看了搜索结果，还下载并付费购买了几款在众多应用中脱颖而出的其他生日提醒应用。实际上，我在“birthday
    reminder”的搜索结果中发现了 120 款 iPhone 竞争对手应用。不过，这并没有打消我的念头。首先，我有信心至少能实现列表中的前五点，从而取得成功：我能构建一款拥有直观用户体验的精美应用，出色地完成其核心任务——提醒用户所有朋友的生日。这款应用将以对用户有用的方式整合
    Facebook 社交媒体，同时也能成为赋能点对点营销的有效方法。


    实际上，搜索结果让我备受鼓舞。是的，有些竞争对手应用很不错，但毫不客气地说，大多数都不怎么样。


    一些排名靠前的应用有数百条评分和评论。这也令人鼓舞，因为它表明，只要你能被注意到，生日提醒应用就有强劲的市场需求。


    如果你想要亲自查看本书将从头到尾指导你构建的应用，现在就可以从 App Store 下载*Birthday Reminder for Facebook*。

    '
- fmt: '### The App Store title


    Registered Apple developers (see [Chapter 2](#Chapter02.html#ch2)) submit their
    apps to the App Store via the `iTunes Connect` web site (see [Chapter 14](#Chapter14.html#ch14)).
    `iTunes Connect` will not permit you to set an App Store title for your app if
    it’s already taken. You’ll see that some developers get around this by adding
    “+” or “Pro” or other suffixes to get (roughly) the App Store title they want.


    Don’t confuse your App Store title with the *bundle display name*, which is the
    title of your app on the iPhone home screen. They are two very different animals.
    The display name is set in your app bundle’s `Info.plist` (see [Chapter 3](#Chapter03.html#ch3))
    and is limited to about 12 characters before getting truncated.


    Alongside your icon, your App Store title will be your primary entry point to
    app sales/downloads. Potential customers will only have your icon and the first
    few words of your App Store title when scrolling through the rows and rows of
    competitor apps.


    Avoid being too obscure with your App Store title. You should include the keywords
    you’d expect users to search and find your app. The App Store search algorithm
    gives a good amount of importance to the words in app titles. Unless you already
    have a strong brand outside of iTunes, you’ll need to choose the words in your
    title very carefully.


    The order of the words in the title is equally important. In iOS 6, you have about
    40 characters until the App Store truncates your title when browsed on an iPhone.
    For users still on iOS 5, the App Store title is restricted to a single line and
    gets truncated after about 18 characters. Make the most of those characters! Make
    sure that the first word or two in your title, combined with your icon, conveys
    exactly what your app does.


    Don’t shy away from using additional relevant keywords in your App Store title;
    for example, *Portfolio Pro for iPad—Brandable Photo and Video App*. Including
    a strapline in your title improves your chances of appearing in relevant App Store
    searches.


    I was lucky enough to grab the title *Birthday Reminder for Facebook* when I built
    the first iteration of this app. Facebook users are a big market on the App Store.
    They will help promote the app each time they use it to post a birthday message
    on a friend’s wall. It’s worth targeting these users.


    ### The icon design


    It may be that you’re a jack-of-all-trades when it comes to making iPhone apps.
    You can program well-written object-oriented code *and* have an artistic eye for
    designing beautiful user interfaces. Lucky you!


    For most of us, it’s one or the other. This book is aimed at developers, so as
    a handy hint, if you’re looking to outsource the design work of your app to a
    talented iOS design guru, then I’d highly recommend starting at `www.dribbble.com`.
    Dribbble is a wonderful site for finding talented designers. It’s a social site
    where designers share and comment on their latest work. Try a search for iOS or
    iPhone, and browse the many pages of related designs. It’s a great way to discover
    designers with a style that suits your app idea.


    Using Dribbble, I discovered the designer of the app icon and user interface for
    *Birthday Reminder*.


    As with your App Store title, your icon provides the first impression of your
    iPhone app. Potential users will decide whether to find out more about your app
    initially based on its icon. So don’t leave the icon until the last minute—it’s
    not an afterthought, it’s as important as the app itself!


    New iPhone and iPod Touch devices have retina displays. So an eye-catching, beautiful
    icon that makes great use of the 114×114 pixel icon size on a retina screen is
    a must.


    [Figure 1-1](#Chapter01.html#fig_1_1) shows the icon for our app. A strong yet
    fun and colorful design with a subtle 3D effect will stand out against our competitors’
    icons.


    ![Image](images/9781430243748_Fig01-01.jpg)


    **Figure 1-1.** *Birthday Reminder*’s icon: simple, colorful, and eye-catching


    As with your App Store title, don’t try to be too clever with your icon. It’s
    important that your potential users immediately grasp what your app does from
    the icon design. I chose a birthday cake design for our app icon that also translates
    into the user interface design for our app.


    ### The user interface design


    Most of the designers I work with use Photoshop as their tool of choice when designing
    for iOS apps. Thanks to the talented folk over at Teehan+Lax, designers have access
    to a very handy PSD file with all of the native iOS controls mocked up into Photoshop
    layers in a single iOS GUI (graphical user interface) PSD file. This makes an
    ideal starting point when designing for iOS. The PSD is free to download from
    `www.teehanlax.com/downloads` (see [Figure 1-2](#Chapter01.html#fig_1_2)).


    ![Image](images/9781430243748_Fig01-02.jpg)


    **Figure 1-2.** iOS GUI PSD by Teehan+Lax


    #### Retina displays, the status bar, and the iPhone 5


    The iPhone screen pre-iPhone 5 is 320×480 *points*. This is the same for both
    retina and non-retina screens. Points are different from pixels. In Objective-C,
    every reference to the size or the position of a view is measured in points. The
    iPhone 5 screen is 320×568 points.


    Prior to the iPhone 4, each point was made up of a single pixel. With retina displays,
    however, there are four pixels squeezed into every point (2×2 grid), resulting
    in the dimensions of an iPhone 4 or iPhone 4s retina display being a total of
    640×960 pixels (see [Figure 1-3](#Chapter01.html#fig_1_3)). The iPhone 5 screen
    packs in 640×1136 pixels (see [Figure 1-3](#Chapter01.html#fig_1_3)). The status
    bar is 20 points high, and therefore 40 pixels high on a retina display.


    I’d suggest always including the iOS status bar in your app design. By default,
    the status bar in an app is displayed, but in code or via the `Info.plist` (see
    [Chapter 3](#Chapter03.html#ch3)), developers can hide the status bar and make
    their apps full screen. Avoid doing so unless you have a really good reason, such
    as transitioning into a full screen photo slideshow.


    The status bar includes valuable information for our user, such as the current
    phone and Internet signal level, the time, and the battery life remaining. Without
    the status bar, you still have a whooping great 320×460 points (320×548 on the
    iPhone 5!) of screen real estate for your app view — the sort of space Blackberry
    developers can only dream about!


    ![Image](images/9781430243748_Fig01-03.jpg)


    **Figure 1-3.** Points and pixels of a retina display'
