  raw: '##### Using the date picker as a time setting control


    Ensure the date picker is pinned to the bottom of the view (just as you did for
    the Edit Birthday view) and then change its Mode attribute to Time. Set the Interval
    attribute of the date picker to five minutes (see [Figure 6-10](#Chapter06.html#fig_6_10)).


    ![Image](images/9781430243748_Fig06-10.jpg)


    **Figure 6-10.** Configuring the date picker as a time setting control


    Control-drag to create outlets for both the label and the date picker in the `BRNotificationTimeViewController.h`
    header: `whatTimeLabel` and `timePicker`, respectively. Control-drag again from
    the date picker to `BRNotificationTimeViewController.h` to create an Interface
    Builder action for the Value Changed event, and name the action `didChangeTime:`.
    `BRNotificationTimeViewController.h` should end up as follows:


    `#import "BRCoreViewController.h"`


    `@interface BRNotificationTimeViewController : BRCoreViewController`

    `@property (weak, nonatomic) IBOutlet UILabel *whatTimeLabel;`

    `@property (weak, nonatomic) IBOutlet UIDatePicker *timePicker;`

    `- (IBAction)didChangeTime:(id)sender;`


    `@end`


    Now, when the user changes the time displayed on our date picker, our new `didChangeTime:`
    action is invoked. This enables us to grab the date value of `UIDatePicker`, but
    how can we extract just the hour and minutes that the user has set? Here’s the
    code to add to the implementation of `didChangeTime:`:


    `- (IBAction)didChangeTime:(id)sender {`

    **`NSDateComponents *components = [[NSCalendar currentCalendar]`**

    **`components:NSHourCalendarUnit|NSMinuteCalendarUnit fromDate:self.timePicker.date];`**


    **`    NSLog(@"Changed time to: %d:%d",components.hour,components.minute);  `**

    `}`


    We’re going to become best friends with the `NSDateComponents` over the next few
    days. It’s a very powerful class for manipulating a date and dividing it into
    individual year, month, day, minute, and second components. We instantiate an
    instance of `NSDateComponents` from the current calendar of the user’s device,
    and we pass in unit flags, specifying which components we’re interested in— just
    hour and minutes for this example. We also pass in the date from our date picker.
    We can then directly access the hour and minute properties of our `NSDateComponents`
    instance. We’ll explore more uses of `NSDateComponents` in latter chapters when
    we have to figure our the number of days remaining until each saved birthday,
    the age users will be on their next birthday, and many other date-related values.


    ### More user interface action with the camera and Photo Library


    Any birthday added or imported into our *Birthday Reminder* app will be able to
    have an associated photo. The photo, however, is optional. If a birthday has an
    associated photo, then we’ll display it on the home screen birthday list. It will
    display even larger on the birthday detail and edit screens. If there’s no photo
    associated with a birthday, then we’ll display a birthday cake instead. ![Image](images/smile.jpg)


    Let’s start this photo feature by adding some new subviews to the edit birthday
    view in our storyboard. Drag a new view (`UIView`) instance onto the edit birthday
    view from the Object Library. Use the size inspector to position the subview (x=10
    and y=20). Resize the view to width=71 and height=71 (see [Figure 6-11](#Chapter06.html#fig_6_11)).


    ![Image](images/9781430243748_Fig06-11.jpg)


    **Figure 6-11.** Adding an image view holder


    The newly added view is a container view for a thumbnail background image, the
    birthday photo, and a Pic Photo label. By default, Xcode sets an opaque white
    background color on any new view added to a storyboard. Our holder needs to be
    transparent, but not invisible because it will eventually have round rectangle
    corners. Keeping the container view selected, use the attributes inspector to
    change the background color of the view to Apple’s built-in clear color (see [Figure
    6-12](#Chapter06.html#fig_6_12)).


    ![Image](images/9781430243748_Fig06-12.jpg)


    **Figure 6-12.** Making a view’s background transparent with a clear color


    Within the source code for this chapter, you’ll find four new retina and non-retina
    image assets to add to your project. Drag, drop, and add the images to the `resources/images`
    group in your Xcode project (see [Figure 6-13](#Chapter06.html#fig_6_13)).


    ![Image](images/9781430243748_Fig06-13.jpg)


    **Figure 6-13.** Birthday cake and thumbnail background image assets added to
    the project


    Back in our edit birthday view, drag a new image view (`UIImageView`) from the
    Object Library into the container view. Then position it (x=0, y=0, width=71,
    height=71) to match its parent view. With your new image view selected, use the
    attributes inspector to change its image property to `thumbnail-background.png`,
    one of the image assets we just added to our project. The image displayed should
    be a round cornered thumbnail background PNG.


    Repeat the process of adding, positioning, and sizing a new image view again;
    but this time, select the `icon-birthday-cake.png` image to sit in front of the
    thumbnail background (see [Figure 6-14](#Chapter06.html#fig_6_14)).


    ![Image](images/9781430243748_Fig06-14.jpg)


    **Figure 6-14.** A container view with two subviews: thumbnail background and
    birthday cake image views


    Add a third subview to the container view. This time it’s a new label (`UILabel`)
    instance. Using the attributes inspector, change the label’s alignment to Center,
    its font size to system 12, its text color to Light Text Color, and its text to
    `Pic Photo`. Scrolling through the attributes inspector to the View attributes
    of the label, tap the Background color swatch. Using the Gray Scale Slider, create
    and apply a new Black color with 50 percent opacity to the label (see [Figure
    6-15](#Chapter06.html#fig_6_15)).


    ![Image](images/9781430243748_Fig06-15.jpg)


    **Figure 6-15.** Creating a new translucent color with 50 percent opacity


    Finally, position the new label (x=0, y=56, width=71, height=15). The results
    should look like [Figure 6-16](#Chapter06.html#fig_6_16).


    ![Image](images/9781430243748_Fig06-16.jpg)


    **Figure 6-16.** Our holder complete with images and label


    Using the Assistant Editor layout, create new outlets in `BRBirthdayEditViewController.h`
    for the container view, image view with the cake, and label view, naming them
    `photoContainerView`, `photoView`, and `picPhotoLabel`, respectively. When views
    are layered on top of one another, the most accurate way to ensure you’re Control-dragging
    from the right view is to open the document outline pane and drag directly from
    the view hierarchy in the document outline to the header file (see [Figure 6-17](#Chapter06.html#fig_6_17)).


    ![Image](images/9781430243748_Fig06-17.jpg)


    **Figure 6-17.** Control-drag new outlets from the document outline pane


    The resulting outlet code in `BRBirthdayEditViewController.h` header:


    `@property (weak, nonatomic) IBOutlet UIView *photoContainerView;`

    `@property (weak, nonatomic) IBOutlet UILabel *picPhotoLabel;`

    `@property (weak, nonatomic) IBOutlet UIImageView *photoView;`'
  trans: "\n### 使用日期选择器作为时间设置控件\n\n确保日期选择器固定在视图底部（就像你为“编辑生日”视图所做的那样），然后将其`Mode`属性更改为`Time`。将日期选择器的`Interval`属性设置为五分钟（参见图\
    \ 6-10）。\n\n![Image](img/9781430243748_Fig06-10.jpg)\n\n**图 6-10.** 将日期选择器配置为时间设置控件\n\
    \n按住 Control 键拖拽，在`BRNotificationTimeViewController.h`头文件中分别为标签和日期选择器创建输出口：分别命名为`whatTimeLabel`和`timePicker`。再次按住\
    \ Control 键从日期选择器拖拽到`BRNotificationTimeViewController.h`，为“值已更改”（Value Changed）事件创建一个界面构建器操作，并将该操作命名为`didChangeTime:`。`BRNotificationTimeViewController.h`最终应如下所示：\n\
    \n```\n#import \"BRCoreViewController.h\"\n\n@interface BRNotificationTimeViewController\
    \ : BRCoreViewController\n@property (weak, nonatomic) IBOutlet UILabel *whatTimeLabel;\n\
    @property (weak, nonatomic) IBOutlet UIDatePicker *timePicker;\n- (IBAction)didChangeTime:(id)sender;\n\
    \n@end\n```\n\n现在，当用户更改日期选择器上显示的时间时，我们的新`didChangeTime:`操作将被调用。这使我们能够获取`UIDatePicker`的日期值，但我们如何提取用户设置的仅小时和分钟呢？以下是添加到`didChangeTime:`实现中的代码：\n\
    \n```\n- (IBAction)didChangeTime:(id)sender {\n    NSDateComponents *components\
    \ = [[NSCalendar currentCalendar]\n        components:NSHourCalendarUnit|NSMinuteCalendarUnit\
    \ fromDate:self.timePicker.date];\n\n    NSLog(@\"Changed time to: %d:%d\",components.hour,components.minute);\
    \  \n}\n```\n\n在接下来的几天里，我们将与`NSDateComponents`成为最好的朋友。它是一个非常强大的类，用于操作日期并将其分解为单独的年、月、日、分钟和秒组件。我们从用户设备的当前日历实例化一个`NSDateComponents`实例，并传入单位标志，指定我们感兴趣的组件——本例中仅为小时和分钟。我们还会传入日期选择器中的日期。然后，我们可以直接访问`NSDateComponents`实例的小时和分钟属性。我们将在后续章节中探讨`NSDateComponents`的更多用法，届时我们需要计算每个已保存生日剩余的天数、用户下一个生日时的年龄，以及其他许多与日期相关的值。\n\
    \n### 使用相机和相册增强用户界面交互\n\n添加或导入到*Birthday Reminder*应用中的任何生日都可以附带一张照片。不过，照片是可选的。如果某个生日有关联的照片，我们将在主屏幕的生日列表中显示它。在生日详情和编辑屏幕中，它会显示得更大。如果没有照片与生日关联，那么我们将显示一个生日蛋糕。![Image](img/smile.jpg)\n\
    \n让我们开始这个照片功能，首先在故事板中的编辑生日视图中添加一些新的子视图。从对象库中将一个新的视图（`UIView`）实例拖到编辑生日视图上。使用尺寸检查器将子视图定位（x=10,\
    \ y=20）。将视图大小调整为宽度=71，高度=71（参见图 6-11）。\n\n![Image](img/9781430243748_Fig06-11.jpg)\n\
    \n**图 6-11.** 添加图像视图容器\n\n新添加的视图是一个容器视图，用于容纳缩略图背景图像、生日照片和“Pic Photo”标签。默认情况下，Xcode\
    \ 会在添加到故事板的任何新视图上设置不透明的白色背景色。我们的容器需要是透明的，但不能不可见，因为它最终将具有圆角矩形。保持容器视图处于选中状态，使用属性检查器将视图的背景色更改为\
    \ Apple 内置的透明颜色（参见图 6-12）。\n\n![Image](img/9781430243748_Fig06-12.jpg)\n\n**图\
    \ 6-12.** 使用透明颜色使视图背景透明\n\n在本章的源代码中，您会找到四个新的 Retina 和非 Retina 图像资源，需要添加到您的项目中。将这些图像拖拽、放置并添加到您的\
    \ Xcode 项目中的`resources/images`组中（参见图 6-13）。\n\n![Image](img/9781430243748_Fig06-13.jpg)\n\
    \n**图 6-13.** 项目中添加的生日蛋糕和缩略图背景图像资源\n\n回到我们的编辑生日视图，从对象库中将一个新的图像视图（`UIImageView`）拖到容器视图中。然后将其定位（x=0,\
    \ y=0, width=71, height=71）以匹配其父视图。选中您的新图像视图后，使用属性检查器将其`image`属性更改为`thumbnail-background.png`，这是我们刚刚添加到项目中的图像资源之一。显示的图像应该是一个圆角缩略图背景\
    \ PNG。\n\n再次重复添加、定位和调整新图像视图大小的过程；但这次，选择`icon-birthday-cake.png`图像，使其位于缩略图背景的前面（参见图\
    \ 6-14）。\n\n![Image](img/9781430243748_Fig06-14.jpg)\n\n**图 6-14.** 一个容器视图，包含两个子视图：缩略图背景和生日蛋糕图像视图\n\
    \n向容器视图添加第三个子视图。这次是一个新的标签（`UILabel`）实例。使用属性检查器，将标签的对齐方式更改为居中，字体大小更改为系统 12，文本颜色更改为浅色文本颜色，并将其文本更改为`Pic\
    \ Photo`。滚动属性检查器到标签的视图属性，点击背景颜色色板。使用灰度滑块，创建一个新的黑色颜色，并将 50%的不透明度应用到标签上（参见图 6-15）。\n\
    \n![Image](img/9781430243748_Fig06-15.jpg)\n\n**图 6-15.** 创建一个具有 50%不透明度的新半透明颜色\n\
    \n最后，定位新标签（x=0, y=56, width=71, height=15）。结果应类似于图 6-16。\n\n![Image](img/9781430243748_Fig06-16.jpg)\n\
    \n**图 6-16.** 我们的容器视图已完成，包含图像和标签\n\n使用助理编辑器布局，在`BRBirthdayEditViewController.h`中为容器视图、带有蛋糕的图像视图和标签视图创建新的输出口，分别命名为`photoContainerView`、`photoView`和`picPhotoLabel`。当视图相互叠放时，确保您按住\
    \ Control 键从正确视图拖拽的最准确方法是打开文档大纲窗格，然后直接从文档大纲中的视图层次结构拖拽到头文件中（参见图 6-17）。\n\n![Image](img/9781430243748_Fig06-17.jpg)\n\
    \n**图 6-17.** 从文档大纲窗格按住 Control 键拖拽以创建新的输出口\n\n`BRBirthdayEditViewController.h`头文件中生成的输出口代码如下：\n\
    \n```\n@property (weak, nonatomic) IBOutlet UIView *photoContainerView;\n@property\
    \ (weak, nonatomic) IBOutlet UILabel *picPhotoLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UIImageView *photoView;\n```\n"
- fmt: "### Gesture recognizers\n\nWe're going to prompt the user to take a new photo\
    \ with the camera or select a photo from their iPhone Photo Library to assign\
    \ to the birthday they are adding or editing. Our Pic Photo label already indicates\
    \ that the user needs to tap the image icon to replace the default cake image.\n\
    \nOur app needs to respond to the user tapping the photo container view. We can't\
    \ use target-action because `UIView` is not a subclass of `UIControl`. Instead,\
    \ we need to add a tap gesture recognizer to capture the user tapping with their\
    \ finger on the view.\n\nScroll down through the Object Library until you find\
    \ the tap gesture recognizer (`UITapGestureRecognizer`) object. Drag a new instance\
    \ onto the photo container view in the document outline (see [Figure 6-18](#Chapter06.html#fig_6_18)).\n\
    \n![Image](images/9781430243748_Fig06-18.jpg)\n\n**Figure 6-18.** Drag and drop\
    \ the new tap gesture recognizer onto the container view in the document outline\
    \ pane\n\nXcode displays the newly added tap gesture recognizer instance in the\
    \ document outline pane (at the bottom of the list of objects). Control-click\
    \ the added tap gesture recognizer to open its contextual menu. You'll see the\
    \ new `gestureRecognizers` outlet collection that connects the recognizer to the\
    \ photo container view.\n\nWe've already done enough to detect a tap on the photo\
    \ container view, but we need to also create an action connection from the tap\
    \ gesture recognizer to `BRBirthdayEditViewController.h`.\n\nUsing the Assistant\
    \ Editor with `BRBirthdayEditViewController.h` displaying in the right pane and\
    \ the storyboard in the left pane, Control-drag from the tap gesture recognizer\
    \ to `BRBirthdayEditViewController.h` to create a new action called `didTapPhoto`,\
    \ as shown in [Figure 6-19](#Chapter06.html#fig_6_19).\n\n![Image](images/9781430243748_Fig06-19.jpg)\n\
    \n**Figure 6-19.** Creating an action from the tap gesture recognizer named `didTapPhoto:`\n\
    \nJump into `BRBirthdayEditViewController.m` and add a call to `NSLog` to check\
    \ the photo tapping is working:\n\n```\n- (IBAction)didTapPhoto:(id)sender {\n\
    \    NSLog(@\"Did Tap Photo!\");\n}\n```\n\nBuild and run. Does the debug print\
    \ our Did Tap Photo! each time you tap on the cake? Excellent. ![Image](images/smile.jpg)\n\
    \n### Implementing an action sheet\n\nWe want to give the user the option to pick\
    \ a photo from their library *or* take a photo with the camera. We're going to\
    \ present these two options via an action sheet. Before we extend the `didTapPhoto:`\
    \ method, we need to declare in our header file that `BRBirthdayEditViewController`\
    \ implements the `UIActionSheetDelegate` protocol:\n\n```\n@interface BRBirthdayEditViewController\
    \ : BRCoreViewController<UITextFieldDelegate, UIActionSheetDelegate>\n```\n\n\
    Now to finish the `didTapPhoto:` method:\n\n```\n- (IBAction)didTapPhoto:(id)sender\
    \ {\n    NSLog(@\"Did Tap Photo!\");\n    if (![UIImagePickerController\nisSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
    \ {\n        NSLog(@\"No camera detected!\");\n        return;\n    }\n    \n\
    \    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:nil delegate:self\n\
    cancelButtonTitle:@\"Cancel\" destructiveButtonTitle:nil otherButtonTitles:@\"\
    Take a\nPhoto\",@\"Pick from Photo Library\", nil];\n    [actionSheet showInView:self.view];\n\
    }\n```\n\nBuild and run. Do you get the resulting action menu displayed in [Figure\
    \ 6-20](#Chapter06.html#fig_6_20)? No? Are you running it on the iOS simulator?\
    \ You are? Well, that's the reason then. The iOS simulator doesn't have a camera,\
    \ so it gets caught by our conditional statement; that is, no camera source type\
    \ is available, so don't give the user the option to take a photo with the camera:\n\
    \n```\nif (![UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\n\
    {\n            NSLog(@\"No camera detected!\");\n            return;\n       \
    \ }\n``` \n![Image](images/9781430243748_Fig06-20.jpg)\n\n**Figure 6-20.** Displaying\
    \ an action sheet\n\nYou'll need to run the app on a device with a camera to have\
    \ the option to take a photo with the camera."
  raw: '#### Gesture recognizers


    We’re going to prompt the user to take a new photo with the camera or select a
    photo from their iPhone Photo Library to assign to the birthday they are adding
    or editing. Our Pic Photo label already indicates that the user needs to tap the
    image icon to replace the default cake image.


