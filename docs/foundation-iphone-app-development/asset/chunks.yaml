    the game stage progresses to the dealer’s turn.


    Did you spot this code in the header:


    `@class BJDCard;`


    This is what’s known as a forward class declaration. Some of the public methods
    in `BJDGameModel` return instances of `BJDCard`. The compiler will complain if
    we don’t either import `BJDCard` in the header like this:


    `#import "BJDCard.h"`


    Or add a forward class declaration like the one I’ve implemented. The forward
    class declaration lets the compiler know that although we haven’t yet declared
    the `BJDCard` class, it will be declared—trust us, compiler! You’ll see that I’ve
    actually imported `BJDCard.h` in the source implementation of `BJDGameModel.m`.
    In general, this is the best way to include references to other classes in your
    header files, via forward class declarations. Then be sure to import the header(s)
    in the source file.


    Although importing `BJDCard.h` in the `BJDGameModel.h` header file works fine
    on this occasion, you will run into horrible compiler errors at some point if
    you continue to work this way. An error will occur if you have two classes that
    both reference each other in the header file. They are both relying on the other
    file to be imported by the compiler first, so the compiler gets its knickers in
    a twist! The solution: use forward class declarations in your header files rather
    than import declarations.


    ##### Our MVC blackjack implementation


    The way our game will work is that `BJViewController` is the controller in our
    MVC implementation. The controller has access to the model, but the model has
    no knowledge whatsoever of the controller. It’s a similar one-way relationship
    with the controller and the view.


    `BJViewController` will control the show: when the app first loads, `BJViewController`
    calls `resetGame` on the model and then renders the view to represent the model.
    During the player’s turn, `BJViewController` listens for the Touch Up Inside action
    on the Stand and Hit buttons, and tells the model to deal a new card. Again, `BJViewController`
    renders the view. `BJViewController` also calls the `updateGameStage` method of
    the model, which checks whether the player has gone bust or reached his maximum
    five-card hand, and progresses the game stage accordingly.


    Once it’s the dealer’s turn, `BJViewController` renders the second card face-up
    and asks the model to check whether the dealer should stand, again via the `updateGameStage`
    method. If the dealer needs to hit, then `BJViewController` implements a delay
    timer to simulate the dealing of a third card. `BJViewController` calls `updateGameStage`
    again, and then deals another delayed card until the dealer goes bust or wins.'
  trans: "\n# 游戏模型\n\n我们先暂时把 `BJDCard` 放在一边，但在继续之前，请确保应用能正常编译。构建并运行应用，你应该只会看到我们在章节开头创建的视图布局。只要你的应用版本没有崩溃，那就一切正常！\n\
    \n恐怕我在准备这个应用时稍微偷了点懒。我已经为你写好了一些代码。本章的目标是向你介绍 Objective-C，如果我逐行讲解黑杰克应用的每一行代码，本章恐怕会写得像一本书那么厚！\n\
    \n现在为我们的应用添加一个新类。我已经写好了大部分新的 `BJDGameModel` 类，因此你只需将实际的类文件添加到项目中，而无需从头创建文件。\n\n\
    首先，在项目导航器中选择 `data` 组，使用 ![Image](img/U002a.jpg) 键盘快捷键或通过 File ![Image](img/U001.jpg)\
    \ Add Files to “Blackjack”，导航到 `BJDGameModel` 的头文件和源文件，将它们一并选中，然后添加到你的项目中（参见图\
    \ 4-15）。\n\n![Image](img/9781430243748_Fig04-15.jpg)\n\n**图 4-15.** 向 Xcode 项目添加\
    \ `BJDGameModel` 头文件和源文件\n\n`BJDGameModel` 引用了 `BJDCard`，所以为了检查在开发 `BJDCard` 过程中是否遗漏了什么，值得再次构建并运行，以确保项目仍然能无错误地编译。\n\
    \n让我们看看我在 `BJDGameModel` 中为你提供的代码。保持在助理编辑器布局中，我们可以快速浏览头文件中的公共接口属性和方法（参见图 4-16）。`BJDGameModel`\
    \ 是一个管理一副牌以及庄家和玩家手牌的类；每个数组包含多个 `BJDCard` 实例。`BJDGameModel` 还管理游戏阶段。在黑杰克的每一局游戏中，玩家先行动，接着庄家行动，然后游戏结束。因此你会看到我创建了另一个自定义枚举来追踪这三个游戏阶段：\n\
    \n```\ntypedef enum : int\n{\n    BJGameStagePlayer,\n    BJGameStageDealer,\n\
    \    BJGameStageGameOver\n}BJGameStage;\n```\n\n我们的游戏模型暴露了一个公共的 `gameStage` 属性。我们的视图控制器\
    \ `BJViewController` 可以访问模型，因此能够在任何时刻检查游戏阶段，并根据模型决定如何渲染视图。\n\n![Image](img/9781430243748_Fig04-16.jpg)\n\
    \n**图 4-16.** 分析 `BJDGameModel`\n\n*注意**：你可以使用跳转栏快速查找头文件和源文件中的方法和属性声明及实现（参见图 4-16）。*\n\
    \n模型中还有另一个属性：`maxPlayerCards`。正如我在本章前面提到的，这是黑杰克实现中的一个注意事项：我们允许庄家或玩家手牌最多五张。如果玩家手牌达到五张且尚未爆牌，那么他的回合结束，游戏阶段进入庄家回合。\n\
    \n你是否在头文件中注意到了这段代码：\n\n```\n@class BJDCard;\n```\n\n这就是所谓的向前类声明。`BJDGameModel`\
    \ 中的一些公共方法会返回 `BJDCard` 的实例。如果我们不在头文件中像这样导入 `BJDCard`：\n\n```\n#import \"BJDCard.h\"\
    \n```\n\n或者像我这样添加一个向前类声明，编译器就会报错。向前类声明让编译器知道，虽然我们尚未声明 `BJDCard` 类，但它将会被声明——请相信我们，编译器！你会看到，我实际上在\
    \ `BJDGameModel.m` 的源实现中导入了 `BJDCard.h`。一般来说，这是在头文件中引用其他类的最佳方式，即通过向前类声明。然后确保在源文件中导入头文件。\n\
    \n尽管这次在 `BJDGameModel.h` 头文件中导入 `BJDCard.h` 没有问题，但如果继续这样操作，将来可能会遇到可怕的编译器错误。如果两个类在头文件中相互引用，就会出错。它们都依赖编译器先导入对方文件，这会让编译器陷入混乱！解决方案：在头文件中使用向前类声明，而不是导入声明。\n\
    \n## 我们的 MVC 黑杰克实现\n\n我们的游戏运行方式为：`BJViewController` 是 MVC 实现中的控制器。控制器可以访问模型，但模型对控制器一无所知。类似地，控制器与视图之间也是单向关系。\n\
    \n`BJViewController` 将控制整个流程：当应用首次加载时，`BJViewController` 调用模型的 `resetGame` 方法，然后渲染视图以显示模型状态。在玩家回合中，`BJViewController`\
    \ 监听“停牌”和“要牌”按钮的“内部触摸事件”动作，并告知模型发一张新牌。接着，`BJViewController` 再次渲染视图。`BJViewController`\
    \ 还会调用模型的 `updateGameStage` 方法，该方法检查玩家是否爆牌或达到五张手牌上限，并相应地推进游戏阶段。\n\n一旦进入庄家回合，`BJViewController`\
    \ 将第二张牌正面朝上渲染，并通过 `updateGameStage` 方法询问模型庄家是否应该停牌。如果庄家需要要牌，那么 `BJViewController`\
    \ 会设置一个延迟计时器来模拟第三张牌的发放。`BJViewController` 再次调用 `updateGameStage`，然后继续发放延迟牌，直到庄家爆牌或获胜。\n"
- fmt: "### Class methods\n\nWithin the `BJDGameModel` source file, you’ll find a\
    \ private property named `cards`, which is a mutable array where we store our\
    \ pack of 52 `BJDCard` instances. We’ve declared the array as mutable because\
    \ we’ll be popping cards off the array as they are dealt into the `playerCards`\
    \ and `dealerCards` mutable arrays. However, I haven’t provided you with prewritten\
    \ code for generating a pack of cards. So let’s do that now!\n\nThe controller\
    \ calls the `resetGame` method of `BJDGameModel`. This is where we need to generate\
    \ a pack of cards. At the moment, `cards` is set to an empty array:\n\n```\nself.cards\
    \ = [NSMutableArray array];\n```\n\nWe could run a loop here in the `BJDGameModel`\
    \ class directly, but generating a pack of 52 cards might be something we want\
    \ to do in other card games. Seems to me this would make a suitable convenience\
    \ method for the actual `BJDCard` class. We’ve already seen how some classes,\
    \ like `NSArray` and `NSDictionary`, expose factory/convenience methods for generating\
    \ instances of themselves. In this case, we’ll create a class method on `BJDCard`\
    \ that generates a mutable array of 52 instances of `BJDCard`!\n\nSwitch back\
    \ to work on the `BJDCard` class in the Assistant Editor. Have you discovered\
    \ that in Xcode, you can have multiple Objective-C files open simultaneously?\
    \ You can even set your multiple files to all use the Assistant Editor layout.\
    \ Double-clicking a file in the Project Navigator opens a new window by default\
    \ in Xcode. I prefer viewing multiple tabs than windows. To set Xcode to open\
    \ a new tab rather than a new window, go into the Xcode General Preferences, and\
    \ under Double-Click Navigation, change the selected option to Uses Separate Tab.\n\
    \nNow viewing `BJDCard.h`, let’s declare our new class method in the header:\n\
    \n```\n+(NSMutableArray *) generateAPackOfCards;\n```\n\nDo you notice the subtle\
    \ difference between the syntax of class methods and instance methods (the other\
    \ three in this class)? The syntax for declaring a class method uses a “`+`” rather\
    \ than a “–” at the beginning of the declaration. Now switch to working on `BJDCard.m`\
    \ in the source file, and add the following code:\n\n```\n+(NSMutableArray *)\
    \ generateAPackOfCards\n{\n    NSMutableArray *arr = [NSMutableArray array];\n\
    \n    BJDCard *card;\n\n    int suit,digit;\n\n    for (suit=0;suit<4;suit++)\
    \ {\n        for (digit=1;digit<=13;digit++)\n        {\n            card = [[BJDCard\
    \ alloc] init];\n            card.suit = suit;\n            card.digit = digit;\n\
    \            [arr addObject:card];\n        }\n    }\n\n    return arr;\n}\n```\n\
    \nLooking through the code, you’ll see that we’ve set up one loop inside another.\
    \ The first outer loop iterates four times: once for each card suit. So, a quarter\
    \ of the generated cards have their suit set to 0, a quarter have their suit set\
    \ to 1, and so on. Do you remember our custom suit enumerator `BJCardSuit`? Here’s\
    \ the code to jog your memory:\n\n```\ntypedef enum : int\n{\n    BJCardSuitClub\
    \ = 0,\n    BJCardSuitSpade,\n    BJCardSuitDiamond,\n    BJCardSuitHeart\n}BJCardSuit;\n\
    ```\n\nWith this declaration syntax, the compiler assigns integer 0 as a `BJCardSuitClub`,\
    \ integer 1 as a `BJCardSuitSpade`, and so on. So in our `generateAPackOfCards`\
    \ method, those suit values will match the enumerator values in the original enumerator\
    \ declaration.\n\nGetting back to `generateAPackOfCards` analysis, you’ll see\
    \ that we start by declaring an empty local scope mutable array:\n\n```\nNSMutableArray\
    \ *arr = [NSMutableArray array];\n```\n\nAnd then in the heart of our loop(s),\
    \ we `alloc`/`init` new instances of `BJDCard`, set the suit and digit, and then\
    \ add them to the local array with the mutable array instance method `addObject:`.\n\
    \nOnce complete, we return our array.\n\nBuild and run your app to check there\
    \ are still no errors!\n\nWe’re done with the `BJDCard` class for our blackjack\
    \ game. So we’re now going to make some changes to `BJDGameModel` to take advantage\
    \ of the new `generateAPackOfCards` method we just wrote.\n\nIn `BJDGameModel`,\
    \ replace this line of code from the `resetGame` method implementation:\n\n```\n\
    self.cards = [NSMutableArray array];\n```\n\nwith this:\n\n```\nself.cards = [BJDCard\
    \ generateAPackOfCards];\n```\n\nGreat, we have 52 cards in our array! Only thing\
    \ is that the cards aren’t shuffled. Hmm… this will be a pretty boring game of\
    \ blackjack. What’s the solution?\n\n### Shuffling the cards: Objective-C categories\n\
    \nObjective-C’s `NSMutableArray` class doesn’t have a shuffle method, unfortunately.\
    \ So we’re going to have to write one ourselves. But isn’t a shuffle quite a useful\
    \ additional method for a mutable array? Wouldn’t it be cool if we could add our\
    \ method to the `NSMutableArray` class? Well, guess what? We can with Objective-C\
    \ categories!\n\nAdding a category to an existing class is typically achieved\
    \ by creating a new Objective-C header and source file. We’ll add the file to\
    \ the `data` group, so open the Project Navigator and ensure that `data` is selected.\
    \ Now, again with the ![Image](images/U002a.jpg)N shortcut or File ![Image](images/U001.jpg)\
    \ New ![Image](images/U001.jpg) New File, select the Objective-C category option\
    \ from the Cocoa Touch file templates. On the next screen type **Shuffle** into\
    \ the Category text field and **NSMutableArray** into the Category On text field\
    \ (see [Figure 4-17](#Chapter04.html#fig_4_17)).\n\n![Image](images/9781430243748_Fig04-17.jpg)\n\
    \n**Figure 4-17.** Adding an Objective-C category to NSMutableArray\n\nCreate\
    \ the new file in the data folder of the Finder. Ensure that you’re viewing the\
    \ newly created `NSMutableArray+Shuffle` header and source files in the Assistant\
    \ Editor layout.\n\n*Tip: Occasionally Xcode doesn’t automatically display the\
    \ counter part header/source file in the Assistant Layout. To resolve this, click\
    \ the jumpbar and change the selected option to Counterparts.*\n\nYou’ll see that\
    \ a category file has a similar layout to a class file, but note the category\
    \ name added within parenthesis after the interface keyword. Modify the category\
    \ header as follows:\n\n```\n#import <Foundation/Foundation.h>\n@interface NSMutableArray\
    \ (Shuffle)\n\n- (void) shuffle;\n\n@end\n```\n\nNow modify the source implementation\
    \ to include the new shuffle method:\n\n```\n#import \"NSMutableArray+Shuffle.h\"\
    \n\n@implementation NSMutableArray (Shuffle)\n\n- (void)shuffle\n{\n    int count\
    \ = [self count];\n\n    NSMutableArray *dupeArr = [self mutableCopy];\n    count\
    \ = [dupeArr count];\n    [self removeAllObjects];\n\n    for (int i = 0; i <\
    \ count; ++i) {\n        // Select a random element between i and the end of the\
    \ array to swap with.\n        int nElements = count - i;\n        int n = (arc4random()\
    \ % nElements);\n        [self addObject:dupeArr[n]];\n        [dupeArr removeObjectAtIndex:n];\n\
    \    }\n\n}\n\n@end\n```\n\nOur custom shuffle method performs the following process:\n\
    \n> * Creates a duplicate copy of the mutable array.\n> * Empties the array.\n\
    > * Loops through the duplicate array randomly extracting elements (in our app’s\
    \ case these are the instances of `BJDCard`), re-adds them to the mutable array,\
    \ and removes them from the duplicate.\n\nWe’re done creating the shuffle category:\
    \ so back to `BJDGameModel`.\n\nIn order for the compiler to allow us to call\
    \ our new shuffle category method on `NSMutableArray`, we’ll need to import the\
    \ file we just created. So, at the top of `BJDGameModel.m` add the import declaration:\n\
    \n```\n#import \"NSMutableArray+Shuffle.h\"\n```\n\nNow you should be able to\
    \ call the `shuffle` method directly on `self.cards` after generating the pack.\
    \ So the `resetGame` method should end up looking like this:\n\n```\n-(void) resetGame\n\
    {\n    self.cards = [BJDCard generateAPackOfCards];\n\n    [self.cards shuffle];\n\
    \n    self.playerCards = [NSMutableArray array];\n    self.dealerCards = [NSMutableArray\
    \ array];\n    self.gameStage = BJGameStagePlayer;\n}\n```\n\nCool, huh?"
