- fmt: "#### Sending e-mail with the `MFMailComposeViewController`\n\nWe’ve been able\
    \ to send e-mail in iOS since iOS 3. So in-app e-mail is nothing new to the iOS\
    \ SDK. However, there are a couple more steps we’ll need to follow to send both\
    \ e-mail and SMS messages. It’s a tiny bit more cumbersome than using `SLComposeViewController`.\n\
    \nFirst, we have to add the `MessageUI` framework to our project. We’ve added\
    \ numerous frameworks throughout the book, so hopefully you’re comfortable adding\
    \ `MessageUI.framework` to begin with.\n\nAll set? Then jump over to the `BRSettingsViewController.h`\
    \ header and import `MessageUI.h`:\n\n```\n#import <MessageUI/MessageUI.h>\n```\n\
    \nThe reason we’ve imported the framework into the settings header is because\
    \ our Settings view controller is going to need to subscribe as the delegate of\
    \ the `MFMailComposeViewController` instance we’ll be creating shortly. So do\
    \ that now:\n\n```\n@interface BRSettingsViewController : UITableViewController\n\
    <MFMailComposeViewControllerDelegate>\n```\n\nNow switch to `BRSettingsViewController.m`\
    \ and add another case to your switch statement in `tableView:didSelectRowAtIndexPath:`\n\
    \n```\ncase 4://Email a Friend\n        {\n            if (![MFMailComposeViewController\
    \ canSendMail]) {\n                NSLog(@\"Can't send email\");\n          return;\n\
    \            }\n            MFMailComposeViewController *mailViewController =\
    \ [[MFMailComposeViewController\nalloc] init];\n\n            //When adding attachments\
    \ we have to convert the image into it's raw NSData\nrepresentation\n        \
    \    [mailViewController addAttachmentData:UIImagePNGRepresentation(image)\nmimeType:@\"\
    image/png\" fileName:@\"pic.png\"];\n            [mailViewController setSubject:@\"\
    Birthday Reminder\"];\n\n            //Combine the text and the app store link\
    \ to create the email body\n            NSString *textWithLink = [NSString\nstringWithFormat:@\"\
    %@\\n\\n%@\",text,appStoreLink];\n\n            [mailViewController setMessageBody:textWithLink\
    \ isHTML:NO];\n            mailViewController.mailComposeDelegate = self;\n  \
    \          [self presentViewController:mailViewController animated:YES\n     \
    \                        completion:nil];\n            break;\n        }\n```\n\
    \nI mentioned there would be a few extra steps, right? To add our *Birthday Reminder*\
    \ logo as an e-mail attachment, we have to convert the `UIImage` instance into\
    \ an `NSData` instance. Apple provides `UIImagePNGRepresentation` and `UIImageJPEGRepresentation`\
    \ functions for just this sort of purpose.\n\nAs you may have spotted in the code,\
    \ it’s possible to set HTML in your e-mail via the `setMessageBody:isHTML:` method\
    \ of the Mail view controller, so you could optionally use HTML to create hyperlinks\
    \ within your message body.\n\nTry a build and run. You should be able to tap\
    \ the Email a Friend cell and see a resulting e-mail modal view controller, as\
    \ shown in [Figure 13-14](#Chapter13.html#fig_13_14).\n\n![Image](images/9781430243748_Fig13-14.jpg)\n\
    \n**Figure 13-14.** Sharing by e-mail with a Mail Compose view controller\n\n\
    While testing the app on your device, try tapping the Cancel button of the Mail\
    \ Compose view controller. Nothing happened, right? That’s because the Mail Compose\
    \ view controller expects its delegate to deal with dismissing the view controller.\
    \ This is easy to resolve by adding the `mailComposeController:didFinishWithResult:error:`\
    \ method of `MFMailComposeViewControllerDelegate` to `BRSettingsViewController.m`:\n\
    \n```\n#pragma mark MFMailComposeViewControllerDelegate\n\n- (void)mailComposeController:(MFMailComposeViewController*)controller\n\
    didFinishWithResult:(MFMailComposeResult)result error:(NSError*)error\n{\n   \
    \ switch (result)\n    {\n        case MFMailComposeResultCancelled:\n       \
    \     NSLog(@\"mail composer cancelled\");\n            break;\n        case MFMailComposeResultSaved:\n\
    \            NSLog(@\"mail composer saved\");\n            break;\n        case\
    \ MFMailComposeResultSent:\n            NSLog(@\"mail composer sent\");\n    \
    \        break;\n        case MFMailComposeResultFailed:\n            NSLog(@\"\
    mail composer failed\");\n            break;\n    }\n\n    [controller dismissViewControllerAnimated:YES\
    \ completion:nil];\n\n}\n```\n\nThat should do the trick!\n\n#### Sending messages\
    \ with the `MFMessageComposeViewController`\n\nSince iOS 4, it’s also been possible\
    \ to create an SMS compose sheet right inside your app. The implementation is\
    \ very similar to the sending e-mail process we’ve just stepped through.\n\nSwitch\
    \ to `BRSettingsViewController.h` and declare that your Settings view controller\
    \ also implements the `MFMessageComposeViewControllerDelegate` protocol:\n\n```\n\
    @interface BRSettingsViewController : UITableViewController\n<MFMailComposeViewControllerDelegate,\
    \ MFMessageComposeViewControllerDelegate>\n```\n\nNow back in `BRSettingsViewController.m`,\
    \ add a final case to your switch statement in `tableView:didSelectRowAtIndexPath:`\n\
    \n```\ncase 5://SMS a Friend\n        {\n            if (![MFMessageComposeViewController\
    \ canSendText]) {\n                NSLog(@\"Can't send messages\");\n        \
    \  return;\n            }\n            MFMessageComposeViewController *messageViewController\
    \ =\n[[MFMessageComposeViewController alloc] init];\n\n            //Combine the\
    \ text and the app store link to create the email body\n            NSString *textWithLink\
    \ = [NSString\nstringWithFormat:@\"%@\\n\\n%@\",text,appStoreLink];\n\n      \
    \      [messageViewController setBody:textWithLink];\n            messageViewController.messageComposeDelegate\
    \ = self;\n            [self presentViewController:messageViewController animated:YES\n\
    \                             completion:nil];\n            break;\n        }\n\
    ```\n\nIt’s very similar to the `MFMailComposeViewController` implementation,\
    \ as you can see from the code. Add the `messageComposeViewController:didFinishWithResult:`\
    \ protocol method of `MFMessageComposeViewControllerDelegate` to `BRSettingsViewController.m`\
    \ before testing the new Mail Compose view controller:\n\n```\n#pragma mark MFMessageComposeViewControllerDelegate\n\
    - (void)messageComposeViewController:(MFMessageComposeViewController *)controller\n\
    didFinishWithResult:(MessageComposeResult)result\n{\n    switch (result)\n   \
    \ {\n        case MessageComposeResultCancelled:\n            NSLog(@\"message\
    \ composer cancelled\");\n            break;\n        case MessageComposeResultFailed:\n\
    \            NSLog(@\"message composer saved\");\n            break;\n       \
    \ case MessageComposeResultSent:\n            NSLog(@\"message composer sent\"\
    );\n            break;\n    }\n\n    [controller dismissViewControllerAnimated:YES\
    \ completion:nil];\n\n}\n```\n\nBuild and run. The results should look like [Figure\
    \ 13-15](#Chapter13.html#fig_13_15).\n\n![Image](images/9781430243748_Fig13-15.jpg)\n\
    \n**Figure 13-15.** Sharing by SMS with a Message Compose view controller\n\n\
    It may be becoming clear to you now that the five-minute process to add an Activity\
    \ view controller that you went through earlier brings with it all of the other\
    \ sharing content view controllers we’ve implemented through this chapter. The\
    \ difference is that we can retain a finer level of control over the content we\
    \ share based on the type of sharing. When sharing by e-mail, for example, I’d\
    \ want to take advantage of the HTML compatibility in the body text and add multiple\
    \ hyperlinks throughout my content. Likewise, when sharing by Twitter, we have\
    \ to be careful about character numbers.\n\nIt’s wonderful to have the new Activity\
    \ view controller that Apple built in iOS 6, but there are times when abstracting\
    \ all sharing functionality into just a paragraph of text and an image or two\
    \ is not enough, and finer control is necessary."
  raw: '#### Sending e-mail with the MFMailComposeViewController


    We’ve been able to send e-mail in iOS since iOS 3\. So in-app e-mail is nothing
    new to the iOS SDK. However, there are a couple more steps we’ll need to follow
    to send both e-mail and SMS messages. It’s a tiny bit more cumbersome than using
    `SLComposeViewController`.


    First, we have to add the MessageUI framework to our project. We’ve added numerous
    frameworks throughout the book, so hopefully you’re comfortable adding `MessageUI.framework`
    to begin with.


    All set? Then jump over to the `BRSettingsViewController.h` header and import
    `MessageUI.h`:


    `#import <MessageUI/MessageUI.h>`


    The reason we’ve imported the framework into the settings header is because our
    Settings view controller is going to need to subscribe as the delegate of the
    `MFMailComposeViewController` instance we’ll be creating shortly. So do that now:


    `@interface BRSettingsViewController : UITableViewController`

    **`<MFMailComposeViewControllerDelegate>`**


    Now switch to `BRSettingsViewController.m` and add another case to your switch
    statement in `tableView:didSelectRowAtIndexPath:`


    `case 4://Email a Friend`

    `        {`

    `            if (![MFMailComposeViewController canSendMail]) {`

    `                NSLog(@"Can''t send email");`

    `          return;`

    `            }`

    `            MFMailComposeViewController *mailViewController = [[MFMailComposeViewController`

    `alloc] init];`


    `            //When adding attachments we have to convert the image into it''s
    raw NSData`

    `representation`

    `            [mailViewController addAttachmentData:UIImagePNGRepresentation(image)`

    `mimeType:@"image/png" fileName:@"pic.png"];`

    `            [mailViewController setSubject:@"Birthday Reminder"];`


    `            //Combine the text and the app store link to create the email body`

    `            NSString *textWithLink = [NSString`

    `stringWithFormat:@"%@\n\n%@",text,appStoreLink];`


    `            [mailViewController setMessageBody:textWithLink isHTML:NO];`

    `            mailViewController.mailComposeDelegate = self;`

    `            [self presentViewController:mailViewController animated:YES`

    `                             completion:nil];`

    `            break;`

    `        }`


    I mentioned there would be a few extra steps, right? To add our *Birthday Reminder*
    logo as an e-mail attachment, we have to convert the `UIImage` instance into an
    `NSData` instance. Apple provides `UIImagePNGRepresentation` and `UIImageJPEGRepresentation`
    functions for just this sort of purpose.


    As you may have spotted in the code, it’s possible to set HTML in your e-mail
    via the `setMessageBody:isHTML:` method of the Mail view controller, so you could
    optionally use HTML to create hyperlinks within your message body.


    Try a build and run. You should be able to tap the Email a Friend cell and see
    a resulting e-mail modal view controller, as shown in [Figure 13-14](#Chapter13.html#fig_13_14).


    ![Image](images/9781430243748_Fig13-14.jpg)


    **Figure 13-14.** Sharing by e-mail with a Mail Compose view controller


    While testing the app on your device, try tapping the Cancel button of the Mail
    Compose view controller. Nothing happened, right? That’s because the Mail Compose
    view controller expects its delegate to deal with dismissing the view controller.
    This is easy to resolve by adding the `mailComposeController:didFinishWithResult:error:`
    method of `MFMailComposeViewControllerDelegate` to `BRSettingsViewController.m`:


    `#pragma mark MFMailComposeViewControllerDelegate`


    `- (void)mailComposeController:(MFMailComposeViewController*)controller`

    `didFinishWithResult:(MFMailComposeResult)result error:(NSError*)error`

    `{`

    `    switch (result)`

    `    {`

    `        case MFMailComposeResultCancelled:`

    `            NSLog(@"mail composer cancelled");`

    `            break;`

    `        case MFMailComposeResultSaved:`

    `            NSLog(@"mail composer saved");`

    `            break;`

    `        case MFMailComposeResultSent:`

    `            NSLog(@"mail composer sent");`

    `            break;`

    `        case MFMailComposeResultFailed:`

    `            NSLog(@"mail composer failed");`

    `            break;`

    `    }`


    `    [controller dismissViewControllerAnimated:YES completion:nil];`


    `}`


    That should do the trick!


    #### Sending messages with the MFMessageComposeViewController


    Since iOS 4, it’s also been possible to create an SMS compose sheet right inside
    your app. The implementation is very similar to the sending e-mail process we’ve
    just stepped through.


    Switch to `BRSettingsViewController.h` and declare that your Settings view controller
    also implements the `MFMessageComposeViewControllerDelegate` protocol:


    `@interface BRSettingsViewController : UITableViewController`

    `<MFMailComposeViewControllerDelegate,` **`MFMessageComposeViewControllerDelegate`**`>`


    Now back in `BRSettingsViewController.m`, add a final case to your switch statement
    in `tableView:didSelectRowAtIndexPath:`


    `case 5://SMS a Friend`

    `        {`

    `            if (![MFMessageComposeViewController canSendText]) {`

    `                NSLog(@"Can''t send messages");`

    `          return;`

    `            }`

    `            MFMessageComposeViewController *messageViewController =`

    `[[MFMessageComposeViewController alloc] init];`


    `            //Combine the text and the app store link to create the email body`

    `            NSString *textWithLink = [NSString`

    `stringWithFormat:@"%@\n\n%@",text,appStoreLink];`


    `            [messageViewController setBody:textWithLink];`

    `            messageViewController.messageComposeDelegate = self;`

    `            [self presentViewController:messageViewController animated:YES`

    `                             completion:nil];`

    `            break;`

    `        }`


    It’s very similar to the `MFMailComposeViewController` implementation, as you
    can see from the code. Add the `messageComposeViewController:didFinishWithResult:`
    protocol method of `MFMessageComposeViewControllerDelegate` to `BRSettingsViewController.m`
    before testing the new Mail Compose view controller:


    `#pragma mark MFMessageComposeViewControllerDelegate`

    `- (void)messageComposeViewController:(MFMessageComposeViewController *)controller`

    `didFinishWithResult:(MessageComposeResult)result`

    `{`

    `    switch (result)`

    `    {`

    `        case MessageComposeResultCancelled:`

    `            NSLog(@"message composer cancelled");`

    `            break;`

    `        case MessageComposeResultFailed:`

    `            NSLog(@"message composer saved");`

    `            break;`

    `        case MessageComposeResultSent:`

    `            NSLog(@"message composer sent");`

    `            break;`

    `    }`


    `    [controller dismissViewControllerAnimated:YES completion:nil];`


    `}`


    Build and run. The results should look like [Figure 13-15](#Chapter13.html#fig_13_15).


    ![Image](images/9781430243748_Fig13-15.jpg)


    **Figure 13-15.** Sharing by SMS with a Message Compose view controller


    It may be becoming clear to you now that the five-minute process to add an Activity
    view controller that you went through earlier brings with it all of the other
    sharing content view controllers we’ve implemented through this chapter. The difference
    is that we can retain a finer level of control over the content we share based
    on the type of sharing. When sharing by e-mail, for example, I’d want to take
    advantage of the HTML compatibility in the body text and add multiple hyperlinks
    throughout my content. Likewise, when sharing by Twitter, we have to be careful
    about character numbers.


    It’s wonderful to have the new Activity view controller that Apple built in iOS
    6, but there are times when abstracting all sharing functionality into just a
    paragraph of text and an image or two is not enough, and finer control is necessary.'
  trans: "\n#### 使用 `MFMailComposeViewController` 发送电子邮件\n\n自 iOS 3 起，我们就能够在 iOS 中发送电子邮件。因此，应用内发送邮件对\
    \ iOS SDK 来说并非新鲜事。不过，要发送电子邮件和短信，我们还需遵循几个额外步骤。这比使用 `SLComposeViewController` 稍微繁琐一些。\n\
    \n首先，我们必须将 `MessageUI` 框架添加到项目中。本书中我们已经添加了许多框架，所以希望你对此操作已经驾轻就熟，能顺利添加 `MessageUI.framework`。\n\
    \n准备好了吗？那就跳转到 `BRSettingsViewController.h` 头文件，导入 `MessageUI.h`：\n\n```\n#import\
    \ <MessageUI/MessageUI.h>\n```\n\n我们将这个框架导入设置头文件的原因是，我们的设置视图控制器需要订阅为即将创建的 `MFMailComposeViewController`\
    \ 实例的委托。所以现在就来做这件事：\n\n```\n@interface BRSettingsViewController : UITableViewController\n\
    <MFMailComposeViewControllerDelegate>\n```\n\n现在切换到 `BRSettingsViewController.m`，在\
    \ `tableView:didSelectRowAtIndexPath:` 方法的 switch 语句中添加另一个 case：\n\n```\ncase\
    \ 4://发送邮件给朋友\n        {\n            if (![MFMailComposeViewController canSendMail])\
    \ {\n                NSLog(@\"无法发送邮件\");\n          return;\n            }\n \
    \           MFMailComposeViewController *mailViewController = [[MFMailComposeViewController\
    \ alloc] init];\n\n            //添加附件时，需要将图片转换为原始的 NSData 表示\n            [mailViewController\
    \ addAttachmentData:UIImagePNGRepresentation(image)\nmimeType:@\"image/png\" fileName:@\"\
    pic.png\"];\n            [mailViewController setSubject:@\"生日提醒\"];\n\n      \
    \      //组合文本和应用商店链接，创建邮件正文\n            NSString *textWithLink = [NSString\n\
    stringWithFormat:@\"%@\\n\\n%@\",text,appStoreLink];\n\n            [mailViewController\
    \ setMessageBody:textWithLink isHTML:NO];\n            mailViewController.mailComposeDelegate\
    \ = self;\n            [self presentViewController:mailViewController animated:YES\n\
    \                             completion:nil];\n            break;\n        }\n\
    ```\n\n我之前提到过会有几个额外步骤，对吧？要将我们的 *生日提醒* 标志作为邮件附件添加，我们需要将 `UIImage` 实例转换为 `NSData`\
    \ 实例。Apple 提供了 `UIImagePNGRepresentation` 和 `UIImageJPEGRepresentation` 函数，正是用于此目的。\n\
    \n正如你在代码中可能已经注意到的，可以通过邮件视图控制器的 `setMessageBody:isHTML:` 方法在邮件中设置 HTML，因此你可以选择使用\
    \ HTML 在邮件正文中创建超链接。\n\n尝试构建并运行。你应该能够点击“发送邮件给朋友”单元格，并看到一个弹出的邮件模态视图控制器，如图 13-14\
    \ 所示。\n\n![图片](img/9781430243748_Fig13-14.jpg)\n\n**图 13-14.** 使用邮件撰写视图控制器通过电子邮件分享\n\
    \n在设备上测试应用时，尝试点击邮件撰写视图控制器的“取消”按钮。什么也没发生，对吧？这是因为邮件撰写视图控制器期望其委托来处理视图控制器的关闭。这很容易解决，只需将\
    \ `MFMailComposeViewControllerDelegate` 的 `mailComposeController:didFinishWithResult:error:`\
    \ 方法添加到 `BRSettingsViewController.m` 中：\n\n```\n#pragma mark MFMailComposeViewControllerDelegate\n\
    \n- (void)mailComposeController:(MFMailComposeViewController*)controller\ndidFinishWithResult:(MFMailComposeResult)result\
    \ error:(NSError*)error\n{\n    switch (result)\n    {\n        case MFMailComposeResultCancelled:\n\
    \            NSLog(@\"邮件撰写已取消\");\n            break;\n        case MFMailComposeResultSaved:\n\
    \            NSLog(@\"邮件撰写已保存\");\n            break;\n        case MFMailComposeResultSent:\n\
    \            NSLog(@\"邮件撰写已发送\");\n            break;\n        case MFMailComposeResultFailed:\n\
    \            NSLog(@\"邮件撰写失败\");\n            break;\n    }\n\n    [controller\
    \ dismissViewControllerAnimated:YES completion:nil];\n\n}\n```\n\n这样就应该解决问题了！\n\
    \n#### 使用 `MFMessageComposeViewController` 发送短信\n\n自 iOS 4 起，我们也能够在应用内创建短信撰写面板。其实现与我们刚刚完成的发送电子邮件过程非常相似。\n\
    \n切换到 `BRSettingsViewController.h`，声明你的设置视图控制器也实现 `MFMessageComposeViewControllerDelegate`\
    \ 协议：\n\n```\n@interface BRSettingsViewController : UITableViewController\n<MFMailComposeViewControllerDelegate,\
    \ MFMessageComposeViewControllerDelegate>\n```\n\n现在回到 `BRSettingsViewController.m`，在\
    \ `tableView:didSelectRowAtIndexPath:` 的 switch 语句中添加最后一个 case：\n\n```\ncase 5://发送短信给朋友\n\
    \        {\n            if (![MFMessageComposeViewController canSendText]) {\n\
    \                NSLog(@\"无法发送消息\");\n          return;\n            }\n     \
    \       MFMessageComposeViewController *messageViewController =\n[[MFMessageComposeViewController\
    \ alloc] init];\n\n            //组合文本和应用商店链接，创建邮件正文\n            NSString *textWithLink\
    \ = [NSString\nstringWithFormat:@\"%@\\n\\n%@\",text,appStoreLink];\n\n      \
    \      [messageViewController setBody:textWithLink];\n            messageViewController.messageComposeDelegate\
    \ = self;\n            [self presentViewController:messageViewController animated:YES\n\
    \                             completion:nil];\n            break;\n        }\n\
    ```\n\n正如你从代码中看到的，它与 `MFMailComposeViewController` 的实现非常相似。在测试新的短信撰写视图控制器之前，将\
    \ `MFMessageComposeViewControllerDelegate` 的 `messageComposeViewController:didFinishWithResult:`\
    \ 协议方法添加到 `BRSettingsViewController.m` 中：\n\n```\n#pragma mark MFMessageComposeViewControllerDelegate\n\
    - (void)messageComposeViewController:(MFMessageComposeViewController *)controller\n\
    didFinishWithResult:(MessageComposeResult)result\n{\n    switch (result)\n   \
    \ {\n        case MessageComposeResultCancelled:\n            NSLog(@\"短信撰写已取消\"\
    );\n            break;\n        case MessageComposeResultFailed:\n           \
    \ NSLog(@\"短信撰写已保存\");\n            break;\n        case MessageComposeResultSent:\n\
    \            NSLog(@\"短信撰写已发送\");\n            break;\n    }\n\n    [controller\
    \ dismissViewControllerAnimated:YES completion:nil];\n\n}\n```\n\n构建并运行。结果应如图\
    \ 13-15 所示。\n\n![图片](img/9781430243748_Fig13-15.jpg)\n\n**图 13-15.** 使用短信撰写视图控制器通过\
    \ SMS 分享\n\n现在你可能已经意识到，之前花五分钟添加活动视图控制器的过程，带来了我们在本章中实现的所有其他分享内容视图控制器。区别在于，我们可以根据分享类型对分享的内容进行更精细的控制。例如，通过电子邮件分享时，我希望能利用正文中的\
    \ HTML 兼容性，在我的内容中添加多个超链接。同样，通过 Twitter 分享时，我们必须注意字符数量。\n\nApple 在 iOS 6 中构建的新活动视图控制器很棒，但有时将所有分享功能抽象成一段文本和一两个图片是不够的，我们需要更精细的控制。\n"
- fmt: '### Summary


    Developing social sharing features this morning has been time well spent. The
    sharing and app rating code I’ve shown you can be applied to any project (just
    make sure that you update the text, image and links!). If you leave the in-app
    marketing work until version 1.1 or version 2 of your app, you’ve made a real
    schoolboy error! Apple just keeps making it increasingly simple to be social with
    iOS apps. You really have no excuse not to take advantage of their simple-to-implement
    features.


    You’ve finished your iPhone app development phase! What a momentous journey you’ve
    travelled.


    We’ve covered a great deal of the iOS SDK in the last four and a half days. You’ve
    absorbed the skills and code required for many everyday tasks as an iOS Developer.
    Although `Birthday Reminder` is a small five-day app, so many of the techniques
    I’ve introduced to you to during the course can be applied to far bigger projects.


    So what’s left to do? Submit our app, of course! In the final chapter of our journey,
    I’ll take you on a tour of iTunes Connect, and guide you through the steps of
    submitting an app to the App Store. See you shortly.


    ![Image](images/ch.jpg)


    # Chapter 14


    # Submitting Our App


    You’ve built your iPhone app and you’re ready to go live! So erm … how do you
    do that exactly? Using iTunes Connect, that’s how. iTunes Connect is a web-based
    tool that Apple provides for iOS and Mac developers to submit and distribute their
    apps via the App Store.


    There are two main steps to the app submission process:


    > 1.  Create a new app submission via the iTunes Connect web site.

    > 2.  Build and upload a release binary of your app directly from Xcode to iTunes
    Connect.


    After you complete step one, you’ll have immediate access to your app’s iTunes
    Apple ID, which, as we learned in [Chapter 13](#Chapter13.html#ch13), can be used
    to link directly to your app in the App Store.


    Apple gives you up to six months to upload your app binary after completing the
    initial iTunes Connect app submission forms. So it is possible to reserve an App
    Store name well in advance of completing the final build of your app.


    ### Creating a new app submission with iTunes Connect


    Only paid-up, enrolled iOS developers can access iTunes Connect. As I mentioned
    back in [Chapter 2](#Chapter02.html#ch2), there’s quite a bit of red tape to get
    through to become an enrolled iOS developer in the first place, so if you haven’t
    already gone through that first stage—then back to [Chapter 2](#Chapter02.html#ch2)
    you go!


    So, are just the enrolled iOS developers left in the room? Fire up Safari and
    point your browser to iTunes Connect at [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com).


    Begin by logging in with your iOS developer Apple ID and password (see [Figure
    14-1](#Chapter14.html#fig_14_1)).


    ![Image](images/9781430243748_Fig14-01.jpg)


    **Figure 14-1.** The iTunes Connect home screen


    In addition to submitting new apps and app updates to Apple, you’ll use iTunes
    Connect to view your sales and download stats; complete contract, tax, and billing
    forms; and manage and track advertising earnings if you use Apple’s iAd platform.


    We’re going to focus on the submission process, so click the Manage Your Applications
    link to get started. Next, click the big blue Add New App button.


    As you see in [Figure 14-2](#Chapter14.html#fig_14_2), the next step is to add
    some basic app information.


    ![Image](images/9781430243748_Fig14-02.jpg)


    **Figure 14-2.** Setting up basic app information, such as the App Store name


    #### Setting a default language


    If the base language for your app is French, then here’s the time to let Apple
    know! Whatever language you choose, it will become the primary language that the
    App Store associates with your app. It’s also worth noting that you can add additional
    localized App Store descriptions and even a localized name at a later point.


    #### Entering an app name


    The App Name is the name displayed next to your app icon, which users see when
    browsing the App Store. It is not to be confused with your app display name—the
    name that displays under your app on the iPhone home screen. Unlike the display
    name, the App Store name can be quite long—up to 255 bytes, which is about the
    same number of regular characters. In terms of App Store search optimization,
    I’d recommend taking advantage of those additional characters and including relevant
    keywords in your App Store title. This improves the chances of your app being
    found or displayed in the App Store’s regular and predictive search results.


    You can wait until you’ve filled in all four fields in this form before submitting,
    or you can tap Continue to check whether the App Name you’ve entered is already
    taken in the App Store (see [Figure 14-3](#Chapter14.html#fig_14_3)).


    ![Image](images/9781430243748_Fig14-03.jpg)


    **Figure 14-3.** Checking if an App Name already exists


    In [Figure 14-3](#Chapter14.html#fig_14_3), spot the error in “The App Name you
    entered has already been used.” Keep trying different names until you get rid
    of this error, which is when you’ll know that you have chosen a unique App Store
    name.


    #### Entering the SKU number


    Apple’s online documentation on handling the SKU field reads as follows:


    > In the SKU field, put the unique UTF-8 alphanumeric identifier for your app.
    The SKU is any alphanumeric sequence of letters and numbers you’d like to use
    to be uniquely identified in our system. You may create any string of UTF-8 letters
    and numbers, as long as it is unique to your developer account. This SKU is internal
    only and is not seen by users at any time. After you have submitted your metadata,
    this SKU is not editable.


    I tend to simply use the bundle identifier for my apps as the SKU number (see
    [Figure 14-2](#Chapter14.html#fig_14_2)).


    #### Connecting a bundle identifier


    In the provisioning portal, iTunes Connect automatically detects all of your valid
    bundle identifiers that aren’t already in use by your live App Store apps. You
    set up a bundle identifier back in [Chapter 2](#Chapter02.html#ch2), so using
    the drop-down, you should be able to select your bundle identifier. When you’ve
    selected a valid bundle identifier, iTunes Connect will alert you that “the Bundle
    ID cannot be changed if the first version of your app has been approved”—so make
    sure that you’ve picked the correct bundle identifier before tapping the Continue
    button.


    ### Scheduling and pricing your app


    On the next page of the app submission form, you set your app’s availability date
    and price (see [Figure 14-4](#Chapter14.html#fig_14_4)).


    ![Image](images/9781430243748_Fig14-04.jpg)


    **Figure 14-4.** Setting the availability date and price of your app


    #### Delaying the launch of your app


    If you want your app to go live the moment that Apple approves it, then just leave
    the availability date set to its default (today’s date). However, this is another
    great chance to market your app. Before it launches, no one can fairly deem your
    app a success or failure. Once you’ve uploaded your binary, in my experience,
    it typically takes Apple about seven days until they review and then approve or
    reject an app. If you schedule your app’s availability date for two weeks after
    submission, then once your app gets approved, you then hold the power to make
    it live in the App Store. Make the most of this power! Once I know an app has
    already been approved by Apple, I start e-mailing journalists about the launch
    of my app. At this point, I know exactly when my app will be live in the App Store:
    there is zero uncertainty because Apple has already approved the submission. So
    I can provide journalists with a tip that My Cool App will be launching on Friday
    August 24^(th) or whatever date I choose. Do you see the advantage to launching
    this way? Stay in control and delay the launch of your app. Launch on *your* terms,
    not Apple’s!'
