- fmt: "在 storyboard 中保持选中 Home 视图控制器场景，激活 Xcode 的 Assistant Editor 布局。当右侧面板中显示`BRHomeViewController.h`时，导入`BRBlueButton.h`，然后在`BRHomeViewController.h`中为标签、按钮和\
    \ holder 视图创建新的 Interface Builder 插座，分别命名为`importLabel`、`addressBookButton`、`facebookButton`和`importView`。我们需要透明\
    \ holder 视图（`importView`）的插座来根据生日数据库是否为空隐藏或显示它：\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"BRCoreViewController.h\"\n#import \"BRBlueButton.h\"\n\n@interface BRHomeViewController\
    \ : BRCoreViewController <UITableViewDelegate, UITableViewDataSource,NSFetchedResultsControllerDelegate>\n\
    \n-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue;\n@property\
    \ (weak, nonatomic) IBOutlet UITableView *tableView;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *importLabel;\n@property (weak, nonatomic) IBOutlet BRBlueButton\
    \ *addressBookButton;\n@property (weak, nonatomic) IBOutlet BRBlueButton *facebookButton;\n\
    @property (weak, nonatomic) IBOutlet UIView *importView;\n\n@end\n```\n\n除了新插座外，还要从\
    \ Address Book 和 Facebook 按钮创建 Touch Up Inside 操作到`BRHomeViewController.h`，如下所示：\n\
    \n```\n- (IBAction)importFromAddressBookTapped:(id)sender;\n- (IBAction)importFromFacebookTapped:(id)sender;\n\
    ```\n\n请注意，目前应用程序工具栏中有两个用于 Address Book 和 Facebook 的 Import 按钮（见图 10-5）。执行相同功能的重复按钮不是良好的用户界面设计，因此我们将修复此问题，使用户只看到一个\
    \ Address Book 按钮和一个 Facebook 按钮。在此之前，通过 Control 拖拽到我们刚刚设置的`importFromAddressBookTapped:`和`importFromFacebookTapped:`操作，为这些工具栏按钮添加\
    \ Interface Builder 操作。这样，两个 Address Book 按钮都应调用`importFromAddressBookTapped:`操作，两个\
    \ Facebook 按钮都应调用`importFromFacebookTapped:`操作。\n\n至此，storyboard 的工作暂告一段落，让我们将注意力转移到`BRHomeViewController.m`源文件。首先，为“Import\
    \ Birthdays from…”标签应用样式表。导入`BRStyleSheet.h`，然后添加`viewDidLoad`实现：\n\n```\n-(void)\
    \ viewDidLoad\n{\n    [super viewDidLoad];\n    [BRStyleSheet styleLabel:self.importLabel\
    \ withType:BRLabelTypeLarge];\n}\n```\n\n这会将奶油色文本和大型 Helvetica Neue 字体应用于指令标签。\n\
    \n新的导入子视图仅在 Core Data 存储中没有生日时显示。同样，带有 Address Book 和 Facebook 栏按钮项的工具栏仅在 Core\
    \ Data 存储中有一个或多个生日时显示。有一种简洁的方法可以在代码中实现这一点。我们将向 Home 视图控制器添加一个名为`hasFriends`的私有布尔属性。如果没有生日，则将`hasFriends`设置为\
    \ false；如果有一个或多个生日，则将`hasFriends`设置为 true。我们将重写`hasFriends`的设置器，并在每次设置私有属性时隐藏或显示导入子视图和工具栏。\n\
    \n继续处理`BRHomeViewController.m`，在私有接口中定义新的私有属性：\n\n```\n@interface BRHomeViewController()\n\
    \n@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;\n\
    @property (nonatomic) BOOL hasFriends;\n\n@end\n```\n\n现在重写`hasFriends`的设置器：\n\
    \n```\n-(void) setHasFriends:(BOOL)hasFriends\n{\n    _hasFriends = hasFriends;\n\
    \    self.importView.hidden = _hasFriends;\n    self.tableView.hidden = !_hasFriends;\n\
    \n    if (self.navigationController.topViewController == self) {\n        [self.navigationController\
    \ setToolbarHidden:!_hasFriends animated:NO];\n    }\n}\n```\n\n我们只是根据`hasFriends`设置为\
    \ true 或 false 来隐藏或显示导入视图、表视图和工具栏。但应该在何处设置`hasFriends`的值呢？\n\n最简单的解决方案是每当 Home\
    \ 视图控制器即将出现时设置`hasFriends`：\n\n```\n-(void) viewWillAppear:(BOOL)animated\n{\n\
    \    [super viewWillAppear:animated];\n    [self.tableView reloadData];\n    self.hasFriends\
    \ = [self.fetchedResultsController.fetchedObjects count] > 0;\n}\n```\n\n构建并运行。现在，我们有了一个主屏幕，它会根据生日数据库是否为空而更新并呈现不同的内容。尝试轻点“+”按钮添加生日（见图\
    \ 10-6）。\n\n![Image](images/9781430243748_Fig10-06.jpg)\n\n**图 10-6.** 根据是否有已保存的生日来隐藏或显示表视图、导入视图和工具栏\n\
    \n我们将创建一个新的视图和视图控制器场景，以便在从 Home 视图轻点任一 Address Book 按钮时以模态方式显示。回忆一下第 1 章/第 1 天，图\
    \ 10-7 展示了我们的 Facebook 导入视图设计最终应该是什么样子。\n\n![Image](images/9781430243748_Fig10-07.jpg)\n\
    \n**图 10-7.** 我们计划构建的 Facebook 生日导入视图\n\n除了标题，从 Address Book 导入的视图与从 Facebook\
    \ 导入的视图看起来完全相同。在底层，获取要导入的生日列表的过程截然不同，但视图渲染是相同的。\n\n我们已经在中心超视图控制器类中为应用程序中的每个视图设置背景时看到了创建核心视图控制器类的好处。Address\
    \ Book 和 Facebook 导入屏幕似乎也应该共享一个超视图控制器类来集中共享的 UI 功能，因为它们非常相似。因此，首先我们将创建一个核心导入视图控制器。\n\
    \n在 Project Navigator 中选择`view-controllers`组，然后创建`BRCoreViewController`的一个新子类，并将其命名为`BRImportViewController`。可以取消选中\
    \ Targeted for iPad 和 With XIB for User Interface。\n\n回到 storyboard，添加一个新的视图控制器场景。由于我们要以模态方式呈现\
    \ Address Book 导入视图控制器，因此将其嵌入到自己的导航控制器中，就像之前处理其他模态视图控制器一样。选择新的视图控制器，然后从菜单栏：Editor\
    \ → Embed In → Navigation Controller。现在将新的导入视图控制器命名为 **Address Book**，并添加 Cancel\
    \ 和 Import 按钮，如图 10-8 所示。\n\n![Image](images/9781430243748_Fig10-08.jpg)\n\n**图\
    \ 10-8.** 将 Address Book 视图控制器嵌入新的导航控制器\n\n选择刚刚创建的父导航控制器。使用属性检查器，在 Bar Visibility\
    \ 选项下打开 Shows Toolbar。\n\n导入的 Address Book 视图控制器场景中应该会出现一个工具栏，Xcode 可能已经添加了一个栏按钮项。按以下顺序在工具栏中设置项：一个\
    \ Flexible Space 栏按钮项、一个标题为 Select All 的栏按钮项和一个标题为 Select None 的栏按钮项（见图 10-9）。\n\
    \n![Image](images/9781430243748_Fig10-09.jpg)\n\n**图 10-9.** 配置 Address Book 导入工具栏\n\
    \n将新的表视图拖到 Address Book 视图上。在释放鼠标之前，让 Xcode 自动调整表视图大小以填充其父视图。选中新表视图后，使用大小检查器将行高修改为\
    \ 72 磅，就像主屏幕表视图一样。"
  raw: 'Keeping the Home view controller scene selected in your storyboard, activate
    the Assistant Editor layout of Xcode. With `BRHomeViewController.h` visible in
    the right panel of the assistant layout import `BRBlueButton.h` and then create
    new Interface Builder outlets in `BRHomeViewController.h` for the label, buttons,
    and holder view, naming them `importLabel`, `addressBookButton`, `facebookButton`,
    and `importView`, respectively. We''ll need the outlet to the transparent holder
    view (`importView`) to hide and show it, depending on whether the birthdays database
    is empty or populated:


    `#import <UIKit/UIKit.h>`

    `#import "BRCoreViewController.h"`

    **`#import "BRBlueButton.h"`**


    `@interface BRHomeViewController : BRCoreViewController <UITableViewDelegate,
    UITableViewDataSource,NSFetchedResultsControllerDelegate>`


    `-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue;`

    `@property (weak, nonatomic) IBOutlet UITableView *tableView;`

    **`@property (weak, nonatomic) IBOutlet UILabel *importLabel;`**

    **`@property (weak, nonatomic) IBOutlet BRBlueButton *addressBookButton;`**

    **`@property (weak, nonatomic) IBOutlet BRBlueButton *facebookButton;`**

    **`@property (weak, nonatomic) IBOutlet UIView *importView;`**


    `@end`


    In addition to our new outlets, create a Touch Up Inside action from both the
    Address Book and Facebook buttons to `BRHomeViewController.h` as follows:


    `- (IBAction)importFromAddressBookTapped:(id)sender;`

    `- (IBAction)importFromFacebookTapped:(id)sender;`


    Notice how we currently have two Import buttons for the Address Book and Facebook
    in the application toolbar (see [Figure 10-5](#Chapter10.html#fig_10_5)). Duplicate
    buttons that do the same thing is not good user interface design so we''ll fix
    this so that our users only ever see one Address Book button and one Facebook
    button. Before we do, add Interface Builder actions to these toolbar buttons by
    Control-dragging to the `importFromAddressBookTapped:` and `importFromFacebookTapped:`
    actions we''ve just set up. So both Address Book buttons should be set to invoke
    the `importFromAddressBookTapped:` action and both Facebook buttons should be
    set to invoke the `importFromFacebookTapped:` action.


    We''re done with the storyboard for now, so let''s move our attention to the `BRHomeViewController.m`
    source file. First off, let''s apply our style sheet to our Import Birthdays from…
    label. Import `BRStyleSheet.h` and then add a `viewDidLoad` implementation:


    `-(void) viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    [BRStyleSheet styleLabel:self.importLabel withType:BRLabelTypeLarge];`

    `}`


    This should result in the cream-colored text and large Helvetica Neue font being
    applied to our instruction label.


    Our new import subview is only intended to display when there are zero birthdays
    in the Core Data store. Likewise, our toolbar with the Address Book and Facebook
    bar button items is only intended to display when there are one or more birthdays
    in the Core Data store. There''s a neat way to achieve this in code. We''ll add
    a private Boolean property named `hasFriends` to our Home view controller. If
    there are zero birthdays, then we''ll set `hasFriends` to false. If there are
    one or more birthdays then we''ll set `hasFriends` to true. We''ll override the
    setter for `hasFriends`, and hide and show the import subview and the toolbar
    each time our private property is set.


    Continuing work on `BRHomeViewController.m`, let''s define our new private property
    in the private interface:


    `@interface BRHomeViewController()`


    `@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;`

    **`@property (nonatomic) BOOL hasFriends;`**


    `@end`


    We''ll now override our `hasFriends` setter:


    `-(void) setHasFriends:(BOOL)hasFriends`

    `{`

    `    _hasFriends = hasFriends;`

    `    self.importView.hidden = _hasFriends;`

    `    self.tableView.hidden = !_hasFriends;`


    `    if (self.navigationController.topViewController == self) {`

    `        [self.navigationController setToolbarHidden:!_hasFriends animated:NO];`

    `    }`

    `}`


    We''re simply hiding and showing the import view, table view, and toolbar depending
    on whether `hasFriends` is set to true or false. But where should we be setting
    the value of `hasFriends`?


    The simplest solution is just to set `hasFriends` whenever the Home view controller
    is about to appear:


    `-(void) viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`

    `    [self.tableView reloadData];`

    **`self.hasFriends = [self.fetchedResultsController.fetchedObjects count] > 0;`**

    `}`


    Build and run. We now have a home screen that updates and renders differently
    depending on whether our database of birthdays is empty or not. Try tapping the
    “+” button to add a birthday (see [Figure 10-6](#Chapter10.html#fig_10_6)).


    ![Image](images/9781430243748_Fig10-06.jpg)


    **Figure 10-6.** Hiding and showing the table view, import view, and toolbar depending
    on whether we have any saved birthdays


    We''re going to create a new view and view controller scene to display modally
    in our app when either of the Address Book buttons are tapped from the Home view.
    If we cast our memories back to [Chapter 1](#Chapter01.html#ch1)/ [Day 1](#Part01.html#p1),
    [Figure 10-7](#Chapter10.html#fig_10_7) shows us what our import from Facebook
    view design should end up looking like.


    ![Image](images/9781430243748_Fig10-07.jpg)


    **Figure 10-7.** The import from Facebook birthdays view we''re planning to build


    Apart from the title, our import from the Address Book view looks identical to
    the import from Facebook view. Under the hood, the process to retrieve the list
    of birthdays to import is very different, but the view rendering is identical.


    We''ve already seen the benefits of creating a core view controller class when
    we skinned the background of every view in our app in one central superview controller
    class. It seems logical that both the Address Book and Facebook import screens
    should also share a superview controller class to centralize shared UI functionality,
    as they are so similar. So first off, we''ll create a core Import view controller.


    Select the `view-controllers` group in the Project Navigator and then create a
    new subclass of `BRCoreViewController` and name it `BRImportViewController`. You
    can leave Targeted for iPad and With XIB for User Interface deselected.


    Back in your storyboard, add a new view controller scene. Because we''re going
    to present the Import Address Book view controller modally, we''ll embed it in
    its own navigation controller as we''ve done before with other modal view controllers.
    Select the new view controller and from the menu bar: Editor ![Image](images/U001.jpg)
    Embed In ![Image](images/U001.jpg) Navigation Controller. Now title the new Import
    view controller **Address Book**, and add Cancel and Import buttons, as shown
    in [Figure 10-8](#Chapter10.html#fig_10_8).


    ![Image](images/9781430243748_Fig10-08.jpg)


    **Figure 10-8.** Embedding the Address Book view controller in a new navigation
    controller


    Select the parent navigation controller you''ve just created. Using the attributes
    inspector, switch on Shows Toolbar under the Bar Visibility options.


    A toolbar should be visible in our import Address Book view controller scene and
    Xcode may have added a single bar button item. Set up the following items in the
    toolbar in this order: a Flexible Space bar button item, a bar button item titled
    Select All, and a bar button item titled Select None (see [Figure 10-9](#Chapter10.html#fig_10_9)).


    ![Image](images/9781430243748_Fig10-09.jpg)


    **Figure 10-9.** Configuring the Address Book import toolbar


    Drag a new table view onto the Address Book view. Allow Xcode to automatically
    resize the table view to fill its parent view before releasing your mouse. With
    your new table view selected, use the size inspector to modify the row height
    to 72 points, just like our home screen table view.'
  trans: "```markdown\n\n在 storyboard 中保持选中 Home 视图控制器场景，激活 Xcode 的 Assistant Editor\
    \ 布局。当右侧面板中显示`BRHomeViewController.h`时，导入`BRBlueButton.h`，然后在`BRHomeViewController.h`中为标签、按钮和\
    \ holder 视图创建新的 Interface Builder 插座，分别命名为`importLabel`、`addressBookButton`、`facebookButton`和`importView`。我们需要透明\
    \ holder 视图（`importView`）的插座来根据生日数据库是否为空隐藏或显示它：\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"BRCoreViewController.h\"\n#import \"BRBlueButton.h\"\n\n@interface BRHomeViewController\
    \ : BRCoreViewController <UITableViewDelegate, UITableViewDataSource,NSFetchedResultsControllerDelegate>\n\
    \n-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue;\n@property\
    \ (weak, nonatomic) IBOutlet UITableView *tableView;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *importLabel;\n@property (weak, nonatomic) IBOutlet BRBlueButton\
    \ *addressBookButton;\n@property (weak, nonatomic) IBOutlet BRBlueButton *facebookButton;\n\
    @property (weak, nonatomic) IBOutlet UIView *importView;\n\n@end\n```\n\n除了新插座外，还要从\
    \ Address Book 和 Facebook 按钮创建 Touch Up Inside 操作到`BRHomeViewController.h`，如下所示：\n\
    \n```\n- (IBAction)importFromAddressBookTapped:(id)sender;\n- (IBAction)importFromFacebookTapped:(id)sender;\n\
    ```\n\n请注意，目前应用程序工具栏中有两个用于 Address Book 和 Facebook 的 Import 按钮（见图 10-5）。执行相同功能的重复按钮不是良好的用户界面设计，因此我们将修复此问题，使用户只看到一个\
    \ Address Book 按钮和一个 Facebook 按钮。在此之前，通过 Control 拖拽到我们刚刚设置的`importFromAddressBookTapped:`和`importFromFacebookTapped:`操作，为这些工具栏按钮添加\
    \ Interface Builder 操作。这样，两个 Address Book 按钮都应调用`importFromAddressBookTapped:`操作，两个\
    \ Facebook 按钮都应调用`importFromFacebookTapped:`操作。\n\n至此，storyboard 的工作暂告一段落，让我们将注意力转移到`BRHomeViewController.m`源文件。首先，为“Import\
    \ Birthdays from…”标签应用样式表。导入`BRStyleSheet.h`，然后添加`viewDidLoad`实现：\n\n```\n-(void)\
    \ viewDidLoad\n{\n    [super viewDidLoad];\n    [BRStyleSheet styleLabel:self.importLabel\
    \ withType:BRLabelTypeLarge];\n}\n```\n\n这会将奶油色文本和大型 Helvetica Neue 字体应用于指令标签。\n\
    \n新的导入子视图仅在 Core Data 存储中没有生日时显示。同样，带有 Address Book 和 Facebook 栏按钮项的工具栏仅在 Core\
    \ Data 存储中有一个或多个生日时显示。有一种简洁的方法可以在代码中实现这一点。我们将向 Home 视图控制器添加一个名为`hasFriends`的私有布尔属性。如果没有生日，则将`hasFriends`设置为\
    \ false；如果有一个或多个生日，则将`hasFriends`设置为 true。我们将重写`hasFriends`的设置器，并在每次设置私有属性时隐藏或显示导入子视图和工具栏。\n\
    \n继续处理`BRHomeViewController.m`，在私有接口中定义新的私有属性：\n\n```\n@interface BRHomeViewController()\n\
    \n@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;\n\
    @property (nonatomic) BOOL hasFriends;\n\n@end\n```\n\n现在重写`hasFriends`的设置器：\n\
    \n```\n-(void) setHasFriends:(BOOL)hasFriends\n{\n    _hasFriends = hasFriends;\n\
    \    self.importView.hidden = _hasFriends;\n    self.tableView.hidden = !_hasFriends;\n\
    \n    if (self.navigationController.topViewController == self) {\n        [self.navigationController\
    \ setToolbarHidden:!_hasFriends animated:NO];\n    }\n}\n```\n\n我们只是根据`hasFriends`设置为\
    \ true 或 false 来隐藏或显示导入视图、表视图和工具栏。但应该在何处设置`hasFriends`的值呢？\n\n最简单的解决方案是每当 Home\
    \ 视图控制器即将出现时设置`hasFriends`：\n\n```\n-(void) viewWillAppear:(BOOL)animated\n{\n\
    \    [super viewWillAppear:animated];\n    [self.tableView reloadData];\n    self.hasFriends\
    \ = [self.fetchedResultsController.fetchedObjects count] > 0;\n}\n```\n\n构建并运行。现在，我们有了一个主屏幕，它会根据生日数据库是否为空而更新并呈现不同的内容。尝试轻点“+”按钮添加生日（见图\
    \ 10-6）。\n\n![Image](img/9781430243748_Fig10-06.jpg)\n\n**图 10-6.** 根据是否有已保存的生日来隐藏或显示表视图、导入视图和工具栏\n\
    \n我们将创建一个新的视图和视图控制器场景，以便在从 Home 视图轻点任一 Address Book 按钮时以模态方式显示。回忆一下第 1 章/第 1 天，图\
    \ 10-7 展示了我们的 Facebook 导入视图设计最终应该是什么样子。\n\n![Image](img/9781430243748_Fig10-07.jpg)\n\
    \n**图 10-7.** 我们计划构建的 Facebook 生日导入视图\n\n除了标题，从 Address Book 导入的视图与从 Facebook\
    \ 导入的视图看起来完全相同。在底层，获取要导入的生日列表的过程截然不同，但视图渲染是相同的。\n\n我们已经在中心超视图控制器类中为应用程序中的每个视图设置背景时看到了创建核心视图控制器类的好处。Address\
    \ Book 和 Facebook 导入屏幕似乎也应该共享一个超视图控制器类来集中共享的 UI 功能，因为它们非常相似。因此，首先我们将创建一个核心导入视图控制器。\n\
    \n在 Project Navigator 中选择`view-controllers`组，然后创建`BRCoreViewController`的一个新子类，并将其命名为`BRImportViewController`。可以取消选中\
    \ Targeted for iPad 和 With XIB for User Interface。\n\n回到 storyboard，添加一个新的视图控制器场景。由于我们要以模态方式呈现\
    \ Address Book 导入视图控制器，因此将其嵌入到自己的导航控制器中，就像之前处理其他模态视图控制器一样。选择新的视图控制器，然后从菜单栏：Editor\
    \ → Embed In → Navigation Controller。现在将新的导入视图控制器命名为 **Address Book**，并添加 Cancel\
    \ 和 Import 按钮，如图 10-8 所示。\n\n![Image](img/9781430243748_Fig10-08.jpg)\n\n**图 10-8.**\
    \ 将 Address Book 视图控制器嵌入新的导航控制器\n\n选择刚刚创建的父导航控制器。使用属性检查器，在 Bar Visibility 选项下打开\
    \ Shows Toolbar。\n\n导入的 Address Book 视图控制器场景中应该会出现一个工具栏，Xcode 可能已经添加了一个栏按钮项。按以下顺序在工具栏中设置项：一个\
    \ Flexible Space 栏按钮项、一个标题为 Select All 的栏按钮项和一个标题为 Select None 的栏按钮项（见图 10-9）。\n\
    \n![Image](img/9781430243748_Fig10-09.jpg)\n\n**图 10-9.** 配置 Address Book 导入工具栏\n\
    \n将新的表视图拖到 Address Book 视图上。在释放鼠标之前，让 Xcode 自动调整表视图大小以填充其父视图。选中新表视图后，使用大小检查器将行高修改为\
    \ 72 磅，就像主屏幕表视图一样。\n\n```"
- fmt: "当用户从通讯录导入时，我们的导入视图会显示一个联系人列表，其中包含已分配的生日。用于显示每个联系人的表格单元格还会显示距离生日的天数，以及联系人照片（如果存在）。实际上，其布局与我们在主屏幕表格视图中创建的自定义表格单元格几乎相同。\n\
    \n由于表格单元格几乎完全相同，我们将复制主屏幕中的表格单元格原型，并将其粘贴到新的导入屏幕表格视图中。这很容易出错，所以请集中注意力。![Image](images/smile.jpg)\n\
    \n如图 [Figure 10-10](#Chapter10.html#fig_10_10) 所示，确保在 storyboard 中能同时看到主场景和新的通讯录场景。确保文档大纲窗格已打开。在文档大纲窗格中，展开表格视图层次结构，以便看到列出的生日表格视图单元格原型。我们将按住\
    \ Alt 键，将此表格单元格原型从主视图控制器拖放到通讯录场景中的表格视图上（参见 [Figure 10-10](#Chapter10.html#fig_10_10)）。通讯录场景可能位于文档大纲窗格的下方，但拖动时窗格会滚动。\n\
    \n![Image](images/9781430243748_Fig10-10.jpg)\n\n**Figure 10-10.** 将一个原型表格单元格从一个表格复制到另一个表格\n\
    \n放下自定义表格单元格原型（保持 Alt 键选中）后，通讯录表格视图中应出现一个重复的表格单元格原型（参见 [Figure 10-11](#Chapter10.html#fig_10_11)）。\n\
    \n![Image](images/9781430243748_Fig10-11.jpg)\n\n**Figure 10-11.** 在通讯录场景中复制原型表格单元格\n\
    \n我们将暂时将`BRImportViewController`作为通讯录视图控制器的自定义类。这使我们能够通过拖放直接创建连接到`BRImportViewController`类的\
    \ Outlet 和 Action：这些共享的 Outlet 和 Action 最终将被通讯录导入和 Facebook 导入两个视图控制器使用。\n\n选择通讯录视图控制器场景，并使用身份检查器将类更改为`BRImportViewController`，如图\
    \ [Figure 10-12](#Chapter10.html#fig_10_12) 所示。\n\n![Image](images/9781430243748_Fig10-12.jpg)\n\
    \n**Figure 10-12.** 将导入视图控制器类分配给 storyboard 中的视图控制器\n\n在 storyboard 中选中通讯录视图控制器后，激活\
    \ Xcode 的助理编辑器布局。当`BRImportViewController.h`显示在助理编辑器的右侧面板中时，为导入按钮创建一个名为`importButton`的\
    \ Outlet，为表格视图创建一个名为`tableView`的 Outlet。\n\n此外，为导入、全选和取消全选按钮创建 Action，如下代码所示：\n\
    \n```\n#import \"BRCoreViewController.h\"\n\n@interface BRImportViewController\
    \ : BRCoreViewController\n\n@property (weak, nonatomic) IBOutlet UITableView *tableView;\n\
    @property (weak, nonatomic) IBOutlet UIBarButtonItem *importButton;\n\n- (IBAction)didTapImportButton:(id)sender;\n\
    - (IBAction)didTapSelectAllButton:(id)sender;\n- (IBAction)didTapSelectNoneButton:(id)sender;\n\
    \n@end\n```\n\n从取消按钮拖线到视图控制器，如图 [Figure 10-13](#Chapter10.html#fig_10_13) 所示，将取消按钮连接到`BRCoreViewController`中的`cancelAndDismiss:`操作。\n\
    \n![Image](images/9781430243748_Fig10-13.jpg)\n\n**Figure 10-13.** 设置取消按钮以关闭模态视图控制器\n\
    \n两个导入屏幕都将显示一个待导入的生日列表。我们将此列表的数据存储在每个导入视图控制器的数组属性中。让我们在`BRImportViewController.h`头文件中定义该数组：\n\
    \n```\n@property (strong, nonatomic) NSArray *birthdays;\n```\n\n通过在导入视图控制器的公共接口中定义`birthdays`数组，其子类能够访问该数组并设置其数据。\n\
    \n在`BRImportViewController.h`头文件中，我们的导入视图控制器实现了`UITableViewDelegate`和`UITableViewDataSource`协议：\n\
    \n```\n@interface BRImportViewController : BRCoreViewController<UITableViewDelegate,\
    \ UITableViewDataSource>\n```\n\n从表格视图拖线到 storyboard 中的视图控制器，以连接表格视图的`dataSource`和`delegate`属性，如图\
    \ [Figure 10-14](#Chapter10.html#fig_10_14) 所示。\n\n![Image](images/9781430243748_Fig10-14.jpg)\n\
    \n**Figure 10-14.** 从表格视图分配 dataSource 和 delegate Outlet\n\n我们需要在`BRImportViewController.m`中添加两个来自`UITableViewDataSource`协议的必需方法：\n\
    \n```\n#pragma mark UITableViewDataSource\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return [self.birthdays\
    \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n    return cell;\n}\n```\n\n### 在 storyboard 中标识视图控制器场景\n\n当点击主视图中的任意一个通讯录按钮时，我们将显示通讯录视图。我将展示另一种在运行时访问\
    \ storyboard 中视图控制器场景的方法，而不是创建两个 Segue。我们将为新的通讯录视图控制器的导航控制器父级添加一个标识符。选择导航控制器。使用属性检查器，输入`ImportAddressBook`场景的标识符，如图\
    \ [Figure 10-15](#Chapter10.html#fig_10_15) 所示。\n\n![Image](images/9781430243748_Fig10-15.jpg)\n\
    \n**Figure 10-15.** 为 storyboard 场景分配标识符\n\n将注意力转向`BRHomeViewController.m`，滚动到`importFromAddressBookTapped:`操作方法，并添加以下代码：\n\
    \n```\n- (IBAction)importFromAddressBookTapped:(id)sender {\n    UINavigationController\
    \ *navigationController = [self.storyboard instantiateViewControllerWithIdentifier:@\"\
    ImportAddressBook\"];\n    [self.navigationController presentViewController:navigationController\
    \ animated:YES completion:nil];\n}\n```\n\n我们使用标识符`ImportAddressBook`来实例化一个导航控制器和通讯录视图控制器的实例，然后以模态方式呈现它，使其从主视图控制器上方滑入。\n\
    \n构建并运行。您应该能够点击通讯录按钮来呈现我们的新场景，如图 [Figure 10-16](#Chapter10.html#fig_10_16) 所示。点击取消按钮应关闭模态视图控制器。\n\
    \n![Image](images/9781430243748_Fig10-16.jpg)\n\n**Figure 10-16.** 以模态方式呈现的通讯录视图控制器\n\
    \n此时，我们将子类化核心导入视图控制器，以创建通讯录导入视图控制器。在项目导航器中选择`view-controllers`组，然后创建一个`BRImportViewController`的子类，并将其命名为`BRImportAddressBookViewController`。同样，取消选中\
    \ Targeted for iPad 和 With XIB for User Interface。\n\n在 storyboard 中再次选中通讯录视图控制器，使用身份检查器将其自定义类更改为我们新的`BRImportAddressBookViewController`类。"
  raw: 'When our users import from their Address Book, our import view displays a
    list of those contacts with assigned birthdays. The table cell that we''ll use
    to display each contact is also going to display the days remaining until a birthday,
    and a photo if one exists for the contact. In fact, the layout will be virtually
    the same as the custom table cell we created for our home screen table view.


    As the table cell is virtually identical, we''re going to duplicate the table
    cell prototype from the home screen and copy it across to our new import screen
    table view. It''s easy to mess this up, so concentrate. ![Image](images/smile.jpg)


    As shown in [Figure 10-10](#Chapter10.html#fig_10_10), make sure that you can
    see both your home scene and new Address Book scene in your storyboard simultaneously.
    Ensure that the document outline pane is open. In the document outline pane, expand
    the table view hierarchy so that you can see the Birthday Table View Cell prototype
    listed. We''re going to Alt-drag this table cell prototype from the Home view
    controller onto the table view in the Address Book scene (see [Figure 10-10](#Chapter10.html#fig_10_10)).
    The Address Book scene may be located further down the document outline pane,
    but as you drag, the pane should scroll.


    ![Image](images/9781430243748_Fig10-10.jpg)


    **Figure 10-10.** Duplicating a prototyped table cell from one table to another


    After dropping the custom table cell prototype (keeping Alt selected), a duplicate
    table cell prototype should appear in our Address Book table view (see [Figure
    10-11](#Chapter10.html#fig_10_11)).


    ![Image](images/9781430243748_Fig10-11.jpg)


    **Figure 10-11.** Duplicating a prototype table cell in the Address Book scene


    We''re going to temporarily assign `BRImportViewController` as the custom class
    for our Address Book view controller. This enables us to create outlets and actions
    via drag-and-drop directly to the `BRImportViewController` class: shared outlets
    and actions that are eventually used by both the import from Address Book and
    Facebook view controllers.


    Select the Address Book view controller scene and use the identity inspector to
    change the class to `BRImportViewController` as shown in [Figure 10-12](#Chapter10.html#fig_10_12).


    ![Image](images/9781430243748_Fig10-12.jpg)


    **Figure 10-12.** Assigning our Import view controller class to our storyboard
    view controller


    With the Address Book view controller selected in your storyboard, activate the
    Assistant Editor layout of Xcode. With `BRImportViewController.h` visible in the
    right panel of the assistant editor, create new outlets for the Import button
    named `importButton` and for the table view named `tableView`.


    In addition, create actions for the Import, Select All, and Select None buttons,
    as shown in the following code:


    `#import "BRCoreViewController.h"`


    `@interface BRImportViewController : BRCoreViewController`


    **`@property (weak, nonatomic) IBOutlet UITableView *tableView;`**

    **`@property (weak, nonatomic) IBOutlet UIBarButtonItem *importButton;`**


    **`- (IBAction)didTapImportButton:(id)sender;`**

    **`- (IBAction)didTapSelectAllButton:(id)sender;`**

    **`- (IBAction)didTapSelectNoneButton:(id)sender;`**


    `@end`


    Control-drag from the Cancel button to the view controller, as shown in [Figure
    10-13](#Chapter10.html#fig_10_13), to link the cancel button to the `cancelAndDismiss:`
    action in `BRCoreViewController`.


    ![Image](images/9781430243748_Fig10-13.jpg)


    **Figure 10-13.** Setting up the Cancel button to dismiss the modal view controller


    Both of the import screens will display a list of birthdays to import. We''ll
    store the data for this list in an array property of each Import view controller.
    Let''s define that array in the `BRImportViewController.h` header:


    `@property (strong, nonatomic) NSArray *birthdays;`


    By defining the birthdays array in the public interface of our Import view controller,
    its subclasses are able to access the array and set its data.


    In the `BRImportViewController.h` header file, our Import view controller implements
    the `UITableViewDelegate` and `UITableViewDataSource` protocols:


    `@interface BRImportViewController : BRCoreViewController`**`<UITableViewDelegate,
    UITableViewDataSource>`**


    Control-drag from the table view to the view controller in your storyboard to
    connect up the `dataSource` and `delegate` properties of the table view as shown
    in [Figure 10-14](#Chapter10.html#fig_10_14).


    ![Image](images/9781430243748_Fig10-14.jpg)


    **Figure 10-14.** Assigning the dataSource and delegate outlets from the table
    view


    We need to add two required methods from the `UITableViewDataSource` protocol
    to `BRImportViewController.m`:


    `#pragma mark UITableViewDataSource`


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `    return [self.birthdays count];`

    `}`


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@"Cell"];`

    `    return cell;`

    `}`


    ### Identifying view controller scenes in a storyboard


    We''re going to present the Address Book view whenever either of the two Address
    Book buttons from the Home view are tapped. Rather than create two segues, I''m
    going to show you an alternative way to access a view controller scene in a storyboard
    at runtime. We''ll add an identifier to the navigation controller parent of our
    new Address Book view controller. Select the navigation controller. Using the
    attributes inspector, enter the identifier of the `ImportAddressBook` scene, as
    shown in [Figure 10-15](#Chapter10.html#fig_10_15).


    ![Image](images/9781430243748_Fig10-15.jpg)


    **Figure 10-15.** Assigning an identifier to a storyboard scene


    Switch your attention to `BRHomeViewController.m` and scroll down to the `importFromAddressBookTapped:`
    action method and add the following code:


    `- (IBAction)importFromAddressBookTapped:(id)sender {`

    **`UINavigationController *navigationController = [self.storyboard instantiateViewControllerWithIdentifier:@"ImportAddressBook"];`**

    **`    [self.navigationController presentViewController:navigationController animated:YES
    completion:nil];`**

    `}`


    We''re using the identifier `ImportAddressBook` to instantiate an instance of
    our navigation controller and Address Book view controller and then presenting
    it modally sliding over the Home view controller.


    Build and run. You should be able to tap the Address Book button to be presented
    with our new scene, as shown in [Figure 10-16](#Chapter10.html#fig_10_16). Tapping
    the Cancel button should dismiss the modal view controller.


    ![Image](images/9781430243748_Fig10-16.jpg)


    **Figure 10-16.** Modally presented Address Book view controller


    At this point, we''ll subclass our core Import view controller to create the Address
    Book Import view controller. Select the `view-controllers` group in the Project
    Navigator and then create a new subclass of `BRImportViewController` and name
    it `BRImportAddressBookViewController`. Again, leave Targeted for iPad and With
    XIB for User Interface deselected.


    With your Address Book view controller once again selected in the storyboard use
    the identity inspector to change its custom class to our new `BRImportAddressBookViewController`
    class.'
  trans: "\n当用户从通讯录导入时，我们的导入视图会显示一个联系人列表，其中包含已分配的生日。用于显示每个联系人的表格单元格还会显示距离生日的天数，以及联系人照片（如果存在）。实际上，其布局与我们在主屏幕表格视图中创建的自定义表格单元格几乎相同。\n\
    \n由于表格单元格几乎完全相同，我们将复制主屏幕中的表格单元格原型，并将其粘贴到新的导入屏幕表格视图中。这很容易出错，所以请集中注意力。![Image](img/smile.jpg)\n\
    \n如图 Figure 10-10 所示，确保在 storyboard 中能同时看到主场景和新的通讯录场景。确保文档大纲窗格已打开。在文档大纲窗格中，展开表格视图层次结构，以便看到列出的生日表格视图单元格原型。我们将按住\
    \ Alt 键，将此表格单元格原型从主视图控制器拖放到通讯录场景中的表格视图上（参见 Figure 10-10）。通讯录场景可能位于文档大纲窗格的下方，但拖动时窗格会滚动。\n\
    \n![Image](img/9781430243748_Fig10-10.jpg)\n\n**Figure 10-10.** 将一个原型表格单元格从一个表格复制到另一个表格\n\
    \n放下自定义表格单元格原型（保持 Alt 键选中）后，通讯录表格视图中应出现一个重复的表格单元格原型（参见 Figure 10-11）。\n\n![Image](img/9781430243748_Fig10-11.jpg)\n\
    \n**Figure 10-11.** 在通讯录场景中复制原型表格单元格\n\n我们将暂时将`BRImportViewController`作为通讯录视图控制器的自定义类。这使我们能够通过拖放直接创建连接到`BRImportViewController`类的\
    \ Outlet 和 Action：这些共享的 Outlet 和 Action 最终将被通讯录导入和 Facebook 导入两个视图控制器使用。\n\n选择通讯录视图控制器场景，并使用身份检查器将类更改为`BRImportViewController`，如图\
    \ Figure 10-12 所示。\n\n![Image](img/9781430243748_Fig10-12.jpg)\n\n**Figure 10-12.**\
    \ 将导入视图控制器类分配给 storyboard 中的视图控制器\n\n在 storyboard 中选中通讯录视图控制器后，激活 Xcode 的助理编辑器布局。当`BRImportViewController.h`显示在助理编辑器的右侧面板中时，为导入按钮创建一个名为`importButton`的\
    \ Outlet，为表格视图创建一个名为`tableView`的 Outlet。\n\n此外，为导入、全选和取消全选按钮创建 Action，如下代码所示：\n\
    \n```\n#import \"BRCoreViewController.h\"\n\n@interface BRImportViewController\
    \ : BRCoreViewController\n\n@property (weak, nonatomic) IBOutlet UITableView *tableView;\n\
    @property (weak, nonatomic) IBOutlet UIBarButtonItem *importButton;\n\n- (IBAction)didTapImportButton:(id)sender;\n\
    - (IBAction)didTapSelectAllButton:(id)sender;\n- (IBAction)didTapSelectNoneButton:(id)sender;\n\
    \n@end\n```\n\n从取消按钮拖线到视图控制器，如图 Figure 10-13 所示，将取消按钮连接到`BRCoreViewController`中的`cancelAndDismiss:`操作。\n\
    \n![Image](img/9781430243748_Fig10-13.jpg)\n\n**Figure 10-13.** 设置取消按钮以关闭模态视图控制器\n\
    \n两个导入屏幕都将显示一个待导入的生日列表。我们将此列表的数据存储在每个导入视图控制器的数组属性中。让我们在`BRImportViewController.h`头文件中定义该数组：\n\
    \n```\n@property (strong, nonatomic) NSArray *birthdays;\n```\n\n通过在导入视图控制器的公共接口中定义`birthdays`数组，其子类能够访问该数组并设置其数据。\n\
    \n在`BRImportViewController.h`头文件中，我们的导入视图控制器实现了`UITableViewDelegate`和`UITableViewDataSource`协议：\n\
    \n```\n@interface BRImportViewController : BRCoreViewController<UITableViewDelegate,\
    \ UITableViewDataSource>\n```\n\n从表格视图拖线到 storyboard 中的视图控制器，以连接表格视图的`dataSource`和`delegate`属性，如图\
    \ Figure 10-14 所示。\n\n![Image](img/9781430243748_Fig10-14.jpg)\n\n**Figure 10-14.**\
    \ 从表格视图分配 dataSource 和 delegate Outlet\n\n我们需要在`BRImportViewController.m`中添加两个来自`UITableViewDataSource`协议的必需方法：\n\
    \n```\n#pragma mark UITableViewDataSource\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return [self.birthdays\
    \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\"];\n    return cell;\n}\n```\n\n### 在 storyboard 中标识视图控制器场景\n\n当点击主视图中的任意一个通讯录按钮时，我们将显示通讯录视图。我将展示另一种在运行时访问\
    \ storyboard 中视图控制器场景的方法，而不是创建两个 Segue。我们将为新的通讯录视图控制器的导航控制器父级添加一个标识符。选择导航控制器。使用属性检查器，输入`ImportAddressBook`场景的标识符，如图\
    \ Figure 10-15 所示。\n\n![Image](img/9781430243748_Fig10-15.jpg)\n\n**Figure 10-15.**\
    \ 为 storyboard 场景分配标识符\n\n将注意力转向`BRHomeViewController.m`，滚动到`importFromAddressBookTapped:`操作方法，并添加以下代码：\n\
    \n```\n- (IBAction)importFromAddressBookTapped:(id)sender {\n    UINavigationController\
    \ *navigationController = [self.storyboard instantiateViewControllerWithIdentifier:@\"\
    ImportAddressBook\"];\n    [self.navigationController presentViewController:navigationController\
    \ animated:YES completion:nil];\n}\n```\n\n我们使用标识符`ImportAddressBook`来实例化一个导航控制器和通讯录视图控制器的实例，然后以模态方式呈现它，使其从主视图控制器上方滑入。\n\
    \n构建并运行。您应该能够点击通讯录按钮来呈现我们的新场景，如图 Figure 10-16 所示。点击取消按钮应关闭模态视图控制器。\n\n![Image](img/9781430243748_Fig10-16.jpg)\n\
    \n**Figure 10-16.** 以模态方式呈现的通讯录视图控制器\n\n此时，我们将子类化核心导入视图控制器，以创建通讯录导入视图控制器。在项目导航器中选择`view-controllers`组，然后创建一个`BRImportViewController`的子类，并将其命名为`BRImportAddressBookViewController`。同样，取消选中\
    \ Targeted for iPad 和 With XIB for User Interface。\n\n在 storyboard 中再次选中通讯录视图控制器，使用身份检查器将其自定义类更改为我们新的`BRImportAddressBookViewController`类。\n"
- fmt: "### Accessing and Filtering the Address Book Contacts\n\nWe're now going to\
    \ turn our attention to our data model to access the iPhone Address Book contacts\
    \ and filter just those contacts with assigned birthdays. As this is a data feature,\
    \ we'll be adding our Address Book querying code to our main model class `BRDModel`.\n\
    \nBefore we write the code, we'll need to add Apple's Address Book framework to\
    \ our Xcode project. We'll add the new framework just as we did back in [Chapter\
    \ 8](#Chapter08.html#ch8) when we added the Core Data framework. Select the `BirthdayReminder`\
    \ project in the project navigator, then select the `BirthdayReminder` target,\
    \ and finally select the Build Phases tab, as shown in [Figure 10-17](#Chapter10.html#fig_10_17).\n\
    \n![Image](images/9781430243748_Fig10-17.jpg)\n\n**Figure 10-17.** Preparing to\
    \ add a new framework\n\nTap the “+” button, highlighted in [Figure 10-17](#Chapter10.html#fig_10_17),\
    \ and select `AddressBook.framework` from the list.\n\n#### Address Book Data\
    \ Privacy\n\nIn iOS 6, Apple tightened up data privacy restrictions. Pre–iOS 6\
    \ apps could read and write from/to the users' Address Book without any restriction.\
    \ Although it's still possible to do this in iOS 6, our app first needs to request\
    \ access from the user via a system alert view. The alert view only shows the\
    \ first time an app requests Address Book access, so once our users have authorized\
    \ our app they will no longer be prompted for renewed authorization.\n\nWhat this\
    \ means from an app architectural perspective is that there is a delay the first\
    \ time we request Address Book access authorization from our user.\n\nLet's write\
    \ some code to see this in action. Open `BRDModel.h` and add a new fetching method\
    \ to our model singleton class:\n\n`- (void)fetchAddressBookBirthdays;`\n\nOur\
    \ Address Book Import view controller calls this new method on the model, which\
    \ in turn checks for Address Book access. Once the user grants access, the model\
    \ grabs any birthday-compatible Address Book records from the iPhone and dispatches\
    \ them via a notification that the Address Book view controller will subscribe\
    \ to and update its view accordingly.\n\nSwitch to the `BRDModel.m` source file.\
    \ Import the newly added Address Book framework:\n\n`#import <AddressBook/AddressBook.h>`\n\
    \nThe Address Book framework is written in C and not Objective-C, so there's no\
    \ ARC (Automatic Reference Counting). That means it's up to us as developers to\
    \ avoid creating memory leaks, and we need to manually take care of retaining\
    \ and releasing C objects. Here's the initial `fetchAddressBookBirthdays` code\
    \ to add to `BRDModel.m`:\n\n```\n- (void)fetchAddressBookBirthdays\n{\n    ABAddressBookRef\
    \ addressBook = ABAddressBookCreateWithOptions(NULL, NULL);\n\n    switch (ABAddressBookGetAuthorizationStatus())\
    \ {\n        case kABAuthorizationStatusNotDetermined:\n        {\n          \
    \  ABAddressBookRequestAccessWithCompletion(addressBook, ^(bool granted, CFErrorRef\
    \ error) {\n                if (granted) {\n                    NSLog(@\"Access\
    \ to the Address Book has been granted\");\n                }\n              \
    \  else {\n                    NSLog(@\"Access to the Address Book has been denied\"\
    );\n                }\n            });\n            break;\n        }\n      \
    \  case kABAuthorizationStatusAuthorized:\n        {\n            NSLog(@\"User\
    \ has already granted access to the Address Book\");\n            break;\n   \
    \     }\n        case kABAuthorizationStatusRestricted:\n        {\n         \
    \   NSLog(@\"User has restricted access to Address Book possibly due to parental\
    \ controls\");\n            break;\n        }\n        case kABAuthorizationStatusDenied:\n\
    \        {\n            NSLog(@\"User has denied access to the Address Book\"\
    );\n            break;\n        }\n    }\n\n    CFRelease(addressBook);\n}\n```\n\
    \nAs you can see in the code, there are four possible scenarios for the Address\
    \ Book authorization status. If the user has not yet permitted or denied access\
    \ to their Address Book from our app, then the authorization status will be `kABAuthorizationStatusNotDetermined`,\
    \ and we'll ask the system for access, which will in turn display an alert to\
    \ the user to permit or deny access (see [Figure 10-18](#Chapter10.html#fig_10_18)).\n\
    \nIn the switch statement, we can also determine whether the user has previously\
    \ authorized or denied access. There's one further possibility: the user has restricted\
    \ access to the system (such as when the parental controls are in use) and therefore\
    \ will not have the authority to provide Address Book access to our app.\n\nOpen\
    \ the `BRImportAddressBookViewController.m` source file and let's get our Address\
    \ Book view controller calling the new `fetchAddressBookBirthdays` method of `BRDModel`.\
    \ First, import `BRDModel.h` and then add a `viewWillAppear:` method as follows:\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [[BRDModel sharedInstance] fetchAddressBookBirthdays];\n}\n```\n\nBuild and\
    \ run. Tap the Address Book Import button from the home screen. You should be\
    \ prompted to allow/disallow access to your contacts, as shown in [Figure 10-18](#Chapter10.html#fig_10_18).\n\
    \n![Image](images/9781430243748_Fig10-18.jpg)\n\n**Figure 10-18.** Requesting\
    \ Address Book access from the user"
  raw: '### Accessing and filtering the address book contacts


    We''re now going to turn our attention to our data model to access the iPhone
    Address Book contacts and filter just those contacts with assigned birthdays.
    As this is a data feature, we''ll be adding our Address Book querying code to
    our main model class `BRDModel`.


    Before we write the code, we''ll need to add Apple''s Address Book framework to
    our Xcode project. We''ll add the new framework just as we did back in [Chapter
    8](#Chapter08.html#ch8) when we added the Core Data framework. Select the `BirthdayReminder`
    project in the project navigator, then select the `BirthdayReminder` target, and
    finally select the Build Phases tab, as shown in [Figure 10-17](#Chapter10.html#fig_10_17).


    ![Image](images/9781430243748_Fig10-17.jpg)


    **Figure 10-17.** Preparing to add a new framework


    Tap the “+” button, highlighted in [Figure 10-17](#Chapter10.html#fig_10_17),
    and select `AddressBook.framework` from the list.


    #### Address book data privacy


    In iOS 6, Apple tightened up data privacy restrictions. Pre–iOS 6 apps could read
    and write from/to the users'' Address Book without any restriction. Although it''s
    still possible to do this in iOS 6, our app first needs to request access from
    the user via a system alert view. The alert view only shows the first time an
    app requests Address Book access, so once our users have authorized our app they
    will no longer be prompted for renewed authorization.


    What this means from an app architectural perspective is that there is a delay
    the first time we request Address Book access authorization from our user.


    Let''s write some code to see this in action. Open `BRDModel.h` and add a new
    fetching method to our model singleton class:


    `- (void)fetchAddressBookBirthdays;`


    Our Address Book Import view controller calls this new method on the model, which
    in turn checks for Address Book access. Once the user grants access, the model
    grabs any birthday-compatible Address Book records from the iPhone and dispatches
    them via a notification that the Address Book view controller will subscribe to
    and update its view accordingly.


    Switch to the `BRDModel.m` source file. Import the newly added Address Book framework:


    `#import <AddressBook/AddressBook.h>`


    The Address Book framework is written in C and not Objective-C, so there''s no
    ARC (Automatic Reference Counting). That means it''s up to us as developers to
    avoid creating memory leaks, and we need to manually take care of retaining and
    releasing C objects. Here''s the initial `fetchAddressBookBirthdays` code to add
    to `BRDModel.m`:


    `- (void)fetchAddressBookBirthdays`

    `{`

    `    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL, NULL);`


    `    switch (ABAddressBookGetAuthorizationStatus()) {`

    `        case kABAuthorizationStatusNotDetermined:`

    `        {`

    `            ABAddressBookRequestAccessWithCompletion(addressBook, ^(bool granted,
    CFErrorRef error) {`

    `                if (granted) {`

    `                    NSLog(@"Access to the Address Book has been granted");`

    `                }`

    `                else {`

    `                    NSLog(@"Access to the Address Book has been denied");`

    `                }`

    `            });`

    `            break;`

    `        }`

    `        case kABAuthorizationStatusAuthorized:`

    `        {`

    `            NSLog(@"User has already granted access to the Address Book");`

    `            break;`

    `        }`

    `        case kABAuthorizationStatusRestricted:`

    `        {`

    `            NSLog(@"User has restricted access to Address Book possibly due to
    parental controls");`

    `            break;`

    `        }`

    `        case kABAuthorizationStatusDenied:`

    `        {`

    `            NSLog(@"User has denied access to the Address Book");`

    `            break;`

    `        }`

    `    }`


    `    CFRelease(addressBook);`

    `}`


    As you can see in the code, there are four possible scenarios for the Address
    Book authorization status. If the user has not yet permitted or denied access
    to their Address Book from our app, then the authorization status will be `kABAuthorizationStatusNotDetermined`,
    and we''ll ask the system for access, which will in turn display an alert to the
    user to permit or deny access (see [Figure 10-18](#Chapter10.html#fig_10_18)).


    In the switch statement, we can also determine whether the user has previously
    authorized or denied access. There''s one further possibility: the user has restricted
    access to the system (such as when the parental controls are in use) and therefore
    will not have the authority to provide Address Book access to our app.


    Open the `BRImportAddressBookViewController.m` source file and let''s get our
    Address Book view controller calling the new `fetchAddressBookBirthdays` method
    of `BRDModel.` First, import `BRDModel.h` and then add a `viewWillAppear:` method
    as follows:


    `-(void) viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`

    `    [[BRDModel sharedInstance] fetchAddressBookBirthdays];`

    `}`


    Build and run. Tap the Address Book Import button from the home screen. You should
    be prompted to allow/disallow access to your contacts, as shown in [Figure 10-18](#Chapter10.html#fig_10_18).


    ![Image](images/9781430243748_Fig10-18.jpg)


    **Figure 10-18.** Requesting Address Book access from the user'
  trans: "\n### 访问并过滤通讯录联系人\n\n接下来我们将把注意力转向数据模型，以实现访问 iPhone 通讯录联系人并仅筛选出那些已设定生日的联系人。由于这是一项数据功能，我们将把通讯录查询代码添加到主模型类\
    \ `BRDModel` 中。\n\n在编写代码之前，我们需要先将 Apple 的通讯录框架添加到 Xcode 项目中。添加新框架的方法与我们在第 8 章中添加\
    \ Core Data 框架时相同。在项目导航器中选择 `BirthdayReminder` 项目，然后选择 `BirthdayReminder` 目标，最后选择“构建阶段”标签页，如图\
    \ 10-17 所示。\n\n![图片](img/9781430243748_Fig10-17.jpg)\n\n**图 10-17.** 准备添加新框架\n\
    \n点击图 10-17 中高亮显示的“+”按钮，并从列表中选择 `AddressBook.framework`。\n\n#### 通讯录数据隐私\n\n在\
    \ iOS 6 中，Apple 收紧了数据隐私限制。iOS 6 之前的应用可以无限制地读写用户的通讯录。虽然在 iOS 6 中仍然可以做到这一点，但我们的应用首先需要通过系统提示视图向用户请求访问权限。提示视图仅在应用首次请求通讯录访问权限时显示，因此一旦用户授权了我们的应用，就不会再提示他们重新授权。\n\
    \n从应用架构的角度来看，这意味着我们首次请求用户授权通讯录访问权限时会产生延迟。\n\n让我们编写一些代码来观察实际效果。打开 `BRDModel.h`\
    \ 并向我们的模型单例类添加一个新的获取方法：\n\n`- (void)fetchAddressBookBirthdays;`\n\n我们的通讯录导入视图控制器会调用模型上的这个新方法，该方法随后会检查通讯录访问权限。一旦用户授予访问权限，模型就会从\
    \ iPhone 获取所有包含生日信息的通讯录记录，并通过通知将其分发出去，通讯录视图控制器将订阅此通知并相应地更新其视图。\n\n切换到 `BRDModel.m`\
    \ 源文件。导入新添加的通讯录框架：\n\n`#import <AddressBook/AddressBook.h>`\n\n通讯录框架是用 C 语言编写的，而不是\
    \ Objective-C，因此没有 ARC（自动引用计数）。这意味着作为开发者，我们需要避免造成内存泄漏，并且需要手动处理 C 对象的保留和释放。以下是添加到\
    \ `BRDModel.m` 中的初始 `fetchAddressBookBirthdays` 代码：\n\n```\n- (void)fetchAddressBookBirthdays\n\
    {\n    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL, NULL);\n\
    \n    switch (ABAddressBookGetAuthorizationStatus()) {\n        case kABAuthorizationStatusNotDetermined:\n\
    \        {\n            ABAddressBookRequestAccessWithCompletion(addressBook,\
    \ ^(bool granted, CFErrorRef error) {\n                if (granted) {\n      \
    \              NSLog(@\"已授予通讯录访问权限\");\n                }\n                else\
    \ {\n                    NSLog(@\"通讯录访问权限已被拒绝\");\n                }\n       \
    \     });\n            break;\n        }\n        case kABAuthorizationStatusAuthorized:\n\
    \        {\n            NSLog(@\"用户已授予通讯录访问权限\");\n            break;\n      \
    \  }\n        case kABAuthorizationStatusRestricted:\n        {\n            NSLog(@\"\
    用户因家长控制等原因限制了通讯录访问权限\");\n            break;\n        }\n        case kABAuthorizationStatusDenied:\n\
    \        {\n            NSLog(@\"用户已拒绝通讯录访问权限\");\n            break;\n      \
    \  }\n    }\n\n    CFRelease(addressBook);\n}\n```\n\n如代码所示，通讯录授权状态有四种可能情况。如果用户尚未允许或拒绝我们的应用访问其通讯录，那么授权状态将为\
    \ `kABAuthorizationStatusNotDetermined`，我们将向系统请求访问权限，系统会显示一个提示，让用户允许或拒绝访问（参见图\
    \ 10-18）。\n\n在 switch 语句中，我们还可以判断用户之前是已授权还是已拒绝访问。还有另一种可能性：用户限制了对系统的访问（例如当家长控制启用时），因此将无权向我们的应用提供通讯录访问权限。\n\
    \n打开 `BRImportAddressBookViewController.m` 源文件，让我们的通讯录视图控制器调用 `BRDModel` 的新方法\
    \ `fetchAddressBookBirthdays`。首先，导入 `BRDModel.h`，然后添加如下所示的 `viewWillAppear:` 方法：\n\
    \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    [[BRDModel sharedInstance] fetchAddressBookBirthdays];\n}\n```\n\n构建并运行。从主屏幕点击“导入通讯录”按钮。系统应会提示您允许/拒绝访问您的联系人，如图\
    \ 10-18 所示。\n\n![图片](img/9781430243748_Fig10-18.jpg)\n\n**图 10-18.** 向用户请求通讯录访问权限\n"
- fmt: "### Processing Address Book Data\n\nBack to `BRDModel.h`. Let's begin by declaring\
    \ a notification name that we'll dispatch from the model singleton when we have\
    \ successfully processed any friends and family in the user's Address Book with\
    \ associated birthdays. Add this definition right at the top of `BRDModel.h` before\
    \ any other code or import declarations:\n\n```\n#define BRNotificationAddressBookBirthdaysDidUpdate\n\
    @\"BRNotificationAddressBookBirthdaysDidUpdate\"\n```\n\nNow switch to `BRDModel.m`\
    \ and add a new empty private method, which we'll complete in a moment:\n\n```\n\
    -(void) extractBirthdaysFromAddressBook:(ABAddressBookRef)addressBook\n{\n\n}\n\
    ```\n\nWe will call the new `extractBirthdaysFromAddressBook:` method either when\
    \ our user grants access or immediately when `fetchAddressBookBirthdays:` is invoked\
    \ if the user has previously granted access. Update `fetchAddressBookBirthdays:`\
    \ with the following two highlighted lines of code:\n\n```\n- (void)fetchAddressBookBirthdays\n\
    {\n    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL, NULL);\n\
    \n    switch (ABAddressBookGetAuthorizationStatus()) {\n        case kABAuthorizationStatusNotDetermined:\n\
    \        {\n            ABAddressBookRequestAccessWithCompletion(addressBook,\
    \ ^(bool granted, CFErrorRef error) {\n                if (granted) {\n      \
    \              NSLog(@\"Access to the Address Book has been granted\");\n    \
    \                dispatch_async(dispatch_get_main_queue(), ^{\n              \
    \          // completion handler can occur in a background thread and this call\
    \ will update the UI on the main thread\n                        [self extractBirthdaysFromAddressBook:ABAddressBookCreateWithOptions(NULL,\
    \ NULL)];\n                    });\n                }\n                else {\n\
    \                    NSLog(@\"Access to the Address Book has been denied\");\n\
    \                }\n            });\n            break;\n        }\n        case\
    \ kABAuthorizationStatusAuthorized:\n        {\n            NSLog(@\"User has\
    \ already granted access to the Address Book\");\n            [self extractBirthdaysFromAddressBook:addressBook];\n\
    \            break;\n        }\n        case kABAuthorizationStatusRestricted:\n\
    \        {\n            NSLog(@\"User has restricted access to Address Book possibly\
    \ due to parental controls\");\n            break;\n        }\n        case kABAuthorizationStatusDenied:\n\
    \        {\n            NSLog(@\"User has denied access to the Address Book\"\
    );\n            break;\n        }\n    }\n\n    CFRelease(addressBook);\n}\n```\n\
    \nHere's the initial `extractBirthdaysFromAddressBook:` method implementation\
    \ to add to `BRDModel.m`:\n\n```\n-(void) extractBirthdaysFromAddressBook:(ABAddressBookRef)addressBook\n\
    {\n    NSLog(@\"extractBirthdaysFromAddressBook\");\n    CFArrayRef people = ABAddressBookCopyArrayOfAllPeople(addressBook);\n\
    \n    CFIndex peopleCount = ABAddressBookGetPersonCount(addressBook);\n\n    //this\
    \ is just a placeholder for now - we'll get the array populated later in the chapter\n\
    \    NSMutableArray *birthdays = [NSMutableArray array];\n\n    for (int i = 0;\
    \ i < peopleCount; i++)\n    {\n        ABRecordRef addressBookRecord = CFArrayGetValueAtIndex(people,\
    \ i);\n        CFDateRef birthdate  = ABRecordCopyValue(addressBookRecord, kABPersonBirthdayProperty);\n\
    \        if (birthdate == nil) continue;\n        CFStringRef firstName = ABRecordCopyValue(addressBookRecord,\
    \ kABPersonFirstNameProperty);\n        if (firstName == nil) {\n            CFRelease(birthdate);\n\
    \            continue;\n        }\n        NSLog(@\"Found contact with birthday:\
    \ %@, %@\",firstName,birthdate);\n        CFRelease(firstName);\n        CFRelease(birthdate);\n\
    \    }\n\n    CFRelease(people);\n\n    //dispatch a notification with an array\
    \ of birthday objects\n    NSDictionary *userInfo = [NSDictionary dictionaryWithObjectsAndKeys:birthdays,@\"\
    birthdays\", nil];\n\n    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationAddressBookBirthdaysDidUpdate\
    \ object:self userInfo:userInfo];\n}\n```\n\nThe Address Book framework is part\
    \ of Core Foundation and any C functions containing the word `Copy` or `Create`\
    \ requires you to release the object reference when you're done with it. Hence,\
    \ the `CFRelease(object)` code at the end of the function. The preceding code\
    \ is incomplete at present, but it shows you how to access the user's Address\
    \ Book and loop through the contact records. Each contact record has a set of\
    \ optional properties that we can attempt to access. In our example, the `kABPersonBirthdayProperty`\
    \ property refers to any birthday that has been assigned to a contact, so we use\
    \ this to extract only contacts that have assigned birthdays.\n\nOur code currently\
    \ dispatches a notification with an empty array even if it finds contacts with\
    \ assigned birthdays. We'll resolve this later, but for now we're just trying\
    \ to get this code running and the debugger printing out `Found contact with birthday:\
    \ [Name], [Birthday]`.\n\nOpen the `BRImportAddressBookViewController.m` source\
    \ file and let's hook it up to observe and handle the `BRNotificationAddressBookBirthdaysDidUpdate`\
    \ notification.\n\nHere's the full `BRImportAddressBookViewController.m` class\
    \ code:\n\n```\n#import \"BRImportAddressBookViewController.h\"\n#import \"BRDModel.h\"\
    \n\n@interface BRImportAddressBookViewController ()\n\n@end\n\n@implementation\
    \ BRImportAddressBookViewController\n\n-(void) viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    [[NSNotificationCenter defaultCenter]\
    \ addObserver:self selector:@selector(handleAddressBookBirthdaysDidUpdate:) name:BRNotificationAddressBookBirthdaysDidUpdate\
    \ object:[BRDModel sharedInstance]];\n    [[BRDModel sharedInstance] fetchAddressBookBirthdays];\n\
    }\n\n- (void) viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    [[NSNotificationCenter defaultCenter] removeObserver:self name:BRNotificationAddressBookBirthdaysDidUpdate\
    \ object:[BRDModel sharedInstance]];\n}\n\n-(void)handleAddressBookBirthdaysDidUpdate:(NSNotification\
    \ *)notification\n{\n    NSDictionary *userInfo = [notification userInfo];\n\n\
    \    self.birthdays = [userInfo objectForKey:@\"birthdays\"];\n    [self.tableView\
    \ reloadData];\n\n    if ([self.birthdays count] == 0)\n    {\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:nil message:@\"Sorry, No birthdays\
    \ found in your address book\" delegate:nil cancelButtonTitle:nil otherButtonTitles:@\"\
    OK\", nil];\n        [alert show];\n    }\n}\n\n@end\n```\n\nBuild and run. When\
    \ you launch the Address Book Import view controller, you should repeatedly see\
    \ the \"Sorry. No birthdays found in your address book\" alert because our model\
    \ is currently dispatching an empty array. However, assuming you provided *Birthday\
    \ Reminder* with access to your contacts, then the model's `extractBirthdaysFromAddressBook:`\
    \ method should log any Address Book birthdays to the debugger each time you open\
    \ the Address Book Import view controller. If you don't see this in the debugger\
    \ then now's a good time to assign some birthdays to your friends so you can test\
    \ this code out!\n\n**Note:** You can reset privacy permissions on your iPhone\
    \ via Settings ![Image](images/U001.jpg) General ![Image](images/U001.jpg) Reset\
    \ ![Image](images/U001.jpg) Reset Location & Privacy to test out both permitting\
    \ and preventing app access to contacts."
  raw: '#### Processing address book data


    Back to `BRDModel.h`. Let''s begin by declaring a notification name that we''ll
    dispatch from the model singleton when we have successfully processed any friends
    and family in the user''s Address Book with associated birthdays. Add this definition
    right at the top of `BRDModel.h` before any other code or import declarations:


    `#define BRNotificationAddressBookBirthdaysDidUpdate`

    `@"BRNotificationAddressBookBirthdaysDidUpdate"`


    Now switch to the `BRDModel.m` and add a new empty private method, which we''ll
    complete in a moment:


    `-(void) extractBirthdaysFromAddressBook:(ABAddressBookRef)addressBook`

    `{`


    `}`


    We will call the new `extractBirthdaysFromAddressBook:` method either when our
    user grants access or immediately when `fetchAddressBookBirthdays:` is invoked
    if the user has previously granted access. Update `fetchAddressBookBirthdays:`
    with the following two highlighted lines of code:


    `- (void)fetchAddressBookBirthdays`

    `{`

    `    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL, NULL);`


    `    switch (ABAddressBookGetAuthorizationStatus()) {`

    `        case kABAuthorizationStatusNotDetermined:`

    `        {`

    `            ABAddressBookRequestAccessWithCompletion(addressBook, ^(bool granted,
    CFErrorRef error) {`

    `                if (granted) {`

    `                    NSLog(@"Access to the Address Book has been granted");`

    **`dispatch_async(dispatch_get_main_queue(), ^{`**

    **`                        // completion handler can occur in a background thread
    and this call will update the UI on the main thread`**

    **`                        [self extractBirthdaysFromAddressBook:ABAddressBookCreateWithOptions(NULL,
    NULL)];`**

    **`                    });`**

    `                }`

    `                else {`

    `                    NSLog(@"Access to the Address Book has been denied");`

    `                }`

    `            });`

    `            break;`

    `        }`

    `        case kABAuthorizationStatusAuthorized:`

    `        {`

    `            NSLog(@"User has already granted access to the Address Book");`

    **`[self extractBirthdaysFromAddressBook:addressBook];`**

    `            break;`

    `        }`

    `        case kABAuthorizationStatusRestricted:`

    `        {`

    `            NSLog(@"User has restricted access to Address Book possibly due to
    parental controls");`

    `            break;`

    `        }`

    `        case kABAuthorizationStatusDenied:`

    `        {`

    `            NSLog(@"User has denied access to the Address Book");`

    `            break;`

    `        }`

    `    }`


    `    CFRelease(addressBook);`

    `}`


    Here''s the initial `extractBirthdaysFromAddressBook:` method implementation to
    add to `BRDModel.m`:


    `-(void) extractBirthdaysFromAddressBook:(ABAddressBookRef)addressBook`

    `{`

    `    NSLog(@"extractBirthdaysFromAddressBook");`

    `    CFArrayRef people = ABAddressBookCopyArrayOfAllPeople(addressBook);`


    `    CFIndex peopleCount = ABAddressBookGetPersonCount(addressBook);`


    `    //this is just a placeholder for now - we''ll get the array populated later
    in the chapter`

    `    NSMutableArray *birthdays = [NSMutableArray array];`


    `    for (int i = 0; i < peopleCount; i++)`

    `    {`

    `        ABRecordRef addressBookRecord = CFArrayGetValueAtIndex(people, i);`

    `        CFDateRef birthdate  = ABRecordCopyValue(addressBookRecord, kABPersonBirthdayProperty);`

    `        if (birthdate == nil) continue;`

    `        CFStringRef firstName = ABRecordCopyValue(addressBookRecord, kABPersonFirstNameProperty);`

    `        if (firstName == nil) {`

    `            CFRelease(birthdate);`

    `            continue;`

    `        }`

    `        NSLog(@"Found contact with birthday: %@, %@",firstName,birthdate);`

    `        CFRelease(firstName);`

    `        CFRelease(birthdate);`

    `    }`


    `    CFRelease(people);`


    `    //dispatch a notification with an array of birthday objects`

    `    NSDictionary *userInfo = [NSDictionary dictionaryWithObjectsAndKeys:birthdays,@"birthdays",
    nil];`


    `    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationAddressBookBirthdaysDidUpdate
    object:self userInfo:userInfo];`

    `}`


    The Address Book framework is part of Core Foundation and any C functions containing
    the word Copy or Create requires you to release the object reference when you''re
    done with it. Hence, the `CFRelease(object)` code at the end of the function.
    The preceding code is incomplete at present, but it shows you how to access the
    user''s Address Book and loop through the contact records. Each contact record
    has a set of optional properties that we can attempt to access. In our example,
    the `kABPersonBirthdayProperty` property refers to any birthday that has been
    assigned to a contact, so we use this to extract only contacts that have assigned
    birthdays.


    Our code currently dispatches a notification with an empty array even if it finds
    contacts with assigned birthdays. We''ll resolve this later, but for now we''re
    just trying to get this code running and the debugger printing out `Found contact
    with birthday: [Name], [Birthday]`.


    Open the `BRImportAddressBookViewController.m` source file and let''s hook it
    up to observe and handle the `BRNotificationAddressBookBirthdaysDidUpdate` notification.


    Here''s the full `BRImportAddressBookViewController.m` class code:


    `#import "BRImportAddressBookViewController.h"`

    `#import "BRDModel.h"`


    `@interface BRImportAddressBookViewController ()`


    `@end`


    `@implementation BRImportAddressBookViewController`


    `-(void) viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`

    **`[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(handleAddressBookBirthdaysDidUpdate:)
    name:BRNotificationAddressBookBirthdaysDidUpdate object:[BRDModel sharedInstance]];`**

    `    [[BRDModel sharedInstance] fetchAddressBookBirthdays];`

    `}`


    **`- (void) viewWillDisappear:(BOOL)animated`**

    **`{`**

    **`    [super viewWillDisappear:animated];`**

    **`    [[NSNotificationCenter defaultCenter] removeObserver:self name:BRNotificationAddressBookBirthdaysDidUpdate
    object:[BRDModel sharedInstance]];`**

    **`}`**


    **`-(void)handleAddressBookBirthdaysDidUpdate:(NSNotification *)notification`**

    **`{`**

    **`    NSDictionary *userInfo = [notification userInfo];`**


    **`    self.birthdays = [userInfo objectForKey:@"birthdays"];`**

    **`    [self.tableView reloadData];`**


    **`    if ([self.birthdays count] == 0)`**

    **`    {`**

    **`        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:nil message:@"Sorry,
    No birthdays found in your address book" delegate:nil cancelButtonTitle:nil otherButtonTitles:@"OK",
    nil];`**

    **`        [alert show];`**

    **`    }`**

    **`}`**


    `@end`


    Build and run. When you launch the Address Book Import view controller, you should
    repeatedly see the “Sorry. No birthdays found in your address book” alert because
    our model is currently dispatching an empty array. However, assuming you provided
    *Birthday Reminder* with access to your contacts, then the model''s `extractBirthdaysFromAddressBook:`
    method should log any Address Book birthdays to the debugger each time you open
    the Address Book Import view controller. If you don''t see this in the debugger
    then now''s a good time to assign some birthdays to your friends so you can test
    this code out!


    ***Note:** You can reset privacy permissions on your iPhone via Settings ![Image](images/U001.jpg)
    General ![Image](images/U001.jpg) Reset ![Image](images/U001.jpg) Reset Location
    & Privacy to test out both permitting and preventing app access to contacts.*'
  trans: "\n### 处理通讯录数据\n\n回到 `BRDModel.h`。首先，我们来声明一个通知名称，当模型单例成功处理用户通讯录中有关联生日的好友和家人时，我们会通过这个通知进行分发。在\
    \ `BRDModel.h` 文件顶部、任何其他代码或导入声明之前添加以下定义：\n\n```\n#define BRNotificationAddressBookBirthdaysDidUpdate\n\
    @\"BRNotificationAddressBookBirthdaysDidUpdate\"\n```\n\n现在切换到 `BRDModel.m`，添加一个新的空私有方法，我们稍后完成它：\n\
    \n```\n-(void) extractBirthdaysFromAddressBook:(ABAddressBookRef)addressBook\n\
    {\n    \n}\n```\n\n我们将在用户授予访问权限时调用新的 `extractBirthdaysFromAddressBook:` 方法，或者在调用\
    \ `fetchAddressBookBirthdays:` 时立即调用——前提是用户之前已经授予过访问权限。用下面高亮的两行代码更新 `fetchAddressBookBirthdays:`：\n\
    \n```\n- (void)fetchAddressBookBirthdays\n{\n    ABAddressBookRef addressBook\
    \ = ABAddressBookCreateWithOptions(NULL, NULL);\n\n    switch (ABAddressBookGetAuthorizationStatus())\
    \ {\n        case kABAuthorizationStatusNotDetermined:\n        {\n          \
    \  ABAddressBookRequestAccessWithCompletion(addressBook, ^(bool granted, CFErrorRef\
    \ error) {\n                if (granted) {\n                    NSLog(@\"Access\
    \ to the Address Book has been granted\");\n                    dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n                        // completion handler can occur in a background\
    \ thread and this call will update the UI on the main thread\n               \
    \         [self extractBirthdaysFromAddressBook:ABAddressBookCreateWithOptions(NULL,\
    \ NULL)];\n                    });\n                }\n                else {\n\
    \                    NSLog(@\"Access to the Address Book has been denied\");\n\
    \                }\n            });\n            break;\n        }\n        case\
    \ kABAuthorizationStatusAuthorized:\n        {\n            NSLog(@\"User has\
    \ already granted access to the Address Book\");\n            [self extractBirthdaysFromAddressBook:addressBook];\n\
    \            break;\n        }\n        case kABAuthorizationStatusRestricted:\n\
    \        {\n            NSLog(@\"User has restricted access to Address Book possibly\
    \ due to parental controls\");\n            break;\n        }\n        case kABAuthorizationStatusDenied:\n\
    \        {\n            NSLog(@\"User has denied access to the Address Book\"\
    );\n            break;\n        }\n    }\n\n    CFRelease(addressBook);\n}\n```\n\
    \n以下是添加到 `BRDModel.m` 中的 `extractBirthdaysFromAddressBook:` 方法的初始实现：\n\n```\n\
    -(void) extractBirthdaysFromAddressBook:(ABAddressBookRef)addressBook\n{\n   \
    \ NSLog(@\"extractBirthdaysFromAddressBook\");\n    CFArrayRef people = ABAddressBookCopyArrayOfAllPeople(addressBook);\n\
    \n    CFIndex peopleCount = ABAddressBookGetPersonCount(addressBook);\n\n    //this\
    \ is just a placeholder for now - we'll get the array populated later in the chapter\n\
    \    NSMutableArray *birthdays = [NSMutableArray array];\n\n    for (int i = 0;\
    \ i < peopleCount; i++)\n    {\n        ABRecordRef addressBookRecord = CFArrayGetValueAtIndex(people,\
    \ i);\n        CFDateRef birthdate  = ABRecordCopyValue(addressBookRecord, kABPersonBirthdayProperty);\n\
    \        if (birthdate == nil) continue;\n        CFStringRef firstName = ABRecordCopyValue(addressBookRecord,\
    \ kABPersonFirstNameProperty);\n        if (firstName == nil) {\n            CFRelease(birthdate);\n\
    \            continue;\n        }\n        NSLog(@\"Found contact with birthday:\
    \ %@, %@\",firstName,birthdate);\n        CFRelease(firstName);\n        CFRelease(birthdate);\n\
    \    }\n\n    CFRelease(people);\n\n    //dispatch a notification with an array\
    \ of birthday objects\n    NSDictionary *userInfo = [NSDictionary dictionaryWithObjectsAndKeys:birthdays,@\"\
    birthdays\", nil];\n\n    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationAddressBookBirthdaysDidUpdate\
    \ object:self userInfo:userInfo];\n}\n```\n\n通讯录框架是 Core Foundation 的一部分，任何包含\
    \ `Copy` 或 `Create` 的 C 函数都要求你在使用完毕后释放对象引用。因此，函数末尾出现了 `CFRelease(object)` 代码。上述代码目前还不完整，但它展示了如何访问用户的通讯录并遍历联系人记录。每条联系人记录都有一组可选属性，我们可以尝试访问这些属性。在我们的示例中，`kABPersonBirthdayProperty`\
    \ 属性指的是分配给联系人的任何生日，因此我们用它来只提取那些已分配生日的联系人。\n\n目前，我们的代码即使找到了分配了生日的联系人，也会分发一个包含空数组的通知。我们稍后会解决这个问题，但现在我们只是想让这段代码跑起来，并让调试器打印出\
    \ `Found contact with birthday: [Name], [Birthday]`。\n\n打开 `BRImportAddressBookViewController.m`\
    \ 源文件，并将其关联起来，以观察和处理 `BRNotificationAddressBookBirthdaysDidUpdate` 通知。\n\n以下是\
    \ `BRImportAddressBookViewController.m` 类的完整代码：\n\n```\n#import \"BRImportAddressBookViewController.h\"\
    \n#import \"BRDModel.h\"\n\n@interface BRImportAddressBookViewController ()\n\n\
    @end\n\n@implementation BRImportAddressBookViewController\n\n-(void) viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    [[NSNotificationCenter defaultCenter]\
    \ addObserver:self selector:@selector(handleAddressBookBirthdaysDidUpdate:) name:BRNotificationAddressBookBirthdaysDidUpdate\
    \ object:[BRDModel sharedInstance]];\n    [[BRDModel sharedInstance] fetchAddressBookBirthdays];\n\
    }\n\n- (void) viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    [[NSNotificationCenter defaultCenter] removeObserver:self name:BRNotificationAddressBookBirthdaysDidUpdate\
    \ object:[BRDModel sharedInstance]];\n}\n\n-(void)handleAddressBookBirthdaysDidUpdate:(NSNotification\
    \ *)notification\n{\n    NSDictionary *userInfo = [notification userInfo];\n\n\
    \    self.birthdays = [userInfo objectForKey:@\"birthdays\"];\n    [self.tableView\
    \ reloadData];\n\n    if ([self.birthdays count] == 0)\n    {\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:nil message:@\"Sorry, No birthdays\
    \ found in your address book\" delegate:nil cancelButtonTitle:nil otherButtonTitles:@\"\
    OK\", nil];\n        [alert show];\n    }\n}\n\n@end\n```\n\n构建并运行。当你启动通讯录导入视图控制器时，你应该会反复看到“抱歉，在你的通讯录中未找到生日”的提示，因为我们的模型目前正在分发一个空数组。然而，假设你已经授予了*生日提醒*访问通讯录的权限，那么每次你打开通讯录导入视图控制器时，模型的\
    \ `extractBirthdaysFromAddressBook:` 方法应该会将任何通讯录中的生日记录到调试器中。如果你在调试器中没有看到这些信息，那么现在正是为你的朋友分配一些生日的好时机，这样你就可以测试这段代码了！\n\
    \n**注意：** 你可以通过设置 ![Image](img/U001.jpg) 通用 ![Image](img/U001.jpg) 还原 ![Image](img/U001.jpg)\
    \ 还原位置与隐私来重置 iPhone 上的隐私权限，以测试应用对通讯录的允许和阻止访问。\n"
- fmt: '#### Creating a birthday import value object


    Our `addressBookBirthdays` method in `BRDModel` loops though the user''s Address
    Book. We need to decide how best to handle and format the returned contact records.
    Our Address Book view controller will display the table of import birthdays just
    like the Home view table; that is, the number of days remaining until the friend''s
    birthday, a user-friendly date format, a photo, and so forth.


    We''re going to create a new `BRDBirthdayImport` class, a subclass of `NSObject`.
    Select the `data` group in the project navigator, and then create a new subclass
    of `NSObject` and name it `BRDBirthdayImport`. `BRDBirthdayImport` will be a very
    similar class to our `BRDBirthday` Core Data managed object. However, we can''t
    just subclass `BRDBirthday` because Core Data''s `NSManagedObject` class is a
    special case class that can only be instantiated by managed object contexts.


    Let''s add the interface of `BRDBirthdayImport.h`:


    ```

    #import <Foundation/Foundation.h>

    #import <AddressBook/AddressBook.h>


    @interface BRDBirthdayImport : NSObject


    @property (nonatomic, strong) NSNumber *addressBookID;

    @property (nonatomic, strong) NSNumber *birthDay;

    @property (nonatomic, strong) NSNumber *birthMonth;

    @property (nonatomic, strong) NSNumber *birthYear;

    @property (nonatomic, strong) NSString *facebookID;

    @property (nonatomic, strong) NSData *imageData;

    @property (nonatomic, strong) NSString *name;

    @property (nonatomic, strong) NSDate *nextBirthday;

    @property (nonatomic, strong) NSNumber *nextBirthdayAge;

    @property (nonatomic, strong) NSString *picURL;

    @property (nonatomic, strong) NSString *uid;


    @property (nonatomic,readonly) int remainingDaysUntilNextBirthday;

    @property (nonatomic,readonly) NSString *birthdayTextToDisplay;

    @property (nonatomic,readonly) BOOL isBirthdayToday;


    -(id)initWithAddressBookRecord:(ABRecordRef)addressBookRecord;


    @end

    ```


    With the exception of the `notes` property, we''re creating a group of properties
    identical to `BRDBirthday` entity. We''re also creating an initializer method
    `initWithAddressBookRecord:` so that we can generate and populate an instance
    of `BRDBirthdayImport` with an Address Book record initializer.


    Now switch to the implementation of `BRDBirthdayImport.m` and begin by importing
    the thumbnail category we wrote for `UIImage` back in [Chapter 8](#Chapter08.html#ch8):


    ```

    #import "BRDBirthdayImport.h"

    #import "UIImage+Thumbnail.h"


    @implementation BRDBirthdayImport


    @end

    ```


    You can copy and paste the next chunk of code from `BRDBirthday.m`. Although code
    duplication is not something to make a habit of, it''s hard to avoid in this instance:


    ```

    -(void)updateNextBirthdayAndAge

    {

        NSDate *now = [NSDate date];


        NSCalendar *calendar = [NSCalendar currentCalendar];


        NSDateComponents *dateComponents = [[NSCalendar currentCalendar] components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit
    fromDate:now];

        NSDate *today = [calendar dateFromComponents:dateComponents];


        dateComponents.day = [self.birthDay intValue];

        dateComponents.month = [self.birthMonth intValue];


        NSDate *birthdayThisYear = [calendar dateFromComponents:dateComponents];


        if ([today compare:birthdayThisYear] == NSOrderedDescending) {

            //birthday this year has passed so next birthday will be next year

            dateComponents.year++;

            self.nextBirthday = [calendar dateFromComponents:dateComponents];

        }

        else {

            self.nextBirthday = [birthdayThisYear copy];

        }


        if ([self.birthYear intValue] > 0) {

            self.nextBirthdayAge = [NSNumber numberWithInt:dateComponents.year - [self.birthYear
    intValue]];

        }

        else {

            self.nextBirthdayAge = [NSNumber numberWithInt:0];

        }


    }


    -(void) updateWithDefaults

    {

        NSDateComponents *dateComponents = [[NSCalendar currentCalendar] components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit
    fromDate:[NSDate date]];


        self.birthDay = @(dateComponents.day);

        self.birthMonth = @(dateComponents.month);

        self.birthYear = @0;


        [self updateNextBirthdayAndAge];

    }


    -(int) remainingDaysUntilNextBirthday

    {

        NSDate *now = [NSDate date];

        NSCalendar *calendar = [NSCalendar currentCalendar];

        NSDateComponents *componentsToday = [calendar components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit
    fromDate:now];

        NSDate *today = [calendar dateFromComponents:componentsToday];


        NSTimeInterval timeDiffSecs = [self.nextBirthday timeIntervalSinceDate:today];


        int days = floor(timeDiffSecs/(60.f*60.f*24.f));


        return days;

    }


    -(BOOL) isBirthdayToday

    {

        return [self remainingDaysUntilNextBirthday] == 0;

    }


    -(NSString *) birthdayTextToDisplay {


        NSDate *now = [NSDate date];

        NSCalendar *calendar = [NSCalendar currentCalendar];

        NSDateComponents *componentsToday = [calendar components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit
    fromDate:now];

        NSDate *today = [calendar dateFromComponents:componentsToday];


        NSDateComponents *components = [calendar components:NSMonthCalendarUnit|NSDayCalendarUnit
    fromDate:today toDate:self.nextBirthday options:0];


        if (components.month == 0) {

            if (components.day == 0) {

                //today!


                if ([self.nextBirthdayAge intValue] > 0) {

                    return [NSString stringWithFormat:@"%@ Today!",self.nextBirthdayAge];

                }

                else {

                    return @"Today!";

                }

            }

            if (components.day == 1) {

                //tomorrow!

                if ([self.nextBirthdayAge intValue] > 0) {

                    return [NSString stringWithFormat:@"%@ Tomorrow!",self.nextBirthdayAge];

                }

                else {

                    return @"Tomorrow!";

                }

            }

        }


        NSString *text = @"";


        if ([self.nextBirthdayAge intValue] > 0) {

            text = [NSString stringWithFormat:@"%@ on ",self.nextBirthdayAge];

        }


        static NSDateFormatter *dateFormatterPartial;


        if (dateFormatterPartial == nil) {

            dateFormatterPartial = [[NSDateFormatter alloc] init];

            [dateFormatterPartial setDateFormat:@"MMM d"];

        }


        return [text stringByAppendingFormat:@"%@",[dateFormatterPartial stringFromDate:self.nextBirthday]];

    }


    @end

