- fmt: "# Loading and displaying remote images\n\nUnfortunately, Apple doesn’t include\
    \ remote image loading as part of the `UIImageView` or any other class in the\
    \ iOS SDK. There’s a fair amount of hard work and code that’s required to implement\
    \ efficient downloading, caching, and rendering of remote image files. However,\
    \ we’re going to write some reusable image downloading and rendering code, so\
    \ once we’ve cracked it here, you should find this code can be used in your other\
    \ iPhone development projects.\n\nWe’re going to extend the functionality of Apple’s\
    \ `UIImageView` to include support for remote image display by creating an Objective-C\
    \ category and adding a new `setImageWithRemoteFileURL:placeholderImage:` method\
    \ on `UIImageView`.\n\nIn the Project Navigator, select the `user-interface`/`categories`\
    \ group and with the `![Image](images/U002a.jpg)N` shortcut or File `![Image](images/U001.jpg)`\
    \ New `![Image](images/U001.jpg)` File, choose the Objective-C Category option\
    \ from the Cocoa Touch file templates. Create a category on `UIImageView` named\
    \ `RemoteFile`, as shown in [Figure 11-9](#Chapter11.html#fig_11_9).\n\n`![Image](images/9781430243748_Fig11-09.jpg)`\n\
    \n**Figure 11-9.** Creating a new `RemoteFile` category on `UIImageView`\n\nWith\
    \ `UIImageView+RemoteFile.h` open in Xcode, we’re going to add one new method\
    \ to `UIImageView`:\n\n```\n#import <UIKit/UIKit.h>\n\n@interface UIImageView\
    \ (RemoteFile)\n- (void)setImageWithRemoteFileURL:(NSString *)urlString placeHolderImage:(UIImage\
    \ *)placeholderImage;\n\n@end\n```\n\nWe’re creating a new method for image views,\
    \ `setImageWithRemoteFileURL:placeHolderImage:`, which accepts a URL string and\
    \ a placeholder image instance. The image view will display the placeholder image\
    \ while it downloads the image data from the remote image URL. When the download\
    \ completes, the image view will replace the placeholder with the downloaded image.\n\
    \nWe also want our image loading to be optimized. If our user has hundreds of\
    \ Facebook friends and he scrolls through a table view with hundreds of rows,\
    \ then we must be careful not to attempt to download hundreds of images simultaneously:\
    \ the result would be that new images would take longer and longer to appear as\
    \ the download queue enlarges.\n\nSwitch to `UIImageView+RemoteFile.m`. We’re\
    \ going to write about 250 lines of code for the implementation of our new `RemoteFile`\
    \ image view category. The reason for this is that we’ll be including a few private\
    \ classes in our category implementation file in addition to the implementation\
    \ of `setImageWithRemoteFileURL:placeHolderImage`, our single public method.\n\
    \nTo begin, we’re going to create a class to cache downloaded images in a mutable\
    \ dictionary. The cache class will be created as a singleton and accessible by\
    \ any image view instance.\n\nAdd the interface and implementation code for the\
    \ new `ImageCache` class above the empty implementation of `UIImageView (RemoteFile)`:\n\
    \n```\n//A singleton cache class that will store a mutable dictionary of url keys\
    \ and UIImage values\n//for images that have previously been downloaded\n@interface\
    \ ImageCache : NSObject\n\n@property (nonatomic,strong) NSMutableDictionary *cache;\n\
    \n-(UIImage *) cachedImageForURL:(NSString *)url;\n-(void) storeCachedImage:(UIImage\
    \ *)image forURL:(NSString *)url;\n\n@end\n\n@implementation ImageCache\n\n@synthesize\
    \ cache = _cache;\n\n-(id) init\n{\n    self = [super init];\n    if (self) {\n\
    \        //the cached dictionary will empty if our app receives a memory warning\n\
    \        [[NSNotificationCenter defaultCenter] addObserver:self\n            \
    \                                     selector:@selector(clearCache)\n       \
    \                                              name:UIApplicationDidReceiveMemoryWarningNotification\n\
    \                                                   object:nil];\n\n    }\n  \
    \  return self;\n}\n\n-(void) dealloc\n{\n    [[NSNotificationCenter defaultCenter]\
    \ removeObserver:self\nname:UIApplicationDidReceiveMemoryWarningNotification object:nil];\n\
    }\n\n-(NSMutableDictionary *) cache\n{\n    if (_cache == nil) {\n        _cache\
    \ = [NSMutableDictionary dictionary];\n    }\n    return _cache;\n}\n\n- (void)clearCache\n\
    {\n    [self.cache removeAllObjects];\n}\n\n-(void) storeCachedImage:(UIImage\
    \ *)image forURL:(NSString *)url\n{\n    self.cache[url] = image;\n}\n\n-(UIImage\
    \ *) cachedImageForURL:(NSString *)url\n{\n    return self.cache[url];\n}\n```\n\
    \nOur image view category will be able to check for previously cached images by\
    \ calling `cachedImageForURL:` with remote URLs. Likewise, when remote images\
    \ finish downloading, we’ll cache them using `ImageCache`’s `storeCachedImage:forURL:`\
    \ method.\n\nThe next encapsulated class we’ll add is a `DownloadHelper` class\
    \ and delegate protocol. Again, add this code above the implementation of `UIImageView\
    \ (RemoteFile)`—straight after the `ImageCache` class declaration:\n\n```\n//A\
    \ helper class for handling data download events and storing data progressively\
    \ as it\n//downloads for an image file\n\n@protocol DownloadHelperDelegate <NSObject>\n\
    \n-(void)didCompleteDownloadForURL:(NSString *)url withData:(NSMutableData *)data;\n\
    \n@end\n\n@interface DownloadHelper : NSObject\n\n@property (nonatomic,strong)\
    \ NSString *url;\n@property (nonatomic,strong) NSMutableData *data;\n@property\
    \ (nonatomic,strong) NSURLConnection *connection;\n@property (nonatomic,assign)\
    \ id<DownloadHelperDelegate> delegate;\n\n@end\n\n@implementation DownloadHelper\n\
    \n@synthesize url = _url;\n@synthesize data = _data;\n@synthesize connection =\
    \ _connection;\n@synthesize delegate = _delegate;\n\n- (void) connection: (NSURLConnection*)\
    \ connection didReceiveData: (NSData*) data\n{\n    //add the new bytes of data\
    \ to our existing mutable data container\n    [self.data appendData:data];\n}\n\
    \n- (void)connectionDidFinishLoading:(NSURLConnection *)connection\n{\n    //done\
    \ downloading data - process completed!\n    [self.delegate didCompleteDownloadForURL:self.url\
    \ withData:self.data];\n}\n\n-(void) cancelConnection\n{\n    if (self.connection)\
    \ {\n        [self.connection cancel];\n        [self setConnection:nil];\n  \
    \  }\n}\n\n-(void) dealloc\n{\n    [self cancelConnection];\n}\n\n@end\n```\n\n\
    We’re going to create instances of this new `DownloadHelper` class whenever an\
    \ image view needs to begin downloading a new remote image file. Each `DownloadHelper`\
    \ instance will be owned by a `UIImageView` instance. The iOS SDK includes a class\
    \ named `NSURLConnection` that we’ll use to download remote image data from a\
    \ HTTP request. By subscribing our `DownloadHelper` instances as the delegates\
    \ of `NSURLConnection` instances we’ll be able to catch data download updates\
    \ and completion events via the `connection:didReceiveData:` and `connectionDidFinishLoading:`\
    \ event handlers.\n\nThe `DownloadHelper` will notify its owning image view via\
    \ a delegate callback method `didCompleteDownloadForURL:withData:`.\n\nWe’re now\
    \ going to add another category on `UIImageView`. A new category that will be\
    \ hidden from other classes as it’s just for internal use by our remote image\
    \ downloading and caching logic. As the comments state, the primary reason for\
    \ creating this `UIImageView(RemoteFileHidden)` category is to add two additional\
    \ properties to Apple’s `UIImageView` class: `url` and `downloadHelper`. In Objective-C,\
    \ it’s not actually possible to add synthesized properties to a class via a category.\
    \ Instead, we’ll get around this by using dynamic properties that we’ll create\
    \ and add to `UIImageView` class at runtime. Adding storage properties to the\
    \ runtime is quite advanced stuff, but for the sake of creating useful reusable\
    \ code, it’s the best way for our requirements. Begin by scrolling up to the top\
    \ of `UIImageView+RemoteFile.m` and importing the runtime:\n\n```\n#import <objc/runtime.h>\n\
    ```\n\nContinuing work within `UIImageView+RemoteFile.m` and before the implementation\
    \ of `UIImageView (RemoteFile)`, add the hidden `UIImageView(RemoteFileHidden)`\
    \ category:"
  raw: '### Loading and displaying remote images


    Unfortunately, Apple doesn’t include remote image loading as part of the `UIImageView`
    or any other class in the iOS SDK. There’s a fair amount of hard work and code
    that’s required to implement efficient downloading, caching, and rendering of
    remote image files. However, we’re going to write some reusable image downloading
    and rendering code, so once we’ve cracked it here, you should find this code can
    be used in your other iPhone development projects.


    We’re going to extend the functionality of Apple’s `UIImageView` to include support
    for remote image display by creating an Objective-C category and adding a new
    `setImageWithRemoteFileURL:placeholderImage:` method on `UIImageView`.


    In the Project Navigator, select the `user-interface`/`categories` group and with
    the ![Image](images/U002a.jpg)N shortcut or File ![Image](images/U001.jpg) New
    ![Image](images/U001.jpg) File, choose the Objective-C Category option from the
    Cocoa Touch file templates. Create a category on `UIImageView` named `RemoteFile`,
    as shown in [Figure 11-9](#Chapter11.html#fig_11_9).


    ![Image](images/9781430243748_Fig11-09.jpg)


    **Figure 11-9.** Creating a new RemoteFile category on UIImageView


    With `UIImageView+RemoteFile.h` open in Xcode, we’re going to add one new method
    to `UIImageView`:


    `#import <UIKit/UIKit.h>`


    `@interface UIImageView (RemoteFile)`

    **`- (void)setImageWithRemoteFileURL:(NSString *)urlString placeHolderImage:(UIImage`**

    **`*)placeholderImage;`**


    `@end`


    We’re creating a new method for image views, `setImageWithRemoteFileURL:placeHolderImage:`,
    which accepts a URL string and a placeholder image instance. The image view will
    display the placeholder image while it downloads the image data from the remote
    image URL. When the download completes, the image view will replace the placeholder
    with the downloaded image.


    We also want our image loading to be optimized. If our user has hundreds of Facebook
    friends and he scrolls through a table view with hundreds of rows, then we must
    be careful not to attempt to download hundreds of images simultaneously: the result
    would be that new images would take longer and longer to appear as the download
    queue enlarges.


    Switch to `UIImageView+RemoteFile.m`. We’re going to write about 250 lines of
    code for the implementation of our new `RemoteFile` image view category. The reason
    for this is that we’ll be including a few private classes in our category implementation
    file in addition to the implementation of `setImageWithRemoteFileURL:placeHolderImage`,
    our single public method.


    To begin, we’re going to create a class to cache downloaded images in a mutable
    dictionary. The cache class will be created as a singleton and accessible by any
    image view instance.


    Add the interface and implementation code for the new `ImageCache` class above
    the empty implementation of `UIImageView (RemoteFile)`:


    `//A singleton cache class that will store a mutable dictionary of url keys and
    UIImage values`

    `for images that have previously been downloaded`

    `@interface ImageCache : NSObject`


    `@property (nonatomic,strong) NSMutableDictionary *cache;`


    `-(UIImage *) cachedImageForURL:(NSString *)url;`

    `-(void) storeCachedImage:(UIImage *)image forURL:(NSString *)url;`


    `@end`


    `@implementation ImageCache`


    `@synthesize cache = _cache;`


    `-(id) init`

    `{`

    `    self = [super init];`

    `    if (self) {`

    `        //the cached dictionary will empty if our app receives a memory warning`

    `        [[NSNotificationCenter defaultCenter] addObserver:self`

    `                                                 selector:@selector(clearCache)`

    `                                                     name:UIApplicationDidReceiveMemoryWarningNotification`

    `                                                   object:nil];`


    `    }`

    `    return self;`

    `}`


    `-(void) dealloc`

    `{`

    `    [[NSNotificationCenter defaultCenter] removeObserver:self`

    `name:UIApplicationDidReceiveMemoryWarningNotification object:nil];`

    `}`


    `-(NSMutableDictionary *) cache`

    `{`

    `    if (_cache == nil) {`

    `        _cache = [NSMutableDictionary dictionary];`

    `    }`

    `    return _cache;`

    `}`


    `- (void)clearCache`

    `{`

    `    [self.cache removeAllObjects];`

    `}`


    `-(void) storeCachedImage:(UIImage *)image forURL:(NSString *)url`

    `{`

    `    self.cache[url] = image;`

    `}`


    `-(UIImage *) cachedImageForURL:(NSString *)url`

    `{`

    `    return self.cache[url];`

    `}`


    Our image view category will be able to check for previously cached images by
    calling `cachedImageForURL:` with remote URLs. Likewise, when remote images finish
    downloading, we’ll cache them using `ImageCache`’s `storeCachedImage:forURL:`
    method.


    The next encapsulated class we’ll add is a `DownloadHelper` class and delegate
    protocol. Again, add this code above the implementation of `UIImageView (RemoteFile)`—straight
    after the `ImageCache` class declaration:


    `//A helper class for handling data download events and storing data progressively
    as it`

    `downloads for an image file`


    `@protocol DownloadHelperDelegate <NSObject>`


    `-(void)didCompleteDownloadForURL:(NSString *)url withData:(NSMutableData *)data;`


    `@end`

    `@interface DownloadHelper : NSObject`


    `@property (nonatomic,strong) NSString *url;`

    `@property (nonatomic,strong) NSMutableData *data;`

    `@property (nonatomic,strong) NSURLConnection *connection;`

    `@property (nonatomic,assign) id<DownloadHelperDelegate> delegate;`


    `@end`


    `@implementation DownloadHelper`


    `@synthesize url = _url;`

    `@synthesize data = _data;`

    `@synthesize connection = _connection;`

    `@synthesize delegate = _delegate;`


    `- (void) connection: (NSURLConnection*) connection didReceiveData: (NSData*)
    data`

    `{`

    `    //add the new bytes of data to our existing mutable data container`

    `    [self.data appendData:data];`

    `}`


    `- (void)connectionDidFinishLoading:(NSURLConnection *)connection`

    `{`

    `    //done downloading data - process completed!`

    `    [self.delegate didCompleteDownloadForURL:self.url withData:self.data];`

    `}`


    `-(void) cancelConnection`

    `{`

    `    if (self.connection) {`

    `        [self.connection cancel];`

    `        [self setConnection:nil];`

    `    }`

    `}`


    `-(void) dealloc`

    `{`

    `    [self cancelConnection];`

    `}`


    `@end`


    We’re going to create instances of this new `DownloadHelper` class whenever an
    image view needs to begin downloading a new remote image file. Each `DownloadHelper`
    instance will be owned by a `UIImageView` instance. The iOS SDK includes a class
    named `NSURLConnection` that we’ll use to download remote image data from a HTTP
    request. By subscribing our `DownloadHelper` instances as the delegates of `NSURLConnection`
    instances we’ll be able to catch data download updates and completion events via
    the `connection:didReceiveData:` and `connectionDidFinishLoading`: event handlers.


    The `DownloadHelper` will notify its owning image view via a delegate callback
    method `didCompleteDownloadForURL:withData:`.


    We’re now going to add another category on `UIImageView`. A new category that
    will be hidden from other classes as it’s just for internal use by our remote
    image downloading and caching logic. As the comments state, the primary reason
    for creating this `UIImageView(RemoteFileHidden)` category is to add two additional
    properties to Apple’s `UIImageView` class: `url` and `downloadHelper`. In Objective-C,
    it’s not actually possible to add synthesized properties to a class via a category.
    Instead, we’ll get around this by using dynamic properties that we’ll create and
    add to `UIImageView` class at runtime. Adding storage properties to the runtime
    is quite advanced stuff, but for the sake of creating useful reusable code, it’s
    the best way for our requirements. Begin by scrolling up to the top of `UIImageView+RemoteFile.m`
    and importing the runtime:


    `#import <objc/runtime.h>`


    Continuing work within `UIImageView+RemoteFile.m` and before the implementation
    of `UIImageView (RemoteFile)`, add the hidden `UIImageView(RemoteFileHidden)`
    category:'
  trans: "\n# 加载与显示远程图片\n\n遗憾的是，苹果并未在 iOS SDK 中将远程图片加载功能纳入`UIImageView`或任何其他类。要实现高效下载、缓存和渲染远程图片文件，需要编写相当多的复杂代码。不过，我们将编写一些可复用的图片下载与渲染代码，一旦攻克这个难题，你会发现这些代码也能用于其他\
    \ iPhone 开发项目。\n\n我们将通过创建一个 Objective-C 分类，并在`UIImageView`上新增`setImageWithRemoteFileURL:placeholderImage:`方法，来扩展苹果`UIImageView`的功能，使其支持远程图片显示。\n\
    \n在项目导航器中，选择`user-interface`/`categories`分组，然后使用快捷键`![Image](img/U002a.jpg)N`或者依次点击文件`![Image](img/U001.jpg)`新建`![Image](img/U001.jpg)`文件，从\
    \ Cocoa Touch 文件模板中选择 Objective-C 分类选项。创建一个名为`RemoteFile`的`UIImageView`分类，如图 11-9\
    \ 所示。\n\n`![Image](img/9781430243748_Fig11-09.jpg)`\n\n**图 11-9.** 在`UIImageView`上创建新的`RemoteFile`分类\n\
    \n在 Xcode 中打开`UIImageView+RemoteFile.h`，我们将为`UIImageView`添加一个新方法：\n\n```\n#import\
    \ <UIKit/UIKit.h>\n\n@interface UIImageView (RemoteFile)\n- (void)setImageWithRemoteFileURL:(NSString\
    \ *)urlString placeHolderImage:(UIImage *)placeholderImage;\n\n@end\n```\n\n我们正在为图像视图创建一个新方法`setImageWithRemoteFileURL:placeHolderImage:`，它接受一个\
    \ URL 字符串和一个占位图像实例。当从远程图片 URL 下载图像数据时，图像视图会显示占位图像。下载完成后，图像视图会用下载的图像替换占位图像。\n\n\
    同时，我们希望图片加载过程是优化过的。如果用户有数百个 Facebook 好友，并且他滚动浏览一个包含数百行的表格视图，那么我们必须小心，不要同时尝试下载数百张图片：否则，随着下载队列的增长，新图片出现所需的时间会越来越长。\n\
    \n切换到`UIImageView+RemoteFile.m`。我们将编写大约 250 行代码来实现新的`RemoteFile`图像视图分类。原因在于，除了实现我们的公共方法`setImageWithRemoteFileURL:placeHolderImage`之外，我们还会在分类实现文件中包含一些私有类。\n\
    \n首先，我们将创建一个类，用于在可变字典中缓存已下载的图像。这个缓存类将作为单例创建，并且所有图像视图实例均可访问。\n\n在新的`ImageCache`类的接口和实现代码上方，添加以下内容，位于空的`UIImageView\
    \ (RemoteFile)`实现之上：\n\n```\n//一个单例缓存类，用于存储已下载图片的 URL 键和 UIImage 值，这些图片之前已被下载\n\
    @interface ImageCache : NSObject\n\n@property (nonatomic,strong) NSMutableDictionary\
    \ *cache;\n\n-(UIImage *) cachedImageForURL:(NSString *)url;\n-(void) storeCachedImage:(UIImage\
    \ *)image forURL:(NSString *)url;\n\n@end\n\n@implementation ImageCache\n\n@synthesize\
    \ cache = _cache;\n\n-(id) init\n{\n    self = [super init];\n    if (self) {\n\
    \        //如果应用收到内存警告，缓存字典将被清空\n        [[NSNotificationCenter defaultCenter]\
    \ addObserver:self\n                                                 selector:@selector(clearCache)\n\
    \                                                     name:UIApplicationDidReceiveMemoryWarningNotification\n\
    \                                                   object:nil];\n\n    }\n  \
    \  return self;\n}\n\n-(void) dealloc\n{\n    [[NSNotificationCenter defaultCenter]\
    \ removeObserver:self\nname:UIApplicationDidReceiveMemoryWarningNotification object:nil];\n\
    }\n\n-(NSMutableDictionary *) cache\n{\n    if (_cache == nil) {\n        _cache\
    \ = [NSMutableDictionary dictionary];\n    }\n    return _cache;\n}\n\n- (void)clearCache\n\
    {\n    [self.cache removeAllObjects];\n}\n\n-(void) storeCachedImage:(UIImage\
    \ *)image forURL:(NSString *)url\n{\n    self.cache[url] = image;\n}\n\n-(UIImage\
    \ *) cachedImageForURL:(NSString *)url\n{\n    return self.cache[url];\n}\n```\n\
    \n我们的图像视图分类将能够通过调用`cachedImageForURL:`并传入远程 URL 来检查之前缓存的图像。同样，当远程图像下载完成时，我们将使用`ImageCache`的`storeCachedImage:forURL:`方法缓存它们。\n\
    \n接下来要添加的封装类是`DownloadHelper`类及其委托协议。同样，将此代码添加到`UIImageView (RemoteFile)`实现之上——紧接在`ImageCache`类声明之后：\n\
    \n```\n//一个用于处理数据下载事件并逐步存储图像文件下载数据的辅助类\n\n@protocol DownloadHelperDelegate <NSObject>\n\
    \n-(void)didCompleteDownloadForURL:(NSString *)url withData:(NSMutableData *)data;\n\
    \n@end\n\n@interface DownloadHelper : NSObject\n\n@property (nonatomic,strong)\
    \ NSString *url;\n@property (nonatomic,strong) NSMutableData *data;\n@property\
    \ (nonatomic,strong) NSURLConnection *connection;\n@property (nonatomic,assign)\
    \ id<DownloadHelperDelegate> delegate;\n\n@end\n\n@implementation DownloadHelper\n\
    \n@synthesize url = _url;\n@synthesize data = _data;\n@synthesize connection =\
    \ _connection;\n@synthesize delegate = _delegate;\n\n- (void) connection: (NSURLConnection*)\
    \ connection didReceiveData: (NSData*) data\n{\n    //将新接收的数据字节追加到现有的可变数据容器中\n\
    \    [self.data appendData:data];\n}\n\n- (void)connectionDidFinishLoading:(NSURLConnection\
    \ *)connection\n{\n    //数据下载完成 - 处理完成！\n    [self.delegate didCompleteDownloadForURL:self.url\
    \ withData:self.data];\n}\n\n-(void) cancelConnection\n{\n    if (self.connection)\
    \ {\n        [self.connection cancel];\n        [self setConnection:nil];\n  \
    \  }\n}\n\n-(void) dealloc\n{\n    [self cancelConnection];\n}\n\n@end\n```\n\n\
    每当图像视图需要开始下载新的远程图像文件时，我们将创建这个新的`DownloadHelper`类的实例。每个`DownloadHelper`实例将由一个`UIImageView`实例拥有。iOS\
    \ SDK 包含一个名为`NSURLConnection`的类，我们将用它通过 HTTP 请求下载远程图像数据。通过将我们的`DownloadHelper`实例设置为`NSURLConnection`实例的委托，我们将能够通过`connection:didReceiveData:`和`connectionDidFinishLoading:`事件处理程序捕获数据下载更新和完成事件。\n\
    \n`DownloadHelper`将通过委托回调方法`didCompleteDownloadForURL:withData:`通知其所属的图像视图。\n\n\
    现在我们将向`UIImageView`添加另一个分类。这个新分类将对其他类隐藏，因为它仅用于我们远程图像下载和缓存逻辑的内部使用。正如注释所述，创建这个`UIImageView(RemoteFileHidden)`分类的主要目的是为苹果的`UIImageView`类添加两个额外属性：`url`和`downloadHelper`。在\
    \ Objective-C 中，实际上无法通过分类为类添加合成的属性。相反，我们将通过使用动态属性来解决这个问题，这些属性将在运行时创建并添加到`UIImageView`类中。在运行时添加存储属性是相当高级的技术，但为了创建有用的可复用代码，这是满足我们需求的最佳方式。首先，滚动到`UIImageView+RemoteFile.m`的顶部，并导入运行时库：\n\
    \n```\n#import <objc/runtime.h>\n```\n\n继续在`UIImageView+RemoteFile.m`中工作，在`UIImageView\
    \ (RemoteFile)`的实现之前，添加隐藏的`UIImageView(RemoteFileHidden)`分类：\n"
- fmt: "```objectivec\n//An additional, hidden, dependant category on UIImageView.\
    \ Primarily for adding 2 dynamic\n//properties to UIImageView, url and downloadHelper\n\
    \n@interface UIImageView(RemoteFileHidden) <DownloadHelperDelegate>\n\n@property\
    \ (nonatomic,strong,setter = setUrl:) NSString *url;\n@property (nonatomic,strong,setter\
    \ = setDownloadHelper:) DownloadHelper *downloadHelper;\n\n@end\n\n@implementation\
    \ UIImageView(RemoteFileHidden)\n\n@dynamic url;\n@dynamic downloadHelper;\n\n\
    static char kImageUrlObjectKey;\nstatic char kImageDownloadHelperObjectKey;\n\n\
    + (ImageCache *)imageCache {\n    static ImageCache *_imageCache;\n\n    //return\
    \ a singleton instance of UIImageCache\n    if (_imageCache == nil) {\n      \
    \  _imageCache = [[ImageCache alloc] init];\n    }\n    return _imageCache;\n\
    }\n\n- (NSString *)url {\n    return (NSString *)objc_getAssociatedObject(self,\
    \ &kImageUrlObjectKey);\n}\n\n- (void)setUrl:(NSString *)url {\n    objc_setAssociatedObject(self,\
    \ &kImageUrlObjectKey, url,\nOBJC_ASSOCIATION_RETAIN_NONATOMIC);\n}\n\n- (DownloadHelper\
    \ *)downloadHelper {\n\n    DownloadHelper *helper = (DownloadHelper *)objc_getAssociatedObject(self,\
    \ &kImageDownloadHelperObjectKey);\n\n    if (helper == nil) {//lazy loading of\
    \ the helper class\n        helper = [[DownloadHelper alloc] init];\n        //when\
    \ the helper finishes downloading the remote image data it will call it’s\ndelegate\
    \ (this image view)\n        helper.delegate = self;\n        self.downloadHelper\
    \ = helper;\n    }\n\n    return helper;\n}\n\n- (void)setDownloadHelper:(DownloadHelper\
    \ *)downloadHelper {\n    objc_setAssociatedObject(self, &kImageDownloadHelperObjectKey,\
    \ downloadHelper, OBJC_ASSOCIATION_RETAIN_NONATOMIC);\n}\n\n-(void) dealloc\n\
    {\n    if (self.url != nil) [self.downloadHelper cancelConnection];\n}\n\n#pragma\
    \ mark DownloadHelperDelegate\n\n-(void)didCompleteDownloadForURL:(NSString *)url\
    \ withData:(NSMutableData *)data\n{\n    //handles the downloaded image data,\
    \ turns it into an image instance and saves then it\ninto the ImageCache singleton.\n\
    \n    UIImage *image = [UIImage imageWithData:data];\n\n    if (image == nil)\
    \ {//something didn't work out - data may be corrupted or a bad url\n        return;\n\
    \    }\n\n    //cache the image\n    ImageCache *imageCache = [UIImageView imageCache];\n\
    \    [imageCache storeCachedImage:image forURL:url];\n\n    //update the placeholder\
    \ image display of this UIImageView\n    self.image = image;\n\n}\n\n@end\n```\n\
    \nAlongside adding the dynamic `url` and `downloadHelper` properties to `UIImageView`,\
    \ this code adds a new class accessor method, `imageCache`, to instances of `UIImageView`.\
    \ Calling `imageCache` returns a reference to our singleton instance of our `ImageCache`\
    \ class. When the `DownloadHelper` instance receives the `connectionDidFinishLoading:`\
    \ callback from `NSURLConnection`, it calls its delegate (the image view) via\
    \ the `didCompleteDownloadForURL: withData:`, passing the completed data from\
    \ the server connection. `UIImageView`’s `didCompleteDownloadForURL: withData:`\
    \ then creates an image from the data and stores it in the singleton image cache\
    \ using the remote URL as the access key. The placeholder image is also replaced\
    \ with the new cached data image.\n\nFinally, let’s implement our main category\
    \ method, `setImageWithRemoteFileURL:placeHolderImage:`.\n\n```objectivec\n@implementation\
    \ UIImageView (RemoteFile)\n\n- (void)setImageWithRemoteFileURL:(NSString *)urlString\
    \ placeHolderImage:(UIImage\n*)placeholderImage\n{\n\n    if (self.url != nil\
    \ && [self.url isEqualToString:urlString]) {\n        //if the url matches the\
    \ existing url then ignore it\n        return;\n    }\n\n    [self.downloadHelper\
    \ cancelConnection];\n\n    self.url = urlString;\n\n    //get a reference to\
    \ the image cache singleton\n    ImageCache *imageCache = [UIImageView imageCache];\n\
    \n    UIImage *image = [imageCache cachedImageForURL:urlString];\n    //check\
    \ it we've already got a cached version of the image\n    if (image) {\n     \
    \   self.image = image;\n        return;\n    }\n\n    //no cached version so\
    \ start downloading the remote file\n    self.image = placeholderImage;\n\n  \
    \  NSURL *url = [NSURL URLWithString:urlString];\n    NSURLRequest *request =\
    \ [NSURLRequest requestWithURL:url];\n\n    self.downloadHelper.url = urlString;\n\
    \    //set the download helper as the delegate of the data download updates\n\
    \    self.downloadHelper.connection =(NSURLConnection *)[[NSURLConnection alloc]\n\
    initWithRequest:request delegate:self.downloadHelper startImmediately:YES];\n\
    \    if (self.downloadHelper.connection) {\n        //create an empty mutable\
    \ data container to add the data bytes to\n        self.downloadHelper.data =\
    \ [NSMutableData data];\n    }\n}\n\n@end\n```\n\nImagine that our Facebook friends’\
    \ table view displays 500 rows of friends and their remote photos. Do you remember\
    \ how a table view efficiently renders so many rows? It creates only as many table\
    \ view cells as are required to fill its visible bounds. It then reuses those\
    \ five or six table cells as the user scrolls downs the table. This means that\
    \ the `iconView` image view is also being reused. So the first thing we do when\
    \ the `setImageWithRemoteFileURL:placeHolderImage:` method is called is to cancel\
    \ any existing file download:\n\n```objectivec\n[self.downloadHelper cancelConnection];\n\
    ```\n\nIt’s this line of code that prevents our application from attempting to\
    \ download hundreds of Facebook friends’ photos simultaneously. Before our method\
    \ initiates a new file download, it checks to see whether we already have a cached\
    \ image for the URL:\n\n```objectivec\nUIImage *image = [imageCache cachedImageForURL:urlString];\n\
    ```\n\nIf we already have a cached version, then rather than attempt to re-download\
    \ the remote image, we use the existing cached image. If this is the first time\
    \ our program has attempted to download the remote image then we create a new\
    \ URL connection and set the download helper instance as the delegate for data\
    \ connection updates such as the data download completion event:\n\n```objectivec\n\
    self.downloadHelper.connection =(NSURLConnection *)[[NSURLConnection alloc]\n\
    initWithRequest:request delegate:self.downloadHelper startImmediately:YES];\n\
    ```\n\nWe also create a mutable data container to store incremental data downloads\
    \ for the remote file:\n\n```objectivec\nself.downloadHelper.data = [NSMutableData\
    \ data];\n```\n\nWe’ve completed the `UIImageView` category, so let’s test it\
    \ out. Open `BRBirthdayTableViewCell.m`, import `UIImageView+RemoteFile.h`, and\
    \ then add the following code to the end of `setBirthdayImport:`\n\n```objectivec\n\
    if (_birthdayImport.imageData == nil)\n    {\n        if ([_birthdayImport.picURL\
    \ length] > 0) {\n            [self.iconView setImageWithRemoteFileURL:birthdayImport.picURL\n\
    placeHolderImage:[UIImage imageNamed:@\"icon-birthday-cake.png\"]];\n        }\n\
    \        else self.iconView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n}\nelse {\n        self.iconView.image = [UIImage imageWithData:birthdayImport.imageData];\n\
    }\n```\n\nWhile we’re here, add the following similar code to the end of the `setBirthday:`\
    \ method:\n\n```objectivec\nif (_birthday.imageData == nil)\n    {\n        if\
    \ ([_birthday.picURL length] > 0) {\n            [self.iconView setImageWithRemoteFileURL:_birthday.picURL\n\
    placeHolderImage:[UIImage imageNamed:@\"icon-birthday-cake.png\"]];\n        }\n\
    \        else self.iconView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
    ];\n    }\nelse {\n        self.iconView.image = [UIImage imageWithData:_birthday.imageData];\n\
    }\n```\n\nThe code checks for the existence of a remote image URL (`picURL`) for\
    \ birthday entities and birthday imports. If an image URL exists, then the table\
    \ cell calls our category the `setImageWithRemoteFileURL:placeHolderImage:` remote\
    \ image display method."
