  trans: "\n### 填充 Core Data 存储\n\n在开始从 Core Data 模型创建新的 `BRDBirthday` 实例之前，我们将在 `BRDModel`\
    \ 中添加一个新的 `saveChanges` 方法。这是一个公共实例方法，因此需要在 `BRDModel.h` 中添加声明：\n\n`- (void)saveChanges;`\n\
    \n然后在 `BRDModel.m` 源文件中实现：\n\n```\n- (void)saveChanges\n{\n    NSError *error\
    \ = nil;\n    if ([self.managedObjectContext hasChanges]) {\n        if (![self.managedObjectContext\
    \ save:&error]) {//保存失败\n            NSLog(@\"保存失败: %@\",[error localizedDescription]);\n\
    \        }\n        else {\n            NSLog(@\"保存成功\");\n        }\n    }\n\
    }\n```\n\n接下来，我们将名人生日数据导入 Core Data 模型，从而填充 Home 视图控制器中的数据库和生日表格视图。删除并替换 `BRHomeViewController.m`\
    \ 中当前版本的 `initWithCoder:` 方法，替换为以下内容：\n\n```\n- (id) initWithCoder:(NSCoder *)aDecoder\n\
    {\n    self = [super initWithCoder:aDecoder];\n\n    if (self) {\n        NSString*\
    \ plistPath = [[NSBundle mainBundle] pathForResource:@\"birthdays\" ofType:@\"\
    plist\"];\n        NSArray *nonMutableBirthdays = [NSArray arrayWithContentsOfFile:plistPath];\n\
    \n        BRDBirthday *birthday;\n        NSDictionary *dictionary;\n        NSString\
    \ *name;\n        NSString *pic;\n        NSString *pathForPic;\n        NSData\
    \ *imageData;\n        NSDate *birthdate;\n        NSCalendar *calendar = [NSCalendar\
    \ currentCalendar];\n\n        NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
    \n        for (int i=0;i<[nonMutableBirthdays count];i++) {\n            dictionary\
    \ = nonMutableBirthdays[i];\n\n            birthday = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    BRDBirthday\"\ninManagedObjectContext:context];\n\n            name = dictionary[@\"\
    name\"];\n            pic = dictionary[@\"pic\"];\n            birthdate = dictionary[@\"\
    birthdate\"];\n            pathForPic = [[NSBundle mainBundle] pathForResource:pic\
    \ ofType:nil];\n            imageData = [NSData dataWithContentsOfFile:pathForPic];\n\
    \            birthday.name = name;\n            birthday.imageData = imageData;\n\
    \            NSDateComponents *components = [calendar\ncomponents:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
    \ fromDate:birthdate];\n            //新的字面量语法，等同于\n            //birthday.birthDay\
    \ = [NSNumber numberWithInt:components.day];\n            birthday.birthDay =\
    \ @(components.day);\n            birthday.birthMonth = @(components.month);\n\
    \            birthday.birthYear = @(components.year);\n            [birthday updateNextBirthdayAndAge];\n\
    \        }\n        [[BRDModel sharedInstance] saveChanges];\n    }\n\n    return\
    \ self;\n}\n```\n\n目前，我们只是创建新的 Core Data `BRDBirthday` 实体，并为每个名人生日设置属性 `name`、`imageData`、`birthDay`、`birthMonth`\
    \ 和 `birthYear`。我们还在每个新建的生日托管对象上调用了扩展的 `updateNextBirthdayAndAge` 方法，该方法会填充 `nextBirthday`\
    \ 和 `nextBirthdayAge` 属性。遍历完生日字典的 `plist` 并为每个字典插入一个新的生日实体后，我们在模型上调用新的 `saveChanges`\
    \ 方法。\n\n现在构建并运行。你应该能看到名人列表。再构建并运行几次。你是否注意到任何异常，例如图 8-13 所示的情况？\n\n![Image](img/9781430243748_Fig08-13.jpg)\n\
    \n**图 8-13.** 太多比伯了？\n\n每次我们重建并运行应用时，都会在 Home 视图控制器的 `initWithCoder:` 初始化方法中创建并保存一批新的\
    \ `BRDBirthday` 托管对象。只要我们在之前的应用会话中至少保存了一次 Core Data，我们就能在从名人 `plist` 生日数据导入之前预先填充获取结果控制器的结果集。所以数据确实按预期持久化了。问题在于，每次运行应用时，我们都在不断创建新的重复生日实例并将它们添加到数据存储中。我们需要添加一种方法来避免导入重复数据。\n\
    \n### 重复实体与同步\n\n避免添加重复生日托管对象的一个有效方法是在 `BRDBirthday` 实例上引用唯一标识符，以检查我们是否已在存储中创建了匹配的生日。这就是我们在定义\
    \ Core Data 模型中的 `BRDBirthday` 实体时创建 `uid` 字符串属性的原因。\n\n我们将使用名人姓名作为唯一标识符（当后续从\
    \ Facebook 或通讯录导入时，我们会使用唯一的个人资料标识符）。在创建新的生日托管对象之前，我们将遍历 `plist` 中的生日字典，并将所有姓名拼接成一个唯一\
    \ ID 数组。然后，使用该 ID 数组创建一个 Core Data 获取请求，返回具有匹配 `uid` 的任何现有 `BRDBirthday` 实体。我们将在\
    \ `BRDModel` 单例类的新方法中创建用于检查现有生日的获取请求，因为这种重复检查功能在我们开始从其他来源（如 Facebook 和通讯录）导入时也会派上用场。\n\
    \n切换到 `BRDModel`。\n\n在 `BRDModel.h` 中添加一个新的公共方法声明：\n\n`-(NSMutableDictionary *)\
    \ getExistingBirthdaysWithUIDs:(NSArray *)uids;`\n\n切换到 `BRDModel.m` 源文件并导入 `BRDBirthday`：\n\
    \n`#import \"BRDBirthday.h\"`\n\n然后实现该方法：\n\n```\n-(NSMutableDictionary *) getExistingBirthdaysWithUIDs:(NSArray\
    \ *)uids\n{\n    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n\
    \n    NSManagedObjectContext *context = self.managedObjectContext;\n\n    //NSPredicate\
    \ 用于过滤结果集。\n    //此谓词指定结果中的 uid 属性必须匹配 uids 数组中的一个或多个值\n    NSPredicate *predicate\
    \ = [NSPredicate predicateWithFormat:@\"uid IN %@\", uids];\n    fetchRequest.predicate\
    \ = predicate;\n\n    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
    BRDBirthday\"\ninManagedObjectContext:context];\n    fetchRequest.entity = entity;\n\
    \n    NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"\
    uid\"\nascending:YES];\n    NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
    \ nil];\n    fetchRequest.sortDescriptors = sortDescriptors;\n\n    NSFetchedResultsController\
    \ *fetchedResultsController = [[NSFetchedResultsController alloc]\ninitWithFetchRequest:fetchRequest\
    \ managedObjectContext:context sectionNameKeyPath:nil\ncacheName:nil];\n\n   \
    \ NSError *error = nil;\n    if (![fetchedResultsController performFetch:&error])\
    \ {\n\n        NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n        abort();\n\
    \    }\n\n    NSArray *fetchedObjects = fetchedResultsController.fetchedObjects;\n\
    \n    NSInteger resultCount = [fetchedObjects count];\n\n        if (resultCount\
    \ == 0) return [NSMutableDictionary dictionary];//Core Data 存储中没有数据\n\n    BRDBirthday\
    \ *birthday;\n\n        NSMutableDictionary *tmpDict = [NSMutableDictionary dictionary];\n\
    \n    int i;\n\n    for (i = 0; i < resultCount; i++) {\n        birthday =  fetchedObjects[i];\n\
    \        tmpDict[birthday.uid] = birthday;\n    }\n\n    return tmpDict;\n}\n\
    ```\n\n我们创建了另一个获取结果控制器，但仅用于新的 `getExistingBirthdaysWithUIDs:` 方法临时作用域。从托管对象上下文中检索到结果后，它们会被打包成一个字典，使用\
    \ `uid` 属性作为键，`BRDBirthday` 托管对象作为值。\n\n请注意，我们现在创建了一个 `NSPredicate` 实例，以便获取请求仅限制为匹配谓词查询的\
    \ `BRDBirthday` 实体：\n\n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    uid IN %@\", uids];\nfetchRequest.predicate = predicate;\n```\n"
- fmt: "# NSPredicate and Birthday Reminder Optimization\n\nThe `NSPredicate` class\
    \ is used for filtering a results set. This code should optimize the results set\
    \ for scalability because we only request `BRDBirthday` managed objects in the\
    \ results set that have the `uid` attribute matching one or more of the values\
    \ in the `uids` array parameter.\n\n## Updating the Home View Controller\n\nBack\
    \ in our Home view controller, we’ll now add to the `initWithCoder:` method to\
    \ take advantage of our model’s `getExistingBirthdaysWithUIDs:` method:\n\n```\n\
    - (id) initWithCoder:(NSCoder *)aDecoder\n{\n    self = [super initWithCoder:aDecoder];\n\
    \n    if (self) {\n        NSString* plistPath = [[NSBundle mainBundle] pathForResource:@\"\
    birthdays\" ofType:@\"plist\"];\n        NSArray *nonMutableBirthdays = [NSArray\
    \ arrayWithContentsOfFile:plistPath];\n\n        BRDBirthday *birthday;\n    \
    \    NSDictionary *dictionary;\n        NSString *name;\n        NSString *pic;\n\
    \        NSString *pathForPic;\n        NSData *imageData;\n        NSDate *birthdate;\n\
    \        NSCalendar *calendar = [NSCalendar currentCalendar];\n\n        NSString\
    \ *uid;\n        NSMutableArray *uids = [NSMutableArray array];\n        for (int\
    \ i=0;i<[nonMutableBirthdays count];i++) {\n            dictionary = [nonMutableBirthdays\
    \ objectAtIndex:i];\n            uid = dictionary[@\"name\"];\n            [uids\
    \ addObject:uid];\n        }\n        NSMutableDictionary *existingEntities =\
    \ [[BRDModel sharedInstance] getExistingBirthdaysWithUIDs:uids];\n\n        NSManagedObjectContext\
    \ *context = [BRDModel sharedInstance].managedObjectContext;\n\n        for (int\
    \ i=0;i<[nonMutableBirthdays count];i++) {\n            dictionary = nonMutableBirthdays[i];\n\
    \n            uid = dictionary[@\"name\"];\n\n            birthday = existingEntities[uid];\n\
    \n            if (birthday) {//birthday already exists\n\n            }\n    \
    \        else {//birthday doesn't exist so create it\n                birthday\
    \ = [NSEntityDescription insertNewObjectForEntityForName:@\"BRDBirthday\" inManagedObjectContext:context];\n\
    \                existingEntities[uid] = birthday;\n                birthday.uid\
    \ = uid;\n\n            }\n\n            name = dictionary[@\"name\"];\n     \
    \       pic = dictionary[@\"pic\"];\n            birthdate = dictionary[@\"birthdate\"\
    ];\n            pathForPic = [[NSBundle mainBundle] pathForResource:pic ofType:nil];\n\
    \            imageData = [NSData dataWithContentsOfFile:pathForPic];\n       \
    \     birthday.name = name;\n            birthday.imageData = imageData;\n   \
    \         NSDateComponents *components = [calendar components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
