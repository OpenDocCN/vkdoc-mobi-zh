- fmt: "### Creating a Facebook Wall Post View Controller\n\nOpen your storyboard\
    \ and begin by adding a new view controller to the storyboard and then embedding\
    \ it in a new navigation controller: Editor ![Image](images/U001.jpg) Embed In\
    \ ![Image](images/U001.jpg) Navigation Controller. Title the new view controller\
    \ Facebook and add two bar button items to the navigation bar, one named Cancel\
    \ and one named Post, as shown in [Figure 11-12](#Chapter11.html#fig_11_12).\n\
    \n![Image](images/9781430243748_Fig11-12.jpg)\n\n**Figure 11-12.** Adding a new\
    \ view controller and bar button items\n\nSelect the `user-interface/view-controllers`\
    \ Xcode group and create a new Objective-C class file within it. Name your class\
    \ `BRPostToFacebookWallViewController` and enter `BRCoreViewController` into the\
    \ Subclass Of text field.\n\nBack in your storyboard, select the new navigation\
    \ controller you just created and using the identity inspector, enter the Storyboard\
    \ ID `PostToFacebookWall`, as shown in [Figure 11-13](#Chapter11.html#fig_11_13).\n\
    \n![Image](images/9781430243748_Fig11-13.jpg)\n\n**Figure 11-13.** Identifying\
    \ the new navigation controller in the storyboard\n\nSelect the new Post to Facebook\
    \ Wall view controller in your storyboard, and using the identity inspector change\
    \ the custom class of the view controller to your new `BRPostToFacebookWallViewController`\
    \ class.\n\nOpen `BRBirthdayDetailViewController.m` and modify the existing `facebookButtonTapped:`\
    \ action method as follows:\n\n```\n- (IBAction)facebookButtonTapped:(id)sender\n\
    {\n    UINavigationController *navigationController = [self.storyboard instantiateViewControllerWithIdentifier:@\"\
    PostToFacebookWall\"];\n    [self.navigationController presentViewController:navigationController\
    \ animated:YES completion:nil];\n}\n```\n\nBack to the storyboard, switch to Assistant\
    \ Editor mode and ensure that your Post to the Facebook Wall view controller is\
    \ selected. Control-drag from the Cancel button to the view controller and select\
    \ the `cancelAndDismiss:` inherited action method from the contextual menu.\n\n\
    Control-drag from the Post button to the `BRPostToFacebookWallViewController.h`\
    \ public interface to add a new action method named `postToFacebook`. Then Control-drag\
    \ again from the Post button to create an outlet reference to the button and name\
    \ it `postButton`. The resulting header file should match mine, as follows:\n\n\
    ```\n#import \"BRCoreViewController.h\"\n\n@interface BRPostToFacebookWallViewController\
    \ : BRCoreViewController\n- (IBAction)postToFacebook:(id)sender;\n@property (weak,\
    \ nonatomic) IBOutlet UIBarButtonItem *postButton;\n\n@end\n```\n\nBuild and run.\
    \ To test the new functionality, you’ll need to ensure that you’ve imported at\
    \ least one birthday from Facebook first. Tap a birthday from the Home view controller,\
    \ and then in the Detail view controller, you should find the Post on Friend’s\
    \ Wall button. Tapping the button should present your new Post to the Facebook\
    \ Wall view controller, as shown in [Figure 11-14](#Chapter11.html#fig_11_14).\n\
    \n![Image](images/9781430243748_Fig11-14.jpg)\n\n**Figure 11-14.** The Post to\
    \ the Facebook Wall view controller presented modally\n\nBack in your storyboard,\
    \ let’s finish our work on the view for the post to Facebook Wall view controller.\
    \ Add a text view and two images and set them up as follows:\n\n> *   The text\
    \ view: x=0, y=10, width=235, height=190\n> *   Both image views: x=238, y=10,\
    \ width=71, height=71\n\nSet the image attribute of the bottom image view to `thumbnail-background.png`.\
    \ The final view should look like [Figure 11-15](#Chapter11.html#fig_11_15).\n\
    \n![Image](images/9781430243748_Fig11-15.jpg)\n\n**Figure 11-15.** The Post to\
    \ the Facebook Wall view with text and image views\n\nCreate an outlet for the\
    \ front image view named `photoView` and an outlet for the text view named `textView`.\
    \ Declare that your `BRPostToFacebookWallViewController` implements the `UITextViewDelegate`\
    \ protocol and then Control-drag from the text view to the view controller to\
    \ assign the view controller as the delegate of the text view.\n\n`BRPostToFacebookWallViewController.h`\
    \ should now read as follows:\n\n```\n#import \"BRCoreViewController.h\"\n\n@interface\
    \ BRPostToFacebookWallViewController : BRCoreViewController <UITextViewDelegate>\n\
    \n- (IBAction)postToFacebook:(id)sender;\n@property (weak, nonatomic) IBOutlet\
    \ UIBarButtonItem *postButton;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *photoView;\n@property (weak, nonatomic) IBOutlet UITextView *textView;\n\n\
    @end\n```\n\nBefore we move our attention to the implementation of `BRPostToFacebookWallViewController`,\
    \ let’s declare two more public properties in `BRPostToFacebookWallViewController.h`:\n\
    \n```\n@property (strong, nonatomic) NSString *facebookID;\n@property (strong,\
    \ nonatomic) NSString *initialPostText;\n```\n\nWhen we initialize the Post to\
    \ Facebook Wall view controller, we’ll set the initial text to display in the\
    \ text view and pass a Facebook ID so that our code will know which Facebook Wall\
    \ to write to and can also display the photo of the Facebook friend using the\
    \ Facebook ID and standard Facebook profile photo URL format.\n\nLet’s set these\
    \ values from the Birthday Detail view controller now. Open `BRBirthdayDetailViewController.m`\
    \ and import `BRPostToFacebookWallViewController.h` before completing the `facebookButtonTapped`\
    \ method:\n\n```\n- (IBAction)facebookButtonTapped:(id)sender\n{\n    UINavigationController\
    \ *navigationController = [self.storyboard instantiateViewControllerWithIdentifier:@\"\
    PostToFacebookWall\"];\n    BRPostToFacebookWallViewController *facebookWallViewController\
    \ = (BRPostToFacebookWallViewController *) navigationController.topViewController;\n\
    \    facebookWallViewController.facebookID = self.birthday.facebookID;\n    facebookWallViewController.initialPostText\
    \ = @\"Happy Birthday!\";\n    [self.navigationController presentViewController:navigationController\
    \ animated:YES completion:nil];\n}\n```\n\nYou can build and run your app to check\
    \ that it all compiles OK, however, your Post to Facebook Wall view controller\
    \ is going to look a little ugly with a nonstyled text view. Let’s now implement\
    \ `BRPostToFacebookWallViewController.m`:\n\n```\n#import \"BRPostToFacebookWallViewController.h\"\
    \n#import \"BRStyleSheet.h\"\n#import \"UIImageView+RemoteFile.h\"\n\n@interface\
    \ BRPostToFacebookWallViewController ()\n\n@end\n\n@implementation BRPostToFacebookWallViewController\n\
    \n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    [BRStyleSheet styleRoundCorneredView:self.photoView];\n\
    \    [BRStyleSheet styleTextView:self.textView];\n}\n\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n\n    NSString *facebookPicURL = [NSString\n\
    stringWithFormat:@\"http://graph.facebook.com/%@/picture?type=large\",self.facebookID];\n\
    \n    [self.photoView setImageWithRemoteFileURL:facebookPicURL placeHolderImage:[UIImage\
    \ imageNamed:@\"icon-birthday-cake.png\"]];\n    self.textView.text = self.initialPostText;\n\
    \n    [self.textView becomeFirstResponder];\n\n    [self updatePostButton];\n\
    }\n\n- (IBAction)postToFacebook:(id)sender {\n}\n\n- (void)updatePostButton\n\
    {\n    self.postButton.enabled = self.textView.text.length > 0;\n}\n\n#pragma\
    \ mark UITextViewDelegate\n\n- (void)textViewDidChange:(UITextView *)textView\n\
    {\n    [self updatePostButton];\n}\n\n@end\n```\n\nThere shouldn’t be anything\
    \ unfamiliar in this code because it’s really an amalgamation of several coding\
    \ techniques that you’ve learned throughout this book. When the view loads our\
    \ `BRStyleSheet` class, apply the styling code to the text and image views:\n\n\
    ```\n[BRStyleSheet styleRoundCorneredView:self.photoView];\n[BRStyleSheet styleTextView:self.textView];\n\
    ```\n\nIn the `viewWillAppear:` method we use the Facebook ID to generate a link\
    \ to the profile photo for this Facebook user, and then take advantage of our\
    \ remote image view file loading category method to display the profile pic next\
    \ to the text view."
