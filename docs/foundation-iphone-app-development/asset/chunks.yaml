    and you now have compiler errors. This is because our app uses ARC (Automatic
    Reference Counting) and Appirater does not. Do not panic young Daniel-san. Luckily,
    Apple had the foresight to realize that there would be times when ARC-compatible
    projects might also need to include non-ARC-compatible classes. Here’s how to
    get rid of those compiler errors. Select your *BirthdayReminder* project and then
    `BirthdayReminder` target. Select the Build Phases tab and open the Compile Sources
    section. We are going to add a Compiler Flag for the problem file, `Appirater.m`,
    which should be listed at the end of the Compile Sources list. Double-click the
    class file and type in the `fno-objc-arc` compiler flag, as shown in [Figure 13-3](#Chapter13.html#fig_13_3).


    ![Image](images/9781430243748_Fig13-03.jpg)


    **Figure 13-3.** Integrating non-ARC files into an ARC project


    That should solve the ARC-related errors and generate some new ones. Hurray! The
    new errors relate to missing frameworks that Appirater is also dependent on. We
    need to add Apple’s CFNetwork and SystemConfiguration frameworks to our project.
    Do you remember how to do that? Stay in the Build Phases tab of your target’s
    project settings and open the Link Binary Files with Libraries pane. Tap the +
    button to add `CFNetwork.framework` and `SystemConfiguration.framework`, as shown
    in [Figure 13-4](#Chapter13.html#fig_13_4).


    ![Image](images/9781430243748_Fig13-04.jpg)


    **Figure 13-4.** Adding CFNetwork.framework and SystemConfiguration.framework
    to our project


    You should now be able to build and run your app without problems.


    Following Appirater’s *Getting Started* instructions in the README file, we next
    need to open `BRAppDelegate.m` and import `Appirater.h`. Then locate the `application:didFinishLaunchingWithOptions:`
    method and modify it to let Appirater know the app has launched:


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary`

    `*)launchOptions`

    `{`

    `    [BRStyleSheet initStyles];`

    **`    [Appirater appLaunched:YES];`**

    `    return YES;`

    `}`


    Now add the following modification to the delegate’s `applicationWillEnterForeground:`
    method:


    `- (void)applicationWillEnterForeground:(UIApplication *)application`

    `{`

    **`[Appirater appEnteredForeground:YES];`**

    `}`'
  trans: "\n### 获取更多 5 星 App Store 评分\n\n在第 1 章中，我谈到了获得良好 App Store 评价的重要性。你的应用获得的五星好评越多越好（参见图\
    \ 13-1）。\n\n![Image](img/9781430243748_Fig13-01.jpg)\n\n**图 13-1.** *生日提醒*在美国\
    \ App Store 的正式版本\n\n浏览 App Store 的用户更倾向于下载那些拥有大量好评和高星级评分的应用，而不是那些充斥着 1 星差评和负面评价的应用。这是显而易见的道理。\n\
    \n不过，你需要了解许多关于 App Store 的事实。每个国家都有自己的 App Store。用户浏览的 App Store 版本直接与其 Apple\
    \ 账户挂钩：如果用户在美国注册了 Apple 账户，那么他默认会浏览美国的 App Store。如果用户的 Apple ID 是在英国注册的，那么她就会浏览英国的\
    \ App Store。这意味着所有的评价、评分和排行榜位置都是针对具体国家的。你的应用可能在英国表现极佳，但如果在美国的下载量很少，那么完全相同的应用在美国就可能毫无踪影（没错，我就遇到过这种情况！）。关于这一点，还需注意，通常一个应用在其类别中攀升至英国、法国、德国等国榜首时，其收入远低于攀升至美国排行榜榜首的应用。美国\
    \ iOS 用户在付费应用上的花费超过其他任何国家。但这并不意味着你应该只针对美国用户；你的目标市场取决于你开发的应用类型。\n\n不过有一件事是确定的：如果你的应用获得了下载量，你需要确保那些满意的用户对你的应用进行评分和评价。为了让用户评分和评价你的应用，他们要么需要（a）足够喜爱（或憎恨）你的应用而愿意付出努力，然后（b）在评价之前，需要访问\
    \ App Store 搜索并找到你的应用。那么，为什么不让他们轻松一些呢？可以在用户使用应用几天后（想必是愉快的几天！）鼓励他们对应用进行评分。有一个适用于\
    \ iOS 应用的优秀开源 Objective-C 类库，名为`Appirater`，正是为此而设。你可以从 GitHub 下载`Appirater`，地址是：[`https://github.com/arashpayan/appirater`](https://github.com/arashpayan/appirater)。\n\
    \n到目前为止，我们还没有使用任何第三方代码或库，但既然有经过验证的方法可以鼓励用户对 iOS 应用进行评分，我认为没必要为我们的项目重新发明轮子。\n\n\
    在 Finder 中，于项目的根层级创建一个名为`support`的新文件夹。添加一个名为`Appirater`的子文件夹，然后将你刚从 GitHub 下载的文件复制进去，如图\
    \ 13-2 所示。`Appirater`很可能在我撰写本章后有所变化，因此我也在源代码中包含了当时使用的版本。\n\n![Image](img/9781430243748_Fig13-02.jpg)\n\
    \n**图 13-2.** 添加`Appirater`，将第三方代码单独放在`support`文件夹中\n\n现在，将`support`文件夹及其内容添加到你的*生日提醒*项目中。此时，你可能会发现项目无法编译，并出现编译器错误。这是因为我们的应用使用了\
    \ ARC（自动引用计数），而`Appirater`没有。别慌，年轻的 Daniel-san。幸运的是，苹果公司已有先见之明，认识到有时兼容 ARC 的项目也可能需要包含不兼容\
    \ ARC 的类。以下是消除这些编译器错误的方法。选择你的*BirthdayReminder*项目，然后选择`BirthdayReminder`目标。选择“Build\
    \ Phases”标签，并打开“Compile Sources”部分。我们将为问题文件`Appirater.m`添加一个编译器标志，该文件应列在“Compile\
    \ Sources”列表的末尾。双击该类文件，并输入`-fno-objc-arc`编译器标志，如图 13-3 所示。\n\n![Image](img/9781430243748_Fig13-03.jpg)\n\
    \n**图 13-3.** 将非 ARC 文件集成到 ARC 项目中\n\n这应该能解决与 ARC 相关的错误，并产生一些新的错误。好耶！这些新错误与`Appirater`依赖的缺失框架有关。我们需要将苹果的`CFNetwork`和`SystemConfiguration`框架添加到我们的项目中。还记得怎么做吗？停留在目标项目设置的“Build\
    \ Phases”标签，并打开“Link Binary Files with Libraries”面板。点击+按钮添加`CFNetwork.framework`和`SystemConfiguration.framework`，如图\
    \ 13-4 所示。\n\n![Image](img/9781430243748_Fig13-04.jpg)\n\n**图 13-4.** 向我们的项目添加`CFNetwork.framework`和`SystemConfiguration.framework`\n\
    \n现在你应该能够毫无问题地构建和运行你的应用了。\n\n按照`Appirater`的 README 文件中的*入门*说明，接下来我们需要打开`BRAppDelegate.m`并导入`Appirater.h`。然后找到`application:didFinishLaunchingWithOptions:`方法，并修改它，让`Appirater`知道应用已启动：\n\
    \n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    [BRStyleSheet initStyles];\n    [Appirater appLaunched:YES];\n\
    \    return YES;\n}\n```\n\n现在，对委托的`applicationWillEnterForeground:`方法进行以下修改：\n\
    \n```\n- (void)applicationWillEnterForeground:(UIApplication *)application\n{\n\
    \    [Appirater appEnteredForeground:YES];\n}\n```\n"
- fmt: "### Configuring Appirater\n\nTo configure `Appirater`, you have to manually\
    \ edit the `Appirater.h` header file.\n\nThe first change to make will be to modify\
    \ the `APPIRATER_APP_ID` constant declaration to the numeric ID of your app. This\
    \ is a numeric ID that you can only access once you’ve created a new app to submit\
    \ in iTunes Connect. We’ll be leaning about iTunes Connect in [Chapter 14](#Chapter14.html#ch14),\
    \ so for now, just use *Birthday Reminder*’s live App ID:\n\n```\n#define APPIRATER_APP_ID\
    \                   489537509\n```\n\nNext, change the name that the Alert view\
    \ will use to reference to our app:\n\n```\n#define APPIRATER_APP_NAME       \
    \          @\"Birthday Reminder\"\n```\n\nBy default, `Appirater` uses the project\
    \ name of our app, which is `BirthdayReminder` without a space: not so user-friendly.\n\
    \nIf it’s not on already, switch `Appirater`’s debug mode on:\n\n```\n#define\
    \ APPIRATER_DEBUG                 YES\n```\n\nBuild and run *Birthday Reminder*\
    \ on your iPhone or iPod Touch because links to the App Store won’t work on the\
    \ iOS simulator.\n\nBecause we’ve switched on `Appirater`’s debug mode, we can\
    \ immediately see what the rating alert will look like when it eventually displays\
    \ for our users (see [Figure 13-5](#Chapter13.html#fig_13_5)).\n\n![Image](images/9781430243748_Fig13-05.jpg)\n\
    \n**Figure 13-5.** A user-friendly `Appirater` alert\n\nNow, it used to be that\
    \ tapping Rate Birthday Reminder would link users directly into your app’s Write\
    \ Review screen on the App Store. However, in iOS 6, Apple revamped the App Store,\
    \ and to my knowledge, it’s no longer possible to link directly to the write a\
    \ review screen of an app. Instead, we’ll have to opt for the user being taken\
    \ to our app’s main page in the App Store. To fix this in `Appirater`, switch\
    \ to `Appirater.m` and modify the `templateReviewURL` value to the following:\n\
    \n```\nNSString *templateReviewURL =\n@\"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=APP_ID&mt=8\"\
    ;\n```\n\nBuild and run. Test the Rate Birthday Reminder button link. You should\
    \ end up on *Birthday Reminder*’s main screen in the App Store.\n\nIt can be a\
    \ little disconcerting to use `Appirater` when you first submit an app because\
    \ the link won’t work when your app isn’t live. However, as soon as it gets approved\
    \ by Apple, the link works—just don’t get your App ID wrong! Check, check, and\
    \ check again.\n\nIn `Appirater.h`, revert the `APPIRATER_DEBUG` constant back\
    \ to `NO`. By default, `Appirater` won’t display the rating request to the user\
    \ until after at least 30 days have elapsed or the user has run the app 20 times.\
    \ These are variants that we can change. I tend to go for a rating request after\
    \ one week’s use:\n\n```\n#define APPIRATER_DAYS_UNTIL_PROMPT        7       \
    \ // double\n#define APPIRATER_USES_UNTIL_PROMPT        5        // integer\n\
    ```\n\nIt’s also worth adding a manual option in our setting screen to encourage\
    \ the user to rate *Birthday Reminder*. Open your storyboard and select the table\
    \ view in the main Settings view controller, as shown in [Figure 13-6](#Chapter13.html#fig_13_6).\
    \ Using the attributes inspector, increment the Sections value to 2. This should\
    \ create a duplicate group of table cells in the first section of the table view.\n\
    \n![Image](images/9781430243748_Fig13-06.jpg)\n\n**Figure 13-6.** Creating a new\
    \ Static Table section\n\nDelete one of the cells in the second table view section.\
    \ With the remaining cell, change its style to Basic and change its text to **Add\
    \ an App Store Review!** (see [Figure 13-7](#Chapter13.html#fig_13_7)).\n\nI’ve\
    \ included a bunch of freely-available icons in the `assets` folder of the source\
    \ code. Add all these icons to your Xcode project `resources/images` group. Now\
    \ select the new table cell and set the image attribute to `icon-compose.png`.\
    \ The result should look like [Figure 13-7](#Chapter13.html#fig_13_7).\n\n![Image](images/9781430243748_Fig13-07.jpg)\n\
    \n**Figure 13-7.** There’s nothing wrong with giving our users a subtle idea...\n\
    \nWe need to add the hyperlink to review our app. Open the `BRSettingsViewController.m`\
    \ source file, import `Appirater.h`, and then implement a `tableView:didSelectRowAtIndexPath:`\
    \ `UITableViewDelegate` protocol method:\n\n```\n-(void) tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    //ignore\
    \ if the user tapped the Day Before or Alert Time table cells\n    if (indexPath.section\
    \ == 0) return;\n\n    //We'll start a switch statement so that we can cater for\
    \ future row taps in the project\n    switch (indexPath.row) {\n        case 0:\
    \ //Add an App Store Review!\n            [Appirater rateApp];\n            break;\n\
    \        default:\n            break;\n    }  \n}\n```\n\nWe’ve added a second\
    \ section to our table. At present, we are displaying a section header titled\
    \ Reminders. In the current implementation, we’ll end up with the same header\
    \ text for both sections, so let’s also fix that in `BRSettingsViewController.m`:\n\
    \n```\n- (UIView *)tableView:(UITableView *)tableView viewForHeaderInSection:(NSInteger)section\n\
    {\n    return section == 0 ? [self createSectionHeaderWithLabel:@\"Reminders\"\
    ] : [self createSectionHeaderWithLabel:@\"Share the Love\"];\n}\n```\n\nAs before,\
    \ you’ll need to run the app on your iPhone or iPod Touch to see the App Store\
    \ link working.\n\nAside from the convenience of calling a simple `rateApp` `Appirater`\
    \ method, an additional benefit to linking in this way is that now `Appirater`\
    \ won’t automatically display a rating alert to the user in this version of your\
    \ app. You don’t want to annoy a happy user who has already rated and reviewed.\n\
    \n### Sharing on Facebook, Twitter, and by e-mail\n\nAs we’ve already learned\
    \ in this book, Apple made some great improvements by deeply integrating social\
    \ networks into iOS 6. But they’ve also made it incredibly easy to tweet, post\
    \ a Facebook status update, or share by e-mail and SMS."
  raw: '### Configuring Appirater


    To configure `Appirater`, you have to manually edit the `Appirater.h` header file.


    The first change to make will be to modify the `APPIRATER_APP_ID` constant declaration
    to the numeric ID of your app. This is a numeric ID that you can only access once
    you’ve created a new app to submit in iTunes Connect. We’ll be leaning about iTunes
    Connect in [Chapter 14](#Chapter14.html#ch14), so for now, just use *Birthday
    Reminder*’s live App ID:


    `#define APPIRATER_APP_ID                   489537509`


    Next, change the name that the Alert view will use to reference to our app:


    `#define APPIRATER_APP_NAME                 @"Birthday Reminder"`


    By default, Appirater uses the project name of our app, which is `BirthdayReminder`
    without a space: not so user-friendly.


    If it’s not on already, switch `Appirater`’s debug mode on:


    `#define APPIRATER_DEBUG                 YES`


    Build and run *Birthday Reminder* on your iPhone or iPod Touch because links to
    the App Store won’t work on the iOS simulator.


    Because we’ve switched on Appirater’s debug mode, we can immediately see what
    the rating alert will look like when it eventually displays for our users (see
    [Figure 13-5](#Chapter13.html#fig_13_5)).


    ![Image](images/9781430243748_Fig13-05.jpg)


    **Figure 13-5.** A user-friendly Appirater alert


    Now, it used to be that tapping Rate Birthday Reminder would link users directly
    into your app’s Write Review screen on the App Store. However, in iOS 6, Apple
    revamped the App Store, and to my knowledge, it’s no longer possible to link directly
    to the write a review screen of an app. Instead, we’ll have to opt for the user
    being taken to our app’s main page in the App Store. To fix this in Appirater,
    switch to `Appirater.m` and modify the `templateReviewURL` value to the following:


    `NSString *templateReviewURL =`

    `@"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=APP_ID&mt=8";`


    Build and run. Test the Rate Birthday Reminder button link. You should end up
    on *Birthday Reminder*’s main screen in the App Store.


    It can be a little disconcerting to use Appirater when you first submit an app
    because the link won’t work when your app isn’t live. However, as soon as it gets
    approved by Apple, the link works—just don’t get your App ID wrong! Check, check,
    and check again.


    In `Appirater.h`, revert the `APPIRATER_DEBUG` constant back to `NO`. By default,
    Appirater won’t display the rating request to the user until after at least 30
    days have elapsed or the user has run the app 20 times. These are variants that
    we can change. I tend to go for a rating request after one week’s use:


    `#define APPIRATER_DAYS_UNTIL_PROMPT        7        // double`

    `#define APPIRATER_USES_UNTIL_PROMPT        5        // integer`


    It’s also worth adding a manual option in our setting screen to encourage the
    user to rate *Birthday Reminder*. Open your storyboard and select the table view
    in the main Settings view controller, as shown in [Figure 13-6](#Chapter13.html#fig_13_6).
    Using the attributes inspector, increment the Sections value to 2\. This should
    create a duplicate group of table cells in the first section of the table view.


    ![Image](images/9781430243748_Fig13-06.jpg)


    **Figure 13-6.** Creating a new Static Table section


    Delete one of the cells in the second table view section. With the remaining cell,
    change its style to Basic and change its text to **Add an App Store Review!**
    (see [Figure 13-7](#Chapter13.html#fig_13_7)).


    I’ve included a bunch of freely-available icons in the `assets` folder of the
    source code. Add all these icons to your Xcode project `resources/images` group.
    Now select the new table cell and set the image attribute to `icon-compose.png`.
    The result should look like [Figure 13-7](#Chapter13.html#fig_13_7).


    ![Image](images/9781430243748_Fig13-07.jpg)


    **Figure 13-7.** There’s nothing wrong with giving our users a subtle idea...


    We need to add the hyperlink to review our app. Open the `BRSettingsViewController.m`
    source file, import `Appirater.h`, and then implement a `tableView:didSelectRowAtIndexPath:`
    `UITableViewDelegate` protocol method:


    `-(void) tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    //ignore if the user tapped the Day Before or Alert Time table cells`

    `    if (indexPath.section == 0) return;`


    `    //We''ll start a switch statement so that we can cater for future row taps
    in the project`

    `    switch (indexPath.row) {`

    `        case 0: //Add an App Store Review!`

    `            [Appirater rateApp];`

    `            break;`

    `        default:`

    `            break;`

    `    }  `

    `}`


    We’ve added a second section to our table. At present, we are displaying a section
    header titled Reminders. In the current implementation, we’ll end up with the
    same header text for both sections, so let’s also fix that in `BRSettingsViewController.m`:


    `- (UIView *)tableView:(UITableView *)tableView viewForHeaderInSection:(NSInteger)section`

    `{`

    ~~`    return [self createSectionHeaderWithLabel:@"Reminders"];`~~

    **`    return section == 0 ? [self createSectionHeaderWithLabel:@"Reminders"]
    : [self createSectionHeaderWithLabel:@"Share the Love"];`**

    `}`


    As before, you’ll need to run the app on your iPhone or iPod Touch to see the
    App Store link working.


    Aside from the convenience of calling a simple `rateApp` Appirater method, an
    additional benefit to linking in this way is that now Appirater won’t automatically
    display a rating alert to the user in this version of your app. You don’t want
    to annoy a happy user who has already rated and reviewed.


    ### Sharing on Facebook, Twitter, and by e-mail


    As we’ve already learned in this book, Apple made some great improvements by deeply
    integrating social networks into iOS 6\. But they’ve also made it incredibly easy
    to tweet, post a Facebook status update, or share by e-mail and SMS.'
  trans: "\n### 配置 Appirater\n\n要配置 `Appirater`，你需要手动编辑 `Appirater.h` 头文件。\n\n首先需要修改的是将\
    \ `APPIRATER_APP_ID` 常量声明替换为你的应用的数字 ID。这是一个数字 ID，只有在你创建了要提交到 iTunes Connect 的新应用后才能获取。我们将在第\
    \ 14 章中介绍 iTunes Connect，所以现在只需使用 *生日提醒* 的正式 App ID：\n\n```\n#define APPIRATER_APP_ID\
    \                   489537509\n```\n\n接着，更改提示框引用我们应用时使用的名称：\n\n```\n#define APPIRATER_APP_NAME\
    \                 @\"生日提醒\"\n```\n\n默认情况下，`Appirater` 使用我们应用的项目名称，即不带空格的 `BirthdayReminder`：这样对用户不太友好。\n\
    \n如果尚未开启，请打开 `Appirater` 的调试模式：\n\n```\n#define APPIRATER_DEBUG              \
    \   YES\n```\n\n在 iPhone 或 iPod Touch 上构建并运行 *生日提醒*，因为指向 App Store 的链接在 iOS 模拟器中无法使用。\n\
    \n由于我们已经开启了 `Appirater` 的调试模式，可以立即看到评分提示最终向用户显示时的效果（参见图 13-5）。\n\n![图片](img/9781430243748_Fig13-05.jpg)\n\
    \n**图 13-5.** 用户友好的 `Appirater` 提示框\n\n以前，点击“评分生日提醒”会直接将用户链接到 App Store 中你应用的“撰写评论”界面。然而，在\
    \ iOS 6 中，苹果重新设计了 App Store，据我所知，已经无法直接链接到应用的评论撰写界面了。因此，我们只能选择将用户引导至应用在 App Store\
    \ 的主页。要在 `Appirater` 中解决这个问题，请切换到 `Appirater.m`，并将 `templateReviewURL` 的值修改如下：\n\
    \n```\nNSString *templateReviewURL =\n@\"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=APP_ID&mt=8\"\
    ;\n```\n\n构建并运行。测试“评分生日提醒”按钮链接。你应该会进入 *生日提醒* 在 App Store 的主界面。\n\n首次提交应用时使用 `Appirater`\
    \ 可能会有些不安，因为当你的应用尚未上线时，链接无法工作。但只要应用通过苹果审核，链接就会生效——只要别搞错你的 App ID 就行！请反复检查、再检查。\n\
    \n在 `Appirater.h` 中，将 `APPIRATER_DEBUG` 常量恢复为 `NO`。默认情况下，`Appirater` 至少会在 30 天过去或用户运行应用\
    \ 20 次后才会向用户显示评分请求。这些参数我们都可以更改。我个人倾向于在使用一周后请求评分：\n\n```\n#define APPIRATER_DAYS_UNTIL_PROMPT\
    \        7        // double\n#define APPIRATER_USES_UNTIL_PROMPT        5    \
    \    // integer\n```\n\n此外，在我们的设置界面中添加一个手动选项来鼓励用户为 *生日提醒* 评分也很有价值。打开你的故事板，在主设置视图控制器中选择表格视图，如图图\
    \ 13-6 所示。使用属性检查器，将 Sections 值增加到 2。这会在表格视图的第一个分区中创建一个重复的表格单元格组。\n\n![图片](img/9781430243748_Fig13-06.jpg)\n\
    \n**图 13-6.** 创建新的静态表格分区\n\n删除第二个表格视图分区中的一个单元格。对于剩下的单元格，将其样式改为 Basic，并将文本改为**添加\
    \ App Store 评论！**（参见图 13-7）。\n\n我在源代码的 `assets` 文件夹中包含了一些免费可用的图标。将所有这些图标添加到你的\
    \ Xcode 项目的 `resources/images` 组中。现在选择新的表格单元格，并将 image 属性设置为 `icon-compose.png`。结果应类似于图\
    \ 13-7。\n\n![图片](img/9781430243748_Fig13-07.jpg)\n\n**图 13-7.** 给用户一个微妙的提示总是没错的...\n\
    \n我们需要添加用于评论我们应用的超链接。打开 `BRSettingsViewController.m` 源文件，导入 `Appirater.h`，然后实现\
    \ `tableView:didSelectRowAtIndexPath:` `UITableViewDelegate` 协议方法：\n\n```\n-(void)\
    \ tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    //如果用户点击了“提前天数”或“提醒时间”表格单元格，则忽略\n    if (indexPath.section == 0) return;\n\
    \n    //我们将使用 switch 语句，以便将来可以处理项目中更多的行点击事件\n    switch (indexPath.row) {\n  \
    \      case 0: //添加 App Store 评论！\n            [Appirater rateApp];\n        \
    \    break;\n        default:\n            break;\n    }  \n}\n```\n\n我们为表格添加了第二个分区。目前，我们显示了一个标题为“提醒”的分区头部。在当前实现中，两个分区会显示相同的头部文本，因此我们也需要在\
    \ `BRSettingsViewController.m` 中修复这个问题：\n\n```\n- (UIView *)tableView:(UITableView\
    \ *)tableView viewForHeaderInSection:(NSInteger)section\n{\n    return section\
    \ == 0 ? [self createSectionHeaderWithLabel:@\"提醒\"] : [self createSectionHeaderWithLabel:@\"\
    分享关爱\"];\n}\n```\n\n和之前一样，你需要在 iPhone 或 iPod Touch 上运行应用才能看到 App Store 链接生效。\n\
    \n除了调用简单的 `rateApp` `Appirater` 方法带来的便利之外，这种链接方式的另一个好处是，在这个版本的应用中，`Appirater`\
    \ 不会再自动向用户显示评分提示。你不想惹恼那些已经评分和评论了的满意用户。\n\n### 在 Facebook、Twitter 和邮件上分享\n\n正如本书中学到的，苹果通过将社交网络深度集成到\
    \ iOS 6 中做出了巨大改进。同时，他们也使得发推文、更新 Facebook 状态、或通过邮件和短信分享变得异常简单。\n"
- fmt: "# Five-minute sharing integration with the `UIActivityViewController`\n\n\
    I’ll show you just how easy it is to add a single, sharing link that you can include\
    \ in any iOS 6 app to empower users to share in multiple ways. Using the Document\
    \ Outline pane, select the second Table View section in your Settings view controller\
    \ via the storyboard. Increment the row count of the section, as highlighted in\
    \ [Figure 13-8](#Chapter13.html#fig_13_8).\n\n![Image](images/9781430243748_Fig13-08.jpg)\n\
    \n**Figure 13-8.** Incrementing the row count of a static Table View section\n\
    \nChange the text in the second cell to `Share!`, and then switch back to `BRSettingsViewController.m`.\
    \ Next, modify `tableView:didSelectRowAtIndexPath:` method with the highlighted\
    \ changes:\n\n```\n-(void) tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    //ignore if the user tapped the Day Before or Alert Time\
    \ table cells\n    if (indexPath.section == 0) return;\n\n    NSString *text =\
    \ @\"Check out this iPhone App: Birthday Reminder\";\n    UIImage *image = [UIImage\
    \ imageNamed:@\"icon300x300.png\"];\n    NSURL *facebookPageLink = [NSURL\nURLWithString:@\"\
    http://www.facebook.com/apps/application.php?id=123956661050729\"];\n    NSURL\
    \ *appStoreLink = [NSURL URLWithString:@\"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=4895375\n\
    09&mt=8\"];\n\n    switch (indexPath.row) {\n        case 0: //Add an App Store\
    \ Review!\n            [Appirater rateApp];\n            break;\n        case\
    \ 1: //Share!\n        {\n            NSArray *activityItems = @[text,image,appStoreLink];\n\
    \n            UIActivityViewController *activityViewController = [[UIActivityViewController\n\
    alloc] initWithActivityItems:activityItems applicationActivities:nil];\n     \
    \       [self presentViewController:activityViewController animated:YES\n    \
    \                         completion:nil];\n            break;\n        }\n  \
    \      default:\n            break;\n    }\n}\n```\n\nBuild and run. Try tapping\
    \ the new `Share!` table cell in the Settings view. An Activity view controller\
    \ should appear, as shown in [Figure 13-9](#Chapter13.html#fig_13_9).\n\n![Image](images/9781430243748_Fig13-09.jpg)\n\
    \n**Figure 13-9.** An Activity view controller: Apple’s go-to component for sharing\
    \ content\n\nThe `UIActivityViewController` class was added to `UIKit` in iOS\
    \ 6. In just six lines of code, we were able to enable our users to share some\
    \ text, an image, and a link to our *Birthday Reminder* iTunes page via Twitter,\
    \ Facebook, e-mail, and SMS. For me, the Contacts, Camera Roll, Print, and Clipboard\
    \ options in the Activity view controller are overkill for our purposes, but we\
    \ can easily remove them. Try setting the `excludedActivityTypes` property of\
    \ the Activity view controller:\n\n```\n            UIActivityViewController *activityViewController\
    \ = [[UIActivityViewController\nalloc] initWithActivityItems:activityItems applicationActivities:nil];\n\
    \            activityViewController.excludedActivityTypes =\n@[UIActivityTypePostToWeibo,UIActivityTypePrint,UIActivityTypeCopyToPasteboard,UIActivity\n\
    TypeAssignToContact,UIActivityTypeSaveToCameraRoll];\n            [self presentViewController:activityViewController\
    \ animated:YES\n                             completion:nil];\n```\n\nBuild and\
    \ run. You should now only see e-mail, SMS, Twitter, and Facebook sharing options.\
    \ As you can see in [Figure 13-10](#Chapter13.html#fig_13_10), the Activity view\
    \ controller provides a very powerful way to add multiple content sharing options\
    \ of text, links, and images.\n\n![Image](images/9781430243748_Fig13-10.jpg)\n\
    \n**Figure 13-10.** One Activity view controller, many sharing options\n\nWe’ve\
    \ seen just how easy it is to integrate the Activity view controller, but what\
    \ if we want to display our own Facebook, Twitter, e-mail, and SMS links in table\
    \ cells to launch each of the example sharing modal views individually? We can\
    \ do that, but it’s a bit more work. Tell you what: I’ll show you how!\n\nTo begin,\
    \ let’s set up a number of new sharing table cells. As you did earlier, select\
    \ the second Table View section in your Settings view controller via the storyboard.\
    \ Increment the row count of the Sections to 6, and configure each table cell\
    \ as follows (see [Figure 13-11](#Chapter13.html#fig_13_11)):\n\n> *   Second\
    \ table cell (text: `Share on Facebook`, image: `fbicon24x24.png`)\n> *   Third\
    \ table cell (text: `Like on Facebook`, image: `like-icon.png`)\n> *   Fourth\
    \ table cell (text: `Share on Twitter`, image: `icon-twitter.png`)\n> *   Fifth\
    \ table cell (text: `Email a Friend`, image: `mail-icon.png`)\n> *   Sixth table\
    \ cell (text: `SMS a Friend`, image: `sms-icon.png`)\n\n![Image](images/9781430243748_Fig13-11.jpg)\n\
    \n**Figure 13-11.** Setting up table cells with sharing options"
  raw: '#### Five-minute sharing integration with the UIActivityViewController


    I’ll show you just how easy it is to add a single, sharing link that you can include
    in any iOS 6 app to empower users to share in multiple ways. Using the Document
    Outline pane, select the second Table View section in your Settings view controller
    via the storyboard. Increment the row count of the section, as highlighted in
    [Figure 13-8](#Chapter13.html#fig_13_8).


    ![Image](images/9781430243748_Fig13-08.jpg)


    **Figure 13-8.** Incrementing the row count of a static Table View section


    Change the text in the second cell to **Share!**, and then switch back to `BRSettingsViewController.m`.
    Next, modify `tableView:didSelectRowAtIndexPath:` method with the highlighted
    changes:


    `-(void) tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    //ignore if the user tapped the Day Before or Alert Time table cells`

    `    if (indexPath.section == 0) return;`


    **`NSString *text = @"Check out this iPhone App: Birthday Reminder";`**

    **`    UIImage *image = [UIImage imageNamed:@"icon300x300.png"];`**

    **`    NSURL *facebookPageLink = [NSURL`

    `URLWithString:@"http://www.facebook.com/apps/application.php?id=123956661050729"];`**

    **`    NSURL *appStoreLink = [NSURL URLWithString:@"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=4895375`

    `09&mt=8"];`**


    `    switch (indexPath.row) {`

    `        case 0: //Add an App Store Review!`

    `            [Appirater rateApp];`

    `            break;`

    **`case 1: //Share!`**

    **`        {`**

    **`            NSArray *activityItems = @[text,image,appStoreLink];`**


    **`            UIActivityViewController *activityViewController = [[UIActivityViewController`**

    **`alloc] initWithActivityItems:activityItems applicationActivities:nil];`**

    **`            [self presentViewController:activityViewController animated:YES`**

    **`                             completion:nil];`**

    **`            break;`**

    **`        }`**

    `        default:`

    `            break;`

    `    }`

    `}`


    Build and run. Try tapping the new Share! table cell in the Settings view. An
    Activity view controller should appear, as shown in [Figure 13-9](#Chapter13.html#fig_13_9).


    ![Image](images/9781430243748_Fig13-09.jpg)


    **Figure 13-9.** An Activity view controller: Apple’s go-to component for sharing
    content


    The Activity view controller class was added to `UIKit` in iOS 6\. In just six
    lines of code, we were able to enable our users to share some text, an image,
    and a link to our *Birthday Reminder* iTunes page via Twitter, Facebook, e-mail,
    and SMS. For me, the Contacts, Camera Roll, Print, and Clipboard options in the
    Activity view controller are overkill for our purposes, but we can easily remove
    them. Try setting the `excludedActivityTypes` property of the Activity view controller:


    `            UIActivityViewController *activityViewController = [[UIActivityViewController`

    `alloc] initWithActivityItems:activityItems applicationActivities:nil];`

    **`activityViewController.excludedActivityTypes =`

    `@[UIActivityTypePostToWeibo,UIActivityTypePrint,UIActivityTypeCopyToPasteboard,UIActivity`

    `TypeAssignToContact,UIActivityTypeSaveToCameraRoll];`**

    `            [self presentViewController:activityViewController animated:YES`

    `                             completion:nil];`


    Build and run. You should now only see e-mail, SMS, Twitter, and Facebook sharing
    options. As you can see in [Figure 13-10](#Chapter13.html#fig_13_10), the Activity
    view controller provides a very powerful way to add multiple content sharing options
    of text, links, and images.


    ![Image](images/9781430243748_Fig13-10.jpg)


    **Figure 13-10.** One Activity view controller, many sharing options


    We’ve seen just how easy it is to integrate the Activity view controller, but
    what if we want to display our own Facebook, Twitter, e-mail, and SMS links in
    table cells to launch each of the example sharing modal views individually? We
    can do that, but it’s a bit more work. Tell you what: I’ll show you how!


    To begin, let’s set up a number of new sharing table cells. As you did earlier,
    select the second Table View section in your Settings view controller via the
    storyboard. Increment the row count of the Sections to 6, and configure each table
    cell as follows (see [Figure 13-11](#Chapter13.html#fig_13_11)):


    > *   Second table cell  (text: **Share on Facebook**, image: `fbicon24x24.png`)

    > *   Third table cell (text: **Like on Facebook**, image: `like-icon.png`)

    > *   Fourth table cell (text: **Share on Twitter**, image: `icon-twitter.png`)

    > *   Fifth table cell (text: **Email a Friend**, image: `mail-icon.png`)

    > *   Sixth table cell (text: **SMS a Friend**, image: `sms-icon.png`)


    ![Image](images/9781430243748_Fig13-11.jpg)


    **Figure 13-11.** Setting up table cells with sharing options'
  trans: "\n# 使用 `UIActivityViewController` 实现五分钟分享集成\n\n我将向你展示，仅在任意 iOS 6 应用中添加一个分享链接是多么简单，从而让用户能够通过多种方式进行分享。在文档大纲面板中，通过\
    \ storyboard 选择设置视图控制器中的第二个表格视图分区。将该分区的行数增加，如图 13-8 高亮所示。\n\n![图片](img/9781430243748_Fig13-08.jpg)\n\
    \n**图 13-8.** 增加静态表格视图分区的行数\n\n将第二个单元格中的文本改为 `Share!`，然后切换回 `BRSettingsViewController.m`。接下来，修改\
    \ `tableView:didSelectRowAtIndexPath:` 方法，添加高亮部分的变化：\n\n```\n-(void) tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    //如果用户点击了“提醒前一天”或“提醒时间”表格单元格，则忽略操作\n\
    \    if (indexPath.section == 0) return;\n\n    NSString *text = @\"Check out\
    \ this iPhone App: Birthday Reminder\";\n    UIImage *image = [UIImage imageNamed:@\"\
    icon300x300.png\"];\n    NSURL *facebookPageLink = [NSURL\nURLWithString:@\"http://www.facebook.com/apps/application.php?id=123956661050729\"\
    ];\n    NSURL *appStoreLink = [NSURL URLWithString:@\"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=4895375\n\
    09&mt=8\"];\n\n    switch (indexPath.row) {\n        case 0: //添加 App Store 评分！\n\
    \            [Appirater rateApp];\n            break;\n        case 1: //分享！\n\
    \        {\n            NSArray *activityItems = @[text,image,appStoreLink];\n\
    \n            UIActivityViewController *activityViewController = [[UIActivityViewController\n\
    alloc] initWithActivityItems:activityItems applicationActivities:nil];\n     \
    \       [self presentViewController:activityViewController animated:YES\n    \
    \                         completion:nil];\n            break;\n        }\n  \
    \      default:\n            break;\n    }\n}\n```\n\n构建并运行。尝试在设置视图中点击新的 `Share!`\
    \ 表格单元格。此时应出现一个活动视图控制器，如图 13-9 所示。\n\n![图片](img/9781430243748_Fig13-09.jpg)\n\n\
    **图 13-9.** 活动视图控制器：Apple 用于内容分享的首选组件\n\n`UIActivityViewController` 类是在 iOS 6\
    \ 中被添加到 `UIKit` 中的。仅用六行代码，我们就让用户能够通过 Twitter、Facebook、电子邮件和短信分享文本、图片以及指向我们 *生日提醒*\
    \ iTunes 页面的链接。在我看来，活动视图控制器中的通讯录、相机胶卷、打印和剪贴板选项对于我们的目的来说有些多余，但我们可以轻松移除它们。尝试设置活动视图控制器的\
    \ `excludedActivityTypes` 属性：\n\n```\n            UIActivityViewController *activityViewController\
    \ = [[UIActivityViewController\nalloc] initWithActivityItems:activityItems applicationActivities:nil];\n\
    \            activityViewController.excludedActivityTypes =\n@[UIActivityTypePostToWeibo,UIActivityTypePrint,UIActivityTypeCopyToPasteboard,UIActivity\n\
    TypeAssignToContact,UIActivityTypeSaveToCameraRoll];\n            [self presentViewController:activityViewController\
    \ animated:YES\n                             completion:nil];\n```\n\n构建并运行。现在你应该只看到电子邮件、短信、Twitter\
    \ 和 Facebook 分享选项。如图 13-10 所示，活动视图控制器提供了一种非常强大的方式，用于添加文本、链接和图片的多种内容分享选项。\n\n![图片](img/9781430243748_Fig13-10.jpg)\n\
    \n**图 13-10.** 一个活动视图控制器，多种分享选项\n\n我们已经看到集成活动视图控制器是多么简单，但如果我们想在表格单元格中显示自己的 Facebook、Twitter、电子邮件和短信链接，以便分别启动每个示例分享模态视图，又该怎么做呢？我们可以实现这一点，但需要多花些功夫。听我说：我会向你展示如何操作！\n\
    \n首先，让我们设置一些新的分享表格单元格。和之前一样，通过 storyboard 选择设置视图控制器中的第二个表格视图分区。将该分区的行数增加到 6，并按如下方式配置每个表格单元格（参见图\
    \ 13-11）：\n\n> *   第二个表格单元格（文本：`Share on Facebook`，图片：`fbicon24x24.png`）\n> *\
    \   第三个表格单元格（文本：`Like on Facebook`，图片：`like-icon.png`）\n> *   第四个表格单元格（文本：`Share\
    \ on Twitter`，图片：`icon-twitter.png`）\n> *   第五个表格单元格（文本：`Email a Friend`，图片：`mail-icon.png`）\n\
    > *   第六个表格单元格（文本：`SMS a Friend`，图片：`sms-icon.png`）\n\n![图片](img/9781430243748_Fig13-11.jpg)\n\
    \n**图 13-11.** 设置带有分享选项的表格单元格\n"
- fmt: '#### Sharing on Facebook with the `SLComposeViewController`


    We’re done with the storyboard, so open `BRSettingsViewController.m` and import
    the social framework:


    `#import <Social/Social.h>`


    Locate `tableView:didSelectRowAtIndexPath:` and replace the Activity view controller
    code with the following highlighted code:


    ```

    -(void) tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath

    {

        //ignore if the user tapped the Day Before or Alert Time table cells

        if (indexPath.section == 0) return;


        NSString *text = @"Check out this iPhone App: Birthday Reminder";

        UIImage *image = [UIImage imageNamed:@"icon300x300.png"];

        NSURL *facebookPageLink = [NSURL

    URLWithString:@"http://www.facebook.com/apps/application.php?id=123956661050729"];

        NSURL *appStoreLink = [NSURL

    URLWithString:@"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=489537509&mt

    =8"];

        SLComposeViewController *composeViewController;


        switch (indexPath.row) {

            case 0: //Add an App Store Review!

                [Appirater rateApp];

                break;

            case 1: //Share on Facebook

            {

                if (![SLComposeViewController

    isAvailableForServiceType:SLServiceTypeFacebook])

                {

                    NSLog(@"No Facebook Account available for user");

                    return;

                }

                composeViewController = [SLComposeViewController

    composeViewControllerForServiceType:SLServiceTypeFacebook];

                [composeViewController addImage:image];

                [composeViewController setInitialText:text];

                [composeViewController addURL:appStoreLink];

                [self presentViewController:composeViewController animated:YES

                                 completion:nil];

                break;

            }

            default:

                break;

        }

    }

    ```


    Build and run. Tapping on the Share on Facebook table cell should result in a
    Compose view controller, as shown in [Figure 13-12](#Chapter13.html#fig_13_12).


    ![Image](images/9781430243748_Fig13-12.jpg)


    **Figure 13-12.** Sharing on Facebook with a Compose view controller


    As you can see in the new code you just added, we create instances of the `SLComposeViewController`
    via the Compose view controller’s `composeViewControllerForServiceType:` class
    method. It’s also important to check that the user has configured a Facebook account
    by calling another `SLComposeViewController` class method, `isAvailableForServiceType:`,
    where we can pass in Facebook, Twitter, or Sina Weibo social network types.


    On to Like on the Facebook call to action. All we’re going to do here is link
    out to our *Birthday Reminder* Facebook page, and then let the user log in and
    take care of the rest. You might be surprised just how effective this is—we managed
    to acquire thousands of Facebook Likes on our *Tap to Chat* page in a short space
    of time simply by linking to the page in-app.


    Add a new case to the `tableView:didSelectRowAtIndexPath:` switch statement:


    ```

    case 2: //Like on Facebook

                [[UIApplication sharedApplication] openURL:facebookPageLink];

                break;

    ```


    Build and run to test out the link. Nice and simple!


    #### Sharing on Twitter with the `SLComposeViewController`


    How complicated do you think it’ll be to share on Twitter in the same way as we
    did with Facebook using the `SLComposeViewController`? The code is virtually identical,
    we just need to substitute the two `SLServiceTypeFacebook` references to `SLServiceTypeTwitter`.
    Add another case to your switch statement in `tableView:didSelectRowAtIndexPath:`


    ```

        case 3://Share on Twitter

            {

                if (![SLComposeViewController isAvailableForServiceType:SLServiceTypeTwitter])

                {

                    NSLog(@"No Twitter Account available for user");

                    return;

                }

                composeViewController = [SLComposeViewController

    composeViewControllerForServiceType:SLServiceTypeTwitter];

                [composeViewController addImage:image];

                [composeViewController setInitialText:text];

                [composeViewController addURL:appStoreLink];

                [self presentViewController:composeViewController animated:YES

                                 completion:nil];

                break;

            }

    ```


    Pretty easy, huh? Didn’t I tell you Apple has made our lives a lot simpler with
    iOS 6! Build and run. Tapping the Share on Twitter table cell should result in
    a modally presented tweet sheet, just like the one shown in [Figure 13-13](#Chapter13.html#fig_13_13).


    ![Image](images/9781430243748_Fig13-13.jpg)


    **Figure 13-13.** Sharing on Twitter with a Compose view controller


    **Note:** If you haven’t added your Twitter or Facebook account to iOS, then `isAvailableForServiceType:`
    will return false and no modal view controller will be presented.'
