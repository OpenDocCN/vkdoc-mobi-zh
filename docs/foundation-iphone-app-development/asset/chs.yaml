  **图 10-24.** 点击“全选”后的效果。\n\n\n\n### 将通讯录生日导入 Core Data 存储\n\n现在，用户已经能够从通讯录中多选生日联系人，下一步就是在点击“导入”按钮时，将所选联系人的数据导入到\
  \ *Birthday Reminder* 中。让我们将注意力转回主模型类 `BRDModel`，并添加一个方法，用于将多个 `BRDBirthdayImport`\
  \ 实例导入到 `BRDBirthday` Core Data 实体中。\n\n在 `BRDModel.h` 中定义一个 `importBirthdays:`\
  \ 公共方法：\n\n```\n- (void)importBirthdays:(NSArray *)birthdaysToImport;\n```\n\n昨天，在第\
  \ 8 章的“重复实体与 Core Data 持久化同步”一节中，我们在模型中创建了一个实用方法，用于检索 Core Data 模型中所有与任何生日 ID 列表中的唯一\
  \ ID 匹配的现有生日实体。我们将在 `BRDModel.m` 中新的 `importBirthdays:` 实现里使用相同的逻辑：\n\n```\n- (void)importBirthdays:(NSArray\
  \ *)birthdaysToImport\n{\n    int i;\n    int max = [birthdaysToImport count];\n\
  \n    BRDBirthday *importBirthday;\n    BRDBirthday *birthday;\n\n    NSString *uid;\n\
  \    NSMutableArray *newUIDs = [NSMutableArray array];\n\n    for (i=0;i<max;i++)\n\
  \    {\n        importBirthday = birthdaysToImport[i];\n        uid = importBirthday.uid;\n\
  \        [newUIDs addObject:uid];\n    }\n\n    //使用 BRDModel 的实用方法，根据要导入的生日数组检索具有匹配\
  \ ID 的现有生日\n    NSMutableDictionary *existingBirthdays = [self getExistingBirthdaysWithUIDs:newUIDs];\n\
  \n    NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
  \n    for (i=0;i<max;i++)\n    {\n        importBirthday = birthdaysToImport[i];\n\
  \        uid = importBirthday.uid;\n\n        birthday = existingBirthdays[uid];\n\
  \        if (birthday) {\n            // Core Data 中已存在具有此 UDID 的生日，不创建重复项\n   \
  \     }\n        else {\n            birthday = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  BRDBirthday\" inManagedObjectContext:context];\n            birthday.uid = uid;\n\
  \            existingBirthdays[uid] = birthday;\n        }\n\n        //更新新建或之前保存的生日实体\n\
  \        birthday.name = importBirthday.name;\n        birthday.uid = importBirthday.uid;\n\
  \        birthday.picURL = importBirthday.picURL;\n        birthday.imageData =\
  \ importBirthday.imageData;\n        birthday.addressBookID = importBirthday.addressBookID;\n\
  \        birthday.facebookID = importBirthday.facebookID;\n\n        birthday.birthDay\
  \ = importBirthday.birthDay;\n        birthday.birthMonth = importBirthday.birthMonth;\n\
  \        birthday.birthYear = importBirthday.birthYear;\n\n        [birthday updateNextBirthdayAndAge];\n\
  \    }\n\n    //将新建和更新后的更改保存到 Core Data 存储中\n    [self saveChanges];\n\n}\n```\n\
  \n以下是导入代码的逻辑：\n\n> 1. 遍历要导入的生日，收集它们的唯一 ID。\n> 2. 将唯一 ID 传递给 `getExistingBirthdaysWithUIDs:`，以获取包含匹配\
  \ ID 的现有生日实体的可变字典。\n> 3. 再次遍历要导入的生日，创建或更新已存储的 Core Data 生日实体。\n> 4. 保存更新内容。\n\n\
  让我们测试一下导入代码。回到 `BRImportViewController.m`，导入 `BRDModel.h`，然后实现 `didTapImportButton:`\
  \ 操作方法：\n\n```\n- (IBAction)didTapImportButton:(id)sender {\n    NSArray *birthdaysToImport\
  \ = [self.selectedIndexPathToBirthday allValues];\n    [[BRDModel sharedInstance]\
  \ importBirthdays:birthdaysToImport];\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n构建并运行。现在你应该能够从 iPhone 通讯录中挑选生日并将其导入到 *Birthday Reminder*\
  \ 中（参见图 10-25）。\n\n![Image](img/9781430243748_Fig10-25.jpg)\n\n**图 10-25.** 从通讯录导入生日功能已全面运行\n\
  \n### 启用电话、短信和电子邮件功能\n\n*Birthday Reminder* 的用户现在可以导入通讯录中任何已分配生日的联系人。但为什么要止步于此呢？我们已经将每个导入联系人的唯一\
  \ `ABRecordID` 属性保存在 `BRDBirthday.addressBookID` 中。我们可以利用苹果为每个导入生日提供的唯一联系人记录 ID，来访问联系人的其他信息，例如电话号码和电子邮件地址。\n\
  \n我们将在生日详情视图中使用这段检测代码。如果生日信息是从通讯录导入的，那么我们将检查 iPhone 是否存储了该联系人的电话号码，如果是，则显示按钮，以便用户通过电话或短信向朋友发送生日祝福！同样，如果我们检测到该通讯录联系人拥有电子邮件地址，那么我们将为用户提供通过电子邮件发送生日祝福的选项。\n\
  \n打开 `BRBirthdayDetailViewController.m` 源文件，首先导入 `AddressBook`：\n\n```\n#import\
  \ <AddressBook/AddressBook.h>\n```\n\n我们将在 `BRBirthdayDetailViewController.m` 中创建私有辅助方法，用于生成启动电话、短信和电子邮件的\
  \ iOS 链接。首先添加一个 `telephoneNumber` 方法，该方法获取当前联系人的通讯录记录引用，并检查 `kABPersonPhoneProperty`（电话号码）属性是否存在：\n\
  \n```\n#pragma mark Address Book contact helper methods\n\n- (NSString *)telephoneNumber\n\
  {\n    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL, NULL);\n\
  \n    ABRecordRef record =  ABAddressBookGetPersonWithRecordID (addressBook,(ABRecordID)[self.birthday.addressBookID\
  \ intValue]);\n\n    ABMultiValueRef multi = ABRecordCopyValue(record, kABPersonPhoneProperty);\n\
  \n    NSString *telephone = nil;\n\n    if (ABMultiValueGetCount(multi) > 0) {\n\
  \        telephone = (__bridge_transfer NSString*)ABMultiValueCopyValueAtIndex(multi,\
  \ 0);\n        telephone = [telephone stringByReplacingOccurrencesOfString:@\" \"\
  \ withString:@\"\"];\n    }\n    CFRelease(multi);\n    CFRelease(addressBook);\n\
  \n    return telephone;\n}\n```\n\n如果我们的新方法找到了与该联系人关联的电话号码，它会移除号码中的所有空格，因为这是在激活电话或短信时，创建指向苹果电话和短信应用的应用内链接所必需的。如果我们的方法找不到与该联系人关联的电话号码，则返回\
  \ `nil`。\n\n\n\n### 多任务应用中的 URL 方案与跨应用链接\n\niOS 原生应用支持多种 URL 方案，使开发者能够创建按钮或链接，以打开用户\
  \ iPhone 上的其他应用（如电话应用或 Safari）。许多应用还支持通过 URL 字符串传递额外参数，例如链接应用可识别的 ID，从而将用户直接导航到特定内容。你可以在以下网页中找到苹果自家应用所支持的\
  \ URL 方案列表：\n\n`http://developer.apple.com/library/ios/#featuredarticles/iPhoneURLScheme_Reference/Introduction/Introduction.html`\n\
  \n访问该页面后，你会发现 `tel:` URL 方案可在 iPhone 上启动苹果的电话应用，而 `sms:` 方案则可启动信息应用。\n\n**提示：**\
  \ 你也可以通过 info plist 为自己的应用定义自定义 URL 方案，以实现其他应用到你的应用的直接链接。\n\n接下来，我们在 `BRBirthdayDetailViewController.m`\
  \ 中创建电话和短信链接的获取方法。这两个方法几乎完全相同，并且都使用了我们的 `telephoneNumber` 方法：\n\n```\n-(NSString\
  \ *)callLink\n{\n    if (!self.birthday.addressBookID || [self.birthday.addressBookID\
  \ intValue]==0) return nil;\n    NSString *telephoneNumber = [self telephoneNumber];\n\
  \    if (!telephoneNumber) return nil;\n\n    NSString *callLink = [NSString stringWithFormat:@\"\
  tel:%@\",telephoneNumber];\n\n    if ([[UIApplication sharedApplication] canOpenURL:[NSURL\
  \ URLWithString:callLink]]) return callLink;\n\n    return nil;\n}\n```\n\n```\n\
  -(NSString *)smsLink\n{\n    if (!self.birthday.addressBookID || [self.birthday.addressBookID\
  \ intValue]==0) return nil;\n    NSString *telephoneNumber = [self telephoneNumber];\n\
  \    if (!telephoneNumber) return nil;\n\n    NSString *smsLink = [NSString stringWithFormat:@\"\
  sms:%@\",telephoneNumber];\n\n    if ([[UIApplication sharedApplication] canOpenURL:[NSURL\
  \ URLWithString:smsLink]]) return smsLink;\n\n    return nil;\n}\n```\n\n注意，在这两个方法中，我们都可以通过\
  \ `UIApplication` 的 `canOpenURL:` 方法，实际检查所创建的系统链接是否与设备兼容。这非常实用，因为它使我们能够检查用户是否安装了我们的应用已知且可直连的其他包含\
  \ URL 方案的应用。\n\n`emailLink` 方法与我们之前编写的 `telephoneNumber` 方法非常相似。与电话号码一样，一个联系人也可以关联多个电子邮件地址。我们将检查该联系人是否存在\
  \ `email` 属性（`kABPersonEmailProperty`），如果存在，则检查是否关联了一个或多个电子邮件地址，并默认返回第一个：\n\n```\n\
  -(NSString *)emailLink\n{\n    if (!self.birthday.addressBookID || [self.birthday.addressBookID\
  \ intValue]==0) return nil;\n\n    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL,\
  \ NULL);\n\n    ABRecordRef record =  ABAddressBookGetPersonWithRecordID (addressBook,(ABRecordID)[self.birthday.addressBookID\
  \ intValue]);\n\n    ABMultiValueRef multi = ABRecordCopyValue(record, kABPersonEmailProperty);\n\
  \n    NSString *email = nil;\n    if (ABMultiValueGetCount(multi) > 0) {//检查该联系人是否分配了一个或多个电子邮件地址\n\
  \         email = (__bridge_transfer NSString*)ABMultiValueCopyValueAtIndex(multi,\
  \ 0);\n    }\n    CFRelease(multi);\n    CFRelease(addressBook);\n\n    if (email)\
  \ {\n        NSString *emailLink = [NSString stringWithFormat:@\"mailto:%@\",email];\n\
  \        //我们可以预填充邮件主题为“生日快乐”\n        emailLink = [emailLink stringByAppendingString:@\"\
  ?subject=Happy%20Birthday\"];\n        if ([[UIApplication sharedApplication] canOpenURL:[NSURL\
  \ URLWithString:emailLink]]) return emailLink;\n    }\n\n    return nil;\n}\n```\n\
  \n现在我们已经创建了用于检测是否可以向生日联系人拨打电话、发送短信或邮件的工具方法，我们将在布局按钮列表时检查这些方法。只有当朋友有电话号码且当前设备允许使用\
  \ `tel:` URL 方案时，我们才会显示“拨打电话”按钮。*生日提醒* 应用可能安装在 iPod Touch 上，例如，在该设备上操作系统无法识别 `tel:`\
  \ URL 方案；因此，我们不会在 iPod Touch 上显示“拨打电话”按钮。\n\n导航到 `BRBirthdayDetailViewController.m`\
  \ 的 `viewWillAppear:` 方法实现，并按照以下突出显示的更改修改方法代码的最后部分：\n\n```\nNSMutableArray *buttonsToShow\
  \ = [NSMutableArray arrayWithObjects:self.facebookButton,self.callButton, self.smsButton,\
  \ self.emailButton, self.deleteButton, nil];\n\nNSMutableArray *buttonsToHide =\
  \ [NSMutableArray array];\n\n    if (self.birthday.facebookID == nil) {\n      \
  \  [buttonsToShow removeObject:self.facebookButton];\n        [buttonsToHide addObject:self.facebookButton];\n\
  \    }\n\n    if ([self callLink] == nil) {\n        [buttonsToShow removeObject:self.callButton];\n\
  \        [buttonsToHide addObject:self.callButton];\n    }\n\n    if ([self smsLink]\
  \ == nil) {\n        [buttonsToShow removeObject:self.smsButton];\n        [buttonsToHide\
  \ addObject:self.smsButton];\n    }\n\n    if ([self emailLink] == nil) {\n    \
  \    [buttonsToShow removeObject:self.emailButton];\n        [buttonsToHide addObject:self.emailButton];\n\
  \    }\n\n    UIButton *button;\n\nfor (button in buttonsToHide) {\n        button.hidden\
  \ = YES;\n    }\n\n    int i;\n\n    for (i=0;i<[buttonsToShow count];i++) {\n \
  \       button = [buttonsToShow objectAtIndex:i];\nbutton.hidden = NO;\n       \
  \ frame = button.frame;\n        frame.origin.y = cY;\n        button.frame = frame;\n\
  \        cY += button.frame.size.height + buttonGap;\n    }\n\n    self.scrollView.contentSize\
  \ = CGSizeMake(320, cY);\n```\n\n在这段代码中，我们现在有两个数组：一个包含应在详情视图中显示的按钮引用，另一个包含针对该生日应隐藏的按钮引用。如果我们能通过通讯录框架找到生日联系人的电子邮件地址，则显示“发送邮件”按钮。如果找不到，则不显示发送邮件按钮（参见图\
  \ 10-26）。\n\n![图片](img/9781430243748_Fig10-26.jpg)\n\n**图 10-26.** 这个朋友的所有通话/短信/邮件按钮都显示出来了，因为信不信由你，我手机里存了我妻子的所有联系方式！\n\
  \n知道我们可以给联系人发送邮件、拨打电话或发送短信固然很好，但目前，我们的按钮操作还没有任何实际功能。让我们来实现操作代码：\n\n```\n- (IBAction)callButtonTapped:(id)sender\
  \ {\nNSString *link = [self callLink];\n    [[UIApplication sharedApplication] openURL:[NSURL\
  \ URLWithString:link]];\n}\n\n- (IBAction)smsButtonTapped:(id)sender {\nNSString\
  \ *link = [self smsLink];\n    [[UIApplication sharedApplication] openURL:[NSURL\
  \ URLWithString:link]];\n}\n\n- (IBAction)emailButtonTapped:(id)sender {\nNSString\
  \ *link = [self emailLink];\n    [[UIApplication sharedApplication] openURL:[NSURL\
  \ URLWithString:link]];\n}\n```\n\n构建并运行。太棒了，我们现在可以从应用内拨打电话、触发短信并发送“生日快乐”祝福了。![图片](img/smile.jpg)\n\
  \n**注意：** 我们也可以使用苹果的 `MessageUI` 框架，直接在应用内创建邮件和短信。个人而言，我更倾向于充分利用多任务功能，但也可以查阅 `MessageUI`\
  \ 框架文档，在应用内部处理完整的体验。\n\n\n\n### 从数据存储中删除生日\n\n在详细视图控制器中实现按钮功能时，让我们让“删除生日”按钮运转起来。在执行永久操作之前，请求用户确认删除是一种良好做法。现在切换到\
  \ `BRBirthdayDetailViewController.h` 头文件，声明生日详细控制器实现了 `UIActionSheetDelegate` 协议：\n\
  \n```\n@interface BRBirthdayDetailViewController : BRCoreViewController <UIActionSheetDelegate>\n\
  ```\n\n现在回到 `BRBirthdayDetailViewController.m`，实现 `deleteButtonTapped:` 操作并显示一个“删除\
  \ [姓名]”操作表单：\n\n```\n- (IBAction)deleteButtonTapped:(id)sender {\n    UIActionSheet\
  \ *actionSheet = [[UIActionSheet alloc] initWithTitle:nil delegate:self cancelButtonTitle:@\"\
  取消\" destructiveButtonTitle:[NSString stringWithFormat:@\"删除 %@\",self.birthday.name]\
  \ otherButtonTitles:nil];\n    [actionSheet showInView:self.view];\n}\n```\n\n构建并运行后，结果应如图\
  \ 10-27 所示。\n\n![图片](img/9781430243748_Fig10-27.jpg)\n\n**图 10-27.** 我正在删除老婆，但这事只有你知我知！\n\
  \n最后，如果用户按下了那个大红按钮，我们将执行删除指令。首先，将 `BRDModel.h` 导入 `BRBirthdayDetailViewController.m`。\n\
  \n现在是时候在 `BRBirthdayDetailViewController.m` 中实现 `UIActionSheetDelegate` 协议的 `actionSheet:willDismissWithButtonIndex:`\
  \ 方法了：\n\n```\n#pragma mark - UIActionSheetDelegate\n\n- (void)actionSheet:(UIActionSheet\
  \ *)actionSheet willDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    //检查用户是否通过操作表单的取消按钮取消了删除指令\n\
  \    if (buttonIndex == actionSheet.cancelButtonIndex) return;\n\n    //获取 Core\
  \ Data 托管对象上下文的引用\n    NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
  \    //从托管对象上下文中删除此生日实体\n    [context deleteObject:self.birthday];\n    //将删除更改保存到持久化\
  \ Core Data 存储中\n    [[BRDModel sharedInstance] saveChanges];\n\n    //将此视图控制器从导航堆栈中弹出，并滑动返回主屏幕\n\
  \    [self.navigationController popViewControllerAnimated:YES];\n}\n```\n\n删除一个\
  \ Core Data 实体在它与其他实体没有关系时相当简单。我们只需获取 Core Data 托管对象上下文的引用，然后将生日实体的引用传递给上下文的 `deleteObject:`\
  \ 方法。我们通过 `BRDModel` 的 `saveChanges` 工具方法将删除更改保存到 Core Data 持久化存储中。最后，我们将详细视图控制器从导航堆栈中弹出，并指示导航控制器滑动回主视图控制器。你会看到主页表格视图自动更新。\n\
  \n### 总结\n\n第 4 天 真是一个好的开始！我们已经探索了苹果提供给第三方应用访问权限的通讯录框架的一些特性。\n\n能够访问用户的联系人列表赋予了我们应用巨大的责任，以及用户信任我们不会分享或滥用这些敏感数据。像\
  \ *Path* 这样非常成功的应用在 2012 年遭遇了大量负面报道，当时发现它们将用户联系人传递给服务器端系统。诸如此类的事件促使苹果在 iOS 6 中加强了隐私保护，让用户能够控制允许或不允许应用访问的数据。这是\
  \ iOS 的一项重大改变，因为它将权力交到了用户手中，解决了数据隐私滥用问题，并使私有数据访问对数据所有者——也就是你的用户——更加透明。\n\n只要不滥用这种信任，能访问用户的联系人列表，我们就可以在应用中构建真正有用的功能，实现快速简便的个性化和数据导入，让应用用户的生活更轻松。\n\
  \n接下来，我们将学习如何使用苹果在 iOS 6 中新增的社交框架，让用户能够导入他们 Facebook 好友的生日信息。很快，我们将展示所有用户 Facebook\
  \ 好友的导入列表。最棒的是，得益于面向对象代码设计的奇妙之处，我们在本章中已经编写了大部分用于从 Facebook 导入数据的用户界面代码。\n\n喝杯咖啡，我们五分钟后见！\n\
  \n![图片](img/ch.jpg)\n\n## 第 11 章：使用 Facebook 和 iOS 6 社交框架\n\n今天早些时候，我们成功设置了 *生日提醒*\
  \ 应用，从 iPhone 通讯录批量导入了生日信息。但真正能增强我们应用对数百万潜在用户吸引力的，是让他们能够从 Facebook 账户导入朋友的生日。\n\n\
  在本章中，我们将利用 iOS 6 原生的 Facebook 集成功能。通过使用苹果的账户框架，你将学习如何让用户使用 Facebook 认证 *生日提醒*。在此基础上，你将发现如何使用新的社交框架访问\
  \ Facebook 的 Graph API，并让用户导入 Facebook 好友的生日。\n\n但我们不会止步于此。我将向你展示如何创建你自己的自定义视图控制器，用于直接向好友的\
  \ Facebook 动态发布消息。这对我们的用户来说是一个有用的功能，并且还有一个额外的好处：每个分享的生日快乐帖子旁会自动生成一个回到 *生日提醒* Facebook\
  \ 页面的链接！\n\nFacebook 有自己的 iOS SDK，但我们完全不会用到它。我们与 Facebook Graph API 集成所需的一切都已内置于\
  \ iOS 6 中。\n\n### 在 Facebook.com 上注册新应用\n\n为了创建任何能够集成 Facebook 功能（例如发布到好友的 Facebook\
  \ 动态、访问用户的 Facebook 好友、读取用户的 Facebook 新闻推送等）的应用（无论是 iOS 还是其他平台），你需要拥有自己的 Facebook.com\
  \ 账户。你还需要在 [`www.facebook.com/developer`](http://www.facebook.com/developer) 注册成为\
  \ Facebook 开发者。\n\n一旦你成为注册开发者并访问 Facebook 的开发者网站，你将能够导航到主应用部分。点击“创建新应用”按钮。系统会提示你输入一个新的应用名称（参见图\
  \ 11-1）。\n\n![图片](img/9781430243748_Fig11-01.jpg)\n\n**图 11-1.** 在 Facebook.com\
  \ 上创建新的 Facebook 应用\n\n应用命名空间是可选的，因此一旦你输入了一个未被占用的有效应用显示名称，就一切就绪了。Facebook 会立即为你的应用提供一个新应用\
  \ ID。\n\n你不必使用 *生日提醒* 这个名称，但无论你使用什么名称，当新用户在将 Facebook 好友导入你的应用之前进行认证时，Facebook 都会向用户显示这个名称。\n\
  \n为了让苹果原生的账户认证代码能与 Facebook 协同工作，你需要对你的新 Facebook.com 应用进行一项必要的修改：将你的 iOS 应用包标识符添加到你的\
  \ Facebook 应用设置中。点击“编辑设置”链接，滚动到标题为“原生 iOS 应用”的选项卡。打开该选项卡，在第一个文本字段中输入你应用的包标识符。就我而言，它是\
  \ `com.apress.BirthdayReminder`；但对你来说，*这必须与你应用的包标识符匹配*（参见图 11-2）。\n\n![图片](img/9781430243748_Fig11-02.jpg)\n\
  \n**图 11-2.** 为我们的应用在 Facebook.com 设置中添加 iOS 包标识符\n\n这个包标识符与你应用的原生包标识符匹配非常重要，因为在单点登录认证过程中，账户框架会自动检查并引用它。\n\
  \n\n\n### 创建 Facebook 导入视图控制器\n\n在之前的章节（第 10 章）中，我们投入了大量精力创建通讯录导入视图控制器。在此过程中，我们创建了\
  \ `BRImportViewController` 类，通讯录和 Facebook 导入视图控制器都将继承这个基类。现在我们将看到，这些开发步骤如何帮助我们在项目现阶段快速创建\
  \ Facebook 导入视图控制器。打开你的故事板。使用鼠标多选通讯录视图控制器及其父导航控制器场景，如图 11-3 所示。\n\n![图片](img/9781430243748_Fig11-03.jpg)\n\
  \n**图 11-3.** 多选故事板场景\n\n使用键盘快捷键 ![Image](img/U002a.jpg)C 或依次点击 Edit ![Image](img/U001.jpg)\
  \ Copy，再使用快捷键 ![Image](img/U002a.jpg)V 或依次点击 Edit ![Image](img/U001.jpg) Paste。你应该能在故事板中复制这两个视图控制器。将复制的视图控制器拖到故事板中的新位置，并将导航栏标题改为\
  \ **Facebook**。选中新的导航控制器，在属性检查器中将 `Identifier` 属性改为 `ImportFacebook`。\n\n打开 `BRHomeViewController.m`，像呈现通讯录视图控制器那样，实现\
  \ `importFromFacebookTapped:` 操作方法：\n\n```\n- (IBAction)importFromFacebookTapped:(id)sender\
  \ {\n    UINavigationController *navigationController = [self.storyboard\n     \
  \   instantiateViewControllerWithIdentifier:@\"ImportFacebook\"];\n    [self.navigationController\
  \ presentViewController:navigationController animated:YES\n        completion:nil];\n\
  }\n```\n\n现在创建核心导入视图控制器的子类，作为 Facebook 导入视图控制器。在项目导航器中选择 `view-controllers` 组，然后创建\
  \ `BRImportViewController` 的新子类，命名为 `BRImportFacebookViewController`。\n\n在故事板中选择你的\
  \ Facebook 导入视图控制器，使用标识检查器将其自定义类改为我们新建的 `BRImportFacebookViewController` 类，如图 11-4\
  \ 所示。\n\n![图片](img/9781430243748_Fig11-04.jpg)\n\n**图 11-4.** 在故事板中将自定义类更改为新的 Facebook\
  \ 子类\n\n构建并运行。现在你应该能在应用中呈现和关闭（Cancel）Facebook 视图控制器了（参见 图 11-5）。\n\n![图片](img/9781430243748_Fig11-05.jpg)\n\
  \n**图 11-5.** 模态呈现的空 Facebook 导入视图控制器\n\n### 使用账户框架进行 Facebook 身份验证\n\n为了让 *Birthday\
  \ Reminder* 能够获取 Facebook 好友的生日信息，用户需要先授权我们的应用代表他们与 Facebook 的 API 通信。我们将通过模型单例类\
  \ `BRDModel` 处理所有 Facebook 身份验证流程。\n\n首先，在项目中添加 Accounts 和 Social 框架。按照前几章的操作，在项目导航器中选择\
  \ `BirthdayReminder` 项目，接着选择 `BirthdayReminder` 目标，然后选择 Build Phases 标签页。点击 Link\
  \ Binary with Libraries 下的 Add Framework 按钮，添加 Accounts 和 Social 框架。将这两个框架添加到项目后，将它们拖放到项目导航器的\
  \ `Frameworks` 组中，如图 11-6 所示。\n\n![图片](img/9781430243748_Fig11-06.jpg)\n\n**图 11-6.**\
  \ 添加到项目中的 Accounts 和 Social 框架\n\n现在打开 `BRDModel.h`，声明一个新的公共方法 `fetchFacebookBirthdays`，我们的\
  \ Facebook 导入视图控制器将在其出现时调用该方法：\n\n```\n- (void)fetchFacebookBirthdays;\n```\n\n\
  切换到 `BRDModel.m` 源文件，导入 Accounts 和 Social 框架：\n\n```\n#import <Social/Social.h>\n\
  #import <Accounts/Accounts.h>\n```\n\n一旦用户成功通过 Facebook 验证，我们将获得已验证账户的引用。通过在模型中保留该\
  \ Facebook 账户引用，我们就能调用 Facebook 的 API、在 Facebook 墙上发帖，或使用 Facebook Graph API 提供的其他功能。\n\
  \n在 `BRDModel.m` 的最顶部，类实现之前，添加一个新的 Facebook 动作枚举器和 `BRDModel` 的私有接口，该接口声明两个新的私有属性：`facebookAccount`（已验证\
  \ Facebook 账户的引用）和 `currentFacebookAction`（用于追踪当前正在处理的 Facebook Graph API 动作的属性）：\n\
  \n```\ntypedef enum : int\n{\n    FacebookActionGetFriendsBirthdays = 1,\n    FacebookActionPostToWall\n\
  }FacebookAction;\n\n@interface BRDModel()\n\n@property (strong) ACAccount *facebookAccount;\n\
  @property FacebookAction currentFacebookAction;\n\n@end\n```\n\n在本章后面，我们将编写代码在好友的\
  \ Facebook 墙上发帖；所以此处我们为多个 Facebook 处理流程预先做了规划。\n\n现在我们编写 `BRDModel.m` 中的 Facebook\
  \ 身份验证方法。我对代码做了详细注释：\n\n```\n- (void)authenticateWithFacebook {\n\n    // iOS 中的\
  \ Twitter、Facebook 和 Sina Weibo 等中央账户由应用通过 ACAccountStore 访问\n    ACAccountStore\
  \ *accountStore = [[ACAccountStore alloc] init];\n\n    ACAccountType *accountTypeFacebook\
  \ = [accountStore\n        accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierFacebook];\n\
  \n    // 替换为你的 Facebook.com 应用 ID\n    NSDictionary *options = @{ACFacebookAppIdKey:\
  \ @\"125381334264255\",\n        ACFacebookPermissionsKey:\n        @[@\"publish_stream\"\
  ,@\"friends_birthday\"],ACFacebookAudienceKey:ACFacebookAudienceFriends};\n\n  \
  \  [accountStore requestAccessToAccountsWithType:accountTypeFacebook options:options\n\
  \        completion:^(BOOL granted, NSError *error) {\n        if(granted) {\n \
  \           // 完成处理程序可能不在主线程中触发，由于我们要\n            NSLog(@\"Facebook 授权成功！\");\n\
  \            NSArray *accounts = [accountStore accountsWithAccountType:accountTypeFacebook];\n\
  \            self.facebookAccount = [accounts lastObject];\n```\n\n\n```objectivec\n\
  // 通过检查用户在进行授权前尝试执行哪种 Facebook 操作，\n// 我们可以在授权成功后完成该 Facebook 操作\nswitch (self.currentFacebookAction)\
  \ {\n    case FacebookActionGetFriendsBirthdays:\n        [self fetchFacebookBirthdays];\n\
  \        break;\n    case FacebookActionPostToWall:\n        // TODO - 在朋友的 Facebook\
  \ 墙上发帖\n        break;\n}\n} else {\n\n    if ([error code] == ACErrorAccountNotFound)\
  \ {\n        NSLog(@\"未找到 Facebook 账户\");\n    }\n    else {\n        NSLog(@\"\
  Facebook SSO 认证失败: %@\",error);\n    }\n}\n}];\n}\n```\n\n在上面的代码中，请确保已将我的 Facebook\
  \ 应用 ID `125381334264255` 替换为你自己的 Facebook 应用 ID。\n\n苹果在 iOS 6 中原生支持三种社交网络账户类型：Twitter、Facebook\
  \ 和新浪微博。为了检查和访问这些社交网络账户，我们的代码会查询`ACAccountStore`，并传入我们感兴趣访问的账户的社交网络类型；在我们的例子中，这是一个标识符为`ACAccountTypeIdentifierFacebook`的账户类型。\n\
  \n既然我们已经声明正在检查 Facebook 账户，我们还需要让 iOS 了解我们请求访问数据的意图。对于 Facebook，我们需要传入一个选项字典，其中包含\
  \ Facebook 应用 ID 以及我们需要访问的 Facebook 权限。对于某些 Facebook 功能，必须指定一个*扩展权限*数组：获取朋友生日需要`friends_birthday`权限。关于扩展权限的完整列表，请访问以下网页：[`http://developers.facebook.com/docs/reference/api/permissions/`](http://developers.facebook.com/docs/reference/api/permissions/)。\n\
  \n`ACAccountStore`的方法`requestAccessToAccountsWithType:`要求我们传入一个完成代码块，当用户点击\"不允许\"\
  或\"好\"以响应账户访问请求时，该代码块会被调用。\n\n现在让我们开始在`BRDModel.m`中实现`fetchFacebookBirthdays`：\n\
  \n```objectivec\n- (void)fetchFacebookBirthdays\n{\n    NSLog(@\"fetchFacebookBirthdays\"\
  );\n    if (self.facebookAccount == nil) {\n        self.currentFacebookAction =\
  \ FacebookActionGetFriendsBirthdays;\n        [self authenticateWithFacebook];\n\
  \        return;\n    }\n    // 如果代码执行到这里，说明我们已有经过验证的 Facebook 账户\n}\n```\n\n我们的\
  \ Facebook 导入视图控制器不需要了解授权过程的任何细节；它只需要知道导入哪些生日以及列表何时更新。每次 Facebook 导入视图控制器出现时，我们都会设置它调用模型上的`fetchFacebookBirthdays`方法，该方法首先检查`self.facebookAccount`是否存在（即是否已由用户授权）。如果不存在，此时我们的模型将通过执行我们刚编写的`authenticateWithFacebook`方法来启动单点登录过程。\n\
  \n打开`BRImportFacebookViewController.m`，导入`BRDModel`，然后在 Facebook 导入视图出现时添加`fetchFacebookBirthdays`方法调用，如下所示：\n\
  \n```objectivec\n#import \"BRImportFacebookViewController.h\"\n#import \"BRDModel.h\"\
  \n@interface BRImportFacebookViewController ()\n\n@end\n\n@implementation BRImportFacebookViewController\n\
  \n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    [[BRDModel sharedInstance] fetchFacebookBirthdays];\n}\n\n@end\n```\n\n尝试编译并运行。点击\
  \ Facebook 按钮。只要你的设备或模拟器上关联了 Facebook 账户，你就能看到数据隐私提示，如图 Figure 11-7 所示。\n\n![图像](img/9781430243748_Fig11-07.jpg)\n\
  \n**图 11-7.** 苹果的 Accounts 框架提示用户允许访问其 Facebook 账户\n\n来自 Facebook 导入的视图控制器在出现时调用了模型的`fetchFacebookBirthdays`方法。`BRDModel.m`检查其私有属性`facebookAccount`是否存在，如果未设置，则调用我们之前编写的`authenticateWithFacebook`方法。\n\
  \n在权限提示视图中点击\"好\"会触发`authenticateWithFacebook`方法中的完成代码块运行，该代码块将`facebookAccount`存储到模型中，然后重新调用`fetchFacebookBirthdays`，这样我们获取\
  \ Facebook 生日的代码现在就可以在授权下运行了。我们还没有编写获取生日的代码，所以现在开始编写。\n\n\n### 获取 Facebook 生日信息\n\
  \n当用户完成 Facebook 单点登录流程，并授权*生日提醒*应用代表他们与 Facebook 通信后，我们就能实现这一功能了！因此，让我们扩展 `BRDModel.m`\
  \ 中的 `fetchFacebookBirthdays` 方法，使其能够发起 Facebook API 请求，以获取用户 Facebook 好友的生日详情：\n\
  \n```\n- (void)fetchFacebookBirthdays\n{\n    NSLog(@\"fetchFacebookBirthdays\"\
  );\n    if (self.facebookAccount == nil) {\n        self.currentFacebookAction =\
  \ FacebookActionGetFriendsBirthdays;\n        [self authenticateWithFacebook];\n\
  \        return;\n    }\n    //如果代码执行到这里，说明我们已经有了经过认证的 Facebook 账户\n    NSURL *requestURL\
  \ = [NSURL URLWithString:@\"https://graph.facebook.com/me/friends\"];\n    NSDictionary\
  \ *params = @{ @\"fields\" : @\"name,id,birthday\"};\n    SLRequest *request = [SLRequest\
  \ requestForServiceType:SLServiceTypeFacebook requestMethod:SLRequestMethodGET URL:requestURL\
  \ parameters:params];\n    request.account = self.facebookAccount;\n    [request\
  \ performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\n*urlResponse,\
  \ NSError *error) {\n        if (error != nil) {\n            NSLog(@\"Error getting\
  \ my Facebook friend birthdays: %@\",error);\n        }\n        else\n        {\n\
  \            // Facebook 的 me/friends Graph API 返回一个根字典\n            NSDictionary\
  \ *resultD = (NSDictionary *) [NSJSONSerialization\nJSONObjectWithData:responseData\
  \ options:0 error:nil];\n            NSLog(@\"Facebook returned friends: %@\",resultD);\n\
  \        }\n    }];\n}\n```\n\n这段新代码使用了 Apple 社交框架中的 `SLRequest` 类，来调用 Facebook\
  \ Graph API 的 `me/friends` 路径，并且只请求返回的好友字典数组中每个好友的 `name`、`id` 和 `birthday` 字段。如需查看完整的用户字段列表，请访问以下网页：\n\
  \n[`developers.facebook.com/docs/reference/api/user/`](http://developers.facebook.com/docs/reference/api/user/).\n\
  \n深入探讨 Facebook 的 Graph API 超出了本书的范围。但如果你想了解你的应用可以原生访问的所有 Facebook API，可以查看 Facebook\
  \ 官方的 API 文档：[`developers.facebook.com/docs/reference/api/`](http://developers.facebook.com/docs/reference/api/)。\n\
  \n现在你应该能够构建并运行你的应用了。尝试从 Facebook 导入数据，调试器会打印出 Facebook API 请求返回的所有 JSON 数据。\n\n\
  请注意，我们将 `SLRequest` 实例的 `account` 属性赋值为已授权的 Facebook `ACAccount`。\n\n发向 Facebook\
  \ 的 HTTP 请求由 `SLRequest` 的 `performRequestWithHandler` 方法执行，该方法运行在后台线程中。当请求收到来自\
  \ Facebook 的响应时，会执行一个完成的代码块。\n\n*注意：Apple 的所有用户界面代码都在主线程上运行。通过在后台线程上运行 HTTP 请求等进程，我们可以确保即使请求仍在运行，应用的用户界面也能保持响应。*\n\
  \n接下来，我们将处理返回的 Facebook 生日数据。就像第 10 章中导入通讯录生日那样，`BRDModel` 将生成一个 `BRDBirthdayImport`\
  \ 对象的数组。创建好生日导入对象数组后，我们将从模型中发送通知，告知 Facebook 生日列表已更新。在第 4 章构建二十一点应用时，以及上一章发送从通讯录导入的生日数组时，我们都了解过\
  \ Objective-C 的通知/观察者特性。基本的 MVC 规则规定，我们的模型不能直接访问视图。相反，模型在其数据发生变化时会发送通知，而我们的 Facebook\
  \ 导入视图控制器能够捕获该通知并更新其视图。\n\n在开始处理 Facebook 返回的数据之前，让我们在 `BRDModel.h` 头文件的顶部定义一个通知名称常量，就像之前为通讯录生日所做的那样：\n\
  \n```\n#define BRNotificationFacebookBirthdaysDidUpdate\n@\"BRNotificationFacebookBirthdaysDidUpdate\"\
  \n```\n\n现在，继续完善 `fetchFacebookBirthdays` 方法，使其能够处理、加工数据并通知观察者，提供完整的 Facebook 生日列表以供显示，我们的用户将能够从中进行挑选。\n\
  \n```\n- (void)fetchFacebookBirthdays\n{\n    NSLog(@\"fetchFacebookBirthdays\"\
  );\n    if (self.facebookAccount == nil) {\n        self.currentFacebookAction =\
  \ FacebookActionGetFriendsBirthdays;\n        [self authenticateWithFacebook];\n\
  \        return;\n    }\n    //如果代码执行到这里，说明我们已经有了经过认证的 Facebook 账户\n    NSURL *requestURL\
  \ = [NSURL URLWithString:@\"https://graph.facebook.com/me/friends\"];\n    NSDictionary\
  \ *params = @{ @\"fields\" : @\"name,id,birthday\"};\n    SLRequest *request = [SLRequest\
  \ requestForServiceType:SLServiceTypeFacebook requestMethod:SLRequestMethodGET URL:requestURL\
  \ parameters:params];\n    request.account = self.facebookAccount;\n    [request\
  \ performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse *urlResponse,\n\
  NSError *error) {\n        if (error != nil) {\n            NSLog(@\"Error getting\
  \ my Facebook friend birthdays: %@\",error);\n        }\n        else\n        {\n\
  \            // Facebook 的 me/friends Graph API 返回一个根字典\n            NSDictionary\
  \ *resultD = (NSDictionary *) [NSJSONSerialization JSONObjectWithData:responseData\
  \ options:0 error:nil];\n            NSLog(@\"Facebook returned friends: %@\",resultD);\n\
  // 带有一个 'data' 键 - 它是一个由 Facebook 好友字典构成的数组\n            NSArray *birthdayDictionaries\
  \ = resultD[@\"data\"];\n            int birthdayCount = [birthdayDictionaries count];\n\
  \            NSDictionary *facebookDictionary;\n            NSMutableArray *birthdays\
  \ = [NSMutableArray array];\n            BRDBirthdayImport *birthday;\n        \
  \    NSString *birthDateS;\n            for (int i = 0; i < birthdayCount; i++)\n\
  \            {\n                facebookDictionary = birthdayDictionaries[i];\n\
  \                birthDateS = facebookDictionary[@\"birthday\"];\n             \
  \   if (!birthDateS) continue;\n                //创建一个 BRDBirthdayImport 实例\n  \
  \              NSLog(@\"Found a Facebook Birthday: %@\",facebookDictionary);\n \
  \               //TODO - 创建 BRDBirthdayImport 实例\n            }\n            //按姓名对生日进行排序\n\
  \            NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc]\ninitWithKey:@\"\
  name\" ascending:YES];\n            NSArray *sortDescriptors = [NSArray arrayWithObject:sortDescriptor];\n\
  \            [birthdays sortUsingDescriptors:sortDescriptors];\n            dispatch_sync(dispatch_get_main_queue(),\
  \ ^{\n                //在主线程上更新视图\n                NSDictionary *userInfo = @{@\"\
  birthdays\":birthdays};\n                [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationFacebookBirthdaysDidUpdate\
  \ object:self\nuserInfo:userInfo];\n            });\n        }\n    }];\n}\n```\n\
  \nGraph API 返回的是 JSON 格式数据，我们使用一个名为 `NSJSONSerialization` 的便捷工具类来解析它，这个类是 Apple\
  \ 在 iOS 5 中为 JSON 读取和序列化而添加的。然后，我们从中提取出一个由 Facebook 好友字典构成的 `data` 数组，遍历列表，并检查每个元素是否包含有效的\
  \ `birthday` 键值。Facebook 用户会选择他们想要分享的信息，因此我们无法保证结果集中每个好友都有生日数据。\n\n\n在 `SLRequest`\
  \ 响应处理器的末尾，有一段新代码，即 `dispatch_sync` 函数调用。`SLRequest` 实例经过优化，会在后台线程执行请求，以避免运行时阻塞用户界面。然而，通过以这种方式分发\
  \ `BRNotificationFacebookBirthdaysDidUpdate` 通知，我们利用了 Apple 的 Grand Central Dispatch，通知将在主线程上触发。这是必要的，因为我们的\
  \ Facebook 导入视图控制器会响应通知而重绘自身，而所有用户界面渲染必须在主线程上完成。\n\n你还会注意到，在代码循环中我们有一个 `TODO` 注释，我们将在其中创建\
  \ `BRDBirthdayImport` 的实例。我们的生日导入类已经有一个 `initWithAddressBookRecord:` 初始化方法，现在我们将编写另一个初始化方法，用于根据\
  \ Facebook 用户字典创建 `BRDBirthdayImport` 实例。打开 `BRDBirthdayImport.h`，并将新的初始化方法签名添加到接口中：\n\
  \n`-(id)initWithFacebookDictionary:(NSDictionary *)facebookDictionary;`\n\n现在切换到\
  \ `BRDBirthdayImport.m` 并实现这个新的初始化方法。我对整个代码添加了注释：\n\n```\n-(id)initWithFacebookDictionary:(NSDictionary\
  \ *)facebookDictionary\n{\n    self = [super init];\n    if (self) {\n        self.name\
  \ = [facebookDictionary objectForKey:@\"name\"];\n        self.uid = [NSString stringWithFormat:@\"\
  fb-%@\",facebookDictionary[@\"id\"]];\n        self.facebookID = [NSString stringWithFormat:@\"\
  %@\",facebookDictionary[@\"id\"]];\n\n        //Facebook 提供了一个便捷的 URL 用于获取 Facebook\
  \ 个人资料图片，只要你有 Facebook ID\n        self.picURL = [NSString\nstringWithFormat:@\"\
  http://graph.facebook.com/%@/picture?type=large\",self.facebookID];\n\n        //\
  \ Facebook 以 [月]/[日]/[年] 或 [月]/[日] 的字符串格式返回生日\n        NSString *birthDateString\
  \ = [facebookDictionary objectForKey:@\"birthday\"];\n        NSArray *birthdaySegments\
  \ = [birthDateString componentsSeparatedByString:@\"/\"];\n\n        self.birthDay\
  \ =  [NSNumber numberWithInt:[birthdaySegments[1] intValue]];\n        self.birthMonth\
  \ = [NSNumber numberWithInt:[birthdaySegments[0] intValue]];\n\n        if ([birthdaySegments\
  \ count] > 2) {//包含年份\n            self.birthYear = [NSNumber numberWithInt:[birthdaySegments[2]\
  \ intValue]];\n        }\n\n        [self updateNextBirthdayAndAge];\n    }\n    return\
  \ self;\n}\n```\n\nFacebook 的 Graph API 请求返回的 Facebook 用户表示形式是字典，其键和值与发起请求时传递的参数中列出的\
  \ Facebook 用户字段对应：`name`、`id` 和 `birthday`。正如前面代码注释中所记录的，Facebook 会以 `[月]/[日]/[年]`\
  \ 或 `[月]/[日]` 的字符串格式返回生日，因此我们甚至不需要使用 `NSDateComponents` 来拆分生日；我们只需拆分字符串即可提取月、日和可选的年份值。\n\
  \n大多数 Facebook 用户都有个人资料照片。我们将每个用户的个人资料照片引用存储在生日导入对象的 `picURL` 中。值得庆幸的是，只要你有用户的 Facebook\
  \ ID（我们当然有！），Facebook 就会为 Facebook 个人资料照片提供一个便捷的 URL。\n\n让我们回到 `BRDModel.m`，完成 `fetchFacebookBirthdays`\
  \ 方法，并填补 `TODO` 代码注释：\n\n```\n//TODO - 创建 BRDBirthdayImport 的实例\nbirthday = [[BRDBirthdayImport\
  \ alloc] initWithFacebookDictionary:facebookDictionary];\n[birthdays addObject:\
  \ birthday];\n```\n\n### 将 Facebook 好友加载到表格视图中\n\n是时候在我们的 Facebook 导入表格视图中显示那些 Facebook\
  \ 好友及其生日了。Facebook 用户的生日由模型处理并转换为生日导入实例。然后，生日导入对象数组通过通知分发到任何观察对象。因此，我们需要将 Facebook\
  \ 导入视图控制器指定为 `BRNotificationFacebookBirthdaysDidUpdate` 通知的观察者。我们将在视图控制器出现时将其添加为观察者，并在其消失时移除它。\n\
  \n打开 `BRImportFacebookViewController.m`，并用高亮显示的新代码完善该类：\n\n```\n#import \"BRImportFacebookViewController.h\"\
  \n#import \"BRDModel.h\"\n\n@interface BRImportFacebookViewController ()\n\n@end\n\
  \n@implementation BRImportFacebookViewController\n\n-(void) viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n                                             selector:@selector(handleFacebookBirthdaysDidUpdate:)\n\
                                                   name:BRNotificationFacebookBirthdaysDidUpdate\n\
                                                 object:[BRDModel sharedInstance]];\n\
      [[BRDModel sharedInstance] fetchFacebookBirthdays];\n}\n\n- (void) viewWillDisappear:(BOOL)animated\n\
  {\n    [super viewWillDisappear:animated];\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:self\n                                                    name:BRNotificationFacebookBirthdaysDidUpdate\n\
                                                    object:[BRDModel sharedInstance]];\n\
  }\n\n-(void)handleFacebookBirthdaysDidUpdate:(NSNotification *)notification\n{\n\
      NSDictionary *userInfo = [notification userInfo];\n\n    self.birthdays = userInfo[@\"\
  birthdays\"];\n    [self.tableView reloadData];\n}\n\n@end\n```\n\n当我们把 Facebook\
  \ 导入视图控制器添加为通知观察者时，必须在 `handleFacebookBirthdaysDidUpdate:` 中指定一个方法处理程序——这是我们的 Facebook\
  \ 生日更新通知处理类。当 `BRDModel.m` 发布通知时，它还会将 `birthdays` 数组打包到通知的 `userInfo` 字典中。以下是之前编写的\
  \ `BRDModel` 代码的回顾：\n\n```\nNSDictionary *userInfo = @{@\"birthdays\":birthdays};\n\
  [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationFacebookBirthdaysDidUpdate\n\
                                                      object:self\n                                                  userInfo:userInfo];\n\
  ```\n\n在视图控制器中，我们可以从 `userInfo` 字典中检索 `birthdays` 数组，将其赋值给控制器的本地 `birthdays` 数组，然后重新加载表格视图。接下来，`BRImportViewController`\
  \ 父类会为我们完成其余的工作！\n\n构建并运行。在对 Facebook 进行授权并等待 Graph API 请求完成几秒钟后返回应用，你的 Facebook\
  \ 好友应该会出现在 Facebook 导入表格视图中，并且你应该能够多选他们（参见 图 11-8）。\n\n![Image](img/9781430243748_Fig11-08.jpg)\n\
  \n**图 11-8.** 显示返回生日的 Facebook 导入视图控制器\n\n### 将 Facebook 生日导入 Core Data 存储\n\n但还有更多……尝试导入几个\
  \ Facebook 好友……哇，你猜怎么着——它竟然能正常工作！我们在第 10 章中编写的 `importBirthdays:` 代码就是用来导入 `BRDBirthdayImport`\
  \ 实例的。我们已经将 Facebook 生日字典转换为 `BRDBirthdayImport` 实例，并且所有生日的导入视图渲染都已由 `BRImportViewController`\
  \ 父视图控制器类处理。你看到我们仅仅通过使用父类和一个通用的生日导入类节省了多少时间和精力吗？\n\n唯一缺失的功能是，我们有 Facebook 好友图片的远程\
  \ URL，但目前我们还没有编写表格视图来下载和渲染远程图片。那么我们现在就来完成这项工作！\n\n\n\n#### 加载与显示远程图片\n\n遗憾的是，苹果并未在\
  \ iOS SDK 中将远程图片加载功能纳入`UIImageView`或任何其他类。要实现高效下载、缓存和渲染远程图片文件，需要编写相当多的复杂代码。不过，我们将编写一些可复用的图片下载与渲染代码，一旦攻克这个难题，你会发现这些代码也能用于其他\
  \ iPhone 开发项目。\n\n我们将通过创建一个 Objective-C 分类，并在`UIImageView`上新增`setImageWithRemoteFileURL:placeholderImage:`方法，来扩展苹果`UIImageView`的功能，使其支持远程图片显示。\n\
  \n在项目导航器中，选择`user-interface`/`categories`分组，然后使用快捷键`![Image](img/U002a.jpg)N`或者依次点击文件`![Image](img/U001.jpg)`新建`![Image](img/U001.jpg)`文件，从\
  \ Cocoa Touch 文件模板中选择 Objective-C 分类选项。创建一个名为`RemoteFile`的`UIImageView`分类，如图 11-9\
  \ 所示。\n\n`![Image](img/9781430243748_Fig11-09.jpg)`\n\n**图 11-9.** 在`UIImageView`上创建新的`RemoteFile`分类\n\
  \n在 Xcode 中打开`UIImageView+RemoteFile.h`，我们将为`UIImageView`添加一个新方法：\n\n```\n#import\
  \ <UIKit/UIKit.h>\n\n@interface UIImageView (RemoteFile)\n- (void)setImageWithRemoteFileURL:(NSString\
  \ *)urlString placeHolderImage:(UIImage *)placeholderImage;\n\n@end\n```\n\n我们正在为图像视图创建一个新方法`setImageWithRemoteFileURL:placeHolderImage:`，它接受一个\
  \ URL 字符串和一个占位图像实例。当从远程图片 URL 下载图像数据时，图像视图会显示占位图像。下载完成后，图像视图会用下载的图像替换占位图像。\n\n同时，我们希望图片加载过程是优化过的。如果用户有数百个\
  \ Facebook 好友，并且他滚动浏览一个包含数百行的表格视图，那么我们必须小心，不要同时尝试下载数百张图片：否则，随着下载队列的增长，新图片出现所需的时间会越来越长。\n\
  \n切换到`UIImageView+RemoteFile.m`。我们将编写大约 250 行代码来实现新的`RemoteFile`图像视图分类。原因在于，除了实现我们的公共方法`setImageWithRemoteFileURL:placeHolderImage`之外，我们还会在分类实现文件中包含一些私有类。\n\
  \n首先，我们将创建一个类，用于在可变字典中缓存已下载的图像。这个缓存类将作为单例创建，并且所有图像视图实例均可访问。\n\n在新的`ImageCache`类的接口和实现代码上方，添加以下内容，位于空的`UIImageView\
  \ (RemoteFile)`实现之上：\n\n```\n//一个单例缓存类，用于存储已下载图片的 URL 键和 UIImage 值，这些图片之前已被下载\n\
  @interface ImageCache : NSObject\n\n@property (nonatomic,strong) NSMutableDictionary\
  \ *cache;\n\n-(UIImage *) cachedImageForURL:(NSString *)url;\n-(void) storeCachedImage:(UIImage\
  \ *)image forURL:(NSString *)url;\n\n@end\n\n@implementation ImageCache\n\n@synthesize\
  \ cache = _cache;\n\n-(id) init\n{\n    self = [super init];\n    if (self) {\n\
  \        //如果应用收到内存警告，缓存字典将被清空\n        [[NSNotificationCenter defaultCenter] addObserver:self\n\
  \                                                 selector:@selector(clearCache)\n\
  \                                                     name:UIApplicationDidReceiveMemoryWarningNotification\n\
  \                                                   object:nil];\n\n    }\n    return\
  \ self;\n}\n\n-(void) dealloc\n{\n    [[NSNotificationCenter defaultCenter] removeObserver:self\n\
  name:UIApplicationDidReceiveMemoryWarningNotification object:nil];\n}\n\n-(NSMutableDictionary\
  \ *) cache\n{\n    if (_cache == nil) {\n        _cache = [NSMutableDictionary dictionary];\n\
  \    }\n    return _cache;\n}\n\n- (void)clearCache\n{\n    [self.cache removeAllObjects];\n\
  }\n\n-(void) storeCachedImage:(UIImage *)image forURL:(NSString *)url\n{\n    self.cache[url]\
  \ = image;\n}\n\n-(UIImage *) cachedImageForURL:(NSString *)url\n{\n    return self.cache[url];\n\
  }\n```\n\n我们的图像视图分类将能够通过调用`cachedImageForURL:`并传入远程 URL 来检查之前缓存的图像。同样，当远程图像下载完成时，我们将使用`ImageCache`的`storeCachedImage:forURL:`方法缓存它们。\n\
  \n接下来要添加的封装类是`DownloadHelper`类及其委托协议。同样，将此代码添加到`UIImageView (RemoteFile)`实现之上——紧接在`ImageCache`类声明之后：\n\
  \n```\n//一个用于处理数据下载事件并逐步存储图像文件下载数据的辅助类\n\n@protocol DownloadHelperDelegate <NSObject>\n\
  \n-(void)didCompleteDownloadForURL:(NSString *)url withData:(NSMutableData *)data;\n\
  \n@end\n\n@interface DownloadHelper : NSObject\n\n@property (nonatomic,strong) NSString\
  \ *url;\n@property (nonatomic,strong) NSMutableData *data;\n@property (nonatomic,strong)\
  \ NSURLConnection *connection;\n@property (nonatomic,assign) id<DownloadHelperDelegate>\
  \ delegate;\n\n@end\n\n@implementation DownloadHelper\n\n@synthesize url = _url;\n\
  @synthesize data = _data;\n@synthesize connection = _connection;\n@synthesize delegate\
  \ = _delegate;\n\n- (void) connection: (NSURLConnection*) connection didReceiveData:\
  \ (NSData*) data\n{\n    //将新接收的数据字节追加到现有的可变数据容器中\n    [self.data appendData:data];\n\
  }\n\n- (void)connectionDidFinishLoading:(NSURLConnection *)connection\n{\n    //数据下载完成\
  \ - 处理完成！\n    [self.delegate didCompleteDownloadForURL:self.url withData:self.data];\n\
  }\n\n-(void) cancelConnection\n{\n    if (self.connection) {\n        [self.connection\
  \ cancel];\n        [self setConnection:nil];\n    }\n}\n\n-(void) dealloc\n{\n\
  \    [self cancelConnection];\n}\n\n@end\n```\n\n每当图像视图需要开始下载新的远程图像文件时，我们将创建这个新的`DownloadHelper`类的实例。每个`DownloadHelper`实例将由一个`UIImageView`实例拥有。iOS\
  \ SDK 包含一个名为`NSURLConnection`的类，我们将用它通过 HTTP 请求下载远程图像数据。通过将我们的`DownloadHelper`实例设置为`NSURLConnection`实例的委托，我们将能够通过`connection:didReceiveData:`和`connectionDidFinishLoading:`事件处理程序捕获数据下载更新和完成事件。\n\
  \n`DownloadHelper`将通过委托回调方法`didCompleteDownloadForURL:withData:`通知其所属的图像视图。\n\n\
  现在我们将向`UIImageView`添加另一个分类。这个新分类将对其他类隐藏，因为它仅用于我们远程图像下载和缓存逻辑的内部使用。正如注释所述，创建这个`UIImageView(RemoteFileHidden)`分类的主要目的是为苹果的`UIImageView`类添加两个额外属性：`url`和`downloadHelper`。在\
  \ Objective-C 中，实际上无法通过分类为类添加合成的属性。相反，我们将通过使用动态属性来解决这个问题，这些属性将在运行时创建并添加到`UIImageView`类中。在运行时添加存储属性是相当高级的技术，但为了创建有用的可复用代码，这是满足我们需求的最佳方式。首先，滚动到`UIImageView+RemoteFile.m`的顶部，并导入运行时库：\n\
  \n```\n#import <objc/runtime.h>\n```\n\n继续在`UIImageView+RemoteFile.m`中工作，在`UIImageView\
  \ (RemoteFile)`的实现之前，添加隐藏的`UIImageView(RemoteFileHidden)`分类：\n\n\n\n```objectivec\n\
  //UIImageView 上一个额外的、隐藏的依赖分类。主要用于为 UIImageView 添加两个动态属性：url 和 downloadHelper\n\n\
  @interface UIImageView(RemoteFileHidden) <DownloadHelperDelegate>\n\n@property (nonatomic,strong,setter\
  \ = setUrl:) NSString *url;\n@property (nonatomic,strong,setter = setDownloadHelper:)\
  \ DownloadHelper *downloadHelper;\n\n@end\n\n@implementation UIImageView(RemoteFileHidden)\n\
  \n@dynamic url;\n@dynamic downloadHelper;\n\nstatic char kImageUrlObjectKey;\nstatic\
  \ char kImageDownloadHelperObjectKey;\n\n+ (ImageCache *)imageCache {\n    static\
  \ ImageCache *_imageCache;\n\n    //返回 UIImageCache 的单例实例\n    if (_imageCache ==\
  \ nil) {\n        _imageCache = [[ImageCache alloc] init];\n    }\n    return _imageCache;\n\
  }\n\n- (NSString *)url {\n    return (NSString *)objc_getAssociatedObject(self,\
  \ &kImageUrlObjectKey);\n}\n\n- (void)setUrl:(NSString *)url {\n    objc_setAssociatedObject(self,\
  \ &kImageUrlObjectKey, url,\nOBJC_ASSOCIATION_RETAIN_NONATOMIC);\n}\n\n- (DownloadHelper\
  \ *)downloadHelper {\n\n    DownloadHelper *helper = (DownloadHelper *)objc_getAssociatedObject(self,\
  \ &kImageDownloadHelperObjectKey);\n\n    if (helper == nil) {//helper 类的懒加载\n \
  \       helper = [[DownloadHelper alloc] init];\n        //当 helper 完成远程图片数据下载后，会调用其代理（即该\
  \ image view）\n        helper.delegate = self;\n        self.downloadHelper = helper;\n\
  \    }\n\n    return helper;\n}\n\n- (void)setDownloadHelper:(DownloadHelper *)downloadHelper\
  \ {\n    objc_setAssociatedObject(self, &kImageDownloadHelperObjectKey, downloadHelper,\
  \ OBJC_ASSOCIATION_RETAIN_NONATOMIC);\n}\n\n-(void) dealloc\n{\n    if (self.url\
  \ != nil) [self.downloadHelper cancelConnection];\n}\n\n#pragma mark DownloadHelperDelegate\n\
  \n-(void)didCompleteDownloadForURL:(NSString *)url withData:(NSMutableData *)data\n\
  {\n    //处理下载的图片数据，将其转换为图片实例，并保存到 ImageCache 单例中。\n\n    UIImage *image = [UIImage\
  \ imageWithData:data];\n\n    if (image == nil) {//可能有问题——数据可能已损坏或 url 无效\n    \
  \    return;\n    }\n\n    //缓存图片\n    ImageCache *imageCache = [UIImageView imageCache];\n\
  \    [imageCache storeCachedImage:image forURL:url];\n\n    //更新此 UIImageView 的占位图片显示\n\
  \    self.image = image;\n\n}\n\n@end\n```\n\n除了为 `UIImageView` 添加动态的 `url` 和 `downloadHelper`\
  \ 属性外，这段代码还为 `UIImageView` 的实例新增了一个类访问器方法 `imageCache`。调用 `imageCache` 会返回一个指向我们\
  \ `ImageCache` 类单例实例的引用。当 `DownloadHelper` 实例从 `NSURLConnection` 收到 `connectionDidFinishLoading:`\
  \ 回调时，它会通过 `didCompleteDownloadForURL: withData:` 方法调用其代理（即 image view），并传入从服务器连接获取的完整数据。`UIImageView`\
  \ 的 `didCompleteDownloadForURL: withData:` 方法随后会根据这些数据创建一张图片，并使用远程 URL 作为访问键，将其存储到单例图片缓存中。占位图片也会被替换为新的缓存数据图片。\n\
  \n最后，让我们实现主要的分类方法 `setImageWithRemoteFileURL:placeHolderImage:`。\n\n```objectivec\n\
  @implementation UIImageView (RemoteFile)\n\n- (void)setImageWithRemoteFileURL:(NSString\
  \ *)urlString placeHolderImage:(UIImage\n*)placeholderImage\n{\n\n    if (self.url\
  \ != nil && [self.url isEqualToString:urlString]) {\n        //如果 url 与现有 url 相同，则忽略\n\
  \        return;\n    }\n\n    [self.downloadHelper cancelConnection];\n\n    self.url\
  \ = urlString;\n\n    //获取图片缓存单例的引用\n    ImageCache *imageCache = [UIImageView imageCache];\n\
  \n    UIImage *image = [imageCache cachedImageForURL:urlString];\n    //检查是否已有该图片的缓存版本\n\
  \    if (image) {\n        self.image = image;\n        return;\n    }\n\n    //没有缓存版本，因此开始下载远程文件\n\
  \    self.image = placeholderImage;\n\n    NSURL *url = [NSURL URLWithString:urlString];\n\
  \    NSURLRequest *request = [NSURLRequest requestWithURL:url];\n\n    self.downloadHelper.url\
  \ = urlString;\n    //将 download helper 设置为数据下载更新的代理\n    self.downloadHelper.connection\
  \ =(NSURLConnection *)[[NSURLConnection alloc]\ninitWithRequest:request delegate:self.downloadHelper\
  \ startImmediately:YES];\n    if (self.downloadHelper.connection) {\n        //创建一个空的可变数据容器来添加数据字节\n\
  \        self.downloadHelper.data = [NSMutableData data];\n    }\n}\n\n@end\n```\n\
  \n假设我们的 Facebook 好友表格视图显示了 500 行好友及其远程照片。你还记得表格视图是如何高效渲染这么多行的吗？它只创建足够填满可见区域所需的表格视图单元格。当用户向下滚动表格时，它会重复使用那五六个表格单元格。这意味着\
  \ `iconView` 图片视图也被重复使用。因此，当调用 `setImageWithRemoteFileURL:placeHolderImage:` 方法时，我们做的第一件事就是取消任何现有的文件下载：\n\
  \n```objectivec\n[self.downloadHelper cancelConnection];\n```\n\n正是这行代码阻止了我们的应用程序尝试同时下载数百张\
  \ Facebook 好友照片。在我们的方法启动新的文件下载之前，它会检查是否已有该 URL 对应的缓存图片：\n\n```objectivec\nUIImage\
  \ *image = [imageCache cachedImageForURL:urlString];\n```\n\n如果我们已有缓存版本，那么就会使用现有的缓存图片，而不是尝试重新下载远程图片。如果这是我们的程序首次尝试下载该远程图片，那么我们会创建一个新的\
  \ URL 连接，并将 download helper 实例设置为数据连接更新的代理，例如数据下载完成事件：\n\n```objectivec\nself.downloadHelper.connection\
  \ =(NSURLConnection *)[[NSURLConnection alloc]\ninitWithRequest:request delegate:self.downloadHelper\
  \ startImmediately:YES];\n```\n\n我们还会创建一个可变数据容器，用于存储远程文件的增量数据下载：\n\n```objectivec\n\
  self.downloadHelper.data = [NSMutableData data];\n```\n\n我们已经完成了 `UIImageView` 分类，现在来测试一下。打开\
  \ `BRBirthdayTableViewCell.m`，导入 `UIImageView+RemoteFile.h`，然后在 `setBirthdayImport:`\
  \ 方法末尾添加以下代码：\n\n```objectivec\nif (_birthdayImport.imageData == nil)\n    {\n \
  \       if ([_birthdayImport.picURL length] > 0) {\n            [self.iconView setImageWithRemoteFileURL:birthdayImport.picURL\n\
  placeHolderImage:[UIImage imageNamed:@\"icon-birthday-cake.png\"]];\n        }\n\
  \        else self.iconView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
  ];\n}\nelse {\n        self.iconView.image = [UIImage imageWithData:birthdayImport.imageData];\n\
  }\n```\n\n在此处，在 `setBirthday:` 方法末尾添加以下类似代码：\n\n```objectivec\nif (_birthday.imageData\
  \ == nil)\n    {\n        if ([_birthday.picURL length] > 0) {\n            [self.iconView\
  \ setImageWithRemoteFileURL:_birthday.picURL\nplaceHolderImage:[UIImage imageNamed:@\"\
  icon-birthday-cake.png\"]];\n        }\n        else self.iconView.image = [UIImage\
  \ imageNamed:@\"icon-birthday-cake.png\"];\n    }\nelse {\n        self.iconView.image\
  \ = [UIImage imageWithData:_birthday.imageData];\n}\n```\n\n这段代码会检查生日实体和生日导入对象是否存在远程图片\
