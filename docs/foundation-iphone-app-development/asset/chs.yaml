  \n**图 11-16.** 优化后的“发布到 Facebook 墙”视图，包含可启用/禁用的“发布”按钮\n\n太好了，我们自定义的“发布到 Facebook\
  \ 墙”视图和视图控制器的 UI 已经完成。现在，我们来实际向 Facebook 发送一条帖子！\n\n我们将所有 Facebook API 调用集中在 `BRDModel`\
  \ 单例中。因此，打开 `BRDModel.h` 并声明一个新的公有方法 `postToFacebookWall:withFacebookID:`：\n\n```\n\
  - (void)postToFacebookWall:(NSString *)message withFacebookID:(NSString *)facebookID;\n\
  ```\n\n在实现该方法之前，跳转到 `BRPostToFacebookWallViewController.m` 文件，导入 `BRDModel.h`，并完成\
  \ `postToFacebook` 动作方法：\n\n```\n- (IBAction)postToFacebook:(id)sender {\n    [[BRDModel\
  \ sharedInstance] postToFacebookWall:self.textView.text withFacebookID:self.facebookID];\n\
  \    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n现在，我们将发布逻辑添加到模型中。打开\
  \ `BRDModel.m`。我们将对“发布到 Facebook”流程应用与获取 Facebook 好友生日非常相似的逻辑。也就是说，我们不会假设用户已经通过了\
  \ Facebook 认证。基于这一点，我们可能需要等待认证流程完成才能发布。因此，如果用户当前会话中认证流程尚未完成，我们将把要发布的 Facebook ID\
  \ 和消息存储到几个新的私有属性中。在 `BRDModel.m` 的私有接口中添加以下私有属性：\n\n```\n@interface BRDModel()\n\
  \n@property (strong) ACAccount *facebookAccount;\n@property FacebookAction currentFacebookAction;\n\
  @property (nonatomic,strong) NSString *postToFacebookMessage;\n@property (nonatomic,strong)\
  \ NSString *postToFacebookID;\n\n@end\n```\n\n现在来实现新方法 `postToFacebookWall` 的第一部分：\n\
  \n```\n- (void)postToFacebookWall:(NSString *)message withFacebookID:(NSString *)facebookID\n\
  {\n    NSLog(@\"postToFacebookWall\");\n\n    if (self.facebookAccount == nil) {\n\
  \        //我们尚未获得授权，因此存储 Facebook 消息和 ID，并启动认证流程\n        self.postToFacebookMessage\
  \ = message;\n        self.postToFacebookID = facebookID;\n        self.currentFacebookAction\
  \ = FacebookActionPostToWall;\n        [self authenticateWithFacebook];\n      \
  \  return;\n    }\n\n    NSLog(@\"我们已获得授权，开始发布到 Facebook！\");\n\n}    \n```\n\n\
  这段代码看起来与最初的 `fetchFacebookBirthdays` 代码非常相似。如果我们需要授权 `facebookAccount` 属性，则存储消息和\
  \ Facebook ID，并将当前 Facebook 动作设置为枚举值 `FacebookActionPostToWall`。\n\n在完成 `postToFacebookWall`\
  \ 方法之前，首先找到 `authenticateWithFacebook` 方法，并补全用户认证完成后 switch 语句中的 `TODO` 部分：\n\n\
  ```\nswitch (self.currentFacebookAction) {\n                case FacebookActionGetFriendsBirthdays:\n\
  \                    [self fetchFacebookBirthdays];\n                    break;\n\
  \                case FacebookActionPostToWall:\n                    [self postToFacebookWall:self.postToFacebookMessage\n\
  withFacebookID:self.postToFacebookID];\n                    break;\n           \
  \ }\n```\n\n很好。让我们回到 `postToFacebookWall:withFacebookID` 方法中完成发布逻辑：\n\n```\n- (void)postToFacebookWall:(NSString\
  \ *)message withFacebookID:(NSString *)facebookID\n{\n    NSLog(@\"postToFacebookWall\"\
  );\n\n    if (self.facebookAccount == nil) {\n        //我们尚未获得授权，因此存储 Facebook 消息和\
  \ ID，并启动认证流程\n        self.postToFacebookMessage = message;\n        self.postToFacebookID\
  \ = facebookID;\n        self.currentFacebookAction = FacebookActionPostToWall;\n\
  \        [self authenticateWithFacebook];\n        return;\n    }\n\n    NSLog(@\"\
  我们已获得授权，开始发布到 Facebook！\");\n\n    NSDictionary *params = @{@\"message\":message};\n\
  \n    //使用用户的 Facebook ID 调用发布到好友动态的 Graph API 路径\n    NSString *postGraphPath =\
  \ [NSString\nstringWithFormat:@\"https://graph.facebook.com/%@/feed\",facebookID];\n\
  \n    NSURL *requestURL = [NSURL URLWithString:postGraphPath];\n\n    SLRequest\
  \ *request = [SLRequest requestForServiceType:SLServiceTypeFacebook requestMethod:SLRequestMethodPOST\
  \ URL:requestURL parameters:params];\n    request.account = self.facebookAccount;\n\
  \n    [request performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\n\
  *urlResponse, NSError *error) {\n        if (error != nil) {\n            NSLog(@\"\
  发布到 Facebook 时出错：%@\",error);\n        }\n        else\n        {\n            //Facebook\
  \ 返回一个包含新帖子 ID 的字典——这对其他项目可能有用\n            NSDictionary *dict = (NSDictionary *)\
  \ [NSJSONSerialization JSONObjectWithData:responseData options:0 error:nil];\n \
  \           NSLog(@\"成功发布到 Facebook！帖子 ID：%@\",dict);\n        }\n    }];\n\n}\n\
  ```\n\n构建并运行。你应该能够直接从 *生日提醒* 应用发布到好友的 Facebook 动态！\n\n尝试修改代码中传递给 `SLRequest` 实例的\
  \ `params` 字典。你可以添加其他参数，例如链接或图片的 URL，以包含在动态帖子中。一旦你达到这一步，你就拥有了一个功能强大的社交组件基础。你可以在\
  \ [`http://developers.facebook.com/docs/reference/api/post/`](http://developers.facebook.com/docs/reference/api/post/)\
  \ 上阅读关于 Facebook 在 `post` 对象中接受的不同参数值的所有内容。\n\n我强烈建议你在启用好友间 Facebook 动态发布功能时要谨慎行事，并确保你使用此功能的方式符合用户期望。由于我们正在帮助用户发送生日祝福消息，我特意避免了在\
  \ `post` 对象中添加任何应用广告，因为我们不希望用户指责我们向其好友发送垃圾信息！\n\n\n### 总结\n\n今天，我们学习了如何将 Facebook\
  \ 的 Graph API 与 Apple 的 Accounts 和新 Social 框架相结合，形成强大组合，从而将各种 Facebook 功能原生集成到你的应用中。我们仅使用了\
  \ Facebook API 中的两个方法（获取好友列表和向好友墙发文），但还有很多其他可访问的方法，可用于增强各类 iPhone 和 iPad 应用的内容与社交功能。\n\
  \n例如，我的一个应用 *Portfolio Pro for iPad* 是为摄影师和设计师设计的，让他们可以离线展示作品集，并用于客户演示。除了核心功能外，其离线展示特性还允许摄影师登录\
  \ Facebook，并直接将任何照片上传到他们已有的任意 Facebook 相册。这一功能极大地简化了许多摄影师的工作流程，因为他们可以从 Flickr、Dropbox\
  \ 或 iPad 导入照片，并轻松地将其添加到 Facebook 相册并上传。这样做有双重好处：应用让摄影师的工作更轻松，而 Facebook 则会在我的用户发布的每张照片旁添加“来自\
  \ Portfolio Pro for iPad”的链接。这样一来，我的应用获得了微妙的推广链接，指向应用本身的 Facebook 页面，同时也让摄影师的 Facebook\
  \ 好友更多地接触到该应用。\n\n作为开发者，在为自己的应用添加 Facebook 功能时，面临的挑战是找到平衡点：既要提供帮助，又要善用社交分享和广告。主要的关注点应是创建与应用核心功能相关的特性，并帮助用户——而不是成为他们的障碍！\n\
  \n![Image](img/ch.jpg)\n\n## 第 12 章\n\n## 设置与本地通知\n\n我们即将结束第 4 天的学习。从功能和感觉上，我们的应用几乎已经完成。但还缺少一个关键特性：生日提醒通知！在本章中，我们将开发应用内的设置功能，让用户可以定义生日提醒需要提前多少天，以及希望在哪一时间收到提醒。然后，我们将根据这些设置自动为用户安排生日提醒通知。\n\
  \n### 使用静态表格视图控制器\n\n首先，我们将把主设置界面替换为一个表格视图控制器，其中包含两个表格单元格，以便用户更改默认的提醒时间和生日提醒通知的提前天数。\n\
  \n当前实现中，空的设置视图控制器只有一个孤零零的“设置提醒时间”按钮，这需要被替换掉。所以，首先，我们将完全移除当前的设置视图控制器——但别担心，有时候“慈不带兵，义不掌财”。![Image](img/smile.jpg)\n\
  \n打开你的故事板，选择设置视图控制器场景（如图 12-1 高亮所示）。然后按退格键从故事板中删除该场景。此时，左侧应该留下一个导航控制器，右侧是提醒时间视图控制器，中间有一个大空档！现在，在项目导航器中多选\
  \ `BRSettingsViewController.h` 和 `BRSettingsViewController.m`（同样如图 12-1 高亮所示）。删除这些文件！删除时务必选择“移到废纸篓”选项，以便我们稍后能够重新创建同名的文件。\n\
  \n![Image](img/9781430243748_Fig12-01.jpg)\n\n**图 12-1.** 删除高亮显示的故事板场景和设置视图控制器类文件\n\
  \n现在，替换旧的设置视图控制器。我们将使用静态表格单元格来构建新的设置视图控制器：这些单元格会保留在内存中，不会被其表格视图重用。为了使用静态表格单元格，Xcode\
  \ 要求我们继承表格视图控制器（而非标准视图控制器）来创建新的设置视图控制器。表格视图控制器是一种以表格视图作为其主视图的视图控制器，并且默认情况下，该控制器被设置为表格视图的委托和数据源。\n\
  \n将一个表格视图控制器（`UITableViewController`）对象拖到故事板上。从设置导航控制器按住 Control 键拖拽到故事板中的新表格视图控制器，并从上下文菜单中选择“根视图控制器关系”选项（见图\
  \ 12-2）。\n\n![Image](img/9781430243748_Fig12-02.jpg)\n\n**图 12-2.** 通过故事板定义根视图控制器关系\n\
  \n导航控制器与新设置控制器场景之间应出现一条连接线。将新设置场景的导航栏标题设为“设置”（Settings），并在导航栏右侧添加一个栏按钮项。将其标题设为“完成”（Done）（见图\
  \ 12-3）。\n\n![Image](img/9781430243748_Fig12-03.jpg)\n\n**图 12-3.** 绘制新设置场景的故事板\n\
  \n选择新设置场景中的表格视图。在属性检查器中，将表格视图样式从 Plain 改为 Grouped。将表格视图的内容设置从 Dynamic Prototypes\
  \ 改为 Static Cells。向下滚动属性检查器到视图属性，将视图背景颜色改为 Clear Color。\n\nXcode 会自动为你生成三个静态表格单元格。选中并删除其中两个。对于剩下的一个静态表格单元格，将其样式改为\
  \ Right Detail（`UITableViewCellStyleValue1`），输入标题**提前天数**，并将详细文本设为“生日当天”（见图 12-4）。\n\
  \n![Image](img/9781430243748_Fig12-04.jpg)\n\n**图 12-4.** 创建一个采用 Right Detail（`UITableViewCellStyleValue1`）样式的静态表格单元格\n\
  \n现在，在编辑器的文档大纲窗格中选择表格视图节。在属性检查器中，将表格视图节的行数增加到 2。Xcode 会自动对第二个静态表格单元格应用与第一个相同的样式和文本。\n\
  \n将第二个表格单元格的标题修改为“提醒时间”，并将其详细文本改为“上午 9:00”（见图 12-5）。\n\n![Image](img/9781430243748_Fig12-05.jpg)\n\
  \n\n\n### `Figure 12-5.` 修改静态表格视图分区的行\n\n将另一个新的表格视图控制器拖到故事板中，它将作为“提前天数”表格视图控制器。\n\
  \n使用静态表格单元格，可以直接从表格单元格到其他视图控制器场景创建转场连接。从主设置视图的第一个静态表格单元格按住 Control 键拖拽至新的“提前天数”表格视图控制器，并在转场选项中选择\
  \ `Push`。将新表格视图控制器的导航栏命名为**提前天数**。\n\n重复创建转场的过程，为第二个静态表格单元格创建一个推送到“通知时间”视图控制器的转场（参见\
  \ `Figure 12-6`）。\n\n![图片](img/9781430243748_Fig12-06.jpg)\n\n### `Figure 12-6.`\
  \ 从静态表格视图单元格创建转场导航\n\n至此，你应该能够构建并运行应用了：可以显示设置表格视图，并在“提前天数”和“通知时间”两个视图控制器之间导航。\n\n\
  目前，当前设置视图存在几个问题：\n\n> * 无法关闭该视图。\n> * 当用户在“通知时间”屏幕更改设置时，设置屏幕中的“提醒时间”不会更新。\n> * 表格视图的背景是透明的，但仍然需要应用自定的屏幕背景。\n\
  \n我们需要创建 `UITableViewController` 的子类来修复这些问题。\n\n在 Xcode 项目的设置 `user-interface/view-controllers`\
  \ 组中创建一个名为 `BRSettingsViewController` 的新类。从 Cocoa Touch 模板中选择 `Objective-C` 类，在下一个屏幕的“Class”文本框中输入\
  \ `BRSettingsViewController`，“Subclass”文本框中输入 `UITableViewController`。确保**不选中**“Targeted\
  \ for iPad”和“With XIB for User Interface”，然后创建新类。\n\n由于 `BRSettingsViewController`\
  \ 是 `UITableViewController` 的子类，Xcode 会自动向实现源文件添加大量表格控制委托方法。我们需要移除大部分此类代码，因为我们构建的是静态表格视图，大部分\
  \ UI 工作直接在故事板中完成。因此，打开 `BRSettingsViewController.m` 并将其精简为以下内容：\n\n```\n#import\
  \ \"BRSettingsViewController.h\"\n\n@interface BRSettingsViewController ()\n\n@end\n\
  \n@implementation BRSettingsViewController\n\n@end\n```\n\n只保留一个空的私有接口和类实现。\n\n\
  在故事板中选择主设置视图控制器。使用身份检查器将视图控制器的自定义类更改为刚创建的 `BRSettingsViewController` 类（参见 `Figure\
  \ 12-7`）。\n\n![图片](img/9781430243748_Fig12-07.jpg)\n\n### `Figure 12-7.` 在故事板中将\
  \ `BRSettingsViewController` 分配给主设置视图控制器\n\n使用助理编辑器布局，并通过按住 Control 键从单元格拖拽，为两个静态表格单元格建立插座连接：\n\
  \n```\n@property (weak, nonatomic) IBOutlet UITableViewCell *tableCellDaysBefore;\n\
  @property (weak, nonatomic) IBOutlet UITableViewCell *tableCellNotificationTime;\n\
  ```\n\n我们还要为**完成**按钮创建界面生成器操作，以关闭模态视图。要创建新操作，请按住 Control 键从“完成”按钮拖拽至 `BRSettingsViewController.h`\
  \ 头文件接口中。确保将连接类型切换为 `Action`，并将新操作命名为 `didClickDoneButton`：\n\n```\n- (IBAction)didClickDoneButton:(id)sender;\n\
  ```\n\n现在开始实现 `BRSettingsViewController.m`。`didClickDoneButton:` 的实现只是简单地调用关闭视图控制器的方法：\n\
  \n```\n- (IBAction)didClickDoneButton:(id)sender {\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n现在 `BRSettingsViewController` 可以被关闭了——构建并运行。\n\n###\
  \ 构建设置单例类\n\n我们将构建一个新的抽象数据类，通过单例实例进行访问。该设置单例为用户提供几个访问器属性和方法，用于全局生日提醒通知设置：提前多少天接收生日通知，以及这些提醒的时和分。\n\
  \n\n\n#### 用户默认设置：iOS 的 Cookies\n\n在 iOS 中存储偏好设置数据的最简单方法是使用苹果的 `NSUserDefaults`\
  \ 类。它相当于 iOS 中的 HTML Cookies。我们可以使用 `NSUserDefaults` 存储字符串和数字等数据对象类型。保存字符串的语法如下所示：\n\
  \n```\nNSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n[userDefaults\
  \ setObject:@\"Nick Kuh\" forKey:@\"name\"];\n[userDefaults synchronize];\n```\n\
  \n调用 `synchronize` 会将你的更改写入磁盘，因此如果你要保存多个属性，可以在设置完所有键值后再调用 `synchronize`。\n\n要访问并检查保存到\
  \ `NSUserDefaults` 中的属性，上述示例的代码如下：\n\n```\nNSUserDefaults *userDefaults = [NSUserDefaults\
  \ standardUserDefaults];\nNSString *name = [userDefaults objectForKey:@\"name\"\
  ];\nif (name == nil) {\n    NSLog(@\"没有保存过名字\");\n}\nelse {\n    NSLog(@\"已保存的名字:\
  \ %@\",name);\n}\n```\n\n接下来，让我们创建新的设置单例类，并将这个逻辑应用到我们的应用程序中。在 Xcode 项目的 *data* 组中，创建一个名为\
  \ `BRDSettings` 的 `NSObject` 子类。我们先从头文件开始：\n\n```\n#import <Foundation/Foundation.h>\n\
  \ntypedef enum : int {\n    BRDaysBeforeTypeOnBirthday = 0,\n    BRDaysBeforeTypeOneDay,\n\
  \    BRDaysBeforeTypeTwoDays,\n    BRDaysBeforeTypeThreeDays,\n    BRDaysBeforeTypeFiveDays,\n\
  \    BRDaysBeforeTypeOneWeek,\n    BRDaysBeforeTypeTwoWeeks,\n    BRDaysBeforeTypeThreeWeeks\n\
  }BRDaysBeforeType;\n\n#import <Foundation/Foundation.h>\n\n@interface BRDSettings\
  \ : NSObject\n\n+ (BRDSettings*)sharedInstance;\n\n@property (nonatomic) int notificationHour;\n\
  @property (nonatomic) int notificationMinute;\n@property (nonatomic) BRDaysBeforeType\
  \ daysBefore;\n\n-(NSString *) titleForNotificationTime;\n-(NSString *) titleForDaysBefore:(BRDaysBeforeType)daysBefore;\n\
  \n@end\n```\n\n就像 `BRDModel` 一样，我们将通过 `sharedInstance` 类方法提供对 `BRDSettings` 单例实例的访问。通知的小时和分钟以整数形式返回：在设置数据类的实现中，我们将检查用户是否之前设置了提醒的小时/分钟通知时间，如果没有，则返回一个默认时间——也许是上午\
  \ 9:00？\n\n我们将为用户提供一组“提前天数”选项，范围从生日当天提醒到每个生日前三周提醒。我们创建了一个自定义枚举类型，用于提供这个范围内的不同选项，而无需创建从\
  \ 0 到 21 天的选项，那样在应用中会显得杂乱。`titleForDaysBefore:` 方法会为每个选项返回一个人类可读的字符串，例如“生日当天”或“提前\
  \ 3 周”。\n\n切换到 `BRDSettings.m` 源文件，并添加我们在头文件中声明的方法和属性的实现：\n\n```\n#import \"BRDSettings.h\"\
  \n\n@implementation BRDSettings\n\nstatic BRDSettings *_sharedInstance = nil;\n\
  static NSDateFormatter *dateFormatter;\n\n@synthesize notificationHour;\n@synthesize\
  \ notificationMinute;\n\n//单例实例的访问方法\n+ (BRDSettings*)sharedInstance {\n    if(\
  \ !_sharedInstance ) {\n        _sharedInstance = [[BRDSettings alloc] init];\n\
  \    }\n    return _sharedInstance;\n}\n\n-(int) notificationHour\n{\n    //检查用户是否保存了通知小时数——如果没有，则默认为上午\
  \ 9 点\n    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
  \    NSNumber *hour = [userDefaults objectForKey:@\"notificationHour\"];\n    if\
  \ (hour == nil) {\n        return 9;\n    }\n    return [hour intValue];\n}\n\n\
  -(void) setNotificationHour:(int)notificationHourNew\n{\n    NSUserDefaults *userDefaults\
  \ = [NSUserDefaults standardUserDefaults];\n    [userDefaults setObject:[NSNumber\
  \ numberWithInt:notificationHourNew] forKey:@\"notificationHour\"];\n    [userDefaults\
  \ synchronize];\n}\n```\n\n\n```objective-c\n-(int) notificationMinute\n{\n    //检查用户是否保存了通知分钟数——如果未保存，则默认为整点\
  \ 0 分钟\n    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
  \    NSNumber *hour = [userDefaults objectForKey:@\"notificationMinute\"];\n   \
  \ if (hour == nil) {\n        return 0;\n    }\n    return [hour intValue];\n}\n\
  \n-(void) setNotificationMinute:(int)notificationMinuteNew\n{\n    NSUserDefaults\
  \ *userDefaults = [NSUserDefaults standardUserDefaults];\n    [userDefaults setObject:[NSNumber\
  \ numberWithInt:notificationMinuteNew] forKey:@\"notificationMinute\"];\n    [userDefaults\
  \ synchronize];\n}\n\n-(BRDaysBeforeType) daysBefore\n{\n    NSUserDefaults *userDefaults\
  \ = [NSUserDefaults standardUserDefaults];\n    NSNumber *daysBefore = [userDefaults\
  \ objectForKey:@\"daysBefore\"];\n    if (daysBefore == nil) {\n        return BRDaysBeforeTypeOnBirthday;\n\
  \    }\n    return [daysBefore intValue];\n}\n\n-(void) setDaysBefore:(BRDaysBeforeType)daysBeforeNew\n\
  {\n    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n \
  \   [userDefaults setObject:[NSNumber numberWithInt:daysBeforeNew] forKey:@\"daysBefore\"\
  ];\n    [userDefaults synchronize];\n}\n\n-(NSString *) titleForDaysBefore:(BRDaysBeforeType)daysBefore\n\
  {\n    switch (daysBefore) {\n        case BRDaysBeforeTypeOnBirthday:\n       \
  \     return @\"生日当天\";\n        case BRDaysBeforeTypeOneDay:\n            return\
  \ @\"1 天前\";\n        case BRDaysBeforeTypeTwoDays:\n            return @\"2 天前\"\
  ;\n        case BRDaysBeforeTypeThreeDays:\n            return @\"3 天前\";\n    \
  \    case BRDaysBeforeTypeFiveDays:\n            return @\"5 天前\";\n        case\
  \ BRDaysBeforeTypeOneWeek:\n            return @\"1 周前\";\n        case BRDaysBeforeTypeTwoWeeks:\n\
  \            return @\"2 周前\";\n        case BRDaysBeforeTypeThreeWeeks:\n     \
  \       return @\"3 周前\";\n    }\n    return @\"\";\n}\n\n-(NSString *) titleForNotificationTime\n\
  {\n    int hour = [BRDSettings sharedInstance].notificationHour;\n    int minute\
  \ = [BRDSettings sharedInstance].notificationMinute;\n\n    NSDateComponents *components\
  \ = [[NSCalendar currentCalendar] components:NSHourCalendarUnit|NSMinuteCalendarUnit\
  \ fromDate:[NSDate date]];\n\n    components.hour = hour;\n    components.minute\
  \ = minute;\n\n    NSDate *date = [[NSCalendar currentCalendar] dateFromComponents:components];\n\
  \n    if (dateFormatter == nil) {\n        //创建单个日期格式化器，用于返回 9:00 上午、2:00 下午等格式\n\
  \        dateFormatter = [[NSDateFormatter alloc] init];\n        [dateFormatter\
  \ setDateFormat:@\"h:mm a\"];\n    }\n\n    return [dateFormatter stringFromDate:date];\n\
  }\n\n@end\n```\n\n我们的 `BRDSettings` 类提供了一个易用的接口，用于在我们的应用中访问自定义用户偏好设置。现在我们不仅拥有一个能将偏好设置读取和保存到磁盘的类，它还处理了人类可读的语言，为提醒时间返回了格式友好的字符串，例如上午\
  \ 9:30 或下午 2:05 等。\n\n跳回到 `BRSettingsViewController.m`。现在我们要让两个静态设置表格单元格右侧的数值变为动态。首先，导入\
  \ `BRDSettings.h`。接下来，添加以下 `viewWillAppear:` 方法：\n\n```objective-c\n-(void) viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n\n    self.tableCellNotificationTime.detailTextLabel.text\
  \ = [[BRDSettings sharedInstance] titleForNotificationTime];\n    self.tableCellDaysBefore.detailTextLabel.text\
  \ =  [[BRDSettings sharedInstance] titleForDaysBefore:[BRDSettings sharedInstance].daysBefore];\n\
  }\n```\n\nXcode 允许我们直接访问通过 Interface Builder 连接创建的静态表格单元格。因此，在设置视图即将显示时，我们可以更新这两个静态单元格的\
  \ `detailTextLabel` 值，以反映 `BRDSettings` 单例中当前的用户设置。\n\n设置视图控制器并非我们核心视图控制器的子类，因此它不会继承\
  \ `viewDidLoad` 中添加自定义背景图片的代码。我们需要直接添加该代码以显示棋盘格背景：\n\n```objective-c\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    UIImageView *backgroundView = [[UIImageView alloc]\
  \ initWithImage:[UIImage imageNamed:@\"app-background.png\"]];\n    self.tableView.backgroundView\
  \ = backgroundView;\n}\n```\n\n设置视图控制器还将在两行表格上方显示一个风格化的奶油色标题标签“提醒事项”。我们将使用样式表类以及\
  \ `BRSettingsViewController` 实现源码中的一个新的私有方法来实现这一点。首先，导入 `BRStyleSheet.h`，然后添加以下代码：\n\
  \n```objective-c\n-(UIView *) createSectionHeaderWithLabel:(NSString *)text\n{\n\
  \    UIView *view = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 320, 40.f)];\n\
  \    UILabel *label = [[UILabel alloc] initWithFrame:CGRectMake(10.f, 15.f, 300.f,\
  \ 20.f)];\n    label.backgroundColor = [UIColor clearColor];\n    [BRStyleSheet\
  \ styleLabel:label withType:BRLabelTypeLarge];\n    label.text = text;\n    [view\
  \ addSubview:label];\n    return view;\n}\n\n- (CGFloat)tableView:(UITableView *)tableView\
  \ heightForHeaderInSection:(NSInteger)section\n{\n    return 40.f;\n}\n\n- (UIView\
  \ *)tableView:(UITableView *)tableView viewForHeaderInSection:(NSInteger)section\n\
  {\n    return [self createSectionHeaderWithLabel:@\"提醒事项\"];\n}\n```\n\n`tableView:heightForHeaderInSection:`\
  \ 和 `tableView:viewForHeaderInSection:` 是 `UITableViewDelegate` 协议中的方法，它们使我们能够为表格视图的节标题定义自定义视图和视图高度。自定义方法\
  \ `createSectionHeaderWithLabel:` 创建了一个透明视图来填充标题部分，以及一个带有透明背景的 `UILabel` 子视图。它根据传入的字符串参数设置标签文本。在模拟器中运行时，结果应类似于图\
  \ 12-8。\n\n![图片](img/9781430243748_Fig12-08.jpg)\n\n**图 12-8.** 为表格视图添加风格化的自定义标签标题\n\
  \n接下来我们完成 `BRNotificationTimeViewController.m` 的实现。首先，导入 `BRDSettings.h`，然后添加一个新的\
  \ `viewWillAppear:` 实现：\n\n```objective-c\n-(void) viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n\n    //检索存储的用户设置中的通知小时和分钟\n    int hour\
  \ = [BRDSettings sharedInstance].notificationHour;\n    int minute = [BRDSettings\
  \ sharedInstance].notificationMinute;\n\n    //使用 NSDateComponents 创建当前日期，并设置小时/分钟为存储的用户通知设置\n\
  \    NSDateComponents *components = [[NSCalendar currentCalendar] components:NSHourCalendarUnit|NSMinuteCalendarUnit\
  \ fromDate:[NSDate date]];\n    components.hour = hour;\n    components.minute =\
  \ minute;\n    //更新日期/时间选择器，使其显示与存储用户设置匹配的小时/分钟\n    self.timePicker.date = [[NSCalendar\
  \ currentCalendar] dateFromComponents:components];\n}\n```\n\n每当通知时间视图控制器出现时，它会根据存储的用户设置的生日通知提醒时间更新所显示的时间。我们现在需要确保当用户在此视图中更改时间时，我们相应地更新存储的设置。按如下方式完成\
  \ `didChangeTime:` 方法：\n\n```objective-c\n- (IBAction)didChangeTime:(id)sender {\n\
  \    NSDateComponents *components = [[NSCalendar currentCalendar] components:NSHourCalendarUnit|NSMinuteCalendarUnit\
  \ fromDate:self.timePicker.date];\n    //NSLog(@\"时间已更改为：%d:%d\",components.hour,components.minute);\n\
  \n    [BRDSettings sharedInstance].notificationHour = components.hour;\n    [BRDSettings\
  \ sharedInstance].notificationMinute = components.minute;\n}\n```\n\n\n构建并运行。你会发现，不仅更改通知提醒时间时设置会保存，而且主设置视图控制器中的时间也会更新，因为我们的设置视图控制器每次视图出现时都会更新其静态表格视图单元格。\n\
  \n为了完成*生日提醒*的设置，我们现在需要为“天数提前”视图控制器创建一个类。在项目导航器中选中 `user-interface/view-controllers`\
  \ 这个 Xcode 组，然后创建一个新的 Objective-C 类，命名为 `BRDaysBeforeViewController`，它应继承自 Apple\
  \ 的 `UITableViewController`。在你的故事板中，选中“天数提前”表格视图控制器，然后使用标识检查器，将自定义类改为你的新 `BRDaysBeforeViewController`\
  \ 类。\n\n当我们处理故事板时，选中“天数提前”场景的原型表格单元格，将其样式改为 Basic，并将其复用标识符设置为 `Cell`。最后，选中表格视图，将其样式改为\
  \ Grouped。\n\n清空所有 Xcode 的存根代码，并将其替换为以下带有注释的 `BRDaysBeforeViewController.m` 实现：\n\
  \n```\n#import \"BRDaysBeforeViewController.h\"\n#import \"BRDSettings.h\"\n\n@implementation\
  \ BRDaysBeforeViewController\n\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    UIImageView *backgroundView = [[UIImageView alloc] initWithImage:[UIImage\n\
  imageNamed:@\"app-background.png\"]];\n    [self.tableView setBackgroundView:backgroundView];\n\
  }\n\n#pragma mark - UITableViewDataSource\n\n-(UITableViewCell *) tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath\n*)indexPath\n{\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\"];\n    cell.textLabel.text\
  \ = [[BRDSettings sharedInstance] titleForDaysBefore:indexPath.row];\n    // 如果当前索引路径的行是存储的天数提前设置，则在表格单元格中显示勾选标记\n\
  \    cell.accessoryType = ([BRDSettings sharedInstance].daysBefore == indexPath.row)\
  \ ? UITableViewCellAccessoryCheckmark : UITableViewCellAccessoryNone;\n    return\
  \ cell;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    // 我们也可以直接返回总行数 8，但这利用了最后一个枚举值来获取总数\n    return BRDaysBeforeTypeThreeWeeks\
  \ + 1;\n}\n\n#pragma mark - UITableViewDelegate\n\n- (void)tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n\n    if (indexPath.row\
  \ == [BRDSettings sharedInstance].daysBefore) {\n        // 如果它是当前勾选的行，则忽略\n   \
  \     [tableView deselectRowAtIndexPath:indexPath animated:YES];\n        return;\n\
  \    }\n\n    NSIndexPath *oldIndexPath = [NSIndexPath indexPathForRow:[BRDSettings\
  \ sharedInstance].daysBefore inSection:0];\n    // 为用户更新存储的天数提前设置\n    [BRDSettings\
  \ sharedInstance].daysBefore = indexPath.row;\n    // 用户更改了选中的天数提前行，因此我们需要重新加载旧行和新行的表格单元格\n\
  \    [tableView reloadRowsAtIndexPaths:@[oldIndexPath,indexPath] withRowAnimation:UITableViewRowAnimationNone];\n\
  }\n\n@end\n```\n\n构建并运行。你应该能够修改“天数提前”设置，并再次看到更改反映在主设置屏幕上，如图 12-9 所示。\n\n![Image](img/9781430243748_Fig12-09.jpg)\n\
  \n**图 12-9.** 用户控制的天数提前设置\n\n### 更新生日\n\n我们再次将注意力转向应用的数据模型。目前，我们在生日实体中存储了两个不会随时间保持不变的持久化属性：`nextBirthday`\
  \ 和 `nextBirthdayAge`。因此，在应用完成之前，我们需要解决的一个任务是，当 `nextBirthday` 属性过期并变成朋友的上一个生日时，定期更新任何缓存的生日！\n\
  \n我们将在模型单例中创建一个公开方法，用于遍历生日实体数据库，更新任何过期的 `nextBirthday` 值。\n\n在 Xcode 中打开 `BRDModel.h`，并将新的公开方法声明添加到接口中：\n\
  \n`-(void) updateCachedBirthdays;`\n\n每次更新缓存的生日时，我们还会分发一个通知，以便当下次生日的顺序发生变化时，任何视图控制器都能更新其视图。在\
  \ `BRDModel.h` 的顶部、接口声明之上，为此通知名称添加一个新的常量字符串声明：\n\n`#define BRNotificationCachedBirthdaysDidUpdate\
  \ @\"BRNotificationCachedBirthdaysDidUpdate\"`\n\n切换到 `BRDModel.m` 实现，并添加以下生日实体更新代码\
  \ `updateCachedBirthdays`：\n\n```\n-(void) updateCachedBirthdays\n{\n\n    NSFetchRequest\
  \ *fetchRequest = [[NSFetchRequest alloc] init];\n\n    NSManagedObjectContext *context\
  \ = self.managedObjectContext;\n\n    NSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"BRDBirthday\" inManagedObjectContext:context];\n    fetchRequest.entity\
  \ = entity;\n\n    // 按下一次生日的顺序获取所有生日实体\n    NSSortDescriptor *sortDescriptor =\
  \ [[NSSortDescriptor alloc] initWithKey:@\"nextBirthday\" ascending:YES];\n    NSArray\
  \ *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor, nil];\n  \
  \  fetchRequest.sortDescriptors = sortDescriptors;\n\n    NSFetchedResultsController\
  \ *fetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\
  \ managedObjectContext:context sectionNameKeyPath:nil cacheName:nil];\n\n    NSError\
  \ *error = nil;\n    if (![fetchedResultsController performFetch:&error]) {\n\n\
  \        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n       \
  \ abort();\n    }\n\n    NSArray *fetchedObjects = fetchedResultsController.fetchedObjects;\n\
  \    NSInteger resultCount = [fetchedObjects count];\n\n    BRDBirthday *birthday;\n\
  \n    NSDate *now = [NSDate date];\n    NSDateComponents *dateComponentsToday =\
  \ [[NSCalendar currentCalendar] components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:now];\n    // 这会创建一个时间为今天 00:00 的日期\n    NSDate *today = [[NSCalendar\
  \ currentCalendar] dateFromComponents:dateComponentsToday];\n\n    for (int i =\
  \ 0; i < resultCount; i++) {\n        birthday = (BRDBirthday *) fetchedObjects[i];\n\
  \        // 如果下一次生日已经过去，那么我们需要更新生日实体\n        if ([today compare:birthday.nextBirthday]\
  \ == NSOrderedDescending) {\n            // 下一次生日现在不正确，并且已经过去了...\n            [birthday\
  \ updateNextBirthdayAndAge];\n        }\n    }\n\n    [self saveChanges];\n\n  \
  \  // 让所有观察者知道我们数据库中的生日已更新\n    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationCachedBirthdaysDidUpdate\
  \ object:self userInfo:nil];\n}\n```\n\n该方法首先从缓存存储中检索所有 Core Data 生日实体。结果集按 `nextBirthday`\
  \ 属性排序。我们遍历结果集，并将 `nextBirthday` 值与今天日期的午夜时间进行比较。如果下一次生日现在是用户最近的生日，那么我们在过期的生日实体上调用\
  \ `updateNextBirthdayAndAge`，它会相应地更新自身。\n\n\n\n"
- "# 排版后\n\n我们应在何时何地调用新的 `updateCachedBirthdays` 方法？至少，每次用户将 *Birthday Reminder* 应用带到前台时都应调用它。也就是说，每当我们的应用成为活跃的多任务应用，或者用户重新启动应用时，都需要调用。应用可能在后台停留数天甚至数周（具体取决于其内存占用），因此我们需要应对这种情况。\n\
  \n打开 `BRAppDelegate.m` 源文件。首先导入 `BRDModel.h`，然后修改 `applicationDidBecomeActive:`\
  \ 方法如下：\n\n```\n- (void)applicationDidBecomeActive:(UIApplication *)application\n\
  {\n    [[BRDModel sharedInstance] updateCachedBirthdays];\n}\n```\n\n当缓存更新时，如果我们的主页视图控制器（Home\
  \ view controller）的表格视图当前处于最前，则需要更新它。每次最近的生日过去时，有序的生日表格就会发生变化。那个已经过去的生日需要被更新，并移动到表格的末尾，成为最远（即最后一个）生日。我们通过观察\
  \ `BRNotificationCachedBirthdaysDidUpdate` 通知来处理这种情况，并简单地重新加载主页屏幕上的表格视图。打开 `BRHomeViewController.m`，并添加以下高亮显示的代码更改：\n\
  \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    [self.tableView reloadData];\n    self.hasFriends = [self.fetchedResultsController.fetchedObjects\
  \ count] > 0;\n    [[NSNotificationCenter defaultCenter] addObserver:self\n    \
  \                                         selector:@selector(handleCachedBirthdaysDidUpdate:)\n\
  \                                                 name:BRNotificationCachedBirthdaysDidUpdate\
  \ object:nil];\n}\n\n-(void) viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
  \    [[NSNotificationCenter defaultCenter] removeObserver:self name:BRNotificationCachedBirthdaysDidUpdate\
  \ object:nil];\n}\n\n-(void) handleCachedBirthdaysDidUpdate:(NSNotification *)notification\n\
  {\n    //如果缓存更新，只需重新加载表格视图\n    [self.tableView reloadData];\n}\n```\n\n我们只需要在主页视图控制器已经显示时处理缓存更新通知，因为我们的主页表格视图在现有\
  \ `viewWillAppear:` 方法中每次即将出现时都会重新加载。因此，我们在主页视图控制器出现时将其添加为 `BRNotificationCachedBirthdaysDidUpdate`\
  \ 通知的观察者，并在其消失时移除观察者。\n\n此时检查一下，确保应用仍能正常编译。任何之前缓存的、*下一个生日* 已过去的生日应该会被更新，并且主页视图控制器现在会将它们移动到表格底部。\n\
  \n### 调度和触发提醒本地通知\n\n我们还将为即将到来的最近几个生日实现调度的本地通知提醒。在 iOS 中，本地通知的显示方式与推送通知相同：即使我们的应用未运行，操作系统也会触发它们（请参见\
  \ 图 12-10）。\n\n![Image](img/9781430243748_Fig12-10.jpg)\n\n**图 12-10.** 一个调度的本地通知\n\
  \niOS 允许每个第三方应用最多调度 64 个本地通知。如果超过此限制，额外的通知将被忽略。对我们来说，64 个生日提醒绰绰有余；事实上，20 个应该就足够了。只要我们有规律地重置并重新调度最近的\
  \ 20 个生日，就足以让 *Birthday Reminder* 实现其核心提醒功能。\n\n与推送通知一样，本地通知在触发时可以播放自定义声音。我实际上使用苹果的\
  \ Garage Band 软件创建了一个 `HappyBirthday.m4a` 声音文件。至少可以说它有点业余——但也挺有趣的。![Image](img/smile.jpg)\
  \ 将 `HappyBirthday.m4a` 文件添加到你的项目资源中，你可以在本章的资源文件中找到它。\n\n稍后，我们将扩展模型单例中新的 `updateCachedBirthdays`\
  \ 方法的代码，以调度接下来的 20 个生日提醒。在此之前，我们将为 `BRDSettings` 类添加几个辅助方法，用于两个目的：\n\n> *   根据用户偏好计算生日的提醒日期/时间。\n\
  > *   根据提醒日期与朋友下一个生日之间的差异，配置提醒的通知文本。\n\n打开 `BRDSettings.h`，并向其头文件添加以下修改：\n\n```\n\
  @class BRDBirthday;\n\n@interface BRDSettings : NSObject\n\n+ (BRDSettings*)sharedInstance;\n\
  \n@property (nonatomic) int notificationHour;\n@property (nonatomic) int notificationMinute;\n\
  @property (nonatomic) BRDaysBeforeType daysBefore;\n\n-(NSString *) titleForNotificationTime;\n\
  -(NSString *) titleForDaysBefore:(BRDaysBeforeType)daysBefore;\n\n-(NSDate *) reminderDateForNextBirthday:(NSDate\
  \ *)nextBirthday;\n-(NSString *) reminderTextForNextBirthday:(BRDBirthday *)birthday;\n\
  \n@end\n```\n\n我们为 `BRDBirthday` 实体类添加了一个向前类声明，以便能够在新的 `reminderTextForNextBirthday:`\
  \ 方法中引用生日实体。切换到这两个新公共方法的实现。在 `BRDSettings.m` 中，导入 `BRDBirthday.h`，然后实现 `reminderDateForNextBirthday:`\
  \ 方法，注释如下：\n\n```\n-(NSDate *) reminderDateForNextBirthday:(NSDate *)nextBirthday\n\
  {\n    NSTimeInterval timeInterval;\n    NSTimeInterval secondsInOneDay = 60.f *\
  \ 60.f * 24.f;\n\n    // 计算应从朋友的下一个生日中减去多少天，以得到提醒日期\n    switch (self.daysBefore)\
  \ {\n        case BRDaysBeforeTypeOnBirthday:\n            timeInterval = 0.f;\n\
  \            break;\n        case BRDaysBeforeTypeOneDay:\n            timeInterval\
  \ = secondsInOneDay;\n            break;\n        case BRDaysBeforeTypeTwoDays:\n\
  \            timeInterval = secondsInOneDay * 2.f;\n            break;\n       \
  \ case BRDaysBeforeTypeThreeDays:\n            timeInterval = secondsInOneDay *\
  \ 3.f;\n            break;\n        case BRDaysBeforeTypeFiveDays:\n           \
  \ timeInterval = secondsInOneDay * 5.f;\n            break;\n        case BRDaysBeforeTypeOneWeek:\n\
  \            timeInterval = secondsInOneDay * 7.f;\n            break;\n       \
  \ case BRDaysBeforeTypeTwoWeeks:\n            timeInterval = secondsInOneDay * 14.f;\n\
  \            break;\n        case BRDaysBeforeTypeThreeWeeks:\n            timeInterval\
  \ = secondsInOneDay * 21.f;\n            break;\n    }\n\n    // 这将创建时间为 00:00 的提醒日期\n\
  \    NSDate *reminderDate = [nextBirthday dateByAddingTimeInterval:-timeInterval];\n\
  ```\n\n\n```objectivec\nNSDateComponents *components = [[NSCalendar currentCalendar]\
  \ components:NSYearCalendarUnit\n| NSMonthCalendarUnit | NSDayCalendarUnit | NSHourCalendarUnit\
  \ | NSMinuteCalendarUnit\nfromDate:reminderDate];\n\n// 更新提醒时间的小时和分钟\ncomponents.hour\
  \ = self.notificationHour;\ncomponents.minute = self.notificationMinute;\n\nreturn\
  \ [[NSCalendar currentCalendar] dateFromComponents:components];\n```\n\n例如，如果生日是\
  \ 6 月 5 日星期二，而用户设置的提前提醒天数为一天，提醒时间为上午 9:00，那么此方法将返回 6 月 4 日星期一上午 9:00 的日期，以便模型类可以据此安排提醒日期/时间。\n\
  \n接下来，让我们添加 `reminderTextForNextBirthday:` 的实现，该方法返回生日提醒消息，用于我们即将安排的本地通知：\n\n```objectivec\n\
  -(NSString *) reminderTextForNextBirthday:(BRDBirthday *)birthday\n{\n    NSString\
  \ *text;\n\n    if ([birthday.nextBirthdayAge intValue] > 0)\n    {\n        if\
  \ (self.daysBefore == BRDaysBeforeTypeOnBirthday) {\n            // 如果朋友的生日与提醒日期相同，例如“Joe\
  \ 今天 30 岁”\n            text = [NSString stringWithFormat:@\"%@ 是 %@ \",birthday.name,birthday.nextBirthdayAge];\n\
  \        }\n        else {\n            // 提醒在生日之前，例如“Joe 明天将 30 岁”\n          \
  \  text = [NSString stringWithFormat:@\"%@ 将 %@ \",birthday.name,birthday.nextBirthdayAge];\n\
  \        }\n    }\n    else {\n        text = [NSString stringWithFormat:@\"今天是\
  \ %@ 的生日 \",birthday.name];\n    }\n\n    switch (self.daysBefore) {\n        case\
  \ BRDaysBeforeTypeOnBirthday:\n            return [text stringByAppendingFormat:@\"\
  今天！\"];\n        case BRDaysBeforeTypeOneDay:\n            return [text stringByAppendingFormat:@\"\
  明天！\"];\n        case BRDaysBeforeTypeTwoDays:\n            return [text stringByAppendingFormat:@\"\
  两天后！\"];\n        case BRDaysBeforeTypeThreeDays:\n            return [text stringByAppendingFormat:@\"\
  三天后！\"];\n        case BRDaysBeforeTypeFiveDays:\n            return [text stringByAppendingFormat:@\"\
  五天后！\"];\n        case BRDaysBeforeTypeOneWeek:\n            return [text stringByAppendingFormat:@\"\
  一周后！\"];\n        case BRDaysBeforeTypeTwoWeeks:\n            return [text stringByAppendingFormat:@\"\
  两周后！\"];\n        case BRDaysBeforeTypeThreeWeeks:\n            return [text stringByAppendingFormat:@\"\
  三周后！\"];\n    }\n\n    return @\"\";\n}\n```\n\n回到 `BRDModel.m`。首先导入 `BRDSettings.h`。我们将修改\
  \ `updateCachedBirthdays`，以安排前 20 个提醒通知。由于此方法会定期运行，我们需要小心避免创建重复的本地通知。确保不会发生这种情况的最简单方法是，在\
  \ `updateCachedBirthdays` 方法开头先清除所有先前安排的本地通知：\n\n```objectivec\n[[UIApplication\
  \ sharedApplication] cancelAllLocalNotifications];\n```\n\n现在，为接下来最近的 20 个生日安排提醒通知。向下滚动到\
  \ `updateCachedBirthdays` 方法的后半部分，并添加以下高亮显示的更改：\n\n```objectivec\n    NSDate *now\
  \ = [NSDate date];\n    NSDateComponents *dateComponentsToday = [[NSCalendar currentCalendar]\
  \ components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit fromDate:now];\n\
  \    // 这将创建一个时间为今天 00:00 的日期\n    NSDate *today = [[NSCalendar currentCalendar]\
  \ dateFromComponents:dateComponentsToday];\n    UILocalNotification *reminderNotification;\n\
  \    int scheduled = 0;\n    NSDate *fireDate;\n\n    for (int i = 0; i < resultCount;\
  \ i++) {\n        birthday = (BRDBirthday *) fetchedObjects[i];\n\n        // 如果下一个生日已过去，则需要更新生日实体\n\
  \        if ([today compare:birthday.nextBirthday] == NSOrderedDescending) {\n \
  \           // 下一个生日现在不正确，且已过去...\n            [birthday updateNextBirthdayAndAge];\n\
  \        }\n\n        if (scheduled < 20) {\n            // 从设置中获取此生日的计划提醒日期\n \
  \           fireDate = [[BRDSettings sharedInstance] reminderDateForNextBirthday:birthday.nextBirthday];\n\
  \            if([now compare:fireDate] != NSOrderedAscending) {\n              \
  \  // 此提醒原定于今天，但提醒时间已过 - 不安排提醒！\n            }\n            else {\n           \
  \     // 创建新的本地通知进行安排\n                reminderNotification = [[UILocalNotification\
  \ alloc] init];\n                // 设置计划的提醒日期\n                reminderNotification.fireDate\
  \ = fireDate;\n                reminderNotification.timeZone = [NSTimeZone defaultTimeZone];\n\
  \                reminderNotification.alertAction = @\"查看生日\";\n               \
  \ reminderNotification.alertBody = [[BRDSettings sharedInstance] reminderTextForNextBirthday:birthday];\n\
  \                // 为本地通知播放自定义声音\n                reminderNotification.soundName\
  \ = @\"HappyBirthday.m4a\";\n                // 更新生日提醒图标上的标记数\n                reminderNotification.applicationIconBadgeNumber\
  \ = 1;\n                // 安排通知！\n                [[UIApplication sharedApplication]\
  \ scheduleLocalNotification:reminderNotification];\n                scheduled++;\n\
  \n            }\n        }\n    }\n\n    [self saveChanges];\n\n    // 通知所有观察者数据库中的生日已更新\n\
  \    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationCachedBirthdaysDidUpdate\
  \ object:self userInfo:nil];\n```\n\n我们从最近即将到来的 20 个生日中生成最多 20 个计划的 `UILocalNotification`\
  \ 实例。想象一个场景：生日是今天，但通知的计划日期已过；也就是说，用户希望在每位朋友生日当天上午 9:00 收到提醒——而现在是上午 10:00。我们不希望为这些已过期的生日安排通知，因此我们将触发日期与\
  \ `now` 日期变量进行比较：\n\n```objectivec\nif([now compare:fireDate] != NSOrderedAscending)\
  \ {\n                // 此提醒原定于今天，但提醒时间已过 - 不安排提醒！\n            }\n```\n\n至于创建 `UILocalNotification`\
  \ 实例，我们设置了通知日期（`fireDate`）、通知文本（`alertBody`）、*生日提醒*主屏幕图标标记上显示的数字，以及通知触发时播放的自定义生日快乐声音。\n\
  \n应用已在每次启动或返回前台时调用 `[[BRDModel sharedInstance] updateCachedBirthdays]`。然而，在其他情况下，我们也需要更新计划的提醒：\n\
  \n> *   当用户点击“完成”并关闭设置屏幕时，因为他们可能更新了生日提醒时间偏好。\n> *   当用户完成导入生日过程时，因为数据库中现在有了新生日。\n\
  > *   当用户编辑并保存生日时，因为他们可能修改了朋友的生日。\n\n现在让我们在 `updateCachedBirthdays` 中添加这些调用：\n\n\
  在 `BRDModel.m` 中，在 `importBirthdays:` 实现的末尾添加以下最后一行代码：\n\n`[self updateCachedBirthdays];`\n\
  \n打开 `BRSettingsViewController.m`，导入 `BRDModel.h`，并修改 `didClickDoneButton:` 实现：\n\
  \n\n`- (IBAction)didClickDoneButton:(id)sender {`\n```\n    [[BRDModel sharedInstance]\
  \ updateCachedBirthdays];\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
  }\n```\n\n在设置界面点击“完成”时调用`updateCachedBirthdays`的逻辑是：如果用户更改了生日通知的提醒时间或提前天数，那么这些更改会在他们关闭主设置界面后立即应用到日程提醒中。\n\
  \n打开`BRBirthdayEditViewController.m`，对`saveAndDismiss:`方法进行如下修改：\n\n`- (IBAction)saveAndDismiss:(id)sender`\n\
  `{`\n`    [[BRDModel sharedInstance] saveChanges];`\n```\n    [[BRDModel sharedInstance]\
  \ updateCachedBirthdays];\n```\n`    [super saveAndDismiss:sender];`\n`}`\n\n###\
  \ 重置应用角标\n\n在你的设备上，你可以通过手动添加或从 Facebook、通讯录导入几个生日来测试通知提醒。例如，如果下一个朋友的生日是明天，那么将“提前天数”设置为\
  \ 1 天，并将提醒时间设置为从现在起 5 到 10 分钟后。如果一切正常，在第一个测试生日提醒通知触发后，你会看到*生日提醒*应用图标上显示一个未读角标数字\
  \ 1，如图 12-11 所示。\n\n![图片](img/9781430243748_Fig12-11.jpg)\n\n**图 12-11.** 主屏幕图标上的角标\n\
  \n唯一的问题是，即使你进入*生日提醒*应用，角标也不会消失。这个问题很容易解决。打开`BRAppDelegate.m`，将`applicationDidBecomeActive:`的实现修改为以下内容：\n\
  \n`- (void)applicationDidBecomeActive:(UIApplication *)application`\n`{`\n```\n\
  \    //重置应用角标计数\n    [[UIApplication sharedApplication] setApplicationIconBadgeNumber:0];\n\
  \    [[BRDModel sharedInstance] updateCachedBirthdays];\n}\n```\n\n现在，每当应用启动时，主屏幕上的角标就会被重置。搞定！\n\
  \n### 总结\n\n恭喜！你已经构建了你的第一个 iPhone 应用！虽然才到第四天结束，但我们已经拥有一个功能完备的*生日提醒*应用了。在本章中，我们学习了如何在\
  \ iOS 中安排本地通知提醒，即使应用未运行也能显示。从用户角度来看，本地通知在外观和功能上都与推送通知完全相同。\n\n我们还创建了一个应用内设置界面，让用户能够控制何时接收生日提醒通知。\n\
  \n但是等等，这本书不是教你如何在五天内（而不是四天！）构建一个 iPhone 应用吗？没错，Daniel 同学。虽然我们已经构建了一个应用，但作为 iPhone\
  \ 开发者的工作并未就此结束。如果我们想在 App Store 数十万款 iPhone 应用中被用户发现，就必须非常认真地考虑市场推广策略。\n\n明天我们将专注于如何通过应用内营销来推广我们的新\
  \ iPhone 应用，赋予*生日提醒*用户通过社交网络传播我们应用的能力。我们还会直接在应用内鼓励用户提供良好的 App Store 评价和评分。这需要我们在向苹果提交应用之前进行额外的工作。我们还将学习\
  \ iTunes Connect 的提交流程，以及如何确保我们的应用在 App Store 中有最大的被发现机会！\n\n明天见，我的朋友。在此与你道别，*再会*。\n\
  \n![图片](img/ch.jpg)\n\n"
