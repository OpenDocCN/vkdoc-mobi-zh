  \ Objective-C 吧！\n\n![Image](img/ch.jpg)\n\n## 第 4 章\n\n## Objective-C 和 Xcode：开发一个二十一点游戏\n\
  \n在本章中，你将学习 Objective-C！按照本书的实践性特点，你将边做边学，构建一个实现 MVC（模型-视图-控制器）范式的面向对象二十一点游戏。\n\n\
  这里的目标是熟悉 Objective-C 的结构和语法：如何创建类；方法语法；指针和基本类型——以及更多内容。\n\n\n\n### 游戏规则\n\n我们将构建一个简化版的二十一点游戏，因此有以下几点说明：\n\
  \n> * 玩家在游戏中只有两个选项：停牌或拿牌。\n> * 不涉及下注（抱歉！）。\n> * 我们将实现每位玩家最多持有五张牌的上限。\n\n#### 游戏玩法\n\
  \n对于不熟悉该游戏的读者，二十一点是一种玩家与庄家对战的纸牌游戏。\n\n游戏的目标是让手中的牌点数尽可能接近 21 点。\n\n你必须击败庄家才能获胜。游戏结束时，如果你的点数与庄家相同或更少，则你输（这是我们即将构建的版本）。\n\
  \n如果你手中的牌点数超过 21 点，则爆牌——你也输了。\n\n游戏开始时，每位玩家和庄家各发两张牌：即底牌。你可以看到自己的两张底牌。在某些游戏版本中，你只能看到庄家的一张牌，而看不到另一张，这样你就能对庄家手牌的强弱有所了解。这正是我们将要构建的版本。\n\
  \n在二十一点中，每张牌都有相应的点数，具体如下：\n\n> * *A 牌*：可以是 11 点或 1 点，以不爆牌为前提，取更有利于你的分数\n> * *人头牌（J、Q、K）*：均为\
  \ 10 点\n> * *其他牌*：按牌面数字计算\n\n所有决策都必须在庄家之前完成。你需要反复决定是“拿牌”——从牌堆中再拿一张牌加入手牌，还是“停牌”——当你对手牌满意时（即你认为点数已接近\
  \ 21 点且愿意承担风险），轮到庄家行动。庄家打出自己的手牌，只需点数不低于你的牌即可获胜。\n\n游戏还有其他规则，但我想现有内容已足够构建一个出色的演示应用。\n\
  \n准备开始了吗？首先，从第 4 章的源文件中复制一份起始代码项目文件夹，作为你的工作基础。\n\n你会发现我已经为我们的项目嵌入了图片和图标资源。按照第 3\
  \ 章的做法，我选择了“单视图应用程序”模板作为本项目的起点。\n\n我们的二十一点游戏中只有一个视图和视图控制器，因此请选择主故事板文件，我们开始构建视图。\n\
  \n### 创建视图\n\n在二十一点游戏开发的第一阶段，我们将学习如何在 Xcode 中创建基本的用户界面：包括如何在视图中添加和配置按钮、标签和图片，以及如何建立到这些子视图的连接，以便在运行时通过代码控制它们。\n\
  \n#### 设置视图的背景颜色\n\n打开二十一点项目的故事板文件，并确保文档大纲窗格可见；这在处理用户界面时能更简单、更精确地选择视图。\n\n使用大纲检查器，选择故事板中的主视图，然后通过属性检查器将背景颜色更改为合适的二十一点绿色，如图\
  \ 4-1 所示。\n\n![图片](img/9781430243748_Fig04-01.jpg)\n\n**图 4-1. 设置视图的背景颜色**\n\n####\
  \ 添加标签、图片和按钮\n\n接下来，从对象库中拖拽两个标签视图（`UILabel`）到主视图上：一个显示在庄家牌的上方，另一个显示在玩家牌的上方（参见图 4-2）。\n\
  \n再次使用属性检查器，将标签的字体和字号更改为系统粗体/17 磅，并分别输入文本**庄家**和**玩家**。\n\n![图片](img/9781430243748_Fig04-02.jpg)\n\
  \n**图 4-2. 添加标签视图（`UILabel`）**\n\n现在，将一个图片视图（`UIImageView`）拖拽到主视图上。使用大小检查器，将图片视图的尺寸设置为\
  \ 118×176 磅。这些是我已添加到二十一点项目中的牌面与牌背图片资源的固定尺寸（我同时添加了非视网膜版本（118×176 像素）和视网膜版本（236×352\
  \ 像素））。\n\n在编辑器中保持图片视图被选中状态，切换回属性检查器，选择`card-back.png`图片资源来设置图片视图的图片属性（参见图 4-3）。\n\
  \n![图片](img/9781430243748_Fig04-03.jpg)\n\n**图 4-3. 添加图片视图（`UIImageView`）并设置其图片属性**\n\
  \n*提示：选择* `card-back.png` *而非* `card-back@2x.png`，*iOS SDK 会自动在视网膜设备上使用* `card-back@2x.png`，*在非视网膜设备（如\
  \ iPhone 3GS）上使用* `card-back.png`。\n\n在编辑器中选中牌面图片视图后，创建九个额外的副本：![图片](img/U002.jpg)⌘D\
  \ 或 编辑 ![图片](img/U001.jpg) 复制。将这些牌分层排列成两手牌，每手五张，每手牌从左到右叠放（参见图 4-4）。要调整牌的叠放次序，请使用\
  \ 编辑 ![图片](img/U001.jpg) 排列 ![图片](img/U001.jpg) 置于顶层。\n\n从对象库中拖拽两个圆角矩形按钮（`UIButton`）到主视图上。\n\
  \n*提示：在对象库中，* `UIButton` *被令人困惑地命名为“Round Rect button”。然而，这* 就是 *iOS 的主要按钮组件，它也可以用于带有图形皮肤图片的自定义按钮。*\n\
  \n按照图 4-4 所示，调整每个按钮的大小、位置并输入标题。\n\n![图片](img/9781430243748_Fig04-04.jpg)\n\n**图\
  \ 4-4. 最终视图布局**\n\n你现在应该得到了一个类似图 4-4 的最终视图布局。\n\n我们已在故事板的主视图中添加了标签、图片视图和按钮。在 iOS\
  \ 中，每个视图或屏幕由一个视图控制器类实例控制。我们二十一点主视图的视图控制器是项目中`BJViewController`类的一个实例。目前，我们尚未对视图控制器本身进行任何修改：这个视图控制器对这些新添加的子视图一无所知。\n\
  \n\n\n#### 输出口：连接视图\n\n为了澄清这一点，视图和视图控制器不是同一个东西。视图控制器拥有视图。用 MVC 术语来说，视图控制器是控制器，而视图正如你所料，就是视图本身！\n\
  \n视图不应该知晓其所属的视图控制器，而视图控制器则可以根据需要，对其拥有的视图了解或多或少的信息。\n\n在我们的二十一点应用中，需要保留对所有牌和按钮的引用。我们将要隐藏和显示牌，并更改每张牌关联的图片，以模拟发牌过程。保留对\
  \ `Hit` 和 `Stand` 按钮的引用，可以让我们开启或关闭用户交互。例如，当轮到庄家时，我们不想让玩家能够点击 `Hit` 或 `Stand` 按钮。\n\
  \n那么，我们如何将视图与其视图控制器连接起来呢？\n\n首先，同时查看故事板和 `BJViewController` 类会很有帮助。Xcode 通过分割编辑器面板实现了这一点。在\
  \ Xcode 工具栏的右侧，切换选中的 Editor 选项，选择 Assistant Editor。这将使编辑器布局变为分割面板。如果右侧跳转栏尚未设置为 `Automatic`，请选择此选项。Xcode\
  \ 现在应该会自动选择定义 `BJViewController` 类公共接口的头文件（参见图 4-5）。\n\n你也可以通过 Editor 按钮旁边的 View\
  \ 切换按钮，修改 Xcode 的视图布局，并隐藏 Navigator、Inspector 和 Debug 区域。\n\n这样一来，你会得到一个更适合连接视图和视图控制器的工作区布局，如图\
  \ 4-5 所示。\n\n![Image](img/9781430243748_Fig04-05.jpg)\n\n**图 4-5.** 在视图和视图控制器之间\
  \ Ctrl+拖动以创建输出口和操作连接\n\n回到正题：我们想在 `BJViewController` 中为视图里的每张牌图片视图以及 `Hit` 和 `Stand`\
  \ 按钮创建引用。为此，我们将从每个图片视图和按钮 Ctrl+拖动到视图控制器接口，如图 4-5 所示。起初这看起来有点奇怪，但一旦你习惯了这个过程，就会发现它非常酷。释放鼠标时，Xcode\
  \ 会提供选项，让你在 `BJViewController` 中创建一个输出口。假设你从第一张庄家牌拖出，将输出口命名为 `dealerCard1`（参见图 4-6）。确保\
  \ Storage 设置为 `Weak`，然后点击 Connect。\n\n![Image](img/9781430243748_Fig04-06.jpg)\n\
  \n**图 4-6.** 在视图和视图控制器之间 Ctrl+拖动以创建输出口和操作连接\n\nXcode 会自动在 `BJViewController` 头文件中为我们的新输出口生成以下\
  \ Objective-C 代码：\n\n```\n@property (weak, nonatomic) IBOutlet UIImageView *dealerCard1;\n\
  ```\n\n对其余的庄家牌图片视图重复此过程，将输出口命名为 `dealerCard1`、`dealerCard2`，依此类推。然后对玩家牌重复相同操作，同样将它们命名为\
  \ `playerCard1`、`playerCard2`，等等。\n\n现在为 `Stand` 和 `Hit` 按钮创建输出口，分别命名为 `standButton`\
  \ 和 `hitButton`。`BJViewController.h` 接口中生成的代码最终应如下所示：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface BJViewController : UIViewController\n\n@property (weak, nonatomic)\
  \ IBOutlet UIImageView *dealerCard1;\n@property (weak, nonatomic) IBOutlet UIImageView\
  \ *dealerCard2;\n@property (weak, nonatomic) IBOutlet UIImageView *dealerCard3;\n\
  @property (weak, nonatomic) IBOutlet UIImageView *dealerCard4;\n@property (weak,\
  \ nonatomic) IBOutlet UIImageView *dealerCard5;\n\n@property (weak, nonatomic) IBOutlet\
  \ UIImageView *playerCard1;\n@property (weak, nonatomic) IBOutlet UIImageView *playerCard2;\n\
  @property (weak, nonatomic) IBOutlet UIImageView *playerCard3;\n@property (weak,\
  \ nonatomic) IBOutlet UIImageView *playerCard4;\n@property (weak, nonatomic) IBOutlet\
  \ UIImageView *playerCard5;\n\n@property (weak, nonatomic) IBOutlet UIButton *standButton;\n\
  @property (weak, nonatomic) IBOutlet UIButton *hitButton;\n\n@end\n```\n\n#### 操作：响应控件\n\
  \n我们已经创建了对所有牌图片视图和按钮的引用，现在可以在 `BJViewController` 实现文件的代码中，在运行时访问和控制它们的属性：设置图片视图的图片属性和可见性，以及启用和禁用按钮。\n\
  \n有没有注意到我们还遗漏了什么？我们的视图控制器类将如何捕获按钮点击事件？\n\n我们只在视图控制器和视图之间指定了一个方向的输出口。因此，视图并不知道其所属的视图控制器。我们的视图控制器类需要知道用户何时点击了\
  \ `Stand` 或 `Hit` 按钮。\n\n按钮是控件。`UIButton` 不仅继承自 `UIView`，而且像 iOS SDK 中所有其他用户界面控件一样，`UIButton`\
  \ 直接继承自 `UIControl`。因为 Xcode 将 `UIButton` 的实例识别为 `UIControl` 的子类，所以它会自动为我们提供一个额外的连接类型：`Action`。\n\
  \n用于处理用户交互事件并将其从用户界面控件传递给任何 Objective-C 类类型方法的机制，称为目标-动作。当按钮被点击时，点击事件可以传递给一个方法。我们将在视图控制器中创建两个新方法，它们将响应\
  \ `Hit` 或 `Stand` 按钮的 `Touch Up Inside` 事件而被触发。`Touch Up Inside` 事件在用户触摸控件并在其上抬起手指时触发。这相当于计算机上的鼠标弹起事件。\n\
  \nXcode 可以使用与创建输出口时类似的 Ctrl+拖动过程，自动生成目标-动作代码。从每个按钮 Ctrl+拖动到 `BJViewController.h`\
  \ 接口，但将连接类型更改为 `Action`，确保 `Touch Up Inside` 是选中的事件类型，然后重复此过程，在你的视图控制器接口头文件中创建以下两个操作方法处理器（参见图\
  \ 4-7）：\n\n```\n- (IBAction)didTapStandButton:(id)sender;\n- (IBAction)didTapHitButton:(id)sender;\n\
  ```\n\n![Image](img/9781430243748_Fig04-07.jpg)\n\n**图 4-7.** 将按钮控件的操作连接到 `BJViewController`\n\
  \n*注意：Xcode 也可以通过 Control+点击视图，然后从上下文菜单中拖出输出口和操作来创建它们。*\n\n我们基本的二十一点游戏的视图部分就完成了。我们已经学习了使用\
  \ Xcode 内置的 UI 布局工具添加和排列标签、按钮以及图片视图来创建视图的基础知识。借助故事板，Xcode 使我们能够布局应用中的视图，并在它们之间创建连接。我们将在明天的第\
  \ 5 章和第 6 章中学习更多关于故事板的知识，但现在，我们将继续学习 Objective-C 类、属性、方法和对象类型的基础知识。\n\n### Objective-C\
  \ 基础\n\nXcode 不仅在 `BJViewController.h` 头文件中自动生成了输出口声明，还在 `BJViewController.m` 源文件中添加了代码。\n\
  \n保持 Assistant Editor 布局，在主左侧分割面板中选择 `BJViewController.h`，这样我们就可以同时查看视图控制器的头文件和实现文件（参见图\
  \ 4-8）。有几种方法可以做到这一点：\n\n> *   使用左侧跳转栏，导航到 `BJViewController.h`。\n> *   临时显示导航面板，选择\
  \ `BJViewController.h`，然后再次隐藏导航面板。\n\n![Image](img/9781430243748_Fig04-08.jpg)\n\
  \n**图 4-8.** Xcode 已为我们的输出口和操作连接自动生成了 Objective-C 代码\n\n那么，头文件和源文件是什么呢？问得好！\n\n\n\
  \n### 理解头文件和源文件\n\nObjective-C 类通常由两个文件组成：头文件和源文件。头文件使用扩展名 `.h`，源文件使用扩展名 `.m`。头文件是类的公共接口：即其\
  \ API（应用程序编程接口）。源文件则用于定义类属性和方法的实现。\n\n其他类若想引用或创建你的类的实例，需要导入 `YourClass.h` 文件。你会在图\
  \ 4-8 中看到 `BJViewController.m` 也导入了 `BJViewController.h`。任何 Objective-C 实现文件在呈现类属性和方法的实现之前，都会先导入对应的头文件。\n\
  \n### 属性和实例变量 (iVars)\n\nObjective-C 中的类属性必须在类的接口中声明。默认情况下，属性是可读写的。一个读/写属性包含两个访问方法：一个用于获取属性的值，另一个用于设置属性的值。属性的实际值存储在*实例变量*（iVar）中。\n\
  \n例如，一个类的头文件接口可能如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Person\
  \ : NSObject\n{\n        NSString *personName;\n}\n@property (strong, nonatomic)\
  \ NSString *personName;\n@end\n```\n\n在头文件的示例中，我们声明了一个新的自定义类：`Person`。`Person` 继承自父类\
  \ `NSObject`。`Person` 包含一个名为 `personName` 的属性，该属性设置或返回一个 `NSString` 值。示例头文件还声明了一个名为\
  \ `personName` 的 iVar。尽管这两个声明的名称相同，但一个是属性名，另一个是 iVar 名。iVar 是 `Person` 类用于存储字符串指针的私有变量。当访问\
  \ `personName` 属性时，属性的 getter 方法被调用，并返回对 `personName` iVar 的引用。\n\n现在我们已经声明 `Person`\
  \ 有一个名为 `personName` 的字符串属性，Xcode 编译器期望我们创建该属性的 getter 和 setter 访问方法。在源文件 `Person.m`\
  \ 中，实现如下所示：\n\n```\n#import \"Person.h\"\n@implementation Person\n//personName 属性的\
  \ setter\n-(void) setPersonName:(NSString *)personNameNew\n{\n    personName = personNameNew;\n\
  }\n\n//personName 属性的 getter\n-(NSString *)personName\n{\n    return personName;\n\
  }\n@end\n```\n\n哇，仅仅为了获取和设置一个字符串就要写这么多代码！幸运的是，Xcode 可以通过在类实现文件中使用 `synthesize` 指令来自动化创建\
  \ getter 和 setter 的过程，如下所示：\n\n```\n#import \"Person.h\"\n\n@implementation Person\n\
  \n@synthesize personName;\n\n@end\n```\n\n`synthesize` 指令会自动生成 getter/setter 代码，就像第一个更冗长的实现示例一样。Xcode\
  \ 的编译器也能识别出我们声明的同名 iVar，并将其分配为属性 `personName` 的私有存储变量。\n\n但*并不理想*的是，我们的属性和 iVar\
  \ 使用了相同的名称：就像我们刚刚看到的示例那样！幸运的是，编译器允许我们在 `synthesize` 指令中直接为属性存储声明一个私有的 iVar。操作方法如下：\n\
  \n`@synthesize personName = _personName;`\n\n我们不必使用下划线，但这是 Cocoa 开发者之间一种常用的约定，用于区分属性和\
  \ iVar 的名称。\n\n在 2012 年的 WWDC 上，Apple 宣布了对现代 Objective-C 中属性和 iVar 声明的改进。使用 Xcode\
  \ 4.5+ 后，*不再需要向类实现中添加 `synthesize` 声明*。编译器现在会自动为你完成这一操作。然而，理解编译器自动生成的代码非常重要。\n\n\
  如果你不进行合成，那么你的实现代码将如下所示：\n\n```\nPerson.m:\n#import \"Person.h\"\n@implementation\
  \ Person\n@end\n```\n\n简洁且干净。Xcode 会自动添加以下合成代码：\n\n`@synthesize personName = _personName;`\n\
  \n所以，如果你不进行合成，那么 Xcode 现在会*自动为你创建一个带下划线的 iVar*。\n\n如果你像这样进行合成：\n\n```\nPerson.m:\n\
  #import \"Person.h\"\n@implementation Person\n@synthesize personName;\n@end\n```\n\
  \n那么你的 iVar 将被命名为 `personName` 而不是 `_personName`。因此，考虑到我们本章前面添加的二十一点 outlets 案例，Xcode\
  \ 自动向 `BJViewController.m` 添加了合成代码：\n\n`@synthesize dealerCard1;`\n\n由此产生的 iVar\
  \ 被命名为 `dealerCard1` 而不是 `_dealerCard1`。这种 iVar 命名行为差异的主要原因是为了确保与 Apple 2012 年修改\
  \ Objective-C 之前的旧代码保持向后兼容性。\n\n### 创建私有类接口：类扩展\n\n在 `BJViewController.m` 中，注意 Xcode\
  \ 在实现代码之前添加的代码：\n\n```\n@interface BJViewController ()\n\n@end\n```\n\n这在 Objective-C\
  \ 中被称为*类扩展*。类扩展使我们能够定义私有属性。因此，在我们的二十一点应用中，我们可以在 `BJViewController.m` 的类扩展中声明属性，这些属性仅能被\
  \ `BJViewController.m` 源文件内部访问。其他类只导入 `BJViewController.h` 头文件，因此该接口对外部访问保持隐藏，但在我们的源实现中对此类可用。让我们向\
  \ `BJViewController.m` 添加几个私有属性：\n\n```\n@interface BJViewController ()\n\n@property\
  \ (nonatomic,strong) NSArray *dealerCardViews;\n@property (nonatomic,strong) NSArray\
  \ *playerCardViews;\n\n@end\n```\n\n你注意到类名后面的括号了吗？这向编译器表明我们正在声明一个类扩展。\n\n我们不需要对这两个新的数组属性进行合成；Xcode\
  \ 的编译器会为我们自动完成。\n\n\n\n### Arrays\n\n注意，声明类扩展的语法与公共接口类似，但不完全相同：\n\n```\n@interface\
  \ BJViewController ()\n@property (nonatomic,strong) NSArray *dealerCardViews;\n\
  @property (nonatomic,strong) NSArray *playerCardViews;\n@end\n```\n\n我们正在创建两个数组，一个用于保留对庄家卡视图的引用，另一个用于保留对玩家卡视图的引用。这两个数组将用于索引显示的卡片；也就是说，`dealerCardViews`\
  \ 数组的第一个元素是对 `dealerCard1` 的引用。\n\n默认情况下，Objective-C 将所有指针合成为 `nil`。那么什么时候是实例化这两个数组的好时机呢？在视图生命周期的哪个时间点，我们才能访问已配置的卡片图像视图输出口？\n\
  \n有人知道吗？有人吗？……Bueller？……Bueller？……Bueller？……\n\n你在 `BJViewController.m` 中发现了 `viewDidLoad`\
  \ 方法吗？这是视图控制器能够访问其视图的第一个时间点。此时，编译器已经为我们连接好了所有输出口。因此，`viewDidLoad` 是实例化新的 `dealerCardViews`\
  \ 和 `playerCardViews` 数组的理想位置。以下是需要添加的代码：\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    self.dealerCardViews =\n@[self.dealerCard1,self.dealerCard2,self.dealerCard3,self.dealerCard4,self.dealerCard5];\n\
  \    self.playerCardViews =\n@[self.playerCard1,self.playerCard2,self.playerCard3,self.playerCard4,self.playerCard5];\n\
  }\n```\n\n在 Xcode 4.5 之前，我们会使用更冗长的 `[NSArray arrayWithObjects:]` 语法来定义数组，如下所示：\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.dealerCardViews\
  \ = [NSArray\narrayWithObjects:self.dealerCard1,self.dealerCard2,self.dealerCard3,self.dealerCard4,self.dealerCard5,\
  \ nil];\n    self.playerCardViews = [NSArray\narrayWithObjects:self.playerCard1,self.playerCard2,self.playerCard3,self.playerCard4,self.playerCard5,\
  \ nil];\n\n}\n```\n\n这两种实现方式的效果完全相同，但第一种方式需要的代码更少——在我看来，少即是多！在第一个示例中，我们使用了新的 Objective-C\
  \ 字面量语法。本书中我们将大量使用字面量，因为它更简洁、更清晰且更易读。\n\nObjective-C 中有两种数组类型：`NSArray` 和 `NSMutableArray`。正如类名所示，一个是可变的，另一个是不可变的。一旦\
  \ `NSArray` 被实例化，它就不能被修改，也就是说，你不能向数组中添加或移除元素。对于索引卡视图的目的来说，一个不可变的 `NSArray` 完全适用于这些属性：我们不会移除或添加卡视图，只会显示和隐藏它们。\n\
  \n### Init、初始化器和指定初始化器（构造器）\n\nObjective-C 类结构中与构造函数最接近的是被称为初始化器的方法。这个初始化器是类的一个方法，在类实例化时只调用一次。回到我们的\
  \ `Person` 示例，如果我们不对该类做进一步修改，那么我们就可以像这样实例化 `Person` 的新实例：\n\n```\nPerson *p = [[Person\
  \ alloc] init];\n```\n\n`alloc` 是一个底层类方法，你永远不需要覆盖它。当 `alloc` 被调用时，内存被分配给该类，并且（如我们示例中的情况）会实例化一个\
  \ `Person` 实例，然后在该实例上调用 `init`。\n\n目前，我们还没有为 `Person` 创建初始化器。但是 `Person` 继承自 `NSObject`，而\
  \ `NSObject` 有一个名为 `init` 的初始化器。所以我们仍然需要调用超类的初始化器。\n\n在源文件 `Person.m` 中，我们可以像这样覆盖\
  \ `init`：\n\n```\n-(id)init\n{\n    self = [super init];\n    if (self) {\n    \
  \    //设置一些默认属性值？\n    }\n    return self;\n}\n```\n\n初始化器方法应该始终返回对自身的引用。我们使用通用对象类型\
  \ `id` 来使初始化器能够被子类化。`id` 仅仅意味着返回值将是一个对象。\n\n在不进行子类化的情况下，还有其他创建初始化器的方法；例如，我们可能希望向\
  \ `Person` 类的初始化器中传递一个自定义参数：\n\n```\n-(id)initWithName:(NSString *)name\n{\n   \
  \ self = [super init];\n    if (self) {\n        self.personName = name;\n    }\n\
  \    return self;\n}\n```\n\n注意到我们的自定义初始化器是如何在超类 `NSObject` 上调用 `init` 的吗？`init`\
  \ 也是 `NSObject` 的*指定初始化器*——所有子类在其自身的初始化方法中都必须调用的初始化器。这有点令人困惑，所以我再强调一下：*指定初始化器*是在直接实例化一个类或通过其子类实例化时，必须首先调用的初始化方法。\n\
  \n在我们的示例中，如果我们决定强制 `Person` 的每个实例在实例化时都设置其 `personName` 属性，那么 `initWithName` 就可以是\
  \ `Person` 的指定初始化器。\n\n*提示：像 `NSObject` 这样的顶层类有一个名为 `init` 的初始化方法。由于 Cocoa 中几乎所有类都继承自\
  \ `NSObject`，通常的做法是让你的类初始化器在其自身的初始化器中调用 `[super init]`。*\n\n有些类有多个初始化器：例如数组：\n\n\
  - `initWithArray:`\n- `initWithArray:copyItems:`\n- `initWithContentsOfFile:`\n\
  - `initWithContentsOfURL:`\n- `initWithObjects:`\n- `initWithObjects:count:`\n\n\
  因此，由你来选择最合适的初始化器。\n\n\n\n### 工厂方法/便捷方法\n\n部分 Objective-C 类包含*工厂方法*或*便捷方法*。这些类方法负责处理\
  \ `alloc init` 的实例化流程，并返回新的类实例。以下是数组的工厂方法：\n\n`+ array`\n`+ arrayWithArray:`\n`+\
  \ arrayWithContentsOfFile:`\n`+ arrayWithContentsOfURL:`\n`+ arrayWithObject:`\n\
  `+ arrayWithObjects:`\n`+ arrayWithObjects:count:`\n\n我通常使用工厂方法来创建数组和字典（哈希表）。\n\n\
  `NSMutableArray *arr = [NSMutableArray arrayWithObjects:@\"one\",@\"two\",@\"three\"\
  , nil];`\n\n`NSMutableArray *arrWithOneObject = [NSMutableArray arrayWithObject:@\"\
  one\"];`\n\n`NSMutableDictionary *dictionary = [NSMutableDictionary dictionaryWithObjectsAndKeys:@\"\
  value1\",@\"key1\",\"value2\",@\"key2\", nil];`\n\n`NSMutableDictionary *dictionaryWithOneObject\
  \ = [NSMutableDictionary dictionaryWithObject:@\"myValue\" forKey:@\"myKey\"];`\n\
  \n*注意：在这些示例中，我们也可以使用字面量来简化数组和字典的创建。然而，字面量创建的是不可变对象，因此我们还需要额外调用* `mutableCopy` *来生成字典和数组的可变副本。*\n\
  \n让我们回到二十一点游戏。\n\n还记得我之前说过视图和视图控制器并不相同吗？在某些情况下，你的视图可能会被 iOS 丢弃，但视图控制器仍然保留。考虑一个复杂的导航控制器：用户深入导航到应用层级中，导航堆栈中第一个视图控制器所控制的视图已不再可见。如果你的应用内存不足，那么所有视图控制器都可能通过\
  \ `UIViewController` 的 `didReceiveMemoryWarning` 方法间歇性收到内存警告。默认情况下，如果视图不再拥有父视图，`didReceiveMemoryWarning`\
  \ 会释放其主视图以释放不必要的内存。`UIViewController` 自身则不会从内存中释放，因为它仍是导航控制器的视图控制器之一。\n\n我们将在第 5\
  \ 章中进一步探讨视图生命周期的细节，但现阶段只需注意视图控制器的视图属性可能会被 iOS 释放并重新加载。\n\n在 `BJViewController` 的\
  \ `viewDidUnload` 方法中，我们指向图像视图的输出口将被置空，因此清除之前创建的两个数组（用于引用所有庄家和玩家的牌）非常重要。如果不处理，这些卡牌会因数组保留对其元素的引用而继续留在内存中，从而导致内存泄漏。\n\
  \n在 `viewDidUnload` 方法中调用 `[super viewDidUnload]` 之后，添加以下代码：\n\n```\n- (void)viewDidUnload\n\
  {\n    [super viewDidUnload];\n    self.dealerCardViews = nil;\n    self.playerCardViews\
  \ = nil;\n}\n```\n\n请注意，以下代码产生的结果完全相同：\n\n```\n- (void)viewDidUnload\n{\n    [super\
  \ viewDidUnload];\n    [self setDealerCardViews:nil];\n    [self setPlayerCardViews:nil];\n\
  }\n```\n\n在 Objective-C 中，你可以使用点语法通过属性引用 setter，也可以像第二个示例那样直接调用合成的 setter 方法。\n\n\
  这段代码调用了 `dealerCardViews` 和 `playerCardViews` 属性的合成 setter，并释放了实例变量存储引用 `_dealerCardViews`\
  \ 和 `_playerCardViews`，这进而释放了每个卡牌视图的数组元素引用，从而避免了潜在的内存泄漏。\n\n*注意：数组和字典会保留对指针的引用。为避免内存泄漏，管理好你的数组和字典属性是你的责任。*\n\
  \n### 开启/关闭多方向支持\n\n现在，让我们也为应用关闭多方向支持。我们的二十一点游戏仅需在竖屏模式下查看。\n\n向下滚动 `BJViewController.m`\
  \ 文件，并重写以下视图控制器方法：\n\n```\n- (NSUInteger)supportedInterfaceOrientations\n{\n   \
  \ // 我们不会为这个游戏支持多设备方向\n    return UIInterfaceOrientationMaskPortrait;\n}\n```\n\n\
  除了像我们在第 3 章中学习的在目标摘要面板中定义支持的方向外，我们还可以选择直接在视图控制器子类中定义支持的方向。我们可以返回以下方向选项：\n\n`UIInterfaceOrientationMaskPortrait`\n\
  `UIInterfaceOrientationMaskLandscapeLeft`\n`UIInterfaceOrientationMaskLandscapeRight`\n\
  `UIInterfaceOrientationMaskPortraitUpsideDown`\n`UIInterfaceOrientationMaskLandscape`\n\
  `UIInterfaceOrientationMaskAll`\n`UIInterfaceOrientationMaskAllButUpsideDown`\n\n\
  在 iPhone 上，默认情况下视图控制器返回 `UIInterfaceOrientationMaskAllButUpsideDown`，因此除倒置方向外，所有方向都受支持。现在你会发现应用将不再旋转。\n\
  \n正如我们在第 3 章中学到的，我们可以在 Xcode 中通过选择项目导航器中的 Blackjack 项目，然后选择 Blackjack 目标，在全局范围内关闭应用的多方向支持。接着，在目标的“摘要”选项卡中，切换“支持的方向”部分下的“左横屏”和“右横屏”开关，如图\
  \ 4-9 所示。\n\n![图片](img/9781430243748_Fig04-09.jpg)\n\n**图 4-9.** 关闭设备方向支持\n\n我已经向你介绍了\
  \ Objective-C 类、属性、实例变量、初始化方法、类方法和实例方法的结构。这虽然只是一个简要介绍，但应该为你在动手开发二十一点和*生日提醒*应用时所需的基础理解打下基础。\n\
  \n### 模型\n\n在本章的下一节中，我们将学习面向对象的 Objective-C。我们将学习 `NSObject`（核心基础对象类）以及如何对其子类化并扩展。我们将进一步开发二十一点游戏，并学习如何在\
  \ Objective-C 中实现基本 MVC 模式。\n\n我们尚未完全完成控制器的开发，但现在我们将转向模型。应用的模型将由两个自定义类组成：一个卡牌值对象类和一个游戏模型。我们可以进一步拆分模型，为玩家和庄家添加模型类，但出于演示目的，两个类就足够了。\n\
  \n#### 卡牌模型\n\n我们将创建一个类，用于表示一副牌中每张牌的数据。这是一个单副牌的二十一点游戏，因此在每手牌开始时，我们的卡牌类会实例化 52 个对象。别担心，我们会确保牌被洗乱。在创建模型类时，继承\
  \ Apple 的 `NSObject` 类是一个好做法，因为我们可以免费继承一些基本方法。让我们开始吧。\n\n\n\n```markdown\n#####\
  \ 子类化 NSObject\n\n我们已经见过一个基本示例，通过之前的`Person`示例来演示如何创建`NSObject`的子类。我还没展示的是在 Xcode\
  \ 中创建新自定义类的流程。\n\n打开项目导航面板，同样通过 Xcode 工具栏右上角的切换按钮操作。然后在项目层次结构中选择`data`组。\n\n*提示：在\
  \ Xcode 项目中创建新类或添加文件时，始终先在项目导航器中为新文件选择目标位置。*\n\n使用`![Image](img/U002a.jpg) N`键盘快捷键或`File`\
  \ > `New` > `File`，系统会呈现新文件模板选择界面。如果尚未选中，则从 Cocoa Touch 集合中选择`Objective-C Class`选项（参见图\
  \ 4-10）。\n\n`![Image](img/9781430243748_Fig04-10.jpg)`\n\n**图 4-10.** 创建一个新的 Objective-C\
  \ 类\n\n在下一屏幕中，确保子类选项设置为`NSObject`，并将你的类命名为`BJDCard`。这里引入另一个常见命名约定。通过在 BJ 类前缀中添加`D`，表示这是一个数据类，我们将对其他数据或值对象模型类使用此约定。\n\
  \nXcode 会询问你保存新类文件的位置。由于`data`组映射到 Xcode 项目中一个同样名为`data`的文件夹，默认情况下，你应该会自动看到正确的保存位置。如果没有，则导航到你所操作的\
  \ Xcode 项目中的`data`文件夹，然后点击“Create”按钮（参见图 4-11）。\n\n`![Image](img/9781430243748_Fig04-11.jpg)`\n\
  \n**图 4-11.** 将新的`BJDCard`类保存到 data 文件夹\n\n如果尚未选择，请在项目导航器中选择新生成的`BJDCard`头文件，然后再次关闭导航器。现在你应该在\
  \ Xcode 的助理编辑器布局中同时看到新`BJDCard`类的头文件和源文件。\n\n我们将开始向`BJDCard`添加几个属性。\n\n头文件：\n\n\
  ```\n#import <Foundation/Foundation.h>\n\n@interface BJDCard : NSObject\n\n@property\
  \ (nonatomic) int digit;\n@property (nonatomic) BOOL isFaceUp;\n\n@end\n```\n\n\
  你暂时不需要对源文件做任何更改，因为 Xcode 的编译器会自动合成我们的两个新属性。结果应如图 4-12 所示。\n\n`![Image](img/9781430243748_Fig04-12.jpg)`\n\
  \n**图 4-12.** 向`BJDCard`添加属性和合成的实例变量\n\n##### 声明指针和基本类型\n\n属性声明语法应该与我们之前在`BJViewController`中的工作非常相似。然而，我们之前的属性声明语法看起来略有不同。例如，`BJViewController`中的`dealerCardViews`数组是这样声明的：\n\
  \n```\n@property (nonatomic,strong) NSArray *dealerCardViews;\n```\n\n而`BJDCard`中的`digit`是这样声明的：\n\
  \n```\n@property (nonatomic) int digit;\n```\n\n这两个属性之间的区别在于：数组是指向对象的指针（引用），而整数是基本数据类型，基本类型的实际值就是属性本身。在像\
  \ ActionScript 这样的面向对象语言中，指针和基本类型的声明方式相同。在 Objective-C 中，你需要适应语法上的差异。\n\n所有作用域中的指针声明都在属性或变量名之前使用`*`。而像整数、浮点数和布尔值这样的基本类型声明则不需要。数组、字典以及对任何\
  \ Objective-C 类实例的引用都是指针。\n\n##### 保留与释放，以及 ARC（自动引用计数）\n\n在 iOS 中，对指针的引用要么是弱引用，要么是强引用。iOS\
  \ 中的内存管理会跟踪一个对象的强指针引用数量，一旦强引用计数降为零，系统就会判定该对象不再被你的应用需要，释放对象占用的所有内存，并销毁该对象。\n\n在过去（iOS\
  \ 5 之前），开发者需要自行管理所有强引用计数。旧的语法如下：\n\n```\n[myObject retain]; // 将对象的强引用计数增加 1\n//\
  \ 执行某些操作\n[myObject release]; // 将强引用计数减少 1\n```\n\n开发者必须非常小心，确保当一个对象不再需要时，其强引用计数降为零，以防止应用出现内存泄漏。当应用消耗的内存超过系统可接受的范围时，系统会终止内存泄漏的应用。\n\
  \n苹果在 2011 年发布的 Xcode 4.2 中引入了一项广受好评的新技术，称为自动引用计数，简称 ARC。在编译时，ARC 会自动在所有`retain`和`release`引用处添加代码，这使得开发者现在可以更轻松地专注于编写优秀的代码，而无需花费大量时间跟踪强对象引用。\n\
  \n然而，了解应用底层发生了什么仍然非常重要。\n\n让我们重新审视我们在`BJViewController`中创建的两个指针引用：\n\n```\n@property\
  \ (nonatomic, weak) IBOutlet UIImageView *dealerCard1;\n@property (nonatomic,strong)\
  \ NSArray *dealerCardViews;\n```\n\n我想提醒你注意的两个属性指针声明之间的主要区别在于关键字`weak`和`strong`。这些关键字指示编译器如何处理这些属性的指针引用。默认情况下，指针属性引用是`strong`的。这对于像我们的`dealerCardViews`数组这样的属性是有意义的。这个数组是在视图控制器类中创建的，并且在应用的其他地方没有引用。如果我们向编译器暗示该属性是`weak`的，那么一旦应用执行了`viewDidLoad`，`dealerCardViews`属性就会被编译器设置为`nil`。由于没有其他对该数组的强引用，一旦我们离开了`viewDidLoad`的作用域，编译器就会认为该对象不再需要，可以被释放。\n\
  \n然而，对于像`dealerCard1`这样的 Interface Builder 输出口，引用应该是`weak`的。通过简单地将`dealerCard1`图像视图添加到其父视图中，我们已经在父视图和子视图之间创建了一个强引用。我们不希望视图控制器中对`dealerCard1`的引用是强引用，因为如果主视图被卸载，其子视图将不再可用，我们希望系统能够释放这些被移除视图所占用的内存。因此，我们对子视图的输出口使用弱引用。\n\
  \n这条规则也有例外。可以将视图和其他对象添加到故事板场景的顶层，即那些不是视图子视图的对象。在这种情况下，你需要从视图控制器类建立一个强输出口引用，以确保对象不会因为零强引用而被系统销毁。\n\
  ```\n\n\n\n#### 枚举器\n\nApple 在 Cocoa Touch 和 iOS SDK 中使用了大量枚举器。我们已经遇到过设备方向枚举器 `UIInterfaceOrientation`，在我们的应用中只支持方向枚举值\
  \ `UIInterfaceOrientationPortrait`。\n\n创建我们自己的自定义枚举器也很简单。现在我们就在 `BJDCard.h` 中来实现。\n\
  \n```\ntypedef enum : int\n{\n    BJCardSuitClub = 0,\n    BJCardSuitSpade,\n  \
  \  BJCardSuitDiamond,\n    BJCardSuitHeart\n} BJCardSuit;\n```\n\n将这段代码输入到 `BJDCard`\
  \ 类的头文件中，要放在接口声明*之前*。我们的自定义枚举器是一个我们定义为 `BJCardSuit` 的 Objective-C 新类型。通过在接口声明之外的头文件中定义花色，我们就能让其他类使用这个枚举器。`BJDCard`\
  \ 实际上只是一个值对象，因此我们应该允许外部类改变我们卡片的花色。我们声明枚举器中的每个元素都应为整数，并且列出的第一个 `enum` 值 (`BJCardSuitClub`)\
  \ 等于 0。`BJCardSuitSpade` 等于 1，`BJCardSuitDiamond` 等于 2，以此类推。\n\n现在我们已经定义了自定义的花色枚举器，可以为\
  \ `BJDCard` 创建一个名为 `suit` 的新属性，如下所示：\n\n`@property (nonatomic) BJCardSuit suit;`\n\
  \n最终你对 `BJDCard` 所做的修改应如图 4-13 所示。\n\n![Image](img/9781430243748_Fig04-13.jpg)\n\
  \n**图 4-13.** 添加了新的花色枚举器属性的 BJDCard\n\n#### 方法\n\n让我们为 `BJDCard` 添加几个公开方法。与公开属性类似，如果我们想为类添加公开方法，首先要将方法签名声明在头文件的类公开接口中。因此，在\
  \ `BJDCard.h` 的接口声明中，添加以下三个方法签名：\n\n`-(BOOL) isAnAce;`\n`-(BOOL) isAFaceOrTenCard;`\n\
  `-(UIImage *)getCardImage;`\n\n我们已经为类添加了三个实例方法签名。在我们的应用中，只要存在 `BJDCard` 的实例，应用就会假定这三个方法中的任何一个都有可能在该实例上被调用。虽然我们还没有真正定义这些方法的实现，但编译器现在允许我们尝试调用这些方法。实际上，这会在运行时导致应用崩溃。编译器还会警告我们，尚未实现已声明签名的方法。\n\
  \n现在是时候实现前两个方法了。在实现源文件中，添加以下代码：\n\n```\n-(BOOL) isAnAce\n{\n    if (self.digit ==\
  \ 1) return YES;\n    return NO;\n}\n\n-(BOOL) isAFaceOrTenCard\n{\n    if (self.digit\
  \ > 9) return YES;\n    return NO;\n}\n```\n\n正如我在本章开头所述，在二十一点中，A 牌和人头牌的点数不同，因此我们创建了几个有用的方法，供游戏模型逻辑使用，以判断\
  \ `BJDCard` 的实例是否为 A 牌或人头牌。`BJDCard` 实例的 `digit` 属性是介于 1 到 13 之间的值：1 代表 A，11 代表\
  \ J，12 代表 Q，13 代表 K。\n\n这些方法会检查 `digit` 属性的值，然后返回一个布尔值，在 Objective-C 中定义为 `YES`（真）或\
  \ `NO`（假）。\n\n`BJDCard` 的这些方法没有实现任何参数，但现在是让我们熟悉 Objective-C 中方法声明语法的最好时机。以下是 Apple\
  \ 官方文档中的图示：\n\n![Image](img/9781430243748_Fig04-14.jpg)\n\n**图 4-14.** Objective-C\
  \ 方法声明语法\n\n至少可以说，Objective-C 中的方法声明相当冗长！每个参数都有一个*方法签名关键字*和一个*参数名称*（参见 图 4-14）。注意，对每个参数的实际引用是在参数类型之后定义的。因此，如果你在前面的示例中实现\
  \ Apple 的方法，`anObject` 和 `index` 关键字将是传入参数的名称。\n\n我们会在本书中反复讨论方法语法，所以如果这个示例让你完全摸不着头脑，也不必过于担心！\n\
  \n现在来实现我们的第三个 `BJDCard` 方法 `getCardImage`。每当视图控制器想要在屏幕上正面渲染一张牌时，就会调用这个方法。在内部，该方法会检查牌的花色（得益于我们的自定义枚举器\
  \ `BJCardSuit`），并动态生成一个字符串，该字符串与我已经为您链接到此项目中的视网膜和非视网膜 PNG 文件库中正确图片的文件名相匹配。代码如下：\n\
  \n```\n-(UIImage *)getCardImage\n{\n    NSString *suit;\n\n    switch (self.suit)\
  \ {\n        case BJCardSuitClub:\n            suit = @\"club\";\n            break;\n\
  \        case BJCardSuitSpade:\n            suit = @\"spade\";\n            break;\n\
  \        case BJCardSuitDiamond:\n            suit = @\"diamond\";\n           \
  \ break;\n        case BJCardSuitHeart:\n            suit = @\"heart\";\n      \
  \      break;\n\n        default:\n            break;\n    }\n\n    NSString *filename\
  \ = [NSString stringWithFormat:@\"%@-%d.png\", suit, self.digit];\n\n    return\
  \ [UIImage imageNamed:filename];\n}\n```\n\n我们在 `BJDCard` 实例的 `suit` 属性上使用了 switch\
  \ 语句，并将该值转换后填入一个名为 `suit` 的局部字符串变量。注意，我们必须使用 `self.suit` 语法来引用该属性。不带 `self` 直接调用\
  \ `suit` 会导致编译器错误，因为编译器会认为你试图调用一个实例变量。还记得编译器是如何为我们合成 `suit` 属性并创建名为 `_suit` 的 iVar\
  \ 的吗？因此，我们也可以对 `_suit` 执行 switch 语句，得到的结果相同。\n\n`getCardImage` 方法最终会生成一个字符串，包含该牌对应正面图片的完整文件名。我们使用了一个\
  \ `NSString` 的工厂方法来实现这一点。在 `NSString` 的 `stringWithFormat` 初始化器中，它会自动将声明格式中的占位变量替换为我们作为额外参数传入的变量。若要声明格式中的字符串变量，请使用\
  \ `%@` 语法。若要声明整型变量，请使用 `%d` 语法。当替换任何对象，如 `NSString`、`NSNumber`、`NSArray` 等时，请使用\
  \ `%@`。这对于调试非常有用。例如，如果需要在调试器中打印数组的内容，可以使用以下代码：\n\n`NSLog(@\"My arr contents: %@\"\
  , myAppVariable);`\n\n最后，我们使用 `UIImage` 的工厂方法 `imageNamed` 生成一个新的图像实例，并传入应用包中图像的文件名：\n\
  \n`[UIImage imageNamed:filename];`\n\n我们返回这个图像实例。\n\n我们已经学习了如何在 Xcode 中创建继承自 `NSObject`\
  \ 的新类。还学习了向类添加属性和方法的语法，以及如何引用属性和其底层的 iVar。事情正在升温。如果你觉得我讲得太快，别慌，我正在快速向你介绍代码和语法，在读完本章之后的主项目——*生日提醒*\
  \ 应用中，你还将有很多机会重新回顾它们。\n\n\n\n### 游戏模型\n\n我们先暂时把 `BJDCard` 放在一边，但在继续之前，请确保应用能正常编译。构建并运行应用，你应该只会看到我们在章节开头创建的视图布局。只要你的应用版本没有崩溃，那就一切正常！\n\
  \n恐怕我在准备这个应用时稍微偷了点懒。我已经为你写好了一些代码。本章的目标是向你介绍 Objective-C，如果我逐行讲解黑杰克应用的每一行代码，本章恐怕会写得像一本书那么厚！\n\
  \n现在为我们的应用添加一个新类。我已经写好了大部分新的 `BJDGameModel` 类，因此你只需将实际的类文件添加到项目中，而无需从头创建文件。\n\n\
  首先，在项目导航器中选择 `data` 组，使用 ![Image](img/U002a.jpg) 键盘快捷键或通过 File ![Image](img/U001.jpg)\
  \ Add Files to “Blackjack”，导航到 `BJDGameModel` 的头文件和源文件，将它们一并选中，然后添加到你的项目中（参见图 4-15）。\n\
  \n![Image](img/9781430243748_Fig04-15.jpg)\n\n**图 4-15.** 向 Xcode 项目添加 `BJDGameModel`\
  \ 头文件和源文件\n\n`BJDGameModel` 引用了 `BJDCard`，所以为了检查在开发 `BJDCard` 过程中是否遗漏了什么，值得再次构建并运行，以确保项目仍然能无错误地编译。\n\
  \n让我们看看我在 `BJDGameModel` 中为你提供的代码。保持在助理编辑器布局中，我们可以快速浏览头文件中的公共接口属性和方法（参见图 4-16）。`BJDGameModel`\
  \ 是一个管理一副牌以及庄家和玩家手牌的类；每个数组包含多个 `BJDCard` 实例。`BJDGameModel` 还管理游戏阶段。在黑杰克的每一局游戏中，玩家先行动，接着庄家行动，然后游戏结束。因此你会看到我创建了另一个自定义枚举来追踪这三个游戏阶段：\n\
  \n```\ntypedef enum : int\n{\n    BJGameStagePlayer,\n    BJGameStageDealer,\n \
  \   BJGameStageGameOver\n}BJGameStage;\n```\n\n我们的游戏模型暴露了一个公共的 `gameStage` 属性。我们的视图控制器\
  \ `BJViewController` 可以访问模型，因此能够在任何时刻检查游戏阶段，并根据模型决定如何渲染视图。\n\n![Image](img/9781430243748_Fig04-16.jpg)\n\
  \n**图 4-16.** 分析 `BJDGameModel`\n\n*注意**：你可以使用跳转栏快速查找头文件和源文件中的方法和属性声明及实现（参见图 4-16）。*\n\
  \n模型中还有另一个属性：`maxPlayerCards`。正如我在本章前面提到的，这是黑杰克实现中的一个注意事项：我们允许庄家或玩家手牌最多五张。如果玩家手牌达到五张且尚未爆牌，那么他的回合结束，游戏阶段进入庄家回合。\n\
  \n你是否在头文件中注意到了这段代码：\n\n```\n@class BJDCard;\n```\n\n这就是所谓的向前类声明。`BJDGameModel` 中的一些公共方法会返回\
  \ `BJDCard` 的实例。如果我们不在头文件中像这样导入 `BJDCard`：\n\n```\n#import \"BJDCard.h\"\n```\n\n\
  或者像我这样添加一个向前类声明，编译器就会报错。向前类声明让编译器知道，虽然我们尚未声明 `BJDCard` 类，但它将会被声明——请相信我们，编译器！你会看到，我实际上在\
  \ `BJDGameModel.m` 的源实现中导入了 `BJDCard.h`。一般来说，这是在头文件中引用其他类的最佳方式，即通过向前类声明。然后确保在源文件中导入头文件。\n\
  \n尽管这次在 `BJDGameModel.h` 头文件中导入 `BJDCard.h` 没有问题，但如果继续这样操作，将来可能会遇到可怕的编译器错误。如果两个类在头文件中相互引用，就会出错。它们都依赖编译器先导入对方文件，这会让编译器陷入混乱！解决方案：在头文件中使用向前类声明，而不是导入声明。\n\
  \n### 我们的 MVC 黑杰克实现\n\n我们的游戏运行方式为：`BJViewController` 是 MVC 实现中的控制器。控制器可以访问模型，但模型对控制器一无所知。类似地，控制器与视图之间也是单向关系。\n\
  \n`BJViewController` 将控制整个流程：当应用首次加载时，`BJViewController` 调用模型的 `resetGame` 方法，然后渲染视图以显示模型状态。在玩家回合中，`BJViewController`\
  \ 监听“停牌”和“要牌”按钮的“内部触摸事件”动作，并告知模型发一张新牌。接着，`BJViewController` 再次渲染视图。`BJViewController`\
  \ 还会调用模型的 `updateGameStage` 方法，该方法检查玩家是否爆牌或达到五张手牌上限，并相应地推进游戏阶段。\n\n一旦进入庄家回合，`BJViewController`\
  \ 将第二张牌正面朝上渲染，并通过 `updateGameStage` 方法询问模型庄家是否应该停牌。如果庄家需要要牌，那么 `BJViewController`\
  \ 会设置一个延迟计时器来模拟第三张牌的发放。`BJViewController` 再次调用 `updateGameStage`，然后继续发放延迟牌，直到庄家爆牌或获胜。\n\
  \n\n\n#### 类方法\n\n在 `BJDGameModel` 源文件中，你会发现一个名为 `cards` 的私有属性，它是一个可变数组，用于存储由 52\
  \ 个 `BJDCard` 实例组成的牌组。我们将该数组声明为可变的，因为当牌被发到 `playerCards` 和 `dealerCards` 这两个可变数组中时，我们需要从该数组中弹出（pop）牌。不过，我并未提供预先生成牌组的代码。那么，现在我们就来实现它！\n\
  \n控制器会调用 `BJDGameModel` 的 `resetGame` 方法。这正是我们需要生成一副牌的地方。目前，`cards` 被设置为一个空数组：\n\
  \n```\nself.cards = [NSMutableArray array];\n```\n\n我们可以直接在 `BJDGameModel` 类中编写一个循环，但在其他纸牌游戏中，我们可能也需要生成一副\
  \ 52 张的牌。在我看来，为 `BJDCard` 类本身创建一个便捷方法会更合适。我们已经看到一些类，比如 `NSArray` 和 `NSDictionary`，如何通过工厂/便捷方法来生成自身的实例。在本例中，我们将在\
  \ `BJDCard` 上创建一个类方法，用于生成一个包含 52 个 `BJDCard` 实例的可变数组！\n\n切换到助理编辑器，开始处理 `BJDCard`\
  \ 类。你是否发现，在 Xcode 中，你可以同时打开多个 Objective-C 文件？你甚至可以设置多个文件全部使用助理编辑器布局。在 Xcode 中，默认情况下，双击项目导航器中的文件会打开一个新窗口。我更喜欢使用多个标签页而非窗口。要将\
  \ Xcode 设置为打开新标签页而非新窗口，请进入 Xcode 的通用偏好设置，在“双击导航”下，将所选选项更改为“使用单独的标签页”。\n\n现在查看 `BJDCard.h`，让我们在头文件中声明这个新的类方法：\n\
  \n```\n+(NSMutableArray *) generateAPackOfCards;\n```\n\n你是否注意到类方法与实例方法（该类中的其他三个方法）在语法上的细微差别？声明类方法的语法是在声明开头使用“`+`”而不是“–”。现在切换到源文件中的\
  \ `BJDCard.m`，并添加以下代码：\n\n```\n+(NSMutableArray *) generateAPackOfCards\n{\n   \
  \ NSMutableArray *arr = [NSMutableArray array];\n\n    BJDCard *card;\n\n    int\
  \ suit,digit;\n\n    for (suit=0;suit<4;suit++) {\n        for (digit=1;digit<=13;digit++)\n\
  \        {\n            card = [[BJDCard alloc] init];\n            card.suit =\
  \ suit;\n            card.digit = digit;\n            [arr addObject:card];\n  \
  \      }\n    }\n\n    return arr;\n}\n```\n\n浏览这段代码，你会发现我们建立了一个嵌套循环。第一个外层循环迭代四次：每种花色一次。因此，生成牌的四分之一的花色设为\
  \ 0，四分之一的花色设为 1，以此类推。你还记得我们自定义的花色枚举器 `BJCardSuit` 吗？以下是帮助回想的代码：\n\n```\ntypedef\
  \ enum : int\n{\n    BJCardSuitClub = 0,\n    BJCardSuitSpade,\n    BJCardSuitDiamond,\n\
  \    BJCardSuitHeart\n}BJCardSuit;\n```\n\n通过这种声明语法，编译器将整数 0 分配为 `BJCardSuitClub`，整数\
  \ 1 分配为 `BJCardSuitSpade`，依此类推。因此，在我们的 `generateAPackOfCards` 方法中，这些花色值将与原始枚举声明中的枚举值相匹配。\n\
  \n回到 `generateAPackOfCards` 的分析，你会看到我们首先声明了一个空的局部作用域可变数组：\n\n```\nNSMutableArray\
  \ *arr = [NSMutableArray array];\n```\n\n然后，在我们循环的核心部分，我们 `alloc`/`init` 了新的 `BJDCard`\
  \ 实例，设置其花色和数字，然后通过可变数组的实例方法 `addObject:` 将它们添加到局部数组中。\n\n完成后，我们返回该数组。\n\n编译并运行你的应用，确认仍然没有错误！\n\
  \n我们完成了二十一点游戏中 `BJDCard` 类的开发。现在，我们将对 `BJDGameModel` 进行一些修改，以利用刚刚编写的新的 `generateAPackOfCards`\
  \ 方法。\n\n在 `BJDGameModel` 中，将 `resetGame` 方法实现中的这行代码：\n\n```\nself.cards = [NSMutableArray\
  \ array];\n```\n\n替换为：\n\n```\nself.cards = [BJDCard generateAPackOfCards];\n```\n\
  \n太好了，我们的数组里有了 52 张牌！唯一的问题是牌没有洗过。嗯……这样的二十一点游戏会相当无聊。解决方案是什么呢？\n\n#### 洗牌：Objective-C\
  \ 类别\n\n遗憾的是，Objective-C 的 `NSMutableArray` 类没有洗牌方法。因此，我们需要自己编写一个。但是，对于可变数组来说，洗牌不是一种非常有用的附加方法吗？如果能把我们的方法添加到\
  \ `NSMutableArray` 类中，是不是很酷？猜猜怎么着？我们可以通过 Objective-C 类别来实现！\n\n向现有类添加类别通常需要创建一个新的\
  \ Objective-C 头文件和源文件。我们将文件添加到 `data` 组中，因此打开项目导航器并确保选中了 `data`。现在，再次使用 ![图像](img/U002a.jpg)N\
  \ 快捷键或 文件 ![图像](img/U001.jpg) 新建 ![图像](img/U001.jpg) 新建文件，从 Cocoa Touch 文件模板中选择\
  \ Objective-C 类别选项。在下一个屏幕中，在“类别”文本字段中输入 **Shuffle**，在“类别于”文本字段中输入 **NSMutableArray**（参见图\
  \ 4-17）。\n\n![图像](img/9781430243748_Fig04-17.jpg)\n\n**图 4-17.** 向 NSMutableArray\
  \ 添加 Objective-C 类别\n\n在 Finder 的 data 文件夹中创建新文件。确保你在助理编辑器布局中查看新创建的 `NSMutableArray+Shuffle`\
  \ 头文件和源文件。\n\n*提示：偶尔 Xcode 不会在助理布局中自动显示对应的头文件/源文件。要解决此问题，请点击跳转栏，并将所选选项更改为“对应文件”。*\n\
  \n你会看到，类别文件的布局与类文件类似，但请注意，在接口关键字后的括号内添加了类别名称。按如下方式修改类别头文件：\n\n```\n#import <Foundation/Foundation.h>\n\
  @interface NSMutableArray (Shuffle)\n\n- (void) shuffle;\n\n@end\n```\n\n现在修改源实现，包含新的洗牌方法：\n\
  \n```\n#import \"NSMutableArray+Shuffle.h\"\n\n@implementation NSMutableArray (Shuffle)\n\
  \n- (void)shuffle\n{\n    int count = [self count];\n\n    NSMutableArray *dupeArr\
  \ = [self mutableCopy];\n    count = [dupeArr count];\n    [self removeAllObjects];\n\
  \n    for (int i = 0; i < count; ++i) {\n        // 选择一个介于 i 和数组末尾之间的随机元素进行交换。\n\
  \        int nElements = count - i;\n        int n = (arc4random() % nElements);\n\
  \        [self addObject:dupeArr[n]];\n        [dupeArr removeObjectAtIndex:n];\n\
  \    }\n\n}\n\n@end\n```\n\n我们的自定义洗牌方法执行以下过程：\n\n> * 创建可变数组的副本。\n> * 清空数组。\n> *\
  \ 循环遍历副本数组，随机抽取元素（在我们的应用中，这些是 `BJDCard` 的实例），将它们重新添加到可变数组中，并从副本中移除它们。\n\n洗牌类别创建完毕：现在回到\
  \ `BJDGameModel`。\n\n为了让编译器允许我们在 `NSMutableArray` 上调用新的洗牌类别方法，我们需要导入刚刚创建的文件。因此，在\
  \ `BJDGameModel.m` 的顶部添加 import 声明：\n\n```\n#import \"NSMutableArray+Shuffle.h\"\
  \n```\n\n现在，你应该能够在生成牌组后，直接在 `self.cards` 上调用 `shuffle` 方法。因此，`resetGame` 方法最终应如下所示：\n\
  \n```\n-(void) resetGame\n{\n    self.cards = [BJDCard generateAPackOfCards];\n\n\
  \    [self.cards shuffle];\n\n    self.playerCards = [NSMutableArray array];\n \
  \   self.dealerCards = [NSMutableArray array];\n    self.gameStage = BJGameStagePlayer;\n\
  }\n```\n\n很酷，对吧？\n\n\n\n### 在我们的二十一点游戏中\n\n在我们的二十一点游戏中，由模型来决定游戏何时结束。游戏结束可能有几种原因：玩家点数爆掉、庄家点数爆掉、庄家拿到第五张牌达到上限、或者庄家停牌。控制器\
  \ `BJViewController` 需要在游戏结束时更新视图，告知用户谁赢了，并允许他重新开始游戏。然而，根据 MVC 模式的规则，模型必须对视图和控制器保持无知。那么，我们该如何向\
  \ `BJViewController` 发出游戏结束的事件警报呢？\n\n答案是苹果的 `NSNotificationCenter`。\n\n### 在类之间分发通知\n\
  \n苹果友好地为 Cocoa 开发者提供了 `NSNotificationCenter`，这消除了使用任何第三方架构框架的大部分理由。我记得过去，成为一名优秀的\
  \ Flash 和 Flex 开发者不仅仅在于知道如何编写优秀的 ActionScript，还在于在构建复杂的 Web 应用和游戏时，该从众多第三方框架中选择哪一个——例如\
  \ PureMVC、Cairngorm、Swiz 和 Robotlegs。\n\n不过，对于 iOS SDK 应用开发来说，忘掉那些第三方架构框架吧；通知中心为所有\
  \ Objective-C 对象添加了原生的广播和观察者机制。我们的模型将能够向程序的无尽深处发送一个通知。只要我们的视图控制器（或任何其他对象）已注册为自定义通知的观察者，我们就可以放心，视图控制器会捕获该事件，做出响应，并相应地更新视图。\n\
  \n那么，让我们从模型中添加一个通知分发。\n\n每个分发的通知必须是 `NSNotification` 的一个实例，它有一个 `name` 属性，供观察类在注册通知时使用。因此，我们需要在常量字符串中定义游戏结束通知的名称。\n\
  \n就在 `BJDGameModel.h` 头文件的顶部，定义通知名称：\n\n`#define BJNotificationGameDidEnd    @\"\
  BJNotificationGameDidEnd\"`\n\n有些开发者会单独用一个文件来存放常量声明。在声明通知名称的情况下，另一种常见的做法是将通知名称声明添加到分发类的头文件中，就像我们刚刚做的那样。\n\
  \n现在，切换到 `BJGameModel` 的源文件，找到 `notifyGameDidEnd` 方法。该方法目前是空的。不过，`BJDGameModel`\
  \ 已经在游戏结束的所有节点调用了这个方法。在发送通知时，我们需要实现两个目标：提醒所有观察对象游戏已结束，并让他们知道谁赢了。按照以下方式更新 `notifyGameDidEnd`：\n\
  \n```\n-(void) notifyGameDidEnd\n{\n    NSNotificationCenter *notificationCenter\
  \ = [NSNotificationCenter defaultCenter];\n\n    // 使用字面量语法将布尔值包装成 NSNumber 对象\n\
  \    NSNumber *didDealerWin = @(self.didDealerWin);\n\n    // 使用字面量语法创建字典\n    NSDictionary\
  \ *dict = @{@\"didDealerWin\": didDealerWin};\n\n    [notificationCenter postNotificationName:BJNotificationGameDidEnd\
  \ object:self\nuserInfo:dict];\n}\n```\n\n我知道这包含了很多新代码需要消化，让我们一步步来理解。通知广播是通过 `NSNotificationCenter`\
  \ 的一个实例发送的。我们甚至不需要担心实例化这个类，因为 Cocoa 已经在后台创建了一个默认的单一实例，我们可以通过 `NSNotificationCenter`\
  \ 的便捷方法 `defaultCenter` 来访问它。\n\n接下来，我们需要在通知中包含庄家或玩家是否获胜的详细信息。我们要发送的通知对象允许我们在其 `userInfo`\
  \ 属性中包含一个 `NSDictionary` 实例。这就是我们在下一行代码中创建 `NSDictionary` 的原因。\n\n问题在于 `self.didDealerWin`\
  \ 属性是一个布尔型原始值。原始数据类型不能直接作为字典或数组中的值来设置。解决方案是将布尔型原始值包装在一个对象中，并将指针传递给字典。我们通过创建 `NSNumber`\
  \ 类的一个实例来实现这一点。\n\n**注意：** 原始数据类型不能直接作为字典或数组中的值来设置。请将原始值包装在 `NSNumber` 类的实例中。你可以在\
  \ `NSNumber` 实例中包装浮点数、整数和布尔值。\n\n最后，我们通过单一的默认 `NSNotificationCenter` 发布通知：\n\n```\n\
  [notificationCenter postNotificationName:BJNotificationGameDidEnd object:self userInfo:dict];\n\
  ```\n\n此方法使用给定的名称（`BJNotificationGameDidEnd` 常量字符串）、发送者（我们的 `BJDGameModel` 类实例）和信息（我们的字典实例及获胜者数据）创建一个通知，并将其发布给已注册的通知观察者。\n\
  \n构建并运行，然后检查你的代码是否能成功编译。我们的模型部分已经完成：现在回到 `BJViewController` 来将所有内容串联起来！\n\n\n\n\
  ### 串联所有组件\n\n剩下的工作都在 `BJViewController` 的源实现文件中。我们终于能看到在视图中构建模型所付出的辛勤劳动的成果了！\n\n\
  关闭所有模型类，在标准编辑器中仅打开 `BJViewController.m`。首先导入 `BJDGameModel.h` 和 `BJDCard.h`：\n\n\
  ```\n#import \"BJViewController.h\"\n#import \"BJDGameModel.h\"\n#import \"BJDCard.h\"\
  \n```\n\n现在向 `BJViewController.m` 源文件的私有类扩展中添加新的私有模型属性：\n\n```\n@interface BJViewController\
  \ ()\n\n@property (nonatomic,strong) NSArray *dealerCardViews;\n@property (nonatomic,strong)\
  \ NSArray *playerCardViews;\n@property (nonatomic,strong) BJDGameModel *gameModel;\n\
  @end\n```\n\n在 `BJViewController.m` 的实现中，为两个新的私有方法添加占位符：\n\n```\n- (void)renderCards\n\
  {\n\n}\n\n- (void)restartGame\n{\n\n}\n```\n\n*注意：为避免在 Xcode 4.5 之前的版本中产生编译器警告，你需要在类扩展中声明私有方法签名，或者将方法实现放在实现文件的高处并位于所有调用者之前。现在这已成为过去式，你可以按照自己的喜好排列私有方法顺序，无需声明方法签名。*\n\
  \n此外，我们将在子类中重写 `UIViewController` 的指定初始化方法，如下所示：\n\n```\n-(id) initWithCoder:(NSCoder\
  \ *)aDecoder\n{\n    self = [super initWithCoder:aDecoder];\n    if (self) {\n \
  \       self.gameModel = [[BJDGameModel alloc] init];\n        [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n                                            \
  \    selector:@selector(handleNotificationGameDidEnd:)\n                       \
  \                             name:BJNotificationGameDidEnd\n                  \
  \                                object:self.gameModel];\n    }\n    return self;\n\
  }\n```\n\n`UIViewController` 有多个指定初始化方法：`initWithCoder:` 和 `initWithNibName:bundle:`。然而，当从故事板实例化时，`initWithCoder:`\
  \ 是自动调用的初始化方法。\n\n在我们的 `BJViewController` 指定初始化方法中，我们做了两件事：实例化 `BJDGameModel` 的实例，并注册在游戏结束时接收来自模型的通知。我们已经为游戏结束通知进行了注册，以便触发我们在视图控制器中尚未编写的方法：`handleNotificationGameDidEnd:`。\n\
  \n在 `NSNotificationCenter` 的 `addObserver` 方法中使用 `@selector` 指令，类似于本章开头介绍的 Interface\
  \ Builder 中 `UIControl` 目标-动作机制。当游戏结束时，`BJDGameModel` 通过通知中心发送一条新通知，该通知进而调用观察类 `BJViewController`\
  \ 中的 `handleNotificationGameDidEnd` 方法。\n\n我们将在本章末尾实现 `handleNotificationGameDidEnd`\
  \ 方法。接下来，请你为新方法 `restartGame` 添加完整代码：\n\n```\n- (void)restartGame\n{\n    [self.gameModel\
  \ resetGame];\n    BJDCard *card;\n\n    card = [self.gameModel nextPlayerCard];\n\
  \    card.isFaceUp = YES;\n    card = [self.gameModel nextDealerCard];\n    card.isFaceUp\
  \ = YES;\n\n    card = [self.gameModel nextPlayerCard];\n    card.isFaceUp = YES;\n\
  \n    [self.gameModel nextDealerCard];\n\n    [self renderCards];\n\n    self.standButton.enabled\
  \ = self.hitButton.enabled = YES;\n}\n```\n\n`restartGame` 方法首先调用模型的 `resetGame`\
  \ 方法。我们最近在 `BJDGameModel` 中完成了 `resetGame` 方法——我们生成了一个新的洗牌牌组，并清空用于跟踪庄家和玩家手牌的数组。\n\
  \n接下来，我们指示模型向庄家和玩家各发两张牌。请注意，我们仅将庄家的第一张牌设置为正面朝上，而不是第二张。这一指令将在我们尚未编写的 `renderCards`\
  \ 方法中渲染到视图中。\n\n我们还启用了玩家的停牌和要牌按钮，因为在二十一点中玩家先出牌。当轮到庄家出牌时，我们将禁用这些按钮。\n\n\n\n在我们的视图控制器中，有两个地方需要调用`restartGame`：1）当游戏结束且玩家希望重新游戏时，2）视图首次显示在屏幕上时。为了适应第二种场景，我们需要在`BJViewController`的哪个方法中添加对`restartGame`的调用？你还记得本章开头介绍的视图生命周期吗？我们之前在`viewDidLoad`方法中初始化了`dealerCardViews`和`playerCardViews`数组属性。对于我们的应用来说，这个方法非常适合调用`[self\
  \ restartGame]`。另一个同样合适的方法是`viewWillAppear:`。`viewWillAppear:`在视图显示在屏幕上的前一刻被调用。我们将在应用显示视图之前重启游戏并渲染视图：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    [self restartGame];\n}\n```\n\n准备好了吗？现在让我们实现`renderCards`方法：\n\n```\n- (void)renderCards\n\
  {\n    int maxCard = self.gameModel.maxPlayerCards;\n\n    BJDCard *dealerCard;\n\
  \    BJDCard *playerCard;\n    UIImageView *dealerCardView;\n    UIImageView *playerCardView;\n\
  \n    for (int i=0; i<maxCard; i++) {\n        dealerCardView = self.dealerCardViews[i];\n\
  \        playerCardView = self.playerCardViews[i];\n\n        dealerCard = [self.gameModel\
  \ dealerCardAtIndex:i];\n        playerCard = [self.gameModel playerCardAtIndex:i];\n\
  \n        dealerCardView.hidden = (dealerCard == nil);\n        if (dealerCard &&\
  \ dealerCard.isFaceUp) {\n            dealerCardView.image = [dealerCard getCardImage];\n\
  \        }\n        else {\n            dealerCardView.image = [UIImage imageNamed:@\"\
  card-back.png\"];\n        }\n\n        playerCardView.hidden = (playerCard == nil);\n\
  \        if (playerCard && playerCard.isFaceUp) {\n            playerCardView.image\
  \ = [playerCard getCardImage];\n        }\n        else {\n            playerCardView.image\
  \ = [UIImage imageNamed:@\"card-back.png\"];\n        }\n    }\n}\n```\n\n好，激动人心的时刻到了。首先，我们在本地方法作用域中声明了一些变量：`maxCard`（每位玩家五张牌）；`dealerCard`和`playerCard`（`BJDCard`的实例）；以及`dealerCardView`和`playerCardView`（我们在本章开头添加到故事板中的`UIImageView`实例）。\n\
  \n我们循环执行主代码块五次，在每次迭代中，为卡牌模型和视图变量赋值。请注意，我们直接从`BJDGameModel`类的公开方法`dealerCardAtIndex`和`playerCardAtIndex`中获取`dealerCard`和`playerCard`的卡牌模型。如果你研究这些方法，会发现它们要么返回`BJDCard`实例，要么在索引大于玩家卡牌数组最高索引时返回`nil`，例如`[self.gameModel\
  \ dealerCardAtIndex:2]`在庄家只有两张牌（索引 0 和 1）时会返回`nil`。\n\n如果返回的卡牌是`nil`，我们就简单地隐藏对应的卡牌视图，因为这表示该牌尚未被发放：\n\
  \n```\ndealerCardView.hidden = (dealerCard == nil);\n```\n\n以及\n\n```\nplayerCardView.hidden\
  \ = (playerCard == nil);\n```\n\n如果对应的卡牌不是`nil`，我们还会检查`BJDCard`实例是否是正面朝上的。如果是正面朝上，我们会使用我们编写的`getCardImage`方法来获取一张图片，并设置到`UIImageView`上。如果卡牌是背面朝上的，我们将`UIImageView`中显示的图片默认设置为卡牌背面图片：\n\
  \n```\ndealerCardView.image = [UIImage imageNamed:@\"card-back.png\"];\n```\n\n\
  一旦你将这些代码全部添加到`renderCards`方法中，你会发现当你构建并运行应用时，发给庄家和玩家的卡牌将会被渲染出来（参见图 4-18）。\n\n![Image](img/9781430243748_Fig04-18.jpg)\n\
  \n**图 4-18.** 嗯……我应该停牌还是叫牌？\n\n事情开始有眉目了！我想玩游戏，但“停牌”和“叫牌”按钮目前什么都没做。让我们来改变这一点。\n\n\
  好吧，我又作弊了，行吗？我预先编写了一些用于自动化庄家回合的代码，所以首先，向下滚动`BJViewController`并取消注释以下三个私有庄家方法：\n\n\
  ```\n#pragma mark - Automated Dealer Play\n\n-(void) showSecondDealerCard\n{\n \
  \   BJDCard *card = [self.gameModel lastDealerCard];\n    card.isFaceUp = YES;\n\
  \    [self renderCards];\n    [self.gameModel updateGameStage];\n    if (self.gameModel.gameStage\
  \ != BJGameStageGameOver) {\n        [self performSelector:@selector(showNextDealerCard)\
  \ withObject:nil afterDelay:0.8];\n    }\n\n}\n\n-(void) showNextDealerCard\n{\n\
  \    //next card\n    BJDCard *card = [self.gameModel nextDealerCard];\n    card.isFaceUp\
  \ = YES;\n    [self renderCards];\n    [self.gameModel updateGameStage];\n    if\
  \ (self.gameModel.gameStage != BJGameStageGameOver) {\n        [self performSelector:@selector(showNextDealerCard)\
  \ withObject:nil afterDelay:0.8];\n    }\n}\n\n- (void)playDealerTurn {\n    self.standButton.enabled\
  \ = self.hitButton.enabled = NO;\n    [self performSelector:@selector(showSecondDealerCard)\
  \ withObject:nil afterDelay:0.8];\n}\n```\n\n`showSecondDealerCard`、`showNextDealerCard`和`playDealerTurn`都是我编写的用于自动化庄家回合的方法。因此，一旦玩家的回合结束，想法是首先调用`playDealerTurn`。这个方法做的第一件事是通过禁用“停牌”和“叫牌”按钮来阻止任何按钮交互。\n\
  \n接下来，我们利用`NSObject`中非常方便的`performSelector:withObject:afterDelay`方法，该方法支持延迟方法调用。延迟以秒为单位定义，因此我们在每次发牌和渲染给庄家之间设置了\
  \ 0.8 秒的延迟。\n\n`showNextDealerCard`和`playDealerTurn`几乎完全相同。唯一的区别在于，当庄家的第二张牌被翻开时，它已经被发过了，所以我们调用：\n\
  \n```\nBJDCard *card = [self.gameModel lastDealerCard];\n```\n\n而不是：\n\n```\nBJDCard\
  \ *card = [self.gameModel nextDealerCard];\n```\n\n每张牌发完后并渲染后，控制器还会让模型更新游戏阶段；也就是说，如果庄家达到了五张牌的上限或爆牌，游戏结束。\n\
  \n\n\n#### 响应用户交互\n\n在庄家行动之前，我们需要编写`Hit`和`Stand`按钮的操作方法代码。`Stand`方法很直接：\n\n```\n\
  - (IBAction)didTapStandButton:(id)sender {\n    self.gameModel.gameStage = BJGameStageDealer;\n\
  \    [self performDealerTurn];\n}\n```\n\n控制器告知模型游戏阶段已推进到庄家回合，随后我们将调用`performDealerTurn()`方法。\n\
  \n`Hit`方法稍复杂一些：\n\n```\n- (IBAction)didTapHitButton:(id)sender {\n    BJDCard *card\
  \ = [self.gameModel nextPlayerCard];\n    card.isFaceUp = YES;\n    [self renderCards];\n\
  \n    [self.gameModel updateGameStage];\n    if (self.gameModel.gameStage == BJGameStageDealer)\
  \ {\n        [self performDealerTurn];\n    }\n}\n```\n\n首先，控制器请求模型发一张玩家牌。控制器在视图中正面朝上渲染这张牌。接着控制器告知模型更新游戏阶段——即游戏可能已结束，因为玩家爆牌或摸到五张牌的上限。`BJViewController`通过检查确认玩家回合是否结束，若是则执行自动庄家方法：\n\
  \n```\nif (self.gameModel.gameStage == BJGameStageDealer) {\n    [self performDealerTurn];\n\
  }\n```\n\n太棒了！现在你可以完整玩一局二十一点了！构建并运行试试看。\n\n哎呀，你的应用是不是在游戏结束时崩溃了？我们遗漏了什么？\n\n啊对了，我们从未在`BJViewController`中实现`handleNotificationGameDidEnd:`方法。还记得我们在该类的指定初始化方法中订阅的那个通知吗？我们需要添加那个方法！代码如下：\n\
  \n```\n-(void) handleNotificationGameDidEnd:(NSNotification *)notification\n{\n\
  \    NSDictionary *userInfo = notification.userInfo;\n\n    NSNumber *num = userInfo[@\"\
  didDealerWin\"];\n\n    NSString *message = [num boolValue] ? @\"庄家赢了！\" : @\"你赢了！\"\
  ;\n\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"游戏结束\" message:message\n\
  \    delegate:nil cancelButtonTitle:nil otherButtonTitles:@\"再来一局\", nil];\n   \
  \ [alert show];\n}\n```\n\n在我们的通知处理程序中，通过`userInfo`属性就能提取获胜者信息。我们预期得到一个字典，其中包含包装了布尔基本类型的`NSNumber`属性。因此我们还需提取基本布尔值来判断庄家是否获胜：\n\
  \n```\nNSString *message = [num boolValue] ? @\"庄家赢了！\" : @\"你赢了！\";\n```\n\n最终得到获胜信息，并在警告视图中显示（参见图\
  \ 4-19）。\n\n![图片](img/9781430243748_Fig04-19.jpg)\n\n**图 4-19** 耶！我花了五次构建运行才截到一张获胜截图！\n\
  \n#### 协议与委托模式\n\n不过我们还没完全完成。应用不再崩溃，但一旦关闭警告视图，游戏就结束了。按钮被禁用，我们无法重新开始游戏。这可不行！我们要将确定按钮改为\"\
  再来一局\"，并在按钮按下时重新开始游戏。\n\n如何知道按钮被按下？`UIAlertView`类并未暴露其按钮属性，因此我们无法在此实例中利用目标-动作机制。相反，与\
  \ Apple iOS SDK 的许多组件一样，`UIAlertView`采用了委托模式。\n\n`UIAlertView`有一个名为**委托**的弱引用属性。只要对象实现了`UIAlertViewDelegate`协议，`UIAlertView`不关心哪个对象想成为其委托。**协议**类似于类接口：它定义了协议将要实现的一组方法签名。但协议也可以定义*可选*方法签名。为了让`BJViewController`将自己设为警告视图的委托，它需要先声明实现了`UIAlertViewDelegate`协议。为此，我们暂时切换到`BJViewController`的头文件。\n\
  \n将接口声明的第一行从\n\n`@interface BJViewController : UIViewController`\n\n改为\n\n`@interface\
  \ BJViewController : UIViewController <UIAlertViewDelegate>`\n\n如果你查看`UIAlertViewDelegate`的头文件，会发现其所有方法都是可选的。因此即使我们尚未添加任何`UIAlertViewDelegate`协议方法，编译器也不会生成任何关于代码的警告。\n\
  \n**注：**当一个类声明实现包含必需方法的协议时，如果类没有实际实现这些方法，编译器会显示警告。\n\n现在回到`BJViewController`的源文件。我们需要对`handleNotificationGameDidEnd:`方法中显示警告的代码做一点小改动：\n\
  \n```\nUIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"游戏结束\" message:message\n\
  \    delegate:self cancelButtonTitle:nil otherButtonTitles:@\"再来一局\", nil];\n[alert\
  \ show]\n```\n\n注意到我们现在已将自身设为警告视图的委托了吗？\n\n最后，我们要向`BJViewController`的实现中添加一个`UIAlertViewDelegate`方法：\n\
  \n```\n- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
  {\n    [self restartGame];\n}\n```\n\n**提示：**添加委托方法时，快速实现方法代码的方式是从 Organizer 文档中直接复制并粘贴到你的类中。\n\
  \n就是这样，我们完成了！现在你应该可以构建并运行游戏——并且一遍又一遍地玩二十一点了。\n\n### 本章小结\n\n这是一段史诗般的旅程！在本章中我们接触了\
