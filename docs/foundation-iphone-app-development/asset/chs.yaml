- '# 第 13 章


  '
- "# 发布前：提高在 App Store 成功的机会\n\n恭喜，你已经坚持到了第五天！事实上，你不仅坚持到了第五天，而且还已经构建了一个完整的 iPhone\
  \ 应用。\n\n但工作尚未结束。如果你像许多其他应用开发者一样，错误地认为一旦构建了一个好应用、提交到 App Store 后，就可以坐等收钱——那么，哦，孩子，你还没开始就已经失败了。\n\
  \n你的应用只是 App Store 海洋中的一条小鱼。无论你的应用有多出色，如果人们无法发现它，那么前方的旅程注定令人沮丧！仅仅做出优秀的产品远远不够，你还需要花更多时间进行市场营销。这在\
  \ App Store 并非独特的概念，但在苹果生态系统中确实普遍存在。\n\n我们可以在*生日提醒*中添加什么，来利用数百万潜在用户？答案是应用内营销：鼓励并让现有用户传播他们发现了一款出色应用的消息。\n\
  \n在一个由互联网驱动通信、社交网络为王的世界里，如果我们不至少利用 Twitter 和 Facebook 集成来让用户与朋友和关注者分享*生日提醒*的详细信息，那我们就太傻了。\n\
  \n在昨天的第 11 章中，我们学习了如何将 Facebook 深度集成到应用中。在分享方面，我们还可以利用强大的 Graph API 做更多事情。当 Chris\
  \ 和我构建*Tap to Chat*（一款用于 Facebook Chat 和 Google Talk 的即时通讯应用）时，我们在第一年就实现了超过一百万次下载。*Tap\
  \ to Chat*成功的原因之一（除了它本身就是一款出色的应用！）是我们在应用中构建了一个自定义分享组件，使用户能够非常、非常轻松地发布到多个好友墙。由于大量用户直接将应用详情分享到好友墙，朋友的朋友发现了我们的应用，我们的用户群因此迅速增长。如果你的目标用户是重度\
  \ Facebook 使用者，这种应用内营销可以非常强大：而我们的用户正是如此。\n\n\n### 获取更多 5 星 App Store 评分\n\n在第 1\
  \ 章中，我谈到了获得良好 App Store 评价的重要性。你的应用获得的五星好评越多越好（参见图 13-1）。\n\n![Image](img/9781430243748_Fig13-01.jpg)\n\
  \n**图 13-1.** *生日提醒*在美国 App Store 的正式版本\n\n浏览 App Store 的用户更倾向于下载那些拥有大量好评和高星级评分的应用，而不是那些充斥着\
  \ 1 星差评和负面评价的应用。这是显而易见的道理。\n\n不过，你需要了解许多关于 App Store 的事实。每个国家都有自己的 App Store。用户浏览的\
  \ App Store 版本直接与其 Apple 账户挂钩：如果用户在美国注册了 Apple 账户，那么他默认会浏览美国的 App Store。如果用户的 Apple\
  \ ID 是在英国注册的，那么她就会浏览英国的 App Store。这意味着所有的评价、评分和排行榜位置都是针对具体国家的。你的应用可能在英国表现极佳，但如果在美国的下载量很少，那么完全相同的应用在美国就可能毫无踪影（没错，我就遇到过这种情况！）。关于这一点，还需注意，通常一个应用在其类别中攀升至英国、法国、德国等国榜首时，其收入远低于攀升至美国排行榜榜首的应用。美国\
  \ iOS 用户在付费应用上的花费超过其他任何国家。但这并不意味着你应该只针对美国用户；你的目标市场取决于你开发的应用类型。\n\n不过有一件事是确定的：如果你的应用获得了下载量，你需要确保那些满意的用户对你的应用进行评分和评价。为了让用户评分和评价你的应用，他们要么需要（a）足够喜爱（或憎恨）你的应用而愿意付出努力，然后（b）在评价之前，需要访问\
  \ App Store 搜索并找到你的应用。那么，为什么不让他们轻松一些呢？可以在用户使用应用几天后（想必是愉快的几天！）鼓励他们对应用进行评分。有一个适用于\
  \ iOS 应用的优秀开源 Objective-C 类库，名为`Appirater`，正是为此而设。你可以从 GitHub 下载`Appirater`，地址是：[`https://github.com/arashpayan/appirater`](https://github.com/arashpayan/appirater)。\n\
  \n到目前为止，我们还没有使用任何第三方代码或库，但既然有经过验证的方法可以鼓励用户对 iOS 应用进行评分，我认为没必要为我们的项目重新发明轮子。\n\n在\
  \ Finder 中，于项目的根层级创建一个名为`support`的新文件夹。添加一个名为`Appirater`的子文件夹，然后将你刚从 GitHub 下载的文件复制进去，如图\
  \ 13-2 所示。`Appirater`很可能在我撰写本章后有所变化，因此我也在源代码中包含了当时使用的版本。\n\n![Image](img/9781430243748_Fig13-02.jpg)\n\
  \n**图 13-2.** 添加`Appirater`，将第三方代码单独放在`support`文件夹中\n\n现在，将`support`文件夹及其内容添加到你的*生日提醒*项目中。此时，你可能会发现项目无法编译，并出现编译器错误。这是因为我们的应用使用了\
  \ ARC（自动引用计数），而`Appirater`没有。别慌，年轻的 Daniel-san。幸运的是，苹果公司已有先见之明，认识到有时兼容 ARC 的项目也可能需要包含不兼容\
  \ ARC 的类。以下是消除这些编译器错误的方法。选择你的*BirthdayReminder*项目，然后选择`BirthdayReminder`目标。选择“Build\
  \ Phases”标签，并打开“Compile Sources”部分。我们将为问题文件`Appirater.m`添加一个编译器标志，该文件应列在“Compile\
  \ Sources”列表的末尾。双击该类文件，并输入`-fno-objc-arc`编译器标志，如图 13-3 所示。\n\n![Image](img/9781430243748_Fig13-03.jpg)\n\
  \n**图 13-3.** 将非 ARC 文件集成到 ARC 项目中\n\n这应该能解决与 ARC 相关的错误，并产生一些新的错误。好耶！这些新错误与`Appirater`依赖的缺失框架有关。我们需要将苹果的`CFNetwork`和`SystemConfiguration`框架添加到我们的项目中。还记得怎么做吗？停留在目标项目设置的“Build\
  \ Phases”标签，并打开“Link Binary Files with Libraries”面板。点击+按钮添加`CFNetwork.framework`和`SystemConfiguration.framework`，如图\
  \ 13-4 所示。\n\n![Image](img/9781430243748_Fig13-04.jpg)\n\n**图 13-4.** 向我们的项目添加`CFNetwork.framework`和`SystemConfiguration.framework`\n\
  \n现在你应该能够毫无问题地构建和运行你的应用了。\n\n按照`Appirater`的 README 文件中的*入门*说明，接下来我们需要打开`BRAppDelegate.m`并导入`Appirater.h`。然后找到`application:didFinishLaunchingWithOptions:`方法，并修改它，让`Appirater`知道应用已启动：\n\
  \n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    [BRStyleSheet initStyles];\n    [Appirater appLaunched:YES];\n\
  \    return YES;\n}\n```\n\n现在，对委托的`applicationWillEnterForeground:`方法进行以下修改：\n\n\
  ```\n- (void)applicationWillEnterForeground:(UIApplication *)application\n{\n  \
  \  [Appirater appEnteredForeground:YES];\n}\n```\n\n\n\n### 配置 Appirater\n\n要配置\
  \ `Appirater`，你需要手动编辑 `Appirater.h` 头文件。\n\n首先需要修改的是将 `APPIRATER_APP_ID` 常量声明替换为你的应用的数字\
  \ ID。这是一个数字 ID，只有在你创建了要提交到 iTunes Connect 的新应用后才能获取。我们将在第 14 章中介绍 iTunes Connect，所以现在只需使用\
  \ *生日提醒* 的正式 App ID：\n\n```\n#define APPIRATER_APP_ID                   489537509\n\
  ```\n\n接着，更改提示框引用我们应用时使用的名称：\n\n```\n#define APPIRATER_APP_NAME                \
  \ @\"生日提醒\"\n```\n\n默认情况下，`Appirater` 使用我们应用的项目名称，即不带空格的 `BirthdayReminder`：这样对用户不太友好。\n\
  \n如果尚未开启，请打开 `Appirater` 的调试模式：\n\n```\n#define APPIRATER_DEBUG                \
  \ YES\n```\n\n在 iPhone 或 iPod Touch 上构建并运行 *生日提醒*，因为指向 App Store 的链接在 iOS 模拟器中无法使用。\n\
  \n由于我们已经开启了 `Appirater` 的调试模式，可以立即看到评分提示最终向用户显示时的效果（参见图 13-5）。\n\n![图片](img/9781430243748_Fig13-05.jpg)\n\
  \n**图 13-5.** 用户友好的 `Appirater` 提示框\n\n以前，点击“评分生日提醒”会直接将用户链接到 App Store 中你应用的“撰写评论”界面。然而，在\
  \ iOS 6 中，苹果重新设计了 App Store，据我所知，已经无法直接链接到应用的评论撰写界面了。因此，我们只能选择将用户引导至应用在 App Store\
  \ 的主页。要在 `Appirater` 中解决这个问题，请切换到 `Appirater.m`，并将 `templateReviewURL` 的值修改如下：\n\
  \n```\nNSString *templateReviewURL =\n@\"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=APP_ID&mt=8\"\
  ;\n```\n\n构建并运行。测试“评分生日提醒”按钮链接。你应该会进入 *生日提醒* 在 App Store 的主界面。\n\n首次提交应用时使用 `Appirater`\
  \ 可能会有些不安，因为当你的应用尚未上线时，链接无法工作。但只要应用通过苹果审核，链接就会生效——只要别搞错你的 App ID 就行！请反复检查、再检查。\n\
  \n在 `Appirater.h` 中，将 `APPIRATER_DEBUG` 常量恢复为 `NO`。默认情况下，`Appirater` 至少会在 30 天过去或用户运行应用\
  \ 20 次后才会向用户显示评分请求。这些参数我们都可以更改。我个人倾向于在使用一周后请求评分：\n\n```\n#define APPIRATER_DAYS_UNTIL_PROMPT\
  \        7        // double\n#define APPIRATER_USES_UNTIL_PROMPT        5      \
  \  // integer\n```\n\n此外，在我们的设置界面中添加一个手动选项来鼓励用户为 *生日提醒* 评分也很有价值。打开你的故事板，在主设置视图控制器中选择表格视图，如图图\
  \ 13-6 所示。使用属性检查器，将 Sections 值增加到 2。这会在表格视图的第一个分区中创建一个重复的表格单元格组。\n\n![图片](img/9781430243748_Fig13-06.jpg)\n\
  \n**图 13-6.** 创建新的静态表格分区\n\n删除第二个表格视图分区中的一个单元格。对于剩下的单元格，将其样式改为 Basic，并将文本改为**添加\
  \ App Store 评论！**（参见图 13-7）。\n\n我在源代码的 `assets` 文件夹中包含了一些免费可用的图标。将所有这些图标添加到你的 Xcode\
  \ 项目的 `resources/images` 组中。现在选择新的表格单元格，并将 image 属性设置为 `icon-compose.png`。结果应类似于图\
  \ 13-7。\n\n![图片](img/9781430243748_Fig13-07.jpg)\n\n**图 13-7.** 给用户一个微妙的提示总是没错的...\n\
  \n我们需要添加用于评论我们应用的超链接。打开 `BRSettingsViewController.m` 源文件，导入 `Appirater.h`，然后实现 `tableView:didSelectRowAtIndexPath:`\
  \ `UITableViewDelegate` 协议方法：\n\n```\n-(void) tableView:(UITableView *)tableView\
  \ didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    //如果用户点击了“提前天数”或“提醒时间”表格单元格，则忽略\n\
  \    if (indexPath.section == 0) return;\n\n    //我们将使用 switch 语句，以便将来可以处理项目中更多的行点击事件\n\
  \    switch (indexPath.row) {\n        case 0: //添加 App Store 评论！\n            [Appirater\
  \ rateApp];\n            break;\n        default:\n            break;\n    }  \n\
  }\n```\n\n我们为表格添加了第二个分区。目前，我们显示了一个标题为“提醒”的分区头部。在当前实现中，两个分区会显示相同的头部文本，因此我们也需要在 `BRSettingsViewController.m`\
  \ 中修复这个问题：\n\n```\n- (UIView *)tableView:(UITableView *)tableView viewForHeaderInSection:(NSInteger)section\n\
  {\n    return section == 0 ? [self createSectionHeaderWithLabel:@\"提醒\"] : [self\
  \ createSectionHeaderWithLabel:@\"分享关爱\"];\n}\n```\n\n和之前一样，你需要在 iPhone 或 iPod Touch\
  \ 上运行应用才能看到 App Store 链接生效。\n\n除了调用简单的 `rateApp` `Appirater` 方法带来的便利之外，这种链接方式的另一个好处是，在这个版本的应用中，`Appirater`\
  \ 不会再自动向用户显示评分提示。你不想惹恼那些已经评分和评论了的满意用户。\n\n### 在 Facebook、Twitter 和邮件上分享\n\n正如本书中学到的，苹果通过将社交网络深度集成到\
  \ iOS 6 中做出了巨大改进。同时，他们也使得发推文、更新 Facebook 状态、或通过邮件和短信分享变得异常简单。\n\n\n\n"
- "# 使用 `UIActivityViewController` 实现五分钟分享集成\n\n我将向你展示，仅在任意 iOS 6 应用中添加一个分享链接是多么简单，从而让用户能够通过多种方式进行分享。在文档大纲面板中，通过\
  \ storyboard 选择设置视图控制器中的第二个表格视图分区。将该分区的行数增加，如图 13-8 高亮所示。\n\n![图片](img/9781430243748_Fig13-08.jpg)\n\
  \n**图 13-8.** 增加静态表格视图分区的行数\n\n将第二个单元格中的文本改为 `Share!`，然后切换回 `BRSettingsViewController.m`。接下来，修改\
  \ `tableView:didSelectRowAtIndexPath:` 方法，添加高亮部分的变化：\n\n```\n-(void) tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    //如果用户点击了“提醒前一天”或“提醒时间”表格单元格，则忽略操作\n\
  \    if (indexPath.section == 0) return;\n\n    NSString *text = @\"Check out this\
  \ iPhone App: Birthday Reminder\";\n    UIImage *image = [UIImage imageNamed:@\"\
  icon300x300.png\"];\n    NSURL *facebookPageLink = [NSURL\nURLWithString:@\"http://www.facebook.com/apps/application.php?id=123956661050729\"\
  ];\n    NSURL *appStoreLink = [NSURL URLWithString:@\"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=4895375\n\
  09&mt=8\"];\n\n    switch (indexPath.row) {\n        case 0: //添加 App Store 评分！\n\
  \            [Appirater rateApp];\n            break;\n        case 1: //分享！\n \
  \       {\n            NSArray *activityItems = @[text,image,appStoreLink];\n\n\
  \            UIActivityViewController *activityViewController = [[UIActivityViewController\n\
  alloc] initWithActivityItems:activityItems applicationActivities:nil];\n       \
  \     [self presentViewController:activityViewController animated:YES\n        \
  \                     completion:nil];\n            break;\n        }\n        default:\n\
  \            break;\n    }\n}\n```\n\n构建并运行。尝试在设置视图中点击新的 `Share!` 表格单元格。此时应出现一个活动视图控制器，如图\
  \ 13-9 所示。\n\n![图片](img/9781430243748_Fig13-09.jpg)\n\n**图 13-9.** 活动视图控制器：Apple\
  \ 用于内容分享的首选组件\n\n`UIActivityViewController` 类是在 iOS 6 中被添加到 `UIKit` 中的。仅用六行代码，我们就让用户能够通过\
  \ Twitter、Facebook、电子邮件和短信分享文本、图片以及指向我们 *生日提醒* iTunes 页面的链接。在我看来，活动视图控制器中的通讯录、相机胶卷、打印和剪贴板选项对于我们的目的来说有些多余，但我们可以轻松移除它们。尝试设置活动视图控制器的\
  \ `excludedActivityTypes` 属性：\n\n```\n            UIActivityViewController *activityViewController\
  \ = [[UIActivityViewController\nalloc] initWithActivityItems:activityItems applicationActivities:nil];\n\
  \            activityViewController.excludedActivityTypes =\n@[UIActivityTypePostToWeibo,UIActivityTypePrint,UIActivityTypeCopyToPasteboard,UIActivity\n\
  TypeAssignToContact,UIActivityTypeSaveToCameraRoll];\n            [self presentViewController:activityViewController\
  \ animated:YES\n                             completion:nil];\n```\n\n构建并运行。现在你应该只看到电子邮件、短信、Twitter\
  \ 和 Facebook 分享选项。如图 13-10 所示，活动视图控制器提供了一种非常强大的方式，用于添加文本、链接和图片的多种内容分享选项。\n\n![图片](img/9781430243748_Fig13-10.jpg)\n\
  \n**图 13-10.** 一个活动视图控制器，多种分享选项\n\n我们已经看到集成活动视图控制器是多么简单，但如果我们想在表格单元格中显示自己的 Facebook、Twitter、电子邮件和短信链接，以便分别启动每个示例分享模态视图，又该怎么做呢？我们可以实现这一点，但需要多花些功夫。听我说：我会向你展示如何操作！\n\
  \n首先，让我们设置一些新的分享表格单元格。和之前一样，通过 storyboard 选择设置视图控制器中的第二个表格视图分区。将该分区的行数增加到 6，并按如下方式配置每个表格单元格（参见图\
  \ 13-11）：\n\n> *   第二个表格单元格（文本：`Share on Facebook`，图片：`fbicon24x24.png`）\n> *  \
  \ 第三个表格单元格（文本：`Like on Facebook`，图片：`like-icon.png`）\n> *   第四个表格单元格（文本：`Share on\
  \ Twitter`，图片：`icon-twitter.png`）\n> *   第五个表格单元格（文本：`Email a Friend`，图片：`mail-icon.png`）\n\
  > *   第六个表格单元格（文本：`SMS a Friend`，图片：`sms-icon.png`）\n\n![图片](img/9781430243748_Fig13-11.jpg)\n\
  \n**图 13-11.** 设置带有分享选项的表格单元格\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，对给定英文文本进行翻译。以下是翻译后的中文内容：\n\
  \n\n#### 使用 `SLComposeViewController` 在 Facebook 上分享\n\n我们已经完成了故事板的工作，现在打开 `BRSettingsViewController.m`\
  \ 并导入社交框架：\n\n`#import <Social/Social.h>`\n\n找到 `tableView:didSelectRowAtIndexPath:`\
  \ 方法，并用以下高亮显示的代码替换 Activity 视图控制器的代码：\n\n```\n-(void) tableView:(UITableView *)tableView\
  \ didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    // 忽略用户点击“前一天”或“提醒时间”表格单元格的情况\n\
      if (indexPath.section == 0) return;\n\n    NSString *text = @\"快来看看这个 iPhone\
  \ 应用：生日提醒\";\n    UIImage *image = [UIImage imageNamed:@\"icon300x300.png\"];\n\
      NSURL *facebookPageLink = [NSURL\nURLWithString:@\"http://www.facebook.com/apps/application.php?id=123956661050729\"\
  ];\n    NSURL *appStoreLink = [NSURL\nURLWithString:@\"http://itunes.apple.com/WebObjects/MZStore.woa/wa/viewSoftware?id=489537509&mt\n\
  =8\"];\n    SLComposeViewController *composeViewController;\n\n    switch (indexPath.row)\
  \ {\n        case 0: // 添加 App Store 评论！\n            [Appirater rateApp];\n            break;\n\
          case 1: // 在 Facebook 上分享\n        {\n            if (![SLComposeViewController\n\
  isAvailableForServiceType:SLServiceTypeFacebook])\n            {\n                NSLog(@\"\
  用户没有可用的 Facebook 账户\");\n                return;\n            }\n            composeViewController\
  \ = [SLComposeViewController\ncomposeViewControllerForServiceType:SLServiceTypeFacebook];\n\
              [composeViewController addImage:image];\n            [composeViewController\
  \ setInitialText:text];\n            [composeViewController addURL:appStoreLink];\n\
              [self presentViewController:composeViewController animated:YES\n                            \
  \ completion:nil];\n            break;\n        }\n        default:\n            break;\n\
      }\n}\n```\n\n构建并运行。点击“在 Facebook 上分享”表格单元格应显示一个撰写视图控制器，如图 13-12 所示。\n\n![Image](img/9781430243748_Fig13-12.jpg)\n\
  \n**图 13-12.** 使用撰写视图控制器在 Facebook 上分享\n\n如您刚刚添加的新代码所示，我们通过撰写视图控制器的 `composeViewControllerForServiceType:`\
  \ 类方法创建了 `SLComposeViewController` 实例。同样重要的是，通过调用另一个 `SLComposeViewController` 类方法\
  \ `isAvailableForServiceType:` 来检查用户是否已配置 Facebook 账户，该方法可传入 Facebook、Twitter 或新浪微博等社交网络类型。\n\
  \n接下来是关于 Facebook 上的“赞”号召性用语。我们在这里要做的就是链接到我们的*生日提醒* Facebook 页面，然后让用户登录并处理其余操作。你可能会惊讶于这有多么有效——通过简单地在应用内链接到页面，我们就在短时间内为我们的\
  \ *Tap to Chat* 页面获得了成千上万的 Facebook 点赞。\n\n在 `tableView:didSelectRowAtIndexPath:`\
  \ 的 switch 语句中添加一个新的 case：\n\n```\ncase 2: // 在 Facebook 上点赞\n            [[UIApplication\
  \ sharedApplication] openURL:facebookPageLink];\n            break;\n```\n\n构建并运行以测试链接。简洁明了！\n\
  \n#### 使用 `SLComposeViewController` 在 Twitter 上分享\n\n你觉得使用 `SLComposeViewController`\
  \ 以与 Facebook 相同的方式在 Twitter 上分享会有多复杂？代码实际上是相同的，我们只需要将两个 `SLServiceTypeFacebook`\
  \ 引用替换为 `SLServiceTypeTwitter`。在 `tableView:didSelectRowAtIndexPath:` 的 switch 语句中添加另一个\
  \ case：\n\n```\n    case 3:// 在 Twitter 上分享\n        {\n            if (![SLComposeViewController\
  \ isAvailableForServiceType:SLServiceTypeTwitter])\n            {\n                NSLog(@\"\
  用户没有可用的 Twitter 账户\");\n                return;\n            }\n            composeViewController\
  \ = [SLComposeViewController\ncomposeViewControllerForServiceType:SLServiceTypeTwitter];\n\
              [composeViewController addImage:image];\n            [composeViewController\
  \ setInitialText:text];\n            [composeViewController addURL:appStoreLink];\n\
              [self presentViewController:composeViewController animated:YES\n                            \
  \ completion:nil];\n            break;\n        }\n```\n\n很简单，对吧？我不是告诉过你，苹果用 iOS\
  \ 6 让我们的生活变得更简单了！构建并运行。点击“在 Twitter 上分享”表格单元格应显示一个模态弹出的推文表单，就像图 13-13 中显示的那样。\n\n\
  ![Image](img/9781430243748_Fig13-13.jpg)\n\n**图 13-13.** 使用撰写视图控制器在 Twitter 上分享\n\
  \n**注意：** 如果您尚未将 Twitter 或 Facebook 账户添加到 iOS，那么 `isAvailableForServiceType:` 将返回\
  \ false，并且不会显示模态视图控制器。\n\n\n\n#### 使用 `MFMailComposeViewController` 发送电子邮件\n\n自\
  \ iOS 3 起，我们就能够在 iOS 中发送电子邮件。因此，应用内发送邮件对 iOS SDK 来说并非新鲜事。不过，要发送电子邮件和短信，我们还需遵循几个额外步骤。这比使用\
  \ `SLComposeViewController` 稍微繁琐一些。\n\n首先，我们必须将 `MessageUI` 框架添加到项目中。本书中我们已经添加了许多框架，所以希望你对此操作已经驾轻就熟，能顺利添加\
  \ `MessageUI.framework`。\n\n准备好了吗？那就跳转到 `BRSettingsViewController.h` 头文件，导入 `MessageUI.h`：\n\
  \n```\n#import <MessageUI/MessageUI.h>\n```\n\n我们将这个框架导入设置头文件的原因是，我们的设置视图控制器需要订阅为即将创建的\
  \ `MFMailComposeViewController` 实例的委托。所以现在就来做这件事：\n\n```\n@interface BRSettingsViewController\
  \ : UITableViewController\n<MFMailComposeViewControllerDelegate>\n```\n\n现在切换到 `BRSettingsViewController.m`，在\
  \ `tableView:didSelectRowAtIndexPath:` 方法的 switch 语句中添加另一个 case：\n\n```\ncase 4://发送邮件给朋友\n\
  \        {\n            if (![MFMailComposeViewController canSendMail]) {\n    \
  \            NSLog(@\"无法发送邮件\");\n          return;\n            }\n           \
  \ MFMailComposeViewController *mailViewController = [[MFMailComposeViewController\
  \ alloc] init];\n\n            //添加附件时，需要将图片转换为原始的 NSData 表示\n            [mailViewController\
  \ addAttachmentData:UIImagePNGRepresentation(image)\nmimeType:@\"image/png\" fileName:@\"\
  pic.png\"];\n            [mailViewController setSubject:@\"生日提醒\"];\n\n        \
  \    //组合文本和应用商店链接，创建邮件正文\n            NSString *textWithLink = [NSString\nstringWithFormat:@\"\
  %@\\n\\n%@\",text,appStoreLink];\n\n            [mailViewController setMessageBody:textWithLink\
  \ isHTML:NO];\n            mailViewController.mailComposeDelegate = self;\n    \
  \        [self presentViewController:mailViewController animated:YES\n         \
  \                    completion:nil];\n            break;\n        }\n```\n\n我之前提到过会有几个额外步骤，对吧？要将我们的\
  \ *生日提醒* 标志作为邮件附件添加，我们需要将 `UIImage` 实例转换为 `NSData` 实例。Apple 提供了 `UIImagePNGRepresentation`\
  \ 和 `UIImageJPEGRepresentation` 函数，正是用于此目的。\n\n正如你在代码中可能已经注意到的，可以通过邮件视图控制器的 `setMessageBody:isHTML:`\
  \ 方法在邮件中设置 HTML，因此你可以选择使用 HTML 在邮件正文中创建超链接。\n\n尝试构建并运行。你应该能够点击“发送邮件给朋友”单元格，并看到一个弹出的邮件模态视图控制器，如图\
  \ 13-14 所示。\n\n![图片](img/9781430243748_Fig13-14.jpg)\n\n**图 13-14.** 使用邮件撰写视图控制器通过电子邮件分享\n\
  \n在设备上测试应用时，尝试点击邮件撰写视图控制器的“取消”按钮。什么也没发生，对吧？这是因为邮件撰写视图控制器期望其委托来处理视图控制器的关闭。这很容易解决，只需将\
  \ `MFMailComposeViewControllerDelegate` 的 `mailComposeController:didFinishWithResult:error:`\
  \ 方法添加到 `BRSettingsViewController.m` 中：\n\n```\n#pragma mark MFMailComposeViewControllerDelegate\n\
  \n- (void)mailComposeController:(MFMailComposeViewController*)controller\ndidFinishWithResult:(MFMailComposeResult)result\
  \ error:(NSError*)error\n{\n    switch (result)\n    {\n        case MFMailComposeResultCancelled:\n\
  \            NSLog(@\"邮件撰写已取消\");\n            break;\n        case MFMailComposeResultSaved:\n\
  \            NSLog(@\"邮件撰写已保存\");\n            break;\n        case MFMailComposeResultSent:\n\
  \            NSLog(@\"邮件撰写已发送\");\n            break;\n        case MFMailComposeResultFailed:\n\
  \            NSLog(@\"邮件撰写失败\");\n            break;\n    }\n\n    [controller dismissViewControllerAnimated:YES\
  \ completion:nil];\n\n}\n```\n\n这样就应该解决问题了！\n\n#### 使用 `MFMessageComposeViewController`\
  \ 发送短信\n\n自 iOS 4 起，我们也能够在应用内创建短信撰写面板。其实现与我们刚刚完成的发送电子邮件过程非常相似。\n\n切换到 `BRSettingsViewController.h`，声明你的设置视图控制器也实现\
  \ `MFMessageComposeViewControllerDelegate` 协议：\n\n```\n@interface BRSettingsViewController\
  \ : UITableViewController\n<MFMailComposeViewControllerDelegate, MFMessageComposeViewControllerDelegate>\n\
  ```\n\n现在回到 `BRSettingsViewController.m`，在 `tableView:didSelectRowAtIndexPath:`\
  \ 的 switch 语句中添加最后一个 case：\n\n```\ncase 5://发送短信给朋友\n        {\n            if (![MFMessageComposeViewController\
  \ canSendText]) {\n                NSLog(@\"无法发送消息\");\n          return;\n    \
  \        }\n            MFMessageComposeViewController *messageViewController =\n\
  [[MFMessageComposeViewController alloc] init];\n\n            //组合文本和应用商店链接，创建邮件正文\n\
  \            NSString *textWithLink = [NSString\nstringWithFormat:@\"%@\\n\\n%@\"\
  ,text,appStoreLink];\n\n            [messageViewController setBody:textWithLink];\n\
  \            messageViewController.messageComposeDelegate = self;\n            [self\
  \ presentViewController:messageViewController animated:YES\n                   \
  \          completion:nil];\n            break;\n        }\n```\n\n正如你从代码中看到的，它与\
  \ `MFMailComposeViewController` 的实现非常相似。在测试新的短信撰写视图控制器之前，将 `MFMessageComposeViewControllerDelegate`\
  \ 的 `messageComposeViewController:didFinishWithResult:` 协议方法添加到 `BRSettingsViewController.m`\
  \ 中：\n\n```\n#pragma mark MFMessageComposeViewControllerDelegate\n- (void)messageComposeViewController:(MFMessageComposeViewController\
  \ *)controller\ndidFinishWithResult:(MessageComposeResult)result\n{\n    switch\
  \ (result)\n    {\n        case MessageComposeResultCancelled:\n            NSLog(@\"\
  短信撰写已取消\");\n            break;\n        case MessageComposeResultFailed:\n    \
  \        NSLog(@\"短信撰写已保存\");\n            break;\n        case MessageComposeResultSent:\n\
  \            NSLog(@\"短信撰写已发送\");\n            break;\n    }\n\n    [controller\
  \ dismissViewControllerAnimated:YES completion:nil];\n\n}\n```\n\n构建并运行。结果应如图 13-15\
  \ 所示。\n\n![图片](img/9781430243748_Fig13-15.jpg)\n\n**图 13-15.** 使用短信撰写视图控制器通过 SMS\
  \ 分享\n\n现在你可能已经意识到，之前花五分钟添加活动视图控制器的过程，带来了我们在本章中实现的所有其他分享内容视图控制器。区别在于，我们可以根据分享类型对分享的内容进行更精细的控制。例如，通过电子邮件分享时，我希望能利用正文中的\
  \ HTML 兼容性，在我的内容中添加多个超链接。同样，通过 Twitter 分享时，我们必须注意字符数量。\n\nApple 在 iOS 6 中构建的新活动视图控制器很棒，但有时将所有分享功能抽象成一段文本和一两个图片是不够的，我们需要更精细的控制。\n\
  \n\n\n### 摘要\n\n今天上午开发社交分享功能的时间花得很值。我向你展示的分享和应用评分代码可以应用于任何项目（只需确保更新文本、图片和链接！）。如果你将应用内营销工作推迟到应用\
  \ 1.1 或 2.0 版本，那就犯了一个新手级的错误！苹果公司一直在让 iOS 应用实现社交功能变得越来越简单。你实在没有理由不利用它们那些易于实现的功能。\n\
  \n你已经完成了 iPhone 应用的开发阶段！你走过了一段多么重要的旅程。\n\n在过去的四天半时间里，我们涵盖了 iOS SDK 的大量内容。你已经吸收了作为一名\
  \ iOS 开发者日常工作中所需的技能和代码。虽然`Birthday Reminder`只是一个为期五天的小型应用，但我在课程中向你介绍的众多技术可以应用于更大的项目。\n\
  \n那么还有什么要做的？当然是提交我们的应用！在我们旅程的最后一章，我将带你了解 iTunes Connect，并指导你完成向 App Store 提交应用的步骤。我们一会儿见。\n\
  \n![图片](img/ch.jpg)\n\n"
- '# 第 14 章


