  \    // [self.birthday setObject:image forKey:@\"image\"];\n    self.birthday.imageData\
  \ = UIImageJPEGRepresentation (image,1.f);\n}\n```\n\nCore Data 允许我们为实体存储二进制数据属性。但这并不意味着我们可以直接将\
  \ `UIImage` 的实例传递给 `BRDBirthday.imageData` 属性。相反，我们需要传递一个 `NSData` 的实例。`UIKit` 包含一个实用方法，可以将\
  \ `UIImage` 实例转换为 JPG 格式的 `NSData` 表示——`UIImageJPGRepresentation`，并可设置 0 到 1 之间的\
  \ JPG 压缩质量（1 表示百分之百质量）。\n\n这里我们存在一个小问题。目前我们正在将 iPhone 相机拍摄的、可能非常大的图片保存到 Core Data\
  \ 模型中。而这些图片在应用中仅会显示在小型缩略图图像视图中。在小型图像视图中显示非常大的图片是一种不良实践。iOS 在绘制小缩略图之前，仍然需要遍历大图片中的每一个像素。如果用户开始添加和编辑生日并选择大尺寸照片文件，我们的应用将遭受显著的性能损失。我们需要为添加到生日的任何照片生成优化后的较小版本。我们将通过创建一个新的\
  \ Objective-C 类别文件，并在 `UIImage` 上添加自定义的 `createThumbnailToFillSize:` 方法来实现这一点。\n\
  \n在你的 `user-interface` 文件夹中添加一个 `categories` 文件夹，然后将该 `categories` 文件夹作为新组添加到你的\
  \ Xcode 项目中。在项目导航器中，选择新添加的 `categories` 组；然后使用 ![Image](img/flower.jpg) N 键盘快捷键或\
  \ 文件 ![Image](img/U001.jpg) 新建 ![Image](img/U001.jpg) 文件，从 Cocoa Touch 文件模板中选择 Objective-C\
  \ 类别选项。在“类别”文本框中输入 `Thumbnail`，在“类别于”文本框中输入 `UIImage`（参见图 8-14）。\n\n![Image](img/9781430243748_Fig08-14.jpg)\n\
  \n**图 8-14.** 在 UIImage 上创建 Objective-C 类别\n\n接下来是代码。在 `UIImage+Thumbnail.h` 中，我们添加新的自定义方法\
  \ `createThumbnailToFillSize:` 的声明：\n\n```\n@interface UIImage (Thumbnail)\n-(UIImage\
  \ *) createThumbnailToFillSize:(CGSize)size;\n@end\n```\n\n切换到 `UIImage+Thumbnail.m`，添加实现代码：\n\
  \n```\n#import \"UIImage+Thumbnail.h\"\n@implementation UIImage (Thumbnail)\n-(UIImage\
  \ *) createThumbnailToFillSize:(CGSize)size\n{\n    CGSize mainImageSize = self.size;\n\
  \    UIImage *thumb;\n    CGFloat widthScaler = size.width / mainImageSize.width;\n\
  \    CGFloat heightScaler = size.height / mainImageSize.height;\n    CGSize repositionedMainImageSize\
  \ = mainImageSize;\n    CGFloat scaleFactor;\n    // 判断是否应基于宽度或高度进行缩小\n    if(widthScaler\
  \ > heightScaler)\n    {\n        // 基于宽度缩放因子进行计算\n        scaleFactor = widthScaler;\n\
  \        repositionedMainImageSize.height = ceil(size.height / scaleFactor);\n \
  \   }\n    else {\n        // 基于高度缩放因子进行计算\n        scaleFactor = heightScaler;\n\
  \        repositionedMainImageSize.width = ceil(size.width / heightScaler);\n  \
  \  }\n    UIGraphicsBeginImageContext(size);\n    CGFloat xInc = ((repositionedMainImageSize.width-mainImageSize.width)\
  \ / 2.f) *scaleFactor;\n    CGFloat yInc = ((repositionedMainImageSize.height-mainImageSize.height)\
  \ / 2.f) *scaleFactor;\n    [self drawInRect:CGRectMake(xInc, yInc, mainImageSize.width\
  \ * scaleFactor,\nmainImageSize.height * scaleFactor)];\n    thumb = UIGraphicsGetImageFromCurrentImageContext();\n\
  \    UIGraphicsEndImageContext();\n    return thumb;\n}\n@end\n```\n\n我们新的 `UIImage`\
  \ 类别将创建一个经过裁剪和调整大小、并填满传递给 `createThumbnailToFillSize:` 方法尺寸的图片。通过将这一功能实现在类别中，我们只需将我们的类别文件导入到任何需要创建优化图片的文件中。然后，我们就能在任何\
  \ `UIImage` 实例上调用 `createThumbnailToFillSize:` 来创建符合我们指定尺寸的缩略图。这太酷了，不是吗？！\n\n现在让我们尝试一下。首先，将新类别导入到\
  \ `BRBirthdayEditViewController.m` 中：\n\n```\n#import \"UIImage+Thumbnail.h\"\n\
  ```\n\n现在将 `imagePickerController:didFinishPickingMediaWithInfo:` 的实现修改如下：\n\n```\n\
  - (void)imagePickerController:(UIImagePickerController *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info {\n    [picker dismissViewControllerAnimated:YES completion:nil];\n   \
  \ UIImage *image = info[UIImagePickerControllerOriginalImage];\n    CGFloat side\
  \ = 71.f;\n    side *= [[UIScreen mainScreen] scale];\n    UIImage *thumbnail =\
  \ [image createThumbnailToFillSize:CGSizeMake(side, side)];\n    self.photoView.image\
  \ = thumbnail;\n    self.birthday.imageData = UIImageJPEGRepresentation (thumbnail,1.f);\n\
  \    // self.photoView.image = image;\n    // self.birthday.imageData = UIImageJPEGRepresentation\
  \ (image,1.f);\n}\n```\n\n71 点是我们应用中方形缩略图侧边的最大长度。然而，我们还需要支持视网膜显示屏。为此，我们将 71 点乘以屏幕缩放值；在视网膜显示屏上，屏幕缩放值为\
  \ 2；在非视网膜显示屏上，屏幕缩放值为 1。\n\n##### 取消 Core Data 更改\n\n在上一章中，我们在核心视图控制器中实现了 `cancelAndDismiss:`\
  \ 和 `saveAndDismiss:` 方法，使得任何子类视图控制器在以模态方式呈现时都能轻松地自行消失。对于我们的生日编辑视图控制器，当点击“保存”和“取消”按钮时，我们需要添加进一步的功能。我们需要取消或保存对\
  \ Core Data 存储的更改。我们已经为模型添加了一个 `saveChanges` 公共方法来实现这一点，所以首先让我们从 `BRBirthdayEditViewController.m`\
  \ 中调用 `saveChanges`：\n\n```\n- (IBAction)saveAndDismiss:(id)sender\n{\n    [[BRDModel\
  \ sharedInstance] saveChanges];\n    [super saveAndDismiss:sender];\n}\n```\n\n\
  你将会高兴地发现，取消对 `CoreData` 的更改比保存更改更简单。以下是添加到 `BRDModel` 的新公共方法：\n\n`BRDModel.h`：\n\
  \n```\n- (void)cancelChanges;\n```\n\n`BRDModel.m`：\n\n```\n- (void)cancelChanges\n\
  {\n    [self.managedObjectContext rollback];\n}\n```\n\n调用托管对象上下文的 `rollback` 方法将移除自上次保存以来对\
  \ Core Data 模型所做的所有更改。这包括从未保存/写入持久化存储的新插入的 `BRDBirthday` 实体。这非常方便，因为它意味着当用户点击“添加生日”按钮时，我们可以在主视图控制器中创建一个新的\
  \ `BRDBirthday` 实体；并且借助 Core Data 的神奇力量，当通过生日编辑视图控制器点击“取消”按钮时，只需回滚托管对象上下文，这个临时实体就会被丢弃。\n\
  \n回到 `BRBirthdayEditViewController.m` 中，让我们覆写 `cancelAndDismiss:` 的实现：\n\n```\n\
  - (IBAction)cancelAndDismiss:(id)sender {\n    [[BRDModel sharedInstance] cancelChanges];\n\
  \    [super cancelAndDismiss:sender];\n}\n```\n\n\n\n##### 返回主视图控制器\n\n回到我们的 `BRHomeViewController.m`\
  \ 源文件，现在我们要修改 `prepareForSegue:sender:` 方法，使其能够处理生日托管对象，而非上一章节中的字典。以下是代码改动：\n\n\
  ```\n-(void) prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n{\n \
  \   NSString *identifier = segue.identifier;\n\n    if ([identifier isEqualToString:@\"\
  BirthdayDetail\"]) {\n        //首先获取数据\n        NSIndexPath *selectedIndexPath =\
  \ self.tableView.indexPathForSelectedRow;\n        BRDBirthday *birthday = [self.fetchedResultsController\
  \ objectAtIndexPath:selectedIndexPath];\n        //NSMutableDictionary *birthday\
  \ = [self.birthdays objectAtIndex:selectedIndexPath.row];\n\n        BRBirthdayDetailViewController\
  \ *birthdayDetailViewController =\nsegue.destinationViewController;\n        birthdayDetailViewController.birthday\
  \ = birthday;\n\n    }\n    else if ([identifier isEqualToString:@\"AddBirthday\"\
  ]) {\n        //添加新生日\n\n        NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
  \        BRDBirthday *birthday = [NSEntityDescription\ninsertNewObjectForEntityForName:@\"\
  BRDBirthday\" inManagedObjectContext:context];\n        [birthday updateWithDefaults];\n\
  \        //NSMutableDictionary *birthday = [NSMutableDictionary dictionary];\n\n\
  \        //        [birthday setObject:@\"My Friend\" forKey:@\"name\"];\n     \
  \   //        [birthday setObject:[NSDate date] forKey:@\"birthdate\"];\n      \
  \  //        [self.birthdays addObject:birthday];\n\n        UINavigationController\
  \ *navigationController = segue.destinationViewController;\n\n        BRBirthdayEditViewController\
  \ *birthdayEditViewController =\n(BRBirthdayEditViewController *) navigationController.topViewController;\n\
  \        birthdayEditViewController.birthday = birthday;\n    }\n}\n```\n\n当用户点击“添加生日”按钮时，我们在\
  \ Core Data 托管对象上下文中创建一个新的 `BRDBirthday` 实体，但并不会保存该上下文。这样一来，如果用户取消创建新生日的操作，托管对象上下文将回滚，新的生日实体也会被清除。\n\
  \n编译并运行！现在你应该能够添加和编辑生日，并且所有更改在多次运行之间都会保持持久化。\n\n### 保存备注\n\n既然 Core Data 保存模型已经正常运行，接下来让我们保存用户可编写的生日备注。打开\
  \ `BRNotesEditViewController.h` 头文件，首先为 `BRDBirthday` 实体添加一个前置类声明，并新增一个 `birthday`\
  \ 属性：\n\n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n@class\
  \ BRDBirthday;\n\n@interface BRNotesEditViewController : BRCoreViewController <UITextViewDelegate>\n\
  \n@property(nonatomic,strong) BRDBirthday *birthday;\n@property (weak, nonatomic)\
  \ IBOutlet UIBarButtonItem *saveButton;\n@property (weak, nonatomic) IBOutlet UITextView\
  \ *textView;\n\n@end\n```\n\n在 `BRNotesEditViewController.m` 中导入 `BRDBirthday` 和\
  \ `BRDModel`，并合成新的 `birthday` 属性：\n\n```\n#import \"BRNotesEditViewController.h\"\
  \n#import \"BRDModel.h\"\n#import \"BRDBirthday.h\"\n```\n\n与生日编辑和详情视图控制器类似，我们将在视图即将显示时，根据生日实体内容更新视图：\n\
  \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    self.textView.text = self.birthday.notes;\n    [self.textView becomeFirstResponder];\n\
  }\n```\n\n当用户修改生日备注时，我们将同步更新生日实体：\n\n```\n- (void)textViewDidChange:(UITextView\
  \ *)textView\n{\n    //NSLog(@\"用户修改了备注文本: %@\",textView.text);\n    self.birthday.notes\
  \ = self.textView.text;\n}\n```\n\n最后，与编辑生日视图控制器一样，当用户点击“取消”或“保存”按钮时，我们会调用模型单例来保存或取消用户的修改：\n\
  \n```\n- (IBAction)cancelAndDismiss:(id)sender {\n    [[BRDModel sharedInstance]\
  \ cancelChanges];\n    [super cancelAndDismiss:sender];\n}\n\n- (IBAction)saveAndDismiss:(id)sender\n\
  {\n    [[BRDModel sharedInstance] saveChanges];\n    [super saveAndDismiss:sender];\n\
  }\n```\n\n为了让我们的辛勤工作得以体现，我们仍需在通过转场呈现备注编辑器时，将生日详情视图控制器中正在查看的生日实体引用传递进去。打开你的故事板，找到生日详情视图控制器与编辑生日导航视图控制器之间的转场。选中该转场，然后输入标识符\
  \ `EditNotes`（见图 8-15）。\n\n![图片](img/9781430243748_Fig08-15.jpg)\n\n**图 8-15.**\
  \ 为备注编辑器导航控制器添加转场标识符\n\n现在打开 `BRBirthdayDetailViewController.m`，并导入备注编辑器视图控制器：\n\
  \n```\n#import \"BRNotesEditViewController.h\"\n```\n\n然后更新 `prepareForSegue:sender:`\
  \ 方法，使其在呈现备注编辑器时传递其生日实体的引用：\n\n```\n-(void) prepareForSegue:(UIStoryboardSegue *)segue\
  \ sender:(id)sender\n{\n    NSString *identifier = segue.identifier;\n\n    if ([identifier\
  \ isEqualToString:@\"EditBirthday\"]) {\n        //编辑此生日\n        UINavigationController\
  \ *navigationController = segue.destinationViewController;\n\n        BRBirthdayEditViewController\
  \ *birthdayEditViewController =\n(BRBirthdayEditViewController *) navigationController.topViewController;\n\
  \        birthdayEditViewController.birthday = self.birthday;\n    }\n    else if\
  \ ([identifier isEqualToString:@\"EditNotes\"]) {\n        //编辑此生日\n        UINavigationController\
  \ *navigationController = segue.destinationViewController;\n\n        BRNotesEditViewController\
  \ *birthdayNotesEditViewController = (BRNotesEditViewController *) navigationController.topViewController;\n\
  \        birthdayNotesEditViewController.birthday = self.birthday;\n    }\n}\n```\n\
  \n编译并运行。选择一个名人或你自己添加的生日。编辑与该生日关联的备注并保存。重复此过程几次。你会发现备注在多次运行之间依然保持。\n\n#### 清理工作\n\
  \n既然我们已经完成了 Core Data 存储的实现，可以移除 `BRHomeViewController.m` 中冗余的生日数组属性：\n\n```\n@interface\
  \ BRHomeViewController ()\n\n//@property (nonatomic,strong) NSMutableArray *birthdays;\n\
  @property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;\n\
  \n@end\n```\n\n就这样。Core Data 部分大功告成！编译并运行。现在你应该能够添加和编辑生日、照片以及备注。所有修改会立即在所有视图控制器中反映，即使关闭了\
  \ *Birthday Reminder* 应用也不受影响。这就是 Core Data 的魅力所在。\n\n![图片](img/9781430243748_Fig08-16.jpg)\n\
  \n**图 8-16.** 生日快乐凯蒂！\n\n### 总结\n\n恭喜你顺利完成了 Core Data 章节！这是本书中最难的部分之一。因为 Core Data\
  \ 是一个相当高级的 iOS 框架，你今天上午消化了大量新知识。我们只是浅尝了其能力的一角，但对于持久化存储生日数据——乃至其他任何数据类型——Core Data\
  \ 确实是首选方案。\n\n今天下午，我们将探讨 iOS 界面美化的方法，以及如何让 *Birthday Reminder* 变得更美观。所以快去快速吃个午饭——一小时后我们继续！\n\
  \n![图片](img/ch.jpg)\n\n## 第 9 章\n\n\n\n"
- "# iOS 界面美化：让你的应用“秀色可餐”\n\n到今天结束时，我们的*生日提醒*应用将非常接近最终产品。今天下午我们不会添加大量新功能；相反，我们的工作将集中在改进用户界面的外观和感觉上，让它从\
  \ App Store 中成百上千个其他生日提醒应用中脱颖而出。\n\n但在深入代码之前，让我们从忙碌的 iPhone 开发者日程中抽点时间，听我讲一个小故事。去年一个美丽的春日，我和九岁的儿子在公园里，沐浴着阳光吃冰淇淋。冰淇淋出了点小意外，一大块掉在了我的\
  \ iPhone 上。就像现代世界的惯例一样，我的 Twitter 粉丝们很快就收到了这条爆炸性新闻：我刚刚舔了我的 iPhone（见图 9-1）。\n\n![图片](img/9781430243748_Fig09-01.jpg)\n\
  \n**图 9-1.** 冰淇淋和 iPhone 真的不搭！\n\n没有上下文。我就是不得不舔了我的 iPhone。撇开冰淇淋不谈，如今我们 iOS 用户享受到的漂亮用户界面设计越来越多。我认为有些\
  \ iPhone 应用实在太美，用户体验打磨得如此精致，以至于你会忍不住想抓住这些应用狠狠舔上一口！还是只有我这样想？所以从现在开始，我们就称它们为*秀色可餐*的应用吧！![图片](img/smile.jpg)\n\
  \n我希望我的应用也具有这种“秀色可餐”的品质。是什么让这些应用脱颖而出？是什么让一个应用“秀色可餐”？\n\n## 是什么让一个应用“秀色可餐”？\n\n伟大的设计受到个人偏好的影响，以下是我最喜欢的一些\
  \ iPhone 应用用户界面设计（见图 9-2）。我选择了 AirBnB、Jamie's Recipes、Momento 和 Path。这些应用都拥有漂亮的用户界面设计和图标。它们从\
  \ iPhone 用户可以挑选的成千上万个应用中脱颖而出。仅仅为应用拥有一个好主意已经不够了。你的应用需要达到这些排行榜领先应用所带来的那种精致水平和质量。\n\
  \n![图片](img/9781430243748_Fig09-02.jpg)\n\n**图 9-2.** 一系列“秀色可餐”的应用：AirBnB、Jamie's\
  \ Recipes、Momento、Path\n\n那么，让我们更仔细地看看这些示例应用。是什么让它们“秀色可餐”？从设计来看，这四个应用有什么共同点？以下是我的观察。它们都广泛使用了苹果在\
  \ iOS SDK 中包含的通用用户界面组件。比如导航栏、工具栏、表格视图、图像视图等等。尽管这些应用各有独特、精美的设计，但 iPhone 用户能立即认出那些我们在大多数其他\
  \ iPhone 应用中每天使用的通用用户控件。我们知道如何轻拂和滚动表格视图——这几乎是本能，因为它已经深植于苹果 iOS 用户体验中。我们知道所有这些应用的导航栏会告知我们在应用层级中的当前位置。我们知道前三个应用底部的标签栏是干什么用的——我们可以愉快地在顶层部分之间切换，而不会迷失方向或被应用导航搞糊涂。\n\
  \n这些应用都有漂亮且独特的设计，同时对于普通 iOS 用户来说又非常友好。作为一名用户，我不想费劲去学习如何使用你的应用。我不想翻阅任何帮助页面才能开始使用，我只希望体验是直观的。苹果自己的应用有多少包含“帮助”部分？零个，没错就是零！\n\
  \n这里的教训是：你可以制作出漂亮的应用，而不必为了追求原创而试图创造一种新的用户体验，从而打破 HIG（苹果人机界面指南）的规则。这不值得！iPhone 取得如此巨大成功的主要原因之一，在于苹果发明并随后向第三方开发者开放的那些软件和用户体验惯例。我们已经拥有了制作出色用户界面的工具，而现在通过\
  \ iOS 5 和 6，我们有了许多重新定义现有`UIKit`组件外观的新方法，可以非常高效地制作出漂亮、“秀色可餐”的应用。\n\n*提示：我建议你阅读并学习\
  \ HIG，即苹果的 iOS 人机界面指南文档。你可以在苹果网站上找到它：* [`http://developer.apple.com/library/ios/#DOCUMENTATION/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html)`.`\n\
  \n如果你不是设计师，那么我建议你稍后翻回第 1 章，重新阅读一下我对我为每个应用构建时所采用的设计流程的描述。\n\n> 1.  在纸上草绘出每一个屏幕。\n\
  > 2.  在 dribbble.com 上找一位设计师，将你的草图变成漂亮的 Retina 级别 Photoshop 设计图。\n> 3.  开始美化界面。我们将在本章详细讨论。\n\
  \n## 让我们开始美化界面吧！\n\niOS 应用界面美化的规则并非一成不变。没有 CSS。没有 XML 用户界面布局语言或类似的东西。用于美化 iOS 组件外观的代码就是：代码。Objective-C\
  \ 代码。\n\n#### 创建核心视图控制器\n\n还记得我们在第 5 章中是如何创建核心视图控制器的吗？我们应用中的每个视图控制器都继承自`BRCoreViewController`，而`BRCoreViewController`又继承自苹果的`UIViewController`。我们这样做是为了利用面向对象编程的优势，通过将通用代码和逻辑集中到核心视图控制器中。这就是我们让应用中每个视图的背景都成为灰色的方法。`BRCoreViewController`中已有的这段代码使每个主屏幕视图都变成灰色。\n\
  \n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.view.backgroundColor\
  \ = [UIColor grayColor];\n}\n```\n\n*生日提醒*用户界面设计大量使用了一种深色的棋盘格背景图像。那么，让我们将这个背景图像添加到所有由`BRCoreViewController`子类控制的视图中。\n\
  \n将`app-background.png`和`app-background@2x.png`图像文件添加到你的项目中。你可以在本章源代码的 assets 文件夹中找到它们。现在，在`BRCoreViewController`的`viewDidLoad`方法中添加两行代码：\n\
  \n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n    self.view.backgroundColor\
  \ = [UIColor grayColor];\n    UIImageView *backgroundView = [[UIImageView alloc]\
  \ initWithImage:[UIImage\nimageNamed:@\"app-background.png\"]];\n    [self.view\
  \ insertSubview:backgroundView atIndex:0];\n}\n```\n\n构建并运行。现在我们的背景图像已设置在每个屏幕上（见图\
  \ 9-3）。这有多酷？！\n\n![图片](img/9781430243748_Fig09-03.jpg)\n\n**图 9-3.** 仅通过添加两行代码，棋盘格背景图像现在出现在我们应用中每个`BRCoreViewController`子类视图控制器的视图中。\n\
  \n*注意：苹果的* `UIImageView` *类会缓存通过`imageNamed:`类方法生成的图像，所以即使这个方法会被我们应用中的每个视图控制器调用，iOS\
  \ 也只会将图像加载到内存一次。*\n\n在 Retina 设备上，`UIImageView`会自动加载背景图像的`app-background@2x.png`版本，这仅仅是因为`@2x`命名约定。你需要确保你的`@2x`图像的宽度和高度恰好是非\
  \ Retina 图像的两倍。因此，对于这张图片，非 Retina 的`app-background.png`图像文件大小为 320×460 像素，而 Retina\
  \ 版本为 640×920 像素，以填充 iPhone 屏幕（减去状态栏）。\n\n\n\n#### 自定义表格视图单元格\n\n让我们仔细看看主屏幕生日列表的\
  \ Photoshop 设计（参见图 9-4）。\n\n![图片](img/9781430243748_Fig09-04.jpg)\n\n**图 9-4.**\
  \ 自定义表格单元格设计特写\n\n标准的 Apple 表格单元格样式最多支持两个标签：一个图片视图和一个位于表格单元格右侧的附件视图。这不足以满足我们自定义设计的需求（参见图\
  \ 9-5）。看看 Nicole 和 Nick Kuh 的生日提醒单元格。每个单元格包含四个标签：一个用于朋友姓名，一个用于生日文本，一个用于距离下一个生日的天数，以及一个用于显示*更多天*或*更多天*的文本。此外，每位朋友的头像图片视图都带有圆角，并能很好地将横向和纵向图片居中并裁剪。这不是\
  \ `UITableViewCell` 类的 `imageView` 属性的默认行为。我们需要创建 `UITableViewCell` 的子类，并创建一个可复用的自定义表格单元格来显示生日。\n\
  \n在 Xcode 中打开 Storyboard 文件，然后居中并聚焦于主页视图控制器场景。选择原型表格单元格。使用属性检查器，将单元格样式更改为自定义。将“选择”参数更改为“无”。将附件设置更改为“无”，以移除披露指示器（右箭头）。\n\
  \n![图片](img/9781430243748_Fig09-05.jpg)\n\n**图 9-5.** 创建自定义表格视图单元格\n\n通过从对象库中拖放两个图片视图到自定义表格单元格中。使用尺寸检查器，将第一个图片视图定位（x=11\
  \ 点，y=13 点），并设置其宽度和高度均为 52 点。这将用作显示朋友照片的图标视图。保持图标图片视图处于选中状态，使用属性检查器将视图的“模式”值更改为“Aspect\
  \ Fill”，并开启“裁剪子视图”选项（参见图 9-6）。\n\n![图片](img/9781430243748_Fig09-06.jpg)\n\n**图 9-6.**\
  \ 配置图标图片视图\n\n现在，选择你添加的第二个图片视图。我们将使用这个图片视图来显示剩余天数标签后面的日历图标背景，或者如果是朋友的生日，则显示生日蛋糕图片。将第二个图片视图定位（x=261\
  \ 点，y=14 点），并设置其宽度为 48 点，高度为 50 点。我们将直接在 Storyboard 中设置此图片的默认背景。从源代码的资源文件夹中，找到并将\
  \ `icon-days-remaining.png` 和 `icon-days-remaining@2x.png` 图片文件添加到你的项目中。然后，使用属性检查器将右侧图片视图的“Image”属性设置为新添加的\
  \ `icon-days-remaining.png` 文件，如图 9-7 所示。\n\n![图片](img/9781430243748_Fig09-07.jpg)\n\
  \n**图 9-7.** 配置剩余天数背景图片视图\n\n将四个标签视图实例拖放到你的自定义表格视图单元格上。结合使用属性检查器设置字体属性，尺寸检查器设置位置和大小，按照表\
  \ 9-1 所示配置这四个标签。\n\n![图片](img/tab9-1.jpg)\n\n最终结果应类似于图 9-8。\n\n![图片](img/9781430243748_Fig09-08.jpg)\n\
  \n**图 9-8.** 配置原型单元格的标签和图片视图\n\n我们已为生日表格视图单元格添加并配置了所有必需的自定义子视图，但在将这些子视图连接到输出口之前，我们没有任何方法来定位和样式化标签或图片视图。问题在于我们在哪里定义这些输出口？不是在主页视图控制器中。我们正在处理的自定义原型单元格将成为\
  \ iOS 在生成 Apple 的 `UITableViewCell` 类可复用实例时使用的视图布局。因此，创建带有自定义子视图的自定义表格视图单元格的逻辑方法是通过创建\
  \ `UITableViewCell` 的子类。\n\n在 Finder 中，向你的 `user-interface` 文件夹添加一个 `components`\
  \ 文件夹，然后在你的 Xcode 项目中将 `components` 文件夹添加为一个新组。在项目导航器中，选择新添加的 `components` 组，并在其中创建一个新的\
  \ Objective-C 类文件。将你的子类命名为 `BRBirthdayTableViewCell`，并在“Subclass of”文本字段的下拉菜单中选择\
  \ `UITableViewCell`（参见图 9-9）。\n\n![图片](img/9781430243748_Fig09-09.jpg)\n\n**图 9-9.**\
  \ 创建 `UITableViewCell` 的子类\n\n创建新的 `BRBirthdayTableViewCell` 类后，在 Assistant Editor\
  \ 布局中打开头文件和源文件，并为每个文件添加以下代码：\n\n`BRBirthdayTableViewCell.h:`\n\n```\n#import <UIKit/UIKit.h>\n\
  @class BRDBirthday;\n@interface BRBirthdayTableViewCell : UITableViewCell\n@property(nonatomic,strong)\
  \ BRDBirthday *birthday;\n@property (nonatomic, weak) IBOutlet UIImageView* iconView;\n\
  @property (nonatomic, weak) IBOutlet UIImageView* remainingDaysImageView;\n@property\
  \ (nonatomic, weak) IBOutlet UILabel* nameLabel;\n@property (nonatomic, weak) IBOutlet\
  \ UILabel* birthdayLabel;\n@property (nonatomic, weak) IBOutlet UILabel* remainingDaysLabel;\n\
  @property (nonatomic, weak) IBOutlet UILabel* remainingDaysSubTextLabel;\n@end\n\
  ```\n\n源文件：\n\n```\n#import \"BRBirthdayTableViewCell.h\"\n#import \"BRDBirthday.h\"\
  \n@implementation BRBirthdayTableViewCell\n-(void) setBirthday:(BRDBirthday *)birthday\n\
  {\n    _birthday = birthday;\n    self.nameLabel.text = _birthday.name;\n    int\
  \ days = _birthday.remainingDaysUntilNextBirthday;\n    if (days == 0) {\n     \
  \   //今天是生日！\n        self.remainingDaysLabel.text = self.remainingDaysSubTextLabel.text\
  \ = @\"\";\n        self.remainingDaysImageView.image = [UIImage imageNamed:@\"\
  icon-birthday-cake.png\"];\n    }\n    else {\n        self.remainingDaysLabel.text\
  \ = [NSString stringWithFormat:@\"%d\",days];\n        self.remainingDaysSubTextLabel.text\
  \ = (days == 1) ? @\"more day\" : @\"more days\";\n        self.remainingDaysImageView.image\
  \ = [UIImage imageNamed:@\"icon-days-remaining.png\"];\n    }\n    self.birthdayLabel.text\
  \ = _birthday.birthdayTextToDisplay;\n}\n@end\n```\n\n表格视图单元格会被复用。这使得滚动长表格非常高效，因为表格视图通过复用少量表格单元来营造出拥有超长行数表格的视觉效果。我们在自定义表格视图单元格上创建了一个\
  \ `birthday` 属性。当主页视图控制器配置每个表格视图单元格时，它会通过 `cell.birthday = aBirthday` 将 `birthday`\
  \ 实体传递给表格视图单元格。通过重写表格视图单元格的 birthday setter 方法，我们可以在设置 birthday 属性时更新表格单元格的标签和图片。\n\
  \n暂时离开 `BRBirthdayTableViewCell` 类文件，返回 Storyboard。选中自定义表格视图单元格后，我们可以使用身份检查器更改原型单元格的类。Xcode\
  \ 会自动识别 `BRBirthdayTableViewCell`，因为它是 `UITableViewCell` 的子类（参见图 9-10）。\n\n![图片](img/9781430243748_Fig09-10.jpg)\n\
  \n**图 9-10.** 使用身份检查器将自定义类分配给表格视图单元格原型\n\n\n\n现在来连接表格单元格的出口。从原型表格单元格的背景按住 Control\
  \ 键拖拽到每个添加的子视图上。你会发现 Xcode 已经识别了 `BRBirthdayTableViewCell` 代码中的出口，并允许你将它们连接到子视图（见图\
  \ 9-11）。太棒了！\n\n![Image](img/9781430243748_Fig09-11.jpg)\n\n**图 9-11.** 连接 `BRBirthdayTableViewCell`\
  \ 中的标签和图像视图出口。\n\n按以下方式连接出口：\n\n- `iconView`: 表格单元格左侧的图像视图\n- `remainingDaysImageView`:\
  \ 表格单元格右侧的图像视图\n- `nameLabel`: 左上角的标签\n- `birthdayLabel`: 左下角的标签\n- `remainingDaysLabel`:\
  \ 右上角的标签\n- `remainingDaysSubTextLabel`: 右下角的标签\n\n现在，先不管这个视图，对 `BRHomeViewController.m`\
  \ 源文件做一些修改。\n\n将 `BRBirthdayTableViewCell.h` 导入到 `BRHomeViewController.m` 中。然后浏览实现文件，并如下修改\
  \ `tableView:cellForRowAtIndexPath:`：\n\n```\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\"];\n\n    BRDBirthday\
  \ *birthday = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\n \
  \   BRBirthdayTableViewCell *brTableCell = (BRBirthdayTableViewCell *)cell;\n  \
  \  brTableCell.birthday = birthday;\n    if (birthday.imageData == nil)\n    {\n\
  \        brTableCell.iconView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"\
  ];\n    }\n    else {\n        brTableCell.iconView.image = [UIImage imageWithData:birthday.imageData];\n\
  \    }\n    cell.textLabel.text = birthday.name;\n    cell.detailTextLabel.text\
  \ = birthday.birthdayTextToDisplay;\n    cell.imageView.image = [UIImage imageWithData:birthday.imageData];\n\
  \n    return cell;\n}\n```\n\n构建并运行。你应该会看到类似图 9-12 的效果。\n\n![Image](img/9781430243748_Fig09-12.jpg)\n\
  \n**图 9-12.** 裁剪得当的方形缩略图和显示生日数据的自定义标签\n\n#### 表格视图单元格背景图像\n\n现在该为我们的表格视图添加定制的巧克力海绵蛋糕和糖霜了。这应该是小菜一碟（双关语）！将\
  \ `table-row-icing-background.png`、`table-row-icing-background@2x.png`、`table-row-background.png`\
  \ 和 `table-row-background@2x.png` 图像文件添加到你的项目中。`UITableViewCell` 的实例有一个 `backgroundView`\
  \ 属性，我们可以将其设置为任何 `UIView` 实例。因此，我们将创建一个图像和一个用于显示该图像的图像视图，然后将该图像视图设置为单元格的背景视图。除非这是蛋糕的顶层，否则我们将使用新添加的、包含一层糖霜的表格行背景图像。如果是蛋糕的顶层（第一行），则使用不带糖霜的表格行背景图像。\n\
  \n我们将直接把代码添加到 `BRHomeViewController.m` 源文件中的 `tableView:cellForRowAtIndexPath:`\
  \ 方法里，因为在这里我们才能知道正在设置样式的具体表格行。在该方法的末尾，但倒数第一个 `return cell;` 行之前，添加以下代码：\n\n```\n\
  \    UIImage *backgroundImage = (indexPath.row == 0) ? [UIImage imageNamed:@\"table-row-background.png\"\
  ] : [UIImage imageNamed:@\"table-row-icing-background.png\"];\n    brTableCell.backgroundView\
  \ = [[UIImageView alloc] initWithImage:backgroundImage];\n```\n\n构建并运行。漂亮的蛋糕层次出现了（见图\
  \ 9-13）。\n\n![Image](img/9781430243748_Fig09-13.jpg)\n\n**图 9-13.** 添加了糖霜的表格单元格蛋糕层！\n\
  \n#### 创建“样式表”\n\n正如我之前指出的，iOS 的皮肤设置不像 CSS 那样工作，所以我们不会创建一个传统的样式表文件。我们将创建一个单独的 Objective-C\
  \ 类，在一个集中的位置负责处理我们应用的所有样式需求。我们的样式表类将像一个工具类一样工作，我们会调用样式方法，传递标签和视图的引用，然后由工具类负责添加圆角、设置字体和颜色等。\n\
  \n选择 `user-interface` Xcode 组，并在其中创建一个新的 Objective-C 类文件。将子类命名为 `BRStyleSheet`，并在“Subclass\
  \ of”文本字段中输入 `NSObject`。\n\n将以下代码写入新的 `BRStyleSheet.h` 头文件中：\n\n```\n#import <Foundation/Foundation.h>\n\
  \ntypedef enum : int {\n    BRLabelTypeName = 0,\n    BRLabelTypeBirthdayDate,\n\
  \    BRLabelTypeDaysUntilBirthday,\n    BRLabelTypeDaysUntilBirthdaySubText,\n \
  \   BRLabelTypeLarge\n}BRLabelType;\n\n@interface BRStyleSheet : NSObject\n\n+(void)styleLabel:(UILabel\
  \ *)label withType:(BRLabelType)labelType;\n+(void)styleRoundCorneredView:(UIView\
  \ *)view;\n\n@end\n```\n\n注意到我们新样式表类的两个公开方法都是类方法了吗？我们不会实例化 `BRStyleSheet` 的实例，而会像使用工具类一样，在我们的应用中对标签或视图进行样式设置时随时随地调用它。\n\
  \n我们在第 4 章中拼凑 21 点应用时就创建过自定义枚举。当时我们用一个枚举器来跟踪游戏状态。这里我们创建一个标签类型枚举器，这样每当我们将标签视图的引用传递给\
  \ `styleLabel:withType:` 方法时，也会传递一个类型参数，该参数决定了样式表方法将应用的字体、文本颜色等。我们为每种不同的样式创建一个不同的枚举器标签类型。因此，如果我们希望对两个不同的标签应用相同的样式，就可以为它们传递相同的\
  \ `BRLabelType` 值。\n\n我们的样式代码将利用 Core Animation 层的属性来添加阴影和圆角。本书不会详细讲解 Core Animation，但值得注意的一点是，在\
  \ iOS 中，每个 `UIView` 实际上都是在 Core Animation 层中渲染的，而 `CALayers` 具有阴影和圆角半径属性。为了给我们的标签和视图设置阴影和圆角半径值，首先需要导入\
  \ Apple 的 QuartzCore 框架，否则 Xcode 将无法识别我们在样式代码中访问的 `CALayer` 属性。\n\n我们将像导入 Core Data\
  \ 框架一样导入 QuartzCore 框架。在项目导航器中选择你的 `BirthdayReminder` 项目，然后选择 `BirthdayReminder`\
  \ 目标。接着在编辑器中选择“Build Phases”选项卡。展开“Link Binary With Libraries”集合。点击 + 按钮，然后在 iOS\
  \ 文件夹中找到 `QuartzCore.framework` 并将其添加到你的项目中。\n\n回到 `BRStyleSheet.m` 源文件中，我们将为样式表定义一些字体和颜色。这些是我们在样式方法中使用的字体和颜色，因此如果将来需要更改某种字体或颜色，我们只需在这个单一的样式类中进行操作，过程将快速又简单。我们将按如下方式定义这些样式值常量：\n\
  \n```\n#import \"BRStyleSheet.h\"\n#import <QuartzCore/QuartzCore.h>\n\n#define\
  \ kFontLightOnDarkTextColour [UIColor colorWithRed:255.0/255 green:251.0/255 blue:218.0/255\
  \ alpha:1.0]\n#define kFontDarkOnLightTextColour [UIColor colorWithRed:1.0/255 green:1.0/255\
  \ blue:1.0/255 alpha:1.0]\n```\n\n\n```c\n#define kFontNavigationTextColour [UIColor\
  \ colorWithRed:106.f/255.f green:62.f/255.f blue:39.f/255.f alpha:1.f]\n#define\
  \ kFontNavigationDisabledTextColour [UIColor colorWithRed:106.f/255.f green:62.f/255.f\
  \ blue:39.f/255.f alpha:0.6f]\n#define kNavigationButtonBackgroundColour [UIColor\
  \ colorWithRed:255.f/255.f green:245.f/255.f blue:225.f/255.f alpha:1.f]\n#define\
  \ kToolbarButtonBackgroundColour [UIColor colorWithRed:39.f/255.f green:17.f/255.f\
  \ blue:5.f/255.f alpha:1.f]\n#define kLargeButtonTextColour [UIColor whiteColor]\n\
  \n#define kFontNavigation [UIFont fontWithName:@\"HelveticaNeue-Bold\" size:18.f]\n\
  #define kFontName [UIFont fontWithName:@\"HelveticaNeue-Bold\" size:15.f]\n#define\
  \ kFontBirthdayDate [UIFont fontWithName:@\"HelveticaNeue\" size:13.f]\n#define\
  \ kFontDaysUntilBirthday [UIFont fontWithName:@\"HelveticaNeue-Bold\" size:25.f]\n\
  #define kFontDaysUntillBirthdaySubText [UIFont fontWithName:@\"HelveticaNeue\" size:9.f]\n\
  #define kFontLarge [UIFont fontWithName:@\"HelveticaNeue-Bold\" size:17.f]\n#define\
  \ kFontButton [UIFont fontWithName:@\"HelveticaNeue-Bold\" size:30.f]\n#define kFontNotes\
  \ [UIFont fontWithName:@\"HelveticaNeue\" size:16.f]\n#define kFontPicPhoto [UIFont\
  \ fontWithName:@\"HelveticaNeue-Bold\" size:12.f]\n#define kFontDropShadowColour\
  \ [UIColor colorWithRed:1.0/255 green:1.0/255 blue:1.0/255 alpha:0.75]\n```\n\n\
  ```objectivec\n@implementation BRStyleSheet\n@end\n```\n\n现在，我们需要在`BRStyleSheet`的实现中添加两个样式类方法：\n\
  \n```objectivec\n@implementation BRStyleSheet\n\n+(void)styleLabel:(UILabel *)label\
  \ withType:(BRLabelType)labelType\n{\n    switch (labelType) {\n        case BRLabelTypeName:\n\
  \            label.font = kFontName;\n            label.layer.shadowColor = kFontDropShadowColour.CGColor;\n\
  \            label.layer.shadowOffset = CGSizeMake(1.0f, 1.0f);\n            label.layer.shadowRadius\
  \ = 0.0f;\n            label.layer.masksToBounds = NO;\n            label.textColor\
  \ = kFontLightOnDarkTextColour;\n            break;\n        case BRLabelTypeBirthdayDate:\n\
  \            label.font = kFontBirthdayDate;\n            label.textColor = kFontLightOnDarkTextColour;\n\
  \            break;\n        case BRLabelTypeDaysUntilBirthday:\n            label.font\
  \ = kFontDaysUntilBirthday;\n            label.textColor = kFontDarkOnLightTextColour;\n\
  \            break;\n        case BRLabelTypeDaysUntilBirthdaySubText:\n       \
  \     label.font = kFontDaysUntillBirthdaySubText;\n            label.textColor\
  \ = kFontDarkOnLightTextColour;\n            break;\n        case BRLabelTypeLarge:\n\
  \            label.textColor = kFontLightOnDarkTextColour;\n            label.layer.shadowColor\
  \ = kFontDropShadowColour.CGColor;\n            label.layer.shadowOffset = CGSizeMake(1.0f,\
  \ 1.0f);\n            label.layer.shadowRadius = 0.0f;\n            label.layer.masksToBounds\
  \ = NO;\n            break;\n        default:\n            label.textColor = kFontLightOnDarkTextColour;\n\
  \            break;\n    }\n}\n\n+(void)styleRoundCorneredView:(UIView *)view\n\
  {\n    view.layer.cornerRadius = 4.f;\n    view.layer.masksToBounds = YES;\n   \
  \ view.clipsToBounds = YES;\n}\n\n@end\n```\n\n在样式化标签时，我们直接访问标签视图的图层（`CALayer`）属性，以定义图层上的阴影设置。同样，对于视图的样式化，我们设置视图底层核心动画图层的`cornerRadius`属性。\n\
  \n是时候测试我们的样式表类了！打开`BRBirthdayTableViewCell.m`源文件。首先在文件顶部导入`BRStyleSheet.h`。`BRBirthdayTableViewCell`是`UITableViewCell`的子类。因此，这个类是一个视图类，而不是视图控制器类。与我们之前的视图控制器输出口不同，我们无法通过钩入`viewDidLoad`方法来修改\
  \ Interface Builder 输出口属性。在样式化自定义表格视图单元格中的图像视图和标签时，我们只需在 iOS 首次生成输出口时运行一次这段代码。因此，覆盖输出口访问器的设置器并在其中添加样式代码是一个理想的位置。以下是需要添加到`BRBirthdayTableViewCell.m`中的代码：\n\
  \n```objectivec\n-(void) setIconView:(UIImageView *)iconView\n{\n    _iconView =\
  \ iconView;\n    if (_iconView) {\n        [BRStyleSheet styleRoundCorneredView:_iconView];\n\
  \    }\n}\n\n-(void) setNameLabel:(UILabel *)nameLabel\n{\n    _nameLabel = nameLabel;\n\
  \    if (_nameLabel) {\n        [BRStyleSheet styleLabel:_nameLabel withType:BRLabelTypeName];\n\
  \    }\n}\n\n-(void) setBirthdayLabel:(UILabel *)birthdayLabel\n{\n    _birthdayLabel\
  \ = birthdayLabel;\n    if (_birthdayLabel) {\n        [BRStyleSheet styleLabel:_birthdayLabel\
  \ withType:BRLabelTypeBirthdayDate];\n    }\n}\n\n-(void) setRemainingDaysLabel:(UILabel\
  \ *)remainingDaysLabel\n{\n    _remainingDaysLabel = remainingDaysLabel;\n    if\
  \ (_remainingDaysLabel) {\n        [BRStyleSheet styleLabel:_remainingDaysLabel\
  \ withType:BRLabelTypeDaysUntilBirthday];\n    }\n}\n\n-(void) setRemainingDaysSubTextLabel:(UILabel\
  \ *)remainingDaysSubTextLabel\n{\n    _remainingDaysSubTextLabel = remainingDaysSubTextLabel;\n\
  \    if (_remainingDaysSubTextLabel) {\n        [BRStyleSheet styleLabel:_remainingDaysSubTextLabel\
  \ withType:BRLabelTypeDaysUntilBirthdaySubText];\n    }\n}\n```\n\n构建并运行。你应该会看到标签样式和图片圆角效果被应用，就像图\
  \ 9-14 中所示。当 iOS 连接每个标签输出口时，我们将标签引用传递给`BRStyleSheet`的`styleLabel:withType:`类方法，该方法会依次设置字体、文本颜色、阴影等。\n\
  \n![图片](img/9781430243748_Fig09-14.jpg)\n\n**图 9-14.** 样式化文本和圆角图像视图\n\n### 自定义导航栏和工具栏外观\n\
  \n我们对主屏幕导航栏做的第一个修改是，将左右两侧的栏按钮项改为显示图标而不是文本。从本章源文件夹中的资源中，将`icon-add-new.png`、`icon-add-new@2x.png`、`icon-settings.png`和`icon-settings@2x.png`图像文件添加到你的项目中。在故事板中选择主视图控制器场景，删除左侧栏按钮项的标题，然后从`Image`属性下拉菜单中选择`icon-settings.png`文件。对右侧栏按钮项重复此过程，这次选择`icon-add-new.png`图像文件（参见图\
  \ 9-15）。\n\n![图片](img/9781430243748_Fig09-15.jpg)\n\n**图 9-15.** 为 UIBarButtonItems\
  \ 分配图像图标\n\n在我们进一步操作之前，如果你还没有将本章源代码资源文件夹中的剩余图像添加到项目中，请立即添加：`button-blue.png`、`button-blue@2x.png`、`button-red.png`、`button-red@2x.png`、`icon-call.png`、`icon-call@2x.png`、`icon-delete.png`、`icon-delete@2x.png`、`icon-email.png`、`icon-email@2x.png`、`icon-facebook.png`、`icon-facebook@2x.png`、`icon-notes.png`、`icon-notes@2x.png`、`navigation-bar-background.png`、`navigation-bar-background@2x.png`、`icon-sms.png`、`icon-sms@2x.png`、`tool-bar-background.png`和`tool-bar-background@2x.png`。\n\
  \n\n#### 外观 API：简洁而强大\n\nApple 在 iOS 5.0 版本的 SDK 中引入了外观 API。在 iOS 5 之前，要更改导航栏、工具栏和栏按钮项等常见用户界面组件的设计，哪怕只是稍微调整一下色调，都是一个相当复杂的过程。\n\
  \n当 iOS 5 发布时，Apple 为许多 iOS UI 组件添加了大量新的公开方法，这些方法专门用于修改组件外观：更换背景图片，并为像 `UISlider`\
  \ 或 `UIProgressBar` 这样复杂的 UI 组件中的各个部分设置色调。\n\n在 iOS 5 之前，如果我们希望导航栏的标题使用自定义字体或添加阴影，我们是无法直接访问导航栏中的标签的。相反，我们必须实现一种变通方法，包括创建一个新标签、动态调整其大小，然后将该自定义标签设置为每个导航栏的\
  \ `titleView` 属性。真是麻烦！值得庆幸的是，Apple 通过 iOS 5 的外观 API 向前迈出了一大步。现在，我们不仅对大多数 UI 组件有了更多自定义选项，甚至可以在全局级别定义我们的外观设置。例如，我们可以在代码中声明，每个导航栏实例都应使用特定的自定义背景图片，或者每个栏按钮项都应使用某种颜色并采用某种字体样式。这意味着，我们实际上可以在一个地方定义所有的外观\
  \ API。你认为哪里是合适的地方呢？我们的全局样式表类怎么样？\n\n现在，让我们切换到 `BRStyleSheet.h` 头文件。我们将再声明一个公开类方法：\n\
  \n`+(void)initStyles;`\n\n在 `BRStyleSheet.m` 源文件中，暂时为我们的新 `initStyles` 方法添加一个空实现：\n\
  \n```\n+(void) initStyles\n{\n\n}\n```\n\n我们将在应用首次启动时仅调用一次 `initStyles`。打开你的应用委托类\
  \ `BRAppDelegate.m` 源文件。导入 `BRStyleSheet.h`，然后在 `application:didFinishLaunchingWithOptions:`\
  \ 方法中添加一行代码：\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary*)launchOptions\n\
  {\n    [BRStyleSheet initStyles];\n    return YES;\n}\n```\n\n`application:didFinishLaunchingWithOptions:`\
  \ 方法是程序中第一个执行的代码，并且只会运行一次。这是初始化所有全局自定义外观样式的地方。那么，现在让我们切换回 `BRStyleSheet.m`，看看外观\
  \ API 究竟能做什么。以下是添加到 `initStyles` 中的前几行样式代码：\n\n```\n//导航栏\n    NSDictionary *titleTextAttributes\
  \ = [NSDictionary dictionaryWithObjectsAndKeys:\n                              \
  \           kFontNavigationTextColour, UITextAttributeTextColor,\n             \
  \                            [UIColor whiteColor], UITextAttributeTextShadowColor,\n\
  \                                         [NSValue valueWithUIOffset:UIOffsetMake(0,\
  \ 2)], UITextAttributeTextShadowOffset,\n                                      \
  \   kFontNavigation, UITextAttributeFont,nil];\n    [[UINavigationBar appearance]\
  \ setTitleTextAttributes:titleTextAttributes];\n\n    //设置带有生日蛋糕糖霜的背景图片\n    [[UINavigationBar\
  \ appearance] setBackgroundImage:[UIImage imageNamed:@\"navigation-bar-background.png\"\
  ] forBarMetrics:UIBarMetricsDefault];\n```\n\n在 iOS 5 中，Apple 为 `UINavigationBar`\
  \ 添加了一个新的 `titleTextAttributes` 属性，使我们能够传入一个包含导航栏标题可选样式属性的字典：文本颜色、阴影颜色、阴影偏移量和字体。请注意，`titleTextAttributes`\
  \ 是 `UINavigationBar` 的一个属性。然而，我们并非逐个为应用中的每个导航栏设置样式，而是可以通过 `UINavigationBar` 类的外观代理（即\
  \ `[UINavigationBar appearance]`）在全局级别设置 `titleTextAttributes` 属性。同样地，`UINavigationBar`\
  \ 有另一个实例方法 `setBackgroundImage:forBarMetrics:`，我们可以通过 `UINavigationBar` 类的外观代理在全局范围内访问它。构建并运行你的项目（参见图\
  \ 9-16）。\n\n![图片](img/9781430243748_Fig09-16.jpg)\n\n**图 9-16.** 样式化的导航栏标题和背景糖霜图片\n\
  \n我们的 `navigation-bar-background.png` 图片比默认的 44 点导航栏高度要高。我们定制的滴落糖霜图片高度为 60 点，并包含\
  \ alpha 透明度。这在 iOS 中运行良好。现在，你的糖霜应该漂亮地滴落在表格视图上了！\n\n\n##### 容器的外观样式\n\n很好。让我们继续处理\
  \ `BRStyleSheet.m` 中的 `initStyles` 方法。添加下一个外观 API 样式代码块：\n\n```\nNSDictionary *barButtonItemTextAttributes;\n\
  ```\n\n```\n//导航按钮\n\n    //导航按钮背景的色调\n    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar\
  \ class],nil]\nsetTintColor:kNavigationButtonBackgroundColour];\n\n    barButtonItemTextAttributes\
  \ = [NSDictionary dictionaryWithObjectsAndKeys:\n                              \
  \    kFontNavigationTextColour, UITextAttributeTextColor,\n                    \
  \               [UIColor whiteColor], UITextAttributeTextShadowColor,\n        \
  \                           [NSValue valueWithUIOffset:UIOffsetMake(0, 1)],\nUITextAttributeTextShadowOffset,nil];\n\
  \    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar class], nil]\n\
  setTitleTextAttributes:barButtonItemTextAttributes forState:UIControlStateNormal];\n\
  \n    NSDictionary *disabledBarButtonItemTextAttributes = [NSDictionary\ndictionaryWithObjectsAndKeys:\n\
  \                                    kFontNavigationDisabledTextColour,\nUITextAttributeTextColor,\n\
  \                                   [UIColor whiteColor], UITextAttributeTextShadowColor,\n\
  \                                   [NSValue valueWithUIOffset:UIOffsetMake(0, 1)],\n\
  UITextAttributeTextShadowOffset,nil];\n    [[UIBarButtonItem appearanceWhenContainedIn:[UINavigationBar\
  \ class], nil]\nsetTitleTextAttributes:disabledBarButtonItemTextAttributes forState:UIControlStateDisabled];\n\
  ```\n\n构建并运行。结果应该会显示带有色调的栏按钮项，如图 9-17 所示。\n\n![Image](img/9781430243748_Fig09-17.jpg)\n\
  \n**图 9-17.** 带有色调的栏按钮项\n\n在最新的代码中，我引入了 `appearanceWhenContainedIn:` 样式方法。这种第二种外观\
  \ API 的重要性在于，我们可以指定 iOS 仅将奶油色样式应用于出现在 `UINavigationBar` 容器类中的 `UIBarButtonItem`\
  \ 实例。如果我们坚持对所有 `UIBarButtonItem` 类的实例设置全局样式，那么我们的样式也会被应用到工具栏中的“通讯录”和“Facebook”栏按钮项实例上。我们的应用设计对工具栏及其栏按钮项采用了截然不同的皮肤，因此这并不理想。现在让我们为\
  \ `initStyles` 方法添加工具栏样式：\n\n```\n//工具栏\n\n    //工具栏背景图片（蛋糕风格）\n    [[UIToolbar\
  \ appearance] setBackgroundImage:[UIImage imageNamed:@\"tool-bar-background.png\"\
  ]\nforToolbarPosition:UIToolbarPositionAny barMetrics:UIBarMetricsDefault];\n\n\
  \    //工具栏按钮\n    //工具栏按钮的深色背景\n    //工具栏按钮背景的色调\n    [[UIBarButtonItem appearanceWhenContainedIn:[UIToolbar\
  \ class],nil]\nsetTintColor:kToolbarButtonBackgroundColour];\n\n    //UIBarButtonItem\
  \ 上的白色文字\n    barButtonItemTextAttributes = [NSDictionary dictionaryWithObjectsAndKeys:[UIColor\n\
  whiteColor], UITextAttributeTextColor,nil];\n    [[UIBarButtonItem appearanceWhenContainedIn:[UIToolbar\
  \ class], nil]\n     setTitleTextAttributes:barButtonItemTextAttributes forState:UIControlStateNormal];\n\
  ```\n\n构建并运行。此时，你的主屏幕应该看起来与我们的主屏幕设计几乎完全相同（见图 9-18）。\n\n![Image](img/9781430243748_Fig09-18.jpg)\n\
  \n**图 9-18.** 经过样式化的工具栏及其中的栏按钮项\n\n##### 将样式表应用到应用的其他部分\n\n我们的样式表类几乎完成了，但我们需要将标签和图片样式应用到应用的其他屏幕中，所以现在就来完成这部分工作。\n\
  \n###### 样式化提醒时间视图\n\n导航栏和自定义视图背景样式会自动应用到应用的所有屏幕上，但 `BRNotificationTimeViewController`\
  \ 中的说明文字在棋盘格背景下显得太暗，因此请打开 `BRNotificationTimeViewController.m`，导入 `BRStyleSheet.h`，并添加一个\
  \ `viewDidLoad` 实现：\n\n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n \
  \   [BRStyleSheet styleLabel:self.whatTimeLabel withType:BRLabelTypeLarge];\n}\n\
  ```\n\n构建并运行。说明文字现在应该已经应用了样式，如图 9-19 所示。\n\n![Image](img/9781430243748_Fig09-19.jpg)\n\
  \n**图 9-19.** 经过样式的提醒时间设置视图\n\n###### 样式化生日编辑视图\n\n我们将对生日编辑视图控制器应用相同的样式流程。打开 `BRBirthdayEditViewController.m`，导入\
  \ `BRStyleSheet.h`，然后通过添加 `viewDidLoad` 实现来样式化“包含年份”文本标签和照片容器：\n\n```\n-(void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    [BRStyleSheet styleLabel:self.includeYearLabel\
  \ withType:BRLabelTypeLarge];\n    [BRStyleSheet styleRoundCorneredView:self.photoContainerView];\n\
  }\n```\n\n构建并运行（见图 9-20）。\n\n![Image](img/9781430243748_Fig09-20.jpg)\n\n**图 9-20.**\
  \ 经过样式的生日编辑视图\n\n###### 样式化备注编辑视图\n\n备注编辑视图控制器显示的是一个文本视图而不是标签，因此我们需要在样式表中添加一个新的文本视图样式方法。在\
  \ `BRStyleSheet.h` 头文件中声明新方法：\n\n```\n+(void)styleTextView:(UITextView *)textView;\n\
  ```\n\n然后在 `BRStyleSheet.m` 源文件中实现新的 `styleTextView:` 类方法：\n\n```\n+(void)styleTextView:(UITextView\
  \ *)textView\n{\n    textView.backgroundColor = [UIColor clearColor];\n    textView.font\
  \ = kFontNotes;\n    textView.textColor = kFontLightOnDarkTextColour;\n    textView.layer.shadowColor\
  \ = kFontDropShadowColour.CGColor;\n    textView.layer.shadowOffset = CGSizeMake(1.0f,\
  \ 1.0f);\n    textView.layer.shadowRadius = 0.0f;\n    textView.layer.masksToBounds\
  \ = NO;\n}\n```\n\n打开 `BRNotesEditViewController.m`，导入 `BRStyleSheet.h`，然后在 `viewDidLoad`\
  \ 实现中样式化文本视图：\n\n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n    [BRStyleSheet\
  \ styleTextView:self.textView];\n}\n```\n\n构建并运行（见图 9-21）。\n\n![Image](img/9781430243748_Fig09-21.jpg)\n\
  \n**图 9-21.** 经过样式的编辑备注视图\n\n###### 创建并样式化生日详情视图\n\n目前，我们的生日详情视图内容显得很空，但我们很快就会解决这个问题（见图\
  \ 9-22）。\n\n![Image](img/9781430243748_Fig09-22.jpg)\n\n**图 9-22.** 生日详情视图：修改前\n\
  \n\n\n#### 滚动视图与可滚动内容\n\n当生日详情视图的内容高度超过可用视图高度时，我们将使其支持滚动。该屏幕的内容高度会变化，因为我们会显示用户生成的生日备注和按钮，让用户能在朋友生日时在其\
  \ Facebook 墙上发帖、发送电子邮件、短信或拨打电话。内容高度会随用户备注文本长度变化，因此需要在视图控制器中**运行时**计算内容高度。\n\n在故事板中，从对象库拖一个滚动视图到生日详情视图上。调整滚动视图大小以适配生日详情视图的边界。利用文档大纲面板，多选按钮和图片视图，将其拖入滚动视图中。Xcode\
  \ 会将按钮和图片视图移动为滚动视图的子视图（而非主视图），如图 9-23 所示。\n\n![图片](img/9781430243748_Fig09-23.jpg)\n\
  \n**图 9-23.** 按钮和图片视图，现为滚动视图的子视图\n\n我们希望滚动视图始终填充其父视图的可用空间。虽然我们的应用不支持横屏方向，因此这一点不会改变，但仍有必要将滚动视图的自动调整大小设置为：宽度灵活、高度灵活，以及顶部、底部和两侧固定，如图\
  \ 9-24 所示。\n\n![图片](img/9781430243748_Fig09-24.jpg)\n\n**图 9-24.** 配置滚动视图的自动调整大小设置\n\
  \n在固定子视图位置之前，我们先在滚动视图中添加两个图片视图。按表 9-2 所示，对图片视图进行定位、调整大小和配置。\n\n![图片](img/tab9-2.jpg)\n\
  \n视图布局应类似于图 9-25。\n\n![图片](img/9781430243748_Fig09-25.jpg)\n\n**图 9-25.** 图片视图已配置并定位\n\
  \n现在添加五个标签视图。按表 9-3 所示，对标签视图进行定位、调整大小和配置。\n\n![图片](img/tab9-3.jpg)\n\n视图布局现在应类似于图\
  \ 9-26。\n\n![图片](img/9781430243748_Fig09-26.jpg)\n\n**图 9-26.** 标签已配置并定位\n\n我们要修改“编辑备注”按钮，将其变为铅笔图标。删除“编辑备注”文本。使用属性检查器，将`Image`属性设置为`icon-notes.png`。将按钮类型改为自定义以移除圆角矩形边框。现在定位按钮（x=51,\
  \ y=91）并调整其大小（宽=44，高=44）。\n\n接下来是按钮。在滚动视图中添加五个按钮，按表 9-4 所示，对其进行定位、调整大小和配置。\n\n![图片](img/tab9-4.jpg)\n\
  \n即使电子邮件和删除按钮移出了视野，你也可以通过文档大纲面板选中它们，然后使用属性检查器和尺寸检查器进行配置。最终布局应如图 9-27 所示。\n\n![图片](img/9781430243748_Fig09-27.jpg)\n\
  \n**图 9-27.** 按钮已配置并定位\n\n使用助理编辑器布局，请按住 Control 键拖拽，为我们在生日编辑视图中新增的视图和按钮，在`BRBirthdayDetailViewController.h`中创建新的输出口和操作方法。如果你无法访问被其他视图遮挡的视图，也可以从文档大纲面板拖拽到`BRBirthdayDetailViewController.h`。以下是已添加新输出口和操作方法的`BRBirthdayDetailViewController.h`文件结果。请确保你的文件与之匹配：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n@class BRDBirthday;\n\
  \n@interface BRBirthdayDetailViewController : BRCoreViewController\n\n@property(nonatomic,strong)\
  \ BRDBirthday *birthday;\n@property (weak, nonatomic) IBOutlet UIImageView *photoView;\n\
  @property (weak, nonatomic) IBOutlet UIScrollView *scrollView;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *birthdayLabel;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *remainingDaysLabel;\n@property (weak, nonatomic) IBOutlet UILabel *remainingDaysSubTextLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *notesTitleLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *notesTextLabel;\n@property (weak, nonatomic) IBOutlet\
  \ UIImageView *remainingDaysImageView;\n@property (weak, nonatomic) IBOutlet UIButton\
  \ *facebookButton;\n@property (weak, nonatomic) IBOutlet UIButton *callButton;\n\
  @property (weak, nonatomic) IBOutlet UIButton *smsButton;\n@property (weak, nonatomic)\
  \ IBOutlet UIButton *emailButton;\n@property (weak, nonatomic) IBOutlet UIButton\
  \ *deleteButton;\n\n- (IBAction)facebookButtonTapped:(id)sender;\n- (IBAction)callButtonTapped:(id)sender;\n\
  - (IBAction)smsButtonTapped:(id)sender;\n- (IBAction)emailButtonTapped:(id)sender;\n\
  - (IBAction)deleteButtonTapped:(id)sender;\n\n@end\n```\n\n使用常规编辑器，切换到`BRBirthdayDetailViewController.m`，首先导入`BRStyleSheet.h`。与之前一样，我们在`viewDidLoad`实现中添加标签和圆角样式：\n\
  \n```\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n\n    [BRStyleSheet styleRoundCorneredView:self.photoView];\n\
  \n    [BRStyleSheet styleLabel:self.birthdayLabel withType:BRLabelTypeLarge];\n\
  \    [BRStyleSheet styleLabel:self.notesTitleLabel withType:BRLabelTypeLarge];\n\
  \    [BRStyleSheet styleLabel:self.notesTextLabel withType:BRLabelTypeLarge];\n\
  \    [BRStyleSheet styleLabel:self.remainingDaysLabel withType:BRLabelTypeDaysUntilBirthday];\n\
  \    [BRStyleSheet styleLabel:self.remainingDaysSubTextLabel\nwithType:BRLabelTypeDaysUntilBirthdaySubText];\n\
  }\n```\n\n构建并运行。标签和图片视图应已应用了美观的样式，如图 9-28 所示。\n\n![图片](img/9781430243748_Fig09-28.jpg)\n\
  \n**图 9-28.** 生日详情视图中的标签和图片视图已应用样式\n\n为了将生日内容添加到详情视图中，我们首先将高亮显示的代码添加到`BRBirthdayDetailViewController.m`的`viewWillAppear:`方法中：\n\
  \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \n    self.title = self.birthday.name;\n    UIImage *image = [UIImage imageWithData:self.birthday.imageData];\n\
  \    if (image == nil) {\n        //如果没有生日图片，则默认使用生日蛋糕图片\n        self.photoView.image\
  \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n     \
  \   self.photoView.image = image;\n    }\n\n    int days = self.birthday.remainingDaysUntilNextBirthday;\n\
  \n    if (days == 0) {\n        //今天就是生日！\n        self.remainingDaysLabel.text\
  \ = self.remainingDaysSubTextLabel.text = @\"\";\n        self.remainingDaysImageView.image\
  \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n     \
  \   self.remainingDaysLabel.text = [NSString stringWithFormat:@\"%d\",days];\n \
  \       self.remainingDaysSubTextLabel.text = (days == 1) ? @\"more day\" : @\"\
  more days\";\n        self.remainingDaysImageView.image = [UIImage imageNamed:@\"\
  icon-days-remaining.png\"];\n    }\n\n    self.birthdayLabel.text = self.birthday.birthdayTextToDisplay;\n\
  }\n```\n\n这段代码与我们之前在`BRBrithdayTableViewCell.m`中使用的代码几乎相同。效果应如图 9-29 所示。\n\n![图片](img/9781430243748_Fig09-29.jpg)\n\
  \n**图 9-29.** **(a)** 显示天数倒计时 **(b)** 如果当天是朋友生日，则显示蛋糕图标\n\n\n\n### 计算文本尺寸\n\n生日详情视图控制器也应显示用户生成的任何备注。我们希望备注显示在“备注”标题标签的正下方，然后备注之后出现一排按钮。因此，我们需要根据备注文本的高度，动态调整滚动视图的内容布局。我们允许用户编写多行备注，因此需要动态测量备注文本标签所需的高度。`NSString`\
  \ 有一个方法 `sizeWithFont:constrainedToSize:lineBreakMode:`，非常适合计算所需高度。现在，我们将通过在 `BRBirthdayDetailViewController.m`\
  \ 的 `viewWillAppear:` 实现末尾添加以下代码来整合此功能：\n\n```\n    NSString *notes = (self.birthday.notes\
  \ && self.birthday.notes.length > 0) ?\nself.birthday.notes : @\"\";\n\n    CGFloat\
  \ cY = self.notesTextLabel.frame.origin.y;\n\n    CGSize notesLabelSize = [notes\
  \ sizeWithFont:self.notesTextLabel.font\nconstrainedToSize:CGSizeMake(300.f, 300.f)\
  \ lineBreakMode:NSLineBreakByWordWrapping];\n\n    CGRect frame = self.notesTextLabel.frame;\n\
  \    frame.size.height = notesLabelSize.height;\n    self.notesTextLabel.frame =\
  \ frame;\n\n    self.notesTextLabel.text = notes;\n\n    cY += frame.size.height;\n\
  \    cY += 10.f;\n\n    CGFloat buttonGap = 6.f;\n\n    cY += buttonGap * 2;\n\n\
  \    NSMutableArray *buttonsToShow = [NSMutableArray\narrayWithObjects:self.facebookButton,self.callButton,\
  \ self.smsButton, self.emailButton,\nself.deleteButton, nil];\n\n    UIButton *button;\n\
  \n    int i;\n\n    for (i=0;i<[buttonsToShow count];i++) {\n        button = [buttonsToShow\
  \ objectAtIndex:i];\n        frame = button.frame;\n        frame.origin.y = cY;\n\
  \        button.frame = frame;\n        cY += button.frame.size.height + buttonGap;\n\
  \    }\n\n    self.scrollView.contentSize = CGSizeMake(320, cY);\n```\n\n构建并运行。现在您应该能看到，我们的备注文本标签尺寸会根据输入的文本自动调整，最大高度为\
  \ 300 点。五个按钮也整齐地排列在文本下方，并且滚动视图会精确滚动到内容的高度，如图 9-30 所示。\n\n![Image](img/9781430243748_Fig09-30.jpg)\n\
  \n**图 9-30.** 通过代码动态计算备注文本高度，按钮整齐地排列在备注文本视图下方\n\n让我们检查一下代码的工作原理。我们创建了一个名为 `cY` 的临时变量，用于在备注文本标签下方布局每个按钮时跟踪当前的\
  \ y 值。看看我们的最后一行代码：\n\n```\nself.scrollView.contentSize = CGSizeMake(320, cY);\n\
  ```\n\n我们使用 `cY` 值来确定滚动视图内容的总高度。\n\n我们将 `cY` 初始化为备注文本标签的左上角点（原点）：\n\n```\nCGFloat\
  \ cY = self.notesTextLabel.frame.origin.y;\n```\n\n之所以这样做，是因为备注文本标签上方的内容无需动态布局，只有它下方的所有内容才需要。\n\
  \n还剩下一点外观美化工作：那些难看的白色按钮需要改造！\n\n### 美化按钮\n\n这是我最后一条 iOS 美化技巧。我们想为生日详情视图中的按钮创建两种按钮样式：一种是大蓝色按钮样式，一种是大红色删除按钮样式。我们可以使用外观\
  \ API 来定义按钮样式。太棒了。然而，有一个问题：我们希望同一容器类中的按钮具有不同的样式。Apple 的 `appearanceWhenContainedIn:`\
  \ 方法在这种场景下行不通。针对这个问题，我找到的最佳解决方案是创建 `UIButton` 的多个子类，并对不同的子类应用不同的外观样式。\n\n在你的 Xcode\
  \ 项目中，选择 `user-interface/components` 分组，并在此创建一个新的 Objective-C 类文件。将你的类命名为 `BRBlueButton`，并设置其父类为\
  \ `UIButton`。都完成了？太棒了。现在重复这个过程，在同一个 `components` 分组中添加一个名为 `BRRedButton` 的新类，但这次将其父类设置为你刚刚创建的\
  \ `BRBlueButton`。我们不需要向这些新类添加任何代码，因为创建它们仅用于美化目的。\n\n回到你的故事板中的生日详情视图控制器场景，在文档大纲窗格中选择每个按钮。使用标识检查器，将前四个按钮的自定义类更改为\
  \ `BRBlueButton`，将最后一个（删除）按钮更改为 `BRRedButton`（参见 图 9-31）。\n\n![Image](img/9781430243748_Fig09-31.jpg)\n\
  \n**图 9-31.** 在标识检查器中选择按钮子类\n\n打开 `BRStyleSheet.m`，在导入 `BRBlueButton.h` 和 `BRRedButton.h`\
  \ 之后，将以下代码添加到 `initStyles` 方法的末尾：\n\n```\n     //按钮\n    [[BRBlueButton appearance]\
  \ setBackgroundImage:[UIImage imageNamed:@\"button-blue.png\"]\nforState:UIControlStateNormal];\n\
  \    [[BRBlueButton appearance] setTitleColor:kLargeButtonTextColour\nforState:UIControlStateNormal];\n\
  \    [[BRBlueButton appearance] setFont:kFontLarge];\n\n    [[BRRedButton appearance]\
  \ setBackgroundImage:[UIImage imageNamed:@\"button-red.png\"]\nforState:UIControlStateNormal];\n\
  \    [[BRRedButton appearance] setTitleColor:kLargeButtonTextColour\nforState:UIControlStateNormal];\n\
  \    [[BRRedButton appearance] setFont:kFontLarge];\n```\n\n构建并运行。神奇吧！我们现在有了诱人的蓝色和红色按钮，并且有了一种非常简单的方法可以在我们应用的任何其他视图中创建新的蓝色或红色按钮（参见\
  \ 图 9-32）！\n\n![Image](img/9781430243748_Fig09-32.jpg)\n\n**图 9-32.** 诱人的蓝色和红色按钮！\n\
  \n在样式代码中，注意到我们只对蓝色按钮应用了标题颜色，但它仍然被红色按钮样式继承了吗？子类也会从其父类继承外观样式。\n\n你可能注意到或没注意到最后一个样式小问题：主屏幕上的表格视图有白色背景。当表格视图在其可滚动内容区域的顶部和底部弹动时，你会注意到这一点。我们可以修复这个问题，并通过在\
  \ `initStyles` 方法中添加以下代码，使所有表格视图的表格视图背景颜色变为透明：\n\n```\n    //表格视图\n    [[UITableView\
  \ appearance] setBackgroundColor:[UIColor clearColor]];\n    [[UITableViewCell appearance]\
  \ setSelectionStyle:UITableViewCellSelectionStyleNone];\n    [[UITableView appearance]\
  \ setSeparatorStyle:UITableViewCellSeparatorStyleNone];\n```\n\n我还顺便添加了几行代码，以确保在我们的表格视图单元格中永远不会看到\
  \ Apple 的默认蓝色选中样式或线条分隔符样式，因为这与 *Birthday Reminder* 的设计不协调。\n\n### 总结\n\n第 3 天到此结束。恭喜！我们的\
  \ iPhone 应用现在已初具雏形，看起来像最初的 Photoshop 设计稿了。我想蛋糕设计本身就很诱人吧！\n\n今天下午我们学到了很多关于如何美化和设计\
  \ iPhone 应用样式的知识。*Birthday Reminder* 看起来不再像一个 Apple 示例测试项目，而是一个很酷的应用。它的核心功能也已启动并运行。今天上午我们掌握了\
  \ Core Data 的基础知识，现在我们可以添加、编辑和保存生日或任何其他类型的数据实体了。\n\n明天上午，我们将开始探索如何通过从用户的 iPhone\
  \ 通讯录和 Facebook 批量导入生日来填充我们的应用。我们还将学习如何在应用未运行时安排本地通知。\n\n明早见，精神饱满！\n\n![Image](img/ch.jpg)\n\
  \n## 第 4 天\n\n### 从通讯录和 Facebook 导入生日\n\n![Image](img/ch.jpg)\n\n## 第 10 章\n\n\n\
  \n"
- "# 从通讯录导入生日\n\n我们的项目已经进行到一半了。今天是第 4 天，大部分繁重的工作已经完成。今天我们将专注于从通讯录导入亲朋好友的生日到*生日提醒*中。我们会让这个过程对用户来说超级简单。只需轻点几下，他们的应用里就会装满生日提醒。\n\
  \n在构建任何应用时，设计简单易用的用户体验至关重要。我们要避免让用户经历手动将每个朋友的生日逐一输入应用的繁琐过程。那样很快就会让他们感到厌倦！苹果的电话通讯录应用（即地址簿）除了电话号码、电子邮件等信息外，还为每个联系人提供了多种字段。其中一项允许\
  \ iPhone 用户为每个联系人输入生日，如图 10-1 所示。\n\n![图片](img/9781430243748_Fig10-01.jpg)\n\n**图\
  \ 10-1.** 苹果电话通讯录应用：为联系人指定生日\n\n为联系人指定生日可能是某些用户会做、而另一些用户不会做的操作。因此，直接从地址簿导入到*生日提醒*是一个只有部分用户会使用的功能。\n\
  \n作为开发者，我们需要测试这个功能是否正常工作，所以在这个阶段，我建议你在 iPhone 通讯录中添加几个生日。\n\n## 优化空数据库的主页视图\n\n\
  是时候和我们的名人说再见了。我们不会在发布的应用中预填充随机名人列表，所以让我们先移除应用中的测试功能。\n\n打开`BRHomeViewController.m`源文件，删除整个`initWithCoder:`方法。如果你之前已将*生日提醒*安装到模拟器或\
  \ iPhone 上，现在将其删除。构建并运行。你的应用应该看起来像图 10-2 那样。当*生日提醒*首次启动时，一个空白的生日屏幕对新用户来说并不是最吸引人的启动画面。\n\
  \n![图片](img/9781430243748_Fig10-02.jpg)\n\n**图 10-2.** 生日数据库为空的主页视图\n\n当用户首次启动*生日提醒*并面对空数据库时，我们希望邀请并鼓励他们添加或导入一些生日来开始使用。还记得我们昨天在“生日详情”视图中设计的那些漂亮的大蓝色按钮吗？我认为我们应该在空主页的中心添加几个这样的按钮，邀请用户从通讯录和\
  \ Facebook 导入生日。\n\n为此，我们将向主页视图添加一个子视图。这个子视图显示文字“从……导入生日”，并附带两个大蓝色按钮，一个用于从通讯录导入，另一个用于从\
  \ Facebook 导入。\n\n在我们开始修改故事板布局之前，先将另外两个图片资源导入到 Xcode 项目的`resources/images`分组中：`icon-addressbook.png`\
  \ 和 `icon-addressbook@2x.png`。\n\n在 Xcode 中打开故事板，并聚焦于主页视图控制器场景。确保文档大纲面板已打开，然后从对象库中拖拽一个新的视图实例，直接放到文档大纲面板中的主屏幕视图上，如图\
  \ 10-3 高亮所示。\n\n![图片](img/9781430243748_Fig10-03.jpg)\n\n**图 10-3.** 将子视图拖放至主页视图\n\
  \n你的新子视图不应是表格视图的子视图，而应是主视图的子视图。这有点麻烦，但如果你的子视图放错了位置，可以使用文档大纲面板重新定位。此外，在文档大纲面板中将新子视图移到表格视图下方，这样它会显示在表格视图的前面，让你更容易操作。\n\
  \n保持新子视图选中状态，使用尺寸检查器来定位和调整大小（x=0, y=0, width=320, height=372）。我们还将使用属性检查器将子视图的背景设为透明。打开背景下拉菜单，从苹果默认颜色列表中选择清除颜色（见图\
  \ 10-4）。\n\n![图片](img/9781430243748_Fig10-04.jpg)\n\n**图 10-4.** 使用苹果的清除颜色使视图透明\n\
  \n接下来，向子视图中添加一个标签和两个按钮，并按以下列表设置位置、大小和额外的属性值：\n\n*   标签（`UILabel`）：x=14, y=92, width=293,\
  \ height=21，文本对齐：居中，字体系统：17，文本：**从……导入生日**\n*   按钮 1（`UIButton`）：将文本改为**通讯录**，然后定位并调整大小（x=7,\
  \ y=127, width=307, height=60）。将`Image`属性设置为`icon-addressbook.png`。使用身份检查器将按钮的自定义类更改为`BRBlueButton`，就像我们昨天做的那样。\n\
  *   按钮 2（`UIButton`）：将文本改为**Facebook**，然后定位并调整大小（x=7, y=202, width=307, height=60）。将`Image`属性设置为`icon-facebook.png`。使用身份检查器将按钮的自定义类更改为`BRBlueButton`。\n\
  \n构建并运行（见图 10-5）。\n\n![图片](img/9781430243748_Fig10-05.jpg)\n\n**图 10-5.** 得益于昨天的样式表类，创建大蓝色按钮简直是小菜一碟。\n\
  \n\n```markdown\n\n在 storyboard 中保持选中 Home 视图控制器场景，激活 Xcode 的 Assistant Editor 布局。当右侧面板中显示`BRHomeViewController.h`时，导入`BRBlueButton.h`，然后在`BRHomeViewController.h`中为标签、按钮和\
  \ holder 视图创建新的 Interface Builder 插座，分别命名为`importLabel`、`addressBookButton`、`facebookButton`和`importView`。我们需要透明\
  \ holder 视图（`importView`）的插座来根据生日数据库是否为空隐藏或显示它：\n\n```\n#import <UIKit/UIKit.h>\n\
  #import \"BRCoreViewController.h\"\n#import \"BRBlueButton.h\"\n\n@interface BRHomeViewController\
  \ : BRCoreViewController <UITableViewDelegate, UITableViewDataSource,NSFetchedResultsControllerDelegate>\n\
  \n-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue;\n@property\
  \ (weak, nonatomic) IBOutlet UITableView *tableView;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *importLabel;\n@property (weak, nonatomic) IBOutlet BRBlueButton\
  \ *addressBookButton;\n@property (weak, nonatomic) IBOutlet BRBlueButton *facebookButton;\n\
  @property (weak, nonatomic) IBOutlet UIView *importView;\n\n@end\n```\n\n除了新插座外，还要从\
  \ Address Book 和 Facebook 按钮创建 Touch Up Inside 操作到`BRHomeViewController.h`，如下所示：\n\
  \n```\n- (IBAction)importFromAddressBookTapped:(id)sender;\n- (IBAction)importFromFacebookTapped:(id)sender;\n\
  ```\n\n请注意，目前应用程序工具栏中有两个用于 Address Book 和 Facebook 的 Import 按钮（见图 10-5）。执行相同功能的重复按钮不是良好的用户界面设计，因此我们将修复此问题，使用户只看到一个\
  \ Address Book 按钮和一个 Facebook 按钮。在此之前，通过 Control 拖拽到我们刚刚设置的`importFromAddressBookTapped:`和`importFromFacebookTapped:`操作，为这些工具栏按钮添加\
  \ Interface Builder 操作。这样，两个 Address Book 按钮都应调用`importFromAddressBookTapped:`操作，两个\
  \ Facebook 按钮都应调用`importFromFacebookTapped:`操作。\n\n至此，storyboard 的工作暂告一段落，让我们将注意力转移到`BRHomeViewController.m`源文件。首先，为“Import\
  \ Birthdays from…”标签应用样式表。导入`BRStyleSheet.h`，然后添加`viewDidLoad`实现：\n\n```\n-(void)\
  \ viewDidLoad\n{\n    [super viewDidLoad];\n    [BRStyleSheet styleLabel:self.importLabel\
  \ withType:BRLabelTypeLarge];\n}\n```\n\n这会将奶油色文本和大型 Helvetica Neue 字体应用于指令标签。\n\
  \n新的导入子视图仅在 Core Data 存储中没有生日时显示。同样，带有 Address Book 和 Facebook 栏按钮项的工具栏仅在 Core Data\
  \ 存储中有一个或多个生日时显示。有一种简洁的方法可以在代码中实现这一点。我们将向 Home 视图控制器添加一个名为`hasFriends`的私有布尔属性。如果没有生日，则将`hasFriends`设置为\
  \ false；如果有一个或多个生日，则将`hasFriends`设置为 true。我们将重写`hasFriends`的设置器，并在每次设置私有属性时隐藏或显示导入子视图和工具栏。\n\
  \n继续处理`BRHomeViewController.m`，在私有接口中定义新的私有属性：\n\n```\n@interface BRHomeViewController()\n\
  \n@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;\n\
  @property (nonatomic) BOOL hasFriends;\n\n@end\n```\n\n现在重写`hasFriends`的设置器：\n\n\
  ```\n-(void) setHasFriends:(BOOL)hasFriends\n{\n    _hasFriends = hasFriends;\n\
  \    self.importView.hidden = _hasFriends;\n    self.tableView.hidden = !_hasFriends;\n\
  \n    if (self.navigationController.topViewController == self) {\n        [self.navigationController\
  \ setToolbarHidden:!_hasFriends animated:NO];\n    }\n}\n```\n\n我们只是根据`hasFriends`设置为\
  \ true 或 false 来隐藏或显示导入视图、表视图和工具栏。但应该在何处设置`hasFriends`的值呢？\n\n最简单的解决方案是每当 Home 视图控制器即将出现时设置`hasFriends`：\n\
  \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    [self.tableView reloadData];\n    self.hasFriends = [self.fetchedResultsController.fetchedObjects\
  \ count] > 0;\n}\n```\n\n构建并运行。现在，我们有了一个主屏幕，它会根据生日数据库是否为空而更新并呈现不同的内容。尝试轻点“+”按钮添加生日（见图\
  \ 10-6）。\n\n![Image](img/9781430243748_Fig10-06.jpg)\n\n**图 10-6.** 根据是否有已保存的生日来隐藏或显示表视图、导入视图和工具栏\n\
  \n我们将创建一个新的视图和视图控制器场景，以便在从 Home 视图轻点任一 Address Book 按钮时以模态方式显示。回忆一下第 1 章/第 1 天，图\
