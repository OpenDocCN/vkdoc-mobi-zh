  \ Bug 该怎么办？\n\n总结\n\n索引\n\n## 关于作者\n\n![Image](img/fm-1.jpg)\n\n`Nick Kuh` 是一位常驻英国的\
  \ iOS 顾问和开发者，拥有 14 年为 BBC、ESPN、Channel 4、Pearson 和 Novartis 等客户开发移动、桌面和网络应用的经验。他既参与大型商业\
  \ iOS 项目，也帮助初创公司在 App Store 上发布应用。\n\nNick 在商业工作之余，还开发了自己成功的独立应用，例如 *Tap to Chat*、*Poker\
  \ Royale* 和 *Portfolio Pro*。\n\n你可以在 Twitter 上通过 @nickkuh 找到 Nick，或访问他的网站 [www.nickkuh.com](http://www.nickkuh.com)。\n\
  \n## 关于技术审校\n\n![Image](img/fm-2.jpg)\n\n`Felipe Laso Marsetti` 是一位自学成才的软件开发者，专攻\
  \ iOS 开发，目前受雇于 Lextech Global Services 担任系统工程师。尽管他职业生涯中使用过多种语言，但没有什么比在 iPhone 和\
  \ iPad 项目上工作更让他开心。Felipe 拥有超过 2 年的专业 iOS 开发经验。他喜欢在 [`iFe.li`](http://iFe.li) 上写博客，作为\
  \ [`www.raywenderlich.com`](http://www.raywenderlich.com) 的成员制作 iOS 教程和文章，或担任 Objective-C\
  \ 及 iOS 相关书籍的技术审校。你可以在 Twitter 上通过 @Airjordan12345 找到 Felipe，在 Facebook 上通过他的姓名找到他，或在\
  \ App.net 上通过 @iFeli 找到他。当不工作或不编程时，Felipe 喜欢阅读、学习新语言和技术、观看体育比赛、烹饪或弹吉他和拉小提琴。\n\n\
  ## 关于封面图片作者\n\n![Image](img/fm-3.jpg)\n\n`Corné van Dooren` 设计了本书的封面图片。在暂时离开 friends\
  \ of ED 为基础系列设计新封面后，他致力于将技术形态与有机形态相结合，其成果现在出现在本书及其他书籍的封面上。\n\nCorné 的童年是在随手可得的东西上涂鸦中度过的，随后他开始探索多媒体的无限世界——而他的发现之旅自此从未停止。他的座右铭始终是“多媒体的唯一限制是想象力”，这句话不断推动他前进。\n\
  \nCorné 为众多国际客户工作，为多媒体杂志撰写特稿、评测和测试软件、编写多媒体研究文章，并参与许多其他 friends of ED 的图书项目。如果你喜欢\
  \ Corné 的作品，一定要看看他在《New Masters of Photoshop: Volume 2》（friends of ED，2004）中的章节。你可以在他的网站\
  \ [www.cornevandooren.com](http://www.cornevandooren.com) 上看到他的更多作品（并联系他）。\n\n##\
  \ 引言\n\n我的编程根源始于 1999 年的 Flash，当时我开始用 ActionScript 编写面向对象的游戏和应用。后来在 2009 年，Apple\
  \ 推出 App Store 并向第三方开放其激动人心的新移动平台后不久，我决定转行成为一名 iPhone 开发者。\n\n从 Flash Player 开发过渡到\
  \ iPhone 开发并非一帆风顺，但对我帮助最大的一个关键因素是：Flash 面向对象编程的相同基础原则，也正是 Objective-C 和 iOS SDK\
  \ 的核心。\n\n如果你已经在使用另一种面向对象语言，那么你应该能够将这些知识应用到 Objective-C 中，并很快上手为 iPhone 构建应用。\n\n\
  \n#### 谁应该购买这本书\n\n你是 Flash 或 Java 开发者吗？是 PHP 或 Ruby 程序员吗？你已经精通至少一门面向对象编程语言，并希望将自己的技能扩展到广受欢迎的\
  \ iOS 平台。这本书就是为你准备的。\n\n或者，你是一位初级的 iPhone 开发者。你已经完成过其他书籍提供的许多代码示例。现在，你希望学习如何构建一款更大规模的应用程序，并将从这些示例代码片段中学到的知识整合起来，而这并不容易。\n\
  \n如果你完全是编程新手，你可能会觉得这本书相当有挑战性。不过，我总认为，即使是从深水区开始，勇敢面对困难，往往也是迎接新挑战的好方法。如果你是新手但学习能力很快，那么欢迎加入！在我们的旅程中，我会考虑到你。\n\
  \n我的书将帮助你克服上手 `Objective-C` 的挑战。我会帮助你有效利用面向对象编程的知识，编写出优秀的 iOS 应用程序。不过，如果你的面向对象代码有些不连贯，也别担心。在本书中，我会定期强调\
  \ iOS 是如何应用模型-视图-控制器（`MVC`）范式的。\n\n从一开始，我就会让你亲手实践 `Xcode`。这将是一本非常注重实操的书。毕竟，我们只有\
  \ 5 天时间来构建一个应用！\n\n你甚至可以立即下载我们将要开发的应用，它已经在 App Store 上架，名为 `*Birthday Reminder for\
  \ Facebook*`。\n\n#### 这本书将教你什么\n\n其他书籍会为你提供 iOS SDK 中各种框架的一章接一章的代码示例，但当你要构建自己的应用时，你还需要弄清楚如何最好地将这些概念组合起来。\n\
  \n本书采用了一种截然不同的学习方法。我将教你如何在短短 5 天内，构建一款专业、定制化、面向对象的 iPhone 应用。\n\n我们将从一个 Photoshop\
  \ PSD 设计图和一个应用创意开始。然后，在本书的剩余部分，我将引导你完成构建这款应用的每个阶段。但真正构建应用的人是你。你将学习如何像应用开发者一样思考，如何将一个创意转变为精美的\
  \ iPhone 应用，并在此过程中掌握大量技巧和诀窍。\n\n你将学习我过去 3 年多时间里总结出的一套开发流程，完成课程后，你就可以将其应用于你自己的应用。\n\
  \n你将要开发的应用表面上相当简单，但它所引入的开发原则同样适用于开发更大、更复杂的应用。\n\n随着时间的推移，我发现，在构建 iOS 应用时，日常面临的编程挑战往往有许多不同的解决方法。例如：\n\
  \n*   将远程图片加载到滚动列表视图中的最佳方式，同时不阻塞用户界面并保持应用优化。\n*   如何持久化存储用户数据（如文本和图片），并方便用户编辑和修改这些数据，或者撤销他们的更改。\n\
  *   如何实现自定义应用设计，而无需构建自定义的 iOS 视图组件。\n\n本书将用我在自身商业项目中使用的解决方案来处理这类挑战。这些解决方案将为你节省数天、数月甚至数年的投入时间！\n\
  \n我将用来教你 iOS 应用编程技能的过程，会是一个循序渐进的过程。我们将从一个概念开始，直到完成应用的构建。*你*将构建这个应用！在此过程中，你将学到：\n\
  \n*   如何充分利用苹果在所有新款 iPhone 和 iPod Touch 设备上的高分辨率 Retina 显示屏，让你的精美应用设计更加引人注目\n* \
  \  如何利用 `Xcode` 和 iOS 6 中的 Storyboard 快速绘制/模拟出应用的所有视图\n*   如何利用面向对象继承构建视图控制器——集中核心、可复用的方法。代码更少。错误更少。未来修改更容易。\n\
  *   Core Data 将如何解决应用的所有数据持久化需求。虽然这是一个比较高级的话题，但我会为你提供一个易于理解的 Core Data 入门介绍，这将为更复杂的项目奠定基础。和\
  \ Core Data 做朋友吧，它值得！（图片来源：images/smile.jpg）\n*   如何使用苹果在 iOS 6 中引入的最新的 Social 框架，深度集成\
  \ Facebook 的 Graph API。\n*   如何利用应用内的社交网络营销——让用户向他们的朋友推广你的优秀应用！\n\n这里涵盖的内容很多！\n\n\
  #### 这本书不会教你什么\n\n这不是一本 iOS SDK 的参考书。我不会提供每个 iOS 框架的示例。有很多其他优秀的书籍已经做到了这一点。\n\n（图片来源：images/ch.jpg）\n\
  \n## 第 1 天\n\n## Objective C、Xcode 和 iOS SDK 基础工作\n\n（图片来源：images/ch.jpg）\n\n##\
  \ 第 1 章\n\n## 设计和规划我们的应用\n\n作者：在本书的课程中，你将从一个概念到完成，构建一个应用！\n\n你：是的，师傅！\n\n作者：我希望你自己来构建这个应用。这是你学习的唯一途径！\n\
  \n你：是的，师傅！\n\n好了，不再引用过多的《龙威小子》台词了（嗯，后面可能还会偶尔出现一些！图片来源：images/smile.jpg）。我想说明的是，通过一步一步、一章一章的过程，我将成为你的导师——但是*你*必须投入艰苦的努力。你需要为这个应用编写每一行代码。你需要为这个应用创建每一个类和视图。\n\
  \n我会为你提供这个项目所需的所有设计素材。我甚至已经将它们切割成了实际的图片资源文件，你可以直接嵌入到自己的应用中。\n\n如果你想真正挑战自己，那就干脆不要看分阶段的源代码——直接扔掉它们！只使用导出的图片资源文件，然后自己编写所有代码。\n\
  \n我还会为你提供应用开发旅程中每一章的起始和完成源代码。所以，如果你卡住了，或者想直接跳到应用的某个特定部分，那就直接去吧。反正师傅又怎么会知道呢？\n\n\
  在本章中，我们将重点放在构建新 iPhone 应用的初始规划和设计阶段：当你有了应用创意后如何起步，了解你的应用面临的竞争，以及一些能帮助你的应用从苹果 App\
  \ Store 成千上万的应用中脱颖而出的技巧和诀窍。\n\n### 应用创意\n\n我们都曾忘记过某人的生日，对吧？\n\n你要构建的应用是一款生日提醒应用。`*Birthday\
  \ Reminder*` 将确保我们的用户永远不会再忘记任何生日！这是一个简单但实用的创意，正是成为一个好 iPhone 应用创意的那类东西。\n\n通过 `*Birthday\
  \ Reminder*`，你所有朋友和家人的生日都存储在一个地方。你会在每个生日当天或之前收到通知提醒。再也不会有尴尬的迟到贺卡和礼物了。我们的应用将为用户解决这个核心问题。这是一个应用能无缝完成的单一任务——让用户的生活更轻松一些。\n\
  \n一些应用开发者常有的误解是，认为为应用添加更多功能会增加其人气和 App Store 排名。相反，请保持你的应用创意简单——并提供美观、直观的用户体验。专注于把一件事做到极致，而不是把十件事做得一团糟。\n\
  \n这款应用将在竞争中脱颖而出。它的图标和用户界面将非常精美，甚至让你想舔你的 iPhone！用户体验对新用户来说将是直观易懂的。应用还将会快速响应触摸操作——这正是\
  \ iOS 用户对优秀 iPhone 和 iPad 应用的期待。\n\n\n\n### 添加与编辑生日\n\n我们应用的用户将能够无限制地添加和编辑生日记录。我们还将提供通过\
  \ iPhone 相机或照片库为每个生日分配照片的选项。\n\n所有生日数据将离线存储在 iPhone 本地的数据库中。我们将通过苹果的`Core Data`框架对数据库进行读写操作（你将在第\
  \ 8 章中更深入地了解`Core Data`）。\n\n### 从通讯录和 Facebook 导入生日\n\n我们将在应用中编程实现一个导入机制，方便用户利用最新的\
  \ iOS 6 Facebook 社交集成和原生通讯录框架批量导入生日。不过，我们不会强迫用户导入其所有 Facebook 好友，而是允许他们自行选择。这正是创建自定义离线存储方案的巨大优势之一：由我们掌控数据。\n\
  \n将选定的生日持久保存在我们的应用中，还意味着即使操作系统关闭了应用（当然，因为我们正在构建一款经过优化的应用，这种情况绝不会发生），我们也不会丢失这些数据，无需重新与通讯录或\
  \ Facebook 同步。\n\n### 笔记功能\n\n我们将在应用中加入笔记功能——这是用户记录礼物灵感的完美方式。笔记同样会保存并存储在我们的离线`Core\
  \ Data`存储中。\n\n### 提醒通知\n\n我们的应用将利用 iOS SDK 中的本地通知功能。在应用代码中，我们将安排这些通知提醒，它们会在用户的\
  \ iPhone 上按时触发每个生日提醒——即使我们的应用并未运行。我们还会在生日提醒中播放一小段《生日快乐》铃声。\n\n### Facebook 社交集成与应用内营销\n\
  \n我们不会仅仅止步于将 Facebook 生日导入应用。我们将学习如何深度集成 Facebook 的 Graph API 和苹果的 iOS 6 社交框架，让用户无需离开应用即可直接在其好友的\
  \ Facebook 墙上发帖。除了对用户来说是一项实用功能外，我们也为*生日提醒*自动获得了免费广告。通过第三方应用发布的每条 Facebook 帖子都包含一个直接链接，指向源应用。这有助于在每次用户向\
  \ Facebook 好友发送生日快乐祝福时宣传*生日提醒*。\n\n我们还会让用户轻松地向从通讯录导入的好友发送生日祝福电话、短信或电子邮件。\n\n###\
  \ 竞争分析\n\n我们已经有了应用创意，但在进入设计与编码阶段之前，现在可能是审视竞争对手的好时机。\n\n在项目开始时，研究应用最成功的竞争对手总是值得的。\n\
  \n在 App Store 中搜索你的目标关键词。哪些应用经常出现在搜索结果的前列？通常，这些是下载量最高的应用。这些成功的竞争对手做对了什么？可能包括以下因素的组合：\n\
  \n> *  他们拥有出色的图标。\n> *  他们构建了一款优秀的应用。\n> *  他们设计了精美的 UI（用户界面）。\n> *  他们的应用易于使用，用户体验直观。\n\
  > *  他们将社交网络有效地集成到应用中。\n> *  他们开展了强有力的营销活动。\n> *  他们的应用被苹果在 App Store 中推荐。\n> *\
  \  他们获得了大量 4 星和 5 星评价。\n> *  他们率先有了这个想法，并抢在竞争对手之前发布。\n\n列表中的最后一点通常是最常见的情况之一。许多早期带着好创意进入\
  \ App Store 的应用开发者，至今仍在他们的类别中占据强势地位。进入你所在类别的前 100 名，会为你的应用带来大量曝光。如果你幸运地达到这个位置，你的应用在\
  \ App Store 中的可见度将大大提高——从而获得更大的持续成功机会。\n\n作为一名新的应用开发者，我建议你重点关注列表中的前六点（也是唯一受你控制的几点），进而通过良好的市场营销，你的辛勤工作可能会让你在排行榜上稳步上升。\n\
  \n在其巅峰时期，*Tap to Chat* 曾位列美国 App Store 免费社交网络应用的前 50 名——每天获得超过 4000 次下载。这种情况持续了相当长一段时间。随后，我的团队在一家新公司旗下发布了该应用的改进版本。然而，新版本从未幸运地达到与原版相同的排名位置。这并不重要，因为我们的第一个版本已经占据了强势地位，并保持了其受欢迎程度。\n\
  \n在准备这本书时，我只用了五天就构建了*生日提醒*的第一个版本。在此之前，我仔细研究了竞争对手的应用。我查看了搜索结果，还下载并付费购买了几款在众多应用中脱颖而出的其他生日提醒应用。实际上，我在“birthday\
  \ reminder”的搜索结果中发现了 120 款 iPhone 竞争对手应用。不过，这并没有打消我的念头。首先，我有信心至少能实现列表中的前五点，从而取得成功：我能构建一款拥有直观用户体验的精美应用，出色地完成其核心任务——提醒用户所有朋友的生日。这款应用将以对用户有用的方式整合\
  \ Facebook 社交媒体，同时也能成为赋能点对点营销的有效方法。\n\n实际上，搜索结果让我备受鼓舞。是的，有些竞争对手应用很不错，但毫不客气地说，大多数都不怎么样。\n\
  \n一些排名靠前的应用有数百条评分和评论。这也令人鼓舞，因为它表明，只要你能被注意到，生日提醒应用就有强劲的市场需求。\n\n如果你想要亲自查看本书将从头到尾指导你构建的应用，现在就可以从\
  \ App Store 下载*Birthday Reminder for Facebook*。\n\n\n\n### App Store 标题\n\n已注册的\
  \ Apple 开发者（参见第 2 章）通过 `iTunes Connect` 网站（参见第 14 章）向 App Store 提交应用。如果标题已被占用，`iTunes\
  \ Connect` 将不允许你为应用设置该 App Store 标题。你会看到有些开发者通过添加“+”或“Pro”或其他后缀来（大致）获得他们想要的 App\
  \ Store 标题。\n\n不要将你的 App Store 标题与*Bundle 显示名称*混淆，后者是你的应用在 iPhone 主屏幕上的标题。两者截然不同。显示名称在你的应用\
  \ bundle 的 `Info.plist`（参见第 3 章）中设置，且长度限制在约 12 个字符，超出部分会被截断。\n\n与你的图标一样，App Store\
  \ 标题将是应用销售/下载的主要切入点。潜在用户在浏览一排排的竞品应用时，只能看到你的图标和 App Store 标题的前几个词。\n\n避免 App Store\
  \ 标题过于晦涩。你应该包含你希望用户搜索并找到你的应用的关键词。App Store 的搜索算法非常重视应用标题中的词语。除非你已在 iTunes 之外建立了强大的品牌，否则你需要非常谨慎地选择标题中的词语。\n\
  \n标题中词语的顺序同样重要。在 iOS 6 中，当在 iPhone 上浏览时，你的标题大约有 40 个字符的空间，超过后 App Store 会截断标题。对于仍在使用\
  \ iOS 5 的用户，App Store 标题限制为单行，并在约 18 个字符后截断。充分利用这些字符！确保标题的前一两个词与你的图标结合，能够准确传达你的应用功能。\n\
  \n不要回避在 App Store 标题中使用其他相关关键词；例如，*Portfolio Pro for iPad — 可定制的照片和视频应用*。在标题中包含副标题可以提高你在相关\
  \ App Store 搜索中出现的机会。\n\n我当初在构建 *Birthday Reminder for Facebook* 这个应用的第一个版本时，很幸运地抢到了这个标题。Facebook\
  \ 用户在 App Store 中是一个庞大的市场。他们每次使用该应用在好友的墙上发布生日祝福时，都会帮助推广它。瞄准这些用户是非常值得的。\n\n### 图标设计\n\
  \n或许你在制作 iPhone 应用方面是个多面手。你既能编写优秀的面相对象代码，又拥有设计精美用户界面的艺术眼光。那你可太幸运了！\n\n对于我们大多数人来说，只能擅长其中一项。本书面向开发者，所以给个实用小提示：如果你想把应用的设计工作外包给一位才华横溢的\
  \ iOS 设计大师，我强烈推荐从 `www.dribbble.com` 开始。Dribbble 是一个寻找才华横溢的设计师的绝佳网站。它是一个设计师分享和评论最新作品的社交网站。尝试搜索“iOS”或“iPhone”，浏览相关设计的众多页面。这是发现与你应用创意风格相符的设计师的好方法。\n\
  \n通过 Dribbble，我找到了《生日提醒》应用图标和用户界面的设计师。\n\n与你的 App Store 标题一样，你的图标是 iPhone 应用的第一印象。潜在用户会根据图标初步决定是否要进一步了解你的应用。所以，不要等到最后一刻才设计图标——它不是一个事后想法，它和应用本身一样重要！\n\
  \n新款 iPhone 和 iPod Touch 设备都配备了视网膜显示屏。因此，一个引人注目、设计精美并能充分利用视网膜屏幕上 114×114 像素图标尺寸的图标是必不可少的。\n\
  \n图 1-1 展示了我们应用的图标。一个设计感强、有趣且色彩丰富，并带有微妙 3D 效果的图标，将使我们在竞品图标中脱颖而出。\n\n![图片](img/9781430243748_Fig01-01.jpg)\n\
  \n**图 1-1.** 《生日提醒》的图标：简洁、色彩丰富且引人注目\n\n与你的 App Store 标题一样，不要试图把图标设计得过于花哨。重要的是你的潜在用户能够从图标设计中立即理解你的应用是做什么的。我为我们应用的图标选择了生日蛋糕设计，这一设计也延续到了我们应用的用户界面设计中。\n\
  \n### 用户界面设计\n\n与我合作的大多数设计师在为 iOS 应用进行设计时，都使用 Photoshop 作为首选工具。感谢 Teehan+Lax 的才华横溢的团队，设计师们可以访问一个非常实用的\
  \ PSD 文件，该文件将所有原生 iOS 控件模拟成 Photoshop 图层，并整合在一个 iOS GUI（图形用户界面）PSD 文件中。这为 iOS 设计提供了一个理想的起点。该\
  \ PSD 文件可从 `www.teehanlax.com/downloads` 免费下载（参见图 1-2）。\n\n![图片](img/9781430243748_Fig01-02.jpg)\n\
  \n**图 1-2.** Teehan+Lax 制作的 iOS GUI PSD 文件\n\n#### 视网膜显示屏、状态栏和 iPhone 5\n\niPhone\
  \ 5 之前的 iPhone 屏幕大小为 320×480 *点*。视网膜屏幕和非视网膜屏幕都是如此。点与像素不同。在 Objective-C 中，所有对视图大小或位置的引用都是以点为单位测量的。iPhone\
  \ 5 的屏幕是 320×568 点。\n\n在 iPhone 4 之前，每个点由单个像素组成。然而，在视网膜显示屏上，每个点中挤入了四个像素（2×2 网格），导致\
  \ iPhone 4 或 iPhone 4s 视网膜显示屏的总尺寸为 640×960 像素（参见图 1-3）。iPhone 5 的屏幕则容纳了 640×1136\
  \ 像素（参见图 1-3）。状态栏高度为 20 点，因此在视网膜显示屏上高度为 40 像素。\n\n我建议始终在你的应用设计中包含 iOS 状态栏。默认情况下，应用内会显示状态栏，但开发者可以通过代码或\
  \ `Info.plist`（参见第 3 章）隐藏状态栏，让应用全屏显示。除非有非常充分的理由，比如过渡到全屏照片幻灯片放映，否则请避免这样做。\n\n状态栏为用户提供了宝贵的信息，例如当前的手机信号和互联网信号强度、时间以及剩余电池电量。即使没有状态栏，你的应用视图仍然拥有高达\
  \ 320×460 点（iPhone 5 上为 320×548 点！）的屏幕空间——这是黑莓开发者只能梦寐以求的空间！\n\n![图片](img/9781430243748_Fig01-03.jpg)\n\
  \n**图 1-3.** 视网膜显示屏的点与像素\n\n\n\n### 纸上原型：从设计开始\n\n我强烈建议在编写任何代码之前先完成应用的设计。我总是从铅笔和纸开始，勾勒出用户界面的每一个视图。这种方法应该能为应用中的每个视图生成一个经过深思熟虑的优秀设计布局，并降低未来代码重构的风险。\n\
  \n通常，我会为应用的每个视图绘制多个迭代版本，直到对布局满意为止。然后我会拍下结果，通过电子邮件发送给我的设计师，并附上详细说明，让他们在 Photoshop\
  \ 中制作最终设计稿。设计师随后会为应用的每个视图创建 640×960 像素的视网膜屏幕就绪 PSD 文件。\n\n在与客户合作时，坚持要求在开始编写他们的应用代码之前，设计方案必须获得批准。客户常常会抗拒这一要求，声称他们的应用是一个进行中的工作，因此设计可能随时更改。这其实只是他们规划不周的表现。\n\
  \n通过在编写代码前花时间勾勒出每个屏幕的设计，你的客户将为你节省大量浪费的开发时间——从而也节省了浪费的预算。如果他们在良好的规划上投入，他们就能省下钱！\n\
  \n令人惊讶的是，有多少潜在的 UI 设计问题可以在纸上解决。这种在编码前勾勒屏幕的过程也被称为*纸上原型*。它使个人和团队能够检查每个屏幕，并讨论一种布局相对于另一种布局的影响。\n\
  \n设计一个直观且吸引人的 UI 是一个本书会经常参考的过程，但如果你希望在这个阶段深入探索，那么还有谁比 UI 设计大师本人——苹果公司——更适合学习呢？\n\
  \n让我向你介绍 HIG——苹果的人机界面指南，你可以在苹果开发者网站上随意阅读，网址是 [`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG/Introduction/Introduction.html)。\n\
  \nHIG 非常清晰地引导你了解 iOS 应用优秀 UI 设计的各个方面。从按钮的最小点击区域（44×44 点）到每一种手指手势（点击、滑动、轻扫等），以及用户期望你的应用如何做出响应。\n\
  \n人们对应用和操作系统在智能手机上的功能变得非常熟悉。出乎意料的 UI 行为会导致用户不满。让他们满意并享受使用我们的应用并不那么困难。HIG 为你提供了做到这一点所需的一切。\n\
  \n### 应用设计逐一讲解\n\n为了让你们熟悉 iOS SDK 的术语，我会将我们应用中的每个屏幕称为*视图*。我将在第 3 章中进一步深入探讨视图和视图控制器的细节，但在早期阶段认识到我们应用中的每个屏幕都是一个视图是很好的。\n\
  \n在 iOS 中，我们的每个主视图都有一个对应的视图控制器类。\n\n这是我们首次接触到苹果在 iOS SDK 中实现 Model-View-Controller\
  \ (MVC) 范式。如果你已经开始感到困惑，别担心。我将在第 4 章、第 5 章和第 6 章中进一步详细阐述视图、视图控制器以及 iOS 中的 MVC。\n\n\
  *生日提醒* 将包含以下主视图（每个视图由各自的视图控制器控制）：\n\n> * 主视图（生日列表）\n> * 生日详情视图\n> * 生日备注视图\n> *\
  \ 添加或编辑生日视图\n> * 从通讯录导入视图\n> * 从 Facebook 导入视图\n> * 设置视图及其子视图\n\n#### 主视图\n\n当我们的应用首次启动时，它将是一个空数据库。没有任何生日可以显示。因此，与其显示一个空的生日列表，我们将隐藏表格视图，并渲染两个大的行动号召按钮，以鼓励用户开始从他们的通讯录和\
  \ Facebook 导入生日（参见图 1-4a）。\n\n只要应用中添加了一个或多个生日，我们就会显示填充了生日的表格视图。我们仍然会为用户提供访问通讯录和\
  \ Facebook 导入按钮的便捷途径，但它们在屏幕设计中的重要性会降低（参见图 1-4b）。\n\n![图片](img/9781430243748_Fig01-04.jpg)\n\
  \n**图 1-4.** (**a**) 首次启动时的主视图 (**b**) 填充了生日的主视图\n\n我们的主视图（图 1-4a 和 1-4b）包含了 iOS\
  \ SDK 中的标准控件组件：导航栏（`UINavigationBar`）、标签（`UILabel`）、按钮（`UIButton`）、表格视图（`UITableView`）、表格视图单元格（`UITableViewCell`）、图像视图（`UIImageView`）、工具栏（`UIToolbar`）以及栏按钮项（`UIBarButtonItem`）。这些不是定制的组件。然而，你会注意到的是，我们可以在多大程度上重新“换肤”这些标准组件，以打造一个美观的\
  \ UI 设计。\n\n在 iOS 5 中，苹果引入了外观 API，并且在 iOS 6 中继续发展。这些 API 使得为苹果的 UI 组件换肤比以往版本的 iOS\
  \ SDK 容易得多。*生日提醒*将充分利用这些功能。\n\n使用生日蛋糕作为我们图标的设计概念也在应用的主视图中随处可见，例如主视图和导入生日视图，其中每个生日都被表示为一个蛋糕层。这些蛋糕层中的每一个都将由我们应用中定制设计的表格单元格（`UITableViewCell`）来渲染。\n\
  \n在 iPhone 应用中，应用导航通常通过一种特殊类型的视图控制器来控制：一种管理多个子视图控制器的视图控制器。这些父视图控制器的主要例子是导航控制器（`UINavigationController`）和标签栏控制器（`UITabBarController`），它们以适用于小屏幕设备的方式管理子视图和视图控制器的流程。\n\
  \n我们主视图顶部的导航栏由应用的主导航控制器拥有。当填充了生日后，主视图会显示一个包含多个表格单元格的表格视图，以呈现每个生日的详细信息。\n\n当用户点击表格视图中列出的某个生日时，我们的应用将响应点击手势，并创建生日详情视图的一个实例。生日详情视图将被“推入”主导航控制器。导航控制器将动画变换当前的主视图，将其滑向左侧，同时将新的详情视图从右侧滑入。毫无疑问，你在日常使用的许多\
  \ iPhone 应用中都见过这种行为。\n\n\n\n##### 生日详情视图\n\n当主视图控制器创建生日详情视图控制器和视图时，它还会将数据（生日数据）传递给生日详情视图控制器。生日详情视图控制器将动态更新其视图，以显示用户详细信息以及为此条目保存在数据库中的任何生日备忘。\n\
  \n`生日提醒` 需要聚合三种类型的生日，但它们都将显示在同一个详情视图中：\n\n> - 从 iPhone 通讯录导入的生日\n> - 从 Facebook\
  \ 导入的生日\n> - 手动添加到应用的生日\n\n![Image](img/9781430243748_Fig01-05.jpg)\n\n**图 1-5.**\
  \ (a) 显示 Facebook 导入结果的生日详情视图 (b) 显示通讯录导入结果的生日详情视图\n\n如果显示的生日是从 Facebook 导入的，那么\
  \ `生日提醒` 将允许用户在我们的应用内，直接使用 Apple 的社交框架和 Facebook 的 Graph API，在朋友的 Facebook 墙贴上一段生日祝福。\n\
  \n如果此生日是从用户的 iPhone 通讯录导入的，那么我们的应用也能获取与该联系人关联的电话号码和电子邮件。添加直接链接，让用户可以通过短信、电话或电子邮件向朋友发送生日祝福，这是充分利用我们应用已获得的用户通讯录原生访问权限的好方法。\n\
  \n##### 编辑生日与添加备忘：模态呈现\n\n我们应用中的生日数据将保持可编辑状态。因此，当用户查看生日详情视图时，我们将在导航栏中包含一个“编辑”按钮。点击后，我们的应用将展示当前生日详情的一个可编辑版本，用户将能够进行修改（参见图\
  \ 1-6 a）。\n\n你看到图 1-5 所示屏幕中生日图片下方的备忘图标了吗？当用户点击铅笔图标时，生日详情视图控制器将通过展示我们的备忘视图来响应此操作（参见图\
  \ 1-6 b）。\n\n![Image](img/9781430243748_Fig01-06.jpg)\n\n**图 1-6.** (a) 添加/编辑生日详情视图\
  \ (b) 编辑生日备忘视图\n\n这两种选择都使用户能够*编辑*他们当前在应用中查看的数据。我们需要向用户非常清晰地表明这一点。我们通过以模态方式呈现这些编辑视图来实现。同样，是父导航控制器负责从\
  \ iPhone 屏幕底部以动画方式呈现这些模态视图。用户将看到“取消”和“保存”选项：两个非常清晰的选择，供他们操作数据模型。\n\n我们将使用 Apple\
  \ 的 Core Data 框架来处理应用中所有本地数据的持久化。这带来了许多优势，例如，允许直接在应用中编辑任何生日——无论它是手动添加的，还是从用户的通讯录或\
  \ Facebook 导入的。\n\nCore Data 是 Apple 的一个框架，用于对象图管理和数据持久化。Core Data 默认使用的后端存储是 SQLite\
  \ 数据库，但也有一些其他的存储选项可供选择。尽管 Core Data 通常被认为是一个高级主题，但我将向您介绍在应用中添加对象、文本和二进制数据持久化的基础知识；在我们的案例中，简单来说，就是能够在不同的使用会话之间保存和编辑生日（参见第\
  \ 8 章）。\n\n##### 原生 Facebook 集成\n\n因为 `生日提醒` 会维护自己的生日数据存储，所以我们将允许用户从 Facebook 中挑选他们想要导入应用的朋友（参见图\
  \ 1-7 b），然后将生日数据、朋友姓名和个人资料图标 URL 本地保存到我们的 Core Data 存储中。\n\n![Image](img/9781430243748_Fig01-07.jpg)\n\
  \n**图 1-7.** (a) 处理 Facebook 授权 (b) 准备从 Facebook 导入生日\n\n在 iOS 6 之前，Facebook 就支持并鼓励\
  \ iOS 开发者将社交功能集成到 iOS 应用中。在 iOS 6 中，Apple 已与 Facebook 合作，将 Facebook 的单点登录机制直接集成到\
  \ iOS 平台中。\n\n在 iOS 6 中，Apple 加强了数据隐私保护，以确保用户在分享来自 Facebook 或通讯录的数据时需要主动选择加入。我们将学习如何处理授权流程（参见图\
  \ 1-7 a）。\n\n从通讯录导入视图的外观将与从 Facebook 导入视图完全相同，并附带多选和全选/全不选快捷键按钮。这些导入视图将以模态方式呈现在我们的应用中。当用户点击按钮从\
  \ Facebook 好友列表或通讯录联系人导入时，他们将通过向存储中添加新生日来直接修改数据模型。以模态方式呈现这些导入视图，并为用户提供取消导入操作的选项，是合理的做法。\n\
  \n##### 设置视图\n\n`生日提醒` 会根据其数据模型中存储的每个生日，在生日当天或之前触发本地的 iOS 通知。通过我们的设置视图，我们将允许用户设置何时想要收到提醒通知（参见图\
  \ 1-8 a、b 和 c）。\n\n![Image](img/9781430243748_Fig01-08.jpg)\n\n**图 1-8.** (a) 主设置视图\
  \ (b) 提前天数设置视图 (c) 提醒时间设置视图\n\n设置视图也是添加推广链接的好地方。鼓励你的用户去撰写一个好评。增加你的 Facebook 点赞数，并让用户能够通过电子邮件、Twitter\
  \ 或 Facebook 分享你的应用。你已经付出了所有艰辛努力让应用到达用户手中，不要错过这个绝佳的机会来提高你的应用在 App Store 中的流行度排名，并充分利用社交网络上的营销！\n\
  \n\n\n#### 导出设计图像资源\n\n现在，我们已经对我们的设计 PSD 百分百满意了（好吧，我就假设你很满意！），我们可以开始分解并导出那些将要成为\
  \ Xcode 项目一部分的图标和背景图像了。\n\n在本书的剩余部分，当项目各章和阶段需要时，我会为你提供已导出的 PNG 图像资源。\n\n在第 1 章 的源代码设计/代码中，你还会找到七个用于我们应用中主要视图的视网膜设计的\
  \ Photoshop PSD 文件。包含这些设计文件为你提供了一个良好的起点，让你了解在为你的项目委托设计师时应该期待什么。\n\n完成本书后，当你开始构建自己的应用时，你将需要自己经历创建资源\
  \ PNG 和 JPG 的过程。你无法总能预测切割设计 PSD 的最佳方式。这是一个我在开发过程中，当需要为我正在处理的视图创建资源时常采取的行动。\n\n我们将要创建一个针对视网膜显示优化过的应用。由于视网膜显示器的像素是非视网膜的四倍，我们所有针对视网膜优化的图像在用户的\
  \ iPhone 上看起来都会平滑而清晰。\n\n诀窍是为每个图标和背景图像创建两个版本：（1）一个用于非视网膜显示，（2）另一个是非视网膜大小的两倍，并且质量更高，用于视网膜屏幕。\n\
  \n只要你遵循以下命名约定，iOS SDK 将自动识别为视网膜准备的图像：\n\n标准版本：`my-image.png`\n\n视网膜版本：`my-image@2x.png`\n\
  \n在这个例子中，如果 `my-image.png` 的尺寸是 150×100 像素，那么 `my-image@2x.png` 的尺寸就是 300×200 像素，并且会被视网膜设备自动使用，以充分利所有额外的像素。\n\
  \n假设这个示例图像是不可拉伸的，那么在屏幕上渲染此图像的图像视图的尺寸是 150×100 *点*。\n\n在本章的源代码中，你会发现我提供了一些已导出的示例\
  \ PNG 资源：`navigation-bar-background.png`（320×60 像素）和 `navigation-bar-background@2x.png`（640×120\
  \ 像素）。像 iPhone 3G 这样的旧款非视网膜 iOS 设备会显示 `navigation-bar-background.png` 版本的图像。而在较新的视网膜设备上，`navigation-bar-background@2x.png`\
  \ 会被 iOS 自动使用，从而得到一个更清晰、像素化更少的图像版本，但仍然显示在 320×60 点的矩形内。\n\n我们的*生日提醒*应用的 PSD 文件都是按照视网膜屏幕的尺寸——640×960\
  \ 像素来设计的。因此，在导出每个资源时，我首先使用 `[filename]@2x.[fileformat]` 的命名约定导出了所有的视网膜资源。然后，我将每个导出的图像压平并缩小到其视网膜尺寸的一半，并为旧款非视网膜屏幕导出了不带\
  \ `@2x` 的较小版本。\n\n*提示：确保你的视网膜资源的像素宽度和高度都是偶数，这样当你将它们缩小一半时，得到的尺寸仍然是整数像素宽度和高度。*\n\n\
  ### 一点额外帮助\n\n在本书中，我会在旅程的每一个阶段引导并帮助你。然而，在课程结束后，当你开始自己的应用开发之旅时，你可能会偶尔遇到障碍。我们都会遇到。\n\
  \n也许你无法弄清楚如何让某个框架工作，或者你在为向 App Store 提交应用而进行配置时遇到困难。无论问题是什么，你都不太可能是第一个遇到它的人。求助就在眼前！\n\
  \nApple 自己的文档非常详尽——你可以通过 iOS 开发者中心在线浏览文档。或者，Xcode 允许你通过 `^?` 键盘快捷键直接跳转到你所遇到问题的具体类、框架或方法。\n\
  \n当你在 iOS 代码中遇到特定的错误时，有一些非常方便的参考网站和博客可以去查阅。Stack Overflow (`stackoverflow.com`)\
  \ 是我目前最喜欢的。这是一个面向所有编程语言的极客问答网站。其他极客会对发布的每个技术问题的最佳答案进行投票。如果你遇到问题，可以打赌 Stack Overflow\
  \ 上已经有人提供了答案。\n\n此外，iOS 开发者中心上的 Apple 开发者论坛是另一个很好的资源，开发者可以在这里发布和搜索特定于 iOS 问题的答案。有些问题甚至是由\
  \ Apple 自己的工程师回答的——直接来自源头的答案！\n\n### 总结\n\n我们现在知道我们要构建什么了。我们已经规划好了应用的所有屏幕。\n\n我们了解到，开始制作应用的最佳方式是先用铅笔和画板勾勒出你的视图；在纸上确定最佳的用户体验和用户界面设计；并在编写代码之前解决设计挑战。这是构建应用并将未来的重构工作降至最低的最稳健的方法。\n\
  \n但我们还没有接触 Xcode 或编写任何代码。不幸的是，在我们可以开始编码之前，我们仍然有几个核心任务要完成。\n\n让我们继续，注册成为 Apple 开发者并为我们的应用进行设备测试的配置吧！\n\
  \n![Image](img/ch.jpg)\n\n## 第 2 章\n\n## 为开发配置我们的应用\n\n对某些人来说，这将是进展缓慢的一章。它涵盖了我们真正开始开发应用之前需要完成的所有任务。这些任务有点枯燥，但在它们完成之前，你无法取得太大进展。\n\
  \n成为 iOS 开发者计划中全额付费并注册会员的过程有点像一场艰苦的战斗，但一旦你通过了，你就能构建并向 App Store 提交尽可能多的应用，只要有时间去做！\n\
  \n一旦你完成了 iOS 开发者计划的注册，你就可以回到这一章，我们将详细探索 iOS 配置门户。我们还将逐步完成必要的流程，以便为在你的设备上测试应用准备你自己的配置环境。\n\
  \n### 免费下载 Xcode\n\n要开始开发应用，我们只需要一个 Apple 软件：Xcode（见图 2-1）。\n\n![Image](img/9781430243748_Fig02-01.jpg)\n\
  \n**图 2-1.** Xcode：用于创建 Mac 和 iOS 应用的 Apple 开发者工具\n\nXcode 由 Apple 通过 Mac App Store\
  \ 免费分发。首先要做的是在你的 Mac 上打开 App Store，然后直接从商店下载并安装 Xcode。你需要使用一台运行 Lion 或 Mountain\
  \ Lion 的基于 Intel 的 Mac 来安装 Xcode 4.5（或更高版本）。当 Xcode 在后台下载和安装时，你可以继续阅读。\n\n以下是美国\
  \ Mac App Store 中 Xcode 的直接链接：\n\n[`http://itunes.apple.com/us/app/xcode/id448457090?mt=12`](http://itunes.apple.com/us/app/xcode/id448457090?mt=12)\n\
  \n当 Apple 发布 Xcode 4.1 时，最初的下载大小高达 4GB！当时有很多不耐烦的开发者一次连续几小时——甚至几天——占用着他们的互联网连接，等待庞大的\
  \ Xcode 下载完成。安装过程也曾更加繁琐：Apple 分发的是一个安装程序，而不是通过商店分发一个应用，下载后，开发者还必须经历一个二级安装过程。该安装程序将文件和文件夹添加到硬盘的\
  \ Developer 目录中，以及许多独立的开发者工具，如 Instruments 和 Application Loader。\n\nXcode 4.5+ 的下载量不到\
  \ 100MB，并且是作为一个单一应用分发的，在短暂的下载时间完成后会自动安装。像 Instruments 这样的调试工具现在打包在 Xcode 应用包内。各种版本的\
  \ iOS 模拟器会根据需要（例如，如果你的应用需要支持 iOS 4 或 5，Apple 会提供 iOS 模拟器，使你能够在旧版 iOS 中运行和检查你的应用）在后台下载。\n\
  \n\n\n### 注册成为苹果开发者\n\n在将应用安装到 iPhone 上测试并提交至 App Store 之前，需要完成两个注册阶段：\n\n> - 免费注册成为苹果开发者\n\
  > - 加入 iOS 开发者计划，费用为 99 美元\n\n通过苹果开发者网站可免费注册：\n\n[`http://developer.apple.com/programs/register/`](http://developer.apple.com/programs/register/)\n\
  \n注册后你可以访问示例代码、文档以及 WWDC（苹果全球开发者大会）教程视频。\n\n要注册成为苹果开发者，你需要使用现有的 Apple ID 或创建一个新的。如果你曾在\
  \ iPhone 上从 App Store 下载过应用，那么你当时使用的就是自己的 Apple ID。或者，如果你用过 MobileMe、iCloud 或 Game\
  \ Center，用的也是你的 Apple ID。\n\n你还在等什么？现在就完成苹果开发者注册步骤，完成后返回即可！这不会花费太长时间。一旦完成，你就能立即访问\
  \ iOS 开发中心。图 2-2 展示了免费注册与 99 美元 iOS 开发者计划之间的区别。\n\n![图片](img/9781430243748_Fig02-02.jpg)\n\
  \n**图 2-2.** iOS 开发中心：左侧截图显示的是免费注册窗口；右侧截图显示的是已注册的开发者窗口。\n\n在图 2-2 中，你会看到 iOS 开发中心右侧列最初显示的是\
  \ iOS 开发者计划的促销广告。一旦你完成开发者计划的注册申请，该列就会填满准备发布应用所需的所有额外资源（图 2-2 右侧截图显示的是已登录的付费会员）。\n\
  \n*注意：完成本书的课程并非 100% 必须成为 iOS 开发者计划的付费会员。你可以在 Mac 的 iOS 模拟器中测试代码。*\n\n为了在 iPhone\
  \ 上测试应用（并最终提交应用到 App Store），你需要成为苹果开发者计划的付费会员。接下来进入下一阶段。\n\n### 加入 iOS 开发者计划\n\n\
  如果你打算开发自己的 App Store 或企业应用，需要完成申请流程并加入 iOS 开发者计划。\n\n标准计划费用为每年 99 美元。还有一种更昂贵的版本：iOS\
  \ 开发者企业计划，年费为 299 美元。选择企业计划的主要优势在于，你可以在公司内部发布应用，而无需通过 App Store。该计划针对大型企业，企业需要经过单独流程证明资格（这超出了本书的讨论范围）。\n\
  \n对我们大多数人来说，标准的 iOS 开发者计划就足够了。成为注册 iOS 开发者后，你可以访问：\n\n> - iOS 配置门户\n> - iTunes Connect\n\
  > - 苹果开发者论坛\n> - 新的 iOS SDK 测试版。在编写本书时，iOS 6 仍处于测试阶段。如图 2-2 所示，在我成为 iOS 开发者计划的付费会员之前，无法访问新的测试版。\n\
  \n为了直接在 iPhone 上调试并分发应用，你需要创建配置文件。这些是 Xcode 在编译时嵌入应用的配置文件。配置文件决定了哪些设备可以安装你的应用。一旦可以访问\
  \ iOS 配置门户，我们就能生成并下载这些配置文件。\n\niTunes Connect（[`https://itunesconnect.apple.com`](https://itunesconnect.apple.com)）是用于管理\
  \ App Store 应用的内容管理系统。向 App Store 提交新应用和应用更新均由 iTunes Connect 处理。此外，开发者登录 iTunes\
  \ Connect 可管理：\n\n> - 银行与税务信息/合同\n> - 销售趋势与报告\n\n苹果开发者论坛为 iOS 和 Mac 软件编程问题提供了极好的在线资源。\n\
  \n在获得这些 iOS 开发者工具和资源的访问权限之前，你需要等待苹果批准你的 iOS 开发者计划申请（见图 2-3）。\n\n![图片](img/9781430243748_Fig02-03.jpg)\n\
  \n**图 2-3.** 加入 iOS 开发者计划\n\n首先，通过苹果开发者网站完成注册流程：\n\n[`http://developer.apple.com/programs/ios/`](http://developer.apple.com/programs/ios/)\n\
  \n这不会花费太长时间。不过之后，你可能要等待长达两周时间，直到苹果受理你的计划申请。需要走不少繁琐的程序。不过别担心。在此期间，你可以跳到第 3 章。一旦申请通过，再翻回本章，我会带你完成配置应用以在设备上测试的这个有些令人困惑的过程。\n\
  \n### iOS 配置门户\n\n欢迎来到 iOS 配置门户（见图 2-4）。现在我们将一步步完成生成配置文件所需的所有流程。\n\n![图片](img/9781430243748_Fig02-04.jpg)\n\
  \n**图 2-4.** iOS 配置门户\n\n请查看图 2-4 的左侧列。菜单按我们即将操作的顺序列出了以下配置阶段：\n\n> - *证书*：你需要为当前应用及未来所有应用创建一个开发者证书和一个分发签名证书。\n\
  > - *设备*：在此处添加你希望测试应用的所有 iPhone、iPod 和 iPad 的唯一设备标识符（UDID）。\n> - *应用 ID*：在创建配置文件之前，你需要为应用创建一个唯一标识符。Xcode\
  \ 将使用该标识符，将你的编译项目与正确的配置文件关联起来。\n> - *配置*：至此，你终于可以生成我前面一直提到的配置文件了。每个配置文件都关联了上述三个阶段创建的证书、设备和应用\
  \ ID。\n\n\n\n#### 生成证书\n\n首次访问预置门户的“证书”部分时，你会发现默认情况下没有任何签名证书。你需要生成一个证书，以便在 iPhone\
  \ 或其他 iOS 设备上调试和安装应用。\n\n![Image](img/9781430243748_Fig02-05.jpg)\n\n**图 2-5.**\
  \ 生成证书前的预置门户“证书”部分\n\n要生成证书，首先需要创建一个证书请求文件。该证书请求文件必须通过 Mac 生成。通过“应用程序”>“实用工具”>“钥匙串访问”打开钥匙串访问。在钥匙串访问中，你需要选择“从证书颁发机构请求证书...”菜单选项（参见\
  \ 图 2-6）。\n\n![Image](img/9781430243748_Fig02-06.jpg)\n\n**图 2-6.** 在 OS X 上通过钥匙串访问发起证书请求\n\
  \n钥匙串访问会弹出一个对话框（参见 图 2-7），你需要在其中进行以下操作：\n\n> 1.  输入你的电子邮件地址。\n> 2.  输入常用名称。你输入的名称会在完成证书生成过程后显示在钥匙串访问中。当你准备将应用提交到\
  \ App Store 时，需要重复此证书生成过程，为你的 App Store 预置创建证书。请选择一个能标识此证书为开发版本的名称。\n> 3.  选择“存储到磁盘”选项。\n\
  > 4.  点击“继续”并将证书请求保存到桌面。\n\n![Image](img/9781430243748_Fig02-07.jpg)\n\n**图 2-7.**\
  \ 在钥匙串访问中设置开发证书请求的选项\n\n最终桌面上的证书请求文件名为 `CertificateSigningRequest.certSigningRequest`。这只是一个临时文件，仅用于下一步操作。\n\
  \n切换回浏览器中的 iOS 预置门户。点击“请求证书”按钮（在浏览器窗口中）后，系统会要求你选择通过钥匙串访问生成的证书请求文件（参见 图 2-8）。\n\n\
  ![Image](img/9781430243748_Fig02-08.jpg)\n\n**图 2-8.** 浏览到桌面上的证书请求文件\n\n提交你的证书请求。恭喜！你刚刚生成了第一个开发证书。现在应该可以在预置门户中看到它列出来了（参见\
  \ 图 2-9）。\n\n![Image](img/9781430243748_Fig02-09.jpg)\n\n**图 2-9.** 已生成的开发证书\n\n\
  从预置门户下载证书。双击下载的 `developer_identity.cer` 文件。钥匙串访问会提示你添加证书（参见 图 2-10）。\n\n![Image](img/9781430243748_Fig02-10.jpg)\n\
  \n**图 2-10.** 添加并自动安装下载的证书\n\n至此，你已经完成了开发的证书生成过程。Xcode 在编译应用的调试版本以在你已在预置门户中注册的设备上运行时，会使用你的开发签名证书。为了构建可以分享给\
  \ Beta 测试者并提交到 App Store 的应用发布版本，你还需要创建一个分发证书。创建过程与创建设开发证书完全相同，不同之处在于你需要先从预置门户“证书”部分选择“分发”标签。趁现在记忆犹新，你可能想立即重复整个证书生成过程来创建分发证书。\n\
  \n在预置门户的“证书”部分，你会看到 Apple 提供了一个下载 WWDR 中间证书的链接。下载并双击此证书，将其安装到 Mac 的钥匙串中。WWDR（Apple\
  \ Worldwide Developer Relations Certification Authority）证书仅用于确认你的开发或分发配置文件证书是由 Apple\
  \ 颁发的。\n\n#### 添加设备\n\n每部 iPhone、iPod 和 iPad 都有一个唯一的设备标识符。你需要为每个想在提交到 App Store\
  \ 之前用于测试应用的设备提供此 UDID。\n\n将你的 iPhone 连接到 Mac，打开 Xcode 并切换到“管理”窗口（“窗口”>“管理”或 ![Image](img/U002.jpg)![Image](img/U003.jpg)`2`）。在“设备”下，你应该能看到你的\
  \ iPhone 列出。选择你的手机，详细信息视图会显示你的 iPhone 标识符以及其他信息（参见 图 2-11）。UDID 是一个 40 位的字母数字字符串。\n\
  \n![Image](img/9781430243748_Fig02-11.jpg)\n\n**图 2-11.** 通过 Xcode 的管理器访问你的 iPhone\
  \ UDID\n\n向预置门户添加设备的过程相当简单。浏览到预置门户的“设备”部分。点击“添加设备”，然后输入你 iPhone 的 UDID。一旦设备保存到预置门户，它就会出现在与你开发者账户关联的设备列表中（参见\
  \ 图 2-12）。\n\n![Image](img/9781430243748_Fig02-12.jpg)\n\n**图 2-12.** 添加了一台设备（我的\
  \ iPhone）后的预置门户\n\n*注意：当你的设备通过 USB 连接到 Mac 时，也可以在 iTunes 中访问设备 UDID。不过，在向客户索取 UDID\
  \ 时，我通常只要求他们下载 App Store 中列出的众多免费 UDID 发送应用之一。可以尝试搜索 **UDID**。*\n\n#### 创建 App ID\n\
  \n对于你开发的每个应用，只需创建一个 App ID。你会为每个应用创建多个预置配置文件，但只有一个 App ID（参见 图 2-13）。\n\n![Image](img/9781430243748_Fig02-13.jpg)\n\
  \n**图 2-13.** 通过预置门户创建 App ID\n\n要创建 App ID，我们需要提供以下两项输入：\n\n> *   *描述*。我输入了 **BirthdayReminder**——你也可以这样做。\n\
  > *   *捆绑标识符*。这必须是一个唯一的字符串，App Store 和 iOS 设备将用它来从成千上万个其他应用中识别你的应用。如 图 2-13 所示，通常提供你网站的反向域名路径，例如\
  \ `com.domainname.BirthdayReminder`。预置门户不允许你使用示例中所示的 `com.apress.BirthdayReminder`，因为该标识符已被我使用！\n\
  > *   在你的捆绑标识符中，更改 `com` 和 `domainname` 占位符，但保留 `BirthdayReminder`（区分大小写）部分。这确保在第\
  \ 3 章中，Xcode 能够自动检测到我们应用项目的正确预置配置文件，该文件也名为 `BirthdayReminder`（区分大小写）。\n\n\n\n###\
  \ 生成配置文件\n\n在设备上直接运行应用前的最后一步，是生成配置文件。\n\n配置文件是一个连接前述所有三个步骤的文件：\n\n> - 签名证书\n> -\
  \ 设备 UDID\n> - App ID/包标识符\n\n选中 `Provisioning` 菜单选项后，你将创建一个可用于调试 *Birthday Reminder*\
  \ 的配置文件。你需要执行以下步骤（参见图 2-14）：\n\n> 1. 点击 `New Profile` 按钮。\n> 2. 将配置文件命名为 `Birthday\
  \ Reminder Developer`。\n> 3. 选择你的开发证书。\n> 4. 从下拉菜单中选择 `BirthdayReminder`。\n> 5.\
  \ 选择你在上一步中添加的所有设备。\n\n将来，每当你创建新应用时，都需要为应用的开发创建新的 App ID 和新的配置文件，但无需生成新的签名证书。\n\n\
  ![Image](img/9781430243748_Fig02-14.jpg)\n\n**图 2-14.** 为 *Birthday Reminder* 开发生成配置文件\n\
  \n默认情况下，`iOS Provisioning Portal` 显示的是*开发*配置文件（参见图 2-15）。\n\n![Image](img/9781430243748_Fig02-15.jpg)\n\
  \n**图 2-15.** 生成的配置文件\n\n如果新配置文件最初显示为 `Pending`，只需刷新页面几次，直到显示为可下载状态即可。\n\n你会注意到，在图\
  \ 2-15 中的 `Provisioning Portal` 里，我还有一个名为 `iOS Team Provisioning Profile` 的开发者配置文件。这是\
  \ Xcode 自动为我创建的通用配置文件。一旦你开始使用 Xcode 的 Organizer，系统会提示你登录 Apple Developer 账户。之后，Xcode\
  \ 会询问你是否希望它创建一个团队配置文件。我建议你这样做。团队配置文件由 Xcode 管理。每次你将新开发设备连接到 Mac 时，Xcode 的 Organizer\
  \ 会自动将设备 UDID 添加到你的 `Provisioning Portal` 和团队配置文件中。这意味着你无需为每个应用单独创建开发配置文件，就能直接从\
  \ Xcode 在开发设备上快速构建和运行 iOS 测试项目。这是 Xcode 4 中一个非常实用的功能。\n\n生成的配置文件是一个文件，你将其下载到 Mac\
  \ 上，双击即可自动安装。安装过程会打开 Xcode。切换到 Xcode 的 Organizer 窗口（`Window` > `Organizer` 或 ``![Image](img/U002.jpg)![Image](img/U003.jpg)`2``），然后在左侧栏的\
  \ `Library` 下选择 `Provisioning Profiles`，应能显示你新安装的开发配置文件（参见图 2-16）。\n\n![Image](img/9781430243748_Fig02-16.jpg)\n\
  \n**图 2-16.** Xcode 的 Organizer 窗口中已安装的 *Birthday Reminder* 配置文件\n\n现在你已经创建了开发配置文件，在下一章中就可以在\
  \ iPhone 上运行 *Birthday Reminder* 了。该配置文件只允许 *Birthday Reminder* 在你已添加并通过 `iOS Provisioning\
  \ Portal` 关联到配置文件的设备上运行。\n\n如果你购买了另一台 iPhone，需要注意的是，这个生成的配置文件不允许 *Birthday Reminder*\
  \ 在新设备上运行。同样，除非你已将朋友的 UDID 添加到 `iOS Provisioning Portal` 中，否则 *Birthday Reminder*\
  \ 也无法在他朋友的 iPhone 上运行。\n\n向已安装的配置文件中添加新设备，你需要：\n\n> 1. 通过 `iOS Provisioning Portal`\
  \ 编辑和修改配置文件。\n> 2. 将更新后的配置文件下载到 Mac 上。\n> 3. *在*双击安装之前，先在 Xcode 的 Organizer 中删除过时的配置文件。\n\
  > 4. 双击新下载的配置文件以自动安装。\n\n至此，如果你正在创建一个计划通过 App Store 分发或给 Beta 测试者测试的应用，那么为你的应用再重复生成两个额外的配置文件，将为你将来节省时间：\n\
  \n> - Ad Hoc 配置文件\n> - App Store 配置文件（应用提交流程参见第 14 章）\n\n### Ad Hoc 分发\n\nAd Hoc\
  \ 分发的目的是在开发过程中构建应用的内部发布版本。例如，如果你将应用分发给 Beta 测试者，那么你可以根据 Ad Hoc 配置文件来生成这些 Beta 版本。\n\
  \n你仍然需要添加所有希望参与 Beta 测试的设备的 UDID。在 `iOS Provisioning Portal` 中，你最多拥有 100 个设备名额。\n\
  \n### 总结\n\n如果你已经跟上了本章中配置的复杂流程，那么请为自己鼓掌！这个过程在刚起步时确实有些麻烦。\n\n但我向你保证，这是值得的。现在我们已经准备好开始使用\
  \ Xcode 了。那么，让我们从设置项目开始吧。\n\n![Image](img/ch.jpg)\n\n## 第 3 章\n\n## 设置我们的 Xcode\
  \ 项目\n\n欢迎使用 Xcode！是时候动手实践了。\n\n到目前为止，我们还没有犯过任何会搞砸应用的错误。让我们努力保持这个状态吧！\n\n在本章中，你将熟悉如何与\
  \ Xcode 协作。你将直接上手，为你的 *Birthday Reminder* 应用创建一个新的 iOS 项目。我会教你如何嵌入和指定图标，以及为应用设置启动画面。到了上午结束时，我们将探讨如何将你的项目部署和调试为一个可在\
  \ iPhone 或 iPod Touch 上运行的应用。\n\n\n\n### 开始上手\n\n首次启动 `Xcode` 时，您会看到一个“欢迎使用 Xcode”窗口，其中提供了一些初始选项（参见图\
  \ 3-1）。\n\n![图片](img/9781430243748_Fig03-01.jpg)\n\n**图 3-1.** “欢迎使用 Xcode”窗口\n\n\
  您随时可以通过 `Window > Welcome to Xcode` 或按 `` 1 快捷键重新打开 Xcode 的欢迎窗口。欢迎窗口中提供的选项包括：\n\n\
  - **创建新 Xcode 项目**：这将是我们入门的起点。\n- **连接到仓库**：Xcode 内置了对 Git 和 Subversion 的版本控制兼容性。如果您像我一样，希望您的编码\
  \ IDE（集成开发环境）专注于本职工作（编码），那么也没问题。我本人不使用 Xcode 的这一功能，而是更喜欢通过命令行运行 Git。如果您想在 Xcode\
  \ 中直接使用 Git 或 Subversion，也可以——尽管深入探讨此内容超出了本书的范围。\n- **了解 Xcode**：此选项会打开 Organizer\
  \ 窗口的文档部分。值得先浏览一下“关于 Xcode”的文档。第一个屏幕包含一张图表，高亮显示了 Xcode 工作区的各个区域和面板，这些内容将在本书中反复用到（参见图\
  \ 3-2）。\n- **前往 Apple 开发者门户**：一个跳转到 Apple 开发者网站的快捷链接。\n\n首先选择第三个选项：**了解 Xcode**。您将进入\
  \ Organizer 内的 Xcode 文档部分。图 3-2 截取自文档的第一页。值得先查看一下 Xcode 用户界面各部分对应的 IDE 面板。我会在本书的后续章节中多次提及它们。\n\
  \n![图片](img/9781430243748_Fig03-02.jpg)\n\n**图 3-2.**：Xcode 文档中的 IDE 分解图\n\n请注意左侧的导航区；在这里，您通常可以通过项目导航器窗格访问项目层级结构中的任何文件。中央的编辑区是您编写类代码文件或使用\
  \ Storyboard 文件创建用户界面的地方。IDE 的右侧称为实用工具区；它由检查器和资料库窗格组成。例如，当处理 Storyboard 或定义 Core\
  \ Data 实体的 UML（统一建模语言）时，您可以在这里使用属性检查器修改所选对象的属性。IDE 底部的窗格是调试区，在应用调试会话期间，日志和错误会输出到控制台。\n\
  \n让我们创建一个新项目！从菜单中选择 `File > New > Project` 或按 `` N 快捷键。Xcode 随即会提供一系列项目模板供您选择作为起点（参见图\
  \ 3-3）。\n\n对于某些项目，特定模板可以节省您的开发时间。例如，**Master-Detail** 模板会生成一个包含导航控制器和嵌入式根视图控制器的项目——然后您就可以直接开始工作了。\n\
  \n![图片](img/9781430243748_Fig03-03.jpg)\n\n**图 3-3.** 选择起始项目模板\n\n您可以说我吹毛求疵（好吧，尽管说吧！），但我喜欢尽可能多地控制应用中的代码。有些\
  \ Xcode 模板——尤其是那些包含 Core Data 模型的——会在您的项目中注入大量初始代码。您可以在项目生成后进行清理。但对于我们的项目，我希望您选择最简单的模板之一：**Single\
  \ View Application**。\n\n接下来，Xcode 会要求您为我们的新项目填写一些额外选项（参见图 3-4）。\n\n![图片](img/9781430243748_Fig03-04.jpg)\n\
  \n**图 3-4.** 为 *Birthday Reminder* 设置项目选项会动态生成应用的包标识符。\n\n- **Product Name**：输入\
