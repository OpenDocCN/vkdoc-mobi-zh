  \ Name**：Xcode 会使用作者/公司的详细信息预填充任何新类文件，这些信息设置在代码上方的注释中。如果我在此字段中输入“Nick Kuh”，那么我在项目中创建的每个新类都会在其头部注释中包含\
  \ Copyright (c) Nick Kuh。对于您的项目，请输入您的姓名或公司名称。\n- **Company Identifier**：您需要输入与您在第\
  \ 2 章中为配置文件使用的相同反向域名路径：`[com/co.uk/etc].[your_domainname]`。\n- **Class Prefix**：输入\
  \ `BR`，这是 *Birthday Reminder* 的缩写。您会发现，大多数第三方 Objective-C 代码库都会使用两到三个首字母作为其类的前缀。对于我自己的可重用类库，我使用\
  \ `NK`（Nick Kuh）。对于您不打算在项目之外重用的项目特定类，请使用合适的前缀。类前缀并非强制要求，但作为良好实践，现在实施是值得的。\n\n您还可以指定应用的目标设备是\
  \ iPhone、iPad 还是通用应用：一个带有两个用户界面（一个用于 iPhone，一个用于 iPad）的应用。对于我们的项目，我们仅选择 iPhone。\n\
  \n最后，确保选中 **Storyboarding** 和 **ARC**（自动引用计数）。然后我们就可以开始了。\n\n在接下来的屏幕上，选择硬盘上的一个位置来保存新的\
  \ *Birthday Reminder* 项目。取消选中 **Create Local Git Repository** 选项，除非您希望 Xcode 为您初始化一个\
  \ Git 源代码仓库。\n\n### 分解项目结构\n\n因为我们选择了 **Single View Application** 项目模板，所以 Xcode\
  \ 已自动向我们的项目添加了一个包含单个视图的 Storyboard。正如我在第 1 章中提到的，应用中的每个主视图都应始终由一个视图控制器类控制。Xcode\
  \ 生成了 `BRViewController` 来控制当前项目中的单个视图。\n\n默认情况下，Xcode 左侧的导航面板显示项目导航器。项目导航器列出了我们项目中包含的所有文件、组和框架（参见图\
  \ 3-5）。\n\n*注意：在项目导航器中选择文件会在 Xcode 的编辑区显示该文件。*\n\n当 iOS 尝试加载我们的 *Birthday Reminder*\
  \ 应用时，它会期望找到一个名为 `main.m` 的 Objective-C 文件作为入口点。对于此应用或任何其他应用，您都不需要修改 `main.m`，因此请不要进一步触碰此文件！\n\
  \n您会注意到 `main.m` 引用了 `BRAppDelegate` 类。`main.m` 包含一个函数，当 iOS 启动我们的应用时，该函数会生成应用代理类的一个实例。\n\
  \n![图片](img/9781430243748_Fig03-05.jpg)\n\n**图 3-5.** 初始生成的项目结构\n\n\n\n#### 应用程序委托\n\
  \n应用程序委托（Application Delegate）是一个你可以修改的类。`BRAppDelegate` 继承自 `UIResponder`，并实现了\
  \ `UIApplicationDelegate` 协议中的方法。\n\n你会看到 Xcode 已经自动填充了一些主要的 `UIApplicationDelegate`\
  \ 方法。`UIApplicationDelegate` 协议中的主要方法用于响应关键的应用事件，例如：\n\n> - `application:didFinishLaunchingWithOptions`：在你的应用首次启动时立即执行一次。\n\
  > - `applicationDidEnterBackground`：每当用户通过点击 iPhone 主页按钮等方式退出应用时执行。此时应用仍然存活，但处于冻结的非活跃状态。在此之后，其他应用代码将不会执行。当委托方法被调用时，我们可以在这里执行代码，但主要用于数据保存或释放内存。\n\
  > - `applicationDidBecomeActive`：当用户通过主屏幕或多任务栏重新启动应用时，应用变为活跃状态。\n\n*注意：要了解某个方法（或类）的更多信息，请高亮该方法并使用\
  \ `^![Image](img/U002.jpg)?` 快捷键，以显示所选内容的快速帮助（参见 图 3-6）。*\n\n![Image](img/9781430243748_Fig03-06.jpg)\n\
  \n**图 3-6.** 快速帮助。点击链接可访问完整文档。\n\n#### Info.plist\n\n选择并查看 `BirthdayReminder-Info.plist`。你会在\
  \ Supporting Files 组中找到这个重要文件。这是 Xcode 打包到我们应用中的配置文件。`Info.plist` 文件中的设置决定了 iOS\
  \ 如何实例化我们的应用。\n\n因为在选择项目设置选项时我们选择了使用故事板（Use Storyboard），项目模板已经创建了一个故事板，并设置了主故事板文件基名（Main\
  \ Storyboard File Base Name）配置属性（参见 图 3-7）。\n\n![Image](img/9781430243748_Fig03-07.jpg)\n\
  \n**图 3-7.** 由 Xcode 项目模板自动生成并在 `Info.plist` 中定义的主故事板\n\n你可以在 `Info.plist` 中分配许多配置设置，包括嵌入的字体列表；状态栏的显示或隐藏；以及\
  \ URL 类型（iOS 关联并链接到你的应用的其他应用的本地 URL 方案）。\n\n#### 前缀头文件\n\nXcode 还在我们的项目中添加了一个 `BirthdayReminder-Prefix.pch`\
  \ 文件。这是一个全局文件头，Xcode 编译器会将其预编译到项目中每一个 Objective-C 源类中。你可以在前缀头文件中定义全局函数或导入常见类的声明，以避免在各个类中重复导入声明。\n\
  \n#### 故事板\n\n故事板是 iOS 开发者工作流程中的一个关键工具。Apple 在 iOS 5 中为 Xcode 添加了故事板，并在 iOS 6 中对其进行了改进。根据\
  \ Apple 文档的定义，“故事板是 iOS 应用程序用户界面的可视化表示，显示了内容屏幕以及这些屏幕之间的连接。”\n\n我们的 *Birthday Reminder*\
  \ 项目将包含一个单一的故事板，该故事板定义了应用中的每一个屏幕，以及这些屏幕之间的连接和转场。使用 Xcode 的编辑器，我们将在故事板的每个屏幕中布置按钮、标签和其他子视图，并创建屏幕之间的连接。\n\
  \nXcode 中的故事板使得构建 iOS 应用的速度比 iOS 5 之前快得多。在第 5 章和第 6 章中，我们将为应用中的每个视图构建故事板。\n\n按照代码学习的传统，我认为是时候写一个\
  \ Hello World 示例了。\n\n### Hello World\n\n让我们来看看 Xcode 自动生成的故事板。从项目导航器（Project Navigator）的文件中选择\
  \ `MainStoryboard.storyboard`。编辑器区域将显示两个子面板：文档大纲面板（Document Outline panel）和故事板面板（Storyboard\
  \ panel）。如果文档大纲面板被隐藏，你可以按照我在图 3-8 中所示的方法将其打开。\n\n![Image](img/9781430243748_Fig03-08.jpg)\n\
  \n**图 3-8.** 查看故事板文件时，你可以隐藏/显示文档大纲面板。\n\n我们的主视图（也是唯一视图）应该会显示在故事板上。点击并选择该视图。文档大纲面板应会更新以高亮当前选择。注意到视图下方那个深色条了吗？这代表分配给该视图的视图控制器。点击并选择这个深色条。文档大纲的选择应该会更新，表明你已经选中了视图控制器。\n\
  \n保持视图控制器被选中的状态，将顶部的实用工具面板（Utilities pane）切换到第三个标签页，这会显示身份检查器（identity inspector）（参见\
  \ 图 3-9）。\n\n![Image](img/9781430243748_Fig03-09.jpg)\n\n**图 3-9.** 通过身份检查器查看所属的视图控制器类\n\
  \n身份检查器会显示当前在故事板中选择的自定义类：`BRViewController`。在第 5 章中，我们将学习如何使用身份检查器为视图控制器和视图分配自定义类。\n\
  \n如果还未选择，则将底部的实用工具面板切换到第三个标签页，即对象库（Object Library），如图 3-9 所示。\n\n*提示：根据你的偏好设置 Xcode\
  \ 的面板布局。你会在工具栏右侧找到三个切换按钮，用于隐藏/显示导航器（Navigator）、调试（Debug）和实用工具（Utilities）区域。*\n\n\
  在故事板中选中视图（而非视图控制器）后，向下滚动对象库。你会看到 iOS SDK 中列出的所有用户界面组件。找到标签（label）对象。从库中拖出一个标签实例，并将其放置在主视图的中央。双击标签，将文本改为\
  \ **Hello World**（参见 图 3-10）。\n\n![Image](img/9781430243748_Fig03-10.jpg)\n\n**图\
  \ 3-10.** Hello World\n\n注意在图 3-10 中，我已将右上角的实用工具面板切换到了属性检查器（attributes inspector），它会显示文本、字体名称和大小、文本颜色、对齐方式等属性。\n\
  \n现在你已将标签添加到视图中，就成功地在主视图中创建了一个子视图。如果再次选择主视图，你便可以修改视图属性，例如背景颜色。\n\n如果你还没发现的话，Xcode\
  \ 工具栏左侧的构建并运行（Build and Run）按钮会编译我们的项目，并在 iOS 模拟器中启动它（参见 图 3-11）。你可以通过“活动方案”（Active\
  \ Scheme）下拉栏在 iPhone 和 iPad 模拟器之间切换目标。\n\n![Image](img/9781430243748_Fig03-11.jpg)\n\
  \n**图 3-11.** 在 iOS 模拟器中运行的应用\n\n你应该能看到你的项目启动，并显示你添加到视图中的 Hello World 标签。\n\n你可以使用\
  \ `![Image](img/U002.jpg)![Image](img/U004.jpg)` 和 `![Image](img/U002.jpg)![Image](img/U005.jpg)`\
  \ 键盘快捷键，或通过“硬件 `![Image](img/U001.jpg)` 向左旋转”/“硬件 `![Image](img/U001.jpg)` 向右旋转”菜单，在模拟器中模拟设备旋转。\n\
  \n\n\n### 设置应用方向与自动布局\n\n`Birthday Reminder`不打算为此项目支持多方向，因此我们现在将应用的支持界面方向设置为仅“竖屏”。在项目导航器中选择`BirthdayReminder`项目，然后选择`BirthdayReminder`目标。您将看到一个摘要屏幕，其中包含“支持的界面方向”部分。取消选中“横向左”和“横向右”选项，如图\
  \ 3-12 所示。这样，我们的应用将不再旋转到横向方向。构建并运行以测试。\n\n![Image](img/9781430243748_Fig03-12.jpg)\n\
  \n**Figure 3-12.** 配置应用支持的界面方向\n\n我还希望您关闭苹果在 iOS 6 中引入的一项新技术——`Auto Layout`。`Auto\
  \ Layout`是一个强大的工具包，它将处理应用的所有视图位置和大小变化。对于有经验的 iOS 开发者来说，这也是一个高级主题；由于我们不支持多方向，我向您保证，它带来的麻烦将多于其价值！\n\
  \n在项目导航器中选择您的故事板，然后在实用工具面板中选择文件检查器的第一个标签，取消选中`Use Autolayout`，如图 3-13 所示。\n\n*注意：如果您想了解更多关于`Auto\
  \ Layout`的信息，我建议查看 Matthijs Hollemans 的教程：[`www.raywenderlich.com/20881/beginning-auto-layout-part-1-of-2`](http://www.raywenderlich.com/20881/beginning-auto-layout-part-1-of-2)。*\n\
  \n![Image](img/9781430243748_Fig03-13.jpg)\n\n**Figure 3-13.** 为应用关闭`Auto Layout`\n\
  \n### 添加图标和启动屏幕\n\n当我们创建新项目时，Xcode 创建了三个默认的纯黑色启动屏幕图像。我们很快将了解每个默认图像，但现在，我希望您从 Xcode\
  \ 中删除这些文件。打开“支持文件”组，多选`Default.png`、`Default@2x.png`和`Default-568h@2x.png`。按 Delete\
  \ 键，然后选择“移到废纸篓”按钮。\n\nXcode 的项目导航器列出了文件和组的层次结构。组与 Finder 中的文件夹不同。您可以在 Xcode 中创建组和子组，并在组层次结构中拖放类文件。然而，您修改后的结构不会在\
  \ Finder 中镜像；也就是说，您可以在 Xcode 中拥有复杂的组和文件层次结构，但在 Finder 中，所有类文件可能都位于根项目级别。\n\n我最初觉得这个组概念相当令人困惑。一种解决方案是先在\
  \ Finder 中创建新文件夹，然后将这些文件夹作为组添加到 Xcode 项目中。这有点奇怪，但有效。\n\n现在我们将在项目中添加本章源代码中包含的图标和启动屏幕图像。为此，在\
  \ Finder 中打开项目文件夹，创建一个名为`resources`的新文件夹。在`resources`中，创建一个名为`images`的子文件夹。现在将提供的源代码中`assets`文件夹中的所有图像复制到新的`images`目录中（见图\
  \ 3-14）。\n\n![Image](img/9781430243748_Fig03-14.jpg)\n\n**Figure 3-14.** 通过 Finder\
  \ 添加项目的所有图像资源\n\n现在切换回 Xcode。注意到这里没有任何变化吗？我们在 Finder 中向`BirthdayReminder`目录添加了目录和文件，但除非我们通过\
  \ IDE 将这些文件添加到 Xcode 项目中，否则它们将保持被忽略状态。\n\n在项目导航器中选择主`BirthdayReminder`组。然后使用键盘快捷键![Image](img/U002a.jpg)![Image](img/U002a.jpg)A\
  \ 或文件![Image](img/U001.jpg) > 添加文件到“BirthdayReminder”，导航到我们的`resources`目录。\n\n确保选中“为添加的文件夹创建组”（见图\
  \ 3-15），然后点击“添加”按钮。\n\n![Image](img/9781430243748_Fig03-15.jpg)\n\n**Figure 3-15.**\
  \ 将所有图像资源添加到 Xcode 项目\n\n将 Finder 文件夹和文件添加到 Xcode 项目的另一种方法是：将新文件夹从 Finder 直接拖入 Xcode\
  \ IDE，然后将文件夹直接放入项目导航器。Xcode 将弹出一个对话框。除非您更喜欢在主项目目录之外引用新文件，否则请选中“将项目复制到目标组的文件夹中”复选框和“为添加的文件夹创建组”选项，然后点击“添加”按钮。\n\
  \n运行并调试。您是否注意到应用有任何新变化？如果您眼疾手快，会看到新的启动图像在屏幕上显示了几毫秒，然后才出现“Hello World”视图。点击模拟器上的主页按钮，查看主屏幕上的`Birthday\
  \ Reminder`图标。如果它仍然是一个白色圆角矩形，则通过按住图标并点击“删除”按钮，从模拟器中移除`Birthday Reminder`。然后再次构建并运行。现在您应该看到白色主屏幕图标已变成`Birthday\
  \ Reminder`图标（见图 3-16）。神奇吧？\n\n*提示：如果 Xcode 未能显示应用中的预期更改（例如替换图标），请始终尝试产品 ![Image](img/U001.jpg)\
  \ 清理以清除调试缓存。*\n\n![Image](img/9781430243748_Fig03-16.jpg)\n\n**Figure 3-16.** 在\
  \ iOS 模拟器中显示的`Birthday Reminder`图标\n\n\n\n图标和启动画面能够被自动检测的原因，在于你为项目中某些图像设置的文件名。iOS\
  \ 会自动为你的应用绘制视网膜和非视网膜图标与启动图像，并根据设备自动选用尺寸最合适的版本。\n\n虽然还有其他方法可以为视网膜和非视网膜的 iPhone 及\
  \ iPad 指定图标，但这是最简单的方式。创建符合以下尺寸和命名规则的图标及启动画面，你会发现它们适用于任何 iOS 项目：\n\n> *   `Default.png`\
  \ 和 `Default@2x.png`：这是你的启动图像。如果你的应用是全屏应用，那么 `Default.png` 的尺寸应为 320×480 像素，`Default@2x.png`\
  \ 应为 640×960 像素。*Birthday Reminder* 允许显示 iOS 状态栏，因此我们需要从启动图像的高度中扣除 20 点。因此，`Default.png`\
  \ 应为 320×460 像素，`Default@2x.png` 应为 640×920 像素。\n> *   `Default-568h@2x.png`：这是针对\
  \ iPhone 5 屏幕的启动图像。尺寸应为 640×1136 像素，因为所有 iPhone 5 都支持视网膜显示屏。如果你不包含此文件，iOS 会认为你的应用不支持更高的原生\
  \ iPhone 5 屏幕，并会以信箱模式（屏幕顶部和底部显示黑条）显示你的应用。\n> *   `Icon.png` 和 `Icon@2x.png`：这是显示在\
  \ iPhone 主屏幕上的应用图标 PNG。`Icon.png` 应为 57×57 像素，`Icon@2x.png` 应为 114×114 像素。\n> *\
  \   `Icon-72.png` 和 `Icon-72@2x.png`：这是为安装你 iPhone 应用的 iPad 用户显示的图标（即使目标设备仅为 iPhone）。如果你不包含此版本的图标，则将使用默认的\
  \ 57×57 iPhone 图标；在 iPad 上调整大小时，它会显得像素化且丑陋。`Icon-72.png` 应为 72×72 像素，显示在非视网膜 iPad\
  \ 上；`Icon-72@2x.png` 应为 114×114 像素，显示在视网膜 iPad 上。\n> *   `Icon-Small.png` 和 `Icon-Small@2x.png`：这是在\
  \ iOS 设置、通知屏幕以及聚焦搜索中显示的图标。同样，如果你不提供此图标，iOS 将使用你主要的 57×57 图标并将其调整为 29×29 点。\n\n在\
  \ Photoshop 或预览中仔细查看我们的图标图形。圆角和光泽效果是由 iOS 动态添加的。我们的图标设计延伸到了每个角落和边缘。\n\n*Birthday\
  \ Reminder* 图标在没有 iOS 光泽效果时看起来更好。没问题——我们可以通过项目的 `Info.plist` 配置文件轻松解决此问题（见图 3-17）。\n\
  \n虽然默认未列出，但有一个名为“图标已包含光泽效果”的设置，我们可以将其作为新行添加到 `.plist` 文件中。在项目导航器中选中 `BirthdayReminder-Info.plist`，按住\
  \ Control 键单击编辑器区域，然后从上下文菜单中选择“添加行”。一个新行会添加到 `.plist` 中，你就能找到图标光泽设置。你还需要将该值更改为“是”。保存更改，然后构建并运行。你的图标应该会失去光泽效果，在模拟器主屏幕上看起来更干净。\n\
  \n*提示：图标更改有时需要多次构建和运行或清理产品才能生效。*\n\n我们还需要对应用图标做一项外观调整。默认情况下，`Info.plist` 会将项目名称指定为\
  \ iPhone 主屏幕上图标下方显示的标题。`BirthdayReminder` 超过了 12 个字符的显示标题限制，因此 iOS 会对其进行截断。通过将 `Info.plist`\
  \ 中的“Bundle 显示名称”属性更改为 `Birthdays`，可以轻松修复此问题（见图 3-17）。构建并运行。不再截断了——太好了！\n\n![Image](img/9781430243748_Fig03-17.jpg)\n\
