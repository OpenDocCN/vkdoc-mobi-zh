  \n\n\n### 访问并过滤通讯录联系人\n\n接下来我们将把注意力转向数据模型，以实现访问 iPhone 通讯录联系人并仅筛选出那些已设定生日的联系人。由于这是一项数据功能，我们将把通讯录查询代码添加到主模型类\
  \ `BRDModel` 中。\n\n在编写代码之前，我们需要先将 Apple 的通讯录框架添加到 Xcode 项目中。添加新框架的方法与我们在第 8 章中添加\
  \ Core Data 框架时相同。在项目导航器中选择 `BirthdayReminder` 项目，然后选择 `BirthdayReminder` 目标，最后选择“构建阶段”标签页，如图\
  \ 10-17 所示。\n\n![图片](img/9781430243748_Fig10-17.jpg)\n\n**图 10-17.** 准备添加新框架\n\n\
  点击图 10-17 中高亮显示的“+”按钮，并从列表中选择 `AddressBook.framework`。\n\n#### 通讯录数据隐私\n\n在 iOS\
  \ 6 中，Apple 收紧了数据隐私限制。iOS 6 之前的应用可以无限制地读写用户的通讯录。虽然在 iOS 6 中仍然可以做到这一点，但我们的应用首先需要通过系统提示视图向用户请求访问权限。提示视图仅在应用首次请求通讯录访问权限时显示，因此一旦用户授权了我们的应用，就不会再提示他们重新授权。\n\
  \n从应用架构的角度来看，这意味着我们首次请求用户授权通讯录访问权限时会产生延迟。\n\n让我们编写一些代码来观察实际效果。打开 `BRDModel.h` 并向我们的模型单例类添加一个新的获取方法：\n\
  \n`- (void)fetchAddressBookBirthdays;`\n\n我们的通讯录导入视图控制器会调用模型上的这个新方法，该方法随后会检查通讯录访问权限。一旦用户授予访问权限，模型就会从\
  \ iPhone 获取所有包含生日信息的通讯录记录，并通过通知将其分发出去，通讯录视图控制器将订阅此通知并相应地更新其视图。\n\n切换到 `BRDModel.m`\
  \ 源文件。导入新添加的通讯录框架：\n\n`#import <AddressBook/AddressBook.h>`\n\n通讯录框架是用 C 语言编写的，而不是\
  \ Objective-C，因此没有 ARC（自动引用计数）。这意味着作为开发者，我们需要避免造成内存泄漏，并且需要手动处理 C 对象的保留和释放。以下是添加到\
  \ `BRDModel.m` 中的初始 `fetchAddressBookBirthdays` 代码：\n\n```\n- (void)fetchAddressBookBirthdays\n\
  {\n    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL, NULL);\n\
  \n    switch (ABAddressBookGetAuthorizationStatus()) {\n        case kABAuthorizationStatusNotDetermined:\n\
  \        {\n            ABAddressBookRequestAccessWithCompletion(addressBook, ^(bool\
  \ granted, CFErrorRef error) {\n                if (granted) {\n               \
  \     NSLog(@\"已授予通讯录访问权限\");\n                }\n                else {\n     \
  \               NSLog(@\"通讯录访问权限已被拒绝\");\n                }\n            });\n \
  \           break;\n        }\n        case kABAuthorizationStatusAuthorized:\n\
  \        {\n            NSLog(@\"用户已授予通讯录访问权限\");\n            break;\n        }\n\
  \        case kABAuthorizationStatusRestricted:\n        {\n            NSLog(@\"\
  用户因家长控制等原因限制了通讯录访问权限\");\n            break;\n        }\n        case kABAuthorizationStatusDenied:\n\
  \        {\n            NSLog(@\"用户已拒绝通讯录访问权限\");\n            break;\n        }\n\
  \    }\n\n    CFRelease(addressBook);\n}\n```\n\n如代码所示，通讯录授权状态有四种可能情况。如果用户尚未允许或拒绝我们的应用访问其通讯录，那么授权状态将为\
  \ `kABAuthorizationStatusNotDetermined`，我们将向系统请求访问权限，系统会显示一个提示，让用户允许或拒绝访问（参见图 10-18）。\n\
  \n在 switch 语句中，我们还可以判断用户之前是已授权还是已拒绝访问。还有另一种可能性：用户限制了对系统的访问（例如当家长控制启用时），因此将无权向我们的应用提供通讯录访问权限。\n\
  \n打开 `BRImportAddressBookViewController.m` 源文件，让我们的通讯录视图控制器调用 `BRDModel` 的新方法 `fetchAddressBookBirthdays`。首先，导入\
  \ `BRDModel.h`，然后添加如下所示的 `viewWillAppear:` 方法：\n\n```\n-(void) viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n    [[BRDModel sharedInstance] fetchAddressBookBirthdays];\n\
  }\n```\n\n构建并运行。从主屏幕点击“导入通讯录”按钮。系统应会提示您允许/拒绝访问您的联系人，如图 10-18 所示。\n\n![图片](img/9781430243748_Fig10-18.jpg)\n\
  \n**图 10-18.** 向用户请求通讯录访问权限\n\n\n\n### 处理通讯录数据\n\n回到 `BRDModel.h`。首先，我们来声明一个通知名称，当模型单例成功处理用户通讯录中有关联生日的好友和家人时，我们会通过这个通知进行分发。在\
  \ `BRDModel.h` 文件顶部、任何其他代码或导入声明之前添加以下定义：\n\n```\n#define BRNotificationAddressBookBirthdaysDidUpdate\n\
  @\"BRNotificationAddressBookBirthdaysDidUpdate\"\n```\n\n现在切换到 `BRDModel.m`，添加一个新的空私有方法，我们稍后完成它：\n\
  \n```\n-(void) extractBirthdaysFromAddressBook:(ABAddressBookRef)addressBook\n{\n\
  \    \n}\n```\n\n我们将在用户授予访问权限时调用新的 `extractBirthdaysFromAddressBook:` 方法，或者在调用 `fetchAddressBookBirthdays:`\
  \ 时立即调用——前提是用户之前已经授予过访问权限。用下面高亮的两行代码更新 `fetchAddressBookBirthdays:`：\n\n```\n- (void)fetchAddressBookBirthdays\n\
  {\n    ABAddressBookRef addressBook = ABAddressBookCreateWithOptions(NULL, NULL);\n\
  \n    switch (ABAddressBookGetAuthorizationStatus()) {\n        case kABAuthorizationStatusNotDetermined:\n\
  \        {\n            ABAddressBookRequestAccessWithCompletion(addressBook, ^(bool\
  \ granted, CFErrorRef error) {\n                if (granted) {\n               \
  \     NSLog(@\"Access to the Address Book has been granted\");\n               \
  \     dispatch_async(dispatch_get_main_queue(), ^{\n                        // completion\
  \ handler can occur in a background thread and this call will update the UI on the\
  \ main thread\n                        [self extractBirthdaysFromAddressBook:ABAddressBookCreateWithOptions(NULL,\
  \ NULL)];\n                    });\n                }\n                else {\n\
  \                    NSLog(@\"Access to the Address Book has been denied\");\n \
  \               }\n            });\n            break;\n        }\n        case\
  \ kABAuthorizationStatusAuthorized:\n        {\n            NSLog(@\"User has already\
  \ granted access to the Address Book\");\n            [self extractBirthdaysFromAddressBook:addressBook];\n\
  \            break;\n        }\n        case kABAuthorizationStatusRestricted:\n\
  \        {\n            NSLog(@\"User has restricted access to Address Book possibly\
  \ due to parental controls\");\n            break;\n        }\n        case kABAuthorizationStatusDenied:\n\
  \        {\n            NSLog(@\"User has denied access to the Address Book\");\n\
  \            break;\n        }\n    }\n\n    CFRelease(addressBook);\n}\n```\n\n\
  以下是添加到 `BRDModel.m` 中的 `extractBirthdaysFromAddressBook:` 方法的初始实现：\n\n```\n-(void)\
  \ extractBirthdaysFromAddressBook:(ABAddressBookRef)addressBook\n{\n    NSLog(@\"\
  extractBirthdaysFromAddressBook\");\n    CFArrayRef people = ABAddressBookCopyArrayOfAllPeople(addressBook);\n\
  \n    CFIndex peopleCount = ABAddressBookGetPersonCount(addressBook);\n\n    //this\
  \ is just a placeholder for now - we'll get the array populated later in the chapter\n\
  \    NSMutableArray *birthdays = [NSMutableArray array];\n\n    for (int i = 0;\
  \ i < peopleCount; i++)\n    {\n        ABRecordRef addressBookRecord = CFArrayGetValueAtIndex(people,\
  \ i);\n        CFDateRef birthdate  = ABRecordCopyValue(addressBookRecord, kABPersonBirthdayProperty);\n\
  \        if (birthdate == nil) continue;\n        CFStringRef firstName = ABRecordCopyValue(addressBookRecord,\
  \ kABPersonFirstNameProperty);\n        if (firstName == nil) {\n            CFRelease(birthdate);\n\
  \            continue;\n        }\n        NSLog(@\"Found contact with birthday:\
  \ %@, %@\",firstName,birthdate);\n        CFRelease(firstName);\n        CFRelease(birthdate);\n\
  \    }\n\n    CFRelease(people);\n\n    //dispatch a notification with an array\
  \ of birthday objects\n    NSDictionary *userInfo = [NSDictionary dictionaryWithObjectsAndKeys:birthdays,@\"\
  birthdays\", nil];\n\n    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationAddressBookBirthdaysDidUpdate\
  \ object:self userInfo:userInfo];\n}\n```\n\n通讯录框架是 Core Foundation 的一部分，任何包含 `Copy`\
  \ 或 `Create` 的 C 函数都要求你在使用完毕后释放对象引用。因此，函数末尾出现了 `CFRelease(object)` 代码。上述代码目前还不完整，但它展示了如何访问用户的通讯录并遍历联系人记录。每条联系人记录都有一组可选属性，我们可以尝试访问这些属性。在我们的示例中，`kABPersonBirthdayProperty`\
  \ 属性指的是分配给联系人的任何生日，因此我们用它来只提取那些已分配生日的联系人。\n\n目前，我们的代码即使找到了分配了生日的联系人，也会分发一个包含空数组的通知。我们稍后会解决这个问题，但现在我们只是想让这段代码跑起来，并让调试器打印出\
  \ `Found contact with birthday: [Name], [Birthday]`。\n\n打开 `BRImportAddressBookViewController.m`\
  \ 源文件，并将其关联起来，以观察和处理 `BRNotificationAddressBookBirthdaysDidUpdate` 通知。\n\n以下是 `BRImportAddressBookViewController.m`\
  \ 类的完整代码：\n\n```\n#import \"BRImportAddressBookViewController.h\"\n#import \"BRDModel.h\"\
  \n\n@interface BRImportAddressBookViewController ()\n\n@end\n\n@implementation BRImportAddressBookViewController\n\
  \n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(handleAddressBookBirthdaysDidUpdate:)\
  \ name:BRNotificationAddressBookBirthdaysDidUpdate object:[BRDModel sharedInstance]];\n\
  \    [[BRDModel sharedInstance] fetchAddressBookBirthdays];\n}\n\n- (void) viewWillDisappear:(BOOL)animated\n\
  {\n    [super viewWillDisappear:animated];\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:self name:BRNotificationAddressBookBirthdaysDidUpdate object:[BRDModel\
  \ sharedInstance]];\n}\n\n-(void)handleAddressBookBirthdaysDidUpdate:(NSNotification\
  \ *)notification\n{\n    NSDictionary *userInfo = [notification userInfo];\n\n \
  \   self.birthdays = [userInfo objectForKey:@\"birthdays\"];\n    [self.tableView\
  \ reloadData];\n\n    if ([self.birthdays count] == 0)\n    {\n        UIAlertView\
  \ *alert = [[UIAlertView alloc] initWithTitle:nil message:@\"Sorry, No birthdays\
  \ found in your address book\" delegate:nil cancelButtonTitle:nil otherButtonTitles:@\"\
  OK\", nil];\n        [alert show];\n    }\n}\n\n@end\n```\n\n构建并运行。当你启动通讯录导入视图控制器时，你应该会反复看到“抱歉，在你的通讯录中未找到生日”的提示，因为我们的模型目前正在分发一个空数组。然而，假设你已经授予了*生日提醒*访问通讯录的权限，那么每次你打开通讯录导入视图控制器时，模型的\
  \ `extractBirthdaysFromAddressBook:` 方法应该会将任何通讯录中的生日记录到调试器中。如果你在调试器中没有看到这些信息，那么现在正是为你的朋友分配一些生日的好时机，这样你就可以测试这段代码了！\n\
  \n**注意：** 你可以通过设置 ![Image](img/U001.jpg) 通用 ![Image](img/U001.jpg) 还原 ![Image](img/U001.jpg)\
  \ 还原位置与隐私来重置 iPhone 上的隐私权限，以测试应用对通讯录的允许和阻止访问。\n\n\n\n#### 创建生日导入值对象\n\n在 `BRDModel`\
  \ 中，我们的 `addressBookBirthdays` 方法会遍历用户的通讯录。我们需要决定如何处理和格式化返回的联系人记录。通讯录视图控制器将像主页视图表格一样显示导入生日的列表；也就是说，包含距离朋友生日的天数、用户友好的日期格式、照片等信息。\n\
  \n我们将创建一个新的 `BRDBirthdayImport` 类，作为 `NSObject` 的子类。在项目导航器中选择 `data` 分组，然后创建一个新的\
  \ `NSObject` 子类，命名为 `BRDBirthdayImport`。`BRDBirthdayImport` 将与我们 Core Data 管理的 `BRDBirthday`\
  \ 对象非常相似。然而，我们不能直接继承 `BRDBirthday`，因为 Core Data 的 `NSManagedObject` 是一个特殊类，只能通过托管对象上下文来实例化。\n\
  \n让我们添加 `BRDBirthdayImport.h` 接口：\n\n```\n#import <Foundation/Foundation.h>\n#import\
  \ <AddressBook/AddressBook.h>\n\n@interface BRDBirthdayImport : NSObject\n\n@property\
  \ (nonatomic, strong) NSNumber *addressBookID;\n@property (nonatomic, strong) NSNumber\
  \ *birthDay;\n@property (nonatomic, strong) NSNumber *birthMonth;\n@property (nonatomic,\
  \ strong) NSNumber *birthYear;\n@property (nonatomic, strong) NSString *facebookID;\n\
  @property (nonatomic, strong) NSData *imageData;\n@property (nonatomic, strong)\
  \ NSString *name;\n@property (nonatomic, strong) NSDate *nextBirthday;\n@property\
  \ (nonatomic, strong) NSNumber *nextBirthdayAge;\n@property (nonatomic, strong)\
  \ NSString *picURL;\n@property (nonatomic, strong) NSString *uid;\n\n@property (nonatomic,readonly)\
  \ int remainingDaysUntilNextBirthday;\n@property (nonatomic,readonly) NSString *birthdayTextToDisplay;\n\
  @property (nonatomic,readonly) BOOL isBirthdayToday;\n\n-(id)initWithAddressBookRecord:(ABRecordRef)addressBookRecord;\n\
  \n@end\n```\n\n除了 `notes` 属性外，我们创建了一组与 `BRDBirthday` 实体相同的属性。我们还创建了一个初始化方法 `initWithAddressBookRecord:`，以便我们能够使用通讯录记录初始化器来生成并填充\
  \ `BRDBirthdayImport` 的实例。\n\n现在切换到 `BRDBirthdayImport.m` 的实现，首先导入我们在第 8 章中为 `UIImage`\
  \ 编写的缩略图类别：\n\n```\n#import \"BRDBirthdayImport.h\"\n#import \"UIImage+Thumbnail.h\"\
  \n\n@implementation BRDBirthdayImport\n\n@end\n```\n\n你可以从 `BRDBirthday.m` 中复制粘贴下一段代码。尽管代码重复并不是一个好习惯，但在这种情况下很难避免：\n\
  \n```\n-(void)updateNextBirthdayAndAge\n{\n    NSDate *now = [NSDate date];\n\n\
      NSCalendar *calendar = [NSCalendar currentCalendar];\n\n    NSDateComponents\
  \ *dateComponents = [[NSCalendar currentCalendar] components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:now];\n    NSDate *today = [calendar dateFromComponents:dateComponents];\n\
  \n    dateComponents.day = [self.birthDay intValue];\n    dateComponents.month =\
  \ [self.birthMonth intValue];\n\n    NSDate *birthdayThisYear = [calendar dateFromComponents:dateComponents];\n\
  \n    if ([today compare:birthdayThisYear] == NSOrderedDescending) {\n        //今年的生日已经过去，所以下一个生日将在明年\n\
          dateComponents.year++;\n        self.nextBirthday = [calendar dateFromComponents:dateComponents];\n\
      }\n    else {\n        self.nextBirthday = [birthdayThisYear copy];\n    }\n\
  \n    if ([self.birthYear intValue] > 0) {\n        self.nextBirthdayAge = [NSNumber\
  \ numberWithInt:dateComponents.year - [self.birthYear intValue]];\n    }\n    else\
  \ {\n        self.nextBirthdayAge = [NSNumber numberWithInt:0];\n    }\n\n}\n\n\
  -(void) updateWithDefaults\n{\n    NSDateComponents *dateComponents = [[NSCalendar\
  \ currentCalendar] components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:[NSDate date]];\n\n    self.birthDay = @(dateComponents.day);\n    self.birthMonth\
  \ = @(dateComponents.month);\n    self.birthYear = @0;\n\n    [self updateNextBirthdayAndAge];\n\
  }\n\n-(int) remainingDaysUntilNextBirthday\n{\n    NSDate *now = [NSDate date];\n\
      NSCalendar *calendar = [NSCalendar currentCalendar];\n    NSDateComponents *componentsToday\
  \ = [calendar components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:now];\n    NSDate *today = [calendar dateFromComponents:componentsToday];\n\
  \n    NSTimeInterval timeDiffSecs = [self.nextBirthday timeIntervalSinceDate:today];\n\
  \n    int days = floor(timeDiffSecs/(60.f*60.f*24.f));\n\n    return days;\n}\n\n\
  -(BOOL) isBirthdayToday\n{\n    return [self remainingDaysUntilNextBirthday] ==\
  \ 0;\n}\n\n-(NSString *) birthdayTextToDisplay {\n\n    NSDate *now = [NSDate date];\n\
      NSCalendar *calendar = [NSCalendar currentCalendar];\n    NSDateComponents *componentsToday\
  \ = [calendar components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:now];\n    NSDate *today = [calendar dateFromComponents:componentsToday];\n\
  \n    NSDateComponents *components = [calendar components:NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:today toDate:self.nextBirthday options:0];\n\n    if (components.month\
  \ == 0) {\n        if (components.day == 0) {\n            //今天！\n\n            if\
  \ ([self.nextBirthdayAge intValue] > 0) {\n                return [NSString stringWithFormat:@\"\
  %@ 今天！\",self.nextBirthdayAge];\n            }\n            else {\n                return\
  \ @\"今天！\";\n            }\n        }\n        if (components.day == 1) {\n            //明天！\n\
              if ([self.nextBirthdayAge intValue] > 0) {\n                return [NSString\
  \ stringWithFormat:@\"%@ 明天！\",self.nextBirthdayAge];\n            }\n            else\
  \ {\n                return @\"明天！\";\n            }\n        }\n    }\n\n    NSString\
  \ *text = @\"\";\n\n    if ([self.nextBirthdayAge intValue] > 0) {\n        text\
  \ = [NSString stringWithFormat:@\"%@ 在 \",self.nextBirthdayAge];\n    }\n\n    static\
  \ NSDateFormatter *dateFormatterPartial;\n\n    if (dateFormatterPartial == nil)\
  \ {\n        dateFormatterPartial = [[NSDateFormatter alloc] init];\n        [dateFormatterPartial\
  \ setDateFormat:@\"M 月 d 日\"];\n    }\n\n    return [text stringByAppendingFormat:@\"\
  %@\",[dateFormatterPartial stringFromDate:self.nextBirthday]];\n}\n\n@end\n```\n\
  \n现在来点新内容。我们将编写新的 `BRDBirthdayImport.m` 初始化方法 `initWithAddressBookRecord:`。我在代码中添加了注释，帮助你理解逻辑：\n\
  \n```\n-(id)initWithAddressBookRecord:(ABRecordRef)addressBookRecord\n{\n    self\
  \ = [super init];\n    if (self) {\n        CFStringRef firstName = nil;\n        CFStringRef\
  \ lastName = nil;\n        ABRecordID recordID;\n        CFDateRef birthdate = nil;\n\
          NSString *name = @\"\";\n\n        //尝试填充核心基础字符串和日期引用\n        recordID\
  \ = ABRecordGetRecordID(addressBookRecord);\n        firstName = ABRecordCopyValue(addressBookRecord,\
  \ kABPersonFirstNameProperty);\n        lastName  = ABRecordCopyValue(addressBookRecord,\
  \ kABPersonLastNameProperty);\n        birthdate  = ABRecordCopyValue(addressBookRecord,\
  \ kABPersonBirthdayProperty);\n\n        //将名和姓合并为一个字符串\n        if (firstName !=\
  \ nil) {\n            name = [name stringByAppendingString:(__bridge NSString *)firstName];\n\
              if (lastName != nil) {\n                name = [name stringByAppendingFormat:@\"\
  \ %@\",lastName];\n            }\n        }\n        else if (lastName != nil) {\n\
              name = (__bridge NSString *)lastName;\n        }\n\n        self.name\
  \ = name;\n```\n\n\n```objective-c\n//我们将使用这个唯一标识来确保在 Core Data 存储中不会创建重复的导入记录\n\
  //防止用户尝试重新导入此生日通讯录联系人\nself.uid = [NSString stringWithFormat:@\"ab-%d\",recordID];\n\
  self.addressBookID = [NSNumber numberWithInt:recordID];\n\nNSDateComponents *dateComponents\
  \ = [[NSCalendar currentCalendar] components:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:(__bridge NSDate *)birthdate];\n\nself.birthDay = @(dateComponents.day);\n\
  self.birthMonth = @(dateComponents.month);\nself.birthYear = @(dateComponents.year);\n\
  \n[self updateNextBirthdayAndAge];\n\n//这只是为了防止生日日期被设置为 150 年以前的预防措施！\nif ([self.nextBirthdayAge\
  \ intValue] > 150) {\n    self.birthYear = [NSNumber numberWithInt:0];\n    self.nextBirthdayAge\
  \ = [NSNumber numberWithInt:0];\n}\n\n//检查用户关联的图像数据\nif (ABPersonHasImageData(addressBookRecord))\
  \ {\n    CFDataRef imageData = ABPersonCopyImageData(addressBookRecord);\n\n   \
  \ UIImage *fullSizeImage = [UIImage imageWithData:(__bridge NSData *)imageData];\n\
  \n    CGFloat side = 71.f;\n    side *= [[UIScreen mainScreen] scale];\n\n    UIImage\
  \ *thumbnail = [fullSizeImage createThumbnailToFillSize:CGSizeMake(side, side)];\n\
  \n    self.imageData = UIImageJPEGRepresentation(thumbnail, 1.f);\n\n    CFRelease(imageData);\n\
  }\n\nif (firstName) CFRelease(firstName);\nif (lastName) CFRelease(lastName);\n\
  if (birthdate) CFRelease(birthdate);\n}\nreturn self;\n}\n```\n\n使用我们新的 `initWithAddressBookRecord:`\
  \ 初始化方法，我们将从每个生日通讯录记录中创建 `BRDBirthdayImport` 实例。我们的模型会生成一个 `BRDBirthdayImport` 实例数组，并按名称的字母顺序通过通知分发它们。通讯录视图控制器将捕获所观察到的通知，并显示用户的联系好友，同时借助我们在导入值对象类中刚刚编写的代码，轻松显示计算出的生日数据。\n\
  \n回到 `BRDModel.m`。首先，导入新的 `BRDBirthdayImport.h` 头文件，然后完成 `extractBirthdaysFromAddressBook:`\
  \ 的实现，如下所示：\n\n```objective-c\n-(void) extractBirthdaysFromAddressBook:(ABAddressBookRef)addressBook\n\
  {\n    NSLog(@\"extractBirthdaysFromAddressBook\");\n    CFArrayRef people = ABAddressBookCopyArrayOfAllPeople(addressBook);\n\
  \n    CFIndex peopleCount = ABAddressBookGetPersonCount(addressBook);\n\n    BRDBirthdayImport\
  \ *birthday;\n\n    //这只是一个占位符——我们将在本章稍后填充该数组\n    NSMutableArray *birthdays = [NSMutableArray\
  \ array];\n\n    for (int i = 0; i < peopleCount; i++)\n    {\n        ABRecordRef\
  \ addressBookRecord = CFArrayGetValueAtIndex(people, i);\n        CFDateRef birthdate\
  \  = ABRecordCopyValue(addressBookRecord, kABPersonBirthdayProperty);\n        if\
  \ (birthdate == nil) continue;\n        CFStringRef firstName = ABRecordCopyValue(addressBookRecord,\
  \ kABPersonFirstNameProperty);\n        if (firstName == nil) {\n            CFRelease(birthdate);\n\
  \            continue;\n        }\n        //NSLog(@\"找到有生日的联系人：%@, %@\",firstName,birthdate);\n\
  \n        birthday = [[BRDBirthdayImport alloc] initWithAddressBookRecord:addressBookRecord];\n\
  \        [birthdays addObject: birthday];\n\n        CFRelease(firstName);\n   \
  \     CFRelease(birthdate);\n    }\n\n    CFRelease(people);\n\n    //按名称字母顺序对生日进行排序\n\
  \    NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"\
  name\" ascending:YES];\n    NSArray *sortDescriptors = [NSArray arrayWithObject:sortDescriptor];\n\
  \    [birthdays sortUsingDescriptors:sortDescriptors];\n\n    //发送包含生日对象数组的通知\n\
  \    NSDictionary *userInfo = [NSDictionary dictionaryWithObjectsAndKeys:birthdays,@\"\
  birthdays\", nil];\n\n    [[NSNotificationCenter defaultCenter] postNotificationName:BRNotificationAddressBookBirthdaysDidUpdate\
  \ object:self userInfo:userInfo];\n}\n```\n\n当 `BRDModel` 遍历生日通讯录联系人时，它会创建 `BRDBirthdayImport`\
  \ 的新实例，并将通讯录联系人的 C 引用（`ABRecordRef`）传入。结果是 `extractBirthdaysFromAddressBook` 构建了一个\
  \ `BRDBirthdayImport` 实例的可变数组，该数组将被我们的通讯录视图控制器用于渲染生日表格单元格。在 `extractBirthdaysFromAddressBook`\
  \ 方法的末尾，我们创建了一个排序描述符，并使用它通过 `name` 属性/排序键对 `BRDBirthdayImport` 实例进行重新排序。\n\n此时，你应该能够构建并运行你的应用了。如果你的\
  \ iPhone 上有任何包含生日的联系人，那么启动“从通讯录导入”视图控制器时，应该会显示一个表格单元格，代表 iPhone 中每个联系人的生日（见图 10-19）。\n\
  \n![图片](img/9781430243748_Fig10-19.jpg)\n\n**图 10-19.** 看起来我们有一些通讯录联系人需要导入。\n\n\n\
