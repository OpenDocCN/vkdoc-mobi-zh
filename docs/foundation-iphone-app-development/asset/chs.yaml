  \n\n### 多视图应用\n\n到目前为止，我们在*生日提醒*和二十一点应用中都只包含了一个视图和一个视图控制器。对于某些应用，例如简单的游戏，单个视图就足够了。然而，多视图应用能够通过小屏幕设备以清晰且结构化的形式向用户呈现大量内容。\n\
  \n*生日提醒*就是一个多视图应用。我们模型中的每个生日对象都包含姓名、出生日期、个人资料照片、礼物备注，以及指向 Facebook 用户详细信息的链接，或从原生通讯录导入的电话和电子邮件详细信息。对于可能数百个生日来说，要在单个视图中清晰显示如此多的数据，工作量巨大！通过在首页视图上创建多视图应用，我们的用户将只看到每个已存储生日的摘要信息，例如一张小尺寸个人资料照片、姓名以及距离每个生日的天数。当用户点击某个特定的生日时，它会在导航中深入一层，显示生日详情视图，其中包含一张更大的个人资料照片以及关于我们的朋友及其生日的完整详细信息（参见图\
  \ 5-1）。\n\n![图片](img/9781430243748_Fig05-01.jpg)\n\n**图 5-1.** 多视图应用非常适合在小屏幕设备上呈现大量内容。\n\
  \n在本书的剩余部分，我们将继续开发我们的主要*生日提醒*应用。请打开你在第 3 章中构建的*生日提醒* Xcode 项目。或者，打开本章的起始源代码。\n\n\
  *注意：如果你决定在书中的任何时刻从源代码开始工作，请务必将 `Info.plist` 中的包标识符从 `com.apress.BirthdayReminder`\
  \ 更新为 `com.yourdomain.BirthdayReminder`。*\n\n### 掌握视图和视图控制器\n\n在本章的前半部分，我将带你了解视图和视图控制器的基础知识。通过使用故事板，你将学会在应用的不同屏幕之间构建导航层级结构是多么容易。你还将理解视图的生命周期，以及何时何地向视图控制器添加代码以响应用户在你的应用中的导航操作。\n\
  \n打开你的*生日提醒*项目后，首先删除之前在 Hello World 示例中添加到主视图的任何标签或其他子视图。\n\n#### 添加导航控制器\n\n为了添加生日详情场景，我们首先要在故事板中添加一个导航控制器实例。导航控制器管理多个视图控制器的深入堆栈。当一个新视图控制器被推入导航控制器堆栈时，导航控制器会将当前视图以动画方式移出屏幕左侧，并从右侧滑入新视图。\n\
  \n目前，我们的故事板中只有一个视图控制器和一个视图。我希望你选择视图控制器，而不是视图。为此，请点击视图下方和左侧的橙色圆形图标（参见图 5-2）。\n\n\
  ![图片](img/9781430243748_Fig05-02.jpg)\n\n**图 5-2.** 选择视图控制器\n\n在故事板中选中视图控制器后，从 Xcode\
  \ 的菜单栏添加一个新的父导航控制器就很简单了：Editor ![图片](img/U001.jpg) Embed In ![图片](img/U001.jpg)\
  \ Navigation Controller。结果应类似于图 5-3。\n\n![图片](img/9781430243748_Fig05-03.jpg)\n\n\
  **图 5-3.** 嵌入在导航控制器中的视图控制器\n\n一旦嵌入到导航控制器中，视图控制器就会从其新的父容器视图控制器继承一个导航栏。双击视图控制器的模拟导航栏，输入导航标题\
  \ **Birthdays**（参见图 5-3）。\n\n#### 故事板场景和根视图控制器\n\niOS 应用中的每个主视图或屏幕通常由 Apple 的 `UIViewController`\
  \ 类的一个实例拥有和管理。为了创建我们的多视图应用，我们将向故事板添加额外的视图控制器，每个控制器将管理自己的视图。视图和视图控制器的组合在故事板术语中被称为*场景*。\n\
  \n你的应用所呈现的第一个视图控制器被称为*根视图控制器*。你注意到我们故事板中的新导航控制器左侧有一个指向它的箭头吗？这是 Xcode 指示此视图控制器为根视图控制器的方式。请务必不要从故事板中删除根视图控制器，否则\
  \ Xcode 的编译器将无法再解析你的故事板。![图片](img/smile.jpg)\n\n尽管我们的首页视图控制器现在已嵌入导航控制器中，但我们的应用中仍然只有一个场景，尽管它带有导航栏。现在我们要向故事板添加第二个场景，它最终将成为生日详情视图。我们通过将新的视图控制器实例从对象库拖放到故事板上来添加新场景。我发现将故事板稍微缩小一些会更方便操作。为此，点击故事板上的减号放大镜按钮一次（编辑器窗格的右下角）。然后从对象库中拖放一个新的视图控制器（`UIViewController`）实例到故事板上（参见图\
  \ 5-4）。\n\n![图片](img/9781430243748_Fig05-04.jpg)\n\n**图 5-4.** 添加新的视图控制器场景\n\n你注意到新的视图控制器没有像我们的第一个视图控制器那样添加导航栏吗？那是因为我们还没有将它连接到我们的导航控制器。除了在视图切换时，导航控制器一次只显示其堆栈中的一个视图控制器：即位于顶部的那个。要将我们的新视图控制器推入导航控制器，我们需要创建一个*转场*连接。\n\
  \n#### 通过转场推入视图控制器\n\n转场或 `UIStoryboardSegue` 是一个定义从一个视图控制器到另一个视图控制器的视觉过渡的对象。在你的第一个视图控制器上添加一个按钮，将其命名为\
  \ Push Birthday Detail View Controller（嗯，挺朗朗上口的！），然后通过按住 Control 键从该按钮拖拽到第二个视图控制器，创建一个从按钮到第二个视图控制器的转场（参见图\
  \ 5-5）。\n\n![图片](img/9781430243748_Fig05-05.jpg)\n\n**图 5-5.** Control-拖拽以创建转场\n\
  \n一个上下文菜单会向你显示三种类型的转场：Push、Modal 和 Custom。选择 Push。Xcode 会自动将继承自我们导航控制器的导航栏添加到新的视图控制器，并显示一个指向第一个和第二个视图控制器之间的箭头，以指示新的转场连接（参见图\
  \ 5-6）。\n\n![图片](img/9781430243748_Fig05-06.jpg)\n\n**图 5-6.** 新的转场连接\n\n为第二个视图控制器添加标题：Birthday\
  \ Detail。构建并运行你的应用。你应该能够使用第一个控制器上的按钮和第二个控制器上的动态生成的返回按钮，在第一个和第二个视图控制器之间导航。非常简单，对吧？\n\
  \n\n\n### 创建视图控制器类\n\n至此，我们可以愉快地继续向故事板中添加新的视图控制器场景，并根据需要将它们与 Segue 连接起来。故事板会越来越庞大，但项目中不会新增任何\
  \ Objective-C 类。故事板有其局限性，如果我们无法在适当的时候为视图控制器添加特定代码，应用就会显得单调乏味。解决方案是创建 `UIViewController`\
  \ 的子类，并通过身份检查器将其分配给故事板中的每个视图控制器。\n\n在创建 `UIViewController` 的新子类之前，让我们先整理一下 Xcode\
  \ 项目，将用户界面类与数据类分开。在访达中，于项目目录下创建一个名为 `user-interface` 的新文件夹，并在该文件夹内创建一个名为 `view-controllers`\
  \ 的子文件夹。然后在 Xcode 中选择顶层的 `BirthdayReminder` 组，并将这些文件夹作为新分组添加到项目中：文件 ![Image](img/U001.jpg)\
  \ 添加到 \"BirthdayReminder\"（参见 图 5-7）。\n\n![Image](img/9781430243748_Fig05-07.jpg)\n\
  \n**图 5-7.** 保持项目整洁有序\n\n在项目导航器中，选择新添加的 `view-controllers` 组，然后使用 ![Image](img/U002.jpg)N\
  \ 快捷键或通过文件 ![Image](img/U001.jpg) 新建 ![Image](img/U001.jpg) 文件，从 Cocoa Touch 文件模板中选择\
  \ `Objective-C class` 选项。将新类命名为 `BRHomeViewController`，并将父类改为 `UIViewController`。如图\
  \ 图 5-8 所示，取消勾选 \"Targeted for iPad\" 和 \"With XIB for User Interface\"。\n\n![Image](img/9781430243748_Fig05-08.jpg)\n\
  \n**图 5-8.** 创建 UIViewController 的子类\n\n创建完 `BRHomeViewController` 的头文件和源文件后，重复此过程，再创建一个名为\
  \ `BRBirthdayDetailViewController` 的 `UIViewController` 子类。\n\n现在，我们需要将新建的视图控制器子类连接到故事板中的两个视图控制器。为此，选择第一个视图控制器，通过身份检查器将其自定义类改为\
  \ `BRHomeViewController`（参见 图 5-9）。\n\n![Image](img/9781430243748_Fig05-09.jpg)\n\
  \n**图 5-9.** 设置首页视图控制器的自定义类\n\n对生日详情视图控制器重复此操作，将其自定义类改为 `BRBirthdayDetailViewController`。\n\
  \n`BRViewController` 的头文件和源文件现在已是冗余文件。这是 Xcode 在最初创建项目时为我们生成的默认视图控制器类。默认情况下，`BRViewController`\
  \ 被分配给了第一个视图控制器；我们刚刚修改了这一设置，将第一个视图控制器重新分配给了新的 `BRHomeViewController` 类。现在让我们清理项目，删除冗余的\
  \ `BRViewController` 头文件和源文件。在项目导航器中多选 `BRViewController.h` 和 `BRViewController.m`\
  \ 文件，然后按下 Delete 键。接着，在弹出的对话框窗口中点击 \"Move to Trash\" 按钮（参见 图 5-10）。\n\n![Image](img/9781430243748_Fig05-10.jpg)\n\
  \n**图 5-10.** 删除冗余的 BRViewController 文件\n\n### 视图与视图控制器的生命周期\n\n要成为一名优秀的 iOS 程序员，理解视图和视图控制器的生命周期至关重要。在我们的应用中，当前有一个导航控制器负责管理子视图控制器及其视图的流程。当导航控制器从首页视图控制器跳转到详情视图控制器时，它会将首页视图移出屏幕，并将详情视图滑入屏幕。在此过程中，导航控制器会在我们的两个视图控制器子类中调用以下重要的视图控制器方法：\n\
  \n- `(void)viewWillAppear:(BOOL)animated;`\n- `(void)viewDidAppear:(BOOL)animated;`\n\
  - `(void)viewWillDisappear:(BOOL)animated;`\n- `(void)viewDidDisappear:(BOOL)animated;`\n\
  \n如果生日详情视图控制器被推入导航控制器，那么在其视图开始动画移出屏幕之前，首页视图控制器上会调用 `viewWillDisappear:` 方法。动画一完成，该视图会自动从视图层次结构中移除，并在首页视图控制器上调用\
  \ `viewDidDisappear:` 方法。\n\n同样地，在生日详情视图控制器被动画推入导航控制器栈之前，会在该视图控制器上调用 `viewWillAppear:`\
  \ 方法。一旦滑入推行动画完成，便会触发 `viewDidAppear:` 方法。\n\n当点击返回按钮时，生日详情视图控制器会从导航栈中弹出。该视图控制器会先收到\
  \ `viewWillDisappear:` 回调，紧接着是 `viewDidDisappear:`。\n\n让我们亲自尝试一下。用以下代码替换 `BRBirthdayDetailViewController.m`\
  \ 源文件的当前实现：\n\n```\n#import \"BRBirthdayDetailViewController.h\"\n\n@implementation\
  \ BRBirthdayDetailViewController\n\n-(id) initWithCoder:(NSCoder *)aDecoder\n{\n\
  \    self = [super initWithCoder:aDecoder];\n    if (self) {\n        NSLog(@\"\
  initWithCoder\");\n    }\n    return self;\n}\n\n-(void) dealloc\n{\n    NSLog(@\"\
  dealloc\");\n}\n\n-(void) viewDidLoad\n{\n    [super viewDidLoad];\n    NSLog(@\"\
  viewDidLoad\");\n}\n\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    NSLog(@\"viewWillAppear\");\n}\n\n-(void) viewDidAppear:(BOOL)animated\n{\n\
  \    [super viewDidAppear:animated];\n    NSLog(@\"viewDidAppear\");\n}\n\n-(void)viewWillDisappear:(BOOL)animated\n\
  {\n    [super viewWillDisappear:animated];\n    NSLog(@\"viewWillDisappear\");\n\
  }\n\n-(void)viewDidDisappear:(BOOL)animated\n{\n    [super viewDidDisappear:animated];\n\
  \    NSLog(@\"viewDidDisappear\");\n}\n\n@end\n```\n\n*注意：覆写 `UIViewController`\
  \ 的方法时，务必调用父类的实现，以避免运行时出现任何问题。*\n\n构建并运行项目，在推入和弹出 `BRBirthdayDetailViewController`\
  \ 时查看调试日志。\n\n请熟悉这些方法的调用顺序。新代码中还有一些其他的视图控制器方法，你也应当了解。\n\n#### `viewDidLoad`\n\n\
  `viewDidLoad` 是 `UIViewController` 的所有子类中，在其主视图首次加载时触发的方法；此时，视图控制器代码中的任何故事板输出口都已可用。但请注意\
  \ `viewDidLoad`。它并不是视图控制器的初始化方法。实际上，在视图控制器的生命周期内，`viewDidLoad` 可能会被多次调用。如果系统内存不足，`UIViewController`\
  \ 实例的默认行为是释放不在屏幕上的视图。如果系统触发了内存警告，且当前屏幕显示的是生日详情视图，那么 `BRHomeViewController` 的视图被移除是完全合理的。但请注意，内存警告不会将\
  \ `BRHomeViewController` 实例从导航栈中移除，只会移除其视图。如果用户随后导航回首页视图控制器，iOS 会从故事板中重建首页视图，并且首页视图控制器上的\
  \ `viewDidLoad` 会被第二次调用。\n\n*提示：`viewDidLoad` 是访问 Interface Builder 输出口的第一个时机。因此，当调用\
  \ `viewDidLoad` 时，你应该执行所有视图自定义代码。*\n\n\n\n#### 视图控制器初始化方法\n\n在整个生命周期中由视图控制器持有的模型数据，最佳创建时机是在实例化时，而非调用\
  \ `viewDidLoad` 的时候。iOS 新手程序员常犯的错误，就是在 `viewDidLoad` 方法里初始化所有内容。\n\n接入 `UIViewController`\
  \ 的初始化方法并不像看起来那么直观。有两个重要的初始化方法需要了解：`initWithNibName:bundle:` 和 `initWithCoder:`。通常，视图控制器要么通过\
  \ NIB/XIB 文件进行初始化，要么通过故事板文件进行初始化。在 *Birthday Reminder* 中，我们将始终使用故事板进行所有初始化，因此在实例化模型或映射字典时，应该接入的是\
  \ `initWithCoder:` 初始化方法。\n\n## `dealloc`\n\n`dealloc` 是任何 `NSObject` 子类实例在从内存释放前调用的最后一个方法。因此你可以看到，当你将生日详情视图控制器从导航栈中弹出时，它会被\
  \ iOS 丢弃而不再持有，从而使我们应用的内存占用保持在最低水平。\n\n得益于 ARC，对属性 iVar 的所有强引用都会自动释放，因此不再需要直接在 `dealloc`\
  \ 中将 iVar 设为 `nil`。在 ARC 和 iOS 5 出现之前，这曾是导致内存泄漏的主要原因。\n\n**注意：** 编译器不允许直接调用 `[super\
  \ dealloc]`。但你完全可以保证，`dealloc` 会被继承树中所有 `NSObject` 的子类所调用。\n\n### 导航视图控制器\n\n在接下来的上午时间里，我们将加快速度实现应用的导航功能。你将学习如何用栏按钮项填充导航栏和工具栏，以及如何在应用中呈现和关闭模态视图控制器。\n\
  \n今天上午我们将继续使用故事板，并发现通过 Xcode 故事板的所见即所得拖放 UI，构建 *Birthday Reminder* 导航层级是多么简单。\n\n\
  ### 栏与栏按钮项\n\n导航栏和工具栏出现在成千上万的 iPhone 和 iPad 应用中。正如我们将在第 9 章中学到的，它们易于定制，并且 iOS 用户能立即识别。\n\
  \n你将在本章剩余部分发现，在 iOS 中用按钮填充导航栏和工具栏非常容易——这些按钮不是我们之前使用的标准按钮，而是 iOS 中的一种称为**栏按钮项**（`UIBarButtonItem`）的组件。\n\
  \n#### 导航栏\n\n导航栏位于屏幕顶部，通常包含一个标题和栏按钮项：在居中标题的左侧和右侧各有一个或多个按钮。默认情况下，由导航控制器控制的导航栏会自动在标题左侧显示一个返回按钮项，使用户能够轻松地通过他们在应用层级中深入浏览的一系列屏幕返回。\n\
  \n我们的导航控制器标配包含一个导航栏（`UINavigationBar`）。我们已经知道如何通过故事板修改导航中每个视图控制器的标题。现在，让我们在主视图导航栏上添加几个栏按钮项。操作简单，只需将它们从对象库拖到导航栏的左侧和右侧即可（参见图\
  \ 5-11）。\n\n![图](img/9781430243748_Fig05-11.jpg)\n\n**图 5-11.** 向导航栏添加栏按钮项\n\n栏按钮项（`UIBarButtonItem`）与常规按钮（`UIButton`）不同；它们只能存在于导航栏和工具栏中。栏按钮项可以显示文本标题、图像图标或自定义视图。当我们进入第\
  \ 9 章讨论外观皮肤时，会探索这些选项。现在，我们将坚持使用文本，因此为左侧按钮输入**设置**，为右侧按钮输入**添加生日**。\n\n**注意：** 在早期版本的\
  \ iOS 中，导航栏仅限于三个项目：一个标题以及单个左侧和右侧栏按钮项。在 iOS 5 和 6 中，我们有更多的灵活性。我们可以添加多个左侧和右侧栏按钮项，但由于空间限制，在\
  \ iPhone 上我不建议每侧超过一个项目。\n\n#### 工具栏\n\n我们已经知道，当我们将视图控制器嵌入导航控制器时，会自动生成一个导航栏。导航控制器还免费附带一个工具栏。默认情况下，它是隐藏的，但我们可以更改这一点。选择导航控制器，然后打开“显示工具栏”选项（参见图\
  \ 5-12）。瞧！所有视图控制器的工具栏都出现了！\n\n![图](img/9781430243748_Fig05-12.jpg)\n\n**图 5-12.**\
  \ 通过导航控制器开启工具栏\n\n现在，导航栈中的所有视图控制器都将继承父导航控制器的工具栏。这正是我们希望主视图拥有的，但详情视图除外。解决这个问题很简单。在故事板中选择详情视图控制器，然后打开“推送时隐藏底部栏”属性。构建并运行，你应该会看到第一个视图有工具栏，而第二个视图没有。\n\
  \n现在，为主视图控制器（Home view controller）的工具栏添加一些栏按钮项。在故事板中选择主视图控制器，然后从对象库中拖入两个栏按钮项实例。分别将它们命名为“通讯录”和“Facebook”。注意工具栏与导航栏的不同之处：新的栏按钮项向左对齐，而不是像导航栏标题那样分布在两侧。我们可以通过添加三个灵活间距栏按钮项实例来使这两个按钮居中（参见图\
  \ 5-13）。\n\n![图](img/9781430243748_Fig05-13.jpg)\n\n**图 5-13.** 使工具栏栏按钮项居中\n\n\n\
  \n#### 呈现模态视图控制器\n\n在本章前面，我们学习了如何使用视图控制器和转场过渡*推入*一个视图控制器到导航控制器栈中。另一种改变当前可见视图控制器的常见方法是通过*呈现*一个模态视图控制器。\n\
  \n模态视图控制器不会添加到导航栈中，而是放置在顶层视图控制器之前：在*Birthday Reminder*应用中，它被放置在导航控制器本身的前面。\n\n现在我们即将呈现一个新的\
  \ `Edit Birthday` 视图控制器，当用户添加或编辑生日时，它会在应用中显示。设置并呈现模态视图控制器的过程与设置并推入新视图控制器非常相似。首先，从对象库中拖拽一个新的视图控制器实例到故事板。你可以将新的故事板场景放置在任何你喜欢的位置，但为了保持项目组织有序，请将新的\
  \ `Edit Birthday` 视图控制器放置在 `Birthday Detail` 视图控制器的上方。\n\n现在创建一个新的转场过渡，并将新的视图控制器连接到我们的层级结构中。从\
  \ `Birthday Detail` 视图中的 `Add Birthday` 按钮按住 Control 键拖拽到新的 `Edit Birthday` 视图控制器。在故事板转场的选择中，这次选择\
  \ `Modal`。结果应如图 5-14 所示。\n\n![图片](img/9781430243748_Fig05-14.jpg)\n\n**图 5-14.**\
  \ 创建模态转场\n\n尝试构建并运行。当点击 `Add Birthday` 按钮时，你应该会看到新视图控制器从屏幕底部动画呈现。你认为为什么新视图不像应用中其他视图那样有导航栏？因为新的模态视图控制器没有导航控制器作为其父容器：它只是简单地呈现在现有导航的前面。为了解决这个问题，我们需要将\
  \ `Edit Birthday` 视图控制器放入它自己的导航控制器中。我们之前做过这个操作。只需选择新的 `Edit Birthday` 视图控制器，然后从\
  \ Xcode 菜单中选择：`Editor` ![图片](img/U001.jpg) `Embed In` ![图片](img/U001.jpg) `Navigation\
  \ Controller`。`Edit Birthday` 视图控制器会在故事板中滑动，为新添加的导航控制器腾出空间（见图 5-15）。\n\n![图片](img/9781430243748_Fig05-15.jpg)\n\
  \n**图 5-15.** 模态呈现的导航控制器\n\nXcode 足够智能，会将 `Edit Birthday` 视图控制器替换为其新的导航控制器。这个导航控制器成为了点击\
  \ `Add Birthday` 时实际呈现的视图控制器。在故事板中，再次选择 `Edit Birthday` 视图控制器，输入标题 `Edit Birthday`，并在标题两侧添加\
  \ `Cancel` 和 `Save` 栏按钮项（见图 5-16）。\n\n![图片](img/9781430243748_Fig05-16.jpg)\n\n\
  **图 5-16.** `Edit Birthday` 栏按钮项和标题\n\n### 关闭模态视图控制器\n\n现在我们遇到了一个小障碍：当点击 `Cancel`\
  \ 按钮时，我们如何关闭模态导航控制器？答案不是从 `Cancel` 按钮拖拽一个新的转场到根导航控制器。你可以这样做来创建一个新转场，但结果是故事板会创建一个根视图控制器的副本，并将其推入或呈现在现有模态视图控制器的顶部。这不是我们想要的结果。\n\
  \n有两种方法可以关闭我们的模态视图控制器，这两种方法都需要我们编写代码。让我们逐步了解选项 1，即创建一个*展开转场*（iOS 6 新增）。\n\n#####\
  \ 展开转场\n\n只要在你希望展开（导航回）到的视图控制器中创建了一个*展开动作*，就可以在故事板中创建展开转场。编译器通过以下方法签名格式来识别展开动作：\n\
  \n`-(IBAction)unwindActionMethodName:(UIStoryboardSegue *)segue;`\n\n方法名可以是任何我们喜欢的名称，只要它符合这个签名格式。在我们的应用中，当点击\
  \ `Cancel` 按钮时，我们希望展开回 `Home` 视图控制器，所以我们要在那里声明并实现一个展开动作。\n\n将以下方法声明添加到 `BRHomeViewController.h`\
  \ 中：\n\n`-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue *)segue;`\n\
  \n切换到 `BRHomeViewController.m` 源文件并实现展开动作：\n\n```\n-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue\
  \ *)segue\n{\n    NSLog(@\"unwindBackToHomeViewController!\");\n}\n```\n\n回到故事板中，聚焦于\
  \ `Edit Birthday` 视图控制器，从 `Cancel` 按钮按住 Control 键拖拽到 Exit 视图控制器下方和右侧的 Exit 图标。应该会弹出一个上下文菜单，让你选择\
  \ `unwindBackToHomeViewController:` 展开动作，如图 5-17 所示。你刚刚创建了一个展开转场！\n\n![图片](img/9781430243748_Fig05-17.jpg)\n\
  \n**图 5-17.** 创建展开转场\n\n构建并运行。现在当你点击 `Cancel` 栏按钮项时，应该能够关闭模态呈现的 `Edit Birthday`\
  \ 视图控制器。\n\n当执行展开转场时，iOS 会自动将现有的视图控制器展开到拥有展开动作的视图控制器。这就是为什么我们不必编写任何执行代码来处理关闭模态视图控制器的原因。但等等，如果我们想用代码关闭模态视图控制器呢？很高兴你问到这个问题！\n\
  \n#### 用代码关闭模态视图控制器\n\n在你的故事板中，删除你刚刚创建的退出转场。为此，按住 Control 键点击 `Cancel` 按钮，然后点击 `unwindBackToHomeViewController:`\
  \ 动作旁边的 X 按钮。\n\n现在为你的 `Edit Birthday` 场景创建一个新的视图控制器子类，命名为 `BRBirthdayEditViewController`，并使用身份检查器将其分配到故事板上的\
  \ `Edit Birthday` 视图。如果你需要帮助，请翻回本章的“创建视图控制器类”部分查看逐步说明。\n\n使用助理编辑器布局，从 `Cancel` 按钮按住\
  \ Control 键拖拽到 `BRBirthdayEditViewController.h` 头文件，创建一个名为 `cancelAndDismiss` 的新\
  \ `action`（见图 5-18）。\n\n![图片](img/9781430243748_Fig05-18.jpg)\n\n**图 5-18.** 添加\
  \ `cancelAndDismiss:` 动作\n\n切换到在 `BRBirthdayEditViewController.m` 源文件中实现新的 `cancelAndDismiss:`\
  \ 动作，我们通过调用 `UIViewController` 的 `dismissModalViewControllerAnimated:completion:`\
  \ 方法来关闭模态视图控制器。\n\n```\n- (IBAction)cancelAndDismiss:(id)sender {\n    NSLog(@\"\
  Cancel!\");\n    [self dismissViewControllerAnimated:YES completion:^{\n       \
  \ //我们放在这个块中的任何代码\n        //都将在视图控制器被关闭后运行\n        NSLog(@\"Dismiss complete!\"\
  );\n    }];\n}\n```\n\n在 Objective-C 中，块是一段像变量一样传递的代码。`UIViewController` 的 `dismissModalViewControllerAnimated:completion:`\
  \ 方法的第二个参数就是一个块。当关闭动画完成时，我们的代码块就会执行。\n\n构建并运行。你应该能够关闭 `Birthday Edit` 视图控制器，并看到\
  \ `Cancel!` 和 `Dismiss Complete!` 调试日志之间的延迟。\n\n但是，如果我们想在应用中呈现其他模态视图控制器呢？我们最终将不得不将\
  \ `cancelAndDismiss:` 方法复制粘贴到其他视图控制器子类中。重复代码对于一个优秀的程序员来说从来都不是好事！幸运的是，Objective-C\
  \ 是一种面向对象的语言，所以我们可以通过继承和子类化来解决这个问题。\n\n\n\n### 子类化：创建核心视图控制器\n\n现在我们的项目中有了三个自定义视图控制器。每个视图控制器都是苹果\
  \ `UIViewController` 类的子类。接下来我要介绍一个非常实用的技巧：我们可以创建一个 `UIViewController` 的核心子类，然后调整所有独立的视图控制器类，让它们继承这个核心视图控制器，而不是直接继承\
  \ `UIViewController`。这样做的好处是，我们可以将公共/共享的方法和属性添加到核心视图控制器类中，而所有独立的视图控制器将自动继承这些方法和属性。\n\
  \n有点困惑？还是觉得完全合理？等我们进入代码环节后，一切就会变得更清晰。\n\n首先，创建新的核心视图控制器类。在项目导航器中选择 `view-controllers`\
  \ 组，然后依次点击 File ![Image](img/U001.jpg) New ![Image](img/U001.jpg) File，从 Cocoa Touch\
  \ 文件模板中选择 Objective-C 类选项。将新类命名为 `BRCoreViewController`，并确保父类设置为 `UIViewController`。\n\
  \n将以下两个 Interface Builder 操作方法签名直接输入到 `BRCoreViewController.h` 头文件中：\n\n```\n#import\
  \ <UIKit/UIKit.h>\n\n@interface BRCoreViewController : UIViewController\n\n- (IBAction)cancelAndDismiss:(id)sender;\n\
  - (IBAction)saveAndDismiss:(id)sender;\n\n@end\n```\n\n切换到 `BRCoreViewController.m`，开始删除\
  \ Xcode 从文件模板中添加的所有默认方法代码，并用以下实现替换：\n\n```\n#import \"BRCoreViewController.h\"\n\
  \n@interface BRCoreViewController ()\n\n@end\n\n@implementation BRCoreViewController\n\
  \n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.view.backgroundColor\
  \ = [UIColor grayColor];\n}\n\n- (IBAction)cancelAndDismiss:(id)sender\n{\n    NSLog(@\"\
  Cancel\");\n    [self dismissViewControllerAnimated:YES completion:^{\n        //视图控制器解除动画完成\n\
  \    }];\n}\n\n- (IBAction)saveAndDismiss:(id)sender\n{\n    NSLog(@\"Save\");\n\
  \    [self dismissViewControllerAnimated:YES completion:^{\n        //视图控制器解除动画完成\n\
  \    }];\n}\n\n@end\n```\n\n除了 `cancelAndDismiss:` 和 `saveAndDismiss:` 这两个操作方法外，我们还通过\
  \ `viewDidLoad` 方法将视图的背景色设置为灰色；这样一来，任何 `BRCoreViewController` 的子类都会自动继承这段代码，并将自己的视图背景设为灰色。非常巧妙！\n\
  \n打开我们已经创建的视图控制器的头文件：`BRHomeViewController.h`、`BRBirthdayDetailViewController.h`\
  \ 和 `BRBirthdayEditViewController.h`。目前这三个类都直接继承自 `UIViewController`。请修改它们，使其分别继承自\
  \ `BRCoreViewController`：\n\n对于 `BRHomeViewController.h`：\n\n```\n#import <UIKit/UIKit.h>\n\
  #import \"BRCoreViewController.h\"\n\n@interface BRHomeViewController : BRCoreViewController\n\
  \n@end\n```\n\n对于 `BRBirthdayDetailViewController.h`：\n\n```\n#import <UIKit/UIKit.h>\n\
  #import \"BRCoreViewController.h\"\n\n@interface BRBirthdayDetailViewController\
  \ : BRCoreViewController\n\n@end\n```\n\n对于 `BRBirthdayEditViewController.h`：\n\n\
  ```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface BRBirthdayEditViewController\
  \ : BRCoreViewController\n- (IBAction)cancelAndDismiss:(id)sender;\n\n@end\n```\n\
  \n请注意，我们还应该从 `BRBirthdayEditViewController.h` 中删除 `cancelAndDismiss:` 操作方法，因为该操作现在由父类\
  \ `BRCoreViewController` 处理。切换到 `BRBirthdayEditViewController.m`，删除 `cancelAndDismiss:`\
  \ 的整个实现。\n\n我们还没有将生日编辑视图中的“保存”按钮连接到新添加的 `saveAndDismiss:` 操作。从“保存”按钮按住 Control 键拖动到其视图控制器的所有者，如图\
  \ Figure 5-19 所示。系统会提示你所有 Interface Builder 的出口和操作连接。选择 `saveAndDismiss` 操作。你是否看到了它是如何从核心视图控制器继承而来的？\n\
  \n![Image](img/9781430243748_Fig05-19.jpg)\n\n**图 5-19.** 将“保存”栏按钮项连接到 `saveAndDismiss:`\
  \ 操作\n\n构建并运行（参见 Figure 5-20）。嘿，每个视图都变成灰色了吗？！现在你应该（希望如此）恍然大悟了。通过利用添加核心视图控制器子类的方式，我们只需在一个地方——核心视图控制器类的代码中——就能修改所有继承核心视图控制器的视图控制器的每个实例。目前，每个视图控制器都继承了灰色背景视图颜色的设置代码。你能看出我们如何将这一技巧进一步扩展到\
  \ *Birthday Reminder* 中吗？在我们设计中，所有视图都有自定义的背景图片，就像启动画面一样的棋盘格背景。在一个方便的位置，我们将能够为应用中所有继承核心视图控制器的视图添加此背景图片。我们会在关于界面皮肤化的章节中实现这个功能，但现在，我们还有一堆场景需要添加到故事板中。\n\
  \n![Image](img/9781430243748_Fig05-20.jpg)\n\n**图 5-20.** 视图控制器子类化的好处——如果你喜欢灰色的话\n\
  \n我们的编辑生日视图控制器既用于添加生日也用于编辑生日。因此，我们将创建第二个到编辑生日导航控制器的 Segue 连接。在生日详情导航栏的右侧添加一个编辑栏按钮项，然后从新按钮按住\
  \ Control 键拖动到编辑生日导航控制器。从故事板 Segue 转换选项中选择 Modal（参见 Figure 5-21）。\n\n![Image](img/9781430243748_Fig05-21.jpg)\n\
  \n**图 5-21.** 到编辑生日导航控制器的多个 Segue 连接\n\n\n#### 添加备注视图控制器\n\n当用户在“生日详情”视图中查看好友的生日时，他们将能够编辑好友的备注，例如礼物建议。作为一般规则，我建议在应用程序允许用户编辑或添加数据时，使用模态视图控制器。这种技术能够清晰区分“查看已保存数据”与“编辑已保存数据”两种操作。\n\
  \n在故事板中，于“生日详情”场景右侧添加一个新的视图控制器场景。由于我们将以模态方式呈现新的备注编辑视图控制器，我们需像处理“编辑生日”视图控制器一样，将其嵌入到自己的导航控制器中。选中新视图控制器，在菜单栏中选择`Editor`\
  \ -> `Embed In` -> `Navigation Controller`。现在，将新的备注视图控制器标题命名为`编辑备注`，并像处理“编辑生日”视图控制器那样添加“取消”和“保存”按钮（参见图\
  \ 5-22）。\n\n从对象库中拖拽一个“圆角矩形按钮”（注意不要与栏按钮项混淆）到“生日详情”视图中，并将其标题设置为`编辑备注`。\n\n新的视图控制器和导航控制器应类似于图\
  \ 5-22。\n\n![图片](img/9781430243748_Fig05-22.jpg)\n\n**图 5-22.** 添加备注视图\n\n现在，通过按住\
  \ Control 键从“编辑备注”按钮拖拽到新的导航控制器，来连接新的视图控制器与模态转场。选择`Modal`选项。\n\n接下来，为“编辑备注”场景创建一个视图控制器类。在`view-controllers`组中创建并添加一个新类，命名为`BRNotesEditViewController`。这次，我们不继承`UIViewController`，而是直接继承`BRCoreViewController`（参见图\
  \ 5-23）。\n\n![图片](img/9781430243748_Fig05-23.jpg)\n\n**图 5-23.** `BRNotesEditViewController`\
  \ 继承自 `BRCoreViewController`\n\n回到故事板，选中新的“编辑备注”视图控制器，使用身份检查器将自定义类更改为`BRNotesEditViewController`。然后，按住\
  \ Control 键从“取消”和“保存”栏按钮项拖拽，分别创建界面生成器连接到所属视图控制器的`cancelAndDismiss:`和`saveAndDismiss:`动作方法。\n\
  \n构建并运行，确认现在可以打开并关闭新的“编辑备注”视图控制器。\n\n#### 翻转至设置视图\n\n让我们继续构建视图控制器导航网络。在故事板中，“生日详情”视图控制器下方添加一个新的视图控制器。将其嵌入导航控制器。添加标题`设置`，并在标题右侧添加一个“完成”栏按钮项（参见图\
  \ 5-24）。\n\n![图片](img/9781430243748_Fig05-24.jpg)\n\n**图 5-24.** 嵌入导航控制器的新“设置”视图控制器\n\
  \n按住 Control 键从主页视图上的“设置”栏按钮项拖拽到“设置”导航控制器，创建一个新的模态转场连接。\n\niOS SDK 在推送和呈现视图控制器时内置了多种转场动画选项。我们不使用默认的从屏幕底部滑入动画，而是将新转场设置为翻转进入“设置”导航控制器。如图\
  \ 5-25 所示，您可以点击并选中该新转场，然后使用属性检查器将`Transition`设置更改为`Flip Horizontal`。\n\n![图片](img/9781430243748_Fig05-25.jpg)\n\
  \n**图 5-25.** 将模态转场的过渡样式更改为`Flip Horizontal`\n\n构建并运行——然后试试看（双关语，意为“试试它的旋转效果”）。\n\
  \n为了关闭“设置”视图控制器，我们需要在`view-controller`组中添加一个`BRCoreViewController`子类，并命名为`BRSettingsViewController`。然后，在故事板中选中“设置”视图控制器，使用身份检查器指定新的`BRSettingsViewController`类。接着，按住\
  \ Control 键将“完成”按钮拖拽连接到视图控制器的`saveAndDismiss:`动作方法。\n\n在我们处理“设置”视图控制器的同时，让我们再添加一个由“设置”场景链接的视图控制器。新的通知时间视图控制器允许用户更改生日提醒的默认通知时间。\n\
  \n首先，在“设置”视图中添加一个“圆角矩形按钮”，并将其标题设置为`设置提醒时间`。然后，在“设置”场景右侧添加一个新的视图控制器场景。将其标题设置为`提醒时间`，接着按住\
  \ Control 键从“设置提醒时间”按钮拖拽到新添加的视图控制器，创建一个推送转场。这应该会为新的视图控制器添加一个模拟导航栏。输入标题`提醒时间`，如图\
  \ 5-26 所示。\n\n![图片](img/9781430243748_Fig05-26.jpg)\n\n**图 5-26.** 将视图控制器推送到模态呈现的“设置”视图控制器上\n\
  \n按照目前所有视图控制器的做法，我们创建另一个`BRCoreViewController`的子类，命名为`BRNotificationTimeViewController`。在故事板中选中通知时间视图控制器，使用身份检查器指定新创建的`BRNotificationTimeViewController`类。\n\
  \n构建并运行。如果所有视图显示为灰色，则说明视图控制器类的关联已按预期生效。\n\n### 总结\n\n本章我们取得了长足的进步。\n\n我们探索了如何使用\
  \ Xcode 的拖放式故事板技术构建复杂的导航层级。您现在应该熟悉故事板的局限性：我们需要继承`UIViewController`并将子类分配给故事板视图控制器，才能对用户界面进行任何有趣的操作。\n\
  \n我们提到了添加共享核心视图控制器的好处。随着应用程序的增长，项目中的视图和视图控制器数量也会增加。通过使用核心视图控制器方法，您可以集中管理许多可重用的方法和属性。除了编写更少代码的好处外，这意味着错误可以在一个地方解决，而无需在每个视图控制器类中修复。视图的皮肤化也变成了集中化的流程：更清晰、更易于管理，正如我们将在第\
  \ 9 章中看到的那样。\n\n#### 一项挑战\n\n这里有一个挑战来测试您新学到的故事板知识。使用`Single View Application` Xcode\
  \ 项目模板从头构建一个新应用。将默认视图控制器嵌入导航控制器。添加一个按钮或栏按钮项，将另一个视图控制器推送到第一个视图控制器上。最后，尝试创建一个可被关闭的模态呈现视图控制器。请告诉我效果如何。\n\
  \n![图片](img/ch.jpg)\n\n## 第 6 章\n\n## 视图、控件、相机、行动！\n\n现在，是时候开始使用用户界面控件并学习如何处理视图交互了。今天剩下的时间里，我们将开发编辑生日、编辑备注和通知时间视图的用户界面。这三个目标视图使用了\
  \ iOS SDK 中的多个控件（如日期选择器、开关和文本字段），我们将把它们添加到视图中，并编写代码来处理控件交互。\n\n到本章结束时，我们将进一步使用手势识别器来捕捉手指交互事件。我们甚至将学习如何直接在应用中使用\
  \ iPhone 的相机和照片库。这里有很多东西要学，所以我们最好现在就开始！\n\n\n### 用户界面控件与组件\n\n作为开发者，在视图上添加用户界面实例组件时有两种选择：通过代码创建并添加，或通过拖放操作添加到\
  \ nib 文件和 Storyboard 文件中。在开发*生日提醒*应用的过程中，我们主要采用更简单的拖放方式，直接在 Storyboard 文件中设计用户界面。\n\
  \n随着你成长为更资深的 iOS 开发者，你可能会发现有些时候通过代码创建组件是更好或唯一的选择。Storyboard 永远有其局限性。不过，对于*生日提醒*应用来说，绝大多数用户界面设计和布局都能完美地通过\
  \ Storyboard 实现。\n\n### 编辑生日视图：日期选择器、开关和文本字段\n\n在 Xcode 中打开你的*生日提醒*项目，选择编辑生日视图，然后从对象库中向该视图添加以下每个组件的一个实例（参见图\
  \ 6-1）。使用尺寸检查器设置列出的位置和尺寸值。\n\n> * 一个文本字段（`UITextField`）：x=89，y=22，宽度=221。\n> * 一个标签（`UILabel`）：将文本改为**包含年份**，然后定位并设置尺寸（x=125，y=165，宽度=99，高度=27）。\n\
  > * 一个开关（`UISwitch`）：x=231，y=165。\n> * 一个日期选择器（`UIDatePicker`）：x=0，y=200，宽度=320。\n\
  \n![Image](img/9781430243748_Fig06-01.jpg)\n\n**图 6-1.** 已填入文本字段、标签、开关和日期选择器的编辑生日视图\n\
  \n根据我们目前对该视图的实现，日期选择器、“包含年份”标签和开关会悬浮在较长的 iPhone 5 屏幕上 88 点高的空白区域上方。然而，通过使用自动调整尺寸，我们可以改变这一情况，强制这些组件固定对齐到用户界面的底部。在这三个组件上，通过修改图\
  \ 6-1 所示的自动尺寸蒙版值，将下边距设置为固定。依次选中每个组件以应用新的自动调整尺寸值。\n\n接下来，我们要在 `BRBirthdayEditViewController`\
  \ 中为四个新的用户界面组件创建界面构建器（Interface Builder）输出口，并为“保存”栏按钮项创建一个输出口。\n\n确保在你的 Storyboard\
  \ 中选中了“编辑生日”视图控制器场景，隐藏右侧的检查器面板，并将 Xcode 切换到助理编辑器模式（参见图 6-2）。\n\n![Image](img/9781430243748_Fig06-02.jpg)\n\
  \n**图 6-2.** Xcode 的助理编辑器布局：非常适合创建界面构建器连接\n\n按住 Control 键从“保存”栏按钮项、名称文本字段、年份标签、开关和日期选择器拖拽，在\
  \ `BRBirthdayEditViewController.h` 头文件中创建五个弱引用输出口，名称分别为：`saveButton`、`nameTextField`、`includeYearLabel`、`includeYearSwitch`\
  \ 和 `datePicker`。最终结果会向头文件添加如下代码：\n\n```objc\n#import <UIKit/UIKit.h>\n#import \"\
  BRCoreViewController.h\"\n\n@interface BRBirthdayEditViewController : BRCoreViewController\n\
  \n@property (weak, nonatomic) IBOutlet UIBarButtonItem *saveButton;\n@property (weak,\
  \ nonatomic) IBOutlet UITextField *nameTextField;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *includeYearLabel;\n@property (weak, nonatomic) IBOutlet UISwitch *includeYearSwitch;\n\
  @property (weak, nonatomic) IBOutlet UIDatePicker *datePicker;\n\n@end\n```\n\n\
  #### 配置文本字段并响应文本变化\n\n回到 Storyboard 中，让我们为名称文本字段设置几个属性。选中该文本字段，使用属性检查器，首先输入占位文本\
  \ **名称**。当文本字段为空时，占位文本会以浅灰色显示。这是一种极好的方式来提示用户输入文本，而无需在文本输入字段上方或旁边添加另一个标签。\n\n将清除按钮属性更改为“编辑时出现”。这会让\
  \ iOS 在文本字段内部右侧显示一个方便的 X 按钮，以便用户只需轻点一下即可轻松清除名称文本并输入新名称。\n\n##### 隐藏键盘\n\n我们要修改的最后一个属性是回车键。将默认值更改为“完成”。当用户轻点名称文本字段并开始输入文本时，键盘会自动出现，覆盖日期选择器。我们需要考虑到这一点，并确保为用户提供关闭键盘并修改生日日期的方法。通过将回车键值更改为“完成”，我们向用户提示轻点回车键将关闭键盘。要在文本字段的回车按钮被轻点时关闭键盘，需要我们的视图控制器订阅为文本字段的委托。\n\
  \n在 `BRBirthdayEditViewController.h` 头文件中，我们必须声明此类实现了 `UITextFieldDelegate` 协议：\n\
  \n```objc\n@interface BRBirthdayEditViewController : BRCoreViewController <UITextFieldDelegate>\n\
  ```\n\n现在，在 Storyboard 中按住 Control 键从文本字段拖拽到视图控制器，以将“编辑生日”视图控制器指定为文本字段的委托（参见图 6-3）。从弹出的输出口列表中选择“Delegate”。\n\
  \n![Image](img/9781430243748_Fig06-03.jpg)\n\n**图 6-3.** 从文本字段按住 Control 键拖拽到视图控制器以连接委托输出口\n\
  \n`UITextFieldDelegate` 协议中没有必须实现的方法，所以此时编译器应该不会报错或警告。不过，如果我们要捕捉用户轻点“完成”按钮的操作，就需要将\
  \ `textFieldShouldReturn:` `UITextFieldDelegate` 方法添加到视图控制器类中。在 `BRBirthdayEditViewController.m`\
  \ 源文件中添加以下代码：\n\n```objc\n#pragma mark UITextFieldDelegate\n\n- (BOOL)textFieldShouldReturn:(UITextField\
  \ *)textField\n{\n    [self.nameTextField resignFirstResponder];\n    return NO;\n\
  }\n```\n\n你不需要添加 pragma 标记，但这是一个划分代码区块并保持整洁的便捷方法：我喜欢保持井井有条！Pragma 标记会被 Xcode 的跳转栏识别并高亮显示，以帮助你浏览类方法和属性组：聪明的注释。\n\
  \n在 iOS 中，设置和移除可编辑文本组件的焦点分别通过 `becomeFirstResponder` 和 `resignFirstResponder` 方法实现。构建并运行你的应用。你现在应该会发现，轻点名称文本字段会自动弹出一个带有“完成”按钮的键盘，并且轻点“完成”会关闭键盘。\n\
  \n##### 跟踪并响应文本变化\n\n现在来跟踪用户何时在名称文本字段中输入或清除文本。就像所有其他按钮和控件组件一样，`UITextField` 是 `UIControl`\
  \ 的子类。任何 `UIControl` 的子类都实现了目标-动作设计模式。我们将视图控制器设置为文本字段的目标，指定我们想要响应哪个动作事件，以及当该事件发生时调用我们类的选择器方法。\n\
  \n通过从文本字段拖拽到 `BRBirthdayEditViewController.h` 头文件接口，创建一个界面构建器动作连接。将连接类型更改为 Action，输入名称\
  \ `didChangeNameText`，并将事件类型更改为 Editing Changed（参见图 6-4）。点击 Connect！\n\n![Image](img/9781430243748_Fig06-04.jpg)\n\
  \n**图 6-4.** 创建用于检测文本编辑变化的动作\n\nXcode 应该会生成我们的 `didChangeNameText:` 动作方法签名：\n\n\
  ```objc\n- (IBAction)didChangeNameText:(id)sender;\n```\n\n切换到 `BRBirthdayEditViewController.m`，为该方法输入以下实现代码：\n\
  \n```objc\n- (IBAction)didChangeNameText:(id)sender {\n    NSLog(@\"文本已被更改: %@\"\
  ,self.nameTextField.text);\n}\n```\n\n构建并运行。当你在名称字段中输入和修改文本时，你应该会在调试面板中看到你的更改被打印出来。太棒了！\n\
  \n\n\n##### 启用和禁用保存按钮\n\n更好的用户体验通常意味着更少的选择，保持事情简洁。我们不希望用户在没有提供姓名的情况下尝试保存新增或编辑的生日信息。当保存条件未全部满足时显示警告消息错误是一种不必要的、带有攻击性的用户体验（参见图\
  \ 6-5）。\n\n![图片](img/9781430243748_Fig06-05.jpg)\n\n**图 6-5.** 警告视图并非总是最佳解决方案。\n\
  \n另一种（在我看来更好的）解决方案是禁用保存栏按钮项，并在用户向姓名文本字段中输入一个或多个字符后自动启用它。我们首先在 `BRBirthdayEditViewController.m`\
  \ 中添加一个私有方法，用于检查是否已输入文本，并相应地启用或禁用保存按钮。在 `BRBirthdayEditViewController.m` 中添加一个名为\
  \ `updateSaveButton` 的新方法。我们不会在头文件中声明 `updateSaveButton` 的方法签名，因为它是私有方法，仅用于 `BRBirthdayEditViewController`\
  \ 类代码内部：\n\n```\n-(void) updateSaveButton\n{\n    self.saveButton.enabled = self.nameTextField.text.length\
  \ > 0;\n}\n```\n\n现在，何时调用我们的新方法 `updateSaveButton` 呢？有两个地方需要更新保存按钮：当视图即将显示时，以及当姓名文本字段被编辑时。我们确切知道这些事件发生的时间：在\
  \ `viewWillAppear:` 方法中，以及当我们的新自定义操作方法 `didChangeNameText:` 被触发时。以下是需要添加到 `BRBirthdayEditViewController.m`\
  \ 中的代码：\n\n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    [self updateSaveButton];\n}\n```\n\n```\n- (IBAction)didChangeNameText:(id)sender\
  \ {\n    NSLog(@\"文本已更改: %@\",self.nameTextField.text);\n    [self updateSaveButton];\n\
  }\n```\n\n构建并运行。你会发现，当你在姓名文本字段中开始输入时，保存按钮会自动启用。很酷吧？\n\n#### 捕获开关切换\n\n有些人并不想分享自己的实际年龄，只想分享生日。我们将尊重他们的意愿，通过一个开关让出生年份变为可选。但是，你认为我们如何能在开关被切换时立即捕获到事件呢？“目标-动作”这个词有没有让你想到什么？`UISwitch`\
  \ 也是 `UIControl` 的子类，所以我们只需要知道开关被切换时分发了哪个事件。\n\n与我们之前将文本字段的“编辑已更改”动作连接到 `BRBirthdayEditViewController.h`\
  \ 的方式类似，我们对开关执行相同的 Control-拖拽操作，将其连接到 `BRBirthdayEditViewController.h` 接口。将新连接更改为动作（Action）。Xcode\
  \ 通常会根据当前选中的 `UIControl` 自动选择最典型的事件类型。对于开关来说，我们需要的正是“值已更改”事件。将新动作命名为 `didToggleSwitch`\
  \ 并点击连接（参见图 6-6）。\n\n![图片](img/9781430243748_Fig06-06.jpg)\n\n**图 6-6.** 创建新的开关值已更改动作回调\n\
  \n现在实现新的动作方法：\n\n```\n- (IBAction)didToggleSwitch:(id)sender {\n    if (self.includeYearSwitch.on)\
  \ {\n        NSLog(@\"当然，我愿意和你分享我的年龄！\");\n    }\n    else {\n        NSLog(@\"\
  我更愿意对我的出生年份保密，非常感谢！\");\n    }\n}\n```\n\n构建并运行，然后试试看。\n\n#### 监控日期选择器更新\n\n日期选择器（`UIDatePicker`）控件有多种不同的模式：时间、日期、日期和时间以及倒计时器。你可以随意尝试这四种不同的选项，但为了《生日提醒》这个应用，请在故事板中选择日期选择器，并通过属性检查器将模式更改为“日期”。\n\
  \n与开关控件类似，日期选择器也支持“值已更改”事件。所以，按照你操作开关时的方式，Control-拖拽从日期选择器创建一个新的“值已更改”动作，并将其命名为\
  \ `didChangeDatePicker`。现在在 `BRBirthdayEditViewController.m` 中实现新的动作方法：\n\n```\n\
  - (IBAction)didChangeDatePicker:(id)sender {\n    NSLog(@\"已选择新出生日期: %@\",self.datePicker.date);\n\
  }\n```\n\n构建并运行。小菜一碟，对吧？\n\n\n\n### 多行文本视图（编辑笔记视图）\n\n我们已探讨如何处理文本字段交互，但文本字段仅允许输入单行文本。对于我们的笔记编辑器，仅用一行文本来记下礼物创意显然是不够的！\n\
  \n如果需要多行文本输入字段，你需要在应用中添加一个可编辑的文本视图（`UITextView`）组件。\n\n在故事板中，将注意力移至编辑笔记视图控制器。将一个文本视图实例拖到视图上，并设置其位置：`x=0`、`y=10`、`width=320`、`height=190`（参见图\
  \ 6-7）。\n\n![Image](img/9781430243748_Fig06-07.jpg)\n\n**图 6-7.** 在编辑笔记视图中添加文本视图\n\
  \n将文本视图设置为这个位置和大小是出于充分理由的。它正好在文本视图下方留下 216 点的屏幕空间。在竖屏方向下，键盘高度为 216 点，因此我们确保当用户输入生日礼物备注时，键盘不会遮挡视图中的任何重要元素。\n\
  \n尽管我们的 190 点高文本视图在 iPhone 4S 上看起来很棒，但在 iPhone 5 屏幕上，文本视图底部与键盘之间会有 88 点的空白空间。我们可以通过将文本视图的自动调整遮罩设置为灵活的宽度和高度，但固定上、下、左、右值来解决这个问题。更改自动调整属性以匹配图\
  \ 6-7 中高亮显示的内容。\n\n保持文本视图处于选中状态，切换到属性检查器。你将会注意到（并非双关！）文本视图可以包含可编辑和不可编辑的多行文本。我们可以根据需要切换可编辑属性。使用属性检查器删除\
  \ *lorem ipsum* 文本。\n\n使用辅助编辑器布局，通过 Control-拖拽技术在`BRNotesEditViewController.h`中为“保存”栏按钮项和文本视图创建插座。将新插座分别命名为`saveButton`和`textView`。你的头文件最终应包含以下代码：\n\
  \n```\n#import \"BRCoreViewController.h\"\n\n@interface BRNotesEditViewController\
  \ : BRCoreViewController\n\n@property (weak, nonatomic) IBOutlet UIBarButtonItem\
  \ *saveButton;\n@property (weak, nonatomic) IBOutlet UITextView *textView;\n\n@end\n\
  ```\n\n文本视图允许用户输入无限量的文本。如果文本高度超过其边界，文本会自动变为可滚动。因此，`UITextView`是`UIScrollView`的子类。`UITextView`不是`UIControl`的子类，所以我们没有像添加`UITextField`时那样的目标-动作事件可用。要在`UITextView`实例中捕获文本变化，我们需要订阅为文本视图的委托，并实现`UITextViewDelegate`协议。修改`BRNotesEditViewController.h`的接口声明，在尖括号中包含`UITextViewDelegate`协议引用：\n\
  \n```\n@interface BRNotesEditViewController : BRCoreViewController <UITextViewDelegate>\n\
  ```\n\n从文本视图 Control-拖拽到编辑笔记视图控制器，以将文本视图的委托插座属性分配给编辑笔记视图控制器（参见图 6-8）。\n\n![Image](img/9781430243748_Fig06-08.jpg)\n\
  \n**图 6-8.** 分配文本视图委托插座\n\n我们感兴趣的`UITextViewDelegate`协议方法是`textViewDidChange:`回调。每当文本视图中的文本发生变化时，该方法都会被触发。以下是添加到`BRNotesEditViewController.m`中的实现：\n\
  \n```\n#pragma mark UITextViewDelegate\n\n- (void)textViewDidChange:(UITextView\
  \ *)textView\n{\n    NSLog(@\"User changed the notes text: %@\",self.textView.text);\n\
  }\n```\n\n构建并运行。检查你对笔记文本字段所做的更改是否打印到 Xcode 的调试器中。\n\n#### 显示文本控件和视图的键盘\n\n理想情况下，我们希望不必等到用户点击文本视图才显示键盘。最好是在编辑笔记视图一出现时，键盘就立即显示在屏幕上。添加一个`viewWillAppear:`回调即可通过一行代码实现：\n\
  \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    [self.textView becomeFirstResponder];\n}\n```\n\n与在编辑生日视图控制器中点击回车键时调用`resignFirstResponder`来关闭键盘类似，我们也可以通过调用`becomeFirstResponder`方法来聚焦文本字段和可编辑文本视图。\n\
  \n### 准备通知时间视图控制器\n\n通知时间视图控制器显示一个子设置视图，用户可以在其中选择希望生日提醒触发的时间。\n\n#### 多行居中标签\n\n\
  首先，在故事板的通知时间视图中添加一个标签和一个日期选择器组件。在标签中输入以下文本：\n\n**你希望生日提醒在一天的什么时间触发？**\n\n设置标签的位置和大小（`x=20`、`y=20`、`width=280`、`height=87`）。默认情况下，标签组件只显示单行垂直居中的文本。你可能还会发现文本被缩小以适应你刚设置的新尺寸。使用属性检查器，你可以将“行数”值增加到\
  \ 3，并将“对齐”值更改为居中对齐标签文本（参见图 6-9）。\n\n![Image](img/9781430243748_Fig06-09.jpg)\n\n\
  **图 6-9.** 添加文本居中显示的多行`UILabel`\n\n\n\n### 使用日期选择器作为时间设置控件\n\n确保日期选择器固定在视图底部（就像你为“编辑生日”视图所做的那样），然后将其`Mode`属性更改为`Time`。将日期选择器的`Interval`属性设置为五分钟（参见图\
  \ 6-10）。\n\n![Image](img/9781430243748_Fig06-10.jpg)\n\n**图 6-10.** 将日期选择器配置为时间设置控件\n\
  \n按住 Control 键拖拽，在`BRNotificationTimeViewController.h`头文件中分别为标签和日期选择器创建输出口：分别命名为`whatTimeLabel`和`timePicker`。再次按住\
  \ Control 键从日期选择器拖拽到`BRNotificationTimeViewController.h`，为“值已更改”（Value Changed）事件创建一个界面构建器操作，并将该操作命名为`didChangeTime:`。`BRNotificationTimeViewController.h`最终应如下所示：\n\
  \n```\n#import \"BRCoreViewController.h\"\n\n@interface BRNotificationTimeViewController\
  \ : BRCoreViewController\n@property (weak, nonatomic) IBOutlet UILabel *whatTimeLabel;\n\
  @property (weak, nonatomic) IBOutlet UIDatePicker *timePicker;\n- (IBAction)didChangeTime:(id)sender;\n\
  \n@end\n```\n\n现在，当用户更改日期选择器上显示的时间时，我们的新`didChangeTime:`操作将被调用。这使我们能够获取`UIDatePicker`的日期值，但我们如何提取用户设置的仅小时和分钟呢？以下是添加到`didChangeTime:`实现中的代码：\n\
  \n```\n- (IBAction)didChangeTime:(id)sender {\n    NSDateComponents *components\
  \ = [[NSCalendar currentCalendar]\n        components:NSHourCalendarUnit|NSMinuteCalendarUnit\
  \ fromDate:self.timePicker.date];\n\n    NSLog(@\"Changed time to: %d:%d\",components.hour,components.minute);\
  \  \n}\n```\n\n在接下来的几天里，我们将与`NSDateComponents`成为最好的朋友。它是一个非常强大的类，用于操作日期并将其分解为单独的年、月、日、分钟和秒组件。我们从用户设备的当前日历实例化一个`NSDateComponents`实例，并传入单位标志，指定我们感兴趣的组件——本例中仅为小时和分钟。我们还会传入日期选择器中的日期。然后，我们可以直接访问`NSDateComponents`实例的小时和分钟属性。我们将在后续章节中探讨`NSDateComponents`的更多用法，届时我们需要计算每个已保存生日剩余的天数、用户下一个生日时的年龄，以及其他许多与日期相关的值。\n\
  \n### 使用相机和相册增强用户界面交互\n\n添加或导入到*Birthday Reminder*应用中的任何生日都可以附带一张照片。不过，照片是可选的。如果某个生日有关联的照片，我们将在主屏幕的生日列表中显示它。在生日详情和编辑屏幕中，它会显示得更大。如果没有照片与生日关联，那么我们将显示一个生日蛋糕。![Image](img/smile.jpg)\n\
  \n让我们开始这个照片功能，首先在故事板中的编辑生日视图中添加一些新的子视图。从对象库中将一个新的视图（`UIView`）实例拖到编辑生日视图上。使用尺寸检查器将子视图定位（x=10,\
  \ y=20）。将视图大小调整为宽度=71，高度=71（参见图 6-11）。\n\n![Image](img/9781430243748_Fig06-11.jpg)\n\
  \n**图 6-11.** 添加图像视图容器\n\n新添加的视图是一个容器视图，用于容纳缩略图背景图像、生日照片和“Pic Photo”标签。默认情况下，Xcode\
  \ 会在添加到故事板的任何新视图上设置不透明的白色背景色。我们的容器需要是透明的，但不能不可见，因为它最终将具有圆角矩形。保持容器视图处于选中状态，使用属性检查器将视图的背景色更改为\
  \ Apple 内置的透明颜色（参见图 6-12）。\n\n![Image](img/9781430243748_Fig06-12.jpg)\n\n**图 6-12.**\
  \ 使用透明颜色使视图背景透明\n\n在本章的源代码中，您会找到四个新的 Retina 和非 Retina 图像资源，需要添加到您的项目中。将这些图像拖拽、放置并添加到您的\
  \ Xcode 项目中的`resources/images`组中（参见图 6-13）。\n\n![Image](img/9781430243748_Fig06-13.jpg)\n\
  \n**图 6-13.** 项目中添加的生日蛋糕和缩略图背景图像资源\n\n回到我们的编辑生日视图，从对象库中将一个新的图像视图（`UIImageView`）拖到容器视图中。然后将其定位（x=0,\
  \ y=0, width=71, height=71）以匹配其父视图。选中您的新图像视图后，使用属性检查器将其`image`属性更改为`thumbnail-background.png`，这是我们刚刚添加到项目中的图像资源之一。显示的图像应该是一个圆角缩略图背景\
  \ PNG。\n\n再次重复添加、定位和调整新图像视图大小的过程；但这次，选择`icon-birthday-cake.png`图像，使其位于缩略图背景的前面（参见图\
  \ 6-14）。\n\n![Image](img/9781430243748_Fig06-14.jpg)\n\n**图 6-14.** 一个容器视图，包含两个子视图：缩略图背景和生日蛋糕图像视图\n\
  \n向容器视图添加第三个子视图。这次是一个新的标签（`UILabel`）实例。使用属性检查器，将标签的对齐方式更改为居中，字体大小更改为系统 12，文本颜色更改为浅色文本颜色，并将其文本更改为`Pic\
  \ Photo`。滚动属性检查器到标签的视图属性，点击背景颜色色板。使用灰度滑块，创建一个新的黑色颜色，并将 50%的不透明度应用到标签上（参见图 6-15）。\n\
  \n![Image](img/9781430243748_Fig06-15.jpg)\n\n**图 6-15.** 创建一个具有 50%不透明度的新半透明颜色\n\
  \n最后，定位新标签（x=0, y=56, width=71, height=15）。结果应类似于图 6-16。\n\n![Image](img/9781430243748_Fig06-16.jpg)\n\
  \n**图 6-16.** 我们的容器视图已完成，包含图像和标签\n\n使用助理编辑器布局，在`BRBirthdayEditViewController.h`中为容器视图、带有蛋糕的图像视图和标签视图创建新的输出口，分别命名为`photoContainerView`、`photoView`和`picPhotoLabel`。当视图相互叠放时，确保您按住\
  \ Control 键从正确视图拖拽的最准确方法是打开文档大纲窗格，然后直接从文档大纲中的视图层次结构拖拽到头文件中（参见图 6-17）。\n\n![Image](img/9781430243748_Fig06-17.jpg)\n\
  \n**图 6-17.** 从文档大纲窗格按住 Control 键拖拽以创建新的输出口\n\n`BRBirthdayEditViewController.h`头文件中生成的输出口代码如下：\n\
  \n```\n@property (weak, nonatomic) IBOutlet UIView *photoContainerView;\n@property\
  \ (weak, nonatomic) IBOutlet UILabel *picPhotoLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UIImageView *photoView;\n```\n\n\n\n### 手势识别器\n\n我们将提示用户使用相机拍摄新照片，或从\
  \ iPhone 照片库中选择一张照片，分配给其正在添加或编辑的生日。我们的“点击照片”标签已经表明，用户需要点击图像图标来替换默认的蛋糕图像。\n\n我们的应用需要响应用户点击照片容器视图的操作。我们无法使用“目标-动作”模式，因为\
  \ `UIView` 并非 `UIControl` 的子类。因此，我们需要添加一个点击手势识别器来捕捉用户用手指点击视图的操作。\n\n向下滚动对象库，直到找到点击手势识别器（`UITapGestureRecognizer`）对象。将一个新实例拖放到文档大纲中的照片容器视图上（请参见图\
  \ 6-18）。\n\n![Image](img/9781430243748_Fig06-18.jpg)\n\n**图 6-18.** 将新的点击手势识别器拖放到文档大纲窗格的容器视图上\n\
  \nXcode 会在文档大纲窗格（对象列表底部）显示新添加的点击手势识别器实例。按住 Control 键单击添加的手势识别器以打开其上下文菜单。您会看到一个新的\
  \ `gestureRecognizers` 出口集合，它将识别器连接到照片容器视图。\n\n我们已经做了足够的工作来检测照片容器视图上的点击，但我们还需要从点击手势识别器创建一个动作连接至\
  \ `BRBirthdayEditViewController.h`。\n\n使用辅助编辑器，在右侧窗格中显示 `BRBirthdayEditViewController.h`，在左侧窗格中显示故事板，然后按住\
  \ Control 键从点击手势识别器拖拽到 `BRBirthdayEditViewController.h`，以创建一个名为 `didTapPhoto` 的新动作，如图\
  \ 图 6-19 所示。\n\n![Image](img/9781430243748_Fig06-19.jpg)\n\n**图 6-19.** 从点击手势识别器创建名为\
  \ `didTapPhoto:` 的动作\n\n跳转到 `BRBirthdayEditViewController.m` 并添加一个 `NSLog` 调用来检查点击照片是否工作：\n\
  \n```\n- (IBAction)didTapPhoto:(id)sender {\n    NSLog(@\"Did Tap Photo!\");\n}\n\
  ```\n\n构建并运行。每次点击蛋糕时，调试区是否都会打印“Did Tap Photo!”？太棒了。![Image](img/smile.jpg)\n\n###\
  \ 实现操作列表\n\n我们希望为用户提供从相册选择照片*或*用相机拍照的选项。我们将通过一个操作列表来呈现这两个选项。在扩展 `didTapPhoto:` 方法之前，我们需要在头文件中声明\
  \ `BRBirthdayEditViewController` 实现了 `UIActionSheetDelegate` 协议：\n\n```\n@interface\
  \ BRBirthdayEditViewController : BRCoreViewController<UITextFieldDelegate, UIActionSheetDelegate>\n\
  ```\n\n现在来完成 `didTapPhoto:` 方法：\n\n```\n- (IBAction)didTapPhoto:(id)sender {\n \
  \   NSLog(@\"Did Tap Photo!\");\n    if (![UIImagePickerController\nisSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
  \ {\n        NSLog(@\"No camera detected!\");\n        return;\n    }\n    \n  \
  \  UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:nil delegate:self\n\
  cancelButtonTitle:@\"Cancel\" destructiveButtonTitle:nil otherButtonTitles:@\"Take\
  \ a\nPhoto\",@\"Pick from Photo Library\", nil];\n    [actionSheet showInView:self.view];\n\
  }\n```\n\n构建并运行。您是否看到了像图 6-20 中显示的操作菜单？没有？您是在 iOS 模拟器上运行的吗？您确实是在模拟器上运行的？好吧，这就是原因了。iOS\
  \ 模拟器没有摄像头，所以它会被我们的条件语句拦截；也就是说，没有可用的摄像头源类型，因此不要给用户提供用相机拍照的选项：\n\n```\nif (![UIImagePickerController\
  \ isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\n{\n         \
  \   NSLog(@\"No camera detected!\");\n            return;\n        }\n``` \n![Image](img/9781430243748_Fig06-20.jpg)\n\
  \n**图 6-20.** 显示一个操作列表\n\n您需要在带有摄像头的设备上运行该应用，才能拥有用相机拍照的选项。\n\n\n\n"
- "# `UIImagePickerController`：拍照与浏览照片库\n\niOS 应用有多种方式通过 iPhone 摄像头拍照并访问用户的照片库。最简单的方法莫过于使用\
  \ iOS SDK 中的 `UIImagePickerController` 组件。它替我们完成了所有复杂的工作。我们将在 `BRBirthdayEditViewController`\
  \ 中懒加载一个 Apple 的 `UIImagePickerController` 类的实例，并创建两个新的私有方法：一个用于拍照，另一个用于从照片库中选择照片。\n\
  \n`BRBirthdayEditViewController` 将自己设置为`UIImagePickerController` 的代理。因此，首先更新我们的接口头文件：\n\
  \n```\n@interface BRBirthdayEditViewController : BRCoreViewController<UITextFieldDelegate,\n\
  UIActionSheetDelegate, UIImagePickerControllerDelegate, UINavigationControllerDelegate>\n\
  ```\n\n`UIImagePickerController` 的代理属性被定义为实现了 `UIImagePickerControllerDelegate`\
  \ 和 `UINavigationControllerDelegate` 协议的对象。因此，即使我们不会实现任何 `UINavigationControllerDelegate`\
  \ 方法签名，仍然需要在 `BRBirthdayEditViewController` 头文件中包含该协议，以避免编译器警告。\n\n切换回 `BRBirthdayEditViewController.m`\
  \ 源文件，并添加以下私有属性声明：\n\n```\n@interface BRBirthdayEditViewController()\n\n@property\
  \ (nonatomic, strong) UIImagePickerController *imagePicker;\n\n@end;\n```\n\n我们可以重写新图片选择器属性的\
  \ getter 方法，仅在第一次引用时才实例化图片选择器控制器的一个实例。这被称为*懒加载*。在 `BRBirthdayEditViewController.m`\
  \ 的实现中添加该访问器方法：\n\n```\n-(UIImagePickerController *) imagePicker\n{\n    if (_imagePicker\
  \ == nil) {\n        _imagePicker = [[UIImagePickerController alloc] init];\n  \
  \      _imagePicker.delegate = self;\n    }\n    return _imagePicker;\n}\n```\n\n\
  现在实现我们的两个新方法，用于拍照和浏览照片：\n\n```\n-(void) takePhoto\n{\n    self.imagePicker.sourceType\
  \ = UIImagePickerControllerSourceTypeCamera;\n    [self.navigationController presentViewController:self.imagePicker\
  \ animated:YES completion:nil];\n}\n\n-(void) pickPhoto\n{\n    self.imagePicker.sourceType\
  \ = UIImagePickerControllerSourceTypePhotoLibrary;\n    [self.navigationController\
  \ presentViewController:self.imagePicker animated:YES completion:nil];\n}\n```\n\
  \n与关闭模态视图控制器类似，我们可以将一个代码块作为 `presentViewController:animated:completion:` 视图控制器方法的第三个参数传入。不过，由于我们没有任何需要在呈现动画完成后运行的代码，因此直接传入\
  \ `nil` 即可。\n\n为了调用我们的 `takePhoto` 和 `pickPhoto` 方法，需要从 `UIActionSheetDelegate`\
  \ 协议中添加一个代理方法到我们的类中，以便响应用户从操作表中选择两个操作选项之一：\n\n```\n#pragma mark UIActionSheetDelegate\n\
  \n- (void)actionSheet:(UIActionSheet *)actionSheet\ndidDismissWithButtonIndex:(NSInteger)buttonIndex\n\
  {\n    if (buttonIndex == actionSheet.cancelButtonIndex) return;\n\n    switch (buttonIndex)\
  \ {\n        case 0:\n            [self takePhoto];\n            break;\n      \
  \  case 1:\n            [self pickPhoto];\n            break;   \n    }\n}\n```\n\
  \n构建并运行。现在您应该能够通过 `UIImagePickerController` 浏览、选择并拍照，如图 6-21 所示。\n\n![图片](img/9781430243748_Fig06-21.jpg)\n\
  \n**图 6-21。** 状态并非最佳！\n\n如果您在模拟器上运行应用，仍然无法看到 `UIImagePickerController`。不过，模拟器确实包含照片库，因此如果没有检测到摄像头，我们就不显示带有选项的操作表，而是直接向用户展示照片库：\n\
  \n将 `didTapPhoto:` 方法修改如下：\n\n```\n- (IBAction)didTapPhoto:(id)sender {\n    NSLog(@\"\
  已点击照片！\");\n    if (![UIImagePickerController\nisSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
  \ {\n        NSLog(@\"未检测到摄像头！\");\n        [self pickPhoto];\n        return;\n\
  \    }\n    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:nil\
  \ delegate:self\ncancelButtonTitle:@\"取消\"    destructiveButtonTitle:nil    otherButtonTitles:@\"\
  拍照\",@\"从照片库选取\", nil];\n    [actionSheet showInView:self.view];\n}\n```\n\n我们刚刚添加了一个直接调用，如果设备未检测到摄像头，则直接调用新的\
  \ `pickPhoto` 方法。\n\n我们还没完全完成。`UIImagePickerController` 似乎正在拍照，但如何在完成时获取照片数据呢？当然是通过代理回调方法！我们已经声明了\
  \ `BRBirthdayEditViewController` 实现了 `UIImagePickerControllerDelegate` 协议，因此添加以下代码来从\
  \ `UIImagePickerController` 实例中获取图像数据：\n\n```\n#pragma mark UIImagePickerControllerDelegate\n\
  \n- (void)imagePickerController:(UIImagePickerController *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info {\n\n    [picker dismissViewControllerAnimated:YES completion:nil];\n\n\
  \    UIImage *image = info[UIImagePickerControllerOriginalImage];\n\n    self.photoView.image\
  \ = image;\n}\n```\n\n通过定义 `UIImagePickerControllerDelegate` 协议方法 `imagePickerController:didFinishPickingMediaWithInfo:`，我们从\
  \ `UIImagePickerController` 中获取到了图像数据，该数据作为参数传入的回调方法中的 `info` `NSDictionary` 的一个属性。我们设置了\
  \ `photoView` 图像视图的 image 属性，将生日蛋糕图片替换为新拍摄或选择的照片。\n\n\n\n#### 调整图像视图渲染\n\n根据你用图像选择器拍摄或选取的照片尺寸，你可能会注意到生成的图像没有保持其宽高比。相反，图像会被压缩或拉伸以适应图像视图的边界。在我刚开始学习\
  \ iOS 并遇到这个问题时，我的第一反应是要么调整图像视图的大小并使其居中，要么生成一张新的裁剪图像来匹配图像视图的尺寸。结果发现，解决方案比这两种方法都要简单得多。`UIView`\
  \ 有一个名为 `contentMode` 的属性，它决定了视图内容如何渲染。`contentMode` 默认为 `UIViewContentModeScaleToFill`，即它会简单地拉伸或压缩其绘制的内容，以适应视图边界的尺寸。如果我们将\
  \ `contentMode` 属性值改为 `UIViewContentModeScaleAspectFill`，图像的宽高比会得到保留，并且图像会填满它被渲染到的图像视图的边界。\n\
  \n回到故事板中，选中 `photoView` 图像视图。使用属性检查器将模式（Mode）设置改为 Aspect Fill。构建并运行。这次，你应该会发现选中的照片现在会调整大小以填满图像视图的边界，而不会使图像变形。唯一的问题是，图像重叠的侧边或顶部和底部没有被裁剪。不过，这也很容易解决。保持图像视图选中状态，在属性检查器中你会找到一个名为\
  \ Clip Subviews（`UIView.clipsToBounds`）的属性。打开 Clip Subviews 的开关。构建并运行。怎么样？完美裁剪并居中的方形缩略图，正好匹配图像视图的边界（参见图\
  \ 6-22）！这多简单啊？！\n\n*注：目前，我们是在用一个可能非常大的照片来填充一个小缩略图图像视图。在开发后期，我们会从大图中生成缩略图；否则，我们的应用会因渲染不必要的大图而迅速消耗大量内存。*\n\
  \n![Image](img/9781430243748_Fig06-22.jpg)\n\n**图 6-22.** 差，较好，最好！\n\n### 总结\n\n\
  你已经完成了第二天的学习！今天的内容全是关于构建基本的 iOS 用户界面和导航。你学到了\n\n> *   如何在故事板中构建由视图控制器场景组成的导航层级。\n\
  > *   如何创建视图控制器子类并将它们分配给故事板中的视图控制器。\n> *   如何通过 Interface Builder 的 Outlet 和 Action\
  \ 将我们的视图和子视图与自定义视图控制器连接起来。\n> *   如何理解委托模式，在我们的视图控制器中实现协议，并响应协议方法的回调。\n> *   如何将原生的\
  \ iPhone 相机和相册库集成到我们的应用中。\n\n我们在导航和用户界面上有了一个很好的开始，但我们还没有处理 iOS 中的数据。猜猜我们明天要做什么？没错，*处理数据*。睡个好觉。![Image](img/smile.jpg)\n\
  \n![Image](img/ch.jpg)\n\n## 第三天\n\n## 处理数据\n\n![Image](img/ch.jpg)\n\n## 第 7 章\n\
  \n## 表格视图、数组和字典——天哪！\n\n第三天是数据日！到目前为止，我们一直专注于*生日提醒*应用的用户界面和导航。今天，我们将学习如何将数据集成到我们的应用中。\n\
  \n在本章中，我们将学习如何创建和操作一个字典数组，并根据数据填充我们的应用。在第 8 章中，我们将修改数据实现，使用苹果的 Core Data 框架来提供持久化存储解决方案。\n\
  \n### 表格视图\n\n表格视图是许多 iPhone 应用的核心组件——*生日提醒*也不例外。表格视图使 iPhone 应用能够在小型屏幕设备上以长滚动列表的形式显示大量内容。\n\
  \n图 7-1 展示了我们最终将在应用主屏幕上呈现的表格视图——列出了用户所有亲朋好友的生日！用户还可以选择列表中的任意生日，应用将导航到显示所选生日的详细信息，将表格视图向左滑出，并让生日详情视图从右侧滑入替换它。\n\
  \n![Image](img/9781430243748_Fig07-01.jpg)\n\n**图 7-1.** `UITableView`：*生日提醒*应用的核心组件\n\
  \n我们要掌握的首要挑战是，从项目中的本地属性列表文件加载一个名人生日数组，存入一个原生的生日字典数组中。我们将在一个表格视图中显示名人姓名、生日和本地存储的照片。\n\
  \n从本章源代码附带的 assets 文件夹开始，将 `birthdays.plist` 文件和 Celebrity Pics 文件夹导入到你 Xcode 项目的\
  \ `resources` 组中，如图 7-2 所示。\n\n![Image](img/9781430243748_Fig07-02.jpg)\n\n**图 7-2.**\
  \ 添加到项目中的名人图片和 `birthdays.plist` 资源\n\n将故事板的焦点放在 Home 视图控制器上。首先，删除 Push Birthday\
  \ Detail View Controller 按钮。这会自动删除从 Home 视图控制器到 Birthday Detail 视图控制器的临时 Segue。现在，从对象库中拖拽一个新的表格视图实例（不要与表格视图控制器实例混淆）到主视图上（参见图\
  \ 7-3）。该表格视图成为我们主视图的一个子视图（不要替换你的主视图！）。\n\n![Image](img/9781430243748_Fig07-03.jpg)\n\
  \n**图 7-3.** 向主视图添加表格视图\n\n选中新的表格视图，使用属性检查器将原型单元格（Prototype Cells）设置增加到 1，这会为表格视图添加一个新的原型单元格供我们使用（参见图\
  \ 7-4）。\n\n![Image](img/9781430243748_Fig07-04.jpg)\n\n**图 7-4.** 向表格视图添加原型单元格\n\
  \n我们可以从苹果设计的表格单元格样式列表中选择样式来设计我们的原型单元格，或者我们可以直接自定义原型表格视图单元格，添加子视图、设置背景颜色等等。我们将在第\
  \ 9 章中学习创建自定义表格视图单元格；但现在，选择原型单元格，使用属性检查器将其样式改为 Subtitle（参见图 7-5）。副标题样式的表格单元格提供了粗体标题和副标题标签，我们可以在运行时为它们设置文本。\n\
  \n现在，在属性检查器的 Identifier 文本字段中输入一个重用标识符值。输入 `Cell` 作为文本（参见图 7-5）。\n\n![Image](img/9781430243748_Fig07-05.jpg)\n\
  \n**图 7-5.** 设置可重用的原型表格单元格\n\n苹果设计的表格视图非常优化。重用标识符的目的是使 `UITableViewCell` 的实例能够被多个表格行重用；例如，如果你的表格高度为\
  \ 416 点，并且每个表格单元格的高度为 100 像素，那么表格视图只需要生成五个 `UITableViewCell` 实例就能显示成百上千行！如果你不提供重用标识符，那么为我们的表格视图生成的每个\
  \ `UITableViewCell` 实例将只会被使用一次，这可能导致应用非常占用内存，更不用说性能方面的影响了。\n\n此时你应该能够构建并运行你的应用，尽管表格视图暂时只会显示空行。\n\
  \n\n\n在 Storyboard 中选中 Home 视图控制器场景后，从 `BRHomeViewController.h` 头文件新建一个指向表格视图的 Interface\
  \ Builder 输出口，并将其命名为 `tableView`。\n\n`BRHomeViewController.h` 现在应如下所示：\n\n```\n\
  #import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface BRHomeViewController\
  \ : BRCoreViewController\n\n-(IBAction)unwindBackToHomeViewController:(UIStoryboardSegue\
  \ *)segue;\n@property (weak, nonatomic) IBOutlet UITableView *tableView;\n\n@end\n\
  ```\n\n### 表格数据源与委托协议\n\n在第 4 章中，我们首次学习了警告视图组件（`UIAlertView`），并了解到为了捕获 Alert 按钮的点击事件，需要让视图控制器订阅为其委托。同样的委托模式也适用于表格视图，只是表格视图拥有两种类型的委托：一种用于控制器，另一种用于数据模型。\n\
  \n我们将把表格视图的视图控制器同时设置为数据源和委托。为此，我们必须在 `BRHomeViewController.h` 头文件中指明该类将遵循 `UITableViewDataSource`\
  \ 和 `UITableViewDelegate` 两个协议。通过添加委托和数据源实现声明来修改头文件：\n\n`@interface BRHomeViewController\
  \ : BRCoreViewController <UITableViewDelegate, UITableViewDataSource>`\n\n接下来，我们需要将表格视图的委托和\
  \ `dataSource` 输出口分配给 `BRBirthdayTableViewController`。我们将通过 Storyboard 来操作：按住 Control\
  \ 键从表格视图拖拽至视图下方栏中的视图控制器对象，系统会提示你选择 `dataSource` 或 delegate 属性。将两者都分配给 Home 视图控制器（如下图所示）。\n\
  \n![Image](img/9781430243748_Fig07-06.jpg)\n\n**图 7-6.** 将表格视图的 `dataSource` 和 delegate\
  \ 设置为 `BRHomeViewController`\n\n表格视图的已分配 `dataSource` 对象必须实现 `UITableViewDataSource`\
  \ 协议。当表格视图加载时，它会向 `dataSource` 请求表格的分区数量以及每个分区中的行数。指定的 `dataSource` 对象还会根据表格视图的请求生成\
  \ `UITableViewCell` 实例。`UITableViewDataSource` 协议有两个必需的方法签名，如果你未实现它们，编译器会发出警告：\n\
  \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section;\n\
  - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath;\n```\n\n因此，我们最好将这些方法添加到 `BRHomeViewController` 的源实现中：\n\n```\n#pragma\
  \ mark UITableViewDataSource\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\
  \ cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    UITableViewCell *cell =\
  \ [self.tableView dequeueReusableCellWithIdentifier:@\"Cell\"];\n    return cell;\n\
  }\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return 100;\n}\n```\n\n你是否注意到我们是如何引用 `Cell` 重用标识符，从 Storyboard 中获取表格单元格原型的可重用实例的？表格视图直接管理重用过程：一旦表格单元格滚动到可见视图之外，它就会被添加到单元格的重用堆栈中，并在我们调用\
  \ `dequeueReusableCellWithIdentifier:` 时由表格视图返回。\n\n我们对 `tableView:numberOfRowsInSection:`\
  \ 的实现返回了一个整数 100。我们让表格视图知道表格中应该有 100 行。\n\n构建并运行你的应用。你应该会看到大量的表格行，采用我们之前设置的副标题样式（如下图所示）。\n\
  \n![Image](img/9781430243748_Fig07-07.jpg)\n\n**图 7-7.** 一百个表格行！\n\n如果你在模拟器或设备上选中任意表格行，会发现选中的行会变为蓝色并保持选中状态。我们将通过在\
  \ Home 视图控制器中实现一个 `UITableViewDelegate` 方法来修改选中处理逻辑：\n\n```\n#pragma mark UITableViewDelegate\n\
  \n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    [self.tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
  }\n```\n\n现在运行应用时，你会发现这些行在触摸时会优雅地淡出，表明用户交互已被识别。\n\n我们的 *Birthday Reminder* 单元格的行高为\
  \ 72 点。表格单元格的默认高度仅为 44 点。选中表格视图后，我们可以在 Storyboard 中使用尺寸检查器，将行高增加至 72 来修改单元格高度（如下图所示）。\n\
  \n![Image](img/9781430243748_Fig07-08.jpg)\n\n**图 7-8.** 修改表格视图的默认行高\n\n*注意：表格视图也支持可变行高。你可以通过实现\
  \ `UITableViewDelegate` 协议的 `tableView:heightForRowAtIndexPath` 方法来确定各个行的行高。*\n\n\
  我认为我们需要从 `birthdays.plist` 中加载一些真实数据。让我们开始着手将动态数据加载到表格中吧。\n\n\n\n### 使用数组和 plist\
  \ 填充表格视图\n\n我们在本章开始时添加到项目中的 `birthdays.plist` 文件包含一个由十个名人生日字典组成的数组。Plist（或称*属性列表*）是遵循某种格式的\
  \ XML 文件，Objective-C 可以理解该格式并将其转换为原生对象：数组、字典、数字、字符串等等。\n\n*提示：您可以通过“文件  → 新建  →\
  \ 文件”来创建自己的 `plist`。从资源模板中选择“属性列表”选项。*\n\n当我们的主页视图控制器实例化时，我们将从 `birthdays.plist`\
  \ 加载数据，创建一个生日字典数组。在 `BRHomeViewController.m` 的私有接口中声明一个新的 `birthdays` 数组属性：\n\n\
  ```\n@interface BRHomeViewController()\n@property (nonatomic,strong) NSMutableArray\
  \ *birthdays;\n@end\n```\n\n现在来实例化我们的 `birthdays` 数组。正如我们在第 5 章中学到的，从故事板实例化的视图控制器有一个指定的初始化方法\
  \ `initWithCoder:`。因此，我们将重写该指定初始化方法来生成新数组：\n\n```\n- (id) initWithCoder:(NSCoder\
  \ *)aDecoder\n{\n    self = [super initWithCoder:aDecoder];\n\n    if (self) {\n\
  \        NSString* plistPath = [[NSBundle mainBundle] pathForResource:@\"birthdays\"\
  \ ofType:@\"plist\"];\n        NSArray *nonMutableBirthdays = [NSArray arrayWithContentsOfFile:plistPath];\n\
  \n        self.birthdays = [NSMutableArray array];\n\n        NSMutableDictionary\
  \ *birthday;\n        NSDictionary *dictionary;\n        NSString *name;\n     \
  \   NSString *pic;\n        UIImage *image;\n        NSDate *birthdate;\n\n    \
  \    for (int i=0;i<[nonMutableBirthdays count];i++) {\n            dictionary =\
  \ [nonMutableBirthdays objectAtIndex:i];\n            name = dictionary[@\"name\"\
  ];\n            pic = dictionary[@\"pic\"];\n            image = [UIImage imageNamed:pic];\n\
  \            birthdate = dictionary[@\"birthdate\"];\n            birthday = [NSMutableDictionary\
  \ dictionary];\n            birthday[@\"name\"] = name;\n            birthday[@\"\
  image\"] = image;\n            birthday[@\"birthdate\"] = birthdate;\n\n       \
  \     [self.birthdays addObject:birthday];\n        }\n    }\n\n    return self;\n\
  }\n```\n\n`birthdays.plist` 文件的根节点是一个数组：由字典对象组成的数组。`NSArray` 有一个便捷方法 `arrayWithContentsOfFile:`，它可以创建一个不可变数组，并从\
  \ `plist` 文件中填充不可变对象。但是，我们希望 `birthdays` 数组中的字典是可变的，因为我们后续将允许用户通过编辑生日视图来更改名人的姓名和照片。要将这些不可变字典变为可变，唯一的办法就是基于不可变版本创建新的可变版本。因此，我们遍历所有不可变字典，并创建新的可变生日字典：\n\
  \n```\nbirthday = [NSMutableDictionary dictionary];\nbirthday[@\"name\"] = name;\n\
  birthday[@\"image\"] = image;\nbirthday[@\"birthdate\"] = birthdate;\n[self.birthdays\
  \ addObject:birthday];\n```\n\n请注意，我们还根据从 `plist` 加载的每个生日字典中的 `pic` 字符串值，初始化了新的\
  \ `UIImage` 实例：\n\n```\npic = dictionary[@\"pic\"];\nimage = [UIImage imageNamed:pic];\n\
  ```\n\n最终得到的 `self.birthdays` 数组是可变的，其中包含可变的生日字典，这些字典拥有 `name`、`birthdate` 和 `image`\
  \ 属性，我们将用它们来填充表格视图中的每个单元格。\n\n检查你的应用能否正常编译和运行。如果 `plist` 数据加载和解析无误，就不应该出现任何错误或警告。\n\
  \n*注意：你的故事板可能会显示“生日详情场景不可达”的警告，我们稍后会修复这个问题。这不会影响项目的编译。*\n\n目前，我们告诉表格视图它包含 100 行。现在，将返回值修改为数组中生日的数量：\n\
  \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return [self.birthdays count];\n}\n```\n\n现在来填充表格视图单元格。每当表格视图从其数据源（我们的主页视图控制器）请求一个表格视图单元格实例时，它都会传入一个对自身和单元格索引路径的引用。一个索引路径包含两个值：*section（分区）*和*row（行）*。在本例中，行值等同于\
  \ `birthdays` 数组中生日对象的索引。在我们的应用中，分区值始终为 0，因为我们只实现一个分区的表格视图。\n\n以下是主页视图控制器中 `tableView:cellForRowAtIndexPath:`\
  \ 的新实现：\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\n\
  *)indexPath\n{\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
  Cell\"];\n\n    NSMutableDictionary *birthday = self.birthdays[indexPath.row];\n\
  \n    NSString *name = birthday[@\"name\"];\n    NSDate *birthdate = birthday[@\"\
  birthdate\"];\n    UIImage *image = birthday[@\"image\"];\n\n    cell.textLabel.text\
  \ = name;\n    cell.detailTextLabel.text = birthdate.description;\n    cell.imageView.image\
  \ = image;\n\n    return cell;\n}\n```\n\n利用 `indexPath.row` 值，我们可以获取与所请求的表格单元格行相关联的可变生日字典。表格视图单元格（`UITableViewCell`）有两个默认的标签属性：`textLabel`\
  \ 和 `detailTextLabel`，我们分别用 `name` 和 `birthdate` 字符串值来填充它们。表格视图单元格还包含一个图像视图属性（`imageView`），我们将其设置为生日字典中存储的图像（`UIImage`）属性的值。\n\
  \n构建并运行。你应该会看到填充了名人数据的表格视图，如图 7-9 所示。\n\n![Image](img/9781430243748_Fig07-09.jpg)\n\
  \n**图 7-9.** 我们的第一个动态生成数据的表格视图！\n\n\n\n### 使用 Segue 传递数据\n\n我们的下一个挑战是，当点击某个名人生日的单元格时，将`生日详情`视图控制器推送到主导航控制器上。有两种典型方式可以实现这一点。一种方法是在`tableView:didSelectRowAtIndexPath:`方法中扩展代码，创建一个新的视图控制器实例，然后将其推送到包含`主页`视图控制器的导航控制器上：\n\
  \n```\n[self.navigationController pushViewController:myViewControllerInstance animated:YES];\n\
  ```\n\n然而，我们将坚持使用在第 5 章中学到的更直观的方法：通过故事板 Segue 推送视图控制器。从`主页`视图控制器中的原型表格单元格按住 Control\
  \ 键拖动到`生日详情`视图控制器，然后释放并选择*推送* Segue 选项（参见图 7-10）。\n\n![图片](img/9781430243748_Fig07-10.jpg)\n\
  \n**图 7-10.** 从原型表格单元格创建推送 Segue\n\nXcode 会创建新的推送 Segue，并为我们之前在第 5 章中设置的`生日详情`视图控制器重新应用推断出的导航栏。现在，当原型表格单元格的任何实例被选中时，它都会将我们的`生日详情`视图控制器推送到导航栈中。\n\
  \n在`生日详情`视图控制器中添加一个新的图像视图（`UIImageView`）实例，将其位置设为 x=10, y=20，大小设为 71x71 点。保持新图像视图的选中状态，使用属性检查器，将视图模式更改为“Aspect\
  \ Fill”，并开启“Clip Subviews”（剪裁子视图），如图 7-11 所示。这样，当为该图像视图分配图片时，会得到一个裁剪工整的正方形缩略图，就像我们在第\
  \ 6 章中为编辑生日视图实现的那样。\n\n![图片](img/9781430243748_Fig07-11.jpg)\n\n**图 7-11.** 在生日详情视图中添加并配置用于显示正方形缩略图的图像视图\n\
  \n继续使用故事板，并借助助理编辑器布局，从新的图像视图按住 Control 键拖动，在`BRBirthdayDetailViewController.h`头文件中创建一个名为`photoView`的新输出口：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface\
  \ BRBirthdayDetailViewController : BRCoreViewController\n\n@property (weak, nonatomic)\
  \ IBOutlet UIImageView *photoView;\n\n@end\n```\n\n我们还要给`生日详情`视图控制器添加一个新的可变生日字典属性。当用户点击表格视图中的某个生日时，该属性由`主页`视图控制器进行设置。更新`BRBirthdayDetailViewController.h`，添加新的可变字典属性：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"BRCoreViewController.h\"\n\n@interface\
  \ BRBirthdayDetailViewController : BRCoreViewController\n\n@property(nonatomic,strong)\
  \ NSMutableDictionary *birthday;\n@property (weak, nonatomic) IBOutlet UIImageView\
  \ *photoView;\n\n@end\n```\n\n现在切换到`BRBirthdayDetailViewController.m`源码，扩展`BRBirthdayDetailViewController.m`中现有的`viewWillAppear:`方法，使其在每次详情视图出现时读取并渲染新生日字典属性的详细信息：\n\
  \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    NSLog(@\"viewWillAppear\");\n    NSString *name = self.birthday[@\"name\"];\n\
  \    self.title = name;\n    UIImage *image = self.birthday[@\"image\"];\n    if\
  \ (image == nil) {\n        //如果生日图片不存在，默认使用生日蛋糕图片\n        self.photoView.image\
  \ = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n    }\n    else {\n     \
  \   self.photoView.image = image;\n    }\n}\n```\n\n设置视图控制器的`title`属性，当视图控制器在导航控制器内显示时，会更新导航栏上居中的文本。我们还会将新图像视图的图片值设为生日字典中包含的图片，如果没有图片，则回退使用蛋糕图片。\n\
  \n至此，我们已经完成了`生日详情`视图接收数据的准备工作。现在，我们把注意力转回`主页`视图控制器，并编写代码，以便在通过 Segue 转换将选中的生日字典推送到导航栈时，将其传递给`生日详情`视图控制器。\n\
  \n\n\n### 理解 Segue 标识符\n\n除了视图生命周期方法（`viewDidLoad`、`viewWillAppear:` 等）之外，Apple\
  \ 的 `UIViewController` 类的子类还可以重写与转场过渡（segue）相关的回调方法。这正是我们接下来要做的事情——在 Home 视图控制器类中重写\
  \ `prepareForSegue:sender:` 方法。将以下新代码添加到 `BRHomeViewController.m` 的实现中：\n\n```\n\
  #pragma mark 转场\n\n-(void) prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n\
  {\n    NSLog(@\"prepareForSegue!\");\n}\n```\n\n如果你构建并运行这个应用，每次从主屏幕选择一个名人的生日时，都会看到新添加的日志语句\
  \ `prepareForSegue!` 出现；也就是说，正好在调用转场过渡的时刻。\n\n在 `prepareForSegue:sender:` 方法中，我们获得了一个指向\
  \ storyboard 中添加的转场（segue）的引用。然而，我们添加到 `prepareForSegue:sender:` 中的任何代码都会在 *任意*\
  \ 从主屏幕到其他屏幕的转场过渡中被调用——例如我们的添加生日转场！我们需要能够识别当前正在执行的是哪个转场过渡，并据此确定将要过渡到屏幕上的视图控制器以及如何处理该事件。\n\
  \n在你的 storyboard 中，选择连接 Home 视图控制器到 Birthday Detail 视图控制器的转场，使用属性检查器为该转场添加一个字符串标识符。将转场标识符命名为\
  \ `BirthdayDetail`（请参见 图 7-12）。\n\n![图片](img/9781430243748_Fig07-12.jpg)\n\n**图\
  \ 7-12.** 添加转场标识符\n\n现在我们有了一个方法来识别哪个视图控制器正在被推入或呈现，我们可以扩展 `BRHomeViewController.m`\
  \ 实现中的 `prepareForSegue:sender:` 方法：\n\n```\n-(void) prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender\n{\n     //NSLog(@\"prepareForSegue!\");\n     NSString\
  \ *identifier = segue.identifier;\n\n     if ([identifier isEqualToString:@\"BirthdayDetail\"\
  ]) {\n         //首先获取数据\n         NSIndexPath *selectedIndexPath = self.tableView.indexPathForSelectedRow;\n\
  \         NSMutableDictionary *birthday = self.birthdays[selectedIndexPath.row];\n\
  \n         BRBirthdayDetailViewController *birthdayDetailViewController = segue.destinationViewController;\n\
  \         birthdayDetailViewController.birthday = birthday;\n\n     }\n}\n```\n\n\
  在我深入讲解这段代码的细节之前，你首先需要将 `BRBirthdayDetailViewController.h` 导入到 `BRHomeViewController.m`\
  \ 中。滚动到 `BRHomeViewController.m` 源文件的顶部，并添加导入语句：\n\n```\n#import \"BRBirthdayDetailViewController.h\"\
  \n```\n\n探究 `prepareForSegue:sender:` 代码，我们的从主页到生日详情的转场有一个 `BirthdayDetail` 标识符。我们可以通过\
  \ `segue.identifier` 属性来检查并访问这个字符串。如果标识符匹配 `BirthdayDetail` 字符串，那么我们就知道当前的转场过渡发生在\
  \ Home 和 Birthday Detail 视图控制器之间，因此新的视图控制器必须是 `BRBirthdayDetailViewController` 的一个实例。\n\
  \n我们可以通过获取当前选中表格行的索引路径来抓取选中的生日字典：\n\n```\nNSIndexPath *selectedIndexPath = self.tableView.indexPathForSelectedRow;\n\
  ```\n\n从选中的索引路径中，我们可以提取 `row` 属性，该属性对应于 `self.birthdays` 数组中相关生日字典的索引。\n\n转场还通过其\
  \ `destinationViewController` 属性暴露了一个指向 Birthday Detail 视图控制器的引用。\n\n最后，我们设置详情视图控制器的\
  \ `birthday` 字典属性：\n\n```\nBRBirthdayDetailViewController *birthdayDetailViewController\
  \ = segue.destinationViewController;\nbirthdayDetailViewController.birthday = birthday;\n\
  ```\n\n这段代码在 Birthday Detail 视图控制器被添加到导航堆栈之前执行，因此当 `viewWillAppear:` 在详情视图控制器中被调用时，它已经可以访问\
  \ `birthday` 字典，并能够分别更新其标题和 `photoView` 图片属性。\n\n构建并运行。Birthday Detail 视图会更新，在其导航栏标题中显示选定的名人姓名，并在图片视图中显示图像（请参见\
  \ 图 7-13）。\n\n![图片](img/9781430243748_Fig07-13.jpg)\n\n**图 7-13.** 将数据传递到更新中的 Birthday\
  \ Detail 视图\n\n\n\n### 添加新生日\n\n在 Xcode 中打开 `BRBirthdayEditViewController.h` 头文件，然后像我们之前对生日详情视图控制器所做的那样，添加一个新的生日字典属性：\n\
  \n`@property (nonatomic, strong) NSMutableDictionary *birthday;`\n\n在 `BRBirthdayEditViewController.m`\
  \ 源文件中，修改 `viewWillAppear:` 的实现，使其根据 `birthday` 字典中的键值更新子视图：\n\n```\n-(void) viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n\n    NSString *name = self.birthday [@\"\
  name\"];\n    NSDate *birthdate = self.birthday[@\"birthdate\"];\n    UIImage *image\
  \ = self.birthday[@\"image\"];\n\n    self.nameTextField.text = name;\n    self.datePicker.date\
  \ = birthdate;\n    if (image == nil) {\n        //如果没有生日图片，默认使用生日蛋糕图片\n       \
  \ self.photoView.image = [UIImage imageNamed:@\"icon-birthday-cake.png\"];\n   \
  \ }\n    else {\n        self.photoView.image = image;\n    }\n\n    [self updateSaveButton];\n\
  }\n```\n\n回到故事板中，选择主页视图与编辑生日导航控制器之间的转场（segue），然后为其指定一个 `AddBirthday` 标识符。\n\n在 `BRHomeViewController.m`\
  \ 源文件中，首先导入 `BRBirthdayEditViewController.h`：\n\n`#import \"BRBirthdayEditViewController.h\"\
  `\n\n现在我们将完成 `prepareForSegue:sender:` 的实现，并处理当用户点击“添加生日”栏按钮项时所调用的转场：\n\n```\n-(void)\
  \ prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n{\n    NSString\
  \ *identifier = segue.identifier;\n\n    if ([identifier isEqualToString:@\"BirthdayDetail\"\
  ]) {\n        //首先获取数据\n        NSIndexPath *selectedIndexPath = self.tableView.indexPathForSelectedRow;\n\
  \        NSMutableDictionary *birthday = self.birthdays[selectedIndexPath.row];\n\
  \n        BRBirthdayDetailViewController *birthdayDetailViewController = segue.destinationViewController;\n\
  \        birthdayDetailViewController.birthday = birthday;\n    }\n    else if ([identifier\
  \ isEqualToString:@\"AddBirthday\"]) {\n        //向生日数组添加一个新的生日字典\n\n        NSMutableDictionary\
  \ *birthday = [NSMutableDictionary dictionary];\n\n        birthday[@\"name\"] =\
  \ @\"我的朋友\";\n        birthday[@\"birthdate\"] = [NSDate date];\n        [self.birthdays\
  \ addObject:birthday];\n\n        UINavigationController *navigationController =\
  \ segue.destinationViewController;\n\n        BRBirthdayEditViewController *birthdayEditViewController\
  \ = (BRBirthdayEditViewController *)\nnavigationController.topViewController;\n\
  \        birthdayEditViewController.birthday = birthday;\n    }\n}\n```\n\n当用户从主页视图控制器点击“添加生日”并且我们的\
  \ `prepareForSegue:sender:` 方法被调用时，我们会立即创建一个新的可变生日字典，为其分配默认的名称和生日日期值，并将其添加到 `self.birthdays`\
  \ 数组中：\n\n```\nNSMutableDictionary *birthday = [NSMutableDictionary dictionary];\n\
  \nbirthday[@\"name\"] = @\"我的朋友\";\nbirthday[@\"birthdate\"] = [NSDate date];\n\
  [self.birthdays addObject:birthday];\n```\n\n由于我们的“编辑生日”视图控制器是一个以模态方式呈现的导航视图控制器的子控制器，因此转场的\
  \ `destinationViewController` 属性就是该导航控制器。通过该导航控制器的引用，我们还可以获取对编辑生日视图控制器的引用，并最终在编辑视图控制器上设置新的生日属性：\n\
  \n```\nBRBirthdayEditViewController *birthdayEditViewController = (BRBirthdayEditViewController\
  \ *)\nnavigationController.topViewController;\nbirthdayEditViewController.birthday\
  \ = birthday;\n```\n\n尽管我们已经修改了模型（生日数组），但主页视图控制器中的表格视图并不会自动刷新。由于我们通过主页视图控制器持有了表格视图的出口引用，因此修复起来很容易。在\
  \ `BRHomeViewController.m` 源文件中，重写 `viewWillAppear:` 以确保每次主页视图控制器即将出现时表格视图都会重新加载：\n\
  \n```\n-(void) viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    [self.tableView reloadData];\n}\n```\n\n构建并运行。现在你可以添加生日了（参见图 7-14）！\n\n![图片](img/9781430243748_Fig07-14.jpg)\n\
  \n**图 7-14.** 添加朋友和生日！\n\n好吧，你现在可以多次添加名为“我的朋友”的人，但仅此而已！我们稍后会对此进行改进。\n\n请注意，在当前实现中，“保存”和“取消”按钮的功能完全相同：什么都不做！新的生日字典由主页视图控制器创建并添加到\
  \ `birthdays` 数组中。\n\n为了实现“取消”功能，我们可以考虑两种方案：\n\n> *   将生日数组以及选中的 `birthday` 字典都传递给编辑视图控制器，并设置\
  \ `cancelAndDismiss:` 方法从数组中删除该生日对象：`[self.birthdays removeObject:self.birthday]`。\n\
  > *   为生日编辑创建你自己的委托协议，让主页视图控制器成为编辑生日视图控制器的委托，并在主页视图控制器的代码中，响应委托回调方法，将生日字典从 `birthdays`\
  \ 数组中移除。\n\n不过，我们不会在本章中实现“取消”和“保存”按钮，因为这些功能将在下一章中结合 Core Data 来实现。\n\n\n#### 编辑现有生日\n\
  \n在故事板中，找到`Birthday Detail`和`Edit Birthday`视图控制器之间的转场，并将其标识符设置为`EditBirthday`。正如我们为`Home`视图控制器所做的那样，现在将在`BRBirthdayDetailViewController.m`源文件中实现`prepareForSegue:sender:`方法。首先，导入`BRBirthdayEditViewController.h`：\n\
  \n```\n#import \"BRBirthdayEditViewController.h\"\n```\n\n然后添加自定义的`prepareForSegue:sender:`方法：\n\
  \n```\n-(void) prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n{\n\
  \    NSString *identifier = segue.identifier;\n\n    if ([identifier isEqualToString:@\"\
  EditBirthday\"]) {\n        //编辑此生日\n        UINavigationController *navigationController\
  \ = segue.destinationViewController;\n\n        BRBirthdayEditViewController *birthdayEditViewController\
  \ =\n(BRBirthdayEditViewController *) navigationController.topViewController;\n\
  \        birthdayEditViewController.birthday = self.birthday;\n    }\n}\n```\n\n\
  我们将`Birthday Detail`视图控制器中对`birthday`字典的引用传递给`Edit Birthday`视图控制器。其余代码应该看起来很熟悉！\n\
  \n构建并运行。现在你可以选择名人生日，在`Birthday Detail`视图控制器中显示它们，然后点击编辑按钮，将选中的生日传递并显示在`Edit Birthday`视图控制器中。\n\
  \n我们最后的挑战是，通过`Edit Birthday`视图控制器更新应用中传递的可变生日字典。\n\n重新打开`BRBirthdayEditViewController.m`源文件。首先更新名称文本字段和日期选择器交互的目标-动作处理器：\n\
  \n```\n- (IBAction)didChangeNameText:(id)sender {\n    NSLog(@\"The text was changed:\
  \ %@\",self.nameTextField.text);\n    self.birthday[@\"name\"] = self.nameTextField.text;\n\
  \    [self updateSaveButton];\n}\n```\n\n以及……\n\n```\n- (IBAction)didChangeDatePicker:(id)sender\
  \ {\n    NSLog(@\"New Birthdate Selected: %@\",self.datePicker.date);\n    self.birthday[@\"\
  birthdate\"] = self.datePicker.date;\n}\n```\n\n每当用户编辑生日名称文本字段时，我们都会更新所引用生日字典的`name`键值。同样，如果用户在日期选择器中更改了所选日期，我们也会更新`birthdate`。\n\
  \n最后，我们还将允许用户更改生日字典中存储的照片图像：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
  \ *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary *)info {\n\n    [picker\
  \ dismissViewControllerAnimated:YES completion:nil];\n\n    UIImage *image = info[UIImagePickerControllerOriginalImage];\n\
  \n    self.photoView.image = image;\n\n    self.birthday[@\"image\"] = image;\n\
  }\n```\n\n构建并运行。\n\n现在你可以添加新的生日，并设置名称、出生日期和照片。你甚至可以编辑现有的名人生日（参见图 7-15）！\n\n![Image](img/9781430243748_Fig07-15.jpg)\n\
  \n**图 7-15.** 这张图哪里不对劲？！\n\n### 总结\n\n在本章中，我们学习了如何处理基本的表视图和表视图单元格。我们发现了如何使用自定义字典对象数组动态填充表视图是多么容易。\n\
  \n我们还学习了如何允许一个视图控制器修改另一个视图控制器也引用的数据，并在`viewWillAppear:`被调用时（就在视图控制器被你的应用呈现之前）刷新显示。\n\
  \n我们学习了如何接入视图控制器子类的`prepareForSegue:sender:`方法，并在视图控制器之间传递数据对象。\n\n你可能已经注意到我们的应用有一个显著的缺陷：会话之间没有任何数据是持久的。一旦你重新运行应用，它会重新加载`birthdays.plist`并清除所有数据修改。别担心，年轻的丹尼尔桑。接下来，我们将解锁\
  \ Core Data 持久化的奥秘。![Image](img/smiley.jpg)\n\n![Image](img/ch.jpg)\n\n## 第 8 章\n\
  \n## **使用 Core Data 实现数据持久化**\n\n继续我们的数据发现之旅，你将学习如何使用 Core Data 构建数据存储解决方案：Apple\
  \ 用于将数据持久化到文件系统的强大框架。当你读完本章时，你的应用将能够使用 Core Data 将生日对象读写到磁盘。即使你的应用因任何原因关闭，生日对象也会保持可用。\n\
  \nCore Data 为你许多喜爱的应用提供数据管理支持，从 Twitter 和 Instagram 到 Apple 的邮件和日历应用。这些应用让你即使 iPhone\
  \ 离线也能查看数据：日历中的日记条目、最近收到的电子邮件、之前下载的推文。让你的应用能够存储数据以供离线使用，可以极大地改善用户体验，实现快速数据访问，并且无需保持持久的互联网连接。\n\
  \n*Birthday Reminder*将向用户提供三种添加新生日的方式：从 Facebook 导入、从 iPhone 通讯录导入，或通过编辑生日视图控制器手动添加。一旦生日被导入，就不再需要访问其原始来源；换句话说，从\
  \ Facebook 导入的生日不需要我们的应用持续连接 Facebook，它将在我们的应用中独立持久化，即使我们的用户离线。\n\n尽管 Core Data\
  \ 的初始学习曲线相当陡峭，但我还是想在这本书中向你介绍它，因为一旦你掌握了基础知识，它就会为你的应用中的持久数据管理带来各种可能性。我们为*Birthday\
  \ Reminder*编写的代码只是触及了 Core Data 的皮毛，使我们的应用能够读取、写入和更新包含文本、数字、日期和二进制（图像缩略图）属性的生日模型对象。然而，如果你未来的应用需要更复杂的数据模型，请放心，Core\
  \ Data 将成为你最好的朋友，并且你将拥有可以继续构建的基础知识。\n\n### Core Data 简介\n\nCore Data 是 Apple 为本地数据存储提供的对象关系映射（ORM）解决方案。这意味着，作为\
  \ Cocoa 开发者，我们可以用我们的原生编程语言 Objective-C 生成和操作数据对象。然后 Core Data 负责将这些数据对象和关系转换为可以保存到磁盘的另一种形式。默认情况下，Core\
  \ Data 的底层存储是一个 SQLite 数据库。然而，我们的应用永远不需要直接连接到底层数据库。Core Data 充当通往文件存储系统的网关，并包含我们的应用程序代码为了创建、编辑和删除模型类实例以及保存持久更改而需要访问的管理和模型类。\n\
  \n为了向你介绍 Core Data，让我们从 Apple 的项目模板开始创建一个示例项目。\n\n\n### 创建 Core Data 应用程序\n\nApple\
  \ 在其许多 Xcode 模板中将 Core Data 作为一个选项提供，现在让我们来查看一个模板。启动 Xcode，并基于 Master-Detail 模板创建一个新的\
  \ iPhone 项目，如 图 8-1 所示。\n\n![Image](img/9781430243748_Fig08-01.jpg)\n\n**图 8-1.**\
  \ 新的 Master-Detail Core Data 示例项目选项\n\n将项目命名为 `CoreDataExample`，并确保选中“使用 Core Data”选项。在模拟器中构建并运行新项目。点击“添加”按钮几次，然后点击“编辑”按钮；您应该会看到类似\
  \ 图 8-2 的结果。\n\n![Image](img/9781430243748_Fig08-02.jpg)\n\n**图 8-2.** 正在运行的 Master-Detail\
  \ Core Data 项目\n\n如 图 8-2 所示，从使用 Core Data 的 Master-Detail 模板生成的 iPhone 应用程序允许用户创建、查看和删除包含时间戳属性的数据模型对象。重新构建并运行该应用程序。您会发现数据模型对象仍然显示；它们是持久的，并且已通过\
  \ Core Data 的神奇功能保存到了磁盘。然而，更重要的是，我们需要对 Core Data 的工作原理以及这种神奇功能背后的机制有更多了解。\n\n###\
  \ 持久化存储\n\n在底层，Core Data 会将所有保存的数据更改翻译并存储到*持久化存储*中。持久化存储可以设置为以下三种存储类型之一：\n\n> *\
  \   *内存存储* (`NSInMemoryStoreType`)：如果应用程序被强制退出，这种存储类型实际上并不持久。它通常用于数据对象的运行时缓存。\n\
  > *   *平面二进制文件* (`NSBinaryStoreType`)：在某些情况下，使用平面二进制文件可能会提高数据检索的性能；但缺点是随着存储数据的增长，二进制文件的大小和初始加载时间也会增加。\n\
  > *   *SQLite 数据库* (`NSSQLiteStoreType`)：这是 Core Data 驱动的应用程序中最常见的存储类型，也是 Apple\
  \ 项目模板使用的默认类型。\n\n我们将选择 SQLite 数据库存储类型。这应确保我们的应用程序在处理大型数据集时保持可扩展性。我通常建议在大多数基于 Core\
  \ Data 的应用程序中坚持使用这个默认选择。\n\n在运行时，初始化一个 Core Data 驱动的应用程序涉及创建一个持久化存储协调器实例 (`NSPersistentStoreCoordinator`)，以建立\
  \ Core Data 与持久化存储的连接。\n\n让我们快速查看 `CoreDataExample` 项目中 `AppDelegate.m` 文件里的这段代码：\n\
  \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{\n    if (_persistentStoreCoordinator\
  \ != nil) {\n        return _persistentStoreCoordinator;\n    }\n\n    NSURL *storeURL\
  \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"CoreDataExample.sqlite\"\
  ];\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n    if (![_persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL options:nil\
  \ error:&error]) {\n        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \        abort();\n    }    \n\n    return _persistentStoreCoordinator;\n}\n```\n\
  \n在高亮代码中，您可以看到我们定义了一个指向 SQLite 数据库文件的本地 URL。同时，我们还将实例化的持久化存储协调器连接到持久化存储，并传入 `NSSQLiteStoreType`\
  \ 作为存储类型。这些是我们对底层数据库进行的唯一引用：其余工作将由 Core Data 处理。Core Data 会在指定位置创建 SQLite 数据库（如果它在之前的会话中尚未创建），并为我们管理该数据库。将来，如果我们的数据模型发生变化并需要迁移，在大多数情况下，Core\
  \ Data 可以自动为我们更新和修改数据库。\n\n*注意：我建议研究用于初始化持久化存储协调器的 Core Data 迁移选项。通过对大多数项目启用轻量级迁移，您将确保将来对数据模型所做的更改能由\
  \ Core Data 自动迁移。*\n\n您可能还注意到，在前面的代码中，持久化存储协调器是使用对*托管对象模型*的引用进行实例化的，该模型是您的自定义模型对象图：模型中每个数据对象的定义、每个对象的属性以及对象之间的关系。但这些对象到底是什么呢？\n\
  \n### 实体与托管对象\n\n在 Core Data 中，被创建、编辑和修改的原生 Objective-C 数据对象由称为*实体*的类描述来定义。根据这些实体描述，Core\
  \ Data 会生成称为*托管对象*的对象实例，这些实例可以包含字符串、数字和日期等属性类型。托管对象还可以与模型中的其他托管对象建立关系。所有托管对象要么是\
  \ `NSManagedObject` 类的实例，要么是其子类。\n\n我们使用键值方法来访问托管对象的属性。深入查看 `MasterViewController.m`\
  \ 源文件，我们可以看到如何设置托管对象属性：\n\n```\n[newManagedObject setValue:[NSDate date] forKey:@\"\
  timeStamp\"];\n```\n\n以及如何检索托管对象属性的值：\n\n```\n[object valueForKey:@\"timeStamp\"\
  ];\n```\n\n正如我们将在本章后面发现的，我们还可以对 `NSManagedObject` 进行子类化，这是键值编码的升级，因为它使我们能够对属性进行强类型化。\n\
  \n但是，我们如何定义实体并创建托管对象呢？Xcode 包含一个面向开发者的 UML 建模工具，接下来我们将介绍它。\n\n### Core Data 模型文件\n\
  \n让我们更仔细地查看来自 Master-Detail 项目模板的 Core Data 模型。模型文件将与项目同名，因此在项目导航器中选择 `CoreDataExample.xcdatamodeld`（参见\
  \ 图 8-3）。\n\n![Image](img/9781430243748_Fig08-03.jpg)\n\n**图 8-3.** 一个基本的 Core Data\
  \ 模型\n\n在 图 8-3 中，您可以看到我让实用工具面板保持打开，因为当处理 Core Data 模型文件时，它包含数据模型检查器，这样我们就可以根据主编辑器面板中的选择来查看实体和属性的详细信息。您可以切换数据模型的\
  \ UML 图形化显示和表格化显示，如 图 8-4 所示。\n\n![Image](img/9781430243748_Fig08-04.jpg)\n\n**图\
  \ 8-4.** 使用表格式编辑器查看数据模型\n\n如 图 8-3 和 8-4 所示，我们的模型只有一个名为 `Event` 的实体。`Event` 实体有一个名为\
  \ `timeStamp` 的属性。在 图 8-3 中，选中 `Event` 实体后，我们可以看到基于该实体的托管对象将自动分配给默认的 `NSManagedObject`\
  \ 类。\n\n在 图 8-4 中，使用表格式编辑器选项查看数据模型时，我选中了 `Event` 实体，编辑器列出了 `Event` 实体的属性（类似于属性）。在\
  \ Apple 的示例项目中，`Event` 只有一个属性：`timeStamp`。在编辑器中选择 `timeStamp` 还会显示该实体属性的详细信息：它是一个可选的属性，数据类型为\
  \ `NSDate`。因此，每次点击“添加”按钮时，主视图控制器都会创建一个新的 `Event` 实例，并将其 `timeStamp` 值设置为当前日期。然后它会保存\
  \ Core Data 上下文。\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照注意事项和示例格式，将您提供的英文文本翻译成中文。\n\n\n####\
  \ 初始化 Core Data 模型\n\n总结来说，Core Data 堆栈的结构可以如图 8-5 所示。\n\n![Image](img/9781430243748_Fig08-05.jpg)\n\
  \n**图 8-5.** Core Data 堆栈的结构\n\n在堆栈的底部是持久化存储区（默认为 SQLite 数据库）。我们将持久化存储区添加到持久化存储协调器中，该协调器通过一个托管对象模型进行初始化。这个托管对象模型基于我们刚刚在\
  \ Xcode 中看到的 `xcdatamodeld` 文件。最后，我们创建一个托管对象上下文（`NSManagedObjectContext`）实例，通过它我们既可以创建也可以访问应用中的托管对象实例。但什么是托管对象上下文呢？\n\
  \n一旦我们的 Core Data 模型在程序首次运行时初始化完毕，`NSManagedObjectContext` 将是唯一真正需要关心的类。添加、编辑和删除实体将直接通过托管对象上下文完成。\n\
  \n有点困惑吗？别担心，对于像 *Birthday Reminder* 这样相当简单的应用程序，用于初始化 Core Data 存储区和模型的代码几乎可以与你构建的每个应用完全相同。现在感觉好多了吗？很好！\n\
  \n#### 什么是托管对象上下文？\n\n*托管对象上下文* 是应用程序中所有 Core Data 对象及其相互关系的表示。尽管在 *Birthday Reminder*\
  \ 应用中我们只使用单个托管对象上下文，但在 iOS 应用中创建多个托管对象上下文的情况并不少见。多个托管对象上下文可以共享一个持久化存储区。但是，如果我们在一个托管对象上下文中对实体进行了更改，除非我们保存并合并上下文，否则这些更改不会反映在另一个上下文中。\n\
  \n通过 Core Data 模型中的单个托管对象上下文，我们将能够添加新实体、更改属性，并在需要时删除实体。当我们要将托管对象上下文的更改写入磁盘时，我们需要保存该上下文。\n\
  \n#### 添加、编辑、删除和保存实体\n\n在 Master-Detail 示例应用中，一旦 `AppDelegate` 初始化了模型、存储区和托管对象上下文，它就会将托管对象上下文的引用传递给主视图控制器：\n\
  \n`controller.managedObjectContext = self.managedObjectContext;`\n\n现在，主视图控制器可以通过其对托管对象上下文的引用来添加、编辑、删除和保存\
  \ Core Data 实体。\n\n为了理解添加、编辑、删除和保存 Core Data 实体所需的代码，我们可以将 Apple 主视图控制器中的大量代码简化为以下示例：\n\
  \n##### 添加\n\n```\nNSManagedObject *newManagedObject = [NSEntityDescription\ninsertNewObjectForEntityForName:@”Event”\
  \ inManagedObjectContext:self.managedObjectContext];\n```\n\n所有 Core Data 实体都是 `NSManagedObject`\
  \ 类的实例或子类实例。然而，与大多数其他 Objective-C 类不同，我们不会通过 `alloc init` 创建 `NSManagedObject` 的实例。取而代之，我们调用\
  \ `NSEntityDescription` 的类方法，并传入我们的实体名称和托管对象上下文的引用。\n\n##### 编辑\n\n默认情况下，在我们的 Core\
  \ Data 模型中定义的实体是 Apple 的 `NSManagedObject` 类的实例。为了设置属性，我们调用 `NSManagedObject` 的\
  \ `setValue:forKey:` 方法：\n\n```\n[aManagedObject setValue:[NSDate date] forKey:@\"\
  timeStamp\"];\n```\n\n然而，通过数据模型检查器，我们还可以为实体指定自定义值对象类，Xcode 可以构建这些类供我们的应用使用。这样做的好处是严格的数据类型化；因此前面的代码将变为：\n\
  \n```\naManagedObject.timeStamp = [NSDate date];\n```\n\n当我们在本章后面将一个新的 Core Data\
  \ 模型集成到 *Birthday Reminder* 应用中时，我们将学习更多关于自定义实体类的知识。\n\n##### 删除\n\n删除 Core Data\
  \ 实体非常简单：\n\n```\n[self.managedObjectContext deleteObject:aManagedObject];\n```\n\
  \n##### 保存\n\n当我们准备好让 Core Data 将更改写入磁盘（持久化存储区）时，我们在托管对象上下文上调用 `save:` 方法：\n\n```\n\
  NSError *error = nil;\n    if ([self.managedObjectContext hasChanges]) {\n        if\
  \ (![self.managedObjectContext save:&error]) {//保存失败\n            NSLog(@\"保存失败:\
  \ %@\",[error localizedDescription]);\n        }\n        else {\n            NSLog(@\"\
  保存成功\");\n        }\n    }\n```\n\n调用保存的时机示例包括用户点击编辑生日视图控制器中的保存按钮时，或者在我们完成导入一批生日之后。\n\
  \n### 在 Birthday Reminder 中实现 Core Data\n\n在我们开始在 *Birthday Reminder* 应用中实现 Core\
  \ Data 之前，我们需要将 Core Data 框架添加到项目的 target 中。target 是当我们构建项目时 Xcode 为我们编译生成的 iPhone\
  \ 应用程序。\n\n#### 添加 Core Data 框架\n\n要向我们的项目添加 Apple 框架，首先在项目导航器中选择 `BirthdayReminder`\
  \ 项目，然后选择 `BirthdayReminder` target，最后选择“构建阶段”选项卡，如图 8-6 所示。\n\n![Image](img/9781430243748_Fig08-06.jpg)\n\
  \n**图 8-6.** 准备添加新框架\n\n展开“将二进制文件与库链接”窗格，您将看到已链接到项目中的框架：`UIKit`、`Foundation` 和 `CoreGraphics`。要添加\
  \ Core Data，点击突出显示的 + 按钮，然后在模态窗口中双击列出的 `CoreData.framework`。太好了，Core Data 框架已添加！我们现在可以在应用中引用\
  \ Core Data 类。不过在此之前，有一种简单的方法可以为应用中的所有类导入 Core Data 框架头文件：在我们的项目前缀文件中定义导入声明。找到并在项目导航器中选择\
  \ `BirthdayReminder-Prefix.pch`。现在，在 `Foundation` 和 `UIKit` 导入声明旁边添加 Core Data 导入声明：\n\
  \n```\n#ifdef __OBJC__\n    #import <UIKit/UIKit.h>\n    #import <Foundation/Foundation.h>\n\
  #import <CoreData/CoreData.h>\n#endif\n```\n\n现在，我们将能够引用 Core Data 框架类，而无需重复导入主要的\
  \ Core Data 框架头文件。\n\n接下来，我们为应用创建一个 Core Data 模型。\n\n#### 创建 Core Data 模型\n\n到目前为止，我们主要关注应用的用户界面。现在将注意力转向黑暗的数据侧，让我们创建一个新文件夹来存储所有\
  \ Core Data 和模型类。在您的 *Birthday Reminder* 项目的根目录中添加一个名为 `data` 的新文件夹，然后将新 `data`\
  \ 文件夹作为新组添加到您的 Xcode 项目中（见图 8-7）。\n\n![Image](img/9781430243748_Fig08-07.jpg)\n\n\
  **图 8-7.** 添加到项目目录的新数据组\n\n在项目导航器中，选择新添加的 `data` 组，然后使用 ![Image](img/flower.jpg)N\
  \ 键盘快捷键或 文件 ![Image](img/U001.jpg) 新建 ![Image](img/U001.jpg) 文件，从 Core Data 文件模板中选择“数据模型”选项。将新的数据模型命名为\
  \ `BirthdayReminder.xcdatamodeld` 并点击“创建”按钮，如图 8-8 所示。\n\n![Image](img/9781430243748_Fig08-08.jpg)\n\
  \n**图 8-8.** 创建新的 Core Data 模型\n\n\n\n"
- "# 定义核心数据实体\n\n我们已经创建了一个 Core Data 模型文件。接下来，我们将在模型中创建一个生日实体。在项目导航器中选中新的 `BirthdayReminder.xcdatamodeld`\
  \ 文件，点击编辑器中的添加实体按钮，并将新实体命名为 `BRDBirthday`。\n\n现在选中新的 `BRDBirthday` 实体，我们将通过点击编辑器面板底部的添加属性按钮来添加第一个属性\
  \ `birthDay`，然后输入 `birthDay` 作为属性名称。选中新的 `birthDay` 属性后，确保工具面板已打开，如果当前不可见，请切换到数据模型检查器面板。然后将属性类型设置为\
  \ Integer 16（参见 图 8-9）。\n\n![图片](img/9781430243748_Fig08-09.jpg)\n\n**图 8-9.** 定义\
  \ Core Data 实体属性\n\n现在让我们为 `Birthday` 实体添加其余属性，如下所示。请务必注意大小写：\n\n- `addressBookID`\
  \ Integer 16\n- `birthDay` Integer 16\n- `birthMonth` Integer 16\n- `birthYear`\
  \ Integer 16\n- `facebookID` String\n- `imageData` Binary Data\n- `name` String\n\
  - `nextBirthday` Date\n- `nextBirthdayAge` Integer 16\n- `notes` String\n- `picURL`\
  \ String\n- `uid` String\n\n注意到我们也可以在 Core Data 实体属性中存储二进制数据了吗？这对于存储图像图标数据非常理想。`picURL`\
  \ 将专门用于 Facebook 生日的个人资料照片 URL。Facebook 用户会定期更换他们的个人资料照片，因此我们不会缓存他们的照片，而是确保定期下载最新的\
  \ Facebook 个人资料照片。\n\n我有意避免包含出生日期属性。正如我们明天将发现的，Facebook 和通讯录中的生日通常不包括出生年份，因此我们实际上并不总是知道生日的完整日期，在某些情况下只知道月份和日期。\n\
  \n现在选择 `BRDBirthday` 实体而不是它的属性。数据模型检查器应该会更新，并允许您修改 `BRDBirthday` 实体当前分配的默认 `NSManagedObject`\
  \ 类。将其更改为 `BRDBirthday`（参见 图 8-10）。\n\n![图片](img/9781430243748_Fig08-10.jpg)\n\n\
  **图 8-10.** 将 `BRDBirthday` 实体分配给 `BRDBirthday` 类\n\nXcode 将为我们生成一个名为 `BRDBirthday`\
  \ 的 `NSManagedObject` 子类，其中包含我们指定的所有生日属性。\n\n在项目导航器中选中 `data` 组，使用 ![图片](img/flower.jpg)\
  \ 键盘快捷键或通过 文件 ![图片](img/U001.jpg) 新建 ![图片](img/U001.jpg) 文件，并从 Core Data 集合中选择 `NSManagedObject`\
  \ 子类，开始为生日创建新的 `NSManagedObject` 子类的过程（参见 图 8-11）。\n\n![图片](img/9781430243748_Fig08-11.jpg)\n\
  \n**图 8-11.** 创建 `NSManagedObject` 子类\n\n在下一个对话框屏幕上，在 Finder 中选择 `data` 文件夹作为新类的目标位置。保持“为原始数据类型使用标量属性”选项未选中，然后点击创建。\n\
  \n查看 Xcode 为我们生成的 `BRDBirthday` 类。注意到我们所有的整数现在都是 `NSNumber` 对象而不是基本类型了吗？与字典和数组一样，Core\
  \ Data 不能使用基本类型作为属性；这就是为什么它们被包装在 `NSNumber` 实例中。\n\n#### 扩展实体\n\n将 `BRDBirthday`\
  \ 创建为 `NSManagedObject` 的子类还有额外的好处。我们可以直接向 `BRDBirthday` 子类添加新的方法和非持久化属性。我们存储中的生日将按照主视图控制器中下一个即将到来的生日顺序列出。我们已经在\
  \ `BRDBirthday` 上创建了属性来存储下一个生日日期和下一个生日年龄，但我们尚未设置它们的值。\n\n> **注意：** 向 `NSManagedObject`\
  \ 子类添加代码的一个注意事项是，如果您对 Core Data 模型做了更改，需要确保不会覆盖 Xcode 生成的实体类。您只需手动添加/删除对实体子类的更改。\n\
  \n打开 `BRDBirthday.h` 头文件，并添加以下新的公共方法和属性声明：\n\n```\n@property (nonatomic,readonly)\
  \ int remainingDaysUntilNextBirthday;\n@property (nonatomic,readonly) NSString *birthdayTextToDisplay;\n\
  @property (nonatomic,readonly) BOOL isBirthdayToday;\n\n-(void)updateNextBirthdayAndAge;\n\
  -(void)updateWithDefaults;\n```\n\n以下是对这些新属性和方法在 *Birthday Reminder* 中如何使用的简要说明：\n\
  \n- `remainingDaysUntilNextBirthday`：为用户提供每个朋友下一个生日前的天数倒计时。\n- `birthdayTextToDisplay`：人类可读的文本字符串，例如“还有\
  \ 44 天”或“5 月 26 日，34 岁”。\n- `isBirthdayToday`：如果今天是用户的生日，我们将显示生日蛋糕图像，而不是生日倒计时（参见\
  \ 第 9 章）。\n- `updateNextBirthdayAndAge`：我们将使用此方法来更新 `nextBirthday` 和 `nextBirthdayAge`。\n\
  - `updateWithDefaults`：当点击**添加生日**按钮时，我们将调用此方法来设置 `BRDBirthday` 实体所需的基本属性，即 `birthdayDay`\
  \ 和 `birthMonth`。\n\n切换到 `BRDBirthday.m` 源文件，让我们添加这些新实例方法和属性的实现：\n\n```\n-(void)updateNextBirthdayAndAge\n\
  {\n    NSDate *now = [NSDate date];\n\n    NSCalendar *calendar = [NSCalendar currentCalendar];\n\
  \n    NSDateComponents *dateComponents = [[NSCalendar currentCalendar]\ncomponents:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:now];\n    NSDate *today = [calendar dateFromComponents:dateComponents];\n\
  \n    dateComponents.day = [self.birthDay intValue];\n    dateComponents.month =\
  \ [self.birthMonth intValue];\n\n    NSDate *birthdayThisYear = [calendar dateFromComponents:dateComponents];\n\
  \n    if ([today compare:birthdayThisYear] == NSOrderedDescending) {\n        //今年的生日已过，所以下一个生日是明年\n\
  \        dateComponents.year++;\n        self.nextBirthday = [calendar dateFromComponents:dateComponents];\n\
  \    }\n    else {\n        self.nextBirthday = [birthdayThisYear copy];\n    }\n\
  \n    if ([self.birthYear intValue] > 0) {\n        self.nextBirthdayAge = [NSNumber\
  \ numberWithInt:dateComponents.year - [self.birthYear intValue]];\n    }\n    else\
  \ {\n        self.nextBirthdayAge = [NSNumber numberWithInt:0];\n    }\n\n}\n```\n\
  \n我们的代码假设 `BRDBirthday` 实例的 `birthDay` 和 `birthMonth` 属性始终被设置。这为我们提供了足够的信息来计算朋友今年的生日。我们使用当前日期创建一个\
  \ `NSDateComponents` 实例。这确保了 `NSDateComponents` 实例的年份属性自动设置为当前年份。然后，我们用朋友生日的日期和月份覆盖\
  \ `NSDateComponents` 的日期和月份属性。现在我们的 `NSDateComponents` 实例拥有了足够的数据来计算朋友今年生日的日期。根据\
  \ `birthdayThisYear` 的值，我们可以判断日期是否已过，并将 `BRDBirthday` 的 `nextBirthday` 值设置为朋友今年或明年的生日。\n\
  \n\n\n*注意：通过从 `NSDateComponents` 实例中提取 `nextBirthday`（我们已使用单位标志 `NSYearCalendarUnit`、`NSMonthCalendarUnit`\
  \ 和 `NSDayCalendarUnit` 初始化该实例），我们将获取一个对应于生日当天凌晨 00:00 的日期。理解这一点很重要，因为进行日期比较时，我们比较的是年中的天数，而非小时、分钟和秒。*\n\
  \n如果生日实体已设置出生年份，则将 `nextBirthdayAge` 设置为朋友的出生年份与其下一个生日（今年或明年）年份之间的差值。或者，如果朋友对其出生年份保密，则我们将\
  \ `nextBirthdayAge` 默认为 0。\n\n让我们来实现 `updateWithDefaults` 方法：\n\n```\n-(void) updateWithDefaults\n\
  {\n    NSDateComponents *dateComponents = [[NSCalendar currentCalendar]\ncomponents:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:[NSDate date]];\n\n    self.birthDay = @(dateComponents.day);\n    self.birthMonth\
  \ = @(dateComponents.month);\n    self.birthYear = @0;\n\n    [self updateNextBirthdayAndAge];\n\
  }\n```\n\n现在，我们来添加三个 `readonly` getter 方法：`remainingDaysUntilNextBirthday`、`birthdayTextToDisplay`\
  \ 和 `isBirthdayToday`：\n\n```\n-(int) remainingDaysUntilNextBirthday\n{\n    NSDate\
  \ *now = [NSDate date];\n    NSCalendar *calendar = [NSCalendar currentCalendar];\n\
      NSDateComponents *componentsToday = [calendar\ncomponents:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:now];\n    NSDate *today = [calendar dateFromComponents:componentsToday];\n\
  \n    NSTimeInterval timeDiffSecs = [self.nextBirthday timeIntervalSinceDate:today];\n\
  \n    int days = floor(timeDiffSecs/(60.f*60.f*24.f));\n\n    return days;\n}\n\n\
  -(BOOL) isBirthdayToday\n{\n    return [self remainingDaysUntilNextBirthday] ==\
  \ 0;\n}\n\n-(NSString *) birthdayTextToDisplay {\n\n    NSDate *now = [NSDate date];\n\
      NSCalendar *calendar = [NSCalendar currentCalendar];\n    NSDateComponents *componentsToday\
  \ = [calendar\ncomponents:NSYearCalendarUnit|NSMonthCalendarUnit|NSDayCalendarUnit\
  \ fromDate:now];\n    NSDate *today = [calendar dateFromComponents:componentsToday];\n\
  \n    NSDateComponents *components = [calendar components:NSMonthCalendarUnit|NSDayCalendarUnit\n\
  fromDate:today toDate:self.nextBirthday options:0];\n\n    if (components.month\
  \ == 0) {\n        if (components.day == 0) {\n            //今天！\n\n            if\
  \ ([self.nextBirthdayAge intValue] > 0) {\n                return [NSString stringWithFormat:@\"\
  %@ 今天！\",self.nextBirthdayAge];\n            }\n            else {\n                return\
  \ @\"今天！\";\n            }\n        }\n        if (components.day == 1) {\n            //明天！\n\
              if ([self.nextBirthdayAge intValue] > 0) {\n                return [NSString\
  \ stringWithFormat:@\"%@ 明天！\",self.nextBirthdayAge];\n            }\n            else\
  \ {\n                return @\"明天！\";\n            }\n        }\n    }\n\n    NSString\
  \ *text = @\"\";\n\n    if ([self.nextBirthdayAge intValue] > 0) {\n        text\
  \ = [NSString stringWithFormat:@\"%@ 在 \",self.nextBirthdayAge];\n    }\n\n    static\
  \ NSDateFormatter *dateFormatterPartial;\n\n    if (dateFormatterPartial == nil)\
  \ {\n        dateFormatterPartial = [[NSDateFormatter alloc] init];\n        [dateFormatterPartial\
  \ setDateFormat:@\"MMM d\"];\n    }\n\n    return [text stringByAppendingFormat:@\"\
  %@\",[dateFormatterPartial\nstringFromDate:self.nextBirthday]];\n}\n```\n\n你应该能够通读并理解\
  \ `remainingDaysUntilNextBirthday` 和 `isBirthdayToday` 方法的代码，但 `birthdayTextToDisplay`\
  \ 需要额外解释。其中最重要的代码行如下：\n\n```\nNSDateComponents *components = [calendar components:NSMonthCalendarUnit|NSDayCalendarUnit\n\
  fromDate:today toDate:self.nextBirthday options:0];\n```\n\n`NSDateComponents` 类也可用于计算两个日期之间的差值。通过使用\
  \ `NSMonthCalendarUnit` 和 `NSDayCalendarUnit` 单位标志初始化 `NSDateComponents` 实例，我们可以获取今天与朋友下一个生日之间的月数和天数。如果这两个值都等于\
  \ 0，那么朋友的生日必定是今天！或者，如果月份差值为 0 而天数为 1，则朋友的下一个生日就在一天后——也就是明天！\n\n请确保你的应用版本仍能正常编译。目前你在应用中还看不到任何差异，因为我们尚未将生日数组数据模型转换为新的\
  \ Core Data 存储模型。我们甚至还没有在代码中初始化 Core Data 模型。这正是我们的下一步任务。\n\n\n\n"
- "# 初始化 Core Data 数据模型\n\n在查看 Apple 的 Core Data 示例代码时，我们发现所有初始化代码都位于应用代理类中。不过，通常的做法是创建一个单例模型类，并在该单例实例中一次性完成\
  \ Core Data 模型的初始化。这样，项目中的任何类都可以通过模型单例直接访问托管对象上下文。\n\n让我们先创建一个单例模型类。在 `data` 组中新建一个\
  \ `NSObject` 的子类，并将类命名为 `BRDModel`。为了设置我们的单例类，我们将仅通过一个名为 `sharedInstance` 的类方法来提供对模型的访问。`BRDModel`\
  \ 的 `sharedInstance` 方法会创建 `BRDModel` 的唯一实例，如果实例已存在则直接返回。首先，在 `BRDModel.h` 中定义该类方法：\n\
  \n```\n#import <Foundation/Foundation.h>\n@interface BRDModel : NSObject\n\n+ (BRDModel*)sharedInstance;\n\
  \n@end\n```\n\n现在切换到 `BRDModel.m`，实现这个新的类方法：\n\n```\n#import \"BRDModel.h\"\n\n\
  @implementation BRDModel\n\nstatic BRDModel *_sharedInstance = nil;\n+ (BRDModel*)sharedInstance\n\
  {\n    if( !_sharedInstance ) {\n               _sharedInstance = [[BRDModel alloc]\
  \ init];\n}\n       return _sharedInstance;\n}\n\n@end\n```\n\n`sharedInstance`\
  \ 方法初始化了其自身类的一个实例。这是在 Objective-C 中实现单例的常用技术。每当我们需要在应用中访问模型时，只需引用 `[BRDModel sharedInstance]`\
  \ 即可。接下来，我们从本章前面创建的 Apple 自带的 Master-Detail 应用中获取 Core Data 初始化代码。找到 `AppDelegate.h`\
  \ 头文件，复制持久化存储协调器、托管对象模型和托管对象上下文的声明，并直接粘贴到 `BRDModel.h` 头文件中，如下所示：\n\n```\n#import\
  \ <Foundation/Foundation.h>\n\n@interface BRDModel : NSObject\n\n+ (BRDModel*)sharedInstance;\n\
  \n@property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
  @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
  @property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  \n@end\n```\n\n切换到 `BRDModel.m` 源文件，并像在 `AppDelegate.m` 源文件中一样，合成这三个新的 Core Data\
  \ 属性：\n\n```\n@implementation BRDModel\n\n@synthesize managedObjectContext = _managedObjectContext;\n\
  @synthesize managedObjectModel = _managedObjectModel;\n@synthesize persistentStoreCoordinator\
  \ = _persistentStoreCoordinator;\n```\n\n*注意：在此处我们手动添加了合成代码，以确保每个属性都指向一个带下划线的实例变量。Xcode\
  \ 的编译器不会为 `readonly` 属性自动执行此操作。*\n\n然后，从 Master-Detail 项目的 `AppDelegate.m` 中 Apple\
  \ 自带的代码里，复制三个 Core Data 访问器方法以及 `applicationDocumentsDirectory` 辅助私有方法的实现。如果愿意，可以移除注释，但更重要的是，将两处\
  \ `CoreDataExample` 字符串替换为我们 *Birthday Reminder* Core Data 模型的名称 `BirthdayReminder`，如下方高亮代码所示：\n\
  \n```\n- (NSManagedObjectContext *)managedObjectContext\n{\n    if (_managedObjectContext\
  \ != nil) {\n        return _managedObjectContext;\n    }\n\n    NSPersistentStoreCoordinator\
  \ *coordinator = [self persistentStoreCoordinator];\n    if (coordinator != nil)\
  \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n  \
  \      [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n    }\n\
  \    return _managedObjectContext;\n}\n\n// 返回应用的托管对象模型。\n// 如果模型不存在，则从应用的模型文件中创建。\n\
  - (NSManagedObjectModel *)managedObjectModel\n{\n    if (_managedObjectModel !=\
  \ nil) {\n        return _managedObjectModel;\n    }\n    NSURL *modelURL = [[NSBundle\
  \ mainBundle] URLForResource:@\"BirthdayReminder\"\n    withExtension:@\"momd\"\
  ];\n    _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n\
  \    return _managedObjectModel;\n}\n\n// 返回应用的持久化存储协调器。\n// 如果协调器不存在，则创建它并添加应用的存储。\n\
  - (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{\n    if (_persistentStoreCoordinator\
  \ != nil) {\n        return _persistentStoreCoordinator;\n    }\n\n    NSURL *storeURL\
  \ = [[self applicationDocumentsDirectory]\nURLByAppendingPathComponent:@\"BirthdayReminder.sqlite\"\
  ];\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc]\ninitWithManagedObjectModel:[self managedObjectModel]];\n    if (![_persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType\nconfiguration:nil URL:storeURL options:nil\
  \ error:&error]) {\n        NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n\
  \        abort();\n    }\n\n    return _persistentStoreCoordinator;\n}\n\n#pragma\
  \ mark - 应用的 Documents 目录\n\n// 返回应用 Documents 目录的 URL。\n- (NSURL *)applicationDocumentsDirectory\n\
  {\n    return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory\n\
  inDomains:NSUserDomainMask] lastObject];\n}\n```\n\n现在正是检查应用是否能正常编译的好时机，尽管你还看不到任何变化，因为我们仍处于\
  \ Core Data 实现的准备阶段。\n\n\n\n"
- "# 使用 `NSFetchedResultsController` 将表格视图与结果集关联\n\n为了检索 Core Data 实体的存储结果集，Apple\
  \ 提供了一个名为 `NSFetchedResultsController` 的便捷抓取类。获取的结果控制器不仅能根据查询对 Core Data 实体执行有初始顺序的抓取，还提供了委托回调方法，以提醒其委托结果集发生了变化。例如新增、修改或删除托管对象等变更。这是一个非常强大的类，我们将使用它来追踪\
  \ Core Data 存储中 `BRDBirthday` 实体列表，并在主页视图控制器中显示它们。\n\n打开 `BRHomeViewController.h`\
  \ 的头文件，声明我们的主页视图控制器实现了 `NSFetchedResultsControllerDelegate` 协议：\n\n`@interface BRHomeViewController\
  \ :`\n`BRCoreViewController<UITableViewDelegate,UITableViewDataSource,`\n`NSFetchedResultsControllerDelegate>`\n\
  \n打开 `BRHomeViewController.m` 源文件，导入新的 `BRDBirthday.h` 和 `BRDModel.h` 头文件，并在主页视图控制器中声明一个新的获取结果控制器私有属性：\n\
  \n```\n#import \"BRHomeViewController.h\"\n#import \"BRBirthdayDetailViewController.h\"\
  \n#import \"BRBirthdayEditViewController.h\"\n#import \"BRDBirthday.h\"\n#import\
  \ \"BRDModel.h\"\n\n@interface BRHomeViewController()\n@property (nonatomic, strong)\
  \ NSFetchedResultsController *fetchedResultsController;\n@property (nonatomic,strong)\
  \ NSMutableArray *birthdays;\n\n@end\n```\n\n我们将对获取结果控制器进行懒加载；也就是说，只有在代码中首次需要它时才会实例化。为此，我们重写了\
  \ `self.fetchedResultsController` 的 getter 访问方法。在创建存储的获取结果控制器实例之前，我们会检查实例变量 `_fetchedResultsController`\
  \ 是否尚未实例化。在 `BRHomeViewController.m` 中添加 `fetchedResultsController` 的新访问方法：\n\n\
  ```\n#pragma mark 用于追踪 Core Data 中 BRDBirthday 托管对象的获取结果控制器\n\n- (NSFetchedResultsController\
  \ *)fetchedResultsController {\n    if (_fetchedResultsController == nil) {\n\n\
  \        NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n\n     \
  \   // 通过模型单例访问唯一的托管对象上下文\n        NSManagedObjectContext *context = [BRDModel sharedInstance].managedObjectContext;\n\
  \n        // 获取请求需要实体描述——我们只对 BRDBirthday 托管对象感兴趣\n        NSEntityDescription *entity\
  \ = [NSEntityDescription entityForName:@\"BRDBirthday\" inManagedObjectContext:context];\n\
  \        fetchRequest.entity = entity;\n\n        // 目前我们将按名称排序顺序排列 BRDBirthday\
  \ 对象\n        NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc]\ninitWithKey:@\"\
  nextBirthday\" ascending:YES];\n        NSArray *sortDescriptors = [[NSArray alloc]\
  \ initWithObjects:sortDescriptor, nil];\n        fetchRequest.sortDescriptors =\
  \ sortDescriptors;\n\n        self.fetchedResultsController = [[NSFetchedResultsController\
  \ alloc]\ninitWithFetchRequest:fetchRequest managedObjectContext:context sectionNameKeyPath:nil\n\
  cacheName:nil];\n        self.fetchedResultsController.delegate = self;\n      \
  \  NSError *error = nil;\n        if (![self.fetchedResultsController performFetch:&error])\
  \ {\n\n            NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n       \
  \     abort();\n        }\n\n    }\n\n        return _fetchedResultsController;\n\
  }\n```\n\n获取结果控制器需要一个获取请求：它需要知道应获取的托管对象类型以及应返回结果的顺序。因此，我们首先创建一个 `NSFetchRequest`\
  \ 实例，然后将其传递给新的 `NSFetchedResultsController`。我们将获取请求的实体设置为唯一的实体 `BRDBirthday`，并指定结果应按\
  \ `BRDBirthday` 的 `nextBirthday` 字符串属性顺序返回。\n\n最后，我们调用结果控制器通过 `performFetch:` 方法执行获取请求，从而用存储中所有的\
  \ `BRDBirthday` 托管对象填充获取结果控制器（目前还没有！）。\n\n将主页视图控制器设置为获取结果控制器的委托有一个很好的理由：我们希望通过保留的获取结果控制器捕获结果集发生的任何变更，例如新增或编辑的生日托管对象。Apple\
  \ 的开发者文档指出：*委托必须至少实现一个变更跟踪委托方法，才能启用变更跟踪。* 提供 `controllerDidChangeContent:` 的空实现就足够了。^(1)\n\
  \n因此，为了确保获取结果控制器保持最新，我们将在 `BRHomeViewController.m` 类中实现一个空的 `NSFetchedResultsControllerDelegate`\
  \ 协议方法：\n\n```\n#pragma mark NSFetchedResultsControllerDelegate\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
  \ *)controller {\n    // 获取的结果已更改\n}\n```\n\n找到用于填充表格视图的两个 `UITableViewDataSource`\
  \ 协议方法（`tableView:cellForRowAtIndexPath:` 和 `tableView:numberOfRowsInSection:`），并将其替换为以下内容：\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\n\
  *)indexPath\n{\n    UITableViewCell *cell = [self.tableView dequeueReusableCellWithIdentifier:@\"\
  Cell\"];\n\n    BRDBirthday *birthday = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
