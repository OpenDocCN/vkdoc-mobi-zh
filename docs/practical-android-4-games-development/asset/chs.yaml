  \    batcher.drawSprite(32, 32, 64, 64, buttonRegion);\n    batcher.endBatch();\n\
  \n    gl.glDisable(GL10.GL_BLEND);\n    gl.glDisable(GL10.GL_TEXTURE_2D);\n}\n```\n\
  \n`present()`方法出奇地简单，这得益于我们在那些小辅助类上所投入的精力。我们从常规操作开始，例如清空屏幕和设置视口。接下来，我们让`EulerCamera`设置投影矩阵和模型视图矩阵。从此刻起，我们可以渲染任何应在屏幕上显示为\
