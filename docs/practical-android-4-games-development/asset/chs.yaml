  \n**图 11-7.** *我们的场景（来自图 11-6），使用 OpenGL ES 渲染*\n\n## OpenGL ES 中光照的一些说明\n\n虽然光照可以增添一些视觉享受，但它也有其局限和陷阱。以下是一些您应当牢记的要点。\n\
  \n- **光照开销大**，尤其是在低端设备上。请谨慎使用。启用的光源数量越多，渲染场景所需的计算能力就越高。\n- **指定点/方向光的位置/方向时**，必须在加载相机矩阵之后、在模型视图矩阵上乘以任何用于移动和旋转物体的矩阵**之前**进行！这一点至关重要。如果不遵循此方法，将会出现一些难以解释的光照伪影。\n\
  - **使用`glScalef()`改变模型大小时**，其法线也会被缩放。这很糟糕，因为 OpenGL ES 期望法线为单位长度。为解决此问题，可以使用命令`glEnable(GL10.GL_NORMALIZE)`，或者在某些情况下使用`glEnable(GL10.GL_RESCALE_NORMAL)`。我们建议坚持使用前者，因为后者存在一些限制和注意事项。问题在于，归一化或重新缩放法线的计算负荷很大。为了获得最佳性能，最好不要缩放带光照的物体。\n\
  \n\n### 多级渐远纹理\n\n如果读者尝试运行之前的示例，并将立方体逐渐远离摄像机，可能会注意到随着立方体变小，纹理开始显得颗粒化并充斥着小瑕疵。这种效果被称为*锯齿*，是所有信号处理中的显著现象。图\
  \ 11-8 右侧展示了该效果，左侧则展示了应用*多级渐远纹理*技术后的结果。\n\n![图片](img/1108.jpg)\n\n**图 11-8.** *右侧为锯齿伪影；左侧为多级渐远纹理的效果*\n\
  \n我们不深入探讨锯齿产生的原因；读者只需了解如何让物体看起来更美观。这正是多级渐远纹理的用武之地。\n\n修复锯齿问题的关键在于，对屏幕上尺寸较小或距离视点较远的物体部分使用更低分辨率的图像。这通常被称为*多级渐远纹理金字塔*或*多级渐远纹理链*。给定一张默认分辨率的图像（例如\
  \ 256×256 像素），我们为其创建更小的版本，多级渐远纹理金字塔的每一级都将边长度减半。图 11-9 展示了不同多级渐远纹理级别的木箱纹理。\n\n![图片](img/1109.jpg)\n\
  \n**图 11-9.** *一个多级渐远纹理链*\n\n要在 OpenGL ES 中为纹理创建多级渐远纹理，我们需要做两件事：\n\n*   将缩小过滤器设置为\
  \ `GL_XXX_MIPMAP_XXX` 常量之一，通常为 `GL_LINEAR_MIPMAP_NEAREST`。\n*   通过调整原始图像大小，为多级渐远纹理链的每一级创建图像，并将其上传到\
  \ OpenGL ES。多级渐远纹理链依附于单个纹理，而非多个纹理。\n\n要调整多级渐远纹理链的基础图像大小，我们可以直接使用 Android API 提供的\
  \ `Bitmap` 和 `Canvas` 类。让我们对 `Texture` 类稍作修改。代码清单 11-8 显示了相关代码。\n\n**代码清单 11-8.**\
  \ *Texture.java，Texture 类的最终版本*\n\n```\npackage com.badlogic.androidgames.framework.gl;\n\
  \nimport java.io.IOException;\nimport java.io.InputStream;\n\nimport javax.microedition.khronos.opengles.GL10;\n\
  \nimport android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\nimport\
  \ android.graphics.Canvas;\nimport android.graphics.Rect;\nimport android.opengl.GLUtils;\n\
  \nimport com.badlogic.androidgames.framework.FileIO;\nimport com.badlogic.androidgames.framework.impl.GLGame;\n\
  import com.badlogic.androidgames.framework.impl.GLGraphics;\n\npublic class Texture\
  \ {\n    GLGraphics glGraphics;\n    FileIO fileIO;\n    String fileName;\n    int\
  \ textureId;\n    int minFilter;\n    int magFilter;\n    public int width;\n  \
  \  public int height;\n    boolean mipmapped;\n```\n\n我们只添加了一个名为 `mipmapped` 的新成员，用于存储纹理是否包含多级渐远纹理链。\n\
  \n```\n    public Texture(GLGame glGame, String fileName) {\n        this(glGame,\
  \ fileName, false);\n    }\n\n    public Texture(GLGame glGame, String fileName,\
  \ boolean mipmapped) {\n        this.glGraphics = glGame.getGLGraphics();\n    \
  \    this.fileIO = glGame.getFileIO();\n        this.fileName = fileName;\n    \
  \    this.mipmapped = mipmapped;\n        load();\n    }\n```\n\n为了保持兼容性，我们保留了旧构造函数，它会调用新的构造函数。新的构造函数接受第三个参数，允许我们指定是否希望纹理使用多级渐远纹理。\n\
  \n```\n    private void load() {\n        GL10 gl = glGraphics.getGL();\n      \
  \  int[] textureIds = new int[1];\n        gl.glGenTextures(1, textureIds, 0);\n\
  \        textureId = textureIds[0];\n\n        InputStream in = null;\n        try\
  \ {\n            in = fileIO.readAsset(fileName);\n            Bitmap bitmap = BitmapFactory.decodeStream(in);\n\
  \            if (mipmapped) {\n                createMipmaps(gl, bitmap);\n    \
  \        } else {\n                gl.glBindTexture(GL10.GL_TEXTURE_2D, textureId);\n\
  \                GLUtils.texImage2D(GL10.GL_TEXTURE_2D, 0, bitmap, 0);\n       \
  \         setFilters(GL10.GL_NEAREST, GL10.GL_NEAREST);\n                gl.glBindTexture(GL10.GL_TEXTURE_2D,\
  \ 0);\n                width = bitmap.getWidth();\n                height = bitmap.getHeight();\n\
  \                bitmap.recycle();\n            }\n        } catch (IOException\
  \ e) {\n            throw new RuntimeException(\"Couldn't load texture '\" + fileName\n\
  \                    + \"'\", e);\n        } finally {\n            if (in != null)\n\
  \                try {\n                    in.close();\n                } catch\
  \ (IOException e) {\n                }\n        }\n    }\n```\n\n`load()` 方法基本保持不变。唯一的增加点是，在纹理需要使用多级渐远纹理时调用\
  \ `createMipmaps()`。非多级渐远纹理的 `Texture` 实例创建方式与之前相同。\n\n```\n    private void createMipmaps(GL10\
  \ gl, Bitmap bitmap) {\n        gl.glBindTexture(GL10.GL_TEXTURE_2D, textureId);\n\
  \        width = bitmap.getWidth();\n        height = bitmap.getHeight();\n    \
  \    setFilters(GL10.GL_LINEAR_MIPMAP_NEAREST, GL10.GL_LINEAR);\n\n        int level\
  \ = 0;\n        int newWidth = width;\n        int newHeight = height;\n       \
  \ while (true) {\n            GLUtils.texImage2D(GL10.GL_TEXTURE_2D, level, bitmap,\
  \ 0);\n            newWidth = newWidth / 2;\n            newHeight = newHeight /\
  \ 2;\n            if (newWidth <= 0)\n                break;\n            Bitmap\
  \ newBitmap = Bitmap.createBitmap(newWidth, newHeight,\n                    bitmap.getConfig());\n\
  \            Canvas canvas = new Canvas(newBitmap);\n            canvas.drawBitmap(bitmap,\n\
  \                    new Rect(0, 0, bitmap.getWidth(), bitmap.getHeight()),\n  \
  \                  new Rect(0, 0, newWidth, newHeight), null);\n            bitmap.recycle();\n\
  \            bitmap = newBitmap;\n            level++;\n        }\n\n        gl.glBindTexture(GL10.GL_TEXTURE_2D,\
  \ 0);\n        bitmap.recycle();\n    }\n```\n\n`createMipmaps()` 方法相当直接。我们首先绑定纹理，以便操作其属性。我们做的第一件事是记录位图的宽度和高度，并设置过滤器。注意，我们将缩小过滤器设置为\
  \ `GL_LINEAR_MIPMAP_NEAREST`。如果不使用此过滤器，多级渐远纹理将不起作用，OpenGL ES 将回退到普通过滤，只使用基础图像。\n\
  \n`while` 循环也很直观。我们将当前位图作为当前级别的图像上传。从级别 0 开始，即包含原始图像的基础级别。上传完当前级别的图像后，我们创建其较小版本，将宽度和高度除以\
  \ 2。如果新宽度小于或等于零，我们就可以跳出无限循环，因为我们已经为每个多级渐远纹理级别上传了图像（最后一张图像的大小为 1×1 像素）。我们使用 `Canvas`\
  \ 类来调整图像大小，并将结果存储在 `newBitmap` 中。然后，我们回收旧位图以清理其占用的内存，并将 `newBitmap` 设置为当前位图。重复此过程，直到图像小于\
  \ 1×1 像素。\n\n最后，我们解绑纹理，并回收循环中生成的最后一位图。\n\n```\n    public void reload() {\n    \
  \    load();\n        bind();\n        setFilters(minFilter, magFilter);\n     \
  \   glGraphics.getGL().glBindTexture(GL10.GL_TEXTURE_2D, 0);\n    }\n```\n\n\n\n\
  `public void setFilters(int minFilter, int magFilter) {`\n    `this.minFilter =\
  \ minFilter;`\n    `this.magFilter = magFilter;`\n    `GL10 gl = glGraphics.getGL();`\n\
  \    `gl.glTexParameterf(GL10.GL_TEXTURE_2D, GL10.GL_TEXTURE_MIN_FILTER,`\n    \
  \        `minFilter);`\n    `gl.glTexParameterf(GL10.GL_TEXTURE_2D, GL10.GL_TEXTURE_MAG_FILTER,`\n\
  \            `magFilter);`\n`}`\n\n`public void bind() {`\n    `GL10 gl = glGraphics.getGL();`\n\
  \    `gl.glBindTexture(GL10.GL_TEXTURE_2D, textureId);`\n`}`\n\n`public void dispose()\
  \ {`\n    `GL10 gl = glGraphics.getGL();`\n    `gl.glBindTexture(GL10.GL_TEXTURE_2D,\
  \ textureId);`\n    `int[] textureIds = { textureId };`\n    `gl.glDeleteTextures(1,\
  \ textureIds, 0);`\n`}`\n\n类的其余部分与之前版本相同。使用上的唯一区别在于我们调用构造函数的方式。由于这非常简单，我们就不专门为 mipmapping\
  \ 编写示例了。我们会在所有用于 3D 对象的纹理上使用 mipmapping。在 2D 中，mipmapping 的作用较小。关于 mipmapping 的最后几点说明：\n\
  \n- 如果使用 mipmapped 纹理绘制的对象很小，mipmapping 可以显著提升性能。原因是 GPU 需要从 mipmap 金字塔中较小的图像中获取更少的纹理元素。因此，明智的做法是始终在可能变小的对象上使用\
  \ mipmapped 纹理。\n- 与非 mipmapped 版本相比，mipmapped 纹理占用的内存多出 33%。这种权衡通常是可接受的。\n- 在 OpenGL\
  \ ES 1.x 中，mipmapping 仅适用于正方形纹理。这一点至关重要。如果你的对象虽然使用了精美的图像作为纹理，但仍然是白色的，那么你很可能忘记了这一限制。\n\
  \n**注意：** 再次强调，因为这确实很重要，请记住 mipmapping 仅适用于正方形纹理！512×256 像素的图像将无法工作。\n\n## 简单相机\n\
  \n在上一章中，我们讨论了创建相机的两种方式。第一种是欧拉相机，类似于第一人称射击游戏中使用的相机。第二种是观察目标相机，用于电影式镜头操作或跟随物体。让我们创建两个辅助类，以便在游戏中使用。\n\
  \n### 第一人称或欧拉相机\n\n第一人称或欧拉相机由以下属性定义：\n\n- 视野角度（以度为单位）。\n- 视口宽高比。\n- 近裁剪平面和远裁剪平面。\n\
  - 三维空间中的位置。\n- 绕 y 轴的角度（偏航角）。\n- 绕 x 轴的角度（俯仰角）。此角度限制在 −90 到 +90 度范围内。想想你能把头部倾斜到什么程度，并尝试超越这些角度！我们对任何伤害概不负责。\n\
  \n前三个属性用于定义透视投影矩阵。我们在所有 3D 示例中已经通过调用 `gluPerspective()` 实现了这一点。\n\n其他三个属性定义了相机在我们世界中的位置和方向。我们将按照上一章所述，从中构建一个矩阵。让我们把所有内容整合到一个简单的类中。列表\
  \ 11–9 展示了代码。\n\n我们还希望能够将相机朝其朝向的方向移动。为此，我们需要一个单位长度的方向向量，并将其加到相机的位置向量上。我们可以借助 Android\
  \ API 提供的 `Matrix` 类来创建这种向量。让我们思考一下。\n\n在默认配置下，我们的相机将沿着负 z 轴方向观察，其方向向量为 (0, 0, –1)。当我们指定偏航角或俯仰角时，这个方向向量会相应地旋转。为了计算方向向量，我们只需要将其与一个旋转默认方向向量的矩阵相乘，就像\
  \ OpenGL ES 旋转我们模型的顶点一样。\n\n让我们看看所有这些在代码中是如何工作的。列表 11–9 展示了 `EulerCamera` 类。\n\n\
  **列表 11–9.** *EulerCamera.java，一个基于绕 x 轴和 y 轴欧拉角的简单第一人称相机*\n\n`package com.badlogic.androidgames.framework.gl;`\n\
  \n`import javax.microedition.khronos.opengles.GL10;`\n\n`import android.opengl.GLU;`\n\
  `import android.opengl.Matrix;`\n\n`import com.badlogic.androidgames.framework.math.Vector3;`\n\
  \n`public class EulerCamera {`\n    `final Vector3 position = new Vector3();`\n\
  \    `float yaw;`\n    `float pitch;`\n    `float fieldOfView;`\n    `float aspectRatio;`\n\
  \    `float near;`\n    `float far;`\n\n前三个成员变量保存了相机的位置和旋转角度。其他四个成员变量保存了用于计算透视投影矩阵的参数。默认情况下，我们的相机位于世界原点，沿负\
  \ z 轴方向观察。\n\n`public EulerCamera(float fieldOfView, float aspectRatio, float near,\
  \ float far) {`\n    `this.fieldOfView = fieldOfView;`\n    `this.aspectRatio =\
  \ aspectRatio;`\n    `this.near = near;`\n    `this.far = far;`\n`}`\n\n构造函数接收四个参数来定义透视投影。我们保持相机的位置和旋转角度不变。\n\
  \n`public Vector3 getPosition() {`\n    `return position;`\n`}`\n\n`public float\
  \ getYaw() {`\n    `return yaw;`\n`}`\n\n`public float getPitch() {`\n    `return\
  \ pitch;`\n`}`\n\ngetter 方法仅返回相机的方向和位置。\n\n`public void setAngles(float yaw, float\
  \ pitch) {`\n    `if (pitch < -90)`\n        `pitch = -90;`\n    `if (pitch > 90)`\n\
  \        `pitch = 90;`\n    `this.yaw = yaw;`\n    `this.pitch = pitch;`\n`}`\n\n\
  `public void rotate(float yawInc, float pitchInc) {`\n    `this.yaw += yawInc;`\n\
  \    `this.pitch += pitchInc;`\n    `if (pitch < -90)`\n        `pitch = -90;`\n\
  \    `if (pitch > 90)`\n        `pitch = 90;`\n`}`\n\n\n\n### 排版后的内容\n\n`setAngles()`方法允许我们直接指定摄像机的偏航角和俯仰角。请注意，我们将俯仰角限制在−90\
  \ 到 90 度的范围内。我们的头无法旋转超过这个范围，因此我们的摄像机也不应该能够做到这一点。\n\n`rotate()`方法与`setAngles()`方法几乎相同。它不是设置角度，而是通过参数增加角度。当我们在下一个示例中实现基于触摸屏的控制方案时，这将非常有用。\n\
  \n```\npublic void setMatrices(GL10 gl) {\n    gl.glMatrixMode(GL10.GL_PROJECTION);\n\
  \    gl.glLoadIdentity();\n    GLU.gluPerspective(gl, fieldOfView, aspectRatio,\
  \ near, far);\n    gl.glMatrixMode(GL10.GL_MODELVIEW);\n    gl.glLoadIdentity();\n\
  \    gl.glRotatef(-pitch, 1, 0, 0);\n    gl.glRotatef(-yaw, 0, 1, 0);\n    gl.glTranslatef(-position.x,\
  \ -position.y, -position.z);\n}\n```\n\n`setMatrices()`方法只是按前面讨论的方式设置投影矩阵和模型-视图矩阵。投影矩阵通过`gluPerspective()`根据构造函数中传递给摄像机的参数进行设置。模型-视图矩阵通过应用绕\
  \ x 轴和 y 轴的旋转以及平移来执行“先旋转后平移”技巧。所有涉及的因素都被取反，以实现摄像机保持在世界原点并沿负 z 轴方向观察的效果。因此，我们围绕摄像机旋转和平移物体，而不是反过来。\n\
  \n```\nfinal float[] matrix = new float[16];\nfinal float[] inVec = { 0, 0, -1,\
  \ 1 };\nfinal float[] outVec = new float[4];\nfinal Vector3 direction = new Vector3();\n\
  \npublic Vector3 getDirection() {\n    Matrix.setIdentityM(matrix, 0);\n    Matrix.rotateM(matrix,\
  \ 0, yaw, 0, 1, 0);\n    Matrix.rotateM(matrix, 0, pitch, 1, 0, 0);\n    Matrix.multiplyMV(outVec,\
  \ 0, matrix, 0, inVec, 0);\n    direction.set(outVec[0], outVec[1], outVec[2]);\n\
  \    return direction;\n}\n```\n\n最后，我们有一个神秘的`getDirection()`方法。它伴随着几个`final`成员，我们在方法内部使用它们进行计算。我们这样做是为了避免每次调用该方法时都分配新的`float`数组和`Vector3`实例。将这些成员视为临时工作变量。\n\
  \n在方法内部，我们首先设置一个包含绕 x 轴和 y 轴旋转的变换矩阵。我们不需要包含平移，因为我们只想要一个方向向量，而不是位置向量。摄像机的方向与其在世界中的位置无关。我们调用的`Matrix`方法应该是不言自明的。唯一奇怪的是，我们实际上以相反的顺序应用它们，而没有对参数取反。我们在`setMatrices()`方法中做了相反的操作。这是因为我们现在实际上是在以变换虚拟摄像机相同的方式变换一个点，该虚拟摄像机不必位于原点，也不必定向为沿负\
  \ z 轴方向观察。我们旋转的向量是`(0,0,-1)`，存储在`inVec`中。如果没有应用旋转，这就是我们摄像机的默认方向。矩阵乘法所做的就是将这个方向向量旋转摄像机的俯仰角和滚转角，使其指向摄像机朝向的方向。我们做的最后一件事是基于矩阵-向量乘法的结果设置一个`Vector3`实例，并将其返回给调用者。我们可以稍后使用这个单位长度的方向向量来让摄像机沿着它朝向的方向移动。\n\
  \n有了这个小小的辅助类，我们就可以编写一个小的示例程序，允许我们在一个由板条箱组成的世界中移动。\n\n#### 欧拉摄像机示例\n\n我们现在想在一个小程序中使用`EulerCamera`类。我们希望能够根据手指在触摸屏上的滑动来向上、向下、向左和向右旋转摄像机。我们还希望当按下按钮时，摄像机能够向前移动。我们的世界应该由几个板条箱组成。图\
  \ 11–10 显示了我们的场景的初始设置。\n\n![images](img/1110.jpg)\n\n**图 11–10.** *一个包含 25 个板条箱、一个点光源和一个处于初始位置和方向的欧拉摄像机的简单场景*\n\
  \n摄像机将位于`(0,1,3)`。我们还有一个位于`(3,3,-3)`的白色点光源。板条箱在 x 轴上从-4 到 4 以及在 z 轴上从 0 到-8 的网格中定位，中心间距为\
  \ 2 个单位。\n\n我们将如何通过滑动来旋转摄像机？当我们水平滑动时，我们希望摄像机绕 y 轴旋转。这相当于向左和向右转动我们的头。当我们垂直滑动时，我们希望摄像机绕\
  \ x 轴旋转。这相当于向上和向下倾斜我们的头。我们还希望能够组合这两种滑动操作。实现这一目标的最直接方法是检查是否有手指在屏幕上，如果有，则测量该手指在屏幕上的当前位置与上次已知位置的每个轴上的差值。然后，我们可以通过使用\
  \ x 轴的差值进行 y 轴旋转，以及使用 y 轴的差值进行 x 轴旋转，来推导出两个轴上的旋转变化。\n\n我们还希望摄像机能够通过按下一个屏幕上的按钮来向前移动。这很简单；我们只需要调用`EulerCamera.getDirection()`并将其结果乘以我们希望的摄像机移动速度和`delta`时间，以便我们再次执行基于时间的移动。我们需要做的唯一事情是绘制按钮（我们决定在屏幕左下角绘制一个\
  \ 64×64 的按钮），并检查它当前是否被手指触摸。\n\n为了简化我们的实现，我们只允许用户进行滑动旋转或移动。我们可以为此使用多点触控功能，但这会使我们的实现变得相当复杂。\n\
  \n有了这个行动计划，让我们看看`EulerCameraScreen`，它是一个`GLGame`实现`EulerCameraTest`中包含的`GLScreen`实现（仅是通常的测试结构）。清单\
