  \n##### 模拟类\n\n像往常一样，为游戏世界中的每个对象创建一个独立的类。它们包括：\n\n*   一艘飞船\n*   入侵者\n*   子弹\n* \
  \  护盾方块\n\n整个协调工作由无所不包的`World`类来执行。正如你在上一章所见，在对象表示方面，2D 和 3D 之间并没有太大区别。现在可以使用`GameObject3D`和`DynamicObject3D`代替`GameObject`和`DynamicObject`。唯一的区别在于：使用`Vector3`实例替代`Vector2`实例来存储位置、速度和加速度；使用包围球体替代包围矩形来表示物体的形状。剩下的工作就是实现游戏世界中不同对象的行为。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译为中文。\n\n\n### 护盾类\n\n根据游戏机制定义，您已经了解了护盾方块的大小和行为。它们只是静静地存在于世界的某个位置，等待被飞船或入侵者的子弹摧毁。它们内部没有太多逻辑，因此代码相当简洁。清单\
  \ 12-6 展示了护盾方块的内部实现。\n\n**清单 12-6.** *Shield.java，护盾方块类*\n\n```java\npackage com.badlogic.androidgames.droidinvaders;\n\
  \nimport com.badlogic.androidgames.framework.GameObject3D;\n\npublic class Shield\
  \ extends GameObject3D {\n    static float SHIELD_RADIUS = 0.5f;\n\n    public Shield(float\
  \ x, float y, float z) {\n        super(x, y, z, SHIELD_RADIUS);\n    }\n}\n```\n\
  \n定义护盾的半径，并根据构造函数的参数初始化其位置和包围球。仅此而已！\n\n### 子弹类\n\n子弹类同样简单。它派生自 `DynamicGameObject3D`，因为它实际上是移动的。清单\
  \ 12-7 展示了相关代码。\n\n**清单 12-7.** *Shot.java，子弹类*\n\n```java\npackage com.badlogic.androidgames.droidinvaders;\n\
  \nimport com.badlogic.androidgames.framework.DynamicGameObject3D;\n\npublic class\
  \ Shot extends DynamicGameObject3D {\n    static float SHOT_VELOCITY = 10f;\n  \
  \  static float SHOT_RADIUS = 0.1f;\n\n    public Shot(float x, float y, float z,\
  \ float velocityZ) {\n        super(x, y, z, SHOT_RADIUS);\n        velocity.z =\
  \ velocityZ;\n    }\n\n    public void update(float deltaTime) {\n        position.z\
  \ += velocity.z * deltaTime;\n        bounds.center.set(position);\n    }\n}\n```\n\
  \n您需要定义一些常量，即子弹速度及其半径。构造函数接收子弹的初始位置，以及它在 z 轴上的速度。等等，您不是刚刚才把速度定义为一个常量吗？是的，但这会让您的子弹只沿着\
  \ z 轴正方向飞行。这对于入侵者发射的子弹来说没问题，但飞船发射的子弹必须飞向相反方向。当您创建一颗子弹时（在此类外部），您知道它应该飞行的方向。因此，子弹的速度由其创建者设定。\n\
  \n`update()` 方法仅执行常见的质点物理运动。其中不涉及加速度，因此您只需将恒定速度乘以时间增量，再将其加到子弹的位置上。关键部分是，您还需要根据子弹的位置更新包围球中心的位置。否则，包围球将不会随子弹移动。\n\
  \n### 飞船类\n\n`Ship` 类负责更新飞船的位置，将其限制在游戏场地边界内，并记录其当前状态。它可以处于存活或爆炸状态。在这两种情况下，都需要记录飞船在该状态下持续的时间。然后可以使用状态时间进行动画，例如，就像您在\
  \ Super Jumper 及其 `WorldRenderer` 类中所做的那样。飞船将从外部获取其当前速度，该速度取决于用户输入——要么像您为 Bob 所做的那样通过加速度计读数获取，要么根据屏幕按钮的按下状态基于一个常量获取。此外，飞船会记录其剩余生命数，并为我们提供一种方法来告知它已被击毁。清单\
  \ 12-8 展示了相关代码。\n\n**清单 12-8.** *Ship.java，飞船类*\n\n```java\npackage com.badlogic.androidgames.droidinvaders;\n\
  \nimport com.badlogic.androidgames.framework.DynamicGameObject3D;\n\npublic class\
  \ Ship extends DynamicGameObject3D {\n    static float SHIP_VELOCITY = 20f;\n  \
  \  static int SHIP_ALIVE = 0;\n    static int SHIP_EXPLODING = 1;\n    static float\
  \ SHIP_EXPLOSION_TIME = 1.6f;\n    static float SHIP_RADIUS = 0.5f;\n```\n\n首先定义几个常量，用于表示飞船的最大速度、两种状态（存活和爆炸）、飞船完全爆炸所需的时间以及飞船的包围球半径。同时，让此类派生自\
  \ `DynamicGameObject3D`，因为它具有位置、包围球以及速度。存储在 `DynamicGameObject3D` 中的加速度向量将再次不被使用。\n\
  \n```java\n    int lives;\n    int state;\n    float stateTime = 0;\n```\n\n接下来是成员变量，包括两个整型变量，分别用于记录飞船的剩余生命数和其状态（`SHIP_ALIVE`\
  \ 或 `SHIP_EXPLODING`）。最后一个成员变量用于记录飞船在当前状态下已持续了多少秒。\n\n```java\n    public Ship(float\
  \ x, float y, float z) {\n        super(x, y, z, SHIP_RADIUS);\n        lives =\
  \ 3;\n        state = SHIP_ALIVE;\n    }\n```\n\n构造函数执行通常的父类构造函数调用，并初始化一些成员变量。飞船总共有三条命。\n\
  \n```java\n    public void update(float deltaTime, float accelY) {\n        if (state\
  \ == SHIP_ALIVE) {\n            velocity.set(accelY / 10 * SHIP_VELOCITY, 0, 0);\n\
  \            position.add(velocity.x * deltaTime, 0, 0);\n            if (position.x\
  \ < World.WORLD_MIN_X)\n                position.x = World.WORLD_MIN_X;\n      \
  \      if (position.x > World.WORLD_MAX_X)\n                position.x = World.WORLD_MAX_X;\n\
  \            bounds.center.set(position);\n        } else {\n            if (stateTime\
  \ >= SHIP_EXPLOSION_TIME) {\n                lives--;\n                stateTime\
  \ = 0;\n                state = SHIP_ALIVE;\n            }\n        }\n        stateTime\
  \ += deltaTime;\n    }\n```\n\n`update()` 方法非常简单。它接收时间增量以及设备当前在 y 轴上的加速度计读数（请记住，您处于横屏模式，因此加速度计的\
  \ y 轴就是您屏幕的 x 轴）。如果飞船存活，则根据加速度计值（范围在 -10 到 10 之间）设置其速度，就像您在 Super Jumper 中为 Bob\
  \ 所做的那样。此外，根据当前速度更新其位置。接下来，使用您稍后在 `World` 类中定义的两个常量，检查飞船是否超出了游戏场地的边界。位置修正后，更新飞船包围球的中心。\n\
  \n如果飞船正在爆炸，则检查爆炸持续了多长时间。在爆炸状态持续 1.6 秒后，飞船完成爆炸，损失一条命，并回到存活状态。\n\n最后，根据给定的时间增量更新 `stateTime`\
  \ 成员变量。\n\n```java\n    public void kill() {\n        state = SHIP_EXPLODING;\n\
  \        stateTime = 0;\n        velocity.x = 0;\n    }\n}\n```\n\n最后一个 `kill()`\
  \ 方法将由 `World` 类在检测到飞船与子弹或入侵者发生碰撞时调用。它会将状态设置为爆炸，重置状态时间，并确保飞船在所有轴上的速度均为零（从未设置速度向量的\
  \ y 和 z 分量，因为您只沿着 x 轴运动）。\n\n\n\n### 侵略者类\n\n侵略者只是按照预定义的模式在太空中漂浮。图 12-11 展示了这一模式。\n\
  \n![images](img/1211.jpg)\n\n**图 12-11.** *侵略者的移动轨迹。向左、向下、向右、向下、向左、向下、向右、向下……*\n\
  \n侵略者遵循一种极其简单的移动模式。从初始位置开始，它首先向右移动一段距离。接着，它向下移动（即沿着游戏场地上 z 轴正方向），同样移动一段指定距离。完成向下移动后，它会开始向右移动，基本上是回溯到向左移动之前的\
  \ x 坐标位置。\n\n除起始阶段外，左右移动的距离始终相同。图 12-11 展示了左上角侵略者的移动路径。它的第一次向左移动距离比后续所有向左或向右的移动都要短。水平移动距离是游戏场地宽度的一半，在此示例中为\
  \ 14 个单位。对于第一次水平移动，侵略者需移动的距离是这一半，即 7 个单位。\n\n你需要做的是追踪侵略者的移动方向以及在该方向上已移动的距离。如果它达到了给定移动状态对应的移动距离（水平移动为\
  \ 14 个单位，垂直移动为 1 个单位），则切换至下一个移动状态。所有侵略者的初始移动距离均设置为游戏场地宽度的一半。再看一遍图 12-11 就能明白为何如此设计！这样会使侵略者在游戏场地的左右边缘来回反弹。\n\
  \n侵略者还具有恒定的速度。嗯，实际上，如果当前波次的侵略者全部被消灭，当你生成新一波侵略者时，速度会提高。要实现这一点，只需将默认速度乘以一个外部设置的常数即可，该常数来自负责更新所有侵略者的`World`类。\n\
  \n最后，你必须追踪侵略者的状态，其状态可以是存活或爆炸中。使用与飞船类相同的机制，包含状态和状态时间。清单 12-9 展示了相关代码。\n\n**清单 12-9.**\
  \ *Invader.java，侵略者类*\n\n```\npackage com.badlogic.androidgames.droidinvaders;\n\
  \nimport com.badlogic.androidgames.framework.DynamicGameObject3D;\n\npublic class\
  \ Invader extends DynamicGameObject3D {\n    static final int INVADER_ALIVE = 0;\n\
  \    static final int INVADER_DEAD = 1;\n    static final float INVADER_EXPLOSION_TIME\
  \ = 1.6f;\n    static final float INVADER_RADIUS = 0.75f;\n    static final float\
  \ INVADER_VELOCITY = 1;\n    static final int MOVE_LEFT = 0;\n    static final int\
  \ MOVE_DOWN = 1;\n    static final int MOVE_RIGHT = 2;\n```\n\n首先定义一些常量，包括侵略者的状态、爆炸持续时间、半径和默认速度，以及三个用于追踪侵略者当前移动方向的常量。\n\
  \n```\n    int state = INVADER_ALIVE;\n    float stateTime = 0;\n    int move =\
  \ MOVE_LEFT;\n    boolean wasLastStateLeft = true;\n    float movedDistance = World.WORLD_MAX_X\
  \ / 2;\n```\n\n追踪侵略者的状态、状态时间、移动方向以及移动距离，其中移动距离应初始设置为游戏场地宽度的一半。同时追踪上一次水平移动是否向左。这有助于在侵略者完成\
  \ z 轴上的垂直移动后，决定其下一步应向左还是向右移动。\n\n```\n    public Invader(float x, float y, float\
  \ z) {\n        super(x, y, z, INVADER_RADIUS);\n    }\n```\n\n构造函数通过父类构造函数，完成侵略者位置及碰撞球体的常规设置。\n\
  \n```\n    public void update(float deltaTime, float speedMultiplier) {\n      \
  \  if (state == INVADER_ALIVE) {\n            movedDistance += deltaTime * INVADER_VELOCITY\
  \ * speedMultiplier;\n            if (move == MOVE_LEFT) {\n                position.x\
  \ -= deltaTime * INVADER_VELOCITY * speedMultiplier;\n                if (movedDistance\
  \ > World.WORLD_MAX_X) {\n                    move = MOVE_DOWN;\n              \
  \      movedDistance = 0;\n                    wasLastStateLeft = true;\n      \
  \          }\n            }\n            if (move == MOVE_RIGHT) {\n           \
  \     position.x += deltaTime * INVADER_VELOCITY * speedMultiplier;\n          \
  \      if (movedDistance > World.WORLD_MAX_X) {\n                    move = MOVE_DOWN;\n\
  \                    movedDistance = 0;\n                    wasLastStateLeft =\
  \ false;\n                }\n            }\n            if (move == MOVE_DOWN) {\n\
  \                position.z += deltaTime * INVADER_VELOCITY * speedMultiplier;\n\
  \                if (movedDistance > 1) {\n                    if (wasLastStateLeft)\n\
  \                        move = MOVE_RIGHT;\n                    else\n        \
  \                move = MOVE_LEFT;\n                    movedDistance = 0;\n   \
  \             }\n            }\n\n            bounds.center.set(position);\n   \
  \     }\n\n        stateTime += deltaTime;\n    }\n```\n\n`update()`方法接收当前时间步长和速度倍增器，使新一波侵略者移动更快。当然，只有在侵略者存活时才执行移动逻辑。\n\
  \n首先计算本次更新中侵略者将移动的单位数，并相应增加`movedDistance`成员变量。如果向左移动，则直接通过从位置 x 坐标减去移动速度乘以时间步长和速度倍增器的值来更新位置。如果移动距离足够，通过设置`move`成员为`MOVE_DOWN`来指示开始垂直移动。同时将`wasLastStateLeft`设置为`true`，以便知道向下移动结束后，需要向右移动。\n\
  \n处理向右移动时执行完全相同操作。唯一的区别是从位置 x 坐标减去移动速度（注意原文此处逻辑有误，向右应加，但已按正确逻辑翻译），并且在达到移动距离后将`wasLastStateLeft`设置为`false`。\n\
  \n如果向下移动，则操作侵略者位置的 z 坐标，并再次检查在该方向上的移动距离。如果达到向下移动的移动距离，则根据`wasLastStateLeft`成员中编码的上一次水平移动方向，将移动状态切换为`MOVE_LEFT`或`MOVE_RIGHT`。完成侵略者位置更新后，像处理飞船一样设置碰撞球体的位置。最后，更新当前状态时间，完成本次更新。\n\
  \n```\n    public void kill() {\n        state = INVADER_DEAD;\n        stateTime\
  \ = 0;\n    }\n}\n```\n\n此处的`kill()`方法与`Ship`类的`kill()`方法作用相同。它用于告知侵略者应开始死亡。将其状态设置为`INVADER_DEAD`，并重置其状态时间。此后侵略者将停止移动，仅根据当前时间步长更新其状态时间。\n\
  \n\n\n### 世界类\n\n`World` 类是这一切的总控。它存储飞船、入侵者和子弹，并负责更新它们以及检测碰撞。这与《超级跳跳人》非常相似，只有一些细微差别。护盾方块和入侵者的初始放置也由\
  \ `World` 类负责。创建一个 `WorldListener` 接口，用于通知外部各方世界内发生的事件，例如爆炸或子弹发射。这样，你就能像在《超级跳跳人》中一样播放音效。建议逐一阅读代码方法。代码清单\
  \ 12–10 展示了相关代码。\n\n**代码清单 12–10.** *World.java，世界类，将所有内容整合在一起*\n\n```\npackage\
