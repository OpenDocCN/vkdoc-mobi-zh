  \npublic class Settings {\n    public static boolean soundEnabled = true;\n    public\
  \ static boolean touchEnabled = true;\n    public final static String file = \"\
  .droidinvaders\";\n```\n\n存储声音是否启用，以及用户是否希望通过触摸输入来控制飞船。设置信息将保存在 SD 卡上的 `droidinvaders`\
  \ 文件中。\n\n```java\n    public static void load(FileIO files) {\n        BufferedReader\
