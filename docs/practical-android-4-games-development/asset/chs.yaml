  \n其他帮助屏幕与前文所述类似。\n\n\n\n#### 高分榜界面\n\n接下来要介绍的是高分榜界面。在这里，我们将使用主菜单 UI 标签的一部分（即 HIGHSCORES\
  \ 部分），并通过 `Assets` 类中存储的 `Font` 实例，渲染保存在 `Settings` 中的高分数据。当然，我们还提供了一个箭头按钮，方便玩家返回主菜单。代码清单\
  \ 9-7 展示了相关代码。\n\n**代码清单 9-7.** *HighscoresScreen.java：高分榜界面*\n\n```java\npackage\
  \ com.badlogic.androidgames.jumper;\n\nimport java.util.List;\n\nimport javax.microedition.khronos.opengles.GL10;\n\
  \nimport com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.gl.Camera2D;\nimport com.badlogic.androidgames.framework.gl.SpriteBatcher;\n\
  import com.badlogic.androidgames.framework.impl.GLScreen;\nimport com.badlogic.androidgames.framework.math.OverlapTester;\n\
  import com.badlogic.androidgames.framework.math.Rectangle;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  \npublic class HighscoreScreen extends GLScreen {\n    Camera2D guiCam;\n    SpriteBatcher\
  \ batcher;\n    Rectangle backBounds;\n    Vector2 touchPoint;\n    String[] highScores;\n\
  \    float xOffset = 0;\n```\n\n与往常一样，我们定义了几个成员变量，包括摄像机、`SpriteBatcher`、箭头按钮的边界框等。在高分数组中，我们存储了为玩家展示的每条高分记录的格式化字符串。`xOffset`\
  \ 是我们计算出的一个值，用于偏移每行文字的渲染位置，从而使这些行在水平方向上居中。\n\n```java\npublic HighscoreScreen(Game\
  \ game) {\n    super(game);\n\n    guiCam = new Camera2D(glGraphics, 320, 480);\n\
  \    backBounds = new Rectangle(0, 0, 64, 64);\n    touchPoint = new Vector2();\n\
  \    batcher = new SpriteBatcher(glGraphics, 100);\n    highScores = new String[5];\n\
  \    for (int i = 0; i < 5; i++) {\n        highScores[i] = (i + 1) + \". \" + Settings.highscores[i];\n\
  \        xOffset = Math.max(highScores[i].length() * Assets.font.glyphWidth,\nxOffset);\n\
  \    }\n    xOffset = 160 - xOffset / 2;\n}\n```\n\n在构造函数中，我们照常初始化了所有成员变量，并计算了 `xOffset`\
  \ 的值。具体方法是，针对五条高分记录创建五个字符串，然后评估其中最长字符串的尺寸。由于我们的位图字体是等宽字体，因此可以轻松地通过字符数乘以字形宽度来计算一行文字所需的像素数。当然，这种方法并未考虑非打印字符或\
  \ ASCII 字符集之外的字符。由于我们知道不会使用这些字符，所以这个简单的计算方法是可以接受的。构造函数中的最后一行，则是将最长行宽度的一半从 160（我们目标屏幕\
  \ 320×480 像素的水平中心点）中减去，并进一步减去字形宽度的一半进行调整。之所以需要这样做，是因为 `Font.drawText()` 方法使用的是字形中心点，而非某个角点。\n\
  \n```java\n@Override\npublic void update(float deltaTime) {\n    List<TouchEvent>\
  \ touchEvents = game.getInput().getTouchEvents();\n    game.getInput().getKeyEvents();\n\
  \    int len = touchEvents.size();\n    for (int i = 0; i < len; i++) {\n      \
  \  TouchEvent event = touchEvents.get(i);\n        touchPoint.set(event.x, event.y);\n\
  \        guiCam.touchToWorld(touchPoint);\n\n        if(event.type == TouchEvent.TOUCH_UP)\
  \ {\n            if(OverlapTester.pointInRectangle(backBounds, touchPoint)) {\n\
  \                game.setScreen(new MainMenu(game));\n                return;\n\
  \            }\n        }\n    }\n}\n```\n\n`update()` 方法仅检查箭头按钮是否被按下，如果是，则播放点击音效并切换回主菜单界面。\n\
  \n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    guiCam.setViewportAndMatrices();\n\
  \n    gl.glEnable(GL10.GL_TEXTURE_2D);\n\n    batcher.beginBatch(Assets.background);\n\
  \    batcher.drawSprite(160, 240, 320, 480, Assets.backgroundRegion);\n    batcher.endBatch();\n\
  \n    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \n    batcher.beginBatch(Assets.items);\n    batcher.drawSprite(160, 360, 300, 33,\
  \ Assets.highScoresRegion);\n\n    float y = 240;\n    for (int i = 4; i >= 0; i--)\
  \ {\n        Assets.font.drawText(batcher, highScores[i], xOffset, y);\n       \
  \ y += Assets.font.glyphHeight;\n    }\n\n    batcher.drawSprite(32, 32, 64, 64,\
  \ Assets.arrow);\n    batcher.endBatch();\n\n    gl.glDisable(GL10.GL_BLEND);\n\
  }\n\n@Override\npublic void resume() {\n}\n\n@Override\npublic void pause() {\n\
  }\n\n@Override\npublic void dispose() {\n}\n```\n\n`present()` 方法同样非常直接。我们清屏、设置矩阵、渲染背景、渲染主菜单标签中的高分榜部分，然后利用构造函数中计算出的\
  \ `xOffset` 来渲染五行高分记录。现在我们可以理解为什么 `Font` 不处理纹理绑定：因为我们可以将五次对 `Font.drawText()` 的调用合批处理。当然，我们必须确保\
  \ `SpriteBatcher` 实例能够合批处理渲染文本所需的足够多的精灵（在此例中是字形）。我们在构造函数中以最大批次大小 100 个精灵（字形）创建它时，已经确保了这一点。\n\
  \n接下来，我们来看看游戏模拟部分的各个类。\n\n##### 模拟类\n\n在深入游戏界面之前，我们需要先创建模拟类。我们将沿用 Mr. Nom 中的模式，为每个游戏对象创建一个类，并创建一个无所不包的超类\
  \ `World`，它将所有零散部分联系在一起，驱动我们的游戏世界正常运行。我们需要为以下几个元素创建类：\n\n*   鲍勃\n*   松鼠\n*   弹簧\n\
  *   金币\n*   平台\n\n鲍勃、松鼠和平台可以移动，因此我们将基于上一章创建的 `DynamicGameObject` 来构建它们的类。弹簧和金币是静态的，因此它们将从\
  \ `GameObject` 类派生。每个模拟类的任务如下：\n\n*   存储对象的位置、速度和边界形状。\n*   如有需要，存储对象的状态以及在该状态下持续的时间（状态时间）。\n\
  *   提供一个 `update()` 方法，根据对象的行为逻辑推动其前进。\n*   提供改变对象状态的方法（例如，通知鲍勃已死亡，或触发了弹簧）。\n\n\
  然后，`World` 类将负责管理这些对象的多个实例，在每一帧更新它们，检查对象与鲍勃之间的碰撞，并执行碰撞响应（即，让鲍勃死亡、收集金币等）。我们将从最简单的类开始，逐一介绍每个类。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n## 弹簧类\n\n我们从清单 9–8 中的\
  \ `Spring` 类开始。\n\n**清单 9–8.** `Spring.java`，弹簧类。\n\n```\npackage com.badlogic.androidgames.jumper;\n\
  \nimport com.badlogic.androidgames.framework.GameObject;\n\npublic class Spring\
  \ extends GameObject {\n    public static float SPRING_WIDTH = 0.3f;\n    public\
  \ static float SPRING_HEIGHT = 0.3f;\n\n    public Spring(float x, float y) {\n\
  \        super(x, y, SPRING_WIDTH, SPRING_HEIGHT);\n    }\n}\n```\n\n`Spring` 类继承自\
  \ `GameObject` 类：由于弹簧不移动，我们只需要一个位置和碰撞形状。\n\n接下来，我们定义了两个可公开访问的常量：以米为单位的弹簧宽度和高度。我们之前估算过这些值，此处直接复用。\n\
  \n最后一部分是构造函数，它接收弹簧中心的 x 和 y 坐标。通过它，我们调用父类 `GameObject` 的构造函数，该构造函数接收对象的位置以及宽度和高度，以此来构建一个碰撞形状（一个以给定位置为中心的\
  \ `Rectangle`）。有了这些信息，我们的 `Spring` 就完全定义了，它拥有了一个位置和一个用于碰撞检测的碰撞形状。\n\n## 金币类\n\n\
  接下来是清单 9–9 中的金币类。\n\n**清单 9–9.** `Coin.java`，金币类。\n\n```\npackage com.badlogic.androidgames.jumper;\n\
  \nimport com.badlogic.androidgames.framework.GameObject;\n\npublic class Coin extends\
  \ GameObject {\n    public static final float COIN_WIDTH = 0.5f;\n    public static\
  \ final float COIN_HEIGHT = 0.8f;\n    public static final int COIN_SCORE = 10;\n\
  \n    float stateTime;\n\n    public Coin(float x, float y) {\n        super(x,\
  \ y, COIN_WIDTH, COIN_HEIGHT);\n        stateTime = 0;\n    }\n\n    public void\
  \ update(float deltaTime) {\n        stateTime += deltaTime;\n    }\n}\n```\n\n\
  `Coin` 类与 `Spring` 类几乎相同，只有一个区别：我们记录了金币已存在的时间。稍后当我们想要使用 `Animation` 渲染金币时，需要用到这个信息。在上一章的最后一个示例中，我们对穴居人也做了同样的事情。这是一种我们将用于所有模拟类的技术。给定一个状态和状态时间，我们可以选择一个\
  \ `Animation`，以及用于渲染该 `Animation` 的关键帧。金币只有一个状态，所以我们只需要跟踪状态时间即可。为此，我们提供了 `update()`\
  \ 方法，它会将传入的增量时间累加到状态时间中。\n\n类顶部定义的常量指定了金币的宽度和高度（同我们之前定义的一样），以及 Bob 吃到金币所获得的分数。\n\
  \n## 城堡类\n\n接下来，我们为位于世界顶部的城堡创建一个类。清单 9–10 展示了相关代码。\n\n**清单 9–10.** `Castle.java`，城堡类。\n\
  \n```\npackage com.badlogic.androidgames.jumper;\n\nimport com.badlogic.androidgames.framework.GameObject;\n\
  \npublic class Castle extends GameObject {\n    public static float CASTLE_WIDTH\
  \ = 1.7f;\n    public static float CASTLE_HEIGHT = 1.7f;\n\n    public Castle(float\
  \ x, float y) {\n        super(x, y, CASTLE_WIDTH, CASTLE_HEIGHT);\n    }\n}\n```\n\
  \n这并不复杂。我们只需要存储城堡的位置和边界。城堡的大小由常量 `CASTLE_WIDTH` 和 `CASTLE_HEIGHT` 定义，使用了我们之前讨论过的值。\n\
  \n## 松鼠类\n\n接下来是清单 9–11 中的 `Squirrel` 类。\n\n**清单 9–11.** `Squirrel.java`，松鼠类。\n\n\
  ```\npackage com.badlogic.androidgames.jumper;\n\nimport com.badlogic.androidgames.framework.DynamicGameObject;\n\
  \npublic class Squirrel extends DynamicGameObject {\n    public static final float\
  \ SQUIRREL_WIDTH = 1;\n    public static final float SQUIRREL_HEIGHT = 0.6f;\n \
  \   public static final float SQUIRREL_VELOCITY = 3f;\n\n    float stateTime = 0;\n\
  \n    public Squirrel(float x, float y) {\n        super(x, y, SQUIRREL_WIDTH, SQUIRREL_HEIGHT);\n\
  \        velocity.set(SQUIRREL_VELOCITY, 0);\n    }\n\n    public void update(float\
  \ deltaTime) {\n        position.add(velocity.x * deltaTime, velocity.y * deltaTime);\n\
  \        bounds.lowerLeft.set(position).sub(SQUIRREL_WIDTH / 2, SQUIRREL_HEIGHT\
  \ / 2);\n\n        if (position.x < SQUIRREL_WIDTH / 2) {\n            position.x\
  \ = SQUIRREL_WIDTH / 2;\n            velocity.x = SQUIRREL_VELOCITY;\n        }\n\
  \        if (position.x > World.WORLD_WIDTH - SQUIRREL_WIDTH / 2) {\n          \
  \  position.x = World.WORLD_WIDTH - SQUIRREL_WIDTH / 2;\n            velocity.x\
  \ = -SQUIRREL_VELOCITY;\n        }\n        stateTime += deltaTime;\n    }\n}\n\
  ```\n\n`Squirrel` 是移动对象，因此我们让该类继承自 `DynamicGameObject`，这同时也为我们提供了速度和加速度向量。我们首先定义了松鼠的大小及其速度。由于松鼠是动画对象，我们还需要跟踪其状态时间。和金币一样，松鼠只有一个状态：水平移动。它是向左还是向右移动可以根据速度向量的\
  \ x 分量来判断，因此我们不需要为此存储单独的状态成员。\n\n在构造函数中，我们自然使用松鼠的初始位置和大小调用了父类的构造函数。我们还将速度向量设置为 (`SQUIRREL_VELOCITY`,\
  \ 0)。因此，所有松鼠最初都会向右移动。\n\n`update()` 方法根据速度和增量时间更新松鼠的位置和碰撞形状。这是标准的欧拉积分步骤，我们在上一章中讨论并大量使用过。我们还检查松鼠是否碰到了世界的左边缘或右边缘。如果是这种情况，我们只需反转其速度向量，使其开始向相反方向移动。如前所述，我们世界的宽度固定为\
  \ 10 米。我们要做的最后一件事是根据增量时间更新状态时间，以便之后可以决定使用两个动画帧中的哪一个来渲染这只松鼠。\n\n\n\n### 平台类\n\n`Platform`\
  \ 类如代码清单 9-12 所示。\n\n**代码清单 9-12.** *Platform.java，平台类*\n\n```\npackage com.badlogic.androidgames.jumper;\n\
  \nimport com.badlogic.androidgames.framework.DynamicGameObject;\n\npublic class\
  \ Platform extends DynamicGameObject {\n    public static final float PLATFORM_WIDTH\
  \ = 2;\n    public static final float PLATFORM_HEIGHT = 0.5f;\n    public static\
  \ final int PLATFORM_TYPE_STATIC = 0;\n    public static final int PLATFORM_TYPE_MOVING\
  \ = 1;\n    public static final int PLATFORM_STATE_NORMAL = 0;\n    public static\
  \ final int PLATFORM_STATE_PULVERIZING = 1;\n    public static final float PLATFORM_PULVERIZE_TIME\
  \ = 0.2f * 4;\n    public static final float PLATFORM_VELOCITY = 2;\n```\n\n当然，平台类要稍微复杂一些。让我们逐一过一遍该类中定义的常量。正如之前讨论的，前两个常量定义了平台的宽度和高度。平台具有类型：它可以是静态平台或移动平台。我们通过常量\
  \ `PLATFORM_TYPE_STATIC` 和 `PLATFORM_TYPE_MOVING` 来表示这一点。平台还可以处于两种状态之一：正常状态（即静止或移动）或粉碎状态。该状态通过常量\
  \ `PLATFORM_STATE_NORMAL` 或 `PLATFORM_STATE_PULVERIZING` 进行编码。当然，粉碎是一个有时限的过程。因此，我们定义了平台完全粉碎所需的时间，即\
  \ 0.8 秒。这个值只是根据平台 `Animation` 的帧数和每帧持续时间推导出来的——这是我们在尝试遵循 MVC 模式时必须接受的小小不便之一。最后，如前所述，我们将移动平台的速度定义为\
  \ 2 m/s。移动平台的行为将完全类似于松鼠，它只会朝一个方向移动，直到碰到世界的水平边界，此时它会反转方向。\n\n```\n    int type;\n\
  \    int state;\n    float stateTime;\n\n    public Platform(int type, float x,\
  \ float y) {\n        super(x, y, PLATFORM_WIDTH, PLATFORM_HEIGHT);\n        this.type\
  \ = type;\n        this.state = PLATFORM_STATE_NORMAL;\n        this.stateTime =\
  \ 0;\n        if (type == PLATFORM_TYPE_MOVING) {\n            velocity.x = PLATFORM_VELOCITY;\n\
  \        }\n    }\n```\n\n为了存储 `Platform` 实例的类型、状态和状态时间，我们需要三个成员变量。这些变量在构造函数中根据\
  \ `Platform` 的类型进行初始化，该类型是构造函数的参数之一，此外还有平台中心的位置。\n\n```\n    public void update(float\
  \ deltaTime) {\n        if (type == PLATFORM_TYPE_MOVING) {\n            position.add(velocity.x\
  \ * deltaTime, 0);\n            bounds.lowerLeft.set(position).sub(PLATFORM_WIDTH\
  \ / 2, PLATFORM_HEIGHT / 2);\n\n            if (position.x < PLATFORM_WIDTH / 2)\
  \ {\n                velocity.x = -velocity.x;\n                position.x = PLATFORM_WIDTH\
  \ / 2;\n            }\n            if (position.x > World.WORLD_WIDTH - PLATFORM_WIDTH\
  \ / 2) {\n                velocity.x = -velocity.x;\n                position.x\
  \ = World.WORLD_WIDTH - PLATFORM_WIDTH / 2;\n            }\n        }\n\n      \
  \  stateTime += deltaTime;\n    }\n```\n\n`update()` 方法会移动平台并检查是否超出世界边界，通过反转速度向量进行相应处理。这与我们在\
  \ `Squirrel.update()` 方法中所做的完全相同。我们还在方法末尾更新了状态时间。\n\n```\n    public void pulverize()\
  \ {\n        state = PLATFORM_STATE_PULVERIZING;\n        stateTime = 0;\n     \
  \   velocity.x = 0;\n    }\n}\n```\n\n该类的最后一个方法叫做 `pulverize()`。它将状态从 `PLATFORM_STATE_NORMAL`\
  \ 切换为 `PLATFORM_STATE_PULVERIZING`，并重置状态时间和速度。这意味着移动平台将停止移动。当 `World` 类检测到 Bob 与\
  \ `Platform` 发生碰撞，并基于随机数决定粉碎该 `Platform` 时，将会调用此方法。我们稍后会对此进行讨论。\n\n\n\n### Bob 类\n\
  \n首先需要讨论一下 Bob。`Bob` 类如代码清单 9–13 所示。\n\n### 代码清单 9–13. `Bob.java`\n\n```\npackage\
  \ com.badlogic.androidgames.jumper;\n\nimport com.badlogic.androidgames.framework.DynamicGameObject;\n\
  \npublic class Bob extends DynamicGameObject{\n    public static final int BOB_STATE_JUMP\
  \ = 0;\n    public static final int BOB_STATE_FALL = 1;\n    public static final\
  \ int BOB_STATE_HIT = 2;\n    public static final float BOB_JUMP_VELOCITY = 11;\n\
  \    public static final float BOB_MOVE_VELOCITY = 20;\n    public static final\
  \ float BOB_WIDTH = 0.8f;\n    public static final float BOB_HEIGHT = 0.8f;\n```\n\
  \n我们再次从一系列常量开始。Bob 可以处于三种状态之一：向上跳跃、向下坠落或受到撞击。他还拥有一个垂直跳跃速度（仅作用于 y 轴）和一个水平移动速度（仅作用于\
  \ x 轴）。最后两个常量定义了 Bob 在世界中的宽度和高度。当然，我们还需要存储 Bob 的状态和状态时间。\n\n```\n    int state;\n\
  \    float stateTime;\n\n    public Bob(float x, float y) {\n        super(x, y,\
  \ BOB_WIDTH, BOB_HEIGHT);\n        state = BOB_STATE_FALL;\n        stateTime =\
  \ 0;\n    }\n```\n\n构造函数仅调用父类构造函数，以使 Bob 的中心位置和边界形状正确初始化，然后初始化 `state` 和 `stateTime`\
  \ 成员变量。\n\n```\n    public void update(float deltaTime) {\n        velocity.add(World.gravity.x\
  \ * deltaTime, World.gravity.y * deltaTime);\n        position.add(velocity.x *\
  \ deltaTime, velocity.y * deltaTime);\n        bounds.lowerLeft.set(position).sub(bounds.width\
  \ / 2, bounds.height / 2);\n\n        if(velocity.y > 0 && state != BOB_STATE_HIT)\
  \ {\n            if(state != BOB_STATE_JUMP) {\n                state = BOB_STATE_JUMP;\n\
  \                stateTime = 0;\n            }\n        }\n\n        if(velocity.y\
  \ < 0 && state != BOB_STATE_HIT) {\n            if(state != BOB_STATE_FALL) {\n\
  \                state = BOB_STATE_FALL;\n                stateTime = 0;\n     \
  \       }\n        }\n\n        if(position.x < 0)\n            position.x = World.WORLD_WIDTH;\n\
  \        if(position.x > World.WORLD_WIDTH)\n            position.x = 0;\n\n   \
  \     stateTime += deltaTime;\n    }\n```\n\n`update()` 方法首先根据重力和 Bob 的当前速度更新其位置和边界形状。注意，该速度是重力与\
  \ Bob 自身跳跃及水平移动的复合结果。接下来两个主要的条件块将 Bob 的状态设置为 `BOB_STATE_JUMP` 或 `BOB_STATE_FALL`，并根据其\
  \ y 轴速度分量重新初始化状态时间。若速度大于零，则 Bob 正在上升；若小于零，则正在下降。此操作仅在 Bob 未被撞击且尚未处于正确状态时执行，否则我们会不断将状态时间重置为零，这会对后续\
  \ Bob 的动画效果产生不良影响。我们还会在 Bob 超出世界左右边界时，让他从另一端穿入世界。最后，我们更新 `stateTime` 成员变量。\n\n除了重力，Bob\
  \ 的速度从何而来？这便是其他方法的作用所在。\n\n```\n    public void hitSquirrel() {\n        velocity.set(0,0);\n\
  \        state = BOB_STATE_HIT;\n        stateTime = 0;\n    }\n\n    public void\
  \ hitPlatform() {\n        velocity.y = BOB_JUMP_VELOCITY;\n        state = BOB_STATE_JUMP;\n\
  \        stateTime = 0;\n    }\n\n    public void hitSpring() {\n        velocity.y\
  \ = BOB_JUMP_VELOCITY * 1.5f;\n        state = BOB_STATE_JUMP;\n        stateTime\
  \ = 0;\n    }\n}\n```\n\n当 Bob 碰到松鼠时，`World` 类会调用 `hitSquirrel()` 方法。此时 Bob 停止自主移动并进入\
  \ `BOB_STATE_HIT` 状态。此后只有重力会作用于 Bob，玩家无法再控制他，他也不再与平台交互。这与超级马里奥被敌人击中时的行为类似——他只是向下坠落。\n\
  \n`hitPlatform()` 方法同样由 `World` 类调用。当 Bob 在下落过程中碰到平台时，会触发该方法。此时我们将他的 y 轴速度设为 `BOB_JUMP_VELOCITY`，并相应设置其状态和状态时间。此后\
  \ Bob 将向上运动，直到重力重新占据上风使其下落。\n\n最后一个方法 `hitSpring()` 在 Bob 碰到弹簧时由 `World` 类调用。其功能与\
  \ `hitPlatform()` 方法基本相同，仅有一个区别：初始上升速度被设置为 `BOB_JUMP_VELOCITY` 的 1.5 倍。这意味着 Bob\
  \ 碰到弹簧时，会比碰到平台跳得更高。\n\n\n\n### 世界类\n\n我们需要讨论的最后一个类是 `World` 类。这个类稍微有些长，因此我们将它拆分开来讲解。清单\
  \ 9–14 展示了代码的第一部分。\n\n**清单 9–14.** *摘自 `World.java`：常量、成员变量与初始化。*\n\n```\npackage\
  \ com.badlogic.androidgames.jumper;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\
  import java.util.Random;\n\nimport com.badlogic.androidgames.framework.math.OverlapTester;\n\
  import com.badlogic.androidgames.framework.math.Vector2;\n\npublic class World {\n\
  \    public interface WorldListener {\n        public void jump();\n        public\
  \ void highJump();\n        public void hit();\n        public void coin();\n  \
  \  }\n```\n\n我们首先定义了一个名为 `WorldListener` 的接口。它的作用是什么？我们需要用它来解决一个 MVC 小问题：何时播放音效？我们当然可以直接在对应的模拟类中添加对\
  \ `Assets.playSound()` 的调用，但这种做法不够清晰。因此，我们让 `World` 类的用户注册一个 `WorldListener`，当 Bob\
  \ 从平台上跳跃、从弹簧上弹跳、被松鼠击中或收集金币时，系统会调用这个监听器。稍后，我们会注册一个监听器，由它负责为每个事件播放对应的音效，这样模拟类就不必与渲染和音频播放产生直接依赖关系。\n\
  \n```\npublic static final float WORLD_WIDTH = 10;\npublic static final float WORLD_HEIGHT\
  \ = 15 * 20;\npublic static final int WORLD_STATE_RUNNING = 0;\npublic static final\
  \ int WORLD_STATE_NEXT_LEVEL = 1;\npublic static final int WORLD_STATE_GAME_OVER\
  \ = 2;\npublic static final Vector2 gravity = new Vector2(0, -12);\n```\n\n接下来，我们定义了几个常量。`WORLD_WIDTH`\
  \ 和 `WORLD_HEIGHT` 分别指定了世界的水平范围和垂直范围。请记住，我们的视景体将显示世界中 10×15 米的一个区域。根据这里定义的常量，世界在垂直方向上会跨越\
  \ 20 个视景体（或屏幕的高度）。同样，这个值也是我们通过反复调优得出的。在讨论如何生成关卡时，我们会再次回到这个参数。此外，世界可以处于三种状态之一：运行中、等待下一关卡开始，或者游戏结束——当\
  \ Bob 坠落过远（超出视景体范围）时触发。这里我们还将重力加速度向量定义为一个常量。\n\n```\npublic final Bob bob;\npublic\
  \ final List<Platform> platforms;\npublic final List<Spring> springs;\npublic final\
  \ List<Squirrel> squirrels;\npublic final List<Coin> coins;\npublic Castle castle;\n\
  public final WorldListener listener;\npublic final Random rand;\n\npublic float\
  \ heightSoFar;\npublic int score;\npublic int state;\n```\n\n接下来是 `World` 类的所有成员变量。它负责追踪\
  \ Bob；所有 `Platform`、`Spring`、`Squirrel` 和 `Coin` 对象；以及 `Castle`。此外，它还包含一个指向 `WorldListener`\
  \ 的引用和一个 `Random` 实例，后者用于生成各种随机数。最后三个成员变量则用于记录 Bob 目前已到达的最高高度、世界的状态以及已获得的分数。\n\n\
  ```\npublic World(WorldListener listener) {\n    this.bob = new Bob(5, 1);\n   \
  \ this.platforms = new ArrayList<Platform>();\n    this.springs = new ArrayList<Spring>();\n\
  \    this.squirrels = new ArrayList<Squirrel>();\n    this.coins = new ArrayList<Coin>();\n\
  \    this.listener = listener;\n    rand = new Random();\n    generateLevel();\n\
  \n    this.heightSoFar = 0;\n    this.score = 0;\n    this.state = WORLD_STATE_RUNNING;\n\
  }\n```\n\n构造函数初始化了所有成员变量，并存储了作为参数传入的 `WorldListener`。Bob 在水平方向上被放置在世界中间，在垂直方向上位于地面略微上方\
  \ (5,1) 处。其余部分基本不言自明，只有一个例外：`generateLevel()` 方法。\n\n##### 生成世界\n\n你可能已经感到好奇，我们究竟是如何创建世界中的对象并进行放置的呢？我们采用了一种称为程序化生成的方法。我们设计了一个简单的算法，它会为我们随机生成一个关卡。清单\
  \ 9–15 展示了相关代码。\n\n**清单 9–15.** *摘自 `World.java`：`generateLevel()` 方法。*\n\n```\n\
  private void generateLevel() {\n    float y = Platform.PLATFORM_HEIGHT / 2;\n  \
  \  float maxJumpHeight = Bob.BOB_JUMP_VELOCITY * Bob.BOB_JUMP_VELOCITY\n       \
  \     / (2 * -gravity.y);\n    while (y < WORLD_HEIGHT - WORLD_WIDTH / 2) {\n  \
  \      int type = rand.nextFloat() > 0.8f ? Platform.PLATFORM_TYPE_MOVING\n    \
  \            : Platform.PLATFORM_TYPE_STATIC;\n        float x = rand.nextFloat()\n\
  \                * (WORLD_WIDTH - Platform.PLATFORM_WIDTH)\n                + Platform.PLATFORM_WIDTH\
  \ / 2;\n\n        Platform platform = new Platform(type, x, y);\n        platforms.add(platform);\n\
  \n        if (rand.nextFloat() > 0.9f\n                && type != Platform.PLATFORM_TYPE_MOVING)\
  \ {\n            Spring spring = new Spring(platform.position.x,\n             \
  \       platform.position.y + Platform.PLATFORM_HEIGHT / 2\n                   \
  \         + Spring.SPRING_HEIGHT / 2);\n            springs.add(spring);\n     \
  \   }\n\n        if (y > WORLD_HEIGHT / 3 && rand.nextFloat() > 0.8f) {\n      \
  \      Squirrel squirrel = new Squirrel(platform.position.x\n                  \
  \  + rand.nextFloat(), platform.position.y\n                    + Squirrel.SQUIRREL_HEIGHT\
  \ + rand.nextFloat() * 2);\n            squirrels.add(squirrel);\n        }\n\n\
  \        if (rand.nextFloat() > 0.6f) {\n            Coin coin = new Coin(platform.position.x\
  \ + rand.nextFloat(),\n                    platform.position.y + Coin.COIN_HEIGHT\n\
  \                            + rand.nextFloat() * 3);\n            coins.add(coin);\n\
  \        }\n\n        y += (maxJumpHeight - 0.5f);\n        y -= rand.nextFloat()\
  \ * (maxJumpHeight / 3);\n    }\n    castle = new Castle(WORLD_WIDTH / 2, y);\n\
  }\n```\n\n让我们用通俗的语言概括一下这个算法的总体思路：\n\n1.  从世界的底部 `y = 0` 处开始。\n2.  在未到达世界顶部之前，重复执行以下步骤：\n\
  \   1.  在当前 `y` 位置创建一个平台（移动或静止），其 `x` 位置随机。\n   2.  生成一个 0 到 1 之间的随机数，如果该数大于 0.9\
  \ 且平台不是移动的，则在该平台上方创建一个弹簧。\n   3.  如果当前 `y` 值超过了关卡高度的三分之一，则生成一个随机数；如果该数大于 0.8，则在平台位置周围随机偏移一个位置创建一只松鼠。\n\
  \   4.  生成一个随机数，如果该数大于 0.6，则在平台位置周围随机偏移一个位置创建一个金币。\n   5.  将 `y` 增加 Bob 的最大正常跳跃高度，再略微随机减少一点——但减少幅度要保证\
  \ `y` 值不低于上一个 `y` 值——然后返回步骤 2。\n3.  将城堡放置在最后一个 `y` 位置，并水平居中。\n\n这个过程的核心秘密在于步骤 2e\
  \ 中如何增加下一个平台的 `y` 位置。我们必须确保 Bob 能从当前平台跳到下一个平台。考虑到 Bob 的初始垂直跳跃速度为 11 m/s，他跳跃的高度受重力限制。如何计算\
  \ Bob 能跳多高呢？我们可以用以下公式：\n\n```\n高度 = 速度 × 速度 / (2 × 重力) = 11 × 11 / (2 × 13) ≈ 4.6\
  \ 米\n```\n\n\n\n这意味着每个平台之间的垂直距离应为 4.6 米，这样鲍勃才能触碰到平台。为了确保所有平台都可触及，我们采用略低于最大跳跃高度的数值。这能保证鲍勃总能从一个平台跳到下一个。平台的横向放置位置仍然是随机的。考虑到鲍勃的横向移动速度为\
  \ 20 米/秒，我们有充分把握他不仅能垂直抵达平台，也能横向到达。\n\n其他对象则是基于随机概率生成的。`Random.nextFloat()` 方法每次调用时会返回一个介于\
  \ 0 到 1 之间的随机数值，每个数值出现的概率均等。只有当从`Random`获取的随机数大于 0.8 时，才会生成松鼠。这意味着我们生成松鼠的概率是 20%（1\
  \ − 0.8）。所有其他随机生成的对象也是如此。通过调整这些数值，我们可以控制世界中对象的数量。\n\n### 更新世界\n\n生成世界后，我们需要更新其中的所有对象并检测碰撞。代码清单\
  \ 9–16 展示了`World`类的更新方法。\n\n**代码清单 9–16.** *摘自 World.java：更新方法*\n\n```\npublic void\
  \ update(float deltaTime, float accelX) {\n    updateBob(deltaTime, accelX);\n \
  \   updatePlatforms(deltaTime);\n    updateSquirrels(deltaTime);\n    updateCoins(deltaTime);\n\
  \    if (bob.state != Bob.BOB_STATE_HIT)\n        checkCollisions();\n    checkGameOver();\n\
  }\n```\n\n`update()` 方法将由游戏屏幕后续调用。它接收时间增量与加速度计 x 轴加速度作为参数，负责调用其他更新方法，并执行碰撞检测和游戏结束检查。我们为世界中的每种对象类型都设置了一个更新方法。\n\
  \n```\nprivate void updateBob(float deltaTime, float accelX) {\n    if (bob.state\
  \ != Bob.BOB_STATE_HIT && bob.position.y <= 0.5f)\n        bob.hitPlatform();\n\
  \    if (bob.state != Bob.BOB_STATE_HIT)\n        bob.velocity.x = -accelX / 10\
  \ * Bob.BOB_MOVE_VELOCITY;\n    bob.update(deltaTime);\n    heightSoFar = Math.max(bob.position.y,\
  \ heightSoFar);\n}\n```\n\n`updateBob()` 方法负责更新鲍勃的状态。它首先检查鲍勃是否触碰到了世界的底部，如果是，则指示鲍勃进行跳跃。这意味着在每个关卡开始时，鲍勃可以从地面起跳。当然，一旦地面移出视野，这一机制就不再生效。接着，我们根据传入的加速度计\
  \ x 轴数值更新鲍勃的水平速度。如前所述，我们将数值从−10 到 10 的范围归一化为−1 到 1（从完全向左倾斜到完全向右倾斜），再乘以鲍勃的标准移动速度。随后，通过调用`Bob.update()`\
  \ 方法让鲍勃自行更新。最后，我们记录鲍勃迄今为止到达的最高 y 坐标位置，用于后续判断鲍勃是否坠落过深。\n\n```\nprivate void updatePlatforms(float\
  \ deltaTime) {\n    int len = platforms.size();\n    for (int i = 0; i < len; i++)\
  \ {\n        Platform platform = platforms.get(i);\n        platform.update(deltaTime);\n\
  \        if (platform.state == Platform.PLATFORM_STATE_PULVERIZING\n           \
  \     && platform.stateTime > Platform.PLATFORM_PULVERIZE_TIME) {\n            platforms.remove(platform);\n\
  \            len = platforms.size();\n        }\n    }\n}\n```\n\n接下来，我们在`updatePlatforms()`\
  \ 中更新所有平台。遍历平台列表，对每个平台调用其`update()` 方法并传入当前时间增量。如果平台处于粉碎状态，则检查该状态持续的时间。若平台在`PLATFORM_STATE_PULVERIZING`\
  \ 状态下的时间超过`PLATFORM_PULVERIZE_TIME`，则将其从平台列表中移除。\n\n```\nprivate void updateSquirrels(float\
  \ deltaTime) {\n    int len = squirrels.size();\n    for (int i = 0; i < len; i++)\
  \ {\n        Squirrel squirrel = squirrels.get(i);\n        squirrel.update(deltaTime);\n\
  \    }\n}\n\nprivate void updateCoins(float deltaTime) {\n    int len = coins.size();\n\
  \    for (int i = 0; i < len; i++) {\n        Coin coin = coins.get(i);\n      \
  \  coin.update(deltaTime);\n    }\n}\n```\n\n在`updateSquirrels()` 方法中，我们通过调用每个`Squirrel`\
  \ 实例的`update()` 方法并传入当前时间增量来更新它们。对于金币，我们在`updateCoins()` 方法中执行相同的操作。\n\n\n\n######\
  \ 碰撞检测与响应\n\n回顾我们最初的 `World.update()` 方法，可以看到接下来要做的是检测 Bob 与世界中所有他可能碰撞的其他物体之间的碰撞。只有当\
  \ Bob 处于不等于 `BOB_STATE_HIT` 的状态时，我们才会执行此操作，否则他会因重力继续下落。让我们看看 代码清单 9-17 中的这些碰撞检测方法。\n\
  \n**代码清单 9-17.** *World.java 摘录：碰撞检测方法。*\n\n```java\nprivate void checkCollisions()\
  \ {\n    checkPlatformCollisions();\n    checkSquirrelCollisions();\n    checkItemCollisions();\n\
  \    checkCastleCollisions();\n}\n```\n\n`checkCollisions()` 方法大致上是一个主方法，它只是调用所有其他碰撞检测方法。Bob\
  \ 会与世界中的几种物体碰撞：平台、松鼠、金币、弹簧和城堡。对于每种物体类型，我们都有一个单独的碰撞检测方法。请记住，我们在更新了世界中所有物体的位置和边界形状之后调用此方法及其子方法。可以将其视为在特定时间点对世界状态的一个快照。我们所做的就是观察这个静止图像，看看是否有任何重叠。然后，我们可以采取行动，通过操控物体的状态、位置、速度等，确保发生碰撞的物体在下一帧中对这些重叠或碰撞做出反应。\n\
  \n```java\nprivate void checkPlatformCollisions() {\nif (bob.velocity.y > 0)\nreturn;\n\
  \nint len = platforms.size();\nfor (int i = 0; i < len; i++) {\n        Platform\
  \ platform = platforms.get(i);\nif (bob.position.y > platform.position.y) {\nif\
  \ (OverlapTester\n                    .overlapRectangles(bob.bounds, platform.bounds))\
  \ {\n                bob.hitPlatform();\n                listener.jump();\nif (rand.nextFloat()\
  \ > 0.5f) {\n                    platform.pulverize();\n                }\nbreak;\n\
  \            }\n        }\n    }\n}\n```\n\n在 `checkPlatformCollisions()` 方法中，我们检测\
  \ Bob 与世界中的任何平台之间是否有重叠。如果 Bob 正在上升途中，我们会提前跳出该方法。这样 Bob 就能从下方穿过平台。对于《超级跳跃者》来说，这是一种良好的行为；而在像《超级马里奥兄弟》这样的游戏中，如果\
  \ Bob 从下方撞到方块，我们可能希望他掉下来。\n\n接下来，我们遍历所有平台，检查 Bob 是否在当前平台上方。如果是，则测试他的边界矩形是否与平台的边界矩形重叠。如果重叠，我们通过调用\
  \ `Bob.hitPlatform()` 告知 Bob 他撞到了平台。回顾那个方法，可以看到它会触发一次跳跃并相应地设置 Bob 的状态。然后，我们调用 `WorldListener.jump()`\
  \ 方法通知监听器 Bob 刚刚又开始跳跃了。稍后我们会利用这一点在监听器中播放相应的音效。最后，我们获取一个随机数，如果它大于 0.5，我们就让平台自行粉碎。该平台将再存活\
  \ `PLATFORM_PULVERIZE_TIME` 秒（0.8），然后会在前面展示的 `updatePlatforms()` 方法中被移除。当渲染该平台时，我们将使用它的状态时间来决定播放哪个平台动画关键帧。\n\
  \n```java\nprivate void checkSquirrelCollisions() {\nint len = squirrels.size();\n\
  for (int i = 0; i < len; i++) {\n        Squirrel squirrel = squirrels.get(i);\n\
  if (OverlapTester.overlapRectangles(squirrel.bounds, bob.bounds)) {\n          \
  \  bob.hitSquirrel();\n            listener.hit();\n        }\n    }\n}\n```\n\n\
  `checkSquirrelCollisions()` 方法测试 Bob 的边界矩形与每只松鼠的边界矩形是否重叠。如果 Bob 撞到松鼠，我们会让他进入 `BOB_STATE_HIT`\
  \ 状态，这将使他坠落，并且玩家无法再控制他。我们还会通知 `WorldListener`，以便它播放音效。\n\n```java\nprivate void\
  \ checkItemCollisions() {\nint len = coins.size();\nfor (int i = 0; i < len; i++)\
  \ {\n        Coin coin = coins.get(i);\nif (OverlapTester.overlapRectangles(bob.bounds,\
  \ coin.bounds)) {\n            coins.remove(coin);\n            len = coins.size();\n\
  \            listener.coin();\n            score += Coin.COIN_SCORE;\n        }\n\
  \n    }\n\nif (bob.velocity.y > 0)\nreturn;\n\n    len = springs.size();\nfor (int\
  \ i = 0; i < len; i++) {\n        Spring spring = springs.get(i);\nif (bob.position.y\
  \ > spring.position.y) {\nif (OverlapTester.overlapRectangles(bob.bounds, spring.bounds))\
  \ {\n                bob.hitSpring();\n                listener.highJump();\n  \
  \          }\n        }\n    }\n}\n```\n\n`checkItemCollisions()` 方法检测 Bob 与世界中的所有金币和所有弹簧。如果\
  \ Bob 撞到金币，我们会从世界中移除该金币，通知监听器收取了一枚金币，并将当前分数增加 `COIN_SCORE`。如果 Bob 正在向下坠落，我们还会检测\
  \ Bob 与世界中的所有弹簧。如果他撞到弹簧，我们会告知他，以便他执行一次比平常更高的跳跃。我们也会通知监听器这一事件。\n\n```java\nprivate\
  \ void checkCastleCollisions() {\nif (OverlapTester.overlapRectangles(castle.bounds,\
  \ bob.bounds)) {\n        state = WORLD_STATE_NEXT_LEVEL;\n    }\n}\n```\n\n最后一个方法检测\
  \ Bob 与城堡的碰撞。如果 Bob 撞到城堡，我们将世界状态设置为 `WORLD_STATE_NEXT_LEVEL`，向任何外部实体（例如我们的游戏屏幕）发出信号，表示我们应该过渡到下一关，下一关又将是一个随机生成的\
  \ `World` 实例。\n\n###### 游戏结束，伙计！\n\n`World` 类中最后一个方法（在 `World.update()` 方法的最后一行被调用）如\
  \ 代码清单 9-18 所示。\n\n**代码清单 9-18.** *World.java 的其余部分：游戏结束检测方法。*\n\n```java\nprivate\
  \ void checkGameOver() {\nif (heightSoFar - 7.5f > bob.position.y) {\nstate = WORLD_STATE_GAME_OVER;\n\
  \        }\n    }\n}\n```\n\n回想一下我们如何定义游戏结束状态：Bob 必须离开视锥体的底部。视锥体自然由一个 `Camera2D`\
  \ 实例控制，该实例有一个位置。该位置的 y 坐标始终等于 Bob 迄今为止达到的最大 y 坐标，因此摄像机会在一定程度上跟随 Bob 向上移动。由于我们希望保持渲染和模拟代码分离，因此我们在世界中并没有对摄像机的引用。因此，我们在\
  \ `updateBob()` 中跟踪 Bob 的最高 y 坐标，并将该值存储在 `heightSoFar` 中。我们知道视锥体的高度是 15 米。因此，我们也知道如果\
  \ Bob 的 y 坐标低于 `heightSoFar` - 7.5，那么他就已经从底部边缘离开了视锥体。这时 Bob 就被宣告死亡。当然，这有点取巧，因为它基于这样的假设：视锥体的高度始终是\
  \ 15 米，并且摄像机始终位于 Bob 迄今为止能达到的最高 y 坐标处。如果我们允许缩放或使用不同的摄像机跟随方法，这就不再成立。不过，我们不会把事情搞得太复杂，就这样保留原样。在游戏开发中，你经常会面临这样的决策，因为有时很难从软件工程的角度保持一切整洁（从我们过度使用公有或包私有成员就可以看出）。\n\
  \n你可能想知道为什么我们不使用上一章开发的 `SpatialHashGrid` 类。稍后我们会告诉你原因。让我们先实现 `GameScreen` 类来完成游戏。\n\
  \n\n\n### 游戏界面\n\n《超级跳跃者》的开发已接近尾声。最后需要实现的是游戏界面，它将向玩家展示真实的游戏世界，并允许玩家与之交互。游戏界面包含五个子界面，如图\
  \ 9-2 所示。我们分别有：准备界面、正常运行界面、下一关界面、游戏结束界面和暂停界面。之前《Nom 先生》中的游戏界面与此类似，只是由于只有一关，所以缺少了下一关界面。我们将沿用《Nom\
  \ 先生》中的方法：为所有子界面编写独立的更新和呈现方法，这些方法负责更新和渲染游戏世界，以及子界面中的 UI 元素。由于游戏界面代码稍长，我们将分多个代码清单展示。清单\
  \ 9-19 展示了游戏界面的第一部分。\n\n**清单 9-19.** *摘自 GameScreen.java：成员变量与构造函数。*\n\n```\npackage\
