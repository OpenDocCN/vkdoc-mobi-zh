  \n## `update()`方法\n\n```java\n@Override\npublic void update(float deltaTime) {\n\
  \    game.getInput().getTouchEvents();\n    float x = game.getInput().getTouchX(0);\n\
  \    float y = game.getInput().getTouchY(0);\n    guiCamera.touchToWorld(touchPos.set(x,\
