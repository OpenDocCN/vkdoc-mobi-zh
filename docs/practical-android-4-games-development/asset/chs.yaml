  我们继承自 `GLGame`，并实现了 `getStartScreen()` 方法，该方法返回一个 `MainMenuScreen` 实例。另外两个方法不太容易理解。\n\
  \n我们重写了 `onSurfaceCreate()` 方法，每次 OpenGL ES 上下文重新创建时都会调用该方法（可参考第 6 章中 `GLGame` 的代码）。如果该方法首次被调用，我们会使用\
  \ `Assets.load()` 方法来加载所有资源，并尝试从 SD 卡上的设置文件中加载设置项。否则，我们只需要通过 `Assets.reload()` 方法重新加载纹理并开始播放音乐。我们还重写了\
  \ `onPause()` 方法，以便在音乐正在播放时暂停它。\n\n我们这样做是为了避免在屏幕的 `resume()` 和 `pause()` 方法中重复执行这些操作。\n\
  \n在深入讲解屏幕实现之前，让我们先看看新的 `Font` 类。\n\n\n\n### Font 类\n\n我们将使用位图字体渲染任意（ASCII）文本。我们已经在高层次上讨论过这是如何工作的，现在让我们看看代码清单\
  \ 9–4 中的代码。\n\n**代码清单 9–4.** `Font.java`，一个位图字体渲染类\n\n```\npackage com.badlogic.androidgames.framework.gl;\n\
  \npublic class Font {\n    public final Texture texture;\n    public final int glyphWidth;\n\
  \    public final int glyphHeight;\n    public final TextureRegion[] glyphs = new\
  \ TextureRegion[96];\n```\n\n该类存储了包含字体字形的纹理、单个字形的宽度和高度，以及一个`TextureRegion`数组——每个字形对应一个。数组中的第一个元素保存空格字形的区域，下一个元素保存感叹号字形的区域，以此类推。换句话说，第一个元素对应\
  \ ASCII 字符代码 32，最后一个元素对应 ASCII 字符代码 127。\n\n```\n    public Font(Texture texture,\n\
  \                int offsetX, int offsetY,\n                int glyphsPerRow, int\
  \ glyphWidth, int glyphHeight) {\n        this.texture = texture;\n        this.glyphWidth\
  \ = glyphWidth;\n        this.glyphHeight = glyphHeight;\n        int x = offsetX;\n\
  \        int y = offsetY;\n        for (int i = 0; i < 96; i++) {\n            glyphs[i]\
  \ = new TextureRegion(texture, x, y, glyphWidth, glyphHeight);\n            x +=\
  \ glyphWidth;\n            if (x == offsetX + glyphsPerRow * glyphWidth) {\n   \
  \             x = offsetX;\n                y += glyphHeight;\n            }\n \
  \       }\n    }\n```\n\n在构造函数中，我们存储位图字体的配置并生成字形区域。参数`offsetX`和`offsetY`指定纹理中位图字体区域的左上角。在我们的纹理图集中，那是位于(224,0)的像素。参数`glyphsPerRow`告诉我们每行有多少个字形，参数`glyphWidth`和`glyphHeight`指定单个字形的大小。由于我们使用固定宽度的位图字体，该大小对所有字形都相同。`glyphWidth`也是我们在渲染多个字形时向前移动的值。\n\
  \n```\n    public void drawText(SpriteBatcher batcher, String text, float x, float\
  \ y) {\n        int len = text.length();\n        for (int i = 0; i < len; i++)\
  \ {\n            int c = text.charAt(i) - ' ';\n            if (c < 0 || c > glyphs.length\
  \ - 1)\n                continue;\n\n            TextureRegion glyph = glyphs[c];\n\
  \            batcher.drawSprite(x, y, glyphWidth, glyphHeight, glyph);\n       \
  \     x += glyphWidth;\n        }\n    }\n}\n```\n\n`drawText()`方法接受一个`SpriteBatcher`实例、一行文本以及开始绘制文本的\
  \ x 和 y 位置。x 和 y 坐标指定第一个字形的中心。我们要做的就是从字符串中获取每个字符的索引，检查我们是否有对应的字形，如果有，则通过`SpriteBatcher`渲染它。然后我们将\
  \ x 坐标增加`glyphWidth`，以便可以开始渲染字符串中的下一个字符。\n\n你可能想知道为什么我们不需要绑定包含字形的纹理。我们假设在调用`drawText()`之前已经完成了绑定。原因是文本渲染可能是一个批次的一部分，在这种情况下纹理必须已经绑定。为什么要在`drawText()`方法中不必要地再次绑定它？记住，OpenGL\
  \ ES 最喜欢最少的状态变更。\n\n当然，我们只能使用这个类处理固定宽度的字体。如果我们想要支持更通用的字体，我们还需要了解每个字符的推进距离。一个解决方案是使用字距调整，如“使用位图字体处理文本”部分所述。不过，我们对这个简单的解决方案很满意。\n\
  \n### GLScreen\n\n在最后两章的示例中，我们总是通过类型转换来获取`GLGraphics`的引用。让我们用一个名为`GLScreen`的小辅助类来解决这个问题，它将为我们完成这些繁重的工作，并将`GLGraphics`的引用存储在一个成员中。代码清单\
  \ 9–5 显示了代码。\n\n**代码清单 9–5.** `GLScreen.java`，一个小辅助类。\n\n```\npackage com.badlogic.androidgames.framework.impl;\n\
  \nimport com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Screen;\n\
  \npublic abstract class GLScreen extends Screen {\n    protected final GLGraphics\
  \ glGraphics;\n    protected final GLGame glGame;\n\n    public GLScreen(Game game)\
  \ {\n        super(game);\n        glGame = (GLGame)game;\n        glGraphics =\
  \ ((GLGame)game).getGLGraphics();\n    }\n\n}\n```\n\n我们存储了`GLGraphics`和`GLGame`实例。当然，如果作为参数传递给构造函数的`Game`实例不是`GLGame`，这会崩溃。但我们会确保它是。`Super\
  \ Jumper`的所有屏幕都将派生自这个类。\n\n\n\n### 主菜单界面\n\n该界面由 `SuperJumper.getStartScreen()`\
  \ 返回，因此是玩家看到的第一个界面。它负责渲染背景和 UI 元素，并等待我们触摸任一 UI 元素。根据被触摸的元素，我们可以切换配置（启用/禁用音效）或跳转到新界面。代码清单\
  \ 9-6 展示了相关代码。\n\n**代码清单 9-6.** *MainMenuScreen.java：主菜单界面。*\n\n```\npackage com.badlogic.androidgames.jumper;\n\
  \nimport java.util.List;\n\nimport javax.microedition.khronos.opengles.GL10;\n\n\
  import com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.gl.Camera2D;\nimport com.badlogic.androidgames.framework.gl.SpriteBatcher;\n\
  import com.badlogic.androidgames.framework.impl.GLScreen;\nimport com.badlogic.androidgames.framework.math.OverlapTester;\n\
  import com.badlogic.androidgames.framework.math.Rectangle;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  \npublic class MainMenuScreen extends GLScreen {\n    Camera2D guiCam;\n    SpriteBatcher\
  \ batcher;\n    Rectangle soundBounds;\n    Rectangle playBounds;\n    Rectangle\
  \ highscoresBounds;\n    Rectangle helpBounds;\n    Vector2 touchPoint;\n```\n\n\
  该类继承自 `GLScreen`，因此我们可以更方便地访问 `GLGraphics` 实例。\n\n该类包含几个成员变量。第一个是名为 `guiCam` 的 `Camera2D`\
  \ 实例。我们还需要一个 `SpriteBatcher` 来渲染背景和 UI 元素。我们将使用 `Rectangle` 类来确定用户是否触摸了某个 UI 元素。由于使用了\
  \ `Camera2D`，我们还需要一个 `Vector2` 实例来将触摸坐标转换为世界坐标。\n\n```\n    public MainMenuScreen(Game\
  \ game) {\n        super(game);\n        guiCam = new Camera2D(glGraphics, 320,\
  \ 480);\n        batcher = new SpriteBatcher(glGraphics, 100);\n        soundBounds\
  \ = new Rectangle(0, 0, 64, 64);\n        playBounds = new Rectangle(160 - 150,\
  \ 200 + 18, 300, 36);\n        highscoresBounds = new Rectangle(160 - 150, 200 -\
  \ 18, 300, 36);\n        helpBounds = new Rectangle(160 - 150, 200 - 18 - 36, 300,\
  \ 36);\n        touchPoint = new Vector2();\n    }\n```\n\n在构造函数中，我们简单地初始化了所有成员。这里有一个惊喜：`Camera2D`\
  \ 实例让我们可以在 320×480 像素的目标分辨率下工作。我们只需将视景体的宽度和高度设置为合适的值，其余工作由 OpenGL ES 自动完成。但请注意，原点仍然在左下角，y\
  \ 轴向上。我们将在所有包含 UI 元素的界面中使用这种 GUI 摄像机，以便用像素坐标而非世界坐标进行布局。当然，在非 320×480 像素的屏幕上我们有所取巧，但早先在《Mr.\
  \ Nom》中已经这么做过了，所以不必为此感到不安。为每个 UI 元素设置的 `Rectangle` 均以像素坐标给出。\n\n```\n    @Override\n\
  \    public void update(float deltaTime) {\n        List<TouchEvent> touchEvents\
  \ = game.getInput().getTouchEvents();\n        game.getInput().getKeyEvents();\n\
  \n        int len = touchEvents.size();\n        for (int i = 0; i < len; i++) {\n\
  \            TouchEvent event = touchEvents.get(i);\n            if (event.type\
  \ == TouchEvent.TOUCH_UP) {\n                touchPoint.set(event.x, event.y);\n\
  \                guiCam.touchToWorld(touchPoint);\n\n                if (OverlapTester.pointInRectangle(playBounds,\
  \ touchPoint)) {\n                    Assets.playSound(Assets.clickSound);\n   \
  \                 game.setScreen(new GameScreen(game));\n                    return;\n\
  \                }\n                if (OverlapTester.pointInRectangle(highscoresBounds,\
  \ touchPoint)) {\n                    Assets.playSound(Assets.clickSound);\n   \
  \                 game.setScreen(new HighscoresScreen(game));\n                \
  \    return;\n                }\n                if (OverlapTester.pointInRectangle(helpBounds,\
  \ touchPoint)) {\n                    Assets.playSound(Assets.clickSound);\n   \
  \                 game.setScreen(new HelpScreen(game));\n                    return;\n\
  \                }\n                if (OverlapTester.pointInRectangle(soundBounds,\
  \ touchPoint)) {\n                    Assets.playSound(Assets.clickSound);\n   \
  \                 Settings.soundEnabled = !Settings.soundEnabled;\n            \
  \        if (Settings.soundEnabled)\n                        Assets.music.play();\n\
  \                    else\n                        Assets.music.pause();\n     \
  \           }\n            }\n        }\n    }\n```\n\n接下来是 `update()` 方法。我们遍历由\
  \ `Input` 实例返回的 `TouchEvent` 列表，并检查触摸抬起事件。如果检测到此类事件，我们首先将触摸坐标转换为世界坐标。由于摄像机的设置使我们可以在目标分辨率下工作，因此该转换在\
  \ 320×480 像素的屏幕上简化为翻转 y 坐标。在更大或更小的屏幕上，我们只需将触摸坐标转换到目标分辨率即可。获得世界触摸点后，我们将其与 UI 元素的矩形范围进行比对。如果“开始游戏”、“高分榜”或“帮助”被触摸，则跳转到相应界面。若音效按钮被按下，则更改设置并恢复或暂停音乐。另外请注意，通过\
  \ `Assets.playSound()` 方法，每当 UI 元素被触摸时都会播放点击音效。\n\n```\n    @Override\n    public\
