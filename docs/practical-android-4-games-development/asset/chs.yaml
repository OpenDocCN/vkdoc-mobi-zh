  \ `World` 和 `WorldRenderer` 实例。我们还告诉 `World` 延续当前已取得的分数，并将游戏屏幕设置为 `GAME_READY` 状态，该状态将再次等待一个触摸事件。\n\
  \n```\nprivate void updateGameOver() {\n    List<TouchEvent> touchEvents = game.getInput().getTouchEvents();\n\
  \    int len = touchEvents.size();\n    for(int i = 0; i < len; i++) {\n       \
  \ TouchEvent event = touchEvents.get(i);\n        if(event.type != TouchEvent.TOUCH_UP)\n\
  \            continue;\n        game.setScreen(new MainMenuScreen(game));\n    }\n\
  }\n```\n\n在 `updateGameOver()` 方法中，我们再次仅检查一个触摸事件，一旦发生，就返回主菜单，如图 9–2 所示。\n\n\n\n\
  ### 渲染游戏界面\n\n经过所有更新后，游戏界面将通过调用 `GameScreen.present()` 来请求渲染自身。我们来看看代码清单 9-21 中的这个方法。\n\
  \n**代码清单 9-21.** *GameScreen.java 节选：渲染方法*\n\n```\n@Override\npublic void present(float\
  \ deltaTime) {\n    GL10 gl = glGraphics.getGL();\n    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n\
  \    gl.glEnable(GL10.GL_TEXTURE_2D);\n\n    renderer.render();\n\n    guiCam.setViewportAndMatrices();\n\
  \    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \    batcher.beginBatch(Assets.items);\n    switch(state) {\n    case GAME_READY:\n\
  \        presentReady();\n        break;\n    case GAME_RUNNING:\n        presentRunning();\n\
  \        break;\n    case GAME_PAUSED:\n        presentPaused();\n        break;\n\
  \    case GAME_LEVEL_END:\n        presentLevelEnd();\n        break;\n    case\
  \ GAME_OVER:\n        presentGameOver();\n        break;\n    }\n    batcher.endBatch();\n\
  \    gl.glDisable(GL10.GL_BLEND);\n}\n```\n\n游戏界面的渲染分两步完成。我们首先通过 `WorldRenderer`\
  \ 类渲染实际游戏世界，然后根据游戏界面的当前状态，在游戏世界之上渲染所有 UI 元素。`render()` 方法正是执行此操作。与更新方法类似，我们为所有子界面也分别设有单独的渲染方法。\n\
  \n```\nprivate void presentReady() {\n    batcher.drawSprite(160, 240, 192, 32,\
  \ Assets.ready);\n}\n```\n\n`presentRunning()` 方法仅显示右上角的暂停按钮以及左上角的得分字符串。\n\n```\n\
  private void presentRunning() {\n    batcher.drawSprite(320 - 32, 480 - 32, 64,\
  \ 64, Assets.pause);\n    Assets.font.drawText(batcher, scoreString, 16, 480-20);\n\
  }\n```\n\n在 `presentRunning()` 方法中，我们仅渲染暂停按钮和当前得分字符串。\n\n```\nprivate void presentPaused()\
  \ {\n    batcher.drawSprite(160, 240, 192, 96, Assets.pauseMenu);\n    Assets.font.drawText(batcher,\
  \ scoreString, 16, 480-20);\n}\n```\n\n`presentPaused()` 方法显示暂停菜单 UI 元素并再次显示得分。\n\
  \n```\nprivate void presentLevelEnd() {\n    String topText = \"the princess is\
  \ ...\";\n    String bottomText = \"in another castle!\";\n    float topWidth =\
  \ Assets.font.glyphWidth * topText.length();\n    float bottomWidth = Assets.font.glyphWidth\
  \ * bottomText.length();\n    Assets.font.drawText(batcher, topText, 160 - topWidth\
  \ / 2, 480 - 40);\n    Assets.font.drawText(batcher, bottomText, 160 - bottomWidth\
  \ / 2, 40);\n}\n```\n\n`presentLevelEnd()` 方法在屏幕顶部渲染字符串“公主在……”，在屏幕底部渲染字符串“另一个城堡！”，如图\
  \ 9-2 所示。我们进行了一些计算以使这些字符串水平居中。\n\n```\nprivate void presentGameOver() {\n    batcher.drawSprite(160,\
  \ 240, 160, 96, Assets.gameOver);\n    float scoreWidth = Assets.font.glyphWidth\
  \ * scoreString.length();\n    Assets.font.drawText(batcher, scoreString, 160 -\
  \ scoreWidth / 2, 480-20);\n}\n```\n\n`presentGameOver()` 方法显示游戏结束 UI 元素以及得分字符串。请记住，得分屏幕在\
  \ `updateRunning()` 方法中被设置为“得分：#得分”或“新纪录：#数值”。\n\n### 收尾工作\n\n这基本上就是我们的游戏界面类。其剩余代码见代码清单\
  \ 9-22。\n\n**代码清单 9-22.** *GameScreen.java 剩余部分：pause()、resume() 和 dispose() 方法。*\n\
  \n```\n    @Override\n    public void pause() {\n        if(state == GAME_RUNNING)\n\
  \            state = GAME_PAUSED;\n    }\n\n    @Override\n    public void resume()\
  \ {\n    }\n\n    @Override\n    public void dispose() {\n    }\n```\n\n我们只是确保当用户决定暂停应用程序时，我们的游戏界面处于暂停状态。\n\
  \n最后需要实现的是 `WorldRenderer` 类。\n\n## WorldRenderer 类\n\n这个类不会让人感到意外。它只需使用构造函数中传递给它的\
  \ `SpriteBatcher`，并相应地渲染世界。代码清单 9-23 展示了代码的开头部分。\n\n**代码清单 9-23.** *WorldRenderer.java\
  \ 节选：常量、成员和构造函数。*\n\n```\npackage com.badlogic.androidgames.jumper;\n\nimport javax.microedition.khronos.opengles.GL10;\n\
  \nimport com.badlogic.androidgames.framework.gl.Animation;\nimport com.badlogic.androidgames.framework.gl.Camera2D;\n\
  import com.badlogic.androidgames.framework.gl.SpriteBatcher;\nimport com.badlogic.androidgames.framework.gl.TextureRegion;\n\
  import com.badlogic.androidgames.framework.impl.GLGraphics;\n\npublic class WorldRenderer\
  \ {\n    static final float FRUSTUM_WIDTH = 10;\n    static final float FRUSTUM_HEIGHT\
  \ = 15;\n    GLGraphics glGraphics;\n    World world;\n    Camera2D cam;\n    SpriteBatcher\
  \ batcher;\n\n    public WorldRenderer(GLGraphics glGraphics, SpriteBatcher batcher,\
  \ World world) {\n        this.glGraphics = glGraphics;\n        this.world = world;\n\
  \        this.cam = new Camera2D(glGraphics, FRUSTUM_WIDTH, FRUSTUM_HEIGHT);\n \
  \       this.batcher = batcher;\n    }\n```\n\n和往常一样，我们从定义一些常量开始。在本例中，是视锥体的宽度和高度，我们将其定义为\
  \ 10 米和 15 米。我们还有一些成员——即一个 `GLGraphics` 实例、一个摄像机以及从游戏界面获取的 `SpriteBatcher` 引用。\n\
  \n构造函数接受一个 `GLGraphics` 实例、一个 `SpriteBatcher` 以及 `WorldRenderer` 应绘制的 `World` 作为参数。我们相应地设置所有成员。代码清单\
  \ 9-24 展示了实际的渲染代码。\n\n**代码清单 9-24.** *WorldRenderer.java 剩余部分：实际渲染代码*\n\n```\npublic\
  \ void render() {\n    if(world.bob.position.y > cam.position.y )\n        cam.position.y\
  \ = world.bob.position.y;\n    cam.setViewportAndMatrices();\n    renderBackground();\n\
  \    renderObjects();\n}\n```\n\n`render()` 方法将渲染分为两个批次：一个用于背景图像，另一个用于世界中的所有对象。它还会根据\
  \ Bob 的当前 y 坐标更新相机位置。如果 Bob 位于相机 y 坐标上方，则相应调整相机位置。请注意，我们在此处使用的是以世界单位工作的相机。我们仅为背景和对象设置一次矩阵。\n\
  \n```\npublic void renderBackground() {\n    batcher.beginBatch(Assets.background);\n\
  \    batcher.drawSprite(cam.position.x, cam.position.y,\n                      \
  \ FRUSTUM_WIDTH, FRUSTUM_HEIGHT,\n                       Assets.backgroundRegion);\n\
  \    batcher.endBatch();\n}\n```\n\n`renderBackground()` 方法仅渲染背景，使其跟随相机移动。它不滚动，而是始终渲染以填满整个屏幕。我们也不对背景渲染使用任何混合，以便略微提升性能。\n\
  \n```\npublic void renderObjects() {\n    GL10 gl = glGraphics.getGL();\n    gl.glEnable(GL10.GL_BLEND);\n\
  \    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\n    batcher.beginBatch(Assets.items);\n\
  \    renderBob();\n    renderPlatforms();\n    renderItems();\n    renderSquirrels();\n\
  \    renderCastle();\n    batcher.endBatch();\n    gl.glDisable(GL10.GL_BLEND);\n\
  }\n```\n\n\n\n`renderObjects()` 方法负责渲染第二批对象。这次我们使用**混合模式**，因为所有对象都有透明背景像素。所有对象都在单个批次中渲染。回顾\
  \ `GameScreen` 的构造函数，我们使用的 `SpriteBatcher` 可以处理单个批次中的 1000 个精灵——这对我们的世界来说绰绰有余。对于每种对象类型，我们都有一个独立的渲染方法。\n\
  \n```\nprivate void renderBob() {\n    TextureRegion keyFrame;\n    switch(world.bob.state)\
  \ {\n        case Bob.BOB_STATE_FALL:\n            keyFrame = Assets.bobFall.getKeyFrame(world.bob.stateTime,\n\
  \            Animation.ANIMATION_LOOPING);\n            break;\n        case Bob.BOB_STATE_JUMP:\n\
  \            keyFrame = Assets.bobJump.getKeyFrame(world.bob.stateTime,\n      \
  \      Animation.ANIMATION_LOOPING);\n            break;\n        case Bob.BOB_STATE_HIT:\n\
  \        default:\n            keyFrame = Assets.bobHit;\n    }\n\n    float side\
  \ = world.bob.velocity.x < 0? -1: 1;\n    batcher.drawSprite(world.bob.position.x,\
  \ world.bob.position.y, side * 1, 1,\n    keyFrame);\n}\n```\n\n`renderBob()` 方法负责渲染\
  \ Bob。根据 Bob 的状态和状态时间，我们从 Bob 总共五个关键帧中选择一个关键帧（参见本章前面的图 9-9）。根据 Bob 速度的 x 分量，我们也能判断\
  \ Bob 面对的方向。基于此，我们将宽度乘以 1 或 -1 来相应地翻转纹理区域。记住，我们只有 Bob 朝右看的关键帧。还需注意，我们没有使用 `BOB_WIDTH`\
  \ 或 `BOB_HEIGHT` 来指定 Bob 的绘制矩形尺寸。这些尺寸是碰撞形状的尺寸，并不一定是渲染矩形的尺寸。我们使用 1×1 米对应 32×32 像素的映射。这将是我们所有精灵渲染的通用做法；我们将使用\
  \ 1×1 矩形（Bob、金币、松鼠、弹簧）、2×0.5 矩形（平台）或 2×2 矩形（城堡）。\n\n```\nprivate void renderPlatforms()\
  \ {\n    int len = world.platforms.size();\n    for(int i = 0; i < len; i++) {\n\
  \        Platform platform = world.platforms.get(i);\n        TextureRegion keyFrame\
  \ = Assets.platform;\n        if(platform.state == Platform.PLATFORM_STATE_PULVERIZING)\
  \ {\n            keyFrame = Assets.brakingPlatform.getKeyFrame(platform.stateTime,\n\
  \            Animation.ANIMATION_NONLOOPING);\n        }\n\n        batcher.drawSprite(platform.position.x,\
  \ platform.position.y,\n                           2, 0.5f, keyFrame);\n    }\n\
  }\n```\n\n`renderPlatforms()` 方法遍历世界中的所有平台，并根据平台的状态选择一个 `TextureRegion`。平台可能处于粉碎状态或非粉碎状态。对于非粉碎状态，我们直接使用第一个关键帧；对于粉碎状态，我们根据平台的状态时间从粉碎动画中获取一个关键帧。\n\
  \n```\nprivate void renderItems() {\n    int len = world.springs.size();\n    for(int\
  \ i = 0; i < len; i++) {\n        Spring spring = world.springs.get(i);\n      \
  \  batcher.drawSprite(spring.position.x, spring.position.y, 1, 1,\n        Assets.spring);\n\
  \    }\n\n    len = world.coins.size();\n    for(int i = 0; i < len; i++) {\n  \
  \      Coin coin = world.coins.get(i);\n        TextureRegion keyFrame = Assets.coinAnim.getKeyFrame(coin.stateTime,\n\
  \        Animation.ANIMATION_LOOPING);\n        batcher.drawSprite(coin.position.x,\
  \ coin.position.y, 1, 1, keyFrame);\n    }\n}\n```\n\n`renderItems()` 方法负责渲染弹簧和金币。对于弹簧，我们直接使用\
  \ `Assets` 中定义的唯一 `TextureRegion`；对于金币，我们根据金币的状态时间从动画中选择一个关键帧。\n\n```\nprivate void\
  \ renderSquirrels() {\n    int len = world.squirrels.size();\n    for(int i = 0;\
  \ i < len; i++) {\n        Squirrel squirrel = world.squirrels.get(i);\n       \
  \ TextureRegion keyFrame = Assets.squirrelFly.getKeyFrame(squirrel.stateTime,\n\
  \        Animation.ANIMATION_LOOPING);\n        float side = squirrel.velocity.x\
  \ < 0?-1:1;\n        batcher.drawSprite(squirrel.position.x, squirrel.position.y,\
  \ side * 1, 1, keyFrame);\n    }\n}\n```\n\n`renderSquirrels()` 方法负责渲染松鼠。我们再次根据松鼠的状态时间获取关键帧，判断其面朝方向，并在使用\
  \ `SpriteBatcher` 渲染时相应调整宽度。这是必要的，因为纹理图集中只有松鼠面朝左的版本。\n\n```\nprivate void renderCastle()\
  \ {\n    Castle castle = world.castle;\n    batcher.drawSprite(castle.position.x,\
  \ castle.position.y, 2, 2, Assets.castle);\n}\n```\n\n最后一个方法叫做 `renderCastle()`，它简单地使用我们在\
  \ `Assets` 类中定义的 `TextureRegion` 绘制城堡。\n\n这很简单，不是吗？我们只需要渲染两个批次：一个用于背景，一个用于对象。退一步看，我们还要为游戏屏幕的所有\
  \ UI 元素渲染第三个批次。这意味着三次纹理切换和三次向 GPU 上传新顶点。理论上我们可以合并 UI 和对象批次，但这会很麻烦，并且需要在代码中引入一些规避手段。根据我们在第\
  \ 6 章的优化指南，我们应该拥有闪电般的渲染速度。让我们看看是否确实如此。\n\n我们终于完成了。我们的第二款游戏《超级跳跃者（Super Jumper）》现在可以玩了。\n\
  \n\n\n### 优化还是不优化\n\n是时候对我们的新游戏进行基准测试了。实际上唯一需要关注速度的地方就是游戏画面。我们只需在`GameScreen`类中放置一个`FPSCounter`实例，并在`GameScreen.render()`方法末尾调用其`FPSCounter.logFrame()`方法。以下是\
