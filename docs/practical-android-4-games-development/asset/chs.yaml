  \ 性能较弱，运行起来有些吃力。我们可以使用`SpatialHashGrid`来稍微加速游戏世界的模拟。亲爱的读者，我们把这个作为练习留给你。不过其实也没必要一定这么做，因为\
  \ Hero 设备总会遇到问题（其他 1.5 版本的设备也是如此）。更糟糕的是，Hero 设备上时不时会因垃圾回收出现卡顿。我们知道原因（直接`ByteBuffer`的一个\
  \ Bug），但对此也无能为力。希望 Android 1.5 版本能尽快被淘汰吧。\n\n以上测量结果是在主菜单关闭音效的情况下获得的。现在让我们开启音频播放再试一次：\n\
