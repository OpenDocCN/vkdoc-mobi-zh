  \n![images](img/1111.jpg)\n\n**图 11–11.** *一个简单的第一人称射击游戏控制示例，为简化起见未使用多点触控*\n\n很不错，对吧？而且代码量也不大，这要归功于我们的辅助类所做的出色工作。现在，添加多点触控支持当然会很棒。这里有一个提示：不要像刚刚看到的示例那样使用轮询，而是使用实际的触摸事件。在“触摸按下”事件中，检查按钮是否被点击。如果是，则将与之关联的指针\
  \ ID 标记为无法产生滑动手势，直到相应的“触摸抬起”事件被触发。来自其他所有指针 ID 的触摸事件都可以被解释为滑动手势！\n\n### 观察摄像机\n\n\
  游戏中常见的第二种摄像机是简单的观察摄像机。它由以下参数定义：\n\n*   空间中的位置。\n*   上向量。可以将其想象成一个箭头，当你将相机平放在水平面上时，在相机背面贴上“此面朝上”贴纸时看到的箭头。\n\
  *   空间中的观察位置或方向向量。我们将使用前者。\n*   以度为单位的视野。\n*   视口宽高比。\n*   近裁剪平面和远裁剪平面距离。\n\n观察摄像机与欧拉摄像机之间的唯一区别在于我们编码摄像机方向的方式。在这种情况下，我们通过上向量和观察位置来指定方向。让我们为这种类型的摄像机编写一个辅助类。清单\
  \ 11–11 展示了代码。\n\n**清单 11–11.** *LookAtCamera.java，一个没有花哨功能的简单观察摄像机*\n\n```\npackage\
  \ com.badlogic.androidgames.framework.gl;\n\nimport javax.microedition.khronos.opengles.GL10;\n\
  \nimport android.opengl.GLU;\n\nimport com.badlogic.androidgames.framework.math.Vector3;\n\
  \npublic class LookAtCamera {\n    final Vector3 position;\n    final Vector3 up;\n\
  \    final Vector3 lookAt;\n    float fieldOfView;\n    float aspectRatio;\n   \
  \ float near;\n    float far;\n\n    public LookAtCamera(float fieldOfView, float\
  \ aspectRatio, float near, float far) {\n        this.fieldOfView = fieldOfView;\n\
  \        this.aspectRatio = aspectRatio;\n        this.near = near;\n        this.far\
  \ = far;\n\n        position = new Vector3();\n        up = new Vector3(0, 1, 0);\n\
  \        lookAt = new Vector3(0,0,-1);\n    }\n\n    public Vector3 getPosition()\
  \ {\n        return position;\n    }\n\n    public Vector3 getUp() {\n        return\
  \ up;\n    }\n\n    public Vector3 getLookAt() {\n        return lookAt;\n    }\n\
  \n    public void setMatrices(GL10 gl) {\n        gl.glMatrixMode(GL10.GL_PROJECTION);\n\
  \        gl.glLoadIdentity();\n        GLU.gluPerspective(gl, fieldOfView, aspectRatio,\
  \ near, far);\n        gl.glMatrixMode(GL10.GL_MODELVIEW);\n        gl.glLoadIdentity();\n\
  \        GLU.gluLookAt(gl, position.x, position.y, position.z, lookAt.x, lookAt.y,\
  \ lookAt.z, up.x, up.y, up.z);\n    }\n}\n```\n\n这里没有什么真正令人惊讶的地方。我们只需将位置、上向量和`lookAt`值存储为`Vector3`实例，以及我们在`EulerCamera`中也有的透视投影参数。此外，我们提供了一些\
  \ getter 方法，以便我们可以修改摄像机的属性。唯一有趣的方法是`setMatrices()`，但即使这对我们来说也是老生常谈了。我们首先根据视野、宽高比以及近裁剪和远裁剪平面距离，将投影矩阵设置为透视投影矩阵。然后，我们通过`gluLookAt()`将模型视图矩阵设置为包含摄像机位置和方向矩阵，正如前一章所讨论的。这实际上会生成一个与我们在`EulerCamera`示例中“手工制作”的矩阵非常相似的矩阵。它也将围绕摄像机旋转物体，而不是相反。然而，`gluLookAt()`方法的友好接口使我们不必考虑那些繁琐的事情，比如反转位置或角度。\n\
  \n事实上，我们可以像使用`EulerCamera`一样使用这个摄像机。我们需要做的就是通过从摄像机的观察点减去其位置并归一化来创建一个方向向量。然后，我们只需根据偏航角和俯仰角旋转这个方向向量。最后，我们将新的观察点设置为摄像机的位置，并加上方向向量。两种方法都会产生完全相同的变换矩阵。这只是处理摄像机方向的两种不同方式。\n\
  \n我们将不编写`LookAtCamera`的显式示例，因为它的接口非常简单。我们将在本书的最后一个游戏中使用它，让它跟随一艘小巧的宇宙飞船！如果你想尝试一下，可以将其添加到我们之前编写的`LightTest`中，或者修改`EulerCameraTest`，使得`LookAtCamera`可以像第一人称射击游戏摄像机一样使用，如前一段所述。\n\
  \n### 加载模型\n\n用代码定义像我们立方体这样的模型是非常繁琐的。创建这些类型模型的更好方法是使用允许所见即所得地创建复杂形状和对象的特殊软件。有大量可用于此任务的软件：\n\
  \n*   *Blender*，一个在许多游戏和电影制作中使用的开源项目。功能非常强大且灵活，但也有些令人生畏。\n*   *Wings3D*，我们的首选武器，也是开源的。我们使用它进行简单的低多边形（即：三角形数量不多）静态物体建模。它非常简单，但能完成工作。\n\
  *   *3D Studio Max*，业界的事实标准之一。这是一个商业产品，但有学生版可用。\n*   *Maya*，另一个业界的宠儿。它也是一个商业产品，但有一些可能适合较小预算的定价选项。\n\
  \n这仅仅是市面上众多流行选择中的一部分。教你如何使用其中任何一种都远远超出了本书的范围。然而，无论你使用什么软件，在某个时候你都会将你的工作保存为某种格式。其中一种格式是\
  \ Wavefront OBJ，这是一种非常古老的纯文本格式，可以轻松解析并转换为我们的`Vertices3`实例之一。\n\n\n\n### Wavefront\
  \ OBJ 格式\n\n我们将实现该格式子集的加载器。我们的加载器仅支持由三角形组成的模型，并且可以选择包含纹理坐标和法线。OBJ 格式也支持存储任意凸多边形，但在此我们不作深入探讨。无论你是直接找到一个\
  \ OBJ 模型还是自己创建，请确保它是三角化的——即仅由三角形组成。\n\nOBJ 格式基于行结构。以下是我们要处理的语法部分：\n\n- `v x y z`：`v`\
  \ 表示该行编码了一个顶点位置，而 `x`, `y`, `z` 是以浮点数形式编码的坐标。\n- `vn i j k`：`vn` 表示该行编码了一个顶点法线，`i`,\
  \ `j`, `k` 分别是顶点法线的 x、y、z 分量。\n- `vt u v`：`vt` 表示该行编码了一对纹理坐标，`u` 和 `v` 是纹理坐标。\n\
  - `f v1/vt1/vn1 v2/vt2/vn2 v3/vt3/vn3`：`f` 表示该行编码了一个三角形。每个 `v/vt/vn` 块包含三角形单个顶点的位置、纹理坐标和法线的索引。这些索引相对于之前通过其他三种行格式定义的顶点位置、纹理坐标和顶点法线。`vt`\
  \ 和 `vn` 索引可以省略，表示该三角形特定顶点没有纹理坐标或法线。\n\n我们将忽略任何不以 `v`、`vn`、`vt` 或 `f` 开头的行；如果任何允许的行不符合上述格式，我们也会输出错误。单行内的项由空白字符分隔，可包括空格、制表符等。\n\
  \n**注意：** OBJ 格式可以存储比我们在此解析的更多信息。只要模型是三角化的，并且包含法线和纹理坐标，我们只需解析此处展示的语法，忽略其他内容即可。\n\
  \n以下是一个带有法线的纹理三角形在 OBJ 格式中的简单示例：\n\n```\nv -0.5 -0.5 0\nv 0.5 -0.5 0\nv 0 0.5 0\n\
  vn 0 0 1\nvn 0 0 1\nvn 0 0 1\nvt 0 1\nvt 1 1\nvt 0.5 0\nf 1/1/1 2/2/2 3/3/3\n```\n\
  \n请注意，顶点位置、纹理坐标和法线不必按如此整齐的顺序定义。如果保存文件的软件选择这样做，它们可以交错排列。\n\n`f` 语句中给出的索引是基于 1 的，而不是基于\
  \ 0 的（如 Java 数组的情况）。某些软件甚至有时会输出负数索引。OBJ 格式规范允许这种情况，但这很麻烦。我们必须跟踪到目前为止已加载的顶点位置、纹理坐标或顶点法线的数量，然后根据该索引所指示的顶点属性，将负数索引分别加至相应的位置、顶点坐标或法线数量上。\n\
  \n### 实现 OBJ 加载器\n\n我们的方案是将文件完全加载到内存中，并为每一行创建一个字符串。我们还将为所有要加载的顶点位置、纹理坐标和法线创建临时的浮点数组。它们的大小将等于\
  \ OBJ 文件的行数乘以每个属性的分量数；即纹理坐标为 2，法线为 3。这样做会导致分配的内存超出存储数据所需的必要量，但这仍然比每次数组填满时重新分配新数组要好。\n\
  \n对于定义每个三角形的索引，我们也采用同样的做法。虽然 OBJ 格式确实是一种索引格式，但我们不能直接将那些索引用于我们的 `Vertices3` 类。原因在于，一个顶点属性可能被多个顶点重复使用，因此存在一对多的关系，这在\
  \ OpenGL ES 中是不允许的。因此，我们将使用一个非索引的 `Vertices3` 实例，并直接复制顶点。对我们的需求而言，这样是可以的。\n\n我们来看如何实现这一切。清单\
  \ 11–12 展示了代码。\n\n**清单 11–12.** *ObjLoader.java，一个用于加载 OBJ 格式子集的简单类*\n\n```\npackage\
  \ com.badlogic.androidgames.framework.gl;\n\nimport java.io.BufferedReader;\nimport\
  \ java.io.IOException;\nimport java.io.InputStream;\nimport java.io.InputStreamReader;\n\
  import java.util.ArrayList;\nimport java.util.List;\n\nimport com.badlogic.androidgames.framework.impl.GLGame;\n\
  \npublic class ObjLoader {\n    public static Vertices3 load(GLGame game, String\
  \ file) {\n        InputStream in = null;\n        try {\n            in = game.getFileIO().readAsset(file);\n\
  \            List<String> lines = readLines(in);\n\n            float[] vertices\
  \ = new float[lines.size() * 3];\n            float[] normals = new float[lines.size()\
  \ * 3];\n            float[] uv = new float[lines.size() * 2];\n\n            int\
  \ numVertices = 0;\n            int numNormals = 0;\n            int numUV = 0;\n\
  \            int numFaces = 0;\n```\n\n我们做的第一件事是打开一个 `InputStream`，读取由文件参数指定的资产\
  \ `file`。然后我们使用一个名为 `readLines()` 的方法（在后续代码中定义）读取该文件的所有行。根据行数，我们分配浮点数组，用于存储每个顶点位置的\
  \ x、y、z 坐标、每个顶点法线的 x、y、z 分量以及每个顶点纹理坐标的 u、v 分量。由于我们不知道文件中有多少个顶点，我们只为数组分配了比所需更多的空间。每个顶点属性依次存储在三个数组的后续元素中。第一个读取的顶点位置位于\
  \ `vertices[0]`、`vertices[1]` 和 `vertices[2]`，依此类推。我们还追踪三角形定义中每个顶点三个属性的索引。此外，我们还有几个计数器来跟踪已经加载了多少项。\n\
  \n```\n            for (int i = 0; i < lines.size(); i++) {\n                String\
  \ line = lines.get(i);\n```\n\n接下来是一个 `for` 循环，它遍历文件中的所有行。\n\n```\n            \
  \    if (line.startsWith(\"v \")) {\n                    String[] tokens = line.split(\"\
  [ ]+\");\n                    vertices[vertexIndex] = Float.parseFloat(tokens[1]);\n\
  \                    vertices[vertexIndex + 1] = Float.parseFloat(tokens[2]);\n\
  \                    vertices[vertexIndex + 2] = Float.parseFloat(tokens[3]);\n\
  \                    vertexIndex += 3;\n                    numVertices++;\n   \
  \                 continue;\n                }\n```\n\n如果当前行是顶点位置定义，我们按空白字符分割该行，读取\
  \ x、y、z 坐标，并将其存储在 `vertices` 数组中。\n\n\n\n```java\nif (line.startsWith(\"vn \"))\
  \ {\n    String[] tokens = line.split(\"[ ]+\");\n    normals[normalIndex] = Float.parseFloat(tokens[1]);\n\
  \    normals[normalIndex + 1] = Float.parseFloat(tokens[2]);\n    normals[normalIndex\
  \ + 2] = Float.parseFloat(tokens[3]);\n    normalIndex += 3;\n    numNormals++;\n\
  \    continue;\n}\n\nif (line.startsWith(\"vt\")) {\n    String[] tokens = line.split(\"\
  [ ]+\");\n    uv[uvIndex] = Float.parseFloat(tokens[1]);\n    uv[uvIndex + 1] =\
  \ Float.parseFloat(tokens[2]);\n    uvIndex += 2;\n    numUV++;\n    continue;\n\
  }\n```\n\n我们对法线和纹理坐标进行同样的处理：\n\n```java\nif (line.startsWith(\"f \")) {\n    String[]\
  \ tokens = line.split(\"[ ]+\");\n\n    String[] parts = tokens[1].split(\"/\");\n\
  \    facesVerts[faceIndex] = getIndex(parts[0], numVertices);\n    if (parts.length\
  \ > 2)\n        facesNormals[faceIndex] = getIndex(parts[2], numNormals);\n    if\
  \ (parts.length > 1)\n        facesUV[faceIndex] = getIndex(parts[1], numUV);\n\
  \    faceIndex++;\n\n    parts = tokens[2].split(\"/\");\n    facesVerts[faceIndex]\
  \ = getIndex(parts[0], numVertices);\n    if (parts.length > 2)\n        facesNormals[faceIndex]\
  \ = getIndex(parts[2], numNormals);\n    if (parts.length > 1)\n        facesUV[faceIndex]\
  \ = getIndex(parts[1], numUV);\n    faceIndex++;\n\n    parts = tokens[3].split(\"\
  /\");\n    facesVerts[faceIndex] = getIndex(parts[0], numVertices);\n    if (parts.length\
  \ > 2)\n        facesNormals[faceIndex] = getIndex(parts[2], numNormals);\n    if\
  \ (parts.length > 1)\n        facesUV[faceIndex] = getIndex(parts[1], numUV);\n\
  \    faceIndex++;\n    numFaces++;\n    continue;\n}\n```\n\n在这段代码中，三角形的每个顶点（这里称为*面*，这是\
  \ OBJ 格式中使用的术语）由顶点位置、纹理坐标和法线数组的三个索引值三元组定义。纹理坐标和法线索引可以省略，因此我们会对此进行跟踪。索引也可以是负数，在这种情况下，我们必须将它们加到目前已加载的位置/纹理坐标/法线数量上。`getIndex()`\
  \ 方法就是为我们做这件事的。\n\n```java\nfloat[] verts = new float[(numFaces * 3) * (3 + (numNormals\
  \ > 0 ? 3 : 0) + (numUV > 0 ? 2 : 0))];\n```\n\n一旦我们加载了所有的顶点位置、纹理坐标、法线和三角形，我们就可以开始组装一个\
  \ `float` 数组，该数组以 `Vertices3` 实例所期望的格式存放顶点。存储这些顶点所需的浮点数数量可以很容易地从我们加载的三角形数量以及是否给出了法线和纹理坐标来推导出来。\n\
  \n```java\nfor (int i = 0, vi = 0; i < numFaces * 3; i++) {\n    int vertexIdx =\
  \ facesVerts[i] * 3;\n    verts[vi++] = vertices[vertexIdx];\n    verts[vi++] =\
  \ vertices[vertexIdx + 1];\n    verts[vi++] = vertices[vertexIdx + 2];\n\n    if\
  \ (numUV > 0) {\n        int uvIdx = facesUV[i] * 2;\n        verts[vi++] = uv[uvIdx];\n\
  \        verts[vi++] = 1 - uv[uvIdx + 1];\n    }\n\n    if (numNormals > 0) {\n\
  \        int normalIdx = facesNormals[i] * 3;\n        verts[vi++] = normals[normalIdx];\n\
  \        verts[vi++] = normals[normalIdx + 1];\n        verts[vi++] = normals[normalIdx\
  \ + 2];\n    }\n}\n```\n\n为了填充 `verts` 数组，我们只需遍历所有三角形，提取每个三角形每个顶点的 `vertex` 属性，然后按照我们通常用于\
  \ `Vertices3` 实例的布局将它们放入 `verts` 数组中。\n\n```java\nVertices3 model = new Vertices3(game.getGLGraphics(),\
  \ numFaces * 3, 0, false, numUV > 0, numNormals > 0);\nmodel.setVertices(verts,\
  \ 0, verts.length);\nreturn model;\n```\n\n我们做的最后一件事是实例化 `Vertices3` 实例并设置顶点。\n\n\
  ```java\n} catch (Exception ex) {\n    throw new RuntimeException(\"couldn't load\
  \ '\" + file + \"'\", ex);\n} finally {\n    if (in != null)\n        try {\n  \
  \          in.close();\n        } catch (Exception ex) {\n\n        }\n}\n```\n\n\
  该方法的其余部分只是进行一些异常处理并关闭 `InputStream`。\n\n```java\nstatic int getIndex(String index,\
  \ int size) {\n    int idx = Integer.parseInt(index);\n    if (idx < 0)\n      \
  \  return size + idx;\n    else\n        return idx - 1;\n}\n```\n\n`getIndex()`\
  \ 方法接收三角形定义中顶点属性的一个索引，以及已加载的属性数量，并返回一个适合在我们的工作数组中引用该属性的索引。\n\n```java\nstatic List<String>\
  \ readLines(InputStream in) throws IOException {\n    List<String> lines = new ArrayList<String>();\n\
  \n    BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n \
  \   String line = null;\n    while ((line = reader.readLine()) != null)\n      \
  \  lines.add(line);\n    return lines;\n}\n```\n\n最后，还有 `readLines()` 方法，它只是读取文件中的每一行，并将所有这些行作为字符串的\
  \ `List` 返回。\n\n要从资产中加载 OBJ 文件，我们可以按如下方式使用 `ObjLoader`：\n\n```java\nVertices3 model\
  \ = ObjLoader.load(game, \"mymodel.obj\");\n```\n\n在经历了所有这些索引的复杂操作之后，是不是相当简单明了？不过，要渲染这个\
  \ `Vertices3` 实例，我们需要知道它有多少个顶点。让我们再次扩展 `Vertices3` 类，添加两个方法，分别返回实例中当前定义的顶点数和索引数。列表\
  \ 11–13 向您展示了代码。\n\n**列表 11–13.** *摘自 `Vertices3.java`，获取顶点数和索引数*\n\n```java\npublic\
  \ int getNumIndices() {\n    return indices.limit();\n}\n\npublic int getNumVertices()\
  \ {\n    return vertices.limit() / (vertexSize / 4);\n}\n```\n\n对于索引的数量，我们只需返回存储索引的\
  \ `ShortBuffer` 的 limit。对于顶点的数量，我们采用同样的方法。但是，由于 limit 是以 `FloatBuffer` 中定义的浮点数的数量来报告的，因此我们必须将其除以顶点大小。由于我们在\
  \ `vertexSize` 中以字节数存储该值，因此我们将该成员除以 4。\n\n### 使用 OBJ 加载器\n\n为了演示 OBJ 加载器，我们重写了上一个示例，并创建了一个名为\
  \ `ObjTest` 的新测试以及一个 `ObjScreen`。我们从上一个示例中复制了所有代码，只更改了 `ObjScreen` 构造函数中的一行：\n\n\
  ```java\ncube = ObjLoader.load(glGame, \"cube.obj\");\n```\n\n因此，我们没有使用 `createCube()`\
  \ 方法（已移除），而是直接从名为 `cube.obj` 的 OBJ 文件中加载模型。我们在 Wings3D 中创建了之前通过 `createCube()` 以编程方式指定的立方体的副本。它具有与手动创建版本相同的顶点位置、纹理坐标和法线。毫不奇怪，当您运行\
  \ `ObjTest` 时，它的外观将与我们的 `EulerCameraTest` 完全一样。因此，我们省去了必要的屏幕截图。\n\n\n\n在下一章中，我们将编写游戏，目前使用的加载器虽可满足需求，但远非健壮。有以下几点需要注意：\n\
  \n- Android 中的字符串处理本身就比较慢。`OBJ` 格式是纯文本格式，因此需要大量解析工作，这会对加载时间产生负面影响。你可以通过将 `OBJ` 模型转换为自定义二进制格式来解决此问题。例如，可以直接序列化我们在\
  \ `ObjLoader.load()` 方法中填充的 `verts` 数组。\n- `OBJ` 格式还有许多我们未利用的特性。如果你想扩展这个简单的加载器，请在网络上查阅格式规范，添加更多功能应该不难。\n\
  - `OBJ` 文件通常伴随着一个*材质文件*。该文件定义了 `OBJ` 文件中顶点组要使用的颜色和纹理。由于我们知道特定 `OBJ` 文件使用哪个纹理，因此不需要此功能。对于更健壮的加载器，你也需要研究材质文件的规范。\n\
  \n### 3D 中的简单物理\n\n在第 8 章中，我们开发了一个非常简单的基于质点的 2D 物理模型。好消息是：这一切在 3D 中同样适用！\n\n- 位置现在是三维向量，而不是二维向量。我们只需添加一个\
  \ `z` 坐标。\n- 速度仍然以每轴*米/秒*表示。我们只需为 `z` 轴增加一个分量！\n- 加速度也仍然以每轴*米/秒²*表示。同样，我们只增加了一个坐标。\n\
  \n第 8 章中描述物理模拟更新的伪代码如下：\n\n```\nVector2 position = new Vector2();\nVector2 velocity\
  \ = new Vector2();\nVector2 acceleration = new Vector2(0, -10);\nwhile (simulationRuns)\
  \ {\n    float deltaTime = getDeltaTime();\n    velocity.add(acceleration.x * deltaTime,\
  \ acceleration.y * deltaTime);\n    position.add(velocity.x * deltaTime, velocity.y\
  \ * deltaTime);\n}\n```\n\n我们可以通过简单地将 `Vector2` 实例替换为 `Vector3` 实例，将其转换到 3D 空间：\n\
  \n```\nVector3 position = new Vector3();\nVector3 velocity = new Vector3();\nVector3\
  \ acceleration = new Vector3(0, -10, 0);\nwhile (simulationRuns) {\n    float deltaTime\
  \ = getDeltaTime();\n    velocity.add(acceleration.x * deltaTime, acceleration.y\
  \ * deltaTime, acceleration.z * deltaTime);\n    position.add(velocity.x * deltaTime,\
  \ velocity.y * deltaTime, velocity.z * deltaTime);\n}\n```\n\n就是这样！这个简单的物理模型对于许多简单的\
  \ 3D 游戏来说已经足够。在本书的最终游戏中，由于游戏对象的性质，我们甚至不会使用任何加速度。\n\n当然，更复杂的 3D（以及 2D）物理实现起来会更难。为此，你通常会使用第三方库，而不是自己重新发明轮子。在\
  \ Android 上的问题是，由于涉及大量计算，基于 Java 的解决方案会太慢。有一些针对 Android 的 2D 物理解决方案，它们通过 Java 本地接口（JNI）封装了像\
  \ Box2D 这样的本地 C++ 库，为 Java 应用程序提供本地 API。对于 3D 物理，有一个名为 Bullet 的库。然而，这个库目前还没有可用的\
  \ JNI 绑定。不过，这些主题已远远超出本书的范围，并且在许多情况下，我们不需要任何复杂的刚体物理。\n\n### 3D 中的碰撞检测与对象表示\n\n在第\
  \ 8 章中，我们讨论了对象表示与碰撞检测之间的关系。我们力求让游戏世界对象尽可能独立于其图形表示。相反，我们更倾向于根据其包围形状、位置和朝向（旋转）来定义对象。位置和朝向问题不大：位置可以用\
  \ `Vector3` 表示，朝向可以用绕 x、y、z 轴旋转的角度表示（注意上一章提到的万向锁潜在问题）。让我们来看看包围形状。\n\n#### 3D 中的包围形状\n\
  \n关于包围形状，我们同样有很多选择。图 11-12 展示了 3D 编程中一些更流行的包围形状。\n\n![images](img/1112.jpg)\n\n\
  **图 11-12.** 各种包围形状。从左到右：三角形网格、轴对齐包围盒和包围球\n\n- **三角形网格**：它能尽可能紧密地包围对象。然而，基于三角形网格进行两个对象的碰撞检测计算量非常大。\n\
  - **轴对齐包围盒**：它松散地包围对象。其计算强度远低于三角形网格。\n- **包围球**：它对对象的包围甚至更松散。这是检测碰撞的最快方法。\n\n三角形网格和包围盒的另一个问题是，每当我们旋转或缩放对象时，都必须重新调整它们的方向，就像在\
  \ 2D 中一样。而包围球在旋转对象时不需要任何修改。如果缩放对象，我们只需缩放球的半径，这是一个简单的乘法运算。\n\n\n\n### 包围球重叠检测\n\n\
  三角形网格与包围盒碰撞检测的数学原理相当复杂。不过，对于我们接下来的游戏而言，使用包围球就足够了。我们还可以应用一个小技巧——实际上在《超级跳跳人》中已经用过：为了让包围球更贴合模型，我们让它比图形表示更小一些。图\
  \ 11–13 展示了飞船的包围球效果。\n\n![images](img/1113.jpg)\n\n**图 11–13.** *缩小包围球以更好地贴合物体*\n\
  \n当然，这是一个非常取巧的方法，但事实证明，在许多情况下，它足以维持大部分碰撞检测正确的假象。\n\n那么，如何检测两个球体是否碰撞？或者说，如何检测它们是否重叠？这与圆形检测的原理完全相同！我们只需测量一个球体中心到另一个球体中心的距离。如果该距离小于两个球体半径之和，则发生碰撞。让我们创建一个简单的\
  \ `Sphere` 类。代码清单 11–13 展示了代码。\n\n**代码清单 11–13.** *Sphere.java —— 一个简单的包围球*\n\n\
  ```java\npackage com.badlogic.androidgames.framework.math;\n\npublic class Sphere\
  \ {\n    public final Vector3 center = new Vector3();\n    public float radius;\n\
  \n    public Sphere(float x, float y, float z, float radius) {\n        this.center.set(x,y,z);\n\
  \        this.radius = radius;\n    }\n}\n```\n\n这与我们在 `Circle` 类中使用的代码相同。唯一的变化是存储中心的向量，现在变成了\
  \ `Vector3` 而不是 `Vector2`。\n\n我们还要为 `OverlapTester` 类添加一些方法，用于检测两个球体的重叠以及点是否在球体内。代码清单\
  \ 11–14 展示了代码。\n\n**代码清单 11–14.** *OverlapTester.java 节选 —— 添加球体测试方法*\n\n```java\n\
  public static boolean overlapSpheres(Sphere s1, Sphere s2) {\n    float distance\
  \ = s1.center.distSquared(s2.center);\n    float radiusSum = s1.radius + s2.radius;\n\
  \    return distance <= radiusSum * radiusSum;\n}\n\npublic static boolean pointInSphere(Sphere\
  \ c, Vector3 p) {\n    return c.center.distSquared(p) < c.radius * c.radius;\n}\n\
  \npublic static boolean pointInSphere(Sphere c, float x, float y, float z) {\n \
  \   return c.center.distSquared(x, y, z) < c.radius * c.radius;\n}\n```\n\n这再次与\
  \ `Circle` 重叠测试的代码完全相同。我们只是使用了球体的中心，它是一个 `Vector3` 而非 `Circle` 类中的 `Vector2`。\n\n\
  **注意：** 关于 3D 碰撞检测的专题可以写成整本书。如果你想深入探索这个有趣的世界，我们推荐 Christer Ericson 所著的《实时碰撞检测》（Morgan\
  \ Kaufmann, 2005）。任何有自尊心的游戏开发者的书架上都应该有这本书！\n\n## GameObject3D 和 DynamicGameObject3D\n\
  \n现在我们有了适用于 3D 物体的优秀包围形状，可以轻松编写与 2D 中使用的 `GameObject` 和 `DynamicGameObject` 类对应的版本。我们只需将所有\
  \ `Vector2` 替换为 `Vector3` 实例，并使用 `Sphere` 类代替 `Rectangle` 类。代码清单 11–15 展示了 `GameObject3D`\
  \ 类。\n\n**代码清单 11–15.** *GameObject3D —— 表示一个带有位置和包围盒的简单物体*\n\n```java\npackage\
  \ com.badlogic.androidgames.framework;\n\nimport com.badlogic.androidgames.framework.math.Sphere;\n\
  import com.badlogic.androidgames.framework.math.Vector3;\n\npublic class GameObject3D\
  \ {\n    public final Vector3 position;\n    public final Sphere bounds;\n\n   \
  \ public GameObject3D(float x, float y, float z, float radius) {\n        this.position\
  \ = new Vector3(x,y,z);\n        this.bounds = new Sphere(x, y, z, radius);\n  \
  \  }\n}\n```\n\n这段代码非常简单，无需过多解释。唯一的小问题是，我们必须将同一位置存储两次：一次作为 `GameObject3D` 类中的 `position`\
  \ 成员，另一次存储在 `GameObject3D` 类所包含的 `Sphere` 实例的 `position` 成员中。虽然有点不美观，但为了清晰起见，我们仍沿用此方式。\n\
  \n从这个类派生 `DynamicGameObject3D` 类同样简单。代码清单 11–16 展示了代码。\n\n**代码清单 11–16.** *DynamicGameObject3D.java\
  \ —— GameObject3D 的动态版本*\n\n```java\npackage com.badlogic.androidgames.framework;\n\
  \nimport com.badlogic.androidgames.framework.math.Vector3;\n\npublic class DynamicGameObject3D\
  \ extends GameObject {\n    public final Vector3 velocity;\n    public final Vector3\
  \ accel;\n\n    public DynamicGameObject3D(float x, float y, float z, float radius)\
  \ {\n        super(x, y, z, radius);\n        velocity = new Vector3();\n      \
  \  accel = new Vector3();\n    }\n}\n```\n\n我们再次将所有的 `Vector2` 替换为 `Vector3`，然后轻松搞定。\n\
  \n在 2D 中，我们曾需要仔细考虑物体的图形表示（以像素为单位）与世界模型所用单位之间的关系。在 3D 中，我们可以摆脱这种束缚！我们从 OBJ 等文件加载的\
  \ 3D 模型的顶点，可以用任何我们想要的单位系统来定义。我们不再需要将像素转换为世界单位，反之亦然。这使得 3D 工作稍微容易一些。我们只需要训练美术人员，让他/她提供与我们的世界单位系统比例正确的模型。\n\
  \n### 总结\n\n再次，我们揭开了游戏编程世界中的许多神秘面纱。我们简要讨论了 3D 向量，发现它们与 2D 向量一样易于使用。核心思路是：只需添加一个\
  \ z 坐标！我们还了解了 OpenGL ES 中的光照。借助我们编写的表示材质和光源的辅助类，在场景中设置光照变得相当简单。为了获得更好的性能和更少的图形伪影，我们还在\
  \ `Texture` 类中实现了简单的 mipmapping。我们还探索了简单的欧拉相机和注视相机的实现，仅用少量代码并借助了 `Matrix` 类。\n\n\
  由于在代码中手工创建 3D 网格很繁琐，我们还研究了最简单、最流行的 3D 文件格式之一：Wavefront OBJ。我们回顾了简单的物理模型，并将其迁移到了\
  \ 3D 领域，发现这就像创建 3D 向量一样简单。\n\n议程上的最后一点是，弄清楚如何在 3D 中处理包围形状和物体表示。鉴于我们适度的需求，我们为这两个问题找到了非常简单的解决方案，这些方案与我们\
  \ 2D 中使用的方法非常相似，甚至完全相同。\n\n虽然 3D 编程的内容远不止我们在这里能呈现的，但你现在已经对编写 3D 游戏所需的知识有了相当好的理解。一个重要的认识是，2D\
  \ 游戏和 3D 游戏之间实际上并没有太大区别（当然，在一定的复杂度范围内）。我们不必再害怕 3D 了！在第 12 章中，我们将运用新学到的知识，编写本书的最后一个游戏：Droid\
  \ Invaders！\n\n# 第 12 章：Droid Invaders：最终章\n\n你终于准备好要创作本书的最后一个游戏了。这次你将开发一个简单的动作/街机游戏，改编一个经典作品并赋予它出色的\
  \ 3D 外观，运用前两章讨论的技术。\n\n\n### 核心游戏机制\n\n正如你从本章标题中可能猜到的那样，你将实现一个《太空侵略者》的变体版本，它本质上是\
  \ 2D 游戏（如图 12–1 所示）。\n\n![images](img/1201.jpg)\n\n**图 12–1.** *原始的《太空侵略者》街机游戏*\n\
  \n这里有个小惊喜：基本上你将保持在 2D 环境中。所有物体都将以包围球的形式拥有 3D 边界，并在 3D 空间中拥有位置坐标。然而，运动将只发生在`x`/`z`平面内，这会让某些事情更简单些。图\
  \ 12–2 展示了改编后的 3D 版《太空侵略者》世界，该模型是用 Wings3D 创建的。\n\n![images](img/1202.jpg)\n\n**图\
  \ 12–2.** *3D 游戏场地模型*\n\n现在来定义游戏机制：\n\n-   一艘飞船在游戏区域底部飞行，只能在`x`轴上移动。\n-   移动范围受限于游戏区域边界。当飞船到达游戏区域的左边界或右边界时，会直接停止移动。\n\
  -   你需要让玩家可以选择使用加速度计或屏幕上的按钮来控制飞船左右移动。\n-   飞船每秒可发射一次。玩家通过按下屏幕上的按钮进行射击。\n-   游戏区域底部有三个护盾，每个护盾由五个方块组成。\n\
  -   侵略者以图 12–2 所示的初始阵型出现，然后它们会向左移动一段距离，再向`z`轴正方向移动一段距离，接着向右移动一段距离。总共会有 32 个侵略者，组成四行，每行八个。\n\
  -   侵略者会随机射击。\n-   当子弹击中飞船时，飞船爆炸并失去一条命。\n-   当子弹击中护盾时，护盾永久消失。\n-   当子弹击中侵略者时，侵略者爆炸，得分增加\
  \ 10 分。\n-   当所有侵略者被摧毁后，新一波侵略者出现，移动速度比上一波略快。\n-   当侵略者直接撞上飞船时，游戏结束。\n-   当飞船失去所有生命时，游戏结束。\n\
  \n这个清单并不算太庞大，对吧？所有操作本质上都可以在 2D 中执行（在`x`/`z`平面，而非`x`/`y`平面）。不过你仍然会使用 3D 包围球。也许在完成第一版迭代后，你会想把游戏扩展到真正的\
  \ 3D。那么现在呢？你可以继续了解故事背景了。\n\n### 故事背景与美术风格\n\n这款游戏将命名为《机器人侵略者》，以向安卓和《太空侵略者》致敬。名字虽然俗气，但我们并不打算制作一款\
  \ 3A 级大作。遵循经典射击游戏（如《毁灭战士》）的传统，故事背景将极为简洁。故事如下：\n\n> *来自外太空的侵略者攻击地球。你是唯一能够抵御邪恶力量的人。*\n\
  \n这对《毁灭战士》和《雷神之锤》来说已经足够了，所以对《机器人侵略者》来说也绰绰有余。\n\n在 GUI 方面，美术风格会带点复古感，使用与你曾在第 9 章《超级跳跳人》中相同的旧式字体。游戏世界本身将以炫酷的\
  \ 3D 形式呈现，包含带纹理和光照的 3D 模型。图 12–3 展示了游戏屏幕的效果。\n\n![images](img/1203.jpg)\n\n**图 12–3.**\
  \ *《机器人侵略者》模型图。很酷吧！*\n\n音乐将混合摇滚/金属风格，音效也会与场景相匹配。\n\n### 屏幕与过渡\n\n由于你已经在第 6 章的《诺姆先生》和第\
  \ 9 章的《超级跳跳人》中两次实现了帮助屏幕和高分屏幕，因此在《机器人侵略者》中可以免去这些；原理总是相同的，而且玩家一看到游戏屏幕就应该知道该怎么做。相反，你可以添加一个设置屏幕，让玩家选择输入类型（多点触控或加速度计），并启用或禁用音效。以下是《机器人侵略者》的屏幕列表：\n\
  \n-   一个主屏幕，包含 Logo 以及“开始游戏”和“设置”选项。\n-   一个游戏屏幕，会立即开始游戏（不再有准备信号！），同时处理暂停状态，并在飞船失去所有生命后显示“游戏结束”文本。\n\
  -   一个设置屏幕，显示三个代表配置选项的图标（多点触控、加速度计和音效）。\n\n这与前两款游戏非常相似。图 12–4 展示了所有屏幕及其过渡。\n\n![images](img/1204.jpg)\n\
  \n**图 12–4.** *《机器人侵略者》的屏幕与过渡*\n\n### 定义游戏世界\n\n在 3D 环境中工作的乐趣之一，就是你可以摆脱像素的束缚。你可以用任何想要的单位来定义你的世界。前面概述的游戏机制要求一个有限的游戏区域，所以先从定义这个区域开始。图\
  \ 12–5 展示了游戏世界中游戏区域的方位。\n\n![images](img/1205.jpg)\n\n**图 12–5.** *游戏区域*\n\n世界中的一切都将发生在`x`/`z`平面内的这个边界内部。坐标范围限定为：`x`轴从-14\
  \ 到 14，`z`轴从 0 到-15。飞船将能够沿着游戏区域的底部边缘移动，范围从`(−14,0,0)`到`(14,0,0)`。\n\n接下来，定义世界中物体的大小：\n\
  \n-   飞船的半径为 0.5 个单位。\n-   侵略者的半径稍大为 0.75 个单位，这样更容易被击中。\n-   每个护盾块的半径为 0.5 个单位。\n\
  -   每发子弹的半径为 0.1 个单位。\n\n这些数值是如何得出的？只需将游戏世界划分为 1 单位乘 1 单位的单元格，然后思考每个游戏元素相对于游戏区域的大小应该有多大。通常，你可以通过少量实验或使用现实世界中的单位（如米）来得出这些尺寸。在《机器人侵略者》中，不使用米，而使用无名单位。\n\
  \n上面定义的半径当然可以直接转化为包围球。对于护盾块和飞船，你可以稍微取巧，因为这些物体显然不是球形的。由于游戏世界的 2D 特性，你可以通过这个小技巧蒙混过关。对于侵略者来说，使用球体实际上是一个相当不错的近似。\n\
  \n你还必须定义移动物体的速度：\n\n-   飞船的最大移动速度为每秒 20 个单位。与《超级跳跳人》一样，实际速度通常会更低，因为它取决于设备的倾斜角度。\n\
  -   侵略者初始移动速度为每秒 1 个单位。每一波都会略微增加这个速度。\n-   子弹速度为每秒 10 个单位。\n\n有了这些定义，你就可以开始实现游戏世界的逻辑了。不过，你会发现，资源的创建与所定义的单位直接相关。\n\
  \n### 创建资源\n\n与前几款游戏一样，你有两种图形资源：UI 元素（如 Logo 或按钮），以及游戏中不同类型物体的模型。\n\n\n\n#### UI\
  \ 素材\n\n创建 UI 素材时，需以某个目标分辨率为基准。你的游戏将以横屏模式运行，因此只需选择 480×320 像素的目标分辨率。图 12-4 中的界面已展示了\
  \ UI 元素：一个徽标、不同的菜单项、几个按钮以及一些文本。关于文本，可以复用《超级跳跃者》中的字体。你在之前的游戏中已经完成了这些元素的合成，也了解到将它们放入纹理图集可以提升性能。用于《太空入侵者》的纹理图集（包含所有\
  \ UI 元素以及游戏中所有界面的字体）如图 12-6 所示。\n\n![images](img/1206.jpg)\n\n**图 12-6.** *包含按钮、徽标和字体的\
  \ UI 元素图集。存储于文件 `items.png` 中，尺寸为 512×512 像素*\n\n这与《超级跳跃者》中使用的核心概念基本相同。此外，你还有一个将在所有界面中渲染的背景。图\
  \ 12-7 展示了这张图片。\n\n![images](img/1207.jpg)\n\n**图 12-7.** *存储于 `background.jpg`\
  \ 中的背景图片，尺寸为 512×512 像素*\n\n正如你在图 12-4 中所见，你只需要使用此图像的左上角区域即可渲染出一个完整的画面（480×320 像素）。\n\
  \n以上就是所需的全部 UI 元素。现在，你可以着手处理 3D 模型及其纹理了。\n\n#### 游戏素材\n\n正如第 11 章所述，本书无法详细介绍如何使用\
  \ Wings3D 等软件创建 3D 模型。如果你想创建自己的模型，请选择一款合适的应用程序并研读一些教程（网络上通常免费提供）。对于《太空入侵者》的模型，你可以使用\
  \ Wings3D，并直接将其导出为 OBJ 格式，该格式可通过你的框架加载。所有模型仅由三角形构成，并包含纹理坐标和法线。虽然部分模型可能不需要纹理坐标，但保留它们也无妨。\n\
  \n飞船模型及其纹理如图 12-8 所示。\n\n![images](img/1208.jpg)\n\n**图 12-8.** *Wings3D 中的飞船模型\
  \ (`ship.obj`) 及其纹理 (`ship.png`, 256×256 像素)*\n\n关键在于，图 12-8 中的飞船大致具有上一节所述的“半径”。你无需缩放任何内容，也无需在不同坐标系之间转换尺寸和位置。飞船模型的定义单位与其包围球体相同！\n\
  \n图 12-9 展示了入侵者模型及其纹理。\n\n![images](img/1209.jpg)\n\n**图 12-9.** *入侵者模型 (`invader.obj`)\
  \ 及其纹理 (`invader.png`, 256×256 像素)*\n\n入侵者模型遵循与飞船模型相同的原理。将一个 OBJ 文件用于存储顶点位置、纹理坐标、法线和面，同时提供一个纹理图像。\n\
  \n护盾方块和子弹被建模为立方体，存储于 `shield.obj` 和 `shot.obj` 文件中。尽管它们被分配了纹理坐标，但在渲染时将实际上不进行纹理映射。只需将它们绘制为具有特定颜色的（半透明）对象（护盾方块为蓝色，子弹为黄色）。\n\
  \n最后是爆炸效果（再次参见图 12-3）。如何建模它们呢？不需要。你可以沿用 2D 中的做法：简单地在三维世界中绘制一个带有合适 z 坐标的矩形，并将包含爆炸动画帧的纹理图像映射上去。这与你在《超级跳跃者》中用于动画对象的原理相同。唯一的区别是，你需要在\
  \ z 坐标小于零的位置（即爆炸物体所在的位置）绘制该矩形。你甚至可以利用 `SpriteBatcher` 类来实现！为 OpenGL ES 欢呼吧。图 12-10\
  \ 展示了纹理。\n\n![images](img/1210.jpg)\n\n**图 12-10.** *爆炸动画纹理 (`explode.png`, 256×256\
  \ 像素)*\n\n动画的每一帧大小为 64×64 像素。你只需为每一帧生成 `TextureRegion`，并将它们放入一个 `Animation` 实例中，然后就可以像在《超级跳跃者》中处理松鼠或鲍勃一样，根据给定的动画时间获取正确的帧。\n\
  \n#### 音效与音乐\n\n对于音效，再次使用 sfxr。在网上搜索爆炸音效。它是一个公共领域音效，因此你可以在《太空入侵者》中使用它。对于我们自己版本的《太空入侵者》，我们使用真实乐器录制了音乐。是的——这非常复古。以下是《太空入侵者》的音频文件列表。\n\
  \n*   `click.ogg`，用于菜单项/按钮的点击声\n*   `shot.ogg`，射击声\n*   `explosion.ogg`，爆炸声\n* \
  \  `music.mp3`，为《太空入侵者》创作的摇滚/金属乐\n\n### 行动计划\n\n游戏机制、设计方案和素材准备就绪后，即可开始编码。像往常一样，创建一个新项目，复制所有框架代码，确保清单文件和图标等正确无误。到目前为止，你应该已经掌握了如何进行项目设置。所有《太空入侵者》的代码都将放在\
  \ `com.badlogic.androidgames.droidinvaders` 包中。素材存储在 Android 项目的 `assets/` 目录下。采用与《超级跳跃者》相同的整体结构：一个继承自\
  \ `GLGame` 的默认 Activity，若干实现不同界面和转场效果的 `GLScreen` 实例（如图 12-4 所示），用于加载素材和存储设置的类，游戏对象类，以及一个能在\
  \ 3D 中绘制游戏世界的渲染类。首先从 `Assets` 类开始。\n\n\n\n### 资产类\n\n好吧，你以前做过这个，所以别指望有什么惊喜。代码清单\
