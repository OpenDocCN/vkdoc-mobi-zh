  \ {\n                Assets.playSound(Assets.clickSound);\n                game.setScreen(new\
  \ MainMenuScreen(game));\n            }\n        }\n    }\n```\n\n`update()`方法会获取触摸事件，并检查是否注册了“触摸抬起”事件。如果是，它将触摸坐标转换为摄像头的坐标系。然后，利用这些坐标检测各个矩形区域，以决定执行何种操作。\n\
