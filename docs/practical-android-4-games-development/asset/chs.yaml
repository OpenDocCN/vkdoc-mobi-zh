  \ 成员跟踪当前得分，而 `speedMultiplier` 允许你加快入侵者的移动速度（回顾 `Invaders.update()` 方法）。此外，还存储了当前世界中活跃的子弹、入侵者和护盾方块的列表。最后，有一个\
  \ `Ship` 实例，并存储了飞船上次发射子弹的时间。该时间以 `System.nanoTime()` 返回的纳秒为单位存储，因此使用 long 数据类型。当你需要决定入侵者是否应该发射子弹时，`Random`\
  \ 实例会派上用场。\n\n```\n    public World() {\n        ship = new Ship(0, 0, 0);\n   \
  \     generateInvaders();\n        generateShields();\n        lastShotTime = System.nanoTime();\n\
  \        random = new Random();\n    }\n```\n\n在构造函数中，将 `Ship` 创建在初始位置，生成入侵者和护盾，并初始化其余成员。\n\
  \n```\n    private void generateInvaders() {\n        for (int row = 0; row < 4;\
  \ row++) {\n            for (int column = 0; column < 8; column++) {\n         \
  \       Invader invader = new Invader(-WORLD_MAX_X / 2 + column * 2f,\n        \
  \            0, WORLD_MIN_Z + row * 2f);\n                invaders.add(invader);\n\
  \            }\n        }\n    }\n```\n\n`generateInvaders()` 方法简单地创建一个 8x4 的入侵者网格，其排列方式如图\
  \ 12–11 所示。\n\n```\n    private void generateShields() {\n        for (int shield\
  \ = 0; shield < 3; shield++) {\n            shields.add(new Shield(-10 + shield\
  \ * 10 - 1, 0, -3));\n            shields.add(new Shield(-10 + shield * 10 + 0,\
  \ 0, -3));\n            shields.add(new Shield(-10 + shield * 10 + 1, 0, -3));\n\
  \            shields.add(new Shield(-10 + shield * 10 - 1, 0, -2));\n          \
  \  shields.add(new Shield(-10 + shield * 10 + 1, 0, -2));\n        }\n    }\n```\n\
  \n`generateShields()` 类也做了类似的事情：实例化三个护盾，每个护盾由五个护盾方块组成，布局如图 12–2 所示。\n\n```\n   \
  \ public void setWorldListener(WorldListener worldListener) {\n        this.listener\
  \ = worldListener;\n    }\n```\n\n一个 setter 方法可以设置 `World` 的监听器。\n\n```\n    public\
  \ void update(float deltaTime, float accelX) {\n        ship.update(deltaTime, accelX);\n\
  \        updateInvaders(deltaTime);\n        updateShots(deltaTime);\n\n       \
  \ checkShotCollisions();\n        checkInvaderCollisions();\n\n        if (invaders.size()\
  \ == 0) {\n            generateInvaders();\n            waves++;\n            speedMultiplier\
  \ += 0.5f;\n        }\n    }\n```\n\n`update()` 方法出奇地简单。它使用当前的 delta 时间以及加速度计 y\
  \ 轴的读数，并将后者传递给 `Ship.update()`。飞船更新后，调用 `updateInvaders()` 和 `updateShots()`，它们负责更新这两类对象。在世界中所有对象更新完成后，开始检测碰撞。`checkShotCollision()`\
  \ 方法将检测所有子弹与飞船和/或入侵者之间的碰撞。\n\n最后，检查入侵者是否全部死亡，如果是，则生成新一波入侵者。为了垃圾回收器着想，你可以通过 `Pool`\
  \ 等方式重用旧的 `Invader` 实例。但为了简化，这里直接创建新实例。顺便一提，子弹也是如此。鉴于你在一次游戏会话中创建的对象数量很少，垃圾回收器几乎不会触发。如果你想让垃圾回收器彻底放心，只需使用\
  \ `Pool` 来重用已死亡的入侵者和子弹即可。另外，注意这里也增加了速度乘数！\n\n```\n    private void updateInvaders(float\
  \ deltaTime) {\n        int len = invaders.size();\n        for (int i = 0; i <\
  \ len; i++) {\n            Invader invader = invaders.get(i);\n            invader.update(deltaTime,\
  \ speedMultiplier);\n\n            if (invader.state == Invader.INVADER_ALIVE) {\n\
  \                if (random.nextFloat() < 0.001f) {\n                    Shot shot\
  \ = new Shot(invader.position.x,\n                                         invader.position.y,\n\
  \                                         invader.position.z,\n                \
  \                         Shot.SHOT_VELOCITY);\n                    shots.add(shot);\n\
  \                    listener.shot();\n                }\n            }\n\n    \
  \        if (invader.state == Invader.INVADER_DEAD &&\n                invader.stateTime\
  \ > Invader.INVADER_EXPLOSION_TIME) {\n                invaders.remove(i);\n   \
  \             i--;\n                len--;\n            }\n        }\n    }\n```\n\
  \n`updateInvaders()` 方法有几项职责。它遍历所有入侵者并调用它们的 `update()` 方法。更新完一个 `Invader` 实例后，检查它是否存活。如果是，则通过生成随机数来决定其是否有机会发射子弹。如果该随机数小于\
  \ 0.001，则发射一颗子弹。这意味着每个入侵者在每一帧都有 0.1% 的概率发射子弹。如果发生这种情况，就实例化一颗新子弹，设置其速度使其沿 z 轴正方向移动，并通知监听器。如果\
  \ `Invader` 已死亡并完成爆炸，则简单地从当前入侵者列表中移除它。\n\n\n\n```java\nprivate void updateShots(float\
  \ deltaTime) {\n    int len = shots.size();\n    for (int i = 0; i < len; i++) {\n\
  \        Shot shot = shots.get(i);\n        shot.update(deltaTime);\n        if\
  \ (shot.position.z < WORLD_MIN_Z || shot.position.z > 0) {\n            shots.remove(i);\n\
  \            i--;\n            len--;\n        }\n    }\n}\n```\n\n`updateShots()`\
  \ 方法同样简单。遍历所有子弹，更新它们的位置，并检查每个子弹是否已离开游戏区域，若是，则将其从 `shots` 列表中移除。\n\n```java\nprivate\
  \ void checkInvaderCollisions() {\n    if (ship.state == Ship.SHIP_EXPLODING)\n\
  \        return;\n\n    int len = invaders.size();\n    for (int i = 0; i < len;\
  \ i++) {\n        Invader invader = invaders.get(i);\n        if (OverlapTester.overlapSpheres(ship.bounds,\
  \ invader.bounds)) {\n            ship.lives = 1;\n            ship.kill();\n  \
  \          return;\n        }\n    }\n}\n```\n\n在 `checkInvaderCollisions()` 方法中，检查是否有任何入侵者与飞船发生了碰撞。这相当简单，因为你需要做的就是遍历所有入侵者，并检查每个入侵者的包围球体与飞船的包围球体是否重叠。根据游戏机制的定义，如果飞船与入侵者相撞，游戏即告结束。这就是为什么在调用\
  \ `Ship.kill()` 方法之前，先将飞船的 `lives` 设为 1。调用之后，飞船的 `live` 成员变量被设为 0，你将在另一个方法中使用它来检查游戏是否结束。\n\
  \n```java\nprivate void checkShotCollisions() {\n    int len = shots.size();\n \
  \   for (int i = 0; i < len; i++) {\n        Shot shot = shots.get(i);\n       \
  \ boolean shotRemoved = false;\n\n        int len2 = shields.size();\n        for\
  \ (int j = 0; j < len2; j++) {\n            Shield shield = shields.get(j);\n  \
  \          if (OverlapTester.overlapSpheres(shield.bounds, shot.bounds)) {\n   \
  \             shields.remove(j);\n                shots.remove(i);\n           \
  \     i--;\n                len--;\n                shotRemoved = true;\n      \
  \          break;\n            }\n        }\n        if (shotRemoved)\n        \
  \    continue;\n\n        if (shot.velocity.z < 0) {\n            len2 = invaders.size();\n\
  \            for (int j = 0; j < len2; j++) {\n                Invader invader =\
  \ invaders.get(j);\n                if (OverlapTester.overlapSpheres(invader.bounds,\
  \ shot.bounds) && invader.state == Invader.INVADER_ALIVE) {\n                  \
  \  invader.kill();\n                    listener.explosion();\n                \
  \    score += 10;\n                    shots.remove(i);\n                    i--;\n\
  \                    len--;\n                    break;\n                }\n   \
  \         }\n        } else {\n            if (OverlapTester.overlapSpheres(shot.bounds,\
  \ ship.bounds) && ship.state == Ship.SHIP_ALIVE) {\n                ship.kill();\n\
  \                listener.explosion();\n                shots.remove(i);\n     \
  \           i--;\n                len--;\n            }\n        }\n    }\n}\n```\n\
  \n`checkShotCollisions()` 方法稍微复杂一些。它遍历每个 `Shot` 实例，并检查它与护盾块、入侵者或飞船之间是否存在重叠。护盾块可以被飞船或入侵者发射的子弹击中。入侵者只能被飞船发射的子弹击中。而飞船只能被入侵者发射的子弹击中。要区分子弹是由飞船还是入侵者发射的，你只需要查看其\
  \ z 轴速度。如果速度为正值，则子弹朝向飞船移动，因此是由入侵者发射的。如果速度为负值，则是由飞船发射的。\n\n```java\npublic boolean\
  \ isGameOver() {\n    return ship.lives == 0;\n}\n```\n\n`isGameOver()` 方法的作用很简单：向外部告知飞船是否已经失去了所有生命值。\n\
  \n```java\npublic void shoot() {\n    if (ship.state == Ship.SHIP_EXPLODING)\n \
  \       return;\n\n    int friendlyShots = 0;\n    int len = shots.size();\n   \
  \ for (int i = 0; i < len; i++) {\n        if (shots.get(i).velocity.z < 0)\n  \
  \          friendlyShots++;\n    }\n\n    if (System.nanoTime() - lastShotTime >\
  \ 1000000000 || friendlyShots == 0) {\n        shots.add(new Shot(ship.position.x,\
  \ ship.position.y, ship.position.z, -Shot.SHOT_VELOCITY));\n        lastShotTime\
  \ = System.nanoTime();\n        listener.shot();\n    }\n}\n```\n\n最后，还有 `shoot()`\
  \ 方法。它会在用户每次按下开火按钮时从外部调用。正如游戏机制部分所述，飞船可以每秒发射一颗子弹，或者如果场上没有飞船发射的子弹，也可以立即发射。当然，如果飞船正在爆炸，它是无法开火的，所以这是你需要检查的第一件事。接下来，遍历所有\
  \ `Shot` 实例，检查其中是否有飞船发射的子弹。如果没有，你可以立即开火。否则，检查上一次发射子弹的时间。如果距离上一次发射已过去超过一秒，则发射一颗新子弹。这次，将速度设置为\
  \ `-Shot.SHOT_VELOCITY`，这样子弹就会沿着 z 轴负方向朝入侵者移动。和往常一样，调用监听器来通知它这一事件。\n\n至此，构成游戏世界的所有类都已介绍完毕！与你在\
  \ *Super Jumper* 中的实现相比，原理几乎相同，代码也非常相似。当然，*Droid Invaders* 是一个非常简单的游戏，因此你可以使用简单的解决方案，例如对一切物体都使用包围球体。对于许多简单的\
  \ 3D 游戏来说，这就足够了。接下来是你游戏的最后两个部分：`GameScreen` 类和 `WorldRenderer` 类！\n\n\n\n### `GameScreen`\
  \ 类\n\n当游戏切换到 `GameScreen` 类时，玩家无需声明“准备就绪”即可立即开始游戏。你只需要关注以下几种状态：\n\n- **运行状态**：在此状态下渲染背景、世界和\
  \ UI 元素，如图 12-4 所示。\n- **暂停状态**：在此状态下渲染背景、世界和暂停菜单，如图 12-4 所示。\n- **游戏结束状态**：在此状态下渲染的内容与上述类似。\n\
  \n遵循 Super Jumper 中使用的相同方法，为这三种状态分别提供不同的 `update()` 和 `present()` 方法。\n\n此类中唯一值得关注的部分是如何处理用户输入以移动飞船。你希望玩家能够通过屏幕按钮或加速度计来控制飞船。你可以读取\
  \ `Settings.touchEnabled` 字段来判断用户对此的偏好。根据激活的输入方式，决定是否渲染屏幕按钮，并将适当的加速度计值传递给 `World.update()`\
  \ 方法来移动飞船。\n\n使用屏幕按钮时，无需使用加速度计值；只需向 `World.update()` 方法传递一个恒定的人为加速度值即可。该值的范围必须在\
  \ -10（向左）到 10（向右）之间。经过一些试验，你可能发现通过屏幕按钮向左移动时取 -5，向右移动时取 5。\n\n此类中另一个有趣的部分是组合渲染 3D\
  \ 游戏世界和 2D UI 元素的方式。请看代码清单 12-11 中 `GameScreen` 类的代码。\n\n**代码清单 12-11.** *GameScreen.java，游戏屏幕*\n\
