  \ {\n            if (lastX == -1) {\n                lastX = x;\n              \
  \  lastY = y;\n            } else {\n                camera.rotate((x - lastX) /\
  \ 10, (y - lastY) / 10);\n                lastX = x;\n                lastY = y;\n\
  \            }\n        }\n    } else {\n        lastX = -1;\n        lastY = -1;\n\
  \    }\n}\n```\n\n`update()`方法是所有滑动旋转和移动操作发生的地方，基于触摸事件驱动。我们首先通过调用`Input.getTouchEvents()`清空触摸事件缓冲区。接下来，获取屏幕上第一根手指的当前触摸坐标。注意，如果没有手指触摸屏幕，调用的方法将返回索引为零的手指的最后一个已知位置。我们还将真实触摸坐标转换到\
  \ 2D UI 坐标系，以便轻松检查左下角的按钮是否被按下。\n\n有了这些值后，我们检查是否有手指正在触摸屏幕。如果是，首先检查是否触摸了按钮（在 2D UI\
  \ 系统中坐标范围从(0,0)到(64,64)）。如果是这种情况，我们获取摄像机的当前方向并将其乘以当前增量时间后添加到位置向量上。由于方向向量是单位向量，这意味着摄像机将以每秒一个单位的速度移动。\n\
  \n如果按钮未被触摸，我们将触摸解释为滑动手势。为此，我们需要有一个有效的最后一个已知触摸坐标。用户第一次放下手指时，`lastX`和`lastY`成员的值将为-1，表示我们无法计算上次和当前触摸坐标之间的差值，因为只有一个数据点。因此，我们只需存储当前触摸坐标并从`update()`方法返回。如果上次调用`update()`时记录了触摸坐标，我们只需计算当前触摸坐标与上次触摸坐标在\
  \ x 轴和 y 轴上的差值。我们直接将这些差值转换为旋转角度的增量。为了稍微减慢旋转速度，我们将差值除以 10。剩下的就是调用`EulerCamera.rotate()`方法，该方法将相应地调整旋转角度。\n\
  \n最后，如果没有手指触摸屏幕，我们将`lastX`和`lastY`成员设置为-1，表示在能够进行滑动手势处理之前必须等待第一次触摸事件。\n\n## `present()`方法\n\
  \n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT | GL10.GL_DEPTH_BUFFER_BIT);\n    gl.glViewport(0,\
  \ 0, glGraphics.getWidth(), glGraphics.getHeight());\n\n    camera.setMatrices(gl);\n\
