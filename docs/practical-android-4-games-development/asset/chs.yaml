  \n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT\n            | GL10.GL_DEPTH_BUFFER_BIT);\n\
  \    guiCam.setViewportAndMatrices();\n\n    gl.glEnable(GL10.GL_TEXTURE_2D);\n\
  \    batcher.beginBatch(Assets.background);\n    batcher.drawSprite(240, 160, 480,\
  \ 320, Assets.backgroundRegion);\n    batcher.endBatch();\n    gl.glDisable(GL10.GL_TEXTURE_2D);\n\
  \n    renderer.render(world, deltaTime);\n\n    switch (state) {\n        case GAME_RUNNING:\n\
  \            presentRunning();\n            break;\n        case GAME_PAUSED:\n\
  \            presentPaused();\n            break;\n        case GAME_OVER:\n   \
  \         presentGameOver();\n    }\n\n    fpsCounter.logFrame();\n}\n```\n\n`present()`\
  \ 方法实际上也非常简单。像往常一样，首先清除帧缓冲区。同时清除 z 缓冲区，因为您将要渲染一些需要 z 测试的 3D 对象。接下来，设置投影矩阵，以便像在 `MainMenuScreen`\
  \ 或 `SettingsScreen` 中一样渲染 2D 背景图像。完成后，告诉 `WorldRenderer` 渲染游戏世界。最后，根据当前状态委托 UI\
  \ 元素的渲染。请注意，`WorldRenderer.render()` 方法负责设置渲染 3D 世界所需的一切！\n\n```java\nprivate void\
  \ presentPaused() {\n    GL10 gl = glGraphics.getGL();\n    guiCam.setViewportAndMatrices();\n\
  \    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \    gl.glEnable(GL10.GL_TEXTURE_2D);\n\n    batcher.beginBatch(Assets.items);\n\
  \    Assets.font.drawText(batcher, scoreString, 10, 320-20);\n    batcher.drawSprite(240,\
  \ 160, 160, 64, Assets.pauseRegion);\n    batcher.endBatch();\n\n    gl.glDisable(GL10.GL_TEXTURE_2D);\n\
  \    gl.glDisable(GL10.GL_BLEND);\n}\n```\n\n`presentPaused()` 方法仅通过存储在 `Assets`\
  \ 中的 `Font` 实例渲染 `scoreString`，以及暂停菜单。请注意，此时已经渲染了背景图像和 3D 世界。因此，所有 UI 元素都将叠加在 3D\
  \ 世界之上。\n\n```java\nprivate void presentRunning() {\n    GL10 gl = glGraphics.getGL();\n\
  \    guiCam.setViewportAndMatrices();\n    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA,\
  \ GL10.GL_ONE_MINUS_SRC_ALPHA);\n    gl.glEnable(GL10.GL_TEXTURE_2D);\n\n    batcher.beginBatch(Assets.items);\n\
  \    batcher.drawSprite(480- 32, 320 - 32, 64, 64, Assets.pauseButtonRegion);\n\
  \    Assets.font.drawText(batcher, scoreString, 10, 320-20);\n    if (Settings.touchEnabled)\
  \ {\n        batcher.drawSprite(32, 32, 64, 64, Assets.leftRegion);\n        batcher.drawSprite(96,\
  \ 32, 64, 64, Assets.rightRegion);\n    }\n    batcher.drawSprite(480 - 40, 32,\
  \ 64, 64, Assets.fireRegion);\n    batcher.endBatch();\n\n    gl.glDisable(GL10.GL_TEXTURE_2D);\n\
  \    gl.glDisable(GL10.GL_BLEND);\n}\n```\n\n`presentRunning()` 方法也很直接。首先渲染 `scoreString`。如果启用了触摸输入，则渲染左右移动按钮。最后，渲染发射按钮并重置所有已更改的\
  \ OpenGL ES 状态（纹理和混合）。\n\n```java\nprivate void presentGameOver() {\n    GL10 gl\
  \ = glGraphics.getGL();\n    guiCam.setViewportAndMatrices();\n    gl.glEnable(GL10.GL_BLEND);\n\
  \    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n    gl.glEnable(GL10.GL_TEXTURE_2D);\n\
  \n    batcher.beginBatch(Assets.items);\n    batcher.drawSprite(240, 160, 128, 64,\
  \ Assets.gameOverRegion);\n    Assets.font.drawText(batcher, scoreString, 10, 320-20);\n\
  \    batcher.endBatch();\n\n    gl.glDisable(GL10.GL_TEXTURE_2D);\n    gl.glDisable(GL10.GL_BLEND);\n\
  }\n```\n\n\n`presentGameOver()`方法的内容大同小异——只是渲染一些字符串和 UI。\n\n```java\n@Override\n\
  public void pause() {\n    state = GAME_PAUSED;\n}\n```\n\n最后是`pause()`方法，它只是将`GameScreen`切换至暂停状态。\n\
  \n```java\n@Override\npublic void resume() {\n\n}\n\n@Override\npublic void dispose()\
  \ {\n\n}\n}\n```\n\n其余部分都是空存根，以便实现`GLGame`接口。接下来介绍最后一个类：`WorldRenderer`！\n\n###\
  \ WorldRender 类\n\n回想一下需要在 3D 中渲染的内容：\n\n*   飞船——使用飞船模型和纹理，并应用光照。\n*   入侵者——使用入侵者模型和纹理，同样应用光照。\n\
  *   战场上的任何子弹——基于子弹模型，本次无纹理但带光照。\n*   护盾方块——基于护盾方块模型，无纹理，但带光照和透明度（参见 图 12–3）。\n*\
  \   爆炸效果——当飞船或入侵者爆炸时，用爆炸效果替代其模型。爆炸效果自然不带光照。\n\n前四项的编码您已掌握。但爆炸效果如何处理呢？\n\n其实可以借助`SpriteBatcher`实现。根据爆炸中的飞船或入侵者的状态时间，从持有爆炸动画的`Animation`实例中获取`TextureRegion`（参见`Assets`类）。`SpriteBatcher`只能在\
  \ x/y 平面上渲染带纹理的矩形，因此需要想办法将该矩形移动到空间中的任意位置（即爆炸的飞船或入侵者所在位置）。只需在通过`SpriteBatcher`渲染矩形之前，对模型-视图矩阵调用`glTranslatef()`即可轻松实现！\n\
  \n其他对象的渲染设置非常直观。设置一个从右上方射来的方向光，以及一个环境光，让所有对象无论朝向如何都能获得微弱照明。摄像机位于飞船稍上后方，视线看向飞船前方一点。为此可使用`LookAtCamera`。要让摄像机跟随飞船，需保持其位置坐标和视线点的\
  \ x 坐标与飞船的 x 坐标同步。\n\n作为额外视觉效果，让入侵者绕 y 轴旋转。同时，让飞船根据其当前速度绕 z 轴旋转，使其看起来朝运动方向倾斜。\n\n\
  现在开始编写代码！清单 12–12 展示了 Droid Invaders 的最终类。\n\n**清单 12–12.** *WorldRenderer.java,\
  \ 世界渲染器*\n\n```java\npackage com.badlogic.androidgames.droidinvaders;\n\nimport\
  \ java.util.List;\n\nimport javax.microedition.khronos.opengles.GL10;\n\nimport\
  \ com.badlogic.androidgames.framework.gl.AmbientLight;\nimport com.badlogic.androidgames.framework.gl.Animation;\n\
  import com.badlogic.androidgames.framework.gl.DirectionalLight;\nimport com.badlogic.androidgames.framework.gl.LookAtCamera;\n\
  import com.badlogic.androidgames.framework.gl.SpriteBatcher;\nimport com.badlogic.androidgames.framework.gl.TextureRegion;\n\
  import com.badlogic.androidgames.framework.impl.GLGraphics;\nimport com.badlogic.androidgames.framework.math.Vector3;\n\
  \npublic class WorldRenderer {\n    GLGraphics glGraphics;\n    LookAtCamera camera;\n\
  \    AmbientLight ambientLight;\n    DirectionalLight directionalLight;\n    SpriteBatcher\
  \ batcher;\n    float invaderAngle = 0;\n```\n\n`WorldRenderer`保存了`GLGraphics`实例，用于获取`GL10`对象。还包含一个`LookAtCamera`、一个`AmbientLight`、一个`DirectionalLight`和一个`SpriteBatcher`。最后，用一个成员变量记录所有入侵者的当前旋转角度。\n\
  \n```java\npublic WorldRenderer(GLGraphics glGraphics) {\n    this.glGraphics =\
  \ glGraphics;\n    camera = new LookAtCamera(67, glGraphics.getWidth()\n       \
  \         / (float) glGraphics.getHeight(), 0.1f, 100);\n        camera.getPosition().set(0,\
  \ 6, 2);\n        camera.getLookAt().set(0, 0, -4);\n    ambientLight = new AmbientLight();\n\
  \        ambientLight.setColor(0.2f, 0.2f, 0.2f, 1.0f);\n    directionalLight =\
  \ new DirectionalLight();\n        directionalLight.setDirection(-1, -0.5f, 0);\n\
  \    batcher = new SpriteBatcher(glGraphics, 10);\n    }\n```\n\n\n\n在构造函数中，像往常一样设置所有成员。摄像机具有\
  \ 67°的视野、0.1 个单位的近裁剪平面距离和 100 个单位的远裁剪平面距离。视锥体因此可以轻松包含整个游戏世界。将其定位在飞船的上方和后方，并让它看向`(0,0,-4)`。环境光仅是一种微弱的灰色，而定向光是白色，来自右上侧。最后，实例化`SpriteBatcher`，以便能够渲染爆炸矩形。\n\
  \n```\npublic void render(World world, float deltaTime) {\n        GL10 gl = glGraphics.getGL();\n\
  \        camera.getPosition().x = world.ship.position.x;\n        camera.getLookAt().x\
  \ = world.ship.position.x;\n        camera.setMatrices(gl);\n\n        gl.glEnable(GL10.GL_DEPTH_TEST);\n\
  \        gl.glEnable(GL10.GL_TEXTURE_2D);\n        gl.glEnable(GL10.GL_LIGHTING);\n\
  \        gl.glEnable(GL10.GL_COLOR_MATERIAL);\n        ambientLight.enable(gl);\n\
  \        directionalLight.enable(gl, GL10.GL_LIGHT0);\n\n        renderShip(gl,\
  \ world.ship);\n        renderInvaders(gl, world.invaders, deltaTime);\n\n     \
  \   gl.glDisable(GL10.GL_TEXTURE_2D);\n\n        renderShields(gl, world.shields);\n\
  \        renderShots(gl, world.shots);\n\n        gl.glDisable(GL10.GL_COLOR_MATERIAL);\n\
  \        gl.glDisable(GL10.GL_LIGHTING);\n        gl.glDisable(GL10.GL_DEPTH_TEST);\n\
  \    }\n```\n\n在`render()`方法中，首先将摄像机的 x 坐标设置为飞船的 x 坐标。当然，也要相应地设置摄像机注视点的 x 坐标。这样，摄像机就会跟随飞船。一旦位置和注视点更新完毕，通过调用`LookAtCamera.setMatrices()`来设置投影矩阵和模型视图矩阵。\n\
  \n接下来，设置渲染所需的所有状态。你需要深度测试、纹理映射、光照以及颜色材质功能，这样就不必通过`glMaterial()`为物体指定材质。接下来的两条语句激活了环境光和定向光。通过这些调用，一切设置就绪，可以开始渲染物体了。\n\
  \n首先渲染的是飞船，通过调用`renderShip()`实现。然后，通过调用`renderInvaders()`渲染入侵者。\n\n由于护盾方块和子弹不需要纹理贴图，直接禁用它以节省一些计算。关闭纹理后，通过调用`renderShots()`和`renderShields()`来渲染子弹和护盾。\n\
  \n最后，禁用之前设置的其他状态，以便将干净的 OpenGL ES 状态返回给调用者。\n\n```\nprivate void renderShip(GL10\
  \ gl, Ship ship) {\n        if (ship.state == Ship.SHIP_EXPLODING) {\n         \
  \   gl.glDisable(GL10.GL_LIGHTING);\n            renderExplosion(gl, ship.position,\
  \ ship.stateTime);\n            gl.glEnable(GL10.GL_LIGHTING);\n        } else {\n\
  \            Assets.shipTexture.bind();\n            Assets.shipModel.bind();\n\
  \            gl.glPushMatrix();\n            gl.glTranslatef(ship.position.x, ship.position.y,\
  \ ship.position.z);\n            gl.glRotatef(ship.velocity.x / Ship.SHIP_VELOCITY\
  \ * 90, 0, 0, -1);\n            Assets.shipModel.draw(GL10.GL_TRIANGLES, 0,\n  \
  \                  Assets.shipModel.getNumVertices());\n            gl.glPopMatrix();\n\
  \            Assets.shipModel.unbind();\n        }\n    }\n```\n\n`renderShip()`方法首先检查飞船的状态。如果飞船正在爆炸，则禁用光照，调用`renderExplosion()`在飞船位置渲染爆炸效果，然后重新启用光照。\n\
  \n如果飞船存活，则绑定其纹理和模型，推送模型视图矩阵，将其移动到自身位置并根据其速度绕 z 轴旋转，然后绘制其模型。最后，再次弹出模型视图矩阵（只保留摄像机的视图），并解绑飞船模型的顶点。\n\
  \n```\nprivate void renderInvaders(GL10 gl, List<Invader> invaders, float deltaTime)\
  \ {\n        invaderAngle += 45 * deltaTime;\n\n        Assets.invaderTexture.bind();\n\
  \        Assets.invaderModel.bind();\n        int len = invaders.size();\n     \
  \   for (int i = 0; i < len; i++) {\n            Invader invader = invaders.get(i);\n\
  \            if (invader.state == Invader.INVADER_DEAD) {\n                gl.glDisable(GL10.GL_LIGHTING);\n\
  \                Assets.invaderModel.unbind();\n                renderExplosion(gl,\
  \ invader.position, invader.stateTime);\n                Assets.invaderTexture.bind();\n\
  \                Assets.invaderModel.bind();\n                gl.glEnable(GL10.GL_LIGHTING);\n\
  \            } else {\n                gl.glPushMatrix();\n                gl.glTranslatef(invader.position.x,\
  \ invader.position.y,\n                        invader.position.z);\n          \
  \      gl.glRotatef(invaderAngle, 0, 1, 0);\n                Assets.invaderModel.draw(GL10.GL_TRIANGLES,\
  \ 0,\n                        Assets.invaderModel.getNumVertices());\n         \
  \       gl.glPopMatrix();\n            }\n        }\n        Assets.invaderModel.unbind();\n\
  \    }\n```\n\n`renderInvaders()`方法与`renderShip()`方法非常相似。唯一的区别在于，你遍历入侵者列表，并在遍历之前绑定纹理和网格。这大大减少了绑定次数并加速了渲染。对于每个入侵者，再次检查其状态，并渲染爆炸效果或普通的入侵者模型。由于你在`for`循环外部绑定了模型和纹理，你必须在渲染爆炸效果而非入侵者之前解绑并重新绑定它们。\n\
  \n```\nprivate void renderShields(GL10 gl, List<Shield> shields) {\n        gl.glEnable(GL10.GL_BLEND);\n\
  \        gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n     \
  \   gl.glColor4f(0, 0, 1, 0.4f);\n        Assets.shieldModel.bind();\n        int\
  \ len = shields.size();\n        for (int i = 0; i < len; i++) {\n            Shield\
  \ shield = shields.get(i);\n            gl.glPushMatrix();\n            gl.glTranslatef(shield.position.x,\
  \ shield.position.y,\n                    shield.position.z);\n            Assets.shieldModel.draw(GL10.GL_TRIANGLES,\
  \ 0,\n                    Assets.shieldModel.getNumVertices());\n            gl.glPopMatrix();\n\
  \        }\n        Assets.shieldModel.unbind();\n        gl.glColor4f(1, 1, 1,\
  \ 1f);\n        gl.glDisable(GL10.GL_BLEND);\n    }\n```\n\n`renderShields()`方法渲染，你猜对了，护盾方块。应用与渲染入侵者时相同的原则。你只绑定一次模型。由于没有纹理，你不需要绑定纹理。然而，你需要启用混合。将全局顶点颜色设置为蓝色，alpha\
  \ 分量设置为 0.4。这将使护盾方块稍微透明。\n\n```\nprivate void renderShots(GL10 gl, List<Shot> shots)\
  \ {\n        gl.glColor4f(1, 1, 0, 1);\n        Assets.shotModel.bind();\n     \
  \   int len = shots.size();\n        for (int i = 0; i < len; i++) {\n         \
  \   Shot shot = shots.get(i);\n            gl.glPushMatrix();\n            gl.glTranslatef(shot.position.x,\
  \ shot.position.y, shot.position.z);\n            Assets.shotModel.draw(GL10.GL_TRIANGLES,\
  \ 0,\n                    Assets.shotModel.getNumVertices());\n            gl.glPopMatrix();\n\
  \        }\n        Assets.shotModel.unbind();\n        gl.glColor4f(1, 1, 1, 1);\n\
  \    }\n```\n\n在`renderShots()`中渲染子弹与渲染护盾相同，只是你没有使用混合，并且使用了不同的顶点颜色（黄色）。\n\n\n\n\
  ```java\nprivate void renderExplosion(GL10 gl, Vector3 position, float stateTime)\
  \ {\n    TextureRegion frame = Assets.explosionAnim.getKeyFrame(stateTime,\n   \
  \         Animation.ANIMATION_NONLOOPING);\n\n    gl.glEnable(GL10.GL_BLEND);\n\
  \    gl.glPushMatrix();\n    gl.glTranslatef(position.x, position.y, position.z);\n\
  \    batcher.beginBatch(Assets.explosionTexture);\n    batcher.drawSprite(0, 0,\
  \ 2, 2, frame);\n    batcher.endBatch();\n    gl.glPopMatrix();\n    gl.glDisable(GL10.GL_BLEND);\n\
  }\n```\n\n最后是神秘的 `renderExplosion()` 方法。你需要获取想要渲染爆炸效果的位置，以及正在爆炸的物体的状态时间。后者用于从爆炸\
  \ `Animation` 中获取正确的 `TextureRegion`，就像你在 Super Jumper 中为 Bob 所做的那样。\n\n你做的第一件事是基于状态时间获取爆炸动画帧。接下来，启用混合，因为爆炸效果包含透明像素，你不想渲染这些像素。推送当前的模型-视图矩阵并调用\
  \ `glTranslatef()`，这样在此调用之后渲染的任何内容都将位于指定位置。告知 `SpriteBatcher` 你即将使用爆炸纹理渲染一个矩形。\n\
  \n下一个调用就是魔法发生的地方。告知 `SpriteBatcher` 在 (0,0,0) 处渲染一个宽度和高度为 2 个单位的矩形（z 坐标未显式给出，但默认为零，还记得吗？）。因为你使用了\
  \ `glTranslatef()`，该矩形将不再以原点为中心，而是以你指定给 `glTranslatef()` 的位置为中心，这个位置恰好就是发生爆炸的飞船或入侵者的位置。最后，弹出模型-视图矩阵并再次禁用混合。\n\
  \n就是这样。十二个类，构成了一个完整的 3D 游戏，复现了经典的太空入侵者游戏。试试看吧。等你回来，可以再看看性能特性。\n\n## 优化\n\n在你考虑优化游戏之前，必须先评估其性能表现。我们在\
  \ `GameScreen` 类中加入了一个 `FPSCounter`，让我们看看它在 Hero、Droid 和 Nexus One 上的输出。\n\n```\n\
  Hero (Android 1.5):\n02-17 00:59:04.180: DEBUG/FPSCounter(457): fps: 25\n02-17 00:59:05.220:\
  \ DEBUG/FPSCounter(457): fps: 26\n02-17 00:59:06.260: DEBUG/FPSCounter(457): fps:\
  \ 26\n02-17 00:59:07.280: DEBUG/FPSCounter(457): fps: 26\n\nNexus One (Android 2.2.1):\n\
  02-17 01:05:40.679: DEBUG/FPSCounter(577): fps: 41\n02-17 01:05:41.699: DEBUG/FPSCounter(577):\
  \ fps: 41\n02-17 01:05:42.729: DEBUG/FPSCounter(577): fps: 41\n02-17 01:05:43.729:\
  \ DEBUG/FPSCounter(577): fps: 40\n\nDroid (Android 2.1.1):\n02-17 01:47:44.096:\
  \ DEBUG/FPSCounter(1758): fps: 47\n02-17 01:47:45.112: DEBUG/FPSCounter(1758): fps:\
  \ 47\n02-17 01:47:46.127: DEBUG/FPSCounter(1758): fps: 47\n02-17 01:47:47.135: DEBUG/FPSCounter(1758):\
  \ fps: 46\n```\n\nHero 的表现有些吃力，但在 25 fps 下游戏依然可玩。Nexus One 达到了约 41 fps，Droid 也达到了\
  \ 47 fps，运行相当流畅。还能做得更好吗？\n\n就状态变化而言，情况并不算太糟。你可以在这里或那里减少一些冗余变化，例如一些 `glEnable()`\
  \ / `glDisable()` 调用。但从以往的优化尝试来看，你知道这并不能显著减少开销。\n\n对于 Hero 设备，有一件事你可以做：禁用光照。一旦移除\
  \ `WorldRenderer.render()`、`WorldRenderer.renderShip()` 和 `WorldRenderer.renderInvaders()`\
  \ 中相应的 `glEnable()` / `glDisable()` 调用，Hero 就能达到以下帧率：\n\n```\nHero (Android 1.5):\n\
  02-17 01:14:44.580: DEBUG/FPSCounter(618): fps: 31\n02-17 01:14:45.600: DEBUG/FPSCounter(618):\
  \ fps: 31\n02-17 01:14:46.610: DEBUG/FPSCounter(618): fps: 31\n02-17 01:14:47.630:\
  \ DEBUG/FPSCounter(618): fps: 31\n```\n\n这是一个相当大的改进，而你只需要关闭光照。为特定设备编写特化的渲染代码是可行的，但最好避免这样做。还有其他可以做的地方吗？\n\
  \n在渲染爆炸效果时，如果处理的是正在爆炸的入侵者，你的方法并非最优。你可能会在渲染所有入侵者的过程中更改模型和纹理绑定，这会使图形管线有些不开心。然而，爆炸并不经常发生，持续时间也不长（1.6\
  \ 秒）。但刚刚展示的测量结果是在屏幕上没有任何爆炸效果的情况下取得的，所以问题并不在此。\n\n事实是，你在每一帧渲染了太多的物体，导致了显著的调用开销，并轻微地阻塞了管线。以你目前对\
  \ OpenGL ES 的了解，对此并没有太多办法。不过，鉴于游戏在所有设备上“感觉”都可玩性不错，那么达到 60 fps 并非绝对必要。众所周知，Droid\
  \ 和 Nexus One 即使要渲染稍微复杂的 3D 场景并以 60 帧每秒运行也相当困难。因此，你可以从中学到的最后一课是：如果你的游戏不能以 60 fps\
  \ 运行，不必抓狂。如果视觉效果流畅、游戏体验良好，即使 30 fps 也完全可以接受。\n\n**注意：** 其他常见的优化策略包括使用裁剪、顶点缓冲对象以及其他这里未讨论的更高级主题。我们曾尝试将这些技术应用到我们的\
  \ Droid Invaders 中——效果是：零。这些设备都没有从这些优化中获益。这并不意味着这些技术毫无用处。这取决于众多因素及其副作用，并且很难预测特定配置会如何表现。如果你感兴趣，只需在网络上搜索这些术语，然后自己尝试这些技术吧！\n\
  \n### 总结\n\n在本章中，你完成了第三个游戏，一个完整的 3D 太空入侵者复刻版。你运用了在本书中学到的所有技术和技巧，最终成果相当令人满意。当然，这些并非\
  \ AAA 级大作。事实上，这些游戏都无法让玩家长时间乐在其中。这正是你的用武之地。发挥创意，扩展这些游戏，让它们变得有趣！你已经拥有了可用的工具。\n\n##\
  \ 第 13 章\n\n## 发布你的游戏\n\n成为 Android 游戏开发者的最后一步是将你的游戏交给玩家。有两条可能的路径：\n\n- 从项目 `bin/`\
  \ 文件夹中取出 `APK` 文件，放到网上，然后告诉你的朋友们下载并在他们的设备上安装。\n- 像真正的专业人士一样，在 Android Market 上发布你的应用程序。\n\
  \n第一种选择是在你正式上架市场之前，让他人测试应用程序的绝佳方式。他们只需要获取 `APK` 文件并在自己的设备上安装即可。一旦你的游戏准备好正式发布，真正的乐趣就开始了。\n\
  \n\n\n### 关于测试的一点说明\n\n正如我们在前几章中所见，不同设备之间存在各种差异。在发布你的应用程序之前，请确保它在几款常见设备和不同的 Android\
  \ 版本上运行良好。遗憾的是，目前还没有简单的方法可以做到这一点。我们很幸运地拿到了几部手机，它们涵盖了不同的设备类别和代际，用于测试。然而，根据你的预算，这可能不是一个可行的选择。你可能不得不依赖模拟器（但不要过于依赖，因为它确实不可靠），或者最好找几个朋友来帮忙。\n\
  \n另一种测试应用程序的方法是将测试版发布到 Android Market。你可以在应用标题中明确标注其为测试版，以便用户了解情况。当然，有些用户会欣然忽略所有警告，然后抱怨你可能尚未完成的应用的质量。生活就是这样，你可能不得不面对负面甚至可能是无理的评论。不过请记住：用户是上帝。不要生他们的气——试着想办法改进你的应用。\n\
  \n以下是我们通常在发布前用于测试应用的设备列表：\n\n*   Samsung Galaxy Leo/I5801，320×240 像素屏幕\n*   HTC\
  \ Hero（Android 1.5），480×320 像素屏幕\n*   HTC G1（Android 1.6），480×320 像素屏幕\n*   Motorola\
  \ Milestone/Droid（Android 2.1），854×480 像素屏幕\n*   HTC Desire HD（Android 2.2），800×480\
  \ 像素屏幕\n*   Nexus One（Android 2.3），800×480 像素屏幕\n*   Samsung Galaxy S（Android 2.3），800×480\
  \ 像素屏幕\n*   Samsung Galaxy Tab 10.1（Android 3.1），1280×800 像素屏幕\n\n如你所见，我们覆盖了相当广泛的屏幕尺寸/分辨率和设备代际。如果你寻找外部测试人员，请确保他们能覆盖这里列出的大部分设备代际。当然，较新的设备也应在你的列表中，但主要是为了兼容性测试，而非性能测试。\n\
  \n最后，你必须接受一个事实：你无法在所有设备上测试你的应用。你很可能会收到一些无法解释的错误报告，这些错误很可能源于用户运行了行为异常的定制 ROM。无论如何，不要惊慌；这在某种程度上是正常的。但如果错误问题变得过于严重，你就必须想出一个应对方案。幸运的是，Android\
  \ Market 在这方面帮了我们一把。我们稍后会介绍它的工作原理。\n\n**注意：** 除了 Android Market 的错误报告功能，还有一个不错的解决方案叫做\
  \ `ACRA`（Android 应用崩溃报告），它是一个专门用于报告 Android 应用所有崩溃的开源库。你可以在 [`http://code.google.com/p/acra/`](http://code.google.com/p/acra/)\
  \ 找到它，并且非常易于使用。只需按照 Google Code 页面上的指南将其集成到你的应用中即可。\n\n### 成为注册开发者\n\nGoogle 让你在官方\
  \ Android Market 上发布应用变得非常容易。你只需一次性支付 25 美元的费用注册一个 Android 开发者账号。根据你所在的国家，此账号将允许你在市场上发布免费和/或付费应用。Google\
  \ 正在努力扩大可以销售应用的国家数量。\n\n要注册账号，请访问 [`https://market.android.com/publish/signup`](https://market.android.com/publish/signup)\
  \ 并按照那里的说明进行操作。\n\n除了 Android 开发者账号之外，如果你想销售应用，还需要注册一个免费的 Google Checkout 商家账号。你可以在开发者账号注册过程中选择执行此操作。我们不是律师，因此无法在此提供任何法律建议。在销售应用之前，请确保你了解其中的法律影响。如有疑问，请考虑咨询这方面的专家。我们并不是想因此吓倒你，因为整个过程总体来说是相当顺畅的，但你应该准备好向政府的税务部门汇报你的行为。\n\
  \nGoogle 将抽取你辛苦赚来的收入的 30%，用于分发你的应用并提供基础设施。这似乎是各个平台上的应用商店普遍采用的标准抽成比例。\n\n\n\n###\
  \ 签署游戏的 APK\n\n成功注册为官方 Android 开发者后，就该准备发布你的应用了。为了发布应用，你需要对`APK`文件进行签名。在此之前，应确保一切准备就绪。以下是签署应用前需要完成的一系列事项：\n\
  \n-   从清单文件的`<application>`标签中移除`android:debuggable`属性。\n-   在`<manifest>`标签中，你会找到`android:versionCode`和`android:versionName`属性。如果你已经发布过应用的旧版本，则必须增加`versionCode`属性，同时建议修改`versionName`。`versionCode`属性必须是整数；`versionName`可以是任意内容。\n\
  -   如果你的构建目标等于或高于 SDK 级别 8（Android 2.2），还应确保`<manifest>`标签中的`android:installLocation`属性设置为`preferExternal`或`auto`。这将满足用户的期望，确保应用在可能的情况下安装到外部存储。\n\
  -   确保只指定游戏真正需要的权限。用户不喜欢安装那些似乎要求不必要权限的应用。请检查清单文件中的`<uses-permission>`标签。\n-   确认已正确设置`android:minSdkVersion`和`android:targetSdkVersion`。你的应用只会显示在运行版本等于或高于指定\
  \ SDK 版本的 Android 手机的 Android Market 上。\n\n请仔细复查所有这些项目。完成后，你就可以按照以下步骤最终导出一个已签名的、准备上传到市场的`APK`文件：\n\
  \n1.  在包资源管理器视图中右键点击你的项目，选择 Android **工具 ![images](img/U001.jpg) 导出已签名的应用包**。这时会弹出图\
  \ 13–1 所示的对话框。\n\n   ![images](img/1301.jpg)\n\n   **图 13–1.** *导出签名对话框*\n\n2. \
  \ 点击`下一步`按钮，调出图 13–2 所示的对话框。\n\n   ![images](img/1302.jpg)\n\n   **图 13–2.** *选择或创建密钥库*\n\
  \n3.   *密钥库* 是一个受密码保护的文件，用于存储为你的`APK`文件签名的密钥。因为你还没有创建密钥库，所以现在需要在此对话框中创建。只需提供密钥库的位置以及用于保护它的密码。如果你已经创建了密钥库（例如，你要发布应用的第二个版本），可以选择`使用现有密钥库`单选按钮，并直接提供密钥库文件的位置。点击`下一步`按钮，调出图\
  \ 13–3 所示的对话框。\n\n   ![images](img/1303.jpg)\n\n   **图 13–3.** *创建用于签署`APK`的密钥*\n\
  \n4.  要创建有效密钥，你必须填写别名、密码和有效期（年），以及在`姓氏和名字`字段中填写名称。其余字段为可选，但最好也填写完整。再次点击`下一步`，将看到最终对话框（见图\
  \ 13–4）。\n\n   ![images](img/1304.jpg)\n\n   **图 13–4.** *指定目标文件*\n\n5.  现在，基本完成了。只需指定导出`APK`文件的存储位置，并记住该路径。稍后你想将该`APK`上传到市场时会用到。\n\
  \n当你想要发布一个已发布应用的新版本时，可以重复使用第一次操作对话框时创建的密钥库。在图 13–2 所示的对话框中，只需选择你之前创建的密钥库文件，并提供该密钥库的密码。然后你会看到图\
  \ 13–5 所示的对话框。\n\n只需选择你之前创建的密钥，提供其密码，然后像之前一样继续操作。这两种情况的结果都是得到一个已签名的、准备上传到 Android\
  \ Market 的`APK`文件。\n\n**注意：** 一旦你上传了一个已签名的`APK`，就必须使用相同的密钥来签署同一应用的任何后续版本。\n\n![images](img/1305.jpg)\n\
  \n**图 13–5.** *复用密钥*\n\n所以，你已经创建了第一个已签名的`APK`——恭喜！现在，我们来增加一点挑战，告诉你市场支持多个`APK`。对于单个应用，你可以创建多个`APK`，利用设备能力过滤为每个安装你应用的用户提供“最佳适配”。这是一个很棒的功能，因为它意味着你可以做到以下几点：\n\
  \n- 提供与特定 GPU 兼容的特定图像集。\n- 针对旧版 Android 提供功能有限的功能集。\n- 为更大屏幕提供更大尺寸的图形，为其他所有屏幕提供常规尺寸的图形。\n\
  \n随着时间的推移，Google 肯定会增加更多过滤器，但仅凭这里列出的这些，你就能真正精确地瞄准目标设备（如平板电脑），而无需为了保持第一代设备下载量合理而大费周折。\n\
  \n### 将游戏发布到市场\n\n现在可以登录你在 Android Market 网站上的开发者账户了。只需访问[`http://market.android.com/publish`](http://market.android.com/publish)并登录。你会看到图\
  \ 13–6 所示的界面。\n\n![images](img/1306.jpg)\n\n**图 13–6.** *欢迎来到 Android Market，开发者！*\n\
  \n这就是 Android 所谓的*开发者控制台*，我们稍后会讨论它。现在，让我们专注于发布应用。使用`上传应用`按钮即可开始。让我们来看看上传页面的各个部分，第一部分如图\
  \ 13–7 所示。\n\n![images](img/1307.jpg)\n\n**图 13–7.** *Android Developer Console\
  \ 上的编辑应用屏幕片段*\n\n#### 上传资源\n\n首先，你需要指定刚才签名并导出的`APK`文件。只需选择该文件，然后点击`上传`按钮。与此同时，你可以继续上传其余资源，因为`APK`会在后台继续上传。系统会在`APK`上传完成后进行检查，并在同一页面上向你报告任何错误。\n\
  \n你还必须提供至少两张应用截图。它们必须是特定格式（`JPEG`或`PNG`）和特定尺寸（320×480、480×800、480×854、1280×720 或\
  \ 1280×800）。当用户在 Android Market 上（无论是在移动应用还是官方网站[`http://market.android.com`](http://market.android.com)上）查看应用详情时，这些截图将会显示。\n\
  \n接下来，你需要上传一张 512×512 像素的高分辨率`PNG`或`JPEG`格式的应用图标。目前，该图标仅在用户在 Android Market 网站查看你的应用时显示。请务必把它做得精美一些。\n\
  \n如果你的游戏获得推荐，宣传图（180×120 像素，`PNG`或`JPEG`格式）和特色图（1024×500 像素）会显示在 Android Market\
  \ 上。获得推荐意义重大，这意味着用户在移动应用或网站上打开 Android Market 时，第一眼看到的就是你的应用。哪些应用能获得推荐由 Google 决定，只有他们知道决策依据。\n\
  \n最后，你可以提供一个指向应用推广 YouTube 视频的链接。该链接会出现在 Android Market 网站上。请注意，Android Market 的开发者界面不断变化，可能包含此处未列出的其他功能。\n\
  \n\n\n### 产品详情\n\n在产品详情部分，该内容将向 Android Market 的用户展示。您可以在此为您应用的标题（最多 30 个字符）和可选的描述（最多\
  \ 4000 个字符）指定多种语言。另外还有 500 个字符可用于通知用户您应用最新版本中的近期变更。推广文字仅在您的应用获得推荐时使用。\n\n接下来，您需要指定应用的**类型**和**类别**。每种应用类型都有一系列类别可供选择。对于游戏，您可以指定：街机与动作、益智与解谜、卡牌与赌场、休闲，或是竞速与体育。这些选项的分类方式可能让人有些困惑（竞速难道不属于体育？），而且本可以设计得更好。希望未来能有所改进。\n\
  \n最后，您需要决定用户是否需要为您的游戏付费。此项决定是最终决定。一旦您选择了两个选项中的一个，除非您使用不同的密钥重新发布游戏，否则将无法更改。如果这样做，您将丢失所有用户评论，并且还会在某种程度上疏远您的用户。请仔细思考您的游戏要走哪条路。我们不会就您的游戏定价提供建议，因为这取决于多种因素。`$0.99`\
  \ 美元的价格似乎是多数游戏的标准，用户也大致如此预期。但这也*不*妨碍您在此进行一些尝试。如果您出售游戏，请确保您了解其中涉及的法律问题。\n\n### 发布选项\n\
  \n“发布选项”面板允许您指定是否要对您的应用进行复制保护、设置内容分级以及选择希望应用上架的地区。复制保护功能几乎毫无用处，因为只需在网上查找几个指南就能轻易绕过。Google\
  \ 即将弃用这种类型的复制保护，该功能原本旨在防止用户从其设备复制您的 `APK` 文件并在网络上免费提供。相反，Google 现在提供了一个 API，用于将许可服务集成到您的应用中。该服务旨在增加用户盗版您游戏的难度。评估此服务不在本书的讨论范围内；如果您对盗版问题非常担忧，建议您访问\
  \ Android 开发者网站。与许多数字版权管理（DRM）方案一样，已有用户报告称，他们无法运行或安装使用了许可服务的应用。当然，对此也要持保留态度。这是您目前如果需要\
  \ DRM 所能得到的最佳选择。\n\n内容分级允许您指定目标受众。对于如何对您自己的应用进行分级有相关指南，您可以通过单击发布页面上的 `Learn More`\
  \ 链接来了解。Market 会根据您提供的内容分级来过滤您的应用。因此，请仔细评估适合您游戏的分级。\n\n最后，您可以选择您的应用在哪些地区上架。通常，您当然希望它在*全球*都能使用。但是，尽管可能性不大，但也可能存在您仅希望在特定地区发布应用的情况，这可能是出于法律原因。\n\
  \n### 发布！\n\n您在发布页面上需要指定的最后几项内容是：您的联系信息、您同意 Android 内容准则（同一页面上有链接——请阅读它们），以及确认您同意美国出口法律（通常都没有问题）。提供所有这些信息后，就可以单击页面底部那个大大的\
  \ `Publish` 按钮了！\n\n您的游戏将立即向全球数百万人开放。在 Android Market 上，您的应用将进入“最新上架”类别，只要不被其他新应用从列表中挤下去，用户就能发现它。不要试图去钻“最新上架”机制的空子；这行不通。每隔几小时上传一次应用的“新”版本并不会让您的应用在“最新上架”列表中上升。\n\
  \n### 市场营销\n\n虽然这远远超出了我们的专业领域，但这里有一些关于市场营销的思考。围绕 Android 平台，网络上有一个健康的生态系统，包括新闻网站、博客、论坛等等。大多数博客和新闻网站乐于报道新游戏，因此请尝试尽可能多地去联系它们。还有一些特定于游戏的\
  \ Android 网站，例如 `http://www.droidgamers.com`，应该是您发布信息的首要目标。如果不进行一点营销，您的游戏不太可能受到关注，因为“最新上架”列表的动态性非常高。市场营销是您游戏成功的一部分。关于这个主题已经写了成千上万本书，但我们认为没有什么神奇的公式。制作一款出色的游戏，然后让大家知道它。\n\
  \n### 开发者控制台\n\n一旦您的游戏上架，您会希望跟踪它的状态。到目前为止有多少人下载了它？有没有崩溃？用户怎么评价？所有这些都可以在开发者控制台中查看（参见图\
  \ 13–6）。对于您发布的每个应用，您都可以获取以下信息：\n\n-   您游戏的总体评分和评分数量\n-   用户发表的评论（只需点击相应应用的 `Comments`\
  \ 链接）\n-   您的应用被安装的次数\n-   您的应用的**有效**安装数\n-   错误报告\n\n错误报告是我们特别感兴趣的。图 13–8 显示了收到的关于\
  \ Newton 游戏的错误报告。\n\n![images](img/1308.jpg)\n\n**图 13–8.** *错误报告概览*\n\n总共有 8 次卡死和\
  \ 2 次崩溃。Newton 上架已超过一年，所以这个结果还算不错。当然，您可以进一步深入查看具体的错误。开发者控制台的错误报告功能将为您提供关于崩溃和卡死的详细信息，例如问题发生的设备型号、完整的堆栈跟踪等。当您试图弄清楚应用到底出了什么问题时，这会非常有帮助。市场上的评论除了用于一般性问题识别外，帮助不大。\n\
  \n**注意：** 错误报告是一项设备端功能，在较旧的 Android 版本上不受支持。如果您想完全确信自己能捕获所有问题，我们建议如前所述，了解一下 ACRA。\n\
  \n### 总结\n\n在市场上发布您的游戏非常轻松，入门门槛也很低。困难的部分在于让你的游戏为人所知，这是我们无法帮助您的任务。现在，您已经掌握了在 Android\
  \ 上设计、实现和发布您的第一款游戏所需的所有知识。愿原力与你同在！\n\n## 第 14 章\n\n## 接下来做什么？\n\n我们在本书中讨论了很多内容，然而还有更多东西需要学习。如果您对本书中阅读的所有材料都感到得心应手，您可能希望进行更深入的探索。以下是为您的旅程提供的一些想法和方向。\n\
  \n\n\n### 社交互动\n\n过去几年中，游戏行业最大的趋势之一是与社交媒体及服务的整合。`Twitter`、`Facebook` 和 `Reddit`\
  \ 已成为许多人生活的一部分，这些用户希望朋友和家人也能参与到他们的游戏中。有什么比让你老爸在最新版《僵尸射击》里打败你更酷的事呢？对吧？\n\n`Twitter`\
  \ 和 `Facebook` 都提供了 API，让你的游戏能够与它们的服务交互。想给用户一个分享最新高分到推特的渠道？没问题——集成 `Twitter API`，一切就绪。\n\
  \n与此相关的是，移动领域有两项重要服务致力于连接玩家，让他们轻松发现新游戏：`Scoreloop` 和 `OpenFeint`。这两项服务都提供了 Android\
  \ API，让玩家能够轻松在线保存高分、对比成就等。两者的 API 都相当直接，并附有优秀的示例和文档。\n\n### 位置感知\n\n我们在第 1 章和第 4\
  \ 章中只是简要提及了这一点，并未在任何游戏中加以利用。所有 Android 设备都配备了某种类型的传感器，可以确定其位置。这一功能本身就足够有趣，将其用于游戏中，可以创造出一些创新且前所未有的游戏机制。大多数\
  \ Android 游戏几乎没有利用这一功能。你能想到在你的游戏中使用 `GPS` 传感器的有趣方式吗？\n\n### 多人游戏功能\n\n鉴于这是一本入门书籍，我们并未讨论如何创建多人游戏。只需说明一点：Android\
  \ 确实提供了相应的 API。根据游戏类型的不同，实现多人游戏功能的难度也有所差异。回合制游戏，如国际象棋或卡牌游戏，实现起来相当简单。快节奏的动作游戏或即时战略游戏则完全是另一回事。无论哪种情况，你都需要具备网络编程知识，而网上有大量关于这一主题的资料。\n\
  \n### OpenGL ES 2.0 及更多\n\n可以说，到目前为止你只看到了 OpenGL ES 的一半。我们只使用了 `OpenGL ES 1.0`，因为它是目前\
  \ Android 上支持最广泛的版本。其固定功能特性非常适合入门 3D 图形编程。然而，还有一个更新、更绚丽的 `OpenGL ES` 版本，它允许你直接在\
  \ GPU 上编码。这与你在本书中所见的内容大不相同，因为所有繁琐的细节都需要你负责，例如从纹理中获取单个纹素或手动变换顶点坐标，这些全部直接在 GPU 上完成。\n\
  \n`OpenGL ES 2.0` 拥有所谓的“基于着色器”或可编程管线，这与 `OpenGL ES 1.0` 和 `1.1` 的固定功能管线形成对比。对于许多\
  \ 3D（和 2D）游戏而言，`OpenGL ES 1.x` 已绰绰有余。不过，如果你想玩点花样，或许可以考虑试试 `OpenGL ES 2.0`！别担心——你在本书中学到的所有概念都很容易应用到可编程管线上。\n\
  \nAndroid 有一个名为 `RenderScript` 的 Google 支持库，它是一个用于构建炫酷 `OpenGL ES 2.0` 效果的高级接口，无需忍受使用其繁琐\
  \ API 实现的所有痛苦。别误会——`OpenGL ES 2.0` 很棒，我们对此有丰富的经验——但 `RenderScript` 无疑提供了一种更简单的方法来创建许多图形效果，并且它是许多\
  \ Android 原生版本中自带默认动态壁纸的核心。\n\n我们也没有涉及诸如动画 3D 模型以及一些更高级的 `OpenGL ES 1.x` 概念（如顶点缓冲对象）等主题。与\
  \ `OpenGL ES 2.0` 一样，你可以在网上以及书籍中找到许多资源。你已经掌握了基础知识，现在是时候学习更多了！\n\n### 框架与引擎\n\n如果你购买本书时缺乏游戏开发经验，可能会好奇为什么我们没有选择使用\
  \ Android 游戏开发中众多现成的框架之一。重新发明轮子不好，对吧？我们希望你能扎实地理解基本原理。虽然学习过程有时可能枯燥，但最终会有所回报。当你用在这里获得的知识武装自己后，再去掌握任何现成的解决方案都会容易得多，我们希望你能意识到这带来的优势。\n\
  \n对于 Android，存在多个商业和非商业的开源框架及引擎。框架和引擎有什么区别？\n\n- **框架**让你能够掌控游戏开发环境的各个方面。代价是你需要自己摸索做事的方式（例如，如何组织游戏世界、如何处理屏幕和场景切换等）。在本书中，我们开发了一个非常简单的框架，并在此基础上构建了我们的游戏。\n\
  - 另一方面，**引擎**则针对特定任务进行了优化，它规定了你应该如何做事，为常见任务提供了易于使用的模块，并为你的游戏提供了通用架构。缺点是你的游戏可能不适合引擎提供的现成解决方案。通常，你需要修改引擎本身才能实现目标，而这取决于源代码是否可用。引擎可以极大地加快初始开发速度，但如果你遇到引擎未设计解决的问题，就可能使其陷入停滞。\n\
  \n归根结底，这取决于个人品味、预算和目标。作为独立开发者，我们更喜欢框架，因为它们通常更容易理解，并且能让我们以完全符合自己意愿的方式做事。\n\n话虽如此，选择你的“毒药”吧。以下是一份可以加速你开发过程的框架和引擎列表：\n\
  \n\n\n*   `Unreal Development Kit` ([`www.udk.com`](http://www.udk.com)): 一款商业游戏引擎，可在多种平台上运行，由\
  \ Epic Games 开发。Epic 制作了诸如《虚幻竞技场》等游戏，因此该引擎品质卓越。使用其自己的脚本语言。\n*   `Unity` ([`http://unity3d.com`](http://unity3d.com)):\
  \ 另一款商业游戏引擎，拥有出色的工具和功能。它同样可在多种平台上运行，包括 iOS、Android 或浏览器，并且易于学习。支持多种语言编写游戏逻辑；Java\
  \ 不在其中。\n*   `jPCT-AE` ([`www.jpct.net/jpct-ae/`](http://www.jpct.net/jpct-ae/)):\
  \ 基于 Java 的 `jPCT` 引擎在 Android 上的移植版，在 3D 编程方面具有一些出色的特性。可在桌面端和 Android 上运行。闭源。\n\
  *   `Ardor3D` ([`www.ardor3d.com`](http://www.ardor3d.com)): 一款非常强大的基于 Java 的 3D\
  \ 引擎。可在 Android 和桌面端运行，开源且文档齐全。\n*   `libgdx` ([`http://code.google.com/p/libgdx/`](http://code.google.com/p/libgdx/)):\
  \ 由 Mario Zechner 开发的基于 Java 的开源游戏开发框架，适用于 2D 和 3D 游戏。无需修改任何代码即可在 Windows、Linux、Mac\
  \ OS X 以及当然的 Android 上运行。你可以在桌面端开发和测试，而无需连接设备并上传你的 APK 文件（或使用缓慢的模拟器）。读完本书后你可能会感到得心应手——这都是我们邪恶计划的一部分。你注意到了吗？这个项目符号只是比其他的稍微大一点。\n\
  *   `Slick-AE` ([`http://slick.cokeandcode.com`](http://slick.cokeandcode.com)):\
  \ 基于 Java 的 `Slick` 框架在 Android 上的移植版，构建在 `libgdx` 之上。提供大量功能以及易于使用的 2D 游戏开发 API。当然是跨平台且开源的。\n\
  *   `AndEngine` ([`www.andengine.org`](http://www.andengine.org)): 一款优秀的基于 Java、仅限\
  \ Android 的 2D 引擎，部分基于 `libgdx` 代码（开源就是胜利）。概念类似于著名的 iOS 游戏开发引擎 `cocos2d`。\n*   `BatteryTech`\
  \ ([`www.batterypoweredgames.com/batterytech`](http://www.batterypoweredgames.com/batterytech)):\
  \ 一个开源商业库，使用 C++ 编写，支持跨平台游戏代码，并正式支持 Android、iOS、Windows 和 OSX 作为构建目标。\n*   `Moai`\
  \ ([`http://getmoai.com`](http://getmoai.com)): 另一个开源商业库，使用 C++ 编写，通过跨平台游戏代码面向 Android\
  \ 和 iOS。\n*   `Papaya` ([`http://papayamobile.com/developer/engine`](http://papayamobile.com/developer/engine)):\
  \ 一个免费的 Android 独占 2D 游戏引擎，包含物理 API、OpenGL 支持、粒子效果等功能。\n\n越来越多的中间件、框架和引擎不断涌现，因此这份列表绝非详尽无遗。我们建议你在某个时间点尝试这些选项。它们可以极大地帮助你加快游戏开发速度。\n\
  \n### 网络资源\n\n网络充满了游戏开发资源。一般来说，Google 会是你最好的朋友，但也有一些特殊的地方值得你去看看，包括：\n\n*   [`www.gamedev.net`](http://www.gamedev.net):\
  \ 网络上最古老的游戏开发网站之一，拥有海量的文章宝库，涵盖各种游戏开发主题。\n*   [`www.gamasutra.com`](http://www.gamasutra.com):\
  \ 游戏开发界的另一个老牌巨头。更偏向行业导向，包含大量项目复盘和对专业游戏开发世界的洞察。\n*   [`www.gpwiki.org`](http://www.gpwiki.org):\
  \ 一个大型的游戏开发百科站点，充满了针对不同平台、语言等等的游戏编程文章。\n*   [`www.flipcode.com/archives/`](http://www.flipcode.com/archives/):\
  \ 现已关闭的 `flipcode` 网站的存档。这里可以找到一些精华内容。虽然有时会略显过时，但它仍然是一个极好的资源。\n*   [`www.java-gaming.org`](http://www.java-gaming.org):\
  \ Java 游戏开发者首选的去处。像《我的世界》的 Markus Persson 这样的人也常光顾此地。\n\n### 结束语\n\n无数个不眠之夜和随之而来的布满血丝的眼睛，都倾注在了本书的写作中。可以说，虽然生活中很少有比制作电子游戏和向他人传播知识更让我们享受的事情，但能完成这个项目的最后这几段文字，绝对算得上是其中之一。\n\
  \n写作这本书是一种乐趣（早晨可就不那么美妙了），我们希望我们提供了你所需的内容。还有更多东西有待发现，更多的技术、算法和想法有待探索。这对你来说仅仅是个开始。前方还有更多的知识等待你去学习。\n\
  \n我们很自信，凭借我们所剖析和讨论的内容，你已经拥有了一个坚实的基础，这将使你能够更快地掌握新的思想和概念。不再需要陷入复制粘贴代码的陷阱。更棒的是，我们讨论的几乎所有内容都能很好地移植到其他任何平台（语言或\
  \ API 上可能有些许差异）。我们希望你能看到全局，并希望这能让你开始构建你梦寐以求的游戏。\n\n## 索引\n\n\n\n### ![image](img/square1.jpg)\
