  \    return accelX;\n}\n```\n\n`calculateInputAcceleration()` 方法中实际解释用户输入。如果启用了触摸，则检查屏幕上的左或右移动按钮是否被按下，并相应地将加速度值设置为\
  \ –5（向左）或 5（向右）。如果使用加速度计，则直接返回其在 y 轴上的当前值（请记住，此时是横向模式）。\n\n```java\nprivate void\
