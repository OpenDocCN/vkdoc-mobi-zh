  \n\n\n#### 帮助屏幕\n\n我们有五个帮助屏幕，它们的工作方式完全相同：加载帮助屏幕图像，将其与箭头按钮一起渲染，然后等待触摸箭头按钮以切换到下一个屏幕。这些屏幕之间唯一的区别在于它们各自加载的图像以及它们所切换到的目标屏幕。因此，我们只向您展示第一个帮助屏幕的代码（它会切换到第二个帮助屏幕）。帮助屏幕的图像文件命名为\
