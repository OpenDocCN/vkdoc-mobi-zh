  \n\n\n### 更新 `GameScreen`\n\n接下来是更新方法，它们会确保任何用户输入得到正确处理，并在必要时更新 `World` 实例。代码清单\
  \ 9–20 展示了相关代码。\n\n**代码清单 9–20.** *摘自 `GameScreen.java`：更新方法。*\n\n```\n@Override\n\
  public void update(float deltaTime) {\n    if(deltaTime > 0.1f)\n        deltaTime\
  \ = 0.1f;\n\n    switch(state) {\n        case GAME_READY:\n            updateReady();\n\
  \            break;\n        case GAME_RUNNING:\n            updateRunning(deltaTime);\n\
  \            break;\n        case GAME_PAUSED:\n            updatePaused();\n  \
  \          break;\n        case GAME_LEVEL_END:\n            updateLevelEnd();\n\
  \            break;\n        case GAME_OVER:\n            updateGameOver();\n  \
  \          break;\n    }\n}\n```\n\n我们再次使用 `GLScreen.update()` 方法作为主方法，它会根据屏幕的当前状态调用其他更新方法之一。请注意，我们将\
  \ delta 时间限制为 0.1 秒。我们为什么这么做？在第 6 章中，我们讨论了 Android 1.5 版本中直接 `ByteBuffers` 的一个会生成垃圾的\
  \ bug。在 Android 1.5 设备上运行《超级跳跃者》时，我们也会遇到同样的问题。游戏会时不时地被垃圾回收器中断几百毫秒。这将体现在几百毫秒的 delta\
  \ 时间上，从而使 Bob 像瞬移一样从一个地方跳到另一个地方，而不是平滑地移动过去。这会让玩家感到恼火，并且还会影响我们的碰撞检测。由于 Bob 在单帧内移动了很大距离，他可能会直接穿过一个平台而不会与其发生重叠。通过将\
  \ delta 时间限制在 0.1 秒这个合理的最大值，我们可以缓解这些影响。\n\n```\nprivate void updateReady() {\n \
  \   if(game.getInput().getTouchEvents().size() > 0) {\n        state = GAME_RUNNING;\n\
  \    }\n}\n```\n\n`updateReady()` 方法在暂停子屏幕中被调用。它所做的就是等待一个触摸事件，一旦发生，就会将游戏屏幕的状态更改为\
  \ `GAME_RUNNING` 状态。\n\n```\nprivate void updateRunning(float deltaTime) {\n   \
  \ List<TouchEvent> touchEvents = game.getInput().getTouchEvents();\n    int len\
  \ = touchEvents.size();\n    for(int i = 0; i < len; i++) {\n        TouchEvent\
  \ event = touchEvents.get(i);\n        if(event.type != TouchEvent.TOUCH_UP)\n \
  \           continue;\n\n        touchPoint.set(event.x, event.y);\n        guiCam.touchToWorld(touchPoint);\n\
  \n        if(OverlapTester.pointInRectangle(pauseBounds, touchPoint)) {\n      \
  \      Assets.playSound(Assets.clickSound);\n            state = GAME_PAUSED;\n\
  \            return;\n        }\n    }\n\n    world.update(deltaTime, game.getInput().getAccelX());\n\
  \    if(world.score != lastScore) {\n        lastScore = world.score;\n        scoreString\
  \ = \"\" + lastScore;\n    }\n    if(world.state == World.WORLD_STATE_NEXT_LEVEL)\
  \ {\n        state = GAME_LEVEL_END;\n    }\n    if(world.state == World.WORLD_STATE_GAME_OVER)\
  \ {\n        state = GAME_OVER;\n        if(lastScore >= Settings.highscores[4])\n\
  \            scoreString = \"new highscore: \" + lastScore;\n        else\n    \
  \        scoreString = \"score: \" + lastScore;\n        Settings.addScore(lastScore);\n\
  \        Settings.save(game.getFileIO());\n    }\n}\n```\n\n在 `updateRunning()`\
  \ 方法中，我们首先检查用户是否点击了右上角的暂停按钮。如果是，则游戏进入 `GAME_PAUSED` 状态。否则，我们使用当前 delta 时间以及负责控制\
  \ Bob 水平移动的加速度计 x 轴值来更新 `World` 实例。世界更新完毕后，我们检查是否需要更新分数字符串。我们还会检查 Bob 是否到达了城堡，如果到达，则进入\
  \ `GAME_NEXT_LEVEL` 状态，该状态将显示图 9–2 左上角的提示信息，并等待一个触摸事件来生成下一关。如果游戏结束，我们根据所得分数是否为新的最高分，将分数字符串设置为\
  \ `score: #score` 或 `new highscore: #score`。然后将分数添加到 `Settings` 中，并指示其将所有设置保存到 SD\
  \ 卡。此外，我们将游戏屏幕设置为 `GAME_OVER` 状态。\n\n```\nprivate void updatePaused() {\n    List<TouchEvent>\
  \ touchEvents = game.getInput().getTouchEvents();\n    int len = touchEvents.size();\n\
  \    for(int i = 0; i < len; i++) {\n        TouchEvent event = touchEvents.get(i);\n\
  \        if(event.type != TouchEvent.TOUCH_UP)\n            continue;\n\n      \
  \  touchPoint.set(event.x, event.y);\n        guiCam.touchToWorld(touchPoint);\n\
  \n        if(OverlapTester.pointInRectangle(resumeBounds, touchPoint)) {\n     \
  \       Assets.playSound(Assets.clickSound);\n            state = GAME_RUNNING;\n\
  \            return;\n        }\n        if(OverlapTester.pointInRectangle(quitBounds,\
  \ touchPoint)) {\n            Assets.playSound(Assets.clickSound);\n           \
  \ game.setScreen(new MainMenuScreen(game));\n            return;\n        }\n  \
  \  }\n}\n```\n\n在 `updatePaused()` 方法中，我们检查用户是否点击了“恢复”或“退出”界面元素，并作出相应反应。\n\n```\n\
  private void updateLevelEnd() {\n    List<TouchEvent> touchEvents = game.getInput().getTouchEvents();\n\
  \    int len = touchEvents.size();\n    for(int i = 0; i < len; i++) {\n       \
  \ TouchEvent event = touchEvents.get(i);\n        if(event.type != TouchEvent.TOUCH_UP)\n\
  \            continue;\n        world = new World(worldListener);\n        renderer\
  \ = new WorldRenderer(glGraphics, batcher, world);\n        world.score = lastScore;\n\
