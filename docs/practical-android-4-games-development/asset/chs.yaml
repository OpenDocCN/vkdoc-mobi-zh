  \    gl.glLoadIdentity();\n    gl.glTranslatef(cannon.position.x, cannon.position.y,\
  \ 0);\n    gl.glRotatef(cannon.angle, 0, 0, 1);\n    gl.glColor4f(1,1,1,1);\n  \
  \  cannonVertices.bind();\n    cannonVertices.draw(GL10.GL_TRIANGLES, 0, 3);\n \
  \   cannonVertices.unbind();                    \n}\n```\n\n这里没有什么新内容。和往常一样，首先设置投影矩阵和视口，并清屏。接着，复用存储在\
  \ `targetVertices` 中的矩形模型，渲染所有目标。这本质上与你在 `BobTest` 中所做的相同，只不过这次渲染的是目标。然后，像在 `CollisionGravityTest`\
  \ 中一样，渲染炮弹和大炮。\n\n这里唯一要注意的是，你更改了绘制顺序，以便炮弹始终位于目标之上，而大炮始终位于炮弹之上。你还通过调用 `glColor4f()`\
  \ 将目标渲染为绿色。\n\n\n\n## 2D 世界中的摄像机\n\n这个小测试的输出与图 8–17 完全相同，因此你可以跳过重复步骤。当你发射炮弹时，它会穿过目标区域。任何被炮弹击中的目标都会从世界中移除。\n\
  \n如果你稍加打磨并加入一些激励性的游戏机制，这个示例实际上可以变成一款不错的游戏。你能想到哪些改进？不妨动手尝试一下这个示例，以熟悉你在前几页中学到的新工具。\n\
  \n本章中还有几个内容需要讨论：摄像机、纹理图集和精灵图。这些内容涉及与图形相关的技巧，它们独立于你的游戏世界模型。那么，我们开始吧！\n\n到目前为止，你的代码中还没有“摄像机”的概念；你只是通过`glOrthof()`定义了视锥体，就像这样：\n\
  \n```\ngl.glMatrixMode(GL10.GL_PROJECTION);\ngl.glLoadIdentity();\ngl.glOrthof(0,\
  \ FRUSTUM_WIDTH, 0, FRUSTUM_HEIGHT, 1, -1);\n```\n\n从第 6 章可知，前两个参数定义了视锥体在世界中左右边缘的\
  \ x 坐标，接下来两个参数定义了视锥体上下边缘的 y 坐标，最后两个参数定义了远近裁剪面。图 8–19 再次展示了这个视锥体。\n\n![images](img/0819.jpg)\n\
  \n**图 8–19.** *再次展示 2D 世界中的视锥体*\n\n因此，你只能看到世界中的区域 (0,0,1) 到 (`FRUSTUM_WIDTH`, `FRUSTUM_HEIGHT`,-1)。如果能将视锥体向左移动，岂不更妙？当然很棒，而且实现起来也极其简单：\n\
  \n```\ngl.glOrthof(x, x + FRUSTUM_WIDTH, 0, FRUSTUM_HEIGHT, 1, -1);\n```\n\n此时，`x`\
  \ 只是你定义的一个偏移量。当然，你也可以在 x 轴和 y 轴上同时移动：\n\n```\ngl.glOrthof(x, x + FRUSTUM_WIDTH,\
  \ y, y + FRUSTUM_HEIGHT, 1, -1);\n```\n\n图 8–20 展示了这种移动的效果。\n\n![images](img/0820.jpg)\n\
  \n**图 8–20.** *移动视锥体*\n\n只需在世界空间中指定视锥体的左下角即可。这已经足够实现一个可自由移动的 2D 摄像机。但你可以做得更好。是否可以不通过指定`x`和`y`来设定视锥体的左下角，而是指定视锥体的中心？这样，你就可以轻松地将视锥体居中于某个特定位置的物体上——例如，前例中的炮弹：\n\
  \n```\ngl.glOrthof(x – FRUSTUM_WIDTH / 2, x + FRUSTUM_WIDTH / 2, y – FRUSTUM_HEIGHT\
  \ / 2, y + FRUSTUM_HEIGHT / 2, 1, -1);\n```\n\n图 8–21 展示了这种效果。\n\n![images](img/0821.jpg)\n\
  \n**图 8–21.** *以中心点指定视锥体*\n\n然而，`glOrthof()` 的功能远不止于此。缩放功能呢？我们来思考一下。你知道，通过 `glViewportf()`，可以告诉\
  \ OpenGL ES 你希望将视锥体的内容渲染到屏幕的哪个部分。OpenGL ES 会自动拉伸和缩放输出，以适配视口。现在，如果你缩小视锥体的宽度和高度，你将在屏幕上显示世界的一个更小区域——这就是放大。如果你放大视锥体，你可以显示世界的更多部分——这就是缩小。因此，你可以引入一个缩放因子，将其乘以视锥体的宽度和高度来实现缩放。因子为\
  \ 1 时，将使用正常的视锥体宽度和高度显示世界，如图 8–21](#Chapter08.html#fig_8_21) 所示。因子小于 1 将放大视锥体中心，而因子大于\
  \ 1 将缩小，显示世界的更多部分（例如，将缩放因子设为 2 将显示世界两倍的范围）。以下是使用 `glOrthof()` 实现此功能的方法：\n\n```\n\
  gl.glOrthof(x – FRUSTUM_WIDTH / 2 * zoom, x + FRUSTUM_WIDTH / 2 * zoom, y – FRUSTUM_HEIGHT\
  \ / 2 * zoom, y + FRUSTUM_HEIGHT / 2 * zoom, 1, -1);\n```\n\n简单至极！现在，你可以创建一个摄像机类，它包含一个观察位置（视锥体中心）、标准的视锥体宽度和高度，以及一个缩放因子，用于缩小或放大视锥体，从而显示更少的世界内容（放大）或更多的世界内容（缩小）。图\
  \ 8–22 展示了缩放因子为 0.5（内部灰色框）和 1（外部透明框）时的视锥体。\n\n![images](img/0822.jpg)\n\n**图 8–22.**\
  \ *通过调整视锥体大小进行缩放*\n\n为了让功能更完善，你还应该添加一个功能。想象一下，你触摸屏幕，并想确定触摸的是 2D 世界中的哪个点。在之前不断改进的炮弹示例中，你已经这样做过几次了。对于未考虑摄像机位置和缩放的视锥体配置，如图\
  \ 8–19](#Chapter08.html#fig_8_19) 所示，你使用了以下公式（参见炮弹示例中的 `update()` 方法）：\n\n```\n\
  worldX = (touchX / Graphics.getWidth()) × FRUSTUM_WIDTH;\nworldY = (1 – touchY /\
  \ Graphics.getHeight()) × FRUSTUM_HEIGHT;\n```\n\n首先，通过将触摸点的 x 和 y 坐标除以屏幕的宽度和高度，将其归一化到\
  \ 0 到 1 的范围内，然后乘以视锥体的宽度和高度，将其转换到世界空间。你所需做的只是将视锥体的位置和缩放因子考虑进去。以下是实现方法：\n\n```\nworldX\
  \ = (touchX / Graphics.getWidth()) × FRUSTUM_WIDTH + x – FRUSTUM_WIDTH / 2;\nworldY\
  \ = (1 – touchY / Graphics.getHeight()) × FRUSTUM_HEIGHT + y – FRUSTUM_HEIGHT /\
  \ 2;\n```\n\n这里，`x` 和 `y` 是你的摄像机在世界空间中的位置。\n\n\n\n### Camera2D 类\n\n现在让我们将所有内容整合到一个类中。这个类需要存储相机的位置、标准平截头体的宽度和高度，以及缩放因子。你还需要一个便捷的方法来正确设置视口（始终使用整个屏幕）和投影矩阵。此外，还需要一个能将触摸坐标转换为世界坐标的方法。代码清单\
  \ 8–15 展示了新的 `Camera2D` 类。\n\n**代码清单 8–15.** `Camera2D.java`，适用于 2D 渲染的全新相机类\n\n\
  ```\npackage com.badlogic.androidgames.framework.gl;\n\nimport javax.microedition.khronos.opengles.GL10;\n\
  \nimport com.badlogic.androidgames.framework.impl.GLGraphics;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  \npublic class Camera2D {\n    public final Vector2 position;\n    public float\
  \ zoom;\n    public final float frustumWidth;\n    public final float frustumHeight;\n\
  \    final GLGraphics glGraphics;\n```\n\n如前所述，你将相机的位置、平截头体的宽度和高度以及缩放因子存储为成员变量。位置和缩放因子是公开的，以便你可以轻松操作它们。你还需要一个对\
  \ `GLGraphics` 的引用，以便获取屏幕当前的像素宽度和高度，用于将触摸坐标转换为世界坐标。\n\n```\n    public Camera2D(GLGraphics\
  \ glGraphics, float frustumWidth, float frustumHeight) {\n        this.glGraphics\
  \ = glGraphics;\n        this.frustumWidth = frustumWidth;\n        this.frustumHeight\
  \ = frustumHeight;\n        this.position = new Vector2(frustumWidth / 2, frustumHeight\
  \ / 2);\n        this.zoom = 1.0f;\n    }\n```\n\n在构造函数中，将 `GLGraphics` 实例以及缩放因子为\
  \ 1 时的平截头体宽度和高度作为参数传入。你存储这些参数，并将相机的位置初始化为朝向由 (0,0,1) 和 (`frustumWidth`, `frustumHeight`,–1)\
  \ 所界定盒子的中心，如图 8–19 所示。初始缩放因子设置为 1。\n\n```\n    public void setViewportAndMatrices()\
  \ {\n        GL10 gl = glGraphics.getGL();\n        gl.glViewport(0, 0, glGraphics.getWidth(),\
  \ glGraphics.getHeight());\n        gl.glMatrixMode(GL10.GL_PROJECTION);\n     \
  \   gl.glLoadIdentity();\n        gl.glOrthof(position.x - frustumWidth * zoom /\
  \ 2,\n                    position.x + frustumWidth * zoom / 2,\n              \
  \      position.y - frustumHeight * zoom / 2,\n                    position.y +\
  \ frustumHeight * zoom / 2,\n                    1, -1);\n        gl.glMatrixMode(GL10.GL_MODELVIEW);\n\
  \        gl.glLoadIdentity();\n    }\n```\n\n`setViewportAndMatrices()` 方法将视口设置为覆盖整个屏幕，并按照之前讨论的方式，根据相机的参数设置投影矩阵。在该方法末尾，告诉\
  \ OpenGL ES 后续所有矩阵操作均针对模型视图矩阵，并加载一个单位矩阵。每帧都调用此方法，以便你从一个干净的状态开始。不再需要直接调用 OpenGL ES\
  \ 来设置视口和投影矩阵。\n\n```\n    public void touchToWorld(Vector2 touch) {\n        touch.x\
  \ = (touch.x / (float) glGraphics.getWidth()) * frustumWidth * zoom;\n        touch.y\
  \ = (1 - touch.y / (float) glGraphics.getHeight()) * frustumHeight * zoom;\n   \
  \     touch.add(position).sub(frustumWidth * zoom / 2, frustumHeight * zoom / 2);\n\
  \    }\n}\n```\n\n`touchToWorld()` 方法接收一个包含触摸坐标的 `Vector2` 实例，并将该向量转换到世界空间。这与之前讨论的方法相同；唯一的区别在于你可以使用自带的便捷\
  \ `Vector2` 类。\n\n#### 示例\n\n在炮弹示例中使用 `Camera2D` 类。复制 `CollisionTest` 文件并将其重命名为\
  \ `Camera2DTest`。将文件内部的 `GLGame` 类重命名为 `Camera2DTest`，并将 `CollisionScreen` 类重命名为\
  \ `Camera2DScreen`。你需要做一些小的改动来使用新的 `Camera2D` 类。\n\n首先，在 `Camera2DScreen` 类中添加一个新的成员变量：\n\
  \n```\nCamera2D camera;\n```\n\n在构造函数中初始化该成员变量，具体如下：\n\n```\ncamera = new Camera2D(glGraphics,\
  \ WORLD_WIDTH, WORLD_HEIGHT);\n```\n\n传入你的 `GLGraphics` 实例以及世界的宽度和高度，这些之前在你调用 `glOrthof()`\
  \ 时被用作平截头体的宽度和高度。现在你需要做的就是用以下代码替换 `present()` 方法中直接调用 OpenGL ES 的代码，原代码如下：\n\n```\n\
  gl.glViewport(0, 0, glGraphics.getWidth(), glGraphics.getHeight());\ngl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n\
  gl.glMatrixMode(GL10.GL_PROJECTION);\ngl.glLoadIdentity();\ngl.glOrthof(0, WORLD_WIDTH,\
  \ 0, WORLD_HEIGHT, 1, -1);\ngl.glMatrixMode(GL10.GL_MODELVIEW);\n```\n\n将其替换为：\n\
  \n```\ngl.glClear(GL10.GL_COLOR_BUFFER_BIT);\ncamera.setViewportAndMatrices();\n\
  ```\n\n当然，你仍然需要清除帧缓冲区，但所有其他直接调用 OpenGL ES 的代码都被很好地隐藏在了 `Camera2D.setViewportAndMatrices()`\
  \ 方法中。如果运行这段代码，你会发现一切没有变化。所有功能与之前一致——你只是让代码变得更简洁、更灵活。\n\n你还可以简化测试中的 `update()` 方法。既然已经在相机类中添加了\
  \ `Camera2D.touchToWorld()` 方法，不妨直接用起来。你可以将 update 方法中的下面这段代码：\n\n```\ntouchPos.x\
  \ = (event.x / (float) glGraphics.getWidth())* WORLD_WIDTH;\ntouchPos.y = (1 - event.y\
  \ / (float) glGraphics.getHeight()) * WORLD_HEIGHT;\n```\n\n替换为：\n\n```\ncamera.touchToWorld(touchPos.set(event.x,\
  \ event.y));\n```\n\n简洁明了——现在一切都很好地封装起来了。但如果不充分利用相机类的全部功能，那就太无趣了。以下是计划：当炮弹未飞出时，希望相机以“常规”方式观察世界。这很简单；你已经在这么做了。你可以通过检查炮弹位置的\
  \ y 坐标是否小于或等于零来判断炮弹是否在飞行。由于你始终对炮弹施加重力，即使不发射它也会下落，因此这是一种简单的判断方法。\n\n当炮弹飞行时（y 坐标大于零），新的功能将生效。你希望相机跟随炮弹。只需将相机的位置设置为炮弹的位置即可实现。这样会使炮弹始终保持在屏幕中心。你还想尝试使用缩放功能。因此，你可以根据炮弹的\
  \ y 坐标增加缩放因子：距离零点越远，缩放因子越大。如果炮弹的 y 坐标更高，这将使相机拉远。以下是需要在测试屏幕的 `update()` 方法末尾添加的代码：\n\
  \n```\nif(ball.position.y > 0) {\n    camera.position.set(ball.position);\n    camera.zoom\
  \ = 1 + ball.position.y / WORLD_HEIGHT;\n} else {\n    camera.position.set(WORLD_WIDTH\
  \ / 2, WORLD_HEIGHT / 2);\n    camera.zoom = 1;\n}\n```\n\n只要炮弹的 y 坐标大于零，相机就会跟随它并拉远视角。只需在标准缩放因子\
  \ 1 的基础上增加一个值。这个值就是炮弹 y 位置与世界高度之间的比例。如果炮弹的 y 坐标位于 `WORLD_HEIGHT`，缩放因子将为 2，因此你会看到更多的世界。实现方式非常灵活；你可以使用任何你想要的公式——这里并没有什么神奇之处。如果炮弹的位置小于或等于零，则按之前的示例正常显示世界。\n\
  \n\n\n## 纹理图集：因为共享即是关爱\n\n到目前为止，你在程序中只使用了单一纹理。如果你不仅想渲染鲍勃，还想渲染其他超级英雄、敌人、爆炸效果或金币，该怎么办？你可以使用多个纹理，每个纹理存放一种对象类型的图像。但\
  \ OpenGL ES 可能不太喜欢这种做法，因为你需要为渲染的每种对象类型切换纹理（即绑定鲍勃的纹理、渲染鲍勃，绑定金币纹理、渲染金币，依此类推）。你可以通过将多个图像放入单个纹理来更高效地实现这一点。这就是纹理图集：一个包含多个图像的单一纹理。你只需绑定该纹理一次，然后即可渲染图集中包含图像的任何实体类型。这可以减少状态切换的开销，并提升性能。图\
  \ 8-23 展示了这样一个纹理图集。\n\n![images](img/0823.jpg)\n\n**图 8-23** *纹理图集*\n\n图 8-23 中有三个对象：一门大炮、一枚炮弹和鲍勃。网格并非纹理的一部分，它仅用于说明你通常如何创建纹理图集。\n\
  \n纹理图集的尺寸为 64×64 像素，每个网格为 32×32 像素。大炮占据两个网格，炮弹占据不到四分之一网格，鲍勃占据一个网格。现在，回顾一下你如何定义大炮、炮弹和目标的边界（以及图形矩形），你会发现它们之间的大小关系与你在网格中看到的非常相似。目标在你的世界中是\
  \ 0.5×0.5 米，大炮是 0.2×0.2 米。在你的纹理图集中，鲍勃占据 32×32 像素，炮弹占据略小于 16×16 像素。纹理图集与你世界中对象大小的关系应该很明确了：图集中的\
  \ 32 像素对应你世界中的 0.5 米。最初示例中，大炮是 1×1 米，但当然你可以更改。根据你的纹理图集，大炮占据 64×32 像素，因此你应该让大炮在你世界中的尺寸为\
  \ 1×0.5 米。哇，这真是异常简单，不是吗？\n\n那么，为什么选择 32 像素来匹配你世界中的 1 米呢？请记住，纹理的宽度和高度必须是 2 的幂。使用像\
  \ 32 这样的 2 的幂像素单位来映射到世界中的 0.5 米，是让美术师应对纹理大小限制的一种便捷方式。这也使得在像素艺术中更容易正确把握不同对象的大小关系。\n\
  \n请注意，并没有任何限制阻止你在每个世界单位中使用更多像素。你可以选择 64 像素或 50 像素来匹配世界中的 0.5 米。那么，什么样的像素到米的比例比较合适呢？这同样取决于游戏运行的屏幕分辨率。让我们进行一些计算。\n\
  \n你的大炮世界以左下角(0,0)和左上角(9.6,4.8)为边界。这被映射到你的屏幕上。让我们计算一下，在 Hero 手机的屏幕（横屏模式下 480×320\
  \ 像素）上，每世界单位有多少像素：\n\n```\npixelsPerUnitX = screenWidth / worldWidth = 480 / 9.6\
  \ = 50 像素/米\npixelsPerUnitY = screenHeight / worldHeight = 320 / 6.4 = 50 像素/米\n\
  ```\n\n你的大炮，现在在世界中占据 1×0.5 米，因此在屏幕上将使用 50×25 像素。你可以从纹理中使用 64×32 像素的区域，因此实际上在渲染大炮时，可以稍微缩小纹理图像。这完全没问题——OpenGL\
  \ ES 会自动为你处理。取决于你为纹理设置的缩小过滤器，结果要么清晰且像素化（`GL_NEAREST`），要么稍微平滑一些（`GL_LINEAR`）。如果你希望\
  \ Hero 手机达到像素级完美渲染，你需要稍微缩放纹理图像。你可以使用 25×25 像素的网格尺寸，而不是 32×32。然而，如果你只是调整图集图像的大小（或者更准确地说，完全重新手绘），你会得到一幅\
  \ 50×50 像素的图像——这对 OpenGL ES 来说不可行。你必须向左侧和底部添加填充，以得到 64×64 像素的图像（因为 OpenGL ES 要求宽度和高度为\
  \ 2 的幂）。因此，OpenGL ES 在 Hero 手机上缩放纹理图像是没有问题的。\n\n在像 Nexus One（横屏模式下 800×480 像素）这样的高分辨率设备上情况如何？让我们通过以下公式针对这种屏幕配置进行计算：\n\
  \n```\npixelsPerUnitX = screenWidth / worldWidth = 800 / 9.6 = 83 像素/米\npixelsPerUnitY\
  \ = screenHeight / worldHeight = 480 / 6.4 = 75 像素/米\n```\n\n你在 x 轴和 y 轴上得到不同的每单位像素数，因为你的视锥体宽高比（9.6\
  \ / 6.4 = 1.5）与屏幕的宽高比（800 / 480 = 1.66）不同。这在第 4 章中已经讨论过，并概述了若干解决方案。当时，你针对固定的像素尺寸和宽高比进行设计；现在你可以采用该方案，针对固定的视锥体宽度和高度进行设计。在\
  \ Nexus One 的情况下，由于更高的分辨率和不同的宽高比，大炮、炮弹和鲍勃会被放大并拉伸。请接受这一事实，因为你希望所有玩家都能看到你世界的同一区域。否则，具有更宽宽高比的玩家将能够看到更多世界，从而获得优势。\n\
  \n那么，你如何使用这样的纹理图集呢？你只需重新映射矩形。你不需要使用整个纹理，而是仅使用其中的一部分。为了计算纹理图集中包含的图像角落的纹理坐标，你可以复用前一个例子中的公式。快速回顾一下：\n\
  \n```\nu = x / imageWidth\nv = y / imageHeight\n```\n\n这里，`u`和`v`是纹理坐标，`x`和`y`是像素坐标。鲍勃左上角的像素坐标为(32,32)。将其代入上述公式，得到纹理坐标(0.5,0.5)。你可以对需要的任何其他角落执行相同操作，并据此为矩形的顶点设置正确的纹理坐标。\n\
  \n\n\n#### 示例\n\n将纹理图集添加到你之前的示例中，让它看起来更美观。`Bob` 将成为你的目标。\n\n复制 `Camera2DTest` 并稍作修改。将副本放在名为\
  \ `TextureAtlasTest.java` 的文件中，并相应重命名其中包含的两个类（`TextureAtlasTest` 和 `TextureAtlasScreen`）。\n\
  \n你要做的第一件事是向 `TextureAtlasScreen` 添加一个新成员：\n\n`Texture texture;`\n\n不要在构造函数中创建 `Texture`，而是在\
  \ `resume()` 方法中创建它。请记住，当你的应用程序从暂停状态恢复时，纹理将会丢失，因此你必须在 `resume()` 方法中重新创建它们：\n\n\
  `@Override`\n`public void resume() {`\n`texture = new Texture(((GLGame)game), \"\
  atlas.png\");`\n`}`\n\n将图 8-23 中的图片放入项目的 `assets/` 文件夹中，并将其命名为 `atlas.png`。（当然，它不包含图中所示的网格线。）\n\
  \n接下来，你需要修改顶点的定义。你为每种实体类型（大炮、炮弹和 Bob）都有一个 `Vertices` 实例，每个实例持有一个由四个顶点和六个索引组成的矩形，构成三个三角形。你所需做的只是根据纹理图集为每个顶点添加纹理坐标。你还需要将大炮从三角形表示改为一个\
  \ 1×0.5 米的矩形表示。以下是用于替换构造函数中旧顶点创建代码的内容：\n\n```\ncannonVertices = new Vertices(glGraphics,\
  \ 4, 6, false, true);\ncannonVertices.setVertices(new float[] { -0.5f, -0.25f, 0.0f,\
  \ 0.5f,\n                                          0.5f, -0.25f, 1.0f, 0.5f,\n \
  \                                         0.5f,  0.25f, 1.0f, 0.0f,\n          \
  \                               -0.5f,  0.25f, 0.0f, 0.0f },\n                 \
  \                         0, 16);\ncannonVertices.setIndices(new short[] {0, 1,\
  \ 2, 2, 3, 0}, 0, 6);\n```\n\n```\nballVertices = new Vertices(glGraphics, 4, 6,\
  \ false, true);\nballVertices.setVertices(new float[] { -0.1f, -0.1f, 0.0f, 0.75f,\n\
  \                                        0.1f, -0.1f, 0.25f, 0.75f,\n          \
  \                              0.1f,  0.1f, 0.25f, 0.5f,\n                     \
  \                  -0.1f,  0.1f, 0.0f, 0.5f },\n                               \
  \         0, 16);\nballVertices.setIndices(new short[] {0, 1, 2, 2, 3, 0}, 0, 6);\n\
  ```\n\n```\ntargetVertices = new Vertices(glGraphics, 4, 6, false, true);\ntargetVertices.setVertices(new\
  \ float[] { -0.25f, -0.25f, 0.5f, 1.0f,\n                                      \
  \    0.25f, -0.25f, 1.0f, 1.0f,\n                                          0.25f,\
  \  0.25f, 1.0f, 0.5f,\n                                         -0.25f,  0.25f,\
  \ 0.5f, 0.5f },\n                                          0, 16);\ntargetVertices.setIndices(new\
  \ short[] {0, 1, 2, 2, 3, 0}, 0, 6);\n```\n\n你的每个网格现在由四个顶点组成，每个顶点都包含一个二维位置和纹理坐标。向网格添加六个索引，用于指定你想要渲染的两个三角形。大炮在\
  \ y 轴上略小一些。现在它的尺寸是 1×0.5 米，而不是 1×1 米。这也反映在构造函数中稍早时 `Cannon` 对象的构造上：\n\n`cannon =\
  \ new Cannon(0, 0, 1, 0.5f);`\n\n由于你无需对大炮本身进行任何碰撞检测，因此在该构造函数中设置什么尺寸并不重要；这样做只是为了保持一致性。\n\
  \n你需要修改的最后一件事是你的渲染方法。以下是其完整代码：\n\n```\n@Override\npublic void present(float deltaTime)\
  \ {\n    GL10 gl = glGraphics.getGL();\n    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n\
  \    camera.setViewportAndMatrices();\n\n    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA,\
  \ GL10.GL_ONE_MINUS_SRC_ALPHA);\n    gl.glEnable(GL10.GL_TEXTURE_2D);\n    texture.bind();\n\
  \n    targetVertices.bind();\n    int len = targets.size();\n    for(int i = 0;\
  \ i < len; i++) {\n        GameObject target = targets.get(i);\n        gl.glLoadIdentity();\n\
  \        gl.glTranslatef(target.position.x, target.position.y, 0);\n        targetVertices.draw(GL10.GL_TRIANGLES,\
  \ 0, 6);\n    }\n    targetVertices.unbind();\n\n    gl.glLoadIdentity();\n    gl.glTranslatef(ball.position.x,\
  \ ball.position.y, 0);\n    ballVertices.bind();\n    ballVertices.draw(GL10.GL_TRIANGLES,\
  \ 0, 6);\n    ballVertices.unbind();\n\n    gl.glLoadIdentity();\n    gl.glTranslatef(cannon.position.x,\
  \ cannon.position.y, 0);\n    gl.glRotatef(cannon.angle, 0, 0, 1);\n    cannonVertices.bind();\n\
  \    cannonVertices.draw(GL10.GL_TRIANGLES, 0, 6);\n    cannonVertices.unbind();\n\
  }\n```\n\n在这里，你启用了混合，设置了合适的混合函数，启用了纹理处理，并绑定了你的图集纹理。你还需要稍微调整 `cannonVertices.draw()`\
  \ 调用，现在它会渲染两个三角形而不是一个。这就完成了所有工作。图 8-24 展示了你的“整容”操作结果。\n\n![images](img/0824.jpg)\n\
  \n**图 8-24.** *用纹理图集美化大炮示例*\n\n关于纹理图集，你还需要了解以下几点：\n\n- 当你使用 `GL_LINEAR` 作为缩小和/或放大过滤器时，如果图集中的两个图像彼此接触，可能会出现伪影。这是因为纹理映射器实际上会为屏幕上的一个像素从纹理中获取最近的四个纹素。当它对某个图像的边界执行此操作时，它也会从图集中相邻的图像获取纹素。你可以通过在图像之间引入\
  \ 2 像素的空边框来消除这个问题。更好的方法是复制每个图像的边界像素。第一种解决方案更简单——只需确保你的纹理大小依然是 2 的幂次。\n\n- 无需将图集中的所有图像都排列在一个固定的网格中。你可以尽可能紧凑地将任意大小的图像放入图集中。你只需要知道图像在图集中的起始和结束位置，以便为其计算正确的纹理坐标。然而，打包任意大小的图像是一个不容忽视的问题。网上有一些工具可以帮助你创建纹理图集；只需搜索一下，你就会找到大量选择。\n\
  \n- 通常，你无法将游戏中的所有图像都放入一个纹理中。请记住，不同设备支持的最大纹理大小各不相同。你可以放心地假设所有设备都支持 512×512 像素（甚至\
  \ 1024×1024 像素）的纹理大小。因此，你可以拥有多个纹理图集。不过，你应该尝试将会在屏幕上一起看到的对象分组到同一个图集中——例如，第 1 关的所有对象放在一个图集中，第\
  \ 2 关的所有对象放在另一个图集中，所有 UI 元素放在另一个图集中，以此类推。在最终确定你的美术资产之前，请考虑好逻辑分组。\n\n- 还记得你在 Mr.\
  \ Nom 中是如何动态绘制数字的吗？你当时就用到了纹理图集。实际上，你可以通过纹理图集执行所有动态文本渲染。只需将游戏所需的所有字符放入一个图集，然后通过多个矩形映射到图集中相应的字符，按需渲染它们。你可以在网上找到一些工具，这些工具会为你生成所谓的*位图字体*。为了你在后续章节中的目的，请坚持使用\
  \ Mr. Nom 中使用的方法：静态文本将作为一个整体预先渲染，只有动态文本（例如，高分中的数字）将通过图集进行渲染。\n\n\n你可能已经注意到，Bob 在图形上被炮弹击中之前就消失了。这是因为你的碰撞形状稍微有点大。Bob\
  \ 和炮弹周围有一些空白区域。解决方案是什么？只需让碰撞形状稍微小一点。你应该对此有所感觉，因此调整源代码，直到碰撞效果合适。在开发游戏时，你经常会发现这样微调的机会。微调可能除了好的关卡设计之外，是最关键的部分之一。让事物感觉合适可能很困难，但一旦你达到了《超级马里奥兄弟》中那样的完美程度，会非常有满足感。遗憾的是，这是无法传授的，因为它取决于你游戏的外观和感觉。把它看作是区分好游戏与坏游戏的神奇配方。\n\
  \n**注意：** 为了解决上述提到的消失问题，使边界矩形比其图形表示稍微小一点，以允许在触发碰撞前有一定的重叠。\n\n## 纹理区域、精灵和批处理：隐藏 OpenGL\
  \ ES\n\n到目前为止，你为炮弹示例编写的代码包含大量样板代码，其中一些是可以简化的。其中一个方面是`Vertices`实例的定义。用七行代码来定义一个纹理矩形很繁琐。另一个你可以改进的方面是手动计算纹理图集中图像的纹理坐标。最后，当你想要渲染\
  \ 2D 矩形时，涉及大量高度重复的代码。还有一种比每个对象一次绘制调用更好的渲染多个对象的方法。你可以通过引入几个新概念来解决所有这些问题：\n\n- **纹理区域**：你在上一个示例中使用了纹理区域。纹理区域是单个纹理中的一个矩形区域（例如，图集中包含炮弹的区域）。你需要一个优秀的类来封装所有从像素坐标转换到纹理坐标的繁琐计算。\n\
  - **精灵**：精灵很像一个游戏对象。它有一个位置（以及可能的朝向和缩放），以及一个图形范围。你通过矩形来渲染精灵，就像你渲染 Bob 或炮弹一样。实际上，Bob\
  \ 和其他对象的图形表示可以而且应该被视为精灵。精灵也映射到纹理中的一个区域。这就是纹理区域的用武之地。虽然直接结合游戏中的精灵很诱人，但你应该遵循模型-视图-控制器模式将它们分开。这种图形和模型代码的清晰分离可以实现更好的设计。\n\
  - **精灵批处理**：精灵批处理负责一次性渲染多个精灵。为此，精灵批处理需要知道每个精灵的位置、大小和纹理区域。精灵批处理将是你的神奇成分，用来摆脱每个对象的多次绘制调用和矩阵操作。\n\
  \n这些概念紧密相连，接下来将进行讨论。\n\n### TextureRegion 类\n\n由于你已经使用过纹理区域，因此应该很容易明白你需要什么。你知道如何从像素坐标转换到纹理坐标。你需要一个类，在其中可以指定纹理图集中图像的像素坐标，然后该类会存储相应的图集区域的纹理坐标，以供进一步处理（例如，当你想要渲染一个精灵时）。话不多说，清单\
  \ 8-16 展示了你的`TextureRegion`类。\n\n***清单 8-16.*** `TextureRegion.java`：将像素坐标转换为纹理坐标\n\
  \n```java\npackage com.badlogic.androidgames.framework.gl;\n\npublic class TextureRegion\
  \ {\n    public final float u1, v1;\n    public final float u2, v2;\n    public\
  \ final Texture texture;\n\n    public TextureRegion(Texture texture, float x, float\
  \ y, float width, float height) {\n        this.u1 = x / texture.width;\n      \
  \  this.v1 = y / texture.height;\n        this.u2 = this.u1 + width / texture.width;\n\
  \        this.v2 = this.v1 + height / texture.height;\n        this.texture = texture;\n\
  \    }\n}\n```\n\n`TextureRegion`以纹理坐标形式存储区域左上角（`u1`，`v1`）和右下角（`u2`，`v2`）的纹理坐标。构造函数接受一个`Texture`以及区域左上角的像素坐标和区域的宽度和高度。要为`Cannon`构造一个纹理区域，你可以这样做：\n\
  \n```java\nTextureRegion cannonRegion = new TextureRegion(texture, 0, 0, 64, 32);\n\
  ```\n\n同样，你可以为 Bob 构造一个区域：\n\n```java\nTextureRegion bobRegion = new TextureRegion(texture,\
  \ 32, 32, 32, 32);\n```\n\n以此类推。你可以在已创建的示例代码中使用它，并利用`TextureRegion`的`u1`、`v1`、`u2`和`v2`成员来指定矩形顶点的纹理坐标。但你不需要这么做，因为你想要完全摆脱这些繁琐的定义。这正是你可以使用精灵批处理来完成的。\n\
  \n\n\n### `SpriteBatcher` 类\n\n如前所述，一个精灵可以通过其位置、大小和纹理区域（以及可选的旋转角度和缩放比例）轻松定义。它本质上就是世界空间中的一个图形化矩形。为简化操作，请遵循惯例：将位置设为精灵中心，并围绕该中心构建矩形。现在你可以创建一个\
  \ `Sprite` 类并按如下方式使用：\n\n`Sprite bobSprite = new Sprite(20, 20, 0.5f, 0.5f, bobRegion);`\n\
  \n这将构建一个新精灵，其中心位于世界坐标 (20,20)，向四周各延伸 0.25 米，并使用 `bobRegion TextureRegion`。但你也可以这样操作：\n\
  \n`spriteBatcher.drawSprite(bob.x, bob.y, BOB_WIDTH, BOB_HEIGHT, bobRegion);`\n\n\
  这样看起来就好多了。你不需要再为对象的图形表现创建额外对象，而是按需绘制 Bob 实例。你也可以使用一个重载方法：\n\n`spriteBatcher.drawSprite(cannon.x,\
  \ cannon.y, CANNON_WIDTH, CANNON_HEIGHT, cannon.angle, cannonRegion);`\n\n这将绘制经过角度旋转的加农炮。那么，如何实现精灵批处理器呢？`Vertices`\
  \ 实例又在哪里？让我们思考一下批处理器的工作原理。\n\n究竟什么是批处理？在图形学领域中，批处理被定义为将多次绘制调用合并为一次绘制调用。如前章所述，这能让\
  \ GPU 更高效地工作。精灵批处理器提供了一种实现方式，具体原理如下：\n\n- 批处理器拥有一个初始为空（或在收到清除指令后变空）的缓冲区，该缓冲区用于存储顶点。在你的案例中，它将是一个简单的浮点数组。\n\
  - 每次调用 `SpriteBatcher.drawSprite()` 方法时，会根据参数指定的位置、大小、朝向和纹理区域，向缓冲区添加四个顶点。这意味着你需要手动旋转和平移顶点位置，而非借助\
  \ OpenGL ES。不过别担心，`Vector2` 类的代码将在此处派上用场。这是消除所有绘制调用的关键。\n- 当你指定完所有需要渲染的精灵后，通知精灵批处理器一次性将所有精灵矩形对应的顶点提交给\
  \ GPU，然后调用实际的 OpenGL ES 绘制方法渲染所有矩形。为此，你可以将浮点数组的内容传输至 `Vertices` 实例，并利用它渲染矩形。\n\n\
  **注意：** 你只能对使用同一纹理的精灵进行批处理。不过这问题不大，因为你本来就会使用纹理图集。\n\n精灵批处理器的典型使用模式如下：\n\n`batcher.beginBatch(texture);`\
  \  \n`// 根据需要多次调用 batcher.drawSprite()，引用纹理中的区域`  \n`batcher.endBatch();`\n\n调用\
  \ `SpriteBatcher.beginBatch()` 会向批处理器传达两件事：清空缓冲区，并使用传入的纹理。为方便起见，你将在此方法内绑定纹理。\n\n\
  接着，根据需求渲染任意多个引用该纹理区域的精灵。这将填充缓冲区，每个精灵增加四个顶点。\n\n调用 `SpriteBatcher.endBatch()` 表示通知精灵批处理器当前批次的精灵渲染已完成，应立即将顶点上传至\
  \ GPU 进行实际渲染。你将使用带索引的渲染方式（借助 `Vertices` 实例），因此在浮点数组缓冲区中除了顶点之外，还需要指定索引。但由于你始终渲染矩形，可以预先在\
  \ `SpriteBatcher` 的构造函数中一次性生成索引。为此，你需要知道批处理器每批能绘制多少个精灵。通过设定每批可渲染精灵数量的硬性上限，你无需扩展任何数组或其他缓冲区，只需在构造函数中一次性分配这些数组和缓冲区。\n\
  \n整体机制相当简单。`SpriteBatcher.drawSprite()` 方法看似神秘，但并非难题（如果暂时忽略旋转和缩放）。你只需要根据参数计算顶点位置和纹理坐标即可。在之前的示例（如定义加农炮、炮弹和\
  \ Bob 的矩形时）中，你已手动完成过类似操作。在 `SpriteBatcher.drawSprite()` 方法中，你可以基于方法参数自动完成大致相同的操作。现在让我们查看\
  \ `SpriteBatcher`。[代码清单 8–17](http://Chapter08.html#list_8_17) 展示了相关代码。\n\n**代码清单\
  \ 8–17.** *`SpriteBatcher.java` 节选（不含旋转和缩放）*\n\n```\npackage com.badlogic.androidgames.framework.gl;\n\
  \nimport javax.microedition.khronos.opengles.GL10;\n\nimport android.util.FloatMath;\n\
  \nimport com.badlogic.androidgames.framework.impl.GLGraphics;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  \npublic class SpriteBatcher {\n    final float[] verticesBuffer;\n    int bufferIndex;\n\
  \    final Vertices vertices;\n    int numSprites;\n```\n\n首先查看成员变量。`verticesBuffer`\
  \ 是临时浮点数组，用于存储当前批次精灵的顶点。`bufferIndex` 指示在浮点数组中写入下一组顶点的起始位置。`vertices` 是用于渲染批次的 `Vertices`\
  \ 实例，它也将存储稍后定义的索引。`numSprites` 记录当前批次已绘制的精灵数量。\n\n```\npublic SpriteBatcher(GLGraphics\
  \ glGraphics, int maxSprites) {\n    this.verticesBuffer = new float[maxSprites*4*4];\n\
  \    this.vertices = new Vertices(glGraphics, maxSprites*4, maxSprites*6, false,\n\
  \    true);\n    this.bufferIndex = 0;\n    this.numSprites = 0;\n\n    short[]\
  \ indices = new short[maxSprites*6];\n    int len = indices.length;\n    short j\
  \ = 0;\n    for (int i = 0; i < len; i += 6, j += 4) {\n                indices[i\
  \ + 0] = (short)(j + 0);\n                indices[i + 1] = (short)(j + 1);\n   \
  \             indices[i + 2] = (short)(j + 2);\n                indices[i + 3] =\
  \ (short)(j + 2);\n                indices[i + 4] = (short)(j + 3);\n          \
  \      indices[i + 5] = (short)(j + 0);\n        }\n        vertices.setIndices(indices,\
  \ 0, indices.length);\n    }\n```\n\n进入构造函数，它有两个参数：创建 `Vertices` 实例所需的 `GLGraphics`\
  \ 实例，以及批处理器每批能渲染的最大精灵数。构造函数中首先创建浮点数组。每个精灵有四个顶点，每个顶点占用四个浮点数（两个用于 x、y 坐标，另外两个用于纹理坐标）。最多可有\
  \ `maxSprites` 个精灵，因此缓冲区需要 4 × 4 × `maxSprites` 个浮点数。\n\n接着创建 `Vertices` 实例，需要存储\
  \ `maxSprites` × 4 个顶点和 `maxSprites` × 6 个索引。告知 `Vertices` 实例，每个顶点不仅包含位置属性，还包含纹理坐标。然后将\
  \ `bufferIndex` 和 `numSprites` 成员初始化为零。为 `Vertices` 实例创建索引，由于索引永不改变，只需执行一次。批次中的第一个精灵的索引始终为\
  \ 0, 1, 2, 2, 3, 0；下一个精灵则为 4, 5, 6, 6, 7, 4；依此类推。你可以预先计算这些索引并存储到 `Vertices` 实例中，这样只需设置一次，而不是每个精灵都设置。\n\
  \n```\npublic void beginBatch(Texture texture) {\n        texture.bind();\n    \
  \    numSprites = 0;\n        bufferIndex = 0;\n    }\n```\n\n\n\n## 方法详解\n\n接下来是`beginBatch()`方法。它绑定纹理并重置`numSprites`和`bufferIndex`成员，以便第一个精灵的顶点将被插入到`verticesBuffer`浮点数组的起始位置。\n\
  \n```\npublic void endBatch() {\n    vertices.setVertices(verticesBuffer, 0, bufferIndex);\n\
  \    vertices.bind();\n    vertices.draw(GL10.GL_TRIANGLES, 0, numSprites * 6);\n\
  \    vertices.unbind();\n}\n```\n\n下一个方法是`endBatch()`；你需要调用它来最终确定并绘制当前批次。它首先将为此批次定义的顶点从浮点数组传输到`Vertices`实例。剩下的工作就是绑定`Vertices`实例，绘制`numSprites`\
  \ × 2 个三角形，然后再次解绑`Vertices`实例。由于你使用索引渲染，需要指定要使用的索引数量——每个精灵六个索引，乘以`numSprites`。渲染的整个过程就是这样。\n\
  \n```\npublic void drawSprite(float x, float y, float width, float height, TextureRegion\
  \ region) {\n    float halfWidth = width / 2;\n    float halfHeight = height / 2;\n\
  \    float x1 = x - halfWidth;\n    float y1 = y - halfHeight;\n    float x2 = x\
  \ + halfWidth;\n    float y2 = y + halfHeight;\n\n    verticesBuffer[bufferIndex++]\
  \ = x1;\n    verticesBuffer[bufferIndex++] = y1;\n    verticesBuffer[bufferIndex++]\
  \ = region.u1;\n    verticesBuffer[bufferIndex++] = region.v2;\n\n    verticesBuffer[bufferIndex++]\
  \ = x2;\n    verticesBuffer[bufferIndex++] = y1;\n    verticesBuffer[bufferIndex++]\
  \ = region.u2;\n    verticesBuffer[bufferIndex++] = region.v2;\n\n    verticesBuffer[bufferIndex++]\
  \ = x2;\n    verticesBuffer[bufferIndex++] = y2;\n    verticesBuffer[bufferIndex++]\
  \ = region.u2;\n    verticesBuffer[bufferIndex++] = region.v1;\n\n    verticesBuffer[bufferIndex++]\
  \ = x1;\n    verticesBuffer[bufferIndex++] = y2;\n    verticesBuffer[bufferIndex++]\
  \ = region.u1;\n    verticesBuffer[bufferIndex++] = region.v1;\n\n    numSprites++;\n\
  }\n```\n\n下一个方法是`SpriteBatcher`的核心方法。它接收精灵中心的 x 和 y 坐标、其宽度和高度，以及它所映射到的`TextureRegion`。该方法的职责是将四个顶点添加到当前`bufferIndex`起始的浮点数组中。这四个顶点组成一个纹理映射矩形。你计算左下角（`x1`，`y1`）和右上角（`x2`，`y2`）的位置，并使用这四个变量以及来自`TextureRegion`的纹理坐标来构建顶点。顶点按逆时针顺序添加，从左下顶点开始。一旦它们被添加到浮点数组，你就递增`numSprites`计数器，并等待添加另一个精灵或最终确定批次。\n\
  \n这就是全部工作。你只需通过将预变换的顶点缓冲在浮点数组中并一次性渲染它们，就消除了一大批绘制方法。与之前使用的方法相比，这将显著提高你的 2D 精灵渲染性能。减少\
  \ OpenGL ES 状态变化和更少的绘制调用让 GPU 更高效。\n\n还有一件事需要实现：一个可以绘制旋转精灵的`SpriteBatcher.drawSprite()`方法。你需要做的就是构造四个角顶点（不添加位置），绕原点旋转它们，添加精灵的位置使顶点位于世界空间中，然后按照之前的绘制方法继续。你可以使用`Vector2.rotate()`来实现，但这会带来一些函数开销。因此，你重现了`Vector2.rotate()`中的代码，并尽可能进行了优化。`SpriteBatcher`的最终方法如清单\
  \ 8-18 所示。\n\n**清单 8-18.** *SpriteBatcher.java 的其余部分：绘制旋转精灵的方法*\n\n```\npublic void\
  \ drawSprite(float x, float y, float width, float height, float angle, TextureRegion\
  \ region) {\n    float halfWidth = width / 2;\n    float halfHeight = height / 2;\n\
  \n    float rad = angle * Vector2.TO_RADIANS;\n    float cos = FloatMath.cos(rad);\n\
  \    float sin = FloatMath.sin(rad);\n\n    float x1 = -halfWidth * cos - (-halfHeight)\
  \ * sin;\n    float y1 = -halfWidth * sin + (-halfHeight) * cos;\n    float x2 =\
  \ halfWidth * cos - (-halfHeight) * sin;\n    float y2 = halfWidth * sin + (-halfHeight)\
  \ * cos;\n    float x3 = halfWidth * cos - halfHeight * sin;\n    float y3 = halfWidth\
  \ * sin + halfHeight * cos;\n    float x4 = -halfWidth * cos - halfHeight * sin;\n\
  \    float y4 = -halfWidth * sin + halfHeight * cos;\n\n    x1 += x;\n    y1 +=\
  \ y;\n    x2 += x;\n    y2 += y;\n    x3 += x;\n    y3 += y;\n    x4 += x;\n   \
  \ y4 += y;\n\n    verticesBuffer[bufferIndex++] = x1;\n    verticesBuffer[bufferIndex++]\
  \ = y1;\n    verticesBuffer[bufferIndex++] = region.u1;\n    verticesBuffer[bufferIndex++]\
  \ = region.v2;\n\n    verticesBuffer[bufferIndex++] = x2;\n    verticesBuffer[bufferIndex++]\
  \ = y2;\n    verticesBuffer[bufferIndex++] = region.u2;\n    verticesBuffer[bufferIndex++]\
  \ = region.v2;\n\n    verticesBuffer[bufferIndex++] = x3;\n    verticesBuffer[bufferIndex++]\
  \ = y3;\n    verticesBuffer[bufferIndex++] = region.u2;\n    verticesBuffer[bufferIndex++]\
  \ = region.v1;\n\n    verticesBuffer[bufferIndex++] = x4;\n    verticesBuffer[bufferIndex++]\
  \ = y4;\n    verticesBuffer[bufferIndex++] = region.u1;\n    verticesBuffer[bufferIndex++]\
  \ = region.v1;\n\n    numSprites++;\n}\n```\n\n你采用与较简单的绘制方法相同的操作，不同的是你构造了全部四个角点，而不仅仅是两个对角点。这是旋转所必需的。其余部分与之前相同。\n\
  \n缩放呢？你并不需要另一个方法，因为缩放精灵只需要缩放其宽度和高度。你可以在两个绘制方法外部进行缩放，因此不需要为精灵的缩放绘制再准备一组方法。\n\n这就是\
  \ OpenGL ES 实现闪电般快速精灵渲染背后的重大秘密。\n\n\n\n### 使用 `SpriteBatcher` 类\n\n现在你可以在你的火炮示例中整合\
  \ `TextureRegion` 和 `SpriteBatcher` 这两个类。复制 `TextureAtlas` 示例并将其重命名为 `SpriteBatcherTest`。其中包含的类可以命名为\
  \ `SpriteBatcherTest` 和 `SpriteBatcherScreen`。\n\n去掉屏幕类中的 `Vertices` 成员。你不再需要它们了，因为\
  \ `SpriteBatcher` 会为你处理所有繁琐的工作。取而代之，添加以下成员：\n\n```java\nTextureRegion cannonRegion;\n\
  TextureRegion ballRegion;\nTextureRegion bobRegion;\nSpriteBatcher batcher;\n```\n\
  \n现在，你的图集中三个对象各自对应了一个 `TextureRegion`，同时也拥有一个 `SpriteBatcher`。\n\n接下来，修改屏幕的构造函数。去掉所有\
  \ `Vertices` 的实例化和初始化代码，并用一行代码替换：\n\n```java\nbatcher = new SpriteBatcher(glGraphics,\
  \ 100);\n```\n\n这会将我们的 `batcher` 成员设置为一个新的 `SpriteBatcher` 实例，该实例可以在一个批次中渲染多达 100\
  \ 个精灵。\n\n`TextureRegion` 在 `resume()` 方法中初始化，因为它们依赖于 `Texture`：\n\n```java\n@Override\n\
  public void resume() {\n    texture = new Texture(((GLGame)game), \"atlas.png\"\
  );\n    cannonRegion = new TextureRegion(texture, 0, 0, 64, 32);\n    ballRegion\
  \ = new TextureRegion(texture, 0, 32, 16, 16);\n    bobRegion = new TextureRegion(texture,\
  \ 32, 32, 32, 32);\n}\n```\n\n这里没什么意外。最后需要修改的是 `present()` 方法。你会惊讶地发现它现在看起来如此简洁。代码如下：\n\
  \n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    camera.setViewportAndMatrices();\n\
  \n    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \    gl.glEnable(GL10.GL_TEXTURE_2D);\n\n    batcher.beginBatch(texture);\n\n  \
  \  int len = targets.size();\n    for (int i = 0; i < len; i++) {\n        GameObject\
  \ target = targets.get(i);\n        batcher.drawSprite(target.position.x, target.position.y,\
  \ 0.5f, 0.5f, bobRegion);\n    }\n\n    batcher.drawSprite(ball.position.x, ball.position.y,\
  \ 0.2f, 0.2f, ballRegion);\n    batcher.drawSprite(cannon.position.x, cannon.position.y,\
  \ 1, 0.5f, cannon.angle, cannonRegion);\n    batcher.endBatch();\n}\n```\n\n这真是太棒了。你现在调用的\
  \ OpenGL ES 方法仅用于清除屏幕、启用混合和纹理贴图以及设置混合函数。其余的都是纯粹的 `SpriteBatcher` 和 `Camera2D` 的功劳。由于所有对象共享同一个纹理图集，你可以在一个批次中渲染它们。你使用图集纹理调用\
  \ `batcher.beginBatch()`，使用简单的绘制方法渲染所有 Bob 目标，渲染球体（同样使用简单绘制方法），最后使用可以旋转精灵的绘制方法渲染火炮。最后调用\
  \ `batcher.endBatch()` 结束该方法，该方法会实际将精灵的几何数据传送到 GPU 并渲染所有内容。\n\n### 性能测量\n\n那么 `SpriteBatcher`\
  \ 方法比你在 `BobTest` 中使用的方法快多少？像在 `BobTest` 中那样，在代码中添加一个 `FPSCounter`，并在 Hero、Droid\
  \ 和 Nexus One 设备上测试。将目标数量增加到 100，并将 `SpriteBatcher` 可渲染的最大精灵数设置为 102，因为你要渲染 100\
  \ 个目标、1 个球体和 1 个火炮。结果如下：\n\n```\nHero (1.5):\n12-27 23:51:09.400: DEBUG/FPSCounter(2169):\
