- "# OpenGL ES：温和入门\n\n“Nom 先生”取得了巨大的成功。得益于其扎实的初始设计和游戏框架，实现“Nom 先生”对我们来说易如反掌。最棒的是，即使在低端设备上，游戏也能流畅运行。当然，“Nom\
  \ 先生”并不是一个非常复杂或图形密集型的游戏，因此使用 `Canvas` API 进行渲染被证明是一个好主意。\n\n然而，当你想要做更复杂的事情时——比如像《Replica\
  \ Island》这样的游戏——你就会碰壁：`Canvas` 无法应对这类游戏的视觉复杂性。而且，如果你想要炫酷的 3D 效果，`Canvas` 也无能为力。那么……你该怎么办呢？\n\
  \n这就是 OpenGL ES 大展身手的地方了。在本章中，我们首先会简要了解 OpenGL ES 究竟是什么以及它能做什么。然后，我们将专注于使用 OpenGL\
  \ ES 进行 2D 图形渲染，而无需深入使用该 API 进行 3D 图形渲染时涉及的那些数学上更复杂的领域（我们将在后面的章节中讨论）。我们需要循序渐进，因为\
  \ OpenGL ES 可能会变得相当复杂。准备好了解 OpenGL ES 了吗？\n\n### 什么是 OpenGL ES，为什么我要关心它？\n\nOpenGL\
  \ ES 是（3D）图形编程的行业标准。它特别针对移动和嵌入式设备。它由 Khronos Group 维护，该组织是一个包括 ATI、NVIDIA 和 Intel\
  \ 在内的企业联合体；这些公司共同定义和扩展该标准。\n\n说到标准，目前 OpenGL ES 有三个递增的版本：1.0、1.1 和 2.0。在本书中，我们关注的是前两个版本。所有安卓设备都支持\
  \ OpenGL ES 1.0，大多数也支持版本 1.1，后者在 1.0 规范的基础上增加了一些新功能。然而，OpenGL ES 2.0 打破了与 1.x 版本的兼容性。你可以使用\
  \ 1.x 或 2.0，但不能同时使用两者。原因在于，1.x 版本使用了一种称为*固定功能管线*的编程模型，而版本 2.0 则允许你通过所谓的*着色器*以编程方式定义渲染管线的部分。许多第二代设备已经支持\
  \ OpenGL ES 2.0；然而，其 Java 绑定目前尚不可用（除非你以新的 Android 2.3 为目标平台）。不过，对于大多数游戏来说，OpenGL\
  \ ES 1.x 已经足够好了，因此我们将在此坚持使用它。\n\n**注意：** 模拟器仅支持 OpenGL ES 1.0。虽然 OpenGL ES 是一个标准，但不同的制造商对其解释不同，不同设备间的性能也差异巨大，所以请务必在各种设备上进行测试以确保兼容性。\n\
  \nOpenGL ES 是一个 API，它以 Khronos 小组提供的一组 C 语言头文件的形式存在，并附有关于这些头文件中定义的 API 应如何表现的非常详细的规范。这包括诸如像素和线条应如何渲染等内容。然后，硬件制造商基于此规范，在\
  \ GPU 驱动之上为其 GPU 实现该接口。这些实现的质量略有差异：有些公司严格遵守标准（如 PowerVR），而另一些公司似乎难以遵循。这有时会导致实现中出现与\
  \ GPU 相关的错误，这些错误与安卓本身无关，而是由制造商提供的硬件驱动程序引起的。在你进入 OpenGL ES 世界的旅程中，我们会为你指出任何设备特定的问题。\n\
  \n**注意：** OpenGL ES 或多或少是功能更丰富的桌面 OpenGL 标准的兄弟版本。它与后者的不同之处在于，部分功能被缩减或完全移除。尽管如此，还是可以编写出能在两种规范下运行的应用程序，这对于将游戏移植到桌面平台来说非常棒。\n\
  \n那么 OpenGL ES 究竟能做什么？简而言之，它是一个精炼且高效的三角形渲染机器。详细的回答则要稍微复杂一些。\n\n\n\n#### 编程模型：一个类比\n\
  \n通常来说，OpenGL ES 是一个 3D 图形编程 API。因此，它拥有一个相当简洁且易于理解的编程模型，我们可以通过一个简单的类比来说明。\n\n可以将\
  \ OpenGL ES 想象成一台相机的工作方式。要拍摄一张照片，你首先得到达你想要拍摄的场景。你的场景由各种物体组成——比如，一张上面放着更多物品的桌子。所有这些物体相对于你的相机都有各自的位置和朝向，以及不同的材质和纹理。玻璃是半透明且反光的；桌子可能由木头制成；杂志上印有某位政治家的最新照片；等等。有些物体甚至可能移动（例如，一只你赶不走的果蝇）。你的相机也具有属性，例如焦距、视野、图像分辨率、将拍摄的照片尺寸，以及在世界中（相对于某个原点）的独特位置和朝向。即使物体和相机都在移动，当你按下快门时，你捕捉到了场景的一个静态影像（现在，我们先忽略可能导致图像模糊的快门速度）。在那一无限短暂的瞬间，一切都静止且定义明确，照片精确地反映了所有这些位置、朝向、纹理、材质和光照的配置。图\
  \ 7-1 展示了一个抽象场景，其中包含一台相机、光源以及三个具有不同材质的物体。\n\n![images](img/0701.jpg)\n\n**图 7-1.**\
  \ *一个抽象场景*\n\n每个物体相对于场景原点都有各自的位置和朝向。由视点指示的相机，相对于场景原点也有一个位置。图 7-1 中的棱锥体就是所谓的*视体*或*视锥体*，它显示了相机捕捉了多少场景以及相机的朝向。带有光线的小白球是场景中的光源，它相对于原点也有一个位置。\n\
  \n我们可以将这个场景直接映射到 OpenGL ES，但为此我们需要定义几样东西：\n\n-   *物体（也称模型）*：这些通常由四组属性构成：几何形状、颜色、纹理和材质。几何形状由一组三角形指定。每个三角形由三维空间中的三个点组成，因此我们有相对于坐标系原点定义的\
  \ x、y、z 坐标，如图 7-1 所示。注意 z 轴指向我们。颜色通常指定为 RGB 三元组，这是我们熟悉的。纹理和材质则稍微复杂一些，我们稍后会讲到。\n\
  -   *灯光*：OpenGL ES 提供了几种具有不同属性的光源类型。它们只是三维空间中具有位置和/或方向的数学对象，外加颜色等属性。\n-   *相机*：这也是一个数学对象，在三维空间中具有位置和朝向。此外，它还有控制我们看到多少图像的参数，类似于真实相机。所有这些共同定义了一个视体或视锥体（由图\
  \ 7-1 中顶部被截断的棱锥体表示）。在这个棱锥体内部的任何东西都能被相机看到；外部的任何东西都不会出现在最终图像中。\n-   *视口*：这定义了最终图像的尺寸和分辨率。可以将其想象成你放入模拟相机中的胶卷类型，或者你用数码相机拍摄照片时获得的图像分辨率。\n\
  \n了解了这些之后，OpenGL ES 可以从相机的视角构建出我们场景的 2D 位图。请注意，我们是在三维空间中定义所有内容的。那么，OpenGL ES 是如何将其映射到二维的呢？\n\
  \n#### 投影\n\n这种 2D 映射是通过一种叫做*投影*的方法完成的。我们已经提到，OpenGL ES 主要处理三角形。一个三角形在 3D 空间中有三个定义好的点。为了将这样一个三角形渲染到帧缓冲中，OpenGL\
  \ ES 需要知道这些 3D 点在帧缓冲的基于像素的坐标系中的坐标。一旦它知道了这三个角点坐标，就可以简单地绘制帧缓冲中位于该三角形内部的像素。我们甚至可以自己编写一个小小的\
  \ OpenGL ES 实现，通过将 3D 点投影到 2D，然后通过 `Canvas` 简单地绘制它们之间的连线。\n\n在 3D 图形中，有两种常用的投影方式。\n\
  \n-   *平行（或正交）投影*：如果你使用过 CAD 应用程序，你可能已经了解这一点。平行投影不关心物体离相机有多远；物体在最终图像中始终具有相同的大小。这种投影方式通常用于在\
  \ OpenGL ES 中渲染 2D 图形。\n-   *透视投影*：你的眼睛每天都在使用这种投影。离你较远的物体在你的视网膜上显得更小。当我们在 OpenGL\
  \ ES 中进行 3D 图形处理时，通常使用透视投影。\n\n在这两种情况下，你都需要一个叫做*投影平面*的东西，它几乎与你的视网膜完全相同——它是光线实际被记录以形成最终图像的地方。虽然数学上的平面在面积上是无限的，但我们的视网膜是有限的。我们的\
  \ OpenGL ES “视网膜” 等于图 7-1 中看到的视锥体顶部的矩形。视锥体的这一部分是 OpenGL ES 将投影点的区域。这个区域被称为*近裁剪平面*，它有自己的小型\
  \ 2D 坐标系。图 7-2 再次显示了从相机视角看到的近裁剪平面，并叠加了坐标系。\n\n![images](img/0702.jpg)\n\n**图 7-2.**\
  \ *近裁剪平面（也称为投影平面）及其坐标系*\n\n请注意，这个坐标系绝非固定不变的。我们可以操作它，以便在我们喜欢的任何投影坐标系中工作；例如，我们可以指示\
  \ OpenGL ES 让原点位于左下角，并让“视网膜”的可见区域在 x 轴上为 480 单位，在 y 轴上为 320 单位。听起来耳熟吗？是的，OpenGL\
  \ ES 允许你为投影点指定任何你想要的坐标系。\n\n一旦我们指定了视锥体，OpenGL ES 就会获取三角形的每个点，并从该点发射一条穿过投影平面的射线。平行投影和透视投影之间的区别在于这些射线方向是如何构建的。图\
  \ 7-3 从上方展示了这两者之间的区别。\n\n![images](img/0703.jpg)\n\n**图 7-3.** *透视投影（左）和平行投影（右）*\n\
  \n透视投影从三角形的点向相机（在本例中，也就是视点）发射射线。因此，较远的物体在投影平面上会显得更小。当我们使用平行投影时，射线垂直于投影平面发射。在这种情况下，无论物体有多远，它在投影平面上的大小都会保持不变。\n\
  \n如前所述，我们的投影平面在 OpenGL ES 术语中被称为*近裁剪平面*。视锥体的所有侧面都有类似的名称。离相机最远的那一面被称为*远裁剪平面*。其他的则被称为*左*、*右*、*上*和*下*裁剪平面。任何位于这些平面外部或后方的物体都不会被渲染。部分位于视锥体内部的物体将沿着这些平面被裁剪，这意味着位于视锥体外部的部分会被切掉。这就是*裁剪平面*这个名称的由来。\n\
  \n\n\n您可能会好奇为什么平行投影的视景体在图 7-3 中是矩形的。事实上，投影实际上是由我们如何定义裁剪平面决定的。在透视投影的情况下，左、右、上、下裁剪平面并不垂直于近裁剪平面和远裁剪平面（参见图\
  \ 7-3，该图仅显示了左、右裁剪平面）。在平行投影的情况下，这些平面是垂直的，这告诉 OpenGL ES 无论物体距离相机有多远，都以相同的大小渲染所有物体。\n\
  \n### 标准化设备空间与视口\n\n一旦 OpenGL ES 计算出三角形在近裁剪平面上的投影点，它最终就可以将这些点转换为帧缓冲区中的像素坐标。为此，它必须首先将点转换到所谓的*标准化设备空间*。这等同于图\
  \ 7-2 中所描绘的坐标系。基于这些标准化设备空间坐标，OpenGL ES 通过以下简单公式计算最终的帧缓冲区像素坐标：\n\n`pixelX = (norX\
  \ + 1) / (viewportWidth + 1) + norX`\n`pixelY = (norY + 1) / (viewportHeight + 1)\
  \ + norY`\n\n其中 `norX` 和 `norY` 是 3D 点的标准化设备坐标，`viewportWidth` 和 `viewportHeight`\
  \ 是视口在 x 轴和 y 轴上的像素大小。我们无需过多担心标准化设备坐标，因为 OpenGL 会自动为我们执行转换。我们真正关心的是视口和视景体。\n\n###\
  \ 矩阵\n\n稍后您将看到如何指定视景体，从而指定投影。OpenGL ES 以*矩阵*的形式表达投影。我们不需要了解矩阵的内部原理。我们只需要知道它们对我们场景中定义的点做了什么。以下是关于矩阵的要点总结：\n\
  \n-   矩阵编码了要应用于点的变换。变换可以是投影、平移（点被移动）、绕某个点和轴的旋转、缩放等。\n-   通过将这样的矩阵与一个点相乘，我们将变换应用于该点。例如，将一个点与一个编码了沿\
  \ x 轴平移 10 个单位的矩阵相乘，将会使该点沿 x 轴移动 10 个单位，从而修改其坐标。\n-   我们可以通过矩阵相乘将存储在多个独立矩阵中的变换连接成一个矩阵。当我们用这个连接后的单一矩阵与一个点相乘时，该矩阵中存储的所有变换都将应用于该点。变换应用的顺序取决于我们进行矩阵相乘的顺序。\n\
  -   有一种特殊的矩阵称为*单位矩阵*。如果我们用它与一个矩阵或一个点相乘，将不会发生任何变化。可以想象将点或矩阵乘以单位矩阵就像将数字乘以 1。它没有任何效果。当你了解\
  \ OpenGL ES 如何处理矩阵时（请参见“矩阵模式与活动矩阵”一节），单位矩阵的相关性就会变得清晰——这是经典的先有鸡还是先有蛋的问题。\n\n**注意：**\
  \ 在此上下文中，当我们谈论点时，我们实际指的是 3D 向量。\n\nOpenGL ES 有三个不同的矩阵应用于我们模型的点：\n\n-   *模型视图矩阵*：我们可以使用此矩阵来移动、旋转或缩放我们三角形的点（这是模型视图矩阵的*模型*部分）。此矩阵也用于指定我们相机的位置和朝向（这是*视图*部分）。\n\
  -   *投影矩阵*：顾名思义——此矩阵编码了投影，因此也编码了相机的视景体。\n-   *纹理矩阵*：此矩阵允许我们操纵纹理坐标（我们将在后面讨论）。然而，由于\
  \ OpenGL ES 的这一部分因驱动缺陷在部分设备上存在问题，我们将在本书中避免使用此矩阵。\n\n### 渲染管线\n\nOpenGL ES 会跟踪这三个矩阵。每当我们设置其中一个矩阵时，它会记住该矩阵，直到我们再次更改它。在\
  \ OpenGL ES 术语中，这被称为一种*状态*。不过，OpenGL 管理的不止是矩阵状态；它还会跟踪我们是否想要对三角形进行 alpha 混合、是否要启用光照、应将哪个纹理应用到我们的几何体上，等等；事实上，OpenGL\
  \ ES 就是一个巨大的状态机。我们设置其当前状态，向其输入对象的几何体，然后告诉它为我们渲染一幅图像。让我们看看一个三角形是如何通过这个强大的三角形渲染机器的。图\
  \ 7-4 展示了 OpenGL ES 流水线的一个非常高层级、简化的视图。\n\n![images](img/0704.jpg)\n\n**图 7-4.**\
  \ *三角形的历程*\n\n一个三角形通过此流水线的过程如下：\n\n1.  我们的勇敢三角形首先被模型视图矩阵变换。这意味着它的所有点都与这个矩阵相乘。这个乘法实际上会移动三角形在世界中的点。\n\
  2.  然后，得到的输出与投影矩阵相乘，有效地将 3D 点变换到 2D 投影平面上。\n3.  在这两步之间（或与它们并行），当前设置的光照和材质也会应用于我们的三角形，赋予其颜色。\n\
  4.  一旦所有这些都完成，投影后的三角形将被裁剪到我们的“视网膜”上，并变换为帧缓冲区坐标。\n5.  作为最后一步，OpenGL 根据光照阶段的颜色、要应用于三角形的纹理以及混合状态（该状态下三角形的每个像素可能会也可能不会与帧缓冲区中的像素合并）来填充三角形的像素。\n\
  \n您需要学习的只是如何将几何体和纹理传递给 OpenGL ES，以及如何设置前述每个步骤所使用的状态。在您能够做到这一点之前，您需要了解 Android 如何允许您访问\
  \ OpenGL ES。\n\n**注意：** 虽然对 OpenGL ES 流水线的高层级描述大多是正确的，但它被大大简化了，并省略了一些将在后续章节中变得重要的细节。另一件需要注意的事情是，当\
  \ OpenGL ES 执行投影时，它实际上并非投影到 2D 坐标系；而是投影到所谓的*齐次坐标系*，这实际上是四维的。这是一个非常复杂的数学主题，所以为简单起见，我们仅坚持使用\
  \ OpenGL ES 投影到 2D 坐标的简化前提。\n\n\n\n### 开始之前\n\n在本章剩余部分，我们将提供许多简短示例，正如第 4 章讨论 Android\
  \ API 基础知识时所做的那样。我们会使用与第 4 章相同的启动类，它会显示一个可启动的测试 `Activity` 列表。唯一会改变的是通过反射实例化的 `Activity`\
  \ 名称及其所在包。本章剩余示例都将位于包 `com.badlogic.androidgames.glbasics` 中，其余代码保持不变。新的启动 `Activity`\
  \ 将命名为 `GLBasicsStarter`。你还需要从第 5 章复制所有源代码，其中包含你的框架类，因为你当然希望复用它们。最后，你将编写一些新的框架类和辅助类，它们将放入\
  \ `com.badlogic.androidgames.framework` 包及其子包中。\n\n我们还会再次提供一个清单文件。由于以下每个示例都是一个 `Activity`，我们必须确保每个\
  \ Activity 在清单中都有对应条目。所有示例都将使用固定屏幕方向（取决于示例，使用竖屏或横屏），并告知 Android 它们能处理 `keyboard`、`keyboardHidden`\
  \ 和 `orientationChange` 事件。\n\n解决了这些前置问题后，好戏开始吧！\n\n### GLSurfaceView：从 2008 年起让事情变简单\n\
  \n我们首先需要一种能够通过 OpenGL ES 进行绘制的 `View`。幸运的是，Android API 中确实存在这样一个 `View`——它叫做 `GLSurfaceView`，继承自\
  \ `SurfaceView` 类（我们之前已经用该类绘制过 Mr. Nom 的世界）。\n\n我们还需要一个独立的主循环线程，以免拖慢 UI 线程。惊喜来了：`GLSurfaceView`\
  \ 已经为我们创建了这样一个线程！我们只需实现一个名为 `GLSurfaceView.Renderer` 的监听器接口，并将其注册到 `GLSurfaceView`\
  \ 中。该接口包含三个方法：\n\n```\ninterface Renderer {\n    public void onSurfaceCreated(GL10\
  \ gl, EGLConfig config);\n    public void onSurfaceChanged(GL10 gl, int width, int\
  \ height);\n    public void onDrawFrame(GL10 gl);\n}\n```\n\n每当 `GLSurfaceView`\
  \ 的 Surface 被创建时，都会调用 `onSurfaceCreated()` 方法。这发生在我们首次启动 `Activity` 时，以及每次从暂停状态返回\
  \ `Activity` 时。该方法接收两个参数：一个 `GL10` 实例和一个 `EGLConfig`。`GL10` 实例允许我们向 OpenGL ES 发出命令。`EGLConfig`\
  \ 则告诉我们 Surface 的属性，例如颜色、深度等。我们通常会忽略它。我们将在 `onSurfaceCreated()` 方法中设置几何体和纹理。\n\n\
  每当 Surface 大小改变时，会调用 `onSurfaceChanged()` 方法。我们以参数形式获取 Surface 的新宽度和新高度（以像素为单位），以及一个\
  \ `GL10` 实例（如果我们想发出 OpenGL ES 命令的话）。\n\n`onDrawFrame()` 方法才是乐趣所在。它在精神上类似于我们的 `Screen.render()`\
  \ 方法，由 `GLSurfaceView` 为我们设置的渲染线程尽可能频繁地调用。在这个方法中，我们执行所有渲染操作。\n\n除了注册 `Renderer`\
  \ 监听器外，我们还必须在 `Activity` 的 `onPause()`/`onResume()` 方法中调用 `GLSurfaceView.onPause()`/`onResume()`。原因很简单。`GLSurfaceView`\
  \ 会在其 `onResume()` 方法中启动渲染线程，并在其 `onPause()` 方法中销毁该线程。这意味着，当我们的 `Activity` 暂停时，监听器不会被调用，因为调用我们监听器的渲染线程也会被暂停。\n\
  \n这里只有一个麻烦：每次我们的 `Activity` 被暂停时，`GLSurfaceView` 的 Surface 将被销毁。当 `Activity` 再次恢复——并且调用了\
  \ `GLSurfaceView.onResume()`——时，`GLSurfaceView` 会实例化一个新的 OpenGL ES 渲染 Surface，并通过调用我们监听器的\
  \ `onSurfaceCreated()` 方法来通知我们这一点。如果没有一个问题，这一切都会很好：我们迄今为止设置的所有 OpenGL ES 状态都会丢失。这也包括纹理之类的东西，我们将不得不重新加载。这个问题被称为*上下文丢失*。*上下文*一词源于\
  \ OpenGL ES 为我们创建的每个 Surface 都关联了一个上下文，该上下文持有当前状态。当我们销毁那个 Surface 时，上下文也随之丢失。不过，这也没那么糟糕，只要我们恰当地设计游戏来处理这种上下文丢失。\n\
  \n**注意：** 实际上，EGL 负责上下文和 Surface 的创建与销毁。EGL 是 Khronos Group 的另一项标准；它定义了操作系统 UI 如何与\
  \ OpenGL ES 协同工作，以及操作系统如何授予 OpenGL ES 访问底层图形硬件的权限。这包括 Surface 创建和上下文管理。由于 `GLSurfaceView`\
  \ 为我们处理了所有 EGL 相关事宜，在几乎所有情况下我们都可以安全地忽略它。\n\n按照惯例，让我们编写一个小示例，该示例每帧会以随机颜色清除屏幕。代码清单\
  \ 7–1 展示了代码。\n\n**代码清单 7–1.** *GLSurfaceViewTest.java；疯狂清屏*\n\n```\npackage com.badlogic.androidgames.glbasics;\n\
  \nimport java.util.Random;\n```\n\n\n\n```java\nimport javax.microedition.khronos.egl.EGLConfig;\n\
  import javax.microedition.khronos.opengles.GL10;\nimport android.app.Activity;\n\
  import android.opengl.GLSurfaceView;\nimport android.opengl.GLSurfaceView.Renderer;\n\
  import android.os.Bundle;\nimport android.util.Log;\nimport android.view.Window;\n\
  import android.view.WindowManager;\n```\n\n```java\npublic class GLSurfaceViewTest\
  \ extends Activity {\n    GLSurfaceView glView;\n\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \            WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        glView = new\
  \ GLSurfaceView(this);\n        glView.setRenderer(new SimpleRenderer());\n    \
  \    setContentView(glView);\n    }\n```\n\n我们在类中保存了一个对`GLSurfaceView`实例的引用，作为其成员变量。在`onCreate()`方法中，我们将应用程序设置为全屏，创建了`GLSurfaceView`，设置了我们实现的`Renderer`，并将`GLSurfaceView`设为`Activity`的视图内容。\n\
  \n```java\n    @Override\n    public void onResume() {\n        super.onPause();\n\
  \        glView.onResume();\n    }\n\n    @Override\n    public void onPause() {\n\
  \        super.onPause();\n        glView.onPause();\n    }\n```\n\n在`onResume()`和`onPause()`方法中，我们调用了父类方法以及对应的`GLSurfaceView`方法。这些方法将启动和拆除`GLSurfaceView`的渲染线程，进而会在适当的时候触发我们实现的`Renderer`的回调方法。\n\
  \n```java\n    static class SimpleRenderer implements Renderer {\n        Random\
  \ rand = new Random();\n\n        @Override\n        public void onSurfaceCreated(GL10\
  \ gl, EGLConfig config) {\n            Log.d(\"GLSurfaceViewTest\", \"surface created\"\
  );\n        }\n\n        @Override\n        public void onSurfaceChanged(GL10 gl,\
  \ int width, int height) {\n            Log.d(\"GLSurfaceViewTest\", \"surface changed:\
  \ \" + width + \"x\"\n                    + height);\n        }\n\n        @Override\n\
  \        public void onDrawFrame(GL10 gl) {\n            gl.glClearColor(rand.nextFloat(),\
  \ rand.nextFloat(),\n                    rand.nextFloat(), 1);\n            gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n\
  \        }\n    }\n}\n```\n\n代码的最后部分是我们实现的`Renderer`。它只是在`onSurfaceCreated()`和`onSurfaceChanged()`方法中记录了一些日志信息。真正有趣的部分是`onDrawFrame()`方法。\n\
  \n如前所述，`GL10`实例让我们能够访问 OpenGL ES API。`GL10`中的`10`表示它提供了 OpenGL ES 1.0 标准中定义的所有函数。目前，我们对此可以满意了。该类中的所有方法都对应标准中定义的相应\
  \ C 函数。每个方法都以`gl`开头，这是 OpenGL ES 的古老传统。\n\n我们调用的第一个 OpenGL ES 方法是`glClearColor()`。你可能已经知道它的作用。它设置了当我们发出清除屏幕命令时要使用的颜色。OpenGL\
  \ ES 中的颜色几乎总是 RGBA 格式，每个分量的取值范围在 0 到 1 之间。虽然也有其他方式定义颜色（例如 RGB565），但目前我们暂用浮点数表示。我们可以只设置一次清除颜色，OpenGL\
  \ ES 会记住它。用`glClearColor()`设置的颜色是 OpenGL ES 的一个状态。\n\n下一个调用实际上是用我们刚刚指定的清除颜色来清屏。`glClear()`方法接受一个参数，用于指定要清除哪个缓冲区。OpenGL\
  \ ES 不仅拥有存储像素的帧缓冲区概念，还有其他类型的缓冲区。你将在第 10 章中了解它们，但目前我们只关心存储像素的帧缓冲区，OpenGL ES 称之为*颜色缓冲区*。为了告诉\
  \ OpenGL ES 我们要清除这个缓冲区，我们指定了常量`GL10.GL_COLOR_BUFFER_BIT`。\n\nOpenGL ES 有很多常量，它们都定义为`GL10`接口的静态公共成员。与方法一样，每个常量都以`GL_`为前缀。\n\
  \n以上就是我们的第一个 OpenGL ES 应用程序。我们就不展示令人印象深刻的截图了，因为你大概知道它是什么样子。\n\n**注意：** 切莫从其他线程调用\
  \ OpenGL ES！这是第一条也是最后一条戒律！原因在于 OpenGL ES 是为单线程环境设计的，并且不是线程安全的。虽然可以在多线程环境下勉强工作，但很多驱动程序会因此出现问题，而且这样做没有实际好处。\n\
  \n\n\n### GLGame：实现游戏接口\n\n在上一章中，我们实现了 `AndroidGame` 类，该类将音频、文件 I/O、图形和用户输入处理的所有子模块整合在一起。我们希望为即将开发的\
  \ 2D OpenGL ES 游戏复用其中的大部分代码，因此我们实现了一个名为 `GLGame` 的新类，它实现了我们之前定义的 `Game` 接口。\n\n\
  你首先会注意到，以你目前的 OpenGL ES 知识，不可能实现 `Graphics` 接口。这里有个惊喜：你不需要实现它。OpenGL 不太适合你的 `Graphics`\
  \ 接口的编程模型；相反，我们将实现一个新类 `GLGraphics`，它将跟踪我们从 `GLSurfaceView` 获取的 `GL10` 实例。清单 7–2\
  \ 展示了代码。\n\n**清单 7–2.** *GLGraphics.java；跟踪 GLSurfaceView 和 GL10 实例*\n\n`package\
