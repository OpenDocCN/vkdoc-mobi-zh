  \n接下来，我们遍历在构造函数中为每条最高分记录创建的五条字符串。我们使用 `drawText()` 方法绘制每一行。第一行从 (20,100) 开始；下一行在\
  \ (20,150) 处渲染，以此类推。我们只是将每行文本渲染的 y 坐标增加 50 像素，以便在行之间形成良好的垂直间距。最后，我们通过绘制按钮来完成此方法。\n\
