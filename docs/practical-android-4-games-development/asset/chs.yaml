  \ fps: 60\n01-02 21:04:02.666: DEBUG/FPSCounter(1676): fps: 60\nNexus One (2.2.1):\n\
  01-02 20:54:05.263: DEBUG/FPSCounter(1393): fps: 61\n01-02 20:54:06.273: DEBUG/FPSCounter(1393):\
