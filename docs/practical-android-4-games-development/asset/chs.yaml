  \n`present()` 方法在此阶段已无需过多解释。我们清除屏幕，通过摄像机设置投影矩阵，然后渲染背景和 UI 元素。由于 UI 元素具有透明背景，我们临时启用混合来渲染它们。背景不需要混合，因此我们不会启用它以节省一些\
  \ GPU 周期。再次注意，UI 元素在坐标系中渲染，该坐标系的原点位于屏幕左下角，y 轴向上。\n\n```\n    @Override\n    public\
  \ void pause() {\n        Settings.save(game.getFileIO());\n    }\n\n    @Override\n\
