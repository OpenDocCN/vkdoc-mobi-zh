  \npublic class GameScreen extends GLScreen {\n    static final int GAME_READY =\
  \ 0;\n    static final int GAME_RUNNING = 1;\n    static final int GAME_PAUSED =\
  \ 2;\n    static final int GAME_LEVEL_END = 3;\n    static final int GAME_OVER =\
  \ 4;\n\n    int state;\n    Camera2D guiCam;\n    Vector2 touchPoint;\n    SpriteBatcher\
  \ batcher;\n    World world;\n    WorldListener worldListener;\n    WorldRenderer\
  \ renderer;\n    Rectangle pauseBounds;\n    Rectangle resumeBounds;\n    Rectangle\
  \ quitBounds;\n    int lastScore;\n    String scoreString;\n```\n\n该类首先定义了几个常量，用于表示界面的五种状态。接着是成员变量。我们有一个用于渲染\
  \ UI 元素的摄像机，以及一个用于将触摸坐标转换为世界坐标的向量（与其他界面一样，转换到 320×480 单位的视锥体，即我们的目标分辨率）。接下来，我们有一个`SpriteBatcher`、一个`World`实例和一个`WorldListener`。`WorldRenderer`类我们稍后会详细说明，它基本上只是接收一个`World`对象并进行渲染。注意，它的构造函数将`SpriteBatcher`和`World`的引用作为参数。这意味着我们将使用同一个`SpriteBatcher`来渲染界面\
  \ UI 元素和游戏世界。其余成员是用于不同 UI 元素（如暂停子界面中的“继续”和“退出”菜单项）的`Rectangle`，以及两个用于跟踪当前分数的成员。我们希望在渲染分数时避免每帧都创建新字符串，从而减轻垃圾回收器的负担。\n\
  \n```\n    public GameScreen(Game game) {\n        super(game);\n        state =\
