  \                    return;\n                }\n            }\n        }\n    }\n\
  \n    @Override\n    public void present(float deltaTime) {\n        Graphics g\
  \ = game.getGraphics();\n        g.drawPixmap(Assets.background, 0, 0);\n      \
  \  g.drawPixmap(Assets.help1, 64, 100);\n        g.drawPixmap(Assets.buttons, 256,\
  \ 416, 0, 64, 64, 64);\n    }\n\n    @Override\n    public void pause() {\n    }\n\
  \n    @Override\n    public void resume() {\n    }\n\n    @Override\n    public\
  \ void dispose() {\n    }\n}\n```\n\n同样，非常简单。我们继承自 `Screen`，并实现了一个合适的构造器。接下来，是我们熟悉的\
  \ `update()` 方法，它只检查底部的按钮是否被按下。如果是，我们就播放点击音效并切换到 `HelpScreen2`。\n\n`present()` 方法会先渲染背景，然后是帮助图片和按钮。\n\
  \n`HelpScreen2` 和 `HelpScreen3` 类的代码看起来相同；唯一的区别是它们绘制的帮助图片以及要切换到的屏幕。我们可以同意不必查看它们的代码。接下来是高分屏幕！\n\
  \n### 高分屏幕\n\n高分屏幕简单地绘制存储在 `Settings` 类中的前五个最高分，加上一个告知玩家其正处于高分屏幕的精美标题，以及一个位于左下角的按钮，按下后切回主菜单。有趣的部分在于我们如何渲染高分。首先，让我们看看渲染图像的位置，如图\
  \ 6-4 所示。\n\n![images](img/0604.jpg)\n\n**图 6-4.** *无高分显示的高分屏幕。*\n\n这看起来和我们实现的其他屏幕一样简单。但是我们如何绘制动态分数呢？\n\
  \n#### 渲染数字：深入探讨\n\n我们有一个名为 `numbers.png` 的资源图片，其中包含从 0 到 9 的所有数字以及一个点。每个数字是 20×32\
  \ 像素，点是 10×32 像素。数字从左到右按升序排列。高分屏幕应显示五行，每行显示五个高分中的一个。这样的一行以高分的排名开头（例如，“1.” 或 “5.”），后跟一个空格，然后是实际分数。我们该如何做到这一点？\n\
  \n我们手头有两个工具：`numbers.png` 图像和 `Graphics.drawPixmap()`，它允许我们将图像的一部分绘制到屏幕上。假设我们想要默认高分的第一行（字符串“1.\
  \ 100”）渲染在 (20, 100) 处，使得数字 1 的左上角与该坐标重合。我们这样调用 `Graphics.drawPixmap()`：\n\n```\n\
  game.getGraphics().drawPixmap(Assets.numbers, 20, 100, 20, 0, 20, 32);\n```\n\n\
  我们知道数字 1 的宽度是 20 像素。我们字符串的下一个字符必须渲染在 (20+20, 100) 处。以字符串“1. 100”为例，这个字符是点，在 `numbers.png`\
  \ 图像中宽度为 10 像素：\n\n```\ngame.getGraphics().drawPixmap(Assets.numbers, 40, 100, 200,\
  \ 0, 10, 32);\n```\n\n字符串中的下一个字符需要渲染在 (20+20+10, 100) 处。这个字符是空格，我们不需要绘制它。我们只需要将\
  \ x 轴再向前推进 20 像素，因为我们假定这就是空格字符的宽度。因此，下一个字符 1 将渲染在 (20+20+10+20, 100) 处。看到规律了吗？\n\
  \n给定字符串中第一个字符的左上角坐标，我们可以遍历字符串的每个字符，绘制它，并根据刚刚绘制的字符，将下一个要绘制字符的 x 坐标增加 20 或 10 像素。\n\
  \n我们还需要根据当前字符，确定应该绘制 `numbers.png` 图像的哪一部分。为此，我们需要该部分左上角的 x 和 y 坐标，以及它的宽度和高度。y 坐标始终为零，这在查看图\
  \ 6-1 时应该很明显。高度也是一个常数，本例中是 32。宽度要么是 20 像素（如果字符串字符是数字），要么是 10 像素（如果是点）。我们唯一需要计算的是\
  \ `numbers.png` 图像中该部分的 x 坐标。我们可以使用下面这个巧妙的小技巧来做到这一点。\n\n字符串中的字符可以被解释为 Unicode 字符或\
  \ 16 位整数。这意味着我们实际上可以用这些字符代码进行运算。幸运的是，字符 0 到 9 具有递增的整数表示形式。我们可以像这样用这个来计算 `numbers.png`\
  \ 图像中数字部分的 x 坐标：\n\n```\nchar character = string.charAt(index);\nint x = (character\
  \ – '0') * 20;\n```\n\n这将为字符 0 得到 0，为字符 3 得到 3 × 20 = 60，依此类推。这正是每个数字部分的 x 坐标。当然，这对点字符不起作用，所以我们需要特殊处理。让我们将其总结为一个方法，给定行的字符串和渲染开始的\
  \ x 和 y 坐标，该方法可以渲染我们的一条高分行。\n\n```\npublic void drawText(Graphics g, String line,\
  \ int x, int y) {\n    int len = line.length();\n    for (int i = 0; i < len; i++)\
  \ {\n        char character = line.charAt(i);\n\n        if (character == ' ') {\n\
  \            x += 20;\n            continue;\n        }\n        int srcX = 0;\n\
  \        int srcWidth = 0;\n        if (character == '.') {\n            srcX =\
  \ 200;\n            srcWidth = 10;\n        } else {\n            srcX = (character\
  \ - '0') * 20;\n            srcWidth = 20;\n        }\n```\n\n\n\n`g.drawPixmap(Assets.numbers,\
  \ x, y, srcX, 0, srcWidth, 32);`\n`x += srcWidth;`\n`}`\n\n我们遍历字符串中的每个字符。如果当前字符是空格，我们只需将\
  \ x 坐标增加 20 像素。否则，我们计算当前字符在 `numbers.png` 图像中对应区域的 x 坐标和宽度。该字符要么是数字，要么是点号。然后我们渲染当前字符，并将渲染的\
  \ x 坐标向前移动我们刚刚绘制的字符的宽度。当然，如果我们的字符串包含空格、数字和点号以外的任何字符，此方法就会失效。你能想出一种方法，让它适用于任意字符串吗？\n\
  \n### 实现屏幕（Screen）\n\n借助这一新知识，我们现在可以轻松地实现 `HighscoreScreen` 类，如代码清单 6–7 所示。\n\n\
