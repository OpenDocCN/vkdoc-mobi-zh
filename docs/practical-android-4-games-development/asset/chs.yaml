  \ 通过调用其 `onResume()` 方法来启动渲染线程。我们还获取了 `WakeLock`。\n\n`    @Override`\n`public void\
  \ onSurfaceCreated(GL10 gl, EGLConfig config) {`\n`        glGraphics.setGL(gl);`\n\
  \n`synchronized(stateChanged) {`\n`if(state == GLGameState.Initialized)`\n`    \
  \            screen = getStartScreen();`\n`            state = GLGameState.Running;`\n\
  `            screen.resume();`\n`            startTime = System.nanoTime();`\n`\
  \        }        `\n`    }`\n\n`onSurfaceCreate()` 方法将在接下来被调用，它当然是在渲染线程上调用的。在这里，你可以看到状态枚举是如何使用的。如果应用程序是第一次启动，状态将是\
  \ `GLGameState.Initialized`。在这种情况下，我们调用 `getStartScreen()` 方法来返回游戏的起始界面。如果游戏未处于初始化状态，而是已经在运行，那么我们知道我们刚刚从暂停状态恢复。无论如何，我们将状态设置为\
  \ `GLGameState.Running`，并调用当前 `Screen` 的 `resume()` 方法。我们还跟踪当前时间，以便稍后计算增量时间。\n\n\
  同步是必要的，因为我们在同步块内操作的成员可能会在 UI 线程的 `onPause()` 方法中被操作。这是我们必须防止的事情，所以我们使用一个对象作为锁。我们也可以使用\
  \ `GLGame` 实例本身，或者一个合适的锁。\n\n`    @Override`\n`public void onSurfaceChanged(GL10\
  \ gl, int width, int height) {`\n`    }`\n\n`onSurfaceChanged()` 方法基本上只是一个存根。我们在这里不需要做任何事情。\n\
  \n\n\n```java\n@Override\npublic void onDrawFrame(GL10 gl) {\n    GLGameState state\
  \ = null;\n\n    synchronized(stateChanged) {\n        state = this.state;\n   \
  \ }\n\n    if(state == GLGameState.Running) {\n        float deltaTime = (System.nanoTime()\
  \ - startTime) / 1000000000.0f;\n        startTime = System.nanoTime();\n\n    \
  \    screen.update(deltaTime);\n        screen.present(deltaTime);\n    }\n\n  \
  \  if(state == GLGameState.Paused) {\n        screen.pause();            \n    \
  \    synchronized(stateChanged) {\n            this.state = GLGameState.Idle;\n\
  \            stateChanged.notifyAll();\n        }\n    }\n\n    if(state == GLGameState.Finished)\
  \ {\n        screen.pause();\n        screen.dispose();\n        synchronized(stateChanged)\
  \ {\n            this.state = GLGameState.Idle;\n            stateChanged.notifyAll();\n\
  \        }            \n    }\n}\n```\n\n`onDrawFrame()`方法执行了绝大部分工作。它由渲染线程尽可能频繁地调用。在这里，我们检查游戏所处的状态并做出相应反应。由于状态可能由\
  \ UI 线程在`onPause()`方法中设置，因此我们必须同步对其的访问。\n\n如果游戏正在运行，我们计算时间差(`delta time`)，并通知当前的`Screen`进行更新和呈现。\n\
  \n如果游戏暂停，我们通知当前的`Screen`也进行暂停。然后我们将状态更改为`GLGameState.Idle`，表示我们已收到来自 UI 线程的暂停请求。由于我们在\
  \ UI 线程的`onPause()`方法中等待此事件发生，因此我们通知 UI 线程，它现在可以真正暂停应用程序。此通知是必要的，因为我们必须确保在 UI 线程上`Activity`被暂停或关闭时，渲染线程能够正确地暂停/关闭。\n\
  \n如果`Activity`正在被关闭（而非暂停），则我们响应`GLGameState.Finished`状态。在这种情况下，我们通知当前的`Screen`暂停并释放自身，然后向\
  \ UI 线程发送另一个通知，UI 线程等待渲染线程完成资源清理。\n\n```java\n@Override\npublic void onPause() {\n\
  \    synchronized(stateChanged) {\n        if(isFinishing())            \n     \
  \       state = GLGameState.Finished;\n        else\n            state = GLGameState.Paused;\n\
  \        while(true) {\n            try {\n                stateChanged.wait();\n\
  \                break;\n            } catch(InterruptedException e) {\n       \
  \     }\n        }\n    }\n    wakeLock.release();\n    glView.onPause();  \n  \
  \  super.onPause();\n}  \n```\n\n`onPause()`方法是我们通常的`Activity`通知方法，当`Activity`被暂停时，它会在\
  \ UI 线程上被调用。根据应用程序是被关闭还是暂停，我们相应地设置状态，并等待渲染线程处理新状态。这是通过标准的 Java 等待/通知机制实现的。\n\n最后，我们释放`WakeLock`，并通知`GLSurfaceView`和`Activity`暂停自身，从而有效地关闭渲染线程并销毁\
  \ OpenGL ES 表面，这触发了之前提到的令人头疼的 OpenGL ES 上下文丢失问题。\n\n```java\npublic GLGraphics getGLGraphics()\
  \ {\n    return glGraphics;\n}  \n```\n\n`getGLGraphics()`方法是一个新方法，只能通过`GLGame`类访问。它返回我们存储的`GLGraphics`实例，以便以后在`Screen`实现中能够访问`GL10`接口。\n\
  \n```java\n@Override\npublic Input getInput() {\n    return input;\n}\n\n@Override\n\
  public FileIO getFileIO() {\n    return fileIO;\n}\n\n@Override\npublic Graphics\
  \ getGraphics() {\n    throw new IllegalStateException(\"We are using OpenGL!\"\
  );\n}\n\n@Override\npublic Audio getAudio() {\n    return audio;\n}\n\n@Override\n\
  public void setScreen(Screen screen) {\n    if(screen == null)\n        throw new\
  \ IllegalArgumentException(\"Screen must not be null\");\n\n    this.screen.pause();\n\
  \    this.screen.dispose();\n    screen.resume();\n    screen.update(0);\n    this.screen\
  \ = screen;\n}\n\n@Override\npublic Screen getCurrentScreen() {\n    return screen;\n\
  }\n```\n\n该类的其余部分工作方式与之前相同。如果我们意外地尝试访问标准的`Graphics`实例，我们会抛出一个异常，因为`GLGame`不支持它。相反，我们将通过`GLGame.getGLGraphics()`方法获取`GLGraphics`对象。\n\
  \n为什么我们要经历与渲染线程同步的所有麻烦？这是因为这将使我们的`Screen`实现完全在渲染线程上运行。`Screen`的所有方法都将在那里执行，如果我们想要访问\
  \ OpenGL ES 功能，这是必需的。记住，我们只能在渲染线程上访问 OpenGL ES。\n\n让我们用一个例子来总结一下。清单 7–4 展示了本章第一个示例在使用`GLGame`和`Screen`时的样子。\n\
