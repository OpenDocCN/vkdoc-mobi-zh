  \ `TextureAtlasTest`，它和当前示例相同——唯一的区别是它使用旧的 `BobTest` 方法进行渲染。结果如下：\n\n```\nHero (1.5):\n\
  12-27 23:53:45.950: DEBUG/FPSCounter(2303): fps: 46\n12-27 23:53:46.720: DEBUG/dalvikvm(2303):\
  \ GC freed 21811 objects / 524280 bytes in 135ms\n12-27 23:53:46.970: DEBUG/FPSCounter(2303):\
  \ fps: 40\n12-27 23:53:47.980: DEBUG/FPSCounter(2303): fps: 46\n12-27 23:53:48.990:\
  \ DEBUG/FPSCounter(2303): fps: 46\n\nDroid (2.1.1):\n12-28 00:03:13.004: DEBUG/FPSCounter(8277):\
  \ fps: 52\n12-28 00:03:14.004: DEBUG/FPSCounter(8277): fps: 52\n12-28 00:03:15.027:\
