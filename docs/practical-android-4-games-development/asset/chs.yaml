  \ GL10.GL_ONE_MINUS_SRC_ALPHA);\n        \n        batcher.beginBatch(Assets.items);\n\
  \        batcher.drawSprite(240, 240, 384, 128, Assets.logoRegion);\n        batcher.drawSprite(240,\
  \ 100, 224, 64, Assets.menuRegion);\n        batcher.endBatch();\n        \n   \
  \     gl.glDisable(GL10.GL_BLEND);\n        gl.glDisable(GL10.GL_TEXTURE_2D);\n\
  \    }\n```\n\n`present()` 方法与在**超级跳跃**的大多数界面中所做的操作相同。清屏并通过摄像头设置投影矩阵。启用纹理，然后立即通过\
  \ `SpriteBatcher` 和 `Assets` 类中定义的 `TextureRegion` 渲染背景。菜单项包含半透明区域，因此在渲染它们之前需要启用混合。\n\
  \n```java\n    @Override\n    public void pause() {\n    }\n    \n    @Override\n\
  \    public void resume() {\n    }\n    \n    @Override\n    public void dispose()\
  \ {\n    }\n}\n```\n\n类的其余部分由不执行任何操作的样板方法组成。`Texture` 的重新加载在 `DroidInvaders` 活动中完成，因此在\
  \ `MainMenuScreen` 中没有其他需要处理的事情。\n\n\n\n### 设置界面\n\n设置界面让玩家能够更改输入方式，以及开启或关闭音频。用三个不同的图标来表示这一功能（参见图\
  \ 12–4）。触摸“手形”或“倾斜设备”图标即可启用对应的输入方式。当前启用的输入方式图标会呈现金色。音频图标的处理方式与之前的游戏相同。\n\n用户的选择通过设置`Settings`类中的相应布尔值来体现。务必确保每次设置发生更改时，都通过调用`Settings.save()`方法立即将这些设置保存到\
  \ SD 卡。代码清单 12–5 展示了具体代码。\n\n**代码清单 12–5.** *SettingsScreen.java，设置界面*\n\n```\n\
