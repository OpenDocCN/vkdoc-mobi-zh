  \ Mr. Nom 游戏缺失的最后一部分：游戏屏幕。\n\n### 抽象化……\n\n到目前为止，我们只实现了一些无聊的 UI 相关代码以及一些用于资源和设置的维护代码。现在，我们将对\
  \ Mr. Nom 的世界及其中的所有对象进行抽象。我们还将让 Mr. Nom 摆脱屏幕分辨率的束缚，让他在自己的小世界里，使用自己的小坐标系生活。\n\n\n\
  \n#### 抽象化「Nom 先生」的世界：模型、视图、控制器\n\n如果你是一位资深程序员，很可能听说过设计模式。大致而言，它们是针对特定场景设计代码的策略。有些偏学术理论，有些则在现实世界中有所应用。对于游戏开发，我们可以从*模型-视图-控制器（MVC）*设计模式中借鉴一些思路。这种模式常被数据库和\
  \ Web 领域用来分离数据模型、表现层和数据操作层。我们不会严格遵循这种设计模式，而是以更简化的形式进行适配。\n\n那么这对「Nom 先生」意味着什么呢？首先，我们需要对游戏世界进行抽象化表示，它独立于任何位图、音效、帧缓冲或输入事件。取而代之，我们将用面向对象的方式，通过几个简单的类来建模「Nom\
  \ 先生」的世界。我们会为世界中的污渍创建一个类，也为「Nom 先生」本身创建一个类。「Nom 先生」由头部和尾部组成，我们也将用一个单独的类来表示它们。为了将所有内容整合在一起，我们将设计一个全知类来表示「Nom\
  \ 先生」的完整世界，包括污渍和「Nom 先生」本身。所有这些构成了 MVC 中的*模型*部分。\n\nMVC 中的*视图*则是负责渲染「Nom 先生」世界的代码。我们会有一个类或方法，它接收世界类，读取其当前状态，并将其渲染到屏幕上。*如何*渲染与模型类无关，这是从\
  \ MVC 中学到的最重要一课。模型类独立于一切，而视图类和方法则依赖于模型类。\n\n最后，我们来看 MVC 中的*控制器*。它根据用户输入或时间流逝等因素，指挥模型类改变其状态。模型类为控制器提供方法（例如，通过\"\
  将「Nom 先生」转向左\"这样的指令），控制器随后可用这些方法来修改模型的状态。模型类中不包含任何直接访问触摸屏或加速度计等设备的代码。这样，我们就能让模型类摆脱所有外部依赖。\n\
  \n这听起来可能有些复杂，你或许会问我们为什么要这样做。但这种方法有很多好处。我们可以在不了解图形、音频或输入设备的情况下实现所有游戏逻辑。可以在不修改模型类本身的情况下，调整游戏世界的渲染方式。甚至可以将\
  \ 2D 世界渲染器替换为 3D 世界渲染器。通过使用控制器，我们可以轻松添加对新输入设备的支持——它所做的只是将输入事件转换为对模型类的方法调用。想通过加速度计控制「Nom\
  \ 先生」？没问题——在控制器中读取加速度计数值，然后将其转换为对「Nom 先生」模型的\"将「Nom 先生」转向左\"或\"将「Nom 先生」转向右\"方法调用。想支持\
  \ Zeemote 手柄？没问题，和加速度计的情况一样处理即可！使用控制器最大的好处是：我们无需修改「Nom 先生」的任何一行代码就能实现这一切。\n\n让我们从定义「Nom\
  \ 先生」的世界开始。为此，我们将稍微偏离严格的 MVC 模式，利用图形资源来说明基本概念。这也有助于我们稍后实现视图组件（将「Nom 先生」的抽象世界渲染为像素）。\n\
  \n图 6-5 展示了游戏画面，其上以网格形式叠加了「Nom 先生」的世界。\n\n![images](img/0605.jpg)\n\n**图 6-5.**\
  \ *叠加在游戏画面上的「Nom 先生」世界*\n\n请注意，「Nom 先生」的世界被限定在 10×13 个单元格的网格中。我们使用坐标系来定位单元格，原点位于左上角(0,\
  \ 0)，延伸至右下角(9, 12)。「Nom 先生」的任何部分都必须位于这些单元格中，因此其 x 和 y 坐标必须是在这个世界范围内的整数。世界中的污渍也是如此。「Nom\
  \ 先生」的每个部分恰好占据 1×1 单位的单元格。注意，单位类型无关紧要——这是我们自己的幻想世界，不受国际单位制或像素的束缚！\n\n「Nom 先生」不能离开这个小世界。如果他从边界穿出，就会从另一端出现，他的所有身体部分也会随之而来。（顺便说一句，地球上也存在同样的问题——朝任何方向走得足够远，你都会回到起点）。「Nom\
  \ 先生」只能逐格移动。他所有部分始终位于整数坐标上。例如，他绝不会占据两个半单元格。\n\n**注意：** 如前所述，我们这里使用的并非严格的 MVC 模式。如果你对\
  \ MVC 模式的正确定义感兴趣，建议阅读 Erich Gamma、Richard Helm、Ralph Johnson 和 John M. Vlissides（即\"\
  四人帮\"）合著的《设计模式：可复用面向对象软件的基础》（Addison-Wesley, 1994）。在这本书中，MVC 模式被称为观察者模式。\n\n###\
  \ 污渍类\n\n「Nom 先生」世界中最简单的对象是污渍。它只是呆在世界的一个单元格中，等待被吃掉。在设计「Nom 先生」时，我们为污渍创建了三种不同的视觉表现。污渍的类型在「Nom\
  \ 先生」的世界中并无区别，但我们还是会将其包含在`Stain`类中。代码清单 6-8 展示了`Stain`类。\n\n**代码清单 6-8.** *Stain.java*\n\
  \n```\npackage com.badlogic.androidgames.mrnom;\n\npublic class Stain {\n    public\
  \ static final int TYPE_1 = 0;\n    public static final int TYPE_2 = 1;\n    public\
  \ static final int TYPE_3 = 2;\n    public int x, y;\n    public int type;\n\n \
  \   public Stain(int x, int y, int type) {\n        this.x = x;\n        this.y\
  \ = y;\n        this.type = type;\n    }\n}\n```\n\n`Stain`类定义了三个公共静态常量，用于编码污渍的类型。每个`Stain`对象有三个成员：在「Nom\
  \ 先生」世界中的 x 坐标、y 坐标，以及类型（类型是之前定义的常量之一）。为了使代码简洁，我们没有按照常见做法添加 getter 和 setter 方法。最后，我们用一个便捷的构造函数来结束这个类，以便轻松实例化`Stain`对象。\n\
  \n值得注意的是，这个类与图形、音效或其他类没有任何关联。`Stain`类独立存在，骄傲地编码了「Nom 先生」世界中污渍的属性。\n\n\n\n### `Snake`\
  \ 和 `SnakePart` 类\n\nMr. Nom 就像一条移动的链条，由互相连接的部分组成，当我们选中其中一个部分并将其拖动到某处时，其他部分也会随之移动。每个部分占据\
  \ Mr. Nom 世界中的一个单元格，就像污点一样。在我们的模型中，我们不区分头部和尾部，因此可以用一个类来表示 Mr. Nom 的这两种部分。清单 6–9\
  \ 展示了 `SnakePart` 类，它用于定义 Mr. Nom 的这两个部分。\n\n**清单 6–9.** *SnakePart.java*\n\n```java\n\
  package com.badlogic.androidgames.mrnom;\n\npublic class SnakePart {\n    public\
  \ int x, y;\n\n    public SnakePart(int x, int y) {\n        this.x = x;\n     \
  \   this.y = y;\n    }\n}\n```\n\n这与 `Stain` 类本质上相同——只是去掉了 `type` 成员。在 Mr. Nom 世界模型中，第一个真正有趣的类是\
  \ `Snake` 类。我们来思考一下它必须具备哪些能力：\n\n- 它必须存储头部和尾部。\n- 它必须知道 Mr. Nom 当前的前进方向。\n- 当 Mr.\
  \ Nom 吃掉一个污点时，它必须能够长出一个新的尾部。\n- 它必须能够沿着当前方向移动一个单元格。\n\n第一点和第二点很容易实现。我们只需要一个 `SnakePart`\
  \ 实例的列表——列表中的第一个部分是头部，其余部分构成尾部。Mr. Nom 可以向上、向下、向左、向右移动。我们可以用一些常量来编码这些方向，并将当前方向存储在\
  \ `Snake` 类的一个成员中。\n\n第三点也不算复杂。我们只需在已有的部分列表中再添加一个 `SnakePart`。问题在于应该把这个部分添加到什么位置？答案可能听起来有些出人意料：我们将它放在与列表中最后一个部分相同的位置。当我们研究如何实现前文列表中的最后一点（即移动\
  \ Mr. Nom）时，这样做的原因就会变得更加清晰。\n\n图 6–6 展示了 Mr. Nom 的初始配置。它由三个部分组成：位于 (5, 6) 的头部，以及位于\
  \ (5, 7) 和 (5, 8) 的两个尾部。\n\n![images](img/0606.jpg)\n\n**图 6–6.** *Mr. Nom 的初始配置。*\n\
  \n列表中的部分是有序的，从头部开始，到最后一个尾部结束。当 Mr. Nom 前进一个单元格时，其头部后面的所有部分都必须跟随。然而，Mr. Nom 的部分可能并非像图\
  \ 6–6 那样排列成一条直线，因此仅仅将所有部分朝着 Mr. Nom 前进的方向平移是不够的。我们必须采用更精细的方法。\n\n尽管听起来可能有些反直觉，但我们需要从列表中的最后一个部分开始。我们将其移动到前一个部分的位置，并对列表中除头部外的所有其他部分重复此操作，因为头部之前没有部分。对于头部，我们检查\
  \ Mr. Nom 当前的前进方向，并相应地修改头部的位置。图 6–7 以一个更复杂的 Mr. Nom 配置说明了这一点。\n\n![images](img/0607.jpg)\n\
  \n**图 6–7.** *Mr. Nom 前进并带动其尾部。*\n\n这种移动策略与我们的“吃”策略配合得很好。当我们为 Mr. Nom 添加一个新部分时，下次\
  \ Mr. Nom 移动时，它将停留在前一个部分的位置。另外，请注意，如果 Mr. Nom 越过世界边缘，这种方法将使我们能够轻松地实现 Mr. Nom 绕到世界的另一边。我们只需相应地设置头部的位置，其余部分会自动完成。\n\
  \n有了这些信息，我们现在可以实现代表 Mr. Nom 的 `Snake` 类。清单 6–10 展示了代码。\n\n**清单 6–10.** *Snake.java；Mr.\
  \ Nom 的代码实现*\n\n```java\npackage com.badlogic.androidgames.mrnom;\n\nimport java.util.ArrayList;\n\
  import java.util.List;\n\npublic class Snake {\n    public static final int UP =\
  \ 0;\n    public static final int LEFT = 1;\n    public static final int DOWN =\
  \ 2;\n    public static final int RIGHT = 3;\n\n    public List<SnakePart> parts\
  \ = new ArrayList<SnakePart>();\n    public int direction;\n```\n\n我们首先定义了一组常量，用于编码\
  \ Mr. Nom 的方向。请记住，Mr. Nom 只能左右转弯，因此定义常量值的方式至关重要。这将使我们以后能够通过将当前方向常量递增或递减 1，轻松地将其旋转正负\
  \ 90 度。\n\n接下来，我们定义一个名为 `parts` 的列表，用于存放 Mr. Nom 的所有部分。该列表中的第一项是头部，其他项是尾部。`Snake`\
  \ 类的第二个成员存储了 Mr. Nom 当前的前进方向。\n\n```java\n    public Snake() {\n        direction\
  \ = UP;\n        parts.add(new SnakePart(5, 6));\n        parts.add(new SnakePart(5,\
  \ 7));\n        parts.add(new SnakePart(5, 8));\n    }\n```\n\n在构造函数中，我们将 Mr. Nom\
  \ 设置为由头部和两个额外的尾部组成，位置大致位于世界中央，如前面图 6–6 所示。我们还将方向设置为 `Snake.UP`，这样下次要求 Mr. Nom 前进时，它将向上移动一个单元格。\n\
  \n```java\n    public void turnLeft() {\n        direction += 1;\n        if (direction\
  \ > RIGHT)\n            direction = UP;\n    }\n\n    public void turnRight() {\n\
  \        direction -= 1;\n        if (direction < UP)\n            direction = RIGHT;\n\
  \    }\n```\n\n`turnLeft()` 和 `turnRight()` 方法仅修改 `Snake` 类的方向成员。左转时，我们将其加一；右转时，我们将其减一。我们还必须确保，如果方向值超出我们之前定义的常量范围，Mr.\
  \ Nom 的方向能够正确循环。\n\n```java\n    public void eat() {\n        SnakePart end = parts.get(parts.size()-1);\n\
  \        parts.add(new SnakePart(end.x, end.y));\n    }\n```\n\n接下来是 `eat()` 方法。它所做的只是在列表末尾添加一个新的\
  \ `SnakePart`。这个新部分将与当前末尾部分具有相同的位置。正如前面讨论的那样，下次 Mr. Nom 前进时，这两个重叠的部分将分开。\n\n```java\n\
  \    public void advance() {\n        SnakePart head = parts.get(0);\n\n       \
  \ int len = parts.size() - 1;\n        for (int i = len; i > 0; i--) {\n       \
  \     SnakePart before = parts.get(i-1);\n            SnakePart part = parts.get(i);\n\
  \            part.x = before.x;\n            part.y = before.y;\n        }\n\n \
  \       if (direction == UP)\n            head.y -= 1;\n        if (direction ==\
  \ LEFT)\n            head.x -= 1;\n        if (direction == DOWN)\n            head.y\
  \ += 1;\n        if (direction == RIGHT)\n            head.x += 1;\n\n        if\
  \ (head.x < 0)\n            head.x = 9;\n        if (head.x > 9)\n            head.x\
  \ = 0;\n        if (head.y < 0)\n            head.y = 12;\n        if (head.y >\
  \ 12)\n            head.y = 0;\n    }\n```\n\n下一个方法 `advance()` 实现了图 6–7 所示的逻辑。首先，我们从最后一个部分开始，将每个部分移动到前一个部分的位置。我们将头部排除在此机制之外。然后，根据\
  \ Mr. Nom 的当前方向移动头部。最后，我们执行一些检查，以确保 Mr. Nom 不会跑到他的世界外面。如果发生这种情况，我们只需让他绕回，使他从世界的另一边出现。\n\
  \n\n\n`public boolean checkBitten() {`  \n`    int len = parts.size();`  \n`   \
  \ SnakePart head = parts.get(0);`  \n`    for (int i = 1; i < len; i++) {`  \n`\
  \        SnakePart part = parts.get(i);`  \n`        if (part.x == head.x && part.y\
  \ == head.y)`  \n`            return true;`  \n`    }`  \n`    return false;`  \n\
  `}`\n\n最后一个方法`checkBitten()`是一个辅助方法，用于检查 Mr. Nom 是否咬到了自己的尾巴。它所做的就是检查是否有任何尾部部分与头部处于同一位置。如果是这种情况，Mr.\
  \ Nom 将会死亡，游戏结束。\n\n### World 类\n\n我们的模型类中的最后一个叫做`World`。`World`类有几个任务需要完成：\n\n\
  - 跟踪 Mr. Nom（以`Snake`实例的形式），以及落在`World`上的`Stain`。在我们的世界中，永远只会有一个污渍。\n- 提供一个方法，该方法将基于时间更新\
  \ Mr. Nom（例如，他应该每 0.5 秒前进一个单元格）。这个方法还会检查 Mr. Nom 是否吃到了污渍或者咬到了自己。\n- 跟踪得分；这基本上就是到目前为止吃掉的污渍数量乘以\
  \ 10。\n- 在 Mr. Nom 每吃掉十个污渍后增加他的速度。这将使游戏更具挑战性。\n- 跟踪 Mr. Nom 是否还活着。我们稍后会用它来判断游戏是否结束。\n\
  - 在 Mr. Nom 吃掉当前污渍后创建一个新的污渍（这是一个微妙但重要且异常复杂的任务）。\n\n在这个任务列表中，只有两项我们还没有讨论过：基于时间的方式更新世界以及放置新的污渍。\n\
  \n#### 基于时间的 Mr. Nom 运动\n\n在第 3 章中，我们讨论了基于时间的运动。这基本上意味着我们定义所有游戏对象的速度，测量自上次更新以来经过的时间（也称为\
  \ delta 时间），并通过将速度乘以 delta 时间来推进对象。在第 3 章给出的示例中，我们使用了浮点值来实现这一点。然而，Mr. Nom 的部分具有整数位置，因此我们需要弄清楚如何在这种情况下推进对象。\n\
  \n我们首先定义 Mr. Nom 的速度。Mr. Nom 的世界是有时间的，我们以秒为单位测量时间。最初，Mr. Nom 应该每 0.5 秒前进一个单元格。我们需要做的就是跟踪自上次推进\
  \ Mr. Nom 以来经过了多少时间。如果累计时间超过了我们的 0.5 秒阈值，我们就调用`Snake.advance()`方法并重置时间累加器。这些 delta\
  \ 时间从哪里来？还记得`Screen.update()`方法吗？它获取帧 delta 时间。我们只需将其传递给`World`类的更新方法，该方法会进行累加。为了使游戏更具挑战性，每次\
  \ Mr. Nom 再吃掉十个污渍，我们就会将该阈值减少 0.05 秒。当然，我们必须确保阈值不会达到 0，否则 Mr. Nom 将以无限速度移动——爱因斯坦对此可不会友好。\n\
  \n#### 放置污渍\n\n我们必须解决的第二个问题是，当 Mr. Nom 吃掉当前污渍时，如何放置一个新的污渍。它应该出现在世界中的一个随机单元格中。所以我们可以直接实例化一个带有随机位置的`Stain`，对吗？遗憾的是，事情没那么简单。\n\
  \n想象一下 Mr. Nom 占据了相当多的单元格。污渍被放置在 Mr. Nom 已经占据的单元格中的概率是相当大的，并且随着 Mr. Nom 变得越来越大，这个概率还会增加。因此，我们必须找到一个当前未被\
  \ Mr. Nom 占据的单元格。这又很简单了，对吧？只需遍历所有单元格，并使用第一个未被 Mr. Nom 占据的单元格。\n\n同样，这有点不理想。如果我们从同一个位置开始搜索，污渍就不会被随机放置。相反，我们将从世界中的一个随机位置开始，扫描所有单元格直到到达世界的末尾，然后，如果我们还没有找到空闲单元格，再扫描起始位置以上的所有单元格。\n\
  \n我们如何检查一个单元格是否空闲？最天真的解决方案是遍历所有单元格，获取每个单元格的 x 和 y 坐标，然后针对这些坐标检查 Mr. Nom 的所有部分。我们有\
  \ 10 × 13 = 130 个单元格，而 Mr. Nom 最多可以占据 55 个单元格。那将是 130 × 55 = 7,150 次检查！诚然，大多数设备都能处理，但我们可以做得更好。\n\
  \n我们将创建一个二维布尔数组，其中每个数组元素代表世界中的一个单元格。当我们必须放置一个新的污渍时，我们首先遍历 Mr. Nom 的所有部分，并将数组中那些被部分占据的元素设置为`true`。然后我们只需选择一个随机位置开始扫描，直到找到一个空闲单元格，我们可以在其中放置新的污渍。由于\
  \ Mr. Nom 由 55 个部分组成，这需要 130 + 55 = 185 次检查。好多了！\n\n#### 判断游戏何时结束\n\n还有一件事我们必须考虑：如果所有单元格都被\
  \ Mr. Nom 占据了怎么办？在这种情况下，游戏就结束了，因为 Mr. Nom 将正式成为整个世界。考虑到每吃一个污渍我们加 10 分，理论上可达到的最高分数是`((10\
  \ × 13) - 3) × 10 = 1,270`分（记住，Mr. Nom 一开始有三个部分）。\n\n\n\n### 实现世界类\n\n呼，我们有很多东西要实现，那就开始吧。代码清单\
  \ 6–11 展示了 `World` 类的代码。\n\n**代码清单 6–11.** *World.java*\n\n```\npackage com.badlogic.androidgames.mrnom;\n\
  \nimport java.util.Random;\n\npublic class World {\n    static final int WORLD_WIDTH\
  \ = 10;\n    static final int WORLD_HEIGHT = 13;\n    static final int SCORE_INCREMENT\
  \ = 10;\n    static final float TICK_INITIAL = 0.5f;\n    static final float TICK_DECREMENT\
  \ = 0.05f;\n\n    public Snake snake;\n    public Stain stain;\n    public boolean\
  \ gameOver = false;\n    public int score = 0;\n\n    boolean fields[][] = new boolean[WORLD_WIDTH][WORLD_HEIGHT];\n\
  \    Random random = new Random();\n    float tickTime = 0;\n    static float tick\
  \ = TICK_INITIAL;\n```\n\n和往常一样，我们首先定义一些常量——这里包括世界的宽度和高度（以单元格为单位）、Mr. Nom 每次吃掉污渍时增加的分值、用于推动\
  \ Mr. Nom 前进的初始时间间隔（称为*嘀嗒*），以及每当 Mr. Nom 吃掉十个污渍后我们缩短嘀嗒间隔的数值（以略微加快游戏速度）。\n\n接下来，我们有一些公有成员：一个\
  \ `Snake` 实例、一个 `Stain` 实例、一个存储游戏是否结束的布尔值以及当前得分。\n\n我们还定义了另外四个包私有成员：一个二维数组，用于放置新污渍；一个\
  \ `Random` 类实例，用于生成随机数来放置污渍并决定其类型；时间累加器变量 `tickTime`，用来累加每帧的增量时间；以及当前嘀嗒的持续时间，它定义了\
  \ Mr. Nom 前进的频率。\n\n```\n    public World() {\n        snake = new Snake();\n  \
  \      placeStain();\n    }\n```\n\n在构造函数中，我们创建了 `Snake` 类的一个实例，它将具有如图 6–6 所示的初始配置。我们还会通过\
  \ `placeStain()` 方法放置第一个随机污渍。\n\n```\n    private void placeStain() {\n        for\
  \ (int x = 0; x < WORLD_WIDTH; x++) {\n            for (int y = 0; y < WORLD_HEIGHT;\
  \ y++) {\n                fields[x][y] = false;\n            }\n        }\n\n  \
  \      int len = snake.parts.size();\n        for (int i = 0; i < len; i++) {\n\
  \            SnakePart part = snake.parts.get(i);\n            fields[part.x][part.y]\
  \ = true;\n        }\n\n        int stainX = random.nextInt(WORLD_WIDTH);\n    \
  \    int stainY = random.nextInt(WORLD_HEIGHT);\n        while (true) {\n      \
  \      if (fields[stainX][stainY] == false)\n                break;\n          \
  \  stainX += 1;\n            if (stainX >= WORLD_WIDTH) {\n                stainX\
  \ = 0;\n                stainY += 1;\n                if (stainY >= WORLD_HEIGHT)\
  \ {\n                    stainY = 0;\n                }\n            }\n       \
  \ }\n        stain = new Stain(stainX, stainY, random.nextInt(3));\n    }\n```\n\
  \n`placeStain()` 方法实现了前面讨论的放置策略。我们首先清除单元格数组。接着，将所有被蛇身体占据的单元格设置为 `true`。最后，我们扫描数组，从一个随机位置开始寻找空闲单元格。一旦找到空闲单元格，我们就创建一个随机类型的污渍。注意，如果所有单元格都被\
  \ Mr. Nom 占据，那么循环将永远不会终止。我们会在下一个方法中确保这种情况永远不会发生。\n\n```\n    public void update(float\
  \ deltaTime) {\n        if (gameOver)\n            return;\n\n        tickTime +=\
  \ deltaTime;\n\n        while (tickTime > tick) {\n            tickTime -= tick;\n\
  \            snake.advance();\n            if (snake.checkBitten()) {\n        \
  \        gameOver = true;\n                return;\n            }\n\n          \
  \  SnakePart head = snake.parts.get(0);\n            if (head.x == stain.x && head.y\
  \ == stain.y) {\n                score += SCORE_INCREMENT;\n                snake.eat();\n\
  \                if (snake.parts.size() == WORLD_WIDTH * WORLD_HEIGHT) {\n     \
  \               gameOver = true;\n                    return;\n                }\
  \ else {\n                    placeStain();\n                }\n\n             \
  \   if (score % 100 == 0 && tick - TICK_DECREMENT > 0) {\n                    tick\
  \ -= TICK_DECREMENT;\n                }\n            }\n        }\n    }\n}\n```\n\
  \n`update()` 方法负责根据传入的增量时间更新 `World` 及其中的所有对象。游戏屏幕的每一帧都会调用此方法，从而持续更新世界的状态。我们首先检查游戏是否结束。如果是，则无需更新任何内容。接着，我们将增量时间累加到累加器中。`while`\
  \ 循环会消耗所有累积的嘀嗒次数（例如，当 `tickTime` 为 1.2 且一个嘀嗒应持续 0.5 秒时，我们可以更新世界两次，累加器中剩余 0.2 秒）。这被称为*固定时间步长模拟*。\n\
  \n在每次迭代中，我们首先从累加器中减去嘀嗒间隔。然后，让 Mr. Nom 前进。我们检查他是否咬到了自己，如果是，则设置游戏结束标志。最后，我们检查 Mr.\
  \ Nom 的头部是否与污渍位于同一单元格。如果是，则增加得分并让 Mr. Nom 生长。接着，检查 Mr. Nom 的身体部分数量是否等于世界中的单元格总数。如果是，则游戏结束并从函数返回。否则，我们通过\
  \ `placeStain()` 方法放置一个新污渍。最后要做的事情是检查 Mr. Nom 是否刚刚又吃掉了十个污渍。如果是，且我们的阈值仍大于零，则将其减少\
  \ 0.05 秒。嘀嗒间隔会更短，从而让 Mr. Nom 移动得更快。\n\n至此，我们的模型类集合就完成了。最后需要实现的是游戏屏幕！\n\n\n\n###\
  \ `GameScreen` 类\n\n现在只剩下最后一个屏幕需要实现了。让我们看看这个屏幕的功能：\n\n- 正如第 3 章 Mr. Nom 的设计中所定义的，游戏屏幕可以处于四种状态之一：等待用户确认准备就绪、游戏运行中、暂停等待状态，以及游戏结束等待用户点击按钮的状态。\n\
  \    - 在准备状态下，我们只需提示用户触摸屏幕以开始游戏。\n    - 在运行状态下，我们会更新游戏世界、渲染画面，并在玩家按下屏幕底部的左转或右转按钮时，控制\
  \ Mr. Nom 进行相应转向。\n    - 在暂停状态下，我们仅显示两个选项：一个是继续游戏，另一个是退出游戏。\n    - 在游戏结束状态下，我们告知用户游戏已结束，并提供返回主菜单的触摸按钮。\n\
  - 对于每种状态，我们都需要实现不同的 `update` 和 `present` 方法，因为每种状态执行不同的操作并显示不同的用户界面。\n- 游戏结束后，如果玩家取得了高分，我们必须确保存储该分数。\n\
  \n这涉及相当多的职责，因此代码量会比平时更多。为此，我们将对该类的源代码清单进行拆分。在深入代码之前，我们先规划一下如何在每种状态下安排不同的 UI 元素。图\
  \ 6–8 展示了这四种状态。\n\n![images](img/0608.jpg)\n\n**图 6-8.** *游戏屏幕的四种状态：准备、运行、暂停和游戏结束。*\n\
  \n请注意，我们还会在屏幕底部渲染分数，并在 Mr. Nom 的游戏世界与底部按钮之间绘制一条分隔线。分数的渲染方式与我们在 `HighscoreScreen`\
  \ 中使用的例程相同。此外，我们根据分数字符串的宽度将其水平居中显示。\n\n最后需要补充的信息是如何根据模型来渲染 Mr. Nom 的世界。这实际上非常简单。请再次查看图\
  \ 6–1 和图 6–5。每个单元格的大小恰好是 32×32 像素。污渍图像的大小也是 32×32 像素，Mr. Nom 的尾巴部分同样如此。Mr. Nom 各个方向的头部图像大小为\
  \ 42×42 像素，因此它们无法完全放入单个单元格中。不过，这并非问题所在。要渲染 Mr. Nom 的世界，我们只需获取每个污渍和蛇身体部分，将其世界坐标乘以\
  \ 32，即可得到该物体在屏幕上的像素中心点——例如，一个位于世界坐标 `(3,2)` 的污渍，其屏幕中心点会在 `96×64` 处。基于这些中心点，接下来只需获取相应的资源，并围绕这些坐标进行居中渲染即可。现在开始编码。清单\
  \ 6–12 展示了 `GameScreen` 类。\n\n**清单 6–12.** *`GameScreen.java`*\n\n```\npackage com.badlogic.androidgames.mrnom;\n\
  \nimport java.util.List;\n\nimport android.graphics.Color;\n\nimport com.badlogic.androidgames.framework.Game;\n\
  import com.badlogic.androidgames.framework.Graphics;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.Pixmap;\nimport com.badlogic.androidgames.framework.Screen;\n\
  \npublic class GameScreen extends Screen {\n    enum GameState {\n        Ready,\n\
  \        Running,\n        Paused,\n        GameOver\n    }\n\n    GameState state\
  \ = GameState.Ready;\n    World world;\n    int oldScore = 0;\n    String score\
  \ = \"0\";\n```\n\n首先，我们定义一个名为 `GameState` 的枚举类型，用于编码四种状态（准备、运行、暂停和游戏结束）。接着，我们定义了三个成员变量：一个保存屏幕当前状态，一个保存\
  \ `World` 实例，另外两个则分别以整数和字符串形式保存当前显示的分数。之所以需要最后两个成员变量，是为了避免每次绘制分数时都从 `World.score`\
  \ 成员变量创建新的字符串。我们将缓存该字符串，并仅在分数发生变化时创建新字符串。这样一来，我们就能更好地与垃圾回收器协作。\n\n```\npublic GameScreen(Game\
  \ game) {\n    super(game);\n    world = new World();\n}\n```\n\n构造函数调用了父类构造函数，并创建了一个新的\
  \ `World` 实例。构造函数返回后，游戏屏幕将处于准备状态。\n\n```\n@Override\npublic void update(float deltaTime)\
  \ {\n    List<TouchEvent> touchEvents = game.getInput().getTouchEvents();\n    game.getInput().getKeyEvents();\n\
  \n    if(state == GameState.Ready)\n        updateReady(touchEvents);\n    if(state\
  \ == GameState.Running)\n        updateRunning(touchEvents, deltaTime);\n    if(state\
  \ == GameState.Paused)\n        updatePaused(touchEvents);\n    if(state == GameState.GameOver)\n\
  \        updateGameOver(touchEvents);\n}\n```\n\n接下来是屏幕的 `update()` 方法。它所做的就是从输入模块获取\
  \ `TouchEvents` 和 `KeyEvents`，然后根据当前状态，将更新操作委托给我们为每种状态实现的四个更新方法之一。\n\n```\nprivate\
  \ void updateReady(List<TouchEvent> touchEvents) {\n    if(touchEvents.size() >\
  \ 0)\n        state = GameState.Running;\n}\n```\n\n下一个方法是 `updateReady()`。当屏幕处于准备状态时，将会调用此方法。它所做的就是检查屏幕是否被触摸。如果是，则将状态更改为运行状态。\n\
  \n```\nprivate void updateRunning(List<TouchEvent> touchEvents, float deltaTime)\
  \ {\n\n    int len = touchEvents.size();\n    for(int i = 0; i < len; i++) {\n \
  \       TouchEvent event = touchEvents.get(i);\n        if(event.type == TouchEvent.TOUCH_UP)\
  \ {\n            if(event.x < 64 && event.y < 64) {\n                if(Settings.soundEnabled)\n\
  \                    Assets.click.play(1);\n                state = GameState.Paused;\n\
  \                return;\n            }\n        }\n        if(event.type == TouchEvent.TOUCH_DOWN)\
  \ {\n            if(event.x < 64 && event.y > 416) {\n                world.snake.turnLeft();\n\
  \            }\n            if(event.x > 256 && event.y > 416) {\n             \
  \   world.snake.turnRight();\n            }\n        }\n    }\n\n    world.update(deltaTime);\n\
  \    if(world.gameOver) {\n        if(Settings.soundEnabled)\n            Assets.bitten.play(1);\n\
  \        state = GameState.GameOver;\n    }\n    if(oldScore != world.score) {\n\
  \        oldScore = world.score;\n        score = \"\" + oldScore;\n        if(Settings.soundEnabled)\n\
  \            Assets.eat.play(1);\n    }\n}\n```\n\n\n\n`updateRunning()`方法首先检查屏幕左上角的暂停按钮是否被按下。如果是，它将状态设置为暂停。接着，它检查屏幕底部的控制按钮之一是否被按下。注意，这里我们检查的是按下事件而非抬起事件。如果任一按钮被按下，我们会通知`World`中的`Snake`实例向左或向右转弯。没错，`updateRunning()`\
  \ 方法包含了我们 MVC 模式中的控制器代码！在所有触摸事件被检查完毕后，我们通知`world`根据给定的增量时间进行更新。如果`World`发出游戏结束信号，我们相应改变状态，并播放`bitten.ogg`音效。然后，我们检查缓存的旧分数是否与`World`存储的分数不同。如果不同，我们就知道两件事：Mr.\
  \ Nom 吃到了一个污点，并且需要更新分数字符串。此时，我们播放`eat.ogg`音效。这就是运行状态更新的全部内容。\n\n```\nprivate void\
  \ updatePaused(List<TouchEvent> touchEvents) {\n    int len = touchEvents.size();\n\
  \    for (int i = 0; i < len; i++) {\n        TouchEvent event = touchEvents.get(i);\n\
  \        if (event.type == TouchEvent.TOUCH_UP) {\n            if (event.x > 80\
  \ && event.x <= 240) {\n                if (event.y > 100 && event.y <= 148) {\n\
  \                    if (Settings.soundEnabled)\n                        Assets.click.play(1);\n\
  \                    state = GameState.Running;\n                    return;\n \
  \               }\n                if (event.y > 148 && event.y < 196) {\n     \
  \               if (Settings.soundEnabled)\n                        Assets.click.play(1);\n\
  \                    game.setScreen(new MainMenuScreen(game));\n               \
  \     return;\n                }\n            }\n        }\n    }\n}\n```\n\n`updatePaused()`方法仅检查菜单选项之一是否被触摸，并相应更改状态。\n\
  \n```\nprivate void updateGameOver(List<TouchEvent> touchEvents) {\n    int len\
  \ = touchEvents.size();\n    for (int i = 0; i < len; i++) {\n        TouchEvent\
  \ event = touchEvents.get(i);\n        if (event.type == TouchEvent.TOUCH_UP) {\n\
  \            if (event.x >= 128 && event.x <= 192 &&\n                event.y >=\
  \ 200 && event.y <= 264) {\n                if (Settings.soundEnabled)\n       \
  \             Assets.click.play(1);\n                game.setScreen(new MainMenuScreen(game));\n\
  \                return;\n            }\n        }\n    }\n}\n```\n\n`updateGameOver()`方法也检查屏幕中央的按钮是否被按下。如果被按下，我们则触发返回主菜单屏幕的屏幕切换。\n\
  \n```\n@Override\npublic void present(float deltaTime) {\n    Graphics g = game.getGraphics();\n\
  \n    g.drawPixmap(Assets.background, 0, 0);\n    drawWorld(world);\n    if (state\
  \ == GameState.Ready)\n        drawReadyUI();\n    if (state == GameState.Running)\n\
  \        drawRunningUI();\n    if (state == GameState.Paused)\n        drawPausedUI();\n\
  \    if (state == GameState.GameOver)\n        drawGameOverUI();\n\n    drawText(g,\
  \ score, g.getWidth() / 2 - score.length()*20 / 2, g.getHeight() - 42);\n}\n```\n\
  \n接下来是渲染方法。`present()`方法首先绘制背景图像，因为所有状态都需要它。接着，它会根据当前状态调用相应的绘制方法。最后，它渲染 Mr. Nom\
  \ 的世界并在屏幕底部中央绘制分数。\n\n```\nprivate void drawWorld(World world) {\n    Graphics g\
  \ = game.getGraphics();\n    Snake snake = world.snake;\n    SnakePart head = snake.parts.get(0);\n\
  \    Stain stain = world.stain;\n\n    Pixmap stainPixmap = null;\n    if (stain.type\
  \ == Stain.TYPE_1)\n        stainPixmap = Assets.stain1;\n    if (stain.type ==\
  \ Stain.TYPE_2)\n        stainPixmap = Assets.stain2;\n    if (stain.type == Stain.TYPE_3)\n\
  \        stainPixmap = Assets.stain3;\n    int x = stain.x * 32;\n    int y = stain.y\
  \ * 32;\n    g.drawPixmap(stainPixmap, x, y);\n\n    int len = snake.parts.size();\n\
  \    for (int i = 1; i < len; i++) {\n        SnakePart part = snake.parts.get(i);\n\
  \        x = part.x * 32;\n        y = part.y * 32;\n        g.drawPixmap(Assets.tail,\
  \ x, y);\n    }\n\n    Pixmap headPixmap = null;\n    if (snake.direction == Snake.UP)\n\
  \        headPixmap = Assets.headUp;\n    if (snake.direction == Snake.LEFT)\n \
  \       headPixmap = Assets.headLeft;\n    if (snake.direction == Snake.DOWN)\n\
  \        headPixmap = Assets.headDown;\n    if (snake.direction == Snake.RIGHT)\n\
  \        headPixmap = Assets.headRight;\n    x = head.x * 32 + 16;\n    y = head.y\
  \ * 32 + 16;\n    g.drawPixmap(headPixmap, x - headPixmap.getWidth() / 2, y - headPixmap.getHeight()\
  \ / 2);\n}\n```\n\n正如我们刚刚讨论的，`drawWorld()`方法绘制世界。它首先选择用于渲染污点的`Pixmap`，然后绘制它并将其在屏幕位置上水平居中。接着，我们渲染\
  \ Mr. Nom 的所有尾部部分，这很简单。最后，根据 Mr. Nom 的方向选择要使用的头部`Pixmap`，并在屏幕坐标中头部的位置绘制该`Pixmap`。与其他对象一样，我们也将图像围绕该位置居中。这就是\
  \ MVC 中视图的代码。\n\n```\nprivate void drawReadyUI() {\n    Graphics g = game.getGraphics();\n\
  \n    g.drawPixmap(Assets.ready, 47, 100);\n    g.drawLine(0, 416, 480, 416, Color.BLACK);\n\
  }\n\nprivate void drawRunningUI() {\n    Graphics g = game.getGraphics();\n\n  \
  \  g.drawPixmap(Assets.buttons, 0, 0, 64, 128, 64, 64);\n    g.drawLine(0, 416,\
  \ 480, 416, Color.BLACK);\n    g.drawPixmap(Assets.buttons, 0, 416, 64, 64, 64,\
  \ 64);\n    g.drawPixmap(Assets.buttons, 256, 416, 0, 64, 64, 64);\n}\n\nprivate\
  \ void drawPausedUI() {\n    Graphics g = game.getGraphics();\n\n    g.drawPixmap(Assets.pause,\
  \ 80, 100);\n    g.drawLine(0, 416, 480, 416, Color.BLACK);\n}\n\nprivate void drawGameOverUI()\
  \ {\n    Graphics g = game.getGraphics();\n\n    g.drawPixmap(Assets.gameOver, 62,\
  \ 100);\n    g.drawPixmap(Assets.buttons, 128, 200, 0, 128, 64, 64);\n    g.drawLine(0,\
  \ 416, 480, 416, Color.BLACK);\n}\n\npublic void drawText(Graphics g, String line,\
  \ int x, int y) {\n    int len = line.length();\n    for (int i = 0; i < len; i++)\
  \ {\n        char character = line.charAt(i);\n\n        if (character == ' ') {\n\
  \            x += 20;\n            continue;\n        }\n\n        int srcX = 0;\n\
  \        int srcWidth = 0;\n        if (character == '.') {\n            srcX =\
  \ 200;\n            srcWidth = 10;\n        } else {\n            srcX = (character\
  \ - '0') * 20;\n            srcWidth = 20;\n        }\n\n        g.drawPixmap(Assets.numbers,\
  \ x, y, srcX, 0, srcWidth, 32);\n        x += srcWidth;\n    }\n}\n```\n\n方法`drawReadUI()`、`drawRunningUI()`、`drawPausedUI()`和`drawGameOverUI()`并非新内容。它们像往常一样，根据图\
  \ 6-8 所示的坐标执行 UI 渲染。`drawText()`方法与`HighscoreScreen`中的方法相同，因此我们也不再讨论它。\n\n\n\n```java\n\
  @Override\npublic void pause() {\n    if (state == GameState.Running)\n        state\
  \ = GameState.Paused;\n\n    if (world.gameOver) {\n        Settings.addScore(world.score);\n\
  \        Settings.save(game.getFileIO());\n    }\n}\n\n@Override\npublic void resume()\
  \ {\n\n}\n@Override\npublic void dispose() {\n\n}\n```\n\n最后，还有一个至关重要的方法 `pause()`，它会在活动被暂停或游戏画面被另一个画面替换时被调用。这是保存我们设置的最佳位置。首先，我们将游戏状态设为暂停。如果\
  \ `pause()` 方法是因为活动被暂停而调用的，这将确保用户返回游戏时会收到继续游戏的提示。这是一种良好的行为习惯，因为让玩家从退出游戏的瞬间直接继续游戏会带来压力。接下来，我们检查游戏画面是否处于游戏结束状态。如果是，我们将玩家获得的分数计入最高分（是否计入取决于分数值），并将所有设置保存到外部存储。\n\
  \n就是这样。我们从零开始为安卓编写了一个完整的游戏！我们可以为自己感到骄傲，因为我们已经掌握了创建几乎所有我们喜欢的游戏所需的所有必要主题。从这里开始，剩下的基本上只是锦上添花的工作了。\n\
  \n### 总结\n\n在本章中，我们在框架之上实现了一个功能完备的游戏，包含了所有必要的功能（音乐除外）。你了解了为什么将模型与视图和控制器分离是有意义的，并且你了解到我们不需要用像素来定义游戏世界。我们可以利用这段代码，将渲染部分替换为\
  \ OpenGL ES，让“Nom 先生”走向 3D 世界。我们还可以通过为“Nom 先生”添加动画、添加一些色彩、增加新的游戏机制等方式，来让当前的渲染器更有趣味。不过，我们还只是触及了可能性的皮毛而已。\n\
  \n在继续阅读本书之前，我们建议你拿起游戏代码，好好摆弄一番。添加一些新的游戏模式、能量道具和敌人——任何你能想到的东西。\n\n等你回来后，在下一章中，我们将充实图形编程的知识，让我们的游戏看起来更炫酷一些，并且还将迈出进入三维世界的第一步！\n\
  \n"
