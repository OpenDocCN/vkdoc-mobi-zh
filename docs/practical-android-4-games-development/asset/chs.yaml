  \ java.util.List;\nimport java.util.Random;\n\nimport com.badlogic.androidgames.framework.math.OverlapTester;\n\
  \npublic class World {\n    public interface WorldListener {\n        public void\
  \ explosion();\n\n        public void shot();\n    }\n```\n\n你希望外部各方在发生爆炸或发射子弹时能够知晓。为此，定义了一个监听器接口，你可以实现该接口并将其注册到\
  \ `World` 实例中，当这些事件发生时，该监听器将被调用。这与《超级跳跳人》非常相似，只是事件有所不同。\n\n```\n    final static\
  \ float WORLD_MIN_X = -14;\n    final static float WORLD_MAX_X = 14;\n    final\
  \ static float WORLD_MIN_Z = -15;\n```\n\n还需要一些常量来定义世界的范围，正如“定义游戏世界”一节中讨论的那样。\n\n\
  ```\n    WorldListener listener;\n    int waves = 1;\n    int score = 0;\n    float\
  \ speedMultiplier = 1;\n    final List<Shot> shots = new ArrayList<Shot>();\n  \
  \  final List<Invader> invaders = new ArrayList<Invader>();\n    final List<Shield>\
