  \n### 整合所有内容\n\n让我们将本节中积累的所有知识整合起来，形成一个不错的小示例。你可以像前几页讨论的那样，扩展上一节的炮弹示例。使用 `Cannon`\
  \ 对象作为大炮，使用 `DynamicGameObject` 作为炮弹，并使用多个 `GameObject` 作为目标。每个目标的大小为 0.5×0.5 米，并随机放置在世界中。\n\
