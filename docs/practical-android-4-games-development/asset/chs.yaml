  \ 53\n\nNexus One (2.2.1):\n12-27 23:56:09.591: DEBUG/FPSCounter(873): fps: 61\n\
  12-27 23:56:10.591: DEBUG/FPSCounter(873): fps: 60\n12-27 23:56:11.601: DEBUG/FPSCounter(873):\
  \ fps: 61\n12-27 23:56:12.601: DEBUG/FPSCounter(873): fps: 60\n```\n\n与使用 `glTranslate()`\
  \ 等方法的旧方式相比，Hero 在新 `SpriteBatcher` 方法下性能表现差很多。Droid 实际上从新方法中受益，而 Nexus One 则基本不受影响。如果你将目标数量再增加\
  \ 100 个，你会发现在 Nexus One 上 `SpriteBatcher` 方法也会更快。\n\n那么 Hero 是怎么回事呢？`BobTest` 中的问题是调用了太多\
  \ OpenGL ES 方法，那么为什么现在使用了更少的 OpenGL ES 方法调用，性能反而更差了呢？\n\n\n\n### 规避 `FloatBuffer`\
  \ 中的一个 Bug\n\n这个现象的原因并不明显。每次调用 `Vertices.setVertices()` 时，你的 `SpriteBatcher` 都会将一个浮点数数组放入一个直接的\
  \ `ByteBuffer` 中。该方法最终会调用 `FloatBuffer.put(float[])`，而这正是导致性能问题的元凶。虽然桌面版 Java 通过真正的批量内存移动来实现\
  \ `FloatBuffer` 的该方法，但 Harmony 版本却会对数组中的每个元素调用 `FloatBuffer.put(float)`。这非常不幸，因为该方法是\
  \ JNI 方法，其开销非常大（很像同样是 JNI 方法的 OpenGL ES 方法）。\n\n有几种解决方案。例如，`IntBuffer.put(int[])`\
  \ 就没有这个问题。你可以将 `Vertices` 类中的 `FloatBuffer` 替换为 `IntBuffer`，并修改 `Vertices.setVertices()`\
  \ 方法，使其首先将浮点数从 float 数组传输到一个临时的 int 数组，然后将该 int 数组的内容复制到 `IntBuffer` 中。这个解决方案是由另一位游戏开发者\
  \ Ryan McNally 提出的，他也在 Android 问题追踪器上报告了这个 Bug。在 Hero 设备上，这个修复方案能带来五倍的性能提升，在其他 Android\
  \ 设备上提升幅度稍小一些。\n\n请修改 `Vertices` 类以包含此修复。将 `vertices` 成员变量更改为 `IntBuffer` 类型。添加一个名为\
  \ `tmpBuffer` 的新成员变量，它是一个 `int[]` 数组。`tmpBuffer` 数组在 `Vertices` 的构造函数中初始化，如下所示：\n\
  \n`this.tmpBuffer = new int[maxVertices * vertexSize / 4];`\n\n同时，在构造函数中，你也需要从 `ByteBuffer`\
  \ 获取一个 `IntBuffer` 视图，而不是 `FloatBuffer`：\n\n`vertices = buffer.asIntBuffer();`\n\
  \n现在，`Vertices.setVertices()` 方法看起来像这样：\n\n```java\npublic void setVertices(float[]\
  \ vertices, int offset, int length) {\n    this.vertices.clear();\n    int len =\
  \ offset + length;\n    for (int i = offset, j = 0; i < len; i++, j++)\n       \
  \ tmpBuffer[j] = Float.floatToRawIntBits(vertices[i]);\n    this.vertices.put(tmpBuffer,\
  \ 0, length);\n    this.vertices.flip();\n}\n```\n\n首先，将 `vertices` 参数的内容传输到 `tmpBuffer`。静态方法\
  \ `Float.floatToRawIntBits()` 会将浮点数的位模式重新解释为整数。然后，你需要将 int 数组的内容复制到 `IntBuffer`（即曾经的\
  \ `FloatBuffer`）中。这样能提升性能吗？在 Hero、Droid 和 Nexus One 上运行 `SpriteBatcherTest` 现在会产生以下输出：\n\
  \n```\nHero (1.5):\n12-28 00:24:54.770: DEBUG/FPSCounter(2538): fps: 61\n12-28 00:24:54.770:\
  \ DEBUG/FPSCounter(2538): fps: 61\n12-28 00:24:55.790: DEBUG/FPSCounter(2538): fps:\
  \ 62\n12-28 00:24:55.790: DEBUG/FPSCounter(2538): fps: 62\n\nDroid (2.1.1):\n12-28\
  \ 00:35:48.242: DEBUG/FPSCounter(1681): fps: 61\n12-28 00:35:49.258: DEBUG/FPSCounter(1681):\
  \ fps: 62\n12-28 00:35:50.258: DEBUG/FPSCounter(1681): fps: 60\n12-28 00:35:51.266:\
  \ DEBUG/FPSCounter(1681): fps: 59\n\nNexus One (2.2.1):\n12-28 00:27:39.642: DEBUG/FPSCounter(1006):\
  \ fps: 61\n12-28 00:27:40.652: DEBUG/FPSCounter(1006): fps: 61\n12-28 00:27:41.662:\
  \ DEBUG/FPSCounter(1006): fps: 61\n12-28 00:27:42.662: DEBUG/FPSCounter(1006): fps:\
  \ 61\n```\n\n是的——我知道你反复确认了——这不是笔误。Hero 现在真的达到了 60 FPS。这个由五行代码组成的变通方案将你的性能提升了 50%。Droid\
  \ 也从这个修复中受益了一点。\n\n这个问题在最新版本的 Android 中已经修复。然而，并非所有设备都会收到最新版本，因此你应该保留这个变通方案以保持向后兼容性。\n\
  \n**注意：** 还有另一个更快的变通方案。它涉及一个自定义的 JNI 方法，该方法在原生代码中执行内存移动。你可以在网上搜索“Android Game Development\
  \ Wiki”找到它。大多数情况下你可以使用这个方案，而不是纯 Java 的变通方案。但是，包含 JNI 方法稍微复杂一些，这就是为什么这里描述的是纯 Java\
  \ 变通方案。\n\n## 精灵动画\n\n如果你曾经玩过 2D 视频游戏，你就会知道你现在仍然缺少一个至关重要的组成部分：精灵动画。动画由所谓的*关键帧*组成，它们产生了运动的错觉。图\
  \ 8-25 展示了一个由 Ari Feldmann（来自他免版税的 SpriteLib）制作的精美动画精灵。\n\n![images](img/0825.jpg)\n\
  \n**图 8-25.** *走路中的穴居人，作者 Ari Feldmann（网格并非原图所有）*\n\n该图像尺寸为 256×64 像素，每个关键帧是 64×64\
  \ 像素。要制作动画，你只需使用第一个关键帧绘制一个精灵一段时间（例如 0.25 秒），然后切换到下一个关键帧，依此类推。当到达最后一帧时，你有两个选择：停留在最后一帧，或者从头开始（这就是所谓的*循环动画*）。\n\
  \n你可以轻松地使用 `TextureRegion` 和 `SpriteBatcher` 类来实现这一点。通常，你不仅会拥有像图 8-25 中那样的单个动画，而是会在同一个图集\
  \ (atlas) 中拥有更多动画。除了行走动画，你还可以有跳跃动画、攻击动画等等。对于每个动画，你需要知道帧持续时间 (frame duration)，它告诉你在切换到下一帧之前，应该持续使用动画的单个关键帧多长时间。\n\
  \n\n\n### 动画类\n\n由此，你可以定义`Animation`类的需求，该类用于存储单个动画的数据，例如图 8–25 中的行走动画：\n\n*   一个`Animation`对象包含多个`TextureRegion`，它们用于存储每个关键帧在图集（texture\
  \ atlas）中的位置。`TextureRegion`的顺序与动画播放时的顺序相同。\n*   `Animation`对象还存储帧持续时间（frame duration），即切换到下一帧之前必须经过的时间。\n\
  *   `Animation`类应提供一个方法，你向该方法传入你在该动画所代表的状态（例如，向左行走）中所花费的时间，该方法将返回对应的`TextureRegion`。该方法需要考虑你是否希望动画循环播放，还是在播放结束时停留在最后一帧。\n\
  \n最后一点很重要，因为它允许你存储单个`Animation`实例，供世界中的多个对象使用。每个对象只需跟踪其当前状态（即，它是在行走、射击还是跳跃，以及在该状态下持续了多久）。当你渲染该对象时，使用状态来选择要播放的动画，并使用状态时间来从`Animation`对象获取正确的`TextureRegion`。代码清单\
  \ 8–19 展示了新`Animation`类的代码。\n\n**代码清单 8–19.** *Animation.java，一个简单的动画类*\n\n```\n\
  package com.badlogic.androidgames.framework.gl;\n\npublic class Animation {\n  \
  \  public static final int ANIMATION_LOOPING = 0;\n    public static final int ANIMATION_NONLOOPING\
  \ = 1;\n\n    final TextureRegion[] keyFrames;\n    final float frameDuration;\n\
  \n    public Animation(float frameDuration, TextureRegion ... keyFrames) {\n   \
  \     this.frameDuration = frameDuration;\n        this.keyFrames = keyFrames;\n\
  \    }\n\n    public TextureRegion getKeyFrame(float stateTime, int mode) {\n  \
  \      int frameNumber = (int)(stateTime / frameDuration);\n\n        if (mode ==\
  \ ANIMATION_NONLOOPING) {\n            frameNumber = Math.min(keyFrames.length-1,\
  \ frameNumber);\n        } else {\n            frameNumber = frameNumber % keyFrames.length;\n\
  \        }\n        return keyFrames[frameNumber];\n    }\n}\n```\n\n首先，定义两个常量，用于`getKeyFrame()`方法。第一个常量表示动画应循环播放，第二个常量表示动画应在最后一帧停止。\n\
  \n接下来，定义两个成员变量：一个用于存储`TextureRegion`对象的数组，以及一个用于存储帧持续时间的浮点数。\n\n你将帧持续时间和包含关键帧的`TextureRegion`对象传递给构造函数，构造函数简单地存储它们。你可以对`keyFrames`数组进行防御性拷贝（defensive\
  \ copy），但这会分配一个新对象，可能会导致垃圾回收器压力稍大。\n\n有趣的部分是`getKeyFrame()`方法。你传入对象在该动画所代表的状态中已花费的时间，以及模式（`Animation.ANIMATION_LOOPING`或`Animation.NON_LOOPING`）。根据`stateTime`计算在给定状态下已经播放了多少帧。如果动画不应循环播放，只需将`frameNumber`限制在`TextureRegion`数组的最后一个元素。否则，取模运算，这将自动产生你想要的循环效果（例如，4\
  \ % 3 = 1）。剩下的就是返回正确的`TextureRegion`。\n\n#### 一个示例\n\n让我们创建一个名为`AnimationTest`的示例，并附带一个对应的屏幕`AnimationScreen`。与往常一样，我们只讨论屏幕本身。\n\
  \n你想要渲染多个向左行走的穴居人。你的世界将视锥体（view frustum）大小相同，尺寸为 4.8×3.2 米。（这是任意设定的；你可以使用任何尺寸。）一个穴居人是一个大小为\
  \ 1×1 米的`DynamicGameObject`。你将继承`DynamicGameObject`并创建一个名为`Caveman`的新类，该类将存储一个额外的成员变量，用于跟踪穴居人已经行走了多长时间。每个穴居人以每秒\
  \ 0.5 米的速度向左或向右移动。为`Caveman`类添加一个`update()`方法，根据时间增量和速度更新穴居人的位置。如果穴居人到达世界的左边缘或右边缘，将其放置到世界的另一侧。使用图\
  \ 8–25 中的图像，并相应地创建`TextureRegion`对象和一个`Animation`实例。为了渲染，使用`Camera2D`实例和`SpriteBatcher`，因为它们看起来很酷。代码清单\
  \ 8–20 展示了`Caveman`类的代码。\n\n**代码清单 8–20.** *AnimationTest 摘录，展示内部类 Caveman。*\n\n\
  ```\nstatic final float WORLD_WIDTH = 4.8f;\nstatic final float WORLD_HEIGHT = 3.2f;\n\
  \nstatic class Caveman extends DynamicGameObject {\n    public float walkingTime\
  \ = 0;\n\n    public Caveman(float x, float y, float width, float height) {\n  \
  \      super(x, y, width, height);\n        this.position.set((float)Math.random()\
  \ * WORLD_WIDTH,\n                          (float)Math.random() * WORLD_HEIGHT);\n\
  \        this.velocity.set(Math.random() > 0.5f?-0.5f:0.5f, 0);\n        this.walkingTime\
  \ = (float)Math.random() * 10;\n    }\n\n    public void update(float deltaTime)\
  \ {\n        position.add(velocity.x * deltaTime, velocity.y * deltaTime);\n   \
  \     if (position.x < 0) position.x = WORLD_WIDTH;\n        if (position.x > WORLD_WIDTH)\
  \ position.x = 0;\n        walkingTime += deltaTime;\n    }\n}\n```\n\n两个常量`WORLD_WIDTH`和`WORLD_HEIGHT`是外部类`AnimationTest`的一部分，供内部类使用。你的世界大小为\
  \ 4.8×3.2 米。\n\n接下来是内部类`Caveman`，它继承了`DynamicGameObject`，因为你要基于速度移动穴居人。你定义了一个额外的成员变量，用于跟踪穴居人已经行走了多长时间。在构造函数中，将穴居人放置在一个随机位置，并让它向左或向右行走。将`walkingTime`成员变量初始化为\
  \ 0 到 10 之间的一个数字；这样你的穴居人不会同步行走。\n\n`update()`方法根据穴居人的速度和时间增量来移动它。如果它离开了世界，将其重置到左边缘或右边缘。将时间增量加到`walkingTime`上，以跟踪它已经行走了多长时间。\n\
  \n代码清单 8–21 展示了`AnimationScreen`类。\n\n**代码清单 8–21.** *AnimationTest.java 摘录：AnimationScreen\
  \ 类*\n\n```\nclass AnimationScreen extends Screen {\n    static final int NUM_CAVEMEN\
  \ = 10;\n    GLGraphics glGraphics;\n    Caveman[] cavemen;\n    SpriteBatcher batcher;\n\
  \    Camera2D camera;\n    Texture texture;\n    Animation walkAnim;\n}\n```\n\n\
  你的屏幕类包含常见的成员变量。你有一个`GLGraphics`实例、一个`Caveman`数组、一个`SpriteBatcher`、一个`Camera2D`、包含行走关键帧的`Texture`，以及一个`Animation`实例。\n\
  \n\n```java\npublic AnimationScreen(Game game) {\n    super(game);\n    glGraphics\
  \ = ((GLGame)game).getGLGraphics();\n    cavemen = new Caveman[NUM_CAVEMEN];\n \
  \   for (int i = 0; i < NUM_CAVEMEN; i++) {\n        cavemen[i] = new Caveman((float)Math.random(),\
  \ (float)Math.random(), 1, 1);\n    }\n    batcher = new SpriteBatcher(glGraphics,\
  \ NUM_CAVEMEN);\n    camera = new Camera2D(glGraphics, WORLD_WIDTH, WORLD_HEIGHT);\n\
  }\n```\n\n在构造函数中，你需要创建`Caveman`实例，以及`SpriteBatcher`和`Camera2D`。\n\n```java\n@Override\n\
  public void resume() {\n    texture = new Texture(((GLGame)game), \"walkanim.png\"\
  );\n    walkAnim = new Animation(0.2f,\n        new TextureRegion(texture, 0, 0,\
  \ 64, 64),\n        new TextureRegion(texture, 64, 0, 64, 64),\n        new TextureRegion(texture,\
  \ 128, 0, 64, 64),\n        new TextureRegion(texture, 192, 0, 64, 64));\n}\n```\n\
  \n在`resume()`方法中，你从资源文件`walkanim.png`加载包含动画关键帧的纹理图集，这与图 8-25 中所示相同。随后，你创建`Animation`实例，将帧持续时间设置为\
  \ 0.2 秒，并为纹理图集中的每个关键帧传入一个`TextureRegion`。\n\n```java\n@Override\npublic void update(float\
  \ deltaTime) {\n    int len = cavemen.length;\n    for (int i = 0; i < len; i++)\
  \ {\n        cavemen[i].update(deltaTime);\n    }\n}\n```\n\n`update()`方法仅遍历所有`Caveman`实例，并以当前增量时间调用它们的`Caveman.update()`方法。这将使穴居人移动并更新他们的行走时间。\n\
  \n```java\n@Override\npublic void present(float deltaTime) {\n    GL10 gl = glGraphics.getGL();\n\
  \    gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    camera.setViewportAndMatrices();\n\
  \n    gl.glEnable(GL10.GL_BLEND);\n    gl.glBlendFunc(GL10.GL_SRC_ALPHA, GL10.GL_ONE_MINUS_SRC_ALPHA);\n\
  \    gl.glEnable(GL10.GL_TEXTURE_2D);\n\n    batcher.beginBatch(texture);\n    int\
  \ len = cavemen.length;\n    for (int i = 0; i < len; i++) {\n        Caveman caveman\
  \ = cavemen[i];\n        TextureRegion keyFrame = walkAnim.getKeyFrame(caveman.walkingTime,\
  \ Animation.ANIMATION_LOOPING);\n        batcher.drawSprite(caveman.position.x,\
  \ caveman.position.y,\n            caveman.velocity.x < 0 ? 1 : -1, 1, keyFrame);\n\
  \    }\n    batcher.endBatch();\n}\n\n@Override\npublic void pause() {\n}\n\n@Override\n\
  public void dispose() {\n}\n```\n\n最后，你还有`present()`方法。首先清除屏幕，并通过相机设置视口和投影矩阵。接着，启用混合和纹理映射，并设置混合函数。通过告知精灵批处理器你想使用动画纹理图集开始一个新批次来开始渲染。然后，遍历所有穴居人并渲染它们。对于每个穴居人，你首先基于其行走时间从`Animation`实例中获取正确的关键帧。你需要指定动画应循环播放。然后，你在其位置使用正确的纹理区域绘制穴居人。\n\
  \n但这里的`width`参数是做什么用的？请记住，你的动画纹理仅包含“向左走”动画的关键帧。如果穴居人向右走，你想水平翻转纹理，这可以通过指定负宽度来实现。如果你不放心，可以回到`SpriteBatcher`代码检查这是否有效。实际上，你通过指定负宽度来翻转精灵的矩形。你也可以通过指定负高度在垂直方向上做同样的操作。\n\
  \n图 8-26 展示了正在行走的穴居人。\n\n![images](img/0826.jpg)\n\n**图 8-26.** *穴居人行走*\n\n这就是你使用\
  \ OpenGL ES 制作精美 2D 游戏所需了解的全部内容。请注意你如何将游戏逻辑与呈现彼此分离。穴居人不需要知道自己正在被渲染。因此，他不需要保留任何与渲染相关的成员，例如`Animation`实例或`Texture`。你只需跟踪穴居人的状态以及他处于该状态的时长。结合他的位置和大小，你就可以轻松地使用你那些辅助类来渲染他。\n\
  \n### 总结\n\n现在你应该已经具备创建几乎任何你想要 2D 游戏的良好能力。你已经学习了向量及其使用方法，并得到了一个很好的可重用`Vector2`类。你还研究了用于创建弹道炮弹等物体的基础物理知识。碰撞检测也是大多数游戏的关键部分，你现在应该知道如何通过`SpatialHashGrid`正确高效地执行它。你探索了一种通过创建`GameObject`和`DynamicGameObject`类来跟踪对象状态和形状，从而将游戏逻辑和对象与渲染分离的方法。你了解了通过\
  \ OpenGL ES 实现 2D 相机概念是多么简单，这一切都基于一个名为`glOrthof()`的方法。你学习了纹理图集、为什么需要它们以及如何使用它们。通过引入纹理区域、精灵以及如何通过`SpriteBatcher`高效渲染它们，这一知识得到了扩展。最后，你研究了精灵动画，事实证明这实现起来极其简单。\n\
  \n值得注意的一点是，本章涵盖的所有主题——包括粗测和精测碰撞检测、物理模拟、运动积分以及不同形状的边界——在许多开源库（如`Box2D`、`Chipmunk\
  \ Physics`、`Bullet Physics`等）中都得到了稳健的实现。所有这些库最初都是用 C 或 C++开发的，但有一些库提供了 Android 封装或\
  \ Java 实现，这使得它们在规划游戏时成为值得考虑的选项。\n\n在下一章中，你将使用你的新工具创建一个新游戏。你会惊讶于它有多么简单。\n\n## 第 9\
  \ 章\n## 《超级跳跃者》：一款 2D OpenGL ES 游戏\n\n是时候把我们学到的一切整合到一个游戏中来了。正如第 3 章所讨论的，移动领域有几个非常流行的类型可供选择。对于我们的下一个游戏，我们决定走更休闲的路线。我们将实现一个类似《绑架》（Abduction）或《\
  \ doodle jump》的跳跃类游戏。与《诺姆先生》一样，我们将从定义游戏机制开始。\n```\n\n\n### 核心游戏机制\n\n我们建议你快速在安卓设备上安装《Abduction》这款游戏，或者在网上搜索该游戏的视频。从这个例子中，我们可以提炼出我们这款名为《超级跳跃者》的游戏的核心机制。以下是一些细节：\n\
  \n- 主角持续向上跳跃，在平台之间移动。游戏世界在垂直方向上跨越多个屏幕。\n- 左右倾斜手机可控制水平移动。\n- 当主角离开一个水平屏幕边界时，他会从对侧重新进入屏幕。\n\
  - 平台可以是静止的，也可以是水平移动的。\n- 某些平台在主角碰到时会被随机粉碎。\n- 在向上攀爬的途中，主角可以收集物品来增加分数。\n- 除了金币，一些平台上还有弹簧，能让主角跳得更高。\n\
  - 敌对势力在游戏世界中水平移动。当我们的主角碰到其中一个敌人时，就会死亡，游戏结束。\n- 当我们的主角掉落到屏幕底部边缘以下时，游戏结束。\n- 关卡顶部设有某种目标。当主角碰到该目标时，新的一关开始。\n\
  \n虽然这个列表比我们为《Nom 先生》创建的列表要长，但看起来并没有复杂太多。图 9–1 展示了核心概念的初始草图。这次我们直接使用 `Paint.NET`\
  \ 来制作草图。让我们构思一个背景故事。\n\n![images](img/0901.jpg)\n\n**图 9–1.** *我们最初的游戏机制草图，展示了主角、平台、金币、敌对势力以及关卡顶部的目标。*\n\
  \n### 背景故事与美术风格\n\n我们将在此充分发挥创意，为我们的游戏构思以下独特的故事。\n\n我们的主角鲍勃患有慢性跳跃症。他注定每次脚一沾地就必须跳跃。更糟糕的是，他心爱的无名公主被一群邪恶的杀手飞鼠绑架，并被关在天上的城堡里。鲍勃的病症最终证明是有益的，他踏上了寻找爱人的征途，与邪恶的松鼠势力战斗。\n\
  \n这个经典的电子游戏故事非常适合 8 位像素图形风格，这种风格可以在 NES（任天堂娱乐系统）上的原创《超级马里奥兄弟》等游戏中找到。图 9–1 中的草图展示了我们游戏中所有元素的最终图形效果。鲍勃、金币、松鼠和粉碎的平台当然都是动画的。我们还将使用符合视觉风格的音乐和音效。\n\
  \n### 屏幕与界面切换\n\n我们现在可以定义我们的屏幕和界面切换了。我们将沿用《Nom 先生》中使用过的相同模式：\n\n-   我们将有一个主屏幕，上面包含游戏标志；有“开始游戏”、“高分榜”和“帮助”菜单项；还有一个用于禁用或启用声音的按钮。\n\
  -   我们将有一个游戏屏幕，它会要求玩家准备就绪，并优雅地处理运行、暂停、游戏结束和下一关等状态。与我们在《Nom 先生》中使用的相比，唯一的新增内容是屏幕的“下一关”状态，当鲍勃碰到城堡时会触发该状态。在这种情况下，将生成一个新的关卡，鲍勃会从世界底部重新开始，同时保留他的分数。\n\
  -   我们将有一个高分榜屏幕，显示玩家迄今为止取得的前五名分数。\n-   我们将有帮助屏幕，向玩家展示游戏机制和目标。我们会耍个小聪明，省略掉关于如何控制玩家的说明。现在的孩子应该能够应对我们在\
  \ 80 年代和 90 年代初面对的那种复杂性，那时候游戏没有任何操作指引。\n\n这或多或少与我们在《Nom 先生》中的设定相同。图 9–2 展示了所有屏幕及界面切换。请注意，除了暂停按钮外，游戏屏幕或其子屏幕上没有任何其他按钮。当要求准备就绪时，用户会凭直觉触摸屏幕。\n\
  \n![images](img/0902.jpg)\n\n**图 9–2.** *《超级跳跃者》的所有屏幕及界面切换。*\n\n解决了这些问题，我们现在可以思考我们游戏世界的大小和单位，以及它如何映射到图形资源上。\n\
  \n\n\n### 定义游戏世界\n\n经典的“先有鸡还是先有蛋”问题再次困扰着我们。上一章你已了解到，我们在世界单位（例如米）和像素之间建立了对应关系。我们的物体是在世界空间中物理定义的。边界形状和位置以米为单位给出；速度以米/秒为单位。然而，物体的图形表示是以像素定义的，因此我们必须建立某种映射。我们通过首先为图形资源定义一个目标分辨率来克服这个问题。与\
  \ Mr. Nom 游戏一样，我们将使用 320×480 像素（宽高比 1.5）的目标分辨率。选择这个目标是因为它是最低的实用分辨率，但如果你专门针对平板电脑进行开发，可能需要使用\
  \ 800×1280 这样的分辨率，或者介于两者之间的某个分辨率，例如 480×800（典型的 Android 手机分辨率）。无论你的目标分辨率如何，其原理都是一样的。\n\
  \n接下来我们要做的是在世界中建立像素和米之间的对应关系。图 9-1 中的示意图让我们了解了不同物体所占的屏幕空间大小，以及它们之间的相对比例。对于 2D 游戏，我们建议选择\
  \ 32 像素对应 1 米的映射关系。那么，让我们将这张大小为 320×380 像素的示意图覆盖上一个网格，其中每个单元格为 32×32 像素。在我们的世界空间中，这对应着\
  \ 1×1 米的单元格。图 9-3 展示了我们的示意图和网格。\n\n![images](img/0903.jpg)\n\n**图 9-3.** 叠放了网格的示意图。每个单元格为\
  \ 32×32 像素，对应游戏世界中 1×1 米的区域。\n\n图 9-3 当然有点取巧。我们这样排列图形是为了使它们与网格单元格整齐对齐。在实际游戏中，我们会将物体放置在非整数坐标位置上。\n\
  \n那么，我们能从图 9-3 中得到什么信息呢？首先，我们可以直接估算出世界中每个物体以米为单位的宽度和高度。以下是我们将用于物体边界矩形的数值：\n\n* \
  \  鲍勃为`0.8×0.8`米；他没有完全占据一个完整的单元格。\n*   平台为`2×0.5`米，水平占据两个单元格，垂直占据半个单元格。\n*   金币为`0.8×0.5`米。它几乎垂直占据一个单元格，水平方向大约占据半个单元格。\n\
  *   弹簧为`0.5×0.5`米，每个方向占据半个单元格。实际上弹簧的高比宽稍大一些。我们将其边界形状设为正方形，以便碰撞检测更加宽容。\n*   松鼠为`1×0.8`米。\n\
  *   城堡为`0.8×0.8`米。\n\n有了这些尺寸，我们也获得了用于碰撞检测的物体边界矩形的尺寸。如果根据游戏运行效果发现这些尺寸偏大或偏小，我们可以进行调整。\n\
  \n从图 9-3 中我们还能推导出视锥体的尺寸。它将显示我们世界中 10×15 米的区域。\n\n剩下的唯一定义内容是游戏中的速度和加速度。这高度取决于我们希望游戏带来的手感。通常需要进行一些实验才能得到正确的数值。以下是我们经过几轮调优后得出的结果：\n\
  \n*   重力加速度矢量为`(0,–13)` m/s²，略高于地球上的重力加速度，也高于我们在炮弹示例中使用的数值。\n*   鲍勃的初始跳跃速度矢量为`(0,11)`\
  \ m/s。注意，跳跃速度仅影响 y 轴上的运动。水平移动将由当前的加速度计读数决定。\n*   当鲍勃碰到弹簧时，他的跳跃速度矢量将是正常跳跃速度的 1.5\
  \ 倍。相当于`(0,16.5)` m/s。同样，这个值完全来自于实验。\n*   鲍勃的水平移动速度为`20` m/s。注意，这是一个无方向的速度，而非矢量。我们稍后会解释它如何与加速度计配合工作。\n\
  *   松鼠会持续从左到右再返回进行巡逻。它们的恒定移动速度为`3` m/s。以矢量形式表示，松鼠向左移动时为`(–3,0)` m/s，向右移动时为`(3,0)`\
  \ m/s。\n\n那么鲍勃的水平移动是如何工作的呢？我们之前定义的速度实际上是鲍勃的最大水平速度。根据玩家倾斜手机的程度，鲍勃的水平移动速度将在`0`（无倾斜）和`20`\
  \ m/s（完全向一侧倾斜）之间变化。\n\n由于我们的游戏将以竖屏模式运行，我们将使用加速度计 x 轴的值。当手机未倾斜时，该轴报告的加速度为`0` m/s²。当完全向左倾斜至横屏方向时，该轴报告的加速度约为`–10`\
  \ m/s²。当完全向右倾斜时，该轴报告的加速度约为`10` m/s²。我们只需将加速度计读数除以其最大绝对值（`10`）进行归一化，然后将鲍勃的最大水平速度乘以该值即可。因此，当手机完全向一侧倾斜时，鲍勃将以`20`\
  \ m/s 的速度向左或向右移动；如果手机倾斜程度较小，移动速度也相应较小。当手机完全倾斜时，鲍勃每秒可以在屏幕上移动两次。\n\n我们将根据当前 x 轴的加速度计数值，每帧更新这个水平移动速度，并将其与鲍勃的垂直速度相结合——垂直速度由重力加速度和当前垂直速度推导得出，正如我们在早期示例中对炮弹所做的处理一样。\n\
  \n世界的一个基本方面是我们能看到的部分。由于鲍勃从屏幕底部边缘离开屏幕就会死亡，我们的摄像机也在游戏机制中扮演了角色。虽然我们会使用摄像机进行渲染，并在鲍勃跳跃时将其向上移动，但我们不会在世界模拟类中使用它。相反，我们记录鲍勃到目前为止的最高\
  \ y 坐标。如果他的位置低于该值减去视锥体高度的一半，我们就知道他已离开屏幕。因此，我们并没有完全将模型（我们的世界模拟类）与视图分离开来，因为我们需要知道视锥体的高度来判断鲍勃是否死亡。不过我们可以接受这一点。\n\
  \n让我们来看看需要的资源。\n\n### 创建资源\n\n我们的新游戏有两种类型的图形资源：UI 元素和实际的游戏元素（或称世界元素）。我们先从 UI 元素开始。\n\
  \n\n\n### UI 元素\n\n首先需要注意的一点是，UI 元素（按钮、Logo 等）并不依赖于我们的像素到世界单位的映射。与 Mr. Nom 游戏类似，我们根据目标分辨率来设计它们——在本例中为\
  \ 320×480 像素。查看图 9-2，我们可以确定需要哪些 UI 元素。\n\n我们创建的第一个 UI 元素是不同屏幕所需的按钮。图 9-4 展示了我们游戏中的所有按钮。\n\
  \n![图片](img/0904.jpg)\n\n**图 9-4.** *各种按钮，每个尺寸为 64×64 像素。*\n\n我们倾向于在一个单元格大小为 32×32\
  \ 或 64×64 像素的网格中创建所有图形资源。图 9-4 中的按钮就是在一个每个单元格为 64×64 像素的网格中排布的。顶行的按钮用于主菜单屏幕，以指示声音是否启用。左下角的箭头用于在几个屏幕中导航到下一个屏幕。右下角的按钮在游戏运行时的游戏屏幕中使用，以允许用户暂停游戏。\n\
  \n你可能想知道为什么没有指向右方的箭头。请记住，使用我们精巧的精灵批处理器，我们可以通过指定负的宽度和/或高度值轻松地翻转我们绘制的内容。我们将对一些图形资源使用这个技巧以节省一些内存。\n\
  \n接下来是主菜单屏幕所需的元素。那里有 Logo、菜单项和背景。图 9-5 展示了所有这些元素。\n\n![图片](img/0905.jpg)\n\n**图\
  \ 9-5.** *背景图片、主菜单项和 Logo。*\n\n背景图片不仅用于主菜单屏幕，还用于所有屏幕。它的大小与我们的目标分辨率相同，为 320×480 像素。主菜单项占据\
  \ 300×110 像素。你在图 9-5 中看到的黑色背景是因为白底白字效果不佳。在实际图片中，背景当然是由透明像素组成的。Logo 尺寸为 274×142 像素，边角处有一些透明像素。\n\
  \n接下来是帮助屏幕的图片。我们没有将它们各自与几个元素合成，而是偷懒地将它们全部制作为 320×480 像素的全屏图片。这将略微减少我们绘制代码的大小，同时不会给程序增加太多负担。你可以在图\
  \ 9-2 中看到所有的帮助屏幕。我们将与这些图片合成的唯一元素是箭头按钮。\n\n对于高分屏幕，我们将复用主菜单项图片中标有“HIGHSCORES”的部分。实际分数是使用一种特殊技术渲染的，我们将在本章稍后探讨。该屏幕的其余部分同样由背景图片和一个按钮组成。\n\
  \n游戏屏幕有更多文本 UI 元素，即“READY?”标签、暂停状态的菜单项（“RESUME”和“QUIT”）以及“GAME OVER”标签。图 9-6 展示了它们的全貌。\n\
  \n![图片](img/0906.jpg)\n\n**图 9-6.** *“READY?”、“RESUME”、“QUIT”和“GAME OVER”标签*\n\n\
  ### 使用位图字体处理文本\n\n那么，我们如何渲染游戏屏幕中的其他文本元素呢？使用与 Mr. Nom 游戏中渲染分数相同的技术。现在我们不仅拥有数字，还拥有字符。我们使用一个图像图集，其中每个子图像代表一个字符（例如，*0*\
  \ 或 *a*）。这个图像图集被称为位图字体。图 9-7 展示了我们将要使用的位图字体。\n\n![图片](img/0907.jpg)\n\n**图 9-7.**\
  \ *一种位图字体。*\n\n图 9-7 中的黑色背景和网格当然不是实际图片的一部分。位图字体是一种在游戏屏幕上渲染文本的非常古老的技术。它们通常包含一系列 ASCII\
  \ 字符的图像。这样一个字符图像被称为一个*字形*。ASCII 是 Unicode 的前身之一。ASCII 字符集包含 128 个字符，如图 9-8 所示。\n\
  \n![图片](img/0908.jpg)\n\n**图 9-8.** *ASCII 字符及其十进制、十六进制和八进制值。*\n\n在这 128 个字符中，有\
  \ 96 个是可打印字符（字符 32 到 127）。我们的位图字体只包含可打印字符。位图字体的第一行包含字符 32 到 47；下一行包含字符 48 到 63，依此类推。ASCII\
  \ 仅在您想要存储和显示使用标准拉丁字母的文本时有用。有一种扩展的 ASCII 格式，它使用值 128 到 255 来编码西方语言的其他常见字符，例如 ö 或\
  \ é。更具表现力的字符集（例如，用于中文或阿拉伯语）通过 Unicode 表示，不能通过 ASCII 编码。对于我们的游戏，标准的 ASCII 字符集就足够了。\n\
  \n那么，我们如何使用位图字体渲染文本呢？事实证明这非常简单。首先，我们创建 96 个纹理区域，每个区域对应位图字体中的一个字形。我们可以将这些纹理区域存储在一个数组中，如下所示：\n\
  \n```\nTextureRegion[] glyphs = new TextureRegion[96];\n```\n\nJava 字符串采用 16 位 Unicode\
  \ 编码。对我们来说幸运的是，我们位图字体中的 ASCII 字符在 ASCII 和 Unicode 中具有相同的值。要获取 Java 字符串中某个字符的区域，我们只需这样做：\n\
  \n```\nint index = string.charAt(i) - 32;\n```\n\n这为我们提供了纹理区域数组的直接索引。我们只需从字符串中的当前字符减去空格字符（32）的值。如果索引小于\
  \ 0 或大于 95，则表示该字符是位图字体中没有的 Unicode 字符。通常，我们直接忽略这样的字符。\n\n要在一行中渲染多个字符，我们需要知道字符之间应该有多少间距。图\
  \ 9-7 中的位图字体是一种所谓的等宽字体。\n\n这意味着每个字形具有相同的宽度。我们的位图字体字形每个大小为 16×20 像素。当我们在字符串中逐字符推进渲染位置时，我们只需添加\
  \ 20 像素。我们将绘制位置从一个字符移动到另一个字符的像素数称为*步进*。对于我们的位图字体，它是固定的；然而，它通常根据我们绘制的字符而变化。一种更复杂的*步进*形式会同时考虑当前要绘制的字符和下一个字符来计算步进。如果你想在网络上查找，这种技术称为*字距调整*。我们只使用等宽位图字体，因为它们能大大简化我们的工作。\n\
  \n那么，我们是如何生成那个 ASCII 位图字体的呢？我们使用了网络上许多可用的位图字体生成工具之一。我们使用的工具叫做 Codehead's Bitmap\
  \ Font Generator，并且是免费提供的。你可以选择硬盘上的一个字体文件，并指定字体的高度，生成器就会为其生成包含 ASCII 字符集的图片。该工具还有许多其他选项，我们在此无法详述。我们建议你去查看一下并稍微摆弄一番。\n\
  \n我们将使用此技术绘制游戏中所有剩余的字符串。稍后，您将看到一个位图字体类的具体实现。让我们继续看看我们的资源。\n\n有了位图字体，我们现在拥有了所有图形\
  \ UI 元素的资源。我们将通过一个 `SpriteBatcher` 来渲染它们，该批处理器使用一个设置了视图截锥体的摄像机，该截锥体直接映射到我们的目标分辨率。这样我们就可以用像素坐标来指定所有坐标。\n\
  \n\n\n#### 游戏元素\n\n剩下的就是实际游戏对象了。这些对象依赖于我们先前讨论过的像素与世界单位的映射关系。为了尽可能简化创建过程，我们使用了一个小技巧：从每个单元格\
  \ 32×32 像素的网格开始绘制。所有对象都居中在一个或多个这样的单元格中，这样它们就能轻松对应到我们世界中的物理尺寸。让我们从鲍勃开始，如图 9–9 所示。\n\
  \n![images](img/0909.jpg)\n\n**图 9–9.** 鲍勃及其五个动画帧。\n\n图 9–9 展示了两个跳跃帧、两个下落帧和一个死亡帧。每张图片尺寸为\
  \ 160×32 像素，每个动画帧尺寸为 32×32 像素。背景像素为透明。\n\n鲍勃可以处于三种状态：跳跃、下落和死亡。我们为每种状态准备了动画帧。诚然，两个跳跃帧之间的差异很小——只有他的前额发在摆动。我们将为鲍勃的三种动画分别创建一个\
  \ `Animation` 实例，并根据他的当前状态使用它们进行渲染。我们也没有为鲍勃向左移动准备重复的帧。与箭头按钮一样，我们只需在调用 `SpriteBatcher.drawSprite()`\
  \ 时指定一个负宽度，即可水平翻转鲍勃的图像。\n\n图 9–10 描绘了邪恶松鼠。我们再次使用两个动画帧，这样松鼠看起来就像在扇动它那双邪恶的翅膀。\n\n\
  ![images](img/0910.jpg)\n\n**图 9–10.** *一只邪恶的飞松鼠及其两个动画帧。*\n\n图 9–10 中的图片尺寸为 64×32\
  \ 像素，每个帧为 32×32 像素。\n\n图 9–11 中的金币动画比较特殊。我们的关键帧序列将不是 1、2、3、1，而是 1、2、3、2、1。否则，金币会从第\
  \ 3 帧的收缩状态直接跳到第 1 帧的完全展开状态。通过重复使用第 2 帧，我们可以节省一点空间。\n\n![images](img/0911.jpg)\n\n\
  **图 9–11.** *金币及其动画帧。*\n\n图 9–11 中的图片尺寸为 96×32 像素，每个帧为 32×32 像素。\n\n关于图 9–12 中的弹簧图片，没什么好多说的。弹簧就那样欢快地待在图片中央。\n\
  \n![images](img/0912.jpg)\n\n**图 9–12.** *弹簧。图片尺寸为 32×32 像素。*\n\n图 9–13 中的城堡也是非动画的。它比其他对象大（64×64\
  \ 像素）。\n\n![images](img/0913.jpg)\n\n**图 9–13.** *城堡。*\n\n图 9–14 中的平台（64×64 像素）有四个动画帧。根据我们的游戏机制，当鲍勃撞击某些平台时，它们会粉碎。在这种情况下，我们将完整播放一次平台的动画。对于静态平台，我们只使用第一帧。\n\
  \n![images](img/0914.jpg)\n\n**图 9–14.** *平台及其动画帧。*\n\n#### 纹理图集来帮忙\n\n这就是我们游戏中所有的图形资源。我们之前已经讨论过，纹理的宽度和高度必须是\
  \ 2 的幂次方。我们的背景图像和所有帮助屏幕的尺寸都是 320×480 像素。我们将它们存储为 512×512 像素的图片，以便作为纹理加载。这已经是六张纹理了。\n\
  \n我们还需要为其他所有图像分别创建纹理吗？不。我们创建一个单一的纹理图集。事实证明，所有其他东西都能很好地放入一个 512×512 像素的图集中，我们可以将其作为单一纹理加载——这会让\
  \ GPU 非常高兴，因为除了背景和帮助屏幕图像外，我们只需要绑定一个纹理即可用于所有游戏元素。图 9–15 展示了这个图集。\n\n图 9–15 中的图像尺寸为\
  \ 512×512 像素。网格和红色轮廓线不属于图像部分，背景像素为透明。UI 标签和位图字体的黑色背景像素也是如此。网格单元格大小为 32×32 像素。使用这种纹理图集的好处在于，如果你想要支持更高分辨率的屏幕，你只需要更改这个纹理图集的大小！将其放大到\
  \ 1024×1024，并配合更高保真度的图形，即使我们的目标分辨率是 320×480，OpenGL 也会自动为你提供更好的图形效果，而无需更改游戏代码！\n\n\
  我们将所有图像放置在纹理图集中坐标为 32 倍数的角落位置。这使得创建 `TextureRegions` 变得更加容易。\n\n![images](img/0915.jpg)\n\
  \n**图 9–15.** *强大的纹理图集。*\n\n#### 音乐与音效\n\n我们还需要音效和音乐。由于我们的游戏是 8 位复古风格，因此使用所谓的*芯片音乐*（chip\
  \ tunes）非常合适。芯片音乐是由合成器生成的音效和音乐。最著名的芯片音乐由任天堂的 NES、SNES 和 GameBoy 生成。对于音效，我们使用了 Tomas\
  \ Pettersson 开发的名为 *sfxr* 的工具（更准确地说是其 Flash 版本，名为 *as3sfxr*）。它可以在 [www.superflashbros.net/as3sfxr](http://www.superflashbros.net/as3sfxr)\
  \ 找到。图 9–16 展示了其用户界面。\n\n![images](img/0916.jpg)\n\n**图 9–16.** `as3sfxr`，Tomas\
  \ Pettersson 开发的 `sfxr` 的 Flash 移植版。\n\n我们为跳跃、撞击弹簧、撞击金币和撞击松鼠创建了音效。我们还为点击 UI 元素创建了一个音效。我们所做的只是对\
  \ `as3sfxr` 左侧每个类别的按钮随意点击，直到找到合适的音效。\n\n游戏音乐通常更难获得。网上有一些网站提供适合《超级跳跃者》这类游戏的 8 位芯片音乐。我们将使用一首名为“New\
  \ Song”的曲子，由 Geir Tjelta 创作。这首曲子可以在 [www.freemusicarchive.org](http://www.freemusicarchive.org)\
  \ 找到。它采用知识共享署名-非商业性使用-禁止演绎（即音乐共享）许可协议。这意味着我们可以在非商业项目中使用它，例如我们的开源游戏《超级跳跃者》，只要我们注明归功于\
  \ Geir，并且不修改原始作品。当你在网上寻找游戏音乐时，务必确保遵守许可协议。人们在创作这些乐曲上投入了大量心血。如果许可协议不适用于你的项目（例如，如果是商业项目），那么你就不能使用它。\n\
  \n### 实现《超级跳跃者》\n\n实现《超级跳跃者》将非常简单。我们可以重用上一章的完整框架，并遵循我们之前在《Nom 先生》中采用的高层架构。这意味着我们将为每个屏幕创建一个类，每个类实现该屏幕所需的逻辑和呈现。除此之外，我们还将进行标准项目设置，包括合适的清单文件、所有资源放在\
  \ `assets/` 文件夹中、应用程序图标等等。让我们从主 `Assets` 类开始。\n\n\n\n### 资源类\n\n在 Mr. Nom 游戏中，我们已经有了一个`Assets`类，它仅包含存储在静态成员变量中的大量`Pixmap`和`Sound`引用。在\
  \ Super Jumper 中，我们将采用同样的做法。不过，这次我们还会添加一点加载逻辑。清单 9–1 展示了相关代码。\n\n**清单 9–1.** `Assets.java`，包含除帮助屏幕纹理之外的所有资源\n\
  \n```\npackage com.badlogic.androidgames.jumper;\n\nimport com.badlogic.androidgames.framework.Music;\n\
  import com.badlogic.androidgames.framework.Sound;\nimport com.badlogic.androidgames.framework.gl.Animation;\n\
  import com.badlogic.androidgames.framework.gl.Font;\nimport com.badlogic.androidgames.framework.gl.Texture;\n\
  import com.badlogic.androidgames.framework.gl.TextureRegion;\nimport com.badlogic.androidgames.framework.impl.GLGame;\n\
  \npublic class Assets {\n    public static Texture background;\n    public static\
  \ TextureRegion backgroundRegion;\n\n    public static Texture items;\n    public\
