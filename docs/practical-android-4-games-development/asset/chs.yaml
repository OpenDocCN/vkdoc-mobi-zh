  \n### 主活动\n\n与往常一样，需要一个继承自 `GLGame` 类的主活动。它负责在启动时通过调用 `Assets.load()` 加载资源，以及在活动暂停或恢复时暂停或恢复音乐。作为启动界面，直接返回\
  \ `MainMenuScreen`，稍后将实现它。需要注意的一点是在清单文件中定义该活动。务必确保方向设置为 `landscape`（横屏）！代码清单 12–3\
  \ 展示了相关代码。\n\n**代码清单 12–3.** `DroidInvaders.java`，主活动\n\n```java\npackage com.badlogic.androidgames.droidinvaders;\n\
  \nimport javax.microedition.khronos.egl.EGLConfig;\nimport javax.microedition.khronos.opengles.GL10;\n\
  \nimport com.badlogic.androidgames.framework.Screen;\nimport com.badlogic.androidgames.framework.impl.GLGame;\n\
  \npublic class DroidInvaders extends GLGame {\n    boolean firstTimeCreate = true;\n\
  \    @Override\n    public Screen getStartScreen() {\n        return new MainMenuScreen(this);\n\
  \    }\n\n    @Override\n    public void onSurfaceCreated(GL10 gl, EGLConfig config)\
  \ {\n        super.onSurfaceCreated(gl, config);\n        if (firstTimeCreate) {\n\
  \            Settings.load(getFileIO());\n            Assets.load(this);\n     \
  \       firstTimeCreate = false;\n        } else {\n            Assets.reload();\n\
  \        }\n    }\n\n    @Override\n    public void onPause() {\n        super.onPause();\n\
  \        if (Settings.soundEnabled)\n            Assets.music.pause();\n    }\n\
  }\n```\n\n这与 Super Jumper 中的代码完全相同。在调用 `getStartScreen()` 时，返回一个接下来将要编写的 `MainMenuScreen`\
  \ 的新实例。在 `onSurfaceCreated()` 中，确保资源被重新加载；在 `onPause()` 中，如果音乐正在播放则暂停它。\n\n如你所见，一旦你掌握了实现简单游戏的思路，许多内容都可以重复使用。思考一下如何将更多样板代码迁移到框架中，从而进一步减少重复！\n\
  \n\n### 主菜单界面\n\n在之前的游戏中，您已经编写了许多琐碎的界面。**Droid Invaders** 也存在一些这样的界面。原则始终相同：提供一些可点击的\
  \ UI 元素来触发界面切换或配置更改，并显示一些信息。主菜单界面仅显示标志、开始游戏和设置选项，如图 Figure 12–4 所示。触摸这些按钮中的任意一个，都会触发向\
  \ `GameScreen` 或 `SettingsScreen` 的界面切换。Listing 12–4 展示了相关代码。\n\n**代码清单 12–4.**\
  \ *MainMenuScreen.java，主菜单界面*\n\n```java\npackage com.badlogic.androidgames.droidinvaders;\n\
  \nimport java.util.List;\n\nimport javax.microedition.khronos.opengles.GL10;\n\n\
  import com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  import com.badlogic.androidgames.framework.gl.Camera2D;\nimport com.badlogic.androidgames.framework.gl.SpriteBatcher;\n\
  import com.badlogic.androidgames.framework.impl.GLScreen;\nimport com.badlogic.androidgames.framework.math.OverlapTester;\n\
  import com.badlogic.androidgames.framework.math.Rectangle;\nimport com.badlogic.androidgames.framework.math.Vector2;\n\
  \npublic class MainMenuScreen extends GLScreen {\n    Camera2D guiCam;\n    SpriteBatcher\
  \ batcher;\n    Vector2 touchPoint;\n    Rectangle playBounds;\n    Rectangle settingsBounds;\n\
  ```\n\n和通常一样，您需要一个摄像头来设置视口和 480×320 像素的虚拟目标分辨率。使用 `SpriteBatcher` 来渲染 UI 元素和背景图片。`Vector2`\
  \ 和 `Rectangle` 实例将帮助您判断触摸是否命中了某个按钮。\n\n```java\n    public MainMenuScreen(Game\
  \ game) {\n        super(game);\n        \n        guiCam = new Camera2D(glGraphics,\
  \ 480, 320);\n        batcher = new SpriteBatcher(glGraphics, 10);\n        touchPoint\
  \ = new Vector2();\n        playBounds = new Rectangle(240 - 112, 100, 224, 32);\n\
  \        settingsBounds = new Rectangle(240 - 112, 100 - 32, 224, 32);\n    }\n\
  ```\n\n在构造函数中，像往常一样设置摄像头和 `SpriteBatcher`。根据屏幕上两个元素在 480×320 目标分辨率下的位置、宽度和高度，实例化\
  \ `Vector2` 和 `Rectangles`。\n\n```java\n    @Override\n    public void update(float\
  \ deltaTime) {\n        List<TouchEvent> events = game.getInput().getTouchEvents();\n\
  \        int len = events.size();\n        for (int i = 0; i < len; i++) {\n   \
  \         TouchEvent event = events.get(i);\n            if (event.type != TouchEvent.TOUCH_UP)\n\
  \                continue;\n            \n            guiCam.touchToWorld(touchPoint.set(event.x,\
  \ event.y));\n            if (OverlapTester.pointInRectangle(playBounds, touchPoint))\
  \ {\n                Assets.playSound(Assets.clickSound);\n                game.setScreen(new\
  \ GameScreen(game));\n            }\n            if (OverlapTester.pointInRectangle(settingsBounds,\
  \ touchPoint)) {\n                Assets.playSound(Assets.clickSound);\n       \
  \         game.setScreen(new SettingsScreen(game));\n            }\n        }\n\
  \    }\n```\n\n在 `update()` 方法中，获取触摸事件并检查是否为“触摸抬起”事件。如果存在此类事件，将其实际坐标转换为摄像头设置的坐标系。剩下的工作就是将触摸点与包围菜单项的两个矩形进行碰撞检测。如果其中一个被命中，则播放点击音效并切换到相应的界面。\n\
  \n```java\n    @Override\n    public void present(float deltaTime) {\n        GL10\
  \ gl = glGraphics.getGL();\n        gl.glClear(GL10.GL_COLOR_BUFFER_BIT);\n    \
  \    guiCam.setViewportAndMatrices();\n        \n        gl.glEnable(GL10.GL_TEXTURE_2D);\n\
