- "# Android SDK 初步上手\n\nAndroid SDK 提供了一套工具，让你能迅速创建应用程序。本章将指导你使用 SDK 工具构建一个简单的 Android\
  \ 应用程序。这涉及以下步骤：\n\n1.  搭建开发环境。\n2.  在 Eclipse 中创建新项目并编写代码。\n3.  在模拟器或真机上运行应用程序。\n\
  4.  调试和分析应用程序。\n\n我们从搭建开发环境开始。\n\n## 搭建开发环境\n\nAndroid SDK 非常灵活，能与多种开发环境良好集成。纯粹主义者可能会选择使用命令行工具，走得硬核路线。不过，我们希望事情能更舒适一些，因此我们将采用更简单、更直观的方式，使用\
  \ IDE（集成开发环境）。\n\n以下是需要按给定顺序下载和安装的软件清单：\n\n1.  Java 开发工具包 (JDK)，版本 5 或 6。我们建议使用版本\
  \ 6。\n2.  Android 软件开发工具包 (Android SDK)。\n3.  针对 Java 开发者的 Eclipse，版本 3.4 或更高。\n\
  4.  Eclipse 的 Android 开发工具 (ADT) 插件。\n\n让我们逐步完成正确配置所有内容所需的步骤。\n\n**注意：** 鉴于网络内容时刻在变化，我们在此不提供具体网址。请启动你最喜欢的搜索引擎，查找上述项目的下载位置。\n\
  \n### 安装 JDK\n\n为你的操作系统下载指定版本的 JDK。在大多数系统上，JDK 以安装程序或软件包的形式提供，因此通常不会有问题。安装好 JDK\
  \ 后，你需要添加一个名为 `JDK_HOME` 的新环境变量，指向 JDK 安装的根目录。此外，你应该将 `$JDK_HOME/bin` 目录（在 Windows\
  \ 上是 `%JDK_HOME%\\bin`）添加到你的 `PATH` 环境变量中。\n\n\n\n### 设置 Android SDK\n\nAndroid\
  \ SDK 同样适用于三种主流桌面操作系统。请根据你的平台选择对应版本并下载。SDK 以 ZIP 或 tar.gz 压缩包形式提供，只需将其解压到方便管理的文件夹中（例如\
  \ Windows 系统的 `c:\\android-sdk` 或 Linux 系统的 `/opt/android-sdk`）。SDK 的 `tools/` 文件夹中包含若干命令行工具。请创建一个名为\
  \ `ANDROID_HOME` 的环境变量，指向 SDK 安装的根目录，并将 `$ANDROID_HOME/tools`（Windows 系统为 `%ANDROID_HOME%\\\
  tools`）添加到你的 `PATH` 环境变量中。这样，日后需要时，你就能轻松地从命令行中调用这些工具。\n\n完成上述步骤后，你将得到一个基础安装环境，其中包含创建、编译和部署\
  \ Android 项目所需的基本命令行工具，以及 SDK 和 AVD 管理器——一个用于安装 SDK 组件和创建模拟器所用虚拟设备的工具。仅凭这些工具还不足以开始开发工作，因此你需要安装额外的组件。这时就需要用到\
  \ SDK 和 AVD 管理器。该管理器是一个包管理器，类似于你在 Linux 上见到的包管理工具。它允许你安装以下类型的组件：\n\n> *Android 平台*：每个官方\
  \ Android 版本都有一套对应的 SDK 平台组件，包含运行时库、模拟器使用的系统镜像以及任何特定版本的开发工具。\n>\n> *SDK 附加组件*：附加组件通常是独立于具体平台的外部库和工具。例如，**Google\
  \ APIs** 就属于此类，它允许你在应用中集成谷歌地图。\n>\n> *Windows 系统下的 USB 驱动程序*：此驱动程序是你在 Windows 系统上运行和调试实体设备应用所必需的。在\
  \ Mac OS X 和 Linux 系统上，则无需特殊驱动。\n>\n> *示例代码*：每个平台都附带一组特定于该平台的示例代码。这些是学习如何使用 Android\
  \ 运行时库实现特定功能的重要资源。\n>\n> *文档*：这是最新 Android 框架 API 文档的本地副本。\n\n作为贪婪的开发者，我们当然想要安装所有这些组件，以便能随时使用全套功能。因此，我们首先需要启动\
  \ SDK 和 AVD 管理器。在 Windows 系统上，SDK 根目录下有一个名为 `SDK manager.exe` 的可执行文件。在 Linux 和 Mac\
  \ OS X 系统上，只需运行 `tools` 目录下的 `android` 脚本即可。\n\n首次启动时，SDK 和 AVD 管理器将连接到包服务器并获取可用包列表。随后，管理器会弹出如图\
  \ 2‑1 所示的对话框，允许你安装单个组件。只需勾选“全部接受”，点击“安装”按钮，然后为自己泡杯好茶或咖啡。管理器需要花一些时间来完成所有包的安装。\n\n\
  ![images](img/0201.jpg)\n\n**图 2‑1.** *首次接触 SDK 和 AVD 管理器*\n\n你可以随时使用 SDK 和 AVD\
  \ 管理器来更新组件或安装新组件。该管理器还用于创建新的 AVD（Android 虚拟设备），这在后续我们开始在模拟器上运行和调试应用时是必需的。\n\n一旦安装过程完成，你就可以继续下一步，设置开发环境了。\n\
  \n### 安装 Eclipse\n\nEclipse 有多种版本。对于 Android 开发者，我们建议使用 Eclipse for Java Developers\
  \ 3.6 版本。与 Android SDK 类似，Eclipse 以 ZIP 或 tar.gz 压缩包形式提供。只需将其解压到你选择的文件夹中即可。解压完成后，你可以在桌面上为\
  \ Eclipse 安装根目录下的 `eclipse` 可执行文件创建一个快捷方式。\n\n首次启动 Eclipse 时，系统会提示你指定一个工作空间目录。图\
  \ 2‑2 展示了这个对话框。\n\n![images](img/0202.jpg)\n\n**图 2‑2.** *选择工作空间*\n\n工作空间是 Eclipse\
  \ 中用来包含一组项目的文件夹。你可以为所有项目使用单个工作空间，也可以使用多个工作空间来分别管理不同的项目组，这完全取决于你。本书附带的示例项目都组织在单个工作空间中，你可以在此对话框中指定该目录。现在，我们只需在某个位置创建一个空的工作空间。\n\
  \n之后，Eclipse 会显示一个欢迎界面，你可以放心地忽略并关闭它。关闭后你将看到默认的 Eclipse Java 透视图。后续章节中你会更深入地了解 Eclipse。目前，让它运行起来就足够了。\n\
  \n\n\n### 安装 ADT Eclipse 插件\n\n我们搭建环境配置中的最后一步是安装 ADT Eclipse 插件。Eclipse 基于插件架构，可借助第三方插件扩展其功能。ADT\
  \ 插件将 Android SDK 中的工具与 Eclipse 的强大功能融为一体。通过这种组合，我们完全可以忘记调用那些命令行式的 Android SDK 工具；ADT\
  \ 插件将这些工具透明地集成到我们的 Eclipse 工作流程中。\n\n为 Eclipse 安装插件有两种方式：手动安装（将插件 ZIP 文件的内容解压到 Eclipse\
  \ 的插件文件夹），或通过 Eclipse 自带的插件管理器进行安装。这里我们将选择第二种方式。\n\n1.  要安装新插件，请转到 **帮助 > 安装新软件...**，这将打开安装对话框。在此对话框中，你可以选择安装插件的来源。首先，你需要添加要获取的\
  \ ADT 插件的仓库。点击**添加**按钮。系统将显示图 2-3 所示的对话框。\n2.  在第一个文本字段中，你可以输入仓库名称，例如“ADT 仓库”即可。第二个文本字段用于指定仓库的\
  \ URL。对于 ADT 插件，该字段应填写 `https://dl-ssl.google.com/android/eclipse/`。请注意，此 URL 可能因版本更新而有所不同，因此请务必查看\
  \ ADT 插件网站以获取最新链接。\n\n    ![图片](img/0203.jpg)\n\n    **图 2-3.** *添加仓库*\n\n3.  确认对话框后，你将返回安装对话框，此时对话框应正在获取仓库中可用插件的列表。勾选**开发者工具**复选框，然后点击**下一步**按钮。\n\
  4.  Eclipse 现在将计算所有必要的依赖项，然后会弹出一个新对话框，列出将要安装的所有插件及其依赖项。点击**下一步**按钮确认。\n5.  将弹出另一个对话框，提示你接受每个待安装插件的许可协议。当然，你应该接受这些许可协议，最后点击**完成**按钮开始安装。\n\
  \n    **注意：**安装过程中，系统会要求你确认安装未经签名的软件。不必担心，这些插件只是没有经过验证的签名而已。同意安装以继续该过程。\n\n6.  最后，Eclipse\
  \ 会询问是否应重启以应用更改。你可以选择完全重启，也可以选择不重启而应用更改。为了稳妥起见，请选择**立即重启**，这将按预期重新启动 Eclipse。\n\n\
  Eclipse 重启后，你将看到与之前相同的 Eclipse 窗口。工具栏上增加了几个针对 Android 的新按钮，使你可以直接在 Eclipse 中启动 SDK\
  \ 和 AVD 管理器，以及创建新的 Android 项目。图 2-4 展示了这些新的工具栏按钮。\n\n![图片](img/0204.jpg)\n\n**图\
  \ 2-4.** *ADT 工具栏按钮*\n\n左侧第一个按钮允许你打开 AVD 和 SDK 管理器。下一个按钮是创建新 Android 项目的快捷方式。另外两个按钮将创建新的单元测试项目或\
  \ Android 清单文件（这些功能我们在本书中不会用到）。\n\n作为完成 ADT 插件安装的最后一步，你需要告知插件 Android SDK 的位置。\n\
  \n1.  打开**窗口 > 首选项**，在出现的对话框的树形视图中选择**Android**。\n2.  在右侧，点击**浏览**按钮，选择你的 Android\
  \ SDK 安装根目录。\n3.  点击**确定**按钮关闭对话框。现在，你就可以创建你的第一个 Android 应用程序了。\n\n### Eclipse 快速导览\n\
  \nEclipse 是一个开源 IDE，可用于开发用多种语言编写的应用程序。通常，Eclipse 用于 Java 开发。得益于 Eclipse 的插件架构，已经创建了许多扩展，因此也可以开发纯\
  \ C/C++、Scala 或 Python 项目。其可能性是无限的；例如，甚至还有用于编写 LaTeX 项目的插件——这与你平常的代码开发任务有些许相似之处。\n\
  \n一个 Eclipse 实例使用一个包含一个或多个项目的工作空间。之前，我们启动时定义了一个工作空间。你创建的所有新项目都将存储在工作空间目录中，同时存储的还有定义了使用该工作空间时\
  \ Eclipse 外观的配置以及其他内容。\n\nEclipse 的用户界面 (UI) 围绕两个概念展开：\n\n*   **视图**：一个独立的 UI 组件，例如源代码编辑器、输出控制台或项目资源管理器。\n\
  *   **透视图**：一组特定的视图，通常是你为特定开发任务（例如，编辑和浏览源代码、调试、性能分析、与版本控制仓库同步等）最可能需要用到的。\n\nEclipse\
  \ for Java Developers 提供了几个预定义的透视图。我们最感兴趣的两个透视图叫做 `Java` 和 `Debug`。`Java` 透视图如图\
  \ 2-5 所示。它在左侧显示**包资源管理器**视图，中间是源代码编辑视图（此处为空，因为我们尚未打开源文件），右侧有**任务列表**视图、**大纲**视图，以及一个包含名为**问题**视图、**Javadoc**\
  \ 视图和**声明**视图等子视图的选项卡式视图。\n\n![图片](img/0205.jpg)\n\n**图 2-5.** *Eclipse 运行中——Java\
  \ 透视图*\n\n你可以通过拖放自由调整透视图内任何视图的位置，也可以调整视图大小。此外，你还可以向透视图添加或移除视图。要添加视图，请转到**窗口 > 显示视图**，然后从列表中选择一个，或选择**其他...**\
  \ 以获取所有可用视图的列表。\n\n要切换到其他透视图，你可以转到**窗口 > 打开透视图**，然后选择你想要的。一种在已打开的透视图之间切换的更快方法是在\
  \ Eclipse 的左上角。在这里你可以看到哪些透视图已经打开，以及哪个透视图是活动的。在图 2-5 中，请注意 `Java` 透视图是打开且活动的。它是当前唯一打开的透视图。一旦你打开其他透视图，它们也会显示在\
  \ UI 的那个部分。\n\n图 2-5 中显示的工具栏也仅是视图。根据你当前所处的透视图，工具栏也可能会发生变化。回想一下，在我们安装 ADT 插件后，工具栏中出现了几个新按钮。这是插件的常见行为：它们通常会增加新的视图和透视图。就\
  \ ADT 插件而言，除了标准的 `Java 调试`透视图之外，我们现在还可以访问一个名为 DDMS（Dalvik 调试监控服务，专门用于调试和分析 Android\
  \ 应用程序）的透视图。ADT 插件还添加了几个新视图，包括 `LogCat` 视图，该视图会显示任何已连接设备或模拟器的实时日志信息。\n\n一旦你熟悉了透视图和视图的概念，Eclipse\
  \ 就不会那么令人生畏了。在接下来的小节中，我们将探索一些我们将用来编写 Android 游戏的透视图和视图。我们不可能涵盖使用 Eclipse 进行开发的所有细节，因为它是一个庞然大物。因此，我们建议，如有需要，你可以通过其详尽的帮助系统来了解更多关于\
  \ Eclipse 的知识。\n\n\n\n#### 实用的 Eclipse 快捷键\n\n每个新的集成开发环境都需要一些时间来学习和适应。经过多年使用 Eclipse，我们发现以下快捷键能显著加快软件开发速度。这些快捷键使用的是\
  \ Windows 术语，Mac OS X 用户应相应地使用 `Command` 和 `Option` 键代替：\n\n*   将光标放在函数或字段上并按 `Ctrl+Shift+G`，即可在工作空间中搜索对该函数或字段的所有引用。例如，如果你想查看某个函数在哪里被调用，只需点击将光标移到该函数上，然后按\
  \ `Ctrl+Shift+G`。\n*   将光标放在函数调用上并按 `F3`，即可跟踪该调用并跳转到声明和定义该函数的源代码。将此快捷键与 `Ctrl+Shift+G`\
  \ 结合使用，可以轻松导航 Java 源代码。\n*   `Ctrl+Space` 可自动补全你正在输入的函数或字段名。输入几个字符后按下此快捷键。当有多个可能选项时，会出现一个选择框。\n\
  *   `Ctrl+Z` 是撤销。\n*   `Ctrl+X` 是剪切。\n*   `Ctrl+C` 是复制。\n*   `Ctrl+V` 是粘贴。\n*  \
  \ `Ctrl+F11` 用于运行应用程序。\n*   `F11` 用于调试应用程序。\n*   `Ctrl+Shift+O` 用于组织当前源文件的 Java\
  \ 导入。\n*   `Ctrl+Shift+F` 用于格式化当前源文件。\n*   `Ctrl+Shift+T` 用于跳转到任何 Java 类。\n*   `Ctrl+Shift+R`\
  \ 用于跳转到任何资源文件，例如图像、文本文件等。\n\nEclipse 中还有许多其他有用的功能，但掌握这些基本的键盘快捷键可以显著加快你的游戏开发速度，让\
  \ Eclipse 的使用体验更美好。Eclipse 的可配置性也很高。这些键盘快捷键中的任何一个都可以在“首选项”中重新分配给不同的按键。\n\n### 你好，世界：Android\
  \ 风格\n\n开发环境搭建好后，我们现在可以在 Eclipse 中创建我们的第一个 Android 项目。ADT 插件安装了几个向导，使得创建新的 Android\
  \ 项目变得非常容易。\n\n#### 创建项目\n\n创建新 Android 项目有两种方法。第一种方法是在包资源管理器视图中右键单击（参见 图 2-4），然后从弹出的菜单中选择\
  \ **新建 ![images](img/U001.jpg) 项目…**。在弹出的对话框中，在“Android”类别下选择“Android 项目”。如你所见，该对话框中还有许多其他创建项目的选项。这是在\
  \ Eclipse 中创建任何类型新项目的标准方法。确认对话框后，Android 项目向导将打开。\n\n第二种方法要简单得多：只需单击创建新 Android\
  \ 项目的按钮（如前面的 图 2-4 所示）。\n\n进入 Android 项目向导对话框后，你需要做出一些决定。\n\n1.  首先，你必须定义项目名称。通常的惯例是使用小写字母。在本例中，将项目命名为“helloworld”。\n\
  2.  接下来，你必须指定构建目标。目前，只需选择 Android 1.5 构建目标，因为这是最低共同基准，而且你暂时不需要像多点触控这样高级的功能。\n\n\
  \   **注意：** 在第 1 章中，你看到 Android 的每个新版本都会向 Android 框架 API 添加新的类。构建目标指定了你想在应用程序中使用哪个版本的\
  \ API。例如，如果你选择 Android 3.1 构建目标，你就可以使用最新、最强大的 API 功能。但这伴随着风险：如果你的应用程序在 API 版本较低的设备（例如运行\
  \ Android 1.5 版本的设备）上运行，当你访问仅在版本 3.1 中可用的 API 功能时，应用程序将会崩溃。在这种情况下，你需要在运行时检测支持的 SDK\
  \ 版本，并且仅在确定设备上的 Android 版本支持此版本时，才访问 3.1 的功能。这听起来可能很麻烦，但正如你将在第 5 章中看到的，只要应用程序架构良好，你就可以轻松启用或禁用特定于某些版本的功能，而无需冒崩溃的风险。\n\
  \n3.  接下来，你需要指定应用程序的名称（例如 `Hello World`）、所有源文件最终所在的 Java 包名称（例如 `com.helloworld`）以及一个活动名称。活动类似于桌面操作系统中的窗口或对话框。我们就把这个活动命名为\
  \ `HelloWorldActivity`。\n4.  “最低 SDK 版本”字段允许你指定运行应用程序所需的最低 Android 版本。此参数不是必需的，但建议指定。SDK\
  \ 版本从 1（1.0）开始编号，并随每个新版本递增。由于 1.5 是第三个版本，请在此处指定 3。请记住，你之前必须指定一个构建目标，它可能比最低 SDK 版本更新。这使你可以使用更高的\
  \ API 级别，同时也能部署到较旧版本的 Android 上（当然，前提是确保只调用该版本支持的 API 方法）。\n5.  点击“完成”来创建你的第一个 Android\
  \ 项目。\n\n   **注意：** 设置最低 SDK 版本有一些影响。应用程序只能在 Android 版本等于或高于你指定的最低 SDK 版本的设备上运行。当用户通过\
  \ Market 应用浏览 Android Market 时，仅会显示具有适当最低 SDK 版本的应用程序。\n\n#### 探索项目\n\n在包资源管理器中，你现在应该会看到一个名为“helloworld”的项目。展开它及其所有子项，你将看到类似\
  \ 图 2-6 的内容。这是大多数 Android 项目的通用结构。让我们稍微探索一下。\n\n*   `AndroidManifest.xml` 描述你的应用程序。它定义了你的应用程序包含哪些活动和服务，理论上运行在什么最低和目标\
  \ Android 版本上，以及需要哪些权限（例如，访问 SD 卡或网络）。\n*   `default.properties` 保存构建系统的各种设置。我们不打算修改它，因为\
  \ ADT 插件会在必要时自动处理它的修改。\n*   `src/` 包含你所有的 Java 源文件。请注意，包名与你之前在 Android 项目向导中指定的名称相同。\n\
  *   `gen/` 包含由 Android 构建系统生成的 Java 源文件。你不应该修改它们，因为在某些情况下，它们会自动重新生成。\n*   `assets/`\
  \ 用于存放应用程序所需的文件（例如配置文件、音频文件等）。这些文件会与你的 Android 应用程序打包在一起。\n*   `res/` 保存应用程序所需的资源，例如图标、用于国际化的字符串以及通过\
  \ XML 定义的 UI 布局。与 assets 一样，这些资源也会与你的应用程序打包在一起。\n*   Android 1.5 告诉我们，我们正在针对 Android\
  \ 1.5 版本目标进行构建。这实际上是一个依赖，以标准 JAR 文件的形式存在，其中包含了 Android 1.5 API 的类。\n\n包资源管理器视图隐藏了另一个目录，名为\
  \ `bin/`，它存放着准备部署到设备或模拟器的编译代码。与 `gen/` 文件夹一样，我们通常不关心该文件夹中的内容。\n\n![images](img/0206.jpg)\n\
  \n**图 2-6.** *Hello World 项目结构*\n\n我们可以通过在包资源管理器视图中右键单击要放置新资源的文件夹，然后选择“新建”加上要创建的相应资源类型，轻松地添加新的源文件、文件夹和其他资源。不过，目前我们先保持现状。接下来，我们稍微修改一下源代码。\n\
  \n\n\n### 编写应用代码\n\n我们还没有编写过一行代码，现在该动手了。Android 项目向导已经为我们创建了一个名为 `HelloWorldActivity`\
  \ 的模板 Activity 类，当我们在模拟器或设备上运行应用时，这个类将会被显示出来。在 Package Explorer 视图中双击该文件，打开类的源代码。我们将用代码清单\
  \ 2–1 中的代码替换掉模板代码。\n\n**代码清单 2–1.** `HelloWorldActivity.java`\n\n```java\npackage\
  \ com.helloworld;\nimport android.app.Activity;\nimport android.os.Bundle;\nimport\
  \ android.view.View;\nimport android.widget.Button;\npublic class HelloWorldActivity\
  \ extends Activity\nimplements View.OnClickListener {\n    Button button;\n    int\
  \ touchCount;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        button = new Button(this);\n\
  \        button.setText(\"Touch me!\");\n        button.setOnClickListener(this);\n\
  \        setContentView(button);\n    }\n    public void onClick(View v) {\n   \
  \     touchCount++;\n        button.setText(\"Touched me \" + touchCount + \" time(s)\"\
  );\n    }\n}\n```\n\n我们来剖析一下代码清单 2–1，以便理解它的作用。详细的细节将留到后续章节再讲，现在我们只需要了解大致原理。\n\n\
  源代码文件以标准的 Java 包声明和几个 import 语句开头。大多数 Android 框架类都位于 `android` 包中。\n\n```java\n\
  package com.helloworld;\n\nimport android.app.Activity;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.widget.Button;\n```\n\n接下来，我们定义 `HelloWorldActivity`，并让它继承\
  \ Android 框架 API 提供的基类 `Activity`。`Activity` 类似于经典桌面 UI 中的窗口，但有一个限制：`Activity` 总是填满整个屏幕（除了\
  \ Android UI 顶部的通知栏）。此外，我们还让 `Activity` 实现 `OnClickListener` 接口。如果你有其他 UI 工具包的使用经验，很可能已经猜到下一步要做什么了。稍后会有更详细的说明。\n\
  \n```java\npublic class HelloWorldActivity extends Activity\nimplements View.OnClickListener\
  \ {\n```\n\n我们让 `Activity` 拥有两个成员变量：一个 `Button` 和一个用于记录按钮点击次数的整数。\n\n```java\n \
  \   Button button;\n    int touchCount;\n```\n\n每个 `Activity` 都必须实现抽象方法 `Activity.onCreate()`，当\
  \ Activity 首次启动时，Android 系统会调用该方法一次。它替代了你通常用来创建类实例的构造函数。在方法体中的第一条语句必须是调用基类的 `onCreate()`\
  \ 方法。\n\n```java\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n```\n\n接着，我们创建一个 `Button` 并设置其初始文本。`Button`\
  \ 是 Android 框架 API 提供的众多 Widget 之一。在 Android 中，Widget 与所谓的 `View` 是同义词。注意，`button`\
  \ 是我们 `HelloWorldActivity` 类的一个成员变量，稍后我们需要引用它。\n\n```java\n        button = new\
  \ Button(this);\n        button.setText(\"Touch me!\");\n```\n\n`onCreate()` 中的下一行设置了\
  \ `Button` 的 `OnClickListener`。`OnClickListener` 是一个回调接口，包含一个方法 `OnClickListener.onClick()`，当\
  \ `Button` 被点击时会被调用。我们希望收到点击通知，因此让 `HelloWorldActivity` 实现该接口，并将其注册为 `Button` 的\
  \ `OnClickListener`。\n\n```java\n        button.setOnClickListener(this);\n```\n\
  \n`onCreate()` 方法中的最后一行将 `Button` 设置为 `Activity` 所谓的 content `View`。`View` 是可以嵌套的，而\
  \ `Activity` 的 content `View` 是这一层级结构的根节点。在我们的例子中，我们简单地将 `Button` 设置为 `Activity`\
  \ 要显示的 `View`。为了简单起见，我们不深入讨论在此 content `View` 下 `Activity` 将如何布局的细节。\n\n```java\n\
  \        setContentView(button);\n    }\n```\n\n下一步是实现接口要求 `Activity` 提供的 `OnClickListener.onClick()`\
  \ 方法。每次 `Button` 被点击时，该方法都会被调用。在这个方法中，我们增加 `touchCount` 计数器，并设置 `Button` 的文本为新字符串。\n\
  \n```java\n    public void onClick(View v) {\n        touchCount++;\n        button.setText(\"\
  Touched me \" + touchCount + \" time(s)\");\n    }\n}\n```\n\n因此，总结一下我们的 `Hello\
  \ World` 应用：我们构建了一个包含 `Button` 的 `Activity`。每次 `Button` 被点击时，我们通过相应地设置其文本来反映这一操作。（这或许不是世界上最激动人心的应用，但足以用于后续的演示目的。）\n\
  \n请注意，我们从未需要手动编译任何东西。ADT 插件与 Eclipse 协同工作，每当我们添加、修改或删除源文件或资源时，都会重新编译项目。编译过程的结果是一个\
  \ APK 文件，可直接部署到模拟器或 Android 设备上。APK 文件位于项目的 `bin/` 文件夹中。\n\n在接下来的小节中，你将使用此应用来学习如何在模拟器实例以及真实设备上运行和调试\
  \ Android 应用。\n\n## 运行和调试 Android 应用\n\n编写完第一版应用代码后，我们想要运行并测试它，以便发现潜在问题，或者仅仅是欣赏它的“风采”。我们有两种方式可以实现这一点：\n\
  \n-   在通过 USB 连接到开发电脑的真实设备上运行应用。\n-   启动 SDK 中包含的模拟器，并在其中测试应用。\n\n在这两种情况下，我们都需要做一些准备工作，才能最终看到应用运行起来。\n\
  \n### 连接设备\n\n在连接设备进行测试之前，我们必须确保操作系统能够识别它。在 Windows 上，这涉及安装合适的驱动程序，这些驱动程序是我们之前安装的\
  \ SDK 的一部分。只需连接你的设备，并按照标准的 Windows 驱动程序安装流程操作，将安装路径指向 SDK 安装根目录下的 `driver/` 文件夹。对于某些设备，你可能需要从制造商网站获取驱动程序。许多设备可以使用\
  \ SDK 自带的 Android ADB 驱动程序；然而，通常需要将特定设备的硬件 ID 添加到 INF 文件中。快速搜索设备名称和“Windows ADB”，通常就能找到连接该特定设备所需的信息。\n\
  \n在 Linux 和 Mac OS X 上，通常不需要安装任何驱动程序，因为操作系统已自带。根据你使用的 Linux 发行版，你可能需要稍微调整 USB 设备发现机制，通常是创建一个新的\
  \ `udev` 规则文件。这因设备而异。快速进行网络搜索应该就能找到适用于你设备的解决方案。\n\n\n\n### 创建安卓虚拟设备\n\nSDK 自带一个模拟器，可运行所谓的安卓虚拟设备。*虚拟设备*包含特定安卓版本的系统镜像、外观以及一组属性，其中包括屏幕分辨率、SD\
  \ 卡大小等。\n\n要创建 AVD，你必须启动 SDK 和 AVD 管理器。你可以按照之前 SDK 安装步骤中所述的方法操作，或者直接在 Eclipse 中点击工具栏上的\
  \ SDK 管理器按钮。\n\n1. 在左侧列表中选择`虚拟设备`。你将看到当前可用的 AVD 列表。除非你已经操作过 SDK 管理器，否则此列表应为空；让我们来改变这一点。\n\
  2. 要创建新的 AVD，请点击右侧的`新建…`按钮，这将弹出如图 2–7 所示的对话框。\n\n   ![images](img/0207.jpg)\n\n\
  \   **图 2–7.** *SDK 管理器的 AVD 创建对话框*\n\n3. 每个 AVD 都有一个名称，供你之后引用。目标平台指定 AVD 应使用的安卓版本。此外，你还可以指定\
  \ AVD 的 SD 卡大小和屏幕尺寸。对于简单的“hello world”项目，你可以选择 Android 1.5 目标平台，其他设置保持默认即可。对于实际测试，你通常需要创建多个\
  \ AVD，涵盖你希望应用支持的所有安卓版本和屏幕尺寸。\n\n**注意**：除非你拥有十几台不同安卓版本和屏幕尺寸的设备，否则你应该使用模拟器对安卓版本/屏幕尺寸组合进行额外的测试。\n\
  \n### 运行应用程序\n\n现在你已经设置好了设备和 AVD，终于可以运行`Hello World`应用程序了。在 Eclipse 中，你可以轻松实现这一点：在包资源管理器视图中右键点击“hello\
  \ world”项目，然后选择**运行为 ![images](img/U001.jpg) 安卓应用程序**（或者点击工具栏上的运行按钮）。然后 Eclipse\
  \ 将在后台执行以下步骤：\n\n1. 如果自上次编译后有任何文件发生更改，则将项目编译为 APK 文件。\n2. 如果尚不存在，则为安卓项目创建新的运行配置。（稍后我们将介绍运行配置。）\n\
  3. 通过启动或重用已运行的、具有合适安卓版本的模拟器实例，或者在已连接的设备上部署并运行应用程序（该设备也至少需要运行你在创建项目时指定的最低安卓版本，即 Min\
  \ SDK Level 参数），来安装并运行该应用程序。\n\n如果你按照上一节的建议只创建了一个 Android 1.5 的 AVD，那么 ADT Eclipse\
  \ 插件将启动一个运行该 AVD 的新模拟器实例，部署 Hello World APK 文件，然后启动应用程序。输出结果应如图 2–8 所示。\n\n![images](img/0208.jpg)\n\
  \n**图 2–8.** *运行中的 Hello World 应用程序*\n\n模拟器的工作方式几乎与真实设备完全相同，你可以通过鼠标像在设备上用*手指*一样与之交互。以下是真实设备与模拟器之间的一些差异：\n\
  \n- 模拟器仅支持单点触控输入。只需使用鼠标光标，将其当作你的手指即可。\n- 模拟器缺少一些应用程序，例如安卓市场。\n- 要改变屏幕上设备的方向，不要倾斜你的显示器。相反，请使用数字键盘上的\
  \ 7 键来改变方向。你必须先按下数字键盘上方的`Num Lock`键来禁用其数字功能。\n- 模拟器非常慢。不要通过在模拟器上运行来评估应用程序的性能。\n\
  - 模拟器目前仅支持带有少量扩展的 OpenGL ES 1.0。我们将在第 7 章中讨论 OpenGL ES。这对我们的目的来说没问题，只是模拟器上的 OpenGL\
  \ ES 实现存在缺陷，并且它经常给出与实际设备上截然不同的结果。目前，请记住不要在模拟器上测试任何 OpenGL ES 应用程序。\n\n稍微玩转一下它，熟悉熟悉。\n\
  \n**注意**：启动一个新的模拟器实例需要相当长的时间（取决于你的硬件，最多可达 10 分钟）。你可以在整个开发过程中让模拟器保持运行，这样就不必反复重启，或者在创建或编辑\
  \ AVD 时勾选“快照”选项，这将允许你保存和恢复 VM 的快照，从而实现快速启动。\n\n有时当我们运行安卓应用程序时，ADT 插件执行的自动模拟器/设备选择会成为一种障碍。例如，我们可能连接了多个设备/模拟器，但想要在特定的设备/模拟器上测试应用程序。为解决这个问题，我们可以在安卓项目的运行配置中关闭自动设备/模拟器选择。那么，什么是运行配置呢？\n\
  \n运行配置提供了一种方式，告诉 Eclipse 当你让它运行应用程序时应该如何启动你的程序。运行配置通常允许你指定传递给应用程序的命令行参数、VM 参数（针对\
  \ Java SE 桌面应用程序的情况）等等。Eclipse 和第三方插件为特定类型的项目提供了不同的运行配置。ADT 插件在可用的运行配置集中添加了一个安卓应用程序运行配置。当我们在本章前面首次运行应用程序时，Eclipse\
  \ 和 ADT 使用默认参数在后台为我们创建了一个新的安卓应用程序运行配置。\n\n要进入安卓项目的运行配置，请执行以下操作：\n\n1. 在包资源管理器视图中右键点击项目，选择**运行为\
  \ ![images](img/U001.jpg) 运行配置。**\n2. 从左侧列表中选择“hello world”项目。\n3. 在对话框的右侧，你现在可以修改运行配置的名称，并在安卓、目标和通用选项卡上更改其他设置。\n\
  4. 要将自动部署更改为手动部署，请点击`目标`选项卡并选择`手动`。\n\n当你再次运行应用程序时，系统会提示你选择一个兼容的模拟器或设备来运行该应用程序。图\
  \ 2–9 显示了此对话框。在此图中，我们添加了几个具有不同目标平台的 AVD，并连接了两台设备。\n\n![images](img/0209.jpg)\n\n\
  **图 2–9.** *选择运行应用程序的模拟器/设备*\n\n该对话框显示了所有正在运行的模拟器和当前已连接的设备，以及所有其他当前未运行的 AVD。你可以选择任何模拟器或设备来运行你的应用程序。\n\
  \n\n\n### 调试应用程序\n\n有时你的应用程序会出现意外行为或崩溃。要弄清究竟哪里出了问题，你需要能够调试应用程序。\n\n`Eclipse` 和 `ADT`\
  \ 为 Android 应用程序提供了极其强大的调试功能。我们可以在源代码中设置断点，检查变量和当前堆栈跟踪，等等。\n\n在调试应用程序之前，我们必须修改其\
  \ `AndroidManifest.xml` 文件以启用调试。这有点像是先有鸡还是先有蛋的问题，因为我们还没有详细研究过清单文件。目前，你只需知道清单文件指定了应用程序的一些属性。其中一个属性就是应用程序是否可调试。该属性以\
  \ `xml` 属性的形式在清单文件的 `<application>` 标签中指定。要启用调试，我们在清单文件的 `<application>` 标签中添加以下属性：\n\
  \n`android:debuggable=\"true\"`\n\n在开发应用程序期间，你可以安全地将该属性保留在清单文件中。但在发布应用程序到市场之前，别忘了删除该属性。\n\
  \n现在你已经将应用程序设置为可调试状态，就可以在模拟器或设备上进行调试了。通常，你会在调试前设置断点，以便在程序的特定点检查程序状态。\n\n要设置断点，只需在\
  \ `Eclipse` 中打开源文件，然后双击你想要设置断点那一行前面的灰色区域。为了演示，我们在 `HelloWorldActivity` 类的第 23 行执行此操作。这将使调试器每次点击按钮时暂停。在双击后，源代码视图应该会显示那一行前面出现一个小圆圈，如图\
  \ 2–10 所示。你可以通过在源代码视图中再次双击断点来移除它们。\n\n![images](img/0210.jpg)\n\n**图 2–10.** *设置断点*\n\
  \n启动调试与运行应用程序非常相似，如上一节所述。在包资源管理器视图中右键点击项目，然后选择 **调试方式** ![images](img/U001.jpg)\
  \ **Android 应用程序**。这将为你的项目创建一个新的调试配置，就像直接运行应用程序一样。你可以通过从上下文菜单中选择 **调试方式** ![images](img/U001.jpg)\
  \ **调试配置** 来更改该调试配置的默认设置。\n\n**注意：** 除了通过包资源管理器视图中的项目上下文菜单，你也可以使用“运行”菜单来运行和调试应用程序，以及访问配置。\n\
  \n如果你启动第一次调试会话，`Eclipse` 会询问你是否要切换到调试透视图，你可以确认。我们先来看看这个透视图。图 2–11 展示了我们开始调试 `Hello\
  \ World` 应用程序后的样子。\n\n![images](img/0211.jpg)\n\n**图 2–11.** *调试透视图*\n\n如果你还记得我们对\
  \ `Eclipse` 的快速浏览，那么你就会知道有几种不同的透视图，它们由一组针对特定任务的视图组成。调试透视图与 Java 透视图看起来截然不同。\n\n\
  -   第一个要注意的新视图是左上角的调试视图。它显示所有当前正在运行的应用程序，如果应用程序以调试模式运行，还会显示其所有线程的堆栈跟踪。\n-   调试视图下方是我们在\
  \ Java 透视图中也使用过的源代码编辑视图。\n-   控制台视图会打印来自 `ADT` 插件的消息，告诉我们它在做什么。\n-   `LogCat` 视图将是你开发之旅中的最佳助手之一。此视图显示运行你应用程序的模拟器/设备的日志输出。这些日志输出来自系统组件、其他应用程序以及你自己的应用程序。当你的应用程序崩溃时，`LogCat`\
  \ 视图会显示堆栈跟踪，并且还允许你在运行时输出自己的日志消息。我们将在下一节更详细地了解 `LogCat`。\n-   大纲视图在调试透视图中不是很有用。你通常关心的是断点、变量以及调试时程序暂停的当前行。我们经常从调试透视图中移除大纲视图，以便为其他视图留出更多空间。\n\
  -   变量视图对于调试目的特别有用。当调试器遇到断点时，你将能够检查并修改程序当前作用域中的变量。\n-   最后，断点视图显示了你到目前为止设置的所有断点列表。\n\
  \n如果你好奇的话，可能已经点击了正在运行应用程序中的按钮，看看调试器如何反应。它会停在第 23 行，正如我们通过在那里设置断点所指示的那样。你还会注意到，变量视图现在显示了当前作用域中的变量，其中包括活动本身（`this`）和方法的参数（`v`）。你可以通过展开变量来进一步深入查看。\n\
  \n调试视图显示了从当前堆栈向下到你当前所在方法的堆栈跟踪。请注意，你可能运行了多个线程，并且可以在调试视图中随时暂停它们。\n\n最后，注意我们设置断点的那一行被高亮显示了，这表示程序当前在代码中暂停的位置。\n\
  \n你可以指示调试器执行当前语句（按 `F6`）、单步进入当前方法中调用的任何方法（按 `F5`），或者正常继续程序执行（按 `F8`）。或者，你也可以使用“运行”菜单上的项目来实现相同的操作。此外，请注意，还有比我们刚才提到的更多的单步执行选项。与所有事情一样，我们建议你进行实验，看看哪些方法对你有用，哪些没有。\n\
  \n**注意：** 好奇心是成功开发 Android 游戏的基石。你必须深入了解你的开发环境才能充分利用它。本书篇幅有限，无法解释 `Eclipse` 的所有细枝末节，因此我们鼓励你进行实验。\n\
  \n\n\n#### `LogCat` 与 `DDMS`\n\nADT Eclipse 插件安装了许多可在 Eclipse 中使用的新视图和透视图。其中最有用的视图之一是`LogCat`视图，我们在上一节中简要介绍过。\n\
  \n`LogCat`是 Android 事件日志系统，允许系统组件和应用程序输出有关不同日志级别的日志信息。每条日志条目由时间戳、日志级别、日志来源的进程 ID、应用程序自身定义的标签以及实际日志消息组成。\n\
  \n`LogCat`视图会从连接的模拟器或设备收集并显示这些信息。图 2–12 展示了`LogCat`视图的一些示例输出。\n\n![images](img/0212.jpg)\n\
  \n**图 2–12.** *LogCat 视图*\n\n请注意，`LogCat`视图的右上角有许多按钮。\n\n- 前五个按钮允许你选择要显示的日志级别。\n\
  - 绿色加号按钮让你可以根据标签、进程 ID 和日志级别定义过滤器，这在你想只显示自己应用程序的日志输出时（应用程序可能会使用特定标签进行日志记录）非常有用。\n\
  - 其他按钮允许你编辑过滤器、删除过滤器或清除当前输出。\n\n如果当前连接了多个设备和模拟器，则`LogCat`视图只会输出其中一个的日志数据。为了获得更精细的控制和更多检查选项，你可以切换到`DDMS`透视图。\n\
  \n`DDMS`（Dalvik 调试监视服务器）提供了关于所有连接设备上运行的进程和 Dalvik 虚拟机的大量深入信息。你可以随时通过**窗口** → **打开透视图**\
  \ → **其他** → **DDMS** 切换到`DDMS`透视图。图 2–13 展示了`DDMS`透视图的通常外观。\n\n一如既往，有几个特定的视图适合我们当前的任务。在这种情况下，我们希望收集有关所有进程、它们的虚拟机和线程、堆的当前状态、关于特定连接设备的`LogCat`信息等等。\n\
  \n- **设备视图**显示所有当前连接的模拟器和设备，以及它们上运行的所有进程。通过此视图的工具栏按钮，你可以执行各种操作，包括调试选中的进程、记录堆和线程信息，以及截取屏幕截图。\n\
  - `LogCat`视图与上一个透视图中的相同，区别在于它将显示当前在设备视图中选中的设备的输出。\n- **模拟器控制视图**允许你更改正在运行的模拟器实例的行为。例如，你可以强制模拟器伪造\
  \ GPS 坐标用于测试。\n\n![images](img/0213.jpg)\n\n**图 2–13.** *运行中的 DDMS*\n\n- **线程视图**显示有关在设备视图中当前选中的进程上运行的线程的信息。只有当你启用线程跟踪时，线程视图才会显示这些信息，这可以通过单击设备视图中左起第五个按钮来实现。\n\
  - **堆视图**（未在图 2–13 中显示）提供关于设备上堆状态的信息。与线程信息一样，你必须在设备视图中通过单击左起第二个按钮明确启用堆跟踪。\n- **分配跟踪器视图**显示在过去一段时间内哪些类被分配最多。此视图是查找内存泄漏的绝佳方式。\n\
  - 最后，还有**文件资源管理器视图**，它允许你修改连接的 Android 设备或模拟器实例上的文件。你可以像使用标准操作系统文件资源管理器一样，将文件拖放到此视图中。\n\
  \n`DDMS`实际上是一个独立的工具，通过 ADT 插件与 Eclipse 集成。你也可以从`$ANDROID_HOME/tools`目录（在 Windows\
  \ 上是`%ANDROID_HOME%/tools`）以独立应用程序的形式启动`DDMS`。`DDMS`并不直接连接到设备，而是使用 Android 调试桥（ADB），这是\
  \ SDK 中包含的另一个工具。让我们看一下 ADB，以完善你对 Android 开发环境的了解。\n\n## 使用 ADB\n\nADB 允许你管理连接的设备和模拟器实例。它实际上由三个组件组成：\n\
  \n- 一个运行在开发机器上的**客户端**，你可以通过从命令行发出命令`adb`（如果你按照之前所述设置了环境变量，这应该可以工作）来启动它。当我们谈论 ADB\
  \ 时，我们指的是这个命令行程序。\n- 一个同样运行在你开发机器上的**服务器**。该服务器作为后台服务安装，负责 ADB 程序实例与任何连接的设备或模拟器实例之间的通信。\n\
  - **ADB 守护进程**，它同样作为后台进程运行在每个模拟器和设备上。ADB 服务器连接到这个守护进程进行通信。\n\n通常，我们通过`DDMS`透明地使用\
  \ ADB，而忽略它作为命令行工具的存在。有时 ADB 对于一些小任务来说很方便，所以让我们快速了解一下它的一些功能。\n\n**注意：** 请查看 Android\
  \ 开发者网站 [`http://developer.android.com`](http://developer.android.com) 上的 ADB 文档，以获取可用命令的完整参考列表。\n\
  \n使用 ADB 执行的一个非常有用的任务是查询连接到 ADB 服务器（因此也就是连接到你的开发机器）的所有设备和模拟器。为此，请在命令行上执行以下命令（注意，>\
  \ 不是命令的一部分）。\n\n```\nadb devices\n```\n\n这会打印出所有连接的设备和模拟器及其各自的序列号的列表，类似于以下输出：\n\n\
  ```\nList of devices attached\nHT97JL901589    device\nHT019P803783    device\n\
  ```\n\n设备或模拟器的序列号用于针对其执行后续特定命令。以下命令会将位于开发机器上一个名为`myapp.apk`的 APK 文件安装到序列号为`HT019P803783`的设备上。\n\
  \n```\nadb –s HT019P803783 install myapp.apk\n```\n\n`–s`参数可以与任何针对特定设备执行操作的 ADB\
  \ 命令一起使用。\n\n还有一些命令可以将文件复制到设备或模拟器，以及从设备或模拟器复制文件。以下命令将一个名为`myfile.txt`的本地文件复制到序列号为`HT019P803783`的设备的\
  \ SD 卡上。\n\n```\nadb –s HT019P803783 push myfile.txt  /sdcard/myfile.txt\n```\n\n\
  要从 SD 卡中拉取一个名为`myfile.txt`的文件，你可以发出以下命令：\n\n```\nadb pull /sdcard/myfile.txt myfile.txt\n\
  ```\n\n如果当前只有一个设备或模拟器连接到 ADB 服务器，你可以省略序列号。`adb`工具会自动为你定位到连接的设备或模拟器。\n\n当然，ADB 工具提供了更多可能性。大部分功能都通过`DDMS`暴露出来，我们通常会使用`DDMS`而不是命令行。不过，对于快速任务来说，命令行工具是很理想的。\n\
  \n\n\n### 摘要\n\nAndroid 开发环境有时会让人望而生畏。幸运的是，你只需要掌握其中一部分可用选项就能入门，本章最后几页应该已经为你提供了足够的信息，让你能够开始编写一些基础代码了。\n\
  \n本章最重要的收获在于理解各个组成部分如何协同工作。JDK 和 Android SDK 为所有 Android 开发提供了基础。它们提供了编译、部署以及在模拟器实例和真实设备上运行应用程序的工具。为了加快开发速度，我们使用\
  \ Eclipse 以及 ADT 插件，这个插件替我们完成了原本需要在命令行中使用 JDK 和 SDK 工具才能完成的所有繁重工作。Eclipse 本身建立在几个核心概念之上：管理项目的**工作区**；提供特定功能（如源码编辑或\
  \ LogCat 输出）的**视图**；为特定任务（如调试）将相关视图整合在一起的**透视图**；以及允许你指定运行或调试应用程序时所用启动设置的**运行和调试配置**。\n\
  \n掌握这一切的秘诀在于实践，尽管这听起来可能很枯燥。在本书中，我们将实现几个项目，这些项目应该能让你对 Android 开发环境更加得心应手。不过，归根结底，能否更进一步，还要靠你自己。\n\
  \n有了这些信息，你就可以开始阅读本书的初衷了：开发游戏。\n\n## 第 3 章\n\n## 游戏开发入门\n\n游戏开发很难——这并非因为它是什么高深莫测的学问，而是因为在你真正开始编写梦想中的游戏之前，需要消化大量的信息。在编程方面，你不得不处理诸如文件输入/输出（I/O）、输入处理、音频和图形编程以及网络代码等琐碎事务。而这些还只是基础！在此之上，你需要构建实际的游戏机制。实现这些机制的代码也需要结构清晰，而如何创建游戏的架构并不总是显而易见的。你实际上必须决定如何让游戏世界动起来。不使用物理引擎，而是自己编写简单的模拟代码，这样行得通吗？游戏世界的单位和比例应该如何设定？它又是如何映射到屏幕上的？\n\
  \n实际上，还有一个许多初学者会忽视的问题，那就是在开始动手编码之前，你首先需要设计你的游戏。无数的项目从未见光，就卡在了技术演示阶段，原因就在于从未清楚想过游戏最终应该如何运作。我指的不是普通第一人称射击游戏的基本游戏机制。那部分是简单的：WASD\
  \ 键加鼠标，就搞定了。你需要问自己这些问题：是否有启动画面？它之后如何过渡？主菜单屏幕上有什么？在游戏的实际屏幕上，有哪些抬头显示元素？如果我按下暂停按钮会发生什么？设置屏幕应该提供哪些选项？我的界面设计在不同屏幕尺寸和宽高比下如何呈现？\n\
  \n有趣的是，这里没有万能的灵丹妙药；也没有标准方法可以解决所有这些问题。我们不会假装能给你一套一劳永逸的解决方案。相反，我们将尝试说明我们通常如何着手设计一个游戏。你可以选择完全采用，或根据自身需求进行调整。没有规则——只要对你有用就行。但是，无论是在代码中还是在纸面上，你都应始终力求简单的解决方案。\n\
  \n### 游戏类型：各有所爱\n\n在项目开始时，你通常要决定游戏所属的类型。除非你提出的是全新且前所未见的创意，否则你的游戏创意很可能会归入当前流行的几种主流类型之一。大多数类型都有既定的游戏机制标准（例如，控制方案、特定目标等）。偏离这些标准可能会让游戏大获成功，因为玩家总是渴望新鲜事物。但这也可能带来巨大风险，因此要仔细考虑，你的新平台跳跃游戏/第一人称射击游戏/即时策略游戏是否真的有受众。\n\
  \n让我们来看看 Android 市场上一些更受欢迎类型的例子。\n\n#### 休闲游戏\n\nAndroid 市场上可能最大的游戏细分市场是由所谓的**休闲游戏**组成的。那么究竟什么是休闲游戏？这个问题没有具体的答案，但休闲游戏有一些共同特征。通常，它们具有极佳的可玩性，即使不是游戏玩家也能轻松上手，这极大地增加了潜在玩家群体。游戏单次体验通常最长只需几分钟。然而，休闲游戏简单玩法所蕴含的成瘾性常常能让玩家沉迷数小时。实际的游戏机制范围广泛，从极其简单的益智游戏到一键式平台跳跃游戏，再到像把纸球扔进篮筐这样简单的事情。由于休闲游戏类型的定义模糊，其可能性是无穷无尽的。\n\
  \n*《绑架》* 和 *《绑架 2》*（图 3–1），由一人工作室 Psym Mobile 开发，是完美的休闲游戏例子。它属于“跳跃游戏”的子类型（至少我是这么称呼它的）。游戏的目标是引导不断跳跃的奶牛从一个平台到另一个平台，并到达关卡顶部。在上升途中，你将面对破碎的平台、尖刺和会飞的敌人。你可以拾取能帮助你到达顶部的强化道具等等。你通过倾斜手机来控制奶牛，从而影响它跳跃/下落的方向。易于理解的操控、清晰的目标和可爱的图形使这款游戏成为\
  \ Android 市场上的首批热门作品之一。\n\n![图片](img/0301.jpg)\n\n**图 3–1.** *《绑架》（左）和《绑架 2》（右），由\
  \ Psym Mobile 开发*\n\n*《抗原》*（图 3–2），由 Battery Powered Games LLC 开发，则完全是另一种类型的游戏。这款游戏是由本书的一位合著者开发的，不过我们提及它并非为了宣传，而是因为它遵循了我们在本书中概述的某些输入和兼容性方法。在《抗原》中，你扮演一名抗体，对抗各种不同的病毒。这款游戏实际上是一个混合型动作益智游戏。你通过屏幕上的方向键和右上角的旋转按钮来控制抗体。你的抗体每侧都有一组连接器，可以让你连接到病毒并将其摧毁。虽然《绑架》仅通过加速度计实现单一输入机制，但《抗原》的操控要复杂一些。并非所有设备都支持多点触控，因此我们为所有可能的设备设计了几种输入方案；Zeemote\
  \ 手柄控制就是其中之一。为了接触到尽可能广泛的受众，我们特别确保游戏即使在 320×240 像素屏幕的低端设备上也能运行，同时它也能很好地适配到运行在 1280×800\
  \ 分辨率下的现代平板电脑上。\n\n![图片](img/0302.jpg)\n\n**图 3–2.** *《抗原》，由 Battery Powered Games\
  \ LLC 开发*\n\n要列出休闲游戏类别下所有可能的子类型，恐怕就能填满本书的大部分篇幅。在这个类型中还可以找到更多创新的游戏概念，值得去市场上的相应类别中看看，以获取一些灵感。\n\
  \n\n\n#### 益智游戏\n\n益智游戏无需多言。我们都熟知像 *《俄罗斯方块》* 和 *《宝石迷阵》* 这样的优秀游戏。它们是 Android 游戏市场的重要组成部分，并且深受各年龄段人群的喜爱。与\
  \ PC 端通常只是将三个同色或同形物体放在一起的益智游戏不同，Android 上的许多益智游戏背离了经典的三消模式，采用了更精细、基于物理引擎的谜题。\n\n\
  *《超级堆叠》*（图 3–3）是一款出色的物理益智游戏范例。游戏的目标是通过触摸来移除方块，并让方块顶部的星星安全地落到最底层的平台上。虽然这听起来相当简单，但在后面的关卡中会变得相当复杂。该游戏由\
  \ `Box2D`（一个 2D 物理引擎）驱动。\n\n![images](img/0303.jpg)\n\n**图 3–3.** *《超级堆叠》，Camel\
  \ Games 出品*\n\n*《连接》*（图 3–4），由 `BitLogik` 开发，是一款极简但有趣的脑筋急转弯小游戏。目标是用一条线连接图形中的所有点。计算机科学专业的学生可能会认出这是一个熟悉的问题。\n\
  \n![images](img/0304.jpg)\n\n**图 3–4.** *《连接》，BitLogik 出品*\n\n当然，你也能在市场上找到各种《俄罗斯方块》的克隆版、三消游戏以及其他标准模式的游戏。这里列出的游戏表明，益智游戏完全可以不只是对某个\
  \ 20 年前概念的又一次克隆。\n\n#### 动作与街机游戏\n\n动作与街机游戏通常能充分发挥 Android 平台的潜力。其中许多游戏拥有令人惊叹的 3D\
  \ 视觉效果，展示了在当前硬件上可以实现的效果。这一类型包含众多子类，包括赛车游戏、射击游戏、第一人称和第三人称射击游戏以及平台游戏。Android 市场的这一细分领域仍然有些欠发达，因为拥有资源来制作这类大作的大公司对于加入\
  \ Android 阵营犹豫不决。不过，一些独立开发者已经主动承担起填补这一空白的责任。\n\n*《复制岛》*（图 3–5）可能是迄今为止 Android 上最成功的平台游戏。它由前谷歌工程师兼游戏开发倡导者\
  \ Chris Pruett 开发，旨在证明人们可以用纯 Java 在 Android 上编写高性能游戏。该游戏通过提供多种输入方案来适应所有潜在的设备配置。开发过程中特别注意了即使在低端设备上也能良好运行。游戏本身讲述的是一个机器人奉命取回一件神秘物品的故事。游戏机制类似于老式的\
  \ SNES 16 位平台游戏。在标准设置中，通过加速度计和两个按钮来控制机器人：一个按钮用于启动推进器跳过障碍，另一个用于从上方踩踏敌人。该游戏还是开源的，这是另一个优点。\n\
  \n![images](img/0305.jpg)\n\n**图 3–5.** *《复制岛》，Chris Pruett 开发*\n\n*《Exzeus》*（图\
  \ 3–6），由 `HyperDevBox` 开发，是一款经典的轨道射击游戏，继承了 SNES 上《星际火狐》的风格，但拥有高保真的 3D 图形。这款游戏应有尽有：不同的武器、能量增强道具、强大的\
  \ Boss 战以及大量可射击的目标。与许多其他 3D 游戏一样，该游戏旨在高端设备上运行。主角通过倾斜屏幕和屏幕上的按钮来控制——对于这类游戏来说，这是一种相当直观的控制方案。\n\
  \n![images](img/0306.jpg)\n\n**图 3–6.** *《Exzeus》，HyperDevBox 出品*\n\n*《致命密室》*（图\
  \ 3–7），由 Battery Powered Games LLC 开发，是一款第三人称射击游戏，风格类似《毁灭战士》和《雷神之锤》等经典作品。与《Antigen》一样，这款游戏也是由本书的一位合著者开发的。我们提到它是为了与《Exzeus》进行对比。该游戏是第三人称/第一人称射击游戏的混合体，具有完整的\
  \ `OpenGL ES` 3D 动画图形、枪支、爆炸效果以及你对这类游戏所期待的一切。与多数只能在最新硬件上运行的同类型游戏不同，我们非常注意使其即使在 Hero\
  \ 和 G1 等低端设备上也能运行。该游戏还提供了多种输入方案，因此你可以在单点触摸屏、多点触摸屏、键盘以及 Zeemote JS1 上玩这款游戏。从技术上讲，这款游戏是一项重大成就，尤其是考虑到它是由一个人在大约六个月内编程完成的，并且可以在\
  \ G1 手机上流畅运行。\n\n![images](img/0307.jpg)\n\n**图 3–7.** *《致命密室》，Battery Powered Games\
  \ LLC 出品*\n\n*《光辉》*（图 3–8），由 `Hexage` 开发，代表了从旧的《太空侵略者》概念出发的一次杰出的进化。游戏没有提供静态的战场，而是呈现了横向卷轴关卡，并且在关卡和敌人设计上具有相当的多样性。你通过倾斜手机来控制飞船，并且可以用击败敌人获得的积分购买新武器来升级飞船的武器系统。半像素化的图形风格赋予了这款游戏独特的外观和感觉，同时也唤起了对旧时光的回忆。\n\
  \n![images](img/0308.jpg)\n\n**图 3–8.** *《光辉》，Hexage 出品*\n\n动作与街机类游戏在市场上仍然有些代表性不足。玩家们渴望优秀的动作游戏，所以也许这就是你的机会！\n\
  \n#### 塔防游戏\n\n鉴于它们在 Android 平台上的巨大成功，我们觉得有必要将塔防游戏作为一个独立的类型来讨论。塔防游戏最初是由模组社区开发的 PC\
  \ 实时战略游戏的一个变种，并因此流行起来。这个概念很快被移植成了独立游戏。塔防游戏目前是 Android 上最畅销的游戏类型。\n\n在一款典型的塔防游戏中，通常是一股邪恶力量会一波一波地派出怪物来攻击你的城堡/基地/水晶/等等。你的任务是通过在地图上的特定位置放置防御炮塔来射击来袭的敌人来保卫该区域。每杀死一个敌人，你通常会获得一些金钱或积分，你可以用来投资新的炮塔或升级。这个概念极其简单，但要想平衡好这类游戏却相当困难。\n\
  \n*《机器人防御》*（图 3–9），由 Lupis Labs Software 开发，是 Android 平台上所有塔防游戏的鼻祖。在 Android 大部分生命周期里，它一直占据着市场付费游戏榜首的位置。该游戏遵循标准的塔防模式，没有任何花哨的装饰。这是一个简单直接且容易让人上瘾的塔防游戏实现，拥有不同的可平移地图、成就和高分榜。其呈现方式足以传达游戏概念，但并不出众，这进一步证明了一款畅销游戏未必需要拥有顶尖的图形和音频效果。\n\
  \n![images](img/0309.jpg)\n\n**图 3–9.** *《机器人防御》，Lupis Labs Software 出品*\n\n\n\n\
  ### 创新\n\n有些游戏无法简单归入某一类别。它们利用安卓设备的新功能和特性（如摄像头或 GPS）来创造全新体验。这批创新游戏具有社交属性和地理位置感知功能，甚至引入了增强现实领域的某些元素。\n\
  \n*SpecTrek*（图 3–10）是第二届安卓开发者挑战赛的优胜作品之一。游戏目标是在开启 GPS 的情况下四处游走，寻找鬼魂并用摄像头捕捉它们。鬼魂只是叠加在摄像头视图上，玩家的任务是将它们保持在焦点中，并按下`捕捉`按钮来得分。\n\
  \n![图片](img/0310.jpg)\n\n**图 3–10.** *SpecTrek，由 SpecTrekking.com 出品*\n\n*Apparatus*（图\
  \ 3–11）是一款曾在安卓平板电脑上登场的游戏。它在许多先前的物理益智游戏基础上进行了创新，其执行方式让玩家不由自主地沉迷于通过创造目标机器来解谜。它使用了简单但赏心悦目的\
  \ 3D 图形，并且能在从 Android 1.6 起的几乎所有设备上运行。\n\n![图片](img/0311.jpg)\n\n**图 3–11.** *Apparatus，由\
  \ BitHack 出品*\n\n许多新游戏、创意、类型和应用起初看起来并不像游戏，但它们确实是。因此，进入安卓市场时，很难精准界定当下什么是创新。我们见过将平板作为游戏主机，连接电视，再通过蓝牙连接多部安卓手机作为控制器的游戏。休闲社交游戏已经流行了相当长一段时间，许多最初在苹果平台上的热门作品也已移植到安卓。所有可能的创意都已被开发殆尽了吗？绝非如此！对于愿意承担风险尝试新游戏创意的开发者而言，总有未被开拓的市场和游戏创意等待发掘。硬件性能日益提升，这为之前因\
  \ CPU 算力不足而无法实现的全新可能性打开了大门。\n\n那么，既然你已经了解安卓平台已有的游戏，我们建议你打开市场应用，查看前面介绍的一些游戏。注意它们的结构（例如，哪些界面会跳转到哪些界面，按钮的功能，游戏元素如何互动等）。通过以分析性思维玩游戏，你就能获得对这些要素的感知。暂时抛开娱乐因素，专注于解构游戏。完成后，再回来继续阅读。我们将要在纸上设计一个非常简单的游戏。\n\
  \n### 游戏设计：笔胜于代码\n\n如前所述，打开集成开发环境（IDE）直接拼凑出一个炫酷技术演示确实很有诱惑力。如果你想原型化实验性的游戏机制并验证其可行性，这并无不可。但一旦完成，请丢弃原型。拿起笔和纸，坐在舒适的椅子上，认真思考游戏所有的高层方面。暂时不要关注技术细节——这些稍后再做。现在，你需要专注于设计游戏的用户体验。最佳方式是通过草拟以下内容：\n\
  \n*   核心游戏机制，包括关卡概念（如适用）。\n*   包含主要角色的粗略背景故事。\n*   物品、道具或其他可修改角色、机制或环境的元素列表（如适用）。\n\
  *   基于背景故事和角色的图形风格草图。\n*   所有涉及界面的草图，以及界面间转换的示意图和触发条件（例如，游戏结束状态）。\n\n如果你翻阅过目录，就会知道我们将在安卓上实现*贪吃蛇*。*贪吃蛇*是移动市场有史以来最受欢迎的游戏之一。如果你还不了解*贪吃蛇*，请在继续阅读前上网查一下。我在这里等着……\n\
  \n欢迎回来。既然你已经知道*贪吃蛇*是怎么回事，我们就假设这是我们自己想到的创意，并开始为其设计布局。先从游戏机制开始。\n\n### 核心游戏机制\n\n\
  开始前，列出我们需要的东西：\n\n*   一把剪刀\n*   书写工具\n*   大量纸张\n\n在游戏设计的这个阶段，一切都是变动的目标。我们建议你，与其在\
  \ Paint、Gimp 或 Photoshop 中精心制作精美图片，不如用纸制作基本构建块，并在桌子上重新排列直到合适为止。你可以轻松地在实体上进行修改，而无需与笨拙的鼠标较劲。一旦对纸质设计满意后，可以拍照或扫描设计以便日后参考。让我们开始创建核心游戏界面的这些基本块。图\
  \ 3–12 展示了我们为核心游戏机制所需的版本。\n\n![图片](img/0312.jpg)\n\n**图 3–12.** *游戏设计构建块*\n\n最左边的矩形是我们的屏幕，大约相当于\
  \ Nexus One 屏幕的大小。我们将把所有其他元素放在上面。接下来的构建块是两个用于控制蛇的按钮。最后是蛇头、几节尾巴和它可以吃的一个块。我们还写下了一些数字并剪了下来。这些将用于显示分数。图\
  \ 3–13 展示了我们对初始游戏区域的构想。\n\n![图片](img/0313.jpg)\n\n**图 3–13.** *初始游戏区域*\n\n让我们定义游戏机制：\n\
  \n*   蛇沿着头部所指方向前进，并拖拽其尾部。头部和尾部由大小相同、视觉差异不大的部分构成。\n*   如果蛇超出屏幕边界，它从对侧重新进入屏幕。\n* \
  \  如果按下右或左按钮，蛇会顺时针（右转）或逆时针（左转）转 90 度。\n*   如果蛇撞到自己（例如，其尾部的一部分），游戏结束。\n*   如果蛇的头部撞到一个块，该块消失，分数增加\
  \ 10 分，并在游戏区域中未被蛇占据的位置出现一个新块。蛇还会增加一节尾巴。新尾巴会附着在蛇的末端。\n\n对于如此简单的游戏来说，这已经是相当复杂的描述了。请注意，我们大致按复杂度递增的顺序排列了这些条目。蛇在游戏区域吃到块时的行为可能是最复杂的。当然，更复杂的游戏无法用如此简洁的方式描述。通常，你会将这些拆分成独立部分，分别设计，最后在流程的最终整合步骤中将它们连接起来。\n\
  \n最后一条游戏机制意味着：由于屏幕上的所有空间最终都会被蛇占据，游戏终将结束。\n\n既然我们完全原创的游戏机制创意看起来不错，接下来尝试为它构思一个背景故事吧。\n\
  \n\n\n#### 故事与美术风格\n\n虽然一个包含僵尸、飞船、矮人和大量爆炸场面的史诗故事会很有趣，但我们不得不意识到资源是有限的。我们的绘画技巧，如图\
  \ 3-12 所示，实在有些欠缺。就算性命攸关，我们也画不出僵尸。于是，我们做了任何有自尊心的独立游戏开发者都会做的事：采用涂鸦风格，并据此调整背景设定。\n\n\
  欢迎来到诺姆先生的世界。诺姆先生是一条纸蛇，他总是渴望吞食从纸张大陆上某个未知源头滴落下来的墨水渍。诺姆先生无比自私，他只有一个不那么崇高的目标：成为世界上体型最大的、充满墨水的纸蛇！\n\
  \n这个小小的背景故事让我们可以进一步定义几件事：\n\n*   美术风格为涂鸦风格。我们稍后会将构建模块扫描进电脑，作为游戏中的图形资源使用。\n*   由于诺姆先生是一个个人主义者，我们会稍微修改他方块化的外观，给他加上一张像样的蛇脸和一顶帽子。\n\
  *   可食用的方块将变成一组墨水渍。\n*   我们会通过让诺姆先生在每次吞食墨水渍时发出咕噜声，来打造游戏的音频效果。\n*   我们不会采用“涂鸦蛇”这样乏味的标题，而是将游戏命名为“诺姆先生”，一个更有趣的名字。\n\
  \n图 3-14 展示了全副武装的诺姆先生，以及一些将取代原始方块的墨水渍。我们还草绘了一个涂鸦风格的“诺姆先生”标志，可以在整个游戏中复用。\n\n![images](img/0314.jpg)\n\
  \n**图 3-14.** *诺姆先生、他的帽子、墨水渍以及标志*\n\n#### 屏幕与转场\n\n在确定了游戏机制、背景故事、角色和美术风格后，我们现在可以设计游戏屏幕以及它们之间的转场效果了。不过，首先需要准确理解屏幕的构成：\n\
  \n*   屏幕是填充整个显示的原子单元，负责游戏中恰好一个部分（例如，主菜单、设置菜单或进行操作的游戏屏幕）。\n*   屏幕可以由多个组件组成（例如，按钮、控件、抬头显示或游戏世界的渲染）。\n\
  *   屏幕允许用户与屏幕上的元素交互。这些交互可以触发屏幕转场（例如，在主菜单按下“新游戏”按钮，可以将当前活跃的主菜单屏幕切换为游戏屏幕或关卡选择屏幕）。\n\
  \n有了这些定义，我们就可以开动脑筋，设计诺姆先生游戏的所有屏幕了。\n\n游戏向玩家呈现的第一件事是主菜单屏幕。一个好的主菜单屏幕应该包含什么？\n\n* \
  \  原则上来说，显示游戏名称是个好主意，所以我们会放上诺姆先生的标志。\n*   为了让画面看起来更统一，我们还需要一个背景。我们将复用游戏场地的背景。\n\
  *   玩家通常想玩游戏，所以我们添加一个“开始游戏”按钮。这将是我们第一个交互组件。\n*   玩家想要追踪自己的进度和最佳成绩，所以我们还会添加一个“最高分”按钮，这是另一个交互组件。\n\
  *   可能有人不知道“贪吃蛇”游戏。我们通过一个“帮助”按钮为他们提供帮助，该按钮会跳转至帮助屏幕。\n*   虽然我们的声音设计会很棒，但有些玩家可能还是更喜欢静音游戏。给他们一个象征性的切换按钮来开启或关闭声音就能解决问题。\n\
  \n如何在实际屏幕上布局这些组件则取决于个人品味。你可以开始研究计算机科学的一个子领域——人机交互（HCI），以获得关于如何向用户呈现应用程序的最新科学观点。不过，对于《诺姆先生》来说，这可能有点小题大做。我们最终采用了图\
  \ 3-15 所示的简洁设计。\n\n![images](img/0315.jpg)\n\n**图 3-15.** *主菜单屏幕*\n\n请注意，所有这些元素（标志、菜单按钮等）都是独立的图片。\n\
  \n从主菜单屏幕开始设计，我们立即获得了一个好处：我们可以直接从交互组件中推导出更多的屏幕。就《诺姆先生》而言，我们将需要一个游戏屏幕、一个最高分屏幕和一个帮助屏幕。我们可以省去设置屏幕，因为唯一的设置（声音）已经存在于主屏幕上。\n\
  \n我们先暂时忽略游戏屏幕，集中精力设计最高分屏幕。我们决定最高分将本地存储在《诺姆先生》中，因此我们只跟踪单个玩家的成就。我们还决定只记录最高的五个分数。因此，最高分屏幕将如图\
  \ 3-16 所示，顶部显示“最高分”文字，接着是五个最高分数，以及一个带箭头的按钮，表示你可以返回某个地方。我们将再次复用游戏场地的背景，因为我们喜欢这种省事的做法。\n\
  \n![images](img/0316.jpg)\n\n**图 3-16.** *最高分屏幕*\n\n\n\n接下来是帮助画面。它会向玩家介绍故事背景和游戏机制。由于这些信息量太大，无法在一个屏幕上全部呈现。因此，我们将把帮助画面拆分成多个画面。每个画面将向用户展示一项关键信息：Mr.\
  \ Nom 是谁以及他想要什么，如何操控 Mr. Nom 吃掉墨渍，以及 Mr. Nom 不喜欢什么（也就是他不能碰到自己）。一共是三个帮助画面，如图 3–17\
  \ 所示。注意，我们在每个画面上都添加了一个按钮，表示还有更多信息可以阅读。稍后我们会将这些画面连接起来。\n\n![images](img/0317.jpg)\n\
  \n**图 3–17.** *帮助画面*\n\n最后是我们的游戏画面，之前我们已经看到它运行的样子了。不过，我们还有几个细节没有提到。首先，游戏不应该立即开始；我们应该给玩家一点准备时间。因此，画面会先显示一个提示，需要触摸屏幕才能开始大快朵颐。这不需要单独做一个画面；我们会直接在游戏画面中实现这个初始暂停。\n\
  \n说到暂停，我们还会添加一个按钮，让用户可以暂停游戏。一旦暂停，我们还需要给用户提供一种方式来继续游戏。在这种情况下，我们会显示一个巨大的“继续”（`Resume`）按钮。在暂停状态下，我们还会显示另一个按钮，让用户可以返回主菜单画面。\n\
  \n如果 Mr. Nom 咬到了自己的尾巴，我们需要通知玩家游戏结束了。我们可以实现一个单独的游戏结束画面，或者留在游戏画面中，只覆盖一个巨大的“游戏结束”（`Game\
  \ Over`）消息。这里我们选择后者。为了完善体验，我们还会显示玩家获得的分数，以及一个返回主菜单的按钮。\n\n将游戏画面的这些不同状态视为子画面。我们有四个子画面：初始准备状态、正常游戏进行状态、暂停状态和游戏结束状态。图\
  \ 3–18 展示了这些子画面。\n\n![images](img/0318.jpg)\n\n**图 3–18.** *游戏画面及其四种不同状态*\n\n现在是时候把这些画面连接起来了。每个画面都包含一些用于切换到另一个画面的交互组件。\n\
  \n*   在主菜单画面，我们可以通过相应的按钮进入游戏画面、高分画面和帮助画面。\n*   在游戏画面，我们可以通过暂停状态的按钮或游戏结束状态的按钮返回主菜单画面。\n\
  *   在高分画面，我们可以返回主菜单画面。\n*   从第一个帮助画面，我们可以进入第二个帮助画面；从第二个到第三个；从第三个到第四个；从第四个画面，我们将返回主菜单画面。\n\
  \n这就是所有的切换！看起来并不复杂，对吧？图 3–19 以可视化的方式总结了所有这些切换，用箭头从每个交互组件指向目标画面。我们还在图中包含了构成画面的所有元素。\n\
  \n![images](img/0319.jpg)\n\n**图 3–19.** *所有设计元素与切换*\n\n至此，我们已经完成了第一个完整的游戏设计。剩下就是实现了。我们如何才能将这个设计变成一个可执行的游戏呢？\n\
  \n**注意：** 我们刚才用来创建游戏设计的方法对于较小的游戏来说很合适。这本书叫做《Beginning Android Games》，所以这是一个合适的方法论。对于较大的项目，你很可能会在一个团队中工作，每个团队成员专攻一个方面。虽然在那种情况下你仍然可以应用这里描述的方法，但你可能需要稍作调整和优化，以适应不同的环境。你还会进行更多迭代式的工作，不断优化你的设计。\n\
  \n### 代码：关键细节\n\n这里又有一个先有鸡还是先有蛋的问题：我们只想了解与游戏编程相关的 Android API。然而，我们仍然不知道如何实际编写一个游戏。我们有了如何设计一个游戏的想法，但把它变成一个可执行程序对我们来说仍然像巫术一样。在接下来的小节中，我们将向你概述一个游戏通常由哪些元素构成。我们将研究一些接口的伪代码，这些接口稍后我们会用\
  \ Android 提供的东西来实现。接口非常棒，原因有二：它们让我们可以专注于语义，而无需了解实现细节；并且它们允许我们稍后替换实现（例如，我们可以不用 2D\
  \ CPU 渲染，而是利用 `OpenGL ES` 来在屏幕上显示 `Mr. Nom`）。\n\n每个游戏都需要一个基本框架，来抽象化并简化与底层操作系统通信的麻烦。通常，它被分成以下几个模块：\n\
  \n> *窗口管理*：负责创建窗口，并处理诸如关闭窗口或在 Android 中暂停/恢复应用程序等问题。\n> \n> *输入*：与窗口管理模块相关，负责跟踪用户输入（即触摸事件、按键、外设和加速度计读数）。\n\
  > \n> *文件 I/O*：允许我们从磁盘上将游戏资源的字节读取到程序中。\n> \n> *图形*：除了实际的游戏本身，这可能是最复杂的模块。它负责加载图形并将其绘制到屏幕上。\n\
  > \n> *音频*：负责加载和播放所有我们将要听到的声音。\n> \n> *游戏框架*：将上述所有模块结合在一起，为编写游戏提供一个易于使用的基础。\n\n\
  这些模块中的每一个都由一个或多个接口组成。每个接口都至少有一个具体的实现，该实现基于底层平台（本例中为 `Android`）提供的内容来应用接口的语义。\n\n\
  **注意：** 是的，我们故意没有在上面的列表中包含网络。我们不会在这本书中实现多人游戏。根据游戏类型的不同，这是一个相当高级的话题。如果你对此感兴趣，可以在网络上找到一系列教程。（[`www.gamedev.net`](http://www.gamedev.net)\
  \ 是一个不错的起点。）\n\n在接下来的讨论中，我们将尽可能保持平台无关性。这些概念在所有平台上都是相同的。\n\n\n\n#### 应用与窗口管理\n\n\
  游戏与其他任何带有用户界面的计算机程序并无二致。它被包含在某种形式的窗口中（如果底层操作系统的 UI 范式基于窗口，而所有主流操作系统皆是如此）。窗口充当容器，我们基本上将其视为绘制游戏内容的画布。\n\
  \n大多数操作系统允许用户以特殊方式与窗口交互，除了触摸客户区或按键之外。在桌面系统上，通常可以拖拽窗口、调整窗口大小，或将其最小化到任务栏。在 Android\
  \ 中，调整大小被替换为适应方向变化，而最小化则类似于通过按下主页按钮或响应来电，将应用程序置于后台。\n\n应用和窗口管理模块也负责实际设置窗口，并确保该窗口由一个单一的\
  \ UI 组件填充，我们可以后续渲染到该组件，并且该组件能接收用户以触摸或按键形式输入的指令。该 UI 组件可能通过 CPU 渲染，也可能像 OpenGL ES\
  \ 那样通过硬件加速。\n\n应用和窗口管理模块并没有一套固定的接口。我们稍后会将其与游戏框架合并。我们需要记住的是必须管理的应用程序状态和窗口事件：\n\n\
  > *创建*：在窗口（以及应用程序）启动时调用一次。\n>\n> *暂停*：当应用程序被某种机制暂停时调用。\n>\n> *恢复*：当应用程序恢复且窗口重新置于前台时调用。\n\
  \n**注意：** 一些 Android 爱好者可能会对此不以为然。为什么只使用一个单一的窗口（Android 术语中的`Activity`）？为什么不为游戏使用多个\
  \ UI 小部件——例如，用于实现游戏可能需要的复杂 UI？主要原因是我们希望对游戏的外观和感觉拥有完全的控制。这也使我们能够专注于 Android 游戏编程，而不是\
  \ Android UI 编程，关于后者已有更优秀的书籍存在——例如，Mark Murphy 的佳作 *Beginning Android 2*（Apress，2010）。\n\
  \n#### 输入\n\n用户肯定希望以某种方式与我们的游戏进行交互。这就是输入模块的用武之地。在大多数操作系统中，诸如触摸屏幕或按键等输入事件会被分派到当前获得焦点的窗口。然后，窗口会进一步将事件分派给拥有焦点的\
  \ UI 组件。这个分派过程对我们来说通常是透明的；我们唯一关心的是从拥有焦点的 UI 组件获取事件。操作系统的 UI API 提供了一种机制，可以挂钩到事件分派系统中，这样我们就能轻松注册并记录事件。这种挂钩并记录事件的过程就是输入模块的主要任务。\n\
  \n我们能用记录下来的信息做什么呢？有两种操作模式：\n\n> *轮询*：通过轮询，我们仅检查输入设备的当前状态。当前检查与上次检查之间的任何状态都将丢失。这种输入处理方式适合检查诸如用户是否触摸了特定按钮等情况。它不适合跟踪文本输入，因为按键事件的顺序会丢失。\n\
  >\n> *基于事件的处理*：这提供了自上次检查以来发生事件的完整时间顺序历史记录。这是一种执行文本输入或任何其他依赖事件顺序任务的合适机制。它对于检测手指首次触摸屏幕或手指何时抬起也很有用。\n\
  \n我们需要处理哪些输入设备呢？在 Android 上，主要有三种输入方式：触摸屏、键盘/轨迹球以及加速度计。前两种既适用于轮询也适用于基于事件的处理。加速度计通常仅通过轮询使用。触摸屏可以产生三种事件：\n\
  \n> *触摸按下*：当手指接触到屏幕时发生。\n>\n> *触摸拖动*：当手指在屏幕上拖动时发生。在拖动之前，总会有一个按下事件。\n>\n> *触摸抬起*：当手指从屏幕抬起时发生。\n\
  \n每个触摸事件都附带额外信息：相对于 UI 组件原点的位置，以及用于在多指触控环境中识别和跟踪不同手指的指针索引。\n\n键盘可以产生两种类型的事件：\n\n\
  > *按键按下*：当按键被按下时发生。\n>\n> *按键抬起*：当按键被抬起时发生。此事件之前总有一个按键按下事件。\n\n按键事件也携带额外信息。按键按下事件存储了被按下键的键码。按键抬起事件存储了键码和一个实际的\
  \ Unicode 字符。键码与按键抬起事件产生的 Unicode 字符是有区别的。后者会考虑其他键的状态，例如 Shift 键。这样，例如我们就能在按键抬起事件中得到大写和小写字母。而对于按键按下事件，我们只知道某个键被按下了，但不知道这个按键动作实际会产生什么字符。\n\
  \n希望使用自定义 USB 硬件（包括摇杆、模拟控制器、特殊键盘、触摸板或其他 Android 支持的外设）的开发者，可以通过利用`android.hardware.usb`包中的\
  \ API 来实现，该 API 在 API 级别 12（Android 3.1）中引入，也通过`com.android.future.usb`包反向移植到了 Android\
  \ 2.3.4。USB API 允许 Android 设备在主机模式下运行（允许外设连接并被 Android 设备使用），或者在配件模式下运行（允许设备作为另一个\
  \ USB 主机的配件）。这些 API 并不太适合初学者，因为设备访问是非常底层的，提供数据流 IO 给 USB 配件，但重要的是要知道这项功能确实存在。如果你的游戏设计围绕某个特定的\
  \ USB 配件，你当然需要为该配件开发一个通信模块并使用它进行原型设计。\n\n\n\n最后，我们来看看加速度计。需要重点理解的是，虽然几乎所有手机和平板电脑都将加速度计作为标准硬件，但许多新设备（包括机顶盒）可能没有加速度计，因此务必始终规划多种输入模式！\n\
  \n要使用加速度计，我们将始终轮询其状态。加速度计会报告地球重力在其三个轴之一上施加的加速度。这三个轴分别称为`x`、`y`和`z`。图 3-20 展示了每个轴的方向。每个轴上的加速度以米每二次方秒（`m/s²`）表示。根据物理课所学，我们知道一个物体在地球上自由落体时，其加速度约为\
  \ `9.8 m/s²`。其他星球的重力不同，因此加速度常数也不同。为简单起见，我们这里只考虑地球。当一个轴指向远离地心方向时，它受到最大加速度；若指向地心，则得到负的最大加速度。例如，如果你竖直握住手机（竖屏模式），`y`轴将报告加速度为\
  \ `9.8 m/s²`。在图 3-20 中，`z`轴会报告加速度为 `9.8 m/s²`，而`x`轴和`y`轴报告的加速度为零。\n\n![images](img/0320.jpg)\n\
  \n**图 3–20.** *Android 手机上的加速度计坐标轴。z 轴指向手机外部。*\n\n现在，我们定义一个接口，该接口允许我们轮询触摸屏、键盘和加速度计，并支持基于事件的触摸屏和键盘访问（见代码清单\
  \ 3–1）。\n\n**代码清单 3–1.** *输入接口及 KeyEvent 和 TouchEvent 类*\n\n```\npackage com.badlogic.androidgames.framework;\n\
  \nimport java.util.List;\n\npublic interface Input {\n    public static class KeyEvent\
  \ {\n        public static final int KEY_DOWN = 0;\n        public static final\
  \ int KEY_UP = 1;\n\n        public int type;\n        public int keyCode;\n   \
  \     public char keyChar;\n    }\n\n    public static class TouchEvent {\n    \
  \    public static final int TOUCH_DOWN = 0;\n        public static final int TOUCH_UP\
  \ = 1;\n        public static final int TOUCH_DRAGGED = 2;\n\n        public int\
  \ type;\n        public int x, y;\n        public int pointer;\n    }\n\n    public\
  \ boolean isKeyPressed(int keyCode);\n\n    public boolean isTouchDown(int pointer);\n\
  \n    public int getTouchX(int pointer);\n\n    public int getTouchY(int pointer);\n\
  \n    public float getAccelX();\n\n    public float getAccelY();\n\n    public float\
  \ getAccelZ();\n\n    public List<KeyEvent> getKeyEvents();\n\n    public List<TouchEvent>\
  \ getTouchEvents();\n}\n```\n\n我们的定义以两个类开始：`KeyEvent`和`TouchEvent`。`KeyEvent`类定义了编码事件类型的常量；`TouchEvent`类也是如此。`KeyEvent`实例记录其类型、按键代码，以及当事件类型为`KEY_UP`时的\
  \ Unicode 字符。\n\n`TouchEvent`代码类似，包含触摸事件类型、手指相对于 UI 组件原点的位置，以及触摸屏驱动程序分配给该手指的指针 ID。只要手指在屏幕上，其指针\
  \ ID 就保持不变。如果两根手指按下，然后手指 0 抬起，那么只要手指 1 还在触摸屏幕，它就会保持其 ID。新手势将获得第一个空闲 ID，在本例中为 0。指针\
  \ ID 通常是顺序分配的，但也不能保证总是如此。例如，Sony Xperia Play 使用 15 个 ID，并以循环方式分配给触摸操作。切勿在代码中对新指针的\
  \ ID 做任何假设——你只能通过索引读取指针的 ID，并在该指针抬起之前引用它。\n\n接下来是`Input`接口的轮询方法，它们应该是不言自明的。`Input.isKeyPressed()`接收一个`keyCode`，并返回对应的键当前是否被按下。`Input.isTouchDown()`、`Input.getTouchX()`和`Input.getTouchY()`返回给定指针是否按下，以及其当前的\
  \ x 和 y 坐标。请注意，如果相应的指针实际上没有触摸屏幕，那么这些坐标将是未定义的。\n\n`Input.getAccelX()`、`Input.getAccelY()`和`Input.getAccelZ()`返回各加速度计轴的相应加速度值。\n\
  \n最后两个方法用于基于事件的处理。它们返回自上次调用这些方法以来记录的`KeyEvent`和`TouchEvent`实例。这些事件按照发生的时间排序，最新的事件位于列表末尾。\n\
  \n有了这个简单的接口和这些辅助类，我们就满足了所有的输入需求。接下来，我们来看看文件处理。\n\n**注意：** 虽然带有公共成员的可变类令人深恶痛绝，但在这种情况下我们可以侥幸使用它们，原因有二：Dalvik\
  \ 在调用方法（此处为 getter）时仍然很慢；并且事件类的可变性不会影响`Input`实现的内部运作。请记住，这通常是一种糟糕的风格，但为了性能原因，我们偶尔会采用这种捷径。\n\
  \n#### 文件 I/O\n\n读写文件对于游戏开发来说至关重要。鉴于我们身处 Java 世界，我们主要关注创建`InputStream`和`OutputStream`实例，这是从特定文件读取数据和向其写入数据的标准\
  \ Java 机制。在我们的场景中，我们主要关注读取随游戏打包的文件，例如关卡文件、图片和音频文件。写入文件的操作要少得多。通常，我们仅在需要维护高分榜或游戏设置，或保存游戏状态以便用户从中断处继续时，才会写入文件。\n\
  \n我们希望尽可能简单的文件访问机制。代码清单 3–2 展示了我们提议的一个简单接口。\n\n**代码清单 3–2.** *文件 I/O 接口*\n\n```\n\
  package com.badlogic.androidgames.framework;\n\nimport java.io.IOException;\nimport\
  \ java.io.InputStream;\nimport java.io.OutputStream;\n\npublic interface FileIO\
  \ {\n    public InputStream readAsset(String fileName) throws IOException;\n\n \
  \   public InputStream readFile(String fileName) throws IOException;\n\n    public\
  \ OutputStream writeFile(String fileName) throws IOException;\n}\n```\n\n这相当精简。我们只需指定文件名即可获得一个流。如同在\
  \ Java 中通常所做的那样，如果出现问题，我们将抛出`IOException`。文件的读写位置取决于具体实现。资源将从应用程序的 APK 文件中读取，而文件将从\
  \ SD 卡（也称为外部存储）读取和写入。\n\n返回的`InputStreams`和`OutputStreams`是普通的 Java 流。当然，使用完毕后我们必须关闭它们。\n\
  \n\n\n#### 音频\n\n虽然音频编程是一个相当复杂的话题，但我们可以用一个非常简单的抽象来应对。我们不会进行任何高级的音频处理；只会播放从文件中加载的音效和音乐，就像在图形模块中加载位图一样。\n\
  \n不过，在深入探讨模块接口之前，让我们先花点时间了解一下声音到底是什么，以及它是如何以数字方式表示的。\n\n##### 声音的物理原理\n\n声音通常被建模为一组在空气或水等介质中传播的波。波并不是实际的物理物体，而是介质内分子的运动。想象一下你往一个小池塘里扔了一块石头。当石头击中池塘表面时，它会推开池塘里的大量水分子，而这些被推开的水分子会将能量传递给它们的邻居，邻居们也会开始移动和推动。最终，你会看到圆形波纹从石头落水处扩散开来。\n\
  \n声音产生时也发生类似的事情。不过，不是圆形运动，而是球形运动。正如你可能从童年时进行的高度科学实验中了解到的，水波可以相互作用；它们可以相互抵消或相互增强。声波也是如此。环境中所有的声波结合在一起，就形成了你听音乐时听到的音调和旋律。声音的音量取决于移动和推动的分子的能量有多少传递给它们的邻居，并最终传递到你的耳朵。\n\
  \n##### 录音与回放\n\n音频录制和回放的原理其实在理论上相当简单。对于录音，我们记录下构成声波的分子在某个空间区域上施加特定压力时的时刻。回放这些数据，只需让扬声器周围的空气分子像我们录音时那样摆动和运动即可。\n\
  \n在实践中，这当然要稍微复杂一些。音频通常通过两种方式之一进行录制：模拟或数字。在这两种情况下，声波都是通过某种麦克风录制的，麦克风通常由一个振膜组成，它将分子的推动转换为某种信号。这个信号如何处理和存储，正是模拟录音和数字录音的区别所在。我们使用数字方式工作，所以让我们来看看这种情况。\n\
  \n数字录音意味着在离散的时间步长上测量和存储麦克风振膜的状态。根据周围分子的推动，振膜可以相对于中性状态被向内或向外推动。这个过程称为采样，因为我们在离散的时间点上采集振膜状态的样本。我们在每单位时间内采集的样本数量称为*采样率*。通常时间单位是秒，单位称为赫兹（Hz）。每秒采样数越多，音频质量越高。CD\
  \ 以 44,100 Hz（即 44.1 KHz）的采样率回放。较低的采样率也有应用，例如在电话线上传输语音时（这种情况通常为 8 KHz）。\n\n采样率只是决定录音质量的属性之一。我们存储每个振膜状态样本的方式也很重要，并且同样受数字化过程的影响。让我们回忆一下振膜状态到底是什么：它是振膜偏离其中性状态的距离。由于振膜被向内推还是向外推是有区别的，我们记录的是有符号的距离。因此，特定时间步长的振膜状态是一个负数或正数。我们可以用多种方式存储这个有符号数：作为一个有符号的\
  \ 8 位、16 位或 32 位整数，作为一个 32 位浮点数，甚至是一个 64 位浮点数。每种数据类型都有精度限制。一个 8 位有符号整数可以存储 127 个正距离值和\
  \ 128 个负距离值。一个 32 位整数提供了更高的分辨率。当存储为浮点数时，振膜状态通常被归一化到-1 到 1 之间。最大正值和最小负值代表振膜偏离中性状态能达到的最远距离。振膜状态也称为振幅，它代表撞击它的声音的响度。\n\
  \n使用单个麦克风，我们只能录制单声道声音，这会丢失所有空间信息。使用两个麦克风，我们可以在空间的不同位置测量声音，从而得到所谓的*立体声*。例如，你可以将一个麦克风放置在发出声音的物体的左侧，另一个放置在右侧，从而实现立体声。当声音通过两个扬声器同时回放时，我们可以合理地再现音频的空间成分。但这同时也意味着，在存储立体声音频时，我们需要存储两倍的样本数量。\n\
  \n回放最终是一个简单的事情。一旦我们有了数字形式的音频样本，并且具有特定的采样率和数据类型，我们就可以将这些数据交给音频处理单元，它会将这些信息转换成连接扬声器的信号。扬声器解释这个信号，并将其转换为振膜的振动，进而引起周围空气分子的运动并产生声波。这和我们录音时所做的完全一样，只是过程相反！\n\
  \n##### 音频质量与压缩\n\n哇，好多理论。我们为什么要关心这些？如果你注意听了，现在你就能根据采样率和用于存储每个样本的数据类型来判断一个音频文件质量高低了。采样率越高，数据类型的精度越高，音频的质量就越好。然而，这也意味着我们需要更多的存储空间来存放我们的音频信号。\n\
  \n想象一下，我们录制了相同的声音，时长为 60 秒，但录制了两次：一次以 8 KHz 的采样率，每样本 8 位；另一次以 44 KHz 的采样率，16 位精度。存储每个声音需要多少内存？在第一种情况下，每个样本需要\
  \ 1 字节。乘以 8000 Hz 的采样率，我们每秒需要 8000 字节。对于我们完整的 60 秒音频录制，这需要 480,000 字节，大约半兆字节（MB）。我们更高质量的录制需要多得多的内存：每样本\
  \ 2 字节，每秒 2 乘以 44,000 字节。即每秒 88,000 字节。乘以 60 秒，我们得到 5,280,000 字节，略高于 5 MB。你通常听的一首\
  \ 3 分钟流行歌曲，以这种质量录制会占用超过 15 MB，而且这还只是单声道录制。对于立体声录制，你需要两倍的内存。一首歌就占这么多字节，真是太多了！\n\n\
  \n\n许多聪明人已经想出了一些方法来减少音频记录所需的字节数。他们发明了相当复杂的心理声学压缩算法，用于分析未压缩的音频记录并输出体积更小、经过压缩的版本。这种压缩通常是*有损的*，意味着原始音频的某些微小部分会被省略。当你播放`MP3`或`OGG`文件时，你实际上听到的是经过压缩的有损音频。因此，使用`MP3`或`OGG`等格式将有助于减少在磁盘上存储音频所需的空间。\n\
  \n那么，从压缩文件中回放音频又是如何呢？虽然存在用于各种压缩音频格式的专用解码硬件，但常见的音频硬件通常只能处理未压缩的样本。在将样本实际馈送到声卡之前，我们必须先将它们读入内存并进行解压缩。我们可以一次性完成此操作，并将所有未压缩的音频样本存储在内存中，或者根据需要仅从音频文件中流式读入部分数据。\n\
  \n**实践**\n\n你已经看到，即使是 3 分钟的歌曲也可能占用大量内存。因此，在播放游戏音乐时，我们将即时流式读取音频样本，而不是将所有音频样本预加载到内存中。通常，我们只有一个音乐流在播放，所以我们只需访问磁盘一次。\n\
  \n对于短暂的声音效果，例如爆炸声或枪声，情况则略有不同。我们经常需要同时多次播放一个音效。对于每个音效实例，从磁盘流式读取音频样本并不是一个好主意。幸运的是，简短的声音不会占用太多内存。因此，我们将一个音效的所有样本读入内存，然后可以直接并同时地从内存中播放它们。\n\
  \n我们有以下需求：\n\n*   我们需要一种方法来加载音频文件，既支持流式播放，也支持从内存播放。\n*   我们需要一种方法来控制流式音频的播放。\n*\
  \   我们需要一种方法来控制已完全加载音频的播放。\n\n这直接转化为了`Audio`、`Music`和`Sound`这几个接口（分别如清单 3–3 至 3–5\
  \ 所示）。\n\n**清单 3–3.** *Audio 接口*\n\n```\npackage com.badlogic.androidgames.framework;\n\
  \npublic interface Audio {\n    public Music newMusic(String filename);\n    public\
  \ Sound newSound(String filename);\n}\n```\n\n`Audio`接口是我们创建新的`Music`和`Sound`实例的方式。一个`Music`实例代表一个流式音频文件。一个`Sound`实例代表一个完全保存在内存中的短音效。`Audio.newMusic()`和`Audio.newSound()`方法都将文件名作为参数，如果加载过程失败（例如，当指定的文件不存在或已损坏），则会抛出`IOException`。这些文件名引用的是应用程序\
  \ APK 文件中的资源文件。\n\n**清单 3–4.** *Music 接口*\n\n```\npackage com.badlogic.androidgames.framework;\n\
  \npublic interface Music {\n    public void play();\n    public void stop();\n \
  \   public void pause();\n    public void setLooping(boolean looping);\n    public\
  \ void setVolume(float volume);\n    public boolean isPlaying();\n    public boolean\
  \ isStopped();\n    public boolean isLooping();\n    public void dispose();\n}\n\
  ```\n\n`Music`接口稍微复杂一些。它提供了开始、暂停和停止音乐流的方法，以及设置循环播放的方法（这意味着当到达音频文件末尾时会自动从头开始播放）。此外，我们可以将音量设置为`0`（静音）到`1`（最大音量）之间的浮点数。还有一些\
  \ getter 方法可用，允许我们查询`Music`实例的当前状态。一旦我们不再需要`Music`实例，就必须处理它。这将关闭所有系统资源，例如用于流式读取音频的文件。\n\
  \n**清单 3–5.** *Sound 接口*\n\n```\npackage com.badlogic.androidgames.framework;\n\n\
  public interface Sound {\n    public void play(float volume);\n    public void dispose();\n\
  }\n```\n\n`Sound`接口更简单。我们需要做的就是调用它的`play()`方法，该方法同样接受一个浮点数参数来指定音量。我们可以随时调用`play()`方法（例如，当\
  \ Nom 先生吃到一个墨点时）。一旦我们不再需要`Sound`实例，就必须处理它，以释放样本使用的内存以及其他可能关联的系统资源。\n\n**注意：** 虽然我们在本章中涵盖了很多内容，但关于音频编程还有更多东西需要学习。为了保持本节内容简短精炼，我们简化了一些事情。例如，通常你不会线性地指定音量。在我们的上下文中，忽略这个小细节是可以的。但要意识到，实际情况远比这复杂！\n\
  \n\n\n#### 图形\n\n游戏框架核心的最后一个模块是图形模块。你可能已经猜到，它将负责将图像（也称为位图）绘制到屏幕上。这听起来很简单，但如果你想要高性能的图形，至少需要了解图形编程的基础知识。让我们从\
  \ 2D 图形的基础开始。\n\n我们需要提出的第一个问题是：图像究竟是如何输出到我的显示器上的？答案相当复杂，但我们并不需要了解所有细节。我们只需快速回顾一下计算机和显示器内部发生的事情。\n\
  \n##### 关于光栅、像素和帧缓冲\n\n如今的显示器都是基于光栅的。*光栅*是一个由所谓图像元素组成的二维网格。你可能知道它们被称为*像素*，在后续文本中我们将这样称呼它们。光栅网格的宽度和高度是有限的，我们通常以每行和每列的像素数来表示。如果你有勇气，可以打开电脑，尝试在显示器上辨认出单个像素。不过请注意，我们不对因此对眼睛造成的任何伤害负责。\n\
  \n一个像素有两个属性：网格中的位置和颜色。像素的位置在离散坐标系中以二维坐标表示。*离散*意味着坐标始终位于整数位置。坐标在施加于网格上的欧几里得坐标系中定义。坐标系的原点是网格的左上角。x\
  \ 轴正方向指向右侧，y 轴正方向指向下方。最后一点最容易让人困惑。我们稍后会再讨论这个问题；这种情况有一个简单的原因。\n\n忽略那个奇怪的 y 轴，我们可以看到，由于坐标的离散性，原点与网格左上角的像素重合，该像素位于`(0,0)`。原点像素右侧的像素位于`(1,0)`，原点像素下方的像素位于`(0,1)`，依此类推（见图\
  \ 3–21 左侧）。显示器的光栅网格是有限的，因此有意义的坐标数量有限。负坐标位于屏幕之外。大于或等于光栅宽度或高度的坐标也位于屏幕之外。请注意，最大的 x\
  \ 坐标是光栅宽度减 1，最大的 y 坐标是光栅高度减 1。这是因为原点与左上角像素重合。差一错误在图形编程中通常是令人沮丧的常见来源。\n\n显示器从图形处理器接收持续不断的信息流。这些信息编码了显示光栅中每个像素的颜色，具体由控制屏幕绘制的程序或操作系统指定。显示器每秒会刷新其状态数十次。确切的速率称为刷新率，以赫兹为单位。液晶显示器通常具有每秒\
  \ 60 Hz 的刷新率；阴极射线管显示器和等离子显示器通常具有更高的刷新率。\n\n图形处理器可以访问一个称为视频内存或 VRAM 的特殊内存区域。在 VRAM\
  \ 中，有一个保留区域用于存储要显示在屏幕上的每个像素。这个区域通常被称为*帧缓冲*。因此，一个完整的屏幕图像被称为一帧。对于显示器光栅网格中的每个像素，帧缓冲中都有一个对应的内存地址来保存该像素的颜色。当我们想要更改屏幕上显示的内容时，只需更改\
  \ VRAM 中该内存区域内像素的颜色值。\n\n![图像](img/0321.jpg)\n\n**图 3–21.** *过于简化的显示器光栅网格和 VRAM*\n\
  \n现在是时候解释为什么显示器坐标系中的 y 轴指向下方了。内存，无论是 VRAM 还是普通 RAM，都是线性和一维的。可以把它想象成一个一维数组。那么，我们如何将二维像素坐标映射到一维内存地址呢？图\
  \ 3–21 展示了一个非常小的三乘二像素显示器光栅网格，以及它在 VRAM 中的表示。（我们假设 VRAM 仅由帧缓冲内存组成。）由此，我们可以轻松推导出以下公式来计算位于`(x,y)`的像素的内存地址：\n\
  \n```\nint address = x + y * rasterWidth;\n```\n\n我们也可以反过来，根据地址计算像素的 x 和 y 坐标：\n\
  \n```\nint x = address % rasterWidth;\nint y = address / rasterWidth;\n```\n\n所以，y\
  \ 轴之所以指向下方，是因为 VRAM 中像素颜色的内存布局。这实际上是计算机图形学早期遗留下来的某种传统。显示器会更新屏幕上每个像素的颜色，从左上角开始，向右移动，然后在下一行折返到最左边，直到到达屏幕底部。将\
  \ VRAM 内容以这种方式布局，便于将颜色信息传输到显示器，这非常方便。\n\n**注意：** 如果我们能够完全访问帧缓冲，就可以使用上述公式编写一个完整的图形库来绘制像素、线条、矩形、加载到内存中的图像等等。现代操作系统出于各种原因不授予我们对帧缓冲的直接访问权限。相反，我们通常绘制到一个内存区域，然后由操作系统将其复制到实际的帧缓冲中。尽管如此，总体概念在这种情况下仍然适用！如果你对如何高效地执行这些底层操作感兴趣，可以在网上搜索一个叫\
  \ Bresenham 的人以及他的画线和画圆算法。\n\n##### 垂直同步与双缓冲\n\n现在，如果你还记得关于刷新率的段落，你可能会注意到这些速率似乎相当低，我们写入帧缓冲的速度可能比显示器刷新的速度还快。这种情况确实可能发生。更糟糕的是，我们不知道显示器何时从\
  \ VRAM 抓取其最新帧副本，这可能会在我们在绘制过程中造成问题。在这种情况下，显示器将显示部分旧的帧缓冲内容和部分新的状态，这是一种不理想的情况。你可以在许多电脑游戏中看到这种效果，它表现为画面撕裂（屏幕同时显示上一帧的部分内容和新帧的部分内容）。\n\
  \n解决这个问题的第一部分方案称为*双缓冲*。图形处理单元管理的不是一个帧缓冲，而是两个：前缓冲和后缓冲。前缓冲中的像素颜色将被读取，供显示器使用；后缓冲则用于绘制下一帧，同时显示器可以顺利地从前缓冲获取数据。当我们绘制完当前帧后，我们告诉\
  \ GPU 交换这两个缓冲，这通常意味着只是交换前缓冲和后缓冲的地址。在图形编程文献和 API 文档中，你可能会找到*页面翻转*和*缓冲交换*这两个术语，它们指的就是这个过程。\n\
  \n不过，仅靠双缓冲并不能完全解决问题：屏幕刷新内容的过程中仍然可能发生交换。这时就需要*垂直同步*（也称为 *vsync*）登场了。当我们调用缓冲交换方法时，GPU\
  \ 会阻塞，直到显示器发出信号表示已完成当前刷新。如果发生这种情况，GPU 就可以安全地交换缓冲地址，一切便会顺利进行。\n\n\n\n幸运的是，如今我们几乎无需关心这些繁琐的细节。VRAM\
  \ 以及双缓冲和垂直同步的细节都被安全地隐藏起来，让我们无法对其造成破坏。相反，我们获得了一组 API，这些 API 通常将我们限制在操作应用程序窗口的内容上。其中一些\
  \ API，例如 `OpenGL ES`，暴露了硬件加速功能，它本质上不过是利用图形芯片上的专用电路来操作 VRAM。看，这并不是魔法！你之所以应该了解其内部工作原理（至少是高层级原理），是因为这能让你理解应用程序的性能特性。当启用了垂直同步（`vsync`），你的帧率永远无法超过屏幕的刷新率，如果你只是绘制一个像素，这可能会令人费解。\n\
  \n当我们使用非硬件加速的 API 进行渲染时，我们并不直接与显示器本身打交道。相反，我们绘制的是窗口中的某个 UI 组件。在我们的例子中，我们处理的是一个覆盖整个窗口的单一\
  \ UI 组件。因此，我们的坐标系不会覆盖整个屏幕，而只覆盖我们的 UI 组件。该 UI 组件实际上成为了我们的显示器，拥有其自己的虚拟帧缓冲。然后，操作系统将管理所有可见窗口内容的合成，并确保这些内容被正确地传输到它们在真实帧缓冲中所覆盖的区域。\n\
  \n**什么是颜色？**\n\n你会注意到，到目前为止我们有意地忽略了颜色。我们在图 3-21 中创建了一个名为 `color` 的类型，并假装一切安好。让我们看看颜色到底是什么。\n\
  \n从物理上讲，颜色是你的视网膜和视觉皮层对电磁波的反应。这种波的特征在于其波长和强度。我们可以看到波长大约在 400 到 700 纳米之间的波。电磁波谱的这个子频段也称为可见光谱。彩虹展示了可见光谱中的所有颜色，从紫色到蓝色，再到绿色，然后是黄色，接着是橙色，最后是红色。显示器所做的一切就是为每个像素发射特定的电磁波，我们将其体验为每个像素的颜色。不同类型的显示器使用不同的方法来实现这一目标。这个过程的一个简化版本是这样的：屏幕上的每个像素由三种不同的荧光粒子组成，这些粒子会发出红光、绿光或蓝光中的一种。当显示器刷新时，每个像素的荧光粒子会通过某种方式发光（例如，对于\
  \ CRT 显示器，像素的粒子会受到一束电子的轰击）。对于每个粒子，显示器可以控制其发光强度。例如，如果一个像素完全是红色，那么只有红色粒子会以全强度被电子轰击。如果我们想要三种基色以外的颜色，我们可以通过混合基色来实现。混合是通过改变每个粒子发出其颜色的强度来完成的。电磁波在到达我们视网膜的途中会相互叠加。我们的大脑将这种混合解释为一种特定的颜色。因此，一种颜色可以通过红、绿、蓝基色的强度混合来指定。\n\
  \n**颜色模型**\n\n我们刚才讨论的被称为颜色模型，具体来说是 RGB 颜色模型。当然，`RGB` 代表红色、绿色和蓝色。我们还可以使用许多其他的颜色模型，例如\
  \ `YUV` 和 `CMYK`。然而，在大多数图形编程 API 中，`RGB` 颜色模型几乎是标准，因此我们这里只讨论它。\n\n`RGB` 颜色模型被称为加法颜色模型，这是因为最终的颜色是通过混合加法原色红色、绿色和蓝色而得到的。你可能在学校里做过混合原色的实验。图\
  \ 3-22 为你展示了一些 RGB 颜色混合的例子，以便稍微唤起你的记忆。\n\n![images](img/0322.jpg)\n\n**图 3-22.**\
  \ *混合红、绿、蓝三原色的乐趣*\n\n当然，通过改变红、绿、蓝分量的强度，我们可以生成比图 3-22 中所示多得多的颜色。每个分量可以有一个介于 0 和某个最大值（比如\
  \ 1）之间的强度值。如果我们将每个颜色分量解释为三维欧几里得空间中三个轴上的一个值，我们可以绘制所谓的*颜色立方体*，如图 3-23 所示。如果我们改变每个分量的强度，就可以得到更多可用的颜色。一个颜色被表示为三元组\
  \ `(red, green, blue)`，其中每个分量在 0.0 到 1.0 之间。0.0 表示该颜色没有强度，1.0 表示最大强度。黑色位于原点 `(0,0,0)`，白色位于\
  \ `(1,1,1)`。\n\n![images](img/0323.jpg)\n\n**图 3-23.** *强大的 RGB 颜色立方体*\n\n**数字编码颜色**\n\
  \n我们如何在计算机内存中对 RGB 颜色三元组进行编码？首先，我们必须定义要为颜色分量使用什么数据类型。我们可以使用浮点数，并将有效范围指定为 0.0 到 1.0\
  \ 之间。这将为每个分量提供相当高的分辨率，并使我们能够使用大量不同的颜色。遗憾的是，这种方法会占用大量空间（每像素 3 倍 4 或 8 字节，具体取决于我们使用\
  \ 32 位还是 64 位浮点数）。\n\n我们可以做得更好——代价是丢失一些颜色——这完全没问题，因为显示器通常只能发射有限的颜色范围。我们可以为每个分量使用无符号整数，而不是使用浮点数。现在，如果我们为每个分量使用一个\
  \ 32 位整数，我们并没有得到任何好处。相反，我们为每个分量使用一个无符号字节。然后每个分量的强度范围是 0 到 255。对于 1 个像素，我们因此需要 3\
  \ 个字节，即 24 位。那是 2 的 24 次方（16,777,216）种不同的颜色。我想说这足以满足我们的需求。\n\n我们还能进一步缩减吗？是的，可以。我们可以将每个分量打包到一个\
  \ 16 位的字中，这样每个像素只需要 2 字节的存储空间。红色使用 5 位，绿色使用 6 位，蓝色使用剩余的 5 位。绿色获得 6 位的原因是我们的眼睛能看到比红色或蓝色更多的绿色色调。所有位加起来可以编码\
  \ 2 的 16 次方（65,536）种不同的颜色。图 3-24 展示了如何使用前面描述的三种编码来编码一种颜色。\n\n![images](img/0324.jpg)\n\
  \n**图 3-24.** *一种漂亮的粉色的颜色编码（在本印刷版中将是灰色，抱歉）*\n\n对于浮点数的情况，我们可以使用三个 32 位的 Java 浮点数。在\
  \ 24 位编码的情况下，我们有一个小问题：Java 中没有 24 位的整数类型，因此我们可以将每个分量存储在一个单独的字节中，或者使用一个 32 位整数，让高\
  \ 8 位闲置。在 16 位编码的情况下，我们可以再次使用两个单独的字节，或者将分量存储在一个 `short` 值中。请注意，Java 没有无符号类型。由于二进制补码的强大功能，我们可以安全地使用有符号整数类型来存储无符号值。\n\
  \n对于 16 位和 24 位整数编码，我们还需要指定在 `short` 或 `int` 值中存储三个分量的顺序。通常使用两种方法：`RGB` 和 `BGR`。图\
  \ 3-23 使用了 `RGB` 编码。蓝色分量处于最低的 5 位或 8 位，绿色分量占据接下来的 6 位或 8 位，红色分量占据最高的 5 位或 8 位。`BGR`\
  \ 编码只是颠倒这个顺序。绿色位保持不变，红色和蓝色位互换位置。在本书中，我们将使用 `RGB` 顺序，因为 Android 的图形 API 也使用这个顺序。让我们总结一下到目前为止讨论的颜色编码：\n\
  \n\n\n-   32 位浮点 RGB 编码：每个像素 12 字节，强度范围 0.0 到 1.0。\n-   24 位整数 RGB 编码：每个像素 3 或 4\
  \ 字节，强度范围 0 到 255。分量顺序可为 RGB 或 BGR。在某些场合也称为`RGB888`或`BGR888`，其中`8`表示每个分量的位数。\n-\
  \   16 位整数 RGB 编码：每个像素 2 字节；红色和蓝色强度范围 0 到 31，绿色强度范围 0 到 63。分量顺序可为 RGB 或 BGR。在某些场合也称为`RGB565`或`BGR565`，其中`5`和`6`表示对应分量的位数。\n\
  \n我们所使用的编码类型也称为颜色深度。创建并存储在磁盘或内存中的图像具有定义的颜色深度，实际图形硬件的帧缓冲区和显示器本身也是如此。如今，显示器的默认颜色深度通常为\
  \ 24 位，在某些情况下可以配置为使用更低的颜色深度。图形硬件的帧缓冲区也相当灵活，可以使用多种不同的颜色深度。当然，我们自己的图像也可以采用任何我们喜欢的颜色深度。\n\
  \n**注意：** 逐像素颜色信息的编码方式还有很多。除了 RGB 颜色，我们还可以拥有灰度像素，它们只有一个分量。由于这些方式使用不多，我们在此先忽略它们。\n\
  \n##### 图像格式与压缩\n\n在游戏开发过程中，美工会提供使用 Gimp、Paint.NET 或 Photoshop 等图形软件创建的图像。这些图像可以以多种格式存储在磁盘上。首先，为什么需要这些格式？我们不能直接将光栅数据作为字节块存储在磁盘上吗？\n\
  \n可以，但让我们算算这需要多少内存。假设我们想要最高质量，选择以`RGB888`格式编码像素，每像素 24 位。图像大小为 1024×1024。仅仅一张图片就需要\
  \ 3MB！使用`RGB565`，我们可以将其降至约 2MB。\n\n与音频的情况一样，关于如何减少存储图像所需内存的研究已经很多。通常采用压缩算法，这些算法专为存储图像和尽可能保留原始颜色信息而定制。两种最流行的格式是`JPEG`和`PNG`。`JPEG`是一种有损格式，意味着在压缩过程中会丢弃一些原始信息。`PNG`是一种无损格式，能够\
  \ 100%还原原始图像。有损格式通常具有更好的压缩特性，占用更少的磁盘空间。因此，我们可以根据磁盘内存限制来选择使用哪种格式。\n\n与音效类似，当我们将图像加载到内存时，必须完全解压。因此，即使你的图像在磁盘上压缩后只有\
  \ 20KB，在 RAM 中仍然需要宽度乘以高度乘以颜色深度的完整存储空间。\n\n加载和解压后，图像将以像素颜色数组的形式存在，其布局方式与 VRAM 中的帧缓冲区完全相同。唯一的区别在于像素位于普通\
  \ RAM 中，且颜色深度可能与帧缓冲区的颜色深度不同。加载的图像也有像帧缓冲区一样的坐标系：原点在左上角，x 轴向右，y 轴向下。\n\n图像加载后，我们只需将像素颜色从图像传输到帧缓冲区的相应位置，即可将其绘制到帧缓冲区。我们不是手动完成，而是使用提供该功能的\
  \ API。\n\n##### Alpha 合成与混合\n\n在开始设计图形模块接口之前，我们还需处理一件事：图像合成。为便于讨论，假设我们有一个可以渲染的帧缓冲区，以及一堆加载到\
  \ RAM 中、即将用于帧缓冲区的图像。图 3-25 展示了一个简单的背景图像，以及鲍勃——一位僵尸杀手。\n\n![images](img/0325.jpg)\n\
  \n**图 3-25.** *简单的背景和宇宙主宰者鲍勃*\n\n要绘制鲍勃的世界，我们首先将背景图像绘制到帧缓冲区，然后将鲍勃绘制在帧缓冲区的背景图像之上。这个过程称为合成，因为我们把不同的图像合成为最终图像。绘制顺序很重要，因为任何新的绘制调用都会覆盖帧缓冲区中的当前内容。那么，合成的最终输出会是什么？图\
  \ 3-26 展示了结果。\n\n![images](img/0326.jpg)\n\n**图 3-26.** *将背景和鲍勃合成到帧缓冲区（不是我们想要的结果）*\n\
  \n哎呀，这可不是我们想要的。在图 3-26 中，注意鲍勃被白色像素包围。当我们把鲍勃绘制在背景之上时，那些白色像素也被绘制了，从而覆盖了背景。如何绘制鲍勃的图像，使其只有鲍勃的像素被绘制而白色背景像素被忽略？\n\
  \n这就引出了 Alpha 混合。严格来说，鲍勃的情况是 Alpha 遮罩，但这只是 Alpha 混合的一个子集。图形软件通常不仅允许我们指定像素的 RGB 值，还可以指定其透明度。可以把它看作是像素颜色的另一个分量。我们可以像编码红、绿、蓝分量一样对其进行编码。\n\
  \n我们之前提到过，可以将 24 位的 RGB 三元组存储在一个 32 位整数中。这个 32 位整数中有 8 个未使用的位，我们可以利用它们来存储 Alpha\
  \ 值。然后，我们可以将像素的透明度指定为 0 到 255，其中 0 表示完全透明，255 表示完全不透明。这种编码称为`ARGB8888`或`BGRA8888`，取决于分量的顺序。当然，也有`RGBA8888`和`ABGR8888`格式。\n\
  \n在 16 位编码的情况下，我们遇到了一个小问题：16 位短整数的所有位都被颜色分量占用了。让我们模仿`ARGB8888`格式，类似地定义一种`ARGB4444`格式。这样总共为\
  \ RGB 值留下 12 位——每个颜色分量 4 位。\n\n我们很容易想象完全透明或不透明像素的渲染方法是如何工作的。在第一种情况下，我们只需忽略 Alpha\
  \ 分量为零的像素。在第二种情况下，我们直接覆盖目标像素。然而，当像素的 Alpha 分量既不完全透明也不完全不透明时，事情就变得稍微复杂了。\n\n在正式讨论混合时，我们需要定义几个概念：\n\
  \n- 混合有两个输入和一个输出，每个都用 RGB 三元组（`C`）加上一个 Alpha 值（`α`）表示。\n- 两个输入称为源和目的地。源是我们想要绘制到目标图像（即帧缓冲区）之上的图像中的像素。目标是我们要用源像素（部分）覆盖的像素。\n\
  - 输出同样是一个由 RGB 三元组和 Alpha 值表示的颜色。不过我们通常忽略 Alpha 值。为简单起见，本章将这样做。\n- 为简化计算，我们将 RGB\
  \ 和 Alpha 值表示为 0.0 到 1.0 范围内的浮点数。\n\n有了这些定义，我们就可以创建所谓的混合方程。最简单的方程如下所示：\n\n```\n\
  red = src.red * src.alpha + dst.red * (1 - src.alpha)\nblue = src.green * src.alpha\
  \ + dst.green * (1 - src.alpha)\ngreen = src.blue * src.alpha + dst.blue * (1 -\
  \ src.alpha)\n```\n\n\n\n`src`和`dst`是我们要相互混合的源像素和目标像素。我们按分量混合这两种颜色。注意在这些混合方程中缺少目标\
  \ alpha 值。让我们尝试一个例子，看看它的效果：\n\n`src = (1, 0.5, 0.5), src.alpha = 0.5, dst = (0,\
  \ 1, 0)`\n`red = 1 * 0.5 + 0 * (1 - 0.5) = 0.5`\n`blue = 0.5 * 0.5 + 1 * (1 - 0.5)\
  \ = 0.75`\n`red = 0.5 * 0.5 + 0 * (1 - 0.5) = 0.25`\n\n图 3–27 说明了上述方程。我们的源颜色是一种粉红色调，目标颜色是一种绿色调。两种颜色对最终输出颜色的贡献相等，产生了一种有些脏的绿色或橄榄色。\n\
  \n![images](img/0327.jpg)\n\n**图 3–27.** *混合两个像素*\n\n两位名叫 Porter 和 Duff 的绅士提出了一系列混合方程。不过，我们将坚持使用上述方程，因为它涵盖了大部分用例。尝试在纸上或你选择的图形软件中实验一下，以感受混合对你的构图会产生什么影响。\n\
  \n**注意：** 混合是一个广阔的领域。如果你想充分挖掘其潜力，我们建议你在网络上搜索 Porter 和 Duff 关于这个主题的原始著作。不过，对于我们将要编写的游戏来说，上述方程已经足够了。\n\
  \n请注意，上述方程涉及很多乘法运算（准确说是六次）。乘法运算代价高昂，我们应尽可能避免它们。在混合的情况下，我们可以通过将源像素颜色的 RGB 值与源 alpha\
  \ 值预乘来去掉其中的三个乘法。大多数图形软件支持将图像的 RGB 值与各自的 alpha 值预乘。如果不支持，你可以在加载时于内存中完成。然而，当我们使用图形\
  \ API 进行混合绘制时，必须确保使用正确的混合方程。我们的图像仍然包含 alpha 值，因此上述方程会输出错误的结果。源 alpha 不能与源颜色相乘。幸运的是，所有\
  \ Android 图形 API 都允许我们完全指定我们想要如何混合图像。\n\n在 Bob 的例子中，我们只需在我们首选的图形软件中将所有白色像素的 alpha\
  \ 值设置为零，以 ARGB8888 或 ARGB4444 格式加载图像，可能预乘 alpha，并使用一种绘图方法，该方法使用正确的混合方程执行实际的 alpha\
  \ 混合。结果将类似于图 3–28。\n\n![images](img/0328.jpg)\n\n**图 3–28.** *左侧是混合后的 Bob，右侧是 Paint.NET\
  \ 中的 Bob。棋盘格图案说明白色背景像素的 alpha 值为零，因此背景棋盘格显现出来。*\n\n**注意：** JPEG 格式不支持存储每个像素的 alpha\
  \ 值。在这种情况下请使用 PNG 格式。\n\n### 实践\n\n有了所有这些信息，我们终于可以开始为我们的图形模块设计接口了。让我们定义这些接口的功能。请注意，当我们提到帧缓冲区时，我们实际上是指我们绘制到的\
  \ UI 组件的虚拟帧缓冲区。我们只是假设我们直接绘制到真实的帧缓冲区。我们需要能够执行以下操作：\n\n*   从磁盘加载图像，并将它们存储在内存中以便以后绘制。\n\
  *   用颜色清除帧缓冲区，以便我们可以擦除上一帧留下的内容。\n*   在帧缓冲区的特定位置设置一个像素到特定颜色。\n*   在帧缓冲区上绘制线条和矩形。\n\
  *   将之前加载的图像绘制到帧缓冲区。我们希望能够绘制完整的图像或其中的一部分。我们还需要能够绘制带混合和不带混合的图像。\n*   获取帧缓冲区的尺寸。\n\
  \n我们提出了两个简单的接口：`Graphics`和`Pixmap`。让我们从`Graphics`接口开始，如清单 3–6 所示。\n\n**清单 3–6.**\
  \ *Graphics 接口*\n\n```java\npackage com.badlogic.androidgames.framework;\n\npublic\
  \ interface Graphics {\n    public static enum PixmapFormat {\n        ARGB8888,\
  \ ARGB4444, RGB565\n    }\n\n    public Pixmap newPixmap(String fileName, PixmapFormat\
  \ format);\n\n    public void clear(int color);\n\n    public void drawPixel(int\
  \ x, int y, int color);\n\n    public void drawLine(int x, int y, int x2, int y2,\
  \ int color);\n\n    public void drawRect(int x, int y, int width, int height, int\
  \ color);\n\n    public void drawPixmap(Pixmap pixmap, int x, int y, int srcX, int\
  \ srcY,\n            int srcWidth, int srcHeight);\n\n    public void drawPixmap(Pixmap\
  \ pixmap, int x, int y);\n\n    public int getWidth();\n\n    public int getHeight();\n\
  }\n```\n\n我们从一个名为`PixmapFormat`的公共静态枚举开始。它编码了我们将支持的不同像素格式。接下来是我们`Graphics`接口的不同方法：\n\
  \n*   `Graphics.newPixmap()`方法将加载一个以 JPEG 或 PNG 格式给出的图像。我们为生成的`Pixmap`指定一个期望的格式，这是对加载机制的一个提示。生成的`Pixmap`可能具有不同的格式。我们这样做是为了能够在一定程度上控制加载图像的内存占用（例如，将\
  \ RGB888 或 ARGB8888 图像加载为 RGB565 或 ARGB4444 图像）。文件名指定了我们应用程序 APK 文件中的一个资源。\n*  \
  \ `Graphics.clear()`方法使用给定的`color`清除整个帧缓冲区。在我们的小框架中，所有颜色都将指定为 32 位 ARGB8888 值（`Pixmap`当然可能具有不同的格式）。\n\
  *   `Graphics.drawPixel()`方法将帧缓冲区中 (x, y) 处的像素设置为给定的`color`。屏幕外的坐标将被忽略。这被称为*裁剪*。\n\
  *   `Graphics.drawLine()`方法类似于`Graphics.drawPixel()`方法。我们指定线的起点和终点，以及一种颜色。线在帧缓冲区光栅之外的任何部分都将被忽略。\n\
  *   `Graphics.drawRect()`方法在帧缓冲区上绘制一个矩形。(x, y) 指定矩形左上角在帧缓冲区中的位置。参数`width`和`height`分别指定\
  \ x 和 y 方向的像素数量，矩形将从 (x, y) 开始填充。我们沿 y 方向向下填充。`color`参数是用于填充矩形的颜色。\n*   `Graphics.drawPixmap()`方法将`Pixmap`的矩形部分绘制到帧缓冲区。(x,\
  \ y) 坐标指定`Pixmap`在帧缓冲区中的目标位置的左上角。参数`srcX`和`srcY`指定从`Pixmap`中使用的矩形区域的相应左上角，该坐标在`Pixmap`自身的坐标系中给出。最后，`srcWidth`和`srcHeight`指定我们从`Pixmap`中取出的部分的大小。\n\
  *   最后，`Graphics.getWidth()`和`Graphics.getHeight()`方法返回帧缓冲区的宽度和高度（以像素为单位）。\n\n除了`Graphics.clear()`之外，所有绘图方法都会自动为它们接触到的每个像素执行混合，如上一节所述。我们可以逐个案例地禁用混合以加快绘图速度，但这会使我们的实现复杂化。通常，对于像\
  \ Mr. Nom 这样的简单游戏，我们可以一直启用混合。\n\n`Pixmap`接口在清单 3–7 中给出。\n\n**清单 3–7.** *Pixmap 接口*\n\
  \n```java\npackage com.badlogic.androidgames.framework;\n```\n\n\n```java\nimport\
  \ com.badlogic.androidgames.framework.Graphics.PixmapFormat;\n\npublic interface\
  \ Pixmap {\n    public int getWidth();\n    public int getHeight();\n    public\
  \ PixmapFormat getFormat();\n    public void dispose();\n}\n```\n\n我们保持其非常简洁且不可变，因为合成操作是在帧缓冲区中完成的。\n\
  \n- `Pixmap.getWidth()` 和 `Pixmap.getHeight()` 方法分别返回 `Pixmap` 的以像素为单位的宽度和高度。\n\
  - `Pixmap.getFormat()` 方法返回存储在 RAM 中的 `Pixmap` 所使用的 `PixelFormat`。\n- 最后，还有 `Pixmap.dispose()`\
  \ 方法。`Pixmap` 实例会占用内存和其他可能的系统资源。如果不再需要它们，就应该通过此方法将其释放。\n\n借助这个简单的图形模块，我们之后可以轻松实现“诺姆先生”游戏。让我们通过讨论游戏框架本身来结束本章。\n\
  \n## 游戏框架\n\n完成了所有基础工作后，我们终于可以讨论如何实现游戏本身了。为此，让我们明确游戏需要执行哪些任务：\n\n- 游戏被划分为不同的屏幕。每个屏幕执行相同的任务：评估用户输入、将输入应用于屏幕状态，以及渲染场景。某些屏幕可能不需要任何用户输入，而是在一段时间后过渡到另一个屏幕（例如，启动画面）。\n\
  - 这些屏幕需要以某种方式进行管理（即，我们需要跟踪当前屏幕，并具备过渡到新屏幕的方法，这归结为销毁旧屏幕并将新屏幕设置为当前屏幕）。\n- 游戏需要允许屏幕访问不同的模块（用于图形、音频、输入等），以便它们加载资源、获取用户输入、播放声音、渲染到帧缓冲区等。\n\
  - 由于我们的游戏是实时的（这意味着事物会持续移动和更新），我们必须让当前屏幕尽可能频繁地更新其状态并渲染自身。我们通常在一个称为*主循环*的循环内执行此操作。当用户退出游戏时，循环终止。此循环的单次迭代称为一个*帧*。我们所能计算出的每秒帧数（FPS）称为*帧率*。\n\
  - 说到时间，我们还需要跟踪自上一帧以来经过的时间跨度。这用于实现与帧无关的移动，我们稍后会讨论。\n- 游戏需要跟踪窗口状态（即是否暂停或恢复），并将这些事件通知当前屏幕。\n\
  - 游戏框架将负责设置窗口并创建用于渲染和接收输入的 UI 组件。\n\n让我们将其简化为一些伪代码，暂时忽略暂停和恢复等窗口管理事件：\n\n```java\n\
  createWindowAndUIComponent();\n\nInput input = new Input();\nGraphics graphics =\
  \ new Graphics();\nAudio audio = new Audio();\nScreen currentScreen = new MainMenu();\n\
  Float lastFrameTime = currentTime();\n\nwhile ( !userQuit() ) {\n    float deltaTime\
  \ = currentTime() - lastFrameTime;\n    lastFrameTime = currentTime();\n\n    currentScreen.updateState(input,\
  \ deltaTime);\n    currentScreen.present(graphics, audio, deltaTime);\n}\n\ncleanupResources();\n\
  ```\n\n我们首先创建游戏窗口以及用于渲染和接收输入的 UI 组件。接着，实例化执行底层工作所需的所有模块。然后实例化起始屏幕并将其设为当前屏幕，并记录当前时间。最后进入主循环，当用户表示想要退出游戏时，循环终止。\n\
  \n在游戏循环中，我们计算所谓的*增量时间*。这是自上一帧开始以来经过的时间。然后我们记录当前帧开始的时间。增量时间和当前时间通常以秒为单位。对于屏幕而言，增量时间表示自上次更新以来经过了多少时间——如果我们要实现与帧无关的移动（稍后会再提及），就需要这些信息。\n\
  \n最后，我们只需更新当前屏幕的状态并将其呈现给用户。更新取决于增量时间以及输入状态；因此，我们将这些信息提供给屏幕。呈现过程包括将屏幕状态渲染到帧缓冲区，以及播放屏幕状态所需的任何音频（例如，因上次更新中发射了子弹而产生的音效）。呈现方法可能还需要知道自上次调用以来经过了多少时间。\n\
  \n当主循环终止时，我们可以清理并释放所有资源，然后关闭窗口。\n\n```markdown\n\n#### 游戏循环与界面设计\n\n几乎所有游戏在高层的工作方式都是如此：处理用户输入、更新状态、将状态呈现给用户，然后无限重复（或直到用户对游戏失去兴趣）。\n\
  \n现代操作系统上的 UI 应用通常不以实时方式工作。它们采用基于事件的范式，操作系统通过回调通知应用程序输入事件以及何时需要渲染自身。应用程序在启动时向操作系统注册这些回调，负责处理接收到的通知。所有这些都发生在所谓的*UI\
  \ 线程*中——即 UI 应用的主线程。通常最好尽快从回调中返回，因此我们不应该在回调中实现主循环。\n\n相反，我们将游戏主循环托管在游戏启动时生成的一个独立线程中。这意味着当我们需要接收\
  \ UI 线程事件（如输入事件或窗口事件）时，必须采取一些预防措施。但这些细节将在我们为 Android 实现游戏框架时再处理。只需记住，我们需要在特定时间点同步\
  \ UI 线程和游戏主循环线程。\n\n#### 游戏和屏幕接口\n\n基于以上讨论，让我们尝试设计一个游戏接口。该接口的实现需要完成以下任务：\n\n- 设置窗口和\
  \ UI 组件，并挂接回调以便接收窗口和输入事件。\n- 启动主循环线程。\n- 跟踪当前屏幕，并在每个主循环迭代（即帧）中通知其更新和呈现自身。\n- 将窗口事件（例如暂停和恢复事件）从\
  \ UI 线程传输到主循环线程，并传递给当前屏幕，以便其相应地更改状态。\n- 提供对我们之前开发的所有模块的访问权限：`Input`、`FileIO`、`Graphics`和`Audio`。\n\
  \n作为游戏开发者，我们希望对主循环运行在哪个线程以及是否需要与 UI 线程同步保持无关性。我们只想借助底层模块和一些窗口事件通知来实现不同的游戏屏幕。因此，我们将创建一个非常简单的`Game`接口来隐藏所有这些复杂性，以及一个抽象`Screen`类来帮助我们实现所有屏幕。清单\
  \ 3-8 显示了`Game`接口。\n\n**清单 3-8.** *游戏接口*\n\n```java\npackage com.badlogic.androidgames.framework;\n\
  \npublic interface Game {\n    public Input getInput();\n    public FileIO getFileIO();\n\
  \    public Graphics getGraphics();\n    public Audio getAudio();\n    public void\
  \ setScreen(Screen screen);\n    public Screen getCurrentScreen();\n    public Screen\
  \ getStartScreen();\n}\n```\n\n如预期，接口提供了一些 getter 方法，返回底层模块的实例，这些实例将由`Game`实现类实例化并跟踪管理。\n\
  \n`Game.setScreen()`方法允许我们设置`Game`的当前`Screen`。这些方法将一次性实现，同时包含内部的线程创建、窗口管理和主循环逻辑，主循环会不断请求当前屏幕进行呈现和更新。\n\
  \n`Game.getCurrentScreen()`方法返回当前活跃的`Screen`。\n\n稍后我们将使用名为`AndroidGame`的抽象类来实现`Game`接口，该类将实现除`Game.getStartScreen()`之外的所有方法。`Game.getStartScreen()`方法将是一个抽象方法。当我们为实际游戏创建`AndroidGame`实例时，将继承它并覆盖`Game.getStartScreen()`方法，返回游戏第一个屏幕的实例。\n\
  \n为了让您了解设置游戏将有多简单，这里有一个示例（假设我们已经实现了`AndroidGame`类）：\n\n```java\npublic class MyAwesomeGame\
  \ extends AndroidGame {\n    public Screen getStartScreen() {\n        return new\
  \ MySuperAwesomeStartScreen(this);\n    }\n}\n```\n\n这很酷，不是吗？我们只需实现想要用于启动游戏的屏幕，`AndroidGame`类将为我们完成其余工作。从那时起，`MySuperAwesomeStartScreen`将收到来自主循环线程中`AndroidGame`实例的更新和渲染请求。请注意，我们将`MyAwesomeGame`实例本身传递给`Screen`实现的构造函数。\n\
  \n**注意：** 如果您想知道什么实际实例化我们的`MyAwesomeGame`类，这里给您一个提示：`AndroidGame`将从`Activity`派生，当用户启动我们的游戏时，Android\
  \ 操作系统将自动实例化它。\n\n#### 屏幕抽象类\n\n拼图的最后一块是抽象类`Screen`。我们将其设为抽象类而不是接口，以便实现一些簿记功能。这样，在实际实现`Screen`抽象类时，我们只需编写更少的样板代码。清单\
  \ 3-9 显示了抽象`Screen`类。\n\n**清单 3-9.** *Screen 类*\n\n```java\npackage com.badlogic.androidgames.framework;\n\
  \npublic abstract class Screen {\n    protected final Game game;\n\n    public Screen(Game\
  \ game) {\n        this.game = game;\n    }\n\n    public abstract void update(float\
  \ deltaTime);\n    public abstract void present(float deltaTime);\n    public abstract\
  \ void pause();\n    public abstract void resume();\n    public abstract void dispose();\n\
  }\n```\n\n事实证明，簿记工作并没有那么复杂。构造函数接收`Game`实例并将其存储在一个 final 成员变量中，所有子类都可以访问它。通过这种机制，我们可以实现两件事：\n\
  \n- 我们可以访问`Game`的底层模块来播放音频、绘制屏幕、获取用户输入以及读写文件。\n- 我们可以在适当时机通过调用`Game.setScreen()`来设置新的当前屏幕（例如，当按下触发屏幕切换的按钮时）。\n\
  \n第一点显而易见：我们的`Screen`实现需要访问这些模块，以便能够执行有意义的操作，比如渲染大量疯狂的独角兽。\n\n第二点允许我们在`Screen`实例内部轻松实现屏幕切换。每个`Screen`可以根据其状态决定何时切换到哪个其他`Screen`（例如，当菜单按钮被按下时）。\n\
  \n`Screen.update()`和`Screen.present()`方法现在应该不言自明：它们将更新屏幕状态并相应地呈现。`Game`实例将在主循环的每次迭代中调用它们一次。\n\
  \n当游戏暂停或恢复时，会调用`Screen.pause()`和`Screen.resume()`方法。这项工作同样由`Game`实例完成，并应用于当前活跃的`Screen`。\n\
  \n当调用`Game.setScreen()`时，`Game`实例将调用`Screen.dispose()`方法。`Game`实例通过此方法销毁当前`Screen`，从而给`Screen`释放所有系统资源（例如存储在`Pixmap`中的图形资产）的机会，以便为新屏幕的资源腾出内存空间。对`Screen.dispose()`方法的调用也是屏幕确保所有需要持久化的信息被保存的最后机会。\n\
  \n#### 一个简单示例\n\n继续我们的`MySuperAwesomeGame`示例，这里是`MySuperAwesomeStartScreen`类的一个非常简单的实现：\n\
  \n```java\npublic class MySuperAwesomeStartScreen extends Screen {\n    Pixmap awesomePic;\n\
  \    int x;\n```\n\n```\n\n\n`public MySuperAwesomeStartScreen(Game game) {`\n`\
  \    super(game);`\n`    awesomePic = game.getGraphics().newPixmap(\"data/pic.png\"\
  ,`\n`            PixmapFormat.RGB565);`\n`}`\n\n`@Override`\n`public void update(float\
  \ deltaTime) {`\n`    x += 1;`\n`    if (x > 100)`\n`        x = 0;`\n`}`\n\n`@Override`\n\
  `public void present(float deltaTime) {`\n`    game.getGraphics().clear(0);`\n`\
  \    game.getGraphics().drawPixmap(awesomePic, x, 0, 0, 0,`\n`            awesomePic.getWidth(),\
  \ awesomePic.getHeight());`\n`}`\n\n`@Override`\n`public void pause() {`\n`    //\
  \ 此处无需执行任何操作`\n`}`\n\n`@Override`\n`public void resume() {`\n`    // 此处无需执行任何操作`\n\
  `}`\n\n`@Override`\n`public void dispose() {`\n`    awesomePic.dispose();`\n`}`\n\
  \n我们来看看这个类与 `MySuperAwesomeGame` 类结合后会执行哪些操作：\n\n1.  当创建 `MySuperAwesomeGame` 类时，它会设置窗口、用于渲染和接收事件的\
  \ UI 组件、用于接收窗口和输入事件的回调函数，以及主循环线程。最后，它会调用自身的 `MySuperAwesomeGame.getStartScreen()`\
  \ 方法，该方法会返回一个 `MySuperAwesomeStartScreen()` 类的实例。\n2.  在 `MySuperAwesomeStartScreen`\
  \ 的构造函数中，我们从磁盘加载一张位图，并将其存储在一个成员变量中。至此，屏幕设置完成，控制权交还给 `MySuperAwesomeGame` 类。\n3.\
  \  主循环线程现在会持续调用我们刚刚创建的实例中的 `MySuperAwesomeStartScreen.update()` 和 `MySuperAwesomeStartScreen.present()`\
  \ 方法。\n4.  在 `MySuperAwesomeStartScreen.update()` 方法中，每帧我们都会将名为 `x` 的成员变量增加 1。该成员变量用于存储我们要渲染的图像的\
  \ x 坐标。当 x 坐标值大于 100 时，我们将其重置为 0。\n5.  在 `MySuperAwesomeStartScreen.present()` 方法中，我们使用黑色（`0x00000000\
  \ = 0`）清除帧缓冲区，并在位置 (`x`,0) 渲染我们的 `Pixmap`。\n6.  主循环线程会重复步骤 3 到 5，直到用户按下设备上的返回按钮退出游戏。随后，`Game`\
  \ 实例会调用 `MySuperAwesomeStartScreen.dispose()` 方法，该方法会释放 `Pixmap` 资源。\n\n这就是我们的第一个（不算特别）有趣的游戏！用户所能看到的只是一个图像在屏幕上从左向右移动。这绝对算不上愉快的用户体验，但我们稍后会改进这一点。请注意，在\
  \ Android 上，游戏可以在任意时刻暂停和恢复。我们的 `MyAwesomeGame` 实现会随之调用 `MySuperAwesomeStartScreen.pause()`\
  \ 和 `MySuperAwesomeStartScreen.resume()` 方法。只要应用程序本身处于暂停状态，主循环线程也会暂停。\n\n最后还有一个问题需要讨论：帧率无关的运动。\n\
  \n#### 帧率无关运动\n\n假设用户设备能以 60 FPS 运行上一节中的游戏。我们每帧将 `MySuperAwesomeStartScreen.x` 成员变量增加\
  \ 1 像素，那么我们的 `Pixmap` 将在 100 帧内前进 100 像素。在 60 FPS 的帧率下，大约需要 1.66 秒才能到达位置 (100,0)。\n\
  \n现在假设第二位用户在不同的设备上运行我们的游戏。该设备能以 30 FPS 运行我们的游戏。每秒，我们的 `Pixmap` 前进 30 像素，因此需要 3.33\
  \ 秒才能到达位置 (100,0)。\n\n这很糟糕。对我们这个简单游戏来说，这或许对用户体验影响不大，但假设把 `Pixmap` 替换成超级马里奥，想想以帧依赖的方式移动他会意味着什么。假设我们按住方向键右键，让马里奥向右跑。在每一帧中，我们把他向前移动\
  \ 1 像素，就像我们对 `Pixmap` 所做的那样。在能以 60 FPS 运行游戏的设备上，马里奥的跑步速度会是 30 FPS 设备上的两倍！这会完全改变用户体验，完全取决于设备的性能。我们需要解决这个问题。\n\
  \n这个问题的解决方案称为帧无关运动。我们不再每帧移动固定的像素量，而是以每秒移动的单位数来指定运动速度。假设我们希望 `Pixmap` 每秒前进 50 像素。除了每秒\
  \ 50 像素这个值，我们还需要知道自上次移动 `Pixmap` 以来过去了多少时间。这就是那个奇怪的 delta time（增量时间）发挥作用的地方。它精确地告诉我们自上次更新以来过去了多少时间。因此，我们的\
  \ `MySuperAwesomeStartScreen.update()` 方法应该如下所示：\n\n```\n@Override\npublic void\
  \ update(float deltaTime) {\n    x += 50 * deltaTime;\n    if (x > 100)\n      \
  \  x = 0;\n}\n```\n\n如果我们的游戏以恒定的 60 FPS 运行，传递给该方法的 delta time 将总是 `1 / 60 ~ 0.016`\
  \ 秒。因此，每帧我们前进 `50 × 0.016 ~ 0.83` 像素。在 60 FPS 下，我们每秒前进 `60 × 0.83 ~ 50` 像素！让我们用\
  \ 30 FPS 测试一下：`50 × 1 / 30 ~ 1.66`。乘以 30 FPS，我们每秒同样总共移动 50 像素。因此，无论运行我们游戏的设备执行速度有多快，我们的动画和运动都将始终与实际挂钟时间保持一致。\n\
  \n如果我们真的用之前的代码尝试这样做，那么在 60 FPS 下，我们的 `Pixmap` 根本不会移动。这是因为代码中的一个错误。我们留点时间让你找出它。这个错误非常微妙，但在游戏开发中是常见的陷阱。我们每帧用来递增的\
  \ `x` 成员变量实际上是一个整数。将 `0.83` 加到整数上是没有效果的。要修复这个问题，我们只需要将 `x` 存储为 `float` 而不是 `int`。这也意味着在调用\
  \ `Graphics.drawPixmap()` 时，我们必须将其强制转换为 `int`。\n\n**注意：** 尽管在 Android 上浮点运算通常比整数运算慢，但其影响大多是微不足道的，因此使用开销稍高的浮点运算是可以接受的。\n\
  \n以上就是我们游戏框架的全部内容。我们可以将 Mr. Nom 设计中的屏幕直接翻译到我们的类和框架接口中。当然，仍有一些实现细节需要注意，但我们将在后面的章节中讨论。现在，你可以为自己感到非常自豪了。你坚持读完了本章内容，现在你已经准备好成为一名\
  \ Android（及其他平台）游戏开发者了！\n\n### 总结\n\n在阅读了这短短五十多页信息高度浓缩的章节后，你应该对创建游戏所涉及的内容有了很好的了解。我们研究了\
  \ Android 市场上一些最流行的游戏类型并得出了一些结论。我们仅使用剪刀、笔和纸，从头开始设计了一个完整的游戏。最后，我们探讨了游戏开发的理论基础，甚至创建了一套接口和抽象类，在本书后续内容中，我们将基于这些理论概念，使用它们来实现我们的游戏设计。如果你觉得想深入学习这些基础知识以外的内容，请务必查阅网络获取更多信息。你已经掌握了所有关键词。理解这些原则是开发稳定且性能良好的游戏的关键。话已至此，让我们为\
  \ Android 实现我们的游戏框架吧！\n\n## 第 4 章\n\n\n\n"
- "# 面向游戏开发者的 Android 开发指南\n\nAndroid 的应用框架庞大且有时令人困惑。但凡你能想到的任务，几乎都有相应的 API 可供使用。当然，你必须先学习这些\
  \ API。幸运的是，作为游戏开发者，我们只需要其中极为有限的一部分。我们需要的只是一个包含单一 UI 组件的窗口，可以在此绘制图形、接收输入，并且能够播放音频。这涵盖了我们在上一章中设计的游戏框架的所有需求，而且实现方式具有较好的平台无关性。\n\
  \n在本章中，你将学习实现《贪吃诺姆》所需的最基本的 Android API。你会惊讶地发现，要实现这个目标，你实际上只需要了解这些 API 的皮毛。让我们回顾一下需要哪些组件：\n\
  \n* 窗口管理\n* 输入处理\n* 文件输入/输出\n* 音频\n* 图形\n\n对于每个模块，应用框架 API 中都有对应的实现。我们将挑选并选择处理这些模块所需的\
  \ API，讨论其内部机制，最后实现我们在上一章中设计的游戏框架的相应接口。\n\n然而，在深入探讨 Android 的窗口管理之前，我们有必要重新审视一下之前在第\
  \ 2 章中简单提及的一个话题：通过清单文件定义应用程序。\n\n### 定义 Android 应用程序：清单文件\n\n一个 Android 应用程序可以由多种不同的组件构成：\n\
  \n*活动（Activities）*：这些是与用户交互的前端组件，提供可交互的用户界面。\n\n*服务（Services）*：这些是在后台运行的进程，没有可见的用户界面。例如，服务可能负责轮询邮件服务器以检查新邮件。\n\
  \n*内容提供者（Content providers）*：这些组件将应用程序的部分数据提供给其他应用程序使用。\n\n*意图（Intents）*：这些是由系统或应用程序本身创建的消息，然后传递给任何感兴趣的接收方。意图可以通知我们系统事件，例如\
  \ SD 卡被移除或 USB 线缆被连接。系统也使用意图来启动我们应用程序的组件，例如活动。我们也可以触发自己的意图，请求其他应用程序执行某个操作，比如打开相册显示图片，或者启动相机应用拍照。\n\
  \n*广播接收者（Broadcast receivers）*：这些组件对特定的意图做出响应，并可能执行某个操作，例如启动特定的活动或向系统发送另一个意图。\n\n\
  Android 应用程序没有像桌面操作系统（例如 Java 的 `main()` 方法）那样单一的入口点。相反，Android 应用程序的组件是由特定的意图启动或要求执行特定操作的。\n\
  \n应用程序中包含哪些组件，以及这些组件响应哪些意图，都在应用程序的清单文件中定义。Android 系统使用此清单文件来了解应用程序的构成，例如应用程序启动时要显示的默认活动。\n\
  \n**注意：** 本书只关注活动（Activities），因此我们只会讨论清单文件中与此类组件相关的部分。如果你想深入了解，可以在 Android 开发者网站上查看关于清单文件的更多信息。\n\
  \n清单文件的用途远不止定义应用程序的组件。以下列表总结了在游戏开发背景下清单文件的相关部分：\n\n* 应用程序的版本（显示在 Android 市场上并被其使用）\n\
  * 应用程序可以运行的 Android 版本\n* 应用程序所需的硬件配置（例如多点触控、特定屏幕分辨率或对 OpenGL ES 2.0 的支持）\n* 使用特定组件的权限，例如写入\
  \ SD 卡或访问网络栈\n\n在接下来的小节中，我们将创建一个模板清单，稍作修改后可在本书所有项目中重复使用。为此，我们将逐一介绍定义应用程序所需的所有相关\
  \ XML 标签。\n\n#### `<manifest>` 元素\n\n`<manifest>` 标签是 `AndroidManifest.xml` 文件的根元素。以下是一个基本示例：\n\
  \n```\n<manifest\n      package=\"com.helloworld\"\n      android:versionCode=\"\
  1\"\n      android:versionName=\"1.0\"\n      android:installLocation=\"preferExternal\"\
  >\n…\n</manifest>\n```\n\n我们假设你之前接触过 XML，因此应该熟悉第一行。`<manifest>` 标签声明了一个名为 `android`\
  \ 的命名空间，该命名空间在清单文件的其余部分中会一直使用。`package` 属性定义了应用程序的根包名。稍后，我们将以此包名为基准来引用应用程序的特定类。\n\
  \n`versionCode` 和 `versionName` 属性以两种形式指定了应用程序的版本。`versionCode` 是一个整数，每次发布新版本的应用程序时都必须递增。Android\
  \ 市场使用它来跟踪应用程序的版本。`versionName` 会显示给在 Android 市场上浏览该应用程序的用户。你可以在此处使用任何字符串。\n\n`installLocation`\
  \ 属性仅在 Eclipse 中将 Android 项目的构建目标设置为 Android 2.2 或更新版本时才可用。它指定了应用程序的安装位置。字符串 `preferExternal`\
  \ 告诉系统我们希望将应用程序安装到 SD 卡上。这仅适用于 Android 2.2 及更新版本，所有更早版本的 Android 系统会忽略此设置。在 Android\
  \ 2.2 及更新版本中，如果可能，应用程序会尽量安装在内部存储上。\n\n如前所示，清单文件中 XML 元素的所有属性通常都以 `android` 命名空间为前缀。为简洁起见，在以下小节中讨论特定属性时，我们将省略该命名空间。\n\
  \n在 `<manifest>` 元素内部，我们接着定义应用程序的组件、权限、硬件配置以及支持的 Android 版本。\n\n\n\n#### 应用元素\n\n\
  与 `<manifest>` 元素类似，让我们通过一个示例来讨论 `<application>` 元素：\n\n```\n<application android:icon=\"\
  @drawable/icon\" android:label=\"@string/app_name\"\nandroid:debuggable=\"true\"\
  >\n…\n</application>\n```\n\n这看起来是不是有点奇怪？`@drawable/icon` 和 `@string/app_name` 这些字符串是怎么回事？在开发标准\
  \ Android 应用时，我们通常会编写大量 XML 文件，每个文件定义了应用的特定部分。要完整定义这些部分，我们还需要能够引用未在 XML 文件中定义的资源，如图片或国际化字符串。这些资源位于\
  \ `res/` 文件夹的子文件夹中，正如我们在第 2 章中剖析 Eclipse 里的 Hello World 项目时所讨论的那样。\n\n为了引用资源，我们使用上述表示法。`@`\
  \ 表示我们想引用别处定义的资源。其后的字符串指定了我们想引用的资源类型，它直接映射到 `res/` 目录下的某个文件夹或文件。最后一部分指定了资源的名称。在上述示例中，这是一张名为\
  \ `icon` 的图片和一个名为 `app_name` 的字符串。对于图片而言，它就是我们指定的实际文件名，可在 `res/drawable/` 文件夹中找到。请注意，图片名称不包含像\
  \ `.png` 或 `.jpg` 这样的后缀。Android 会根据 `res/drawable/` 文件夹中的内容自动推断后缀。`app_name` 字符串定义在\
  \ `res/values/strings.xml` 文件中，该文件存储了应用使用的所有字符串。字符串的名称是在 `strings.xml` 文件中定义的。\n\
  \n**注意：** Android 上的资源处理极其灵活，但也很复杂。对于本书，我们决定跳过大部分资源处理，原因有二：对于游戏开发来说这完全是过度设计，而且我们希望完全控制我们的资源。Android\
  \ 有修改 `res/` 文件夹中资源的习惯，尤其是图片（称为可绘制对象）。作为游戏开发者，我们不希望这样。我们建议在游戏开发中使用 Android 资源系统的唯一用途是字符串国际化。本书不会深入探讨这一点；相反，我们将使用更适合游戏开发的\
  \ `assets/` 文件夹，它不会改动我们的资源，并允许我们指定自己的文件夹层级。\n\n现在，`<application>` 元素各属性的含义应该更清晰一些了。`icon`\
  \ 属性指定了 `res/drawable/` 文件夹中用作应用图标的图片。此图标将显示在 Google Play 以及设备上的应用启动器中。它也是我们在 `<application>`\
  \ 元素中定义的所有 Activity 的默认图标。\n\n`label` 属性指定了应用在启动器中显示的名称。在上述示例中，它引用了 `res/values/string.xml`\
  \ 文件中的一个字符串，也就是我们在 Eclipse 中创建 Android 项目时指定的内容。我们也可以将其设置为原始字符串，例如 `我的超级棒游戏`。该标签也是我们在\
  \ `<application>` 元素中定义的所有 Activity 的默认标签。标签将显示在我们应用的标题栏中。\n\n`debuggable` 属性指定了我们的应用是否可以被调试。对于开发阶段，我们通常应将其设置为\
  \ `true`。当你将应用部署到市场时，只需将其切换为 `false`。如果你不将其设置为 `true`，你将无法在 Eclipse 中调试应用。\n\n我们只讨论了可以为\
  \ `<application>` 元素指定的属性中很小的一部分。然而，这些对于我们的游戏开发需求来说已经足够了。如果你想了解更多，可以访问 Android 开发者网站上的完整文档。\n\
  \n`<application>` 元素包含了所有应用组件的定义，包括 Activity 和服务，以及任何使用的附加库。\n\n#### `<activity>`\
  \ 元素\n\n现在变得有趣了。以下是我们 Mr. Nom 游戏的一个假设示例：\n\n```\n<activity android:name=\".MrNomActivity\"\
  \n          android:label=\"Mr. Nom\"\n          android:screenOrientation=\"portrait\"\
  \n          android:configChanges=\"keyboard|keyboardHidden|orientation\"\n    <intent-filter>\n\
  \        <action android:name=\"android.intent.action.MAIN\" />\n        <category\
  \ android:name=\"android.intent.category.LAUNCHER\" />\n    </intent-filter>\n</activity>\n\
  ```\n\n我们首先看看 `<activity>` 标签的属性。\n\n> `name`：此属性指定了 Activity 类相对于我们在 `<manifest>`\
  \ 元素中指定的 `package` 属性的名称。你也可以在此处指定完全限定的类名。\n> \n> `label`：我们已经在 `<application>`\
  \ 中指定了相同的属性。此标签显示在 Activity 的标题栏中（如果有的话）。如果我们定义的 Activity 是应用的入口点，此标签也会用作应用启动器中显示的文本。如果我们不指定它，则会使用\
  \ `<application>` 元素中的标签。请注意，我们在这里使用了原始字符串，而不是对 `string.xml` 文件中字符串的引用。\n> \n> `screenOrientation`：此属性指定\
  \ Activity 将使用的屏幕方向。这里我们为 Mr. Nom 游戏指定了 `portrait`（竖屏），这意味着它只能在竖屏模式下运行。或者，如果我们想以横屏模式运行，可以指定\
  \ `landscape`（横屏）。这两种配置都会强制 Activity 的方向在其整个生命周期内保持不变，无论设备实际方向如何。如果我们省略此属性，则 Activity\
  \ 将使用设备的当前方向，通常基于加速度计数据。这也意味着，每当设备方向改变时，Activity 会被销毁并重新启动——这对于游戏来说是不希望发生的。我们通常会将游戏\
  \ Activity 的方向固定为竖屏或横屏模式。\n> \n> `configChanges`：旋转设备或滑出键盘被视为配置变更。发生此类变更时，Android\
  \ 会销毁并重新启动我们的应用以适应变化。这在游戏中是不可取的。`<activity>` 元素的 `configChanges` 属性可以解决这个问题。它允许我们指定哪些配置变更由我们自己处理，而无需销毁和重新创建\
  \ Activity。可以使用 `|` 字符连接来指定多个配置变更。在上述示例中，我们自己处理了 `keyboard`（键盘）、`keyboardHidden`（键盘隐藏）和\
  \ `orientation`（方向）变更。\n\n与 `<application>` 元素一样，当然可以为 `<activity>` 元素指定更多属性。对于游戏开发，我们使用刚刚讨论的四个属性就足够了。\n\
  \n现在，你可能已经注意到 `<activity>` 元素并非空元素，它包含了另一个元素，而该元素本身又包含了两个元素。它们是做什么用的？\n\n正如我们之前指出的，Android\
  \ 上的应用没有一个单一的“主入口点”概念。相反，我们可以有多个入口点，形式为 Activity 和服务，它们因系统或第三方应用发出的特定 Intent 而启动。我们需要以某种方式告知\
  \ Android，我们应用的哪些 Activity 和服务将（以及以何种方式）响应特定的 Intent。这就是 `<intent-filter>` 元素发挥作用的地方。\n\
  \n\n\n在前面的示例中，我们指定了两种意图过滤器：`<action>`和`<category>`。`<action>`元素告诉 Android，我们的 Activity\
  \ 是应用程序的主要入口点。`<category>`元素指定我们希望将该 Activity 添加到应用程序启动器中。这两个元素共同作用，使得当按下应用程序启动器中的图标时，Android\
  \ 能够推断出它应该启动那个特定的 Activity。\n\n对于`<action>`和`<category>`元素，唯一需要指定的是`name`属性，它标识了该\
  \ Activity 将响应的意图。意图`android.intent.action.MAIN`是一个特殊的意图，Android 系统使用它来启动应用程序的主\
  \ Activity。意图`android.intent.category.LAUNCHER`用于告诉 Android，应用程序的某个特定 Activity 是否应在应用程序启动器中拥有一个入口。\n\
  \n通常，我们只会有一个 Activity 同时指定这两个意图过滤器。然而，一个标准的 Android 应用程序几乎总是包含多个 Activity，这些 Activity\
  \ 也需要在`manifest.xml`文件中定义。以下是这类子 Activity 的定义示例：\n\n```\n<activity android:name=\"\
  .MySubActivity\"\n          android:label=\"Sub Activity Title\"\n          android:screenOrientation=\"\
  portrait\">\n          android:configChanges=\"keyboard|keyboardHidden|orientation\"\
  />\n```\n\n这里没有指定任何意图过滤器——只包含了我们之前讨论过的 Activity 的四个属性。当我们像这样定义一个 Activity 时，它只能被我们自己的应用程序使用。我们通过一种特殊的意图以编程方式启动这种类型的\
  \ Activity；例如，当在一个 Activity 中按下按钮以打开一个新的 Activity 时。我们将在后续章节中看到如何以编程方式启动一个 Activity。\n\
  \n总结一下，我们有一个 Activity，为其指定了两个意图过滤器，使其成为应用程序的主要入口点。对于所有其他 Activity，我们省略意图过滤器规范，使它们成为应用程序内部的\
  \ Activity。我们将以编程方式启动这些 Activity。\n\n**注意：** 如前所述，在我们的游戏中，我们只会有一个 Activity。这个 Activity\
  \ 将拥有与之前展示的完全相同的意图过滤器规范。我们讨论如何指定多个 Activity 的原因是，我们稍后将创建一个具有多个 Activity 的特殊示例应用程序。别担心——这很容易。\n\
  \n#### `<uses-permission>`元素\n\n我们现在离开`<application>`元素，回到通常作为`<manifest>`元素子元素定义的元素。其中之一是`<uses-permission>`元素。\n\
  \nAndroid 拥有一个精细的安全模型。每个应用程序都在自己的进程和虚拟机中运行，拥有自己的 Linux 用户和组，并且不能影响其他应用程序。Android\
  \ 还限制了对系统资源的使用，例如网络设施、SD 卡和音频录制硬件。如果我们的应用程序想要使用任何这些系统资源，我们必须请求权限。这是通过`<uses-permission>`元素完成的。\n\
  \n权限总是具有以下形式，其中`string`指定了我们希望被授予的权限名称：\n\n```\n<uses-permission android:name=\"\
  string\"/>\n```\n\n以下是一些可能用到的权限名称：\n\n- `android.permission.RECORD_AUDIO`：授予我们访问音频录制硬件的权限。\n\
  - `android.permission.INTERNET`：授予我们访问所有网络 API 的权限，这样我们就能从网络获取图片或上传高分。\n- `android.permission.WRITE_EXTERNAL_STORAGE`：允许我们在外部存储（通常是设备的\
  \ SD 卡）上读取和写入文件。\n- `android.permission.WAKE_LOCK`：允许我们获取所谓的唤醒锁。使用此唤醒锁，我们可以防止设备在屏幕长时间未触碰时进入休眠状态。例如，在仅通过加速度计控制的游戏中可能会发生这种情况。\n\
  - `android.permission.ACCESS_COARSE_LOCATION`：这是一个非常有用的权限，因为它允许你获取非 GPS 级别的信息，例如用户所在的国家，这对于语言默认设置和分析很有用。\n\
  - `android.permission.NFC`：允许应用程序通过 NFC（近场通信）执行 I/O 操作，这对于涉及快速交换少量信息的各种游戏功能非常有用。\n\
  \n为了访问网络 API，我们需要在`<manifest>`元素下指定以下子元素：\n\n```\n<uses-permission android:name=\"\
  android.permission.INTERNET\"/>\n```\n\n对于任何额外的权限，我们只需添加更多的`<uses-permission>`元素。你可以指定更多权限；我们再次建议你查阅官方\
  \ Android 文档。我们只需要上面讨论过的这些权限。\n\n忘记添加类似访问 SD 卡这样的权限是常见的错误来源。它表现为设备日志中的一条消息，但由于日志中的大量杂乱信息，该消息可能未被察觉。思考你的游戏将需要哪些权限，并在最初创建项目时就指定它们。\n\
  \n另外需要注意的一点是，当用户安装你的应用程序时，他或她将首先被要求审查你的应用程序所需的所有权限。许多用户会直接跳过这些内容，并愉快地安装他们能找到的任何应用。一些用户对自己的决定更加谨慎，会详细审查权限。如果你请求可疑的权限，比如发送昂贵的短信或获取用户的位置信息，当你的应用程序上线到市场时，你可能会在应用评论部分收到一些恶评。如果你必须使用这些有问题的权限之一，你还应该在应用描述中告诉用户你使用它的原因。最好的做法是首先避免使用这些权限，或者提供合法使用它们的相应功能。\n\
  \n\n\n#### `<uses-feature>` 元素\n\n如果你本身就是 Android 用户，并且拥有一台运行像 1.5 这样的老旧 Android\
  \ 版本的设备，你就会注意到一些很棒的应用程序不会出现在你设备上的 Android Market 应用中。造成这种情况的原因之一，可能是应用程序的清单文件中使用了\
  \ `<uses-feature>` 元素。\n\nAndroid Market 应用会根据你的硬件配置文件过滤所有可用的应用程序。通过 `<uses-feature>`\
  \ 元素，应用程序可以指定它需要哪些硬件功能；例如，多点触控或对 OpenGL ES 2.0 的支持。任何不具备所指定功能的设备都会触发该过滤器，从而使得终端用户最初无法看到该应用。\n\
  \n`<uses-feature>` 元素具有以下属性：\n\n`<uses-feature android:name=\"`*`string`*`\" android:required=[\"\
  true\" | \"false\"]`\n`android:glEsVersion=\"integer\" />`\n\n`name` 属性指定了功能本身。`required`\
  \ 属性告诉过滤器，我们是否在所有情况下都需要该功能，或者它只是锦上添花。最后一个属性是可选的，仅当需要特定的 OpenGL ES 版本时才使用。\n\n对于游戏开发者来说，以下功能最为相关：\n\
  \n> `android.hardware.touchscreen.multitouch`：这要求设备具备能够进行基本多点触控交互（如捏合缩放等）的多点触控屏幕。这类屏幕在独立追踪多指动作时存在问题，因此你必须评估这些能力是否足以满足你的游戏需求。\n\
  >\n> `android.hardware.touchscreen.multitouch.distinct`：这是前一个功能的进阶版。它要求具备完整的多点触控能力，适用于实现诸如屏幕虚拟双摇杆控制等功能。\n\
  \n我们将在本章后面部分探讨多点触控。现在只需记住，当我们的游戏需要多点触控屏幕时，我们可以通过指定一个包含上述某个功能名称的 `<uses-feature>`\
  \ 元素来剔除所有不支持该功能的设备，如下所示：\n\n`<uses-feature android:name=\"`*`android.hardware.touchscreen.multitouch`*`\"\
  `\n`android:required=\"true\"/>`\n\n对游戏开发者来说，另一件有用的事情是指定所需的 OpenGL ES 版本。在本书中，我们将关注\
  \ OpenGL ES 1.0 和 1.1。对于这些版本，我们通常不需要指定 `<uses-feature>` 元素，因为它们之间的差异并不大。然而，任何实现了\
  \ OpenGL ES 2.0 的设备都可以被认为是图形处理能力强大的设备。如果我们的游戏在视觉上很复杂，并且需要强大的处理能力，我们可以要求 OpenGL ES\
  \ 2.0，这样游戏就只会出现在那些能够以可接受帧率渲染我们精美画面的设备上。请注意，我们并不是要使用 OpenGL ES 2.0，而只是通过硬件类型进行过滤，以便我们的\
  \ OpenGL ES 1.x 代码能获得足够的处理能力。以下是实现方法：\n\n`<uses-feature android:glEsVersion=\"0x00020000\"\
  \ android:required=\"true\"/>`\n\n这将使我们的游戏仅出现在支持 OpenGL ES 2.0 的设备上，因此可以推断这些设备拥有相当强大的图形处理器。\n\
  \n**注意：** 某些设备会错误地报告此功能，这将使你的应用对原本完全合适的设备不可见。请谨慎使用。\n\n假设你想为你的游戏提供 USB 外设的可选支持，以便设备可以作为\
  \ USB 主机，并连接手柄或其他外设。处理这个问题的正确方法是添加：\n\n`<uses-feature android:name=\"android.hardware.usb.host\"\
  \ android:required=\"false\"/>`\n\n将 `android:required` 设置为 `false` 就是在向市场表明“我们可能会用到这个功能，但它不是下载和运行游戏所必需的。”\
  \ 为你的游戏声明可选硬件功能的使用，是一种使其能适应未来你可能遇到的各种硬件的好方法。它允许制造商将应用限制为仅限那些已声明支持其特定硬件的应用，并且如果你声明了可选支持，你的应用将会包含在可为此设备下载的应用列表中。\n\
  \n现在，你在硬件方面的每一个特定要求都可能潜在地减少你的游戏可以安装的设备数量，这将直接影响你的销售额。在指定上述任何内容之前，请三思。例如，如果你的游戏的标准模式需要多点触控，但你也能够想出办法让它在单点触控设备上运行，那么你应该努力拥有两套代码路径——一套对应一种硬件配置——这样你的游戏就可以部署到更大的市场。\n\
  \n#### `<uses-sdk>` 元素\n\n我们要放在清单文件中的最后一个元素是 `<uses-sdk>` 元素。它是 `<manifest>` 元素的子元素。当我们在第\
  \ 2 章中创建 Hello World 项目时，我们已经隐式地定义了此元素，并在“新建 Android 项目”对话框中指定了最低 SDK 版本。那么这个元素是做什么的呢？这里有一个例子：\n\
  \n`<uses-sdk android:minSdkVersion=\"3\" android:targetSdkVersion=\"13\"/>`\n\n\
  正如我们在第 2 章中讨论的，每个 Android 版本都有一个与其关联的整数，也称为 SDK 版本。`<uses-sdk>` 元素指定了我们的应用程序支持的最低版本以及目标版本。在这个例子中，我们将最低版本定义为\
  \ Android 1.5，目标版本定义为 13。这个元素允许我们将一个使用了仅在较新版本中可用的 API 的应用程序，部署到安装了较低版本系统的设备上。一个突出的例子就是多点触控\
  \ API，从 SDK 版本 5（Android 2.0）开始就支持了。当我们在 Eclipse 中设置 Android 项目时，我们使用一个支持该 API 的构建目标；例如，SDK\
  \ 版本 5 或更高（我们通常将其设置为最新的 SDK 版本，在写作本文时为 13）。如果我们希望我们的游戏也能在 SDK 版本 3（Android 1.5）的设备上运行，我们就像之前一样，在清单文件中指定\
  \ `minSdkVersion`。当然，我们必须小心，不要在较低版本（至少在 1.5 设备上）中使用任何不可用的 API。在具有更高版本系统的设备上，我们也可以使用较新的\
  \ API。\n\n对于大多数游戏来说，上述配置通常是可行的（除非你无法为更高版本的 API 提供单独的备用代码路径，在这种情况下，你需要将 `minSdkVersion`\
  \ 属性设置为你实际支持的最低 SDK 版本）。\n\n\n\n### 十步轻松完成安卓游戏项目设置\n\n现在让我们结合前面所有的信息，整理出一个在 Eclipse\
  \ 中创建安卓游戏项目的简单分步方法。以下是我们对项目的需求：\n\n-   它应能使用最新 SDK 版本的功能，同时保持与某些设备仍在运行的最低 SDK 版本兼容。这意味着我们要支持安卓\
  \ 1.5 及以上版本。\n-   在可能的情况下，它应安装到 SD 卡，这样我们就不会占满设备的内部存储空间。\n-   它应是可调试的。\n-   它应有一个单一的主\
  \ Activity，能自行处理所有配置变化，这样当硬件键盘弹出或设备方向改变时，它不会被销毁。\n-   该 Activity 应固定为竖屏或横屏模式。\n\
  -   它应允许我们访问 SD 卡。\n-   它应允许我们获取唤醒锁。\n\n有了你刚掌握的知识，这些目标很容易实现。步骤如下：\n\n1.  如第 2 章所述，通过打开“新建安卓项目”对话框，在\
  \ Eclipse 中创建一个新的安卓项目。\n2.  在“新建安卓项目”对话框中，指定你的项目名称，并将构建目标设置为最新的可用 SDK 版本。\n3.  在同一对话框中，指定你的游戏名称、存放所有类的包名以及主\
  \ Activity 的名称。然后将最低 SDK 版本设置为 3。点击“完成”使项目成为现实。\n4.  打开 `AndroidManifest.xml` 文件。\n\
  5.  为了让安卓在可用时将游戏安装到 SD 卡，向 `<manifest>` 元素添加 `installLocation` 属性，并将其设置为 `preferExternal`。\n\
  6.  为了使游戏可调试，向 `<application>` 元素添加 `debuggable` 属性，并将其设置为 `true`。\n7.  要固定 Activity\
  \ 的方向，向 `<activity>` 元素添加 `screenOrientation` 属性，并指定你想要的方向（`portrait` 或 `landscape`）。\n\
  8.  要告诉安卓我们想要处理 `keyboard`、`keyboardHidden` 和 `orientation` 配置变化，将 `<activity>`\
  \ 元素的 `configChanges` 属性设置为 `keyboard|keyboardHidden|orientation`。\n9.  向 `<manifest>`\
  \ 元素添加两个 `<uses-permission>` 元素，并指定 `name` 属性为 `android.permission.WRITE_EXTERNAL_STORAGE`\
  \ 和 `android.permission.WAKE_LOCK`。\n10. 最后，向 `<uses-sdk>` 元素添加 `targetSdkVersion`\
  \ 属性，并指定你的目标 SDK。它应与你在步骤 1 中为构建目标指定的 SDK 版本相同。\n\n搞定了。这十个简单步骤将生成一个完整定义的应用程序，该程序会安装到\
  \ SD 卡（在安卓 2.2 及以上版本）、是可调试的、具有固定方向、在配置变化时不会崩溃、允许你访问 SD 卡和唤醒锁，并且能在从安卓 1.5 到最新版本的所有安卓版本上运行。以下是执行上述步骤后最终的\
  \ `AndroidManifest.xml` 文件内容：\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
  <manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\n      package=\"\
  com.badlogic.awesomegame\"\n      android:versionCode=\"1\"\n      android:versionName=\"\
  1.0\"\n      android:installLocation=\"preferExternal\">\n    <application android:icon=\"\
  @drawable/icon\"\n                 android:label=\"Awesomnium\"\n              \
  \   android:debuggable=\"true\">\n        <activity android:name=\".GameActivity\"\
  \n                  android:label=\"Awesomnium\"\n                  android:screenOrientation=\"\
  landscape\"\n                  android:configChanges=\"keyboard|keyboardHidden|orientation\"\
  >\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\"\
  \ />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n        </activity>\n    </application>\n  \
  \  <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" />\n\
  \    <uses-permission android:name=\"android.permission.WAKE_LOCK\" />\n    <uses-sdk\
  \ android:minSdkVersion=\"3\" android:targetSdkVersion=\"9\" />\n</manifest>\n```\n\
  \n如你所见，我们在 `<application>` 和 `<activity>` 元素的 `label` 属性中去掉了 `@string/app_name`。这并非必须，但将应用程序定义放在一处是更可取的做法。从现在开始，一切都关于代码！或者，不是吗？\n\
  \n### 市场过滤器\n\n有如此多不同能力的不同安卓设备，硬件制造商有必要只允许兼容的应用程序在其设备上下载和运行，否则用户将会在尝试运行不兼容的应用时获得糟糕的体验。为了处理这个问题，安卓市场会针对特定设备，从可用应用列表中过滤掉不兼容的应用程序。例如，如果你的设备没有摄像头，而你搜索一个需要摄像头的游戏，它就根本不会显示出来。无论好坏，对你（用户）而言，这个应用就像根本不存在一样。\n\
  \n我们之前讨论过的许多清单元素都被用作市场过滤器。除了我们已讲过的 `<uses-feature>`、`<uses-sdk>` 和 `<uses-permission>`，还有一些特定于市场过滤的元素你应该牢记：\n\
  \n> `<supports-screens>`：这允许你声明你的游戏可以运行的屏幕尺寸和密度。理想情况下，你的游戏应能适配所有屏幕，我们将向你展示如何做到这一点。然而，在清单文件中，你应该为每种支持的屏幕尺寸显式声明支持。\n\
  >\n> `<uses-configuration>`：这让你可以显式声明对设备上某种输入配置类型的支持，例如硬键盘、QWERTY 特定键盘、触摸屏或者可能轨迹球导航输入。理想情况下，你应该支持上述所有类型，但如果你的游戏需要非常特定的输入，你将需要研究并使用这个标签进行市场过滤。\n\
  >\n> `<uses-library>`：这允许声明你的游戏所依赖的第三方库必须存在于设备上。例如，你的游戏可能需要一个体积庞大但非常常见的文本转语音库。使用此标签声明该库可以确保只有安装了该库的设备才能看到并下载你的游戏。一个常见用途是让基于\
  \ GPS/地图的游戏只能在安装了谷歌地图库的设备上运行。\n\n随着安卓的发展，可能还会出现更多的市场过滤器标签，因此请务必在部署前查看开发者网站上的官方市场过滤器页面，以获取最新信息。\n\
  \n\n\n### 定义游戏的图标\n\n当您将游戏部署到设备并打开应用程序启动器时，会看到它的入口有一个漂亮但并非独特的 Android 图标。在市场中，您的游戏也会显示相同的图标。如何将其更改为自定义图标呢？\n\
  \n请再仔细查看一下 `<application>` 元素。我们在其中定义了一个名为 `icon` 的属性。它引用了 `res/drawable` 目录下名为\
  \ `icon` 的图像。因此，该怎么做显而易见：将 `drawable` 文件夹中的图标图像替换为您自己的图标图像。\n\n当您检查 `res/` 文件夹时，会发现不止一个\
  \ `drawable` 文件夹，如图 Figure 4–1 所示。\n\n![images](img/0401.jpg)\n\n**图 4–1.** *我的\
  \ `res/` 文件夹发生了什么？*\n\n现在，这又是一个经典的“先有鸡还是先有蛋”问题。在 第 2 章 中，我们的 Hello World 项目里只有一个\
  \ `res/drawable` 文件夹。这是因为我们将 SDK 版本 3 指定为了构建目标。该版本仅支持单一屏幕尺寸。这一情况在 Android 1.6（SDK\
  \ 版本 4）时发生了变化。我们在 第 1 章 中看到设备可能有不同的尺寸，但并未讨论 Android 如何处理这些差异。实际上，存在一套精密的机制，允许您为一系列所谓的屏幕密度定义图形资源。*屏幕密度*\
  \ 是物理屏幕尺寸与屏幕像素数量的组合。我们将在后续章节中更详细地探讨这个主题。目前，只需了解 Android 定义了四种密度即可：`ldpi` 用于低密度屏幕，`mdpi`\
  \ 用于标准密度屏幕，`hdpi` 用于高密度屏幕，`xhdpi` 用于超高密度屏幕。对于较低密度的屏幕，我们通常使用较小的图像；对于较高密度的屏幕，则使用高分辨率资源。\n\
  \n因此，对于我们的图标而言，需要提供四个版本：每种密度一个。但这些版本应该多大呢？幸运的是，`res/drawable` 文件夹中已有默认图标，我们可以据此反推出自定义图标的大小。`res/drawable-ldpi`\
  \ 中的图标分辨率为 36×36 像素，`res/drawable-mdpi` 中的图标分辨率为 48×48 像素，`res/drawable-hdpi` 中的图标分辨率为\
  \ 72×72 像素，而 `res/drawable-xhdpi` 中的图标分辨率为 96×96 像素。我们只需创建相同分辨率的自定义图标版本，并将每个文件夹中的\
  \ `icon.png` 文件替换为我们自己的 `icon.png` 文件即可。只要我们将图标图像文件命名为 `icon.png`，就可以保持清单文件不变。请注意，清单文件中的文件引用是区分大小写的。为安全起见，资源文件名始终使用小写字母。\n\
  \n为了实现与 Android 1.5 的真正兼容，我们需要添加一个名为 `res/drawable/` 的文件夹，并将 `res/drawable-mdpi/`\
  \ 文件夹中的图标图像放入其中。Android 1.5 无法识别其他 `drawable` 文件夹，因此可能找不到我们的图标。\n\n最后，我们已经准备好编写一些\
  \ Android 代码了。\n\n### Android API 基础\n\n在本章的其余部分，我们将重点实践那些与游戏开发需求相关的 Android API。为此，我们会采取一个非常便捷的做法：建立一个测试项目，其中将包含我们准备使用的各种\
  \ API 的所有小测试示例。让我们开始吧。\n\n#### 创建一个测试项目\n\n根据上一节的内容，我们已经知道如何设置所有项目。因此，第一件事就是执行前面概述的十个步骤。我们遵循这些步骤，创建了一个名为\
  \ `ch04--android-basics` 的项目，其中包含一个名为 `AndroidBasicsStarter` 的主活动。我们将使用一些较旧和较新的\
  \ API，因此将最低 SDK 版本设置为 3（Android 1.5），并将构建目标以及目标 SDK 版本设置为 9（Android 2.3）。从现在开始，我们将创建新的活动实现，每个实现演示\
  \ Android API 的某些部分。\n\n但请记住，我们只有一个主活动。那么，主活动应该是什么样的呢？我们想要一种便捷的方式来添加新活动，同时也能轻松启动特定活动。对于单个主活动的情况，显然该活动需要以某种方式提供启动特定测试活动的途径。如前所述，清单文件中会将主活动指定为主要入口点。我们添加的每个额外活动都不会包含\
  \ `<intent-filter>` 子元素。我们将从主活动通过编程方式启动它们。\n\n\n\n### `AndroidBasicsStarter` Activity\n\
  \nAndroid API 提供了一个特殊的类 `ListActivity`，它继承自我们在 Hello World 项目中使用的 `Activity` 类。`ListActivity`\
  \ 是一种特殊的 Activity，其唯一目的是显示列表内容（例如字符串）。我们用它来显示测试活动的名称。点击列表项时，将通过编程方式启动相应的 Activity。Listing\
  \ 4–1 展示了 `AndroidBasicsStarter` 主 Activity 的代码。\n\n**清单 4–1.** *`AndroidBasicsStarter.java`，负责列出并启动所有测试的主\
  \ Activity*\n\n```\npackage com.badlogic.androidgames;\n\nimport android.app.ListActivity;\n\
  import android.content.Intent;\nimport android.os.Bundle;\nimport android.view.View;\n\
  import android.widget.ArrayAdapter;\nimport android.widget.ListView;\n\npublic class\
  \ AndroidBasicsStarter extends ListActivity {\n    String tests[] = { \"LifeCycleTest\"\
  , \"SingleTouchTest\", \"MultiTouchTest\",\n            \"KeyTest\", \"AccelerometerTest\"\
  , \"AssetsTest\",\n            \"ExternalStorageTest\", \"SoundPoolTest\", \"MediaPlayerTest\"\
  ,\n            \"FullScreenTest\", \"RenderViewTest\", \"ShapeTest\", \"BitmapTest\"\
  ,\n            \"FontTest\", \"SurfaceViewTest\" };\n\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setListAdapter(new\
  \ ArrayAdapter<String>(this,\n                android.R.layout.simple_list_item_1,\
  \ tests));\n    }\n\n    @Override\n    protected void onListItemClick(ListView\
  \ list, View view, int position,\n            long id) {\n        super.onListItemClick(list,\
  \ view, position, id);\n        String testName = tests[position];\n        try\
  \ {\n            Class clazz = Class\n                    .forName(\"com.badlogic.androidgames.\"\
  \ + testName);\n            Intent intent = new Intent(this, clazz);\n         \
  \   startActivity(intent);\n        } catch (ClassNotFoundException e) {\n     \
  \       e.printStackTrace();\n        }\n    }\n}\n```\n\n我们选择的包名是 `com.badlogic.androidgames`。导入的类也相当直观：这些就是我们在代码中将要使用的所有类。`AndroidBasicsStarter`\
  \ 类继承自 `ListActivity` 类——这仍然没什么特别之处。字段 `tests` 是一个字符串数组，它保存了启动应用程序应该显示的所有测试 Activity\
  \ 的名称。请注意，该数组中的名称正是我们稍后将要实现的 Activity 类的完整 Java 类名。\n\n接下来的代码应该很熟悉：它是 `onCreate()`\
  \ 方法，每个 Activity 都必须实现它，并且当 Activity 创建时系统会调用该方法。请记住，我们必须调用 Activity 基类的 `onCreate()`\
  \ 方法。这是我们在自己的 `Activity` 实现的 `onCreate()` 方法中必须做的第一件事。如果没有调用，将抛出异常，并且 Activity 将无法显示。\n\
  \n完成上述操作后，我们接下来调用一个名为 `setListAdapter()` 的方法。此方法由我们继承的 `ListActivity` 类提供，它允许我们指定\
  \ `ListActivity` 要为我们显示的列表项。这些项必须以实现了 `ListAdapter` 接口的类实例的形式传递给该方法。我们使用方便的 `ArrayAdapter`\
  \ 来做到这一点。`ArrayAdapter` 的构造函数接受三个参数：第一个是 Activity，第二个稍后解释，第三个是 `ListActivity` 应该显示的项数组。我们愉快地将前面定义的\
  \ `tests` 数组作为第三个参数传入，这就完成了所有工作。\n\n那么 `ArrayAdapter` 构造函数的第二个参数是什么？要解释这一点，我们必须深入讲解\
  \ Android UI API 的所有内容，而我们在本书中并不打算使用这些 API。因此，与其浪费篇幅介绍我们不需要的内容，不如给你一个快速而粗略的解释：列表中的每一项都是通过一个\
  \ `View` 来显示的。该参数定义了每个 `View` 的布局以及类型。值 `android.R.layout.simple_list_item_1` 是\
  \ UI API 提供的一个预定义常量，用于快速启动和运行。它代表一个用于显示文本的标准列表项 `View`。回顾一下：`View` 是 Android 上的\
  \ UI 控件，例如按钮、文本字段或滑块。在第 2 章 剖析 `HelloWorld` Activity 时我们讨论过这一点。\n\n如果我们仅用这个 `onCreate()`\
  \ 方法启动 Activity，将看到类似 Figure 4–2 所示的屏幕。\n\n![images](img/0402.jpg)\n\n**图 4–2.**\
  \ *我们的测试启动 Activity，看起来不错，但还没有太多功能*\n\n现在，让我们让列表项在被点击时触发一些操作。我们希望启动与点击的列表项相对应的 Activity。\n\
  \n\n\n### 以编程方式启动活动\n\n`ListActivity` 类有一个名为 `onListItemClick()` 的受保护方法，当点击列表项时会被调用。我们只需在\
  \ `AndroidBasicsStarter` 类中重写该方法即可。这正是我们在清单 4–1 中所做的。\n\n该方法的参数包括：`ListActivity`\
  \ 用于显示列表项的 `ListView`、被触摸且位于该 `ListView` 中的 `View`、被触摸项在列表中的位置，以及一个我们不太关心的 ID。我们真正关心的只有\
  \ `position` 参数。\n\n`onListItemClicked()` 方法首先会遵守规范，调用基类的方法。如果我们重写了活动的方法，这始终是一个好习惯。接下来，我们根据\
  \ `position` 参数从 `tests` 数组中获取类名。这是拼图的第一块。\n\n之前我们讨论过，可以通过 `Intent` 以编程方式启动我们在清单文件中定义的活动。`Intent`\
  \ 类有一个简洁的构造函数来完成此操作，它接受两个参数：一个 `Context` 实例和一个 `Class` 实例，分别代表我们想要启动的活动所对应的 Java\
  \ 类。\n\n`Context` 是一个接口，为我们提供关于应用程序的全局信息。`Activity` 类实现了该接口，因此我们只需将 `this` 引用传递给\
  \ `Intent` 构造函数即可。\n\n为了获取代表我们想要启动的活动的 `Class` 实例，我们会用到一点反射技术。如果你用过 Java，应该对此并不陌生。静态方法\
  \ `Class.forName()` 接受一个字符串，该字符串包含我们想要获取 `Class` 实例的类的完全限定名。我们之后要实现的所有测试活动都将位于 `com.badlogic.androidgames`\
  \ 包中。将包名与从 `tests` 数组中获取的类名拼接起来，就能得到我们想要启动的活动类的完全限定名。我们将该名称传递给 `Class.forName()`，便能得到一个我们可以传递给\
  \ `Intent` 构造函数的 `Class` 实例。\n\n一旦 `Intent` 构建完成，我们就可以通过调用 `startActivity()` 方法来启动它。该方法同样在\
  \ `Context` 接口中定义。由于我们的活动实现了该接口，我们只需调用该方法的实现即可。就这样大功告成了！\n\n那么我们的应用程序将如何运行呢？首先，启动活动会显示出来。每次我们点击列表中的某个项，就会启动相应的活动。启动活动将被暂停并转入后台。我们发送的\
  \ `Intent` 会创建新的活动，并取代屏幕上原有的启动活动。当我们按下手机上的返回按钮时，该活动被销毁，启动活动恢复运行，重新占据屏幕。\n\n### 创建测试活动\n\
  \n当我们创建新的测试活动时，需要执行以下步骤：\n\n1.  在 `com.badlogic.androidgames` 包中创建相应的 Java 类并实现其逻辑。\n\
  2.  在清单文件中为其添加一个条目，视需要使用任何属性（例如 `android:configChanges` 或 `android:screenOrientation`）。请注意，我们不会指定\
  \ `<intent-filter>` 元素，因为我们将以编程方式启动该活动。\n3.  将该活动的类名添加到 `AndroidBasicsStarter` 类的\
  \ `tests` 数组中。\n\n只要我们遵循此流程，其他一切将由我们在 `AndroidBasicsStarter` 类中实现的逻辑处理。新的活动将自动出现在列表中，并且可以通过简单的触摸来启动。\n\
  \n你可能会好奇，通过触摸启动的测试活动是否在它自己的进程和虚拟机中运行。答案是否定的。由多个活动组成的应用程序拥有一个所谓的*活动栈*。每次我们启动一个新的活动，它就会被压入该栈中。当我们关闭新活动时，最后被压入栈的活动将被弹出并恢复，成为屏幕上新的活跃活动。\n\
  \n这也带来了其他一些影响。首先，应用程序的所有活动（栈中已暂停的活动以及当前活跃的活动）共享同一个虚拟机。它们也共享同一个内存堆。这既是福音也是诅咒。如果你的活动中存在静态字段，一旦活动启动，它们就会在堆上分配内存。作为静态字段，它们会在活动被销毁以及随后的活动实例被垃圾回收后依然存在。如果你不小心使用静态字段，这可能导致严重的内存泄漏。在使用静态字段之前，请三思而后行。\n\
  \n如前所述，在我们的实际游戏中，通常只会有一个活动。上述的启动活动是一个例外，目的是为了让我们的生活更轻松。但别担心，即使只有一个活动，我们也有很多机会遇到麻烦。\n\
  \n**注意：** 我们对 Android 用户界面编程的探讨就到此为止。从这之后，我们将始终在一个活动中使用单个 `View` 来输出内容和接收输入。如果你想了解布局、视图组以及\
  \ Android 用户界面库提供的各种花哨功能，我们建议你阅读 Mark Murphy 的著作 *Beginning Android 2*（Apress，2010\
  \ 年），或者 Android 开发者网站上优秀的开发指南。\n\n### 活动生命周期\n\n在为 Android 编程时，我们首先要弄清楚的是活动如何运行。在\
  \ Android 中，这被称为*活动生命周期*。它描述了活动可能经历的各种状态以及这些状态之间的转换。让我们先讨论一下其背后的理论。\n\n\n\n####\
  \ 理论解析\n\n一个活动（Activity）可能处于以下三种状态之一：\n\n> *运行中*：在此状态下，活动占据屏幕顶层，直接与用户交互。\n\n> *暂停*：当活动仍在屏幕上可见，但被透明活动或对话框部分遮挡，或手机屏幕被锁定时，即进入此状态。暂停的活动随时可能被\
  \ Android 系统终止（例如，因内存不足）。请注意，活动实例本身在虚拟机堆中仍然存活，并等待恢复至运行状态。\n\n> *停止*：当活动被另一个活动完全遮挡，从而在屏幕上不可见时，即进入此状态。例如，如果我们启动某个测试活动，`AndroidBasicsStarter`\
  \ 活动就会处于此状态。当用户按下主页键暂时返回主屏幕时，也会进入此状态。如果内存不足，系统也可以决定完全终止该活动并将其从内存中移除。\n\n在暂停和停止状态下，Android\
  \ 系统都可能随时决定终止活动。系统可以礼貌地通过调用活动的 `finished()` 方法事先通知活动，也可以不友好地直接静默终止其进程。\n\n活动可以从暂停或停止状态恢复至运行状态。再次注意，当活动从暂停或停止状态恢复时，它在内存中仍然是同一个\
  \ Java 实例，因此所有状态和成员变量都与活动被暂停或停止前相同。\n\n活动提供了一些受保护的方法，我们可以通过重写它们来获取状态变化信息：\n\n> `Activity.onCreate()`：当活动首次启动时调用。在此方法中，我们设置所有\
  \ UI 组件并接入输入系统。此方法在活动生命周期中只会被调用一次。\n\n> `Activity.onRestart()`：当活动从停止状态恢复时调用。调用此方法前会先调用\
  \ `onStop()`。\n\n> `Activity.onStart()`：在 `onCreate()` 之后调用，或当活动从停止状态恢复时调用。在后一种情况下，调用此方法前会先调用\
  \ `onRestart()`。\n\n> `Activity.onResume()`：在 `onStart()` 之后调用，或当活动从暂停状态恢复时调用（例如屏幕解锁时）。\n\
  \n> `Activity.onPause()`：当活动进入暂停状态时调用。这可能是我们收到的最后一次通知，因为 Android 系统可能会决定静默终止我们的应用。我们应该在此方法中保存所有希望持久化的状态！\n\
  \n> `Activity.onStop()`：当活动进入停止状态时调用。调用此方法前会先调用 `onPause()`。这意味着，在活动停止之前，会先暂停。与\
  \ `onPause()` 类似，这可能是 Android 系统静默终止活动前我们收到的最后一次通知。我们也可以在此处保存持久化状态。但是，系统可能决定不调用此方法而直接终止活动。由于\
  \ `onPause()` 总是在 `onStop()` 之前以及活动被静默终止之前被调用，我们最好将所有信息保存到 `onPause()` 方法中。\n\n\
  > `Activity.onDestroy()`：在活动生命周期结束时调用，此时活动将被不可逆地销毁。这是我们可以持久化任何信息以便下次活动重新创建时恢复的最后机会。请注意，如果活动在系统调用\
  \ `onPause()` 或 `onStop()` 后被静默销毁，此方法可能实际上永远不会被调用。\n\n图 4–3 展示了活动生命周期及方法调用顺序。\n\n\
  ![images](img/0403.jpg)\n\n**图 4–3.** *强大而令人困惑的活动生命周期*\n\n以下是我们应从中汲取的三个重要教训：\n\n\
  1.  在我们的活动进入运行状态之前，无论我们是刚从停止状态还是暂停状态恢复，`onResume()` 方法都会被执行。因此我们可以安全地忽略 `onRestart()`\
  \ 和 `onStart()` 方法。我们不需要关心是从停止状态还是暂停状态恢复。对于我们的游戏而言，我们只需要知道当前确实处于运行状态，而 `onResume()`\
  \ 方法会通知我们这一点。\n\n2.  活动可能在 `onPause()` 之后被静默销毁。我们绝不应假定 `onStop()` 或 `onDestroy()`\
  \ 会被调用。我们还知道 `onPause()` 总是在 `onStop()` 之前被调用。因此，我们可以安全地忽略 `onStop()` 和 `onDestroy()`\
  \ 方法，仅重写 `onPause()`。在此方法中，我们必须确保所有希望持久化的状态，如最高分和关卡进度，都被写入外部存储，例如 SD 卡。在 `onPause()`\
  \ 之后，一切都无法保证，我们无法知道活动是否还有机会再次运行。\n\n3.  我们知道，如果系统决定在 `onPause()` 或 `onStop()` 之后终止活动，`onDestroy()`\
  \ 可能永远不会被调用。然而，有时我们想知道活动是否真的要被终止。那么，如果 `onDestroy()` 不会被调用，我们该如何判断呢？`Activity` 类提供了一个名为\
  \ `Activity.isFinishing()` 的方法，我们可以在任何时候调用它来检查我们的活动是否即将被终止。我们至少可以保证，在活动被终止之前，`onPause()`\
  \ 方法会被调用。我们只需在 `onPause()` 方法中调用 `isFinishing()` 方法，即可判断活动在 `onPause()` 调用之后是否会被销毁。\n\
  \n这样做让事情简单多了。我们只需重写 `onCreate()`、`onResume()` 和 `onPause()` 方法。\n\n*   在 `onCreate()`\
  \ 中，我们设置用于渲染和接收输入的窗口及 UI 组件。\n*   在 `onResume()` 中，我们（重新）启动主循环线程（在上一章中讨论过）。\n* \
  \  在 `onPause()` 中，我们简单地暂停主循环线程，并且如果 `Activity.isFinishing()` 返回 `true`，我们还将任何需要持久化的状态保存到磁盘。\n\
  \n许多人在活动生命周期上挣扎，但如果我们遵循这些简单的规则，我们的游戏将能够妥善处理暂停、恢复以及清理工作。\n\n\n\n## 实践环节\n\n让我们编写第一个演示活动生命周期的测试示例。我们需要某种能显示到目前为止发生了哪些状态变化的输出。我们将通过两种方式实现：\n\
  \n1.  该活动显示的唯一 UI 组件是一个名为 `TextView` 的控件。它用于显示文本，我们在启动器活动中已经隐式地使用它来显示每个条目。每次进入新状态时，我们都会向\
  \ `TextView` 追加一个字符串，它将显示到目前为止发生的所有状态变化。\n2.  由于我们无法在 `TextView` 中显示活动的销毁事件（因为它会从屏幕上过快消失），因此我们也会将所有状态变化输出到\
  \ `LogCat`。我们通过 `Log` 类来实现，该类提供了一些静态方法，用于向 `LogCat` 追加消息。\n\n请记住我们需要做什么来向测试应用程序添加一个测试活动。首先，在清单文件中以\
  \ `<activity>` 元素的形式定义它，该元素是 `<application>` 元素的子元素：\n\n`<activity android:label=\"\
  生命周期测试\" android:name=\".LifeCycleTest\" android:configChanges=\"keyboard|keyboardHidden|orientation\"\
  \ />`\n\n接下来，我们向 `com.badlogic.androidgames` 包中添加一个名为 `LifeCycleTest` 的新 Java 类。最后，我们将该类名添加到之前定义的\
  \ `AndroidBasicsStarter` 类的 `tests` 成员中。（当然，我们在编写演示类时已经将其放在那里了。）\n\n在后续章节中，我们创建的任何测试活动都需要重复所有这些步骤。为简洁起见，我们不再赘述这些步骤。另请注意，我们没有为\
  \ `LifeCycleTest` 活动指定方向。在此示例中，我们可以处于横向或纵向模式，具体取决于设备方向。我们这样做是为了让你看到方向变化对生命周期的影响（由于我们设置\
  \ `configChanges` 属性的方式，这里没有影响）。列表 4-2 展示了整个活动的代码。\n\n**列表 4-2.** *LifeCycleTest.java，演示活动生命周期*\n\
  \n```\npackage com.badlogic.androidgames;\n\nimport android.app.Activity;\nimport\
  \ android.os.Bundle;\nimport android.util.Log;\nimport android.widget.TextView;\n\
  \npublic class LifeCycleTest extends Activity {\n    StringBuilder builder = new\
  \ StringBuilder();\n    TextView textView;\n\n    private void log(String text)\
  \ {\n        Log.d(\"LifeCycleTest\", text);\n        builder.append(text);\n  \
  \      builder.append('\\n');\n        textView.setText(builder.toString());\n \
  \   }\n\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n\
  \        super.onCreate(savedInstanceState);\n        textView = new TextView(this);\n\
  \        textView.setText(builder.toString());\n        setContentView(textView);\n\
  \        log(\"已创建\");\n    }\n\n    @Override\n    protected void onResume() {\n\
  \        super.onResume();\n        log(\"已恢复\");\n    }\n\n    @Override\n    protected\
  \ void onPause() {\n        super.onPause();\n        log(\"已暂停\");\n        if\
  \ (isFinishing()) {\n            log(\"正在结束\");\n        }\n    }\n}\n```\n\n我们快速过一遍这段代码。该类继承自\
  \ `Activity`——这并不令人意外。我们定义了两个成员：一个 `StringBuilder`，用于保存到目前为止我们生成的所有消息；以及 `TextView`，用于直接在\
  \ `Activity` 中显示这些消息。\n\n接下来，我们定义了一个小的私有辅助方法，该方法会将文本记录到 `LogCat`，将其追加到我们的 `StringBuilder`\
  \ 中，并更新 `TextView` 文本。对于 `LogCat` 输出，我们使用静态的 `Log.d()` 方法，该方法接受一个标签作为第一个参数，实际消息作为第二个参数。\n\
  \n在 `onCreate()` 方法中，我们像往常一样首先调用超类方法。我们创建 `TextView` 并将其设置为活动的内容视图。它将填满活动的整个空间。最后，我们将创建的消息记录到\
  \ `LogCat`，并使用之前定义的辅助方法 `log()` 更新 `TextView` 文本。\n\n接下来，我们重写活动的 `onResume()` 方法。与我们重写的任何活动方法一样，我们首先调用超类方法。我们唯一要做的就是再次调用\
  \ `log()`，并将 `\"已恢复\"` 作为参数传递。\n\n重写的 `onPause()` 方法看起来与 `onResume()` 方法非常相似。我们首先将消息记录为\
  \ `\"已暂停\"`。我们还想知道活动在 `onPause()` 方法调用后是否会被销毁，因此我们检查 `Activity.isFinishing()` 方法。如果它返回\
  \ `true`，我们也会记录结束事件。当然，我们无法看到更新后的 `TextView` 文本，因为活动会在更改显示在屏幕上之前被销毁。因此，正如前面讨论的，我们也将所有内容输出到\
  \ `LogCat`。\n\n运行应用程序，并稍微操作一下这个测试活动。以下是你可以执行的一系列操作：\n\n1.  从启动器活动启动测试活动。\n2.  锁定屏幕。\n\
  3.  解锁屏幕。\n4.  按下主页按钮（这将使你返回主屏幕）。\n5.  在主屏幕上，按住主页按钮，直到显示当前正在运行的应用程序列表。选择 Android\
  \ Basics Starter 应用程序以恢复（这将使测试活动重新显示在屏幕上）。\n6.  按下返回按钮（这将使你返回启动器活动）。\n\n如果你的系统在活动暂停期间未决定在任何时候静默地杀死它，你将看到\
  \ 图 4-4 中的输出（当然，前提是你尚未按下返回按钮）。\n\n![图片](img/0404.jpg)\n\n**图 4-4.** *运行 LifeCycleTest\
  \ 活动*\n\n启动时，会调用 `onCreate()`，随后是 `onResume()`。当我们锁定屏幕时，会调用 `onPause()`。当我们解锁屏幕时，会调用\
  \ `onResume()`。当我们按下主页按钮时，会调用 `onPause()`。返回活动将再次调用 `onResume()`。当然，相同的消息也会显示在 `LogCat`\
  \ 中，你可以在 Eclipse 的 `LogCat` 视图中观察到。图 4-5 显示了我们在执行上述操作序列（加上按下返回按钮）时写入 `LogCat` 的内容。\n\
  \n![图片](img/0405.jpg)\n\n**图 4-5.** *LifeCycleTest 的 LogCat 输出*\n\n再次按下返回按钮会调用 `onPause()`\
  \ 方法。由于它也会销毁活动，因此 `onPause()` 中的条件语句也会被触发，通知我们这是该活动的最后一次出现。\n\n这就是活动生命周期，去除了神秘色彩，并针对我们的游戏编程需求进行了简化。我们现在可以轻松处理任何暂停和恢复事件，并且保证在活动被销毁时收到通知。\n\
  \n### 输入设备处理\n\n正如前面章节所讨论的，我们可以从 Android 上的许多不同输入设备获取信息。在本节中，我们将讨论 Android 上三个最相关的输入设备以及如何使用它们：触摸屏、键盘和加速度计。\n\
  \n#### 获取（多点）触摸事件\n\n触摸屏可能是从用户获取输入的最重要方式。在 Android 2.0 版本之前，API 仅支持处理单指触摸事件。多点触摸是在\
  \ Android 2.0（SDK 版本 5）中引入的。多点触摸事件报告被附加到单点触摸 API 上，在可用性方面带来了一些好坏参半的结果。我们将首先研究处理所有\
  \ Android 版本上都可用的单点触摸事件。\n\n\n\n##### 处理单点触控事件\n\n在第 2 章中处理按钮点击时，我们看到监听器接口是 Android\
  \ 向应用报告事件的方式。触控事件也不例外。触控事件会被传递到我们为`View`注册的`OnTouchListener`接口实现中。`OnTouchListener`接口只有一个方法：\n\
  \n`public abstract boolean onTouch (View v, MotionEvent event)`\n\n第一个参数是接收触控事件的`View`对象。第二个参数则是我们需要解析以获取触控事件的数据。\n\
  \n可以通过`View.setOnTouchListener()`方法为任何`View`实现注册`OnTouchListener`。`OnTouchListener`会在`MotionEvent`被分派给`View`本身之前被调用。我们可以在`onTouch()`方法的实现中通过返回`true`来告知`View`我们已经处理了该事件。如果返回`false`，`View`自身将会处理该事件。\n\
  \n`MotionEvent`实例有三个与我们相关的方法：\n\n> `MotionEvent.getX()`和`MotionEvent.getY()`：这些方法返回相对于`View`的触控事件的\
  \ x 坐标和 y 坐标。坐标系以视图左上角为原点，x 轴向右，y 轴向下。坐标以像素为单位。注意这些方法返回的是浮点数，因此坐标具有亚像素精度。\n>\n>\
  \ `MotionEvent.getAction()`：该方法返回触控事件的类型。它是一个整数值，取值可以是`MotionEvent.ACTION_DOWN`、`MotionEvent.ACTION_MOVE`、`MotionEvent.ACTION_CANCEL`和`MotionEvent.ACTION_UP`。\n\
  \n听起来很简单，实际上也确实如此。当手指触碰到屏幕时，会触发`MotionEvent.ACTION_DOWN`事件。当手指移动时，会触发类型为`MotionEvent.ACTION_MOVE`的事件。请注意，你总会收到`MotionEvent.ACTION_MOVE`事件，因为你无法让手指保持完全静止。触控传感器能识别出最细微的变化。当手指再次抬起时，会报告`MotionEvent.ACTION_UP`事件。`MotionEvent.ACTION_CANCEL`事件则有点神秘。文档指出，当当前手势被取消时会触发该事件。我们在实际开发中从未遇到过这个事件。不过，在开始实现第一个游戏时，我们仍会处理它，并将其视为`MotionEvent.ACTION_UP`事件。\n\
  \n让我们编写一个简单的测试 Activity，看看这在代码中是如何工作的。该 Activity 应在屏幕上显示手指的当前位置以及事件类型。代码清单 4-3 展示了我们设计的代码。\n\
  \n**代码清单 4-3.** *SingleTouchTest.java; 测试单点触控处理*\n\n```java\npackage com.badlogic.androidgames;\n\
  \nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import android.view.MotionEvent;\nimport android.view.View;\nimport android.view.View.OnTouchListener;\n\
  import android.widget.TextView;\n\npublic class SingleTouchTest extends Activity\
  \ implements OnTouchListener {\n    StringBuilder builder = new StringBuilder();\n\
  \    TextView textView;\n\n    public void onCreate(Bundle savedInstanceState) {\n\
  \        super.onCreate(savedInstanceState);\n        textView = new TextView(this);\n\
  \        textView.setText(\"Touch and drag (one finger only)!\");\n        textView.setOnTouchListener(this);\n\
  \        setContentView(textView);\n    }\n\n    @Override\n    public boolean onTouch(View\
  \ v, MotionEvent event) {\n        builder.setLength(0);\n        switch (event.getAction())\
  \ {\n            case MotionEvent.ACTION_DOWN:\n                builder.append(\"\
  down, \");\n                break;\n            case MotionEvent.ACTION_MOVE:\n\
  \                builder.append(\"move, \");\n                break;\n         \
  \   case MotionEvent.ACTION_CANCEL:\n                builder.append(\"cancle, \"\
  );\n                break;\n            case MotionEvent.ACTION_UP:\n          \
  \      builder.append(\"up, \");\n                break;\n        }\n        builder.append(event.getX());\n\
  \        builder.append(\", \");\n        builder.append(event.getY());\n      \
  \  String text = builder.toString();\n        Log.d(\"TouchTest\", text);\n    \
  \    textView.setText(text);\n        return true;\n    }\n}\n```\n\n我们让 Activity\
  \ 实现了`OnTouchListener`接口。我们还拥有两个成员变量：一个用于`TextView`，另一个是用于构建事件字符串的`StringBuilder`。\n\
  \n`onCreate()`方法不言自明。唯一的新意在于调用了`TextView.setOnTouchListener()`，我们将 Activity 注册到`TextView`，使其能接收`MotionEvent`。\n\
  \n剩下的就是`onTouch()`方法的实现。我们忽略了`view`参数，因为知道它必定是`TextView`。我们只关心获取触控事件类型，将标识该类型的字符串追加到`StringBuilder`中，再追加触控坐标，然后更新`TextView`的文本。仅此而已。我们还将事件记录到\
  \ LogCat，以便观察事件发生的顺序，因为`TextView`只会显示我们处理的最后一个事件（每次调用`onTouch()`时我们都会清空`StringBuilder`）。\n\
  \n`onTouch()`方法中有一个细微之处在于返回语句，我们返回了`true`。通常，为了不干扰事件分派过程，我们会遵循监听器概念并返回`false`。但在本例中，如果这样做，我们将只能收到`MotionEvent.ACTION_DOWN`事件。因此，我们告知`TextView`我们刚刚消费了该事件。这种行为在不同的`View`实现中可能有所不同。幸运的是，在本书其余部分，我们只需要使用另外三种视图，并且它们都会允许我们消费任何想要的事件。\n\
  \n如果我们在模拟器或连接的设备上运行该应用程序，可以看到`TextView`始终显示报告给`onTouch()`方法的最后一个事件类型和位置。此外，你还可以在\
  \ LogCat 中看到相同的信息。\n\n我们没有在清单文件中固定 Activity 的方向。如果你旋转设备使 Activity 处于横屏模式，坐标系当然会改变。图\
  \ 4-6 展示了 Activity 在竖屏和横屏模式下的情况。在这两种情况下，我们都试图触摸`View`的中心。注意 x 和 y 坐标似乎发生了交换。该图还展示了两种模式下的\
  \ x 轴和 y 轴（黄线），以及我们大致触摸到的屏幕位置（绿色圆圈）。在两种情况下，原点都在`TextView`的左上角，x 轴向右，y 轴向下。\n\n![images](img/0406.jpg)\n\
  \n**图 4-6.** *在竖屏和横屏模式下触摸屏幕*\n\n根据方向不同，我们的最大 x 和 y 值当然也会变化。上图是在 Nexus One 上截取的，该设备在竖屏模式下屏幕分辨率为\
  \ 480×800 像素（横屏模式下为 800×480 像素）。由于触控坐标是相对于`View`给出的，并且视图并未填满整个屏幕，因此我们的最大 y 值会小于分辨率高度。稍后我们将看到如何启用全屏模式，以便标题栏和通知栏不会妨碍我们。\n\
  \n遗憾的是，在较旧的 Android 版本和第一代设备上，触控事件存在一些问题。\n\n\n\n> *触摸事件洪泛*：当手指在触摸屏上按下时，驱动程序会尽可能多地报告触摸事件——在某些设备上可达每秒数百次。我们可以通过在`onTouch()`方法中调用`Thread.sleep(16)`来解决此问题，这会使分发这些事件的\
  \ UI 线程休眠 16 毫秒。这样一来，我们每秒最多只能收到 60 个事件，这已足以实现响应灵敏的游戏。该问题仅存在于搭载 Android 1.5 系统的设备上。\n\
  \n> *触摸屏幕消耗 CPU*：即使在`onTouch()`方法中让线程休眠，系统仍需处理驱动程序报告的内核事件。在 Hero 或 G1 等老旧设备上，这可能会占用高达\
  \ 50%的 CPU 资源，从而留给主循环线程的处理能力大幅减少。其后果是我们原本完美的帧率会显著下降，有时甚至会低至游戏无法正常游玩的程度。在第二代设备上，该问题不那么明显，通常可以忽略。遗憾的是，对于老旧设备目前尚无解决方案。\n\
  \n一般来说，为了稳妥起见，你需要在所有`onTouch()`方法中加入`Thread.sleep(16)`。在新设备上，这不会产生任何影响；而在旧设备上，它至少能防止触摸事件洪泛。\n\
  \n随着第一代设备逐渐退出历史舞台，随着时间的推移，这个问题会越来越不严重。尽管如此，它仍然给游戏开发者带来极大的困扰。试着向你的用户解释：你的游戏运行得像糖浆一样慢，是因为驱动中的某个东西占用了所有\
  \ CPU。是的，没人会在意。\n\n##### 处理多点触控事件\n\n警告：前方有大麻烦！多点触控 API 被附加到了最初仅处理单点触控的`MotionEvent`类上。这使得在尝试解码多点触控事件时非常容易混淆。让我们试着理清头绪。\n\
  \n**注意：** 多点触控 API 似乎也让创建它的 Android 工程师感到困惑。它在 SDK 8 版本（Android 2.2）中经历了重大更新，增加了新的方法、新的常量，甚至重命名了常量。这些改动应该能让多点触控的开发工作稍微轻松一些。然而，这些新特性仅适用于\
  \ SDK 8 及更高版本。为了支持所有具备多点触控能力的 Android 版本（2.0 至 2.2.1），我们必须使用 SDK 5 版本的 API。\n\n\
  处理多点触控与处理单点触控事件非常相似。我们仍然实现与单点触控事件相同的`OnTouchListener`接口。我们也从`MotionEvent`实例中读取数据。我们还处理之前处理过的那些事件类型，比如`MotionEvent.ACTION_UP`，外加一些不是太难搞的新事件类型。\n\
  \n##### 指针 ID 与索引\n\n当我们想要访问触摸事件的坐标时，差异就开始了。`MotionEvent.getX()`和`MotionEvent.getY()`返回屏幕上单根手指的坐标。在处理多点触控事件时，我们使用这些方法的重载变体，它们接受一个所谓的*指针索引*。示例如下：\n\
  \n```\nevent.getX(pointerIndex);\nevent.getY(pointerIndex);\n```\n\n现在，你可能会认为`pointerIndex`直接对应于触摸屏幕的某一根手指（例如，按下的第一根手指的`pointerIndex`为\
  \ 0，按下的第二根手指的`pointerIndex`为 1，以此类推）。遗憾的是，事实并非如此。\n\n`pointerIndex`是`MotionEvent`内部数组的索引，该数组保存了屏幕上特定手指的事件坐标。手指在屏幕上的真实标识符被称为*指针标识符*。指针标识符是一个任意数字，它唯一地标识了一次指针触摸到屏幕的实例。有一个单独的方法`MotionEvent.getPointerIdentifier(int\
  \ pointerIndex)`，它根据指针索引返回指针标识符。只要单根手指一直触摸屏幕，其指针标识符就会保持不变。而指针索引却不一定如此。理解这两者之间的区别非常重要，并且要明白不能依赖第一次触摸的索引是\
  \ 0、ID 也是 0，因为在某些设备上，尤其是第一版 Xperia Play，指针 ID 会一直递增到 15，然后重新从 0 开始，而不会重用可用的最小 ID。\n\
  \n让我们先来研究如何获取事件的指针索引。我们暂时忽略事件类型。\n\n```\nint pointerIndex = (event.getAction() &\
  \ MotionEvent.ACTION_POINTER_ID_MASK) >>\nMotionEvent.ACTION_POINTER_ID_SHIFT;\n\
  ```\n\n你可能和我们初次实现这段代码时的想法一样。在彻底丧失信心之前，让我们试着解读一下这里发生了什么。我们通过`MotionEvent.getAction()`从`MotionEvent`中获取事件类型。好的，这个我们之前做过。接下来，我们对从`MotionEvent.getAction()`方法获取的整数与一个名为`MotionEvent.ACTION_POINTER_ID_MASK`的常量执行按位与操作。现在有趣的地方来了。\n\
  \n该常量的值为`0xff00`，所以我们实际上是将除了第 8 到第 15 位之外的所有位都置为 0，而第 8 到第 15 位恰好保存了事件的指针索引。`event.getAction()`返回的整数的低八位保存了事件类型的值，比如`MotionEvent.ACTION_DOWN`及其同类事件。我们通过这次按位运算实际上丢弃了事件类型。现在移位操作应该更容易理解了。我们向右移动`MotionEvent.ACTION_POINTER_ID_SHIFT`位（其值为\
  \ 8），所以我们基本上是把第 8 到第 15 位移动到了第 0 到第 7 位，从而得到事件的实际指针索引。有了这个索引，我们就可以获取事件的坐标以及指针标识符。\n\
  \n请注意，我们的魔数常量被命名为`XXX_POINTER_ID_XXX`而不是`XXX_POINTER_INDEX_XXX`（后者更有意义，因为我们实际上是想提取指针索引，而不是指针标识符）。嗯，Android\
  \ 工程师们肯定也糊涂了。在 SDK 8 版本中，他们弃用了这些常量，并引入了名为`XXX_POINTER_INDEX_XXX`的新常量，其值与弃用的常量完全相同。为了让基于\
  \ SDK 5 版本编写的遗留应用程序能在较新版本的 Android 上继续运行，旧常量当然仍然可以使用。\n\n所以我们现在知道了如何获取那个神秘的指针索引，并可以用它来查询事件的坐标和指针标识符。\n\
  \n\n\n##### 动作掩码与更多事件类型\n\n接下来，我们需要从 `MotionEvent.getAction()` 返回的整数中，剥离掉编码在内的额外指针索引，只获取纯粹的事件类型。我们只需通过掩码操作屏蔽掉指针索引部分即可：\n\
  \n`int action = event.getAction() & MotionEvent.ACTION_MASK;`\n\n嗯，这很简单。遗憾的是，只有当你了解指针索引是什么，并且知道它实际上被编码在动作值中时，才能真正理解这行代码。\n\
  \n剩下的工作就是像之前一样解析事件类型。我们之前提到过，这里有一些新的事件类型，下面逐一说明：\n\n> `MotionEvent.ACTION_POINTER_DOWN`：当第一根手指触摸屏幕后，任何后续手指触摸屏幕时都会产生此事件。第一根手指仍然会产生\
  \ `MotionEvent.ACTION_DOWN` 事件。\n> \n> `MotionEvent.ACTION_POINTER_UP`：这与前一个动作类似。当有手指从屏幕抬起，且屏幕上仍有超过一根手指触摸时，会触发此事件。屏幕上最后抬起的那根手指会产生\
  \ `MotionEvent.ACTION_UP` 事件，这根手指不一定是触摸屏幕的第一根手指。\n\n幸运的是，我们可以简单地把这两种新事件类型当作旧的 `MotionEvent.ACTION_UP`\
  \ 和 `MotionEvent.ACTION_DOWN` 事件来处理。\n\n最后一个区别是，单个 `MotionEvent` 可能包含多个事件的数据。是的，你没看错。要实现这一点，被合并的事件必须具有相同的类型。实际上，这种情况只会发生在\
  \ `MotionEvent.ACTION_MOVE` 事件上，因此我们只需在处理该事件类型时注意这一点。要检查单个 `MotionEvent` 中包含多少个事件，我们可以使用\
  \ `MotionEvent.getPointerCount()` 方法，它会告诉我们有多少根手指的坐标信息包含在该 `MotionEvent` 中。然后，我们可以通过\
  \ `MotionEvent.getX()`、`MotionEvent.getY()` 和 `MotionEvent.getPointerId()` 方法来获取指针索引从\
  \ 0 到 `MotionEvent.getPointerCount() - 1` 的指针标识符和坐标。\n\n##### 实践应用\n\n让我们为这个出色的\
  \ API 编写一个示例。我们希望最多追踪十根手指（目前还没有设备能追踪更多手指，所以我们这样做很安全）。通常，当我们往屏幕上增加手指时，Android 设备会分配连续的指针索引，但这并非总能保证，因此我们在数组中使用指针索引作为依据，并且简单地显示分配给触摸点的\
  \ ID。我们记录每个指针的坐标和触摸状态（触摸或未触摸），并通过 `TextView` 将这些信息输出到屏幕上。我们将测试 Activity 命名为 `MultiTouchTest`。清单\
  \ 4–4 展示了完整的代码。\n\n**清单 4–4.** *MultiTouchTest.java；测试多点触控 API*\n\n```\npackage\
  \ com.badlogic.androidgames;\n\nimport android.app.Activity;\nimport android.os.Bundle;\n\
  import android.view.MotionEvent;\nimport android.view.View;\nimport android.view.View.OnTouchListener;\n\
  import android.widget.TextView;\n\npublic class MultiTouchTest extends Activity\
  \ implements OnTouchListener {\n    StringBuilder builder = new StringBuilder();\n\
  \    TextView textView;\n    float[] x = new float[10];\n    float[] y = new float[10];\n\
  \    boolean[] touched = new boolean[10];\n    int[] id = new int[10];\n\n    private\
  \ void updateTextView() {\n        builder.setLength(0);\n        for (int i = 0;\
  \ i < 10; i++) {\n            builder.append(touched[i]);\n            builder.append(\"\
  , \");\n            builder.append(id[i]);\n            builder.append(\", \");\n\
  \            builder.append(x[i]);\n            builder.append(\", \");\n      \
  \      builder.append(y[i]);\n            builder.append(\"\\n\");\n        }\n\
  \        textView.setText(builder.toString());\n    }\n\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        textView\
  \ = new TextView(this);\n        textView.setText(\"Touch and drag (multiple fingers\
  \ supported)!\");\n        textView.setOnTouchListener(this);\n        setContentView(textView);\n\
  \        for (int i = 0; i < 10; i++) {\n            id[i] = -1;\n        }\n  \
  \      updateTextView();\n    }\n\n    @Override\n    public boolean onTouch(View\
  \ v, MotionEvent event) {\n        int action = event.getAction() & MotionEvent.ACTION_MASK;\n\
  \        int pointerIndex = (event.getAction() & MotionEvent.ACTION_POINTER_ID_MASK)\
  \ >>\n                MotionEvent.ACTION_POINTER_ID_SHIFT;\n        int pointerCount\
  \ = event.getPointerCount();\n        for (int i = 0; i < 10; i++) {\n         \
  \   if (i >= pointerCount) {\n                touched[i] = false;\n            \
  \    id[i] = -1;\n                continue;\n            }\n            if (event.getAction()\
  \ != MotionEvent.ACTION_MOVE && i != pointerIndex) {\n                // if it's\
  \ an up/down/cancel/out event, mask the id to see if we should\n               \
  \ // process it for this touch point\n                continue;\n            }\n\
  \            int pointerId = event.getPointerId(i);\n            switch (action)\
  \ {\n                case MotionEvent.ACTION_DOWN:\n                case MotionEvent.ACTION_POINTER_DOWN:\n\
  \                    touched[i] = true;\n                    id[i] = pointerId;\n\
  \                    x[i] = (int) event.getX(i);\n                    y[i] = (int)\
  \ event.getY(i);\n                    break;\n\n                case MotionEvent.ACTION_UP:\n\
  \                case MotionEvent.ACTION_POINTER_UP:\n                case MotionEvent.ACTION_OUTSIDE:\n\
  \                case MotionEvent.ACTION_CANCEL:\n                    touched[i]\
  \ = false;\n                    id[i] = -1;\n                    x[i] = (int) event.getX(i);\n\
  \                    y[i] = (int) event.getY(i);\n                    break;\n \
  \           }\n        }\n        return true;\n    }\n}\n```\n\n\n\n```java\ncase\
  \ MotionEvent.ACTION_MOVE:\ntouched[i] = true;\n                id[i] = pointerId;\n\
  \                x[i] = (int) event.getX(i);\n                y[i] = (int) event.getY(i);\n\
  break;\n            }\n        }\n\n        updateTextView();\nreturn true;\n  \
  \  }\n}\n```\n\n我们像之前一样实现了`OnTouchListener`接口。为了追踪十根手指的坐标和触摸状态，我们添加了三个新的成员数组来存储这些信息。数组`x`和`y`存储每个指针\
  \ ID 的坐标，数组`touched`存储对应指针 ID 的手指是否按下。\n\n接下来，我们创建了一个辅助方法，它会将手指的当前状态输出到`TextView`中。该方法简单地遍历所有十根手指的状态，并通过`StringBuilder`将它们拼接起来，最终将文本设置到`TextView`上。\n\
  \n`onCreate()`方法设置了活动（Activity），并让活动作为`OnTouchListener`注册到`TextView`上。这部分我们已经非常熟悉了。\n\
  \n现在到了棘手的部分：`onTouch()`方法。\n\n我们首先通过对`event.getAction()`返回的整数进行掩码操作来获取事件类型。接着，我们提取指针索引，并根据之前讨论的方法从`MotionEvent`中获取对应的指针标识符。\n\
  \n`onTouch()`方法的核心是那个巨大的`switch`语句，我们之前曾以简化形式用它来处理单点触摸事件。我们将所有事件从高层次上分为三类：\n\n*\
  \   发生触摸按下事件：（`MotionEvent.ACTION_DOWN`或`MotionEvent.ACTION_POINTER_DOWN`）。我们将对应指针标识符的触摸状态设为`true`，同时保存该指针的当前坐标。\n\
  *   发生触摸抬起事件：（`MotionEvent.ACTION_UP`、`MotionEvent.ACTION_POINTER_UP`或`MotionEvent.CANCEL`）。我们将对应指针标识符的触摸状态设为`false`，并保存其最后已知坐标。\n\
  *   一根或多根手指在屏幕上拖动：（`MotionEvent.ACTION_MOVE`）。我们检查`MotionEvent`中包含多少个事件，然后更新指针索引\
  \ 0 到`MotionEvent.getPointerCount() - 1`的坐标。对于每个事件，我们获取对应的指针标识符并更新坐标。\n\n事件处理完毕后，我们通过调用之前定义的`updateView()`方法来更新`TextView`。最后，我们返回`true`，表示已处理该触摸事件。\n\
  \n图 4–7 展示了在一台三星 Galaxy S 上触摸 5 根手指并稍作拖动后，活动生成的输出结果。\n\n![images](img/0407.jpg)\n\
  \n**图 4–7.** *多点触摸的有趣体验*\n\n运行这个示例时，我们可以观察到以下几点：\n\n*   如果我们在一台 Android 版本低于 2.0\
  \ 的设备或模拟器上启动它，由于使用了这些早期版本中不可用的 API，会得到一个严重的异常。我们可以通过判断应用程序运行的 Android 版本来解决这个问题：在\
  \ Android 1.5 和 1.6 的设备上使用单点触摸代码，在 Android 2.0 或更新的设备上使用多点触摸代码。我们将在下一章中详细讨论。\n*\
  \   模拟器不支持多点触摸。如果我们创建一台运行 Android 2.0 或更高版本的模拟器，API 是存在的，但我们只有单鼠标。即使有两个鼠标，也无济于事。\n\
  *   触摸两根手指，抬起第一根，然后再触摸下去。在第一根手指抬起后，第二根手指会保持其指针标识符。当第一根手指第二次触摸下去时，它会获得一个新的指针标识符，通常是\
  \ 0，但也可以是任何整数。任何新触摸屏幕的手指都将获得一个新的指针标识符，该标识符可以是当前未被其他活动触摸使用的任意值。这是一条需要记住的规则。\n*  \
  \ 如果你在 Nexus One 或 Droid 上尝试，当你在同一轴上交叉两根手指时，会注意到一些奇怪的行为。这是因为这些设备的屏幕不能完全支持对单根手指的跟踪。这是一个大问题，但我们可以通过精心设计用户界面在一定程度上解决。在后面的章节中，我们还会再次讨论这个问题。需要记住的要点是：*不要交叉轨迹！*\n\
  \n这样，Android 上的多点触摸处理就介绍完了。虽然它很令人头疼，但一旦你理清所有这些术语，并习惯位操作后，你会对实现感到更加得心应手，像专家一样处理所有的触摸点。\n\
  \n**注意：** 很抱歉这部分内容让你感到头疼。这一节内容相当复杂。遗憾的是，官方 API 文档极其匮乏，大多数人只是通过胡乱尝试来“学习”这个 API。我们建议你多练习上面的代码示例，直到完全理解它的内部机制。\n\
  \n\n\n#### 处理按键事件\n\n经历了上一节的疯狂之后，我们理应来点简单到极点的内容。欢迎来到按键事件处理。\n\n要捕获按键事件，我们需要实现另一个监听器接口，名为\
  \ `OnKeyListener`。它只有一个方法 `onKey()`，签名如下：\n\n`public boolean onKey(View view, int\
  \ keyCode, KeyEvent event)`\n\n其中 `View` 参数指定了接收按键事件的视图，`keyCode` 参数是 `KeyEvent`\
  \ 类中定义的常量之一，最后一个参数则是按键事件本身，它包含一些附加信息。\n\n什么是键码？（屏幕上的）键盘上的每个按键以及每个系统按键都有一个唯一的数字编号。这些键码在\
  \ `KeyEvent` 类中被定义为静态公共最终整型常量。其中一个键码是 `KeyCode.KEYCODE_A`，即 A 键的键码。这与按下按键时在文本字段中生成的字符无关。它实际上只是标识按键本身。\n\
  \n`KeyEvent` 类与 `MotionEvent` 类类似。它有两个与我们相关的两个方法：\n\n> `KeyEvent.getAction()`：此方法返回\
  \ `KeyEvent.ACTION_DOWN`、`KeyEvent.ACTION_UP` 和 `KeyEvent.ACTION_MULTIPLE`。就我们的目的而言，可以忽略最后一种按键事件类型。另外两种会在按键按下或释放时发送。\n\
  > \n> `KeyEvent.getUnicodeChar()`：返回该按键在文本字段中产生的 Unicode 字符。假设我们按住 Shift 键并按下 A\
  \ 键。这将报告为一个键码为 `KeyEvent.KEYCODE_A` 的事件，但 Unicode 字符却是 `A`。如果我们想自己处理文本输入，就可以使用这个方法。\n\
  \n要接收键盘事件，`View` 必须获得焦点。可以通过以下方法调用来强制获取焦点：\n\n`View.setFocusableInTouchMode(true);`\n\
  `View.requestFocus();`\n\n第一个方法保证 `View` 可以获得焦点。第二个方法则请求特定视图获取焦点。\n\n让我们实现一个简单的测试\
  \ Activity，看看它们如何协同工作。我们想要获取按键事件，并在 `TextView` 中显示最近接收到的那个事件。我们将显示的信息包括按键事件类型、键码以及（如果会产生的话）Unicode\
  \ 字符。请注意，有些按键本身不会产生 Unicode 字符，只有与其他字符组合时才会产生。清单 4–5 展示了几行代码如何实现所有这些功能。\n\n**清单\
  \ 4–5.** *KeyTest.Java；测试按键事件 API*\n\n```java\npackage com.badlogic.androidgames;\n\
  \nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import android.view.KeyEvent;\nimport android.view.View;\nimport android.view.View.OnKeyListener;\n\
  import android.widget.TextView;\n\npublic class KeyTest extends Activity implements\
  \ OnKeyListener {\n    StringBuilder builder = new StringBuilder();\n    TextView\
  \ textView;\n\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        textView = new TextView(this);\n        textView.setText(\"Press keys (if\
  \ you have some)!\");\n        textView.setOnKeyListener(this);\n        textView.setFocusableInTouchMode(true);\n\
  \        textView.requestFocus();\n        setContentView(textView);\n    }\n\n\
  \    @Override\n    public boolean onKey(View view, int keyCode, KeyEvent event)\
  \ {\n        builder.setLength(0);\n        switch (event.getAction()) {\n     \
  \       case KeyEvent.ACTION_DOWN:\n                builder.append(\"down, \");\n\
  \                break;\n            case KeyEvent.ACTION_UP:\n                builder.append(\"\
  up, \");\n                break;\n        }\n        builder.append(event.getKeyCode());\n\
  \        builder.append(\", \");\n        builder.append((char) event.getUnicodeChar());\n\
  \        String text = builder.toString();\n        Log.d(\"KeyTest\", text);\n\
  \        textView.setText(text);\n\n        if (event.getKeyCode() == KeyEvent.KEYCODE_BACK)\n\
  \            return false;\n        else\n            return true;\n    }\n}\n```\n\
  \n我们首先声明 Activity 实现了 `OnKeyListener` 接口。接着，定义了两个我们已经熟悉的成员变量：一个用于构建要显示文本的 `StringBuilder`\
  \ 和一个用于显示文本的 `TextView`。\n\n在 `onCreate()` 方法中，我们确保 `TextView` 获得焦点，以便它能接收按键事件。我们还通过\
  \ `TextView.setOnKeyListener()` 方法将 Activity 注册为 `OnKeyListener`。\n\n`onKey()` 方法同样非常直接明了。我们在\
  \ `switch` 语句中处理两种事件类型，向 `StringBuilder` 追加相应的字符串。接着，我们追加键码以及来自 `KeyEvent` 本身的 Unicode\
  \ 字符，并将其输出到 LogCat 和 `TextView` 中。\n\n最后一个 `if` 语句很有意思：如果按下的是返回键，我们从 `onKey()` 方法中返回\
  \ `false`，让 `TextView` 来处理该事件。否则，我们返回 `true`。为什么这里要区分处理呢？\n\n如果我们在返回键的情况下返回 `true`，就会对\
  \ Activity 的生命周期造成一些干扰。由于我们决定自行消费返回键事件，Activity 将不会被关闭。当然，在某些场景下，我们确实希望捕获返回键以防止\
  \ Activity 被关闭。但是，强烈建议除非绝对必要，否则不要这样做。\n\n图 4–8 展示了在 Droid 设备键盘上同时按住 Shift 和 A 键时\
  \ Activity 的输出结果。\n\n![images](img/0408.jpg)\n\n**图 4–8.** *同时按下 Shift 和 A 键*\n\n\
  这里有几点需要注意：\n\n*   观察 LogCat 输出时，请注意我们可以轻松处理同时发生的按键事件。同时按住多个按键不会有问题。\n*   按下方向键和滚动轨迹球都会被报告为按键事件。\n\
  *   与触摸事件一样，在旧版 Android 系统和第一代设备上，按键事件可能会消耗相当多的 CPU 资源。不过，它们不会产生大量事件。\n\n和上一节相比，这节内容相当轻松，不是吗？\n\
  \n**注意：** 按键处理 API 比我们这里展示的要复杂一些。不过，对于我们游戏编程项目而言，这里介绍的信息已经绰绰有余了。如果你需要更复杂的内容，请参考\
  \ Android 开发者官方网站的文档。\n\n\n\n#### 读取加速度计状态\n\n游戏中一个非常有趣的输入选项是加速度计。所有安卓设备都必须配备三轴加速度计。我们在上一章中曾简单讨论过加速度计。通常，我们只需要轮询加速度计的状态即可。\n\
  \n那么如何获取加速度计信息呢？你猜对了——通过注册监听器。我们需要实现的接口名为`SensorEventListener`，它包含两个方法：\n\n`public\
  \ void onSensorChanged(SensorEvent event);`\n`public void onAccuracyChanged(Sensor\
  \ sensor, int accuracy);`\n\n当新的加速度计事件到达时，会调用第一个方法。当加速度计精度发生变化时，会调用第二个方法。在我们的应用中，可以安全地忽略第二个方法。\n\
  \n那么我们应该在哪里注册`SensorEventListener`呢？这需要做一些准备工作。首先，我们需要检查设备是否确实安装了加速度计。虽然我们刚才提到所有安卓设备都必须包含加速度计，但这一点在未来可能会改变。因此，我们希望\
  \ 100%确保该输入方法可用。\n\n第一步是获取所谓的`SensorManager`实例。这个管理器会告诉我们加速度计是否已安装，同时也是我们注册监听器的地方。要获取`SensorManager`，需要使用`Context`接口中的方法：\n\
  \n`SensorManager manager = (SensorManager)context.getSystemService(Context.SENSOR_SERVICE);`\n\
  \n`SensorManager`是一种由安卓系统提供的*系统服务*。安卓由多个系统服务组成，每个服务都为请求者提供不同的系统信息。\n\n获取管理器后，我们可以检查加速度计是否可用：\n\
  \n`boolean hasAccel = manager.getSensorList(Sensor.TYPE_ACCELEROMETER).size() >\
  \ 0;`\n\n通过这段代码，我们向管理器查询所有已安装的类型为`accelerometer`的传感器。虽然这意味着设备可能拥有多个加速度计，但实际上通常只会返回一个加速度计传感器。\n\
  \n如果安装了加速度计，我们可以从`SensorManager`获取它，并按如下方式注册`SensorEventListener`：\n\n`Sensor sensor\
  \ = manager.getSensorList(Sensor.TYPE_ACCELEROMETER).get(0);`\n`boolean success\
  \ = manager.registerListener(listener, sensor, SensorManager.SENSOR_DELAY_GAME);`\n\
  \n参数`SensorManager.SENSOR_DELAY_GAME`指定了监听器应以多高的频率更新加速度计的最新状态。这是一个专为游戏设计的特殊常量，因此我们可以放心使用。请注意，`SensorManager.registerListener()`方法返回一个布尔值，指示注册过程是否成功。这意味着之后我们需要检查该布尔值，以确保确实能从传感器接收到事件。\n\
  \n注册监听器后，我们将在`SensorEventListener.onSensorChanged()`方法中接收`SensorEvent`。方法名称暗示它仅在传感器状态发生变化时被调用。这有点令人困惑，因为加速度计状态是不断变化的。实际上，当我们注册监听器时，已经指定了所需的传感器状态更新频率。\n\
  \n那么如何处理`SensorEvent`呢？这相当简单。`SensorEvent`有一个名为`SensorEvent.values`的公共浮点数组成员，它保存了加速度计三个轴当前的加速度值。`SensorEvent.values[0]`保存\
  \ x 轴的值，`SensorEvent.values[1]`保存 y 轴的值，`SensorEvent.values[2]`保存 z 轴的值。我们曾在第 3\
  \ 章讨论过这些值的含义，如果忘记了，可以重新查看\"输入\"部分。\n\n有了这些信息，我们可以编写一个简单的测试活动。我们只想在`TextView`中输出每个加速度计轴的数值。代码清单\
  \ 4-6 展示了如何实现这一点。\n\n**代码清单 4-6.** *AccelerometerTest.java；测试加速度计 API*\n\n```\n\
  package com.badlogic.androidgames;\n\nimport android.app.Activity;\nimport android.content.Context;\n\
  import android.hardware.Sensor;\nimport android.hardware.SensorEvent;\nimport android.hardware.SensorEventListener;\n\
  import android.hardware.SensorManager;\nimport android.os.Bundle;\nimport android.widget.TextView;\n\
  \npublic class AccelerometerTest extends Activity implements SensorEventListener\
  \ {\n    TextView textView;\n    StringBuilder builder = new StringBuilder();\n\n\
  \    @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        textView = new TextView(this);\n        setContentView(textView);\n\n \
  \       SensorManager manager = (SensorManager) getSystemService(Context.SENSOR_SERVICE);\n\
  \        if (manager.getSensorList(Sensor.TYPE_ACCELEROMETER).size() == 0) {\n \
  \           textView.setText(\"No accelerometer installed\");\n        } else {\n\
  \            Sensor accelerometer = manager.getSensorList(\n                   \
  \ Sensor.TYPE_ACCELEROMETER).get(0);\n            if (!manager.registerListener(this,\
  \ accelerometer,\n                    SensorManager.SENSOR_DELAY_GAME)) {\n    \
  \            textView.setText(\"Couldn't register sensor listener\");\n        \
  \    }\n        }\n    }\n\n    @Override\n    public void onSensorChanged(SensorEvent\
  \ event) {\n        builder.setLength(0);\n        builder.append(\"x: \");\n  \
  \      builder.append(event.values[0]);\n        builder.append(\", y: \");\n  \
  \      builder.append(event.values[1]);\n        builder.append(\", z: \");\n  \
  \      builder.append(event.values[2]);\n        textView.setText(builder.toString());\n\
  \    }\n\n    @Override\n    public void onAccuracyChanged(Sensor sensor, int accuracy)\
  \ {\n        // nothing to do here\n    }\n}\n```\n\n我们首先检查加速度计传感器是否可用。如果可用，则从`SensorManager`获取它，并尝试注册我们的活动（该活动实现了`SensorEventListener`接口）。如果任何步骤失败，我们将`TextView`设置为显示相应的错误信息。\n\
  \n`onSensorChanged()`方法只是从传递给它的`SensorEvent`中读取轴值，并相应地更新`TextView`文本。\n\n`onAccuracyChanged()`方法的存在是为了让我们完整实现`SensorEventListener`接口，除此之外没有其他实际用途。\n\
  \n图 4-9 展示了设备垂直于地面时，在竖屏和横屏模式下各轴的值。\n\n![images](img/0409.jpg)\n\n**图 4-9.** *设备垂直于地面时，竖屏模式（左图）和横屏模式（右图）下的加速度计轴值*\n\
  \n安卓加速度计处理的一个陷阱是：加速度计的值是相对于设备的默认方向而言的。这意味着如果你的游戏仅在横屏模式下运行，那么在默认方向为竖屏的设备上，获取到的值将与默认方向为横屏的设备相差\
  \ 90 度！那么如何应对这个问题呢？使用这个便捷的代码片段，你就能轻松应对：\n\n\n\n### 排版后的内容\n\n`int` `screenRotation;`\n\
  `public void` `onResume() {`\n`        WindowManager windowMgr = (WindowManager)activity.getSystemService(Activity.WINDOW_SERVICE);`\n\
  `                // getOrientation() 在 Android 8 中已弃用，但与 getRotation() 功能相同，后者是相对于设备自然方向的旋转角度`\n\
  `        screenRotation = windowMgr.getDefaultDisplay().getOrientation();`\n`}`\n\
  \n`static final int` `ACCELEROMETER_AXIS_SWAP` `[][] = {`\n`    {1, -1, 0, 1}, //\
  \ ROTATION_0`\n`    {-1, -1, 1, 0}, // ROTATION_90`\n`    {-1, 1, 0, 1}, // ROTATION_180`\n\
  `    {1, 1, 1, 0}}; // ROTATION_270`\n`public void` `onSensorChanged(SensorEvent\
  \ event) {`\n`final int` `[] as =` `ACCELEROMETER_AXIS_SWAP` `[screenRotation];`\n\
  `float` `screenX = (` `float` `)as[0] * event.values[as[2]];`\n`float` `screenY\
  \ = (` `float` `)as[1] * event.values[as[3]];`\n`float` `screenZ = event.values[2];`\n\
  `    // 现在即可使用 screenX、screenY 和 screenZ 作为加速度计值！`\n`}`\n\n以下是关于加速度计的一些补充说明：\n\n\
  *   正如图 4–9 右侧截图所示，加速度计的值有时可能超出其指定范围。这是由于传感器存在微小误差，因此如果要求数值尽可能精确，你需要进行相应调整。\n* \
  \  无论你的 Activity 处于何种方向，加速度计的轴报告顺序始终相同。\n*   应用开发者有责任根据设备的自然方向来旋转加速度计的值。\n\n####\
  \ 读取指南针状态\n\n读取加速度计以外的其他传感器（例如指南针）的方法非常相似。实际上，它们的相似程度之高，以至于我们完全可以让你通过简单的复制粘贴，将加速度计测试代码改造为指南针测试！请将所有出现的：\n\
  \n`Sensor.` `TYPE_ACCELEROMETER`\n\n替换为：\n\n`Sensor.` `TYPE_ORIENTATION`\n\n然后重新运行测试。现在你会看到，你的\
  \ `x`、`y` 和 `z` 值的作用截然不同。如果你将设备屏幕朝上并平行于地面水平放置，`x` 会显示指南针航向的角度值，而 `y` 和 `z` 应接近 0。现在倾斜设备，观察这些数值如何变化。`x`\
  \ 仍将作为主要航向（方位角），而 `y` 和 `z` 则分别显示设备的俯仰角和横滚角。由于 `TYPE_ORIENTATION` 常量已被弃用，你也可以通过调用\
  \ `SensorManager.getOrientation(float[] R, float[] values)` 来获取相同的指南针数据，其中 `R` 是一个旋转矩阵（参见\
  \ `SensorManager.getRotationMatrix()`），而 `values` 则包含三个返回值，但这次它们是以弧度为单位。\n\n至此，我们已经讨论了\
  \ Android API 中所有与输入处理相关的类，这些类将用于游戏开发。\n\n**注意：** 顾名思义，`SensorManager` 类还允许你访问其他传感器，包括指南针和光线传感器。如果你有创意，可以设计一个利用这些传感器的游戏点子。处理这些传感器事件的方式与我们处理加速度计数据的方式类似。Android\
  \ 开发者网站的文档会为你提供更多信息。\n\n### 文件处理\n\nAndroid 为我们提供了几种读取和写入文件的方法。在本节中，我们将探讨资源文件（assets）以及如何访问外部存储（通常以\
  \ SD 卡形式实现）。让我们从资源文件开始。\n\n#### 读取资源文件\n\n在第 2 章中，我们简要了解了 Android 项目的所有文件夹。我们确定了\
  \ `assets/` 和 `res/` 文件夹是我们放置应随应用一同分发的文件的位置。在讨论清单文件时，我们曾提到不会使用 `res/` 文件夹，因为它对我们组织文件结构的方式施加了限制。而\
  \ `assets/` 目录则是存放所有文件的地方，我们可以按任何想要的文件夹层次结构来组织。\n\n`assets/` 文件夹中的文件通过一个名为 `AssetManager`\
  \ 的类来访问。我们可以通过以下方式为应用获取对该管理器的引用：\n\n`AssetManager assetManager = context.getAssets();`\n\
  \n我们之前已经见过 `Context` 接口；它由 `Activity` 类实现。在实际应用中，我们会从 Activity 中获取 `AssetManager`。\n\
  \n一旦我们拥有了 `AssetManager`，就可以开始疯狂地打开文件了：\n\n`InputStream inputStream = assetManager.open(\"\
  dir/dir2/filename.txt\");`\n\n该方法会返回一个普通的 Java `InputStream`，我们可以用它来读取任何类型的文件。`AssetManager.open()`\
  \ 方法的唯一参数是相对于资源文件目录的文件名。在上面的例子中，`assets/` 文件夹下有两个目录，其中第二个目录（`dir2/`）是第一个目录（`dir/`）的子目录。在我们的\
  \ Eclipse 项目中，该文件位于 `assets/dir/dir2/`。\n\n让我们编写一个简单的测试 Activity 来检验这个功能。我们打算从 `assets/`\
  \ 目录下一个名为 `texts` 的子目录中加载一个名为 `myawesometext.txt` 的文本文件。该文本文件的内容将显示在一个 `TextView`\
  \ 中。代码清单 4–7 展示了这个令人惊叹的 Activity 的源代码。\n\n**代码清单 4–7.** *AssetsTest.java，演示如何读取资源文件*\n\
  \n```\npackage com.badlogic.androidgames;\n\nimport java.io.ByteArrayOutputStream;\n\
  import java.io.IOException;\nimport java.io.InputStream;\n\nimport android.app.Activity;\n\
  import android.content.res.AssetManager;\nimport android.os.Bundle;\nimport android.widget.TextView;\n\
  \npublic class AssetsTest extends Activity {\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        TextView\
  \ textView = new TextView(this);\n        setContentView(textView);\n\n        AssetManager\
  \ assetManager = getAssets();\n        InputStream inputStream = null;\n       \
  \ try {\n            inputStream = assetManager.open(\"texts/myawesometext.txt\"\
  );\n            String text = loadTextFile(inputStream);\n            textView.setText(text);\n\
  \        } catch (IOException e) {\n            textView.setText(\"无法加载文件\");\n\
  \        } finally {\n            if (inputStream != null)\n                try\
  \ {\n                    inputStream.close();\n                } catch (IOException\
  \ e) {\n                    textView.setText(\"无法关闭文件\");\n                }\n \
  \       }\n    }\n\n    public String loadTextFile(InputStream inputStream) throws\
  \ IOException {\n        ByteArrayOutputStream byteStream = new ByteArrayOutputStream();\n\
  \        byte[] bytes = new byte[4096];\n        int len = 0;\n        while ((len\
  \ = inputStream.read(bytes)) > 0)\n            byteStream.write(bytes, 0, len);\n\
  \        return new String(byteStream.toByteArray(), \"UTF8\");\n    }\n}\n```\n\
  \n除了发现从 `InputStream` 加载简单文本在 Java 中相当冗长之外，这里没有太多令人惊讶的地方。我们编写了一个名为 `loadTextFile()`\
  \ 的小方法，它会从 `InputStream` 中提取所有字节，并以字符串形式返回这些字节。我们假设文本文件采用 UTF-8 编码。其余部分只是捕获和处理各种异常。图\
  \ 4–10 展示了这个小 Activity 的输出结果。\n\n![images](img/0410.jpg)\n\n**图 4–10.** *`AssetsTest`\
  \ 的文本输出*\n\n你应该从本节中掌握以下几点：\n\n*   在 Java 中从 `InputStream` 加载文本文件是一件很麻烦的事！通常，我们会借助诸如\
  \ Apache IOUtils 之类的库来完成这项工作。我们将此作为练习留给你。\n*   我们只能读取资源文件，不能写入它们。\n*   我们可以轻松地修改\
  \ `loadTextFile()` 方法来加载二进制数据。只需返回字节数组而不是字符串即可。\n\n\n\n#### 访问外部存储\n\n虽然将应用所需的所有图片和声音通过资源文件（assets）打包发布非常出色，但有时我们需要能够持久化存储一些信息，并在之后重新加载。一个常见的例子就是保存高分记录。\n\
  \nAndroid 提供了多种实现方式：你可以使用应用的本地共享首选项、小型 SQLite 数据库等等。所有这些选项都有一个共同点：它们都无法优雅地处理大型二进制文件。那我们为何需要处理它呢？虽然我们可以指示\
  \ Android 将应用安装到外部存储设备上，从而节省内部存储空间，但这仅适用于 Android 2.2 及以上版本。对于更早的版本，我们所有的应用数据都会被安装到内部存储中。理论上，我们可以只在\
  \ APK 文件中包含应用代码，并在首次启动应用时从服务器将所有资源文件下载到 SD 卡。Android 上的许多热门游戏正是这样做的。\n\n在其他场景中，我们也需要访问\
  \ SD 卡（在当前所有可用设备上，这个词几乎等同于*外部存储*）。例如，我们可以允许用户使用游戏内置编辑器创建自己的关卡。我们需要将这些关卡数据存储在某处，而\
  \ SD 卡是实现这一目的的完美选择。\n\n那么，现在我们已经说服你不要使用 Android 提供的那些花哨机制来存储应用偏好设置，接下来让我们看看如何在 SD\
  \ 卡上读写文件。\n\n首先，我们必须请求访问外部存储的权限。这需要在清单文件中使用本章前面讨论过的 `<uses-permission>` 元素来完成。\n\
  \n接下来，我们需要检查运行应用的设备上是否确实存在外部存储设备。例如，如果你创建了一个 AVD（Android 虚拟设备），你可以选择不让它模拟 SD 卡，这样你的应用就无法向其写入数据。另一个无法访问\
  \ SD 卡的原因可能是外部存储设备正被其他程序使用（例如，用户可能正在通过 USB 在台式电脑上浏览它）。那么，以下是获取外部存储状态的方法：\n\n`String\
  \ state = Environment.getExternalStorageState();`\n\n嗯，我们得到一个字符串。`Environment` 类定义了几个常量。其中之一叫做\
  \ `Environment.MEDIA_MOUNTED`，也是一个字符串。如果上述方法返回的字符串等于这个常量，我们就拥有了对外部存储的完全读写权限。请注意，你必须使用\
  \ `equals()` 方法来比较这两个字符串；引用相等性并不总是有效。\n\n一旦确定我们确实可以访问外部存储，就需要获取其根目录名称。如果我们想访问特定文件，则需要相对于此目录指定文件路径。要获取根目录，我们使用另一个\
  \ `Environment` 的静态方法：\n\n`File externalDir = Environment.getExternalStorageDirectory();`\n\
  \n从这开始，我们可以使用标准的 Java I/O 类来读写文件。\n\n让我们快速编写一个示例，该示例向 SD 卡写入一个文件，再读回该文件，将其内容显示在\
  \ `TextView` 中，然后从 SD 卡删除该文件。代码清单 4–8 显示了此活动的源代码。\n\n**代码清单 4–8.** *ExternalStorageTest\
  \ 活动*\n\n```\npackage com.badlogic.androidgames;\n\nimport java.io.BufferedReader;\n\
  import java.io.BufferedWriter;\nimport java.io.File;\nimport java.io.FileReader;\n\
  import java.io.FileWriter;\nimport java.io.IOException;\n\nimport android.app.Activity;\n\
  import android.os.Bundle;\nimport android.os.Environment;\nimport android.widget.TextView;\n\
  \npublic class ExternalStorageTest extends Activity {\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        TextView textView = new TextView(this);\n        setContentView(textView);\n\
  \n        String state = Environment.getExternalStorageState();\n        if (!state.equals(Environment.MEDIA_MOUNTED))\
  \ {\n            textView.setText(\"No external storage mounted\");\n        } else\
  \ {\n            File externalDir = Environment.getExternalStorageDirectory();\n\
  \            File textFile = new File(externalDir.getAbsolutePath()\n          \
  \          + File.separator + \"text.txt\");\n            try {\n              \
  \  writeTextFile(textFile, \"This is a test. Roger\");\n                String text\
  \ = readTextFile(textFile);\n                textView.setText(text);\n         \
  \       if (!textFile.delete()) {\n                    textView.setText(\"Couldn't\
  \ remove temporary file\");\n                }\n            } catch (IOException\
  \ e) {\n                textView.setText(\"Something went wrong! \" + e.getMessage());\n\
  \            }\n        }\n    }\n\n    private void writeTextFile(File file, String\
  \ text) throws IOException {\n        BufferedWriter writer = new BufferedWriter(new\
  \ FileWriter(file));\n        writer.write(text);\n        writer.close();\n   \
  \ }\n\n    private String readTextFile(File file) throws IOException {\n       \
  \ BufferedReader reader = new BufferedReader(new FileReader(file));\n        StringBuilder\
  \ text = new StringBuilder();\n        String line;\n        while ((line = reader.readLine())\
  \ != null) {\n            text.append(line);\n            text.append(\"\\n\");\n\
  \        }\n        reader.close();\n        return text.toString();\n    }\n}\n\
  ```\n\n首先，我们检查 SD 卡是否已挂载。如果没有，我们提前退出。接下来，我们获取外部存储目录，并构造一个新的 `File` 实例，指向我们将在下一步中创建的文件。`writeTextFile()`\
  \ 方法使用标准的 Java I/O 类完成其工作。如果文件尚不存在，此方法将创建它；否则，它将覆盖已存在的文件。成功将测试文本写入外部存储设备上的文件后，我们再次读入该文本，并将其设置为\
  \ `TextView` 的显示文字。最后一步，我们再次从外部存储中删除该文件。所有这些操作都设置了标准的保护措施，如果出现问题，会通过向 `TextView`\
  \ 输出错误信息来报告。图 4–11 显示了该活动的输出结果。\n\n![images](img/0411.jpg)\n\n**图 4–11.** *收到！*\n\
  \n以下是本节需要记住的经验教训：\n\n*   不要乱动不属于你的任何文件。如果你删除了用户上次度假的照片，他们会非常生气。\n*   始终检查外部存储设备是否已挂载。\n\
  *   不要乱动外部存储设备上的任何文件！我是认真的！\n\n因为很容易就能删除外部存储设备上的所有文件，所以当你在应用市场上下一个需要访问 SD 卡权限的应用之前，可能需要三思。一旦安装，该应用就对你的文件拥有完全控制权。\n\
  \n### 音频编程\n\nAndroid 提供了一些易于使用的 API 来播放音效和音乐文件——这完全满足了我们的游戏编程需求。让我们来看看这些 API。\n\
  \n\n\n#### 设置音量控制\n\n如果你有安卓设备，你会注意到按下音量加减按钮时，控制的是不同的音量设置，具体取决于你当前使用的应用。在通话中，你能控制传入语音流的音量；在使用\
  \ YouTube 应用时，你控制的是视频音频的音量；在主屏幕上，你控制的是铃声音量。\n\n安卓为不同用途提供了多种音频流。当我们在游戏中播放音频时，会使用那些将音效和音乐输出到特定音频流的类，这个音频流被称为**音乐流**。在考虑播放音效或音乐之前，我们首先要确保音量按钮能控制正确的音频流。为此，我们需要使用\
  \ `Context` 接口的另一个方法：\n\n```\ncontext.setVolumeControlStream(AudioManager.STREAM_MUSIC);\n\
  ```\n\n一如既往，我们选择的 `Context` 实现就是 Activity。调用此方法后，音量按钮将控制音乐流，我们稍后会将音效和音乐输出到该音频流。这个方法在\
  \ Activity 的生命周期中只需调用一次，`Activity.onCreate()` 方法是最佳调用时机。\n\n写一个只包含一行代码的示例有点小题大做。因此，我们暂时不这样做。只需要记住在所有输出声音的\
  \ Activity 中使用此方法。\n\n#### 播放音效\n\n在第 3 章中，我们讨论了流式播放音乐和播放音效之间的区别。后者存储在内存中，通常持续时间不超过几秒钟。安卓为我们提供了一个名为\
  \ `SoundPool` 的类，它让播放音效变得非常简单。\n\n我们可以像下面这样简单地实例化新的 `SoundPool` 对象：\n\n```\nSoundPool\
  \ soundPool = new SoundPool(20, AudioManager.STREAM_MUSIC, 0);\n```\n\n第一个参数定义了可以同时播放的最大音效数量。这并不意味着我们不能加载更多音效；它只是限制了可以同时播放的音效数量。第二个参数定义了\
  \ `SoundPool` 输出音频的音频流。我们选择了之前设置过音量控制的音乐流。最后一个参数目前未使用，应设置为 0。\n\n要将音频文件中的音效加载到堆内存中，我们可以使用\
  \ `SoundPool.load()` 方法。我们将所有文件存储在 `assets/` 目录中，因此我们需要使用接受 `AssetFileDescriptor`\
  \ 的重载版本的 `SoundPool.load()` 方法。如何获取那个 `AssetFileDescriptor`？很简单——通过我们之前使用的 `AssetManager`。下面演示如何通过\
  \ `SoundPool` 从 `assets/` 目录加载一个名为 `explosion.ogg` 的 OGG 文件：\n\n```\nAssetFileDescriptor\
  \ descriptor = assetManager.openFd(\"explosion.ogg\");\nint explosionId = soundPool.load(descriptor,\
  \ 1);\n```\n\n通过 `AssetManager.openFd()` 方法获取 `AssetFileDescriptor` 很简单。通过 `SoundPool`\
  \ 加载音效也同样容易。`SoundPool.load()` 方法的第一个参数是我们的 `AssetFileDescriptor`，第二个参数指定了音效的优先级。这个参数目前未被使用，为了将来的兼容性，应将其设置为\
  \ 1。\n\n`SoundPool.load()` 方法返回一个整数，作为已加载音效的句柄。当我们想要播放该音效时，只需指定这个句柄，`SoundPool`\
  \ 就知道要播放哪个音效。\n\n播放音效同样非常简单：\n\n```\nsoundPool.play(explosionId, 1.0f, 1.0f, 0,\
  \ 0, 1);\n```\n\n第一个参数是我们从 `SoundPool.load()` 方法接收到的句柄。接下来的两个参数指定了左右声道使用的音量。这些值应介于\
  \ 0（静音）和 1（音量最大）之间。\n\n接下来是两个我们很少使用的参数。第一个是优先级，目前未被使用，应设置为 0。另一个参数指定了音效应该循环播放的次数。不建议循环播放音效，因此这里通常应使用\
  \ 0。最后一个参数是播放速率。将其设置为大于 1 的值会使音效以比录制时更快的速度播放，而设置为小于 1 的值则会导致播放速度变慢。\n\n当我们不再需要某个音效并想释放一些内存时，可以使用\
  \ `SoundPool.unload()` 方法：\n\n```\nsoundPool.unload(explosionId);\n```\n\n我们只需传入从\
  \ `SoundPool.load()` 方法中为该音效获取的句柄，它就会被从内存中卸载。\n\n通常，我们的游戏会有一个单一的 `SoundPool` 实例，用于根据需要加载、播放和卸载音效。当我们完成所有音频输出并且不再需要\
  \ `SoundPool` 时，应该始终调用 `SoundPool.release()` 方法，该方法会释放 `SoundPool` 通常占用的所有资源。释放后，你当然不能再使用该\
  \ `SoundPool`。同时，该 `SoundPool` 加载的所有音效也将消失。\n\n让我们编写一个简单的测试 Activity，每次点击屏幕时，它都会播放一个爆炸音效。我们已经掌握了实现此功能所需的所有知识，因此清单\
  \ 4–9 中应该不会出现任何大的意外。\n\n\n\n**代码清单 4–9.** *SoundPoolTest.java；播放音效*\n\n`package`\
  \ `com.badlogic.androidgames;`\n\n`import` `java.io.IOException;`\n\n`import` `android.app.Activity;`\n\
  `import` `android.content.res.AssetFileDescriptor;`\n`import` `android.content.res.AssetManager;`\n\
  `import` `android.media.AudioManager;`\n`import` `android.media.SoundPool;`\n`import`\
  \ `android.os.Bundle;`\n`import` `android.view.MotionEvent;`\n`import` `android.view.View;`\n\
  `import` `android.view.View.OnTouchListener;`\n`import` `android.widget.TextView;`\n\
  \n`public class` `SoundPoolTest` `extends` `Activity` `implements` `OnTouchListener\
  \ {`\n`    SoundPool soundPool;`\n`int` `explosionId = -1;`\n\n`    @Override`\n\
  `public void` `onCreate(Bundle savedInstanceState) {`\n`super``.onCreate(savedInstanceState);`\n\
  `TextView textView =` `new` `TextView(` `this` `);`\n`        textView.setOnTouchListener(`\
  \ `this` `);`\n`        setContentView(textView);`\n\n`        setVolumeControlStream(AudioManager.STREAM_MUSIC);`\n\
  `soundPool =` `new` `SoundPool(20, AudioManager.STREAM_MUSIC, 0);`\n\n`try` `{`\n\
  `            AssetManager assetManager = getAssets();`\n`            AssetFileDescriptor\
  \ descriptor = assetManager`\n`                    .openFd(\"explosion.ogg\");`\n\
  `            explosionId = soundPool.load(descriptor, 1);`\n`}` `catch` `(IOException\
  \ e) {`\n`            textView.setText(\"从资源中加载音效失败，\"`\n`                    +\
  \ e.getMessage());`\n`        }`\n`    }`\n\n`    @Override`\n`public boolean` `onTouch(View\
  \ v, MotionEvent event) {`\n`if` `(event.getAction() == MotionEvent.ACTION_UP) {`\n\
  `if` `(explosionId != -1) {`\n`                soundPool.play(explosionId, 1, 1,\
  \ 0, 0, 1);`\n`            }`\n`        }`\n`return true` `;`\n`    }`\n`}`\n\n\
  我们首先让类继承自 `Activity` 并实现 `OnTouchListener` 接口，以便后续处理屏幕点击事件。该类包含两个成员变量：`SoundPool`\
  \ 实例，以及待加载和播放的音效句柄。我们将句柄初始化为 -1，表示音效尚未加载。\n\n在 `onCreate()` 方法中，我们重复之前做过多次的操作：创建一个\
  \ `TextView`，将 Activity 注册为 `OnTouchListener`，并将 `TextView` 设置为内容视图。\n\n接下来的一行代码设置了音量控制键用于控制音乐流，如前所述。然后我们创建\
  \ `SoundPool`，并将其配置为可同时播放 20 个音效。对于大多数游戏来说，这已经足够了。\n\n最后，我们通过 `AssetManager` 获取放入\
  \ `assets/` 目录下的 `explosion.ogg` 文件的 `AssetFileDescriptor`。要加载该音效，只需将该描述符传递给 `SoundPool.load()`\
  \ 方法并存储返回的句柄。如果在加载过程中出现异常，`SoundPool.load()` 方法会抛出异常，此时我们捕获异常并显示错误信息。\n\n在 `onTouch()`\
  \ 方法中，我们只需检查手指是否抬起，以此判断屏幕是否被点击。如果是，并且爆炸音效已成功加载（通过句柄不为 -1 来判断），我们就直接播放该音效。\n\n执行这个小程序时，只需触摸屏幕就能让世界爆炸。如果快速连续触摸屏幕，你会发现音效会以重叠的方式多次播放。要超过我们为\
  \ `SoundPool` 设置的 20 次同时播放上限非常困难。但万一达到上限，系统会停止当前正在播放的某个音效，为新请求的播放腾出空间。\n\n请注意，在前面的例子中，我们没有卸载音效或释放\
  \ `SoundPool`。这是为了简洁起见。通常，你应在 Activity 即将被销毁时的 `onPause()` 方法中释放 `SoundPool`。只需记住，始终释放或卸载你不再需要的任何资源。\n\
  \n虽然 `SoundPool` 类非常易于使用，但有几个注意事项需要牢记：\n\n*   `SoundPool.load()` 方法会异步执行实际加载。这意味着，在调用\
  \ `SoundPool.play()` 方法播放该音效之前，需要短暂等待，因为加载可能尚未完成。遗憾的是，无法检查音效是否加载完成。只有 SDK 8 版本的\
  \ `SoundPool` 才支持此功能，而我们需要支持所有 Android 版本。不过这通常不是什么大问题，因为在首次播放音效之前，你很可能还要加载其他资源。\n\
  *   已知 `SoundPool` 在处理 MP3 文件和长音频文件时存在问题，其中 *长* 的定义是“超过 5 到 6 秒”。这两个问题都没有文档说明，因此没有严格的规则来判断你的音效是否会有问题。作为一般规则，我们建议改用\
  \ OGG 音频文件而非 MP3，并在音频质量变差之前，尽量使用最低的采样率和最短的时长。\n\n**注意：** 与我们所讨论的任何 API 一样，`SoundPool`\
  \ 还有更多功能。我们简要提到过可以循环播放音效。为此，你可以从 `SoundPool.play()` 方法获取一个 ID，用于暂停或停止循环播放的音效。如果需要此功能，请查阅\
  \ Android 开发者网站上的 `SoundPool` 文档。\n\n\n\n#### 流式音乐播放\n\n小型音效可以放入安卓应用从操作系统获得的有限堆内存中。但包含较长音乐片段的大型音频文件则无法容纳。因此，我们需要将音乐流式传输到音频硬件，这意味着我们一次只读取一小块数据，足够将其解码为原始\
  \ PCM 数据，然后将其发送给音频芯片。\n\n这听起来有些吓人。幸运的是，有 `MediaPlayer` 类可以为我们处理所有这些事务。我们只需将其指向音频文件并告知它播放即可。\n\
  \n实例化 `MediaPlayer` 类非常简单：\n\n`MediaPlayer mediaPlayer = new MediaPlayer();`\n\n\
  接下来，我们需要告诉 `MediaPlayer` 要播放哪个文件。这同样通过 `AssetFileDescriptor` 完成：\n\n`AssetFileDescriptor\
  \ descriptor = assetManager.openFd(\"music.ogg\");`\n`mediaPlayer.setDataSource(descriptor.getFileDescriptor(),\
  \ descriptor.getStartOffset(),`\n`descriptor.getLength());`\n\n这里比 `SoundPool` 的情况稍微复杂一些。`MediaPlayer.setDataSource()`\
  \ 方法并不直接接受 `AssetFileDescriptor`。相反，它需要一个 `FileDescriptor`，我们可以通过 `AssetFileDescriptor.getFileDescriptor()`\
  \ 方法获取。此外，我们还需要指定音频文件的偏移量和长度。为什么要指定偏移量？实际上，所有资源都存储在同一个文件中。为了让 `MediaPlayer` 能找到文件的起始位置，我们必须提供该文件在包含它的资源文件中的偏移量。\n\
  \n在开始播放音乐文件之前，我们还需要调用另一个方法来准备 `MediaPlayer` 进行播放：\n\n`mediaPlayer.prepare();`\n\n\
  这实际上会打开文件，并检查它是否能够被 `MediaPlayer` 实例读取和播放。从此刻起，我们就可以自由地播放音频文件、暂停、停止、设置循环播放以及调整音量。\n\
  \n要开始播放，我们只需调用以下方法：\n\n`mediaPlayer.start();`\n\n请注意，只有在 `MediaPlayer.prepare()`\
  \ 方法成功调用后（如果抛出运行时异常你会注意到），才能调用此方法。\n\n在开始播放后，我们可以通过调用 `pause()` 方法来暂停播放：\n\n`mediaPlayer.pause();`\n\
  \n同样，只有在成功准备 `MediaPlayer` 并开始播放后，调用此方法才有效。要恢复暂停的 `MediaPlayer`，我们可以直接再次调用 `MediaPlayer.start()`\
  \ 方法，无需任何准备。\n\n要停止播放，我们调用以下方法：\n\n`mediaPlayer.stop();`\n\n请注意，当我们想要启动已停止的 `MediaPlayer`\
  \ 时，必须先再次调用 `MediaPlayer.prepare()` 方法。\n\n我们可以通过以下方法设置 `MediaPlayer` 循环播放：\n\n\
  `mediaPlayer.setLooping(true);`\n\n要调整音乐播放的音量，我们可以使用此方法：\n\n`mediaPlayer.setVolume(1,\
  \ 1);`\n\n这将设置左右声道的音量。文档并未规定这两个参数的范围。根据实验，有效范围似乎是在 0 到 1 之间。\n\n最后，我们需要一种方法来检查播放是否已结束。我们可以通过两种方式实现。一种是为\
  \ `MediaPlayer` 注册一个 `OnCompletionListener`，当播放完成时会调用该监听器：\n\n`mediaPlayer.setOnCompletionListener(listener);`\n\
  \n如果我们想要轮询 `MediaPlayer` 的状态，可以使用以下方法：\n\n`boolean isPlaying = mediaPlayer.isPlaying();`\n\
  \n请注意，如果 `MediaPlayer` 设置为循环播放，前面的任何方法都不会指示 `MediaPlayer` 已停止。\n\n最后，当我们用完 `MediaPlayer`\
  \ 实例后，需要确保通过调用以下方法释放它所占用的所有资源：\n\n`mediaPlayer.release();`\n\n在丢弃该实例之前始终这样做，被认为是一种良好的实践。\n\
  \n如果我们没有将 `MediaPlayer` 设置为循环播放且播放已结束，我们可以通过再次调用 `MediaPlayer.prepare()` 和 `MediaPlayer.start()`\
  \ 方法重新启动 `MediaPlayer`。\n\n这些方法大多数是异步工作的，因此即使你调用了 `MediaPlayer.stop()`，此后短时间内调用\
  \ `MediaPlayer.isPlaying()` 方法仍可能返回 `true`。这通常无需我们担心。在大多数游戏中，我们会将 `MediaPlayer`\
  \ 设置为循环播放，然后在需要时停止它（例如，当我们切换到需要播放其他音乐的不同界面时）。\n\n让我们编写一个小型测试活动，以循环模式播放来自 `assets/`\
  \ 目录的声音文件。此音效将根据活动生命周期进行暂停和恢复——当我们的活动暂停时，音乐也应暂停；当活动恢复时，音乐播放应从中断处继续。清单 4-10 展示了如何实现这一点。\n\
  \n**清单 4-10.** *MediaPlayerTest.java；播放音频流*\n\n```java\npackage com.badlogic.androidgames;\n\
  \nimport java.io.IOException;\n\nimport android.app.Activity;\nimport android.content.res.AssetFileDescriptor;\n\
  import android.content.res.AssetManager;\nimport android.media.AudioManager;\nimport\
  \ android.media.MediaPlayer;\nimport android.os.Bundle;\nimport android.widget.TextView;\n\
  \npublic class MediaPlayerTest extends Activity {\n    MediaPlayer mediaPlayer;\n\
  \n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n       \
  \ super.onCreate(savedInstanceState);\n        TextView textView = new TextView(this);\n\
  \        setContentView(textView);\n\n        setVolumeControlStream(AudioManager.STREAM_MUSIC);\n\
  \        mediaPlayer = new MediaPlayer();\n        try {\n            AssetManager\
  \ assetManager = getAssets();\n            AssetFileDescriptor descriptor = assetManager.openFd(\"\
  music.ogg\");\n            mediaPlayer.setDataSource(descriptor.getFileDescriptor(),\n\
  \                    descriptor.getStartOffset(), descriptor.getLength());\n   \
  \         mediaPlayer.prepare();\n            mediaPlayer.setLooping(true);\n  \
  \      } catch (IOException e) {\n            textView.setText(\"无法加载音乐文件，\" + e.getMessage());\n\
  \            mediaPlayer = null;\n        }\n    }\n\n    @Override\n    protected\
  \ void onResume() {\n        super.onResume();\n        if (mediaPlayer != null)\
  \ {\n            mediaPlayer.start();\n        }\n    }\n\n    protected void onPause()\
  \ {\n        super.onPause();\n        if (mediaPlayer != null) {\n            mediaPlayer.pause();\n\
  \            if (isFinishing()) {\n                mediaPlayer.stop();\n       \
  \         mediaPlayer.release();\n            }\n        }\n    }\n}\n```\n\n我们以活动成员变量的形式持有对\
  \ `MediaPlayer` 的引用。在 `onCreate()` 方法中，我们像往常一样简单地创建一个 `TextView` 用于输出任何错误消息。\n\n\
  在开始使用 `MediaPlayer` 之前，我们确保音量控制确实控制着音乐流。设置好之后，我们实例化 `MediaPlayer`。我们从 `AssetManager`\
  \ 中获取位于 `assets/` 目录下名为 `music.ogg` 文件的 `AssetFileDescriptor`，并将其设置为 `MediaPlayer`\
  \ 的数据源。剩下的工作就是准备 `MediaPlayer` 实例并将其设置为循环播放流。如果出现任何问题，我们会将 `MediaPlayer` 成员设置为 `null`，以便稍后确定加载是否成功。此外，我们还会向\
  \ `TextView` 输出一些错误文本。\n\n\n\n在`onResume()`方法中，我们简单地启动`MediaPlayer`（如果创建成功的话）。`onResume()`方法是执行此操作的绝佳位置，因为它会在`onCreate()`之后和`onPause()`之后被调用。在第一种情况下，它将首次开始播放；在第二种情况下，它将简单地恢复已暂停的`MediaPlayer`。\n\
  \n`onResume()`方法会暂停`MediaPlayer`。如果 Activity 即将被销毁，我们会停止`MediaPlayer`，然后释放其所有资源。\n\
  \n如果你尝试使用它，请确保同时测试其对暂停和恢复 Activity 的反应，方法可以是锁定屏幕或临时切换到主屏幕。当恢复时，`MediaPlayer`将从暂停时的位置继续播放。\n\
  \n以下是需要注意的几点：\n\n*   `MediaPlayer.start()`、`MediaPlayer.pause()`和`MediaPlayer.resume()`方法只能如刚才讨论的那样，在某些状态下调用。在尚未准备好`MediaPlayer`时，切勿尝试调用它们。仅在准备好`MediaPlayer`之后，或者当你希望通过调用`MediaPlayer.pause()`显式暂停它后恢复播放时，才调用`MediaPlayer.start()`。\n\
  *   `MediaPlayer`实例相当重量级。实例化多个实例将占用大量资源。我们应该始终尽量只保留一个实例用于音乐播放。音效更适合使用`SoundPool`类来处理。\n\
  *   请记得将音量控制设置为处理音乐流，否则你的播放器将无法调整游戏音量。\n\n本章内容快结束了，但前面还有一个大话题：2D 图形。\n\n### 基础图形编程\n\
  \nAndroid 为我们提供了两个用于在屏幕上进行绘制的主要 API。一个主要用于简单的 2D 图形编程，另一个用于硬件加速的 3D 图形编程。本章和下一章将重点介绍使用`Canvas`API\
  \ 进行 2D 图形编程，它是 Skia 库的优质封装，适用于中等复杂度的 2D 图形。在开始之前，我们首先需要讨论两件事：全屏和唤醒锁。\n\n#### 使用唤醒锁\n\
  \n如果你让之前编写的测试程序闲置几秒钟，手机屏幕就会变暗。只有当你触摸屏幕或按下按钮时，屏幕才会恢复全亮度。为了确保屏幕始终唤醒，我们可以使用所谓的*唤醒锁*。\n\
  \n我们需要做的第一件事是在清单文件中添加一个合适的`<uses-permission>`标签，名称为`android.permission.WAKE_LOCK`。这将允许我们使用`WakeLock`类。\n\
  \n我们可以通过`PowerManager`获取`WakeLock`实例，代码如下：\n\n`PowerManager powerManager =`\n`(PowerManager)context.getSystemService(Context.POWER_SERVICE);`\n\
  `WakeLock wakeLock = powerManager.newWakeLock(PowerManager.FULL_WAKE_LOCK, \"My\
  \ Lock\");`\n\n与所有其他系统服务一样，我们从`Context`实例获取`PowerManager`。`PowerManager.newWakeLock()`方法接收两个参数：锁的类型和一个我们可以自由定义的标签。有几种不同的唤醒锁类型；对于我们的目的，`PowerManager.FULL_WAKE_LOCK`类型是合适的。它将确保屏幕保持开启，CPU\
  \ 全速运行，并且键盘保持启用状态。\n\n要启用唤醒锁，我们必须调用其`acquire()`方法：\n\n`wakeLock.acquire();`\n\n\
  从此刻起，无论经过多长时间没有用户交互，手机都将保持唤醒状态。当我们的应用程序暂停或销毁时，我们必须再次禁用或释放唤醒锁：\n\n`wakeLock.release();`\n\
  \n通常，我们在`Activity.onCreate()`方法中实例化`WakeLock`实例，在`Activity.onResume()`方法中调用`WakeLock.acquire()`，并在`Activity.onPause()`方法中调用`WakeLock.release()`方法。这样，我们就能保证应用程序在暂停或恢复的情况下依然运行良好。由于只需要添加四行代码，我们就不编写完整的示例了。相反，我们建议你简单地将代码添加到下一节的全屏示例中，然后观察效果。\n\
  \n#### 进入全屏模式\n\n在我们一头扎进使用 Android API 绘制第一个图形之前，让我们先解决另一个问题。到目前为止，我们所有的 Activity\
  \ 都显示了标题栏。通知栏也是可见的。我们希望通过去除这些元素，进一步提高玩家的沉浸感。我们可以通过两个简单的调用来实现这一点：\n\n`requestWindowFeature(Window.FEATURE_NO_TITLE);`\n\
  `getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,`\n`WindowManager.LayoutParams.FLAG_FULLSCREEN);`\n\
  \n第一个调用去除了 Activity 的标题栏。要使 Activity 进入全屏模式并同时消除通知栏，我们调用第二个方法。请注意，我们必须在设置 Activity\
  \ 的内容视图之前调用这些方法。\n\n列表 4-11 向你展示了一个非常简单的测试 Activity，演示了如何进入全屏模式。\n\n**列表 4-11.**\
  \ *FullScreenTest.java；让我们的 Activity 进入全屏模式*\n\n```\npackage com.badlogic.androidgames;\n\
  \nimport android.os.Bundle;\nimport android.view.Window;\nimport android.view.WindowManager;\n\
  \npublic class FullScreenTest extends SingleTouchTest {\n\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \            WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        super.onCreate(savedInstanceState);\n\
  \    }\n}\n```\n\n这里发生了什么？我们简单地继承自之前创建的`TouchTest`类，并重写了`onCreate()`方法。在`onCreate()`方法中，我们启用了全屏模式，然后调用了超类（即`TouchTest`\
  \ Activity）的`onCreate()`方法，该方法将设置 Activity 的其余所有部分。再次注意，我们必须在设置内容视图之前调用这两个方法。因此，我们在执行这两个方法之后才调用超类的`onCreate()`方法。\n\
  \n我们还在清单文件中将 Activity 的方向固定为竖屏模式。你没有忘记为我们编写的每个测试在清单文件中添加`<activity>`元素，对吧？从现在开始，我们将始终将其固定为竖屏或横屏模式，因为我们不希望坐标系一直变化。\n\
  \n通过继承`TouchTest`，我们有了一个功能完整的示例，现在可以用它来探索我们即将进行绘制的坐标系。该 Activity 会在你触摸屏幕时显示触摸坐标，就像之前的`TouchTest`示例一样。这次的区别在于我们处于全屏模式，这意味着触摸事件的最大坐标等于屏幕分辨率（每个维度减一，因为我们从[0,0]开始）。对于\
  \ Nexus One 手机，竖屏模式下的坐标范围是(0,0)到(479,799)（总共 480×800 像素）。\n\n虽然看起来屏幕在不断重绘，但实际上并非如此。回想一下我们的`TouchTest`类，我们是在每次处理触摸事件时才更新`TextView`。这反过来会使`TextView`重绘自身。如果我们不触摸屏幕，`TextView`就不会重绘自身。对于游戏来说，我们需要能够尽可能频繁地重绘屏幕，最好是在我们主循环线程中进行。我们先从简单的开始，在\
  \ UI 线程中实现持续渲染。\n\n\n\n#### UI 线程中的持续渲染\n\n到目前为止，我们所做的只是在需要时设置 `TextView` 的文本。实际的渲染工作是由\
  \ `TextView` 自身完成的。现在让我们创建一个自定义的 `View`，其唯一目的就是让我们能在屏幕上绘制内容。我们还希望它能尽可能频繁地重绘自身，并且希望有一种简单的方法，在这个神秘的重绘方法中执行我们自己的绘制。\n\
  \n虽然这听起来可能很复杂，但实际上 Android 让我们很容易就能实现这样的功能。我们只需要创建一个继承自 `View` 类的类，并重写一个名为 `View.onDraw()`\
  \ 的方法。每当系统需要我们的 `View` 重绘自身时，就会调用这个方法。代码可能如下所示：\n\n```\nclass RenderView extends\
  \ View {\n    public RenderView(Context context) {\n        super(context);\n  \
  \  }\n\n    protected void onDraw(Canvas canvas) {\n        // 待实现\n    }\n}\n```\n\
  \n这并不是什么高深莫测的技术，对吧？我们会在 `onDraw()` 方法中接收到一个名为 `Canvas` 类的实例。在接下来的章节中，这将是我们的主力工具。它允许我们在另一个位图或\
  \ `View`（或者 Surface，稍后会讨论）上绘制形状和位图。\n\n我们可以像使用 `TextView` 一样使用这个 `RenderView`。只需将其设置为\
  \ Activity 的内容视图，并连接上所需的任何输入监听器即可。然而，它目前还没有太多用处，原因有二：它实际上没有绘制任何内容；即使它绘制了，也只在 Activity\
  \ 需要重绘时才会绘制（例如，在创建或恢复时，或者覆盖它的对话框消失时）。我们怎样才能让它自行重绘呢？\n\n很简单，就像这样：\n\n```\nprotected\
  \ void onDraw(Canvas canvas) {\n    // 所有绘制代码放在这里\n    invalidate();\n}\n```\n\n\
  在 `onDraw()` 末尾调用 `View.invalidate()` 方法会告诉 Android 系统，一旦它有空闲时间，就再次重绘 `RenderView`。所有的这些操作仍然发生在\
  \ UI 线程上，这线程有点像是懒马。不过，我们确实通过 `onDraw()` 方法实现了持续渲染，尽管这是相对较慢的持续渲染。我们稍后会改进这个问题；目前来说，这已经足够满足我们的需求了。\n\
  \n那么，让我们再次回到神秘的 `Canvas` 类。这是一个功能相当强大的类，它封装了一个名为 Skia 的自定义低级图形库，该库专门针对在 CPU 上执行\
  \ 2D 渲染进行了优化。`Canvas` 类为我们提供了许多绘制方法，用于绘制各种形状、位图，甚至文本。\n\n这些绘制方法绘制到哪里去了呢？这取决于具体情况。一个\
  \ `Canvas` 可以渲染到一个 `Bitmap` 实例；`Bitmap` 是 Android 2D API 提供的另一个类，我们稍后会介绍。在这里，它绘制到屏幕上由该\
  \ `View` 占据的区域。当然，这是一个极其简化的说法。在底层，它并不会直接绘制到屏幕上，而是绘制到某种位图上，系统稍后将结合 Activity 中所有其他\
  \ `View` 的位图，组合成最终的输出图像。然后，该图像会被交给 GPU，通过另一组神秘的路径显示在屏幕上。\n\n我们并不需要关心这些细节。从我们的角度来看，我们的\
  \ `View` 似乎是拉伸到全屏的，所以它完全可以看作是直接绘制到系统的帧缓冲上。在接下来的讨论中，我们将假设我们直接绘制到帧缓冲上，而系统则为我们处理所有巧妙的操作，比如垂直回扫和双缓冲等。\n\
  \n`onDraw()` 方法会以系统允许的频率被调用。对我们来说，它非常类似于我们理论上的游戏主循环体。如果我们想用这个方法来实现一个游戏，我们会把所有游戏逻辑都放到这个方法里。出于多种原因我们不会这样做，性能就是其中之一。\n\
  \n那么，让我们来做些有趣的事情。每次你接触到新的绘图 API 时，写一个小测试来检查屏幕是否真的被频繁重绘。这是一种简易的灯光秀测试。你只需要在每次调用重绘方法时，用一种新的随机颜色填充屏幕即可。这样你只需要找到该\
  \ API 中允许你填充屏幕的方法，而无需了解太多繁琐的细节。让我们用自定义的 `RenderView` 实现来编写这样一个测试。\n\n`Canvas` 中用于用特定颜色填充其渲染目标的方法叫做\
  \ `Canvas.drawRGB()`：\n\n```\nCanvas.drawRGB(int r, int g, int b);\n```\n\n`r`、`g`、`b`\
  \ 参数分别代表我们将用于填充“屏幕”颜色的红、绿、蓝分量。每个分量的取值范围为 0 到 255，因此这里我们实际上指定的是 RGB888 格式的颜色。如果你不记得关于颜色的细节，请重新阅读第\
  \ 3 章的“数字颜色编码”部分，因为我们在本章剩余部分都会用到这些信息。\n\n列表 4–12 展示了我们这个小灯光秀的代码。\n\n**注意：** 运行此代码会快速用随机颜色填满屏幕。如果你患有癫痫或对光敏感，请不要运行它。\n\
  \n**列表 4–12.** *RenderViewTest Activity*\n\n```\npackage com.badlogic.androidgames;\n\
  \nimport java.util.Random;\n\nimport android.app.Activity;\nimport android.content.Context;\n\
  import android.graphics.Canvas;\nimport android.os.Bundle;\nimport android.view.View;\n\
  import android.view.Window;\nimport android.view.WindowManager;\n\npublic class\
  \ RenderViewTest extends Activity {\n    class RenderView extends View {\n     \
  \   Random rand = new Random();\n\n        public RenderView(Context context) {\n\
  \            super(context);\n        }\n\n        protected void onDraw(Canvas\
  \ canvas) {\n            canvas.drawRGB(rand.nextInt(256), rand.nextInt(256),\n\
  \                    rand.nextInt(256));\n            invalidate();\n        }\n\
  \    }\n\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n\
  \        super.onCreate(savedInstanceState);\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \            WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        setContentView(new\
  \ RenderView(this));\n    }\n}\n```\n\n对于我们的第一个图形演示来说，这已经相当简洁了。我们将 `RenderView`\
  \ 类定义为 `RenderViewTest` Activity 的一个内部类。正如前面讨论的，`RenderView` 类派生自 `View` 类，并且有一个必需的构造函数以及重写的\
  \ `onDraw()` 方法。它还有一个 `Random` 类的实例作为成员变量；我们将用它来生成随机颜色。\n\n`onDraw()` 方法非常简单。我们首先告诉\
  \ `Canvas` 用随机颜色填充整个视图。对于每个颜色分量，我们只需要指定一个介于 0 和 255 之间的随机数（`Random.nextInt()` 是不包含上限的）。之后，我们告诉系统我们希望尽快再次调用\
  \ `onDraw()` 方法。\n\nActivity 的 `onCreate()` 方法启用了全屏模式，并将我们 `RenderView` 类的一个实例设置为内容视图。为了保持示例的简洁，我们暂时省略了唤醒锁。\n\
  \n给这个例子截图没什么意义。它所做的只是在 UI 线程上，以系统允许的最快速度用随机颜色填充屏幕。这并不值得大书特书。让我们来做些更有趣的事情：绘制一些形状。\n\
  \n**注意：** 前面提到的持续渲染方法是可行的，但我们强烈建议不要使用它！我们应该尽可能少地在 UI 线程上工作。稍后，我们将使用一个单独的线程来讨论如何正确地做到这一点，这样我们之后还可以实现游戏逻辑。\n\
  \n\n\n#### 获取屏幕分辨率（及坐标系）\n\n在第 2 章中，我们详细讨论了帧缓冲区及其属性。请记住，帧缓冲区保存了最终显示在屏幕上的像素颜色。我们可用的像素数量由屏幕分辨率定义，该分辨率以像素为单位的宽度和高度给出。\n\
  \n现在，通过我们自定义的`View`实现，我们实际上并非直接渲染到帧缓冲区。然而，由于我们的`View`覆盖了整个屏幕，我们可以假装它直接渲染到了帧缓冲区。为了知道在哪里渲染我们的游戏元素，我们需要了解\
  \ x 轴和 y 轴上各有多少像素，即屏幕的宽度和高度。\n\n`Canvas`类提供了两个方法可以告诉我们这些信息：\n\n```\nint width =\
  \ canvas.getWidth();\nint height = canvas.getHeight();\n```\n\n这两个方法返回`Canvas`渲染目标的像素宽度和高度。请注意，根据我们\
  \ Activity 的方向，宽度可能小于或大于高度。例如，一台 Nexus One 手机在竖屏模式下的分辨率是 480×800 像素，因此`Canvas.getWidth()`方法会返回\
  \ 480，而`Canvas.getHeight()`方法会返回 800。在横屏模式下，这两个值会互换：`Canvas.getWidth()`返回 800，`Canvas.getHeight()`返回\
  \ 480。\n\n我们需要知道的第二项信息是我们进行渲染的坐标系是如何组织的。首先，只有整数像素坐标才有意义（存在称为子像素的概念，但我们在此忽略它）。我们也已经知道，无论是竖屏还是横屏模式，该坐标系的原点(0,0)始终位于显示器的左上角。正\
  \ x 轴始终指向右方，正 y 轴始终指向下方。图 4-12 显示了一个假设的横屏模式下的屏幕，其分辨率为 48×32 像素。\n\n![images](img/0412.jpg)\n\
  \n**图 4-12.** *一个 48×32 像素宽屏幕的坐标系*\n\n请注意图 4-12 中坐标系的原点是如何与屏幕左上角的像素重合的。因此，屏幕左下角的像素并非我们以为的(48,32)，而是(47,31)。通常，(宽度\
  \ – 1, 高度 – 1) 总是屏幕右下角像素的位置。\n\n图 4-12 向您展示了一个假设的横屏模式下的屏幕坐标系。现在您应该能够想象出竖屏模式下坐标系的样子了。\n\
  \n`Canvas`的所有绘图方法都在这种坐标系中运作。通常，我们可以操作的像素数量远多于我们 48×32 像素示例中的数量（例如，800×480）。话虽如此；让我们终于开始绘制一些像素、直线、圆形和矩形吧。\n\
  \n**注意：** 您可能已经注意到不同设备可能有不同的屏幕分辨率。我们将在下一章探讨这个问题。现在，我们只专注于最终在我们自己的屏幕上显示一些内容。\n\n\
  #### 绘制简单形状\n\n经过一百五十页的篇幅，我们终于要开始绘制第一个像素了。我们将快速浏览一下`Canvas`类提供给我们的一些绘图方法。\n\n#####\
  \ 绘制像素\n\n我们首先想知道的是如何绘制单个像素。这可以通过以下方法实现：\n\n```\nCanvas.drawPoint(float x, float\
  \ y, Paint paint);\n```\n\n需要立即注意两点：像素的坐标是用浮点数指定的，并且`Canvas`不允许我们直接指定颜色，而是需要我们提供一个`Paint`类的实例。\n\
  \n不要因为我们使用浮点数指定坐标而感到困惑。`Canvas`拥有一些非常高级的功能，允许我们在非整数坐标上进行渲染，这就是使用浮点数的原因。不过我们暂时还不需要这个功能；我们将在下一章再回顾它。\n\
  \n`Paint`类保存着用于绘制形状、文本和位图的样式与颜色信息。对于绘制形状，我们只关心两件事：颜色和样式。由于像素实际上没有样式，我们先集中看颜色。下面是我们实例化`Paint`类并设置颜色的方法：\n\
  \n```\nPaint paint = new Paint();\npaint.setARGB(alpha, red, green, blue);\n```\n\
  \n实例化`Paint`类非常简单。`Paint.setARGB()`方法也应该很容易理解。每个参数分别代表颜色的一个分量，取值范围为 0 到 255。因此，我们这里指定的是一个\
  \ ARGB8888 颜色。\n\n另外，我们还可以使用以下方法来设置`Paint`实例的颜色：\n\n```\nPaint.setColor(0xff00ff00);\n\
  ```\n\n我们向此方法传递一个 32 位整数。它同样编码了一个 ARGB8888 颜色；在这个例子中，它是绿色，alpha 设置为完全不透明。`Color`类定义了一些静态常量，它们编码了一些标准颜色，例如`Color.RED`、`Color.YELLOW`等。如果您不想自己指定十六进制值，可以使用这些常量。\n\
  \n##### 绘制直线\n\n要绘制直线，我们可以使用以下`Canvas`方法：\n\n```\nCanvas.drawLine(float startX,\
  \ float startY, float stopX, float stopY, Paint paint);\n```\n\n前两个参数指定直线起点的坐标，接下来两个参数指定直线终点的坐标，最后一个参数指定一个`Paint`实例。绘制的直线宽度为一个像素。如果我们希望直线更粗，可以通过设置`Paint`的描边宽度来指定其像素厚度：\n\
  \n```\nPaint.setStrokeWidth(float widthInPixels);\n```\n\n##### 绘制矩形\n\n我们也可以使用`Canvas`绘制矩形：\n\
  \n```\nCanvas.drawRect(float topleftX, float topleftY, float bottomRightX, float\
  \ bottomRightY,\nPaint paint);\n```\n\n前两个参数指定矩形左上角的坐标，接下来两个参数指定矩形右下角的坐标，`Paint`则指定矩形的颜色和样式。那么，我们有哪些样式可选，又如何进行设置呢？\n\
  \n要设置`Paint`实例的样式，我们调用以下方法：\n\n```\nPaint.setStyle(Style style);\n```\n\n`Style`是一个枚举，包含`Style.FILL`、`Style.STROKE`和`Style.FILL_AND_STROKE`这几个值。如果我们指定`Style.FILL`，矩形将用`Paint`的颜色填充。如果我们指定`Style.STROKE`，只会绘制矩形的轮廓，同样使用`Paint`的颜色和描边宽度。如果设置`Style.FILL_AND_STROKE`，则矩形会被填充，同时轮廓也会用给定的颜色和描边宽度绘制出来。\n\
  \n##### 绘制圆形\n\n绘制圆形（可以是填充、描边或两者兼具）会更有趣：\n\n```\nCanvas.drawCircle(float centerX,\
  \ float centerY, float radius, Paint paint);\n```\n\n前两个参数指定圆心的坐标，下一个参数指定以像素为单位的半径，最后一个参数同样是`Paint`实例。与`Canvas.drawRectangle()`方法一样，`Paint`的颜色和样式将用于绘制圆形。\n\
  \n最后一件重要的事是，所有这些绘图方法都会执行 Alpha 混合。只需将颜色的 alpha 值设置为除 255（0xff）以外的值，您的像素、直线、矩形和圆形就会变成半透明的。\n\
  \n\n\n##### 综合实践\n\n让我们编写一个快速测试活动，展示前面介绍的方法。这次，我们希望你先分析代码清单 4-13 中的代码，弄清楚在竖屏模式下，不同形状会绘制在一块\
  \ 480×800 屏幕的什么位置。进行图形编程时，最至关重要的一点是想象你发出的绘制命令将如何执行。这需要一些练习，但确实会带来丰厚回报。\n\n**代码清单\
  \ 4-13.** *ShapeTest.java；疯狂绘制形状*\n\n```\npackage com.badlogic.androidgames;\n\n\
  import android.app.Activity;\nimport android.content.Context;\nimport android.graphics.Canvas;\n\
  import android.graphics.Color;\nimport android.graphics.Paint;\nimport android.graphics.Paint.Style;\n\
  import android.os.Bundle;\nimport android.view.View;\nimport android.view.Window;\n\
  import android.view.WindowManager;\n\npublic class ShapeTest extends Activity {\n\
  \    class RenderView extends View {\n        Paint paint;\n\n        public RenderView(Context\
  \ context) {\n            super(context);\n            paint = new Paint();\n  \
  \      }\n\n        protected void onDraw(Canvas canvas) {\n            canvas.drawRGB(255,\
  \ 255, 255);\n            paint.setColor(Color.RED);\n            canvas.drawLine(0,\
  \ 0, canvas.getWidth()-1, canvas.getHeight()-1, paint);\n\n            paint.setStyle(Style.STROKE);\n\
  \            paint.setColor(0xff00ff00);\n            canvas.drawCircle(canvas.getWidth()\
  \ / 2, canvas.getHeight() / 2, 40, paint);\n\n            paint.setStyle(Style.FILL);\n\
  \            paint.setColor(0x770000ff);\n            canvas.drawRect(100, 100,\
  \ 200, 200, paint);\n            invalidate();\n        }\n    }\n\n    @Override\n\
  \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        requestWindowFeature(Window.FEATURE_NO_TITLE);\n        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n\
  \                             WindowManager.LayoutParams.FLAG_FULLSCREEN);\n   \
  \     setContentView(new RenderView(this));\n    }\n}\n```\n\n你脑海中是否已经形成画面了？那我们来快速分析一下`RenderView.onDraw()`方法。其余部分和上一个例子相同。\n\
  \n我们首先用白色填充屏幕。接下来，从原点绘制一条线到屏幕右下角的像素点。我们使用了一个颜色设置为红色的画笔，所以这条线会是红色。\n\n接着，我们稍微修改画笔，将其样式设置为`Style.STROKE`，颜色设为绿色，alpha\
  \ 值设为 255。随后，使用刚修改的`Paint`在屏幕中心绘制一个半径为 40 像素的圆。由于`Paint`的样式设置，只会绘制圆的轮廓。\n\n最后，我们再次修改`Paint`。将样式设置为`Style.FILL`，颜色设为纯蓝色。请注意，这次我们将\
  \ alpha 值设为了`0x77`，换算成十进制是 119。这意味着我们下一次调用绘制的图形将会有大约 50%的透明度。\n\n图 4-13 展示了该测试活动在竖屏模式下，于\
  \ 480×800 和 320×480 两种屏幕上的输出结果。\n\n![images](img/0413.jpg)\n\n**图 4-13.** *ShapeTest\
  \ 在 480×800 屏幕（左）和 320×480 屏幕（右）上的输出（后续添加了黑色边框）*\n\n哦，天哪，这是怎么回事？这就是在不同屏幕分辨率下使用绝对坐标和尺寸进行渲染所得到的结果。两张图片中唯一不变的是那条红线，它只是从左上角画到右下角。这是以与屏幕分辨率无关的方式完成的。\n\
  \n矩形的位置在（100,100）。根据屏幕分辨率不同，它到屏幕中心的距离也会不同。矩形的尺寸是 100×100 像素。在大屏幕上的相对空间占比要比在小屏幕上小得多。\n\
  \n圆的位置同样是屏幕分辨率无关的，但其半径不是。因此，在小屏幕上它比在大屏幕上占用了更多的相对空间。\n\n我们已经看到，处理不同的屏幕分辨率可能会有点问题。如果再考虑不同的物理屏幕尺寸，情况会更糟。不过，我们将在下一章中尝试解决这个问题。请记住，屏幕分辨率和物理尺寸都很重要。\n\
  \n**注意：** `Canvas`和`Paint`类提供的功能远不止我们刚才讨论的这些。事实上，所有标准的 Android `View`都是通过这个 API\
  \ 来绘制自身的，所以你能想象到其背后还有更多内容。一如既往，请查看 Android 开发者网站以获取更多信息。\n\n#### 使用位图\n\n虽然用基本形状（如线条或圆）来制作游戏是可行的，但这并不够吸引人。我们希望有优秀的艺术家为我们创建精灵、背景等各种炫酷元素，然后我们从\
  \ PNG 或 JPEG 文件中加载它们。在 Android 上实现这一点非常简单。\n\n\n\n##### 加载与检查位图\n\n`Bitmap`类将成为我们的得力助手。我们通过`BitmapFactory`单例从文件加载位图。由于图片以资源形式存储，接下来看看如何从`assets/`目录加载图像：\n\
  \n```\nInputStream inputStream = assetManager.open(\"bob.png\");\nBitmap bitmap\
  \ = BitmapFactory.decodeStream(inputStream);\n```\n\n`Bitmap`类本身包含一些我们感兴趣的方法。首先，我们需要获取其像素宽高：\n\
  \n```\nint width = bitmap.getWidth();\nint height = bitmap.getHeight();\n```\n\n\
  其次可能想了解的是存储的`Bitmap`颜色格式：\n\n```\nBitmap.Config config = bitmap.getConfig();\n```\n\
  \n`Bitmap.Config`是一个枚举，包含以下值：\n\n* `Config.ALPHA_8`\n* `Config.ARGB_4444`\n* `Config.ARGB_8888`\n\
  * `Config.RGB_565`\n\n从第 3 章中，你应该了解这些值的含义。如果不清楚，我们强烈建议重新阅读第 3 章的“数字颜色编码”部分。\n\n\
  有趣的是，并没有 RGB888 颜色格式。PNG 只支持 ARGB8888、RGB888 和调色板颜色。那么加载 RGB888 PNG 时会使用哪种颜色格式？答案是`BitmapConfig.RGB_565`。对于通过`BitmapFactory`加载的任何\
  \ RGB888 PNG，系统都会自动采用这种格式。原因在于大多数 Android 设备的实际帧缓冲区都使用该颜色格式。为每个像素使用更高位深度加载图像会浪费内存，因为最终渲染时像素仍需转换为\
  \ RGB565。\n\n那么为什么还要设置`Config.ARGB_8888`配置呢？答案是在将最终图像绘制到帧缓冲区之前，可以在 CPU 上完成图像合成。对于\
  \ Alpha 分量，相比`Config.ARGB_4444`，该配置提供了更多的位深度，这在某些高质量图像处理中可能是必需的。\n\nARGB8888 PNG\
  \ 图像将被加载为`Config.ARGB_8888`配置的`Bitmap`。另外两种颜色格式很少使用。不过，我们可以告诉`BitmapFactory`尝试以特定颜色格式加载图像，即使原始格式不同。\n\
  \n```\nInputStream inputStream = assetManager.open(\"bob.png\");\nBitmapFactory.Options\
  \ options = new BitmapFactory.Options();\noptions.inPreferredConfig = Bitmap.Config.ARGB_4444;\n\
  Bitmap bitmap = BitmapFactory.decodeStream(inputStream, null, options);\n```\n\n\
  我们使用重载的`BitmapFactory.decodeStream()`方法，通过`BitmapFactory.Options`类的实例向图像解码器传递提示。如前所示，可以通过`BitmapFactory.Options.inPreferredConfig`成员指定所需的`Bitmap`颜色格式。在这个假设示例中，`bob.png`文件是\
  \ ARGB8888 PNG，我们希望`BitmapFactory`加载并将其转换为 ARGB4444 位图。不过工厂也可以忽略这个提示。\n\n这将释放该`Bitmap`实例占用的所有内存。当然，调用此方法后就不能再使用该位图进行渲染。\n\
  \n你也可以通过以下静态方法创建空`Bitmap`：\n\n```\nBitmap bitmap = Bitmap.createBitmap(int width,\
  \ int height, Bitmap.Config config);\n```\n\n如果你需要实时进行自定义图像合成，这个方法会很有用。`Canvas`类同样可以作用于位图：\n\
  \n```\nCanvas canvas = new Canvas(bitmap);\n```\n\n然后你就可以像修改`View`内容一样修改位图。\n\n\
  ##### 释放位图\n\n`BitmapFactory`可以在加载图像时帮助我们减少内存占用。如第 3 章所述，位图会占用大量内存。使用更小的颜色格式降低每像素位数有所帮助，但如果我们不断加载位图，最终仍会耗尽内存。因此，应始终通过以下方法释放不再需要的任何`Bitmap`实例：\n\
  \n```\nBitmap.recycle();\n```\n\n##### 绘制位图\n\n加载位图后，我们可以通过`Canvas`绘制它们。最简单的方法如下所示：\n\
  \n```\nCanvas.drawBitmap(Bitmap bitmap, float topLeftX, float topLeftY, Paint paint);\n\
  ```\n\n第一个参数不言自明。`topLeftX`和`topLeftY`参数指定位图左上角在屏幕上的坐标。最后一个参数可以为`null`。虽然可以通过`Paint`指定一些高级绘制参数，但我们实际上并不需要。\n\
  \n还有另一个同样有用的方法：\n\n```\nCanvas.drawBitmap(Bitmap bitmap, Rect src, Rect dst, Paint\
  \ paint);\n```\n\n这个方法非常出色。它允许我们通过第二个参数指定要绘制的`Bitmap`区域。`Rect`类保存矩形的左上角和右下角坐标。通过`src`指定`Bitmap`区域时，使用`Bitmap`自身的坐标系。如果指定为`null`，则使用完整的`Bitmap`。\n\
  \n第三个参数同样以`Rect`实例的形式定义要绘制的`Bitmap`区域位置。不过这次角点坐标是在`Canvas`目标（`View`或另一个`Bitmap`）的坐标系中给出的。最大的惊喜在于两个矩形不必大小相同。如果目标矩形的尺寸小于源矩形，`Canvas`会自动进行缩放；如果目标矩形更大，同样也会缩放。我们通常会将最后一个参数设为`null`。但请注意，这种缩放操作非常消耗性能，仅在必要时才应使用。\n\
  \n所以你可能会想：如果存在不同颜色格式的`Bitmap`实例，在通过`Canvas`绘制前是否需要转换为某种标准格式？答案是否定的。`Canvas`会自动处理转换。当然，如果使用与原生帧缓冲区相同的颜色格式，处理速度会稍快一些。通常我们直接忽略这个问题。\n\
  \n混合功能默认也是启用的，因此如果图像包含每像素的 Alpha 分量，它会被实际解析。\n\n\n### 整合所有内容\n\n有了这些信息，我们终于可以加载并渲染一些鲍勃图像了。清单\
  \ 4-14 展示了我们为演示目的编写的`BitmapTest`活动的源代码。\n\n**清单 4-14.** *BitmapTest 活动*\n\n```\n\
  package com.badlogic.androidgames;\n\nimport java.io.IOException;\nimport java.io.InputStream;\n\
  \nimport android.app.Activity;\nimport android.content.Context;\nimport android.content.res.AssetManager;\n\
  import android.graphics.Bitmap;\nimport android.graphics.BitmapFactory;\nimport\
  \ android.graphics.Canvas;\nimport android.graphics.Rect;\nimport android.os.Bundle;\n\
  import android.util.Log;\nimport android.view.View;\nimport android.view.Window;\n\
  import android.view.WindowManager;\n\npublic class BitmapTest extends Activity {\n\
  \    class RenderView extends View {\n        Bitmap bob565;\n        Bitmap bob4444;\n\
  \        Rect dst = new Rect();\n\n        public RenderView(Context context) {\n\
  \            super(context);\n\n            try {\n                AssetManager\
  \ assetManager = context.getAssets();\n                InputStream inputStream =\
  \ assetManager.open(\"bobrgb888.png\");\n                bob565 = BitmapFactory.decodeStream(inputStream);\n\
  \                inputStream.close();\n                Log.d(\"BitmapText\",\n \
  \                       \"bobrgb888.png format: \" + bob565.getConfig());\n\n  \
  \              inputStream = assetManager.open(\"bobargb8888.png\");\n         \
  \       BitmapFactory.Options options = new BitmapFactory.Options();\n         \
  \       options.inPreferredConfig = Bitmap.Config.ARGB_4444;\n                bob4444\
  \ = BitmapFactory\n                        .decodeStream(inputStream, null, options);\n\
  \                inputStream.close();\n                Log.d(\"BitmapText\",\n \
  \                       \"bobargb8888.png format: \" + bob4444.getConfig());\n\n\
  \            } catch (IOException e) {\n                // silently ignored, bad\
  \ coder monkey, baaad!\n            } finally {\n                // we should really\
  \ close our input streams here.\n            }\n        }\n\n        protected void\
  \ onDraw(Canvas canvas) {\n            dst.set(50, 50, 350, 350);\n            canvas.drawBitmap(bob565,\
  \ null, dst, null);\n            canvas.drawBitmap(bob4444, 100, 100, null);\n \
  \           invalidate();\n        }\n    }\n\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \            WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        setContentView(new\
  \ RenderView(this));\n    }\n}\n```\n\n活动的`onCreate()`方法已是老生常谈，我们直接跳到自定义的`View`。\n\
  \n它有两个`Bitmap`成员，一个以 RGB565 格式存储鲍勃图像（第 3 章中介绍过），另一个以 ARGB4444 格式存储鲍勃图像。我们还有一个`Rect`成员，用于存储渲染的目标矩形。\n\
  \n在`RenderView`类的构造函数中，首先将鲍勃图像加载到`View`的`bob565`成员中。请注意，该图像是从 RGB888 PNG 文件加载的，`BitmapFactory`会自动将其转换为\
  \ RGB565 图像。为了验证这一点，我们还将该`Bitmap`的`Bitmap.Config`输出到 LogCat。RGB888 版本的鲍勃图像背景为不透明白色，因此无需进行混合处理。\n\
  \n接下来，我们从`assets/`目录中的 ARGB8888 PNG 文件加载鲍勃图像。为了节省内存，我们指示`BitmapFactory`将该图像转换为 ARGB4444\
  \ 位图。工厂可能不会遵从这一请求（原因不明）。为了确认它是否满足了我们的要求，我们也将此`Bitmap`的`Bitmap.Config`输出到 LogCat。\n\
  \n`onDraw()`方法非常简单。我们只做了两件事：将`bob565`缩放至 250×250 像素（原始尺寸为 160×183 像素）进行绘制，然后在它之上绘制未缩放但已混合的`bob4444`（由`Canvas`自动完成）。图\
  \ 4-14 展示了两个鲍勃图像的非凡效果。\n\n![images](img/0414.jpg)\n\n**图 4-14.** *两个鲍勃图像重叠（分辨率为\
  \ 480×800 像素）*\n\nLogCat 报告`bob565`的颜色格式确实是`Config.RGB_565`，而`bob4444`已被转换为`Config.ARGB_4444`。`BitmapFactory`没有辜负我们的期望！\n\
  \n以下是你应该从本节中掌握的一些要点：\n\n- 尽可能使用最低的色彩格式以节省内存。但这可能会以降低视觉质量和略微减慢渲染速度为代价。\n- 除非绝对必要，否则避免绘制缩放后的位图。如果你知道缩放后的大小，请离线或在加载时预先进行缩放。\n\
  - 如果不再需要`Bitmap`，请务必调用`Bitmap.recycle()`方法。否则会导致内存泄漏或内存不足。\n\n一直使用 LogCat 进行文本输出略显繁琐。接下来我们看看如何通过`Canvas`渲染文本。\n\
  \n**注意：** 与其他类一样，`Bitmap`的内容远不止这几页所能描述。我们仅涵盖了编写 Mr. Nom 游戏所需的最基本内容。如需了解更多，请查阅 Android\
  \ 开发者网站上的文档。\n\n#### 渲染文本\n\n虽然 Mr. Nom 游戏中输出的文本将通过手绘方式实现，但了解如何通过 TrueType 字体绘制文本也不无裨益。我们先从`assets/`目录加载自定义\
  \ TrueType 字体文件开始。\n\n##### 加载字体\n\nAndroid API 为我们提供了名为`Typeface`的类，用于封装 TrueType\
  \ 字体。它提供了一个简单的静态方法，可以从`assets/`目录加载此类字体文件：\n\n```\nTypeface font = Typeface.createFromAsset(context.getAssets(),\
  \ \"font.ttf\");\n```\n\n有趣的是，如果字体文件无法加载，此方法不会抛出任何类型的`Exception`，而是抛出`RuntimeException`。为什么该方法没有显式抛出异常，这有点令人费解。\n\
  \n##### 使用字体绘制文本\n\n获取字体后，我们将其设置为`Paint`实例的`Typeface`：\n\n```\npaint.setTypeFace(font);\n\
  ```\n\n通过`Paint`实例，我们还可以指定渲染字体的大小：\n\n```\npaint.setTextSize(30);\n```\n\n此方法的文档同样略显简略。它并未说明文字大小是以点（points）还是像素（pixels）为单位。我们暂且假定是像素。\n\
  \n最后，我们可以通过以下`Canvas`方法使用该字体绘制文本：\n\n```\ncanvas.drawText(\"This is a test!\", 100,\
  \ 100, paint);\n```\n\n第一个参数是要绘制的文本。接下来的两个参数是文本应绘制到的坐标。最后一个参数我们很熟悉：它是指定要绘制文本的颜色、字体和大小的`Paint`实例。通过设置`Paint`的颜色，你也就设置了要绘制文本的颜色。\n\
  \n\n\n##### 文本对齐与边界\n\n现在，你可能想知道前面方法中的坐标与文本字符串所填充的矩形之间存在怎样的关系。这些坐标是否指定了包含文本的矩形的左上角？答案其实更复杂一些。`Paint`\
  \ 实例有一个名为*对齐设置*的属性。它可以通过 `Paint` 类的以下方法进行设置：\n\n```\nPaint.setTextAlign(Paint.Align\
  \ align);\n```\n\n`Paint.Align` 枚举包含三个值：`Paint.Align.LEFT`、`Paint.Align.CENTER`\
  \ 和 `Paint.Align.RIGHT`。根据所设置的对齐方式，传递给 `Canvas.drawText()` 方法的坐标会被解释为矩形的左上角、矩形的顶部中心点或矩形的右上角。默认对齐方式是\
  \ `Paint.Align.LEFT`。\n\n有时，了解特定字符串的像素边界也很有用。为此，`Paint` 类提供了以下方法：\n\n```\nPaint.getTextBounds(String\
  \ text, int start, int end, Rect bounds);\n```\n\n第一个参数是我们希望获取边界的字符串。第二和第三个参数指定了字符串中需要测量的起始字符和结束字符。结束参数是不包含在内的。最后一个参数\
  \ `bounds` 是我们自己分配并传入方法的一个 `Rect` 实例。该方法会将边界矩形的宽度和高度写入 `Rect.right` 和 `Rect.bottom`\
  \ 字段。为方便起见，我们可以调用 `Rect.width()` 和 `Rect.height()` 来获取相同的值。\n\n请注意，所有这些方法仅适用于单行文本。如果要渲染多行文本，我们需要自行处理布局。\n\
  \n##### 整合应用\n\n理论说得够多了：让我们来编写一些代码。清单 4–15 展示了文本渲染的实际应用。\n\n**清单 4–15.** *FontTest\
  \ 活动*\n\n```java\npackage com.badlogic.androidgames;\n\nimport android.app.Activity;\n\
  import android.content.Context;\nimport android.graphics.Canvas;\nimport android.graphics.Color;\n\
  import android.graphics.Paint;\nimport android.graphics.Rect;\nimport android.graphics.Typeface;\n\
  import android.os.Bundle;\nimport android.view.View;\nimport android.view.Window;\n\
  import android.view.WindowManager;\n\npublic class FontTest extends Activity {\n\
  \    class RenderView extends View {\n        Paint paint;\n        Typeface font;\n\
  \        Rect bounds = new Rect();\n\n        public RenderView(Context context)\
  \ {\n            super(context);\n            paint = new Paint();\n           \
  \ font = Typeface.createFromAsset(context.getAssets(), \"font.ttf\");\n        }\n\
  \n        protected void onDraw(Canvas canvas) {\n            paint.setColor(Color.YELLOW);\n\
  \            paint.setTypeface(font);\n            paint.setTextSize(28);\n    \
  \        paint.setTextAlign(Paint.Align.CENTER);\n            canvas.drawText(\"\
  This is a test!\", canvas.getWidth() / 2, 100,\n                    paint);\n\n\
  \            String text = \"This is another test o_O\";\n            paint.setColor(Color.WHITE);\n\
  \            paint.setTextSize(18);\n            paint.setTextAlign(Paint.Align.LEFT);\n\
  \            paint.getTextBounds(text, 0, text.length(), bounds);\n            canvas.drawText(text,\
  \ canvas.getWidth() - bounds.width(), 140,\n                    paint);\n      \
  \      invalidate();\n        }\n    }\n\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \            WindowManager.LayoutParams.FLAG_FULLSCREEN);\n        setContentView(new\
  \ RenderView(this));\n    }\n}\n```\n\n我们不再讨论活动的 `onCreate()` 方法，因为之前已经介绍过了。\n\n\
  我们的 `RenderView` 实现包含三个成员：一个 `Paint`、一个 `Typeface` 和一个 `Rect`，稍后将在其中存储文本字符串的边界。\n\
  \n在构造函数中，我们创建了一个新的 `Paint` 实例，并从 `assets/` 目录下的 `font.ttf` 文件中加载字体。\n\n在 `onDraw()`\
  \ 方法中，我们将 `Paint` 设置为黄色，设置字体及其大小，并指定在调用 `Canvas.drawText()` 时用于解释坐标的文本对齐方式。实际的绘制调用渲染了字符串\
  \ `This is a test!`，在 y 轴坐标 100 处水平居中。\n\n对于第二次文本渲染调用，我们做了不同的事情：我们希望文本与屏幕右边缘对齐。我们可以通过使用\
  \ `Paint.Align.RIGHT` 和 x 坐标为 `Canvas.getWidth() – 1` 来实现。相反，我们采用了一种更复杂的方法，通过使用字符串的边界来稍微练习一下基本的文本布局。我们还更改了渲染时字体的颜色和大小。图\
  \ 4–15 展示了该活动的输出。\n\n![images](img/0415.jpg)\n\n**图 4–15.** *文本乐趣（480×800 像素分辨率）*\n\
  \n`Typeface` 类的另一个神秘之处在于，它并没有明确允许我们释放其所有资源。我们必须依赖垃圾回收器来完成这项清理工作。\n\n**注意：** 这里我们只是浅尝辄止地介绍了文本渲染。如果你想了解更多……那么，现在你应该知道该去哪里寻找答案了。\n\
  \n#### 使用 SurfaceView 进行持续渲染\n\n在这一节中，我们将成长为真正的开发者。这涉及到线程以及与之相关的所有麻烦。我们会安然度过这一关。我保证！\n\
  \n##### 动机\n\n当我们第一次尝试进行持续渲染时，采用了错误的方式。占用 UI 线程是不可接受的；我们需要一个在独立线程中完成所有繁重工作的解决方案。于是，`SurfaceView`\
  \ 应运而生。\n\n顾名思义，`SurfaceView` 类是一个处理 `Surface` 的 `View`，而 `Surface` 是 Android API\
  \ 中的另一个类。什么是 `Surface`？它是屏幕合成器用于渲染特定 `View` 的原始缓冲区的抽象。屏幕合成器是 Android 上所有渲染的幕后主导，最终负责将所有像素推送到\
  \ GPU。在某些情况下，`Surface` 可以实现硬件加速。不过我们对此并不太在意。我们只需要知道，这是一种将内容渲染到屏幕上的更直接方式。\n\n我们的目标是在独立线程中执行渲染，这样就不会占用忙于其他事务的\
  \ UI 线程。`SurfaceView` 类为我们提供了一种从 UI 线程以外的线程向其渲染的方法。\n\n##### SurfaceHolder 与锁定\n\
  \n为了从不同于 UI 线程的线程向 `SurfaceView` 渲染，我们需要获取 `SurfaceHolder` 类的一个实例，如下所示：\n\n```\n\
  SurfaceHolder holder = surfaceView.getHolder();\n```\n\n`SurfaceHolder` 是 `Surface`\
  \ 的封装器，并为我们完成一些记账工作。它提供了两个方法：\n\n```\nCanvas SurfaceHolder.lockCanvas();\nSurfaceHolder.unlockAndPost(Canvas\
  \ canvas);\n```\n\n第一个方法锁定 `Surface` 以进行渲染，并返回一个我们可以使用的 `Canvas` 实例。第二个方法再次解锁 `Surface`，并确保我们通过\
  \ `Canvas` 绘制的内容显示在屏幕上。我们将在渲染线程中使用这两个方法来获取 `Canvas`，进行渲染，最后将刚渲染的图像显示在屏幕上。我们传递给 `SurfaceHolder.unlockAndPost()`\
  \ 方法的 `Canvas` 必须是从 `SurfaceHolder.lockCanvas()` 方法接收到的那个。\n\n当 `SurfaceView` 被实例化时，`Surface`\
  \ 并不会立即创建。相反，它是异步创建的。每次活动暂停时，surface 都会被销毁，并在活动恢复时重新创建。\n\n\n\n##### 表面创建与有效性\n\n\
  只要 `Surface` 尚未有效，我们就无法从 `SurfaceHolder` 获取 `Canvas`。不过，我们可以通过以下语句检查 `Surface` 是否已创建：\n\
  \n`boolean isCreated = surfaceHolder.getSurface().isValid();`\n\n如果此方法返回 `true`，我们就可以安全地锁定表面，并通过获取的\
  \ `Canvas` 进行绘制。我们必须确保在调用 `SurfaceHolder.lockCanvas()` 后再次解锁 `Surface`，否则我们的 Activity\
  \ 可能会导致手机死锁！\n\n##### 整合所有部分\n\n那么，我们如何将这一切与独立的渲染线程以及 Activity 生命周期整合在一起呢？弄清楚这个问题的最佳方法是查看一些实际代码。代码清单\
  \ 4–16 展示了一个完整的示例，它在 `SurfaceView` 的独立线程中执行渲染。\n\n**代码清单 4–16.** *SurfaceViewTest\
  \ Activity*\n\n```\npackage com.badlogic.androidgames;\n\nimport android.app.Activity;\n\
  import android.content.Context;\nimport android.graphics.Canvas;\nimport android.os.Bundle;\n\
  import android.view.SurfaceHolder;\nimport android.view.SurfaceView;\nimport android.view.Window;\n\
  import android.view.WindowManager;\n\npublic class SurfaceViewTest extends Activity\
  \ {\n    FastRenderView renderView;\n\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \                         WindowManager.LayoutParams.FLAG_FULLSCREEN);\n       \
  \ renderView = new FastRenderView(this);\n        setContentView(renderView);\n\
  \    }\n\n    protected void onResume() {\n        super.onResume();\n        renderView.resume();\n\
  \    }\n\n    protected void onPause() {\n        super.onPause();\n        renderView.pause();\n\
  \    }\n\n    class FastRenderView extends SurfaceView implements Runnable {\n \
  \       Thread renderThread = null;\n        SurfaceHolder holder;\n        volatile\
  \ boolean running = false;\n\n        public FastRenderView(Context context) {\n\
  \            super(context);\n            holder = getHolder();\n        }\n\n \
  \       public void resume() {\n            running = true;\n            renderThread\
  \ = new Thread(this);\n            renderThread.start();\n        }\n\n        public\
  \ void run() {\n            while (running) {\n                if (!holder.getSurface().isValid())\n\
  \                    continue;\n\n                Canvas canvas = holder.lockCanvas();\n\
  \                canvas.drawRGB(255, 0, 0);\n                holder.unlockCanvasAndPost(canvas);\n\
  \            }\n        }\n\n        public void pause() {\n            running\
  \ = false;\n            while (true) {\n                try {\n                \
  \    renderThread.join();\n                } catch (InterruptedException e) {\n\
  \                    // 重试\n                }\n            }\n        }\n    }\n\
  }\n```\n\n这看起来并不那么吓人，对吧？我们的 Activity 持有一个 `FastRenderView` 实例作为成员变量。这是一个自定义的 `SurfaceView`\
  \ 子类，它将为我们处理所有线程事务和表面锁定。对于 Activity 来说，它就像一个普通的 `View`。\n\n在 `onCreate()` 方法中，我们启用全屏模式，创建\
  \ `FastRenderView` 实例，并将其设置为 Activity 的内容视图。\n\n这次我们还重写了 `onResume()` 方法。在这个方法中，我们将通过调用\
  \ `FastRenderView.resume()` 方法来间接启动渲染线程，该方法内部完成了所有魔法操作。这意味着线程将在 Activity 初始创建时启动（因为\
  \ `onCreate()` 之后总是跟着调用 `onResume()`）。当 Activity 从暂停状态恢复时，线程也会重新启动。\n\n当然，这暗示着我们必须在某处停止线程；否则，每次调用\
  \ `onResume()` 时我们都会创建一个新线程。这就是 `onPause()` 的作用所在。它调用 `FastRenderView.pause()` 方法，该方法将完全停止线程。在线程完全停止之前，该方法不会返回。\n\
  \n那么，让我们看看这个示例的核心类：`FastRenderView`。它与我们在前面几个示例中实现的 `RenderView` 类类似，都派生自另一个 `View`\
  \ 类。在这个例子中，我们直接派生自 `SurfaceView` 类。它还实现了 `Runnable` 接口，以便我们可以将其传递给渲染线程，使其执行渲染线程逻辑。\n\
  \n`FastRenderView` 类有三个成员变量。`renderThread` 成员变量只是对将负责执行我们渲染线程逻辑的 `Thread` 实例的引用。`holder`\
  \ 成员变量是对我们从所派生自的 `SurfaceView` 超类获得的 `SurfaceHolder` 实例的引用。最后，`running` 成员变量是一个简单的布尔标志，我们将用它来通知渲染线程停止执行。`volatile`\
  \ 修饰符有一个特殊的含义，我们稍后会讨论。\n\n在构造函数中，我们只做了三件事：调用超类构造函数，并将对 `SurfaceHolder` 的引用存储在 `holder`\
  \ 成员变量中。\n\n接下来是 `FastRenderView.resume()` 方法。它负责启动渲染线程。请注意，每次调用此方法时，我们都会创建一个新的\
  \ `Thread`。这与我们讨论 Activity 的 `onResume()` 和 `onPause()` 方法时讨论的内容一致。我们还将 `running`\
  \ 标志设置为 `true`。你很快就会看到它如何在渲染线程中使用。最后一点要记住的是，我们将 `FastRenderView` 实例本身设置为线程的 `Runnable`。这将在新线程中执行\
  \ `FastRenderView` 的下一个方法。\n\n`FastRenderView.run()` 方法是我们自定义 `View` 类的主力。其主体在渲染线程中执行。如你所见，它仅仅由一个循环组成，一旦\
  \ `running` 标志被设置为 `false`，该循环就会停止执行。当这种情况发生时，线程也将停止并消亡。在 `while` 循环内部，我们首先检查以确保\
  \ `Surface` 有效，如果有效，我们就锁定它，进行渲染，然后再次解锁，正如之前讨论的那样。在这个例子中，我们只是用红色填充 `Surface`。\n\n\
  `FastRenderView.pause()` 方法看起来有点奇怪。首先我们将 `running` 标志设置为 `false`。如果你向上看一点，会看到 `FastRenderView.run()`\
  \ 方法中的 `while` 循环最终会因此终止，从而停止渲染线程。在接下来的几行代码中，我们通过调用 `Thread.join()` 简单地等待线程完全终止。这个方法会等待线程终止，但在线程实际终止之前可能会抛出\
  \ `InterruptedException`。由于我们必须确保线程在从该方法返回之前已经死亡，因此我们在一个无限循环中执行 join，直到成功为止。\n\n\
  让我们回到 `running` 标志的 `volatile` 修饰符。为什么我们需要它？原因很微妙：如果编译器发现该方法中第一行与 `while` 块之间没有依赖关系，它可能会决定重新排序\
  \ `FastRenderView.pause()` 方法中的语句。如果编译器认为这会使代码执行得更快，它允许这样做。然而，我们依赖于在该方法中指定的执行顺序。想象一下，如果\
  \ `running` 标志在我们尝试 join 线程之后才被设置。我们将进入无限循环，因为线程永远不会终止。\n\n`volatile` 修饰符阻止了这种情况的发生。任何引用此成员的语句都将按顺序执行。这使我们避免了一个讨厌的海森堡\
  \ bug——一个时而出现时而消失、无法被稳定复现的 bug。\n\n\n\n### 排版后内容\n\n还有一件事可能会让你觉得这段代码会崩掉：如果在调用 `SurfaceHolder.getSurface().isValid()`\
  \ 和 `SurfaceHolder.lock()` 之间，Surface 被销毁了会怎样？嗯，我们很幸运——这种情况永远不会发生。要理解原因，我们需要退一步，看看\
  \ `Surface` 的生命周期是如何工作的。\n\n我们知道 `Surface` 是异步创建的。很有可能我们的渲染线程会在 `Surface` 有效之前执行。我们通过不锁定\
  \ `Surface`（除非它有效）来防止这种情况。这涵盖了 Surface 创建的情况。\n\n渲染线程代码不会因为 `Surface` 在有效性检查和锁定之间被销毁而崩溃，这与\
  \ `Surface` 被销毁的时间点有关。`Surface` 总是在我们返回 Activity 的 `onPause()` 方法之后才被销毁。由于我们在该方法中通过调用\
  \ `FastRenderView.pause()` 等待线程结束，因此当 `Surface` 实际被销毁时，渲染线程将不再存活。很酷，不是吗？但这也让人困惑。\n\
  \n现在，我们以正确的方式执行连续渲染。我们不再占用 UI 线程，而是使用一个单独的渲染线程。我们也让它遵循 Activity 的生命周期，这样它就不会在 Activity\
  \ 暂停时在后台运行、消耗电池。世界再次变得和谐。当然，我们还需要将 UI 线程中输入事件的处理与渲染线程同步。但这会变得非常简单，当你阅读下一章时就会明白，届时我们将基于你在本章中吸收的所有信息来实现游戏框架。\n\
  \n#### 使用 Canvas 的硬件加速渲染\n\nAndroid 3.0 Honeycomb 增加了一个显著的功能，即能够为标准 2D Canvas 绘图调用启用\
  \ GPU 硬件加速。此功能的价值因应用和设备而异，因为有些设备实际上在 CPU 上执行 2D 绘图性能更好，而另一些则会从 GPU 中受益。硬件加速在底层所做的是分析绘图调用并将其转换为\
  \ OpenGL。例如，如果我们指定从 (0,0) 到 (100,100) 绘制一条线，那么硬件加速将使用 OpenGL 组合成一个特殊的画线调用，并将其绘制到一个硬件缓冲区中，该缓冲区随后会被合成到屏幕上。\n\
  \n启用此硬件加速很简单，只需将以下内容添加到你的 `AndroidManifest.xml` 中的 `<application />` 标签下：\n\n```\n\
  android:hardwareAccelerated=\"true\"\n```\n\n请务必在多种设备上分别开启和关闭硬件加速来测试你的游戏，以确定它是否适合你。未来，一直开启它可能没问题，但和其他事情一样，我们建议你自行测试和判断。当然，还有更多配置选项可以让你为特定的\
  \ Application、Activity、Window 或 View 设置硬件加速，但由于我们做的是游戏，通常每种只有一个，因此通过 Application\
  \ 全局设置是最合理的。\n\nAndroid 此功能的开发者 Romain Guy 有一篇非常详细的博客文章，介绍了硬件加速的注意事项以及使用它来获得不错性能的一些通用指南。该博客文章的\
  \ URL 是：[`android-developers.blogspot.com/2011/03/android-30-hardware-acceleration.html`](http://android-developers.blogspot.com/2011/03/android-30-hardware-acceleration.html)\n\
  \n### 最佳实践\n\nAndroid（或者更准确地说，Dalvik）有时会有一些奇怪的性能特性。为了结束本章，我们将向你介绍一些最重要的最佳实践，遵循这些实践能让你的游戏运行如丝般顺滑。\n\
  \n-   垃圾收集器是你最大的敌人。一旦它获得 CPU 时间来执行其脏活，它会让世界停止最多 600 毫秒。这是半秒钟，你的游戏将无法更新或渲染。用户会抱怨的。尽可能避免创建对象，尤其是在你的内层循环中。\n\
  -   对象可能会在一些不那么明显的地方被创建，你需要避免这些情况。不要使用迭代器，因为它们会创建新对象。不要使用任何标准的 `Set` 或 `Map` 集合类，因为它们每次插入时都会创建新对象；相反，请使用\
  \ Android API 提供的 `SparseArray` 类。使用 `StringBuffer` 而不是用 `+` 运算符连接字符串，因为后者每次都会创建一个新的\
  \ `StringBuffer`。看在老天爷的份上，千万别用装箱的原生类型！\n-   在 Dalvik 中，方法调用的相关开销比其他虚拟机更大。如果可以，请使用静态方法，因为它们的性能最好。静态方法通常被认为是有害的，就像静态变量一样，因为它们会促进糟糕的设计，所以尽量保持你的设计尽可能清晰。也许你也应该避免使用\
  \ getter 和 setter。在没有 JIT 的情况下，直接字段访问比方法调用快大约三倍，有 JIT 时则快大约七倍。尽管如此，在删除所有 getter\
  \ 和 setter 之前，请先考虑你的设计。\n-   在较旧的设备和没有 JIT 的 Dalvik 版本（Android 2.2 之前的任何版本）上，浮点运算是在软件中实现的。老派的游戏开发者会立即退回到定点数学运算。但也不要这样做，因为整数除法也很慢。大多数情况下，你可以使用浮点数，而较新的设备配备浮点运算单元（FPU），一旦\
  \ JIT 启动，这能大大加快速度。\n-   尝试将频繁访问的值塞入方法的局部变量中。访问局部变量比访问成员或调用 getter 更快。\n\n当然，你还需要注意许多其他事情。在本书的其余部分，当上下文允许时，我们会穿插一些性能提示。如果你遵循前面的建议，应该是安全的。只要别让垃圾收集器得逞就行！\n\
  \n### 总结\n\n本章涵盖了为 Android 编写一个像样的小型 2D 游戏所需了解的一切。我们看到了使用一些默认设置建立一个新游戏项目是多么容易。我们讨论了神秘的\
  \ Activity 生命周期以及如何与之共存。我们与触摸（更重要的是，多点触摸）事件作了斗争，处理了按键事件，并通过加速度计检查了设备的方向。我们探索了如何读写文件。在\
  \ Android 上输出音频原来是小儿科，而且除了 `SurfaceView` 的线程问题之外，在屏幕上绘制东西也不是那么难。Mr. Nom 现在可以成为现实——一个可怕的、饥饿的现实！\n\
  \n## 第 5 章\n\n## 一个 Android 游戏开发框架\n\n你可能已经注意到，我们已经通过了四章，却没有写一行游戏代码。我们让你经历所有这些枯燥的理论并要求你实现测试程序的原因很简单：如果你想编写游戏，你必须确切知道发生了什么。你不能只是从网络上各处复制粘贴代码，然后指望它们拼凑出下一个第一人称射击大作。到现在为止，你应该已经牢牢掌握了如何从头开始设计一个简单的游戏，如何为\
  \ 2D 游戏开发构建一个漂亮的 API，以及哪些 Android API 能提供实现你想法所需的功能。\n\n为了让 Mr. Nom 成为现实，我们必须做两件事：实现我们在第\
  \ 3 章设计的游戏框架接口和类，并在此基础上编写 Mr. Nom 的游戏逻辑。让我们从游戏框架开始，将我们在第 3 章设计的内容与我们在第 4 章讨论的内容合并起来。90%\
  \ 的代码你应该已经熟悉了，因为我们在前一章的测试程序中已经涵盖了大部分内容。\n\n\n\n### 行动计划\n\n在第 3 章中，我们规划了一个游戏框架的最小化设计，它抽象掉了所有平台细节，以便我们能专注于此行的目的：游戏开发。现在，我们将以自底向上的方式，从最简单到最困难，逐一实现所有这些接口和抽象类。第\
  \ 3 章中的接口位于包`com.badlogic.androidgames.framework`中。我们将本章的实现代码放在包`com.badlogic.androidgames.framework.impl`里，以此表明它包含了框架在\
  \ Android 平台上的实际实现。我们将在所有接口实现前加上`Android`前缀，以便与接口本身区分开来。让我们从最简单的部分开始：文件 I/O。\n\n\
  本章及下一章的代码将合并到同一个 Eclipse 项目中。现在，你可以按照上一章的步骤在 Eclipse 中新建一个 Android 项目。此时，默认 Activity\
  \ 的名称无关紧要。\n\n### AndroidFileIO 类\n\n原始的`FileIO`接口简洁而高效。它包含四个方法：一个用于获取资源文件的`InputStream`，一个用于获取外部存储中文件的`InputStream`，一个用于返回外部存储设备上文件的`OutputStream`，以及最后一个用于获取游戏`SharedPreferences`的方法。在第\
  \ 4 章中，你学会了如何使用 Android API 打开资源文件和外部存储上的文件。清单 5-1 基于第 4 章的知识，展示了`FileIO`接口的实现。\n\
  \n**清单 5-1.** *AndroidFileIO.java；实现 FileIO 接口*\n\n```java\npackage com.badlogic.androidgames.framework.impl;\n\
  \nimport java.io.File;\nimport java.io.FileInputStream;\nimport java.io.FileOutputStream;\n\
  import java.io.IOException;\nimport java.io.InputStream;\nimport java.io.OutputStream;\n\
  \nimport android.content.Context;\nimport android.content.SharedPreferences;\nimport\
  \ android.content.res.AssetManager;\nimport android.os.Environment;\nimport android.preference.PreferenceManager;\n\
  \nimport com.badlogic.androidgames.framework.FileIO;\n\npublic class AndroidFileIO\
  \ implements FileIO {\n    Context context;\n    AssetManager assets;\n    String\
  \ externalStoragePath;\n\n    public AndroidFileIO(Context context) {\n        this.context\
  \ = context;\n        this.assets = context.getAssets();\n        this.externalStoragePath\
  \ = Environment.getExternalStorageDirectory()\n                .getAbsolutePath()\
  \ + File.separator;\n    }\n    @Override\n    public InputStream readAsset(String\
  \ fileName) throws IOException {\n        return assets.open(fileName);\n    }\n\
  \n    @Override\n    public InputStream readFile(String fileName) throws IOException\
  \ {\n        return new FileInputStream(externalStoragePath + fileName);\n    }\n\
  \n    @Override\n    public OutputStream writeFile(String fileName) throws IOException\
  \ {\n        return new FileOutputStream(externalStoragePath + fileName);\n    }\n\
  \n    public SharedPreferences getPreferences() {\n        return PreferenceManager.getDefaultSharedPreferences(context);\n\
  \    }\n}\n```\n\n一切都简单明了。我们实现了`FileIO`接口，存储了`Context`（它是访问 Android 几乎所有功能的入口），存储了从`Context`获取的`AssetManager`，存储了外部存储的路径，并基于此路径实现了四个方法。最后，我们传递所有抛出的`IOException`，以便在调用方知晓任何异常情况。\n\
  \n我们的`Game`接口实现将持有此类的一个实例，并通过`Game.getFileIO()`返回它。这也意味着，为了让`AndroidFileIO`实例正常工作，我们的`Game`实现需要传递`Context`。\n\
  \n请注意，我们并未检查外部存储是否可用。如果它不可用，或者我们忘记在清单文件中添加相应的权限，程序将抛出异常，因此错误检查是隐式的。现在，我们可以继续框架的下一个部分：音频。\n\
  \n\n\n### AndroidAudio、AndroidSound 与 AndroidMusic：碰撞、轰鸣、巨响！\n\n在第三章中，我们设计了三个接口来满足所有音频需求：`Audio`、`Sound`\
  \ 和 `Music`。`Audio` 负责从资源文件中创建 `Sound` 和 `Music` 实例。`Sound` 让我们能够播放存储在 RAM 中的音效，而\
  \ `Music` 则将较大的音乐文件从磁盘流式传输到声卡。在第四章中，你学习了实现这一点所需的 Android API。我们将从 `AndroidAudio`\
  \ 的实现开始，如代码清单 5-2 所示。\n\n**代码清单 5-2.** `AndroidAudio.java`；实现 `Audio` 接口\n\n```java\n\
  package com.badlogic.androidgames.framework.impl;\n\nimport java.io.IOException;\n\
  \nimport android.app.Activity;\nimport android.content.res.AssetFileDescriptor;\n\
  import android.content.res.AssetManager;\nimport android.media.AudioManager;\nimport\
  \ android.media.SoundPool;\n\nimport com.badlogic.androidgames.framework.Audio;\n\
  import com.badlogic.androidgames.framework.Music;\nimport com.badlogic.androidgames.framework.Sound;\n\
  \npublic class AndroidAudio implements Audio {\n    AssetManager assets;\n    SoundPool\
  \ soundPool;\n```\n\n`AndroidAudio` 实现包含一个 `AssetManager` 和一个 `SoundPool` 实例。`AssetManager`\
  \ 用于在调用 `AndroidAudio.newSound()` 时，将音效从资源文件加载到 `SoundPool` 中。`AndroidAudio` 实例还负责管理\
  \ `SoundPool`。\n\n```java\n    public AndroidAudio(Activity activity) {\n      \
  \  activity.setVolumeControlStream(AudioManager.STREAM_MUSIC);\n        this.assets\
  \ = activity.getAssets();\n        this.soundPool = new SoundPool(20, AudioManager.STREAM_MUSIC,\
  \ 0);\n    }\n```\n\n我们在构造函数中传入游戏 `Activity` 有两个原因：它允许我们设置媒体流的音量控制（我们总是希望这样做），并且它为我们提供了一个\
  \ `AssetManager` 实例，我们将愉快地将其存储在相应的类成员中。`SoundPool` 配置为并行播放 20 个音效，这足以满足我们的需求。\n\n\
  ```java\n@Override\n    public Music newMusic(String filename) {\n        try {\n\
  \            AssetFileDescriptor assetDescriptor = assets.openFd(filename);\n  \
  \          return new AndroidMusic(assetDescriptor);\n        } catch (IOException\
  \ e) {\n            throw new RuntimeException(\"Couldn't load music '\" + filename\
  \ + \"'\");\n        }\n    }\n```\n\n`newMusic()` 方法创建一个新的 `AndroidMusic` 实例。该类的构造函数接收一个\
  \ `AssetFileDescriptor`，并使用它来创建一个内部的 `MediaPlayer`（稍后会详细说明）。`AssetManager.openFd()`\
  \ 方法在出现问题时抛出 `IOException`。我们捕获它，并将其重新抛出为 `RuntimeException`。为什么不将 `IOException`\
  \ 传递给调用者呢？首先，这会严重增加调用代码的混乱程度，因此我们更愿意抛出一个无需显式捕获的 `RuntimeException`。其次，我们从资源文件加载音乐。只有当我们忘记将音乐文件添加到\
  \ `assets/` 目录，或者音乐文件包含错误字节时，它才会失败。错误字节构成了不可恢复的错误，因为我们需要那个 `Music` 实例来确保游戏正常运行。为了避免这种情况，我们在游戏框架中的几个其他地方也抛出\
  \ `RuntimeExceptions`，而不是受检异常。\n\n```java\n    @Override\n    public Sound newSound(String\
  \ filename) {\n        try {\n            AssetFileDescriptor assetDescriptor =\
  \ assets.openFd(filename);\n            int soundId = soundPool.load(assetDescriptor,\
  \ 0);\n            return new AndroidSound(soundPool, soundId);\n        } catch\
  \ (IOException e) {\n            throw new RuntimeException(\"Couldn't load sound\
  \ '\" + filename + \"'\");\n        }\n    }\n```\n\n最后，`newSound()` 方法将音效从资源加载到\
  \ `SoundPool` 中，并返回一个 `AndroidSound` 实例。该实例的构造函数接收一个 `SoundPool` 和 `SoundPool` 分配给音效的\
  \ ID。同样，我们会捕获所有受检异常，并将其重新抛出为未检查的 `RuntimeException`。\n\n**注意：** 我们在任何方法中都不释放 `SoundPool`。原因是始终会有一个单独的\
  \ `Game` 实例持有一个单独的 `Audio` 实例，而该实例又持有一个单独的 `SoundPool` 实例。因此，只要 Activity（以及我们的游戏）处于活动状态，`SoundPool`\
  \ 实例就会一直存在。一旦 Activity 结束，它就会自动销毁。\n\n接下来，我们将讨论实现 `Sound` 接口的 `AndroidSound` 类。代码清单\
  \ 5-3 展示了其实现。\n\n**代码清单 5-3.** 使用 `AndroidSound.java` 实现 `Sound` 接口\n\n```java\n\
  package com.badlogic.androidgames.framework.impl;\n\nimport android.media.SoundPool;\n\
  \nimport com.badlogic.androidgames.framework.Sound;\n\npublic class AndroidSound\
  \ implements Sound {\n    int soundId;\n    SoundPool soundPool;\n\n    public AndroidSound(SoundPool\
  \ soundPool, int soundId) {\n        this.soundId = soundId;\n        this.soundPool\
  \ = soundPool;\n    }\n\n    @Override\n    public void play(float volume) {\n \
  \       soundPool.play(soundId, volume, volume, 0, 0, 1);\n    }\n\n    @Override\n\
  \    public void dispose() {\n        soundPool.unload(soundId);\n    }\n}\n```\n\
  \n这里没有什么意外之处。通过 `play()` 和 `dispose()` 方法，我们简单地存储了 `SoundPool` 和已加载音效的 ID，以便后续播放和释放。得益于\
  \ Android API，没有比这更简单的方法了。\n\n最后，我们必须实现由 `AndroidAudio.newMusic()` 返回的 `AndroidMusic`\
  \ 类。代码清单 5-4 显示了该类的代码，看起来比之前的要复杂一些。这是因为 `MediaPlayer` 使用了一个状态机，如果我们在某些状态下调用方法，它会持续抛出异常。\n\
  \n**代码清单 5-4.** `AndroidMusic.java`；实现 `Music` 接口\n\n```java\npackage com.badlogic.androidgames.framework.impl;\n\
  \nimport android.content.res.AssetFileDescriptor;\nimport android.media.MediaPlayer;\n\
  import android.media.MediaPlayer.OnCompletionListener;\n\nimport com.badlogic.androidgames.framework.Music;\n\
  \npublic class AndroidMusic implements Music, OnCompletionListener {\n    MediaPlayer\
  \ mediaPlayer;\n    boolean isPrepared = false;\n```\n\n`AndroidMusic` 类存储了一个 `MediaPlayer`\
  \ 实例以及一个名为 `isPrepared` 的布尔值。请记住，只有在 `MediaPlayer` 准备好时，我们才能调用 `MediaPlayer.start()`\
  \ / `stop()` / `pause()`。这个成员帮助我们跟踪 `MediaPlayer` 的状态。\n\n`AndroidMusic` 类实现了 `Music`\
  \ 接口以及 `OnCompletionListener` 接口。在第三章中，我们简要定义了这个接口，作为通知我们 `MediaPlayer` 何时停止播放音乐文件的一种方式。如果发生这种情况，在调用任何其他方法之前，`MediaPlayer`\
  \ 需要重新准备。`OnCompletionListener.onCompletion()` 方法可能在一个单独的线程中被调用，由于我们在该方法中设置了 `isPrepared`\
  \ 成员，我们必须确保它能免受并发修改的影响。\n\n\n```java\npublic AndroidMusic(AssetFileDescriptor assetDescriptor)\
  \ {\n    mediaPlayer = new MediaPlayer();\n    try {\n        mediaPlayer.setDataSource(assetDescriptor.getFileDescriptor(),\n\
  \                assetDescriptor.getStartOffset(),\n                assetDescriptor.getLength());\n\
  \        mediaPlayer.prepare();\n        isPrepared = true;\n        mediaPlayer.setOnCompletionListener(this);\n\
  \    } catch (Exception e) {\n        throw new RuntimeException(\"Couldn't load\
  \ music\");\n    }\n}\n```\n\n在构造函数中，我们通过传入的`AssetFileDescriptor`创建并准备好`MediaPlayer`，设置`isPrepared`标志，并将`AndroidMusic`实例注册为`MediaPlayer`的`OnCompletionListener`。如果出现任何问题，我们会再次抛出一个未检查的`RuntimeException`。\n\
  \n```java\n@Override\npublic void dispose() {\n    if (mediaPlayer.isPlaying())\n\
  \        mediaPlayer.stop();\n    mediaPlayer.release();\n}\n```\n\n`dispose()`方法检查`MediaPlayer`是否仍在播放，如果是则停止它。否则，调用`MediaPlayer.release()`会抛出一个运行时异常。\n\
  \n```java\n@Override\npublic boolean isLooping() {\n    return mediaPlayer.isLooping();\n\
  }\n\n@Override\npublic boolean isPlaying() {\n    return mediaPlayer.isPlaying();\n\
  }\n\n@Override\npublic boolean isStopped() {\n    return !isPrepared;\n}\n```\n\n\
  `isLooping()`、`isPlaying()`和`isStopped()`方法很直接。前两个使用了`MediaPlayer`提供的方法；最后一个使用了`isPrepared`标志，它指示`MediaPlayer`是否已停止。这是`MediaPlayer.isPlaying()`不一定能告诉我们的，因为如果`MediaPlayer`暂停但未停止，它会返回`false`。\n\
  \n```java\n@Override\npublic void pause() {\n    if (mediaPlayer.isPlaying())\n\
  \        mediaPlayer.pause();\n}\n```\n\n`pause()`方法简单地检查`MediaPlayer`实例是否正在播放，如果是则调用它的`pause()`方法。\n\
  \n```java\n@Override\npublic void play() {\n    if (mediaPlayer.isPlaying())\n \
  \       return;\n    try {\n        synchronized (this) {\n            if (!isPrepared)\n\
  \                mediaPlayer.prepare();\n            mediaPlayer.start();\n    \
  \    }\n    } catch (IllegalStateException e) {\n        e.printStackTrace();\n\
  \    } catch (IOException e) {\n        e.printStackTrace();\n    }\n}\n```\n\n\
  `play()`方法稍微复杂一些。如果已经在播放，我们直接返回。接下来有一个强大的`try…catch`块，在其中我们根据标志检查`MediaPlayer`是否已经准备好；如果需要则准备它。如果一切顺利，我们调用`MediaPlayer.start()`方法，这将开始播放。这个过程在一个`synchronized`块中进行，因为我们使用了`isPrepared`标志，由于我们实现了`OnCompletionListener`接口，该标志可能在不同的线程上设置。如果出现问题，我们会抛出一个未检查的`RuntimeException`。\n\
  \n```java\n@Override\npublic void setLooping(boolean isLooping) {\n    mediaPlayer.setLooping(isLooping);\n\
  }\n\n@Override\npublic void setVolume(float volume) {\n    mediaPlayer.setVolume(volume,\
  \ volume);\n}\n```\n\n`setLooping()`和`setVolume()`方法可以在`MediaPlayer`的任何状态下调用，并委托给相应的`MediaPlayer`方法。\n\
  \n```java\n@Override\npublic void stop() {\n    mediaPlayer.stop();\n    synchronized\
  \ (this) {\n        isPrepared = false;\n    }\n}\n```\n\n`stop()`方法停止`MediaPlayer`并在一个`synchronized`块中设置`isPrepared`标志。\n\
  \n```java\n@Override\npublic void onCompletion(MediaPlayer player) {\n    synchronized\
  \ (this) {\n        isPrepared = false;\n    }\n}\n```\n\n最后是`OnCompletionListener.onCompletion()`方法，由`AndroidMusic`类实现。它所做的仅仅是在一个`synchronized`块中设置`isPrepared`标志，以便其他方法不会突然抛出异常。接下来，我们将继续学习与输入相关的类。\n\
  \n### AndroidInput 和 AccelerometerHandler\n\n通过几个便捷的方法，我们在第 3 章中设计的`Input`接口使我们可以访问加速度计、触摸屏和键盘，并支持轮询和事件模式。将实现该接口的所有代码放入一个文件的想法有些混乱，因此我们将所有输入事件处理外包给处理程序类。`Input`实现将使用这些处理程序来假装它实际上在执行所有工作。\n\
  \n\n#### AccelerometerHandler：哪面朝上？\n\n我们先从所有处理器中最简单的 `AccelerometerHandler` 开始。代码清单\
  \ 5-5 展示了它的代码。\n\n**代码清单 5-5.** *AccelerometerHandler.java；执行所有加速度计处理*\n\n```java\n\
  package com.badlogic.androidgames.framework.impl;\n\nimport android.content.Context;\n\
  import android.hardware.Sensor;\nimport android.hardware.SensorEvent;\nimport android.hardware.SensorEventListener;\n\
  import android.hardware.SensorManager;\n\npublic class AccelerometerHandler implements\
  \ SensorEventListener {\n    float accelX;\n    float accelY;\n    float accelZ;\n\
  \n    public AccelerometerHandler(Context context) {\n        SensorManager manager\
  \ = (SensorManager) context\n                .getSystemService(Context.SENSOR_SERVICE);\n\
  \        if (manager.getSensorList(Sensor.TYPE_ACCELEROMETER).size() != 0) {\n \
  \           Sensor accelerometer = manager.getSensorList(\n                    Sensor.TYPE_ACCELEROMETER).get(0);\n\
  \            manager.registerListener(this, accelerometer,\n                   \
  \ SensorManager.SENSOR_DELAY_GAME);\n        }\n    }\n\n    @Override\n    public\
  \ void onAccuracyChanged(Sensor sensor, int accuracy) {\n        // 此处无需执行任何操作\n\
  \    }\n\n    @Override\n    public void onSensorChanged(SensorEvent event) {\n\
  \        accelX = event.values[0];\n        accelY = event.values[1];\n        accelZ\
  \ = event.values[2];\n    }\n\n    public float getAccelX() {\n        return accelX;\n\
  \    }\n\n    public float getAccelY() {\n        return accelY;\n    }\n\n    public\
  \ float getAccelZ() {\n        return accelZ;\n    }\n}\n```\n\n不出所料，这个类实现了我们在第\
  \ 4 章中使用过的 `SensorEventListener` 接口。该类存储了三个成员变量，分别保存三个加速度计轴上的加速度值。\n\n构造函数接收一个 `Context`\
  \ 对象，并从中获取一个 `SensorManager` 实例来设置事件监听。其余代码与我们在上一章中所做的相同。请注意，如果没有安装加速度计，该处理器在其整个生命周期中将愉快地返回所有轴上的零加速度。因此，我们不需要任何额外的错误检查或异常抛出代码。\n\
  \n接下来的两个方法 `onAccuracyChanged()` 和 `onSensorChanged()` 应该很熟悉了。在第一个方法中，我们什么也不做，因此没什么可报告的。在第二个方法中，我们从提供的\
  \ `SensorEvent` 中获取加速度值，并将其存储在处理器的成员变量中。最后三个方法只是简单地返回每个轴的当前加速度。\n\n请注意，我们在此处无需执行任何同步操作，即使\
  \ `onSensorChanged()` 方法可能在不同的线程中被调用。Java 内存模型保证对`Boolean`、`int`或`byte`等基本类型的写入和读取是原子性的。在这种情况下，依赖于此事实是可以的，因为我们所做的仅仅是为变量赋新值，并没有进行更复杂的操作。如果情况并非如此（例如，我们在\
  \ `onSensorChanged()` 方法中对成员变量进行了某些操作），我们就需要进行适当的同步。\n\n#### CompassHandler\n\n\
  为了有趣，我们将提供一个与 `AccelerometerHandler` 类似的例子，但这一次，我们将同时提供指南针数值以及手机的俯仰角和横滚角。我们将指南针数值称为“偏航角”（yaw），因为这是一个标准的方位术语，很好地定义了我们所看到的数值。\n\
  \n以下代码片段与前一个加速度计示例的唯一区别在于，将传感器类型更改为 `TYPE_ORIENTATION`，并将字段名称从“accel”重命名为“yaw, pitch,\
  \ roll”。否则，其工作方式相同，你可以轻松地将此代码作为控制处理器替换到游戏中！代码清单 5-6 展示了它的代码。\n\n**代码清单 5-6.** *CompassHandler.java；执行所有指南针处理*\n\
  \n```java\npackage com.badlogic.androidgames.framework.impl;\n\nimport android.content.Context;\n\
  import android.hardware.Sensor;\nimport android.hardware.SensorEvent;\nimport android.hardware.SensorEventListener;\n\
  import android.hardware.SensorManager;\n\npublic class CompassHandler implements\
  \ SensorEventListener {\n    float yaw;\n    float pitch;\n    float roll;\n\n \
  \   public CompassHandler(Context context) {\n        SensorManager manager = (SensorManager)\
  \ context\n                .getSystemService(Context.SENSOR_SERVICE);\n        if\
  \ (manager.getSensorList(Sensor.TYPE_ORIENTATION).size() != 0) {\n            Sensor\
  \ compass = manager.getDefaultSensor(Sensor.TYPE_ORIENTATION);\n            manager.registerListener(this,\
  \ compass,\n                    SensorManager.SENSOR_DELAY_GAME);\n        }\n \
  \   }\n\n    @Override\n    public void onAccuracyChanged(Sensor sensor, int accuracy)\
  \ {\n        // 此处无需执行任何操作\n    }\n\n    @Override\n    public void onSensorChanged(SensorEvent\
  \ event) {\n        yaw = event.values[0];\n        pitch = event.values[1];\n \
  \       roll = event.values[2];\n    }\n\n    public float getYaw() {\n        return\
  \ yaw;\n    }\n\n    public float getPitch() {\n        return pitch;\n    }\n\n\
  \    public float getRoll() {\n        return roll;\n    }\n}\n```\n\n\n\n### Pool\
  \ 类：复用对你有益！\n\n作为 Android 开发者，最糟糕的事情是什么？就是停止世界的垃圾回收！如果你查看第 3 章中的`Input`接口定义，你会发现`getTouchEvents()`和`getKeyEvents()`方法。这些方法返回`TouchEvents`和`KeyEvents`列表。在我们的键盘和触摸事件处理器中，我们不断地创建这两个类的实例，并将它们存储在处理器内部的列表中。当按下按键或手指触摸屏幕时，Android\
  \ 输入系统会频繁触发这些事件，因此我们不断创建新实例，而垃圾回收器会在短时间内回收这些实例。为了避免这种情况，我们实现了一种称为实例池的概念。我们不再重复创建类的新实例，而是简单地复用之前创建的实例。`Pool`类是实现这一行为的便捷方式。让我们看看代码清单\
  \ 5-7 中的代码。\n\n**代码清单 5-7.** *Pool.java；与垃圾回收器良好协作*\n\n```\npackage com.badlogic.androidgames.framework;\n\
  \nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Pool<T> {\n\
  ```\n\n这里是泛型：首先要注意的是，这是一个泛型类，类似于`ArrayList`或`HashMap`等集合类。泛型允许我们在`Pool`中存储任何类型的对象，而无需进行强制类型转换。那么`Pool`类的作用是什么呢？\n\
  \n```\n    public interface PoolObjectFactory<T> {\n        public T createObject();\n\
  \    }\n```\n\n首先定义了一个名为`PoolObjectFactory`的接口，它同样是泛型的。该接口只有一个方法`createObject()`，该方法将返回一个与`Pool`/`PoolObjectFactory`实例的泛型类型相同的新对象。\n\
  \n```\n    private final List<T> freeObjects;\n    private final PoolObjectFactory<T>\
  \ factory;\n    private final int maxSize;\n```\n\n`Pool`类包含三个成员变量。其中包括一个用于存储池化对象的`ArrayList`、一个用于生成类所持有类型新实例的`PoolObjectFactory`，以及一个用于存储`Pool`最大可容纳对象数的成员。最后一个成员是必需的，以确保我们的`Pool`不会无限增长；否则，我们可能会遇到内存不足异常。\n\
  \n```\n    public Pool(PoolObjectFactory<T> factory, int maxSize) {\n        this.factory\
  \ = factory;\n        this.maxSize = maxSize;\n        this.freeObjects = new ArrayList<T>(maxSize);\n\
  \    }\n```\n\n`Pool`类的构造方法接收一个`PoolObjectFactory`和最大可存储对象数。我们将这两个参数存储到对应的成员变量中，并实例化一个新的`ArrayList`，其容量设置为最大对象数。\n\
  \n```\n    public T newObject() {\n        T object = null;\n\n        if (freeObjects.size()\
  \ == 0)\n            object = factory.createObject();\n        else\n          \
  \  object = freeObjects.remove(freeObjects.size() - 1);\n\n        return object;\n\
  \    }\n```\n\n`newObject()`方法负责通过`PoolObjectFactory.createObject()`方法为我们返回一个`Pool`所持有类型的新实例，或者如果`freeObjects`列表中有池化实例，则返回一个池化实例。使用此方法时，只要`Pool`的`freeObjects`列表中存有对象，我们就能获取到已回收的对象。否则，该方法会通过工厂创建一个新对象。\n\
  \n```\n    public void free(T object) {\n        if (freeObjects.size() < maxSize)\n\
  \            freeObjects.add(object);\n    }\n}\n```\n\n`free()`方法允许我们重新插入不再使用的对象。如果`freeObjects`列表尚未满容量，该方法会将对象插入到列表中。如果列表已满，则该对象不会被添加，并且很可能在下一次垃圾回收执行时被回收。\n\
  \n那么，我们如何使用这个类呢？我们将通过一些伪代码示例，展示`Pool`类如何与触摸事件结合使用。\n\n```\nPoolObjectFactory<TouchEvent>\
  \ factory = new PoolObjectFactory<TouchEvent>() {\n    @Override\n    public TouchEvent\
  \ createObject() {\n        return new TouchEvent();\n    }\n};\nPool<TouchEvent>\
  \ touchEventPool = new Pool<TouchEvent>(factory, 50);\nTouchEvent touchEvent = touchEventPool.newObject();\n\
  -- 在这里执行某些操作 --\ntouchEventPool.free(touchEvent);\n```\n\n首先，我们定义一个创建`TouchEvent`实例的`PoolObjectFactory`。接着，我们实例化`Pool`，指定使用该工厂，并告知其最大存储\
  \ 50 个`TouchEvent`对象。当我们需要从`Pool`中获取一个新的`TouchEvent`时，我们会调用`Pool`的`newObject()`方法。初始状态下，`Pool`为空，因此它会请求工厂创建一个全新的`TouchEvent`实例。当我们不再需要该`TouchEvent`时，通过调用`Pool`的`free()`方法将其重新插入到`Pool`中。下次调用`newObject()`方法时，我们会获得同一个`TouchEvent`实例并进行复用，从而避免垃圾回收器带来的问题。这个类在多个场景中都非常有用。请注意，当从`Pool`中获取对象时，必须小心地将复用的对象完全重新初始化。\n\
  \n\n\n### `KeyboardHandler`：上上下下左右左右……\n\n`KeyboardHandler` 必须完成多个任务。首先，它必须连接到接收键盘事件的\
  \ `View`。其次，它必须存储每个按键的当前状态以供轮询。此外，它还必须维护一个我们在第 3 章中设计的、用于基于事件输入处理的 `KeyEvent` 实例列表。最后，它必须正确同步所有操作，因为它会在\
  \ UI 线程上接收事件，同时被我们在另一个线程上执行的主游戏循环轮询。工作量不小！作为回顾，我们将在下面展示在第 3 章中作为 `Input` 接口一部分定义的\
  \ `KeyEvent` 类。\n\n```\npublic static class KeyEvent {\npublic static final int\
  \ KEY_DOWN = 0;\npublic static final int KEY_UP = 1;\n\npublic int type;\npublic\
  \ int keyCode;\npublic char keyChar;\n}\n```\n\n这个类简单地定义了两个表示按键事件类型的常量以及三个成员变量，分别保存事件的类型、键码和\
  \ Unicode 字符。有了这些，我们就可以实现我们的处理器了。\n\n清单 5–8 展示了使用前面讨论过的 Android API 和新的 `Pool` 类来实现该处理器。\n\
  \n**清单 5–8.** *`KeyboardHandler.java`：自 2010 年起处理按键*\n\n```\npackage com.badlogic.androidgames.framework.impl;\n\
  \nimport java.util.ArrayList;\nimport java.util.List;\n\nimport android.view.View;\n\
  import android.view.View.OnKeyListener;\n\nimport com.badlogic.androidgames.framework.Input.KeyEvent;\n\
  import com.badlogic.androidgames.framework.Pool;\nimport com.badlogic.androidgames.framework.Pool.PoolObjectFactory;\n\
  \npublic class KeyboardHandler implements OnKeyListener {\nboolean[] pressedKeys\
  \ = new boolean[128];\n    Pool<KeyEvent> keyEventPool;\nList<KeyEvent> keyEventsBuffer\
  \ = new ArrayList<KeyEvent>();\nList<KeyEvent> keyEvents = new ArrayList<KeyEvent>();\n\
  ```\n\n`KeyboardHandler` 类实现了 `OnKeyListener` 接口，以便它能够从 `View` 接收按键事件。接下来是这些成员变量。\n\
  \n第一个成员变量是一个包含 128 个布尔值的数组。我们将每个按键的当前状态（按下或未按下）存储在这个数组中。数组的索引是按键的键码。幸运的是，`android.view.KeyEvent.KEYCODE_XXX`\
  \ 常量（用于编码键码）的取值范围都在 0 到 127 之间，因此我们可以用对垃圾回收器友好的方式来存储它们。请注意，一个不幸的巧合是，我们的 `KeyEvent`\
  \ 类与 Android 的 `KeyEvent` 类重名，后者的实例会被传递给我们的 `OnKeyEventListener.onKeyEvent()` 方法。这种小小的混淆仅限于此处理器的代码中。由于按键事件没有比“`KeyEvent`”更好的名字了，我们选择忍受这种短暂的混淆。\n\
  \n下一个成员变量是一个 `Pool`，用于保存我们 `KeyEvent` 类的实例。我们不想惹怒垃圾回收器，因此我们会回收所有创建的 `KeyEvent` 对象。\n\
  \n第三个成员变量存储了尚未被我们的游戏消费的 `KeyEvent`。每次我们在 UI 线程上收到一个新的按键事件时，都会将其添加到这个列表中。\n\n最后一个成员变量存储了我们通过调用\
  \ `KeyboardHandler.getKeyEvents()` 方法返回的 `KeyEvent`。在接下来的章节中，我们将了解为什么需要对按键事件进行双缓冲。\n\
  \n```\npublic KeyboardHandler(View view) {\nPoolObjectFactory<KeyEvent> factory\
  \ = new PoolObjectFactory<KeyEvent>() {\n            @Override\npublic KeyEvent\
  \ createObject() {\nreturn new KeyEvent();\n            }\n        };\nkeyEventPool\
  \ = new Pool<KeyEvent>(factory, 100);\n        view.setOnKeyListener(this);\n  \
  \      view.setFocusableInTouchMode(true);\n        view.requestFocus();\n    }\n\
  ```\n\n构造函数只有一个参数，即我们希望从中接收按键事件的 `View`。我们使用一个合适的 `PoolObjectFactory` 创建 `Pool`\
  \ 实例，将该处理器注册为 `View` 的 `OnKeyListener`，最后通过使该 `View` 成为焦点 `View` 来确保它能够接收按键事件。\n\
  \n```\n    @Override\npublic boolean onKey(View v, int keyCode, android.view.KeyEvent\
  \ event) {\nif (event.getAction() == android.view.KeyEvent.ACTION_MULTIPLE)\nreturn\
  \ false;\n\nsynchronized (this) {\n            KeyEvent keyEvent = keyEventPool.newObject();\n\
  \            keyEvent.keyCode = keyCode;\n            keyEvent.keyChar = (char)\
  \ event.getUnicodeChar();\nif (event.getAction() == android.view.KeyEvent.ACTION_DOWN)\
  \ {\n                keyEvent.type = KeyEvent.KEY_DOWN;\nif(keyCode > 0 && keyCode\
  \ < 127)\npressedKeys[keyCode] = true;\n            }\nif (event.getAction() ==\
  \ android.view.KeyEvent.ACTION_UP) {\n                keyEvent.type = KeyEvent.KEY_UP;\n\
  if(keyCode > 0 && keyCode < 127)\npressedKeys[keyCode] = false;\n            }\n\
  \            keyEventsBuffer.add(keyEvent);\n        }\nreturn false;\n    }\n```\n\
  \n接下来，我们将讨论 `OnKeyListener.onKey()` 接口方法的实现，每当 `View` 接收到一个新的按键事件时，该方法就会被调用。我们首先忽略任何编码为\
  \ `KeyEvent.ACTION_MULTIPLE` 事件的（Android）按键事件。这些在我们的上下文中并不相关。接着是一个同步块。请记住，事件是在 UI\
  \ 线程上接收的，而读取是在主循环线程上进行的，因此我们必须确保没有成员变量被并行访问。\n\n在同步块内部，我们首先从 `Pool` 中获取一个 `KeyEvent`\
  \ 实例（我们 `KeyEvent` 实现的一个实例）。根据 `Pool` 的状态，我们可能会得到一个回收的实例，也可能得到一个全新的实例。接下来，我们根据传递给该方法的\
  \ Android `KeyEvent` 的内容来设置 `KeyEvent` 的 `keyCode` 和 `keyChar` 成员变量。然后，我们解码 Android\
  \ `KeyEvent` 的类型（`type`），并相应地设置我们自己的 `KeyEvent` 的类型以及 `pressedKey` 数组中的元素。最后，我们将我们的\
  \ `KeyEvent` 添加到之前定义的 `keyEventBuffer` 列表中。\n\n```\npublic boolean isKeyPressed(int\
  \ keyCode) {\nif (keyCode < 0 || keyCode > 127)\nreturn false;\nreturn pressedKeys[keyCode];\n\
  \    }\n```\n\n我们处理器的下一个方法是 `isKeyPressed()` 方法，它实现了 `Input.isKeyPressed()` 的语义。首先，传入一个指定键码的整数（Android\
  \ `KeyEvent.KEYCODE_XXX` 常量之一），并返回该按键是否被按下。我们通过一些范围检查后查询 `pressedKey` 数组中的按键状态来实现这一点。请记住，我们在上一个方法中设置了该数组的元素，而该方法是在\
  \ UI 线程上调用的。由于我们再次处理的是原始类型，因此不需要进行同步。\n\n```\npublic List<KeyEvent> getKeyEvents()\
  \ {\nsynchronized (this) {\nint len = keyEvents.size();\nfor (int i = 0; i < len;\
  \ i++)\n                keyEventPool.free(keyEvents.get(i));\n            keyEvents.clear();\n\
  \            keyEvents.addAll(keyEventsBuffer);\n            keyEventsBuffer.clear();\n\
  return keyEvents;\n        }\n    }\n}\n```\n\n我们处理器的最后一个方法叫做 `getKeyEvents()`，它实现了\
  \ `Input.getKeyEvents()` 方法的语义。我们再次以一个同步块开始，并且要记住，此方法将从另一个线程调用。\n\n\n\n接下来，我们遍历\
  \ `keyEvents` 数组，并将其中的所有 `KeyEvent` 插入到 `Pool` 中。请记住，我们是在 UI 线程的 `onKey()` 方法中从\
  \ `Pool` 获取实例的，而在这里，我们又将它们重新插入回 `Pool`。但 `keyEvents` 列表难道不是空的吗？是的，但这仅限于我们首次调用该方法时。要理解其中缘由，你必须掌握该方法的其余部分。\n\
  \n在神秘的 `Pool` 插入循环结束后，我们清空 `keyEvents` 列表，并用 `keyEventsBuffer` 列表中的事件填充它。最后，我们清空\
  \ `keyEventsBuffer` 列表，并将重新填充好的 `keyEvents` 列表返回给调用者。这到底是怎么回事呢？\n\n我们将用一个简单的例子来说明。首先，我们来看看每当\
  \ UI 线程有新事件到达，或者游戏在主线程中获取事件时，`keyEvents` 列表、`keyEventsBuffer` 列表以及 `Pool` 分别发生了什么变化：\n\
  \n```\nUI 线程: onKey() ->\n           keyEvents = { }, keyEventsBuffer = {KeyEvent1},\
  \ pool = { }\n主线程: getKeyEvents() ->\n           keyEvents = {KeyEvent1}, keyEventsBuffer\
  \ = { }, pool { }\nUI 线程: onKey() ->\n           keyEvents = {KeyEvent1}, keyEventsBuffer\
  \ = {KeyEvent2}, pool { }\n主线程: getKeyEvents() ->\n           keyEvents = {KeyEvent2},\
  \ keyEventsBuffer = { }, pool = {KeyEvent1}\nUI 线程: onKey() ->\n           keyEvents\
  \ = {KeyEvent2}, keyEventsBuffer = {KeyEvent1}, pool = { }\n```\n\n1.  我们在 UI 线程中收到一个新事件。此时\
  \ `Pool` 中还没有任何内容，因此会创建一个新的 `KeyEvent` 实例（`KeyEvent1`）并插入到 `keyEventsBuffer` 列表中。\n\
  2.  我们在主线程中调用 `getKeyEvents()`。`getKeyEvents()` 从 `keyEventsBuffer` 列表中取出 `KeyEvent1`，并将其放入将要返回给调用者的\
  \ `keyEvents` 列表中。\n3.  我们在 UI 线程中又收到一个事件。此时 `Pool` 仍然为空，因此会创建一个新的 `KeyEvent` 实例（`KeyEvent2`）并插入到\
  \ `keyEventsBuffer` 列表中。\n4.  主线程再次调用 `getKeyEvents()`。现在，有趣的事情发生了。在进入方法时，`keyEvents`\
  \ 列表仍然持有 `KeyEvent1`。插入循环会将该事件放入 `Pool` 中。然后它清空 `keyEvents` 列表，并将 `keyEventsBuffer`\
  \ 中的任何 `KeyEvent`（本例中是 `KeyEvent2`）插入进去。我们刚刚回收了一个按键事件。\n5.  另一个按键事件到达 UI 线程。这次，`Pool`\
  \ 中有一个空闲的 `KeyEvent`，我们愉快地重用了它。不可思议的是，这里没有垃圾回收！\n\n这种机制有一个注意事项，那就是我们必须频繁调用 `KeyboardHandler.getKeyEvents()`，否则\
  \ `keyEvents` 列表会迅速填满，并且没有对象会返回到 `Pool` 中。只要记住这一点，就可以避免出现问题。\n\n## 触摸处理器\n\n现在该考虑碎片化问题了。在上一章中，我们揭示了多点触控仅在\
  \ Android 1.6 以上的版本中得到支持。我们在多点触控代码中使用的所有好用的常量（例如 `MotionEvent.ACTION_POINTER_ID_MASK`）在\
  \ Android 1.5 或 1.6 上都是不可用的。如果我们将项目的构建目标设置为包含此 API 的 Android 版本，就可以在代码中使用它们；但是，应用程序在任何运行\
  \ Android 1.5 或 1.6 的设备上都会崩溃。我们希望游戏能够在所有当前可用的 Android 版本上运行，那么如何解决这个问题呢？\n\n我们采用一个简单的技巧。我们编写两个处理器，一个使用\
  \ Android 1.5 中的单点触控 API，另一个使用 Android 2.0 及以上版本中的多点触控 API。只要不在版本低于 2.0 的 Android\
  \ 设备上执行多点触控处理器的代码，这就是安全的。虚拟机不会加载该代码，也就不会持续抛出异常。我们需要做的只是确定设备运行的 Android 版本，然后实例化相应的处理器。在讨论\
  \ `AndroidInput` 类时，你将看到这是如何工作的。现在，让我们专注于这两个处理器。\n\n### TouchHandler 接口\n\n为了能够互换使用我们的两个处理器类，我们需要定义一个通用接口。列表\
  \ 5–9 展示了 `TouchHandler` 接口。\n\n**列表 5–9.** *TouchHandler.java，为 Android 1.5 和 1.6\
  \ 实现。*\n\n```\npackage com.badlogic.androidgames.framework.impl;\n\nimport java.util.List;\n\
  \nimport android.view.View.OnTouchListener;\n\nimport com.badlogic.androidgames.framework.Input.TouchEvent;\n\
  \npublic interface TouchHandler extends OnTouchListener {\n    public boolean isTouchDown(int\
  \ pointer);\n\n    public int getTouchX(int pointer);\n\n    public int getTouchY(int\
  \ pointer);\n\n    public List<TouchEvent> getTouchEvents();\n}\n```\n\n所有 `TouchHandler`\
  \ 都必须实现 `OnTouchListener` 接口，该接口用于将处理器注册到 `View`。该接口中的方法与第 3 章中定义的 `Input` 接口的相应方法对应。前三个方法用于轮询特定指针\
  \ ID 的状态，最后一个方法用于获取 `TouchEvent` 以执行基于事件处理的输入。请注意，轮询方法接受的指针 ID 可以是任意数字，并由触摸事件给出。\n\
  \n\n\n### `SingleTouchHandler` 类\n\n在我们的单点触控处理器中，我们忽略除零以外的所有 ID。回顾一下，我们将回忆在第 3 章中作为`Input`接口一部分定义的`TouchEvent`类。\n\
  \n```\npublic static class TouchEvent {\n    public static final int TOUCH_DOWN\
  \ = 0;\n    public static final int TOUCH_UP = 1;\n    public static final int TOUCH_DRAGGED\
  \ = 2;\n\n    public int type;\n    public int x, y;\n    public int pointer; }\n\
  ```\n\n与`KeyEvent`类类似，它定义了几个反映触摸事件类型的常量，以及`View`坐标系中的 x 和 y 坐标以及指针 ID。代码清单 5-10\
  \ 展示了适用于 Android 1.5 和 1.6 的`TouchHandler`接口实现。\n\n**代码清单 5-10.** *SingleTouchHandler.java；\
  \ 擅长单点触控，但不擅长多点触控*\n\n```\npackage com.badlogic.androidgames.framework.impl;\n\n\
  import java.util.ArrayList;\nimport java.util.List;\n\nimport android.view.MotionEvent;\n\
  import android.view.View;\n\nimport com.badlogic.androidgames.framework.Pool;\n\
  import com.badlogic.androidgames.framework.Input.TouchEvent;\nimport com.badlogic.androidgames.framework.Pool.PoolObjectFactory;\n\
  \npublic class SingleTouchHandler implements TouchHandler {\n    boolean isTouched;\n\
  \    int touchX;\n    int touchY;\n    Pool<TouchEvent> touchEventPool;\n    List<TouchEvent>\
  \ touchEvents = new ArrayList<TouchEvent>();\n    List<TouchEvent> touchEventsBuffer\
  \ = new ArrayList<TouchEvent>();\n    float scaleX;\n    float scaleY;\n```\n\n\
  首先，我们让该类实现`TouchHandler`接口，这也意味着我们必须实现`OnTouchListener`接口。接着，我们有三个成员变量来存储单指触摸屏的当前状态，然后是一个`Pool`和两个用于存放`TouchEvent`的列表。这与`KeyboardHandler`中的做法相同。我们还有两个成员变量：`scaleX`和`scaleY`。我们将在后续章节中介绍它们，并使用它们来处理不同的屏幕分辨率。\n\
  \n**注意：** 当然，我们可以通过从处理所有对象池和同步相关问题的基类派生`KeyboardHandler`和`SingleTouchHandler`来使代码更优雅。然而，这会使解释更加复杂，因此，我们选择多写几行代码。\n\
  \n```\n    public SingleTouchHandler(View view, float scaleX, float scaleY) {\n\
  \        PoolObjectFactory<TouchEvent> factory = new PoolObjectFactory<TouchEvent>()\
  \ {\n            @Override\n            public TouchEvent createObject() {\n   \
  \             return new TouchEvent();\n            }\n        };\n        touchEventPool\
  \ = new Pool<TouchEvent>(factory, 100);\n        view.setOnTouchListener(this);\n\
  \n        this.scaleX = scaleX;\n        this.scaleY = scaleY;\n    }\n```\n\n在构造函数中，我们将处理器注册为`OnTouchListener`，并设置用于回收`TouchEvent`的`Pool`。我们还存储了传递给构造函数的`scaleX`和`scaleY`参数（暂时忽略它们）。\n\
  \n```\n    @Override\n    public boolean onTouch(View v, MotionEvent event) {\n\
  \        synchronized (this) {\n            TouchEvent touchEvent = touchEventPool.newObject();\n\
  \            switch (event.getAction()) {\n                case MotionEvent.ACTION_DOWN:\n\
  \                    touchEvent.type = TouchEvent.TOUCH_DOWN;\n                \
  \    isTouched = true;\n                    break;\n                case MotionEvent.ACTION_MOVE:\n\
  \                    touchEvent.type = TouchEvent.TOUCH_DRAGGED;\n             \
  \       isTouched = true;\n                    break;\n                case MotionEvent.ACTION_CANCEL:\n\
  \                case MotionEvent.ACTION_UP:\n                    touchEvent.type\
  \ = TouchEvent.TOUCH_UP;\n                    isTouched = false;\n             \
  \       break;\n            }\n\n            touchEvent.x = touchX = (int)(event.getX()\
  \ * scaleX);\n            touchEvent.y = touchY = (int)(event.getY() * scaleY);\n\
  \            touchEventsBuffer.add(touchEvent);                    \n\n        \
  \    return true;\n        }\n    }\n```\n\n`onTouch()`方法实现了与`KeyboardHandler`的`onKey()`方法相同的效果；唯一的区别是我们现在处理的是`TouchEvent`而不是`KeyEvent`。所有关于同步、对象池和`MotionEvent`处理的知识我们都已经熟悉。唯一有趣的是，我们将触摸事件报告的\
  \ x 和 y 坐标乘以了`scaleX`和`scaleY`。这一点非常重要，因为我们将在后续章节中再次讨论它。\n\n```\n    @Override\n\
  \    public boolean isTouchDown(int pointer) {\n        synchronized (this) {\n\
  \            if (pointer == 0)\n                return isTouched;\n            else\n\
  \                return false;\n        }\n    }\n\n    @Override\n    public int\
  \ getTouchX(int pointer) {\n        synchronized (this) {\n            return touchX;\n\
  \        }\n    }\n\n    @Override\n    public int getTouchY(int pointer) {\n  \
  \      synchronized (this) {\n            return touchY;\n        }\n    }\n```\n\
  \n`isTouchDown()`、`getTouchX()`和`getTouchY()`方法允许我们根据在`onTouch()`方法中设置的成员变量来轮询触摸屏的状态。关于它们，唯一值得注意的一点是，它们只为指针\
  \ ID 为零的情况返回有效数据，因为此类仅支持单点触控屏幕。\n\n```\n    @Override\n    public List<TouchEvent>\
  \ getTouchEvents() {\n        synchronized (this) {    \n            int len = touchEvents.size();\n\
  \            for (int i = 0; i < len; i++ )\n                touchEventPool.free(touchEvents.get(i));\n\
  \            touchEvents.clear();\n            touchEvents.addAll(touchEventsBuffer);\n\
  \            touchEventsBuffer.clear();\n            return touchEvents;\n     \
  \   }\n    }\n}\n```\n\n最后一个方法`SingleTouchHandler.getTouchEvents()`对你来说应该很熟悉，它与`KeyboardHandler.getKeyEvents()`方法类似。请记住，我们会频繁调用此方法，以便`touchEvents`列表不会填满。\n\
  \n\n\n### MultiTouchHandler（多点触控处理器）\n\n为了处理多点触控，我们使用了一个名为`MultiTouchHandler`的类，如代码清单\
  \ 5-11 所示。\n\n**代码清单 5-11.** `MultiTouchHandler.java`（功能相同，用于多点触控）\n\n```\npackage\
  \ com.badlogic.androidgames.framework.impl;\n\nimport java.util.ArrayList;\nimport\
  \ java.util.List;\n\nimport android.view.MotionEvent;\nimport android.view.View;\n\
  \nimport com.badlogic.androidgames.framework.Input.TouchEvent;\nimport com.badlogic.androidgames.framework.Pool;\n\
  import com.badlogic.androidgames.framework.Pool.PoolObjectFactory;\n\npublic class\
  \ MultiTouchHandler implements TouchHandler {\n    private static final int MAX_TOUCHPOINTS\
  \ = 10;\n\n    boolean[] isTouched = new boolean[MAX_TOUCHPOINTS];\n    int[] touchX\
  \ = new int[MAX_TOUCHPOINTS];\n    int[] touchY = new int[MAX_TOUCHPOINTS];\n  \
  \  int[] id = new int[MAX_TOUCHPOINTS];\n    Pool<TouchEvent> touchEventPool;\n\
  \    List<TouchEvent> touchEvents = new ArrayList<TouchEvent>();\n    List<TouchEvent>\
  \ touchEventsBuffer = new ArrayList<TouchEvent>();\n    float scaleX;\n    float\
  \ scaleY;\n\n    public MultiTouchHandler(View view, float scaleX, float scaleY)\
  \ {\n        PoolObjectFactory<TouchEvent> factory = new PoolObjectFactory<TouchEvent>()\
  \ {\n            @Override\n            public TouchEvent createObject() {\n   \
  \             return new TouchEvent();\n            }\n        };\n        touchEventPool\
  \ = new Pool<TouchEvent>(factory, 100);\n        view.setOnTouchListener(this);\n\
  \n        this.scaleX = scaleX;\n        this.scaleY = scaleY;\n    }\n\n    @Override\n\
  \    public boolean onTouch(View v, MotionEvent event) {\n        synchronized (this)\
  \ {\n            int action = event.getAction() & MotionEvent.ACTION_MASK;\n   \
  \         int pointerIndex = (event.getAction() & MotionEvent.ACTION_POINTER_ID_MASK)\n\
  \                    >> MotionEvent.ACTION_POINTER_ID_SHIFT;\n            int pointerCount\
  \ = event.getPointerCount();\n            TouchEvent touchEvent;\n            for\
  \ (int i = 0; i < MAX_TOUCHPOINTS; i++) {\n                if (i >= pointerCount)\
  \ {\n                    isTouched[i] = false;\n                    id[i] = -1;\n\
  \                    continue;\n                }\n                int pointerId\
  \ = event.getPointerId(i);\n                if (event.getAction() != MotionEvent.ACTION_MOVE\
  \ && i != pointerIndex) {\n                    // if it's an up/down/cancel/out\
  \ event, mask the id to see if we should process it for this touch\n           \
  \         // point\n                    continue;\n                }\n         \
  \       switch (action) {\n                    case MotionEvent.ACTION_DOWN:\n \
  \                   case MotionEvent.ACTION_POINTER_DOWN:\n                    \
  \    touchEvent = touchEventPool.newObject();\n                        touchEvent.type\
  \ = TouchEvent.TOUCH_DOWN;\n                        touchEvent.pointer = pointerId;\n\
  \                        touchEvent.x = touchX[i] = (int) (event.getX(i) * scaleX);\n\
  \                        touchEvent.y = touchY[i] = (int) (event.getY(i) * scaleY);\n\
  \                        isTouched[i] = true;\n                        id[i] = pointerId;\n\
  \                        touchEventsBuffer.add(touchEvent);\n                  \
  \      break;\n\n                    case MotionEvent.ACTION_UP:\n             \
  \       case MotionEvent.ACTION_POINTER_UP:\n                    case MotionEvent.ACTION_CANCEL:\n\
  \                        touchEvent = touchEventPool.newObject();\n            \
  \            touchEvent.type = TouchEvent.TOUCH_UP;\n                        touchEvent.pointer\
  \ = pointerId;\n                        touchEvent.x = touchX[i] = (int) (event.getX(i)\
  \ * scaleX);\n                        touchEvent.y = touchY[i] = (int) (event.getY(i)\
  \ * scaleY);\n                        isTouched[i] = false;\n                  \
  \      id[i] = -1;\n                        touchEventsBuffer.add(touchEvent);\n\
  \                        break;\n\n                    case MotionEvent.ACTION_MOVE:\n\
  \                        touchEvent = touchEventPool.newObject();\n            \
  \            touchEvent.type = TouchEvent.TOUCH_DRAGGED;\n                     \
  \   touchEvent.pointer = pointerId;\n                        touchEvent.x = touchX[i]\
  \ = (int) (event.getX(i) * scaleX);\n                        touchEvent.y = touchY[i]\
  \ = (int) (event.getY(i) * scaleY);\n                        isTouched[i] = true;\n\
  \                        id[i] = pointerId;\n                        touchEventsBuffer.add(touchEvent);\n\
  \                        break;\n                }\n            }\n            return\
  \ true;\n        }\n    }\n\n    @Override\n    public boolean isTouchDown(int pointer)\
  \ {\n        synchronized (this) {\n            int index = getIndex(pointer);\n\
  \            if (index < 0 || index >= MAX_TOUCHPOINTS)\n                return\
  \ false;\n            else\n                return isTouched[index];\n        }\n\
  \    }\n\n    @Override\n    public int getTouchX(int pointer) {\n        synchronized\
  \ (this) {\n            int index = getIndex(pointer);\n            if (index <\
  \ 0 || index >= MAX_TOUCHPOINTS)\n                return 0;\n            else\n\
  \                return touchX[index];\n        }\n    }\n\n    @Override\n    public\
  \ int getTouchY(int pointer) {\n        synchronized (this) {\n            int index\
  \ = getIndex(pointer);\n            if (index < 0 || index >= MAX_TOUCHPOINTS)\n\
  \                return 0;\n            else\n                return touchY[index];\n\
  \        }\n    }\n\n    @Override\n    public List<TouchEvent> getTouchEvents()\
  \ {\n        synchronized (this) {\n            int len = touchEvents.size();\n\
  \            for (int i = 0; i < len; i++)\n                touchEventPool.free(touchEvents.get(i));\n\
  \            touchEvents.clear();\n            touchEvents.addAll(touchEventsBuffer);\n\
  \            touchEventsBuffer.clear();\n            return touchEvents;\n     \
  \   }\n    }\n\n    // returns the index for a given pointerId or -1 if no index.\n\
  \    private int getIndex(int pointerId) {\n        for (int i = 0; i < MAX_TOUCHPOINTS;\
  \ i++) {\n            if (id[i] == pointerId) {\n                return i;\n   \
  \         }\n        }\n        return -1;\n    }\n}\n```\n\n`onTouch()`方法看起来和上一章的测试示例一样复杂。不过，我们所要做的只是将该测试代码与我们之前详细讨论过的事件池化和同步机制结合起来。与`SingleTouchHandler.onTouch()`方法相比，唯一的区别在于我们处理了多个触摸点，并相应设置了`TouchEvent.pointer`成员（而不是使用\
  \ 0 值）。\n\n轮询方法`isTouchDown()`、`getTouchX()`和`getTouchY()`也应该看起来很熟悉。我们执行一些错误检查，然后从我们在`onTouch()`方法中填充的成员数组中获取相应触摸点索引的状态。\n\
  \n```\n@Override\npublic List<TouchEvent> getTouchEvents() {\n    synchronized (this)\
  \ {\n        int len = touchEvents.size();\n        for (int i = 0; i < len; i++)\n\
  \            touchEventPool.free(touchEvents.get(i));\n        touchEvents.clear();\n\
  \        touchEvents.addAll(touchEventsBuffer);\n        touchEventsBuffer.clear();\n\
  \        return touchEvents;\n    }\n}\n```\n\n最后一个方法`getTouchEvents()`与`SingleTouchHandler`中对应的方法完全相同。现在我们已经拥有了所有这些处理器，就可以实现`Input`接口了。\n\
  \n\n\n### AndroidInput：伟大的协调者\n\n我们游戏框架的 `Input` 实现将所有已开发的处理器整合在一起。任何方法调用都会被委托给相应的处理器。该实现中唯一有趣的部分在于，如何根据设备运行的\
  \ Android 版本来选择 `TouchHandler` 的实现。代码清单 5-12 展示了一个名为 `AndroidInput` 的实现。\n\n**代码清单\
  \ 5-12.** *AndroidInput.java；优雅地处理处理器*\n\n```java\npackage com.badlogic.androidgames.framework.impl;\n\
  \nimport java.util.List;\n\nimport android.content.Context;\nimport android.os.Build.VERSION;\n\
  import android.view.View;\n\nimport com.badlogic.androidgames.framework.Input;\n\
  \npublic class AndroidInput implements Input {\n    AccelerometerHandler accelHandler;\n\
  \    KeyboardHandler keyHandler;\n    TouchHandler touchHandler;\n```\n\n我们首先让这个类实现第\
  \ 3 章中定义的 `Input` 接口。这引出了三个成员：`AccelerometerHandler`、`KeyboardHandler` 和 `TouchHandler`。\n\
  \n```java\n    public AndroidInput(Context context, View view, float scaleX, float\
  \ scaleY) {\n        accelHandler = new AccelerometerHandler(context);\n       \
  \ keyHandler = new KeyboardHandler(view);\n        if (Integer.parseInt(VERSION.SDK)\
  \ < 5)\n            touchHandler = new SingleTouchHandler(view, scaleX, scaleY);\n\
  \        else\n            touchHandler = new MultiTouchHandler(view, scaleX, scaleY);\n\
  \    }\n```\n\n这些成员在构造函数中初始化，构造函数接收 `Context`、`View` 以及 `scaleX` 和 `scaleY` 参数（我们可以暂时忽略这些参数）。`AccelerometerHandler`\
  \ 通过 `Context` 参数实例化，而 `KeyboardHandler` 则需要传入 `View`。\n\n为了决定使用哪个 `TouchHandler`，我们只需检查应用程序运行时所使用的\
  \ Android 版本。这可以通过 `VERSION.SDK` 字符串完成，该字符串是 Android API 提供的常量。为什么它是个字符串尚不清楚，因为它直接编码了我们\
  \ manifest 文件中使用的 SDK 版本号。因此，我们需要将其转换为整数以进行比较。第一个支持多点触控 API 的 Android 版本是 2.0，对应\
  \ SDK 版本 5。如果当前设备运行的是更低的 Android 版本，我们就实例化 `SingleTouchHandler`；否则，使用 `MultiTouchHandler`。在\
  \ API 层面，这就是我们需要关心的所有碎片化问题。当我们开始使用 OpenGL 进行渲染时，会遇到更多的碎片化问题，但无需担心——就像触控 API 问题一样，它们很容易解决。\n\
  \n```java\n    @Override\n    public boolean isKeyPressed(int keyCode) {\n     \
  \   return keyHandler.isKeyPressed(keyCode);\n    }\n\n    @Override\n    public\
  \ boolean isTouchDown(int pointer) {\n        return touchHandler.isTouchDown(pointer);\n\
  \    }\n\n    @Override\n    public int getTouchX(int pointer) {\n        return\
  \ touchHandler.getTouchX(pointer);\n    }\n\n    @Override\n    public int getTouchY(int\
  \ pointer) {\n        return touchHandler.getTouchY(pointer);\n    }\n\n    @Override\n\
  \    public float getAccelX() {\n        return accelHandler.getAccelX();\n    }\n\
  \n    @Override\n    public float getAccelY() {\n        return accelHandler.getAccelY();\n\
  \    }\n\n    @Override\n    public float getAccelZ() {\n        return accelHandler.getAccelZ();\n\
  \    }\n\n    @Override\n    public List<TouchEvent> getTouchEvents() {\n      \
  \  return touchHandler.getTouchEvents();\n    }\n\n    @Override\n    public List<KeyEvent>\
  \ getKeyEvents() {\n        return keyHandler.getKeyEvents();\n    }\n}\n```\n\n\
  该类的其余部分不言自明。每个方法调用都被委托给相应的处理器，由它完成实际工作。至此，我们完成了游戏框架输入 API 的开发。接下来，我们将讨论图形。\n\n##\
  \ AndroidGraphics 与 AndroidPixmap：双重彩虹\n\n是时候回到我们最钟爱的主题——图形编程了。在第 3 章中，我们定义了两个接口：`Graphics`\
  \ 和 `Pixmap`。现在，我们将基于你在第 4 章所学的内容来实现它们。不过，我们还有一个问题需要考虑：如何处理不同的屏幕尺寸和分辨率。\n\n### 处理不同的屏幕尺寸和分辨率\n\
  \n自 1.6 版本起，Android 已支持不同的屏幕分辨率。它可以处理从 240×320 像素到全高清 1920×1080 像素的各种分辨率。在上一章中，我们讨论了不同屏幕分辨率和物理屏幕尺寸带来的影响。例如，使用绝对坐标和以像素为单位的大小进行绘制会产生意想不到的结果。如图\
  \ 5-1 所示，当我们在 480×800 和 320×480 的屏幕上绘制一个左上角位于 (219,379)、大小为 100×100 像素的矩形时，会发生什么情况。\n\
  \n![images](img/0501.jpg)\n\n**图 5-1.** *一个 100×100 像素的矩形，在 480×800 屏幕（左）和 320×480\
  \ 屏幕（右）上绘制于 (219,379) 位置。*\n\n这种差异带来两个问题。首先，我们不能假设固定分辨率来绘制游戏。第二个原因更为微妙：在图 5-1 中，我们假设两个屏幕具有相同的密度（即每个像素在两个设备上的物理尺寸相同），但现实中情况很少如此。\n\
  \n#### 密度\n\n密度通常以每英寸像素数或每厘米像素数来指定（有时你会听到每英寸点数，这在技术上并不准确）。Nexus One 有一个 480×800\
  \ 像素的屏幕，物理尺寸为 8×4.8 厘米。较老的 HTC Hero 有一个 320×480 像素的屏幕，物理尺寸为 6.5×4.5 厘米。这意味着 Nexus\
  \ One 两个轴上均为 100 像素/厘米，而 Hero 两个轴上大约为 71 像素/厘米。我们可以使用以下等式轻松计算每厘米像素数。\n\n*每厘米像素数（x\
  \ 轴）= 以像素为单位的宽度 / 以厘米为单位的宽度*\n\n或者：\n\n*每厘米像素数（y 轴）= 以像素为单位的高度 / 以厘米为单位的高度*\n\n\
  通常，我们只需要在单个轴上计算即可，因为物理像素是正方形的（其实它们是三个像素，但这里我们忽略这一点）。\n\n一个 100×100 像素的矩形以厘米计会有多大？在\
  \ Nexus One 上，它是一个 1×1 厘米的矩形；而在 Hero 上，它是一个 1.4×1.4 厘米的矩形。例如，如果我们试图在所有屏幕尺寸上提供足够大以适应普通拇指的按钮，就需要考虑这一点。这个例子表明这是一个可能带来巨大问题的主要问题；然而，它通常不会。我们需要确保按钮在高密度屏幕（例如\
  \ Nexus One）上大小适中，因为它们在低密度屏幕上会自动足够大。\n\n\n\n### 宽高比\n\n宽高比是另一个需要考虑的问题。屏幕的宽高比是指宽度与高度之间的比例，单位可以是像素或厘米。我们可以通过以下公式计算宽高比。\n\
  \n`像素宽高比 = 宽度像素数 / 高度像素数`\n\n或者：\n\n`物理宽高比 = 宽度厘米数 / 高度厘米数`\n\n这里的`宽度`和`高度`通常指横向模式下的宽度和高度。Nexus\
  \ One 的像素宽高比和物理宽高比约为 1.66，而 Hero 的宽高比则为 1.5。这意味着什么呢？与 Hero 相比，Nexus One 在横向模式下，x\
  \ 轴上相对于高度拥有更多可用的像素。图 5–2 通过 Replica Island 在两款设备上的截图展示了这一点。\n\n**注意：** 本书采用公制单位。我们知道，如果您习惯使用英寸和磅，这可能会带来不便。不过，由于后续章节将涉及一些物理问题，而物理问题通常以公制单位定义，最好现在就习惯起来。请记住，1\
  \ 英寸约等于 2.54 厘米。\n\n![images](img/0502.jpg)\n\n**图 5–2.** *Nexus One（上）与 HTC Hero（下）上的\
  \ Replica Island。*\n\nNexus One 在 x 轴上显示的内容稍多一些。然而，在 y 轴上两者完全一致。这种情况下，Replica Island\
  \ 的创建者是如何应对的呢？\n\n#### 应对不同的宽高比\n\nReplica Island 是宽高比问题的一个非常实用的例子。该游戏最初设计为适配 480×320\
  \ 像素的屏幕，包括所有“精灵”（如机器人和医生）、“世界”的图块以及 UI 元素（屏幕左下角的按钮和顶部的状态信息）。当游戏在 Hero 上渲染时，精灵位图中的每个像素都精确对应屏幕上的一个像素。而在\
  \ Nexus One 上，渲染时所有内容都会被放大，因此精灵的一个像素实际会占用屏幕上的 1.5 个像素。换句话说，一个 32×32 像素的精灵在屏幕上会变成\
  \ 48×48 像素。这个缩放因子可以轻松地通过以下公式计算得出。\n\n`缩放因子（x 轴）= 屏幕宽度像素数 / 目标宽度像素数`\n\n以及：\n\n`缩放因子（y\
  \ 轴）= 屏幕高度像素数 / 目标高度像素数`\n\n目标宽度和高度等于为图形资源设计的屏幕分辨率；在 Replica Island 中，尺寸为 480×320\
  \ 像素。对于 Nexus One，x 轴上的缩放因子为 1.66，y 轴上的缩放因子为 1.5。为什么两个轴上的缩放因子不同呢？\n\n这是因为两个屏幕分辨率具有不同的宽高比。如果我们简单地将\
  \ 480×320 像素的图像拉伸为 800×480 像素的图像，原始图像将在 x 轴上被拉伸。对于大多数游戏来说，这点影响微不足道，因此我们可以针对特定的目标分辨率绘制图形资源，并在渲染时将其拉伸到实际的屏幕分辨率（请记住\
  \ `Bitmap.drawBitmap()` 方法）。\n\n然而，对于某些游戏，您可能希望采用更复杂的方法。图 5–3 显示了 Replica Island\
  \ 从 480×320 像素放大到 800×480 像素，并与实际渲染效果的淡色图像叠加在一起。\n\n![images](img/0503.jpg)\n\n\
  **图 5–3.** *将 Replica Island 从 480×320 像素拉伸到 800×480 像素，并与在 800×480 像素显示屏上实际渲染效果的淡色图像叠加。*\n\
  \nReplica Island 使用我们刚才计算的缩放因子（1.5）在 y 轴上执行常规拉伸，但在 x 轴上并没有使用缩放因子（1.66），因为那样会压扁图像，而是采用了\
  \ y 轴的缩放因子。这种技巧使得屏幕上的所有对象都能保持其宽高比。一个 32×32 像素的精灵变成了 48×48 像素，而不是 53×48 像素。不过，这也意味着我们的坐标系不再局限于\
  \ (0,0) 到 (479,319) 之间了；相反，它的范围变成了 (0,0) 到 (533,319)。这就是为什么我们在 Nexus One 上看到的 Replica\
  \ Island 内容比在 HTC Hero 上更多的原因。\n\n但请注意，使用这种精巧的方法可能并不适合所有游戏。例如，如果游戏世界的大小取决于屏幕宽高比，那么屏幕更宽的玩家可能会拥有不公平的优势。像《星际争霸\
  \ 2》这样的游戏就会出现这种情况。最后，如果您希望整个游戏画面适配单一屏幕（例如《贪吃蛇》游戏），最好使用更简单的拉伸方法；如果使用第二种方法，在更宽的屏幕上会留下空白区域。\n\
  \n#### 一个更简单的解决方案\n\nReplica Island 的一个优势是它通过 OpenGL ES 完成了所有这些拉伸和缩放操作，而 OpenGL\
  \ ES 是硬件加速的。到目前为止，我们只讨论了如何通过 `Canvas` 类绘制到 `Bitmap` 和 `View` 上，这涉及 CPU 上缓慢的数值运算，而不涉及\
  \ GPU 上的硬件加速。\n\n考虑到这一点，我们可以使用一个简单的技巧：创建一个以目标分辨率为尺寸的 `Bitmap` 实例作为帧缓冲。这样，我们在设计图形资源或通过代码渲染时，就无需担心实际的屏幕分辨率了。取而代之的是，我们假装所有设备的屏幕分辨率都相同，所有绘制调用都通过一个\
  \ `Canvas` 实例指向这个“虚拟”帧缓冲 `Bitmap`。当我们完成一帧的渲染后，只需通过调用 `Canvas.drawBitmap()` 方法将这个帧缓冲\
  \ `Bitmap` 绘制到我们的 `SurfaceView` 上即可，该方法允许我们绘制一个经过拉伸的 `Bitmap`。\n\n如果我们想使用与 Replica\
  \ Island 相同的技术，就需要调整帧缓冲在较大轴向上的尺寸（即横向模式下的 x 轴，以及纵向模式下的 y 轴）。我们还必须确保填充额外的像素，以避免出现空白区域。\n\
  \n\n\n### 实现方案\n\n现在我们将所有内容总结成一个工作计划。\n\n- 我们针对固定的目标分辨率（在`Mr. Nom`中为 320×480）设计所有图形资源。\n\
  - 创建与目标分辨率尺寸相同的`Bitmap`对象，将所有绘图调用重定向到该对象上，从而在固定坐标系中工作。\n- 完成一帧的绘制后，将拉伸后的帧缓冲区`Bitmap`绘制到`SurfaceView`上。在屏幕分辨率较低的设备上，图像会被缩小；在分辨率较高的设备上，图像会被放大。\n\
  - 在执行缩放操作时，确保所有用户交互的 UI 元素在所有屏幕密度下都足够大。我们可以在图形资源设计阶段，结合实际设备的尺寸和前述公式来完成这一工作。\n\n\
  现在我们已经掌握了处理不同屏幕分辨率和密度的方法，接下来可以解释在前几节实现`SingleTouchHandler`和`MultiTouchHandler`时遇到的`scaleX`和`scaleY`变量了。\n\
  \n所有游戏代码都将基于固定的目标分辨率（320×480 像素）运行。如果我们在分辨率更高或更低的设备上接收到触摸事件，这些事件的 x 和 y 坐标将定义在`View`的坐标系中，而非目标分辨率坐标系中。因此，需要根据缩放因子将这些坐标从原始坐标系转换到我们的坐标系。为此，我们使用以下公式。\n\
  \n```\n转换后的触摸点 x = 实际触摸点 x * (目标 x 轴像素 / 实际 x 轴像素)\n转换后的触摸点 y = 实际触摸点 y * (目标 y\
  \ 轴像素 / 实际 y 轴像素)\n```\n\n我们来计算一个简单示例：假设目标分辨率为 320×480 像素，设备分辨率为 480×800 像素。如果触摸屏幕中央，我们会收到坐标为(240,400)的事件。使用上述两个公式，我们得到以下计算结果，恰好位于目标坐标系的正中央。\n\
  \n```\n转换后的触摸点 x = 240 * (320 / 480) = 160\n转换后的触摸点 y = 400 * (480 / 800) = 240\n\
  ```\n\n再举一个例子：假设实际分辨率为 240×320，再次触摸屏幕中央，坐标为(120,160)。\n\n```\n转换后的触摸点 x = 120 *\
  \ (320 / 240) = 160\n转换后的触摸点 y = 160 * (480 / 320) = 240\n```\n\n这个转换方法在两种方向上均适用。只要将实际触摸事件坐标乘以目标因子与实因子的比值，就无需在实际游戏代码中进行坐标转换。所有触摸坐标都将以固定目标坐标系表示。\n\
  \n解决这个问题后，我们就可以实现游戏框架的最后几个类了。\n\n### AndroidPixmap：为大众服务的像素\n\n根据第 3 章中`Pixmap`接口的设计，需要实现的内容并不多。代码清单\
  \ 5–13 给出了具体代码。\n\n**代码清单 5–13. `AndroidPixmap.java`：一个封装`Bitmap`的`Pixmap`实现**\n\
  \n```java\npackage com.badlogic.androidgames.framework.impl;\n\nimport android.graphics.Bitmap;\n\
  \nimport com.badlogic.androidgames.framework.Graphics.PixmapFormat;\nimport com.badlogic.androidgames.framework.Pixmap;\n\
  \npublic class AndroidPixmap implements Pixmap {\n    Bitmap bitmap;\n    PixmapFormat\
  \ format;\n\n    public AndroidPixmap(Bitmap bitmap, PixmapFormat format) {\n  \
  \      this.bitmap = bitmap;\n        this.format = format;\n    }\n\n    @Override\n\
  \    public int getWidth() {\n        return bitmap.getWidth();\n    }\n\n    @Override\n\
  \    public int getHeight() {\n        return bitmap.getHeight();\n    }\n\n   \
  \ @Override\n    public PixmapFormat getFormat() {\n        return format;\n   \
  \ }\n\n    @Override\n    public void dispose() {\n        bitmap.recycle();\n \
  \   }\n}\n```\n\n我们只需存储封装的`Bitmap`实例及其格式（以`PixmapFormat`枚举值形式存储，定义见第 3 章）。同时，实现`Pixmap`接口所需的方法，以便查询`Pixmap`的宽度、高度和格式，并确保像素可以从\
  \ RAM 中释放。注意，`bitmap`成员是包内可见的，这样我们可以在即将实现的`AndroidGraphics`类中访问它。\n\n\n\n#### AndroidGraphics：满足绘图需求\n\
  \n我们在第 3 章中设计的`Graphics`接口同样精简高效。它负责将像素、线条、矩形和`Pixmap`绘制到帧缓冲上。如前所述，我们将使用`Bitmap`作为帧缓冲，并通过`Canvas`将所有的绘图调用指向它。此外，它还负责从资源文件中创建`Pixmap`实例。因此，我们还需要另一个`AssetManager`。列表\
  \ 5-14 展示了我们的接口实现类`AndroidGraphics`的代码。\n\n**列表 5-14.** *AndroidGraphics.java；实现\
  \ Graphics 接口*\n\n```\npackage com.badlogic.androidgames.framework.impl;\n\nimport\
  \ java.io.IOException;\nimport java.io.InputStream;\n\nimport android.content.res.AssetManager;\n\
  import android.graphics.Bitmap;\nimport android.graphics.Bitmap.Config;\nimport\
  \ android.graphics.BitmapFactory;\nimport android.graphics.BitmapFactory.Options;\n\
  import android.graphics.Canvas;\nimport android.graphics.Paint;\nimport android.graphics.Paint.Style;\n\
  import android.graphics.Rect;\n\nimport com.badlogic.androidgames.framework.Graphics;\n\
  import com.badlogic.androidgames.framework.Pixmap;\n\npublic class AndroidGraphics\
  \ implements Graphics {\n    AssetManager assets;\n    Bitmap frameBuffer;\n   \
  \ Canvas canvas;\n    Paint paint;\n    Rect srcRect = new Rect();\n    Rect dstRect\
  \ = new Rect();\n```\n\n该类实现了`Graphics`接口。它包含一个用于加载`Bitmap`实例的`AssetManager`成员、一个代表人工帧缓冲的`Bitmap`成员、一个用于绘制人工帧缓冲的`Canvas`成员、一个绘图所需的`Paint`成员，以及两个用于实现`AndroidGraphics.drawPixmap()`方法的`Rect`成员。最后这三个成员的存在是为了避免在每次绘图调用时都创建这些类的新实例，否则会给垃圾回收器带来诸多问题。\n\
  \n```\npublic AndroidGraphics(AssetManager assets, Bitmap frameBuffer) {\n    this.assets\
  \ = assets;\n    this.frameBuffer = frameBuffer;\n    this.canvas = new Canvas(frameBuffer);\n\
  \    this.paint = new Paint();\n}\n```\n\n在构造函数中，我们从外部获得了代表人工帧缓冲的`AssetManager`和`Bitmap`。我们将它们分别存储在相应的成员变量中，并创建了用于绘制人工帧缓冲的`Canvas`实例，以及用于部分绘图方法的`Paint`对象。\n\
  \n```\n    @Override\n    public Pixmap newPixmap(String fileName, PixmapFormat\
  \ format) {\n        Config config = null;\n        if (format == PixmapFormat.RGB565)\n\
  \            config = Config.RGB_565;\n        else if (format == PixmapFormat.ARGB4444)\n\
  \            config = Config.ARGB_4444;\n        else\n            config = Config.ARGB_8888;\n\
  \n        Options options = new Options();\n        options.inPreferredConfig =\
  \ config;\n\n        InputStream in = null;\n        Bitmap bitmap = null;\n   \
  \     try {\n            in = assets.open(fileName);\n            bitmap = BitmapFactory.decodeStream(in);\n\
  \            if (bitmap == null)\n                throw new RuntimeException(\"\
  无法从资源文件加载位图 '\"\n                        + fileName + \"'\");\n        } catch (IOException\
  \ e) {\n            throw new RuntimeException(\"无法从资源文件加载位图 '\"\n             \
  \       + fileName + \"'\");\n        } finally {\n            if (in != null) {\n\
  \                try {\n                    in.close();\n                } catch\
  \ (IOException e) {\n                }\n            }\n        }\n\n        if (bitmap.getConfig()\
  \ == Config.RGB_565)\n            format = PixmapFormat.RGB565;\n        else if\
  \ (bitmap.getConfig() == Config.ARGB_4444)\n            format = PixmapFormat.ARGB4444;\n\
  \        else\n            format = PixmapFormat.ARGB8888;\n\n        return new\
  \ AndroidPixmap(bitmap, format);\n    }\n```\n\n`newPixmap()`方法尝试使用指定的`PixmapFormat`从资源文件中加载`Bitmap`。我们首先将`PixmapFormat`转换为第\
  \ 4 章中使用的 Android `Config`类常量。接着，创建一个新的`Options`实例并设置偏好的颜色格式。然后，通过`BitmapFactory`尝试从资源中加载`Bitmap`，如果出错则抛出`RuntimeException`。否则，我们检查`BitmapFactory`实际使用了哪种格式来加载`Bitmap`，并将其转换为`PixmapFormat`枚举值。请记住，`BitmapFactory`可能会忽略我们期望的颜色格式，因此我们必须检查其实际使用的解码格式。最后，基于加载的`Bitmap`及其`PixmapFormat`构建一个新的`AndroidBitmap`实例，并将其返回给调用者。\n\
  \n```\n    @Override\n    public void clear(int color) {\n        canvas.drawRGB((color\
  \ & 0xff0000) >> 16, (color & 0xff00) >> 8,\n                (color & 0xff));\n\
  \    }\n```\n\n`clear()`方法提取指定 32 位 ARGB 颜色参数中的红、绿、蓝三色分量，并调用`Canvas.drawRGB()`方法，从而用该颜色清除人工帧缓冲。此方法会忽略指定颜色的任何\
  \ Alpha 值，因此我们无需提取该值。\n\n```\n    @Override\n    public void drawPixel(int x, int\
  \ y, int color) {\n        paint.setColor(color);\n        canvas.drawPoint(x, y,\
  \ paint);\n    }\n```\n\n`drawPixel()`方法通过`Canvas.drawPoint()`方法在人工帧缓冲上绘制一个像素。首先，我们设置`paint`成员变量的颜色，然后将该颜色与像素的\
  \ x、y 坐标一并传递给绘图方法。\n\n```\n    @Override\n    public void drawLine(int x, int y,\
  \ int x2, int y2, int color) {\n        paint.setColor(color);\n        canvas.drawLine(x,\
  \ y, x2, y2, paint);\n    }\n```\n\n`drawLine()`方法在人工帧缓冲上绘制给定的直线，调用`Canvas.drawLine()`方法时使用`paint`成员来指定颜色。\n\
  \n```\n    @Override\n    public void drawRect(int x, int y, int width, int height,\
  \ int color) {\n        paint.setColor(color);\n        paint.setStyle(Style.FILL);\n\
  \        canvas.drawRect(x, y, x + width - 1, y + width - 1, paint);\n    }\n```\n\
  \n`drawRect()`方法设置`Paint`成员的颜色和样式属性，以便绘制一个填充颜色矩形。在实际调用`Canvas.drawRect()`时，我们需要将`x`、`y`、`width`和`height`参数转换为矩形左上角和右下角的坐标。对于左上角，我们直接使用`x`和`y`参数。对于右下角，我们将宽度和高度分别加到\
  \ x 和 y 上，然后减去 1。例如，如果我们渲染一个 x 和 y 为(10,10)、宽度和高度均为 2 的矩形，且不减去 1，那么屏幕上最终得到的矩形尺寸将是\
  \ 3×3 像素。\n\n```\n    @Override\n    public void drawPixmap(Pixmap pixmap, int x,\
  \ int y, int srcX, int srcY,\n            int srcWidth, int srcHeight) {\n     \
  \   srcRect.left = srcX;\n        srcRect.top = srcY;\n        srcRect.right = srcX\
  \ + srcWidth - 1;\n        srcRect.bottom = srcY + srcHeight - 1;\n\n        dstRect.left\
  \ = x;\n        dstRect.top = y;\n        dstRect.right = x + srcWidth - 1;\n  \
  \      dstRect.bottom = y + srcHeight - 1;\n```\n\n\n\n```  \ncanvas.drawBitmap(((AndroidPixmap)\
  \ pixmap).bitmap, srcRect, dstRect, null);  \n```  \n\n`drawPixmap()` 方法允许我们绘制 `Pixmap`\
  \ 的某一部分。它会设置实际绘制调用中使用的 `Rect` 成员的源和目标区域。与绘制矩形时类似，我们需要将 x 和 y 坐标以及宽度和高度转换为左上角和右下角坐标。同样需要减\
  \ 1，否则会多出 1 个像素。接下来，通过 `Canvas.drawBitmap()` 方法进行实际绘制。如果绘制的 `Pixmap` 具有 `PixmapFormat.ARGB4444`\
  \ 或 `PixmapFormat.ARGB8888` 颜色深度，该方法会自动进行混合处理。注意，我们必须将 `Pixmap` 参数强制转换为 `AndroidPixmap`\
  \ 类型，才能获取其 `bitmap` 成员以供 `Canvas` 绘制。这虽然有些复杂，但可以确保传入的 `Pixmap` 实例确实是 `AndroidPixmap`。\n\
  \n```  \n@Override  \npublic void drawPixmap(Pixmap pixmap, int x, int y) {  \n\
  \    canvas.drawBitmap(((AndroidPixmap)pixmap).bitmap, x, y, null);  \n}  \n```\
  \  \n\n第二个 `drawPixmap()` 方法将完整的 `Pixmap` 绘制到指定坐标处的人工帧缓冲区。同样，我们需要进行类型转换以获取 `AndroidPixmap`\
  \ 的 `Bitmap` 成员。\n\n```  \n@Override  \npublic int getWidth() {  \n    return frameBuffer.getWidth();\
  \  \n}  \n\n@Override  \npublic int getHeight() {  \n    return frameBuffer.getHeight();\
  \  \n}  \n```  \n\n最后，我们实现了 `getWidth()` 和 `getHeight()` 方法，它们直接返回 `AndroidGraphics`\
  \ 内部渲染所使用的人工帧缓冲区的大小。\n\n实现框架所需的最后一个类是 `AndroidFastRenderView`。\n\n#### AndroidFastRenderView：循环、拉伸、循环、拉伸\n\
  \n这个类的名称暗示了其核心功能。在上一章中，我们讨论了使用 `SurfaceView` 在独立线程中执行连续渲染，该线程也可以承载游戏的主循环。我们开发了一个非常简单的类\
  \ `FastRenderView`，它继承自 `SurfaceView` 类，确保与 Activity 生命周期良好配合，并设置了一个线程通过 `Canvas`\
  \ 持续渲染 `SurfaceView`。在此，我们将复用 `FastRenderView` 类并增强其功能。\n\n- 它持有一个 `Game` 实例的引用，通过该实例可以获取当前活动的\
  \ `Screen`。我们在 `FastRenderView` 线程中持续调用 `Screen.update()` 和 `Screen.present()` 方法。\n\
  - 它会记录帧之间的时间差（增量时间），并将其传递给当前活动的 `Screen`。\n- 它获取 `AndroidGraphics` 实例所绘制的人工帧缓冲区，并将其绘制到\
  \ `SurfaceView` 上，必要时进行缩放。\n\n清单 5–15 展示了 `AndroidFastRenderView` 类的实现。\n\n**清单\
  \ 5–15.** *AndroidFastRenderView.java，一个执行游戏代码的线程化 SurfaceView*\n\n```  \npackage\
  \ com.badlogic.androidgames.framework.impl;  \n\nimport android.graphics.Bitmap;\
  \  \nimport android.graphics.Canvas;  \nimport android.graphics.Rect;  \nimport\
  \ android.view.SurfaceHolder;  \nimport android.view.SurfaceView;  \n\npublic class\
  \ AndroidFastRenderView extends SurfaceView implements Runnable {  \n    AndroidGame\
  \ game;  \n    Bitmap framebuffer;  \n    Thread renderThread = null;  \n    SurfaceHolder\
  \ holder;  \n    volatile boolean running = false;  \n    // ...  \n}  \n```  \n\
  \n这段代码看起来应该很熟悉。我们只需要新增两个成员：一个 `AndroidGame` 实例和一个表示人工帧缓冲区的 `Bitmap` 实例。其他成员与第 3\
  \ 章中的 `FastRenderView` 相同。\n\n```  \npublic AndroidFastRenderView(AndroidGame game,\
  \ Bitmap framebuffer) {  \n    super(game);  \n    this.game = game;  \n    this.framebuffer\
  \ = framebuffer;  \n    this.holder = getHolder();  \n}  \n```  \n\n在构造函数中，我们通过\
  \ `AndroidGame` 参数（它是一个 `Activity`，后续章节会讨论）调用基类的构造函数，并将参数存储在各自成员中。与之前一样，我们获取了 `SurfaceHolder`。\n\
  \n```  \npublic void resume() {  \n    running = true;  \n    renderThread = new\
  \ Thread(this);  \n    renderThread.start();  \n}  \n```  \n\n`resume()` 方法与 `FastRenderView.resume()`\
  \ 方法完全相同，因此不再赘述。简而言之，该方法确保我们的线程与 Activity 生命周期良好配合。\n\n```  \npublic void run()\
  \ {  \n    Rect dstRect = new Rect();  \n    long startTime = System.nanoTime();\
  \  \n    while (running) {  \n        if (!holder.getSurface().isValid())  \n  \
  \          continue;  \n\n        float deltaTime = (System.nanoTime() - startTime)\
  \ / 1000000000.0f;  \n        startTime = System.nanoTime();  \n\n        game.getCurrentScreen().update(deltaTime);\
  \  \n        game.getCurrentScreen().present(deltaTime);  \n\n        Canvas canvas\
  \ = holder.lockCanvas();  \n        canvas.getClipBounds(dstRect);  \n        canvas.drawBitmap(framebuffer,\
  \ null, dstRect, null);  \n        holder.unlockCanvasAndPost(canvas);  \n    }\
  \  \n}  \n```  \n\n`run()` 方法新增了一些功能。首先，它能够跟踪每帧之间的增量时间。为此，我们使用了 `System.nanoTime()`，该方法以纳秒为单位返回当前时间（类型为\
  \ long）。\n\n**注意：** 1 纳秒等于十亿分之一秒。\n\n在每次循环迭代中，我们首先计算上一次循环迭代的起始时间与当前时间的差值。为了方便处理这个差值，我们将其转换为秒。接着，保存当前时间戳，以便在下一次循环迭代中计算新的增量时间。有了增量时间后，我们调用当前\
  \ `Screen` 的 `update()` 和 `present()` 方法，这些方法会更新游戏逻辑并将内容渲染到人工帧缓冲区。最后，我们获取 `SurfaceView`\
  \ 的 `Canvas`，并绘制人工帧缓冲区。如果传递给 `Canvas.drawBitmap()` 方法的目标矩形小于或大于帧缓冲区，系统会自动进行缩放。\n\
  \n注意，这里我们使用了一种快捷方式：通过 `Canvas.getClipBounds()` 方法获取一个覆盖整个 `SurfaceView` 的目标矩形。该方法会将\
  \ `dstRect` 的 `top` 和 `left` 成员分别设为 0 和 0，将 `bottom` 和 `right` 成员设为实际屏幕尺寸（在 Nexus\
  \ One 的竖屏模式下为 480×800）。方法的其余部分与我们在 `FastRenderView` 测试中的实现完全相同。该方法确保当 Activity 暂停或销毁时，线程会停止运行。\n\
  \n```  \npublic void pause() {  \n    running = false;  \n    while (true) {  \n\
  \        try {  \n            renderThread.join();  \n            break;  \n   \
  \     } catch (InterruptedException e) {  \n            // 重试  \n        }  \n \
  \   }  \n}  \n```  \n\n该类最后一个方法 `pause()` 与 `FastRenderView.pause()` 方法相同 —— 它终止渲染/主循环线程，并等待线程完全结束后才返回。\n\
  \n我们的框架已基本完成。最后一个关键部分是实现 `Game` 接口。\n\n\n\n### AndroidGame：整合所有功能\n\n我们的游戏开发框架已接近完成。只需实现第\
  \ 3 章中设计的`Game`接口，就能将所有零散部分整合起来。为此，我们将使用本章前面各节创建的类。以下是相关职责列表。\n\n- 执行窗口管理。在本场景中，这意味着要建立一个活动界面和一个`AndroidFastRenderView`，并妥善处理活动生命周期。\n\
  - 使用并管理`WakeLock`，防止屏幕变暗。\n- 实例化`Graphics`、`Audio`、`FileIO`和`Input`，并向相关方提供引用。\n\
  - 管理`Screen`并将其与活动生命周期集成。\n- 我们的总体目标是创建一个名为`AndroidGame`的单一基类，后续从该类派生。我们希望后面实现`Game.getStartScreen()`方法，以便通过以下方式启动游戏。\n\
  \n```\npublic class MrNom extends AndroidGame {\n    @Override\n    public Screen\
  \ getStartScreen() {\n        return new MainMenu(this);\n    }\n}\n```\n\n我们希望你能理解，在埋头编写实际游戏代码之前，先设计一个可用的框架是多么有益。这个框架可以复用于所有未来对图形性能要求不高的游戏。现在，让我们讨论一下清单\
  \ 5–16，其中展示了`AndroidGame`类。\n\n**清单 5–16.** *AndroidGame.java；整合所有功能*\n\n```\npackage\
  \ com.badlogic.androidgames.framework.impl;\n\nimport android.app.Activity;\nimport\
  \ android.content.Context;\nimport android.content.res.Configuration;\nimport android.graphics.Bitmap;\n\
  import android.graphics.Bitmap.Config;\nimport android.os.Bundle;\nimport android.os.PowerManager;\n\
  import android.os.PowerManager.WakeLock;\nimport android.view.Window;\nimport android.view.WindowManager;\n\
  \nimport com.badlogic.androidgames.framework.Audio;\nimport com.badlogic.androidgames.framework.FileIO;\n\
  import com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Graphics;\n\
  import com.badlogic.androidgames.framework.Input;\nimport com.badlogic.androidgames.framework.Screen;\n\
  \npublic abstract class AndroidGame extends Activity implements Game {\n    AndroidFastRenderView\
  \ renderView;\n    Graphics graphics;\n    Audio audio;\n    Input input;\n    FileIO\
  \ fileIO;\n    Screen screen;\n    WakeLock wakeLock;\n```\n\n类定义首先让`AndroidGame`继承`Activity`类并实现`Game`接口。接下来，我们定义几个应该已经熟悉的成员变量。第一个成员是`AndroidFastRenderView`，用于绘制图形，并管理我们的主循环线程。当然，我们将`Graphics`、`Audio`、`Input`和`FileIO`成员分别设置为`AndroidGraphics`、`AndroidAudio`、`AndroidInput`和`AndroidFileIO`的实例。下一个成员变量保存当前活动的`Screen`。最后，还有一个成员变量持有`WakeLock`，用于防止屏幕变暗。\n\
  \n```\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n  \
  \      super.onCreate(savedInstanceState);\n\n        requestWindowFeature(Window.FEATURE_NO_TITLE);\n\
  \        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,\n    \
  \            WindowManager.LayoutParams.FLAG_FULLSCREEN);\n\n        boolean isLandscape\
  \ = getResources().getConfiguration().orientation ==\n            Configuration.ORIENTATION_LANDSCAPE;\n\
  \        int frameBufferWidth = isLandscape ? 480 : 320;\n        int frameBufferHeight\
  \ = isLandscape ? 320 : 480;\n        Bitmap frameBuffer = Bitmap.createBitmap(frameBufferWidth,\n\
  \                frameBufferHeight, Config.RGB_565);\n\n        float scaleX = (float)\
  \ frameBufferWidth\n                / getWindowManager().getDefaultDisplay().getWidth();\n\
  \        float scaleY = (float) frameBufferHeight\n                / getWindowManager().getDefaultDisplay().getHeight();\n\
  \n        renderView = new AndroidFastRenderView(this, frameBuffer);\n        graphics\
  \ = new AndroidGraphics(getAssets(), frameBuffer);\n        fileIO = new AndroidFileIO(getAssets());\n\
  \        audio = new AndroidAudio(this);\n        input = new AndroidInput(this,\
  \ renderView, scaleX, scaleY);\n        screen = getStartScreen();\n        setContentView(renderView);\n\
  \n        PowerManager powerManager = (PowerManager)\n            getSystemService(Context.POWER_SERVICE);\n\
  \        wakeLock = powerManager.newWakeLock(PowerManager.FULL_WAKE_LOCK, \"GLGame\"\
  );\n    }\n```\n\n`onCreate()`方法是`Activity`类熟悉的启动方法，按照要求首先调用基类的`onCreate()`方法。接下来，我们将`Activity`设置为全屏，就像上一章其他几个测试那样。在接下来的几行代码中，我们设置人工帧缓冲。根据活动的方向，我们要么使用\
  \ 320×480 的帧缓冲（竖屏模式），要么使用 480×320 的帧缓冲（横屏模式）。为了确定`Activity`的屏幕方向，我们从`Configuration`类获取方向成员，该类通过调用`getResources().getConfiguration()`获得。基于该成员的值，我们设置帧缓冲大小并实例化一个`Bitmap`，在后续章节中将其传递给`AndroidFastRenderView`和`AndroidGraphics`实例。\n\
  \n**注意：** `Bitmap`实例采用`RGB565`颜色格式。这样既能节省内存，又能使绘图速度稍快。\n\n我们还计算了`scaleX`和`scaleY`值，`SingleTouchHandler`和`MultiTouchHandler`类将使用这些值，将触摸事件坐标转换到我们固定的坐标系中。\n\
  \n接下来，我们用必要的构造函数参数实例化`AndroidFastRenderView`、`AndroidGraphics`、`AndroidAudio`、`AndroidInput`和`AndroidFileIO`。最后，我们调用游戏将实现的`getStartScreen()`方法，并将`AndroidFastRenderView`设置为`Activity`的内容视图。当然，之前实例化的所有辅助类都会在后台完成更多工作。例如，`AndroidInput`类会通知选定的触摸处理程序与`AndroidFastRenderView`通信。\n\
  \n```\n    @Override\n    public void onResume() {\n        super.onResume();\n\
  \        wakeLock.acquire();\n        screen.resume();\n        renderView.resume();\n\
  \    }\n```\n\n接下来是我们重写的`Activity`类的`onResume()`方法。像往常一样，第一件事是调用父类方法。接着，我们获取`WakeLock`，并确保通知当前`Screen`游戏（以及活动）已恢复。最后，我们通知`AndroidFastRenderView`恢复渲染线程，这也会启动游戏的主循环，在该循环中，我们在每次迭代时通知当前`Screen`进行更新和呈现。\n\
  \n```\n    @Override\n    public void onPause() {\n        super.onPause();\n  \
  \      wakeLock.release();\n        renderView.pause();\n        screen.pause();\n\
  \n        if (isFinishing())\n            screen.dispose();\n    }\n```\n\n\n\n\
  ```markdown\n首先，`onPause()`方法再次调用父类方法。接着，它释放了`WakeLock`并确保渲染线程已终止。如果在调用当前`Screen`的`onPause()`之前没有终止线程，我们可能会遇到并发问题，因为\
  \ UI 线程和主循环线程会同时访问`Screen`。一旦确定主循环线程不再存活，我们便会通知当前`Screen`暂停自身。如果`Activity`即将被销毁，我们也会通知`Screen`，以便它执行必要的清理工作。\n\
  \n```\n    @Override\n    public Input getInput() {\n        return input;\n   \
  \ }\n\n    @Override\n    public FileIO getFileIO() {\n        return fileIO;\n\
  \    }\n\n    @Override\n    public Graphics getGraphics() {\n        return graphics;\n\
  \    }\n\n    @Override\n    public Audio getAudio() {\n        return audio;\n\
  \    }\n```\n\n`getInput()`、`getFileIO()`、`getGraphics()`和`getAudio()`方法无需解释。我们只需将相应的实例返回给调用者。之后，调用者将始终是游戏中某个`Screen`的实现。\n\
  \n```\n    @Override\n    public void setScreen(Screen screen) {\n        if (screen\
  \ == null)\n            throw new IllegalArgumentException(\"Screen must not be\
  \ null\");\n\n        this.screen.pause();\n        this.screen.dispose();\n   \
  \     screen.resume();\n        screen.update(0);\n        this.screen = screen;\n\
  \    }\n```\n\n起初，我们从`Game`接口继承的`setScreen()`方法看起来很简单。我们从一些传统的空值检查开始，因为我们不能允许一个空的`Screen`。接下来，我们告诉当前`Screen`暂停并释放自身，以便为新`Screen`腾出空间。新的`Screen`被要求恢复自身，并以零增量时间更新一次。最后，我们将`Screen`成员设置为新的`Screen`。\n\
  \n让我们思考一下谁会调用这个方法以及何时调用。在设计 Mr. Nom 时，我们确定了各个`Screen`实例之间的所有转换。我们通常会在这些`Screen`实例之一的`update()`方法中调用`AndroidGame.setScreen()`方法。\n\
  \n例如，假设我们有一个主菜单`Screen`，在`update()`方法中检查「开始」按钮是否被按下。如果是这种情况，我们将通过在`MainMenu.update()`方法中调用`AndroidGame.setScreen()`方法来转换到下一个`Screen`，并传入该下一个`Screen`的全新实例。`MainMenu`屏幕将在调用`AndroidGame.setScreen()`后重新获得控制权，并且应立即返回给调用者，因为它不再是活动`Screen`。在这种情况下，调用者是主循环线程中的`AndroidFastRenderView`。如果你检查负责更新和渲染活动`Screen`的主循环部分，你会看到`update()`方法将在`MainMenu`类上被调用，但`present()`方法将在新的当前`Screen`上被调用。这会带来问题，因为我们定义`Screen`接口的方式保证了在要求`Screen`呈现自身之前，`resume()`和`update()`方法至少会被调用一次。这就是为什么我们在`AndroidGame.setScreen()`方法中对新的`Screen`调用这两个方法。`AndroidGame`类负责一切。\n\
  \n```\n    public Screen getCurrentScreen() {\n        return screen;\n    }\n}\n\
  ```\n\n最后一个方法是`getCurrentScreen()`方法，它简单地返回当前活动的`Screen`。\n\n最后，请记住`AndroidGame`派生自`Game`，后者还有另一个名为`getStartScreen()`的方法。这是我们必须实现的方法，以启动我们的游戏！\n\
  \n现在，我们已经创建了一个易于使用的 Android 游戏开发框架。我们所要做的就是实现我们游戏的`Screen`。我们也可以在未来任何图形需求不高的游戏中重用这个框架。如果需要强大的图形能力，我们必须使用\
  \ OpenGL ES。然而，要做到这一点，我们只需要替换框架中的图形部分。所有其他用于音频、输入和文件 I/O 的类都可以重用。\n\n### 总结\n\n\
  在本章中，我们从头实现了一个功能完善的 2D Android 游戏开发框架，它可以被重用于未来的所有游戏（只要它们图形需求不大）。我们非常注重实现良好、可扩展的设计。我们可以使用这段代码，并用\
  \ OpenGL ES 替换其渲染部分，从而使 Mr. Nom 3D 化。\n\n有了所有这些样板代码，让我们专注于我们在这里的真正目的：编写游戏！\n\n##\
  \ 第 6 章\n\n## Mr. Nom 入侵 Android\n\n在第 3 章中，我们为 Mr. Nom 制定了完整的设计，包括游戏机制、简单的背景故事、手工制作的图形资源，以及基于一些纸模的所有屏幕定义。在上一章中，我们开发了一个完整的游戏开发框架，使我们能够轻松地将设计的屏幕转化为代码。但言归正传，让我们开始编写我们的第一个游戏吧！\n\
  \n### 创建资源\n\nMr. Nom 中有两种类型的资源：音频资源和图形资源。我们通过一个名为 Audacity 的优秀开源应用程序和一个糟糕的上网本麦克风录制了音频资源。我们创建了一个音效，在按下按钮或选择菜单项时播放，一个在\
  \ Mr. Nom 吃掉污渍时播放，还有一个在他吃掉自己时播放。我们将它们保存为 OGG 格式放到`assets/`文件夹中，文件名分别为`click.ogg`、`eat.ogg`和`bitten.ogg`。\n\
  \n早些时候，我们提到过希望将设计阶段的纸模作为我们真实的游戏图形来重用。为此，我们首先需要使它们符合我们的目标分辨率。\n\n我们选择了一个固定的目标分辨率\
  \ 320×480（竖屏模式），并以此设计我们所有的图形资源。这看起来可能很小，但它让我们能够非常快速和轻松地开发游戏和图形，毕竟重点是让你了解整个 Android\
  \ 游戏开发过程。\n\n对于你的商业游戏，请考虑所有分辨率并使用更高分辨率的图形，以便你的游戏在平板大小的屏幕上看起来效果良好，或许以 800×1280 作为基准。我们扫描了所有纸模并稍微调整了它们的大小。我们将大部分资源保存为单独的文件，并将其中一些合并到一个文件中。所有图像都以\
  \ PNG 格式保存。背景是唯一采用 RGB888 格式的图像；其他所有图像都是 ARGB8888 格式。图 6-1 展示了我们最终得到的结果。\n\n![images](img/0601.jpg)\n\
  \n**图 6-1.** *Mr. Nom 的所有图形资源及其各自的文件名和像素尺寸。*\n\n让我们详细分解一下这些图像：\n```\n\n\n\n> `background.png`：这是我们的背景图片，我们将首先把它绘制到帧缓冲区。显然，它与我们的目标分辨率尺寸相同。\n\
  > `buttons.png`：包含游戏中所需的所有按钮。我们将它们放在一个文件中，因为可以通过 `Graphics.drawPixmap()` 方法轻松绘制，该方法支持绘制图像的一部分。在开始使用\
  \ OpenGL ES 绘制时，我们会更频繁地使用这种技巧，所以最好现在就习惯它。将多张图像合并为一张的做法常被称为*图集化*，而合并后的图像则称为*图像图集*（或纹理图集、精灵表）。每个按钮尺寸为\
  \ 64×64 像素，这在判断触摸事件是否按到了屏幕上的按钮时会非常有用。\n> `help1.png`、`help2.png` 和 `help3.png`：这些图像将显示在\
  \ Mr. Nom 的三个帮助屏幕上。它们的尺寸相同，这样更容易在屏幕上进行布局。\n> `logo.png`：这是将在主菜单屏幕上显示的标志。\n> `mainmenu.png`：包含我们在主菜单上向玩家展示的三个选项。选择其中一个将触发跳转到相应屏幕。每个选项高度约为\
  \ 42 像素，这有助于我们轻松检测到哪个选项被触摸。\n> `ready.png`、`pause.png` 和 `gameover.png`：当游戏即将开始、暂停或结束时，我们将绘制这些图像。\n\
  > `numbers.png`：包含后续渲染高分所需的所有数字。需要注意的是，除末尾的点（10×32 像素）外，每个数字的宽高均为 20×32 像素。这可以用来渲染任何给定的数字。\n\
  > `tail.png`：这是 Mr. Nom 的尾巴，更准确地说，是尾巴的一部分。其尺寸为 32×32 像素，这将对后续实现产生一些影响，我们稍后会讨论。\n\
  > `headdown.png`、`headleft.png`、`headright.png` 和 `headup.png`：这些是 Mr. Nom 头部的图像，每个方向对应一个。因为它的帽子，这些图像需要比尾巴图像稍大一些。每个头部图像尺寸为\
  \ 42×42 像素。\n> `stain1.png`、`stain2.png` 和 `stain3.png`：这是三种可渲染的污渍类型。拥有三种类型能让游戏画面更丰富。它们与尾巴图像一样，尺寸为\
  \ 32×32 像素。\n\n很好，现在开始实现各个屏幕吧！\n\n### 设置项目\n\n如上一章所述，我们将把 Mr. Nom 的代码与框架代码合并。所有与\
  \ Mr. Nom 相关的类都将放在 `com.badlogic.androidgames.mrnom` 包中。此外，我们还需要按照第 4 章的说明修改清单文件。我们的默认\
  \ Activity 将命名为 `MrNomGame`。只需按照第 4 章中“十个简单步骤设置 Android 游戏项目”部分的十个步骤操作，正确设置 `<activity>`\
  \ 属性（即确保游戏固定为竖屏模式，并且配置变化由应用程序处理），并为应用授予适当的权限（写入外部存储、使用唤醒锁等）。\n\n上一节中的所有资源都位于项目的\
  \ `assets/` 文件夹中。此外，我们还需要将 `icon.png` 文件放入 `res/drawable`、`res/drawable-ldpi`、`res/drawable-mdpi`\
  \ 和 `res/drawable-hdpi` 文件夹中。我们直接使用了 Mr. Nom 的 `headright.png`，将其重命名为 `icon.png`，并将适当调整大小后的版本放入各个文件夹。\n\
  \n剩下的工作就是将游戏代码放入 Eclipse 项目的 `com.badlogic.androidgames.mrnom` 包中！\n\n### MrNomGame：主\
  \ Activity\n\n我们的应用需要一个主入口点，在 Android 中即默认的 `Activity`。我们将这个默认 `Activity` 命名为 `MrNomGame`，并让它继承自\
  \ `AndroidGame`（我们在第 5 章中为实现游戏运行而创建的类）。它将负责创建和运行第一个屏幕。代码清单 6-1 展示了我们的 `MrNomGame`\
  \ 类。\n\n**代码清单 6-1.** *MrNomGame.java；主 Activity/游戏混合体*\n\n```\npackage com.badlogic.androidgames.mrnom;\n\
  \nimport com.badlogic.androidgames.framework.Screen;\nimport com.badlogic.androidgames.framework.impl.AndroidGame;\n\
  \npublic class MrNomGame extends AndroidGame {\n    @Override\n    public Screen\
  \ getStartScreen() {\n        return new LoadingScreen(this);\n    }\n}\n```\n\n\
  我们只需要继承 `AndroidGame` 并实现 `getStartScreen()` 方法，该方法将返回一个 `LoadingScreen` 类的实例（我们稍后实现）。记住，这将让我们启动游戏所需的一切：从设置音频、图形、输入和文件\
  \ I/O 等不同模块，到启动主循环线程。非常简单，对吧？\n\n### Assets：便捷的资源存储\n\n加载屏幕将加载游戏的所有资源。但我们将它们存储在哪里呢？我们会采用一种在\
  \ Java 领域不太常见的做法：创建一个包含大量静态公有成员的类，用于保存从资源中加载的所有 `Pixmap` 和 `Sound`。代码清单 6-2 展示了这个类。\n\
  \n**代码清单 6-2.** *Assets.java；保存所有 Pixmap 和 Sound 以便轻松访问*\n\n```\npackage com.badlogic.androidgames.mrnom;\n\
  \nimport com.badlogic.androidgames.framework.Pixmap;\nimport com.badlogic.androidgames.framework.Sound;\n\
  \npublic class Assets {\n    public static Pixmap background;\n    public static\
  \ Pixmap logo;\n    public static Pixmap mainMenu;\n    public static Pixmap buttons;\n\
  \    public static Pixmap help1;\n    public static Pixmap help2;\n    public static\
  \ Pixmap help3;\n    public static Pixmap numbers;\n    public static Pixmap ready;\n\
  \    public static Pixmap pause;\n    public static Pixmap gameOver;\n    public\
  \ static Pixmap headUp;\n    public static Pixmap headLeft;\n    public static Pixmap\
  \ headDown;\n    public static Pixmap headRight;\n    public static Pixmap tail;\n\
  \    public static Pixmap stain1;\n    public static Pixmap stain2;\n    public\
  \ static Pixmap stain3;\n\n    public static Sound click;\n    public static Sound\
  \ eat;\n    public static Sound bitten;\n}\n```\n\n我们从资源中加载的每张图像和每个声音都有一个对应的静态成员。如果想使用某个资源，可以这样操作：\n\
  \n`game.getGraphics().drawPixmap(Assets.background, 0, 0)`\n\n或者这样：\n\n`Assets.click.play(1);`\n\
  \n这样非常方便。但需要注意的是，由于这些静态成员未被声明为 `final`，因此无法防止被覆盖。只要我们不覆盖它们，就是安全的。实际上，这些公有的非 final\
  \ 成员使得这种“设计模式”成了一种反模式。不过对于我们的游戏来说，稍微偷懒是可以接受的。更干净的解决方案是将资源隐藏在所谓的*单例类*的 setter 和 getter\
  \ 后面。我们就坚持使用这种“穷人的资源管理器”吧。\n\n\n\n### 设置：追踪用户选择与最高分\n\n在加载界面中，我们还需要加载另外两部分内容：用户设置与最高分。回顾一下第\
  \ 3 章中的主菜单和最高分屏幕，你会发现我们允许用户切换音效开关，并存储了前五名的最高分。我们将把这些设置保存到外部存储器中，以便游戏下次启动时能重新加载它们。为此，我们将实现另一个简单的类，命名为\
  \ `Settings`，如代码清单 6-3 所示。\n\n**代码清单 6-3.** *Settings.java；用于存储设置并执行加载/保存操作*\n\n\
  ```java\npackage com.badlogic.androidgames.mrnom;\n\nimport java.io.BufferedReader;\n\
  import java.io.BufferedWriter;\nimport java.io.IOException;\nimport java.io.InputStreamReader;\n\
  import java.io.OutputStreamWriter;\n\nimport com.badlogic.androidgames.framework.FileIO;\n\
  \npublic class Settings {\n    public static boolean soundEnabled = true;\n    public\
  \ static int[] highscores = new int[] { 100, 80, 50, 30, 10 };\n```\n\n音效是否播放由一个名为\
  \ `soundEnabled` 的公共静态布尔值决定。最高分则存储在一个包含五个元素的整型数组中，按从高到低排序。我们为这两项设置都定义了合理的默认值。访问这两个成员的方式与访问\
  \ `Assets` 类的成员相同。\n\n```java\n    public static void load(FileIO files) {\n   \
  \     BufferedReader in = null;\n        try {\n            in = new BufferedReader(new\
  \ InputStreamReader(\n                    files.readFile(\".mrnom\")));\n      \
  \      soundEnabled = Boolean.parseBoolean(in.readLine());\n            for (int\
  \ i = 0; i < 5; i++) {\n                highscores[i] = Integer.parseInt(in.readLine());\n\
  \            }\n        } catch (IOException e) {\n            // :( 没关系，我们有默认值\n\
  \        } catch (NumberFormatException e) {\n            // :/ 没关系，默认值能解决问题\n \
  \       } finally {\n            try {\n                if (in != null)\n      \
  \              in.close();\n            } catch (IOException e) {\n            }\n\
  \        }\n    }\n```\n\n静态方法 `load()` 会尝试从外部存储中一个名为 `.mrnom` 的文件加载设置。为此，它需要一个\
  \ `FileIO` 实例，我们将其作为参数传入该方法。该方法假设音效设置和每条最高分记录都分别存储在不同的行中，并直接读取它们。如果过程中出现任何问题（例如外部存储不可用或尚无设置文件），我们就会回退到默认值，并忽略这个失败情况。\n\
  \n```java\n    public static void save(FileIO files) {\n        BufferedWriter out\
  \ = null;\n        try {\n            out = new BufferedWriter(new OutputStreamWriter(\n\
  \                    files.writeFile(\".mrnom\")));\n            out.write(Boolean.toString(soundEnabled));\n\
  \            for (int i = 0; i < 5; i++) {\n                out.write(Integer.toString(highscores[i]));\n\
  \            }\n        } catch (IOException e) {\n        } finally {\n       \
  \     try {\n                if (out != null)\n                    out.close();\n\
  \            } catch (IOException e) {\n            }\n        }\n    }\n```\n\n\
  接下来是一个名为 `save()` 的方法。它会获取当前设置，并将其序列化到外部存储的 `.mrnom` 文件（即 `/sdcard/.mrnom`）中。音效设置和每条最高分记录都以单独的行存储在该文件中，正如\
  \ `load()` 方法所期望的那样。如果出现任何问题，我们会忽略该失败，并使用之前定义的默认值。在一款 3A 级大作中，你可能需要将这种加载错误告知用户。\n\
  \n值得注意的是，在 Android API 8 中，新增了一些更具体的方法来处理托管的外部存储。例如，新增了 `Context.getExternalFilesDir()`\
  \ 方法，它会在外部存储中提供一个特定位置，不会污染 SDCard 或内部闪存的根目录，并且在卸载应用程序时也会被清理。当然，要添加对此的支持，意味着你需要在\
  \ API 8 及以上版本动态加载类，或者将最低 SDK 版本设为 8 并失去向后兼容性。为简单起见，Mr. Nom 将使用旧版的 API 1 外部存储位置。但如果你需要一个如何动态加载类的示例，我们代码中的\
  \ `TouchHandler` 就是现成的范例。\n\n```java\n    public static void addScore(int score)\
  \ {\n        for (int i = 0; i < 5; i++) {\n            if (highscores[i] < score)\
  \ {\n                for (int j = 4; j > i; j--)\n                    highscores[j]\
  \ = highscores[j - 1];\n                highscores[i] = score;\n               \
  \ break;\n            }\n        }\n    }\n}\n```\n\n最后一个方法 `addScore()` 是一个便捷方法。我们将用它来向最高分列表中添加新的分数，并根据要插入的数值自动重新排序。\n\
  \n\n\n### `LoadingScreen`：从磁盘获取资源\n\n有了这些类，我们现在可以轻松地实现加载界面。代码清单 6–4 展示了相关代码。\n\n\
  **代码清单 6–4.** `LoadingScreen.java`；加载所有资源和设置\n\n```java\npackage com.badlogic.androidgames.mrnom;\n\
  \nimport com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Graphics;\n\
  import com.badlogic.androidgames.framework.Screen;\nimport com.badlogic.androidgames.framework.Graphics.PixmapFormat;\n\
  \npublic class LoadingScreen extends Screen {\n    public LoadingScreen(Game game)\
  \ {\n        super(game);\n    }\n```\n\n我们让 `LoadingScreen` 类继承自第 3 章定义的 `Screen`\
  \ 类。这要求我们实现一个接收 `Game` 实例的构造函数，并将其传递给父类构造函数。请注意，这个构造函数将在我们之前定义的 `MrNomGame.getStartScreen()`\
  \ 方法中被调用。\n\n```java\n    @Override\n    public void update(float deltaTime) {\n\
  \        Graphics g = game.getGraphics();\n        Assets.background = g.newPixmap(\"\
  background.png\", PixmapFormat.RGB565);\n        Assets.logo = g.newPixmap(\"logo.png\"\
  , PixmapFormat.ARGB4444);\n        Assets.mainMenu = g.newPixmap(\"mainmenu.png\"\
  , PixmapFormat.ARGB4444);\n        Assets.buttons = g.newPixmap(\"buttons.png\"\
  , PixmapFormat.ARGB4444);\n        Assets.help1 = g.newPixmap(\"help1.png\", PixmapFormat.ARGB4444);\n\
  \        Assets.help2 = g.newPixmap(\"help2.png\", PixmapFormat.ARGB4444);\n   \
  \     Assets.help3 = g.newPixmap(\"help3.png\", PixmapFormat.ARGB4444);\n      \
  \  Assets.numbers = g.newPixmap(\"numbers.png\", PixmapFormat.ARGB4444);\n     \
  \   Assets.ready = g.newPixmap(\"ready.png\", PixmapFormat.ARGB4444);\n        Assets.pause\
  \ = g.newPixmap(\"pausemenu.png\", PixmapFormat.ARGB4444);\n        Assets.gameOver\
  \ = g.newPixmap(\"gameover.png\", PixmapFormat.ARGB4444);\n        Assets.headUp\
  \ = g.newPixmap(\"headup.png\", PixmapFormat.ARGB4444);\n        Assets.headLeft\
  \ = g.newPixmap(\"headleft.png\", PixmapFormat.ARGB4444);\n        Assets.headDown\
  \ = g.newPixmap(\"headdown.png\", PixmapFormat.ARGB4444);\n        Assets.headRight\
  \ = g.newPixmap(\"headright.png\", PixmapFormat.ARGB4444);\n        Assets.tail\
  \ = g.newPixmap(\"tail.png\", PixmapFormat.ARGB4444);\n        Assets.stain1 = g.newPixmap(\"\
  stain1.png\", PixmapFormat.ARGB4444);\n        Assets.stain2 = g.newPixmap(\"stain2.png\"\
  , PixmapFormat.ARGB4444);\n        Assets.stain3 = g.newPixmap(\"stain3.png\", PixmapFormat.ARGB4444);\n\
  \        Assets.click = game.getAudio().newSound(\"click.ogg\");\n        Assets.eat\
  \ = game.getAudio().newSound(\"eat.ogg\");\n        Assets.bitten = game.getAudio().newSound(\"\
  bitten.ogg\");\n        Settings.load(game.getFileIO());\n        game.setScreen(new\
  \ MainMenuScreen(game));\n    }\n```\n\n接下来是我们对 `update()` 方法的实现，在该方法中加载资源和设置。对于图像资源，我们只需通过\
  \ `Graphics.newPixmap()` 方法创建新的 `Pixmap`。请注意，我们指定了 `Pixmap` 应使用的颜色格式。背景采用 `RGB565`\
  \ 格式，而所有其他图像采用 `ARGB4444` 格式（如果 `BitmapFactory` 遵循我们的提示）。这样做是为了节省内存，并在后续操作中提升渲染速度。我们的原始图像以\
  \ PNG 格式存储，使用 `RGB888` 和 `ARGB8888` 格式。我们还加载了三种音效，并将它们存储在 `Assets` 类的相应成员中。接着，我们通过\
  \ `Settings.load()` 方法从外部存储加载设置。最后，我们触发画面切换，跳转至名为 `MainMenuScreen` 的 `Screen`，该画面将从此节点接管执行。\n\
  \n```java\n    @Override\n    public void present(float deltaTime) {\n\n    }\n\n\
  \    @Override\n    public void pause() {\n\n    }\n\n    @Override\n    public\
  \ void resume() {\n\n    }\n\n    @Override\n    public void dispose() {\n\n   \
  \ }\n}\n```\n\n其他方法只是存根，不执行任何操作。由于 `update()` 方法会在所有资源加载完成后立即触发画面切换，因此在此画面中无需执行其他操作。\n\
  \n\n\n### 主菜单界面\n\n主菜单界面相当简单。它只负责渲染 Logo、主菜单选项和音效设置开关按钮。其全部功能就是对主菜单选项或音效设置开关按钮的触摸做出响应。要实现这一行为，我们需要知道两件事：在屏幕的哪个位置渲染图像，以及哪些触摸区域会触发界面切换或音效设置的开关。\
  \ 图 6-2 展示了我们在屏幕上渲染不同图像的位置。由此我们可以直接推导出触摸区域。\n\n![images](img/0602.jpg)\n\n**图 6-2.**\
  \ *主菜单界面。坐标指定了不同图像的渲染位置，轮廓线则标明了触摸区域。*\n\nLogo 和主菜单选项图像的 x 坐标经过计算，确保其在 x 轴上居中。\n\n\
  接下来，让我们实现`Screen`。 代码清单 6-5 展示了相关代码。\n\n**代码清单 6-5.** *MainMenuScreen.java；主菜单界面*\n\
  \n```\npackage com.badlogic.androidgames.mrnom;\n\nimport java.util.List;\n\nimport\
  \ com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Graphics;\n\
  import com.badlogic.androidgames.framework.Input.TouchEvent;\nimport com.badlogic.androidgames.framework.Screen;\n\
  \npublic class MainMenuScreen extends Screen {\n    public MainMenuScreen(Game game)\
  \ {\n        super(game);\n    }\n```\n\n我们让这个类再次继承自`Screen`，并为其实现一个合适的构造函数。\n\n\
  ```\n    @Override\n    public void update(float deltaTime) {\n        Graphics\
  \ g = game.getGraphics();\n        List<TouchEvent> touchEvents = game.getInput().getTouchEvents();\n\
  \        game.getInput().getKeyEvents();\n\n        int len = touchEvents.size();\n\
  \        for (int i = 0; i < len; i++) {\n            TouchEvent event = touchEvents.get(i);\n\
  \            if (event.type == TouchEvent.TOUCH_UP) {\n                if (inBounds(event,\
  \ 0, g.getHeight() - 64, 64, 64)) {\n                    Settings.soundEnabled =\
  \ !Settings.soundEnabled;\n                    if (Settings.soundEnabled)\n    \
  \                    Assets.click.play(1);\n                }\n                if\
  \ (inBounds(event, 64, 220, 192, 42)) {\n                    game.setScreen(new\
  \ GameScreen(game));\n                    if (Settings.soundEnabled)\n         \
  \               Assets.click.play(1);\n                    return;\n           \
  \     }\n                if (inBounds(event, 64, 220 + 42, 192, 42)) {\n       \
  \             game.setScreen(new HighscoreScreen(game));\n                    if\
  \ (Settings.soundEnabled)\n                        Assets.click.play(1);\n     \
  \               return;\n                }\n                if (inBounds(event,\
  \ 64, 220 + 84, 192, 42)) {\n                    game.setScreen(new HelpScreen(game));\n\
  \                    if (Settings.soundEnabled)\n                        Assets.click.play(1);\n\
  \                    return;\n                }\n            }\n        }\n    }\n\
  ```\n\n接下来是`update()`方法，我们将在其中完成所有触摸事件检查。首先，我们从`Game`提供的`Input`实例中获取`TouchEvent`和`KeyEvent`。请注意，我们并没有使用`KeyEvent`，但为了清理内部缓冲区，我们还是将其取出（这确实有点不优雅，但让我们养成这个习惯）。然后，我们遍历所有`TouchEvent`，直到找到一个类型为`TouchEvent.TOUCH_UP`的事件。（我们也可以选择查找`TouchEvent.TOUCH_DOWN`事件，但在大多数\
  \ UI 中，使用 up 事件来表示某个 UI 组件被按下。）\n\n一旦找到合适的事件，我们就检查它是否按下了音效开关按钮或某个菜单条目。为了让代码更简洁，我们编写了一个名为`inBounds()`的方法，该方法接收一个触摸事件、x\
  \ 和 y 坐标以及宽度和高度。该方法检查触摸事件是否位于由这些参数定义的矩形内，并返回`true`或`false`。\n\n如果按下了音效开关按钮，我们只需反转`Settings.soundEnabled`布尔值。如果按下了任何主菜单条目，我们会实例化相应界面并通过`Game.setScreen()`进行设置，从而切换到该界面。在这种情况下，我们可以立即返回，因为`MainMenuScreen`已无需再做任何操作。如果开关按钮或主菜单条目被按下，并且音效已启用，我们还会播放点击音效。\n\
  \n请记住，得益于我们在第 5 章中讨论的触摸事件处理程序所执行的缩放魔法，所有触摸事件都将相对于我们 320×480 像素的目标分辨率进行报告。\n\n```\n\
  \    private boolean inBounds(TouchEvent event, int x, int y, int width, int height)\
  \ {\n        if (event.x > x && event.x < x + width - 1 &&\n            event.y\
  \ > y && event.y < y + height - 1)\n            return true;\n        else\n   \
  \         return false;\n    }\n```\n\n`inBounds()`方法的运作方式如前所述：传入一个`TouchEvent`和一个矩形，它将告诉你该触摸事件的坐标是否位于该矩形内。\n\
  \n```\n    @Override\n    public void present(float deltaTime) {\n        Graphics\
  \ g = game.getGraphics();\n\n        g.drawPixmap(Assets.background, 0, 0);\n  \
  \      g.drawPixmap(Assets.logo, 32, 20);\n        g.drawPixmap(Assets.mainMenu,\
  \ 64, 220);\n        if (Settings.soundEnabled)\n            g.drawPixmap(Assets.buttons,\
  \ 0, 416, 0, 0, 64, 64);\n        else\n            g.drawPixmap(Assets.buttons,\
  \ 0, 416, 64, 0, 64, 64);\n    }\n```\n\n`present()`方法可能是你最期待的方法，但它其实并不激动人心。我们的小游戏框架使得渲染主菜单界面变得非常简单。我们只需在坐标(0,0)处渲染背景，这基本上会清空我们的帧缓冲区，因此无需调用`Graphics.clear()`。接下来，我们按照图\
  \ 6-2 所示的坐标绘制 Logo 和主菜单条目。最后，我们根据当前设置绘制音效开关按钮。如你所见，我们使用了同一个`Pixmap`，但只绘制了它合适的部分（音效开关按钮；参见图\
  \ 6-1）。就这么简单。\n\n```\n    @Override\n    public void pause() {\n        Settings.save(game.getFileIO());\n\
  \    }\n```\n\n最后需要讨论的部分是`pause()`方法。由于我们可以在此界面更改一项设置，因此必须确保将其持久化到外部存储设备。有了我们的`Settings`类，这变得相当简单！\n\
  \n```\n    @Override\n    public void resume() {\n\n    }\n\n    @Override\n   \
  \ public void dispose() {\n\n    }\n}\n```\n\n`resume()`和`dispose()`方法在此`Screen`中无需执行任何操作。\n\
  \n\n\n### `HelpScreen` 类（系列）\n\n接下来，我们将实现之前在 `update()` 方法中用到的 `HelpScreen`、`HighscoreScreen`\
  \ 和 `GameScreen` 类。\n\n我们在第 3 章中定义了三个帮助屏幕，每个屏幕大致解释游戏玩法的一个方面。现在，我们直接将其转化为名为 `HelpScreen`、`HelpScreen2`\
  \ 和 `HelpScreen3` 的 `Screen` 实现。它们都有一个按钮，用于触发屏幕切换。`HelpScreen3` 屏幕将切回 `MainMenuScreen`。图\
  \ 6-3 展示了三个帮助屏幕及其绘制坐标和触摸区域。\n\n![images](img/0603.jpg)\n\n**图 6-3.** *三个帮助屏幕、绘制坐标和触摸区域。*\n\
  \n这看起来实现起来相当简单。让我们从代码清单 6-6 所示的 `HelpScreen` 类开始。\n\n**代码清单 6-6.** *`HelpScreen.java`;\
  \ 第一个帮助屏幕*\n\n```\npackage com.badlogic.androidgames.mrnom;\n\nimport java.util.List;\n\
  \nimport com.badlogic.androidgames.framework.Game;\nimport com.badlogic.androidgames.framework.Graphics;\n\
  import com.badlogic.androidgames.framework.Input.TouchEvent;\nimport com.badlogic.androidgames.framework.Screen;\n\
  \npublic class HelpScreen extends Screen {\n    public HelpScreen(Game game) {\n\
  \        super(game);\n    }\n\n    @Override\n    public void update(float deltaTime)\
  \ {\n        List<TouchEvent> touchEvents = game.getInput().getTouchEvents();\n\
