    on your database:


    ![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig5_HTML.jpg)


    2 screenshots of a mobile screen and the cloud firestore pane on firebase. The
    screen has a post section with text, hello there. The pane has the posts option
    and a document highlighted under the data tab in the panel view.


    Figure 5-5


    Firebase Firestore console and application running


    Great, we have published data to Firestore with a text and the current date from
    our iPhone. It is now time to present this data that we just added.


    For this, we will use a nice Firebase wrapper. First, add the following framework
    in the *FeedView*:


    ```

    import FirebaseFirestoreSwift

    ```


    Then, add the following code in the *FeedView*, right over the body variable:


    ```

    @FirestoreQuery(collectionPath: "Posts")

    var posts: [Post]

    ```


    This way, we don’t even need to implement a function inside our View Model. This
    is a great feature from Firebase APIs. It allows us to fetch data with only one
    line of code by just passing our Model together with the name we used for our
    Firebase collection.


    Replace the current list in the `FeedView` with the following one:


    ```

    List(posts) { posts in

    VStack(alignment: .leading) {

    VStack {

    Text(posts.description ?? "")

    .font(.headline)

    .padding(12)

    Text("Published on the \(posts.datePublished?.formatted() ?? "")")

    .font(.caption)

    }

    }.frame(minHeight: 100, maxHeight: 350)

    }

    ```


    The *formatted()* modifier allows us to transform a data of type Date to `String`.
    This way, we can easily display a date in our application.


    You can now run your application, and this will present the posts that you posted
    in a nice list.


    ![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig6_HTML.jpg)


    A screenshot of a window has the feed view selected from the panel on the left.
    It has several lines of code in the pane under socially on the right and a mobile
    screen with a hello there message on the extreme right.


    Figure 5-6


    Figure of the list


    ## Summary


    This chapter was pretty like Chapter [3](#533376_1_En_3_Chapter.xhtml) with a
    large model and an introduction to a new property wrapper from Firebase that made
    our life much easier.


    We have seen how to handle not only data of type String but also Date. But we
    are not done with Firestore yet!


    In this next chapter, we will still be using it to retrieve an image after we
    have uploaded it to our Storage. Let’s discover how to handle large assets with
    Firebase.


    You can have a look at the project at the following link, if you have lost something
    on the way:


    *   [*https://drive.google.com/drive/folders/1_qrKo171QkgGHMuX4vDsbPzi36xoXci4?usp=share_link*](https://drive.google.com/drive/folders/1_qrKo171QkgGHMuX4vDsbPzi36xoXci4%253Fusp%253Dshare_link)


    # 6. Manage Pictures with Firebase Storage


    We are looking to include pictures in our posts. The problem is the following:
    *Firestore* doesn’t support such large documents. We can only add text, numbers,
    arrays, Booleans, timestamps, etc.


    Therefore, Firebase introduced Storage. This is a package that lets us upload
    and download large data such as video, images, and audio documents. Through this
    chapter, we are going to see how to upload a picture to Firebase Storage, retrieve
    the URL where this picture is, and add it to the corresponding Firestore document.


    Over this chapter, we will explore how to access the iPhone photo library, upload
    the picture to Storage, and retrieve it inside the Firestore backend. Let’s get
    started!'
  trans: "\n## 使用 Async/Await 调用后端\n\n在我们的应用中，需要上传一些内容——一张图片和一段描述——同时保存日期和时间。问题是：数据上传到服务器可能需要时间，尤其是当图片较大时。\n\
    \n因此，如果采用传统调用方式，用户在图片上传到数据库的几秒钟内会停留在当前屏幕。这并不是良好的用户体验。这就是我们使用此方法的原因：通过异步调用，用户可以安全地导航并`等待`。当他们执行其他操作时，代码会在后台运行。\n\
    \n现在我们已经实现了发布函数，让我们来测试一下！前往`PostView`文件（已在入门项目中创建），并将其与我们的视图模型建立关联：\n\n```\n@ObservedObject\
    \ private var viewModel = PostViewModel()\n```\n\n然后，在我留下注释的按钮内部直接调用它：\n\n```\n\
    // MARK: 将数据发布到 Firestore\nTask {\n    await self.viewModel.addData(description:\
    \ description, datePublished: Date())\n}\n```\n\n如您所见，我们正在保存用户的文本输入。至于日期，我们传入`Date()`，它会获取当前的\
    \ iPhone 日期。目前，我们对图片不做任何处理，因为这将是下一章关于 Firebase Storage 的主题。\n\n此外，我们将函数放在`Task`中，这是必要的，因为需要使用`await`关键字告知程序：这段代码需要在后台运行，因为上传可能需要时间。\n\
    \n现在，我们的前端已经准备好向后端发布数据，但我们尚未设置 Firestore 来接收数据。前往 Firebase 控制台的 Firestore Database\
    \ 部分，点击**创建数据库**。与第 3 章一样，以测试模式启用数据库：\n\n![](img/533376_1_En_5_Fig4_HTML.jpg)\n\
    \n一个 Firebase 窗口的截图，中央是创建数据库对话框。对话框中有用于在生产模式和测试模式下启动的单选按钮，测试模式已被选中，右侧显示代码行。底部右侧有取消和下一步按钮。\n\
    \n**图 5-4** Firestore – 创建数据库\n\n然后，我们可以运行应用并尝试发布一条评论。您应该在数据库中看到它：\n\n![](img/533376_1_En_5_Fig5_HTML.jpg)\n\
    \n手机屏幕和 Firebase 上 Cloud Firestore 面板的 2 张截图。手机屏幕显示一个帖子部分，包含文字“hello there”。该面板在数据选项卡下的面板视图中显示帖子选项和一个高亮显示的文档。\n\
    \n**图 5-5** Firebase Firestore 控制台与运行中的应用\n\n很好，我们已经将带有文本和 iPhone 当前日期的数据发布到了\
    \ Firestore。现在是时候展示我们刚刚添加的这些数据了。\n\n为此，我们将使用一个方便的 Firebase 包装器。首先，在`FeedView`中添加以下框架：\n\
    \n```\nimport FirebaseFirestoreSwift\n```\n\n然后，在`FeedView`的 body 变量上方添加以下代码：\n\
    \n```\n@FirestoreQuery(collectionPath: \"Posts\")\nvar posts: [Post]\n```\n\n\
    这样，我们甚至不需要在视图模型中实现函数。这是 Firebase API 的一个优秀特性。它允许我们仅通过一行代码，传入我们的模型以及 Firebase 集合的名称，就能获取数据。\n\
    \n用以下代码替换`FeedView`中的当前列表：\n\n```\nList(posts) { posts in\n    VStack(alignment:\
    \ .leading) {\n        VStack {\n            Text(posts.description ?? \"\")\n\
    \                .font(.headline)\n                .padding(12)\n            Text(\"\
    Published on the \\(posts.datePublished?.formatted() ?? \"\")\")\n           \
    \     .font(.caption)\n        }\n    }.frame(minHeight: 100, maxHeight: 350)\n\
    }\n```\n\n`formatted()` 修饰符允许我们将`Date`类型的数据转换为`String`。这样，我们就可以在应用中轻松显示日期。\n\n\
    现在您可以运行应用，它将以一个漂亮的列表展示您发布的帖子。\n\n![](img/533376_1_En_5_Fig6_HTML.jpg)\n\n一个窗口的截图，左侧面板选中了\
    \ Feed 视图。右侧“socially”下方的窗格中有几行代码，最右侧是一个手机屏幕，显示“hello there”消息。\n\n**图 5-6** 列表图示\n\
    \n## 总结\n\n本章与第 3 章非常相似，涉及一个大型模型，并引入了 Firebase 的一个新属性包装器，这让我们的生活轻松了许多。\n\n我们学习了如何处理`String`和`Date`类型的数据。但我们对\
    \ Firestore 的操作还未结束！\n\n在下一章中，我们仍将使用它来检索上传到 Storage 后的图片。让我们一起来探索如何使用 Firebase\
    \ 处理大型资源。\n\n如果您在过程中遗漏了什么，可以查看以下链接中的项目：\n\n*   [`drive.google.com/drive/folders/1_qrKo171QkgGHMuX4vDsbPzi36xoXci4?usp=share_link`](https://drive.google.com/drive/folders/1_qrKo171QkgGHMuX4vDsbPzi36xoXci4%253Fusp%253Dshare_link)\n\
    \n# 6. 使用 Firebase Storage 管理图片\n\n我们希望在帖子中包含图片。问题在于：`Firestore`不支持如此大的文档。我们只能添加文本、数字、数组、布尔值、时间戳等类型的数据。\n\
    \n因此，Firebase 引入了 Storage。这是一个允许我们上传和下载大型数据（如视频、图像和音频文档）的软件包。在本章中，我们将学习如何将图片上传到\
    \ Firebase Storage，获取该图片的 URL，并将其添加到对应的 Firestore 文档中。\n\n在本章中，我们将探索如何访问 iPhone\
    \ 的相册库、将图片上传到 Storage，并从 Firestore 后端检索它。让我们开始吧！\n"
- fmt: '# Access the iPhone Camera and Library


    Before uploading a picture, we first need to take one or, at least, let the user
    access the photo library from our application. In iOS 16, Apple introduced a new
    framework for SwiftUI: `PhotosUI`, which will let us select a picture with only
    a few lines of code.


    Head to the `PostView` file, and import the framework:


    ```

    import PhotosUI

    ```


    Once we have access to the framework, we can get access to `PhotosPickerItem`.
    Let’s add the following two variables over the body variable:


    ```

    @State var data: Data?

    @State var selectedItem: [PhotosPickerItem] = []

    ```


    The first variable is to observe the data we pass while selecting a picture. The
    second variable will let us observe what item the user is selecting (which picture).


    It’s now time to implement the user interface. Implement the following section
    inside the SwiftUI `Form` of the `PostView`, right over the two other sections
    already implemented:


    ```

    Section {

    PhotosPicker(selection: $selectedItem, maxSelectionCount: 1, selectionBehavior:
    .default, matching: .images, preferredItemEncoding: .automatic) {

    if let data = data, let image = UIImage(data: data) {

    Image(uiImage: image)

    .resizable()

    .scaledToFit()

    .frame( maxHeight: 300)

    } else {

    Label("Select a picture", systemImage: "photo.on.rectangle.angled")

    }

    }.onChange(of: selectedItem) { newValue in

    guard let item = selectedItem.first else {

    return

    }

    item.loadTransferable(type: Data.self) { result in

    switch result {

    case .success(let data):

    if let data = data {

    self.data = data

    }

    case .failure(let failure):

    print("Error: \(failure.localizedDescription)")

    }

    }

    }

    }

    ```


    Here, we are doing a few things. We are adding the `PhotosPicker` that lets us
    access the user library. We are passing a few things:


    *   `selection` – This is the item variable earlier.

    *   `maxSelectionCount` – We give the ability to only select one picture.

    *   `matching` – From there you can pass a series of things: only video, only
    images, just screenshots, etc. Here we will focus on images only.

    *   `preferredItemEncoding` – Here we left it to automatic, so the system will
    decide itself which resolution is better.


    Then we created a label if there is no image selected; otherwise, we display the
    selected image.


    That’s it to access the photo library and display the image selected. The new
    APIs have made it easy for us to implement this feature. Prior to iOS 16, it was
    necessary to request authorization and implement some code and capabilities in
    Xcode. Here, Apple is handling everything, making it easier for us. You can try
    it out from the `PostView`.


    ![](images/533376_1_En_6_Chapter/533376_1_En_6_Fig1_HTML.jpg)


    3 screenshots of mobile screens for the post with select a picture option, photos
    and albums with a 6 pictures, and post with 1 selected picture.


    **Figure 6-1** Uploading a picture from the library


    ## Upload Pictures to Firebase Storage


    Now that we have access to the pictures, it is time to upload this data in Firebase
    Storage. Let’s head to the Firebase console and select Storage.


    As usual, we need to do a bit of setup. Click *“Get started”* on the following
    screen:


    ![](images/533376_1_En_6_Chapter/533376_1_En_6_Fig2_HTML.jpg)


    A screenshot of a firebase window has the storage option selected from the panel
    on the left. On the right is the socially storage pane with its description, get
    started button, and learn more options.


    **Figure 6-2** “Get started” from Firebase Storage


    Next, you can select the test mode since we are going to secure the database at
    the end of our development phase:


    ![](images/533376_1_En_6_Chapter/533376_1_En_6_Fig3_HTML.jpg)


    A screenshot of a firebase window has the set-up cloud storage dialog box in the
    center. It has radio buttons to start in production mode and start in test mode.
    The start in test mode is selected with several lines of codes on the right and
    the cancel and next buttons at the bottom right.


    **Figure 6-3** Development mode


    Great, we are now ready to receive large assets from our application to the Firebase
    backend. Let’s go back to code! Head to the `PostViewModel` file.


    Import the Storage framework at the top of the file:


    ```

    import FirebaseStorage

    ```


    As usual, we need a reference to the database. Add the following line of code:


    ```

    let storageReference = Storage.storage().reference().child("\(UUID().uuidString)")

    ```


    We need to implement this code to have a reference. We are using the storage APIs,
    and we are passing a Swift powerful feature: `UUID`. It basically creates a unique
    identifier every time it is called. This way, every time we upload an asset, we
    will have a different identifier for every single asset.


    Now that we have a reference, we need to implement the function to upload an asset.
    Let’s first add an additional parameter in the following function we created in
    the previous chapter:


    ```

    func addData(description: String, datePublished: Date)

    ```


    Replace the preceding function with the following:


    ```

    func addData(description: String, datePublished: Date, data: Data)

    ```


    Great, now we can add the function to upload the data and download the URL where
    this image is stored.


    Replace the current function `addData()` with the following:


    ```

    func addData(description: String, datePublished: Date, data: Data) async {

    do {

    _ = try await

    storageReference.putData(data, metadata: nil) { (metadata, error) in

    guard let metadata = metadata else {

    return

    }

    self.storageReference.downloadURL { (url, error) in

    guard let downloadURL = url else {

    // Uh-oh, an error occurred!

    return

    }

    self.databaseReference.addDocument(data: [ "description": description, "datePublished":
    datePublished, "imageURL": downloadURL.absoluteString])

    }

    }

    } catch {

    print(error.localizedDescription)

    }

    }

    ```


    Here we have added two important functions:


    *   `putData` – This basically takes the asset we have selected and upload it
    to the Firebase backend.

    *   `downloadURL` – This is responsible for grabbing the URL where the asset has
    been in the Firebase backend. This way, we are using this URL while passing the
    data to Firestore with `downloadURL.absoluteString`.'
