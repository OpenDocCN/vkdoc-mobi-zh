    when you call it.


    In case you lose this file for some reason, you can always find it and download
    it from the Firebase console. Next to the project overview, there is a settings
    button. Click Project settings and then scroll down to SDK setup and configuration,
    and you will be able to download it again from there:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig16_HTML.png)


    A screenshot of the firebase window has the project overview option selected and
    the project settings option highlighted with a bounding box from the panel. Note
    is selected under Apple apps, and Google Service hyphen Info dot p list button
    highlighted under S D K setup and configuration.


    Figure 2-16


    Finding the GoogleService-Info.plist file in the console


    That being done, we can go to step 3 and install the *Firebase Software Development
    Kit (SDK)*. This can be achieved in multiple ways. The most popular are CocoaPods
    and Swift Package Manager. We will use the latter in our case.


    You can copy the URL suggested by Firebase indicated in the following figure ([`https://github.com/firebase/firebase-ios-sdk`](https://github.com/firebase/firebase-ios-sdk)):


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig17_HTML.png)


    A screenshot of the firebase window has the title, add firebase to your Apple
    app. It has the add firebase S D K category opened from the 4 categories with
    4 bullet points to use Swift Package Manager, and previous and next buttons below.


    Figure 2-17


    Add Firebase to your apple app – step 3


    Once you have copied it, go back to Xcode and, at the top-left level, click File
    ➤ Add Packages…, and a pop-up screen will appear. Enter the URL you just copied
    into the search bar, and the *Firebase-ios-sdk* package should appear as in the
    following figure:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig18_HTML.png)


    2 screenshots of the X code window. Add package option is highlighted on the left,
    that points to the window with another option highlighted to add the package.


    Figure 2-18


    Xcode – adding the package


    Note


    Since I already added it to previous projects, it is already appearing under the
    section “Recently used.”


    Click the blue button at the bottom right called Add Package, and fetching will
    start and will propose you to add a product. For now, we will only use the three
    following packages:


    *   *FirebaseFirestore*


    *   *FirebaseFirestoreSwift*


    *   *FirebaseAuth *


    Only these three modules will be necessary for our next chapters: replicating
    the Apple Notes app. However, for the following project, we will also be using
    Firebase Analytics, Firebase Storage, and more.


    Once these three modules are selected, click Add Package again as in the following
    figure:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig19_HTML.png)


    A screenshot of the X code window has a dialog box to choose package products
    for firebase, i O S, and S D K. It has 2 options check marked from the list of
    6 and the add package button highlighted.


    Figure 2-19


    Xcode ➤ Add Package – choosing products


    The installation will proceed for a few minutes depending on your Internet connection.
    Then you will see your project with the packages you installed, and you will be
    ready to use Firebase’s APIs.


    Let’s move to step 4\. In this step, we’re going to initialize Firebase from our
    app main entry.


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig20_HTML.png)


    A screenshot of the firebase window has the title, add initialization code. It
    has the Swift U I radio button selected with lines of codes below and the buttons
    for previous and next.


    Figure 2-20


    Add Firebase to your Apple app – step 4


    Head to your file `NoteApp.swift` in Xcode and import Firebase at the top:


    ```

    import FirebaseCore

    ```


    Then, add the following code over the *@main* keyword:


    ```

    class AppDelegate: NSObject, UIApplicationDelegate {

    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions:
    [UIApplication.LaunchOptionsKey : Any]? = nil) -> Bool {

    FirebaseApp.configure()

    return true

    }

    }

    ```


    Then add to following line of code inside the `struct but over the body variable`
    to register the App Delegate:


    ```

    @UIApplicationDelegateAdaptor(AppDelegate.self) var delegate

    ```


    Once you have implemented this code, your application will be able to communicate
    with Firebase. You can run your app (click the play button in the left tab), and
    you should have something like the following figure with the print in the console:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig21_HTML.png)


    A screenshot of the X code window has the Note App option selected from the panel
    on the left. The right pane has several lines of codes, and on the extreme right
    is the i Phone 13 Pro screen with hello world text.


    Figure 2-21


    Xcode running and communicating to Firebase


    ```

    [boringssl] boringssl_metrics_log_metric_block_invoke(144) Failed to log metrics

    ```


    Note


    During the process, Xcode will be running quite a lot of modules from Firebase.
    If your MacBook is making a sound like an airplane at landing, it is normal; it
    is processing lots of files.


    Congratulations! You have successfully set up Firebase to communicate with your
    app over an HTTP request, and you will now be able to use Firebase’s APIs to use
    their amazing framework. You can now go ahead and click Continue to console:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig22_HTML.jpg)


    A screenshot of the firebase window has the title, add firebase to your Apple
    app. It has the next steps category opened from the 5 categories with the message
    and description for you are all set. 2 buttons of previous and continue to console
    are at the bottom.


    Figure 2-22


    Add Firebase to your Apple app – step 5'
