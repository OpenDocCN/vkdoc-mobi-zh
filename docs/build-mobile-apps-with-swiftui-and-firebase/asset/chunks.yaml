    \n该文件已经安装了以下 Swift 包：\n\n*   `FirebaseAuth`\n*   `FirebaseFirestore`\n*   `FirebaseFirestoreSwift`\n\
    *   `FirebaseStorage`\n\n现在，我邀请你启动一个新的 Firebase 项目。点击 **添加项目**，并将其命名为 *Socially*：\n\
    \n![](img/533376_1_En_5_Fig2_HTML.jpg)\n\n一张标题为“您的 Firebase 项目”的 Firebase 窗口截图。其中有添加项目的选项，以及选择\
    \ Note 项目的选项，下方还有探索演示项目的选项。\n\n**图 5-2** 在 Firebase 中启动新项目\n\n### 我们为什么要创建一个新的\
    \ Firebase 项目？\n\n区分应用和 Firebase 项目是很重要的。总的来说，你应该将具有共同业务逻辑的应用放在同一个 Firebase 项目中。假设你在构建优步（Uber）的竞品，一个打车应用。由于你想覆盖广阔的市场，你会在\
    \ iOS 和 Android 上发布；因此，你可能会构建四个应用，每个平台上分别对应司机端和乘客端各两个。由于在 Android 或 iOS 上预订在后台是相同的过程，你可以考虑将所有内容放在同一个\
    \ Firebase 项目下。那么，你的项目结构会像这样：\n\n![](img/533376_1_En_5_Fig3_HTML.jpg)\n\n一个 Firebase\
    \ 项目的框图，分别指向 Android 和 iOS 的司机端和乘客端应用。\n\n**图 5-3** Firebase 项目与应用\n\n由于在我们的新项目中，与笔记应用没有共享任何内容，我们会创建一个新的\
    \ Firebase 项目。\n\n现在，按照 Firebase 控制台上的逐步设置指南操作，获取 `GoogleService-Info.plist` 文件并将其添加到入门项目中。一旦你添加了该文件并完成了\
    \ Firebase 控制台上的五个步骤，就可以成功运行你的项目并连接到 Firebase 后端。\n\n项目设置完成后，让我们开始编码。像往常一样，我们将从模型开始，在\
    \ `Model` 文件夹中创建一个新的 Swift 文件，命名为 `Post`，然后复制/粘贴以下代码：\n\n```\nimport SwiftUI\n\
    import FirebaseFirestoreSwift\n\nstruct Post: Identifiable, Decodable {\n  @DocumentID\
    \ var id: String?\n  var description: String?\n  var imageURL: String?\n  @ServerTimestamp\
    \ var datePublished: Date?\n}\n```\n\n因此，用于我们动态区域的模型将由一个标识符、一段描述、一张图片和发布日期组成。`@ServerTimestamp`\
    \ 来自 Firebase API，让我们能够获取服务器时间。而使用 `Date` 类型来记录日期是更推荐的做法。\n\n> *请注意，图片将在下一章关于\
    \ Firebase Storage 的内容中处理。*\n\n接下来进入视图模型。在 `View Model` 文件夹中创建一个新文件，命名为 `PostViewModel`，然后在文件顶部导入这两个框架：\n\
    \n```\nimport SwiftUI\nimport FirebaseFirestore\n```\n\n我们可以创建我们的类，其中包含对我们之前创建的模型以及对\
