  trans: "\n# 使用 SwiftUI 编写代码\n\n要理解 SwiftUI，最好的方式就是构建一个应用程序。因此，我们将构建一个简单的应用，在地图上显示几个地点。同时，我会解释一些关于\
    \ SwiftUI 的基础知识。\n\n前往我们之前创建的名为 *Discover* 的 Xcode 项目。运行该应用。你应该会看到以下起始模板：\n\n\
    ![](img/533376_1_En_1_Fig8_HTML.jpg)\n\n屏幕左侧面板显示 discover 应用的 ContentView 代码，右侧面板显示一个包含“Hello,\
    \ World!”文本的移动设备屏幕视图。\n\n**图 1-8** – 带模拟器运行的 Xcode\n\n为了重现这个界面，因为它使用了 Apple 地图，我们需要导入一个名为\
    \ *MapKit* 的框架来访问其 API。因此，在文件顶部添加以下代码行：\n\n```\nimport MapKit\n```\n\n然后，在代码 `struct\
    \ ContentView` 的正上方，复制/粘贴以下代码：\n\n```\nstruct Place: Identifiable {\n    var id\
    \ = UUID()\n    var title: String\n    var coordinate: CLLocationCoordinate2D\n\
    \    var architecte: String\n}\n```\n\n我们刚刚实现了一个模型，用于基于此模型创建一些数据项。\n\n让我为你解释一下这段代码：\n\
    \nSwift 中的 `struct` 用于存储变量。这里我们给这个 `struct` 命名为 `Place`。\n\n`Identifiable` 是一个协议，用于使此类可被标识。由于我们将在\
    \ *List* 中显示数据，我们需要使每个数据项变得可识别。\n\n然后，我们添加了几个变量：`UUID` 类型用于提供唯一标识符，`String` 类型用于文本，以及\
    \ `CLLocationCoordinate2D` 类型用于传递坐标（纬度和经度）。\n\n太好了，我们刚刚创建了一个所谓的模型，即通过几个变量将我们的对象（`Place`）模块化。\n\
    \n现在，我们可以着手处理用户界面了。\n\n在 `struct ContentView` 下方，添加以下代码行：\n\n```\n@State private\
    \ var region = MKCoordinateRegion(center: CLLocationCoordinate2D(latitude: 41.9028,\
    \ longitude: 12.4964), span: MKCoordinateSpan(latitudeDelta: 0.1, longitudeDelta:\
    \ 0.1))\n```\n\n什么是 `@State` 变量？\n\n> *一种属性包装器类型，可以读取和写入由 SwiftUI 管理的值。*\n> \n\
    > ——来自 Apple 文档\n\n这将允许我们操作数据。这里我们传递了对应于罗马市坐标的坐标值。\n\n然后，我们声明了一个包含地点数组的常量。由 `[]`\
    \ 声明的数组很适合呈现一系列数据。\n\n在你之前声明的 `@State` 之后，立即复制/粘贴以下代码：\n\n```\nlet annotations\
    \ = [\n    Place(title: \"Fontana di Trevi\", coordinate: CLLocationCoordinate2D(latitude:\
    \ 41.900833, longitude: 12.483056), architecte: \"Nicola Salvi\"),\n    Place(title:\
    \ \"Pantheon\", coordinate: CLLocationCoordinate2D(latitude: 41.8986, longitude:\
    \ 12.4768), architecte: \"Marcus Agrippa\"),\n    Place(title: \"Villa Medici\"\
    , coordinate: CLLocationCoordinate2D(latitude: 41.908, longitude: 12.483), architecte:\
    \ \"Bartolomeo Ammannati\"),\n    Place(title: \"Colosseo\",  coordinate: CLLocationCoordinate2D(latitude:\
    \ 41.890278, longitude: 12.492222), architecte: \"Flavian Emperors\")\n]\n```\n\
    \n太好了，现在我们有所有必要的输入来在 *Map* 上展示位置信息以及一些要显示的地点。\n\n在 `body` 变量内部，用以下代码行替换 *VStack*：\n\
    \n```\nMap(coordinateRegion: $region, annotationItems: annotations) {\n    MapMarker(coordinate:\
    \ $0.coordinate)\n}\n```\n\n这个 `Map` 修饰符将在我们的应用中显示一张地图。我们传递了之前定义的 `region` 参数（包含罗马的坐标），并使用\
    \ `$` 符号；这是用于 `@State` 变量的语法。同时，我们还添加了注释（之前声明的四个地点）。\n\n为了呈现这些注释，我们使用了 `MapMarker`，并传入对象中的坐标。\n\
    \n如果你正确地遵循了这些简短教程，你的画布应该会显示一张带有四个标记的地图，如下所示：\n\n![](img/533376_1_En_1_Fig9_HTML.jpg)\n\
    \n屏幕左侧面板显示 discover 应用的 ContentView 代码主体，右侧面板显示一张带有地图和四个标记位置的移动设备屏幕视图。\n\n**图\
    \ 1-9** – 我们的地图应用\n\n## 总结\n\n如果你是 Swift 新手，本章有助于向你介绍 Xcode——你为 Apple 平台构建应用的工具。接着，我们通过创建模型和编写静态数据了解了\
    \ Swift 的基础知识。然后，我们使用地图来显示标记，并从框架 `MapKit` 中导入以访问 Apple 的地图 API。\n\n现在，我们对如何创建静态数据模型并呈现它们有了更清晰的概念，我们可以继续讨论后端了。接下来的章节将聚焦于\
    \ Firebase，以及如何从后端下载数据、呈现数据、修改数据和处理用户输入。让我们深入探索 Firebase 控制台。\n\n# Firebase 简介\n\
    \n我将向你介绍 Firebase 控制台，以及如何创建一个新项目并将 iOS 应用连接到它。\n\n我们将涵盖 Firebase 是什么，为什么我们选择这个后端而非其他，以及它的优缺点。\n\
    \n我们将一步步指导你直接从 Web 浏览器创建你的第一个 Firebase 项目。我们还将把 iOS 应用连接起来，以便通过其 API 与 Firebase\
    \ 通信。\n\n在本章结束时，你将能够创建一个连接到 Firebase 后端的新 iOS 应用。如需参考，请访问以下链接的 Firebase 文档：`HTTPS://FIREBASE.GOOGLE.COM/DOCS/IOS/SETUP`。\n"
- fmt: '# What Is Firebase?


    Firebase is what we call a backend as a service (`BaaS`), which means that rather
    than running your server to run your online applications, you pass through their
    services to read, write, update, and delete data, authenticate your users, and
    many more things!


    Have a look at the following graphic that shows a native iOS application built
    with a custom backend running on the cloud:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig1_HTML.png)


    **Figure 2-1** – An iOS app built with a backend host on a cloud service


    As you can see, the app will be communicating with a virtual machine usually coded
    in `Ruby`, `Node.js`, or `PHP`, itself hosted by a cloud service (which could
    also be physical, but it is rare nowadays) such as Amazon Web Services, Google
    Cloud Platform, Microsoft Azure, or whatever service. In complex applications
    with a large user base, it usually requires a frontend developer, in our case
    an iOS developer; a backend developer to develop the logic and the APIs; and finally
    a `DevOps`, responsible for bringing all of that to a cloud service and distributing
    it. A full-stack developer can also do it, but it is rare and requires a lot of
    experience.


    Now, let’s have a look at an iOS application built with Firebase:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig2_HTML.png)


    **Figure 2-2** – An iOS app built with Firebase’s backend


    As you see, the architecture is way easier. Our iOS is notifying and receiving
    data from Firebase using their APIs that come along with great documentation.
    There is no need to write code on the server side or host it to a third-party
    provider since it is already built on top of Google Cloud with no deployment needed
    by you! Additionally, you can still run backend code, thanks to the Firebase Cloud
    function, if you want to achieve more complex interactions later. In terms of
    a team, you need an iOS developer, and you’re ready to publish an application
    on the App Store.


    We have seen how much easier it is to use Firebase rather than running your backend
    code, but there is more: it comes with a series of out-of-the-box tools that help
    speed up your development.


    For example, they have their APIs to authenticate a user with multiple third-party
    providers such as Apple, Facebook, Google, etc. They have Google Analytics preinstalled
    and ready to go.


    Additionally, there are a series of extensions with third-party providers to sign
    up users to an email list, adding in-app purchase with RevenueCat with no code
    required.


    You can discover them at this link:


    `HTTPS://FIREBASE.GOOGLE.COM/PRODUCTS/EXTENSIONS`


    Firebase comes with advantages and disadvantages. Here is the list:


    **The pros:**


    - You are faster to ship your application. You don’t need to write code on the
    backend unless you need to execute some more advanced functionalities.

    - You have access to Google Cloud Platform with no operations needed on your side.

    - You get out-of-the-box authenticate APIs with third parties. You don’t need
    to use an API for Google sign-in and another one for Facebook sign-in, for example.
    You can pass directly through Firebase’s APIs.

    - You don’t have to worry about scalability and managing servers.


    **The cons:**


    - The data don’t belong to you to store them. The best thing to do is to run a
    snapshot of your data every day and store it in a secure place.

    - You could be limited in some advanced applications where you need full control
    of the backend because the user interface is relying heavily on the backend.


    Overall, Firebase is a great option if you want to release an application as fast
    as possible, the cheapest since you don’t need to hire a backend developer. You
    can concentrate on what matters: building your product and monitoring the usage
    so you can implement features that your users want, which is also easier thanks
    to event follow-up and app analytics powered by Google Analytics that comes “for
    free.”


    That being said, let’s discover Firebase, create our first project, and make our
    iOS app communicate with it.


    # Setting Up a Firebase Account and Project


    To start on Firebase, you need to sign up for their services, which belong to
    Google, so you will need a Gmail account. If you don’t already have one, sign
    up for a Gmail account first. Then go to the Firebase website (`https://firebase.google.com`),
    click “Get started,” and you will be on your Firebase’s console. You should see
    something like this:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig3_HTML.png)


    **Figure 2-3** – Homepage of the Firebase console


    Click **Create a project** to create your first project on Firebase. I am going
    to guide you through every step, so you don’t get lost on your way. It requires
    you to follow three straightforward steps.


    Let’s start with the first one:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig4_HTML.png)


    **Figure 2-4** – Firebase new project, step 1 – project name


    For step 1, you just need to give it a name. I invite you to name it “Note” since
    it is the application we are going to build in the next chapter, but it doesn’t
    matter.


    The second step is to enable Google Analytics:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig5_HTML.png)


    **Figure 2-5** – Firebase new project, step 2 – Google Analytics


    This comes for free with Firebase, and it gives you access to basic data about
    how long your users are spending time on each screen, user usage over weeks, etc.
    You can even add events later to create funnels. For example, you will be able
    to find out how many users complete the signup process and then, for all those
    registered users, how many of them complete a purchase. For now, simply enable
    it and click **Continue**.


    The third step looks like this screen:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig6_HTML.png)


    **Figure 2-6** – Firebase new project, step 3 – Configure Google Analytics account


    For now, we can simply use the Firebase default account. If you have a website
    with Google Analytics tags to track usage and you want to build a related iOS
    application, you might want to select directly your Google Analytics account during
    this step. Click **Create project**, and you have created your first project on
    Firebase.'
