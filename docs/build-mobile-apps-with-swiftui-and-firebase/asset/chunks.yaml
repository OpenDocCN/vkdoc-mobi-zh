- fmt: '# Summary


    Over this chapter, we discovered what Firebase is and why we should consider it
    in our project development. We briefly explored the console and how to navigate
    the dashboard since we are going to dive in, in the next chapters.


    Also, I walked you through how to create our first Firebase project and connect
    an iOS application using Swift Package Manager so you’re ready to use their APIs.


    Thanks to this setup, we are now ready to build our first working application
    and communicate data between Firebase and our application.


    # 3. Playing with Firestore


    We are going to be focusing on Firebase Firestore over this chapter with a classic
    programming exercise: the Create-Read-Update-Delete (CRUD). Firestore is a NoSQL
    document-based database that will allow us to query, synchronize, and store data
    without managing infrastructure.


    After introducing our app architecture and the MVVM design pattern, we will finally
    leave the “how it works” with the theory and the setup to the coding part by building
    an iOS application replicating the Apple Notes application that comes by default
    with Apple products. It is going to look like the following figure:


    ![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig1_HTML.png)


    Four mobile screens display a dark background with 3 notes to edit, publish, and
    update.


    **Figure 3-1** Screenshots of the Note application we’re going to build


    The app will feature a list of notes – we can delete a note directly from the
    main screen – a form to upload a new note, and a details screen to read it entirely,
    and we will have the ability to edit our notes.


    By the end of this chapter, you will be able to properly structure your iOS project
    and make API calls to Firestore.


    ## Introducing the MVVM Design Pattern


    You might be wondering what is MVVM and what it stands for. MVVM is the short
    version for Model–View–View Model; it is an architecture widely used by the community
    of SwiftUI developers. Consider it as a “how do I organize my code” solution.


    In Chapter [1](#533376_1_En_1_Chapter.xhtml), we played around with SwiftUI, and
    we kind of put all the pieces together without any structure. That’s fine for
    an introduction. However, as our app becomes more complex, it can be unreadable
    and create conflicts in our code. That’s where app architecture comes into place!


    It will help us break down our code into multiples files. Each one has a specific
    purpose:


    - The **Model** is responsible for structuring our data and holding the logic.

    - The **View Model** will be responsible for managing the data, notified by the
    Model, and making the call to and from Firebase in our case.

    - The **View** will present our user interface to our user: lists, buttons, text,
    images, and so on. It is going to be binding the data with our View Model.


    You might be wondering why we need an architecture at all in our application.
    Well, it becomes important when you want to work on a project with more than one
    person and when the application becomes complex. It’s preventing bugs in your
    code. Overall, it has these advantages:


    - We will have a separation of concern. This way, each file has its own responsibility,
    and we avoid bugs and conflicts.

    - It is easier to read and identify bugs. For example, if there is a UI problem,
    you must look in your View; if there is an HTTP request problem, the View Model
    is the file to look for. Missing a data? You might have to add it inside the Model.


    Now, take a moment to see the following graphic showing the design pattern:


    ![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig2_HTML.png)


    An architecture diagram. Model notices changes in data and logic and communicates
    with the view model, that binds view to model, act as gate to backend, and interpret
    data. View publishes changes.


    **Figure 3-2** MVVM architecture in graphic


    As you can see, the Model is communicating with the View Model, responsible to
    interpret the data and pass them to the View, which is solely responsible for
    presenting the user interface and notifying also the View Model about users’ intent.


    For example, in our application that we are going to build, the Model will be
    composed of an identifier and a title. This structure will be notifying the View
    Model responsible for making the read call to Firebase and then presenting the
    data inside our View in a list.


    What happens when the data flows the other way?


    If it is from the View to the Model through the View Model, the View will notify
    the View Model, which will interpret this action and then modify the Model. For
    example, when a user deletes a note, the View will notify the View Model, which
    will inform Firebase to delete that document based on the information structured
    in our Model.


    Now, if this still sounds abstract to you, do not worry. By practicing it in our
    application during this chapter, it will be clearer to you.'
