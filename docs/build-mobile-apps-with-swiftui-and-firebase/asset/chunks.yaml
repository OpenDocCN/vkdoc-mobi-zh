- fmt: "# Security Rules\n\nOne last step is missing: securing our database from the\
    \ Rules section.\n\nSo far, we are in development mode, which means everybody\
    \ can read and write documents until 30 days after the creation of the database.\n\
    \nSince this Note application is private, we want to limit the ability to read\
    \ and write data to authenticated users only, within their own user collection.\n\
    \nGo to the Firestore database ➤ Rules and type the following rules in the console:\n\
    \n```\nrules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents\
    \ {\n    match /Users/{uid}/{document=**} {\n      allow read, write: if uid ==\
    \ request.auth.uid;\n    }\n  }\n}\n```\n\nThen, click Publish:\n\n![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig12_HTML.jpg)\n\
    \nA screenshot of the Firebase window has the project overview panel on the left\
    \ and the Cloud Firestore pane on the right. The panel highlights Firestore database.\
    \ The pane highlights the Rules tab and Publish button via the Edit Rules button.\n\
    \n**Figure 4-12** Editing rules in the Firestore database\n\nThis code that we\
    \ implemented will tell our database to restrict the access of our data to authenticated\
    \ users only, where their data match their identifier that was created when they\
    \ signed up.\n\nIn practice, a user can only read, post, and edit their own notes.\
    \ It is a crucial step before releasing any application to production, as our\
    \ previous rules would allow anyone on the Internet to access everyone’s documents\
    \ and user information.\n\n# Summary\n\nWith this chapter, we implemented a full\
    \ authentication process with real-world business logic. Thanks to the Firebase\
    \ SDK, we didn’t even need to create our Model since `FIRUser` already provided\
    \ us the necessary information.\n\nWe were able to post users’ credentials to\
    \ Firebase and match them against the response from the server, as well as implementing\
    \ a password recovery with only one line of code!\n\nThanks to their listener\
    \ APIs, we were also able to determine when a user session is active or terminated\
    \ and present the appropriate screen.\n\nWith this being done, we have a fully\
    \ working application, ready to be shipped on the App Store! It is now time to\
    \ head to the next chapter with a brand-new application to build!\n\nIf you lost\
    \ something on the way, find in the following a link to the repository of the\
    \ application:\n\n*   [https://drive.google.com/drive/folders/1UWZ4IDw5J81SxIjpjKd5QiSa5jR4mVHC?usp=share_link](https://drive.google.com/drive/folders/1UWZ4IDw5J81SxIjpjKd5QiSa5jR4mVHC%253Fusp%253Dshare_link)\n\
    \n# 5. Advanced Firestore\n\n## Introducing Our New Project\n\nSince we completed\
    \ a note-taking application, we are now more comfortable with SwiftUI and the\
    \ Firebase console. It is time to create a new application, this time with more\
    \ complexity: there will be a feed view like that of famous social media platforms\
    \ such as Instagram, a search feature, and a profile section where you can view\
    \ your posts, and there is the ability to sign in seamlessly with your Apple account.\n\
    \nThis chapter will focus on how to structure our database using Firestore, and\
    \ I will introduce you to a larger model with more document types. By the end\
    \ of it, you will be able to post and read a feed view and display a picture,\
    \ a description, and a date when it is posted.\n\nHere is what our application\
    \ will look like:\n\n![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig1_HTML.png)\n\
    \n3 screenshots of the mobile screens for the profile, feed, and post with various\
    \ options.\n\n**Figure 5-1** Screenshots of our application\n\nSince there are\
    \ many screens to be created, I prepared a starter file that you can download\
    \ at the following link:\n\n*   [https://drive.google.com/drive/folders/1fXNQwIOKj9AhIxHQxWlWxjorLpp1mKs5?usp=share_link](https://drive.google.com/drive/folders/1fXNQwIOKj9AhIxHQxWlWxjorLpp1mKs5%253Fusp%253Dshare_link)\n\
    \nThis file already has the following Swift packages installed:\n\n*   `FirebaseAuth`\n\
    *   `FirebaseFirestore`\n*   `FirebaseFirestoreSwift`\n*   `FirebaseStorage`\n\
    \nNow, I invite you to start a new Firebase project. Click Add project and call\
    \ it *Socially*:\n\n![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig2_HTML.jpg)\n\
    \nA screenshot of the Firebase window titled \"Your Firebase projects\". It has\
    \ options to add a project and select the Note, with an option to explore a demo\
    \ project below.\n\n**Figure 5-2** Starting a new project in Firebase\n\n### Why\
    \ Are We Creating a New Firebase Project?\n\nIt is important to differentiate\
    \ an application and a Firebase project. Overall, you should put in the same Firebase\
    \ project applications that have a common business logic. Let’s say you are building\
    \ a competitor of Uber, the taxi ride application. As you want to reach a large\
    \ market, you will be publishing on iOS and Android; therefore, you might be building\
    \ four applications, two for the drivers and two for the riders on each platform.\
    \ Since booking on Android or iOS is the same process on the backend, you can\
    \ consider doing everything under the same Firebase project. Then, you will have\
    \ something like this:\n\n![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig3_HTML.jpg)\n\
    \nA block diagram of a Firebase project points to 2 apps for drivers and riders\
    \ each, for Android and iOS.\n\n**Figure 5-3** Firebase project and applications\n\
    \nSince, in our new project, we don’t really share anything with the note-taking\
    \ application, we are creating a new Firebase project.\n\nNow, follow the step-by-step\
    \ setup on the Firebase console and grab the `GoogleService-Info.plist` file and\
    \ add it to the starter project. Once you have added the file and finished the\
    \ five steps on the Firebase console, you can successfully run your project and\
    \ connect to the Firebase backend.\n\nNow that we have set up our project, let’s\
    \ code. As usual, we will start with our Model, create a new Swift file inside\
    \ the `Model` folder, call it `Post`, and then copy/paste the following code:\n\
    \n```\nimport SwiftUI\nimport FirebaseFirestoreSwift\n\nstruct Post: Identifiable,\
    \ Decodable {\n  @DocumentID var id: String?\n  var description: String?\n  var\
    \ imageURL: String?\n  @ServerTimestamp var datePublished: Date?\n}\n```\n\nSo\
    \ our Model that will be used for our Feed section is going to be composed of\
    \ an identifier, a description, an image, and a date on which it has been published.\
    \ The `@ServerTimestamp` comes from the Firebase APIs and gives us access to the\
    \ server time. Then, the type `Date` is preferable to post a date.\n\n> *Please,\
    \ note that the image will be treated in our next chapter on Firebase Storage.*\n\
    \nLet’s dive into the View Model. Create a new file in the `View Model` folder\
    \ and call it `PostViewModel` and then import these two frameworks at the top:\n\
    \n```\nimport SwiftUI\nimport FirebaseFirestore\n```\n\nWe can create our class\
    \ with our reference to the Model we created earlier and to our Firestore database:\n\
    \n```\nclass PostViewModel: ObservableObject {\n  @Published var posts = [Post]()\n\
    \  private var databaseReference = Firestore.firestore().collection(\"Posts\"\
    )\n  // Function to post data\n}\n```\n\nAnd finally, here is our function to\
    \ post data to the server:\n\n```\n// function to post data\nfunc addData(description:\
    \ String, datePublished: Date) async {\n  do {\n    _ = try await databaseReference.addDocument(data:\
    \ [\n      \"description\": description,\n      \"datePublished\": datePublished\n\
    \    ])\n  } catch {\n    print(error.localizedDescription)\n  }\n}\n```\n\nThis\
    \ View Model is similar to what we have already done in Chapter [3](#533376_1_En_3_Chapter.xhtml),\
    \ except that we are using the `async`/`await` method this time. You might be\
    \ wondering what these keywords are for."
  raw: '### Security Rules


    One last step is missing, securing our database from the Rules section.


    So far, we are in development mode, which means everybody can read and write documents
    until 30 days after the creation of the database.


    Since this Note application is private, we want to limit the ability to read and
    write data to authenticated users only, within their own user collection.


    Go to the Firestore database ➤ Rules and type the followings rules in the console:


    ```

    rules_version = ''2'';

    service cloud.firestore {

    match /databases/{database}/documents {

    match /Users/{uid}/{document=**} {

    allow read, write: if uid == request.auth.uid;

    }

    }

    }

    ```


    Then, click Publish:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig12_HTML.jpg)


    A screenshot of the firebase window has the project overview panel on the left
    and the cloud firestore pane on the right. The panel highlights firestore database.
    The pane highlights the rules tab and publish button via the edit rules button.


    Figure 4-12


    Editing rules in the Firestore database


    This code that we implemented will tell our database to restrict the access of
    our data to authenticated users only where their data match their identifier that
    was created when they signed up.


    In practice, a user can only read, post, and edit their own notes. It is a crucial
    step before releasing any application to production as our previous rules would
    allow anyone on the Internet to access everyone’s documents and user information.


    ## Summary


    With this chapter, we implemented a full authentication process with real-world
    business logic. Thanks to the Firebase SDK, we didn’t even need to create our
    Model since FIRUser already provided us the necessary information.


    We were able to post users’ credentials to Firebase and match them against the
    response from the server, as well as implementing a password recovery with only
    one line of code!


    Thanks to their listener APIs, we were also able to determine when a user session
    is active or terminated and present the appropriate screen.


    With this being done, we have a fully working application, ready to be shipped
    on the App Store! It is now time to head to the next chapter with a brand-new
    application to build!


    If you lost something on the way, find in the following a link to the repository
    of the application:


    *   [***https://drive.google.com/drive/folders/1UWZ4IDw5J81SxIjpjKd5QiSa5jR4mVHC?usp=share_link***](https://drive.google.com/drive/folders/1UWZ4IDw5J81SxIjpjKd5QiSa5jR4mVHC%253Fusp%253Dshare_link)


    # 5. Advanced Firestore


    ## Introducing Our New Project


    Since we completed a note-taking application, we are now more comfortable with
    SwiftUI and the Firebase console. It is time to create a new application, this
    time with more complexity: there will be a feed view like that of famous social
    media platforms such as Instagram, a search feature, and a profile section where
    you can view your posts, and there is the ability to sign in seamlessly with your
    Apple account.


    This chapter will focus on how to structure our database using Firestore, and
    I will introduce you to a larger model with more document types. By the end of
    it, you will be able to post and read a feed view and display a picture, a description,
    and a date when it is posted.


    Here is what our application will look like:


    ![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig1_HTML.png)


    3 screenshots of the mobile screens for the profile, feed, and post with various
    options.


    Figure 5-1


    Screenshots of our application


    Since there are many screens to be created, I prepared a starter file that you
    can download at the following link:


    *   [*https://drive.google.com/drive/folders/1fXNQwIOKj9AhIxHQxWlWxjorLpp1mKs5?usp=share_link*](https://drive.google.com/drive/folders/1fXNQwIOKj9AhIxHQxWlWxjorLpp1mKs5%253Fusp%253Dshare_link)


    This file already has the following Swift packages installed:


    *   *FirebaseAuth*


    *   *FirebaseFirestore*


    *   *FirebaseFirestoreSwift*


    *   *FirebaseStorage*


    Now, I invite you to start a new Firebase project. Click Add project and call
    it *Socially*:


    ![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig2_HTML.jpg)


    A screenshot of the firebase window titled, your firebase projects. It has options
    to add a project and select the Note, with an option to explore a demo project
    below.


    Figure 5-2


    Starting a new project in Firebase


    ### Why Are We Creating a New Firebase Project?


    It is important to differentiate an application and a Firebase project. Overall,
    you should put in the same Firebase project applications that have a common business
    logic. Let’s say you are building a competitor of User, the taxi ride application.
    As you want to reach a large market, you will be publishing on iOS and Android;
    therefore, you might be building four applications, two for the drivers and two
    for the riders on each platform. Since booking on Android or iOS is the same process
    on the backend, you can consider doing everything under the same Firebase project.
    Then, you will have something like this:


    ![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig3_HTML.jpg)


    A block diagram of a firebase project points to 2 apps for drivers and riders
    each, for android and i O S.


    Figure 5-3


    Firebase project and applications


    Since, in our new project, we don’t really share anything with the note-taking
    application, we are creating a new Firebase project.


    Now, follow the step-by-step setup on the Firebase console and grab the *GoogleService-Info.plist*
    file and add it to the starter project. Once you have added the file and finished
    the five steps on the Firebase console, you can successfully run your project
    and connect to the Firebase backend.


    Now that we have set up our project, let’s code. As usual, we will start with
    our Model, create a new Swift file inside the *Model* folder, call it *Post*,
    and then copy/paste the following code:


    ```

    import SwiftUI

    import FirebaseFirestoreSwift

    struct Post: Identifiable, Decodable {

    @DocumentID var id: String?

    var description: String?

    var imageURL: String?

    @ServerTimestamp var datePublished: Date?

    }

    ```


    So our Model that will be used for our Feed section is going to be composed of
    an identifier, a description, an image, and a date on which it has been published.
    The *@ServerTimestamp* comes from the Firebase APIs and gives us access to the
    server time. Then, the type Date is preferable to post a date.


    > *Please, note that the image will be treated in our next chapter on Firebase
    Storage.*


    Let’s dive into the View Model. Create a new file in the *View Model* folder and
    call it *PostViewModel* and then import these two frameworks at the top:


    ```

    import SwiftUI

    import FirebaseFirestore

    ```


    We can create our class with our reference to the Model we created earlier and
    to our Firestore database:


    ```

    class PostViewModel: ObservableObject {

    @Published var posts = [Post]()

    private var databaseReference = Firestore.firestore().collection("Posts")

    // Function to post data

    }

    ```


    And finally, here is our function to post data to the server:


    ```

    // function to post data

    func addData(description: String, datePublished: Date) async {

    do {

    _ = try await databaseReference.addDocument(data: [ "description": description,
    "datePublished": datePublished])

    } catch {

    print(error.localizedDescription)

    }

    }

    ```


    This View Model is similar to what we have already done in Chapter [3](#533376_1_En_3_Chapter.xhtml),
    except that we are using the async/await method this time. You might be wondering
    what these keywords are for.'
  trans: "\n# 安全规则\n\n最后一步必不可少：通过规则区域来保护我们的数据库。\n\n到目前为止，我们处于开发模式，这意味着在数据库创建后的 30\
