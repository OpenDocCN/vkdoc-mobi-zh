  trans: '

    ## 1 – 左侧标签页显示了项目包含的所有文件。默认情况下，会有三个主要文件夹：一个包含应用的入口点，名为 `DiscoverApp`，类似于 Web 开发中的
    `index.html`。`ContentView` 是默认提供的，它是一个用于呈现用户界面的起始模板。最后还有一个 `Assets` 文件夹，你可以用来存储图片和视频；这非常实用，因为它能减小你上传的任何素材文件的体积。此外，这个文件夹还会包含你的应用图标。


    另外两个文件夹则用于测试。你可以在这里运行测试，检查代码是否健壮，或者用户界面是否响应正常。底部还有一个搜索过滤器，顶部有一系列标签页，在我们运行应用时将会非常有用。


    ## 2 – 第二个区域正是我们要工作的地方！从这里我们可以编写代码，并查看文件的内容。另外，在 SwiftUI 中，每个 SwiftUI 视图都附带一个名为
    `Preview` 的结构体（在绿色方框内）。它负责在右侧向你呈现屏幕预览。如果你删除这段代码，将无法使用 Canva 功能。


    ## 3 – Canva 于 2019 年引入；它是一种便捷的方式，可以让你实时看到正在构建的用户界面。从这里，你可以观察到当你在代码中进行更改时，应用的外观会如何变化。


    例如，尝试在第二个面板中，紧跟在 `Text("Hello, world!")` 之后添加关键字 `.bold()`。你的文本会立刻变为粗体。


    ## 4 – 右侧标签页将显示你当前正在查看的文件的信息。在这里，你可以重命名文件、更改编程语言，甚至可以编辑一些用户界面元素，例如字体和元素间距（如果你点击顶部的最后一个按钮进行导航）。请注意，在本书中，我们不会经常用到这个部分。


    现在，你可以构建你的项目了。我建议你点击 Xcode 左上角的构建按钮，具体位置如下：


    ![](img/533376_1_En_1_Fig6_HTML.jpg)


    屏幕显示了一个内容视图的代码。在 iOS 模拟器下，选择了 iPhone 14 Pro。Hello World 程序的移动预览暂停在内容视图中，并且该内容同样显示在
    iPhone 14 Pro 的移动屏幕上。


    **图 1-6** 在 Xcode 上运行的模拟器


    一旦你点击它，一个模拟器应用就会弹出，并呈现一个运行着你应用的虚拟 iPhone。你也可以在顶部面板选择其他类型的 iPhone 或 iPad，这样就可以看到你所构建的内容如何适应不同的屏幕尺寸。


    关于 Xcode 需要介绍的内容还有很多。到目前为止，我强调的都是需要了解和识别的主要点，但我们将在编码过程中发现更多的功能。我们将在下一章中实际操作，并使用
    Xcode 和 SwiftUI 构建我们的第一个应用。


    ## SwiftUI 的不同之处


    SwiftUI 是由苹果公司在 2019 年的全球开发者大会上推出的；它是全球开发者用来为苹果平台构建应用的声明式框架。在撰写本文时，它的版本是 4。


    正如苹果所说，SwiftUI 让你用更少的代码编写出更好的应用。这是真的吗？在 SwiftUI 之前，我们使用的是 UIKit，这是苹果在 2014 年推出的一个用于构建用户界面的命令式框架。它仍然可用，但随着苹果公司将重点转移到
    SwiftUI，它正在被逐渐取代。


    为了理解这两个框架的演变，让我们来做一个比较：构建两个用户界面，每个界面都由一个显示从 1 到 10 元素的列表组成。其中一个我们将使用 UIKit 构建，另一个将使用
    SwiftUI 构建。用户界面看起来像这样：


    ![](img/533376_1_En_1_Fig7_HTML.jpg)


    一个移动屏幕上显示一个从 0 到 9 的空白编号列表。文字说明为：用 SwiftUI 和 UIKit 构建的列表。


    **图 1-7** 在 iPhone 上显示的列表


    观察以下 UIKit 中的代码：


    ```

    import UIKit

    class ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource
    {

    let tableView = UITableView()

    override func viewDidLoad() {

    super.viewDidLoad()

    view.addSubview(tableView)

    tableView.register(UITableViewCell.self, forCellReuseIdentifier: "Cell")

    tableView.dataSource = self

    tableView.delegate = self

    }

    override func viewDidLayoutSubviews() {

    super.viewDidLayoutSubviews()

    tableView.frame = view.bounds

    }

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    return 10

    }

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: "Cell", for: indexPath)

    cell.textLabel?.text = "\(indexPath.row)"

    return cell

    }

    }

    ```


    如你所见，我们在顶部导入了 UIKit 框架。我们向类中传入了两个委托：`UITableViewDelegate` 和 `UITableViewDataSource`。然后，我们声明了一个
    `UITableView` 来创建列表，并在 `viewDidLoad` 方法中手动添加了它。


    这个方法在视图被加载并呈现给用户时调用。我们还遵守了这个协议，提供了两个函数，分别返回行数以及每行的组成内容，这里是一个带有显示当前行号文本的单元格。


    为了遵守协议并呈现一个由十行组成的基本用户界面，需要写不少代码。


    现在让我们用 SwiftUI 来编写它：


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    List(0..<10) { index in

    Text("\(index)")

    }

    }

    }

    ```


    就是这样！如你所见，使用 SwiftUI，我们的列表代码要简短得多。我们在文件顶部导入框架。然后直接在 `body` 变量中声明了一个列表，它包含从 0 到
    10 的 11 个元素及其组成：一个显示 1 到 10 的文本。创建这个 `List` 实际上只需要两行代码，更加清晰易读。


    既然我们看到了 SwiftUI 在构建用户界面方面高效得多，那么接下来我们将介绍一些基础知识。我们将创建一个小的应用程序来介绍一些应用编程接口。

    '
- fmt: "# Coding with SwiftUI\n\nTo understand SwiftUI, the best thing to do is to\
    \ build an application. So we are going to build a simple application that displays\
    \ a few places on a map. Along with it, I will explain a few basics about SwiftUI.\n\
    \nHead to the Xcode project we created earlier called *Discover*. Run the application.\
    \ You should have the following starter template:\n\n![](images/533376_1_En_1_Chapter/533376_1_En_1_Fig8_HTML.jpg)\n\
    \nA screen displays the content view of code of discover app on the left panel\
    \ and a mobile screen view on the right panel with the text, hello world.\n\n\
    **Figure 1-8** – Xcode running with Simulator\n\nTo recreate this screen, since\
    \ it features Apple Maps, we need to import a framework called *MapKit* to access\
    \ their APIs. So add the following line of code at the top of the file:\n\n```\n\
    import MapKit\n```\n\nThen, right over the code `struct ContentView`, copy/paste\
    \ the following code:\n\n```\nstruct Place: Identifiable {\n    var id = UUID()\n\
    \    var title: String\n    var coordinate: CLLocationCoordinate2D\n    var architecte:\
    \ String\n}\n```\n\nWe just implemented a model to create a few items from this\
    \ model.\n\nLet me explain to you the code:\n\n`struct` in Swift is used to store\
    \ variables. Here we give the name of this `struct`: `Place`.\n\n`Identifiable`\
    \ is a protocol used to make this class identifiable. Since we are going to display\
    \ the data in a *List*, we need to make each item identifiable.\n\nThen, we give\
    \ a few variables of type `UUID` to give a unique identifier, `String` for words,\
    \ and `CLLocationCoordinate2D` to pass coordinates (latitude and longitude).\n\
    \nGreat, we just created what is called a model, a modularization of our object\
    \ (`Place`) with a few variables.\n\nNow we can take care of our user interface.\n\
    \nRight under `struct ContentView`, add the following line of code:\n\n```\n@State\
    \ private var region = MKCoordinateRegion(center: CLLocationCoordinate2D(latitude:\
    \ 41.9028, longitude: 12.4964), span: MKCoordinateSpan(latitudeDelta: 0.1, longitudeDelta:\
    \ 0.1))\n```\n\nWhat is the `@State` variable?\n\n> *A property wrapper type that\
    \ can read and write a value managed by SwiftUI.*\n> \n> —From the Apple documentation\n\
    \nThis will allow us to manipulate data. Here we are passing coordinates that\
    \ correspond to the coordinates of the city of Rome.\n\nThen, we are declaring\
    \ a constant, which contains an array of places. An array declared by `[]` is\
    \ useful to present a series of data.\n\nCopy/paste the following code right after\
    \ the `@State` you declared earlier:\n\n```\nlet annotations = [\n    Place(title:\
    \ \"Fontana di Trevi\", coordinate: CLLocationCoordinate2D(latitude: 41.900833,\
    \ longitude: 12.483056), architecte: \"Nicola Salvi\"),\n    Place(title: \"Pantheon\"\
    , coordinate: CLLocationCoordinate2D(latitude: 41.8986, longitude: 12.4768), architecte:\
    \ \"Marcus Agrippa\"),\n    Place(title: \"Villa Medici\", coordinate: CLLocationCoordinate2D(latitude:\
    \ 41.908, longitude: 12.483), architecte: \"Bartolomeo Ammannati\"),\n    Place(title:\
    \ \"Colosseo\",  coordinate: CLLocationCoordinate2D(latitude: 41.890278, longitude:\
    \ 12.492222), architecte: \"Flavian Emperors\")\n]\n```\n\nGreat, now we have\
    \ all the necessary input to present locations on a *Map* and a few places to\
    \ display.\n\nInside the `body` variable, replace the *VStack* with the following\
    \ line of code:\n\n```\nMap(coordinateRegion: $region, annotationItems: annotations)\
    \ {\n    MapMarker(coordinate: $0.coordinate)\n}\n```\n\nThis `Map` modifier will\
    \ present a map in our application. We are passing a `region` parameter that we\
    \ defined earlier with the coordinates of Rome, using the `$` sign; it is the\
    \ syntax to use with the `@State` variable. Also, we are adding annotations (the\
    \ four places that we declared earlier).\n\nTo present these annotations, we are\
    \ using `MapMarker` with the coordinates passed in our object.\n\nIf you correctly\
    \ follow these short tutorials, you should have your Canva presenting a map with\
    \ four annotations as follows:\n\n![](images/533376_1_En_1_Chapter/533376_1_En_1_Fig9_HTML.jpg)\n\
    \nA screen displays the body of the content view of code of discover app on left\
    \ panel and a mobile screen view on right panel with a map and 4 marked locations.\n\
    \n**Figure 1-9** – Our map application\n\n## Summary\n\nIf you are new to Swift,\
    \ this chapter has been useful to introduce you to Xcode, your tool to build applications\
    \ for the Apple platform. Then, we saw the basics of Swift by creating a model\
    \ and writing static data. Then, we used a map to display annotations, importing\
    \ from the framework `MapKit` to access Apple’s map APIs.\n\nNow that we have\
    \ a clearer idea of how to create a static model of data and present them, we\
    \ can go ahead and talk about the backend. The next chapters will be focused on\
    \ Firebase and how to download data from a backend, present them, modify them,\
    \ and handle user input. Let’s dive into the Firebase console.\n\n# Introduction\
    \ to Firebase\n\nI am going to introduce you to the Firebase console and how to\
    \ create a new project and connect an iOS application.\n\nWe will cover what is\
    \ Firebase, why we are selecting this backend over others, and the advantages\
    \ and disadvantages that come with it.\n\nThere is a walk-through to create your\
    \ first Firebase project directly from the web browser. We are also going to connect\
    \ our iOS application to talk to Firebase through its APIs.\n\nBy the end of this\
    \ chapter, you will be able to create a new iOS app linked to the Firebase backend.\
    \ For reference, please go to the Firebase documentation at the following link:\
    \ `HTTPS://FIREBASE.GOOGLE.COM/DOCS/IOS/SETUP`."
