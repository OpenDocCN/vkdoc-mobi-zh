- fmt: '# Sign Up with Email and Password


    First things first, let’s build the user interface. We are going to add two fields
    – one for the email and one for the password – and two buttons: one for signing
    up and one for signing in.


    To achieve this, we are going to use a form since it comes with a scrolling feature
    for free and it is faster to implement.


    Head to our `AuthViewModel`, and implement the API calls to sign in, sign up and
    sign out:


    ```

    // function to sign-in

    func signIn(

    emailAddress: String,

    password: String

    ) {

    Auth.auth().signIn(emailAddress: emailAddress, password: password) { result, error
    in

    if let error = error {

    print("an error occurred: \(error.localizedDescription)")

    return

    }

    }

    }

    // function to create an account

    func signUp(

    emailAddress: String,

    password: String

    ) {

    Auth.auth().createUser(withEmail: emailAddress, password: password) { result,
    error in

    if let error = error {

    print("an error occurred: \(error.localizedDescription)")

    return

    }

    }

    }

    // function to logout

    func signOut() {

    do {

    try Auth.auth().signOut()

    } catch let signOutError as NSError {

    print("Error signing out: %@", signOutError)

    }

    }

    ```


    Great, we just implemented the necessary functions; the syntax of the APIs is
    quite clear here. We are using sign-in and creating a user and passing an email
    and password object as part of the parameter.


    To log out, we are using a do, try catch to catch any errors in case there is
    a bad Internet connection, for example.


    Head to the `SignUpView`, and implement the following code:


    ```

    @State private var emailAddress: String = ""

    @State private var password: String = ""

    ```


    These two variables will allow us to observe the user’s input and pass it to the
    Firebase backend. Now, let’s implement the user interface and replace the current:


    ```

    NavigationStack {

    Form {

    Section {

    TextField("Email", text: $emailAddress)

    .textContentType(.emailAddress)

    .keyboardType(.emailAddress)

    SecureField("Password", text: $password)

    }

    Section {

    Button(action: {

    // Sign Up to Firebase

    }) {

    Text("Sign Up").bold()

    }

    }

    Section(header: Text("If you already have an account:")) {

    Button(action: {

    // Sign In to Firebase

    }) {

    Text("Sign In")

    }

    }

    }.navigationTitle("Welcome")

    .toolbar {

    ToolbarItemGroup(placement: .cancellationAction) {

    Button {

    showingSheet.toggle()

    } label: {

    Text("Forgot password?")

    }

    .sheet(isPresented: $showingSheet) {

    ForgotPasswordView()

    }

    }

    }

    }

    ```


    Great, now we have our user interface. It’s time to pass the email and password
    to Firebase. Let’s observe the View Model we created earlier:


    ```

    @EnvironmentObject private var authModel: AuthViewModel

    ```


    And let’s implement the signup function inside the button action that belongs
    to the signup button:


    ```

    authModel.signUp(emailAddress: emailAddress,

    password: password)

    ```


    And let’s do the same thing for the sign-in process – add the function inside
    the button action:


    ```

    authModel.signIn(emailAddress: emailAddress,

    password: password)

    ```


    It is now time to sign up our first user. Go ahead, run your application, enter
    an email and a password, and check out the Firebase console!


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig7_HTML.jpg)


    A screenshot of the welcome mobile screen with a firebase window on the right.
    The window has the project overview panel on the left and the authentication pane
    on the right. The pane has the users tab selected with a button to add user.


    Figure 4-7


    App running and posting user data to Firebase Authenticate


    Great! By entering an email and a password, our app is notified in real time that
    the user has an active session. Then, it automatically brings us to the main screen,
    the `ContentView`.


    But what about signing out the user? This time, we also need to update our user
    interface and bring back our user to the signup screen. Also, giving the ability
    to log out will grant us the ability to log in again on the same device and check
    if our sign-in function is working properly.


    Let’s add this logout button and execute the sign-out function.


    Observe the `AuthViewModel` at the top of the `ContentView.swift` file:


    ```

    @ObservedObject private var authModel = AuthViewModel()

    ```


    Then, right below the first `ToolbarItemGroup` and inside the graph of the `.toolbar`
    modifier, add the following:


    ```

    ToolbarItemGroup(placement: .cancellationAction) {

    Button {

    authModel.signOut()

    } label: {

    Text("Logout")

    }

    }

    ```


    Really simple. Since we added all the functions in the View Model, we only need
    to call them in the user interface.


    Go ahead and click the logout button. You will be brought back to the signup screen.
    It’s now time to try the sign-in function. Enter the email and password you used
    earlier.


    You can perform the action many times and create as many accounts as you want
    to see the robustness of the code. That’s it. We have a fully functioning login
    flow!'
