- fmt: '# Exploring Firebase Extension


    Firebase Extension is a framework developed by Firebase to allow you to implement
    functionalities on the backend without writing any code. Some have been developed
    by Firebase such as triggering images, sending data to Google BigQuery, or resizing
    an image. It also includes many third-party providers like Stripe for running
    subscriptions and Algolia to search inside Firestore documents, integrates in-app
    purchase with RevenueCat, and many more.


    We will get started with `Resize Images` made by Firebase.


    This functionality will be useful in our application since the users are uploading
    images to the database and retrieving them in our feed. This functionality will
    resize the images to a determined size and therefore reduce the size. This will
    make our application much more efficient!


    To install this extension, you need to upgrade your Firebase project to the Blaze
    plan. This means Google will be able to charge you for using the function you
    are implementing on the backend. It is only going to represent a few cents for
    the tests we are going to execute.


    Head to the Firebase console ➤ Build ➤ Extensions. Then look for `Resize Images`
    and click Install.


    ![](images/533376_1_En_8_Chapter/533376_1_En_8_Fig1_HTML.jpg)


    A screenshot of the extensions marketplace by firebase window. Provider, firebase
    is selected on the left. On the right is a pane with trigger email, shorten URLs,
    limit child nodes, and resize images extensions, among others. Install under resize
    images is selected.


    Figure 8-1


    Firebase Extension marketplace


    If you haven’t subscribed to the Blaze plan yet, the console will invite you to
    upgrade. Follow the steps and enter your credit card information. If you correctly
    followed the instructions, you would have the following pop-up:


    ![](images/533376_1_En_8_Chapter/533376_1_En_8_Fig2_HTML.jpg)


    A screenshot of the firebase window has the upgrade complete dialog box in the
    center. It reads you have successfully upgraded your project, pay as you go blaze
    plan, a confirmation mail will be sent to you shortly, and you have set up a budget
    alert.


    Figure 8-2


    Project updated to the Blaze plan


    Now, you can start installing the extension. Follow the four steps provided by
    Firebase, and you can edit the following fields:


    *   `Backfill existing images` – No


    *   `Sizes of resized images`: 320 × 200


    This way, Firebase will automatically resize the images to 320 × 200 pixels, so
    it looks nice on our screen and the overall weight of the file will be reduced.
    You can click `Install extension`; it will take a few minutes to take effect:


    ![](images/533376_1_En_8_Chapter/533376_1_En_8_Fig3_HTML.jpg)


    A screenshot of the install this extension window. It has an input box for output
    options and 3 drop-down menus for GIF and WEBP animated option, cloud function
    memory, and backfill existing images. The install extension button at the bottom
    is highlighted with a bounding box.


    Figure 8-3


    Installing the Firebase extension


    You can now test your application by publishing a post with an image. The images
    will be retrieved faster since they have been downsized by the backend. Therefore,
    we have improved our application in a few minutes without writing any code.


    ## Track Our App Usage with Analytics


    It is useful to figure out how our users are using our application, to determine
    our conversion for signup, for example (how many users create an account / how
    many users download the app). Thanks to Firebase, it is easy to implement this
    tracker with Google Analytics.


    The first thing to do is add the Firebase Analytics package to our application.
    Head to your main target. Under `General` scroll down to `Frameworks`, `Libraries`,
    and `Embedded Content` and click the plus button. Then select `FirebaseAnalytics`
    and click `Add`.


    ![](images/533376_1_En_8_Chapter/533376_1_En_8_Fig4_HTML.jpg)


    A screenshot of a window has the choose frameworks and libraries to add dialog
    box. It has socially, general, and the add buttons highlighted from left to right.
    An arrow points to firebase analytics from the dialog box under the firebase package.


    Figure 8-4


    Adding a package to the project


    Now we are ready to use the Firebase analytics APIs. First thing I want to check
    is how many users are converting to authenticated users. To do so, I need to add
    an event every time a user successfully signs up.


    Let’s head to `SignUpView` and import the framework at the top:


    ``` swift

    import FirebaseAnalytics

    ```


    Then, add the following line of code right after the `print(signed in)` – this
    way, we are sure the authentication has been successful:


    ``` swift

    Analytics.logEvent("user_sign_up", parameters: nil)

    ```


    That’s it. In one line of code, we have logged an event to Firebase to see each
    user that signed up to our application.


    You can check in the Firebase console ➤ Analytics ➤ Events in the next 24 hours.
    You will see the events logged each time a user authenticates.


    ## Securing Our Database


    One final step is left before releasing our application to the public: secure
    our database. Since we are using Firestore, we need to head to this part in the
    console and edit the rules.


    Right now, everybody can write posts and read user information on our database
    without being authenticated. It is a concern for security and cost.


    Therefore, we need to restrict the ability to write data for authenticated users
    only, but we can allow anyone to read since profiles are public, as well as posts
    in our application.


    Head to the Firebase console ➤ Firestore ➤ Rules and implement the following rules
    and then click Publish:


    ``` sql

    rules_version = ''2'';

    service cloud.firestore {

    match /databases/{database}/documents {

    match /{document=**} {

    allow read: if true;

    allow write: if request.auth != null;

    }

    }

    }

    ```


    ![](images/533376_1_En_8_Chapter/533376_1_En_8_Fig5_HTML.jpg)


    A screenshot of the firebase window has the project overview panel on the left
    with firestore database selected. On the right is the cloud firestore pane with
    the rules tab selected. It has the edit rules button with 5 dates and times, and
    9 lines of code.


    Figure 8-5


    Cloud Firestore rules


    Now nobody can write anything if they didn’t sign up. We have usefully restricted
    the access of our data!'
