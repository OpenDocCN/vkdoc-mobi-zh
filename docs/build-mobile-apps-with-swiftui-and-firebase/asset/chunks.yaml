  trans: '

    # 什么是 Firebase？


    Firebase 是一种我们称之为后端即服务（`BaaS`）的服务。这意味着，你无需运行自己的服务器来支撑在线应用，而是通过它们的服务来读取、写入、更新和删除数据、认证用户以及执行许多其他操作！


    看看下面这张图，它展示了一个使用运行在云端的自定义后端构建的原生 iOS 应用：


    ![](img/533376_1_En_2_Fig1_HTML.png)


    **图 2-1** – 一个使用云服务上的后端主机构建的 iOS 应用


    如你所见，该应用将与一台虚拟机通信，虚拟机通常用 `Ruby`、`Node.js` 或 `PHP` 编码，它本身由云服务（也可能是物理服务器，但如今已很少见）托管，例如亚马逊云服务、谷歌云平台、微软
    Azure 等。在具有庞大用户群的复杂应用中，通常需要一名前端开发者（此处指 iOS 开发者）、一名后端开发者来开发逻辑和 API，以及一名 `DevOps`
    负责将所有这些部署到云服务并分发。全栈开发者也能完成这项工作，但这较为少见，且需要非常丰富的经验。


    现在，让我们看看一个使用 Firebase 构建的 iOS 应用：


    ![](img/533376_1_En_2_Fig2_HTML.png)


    **图 2-2** – 一个使用 Firebase 后端构建的 iOS 应用


    如你所见，架构要简单得多。我们的 iOS 应用通过 Firebase 提供的、附带详尽文档的 API 来向 Firebase 发送通知和接收数据。无需在服务器端编写代码，也无需将其托管给第三方提供商，因为它已经构建在谷歌云之上，你无需任何部署！此外，如果你之后想实现更复杂的交互，借助
    Firebase Cloud 函数，你仍然可以运行后端代码。从团队角度看，你只需要一名 iOS 开发者，就可以准备在 App Store 上发布应用了。


    我们已经看到使用 Firebase 比运行你自己的后端代码要简单得多，但不仅如此：它还附带了一系列开箱即用的工具，有助于加速你的开发。


    例如，它们有用于通过多个第三方提供商（如 Apple、Facebook、Google 等）认证用户的 API。它们还预装了 Google Analytics，可以直接使用。


    此外，还有一系列第三方提供商的扩展，可以将用户注册到邮件列表，或者通过 RevenueCat 实现应用内购买而无需编写代码。


    你可以通过这个链接了解它们：


    `HTTPS://FIREBASE.GOOGLE.COM/PRODUCTS/EXTENSIONS`


    Firebase 既有优点也有缺点。列表如下：


    **优点：**


    -   你可以更快地发布应用。除非需要执行一些更高级的功能，否则你无需在后端编写代码。

    -   你可以访问谷歌云平台，而无需自己在运维方面做任何操作。

    -   你获得了开箱即用的、支持第三方的认证 API。例如，你无需为一个 Google 登录接口使用一个 API，再为 Facebook 登录使用另一个 API。你可以直接通过
    Firebase 的 API 实现。

    -   你无需担心可扩展性和服务器管理。


    **缺点：**


    -   数据的所有权不属于你。最好的做法是每天对数据进行快照，并将其存储在一个安全的位置。

    -   在一些需要完全控制后端的复杂应用中，你可能会受到限制，因为用户界面严重依赖后端。


    总的来说，如果你想以最快、最便宜的方式发布应用（无需聘请后端开发者），那么 Firebase 是一个很好的选择。你可以专注于重要的事情：构建你的产品并监控使用情况，这样你就可以实现用户想要的功能。得益于随
    Firebase “免费”附带的、由 Google Analytics 提供支持的事件跟踪和应用分析，这也会变得更加容易。


    话不多说，让我们来探索 Firebase，创建我们的第一个项目，并让我们的 iOS 应用与其通信。


    # 设置 Firebase 账户和项目


    要开始使用 Firebase，你需要注册他们的服务，这些服务隶属于 Google，因此你需要一个 Gmail 账户。如果你还没有，请先注册一个 Gmail
    账户。然后访问 Firebase 网站（`https://firebase.google.com`），点击“开始使用”，你就会进入 Firebase 控制台。你应该会看到类似这样的界面：


    ![](img/533376_1_En_2_Fig3_HTML.png)


    **图 2-3** – Firebase 控制台首页


    点击**创建项目**，在 Firebase 上创建你的第一个项目。我将引导你完成每一步，这样你就不会迷路。整个过程只需遵循三个简单的步骤。


    让我们从第一步开始：


    ![](img/533376_1_En_2_Fig4_HTML.png)


    **图 2-4** – Firebase 新项目，步骤 1 – 项目名称


    对于步骤 1，你只需给它起个名字。我建议你将其命名为“Note”，因为这是我们将在下一章构建的应用，不过叫什么名字都无所谓。


    第二步是启用 Google Analytics：


    ![](img/533376_1_En_2_Fig5_HTML.png)


    **图 2-5** – Firebase 新项目，步骤 2 – Google Analytics


    这是 Firebase 免费提供的功能，它让你可以访问基本数据，例如你的用户在每个屏幕上花费的时间、连续数周的用户使用情况等。你甚至可以在之后添加事件来创建漏斗。例如，你将能够找出有多少用户完成了注册流程，然后在所有已注册用户中，有多少人完成了购买。现在，只需启用它并点击**继续**。


    第三步看起来像这个界面：


    ![](img/533376_1_En_2_Fig6_HTML.png)


    **图 2-6** – Firebase 新项目，步骤 3 – 配置 Google Analytics 账户


    现在，我们可以直接使用 Firebase 的默认账户。如果你有一个使用 Google Analytics 标签跟踪使用情况的网站，并且你想构建一个相关的 iOS
    应用，你可能希望在此步骤中直接选择你的 Google Analytics 账户。点击**创建项目**，你就已经在 Firebase 上创建了你的第一个项目。

    '
- fmt: '### Firebase Walk-Through


    You’re now on the Firebase console. This is going to be the backbone of your application.
    Let me introduce it to you although we’re going to dive in with our development
    in the next chapters.


    Once the project is created, you will arrive at something like this:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig7_HTML.png)


    A screenshot of the firebase window. The left panel with a project overview option
    and categories of build, release and monitor, and analytics with various options.
    The right pane reads, get started by adding firebase to your app, 5 options, and
    features listed below.


    **Figure 2-7** – The Firebase console


    This is a classic dashboard. In the left panel, you will get access to different
    menus categorized into four sections:


    - **Build** – This is the place that we are going to explore the most. Here we
    will set up our authentication with third-party providers, create our database,
    and write our security rules and add extensions, a no-code solution.

    - **Release & Monitor** – Once we have released our application on the App Store
    or even on TestFlight, you will be able to see reports if our users experienced
    crashes and even implement backend-powered distribution, which is not part of
    this book but good to have a look at because it is really powerful for iteration.

    - **Analytics** – From here you will have access to data usages of our app for
    free and implement some funnel from our code to monitor how a journey is being
    completed by our users.

    - **Engage** – This is especially powerful for stores and games. It offers features
    to send notifications with promotions, present advertisements with AdMob, and
    run A/B testing.


    As you can imagine, there are a lot of features to cover with Firebase. For the
    scope of this book, you will be 90% of the time between Xcode and Firebase’s Build
    section.


    On the right, you have your Google account that you can switch as with every Google
    product and a "Go to docs" button. It is always good to refer to the documentation
    when you want to implement something or understand better how it works.


    At the top, there is your project name. From there you can switch between projects.


    The "Spark plan" label is your billing plan; this one is for free and comes with
    quite a lot of things. There is also the "pay as you go" connected to Google Cloud
    Platform. You will be billed based on your users’ usages and the number of documents
    written and read.


    For this book, the Spark plan will be enough although we might need to switch
    to pay as you go when we implement some extensions later because they run on Google
    Cloud Platform. It is going to be a few cents anyway since we are at a development
    stage.


    It is now time to add our iOS application to talk to Firebase!


    ### Connect Your iOS Application to Firebase


    It’s time to link our application to Firebase. To achieve this we will need to
    do some back-and-forth between Xcode and the Firebase console.


    This walk-through is based on the Firebase documentation (`https://firebase.google.com/docs/ios/setup`).
    At the time of writing, the documentation doesn’t include SwiftUI, so I recommend
    you follow it through.


    First, we need to create a new Xcode project. Go ahead and click **Create a new
    Xcode project**:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig8_HTML.png)


    A screenshot of a desktop screen has the welcome to X code window. The first option
    to create a new X code project is highlighted with a bounding box. A checkbox
    to show this window when X code launches is clicked.


    **Figure 2-8** – Xcode – welcome screen


    Then, in terms of templates, it is going to be a classic application, so select
    the **App** template under the **iOS** platform:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig9_HTML.png)


    A screenshot of the X code window has various options on the upper toolbar and
    a window pane in the center. The pane titled, choose a template for your new project
    has the options i O S and app highlighted with bounding boxes. There are cancel,
    previous, and next buttons at the bottom.


    **Figure 2-9** – Xcode – selecting an App template


    Finally, we need to give a name to our project. We will call it **Note** since
    this is the application we are building in the next chapter. Make sure to select
    **SwiftUI** for Interface. The use of Core Data is not required since we will
    have Firebase to store data:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig10_HTML.png)


    A screenshot of the X code window has various options on the upper toolbar and
    a window pane in the center. The pane titled, choose options for your new project
    has the input box of the product name highlighted. Other options are for team,
    organization and bundle identifier, interface, and language.


    **Figure 2-10** – Xcode – options for a new project


    You can save your project wherever you prefer. I saved it on my desktop. Now that
    our project is created, let’s see how to connect it to Firebase. You can navigate
    back to the Firebase console. From the project overview, click **iOS+** as follows:


    ![](images/533376_1_En_2_Chapter/533376_1_En_2_Fig11_HTML.png)


    A screenshot of the firebase window. The left panel has a project overview tab
    and categories with various options. The right pane reads, get started by dding
