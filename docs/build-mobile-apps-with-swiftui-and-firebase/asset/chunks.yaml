  trans: '

    # 使用邮箱和密码注册


    首先，让我们构建用户界面。我们将添加两个输入字段——一个用于邮箱，一个用于密码——以及两个按钮：一个用于注册，一个用于登录。


    为了实现这一点，我们将使用表单，因为它自带滚动功能，并且实现速度更快。


    前往我们的 `AuthViewModel`，实现登录、注册和注销的 API 调用：


    ```

    // 登录函数

    func signIn(

    emailAddress: String,

    password: String

    ) {

    Auth.auth().signIn(emailAddress: emailAddress, password: password) { result, error
    in

    if let error = error {

    print("发生错误：\(error.localizedDescription)")

    return

    }

    }

    }

    // 创建账户函数

    func signUp(

    emailAddress: String,

    password: String

    ) {

    Auth.auth().createUser(withEmail: emailAddress, password: password) { result,
    error in

    if let error = error {

    print("发生错误：\(error.localizedDescription)")

    return

    }

    }

    }

    // 注销函数

    func signOut() {

    do {

    try Auth.auth().signOut()

    } catch let signOutError as NSError {

    print("注销时出错：%@", signOutError)

    }

    }

    ```


    很好，我们刚刚实现了必要的函数；这里的 API 语法非常清晰。我们使用了登录和创建用户功能，并将邮箱和密码对象作为参数的一部分传递。


    至于注销，我们使用了 `do try catch` 结构来捕捉任何错误，例如在网络连接不良的情况下。


    前往 `SignUpView`，并实现以下代码：


    ```

    @State private var emailAddress: String = ""

    @State private var password: String = ""

    ```


    这两个变量将允许我们监听用户的输入，并将其传递给 Firebase 后端。现在，让我们实现用户界面并替换当前内容：


    ```

    NavigationStack {

    Form {

    Section {

    TextField("邮箱", text: $emailAddress)

    .textContentType(.emailAddress)

    .keyboardType(.emailAddress)

    SecureField("密码", text: $password)

    }

    Section {

    Button(action: {

    // 注册到 Firebase

    }) {

    Text("注册").bold()

    }

    }

    Section(header: Text("如果您已有账户：")) {

    Button(action: {

    // 登录到 Firebase

    }) {

    Text("登录")

    }

    }

    }.navigationTitle("欢迎")

    .toolbar {

    ToolbarItemGroup(placement: .cancellationAction) {

    Button {

    showingSheet.toggle()

    } label: {

    Text("忘记密码？")

    }

    .sheet(isPresented: $showingSheet) {

    ForgotPasswordView()

    }

    }

    }

    }

    ```


    很好，现在我们有了用户界面。是时候将邮箱和密码传递给 Firebase 了。让我们观察之前创建的视图模型：


    ```

    @EnvironmentObject private var authModel: AuthViewModel

    ```


    然后，在属于注册按钮的按钮动作内部实现注册函数：


    ```

    authModel.signUp(emailAddress: emailAddress,

    password: password)

    ```


    接下来，对登录过程做同样的事情——在按钮动作内部添加函数：


    ```

    authModel.signIn(emailAddress: emailAddress,

    password: password)

    ```


    现在，是时候注册我们的第一个用户了。继续，运行你的应用，输入邮箱和密码，然后查看 Firebase 控制台！


    ![](img/533376_1_En_4_Fig7_HTML.jpg)


    一个欢迎移动屏幕的截图，右侧有一个 Firebase 窗口。该窗口左侧是项目概览面板，右侧是身份验证面板。面板中用户选项卡被选中，并带有一个添加用户的按钮。


    图 4-7


    应用运行并将用户数据发布到 Firebase 验证服务


    太好了！通过输入邮箱和密码，我们的应用会实时收到用户拥有活跃会话的通知。然后，它会自动将我们带到主屏幕，即 `ContentView`。


    但是，如何注销用户呢？这一次，我们还需要更新用户界面，将用户带回注册屏幕。此外，提供注销功能将使我们能够再次在同一个设备上登录，并检查登录功能是否正常工作。


    让我们添加这个注销按钮并执行注销函数。


    在 `ContentView.swift` 文件顶部观察 `AuthViewModel`：


    ```

    @ObservedObject private var authModel = AuthViewModel()

    ```


    然后，就在第一个 `ToolbarItemGroup` 下方，位于 `.toolbar` 修饰符的图结构中，添加以下内容：


    ```

    ToolbarItemGroup(placement: .cancellationAction) {

    Button {

    authModel.signOut()

    } label: {

    Text("注销")

    }

    }

    ```


    非常简单。由于我们已经在视图模型中添加了所有函数，我们只需在用户界面中调用它们即可。


    继续，点击注销按钮。你将被带回注册屏幕。现在是时候尝试登录功能了。输入你之前使用的邮箱和密码。


    你可以多次执行此操作，并根据需要创建任意数量的账户，以测试代码的稳健性。就是这样。我们拥有了一个功能完整的登录流程！

    '
- fmt: '### What If You Forget Your Password?


    That can happen often, especially nowadays, where we have so many accounts to
    manage. Thankfully, Firebase provides us with an API to reset the password and
    even send an email on our behalf! Great, isn''t it?


    We just need to pass an email address from the frontend.


    To achieve this, we will create a new screen to reset the password.


    So go ahead and create a new SwiftUI View and call it `ResetPasswordView`; we
    will call this view from our `SignUpView` as a pop-up.


    Before implementing the user interface, we will implement the function to reset
    our password, so head to `AuthViewModel` and implement the following code:


    ```

    // function to reset password

    func resetPassword(emailAddress: String) {

    Auth.auth().sendPasswordReset(withEmail: emailAddress)

    }

    ```


    This API from Firebase Auth will send a reset password email for us without implementing
    any backend code. We only need to pass the email from the frontend!


    Let''s now build the user interface for our screen. Head to `SignUpView` to make
    our reset password screen accessible.


    Start with a State variable to handle the pop-up presentation:


    ```

    @State private var showingSheet = false

    ```


    We will then add a button at the top left of our screen and place the following
    modifier, right above the `.NavigationTile`:


    ```

    .toolbar {

    ToolbarItemGroup(placement: .cancellationAction) {

    Button {

    showingSheet.toggle()

    } label: {

    Text("Forgot password?")

    }

    .sheet(isPresented: $showingSheet) {

    ResetPasswordView()

    }

    }

    }

    ```


    Great, now that we can access this screen, let''s implement the functionality
    and the user interface. Let''s add these few `State` variables first to the `ResetPasswordView.swift`
    file:


    ```

    @State private var emailAddress: String = ""

    @EnvironmentObject var authModel: AuthViewModel

    @Environment(\.presentationMode) var presentationMode

    ```


    These will be useful to connect our View Model, handling the email address we
    are passing and finally presenting our screen as a pop-up.


    Now, let''s implement a form to let the user provide their email:


    ```

    NavigationStack {

    Form {

    Section {

    TextField("Email", text: $emailAddress)

    .textContentType(.emailAddress)

    .textInputAutocapitalization(.never)

    .keyboardType(.emailAddress)

    }

    Section(footer: Text("Once sent, check your email to reset your password.")) {

    Button(

    action: {

    authModel.resetPassword(emailAddress: emailAddress)

    }) {

    Text("Send email link").bold()

    }

    }

    }.navigationTitle("Reset password")

    .toolbar {

    ToolbarItemGroup(placement: .confirmationAction) {

    Button("Done") {

    presentationMode.wrappedValue.dismiss()

    }

    }

    }

    }

    ```


    As usual, we used a simple and native iOS API to build our user interface, so
    the user is familiar with it. We use the button to execute the function we implemented
    in the View Model and another button inside the `toolbar` to close the form.


    Now, I invite you to go ahead, sign up with a real email, then log out, and check
    the reset password functionalities.


    Enter your password and click "Send email link" and then go your mailbox (also
    your spam) as follows:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig8_HTML.jpg)


    3 screenshots of mobile screens for the reset password with send email link, reset
    your password for the project on the G mail app, and reset your password with
    an input box for new password and save button.


    **Figure 4-8** Steps to follow to reset your password


    Once it is done, you can sign in again with your newly created password. Everything
    is handled by Firebase!


    ## Secure the Firestore Database


    Now that we have implemented a full user login flow, you might be wondering how
    to let the user access their own notes and not a collection accessible by everyone.
    That''s what we are going to do in this section. For that we need to reorganize
    our database structure.


    So far, it is composed of a collection called "Notes" that contains a series of
    documents that contain two string values: a text and an identifier.


    This iteration will be slightly more complex and will look as follows:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig9_HTML.jpg)


    A block diagram of users with I D and email leads to notes with 2 I Ds and 2 texts
    to go shopping and call dad.


    **Figure 4-9** Collection hierarchy of our iteration


    We will have a collection of users, and each user will have a subcollection of
    "Notes" containing a series of documents based on their input. It makes sense
    to operate with a subcollection since the user will be querying their own notes
    in our application.


    It is time to register our user and create the collection. For this we need to
    save user information upon signup. We will do just that in the `AuthViewModel`,
    in the signup function.


    First, let''s import the Firestore framework at the top:


    ```

    import FirebaseFirestore

    ```


    Now, we will replace the current signup function with a more complete one that
    features the saving of user information to Firestore:


    ```

    func signUp(emailAddress: String, password: String) {

    Auth.auth().createUser(withEmail: emailAddress, password: password) { result,  error
    in

    if let error = error {

    print("DEBUG: error \(error.localizedDescription)")

    } else {

    print("DEBUG: Succesfully created user with ID \(self.user?.uid ?? "")")

    guard let uid = Auth.auth().currentUser?.uid else { return }

    Firestore.firestore().collection("Users").document(uid).setData(["email" : emailAddress,
    "uid": uid]) { err in

    if let err = err {

    print(err)

    return

    }

    print("Success")

    }

    }

    }

    }

    ```


    Great, now if there are no errors while signing up, we are saving our user information
    (email and identifier) under the collection "Users"; we are also debugging that
    in our console to check if the identifiers match.


    Only one step is missing, editing the path of our database, so when you write
    a note, it is saved under your own user collection and not a top-level collection
    anymore.


    But, first, let''s clean up our Firestore database. Go ahead and delete the collection
    as follows:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig10_HTML.jpg)


    2 screenshots of the firebase windows for cloud firestore. The cloud firestore
    pane on the right of the first screenshot highlights the delete collection button
    and an arrow points to the delete button on the delete this collection? dialog
    box on the next one.


    **Figure 4-10** Deleting a Firestore collection


    Now, we can change the current path


    ```

    private var databaseReference = Firestore.firestore().collection("Notes") // reference
    to our collection

    ```


    to this one:


    ```

    private lazy var databaseReference: CollectionReference? = {

    guard let user = Auth.auth().currentUser?.uid else {return nil}

    let ref = Firestore.firestore().collection("Users").document(user).collection("Posts")

    return ref

    }()

    ```


    We also need to import the Firebase Auth framework at the top of the `NoteViewModel.swift`
    file since we are checking the corresponding user identifier before moving forward:


    ```

    import FirebaseAuth

    ```


    Also, add a `?` after the database reference since we make it optional for safety.


    You can now have fun and sign up a brand-new user and write a few notes. Then
    your database will look like the following path:


    `Users` (collection) ➤ document ➤ `Posts` (collection) ➤ document


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig11_HTML.png)


    3 screenshots of 2 mobile screens and the cloud firestore pane on firebase. The
    screens have the welcome and notes sections. The pane highlights the posts with
    1 document under the data tab.


    **Figure 4-11** Screenshots of the Firestore database matching our frontend data'
  raw: '### What If You Forget Your Password?


    That can happen often, especially nowadays, where we have so many accounts to
    manage. Thankfully, Firebase provides us with an API to reset the password and
    even send an email on our behalf! Great, isn’t it?


    We just need to pass an email address from the frontend.


    To achieve this, we will create a new screen to reset the password.


    So go ahead and create a new SwiftUI View and call it `ResetPasswordView`; we
    will call this *view* from our SignUpView as a pop-up.


    Before implementing the user interface, we will implement the function to reset
    our password, so head to *AuthViewModel* and implement the following code:


    ```

    // function to reset password

    func resetPassword(emailAddress: String) {

    Auth.auth().sendPasswordReset(withEmail: emailAddress)

    }

    ```


    This API from Firebase Auth will send a reset password email for us without implementing
    any backend code. We only need to pass the email from the frontend!


    Let’s now build the user interface for our screen. Head to `SignUpView` to make
    our reset password screen accessible.


    Start with a State variable to handle the pop-up presentation:


    ```

    @State private var showingSheet = false

    ```


    We will then add a button at the top left of our screen and place the following
    modifier, right above the `.NavigationTile`:


    ```

    .toolbar {

    ToolbarItemGroup(placement: .cancellationAction) {

    Button {

    showingSheet.toggle()

    } label: {

    Text("Forgot password?")

    }

    .sheet(isPresented: $showingSheet) {

    ResetPasswordView()

    }

    }

    }

    ```


    Great, now that we can access this screen, let’s implement the functionality and
    the user interface. Let’s add these few `State` variables first to the `ResetPasswordView.swift`
    file:


    ```

    @State private var emailAddress: String = ""

    @EnvironmentObject var authModel: AuthViewModel

    @Environment(\.presentationMode) var presentationMode

    ```


    These will be useful to connect our View Model, handling the email address we
    are passing and finally presenting our screen as a pop-up.


    Now, let’s implement a form to let the user provide their email:


    ```

    NavigationStack {

    Form {

    Section {

    TextField("Email", text: $emailAddress)

    .textContentType(.emailAddress)

    .textInputAutocapitalization(.never)

    .keyboardType(.emailAddress)

    }

    Section(footer: Text("Once sent, check your email to reset your password.")) {

    Button(

    action: {

    authModel.resetPassword(emailAddress: emailAddress)

    }) {

    Text("Send email link").bold()

    }

    }

    }.navigationTitle("Reset password")

    .toolbar {

    ToolbarItemGroup(placement: .confirmationAction) {

    Button("Done") {

    presentationMode.wrappedValue.dismiss()

    }

    }

    }

    }

    ```


    As usual, we used a simple and native iOS API to build our user interface, so
    the user is familiar with it. We use the button to execute the function we implemented
    in the View Model and another `button` inside the `toolbar` to close the form.


    Now, I invite you to go ahead, sign up with a real email, then log out, and check
    the reset password functionalities.


    Enter your password and click “Send email link” and then go your mailbox (also
    your spam) as follows:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig8_HTML.jpg)


    3 screenshots of mobile screens for the reset password with send email link, reset
    your password for the project on the G mail app, and reset your password with
    an input box for new password and save button.


    Figure 4-8


    Steps to follow to reset your password


    Once it is done, you can sign in again with your newly created password. Everything
    is handled by Firebase!


    ## Secure the Firestore Database


    Now that we have implemented a full user login flow, you might be wondering how
    to let the user access their own notes and not a collection accessible by everyone.
    That’s what we are going to do in this section. For that we need to reorganize
    our database structure.


    So far, it is composed of a collection called “Notes” that contains a series of
    documents that contain two string values: a text and an identifier.


    This iteration will be slightly more complex and will look as follows:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig9_HTML.jpg)


    A block diagram of users with I D and email leads to notes with 2 I Ds and 2 texts
    to go shopping and call dad.


    Figure 4-9


    Collection hierarchy of our iteration


    We will have a collection of users, and each user will have a subcollection of
    “Notes” containing a series of documents based on their input. It makes sense
    to operate with a subcollection since the user will be querying their own notes
    in our application.


    It is time to register our user and create the collection. For this we need to
    save user information upon signup. We will do just that in the *AuthViewModel*,
    in the signup function.


    First, let’s import the Firestore framework at the top:


    ```

    import FirebaseFirestore

    ```


    Now, we will replace the current signup function with a more complete one that
    features the saving of user information to Firestore:


    ```

    func signUp(emailAddress: String, password: String) {

    Auth.auth().createUser(withEmail: emailAddress, password: password) { result,  error
    in

    if let error = error {

    print("DEBUG: error \(error.localizedDescription)")

    } else {

    print("DEBUG: Succesfully created user with ID \(self.user?.uid ?? "")")

    guard let uid = Auth.auth().currentUser?.uid else { return }

    Firestore.firestore().collection("Users").document(uid).setData(["email" : emailAddress,
    "uid": uid]) { err in

    if let err = err {

    print(err)

    return

    }

    print("Success")

    }

    }

    }

    }

    ```


    Great, now if there are no errors while signing up, we are saving our user information
    (email and identifier) under the collection “Users”; we are also debugging that
    in our console to check if the identifiers match.


    Only one step is missing, editing the path of our database, so when you write
    a note, it is saved under your own user collection and not a top-level collection
    anymore.


    But, first, let’s clean up our Firestore database. Go ahead and delete the collection
    as follows:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig10_HTML.jpg)


    2 screenshots of the firebase windows for cloud firestore. The cloud firestore
    pane on the right of the first screenshot highlights the delete collection button
    and an arrow points to the delete button on the delete this collection? dialog
    box on the next one.


    Figure 4-10


    Deleting a Firestore collection


    Now, we can change the current path


    ```

    private var databaseReference = Firestore.firestore().collection("Notes") // reference
    to our collection

    ```


    to this one:


    ```

    private lazy var databaseReference: CollectionReference? = {

    guard let user = Auth.auth().currentUser?.uid else {return nil}

    let ref = Firestore.firestore().collection("Users").document(user).collection("Posts")

    return ref

    }()

    ```


    We also need to import the Firebase Auth framework at the top of the `NoteViewModel.swift`
    file since we are checking the corresponding user identifier before moving forward:


    ```

    import FirebaseAuth

    ```


    Also, add a ***?*** after the database reference since we make it optional for
    safety.


    You can now have fun and sign up a brand-new user and write a few notes. Then
    your database will look like the following path:


    ***Users*** (collection) ➤ document ➤ ***Posts*** (collection) ➤ document


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig11_HTML.png)


    3 screenshots of 2 mobile screens and the cloud firestore pane on firebase. The
    screens have the welcome and notes sections. The pane highlights the posts with
    1 document under the data tab.


    Figure 4-11


    Screenshots of the Firestore database matching our frontend data'
