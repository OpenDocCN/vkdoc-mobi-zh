    SignUpView().presentationDetents([.medium, .large])

    }

    }

    }

    }.onAppear { authModel.listenToAuthState() }

    ```


    Now our UI is ready, presenting the email of the user when logged in or a button
    where there is no session detected by the Firebase server. We are going to pass
    all that we need to the Apple server.


    What can we expect from the response?


    *   A unique relay email or their original email


    *   Their full name (optional – we are not asking for it for this project)


    Following that, on completion, we will be able to proceed and register the credentials
    onto Firebase. Now, we could check our Firebase console to see if we had correctly
    signed up our user. *(I recommend checking this feature on a real device.)*


    ![](images/533376_1_En_7_Chapter/533376_1_En_7_Fig4_HTML.jpg)


    2 screenshots of a mobile screen and the authentication window. The screen has
    the profile section. The window has a table with 5 columns under the authentication,
    users tab.


    Figure 7-4


    Sign in with Apple working with Firebase Auth


    ## Summary


    We explored the Firebase authenticate SDK with a more advanced feature: Sign in
    with Apple. Thanks to their APIs, we were able to authenticate the user. However,
    Sign in with Apple requires a bit more setup since we need to talk to both the
    Apple server and Firebase server to get a response.


    Thanks to their great listener, we were also able to determine whether our user
    is signed in or not, and from this response, we presented the right screen.


    Now that we know how to use Sign in with Apple, I have a challenge for you: integrate
    Sign in with Apple with our Note application that we created over Chapters [3](#533376_1_En_3_Chapter.xhtml)
    and [4](#533376_1_En_4_Chapter.xhtml).


    If you missed something while following this chapter, you can check this source
    code:


    # 8. Adding Features Without Coding


    We have created a nice basis for a social media application, but it is not completed
    yet. There are many areas of improvements and a few features to be implemented.


    Over this chapter, we will be working on *Socially* by implementing a feature
    to resize the images uploaded on the backend, so they are downsized and can be
    presented faster to our end user. We will achieve this thanks to Firebase Extension:
    a great no-code tool to implement functionalities on the backend without writing
    code.


    Finally, we will secure our database, so certain data is only accessible to the
    current user. We will also restrict the ability to post content to registered
    users only.'
