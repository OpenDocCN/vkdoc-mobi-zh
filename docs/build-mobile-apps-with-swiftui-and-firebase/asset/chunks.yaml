    \ Apple 账户登录。\n\n本章将重点介绍如何使用 Firestore 构建我们的数据库，我将向你介绍一个包含更多文档类型的大型模型。在本章结束时，你将能够发布和阅读动态视图，并显示图片、描述以及发布日期。\n\
