- fmt: '## 1 – The left tab is showing all the files that your project contains. By
    default, there will be three main folders: One contains your app entry point named
    `DiscoverApp` like an `index.html` for the web developers. The `ContentView` comes
    by default; it is a starter template to present a user interface. Finally, there
    is an `Assets` folder that you can use to store your images and videos; this is
    useful since it will reduce the size of any assets that you upload. This folder
    will also contain your app logo.


    The other two are for testing purposes. From there you can run tests to see if
    your code is robust or the user interface is responding accordingly. There is
    also a filter at the bottom to search through and a series of tabs at the top
    that will be useful when we are running the application.


    ## 2 – The second is where we are going to work! From there we can write code
    and see the content of our files. Also, in SwiftUI, every SwiftUI view comes with
    a struct called `Preview` (inside the green square). This is responsible to present
    you the screen on the right. If you delete this code, you won’t be able to use
    the Canva feature.


    ## 3 – Canva has been introduced in 2019; it is an easy way to see the user interface
    that you are building live. From there, you can see how your app looks when you
    make changes in the code.


    For example, try to add the keyword `.bold()` in the second panel right after
    the `Text("Hello, world!")`. Your text will turn to bold right away.


    ## 4 – The right tab is going to be your points of information for the file you
    are currently viewing. From there, you can rename it, change the programming language,
    and even edit some user interface elements, such as fonts and spacing between
    elements if you navigate to the last button at the top. Note that we won’t be
    using this section much throughout the book.


    Now, you can build your project. I invite you to click the build button, at the
    top left of Xcode as follows:


    ![](images/533376_1_En_1_Chapter/533376_1_En_1_Fig6_HTML.jpg)


    A screen displays a content view of code. Under iOS simulators, iPhone 14 Pro
    is selected. The mobile preview of Hello World program is paused in content view,
    and the same is displayed in iPhone 14 Pro mobile screen.


    **Figure 1-6** Simulator running on Xcode


    Once you click it, a Simulator app will pop up and present you with a virtual
    iPhone running your application. You can also select other types of iPhones or
    iPads at the top panel so you can see how what you are building reacts to different
    screen sizes.


    There are a lot of things to cover about Xcode. So far, what I highlighted are
    the main things to know and recognize, but we will discover more functionalities
    by coding. We will do just that in the next chapter and build our first application
    using Xcode and SwiftUI.


    ## What Makes SwiftUI Different


    SwiftUI has been introduced in 2019 by Apple at their WWDC; it is the declarative
    framework used by developers around the world to build applications for the Apple
    platforms. At the time of writing, we are at version 4.


    SwiftUI makes you write better apps with less code as Apple states. Is it true?
    Prior to SwiftUI, we were using UIKit, an imperative framework introduced by Apple
    in 2014 to build user interfaces. It is still available, but it is slowly being
    replaced by Apple, since the company shifted the focus to SwiftUI.


    To understand the evolution of these two frameworks, let’s do a comparison by
    building two user interfaces composed of a list that displays elements from 1
    to 10. For one of them, we will use UIKit, and the other will be built using SwiftUI.
    The user interface will look like this:


    ![](images/533376_1_En_1_Chapter/533376_1_En_1_Fig7_HTML.jpg)


    A mobile screen with a blank numbered list from 0 to 9. The text reads, list built
    with SwiftUI and UIKit.


    **Figure 1-7** A list displaying on an iPhone


    Observe the following code in UIKit:


    ```

    import UIKit

    class ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource
    {

    let tableView = UITableView()

    override func viewDidLoad() {

    super.viewDidLoad()

    view.addSubview(tableView)

    tableView.register(UITableViewCell.self, forCellReuseIdentifier: "Cell")

    tableView.dataSource = self

    tableView.delegate = self

    }

    override func viewDidLayoutSubviews() {

    super.viewDidLayoutSubviews()

    tableView.frame = view.bounds

    }

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    return 10

    }

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: "Cell", for: indexPath)

    cell.textLabel?.text = "\(indexPath.row)"

    return cell

    }

    }

    ```


    As you can see, we import the framework UIKit at the top. We pass two delegates
    to our class: `UITableViewDelegate` and `UITableViewDataSource`. Then, we declare
    a `UITableView` to create the list that we manually added in the `viewDidLoad`
    method.


    This method is being called when the view is being loaded, presented to the user.
    We also conform to this protocol with our two functions that return the numbers
    of rows and what they are composed of, here a cell with a text displaying the
    number of the current row.


    Quite a bit of code to conform to the protocol and to present a basic user interface
    composed of ten rows.


    Let’s now code it using SwiftUI:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    List(0..<10) { index in

    Text("\(index)")

    }

    }

    }

    ```


    That’s it! As you can see, with SwiftUI our list is way shorter. We import the
    framework at the top of the file. Then we directly declare a list in the `body`
    variable that contains 11 elements from zero to ten and its composition: a text
    displaying one to ten. It is literally two lines of code to create a `List`, much
    clearer and easier to read.


    Now that we see that SwiftUI is much more efficient to build user interfaces,
    we are going to introduce a few bases. We will create a little application to
    introduce some APIs.'
