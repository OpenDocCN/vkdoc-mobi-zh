- fmt: '# 1. Introduction to SwiftUI


    This first chapter is meant for beginners in iOS development. I will walk you
    through the main functionalities of `Xcode`, your tool to create projects and
    run code. Then, we will create a simple application: a map displaying a few places.


    This way, we will explore some SwiftUI APIs to build the user interface and some
    basics of Swift such as creating a model. Let''s get started!


    ## Xcode Walk-Through


    To build an iOS application, you first need `Xcode`. This software made by Apple
    will be your program to write Swift code, create a user interface, build and debug
    your project, and much more. Think of it like Photoshop for photography or Sketch
    and Figma for UI design.


    The software is available on the Mac App Store; you can easily download it from
    there. Navigate to the App Store on your Mac and search for `Xcode`, and then
    click DOWNLOAD (I have "OPEN" since I already downloaded it):


    ![](images/533376_1_En_1_Chapter/533376_1_En_1_Fig1_HTML.jpg)


    A screen displays the X code application version 14.1, with an open button, 2
    preview screens, what''s new, and other features.


    **Figure 1-1** Download Xcode from the App Store


    At the time of writing, the latest version is `Xcode 14.1`. I recommend you download
    at least `Xcode 14`; otherwise, a lot of functionalities will not be replicable
    throughout the book.


    The download will take some time since it is quite a heavy program (7GB). Once
    you have downloaded it, you can open it. It will ask you if you want to download
    additional components for macOS and watchOS. You can skip this step since we only
    need iOS for the scope of this book.


    Then, this page will appear, inviting you to start a project:


    ![](images/533376_1_En_1_Chapter/533376_1_En_1_Fig2_HTML.jpg)


    A screen with a welcome screen to X code dialog box, with options to create a
    new x code project, clone an existing project and open a project or files. Create
    a new x code project is selected.


    **Figure 1-2** Xcode welcome screen


    Click **Create a new Xcode project**, and the following page will appear:


    ![](images/533376_1_En_1_Chapter/533376_1_En_1_Fig3_HTML.jpg)


    A screen displays a box to choose a template for your new project. iOS tab is
    highlighted, and App icon is selected from the list of 8 templates.


    **Figure 1-3** Xcode – choosing a template


    `Xcode` will suggest to you a series of templates. In fact, you can build a lot
    of things using the Swift language such as an Apple Watch app, a game that runs
    on the iPhone, a Safari extension, or a utility app for Mac. We will select **App**
    from the iOS platform for now. It will be the same for the other projects although
    our application will also be able to run on the iPad.


    Now, I invite you to enter the word **Discover**; this is going to be the name
    of our first project written with SwiftUI.


    Also, make sure that the SwiftUI framework is selected together with the Swift
    language.


    (Make sure to have your name or enterprise in the Team field. If you''re new to
    `Xcode`, it is your Apple account that you use for the App Store. That should
    be your team''s name. For me it is "Sullivan De Carli (Personal Team).")


    ![](images/533376_1_En_1_Chapter/533376_1_En_1_Fig4_HTML.jpg)


    A screen displays a dialog box to choose options for your new project, with, product
    name as discover, team, organization identifier, bundle identifier, interface
    as SwiftUI, language as Swift, and include tests is ticked.


    **Figure 1-4** Xcode – settings for the project


    Great! Now save your project wherever you prefer; I usually save it to my desktop.
    We can start exploring the `Xcode` functionalities!


    ![](images/533376_1_En_1_Chapter/533376_1_En_1_Fig5_HTML.jpg)


    A screen displays a content view labeled 1 to 4 in panels. Panel 1 is with 3 folders.
    A code snippet is highlighted in the second panel. The third panel contains a
    mobile screen with text, Hello World. The fourth panel displays identity and types,
    target membership, and test settings.


    **Figure 1-5** Xcode – walk-through


    `Xcode` is composed of different tabs; each one has a different purpose:'
