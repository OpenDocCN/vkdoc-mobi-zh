    \ var posts = [Post]()\n  private var databaseReference = Firestore.firestore().collection(\"\
    Posts\")\n  // 用于发布数据的函数\n}\n```\n\n最后，这是我们用于向服务器发布数据的函数：\n\n```\n// 发布数据的函数\n\
    func addData(description: String, datePublished: Date) async {\n  do {\n    _\
    \ = try await databaseReference.addDocument(data: [\n      \"description\": description,\n\
    \      \"datePublished\": datePublished\n    ])\n  } catch {\n    print(error.localizedDescription)\n\
    \  }\n}\n```\n\n这个视图模型与我们之前在第 3 章中完成的类似，不同之处在于这次我们使用了 `async`/`await` 方法。你可能会好奇这些关键字的作用。\n"
- fmt: "## Call the Backend with Async/Await\n\nIn our application, we are uploading\
    \ a few things – a picture and a description – and we are saving the date and\
    \ time. The problem is the following: the data can take time to be uploaded to\
    \ the server, especially if the picture is large.\n\nTherefore, if we do a classic\
    \ call, our user might be left on the screen for a few seconds while the picture\
    \ is being uploaded to the database. This is not a great user experience. That’s\
    \ why we are using this method, so the call is asynchronous, and the user can\
    \ safely navigate and `await`. While they are doing something else, the code is\
    \ executed in the background.\n\nNow that we have implemented our function to\
    \ post, let’s try it out! Head to the `PostView` file (already created in the\
    \ starter project) and make a link with our View Model:\n\n```\n@ObservedObject\
    \ private var viewModel = PostViewModel()\n```\n\nThen we simply call it inside\
    \ the button where I left the comment:\n\n```\n// MARK: Post data to Firestore\n\
    Task {\n    await self.viewModel.addData(description: description, datePublished:\
    \ Date())\n}\n```\n\nAs you can see, we are saving the text input from the user.\
    \ Regarding the date, we are passing `Date()`, which is taking the current iPhone\
    \ date. For now, we don’t do anything with the image since it is going to be the\
    \ topic of our next chapter on Firebase Storage.\n\nAdditionally, we put the function\
    \ inside a `Task`, which is necessary to be able to use the `await` key to inform\
    \ our program that we must run this code in the background since it can take time\
    \ to upload.\n\nNow our frontend is ready to post data to the backend, but we\
    \ still haven’t set up Firestore to receive data. Head to the Firebase console,\
    \ section Firestore Database, and click **Create database**. As with Chapter 3,\
    \ enable the database in test mode:\n\n![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig4_HTML.jpg)\n\
    \nA screenshot of a firebase window has the create database dialog box in the\
    \ center. It has radio buttons to start in production mode and start in test mode\
    \ with test mode selected and lines of code on the right. Buttons to cancel and\
    \ next are at the bottom right.\n\n**Figure 5-4** Firestore – creating a database\n\
    \nThen, we can run the application and try to post a comment. You should have\
    \ it on your database:\n\n![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig5_HTML.jpg)\n\
    \n2 screenshots of a mobile screen and the cloud firestore pane on firebase. The\
    \ screen has a post section with text, hello there. The pane has the posts option\
    \ and a document highlighted under the data tab in the panel view.\n\n**Figure\
    \ 5-5** Firebase Firestore console and application running\n\nGreat, we have published\
    \ data to Firestore with a text and the current date from our iPhone. It is now\
    \ time to present this data that we just added.\n\nFor this, we will use a nice\
    \ Firebase wrapper. First, add the following framework in the `FeedView`:\n\n\
    ```\nimport FirebaseFirestoreSwift\n```\n\nThen, add the following code in the\
    \ `FeedView`, right over the body variable:\n\n```\n@FirestoreQuery(collectionPath:\
    \ \"Posts\")\nvar posts: [Post]\n```\n\nThis way, we don’t even need to implement\
    \ a function inside our View Model. This is a great feature from Firebase APIs.\
    \ It allows us to fetch data with only one line of code by just passing our Model\
    \ together with the name we used for our Firebase collection.\n\nReplace the current\
    \ list in the `FeedView` with the following one:\n\n```\nList(posts) { posts in\n\
    \    VStack(alignment: .leading) {\n        VStack {\n            Text(posts.description\
    \ ?? \"\")\n                .font(.headline)\n                .padding(12)\n \
    \           Text(\"Published on the \\(posts.datePublished?.formatted() ?? \"\"\
    )\")\n                .font(.caption)\n        }\n    }.frame(minHeight: 100,\
    \ maxHeight: 350)\n}\n```\n\nThe `formatted()` modifier allows us to transform\
    \ a data of type `Date` to `String`. This way, we can easily display a date in\
    \ our application.\n\nYou can now run your application, and this will present\
    \ the posts that you posted in a nice list.\n\n![](images/533376_1_En_5_Chapter/533376_1_En_5_Fig6_HTML.jpg)\n\
    \nA screenshot of a window has the feed view selected from the panel on the left.\
    \ It has several lines of code in the pane under socially on the right and a mobile\
    \ screen with a hello there message on the extreme right.\n\n**Figure 5-6** Figure\
    \ of the list\n\n## Summary\n\nThis chapter was pretty like Chapter 3 with a large\
    \ model and an introduction to a new property wrapper from Firebase that made\
    \ our life much easier.\n\nWe have seen how to handle not only data of type `String`\
    \ but also `Date`. But we are not done with Firestore yet!\n\nIn this next chapter,\
    \ we will still be using it to retrieve an image after we have uploaded it to\
    \ our Storage. Let’s discover how to handle large assets with Firebase.\n\nYou\
    \ can have a look at the project at the following link, if you have lost something\
    \ on the way:\n\n*   [https://drive.google.com/drive/folders/1_qrKo171QkgGHMuX4vDsbPzi36xoXci4?usp=share_link](https://drive.google.com/drive/folders/1_qrKo171QkgGHMuX4vDsbPzi36xoXci4%253Fusp%253Dshare_link)\n\
    \n# 6. Manage Pictures with Firebase Storage\n\nWe are looking to include pictures\
    \ in our posts. The problem is the following: `Firestore` doesn’t support such\
    \ large documents. We can only add text, numbers, arrays, Booleans, timestamps,\
    \ etc.\n\nTherefore, Firebase introduced Storage. This is a package that lets\
    \ us upload and download large data such as video, images, and audio documents.\
    \ Through this chapter, we are going to see how to upload a picture to Firebase\
    \ Storage, retrieve the URL where this picture is, and add it to the corresponding\
    \ Firestore document.\n\nOver this chapter, we will explore how to access the\
    \ iPhone photo library, upload the picture to Storage, and retrieve it inside\
    \ the Firestore backend. Let’s get started!"
