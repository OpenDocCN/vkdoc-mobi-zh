- fmt: "## Create Data to Firestore\n\nBefore we start coding, Firebase still needs\
    \ a bit of setup to work with the Firestore database. Go to your Firebase console\
    \ and head to the Firestore Database section in the left panel and click the `Create\
    \ database` button as in the following figure:\n\n![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig3_HTML.png)\n\
    \nA screen displays the firestore database, with the note panel section with cloud\
    \ firestore, to create a database.\n\n**Figure 3-3** Firebase console – Firestore\
    \ section\n\nA pop-up will appear inviting you to complete a two-step process.\
    \ The first one is to choose how to start your database. We will go ahead with\
    \ test mode, since we are only discovering Firebase in this chapter. We don’t\
    \ need to set up rules to restrict our Firebase usage to authenticated users,\
    \ for example. Additionally, we are on the Spark plan, and we didn’t enter a credit\
    \ card yet, so we are good to go regarding billing.\n\nThe second step is to select\
    \ a location. Simply choose the one closer to you. I picked up US-Central, but\
    \ if you’re going to distribute the app for the European market, it is better\
    \ to select Central Europe as the database since it is going to be closer and\
    \ slightly more efficient. Follow the two steps as described in the following:\n\
    \n![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig4_HTML.png)\n\nTwo screens\
    \ display the creation of a database and two options at the bottom, as well as\
    \ warnings and enable options on the right side.\n\n**Figure 3-4** Firestore two-step\
    \ setup\n\nNow that our database is activated, it’s time to get back to Xcode.\
    \ Open the project Note that we created and connected to Firebase earlier.\n\n\
    According to the MVVM architecture we spoke about earlier, we are going to create\
    \ the Model.\n\nClick `Create a new file ➤ Swift File` and call it `Note`. Then\
    \ paste the following code:\n\n```\nimport Foundation\nimport FirebaseFirestoreSwift\n\
    struct Note: Codable {\n@DocumentID var id: String?\nvar title: String?\n}\n```\n\
    \nThat’s all we need for our Model, an identifier and a title that will hold the\
    \ text we will enter later in our form.\n\nNote here that we have imported `FirebaseFirestoreSwift`\
    \ to access the `@DocumentID` keyword; this comes from Firebase to help us map\
    \ the document correctly with the identifier from Firebase.\n\nThe next step is\
    \ to create our View Model. This file will be responsible for passing data to\
    \ our View conforming to the Model we just created. It’s also going to talk to\
    \ Firebase using their APIs, so we need to import the Firestore framework at the\
    \ top.\n\nClick `Create a new file ➤ Swift File` and name it `NoteViewModel` and\
    \ import the framework at the top:\n\n```\nimport FirebaseFirestore\n```\n\nYou\
    \ can then copy/paste the following code into your file:\n\n```\nclass NoteViewModel:\
    \ ObservableObject {\n@Published var notes = [Note]()\nprivate var databaseReference\
    \ = Firestore.firestore().collection(\"Notes\")\n// function to post data\n//\
    \ function to read data\n// function to update data\n// function to delete data\n\
    }\n```\n\nGreat, we just created a class conforming to the `ObservableObject`;\
    \ it allows instances of this class to be used inside views later, so when changes\
    \ happen, the View will reload with the updated changes.\n\nThen, we have created\
    \ a reference to our Model with the `Published` to tell our program to reload\
    \ when changes happen with our Model.\n\nAlso, we added a variable so we can refer\
    \ to the Firestore collection that we just named `Notes`. It is useful to add\
    \ this reference, so we don’t need to write it multiple times when we are writing\
    \ a function to fetch, read, delete, or update data.\n\nIt is now time to add\
    \ the function to post data to Firestore right under a comment I left:\n\n```\n\
    // function to post data\nfunc addData(title: String) {\ndo {\n_ = try databaseReference.addDocument(data:\
    \ [\"title\": title])\n}\ncatch {\nprint(error.localizedDescription)\n}\n}\n```\n\
    \nThere is not much to comment on here. We are using the `addDocument` APIs from\
    \ Firebase passing our data: the title as a string. It’s also catching errors\
    \ in case there are some; it is going to be printed in our console with the `catch`.\n\
    \nThat’s enough for our Model–View Model to post data to Firestore. It’s now time\
    \ to build our user interface. We are going to create the UI for our form and\
    \ handle the logic to present it from our `ContentView.swift` file.\n\nGo ahead\
    \ and click `Create a new file ➤ SwiftUI View` and call it `FormView`:\n\n```\n\
    import SwiftUI\nstruct FormView: View {\n@Environment(\\.dismiss) var dismiss\n\
    @State var titleText = \"\"\nvar body: some View {\n// ...\n}\n}\n```\n\nThese\
    \ lines of code will be helpful to handle the presentation and handle the text\
    \ entry of our user with a title.\n\nNow let’s build a form. Add the following\
    \ code inside the `body` variable:\n\n```\nNavigationStack {\nForm {\nSection\
    \ {\nTextEditor(text: $titleText)\n.frame(minHeight: 200)\n}\nSection {\nButton(action:\
    \ {\n//TODO: upload data\n}) {\nText(\"Save now\")\n}.disabled(self.titleText.isEmpty)\n\
    .foregroundColor(.yellow)\n}\n}.navigationTitle(\"Publish\")\n.toolbar {\nToolbarItemGroup(placement:\
    \ .destructiveAction) {\nButton(\"Cancel\") {\ndismiss()\n}\n}\n}\n}\n```\n\n\
    Great! We just added a `NavigationStack` with a form composed of a `TextEditor`\
    \ (better than `TextField` for long entries). Also, we added a button to publish,\
    \ which is disabled if there is no text entry, and another button as part of the\
    \ navigation at the top to dismiss it.\n\nWe can now call this screen from the\
    \ `ContentView.swift` file! Add the followings `@State` to observe the presentation:\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n@State private var showingSheet\
    \ = false @State private var postDetent = PresentationDetent.medium\nvar body:\
    \ some View {\n// ...\n}\n}\nstruct ContentView_Previews: PreviewProvider {\n\
    // ...\n}\n```\n\nIt’s now time to create our bottom bar with the button to present\
    \ our form modally.\n\nAdd the following code inside the `body` variable:\n\n\
    ```\nNavigationStack {\nList {\n// TODO: present our notes\n}\n.toolbar {\nToolbarItemGroup(placement:\
    \ .bottomBar) {\nText(\" X notes\") // TODO\nSpacer()\nButton {\n// Write a new\
    \ note\nshowingSheet.toggle()\n} label: {\nImage(systemName: \"square.and.pencil\"\
    )\n}\n.imageScale(.large)\n.sheet(isPresented: $showingSheet) {\nFormView().presentationDetents([.large,\
    \ .medium])\n}\n}\n} }.navigationTitle(\"Notes\")\n```\n\nWe just added another\
    \ `NavigationStack` with a list that we are going to fill out with data in the\
    \ next section and a button at the bottom replicating the one from the Apple Notes\
    \ app, thanks to SF Symbols.\n\n> **SF Symbols** is a library of icons built by\
    \ Apple. As of now, it provides over 4, 400 symbols. This way, you don’t need\
    \ designer skills to integrate nice-looking icons into your application. If you\
    \ want to check out what icons you can pick up, you can download Apple’s application\
    \ at the following page:\n> \n> [`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/)\n\
    \nThis sheet will be presented upon button tap and can be dismissed from the form.\n\
    \nYou can run your application and check the interaction; you should be able to\
    \ access the form and close it multiple times.\n\nNow that we are good to go with\
    \ our user interface, it’s time to post data to Firestore and head to `FormView`\
    \ again.\n\nAnd add the following observer just over the `body` variable:\n\n\
    ```\n@ObservedObject private var viewModel = NoteViewModel()\n```\n\nThis will\
    \ make the data binding between our View and our View Model. Now we only need\
    \ to call the function we created earlier inside our button action, where we left\
    \ the `// TODO: upload data` comment, as follows:\n\n```\nvar body: some View\
    \ {\nNavigationStack {\nForm {\nSection {\n// ..\n}\nSection {\nButton(action:\
    \ {\nself.viewModel.addData(title: titleText)\ntitleText = \"\"\ndismiss()\n})\
    \ {\n// ..\n}\n// ...\n}\n}.navigationTitle(\"Publish\")\n// ...\n}\n}\n```"
  raw: '## Create Data to Firestore


    Before we start coding, Firebase still needs a bit of setup to work with the Firestore
    database. Go to your Firebase console and head to the Firestore Database section
    in the left panel and click the Create database button as in the following figure:


    ![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig3_HTML.png)


    A screen displays the firestore database, with the note panel section with cloud
    firestore, to create a database.


    Figure 3-3


    Firebase console – Firestore section


    A pop-up will appear inviting you to complete a two-step process. The first one
    is to choose how to start your database. We will go ahead with test mode, since
    we are only discovering Firebase in this chapter. We don’t need to set up rules
    to restrict our Firebase usage to authenticated users, for example. Additionally,
    we are on the Spark plan, and we didn’t enter a credit card yet, so we are good
    to go regarding billing.


    The second step is to select a location. Simply choose the one closer to you.
    I picked up US-Central, but if you’re going to distribute the app for the European
    market, it is better to select Central Europe as the database since it is going
    to be closer and slightly more efficient. Follow the two steps as described in
    the following:


    ![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig4_HTML.png)


    Two screens display the creation of a database and two options at the bottom,
    as well as warnings and enable options on the right side.


    Figure 3-4


    Firestore two-step setup


    Now that our database is activated, it’s time to get back to Xcode. Open the project
    Note that we created and connected to Firebase earlier.


    According to the MVVM architecture we spoke about earlier, we are going to create
    the Model.


    Click Create a new file ➤ Swift File and call it *Note*. Then paste the following
    code:


    ```

    import Foundation

    import FirebaseFirestoreSwift

    struct Note: Codable {

    @DocumentID var id: String?

    var title: String?

    }

    ```


    That’s all we need for our Model, an identifier and a title that will hold the
    text we will enter later in our form.


    Note here that we have imported *FirebaseFirestoreSwift* to access the *@DocumentID*
    keyword; this comes from Firebase to help us map the document correctly with the
    identifier from Firebase.


    The next step is to create our View Model. This file will be responsible for passing
    data to our View conforming to the Model we just created. It’s also going to talk
    to Firebase using their APIs, so we need to import the Firestore framework at
    the top.


    Click Create a new file ➤ Swift File and name it *NoteViewModel* and import the
    framework at the top:


    ```

    import FirebaseFirestore

    ```


    You can then copy/paste the following code into your file:


    ```

    class NoteViewModel: ObservableObject {

    @Published var notes = [Note]()

    private var databaseReference = Firestore.firestore().collection("Notes")

    // function to post data

    // function to read data

    // function to update data

    // function to delete data

    }

    ```


    Great, we just created a class conforming to the *ObservableObject*; it allows
    instances of this class to be used inside views later, so when changes happen,
    the View will reload with the updated changes.


    Then, we have created a reference to our Model with the *Published* to tell our
    program to reload when changes happen with our Model.


    Also, we added a variable so we can refer to the Firestore collection that we
    just named Notes. It is useful to add this reference, so we don’t need to write
    it multiple times when we are writing a function to fetch, read, delete, or update
    data.


    It is now time to add the function to post data to Firestore right under a comment
    I left:


    ```

    // function to post data

    func addData(title: String) {

    do {

    _ = try databaseReference.addDocument(data: ["title": title])

    }

    catch {

    print(error.localizedDescription)

    }

    }

    ```


    There is not much to comment on here. We are using the *addDocument* APIs from
    Firebase passing our data: the title as a string. It’s also catching errors in
    case there are some; it is going to be printed in our console with the catch.


    That’s enough for our Model–View Model to post data to Firestore. It’s now time
    to build our user interface. We are going to create the UI for our form and handle
    the logic to present it from our ContentView.swift file.


    Go ahead and click Create a new file ➤ SwiftUI View and call it *FormView*:


    ```

    import SwiftUI

    struct FormView: View {

    @Environment(\.dismiss) var dismiss

    @State var titleText = ""

    var body: some View {

    // ...

    }

    }

    ```


    These lines of code will be helpful to handle the presentation and handle the
    text entry of our user with a title.


    Now let’s build a form. Add the following code inside the body variable:


    ```

    NavigationStack {

    Form {

    Section {

    TextEditor(text: $titleText)

    .frame(minHeight: 200)

    }

    Section {

    Button(action: {

    //TODO: upload data

    }) {

    Text("Save now")

    }.disabled(self.titleText.isEmpty)

    .foregroundColor(.yellow)

    }

    }.navigationTitle("Publish")

    .toolbar {

    ToolbarItemGroup(placement: .destructiveAction) {

    Button("Cancel") {

    dismiss()

    }

    }

    }

    }

    ```


    Great! We just added a *NavigationStack* with a form composed of a TextEditor
    (better than *TextField* for long entries). Also, we added a button to publish,
    which is disabled if there is no text entry, and another button as part of the
    navigation at the top to dismiss it.


    We can now call this screen from the *ContentView.swift* file! Add the followings
    *@State* to observe the presentation:


    ```

    import SwiftUI

    struct ContentView: View {

    @State private var showingSheet = false @State private var postDetent = PresentationDetent.medium

    var body: some View {

    // ...

    }

    }

    struct ContentView_Previews: PreviewProvider {

    // ...

    }

    ```


    It’s now time to create our bottom bar with the button to present our form modally.


    Add the following code inside the body variable:


    ```

    NavigationStack {

    List {

    // TODO: present our notes

    }

    .toolbar {

    ToolbarItemGroup(placement: .bottomBar) {

    Text(" X notes") // TODO

    Spacer()

    Button {

    // Write a new note

    showingSheet.toggle()

    } label: {

    Image(systemName: "square.and.pencil")

    }

    .imageScale(.large)

    .sheet(isPresented: $showingSheet) {

    FormView().presentationDetents([.large, .medium])

    }

    }

    } }.navigationTitle("Notes")

    ```


    We just added another *NavigationStack* with a list that we are going to fill
    out with data in the next section and a button at the bottom replicating the one
    from the Apple Notes app, thanks to SF Symbols.


    > *SF Symbols* *is a library of icons built by Apple. As of now, it provides over
    4, 400 symbols. This way, you don’t need designer skills to integrate nice-looking
    icons into your application. If you want to check out what icons you can pick
    up, you can download Apple’s application at the following page:*


    > [`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/)*.*


    This sheet will be presented upon button tap and can be dismissed from the form.


    You can run your application and check the interaction; you should be able to
    access the form and close it multiple times.


    Now that we are good to go with our user interface, it’s time to post data to
    Firestore and head to *FormView* again.


    And add the following observer just over the body variable:


    ```

    @ObservedObject private var viewModel = NoteViewModel()

    ```


    This will make the data binding between our View and our View Model. Now we only
    need to call the function we created earlier inside our button action, where we
    left the *TODO: upload data* comment, as follows:


    ```

    var body: some View {

    NavigationStack {

    Form {

    Section {

    // ..

    }

    Section {

    Button(action: {

    self.viewModel.addData(title: titleText)

    titleText = ""

    dismiss()

    }) {

    // ..

    }

    // ...

    }

    }.navigationTitle("Publish")

    // ...

    }

    }

    ```'
  trans: "\n## 创建 Firestore 数据\n\n在开始编码之前，Firebase 仍需要进行一些设置才能使用 Firestore 数据库。前往你的\
    \ Firebase 控制台，在左侧面板中找到 Firestore Database 部分，然后点击 `Create database` 按钮，如下图所示：\n\
    \n![](img/533376_1_En_3_Fig3_HTML.png)\n\n屏幕显示了一个 Firestore 数据库，并带有 Cloud Firestore\
    \ 的说明面板，用于创建数据库。\n\n**图 3-3** Firebase 控制台 – Firestore 部分\n\n此时会弹出一个窗口，引导你完成两个步骤。第一步是选择如何启动数据库。我们将选择测试模式，因为本章只是初步探索\
    \ Firebase。我们无需设置规则来将 Firebase 的使用限制在已认证用户等范围内。此外，我们使用的是 Spark 计划，尚未输入信用卡信息，因此在计费方面没有问题。\n\
    \n第二步是选择数据存储位置。只需选择离你较近的区域即可。我选择了美国中部，但如果你打算将应用分发到欧洲市场，那么选择中欧作为数据库位置会更优，因为距离更近，效率也稍高。请按照以下说明完成这两个步骤：\n\
    \n![](img/533376_1_En_3_Fig4_HTML.png)\n\n两个屏幕分别显示了数据库的创建过程、底部的两个选项，以及右侧的警告和启用选项。\n\
    \n**图 3-4** Firestore 两步设置\n\n现在我们的数据库已经激活，是时候回到 Xcode 了。打开我们之前创建并连接到 Firebase\
    \ 的 Note 项目。\n\n根据我们之前讨论的 MVVM 架构，接下来要创建 Model。\n\n点击 `Create a new file ➤ Swift\
    \ File` 并将其命名为 `Note`。然后粘贴以下代码：\n\n```\nimport Foundation\nimport FirebaseFirestoreSwift\n\
    struct Note: Codable {\n@DocumentID var id: String?\nvar title: String?\n}\n```\n\
    \n这就是我们的 Model 所需的全部内容：一个标识符和一个用于存储稍后将在表单中输入的文本的标题。\n\n请注意，我们导入了 `FirebaseFirestoreSwift`\
    \ 以使用 `@DocumentID` 关键字。这个关键字来自 Firebase，用于帮助我们正确地将文档与 Firebase 的标识符进行映射。\n\n\
    下一步是创建我们的 View Model。这个文件将负责根据我们刚创建的 Model 将数据传递给 View。它还将使用 Firebase 的 API 与\
    \ Firebase 进行通信，因此我们需要在顶部导入 Firestore 框架。\n\n点击 `Create a new file ➤ Swift File`\
    \ 并将其命名为 `NoteViewModel`，然后在顶部导入框架：\n\n```\nimport FirebaseFirestore\n```\n\n\
    然后，你可以将以下代码复制/粘贴到你的文件中：\n\n```\nclass NoteViewModel: ObservableObject {\n@Published\
    \ var notes = [Note]()\nprivate var databaseReference = Firestore.firestore().collection(\"\
    Notes\")\n// 用于发布数据的函数\n// 用于读取数据的函数\n// 用于更新数据的函数\n// 用于删除数据的函数\n}\n```\n\n很好，我们刚刚创建了一个符合\
    \ `ObservableObject` 的类。它允许该类的实例稍后在视图中使用，这样当发生变化时，视图将使用更新后的更改重新加载。\n\n然后，我们使用\
    \ `Published` 创建了一个对 Model 的引用，以告知程序当 Model 发生更改时重新加载。\n\n此外，我们还添加了一个变量，以便引用我们刚刚命名为\
    \ `Notes` 的 Firestore 集合。添加这个引用很有用，这样我们在编写获取、读取、删除或更新数据的函数时，无需多次编写它。\n\n现在是时候在之前留下的注释下方添加将数据发布到\
    \ Firestore 的函数了：\n\n```\n// 用于发布数据的函数\nfunc addData(title: String) {\ndo {\n\
    _ = try databaseReference.addDocument(data: [\"title\": title])\n}\ncatch {\n\
    print(error.localizedDescription)\n}\n}\n```\n\n这里没有什么太多需要评论的。我们使用的是 Firebase\
    \ 的 `addDocument` API，传递我们的数据：标题（字符串）。如果出现错误，它也会捕获错误，并在控制台中通过 `catch` 打印出来。\n\n\
    对于 Model-View Model 将数据发布到 Firestore 来说，这已经足够了。现在是时候构建我们的用户界面了。我们将为表单创建 UI，并处理从\
    \ `ContentView.swift` 文件中呈现它的逻辑。\n\n继续操作，点击 `Create a new file ➤ SwiftUI View`\
    \ 并将其命名为 `FormView`：\n\n```\nimport SwiftUI\nstruct FormView: View {\n@Environment(\\\
    .dismiss) var dismiss\n@State var titleText = \"\"\nvar body: some View {\n//\
    \ ...\n}\n}\n```\n\n这些代码行将有助于处理视图的呈现和用户通过标题输入的文本。\n\n现在让我们构建一个表单。在 `body` 变量内添加以下代码：\n\
    \n```\nNavigationStack {\nForm {\nSection {\nTextEditor(text: $titleText)\n.frame(minHeight:\
    \ 200)\n}\nSection {\nButton(action: {\n// TODO: 上传数据\n}) {\nText(\"立即保存\")\n\
    }.disabled(self.titleText.isEmpty)\n.foregroundColor(.yellow)\n}\n}.navigationTitle(\"\
    发布\")\n.toolbar {\nToolbarItemGroup(placement: .destructiveAction) {\nButton(\"\
    取消\") {\ndismiss()\n}\n}\n}\n}\n```\n\n很好！我们刚刚添加了一个包含表单的 `NavigationStack`，该表单由一个\
    \ `TextEditor`（对于长文本输入来说比 `TextField` 更好）组成。此外，我们还添加了一个发布按钮，如果没有文本输入则禁用；以及另一个按钮作为导航的一部分位于顶部，用于关闭视图。\n\
    \n现在，我们可以从 `ContentView.swift` 文件中调用这个屏幕了！添加以下 `@State` 来观察视图的呈现状态：\n\n```\nimport\
    \ SwiftUI\nstruct ContentView: View {\n@State private var showingSheet = false\
    \ @State private var postDetent = PresentationDetent.medium\nvar body: some View\
    \ {\n// ...\n}\n}\nstruct ContentView_Previews: PreviewProvider {\n// ...\n}\n\
    ```\n\n现在是时候创建带有按钮的底部栏，以模态方式呈现我们的表单了。\n\n在 `body` 变量内添加以下代码：\n\n```\nNavigationStack\
    \ {\nList {\n// TODO: 显示我们的笔记\n}\n.toolbar {\nToolbarItemGroup(placement: .bottomBar)\
    \ {\nText(\" X 条笔记\") // TODO\nSpacer()\nButton {\n// 写一条新笔记\nshowingSheet.toggle()\n\
    } label: {\nImage(systemName: \"square.and.pencil\")\n}\n.imageScale(.large)\n\
    .sheet(isPresented: $showingSheet) {\nFormView().presentationDetents([.large,\
    \ .medium])\n}\n}\n} }.navigationTitle(\"笔记\")\n```\n\n我们刚刚添加了另一个 `NavigationStack`，其中包含一个列表（我们将在下一部分用数据填充它），并在底部添加了一个按钮，复制了\
    \ Apple Notes 应用中的功能，这要感谢 SF Symbols。\n\n> **SF Symbols** 是 Apple 构建的图标库。截至目前，它提供了超过\
    \ 4,400 个符号。这样，你无需设计师技能即可将漂亮的图标集成到你的应用程序中。如果你想查看可以选择哪些图标，可以从以下页面下载 Apple 的应用：\n\
    > \n> [`https://developer.apple.com/sf-symbols/`](https://developer.apple.com/sf-symbols/)\n\
    \n这个页面将在点击按钮时呈现，并且可以从表单中关闭。\n\n你可以运行你的应用程序并检查交互；你应该能够多次访问表单并关闭它。\n\n既然我们的用户界面已经准备就绪，是时候将数据发布到\
    \ Firestore 并再次前往 `FormView` 了。\n\n在 `body` 变量上方添加以下观察者：\n\n```\n@ObservedObject\
    \ private var viewModel = NoteViewModel()\n```\n\n这将实现 View 和 View Model 之间的数据绑定。现在我们只需要在我们之前留下\
    \ `// TODO: upload data` 注释的地方，在按钮操作中调用我们之前创建的函数即可，如下所示：\n\n```\nvar body: some\
    \ View {\nNavigationStack {\nForm {\nSection {\n// ..\n}\nSection {\nButton(action:\
    \ {\nself.viewModel.addData(title: titleText)\ntitleText = \"\"\ndismiss()\n})\
    \ {\n// ..\n}\n// ...\n}\n}.navigationTitle(\"发布\")\n// ...\n}\n}\n```\n"
- fmt: "Et voilà! We simply recall our function from the View Model to publish data\
    \ to Firebase, passing the content of the title text. Then we dismiss the View\
    \ with `dismiss()`.\n\nRun your application, write some texts, and click “Save\
    \ now.”\n\n![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig5_HTML.png)\n\nMobile\
    \ screen on the left side displays a note under publish, and web screen on the\
    \ right displays the data tab in cloud firestore note panel, with the corresponding\
    \ note added under, add field option.\n\n**Figure 3-5** Uploading data to Firestore\n\
    \nLet’s see what’s happens on your Firebase Firestore console:\n\nCongratulations!\
    \ We just did our first call with Firebase’s APIs, adding a document under the\
    \ Notes collection. You can even go ahead and add as many as you want!\n\nIt’s\
    \ now time to read these notes and display them inside our list!\n\n## Read Data\
    \ from Firestore\n\nIt is now time to read our notes since we have posted a few\
    \ on Firestore. Inside our `ContentView.swift` file, we added a `NavigationView`,\
    \ composed of a `List`. We will display the data in this list, but we haven’t\
    \ added the function to fetch these data. It’s time to head to the `NoteViewModel.swift`\
    \ file and add the following function under the comment that we left:\n\n```\n\
    // function to read data\nfunc fetchData() {\n    databaseReference.addSnapshotListener\
    \ { (querySnapshot, error) in\n        guard let documents = querySnapshot?.documents\
    \ else {\n            print(\"No documents\")\n            return\n        }\n\
    \        self.notes = documents.compactMap { queryDocumentSnapshot -> Note? in\n\
    \            return try? queryDocumentSnapshot.data(as: Note.self)\n        }\n\
    \    }\n}\n```\n\nThis function to read data from Firestore was missing. It is\
    \ adding a listener so our frontend can receive updates from our backend in real\
    \ time based on the Model `Note` we have created.\n\nLet’s use it in our `ContentView`\
    \ now to fetch the data and display them in a list. As we did in the `FormView`,\
    \ we need to also observe our View Model. Please add the following line of code,\
    \ over the `body` variable inside our `ContentView.swift` file:\n\n```\n@ObservedObject\
    \ private var viewModel = NoteViewModel()\n```\n\nNow that we are ready to listen\
    \ to the updates from our View Model, let’s implement the UI now (still in the\
    \ `ContentView.swift` file):\n\n```\nimport SwiftUI\n\nstruct ContentView: View\
    \ {\n    // ...\n    var body: some View {\n        NavigationStack {\n      \
    \      List {\n                ForEach(viewModel.notes, id:\\.id) { Note in\n\
    \                    VStack(alignment: .leading) {\n                        Text(Note.title\
    \ ?? \"\").font(.system(size: 22, weight: .regular))\n                    }.frame(maxHeight:\
    \ 200)\n                }\n            }.onAppear(perform: self.viewModel.fetchData)\n\
    \            .toolbar {\n                ToolbarItemGroup(placement: .bottomBar)\
    \ {\n                    Text(\"\\(viewModel.notes.count) notes\")\n         \
    \           Spacer()\n                    Button {\n                        //\
    \ ...\n                    } label: {\n                        Image(systemName:\
    \ \"square.and.pencil\")\n                    }\n                    // ...\n\
    \                }\n            }\n        }.navigationTitle(\"Notes\")\n    \
    \    // ..\n    }\n}\n```\n\nWe just implemented a list based on our Model, attributing\
    \ to each one an identifier; otherwise, when we add or delete notes, SwiftUI wouldn’t\
    \ be able to know what to refer to. That’s what this `id:\\.id` is for.\n\nAlso,\
    \ we are fetching the data with the `.onAppear` modifier, so the function is called\
    \ anytime the View appears.\n\nWe also added the code `viewModel.notes.count`\
    \ to let the user know how many notes there are registered on our application,\
    \ similar to Apple’s Notes application.\n\nRun the app, and all the data you added\
    \ will be there. I added a few quotes from the US presidents. My list looks like\
    \ this:\n\n![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig6_HTML.png)\n\nMobile\
    \ screen on the left side displays 3 notes and web screen on the right displays\
    \ the cloud storage with the third note under add fields option.\n\n**Figure 3-6**\
    \ Reading data from Firestore\n\n## Pass Data from Views\n\nNow, what if we want\
    \ to read the entire quote? Not easy from the list. It might be cool to present\
    \ another screen with more details. That’s what we are going to implement. The\
    \ challenge here is to pass the data between views with the correct identifier.\
    \ Let’s do that.\n\nWe are going to create a `DetailsView` to present our text\
    \ in a `ScrollView` so we can read the whole text.\n\nCreate a new SwiftUI View\
    \ file and call it “`DetailsView`” and add the following code to it:\n\n```\n\
    import SwiftUI\n\nstruct DetailsView: View {\n    var note: Note\n    var body:\
    \ some View {\n        Text(\"\\(note.title ?? \"\")\")\n    }\n}\n\nstruct DetailsView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        DetailsView(note:\
    \ Note(id: \"bKrivNkYirmMvHyAUBWv\", title: \"Issues are never simple. One thing\
    \ I'm proud of is that very rarely will you hear me simplify the issues.Barack\
    \ Obama\"))\n    }\n}\n```\n\nThis way, we have a reference to pass the data from\
    \ the `ContentView` to our `DetailsView`. Also, we need to init inside our preview\
    \ with some default data; otherwise, Xcode won’t let us run our application.\n\
    \nWe also replace the `Text` “Hello, world” with our note’s title, passing a default\
    \ empty string in case there is no data with `?? \"\"`.\n\nIt’s now time to make\
    \ the row clickable and pass the data. Let’s head back to the `ContentView` file\
    \ and embed the `VStack` with your text in a `NavigationLink` modifier as follows:\n\
    \n```\nstruct ContentView: View {\n    // ...\n    var body: some View {\n   \
    \     NavigationStack {\n            List(viewModel.notes, id: \\.id) { Note in\n\
    \                NavigationLink(destination: DetailsView(note: Note)) {\n    \
    \                VStack(alignment: .leading) {\n                        Text(Note.title\
    \ ?? \"\").font(.system(size: 22, weight: .regular))\n                    }.frame(maxHeight:\
    \ 200)\n                }\n            }.onAppear(perform: self.viewModel.fetchData)\n\
    \        }\n        .toolbar {\n            // ...\n        }\n        .navigationTitle(\"\
    Notes\")\n    }\n}\n```\n\nAnd this is all that we need. With SwiftUI’s `NavigationLink`,\
    \ we just need to pass which views we want to present and the data they need to\
    \ contain. Here we refer to the Note Model that we have also called inside the\
    \ `DetailsView` to make it work.\n\nNote that the `NavigationLink` only works\
    \ inside a `NavigationView` as it is part of the protocol.\n\nYou can now run\
    \ your app and click a row; it will open the `DetailsView` and present you the\
    \ details based on the row you clicked.\n\nBut let’s improve a bit our user interface\
    \ for our `DetailsView`. We will give a title to the navigation bar, and we will\
    \ place our text inside a `ScrollView` so we can read it entirely when the text\
    \ is long. Implement the following code inside the `body` variable:\n\n```\nNavigationStack\
    \ {\n    ScrollView {\n        VStack {\n            Text(note.title ?? \"\")\n\
    \                .font(.system(size: 22, weight: .regular))\n                .padding()\n\
    \            Spacer()\n        }\n    }\n}.navigationTitle(\"Details\")\n```\n\
    \nThat is nicer! We are now conforming to our initial user interface:\n\n![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig7_HTML.png)\n\
    \nTwo mobile screens display notes in two formats. First has 3 notes and the second\
    \ has 1 note.\n\n**Figure 3-7** Navigating from a list to another view\n\nThanks\
    \ to the `NavigationLink`, a `>` symbol appears automatically in our row, indicating\
    \ to our user that it is clickable. Now, what if we miswrite a note? Let’s implement\
    \ an editor for that!"
  raw: 'Et voilà! We simply recall our function from the View Model to publish data
    to Firebase, passing the content of the title text. Then we dismiss the View with
    *dismiss()*.


    Run your application, write some texts, and click “Save now.”


    ![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig5_HTML.png)


    Mobile screen on the left side displays a note under publish, and web screen on
    the right displays the data tab in cloud firestore note panel, with the corresponding
    note added under, add field option.


    Figure 3-5


    Uploading data to Firestore


    Let’s see what’s happens on your Firebase Firestore console:


    Congratulations! We just did our first call with Firebase’s APIs, adding a document
    under the Notes collection. You can even go ahead and add as many as you want!


    It’s now time to read these notes and display them inside our list!


    ## Read Data from Firestore


    It is now time to read our notes since we have posted a few on Firestore. Inside
    our *ContentView.swift* file, we added a *NavigationView*, composed of a *List*.
    We will display the data in this list, but we haven’t added the function to fetch
    these data. It’s time to head to the *NoteViewModel.swift* file and add the following
    function under the comment that we left:


    ```

    // function to read data

    func fetchData() {

    databaseReference.addSnapshotListener { (querySnapshot, error) in

    guard let documents = querySnapshot?.documents else {

    print("No documents")

    return

    }

    self.notes = documents.compactMap { queryDocumentSnapshot -> Note? in

    return try? queryDocumentSnapshot.data(as: Note.self)

    }

    }

    }

    ```


    This function to read data from Firestore was missing. It is adding a listener
    so our frontend can receive updates from our backend in real time based on the
    Model *Note* we have created.


    Let’s use it in our *ContentView* now to fetch the data and display them in a
    list. As we did in the *FormView*, we need to also observe our *View Model*. Please
    add the following line of code, over the `body` variable inside our *ContentView.swift*
    file:


    ```

    @ObservedObject private var viewModel = NoteViewModel()

    ```


    Now that we are ready to listen to the updates from our View Model, let’s implement
    the UI now (still in the *ContentView.swift* file):


    ```

    import SwiftUI

    struct ContentView: View {

    // ...

    var body: some View {

    NavigationStack {

    List {

    ForEach(viewModel.notes, id:\.id) { Note in

    VStack(alignment: .leading) {

    Text(Note.title ?? "").font(.system(size: 22, weight: .regular))

    }.frame(maxHeight: 200)

    }

    }.onAppear(perform: self.viewModel.fetchData)

    .toolbar {

    ToolbarItemGroup(placement: .bottomBar) {

    Text("\(viewModel.notes.count) notes")

    Spacer()

    Button {

    // ...

    } label: {

    Image(systemName: "square.and.pencil")

    }

    // ...

    }

    }

    }.navigationTitle("Notes")

    // ..

    ```


    We just implemented a list based on our Model, attributing to each one an identifier;
    otherwise, when we add or delete notes, SwiftUI wouldn’t be able to know what
    to refer to. That’s what this `id:\.id` is for.


    Also, we are fetching the data with the .`OnAppear` modifier, so the function
    is called anytime the View appears.


    We also added the code `viewModel.notes.count` to let the user know how many notes
    there are registered on our application, similar to Apple’s Notes application.


    Run the app, and all the data you added will be there. I added a few quotes from
    the US presidents. My list looks like this:


    ![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig6_HTML.png)


    Mobile screen on the left side displays 3 notes and web screen on the right displays
    the cloud storage with the third note under add fields option.


    Figure 3-6


    Reading data from Firestore


    ## Pass Data from Views


    Now, what if we want to read the entire quote? Not easy from the list. It might
    be cool to present another screen with more details. That’s what we are going
    to implement. The challenge here is to pass the data between views with the correct
    identifier. Let’s do that.


    We are going to create a *DetailsView* to present our text in a *ScrollView* so
    we can read the whole text.


    Create a new `SwiftUI View` file and call it “*DetailsView*” and add the following
    code to it:


    ```

    import SwiftUI

    struct DetailsView: View {

    var note: Note

    var body: some View {

    Text("\(note.title ?? "")")

    }

    }

    struct DetailsView_Previews: PreviewProvider {

    static var previews: some View {

    DetailsView(note: Note(id: "bKrivNkYirmMvHyAUBWv", title: "Issues are never simple.
    One thing I''m proud of is that very rarely will you hear me simplify the issues.Barack
    Obama"))

    }

    }

    ```


    This way, we have a reference to pass the data from the `ContentView` to our `DetailsView`.
    Also, we need to init inside our preview with some default data; otherwise, Xcode
    won’t let us run our application.


    We also replace the `Text` “Hello, world” with our note’s title, passing a default
    empty string in case there is no data with `?? ""`.


    It’s now time to make the row clickable and pass the data. Let’s head back to
    the *ContentView* file and embed the *VStack* with your text in a *NavigationLink*
    modifier as follows:


    ```

    struct ContentView: View {

    // ...

    var body: some View {

    NavigationStack {

    List(viewModel.notes, id: \.id) { Note in

    NavigationLink(destination: DetailsView(note: Note)) {

    VStack(alignment: .leading) {

    Text(Note.title ?? "").font(.system(size: 22, weight: .regular))

    }.frame(maxHeight: 200)

    } }

    }.onAppear(perform: self.viewModel.fetchData)

    }

    .toolbar {

    // ...

    }

    }.navigationTitle("Notes")

    } }

    ```


    And this is all that we need. With SwiftUI’s NavigationLink, we just need to pass
    which views we want to present and the data they need to contain. Here we refer
    to the Note Model that we have also called inside the *DetailsView* to make it
    work.


    Note that the `NavigationLink` only works inside a `NavigationView` as it is part
    of the protocol.


    You can now run your app and click a row; it will open the `DetailsView` and present
    you the details based on the row you clicked.


    But let’s improve a bit our user interface for our *DetailsView*. We will give
    a title to the navigation bar, and we will place our text inside a *ScrollView*
    so we can read it entirely when the text is long. Implement the following code
    inside the `body` variable:


    ```

    NavigationStack {

    ScrollView {

    VStack {

    Text(note.title ?? "")

    .font(.system(size: 22, weight: .regular))

    .padding()

    Spacer()

    }

    }

    }.navigationTitle("Details")

    ```


    That is nicer! We are now conforming to our initial user interface:


    ![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig7_HTML.png)


    Two mobile screens display notes in two formats. First has 3 notes and the second
    has 1 note.


    Figure 3-7


    Navigating from a list to another view


    Thanks to the `NavigationLink`, a `>` symbol appears automatically in our row,
    indicating to our user that it is clickable. Now, what if we miswrite a note?
    Let’s implement an editor for that!'
  trans: "\n瞧！我们只需从视图模型中调用函数，将标题文本的内容发布到 Firebase，然后使用 `dismiss()` 关闭视图。\n\n运行你的应用，输入一些文字，然后点击“立即保存”。\n\
    \n![](img/533376_1_En_3_Fig5_HTML.png)\n\n左侧的移动屏幕显示“发布”下方有一条笔记，右侧的 Web 屏幕显示 Cloud\
    \ Firestore 笔记面板中的数据选项卡，下方添加了相应的笔记，以及“添加字段”选项。\n\n**图 3-5** 向 Firestore 上传数据\n\
    \n让我们看看你的 Firebase Firestore 控制台发生了什么：\n\n恭喜！我们刚刚完成了对 Firebase API 的首次调用，在 Notes\
    \ 集合中添加了一个文档。你甚至可以继续添加任意多个文档！\n\n现在是时候读取这些笔记并将它们显示在我们的列表中了！\n\n## 从 Firestore\
    \ 读取数据\n\n现在该读取我们的笔记了，因为我们已经向 Firestore 发布了几条笔记。在我们的 `ContentView.swift` 文件中，我们添加了一个由\
    \ `List` 组成的 `NavigationView`。我们将在这个列表中显示数据，但还没有添加获取这些数据的函数。接下来进入 `NoteViewModel.swift`\
    \ 文件，在我们留下的注释下方添加以下函数：\n\n```\n// 读取数据的函数\nfunc fetchData() {\n    databaseReference.addSnapshotListener\
    \ { (querySnapshot, error) in\n        guard let documents = querySnapshot?.documents\
    \ else {\n            print(\"没有文档\")\n            return\n        }\n       \
    \ self.notes = documents.compactMap { queryDocumentSnapshot -> Note? in\n    \
    \        return try? queryDocumentSnapshot.data(as: Note.self)\n        }\n  \
    \  }\n}\n```\n\n这个从 Firestore 读取数据的函数之前缺失了。它添加了一个监听器，以便我们的前端能够基于我们创建的 `Note` 模型实时接收来自后端的更新。\n\
    \n现在让我们在 `ContentView` 中使用它来获取数据并在列表中显示。就像我们在 `FormView` 中所做的那样，我们也需要观察视图模型。请在\
    \ `ContentView.swift` 文件中的 `body` 变量上方添加以下代码行：\n\n```\n@ObservedObject private\
    \ var viewModel = NoteViewModel()\n```\n\n现在我们已经准备好监听视图模型的更新，接下来实现 UI（仍在 `ContentView.swift`\
    \ 文件中）：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    // ...\n   \
    \ var body: some View {\n        NavigationStack {\n            List {\n     \
    \           ForEach(viewModel.notes, id:\\.id) { Note in\n                   \
    \ VStack(alignment: .leading) {\n                        Text(Note.title ?? \"\
    \").font(.system(size: 22, weight: .regular))\n                    }.frame(maxHeight:\
    \ 200)\n                }\n            }.onAppear(perform: self.viewModel.fetchData)\n\
    \            .toolbar {\n                ToolbarItemGroup(placement: .bottomBar)\
    \ {\n                    Text(\"\\(viewModel.notes.count) 条笔记\")\n           \
    \         Spacer()\n                    Button {\n                        // ...\n\
    \                    } label: {\n                        Image(systemName: \"\
    square.and.pencil\")\n                    }\n                    // ...\n    \
    \            }\n            }\n        }.navigationTitle(\"笔记\")\n        // ..\n\
    \    }\n}\n```\n\n我们刚刚基于模型实现了一个列表，并为每个元素分配了一个标识符；否则，当我们添加或删除笔记时，SwiftUI 将无法知道引用哪个元素。这就是\
    \ `id:\\.id` 的作用。\n\n此外，我们使用 `.onAppear` 修饰符来获取数据，这样每当视图出现时就会调用该函数。\n\n我们还添加了代码\
    \ `viewModel.notes.count`，让用户知道我们的应用中有多少条笔记注册了，类似于苹果的 Notes 应用。\n\n运行应用，你添加的所有数据都会出现在那里。我添加了几条美国总统的名言。我的列表看起来像这样：\n\
    \n![](img/533376_1_En_3_Fig6_HTML.png)\n\n左侧的移动屏幕显示 3 条笔记，右侧的 Web 屏幕显示云存储，第三条笔记位于“添加字段”选项下。\n\
    \n**图 3-6** 从 Firestore 读取数据\n\n## 在视图之间传递数据\n\n现在，如果我们想阅读完整的引言呢？从列表中阅读并不容易。如果能显示另一个包含更多细节的屏幕会很酷。这就是我们要实现的功能。这里的挑战是如何使用正确的标识符在视图之间传递数据。让我们开始吧。\n\
    \n我们将创建一个 `DetailsView` 来在 `ScrollView` 中呈现文本，以便我们能阅读完整文本。\n\n创建一个新的 SwiftUI 视图文件，命名为“`DetailsView`”，并向其中添加以下代码：\n\
    \n```\nimport SwiftUI\n\nstruct DetailsView: View {\n    var note: Note\n    var\
    \ body: some View {\n        Text(\"\\(note.title ?? \"\")\")\n    }\n}\n\nstruct\
    \ DetailsView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        DetailsView(note: Note(id: \"bKrivNkYirmMvHyAUBWv\", title: \"问题从来都不简单。我引以为傲的一点是，你很少会听到我简化问题。巴拉克·奥巴马\"\
    ))\n    }\n}\n```\n\n这样，我们就有了一个引用，可以将数据从 `ContentView` 传递到我们的 `DetailsView`。同时，我们需要在预览中用一些默认数据进行初始化；否则，Xcode\
    \ 不会允许我们运行应用。\n\n我们还用笔记的标题替换了“Hello, world”文本，如果数据不存在，则通过 `?? \"\"` 传递一个默认的空字符串。\n\
    \n现在是时候让行变得可点击并传递数据了。让我们回到 `ContentView` 文件，将包含文本的 `VStack` 嵌入到 `NavigationLink`\
    \ 修饰符中，如下所示：\n\n```\nstruct ContentView: View {\n    // ...\n    var body: some\
    \ View {\n        NavigationStack {\n            List(viewModel.notes, id: \\\
    .id) { Note in\n                NavigationLink(destination: DetailsView(note:\
    \ Note)) {\n                    VStack(alignment: .leading) {\n              \
    \          Text(Note.title ?? \"\").font(.system(size: 22, weight: .regular))\n\
    \                    }.frame(maxHeight: 200)\n                }\n            }.onAppear(perform:\
    \ self.viewModel.fetchData)\n        }\n        .toolbar {\n            // ...\n\
    \        }\n        .navigationTitle(\"笔记\")\n    }\n}\n```\n\n这就是我们需要做的全部工作。使用\
    \ SwiftUI 的 `NavigationLink`，我们只需要传递要呈现的视图以及它们需要包含的数据。这里我们引用了在 `DetailsView` 中也调用的\
    \ `Note` 模型，以使其正常工作。\n\n请注意，`NavigationLink` 只能在 `NavigationView` 内部工作，因为它是该协议的一部分。\n\
    \n现在你可以运行你的应用并点击某一行；它将打开 `DetailsView` 并根据你点击的行显示详细信息。\n\n但让我们稍微改进一下 `DetailsView`\
    \ 的用户界面。我们将为导航栏添加一个标题，并将文本放入 `ScrollView` 中，这样当文本较长时我们可以完整阅读。在 `body` 变量中实现以下代码：\n\
    \n```\nNavigationStack {\n    ScrollView {\n        VStack {\n            Text(note.title\
    \ ?? \"\")\n                .font(.system(size: 22, weight: .regular))\n     \
    \           .padding()\n            Spacer()\n        }\n    }\n}.navigationTitle(\"\
    详情\")\n```\n\n这样看起来更好了！我们现在符合最初的用户界面设计：\n\n![](img/533376_1_En_3_Fig7_HTML.png)\n\
    \n两个移动屏幕以两种格式显示笔记。第一个有 3 条笔记，第二个有 1 条笔记。\n\n**图 3-7** 从列表导航到另一个视图\n\n得益于 `NavigationLink`，我们的每一行都自动出现了一个\
    \ `>` 符号，向用户指示该行是可点击的。现在，如果我们写错了一条笔记该怎么办？让我们为此实现一个编辑器吧！\n"
- fmt: "## Update Data from Firestore\n\nIn this section, we will implement a new\
    \ screen to edit a note and save that text entry to Firestore. But first, let’s\
    \ head to our `View Model` and add the necessary functionality to update it to\
    \ Firestore.\n\nPaste the following code in `NoteViewModel.swift`:\n\n```\n//\
    \ function to update data\nfunc updateData(title: String, id: String) {\n    databaseReference.document(id).updateData([\"\
    title\" : title]) { error in\n        if let error = error {\n            print(error.localizedDescription)\n\
    \        } else {\n            print(\"Note updated successfully\")\n        }\n\
    \    }\n}\n```\n\nAs you can see, we are passing an identifier inside our document\
    \ to let Firestore know which document needs to be updated. Then, we pass the\
    \ title to be modified inside the `updateData` function. As usual, we print the\
    \ errors if there are any.\n\nTime for the user interface. We will use an alert\
    \ presentation with a `TextField` to let the user update the text. Add the following\
    \ code at the top of `DetailsView`:\n\n```\n@State private var presentAlert =\
    \ false\n@State private var titleText: String = \"\"\n@ObservedObject private\
    \ var viewModel = NoteViewModel()\n```\n\nWe will need these parameters for our\
    \ interaction:\n\n- `@State` as a Boolean to handle the presentation of our alert\n\
    - `@State` to follow the entry of our `TextField`\n\nAnd, of course, our View\
    \ Model informs it from our View to be updated.\n\nWe are good to go to present\
    \ our `Alert` from our `DetailsView`. First, we need to add a button \"Edit\"\
    \ to this screen; we will do this with a `toolbar`. You can add it right under\
    \ the `navigationTitle`:\n\n```\n.toolbar {\n    ToolbarItemGroup(placement: .confirmationAction)\
    \ {\n        Button {\n            presentAlert = true\n        } label: {\n \
    \           Text(\"Edit\").bold()\n        }.alert(\"Note\", isPresented: $presentAlert,\
    \ actions: {\n            TextField(\"\\(note.title ?? \"\")\", text: $titleText)\n\
    \            Button(\"Update\", action: {\n                //TODO: Update data\
    \ and erase the text\n            })\n            Button(\"Cancel\", role: .cancel,\
    \ action: {\n                presentAlert = false\n                titleText =\
    \ \"\"\n            })\n        }, message: {\n            Text(\"Write your new\
    \ note\")\n        })\n    }\n}\n```\n\nGreat! Now we can present our `Alert`,\
    \ passing data along the way. We can now add our function to update our notes.\
    \ Add the following code where we left the `// TODO:` comment, in the `DetailsView`:\n\
    \n```\nself.viewModel.updateData(title: titleText, id: note.id ?? \"\")\ntitleText\
    \ = \"\"\n```\n\nEt voilà! We are now ready to run our app and edit our notes.\
    \ The field that we enter will now populate the note selected with the appropriate\
    \ identifier.\n\nLet’s say you want to change the citation from Abraham Lincoln\n\
    \n\"Leave nothing for tomorrow which can be done today. - Abraham Lincoln\"\n\n\
    to another quote from Barack Obama:\n\n\"Change will not come if we wait for some\
    \ other person, or if we wait for some other time. - Barack Obama\"\n\nGo ahead\
    \ to your list, navigate to details, and click the Edit button. Then enter the\
    \ preceding text. You will see that the text is going to be updated in the `DetailsView`\
    \ and then inside our `List`:\n\n![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig8_HTML.png)\n\
    \nThree mobile screens display notes in three formats to edit and update, along\
    \ with the updated note.\n\n**Figure 3-8** Editing a note from our Simulator\n\
    \nWe are now editing a note, and it’s edited in real time on our backend and in\
    \ our user interface.\n\nNow, what if you want to delete a note? Let’s implement\
    \ our last feature.\n\n## Delete Data from Firestore\n\nLet’s implement our last\
    \ step: deleting the data from Firestore. We left a mark in our `NoteViewModel`\
    \ just for that. Head to this file and add the following code:\n\n```\n// function\
    \ to delete data\nfunc deleteData(at indexSet: IndexSet) {\n    indexSet.forEach\
    \ { index in\n        let note = notes[index]\n        databaseReference.document(note.id\
    \ ?? \"\").delete { error in\n            if let error = error {\n           \
    \     print(\"\\(error.localizedDescription)\")\n            } else {\n      \
    \          print(\"Note with ID \\(note.id ?? \"\") deleted\")\n            }\n\
    \        }\n    }\n}\n```\n\nIn the delete function, we are giving an `indexSet`,\
    \ useful to have a reference to our list, and then passing the identifier that\
    \ we created in our Model so we are passing the correct ID information to Firestore\
    \ to delete the right document (the one selected in the row). As always, we are\
    \ printing the error if there is any, and we are printing the document identifier\
    \ if it’s successful.\n\nNow let’s make it happen on screen! Head to the `ContentView.swift`\
    \ file:\n\n```\nstruct ContentView: View {\n    // ...\n    var body: some View\
    \ {\n        NavigationStack {\n            List {\n                ForEach(viewModel.notes,\
    \ id:\\.id) { Note in\n                    NavigationLink(destination: DetailsView(note:\
    \ Note)) {\n                        // ...\n                    }\n          \
    \      }.onDelete(perform: self.viewModel.deleteData(at:))\n            }.onAppear(perform:\
    \ self.viewModel.fetchData)\n            .navigationTitle(\"Notes\")\n       \
    \ }\n        .toolbar {\n            // ...\n        }\n    }.navigationTitle(\"\
    Notes\")\n}\n```\n\nThat’s it! It is super easy to delete an item from a list\
    \ using SwiftUI. The `onDelete` modifier handles the swipe left with a Delete\
    \ title and a red background. Our function will do the rest to delete the document\
    \ on Firestore.\n\nNow I invite you to run your application on the Simulator.\
    \ Swipe left on a row you wish to delete, and check out what’s happening on your\
    \ Firestore console:\n\n![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig9_HTML.png)\n\
    \nA mobile screen displays a note with a delete option. The two screens on the\
    \ right display a cloud firestore with fields and the snippet of code on the third\
    \ screen along with the respective note.\n\n**Figure 3-9** Deleting a note from\
    \ the list and Firestore database\n\nBy doing this, you will see a deletion occurring\
    \ on the backend in real time. Then your note will disappear from the list, and\
    \ our number of notes will be updated inside the `toolBar`.\n\n## Summary\n\n\
    We have completed our first Note app with feature functions present in most applications:\
    \ the ability to post, read, update, and delete content to and from a backend.\
    \ This was a nice CRUD exercise and a great way to get you started with SwiftUI\
    \ and Firebase.\n\nIn this chapter, we covered how to structure our app using\
    \ the MVVM design pattern and the first use of Firebase’s APIs and set up a cloud\
    \ Firestore database and make things work between our user interface and our backend\
    \ or, better, between our View Model and our backend.\n\nIn the following, you\
    \ will find the link to the repository of this first application. In case you\
    \ missed something on the way, check out the repository:\n\nHow to use this repository?\
    \ If you clone this repository and run your application, it will crash. Why? Because\
    \ there is no `GoogleService-Info.plist` file in this project. Firebase will look\
    \ for it and not find the necessary API key and so not be able to initiate and\
    \ cause the crash.\n\nTo make it work, you will need to go to your Firebase console,\
    \ add a new iOS project as we did in Chapter [2](#533376_1_En_2_Chapter.xhtml),\
    \ pass the correct bundle identifier, and add the `GoogleService-Info.plist` to\
    \ this project. These two steps are crucial for making the app run properly. Normally,\
    \ the packages should fetch themselves with SPM, so you can skip this step.\n\n\
    It’s now time to head to the next chapter: we will discover Firebase Auth and\
    \ authenticate our first user!"
  raw: '## Update Data from Firestore


    In this section, we will implement a new screen to edit a note and save that text
    entry to Firestore. But first, let’s head to our `View Model` and add the necessary
    functionality to update it to Firestore.


    Paste the following code in `NoteViewModel.swift`:


    ```

    // function to update data

    func updateData(title: String, id: String) {

    databaseReference.document(id).updateData(["title" : title]) { error in

    if let error = error {

    print(error.localizedDescription)

    } else {

    print("Note updated successfully")

    }

    }

    }

    ```


    As you can see, we are passing an identifier inside our document to let Firestore
    know which document needs to be updated. Then, we pass the title to be modified
    inside the `updateData` function. As usual, we print the errors if there are any.


    Time for the user interface. We will use an alert presentation with a `TextField`
    to let the user update the text. Add the following code at the top of `DetailsView`:


    ```

    @State private var presentAlert = false

    @State private var titleText: String = ""

    @ObservedObject private var viewModel =   NoteViewModel()

    ```


    We will need these parameters for our interaction:


    *   @State as a Boolean to handle the presentation of our alert


    *   @State to follow the entry of our TextField


    And, of course, our View Model informs it from our View to be updated.


    We are good to go to present our `Alert` from our `DetailsView`. First, we need
    to add a button “Edit” to this screen; we will do this with a `toolbar`. You can
    add it right under the `navigationTitle`:


    ```

    .toolbar {

    ToolbarItemGroup(placement: .confirmationAction) {

    Button {

    presentAlert = true

    } label: {

    Text("Edit").bold()

    }.alert("Note", isPresented: $presentAlert, actions: {

    TextField("\(note.title ?? "")", text: $titleText)

    Button("Update", action: {

    //TODO: Update data and erase the text

    })

    Button("Cancel", role: .cancel, action: {

    presentAlert = false

    titleText = ""

    })

    }, message: {

    Text("Write your new note")

    })

    }

    }

    ```


    Great! Now we can present our `Alert`, passing data along the way. We can now
    add our function to update our notes. Add the following code where we left the
    `// TODO:` comment, in the `DetailsView`:


    ```

    self.viewModel.updateData(title: titleText, id: note.id ?? "")

    titleText = ""

    ```


    Et voilà! We are now ready to run our app and edit our notes. The field that we
    enter will now populate the note selected with the appropriate identifier.


    Let’s say you want to change the citation from Abraham Lincoln


    “Leave nothing for tomorrow which can be done today. - Abraham Lincoln”


    to another quote from Barack Obama:


    “Change will not come if we wait for some other person, or if we wait for some
    other time. - Barack Obama”


    Go ahead to your list, navigate to details, and click the Edit button. Then enter
    the preceding text. You will see that the text is going to be updated in the `DetailsView`
    and then inside our `List`:


    ![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig8_HTML.png)


    Three mobile screens display notes in three formats to edit and update, along
    with the updated note.


    Figure 3-8


    Editing a note from our Simulator


    We are now editing a note, and it’s edited in real time on our backend and in
    our user interface.


    Now, what if you want to delete a note? Let’s implement our last feature.


    ## Delete Data from Firestore


    Let’s implement our last step: deleting the data from Firestore. We left a mark
    in our `NoteViewModel` just for that. Head to this file and add the following
    code:


    ```

    // function to delete data

    func deleteData(at indexSet: IndexSet) {

    indexSet.forEach { index in

    let note = notes[index]

    databaseReference.document(note.id ?? "").delete { error in

    if let error = error {

    print("\(error.localizedDescription)")

    } else {

    print("Note with ID \(note.id ?? "") deleted")

    }

    }

    }

    }

    ```


    In the delete function, we are giving an `indexSet`, useful to have a reference
    to our list, and then passing the identifier that we created in our Model so we
    are passing the correct ID information to Firestore to delete the right document
    (the one selected in the row). As always, we are printing the error if there is
    any, and we are printing the document identifier if it’s successful.


    Now let’s make it happen on screen! Head to the `ContentView.swift` file:


    ```

    struct ContentView: View {

    // ...

    var body: some View {

    NavigationStack {

    List {

    ForEach(viewModel.notes, id:\.id) { Note in

    NavigationLink(destination: DetailsView(note: Note)) {

    // ...

    }

    }.onDelete(perform: self.viewModel.deleteData(at:))

    }.onAppear(perform: self.viewModel.fetchData)

    .navigationTitle("Notes")

    }

    .toolbar {

    // ...

    }

    }.navigationTitle("Notes")

    } }

    ```


    That’s it! It is super easy to delete an item from a list using SwiftUI. The `onDelete`
    modifier handles the swipe left with a Delete title and a red background. Our
    function will do the rest to delete the document on Firestore.


    Now I invite you to run your application on the Simulator. Swipe left on a row
    you wish to delete, and check out what’s happening on your Firestore console:


    ![](images/533376_1_En_3_Chapter/533376_1_En_3_Fig9_HTML.png)


    A mobile screen displays a note with a delete option. The two screens on the right
    display a cloud firestore with fields and the snippet of code on the third screen
    along with the respective note.


    Figure 3-9


    Deleting a note from the list and Firestore database


    By doing this, you will see a deletion occurring on the backend in real time.
    Then your note will disappear from the list, and our number of notes will be updated
    inside the `toolBar`.


    ## Summary


    We have completed our first Note app with feature functions present in most applications:
    the ability to post, read, update, and delete content to and from a backend. This
    was a nice CRUD exercise and a great way to get you started with SwiftUI and Firebase.


    In this chapter, we covered how to structure our app using the MVVM design pattern
    and the first use of Firebase’s APIs and set up a cloud Firestore database and
    make things work between our user interface and our backend or, better, between
    our View Model and our backend.


    In the following, you will find the link to the repository of this first application.
    In case you missed something on the way, check out the repository:


    How to use this repository? If you clone this repository and run your application,
    it will crash. Why? Because there is no *GoogleService-Info.plist* file in this
    project. Firebase will look for it and not find the necessary API key and so not
    be able to initiate and cause the crash.


    To make it work, you will need to go to your Firebase console, add a new iOS project
    as we did in Chapter [2](#533376_1_En_2_Chapter.xhtml), pass the correct bundle
    identifier, and add the *GoogleService-Info.plist* to this project. These two
    steps are crucial for making the app run properly. Normally, the packages should
    fetch themselves with SPM, so you can skip this step.


    It’s now time to head to the next chapter: we will discover Firebase Auth and
    authenticate our first user!'
  trans: "\n## 从 Firestore 更新数据\n\n在本节中，我们将实现一个新的屏幕来编辑笔记，并将文本条目保存到 Firestore。但首先，让我们前往\
    \ `View Model`，添加将其更新到 Firestore 的必要功能。\n\n将以下代码粘贴到 `NoteViewModel.swift` 中：\n\
    \n```\n// 更新数据的函数\nfunc updateData(title: String, id: String) {\n    databaseReference.document(id).updateData([\"\
    title\" : title]) { error in\n        if let error = error {\n            print(error.localizedDescription)\n\
    \        } else {\n            print(\"笔记更新成功\")\n        }\n    }\n}\n```\n\n\
    如您所见，我们在文档中传递了一个标识符，以让 Firestore 知道需要更新哪个文档。然后，我们在 `updateData` 函数中传递要修改的标题。和往常一样，如果有错误，我们会打印出来。\n\
    \n是时候处理用户界面了。我们将使用一个包含 `TextField` 的弹窗提示，让用户更新文本。在 `DetailsView` 顶部添加以下代码：\n\n\
    ```\n@State private var presentAlert = false\n@State private var titleText: String\
    \ = \"\"\n@ObservedObject private var viewModel = NoteViewModel()\n```\n\n我们需要这些参数来进行交互：\n\
    \n- `@State` 布尔值，用于控制弹窗的显示\n- `@State`，用于跟踪 `TextField` 的输入内容\n\n当然，我们的 View Model\
    \ 会从我们的 View 中获取信息以进行更新。\n\n现在，我们可以从 `DetailsView` 中展示我们的 `Alert` 了。首先，我们需要在这个屏幕上添加一个“编辑”按钮；我们将通过\
    \ `toolbar` 来实现。您可以将其直接添加到 `navigationTitle` 下方：\n\n```\n.toolbar {\n    ToolbarItemGroup(placement:\
    \ .confirmationAction) {\n        Button {\n            presentAlert = true\n\
    \        } label: {\n            Text(\"编辑\").bold()\n        }.alert(\"笔记\",\
    \ isPresented: $presentAlert, actions: {\n            TextField(\"\\(note.title\
    \ ?? \"\")\", text: $titleText)\n            Button(\"更新\", action: {\n      \
    \          // TODO: 更新数据并清空文本\n            })\n            Button(\"取消\", role:\
    \ .cancel, action: {\n                presentAlert = false\n                titleText\
    \ = \"\"\n            })\n        }, message: {\n            Text(\"写下您的新笔记\"\
    )\n        })\n    }\n}\n```\n\n太棒了！现在我们可以展示 `Alert`，并在过程中传递数据。我们现在可以添加更新笔记的函数了。在\
    \ `DetailsView` 中我们留下 `// TODO:` 注释的位置添加以下代码：\n\n```\nself.viewModel.updateData(title:\
    \ titleText, id: note.id ?? \"\")\ntitleText = \"\"\n```\n\n瞧！我们现在可以运行应用并编辑笔记了。输入的字段现在将使用相应的标识符填充选定的笔记。\n\
    \n假设您想把亚伯拉罕·林肯的语录\n\n“今天能做的事，不要留给明天。—— 亚伯拉罕·林肯”\n\n改成巴拉克·奥巴马的另一句名言：\n\n“如果我们等待其他人，或者等待其他时间，改变就不会到来。——\
    \ 巴拉克·奥巴马”\n\n前往您的列表，导航到详情页，点击编辑按钮。然后输入上述文本。您会看到文本将在 `DetailsView` 中更新，然后更新到我们的\
    \ `List` 中：\n\n![](img/533376_1_En_3_Fig8_HTML.png)\n\n三个手机屏幕以三种格式显示笔记，用于编辑和更新，以及更新后的笔记。\n\
    \n**图 3-8** 从模拟器中编辑笔记\n\n我们现在正在编辑笔记，它在后端和用户界面中都是实时编辑的。\n\n现在，如果您想删除笔记呢？让我们来实现最后一个功能。\n\
    \n## 从 Firestore 删除数据\n\n让我们实现最后一步：从 Firestore 中删除数据。我们在 `NoteViewModel` 中为此留了一个标记。前往该文件并添加以下代码：\n\
    \n```\n// 删除数据的函数\nfunc deleteData(at indexSet: IndexSet) {\n    indexSet.forEach\
    \ { index in\n        let note = notes[index]\n        databaseReference.document(note.id\
    \ ?? \"\").delete { error in\n            if let error = error {\n           \
    \     print(\"\\(error.localizedDescription)\")\n            } else {\n      \
    \          print(\"ID 为 \\(note.id ?? \"\") 的笔记已删除\")\n            }\n       \
    \ }\n    }\n}\n```\n\n在删除函数中，我们提供了一个 `indexSet`，这有助于引用我们的列表，然后传递我们在 Model 中创建的标识符，以便将正确的\
    \ ID 信息传递给 Firestore 以删除正确的文档（即在行中选定的那个）。和往常一样，如果有错误，我们会打印错误，如果成功，我们会打印文档标识符。\n\
    \n现在，让我们在屏幕上实现它！前往 `ContentView.swift` 文件：\n\n```\nstruct ContentView: View {\n\
    \    // ...\n    var body: some View {\n        NavigationStack {\n          \
    \  List {\n                ForEach(viewModel.notes, id:\\.id) { Note in\n    \
    \                NavigationLink(destination: DetailsView(note: Note)) {\n    \
    \                    // ...\n                    }\n                }.onDelete(perform:\
    \ self.viewModel.deleteData(at:))\n            }.onAppear(perform: self.viewModel.fetchData)\n\
    \            .navigationTitle(\"笔记\")\n        }\n        .toolbar {\n       \
    \     // ...\n        }\n    }.navigationTitle(\"笔记\")\n}\n```\n\n就是这样！使用 SwiftUI\
    \ 从列表中删除项目非常简单。`onDelete` 修饰符处理向左滑动，显示红色的“删除”标题。我们的函数将完成其余工作，删除 Firestore 上的文档。\n\
    \n现在，我邀请您在模拟器上运行您的应用。在您要删除的行上向左滑动，查看 Firestore 控制台上发生了什么：\n\n![](img/533376_1_En_3_Fig9_HTML.png)\n\
    \n一个手机屏幕显示带有删除选项的笔记。右侧的两个屏幕显示 Cloud Firestore 及其字段，第三个屏幕上显示相应的代码片段和笔记。\n\n**图\
    \ 3-9** 从列表和 Firestore 数据库中删除笔记\n\n通过这样做，您将看到后端实时发生删除操作。然后您的笔记将从列表中消失，我们的笔记数量将在\
    \ `toolBar` 中更新。\n\n## 总结\n\n我们已经完成了第一个具有大多数应用中常见功能函数的笔记应用：从后端发布、读取、更新和删除内容的能力。这是一次不错的\
    \ CRUD 练习，也是让您开始使用 SwiftUI 和 Firebase 的好方法。\n\n在本章中，我们介绍了如何使用 MVVM 设计模式构建我们的应用，以及首次使用\
    \ Firebase 的 API、设置 Cloud Firestore 数据库并在用户界面和后端之间（更确切地说，是在 View Model 和后端之间）建立联系。\n\
    \n接下来，您将找到第一个应用的仓库链接。如果您在途中遗漏了什么，请查阅该仓库：\n\n如何使用这个仓库？如果您克隆此仓库并运行应用，它会崩溃。为什么？因为该项目中没有\
    \ `GoogleService-Info.plist` 文件。Firebase 会查找它，但找不到必要的 API 密钥，因此无法初始化并导致崩溃。\n\n\
    要使其正常工作，您需要前往 Firebase 控制台，按照我们在第 2 章中的操作添加一个新的 iOS 项目，传递正确的捆绑标识符，并将 `GoogleService-Info.plist`\
    \ 添加到该项目中。这两个步骤对于使应用正常运行至关重要。通常，包会通过 SPM 自行获取，因此您可以跳过此步骤。\n\n是时候进入下一章了：我们将了解 Firebase\
    \ Auth 并认证我们的第一个用户！\n"
- fmt: '# 4. Authenticate Users with Firebase Auth


    We are going to be focusing on Firebase Auth SDK over this chapter. We are going
    to create an authentication flow that grants us access to our Create-Read-Update-Delete
    (CRUD) functionalities that we implemented earlier. We will perform this thanks
    to the [Firebase authenticate API](https://firebase.google.com/docs/auth/ios/start)
    to validate credentials against their response from the server. We will also use
    Firestore to store user information in a collection (similar to tables in the
    SQL kind of databases).


    Then we will restrict the access to users with an account only like onboarding
    in applications like Twitter, Instagram, etc. For this, we will need to listen
    to the status of the user that Firebase provides us.


    Firebase Auth SDK allows us to know when a user is logged in or logged out, thanks
    to their listener APIs. These are the screens we are going to build:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig1_HTML.jpg)


    3 screenshots of mobile screens for the welcome, reset password, and notes with
    input boxes and buttons.


    **Figure 4-1** Screenshots of the screens we are going to create


    At the end, we will also edit the security rules to allow only authenticated users
    to have access to our application.


    ## Setting Up Firebase Authenticate


    The first thing to do is to set up Firebase in our dashboard. We will head to
    the console to enable authentication. It will take us only a few steps. For this,
    select the Authentication section and click “Get started”:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig2_HTML.jpg)


    A screenshot of the firebase authentication window has the authentication option
    highlighted from the build category panel on the left pane. It has the get started
    button highlighted on the right pane with options to learn more below.


    **Figure 4-2** Firebase console Authentication section


    As you can see, Firebase offers many options to authenticate users. It natively
    supports email with password, phone authentication, and anonymous, which allows
    you to generate a unique identifier for your users without requiring them to enter
    any information.


    Regarding the third parties, there are plenty of options between the bigger tech
    providers: Facebook, Google, Apple, Microsoft, Twitter, GitHub, Yahoo, and more.
    We will implement one of these in one of the next chapters.


    For this application, we will only use email and password to get started. Select
    Email/Password under Native providers:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig3_HTML.jpg)


    A screenshot of the firebase window has the project overview panel on the left
    and the authentication panel on the right. The pane has the sign-in method tab
    selected and the email or password option highlighted under native providers.


    **Figure 4-3** Authentication – selection of Email/Password


    Then, simply enable it and save the changes:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig4_HTML.jpg)


    A screenshot of the firebase window has the project overview panel on the left
    and the authentication panel on the right. The pane has the sign-in method tab
    selected, and the enable slider and save button highlighted for email or password
    under sign-in providers.


    **Figure 4-4** Authentication – enabling the provider and saving


    Now, you can send users’ information to register our users and receive back responses
    from their servers. It''s now time to structure our code and implement the Firebase
    APIs. Let''s code!


    ## Manage User Sessions


    Let''s build our call to Firebase to listen to changes in users'' sessions. Let''s
    go ahead and create a new file. Let''s call it `AuthViewModel`; it is going to
    be our View Model to communicate with Firebase Authenticate.


    Copy/paste the code as follows:


    ```

    import SwiftUI

    import FirebaseAuth

    final class AuthViewModel: ObservableObject {

    @Published var user: User?

    func listenToAuthState() {

    Auth.auth().addStateDidChangeListener { [weak self] _, user in

    guard let self = self else {

    return

    }

    self.user = user

    }

    }

    // function to sign-in

    // function to create an account

    // function to logout

    // function to reset password

    }

    ```


    *Please, note that we won''t be using a model this time.*


    We will directly pass through the `User` object that Firebase Auth SDK provided
    us called `FIRUser`. It provides a series of information: a `displayName`, a picture
    URL, an `email`, a phone number, and a provider identifier.


    Since we are using email/password, we will only need the email and an identifier.
    It allows us to not write the Model ourselves. We only made a reference with this
    line of code:


    ```

    @Published var user: User?

    ```


    For now, we added a reference to our user model and a function to take information
    from Firebase `listenToAuthState()`. This will be useful to determine if we need
    to present the list of notes or the signup view from the response we obtain from
    Firebase.


    The first thing to do is to create two SwiftUI views to handle both cases. Go
    ahead and create two files. Call these screens with the following names:


    * `SignUpView` (where we enter the credentials)

    * `HolderView` (where we will implement the logic)


    This is the representation of the logic we are going to implement:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig5_HTML.png)


    A screenshot of a mobile screen with firebase to handle the logic holder view.
    It leads to 2 screens of welcome and notes via if the user session is nil, then
    sign up view, and if the user is not nil, then content view.


    **Figure 4-5** Logic implemented with the Firebase Auth listener


    To perform this logic, we need to add this View Model as an environment object
    at the start-up of our app, the `NoteApp.swift` file (the starting point of our
    application), inside the `body` variable.


    The `@environmentObject` property from SwiftUI allows us to share data between
    views and ensure that our views get automatically updated based on what they receive.


    Here, we need to inform our app entry the state of the user session, so we can
    present the right screen at the right moment.


    Head to the `NoteApp` file, and instead of `ContentView()`, we will add the following
    line of code:


    ```

    HolderView().environmentObject(AuthViewModel())

    ```


    What is this for? It will allow us to notify our application upon start-up (when
    a user opens for the first time, after killing the app or whatever) that we are
    binding this to the View Model, so we are able to use the snapshot listener implemented
    here and present the correct screen based on the user''s session.


    Now, we will head to the `HolderView` to incorporate the logic.


    First, let''s observe our View Model in the `HolderView`. Copy/paste the following
    `@EnvironmentObject` variable:


    ```

    @EnvironmentObject private var authModel: AuthViewModel

    ```


    And now, let''s implement the conditional statement to present the appropriate
    view based on the Firebase response. Inside the `body` variable, instead of the
    current


    ```

    Text("Hello, World!")

    ```


    paste the following code:


    ```

    Group {

    if authModel.user == nil {

    SignUpView()

    } else {

    ContentView()

    }

    }

    .onAppear {

    authModel.listenToAuthState()

    }

    ```


    Now, run the application, and you should have the following:


    ![](images/533376_1_En_4_Chapter/533376_1_En_4_Fig6_HTML.jpg)


    A screenshot of the X code window has the holder view selected on the left panel.
    On the right is a pane with code, with a mobile screen of i Phone 14 with hello
    world message on the extreme right.


    **Figure 4-6** Xcode – app running with the Auth listener


    Great! As you can see, we have the `SignUpView` presented at start-up. It makes
    sense because Firebase is returning nil when we ask for a user because we didn''t
    sign up any yet.


    Now that we have implemented the logic, we can go ahead and sign up our user.
    Let''s create the user interface to sign up and implement the function.'
