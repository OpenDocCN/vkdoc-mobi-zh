  raw: '## Set Up the Project and “Sign in with Apple”


    Sign in with Apple has been introduced with iOS 13 and allows the user to use
    their Apple ID (the one they generally use for iCloud or App Store purchases)
    for signing up to your application. It is highly recommended to add it since it’s
    more user-friendly, there’s no need to remember a password, you sign up in one
    click, and the user can hide the email with Apple private relay. As always, it
    is a great privacy enhancement provided by Apple.


    How does it work with Firebase?


    Firebase provides an API to work with Apple sign-in, to sign up a user. It will
    make the call to the Apple server to verify the identity, furnish a callback response
    to Firebase that will register our user in the database, and send back to us a
    response stating that the signup has been successful or unsuccessful if it has
    returned any errors.


    As with email and password, we still have access to the User object provided by
    Firebase. So we can go ahead and implement the function in the View Model and
    then the native Apple button in the user interface.


    Important note


    To work with Sign in with Apple, you need an Apple developer account, which costs
    $99 a year. If you don’t want to sign up for a developer account, you can still
    follow this chapter. You simply need to use the signup and sign-in code with the
    email and password that I left as commented in the starter file.


    First, we need to add the capabilities to use Sign in with Apple. Head to the
    main target. Under Signing & Capabilities, search for “*Sign in with Apple*” and
    then press Enter as follows:


    ![](images/533376_1_En_7_Chapter/533376_1_En_7_Fig2_HTML.jpg)


    A screenshot of a window has a sign-in with Apple dialog box. It has the socially
    and signing and capabilities options highlighted with bounding boxes. A text reads,
    it allows users to authenticate with their Apple I D.


    Figure 7-2


    Xcode ➤ Signing & Capabilities – Sign in with Apple


    If it doesn’t appear on the search, you might have your membership or a certificate
    expired. Check your Apple developer account.


    Now that we have set up Sign in with Apple in Xcode, it is time to add it on the
    Firebase console. Head to your console and click “Get started.” For the sign-in
    method, select Apple, enable, and save.


    ![](images/533376_1_En_7_Chapter/533376_1_En_7_Fig3_HTML.jpg)


    2 screenshots of the authentication windows. One has Apple highlighted with a
    bounding box under the sign-in method. The other has the enable slider and the
    save button highlighted with bounding boxes for Apple.


    Figure 7-3


    Firebase console – enabling Sign in with Apple


    We have now completed all the setup to work with Sign in with Apple. Now it is
    time to code. Let’s head to our View Model to implement the necessary functions
    to work with Sign in with Apple.


    ## Integrate “Sign in with Apple”


    It’s now time to code. The first thing to do is to head to *AuthViewModel* and
    import the necessary framework to work with Apple authentication:


    ```

    import AuthenticationServices

    import CryptoKit

    ```


    The framework *AuthenticationServices* is necessary to talk with the Apple server,
    and CryptoKit lets us create a cryptography key that allows us to pass the data
    in a secure way.


    Now, go to the *AuthViewModel* file, and add these two variables:


    ```

    @Published var user: User?

    var currentNonce: String?

    ```


    We are using the User object from the Firebase Auth framework again and a *String*
    that we will use to generate a unique key to pass our data.


    Now, you can implement the following two functions:


    ```

    func randomNonceString(length: Int = 32) -> String {

    precondition(length > 0)

    let charset: [Character] =

    Array("0123456789ABCDEFGHIJKLMNOPQRSTUVXYZabcdefghijklmnopqrstuvwxyz-._")

    var result = ""

    var remainingLength = length

    while remainingLength > 0 {

    let randoms: [UInt8] = (0 ..< 16).map { _ in

    var random: UInt8 = 0

    let errorCode = SecRandomCopyBytes(kSecRandomDefault, 1, &random)

    if errorCode != errSecSuccess {

    fatalError(

    "Unable to generate nonce. SecRandomCopyBytes failed with OSStatus \(errorCode)"

    )

    }

    return random

    }

    randoms.forEach { random in

    if remainingLength == 0 {

    return

    }

    if random < charset.count {

    result.append(charset[Int(random)])

    remainingLength -= 1

    }

    }

    }

    return result

    }

    ```


    Great! We have now completed all this first piece. This piece of code is suggested
    by the Firebase documentation. It is useful to create a node for passing the data
    from the frontend to the Apple server. Also add the following function:


    ```

    func sha256(_ input: String) -> String {

    let inputData = Data(input.utf8)

    let hashedData = SHA256.hash(data: inputData)

    let hashString = hashedData.compactMap {

    String(format: "%02x", $0)

    }.joined()

    return hashString

    }

    ```


    This one is to implement the SHA-256 protocol, a world-class cryptography protocol
    used also in the Bitcoin blockchain, for example. Now that we have added the function,
    we can go ahead to the View: *SignUpView*.


    At the top of the file, import the following framework to access the Apple sign-in
    button and Firebase authentication:


    ```

    import AuthenticationServices

    import FirebaseAuth

    import FirebaseFirestore

    ```


    Then, observe our View Model by adding this code over the *body* variable:


    ```

    @ObservedObject private var authModel = AuthViewModel()

    ```


    We can now implement the following code in the *SignUpView*, inside the *VStack*:'
