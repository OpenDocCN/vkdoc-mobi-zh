- fmt: "### Integrate Large Documents with Firestore\n\nLet’s now call the function\
    \ so we can upload documents to Firebase Storage in our `View`. Head to the `PostView`\
    \ file.\n\nYou will see a warning telling you that you are missing a parameter\
    \ named `data`. Let’s correct that by replacing the call with the following one,\
    \ which includes the `data` parameter:\n\n```swift\nawait self.viewModel.addData(description:\
    \ description, datePublished: Date(), data: data!)\n```\n\nWith the exclamation\
    \ mark, we are saying in our program that we should have this data. Therefore,\
    \ we need to prevent the user from clicking the button if there are no images\
    \ selected. So add the following modifier after the button last graph:\n\n```swift\n\
    .disabled(data == nil)\n```\n\nGreat, now our function includes all that we need\
    \ to upload a picture. You can go ahead and write another post, writing a description\
    \ and selecting a picture. After this, check the Storage console. You should have\
    \ the following:\n\n![](images/533376_1_En_6_Chapter/533376_1_En_6_Fig4_HTML.jpg)\n\
    \n2 screenshots of a mobile screen and the firebox window. The screen has a post\
    \ section with a photo of a landscape. The window has the storage pane on the\
    \ right with an option highlighted on the right panel under files and the upload\
    \ file button above.\n\n**Figure 6-4** Firebase Storage – new upload\n\nOur application\
    \ has successfully uploaded an asset to the Firebase Storage backend. You can\
    \ click the link on the right. It will open a new URL, downloading the picture\
    \ we just uploaded. We basically put this data in a bucket, which generates a\
    \ unique URL to store it.\n\nAlso, a unique identifier is generated from the frontend,\
    \ thanks to the `UUID().uuidString` feature, that we use as a document reference.\n\
    \nNow, have a look at the Firebase Firestore document that you just uploaded:\n\
    \n![](images/533376_1_En_6_Chapter/533376_1_En_6_Fig5_HTML.jpg)\n\nA screenshot\
    \ of a firebase window has the firestore database option selected from the panel\
    \ on the left. The cloud firestore pane on the right has the data tab selected\
    \ with posts and a document highlighted in the panel view.\n\n**Figure 6-5** Firebase\
    \ Firestore – new document uploaded\n\nAs you can see, we have a URL saved as\
    \ a string under the field `imageURL`.\n\nIf you pay close attention, the URL\
    \ is composed like this:\n\n*   `https://firebasestorage.googleapis.com / [our\
    \ project reference] / [the identifier we generated]`\n\nOnce it is uploaded to\
    \ Storage, this URL is downloaded with `storageReference.downloadURL` and added\
    \ to our Firestore collection.\n\nFantastic! Now we can go ahead and read that\
    \ image URL in our feed. To achieve that, we will use the SwiftUI `AsyncImage`\
    \ modifier.\n\nAdd the following code in the `FeedView`, right over our two texts\
    \ inside the `List`:\n\n```swift\nAsyncImage(url: URL(string: posts.imageURL ??\
    \ \"\")) { phase in\n    switch phase {\n    case .empty:\n        EmptyView()\n\
    \    case .success(let image):\n        image\n            .resizable()\n    \
    \        .frame(width: 300, height: 200)\n    case .failure:\n        Image(systemName:\
    \ \"photo\")\n    @unknown default:\n        EmptyView()\n    }\n}\n```\n\nThis\
    \ code is useful to get an image from a URL. `AsyncImage` already handles the\
    \ asynchronous call. We also pass an `EmptyView` in case the server is returning\
    \ no image.\n\nWe now have our feed screen created matching the documents we have\
    \ in Firestore:\n\n![](images/533376_1_En_6_Chapter/533376_1_En_6_Fig6_HTML.png)\n\
    \n2 screenshots of a mobile screen and a firebase window. The screen has a feed\
    \ section with 2 photos. The window has the cloud firestore pane on the right\
    \ with the data tab selected and posts and a document highlighted in the panel\
    \ view.\n\n**Figure 6-6** Our feed screen displaying documents from Firestore\n\
    \n### Summary\n\nThrough this chapter, we have implemented a SwiftUI photo picker\
    \ with only a few lines of code. We then extracted the data picked by the user\
    \ and stored it. Following this, we introduced Firebase Storage and stored the\
    \ file in a bucket with a unique link. Then, we downloaded the URL where the data\
    \ was stored to add it to our Firestore document.\n\nThanks to this process, we\
    \ can enrich our application with assets. We could even have used video like successful\
    \ social media sites such as TikTok and Instagram.\n\nPlease, find at the following\
    \ link the source code of this chapter:\n\n*   `https://drive.google.com/drive/folders/19cPyxU8AYdW_80bUZOhxryLBLPx8qtRQ?usp=share_link`\n\
    \nIt is now time to head to our next chapter: implementing the login flow. This\
    \ time, we will use “Sign in with Apple.”\n\n## Authenticate with Apple\n\nOver\
    \ this chapter, we will go back to Firebase Auth, but this time we are going to\
    \ implement a better user experience. Instead of requiring email and password,\
    \ we will be presenting “Sign in with Apple.”\n\nAdditionally, we will let the\
    \ user access our application even if they don’t have an account, and we will\
    \ restrict the ability to post to registered users only with Firestore rules,\
    \ in the next chapter.\n\nThis logic will look like the following:\n\n![](images/533376_1_En_7_Chapter/533376_1_En_7_Fig1_HTML.png)\n\
    \n3 screenshots of mobile screens with the profile page. The logged out screen\
    \ has a “create an account” text with “sign up” button. Logged in screen has a\
    \ “your account” field and a “logout” button.\n\n**Figure 7-1** Logic of the signup\
    \ flow"
  raw: '## Integrate Large Documents with Firestore


    Let’s now call the function so we can upload documents to Firebase Storage in
    our View. Head to the *PostView* file.


    You will see a warning telling you that you are missing a parameter named data.
    Let’s correct that by replacing the call with the following one, which includes
    the data parameter:


    ```

    await self.viewModel.addData(description: description, datePublished: Date(),
    data: data!)

    ```


    With the exclamation mark, we are saying in our program that we should have this
    data. Therefore, we need to prevent the user from clicking the button if there
    are no images selected. So add the following modifier after the button last graph:


    ```

    .disabled(data == nil)

    ```


    Great, now our function includes all that we need to upload a picture. You can
    go ahead and write another post, writing a description and selecting a picture.
    After this, check the Storage console. You should have the following:


    ![](images/533376_1_En_6_Chapter/533376_1_En_6_Fig4_HTML.jpg)


    2 screenshots of a mobile screen and the firebox window. The screen has a post
    section with a photo of a landscape. The window has the storage pane on the right
    with an option highlighted on the right panel under files and the upload file
    button above.


    Figure 6-4


    Firebase Storage – new upload


    Our application has successfully uploaded an asset to the Firebase Storage backend.
    You can click the link on the right. It will open a new URL, downloading the picture
    we just uploaded. We basically put this data in a bucket, which generates a unique
    URL to store it.


    Also, a unique identifier is generated from the frontend, thanks to the *UUID().uuidString*
    feature, that we use as a document reference.


    Now, have a look at the Firebase Firestore document that you just uploaded:


    ![](images/533376_1_En_6_Chapter/533376_1_En_6_Fig5_HTML.jpg)


    A screenshot of a firebase window has the firestore database option selected from
    the panel on the left. The cloud firestore pane on the right has the data tab
    selected with posts and a document highlighted in the panel view.


    Figure 6-5


    Firebase Firestore – new document uploaded


    As you can see, we have a URL saved as a string under the field *imageURL*.


    If you pay close attention, the URL is composed like this:


    *   [*https://firebasestorage.googleapis.com*](https://firebasestorage.googleapis.com)
    */ [our project reference] / [the identifier we generated]*


    Once it is uploaded to Storage, this URL is downloaded with *storageReference.downloadURL*
    and added to our Firestore collection*.*


    Fantastic! Now we can go ahead and read that image URL in our feed. To achieve
    that, we will use the SwiftUI *AsyncImage* modifier.


    Add the following code in the *FeedView*, right over our two texts inside the
    *List*:


    ```

    AsyncImage(url: URL(string: posts.imageURL ?? "")) { phase in

    switch phase {

    case .empty:

    EmptyView()

    case .success(let image):

    image           .resizable()          .frame(width: 300, height: 200)             case
    .failure:

    Image(systemName: "photo")

    @unknown default:

    EmptyView()

    }

    }

    ```


    This code is useful to get an image from a URL. *AsyncImage* already handles the
    asynchronous call. We also pass an *EmptyView* in case the server is returning
    no image.


    We now have our feed screen created matching the documents we have in Firestore:


    ![](images/533376_1_En_6_Chapter/533376_1_En_6_Fig6_HTML.png)


    2 screenshots of a mobile screen and a firebase window. The screen has a feed
    section with 2 photos. The window has the cloud firestore pane on the right with
    the data tab selected and posts and a document highlighted in the panel view.


    Figure 6-6


    Our feed screen displaying documents from Firestore


    ## Summary


    Through this chapter, we have implemented a SwiftUI photo picker with only a few
    lines of code. We then extracted the data picked by the user and stored it. Following
    this, we introduced Firebase Storage and stored the file in a bucket with a unique
    link. Then, we downloaded the URL where the data was stored to add it to our Firestore
    document.


    Thanks to this process, we can enrich our application with assets. We could even
    have used video like successful social media sites such as *TikTok* and *Instagram*.


    Please, find at the following link the source code of this chapter:


    *   [*https://drive.google.com/drive/folders/19cPyxU8AYdW_80bUZOhxryLBLPx8qtRQ?usp=share_link*](https://drive.google.com/drive/folders/19cPyxU8AYdW_80bUZOhxryLBLPx8qtRQ%253Fusp%253Dshare_link)


    It is now time to head to our next chapter: implementing the login flow. This
    time, we will use “Sign in with Apple.”


    # 7. Authenticate with Apple


    Over this chapter, we will go back to Firebase Auth, but this time we are going
    to implement a better user experience. Instead of requiring email and password,
    we will be presenting “Sign in with Apple.”


    Additionally, we will let the user access our application even if they don’t have
    an account, and we will restrict the ability to post to registered users only
    with Firestore rules, in the next chapter.


    This logic will look like the following:


    ![](images/533376_1_En_7_Chapter/533376_1_En_7_Fig1_HTML.png)


    3 screenshots of mobile screens with the profile page. The logged out screen has
    a create an account text with sign up button. Logged in screen has an, you account
    field and a logout button.


    Figure 7-1


    Logic of the signup flow'
  trans: "\n### 使用 Firestore 集成大型文档\n\n现在我们来调用这个函数，以便在我们的 `View` 中将文档上传到 Firebase\
    \ Storage。请前往 `PostView` 文件。\n\n你会看到一个警告，提示你缺少一个名为 `data` 的参数。让我们通过将调用替换为包含 `data`\
    \ 参数的以下代码来修正这个问题：\n\n```swift\nawait self.viewModel.addData(description: description,\
    \ datePublished: Date(), data: data!)\n```\n\n通过这个感叹号，我们在程序中表示应该拥有这个数据。因此，我们需要在未选择图片时阻止用户点击按钮。请在按钮最后一个图形之后添加以下修饰符：\n\
    \n```swift\n.disabled(data == nil)\n```\n\n太棒了，现在我们的函数包含了上传图片所需的一切。你可以继续编写另一篇帖子，添加描述并选择一张图片。之后，请检查\
    \ Storage 控制台。你应该看到以下内容：\n\n![](img/533376_1_En_6_Fig4_HTML.jpg)\n\n两个移动屏幕和 Firebase\
    \ 窗口的截图。屏幕上一个发布区域包含一张风景照片。窗口右侧显示 Storage 面板，文件面板下高亮显示了一个选项，上方是上传文件按钮。\n\n**图 6-4**\
    \ Firebase Storage – 新上传\n\n我们的应用程序已成功将资源上传到 Firebase Storage 后端。你可以点击右侧的链接。它将打开一个新\
    \ URL，下载我们刚刚上传的图片。我们基本上是将这些数据放入一个存储桶中，该存储桶会生成一个唯一的 URL 来存储它。\n\n此外，得益于 `UUID().uuidString`\
    \ 功能，前端会生成一个唯一标识符，我们将其用作文档引用。\n\n现在，请查看你刚刚上传的 Firebase Firestore 文档：\n\n![](img/533376_1_En_6_Fig5_HTML.jpg)\n\
    \n一个 Firebase 窗口的截图，左侧面板选择了 Firestore 数据库选项。右侧的 Cloud Firestore 面板选择了数据选项卡，面板视图中高亮显示了\
    \ `posts` 集合及其下的一个文档。\n\n**图 6-5** Firebase Firestore – 已上传新文档\n\n如你所见，`imageURL`\
    \ 字段下保存了一个字符串形式的 URL。\n\n如果你仔细观察，这个 URL 的结构如下：\n\n*   `https://firebasestorage.googleapis.com\
    \ / [我们的项目引用] / [我们生成的标识符]`\n\n一旦上传到 Storage，这个 URL 会通过 `storageReference.downloadURL`\
    \ 下载，并添加到我们的 Firestore 集合中。\n\n太棒了！现在我们可以继续在我们的信息流中读取该图片 URL。为此，我们将使用 SwiftUI\
    \ 的 `AsyncImage` 修饰符。\n\n在 `FeedView` 文件中，将以下代码添加到位于 `List` 中的两段文本之上：\n\n```swift\n\
    AsyncImage(url: URL(string: posts.imageURL ?? \"\")) { phase in\n    switch phase\
    \ {\n    case .empty:\n        EmptyView()\n    case .success(let image):\n  \
    \      image\n            .resizable()\n            .frame(width: 300, height:\
    \ 200)\n    case .failure:\n        Image(systemName: \"photo\")\n    @unknown\
    \ default:\n        EmptyView()\n    }\n}\n```\n\n这段代码用于从 URL 获取图片。`AsyncImage`\
    \ 已经处理了异步调用。如果服务器未返回图片，我们还会传递一个 `EmptyView`。\n\n现在，我们已经创建了与 Firestore 中文档相匹配的信息流界面：\n\
    \n![](img/533376_1_En_6_Fig6_HTML.png)\n\n两个移动屏幕和 Firebase 窗口的截图。屏幕上是一个信息流区域，包含两张照片。窗口右侧显示\
    \ Cloud Firestore 面板，选择了数据选项卡，面板视图中高亮显示了 `posts` 集合及其下的一个文档。\n\n**图 6-6** 我们的信息流界面显示来自\
    \ Firestore 的文档\n\n### 总结\n\n通过本章，我们仅用几行代码就实现了一个 SwiftUI 图片选择器。然后我们提取了用户选择的图片数据并进行了存储。接着，我们引入了\
    \ Firebase Storage 并将文件存储在一个带有唯一链接的存储桶中。最后，我们下载了存储数据的 URL，并将其添加到我们的 Firestore\
    \ 文档中。\n\n借助这个过程，我们可以用资源来丰富我们的应用程序。我们甚至可以使用视频，就像 TikTok 和 Instagram 这类成功的社交媒体网站一样。\n\
    \n请通过以下链接查找本章的源代码：\n\n*   `https://drive.google.com/drive/folders/19cPyxU8AYdW_80bUZOhxryLBLPx8qtRQ?usp=share_link`\n\
    \n现在是时候进入下一章了：实现登录流程。这一次，我们将使用“通过 Apple 登录”。\n\n## 通过 Apple 认证\n\n在本章中，我们将回到 Firebase\
    \ Auth，但这次我们将实现更好的用户体验。我们不再要求输入电子邮件和密码，而是提供“通过 Apple 登录”的选项。\n\n此外，即使没有账户，我们也允许用户访问我们的应用程序。同时，在下一章中，我们将通过\
    \ Firestore 规则，限制只有注册用户才能发布内容。\n\n这个逻辑如下图所示：\n\n![](img/533376_1_En_7_Fig1_HTML.png)\n\
    \n三张移动设备屏幕截图，显示个人资料页面。退出登录的屏幕上显示“创建账户”文本和“注册”按钮。已登录的屏幕上显示“你的账户”字段和“退出登录”按钮。\n\n\
    **图 7-1** 注册流程的逻辑\n"
- fmt: "# Set Up the Project and \"Sign in with Apple\"\n\n\"Sign in with Apple\"\
    \ has been introduced with iOS 13 and allows the user to use their Apple ID (the\
    \ one they generally use for iCloud or App Store purchases) for signing up to\
    \ your application. It is highly recommended to add it since it's more user-friendly,\
    \ there's no need to remember a password, you sign up in one click, and the user\
    \ can hide the email with Apple private relay. As always, it is a great privacy\
    \ enhancement provided by Apple.\n\n## How does it work with Firebase?\n\nFirebase\
    \ provides an API to work with Apple sign-in, to sign up a user. It will make\
    \ the call to the Apple server to verify the identity, furnish a callback response\
    \ to Firebase that will register our user in the database, and send back to us\
    \ a response stating that the signup has been successful or unsuccessful if it\
    \ has returned any errors.\n\nAs with email and password, we still have access\
    \ to the `User` object provided by Firebase. So we can go ahead and implement\
    \ the function in the View Model and then the native Apple button in the user\
    \ interface.\n\n### Important note\n\nTo work with \"Sign in with Apple\", you\
    \ need an Apple developer account, which costs $99 a year. If you don't want to\
    \ sign up for a developer account, you can still follow this chapter. You simply\
    \ need to use the signup and sign-in code with the email and password that I left\
    \ as commented in the starter file.\n\n## Setup in Xcode\n\nFirst, we need to\
    \ add the capabilities to use \"Sign in with Apple\". Head to the main target.\
    \ Under **Signing & Capabilities**, search for \"*Sign in with Apple*\" and then\
    \ press Enter as follows:\n\n![](images/533376_1_En_7_Chapter/533376_1_En_7_Fig2_HTML.jpg)\n\
    \nA screenshot of a window has a sign-in with Apple dialog box. It has the socially\
    \ and signing and capabilities options highlighted with bounding boxes. A text\
    \ reads, it allows users to authenticate with their Apple I D.\n\n**Figure 7-2**\
    \ — Xcode ➤ Signing & Capabilities – Sign in with Apple\n\nIf it doesn't appear\
    \ on the search, you might have your membership or a certificate expired. Check\
    \ your Apple developer account.\n\n## Setup in Firebase Console\n\nNow that we\
    \ have set up \"Sign in with Apple\" in Xcode, it is time to add it on the Firebase\
    \ console. Head to your console and click **Get started**. For the sign-in method,\
    \ select **Apple**, enable, and save.\n\n![](images/533376_1_En_7_Chapter/533376_1_En_7_Fig3_HTML.jpg)\n\
    \n2 screenshots of the authentication windows. One has Apple highlighted with\
    \ a bounding box under the sign-in method. The other has the enable slider and\
    \ the save button highlighted with bounding boxes for Apple.\n\n**Figure 7-3**\
    \ — Firebase console – enabling Sign in with Apple\n\nWe have now completed all\
    \ the setup to work with \"Sign in with Apple\". Now it is time to code. Let's\
    \ head to our View Model to implement the necessary functions to work with \"\
    Sign in with Apple\".\n\n# Integrate \"Sign in with Apple\"\n\nIt's now time to\
    \ code. The first thing to do is to head to `AuthViewModel` and import the necessary\
    \ framework to work with Apple authentication:\n\n```swift\nimport AuthenticationServices\n\
    import CryptoKit\n```\n\nThe framework `AuthenticationServices` is necessary to\
    \ talk with the Apple server, and `CryptoKit` lets us create a cryptography key\
