- "# 5. 高级 Firestore 使用\n\n## 介绍我们的新项目\n\n由于我们已经完成了一个笔记应用，现在对 SwiftUI 和 Firebase 控制台更加熟悉了。是时候创建一个新的应用了，这次会更复杂一些：它将包含一个类似\
