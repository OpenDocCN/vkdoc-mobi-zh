  \n**图 2-22**  \n将 Firebase 添加到你的 Apple 应用 – 第五步\n\n\n\n## 总结\n\n在本章中，我们了解了什么是 Firebase，以及为什么在项目开发中应考虑使用它。我们简要浏览了控制台以及如何在仪表盘中导航，因为在接下来的章节中我们将深入探索。\n\
