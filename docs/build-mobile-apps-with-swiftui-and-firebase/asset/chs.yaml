- "# 使用 SwiftUI 编写代码\n\n要理解 SwiftUI，最好的方式就是构建一个应用程序。因此，我们将构建一个简单的应用，在地图上显示几个地点。同时，我会解释一些关于\
  \ SwiftUI 的基础知识。\n\n前往我们之前创建的名为 *Discover* 的 Xcode 项目。运行该应用。你应该会看到以下起始模板：\n\n![](img/533376_1_En_1_Fig8_HTML.jpg)\n\
  \n屏幕左侧面板显示 discover 应用的 ContentView 代码，右侧面板显示一个包含“Hello, World!”文本的移动设备屏幕视图。\n\n\
  **图 1-8** – 带模拟器运行的 Xcode\n\n为了重现这个界面，因为它使用了 Apple 地图，我们需要导入一个名为 *MapKit* 的框架来访问其\
  \ API。因此，在文件顶部添加以下代码行：\n\n```\nimport MapKit\n```\n\n然后，在代码 `struct ContentView`\
  \ 的正上方，复制/粘贴以下代码：\n\n```\nstruct Place: Identifiable {\n    var id = UUID()\n  \
  \  var title: String\n    var coordinate: CLLocationCoordinate2D\n    var architecte:\
  \ String\n}\n```\n\n我们刚刚实现了一个模型，用于基于此模型创建一些数据项。\n\n让我为你解释一下这段代码：\n\nSwift 中的 `struct`\
  \ 用于存储变量。这里我们给这个 `struct` 命名为 `Place`。\n\n`Identifiable` 是一个协议，用于使此类可被标识。由于我们将在\
  \ *List* 中显示数据，我们需要使每个数据项变得可识别。\n\n然后，我们添加了几个变量：`UUID` 类型用于提供唯一标识符，`String` 类型用于文本，以及\
  \ `CLLocationCoordinate2D` 类型用于传递坐标（纬度和经度）。\n\n太好了，我们刚刚创建了一个所谓的模型，即通过几个变量将我们的对象（`Place`）模块化。\n\
  \n现在，我们可以着手处理用户界面了。\n\n在 `struct ContentView` 下方，添加以下代码行：\n\n```\n@State private\
  \ var region = MKCoordinateRegion(center: CLLocationCoordinate2D(latitude: 41.9028,\
  \ longitude: 12.4964), span: MKCoordinateSpan(latitudeDelta: 0.1, longitudeDelta:\
  \ 0.1))\n```\n\n什么是 `@State` 变量？\n\n> *一种属性包装器类型，可以读取和写入由 SwiftUI 管理的值。*\n> \n>\
  \ ——来自 Apple 文档\n\n这将允许我们操作数据。这里我们传递了对应于罗马市坐标的坐标值。\n\n然后，我们声明了一个包含地点数组的常量。由 `[]`\
  \ 声明的数组很适合呈现一系列数据。\n\n在你之前声明的 `@State` 之后，立即复制/粘贴以下代码：\n\n```\nlet annotations =\
  \ [\n    Place(title: \"Fontana di Trevi\", coordinate: CLLocationCoordinate2D(latitude:\
  \ 41.900833, longitude: 12.483056), architecte: \"Nicola Salvi\"),\n    Place(title:\
  \ \"Pantheon\", coordinate: CLLocationCoordinate2D(latitude: 41.8986, longitude:\
  \ 12.4768), architecte: \"Marcus Agrippa\"),\n    Place(title: \"Villa Medici\"\
  , coordinate: CLLocationCoordinate2D(latitude: 41.908, longitude: 12.483), architecte:\
  \ \"Bartolomeo Ammannati\"),\n    Place(title: \"Colosseo\",  coordinate: CLLocationCoordinate2D(latitude:\
  \ 41.890278, longitude: 12.492222), architecte: \"Flavian Emperors\")\n]\n```\n\n\
  太好了，现在我们有所有必要的输入来在 *Map* 上展示位置信息以及一些要显示的地点。\n\n在 `body` 变量内部，用以下代码行替换 *VStack*：\n\
  \n```\nMap(coordinateRegion: $region, annotationItems: annotations) {\n    MapMarker(coordinate:\
  \ $0.coordinate)\n}\n```\n\n这个 `Map` 修饰符将在我们的应用中显示一张地图。我们传递了之前定义的 `region` 参数（包含罗马的坐标），并使用\
  \ `$` 符号；这是用于 `@State` 变量的语法。同时，我们还添加了注释（之前声明的四个地点）。\n\n为了呈现这些注释，我们使用了 `MapMarker`，并传入对象中的坐标。\n\
  \n如果你正确地遵循了这些简短教程，你的画布应该会显示一张带有四个标记的地图，如下所示：\n\n![](img/533376_1_En_1_Fig9_HTML.jpg)\n\
  \n屏幕左侧面板显示 discover 应用的 ContentView 代码主体，右侧面板显示一张带有地图和四个标记位置的移动设备屏幕视图。\n\n**图 1-9**\
  \ – 我们的地图应用\n\n## 总结\n\n如果你是 Swift 新手，本章有助于向你介绍 Xcode——你为 Apple 平台构建应用的工具。接着，我们通过创建模型和编写静态数据了解了\
  \ Swift 的基础知识。然后，我们使用地图来显示标记，并从框架 `MapKit` 中导入以访问 Apple 的地图 API。\n\n现在，我们对如何创建静态数据模型并呈现它们有了更清晰的概念，我们可以继续讨论后端了。接下来的章节将聚焦于\
  \ Firebase，以及如何从后端下载数据、呈现数据、修改数据和处理用户输入。让我们深入探索 Firebase 控制台。\n\n"
- '# Firebase 简介


  我将向你介绍 Firebase 控制台，以及如何创建一个新项目并将 iOS 应用连接到它。


  我们将涵盖 Firebase 是什么，为什么我们选择这个后端而非其他，以及它的优缺点。


  我们将一步步指导你直接从 Web 浏览器创建你的第一个 Firebase 项目。我们还将把 iOS 应用连接起来，以便通过其 API 与 Firebase 通信。


  在本章结束时，你将能够创建一个连接到 Firebase 后端的新 iOS 应用。如需参考，请访问以下链接的 Firebase 文档：`HTTPS://FIREBASE.GOOGLE.COM/DOCS/IOS/SETUP`。




  '
- '# 什么是 Firebase？


  Firebase 是一种我们称之为后端即服务（`BaaS`）的服务。这意味着，你无需运行自己的服务器来支撑在线应用，而是通过它们的服务来读取、写入、更新和删除数据、认证用户以及执行许多其他操作！


  看看下面这张图，它展示了一个使用运行在云端的自定义后端构建的原生 iOS 应用：


  ![](img/533376_1_En_2_Fig1_HTML.png)


  **图 2-1** – 一个使用云服务上的后端主机构建的 iOS 应用


  如你所见，该应用将与一台虚拟机通信，虚拟机通常用 `Ruby`、`Node.js` 或 `PHP` 编码，它本身由云服务（也可能是物理服务器，但如今已很少见）托管，例如亚马逊云服务、谷歌云平台、微软
  Azure 等。在具有庞大用户群的复杂应用中，通常需要一名前端开发者（此处指 iOS 开发者）、一名后端开发者来开发逻辑和 API，以及一名 `DevOps`
  负责将所有这些部署到云服务并分发。全栈开发者也能完成这项工作，但这较为少见，且需要非常丰富的经验。


  现在，让我们看看一个使用 Firebase 构建的 iOS 应用：


  ![](img/533376_1_En_2_Fig2_HTML.png)


  **图 2-2** – 一个使用 Firebase 后端构建的 iOS 应用


  如你所见，架构要简单得多。我们的 iOS 应用通过 Firebase 提供的、附带详尽文档的 API 来向 Firebase 发送通知和接收数据。无需在服务器端编写代码，也无需将其托管给第三方提供商，因为它已经构建在谷歌云之上，你无需任何部署！此外，如果你之后想实现更复杂的交互，借助
  Firebase Cloud 函数，你仍然可以运行后端代码。从团队角度看，你只需要一名 iOS 开发者，就可以准备在 App Store 上发布应用了。


  我们已经看到使用 Firebase 比运行你自己的后端代码要简单得多，但不仅如此：它还附带了一系列开箱即用的工具，有助于加速你的开发。


  例如，它们有用于通过多个第三方提供商（如 Apple、Facebook、Google 等）认证用户的 API。它们还预装了 Google Analytics，可以直接使用。


  此外，还有一系列第三方提供商的扩展，可以将用户注册到邮件列表，或者通过 RevenueCat 实现应用内购买而无需编写代码。


  你可以通过这个链接了解它们：


  `HTTPS://FIREBASE.GOOGLE.COM/PRODUCTS/EXTENSIONS`


  Firebase 既有优点也有缺点。列表如下：


  **优点：**


  -   你可以更快地发布应用。除非需要执行一些更高级的功能，否则你无需在后端编写代码。

  -   你可以访问谷歌云平台，而无需自己在运维方面做任何操作。

  -   你获得了开箱即用的、支持第三方的认证 API。例如，你无需为一个 Google 登录接口使用一个 API，再为 Facebook 登录使用另一个 API。你可以直接通过
  Firebase 的 API 实现。

  -   你无需担心可扩展性和服务器管理。


  **缺点：**


  -   数据的所有权不属于你。最好的做法是每天对数据进行快照，并将其存储在一个安全的位置。

  -   在一些需要完全控制后端的复杂应用中，你可能会受到限制，因为用户界面严重依赖后端。


  总的来说，如果你想以最快、最便宜的方式发布应用（无需聘请后端开发者），那么 Firebase 是一个很好的选择。你可以专注于重要的事情：构建你的产品并监控使用情况，这样你就可以实现用户想要的功能。得益于随
  Firebase “免费”附带的、由 Google Analytics 提供支持的事件跟踪和应用分析，这也会变得更加容易。


  话不多说，让我们来探索 Firebase，创建我们的第一个项目，并让我们的 iOS 应用与其通信。


  '
- "# 设置 Firebase 账户和项目\n\n要开始使用 Firebase，你需要注册他们的服务，这些服务隶属于 Google，因此你需要一个 Gmail 账户。如果你还没有，请先注册一个\
  \ Gmail 账户。然后访问 Firebase 网站（`https://firebase.google.com`），点击“开始使用”，你就会进入 Firebase\
  \ 控制台。你应该会看到类似这样的界面：\n\n![](img/533376_1_En_2_Fig3_HTML.png)\n\n**图 2-3** – Firebase\
