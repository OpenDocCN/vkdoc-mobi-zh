  \ description, datePublished: Date(), data: data!)\n```\n\n通过这个感叹号，我们在程序中表示应该拥有这个数据。因此，我们需要在未选择图片时阻止用户点击按钮。请在按钮最后一个图形之后添加以下修饰符：\n\
  \n```swift\n.disabled(data == nil)\n```\n\n太棒了，现在我们的函数包含了上传图片所需的一切。你可以继续编写另一篇帖子，添加描述并选择一张图片。之后，请检查\
  \ Storage 控制台。你应该看到以下内容：\n\n![](img/533376_1_En_6_Fig4_HTML.jpg)\n\n两个移动屏幕和 Firebase\
