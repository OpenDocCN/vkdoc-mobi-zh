  \ Firebase 上创建了你的第一个项目。\n\n\n\n## Firebase 操作指南\n\n你现在位于 Firebase 控制台。它将成为你应用的支柱。尽管我们会在接下来的章节中深入开发，但这里先向你介绍一下。\n\
