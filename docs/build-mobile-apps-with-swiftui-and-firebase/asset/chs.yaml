- '# 配置项目并集成「通过 Apple 登录」


  「通过 Apple 登录」功能自 iOS 13 起引入，允许用户使用其 Apple ID（通常用于 iCloud 或 App Store 购买）来注册你的应用。强烈建议添加此功能，因为它更便于用户操作：无需记住密码、一键即可注册，并且用户可以通过
  Apple 隐私中继服务隐藏电子邮件。如往常一样，这是 Apple 提供的出色隐私增强方案。


  ## 如何在 Firebase 中实现？


  Firebase 提供了与 Apple 登录交互的 API，用于用户注册。它会调用 Apple 服务器验证身份，将回调响应提交给 Firebase，从而在数据库中注册用户，并向我们返回注册成功或失败（含错误信息）的响应。


  与电子邮件/密码登录方式相同，我们仍可访问 Firebase 提供的 `User` 对象。因此我们可以继续在视图模型中实现函数，并在用户界面中集成原生的 Apple
  登录按钮。


  ### 重要说明


  要使用「通过 Apple 登录」功能，你需要一个 Apple 开发者账号，每年费用为 99 美元。如果你不想注册开发者账号，仍可学习本章内容——只需使用我在初始文件中以注释形式保留的电子邮件/密码注册登录代码即可。


  ## 在 Xcode 中的配置


  首先，我们需要添加「通过 Apple 登录」的能力。进入主目标文件，在 **Signing & Capabilities** 选项下搜索 "*Sign in with
  Apple*"，然后按回车键，操作如下：


  ![](img/533376_1_En_7_Fig2_HTML.jpg)


  截图展示了包含“通过 Apple 登录”对话框的窗口。其中“社交与签名功能”选项用方框高亮标注。文字说明允许用户通过其 Apple ID 进行身份验证。


  **图 7-2** — Xcode ➤ 签名与功能 – 通过 Apple 登录


  如果在搜索中未出现该选项，可能是你的会员资格或证书已过期。请检查你的 Apple 开发者账号。


  ## 在 Firebase 控制台中的配置


  完成 Xcode 中「通过 Apple 登录」的配置后，接下来在 Firebase 控制台中进行设置。进入控制台并点击**开始使用**。在登录方式中选择 **Apple**，启用并保存。


  ![](img/533376_1_En_7_Fig3_HTML.jpg)


  两张身份验证窗口截图：第一张在登录方式下用方框高亮标注了 Apple 选项；第二张用方框高亮标注了启用滑动开关和保存按钮。


  **图 7-3** — Firebase 控制台 – 启用「通过 Apple 登录」


  现在已完成「通过 Apple 登录」的所有配置工作，是时候编写代码了。让我们进入视图模型，实现必要的函数来支持「通过 Apple 登录」。


  '
- "# 集成「通过 Apple 登录」\n\n现在开始编码。首先进入 `AuthViewModel`，导入处理 Apple 身份验证所需的框架：\n\n```swift\n\
  import AuthenticationServices\nimport CryptoKit\n```\n\n需要使用 `AuthenticationServices`\
  \ 框架与 Apple 服务器通信，`CryptoKit` 则用于创建加密密钥，确保数据传输的安全性。\n\n接下来，在 `AuthViewModel` 文件中添加这两个变量：\n\
  \n```swift\n@Published var user: User?\nvar currentNonce: String?\n```\n\n这里再次使用\
  \ Firebase Auth 框架中的 `User` 对象，以及一个用于生成传递数据所需唯一密钥的 `String` 变量。\n\n现在可以实现以下两个函数：\n\
  \n```swift\nfunc randomNonceString(length: Int = 32) -> String {\n    precondition(length\
  \ > 0)\n    let charset: [Character] =\n        Array(\"0123456789ABCDEFGHIJKLMNOPQRSTUVXYZabcdefghijklmnopqrstuvwxyz-._\"\
  )\n    var result = \"\"\n    var remainingLength = length\n    while remainingLength\
  \ > 0 {\n        let randoms: [UInt8] = (0 ..< 16).map { _ in\n            var random:\
  \ UInt8 = 0\n            let errorCode = SecRandomCopyBytes(kSecRandomDefault, 1,\
  \ &random)\n            if errorCode != errSecSuccess {\n                fatalError(\n\
  \                    \"Unable to generate nonce. SecRandomCopyBytes failed with\
  \ OSStatus \\(errorCode)\"\n                )\n            }\n            return\
  \ random\n        }\n        randoms.forEach { random in\n            if remainingLength\
  \ == 0 {\n                return\n            }\n            if random < charset.count\
  \ {\n                result.append(charset[Int(random)])\n                remainingLength\
  \ -= 1\n            }\n        }\n    }\n    return result\n}\n```\n\n很好！我们已完成第一部分代码。这段代码来自\
  \ Firebase 官方文档推荐，用于创建从前端到 Apple 服务器的数据传递节点。接下来添加以下函数：\n\n```swift\nfunc sha256(_\
  \ input: String) -> String {\n    let inputData = Data(input.utf8)\n    let hashedData\
  \ = SHA256.hash(data: inputData)\n    let hashString = hashedData.compactMap {\n\
  \        String(format: \"%02x\", $0)\n    }.joined()\n    return hashString\n}\n\
  ```\n\n此函数用于实现 SHA-256 协议，这是一种世界级的加密协议，例如也用于比特币区块链中。添加完该函数后，我们继续前往视图层：`SignUpView`。\n\
  \n在文件顶部导入以下框架，以访问 Apple 登录按钮和 Firebase 身份验证：\n\n```swift\nimport AuthenticationServices\n\
  import FirebaseAuth\nimport FirebaseFirestore\n```\n\n然后，在 `body` 变量上方添加以下代码以观察视图模型：\n\
  \n```swift\n@ObservedObject private var authModel = AuthViewModel()\n```\n\n现在，我们可以在\
  \ `SignUpView` 的 `VStack` 中实现以下代码：\n\n\n\n```swift\nSignInWithAppleButton(onRequest:\
  \ { request in\n    let nonce = authModel.randomNonceString()\n    authModel.currentNonce\
  \ = nonce\n    request.requestedScopes = [.email]\n    request.nonce = authModel.sha256(nonce)\n\
  },\nonCompletion: { result in\n    switch result {\n    case .success(let authResults):\n\
  \        switch authResults.credential {\n        case let appleIDCredential as\
  \ ASAuthorizationAppleIDCredential:\n            guard let nonce = authModel.currentNonce\
  \ else {\n                fatalError(\"Invalid state: A login callback was received,\
  \ but no login request was sent.\")\n            }\n            guard let appleIDToken\
  \ = appleIDCredential.identityToken else {\n                fatalError(\"Invalid\
  \ state: A login callback was received, but no login request was sent.\")\n    \
  \        }\n            guard let idTokenString = String(data: appleIDToken, encoding:\
  \ .utf8) else {\n                print(\"Unable to serialize token string from data:\
  \ \\(appleIDToken.debugDescription)\")\n                return\n            }\n\
  \            let credential = OAuthProvider.credential(withProviderID: \"apple.com\"\
  , idToken: idTokenString, rawNonce: nonce)\n            Auth.auth().signIn(with:\
  \ credential) { (authResult, error) in\n                if (error != nil) {\n  \
  \                  print(error?.localizedDescription as Any)\n                 \
  \   return\n                }\n                print(\"signed in\")\n          \
  \      guard let user = authResult?.user else { return }\n                let userData\
  \ = [\"email\": user.email, \"uid\": user.uid]\n                Firestore.firestore().collection(\"\
  User\")\n                    .document(user.uid)\n                    .setData(userData)\
  \ { _ in\n                        print(\"DEBUG: Did upload user data.\")\n    \
  \                }\n            }\n            print(\"\\(String(describing: Auth.auth().currentUser?.uid))\"\
  )\n        default:\n            break\n        }\n    default:\n        break\n\
  \    }\n})\n.signInWithAppleButtonStyle(.black)\n.frame(width: 290, height: 45,\
  \ alignment: .center)\n```\n\n我们刚刚实现了原生的“通过 Apple 登录”按钮，通过它可以将用户处理的凭证传递给 Apple 服务。同时，我们使用`guard\
  \ let`语句检查凭证是否被正确传递。\n\n由于我们将从`ProfileView`呈现这个`SignUpView`，因此需要在那里处理呈现逻辑。我们需要加入一段逻辑：当没有用户时显示注册屏幕，当用户已注册时显示用户信息。为此，我们需要进入`AuthViewModel`并集成以下两个函数：\n\
  \n```swift\nfunc listenToAuthState() {\n    Auth.auth().addStateDidChangeListener\
  \ { [weak self] _, user in\n        guard let self = self else {\n            return\n\
  \        }\n        self.user = user\n    }\n}\n```\n\n这将帮助我们监听 Firebase Auth 框架的状态变化。我们还需要实现退出登录函数：\n\
  \n```swift\nfunc signOut() {\n    do {\n        try Auth.auth().signOut()\n    }\
  \ catch let signOutError as NSError {\n        print(\"Error signing out: %@\",\
  \ signOutError)\n    }\n}\n```\n\n很好！现在我们可以构建`ProfileView`中的用户界面。让我们观察这个用于控制呈现的布尔值以及`SignUpView`的`ViewModel`：\n\
  \n```swift\n@State private var showSignUp: Bool = false\n@ObservedObject private\
  \ var authModel = AuthViewModel()\n```\n\n并在`body`变量中添加以下代码：\n\n```swift\nVStack(alignment:\
  \ .center) {\n    if authModel.user != nil {\n        Form {\n            Section(\"\
  你的账户\") {\n                Text(authModel.user?.email ?? \"\")\n            }\n\
  \            Button {\n                authModel.signOut()\n            } label:\
  \ {\n                Text(\"退出登录\")\n                    .foregroundColor(.red)\n\
  \            }\n        }\n    } else {\n        Form {\n            Section(\"\
  你的账户\") {\n                Text(\"看起来你尚未登录，请创建一个账户\")\n            }\n         \
  \   Button {\n                showSignUp.toggle()\n            } label: {\n    \
  \            Text(\"注册\")\n                    .foregroundColor(.blue)\n       \
  \             .bold()\n            }.sheet(isPresented: $showSignUp) {\n       \
  \         SignUpView().presentationDetents([.medium, .large])\n            }\n \
  \       }\n    }\n}.onAppear { authModel.listenToAuthState() }\n```\n\n现在我们的 UI\
  \ 已就绪：登录时显示用户的电子邮件，当 Firebase 服务器检测到无会话时则显示一个按钮。我们将把所有必要信息传递给 Apple 服务器。\n\n我们能从响应中得到什么？\n\
  \n- 一个唯一的转发性电子邮件或他们的原始电子邮件\n- 他们的全名（可选——本项目中我们未请求此项）\n\n之后，在完成时，我们将能够继续并将凭证注册到 Firebase。现在，我们可以检查\
  \ Firebase 控制台，看看用户是否正确注册。*(建议在真实设备上测试此功能。)*\n\n![](img/533376_1_En_7_Fig4_HTML.jpg)\n\
  \n两张截图：一张是手机屏幕，显示个人资料部分；另一张是认证窗口，窗口内有一个表格，在“认证”和“用户”选项卡下有 5 列。\n\n**图 7-4** — 通过\
  \ Apple 登录与 Firebase Auth 协同工作\n\n## 总结\n\n我们利用 Firebase 认证 SDK 探索了一项更高级的功能：通过 Apple\
  \ 登录。得益于它们的 API，我们能够对用户进行认证。然而，“通过 Apple 登录”需要更多的设置，因为我们需要同时与 Apple 服务器和 Firebase\
  \ 服务器通信才能获得响应。\n\n借助其出色的监听器，我们还能判断用户是否已登录，并根据这一响应呈现正确的界面。\n\n既然我们已经知道如何使用“通过 Apple\
  \ 登录”，我为你准备了一个挑战：将“通过 Apple 登录”集成到我们在第 3 章和第 4 章创建的笔记应用中。\n\n如果你在本章的学习中遗漏了某些内容，可以查看以下源代码：\n\
  \n"
- '# 8. 无需编码即可添加功能


  我们已经为社交媒体应用打下了良好的基础，但这尚未完成。还有许多改进之处和一些功能有待实现。


  在本章中，我们将致力于`Socially`项目，实现一项功能：在后端调整上传图片的大小，使其缩小后能更快地呈现给终端用户。我们将借助 Firebase Extension
  实现这一目标——这是一个出色的无代码工具，无需编写代码即可在后端实现各种功能。


  最后，我们将保护数据库，确保某些数据仅对当前用户可访问。我们还将限制只有注册用户才能发布内容。




  '
- "# 探索 Firebase Extension\n\nFirebase Extension 是 Firebase 开发的一个框架，允许你在无需编写任何代码的情况下实现后端功能。其中一些由\
  \ Firebase 开发，例如触发图片、向 Google BigQuery 发送数据或调整图片大小。它还包含许多第三方提供商，如用于运行订阅服务的 Stripe、用于搜索\
  \ Firestore 文档的 Algolia、与 RevenueCat 集成应用内购买等等。\n\n我们将从 Firebase 制作的 `Resize Images`\
  \ 开始。\n\n这个功能在我们的应用中会很有用，因为用户正在将图片上传到数据库，并在我们的信息流中检索它们。此功能会将图片调整为指定尺寸，从而减小图片大小。这将使我们的应用效率大大提高！\n\
  \n要安装此扩展，你需要将 Firebase 项目升级到 Blaze 计划。这意味着谷歌会向你收取使用你在后端实现的功能的费用。对于我们即将执行的测试，可能只需要几美分。\n\
  \n前往 Firebase 控制台 ➤ Build ➤ Extensions。然后查找 `Resize Images` 并点击 Install。\n\n![](img/533376_1_En_8_Fig1_HTML.jpg)\n\
  \n一张 Firebase 扩展市场窗口的截图。左侧选中了提供商 firebase。右侧是一个包含触发邮件、缩短 URL、限制子节点和调整图片大小等扩展的面板。调整图片大小下的\
  \ Install 被选中。\n\n图 8-1\n\nFirebase Extension 市场\n\n如果你尚未订阅 Blaze 计划，控制台会邀请你升级。按照步骤操作并输入你的信用卡信息。如果正确遵循了指示，你将会看到如下弹出窗口：\n\
  \n![](img/533376_1_En_8_Fig2_HTML.jpg)\n\n一张 Firebase 窗口的截图，中央是升级完成对话框。它显示：你已成功升级你的项目（按使用量付费的\
  \ Blaze 计划），确认邮件将很快发送给你，并且你已经设置了预算提醒。\n\n图 8-2\n\n项目已更新至 Blaze 计划\n\n现在，你可以开始安装扩展。按照\
  \ Firebase 提供的四个步骤，你可以编辑以下字段：\n\n*   `Backfill existing images` – 否\n\n*   `Sizes\
  \ of resized images`：320 × 200\n\n这样，Firebase 会自动将图片调整为 320 × 200 像素，使其在屏幕上看起来不错，并且文件总大小也会减小。你可以点击\
  \ `Install extension`；它需要几分钟才能生效：\n\n![](img/533376_1_En_8_Fig3_HTML.jpg)\n\n一张“安装此扩展”窗口的截图。它有一个输出选项输入框，以及三个分别用于\
  \ GIF 和 WEBP 动画选项、云函数内存和反向填充现有图片的下拉菜单。底部的 Install extension 按钮用边框高亮显示。\n\n图 8-3\n\
  \n安装 Firebase 扩展\n\n现在，你可以通过发布带有图片的帖子来测试你的应用。由于图片已被后端压缩尺寸，因此检索速度会更快。因此，我们在几分钟内就改进了应用，而且没有编写任何代码。\n\
  \n## 使用 Analytics 跟踪应用使用情况\n\n弄清楚用户如何使用我们的应用是很有用的，例如，确定注册转化率（有多少用户创建账户/有多少用户下载了应用）。借助\
  \ Firebase，我们可以轻松地使用 Google Analytics 实现这种跟踪器。\n\n首先要做的是将 Firebase Analytics 包添加到我们的应用中。前往你的主\
  \ target。在 `General` 下向下滚动到 `Frameworks`、`Libraries` 和 `Embedded Content`，然后点击加号按钮。接着选择\
  \ `FirebaseAnalytics` 并点击 `Add`。\n\n![](img/533376_1_En_8_Fig4_HTML.jpg)\n\n一张窗口截图，显示了“选择要添加的框架和库”对话框。从左到右依次高亮了\
  \ social、general 和 add 按钮。一个箭头从对话框中的 Firebase 包下指向 firebase analytics。\n\n图 8-4\n\
  \n向项目添加包\n\n现在我们可以使用 Firebase analytics API 了。我想检查的第一件事是有多少用户转化为已验证用户。为此，我需要在每次用户成功注册时添加一个事件。\n\
  \n让我们前往 `SignUpView` 并在顶部导入该框架：\n\n``` swift\nimport FirebaseAnalytics\n```\n\n\
  然后，在 `print(signed in)` 之后立即添加以下代码行——这样，我们就能确保身份验证已成功：\n\n``` swift\nAnalytics.logEvent(\"\
  user_sign_up\", parameters: nil)\n```\n\n就这样。用一行代码，我们就向 Firebase 记录了一个事件，以查看注册到我们应用的每个用户。\n\
  \n你可以在接下来的 24 小时内，在 Firebase 控制台 ➤ Analytics ➤ Events 中查看。你将看到每次用户验证时记录的事件。\n\n\
  ## 保护我们的数据库\n\n在将我们的应用发布给公众之前，还剩下最后一步：保护我们的数据库。由于我们使用的是 Firestore，因此需要前往控制台的这一部分并编辑规则。\n\
  \n目前，任何人都可以在未经过身份验证的情况下在我们的数据库中发布帖子和读取用户信息。这关乎安全性和成本问题。\n\n因此，我们需要限制只允许经过身份验证的用户写入数据，但可以允许任何人读取，因为个人资料是公开的，应用中的帖子也是公开的。\n\
  \n前往 Firebase 控制台 ➤ Firestore ➤ Rules，实施以下规则，然后点击 Publish：\n\n``` sql\nrules_version\
  \ = '2';\nservice cloud.firestore {\nmatch /databases/{database}/documents {\nmatch\
  \ /{document=**} {\nallow read: if true;\nallow write: if request.auth != null;\n\
  }\n}\n}\n```\n\n![](img/533376_1_En_8_Fig5_HTML.jpg)\n\n一张 Firebase 窗口的截图，左侧选中了\
  \ firestore database 的项目概览面板。右侧是选中了 rules 选项卡的 Cloud Firestore 面板。它有编辑规则按钮、5 个日期和时间以及\
  \ 9 行代码。\n\n图 8-5\n\nCloud Firestore 规则\n\n现在，未注册的用户将无法写入任何内容。我们有效地限制了数据的访问权限！\n\
  \n\n\n## 总结\n\n在最后一章中，我们探索了 `Firebase Extension`，这个无代码工具可以为我们的应用添加额外功能。随后，我们记录了事件，以了解用户如何使用我们的应用，这里记录的是每次有人在我们的应用上进行身份验证时的事件。\n\
  \n最后，我们保护了数据库安全，禁止未注册的用户在 Firestore 上发布任何文档。\n\n本书到此结束。感谢您的阅读！您可以通过以下链接找到最终项目的源代码：\n\
  \n[`drive.google.com/drive/folders/1eF-OXxC1jn0Ob30BsfXOFH7LzV2w24pU?usp=share_link`](https://drive.google.com/drive/folders/1eF-OXxC1jn0Ob30BsfXOFH7LzV2w24pU%253Fusp%253Dshare_link)\n\
