  \ `posts` 集合及其下的一个文档。\n\n**图 6-5** Firebase Firestore – 已上传新文档\n\n如你所见，`imageURL`\
  \ 字段下保存了一个字符串形式的 URL。\n\n如果你仔细观察，这个 URL 的结构如下：\n\n*   `https://firebasestorage.googleapis.com\
