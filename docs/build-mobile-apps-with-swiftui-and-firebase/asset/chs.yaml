- "# 6. 使用 Firebase Storage 管理图片\n\n我们希望在帖子中包含图片。问题在于：`Firestore`不支持如此大的文档。我们只能添加文本、数字、数组、布尔值、时间戳等类型的数据。\n\
  \n因此，Firebase 引入了 Storage。这是一个允许我们上传和下载大型数据（如视频、图像和音频文档）的软件包。在本章中，我们将学习如何将图片上传到\
  \ Firebase Storage，获取该图片的 URL，并将其添加到对应的 Firestore 文档中。\n\n在本章中，我们将探索如何访问 iPhone\
  \ 的相册库、将图片上传到 Storage，并从 Firestore 后端检索它。让我们开始吧！\n\n\n\n## 访问 iPhone 相机与相册\n\n在上传图片前，我们首先需要拍摄一张照片，或者至少让用户从应用中访问照片库。在\
  \ iOS 16 中，Apple 为 SwiftUI 引入了一个新框架：`PhotosUI`，只需几行代码即可让我们选择图片。\n\n前往 `PostView`\
  \ 文件，并导入该框架：\n\n```\nimport PhotosUI\n```\n\n一旦我们拥有了该框架的访问权限，就可以使用 `PhotosPickerItem`。让我们在\
  \ body 变量上方添加以下两个变量：\n\n```\n@State var data: Data?\n@State var selectedItem: [PhotosPickerItem]\
  \ = []\n```\n\n第一个变量用于观察我们在选择图片时传递的数据。第二个变量将让我们观察用户正在选择哪个项目（哪张图片）。\n\n现在该实现用户界面了。在\
  \ `PostView` 的 SwiftUI `Form` 中，紧接着已实现的其他两个 Section 上方，实现以下 Section：\n\n```\nSection\
  \ {\nPhotosPicker(selection: $selectedItem, maxSelectionCount: 1, selectionBehavior:\
  \ .default, matching: .images, preferredItemEncoding: .automatic) {\nif let data\
  \ = data, let image = UIImage(data: data) {\nImage(uiImage: image)\n.resizable()\n\
  .scaledToFit()\n.frame( maxHeight: 300)\n} else {\nLabel(\"选择一张图片\", systemImage:\
  \ \"photo.on.rectangle.angled\")\n}\n}.onChange(of: selectedItem) { newValue in\n\
  guard let item = selectedItem.first else {\nreturn\n}\nitem.loadTransferable(type:\
  \ Data.self) { result in\nswitch result {\ncase .success(let data):\nif let data\
  \ = data {\nself.data = data\n}\ncase .failure(let failure):\nprint(\"错误: \\(failure.localizedDescription)\"\
  )\n}\n}\n}\n}\n```\n\n这里我们做了几件事。我们添加了 `PhotosPicker`，用于访问用户的相册。我们传递了几个参数：\n\n* \
  \  `selection` – 这是之前的 item 变量。\n*   `maxSelectionCount` – 我们限制只能选择一张图片。\n*   `matching`\
  \ – 你可以传递一系列选项：仅视频、仅图片、仅截图等。这里我们只关注图片。\n*   `preferredItemEncoding` – 这里我们保留为自动模式，因此系统会自行判断哪种分辨率更合适。\n\
  \n然后，如果没有选中图片，我们会创建一个标签；否则，显示选中的图片。\n\n这就是访问照片库并显示所选图片的全部内容。新的 API 让我们轻松实现了这一功能。在\
