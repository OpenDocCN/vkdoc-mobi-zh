  \ Note 项目的选项，下方还有探索演示项目的选项。\n\n**图 5-2** 在 Firebase 中启动新项目\n\n### 我们为什么要创建一个新的 Firebase\
  \ 项目？\n\n区分应用和 Firebase 项目是很重要的。总的来说，你应该将具有共同业务逻辑的应用放在同一个 Firebase 项目中。假设你在构建优步（Uber）的竞品，一个打车应用。由于你想覆盖广阔的市场，你会在\
  \ iOS 和 Android 上发布；因此，你可能会构建四个应用，每个平台上分别对应司机端和乘客端各两个。由于在 Android 或 iOS 上预订在后台是相同的过程，你可以考虑将所有内容放在同一个\
  \ Firebase 项目下。那么，你的项目结构会像这样：\n\n![](img/533376_1_En_5_Fig3_HTML.jpg)\n\n一个 Firebase\
  \ 项目的框图，分别指向 Android 和 iOS 的司机端和乘客端应用。\n\n**图 5-3** Firebase 项目与应用\n\n由于在我们的新项目中，与笔记应用没有共享任何内容，我们会创建一个新的\
  \ Firebase 项目。\n\n现在，按照 Firebase 控制台上的逐步设置指南操作，获取 `GoogleService-Info.plist` 文件并将其添加到入门项目中。一旦你添加了该文件并完成了\
  \ Firebase 控制台上的五个步骤，就可以成功运行你的项目并连接到 Firebase 后端。\n\n项目设置完成后，让我们开始编码。像往常一样，我们将从模型开始，在\
  \ `Model` 文件夹中创建一个新的 Swift 文件，命名为 `Post`，然后复制/粘贴以下代码：\n\n```\nimport SwiftUI\nimport\
  \ FirebaseFirestoreSwift\n\nstruct Post: Identifiable, Decodable {\n  @DocumentID\
  \ var id: String?\n  var description: String?\n  var imageURL: String?\n  @ServerTimestamp\
  \ var datePublished: Date?\n}\n```\n\n因此，用于我们动态区域的模型将由一个标识符、一段描述、一张图片和发布日期组成。`@ServerTimestamp`\
  \ 来自 Firebase API，让我们能够获取服务器时间。而使用 `Date` 类型来记录日期是更推荐的做法。\n\n> *请注意，图片将在下一章关于 Firebase\
  \ Storage 的内容中处理。*\n\n接下来进入视图模型。在 `View Model` 文件夹中创建一个新文件，命名为 `PostViewModel`，然后在文件顶部导入这两个框架：\n\
  \n```\nimport SwiftUI\nimport FirebaseFirestore\n```\n\n我们可以创建我们的类，其中包含对我们之前创建的模型以及对\
  \ Firestore 数据库的引用：\n\n```\nclass PostViewModel: ObservableObject {\n  @Published\
  \ var posts = [Post]()\n  private var databaseReference = Firestore.firestore().collection(\"\
  Posts\")\n  // 用于发布数据的函数\n}\n```\n\n最后，这是我们用于向服务器发布数据的函数：\n\n```\n// 发布数据的函数\nfunc\
  \ addData(description: String, datePublished: Date) async {\n  do {\n    _ = try\
  \ await databaseReference.addDocument(data: [\n      \"description\": description,\n\
  \      \"datePublished\": datePublished\n    ])\n  } catch {\n    print(error.localizedDescription)\n\
  \  }\n}\n```\n\n这个视图模型与我们之前在第 3 章中完成的类似，不同之处在于这次我们使用了 `async`/`await` 方法。你可能会好奇这些关键字的作用。\n\
  \n\n\n## 使用 Async/Await 调用后端\n\n在我们的应用中，需要上传一些内容——一张图片和一段描述——同时保存日期和时间。问题是：数据上传到服务器可能需要时间，尤其是当图片较大时。\n\
  \n因此，如果采用传统调用方式，用户在图片上传到数据库的几秒钟内会停留在当前屏幕。这并不是良好的用户体验。这就是我们使用此方法的原因：通过异步调用，用户可以安全地导航并`等待`。当他们执行其他操作时，代码会在后台运行。\n\
  \n现在我们已经实现了发布函数，让我们来测试一下！前往`PostView`文件（已在入门项目中创建），并将其与我们的视图模型建立关联：\n\n```\n@ObservedObject\
  \ private var viewModel = PostViewModel()\n```\n\n然后，在我留下注释的按钮内部直接调用它：\n\n```\n\
  // MARK: 将数据发布到 Firestore\nTask {\n    await self.viewModel.addData(description:\
  \ description, datePublished: Date())\n}\n```\n\n如您所见，我们正在保存用户的文本输入。至于日期，我们传入`Date()`，它会获取当前的\
  \ iPhone 日期。目前，我们对图片不做任何处理，因为这将是下一章关于 Firebase Storage 的主题。\n\n此外，我们将函数放在`Task`中，这是必要的，因为需要使用`await`关键字告知程序：这段代码需要在后台运行，因为上传可能需要时间。\n\
  \n现在，我们的前端已经准备好向后端发布数据，但我们尚未设置 Firestore 来接收数据。前往 Firebase 控制台的 Firestore Database\
  \ 部分，点击**创建数据库**。与第 3 章一样，以测试模式启用数据库：\n\n![](img/533376_1_En_5_Fig4_HTML.jpg)\n\n\
  一个 Firebase 窗口的截图，中央是创建数据库对话框。对话框中有用于在生产模式和测试模式下启动的单选按钮，测试模式已被选中，右侧显示代码行。底部右侧有取消和下一步按钮。\n\
  \n**图 5-4** Firestore – 创建数据库\n\n然后，我们可以运行应用并尝试发布一条评论。您应该在数据库中看到它：\n\n![](img/533376_1_En_5_Fig5_HTML.jpg)\n\
