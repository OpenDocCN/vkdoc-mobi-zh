  return\n}\nself.storageReference.downloadURL { (url, error) in\nguard let downloadURL\
  \ = url else {\n// 哎呀，发生了错误！\nreturn\n}\nself.databaseReference.addDocument(data:\
  \ [ \"description\": description, \"datePublished\": datePublished, \"imageURL\"\
  : downloadURL.absoluteString])\n}\n}\n} catch {\nprint(error.localizedDescription)\n\
  }\n}\n```\n\n这里我们添加了两个重要函数：\n\n*   `putData` – 该函数会将我们选择的资源上传到 Firebase 后端。\n* \
