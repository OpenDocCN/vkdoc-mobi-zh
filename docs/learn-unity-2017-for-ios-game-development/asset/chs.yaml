  \ batched:    10\ntris #>        min:  4592  max:  4592  avg:  4592   | batched:\
  \  3420\nverts #>       min:  3728  max:  3728  avg:  3728   | batched:  2750\n\
  player-detail> physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:\
  \  2.2 render:  3.4 fixed-update-count: 0 .. 0\nmono-scripts>  update:  0.1   fixedUpdate:\
  \  0.0 coroutines:  0.0\nmono-memory>   used heap: 389120 allocated heap: 524288\
  \  max number of collections: 0 collection total duration:  0.0\n清单 14-12.\n优化后的内置分析结果\n\
  ```\n\n分析显示平均帧时间为 16.6 毫秒，刚好接近 60 帧/秒。目标达成！这个分析是在第四代 iPod touch（相当于 iPhone 4）上运行的，因此根据你的设备，实际效果可能会有所不同。\n\
  \nplayer-detail 行显示帧时间主要由批处理和渲染占用，因此图形是剩下的瓶颈，再花更多时间进行脚本优化将得不偿失。如果你觉得 30 帧/秒也可以接受，那么你现在就有很好的条件来添加更多内容和功能了。\n\
  \n## 进一步探索\n\n我在本章开头提到了过早优化的风险，生怕在你能正常运行之前就把事情搞复杂了。但从开发之初，你就应该牢记你的性能目标。从简单开始（Unity\
  \ 文档建议在 iPhone 3GS 上渲染不超过 40,000 个顶点），让一些功能跑起来，优化到足以达到你的性能目标，然后继续添加内容和功能，每当游戏性能低于你的目标时就停下来优化。并且一定要记住分析并优化瓶颈。把时间花在只占你帧时间\
  \ 10% 的部分上进行优化，而放着另一个占 50% 的部分不管，是没有任何意义的。\n\n### Unity 手册\n\n在 Unity 手册中，“iOS 开发入门”部分有若干页名为“iOS\
  \ 性能优化”，涵盖了你在优化构建时调整的播放器设置，描述了内置分析器，并展示了如何优化构建大小。\n\n“高级”部分记录了 Unity Pro 版中可用的 Profiler\
  \ 以及之前提到的离线优化功能：光照贴图和遮挡剔除。“高级”部分还包括许多其他与优化相关的页面：“优化图形性能”、“减少文件大小”、“自动内存管理”（垃圾回收）和“阴影”（特别是“阴影性能”）。“资源包”和“加载资源”页面解释了如何按需下载资源并将其带入场景，这是一种可用于管理已安装应用程序大小的技术。\n\
  \n\n\n### 参考手册\n\n`Reference Manual` 描述了您优化的所有组件和资源。在这些组件中，您调整了摄像机视锥体和可见性遮罩，调整了剔除遮罩和灯光距离并禁用了其阴影，最小化了每个\
  \ `MeshFilter` 的阴影投射器和接收器数量，简化了每个 `MeshRenderer` 的着色器，并将 `MeshCollider` 替换为 `Box`\
  \ 碰撞器。您还检查了组件所引用的各种资源类型的导入设置：`Texture2D`、`AudioClip`、`Mesh` 和 `Animation`。`Reference\
  \ Manual` 还记录了您自定义的设置管理器，包括 **Quality Settings**、**Physics Manager**、**Time Manager**\
  \ 和 **Audio Manager**。您还使用了 `GUIText` 组件（它是用于启动画面的 `GUITexture` 的兄弟组件）来显示帧率。\n\n\
  ### 脚本参考\n\n`Scripting Reference` 的“脚本概览”部分有一个“性能优化”页面，其中包含一些关于如何编写更快脚本的技巧。您在本章中学到的一个新函数是\
  \ `StaticBatchingUtility` 类中的静态函数 `Combine`（`Combine` 是该类中唯一的函数），您调用它来在运行时批处理一组\
  \ `GameObjects` 的层级结构。您在本章中学到的一个新变量是 `MonoBehaviour` 类中的 `useGUILayout` 变量，当将其设置为\
  \ `true` 时，它通过告知 UnityGUI 系统当前 `OnGUI` 回调不会使用 `GUILayout` 函数执行任何自动布局来提高性能。\n\n所有设置管理器都有相应的类，以便可以通过脚本查询和设置它们的设置。由于除\
  \ `Render Settings` 之外的所有设置管理器在整个游戏中都是全局激活的，而非按场景激活，因此脚本访问允许您为每个场景调整设置。例如，您可以为每个场景定义一个质量级别，并为每个场景添加一个加载相应质量级别的脚本。本章讨论的设置管理器对应的类包括\
  \ **Quality Settings**、**Audio Settings**、**Physics** 和 **Time**。\n\n您还使用了 `Time`\
  \ 类，评估了其 `timeScale` 和 `deltaTime` 变量，并设置 `GUIText` 的 `text` 变量来实现基本的帧率显示。\n\n###\
  \ 资源商店\n\n`Asset Store` 列出了一些性能分析系统（搜索 `profiler`）和一些对象池系统（搜索 `pool`），例如 **PoolManager**、**Smart\
  \ Pool** 和 **Pooling Manager**。\n\n### 网络资源\n\nUnity 维基百科网站 [`http://wiki.unity3d.com/`](http://wiki.unity3d.com/)\
  \ 在其“技巧、窍门和工具”部分提供了一些性能优化技巧和几个与性能相关的脚本。特别是，“FramesPerSecond”页面列出了几个比您在本章中创建的更复杂的帧率显示脚本（例如，它们通过一系列帧计算帧率以获得更稳定的显示）。\n\
  \nUmbra 遮挡剔除系统由 Umbra Software 开发，网址为 [`http://umbrasoftware.com/`](http://umbrasoftware.com/)。Beast\
  \ 光照贴图系统是 Autodesk 的产品，其产品页面位于 [`http://gameware.autodesk.com/beast`](http://gameware.autodesk.com/beast)。\n\
  \n### 书籍推荐\n\n我已经多次提到《*Real-Time Rendering*》（ [`http://realtimerendering.com`](http://realtimerendering.com)\
  \ ），但它与本章中的图形优化确实非常相关。仅关于 mipmapping 的论述就值得一读。\n\n# 15. 接下来去哪里？\n\n至此，您已经完成了 Unity\
  \ 和 Unity iOS 开发的入门指南，包括下载和安装 Unity、在 Unity 编辑器中开发一个简单的保龄球游戏、使其在 iOS 上运行，以及最终优化它以获得可接受的性能。由于本书并未涵盖所有\
  \ Unity 功能或游戏开发主题（否则这本手册将开始像一套多卷百科全书！），我将以一章的“深入探索”作为总结。\n\n## 更多脚本编程\n\n关于 Unity\
  \ 脚本编程，我仅触及了表面，不仅是所提供的脚本语言种类和丰富的 Unity 类库，还涉及了脚本编写的内容。\n\n### 编辑器脚本\n\n如果您觉得 Unity\
  \ 编辑器中缺少某些功能，那么很有可能您可以通过编写编辑器脚本来自行添加。这些脚本也是用 JavaScript、C# 或 Boo 编写的，但它们位于项目视图的\
  \ `Editor` 文件夹中。编辑器脚本可以通过一组编辑器类访问编辑器 GUI、项目设置和项目资源，这些类在脚本参考的“编辑器类”部分有文档说明。\n\n举个例子，让我们在\
  \ Unity 编辑器菜单栏上创建一个菜单，其中包含用于激活和停用整个 `GameObjects` 层级结构的命令。换句话说，这些命令会对层级结构中的每个 `GameObject`\
  \ 调用 `SetActive`，相当于在 Inspector 视图中点击每个 `GameObject` 的复选框。\n\n在 Unity 4 之前，每个 `GameObject`\
  \ 只有一个由 Inspector 视图中的活动复选框和 `GameObject` 变量 `active` 表示的激活状态。但从 Unity 4 开始，Inspector\
  \ 视图中的复选框表示 `GameObject` 的局部激活状态，可以通过脚本调用 `SetActive` 设置，并通过 `GameObject` 变量 `activeSelf`\
  \ 读取。全局或“真正”的激活状态取决于其所有父级是否也在局部处于激活状态。因此，确保层级结构中所有 `GameObject` 在局部激活后，可以通过切换根 `GameObject`\
  \ 的激活状态来停用整个组。手动点击所有这些复选框可能既费力又容易出错，因此一个执行此操作的单一命令将非常有用，特别是对于将项目升级到 Unity 4 的开发者来说。\n\
  \n创建编辑器脚本的过程与创建用于场景的脚本相同，只是编辑器脚本必须位于 `Editor` 文件夹中。因此，让我们在项目视图中创建一个新的 JavaScript，将其命名为\
  \ `FuguEditor`，并放置到 `Editor` 文件夹中（图 15-1）。\n\n![A310332_2_En_15_Fig1_HTML.jpg](img/A310332_2_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1. 创建新的编辑器脚本\n\n现在向脚本中添加清单 15-1 中的代码。\n\n```\n#pragma strict\n@MenuItem (\"\
  FuguGames/ActivateRecursively\")\nstatic function ActivateRecursively() {\nif (Selection.activeGameObject\
  \ !=null) {\nSetActiveRecursively(Selection.activeGameObject,true);\n}\n}\n@MenuItem\
  \ (\"FuguGames/DeactivateRecursively\")\nstatic function DeactivateRecursively()\
  \ {\nif (Selection.activeGameObject !=null) {\nSetActiveRecursively(Selection.activeGameObject,false);\n\
  }\n}\nstatic function SetActiveRecursively(obj:GameObject,val:boolean) {\nobj.SetActive(val);\n\
  for (var i:int=0; i<obj.transform.GetChildCount(); ++i) {\nSetActiveRecursively(obj.transform.GetChild(i).gameObject,val);\n\
  }\n}\n@MenuItem (\"FuguGames/ActivateRecursively\", true)\n@MenuItem (\"FuguGames/DeactivateRecursively\"\
  , true)\nstatic function ValidateGameObject() {\nreturn (Selection.activeGameObject\
  \ !=null);\n}\n```\n\n**清单 15-1.** `FuguEditor.js` 的完整清单\n\n`@MenuItem (\"FuguGames/ActivateRecursively\"\
  )` 这一行会在编辑器菜单栏的 `FuguGames` 菜单中添加一个 `ActivateRecursively` 菜单项，如果菜单尚未创建则会创建它。`@MenuItem`\
  \ 行之后的函数会在选择该菜单项时被调用。`ActivateRecursively` 会检查编辑器中是否已选中一个 `GameObject`，如果是，则将该 `GameObject`\
  \ 连同值 `true` 一起传递给函数 `SetActiveRecursively`。`SetActiveRecursively` 依次对层级结构中的每个 `GameObject`\
  \ 调用 `SetActive` 并传入值 `true`。\n\n之后，一段类似的代码会在菜单中添加一个 `DeactivateRecursively` 项，仅在名称和传递给\
  \ `SetActiveRecursively` 的值（传递 `false` 而非 `true`）上有所不同。\n\n\n\n尽管你可以在调用 `SetActiveRecursively`\
  \ 之前检查对象是否被选中，但从用户界面设计的角度来说，更好的做法是：如果一个菜单项不会产生任何效果，就将其禁用。你可以通过再次列出 `MenuItem` 属性来实现，不过这次要额外添加一个\
  \ `true` 参数，该参数表示下一个函数是一个静态函数，仅当菜单项应该处于激活状态时才返回 `true`。`ActivateRecursively` 和 `DeactivateRecursively`\
  \ 都使用了 `ValidateGameObject` 函数（该函数仅用于检查编辑器中是否选中了某个 `GameObject`），来判断菜单项是应该可用还是灰显。\n\
  \n此脚本编译后，新的菜单应该会出现，如图 15-2 所示（可能会有延迟）。\n\n![A310332_2_En_15_Fig2_HTML.jpg](img/A310332_2_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2.  \n使用编辑器脚本添加到菜单栏的菜单\n\n这个示例的用户界面很简单，只有几个菜单项，但编辑器脚本可以使用 UnityGUI 函数创建新的窗口和用户界面（实际上编辑器就是用\
  \ UnityGUI 实现的，这就是为什么偶尔在控制台视图中看到的编辑器错误会显示为 UnityGUI 错误）。编辑器脚本还可用于批处理、导入后的资源后处理，或构建前的场景预处理。我编写过一些简单的编辑器脚本，用于删除构建文件、显示\
  \ `GameObject` 统计数据，甚至调用 macOS 的 `say` 命令来让自己能和自己对话。\n\n### C#\n\n我在本书中主要使用 Unity\
  \ 的 JavaScript，原因很简单：我必须选一种语言。JavaScript 比 C# 更简洁，至少对于小型脚本来说是如此。只需比较一下项目视图中通过“创建”菜单生成的空\
  \ JavaScript 脚本（列表 15-2）和 C# 脚本（列表 15-3）就能看出区别。\n\n```\n#pragma strict\nfunction\
  \ Start () {\n}\nfunction Update () {\n}\n```\n\n列表 15-2.  \n新建的 JavaScript 脚本\n\
  \n```\nusing UnityEngine;\nusing System.Collections;\npublic class NewBehaviourScript\
  \ : MonoBehaviour {\n// Use this for initialization\nvoid Start () {\n}\n// Update\
  \ is called once per frame\nvoid Update () {\n}\n}\n```\n\n列表 15-3.  \n新建的 C# 脚本\n\
  \n在 C# 脚本中，类声明是显式的，你必须确保类名与脚本名匹配。在 C# 脚本顶部，显式导入了 Unity 脚本中常用的两个命名空间：`UnityEngine`\
  \ 和 `System.Collections`。而在 JavaScript 中，它们是隐式导入的。\n\n大量 JavaScript 代码只需少量修改就能在\
  \ C# 中运行，但两者在语法上存在一些差异。例如，变量声明以 `<type> <name>` 开头，而不是 `var <name>:<type>`。函数的定义方式也不同，C#\
  \ 以返回类型和函数名开头，而不是以 `function` 开头。没有理由在 C# 文件中添加 `#pragma strict`，因为 C# 本身就是强类型语言。\n\
  \n对于小型脚本，JavaScript 更便捷；但对于大型 Unity 开发项目，C# 可以说是更实用的选择，因为它是一种文档更完善、经过工业级强度测试的语言，同时也是最流行的\
  \ Mono 和 .NET 语言。此外，许多 Unity 扩展包都是用 C# 编写的（包括 Prime31 插件、EZGUI 和 NGUI），而且在 Unity\
  \ 中混用 JavaScript 和 C# 很不方便；如果你的 JavaScript 代码引用了 C# 脚本，这些脚本必须放在 `Plugins` 或 `Standard\
  \ Assets` 文件夹中，以便它们更早地加载。\n\n使用 C# 的另一个原因是 Unity 5 中为 C# 增加了对命名空间的支持。这一特性允许你省去给类名添加前缀来避免冲突的操作。例如，列表\
  \ 15-4 展示了 `FuguFrameRate` 脚本的 C# 版本，其中类是在命名空间声明内定义的。\n\n```\nusing UnityEngine;\n\
  using System.Collections;\nnamespace Fugu {\nsealed public class FrameRate : MonoBehaviour\
  \ {\npublic int frameRate = 60;\nvoid Awake () {\nApplication.targetFrameRate =\
  \ frameRate;\n}\n}\n} // end namespace\n```\n\n列表 15-4.  \n`FuguFrameRate` 脚本的 C#\
  \ 版本\n\n由于该类位于 `Fugu` 命名空间内，你可以安全地将该类直接称为 `FrameRate`，并将脚本命名为 `FrameRate` 以保持一致。如果你需要从另一个脚本引用此类，就必须使用完全限定名\
  \ `Fugu.FrameRate`，除非你在该脚本顶部添加了 `using Fugu;` 语句。C# 允许你在类定义前使用 `sealed` 关键字，这指定了该类不可被继承。如果尝试定义\
  \ `FrameRate` 的子类，将会导致编译器错误。Java 程序员会认出这等同于 Java 的 `final` 声明。\n\n在 C# 中，协程必须显式返回\
  \ `IEnumerator` 类型（该类型位于 `System.Collections` 命名空间中，这就是为什么总是导入该命名空间会很方便）。尽管 Unity\
  \ 会在新建的 C# 脚本中自动添加一个返回 `void` 的 `Start` 回调，但你可以通过将返回类型从 `void` 改为 `IEnumerator`，将这个\
  \ `Start` 回调变成一个协程。\n\n`StartCoroutine` 可以从任何回调中调用，因此这种技术具有提供统一的协程调用方式的优点，并且无需将回调直接用作协程（也无需记住哪些回调可以用作协程）。在\
  \ JavaScript 中应用这种做法也是不错的。\n\n\n你不能再像在 JavaScript 中那样，在协程里直接调用 `yield`。在 C# 中，你需要调用\
  \ `yield return null` 来实现等待一帧的效果。\n\n另一个不同之处在于匿名函数的语法。在我们的 `FuguGameCenter` 脚本中，我们传入了未命名的成功或失败函数，形式为\
  \ `function(success:boolean) {...}`；但在 C# 中，匿名函数被称为 lambda 函数（这个术语源于 Lisp 语言，它使用\
  \ `(lambda (success) ...)`），其形式为 `(bool success) => {...}`。代码清单 15-5 展示了 `FuguGameCenter`\
  \ 脚本的 C# 版本。\n\n```\nusing UnityEngine;\nusing System.Collections;\nusing UnityEngine.SocialPlatforms.GameCenter;\n\
  namespace Fugu {\nsealed public class GameCenter : MonoBehaviour {\npublic bool\
  \ showAchievementBanners = true;\n// 初始化时调用\nvoid Start () {\n#if UNITY_IPHONE\n\
  Social.localUser.Authenticate ( (bool success) => {\nif (success && showAchievementBanners)\
  \ {\nGameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);\n\
  Debug.Log (\"已验证身份 \"+Social.localUser.userName);\n}\nelse {\nDebug.Log (\"未能验证身份\
  \ \"+Social.localUser.userName);\n}\n}\n);\n#endif\n}\nstatic public void Achievement(string\
  \ name,double score) {\n#if UNITY_IPHONE\nif (Social.localUser.authenticated) {\n\
  Social.ReportProgress(name,score, (bool success) => {\nif (success) {\nDebug.Log(\"\
  成就 \"+name+\" 报告成功\");\n}  else {\nDebug.Log(\"报告成就 \"+name+\" 失败\");\n}\n} );\n\
  }\n#endif\n}\nstatic public void Score(string name,long score) {\n#if UNITY_IPHONE\n\
  if (Social.localUser.authenticated) {\nSocial.ReportScore (score, name, (bool success)\
  \ => {\nif (success) {\nDebug.Log(\"已将 \"+score+\" 提交到排行榜 \"+name);\n}  else {\n\
  Debug.Log(\"将 \"+score+\" 提交到排行榜 \"+name+\" 失败\");\n}\n} );\n}\n#endif\n}\n}\n}\n\
  代码清单 15-5.\nC# 版本的 FuguGameCenter\n```\n\n最后，你可能会最怀念 JavaScript 的一个特性是：能轻松地修改 `transform`\
  \ 中的 `Vector3` 值。代码清单 15-6 展示了一行简单的 JavaScript 代码，它仅修改了 transform 位置中的 `x` 分量。\n\
  \n```\nfunction Start () {\ntransform.position.x=0;\n}\n代码清单 15-6.\n在 JavaScript\
  \ 中修改 Transform 的 Vector3\n```\n\n在 C# 中，这行代码会产生一个编译器错误，因为 `Vector3` 是一个结构体（struct），而不是类（class），因此它是值类型，而非引用类型。它在\
  \ JavaScript 中能工作是一种便利（尽管有误导性，因为它确实让 `Vector3` 看起来像一个类，而不是结构体）。\n\n由于 `Vector3`\
  \ 是一个结构体，你无需担心垃圾回收器需要清理一堆未使用的 `Vector3` 实例，因为，好吧，根本没有实例。但这确实意味着在 C# 中，如果你想修改 transform\
  \ 的位置，你必须创建一个新的 `Vector3`，如代码清单 15-7 所示。\n\n```\nvoid Start () {\ntransform.position\
  \ = new Vector3(0,transform.position.y,transform.position.z);\n}\n代码清单 15-7.\n在\
  \ C# 中修改 Transform 的有效方法\n```\n\n请注意，在 C# 中，你必须在 `Vector3` 构造函数前指定 `new`，而在 JavaScript\
  \ 中这是可选的。这是 JavaScript 的一个小便利（这类便利通常被称为“语法糖”），但 C# 的优势在于允许你以类似于定义类的方式定义自己的结构体。在\
  \ JavaScript 中，你可以使用结构体，但无法定义新的结构体。Andrew Stellman 和 Jennifer Greene 的 *深入理解 C#（Head\
  \ First C#）*（O'Reilly 出版）是一本很好的 C# 入门书籍，但有经验的程序员可以通过 *C# 7.0 本质论（C# in a Nutshell）*系列（同样由\
  \ O'Reilly 出版）快速上手 C#。特别是 Java 程序员会发现 C# 很熟悉（尽管名字如此，C# 与 C 或 C++ 并无关联，除非你算上遥远的祖先）。\n\
  \n### 脚本执行顺序\n\n在结束脚本编写话题之前，还有一个问题值得一提：指定脚本之间的执行顺序。如果你查看保龄球游戏中用于控制主摄像头的 `SmoothFollow`\
  \ 脚本，你会看到摄像头位置不是在 `Update` 回调中更新，而是在 `LateUpdate` 回调中更新。`LateUpdate` 在每个帧中都会被调用，就像\
  \ `Update` 一样，但一个帧中的所有 `LateUpdate` 调用都在所有 `Update` 调用完成之后才进行。`SmoothFollow` 在 `LateUpdate`\
  \ 中计算摄像头位置，因此它会考虑其目标在 `Update` 回调中发生的任何位置变化。\n\n同时拥有 `Update` 和 `LateUpdate` 回调是游戏引擎中的一种常见技术，但它的作用也仅限于此。如果你希望一个\
  \ `GameObject` 在另一个 `GameObject` 的 `LateUpdate` 之后更新呢？抱歉，没有 `LateLateUpdate` 回调！但\
  \ Unity 确实有一个更通用的解决方案，即脚本执行顺序设置，可以通过编辑菜单的项目设置子菜单调出（图 15-3）。\n\n![A310332_2_En_15_Fig3_HTML.jpg](img/A310332_2_En_15_Fig3_HTML.jpg)\n\
  \n**图 15-3.** 调出脚本执行顺序设置\n\n当选中一个脚本时，也可以通过点击检查器视图中显示的“执行顺序”按钮来调出脚本执行顺序设置。无论哪种方式，脚本执行顺序设置都会显示在检查器视图中（图\
  \ 15-4）；你会看到一个初始只包含一个“默认时间”项的列表。\n\n![A310332_2_En_15_Fig4_HTML.jpg](img/A310332_2_En_15_Fig4_HTML.jpg)\n\
  \n**图 15-4.** 检查器视图中的脚本执行顺序设置\n\n要添加一个会在 `FuguForce` 之后执行的脚本，你可以点击脚本执行顺序设置右下角的加号（+）按钮，并从弹出的菜单中选择\
  \ `FuguForce` 脚本。默认情况下，`FuguForce` 脚本会出现在脚本执行顺序设置中“默认时间”设置的下方，这意味着 `FuguBowl` 将在所有其他脚本之后运行。\n\
  \n然后你可能会决定，游戏控制器脚本 `FuguBowl` 应该在所有其他脚本之后运行（例如，因为它不断检查保龄球的位置），但 `SmoothFollow` 除外。因此，再次点击\
  \ + 按钮添加 `FuguBowl` 脚本，然后使用左侧的拖动柄将 `FuguBowl` 拖到 `SmoothFollow` 上方、默认时间下方，最终得到一个如图\
  \ 15-5 所示的列表。任何被拖到默认时间上方的脚本都会在所有其他脚本之前执行。\n\n![A310332_2_En_15_Fig5_HTML.jpg](img/A310332_2_En_15_Fig5_HTML.jpg)\n\
  \n**图 15-5.** 指定 `FuguBowl.js` 和 `SmoothFollow.js` 的执行顺序\n\n点击脚本右侧的减号（-）按钮将从脚本执行顺序设置中移除该脚本。\n\
  \n### 插件\n\n前面多次提到第三方插件，其中一些可在资源商店中找到，许多来自 Prime31 Studios。但如果你恰好熟悉 C、C++ 或 Objective-C，你可以编写自己的插件，无论是为了访问更多设备功能，还是为了使用用\
  \ C、C+ 或 Objective-C 编写的库。除了包含原生库之外，插件还需要额外的 Unity 封装脚本。该过程在 Unity 手册“高级”部分的“插件”页面中有详细说明。\n\
  \n\n\n## 跟踪应用\n\n尽管 iTunes Connect 提供下载量和销售额数据（其图表比曾经是唯一选项的 `.csv` 报告更易读），但也有几种第三方产品可以跟踪应用销售数据以及应用排名和评论等其他信息。\n\
  \n`App Annie`（`http://appannie.com/`）和 `AppFigures`（`http://appfigures.com/`）是两个较为流行的基于\
  \ Web 的产品，它们能自动每天从 iTunes Connect 下载应用数据（但需要在账户设置时提供 iTunes Connect 登录信息）。这两个产品都能以漂亮的图表展示销售数据，并每天发送应用统计摘要邮件。`App\
  \ Annie` 目前是免费的（严格来说处于测试阶段），而 `AppFigures` 则收取费用。\n\n图 15-6 显示了 Fugu Bowl 一个月内下载量的\
  \ `App Annie` 图表。更新下载量叠加在销量之上。其中有一条更新线对应 FuguBowl 更新的发布情况。\n\n![A310332_2_En_15_Fig6_HTML.jpg](img/A310332_2_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6. `App Annie` 销售图表\n\n`AppViz` (`http://appviz.com/`) 是一款 macOS 应用程序，它实现相同功能，但将数据下载到你的\
  \ Mac 上，并提供多种图表，包括按地理区域划分的销售情况（图 15-7）。`AppViz` 不是免费的，但价格不高，我认为物有所值。\n\n![A310332_2_En_15_Fig7_HTML.jpg](img/A310332_2_En_15_Fig7_HTML.jpg)\n\
  \n图 15-7. `AppViz` 地理视图\n\n你完全不必只局限于使用其中一种产品。我使用 `AppViz` 来确保本地拥有所有应用的销售数据，我喜欢它多样的图表功能以及\
  \ App Store 评论下载功能。同时，我使用 `App Annie` 来获取自动发送的每日销售数据邮件和排名展示（在 `AppViz` 中下载所有排名数据耗时较长），而且\
  \ `App Annie` 还支持一些安卓应用商店。另外，它是免费的！\n\n**提示**\n\n你可以从 `AppViz` 导出已下载的所有数据，然后将这些数据导入到像\
  \ `App Annie` 这样的其他产品中。由于苹果只会在 iTunes Connect 上提供一年的应用销售数据，因此这是一种确保你能够将应用的全部销售历史记录导入到销售跟踪产品中的方法。\n\
  \n### 推广码\n\n我描述过如何在应用通过 App Store 审核后下载推广码，但我没有说明如何使用它们。其实有很多选择。几乎所有应用评论网站都接受附带推广码的评论请求。`Touch\
  \ Arcade`（`http://toucharcade.com/`）就是其中之一，但它还有一个非常活跃的论坛，开发者可以在那里发放推广码。`AppGiveaway`（`http://appgiveaway.com/`）则会在特定时间段内开展发放推广码的促销活动。这比自己发放方便得多，尽管你也应该自己发放。保留推广码的库存也是推动应用更新的一个绝佳理由，因为每次更新你都能获得一批全新的\
  \ 50 个推广码。\n\n## 更多盈利方式\n\n考虑到每年都需要缴纳苹果开发者费用和 Unity 授权费用，你很可能希望至少能收回这些成本。\n\n###\
  \ 应用内购买\n\n除了应用销售，苹果为 iOS 提供了另一种收入渠道：一个名为 `Storekit` 的应用内购买（IAP）系统。Unity iOS 没有针对\
  \ IAP 的脚本接口，但 `Prime31 Studios` 在其产品中提供了一个 `Storekit` 插件。Unity 手册提供了一些关于如何下载和激活通过\
  \ IAP 购买的额外内容的提示，而 iTunes Connect 文档则解释了如何设置应用内购买。\n\n### 资源商店\n\n我在我的应用中使用了数十个免费和付费的\
  \ `Asset Store` 资源包，你一定会发现 `Asset Store` 对你的个人项目非常有用。但 `Asset Store` 也是一个自助发布产品并产生收入的地方（Unity\
  \ 抽取 30% 的分成，这与苹果在 App Store 上的分成比例相同）。你也可以在 `Asset Store` 上免费发布资源包，以获得认可或作为对社区的贡献（在本书的示例中，我确实受益于这种慷慨）。\n\
  \n方便的是，`Asset Store` 的提交工作可以直接在 Unity 编辑器内完成，使用的是从 `Asset Store`（名字很贴切）下载的 `Asset\
  \ Store` 工具。你可以从项目中提交任何类型的资源集合——音频、纹理、模型、脚本、插件，甚至整个项目。\n\n**提示**\n\n使用预处理器指令确保切换构建目标时不会出现编译错误，如果你使用了\
  \ Unity Pro 功能，请添加一个自定义的 `UNITY_PRO` 预处理器指令，这样 Unity Basic 用户就不会遇到问题。\n\n与 `App\
  \ Store` 提交一样，`Asset Store` 提交的大部分工作涉及创建截图、图标、应用描述和商店素材。在 `Asset Store` 上成为卖家的说明可在\
  \ `http://unity3d.com/asset-store` 找到。\n\n### 为安卓开发\n\n本书中几乎所有为 Unity iOS 开发的内容都能很好地兼容\
  \ Unity Android。不出所料，任何属于 `iPhone` 类的内容在安卓上也不可用（例如，我们用来检查设备类型的变量 `iPhone.generation`），但所有在\
  \ iOS 上工作的 `Input` 类内容在安卓上也以同样的方式工作，包括触摸屏和加速度计功能。\n\n`Prime31 Studio` 和其他供应商提供 Unity\
  \ Android 插件，以提供对设备功能和移动服务的更多访问，例如 `AdMob` 移动广告服务。\n\n安卓的构建和提交流程也有所不同。安卓不需要 Xcode，而是需要安装\
  \ Android SDK。你仍然可以从 Unity 编辑器调用“构建并运行”操作，但与为应用构建 Xcode 项目不同，Unity Android 会直接构建可执行的应用文件（APK\
  \ 文件）。并且，与 iOS 开发不同，安卓开发可以面向多个应用商店。特别是 Google Play 没有审核过程，因此它是快速自助发布的好途径，也是被苹果拒绝的应用的一个有用的备用渠道。\n\
  \n### 外包工作\n\n在开发下一个热门应用的同时，独立开发者通常通过承接外包工作来支付账单。潜在客户可以在 Unity 论坛的“付费工作”主题、`http://unity3dwork.com/`\
  \ 甚至像 `http://odesk.com/` 这样的一般承包商网站上找到。有些市场专门从事移动应用开发，例如 `http://apptank.com/`\
  \ 和 `http://theymakeapps.com/`。\n\n如果你正在寻找全职的游戏开发工作，无论是否涉及 Unity，使用 Unity 进行游戏开发的经验，更不用说自助发布的游戏作品集，都只会对你有所帮助。\n\
  \n\n\n## 结语\n\n至此，我的分享就要结束了。理想情况下，你现在已经准备好并充满热情地开始制作属于自己的 Unity iOS 应用。如果说这本书能带给你一个启示，那就是：从简单开始，不断积累，直到它变成有趣的作品。不要成为那种一上来就想做大型多人在线游戏作为首个项目的人！请记住，要持续学习并参与\
  \ Unity 社区——在 Unity 论坛和 Unity Answers 网站上既贡献答案也寻求帮助，同时别忘了查看 Unity 维基。向社区推广你的作品（Unity\
  \ 论坛设有“作品展示”版块）并请他人帮忙宣传是完全可以的，但也要记得回报他人！作为使用 Unity iOS 开发自己项目的一个意外收获，我结识了一群开发者，我们可以互相倾诉、庆祝成功并交流宝贵技巧。我无法逐一列举他们，但你可以在我的\
  \ Twitter 关注列表中找到他们：`@fugugames`。顺便说一句，Twitter 也是与其他 Unity 开发者进行更私密交流的绝佳渠道。我还通过\
  \ Twitter 与许多客户有过沟通，也曾成功为我的游戏（尤其是《HyperBowl》）创建了 Facebook 产品页面。虽然应用客户有时以刻薄著称，但我发现他们中的大多数人都支持和理解我们独立开发者，并且如果你愿意让他们参与，他们会热情地成为开发过程的一部分。事实上，我不仅获得了大量免费的质量检测和本地化翻译帮助，还收到了许多反馈。所以，快去建立你的\
