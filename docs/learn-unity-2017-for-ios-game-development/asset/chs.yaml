  \n## 进一步探索\n\n本章可能看起来为了创建一个简单的静态场景而涵盖了大量内容（无意双关），但在此过程中我们探索了许多 Unity 的基本概念，特别是组件与游戏对象之间的关系。因此，现在你拥有了一个带有凸凹贴图和纹理的立方体场景，并有一个带有耀斑的点光源为其照明。场景中填充了从本地文件、Unity\
  \ 标准资源以及 Unity 资源商店导入的资产。并且，由于`Main Camera`上附加了`SimpleMouseRotator`脚本，场景并非完全静态。脚本编写将在本书中扮演主导角色，从下一章开始，我们将超越静态场景。\n\
  \n在继续之前，休息一下，回顾一下 Unity 官方文档中关于目前所用功能的部分，哪怕只是为了熟悉日后查阅文档的位置。\n\n### Unity 手册\n\n\
  Unity 手册的`Unity Basics`部分主要与上一章相关，描述了用户界面，但该部分确实有一个“Creating Scenes”页面。更相关的是“Building\
  \ a Scene”部分，它描述了游戏对象、组件和脚本之间的关系，如何使用`Inspector View`编辑组件属性，以及如何在`Scene View`中导航和移动游戏对象——所有这些在本章中都有涉及。灯光和摄像机也得到了解释。本节列出的一个本书不会使用的功能是地形引擎（在\
  \ Unity iOS 中可用，但运行缓慢）。不过，地形是一个非常重要且令人印象深刻的 Unity 功能，因此值得一读。“Asset Import and Creation”部分描述了本章使用的资产类型：网格、材质、纹理和脚本。资产的导入过程以及资源商店也在此部分得到了解释。\n\
  \n我们尚未到达有游戏玩法的阶段，但“Creating GamePlay”部分有一个关于“Transforms”的页面，我们看到，即使只是放置静态游戏对象，理解它也是基础。\n\
  \n\n\n### 参考手册\n\n《参考手册》比《Unity 手册》内容更深入，详细描述了每个组件，解释了其属性并记录了组件的使用方法。《参考手册》还记录了资源类型，并对`GameObject`进行了说明。\n\
  \n通常，你应该阅读所用每个组件和资源类型的《参考手册》文档。请记住，检查器视图中的每个组件上都有一个帮助图标，点击该图标即可调出相应的《参考手册》页面。与《Unity\
  \ 手册》一样，《参考手册》不仅可通过 Unity 帮助菜单获取，还可从 Unity 网站的“学习”选项卡下找到（可直接访问 [`docs.unity3d.com/`](http://docs.unity3d.com/)）。《参考手册》的“设置管理器”部分包含一个关于渲染设置的页面，本章中的天空盒就是在那里分配的。“变换组件”部分只列出了一个组件，即变换组件，它自然附加在每个`GameObject`上。\n\
  \n“网格组件”部分更有趣，因为它描述了任何带有网格的`GameObject`（例如本章创建的立方体）所需的`MeshFilter`和`MeshRenderer`组件。“渲染组件”部分内容更丰富，其中包含了摄像机组件及其关联的`GUILayer`组件和`FlareLayer`。光照组件也在此处进行了记录。虽然资源并非真正的组件，但《参考手册》中有一个名为“资源组件”的部分，列出了各种资源类别。在本章中，`Flare`、`Material`、`Mesh`和`Texture2D`被整合到了场景中（记住，天空盒实际上是一种`Material`）。\n\
  \n最有趣的阅读内容在“内置着色器指南”部分，该部分详细（并附有图片）描述了所有内置着色器，范围从简单快速到非常花哨。本章中的立方体最初使用默认的漫反射着色器，随后被替换为高级高光法线贴图着色器。正如本章所述，着色器实际上是一个程序，因此如果你找不到满足需求的内置着色器，可以遵循“着色器参考”部分中的示例和说明自行编写。\n\
