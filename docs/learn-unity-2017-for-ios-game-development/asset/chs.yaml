  在应用信息页面继续操作后，iTunes Connect 会要求你指定应用的价格以及希望在 App Store 上架的时间（图 11-14）。\n\n![A310332_2_En_11_Fig14_HTML.jpg](img/A310332_2_En_11_Fig14_HTML.jpg)\n\
