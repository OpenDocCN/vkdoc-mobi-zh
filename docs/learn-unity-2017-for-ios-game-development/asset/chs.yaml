  也提供了一个功能完备的调试器，并且经过定制可以与 Unity 协同工作。


  如果你在 Unity 编辑器中编辑脚本时 MonoDevelop 没有自动打开，你可以通过 MonoDevelop 的“文件”菜单打开它，或者双击访达中的解决方案文件（即图
  4-15 中高亮显示的文件）。


