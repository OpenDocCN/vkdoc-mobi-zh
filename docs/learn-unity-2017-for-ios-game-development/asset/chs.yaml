  ## 理解脚本


  既然 `FuguRotate` 脚本能执行某些操作了，我们不妨来理解一下具体在做什么。`Start` 和 `Update` 都调用了 `Debug.Log` 函数，用于在控制台视图中打印消息。`Log`
  是 `Debug` 类中定义的一个**静态函数**，这意味着你可以通过在函数名前指定类名来调用它，而无需指定对象（在类中定义的函数也称为方法）。


  **注意**：静态函数和变量也称为类函数和类变量，因为它们与类本身关联，而非类的实例。


  变量 `gameObject` 引用了该组件（脚本）所挂载的 `GameObject`（在本例中为立方体），而每个 `GameObject` 也有一个 `name`
  变量，用于引用该 `GameObject` 的名称（本例中为 Cube）。`+` 运算符可用于连接两个字符串（它的作用可不只是加法），因此 `Start` 函数会打印
  “Start called on GameObject”，后跟该 `GameObject` 的名称。


  类似地，`Update` 函数调用 `Debug.Log`，将 “Update called at time” 与静态变量 `Time.time` 的值拼接起来，该变量存放了游戏开始以来经过的时间（以秒为单位）。`Time.time`
  的类型是 `float`（浮点数，可以表示非整数值），但 `+` 运算符会在拼接之前将数字转换为字符串。


  ## 阅读脚本参考文档


  除了自动补全功能外，MonoDevelop 的另一个便捷特性是能够显示任何 Unity 类、函数或变量的脚本参考文档。在脚本中点击 `Debug.Log` 调用开头的
  `Debug`，然后按下 Command+’ 键，浏览器窗口就会显示 `Debug` 类的脚本参考文档。点击 `Log` 则会显示 `Debug.Log` 函数的特定文档。


  **提示**：每次遇到不熟悉的 Unity 类、函数或变量时，你应该做的第一件事就是阅读其脚本参考文档。


  图 4-9 展示了 Unity 帮助菜单。


  ![A310332_2_En_4_Fig9_HTML.jpg](img/A310332_2_En_4_Fig9_HTML.jpg)


  图 4-9. 从帮助菜单调出脚本参考文档


  脚本参考文档包含所有 Unity 类及其函数和变量的说明。我发现，在脚本参考文档中查找任意 Unity 类、函数或变量的最快方法是在搜索框中输入其名称。MonoDevelop
  的搜索功能使你可以搜索需要帮助的函数（图 4-10）。


  ![A310332_2_En_4_Fig10_HTML.jpg](img/A310332_2_En_4_Fig10_HTML.jpg)


  图 4-10. 脚本参考文档


  然而，点击左侧的 Classes 可以查看类列表（图 4-11）。有些类（如 `Debug` 和 `Time`）是**静态类**，这意味着它们只包含静态函数和变量（所有
  Unity 函数都位于类中），并且没有必要对它们进行子类化。


  ![A310332_2_En_4_Fig11_HTML.jpg](img/A310332_2_En_4_Fig11_HTML.jpg)


  图 4-11. 类列表


  然而，大多数类充当对象的类型。场景中的立方体是 `GameObject` 类的一个实例。而 `GameObject` 是 `Object` 的一个**子类**，这意味着它继承了
  `Object` 所有已记录的变量和函数。从概念上讲，用面向对象的术语来说，立方体是一个 `GameObject`，因此也是一个 `Object`。这与 `GameObject`
  和组件之间的关系形成对比。立方体是一个 `GameObject`，并具有一个 `MeshFilter`（该组件又包含一个 `Mesh`）。


  包括灯光和摄像机在内的许多组件都是 `Behaviour` 的子类，`Behaviour` 是一种可以启用或禁用的组件（检查器视图中的复选框即可证明这一点）。不过也有一些组件并非如此，比如
  `Transform`，它是组件的直接子类（中间无其他类），并且不能被禁用（检查器视图中没有复选框）。


  每个脚本实际上都是 `MonoBehaviour` 的一个子类，而 `MonoBehaviour` 是 `Behaviour` 的子类（因此你可以启用和禁用脚本）。因此，`FuguRotate`
  脚本定义了一个名为 `FuguRotate` 的 `MonoBehaviour` 子类。在 JavaScript 中，这个类声明是隐式的，尽管你也可以显式声明，如清单
  4-3 所示。


  ```

  #pragma strict

  class FuguRotate extends MonoBehaviour {

  function Start () {

  var object:GameObject = null;

  Debug.Log("Start called on GameObject "+object.name);

  }

  function Update () {

  Debug.Log("Update called at time "+Time.time);

  }

  }

  ```


  清单 4-3. 显式类声明版本的 `FuguRotate.js`


  ## 运行脚本


  正规编程类似于你在学校学到的科学方法。你应该对事物如何运作有一个总体理论，假设你的代码应该做什么，然后进行实验来验证该假设。换句话说，是时候运行你的代码，看看它是否如预期那样工作了。当你点击
  Play 时，由 `Debug.Log` 输出的消息将显示在控制台视图中（图 4-12）。


  ![A310332_2_En_4_Fig12_HTML.jpg](img/A310332_2_En_4_Fig12_HTML.jpg)


  图 4-12. 追踪 Start 和 Update 回调


  如果代码的行为不符合预期，那么是时候修正你对其运作方式的理论了。这可能只是小小的安慰，但调试代码本身就是一种学习体验！


  ## 调试脚本


  当然，你的代码在输入后不可能是完美的。相反，通常需要多次迭代调试。错误基本上有两种类型：编译错误（甚至在你尝试运行游戏之前就出现）和运行时错误（在游戏运行期间发生）。


  ### 编译错误


  每次保存脚本时，它都会被自动编译（从源代码转换为实际运行的代码格式）。脚本中阻止成功编译的错误会以红色显示在 Unity 编辑器底部和检查器视图中。


  双击编辑器底部的错误消息，将在控制台视图中显示相应的消息；双击控制台视图中的消息，会打开脚本编辑器，光标定位在出错的代码行。即使没有这种便利，错误消息也会列出出错代码的文件名和行号，以便你手动查找。


  例如，如果你在 `Update` 函数中将 `Time.time` 误输入为 `Time.tim`，那么一旦你尝试保存脚本，就会出现错误消息（图 4-13）。方便的是，Unity
  通常能很好地建议你可能想要输入的内容（尽管计算机通常不擅长“按我的意思做，而不是按我说的做”）。


  ![A310332_2_En_4_Fig13_HTML.jpg](img/A310332_2_En_4_Fig13_HTML.jpg)


  图 4-13. 脚本编译错误


  ### 运行时错误


  与编译错误类似，运行时错误也会显示在控制台视图中。为了演示，请将 `Start` 函数中对 `gameObject` 的引用替换为对本地变量 `object`
  的引用。本地变量在函数声明内部声明，因此只能在该函数范围内访问。在本例中，`object` 被初始化为 `null`，这意味着它没有引用任何实际的 `GameObject`，并且从未被赋予任何
  `GameObject`。当你点击 Play 时，脚本尝试引用该 `GameObject` 的名称会导致错误（图 4-14）。


  ![A310332_2_En_4_Fig14_HTML.jpg](img/A310332_2_En_4_Fig14_HTML.jpg)


  图 4-14. 脚本运行时错误




