- "# 13. 处理设备输入\n\n虽然你的保龄球游戏已在 iOS 上运行起来，但由于没有任何可用的玩家控制，它尚未达到可玩状态。这就引出了输入处理的问题，这也许是桌面游戏与移动游戏之间最明显的区别。\n\
  \niOS 游戏无法读取鼠标或键盘，必须使用其设备传感器之一，通常是触摸屏（点击和滑动）或加速度计（摇晃和倾斜）。在本章中，你将选择触摸屏输入来控制保龄球，但也会使用加速度计进行一些摇晃检测，并稍微操作一下设备摄像头。\n\
  \n本章项目文件位于[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)，其中包含了本章引入的脚本更改，未添加其他资源。本书剩余部分也是如此。从今以后都是脚本部分！\n\
  \n## 触摸屏\n\n当你为 iOS 构建时，Unity 会与 iOS 的触摸屏协同工作，因此如果你现在在设备上构建并运行保龄球游戏，或者在编辑器中使用 Unity\
  \ Remote 进行测试，你可以通过点击按钮来操作初始菜单。当你点击暂停菜单上的“开始”按钮时，保龄球会落下。到目前为止，一切顺利。\n\n但是保龄球的控制呢？`Input.GetAxis`在屏幕上滑动时确实会返回值，但结果很可能并非你想要的（在旧版本的\
  \ Unity iOS 中，`Input.GetAxis`完全不起作用）。无论如何，你需要首先定义在 iOS 版本的保龄球游戏中控制将如何工作。\n\n\n\n\
  ### 滑动球\n\n在 Fugu Bowl 中，你将采用我为 HyperBowl 设计的触摸屏控制方式。玩家通过沿屏幕向特定方向滑动，将球推向该方向。向上滑动屏幕会将球向前推，向下滑动则将球向后推，向左滑动会使球向左滚动，向右滑动则使其向右滚动。\n\
  \n滑动控制方案与鼠标控制非常相似，因此你可以直接在现有的 `FuguForce` 脚本框架内进行修改。打开该脚本，并添加一些新的公共变量 `swipepowerx`\
  \ 和 `swipepowery`，以便像调整鼠标控制那样调整滑动力度（代码清单 13-1）。\n\n```\nvar swipepowerx:float =\
  \ 0.1;\nvar swipepowery:float = 0.1;\n代码清单 13-1.\nFuguForce.js 中滑动控制的调整变量\n```\n\
  \n你添加了新变量，而非重复使用 `mousepowerx` 和 `mousepowery`，这样可以在独立版本和 iOS 构建目标之间切换，而不会干扰各自平台的力度调整值。这两个属性都会显示在\
  \ Inspector 视图中（图 13-1）。\n\n![A310332_2_En_13_Fig1_HTML.jpg](img/A310332_2_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1. `FuguForce.js` 中针对桌面端和 iOS 的控制调整\n\n主要的改动在于 `CalcForce` 函数，该函数每帧会被 Update\
  \ 回调调用一次。在 iOS 上，`CalcForce` 不会调用静态函数 `Input.GetAxis` 来检测鼠标移动，而是调用静态函数 `Input.GetTouch`\
  \ 来检测滑动。`UNITY_IPHONE` 预处理指令确保新代码仅存在于 iOS 平台，而旧代码则应用于其他所有平台（代码清单 13-2）。\n\n```\n\
  function CalcForce() {\nvar deltatime:float = Time.deltaTime;\n#if UNITY_IPHONE\n\
  if (Input.touchCount > 0) {\n// 获取自上一帧以来手指的移动\nvar touch:Touch = Input.GetTouch(0);\n\
  if (touch.phase == TouchPhase.Moved) {\nvar touchPositionDelta:Vector2 = touch.deltaPosition;\n\
  forcey = swipepowery*touchPositionDelta.y/deltatime;\nforcex = swipepowerx*touchPositionDelta.x/deltatime;\n\
  }\n}\n#else\nforcey = mousepowery*Input.GetAxis(\"Mouse Y\")/deltatime;\nforcex\
  \ = mousepowerx*Input.GetAxis(\"Mouse X\")/deltatime;\n#endif\n}\n代码清单 13-2.\n在\
  \ FuguForce.js 中检测滑动\n```\n\n与 `Input.GetAxis` 类似，`Input.GetTouch` 返回的是自上一帧以来注册的信息，因此你可以在\
  \ `CalcForce` 中调用它。该函数又从 `Update` 中调用，从而保证每帧调用一次。\n\n`Input.GetTouch` 返回一个类型为 `Touch`\
  \ 的结构体，该结构体描述了触摸事件：手指是按下、抬起还是移动，如果移动，则移动了多少像素。\n\n由于现在处理的是多点触摸屏，`Input.GetTouch`\
  \ 有一个整数参数，用于指定应返回最新的哪个 `Input.Touch` 事件。触摸事件的数量可通过静态变量 `Input.touchCount` 获取，因此你可以通过如下循环来处理所有触摸事件：\n\
  \n```\nfor (var i:int=0; i < Input.touchCount; ++i) {\nvar touch:Touch = Input.GetTouch(i);\n\
