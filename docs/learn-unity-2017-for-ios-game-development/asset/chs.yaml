  \n**图 13-3.** 演示 `OnMouseDown` 回调的调试信息\n\nUnity iOS 会响应触摸事件来调用 `OnMouse` 回调，但某些情况除外，因为不存在明显的映射关系。例如，当鼠标悬停在\
  \ `GameObject` 上时调用的 `OnMouseOver`，其对应的触摸操作是什么？但当一个 `GameObject` 被轻触时调用 `OnMouseDown`（手指离开屏幕时调用\
  \ `OnMouseUp`）是合情合理的。实际情况也确实如此，你可以通过 Unity Remote 在编辑器中再次运行游戏，或者在设备上执行构建并运行操作来验证。无论哪种方式，轻触球体都会产生与点击它时相同的调试信息。\n\
  \n尽管 `OnMouse` 回调能处理触摸操作很方便（至少在一定程度上是这样），但了解如何实现你自己的对象轻触检测也很有用。这只需将检测轻触和从屏幕位置沿相机方向向\
  \ 3D 世界发射射线（raycast）这两步简单结合起来。Raycasting 是指找到射线与第一个相交物体的过程（你可能还记得高中数学知识，射线有一个起始位置和一个方向，就像一支箭）。\n\
  \n为了进行演示，让我们创建一个名为 `FuguTap` 的新 JavaScript 脚本，将其挂载到主相机上（图 13-4），并将列表 13-4 的内容添加到脚本中。\n\
  \n![A310332_2_En_13_Fig4_HTML.jpg](img/A310332_2_En_13_Fig4_HTML.jpg)\n\n**图 13-4.**\
  \ 挂载了 `FuguOnTap` 脚本的主相机\n\n```\n#pragma strict\n#if UNITY_IPHONE\nfunction Update\
  \ () {\nfor (var i = 0; i < Input.touchCount; ++i) {\nif (Input.GetTouch(i).phase\
  \ == TouchPhase.Began) {\nvar ray:Ray = camera.ScreenPointToRay (Input.GetTouch(i).position);\n\
  var hit:RaycastHit;\nif (Physics.Raycast (ray,hit,camera.farClipPlane,camera.cullingMask))\
  \ {\nhit.collider.SendMessage(\"OnTap\",SendMessageOptions.DontRequireReceiver);\n\
  }\n}\n}\n}\n#endif\n```\n\n**列表 13-4.** 模拟 `OnMouseDown` 事件的脚本\n\n整个脚本包含一个 `Update`\
  \ 回调，它遍历上一帧中注册的所有触摸事件。但此例中，我们只关心轻触的开始，因此只考虑处于 `TouchPhase.Began` 阶段的触摸。提取每个此类触摸的屏幕坐标，并将其传递给相机函数\
  \ `ScreenPointToRay`，以形成一条起始于屏幕位置并沿着相机方向射入 3D 世界的射线。\n\n该射线作为第一个参数传递给静态函数 `Physics.Raycast`，用于检测射线是否与任何\
  \ `GameObject` 的 `Collider` 组件相交。关于第一个相交点的信息（如果有的话）通过作为第二个参数传入的 `RayCastHit` 结构体返回。第三个参数是射线投射的距离，第四个参数是用于检测相交的图层集合。通过将相机的远平面距离作为射线投射距离，并将相机的剔除遮罩（可见图层集合）作为相交检测的图层集合，你可以限制可能的射线投射结果。\n\
  \n如果对 `Physics.Raycast` 的调用返回 `true`，表示发生了相交，那么你就获取相交的 `Collider` 组件，并在其上调用 `SendMessage`\
  \ 来触发挂载脚本中的 `OnTap` 回调（在组件上调用 `SendMessage` 等同于在该组件的 `GameObject` 上调用 `SendMessage`）。\n\
  \n请注意，对 `SendMessage` 的调用包含一个可选的第二个参数 `SendMessageOptions.DontRequireReceiver`。如果没有这个参数，当消息被发送到一个没有匹配函数的\
  \ `GameObject` 时，或者在此例中，没有任何 `OnTap` 函数时，Unity 会报告错误。\n\n整个 `Update` 回调被包裹在 `UNITY_IPHONE`\
  \ ifdef 中，因为它仅用于 iOS 触摸屏输入。同样地，你现在可以使用 `UNITY_IPHONE` 将 `OnMouseDown` 回调重命名为 `OnTap`，以便它能够被\
  \ `FuguOnTap` 脚本调用（列表 13-5）。\n\n```\n#pragma strict\nif !UNITY_IPHONE\nfunction\
  \ OnMouseDown () {\n#else\nfunction OnTap () {\n#endif\nDebug.Log(\"GameObject \"\
  + gameObject.name + \" was touched\");\n}\n```\n\n**列表 13-5.** 为 iOS 使用替代回调名称的 `FuguDebugOnMouse`\
  \ 脚本\n\n现在，如果你再次运行游戏并轻触球体，你仍然会看到调试信息，但这是由 `FuguOnTap` 发送的 `OnTap` 消息产生的。\n\n## 加速度计\n\
  \n每个 iOS 设备都配有一个加速度计，用于测量三个不同方向的加速度。这三个值可以通过静态变量 `Input.accelerometer` 来查看，它是一个\
  \ `Vector3`。\n\n`x` 值对应于沿着设备屏幕从左到右的加速度。`y` 值表示沿着设备屏幕从上到下的加速度，而 `z` 值则是从设备正面到背面的加速度。从\
  \ Unity 4 开始，加速度计的值会根据设备方向进行调整，因此如果你手持设备处于横屏模式，加速度计的 `x` 值仍然是从左到右的。\n```\n\n\n###\
  \ 调试加速度计\n\n探究代码工作原理的经典方法就是打印输出。让我们创建一个名为 `FuguDebugAccel` 的新 JavaScript 脚本，并将其挂载到保龄球场景中名为\
  \ `DebugAccel` 的新 `GameObject` 上。将清单 13-6 中所示的 `Update` 函数添加到该脚本中。\n\n```\nfunction\
  \ Update () {\nDebug.Log(\"accel x: \"+Input.acceleration.x+\" y: \"+Input.acceleration.y+\"\
  \ z: \"+Input.acceleration.z);\n}\n清单 13-6.\n用于打印输出加速度计值的代码\n```\n\n`Update` 函数接收加速度计的\
  \ `x`、`y` 和 `z` 值，并将它们拼接成一个可读的 `字符串`。如果你在 Unity 编辑器（配合 Unity Remote）中进行测试，`Debug.Log`\
  \ 会将该 `字符串` 发送到控制台视图；如果你在 iOS 模拟器或设备上运行，则会发送到 Xcode 调试区域。\n\n尝试倾斜设备，观察这些值如何变化。例如，图\
  \ 13-5 中显示的 `Debug.Log` 输出结果，是将设备平放在桌面上得到的。`x` 和 `y` 的值接近 0，而 `z` 的值接近 -1。如果设备上下翻转，`z`\
  \ 值则会接近 1。\n\n![A310332_2_En_13_Fig5_HTML.jpg](img/A310332_2_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5.  \n加速度计值的 `Debug.Log` 输出结果\n\n加速度值的单位是重力加速度。在静止状态下，每个加速度计值的范围是 -1 到 1，其中\
  \ 1 代表完整的地球重力加速度（9.8 米/秒²）。现在尝试摇晃设备。你应该会看到数值上下剧烈跳动。\n\n### 检测摇晃\n\niOS 上暂停菜单的一个问题是，你无法通过\
  \ `Esc` 键暂停，因为设备上没有 `Esc` 键（不过 Android 设备通常有一个类似 `Esc` 键的返回按钮）。\n\n在 `FuguPause`\
  \ 脚本中，通过在 `OnGUI` 函数内添加一个 `GUI.Button` 调用来向屏幕添加暂停按钮很简单。\n\n```\nif (GUI.Button(Rect(0,0,100,50),\
  \ \"Pause\") { PauseGame(); }\n```\n\n但是，我不喜欢在游戏过程中屏幕上出现按钮，尤其是在 iPhone 这种小屏幕设备上。因此，我们不妨利用\
  \ iOS 设备提供的替代输入方式，通过摇晃设备来暂停游戏。\n\n从之前打印加速度计值的练习中，你已经看到摇晃设备会导致 `Input.acceleration`\
  \ 的 `x`、`y` 或 `z` 值至少有一个会向上或向下剧烈跳动。因此，你可以通过检查这些值是否有任何一个远大于 1 或远小于 -1 来判断是否发生了摇晃。不过你无需精确计算，只需获取向量模长的平方即可。\n\
  \n```\nif (Input.acceleration.sqrMagnitude>shakeThreshold)\n```\n\n获取 `Vector3`\
  \ 的 `sqrMagnitude`（模长平方）比获取模长更快，因为向量的模长是 x² + y² + z² 的平方根，而这种方法避免了相对昂贵的平方根运算（还记得高中时手动计算平方根吗？）。\n\
  \n那么，我们首先在 `FuguPause` 脚本中添加一个用于摇晃阈值的公共变量。\n\n```\nvar shakeThreshold:float = 5;\n\
  ```\n\n现在你可以在检视面板（图 13-6）中调整该属性，使其对摇晃的敏感度更高或更低。\n\n![A310332_2_En_13_Fig6_HTML.jpg](img/A310332_2_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6.  \n在检视面板中调整摇晃暂停的阈值\n\n接下来，添加对 `Input.acceleration` 的检查，作为 `UNITY_IPHONE`\
  \ 平台下对 `Esc` 键检查的替代方案（清单 13-7）。\n\n```\nvar shakeThreshold:float = 5;\nfunction\
  \ Update() {\n#if UNITY_IPHONE\nif (Input.acceleration.sqrMagnitude>shakeThreshold)\n\
  #else\nif (Input.GetKeyDown(KeyCode.escape))\n#endif\n{\nswitch (currentPage) {\n\
  case Page.None: PauseGame(); break; // 如果未显示暂停菜单，则暂停游戏\ncase Page.Main: UnPauseGame();\
  \ break; // 如果显示主暂停菜单，则取消暂停\ndefault: currentPage = Page.Main; // 任何子页面返回主页面\n}\n\
  }\n}\n清单 13-7.\n在 FuguPause.js 中添加摇晃暂停功能\n```\n\n大功告成。现在，当你使用 Unity Remote 或在设备上测试时，摇晃设备就能暂停游戏！增强后的\
  \ `FuguPause` 脚本（仅增加了两行新代码！）包含在本章的工程项目中，可访问 [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)\
  \ 获取。\n\n### 摄像机\n\nUnity 5.x 为 iOS 摄像机提供了内置支持。Unity 还提供了跨平台支持，可以将网络摄像头视频读取到纹理中。\n\
  \n### 读取网络摄像头\n\nUnity 有一种特殊的纹理（类似于 `Texture2D`，是 `Texture` 的子类），称为 `WebCamTexture`，它可以显示来自连接的硬件摄像头的视频。它适用于包括\
  \ iOS 在内的多个平台。让我们来尝试一下。创建一个名为 `FuguWebCam` 的 JavaScript 脚本，并添加清单 13-8 中给出的 `Start`\
  \ 函数。`Start` 函数创建一个 `WebCamTexture`，将该纹理分配给挂载了该脚本的 `GameObject` 的材质，然后调用 `Play`\
  \ 开始从摄像头视频更新纹理。\n\n```\n#pragma strict\nfunction Start () {\nvar webcamTexture:WebCamTexture\
  \ = WebCamTexture();\nGetComponent.().material.mainTexture = webcamTexture;\nwebcamTexture.Play();\n\
  }\n清单 13-8.\n在 FuguWebCam.js 中播放 WebCamTexture\n```\n\n现在将该脚本挂载到 `Ball` `GameObject`\
  \ 上。如果你在编辑器中点击“播放”，你会看到来自 Mac 摄像头的视频显示在球上。如果你在设备上执行“生成并运行”操作，你会看到同样的效果，只是使用了设备摄像头。\n\
  \n## 进一步探索\n\n总而言之，为保龄球游戏实现触摸屏输入并没有花费太多功夫（与上一章的打包装配工作相比），尽管在实践中，你需要花费大量时间来测试和调整游戏的操控，才能使其恰到好处。无论如何，借助摇晃暂停功能，保龄球游戏的功能移植已经完成。换句话说，iOS\
  \ 版本的游戏现在已经可以玩了！\n\n而且，尽管设备摄像头在这个游戏中没有实际用途，但你确实使用了 Unity 的 `WebCamTexture` 类来激活它，从而在保龄球上渲染视频纹理。虽然有点花哨，但游戏开发很大程度上就是学习！尤其是在\
  \ iOS 上，有很多机会尝试各种不同的控制方案和输入传感器。\n\n\n\n### 脚本参考\n\n本章介绍的所有 Unity 功能几乎都是 `Input`\
  \ 类的成员。事实上，关于 `Input` 的脚本参考文档包含了对 iOS 输入功能的概述。\n\n阅读完 `Input` 类的概述后，你应该阅读本章中使用的每个函数的页面，特别是\
  \ `Input.GetTouch`（以及相关的 `Touch` 结构体），其中包含的代码示例展示了如何遍历每一帧中的所有 `Touch` 事件；以及 `Input.acceleration`，其中包含的代码示例展示了如何检查每一帧的加速度值。\n\
  \n需要记住的一点是，加速度计每帧可能会生成多个值。大多数情况下，每帧仅采样一次 `Input.accelerometer` 就足够了，但如果需要更精细的采样，你可以访问\
  \ `Input.accelerationEventCount` 和 `Input.accelerationEvents` 变量来获取所有加速度事件。\n\n\
  `Input` 类提供了访问其他 iOS 传感器的途径。静态变量 `Input.gyro`、`Input.compass` 和 `Input.location`\
  \ 分别返回来自陀螺仪、指南针和定位服务的数据。除了记录这些变量的页面外，你还应查看这些变量所属类别的页面：`Gyroscope`、`Compass` 和 `LocationServices`\
  \ 类。文档内容不多，但你可以在各个类的函数中找到代码示例。静态变量 `Input.compensateSensors` 控制是否根据屏幕方向调整加速度计、陀螺仪和指南针的数据。\n\
  \n除了测试对象选择，射线投射在游戏和图形中也被大量使用，因此你应该熟悉有关 `Physics.Raycast` 的页面，该页面提供了几个代码示例。例如，在 HyperBowl\
  \ 中，我使用射线投射来防止主摄像机掉到地面以下，并将 `GameObjects` 的初始位置正好设置在地面上。在这两种情况下，我都会从 `GameObject`\
  \ 的位置向地面下方发射射线，并检查得到的距离。最后，我介绍了 `WebCamTexture` 类的使用。`WebCamTexture` 的页面内容很多，但请点击其\
  \ `Play`、`Stop` 和 `Pause` 函数的链接，在这些页面中找到代码示例。另外，请查看 `WebCamTexture` 构造函数的链接。该页面列举了各种构造函数，允许你为不同的分辨率自定义纹理大小。\n\
  \n### iOS 开发者库\n\n建议你在阅读甚至是在阅读 Unity 脚本参考之前，先阅读 iOS 参考库，这样你就能了解哪些 iOS 功能可以通过 Unity\
  \ 暴露出来，以及 Unity 的类和函数如何映射到对应的 iOS 组件。\n\n你可以通过 [`http://developer.apple.com/library`](http://developer.apple.com/library)（无需登录）或在\
  \ Xcode Organizer 中查看 iOS 参考库；从那里选择“Guides”标签并浏览指南，特别是以下内容：\n\n- “Event Handling\
  \ Guide”指南概述了触摸事件（与 Unity 的 `Input.GetTouch` 和 `Touch` 类相关）和运动事件（与 `Input.acceleration`\
  \ 及其他 `Input` 加速度计变量相关）。\n- “Camera Programming Topics for iOS”指南描述了 Prime31 Etcetera\
  \ 插件所使用的 `UIImagePickerController` 类。\n- “AV Foundation Programming Guide”指南描述了\
  \ Unity 中 `WebCamTexture` 类最可能使用的视频捕捉功能。\n\n### 资源商店\n\nUnity 的 `Input` 类使你能够访问基本的触摸信息，但它不提供对\
  \ iOS 手势识别器的访问，后者用于检测更高级别的“手势”，例如滑动和捏合。这时资源商店再次挺身而出，提供能够进行高级手势检测的第三方包。我使用的是 FingerGestures\
  \ 包，它有一个很好的回调系统，用于检测和处理各种手势。\n\n例如，在 HyperBowl 中，我希望当玩家捏合屏幕（两个手指在屏幕上合拢）时弹出暂停菜单。使用\
  \ Finger Gestures 包，只需在暂停菜单脚本中添加一个手势回调即可，如下所示：\n\n```\nfunction OnGesturePinchEnd(pos1:Vector2,pos2:Vector2)\
  \ {\nPauseGame();\n}\n```\n\n还需要在 `Start` 或 `Awake` 函数中添加一行代码，将该回调添加到 `FingerGestures`\
  \ 的相应手势回调列表中，如下所示：\n\n```\nFingerGestures.OnPinchEnd += OnGesturePinchEnd;\n```\n\
  \nUnity 并未为 iOS 中的所有可用功能提供脚本访问权限，这就是插件的用武之地。Unity 插件系统允许你添加新的脚本函数来访问“原生”代码。一般来说，如果你能用\
  \ C、C++ 或 Objective-C 编写代码，就可以为其制作一个 Unity 插件。例如，在 Unity 资源商店中，你会发现有基于移动广告 SDK 构建的插件，以及用于访问\
  \ iOS 功能的插件。\n\n插件安装在 `Assets/Plugins` 文件夹中，正如我之前提到的，这是一个存放需要在任何其他脚本之前加载的脚本的好地方。它们通常还需要在\
  \ Xcode 中手动集成步骤，例如向 `Info.plist` 文件添加条目或安装额外的代码库（这会阻止从 Unity 直接进行“构建并运行”——你必须先选择“构建”，修改\
  \ Xcode 项目，然后从 Xcode 选择“运行”）。并且，多个插件安装在同一 Unity 项目中总是存在冲突的风险。\n\n这就是为什么我喜欢使用 Prime31\
  \ Studios 在 [`http://prime31.com/unity`](http://prime31.com/unity) 提供的插件。它们提供了大量可以共存于同一\
  \ Unity 项目中的插件，并且所有 Xcode 修改都由 Unity 后处理脚本执行，因此从 Unity 进行的“构建并运行”操作仍然有效，无需在 Xcode\
  \ 中手动操作。\n\n例如，资源商店上提供的 Prime31 Etcetera 插件包含许多杂项功能，包括通过一次函数调用访问 iOS 照片库和设备相机，如下所示：\n\
  \n```\nEtceteraBinding.promptForPhoto(1.0);\n```\n\n图 13-7 显示了在我的 Fugu Maze 应用中出现的提示（我使用照片选择器允许玩家自定义迷宫墙壁纹理）。如果你想尝试一下，请从\
  \ App Store 下载 Fugu Maze Free 或一个免费的 HyperBowl 球道（我使用照片选择器来自定义保龄球纹理）。\n\n![A310332_2_En_13_Fig7_HTML.jpg](img/A310332_2_En_13_Fig7_HTML.jpg)\n\
  \n图 13-7.\n\niPad 上的 Prime31 Etcetera 插件照片选择器\n\n另一个提供额外设备输入的 Prime31 插件是 iCade\
  \ 插件（仅在 Prime31 网站上提供）。iCade 是一种复古风格的街机机箱，通过蓝牙连接为 iOS 设备提供摇杆输入。iCade 本质上模拟了一个蓝牙键盘，因此任何使用\
  \ iCade 插件的代码都与键盘控制的代码类似。如果你为保龄球代码的 `CalcForce` 函数添加了 iCade 控制代码，那么它看起来会像代码清单 13-9\
  \ 中的片段（此示例实际上取自 HyperBowl）。\n\n```\nvar yinput:float = 0;\nif (iCadeBinding.state.JoystickUp)\
  \ yinput = 1;\nif (iCadeBinding.state.JoystickDown) yinput = -1;\nvar xinput:float\
  \ = 0;\nif (iCadeBinding.state.JoystickLeft) xinput = 1;\nif (iCadeBinding.state.JoystickRight)\
  \ xinput = -1;\nvar deltatime:float = Time.deltaTime;\nforcey += iCadePowery*yinput/deltatime;\n\
  forcex += iCadePowerx*xinput/deltatime;\n```\n\n清单 13-9. 使用 Prime31 iCade 插件对 `CalcForce`\
  \ 的 iCade 补充\n\n就像检查四个不同按键是否被按下一样，你只是在检查摇杆是否向四个方向中的任何一个移动。摇杆的灵敏度并不比按键更高。\n\n\n\n"
- "# 14. 优化\n\n正如唐纳德·克努斯那句广为流传的名言——“过早优化是万恶之源”——所言，我将优化这一主题留到了本书将近结尾处。在本章中，你将优化保龄球应用，并回顾该过程的先决条件：设定目标性能并测量当前性能。本章项目文件位于[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)，其中包含经优化的脚本以及本章开发的优化辅助脚本。\n\
  \n## 选择目标\n\n有句老话说：“速度快、质量好、成本低，三者只能选其二。”优化通常也是如此。在质量、空间和速度三者之间，你往往最多只能兼顾其中两点，而牺牲第三点。\n\
  \n### 帧率\n\n在开始优化之前，你应该先设定好目标帧率。iOS 设备每秒刷新屏幕 60 次，但默认情况下，Unity iOS 构建版本会尝试达到每秒 30\
  \ 帧（fps）。将目标帧率设为设备刷新率的一半，对设备电池的消耗更小，而且实现 30 fps 远比 60 fps 容易。你的保龄球游戏很简单，所以只要愿意做出一些妥协，应该能够达到\
  \ 60 fps。\n\n将目标始终设为最高帧率似乎理所当然，但若游戏频繁在 30 fps 和 60 fps 之间切换，这种不连贯性可能比稳定运行在 30 fps\
  \ 更容易分散玩家注意力。\n\n尽管如此，在性能剖析之前，以 60 fps 为目标开始工作是有意义的，这样你可以看到峰值性能，之后再根据需要降低目标。\n\n\
  #### 创建脚本\n\n在 Unity 编辑器中无法直接设置目标帧率，但幸运的是，你可以在脚本中通过设置静态变量 `Application.targetFrameRate`\
  \ 来调整目标帧率。因此，让我们创建一个新的 JavaScript 脚本，将其放入 `Scripts` 文件夹，并命名为 `FuguFrameRate`（图 14-1）。\n\
  \n![A310332_2_En_14_Fig1_HTML.jpg](img/A310332_2_En_14_Fig1_HTML.jpg)\n\n图 14-1.\
  \ 在 Scripts 文件夹中添加脚本\n\n这将是一个非常简短的脚本，包含一个公共变量和一个只有一行代码的 `Start` 回调（列表 14-1）。\n\n\
  ```\n#pragma strict\npublic var frameRate:int = 60;\nfunction Start() {\nApplication.targetFrameRate\
  \ = frameRate;\n}\n列表 14-1. FuguFrameRate.js 的完整脚本\n\n该脚本通过将静态变量 `Application.targetFrameRate`\
  \ 的值修改为 `frameRate` 的值来设定目标帧率，`frameRate` 是一个公共变量，因此可以在 Inspector 视图中调整。由于 iOS 设备的屏幕刷新率均为\
  \ 60 fps，这是你能达到的最佳帧率，因此也是 `frameRate` 的一个合理默认值。\n\n#### 挂载脚本\n\n要使用 `FuguFrameRate`\
  \ 脚本，必须将其添加到场景中，以便游戏启动时执行其 `Start` 回调。因此，让我们在保龄球场景中创建一个空的 `GameObject`，将其命名为 `FrameRate`，然后将\
  \ `FuguFrameRate` 脚本拖拽到该对象上（图 14-2）。\n\n![A310332_2_En_14_Fig2_HTML.jpg](img/A310332_2_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2. 保龄球场景中包含的帧率脚本\n\n这个脚本已被添加到你的保龄球场景中，但你也完全可以将其添加到启动场景中，因为 `Application.targetFrameRate`\
  \ 只需设置一次，即使加载新场景，该值也会保持不变。你当前的启动场景并没有实际功能，因此以 Unity 默认的 30 fps 运行即可。\n\n然而，如果启动场景要显示一个酷炫的动画，你可能希望将其设置为\
  \ 60 fps，在这种情况下，你也需要将帧率脚本添加到该场景。事实上，如果启动场景在 60 fps 下效果最佳，而保龄球场景在 30 fps 下运行更流畅（而不是在\
  \ 30 fps 和 60 fps 之间抖动），那么你应该将帧率脚本添加到两个场景中，并将启动场景的目标帧率设为 60 fps，保龄球场景的目标帧率设为 30\
  \ fps。\n\n### 空间目标\n\n除了帧率之外，你还应为应用体积设定一个目标。你必须与用户安装的歌曲、照片、视频以及所有其他应用争夺 iOS 设备上的存储空间。更小的体积能让用户更容易决定保留你的应用。\n\
  \n体积更小的应用下载耗时更短，加载速度也更快（无论是应用加载还是关卡加载）。尤其重要的是，App Store 限制通过蜂窝网络下载的应用大小不得超过 50MB。你肯定不希望错过用户的冲动购买，因此\
  \ 50MB 是一个很好的应用体积目标。这个限制比 App Store 最初 20MB 的限制要容易达到得多，但任何包含大量内容的应用仍然很容易超出这个体积（拥有六条球道的\
  \ HyperBowl 约为 40MB）。\n\n## 剖析游戏\n\n在开始优化之前，你需要知道优化什么。这就用到了性能剖析（Profiling），即获取游戏的性能信息。你有多种选择，包括在编辑器中查看显示的状态信息、剖析应用本身，甚至编写一些自己的性能测量代码。\n\
  \n### 游戏视图状态\n\n在编辑器中，你可以使用 Game 视图中的 Stats 覆盖层即时获取场景的性能相关信息（图 14-3）。\n\n![A310332_2_En_14_Fig3_HTML.jpg](img/A310332_2_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3. 游戏视图状态信息覆盖层\n\n当你点击 Play 按钮后，在游戏运行过程中你会看到这些统计信息实时更新。这些信息很方便，但无法替代对实际应用的性能剖析。\n\
  \n\n\n### 构建日志\n\n缩小应用体积的重要性已不如从前，因为当时超过 20MB 就意味着一款应用只能通过 Wi-Fi 而非 3G 无线网络下载到设备上。现在这个限制放宽到了\
  \ 50MB，但如果你有一款大型游戏，仍然很容易达到这个上限。体积更小意味着下载速度更快，并且能让更多用户在存储空间有限的设备上安装你的应用（我的 iPad 总是很快就塞满了）。\n\
  \n你可以在构建后查看`Editor`日志，了解应用所包含资源的详细信息，如代码清单 14-2 所示。\n\n```\nTextures      5.2 mb\
  \         16.9%\nMeshes        17.4 kb         0.1%\nAnimations    0.0 kb      \
  \    0.0%\nSounds        21.2 mb        69.1%\nShaders       0.0 kb          0.0%\n\
  Other Assets  19.1 kb         0.1%\nLevels        10.7 kb         0.0%\nScripts\
  \       175.2 kb        0.6%\nIncluded DLLs 4.1 mb         13.3%\nFile headers \
  \ 16.6 kb         0.1%\nComplete size 30.6 mb       100.0%\nUsed Assets, sorted\
  \ by uncompressed size:\n21.1 mb         69.0% Assets/Assets/Free/Assets/Sci-Fi_Ambiences/Sci-fi_AmbienceLoop1.wav\n\
  4.0 mb          13.1% Assets/Textures/LearnUnityCover.jpg\n170.8 kb         0.5%\
  \ Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_up.tif\n170.8 kb      \
  \   0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_right.tif\n170.8\
  \ kb         0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_left.tif\n\
  170.8 kb         0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_front.tif\n\
  170.8 kb         0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_back.tif\n\
  170.8 kb         0.5% Assets/Standard Assets/Light Flares/Sources/Textures/50mmflare.psd\n\
  170.8 kb         0.5% Assets/Barrel/Barrel_D.tga\n31.2 kb          0.1% Assets/Assets/Free/Assets/8Bit/Coin_Pick_Up_03.wav\n\
  17.4 kb          0.1% Assets/Barrel/Barrel.fbx\n17.3 kb          0.1% Assets/Substances_Free/Wood_Planks_01.sbsar\n\
  10.8 kb          0.0% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_down.tif\n\
  1.0 kb          0.0% Assets/Prefabs/BarrelPin.prefab\n0.6 kb          0.0% Assets/Standard\
  \ Assets/Light Flares/50mm Zoom.flare\n0.3 kb          0.0% Assets/Standard Assets/Skyboxes/Sunny3\
  \ Skybox.mat\n代码清单 14-2.\n构建日志\n```\n\n该日志按资源类型（纹理、音频、网格、脚本）列出了应用体积的分解情况，并包含了构成应用的所有独立资源列表。遗憾的是，体积贡献是基于未压缩的大小，而非最终的压缩后资源大小，但它仍能让你了解哪些资源占用了最多空间。\n\
  \n你还可以通过`Console`应用中便捷的搜索字段，利用日志找出项目中哪些资源被使用了，哪些没有被使用。例如，你在`Textures`文件夹中存放了`FuguBowl`的所有纹理，那么如果你想检查哪些纹理被使用了、哪些可以从项目中移除，可以在`Console`视图菜单中选择`Editor\
  \ Log`，这会打开`Console`应用并选中`Editor`日志（图 14-4）。\n\n![A310332_2_En_14_Fig4_HTML.jpg](img/A310332_2_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4.\n\n使用 Console 应用搜索字段筛选构建日志\n\n在搜索框中输入`Textures`即可过滤显示内容。然后，你可以将结果列表与`Project`视图中的`Textures`文件夹进行对比，看看`Project`视图中是否有未出现在构建中的资源。\n\
  \n### 运行内置分析器\n\nUnity iOS 构建生成 Xcode 项目后，你可以选择激活内置分析器，它会报告与`Game`视图中`Stats`覆盖层类似的信息。要激活内置分析器（Unity\
  \ 文档中也称为内部分析器），请在 Xcode 项目中找到`Classes`文件夹下的头文件`iPhone_Profiler.h`，并将`ENABLE_INTERNAL_PROFILER`的值从`0`改为`1`（图\
  \ 14-5）。\n\n![A310332_2_En_14_Fig5_HTML.jpg](img/A310332_2_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5.\n\nUnity Xcode 项目中的内置分析器开关\n\n现在，当你点击`Play`时，应用将重新编译并启用内置分析器。在游戏运行时，Xcode\
  \ 的调试区域每 30 帧会显示一次统计信息，如代码清单 14-3 所示。\n\n```\niPhone Unity internal profiler stats:\n\
  cpu-player>    min: 39.8   max: 63.2   avg: 58.0\ncpu-ogles-drv> min:  2.1   max:\
  \  3.7   avg:  2.4\ncpu-present>   min:  0.7   max:  6.6   avg:  1.8\nframetime>\
  \     min: 47.7   max: 72.2   avg: 64.5\ndraw-call #>   min:  40    max:  40   \
  \ avg:  40     | batched:     0\ntris #>        min:  5544  max:  5544  avg:  5544\
  \   | batched:     0\nverts #>       min:  4358  max:  4358  avg:  4358   | batched:\
  \     0\nplayer-detail> physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0\
  \ batching:  0.0 render: 58.0 fixed-update-count: 0 .. 0\nmono-scripts>  update:\
  \  0.2   fixedUpdate:  0.0 coroutines:  0.1\nmono-memory>   used heap: 405504 allocated\
  \ heap: 524288  max number of collections: 0 collection total duration:  0.0\n代码清单\
  \ 14-3.\n第四代 iPod Touch 上的内置分析器输出\n```\n\n分析结果中首先要关注的是`frametime`，即一帧所花费的总时间，单位为毫秒。如果你以\
  \ 60 fps 运行，那么`frametime`的平均值应该在 16.7 毫秒左右。如果`frametime`超过 34，那么你甚至达不到 30 fps。`frametime`之后的`draw-call\
  \ #`行也非常重要，因为它对`frametime`的影响很大。`Draw calls`（绘制调用）是独立的绘制操作。通常每个渲染的网格会产生一次绘制调用，在此基础上添加的光照和阴影还会增加更多的绘制调用。\n\
  \n`player-detail`行对顶部`cpu-player`行所列的时间进行了细分。`player-detail`的时间分配包括`physx`（物理）、`animation`（动画）、`culling`（剔除不需要渲染的对象）、`skinning`（更新动画角色的蒙皮位置）、`batching`（合并具有相同材质的网格以便通过一次绘制调用进行渲染）、`rendering`（渲染）以及`fixed\
  \ update count`（固定更新次数）。\n\n代码清单 14-3 中的分析结果来自第四代 iPod Touch，显示`frametime`甚至远远达不到\
  \ 30 fps，更不用说 16 fps 了，并且`player-detail`中`render`（渲染）时间占据了主导地位。已知对性能影响较大的一个因素就是动态阴影，因此让我们在`Light`（光照）组件中禁用阴影（图\
  \ 14-6）。\n\n![A310332_2_En_14_Fig6_HTML.jpg](img/A310332_2_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6.\n\n从保龄球场景光照中禁用阴影\n\n然后再次执行`Build and Run`（构建并运行）操作，开始一次新的分析会话（代码清单 14-4）。\n\
  \n\n\n```\niPhone Unity 内部性能分析器统计：\ncpu-player>    min:  5.0   max:  7.6   avg:\
  \  5.7\ncpu-ogles-drv> min:  3.1   max:  7.0   avg:  3.7\ncpu-present>   min: 14.4\
  \   max: 42.9   avg: 28.1\ncpu-waits-gpu> min: 14.4   max: 42.9   avg: 28.1\nmsaa-resolve>\
  \ min:  0.0   max:  0.0   avg:  0.0\nframetime>     min: 28.5   max: 55.5   avg:\
  \ 39.5\ndraw-call #>   min:  29    max:  29    avg:  29     | batched:    10\ntris\
  \ #>        min:  4584  max:  4584  avg:  4584   | batched:  3420\nverts #>    \
  \   min:  3712  max:  3712  avg:  3712   | batched:  2750\nplayer-detail> physx:\
  \  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:  1.9 render:  3.1 fixed-update-count:\
  \ 0 .. 0\nmono-scripts>  update:  0.2   fixedUpdate:  0.0 coroutines:  0.1\nmono-memory>\
  \   used heap: 401408 allocated heap: 524288  max number of collections: 0 collection\
  \ total duration:  0.0\n列表 14-4.\n移除阴影后的内置性能分析器输出\n```\n\n如果你没有在使用 Unity iOS Pro\
  \ 或者你之前为了性能而关闭了阴影，那么你已经处于这个状态了。无论如何，效果是显著的。关闭阴影大大减少了绘制调用，并且帧时间和渲染时间都更低，尽管帧率仍然低于\
  \ 30 fps。\n\n### 运行编辑器性能分析器\n\n内置性能分析器能让你大致了解游戏性能的瓶颈所在——例如，是绘制调用、物理计算还是脚本执行。但要精确找出究竟是什么占用了帧时间，仍然有点像猜谜游戏。性能分析器可以记录在编辑器中运行游戏的性能，也可以远程分析，从测试设备捕获性能数据。要分析在测试设备上运行的保龄球游戏，你需要在构建设置中选择\
  \ **Development Build** 选项，这将启用 **Autoconnect Profiler** 选项（图 14-7）。\n\n![A310332_2_En_14_Fig7_HTML.jpg](img/A310332_2_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7.\n\n启用 Autoconnect Profiler 进行构建\n\n执行构建并运行操作，性能分析器窗口应自动出现，并对设备上运行的游戏运行分析会话（图\
  \ 14-8）。\n\n![A310332_2_En_14_Fig8_HTML.jpg](img/A310332_2_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8.\n\n性能分析器窗口\n\n最顶部的条形图显示的是 CPU 的使用情况。这个特定的分析数据表明你的帧率徘徊在 30 fps 左右。下方的区域显示了按函数调用细分的\
  \ CPU 使用情况（图 14-9）。\n\n![A310332_2_En_14_Fig9_HTML.jpg](img/A310332_2_En_14_Fig9_HTML.jpg)\n\
  \n图 14-9.\n\nCPU 使用情况的性能分析器细分\n\n你可以展开项目以查看嵌套的函数调用。图 14-9 表明你的 UnityGUI 函数（包括记分板和暂停菜单）占用了大量时间（这个分析是在暂停菜单打开时记录的）。\n\
  \n### 手动连接性能分析器\n\n如果由于某些原因性能分析器没有自动启动，你可以从 **Window** 菜单中打开它（图 14-10）。\n\n![A310332_2_En_14_Fig10_HTML.jpg](img/A310332_2_En_14_Fig10_HTML.jpg)\n\
  \n图 14-10.\n\n用于显示性能分析器的 Window 菜单项\n\n性能分析器实际上是一个视图，这就是为什么它被列在 Window 菜单的其他视图中的原因。但是，就像\
  \ Asset Store 一样，性能分析器占用了太多屏幕空间，最好让它单独存在于一个浮动窗口中。\n\n一旦性能分析器窗口打开，它会自动开始记录编辑器中的游戏（即使游戏实际上并未运行），因此请单击\
  \ **Record** 按钮停止它。然后在 **Active Profiler** 窗口中选择你的 iOS 测试设备（图 14-11），然后再次单击 **Record**\
  \ 按钮开始分析。\n\n![A310332_2_En_14_Fig11_HTML.jpg](img/A310332_2_En_14_Fig11_HTML.jpg)\n\
  \n图 14-11.\n\n选择 iOS 设备作为活动的性能分析器\n\n### 添加帧率显示\n\n仅仅为了查看帧率而启用内置性能分析器或通过网络连接到编辑器性能分析器并不方便。这时，屏幕上的帧率显示就派上用场了。这样，当你坐在沙发上看电视并测试自己的游戏时，只需切换打开即可（至少我是这么做的）。\n\
  \n对于屏幕上的帧率显示，你可以像之前制作保龄球记分板那样使用 Unity UI 的 Image 组件。但是，还有另一种在屏幕上显示 2D 文本的方法，那就是使用\
  \ UI Text 组件。你可以使用菜单栏上的 **GameObject** 菜单或 Hierarchy 视图中的 **Create** 菜单来创建一个已附加\
  \ UI Text 组件的 `GameObject`（图 14-12）。\n\n![A310332_2_En_14_Fig12_HTML.jpg](img/A310332_2_En_14_Fig12_HTML.jpg)\n\
  \n图 14-12.\n\n创建一个 UI Text `GameObject`\n\n让我们继续创建那个 UI Text `GameObject` 并将其命名为\
  \ FPS（图 14-13）。\n\n![A310332_2_En_14_Fig13_HTML.jpg](img/A310332_2_En_14_Fig13_HTML.jpg)\n\
  \n图 14-13.\n\n带有 UI Text 组件的 FPS `GameObject`\n\n就像你用于次要启动画面的 UI Texture 一样，UI Text\
  \ 在屏幕上使用归一化坐标定位，其中左下角是 (0,0)，右上角是 (1,1)，坐标在 `GameObject` 的 Transform 的 x 和 y 值中指定。将帧率显示对象的\
  \ x 和 y 位置都设置为 -0.1，使其靠近左下角，并将文本值更改为 FPS。\n\n不必费心自定义字体，因为帧率显示仅用于开发目的，你不会在发布的应用程序中激活它（尽管在\
  \ HyperBowl 中，用户可以激活帧率显示，以便他们报告性能问题）。默认大小值 0 表示将使用字体导入设置中指定的字体大小，但这相当小，所以让我们将其设置为一个合理的大尺寸，40。在这段时间里，`GUIText`\
  \ 在 Game 视图中是可见的，因此你可以看到尺寸变化的效果（图 14-14）。\n\n![A310332_2_En_14_Fig14_HTML.jpg](img/A310332_2_En_14_Fig14_HTML.jpg)\n\
  \n图 14-14.\n\n带有 UI Text `GameObject` 的 Game 视图\n\n正如 UI Image 比 Unity UI 更方便显示静态纹理，无需脚本编写一样，UI\
  \ Text 是一种比 Unity UI Image 更直接的显示静态文本的方式。但是对于你的帧率显示，你确实需要更改 UI Text 中的文本，你可以通过在脚本中设置\
  \ UI Text 实例的 `text` 变量来实现。现在让我们实现帧率显示脚本。创建一个新脚本，将其放置在 Scripts 文件夹中，并命名为 `FuguFPS`（图\
  \ 14-15）。\n\n![A310332_2_En_14_Fig15_HTML.jpg](img/A310332_2_En_14_Fig15_HTML.jpg)\n\
  \n图 14-15.\n\n创建一个新的 `FuguFPS.js` 脚本\n\n然后将列表 14-5 中的 `Update` 函数添加到脚本中。脚本的 `Update`\
  \ 回调将计算出的帧率赋值给 `guiText.text` 变量，即显示在屏幕上的文本。计算很简单，基于 `Time.deltaTime`，即最近的帧时间。通常，每秒帧数计算为\
  \ `1/Time.deltaTime`，但由于 `Time.deltaTime` 受 `Time.timeScale` 缩放，你可以通过使用 `Time.timeScale/Time.deltaTime`\
  \ 轻松地将其考虑进去。\n\n`GUIText` 中的 `text` 变量是一个 `String` 变量，因此你需要通过调用数字的 `ToString` 函数将帧率值转换为\
  \ `String`（每个内置类型都有一个 `ToString` 函数）。然后附加字符串 `\"FPS\"`，这样你就不会疑惑屏幕上那两个数字是什么了！\n\n\
  ```\n#pragma strict\nfunction Update()\n{\nif (Time.deltaTime>0) {\nvar fps:float\
  \ = Time.timeScale/Time.deltaTime;\nguiText.text  = fps.ToString(\"f0\")+\"FPS\"\
  ;\n}\n}\n```\n\n列表 14-5.\n\n完整的帧率显示脚本 `FuguFPS.js`\n\n\n\n现在将脚本附加到`FPS GameObject`上。当你在编辑器中点击播放时，应该会看到帧率显示在不同数字之间闪烁。当你对测试设备执行构建并运行操作时，应该会看到帧率显示与内置分析器中获得的数字一致（图\
  \ 14-16）。\n\n![A310332_2_En_14_Fig16_HTML.jpg](img/A310332_2_En_14_Fig16_HTML.jpg)\n\
  \n图 14-16. 在测试设备上运行的帧率显示\n\n请记住，在发布此应用之前，你应该停用`FPS GameObject`！\n\n## 优化设置\n\n正确的优化方法是，从最大的瓶颈开始，有条不紊地逐一排查，在每个阶段分析改进效果，直到达到目标。但为了在本章中介绍一系列优化步骤，我们将按顺序依次进行多项优化。\n\
  \n### 质量设置\n\n首先，调整与优化工作相关的全局设置。最可能影响性能的设置是质量设置，它控制游戏的视觉质量（图 14-17）。\n\n![A310332_2_En_14_Fig17_HTML.jpg](img/A310332_2_En_14_Fig17_HTML.jpg)\n\
  \n图 14-17. 优化质量设置\n\n目标是追求速度，因此将当前 iOS 质量设置为`Fastest`，然后在此基础上进行调整。零像素光源对于当前光照设置来说是可以接受的。如果你使用了聚光灯，那么缺少像素光源会很明显。\n\
  \n然而，你并不希望强制将所有纹理降为半分辨率。依靠纹理导入设置来逐案限制分辨率会带来更大的灵活性。因此，将纹理质量设置为`Full Res`。\n\n类似地，你还需要将各向异性纹理的设置从`none`改为`per-texture`。各向异性纹理用于补偿倾斜观看时的视觉效果，例如，适用于赛车游戏中道路纹理。与纹理分辨率一样，各向异性可以在其导入设置中针对单个纹理进行调整。\n\
  \n多重采样抗锯齿（全屏平滑）是一项开销较大的操作，正如你所预期的，这是全屏逐像素操作。\n\n本游戏中没有粒子系统，因此软粒子设置无关紧要，但它同样是一项像素密集型操作（这类功能通常被称为受限于填充率）。\n\
  \n阴影已被禁用，因此其下方的所有阴影参数都无关紧要。但如果启用了阴影，两个关键属性是阴影分辨率和阴影距离。这两个属性都会影响阴影的分辨率；提高阴影分辨率自然会使阴影轮廓更清晰，但代价是更大的阴影贴图会消耗更多内存。与缩短相机视锥体以提高深度缓冲区精度类似，更小的阴影距离值减少了对大型阴影贴图纹理的需求。降低阴影分辨率值可以节省空间，但会使阴影边缘更锯齿化；而减小阴影距离值可能会减少参与阴影计算的物体数量。\n\
  \n### 物理管理器\n\n刚体组件在静止时会进入休眠状态，以避免不必要的物理计算。“静止”意味着刚体的平移和旋转运动已停止。你可以在物理管理器（图 14-18）中指定休眠速度和休眠角速度的阈值。物理管理器位于编辑菜单的设置部分。\n\
  \n![A310332_2_En_14_Fig18_HTML.jpg](img/A310332_2_En_14_Fig18_HTML.jpg)\n\n图 14-18.\
  \ 优化物理管理器\n\n在物理管理器的底部，你还可以指定哪些游戏对象层可以相互碰撞。这对于你的保龄球游戏来说无关紧要，因为所有碰撞物体都位于默认层。但为了说明这一点，让我们修改碰撞表，只允许默认层中的游戏对象与默认层中的其他游戏对象发生碰撞。\n\
  \n### 时间管理器\n\n由于物理更新以固定间隔进行，你可以通过增加时间管理器中的固定时间步长来减少物理计算时间（图 14-19）。理想情况下，固定时间步长应尽可能设置得高，同时不影响物理模拟效果。现在，我们将固定时间步长从`0.02`增加到`0.03`。\n\
  \n![A310332_2_En_14_Fig19_HTML.jpg](img/A310332_2_En_14_Fig19_HTML.jpg)\n\n图 14-19.\
  \ 优化时间管理器\n\n紧邻固定时间步长下方的属性也与物理更新相关：最大允许时间步长。该值限制了每帧用于物理更新的最大时间量。这可以防止出现失控情况，即固定更新占用大量时间并增加帧时间，从而导致下一帧包含更多固定更新，以此类推。降低最大允许时间步长值可以最小化固定更新对帧时间的影响，但存在降低物理模拟质量的风险。\n\
  \n### 音频管理器\n\n音频播放方式也存在优化权衡。在音频管理器（图 14-20）中，你可以指定音频延迟，即播放声音前允许的延迟时间。\n\n![A310332_2_En_14_Fig20_HTML.jpg](img/A310332_2_En_14_Fig20_HTML.jpg)\n\
  \n图 14-20. 优化音频管理器\n\n对于响应式声音至关重要的游戏（例如保龄球游戏中的碰撞声音），选择“最佳延迟”（即最低延迟）是合适的。\n\n###\
  \ 其他设置\n\n其他设置部分包含大量优化选项；它们并不仅限于优化部分（图 14-21）。\n\n![A310332_2_En_14_Fig21_HTML.jpg](img/A310332_2_En_14_Fig21_HTML.jpg)\n\
  \n图 14-21. 优化播放器设置中的其他设置\n\n#### 静态批处理\n\n正如在首次分析环节中指出的，绘制调用通常对性能有较大影响。静态批处理通过在构建时合并网格来减少绘制调用，这些网格可以在同一个绘制调用中一起渲染。为了合并网格，它们的游戏对象必须在检查器视图中标记为静态，并且必须共享相同的材质或材质集合。\n\
  \n静态批处理是一个灵活的系统；它会记住每个游戏对象的独特标识，因此，具有静态批处理网格的游戏对象仍可以随时停用，并且仍然受剔除机制影响。\n\n你的保龄球游戏只有一个静态网格，即地面，因此启用静态批处理在此处不会有任何效果。通常，静态批处理能带来良好的性能提升，但代价是占用更多内存，因为它本质上会复制每个被批处理的网格。\n\
  \n#### 动态批处理\n\n下一个选项是动态批处理，它在运行时进行。与静态批处理一样，它要求网格在合并前共享材质，但动态批处理可以处理移动物体，因为它每帧都会检查是否需要重新批处理物体。例如，游戏中的保龄球瓶可以被批处理，因为它们显然都使用相同的材质，毕竟它们都是由同一个预制体实例化而来。然而，保龄球无法与任何球瓶或球道表面进行批处理。\n\
  \n批处理确实需要一些时间，因此它会出现在内置分析器中。但与静态批处理一样，它通常对性能有显著提升。\n\n#### 加速度计频率\n\n加速度计频率默认设置为每秒\
  \ 60 个样本。通过将该频率降低到`15`，可以节省一些处理时间，这对于你的摇动检测代码已经足够。如果在应用中完全不使用加速度计，请将其设置为`0`。\n\n\
  \n\n#### 剥离级别\n\n共有三个递进等级可供选择：字符串程序集、剥离字节码以及“使用微型 mscorlib”。我们选择最后一项，这是最具侵略性的优化方案，同时包含了前两个等级。微型\
  \ mscorlib 是核心 Mono 库的一个自定义精简版本，它可能与您导入的其他 .NET 库不兼容，但对于这个游戏来说不成问题。\n\n#### 脚本调用优化\n\
  \n脚本调用优化级别决定了调用原生代码的方式。默认设置“慢速且安全”会产生额外开销，因此我们将其设置为“快速且无异常”。如标签所示，此设置速度更快，但如果原生代码抛出异常（本质上，是一种预期由调用代码处理的错误），则会失败。\n\
  \n#### 优化网格数据\n\n“优化网格数据”选项会在构建时移除所有不必要的逐顶点网格信息。如果网格未使用凹凸贴图着色器，则可以移除切线；如果网格使用的是无光照着色器，则可以移除法线。这样可以节省空间并有助于合批，因为合批会复制所有网格数据。当然，如果您打算在运行时通过脚本将网格的着色器更改为需要比原始着色器更多逐顶点信息的着色器，则不应使用此选项。\n\
  \n## 优化游戏对象\n\n调整质量设置、物理管理器和时间管理器后，您就可以开始微调单个游戏对象了。\n\n### 摄像机\n\n摄像机是优化的焦点（无意双关），因为它决定了渲染什么以及如何渲染。摄像机视锥体自动提供了一种优化途径。完全位于视锥体外的任何游戏对象都对摄像机不可见，因此不会尝试渲染该游戏对象。这种优化称为视锥体剔除，也有益于动画和粒子系统。当没有人能看到动画或粒子时，系统无需播放动画或模拟粒子。\n\
  \n**提示**\n\n渲染游戏对象最快的方法就是根本不渲染它。\n\n因此，调整摄像机的视锥体以包含场景中更少的对象是一种优化途径。您可以通过降低视野来缩小视锥体，也可以通过减小远距离值来缩短视锥体，将近裁剪面移近摄像机（图\
  \ 14-22）。\n\n![A310332_2_En_14_Fig22_HTML.jpg](img/A310332_2_En_14_Fig22_HTML.jpg)\n\
  \n图 14-22. 优化主摄像机\n\n例如，考虑到保龄球场地要小得多，主摄像机中远裁剪面的默认值 1000 就有些过头了。将远距离值设置为 100，所有物体仍然可见（Unity\
  \ 天空盒很方便地独立于视锥体显示）。\n\n最小化远裁剪面值还有一个额外的好处，即在渲染时深度缓冲区中存储的值范围更小。这避免了深度冲突的问题，即由于深度缓冲区数值精度有限，一个几乎与另一物体重叠的物体看起来像是从前面物体中穿透出来。\n\
  \n通过摄像机剔除游戏对象的另一种方法是，指定它只渲染其剔除掩码中列出的特定层级集合中的游戏对象。这实际上是一个正确性的问题——您需要确保摄像机只渲染它应该渲染的内容，而不是由单独的\
  \ HUD 摄像机渲染的 HUD 元素之类的东西。但它确实会影响性能。我曾经遇到过一个错误，主摄像机无意中渲染了 GUI 元素，但由于距离足够远，我没有注意到。\n\
  \n每个摄像机还有一个 `eventMask` 变量，类似于它的剔除掩码（或者等效地，它的 `cullingMask` 变量），但 `eventMask` 变量不是指定摄像机渲染哪些层级，而是确定哪些层级接收来自摄像机的\
  \ `onMouse` 事件。最小化 `eventMask` 中存在的层级可以减少 `onMouse` 处理的开销，但由于它在检视面板中不可见，该变量必须通过脚本设置。\n\
  \n最后一项摄像机优化是指定渲染路径。iOS 上有两种可用的渲染路径：顶点光照和正向渲染（延迟渲染不适用于移动平台）。正向渲染比顶点光照更灵活、更强大。例如，顶点光照路径不会显示凹凸贴图。但本章节中，我们极力追求高帧率，因此我们将渲染路径设置为顶点光照。\n\
  \n### 光源\n\n您已经禁用了光源的阴影，这大大提高了性能，因为它减少了绘制调用。并且光照已经受到质量设置的影响，这些设置指定了无像素光照并禁用了阴影（图\
  \ 14-23）。\n\n![A310332_2_En_14_Fig23_HTML.jpg](img/A310332_2_En_14_Fig23_HTML.jpg)\n\
  \n图 14-23. 优化光源\n\n但您可以对光源进行一些额外的调整，类似于对摄像机的微调。与摄像机一样，光源有一个指定的范围，您可以最小化它以减少被照亮的游戏对象数量。光源也有一个剔除掩码，与主摄像机的情况一样，可以将其设置为默认层级，但通过明智地分配层级，可以减少不必要被照亮的游戏对象。\n\
  \n### 球瓶\n\n为了追求速度，您选择了最简单的光照和最简单的渲染路径。您还可以简化每个网格使用的着色器。保龄球瓶构成了场景中的大部分物体，因此我们首先修改\
  \ BarrelPin 预制件（图 14-24）。\n\n![A310332_2_En_14_Fig24_HTML.jpg](img/A310332_2_En_14_Fig24_HTML.jpg)\n\
  \n图 14-24. 优化 BarrelPin 预制件\n\n在项目视图中，选择预制件中的 `Barrel` 游戏对象，并在检视面板中单击着色器选择器。有许多比凹凸点光源更简单的着色器；任何材质数量少于两个的着色器都可能更快，而顶点光照将比任何像素着色器更高效。甚至还有一组专为移动设备实现的着色器，包括\
  \ `Mobile/Vertex Lit`。但有一种着色器更适合您的情况，即专门实现为仅用于方向光的 `Mobile/Vertex Lit` 着色器。因此，我们选择那个，`Mobile/Vertex\
  \ Lit (Only Directional Light)`。\n\n\n\n#### 地面\n\n`Floor`（地面）`GameObject` 具有一些可通过调整以进行优化的组件属性（图\
  \ 14-25）。从 `MeshRenderer` 组件开始，`Cast Shadows`（投射阴影）和 `Receive Shadows`（接收阴影）选项均处于启用状态。尽管你已在灯*光和质量设置中禁用了阴影，但仍应留意每个对象的设置，以防将来启用阴影。如果启用了阴影，你会希望阴影投射到地面上，因此应启用\
  \ `Receive Shadows`。但由于你并不期望地面投射阴影（至少不会投射到你能看到的任何物体上），让我们禁用 `Cast Shadows` 选项。就性能而言，阴影投射器越少越好。\n\
  \n![A310332_2_En_14_Fig25_HTML.jpg](img/A310332_2_En_14_Fig25_HTML.jpg)\n\n**图 14-25.\
  \ 优化地面**\n\n转向物理方面，还有另一个优化机会。尽管保龄球瓶和保龄球使用的是基本碰撞体，但你的地面带有 `MeshCollider`（网格碰撞体）组件。由于地面是平整的方形表面，你可以改用\
  \ `BoxCollider`（盒体碰撞体）。替换过程很简单：当你向地面添加 `BoxCollider` 组件时，无论是通过 `Inspector`（检视面板）视图中的\
  \ `Add Component`（添加组件）按钮，还是通过菜单栏上的 `Component`（组件）菜单，Unity 都会询问你是否要替换现有的 `MeshCollider`（选择“是”），新的\
  \ `BoxCollider` 组件将自动调整大小以适配地面网格。\n\n与保龄球瓶类似，你也可以将着色器从相当复杂的 `Bumped Specular`（凹凸高光）着色器更改为\
  \ `Mobile/VertexLit (Only Directional Lights)`（移动设备/顶点光照（仅方向光）），正如你对保龄球瓶预制体所做的那样。但地面是一个特例，因为它是平坦的。其表面上的光照是均匀的。因此，你可以使用\
  \ `Unlit Texture`（无光照纹理）着色器，完全避免任何光照计算。\n\n#### 球\n\n你将要优化的最后一个 `GameObject` 是球。它已经在使用\
  \ `SphereCollider`（球体碰撞体）组件，因此你唯一要更改的是着色器。与保龄球瓶一样，球也会移动，所以让我们使用一个带光照的着色器，具体来说，与为保龄球瓶选择的\
  \ `Mobile/VertexLit (Only Directional Light)`（移动设备/顶点光照（仅方向光））着色器相同。然而，球当前使用的是创建时自动分配的默认漫反射材质，你无法更改该材质上的着色器。因此，你需要为球分配一个不同的材质。\n\
  \n你可以用创建其他类型资源相同的方式创建一个新材质。在 `Project`（项目）视图中，调出 `Create`（创建）菜单并选择 `Material`（材质）（图\
  \ 14-26）。\n\n![A310332_2_En_14_Fig26_HTML.jpg](img/A310332_2_En_14_Fig26_HTML.jpg)\n\
  \n**图 14-26. 创建新材质**\n\n将新材质放入 `Materials`（材质）文件夹并将其命名为 `Ball`。选中它（图 14-27），在 `Inspector`（检视面板）视图中你可以调整其着色器，选择\
  \ `Mobile/VertexLit (Directional Light)`（移动设备/顶点光照（方向光））。\n\n![A310332_2_En_14_Fig27_HTML.jpg](img/A310332_2_En_14_Fig27_HTML.jpg)\n\
  \n**图 14-27. 为新材质设置着色器**\n\n然后将 `Ball`（球）材质拖放到 `Ball` `GameObject` 上，设置就完成了（图 14-28）。\n\
  \n![A310332_2_En_14_Fig28_HTML.jpg](img/A310332_2_En_14_Fig28_HTML.jpg)\n\n**图 14-28.\
  \ 优化球**\n\n如果未提供纹理，上述两种 `Mobile/VertexLit`（移动设备/顶点光照）着色器都会显示白色。如果你希望球具有白色以外的颜色，则应使用标准的\
  \ `Vertex Lit`（顶点光照）着色器，它允许你指定 `Main Color`（主颜色）和 `Specular (shininess) Color`（高光（光泽）颜色）。\n\
  \n## 优化资源\n\n人们很容易忽略一个事实，即在导入资源时可以进行大量优化，而你可以通过每个资源的导入设置来控制这一点。\n\n### 纹理\n\n你的纹理已经以合理的默认设置导入，但让我们查看几个纹理，以便你理解这些设置。在\
  \ `Project`（项目）视图中，让我们查看 `Textures`（纹理）文件夹，并比较你在第 3 章的示例场景中使用的猫纹理（图 14-29）和你在第 12\
  \ 章中用于次启动画面的纹理（图 14-31）。猫纹理使用了对应 `Texture`（纹理）预设的导入设置，而启动画面纹理使用了 `GUI`（图形用户界面）预设的导入设置。在这两种情况下，从预设切换到\
  \ `Advanced`（高级）都会显示该预设的具体设置。\n\n![A310332_2_En_14_Fig29_HTML.jpg](img/A310332_2_En_14_Fig29_HTML.jpg)\n\
  \n**图 14-29. 纹理的导入设置**\n\n滤镜类型决定了如何为渲染目的计算纹理中的像素（或纹素）。`Bilinear`（双线性）过滤会对最近较小 mipmap\
  \ 级别的周围纹素进行平均，而 `trilinear`（三线性）过滤则结合了最近较大 mipmap 级别和最近较小 mipmap 级别的双线性过滤结果。`Point`（点）采样是最简单、最快的滤镜，而\
  \ `trilinear`（三线性）过滤代价最高。`Bilinear`（双线性）过滤是折中方案，也是合理的默认选择。\n\nMipmapping（多级渐远纹理）通常是合适的，尽管会占用更多内存。除了改善纹理显示，mipmapping\
  \ 还允许图形处理器处理更小版本的纹理，这可以提升性能。对于菜单中使用的纹理，你通常只会在一种尺寸下查看它，并且理想情况下是纹理的原始尺寸，因此 mipmapping\
  \ 并非必要。这对于启动画面来说确实如此，尤其是当它甚至未被加载到场景中时。\n\n**提示**：对于细节清晰的纹理（例如用作路标的纹理），最好使用 `point`（点）采样，甚至完全禁用\
  \ mipmapping，以避免纹理模糊。\n\n各向异性（方向相关）过滤级别补偿了纹理相对于摄像机倾斜的情况，例如赛车游戏中的路面。在这些情况下，在两个方向上均匀过滤纹理可能看起来不对。对于场景中的常规纹理，应根据具体情况选择各向异性级别。对于\
  \ UI 纹理（从摄像机正面观察），则不需要各向异性过滤。\n\n通常，纹理在导入时会考虑伽马空间（屏幕的非线性色彩空间）。一般来说，这对于 UI 纹理并非必要，因此在这些情况下，会选中\
  \ `bypass sRGB`（绕过 sRGB）选项。如果效果不太对劲，可以尝试两种选项。\n\n对于 mipmapping，纹理需要是正方形，并且尺寸是二的幂（POT），因为\
  \ mipmap 是按尺寸逐次减半生成的。例如，一个 256 × 256 的纹理将会有 128 × 128、64 × 64 等 mipmap 级别。即使是非 mipmap\
  \ 纹理，POT 尺寸也有好处，因为图形硬件最终使用的是这种尺寸。大多数为游戏设计的纹理都是 POT 尺寸，但如果不是，纹理的导入设置可以自动将纹理调整为最接近的\
  \ POT 尺寸。对于 GUI 纹理，你通常不希望这样。你的启动画面的 `POT` 缩放设置为 `None`（无），生成的预览会显示其原始尺寸和 NPOT（非二的幂）。如果你尝试将其作为场景中的常规纹理使用，Unity\
  \ 会在 `Console`（控制台）视图中发出警告，提示你以非 GUI 方式使用了 NPOT 纹理，并会导致性能开销。\n\n\n\n纹理的最大尺寸（`Max\
  \ Size`）和压缩级别（`Compression Level`）列在预置设置中，并且独立于预置进行指定。对于常规纹理，默认的最大尺寸值`1024`是合理的（所有设备支持的最大值是`2048\
  \ × 2048`），但应根据具体情况选择。例如，如果一个大的纹理只有一种颜色，你完全可以将其设为`2 × 2`的纹理。如果一个纹理仅用于屏幕上较小或较远的网格，那么也没有理由将其设为大的纹理。对于闪屏（`splash\
  \ screen`），你可以将`Max Size`设为`2048`，以免纹理被缩放得比`iPad Retina`屏幕还小。\n\n> **提示**  \n> 将最大缩放比例设为允许的最大值，并将压缩级别设为`TrueColor`，你可以在导入设置的预览区域中看到纹理的原始格式。\n\
  \n对于常规纹理，默认的压缩级别`4-bit PVRTC`（Power VR 纹理压缩）是合理的。细节较少的纹理可以使用更激进的`2-bit PVRTC`。与`mipmapping`一样，纹理压缩减少了纹理映射占用的内存，图形处理器对`PVRTC`的支持提供了额外的性能优势。同样与`mipmapping`类似，特别精细的纹理可能会因压缩而过度降质，此时保持纹理为未压缩的`16-bit`或未压缩的`TrueColor`（`24-bit`）可能更好。对于`GUI`纹理，你可能不想压缩纹理（出于这个原因），或者在播放器设置中指定的闪屏纹理的情况下，应保持其原生格式不变。\n\
  \n### 音频\n\n你已在音频管理器（`Audio Manager`）中调整了`DSP Buffer Size`值，以获得更灵敏的碰撞音效，这以一定的处理开销换取了更低的延迟。与纹理类似，你也可以调整`AudioClip`的导入设置。类比于纹理的两大类用途（3D\
  \ 和 GUI），声音也有 2D 和 3D 之分：3D 声音与`GameObject`相关联，或者至少与 3D 世界中的某个位置相关；而 2D 声音用于环境音或音乐（例如你在第\
  \ 5 章的舞蹈场景中添加的歌曲）。\n\n让我们比较一下你的几个保龄球音效：球瓶碰撞音效（图 14-30）和球滚动音效（图 14-31）。这两种音效都源自世界中的某个位置，甚至会相对于主摄像机（`Main\
  \ Camera`）移动（更准确地说，是相对于附加到主摄像机上的`AudioListener`组件移动）。因此，在它们的导入设置中都被标记为 3D 声音。3D\
  \ 声音应为单声道（`mono`），而非立体声。幸运的是，这两个音效的原始音频文件都是单声道的，所以你无需选择“`Force to mono`”。\n\n![A310332_2_En_14_Fig31_HTML.jpg](img/A310332_2_En_14_Fig31_HTML.jpg)\n\
  \n图 14-31. 优化球滚动音效的导入设置\n\n![A310332_2_En_14_Fig30_HTML.jpg](img/A310332_2_En_14_Fig30_HTML.jpg)\n\
  \n图 14-30. 优化球瓶碰撞音效的导入设置\n\n碰撞音效文件相当小，因此我们保持其未压缩状态，以避免解压缩音效带来的处理开销，并最大化播放质量。滚动音效文件较大，因此我们将其压缩并在内存中保持压缩状态。由于这是唯一压缩的音效，并且`iOS`有硬件支持同时解码一个压缩音效，因此你不会产生任何软件解码开销。但是，如果场景中同时播放环境音或音乐，那么这些文件很可能大得多，你反而会希望对它们进行压缩。\n\
  \n> **提示**  \n> 导入未压缩的音效，以便灵活决定在编辑器中压缩哪些音效。除非你找到的压缩工具能提供比 Unity 压缩更好的质量，否则没有必要导入已压缩的音频。\n\
  \n选择压缩后，无间隙循环（`gapless looping`）选项变为可用。这会强制压缩过程处理音频剪辑的结尾，使其能够无缝循环，这正是你需要的，因为你要循环播放这个音效。\n\
  \n对于压缩音频，除了“`Uncompress on load`”和“`Compressed in memory`”之外，还有一个加载选项：“`Stream from\
  \ disc`”。从磁盘流式传输会有一些额外的开销，但对于连续播放多首歌曲的场景来说，这是一个很好的选择，因为将所有歌曲都保留在内存中是行不通的。\n\n###\
  \ 网格\n\n大多数影响优化的网格相关导入设置（图 14-32）主要影响内存使用。\n\n![A310332_2_En_14_Fig32_HTML.jpg](img/A310332_2_En_14_Fig32_HTML.jpg)\n\
  \n图 14-32. 优化网格的导入设置\n\n第一个是网格压缩（`Mesh Compression`），它通过降低数值精度（即用于表示顶点、法线、纹理坐标和切线的位数）来减少网格占用的空间和内存。这也会降低视觉质量，因此最好进行试验，找到不降低外观效果的最大压缩级别。可用的级别有低（`Low`）、中（`Medium`）、高（`High`）和无（`None`）。默认值为`None`。\n\
  \n在网格压缩下面列出的是读写启用（`Read/Write Enabled`）。默认情况下它是开启的，会创建一个可以修改的网格副本。但如果你没有任何读取或写入网格变量（如顶点和法线）的脚本（通常不需要），则可以保持此选项关闭。\n\
  \n优化网格（`Optimize Mesh`），不要与播放器设置中的网格优化（`Mesh Optimization`）选项混淆，它通过优化网格三角形列表的排列来提供一些性能改进。\n\
  \n如果你不打算使用网格碰撞器（`Mesh collider`），请关闭生成碰撞体（`Generate Colliders`）。事实上，作为一项规则，关闭此选项是个好主意，因为如果需要，你总可以手动添加网格碰撞器，但通常更倾向于添加一个或多个基本碰撞体。\n\
  \n如果你知道此网格的着色器不需要法线或切线，则可以分别将法线（`Normals`）和切线（`Tangents`）选项设置为`None`。但是，如果你在播放器设置（`Player\
  \ Settings`）中选择了网格优化（`Mesh Optimization`），未使用的顶点数据会在构建时被自动移除。\n\n## 优化脚本\n\n常见的代码优化技巧同样适用于\
  \ Unity 中的脚本编写。例如，你已经特别注意调用`Vector3`的`magnitudeSquared`函数而不是`magnitude`，以避免其内部的开平方根运算。但我将在以下章节中描述一些不太明显的方法，用于提高脚本性能或使用脚本来改善性能。\n\
  \n\n\n### 缓存 GetComponent\n\n通常来说，如果一个值会被多次计算，无论是数学表达式、函数调用的结果，还是访问可能内部执行了函数调用的实例变量或静态变量，将其赋给一个变量都是个好主意。\n\
  \n你在脚本中访问的组件快捷变量，例如 `transform`、`audio` 和 `rigidbody` 就是这种情况。每个变量都会触发一次 `GetComponent`\
  \ 调用，在所有附加到 `GameObject` 上的组件中搜索类型匹配的组件。\n\n因此，每当你在脚本中需要多次引用某个组件的快捷变量时——无论是在脚本中多次列出，还是在诸如\
  \ `Update` 这样的回调中反复引用（特别是当这个快捷变量在多次迭代的循环中被引用时），你都应该尽早将该组件赋给一个变量。清单 14-6 展示了如何将这个优化应用到你的\
  \ `FuguReset` 脚本中。\n\n```\n#pragma strict\nprivate var startPos:Vector3;\nprivate\
  \ var startRot:Vector3;\n// 为了性能\nprivate var trans:Transform = null;\nprivate var\
  \ body:Rigidbody = null;\nfunction Awake() {\n// 缓存 Transform 引用\ntrans = transform;\n\
  body = rigidbody;\n// 保存此 GameObject 的初始位置和旋转\nstartPos = trans.localPosition;\n\
  startRot = trans.localEulerAngles;\n}\nfunction ResetPosition() {\n// 恢复到初始位置\n\
  trans.localPosition = startPos;\ntrans.localEulerAngles = startRot;\n// 确保停止所有物理运动\n\
  if (body != null) {\nbody.velocity = Vector3.zero;\nbody.angularVelocity = Vector3.zero;\n\
  }\n}\n清单 14-6.\n优化后的 FuguReset.js 脚本\n```\n\n`FuguReset.js` 的原始版本引用了两个组件快捷变量：`transform`\
  \ 和 `rigidbody`。因此，你添加了两个名为 `trans` 和 `body` 的私有变量来引用这些组件，并在 `Awake` 回调中初始化 `trans`\
  \ 和 `body`。\n\n这种清理优化将适用于你的许多脚本，因为你们经常引用 `transform`、`rigidbody` 和 `audio`。我不会列出所有修订后的代码，但更新后的脚本可以在本章的项目文件中找到，网址是\
  \ [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)。\n\n###\
  \ UnityGUI\n\n详细的性能分析结果表明，UnityGUI 在你的帧时间中占据了很大一部分。UnityGUI 变慢的一个原因是使用 `GUILayout`\
  \ 自动放置 GUI 元素带来的开销。你在记分板中没有使用 `GUILayout`，因此可以在 `FuguBowlScoreboard` 脚本中添加一个设置 `useGUILayout`\
  \ 为 `false` 的 `Awake` 回调（清单 14-7）。\n\n```\nfunction Awake() {\nuseGUILayout = false;\n\
  }\n清单 14-7.\n在 FuguBowlScoreboard.js 中将 useGUILayout 设置为 false\n```\n\n暂停菜单仍然使用\
  \ `GUILayout`，但因为该菜单只在游戏暂停时出现，不会影响游戏玩法，其性能问题并不那么重要。\n\n### 运行时静态合批\n\n动态合批可以组合那些在构建时因移动或是在游戏运行期间创建而无法进行静态合批的相似网格。但动态合批必须不断更新合批，这就是合批时间会列在性能分析结果中的原因。如果被合批的对象是一起移动的，或者虽然未移动但是在运行时实例化的，那么这种重复合批似乎是一种浪费。此外，由于合批需要占用内存，动态合批的数量有上限（Unity\
  \ 文档目前说是 30,000 个顶点，但这个数字可能会发生变化）。\n\n幸运的是，有一个名为 `StaticBatchingUtility` 的类，允许你通过调用\
  \ `Combine` 函数在运行时执行静态合批。清单 14-8 显示了一个非常简单的脚本，它只是在脚本的 `GameObject` 上调用 `StaticBatchingUtility.Combine`。\n\
  \n```\n#pragma strict\nfunction Start() {\nStaticBatchingUtility.Combine(gameObject);\n\
  }\n清单 14-8.\n用于静态合批对象层次结构的脚本\n```\n\n虽然简单，但这个脚本功能齐全。例如，在旋转立方体场景中，如果你将此脚本拖到带有两个子立方体的主旋转立方体上（并禁用子立方体的独立旋转脚本），那么当场景开始播放时，所有三个立方体将被静态合批在一起。被合批的\
  \ `GameObjects` 不必处于同一个层次结构中。`StaticBatchingUtility.Combine` 是一个重载函数，另一个版本接受两个参数：一个是要批处理的\
  \ `GameObjects` 数组，另一个是指定为父对象的 `GameObject`。\n\n### 共享材质\n\n要进行合批，无论是静态合批、动态合批，还是通过调用\
  \ `StaticBatchingUtility.Combine` 进行合批，要合批的网格都必须共享相同的材质或材质集合。但在动态合批中，需要特别小心，如果你修改材质，可能会破坏这种共享关系。\n\
  \n例如，清单 14-9 中的脚本通过不断改变材质的纹理偏移量来为其制作动画。这会产生滚动纹理的效果；在 HyperBowl 中，此脚本用于为滚动霓虹灯、天空中飘动的云彩以及流淌的水制作纹理动画。然而，当脚本通过调用其\
  \ `SetTextureOffset` 函数修改材质时，如果原始材质恰好是被共享的，则会创建一个新材质。\n\n```\n#pragma strict\nvar\
  \ speed:Vector2;\nvar materialIndex:int=0;\nprivate var offset:Vector2;\nprivate\
  \ var material:Material;\nfunction Start() {\noffset=new Vector2(0,0);\nmaterial\
  \ = renderer.materials[materialIndex];\n}\nfunction Update () {\nvar dtime:float\
  \ = Time.deltaTime;\noffset.x=(offset.x+speed.x*dtime)%1.0f;\noffset.y=(offset.y+speed.y*dtime)%1.0f;\n\
  material.SetTextureOffset(\"_MainTex\",offset);\n}\n清单 14-9.\n对材质的纹理坐标偏移进行动画处理的脚本\n\
  ```\n\n当然，这也很合理。如果你使用相同的材质创建了两个 `GameObjects`，并决定通过修改其中一个的材质来改变其外观，你通常不希望同时对另一个\
  \ `GameObject` 进行同样的更改。\n\n但是，如果你要对所有共享同一材质的 `GameObjects` 应用相同的动画，那么就没有理由停止共享该材质。因此，你可以修改脚本，转而访问\
  \ `MeshRenderer` 的 `sharedMaterials` 变量，而不是 `materials` 变量。访问 `sharedMaterials`（如果你假设\
  \ `GameObject` 上只有一个材质，则访问 `sharedMaterial`）意味着你确实想要更改共享材质，并避免创建新材质，从而保持合批资格。为了同时处理共享和非共享材质的情况，让我们添加一个公共变量，允许你指定动画是否会破坏材质共享，并使用该值来决定是修改\
  \ `renderer.materials` 还是 `renderer.sharedMaterials`（清单 14-10）。\n\n```\n#pragma\
  \ strict\nvar speed:Vector2;\nvar materialIndex:int=0;\nvar shared:boolean = true;\n\
  private var offset:Vector2;\nprivate var material:Material;\nfunction Start() {\n\
  offset=new Vector2(0,0);\nif (shared) {\nmaterial = renderer.sharedMaterials[materialIndex];\n\
  } else {\nmaterial = renderer.materials[materialIndex];\n}\n}\nfunction Update ()\
  \ {\nvar dtime:float = Time.deltaTime;\noffset.x=(offset.x+speed.x*dtime)%1.0f;\n\
  offset.y=(offset.y+speed.y*dtime)%1.0f;\nmaterial.SetTextureOffset(\"_MainTex\"\
  ,offset);\n}\n清单 14-10.\n带有共享材质选项的纹理动画脚本\n```\n\n在使用此脚本对共享材质进行动画处理时，还有一个额外（尽管不那么重要）的优化。让每个使用相同材质的\
  \ `GameObject` 都运行相同的纹理动画脚本是冗余的；只需一个脚本实例就足以驱动所有对象的动画。\n\n\n\n### 最小化垃圾回收\n\n垃圾回收会在游戏中引入明显的卡顿。最小化这些卡顿最有效的方法就是尽量减少垃圾回收的必要性，而这可以通过减少最终被回收器回收的对象数量来实现。其中一种技术是将对象保留在对象池中以便重用，而不是让它们被垃圾回收。你也可以通过调用\
  \ `System.GC.Collect` 来显式触发回收器。例如，你可以在保龄球游戏控制器的 `Awake` 回调中添加该调用，以确保在游戏开始前进行一次垃圾回收，这将立即清理上一场景中残留的所有未使用对象（清单\
  \ 14-11）。\n\n```\nfunction Awake() {\nplayer = new FuguBowlPlayer();\nCreatePins();\n\
  System.GC.Collect();\n}\n```\n\n## 离线优化\n\n到目前为止，你所做的所有更改都是可以立即通过测试运行和分析来观察效果的快速优化。Unity\
  \ 还集成了一些可以大幅提升性能的商业场景预处理工具：Beast 和 Umbra。这些工具不会在本章中使用，因为它们的设置和运行相当耗时，而且坦白地说，它们对你这简单的场景作用不大。但我将在下面的章节中简要介绍它们。\n\
  \n### Beast\n\n在不造成严重性能损失的情况下添加高质量实时光照是很困难的。每增加一个像素光源就会产生更多的绘制调用，阴影代价高昂，而且最终的视觉效果不如桌面端，更不用说离线渲染的计算机生成场景了。Beast\
  \ 通过生成光照贴图解决了这两个问题，这是一种预先计算好的、被“烘焙”到纹理中的光照。当然，没有任何事情是免费的——除了设置和烘焙时间外，烘焙了光照贴图的场景最终会增加额外的大纹理，占用更多内存，增加应用程序大小，并延长场景加载时间。\n\
  \n要为当前场景生成光照贴图，你首先必须将所有不动的 `GameObject`（包括灯光）标记为静态，因为你只能为固定的灯光和表面预先计算光照。光照贴图作为第二层纹理叠加在网格之上。然后，你需要从编辑器菜单栏的\
  \ Window 菜单中打开 Lighting 窗口（图 14-33）。\n\n![A310332_2_En_14_Fig33_HTML.jpg](img/A310332_2_En_14_Fig33_HTML.jpg)\n\
  \n图 14-33. Lighting 窗口\n\n在该窗口中，你可以在 Object 面板中调整每个对象的光照贴图属性，然后切换到 Bake 面板来设置光照贴图属性并启动光照贴图烘焙。\n\
  \n请注意，Unity iOS 上不支持双光照贴图，因为该功能需要延迟光照，所以只能使用单光照贴图。动态光照和静态光照的效果不太容易混合，尤其是在有阴影的情况下。\n\
  \n### Umbra\n\n我之前提到过，每个摄像机都会执行视锥体裁剪，忽略所有位于摄像机视锥体之外的 `GameObject`。那些不熟悉实时计算机图形学的人可能会认为被遮挡的对象（即被其他对象挡住了视线）也会被裁剪掉，但事实并非如此。视锥体内的所有对象都会被渲染，然后使用深度缓冲来逐像素判断哪个对象在前。判断一个对象是否位于视锥体之外是一个相对直接的计算，但判断哪些对象被遮挡则需要一些预处理。这就是\
  \ Unity 集成 Umbra 作为遮挡剔除工具的作用所在。\n\n为场景添加遮挡剔除类似于为场景烘焙光照贴图的过程。你需要将不动的对象标记为静态，然后从 Unity\
  \ 编辑器菜单栏的 Window 菜单中打开 Occlusion Culling 窗口（图 14-34）。\n\n![A310332_2_En_14_Fig34_HTML.jpg](img/A310332_2_En_14_Fig34_HTML.jpg)\n\
  \n图 14-34. Occlusion Culling 窗口\n\n然后，你可以在 Object 标签中调整每个对象的遮挡剔除设置，然后在 Bake 标签中指定遮挡剔除设置并烘焙遮挡剔除数据。\n\
  \n## 最终分析\n\n现在你已经完成了对项目的优化过程，是时候再次对游戏进行分析了（清单 14-12），不过，如果你想有条不紊地进行，就应该在每次更改后都运行一次分析来观察其效果。\n\
