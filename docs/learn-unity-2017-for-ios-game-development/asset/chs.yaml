- '# 12. 呈现：屏幕与图标


  现在，关于 Climber 的短暂休息已经结束，构建和运行 Unity iOS 项目的基础知识也已涵盖，是时候继续你的保龄球游戏工作，并让它成功运行在 iOS
  上了！


  从现在开始，我通常会假设你通过在设备上构建并运行来进行测试，但在许多情况下，你也可以在 Unity Remote 的 Editor 中进行测试，或者在 iOS
  模拟器中进行测试。


  > **提示：** 始终在 Unity Editor 中进行一些测试以捕获在设备上测试时可能不会出现的错误是个好主意。如果你在设备上遇到奇怪的问题，请返回 Editor，看看能否在那里进行调试。


  本章重点在于让游戏在 iOS 设备上正确显示。这包括确保游戏以正确的方向显示，并且所有游戏元素在屏幕上以合适的分辨率呈现，这是让游戏可玩的前提（当你无法阅读或点击“播放”按钮时，很难开始游戏）。


  此外，除了提供必需的属性（如应用名称和图标）之外，你还会通过添加启动画面和熟悉的 iOS 活动指示器来增加一些润色，以指示游戏正在加载。


  其中一些呈现细节可能看起来只是外观上的，并且实现起来足够简单，可以被推迟到项目结束时（通常也确实如此），但简单的工作可以也应该尽早完成。能够快速完成的任务有助于你进入开发状态。而当你在加班加点努力完成游戏时，你最不想看到的就是那些本可以提前完成却未完成的工作。


  此外，打包很重要。事实上，在创建桌面软件时，我喜欢从安装程序开始，因为这是客户的第一次体验。对于 iOS 应用，客户首先看到的是应用图标和名称，然后是启动应用时的启动画面。这将形成客户对应用是精致还是业余的第一印象。而你，是应用的第一位客户。如果应用从一开始就像成品一样被打包，你对自己的项目会感觉更好，对你想要的应用也会有更清晰的概念。而且你永远不知道什么时候需要演示它！


  对应的 Unity 项目可以在线获取，网址为 `http://www.apress.com/9781484231739`。像往常一样，我建议你手动输入脚本，而不是从在线项目中复制。但项目文件中包含一些将用于图标和启动画面的纹理，因此，从第
  12 章的在线项目中，将 Textures 文件夹中的额外文件复制到你保龄球项目的 Textures 文件夹中（记住，你可以将文件拖拽到 Project 视图中）。你应该有三个不同分辨率的
  Fugu Games 启动纹理、一个显示书籍封面（本书封面）的启动画面，以及一个图标纹理（图 12-1）。


  ![A310332_2_En_12_Fig1_HTML.jpg](img/A310332_2_En_12_Fig1_HTML.jpg)


  **图 12-1.** 本章的纹理，从 `http://www.apress.com/9781484231739` 复制


  ## 保龄球游戏 for iOS


  在 Unity Editor 中，调出 Project Wizard（在 File 菜单中选择 Open Project），选择你上次在第 9 章结束时、切换到
  Climber 之前的保龄球项目。你现在应该熟悉切换构建目标的过程了。


  调出 Build Settings 窗口（在 File 菜单中选择 Build Settings），选择 iOS 作为构建目标，然后点击 Switch Platform
  按钮。


  如果你在第 9 章安装了 Necromancer GUI，在将构建目标切换到 iOS 后，Console 视图中会出现一些脚本错误，因为该包中的一个测试脚本没有使用
  `#pragma strict` 编写，并且缺少一些类型声明。这可以通过简单地从 Project 视图中移除 `GUITestScript.js`，或者用 `#if
  !UNITY_IPHONE` 包裹其所有内容来解决（更进一步，进入并修复代码，为函数参数附加 `:int` 可以加分）。移除该脚本将禁用 Necromancer
  GUI 测试场景，但除此之外，GUISkin 在你的暂停菜单中仍然可用。本章引入的所有更改，无论是否使用 Necromancer GUI 都能正常工作（但截图中显示了
  Necromancer GUI，因为它更美观）。


  一旦资源重新导入完成，进入 Edit 菜单，在 Settings 下选择 Player，以在 Inspector 视图中调出 player settings。在
  Cross-Platform Settings 区域，填写 Company Name 和 Product Name（应用名称）字段。选择 iOS 标签页以显示
  iOS player settings，并填写应用的 bundle ID（图 12-2）。


  ![A310332_2_En_12_Fig2_HTML.jpg](img/A310332_2_En_12_Fig2_HTML.jpg)


  **图 12-2.** FuguBowl player settings


  HyperBowl 的原始版本和 iOS 版本都是竖屏模式的游戏（并且事实证明，竖屏模式最适合将在下一章实现的滑动滚动控制），因此让我们将此游戏限制为竖屏模式。


  因此，在 player settings 中将 Default Orientation 属性设置为 Portrait（图 12-3）。


  ![A310332_2_En_12_Fig3_HTML.jpg](img/A310332_2_En_12_Fig3_HTML.jpg)


