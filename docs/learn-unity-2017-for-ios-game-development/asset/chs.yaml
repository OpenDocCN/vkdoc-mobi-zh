  让我们通过将变量 `object` 的初始值从 `null` 改为脚本的 `GameObject` 来修复空引用问题（清单 4-4）。


  ```

  function Start () {

  var object:GameObject = this.gameObject;

  Debug.Log("Start called on GameObject "+object.name);

  }

  清单 4-4. 修复了空引用问题的 FuguRotate.js 中的 Start 函数

