  一旦你在断点处检查完运行时状态，你可以在“运行”菜单中选择继续，直到下一个断点或出错。“运行”菜单还包含`单步跳过`（继续直到此函数中的下一行代码）、`单步进入`（继续直到此代码行调用的任何函数的第一行代码）或`单步跳出`（继续直到退出此函数）等命令，这样你就可以逐行单步执行脚本。所有这些命令都在“运行”菜单中显示了键盘快捷键，也可以在工具栏上作为按钮使用。


  ## 让它旋转


  现在你已经熟悉了脚本以及如何附加、编辑和调试它们，你准备好让这个脚本完成你最终想要的目标了——旋转立方体。



  好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行翻译。


  以下是翻译后的中文版本：



  ### 旋转变换 (Transform)


  在运行时移动`GameObject`需要更改其`Transform`组件。要专门旋转`GameObject`，则需要更改其`Transform`组件中的`Rotation`值。用清单
  4-5 中的代码替换`FuguRotate`脚本的内容即可实现。


  ```

  #pragma strict

  var speed:float = 10.0; // 控制旋转速度

  function Start () {

  var object:GameObject = this.gameObject;

  Debug.Log("在 GameObject "+object.name+"上调用了 Start 方法");

  }

  // 绕物体的 y 轴旋转

  function Update () {

  //Debug.Log("在时间 "+Time.time+"上调用了 Update 方法");

  transform.Rotate(Vector3.up*speed*Time.deltaTime);

  }

  清单 4-5.

  包含 Update 旋转代码的 FuguRotate.js 脚本

  ```


  我们来过一下新代码。首先，任何以`//`开头的行都是注释，不会作为代码执行。这是一种在不从文件中删除代码的情况下停用某行代码的便捷方式。注释也可以放在`/*`和`*/`之间，这对于多行注释非常有用。


  **注意**：有些人会说代码应该写得足够好，以至于无需解释就能明白其意图，但一个基本经验法则是，如果代码意图不明显，就添加注释。我过去浪费了很多时间来回忆为什么我要以某种方式编写代码。`speed`变量控制物体旋转的速度，由于它被声明为一个公共实例变量，因此在
  Inspector 视图中它作为一个可调节的属性可用。


  你可以直接输入`var speed=10.0`，而不是`var speed:float=10.0`。编译器可以推断出`speed`必须是`float`类型，因为它用一个浮点数初始化了（这被称为*类型推断*），但最好尽可能清晰，这不仅是为了
  Unity 编译器，也是为了任何阅读代码的人，包括你自己！变量`speed`在`Update`函数中使用，该函数调用了`Transform`类中定义的`Rotate`函数。`Rotate`接受一个`Vector3`作为参数，并将其`x`、`y`、`z`值解释为欧拉角（绕`GameObject`的
  x 轴、y 轴和 z 轴的旋转角度，以度为单位）。向量代表方向和大小，但在游戏引擎中，通常使用向量数据结构来表示欧拉角。


  **注意**：电影《神偷奶爸》中对向量的定义非常到位：“我叫 Vector。这是一个数学术语，用带有方向和大小（magnitude）的箭头表示。Vector！那就是我，因为我犯的罪也兼具方向和大小。哦耶！”


  `Vector3.up`是一个便捷定义的`Vector3`，其值为`(0,1,0)`，所以`Update`函数是绕 y 轴旋转`speed * Time.deltaTime`度。`Time.deltaTime`是自上一帧以来经过的时间（以秒为单位），因此，实际上，你每秒旋转`speed`度。在`Update`回调中，你几乎总是希望将任何连续变化乘以`Time.deltaTime`，这样你的游戏行为就不会因帧率差异而波动。如果省略了乘以`Time.deltaTime`的操作，`FuguRotate`脚本在任何运行速度慢两倍的机器上，其旋转物体的速度也会慢两倍。


  正如预期的那样，变量`speed`会显示在 Inspector 视图中，你可以对其进行编辑（图 4-22）。


  ![A310332_2_En_4_Fig22_HTML.jpg](img/A310332_2_En_4_Fig22_HTML.jpg)

  **图 4-22.** `FuguRotate`脚本的 Inspector 视图，显示了可调节的`speed`


  如果你点击 Play，立方体会以适中的速度旋转，并且`Transform`组件的 y`Rotation`值的连续变化会显示在 Inspector 视图中。你可以在
  Inspector 中编辑`FuguRotate`脚本的`Speed`值来减慢或加快旋转速度。


  ### 其他旋转方式


  `Transform.Rotate`是一个很好的例子，说明了为什么你应该阅读你遇到的每个函数的脚本参考手册。事实证明，`Transform.Rotate`是一个重载函数，意味着它具有不同参数的多种变体。


  **注意**：术语*参数 (parameter)* 用于描述函数声明，而*实参 (argument)* 指的是在运行时传递的相同值，但这是一种细微的区别。*参数
  (parameter)* 和 *实参 (argument)* 通常可以互换使用而不会引起混淆。


  `Transform.Rotate`的文档列出了它可以接受的几种实参组合。除了接受一个`Vector3`来指定旋转轴和一个角度（以度为单位）之外，`Transform.Rotate`还可以分别接受
  x 轴、y 轴和 z 轴的旋转量。清单 4-6 展示了`Update`函数的另一个版本，该版本只传入 x、y、z 旋转量。


  ```

  function Update () {

  transform.Rotate(0,speed*Time.deltaTime,0);

  }

  清单 4-6.

  Transform.Rotate 的一个版本，接受 x、y、z 角度作为旋转量

  ```


  或者，x、y、z 旋转量可以打包成一个`Vector3`，如清单 4-7 所示。


  ```

  function Update () {

  transform.Rotate(Vector3(0,speed*Time.deltaTime,0));

  }

  清单 4-7.

  Transform.Rotate 的一个版本，接受一个 Vector3 作为旋转量

  ```


  尽管向量有精确的数学定义，但 Unity 遵循 3D 应用程序接口中的常见做法，即重用其向量数据结构来表示任何具有 x、y、z 值的东西。例如，如果你阅读了`Transform`的脚本参考页面（你应该阅读），你会看到`Transform`的`position`、`rotation`和`scale`都是`Vector3`类型的值。


  ### 在世界空间中旋转


  `Transform.Rotate`的每个变体都有一个可选参数，其默认值为`Space.Self`。这指定旋转是围绕变换（也就是`GameObject`）的局部轴进行的，这些轴对应于在
  Scene 视图中选中`GameObject`时看到的轴手柄。如果你指定了`Space.World`，如清单 4-9 所示，旋转将围绕世界轴（以 0,0,0 为中心的
  x、y、z 轴）进行。


  ```

  function Update () {

  transform.Rotate(Vector3.up,speed*Time.deltaTime,Space.World);

  }

  清单 4-9.

  围绕世界轴旋转

  ```


  ## 立方体的子物体 (Children of the Cube)


  一个场景只有一个立方体并不有趣，所以让我们通过添加更多立方体来让它变得稍微有趣一些。你可以像创建第一个立方体一样重复创建新的立方体。或者，你可以通过复制现有立方体来节省一些时间（选中立方体，然后在
  Edit 菜单上调用`Duplicate`命令，或使用`Command+D`键盘快捷键）。但让我们借此机会来学习一下预置体 (prefabs)。




  ### 制作预制体


  预制体是一种特殊类型的资源，通过克隆一个 `GameObject` 创建。随后，该预制体可用于创建该 `GameObject` 的完全相同副本。从这个意义上说，Unity
  的预制体就像预制房屋，但更胜一筹。如果你对一个预制体实例进行了修改，这项修改可以自动传播到该预制体的所有其他实例。


  首先，为了遵循我们的资源组织方式，在项目视图中创建一个名为 `Prefabs` 的新文件夹。然后，选中 `Prefabs` 文件夹，在项目视图的“创建”（Create）菜单中点击
  `Prefab`，在该文件夹中创建一个空预制体。接着，你可以通过将层级视图中的立方体拖拽到这个空预制体上来填充它。或者，你也可以不创建空预制体，直接将立方体拖拽到
  `Prefabs` 文件夹中，这样系统会自动创建一个预制体，并以原始 `GameObject` 的名称命名（图 4-23）。


  ![A310332_2_En_4_Fig23_HTML.jpg](img/A310332_2_En_4_Fig23_HTML.jpg)


  图 4-23. 立方体预制体的项目视图


  现在，每当你想要创建一个与原始立方体 `GameObject` 外观相同的新立方体时，只需将预制体拖入层级视图即可。不过，与其在场景中放置多个独立的立方体，不如将一些立方体作为现有立方体的子对象。将预制体拖拽到层级视图中的立方体上两次，现在你将在“Cube”下看到两个新的立方体。在检视视图（图
  4-24）中，你可以看到新立方体与第一个立方体完全相同，具有相同的组件和组件属性。让我们将新立方体命名为 `child1` 和 `child2`（顺便提一下，现在是尝试使用检视视图锁定功能的好时机，这样你就可以同时检查两个
  `GameObject`）。


  ![A310332_2_En_4_Fig24_HTML.jpg](img/A310332_2_En_4_Fig24_HTML.jpg)


  图 4-24. 编辑子立方体


  作为父立方体的子对象，`child1` 和 `child2` 在检视视图中显示的位置是相对于其父对象 Cube 的位置。这意味着，如果某个子立方体的位置是 `(0,0,0)`，那么它就与其父对象处于完全相同的位置。因此，让我们将
  `child1` 和 `child2` 的位置分别设置为 `(2,0,0)` 和 `(-2,0,0)`。现在，这两个子立方体与它们的父立方体像卫星一样间隔开来（图
  4-25）。


  ![A310332_2_En_4_Fig25_HTML.jpg](img/A310332_2_En_4_Fig25_HTML.jpg)


  图 4-25. 立方体及其子立方体的场景视图


  在点击“播放”之前，将 `FuguRotate` 脚本修改为简单的 `transform.Rotate` 调用（清单 4-9）。现在当你点击“播放”时，主立方体会像之前一样旋转，而子立方体则像车轮的辐条一样跟随旋转。子立方体也会围绕自身的轴旋转，因为它们各自运行着自己的
  `FuguRotate` 脚本副本（如果你在 `Transform.Rotate` 调用中指定了 `Space.World`，那么所有三个立方体都会围绕同一个世界原点旋转）。


  ```

  #pragma strict

  var speed:float = 10.0; // 控制旋转速度

  function Start () {

  var object:GameObject = this.gameObject;

  Debug.Log("Start called on GameObject "+object.name);

  // 围绕物体的 y 轴旋转

  function Update () {

  //Debug.Log("Update called at time "+Time.time);

  transform.Rotate(Vector3.up*speed*Time.deltaTime);

  }

  清单 4-9.

  FuguRotate.js 恢复为在 Update 中进行旋转

  ```


  将 `child2` 的 `FuguRotate` 速度属性从 10 更改为 50，点击“播放”，你会看到那个立方体比其他立方体旋转得更快。你可以很容易地对 `child1`
  进行相同的更改，但想象一下，如果你有 50 个立方体需要更改，那将是多么繁琐！这就是预制体强大之处。选中 `child2`，然后在 GameObject 菜单中调用
  `Apply Changes To Prefab`（图 4-26）。


  ![A310332_2_En_4_Fig26_HTML.jpg](img/A310332_2_En_4_Fig26_HTML.jpg)


  图 4-26. 将更改应用到预制体


  现在 `child1` 再次变得与 `child2` 完全相同（除了名称和位置，Unity 合理地假设你并不希望这些在预制体的每个实例中保持一致）。点击“播放”后，子立方体现在都以相同的、更快的速度旋转。


  ### 断开预制体连接


  但主立方体也因更新后的旋转速度而旋转得更快。如果这不是你的本意，你可以将立方体的速度改回 10，然后为了确保子立方体的更改不会传播到主立方体，你可以选中主立方体，并在
  GameObject 菜单中调用 `Break Prefab Instance`（图 4-27）。


  ![A310332_2_En_4_Fig27_HTML.jpg](img/A310332_2_En_4_Fig27_HTML.jpg)


  图 4-27. 断开预制体实例连接


  现在，该立方体不再与预制体有关联，对子立方体的任何更改都不会传播到该立方体。


  ## 进一步探索


  这个场景仅通过添加简单的脚本化运动，就从精美静态演变为精美动态。你将在下一章通过动画和声音让场景更加生动，但到目前为止你达到的主要里程碑确实是学习了如何创建、编辑和调试脚本。从现在到本书结束，你将不断地添加脚本，所以要习惯它！


  ### Unity 手册


  Unity 手册的“构建场景”（Building Scenes）部分有两个与本章节工作相关的页面——在“预制体”（Prefabs）部分中对预制体的描述，以及在“组件-脚本关系”（Component-Script
  Relationship）部分中的详细解释。


  本章介绍的一种新资源类型（除了预制体）是脚本。“资源导入与创建”（Asset Import and Creation）部分中的“使用脚本”（Using Scripts）页面介绍了旋转脚本中所涵盖的基本概念——创建脚本，将其附加到
  `GameObject`，打印到控制台视图（使用 `print` 函数，而不是你使用的 `Debug.Log`），声明变量，甚至在 `Update` 函数中应用旋转。


  值得再次提及“变换”（Transforms）页面，因为你的旋转脚本就是用来修改 `Transform` 组件的。该页面还描述了父-子 `GameObject`
  关系，从技术上讲，这种关系存在于变换之间，但由于 `GameObject` 和变换之间存在一对一的关系，将这种联系理解为 `GameObject` 之间的链接（如层级视图中显示的那样）会更不容易混淆。


  本章我们触及了一个高级主题——调试。“调试”（Debugging）部分描述了控制台视图、MonoDevelop 调试器，以及在文件系统上查找日志文件的位置。


  ### 脚本参考


  到目前为止，我已经提到了 Unity 官方文档的三个主要部分中的两个——Unity 手册和参考手册。第三部分是脚本参考。本章是你首次涉足脚本编程，因此，脚本参考中的“脚本概述”（Scripting
  Overview）部分中的所有内容此时都值得一读。“运行时类”（Runtime Classes）列表阐明了 Unity 类之间的继承关系。在此之后，我建议，无论何时你在脚本中看到任何你不认识的内容（或者即使你认识，但尚未阅读其文档），都经常使用该页面上的搜索框。



  ### 脚本编写


  虽然本书中你只使用 JavaScript 进行开发，但在 Unity 世界中存在大量 JavaScript 和 C# 代码，因此你应当对两者都熟悉起来。由 Andrew
  Stellman 和 Jennifer Greene 合著的《*深入解析 C#*》是一本非常棒的图文并茂的 C# 入门书。


  由于 C# 是微软作为其 .NET 框架的一部分创建的，因此可以通过在微软开发者网络（MSDN）上搜索 C# 来找到官方 C# 文档和其他资源，网址是 [`http://msdn.microsoft.com/`](http://msdn.microsoft.com/)。


  在 MSDN 上，还可以搜索 .NET 文档，因为 Unity 的脚本引擎是通过 Mono 实现的，而 Mono 是 .NET 的一个开源版本。官方 Mono
  网站是 [`http://mono-project.org/`](http://mono-project.org/)。


  如果把两个程序员关在一个房间里，他们最可能争论的就是代码规范。我的经验法则是遵循我编写代码时所使用的官方语言和框架的规范。这是一个枯燥但名字有趣的话题。


  例如，Unity 在其大小写规则中混合使用了驼峰式和帕斯卡式命名法（或者用这些规范本身来描述，就是 `camelCase` 和 `PascalCase`）。你可以在维基百科上搜索驼峰式命名法。


  括号放置位置也是常见的争论点。根据 Jeff Atwood（Stack Exchange 的名人）在其热门博客 Coding Horror（ [`www.codinghorror.com/blog/2012/07/new-programming-jargon.html`](http://www.codinghorror.com/blog/2012/07/new-programming-jargon.html)
  ）上的说法，我这里使用的约定（也是 Unity 使用的，至少在创建新脚本模板时）被称为埃及风格。该文章还将对类名应用标准前缀的做法称为“蓝精灵命名法”。


  '
- '# 5. 一起跳舞吧！动画与音效


  在 Unity 中移动游戏对象的三种方式中，上一章介绍了通过脚本控制 Transform 组件，而物理引擎将在下一章启动的保龄球游戏示例中扮演重要角色。脚本控制移动无处不在。例如，即使在即将开发的保龄球游戏中，虽然主要依靠物理引擎来控制物理模拟：保龄球及其与地板和球瓶的碰撞，但摄像机跟随行为仍然是通过一个修改其
  Transform 组件的脚本来实现的（这与立方体场景中使用的脚本非常相似）。不仅如此，在每次投球和每帧之间，所有移动的游戏对象都是通过恢复其 Transform
  组件中的值来进行重置的。


  在进入那个保龄球游戏之前，本章将花一些时间在已构建的立方体场景基础上进行扩展，为其添加一个跳舞的角色动画，让你感受 Unity 的动画支持。没有音乐的舞蹈演示是不完整的，因此这个场景还会加入循环音效。这仍然是一个非物理的、只有轻度交互的场景，但理想情况下，它将以一种漂亮且有趣的方式介绍
  Unity 的动画和音频支持，然后再深入探索大量的物理知识（这是一个大话题，横跨两章）以及更多的脚本编写（一个更大的话题，涵盖本书剩余部分）。


  如果你是新手，制作高质量的动画（尤其是角色动画）并非易事。音乐也一样。幸运的是，Unity 资源商店中有许多音乐和角色动画包，其中很多是免费的，包括本章使用的“骷髅包”和“通用音乐集”。这些资源不包含在对应项目（位于
