- "# 6. 开球吧！物理与操控\n\n终于，你准备好开始本书的主要 Unity 项目了——一个类似 HyperBowl 风格的保龄球游戏。HyperBowl 是我十多年前参与开发、仅几年前才移植到\
  \ Unity 的一款街机/游乐场游戏。HyperBowl 拥有独特的“化身球球”玩法，玩家需要不断让球在 3D 环境中滚动，以到达球瓶处。本书构建的保龄球游戏会简单得多，但具有相同的控制风格。\n\
  \n即使是这样一个简单的保龄球游戏也是一个重要的项目。它将包含物理、输入处理、摄像机控制、碰撞音效、游戏规则、分数显示以及开始/暂停菜单。这甚至还不包括为 iOS\
  \ 进行任何适配工作。本章仅专注于让一个球滚动起来，这需要一些物理设置，但只需要一个用于控制球的脚本。该脚本可在 [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)\
  \ 上本章的项目中找到。但它是一个相当简单的脚本，并且会在本章中逐步开发完成，所以最好跟着一起从零开始实现它。\n\n\n\n## 创建新场景\n\n上一章中的舞蹈场景实际上是对第\
  \ 3 章中最初创建的立方体场景的修改，因此你无需从头开始重新创建整个场景。灯光和地面在保龄球游戏中也会用到，同理，你也可以继续修改立方体场景，并在添加保龄球游戏内容之前停用或移除骨骼和音乐。不过，并没有规定一个项目中只能有一个场景，因此让我们保留立方体/舞蹈场景不变，直接复制一份作为保龄球场景的起点。\n\
  \n根据上一章的内容，你的 Unity 编辑器应该仍然打开着舞蹈（立方体）场景。要开始处理此场景的副本，最快的方法是选择 `File` 菜单中的\"Save Scene\
  \ as\"（图 6-1）。\n\n![A310332_2_En_6_Fig1_HTML.jpg](img/A310332_2_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1. 将场景另存为新场景\n\n这将是保龄球场景，因此我们将其命名为 `Bowl`（图 6-2）。\n\n![A310332_2_En_6_Fig2_HTML.jpg](img/A310332_2_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2. 保存在 `Assets` 根目录下的 `Bowl` 场景\n\n注意：为了与资源组织系统保持一致，场景应放入 `Scenes` 文件夹中，但如果我只有一个或几个场景，我通常会将它们直接保存在\
  \ `Assets` 文件夹的根目录下。\n\n除了使用\"Save Scene as\"，你也可以通过在 `Project` 视图中选择场景，然后从 `Edit`\
  \ 菜单中选择 `Duplicate`（或使用键盘快捷键 `Command+D`）来复制场景，接着重命名新场景，最后双击该场景文件切换到它。\n\n### 删除游戏对象\n\
  \n现在，你可以清理场景中保龄球不需要的任何内容，而无需担心损坏舞蹈场景。因此，与其停用骨骼，不如直接在 `Hierarchy` 视图中选中骨骼 `GameObject`，并使用\
  \ `Edit` 菜单中的 `Delete` 命令（或 `Command+Delete` 键盘快捷键）将其删除。同时，删除立方体层级结构和 `Caribbean\
  \ Isle` `GameObject`（图 6-3），因为立方体和音乐在保龄球中也不需要。\n\n![A310332_2_En_6_Fig3_HTML.jpg](img/A310332_2_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3. 从保龄球场景中删除不需要的 `GameObject`\n\n### 调整灯光\n\n同样，在开始处理新场景之前，还需要做一点整理工作。先从灯光颜色开始。在所有资源都放入场景之前使用白色灯光，可以让你看到所有物品的原始颜色。因此，让我们点击灯光属性的\
  \ `Color` 字段，并在颜色选择器中选择白色，将灯光颜色改为白色（图 6-4）。\n\n![A310332_2_En_6_Fig4_HTML.jpg](img/A310332_2_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4. 将灯光颜色设置为白色\n\n另外，由于上一章中为了支持柔和阴影，点光源实际上已被更改为方向光，因此 `Point Light` 这个名称会产生误导。现在是一个将其重命名为\
  \ `Light` 的好时机，这样如果你以后想再次更改其类型，也能保持灵活性。\n\n### 重新铺设地面\n\n舞蹈场景中闪亮图案的地板看起来不太像保龄球道，所以让我们改变它的外观。这是一个尝试\
  \ Unity 对程序化材质支持的好机会。程序化材质使用通过算法生成的纹理，而不是图像文件。这允许通过调整纹理生成参数来实现材质的多样化，并且还可能节省空间，因为程序化材质不需要加载图像文件作为纹理。\n\
  \n让我们尝试为地面使用一种程序化材质。在 `Asset Store` 窗口中搜索 `substance`（`Project` 视图是在单个资源中搜索，所以在这种情况下它不会显示任何\
  \ `Asset Store` 结果）。`Asset Store` 窗口中将出现许多来自 Mikołaj Spychał 的免费 substance 包（图 6-5）。\n\
  \n![A310332_2_En_6_Fig5_HTML.jpg](img/A310332_2_En_6_Fig5_HTML.jpg)\n\n图 6-5. `Asset\
  \ Store` 中 `substance` 的搜索结果\n\n你需要的包是 `Parquets – Substances`。下载并导入该包后，一个 `Substances`\
  \ 存档（扩展名为 `.sbsar` 的文件）将出现在 `Project` 视图的 `Parquet01` 文件夹中（图 6-6）。\n\n![A310332_2_En_6_Fig6_HTML.jpg](img/A310332_2_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6. `Substances` 包的 `Project` 视图\n\n`Substances` 文件夹包含一个 `ProceduralMaterial`\
  \ 资源（`ProceduralMaterial` 是 `Material` 的子类），以及一个配套的纹理和脚本。点击 `Parquet01` 图标右侧的箭头，它会变成左箭头并展开，显示\
  \ `WoodenParquet` 的程序化材质及其关联的纹理（图 6-7）。\n\n![A310332_2_En_6_Fig7_HTML.jpg](img/A310332_2_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7. 从 `Substances` 存档中展开查看 `WoodenParquet`\n\n`WoodenParquet` 程序化材质看起来是保龄球道地板的一个不错的选择（主要是因为它是免费的），所以将\
  \ `WoodenParquet` 程序化材质（不是存档）拖到 `Hierarchy` 视图中的平面上。你可以在 `Scene` 视图中看到，现在该平面有了一个木制镶木地板（图\
  \ 6-8）。\n\n![A310332_2_En_6_Fig8_HTML.jpg](img/A310332_2_En_6_Fig8_HTML.jpg)\n\n\
  图 6-8. 应用了 `WoodenParquet` 程序化材质的平面\n\n瓷砖看起来过大，但你可以通过编辑纹理的 `UV` 缩放字段来调整纹理（有一个主纹理和一个法线贴图纹理）在平面上的拉伸方式。在\
  \ `Hierarchy` 视图中选择平面，然后在 `Inspector` 视图中将两个纹理的 `x` 和 `y` 的 `Tiling` 值（在 `Procedural\
  \ Properties` 部分）从 1 设置为 5（图 6-9）。\n\n![A310332_2_En_6_Fig9_HTML.jpg](img/A310332_2_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9. 应用了程序化材质的平面的 `Inspector` 视图\n\n现在纹理被平铺了五次，而之前只有一次（图 6-10）。在 `Inspector`\
  \ 视图中，请注意你有很多程序化属性可以调整，以改变生成纹理的外观。\n\n![A310332_2_En_6_Fig10_HTML.jpg](img/A310332_2_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10. `Tiling` 值设置为 5 的平面\n\n与灯光类似，当你打开 `Inspector` 视图时，这也是一个更改顶部文本字段中名称的好时机，将平面重命名为\
  \ `Floor` 以使其功能更明确。\n\n### 重置摄像机\n\n附加到 `Main Camera` 上的脚本不适合保龄球游戏，因此你可以禁用该脚本。更好的是，通过选中\
  \ `Hierarchy` 视图中的 `Main Camera`，然后在 `Inspector` 视图中右键单击脚本组件并选择 `Remove Component`，将该脚本从\
  \ `Main Camera` 上完全移除（图 6-11）。\n\n![A310332_2_En_6_Fig11_HTML.jpg](img/A310332_2_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11. 从 `Main Camera` 移除脚本\n\n顺便，将 `Main Camera` 的位置设置为 `(6,1,-10)`，其旋转设置为 `(0,-90,0)`。现在，你应该看到一个漂亮的地板、天际线，除此之外没有别的东西了（图\
  \ 6-12）。\n\n![A310332_2_En_6_Fig12_HTML.jpg](img/A310332_2_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12. 固定了 `Main Camera` 后的 `Game` 视图\n\n## 制作一个球\n\n现在场景中有了灯光、光晕、地板，以及一个视角固定的\
  \ `Main Camera`。是时候添加保龄球了。\n\n\n\n### 制作一个球体\n\n到目前为止，本书使用了两种原始游戏对象：`Plane` 和 `Cube`。对于球体，还有另一个完美的原始对象：`Sphere`。与\
  \ `Plane` 和 `Cube` 类似，`Sphere` 可以从菜单栏的 **GameObject** 菜单中的 **Create** 子菜单中选择，但也可以通过\
  \ **Hierarchy** 视图左上角的 **Create** 按钮来实例化一个球体（图 6-13）。\n\n![A310332_2_En_6_Fig13_HTML.jpg](img/A310332_2_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13. 创建一个球体\n\n从 **Create** 菜单选择 `Sphere` 后，**Hierarchy** 视图中应会列出一个名为 `Sphere`\
  \ 的新游戏对象。在 **Hierarchy** 视图中选择名为 `Sphere` 的游戏对象，以便在 **Inspector** 视图中检查它（图 6-14）。\n\
  \n![A310332_2_En_6_Fig14_HTML.jpg](img/A310332_2_En_6_Fig14_HTML.jpg)\n\n图 6-14.\
  \ 球体的 Inspector 视图\n\n与 `Cube` 和 `Plane` 原始对象一样，名为 `Sphere` 的游戏对象拥有一个 `MeshFilter`\
  \ 组件、一个 `MeshRenderer` 组件，以及一个形状与原始对象相匹配的 `Collider` 组件（此处为 `SphereCollider`）。首先，本着精心命名游戏对象的精神，将球体名称更改为\
  \ `Ball`，以明确此游戏对象是保龄球。然后，将球的位置设置为 `(0,1,5)`，这会将球心置于地板上方 1 米处。由于球的半径为 0.5 米（图 6-14\
  \ 中 `Sphere Collider` 的 **Radius** 设置便是一个很好的提示），这为球与地板之间留出了一些间隙。当你点击 Play 时，球将悬浮在地板上方的空气里（图\
  \ 6-15）。\n\n![A310332_2_En_6_Fig15_HTML.jpg](img/A310332_2_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15. 悬浮在空中的球\n\n当然，这符合预期。就像目前为止创建的所有其他对象（地板、立方体，甚至跳舞的角色）一样，球会按照指示移动或停留在指定位置。\n\
  \n### 让它落下\n\n为了使球能够响应重力而下落并响应其他力，必须让球具有物理属性。通过添加 `Rigidbody` 组件可以使游戏对象具有物理属性。\n\
  \n> **注意**  \n> 大多数游戏物理被称为刚体模拟，这大致就是字面意思——模拟形状不变的坚硬物体如何对力和碰撞做出反应。保龄球非常适合刚体模拟。而一块木薯布丁则不然。\n\
  \n要为球添加 `Rigidbody` 组件，请在 **Hierarchy** 视图中选择球；然后在菜单栏的 **Component** 菜单中，选择 **Physics**\
  \ 菜单项，再选择 **Rigidbody**（图 6-16）。你也可以点击 **Inspector** 视图底部的 **Add Component** 按钮来添加\
  \ `Rigidbody` 组件。\n\n![A310332_2_En_6_Fig16_HTML.jpg](img/A310332_2_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16. 为球体添加 Rigidbody 组件\n\n**Inspector** 视图现在会显示一个附加到球上的 `Rigidbody` 组件（图 6-17）。\n\
  \n![A310332_2_En_6_Fig17_HTML.jpg](img/A310332_2_En_6_Fig17_HTML.jpg)\n\n图 6-17.\
  \ 带有 Rigidbody 组件的球体的 Inspector 视图\n\n大多数 `Rigidbody` 属性可以使用默认值，但 1 千克的质量对于保龄球来说有点轻了。让我们将其设置为\
  \ 5，因为 5 千克大致在保龄球重量的范围内。\n\n**Drag**（空气阻力）和 **Angular Drag**（旋转时受到的阻力）的最小值就可以了。除非你在水下打保龄球，否则没有理由增加阻力。\n\
  \n**Use Gravity** 属性指定球将响应重力。如果未选中此复选框，则球的行为就像处于零重力环境中（在太空打保龄球！）。\n\n**Is Kinematic**\
  \ 属性适用于那些会移动和碰撞，但不响应力的游戏对象（例如，电梯平台）。任何带有 `Collider` 组件且将要移动的游戏对象也应附带 `Rigidbody`\
  \ 组件，并且如果移动不是来自物理引擎而是来自脚本或动画，那么它应该是一个运动学 `Rigidbody`。\n\n**Interpolation** 属性允许平滑游戏对象的运动（以计算成本为代价）。\n\
  \n同样，**Collision Detection** 属性提供了改进的碰撞检测，特别适用于快速移动的游戏对象（同样以计算成本为代价）。\n\n**Constraints**\
  \ 属性可以限制游戏对象如何响应力而移动。例如，游戏对象可以被限制为仅沿一个平面或甚至仅沿一个方向运动。\n\n适当设置 `Rigidbody` 组件属性后，再次点击\
  \ Play。现在球会下落，更棒的是，它会落在地板上！（见图 6-18）。\n\n![A310332_2_En_6_Fig18_HTML.jpg](img/A310332_2_En_6_Fig18_HTML.jpg)\n\
  \n图 6-18. 球落在地板上的游戏视图\n\n顺便说一下，默认的重力是标准地球重力，大约 9.8 m/s²。这可以在 `PhysicsManager`（图\
  \ 6-19）中自定义，该管理器位于 **Edit** 菜单的 **Project Settings** 子菜单下。\n\n![A310332_2_En_6_Fig19_HTML.jpg](img/A310332_2_En_6_Fig19_HTML.jpg)\n\
  \n图 6-19. PhysicsManager\n\n`PhysicsManager` 的 **Gravity** 属性是一个向量（具体来说，如果你从脚本访问\
  \ `PhysicsManager`，它是一个 `Vector3`），唯一非零的值在 y 方向（并且是负值，因此力是向下的）。因此，你不仅可以更改重力大小，例如更改为月球的重力，甚至可以改变其方向！如果你将\
  \ y 值从 `-9.81` 改为 `9.81`，球将向上掉落；如果你将重力向量从 `(0,-9.81,0)` 改为 `(1,0,0)`，球将以 1 m/s²\
  \ 的加速度横向掉落。如果你想要失重状态，将重力设置为 `(0,0,0)` 即可实现。\n\n## 自定义碰撞\n\n`Collider` 组件为游戏对象提供了一个碰撞形状。如果你在\
  \ **Inspector** 视图中检查球和地板，你会看到每个对象都有一个自动附加的 `Collider` 组件，其形状与其网格相匹配。地板有一个 `MeshCollider`\
  \ 组件，它始终与游戏对象的网格匹配；球有一个 `SphereCollider` 组件，它始终具有球形。当你选择球或地板时，**Scene** 视图不仅会高亮显示游戏对象的网格，还会高亮显示其\
  \ `Collider` 组件的形状。你可以使用 **Scene** 视图中的 **Gizmos** 菜单来切换碰撞器 Gizmo 的显示。\n\n原始游戏对象和原始碰撞器之间几乎是一一对应的（我所说的“原始”指的是内置于\
  \ Unity 中且形状简单，这有利于性能）。不过也有例外。例如，有一个原始的 `Cylinder` 游戏对象，你可以从 **GameObject** 菜单中创建它，但没有可用的圆柱体形状的\
  \ `Collider`。相反，如果你创建一个 `Cylinder`，它会自动使用一个 `CapsuleCollider`。\n\n`MeshCollider`\
  \ 是一个特例。自动跟随关联网格的形状听起来不错，但这仅适用于静态（即不移动的）游戏对象。任何正在移动或可能移动的对象都应使用原始碰撞器或原始碰撞器的聚合体（更多内容将在下一章介绍）。一个\
  \ `MeshCollider` 如果要与其他 `MeshCollider` 碰撞，还必须启用其 **Convex** 属性（复选框）。\n\n\n\n###\
  \ `PhysicMaterials`\n\n`Collider`组件决定了两个`GameObject`何时会发生碰撞，但碰撞检测后实际会发生什么？一个`GameObject`会从另一个上弹开吗？如果是，弹开多少？球会沿着地板滑动、滚动还是粘住？这取决于`Collider`组件的`Material`属性。该属性名称可能有些误导，因为`Collider`组件的`Material`并非用于确定网格表面外观的`MeshRenderer`组件的材质。相反，`Collider`组件使用`PhysicMaterial`来确定碰撞表面的碰撞属性。拼写有点奇怪，但可以把`PhysicMaterial`理解为物理材质或物理材料。\n\
  \n**注意：** 与`ProceduralMaterial`不同，`PhysicMaterial`类不是`Material`的子类。\n\n`Collider`组件的`Material`属性默认使用`PhysicsManager`中的`Default\
  \ Material`属性（图 6-19），该属性为`None`。要自定义碰撞行为，`Collider`组件必须分配一个`PhysicMaterial`。\n\n\
  ### 标准`PhysicMaterials`\n\n你可以从项目视图的创建菜单中从头创建新的`PhysicMaterial`，但 Unity 在 Unity\
  \ 商店的标准资产包中提供了一些免费的`PhysicMaterials`。如果你还没有从 Unity 商店下载并导入标准资产包，现在正是好时机。\n\n![A310332_2_En_6_Fig20_HTML.jpg](img/A310332_2_En_6_Fig20_HTML.jpg)\n\
  \n图 6-20. 从资源商店下载标准资产包\n\n下载完成后，你可以在`Assets` ➤ `Standard Assets` ➤ `PhysicsMaterials`文件夹中看到几个物理材质。\n\
  \n![A310332_2_En_6_Fig21_HTML.jpg](img/A310332_2_En_6_Fig21_HTML.jpg)\n\n图 6-21.\
  \ 标准资产包中的物理材质资源\n\n### `PhysicMaterial`的结构\n\n选择不同的`PhysicMaterial`，并在检视视图中比较它们的值。例如，查看`Bouncy`和`Ice`两个物理材质的差异（图\
  \ 6-22）。\n\n![A310332_2_En_6_Fig22_HTML.jpg](img/A310332_2_En_6_Fig22_HTML.jpg)\n\
  \n图 6-22. `Bouncy`和`Ice`物理材质的比较\n\n注意`Ice`的摩擦力值特别低。`Dynamic Friction`是一个物体在另一个物体上滑动时产生的摩擦力。`Static\
  \ Friction`是一个物体静止在另一个物体上时的摩擦力。摩擦力的范围是 0 到 1，其中 0 代表无摩擦，1 代表完全无法滑动。`Ice`的`Bounciness`值为\
  \ 0，这很合理，因为冰不会弹跳。而`Bouncy`物理材质的`Bounciness`最大值为 1。\n\n当两个具有不同`PhysicMaterial`的`GameObject`发生碰撞时会发生什么？它们的`Friction`和`Bounciness`值会分别根据`Friction\
  \ Combine`和`Bounce Combine`值进行组合。`Bouncy`的`Friction Combine`值表示，当它与另一个物理材质碰撞或滑动时，应用的摩擦力是两个材质摩擦力值的平均值。而`Bouncy`的`Bounce\
  \ Combine`值指定将使用两个物理材质中最大的弹性值（由于`Bouncy`已经具有最大弹性值 1，因此结果总是 1）。\n\n你可能想知道如果两个物理材质具有不同的组合值（就像`Bouncy`和`Ice`那样）会发生什么，会使用哪一个？截至目前，官方并没有明确记录，但优先级顺序（从低到高）似乎是：平均值、相乘、最小值、最大值。因此，如果`Bouncy`和`Ice`碰撞，结果将是取摩擦力最小值（即`Ice`的\
  \ 0.1）和弹性最大值（即`Bouncy`的 1）。这正是你所期望的！\n\n在物理材质的检视视图中显示的最后三个属性允许各向异性摩擦，即在不同方向上具有不同的摩擦力值。如果`Friction\
  \ Direction`属性被设置为非零向量，那么`Secondary Static Friction`和`Secondary Dynamic Friction`将在该方向上生效。对于木质地砖，你可以指定一个沿着木纹方向的次要摩擦方向，并沿着该方向设置较低的静态和动态摩擦力值。\n\
  \n### 应用`PhysicMaterial`\n\n你可以将任意标准物理材质拖放到地板和球的`Collider`组件的`Material`字段中，或者点击`Collider`组件`Material`字段右侧的小圆圈，从弹出窗口中选择（图\
  \ 6-23）。或者，你也可以从项目视图将物理材质拖放到检视视图中的`GameObject`上，物理材质将自动出现在正确的位置（即`Collider`组件的`Material`字段）。\n\
  \n![A310332_2_En_6_Fig23_HTML.jpg](img/A310332_2_En_6_Fig23_HTML.jpg)\n\n图 6-23.\
  \ 给球添加一个`Bouncy`物理材质\n\n尝试在地板和球上使用不同的物理材质。为球选择`Bouncy`物理材质，为地板选择`Metal`。然后点击播放，观察球一次又一次地弹跳；接着将球切换为`Ice`，观察球沉闷地落地。\n\
  \n除了在`Collider`组件中来回交换不同的物理材质，你也可以直接调整物理材质本身。例如，在项目视图中选中`Bouncy`物理材质，然后在检视视图中编辑物理材质的属性。但由于这些物理材质来自标准资产包，如果你重新导入该包（无论是意外还是因升级而故意为之），它们可能会被替换。此外，如果一个物理材质被多个`GameObject`使用，更改其属性会影响所有这些对象。\n\
  \n这里干净且安全的解决方案是为每个需要独立物理材质的`GameObject`创建一个新的物理材质。从概念上讲，当你需要一个独特的材质时，也应该期望有一个独特的物理材质。换句话说，一个独特的表面应该拥有自己的材质和物理材质。例如，球和地板应该有自己的物理材质，而所有的保龄球瓶（你将在下一章创建）应该共享同一个物理材质。\n\
  \n\n\n### 创建新的 `PhysicMaterial`\n\n为便于组织，在创建新的 `PhysicMaterial` 之前，应先新建一个文件夹来存放它们。在“项目”视图左侧面板中选择顶层的\
  \ `Assets` 文件夹，然后使用“项目”视图中的“创建”菜单，新建一个文件夹并命名为 `Physics`（这个名字比 `PhysicMaterials`\
  \ 更短且拼写更规范）。\n\n你可以通过“项目”视图中的“创建”菜单来创建新的 `PhysicMaterial`，然后在“检查器”视图中填写新 `PhysicMaterial`\
  \ 的所有属性。但更省力的方法是，从 Standard Assets 中复制一个 `PhysicMaterial`，最好选一个已经接近你需求的。由于地板使用了木材材质，从\
  \ Standard Assets 中的 Wood `PhysicMaterial` 开始比较方便。在“项目”视图中选中 Wood `PhysicMaterial`，然后从“编辑”菜单中选择“复制”（或使用快捷键\
  \ Command+D 进行复制）。\n\n将复制的 Wood `PhysicMaterial` 拖到“项目”视图中新创建的 `Physics` 文件夹内，并将其重命名为\
  \ `Floor`，因为稍后你要将其应用于名为 Floor 的游戏对象上。接着，复制 Floor `PhysicMaterial`，并将新复制的材质命名为 `Ball`（如图\
  \ 6-24 所示），因为稍后你要将其应用于名为 Ball 的游戏对象上。\n\n![A310332_2_En_6_Fig24_HTML.jpg](img/A310332_2_En_6_Fig24_HTML.jpg)\n\
  \n图 6-24. 自定义的 `PhysicMaterial`\n\n现在，地板和球体各自有了对应的 `PhysicMaterial`。要将这些 `PhysicMaterial`\
  \ 应用到预期的游戏对象上，只需将 Floor `PhysicMaterial` 拖到“层级”视图中的 Floor 游戏对象上，再将 Ball `PhysicMaterial`\
  \ 拖到 Ball 游戏对象上。（你可以在“检查器”视图中检查这两个游戏对象，确认 `PhysicMaterial` 已显示在碰撞体组件的“材质”字段中。）至此，你就可以开始调整\
  \ `PhysicMaterial` 的属性了。\n\n如你所料，Wood `PhysicMaterial` 已经设置了适用于木质地板的合理数值，因此可以保持不变。但你需要调整\
  \ Ball `PhysicMaterial`，所以选中 Ball `PhysicMaterial` 并按图 6-25 所示设置其数值。\n\n![A310332_2_En_6_Fig25_HTML.jpg](img/A310332_2_En_6_Fig25_HTML.jpg)\n\
  \n图 6-25. Ball `PhysicMaterial` 调整后的数值\n\n球体不应该在地板上弹跳（也不应在后续添加保龄球瓶后弹跳），因此将 `Bounciness`\
  \ 值设为 `0`，`Bounce Combine` 设为 `Minimum`，这样无论与什么物体碰撞，球体都完全不会弹起。接着，将 `Dynamic` 和 `Static\
  \ Friction` 值设为 `1`，`Friction Combine` 设为 `Maximum`，这样无论球体是静止还是滚动，始终具有最大摩擦力。最大摩擦力值可确保球体滚动而非滑动。\n\
  \n现在，当你点击“播放”时，球体应该直接落到地板上，静止不动，不再弹跳。\n\n## 让球滚动起来\n\n要让球滚动，你需要为游戏添加一些控制（事实上，这样它才能称得上是一个游戏）。原版街机游戏《HyperBowl》使用一个真正的保龄球作为大型轨迹球进行控制。旋转这个球体会为游戏中的球体施加旋转力（结果就是，玩家在试图让球滚过旧金山山坡时，身体会做出滑稽的动作）。\n\
  \n当然，制作一个空气支撑的保龄球外设超出了本书的范围，但 PC 版《HyperBowl》提供了基于鼠标的控制方式：推动鼠标会向相应方向为球体施加旋转力。这种控制方式只需一个脚本就能相当直接地实现。\n\
  \n#### 创建脚本\n\n在“项目”视图中选中 `Scripts` 文件夹，使用“项目”视图左上角的“创建”按钮新建一个 JavaScript 脚本，并将其命名为\
  \ `FuguForce`，因为你将用它来为球体施加力。（我本想将其命名为 `FuguRoll`，以呼应寿司的含义，但我不想让名称暗示你施加的是扭矩——一种旋转力而非线性力。）然后将\
  \ `FuguForce` 脚本拖到“层级”视图中的球体上，这样一旦你向脚本中添加代码，就可以立即进行测试。\n\n\n\n### 更新：收集输入\n\n试图通过计算旋转和平移（位置变化）来模拟球的滚动会非常复杂，这涉及到与地板和球瓶的碰撞检测与响应，还要考虑重力、摩擦力和反弹……这些都是物理引擎已经完成的计算。因此，不把这个任务交给\
  \ Unity 物理系统来管理，那可真是一种浪费。\n\n由于球体已经添加了 `Rigidbody` 组件，它已经是一个受重力等力影响、并能响应（包括与地板）碰撞的物理对象。所以，要让球滚动，只需要给它一个推力。推力的大小取决于输入，在本设计方案中，输入就是鼠标的移动。请注意，非\
  \ Unity 版本的原始《HyperBowl》游戏是向保龄球施加扭矩（旋转力）使其旋转的。Unity 确实有一个可以向 `Rigidbody` 组件施加扭矩的脚本函数，叫做\
  \ `Rigidbody.AddTorque`，但我发现在 Unity 中，通过 `Rigidbody.AddForce` 施加线性力来推动球滚动，效果更好。\n\
  \n每帧都可以检测鼠标移动（以及一般的输入），因此收集输入的代码和对应推力的计算应该放在脚本的 `Update` 回调函数中，如清单 6-1 所示。将清单中的代码复制到\
  \ `FuguForce` 脚本中。\n\n```csharp\n#pragma strict\nvar mousepowerx:float = 1.0;\n\
  var mousepowery:float = 1.0;\nprivate var forcex:float=0.0;\nprivate var forcey:float=0.0;\n\
  function Update() {\nforcex = mousepowerx*Input.GetAxis(\"Mouse X\")/Time.deltaTime;\n\
  forcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n}\n```\n\n脚本以变量\
  \ `mousepowerx` 和 `mousepowery` 开头，用于缩放施加给球的力。`mousepowerx` 影响左右移动鼠标产生的力，而 `mousepowery`\
  \ 影响前后移动鼠标产生的力。这些变量是公开的，因此可以在 `Inspector` 视图中进行调整。\n\n最终计算出的力存储在私有变量 `forcex` 和\
  \ `forcey` 中，它们也分别对应鼠标的左右和前后移动。\n\n**提示**\n\n在变量声明时，始终指定一个初始值是个好主意。这能让代码的含义更清晰，并避免因为对初始值的错误假设而导致错误（C\
  \ 和 C++ 程序员尤其知道要警惕未初始化变量引发的莫名 bug）。\n\n`Update` 回调函数正是根据 `mousepowerx`、`mousepowery`\
  \ 和鼠标移动来计算 `forcex` 和 `forcey` 的地方。在 Unity 中，使用 `Input` 类来查询输入。例如，可以通过检查静态变量 `Input.mousePosition`\
  \ 来获取鼠标位置，因此可以通过在每次 `Update` 调用时保存鼠标位置，并将当前位置与上一帧保存的位置进行比较，来确定鼠标的移动。\n\n但更高级的 `Input.GetAxis`\
  \ 函数已经完成了这项工作。`Input.GetAxis` 根据传递给函数的参数，返回一个介于 -1 到 1 之间的值，用于表示鼠标、摇杆或键盘的左右或前后移动。\n\
  \n在 `Update` 回调函数中，调用 `Input.GetAxis(\"Mouse X\")` 获取鼠标的左右移动，调用 `Input.GetAxis(\"\
  Mouse Y\")` 获取上一帧发生的前后移动。在考虑了该帧经过的时间（我们的老朋友 `Time.deltaTime`）并乘以缩放因子 `mousepowerx`\
  \ 和 `mousepowery` 之后，结果分别赋值给变量 `forcex` 和 `forcey`。\n\n将这段代码放入 `FuguForce` 脚本后，你就可以在球的\
  \ `Inspector` 视图中看到公开的 `mousepower` 变量了（图 6-26）。\n\n![A310332_2_En_6_Fig26_HTML.jpg](img/A310332_2_En_6_Fig26_HTML.jpg)\n\
  \n当你点击“播放”时，你仍然无法控制球，因为你还没有添加实际的推球代码。不过，如果你在 `Inspector` 视图菜单中选择“调试”选项，私有的 `forcex`\
  \ 和 `forcey` 变量就会显示出来，你可以看到它们在鼠标移动时发生变化。\n\n### FixedUpdate：使用力\n\n影响物理效果的函数（包括\
  \ `Rigidbody.AddForce`）应该放在 `FixedUpdate` 回调函数中调用。与 `Update` 回调函数（每帧调用一次，耗时不确定）不同，`FixedUpdate`\
  \ 回调函数在每个固定的时间步长结束后被调用。为了获得良好效果，物理模拟需要以固定的时间间隔运行，通常频率比 `Update` 更高。物理计算时间间隔的变化可能导致行为不一致以及物理更新之间的长时间延迟。在\
  \ Unity 中，这个时间步长是在 `TimeManager`（图 6-27）中设置的，可以通过 `编辑` 菜单的 `项目设置` 子菜单访问。\n\n![A310332_2_En_6_Fig27_HTML.jpg](img/A310332_2_En_6_Fig27_HTML.jpg)\n\
  \n`FixedUpdate` 回调函数正是在这些物理更新间隔中被调用的（我个人将 `FixedUpdate` 视为 `PhysicsUpdate`，将 `Fixed\
  \ Timestep` 视为 `PhysicsTimestep`），因此，所有对物理模拟的更改都应在此进行，尤其是对 `Rigidbody` 执行的操作。\n\n\
  由于推动球的力已经在 `Update` 回调函数中计算好了，`FixedUpdate` 回调函数只需在调用球体 `Rigidbody` 组件的 `Rigidbody.AddForce`\
  \ 方法时应用这些值即可（清单 6-2）。\n\n```csharp\nfunction FixedUpdate() {\nrigidbody.AddForce(forcex,0,forcey);\n\
  }\n```\n\n在变量 `rigidbody` 上调用了 `Rigidbody` 的函数 `AddForce`。`rigidbody` 是一个 `Component`\
  \ 变量，它始终引用此 `GameObject` 上的 `Rigidbody` 组件。`GameObject` 类也有一个 `rigidbody` 变量，因此使用\
  \ `gameObject.rigidbody` 的引用也是等价的。\n\n传递给 `Rigidbody.AddForce` 的三个值分别是力的 x、y 和 z\
  \ 分量，因为力具有方向和大小，所以它是一个向量。力的方向是世界空间中的方向。从本游戏中 `Main Camera` 的视角来看，x 轴代表左右方向，z 轴代表前后方向。因此，将\
  \ `forcex` 作为 x 参数传入，`forcey` 作为 z 参数传入。控制指令不会上下推动球，只会前后和侧向推动，所以 y 参数传入 0。\n\n**注意**\n\
  \n请务必查看 `Rigidbody.AddForce` 的脚本参考页面。它是一个重载函数，有一种重载形式将力作为 `Vector3` 接收，而不是三个独立的数值。此外，两种重载形式都接受一个可选参数，该参数可以指定应用于\
  \ `Rigidbody` 的值不是力，而是其他物理量，例如加速度、冲量或瞬时速度变化。\n\n现在，当你点击“播放”并移动鼠标时，球就会朝那个方向滚动了。试着在\
  \ `Inspector` 视图中更改 `mousepowerx` 和 `mousepowery` 的值，以获得你想要的滚动响应效果。\n\n\n\n### 真的在滚动吗？\n\
  \n你可能会注意到，如果在球下落时移动鼠标，实际上可以在球还在空中时就推动它，这看起来不太对劲。移动鼠标只应在球接触表面时才能使其滚动。\n\n幸运的是，Unity\
  \ 提供了回调函数，每个都以 `OnCollision` 为前缀。当一个 `GameObject` 与另一个 `GameObject` 发生碰撞以及接触结束时，这些函数会被调用。每个回调函数都接受一个参数，即包含碰撞信息的\
  \ `Collision` 对象，其中包含对方的 `GameObject` 引用。\n\n`FuguForce` 脚本可以通过检查碰撞对象的名字是否为 `Floor`（使用\
  \ `GameObject.name` 变量）来判断碰撞的 `GameObject` 是否是地面。但通常来说，通过标签来查找和识别 `GameObject`（使用\
  \ `GameObject.tag` 变量）是更好的实践，也更高效。如果你选择名为 Floor 的 `GameObject`，并在检视面板中查看它，你会在左上角看到它带有默认标签\
  \ `Untagged`。要将该 `GameObject` 的标签更改为 `Floor`，需要先从该 `GameObject` 的标签菜单中选择添加标签，来创建\
  \ `Floor` 标签（图 6-28）。\n\n![A310332_2_En_6_Fig28_HTML.jpg](img/A310332_2_En_6_Fig28_HTML.jpg)\n\
  \n图 6-28. 添加新标签\n\n此时，检视面板中会打开 `TagManager`。`TagManager` 用于管理标签和层级。标签用于标识 `GameObject`，因此你几乎可以创建无限数量的标签。而层级则用于标记\
  \ `GameObject` 组，最多可以定义 32 个层级，因为它们被实现为 32 位数字中的位。这使得指定层级的组合变得十分方便，例如，在摄像机和光源的剔除遮罩属性中就是如此。\n\
  \n要创建一个名为 `Floor` 的新标签，只需在 `TagManager` 的第一个空白标签字段中输入 `Floor`（图 6-29）。然后再次在层级视图中选择名为\
  \ Floor 的 `GameObject`，并再次点击检视面板中的标签菜单，新的 `Floor` 标签便可供选择（可能需要重启 Unity 后才可见）。\n\n\
  ![A310332_2_En_6_Fig29_HTML.jpg](img/A310332_2_En_6_Fig29_HTML.jpg)\n\n图 6-29. 添加了\
  \ Floor 标签的地面\n\n现在，`FuguForce` 脚本可以增加碰撞回调，以判断球是否在地面上（列表 6-3）。\n\n```\nprivate var\
  \ isRolling:boolean=false;\nprivate var floorTag:String = \"Floor\";\nfunction Update()\
  \ {\nforcex = mousepowerx*Input.GetAxis(\"Mouse X\")/Time.deltaTime;\nforcey = mousepowery*Input.GetAxis(\"\
  Mouse Y\")/Time.deltaTime;\n}\nfunction FixedUpdate() {\nif (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);\n\
  }\n}\nfunction OnCollisionEnter(collider:Collision) {\nif (collider.gameObject.tag\
  \ == floorTag) {\nisRolling = true;\n}\n}\nfunction OnCollisionStay(collider:Collision)\
  \ {\nif (collider.gameObject.tag == floorTag) {\nisRolling = true;\n}\n}\nfunction\
  \ OnCollisionExit(collider:Collision) {\nif (collider.gameObject.tag == floorTag)\
  \ {\nisRolling = false;\n}\n}\n```\n\n列表 6-3. FuguForce.js 中的碰撞回调\n\n添加了两个私有变量。第一个变量\
  \ `isRolling`，当球在地面上时为 true。第二个变量 `floorTag`，是赋给地面的标签。\n\n**提示**  \n为标签定义一个变量，可以避免在多个位置反复拼写该标签（并避免难以调试的拼写错误），并且如果后续标签名称发生更改，只需更新该变量即可。这三个碰撞回调函数都会通过检测碰撞对象的标签，来判断球碰撞的\
  \ `GameObject` 是否是地面。如果该 `GameObject` 不是地面，则碰撞回调不执行任何操作。\n\n当球与另一个 `GameObject`\
  \ 发生碰撞时，Unity 会调用 `OnCollisionEnter` 回调，因此该函数会将 `isRolling` 设置为 true。相反，当球与 `GameObject`\
  \ 的接触结束时，Unity 会调用 `OnCollisionExit`，此时将 `isRolling` 设置为 false。\n\n与此同时，`OnCollisionStay`\
  \ 会在球与 `GameObject` 保持接触时被调用，因此它也确保 `isRolling` 保持为 true。现在，`FixedUpdate` 回调可以在对球施加推力之前，检查\
  \ `isRolling` 是否为 true，以判断球是否在地面上（列表 6-4）。\n\n```\nfunction FixedUpdate() {\nif\
  \ (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);\n\
  }\n}\n```\n\n列表 6-4. 在 FuguForce.js 的 FixedUpdate 中添加滚动检查\n\n### 限制速度\n\n最后，作为一点润色，球控制脚本可以在推动球之前检查其速度，避免因现有速度、帧率和输入值的某种异常组合，导致球最终滚动的速度远超预期（列表\
  \ 6-5）。\n\n```\nvar maxVelocitySquared:float=400.0;\n```\n\n列表 6-5. 在 FuguForce.js\
  \ 的 FixedUpdate 中添加速度检查\n\n这是一个相当简单的改动，只需添加一个名为 `maxVelocitySquared` 的变量来保存你的最大速度值，该值实际上是最大速度值的平方。\n\
  \n## 完整脚本\n\n列表 6-6 展示了目前为止整合在一起的球控制脚本 `FuguForce.js` 的完整代码。此版本位于第 6 章的项目中，可于 [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)\
  \ 获取。\n\n```\n#pragma strict\nvar mousepowerx:float = 1.0;\nvar mousepowery:float\
  \ = 1.0;\nvar maxVelocitySquared:float=400.0;\nprivate var forcey:float=0;\nprivate\
  \ var forcex:float=0;\nprivate var isRolling:boolean=false;\nprivate var floorTag:String\
  \ = \"Floor\";\nfunction Update() {\nforcex = mousepowerx*Input.GetAxis(\"Mouse\
  \ X\")/Time.deltaTime;\nforcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n\
  }\nfunction FixedUpdate() {\nif (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);\n\
  }\n}\nfunction OnCollisionEnter(collider:Collision) {\nif (collider.gameObject.tag\
  \ == floorTag) {\nisRolling = true;\n}\n}\n```\n\n列表 6-6. FuguForce.js 的完整代码\n\n\
  \n\n## 成为保龄球\n\n`Ball`（球体）控制目前运行得相当不错，但`Main Camera`（主摄像机）只是静止不动，任由球体滚向远方。这是一个明显的缺陷，因为任何像样的\
  \ 3D 游戏都需要某种摄像机运动。在 HyperBowl 中，`Main Camera`会跟随球体滚动，但始终朝向同一方向（对准球瓶）。事实证明，Unity\
  \ 在标准资源（Standard Assets）中提供了一个摄像机跟随脚本。第 3 章中已从标准资源导入脚本包以获取`MouseOrbit`脚本。该脚本同样位于标准资源包的\
  \ Utility 文件夹中，名为`SmoothFollow`（图 6-30）。\n\n![A310332_2_En_6_Fig30_HTML.jpg](img/A310332_2_En_6_Fig30_HTML.jpg)\n\
  \n图 6-30. 标准资源中的 Utility 脚本\n\n你会注意到这是一个 C#脚本。C#是创建视频游戏的常用语言。将`SmoothFollow`脚本从\
  \ Project 视图拖拽至 Hierarchy 视图中的`Main Camera`上。然后选中 Hierarchy 视图中的`Main Camera`，以便在\
  \ Inspector 视图中编辑`SmoothFollow`脚本属性（图 6-31）。\n\n![A310332_2_En_6_Fig31_HTML.jpg](img/A310332_2_En_6_Fig31_HTML.jpg)\n\
  \n图 6-31. 带有`SmoothFollow`脚本的`Main Camera`的 Inspector 视图\n\n`Main Camera`应跟随球体移动，因此将\
  \ Hierarchy 视图中名为`Ball`的游戏对象拖拽至 Inspector 视图中`SmoothFollow`脚本的`Target`字段。\n\n至于其他`SmoothFollow`属性，将`Distance`设置为\
  \ 2，这将使`Main Camera`在`Ball`后方 2 米处跟随；将`Height`设置为 1，使摄像机保持在球体上方 1 米处，而非紧跟在正后方。`Height\
  \ Damping`（高度阻尼）设置为 2，允许`Main Camera`在跟随球体高度时有一定的上下弹性；`Rotation Damping`（旋转阻尼）设置为\
  \ 0，确保`Main Camera`始终保持在球体后方，不会左右摆动。\n\n现在点击 Play，当你滚动球体时，球体在滚动，摄像机也在跟随！\n\n## 进一步探索\n\
  \n现在我们有了真正游戏玩法的雏形。虽然还不是完整的保龄球游戏，但它已具备物理引擎（球在平面滚动）、交互控制（推动球体）和摄像机运动（跟随球体）。这些特性在游戏开发中都是丰富的主题，但特别是在下一章中，你将通过添加保龄球瓶和碰撞音效来更深入地研究物理引擎。届时游戏将更像一款保龄球游戏！\n\
  \n### Unity 手册\n\n在\"Asset Import and Creation\"（资源导入与创建）部分，\"Procedural Materials\"\
  （程序化材质）页面简要介绍了 Substance 存档格式，并概述了用于创建和分析程序化材质的工具。\n\n在\"Creating Gameplay\"（创建游戏玩法）部分，\"\
  Input\"（输入）页面描述了`Input`类及其`GetAxis`函数（本章实现的`BallController`脚本中使用了该函数），并列出了传递给该函数的摇杆和键盘值。该页面下半部分介绍了适用于\
  \ iOS 的输入函数和变量，你可以提前阅读本章关于 iOS 输入的内容。\n\n本章主要涉及物理引擎，因此\"Physics\"（物理）页面是最重要的阅读内容。它列出了所有碰撞器类型，包括本章使用的`Sphere\
  \ Collider`（球体碰撞器）、`Box Collider`（盒体碰撞器）和`Mesh Collider`（网格碰撞器）。该页面还介绍了刚体（球体）与静态碰撞器（地面）之间的区别，以及物理材质及其属性如何影响碰撞行为。\n\
  \n### 参考手册\n\n在\"Asset Components\"（资源组件）部分，\"Procedural Material Assets\"（程序化材质资源）页面解释了你在\
  \ Project 视图和 Inspector 视图中对程序化材质看到的内容。\n\n\"Physics Components\"（物理组件）部分详细列出了所有可用的碰撞器，以及可用的关节（包括铰链和弹簧）、恒力和布料组件（Unity\
  \ iOS 不支持布料）。\n\n### 脚本参考\n\nUnity 脚本参考可通过互联网访问（<https://docs.unity3d.com/ScriptReference/index.html>），并提供宝贵信息。Unity\
  \ 脚本参考也可直接从 MonoDevelop 获取。当你输入任何 Unity 类或函数时，可以使用 Command 键加单引号键（`⌘ + '`）调出上下文相关的信息。例如，输入`Input`类后，使用`⌘\
  \ + '`组合键将在默认网页浏览器中打开一个页面，并显示 Unity 脚本参考中与`Input`相关的信息（图 6-32）。\n\n![A310332_2_En_6_Fig32_HTML.jpg](img/A310332_2_En_6_Fig32_HTML.jpg)\n\
  \n图 6-32. 添加到球体的`Speed`变量\n\n### 网络资源\n\nUnity 中的物理实现基于 PhysX 引擎的旧版本（2.x），该引擎最初由\
  \ NovodeX 开发，后被 Ageia 收购并与硬件物理加速器捆绑，现为 nVidia 的产品。最新版本（3.x）可在 nVidia 开发者专区获取（<https://developer.nvidia.com/physx>）。查看\
  \ PhysX 软件开发工具包有助于更好地理解 Unity 物理组件和脚本函数所依赖的物理引擎特性。\n\n"
- "# 7. 开打吧！高级物理\n\n此时，你已拥有保龄球游戏的雏形，至少是在 Unity 编辑器中玩家可以在地面滚动球体的场景。但游戏至少需要加上保龄球瓶才能看起来像保龄球游戏。本章将解决这一问题，并涉及更多\
  \ Unity 物理知识，包括`Rigidbody`组件之间的碰撞（球体与球瓶之间）以及复合碰撞器（以适应保龄球瓶的形状）。在此基础上，你还会添加基于碰撞的音效，让游戏听起来更像保龄球游戏。\n\
  \n这些额外功能需要构建几个新脚本，这些脚本可在本章的 Unity 项目中找到。你可以通过<http://www.apress.com/9781484231739>上的\"\
  下载源代码\"按钮访问本书所有源代码。不过，用于保龄球瓶的桶模型以及球瓶碰撞和球滚动声音的音频来自 Asset Store，不包含在在线项目中（但它们都是免费的）。\n\
  \n## 加长球道\n\n在向保龄球场景（应保持上一章关闭时的状态在 Unity 编辑器中打开）添加保龄球瓶之前，你需要更多滚动空间。选中 Hierarchy\
  \ 视图中的地面，在 Inspector 视图（图 7-1）中将 X、Y、Z 轴的`Scale`（缩放）设置为 10。\n\n![A310332_2_En_7_Fig1_HTML.jpg](img/A310332_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1. 放大了 10 倍的`Floor`游戏对象\n\n> **提示：** 出于性能考虑，最好避免在`Transform`组件中更改缩放（对于导入的模型，应在\
  \ Import Settings 对话框中更改缩放）。如果必须更改缩放，请沿三个轴统一更改。\n\n现在地面放大了十倍（高度除外，因为平面高度为零）。但地面上的纹理也被拉伸，导致木板变得非常宽。为了补偿，你还应将地面的主纹理和法线贴图的平铺（Tiling）调整十倍，使每个方向上的`Tiling`系数变为\
  \ 50。这样木板看起来就恢复原样了。\n\n\n\n### 创建保龄球瓶\n\n现在有了滚动空间，就该添加球瓶了。可以用`Capsule`（胶囊体）基元来制作一个简化版的保龄球瓶，替代球瓶模型。\n\
  \n从层级视图的创建菜单中选择`Capsule`（图 7-2）。`Capsule`与其他基元模型一样，也可以在菜单栏的`GameObject`菜单中找到。\n\n\
  ![A310332_2_En_7_Fig2_HTML.jpg](img/A310332_2_En_7_Fig2_HTML.jpg)\n\n图 7-2. 创建一个胶囊体\n\
  \n将生成的游戏对象命名为`Pin`。要创建十个球瓶，你可以将球瓶复制九次，但是，与其像立方体场景中复制立方体那样操作，不如先创建一个预制件。这样一来，你对单个球瓶所做的任何更改都可以应用到所有十个球瓶上。\n\
  \n所以，将球瓶拖拽到项目视图中的`Prefabs`文件夹中，以创建预制件（图 7-3）。\n\n![A310332_2_En_7_Fig3_HTML.jpg](img/A310332_2_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3. 球瓶预制件\n\n创建预制件可以让你制作一个游戏资源副本，并在游戏中按需多次应用。当你对预制件进行更改时，这些更改将应用到游戏中的所有资源上。\n\
  \n### 在场景中放置球瓶\n\n现在你可以在场景中放置球瓶了。从项目文件夹中，将一个球瓶预制件拖拽到场景中。你需要让球瓶与球在一条直线上。因此，将其放置在球的同一\
  \ X 轴 `(100,1,0)` 上（图 7-4）。\n\n![A310332_2_En_7_Fig4_HTML.jpg](img/A310332_2_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4. 初始球瓶变换设置\n\n现在，再添加九个球瓶，形成一个典型的保龄球瓶阵型（三角形）。\n\n![A310332_2_En_7_Fig5_HTML.jpg](img/A310332_2_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5. 带球瓶的保龄球\n\n如果你现在测试，你会发现当你把球滚向球瓶时，球只是从它们上面弹开，因为这些球瓶有`Collider`组件，但却是静态的`GameObject`。和球一样，每个球瓶都需要有一个`Rigidbody`组件才能对力做出反应。可以通过组件菜单将`Rigidbody`组件添加到`Pin`预制件上，不过这次，让我们尝试另一种方法。在项目视图中选择`Pin`预制件，然后在检查器视图中点击`Add\
  \ Component`按钮。在弹出的菜单中，在物理（Physics）下选择`Rigidbody`（或者你也可以通过在弹出窗口的搜索字段中输入`rigidbody`来找到该选项）。无论你选择哪种方式，现在`Pin`预制件上应该就有了一个`Rigidbody`组件（图\
  \ 7-6）。\n\n![A310332_2_En_7_Fig6_HTML.jpg](img/A310332_2_En_7_Fig6_HTML.jpg)\n\n\
  图 7-6. 带有 `Rigidbody` 组件的球瓶预制件\n\n与地面和球的碰撞体组件类似，`Pin`预制件应该有自己的`PhysicMaterial`（物理材质）。创建合适的`PhysicMaterial`的快捷方法是复制球所用的物理材质，因此在项目视图中选择`Physics`文件夹中的`Ball\
  \ PhysicMaterial`，使用编辑菜单或`Command+D`进行复制，并将新的物理材质命名为`Pin`（图 7-7）。\n\n![A310332_2_En_7_Fig7_HTML.jpg](img/A310332_2_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7. 球瓶预制件的物理材质\n\n由于保龄球瓶应该和球一样能够滚动，因此将`Dynamic Friction`（动态摩擦力）和`Static Friction`（静摩擦力）值保留为\
  \ 1（以防止滚动时的滑动），并将`Friction Combine`（摩擦力组合）值保留为`Maximum`（最大值）。然而，与球不同，保龄球瓶应该非常有弹性，因此将`Bounciness`（弹性）设置为\
  \ 0.5，并将`Bounce Combine`（弹性组合）值设置为`Average`（平均值）（考虑到与之碰撞的物体的弹性）。最后，将`Pin PhysicMaterial`指定给`Pin`预制件。在项目视图中选择`Pin`预制件；然后在检查器视图中，点击碰撞体组件`PhysicMaterial`字段右侧的圆圈，并从弹出选择器中选取`Pin\
  \ PhysicMaterial`（图 7-8）。\n\n![A310332_2_En_7_Fig8_HTML.jpg](img/A310332_2_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8. 将球瓶物理材质指定给球瓶预制件\n\n现在，当你点击播放并将球滚向球瓶时，球瓶会被撞倒，并像图 7-9 那样弹跳滚动起来！\n\n![A310332_2_En_7_Fig9_HTML.jpg](img/A310332_2_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9. 与所有具有 `Rigidbody` 组件的球瓶碰撞\n\n### 使用摄像机跟随\n\n你会注意到，球撞击球瓶的视角可能比较远，玩家可能不太容易看清碰撞效果。因此，你需要做的是让摄像机跟随保龄球。为此，你需要创建另一个脚本。在`Script`文件夹中，创建一个新的\
  \ C# 脚本，并将其命名为`CameraFollow`，内容如代码清单 7-1 所示。\n\n```\nusing UnityEngine;\nusing System.Collections;\n\
  public class CameraController : MonoBehaviour {\npublic GameObject player;\nprivate\
  \ Vector3 offset;\nvoid Start ()\n{\noffset = transform.position - player.transform.position;\n\
  }\n```\n\n代码清单 7-1. CameraFollow 脚本\n\n你可能需要调整摄像机的起始位置，使其起始位置刚好位于球的后上方。\n\n### 持续游玩\n\
  \n每次想要测试一次滚球都得停止游戏再点击播放，这相当烦人。而且，当球滚出地面时，你只能眼睁睁看着球无限下落。所以，让我们实现当球滚到地板边缘时，球和球瓶能够重置。\n\
  \n## 返回球的初始状态\n\n首先，你需要一个能够将`GameObject`恢复到其初始位置和旋转（不能忘记旋转——如果一个球瓶被击倒，你需要将其重置为初始的直立方向）的脚本。创建一个新的\
  \ JavaScript 脚本，将其命名为`FuguReset`，并添加代码清单 7-2 的内容。\n\n```\n// 将游戏对象恢复到其原始位置和旋转\n\
  #pragma strict\nprivate var startPos:Vector3;\nprivate var startRot:Vector3;\nfunction\
  \ Awake() {\n// 保存此游戏对象的初始位置和旋转\nstartPos = transform.localPosition;\nstartRot =\
  \ transform.localEulerAngles;\n}\nfunction ResetPosition() {\n// 回到初始位置\ntransform.localPosition\
  \ = startPos;\ntransform.localEulerAngles = startRot;\n// 确保停止所有物理运动\nif (GetComponent.()\
  \ != null) {\nGetComponent.().velocity = Vector3.zero;\nGetComponent.().angularVelocity\
  \ = Vector3.zero;\n}\n}\n```\n\n代码清单 7-2. FuguReset.js 脚本恢复游戏对象的位置\n\n`Awake`函数将游戏对象的位置和旋转保存在几个变量中，而`ResetPosition`函数则将游戏对象恢复到这些设置。`ResetPosition`还会检查游戏对象是否具有`Rigidbody`组件。如果有，该函数会停止其移动或旋转。`FuguReset`脚本应该附加到每一个在重新启动游戏时需要重置其位置（以及可能的旋转）的`GameObject`上。这些对象包括球、球瓶和`Main\
  \ Camera`（主摄像机）。首先，将`FuguReset`脚本拖拽到层级视图中的`Main Camera`和`Ball`游戏对象上。然后，在项目视图中选择`Pin`预制件，并在检查器视图中点击`Add\
  \ Component`按钮以添加`FuguReset`脚本（图 7-10）。\n\n![A310332_2_En_7_Fig10_HTML.jpg](img/A310332_2_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10. 将 FuguReset 脚本附加到球瓶预制件上\n\n`Ball`、`Pin`和`Main Camera`游戏对象现在会在游戏启动时记录它们的原始位置和旋转，并且你有一个可供调用的`ResetPosition`函数，该函数会将这些游戏对象恢复到那些原始位置和旋转。\n\
  \n\n\n### 发送消息\n\n通常，从一个`GameObject`上挂载的脚本调用另一个`GameObject`上挂载的脚本中的函数会有些棘手。这涉及到对`GameObject`调用`GetComponent`来获取脚本，然后引用该脚本才能调用函数。\n\
  \n但在简单情况下（例如，当你不关心函数的返回值时），Unity 允许你通过向`GameObject`发送消息来调用函数，可以使用`GameObject.SendMessage()`函数或`GameObject.BroadcastMessage()`函数。接收消息的`GameObject`（消息内容为要调用的函数名）会将这条消息传递给所有可能包含该函数的脚本。\n\
  \n让我们在你的游戏控制脚本中添加一些函数，用于发送`ResetPosition`消息（清单 7-3）。\n\n```\nvar ball:GameObject;\
  \ // 保龄球\nFunction ResetBall() {\n    ball.SendMessage(\"ResetPosition\");\n}\n\
  function ResetPins() {\n    for (var pin:GameObject in pins) {\n        pin.BroadcastMessage(\"\
  ResetPosition\");\n    }\n}\nfunction ResetCamera() {\n    Camera.main.SendMessage(\"\
  ResetPosition\");\n}\nfunction ResetEverything() {\n    ResetBall();\n    ResetPins();\n\
  \    ResetCamera();\n}\n```\n*清单 7-3. FuguBowl.js 中用于发送 ResetPosition 消息的函数*\n\n\
  新增代码以一个公开变量开头，该变量将引用保龄球。脚本中已经有一个`pins`数组引用了所有瓶柱，而`Main Camera`始终可以通过静态变量`Camera.main`来引用，因此现在脚本可以访问所有需要重置的`GameObject`。函数`ResetCamera()`和`ResetBall()`调用`SendMessage()`向各自的目标`GameObject`发送`ResetPosition`消息。所有在这些`GameObject`所挂载脚本中定义的`ResetPosition()`函数都将被调用。具体来说，由于`Main\
  \ Camera`和`Ball`这两个`GameObject`都挂载了`FuguReset`脚本，该脚本中的`ResetPosition()`函数将响应此消息。`ResetPins()`函数则略有不同，它调用`BroadcastMessage()`来发送`ResetPosition`消息。`BroadcastMessage()`的行为与`SendMessage()`相同，区别在于消息还会传播给原始接收`GameObject`的所有子`GameObject`。当你稍后在本章中替换一些瓶柱，而这些瓶柱的`Rigidbody`组件挂载在子`GameObject`上时，这个特性将非常有用。\n\
  \n### 检测落沟球\n\n当保龄球滚出地板边缘时，本质上就是一个落沟球，因为此时已无望击中瓶柱。因此，在这种情况下，游戏必须立即重置。实现落沟球检测的方法是在每一帧检查保龄球的`y`位置是否低于某个阈值。可以通过在`FuguBowl`脚本中加入以下公开变量和`Update()`回调来实现（清单\
  \ 7-4）。\n\n```\nvar sunkHeight:float = -10.0; // 低于此 y 位置即为落沟球\nfunction Update()\
  \ {\n    if (ball.transform.position.y < sunkHeight) {\n        ResetEverything();\n\
  \    }\n}\n```\n*清单 7-4. FuguBowl.js 中用于检测落沟球的 Update 回调*\n\n变量`sunkHeight`指定了保龄球的`y`位置需低于多少才触发全部重置。`sunkHeight`的默认值设为零以下一段距离，这样玩家在重置前还能看到球下落一段距离。`Update()`回调每帧检查保龄球的`y`位置是否低于`sunkHeight`。如果是，则调用`ResetEverything()`，它将向`Ball`、`Main\
  \ Camera`和`Pin`这些`GameObject`发送所有`ResetPosition`消息。在点击播放测试之前，你需要通过从层级视图中将`Ball`\
  \ `GameObject`拖拽到`FuguBowl`脚本的`Ball`字段中，来分配脚本中的`ball`公开变量（图 7-11）。\n\n![A310332_2_En_7_Fig11_HTML.jpg](img/A310332_2_En_7_Fig11_HTML.jpg)\n\
  \n*图 7-11. FuguBowl.js 中支持重置保龄球的游戏控制器属性*\n\n现在，当保龄球滚出地板时，`Ball`、`Main Camera`和`Pin`这些`GameObject`应该会立刻弹回它们的初始位置。连续游戏继续进行！\n\
  \n### 完整代码清单\n\n清单 7-5 给出了完整的游戏控制器脚本。\n\n```\n// 保龄球游戏控制器\n#pragma strict\nvar pin:GameObject;\
  \ // 用于实例化的瓶柱预设\nvar pinPos:Vector3 = Vector3(0,1,20); // 放置瓶柱阵列的位置\nvar pinDistance\
  \ = 1.5; // 瓶柱之间的初始距离\nvar pinRows = 4; // 瓶柱行数\nvar ball:GameObject; // 保龄球\nvar\
  \ sunkHeight:float = -10.0; // 低于此 y 位置即为落沟球\nprivate var pins:Array;\n\nfunction\
  \ Awake () {\n    CreatePins();\n}\n\nfunction CreatePins() {\n    pins = new Array();\n\
  \    var offset = Vector3.zero;\n    for (var row=0; row < pinRows; ++row) {\n \
  \       offset.z += pinDistance;\n        offset.x = -pinDistance * row / 2;\n \
  \       for (var n=0; n <= row; ++n) {\n            pins.push(Instantiate(pin, pinPos\
  \ + offset, Quaternion.identity));\n            offset.x += pinDistance;\n     \
  \   }\n    }\n}\n\nfunction Update() {\n    if (ball.transform.position.y < sunkHeight)\
  \ {\n        ResetEverything();\n    }\n}\n\nfunction ResetBall() {\n    ball.SendMessage(\"\
  ResetPosition\");\n}\n\nfunction ResetPins() {\n    for (var pin:GameObject in pins)\
  \ {\n        pin.BroadcastMessage(\"ResetPosition\");\n    }\n}\n\nfunction ResetCamera()\
  \ {\n    Camera.main.SendMessage(\"ResetPosition\");\n}\n\nfunction ResetEverything()\
  \ {\n    ResetBall();\n    ResetPins();\n    ResetCamera();\n}\n```\n*清单 7-5. FuguBowl.js\
  \ 的完整代码清单*\n\n## 用木桶代替球瓶\n\n使用胶囊体作为保龄球瓶既简陋又碰撞形状单一。一个真正的保龄球瓶模型会好得多，但可惜的是，在资源商店中搜索免费保龄球瓶一无所获（不过，如果有供应商决定填补这个空白，这种情况随时可能改变）。然而，资源商店中有很多其他模型，如果你灵活变通，它们可以作为保龄球瓶的替代品。结果发现有好几个木桶模型的资源包，所以作为备选方案，你将使用木桶作为瓶柱。\n\
  \n### 挑选一个木桶\n\n在资源商店中搜索`barrel`会发现几个免费的木桶模型资源包（图 7-12）。\n\n![A310332_2_En_7_Fig12_HTML.jpg](img/A310332_2_En_7_Fig12_HTML.jpg)\n\
  \n*图 7-12. 资源商店中的免费木桶*\n\n任何一个免费资源包都可以正常工作，但来自 Game-Ready 的木桶包（其资源商店图标中显示两个生锈的金属木桶）已经设置好了预设体，所以我们就下载这个包吧。从资源商店的描述以及导入该包后的项目视图中，你可以看到木桶包组织得很好，其中有一个名为`Prefabs`的文件夹，包含了`Barrel`预设体和`Barrel`模型（图\
  \ 7-13）。\n\n![A310332_2_En_7_Fig13_HTML.jpg](img/A310332_2_En_7_Fig13_HTML.jpg)\n\
  \n*图 7-13. 木桶包的项目视图*\n\n\n\n### 创建预制件\n\n你需要一个`Barrel`（木桶）预制件来替换简单的`Pin`（球瓶）预制件，但应避免修改原始的`Barrel`预制件（再次导入`Barrel`包会覆盖你的修改）。要制作`Barrel`预制件的副本，请选中该预制件，按下`Command+D`（或从**编辑**菜单中选择**复制**），然后将复制的预制件拖入**预制件**文件夹。接着将其重命名为`BarrelPin`，因为它是一个`Barrel`，而你将其用作保龄球瓶（图\
  \ 7-14）。\n\n![A310332_2_En_7_Fig14_HTML.jpg](img/A310332_2_En_7_Fig14_HTML.jpg)\n\
  \n图 7-14. `Barrel`预制件的副本\n\n选中`BarrelPin`预制件，使其显示在**检查器**视图中。如果你使用了相同的资源包，那么它会包含`MeshFilter`组件和`MeshRenderer`组件。但它还需要`Collider`组件和`Rigidbody`组件。该预制件还需要附加一个`FuguReset`脚本来处理游戏控制器发送的`ResetPosition`消息。现在，我们先添加一个`FuguReset`脚本。接着添加一个`Rigidbody`组件。在`Rigidbody`组件中，将**质量**设置为\
  \ 2（千克）。对于金属木桶来说这相当轻，但如果球不能相对轻松地击倒这些充当球瓶的木桶，游戏就会失去乐趣。在游戏中，乐趣比现实更重要！\n\n你可以通过将脚本拖入**检查器**视图，或使用**添加组件**按钮（图\
  \ 7-15），将`FuguReset`脚本添加到预制件中。\n\n![A310332_2_En_7_Fig15_HTML.jpg](img/A310332_2_En_7_Fig15_HTML.jpg)\n\
  \n图 7-15. 将`FuguReset`脚本添加到`BarrelPin`预制件中\n\n### 使用预制件\n\n要用`BarrelPin`预制件替换简单的胶囊形`Pin`预制件，请在**层级**视图中选中`FuguBowl`游戏对象，使其组件显示在**检查器**视图中，然后将`BarrelPin`预制件拖入`FuguBowl`脚本的**Pin**字段，替换你最初使用的`Pin`预制件（图\
  \ 7-16）。\n\n![A310332_2_En_7_Fig16_HTML.jpg](img/A310332_2_En_7_Fig16_HTML.jpg)\n\
  \n图 7-16. 使用`BarrelPin`预制件作为保龄球瓶\n\n现在当你点击**播放**时，会出现十个木桶而不是十个胶囊。但它们会立即掉落地板，因为球瓶还没有`Collider`组件！\n\
  \n### 添加碰撞体\n\n你无法再回避这个问题了。是时候处理`BarrelPin`的碰撞了。为了能在**场景**视图中直观地看到`BarrelPin`及其碰撞形状，请将`BarrelPin`预制件拖入**层级**视图，临时将其放置在场景中。放置好后，按下`F`键调用**框选所选**命令，这会将木桶居中显示在**场景**视图中。同时，将查看选项（**场景**视图左上方的下拉菜单）从**纹理**更改为**线框**，以便更容易看到网格和`Collider`组件的形状。不幸的是，**组件**菜单中没有列出任何木桶形状的基本碰撞体（`CylinderCollider`会很完美，但它并不存在），虽然`MeshCollider`可以贴合木桶的形状，但由于性能问题，`MeshCollider`不适用于物理游戏对象。**组件**菜单中最接近的形状是`CapsuleCollider`。因此，我们先在`Barrel`游戏对象上使用`CapsuleCollider`形状，看看它有多贴合。\n\
  \n虽然 Unity 在添加`Collider`组件时会尝试调整其大小以适配游戏对象的网格，但在此例中，贴合度并不理想，这主要是因为，正如`Transform`组件中的旋转值所示，该游戏对象绕其\
  \ x 轴旋转了 90 度。如果没有这个旋转，木桶是侧躺的，但旋转也影响了`Collider`组件的朝向。为了调整这个旋转，请将`CapsuleCollider`形状的轴切换到\
  \ z 轴。之后，将**半径**设置为 2，**高度**设置为 6，这样`CapsuleCollider`与木桶的匹配度就会大大提高（图 7-17）。\n\n\
  ![A310332_2_En_7_Fig17_HTML.jpg](img/A310332_2_En_7_Fig17_HTML.jpg)\n\n图 7-17. 为木桶添加`CapsuleCollider`形状\n\
  \n胶囊形状在侧面与木桶的匹配度很好，但在顶部和底部则不然，顶部和底部应该是平面，而不仅仅是胶囊的端点。对于平面，`BoxCollider`显然是更好的选择。因此，在这种情况下，你需要将多个`Collider`组件组合成一个复合碰撞体。\n\
  \n\n\n### 添加复合碰撞体\n\nUnity 允许一个 `GameObject` 上存在多个 `Collider` 组件，但这些碰撞器必须是不同类型。例如，不能将两个\
  \ `BoxCollider` 组件附加到同一个 `GameObject` 上。不过，可以通过将每个 `Collider` 组件附加到其自身的 `GameObject`\
  \ 上，并将所有这些 `GameObject` 设为 `Rigidbody` 的 `GameObject` 的子对象，从而将一组任意的原始 `Collider`\
  \ 组件合并成一个复合碰撞体。你将为木桶组合一个 `CapsuleCollider` 和一个 `BoxCollider`，这正是要采用的方法。要容纳这两个 `Collider`\
  \ 组件，请在层级视图中为木桶创建两个子 `GameObject`，并根据它们各自的形状将其命名为 `box` 和 `capsule`（图 7-18）。要创建子\
  \ `GameObject`，请从菜单中选择 `GameObject`，然后选择 `Create Empty Child Object`。\n\n![A310332_2_En_7_Fig18_HTML.jpg](img/A310332_2_En_7_Fig18_HTML.jpg)\n\
  \n图 7-18.  \n用于复合碰撞体的子 `GameObject`\n\n与其从头创建一个新的 `CapsuleCollider`，不如利用 `Barrel\
  \ GameObject` 上已经正确定向和调整好大小的 `CapsuleCollider`，通过复制该组件来实现。选中 `Barrel GameObject`，然后在检视面板中，右键单击\
  \ `CapsuleCollider` 并选择 `Copy Component`（图 7-19）。\n\n![A310332_2_En_7_Fig19_HTML.jpg](img/A310332_2_En_7_Fig19_HTML.jpg)\n\
  \n图 7-19.  \n复制组件\n\n然后再次选中 `capsule GameObject`，在检视面板中右键单击其 `Transform` 组件，在弹出菜单中选择\
  \ `Paste Component As New`（图 7-20）。现在 `capsule GameObject` 拥有了一个与为 `Barrel GameObject`\
  \ 创建的完全相同的 `CapsuleCollider`，因此你不再需要原来的那个了。选中 `Barrel GameObject`，右键单击刚才复制的 `CapsuleCollider`，在弹出菜单中选择\
  \ `RemoveComponent` 以移除 `CapsuleCollider`。现在，`Barrel` 层级中应该只存在一个 `CapsuleCollider`。\n\
  \n![A310332_2_En_7_Fig20_HTML.jpg](img/A310332_2_En_7_Fig20_HTML.jpg)\n\n图 7-20.\
  \  \n粘贴组件\n\n让我们把注意力转到 `BoxCollider` 上。你可以使用 `Component` 菜单直接将其添加到 `Box GameObject`，但如果你将\
  \ `BoxCollider` 添加到 `Barrel GameObject` 上，那么 Unity 会替你完成将 `BoxCollider` 适配到网格大小的工作。因此，让我们重复处理\
  \ `CapsuleCollider` 时的流程，只不过这次换成 `BoxCollider`。选中 `Barrel GameObject`，使用 `Component`\
  \ 菜单或 `AddComponent` 按钮添加一个 `BoxCollider`。在场景视图中，你可以看到 `BoxCollider` 包裹住了木桶（图 7-21）。\n\
  \n![A310332_2_En_7_Fig21_HTML.jpg](img/A310332_2_En_7_Fig21_HTML.jpg)\n\n图 7-21.\
  \  \n自动围绕木桶调整大小的 `BoxCollider`\n\n`BoxCollider` 从网格的顶部延伸到底部是可以接受的，因为这样可以在两端获得两个平坦的碰撞面。但\
  \ `BoxCollider` 延伸到木桶的弯曲部分之外就不太理想了。通过在检视面板中（记住，木桶是旋转过的）将 `x` 和 `y` 值减小到 `2.5`，来降低\
  \ `BoxCollider` 的宽度。从场景视图的俯视角度（点击场景视图辅助工具的 `y` 轴），你可以看到 `BoxCollider` 现在适配到了木桶内部（图\
  \ 7-22）。\n\n![A310332_2_En_7_Fig22_HTML.jpg](img/A310332_2_En_7_Fig22_HTML.jpg)\n\
  \n图 7-22.  \n适配在木桶内的 `BoxCollider` 俯视图\n\n既然 `BoxCollider` 的大小已经调整到符合要求，那么重复处理 `CapsuleCollider`\
  \ 时的流程——在检视面板中右键单击 `BoxCollider`，选择 `Copy Component`，选中 `Box GameObject`，在检视面板中右键单击其\
  \ `Transform` 组件，然后选择 `Paste Component As New`。别忘了回到木桶上的 `BoxCollider`，右键单击它并选择\
  \ `Remove Component`。选中木桶后，你应该能在场景视图中看到两个 `Collider` 组件都被显示出来，它们共同提供的木桶形状近似度，比单独使用任何一个\
  \ `Collider` 组件都要好（图 7-23）。\n\n![A310332_2_En_7_Fig23_HTML.jpg](img/A310332_2_En_7_Fig23_HTML.jpg)\n\
  \n图 7-23.  \n展示复合碰撞体中的两个碰撞器\n\n### 更新预制件\n\n最后，既然木桶已经准备就绪，请在 `GameObject` 菜单中选择\
  \ `Apply Changes To Prefab`（图 7-24）。\n\n![A310332_2_En_7_Fig24_HTML.jpg](img/A310332_2_En_7_Fig24_HTML.jpg)\n\
  \n图 7-24.  \n将更改应用到 `BarrelPin` 预制件\n\n提示：建议执行 `Save Project` 或 `Save Scene`（这会隐式执行\
  \ `Save Project`）操作，以确保预制件的更改确实被保存了。项目更改会在 Unity 正常退出时保存，但如果它异常退出，则无法保证。\n\n更新预制件后，场景中就不再需要\
  \ `Barrel GameObject` 了，可以将其移除（`Command+Delete` 或从 `Edit` 菜单中选择 `Delete`）。现在，当你点击\
  \ `Play` 时，木桶不再会穿过地面掉下去，而且如图 7-25 所示，当你滚向它们时，它们会翻滚起来！\n\n![A310332_2_En_7_Fig25_HTML.jpg](img/A310332_2_En_7_Fig25_HTML.jpg)\n\
  \n图 7-25.  \n撞击木桶\n\n### 复杂碰撞体（HyperBowl）\n\n为 `BarrelPin` 预制件创建的复合碰撞体仍然相当简单，只由两个原始\
  \ `Collider` 组件构成。复合碰撞体可能复杂得多，具体取决于它们所近似的形状。作为更真实保龄球瓶的例子，请看 HyperBowl（图 7-26）。\n\
  \n![A310332_2_En_7_Fig26_HTML.jpg](img/A310332_2_En_7_Fig26_HTML.jpg)\n\n图 7-26.\
  \  \nHyperBowl 保龄球瓶的复合碰撞体\n\nHyperBowl 中保龄球瓶的复合碰撞体由六个原始碰撞器组成：一个提供底部平坦表面的 `BoxCollider`，一个用于球瓶颈部的\
  \ `CapsuleCollider`，以及四个大小不一的用于填充球瓶主体和顶部的 `SphereCollider`。\n\n## 添加声音\n\n你的保龄球游戏看起来不错了，但太安静了！你可以添加背景音乐或环境音效，比如舞厅场景中循环播放的音乐。但保龄球游戏确实应该具有基于碰撞的声音，例如球的滚动声和每个球瓶的碰撞声。\n\
  \n### 获取声音\n\n首先，你需要找到一些声音文件。让我们再次访问资源商店，搜索免费的 SFX（音效）（图 7-27）。\n\n![A310332_2_En_7_Fig27_HTML.jpg](img/A310332_2_En_7_Fig27_HTML.jpg)\n\
  \n图 7-27.  \n免费 SFX 的资源商店搜索结果\n\n来自 Bleep Blop Audio 的 `Free SFX Package` 列出了种类繁多的音频剪辑，让我们下载这个资源包。这些文件会出现在你的\
  \ `Assets` 文件夹内的一个名为 `Assets` 的“项目视图”文件夹中（向资源商店提交资源包有些棘手，所以这种文件组织方式可能并非有意为之）。\n\n\
  \n\n### 添加滚动音效\n\n你可以随意选择各种音效，然后在检视面板中点击播放按钮来试听。但目前，你将使用 `Sci-Fi_Ambiences` 音效作为球的滚动声。这并非一个完美的球滚动声，但它是这个资源包中唯一适合循环播放的音频剪辑（图\
  \ 7-28）。\n\n![A310332_2_En_7_Fig28_HTML.jpg](img/A310332_2_En_7_Fig28_HTML.jpg)\
  \  \n图 7-28. 用于球滚动音效的音频剪辑\n\n将此音频剪辑拖拽至层级视图中的 Ball 游戏对象上，然后选中该球。检视面板中应会显示一个新的 `AudioSource`\
  \ 组件，该组件是自动创建并引用了此音频剪辑的（图 7-29）。\n\n![A310332_2_En_7_Fig29_HTML.jpg](img/A310332_2_En_7_Fig29_HTML.jpg)\
  \  \n图 7-29. 带有音频源的球的检视面板\n\n滚动音效将由脚本控制，而非自动播放，因此请确保**唤醒时播放**复选框未被选中。但当滚动音效播放时，它应持续播放直到被告知停止，因此应选中**循环**复选框。\n\
  \n`AudioClip` 组件是一个 3D 音效，正如 `AudioClip` 名称下方的 `AudioSource` 组件所示。这意味着声音会随着 `AudioSource`\
  \ 组件与 `AudioListener` 组件（附着在主摄像机上）之间的距离而衰减。衰减由 `AudioSource` 组件底部显示的图形指定。你可以通过选择**音量衰减**选项并指定**最小距离**值来调整衰减，该值定义了衰减开始的距离。如果\
  \ `AudioListener` 组件与 `AudioSource` 组件之间的距离小于**最小距离**值，则声音完全不会衰减。你也可以通过沿着曲线拖拽手柄来直接操作衰减曲线。\n\
  \n**提示**  \n如果听不到音频源的声音，可以尝试从较高的**最小距离**值开始，确保能以最大音量听到，然后根据你的喜好调整**最小距离**值和衰减曲线。\n\
  \n用于播放滚动音效的脚本将附着在球上。创建一个新的 JavaScript，将其放在 `Scripts` 文件夹中，并命名为 `FuguBallSound`。然后将代码清单\
  \ 7-6 的内容添加到该脚本中。\n\n```\n#pragma strict\nvar minSpeed:float = 1.0; // 实际上是 minSpeed\
  \ 的平方\nprivate var sqrMinSpeed:float = 1.0;\nprivate var floorTag = \"Floor\";\n\
  function Awake() {\nsqrMinSpeed = minSpeed * minSpeed;\n}\nfunction OnCollisionStay(collider:Collision)\
  \ {\nif (collider.gameObject.tag == floorTag) {\nif (GetComponent.<AudioSource>().velocity.sqrMagnitude>sqrMinSpeed)\
  \ {\nif (!GetComponent.<AudioSource>().isPlaying) {\nGetComponent.<AudioSource>().Play();\n\
  }\n} else {\nif (GetComponent.<AudioSource>().isPlaying) {\nGetComponent.<AudioSource>().Stop();\n\
  }\n}\n}\n}\nfunction OnCollisionExit(collider:Collision) {\nif (collider.gameObject.tag\
  \ == floorTag) {\nif (GetComponent.<AudioSource>().isPlaying) {\nGetComponent.<AudioSource>().Stop();\n\
  }\n}\n}\n代码清单 7-6. 用于球滚动音效的 FuguBallSound.js 脚本\n```\n\n该脚本与 `FuguForce` 脚本有一些相似之处，因为两者都使用碰撞回调函数来跟踪球何时滚动，并检查碰撞游戏对象的标签以判断是否为地板。`FuguBallSound`\
  \ 只使用了两个 `OnCollision` 回调函数：`OnCollisionStay` 和 `OnCollisionExit`。没有实现 `OnCollisionEnter`，因为它与\
  \ `OnCollisionStay` 是冗余的（`FuguForce` 脚本实际上也不需要 `OnCollisionEnter`）。脚本的两个碰撞回调函数都引用了此组件的\
  \ `audio` 变量，该变量等价于此组件所在游戏对象的 `audio` 变量，并引用了附着的 `AudioSource`。\n\n当球在地板上时，`OnCollisionStay`\
  \ 会检查球的移动速度是否快于一个最小速度，该速度由公开变量 `minSpeed` 指定，以便在检视面板中进行调整。脚本实际上是将球速的平方与 `minSpeed`\
  \ 的平方进行比较，以避免平方根计算带来的性能开销。如果球在地板上且移动速度足够快，并且球的 `AudioSource` 尚未播放其音频剪辑，则脚本会开始播放该音频剪辑。如果球的速度降至足够低，滚动音效将停止。\n\
  \n`OnCollisionExit` 的任务则更简单，它只需要检查音频是否在播放，如果正在播放，则停止播放音频。换句话说，如果球因弹起或滚落而失去与地板的接触，则滚动音效停止。\n\
  \n将该脚本拖拽至层级视图中的球上（图 7-30），然后点击播放进行测试。当球滚动时，应能听到滚动声，当球停止时，声音应消失。\n\n![A310332_2_En_7_Fig30_HTML.jpg](img/A310332_2_En_7_Fig30_HTML.jpg)\
  \  \n图 7-30. 附着在 Ball 游戏对象上的 `FuguBallSound` 脚本\n\n\n\n### 添加球瓶碰撞音效\n\n现在你可以开始处理球瓶音效了。我们将使用免费\
  \ SFX 包中的 `Coin_Pick_Up_03` 音效来替代真实的保龄球瓶碰撞声（见图 7-31）。\n\n![A310332_2_En_7_Fig31_HTML.jpg](img/A310332_2_En_7_Fig31_HTML.jpg)\n\
  \n**图 7-31.** 用于球瓶碰撞音效的音频片段\n\n在项目视图中选择 `Pin` 预制件，然后使用检查器视图底部的**添加组件**按钮添加一个 `AudioSource`\
  \ 组件。接着，点击 `AudioSource` 组件的 `AudioClip` 字段右侧，选择 `Coin_Pick_Up_03` 音频片段。再次取消勾选**Play\
  \ On Awake**复选框，否则每次游戏启动时都会播放该音效。与球体滚动音效由附加在球体上的脚本播放类似，球瓶碰撞音效将由附加在每个球瓶上的脚本播放。创建一个新的\
  \ JavaScript 脚本，将其放置在 `Scripts` 文件夹中，并命名为 `FuguPinSound`。将代码清单 7-7 中的代码添加到该脚本中。\n\
  \n```\n#pragma strict\nvar minSpeed = 0.01;\nfunction OnCollisionEnter(collider:Collision)\
  \ {\nif (collider.relativeVelocity.sqrMagnitude > minSpeed) {\nif (collider.gameObject.tag\
  \ != \"Pin\") {\nGetComponent.<AudioSource>().Play(); // 击中除了其他球瓶以外的任何物体，播放音效\n\
  } else {\n// 否则，ID 较小的球瓶获得播放权\nif (gameObject.GetInstanceID() < collider.gameObject.GetInstanceID())\
  \ \nGetComponent.<AudioSource>().Play();\n}\n}\n}\n```\n\n**代码清单 7-7.** 用于球瓶碰撞音效的\
  \ `FuguPinSound.js` 脚本\n\n此脚本与 `FuguBallSound` 的不同之处在于，它使用了 `OnCollisionEnter` 回调函数，而非\
  \ `OnCollisionStay` 或 `OnCollisionExit` 回调函数。同样，这里也有一个 `minSpeed` 变量，用于与速度的平方大小进行比较。但这次的速度是碰撞的\
  \ `relativeVelocity` 变量，因为球瓶及其碰撞对象（球或其他球瓶）可能都在移动。\n\n这里假定每个球瓶都有一个名为 `Pin` 的标签，因此你可以测试球瓶是否正在与另一个球瓶碰撞。如果球瓶没有与另一个球瓶碰撞，那么它一定被球击中或正在掉落到地板上，此时脚本会播放碰撞音效。如果球瓶被另一个球瓶击中，则需要决定哪个球瓶来播放碰撞音效。否则，它们会同时播放音效。这里使用了一个简单的技巧来进行仲裁。Unity\
  \ 中的每个对象都有一个唯一的 ID 号，可以通过对象函数 `GetInstanceID` 获取。脚本中使用的规则是，ID 较小的球瓶获胜并获得播放碰撞音效的权限。\n\
  \n要将 `FuguPinSound` 脚本附加到 `BarrelPin` 预制件上，请在项目视图中选择该预制件，然后使用检查器视图中的**添加组件**按钮选择该脚本。在检查器视图中选中\
  \ `BarrelPin` 预制件时，同时将其标签设置为 `Pin`，这与 `FuguPinSound` 脚本的预期一致。与创建 `Floor` 标签并将其分配给\
  \ `Floor` 游戏对象的方式相同，在标签菜单中选中**添加标签**，在标签管理器（TagManager）中添加一个名为 `Pin` 的标签（确保创建的是新标签，而非新图层），然后再次选择\
  \ `Pin` 预制件，以便使用标签菜单选择新的 `Pin` 标签。顺便说一下，这是一个示例，说明了如何通过标签来标识一组元素，而不是像处理地板那样为每个元素指定唯一的名称。\n\
  \n现在，`BarrelPin` 预制件中的 `Barrel` 游戏对象在检查器视图中应如图 7-32 所示。\n\n![A310332_2_En_7_Fig32_HTML.jpg](img/A310332_2_En_7_Fig32_HTML.jpg)\n\
  \n**图 7-32.** 附加到 `BarrelPin` 预制件上的 `AudioSource` 和 `FuguPinSound` 脚本\n\n现在，当你点击**播放**并将球滚向木桶时，随着木桶的弹跳，会响起悦耳的硬币音效！\n\
  \n## 进一步探索\n\n此时，保龄球游戏开始变得像模像样了（而在上一章结束时，你充其量只能称之为一个*滚动*游戏）。但是，尽管玩家可以滚动球并击倒球瓶，你却仍然没有游戏规则。敬请期待下一章，其中将大量涉及脚本编写。事实上，本章算是一个转折点，趋势是脚本编写越来越多，而新组件的介绍越来越少。因此，从现在开始，你应该将大部分时间花在\
  \ Unity 文档的脚本参考部分。\n\n### 脚本参考\n\n我们引入了 `Object` 类中的 `Instantiate` 函数，以在运行时创建保龄球瓶。该函数用于生成游戏对象，通常是从预制件生成。在其他游戏中，你可能会使用\
  \ `Instantiate` 来生成从拾取物品到非玩家角色（NPC）的各种对象。该函数在“脚本概述”部分有描述，但“运行时类”中的页面提供了更详细的信息。\n\
  \n引入了一个新的回调函数 `Awake`，作为 `Start` 回调的替代。上一章介绍了 MonoBehaviour 碰撞回调函数 `OnCollisionEnter`、`OnCollisionStay`\
  \ 和 `OnCollisionExit`，本章再次用于滚动和碰撞音效。`Collision` 类用于获取碰撞信息，如 `relativeVelocity`、所碰撞的\
  \ `GameObject`。其他数据，如实际的接触点，也可获取。\n\n`Rigidbody` 组件的页面值得完整阅读。其变量与检查器视图中可用的属性大致对应，除了你用来推动球的\
  \ `AddForce` 函数之外，还有许多相关函数：`AddRelativeForce`、`AddTorque`、`AddRelativeTorque`、`AddExplosionForce`\
  \ 和 `AddForceAtPosition`。\n\n再次使用了 `Transform` 类，这次是通过检查 `Transform.position` 来确定球是否滚出了地板。由于提到了四元数，请查看\
  \ `Transform` 中的 `rotation` 和 `localRotation` 变量，并将其与 `eulerAngles` 和 `localEulerAngles`\
  \ 变量进行比较。从 `GameObject` 类中，使用 `SendMessage` 和 `BroadcastMessage` 函数来调用其他游戏对象中的 `ResetPosition`\
  \ 函数。还有一个 `SendMessageUpward` 函数，其工作方式类似于 `BroadcastMessage`，区别在于消息是沿游戏对象的层级结构向上而非向下发送。消息函数也在\
  \ `Component` 类中定义。\n\n使用 `AudioSource` 函数来播放和停止音频片段。如果你想优化音效代码，其他函数也很有用。例如，HyperBowl\
  \ 的滚动音效代码会根据球的速度改变音量（使用 `AudioSource.volume` 变量），这不仅提供了更逼真的滚动音效，而且在停止时也能更柔和地切断声音。\n\
  \n### 资源\n\n你看到了 Asset Store 有大量免费的木桶模型和音效库可供选择。如果你不局限于免费资源，还有更多选择。\n\n虽然 Asset\
  \ Store 还没有保龄球瓶模型，但在诸如 [`http://Turbosquid.com/`](http://turbosquid.com/) 这样的 3D\
  \ 模型市场上不难找到。包括保龄球音效在内的免费音频，可在基于知识共享许可的 [`http://freesound.org/`](http://freesound.org/)\
  \ 上找到。\n\n\n\n"
- "# 8. 开始游戏！为游戏编写脚本\n\n你的保龄球游戏在前几章中逐渐成形，现在开始有模有样了！游戏包含了保龄球、球瓶（更准确地说，是上一章添加的木桶）、游戏操作和物理效果。但缺少游戏规则和计分系统，它依然更像一个玩具而非真正的游戏。本章将通过大量的脚本来解决这个问题。大部分工作将在游戏控制器脚本\
  \ `FuguBowlPlayer.js` 中完成，该脚本将包含完整的保龄球游戏逻辑，并以有限状态机（FSM）的状态形式呈现。计分规则比较复杂，因此这些规则将被封装在名为\
  \ `FuguBowlPlayer.js` 的脚本中。\n\n好消息是，本章除了 `FuguBowlPlayer` 脚本之外，不需要添加任何新资源。坏消息是，需要输入大量新代码，特别是游戏控制器脚本。虽然你可能会想直接从本书项目网站上（[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)）复制本章在线版本的\
  \ `FuguBowl` 脚本，但如果你能从头开始、逐块构建（对于 FSM 而言，是逐个状态构建），会更容易掌握为未来项目实现游戏逻辑的方法。新的 `FuguBowlPlayer`\
  \ 脚本也是如此。\n\n## 游戏规则\n\n让我们快速回顾一下保龄球的规则。一局游戏包含十个回合。在每个回合中，你有两次投球机会来击倒全部十个球瓶。如果第一次投球就击倒了全部十个球瓶，这称为“全中”（strike），然后进入下一回合。如果两次投球才击倒全部十个球瓶，这称为“补中”（spare）。在第十个回合，如果你获得了补中或全中，将获得一次额外的第三次（也是最后一次）投球机会。游戏的最终得分是每个回合得分的总和。每个回合的得分是该回合击倒的球瓶数，除非该回合是全中或补中。如果是补中，得分是击倒的球瓶数（十个）加上下一次投球击倒的球瓶数。如果是全中，得分同样是十个，但要加上接下来两次投球击倒的球瓶数。因此，一场“完美”的比赛，即连续\
  \ 12 次全中，最终得分为 300 分（这个计算留作练习）。\n\n## 游戏计分\n\n`FuguBowl` 脚本已经定义了一个代表游戏的类，但将计分代码封装在玩家类中是有意义的，因为从概念上讲，存在一个玩家（虽然本游戏中只有一个，但潜在可能有多个），并且得分与玩家相关联。\n\
  \n此外，保龄球的计分规则并不简单。将保龄球得分计算的代码放在一个独立的脚本中，不仅能让游戏控制器脚本更简洁易读，还能使计分代码在其他保龄球游戏中得以复用。\n\
  \n首先，创建一个新的 JavaScript 文件，命名为 `FuguBowlPlayer`，并将其放在 Scripts 文件夹中（图 8-1）。\n\n![A310332_2_En_8_Fig1_HTML.jpg](img/A310332_2_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1.** 创建 `FuguBowlPlayer` 脚本\n\n### 单回合得分\n\n在 `FuguBowlPlayer` 脚本中，在实现 `FuguBowlPlayer`\
  \ 类之前，我们先从一个名为 `FuguBowlScore` 的支持类开始，它代表单个保龄球回合的得分（清单 8-1）。这个类很小，并且本身不是一个 `MonoBehavior`（例如，没有\
  \ `Start` 或 `Update` 回调），因此直接将其添加到 `FuguBowlPlayer` 脚本中即可。\n\n```\nclass FuguBowlScore\
  \ {\nvar ball1:int; // 第一次投球击倒的球瓶数\nvar ball2:int; // 第二次投球击倒的球瓶数\nvar ball3:int;\
  \ // 第三次投球击倒的球瓶数\nvar total:int; // 该回合的总得分（可能包含后续投球的加分）\nfunction Clear() {\nball1\
  \ = -1;\nball2 = -1;\nball3 = -1;\ntotal = -1;\n}\nfunction IsSpare():boolean {\n\
  // 不考虑第三次投球构成的补中\nreturn !IsStrike() &&\n(ball1 + ball2 == 10);\n}\nfunction IsStrike():boolean\
  \ {\nreturn ball1 == 10;\n}\n}\n**清单 8-1.** `FuguBowlPlayer.js` 中的 `FuguBowlScore`\
  \ 类\n```\n\n`FuguBowlScore` 类很简单，不继承自任何其他类（它可以被定义为 `struct` 而不是 `class`，只是 JavaScript\
  \ 不支持定义新的 `struct`）。该类包含实例变量，分别表示第一次投球、第二次投球以及（仅在第 10 回合相关的）奖励球的得分。`FuguBowlScore`\
  \ 还有一个变量用于保存该回合的总得分，如果当前回合是补中或全中，则该得分可能取决于后续投球的结果。\n\n每个变量都需要一种方式来表明其得分尚未计算。在对应球被投出之前，`ball1`、`ball2`\
  \ 和 `ball3` 的得分是不可用的。总得分在该回合投球完成之后才可用，即使如此，如果结果是补中或全中，仍然需要等到后续一次或两次投球后才能计算出得分。\n\
  \n将得分值保留为零是行不通的，因为当玩家没有击倒任何球瓶时，零是一个有效得分。但投球不可能产生负分，因此 -1 可以很好地作为得分尚未计算的指示符。`FuguBowlScore`\
  \ 中的 `Clear` 函数通过将所有变量设置为此数值来初始化该回合。\n\n除了 `Clear` 函数，`FuguBowlScore` 类还有另外两个成员函数。如果该回合投出了全中，`IsStrike`\
  \ 返回 `true`。这可以通过检查第一次投球击倒的球瓶数是否为十来轻松判断。`IsSpare` 函数稍复杂一点；如果第一次和第二次投球击倒的球瓶数之和为十，且该回合不是全中（换句话说，你并非第一次投球击中十瓶而第二次击中零瓶），则返回\
  \ `true`。\n\n请注意两个函数声明中添加的 `:boolean`。这明确了每个函数返回一个布尔值，尽管编译器可以从代码中推断出返回类型。\n\n\n\
  ### 玩家得分\n\n定义了 `FuguBowlScore` 类之后，现在你可以添加 `FuguBowlPlayer` 类，该类将聚合各帧的分数以计算整局游戏的总分（清单\
  \ 8-2）。与 `FuguBowlScore` 类似，即使 `FuguBowlPlayer` 类与脚本文件同名，它也是显式声明的，并且不会继承 `MonoBehaviour`（否则类声明中会包含“extends\
  \ MonoBehaviour”）。这不仅意味着它没有任何 Unity 回调函数，还意味着 `FuguBowlPlayer` 类不是 `Component` 的子类，因此该脚本无法附加到\
  \ `GameObject` 上。换句话说，`FuguBowlPlayer` 脚本充当了一个代码库，其中包含了供其他脚本使用的类。\n\n```\nclass\
  \ FuguBowlPlayer {\nvar scores:FuguBowlScore[]; // 游戏的所有 10 帧\n// 构造函数\nfunction\
  \ FuguBowlPlayer() {\nscores = new FuguBowlScore[10];\nfor (var i:int=0; i<scores.length;\
  \ ++i) {\nscores[i] = new FuguBowlScore();\n}\nClearScore();\n}\n// 重置所有帧的分数\nfunction\
  \ ClearScore() {\nfor (var score:FuguBowlScore in scores) {\nscore.Clear();\n}\n\
  }\n清单 8-2.\nFuguBowlPlayer.js 中 FuguBowlPlayer 类的初版\n```\n\n`FuguBowlPlayer` 类自然包含关于玩家的信息，例如，可以有一个\
  \ `String` 变量来存储玩家姓名。不过，基于本书的目的，我们将仅限于追踪玩家的保龄球得分。因此，该类只有一个实例变量 `scores`，它是一个 `FuguBowlScore`\
  \ 对象的内置数组。数组中的每个 `FuguBowlScore` 元素代表保龄球游戏中一帧的分数。\n\n**注意**\n\n内置数组的访问方式与 `Array`\
  \ 类的实例相同（在 `FuguBowl.js` 中用于 `pins` 变量）。内置数组的访问速度比 `Array` 实例快得多，并且当声明为公共变量时，可以在检视面板中编辑。然而，与\
  \ `Array` 实例不同，内置数组在运行时无法调整大小。\n\n类定义中的 `FuguBowlPlayer` 函数与类同名，这意味着它是一个构造函数，当创建该类的实例时会调用这个特殊函数。显式定义构造函数并非总是必需的（`FuguBowlScore`\
  \ 就没有），甚至在 `MonoBehaviour` 中是被禁止的。但在此处使用构造函数是合理的，因为每个新创建的 `FuguBowlPlayer` 都需要同时创建其\
  \ `scores` 数组。因此，`FuguBowlPlayer` 构造函数创建了一个包含十个元素的内置数组，声明其类型为 `FuguBowlScore`，并用新创建的\
  \ `FuguBowlScore` 实例填充该数组。\n\n构造函数还调用了 `ClearScore` 函数，该函数又对每个 `FuguBowlScore` 对象调用\
  \ `Clear`，确保它们初始状态都表示未登记任何分数。`FuguBowlPlayer` 类还包含 `IsSpare` 和 `IsStrike` 函数，它们对指定的\
  \ `FuguBowlScore` 对象调用同名函数，通过传入的参数在 `scores` 数组中索引该对象。由于数组索引从零开始，游戏中的十帧分别由索引 0 到\
  \ 9 表示。\n\n**注意**\n\n从某种意义上说，`FuguBowlPlayer` 类充当了 `FuguBowlScore` 类的包装器，以便其他脚本只需了解\
  \ `FuguBowlPlayer` 类。作为一种优化练习，你可以提供更多的抽象，让 `IsSpare` 和 `IsStrike` 接受范围在 1 到 10 的帧索引，然后在用作数组索引之前减去\
  \ 1。\n\n### 设置分数\n\n随着游戏的进行，每次投球后都需要更新分数。我们计划在 `FuguBowlPlayer` 类中添加名为 `SetBall1Score`、`SetBall2Score`\
  \ 和 `SetBall3Score`（用于第十帧）的函数。与该类中的 `IsSpare` 和 `IsStrike` 函数类似，这些新增函数将以帧索引作为参数。\n\
  \n如果前一帧是补中或全中，每次投球的分数可能会更新该帧的总分。因此，你首先需要在 `FuguBowlPlayer` 类中添加执行这些更新的函数，分别命名为 `SetSpareScore`（清单\
  \ 8-3）和 `SetStrikeScore`（清单 8-4）。\n\n`SetSpareScore` 函数将总分设置为第一次和第二次投球分数之和（应始终为十分），再加上下一次投球的分数，即下一帧的第一次投球分数。\n\
  \n```\nfunction SetSpareScore(frame:int) {\nvar framescore:FuguBowlScore = scores[frame];\n\
  // 分数为本帧两次投球的分数与下一帧第一次投球分数之和\nframescore.total = framescore.ball1+framescore.ball2+scores[frame+1].ball1;\n\
  }\n清单 8-3.\nFuguBowlPlayer 类中的 SetSpareScore 函数\n```\n\n`SetStrikeScore` 函数稍微复杂一些。它将总分设置为第一次投球的分数（应为十分）加上接下来两次投球的分数，这两次投球通常由下一帧的第一次和第二次投球组成。但如果下一帧是全中，那么接下来的两次投球就是下一帧的第一次投球和下下帧的第一次投球。\n\
  \n```\nfunction SetStrikeScore(frame:int) {\nvar framescore:FuguBowlScore = scores[frame];\n\
  framescore.total = framescore.ball1;\n// 总是加上下一帧第一次投球的分数\nframescore.total+=scores[frame+1].ball1;\n\
  if (frame < 8 && IsStrike(frame+1)) {\nframescore.total+=scores[frame+2].ball1;\n\
  } else {\n// 对于第九帧（帧索引 8），加上下一帧（即最后一帧）的第二次投球分数（始终存在）\nframescore.total+=scores[frame+1].ball2;\n\
  }\n}\n清单 8-4.\nFuguBowlPlayer 类中的 SetStrikeScore 函数\n```\n\n`SetSpareScore` 和 `SetStrikeScore`\
  \ 的使用在 `SetBall1Score` 的定义中得到了说明（清单 8-5）。第一行将帧的 `ball1` 变量设置为击倒的瓶数，该瓶数作为函数的第二个参数传入。然后，如果当前帧不是第一帧，`SetBall1Score`\
  \ 会检查前一帧是否投出了补中。如果是这种情况，前一帧正在等待本次投球的结果来计算该帧的总分，于是调用该帧的 `SetSpareScore` 来执行最终计算。\n\
  \n如果当前帧不是第一帧或第二帧，`SetBall1Score` 会检查前两帧是否都投出了全中。如果是，那么这两帧中的第一帧正在等待本次投球的结果来更新其总分，于是调用该帧的\
  \ `SetStrikeScore`。\n\n请注意，`SetBall1Score` 不会设置当前帧的总分。如果当前投球不是全中，则该帧尚未结束；如果当前投球是全中，则还需要再投两次才能更新该帧的总分（当然是通过\
  \ `SetStrikeScore` 函数！）。\n\n```\nfunction SetBall1Score(frame:int,pinsDown:int)\
  \ {\nscores[frame].ball1=pinsDown;\n// 如果前一帧是补中，设置其分数\nif (frame>0 && IsSpare(frame-1))\
  \ {\nSetSpareScore(frame-1);\n}\n// 如果前两帧都是全中，则设置第一帧的分数\nif (frame>1 && IsStrike(frame-1)\
  \ && IsStrike(frame-2)) {\nSetStrikeScore(frame-2);\n}\n}\n清单 8-5.\nFuguBowlPlayer\
  \ 类中的 SetBall1Score 函数\n```\n\n\n\n`SetBall2Score`函数（见代码清单 8-6）更为复杂，因为它需要处理更多情况。由于传入该函数的第二个参数是当前帧中已击倒的球瓶数，因此`ball2`变量被设定为（击倒的总瓶数）减去（第一球已击倒的瓶数），但有一个特殊情况——第一球为全中时除外。\n\
  \n通常，如果第一球是全中，则跳过第二球，甚至不会调用`SetBall2Score`。但如果第十局的第一轮是全中，那么第二球就会获得投掷机会，此时`ball2`被设定为击倒的总瓶数，因为第一轮全中后球瓶已被重置。\n\
  \n```\nfunction SetBall2Score(frame:int,pinsDown:int) {\nvar framescore:FuguBowlScore\
  \ = scores[frame];\nif (IsStrike(frame)) { // 此时必定在最后一局\nframescore.ball2=pinsDown;\n\
  } else {\nframescore.ball2=pinsDown-framescore.ball1;\n}\n// 如果不是补中或全中，则计算本局总分\n\
  if (!IsSpare(frame) && !IsStrike(frame)) {\nframescore.total= pinsDown;\n}\n// 如果前一局是全中，则设定该局得分\n\
  if (frame>0 && IsStrike(frame-1)) {\nSetStrikeScore(frame-1);\n}\n}\n```\n\n代码清单\
  \ 8-6. `FuguBowlPlayer`类中的`SetBall2Score`函数\n\n本局总分设为第一球与第二球得分之和，但补中或全中的情况除外——在这两种情况下，需要分别等待后续一轮或两轮投掷才能确定总分。\n\
  \n鉴于这是本局的第二球，且补中仅会将下一局的第一球得分累加进来，因此这一球不可能对前一局的补中得分产生贡献。然而，如果前一局是全中，则应当调用前一局的`SetStrikeScore`，因为它一直在等待本局的第一球和第二球以完成其总分。\n\
  \n`SetBall3Score`函数（见代码清单 8-7）是一个特殊情况，因为第三球只能在第十局中出现，且仅在以下情况中发生：第一球或第二球为全中，或者前两球完成了补中。当调用`SetBall3Score`时，如果第二球是全中或完成了补中（这两种情况下球瓶会在第三球前重置），则该函数将`ball3`变量设定为击倒的瓶数。否则，必然是第一球为全中而第二球并非全中，因此`ball3`被设定为（击倒总瓶数）减去（第二球击倒的瓶数）。\n\
  \n```\nfunction SetBall3Score(frame:int,pinsDown:int) {\nvar framescore:FuguBowlScore\
  \ = scores[frame];\nif (IsStrike(frame) && framescore.ball2 <10) {\nframescore.ball3\
  \ = pinsDown - framescore.ball2;\n} else {\nframescore.ball3 = pinsDown; // 补中或两次全中\n\
  }\nframescore.total = framescore.ball1+framescore.ball2+framescore.ball3;\n}\n```\n\
  \n代码清单 8-7. `FuguBowlPlayer`类中的`SetBall3Score`函数\n\n### 获取得分\n\n虽然用户界面的实现将在下一章进行，但你需要确保`FuguBowlPlayer`类支持得分显示。在现实或电脑游戏的典型保龄球记分牌中，每个局的每一轮投掷得分都会显示出来，这与`FuguBowlScore`类中的`ball1`、`ball2`和`ball3`变量完美匹配。此外，保龄球记分牌通常会有特殊标记来表示每一局中的补中或全中，`FuguBowlPlayer`类中的`IsSpare`和`IsStrike`函数可以满足这一需求。\n\
  \n不过，尽管`FuguBowlScore`有一个表示本局总分的`total`变量，但保龄球记分牌通常显示的是该局的游戏总得分，即截止到该局（含该局）的累计总分。例如，图\
  \ 8-2 展示了 HyperBowl 中投完两局后的记分牌样式。\n\n![A310332_2_En_8_Fig2_HTML.jpg](img/A310332_2_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2. HyperBowl 记分牌\n\n第一局显示了第一球和第二球的得分以及最终的局总分。第二局显示了其第一球得分以及第二球补中的标记。第二局中显示的游戏总得分是第一局的游戏总得分加上第二局的额外局总分。\n\
  \n这个例子为实现一个返回某局游戏总得分的函数提供了思路。代码清单 8-8 展示了这样一个函数——`GetScore`，将其添加到`FuguBowlPlayer`类中。如果指定的局是第一局，则`GetScore`返回该局总分。如果该局总分为`-1`（表示尚未可用），则`GetScore`返回`-1`，表示该局的游戏总得分尚不可用。\n\
  \n```\nfunction GetScore(frame:int):int {\nif (frame==0 || scores[frame].total==-1)\
  \ {\nreturn scores[frame].total;\n} else {\nvar prev:int = GetScore(frame-1);\n\
  if (prev==-1) {\nreturn -1;\n} else {\nreturn scores[frame].total+prev;\n}\n}\n\
  }\n```\n\n代码清单 8-8. `FuguBowlPlayer`类中的`GetScore`函数\n\n但如果局总分可用且该局不是第一局，则将该局总分加到前一局的游戏总得分上，除非前一局的游戏总得分尚不可用。如果前一局的游戏总得分不可用，则同样返回`-1`。\n\
  \n前一局的游戏总得分通过对该局调用`GetScore`获得，而该函数会继续对其前一局调用`GetScore`，如此直到第一局。`GetScore`是一个递归函数的例子，即调用自身的函数。无限递归被避免，因为最终`GetScore`会到达其基础情况——第一局，该局总会返回结果。\n\
  \n### 完整代码清单\n\n`FuguBowlScore`脚本的完整代码清单过于冗长，在此无法展示（长达四页），但其所有内容均已在本书中呈现。完整的脚本`FuguBowlScore.js`可在本章的项目文件中获得，下载地址为[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)。\n\
  \n如果你想用来自[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)的版本替换某个脚本，请在\
  \ Finder 中进行替换（即将该文件拖放或粘贴到该项目的 Scripts 文件夹中）。通常，只需从 Finder 将文件拖入 Project 视图这一功能非常方便，但在此情况下，Unity\
  \ 会重命名新文件以避免覆盖原文件。\n\n如果你的目的是替换脚本，请勿自行重命名原脚本，因为场景中的任何引用仍会指向该脚本的新名称。相反，如果你想保留副本，请复制原脚本（可以在\
  \ Finder 中复制，或使用 Unity Editor 中 Edit 菜单的 Duplicate 选项）。\n\n\n### 创建 FuguBowlPlayer\n\
  \n`FuguBowlPlayer` 类现已准备就绪，可以直接使用。由于该脚本未附加到 `GameObject` 上（也无法附加，因为 `FuguBowlPlayer`\
  \ 不是 `MonoBehaviour`），因此必须在运行时实例化 `FuguBowlPlayer`。最自然的做法是在 `FuguBowl` 脚本的 `Awake`\
  \ 回调中进行，该回调已在实例化保龄球瓶（见代码清单 8-9）。\n\n```\nstatic var player:FuguBowlPlayer = null;\n\
  function Awake() {\nplayer = new FuguBowlPlayer();\nCreatePins();\n}\n代码清单 8-9.\n\
  在 FuguBowl.js 中创建 FuguBowlPlayer\n```\n\n增强后的 `Awake` 回调会创建一个新的 `FuguBowlPlayer`\
  \ 实例，并将其赋值给变量 `player`，该变量声明为静态变量，便于从 `FuguBowl` 脚本外部访问（为下一章的计分板实现做准备）。\n\n若要支持多名玩家，`player`\
  \ 变量可以改为 `FuguBowlPlayers` 数组（使用可调整大小的数组，而非内置数组，以适应不同的玩家数量），并增加一些封装函数，如 `GetPlayer`\
  \ 和 `GetNumberOfPlayers`。但就本书而言，我们将保持简单，专注于单人游戏。\n\n## 球瓶状态\n\n现在，`FuguBowl` 脚本除了引用保龄球瓶和球之外，还引用了\
  \ `FuguBowlPlayer`。但要调用 `FuguBowlPlayer` 的计分函数，`FuguBowl` 必须传入被击倒的球瓶数量。与其在 `FuguBowl`\
  \ 中添加代码来判断球瓶是否倒下，更简洁的做法是将此逻辑写在附加到每个球瓶的脚本中。这样，`FuguBowl` 只需询问每个球瓶是否倒下，而无需了解球瓶的内部工作原理。\n\
  \n对于这个新的球瓶脚本，创建一个新的 JavaScript，命名为 `FuguPinStatus`，并将其放在 Scripts 文件夹中（图 8-3）。\n\n\
  ![A310332_2_En_8_Fig3_HTML.jpg](img/A310332_2_En_8_Fig3_HTML.jpg)\n\n图 8-3.\n\n\
  创建 FuguPinStatus.js 脚本。\n\n接下来，将代码清单 8-10 的内容添加到脚本中。\n\n```\n#pragma strict\nvar\
  \ knockedAngle:float = 45.0;\nprivate var initialAngles:Vector3;\nfunction Start\
  \ () {\ninitialAngles = transform.localEulerAngles;\n}\nfunction IsKnockedOver()\
  \ {\nreturn Mathf.Abs(transform.localEulerAngles.x-initialAngles.x) > knockedAngle\
  \ ||\nMathf.Abs(transform.localEulerAngles.y-initialAngles.y) > knockedAngle ||\n\
  Mathf.Abs(transform.localEulerAngles.z-initialAngles.z) > knockedAngle;\n}\n代码清单\
  \ 8-10.\nFuguPinStatus.js 的代码清单\n```\n\n脚本中的 `Awake` 回调将 `GameObject` 的初始旋转保存在私有变量\
  \ `initialAngles` 中，以便后续比较。函数 `IsKnockedOver` 根据球瓶围绕任何轴的旋转是否超过 `knockedAngle` 变量中指定的角度值，返回\
  \ `true` 或 `false`。\n\n在“项目”视图中，选择 `BarrelPin` 预制体中的 `Barrel` GameObject，然后使用“检查器”视图中的“添加组件”按钮附加\
  \ `FuguPinStatus` 脚本（图 8-4）。\n\n![A310332_2_En_8_Fig4_HTML.jpg](img/A310332_2_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4.\n\nFuguPinStatus.js 脚本附加到 Barrel 球瓶预制体上\n\n在查询每个球瓶是否被击倒之前，`FuguBowl` 脚本需要先找到这些球瓶。如果\
  \ `Array` 中填充的是基于胶囊体的 `Pin` 预制体，则查询变量 `pins` 中的每个 `GameObject` 即可；但当数组装满 `BarrelPin`\
  \ 类型的 GameObject 时，作为真正球瓶的 `Barrel` GameObject 是这些 `BarrelPin` 的子对象。\n\n幸运的是，在第\
  \ 7 章中，您已将所有“实际”球瓶（即带有 `Rigidbody` 和 `Mesh` 组件、会实际移动的 GameObject）标记为 `Pin` 标签。这使得可以使用静态函数\
  \ `GameObject.FindGameObjectsWithTag` 来检索所有实际球瓶的数组。该操作应在 `FuguBowl` 脚本的 `CreatePins`\
  \ 函数末尾进行，即在所有球瓶实例化完成后（代码清单 8-11）。被标记的球瓶被赋值给一个名为 `pinBodies` 的私有变量。\n\n```\nprivate\
  \ var pinBodies:GameObject[]; // 实际物理球瓶\nfunction CreatePins() {\npins = new Array();\n\
  var offset = Vector3.zero;\nfor (var row=0; row < pinRows; ++row) {\noffset.z +=\
  \ pinDistance;\noffset.x = -pinDistance * row / 2;\nfor (var n=0; n <= row; ++n)\
  \ {\npins.push(Instantiate(pin, pinPos + offset, Quaternion.identity));\noffset.x\
  \ += pinDistance;\n}\n}\npinBodies = GameObject.FindGameObjectsWithTag(\"Pin\");\n\
  }\n代码清单 8-11.\n在 FuguBowl.js 中声明和设置 pinBodies 变量\n```\n\n被击倒的球瓶数量由函数 `GetPinsDown`（代码清单\
  \ 8-12）统计，该函数会遍历 `pinObjects` 数组，每遇到一个 `IsKnockedOver` 函数返回 `true` 的球瓶，便递增局部变量 `pinsDown`。循环结束后，返回\
  \ `pinsDown` 计数器的值。\n\n```\nfunction GetPinsDown():int {\nvar pinsDown:int = 0;\n\
  for (var pin:GameObject in pinBodies) {\nif (pin.GetComponent(FuguPinStatus).IsKnockedOver())\
  \ {\n++pinsDown;\n}\n}\nreturn pinsDown;\n}\n代码清单 8-12.\nFuguBowl.js 中的 GetPinsDown\
  \ 函数\n```\n\n除了统计被击倒的球瓶数量，还可以将它们移除，就像在真实保龄球馆中，球瓶被击倒后会被清理掉一样。函数 `RemoveDownedPins`（代码清单\
  \ 8-13）会遍历 `pinBodies` 列表，并对每个 `IsKnockedDown` 返回 `true` 的球瓶调用 `SetActive(false)`。调用\
  \ `SetActive(false)` 等同于在“检查器”视图中取消选中 GameObject 左上角的复选框。每个被击倒的球瓶虽然不会从场景中完全移除，但会变得不可见且不会发生碰撞。\n\
  \n```\nfunction RemoveDownedPins() {\nfor (var pin:GameObject in pinBodies) {\n\
  if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {\npin.SetActive(false);\n\
  }\n}\n}\n代码清单 8-13.\nFuguBowl.js 中的 RemovePins 函数\n```\n\n当然，被停用的球瓶需要在某个时候重新激活。现有的\
  \ `ResetPins` 函数（代码清单 8-14）是一个合适的执行位置，因为在准备进行新一轮投球、将球瓶恢复至初始位置时会调用 `ResetPins`。\n\
  \n```\nfunction ResetPins() {\nfor (var pin:GameObject in pinBodies) {\npin.SetActive(true);\n\
  pin.SendMessage(\"ResetPosition\");\n}\n}\n代码清单 8-14.\nFuguBowl.js 中的 ResetPins\
  \ 函数\n```\n\n实际上，现在可以将对 `pins` 数组的循环替换为对 `pinBodies` 的循环。在循环内部，对每个球瓶调用 `SetActive(true)`\
  \ 以防其被停用，并且可以使用 `SendMessage` 替代 `BroadcastMessage`，因为已知 `pinBodies` 中的每个球瓶都附加了\
  \ `FuguReset` 脚本。\n\n## 游戏逻辑\n\n我强烈建议在尝试编写游戏逻辑代码之前，先将游戏绘制为有限状态机。有限状态机将程序表示为一组有限的状态。有限状态机在任何时刻都处于一个状态，并在状态之间进行转换。\n\
  \n注意\n\n术语“状态机”通常指代有限状态机，但从技术上讲，状态机的范围很广，从最简单、功能最弱的自动机类别——有限状态机，一直到具有无限内存和潜在无限数量状态的图灵机。\n\
  \n一旦您将游戏可视化为有限状态机，您就可以确信自己能够对其进行编码。反之，如果您无法将游戏流程可视化为有限状态机，那么您可能只有一个模糊的想法，尚未准备好实现它！\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 设计 FSM\n\n要绘制 FSM，请思考游戏将经历的所有状态。所有\
  \ FSM 都有一个初始状态，在这里是指新游戏开始。玩家从第一局的第一个球开始，滚动保龄球，滚动结束后，会得到一个“全中”、“补中”或普通分数。然后，玩家要么进入同一局的第二个球，要么进入新一局的第一个球，并重复此过程。如果玩家正在投第二个球，流程是相同的，只是转换到新一局的第一个球，或者如果这是第十局且玩家投出了“全中”或“补中”，则可能转换到第三个球。当所有十局完成后，FSM\
  \ 转换到 `GameOver` 状态，该状态可能会循环回到新游戏。\n\n图 8-5 展示了上述状态机可能的样子。\n\n![A310332_2_En_8_Fig5_HTML.jpg](img/A310332_2_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5. 保龄球游戏的状态机\n\n第一次就完全画对并不重要。通常，当你勾勒出程序的流程并开始编写脚本时，你会意识到遗漏了什么或存在更好的方法，然后你会回过头来调整最初的设计。这就像我的一位教授关于构造证明所说的——完成一个证明是一个混乱的过程，但之后你会回过头来清理它，并假装那本来就是你最初计划好的！\n\
  \n从技术上讲，FSM 没有记忆，因此一个真正完整的保龄球状态机需要为所有三个球，甚至所有十局复制大量状态。但是，一个拥有数百个状态的状态机将难以理解，这在很大程度上会违背其目的。你不必过于拘泥于此，因此我们假设存在一些变量来跟踪当前正在进行的局数和玩家正在投的是第几个球。\n\
  \n### 跟踪游戏进程\n\n清单 8-15 显示了 `FuguBowl` 脚本中定义的、用于跟踪当前局数和当前球的变量。\n\n```\nprivate var\
  \ state:String; // current state in the state machine\nenum Roll {\n    Ball1,\n\
  \    Ball2,\n    Ball3\n}\n清单 8-15. FuguBowl.js 中跟踪当前局数和球的变量\n```\n\n变量 `frame`\
  \ 使用 `int` 跟踪当前局数，范围从 0 到 9 而不是 1 到 10，因为当这个数字被传递给 `FuguBowlPlayer` 函数时，它将用作数组索引。\n\
  \n变量 `roll` 跟踪当前的投球数，它也可以被声明为 `int`，并选择一种约定，例如用数字 0 到 2 或 1 到 3 来表示一局中的三个可能的球。但是，定义一个\
  \ `enum`（枚举的简称）会更清晰，它本质上允许你定义一个新类型，其值来自一个命名值列表中的某一个。因此，`roll` 被声明为 `Roll` 类型，这是一个包含\
  \ `Ball1`、`Ball2` 或 `Ball3` 值的 `enum`。\n\n顺便提一下，到目前为止，你已经遇到了几种不同类型的类别：像 `int` 和\
  \ `boolean` 这样的原始类型，包含其他类型的内置数组，像 `Roll` 枚举这样的枚举，像 `Vector3` 这样的结构体，以及像 `GameObject`、`Component`\
  \ 和 `FuguBowlPlayer` 这样的类。在这些类别中，类和数组是引用类型，这意味着不同的变量可以引用该类型的同一个实例，并且对该实例的修改将通过引用该实例的每个变量可见。\n\
  \n### 启动状态机\n\n好了，现在你已经勾勒出了状态机，接下来该如何编写代码呢？FSM 非常有用，以至于包括 CryEngine、Unreal 和 Second\
  \ Life 在内的一些游戏引擎都为其脚本提供了内置支持。不幸的是，Unity 没有，但既然这是软件，就有多种方法来自制一些 FSM 支持。\n\n一种方法是在\
  \ `Update` 函数内部有一个大的条件语句，根据所处的状态执行不同的操作（我们可能会使用 `enum` 来定义这些不同的状态）。然而，这种方法往往会导致\
  \ `Update` 函数变得笨重。实际上，由于第 7 章添加到 `FuguBowl` 脚本中的 `Update` 回调将被你即将添加的状态机取代，你现在就应该从\
  \ `FuguBowl` 脚本中删除那个回调。\n\n另一种创建 FSM 的方法（我尝试过一段时间）是使用一个附加了多个脚本的 `GameObject` 来表示状态机，每个脚本代表一个状态。每当退出当前状态时，该脚本会禁用自身并启用下一个脚本或状态。这种方法很有吸引力，因为每个脚本或状态都有其自己的\
  \ `Update` 函数和其他回调。但我发现，如果整个 FSM 包含在单个脚本中，我的状态机会更容易理解和处理。\n\n最终，我决定使用协程来实现状态机。协程是可以一次挂起自己一个或多个帧的函数，通过调用\
  \ `yield` 来实现（该函数暂时放弃控制权，即使它尚未执行完毕）。你可以将每个状态实现为一个协程，当退出该状态时返回。在该状态中，协程执行该状态下应该发生的任何动作，但会反复地让步，以免阻塞\
  \ Unity 的其余部分（包括渲染和物理引擎）运行。在返回之前，协程会指定它将转换到的下一个状态。并非所有回调都可以用作协程。例如，`Awake` 不能用作协程，`Update`\
  \ 也不行，但 `Start` 可以让步，因此可以充当 FSM 控制器（清单 8-16）。\n\n```\nprivate var state:String;\
  \ // current state in the state machine\nenum Roll {\n    Ball1,\n    Ball2,\n \
  \   Ball3\n}\n清单 8-16. FuguBowl.js 中运行状态机的 Start 回调\n```\n\n当前状态的名称，即实现该状态的协程的名称，作为\
  \ `String` 保存在名为 `state` 的私有变量中。`Start` 回调无限循环，使用 `state` 的值反复调用 `StartCoroutine`\
  \ 来调用协程。`Start` 在调用 `StartCoroutine` 时让步，这样它会等待状态协程执行完毕，然后再使用 `state` 的下一个值启动一个协程。\n\
  \n被调用的协程不一定会让步，因此 `Start` 在循环中额外增加了一个让步操作，以确保在状态之间至少发生一次让步，让游戏引擎的其余部分有机会运行。\n\n\
  作为调试辅助手段，`Start` 在执行每个状态协程之前会调用 `Debug.Log`（图 8-6）。这是在测试游戏时跟踪状态机进度的便捷方法。\n\n![A310332_2_En_8_Fig6_HTML.jpg](img/A310332_2_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6. 状态机调试跟踪的控制台视图\n\n### 各状态\n\n按照惯例，你将在所有状态协程前加上 `State` 前缀，以表明这些函数是状态机中的状态。\n\
  \n#### StateNewGame\n\n保龄球状态机的初始状态是 `StateNewGame`（清单 8-17），它通过清除玩家得分并将当前局索引设置为\
  \ 0 来开始新游戏，指明玩家当前正在投掷游戏的第一局。\n\n```\nfunction StateNewGame() {\n    player.ClearScore();\n\
  \    frame = 0;\n    state = \"StateBall1\";\n}\n清单 8-17. FuguBowl.js 中的 StateNewGame\n\
  ```\n\n在返回（实际上是退出该状态）之前，`StateNewGame` 指定下一个状态是 `StateBall1`，即玩家开始投掷该局第一个球的状态。\n\
  \n\n\n#### StateBall1\n\n`StateBall1`（清单 8-18）执行的第一个操作是重置球瓶、球以及主摄像机的**位置**。在该状态首次进入时（即游戏开始时），这并不是必须的；但当玩家完成一局的投球并切换回此状态时，需要将所有物体恢复到起始位置和旋转角度（被击倒的球瓶旋转角度会发生变化）。\n\
  \n```\nfunction StateBall1() {\n  ResetEverything(); // 重置球瓶、摄像机和球\n  roll = Roll.Ball1;\n\
  \  state = \"StateRolling\";\n}\n```\n\n执行重置后，该状态将 `roll` 变量设置为 `Roll.Ball1`，表示玩家正在投这一局的第一球。最后，该状态切换到\
  \ `StateRolling`，即球滚向球瓶时所处的状态。\n\n#### StateBall2\n\n与 `StateBall1` 类似，`StateBall2`（清单\
  \ 8-19）首先重置球和主摄像机。\n\n```\nfunction StateBall2() {\n  ResetBall();\n  ResetCamera();\n\
  \  if (GetPinsDown() == 10) {\n    ResetPins();\n  } else {\n    RemoveDownedPins();\n\
  \  }\n  roll = Roll.Ball2;\n  state = \"StateRolling\";\n}\n```\n\n如果玩家进入此状态，通常意味着该局的第一球没有打出全中，现在需要在清理上一轮倒下的球瓶后，尝试击倒剩余球瓶。但如果所有球瓶都已倒下，则一定是第十局中的特殊情况：全中后还需投两球，此时球瓶需重置。\n\
  \n在退出该状态前，`roll` 被设置为 `Roll.Ball2`，与 `StateBall1` 一样，下一个状态设置为 `StateRolling`。\n\n\
  #### StateBall3\n\n说到第十局，这是唯一出现 `StateBall3`（清单 8-20）的情况，因为只有在那局中玩家才能投掷三次。\n\n```\n\
  function StateBall3() {\n  ResetBall();\n  ResetCamera();\n  if (GetPinsDown() ==\
  \ 10) {\n    ResetPins();\n  } else {\n    RemoveDownedPins();\n  }\n  roll = Roll.Ball3;\n\
  \  state = \"StateRolling\";\n}\n```\n\n`StateBall3` 与 `StateBall2` 一样，重置球的位置。如果玩家在该局的前几次投掷中击倒了十个球瓶（补中或两次全中），则重置球瓶；否则，清理上一轮倒下的球瓶。同样，该状态将\
  \ `roll` 变量设置为 `Roll.Ball3`，并切换到 `StateRolling`。\n\n#### StateRolling\n\n`StateRolling`（清单\
  \ 8-21）大致实现了第七章中创建并在本章前面弃用的 `Update` 函数。该状态每帧都会让出控制权，除了等待球的控制权应被释放外，不做任何操作。\n\n\
  ```\nfunction StateRolling() {\n  while (true) {\n    // 当球到达球瓶时释放控制\n    if (ball.transform.position.z\
  \ > pinPos.z) {\n      state = \"StateRolledPast\";\n      return;\n    }\n    //\
  \ 洗沟球\n    if (ball.transform.position.y < sunkHeight) {\n      state = \"StateGutterBall\"\
  ;\n      return;\n    }\n    yield;\n  }\n}\n```\n\n有两种情况可以确定投球结束：一种是球滚出球道边缘，这基本上与正常保龄球游戏中的洗沟球情况相同；另一种是球已滚动到球瓶位置（如果玩家不释放控制，游戏会变得过于简单——你可以像怪兽卡车一样在球瓶间来回碾压！）。\n\
  \n检测洗沟球很简单。与现已移除的 `Update` 回调类似，该状态检查球是否已下降到 `sunkHeight` 变量指定的 y 轴位置以下。如果是，则切换到洗沟球状态。另一种情况也几乎同样简单：检查球的\
  \ z 轴位置是否超过了第一个球瓶的 z 轴位置。本质上，该状态是在检查球是否已到达从左到右横跨球道、球瓶所在的“球瓶线”。如果到达，则切换到 `StateRolledPast`。\n\
  \n实际上，你在绘制有限状态机草图时并没有考虑加入 `StateGutterBall` 和 `StateRolledPast` ，但这并不棘手。你现在可以直接插入这些状态，取代之前\
  \ `StateRolling` 和 `StateRollOver` 之间的直接转换。\n\n\n\n#### `StateRolledPast`\n\n在球滚动足够距离到达球瓶后，将进入\
  \ `StateRolledPast` 状态（清单 8-22）。该状态通过禁用 `Ball`（球）和 `Main Camera`（主摄像机）控件来“释放”球。\n\
  \n```\nfunction StateRolledPast() {\n\tvar follow:Behaviour = Camera.main.GetComponent(\"\
  SmoothFollow\");\n\tif (follow != null) {\n\t\tfollow.enabled = false;\n\t}\n\t\
  ball.GetComponent(FuguForce).enabled = false;\n\tyield WaitForSeconds(rolledPastTime);\n\
  \tstate = \"StateRollOver\";\n}\n清单 8-22.\nFuguBowl.js 中球到达球瓶时进入的状态\n```\n\n为了禁用\
  \ `Main Camera`（主摄像机）的 `SmoothFollow` 脚本，该状态通过 `Camera` 类中的静态变量 `main` 访问 `Main\
  \ Camera`（主摄像机），并在该 `GameObject` 上调用 `GetComponent`，将要检索的组件类 `SmoothFollow` 作为参数传入。这会返回附加到\
  \ `Main Camera`（主摄像机）上的 `SmoothFollow` 脚本。然后该脚本被赋值给一个名为 `follow` 的局部变量。\n\n`follow`\
  \ 变量被声明为 `Behaviour` 类型，而 `Behaviour` 是 `Component` 的直接子类。一个 `Behaviour` 可以通过设置其\
  \ `enabled` 变量来启用或禁用。`follow` 变量本可以声明为更具体的类，比如 `MonoBehaviour`（`Behaviour` 的子类，也是任何可附加到\
  \ `GameObject` 的脚本的父类），甚至是 `SmoothFollow`（`SmoothFollow` 脚本最具体的类），因为所有这些类都从 `Behaviour`\
  \ 继承了 `enabled` 变量。但选择适合的最通用类能提供最大的灵活性。例如，如果你将 `follow` 声明为 `SmoothFollow` 类型，而之后决定使用不同的摄像机控制脚本，就必须调整\
  \ `follow` 的类型声明。\n\n**提示**\n\n对于类型声明，请使用实现了你所需要函数和变量的最通用类。\n\n不将 `follow` 声明为 `SmoothFollow`\
  \ 类型的另一个原因是：该项目在 [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)\
  \ 上提供的版本并未包含任何 Asset Store 或 Standard Assets 包，其中就包括 `SmoothFollow` 脚本。在项目中引用一个不存在的\
  \ `SmoothFollow` 类会导致编译器错误。\n\n正因如此，`SmoothFollow` 是以 `String`（字符串）形式传递给 `GetComponent`\
  \ 的，这样直到运行时调用 `GetComponent` 时才会去寻找该类，而在运行时 `GetComponent` 会返回 `null`。尝试访问 `null`\
  \ 上的 `enabled` 变量会导致错误，因此该状态在尝试禁用该脚本前，会先检查 `follow` 是否为空。附加到球上的 `FuguForce` 脚本以类似方式被禁用：在球上调用\
  \ `GetComponent` 来获取 `FuguForce` 脚本，然后将其 `enabled` 变量设为 false。但不同于 `Main Camera`（主摄像机）和\
  \ `SmoothFollow` 脚本，由于你确信球上附加了 `FuguForce` 脚本，因此在禁用该脚本前无需进行空值检查。\n\n此外，`GetComponent`\
  \ 是一个重载函数，其中一个版本接受 `String` 参数，另一个版本直接接受类。因此，这里没有将字符串 `\"FuguForce\"` 传递给 `GetComponent`，而是直接传递了\
  \ `FuguForce` 类。这样一来，如果类名拼写错误（例如 `GetComponent(FuguFource)`），就会产生编译器错误。\n\n如果传入一个拼写错误的类名字符串（例如\
  \ `GetComponent(\"FuguFource\")`），在编译时不会产生错误，这乍听起来可能是件好事，但最好还是尽早发现问题。在运行时，调用 `GetComponent`\
  \ 会返回 `null`，如果代码预期得到非空结果，就可能导致崩溃，或者引发令人头疼的调试过程，让你疑惑为什么那个脚本没有按预期被禁用。\n\n**提示**\n\
  \n尽可能让编译器帮你做错误检查。\n\n在某些时候，`SmoothFollow` 和 `FuguForce` 脚本需要被重新启用。自然的位置是在 `ResetCamera`\
  \ 和 `ResetBall` 函数中（清单 8-23），因为当一轮投球结束，且 `Main Camera`（主摄像机）和 `Ball`（球）`GameObject`\
  \ 各自被重置以开始下一轮投球时，就会调用这些函数。\n\n```\nfunction ResetBall() {\n\tball.GetComponent(FuguForce).enabled\
  \ = true;\n\tball.SendMessage(\"ResetPosition\");\n}\nfunction ResetCamera() {\n\
  \tvar follow:Behaviour = Camera.main.GetComponent(\"SmoothFollow\");\n\tif (follow\
  \ != null) {\n\t\tfollow.enabled = true;\n\t}\n\tCamera.main.SendMessage(\"ResetPosition\"\
  );\n}\n清单 8-23.\nFuguBowl.js 中的 ResetBall 和 ResetCamera 函数\n```\n\n在 `ResetBall`\
  \ 和 `ResetCamera` 这两个函数中，用于启用脚本组件的代码与用于禁用脚本的代码相同，只是将 `enabled` 变量设为了 true。\n\n在同时禁用\
  \ `FuguForce` 和 `SmoothFollow` 脚本后，`StateRolledPast` 会等待五秒钟，然后转换到下一个状态 `StateRollOver`，以便让球有时间滚入球瓶（或滚过球瓶）。一个循环调用\
  \ `yield` 直到所需时间过去（通过检查 `Time.time`）的 `while` 循环也能达到目的，但调用带有秒数参数的函数 `WaitForSeconds`\
  \ 并对其使用 `yield` 要方便得多。（在 `StateRolledPast` 中，秒数是硬编码为 5 的，但它可以很容易地改为一个公共变量以允许自定义。）结果就是，协程\
  \ `StateRolledPast` 会有效地暂停（不会阻塞 Unity 其余部分的执行），直到指定的时间过去。\n\n#### `StateGutterBall`\n\
  \n洗沟球状态比 `StateRolledPast` 简单得多。它只是直接转换到 `StateRollOver`（清单 8-24）。\n\n```\nfunction\
  \ StateGutterBall() {\n\tstate = \"StateRollOver\";\n}\n清单 8-24.\nFuguBowl.js 中洗沟球的状态\n\
  ```\n\n虽然看起来 `StateRolling` 可以直接转换到 `StateRollOver` 而无需经过 `StateGutterBall`，但包含\
  \ `StateGutterBall` 可以提供与 `StateRolledPast` 的某种对称性。在一个精良的保龄球游戏中，你很可能会实现某种关于你投出洗沟球的反馈。例如，在\
  \ HyperBowl 中，拼写出 “Gutter” 的动画字母会飞过屏幕（图 8-7），而这个动画就是在 `StateGutterBall` 中发生的。\n\n\
  ![A310332_2_En_8_Fig7_HTML.jpg](img/A310332_2_En_8_Fig7_HTML.jpg)\n\n**图 8-7.**\
  \ HyperBowl 中洗沟球的动画文本\n\n顺便提一下，这些字母是用 iTween 制作动画的。你也不仅限于视觉反馈。在我 App Store 上的 Fugu\
  \ Bowl 应用中，`StateGutterBall` 会播放孩子们喝倒彩的声音！\n\n\n#### `StateRollOver`\n\n当保龄球的滚动被视为完成（球滚出球道进入沟槽或到达球瓶线）时，FSM\
  \ 进入 `StateRollOver` 状态（清单 8-25），该状态通过计算得分来结束当前轮次。\n\n```\nfunction StateRollOver()\
  \ {\nvar pinsDown:int = GetPinsDown();\n//    Debug.Log(\"pins down: \"+pinsDown);\n\
  switch (roll) {\ncase Roll.Ball1: player.SetBall1Score(frame,pinsDown); break;\n\
  case Roll.Ball2: player.SetBall2Score(frame,pinsDown); break;\ncase Roll.Ball3:\
  \ player.SetBall3Score(frame,pinsDown); break;\n}\nif (roll == Roll.Ball1 && player.IsStrike(frame))\
  \ {\nstate = \"StateStrike\";\nreturn;\n}\nif (roll == Roll.Ball2 && player.IsSpare(frame))\
  \ {\nstate = \"StateSpare\";\nreturn;\n}\nstate = \"StateKnockedSomeDown\";\n}\n\
  ```\n\n清单 8-25. `FuguBowl.js` 中用于一轮结束的状态\n\n此状态首先通过调用 `GetPinsDown` 函数确定击倒了多少个球瓶。然后根据这是第一球、第二球还是第三球，将该数字传递给相应的\
  \ `FuguBowlPlayer` 计分函数，从而记录本轮得分。下一个状态取决于本轮结果：是全中（仅可能发生在第一球）、补中（仅可能发生在第二球），还是其他结果。（`StateKnockedSomeDown`\
  \ 这个名字不太理想，毕竟你可能一个球瓶都没击倒，但我觉得它比 `StateNotSpareOrStrike` 更好。）\n\n#### `StateSpare`、`StateStrike`\
  \ 和 `StateKnockedSomeDown`\n\n与落沟球状态类似，表示全中、补中及其他结果的状态没有任何操作，只是转换到下一个状态（清单 8-26）。\n\
  \n```\nfunction StateSpare() {\nstate=\"StateNextBall\";\n}\nfunction StateStrike()\
  \ {\nstate = \"StateNextBall\";\n}\nfunction StateKnockedSomeDown() {\nstate=\"\
  StateNextBall\";\n}\n```\n\n清单 8-26. `FuguBowl.js` 中的 `StateSpare`、`StateStrike`\
  \ 和 `StateKnockedSomeDown` 状态\n\n这三个状态都会转换到 `StateNextBall`，因此很容易让人觉得这些状态是多余的，想要完全删除它们。但在一个完整的保龄球游戏中，你可能会在每个状态中触发某种反馈，例如打出全中时的祝贺音效和画面。我提到过，App\
  \ Store 上的 Fugu Bowl 在落沟球时会发出嘘声。同一个应用在全中时会发出欢呼声，这发生在 `StateStrike` 中。而 HyperBowl\
  \ 则在 `StateSpare` 和 `StateStrike` 中分别显示动画文字“SPARE”和“STRIKE”。\n\n#### `StateNextBall`\n\
  \n`StateNextBall` 是目前为止最复杂的状态（清单 8-27），因为大多数保龄球规则都在这里生效。你需要在此决定是在当前轮次再投一球，还是进入下一轮。\n\
  \n```\nfunction StateNextBall() {\nif (frame == 9) { // 最后一轮\nswitch (roll) {\n\
  case Roll.Ball1: // 总是有第二次投球\nstate = \"StateBall2\";\nbreak;\ncase Roll.Ball2:\
  \ // 如果补中或全中则有奖励球\nif (player.IsSpare(frame) || player.IsStrike(frame)) {\nstate\
  \ = \"StateBall3\";\n} else {\nstate = \"StateGameOver\";\n}\nbreak;\ncase Roll.Ball3:\n\
  state = \"StateGameOver\";\nbreak;\n}\n// 所有其他轮次\n} else if (roll == Roll.Ball1\
  \ && !player.IsStrike(frame)) {\nstate = \"StateBall2\";\n} else {\n++frame;\nstate\
  \ = \"StateBall1\";\n}\n}\n```\n\n清单 8-27. `FuguBowl.js` 中用于过渡到下一球的状态\n\n第十轮尤其复杂，因为你需要检查游戏是否结束，并且可能有三球投掷机会。那么，我们先看代码底部适用于前九轮的部分。如果你刚完成\
  \ `Ball1` 的投掷且未全中，则下一个状态是 `StateBall2`。否则，要么你投了 `Ball2`，要么你已经全中，因此下一个状态是 `StateBall1`，并将轮次索引加一。在第十轮中，你至少投两球，所以如果你刚投了\
  \ `Ball1`，则下一个状态设置为 `StateBall2`。如果你刚投了 `Ball2` 且结果是补中或全中，则下一个状态设置为 `StateBall3`；否则进入游戏结束状态。当然，如果你刚投了\
  \ `Ball3`，这是最后一次可能的投球，你也会进入游戏结束状态。\n\n#### `StateGameOver`\n\n最终，你到达了游戏结束状态 `StateGameOver`（清单\
  \ 8-28）。\n\n```\nfunction StateGameOver() {\nDebug.Log(\"Final Score: \"+player.GetScore(9));\n\
  yield WaitForSeconds(gameOverTime);\nstate=\"StateNewGame\";\n}\n```\n\n清单 8-28.\
  \ `FuguBowl.js` 中的游戏结束状态\n\n无需花哨的用户界面（Unity GUI 系统将在下一章介绍），我们借此机会通过函数 `Debug.Log`\
  \ 在控制台视图中打印最终分数。最终分数通过调用 `FuguBowlPlayer` 函数 `GetScore` 并传入数组索引 `9` 来获取，这表示你需要第十轮计算的总分。\n\
  \n在一个完整的保龄球游戏中，这里应该显示“游戏结束”消息、将分数提交到排行榜，并执行任何其他游戏结束时合适的操作（在 HyperBowl 中，会调用 `Application.LoadLevel`\
  \ 函数切换到显示分数的场景并呈现奖杯）。现在，我们只需过渡回 `StateNewGame` 并开始新游戏。\n\n### 完整清单\n\n经过大修的 `FuguBowl`\
  \ 脚本甚至比 `FuguBowlPlayer` 脚本还要大得多，因此此处不展示 `FuguBowl.js` 的完整清单。完整脚本可在 [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)\
  \ 获取，其所有内容已在本节中逐一（或大部分按状态）呈现。\n\n## 深入探索\n\n本章改变了节奏，专注于脚本编写。大部分脚本以状态机的形式添加到了游戏控制器脚本\
  \ `FuguBowl.js` 中，而计分代码则整合到了一个新脚本 `FuguBowlPlayer.js` 中。\n\n如果你厌倦了编写大块代码，渴望回到最初那些短小的脚本片段，那你只需再忍受一章，在下一章为用户界面编写一个更大的脚本。同时，作为本章新增计分代码的对应部分，下一章还将包含一个用于显示记分牌的小型附加脚本。\n\
  \n### Unity 手册\n\n状态机不仅适用于游戏控制逻辑，也适用于任何可以表示为经历不同状态的事物（简单示例：灯亮或灭、武器上膛并锁定、门开或关）。状态机在动画（行走、跑动、投掷）中特别有用，这就是为什么\
  \ Mecanim 动画系统拥有自己的 FSM 功能。这在 Unity 手册的“动画状态机”部分的“Mecanim 动画系统”一节中有详细说明。\n\n###\
  \ 脚本参考\n\n本章介绍的主要脚本技术是协程的使用，特别是在 `FuguBowl` 脚本中实现 FSM。脚本参考的“脚本概述”部分有一个“协程和 `Yield`”页面，提供了基本解释和一些示例。\n\
  \n与协程相关的类包括 `Coroutine` 和 `WaitForSeconds`（两者都继承自 `YieldInstruction`）。你使用的一个函数是\
  \ `MonoBehaviour` 的 `StartCoroutine` 函数。每个 `MonoBehaviour` 回调的文档页面都指定了该回调是否可以用作协程（如你所见，`Start`\
  \ 可以，但 `Awake`、`Update` 和 `FixedUpdate` 不行）。\n\n`FuguBowl` 脚本中添加的代码也频繁涉及访问组件，因此“访问组件”页面与此相关。该页面列出了可用于访问常用附加组件的\
  \ `Component` 和 `GameObject` 变量，并提供了如何调用 `GetComponent` 函数（在组件或 `GameObject` 上）来访问组件（包括脚本）的示例。\n\
  \n\n\n### 资源商店\n\n资源商店上提供了多个更复杂的有穷状态机框架。在资源商店窗口中搜索 `fsm` 会显示出多个结果，其中包括由 Huton Games\
  \ 开发的名为 Playmaker 的流行可视化编程包，其官网地址为 [`http://hutongames.com/`](http://hutongames.com/)。\n\
  \n### 网络资源\n\n维基百科（[`http://wikipedia.org/`](http://wikipedia.org/)）对保龄球及其计分规则进行了详尽描述。在该网站搜索\
  \ `bowling` 即可找到相关内容。如果你搜索 `state machine`，则会看到一篇关于有穷状态机的文章，其内容可能超乎你的想象！\n\n最著名的虚拟世界之一《第二人生》也支持有穷状态机。在《第二人生》的维基页面（[`http://wiki.secondlife.com`](http://wiki.secondlife.com)）中搜索\
  \ `state`，即可了解如何通过林登脚本语言（LSL）定义状态。\n\n"
- "# 9. 游戏图形用户界面\n\n在过去的几个章节中，你已经构建了一个相当完整的保龄球游戏，涵盖 3D 图形、物理、音效、玩家控制和自动摄像机移动。该游戏几乎具备\
  \ 3D 游戏应包含的所有功能类别，唯独缺少一项：图形用户界面（GUI）。具体而言，保龄球游戏应该有一个记分牌，并且游戏通常还需要一个在游戏开始和暂停时显示的菜单。\n\
  \n提示\n\n我曾有一款 iOS 游戏因未包含暂停菜单而被苹果拒绝，因此我建议你添加一个暂停菜单——即便仅仅为了避免这种情况。\n\n在本章中，你将使用 Unity\
  \ 内置的 GUI 系统——UnityGUI 来实现记分牌和启动/暂停菜单。（你可以通过名称的酷炫程度来判断 Unity 功能的存在时长——较新的功能通常有像\
  \ Shuriken、Mecanim 和 Beast 这样的名字。）\n\n本章项目的记分牌和暂停菜单脚本可通过位于 [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)\
  \ 的“下载源代码”按钮获取。但需要再次不厌其烦地强调，逐行逐函数地输入代码才是最佳的学习方式！\n\n## 记分牌\n\n我们先从记分牌开始，因为它比菜单更简单。记分牌只需要显示信息，无需交互功能。如前一章所述，典型的保龄球记分牌会显示每一局的结果（即第一球、第二球，第十局可能还有第三球），以及截止到该局的累计总分。这里不需要任何花哨的设计；只需通过文本显示分数，即将记分牌绘制为一系列标签，每个标签用文字显示对应局的分数。\n\
  \n#### 创建脚本\n\n让我们开始创建一个带有记分牌脚本的 `GameObject`（这过程现在应该很熟悉了）。在项目视图中，于 `Scripts` 文件夹内新建一个\
  \ JavaScript 文件，并将其命名为 `FuguBowlScoreboard`（见图 9-1）。\n\n![A310332_2_En_9_Fig1_HTML.jpg](img/A310332_2_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1.**  \n创建 `FuguBowlScoreboard.js` 脚本\n\n接下来，在层级视图中新建一个 `GameObject`，命名为\
  \ `Scoreboard`，并将 `FuguBowlScoreboard` 脚本附加到该对象上。\n\n现在你可以开始向 `FuguBowlScoreboard`\
  \ 脚本中添加 UnityGUI 代码了。如果你曾使用过其他 GUI 系统开发用户界面，可能会觉得 UnityGUI 有些特别。UnityGUI 控件并非创建和放置具有回调函数（用于响应按钮点击等事件）的\
  \ GUI 对象，而是在每帧（实际上每帧会调用多次）被调用的 `OnGUI` 回调函数内部进行创建。为了快速演示 UnityGUI 的工作原理，请将代码清单 9-1\
  \ 的内容放入 `FuguBowlScoreboard` 脚本中。\n\n```javascript\n#pragma strict\nfunction OnGUI()\
  \ {\n    GUI.Label(Rect(5,100,200,20),\"这是一个标签\");\n}\n```\n\n**代码清单 9-1.** 在 `FuguBowlScoreboard.js`\
  \ 中测试简单的 UnityGUI 标签\n\n所有 UnityGUI 控件都是通过调用 `GUI` 类（以及 `GUILayout` 类，我将在下一节介绍它）的静态函数来创建的。代码清单\
  \ 9-1 中的 `OnGUI` 回调调用了 `GUI.Label` 来绘制一个标签，传入了一个 `Rect`（矩形）参数，指定标签绘制在屏幕坐标 `5,100`\
  \ 处（UnityGUI 的坐标系以屏幕左上角为 `0,0`），宽度和高度分别为 `200` 和 `20` 像素。第二个参数是要在标签中显示的文本。点击播放，你应该会在屏幕上看到“这是一个标签”。\n\
  \n如果用户界面很复杂，将所有界面代码放在一个脚本回调函数中会显得笨重。但对于这个简单的界面，`OnGUI` 回调已经足够方便，你可以在此基础上扩展，形成一个基础、纯文本的保龄球记分牌。让我们用代码清单\
  \ 9-2 的内容替换 `FuguBowlScoreboard` 中的单标签示例。\n\n```javascript\n#pragma strict\nvar\
  \ style:GUIStyle; // 自定义外观\nfunction OnGUI() {\n    for (var f:int=0; f<10; f++)\
  \ {\n        var score:String=\"\";\n        var roll1:int = FuguBowl.player.scores[f].ball1;\n\
  \        var roll2:int = FuguBowl.player.scores[f].ball2;\n        var roll3:int\
  \ = FuguBowl.player.scores[f].ball3;\n        switch (roll1) {\n            case\
  \ -1: score += \" \"; break;\n            case 10: score +=\"X\"; break;\n     \
  \       default: score += roll1;\n        }\n        score+=\"/\";\n        if (FuguBowl.player.IsSpare(f))\
  \ {\n            score +=\"I\";\n        } else {\n            switch (roll2) {\n\
  \                case -1: score += \" \"; break;\n                case 10: score\
  \ +=\"X\"; break;\n                default: score += roll2;\n            }\n   \
  \     }\n        if (f==9) {\n            score+=\"/\";\n            if (10==roll2+roll3)\
  \ {\n                score +=\"I\";\n            } else {\n                switch\
  \ (roll3) {\n                    case -1: score += \" \"; break;\n             \
  \       case 10: score +=\"X\"; break;\n                    default: score += roll3;\n\
  \                }\n            }\n        }\n        GUI.Label(Rect(f*30+5,5,50,20),score,style);\n\
  \        var total:int=FuguBowl.player.GetScore(f);\n        if (total != -1) {\n\
  \            GUI.Label(Rect(f*30+5,20,50,20),\" \"+total,style);\n        }\n  \
  \  }\n}\n```\n\n**代码清单 9-2.** 保龄球记分牌\n\n新的 `OnGUI` 回调会循环遍历全部十局比赛，从 `FuguBowlPlayer`\
  \ 查询代表每局比赛的 `FuguBowlScore`。在循环底部，会调用一次或两次 `GUI.Label`。第一个 `GUI.Label` 显示每局中各球的分值，第二个\
  \ `GUI.Label` 绘制在第一个的下方，显示该局（如果已计算）的游戏累计总分。\n\n循环中的大部分代码用于确定每局中各球应显示的内容。对于 `ball1`，如果尚未投掷，则显示的字符串仅为一个空格。如果投出了全中，则显示字母\
  \ `X`。否则，显示数字分数（`1` 到 `9`）。\n\n\n\n`Ball2` 与 `Ball1` 类似，不同之处在于它还显示字母 `I` 表示补中。通常，`I`\
  \ 会使用斜杠字符（`/`）表示补中，但此处该字符用于分隔 `Ball1`、`Ball2` 和 `Ball3` 的得分。\n\n`Ball3` 的 `String`\
  \ 仅当当前局为第十局（索引 9）时才构建。`Ball3` 与 `Ball2` 相同，只是它检查的是 `Ball2` 和 `Ball3` 的组合补中，而非 `Ball1`\
  \ 和 `Ball2`。\n\n每局总得分仅需调用 `FuguBowlPlayer` 函数的 `GetScore` 即可获取，并且只要得分可用（即不等于 `-1`），就会显示出来。每个\
  \ `GUI.Label` 的 `Rect` 相对于屏幕左上角偏移，偏移量根据 `GUI.Label` 所显示的局数递增（图 9-2）。\n\n![A310332_2_En_9_Fig2_HTML.jpg](img/A310332_2_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2. 由 `FuguBowlScoreboard.js` 显示的保龄球记分牌\n\n图 9-2 显示了第四局第二球时的比赛情况。第一球击倒了三个球瓶。前两局均为全中，第三局为补中（第一球击倒五个球瓶，第二球也击倒五个）。第一局的总得分为：全中\
  \ 10 分，加上后续两球击倒的球瓶数，即第二局全中 10 分，再加上第三局第一球的 5 分，总计 25 分。\n\n第二局也是全中，因此得分为：10 分加上第三局第一球的\
  \ 5 分和该局第二球的 5 分，总计 20 分。加上第一局的 25 分，比赛总分为 45 分。\n\n第三局为补中，因此得分为：10 分再加上下一球击倒的 3\
  \ 分，总计 13 分；加上上一局后的比赛总分，即 58 分。可见，你的计分代码和记分牌代码运行正常！\n\n### 设计 GUI 样式\n\nGUI 控件的外观可以通过\
  \ `GUIStyle` 进行自定义，`GUIStyle` 是一组影响控件显示效果的属性集合。从概念上讲，它类似于用于格式化网页内容的层叠样式表（CSS）。\n\
  \n每个创建 GUI 控件的 GUI 函数都是重载函数，有两种形式：一种使用默认的 `GUIStyle`，另一种接受 `GUIStyle` 参数。最初的单标签示例仅使用了默认的\
  \ `GUIStyle`，但记分牌使用的是接受 `GUIStyle` 参数的 `GUI.Label` 版本，这样可以自定义记分牌的外观。\n\n传递给 `GUI.Label`\
  \ 的 `GUIStyle` 绑定到了一个名为 `style` 的公共变量上，这样就能在 Inspector 视图中自定义 `GUIStyle`。例如，由于记分牌全是文本，你可以点击\
  \ `style` 属性中 Normal 子项的 Text Color 字段（相当于在脚本中访问 `style.onNormal.textColor`），调出颜色选择器并更改记分牌的颜色（图\
  \ 9-3）。\n\n![A310332_2_En_9_Fig3_HTML.jpg](img/A310332_2_En_9_Fig3_HTML.jpg)\n\n\
  图 9-3. `GUIStyle` 选项\n\n在众多其他 `GUIStyle` 属性中，有几个会影响 GUI 字体，默认字体是 Unity 内置的 Arial\
  \ 字体。你可以通过将项目视图中的字体资源拖拽到 `GUIStyle` 的 Font 字段（在脚本中，即变量 `style.font`）来更改字体。任何 TrueType、OpenType\
  \ 或 dfont 格式的字体都可以导入 Unity。\n\n其他 `GUIStyle` 属性可控制字号、样式（对于作为动态字体导入的字体）、文本对齐和自动换行。\n\
  \n富文本格式尤其有趣，因为它允许在标签文本中使用类似 HTML 的标记。因此，虽然脚本很简单，但样式自定义选项非常丰富！\n\n## 暂停菜单\n\n与记分牌相比，开始/暂停菜单需要更多的脚本编写工作，因此，首先需要设计一个方案。让我们创建一个主菜单和两个子菜单：一个用于游戏选项，另一个用于显示游戏致谢。选项菜单将包含音频、图形、系统和统计数据等不同的面板。其逻辑虽然没有保龄球游戏控制器那么复杂，但这也是一个需要先以状态图（图\
  \ 9-4）形式勾勒出设计的例子。\n\n![A310332_2_En_9_Fig4_HTML.jpg](img/A310332_2_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4. 暂停菜单的状态图\n\n该图显示，玩家可以从游戏进行状态（或等同于菜单不可见状态）进入主暂停菜单，然后进入致谢画面或选项菜单，也可以退出游戏。而选项菜单又可以显示音频、图形、系统或统计面板，每个面板都可以列为单独的状态，但为了简化起见，我们暂时将每个顶层菜单画面视为一个状态。\n\
  \n除 `Quit`（可视为退出状态）之外的所有状态，都可以返回到最初进入它们之前的状态，这就是为什么每个转换箭头都绘制为双向的原因。这意味着玩家可以从主菜单进入选项菜单，再返回主菜单，然后从那里返回到正常游戏模式。但不会有例如从选项菜单直接返回游戏状态的快捷方式。\n\
  \n#### 创建脚本\n\n让我们开始实现暂停菜单，在项目视图的 Scripts 文件夹中创建一个新的 JavaScript 脚本，并将其命名为 `FuguPause`（图\
  \ 9-5）。\n\n![A310332_2_En_9_Fig5_HTML.jpg](img/A310332_2_En_9_Fig5_HTML.jpg)\n\n\
  图 9-5. 创建 `FuguPause.js` 脚本\n\n现在，为了将脚本添加到场景中，在 Hierarchy 视图中创建一个新的 `GameObject`，将其命名为\
  \ `PauseMenu`，并将 `FuguPause` 脚本附加到 `PauseMenu` `GameObject` 上。\n\n### 跟踪当前菜单页面\n\
  \n在 `FuguBowl` 脚本中使用协程实现状态机的技术不适用于 UnityGUI，因为所有 UnityGUI 函数都必须在 `OnGUI` 回调中调用。但状态图仍然可以作为实现的基础。首先，可以关注表示不同菜单画面的状态。为了将它们与更通用的术语“画面”区分开，我们称这些状态为“页面”。这些菜单状态可以用字符串或整数来区分，但当有多个相关但不同的值时，枚举更合适。因此，让我们定义一个名为\
  \ `Page` 的 `enum` 来表示菜单页面状态，以及一个名为 `currentPage` 的变量来跟踪当前正在显示的页面（清单 9-3）。\n\n```enum\
  \ Page {\nNone, Main, Options, Credits\n}```清单 9-3. 菜单页面的枚举\n\n根据状态图，该 `enum` 列出了无菜单（游戏进行中）、主菜单页面、选项页面和致谢页面的状态。因为变量\
  \ `currentPage` 的类型是 `Page`，所以只能将值 `Page.None`、`Page.Main`、`Page.Options` 和 `Page.Credits`\
  \ 赋给该变量。\n\n\n\n### 暂停游戏\n\n制作暂停菜单需要解决两个问题：创建菜单以及让游戏暂停。我们将从让游戏暂停开始。静态变量 `Time.timeScale`\
  \ 指定模拟游戏时间前进的速度，默认为 1。将 `Time.timeScale` 设置为 0 即可有效暂停游戏，暂停物理、动画以及任何依赖于 `Time.time`\
  \ 推进的内容。因此，我们创建一个将 `Time.timeScale` 设置为 0 的 `PauseGame()` 函数（清单 9-4）。\n\n```\nprivate\
  \ var savedTimeScale:float;\nfunction PauseGame() {\n    savedTimeScale = Time.timeScale;\n\
  \    Time.timeScale = 0;\n    AudioListener.pause = true;\n    currentPage = Page.Main;\n\
  }\n```\n\n`PauseGame()` 首先将当前的 `Time.timeScale` 保存在变量 `savedTimeScale` 中，以便在游戏取消暂停时可以恢复\
  \ `Time.timeScale`（你不应假设游戏暂停时 `Time.timeScale` 为 1）。\n\n`PauseGame()` 还将 `AudioListener.pause`\
  \ 设置为 `true`，这会暂停所有正在播放的声音（如果你要在菜单中播放声音，则不应执行此操作）。\n\n最后，将 `currentPage` 变量设置为 `Page.Main`，表示应显示主暂停屏幕。\n\
  \n通过逆转所有这些操作来取消游戏暂停（清单 9-5）。\n\n```\nfunction UnPauseGame() {\n    Time.timeScale\
  \ = savedTimeScale;\n    AudioListener.pause = false;\n    currentPage = Page.None;\n\
  }\n```\n\n`UnPauseGame()` 将 `Time.timeScale` 恢复为 `PauseGame()` 保存在变量 `savedTimeScale`\
  \ 中的值，并将 `AudioListener.pause` 设置为 `false` 以重新启用音频。\n\n要查看游戏是否已暂停，你只需检查 `Time.timeScale`\
  \ 是否为 0。清单 9-6 展示了一个用于此目的的小型便捷函数。请注意，它是一个静态函数，因此任何脚本都可以将其引用为 `FuguPause.IsGamePaused()`。\n\
  \n```\nstatic function IsGamePaused() {\n    return Time.timeScale == 0;\n}\n```\n\
  \n如果游戏要以暂停状态启动，则 `Start()` 回调中应调用 `PauseGame()`（清单 9-7）。添加一个公共布尔变量 `startPaused`\
  \ 并在调用 `PauseGame()` 之前检查它，可以使初始暂停成为可选项。\n\n```\nvar startPaused:boolean = true;\n\
  function Start() {\n    if (startPaused) {\n        PauseGame();\n    }\n}\n```\n\
  \n由于 `startPaused` 的默认值是 `true`，如果你单击“播放”，游戏将立即暂停，显示球悬浮在空中。然后你就卡住了，因为没有菜单。也无法取消暂停后再重新暂停，因此我们让\
  \ Escape 键（大多数键盘左上角标有 Esc 的键）切换暂停状态。输入处理通常在 `Update()` 回调中执行，这里也不例外（清单 9-8）。\n\n\
  ```\nfunction Update() {\n    if (Input.GetKeyDown(KeyCode.Escape)) {\n        switch\
  \ (currentPage) {\n            case Page.None: PauseGame(); break; // 如果未显示暂停菜单，则暂停\n\
  \            case Page.Main: UnPauseGame(); break; // 如果正在显示主暂停菜单，则取消暂停\n      \
  \      default: currentPage = Page.Main; // 任何子页面都返回主页面\n        }\n    }\n}\n```\n\
  \n第一行检查是否已按下 Esc 键。如果是，则调用 `PauseGame()`，除非暂停菜单已经显示。该函数还将 Esc 视为返回键，从子页面切换到主页面，或从主页面切换到未暂停状态。\n\
  \n### 检查 `Time.deltaTime`\n\n将 `Time.timeScale` 设置为 0 会停止 `Time.time` 的前进，因此 `Time.deltaTime`\
  \ 始终为 0。这对于将值乘以 `Time.deltaTime` 的 `Update()` 函数非常有效，但在时间冻结时除以 `Time.deltaTime`\
  \ 会导致除以零错误。`FuguForce` 脚本的 `Update()` 回调中就存在这种情况，因此在继续制作暂停菜单之前，必须处理这个问题（清单 9-9）。\n\
  \n```\nfunction Update() {\n    forcex = 0;\n    forcey = 0;\n    if (Time.deltaTime\
  \ > 0) {\n        CalcForce();\n    }\n}\n\nfunction CalcForce() {\n    var deltaTime:float\
  \ = Time.deltaTime;\n    forcex = mousepowerx * Input.GetAxis(\"Mouse X\") / deltaTime;\n\
  \    forcey = mousepowery * Input.GetAxis(\"Mouse Y\") / deltaTime;\n}\n```\n\n\
  现在，`Update()` 回调不再立即将滚动力值除以 `Time.deltaTime`，而是先检查 `Time.deltaTime` 不为 0，然后再进行力的计算，该计算现已移入\
  \ `CalcForce()` 函数中。`Update()` 总是将力值初始化为 0，以确保游戏暂停时没有残余的力作用于保龄球上。\n\n### 显示菜单\n\n\
  与上一节的记分牌一样，暂停菜单的实际显示必须在 `OnGUI()` 回调函数中进行。具体来说，`OnGUI()` 需要检查游戏是否已暂停，如果已暂停，则显示当前菜单页面（清单\
  \ 9-10）。\n\n```\nfunction OnGUI () {\n    if (IsGamePaused()) {\n        if (skin\
  \ != null) {\n            GUI.skin = skin;\n        } else {\n            GUI.color\
  \ = hudColor;\n        }\n        switch (currentPage) {\n            case Page.Main:\
  \ ShowPauseMenu(); break;\n            case Page.Options: ShowOptions(); break;\n\
  \            case Page.Credits: ShowCredits(); break;\n        }\n    }\n}\n```\n\
  \n目前，每个页面显示函数都只有占位符，这样当你逐个填写每个显示函数时，脚本可以保持可运行状态（即没有编译错误）。将 `Debug.Log()` 语句放入这些桩函数中，以验证它们是否在预期时被调用，这是一个好主意。例如，如果你单击“播放”，则每次暂停游戏时，都应该在控制台视图中看到“Main\
  \ Pause”。\n\n### 自动布局\n\n对于垂直堆叠并居中在屏幕上的菜单按钮，你可以利用 `GUILayout` 函数，避免计算出原本必须为每个 `GUI.Button()`\
  \ 传递的所有 `Rect` 值。在 `GUILayout.BeginArea()` 和 `GUILayout.EndArea()` 的调用之间，你可以调用创建\
  \ GUI 控件的函数，而无需传递 `Rect`，只需使用 GUI 函数的 `GUILayout` 版本即可。这些控件将在传递给 `GUILayout.BeginArea()`\
  \ 的 `Rect` 内自动放置和调整大小。由于所有暂停菜单页面都将以相同方式显示，让我们创建一些便捷函数来包装 `GUILayout` 函数（清单 9-11）。\n\
  \n```\nvar menutop:int = 25;\n\nfunction BeginPage(width:int, height:int) {\n  \
  \  GUILayout.BeginArea(Rect((Screen.width - width) / 2, menutop, width, height));\n\
  }\n\nfunction EndPage() {\n    // 如果不是主页面，则显示“返回”按钮\n    if (currentPage != Page.Main\
  \ && GUILayout.Button(\"Back\")) {\n        currentPage = Page.Main;\n    }\n  \
  \  GUILayout.EndArea();\n}\n```\n\n`BeginPage()` 函数调用 `GUILayout.BeginArea()`，该区域由作为参数传入的\
  \ `width` 和 `height` 指定，在屏幕上水平居中，并且其顶部边缘与屏幕顶部的距离由名为 `menutop` 的公共变量指定。\n\n`EndPage()`\
  \ 函数调用 `GUILayout.EndArea()`，但在此之前，如果当前页面不是主页面，它会显示一个“返回”按钮。如果单击该按钮，则当前页面被设置为主页面。\n\
  \n\n\n## 主页面\n\n现在你已经掌握了在屏幕上显示菜单所需的所有要素。清单 9-12 展示了一个完整实现的`ShowPauseMenu`函数。\n\n\
  ```\nfunction ShowPauseMenu() {\nBeginPage(150,300);\nif (GUILayout.Button (\"Play\"\
  )) {\nUnPauseGame();\n}\nif (GUILayout.Button (\"Options\")) {\ncurrentPage = Page.Options;\n\
  }\nif (GUILayout.Button (\"Credits\")) {\ncurrentPage = Page.Credits;\n}\n#if !UNITY_WEBPLAYER\
  \ && !UNITY_EDITOR\nif (GUILayout.Button (\"Quit\")) {\nApplication.Quit();\n}\n\
  #endif\nEndPage();\n}\nListing 9-12.\nFuguPause.js 中显示暂停菜单的函数\n```\n\n`BeginPage`和`EndPage`之间的所有\
  \ GUI 代码实际上都运行在`GUILayout.BeginArea`和`GUILayout.EndArea`之间，因此你可以使用 GUI 调用的`GUILayout`版本创建元素，而无需传递`Rect`参数。例如，你可以调用`GUILayout.Button`代替`GUI.Button`。除了缺少`Rect`参数外，这些函数在其他方面看起来完全相同。\n\
  \n`GUILayout.Button`与`GUILayout.Label`的区别在于，它会根据按钮是否被按下返回`true`或`false`。因此，每次调用`GUILayout.Button`时，都会在`if`测试语句内执行，并在按钮确实被按下时执行相应的代码。\n\
  \n现在创建一个`GameObject`并将其命名为`MainMenu`。向该`GameObject`添加`FuguPause`脚本组件。你可以从检视面板中选择`Add\
  \ Component`，或者将项目视图`Scripts`文件夹中的`FuguPause`脚本拖放至新创建的`MainMenu`游戏对象上。\n\n当你点击 Play\
  \ 时，现在将看到主菜单，并且菜单中的 Play 按钮应该能取消屏幕暂停（图 9-6）。`Application.Quit`在 Unity 网页播放器或编辑器中没有任何功能，因此该代码段被包围在对应预处理器定义`UNITY_WEBPLAYER`和`UNITY_EDITOR`的测试中，用于检查构建目标是否为网页播放器或是否在编辑器中运行。这些定义在编译前就会被评估（因此称为预处理器），所以如果`UNITY_WEBPLAYER`为\
  \ false 且`UNITY_EDITOR`为 false，则编译封闭的代码。否则，就像这段代码从未存在过一样。\n\n![A310332_2_En_9_Fig6_HTML.jpg](img/A310332_2_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6. 主菜单\n\nCredits 和 Options 按钮目前还不会有任何反应，因为`ShowCredits`和`ShowOptions`函数仍然是空壳。Credits\
  \ 页面相对简单，我们就从它开始。\n\n## Credits 页面\n\n多个致谢条目可以存储在一个`String`数组中。为此定义了一个名为`credits`的变量，以及一个用于显示致谢信息的`ShowCredits`函数，如清单\
  \ 9-13 所示。\n\n```\nvar credits:String[]=[\n\"A Fugu Games Production\",\n\"Copyright\
  \ (c) 2017 Technicat, LLC. All Rights Reserved.\",\n\"More information at http://fugugames.com/\"\
  ] ;\nfunction ShowCredits() {\nBeginPage(300,300);\nfor (var credit in credits)\
  \ {\nGUILayout.Label(credit);\n}\nEndPage();\n}\nListing 9-13.\nFuguPause.js 中显示致谢页面的函数\n\
  ```\n\n由于变量`credits`是公开的，你可以在检视面板中编辑每个致谢条目，向数组中添加或从中移除条目。\n\n`ShowCredits`函数遍历致谢数组，并在\
  \ UnityGUI 标签中显示每一个条目（图 9-7）。请注意，这里有一种使用`in`遍历数组的简单方法，而不是通常通过一系列数组索引进行迭代的习惯。在这种情况下，你不需要索引来做其他事情，所以就采用这种更简单的方法。\n\
  \n![A310332_2_En_9_Fig7_HTML.jpg](img/A310332_2_En_9_Fig7_HTML.jpg)\n\n图 9-7. 致谢页面\n\
  \n与主菜单一样，你以调用`BeginPage`开始，以`EndPage`结束，因此你是在`GUILayout`区域（这次是 300×300）内操作，可以使用`GUILayout.Label`代替`GUI.Label`。`EndPage`确保自动生成一个返回按钮。请记住，`Update`回调也会将\
  \ Esc 键视为点击返回按钮。\n\n## Options 页面\n\nOptions 页面比 Credits 页面复杂得多，因为它包含一个由四个选项卡实现的工具栏：Audio、Graphics、Stats\
  \ 和 System。清单 9-14 展示了完整实现的`ShowToolbar`函数，以及一些辅助变量和函数。\n\n```\nprivate var toolbarInt:int=0;\n\
  private var toolbarStrings: String[]= [\"Audio\",\"Graphics\",\"System\"];\nfunction\
  \ ShowOptions() {\nBeginPage(318,300);\ntoolbarInt = GUILayout.Toolbar (toolbarInt,\
  \ toolbarStrings);\nswitch (toolbarInt) {\ncase 0: ShowAudio(); break;\ncase 1:\
  \ ShowGraphics();  break;\ncase 2: ShowSystem(); break;\n}\nEndPage();\n}\nListing\
  \ 9-14.\nFuguPause.js 中的 Options 页面\n```\n\n同样，`ShowOptions`函数中的所有内容都被包裹在`BeginPage`和`EndPage`函数的调用之间。第一行调用`GUILayout.Toolbar`，从一个字符串数组创建一个工具栏——一排充当选项卡或单选按钮的按钮，其中每个字符串是按钮的标签。该函数还接收一个整数，该整数对应于该字符串数组中的位置。那是要使工具栏上当前处于活动状态的按钮。但如果你只是这样写：\n\
  \n```\nGUILayout.Toolbar (toolbarIndex, toolbarStrings);\n```\n\n那么`toolbarIndex`永远不会从其初始值（0）改变，即使你点击了另一个按钮，下次调用此函数时（在`OnGUI`的下一次调用中），活动按钮也会被设置回该值。\n\
  \n但是`GUILayout.Toolbar`返回一个表示当前活动按钮的整数，所以你将这个值反馈回你传入的变量`toolbarIndex`。\n\n```\n\
  toolbarIndex = GUILayout.Toolbar (toolbarIndex, toolbarStrings);\n```\n\n因此，`toolbarIndex`初始为\
  \ 0，但如果你点击 Graphics，它将变为 1，如果你点击 Controls，它将变为 2，以此类推。然后有一个`switch`语句检查`toolbarIndex`并调用与所选按钮匹配的显示函数。与主菜单一样，我们从存根函数开始，然后逐个实现。现在继续点击看看，你应该能在控制台视图中看到相应的函数名称显示出来，因为这是你目前告诉程序所做的全部事情！\n\
  \n## Audio 面板\n\n当选中 Audio 选项卡时，它将显示一个用于音量控制的滑块（图 9-8）。\n\n![A310332_2_En_9_Fig8_HTML.jpg](img/A310332_2_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8. 暂停菜单中的音频面板\n\n将滑块添加到`ShowAudio`函数实际上相当容易；只需要一行代码。好吧，它实际上包含两行，因为没有标签的滑块有点过于神秘（清单\
  \ 9-15）。\n\n```\nfunction ShowAudio() {\nGUILayout.Label(\"Volume\");\nAudioListener.volume\
  \ = GUILayout.HorizontalSlider(AudioListener.volume,0.0,1.0);\nListing 9-15.\nFuguPause.js\
  \ 中的音频面板\n```\n\n第一行调用`GUILayout.Label`，这一点你现在应该已经熟悉了。第二行调用`GUILayout.HorizontalSlider`，它接收滑块表示的最小值、最大值以及一个表示当前设置的值作为参数。\n\
  \n该滑块反映了`AudioListener.volume`的值，这是 Unity 中所有声音的主音量。因此，`AudioListener.volume`被作为滑块的当前值传递，并且由于`AudioListener.volume`的范围在\
  \ 0 到 1 之间，这些值分别作为最小值和最大值传递。而且，为了记录滑块的值，`GUILayout.HorizontalSlider`的返回值被重新赋值给`AudioListener.volume`。否则，`AudioListener.volume`的值将永远不会改变，滑块也不会移动。\n\
  \n\n\n### 图形面板\n\n图形面板会显示与 Unity 编辑器质量设置相同的一些图形质量信息（如图 9-9 所示）。\n\n![A310332_2_En_9_Fig9_HTML.jpg](img/A310332_2_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9. 暂停菜单中的图形选项\n\n面板底部的两个按钮分别用于提高和降低质量设置的级别。实现此面板无需使用任何新的 UnityGUI 控件，但需要访问`QualitySettings`类（列表\
  \ 9-16）。\n\n```\nfunction ShowGraphics() {\nGUILayout.Label(QualitySettings.names[QualitySettings.GetQualityLevel()]);\n\
  GUILayout.Label(\"像素光数量: \"+QualitySettings.pixelLightCount);\nGUILayout.Label(\"\
  阴影级联: \"+QualitySettings.shadowCascades);\nGUILayout.Label(\"阴影距离: \"+QualitySettings.shadowDistance);\n\
  GUILayout.Label(\"柔和植被: \"+QualitySettings.softVegetation);\nGUILayout.BeginHorizontal();\n\
  if (GUILayout.Button(\"降低\")) {\nQualitySettings.DecreaseLevel();\n}\nif (GUILayout.Button(\"\
  提高\")) {\nQualitySettings.IncreaseLevel();\n}\nGUILayout.EndHorizontal();\n}\n```\n\
  \n列表 9-16. 显示质量设置的函数\n\n`ShowGraphics`函数相当直接。它通过调用`QualitySettings.GetQualityLevel`获取当前质量设置级别（以整数表示），然后将该整数作为索引，从`QualitySettings.names`字符串数组中检索该质量设置的名称。该名称以及若干质量设置会显示在标签中，底部放置了两个按钮：一个调用`QualitySettings.DecreaseLevel`，另一个调用`QualitySettings.IncreaseLevel`。\n\
  \n这两个按钮允许你在现有级别范围内提高或降低质量设置级别。你不仅会看到显示的质量设置信息发生变化，甚至可能亲眼目睹场景的图形质量发生改变——因为即使在游戏时间暂停时，场景每帧仍在渲染。\n\
  \n### 系统面板\n\n系统面板显示有关硬件平台的信息（如图 9-10 所示）。\n\n![A310332_2_En_9_Fig10_HTML.jpg](img/A310332_2_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10. 暂停菜单中的系统面板\n\n与图形页面类似，信息通过标签显示；但图形页面访问的是`QualitySettings`类，而系统面板访问的是`SystemInfo`类（列表\
  \ 9-17）。\n\n```\nfunction ShowSystem() {\nGUILayout.Label(\"图形设备: \"+SystemInfo.graphicsDeviceName+\"\
  \ \"+\nSystemInfo.graphicsMemorySize+\"MB\\n\"+\nSystemInfo.graphicsDeviceVersion+\"\
  \\n\"+\nSystemInfo.graphicsDeviceVendor);\nGUILayout.Label(\"阴影: \"+ Available(SystemInfo.supportsShadows));\n\
  GUILayout.Label(\"图像特效: \"+Available(SystemInfo.supportsImageEffects));\n// GUILayout.Label(\"\
  渲染纹理: \"+Available(SystemInfo.supportsRenderTextures));\n}\n```\n\n列表 9-17. FuguPause.js\
  \ 中的系统面板\n\n`SystemInfo`类提供关于图形硬件及其能力的信息，包括一些标识信息，如设备名称和供应商名称、显存大小，以及硬件是否支持某些更高级的特性，例如动态阴影、渲染到纹理或图像特效（这要求支持渲染到纹理）。\n\
  \n## 自定义 GUI 颜色\n\n你可能已经注意到暂停菜单中的白色文本通常难以阅读。一种解决方案是修改静态变量`GUI.color`，它会使用一个颜色值为整个\
  \ GUI 着色（列表 9-18）。\n\n```\nvar hudColor:Color = Color.white;\nfunction OnGUI ()\
  \ {\nif (IsGamePaused()) {\nif (skin != null) {\nGUI.skin = skin;\n} else {\nGUI.color\
  \ = hudColor;\n}\nswitch (currentPage) {\ncase Page.Main: ShowPauseMenu(); break;\n\
  case Page.Options: ShowOptions(); break;\ncase Page.Credits: ShowCredits(); break;\n\
  }\n}\n}\n```\n\n列表 9-18. FuguPause.js 中的 GUI 颜色自定义\n\n你在`FuguPause`脚本中添加了一个名为`hudColor`的公开变量，以便可以在\
  \ Inspector 视图中选择颜色。所有 UnityGUI 操作，包括设置`GUI.Color`之类的变量，都必须放在`OnGUI`回调中进行。因此，对`GUI.color`的赋值被放置在`OnGUI`回调内，在所有\
  \ GUI 控件创建之前（但在调用`IsGamePaused`之后，因为如果不需要渲染 GUI，就没有理由设置`GUI.Color`）。请注意，你可以在`OnGUI`中多次设置`GUI.color`，以便在渲染不同部分之前更改颜色。\n\
  \n现在你可以在 Inspector 视图中选择颜色（如图 9-11 所示），并查看最终的 GUI 色调（如图 9-12 所示）。\n\n![A310332_2_En_9_Fig12_HTML.jpg](img/A310332_2_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12. 使用自定义颜色的暂停菜单\n\n![A310332_2_En_9_Fig11_HTML.jpg](img/A310332_2_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11. 暂停菜单的颜色选择\n\n## 自定义皮肤\n\n默认的 UnityGUI 皮肤相当中性，而且文本难以阅读，正如你在上一部分的暂停菜单中看到的那样。在记分板中，你可以通过调整`GUI.Label`的样式来改变文本颜色，但如果\
  \ GUI 元素很多，这会很麻烦。\n\n这正是 UnityGUI 皮肤的用武之地。皮肤是分配给各种 GUI 元素的样式的集合。应用皮肤很简单——只需声明一个`GUISkin`类型的公开变量，然后在`OnGUI`回调中，将该皮肤赋值给变量`GUI.skin`，类似于赋值`GUI.Color`（列表\
  \ 9-19）。\n\n```\nvar skin:GUISkin;\nfunction OnGUI () {\nif (IsGamePaused()) {\n\
  if (skin != null) {\nGUI.skin = skin;\n} else {\nGUI.color = hudColor;\n}\nswitch\
  \ (currentPage) {\ncase Page.Main: ShowPauseMenu(); break;\ncase Page.Options: ShowOptions();\
  \ break;\ncase Page.Credits: ShowCredits(); break;\n}\n}\n}\n```\n\n列表 9-19. 为暂停菜单添加\
  \ GUISkin\n\n你可以使用 Asset Store 中一个名为 Necromancer GUI（死灵法师 GUI）的、外观非常酷炫的免费 UnityGUI\
  \ 皮肤来测试这个皮肤支持功能（如图 9-13 所示）。\n\n![A310332_2_En_9_Fig13_HTML.jpg](img/A310332_2_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13. Asset Store 上的 Necromancer GUI\n\n下载并导入 Necromancer GUI，然后将其皮肤文件（名为 Necromancer\
  \ GUI）拖拽到 Inspector 视图中新增的 Skin 属性上（如图 9-14 所示）。\n\n![A310332_2_En_9_Fig14_HTML.jpg](img/A310332_2_En_9_Fig14_HTML.jpg)\n\
  \n图 9-14. Necromancer GUI\n\n然后点击 Play，你就会拥有一个更加华丽的暂停菜单。图 9-15 展示了应用 Necromancer\
  \ GUI 后的暂停菜单图形面板。看看这些漂亮的按钮！\n\n![A310332_2_En_9_Fig15_HTML.jpg](img/A310332_2_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15. Necromancer GUI 皮肤的实际效果\n\n## 完整脚本\n\n最终的启动/暂停菜单脚本比记分板脚本要长得多，因此这里省略了完整列表。本章已展示了所有代码，完整的`FuguPause.js`脚本可在本书本章项目的资源文件中获取，网址为\
  \ [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)。\n\n\n\n\
  ## 更进一步\n\n最后，计分板的显示让你的保龄球游戏成为了一款功能完整的保龄球游戏，而开始/暂停菜单的加入则提供了玩家所期望的一些细节打磨！\n\n游戏图形界面的加入不仅完善了保龄球游戏（在商业游戏项目中，这或许可被视为“首次可玩”的里程碑），也标志着对\
  \ Unity 3D 游戏常用基础功能介绍的结束。\n\n**提示**  \n尽管我将图形界面开发留到了这个阶段的最后，这在游戏开发中不幸很常见，但最好在项目早期就包含图形界面设计。哪怕只是画出菜单的草图，也有助于厘清预期的游戏模式和选项。\n\
  \n在大多数情况下，尽管你一直在编辑器中修改和测试游戏，但这些功能都是跨平台的。现在，你可以将此游戏构建为网页播放器、Mac 或 Windows 可执行文件，并且游戏在所有平台上的运行表现将基本一致（性能差异除外）。但本书的最终目标是让你进入\
  \ iOS 开发领域，因此，从下一章开始，本书的剩余内容将全部围绕 Unity iOS 展开。\n\n### Unity 手册\n\nUnity 手册中“创建游戏玩法”部分的“游戏界面元素”链接，指向了“Unity\
  \ 脚本指南”部分。该部分是一系列教程风格的页面，详细讲解了 UnityGUI 系统，从创建单个按钮到添加各种其他 UnityGUI 控件（如滑块和单选按钮），从使用自动布局与固定布局，到创建可复用的复合控件，以及使用样式和皮肤自定义\
  \ GUI 外观。\n\n“Unity 脚本指南”还解释了如何使用 UnityGUI 来自定义 Unity 编辑器。事实证明，编辑器界面实际上就是用 UnityGUI\
  \ 实现的（这也解释了为什么有时你会在控制台视图中看到与你的任何代码无关的 `OnGUI` 错误信息）。\n\n### 参考手册\n\n我简要提过，除了 Unity\
  \ 内置字体之外，其他字体也可以导入到 Unity 项目中，然后分配给 UnityGUI 样式和皮肤。参考手册在其“资源组件”部分有一个页面，更详细地描述了字体资源及其重要选项。\n\
  \n### 脚本参考\n\n自然，脚本参考中的“运行时类”列表包含了描述你所使用的 UnityGUI 函数的页面，首先是 `MonoBehaviour` 类中定义的\
  \ `OnGUI` 回调。\n\n在计分板和暂停菜单中使用的大部分 UnityGUI 函数，都是用于创建各种 UnityGUI 控件的静态 `GUI` 和 `GUILayout`\
  \ 函数，例如 `GUI.Button` 和 `GUI.Label`。值得逐一查阅这些函数的脚本参考页面，以便了解有哪些 GUI 控件可用，以及像 `GUI.color`\
  \ 和 `GUI.skin` 这样的自定义变量（还有其他变量，例如用于自定义背景颜色的）。`GUIStyle` 和 `GUISkin` 也是类，你可以在脚本中随时更改它们的属性。\n\
  \n除了 UnityGUI 类之外，暂停菜单中还使用了一些其他类。设置了静态变量 `Time.timeScale` 来暂停和恢复游戏；调用了 `Application.Quit`\
  \ 来退出游戏；并在“选项”页面中访问了 `AudioListener`、`QualitySettings` 和 `SystemInfo` 类。\n\n###\
  \ 资源商店\n\n死灵法师图形界面在暂停菜单中看起来非常棒，它展示了精心制作的 `GUISkin` 能让 UnityGUI 看起来有多出色，但资源商店上还有很多其他皮肤。它们都与死灵法师图形界面一起，列在“纹理和材质”下的“图形界面皮肤”类别中。该类别中充满了\
  \ UnityGUI 的皮肤，以及第三方 GUI 系统的皮肤，例如来自 Above and Beyond Software (`http://anbsoft.com/`)\
  \ 的流行 EZGUI 和来自 Tasharen Entertainment (`http://tasharen.com`) 的 NGUI。\n\n这些第三方\
  \ GUI 系统可在脚本类别中内容丰富的 GUI 子类别中找到，该子类别充满了预置脚本的 GUI，例如小地图和菜单。事实上，本章实现的暂停菜单的一个版本就在资源商店的“完整项目”下（名为\
  \ FuguPause）。\n\n资源商店在“纹理和材质”下的“字体”类别中也有相当不错的字体选择。但由于 Unity 可以导入 TrueType 和 OpenType\
  \ 字体，网络上有很多免费的字体网站可供使用，以及价格适中的字体库（我使用的是 MacXWare 字体库）。\n\n"
- "# 10. 使用 Unity iOS\n\n恭喜！你现在拥有了一款包含典型 3D 游戏基本功能的保龄球游戏：3D 图形（当然）、物理、音效、玩家控制（保龄球）、摄像机运动以及图形用户界面。\n\
  \n默认的构建目标在编辑器窗口的标题栏上显示为 PC、Mac 和 Linux 独立平台。如果你现在就为保龄球项目执行 macOS 构建，游戏运行起来将与在编辑器中基本相同。对于\
  \ Linux、Windows 甚至网页播放器（尽管网页播放器构建需要你先切换构建目标）来说也是如此。\n\n针对 iOS 则是另一回事。你现在可以将保龄球游戏的构建目标更改为\
  \ iOS，并进行构建而不会出现任何编译错误。但 `FuguForce.js` 中的保龄球控制是为鼠标输入设计的，因此必须更改。除了重新实现输入处理之外，将桌面\
  \ PC 游戏适配到移动设备（这个过程称为移植）通常还需要针对设备显示进行调整，并做出妥协以获得可接受的性能。\n\n此外，构建 iOS 应用涉及的外部流程比桌面独立平台和网页播放器目标要多得多。由于\
  \ Apple 要求所有 iOS 应用都必须使用 Xcode 编译，Unity iOS 通过首先生成一个 Xcode 项目来构建应用，然后由 Xcode 编译该项目以创建最终的应用。要真正在测试设备上运行该应用并将其提交到\
  \ App Store，需要一系列相当复杂的流程，以及注册 Apple 的 iOS 开发者计划。现在，不妨让我们回归本源，暂时回到本书开始时使用的 Climber\
  \ 项目。方便的是，Climber 无需修改即可在 iOS 上运行。如果你有 iOS 设备，请继续从 App Store 下载 Climber。快速找到 Climber\
  \ 应用的方法是在 App Store 搜索框中输入“Climber”，然后会看到“Angry Bots”以及其他来自 Unity Technologies 的应用（图\
  \ 10-1）。\n\n![A310332_2_En_10_Fig1_HTML.jpg](img/A310332_2_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1.** App Store 中的示例应用\n\n除了 Climber，你还应该搜索并下载 Unity Remote 应用，它可以用作在编辑器中测试\
  \ Unity iOS 游戏的遥控器。既然在找了，你也应该下载并尝试所有来自 Unity Technologies 的示例应用。其中许多应用已经很长时间没有更新了，但它们确实能让你了解可以使用\
  \ Unity 创建什么样的游戏。\n\n在运行此游戏之前，你需要做一个小改动。从主菜单中选择“文件”➤“构建设置”。在对话框中，你将看到游戏当前设置为“PC、Mac\
  \ 和 Linux 独立平台”（图 10-2）。你需要将目标平台更改为 iOS。在“平台”菜单中选择 iOS 图标选项，然后选择“切换平台”按钮（图 10-3）。\n\
  \n![A310332_2_En_10_Fig3_HTML.jpg](img/A310332_2_En_10_Fig3_HTML.jpg)\n\n**图 10-3.**\
  \ 构建设置菜单设置为 iOS\n\n![A310332_2_En_10_Fig2_HTML.jpg](img/A310332_2_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2.** 构建设置菜单设置为 PC、Mac 和 Linux 独立平台\n\n现在你可以选择构建并在 iOS 设备上运行此游戏了。\n\n\n\n\
  ## 使用 Unity Remote 进行测试\n\nUnity 提供了一项非常酷的解决方案，可以让你在编辑器内测试 Unity iOS 项目，即 Unity\
  \ Remote 应用。该应用运行在 iOS 设备上，并通过 Wi-Fi 将该设备的触摸屏和加速度计数据中继到 Unity Editor。如果你没有 iOS 设备，可以跳过本节，使用下一节描述的\
  \ iOS 模拟器进行一些测试。\n\nUnity Remote 可以像其他任何应用一样在 App Store 中找到。在 App Store 搜索框中输入 `Unity\
  \ Remote`（图 10-4）。\n\n![A310332_2_En_10_Fig4_HTML.jpg](img/A310332_2_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4. App Store 上的 Unity Remote 应用\n\n在 iOS 设备上安装 Unity Remote 后，请确保该设备已连接到运行\
  \ Unity 的 Mac。现在，在你的 iOS 设备上打开 Unity Remote 应用，然后从 The Climber ➤ Scenes 文件夹中选择 `GameScene`（图\
  \ 10-5）。\n\n![A310332_2_En_10_Fig5_HTML.jpg](img/A310332_2_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5. The Climber 游戏场景\n\n现在，你需要让 Unity 知道你想要连接到设备上的 Unity Remote 应用。然后，点击 Unity\
  \ 中的“播放”按钮。游戏将加载到 Unity 的游戏屏幕中，当你按下“播放”键时，游戏也应该在你的设备上运行。从主菜单中选择 Edit ➤ Project Settings\
  \ ➤ Editor（图 10-6）。\n\n![A310332_2_En_10_Fig6_HTML.jpg](img/A310332_2_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6. 设置 Unity 编辑器\n\n在 Inspector 中，选择你已安装 Unity Remote App 的 iOS 设备。\n\n当 Unity\
  \ Editor 处于播放模式时，游戏视图中的图形也会显示在 Unity Remote 中，并且你可以在设备上玩游戏。画面可能会有点粗糙，因为在 Unity 中你还没有将游戏适配到设备设置。你可以通过最小化\
  \ Unity Editor 中游戏视图的分辨率来改善性能（图 10-7）。\n\n![A310332_2_En_10_Fig7_HTML.jpg](img/A310332_2_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7. 游戏视图中最小化的设备分辨率\n\n无论图形质量如何，你现在都能看到 Climber 游戏在 iOS 设备上的样子，尽管你实际上仍在 Editor\
  \ 中运行游戏，只是将设备用作控制器。由于在 Climber 游戏中尚未设置触摸屏输入，因此你需要使用 Mac 上的方向键和空格键。一旦配置完成，触摸屏输入将通过\
  \ USB 线缆发送回 Unity Editor，并由在播放模式下运行的游戏接收，因此，在测试运行期间，你仍然可以随时使用 Unity Editor 的所有调试功能。这真是两全其美！\n\
  \n### 安装 Xcode\n\n在某个时候，你必须离开舒适的 Unity Editor，真正开始为 iOS 构建应用。所有 iOS 应用都必须通过 Apple\
  \ 官方的 iOS 开发工具（也是其官方的 macOS 开发工具）—— Xcode 来构建，这就是 Unity iOS 构建首先会生成一个 Xcode 项目，然后由\
  \ Xcode 构建该项目以创建应用的原因。Xcode 可从 Apple 开发者网站免费获取，但也可以方便地从 Mac App Store 获取。在 Mac App\
  \ Store 上搜索 `xcode`，然后点击“免费”按钮下载（图 10-8）。\n\n![A310332_2_En_10_Fig8_HTML.jpg](img/A310332_2_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8. Mac App Store 上的 Xcode\n\n安装完成后，你应该能在“应用程序”文件夹中看到 Xcode 应用。现在，你就可以开始从\
  \ Unity 执行 iOS 构建了！\n\n### 自定义播放器设置\n\nUnity iOS 构建总是需要在 Unity Editor 中自定义播放器设置（Unity\
  \ 播放器，与 Unity Editor 相对，是 Unity 引擎的部署版本）。在“Edit”菜单下选择“Player Settings”，或者点击“Build”窗口中的“Player\
  \ Settings”按钮，播放器设置将显示在 Inspector 视图中（图 10-9）。\n\n![A310332_2_En_10_Fig9_HTML.jpg](img/A310332_2_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9. 选择播放器设置\n\n播放器设置允许你设置 PC、Mac & Linux Standalone（第一个图标）、iOS（第二个图标）、Android（第三个图标）和\
  \ WebGL（第四个图标）的设置。\n\n由于你现在只关心 iOS 播放器设置，请点击看起来有点像 iPhone 的 iOS Settings 标签页，查看\
  \ iOS 的设置（图 10-10）。\n\n![A310332_2_En_10_Fig10_HTML.jpg](img/A310332_2_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10. iOS 的播放器设置中的分辨率和显示\n\n播放器设置非常丰富，因此它们被组织成几个部分：分辨率和显示、图标、启动画面、调试和崩溃报告，以及包罗万象的其他设置。第\
  \ 12 章专门讨论显示问题，包括图标和启动画面设置，因此，现在你将重点关注分辨率和显示以及其他设置。\n\n#### 分辨率和显示\n\n大多数分辨率和显示设置都有合理的默认值（图\
  \ 10-8），但我建议将默认方向设置为“自动旋转”，因为 Apple 要求 iPad 应用支持自动旋转，这意味着显示会自动旋转以保持直立。其他默认方向选项包括横向左、横向右、纵向或纵向倒置。\n\
  \n如果选择了自动旋转，则会显示自动旋转允许的方向。Climber 旨在仅在纵向模式下运行，因此当设备旋转时，Climber 将在纵向和纵向倒置之间切换，但绝不会切换到横向模式。\n\
  \n“使用动画自动旋转”选项指定显示是可见地旋转还是直接切换。我始终选择动画旋转，因为它看起来很酷。状态栏选项指定应用程序启动时 iOS 状态栏是否可见，如果可见，则以何种样式显示。\n\
  \n“显示加载指示器”控制应用程序启动时是否显示 iOS 活动指示器（屏幕中央的旋转小图形）。此设置也将在第 12 章的显示选项中涵盖。\n\n\n\n###\
  \ 其他设置\n\n许多重要的设置被集中在“其他设置”（Other Settings）这个通用标题下（图 10-11）。渲染设置下的静态和动态批处理选项实际上是优化选项，影响是否以及何时自动合并网格以提升性能。这将在第[16](https://doi.org/10.1007/978-1-4842-3174-6_16)章的优化技术中进行讨论。\n\
  \n![A310332_2_En_10_Fig11_HTML.jpg](img/A310332_2_En_10_Fig11_HTML.jpg)\n\n图 10-11.\
  \ iOS 播放器设置中的“其他设置”\n\n在“标识”（Identification）部分有两个设置：`Bundle Identifier` 和 `Version`。它们在\
  \ iOS 模拟器中运行时并不重要，但在提交应用时，这些设置必须与 `iTunesConnect` 中指定的应用信息一致（这将在下一章的应用提交流程中介绍）。\n\
  \n捆绑包 ID (bundle ID) 是应用的唯一标识符，通常以反向 URL 的形式表示。例如，我所有的应用捆绑包 ID 形式都是 `com.technicat.<appname>`，所以我会将\
  \ `com.unity.climber` 更改为 `com.technicat.climber`。\n\n捆绑包版本号 (bundle version) 与\
  \ App Store 上显示的应用版本号相同。它通常格式化为两个数字，`<主版本>.<次版本>`，有时是三个，`<主版本>.<次版本>.<修订号>`。每次在\
  \ App Store 上提交应用更新时，都需要递增此数字。\n\n在“配置”（Configuration）下，大多数设置都有合理的默认值，但你需要通过选择目标设备来决定你的应用是在\
  \ iPhone、iPad 上运行，还是在两者上都运行。大多数 3D 应用通常在各种屏幕宽高比上都能良好运行，至少比 2D 应用要好，但 iPhone 和 iPod\
  \ touch 的屏幕比 iPad 更窄。有时，出于商业原因，你可能只想发布一个仅适用于 iPad 或仅适用于 iPhone 的应用。\n\nSDK 版本有两个选项：`Device\
  \ SDK` 和 `Simulator SDK`。在为测试设备构建或提交应用（将在下一章介绍）时，默认值 `Device SDK` 是正确的选择，但在本章中，应选择\
  \ `Simulator SDK` 才能在 iOS 模拟器中运行我们的游戏。\n\n> **注意**  \n> `SDK Version` 这个属性名称用来区分模拟器和硬件构建有点奇怪，但它是\
  \ Unity iOS 旧版本遗留下来的，当时需要指定随 Xcode 安装的 iOS SDK。\n\n`Target iOS Version` 设置指定了应用运行所需的最低\
  \ iOS 版本。将其保留为默认的最低值 iOS 7.0，可以最大限度地增加兼容设备的数量，从而扩大潜在客户群。然而，如果目标 iOS 版本太老，可能会导致 Unity\
  \ 发出警告，提示应用可能被 App Store 拒绝。\n\n`Scripting Define Symbols` 允许你定义自己的预处理器定义，就像上一章\
  \ `FuguPause` 脚本中引用的 `UNITY_EDITOR` 和 `UNITY_WEBPLAYER` 定义一样。例如，如果你有一些代码调用了 Unity\
  \ Pro 才有的功能，你可以用 `#if UNITY_PRO … #endif` 包裹这些代码，然后在使用 Unity Pro 运行的项目中，将 `UNITY_PRO`\
  \ 添加到 `Scripting Define Symbols` 字段。\n\n可以使用分号作为分隔符来添加多个定义。如果你还有一个 `USE_ADS` 预处理器定义来控制是否显示广告，你可以在\
  \ `Scripting Define Symbols` 字段中写入 `USE_ADS;UNITY_PRO`。\n\n“优化”（Optimization）设置中的一些选项与优化无关。`AOT\
  \ Compilation Options` 指的是在 Unity iOS 构建过程中发生的事先（AOT）编译，而不是即时（JIT）编译。这就是为什么在 Unity\
  \ iOS 脚本中需要 `#pragma strict` 的原因。它为 AOT 编译器提供了足够的信息来完成其工作。\n\n最后，`Stripping Level`、`Script\
  \ Call Optimization` 和 `Optimize Mesh Data` 确实是优化设置，它们将在第[16](https://doi.org/10.1007/978-1-4842-3174-6_16)章中与其他优化技术一起介绍。简而言之，`Stripping\
  \ Level` 是一个 Unity iOS Pro 选项，用于移除未使用的代码（或者如果你运气不好，可能会移除已使用的代码，这就是它为何是可选项的原因），`Script\
  \ Call Optimization` 可以通过消除异常处理来加速脚本（异常本质上是可以被调用代码捕获的错误或“异常”情况），而 `Optimize Mesh\
  \ Data` 则用于移除未使用的网格数据（例如，当使用无光照材质时，法线数据就不是必需的）。\n\n如你所见，播放器设置中有许多选项会影响 Unity iOS\
  \ 构建的外观和性能。更改播放器设置后，最好通过 `File` 菜单调用 `Save Project` 或 `Save Scene`（后者也会隐式地执行 `Save\
  \ Project`）来保存这些更改。尽管许多（即使不是大多数）播放器设置在某些时候都很重要，但要让 Angry Bots 在 iOS 模拟器上运行，你唯一需要做的更改就是将\
  \ `Device SDK` 设置为 `Simulator SDK`。\n\n\n\n## 在 iOS 模拟器中进行测试\n\n现在你已经安装了 Xcode，并将\
  \ `Device SDK` 设置为 `Simulator SDK`，就可以在 iOS 模拟器上构建并运行 `Climber` 了。`File` 菜单中的 `Build\
  \ and Run` 命令以及 `Build Settings` 窗口中的 `Build and Run` 按钮，会先执行 `Build` 阶段，生成一个 Xcode\
  \ 项目，然后执行 `Run` 阶段，在 Xcode 项目内发起构建和运行。通常这非常方便，但在使用 iOS 模拟器时，如果手动从 Xcode 进行构建和运行，你将对\
  \ iOS 模拟器拥有更多控制权。因此，让我们再次打开 `Build Settings` 窗口（从 `File` 菜单中），并点击 `Build` 按钮。\n\n\
  > **提示**\n>\n> 在执行构建之前，请检查 `Build Settings` 窗口，确保已包含正确的场景集合。\n\nUnity 会弹出一个 `Save\
  \ As` 窗口，提示你选择即将构建的 Xcode 项目的位置和文件名（图 10-12）。\n\n![A310332_2_En_10_Fig12_HTML.jpg](img/A310332_2_En_10_Fig12_HTML.jpg)\n\
  \n**图 10-12.** 构建提示：选择 Xcode 项目的位置和名称\n\n它通常默认使用 Unity 项目文件夹的顶层目录。我们将这个 Xcode 项目命名为\
  \ `Climber_iOSv1.0`。你添加了版本号，这样就能根据需要跟踪任何更改。\n\n> **警告**\n>\n> 注意不要选择 `Assets` 文件夹内的路径作为构建目标，否则\
  \ Unity 会尝试将整个 Xcode 项目作为项目资源导入。\n\n如果这不是你第一次在此位置构建该项目，Unity 会检测到同名 Xcode 项目已存在，并询问你是要完全替换该项目，还是仅追加项目更改（图\
  \ 10-13）。\n\n![A310332_2_En_10_Fig13_HTML.jpg](img/A310332_2_En_10_Fig13_HTML.jpg)\n\
  \n**图 10-13.** 构建追加或替换对话框\n\n追加方式更快，但有时你需要一个全新的 Xcode 项目。例如，如果你更改了播放器设置中的包标识符，或者（尤其是在）你升级了\
  \ Unity 或 Xcode 之后，都应该构建一个新的 Xcode 项目。\n\n> **提示**\n>\n> 从 `File` 菜单执行的 `Build and\
  \ Run` 与 `Build Settings` 窗口中的 `Build and Run` 按钮并不完全相同。`File` 菜单中的命令假设你要追加构建文件夹（如果它已存在），并且不会询问你是要追加还是替换它。我更喜欢坚持使用\
  \ `Build Settings` 窗口来执行构建，这样我总能清楚当前状况。我曾遇到过这样的情况：复制了一个项目，但从 `File` 菜单调用 `Build\
  \ and Run` 时，它仍然构建到了原始位置！\n\n无论如何，点击 `Build` 后，构建过程中会显示一个进度条（图 10-14）。与资源重新导入一样，对于大型项目，这可能需要一些时间，并且编辑器在构建期间会无响应。\n\
  \n![A310332_2_En_10_Fig14_HTML.jpg](img/A310332_2_En_10_Fig14_HTML.jpg)\n\n**图 10-14.**\
  \ 构建过程中的进度指示器\n\n构建完成后，一个 Xcode 项目将出现在你指定的位置（图 10-15）。\n\n![A310332_2_En_10_Fig15_HTML.jpg](img/A310332_2_En_10_Fig15_HTML.jpg)\n\
  \n**图 10-15.** Unity iOS 构建生成的 Xcode 项目文件夹\n\n该 Xcode 项目名为 `Unity-iPhone.xcodeproj`，位于\
  \ Xcode 项目文件夹中。双击该文件可在 Xcode 中打开项目（图 10-16）。\n\n![A310332_2_En_10_Fig16_HTML.jpg](img/A310332_2_En_10_Fig16_HTML.jpg)\n\
  \n**图 10-16.** 启动并加载了 Unity iOS 项目的 Xcode\n\n注意 Xcode 窗口左上角显示的是 `iPhone 7 Plus`。这是一个用于选择\
  \ Xcode 方案的菜单，方案是 Xcode 中构建规则的集合。其他可用的方案包括当前的 iPad 和 iPhone 模拟器（图 10-17）。\n\n![A310332_2_En_10_Fig17_HTML.jpg](img/A310332_2_En_10_Fig17_HTML.jpg)\n\
  \n**图 10-17.** 选择 iPad 和 iPhone 模拟器\n\n如果从 Unity 中执行 `Build and Run`，iOS 模拟器会自动启动，而不会让你有机会先选择\
  \ iPad 还是 iPhone 模拟器。现在，我们先使用 iPad 模拟器，点击 Xcode 窗口左上角的 `Run` 按钮。`Run` 按钮实际上就是一个\
  \ `Build and Run` 按钮，因为它在尝试运行项目之前，会先编译项目（如果需要的话）。如果成功，一个匹配 iPad 屏幕尺寸的 iOS 模拟器窗口将会出现，并运行\
  \ `Climber`（图 10-18）。\n\n![A310332_2_En_10_Fig18_HTML.jpg](img/A310332_2_En_10_Fig18_HTML.jpg)\n\
  \n**图 10-18.** 在 iOS 模拟器中运行 `Climber`\n\niOS 模拟器会将鼠标输入解释为触摸屏事件，因此你可以点击屏幕进行游戏。此外，iOS\
  \ 模拟器的 `Hardware` 菜单可以模拟其他设备事件（图 10-19）。\n\n![A310332_2_En_10_Fig19_HTML.jpg](img/A310332_2_En_10_Fig19_HTML.jpg)\n\
  \n**图 10-19.** iOS 模拟器选项\n\n例如，`Rotate Left` 和 `Rotate Right` 命令模拟旋转设备方向（试试看，观察自动旋转效果），而调用\
  \ `Home` 等同于按下设备上的 `Home` 按钮，这将挂起或退出应用并显示设备的 `Home` 屏幕。应用图标应该出现在那里，可以点击（模拟轻触）来重新启动应用。`Hardware`\
  \ 菜单还允许你选择不同的设备和 iOS 版本进行模拟。\n\n除了测试，iOS 模拟器还可以通过 `Tools` 菜单中的 `Save Screen Shot`\
  \ 命令方便地截取屏幕截图（图 10-20）。调用该命令会立即将截图保存到桌面。App Store 要求提供你的应用所支持的设备的截图，因此，例如如果你需要一张\
  \ iPad 截图，而你没有 iPad，那么 iOS 模拟器就是一个获取该截图的便捷工具。\n\n![A310332_2_En_10_Fig20_HTML.jpg](img/A310332_2_En_10_Fig20_HTML.jpg)\n\
  \n**图 10-20.** iOS 模拟器中的 `Save Screen Shot` 命令\n\niOS 模拟器窗口没有可操作的关闭按钮，但可以通过 iOS\
  \ 模拟器菜单中的 `Quit iOS Simulator` 命令或其键盘快捷键 `Command+Q` 来退出模拟器（图 10-21）。\n\n![A310332_2_En_10_Fig21_HTML.jpg](img/A310332_2_En_10_Fig21_HTML.jpg)\n\
  \n**图 10-21.** 退出 iOS 模拟器\n\niOS 模拟器在模拟 iOS 功能方面相当完善，包括 iAd 和 Game Center。因此，即使你没有可用于测试的\
  \ iOS 设备，你也可以仅使用 iOS 模拟器完成本书后续的大部分内容。\n\n## 进一步探索\n\n你可能会感到似曾相识，因为你最初就是从 `Climber`\
  \ 演示项目开始的，而现在又回到了它。区别当然在于，现在你是为 iOS 构建项目。你已经迈出了重要的几步：将构建目标改为 iOS，使用 Unity Remote\
  \ 在 Unity 编辑器中进行测试，然后用 Xcode 构建以在 iOS 模拟器中运行。下一步，构建并在真实的 iOS 设备上运行，将在下一章中进行，之后你将回到常规的编程任务，那个保龄球游戏。到那时，理想情况下，你将对构建过程感到得心应手，并能够专注于将游戏打造成一款\
  \ iOS 游戏！\n\n\n\n### Unity 手册\n\n既然讨论回到了 Climber，那么 Unity 手册中第一个相关章节便是“Unity 基础知识”部分，特别是“发布构建”页面。\n\
  \nUnity 手册还包含几个专门关于 Unity iOS 的章节，不过你可能需要点击手册顶部的 iPhone 图标才能看到这些内容。撰写本文时，“iOS 开发入门”部分已有些过时，但其“Unity\
  \ Remote”页面对于解释如何设置和运行该应用仍然有用。\n\n关于 Unity iOS 的较新文档列在 Unity 手册的“高级”部分，其中包括“Unity\
  \ Xcode 项目结构”页面。熟悉生成的 Xcode 项目中的文件是个好主意，但除非你需要启用内置分析器（这将在第 [16](https://doi.org/10.1007/978-1-4842-3174-6_16)\
  \ 章中进行），否则你不需要改动 Unity 生成的 Xcode 文件。\n\n### 参考手册\n\n让 Angry Bots 成功构建的大部分工作都是在玩家设置中填写适当的值。本章对\
  \ iOS 特有的设置进行了简要概述，只有“默认方向”和“设备 SDK”设置对于在 iOS 模拟器中运行很重要，但参考手册中的“玩家设置”页面详细介绍了每个独立的跨平台和\
  \ iOS 特有的玩家设置，以及其他平台的设置。\n\n### iOS 开发者库\n\n`Xcode` 的下载链接和文档可在 Apple 开发者网站的 `Xcode`\
  \ 页面（`http://developer.apple.com/xcode`）上找到。使用 Unity 进行 iOS 开发的一大好处是，你无需深入了解 `Xcode`\
  \ 和 `Objective-C`。不过，熟悉 Xcode 并理解 `Objective-C` 代码仍然会对你有所帮助。\n\n除了在其“帮助”菜单下可以找到的\
  \ `Xcode` 文档外，`Xcode` 网站（`http://developer.apple.com/xcode`）上还提供了指向开发者文档的链接。`Xcode`\
  \ 主题下还列出了许多其他文章，其中许多也可以在 `Xcode` 的“帮助”菜单中找到，包括 `Xcode` 用户指南和 `Xcode` 基础知识帮助。\n\n\
  iOS 开发者库在主题中列出了“Xcode”，而 `Xcode` 主题中大多数相关的“IDE”部分都可以在 iOS 模拟器的用户指南中找到。该指南内容详尽，包含多个章节，对本书的介绍进行了扩展，解释了如何从\
  \ `Xcode` 启动模拟器、如何操作模拟器以及如何调用模拟设备输入。\n\nUnity 在很大程度上让你无需直接接触 Xcode 工作，在本章中，你只需在\
  \ Xcode 中单击“运行”按钮即可运行 iOS 模拟器。因此，提前阅读相关工具的资料是个好主意，为下一章做准备，在下一章中，你将学习如何构建并运行应用以进行测试，以及如何构建应用以提交到\
  \ App Store。\n\n"
- "# 11. 真机构建：设备测试与 App 提交\n\n在 iOS 上运行 Climber 游戏出乎意料地简单。只需将构建目标切换到 iOS，然后在编辑器中立即使用\
  \ `Unity Remote` 应用作为输入设备来运行游戏（或者，在 iOS 模拟器中运行游戏时，在玩家设置中将目标 SDK 设置为 `Simulator SDK`\
  \ 进行构建）。\n\n这看起来可能太简单了，以至于不像是最终结果，事实也确实如此。下一步是令人痛苦的部分：构建 Unity 项目，使其能够在真实的 iOS 硬件上安装和运行。这个过程涉及\
  \ Unity 的部分很简单，几乎与构建项目以在 iOS 模拟器上运行相同。但是，在测试设备上安装应用需要使用移动配置文件来构建应用，该配置文件也需要安装在 Xcode\
  \ 和测试设备上。在此之前，必须使用与测试设备和应用包标识符关联的开发证书，在 Apple 的配置门户中创建该配置文件。因此，在此之前，必须先在配置门户中注册测试设备和包标识符，并且在创建证书请求后生成开发证书。\n\
  \n这仅仅是为了测试。构建用于提交到 App Store 的应用也需要类似的过程，但需要使用单独的分发配置文件和相应的证书。此外，将应用提交到 App Store\
  \ 还需要将应用添加到 `iTunes Connect`，这是一个用于在 App Store 上管理应用的单独网站。\n\n如果处理配置文件听起来很麻烦，你可能会想跳过本章，稍后再回来。实际上，接下来几章中保龄球游戏的\
  \ iOS 适配版可以使用 `Unity Remote`（针对第 13 章的输入代码）和 iOS 模拟器（针对第 12 章设置的图标、启动屏幕和屏幕大小）进行测试，就像上一章中处理\
  \ Climber 游戏一样。此外，访问配置门户和 `iTunes Connect`（以及相关的非公开文档）需要成为 iOS 开发者计划的成员，所以如果你还没加入，那无论如何也只能等待。\n\
  \n但是，你需要加入 iOS 开发者计划才能设置 `Game Center` 排行榜和成就（我将在第 14 章中介绍）以及 `iAd` 横幅广告和插页式广告（我将在第\
  \ 15 章中介绍）；此外，性能测量（我将在第 [16](https://doi.org/10.1007/978-1-4842-3174-6_16) 章中介绍）如果不能在实际硬件上运行，也就不那么有趣了。因此，至少最好尽快开始\
  \ iOS 开发者计划的注册流程！\n\n## 注册为 iOS 开发者\n\n正如你所料，Apple 开发者网站（`http://developer.apple.com/`）是查找大多数官方\
  \ Apple 开发者资源的地方（`iTunes Connect` 除外），包括所有 Apple 开发者计划——Mac 开发者计划、Safari 开发者计划，以及你感兴趣的\
  \ iOS 开发者计划。你可以以个人或公司身份注册 iOS 开发者计划。只要你有信用卡并准备支付每年 `$99` 的费用，以个人身份注册就相当简单。以公司身份注册也需要同样的条件，但还需要一个合法的公司实体以及公司的支持信息，包括一个数据通用编号系统（DUNS）编号，这是\
  \ Dun & Bradstreet 分配给公司的唯一标识符。个人和公司账户都需要经过 Apple 批准，但公司账户的批准时间可能比个人账户更长（我的公司 Technicat,\
  \ LLC 的批准花了三个月时间）。\n\n公司账户唯一额外功能是账户管理员可以添加团队成员，因此在本书中，我将假定你使用的是个人账户，或者等效地，作为公司账户的管理员。\n\
  \n一旦你被批准为 iOS 开发者，你就可以使用你的 Apple ID 登录 Apple 开发者网站以及 `iTunes Connect`（`http://itunesconnect.apple.com/`）。`ITunes\
  \ Connect` 是你管理所有已上架或准备上架 App Store 的应用的网站。但在使用 `iTunes Connect` 之前，你将登录 Apple 开发者网站，并在配置门户中创建开发和分发配置文件，这些文件分别用于测试构建和分发构建。\n\
  \n\n\n### 使用配置门户\n\n假设您拥有 iOS 开发者计划会员资格（如果没有，可以跳过本章，稍后再回来看），请登录 [`http://developer.apple.com/`](http://developer.apple.com/)\
  \ 并进入配置门户。\n\n> **注意**：苹果开发者网站有多个可登录的区域——会员中心、iOS 开发中心和开发者论坛——您可以从会员中心或 iOS 开发中心进入配置门户（目前，其组织结构确实有些混乱）。\n\
  \n登录后，网站上有详细的文档说明（配置门户是苹果几乎没有公开逐步截屏文档的少数区域之一），但我会简要概述涉及的步骤以及您需要提供的信息。\n\n### 注册测试设备\n\
  \n开发配置配置文件仅对指定的测试设备集有效，因此首先要做的是在配置门户中注册您要用于测试的 iOS 设备。您需要提供每个设备的唯一设备标识符（`UDID`）。设备的\
  \ `UDID` 可以通过 iTunes 或 `Xcode` 找到。在 iTunes 中，当 iOS 设备连接到您的 Mac 时，点击设备的序列号即可找到 `UDID`，该操作会将序列号显示切换为\
  \ `UDID` 显示。但该显示内容无法复制粘贴，因此更好的选择是从 `Xcode` 中获取该编号。\n\n当 iOS 设备连接到您的 Mac 时，`UDID`\
  \ 会显示在 Xcode 设备窗口中。要调出 `Xcode` 的设备窗口，请启动 `Xcode`（如果尚未运行），然后从 `Window` 菜单中选择 `Devices`（图\
  \ 11-1）。\n\n![A310332_2_En_11_Fig1_HTML.jpg](img/A310332_2_En_11_Fig1_HTML.jpg)\n\
  \n*图 11-1. 从 Xcode `Window` 菜单中选择 `Devices`*\n\n调出设置器窗口后，所有连接的 iOS 设备都应列在左侧面板中。选择您要注册测试的设备，设备信息（包括列为\
  \ `identifier` 的 `UDID`）便会显示出来（图 11-2）。\n\n![A310332_2_En_11_Fig2_HTML.jpg](img/A310332_2_En_11_Fig2_HTML.jpg)\n\
  \n*图 11-2. 从 Xcode 设置器中获取设备 ID*\n\n然后，您可以将 `UDID` 复制并粘贴到配置门户中，以注册您的测试设备。\n\n###\
  \ 注册应用标识符\n\n注册测试设备后，您需要注册应用标识符，因为每个配置配置文件仅对单个应用 ID 有效。一个应用 ID 对应一个捆绑包 ID（与您在 Unity\
  \ 播放器设置中为应用指定的 ID 相同），或者当它以星号结尾时匹配多个捆绑包 ID（此时称为通配符应用 ID）。例如，我注册了应用 ID `com.technicat.*`，可以在一个配置配置文件中将其用于我所有的应用，例如\
  \ `com.technicat.fugubowl` 和 `com.technicat.hyperbowl`。\n\n> **提示**：创建一个匹配您所有或大部分捆绑包\
  \ ID 的通配符应用 ID，这样您就不必为每个捆绑包 ID 都创建新的应用 ID。\n\n### 使用开发配置配置文件\n\n要创建开发配置配置文件，您需要生成一个与该配置文件关联的开发证书。配置门户有关于如何生成和上传证书请求的说明，该请求将产生一个新的开发证书。然后，您可以创建一个与该证书关联的开发配置配置文件。\n\
  \n实际上，一旦您生成了开发证书，配置门户会自动为您生成一个团队配置配置文件，该文件使用星号（`*`）作为应用 ID，从而匹配您的任何捆绑包 ID，这非常方便。但您也可以使用相同的证书和您指定的应用\
  \ ID 生成任意数量的其他开发配置配置文件。\n\n### 使用发布配置配置文件\n\n创建发布配置配置文件类似于创建开发配置配置文件。您需要创建一个发布证书，然后创建一个与该证书关联的发布配置配置文件。\n\
  \n> **提示**：通过重复使用同一个证书请求文件来创建开发证书和发布证书，可以节省一些时间。\n\n## 使用 Xcode 设置器\n\n当您的开发配置配置文件可用时，您可以将它们下载到\
  \ `Xcode` 中。调出 Xcode 设置器窗口（从 Xcode `Window` 菜单），在侧边栏中选择 `Provisioning Profiles`，然后点击配置文件列表右下角的\
  \ `Refresh` 按钮。在提示您输入 Apple 开发者登录信息后，设置器将检索并显示您在配置门户中创建的所有配置配置文件。\n\n图 11-3 显示了我的全部四个配置配置文件。请注意，所有应用\
  \ ID 都带有一个数字前缀。这是由配置门户生成的，称为捆绑包种子 ID。就我们这里的目的而言，您可以忽略它。\n\n![A310332_2_En_11_Fig3_HTML.jpg](img/A310332_2_En_11_Fig3_HTML.jpg)\n\
  \n*图 11-3. Xcode 设置器中列出的配置配置文件*\n\n第一个配置配置文件名为 **La Petite Baguette Distribution**，是一个发布配置配置文件，仅匹配一个名为\
  \ La Petite Baguette 的应用（一个餐厅应用）。请注意，应用 ID 是完全指定的，与 La Petite Baguette 应用的捆绑包 ID\
  \ 完全匹配。还要注意，该配置配置文件已过期。\n\n第二个配置文件 **iOS Team Provisioning Profile** 是配置门户自动创建的开发配置配置文件。它匹配任何应用的捆绑包\
  \ ID。\n\n第三个配置文件名为 `techdev`，是我创建的一个开发配置配置文件，可用于我的任何应用，因为它会匹配以 `com.technicat` 开头的任何捆绑包\
  \ ID。\n\n第四个配置文件是我唯一的发布配置配置文件。它也匹配任何捆绑包 ID 以 `com.technicat` 开头的应用。\n\n请注意过期日期。证书及其关联的配置配置文件会在一年后过期，届时您必须用使用新证书创建的新配置文件替换已过期的配置文件。\n\
  \n您可以在 Xcode 设置器中通过点击左下角的 `+` 按钮来添加一个配置配置文件（图 11-4）。\n\n![A310332_2_En_11_Fig4_HTML.jpg](img/A310332_2_En_11_Fig4_HTML.jpg)\n\
  \n*图 11-4. 添加配置配置文件*\n\n\n\n### 构建与运行\n\n现在你可以开始测试设备了。该过程与为 iOS 模拟器构建和运行相同，但首先需要进入\
  \ Unity 播放器设置，将`Target SDK`设置为`Device SDK`而非`Simulator SDK`（如图 11-5 所示）。\n\n![A310332_2_En_11_Fig5_HTML.jpg](img/A310332_2_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5.\n\n设备构建的播放器设置\n\n在开始构建之前，由于是针对真实硬件进行构建，你需要确保`Target iOS Version`设置与测试设备兼容（反之亦然），即`Target\
  \ iOS Version`设置应至少与测试设备运行的 iOS 版本一样旧。但实际上，这也是一个部署决策。支持更旧的 iOS 版本可以增加潜在用户数量，但可能会增加你的支持负担，并阻止使用仅在较新\
  \ iOS 版本中可用的功能。事实上，Unity 收集了关于当前运行基于 Unity 应用的 iOS 硬件和版本的数据，可访问[`http://stats.unity3d.com/`](http://stats.unity3d.com/)。只要你创建的\
  \ Unity 应用在播放器设置中勾选了`Submit HW Statistics`选项，它就会贡献数据给这些统计。你可以执行`Build and Run`操作，这相当于执行构建、通过双击项目文件手动打开生成的\
  \ Xcode 项目（如图 11-6 所示），然后在 Xcode 中点击运行按钮。\n\n![A310332_2_En_11_Fig6_HTML.jpg](img/A310332_2_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6.\n\nUnity iOS 构建生成的 Xcode 项目\n\n无论哪种方式，Xcode 都会在连接的测试设备上构建、安装和运行，而不是在 iOS\
  \ 模拟器中构建和运行。\n\n**提示**：在使用设备进行测试时，最好完全禁用屏幕锁定。如果连接的设备屏幕锁定，从 Xcode 启动运行将会失败。\n\n与\
  \ iOS 模拟器一样，任何 Unity 调试文本都会显示在 Xcode 的调试区域（如图 11-7 所示），而不是 Unity 编辑器中的控制台视图。\n\n\
  ![A310332_2_En_11_Fig7_HTML.jpg](img/A310332_2_En_11_Fig7_HTML.jpg)\n\n图 11-7.\n\
  \nXcode 在测试设备上运行应用\n\n**注意**：Xcode 中与 Unity 编辑器视图等同的概念称为区域。与视图不同，Xcode 区域全部使用小写拼写（例如，导航区域、编辑器区域和调试区域）。\n\
  \n你还可以使用 MonoDevelop 调试器，尽管调试 iOS 应用比调试 Unity 编辑器中运行的游戏需要更多的设置。要启用应用以使用 MonoDevelop\
  \ 进行远程调试，请在构建设置窗口中勾选`Development Build`选项（如图 11-8 所示）。启用`Development Build`选项后，`Script\
  \ Debugging`选项将变为可用，你也应该勾选它。\n\n![A310332_2_En_11_Fig8_HTML.jpg](img/A310332_2_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8.\n\n创建启用脚本调试的开发构建\n\n远程调试与 Xcode 交互时存在问题，包括断点后无法恢复，因此请先执行`Build and Run`操作，将应用安装到测试设备上。在\
  \ Xcode 中点击停止以终止测试运行，然后手动在设备上重新启动应用（即像正常启动应用一样点击应用图标）。最后，在 MonoDevelop 中执行`Attach\
  \ to Process`操作，但不要附加到 Unity 编辑器，而是附加到测试设备（如图 11-9 所示）。\n\n![A310332_2_En_11_Fig9_HTML.jpg](img/A310332_2_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9.\n\n将 MonoDevelop 调试器附加到 iOS 播放器\n\n当你对设备测试感到满意后，就可以将应用提交到 App Store 了。这不需要在\
  \ Unity 内进行任何更改；你只需在 Xcode 中使用分发配置文件（distribution provisioning profile）而非开发配置文件（development\
  \ provisioning profile）重新构建应用即可。但首先，你需要在 iTunes Connect 中为应用创建一个 App Store 条目。在创建\
  \ iTunes Connect 条目之前，你应该准备好一些 App Store 所需的图形素材。\n\n### 准备 App Store 图形素材\n\n你需要为\
  \ App Store 准备两种图形素材：一个应用图标和一组针对所有目标设备尺寸的截图。iTunes Connect 在闲置一段时间后容易自动注销并丢失所有更改，因此你最好不要在登录后手忙脚乱地创建图标和截图。\n\
  \n#### 创建图标\n\niTunes Connect 会要求你提供 1024 × 1024 像素版本的应用图标，格式为`.png`或`.jpeg`，它将伴随应用的\
  \ App Store 描述一起出现。如果你在创建应用图标时已经提前规划好，那就万事俱备了。否则，你必须在进入 iTunes Connect 之前现在创建它。\n\
  \n理想情况下，你应该让专业的图标设计师来创建图标，但如果你资金不足且缺乏艺术技能，可以像我一样在紧急情况下做——从 Unity 编辑器游戏视图中截取一张大截图，然后将其缩放到\
  \ 1024 × 1024 像素。从大尺寸缩小到小尺寸效果更好。将较小的现有图标放大通常效果不佳，并且苹果不鼓励这样做，尽管这种情况可能经常发生，因为直到不久之前，应用提交时上传的还是\
  \ 512 × 512 像素的图标。\n\n**注意**：如果 App Store 图标与设备上显示的任何应用图标不匹配，苹果可能会拒绝你的应用。因此，如果你为\
  \ App Store 创建了一个全新的 1024 × 1024 图标，你应该在 Unity 播放器设置中将其设为默认图标。\n\n#### 截图\n\niTunes\
  \ Connect 还会要求你提供三种尺寸的截图：适配 iPhone 4（640 × 960 或 960 × 640）、iPhone 5（640 × 1136\
  \ 或 1136 × 640）和 iPad（768 × 1024 或 1024 × 768，新 iPad 则需双倍尺寸）。这假设你在 Unity 播放器设置中选择了`iPhone\
  \ + iPad`作为支持的硬件。如果你只选择了`iPhone`，则无需提供 iPad 截图；如果只选择了`iPad`，则只需提供 iPad 截图。\n\n有三种相当方便的截图方法：使用\
  \ iOS 模拟器、通过 Xcode 的 Organizer 窗口从设备截取，以及在设备上同时按下 Home 键和电源键。\n\n使用 iOS 模拟器截图很简单。使用“编辑”菜单中的“截图”命令，生成的截图会保存在桌面上。如果你的游戏在有限的\
  \ iOS 模拟器输入方式下表现不佳，使用 iOS 模拟器可能不太方便。但如果你没有 iPhone 或 iPad，这是一种获取截图的方法。\n\n通过 Xcode\
  \ 截图也几乎同样简单。将设备连接到 Mac，在 Xcode 的 Organizer 窗口中选择设备的“截图”面板。然后在测试设备上运行游戏时，看到喜欢的画面就点击右下角的“新截图”按钮。截图会直接显示在桌面上，方便访问。\n\
  \n我最喜欢的截图方法是直接在设备上同时按下 Home 键和电源键。生成的截图会保存到设备的“照片”应用中，之后可以同步到 Mac 的 iPhoto 中，并可在访达中访问。这种方法让我可以随时随地截图，比如在沙发上，而不必一直连着\
  \ Mac。而且，在关键时刻快速截图，比试图抓住鼠标并迅速点击 Xcode Organizer 中的“新截图”按钮要容易得多。\n\n\n\n## 在 iTunes\
  \ Connect 上添加应用\n\n既然已经准备好了图标和截图，就可以开始在 iTunes Connect 中添加应用信息了。登录 [`http://itunesconnect.apple.com/`](http://itunesconnect.apple.com/)\
  \ 后，你会看到主菜单，如图 11-10 所示。\n\n![A310332_2_En_11_Fig10_HTML.jpg](img/A310332_2_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10. iTunes Connect 的主菜单\n\n点击 `Manage Your Applications` 开始操作。现在你会看到一个已添加应用的列表，以及一个\
  \ `Add New App` 按钮。图 11-11 展示了我 iTunes Connect 账户中的这一页面，其中显示了我的一些应用，每个应用都带有版本号和一个根据应用状态使用颜色编码的圆点。\n\
  \n![A310332_2_En_11_Fig11_HTML.jpg](img/A310332_2_En_11_Fig11_HTML.jpg)\n\n图 11-11.\
  \ 在 iTunes Connect 中添加或管理应用\n\n绿色圆点表示该应用已在 App Store 上线，红色表示被拒绝。黄色则代表多种含义，但通常意味着应用尚未上传。对于已上线且有更新已提交或正在进行中的应用，系统会同时列出这两种状态。当然，如果这是你的第一个应用，列表中将不会显示任何应用。\n\
  \n### 选择应用类型\n\n当你点击 `Add New App` 时，下一页（图 11-12）会要求你选择应用类型：适用于 App Store 的 iOS\
  \ 应用，或适用于 Mac App Store 的 macOS 应用。\n\n![A310332_2_En_11_Fig12_HTML.jpg](img/A310332_2_En_11_Fig12_HTML.jpg)\n\
  \n图 11-12. 在 iTunes Connect 中选择新应用类型\n\n点击 `New App` 将弹出一系列网页，每个页面都包含一个待填写的表单，你可以通过点击\
  \ `Continue` 按钮进入下一页或下一个表单。\n\n### 输入应用信息\n\n选择 iOS 作为应用类型后，系统会呈现一个用于输入应用名称和 Bundle\
  \ ID 的页面。这些信息应与 Unity 编辑器的播放器设置中指定的产品名称和 Bundle ID 一致。Bundle ID 列表取自你添加到配置门户的应用\
  \ ID 列表。如果你添加了通配符应用 ID，可以选择该 ID，然后指定你所添加应用的特定 Bundle ID 后缀。\n\n例如，在图 11-13 中，我提供了修改后的\
  \ Angry Bots 项目（已更名为 Fugu Bots）的信息。通配符 ID `com.technicat.*` 和后缀 `FuguBot` 与我在 Unity\
  \ 播放器设置中的 Bundle ID `com.technicat.FuguBot` 相匹配。\n\n![A310332_2_En_11_Fig13_HTML.jpg](img/A310332_2_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13. 在 iTunes Connect 上指定应用名称和 Bundle ID\n\n默认语言表示你在提交此应用时，所有资源和描述将使用的主要语言。\n\
