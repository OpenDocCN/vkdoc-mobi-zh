  4-21）。当 MonoDevelop 在调试模式下暂停执行时，你可以检查堆栈跟踪并以其他方式检查运行时环境。例如，图 4-21 显示了在监视面板中输入 `gameObject`
  然后在 `FuguRotate` 更新回调中的断点处暂停的结果。`gameObject` 的当前值是立方体 `GameObject`，现在可以检查其成员变量。


