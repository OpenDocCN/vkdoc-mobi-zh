  对 `this.gameObject` 的引用等同于仅使用 `gameObject`。变量 `this` 始终引用当前对象，即此脚本组件（在其他一些编程语言中，使用
  `self` 的方式相同）。有时我喜欢像 `gameObject` 这样的变量显式加上前缀 `this.`，以明确我引用的是一个实例变量，这是一个在类中定义的变量，它不是函数内部的局部变量，也不是静态变量，因此类的每个实例都有自己的副本。


  现在脚本在 `Start` 函数中不应再中断（你可以在 Unity 编辑器中点击`播放`来确认）。但你仍然可以通过添加断点让 MonoDevelop 在任何代码行上暂停执行。在
  `Update` 函数的某行代码左侧单击，该行旁边会出现一个断点指示器（图 4-20）。


