  \n**警告**  \n与点光源位置完全相同的对象不会受到该光照的影响。\n\n请继续移动光照并根据需要调整其半径，以确保立方体被照亮。现在点击`Play`按钮，立方体被照亮，并且当你围绕立方体旋转相机时，光照会发生变化。\n\
