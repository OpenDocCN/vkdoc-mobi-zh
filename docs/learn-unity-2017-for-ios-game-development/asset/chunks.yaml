    ### 创建 FuguBowlPlayer


    `FuguBowlPlayer` 类现已准备就绪，可以直接使用。由于该脚本未附加到 `GameObject` 上（也无法附加，因为 `FuguBowlPlayer`
    不是 `MonoBehaviour`），因此必须在运行时实例化 `FuguBowlPlayer`。最自然的做法是在 `FuguBowl` 脚本的 `Awake`
    回调中进行，该回调已在实例化保龄球瓶（见代码清单 8-9）。


    ```

    static var player:FuguBowlPlayer = null;

    function Awake() {

    player = new FuguBowlPlayer();

    CreatePins();

    }

    代码清单 8-9.

    在 FuguBowl.js 中创建 FuguBowlPlayer

    ```


    增强后的 `Awake` 回调会创建一个新的 `FuguBowlPlayer` 实例，并将其赋值给变量 `player`，该变量声明为静态变量，便于从 `FuguBowl`
    脚本外部访问（为下一章的计分板实现做准备）。


    若要支持多名玩家，`player` 变量可以改为 `FuguBowlPlayers` 数组（使用可调整大小的数组，而非内置数组，以适应不同的玩家数量），并增加一些封装函数，如
    `GetPlayer` 和 `GetNumberOfPlayers`。但就本书而言，我们将保持简单，专注于单人游戏。


    ## 球瓶状态


    现在，`FuguBowl` 脚本除了引用保龄球瓶和球之外，还引用了 `FuguBowlPlayer`。但要调用 `FuguBowlPlayer` 的计分函数，`FuguBowl`
    必须传入被击倒的球瓶数量。与其在 `FuguBowl` 中添加代码来判断球瓶是否倒下，更简洁的做法是将此逻辑写在附加到每个球瓶的脚本中。这样，`FuguBowl`
    只需询问每个球瓶是否倒下，而无需了解球瓶的内部工作原理。


    对于这个新的球瓶脚本，创建一个新的 JavaScript，命名为 `FuguPinStatus`，并将其放在 Scripts 文件夹中（图 8-3）。


    ![A310332_2_En_8_Fig3_HTML.jpg](img/A310332_2_En_8_Fig3_HTML.jpg)


    图 8-3.


    创建 FuguPinStatus.js 脚本。


    接下来，将代码清单 8-10 的内容添加到脚本中。


    ```

    #pragma strict

    var knockedAngle:float = 45.0;

    private var initialAngles:Vector3;

    function Start () {

    initialAngles = transform.localEulerAngles;

    }

    function IsKnockedOver() {

    return Mathf.Abs(transform.localEulerAngles.x-initialAngles.x) > knockedAngle
    ||

    Mathf.Abs(transform.localEulerAngles.y-initialAngles.y) > knockedAngle ||

    Mathf.Abs(transform.localEulerAngles.z-initialAngles.z) > knockedAngle;

    }

    代码清单 8-10.

    FuguPinStatus.js 的代码清单

    ```


    脚本中的 `Awake` 回调将 `GameObject` 的初始旋转保存在私有变量 `initialAngles` 中，以便后续比较。函数 `IsKnockedOver`
    根据球瓶围绕任何轴的旋转是否超过 `knockedAngle` 变量中指定的角度值，返回 `true` 或 `false`。


    在“项目”视图中，选择 `BarrelPin` 预制体中的 `Barrel` GameObject，然后使用“检查器”视图中的“添加组件”按钮附加 `FuguPinStatus`
    脚本（图 8-4）。


    ![A310332_2_En_8_Fig4_HTML.jpg](img/A310332_2_En_8_Fig4_HTML.jpg)


    图 8-4.


    FuguPinStatus.js 脚本附加到 Barrel 球瓶预制体上


    在查询每个球瓶是否被击倒之前，`FuguBowl` 脚本需要先找到这些球瓶。如果 `Array` 中填充的是基于胶囊体的 `Pin` 预制体，则查询变量 `pins`
    中的每个 `GameObject` 即可；但当数组装满 `BarrelPin` 类型的 GameObject 时，作为真正球瓶的 `Barrel` GameObject
    是这些 `BarrelPin` 的子对象。


    幸运的是，在第 7 章中，您已将所有“实际”球瓶（即带有 `Rigidbody` 和 `Mesh` 组件、会实际移动的 GameObject）标记为 `Pin`
    标签。这使得可以使用静态函数 `GameObject.FindGameObjectsWithTag` 来检索所有实际球瓶的数组。该操作应在 `FuguBowl`
    脚本的 `CreatePins` 函数末尾进行，即在所有球瓶实例化完成后（代码清单 8-11）。被标记的球瓶被赋值给一个名为 `pinBodies` 的私有变量。


    ```

    private var pinBodies:GameObject[]; // 实际物理球瓶

    function CreatePins() {

    pins = new Array();

    var offset = Vector3.zero;

    for (var row=0; row < pinRows; ++row) {

    offset.z += pinDistance;

    offset.x = -pinDistance * row / 2;

    for (var n=0; n <= row; ++n) {

    pins.push(Instantiate(pin, pinPos + offset, Quaternion.identity));

    offset.x += pinDistance;

    }

    }

    pinBodies = GameObject.FindGameObjectsWithTag("Pin");

    }

    代码清单 8-11.

    在 FuguBowl.js 中声明和设置 pinBodies 变量

    ```


    被击倒的球瓶数量由函数 `GetPinsDown`（代码清单 8-12）统计，该函数会遍历 `pinObjects` 数组，每遇到一个 `IsKnockedOver`
    函数返回 `true` 的球瓶，便递增局部变量 `pinsDown`。循环结束后，返回 `pinsDown` 计数器的值。


    ```

    function GetPinsDown():int {

    var pinsDown:int = 0;

    for (var pin:GameObject in pinBodies) {

    if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {

    ++pinsDown;

    }

    }

    return pinsDown;

    }

    代码清单 8-12.

    FuguBowl.js 中的 GetPinsDown 函数

    ```


    除了统计被击倒的球瓶数量，还可以将它们移除，就像在真实保龄球馆中，球瓶被击倒后会被清理掉一样。函数 `RemoveDownedPins`（代码清单 8-13）会遍历
    `pinBodies` 列表，并对每个 `IsKnockedDown` 返回 `true` 的球瓶调用 `SetActive(false)`。调用 `SetActive(false)`
    等同于在“检查器”视图中取消选中 GameObject 左上角的复选框。每个被击倒的球瓶虽然不会从场景中完全移除，但会变得不可见且不会发生碰撞。


    ```

    function RemoveDownedPins() {

    for (var pin:GameObject in pinBodies) {

    if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {

    pin.SetActive(false);

    }

    }

    }

    代码清单 8-13.

    FuguBowl.js 中的 RemovePins 函数

    ```


    当然，被停用的球瓶需要在某个时候重新激活。现有的 `ResetPins` 函数（代码清单 8-14）是一个合适的执行位置，因为在准备进行新一轮投球、将球瓶恢复至初始位置时会调用
    `ResetPins`。


    ```

    function ResetPins() {

    for (var pin:GameObject in pinBodies) {

    pin.SetActive(true);

    pin.SendMessage("ResetPosition");

    }

    }

    代码清单 8-14.

    FuguBowl.js 中的 ResetPins 函数

    ```


    实际上，现在可以将对 `pins` 数组的循环替换为对 `pinBodies` 的循环。在循环内部，对每个球瓶调用 `SetActive(true)` 以防其被停用，并且可以使用
    `SendMessage` 替代 `BroadcastMessage`，因为已知 `pinBodies` 中的每个球瓶都附加了 `FuguReset` 脚本。


    ## 游戏逻辑


    我强烈建议在尝试编写游戏逻辑代码之前，先将游戏绘制为有限状态机。有限状态机将程序表示为一组有限的状态。有限状态机在任何时刻都处于一个状态，并在状态之间进行转换。


    注意


    术语“状态机”通常指代有限状态机，但从技术上讲，状态机的范围很广，从最简单、功能最弱的自动机类别——有限状态机，一直到具有无限内存和潜在无限数量状态的图灵机。


    一旦您将游戏可视化为有限状态机，您就可以确信自己能够对其进行编码。反之，如果您无法将游戏流程可视化为有限状态机，那么您可能只有一个模糊的想法，尚未准备好实现它！

