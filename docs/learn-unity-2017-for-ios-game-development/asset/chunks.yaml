- fmt: '### Search for Assets


    In a large and complex project, it’s difficult to manually search for a particular
    asset. Fortunately, just as in the Finder, there is a search box that can be used
    to filter the results showing in the right panel of the Project view. In Figure
    [2-34](#A310332_2_En_2_Chapter.html#Fig34), the Project View displays the result
    of searching for assets with “add” in their names.


    ![A310332_2_En_2_Fig34_HTML.jpg](Images/A310332_2_En_2_Fig34_HTML.jpg)


    **Figure 2-34.** Searching for assets with “add” in the name


    The right panel displays the search results for everything under Assets (i.e.,
    all of our assets). The search can be narrowed further by selecting one of the
    subfolders in the left panel. For example, if you know you’re looking for a texture,
    and you’ve arranged your assets into subfolders by the type of asset, you can
    select the Scripts folder to search (Figure [2-35](#A310332_2_En_2_Chapter.html#Fig35)).


    ![A310332_2_En_2_Fig35_HTML.jpg](Images/A310332_2_En_2_Fig35_HTML.jpg)


    **Figure 2-35.** Searching assets in a folder


    Notice just below the search, there is a tab with the name of the folder that
    was selected. You can still click the Assets tab to the left to see the search
    results for all your assets, both locally and on the Unity Asset Store, which
    we’ll make copious use of in this book.


    You can also filter your search by asset type, using the menu immediately to the
    right of the search box. Instead of just searching in the Scripts folder, you
    could have selected Script as the asset type of interest (Figure [2-36](#A310332_2_En_2_Chapter.html#Fig36)).
    Notice how that resulted in `s:Texture` being added to the search box. The `t:`
    prefix indicates the search should be filtered by the following asset type. You
    could have just typed that in without using the menu.


    ![A310332_2_En_2_Fig36_HTML.jpg](Images/A310332_2_En_2_Fig36_HTML.jpg)


    **Figure 2-36.** Search filtered by asset type


    The button to the right of the asset type menu is for filtering by label (you
    can assign a label to each asset in the Inspector View), which is also pretty
    handy for searching the Asset Store. And the rightmost button, the star, will
    save the current search in the Favorites section of the left panel.


    ### Operate on Assets


    Assets in the Project View can be manipulated very much like their corresponding
    files in the Finder.


    Double-clicking an asset will attempt to open a suitable program to view or edit
    the asset. This is equivalent to right-clicking the asset and selecting `Open`.
    Double-clicking a scene file will open the scene in this Unity Editor window,
    just as if you had selected `Open Scene` in the File menu.


    You can also rename, duplicate and delete, and drag files in and out of a folder
    just as you can in the Finder. Some of the operations are available in the Unity
    Edit menu and in a pop-up menu when you right-click on an asset. You’ll get some
    practice with that in the next few chapters.


    Likewise, in the next chapter you will work on adding assets to a project. That
    involves importing a file or importing a Unity package, using the Assets menu
    on the menu bar or just dragging files into the Assets folder of the project using
    the Finder.


    ## The Hierarchy View


    Every game engine has a top-level object called a game object or entity to represent
    anything that has a position, potential behavior, and a name to identify it. Unity
    game objects are instances of the class `GameObject`.


    **Note:** In general, when we refer to a type of Unity object, we’ll use its class
    name to be precise and make clear how that object would be referenced in a script.


    The Hierarchy View is another representation of the current scene. While the Scene
    View is a 3D representation of the scene that you can work in as you would with
    a content creation tool, and the Game View shows the scene as it looks when playing
    the game, the Hierarchy View lists all the `GameObjects` in the scene in an easily
    navigable tree structure.


    ### Inspect Game Objects


    When you click a `GameObject` in the Hierarchy View, it becomes the current Editor
    selection and its components are displayed in the Editor. Every `GameObject` has
    a Transform Component, which specifies its position, rotation, and scale, relative
    to its parent in the hierarchy (if you’re familiar with the math of 3D graphics,
    the Transform is essentially the transformation matrix of the object). Some components
    provide a function for the game object (e.g., a light is a `GameObject` with a
    Light Component attached). Other components reference assets such as meshes, textures,
    and scripts. Figure [2-37](#A310332_2_En_2_Chapter.html#Fig37) shows the components
    of the Player `GameObject` (in the Hierarchy view, the entire Player tree of `GameObjects`
    is displayed in blue because it’s linked to a prefab, a special type of asset
    that is used to clone a `GameObject` or group of `GameObjects`).


    ![A310332_2_En_2_Fig37_HTML.jpg](Images/A310332_2_En_2_Fig37_HTML.jpg)


    **Figure 2-37.** Hierarchy View and Inspector View


    ### Parent and Child GameObjects


    Notice that many of the `GameObjects` are arranged in a hierarchy, hence the name
    of this view (in computer graphics, this is commonly known as a scene graph).
    Parenting makes sense for game objects that are conceptually grouped together.
    For example, when you want to move a car, you want the wheels to automatically
    move along with the car. So the wheels should be specified as children of the
    car, offset from the center of the car. When the wheels turn, they turn relative
    to the movement of the car. Parenting also allows us to activate or deactivate
    whole groups of game objects at one time.


    ## The Scene View


    Whereas the Hierarchy View allows us to create, inspect, and modify the `GameObjects`
    in the current scene, it doesn’t give us a way to visualize the scene. That’s
    where the Scene View comes in. The Scene View is similar to the interfaces of
    3D modeling applications. It lets you examine and modify the scene from any 3D
    vantage point and gives you an idea how the final product will look.'
