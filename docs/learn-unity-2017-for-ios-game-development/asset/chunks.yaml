  trans: '

    # 跟踪应用


    尽管 iTunes Connect 提供下载量和销售额数据（其图表比曾经是唯一选项的 `.csv` 报告更易读），但也有几种第三方产品可以跟踪应用销售数据以及应用排名和评论等其他信息。


    `App Annie`（`http://appannie.com/`）和 `AppFigures`（`http://appfigures.com/`）是两个较为流行的基于
    Web 的产品，它们能自动每天从 iTunes Connect 下载应用数据（但需要在账户设置时提供 iTunes Connect 登录信息）。这两个产品都能以漂亮的图表展示销售数据，并每天发送应用统计摘要邮件。`App
    Annie` 目前是免费的（严格来说处于测试阶段），而 `AppFigures` 则收取费用。


    图 15-6 显示了 Fugu Bowl 一个月内下载量的 `App Annie` 图表。更新下载量叠加在销量之上。其中有一条更新线对应 FuguBowl
    更新的发布情况。


    ![A310332_2_En_15_Fig6_HTML.jpg](img/A310332_2_En_15_Fig6_HTML.jpg)


    图 15-6. `App Annie` 销售图表


    `AppViz` (`http://appviz.com/`) 是一款 macOS 应用程序，它实现相同功能，但将数据下载到你的 Mac 上，并提供多种图表，包括按地理区域划分的销售情况（图
    15-7）。`AppViz` 不是免费的，但价格不高，我认为物有所值。


    ![A310332_2_En_15_Fig7_HTML.jpg](img/A310332_2_En_15_Fig7_HTML.jpg)


    图 15-7. `AppViz` 地理视图


    你完全不必只局限于使用其中一种产品。我使用 `AppViz` 来确保本地拥有所有应用的销售数据，我喜欢它多样的图表功能以及 App Store 评论下载功能。同时，我使用
    `App Annie` 来获取自动发送的每日销售数据邮件和排名展示（在 `AppViz` 中下载所有排名数据耗时较长），而且 `App Annie` 还支持一些安卓应用商店。另外，它是免费的！


    **提示**


    你可以从 `AppViz` 导出已下载的所有数据，然后将这些数据导入到像 `App Annie` 这样的其他产品中。由于苹果只会在 iTunes Connect
    上提供一年的应用销售数据，因此这是一种确保你能够将应用的全部销售历史记录导入到销售跟踪产品中的方法。


    ## 推广码


    我描述过如何在应用通过 App Store 审核后下载推广码，但我没有说明如何使用它们。其实有很多选择。几乎所有应用评论网站都接受附带推广码的评论请求。`Touch
    Arcade`（`http://toucharcade.com/`）就是其中之一，但它还有一个非常活跃的论坛，开发者可以在那里发放推广码。`AppGiveaway`（`http://appgiveaway.com/`）则会在特定时间段内开展发放推广码的促销活动。这比自己发放方便得多，尽管你也应该自己发放。保留推广码的库存也是推动应用更新的一个绝佳理由，因为每次更新你都能获得一批全新的
    50 个推广码。


    ## 更多盈利方式


    考虑到每年都需要缴纳苹果开发者费用和 Unity 授权费用，你很可能希望至少能收回这些成本。


    ### 应用内购买


    除了应用销售，苹果为 iOS 提供了另一种收入渠道：一个名为 `Storekit` 的应用内购买（IAP）系统。Unity iOS 没有针对 IAP 的脚本接口，但
    `Prime31 Studios` 在其产品中提供了一个 `Storekit` 插件。Unity 手册提供了一些关于如何下载和激活通过 IAP 购买的额外内容的提示，而
    iTunes Connect 文档则解释了如何设置应用内购买。


    ### 资源商店


    我在我的应用中使用了数十个免费和付费的 `Asset Store` 资源包，你一定会发现 `Asset Store` 对你的个人项目非常有用。但 `Asset
    Store` 也是一个自助发布产品并产生收入的地方（Unity 抽取 30% 的分成，这与苹果在 App Store 上的分成比例相同）。你也可以在 `Asset
    Store` 上免费发布资源包，以获得认可或作为对社区的贡献（在本书的示例中，我确实受益于这种慷慨）。


    方便的是，`Asset Store` 的提交工作可以直接在 Unity 编辑器内完成，使用的是从 `Asset Store`（名字很贴切）下载的 `Asset
    Store` 工具。你可以从项目中提交任何类型的资源集合——音频、纹理、模型、脚本、插件，甚至整个项目。


    **提示**


    使用预处理器指令确保切换构建目标时不会出现编译错误，如果你使用了 Unity Pro 功能，请添加一个自定义的 `UNITY_PRO` 预处理器指令，这样
    Unity Basic 用户就不会遇到问题。


    与 `App Store` 提交一样，`Asset Store` 提交的大部分工作涉及创建截图、图标、应用描述和商店素材。在 `Asset Store` 上成为卖家的说明可在
    `http://unity3d.com/asset-store` 找到。


    ### 为安卓开发


    本书中几乎所有为 Unity iOS 开发的内容都能很好地兼容 Unity Android。不出所料，任何属于 `iPhone` 类的内容在安卓上也不可用（例如，我们用来检查设备类型的变量
    `iPhone.generation`），但所有在 iOS 上工作的 `Input` 类内容在安卓上也以同样的方式工作，包括触摸屏和加速度计功能。


    `Prime31 Studio` 和其他供应商提供 Unity Android 插件，以提供对设备功能和移动服务的更多访问，例如 `AdMob` 移动广告服务。


    安卓的构建和提交流程也有所不同。安卓不需要 Xcode，而是需要安装 Android SDK。你仍然可以从 Unity 编辑器调用“构建并运行”操作，但与为应用构建
    Xcode 项目不同，Unity Android 会直接构建可执行的应用文件（APK 文件）。并且，与 iOS 开发不同，安卓开发可以面向多个应用商店。特别是
    Google Play 没有审核过程，因此它是快速自助发布的好途径，也是被苹果拒绝的应用的一个有用的备用渠道。


    ### 外包工作


    在开发下一个热门应用的同时，独立开发者通常通过承接外包工作来支付账单。潜在客户可以在 Unity 论坛的“付费工作”主题、`http://unity3dwork.com/`
    甚至像 `http://odesk.com/` 这样的一般承包商网站上找到。有些市场专门从事移动应用开发，例如 `http://apptank.com/`
    和 `http://theymakeapps.com/`。


    如果你正在寻找全职的游戏开发工作，无论是否涉及 Unity，使用 Unity 进行游戏开发的经验，更不用说自助发布的游戏作品集，都只会对你有所帮助。

    '
- fmt: '## Final Words


    Now I’ve come to the end, and ideally you’re ready and excited to start making
    your own Unity iOS apps. If there’s one lesson that I hope you can take from this
    book, it’s that you can start with something simple and keep building on it until
    it turns into something interesting. Don’t be one of those people who want to
    start with a massively multiplayer online (MMO) game as a first project! Remember
    to keep learning and participate in the Unity community, both contributing and
    asking for help on the Unity forum and on the Unity Answers site, and don’t forget
    to check the Unity wiki. It’s fine to promote your work to the community (there
    is a Showcase topic in the Unity forum) and ask others to spread the word, but
    remember to return the favor! As an unintended result of working on my own projects
    with Unity iOS, I’ve met a population of developers with whom I can commiserate
    and celebrate and trade valuable tips. I won’t try to list them all, but you can
    find them on my Twitter follow list at `@fugugames`. Twitter, by the way, is another
    great way to interact with other Unity developers, on a more personal level. I’ve
    communicated with many customers over Twitter, also, and have had some success
    with setting up Facebook product pages for my games (in particular, HyperBowl).
    Although app customers can be legendarily snarky, I’ve found most of them are
    supportive and sympathetic of us independent developers and are enthused to be
    part of the process if you let them. In fact, I’ve benefited from a lot of free
    QA and some localization (translation) help, not to mention a lot feedback. So,
    set up those Twitter feeds and Facebook fan pages and start talking!


    Above all, have fun. Any other reward is a bonus!'
