  trans: '

    ### 缓存 GetComponent


    通常来说，如果一个值会被多次计算，无论是数学表达式、函数调用的结果，还是访问可能内部执行了函数调用的实例变量或静态变量，将其赋给一个变量都是个好主意。


    你在脚本中访问的组件快捷变量，例如 `transform`、`audio` 和 `rigidbody` 就是这种情况。每个变量都会触发一次 `GetComponent`
    调用，在所有附加到 `GameObject` 上的组件中搜索类型匹配的组件。


    因此，每当你在脚本中需要多次引用某个组件的快捷变量时——无论是在脚本中多次列出，还是在诸如 `Update` 这样的回调中反复引用（特别是当这个快捷变量在多次迭代的循环中被引用时），你都应该尽早将该组件赋给一个变量。清单
    14-6 展示了如何将这个优化应用到你的 `FuguReset` 脚本中。


    ```

    #pragma strict

    private var startPos:Vector3;

    private var startRot:Vector3;

    // 为了性能

    private var trans:Transform = null;

    private var body:Rigidbody = null;

    function Awake() {

    // 缓存 Transform 引用

    trans = transform;

    body = rigidbody;

    // 保存此 GameObject 的初始位置和旋转

    startPos = trans.localPosition;

    startRot = trans.localEulerAngles;

    }

    function ResetPosition() {

    // 恢复到初始位置

    trans.localPosition = startPos;

    trans.localEulerAngles = startRot;

    // 确保停止所有物理运动

    if (body != null) {

    body.velocity = Vector3.zero;

    body.angularVelocity = Vector3.zero;

    }

    }

    清单 14-6.

    优化后的 FuguReset.js 脚本

    ```


    `FuguReset.js` 的原始版本引用了两个组件快捷变量：`transform` 和 `rigidbody`。因此，你添加了两个名为 `trans`
    和 `body` 的私有变量来引用这些组件，并在 `Awake` 回调中初始化 `trans` 和 `body`。


    这种清理优化将适用于你的许多脚本，因为你们经常引用 `transform`、`rigidbody` 和 `audio`。我不会列出所有修订后的代码，但更新后的脚本可以在本章的项目文件中找到，网址是
    [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)。


    ### UnityGUI


    详细的性能分析结果表明，UnityGUI 在你的帧时间中占据了很大一部分。UnityGUI 变慢的一个原因是使用 `GUILayout` 自动放置 GUI
    元素带来的开销。你在记分板中没有使用 `GUILayout`，因此可以在 `FuguBowlScoreboard` 脚本中添加一个设置 `useGUILayout`
    为 `false` 的 `Awake` 回调（清单 14-7）。


    ```

    function Awake() {

    useGUILayout = false;

    }

    清单 14-7.

    在 FuguBowlScoreboard.js 中将 useGUILayout 设置为 false

    ```


    暂停菜单仍然使用 `GUILayout`，但因为该菜单只在游戏暂停时出现，不会影响游戏玩法，其性能问题并不那么重要。


    ### 运行时静态合批


    动态合批可以组合那些在构建时因移动或是在游戏运行期间创建而无法进行静态合批的相似网格。但动态合批必须不断更新合批，这就是合批时间会列在性能分析结果中的原因。如果被合批的对象是一起移动的，或者虽然未移动但是在运行时实例化的，那么这种重复合批似乎是一种浪费。此外，由于合批需要占用内存，动态合批的数量有上限（Unity
    文档目前说是 30,000 个顶点，但这个数字可能会发生变化）。


    幸运的是，有一个名为 `StaticBatchingUtility` 的类，允许你通过调用 `Combine` 函数在运行时执行静态合批。清单 14-8 显示了一个非常简单的脚本，它只是在脚本的
    `GameObject` 上调用 `StaticBatchingUtility.Combine`。


    ```

    #pragma strict

    function Start() {

    StaticBatchingUtility.Combine(gameObject);

    }

    清单 14-8.

    用于静态合批对象层次结构的脚本

    ```


    虽然简单，但这个脚本功能齐全。例如，在旋转立方体场景中，如果你将此脚本拖到带有两个子立方体的主旋转立方体上（并禁用子立方体的独立旋转脚本），那么当场景开始播放时，所有三个立方体将被静态合批在一起。被合批的
    `GameObjects` 不必处于同一个层次结构中。`StaticBatchingUtility.Combine` 是一个重载函数，另一个版本接受两个参数：一个是要批处理的
    `GameObjects` 数组，另一个是指定为父对象的 `GameObject`。


    ### 共享材质


    要进行合批，无论是静态合批、动态合批，还是通过调用 `StaticBatchingUtility.Combine` 进行合批，要合批的网格都必须共享相同的材质或材质集合。但在动态合批中，需要特别小心，如果你修改材质，可能会破坏这种共享关系。


    例如，清单 14-9 中的脚本通过不断改变材质的纹理偏移量来为其制作动画。这会产生滚动纹理的效果；在 HyperBowl 中，此脚本用于为滚动霓虹灯、天空中飘动的云彩以及流淌的水制作纹理动画。然而，当脚本通过调用其
    `SetTextureOffset` 函数修改材质时，如果原始材质恰好是被共享的，则会创建一个新材质。


    ```

    #pragma strict

    var speed:Vector2;

    var materialIndex:int=0;

    private var offset:Vector2;

    private var material:Material;

    function Start() {

    offset=new Vector2(0,0);

    material = renderer.materials[materialIndex];

    }

    function Update () {

    var dtime:float = Time.deltaTime;

    offset.x=(offset.x+speed.x*dtime)%1.0f;

    offset.y=(offset.y+speed.y*dtime)%1.0f;

    material.SetTextureOffset("_MainTex",offset);

    }

    清单 14-9.

    对材质的纹理坐标偏移进行动画处理的脚本

    ```


    当然，这也很合理。如果你使用相同的材质创建了两个 `GameObjects`，并决定通过修改其中一个的材质来改变其外观，你通常不希望同时对另一个 `GameObject`
    进行同样的更改。


    但是，如果你要对所有共享同一材质的 `GameObjects` 应用相同的动画，那么就没有理由停止共享该材质。因此，你可以修改脚本，转而访问 `MeshRenderer`
    的 `sharedMaterials` 变量，而不是 `materials` 变量。访问 `sharedMaterials`（如果你假设 `GameObject`
    上只有一个材质，则访问 `sharedMaterial`）意味着你确实想要更改共享材质，并避免创建新材质，从而保持合批资格。为了同时处理共享和非共享材质的情况，让我们添加一个公共变量，允许你指定动画是否会破坏材质共享，并使用该值来决定是修改
    `renderer.materials` 还是 `renderer.sharedMaterials`（清单 14-10）。


    ```

    #pragma strict

    var speed:Vector2;

    var materialIndex:int=0;

    var shared:boolean = true;

    private var offset:Vector2;

    private var material:Material;

    function Start() {

    offset=new Vector2(0,0);

    if (shared) {

    material = renderer.sharedMaterials[materialIndex];

    } else {

    material = renderer.materials[materialIndex];

    }

    }

    function Update () {

    var dtime:float = Time.deltaTime;

    offset.x=(offset.x+speed.x*dtime)%1.0f;

    offset.y=(offset.y+speed.y*dtime)%1.0f;

    material.SetTextureOffset("_MainTex",offset);

    }

    清单 14-10.

    带有共享材质选项的纹理动画脚本

    ```


    在使用此脚本对共享材质进行动画处理时，还有一个额外（尽管不那么重要）的优化。让每个使用相同材质的 `GameObject` 都运行相同的纹理动画脚本是冗余的；只需一个脚本实例就足以驱动所有对象的动画。

    '
- fmt: '### Minimize Garbage Collection


    Garbage collections can introduce noticeable pauses into a game. The most effective
    way to minimize those pauses is to minimize the necessity for garbage collection,
    and that can be accomplished by minimizing the number of objects that are eventually
    reclaimed by the collector. One technique is to keep objects in a pool so they
    can be reused, instead of letting them get garbage collected. You can also explicitly
    invoke the collector by calling `System.GC.Collect`. For example, you can add
    that call to the `Awake` callback in your bowling game controller to make sure
    a garbage collection takes place before the game starts, which will immediately
    clean up any unused objects left over from the previous scene (Listing [14-11](#A310332_2_En_14_Chapter.html#Par141)).


    ```

    function Awake() {

    player = new FuguBowlPlayer();

    CreatePins();

    System.GC.Collect();

    }

    ```


    ## Optimize Offline


    All of the changes you’ve made so far are quick optimizations that you can immediately
    try with a test run and profile to see their effect. Unity also integrates some
    commercial scene preprocessing tools that can greatly improve performance: Beast
    and Umbra. These won’t be used in this chapter because they can take quite a while
    to set up and run, and frankly, they won’t do much for your simple scene. But
    I’ll describe them briefly in the following sections.


    ### Beast


    It’s difficult to add high-quality, real-time lighting without a heavy performance
    penalty. Each additional pixel light generates more draw calls, shadows are expensive,
    and the resulting visual quality is not as good as on the desktop much less a
    computer-generated scene that has been rendered offline. Beast solves both problems
    by generating lightmaps, which is precalculated lighting that is “baked” into
    textures. Of course, nothing is free—besides the setup and baking time, the lightmapped
    scene ends up with additional large textures that take up more memory, increase
    the app size, and lengthen the scene-loading time.


    To generate lightmaps for the current scene, you would first have to mark all
    the nonmoving `GameObject`s, including lights, as static, because you can only
    precalculate lighting for fixed lights and surfaces. A lightmap is layered as
    a second texture over the mesh. Then you would bring up the Lighting window from
    the Window menu on the Editor menu bar (Figure [14-33](#A310332_2_En_14_Chapter.html#Fig33)).


    ![A310332_2_En_14_Fig33_HTML.jpg](Images/A310332_2_En_14_Fig33_HTML.jpg)


    Figure 14-33. Lighting window


    In that window, you can adjust the lightmapping properties for each object in
    the Object pane and then switch to the Bake pane to set the lightmapping properties
    and initiate the lightmapping.


    Note that dual lightmaps are unavailable on Unity iOS, because that feature requires
    deferred lighting, so having single lightmaps is the only option. Dynamic and
    static lighting won’t mix as well, especially with shadows.


    ### Umbra


    I mentioned how each camera performs frustum culling, ignoring any `GameObject`
    that lies outside the camera’s view volume. Those not familiar with real-time
    computer graphics might assume that an obscured object (i.e., blocked from view
    by another) is also culled, but that’s not the case. All objects within the frustum
    are rendered, and the depth buffer is used to determine on a pixel-by-pixel basis
    which object is in front of another. Determining whether an object is positioned
    outside the frustum is a relatively straightforward calculation, but determining
    which objects are occluded requires some preprocessing. That’s where Unity’s integrating
    of Umbra as an occlusion culling tool comes in.


    Adding occlusion culling to the scene is similar to the process of lightmapping
    the scene. You would mark nonmoving objects as static and then bring up the Occlusion
    Culling window from the Window menu on the Unity Editor menu bar (Figure [14-34](#A310332_2_En_14_Chapter.html#Fig34)).


    ![A310332_2_En_14_Fig34_HTML.jpg](Images/A310332_2_En_14_Fig34_HTML.jpg)


    Figure 14-34. Occlusion Culling window


    From there, you can adjust per-object occlusion culling settings in the Object
    tab and then on the Bake tab specify the occlusion culling settings and then bake
    the occlusion culling data.


    ## Final Profile


    Now that you’ve completed an optimization pass through your project, it’s time
    to profile the game again (Listing [14-12](#A310332_2_En_14_Chapter.html#Par151)),
    although if you want to be methodical, you would have to run a profile after each
    change to see its effect.


    ```

    iPhone Unity internal profiler stats:

    cpu-player>    min:  5.0   max:  9.7   avg:  6.1

    cpu-ogles-drv> min:  3.4   max:  7.4   avg:  4.2

    cpu-present>   min:  0.9   max: 10.5   avg:  4.2

    cpu-waits-gpu> min:  0.9   max: 10.5   avg:  4.2

    msaa-resolve> min:  0.0   max:  0.0   avg:  0.0

    frametime>     min: 13.5   max: 22.1   avg: 16.6

    draw-call #>   min:  30    max:  30    avg:  30     | batched:    10

    tris #>        min:  4592  max:  4592  avg:  4592   | batched:  3420

    verts #>       min:  3728  max:  3728  avg:  3728   | batched:  2750

    player-detail> physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:  2.2
    render:  3.4 fixed-update-count: 0 .. 0

    mono-scripts>  update:  0.1   fixedUpdate:  0.0 coroutines:  0.0

    mono-memory>   used heap: 389120 allocated heap: 524288  max number of collections:
    0 collection total duration:  0.0

    Listing 14-12.

    Built-in Profile Results After Optimizations

    ```


    The profile lists an average frametime of 16.6 ms, which is just about 60 fps.
    Target achieved! This profile was run on a fourth-generation iPod touch (equivalent
    to an iPhone 4), so depending on your device, your mileage may vary.


    The player-detail line indicates the frametime is dominated by batching and rendering,
    so the graphics are the remaining bottleneck, and any more time spent on script
    optimization would not be time well spent. And if you decided that 30 fps isn’t
    so bad, then you’re in a good situation to add more content and features.


    ## Explore Further


    I began this chapter by citing the perils of optimizing too early, at the risk
    of complicating things before you even got something working. But you should keep
    your performance target in mind from the beginning of development. Start simple
    (the Unity documentation recommends rendering no more than 40,000 vertices on
    the iPhone 3GS), get something working, optimize enough to meet your performance
    target, continue adding content and functionality, and stop and optimize every
    time the game’s performance falls below your target. And remember to profile and
    optimize the bottlenecks. It will do you no good to optimize something that’s
    taking 10 percent of your frametime and leave alone something else that’s taking
    50 percent.


    ### Unity Manual


    In the Unity Manual, the section “Getting Started with iOS Development” has several
    pages called “Optimizing Performance in iOS” covering the player settings you
    adjusted to optimize builds, describing the built-in profiler, and showing how
    to optimize the build size.


    The “Advanced” section documents the Profiler available with Unity Pro and also
    the offline optimization features mentioned: lightmapping and occlusion culling.
    The “Advanced” section includes many other pages related to optimization: “Optimizing
    Graphics Performance,” “Reducing File Size,” “Automatic Memory Management” (garbage
    collection), and “Shadows” (in particular, “Shadow Performance”). The “Asset Bundles”
    and “Loading Resources” pages explain how assets can be downloaded and brought
    into a scene on demand, which is a technique that can be used to manage the installed
    app size.'
