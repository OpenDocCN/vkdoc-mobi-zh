- fmt: '# Make Some Pins


    Now that there’s room to roll, it’s time to add the pins. In lieu of a bowling
    pin model, you can make a simplistic version of a bowling pin with the `Capsule`
    primitive.


    Select `Capsule` from the Create menu of the Hierarchy view (Figure [7-2](#A310332_2_En_7_Chapter.html#Fig2)).
    `Capsule`, like the other primitive models, is also available in the `GameObject`
    menu on the menu bar.


    ![A310332_2_En_7_Fig2_HTML.jpg](Images/A310332_2_En_7_Fig2_HTML.jpg)


    Figure 7-2. Creating a capsule


    Name the resulting GameObject `Pin`. To create ten pins, you could duplicate the
    pin nine times, but in the same way the cube was cloned in the cube scene, it’s
    better to make a prefab first. This way, any changes you make to a single pin
    can be applied to all ten pins.


    So, drag the pin into the `Prefabs` folder in the Project view to create the prefab
    (Figure [7-3](#A310332_2_En_7_Chapter.html#Fig3)).


    ![A310332_2_En_7_Fig3_HTML.jpg](Images/A310332_2_En_7_Fig3_HTML.jpg)


    Figure 7-3. Pin prefab


    Creating a prefab allows you to make one copy of a game asset and apply it as
    many times as needed in the game. When you make changes to the prefab, these changes
    are applied to all the assets in the game.


    # Place the Pins in the Scene


    Now you are ready to place the pins in the scene. From the project folder, drag
    one the prefabs of the pin to the scene. You will need the pin to be in line with
    the ball. So, place it on the same x-axis as the ball `(100,1,0)` (Figure [7-4](#A310332_2_En_7_Chapter.html#Fig4)).


    ![A310332_2_En_7_Fig4_HTML.jpg](Images/A310332_2_En_7_Fig4_HTML.jpg)


    Figure 7-4. Initial pin Transform settings


    Now, add nine more pins to form a typical bowling pin formation (a triangle).


    ![A310332_2_En_7_Fig5_HTML.jpg](Images/A310332_2_En_7_Fig5_HTML.jpg)


    Figure 7-5. Bowling with pins


    If you test this now, you will find that as you bowl into the pins, the ball just
    bounces off them since the pins have `Collider` components but are static `GameObjects`.
    Like the ball, each pin needs to have a `Rigidbody` component to react to forces.
    A `Rigidbody` component can be added to the `Pin` prefab from the Component menu,
    but this time, let’s try it another way. Select the `Pin` prefab in the Project
    view, and then in the Inspector view click the `Add Component` button. In the
    resulting pop-up, under Physics, select `Rigidbody` (or you can find that selection
    by typing `rigidbody` in the search field of the pop-up). Whichever way you choose,
    there should now be a `Rigidbody` component on the `Pin` prefab (Figure [7-6](#A310332_2_En_7_Chapter.html#Fig6)).


    ![A310332_2_En_7_Fig6_HTML.jpg](Images/A310332_2_En_7_Fig6_HTML.jpg)


    Figure 7-6. Pin prefab with a Rigidbody component


    Like the Floor and Ball Collider components, the `Pin` prefab should have its
    own `PhysicMaterial`. A quick way to create a suitable `PhysicMaterial` is to
    copy the one used for the ball, so select the `Ball PhysicMaterial` in your `Physics`
    folder in the Project view, duplicate it using the Edit menu or `Command+D`, and
    name the new `PhysicMaterial Pin` (Figure [7-7](#A310332_2_En_7_Chapter.html#Fig7)).


    ![A310332_2_En_7_Fig7_HTML.jpg](Images/A310332_2_En_7_Fig7_HTML.jpg)


    Figure 7-7. PhysicMaterial for the Pin prefab


    Since the bowling pins should roll just as well as the ball, leave the `Dynamic
    Friction` and `Static Friction` values at 1 (to avoid slippage while rolling),
    and leave the `Friction Combine` value at `Maximum`. Unlike the ball, however,
    the bowling pins should be fairly bouncy, so set `Bounciness` to 0.5 and set the
    `Bounce Combine` value to `Average` (taking in account the bounciness of whatever
    it’s bouncing against). Finally, it’s time to assign the `Pin PhysicMaterial`
    to the `Pin` prefab. Select the `Pin` prefab in the Project view; then in the
    Inspector view, click the circle to the right of the `PhysicMaterial` field of
    the `Collider` component and select the `Pin PhysicMaterial` from the pop-up chooser
    (Figure [7-8](#A310332_2_En_7_Chapter.html#Fig8)).


    ![A310332_2_En_7_Fig8_HTML.jpg](Images/A310332_2_En_7_Fig8_HTML.jpg)


    Figure 7-8. Assigning the Pin PhysicMaterial to the Pin prefab


    Now when you click Play and roll the ball into the pins, they get knocked around,
    as shown in Figure [7-9](#A310332_2_En_7_Chapter.html#Fig9), bouncing and rolling!


    ![A310332_2_En_7_Fig9_HTML.jpg](Images/A310332_2_En_7_Fig9_HTML.jpg)


    Figure 7-9. Collision with pins that all have Rigidbody components


    # Use Camera Follow


    You will note that the view of the impact of the ball hitting the pins may be
    in the distance, and the impact may not be very apparent to the player. So, what
    you need to do is get the camera to follow the bowling ball. To do this, you will
    need to create another script. In the `Script` folder, create a new C# script
    and name it `CameraFollow` with the contents of Listing [7-1](#A310332_2_En_7_Chapter.html#Par18).


    ```

    using UnityEngine;

    using System.Collections;

    public class CameraController : MonoBehaviour {

    public GameObject player;

    private Vector3 offset;

    void Start ()

    {

    offset = transform.position - player.transform.position;

    }

    ```


    Listing 7-1. CameraFollow Script


    You may need to adjust the starting position of the camera so that the starting
    position is just behind and above the ball.


    # Keep Playing


    It’s rather tiresome to have to stop the game and click Play again every time
    you want to test a roll. And when the ball rolls off the floor, you’re stuck watching
    the ball fall indefinitely. So, let’s have the ball and pins reset if the ball
    rolls off the edge of the floor.


    ## Return the Ball


    First, you need a script that will restore a `GameObject` to its initial position
    and rotation (can’t forget rotation—if a pin is knocked down, you want to reset
    it to its initial standing orientation). Create a new JavaScript, call it `FuguReset`,
    and add the contents of Listing [7-2](#A310332_2_En_7_Chapter.html#Par22).


    ```

    // restore GameObject to its original position and rotation

    #pragma strict

    private var startPos:Vector3;

    private var startRot:Vector3;

    function Awake() {

    // save the initial position and rotation of this GameObject

    startPos = transform.localPosition;

    startRot = transform.localEulerAngles;

    }

    function ResetPosition() {

    // set back to initial position

    transform.localPosition = startPos;

    transform.localEulerAngles = startRot;

    // make sure we stop all physics movement

    if (GetComponent.() != null) {

    GetComponent.().velocity = Vector3.zero;

    GetComponent.().angularVelocity = Vector3.zero;

    }

    }

    ```


    Listing 7-2. FuguReset.js Script Restores a GameObject’s Position


    The `Awake` function saves the `GameObject`’s position and rotation in a couple
    of variables, and the function `ResetPosition` restores the `GameObject` to those
    settings. `ResetPosition` also checks whether the `GameObject` has a `Rigidbody`
    component. If so, then the function stops it from moving or rotating. The `FuguReset`
    script should be attached to every `GameObject` that will need to reset its position
    (and possibly rotation) when you restart the game. That list includes the ball,
    the pins, and the `Main Camera`. Start by dragging the `FuguReset` script onto
    the `Main Camera` and `Ball` GameObjects in the Hierarchy view. Then select the
    `Pin` prefab in the Project view, and in the Inspector view click the `Add Component`
    button to add the `FuguReset` script (Figure [7-10](#A310332_2_En_7_Chapter.html#Fig10)).


    ![A310332_2_En_7_Fig10_HTML.jpg](Images/A310332_2_En_7_Fig10_HTML.jpg)


    Figure 7-10. Attaching the FuguReset script to the Pin prefab


    The `Ball`, `Pin`, and `Main Camera` GameObjects now record their original positions
    and rotations when the game starts, and you have a `ResetPosition` function ready
    to call that will restore them to those original positions and rotations.'
  raw: '## Make Some Pins


    Now that there’s room to roll, it’s time to add the pins. In lieu of a bowling
    pin model, you can make a simplistic version of a bowling pin with the Capsule
    primitive.


    Select Capsule from the Create menu of the Hierarchy view (Figure [7-2](#A310332_2_En_7_Chapter.html#Fig2)).
    Capsule, like the other primitive models, is also available in the GameObject
    menu on the menu bar.


    ![A310332_2_En_7_Fig2_HTML.jpg](Images/A310332_2_En_7_Fig2_HTML.jpg)


    Figure 7-2.


    Creating a capsule


    Name the resulting GameObject Pin. To create ten pins, you could duplicate the
    pin nine times, but in the same way the cube was cloned in the cube scene, it’s
    better to make a prefab first. This way, any changes you make to a single pin
    can be applied to all ten pins.


    So, drag the pin into the Prefabs folder in the Project view to create the prefab
    (Figure [7-3](#A310332_2_En_7_Chapter.html#Fig3)).


    ![A310332_2_En_7_Fig3_HTML.jpg](Images/A310332_2_En_7_Fig3_HTML.jpg)


    Figure 7-3.


    Pin prefab


    Creating a prefab allows you to make one copy of a game asset and apply it as
    many times as needed in the game. When you make changes to the prefab, these changes
    are applied to all the assets in the game.


    ## Place the Pins in the Scene


    Now you are ready to place the pins in the scene. From the project folder, drag
    one the prefabs of the pin to the scene. You will need the pin to be in line with
    the ball. So, place it on the same x-axis as the ball (100,1,0) (Figure [7-4](#A310332_2_En_7_Chapter.html#Fig4)).


    ![A310332_2_En_7_Fig4_HTML.jpg](Images/A310332_2_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    Initial pin Transform settings


    Now, add nine more pins to form a typical bowling pin formation (a triangle).


    ![A310332_2_En_7_Fig5_HTML.jpg](Images/A310332_2_En_7_Fig5_HTML.jpg)


    Figure 7-5.


    Bowling with pins


    If you test this now, you will find that as you bowl into the pins, the ball just
    bounces off them since the pins have Collider components but are static GameObjects.
    Like the ball, each pin needs to have a Rigidbody component to react to forces.
    A Rigidbody component can be added to the Pin prefab from the Component menu,
    but this time, let’s try it another way. Select the Pin prefab in the Project
    view, and then in the Inspector view click the Add Component button. In the resulting
    pop-up, under Physics, select Rigidbody (or you can find that selection by typing
    rigidbody in the search field of the pop-up). Whichever way you choose, there
    should now be a Rigidbody component on the Pin prefab (Figure [7-6](#A310332_2_En_7_Chapter.html#Fig6)).


    ![A310332_2_En_7_Fig6_HTML.jpg](Images/A310332_2_En_7_Fig6_HTML.jpg)


    Figure 7-6.


    Pin prefab with a Rigidbody component


    Like the Floor and Ball Collider components, the Pin prefab should have its own
    PhysicMaterial. A quick way to create a suitable PhysicMaterial is to copy the
    one used for the ball, so select the Ball PhysicMaterial in your Physics folder
    in the Project view, duplicate it using the Edit menu or Command+D, and name the
    new PhysicMaterial Pin (Figure [7-7](#A310332_2_En_7_Chapter.html#Fig7)).


    ![A310332_2_En_7_Fig7_HTML.jpg](Images/A310332_2_En_7_Fig7_HTML.jpg)


    Figure 7-7.


    PhysicMaterial for the Pin prefab


    Since the bowling pins should roll just as well as the ball, leave the Dynamic
    Friction and Static Friction values at 1 (to avoid slippage while rolling), and
    leave the Friction Combine value at Maximum. Unlike the ball, however, the bowling
    pins should be fairly bouncy, so set Bounciness to 0.5 and set the Bounce Combine
    value to Average (taking in account the bounciness of whatever it’s bouncing against).
    Finally, it’s time to assign the Pin PhysicMaterial to the Pin prefab. Select
    the Pin prefab in the Project view; then in the Inspector view, click the circle
    to the right of the PhysicMaterial field of the Collider component and select
    the Pin PhysicMaterial from the pop-up chooser (Figure [7-8](#A310332_2_En_7_Chapter.html#Fig8)).


    ![A310332_2_En_7_Fig8_HTML.jpg](Images/A310332_2_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    Assigning the Pin PhysicMaterial to the Pin prefab


    Now when you click Play and roll the ball into the pins, they get knocked around,
    as shown in Figure [7-9](#A310332_2_En_7_Chapter.html#Fig9), bouncing and rolling!


    ![A310332_2_En_7_Fig9_HTML.jpg](Images/A310332_2_En_7_Fig9_HTML.jpg)


    Figure 7-9.


    Collision with pins that all have Rigidbody components


    ## Use Camera Follow


    You will note that the view of the impact of the ball hitting the pins may be
    in the distance, and the impact may not be very apparent to the player. So, what
    you need to do is get the camera to follow the bowling ball. To do this, you will
    need to create another script. In the Script folder, create a new C# script and
    name it CameraFollow with the contents of Listing [7-1](#A310332_2_En_7_Chapter.html#Par18).


    ```

    using UnityEngine;

    using System.Collections;

    public class CameraController : MonoBehaviour {

    public GameObject player;

    private Vector3 offset;

    void Start ()

    {

    offset = transform.position - player.transform.position;

    }

    Listing 7-1.

    CameraFollow Script

    ```


    You may need to adjust the starting position of the camera so that the starting
    position is just behind and above the ball.


    ## Keep Playing


    It’s rather tiresome to have to stop the game and click Play again every time
    you want to test a roll. And when the ball rolls off the floor, you’re stuck watching
    the ball fall indefinitely. So, let’s have the ball and pins reset if the ball
    rolls off the edge of the floor.


    ### Return the Ball


    First, you need a script that will restore a GameObject to its initial position
    and rotation (can’t forget rotation—if a pin is knocked down, you want to reset
    it to its initial standing orientation). Create a new JavaScript, call it FuguReset,
    and add the contents of Listing [7-2](#A310332_2_En_7_Chapter.html#Par22).


    ```

    // restore GameObject to its original position and rotation

    #pragma strict

    private var startPos:Vector3;

    private var startRot:Vector3;

    function Awake() {

    // save the initial position and rotation of this GameObject

    startPos = transform.localPosition;

    startRot = transform.localEulerAngles;

    }

    function ResetPosition() {

    // set back to initial position

    transform.localPosition = startPos;

    transform.localEulerAngles = startRot;

    // make sure we stop all physics movement

    if (GetComponent.() != null) {

    GetComponent.().velocity = Vector3.zero;

    GetComponent.().angularVelocity = Vector3.zero;

    }

    }

    Listing 7-2.

    FuguReset.js Script Restores a GameObject’s Position

    ```


    The Awake function saves the GameObject’s position and rotation in a couple of
    variables, and the function ResetPosition restores the GameObject to those settings.
    ResetPosition also checks whether the GameObject has a Rigidbody component. If
    so, then the function stops it from moving or rotating. The FuguReset script should
    be attached to every GameObject that will need to reset its position (and possibly
    rotation) when you restart the game. That list includes the ball, the pins, and
    the Main Camera. Start by dragging the FuguReset script onto the Main Camera and
    Ball GameObjects in the Hierarchy view. Then select the Pin prefab in the Project
    view, and in the Inspector view click the Add Component button to add the FuguReset
    script (Figure [7-10](#A310332_2_En_7_Chapter.html#Fig10)).


    ![A310332_2_En_7_Fig10_HTML.jpg](Images/A310332_2_En_7_Fig10_HTML.jpg)


    Figure 7-10.


    Attaching the FuguReset script to the Pin prefab


    The Ball, Pin, and Main Camera GameObjects now record their original positions
