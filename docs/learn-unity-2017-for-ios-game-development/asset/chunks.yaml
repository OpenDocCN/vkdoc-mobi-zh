    with assets imported from local files, the Unity Standard Assets, and the Unity
    Asset Store. And the scene isn’t completely static due to the SimpleMouseRotator
    script attached to the Main Camera. Scripting will play a dominant role in this
    book, starting with the next chapter as we move beyond a static scene.


    Before moving on to that, take a break and go over the official Unity documentation
    on the features used so far, if only to get familiar with where to find this documentation
    for future reference.


    ### Unity Manual


    The Unity Basics section of the Unity Manual was mostly relevant to the previous
    chapter, describing the user interface, but that section does have a “Creating
    Scenes” page that More relevant is the “Building a Scene” section, which describes
    the relationship among GameObjects, Components, and scripts, how to use the Inspector
    View to edit Component properties, and how to navigate the Scene View and move
    GameObjects, all of which was covered in this chapter. Lights and Cameras are
    also explained. One feature listed in this section that won’t be used in this
    book is the Terrain Engine (it is available in Unity iOS but slow). Terrain is
    a significant and impressive Unity feature, though, so it’s worth a read the “Asset
    Import and Creation” section describes the asset types used in this chapter: Meshes,
    Materials, textures and scripts. The process of importing assets and the Asset
    Store are also explained.


    We haven’t arrived at a point where we have gameplay, but the “Creating GamePlay”
    section has a page on “Transforms,” which is we saw is fundamental to understand
    even just for placing static GameObjects.'
  trans: '

    ### 浏览资源商店


    Unity 在`Standard Assets`中并没有内置很多纹理（尽管各种资源包中包含了许多纹理）。不过，Unity 资源商店（一个专为 Unity 准备的资源市场）提供了几个免费的纹理包。方便的是，资源商店已集成到
    Unity 编辑器中。在`Window`菜单（图 [3-32]）下，选择`Asset Store`项。


    ![A310332_2_En_3_Fig32_HTML.jpg](img/A310332_2_En_3_Fig32_HTML.jpg)


    **图 3-32.** 从 Window 菜单中选择资源商店


    这将打开`Asset Store`窗口并显示资源商店首页（图 [3-33]），其中列出了最新发布的内容（包括付费和免费资源）、分类以及精选项目。


    ![A310332_2_En_3_Fig33_HTML.jpg](img/A310332_2_En_3_Fig33_HTML.jpg)


    **图 3-33.** Unity 资源商店


    让我们找一些免费纹理。点击页面右上区域的`Textures & Materials`分类，然后在左侧的`Maximum Price`中选择`Free`（图
    [3-34]）。


    ![A310332_2_En_3_Fig34_HTML.jpg](img/A310332_2_En_3_Fig34_HTML.jpg)


    **图 3-34.** 资源商店中的免费纹理


    这里有很多不错的选择，但如果你向下滚动，应该能找到我最喜欢的免费纹理库：Free ArtskillZ Texture Pack。点击它查看完整的产品页面（图
    [3-35]）。它包含了产品描述、截图、各文件列表以及用户评价。


    ![A310332_2_En_3_Fig35_HTML.jpg](img/A310332_2_En_3_Fig35_HTML.jpg)


    **图 3-35.** 资源商店中的 ArtskillZ 纹理包


    ### 导入纹理


    点击`Download`按钮，你会看到与导入内置 Unity 资产时相同的`Import`窗口。继续并导入所有内容。


    现在，你会在`Project View`中找到所有这些纹理，它们被按类别分成了三个文件夹（图 [3-36]）。


    ![A310332_2_En_3_Fig36_HTML.jpg](img/A310332_2_En_3_Fig36_HTML.jpg)


    **图 3-36.** ArtskillZ 纹理的项目视图


    显示蓝色图标的纹理是法线贴图，其`Texture Type`字段中也会如此标注。法线贴图能营造非平面表面的错觉（有时也使用*凸凹贴图*这个术语，尽管严格来说两者并不完全相同）。


    ### 应用纹理


    首先，我们尝试使用`ScifiPanel01`纹理。将其拖拽到立方体上，Unity 会自动创建一个以该纹理命名的新材质，并将该材质应用于立方体。但我们想使用伴随该纹理的法线贴图，所以在`Inspector`视图中使用材质的`Shader`选择器，将着色器更改为`Legacy
    Shaders Bumped Specular`。此着色器接受一个标记为`Normalmap`的第二纹理，并带有一个用于控制`Shininess`属性的滑块（需要注意的是，滑块向左移动接近
    1，向右移动接近 0）。将法线贴图纹理`ScifiPanel01_n`拖入`Normalmap`字段（图 [3-37]）。


    ![A310332_2_En_3_Fig37_HTML.jpg](img/A310332_2_En_3_Fig37_HTML.jpg)


    **图 3-37.** 应用于立方体的 Sci-fi 纹理


    点击`Play`，你现在就能看到带有纹理的立方体了（图 [3-38]）。


    ![A310332_2_En_3_Fig38_HTML.jpg](img/A310332_2_En_3_Fig38_HTML.jpg)


    **图 3-38.** 带有高光凸凹贴图纹理的立方体的游戏视图


    你也可以使用`Project View`中的搜索字段来搜索免费纹理。在接下来的章节中，当我们使用更多资源商店的资源包时，我会使用这个选项。


    ## 进一步探索


    本章可能看起来为了创建一个简单的静态场景而涵盖了大量内容（无意双关），但在此过程中我们探索了许多 Unity 的基本概念，特别是组件与游戏对象之间的关系。因此，现在你拥有了一个带有凸凹贴图和纹理的立方体场景，并有一个带有耀斑的点光源为其照明。场景中填充了从本地文件、Unity
    标准资源以及 Unity 资源商店导入的资产。并且，由于`Main Camera`上附加了`SimpleMouseRotator`脚本，场景并非完全静态。脚本编写将在本书中扮演主导角色，从下一章开始，我们将超越静态场景。


    在继续之前，休息一下，回顾一下 Unity 官方文档中关于目前所用功能的部分，哪怕只是为了熟悉日后查阅文档的位置。


    ### Unity 手册


    Unity 手册的`Unity Basics`部分主要与上一章相关，描述了用户界面，但该部分确实有一个“Creating Scenes”页面。更相关的是“Building
    a Scene”部分，它描述了游戏对象、组件和脚本之间的关系，如何使用`Inspector View`编辑组件属性，以及如何在`Scene View`中导航和移动游戏对象——所有这些在本章中都有涉及。灯光和摄像机也得到了解释。本节列出的一个本书不会使用的功能是地形引擎（在
    Unity iOS 中可用，但运行缓慢）。不过，地形是一个非常重要且令人印象深刻的 Unity 功能，因此值得一读。“Asset Import and Creation”部分描述了本章使用的资产类型：网格、材质、纹理和脚本。资产的导入过程以及资源商店也在此部分得到了解释。


    我们尚未到达有游戏玩法的阶段，但“Creating GamePlay”部分有一个关于“Transforms”的页面，我们看到，即使只是放置静态游戏对象，理解它也是基础。

    '
- fmt: '### Reference Manual


    Getting more in depth than the Unity Manual, the Reference Manual describes each
    Component in detail, explaining its properties and documenting the use of the
    Component. The Reference Manual also documents the asset types and gives an explanation
    of `GameObject`.


    As a rule, you should read the Reference Manual documentation for every Component
    and asset type you use. Remember, there is a Help icon on each Component in the
    Inspector view that will bring up the appropriate Reference Manual page when you
    click it. Like the Unity Manual, the Reference Manual is available not just from
    the Unity Help menu but also on the Unity web site under the Learn tab (which
    can be reached directly at [http://docs.unity3d.com/](http://docs.unity3d.com/)).
    The “Settings Manager” section of the Reference Manual includes a page on the
    Render Settings, which is where the Skybox in this chapter was assigned. The “Transform
    Components” section lists just one Component, naturally, the Transform Component,
    which is attached to very `GameObject`.


    The “Mesh Components” section is more interesting, as it describes both the `MeshFilter`
    and `MeshRenderer` Components necessary for any `GameObject` with Mesh, such as
    the Cube created in this chapter. The “Rendering Components” section is more bountiful,
    yet, featuring the Camera Component and its associated `GUILayer` Component and
    `FlareLayer`. The Light Component is also documented here. Although assets aren’t
    really Components, the Reference Manual has a section titled “Asset Components,”
    which lists the various asset classes. In this chapter, `Flare`, `Material`, `Mesh`
    and `Texture2D` were incorporated into the scene (remember that Skybox is really
    a `Material`).


    The most fun reading is in the section titled “Built-In Shader Guide,” which describes
    in detail (and with pictures) all of the built-in shaders, ranging from the simple
    and fast to very fancy. The Cube in this chapter started out with the default
    Diffuse shader and was replaced with a deluxe Specular Bump Map shader. As mentioned
    in this chapter, a shader is really a program, so if you can’t find a built-in
    shader that suits your needs, you can write your own by following the examples
    and instructions in the “Shader Reference” section.


    ### Asset Store


    This chapter begins our book-long practice of using free assets from the Unity
    Asset Store. I recommend browsing the Asset Store regularly to check the latest
    releases. Besides the free textures, models, and scripts, there are plenty of
    reasonably priced packages that can save you a lot of time and work. The Asset
    Store can also be viewed with a regular web browser at [http://assetstore.unity3d.com/](http://assetstore.unity3d.com/)
    (but without the ability to purchase or download any assets).


    ### Computer Graphics


    Computer graphics is a huge and intricate area of study. This chapter worked with
    3D models, textures, bump maps, light flares, skyboxes, and we’re just getting
    started. So it’s well worth reading up on basic (and advanced) computer graphics,
    such as the popular and comprehensive text *Real-Time Rendering*, by Tomas Akenine-Möller,
    Eric Haines, and Naty Hoffman. Mark Haigh-Hutchinson’s *Real-Time Cameras* is
    an entire book devoted to the subject of virtual Cameras and their control schemes.


    I won’t be covering the process of creating assets that can be imported into Unity,
    but Luke Ahearn has two books that may be generally helpful: *3D Game Textures:
    Create Professional Game Art Using Photoshop* and *3D Game Environments: Create
    Professional 3D Game Worlds*. And you can tell from the title of Wes McDermott’s
    *Creating 3D Game Art for the iPhone with Unity* that it’s an appropriate complementary
    text for this book.


    # 4. Making It Move: Scripting the Cube


    Now that you know how to construct a static 3D scene by placing GameObjects, it’s
    time to make the scene dynamic, and more interesting, by adding movement to GameObjects
    while the game is played. After all, a 3D graphics scene is nice, but an animated
    3D graphics scene is even better!


    But applying animation data isn’t the only way to move a `GameObject`. Making
    a `GameObject` physical will cause it to move in response to collisions and forces,
    including gravity. A script can also move a `GameObject` by changing the position
    and/or rotation values in its `Transform` component. In fact, any method for moving
    a `GameObject`, whether it’s animation, physics, or a script, ultimately changes
    the `Transform` component, which always represents the position, rotation, and
    scale of the `GameObject`.


    This chapter will focus on moving GameObjects by scripting, demonstrating how
    to rotate the formerly static cube created in the previous chapter, and even introducing
    tween-style animations. In the process, I’ll present basic concepts and tools
    (editing and debugging) of the Unity scripting system.


    The scripts you’ll be writing are available at [www.apress.com/9781484231739](http://www.apress.com/9781484231739)
    in the project for this chapter, but I recommend creating them from scratch. You
    have the best chance of understanding how the code works (and doesn’t work) when
    you type it in yourself.


    ## Organize the Assets


    It’s easier to view and browse assets in the Project view when they’re partitioned
    by type. So, before you start adding scripts, this is a good time to get organized
    and create some folders for the scripts and textures in the project. Launch the
    Unity Editor, if you don’t already have it open from the previous chapter, and
    make sure you have the project from the previous chapter loaded and the cube scene
    open. Then click the Create button in the top left of the Project view (Figure
    4-1) to bring up a menu of new assets that you can add to the project (alternatively,
    you can right-click in the Project view and select the Create submenu). Select
    the Folder item in the menu, and a folder titled New Folder will appear in the
    Project view. Rename the folder to Textures and drag any textures into it that
    you imported in the previous chapter (like my cat photo). Although you haven’t
    created any scripts yet, go ahead and create a Scripts folder, too.


    ![A310332_2_En_4_Fig1_HTML.jpg](Images/A310332_2_En_4_Fig1_HTML.jpg)


    Figure 4-1. Creating a Textures folder in the Project view


    ## Create the Script


    Select the newly added Scripts folder and then, also from the Create menu of the
    Project view, select JavaScript (Figure 4-2). A script called `New Behaviour`
    (U.S. readers, you’ll just have to get used to the British spelling) will appear
    in the Scripts folder. If you accidentally created the new script file outside
    the Scripts folder, just drag the script into the folder.


    ![A310332_2_En_4_Fig2_HTML.jpg](Images/A310332_2_En_4_Fig2_HTML.jpg)


    Figure 4-2. Creating a JavaScript


    Note: Although the Create menu in the Project view lists “Javascript,” with just
    the first letter capitalized, I’ll pretend it says “JavaScript,” which is the
    official capitalization and is what is used in the Unity documentation (who knows,
    a Unity update may fix the menu spelling at any time). Also, this book will use
    the phrase “a JavaScript” to refer to a script, instead of the more correct but
    clumsier to say “a JavaScript script.”


    Since this new file is a JavaScript, it has a `.js` extension. The Project view
    does not display file name extensions, but the language of the script is evident
    from its icon (Figure 4-3). And if the script is selected, its full name is shown
    in the line at the bottom of the Project view.


    ![A310332_2_En_4_Fig3_HTML.jpg](Images/A310332_2_En_4_Fig3_HTML.jpg)


    Figure 4-3. The Project view of the new script'
