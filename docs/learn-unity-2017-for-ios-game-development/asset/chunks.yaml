  trans: '

    # 开始使用


    Unity 是一款跨平台的 2D 和 3D 游戏开发系统，由名为 Unity Technologies（最初名为 Over the Edge）的公司开发。究竟什么是
    Unity 的跨平台特性呢？简单来说，其跨平台性体现在两个方面：一方面，作为 Unity 核心组件的游戏创建与编辑工具——Unity 编辑器，可在 macOS
    和 Windows 系统上运行；另一方面，更令人印象深刻的是，使用 Unity 编辑器，你可以为 macOS、Windows、网页浏览器（借助 Flash、Google
    Native Client 或 Unity 浏览器插件）、iOS、Android 以及游戏主机构建游戏。这个支持平台列表还在不断增长。


    至于 3D 方面，Unity 是一款 3D 游戏开发系统，其内置的图形、音效和物理引擎均在 3D 空间中运行，非常适合创建 3D 游戏。Unity 同样可用于创建
    2D 游戏；事实上，许多成功的 2D 游戏都是用 Unity 开发的。


    本书涵盖的是撰写时 Unity 的最新版本，即 Unity 5.6.2，但 Unity 的迭代速度很快，即便在次要版本更新中也会出现新功能和用户界面变化。当然，这一注意事项适用于所有方面，包括来自
    Unity、Apple 和第三方供应商的产品、许可证和价格。


    ## 前提条件


    在开始学习如何使用 Unity 编辑器和构建游戏这一有趣部分之前，你需要先下载并安装 Unity。虽然前几章你将在 Unity 编辑器中按照逐步示例进行操作，直到后面才会进入
    iOS 开发（顺便一提，iOS 最初代表 iPhone 操作系统，但现在已包含 iPod touch 和 iPad），但提前开始准备 iOS 开发所需条件也是个不错的主意。


    ### 准备你的 Mac


    对于 iOS 开发，你需要一台运行 Lion 或 Mountain Lion 版本 macOS（10.9.4 版本及 Xcode 7.0 或更高版本）的 Mac。Unity
    5 仍可在某些较旧版本的 macOS 上运行，如 Snow Leopard，但 Lion 和 Mountain Lion 需要最新版本的 Xcode，这是
    Apple 为 iOS 开发所要求的软件工具。通常，需要最新或较新版本的 Xcode 才能针对最新版本的 iOS 进行开发。


    ### 注册成为 iOS 开发者


    建议尽快访问 Apple 开发者网站注册成为 iOS 开发者，因为审批过程可能需要一些时间，尤其是在注册公司时。首先，你需要在网站上注册成为 Apple 开发者（免费）；然后，登录并注册成为
    iOS 开发者（每年 99 美元）。这是将应用部署到测试设备以及将应用提交到 App Store 所必需的。


    ### 下载 Xcode


    虽然你直到阅读本书的 iOS 部分才会用到 Xcode，但现在就可以从 Mac App Store（只需搜索 `xcode`）或 Apple 开发者网站 [`http://developer.apple.com/`](http://developer.apple.com/)
    下载 Xcode。当你开始构建 Unity iOS 应用时，我会更详细地讲解 Xcode 的安装过程。


    ### 下载 Unity


    要获取 Unity，请访问 Unity 网站 [`http://unity3d.com/`](http://unity3d.com/) 并前往下载页面。在那里，你会找到最新版本
    Unity（目前是 Unity 5.6.2）的下载链接，以及发布说明（包含在安装包中）的链接。甚至还有一个旧版本列表的链接，以防你因某些原因需要回退到之前的
    Unity 版本。


    **提示：** 在 Unity 网站上时，不妨四处看看。查看演示、常见问题解答、各种许可证之间的功能对比，以及通往文档、用户论坛和其他社区支持网站的链接。你以后肯定还会回来，所以不妨现在就弄清楚所有东西的位置！


    Unity 只有一个应用程序，但根据你的需求，你可以订阅不同的授权模式（个人版、Plus 版、专业版或企业版）。


    Unity 版本号的格式为 `主版本号.次版本号.补丁号`。因此，Unity 5.6.2 是 Unity 5.6 的增量升级版本（相对于 Unity 5.5），并包含一些错误修复更新。主版本升级，例如从
    Unity 4 升级到 Unity 5，可能需要对项目进行更改。


    **提示：** 一般来说，一旦 Unity 项目升级，它就可能与旧版本的 Unity 不兼容。因此，在升级项目之前最好先备份一份，以防需要恢复到之前的 Unity
    版本。


    要开始 Unity 安装过程，请点击下载链接（撰写时，该链接为“试用个人版”按钮）。文件大小约为 1GB，因此下载可能需要一些时间，但你已经在路上了！


    ## 安装 Unity


    Unity 下载文件是一个下载安装程序，当前文件名为 `UnityDownloadAssistant`。

    '
- fmt: '### Run the Download Assistant


    Double-click the `Unity Download Assistant` icon to start the Unity installation
    (Figure [1-1](#A310332_2_En_1_Chapter.html#Fig1)).


    ![A310332_2_En_1_Fig1_HTML.jpg](Images/A310332_2_En_1_Fig1_HTML.jpg)


    Figure 1-1. The Unity Download Assistant


    The installer will proceed through a typical installation sequence (the steps
    are listed on the left side of the installer window), and at the end, a `Unity`
    folder will be placed in your `Applications` folder.


    **Tip**: If you happen to be upgrading from an older version of Unity, this process
    will just replace that old version. If you want to keep the previous copy, rename
    the old folder first. For example, if you’re upgrading from Unity 4.5 to Unity
    5, first rename your `Unity` folder to `Unity45` before performing the new installation.
    Then you can run both versions of Unity.


    The Unity installation folder contains the `Unity` application and several associated
    files and folders (Figure [1-2](#A310332_2_En_1_Chapter.html#Fig2)).


    ![A310332_2_En_1_Fig2_HTML.jpg](Images/A310332_2_En_1_Fig2_HTML.jpg)


    Figure 1-2. Unity installation folder


    The most important file in the Unity installation folder, and the only one you
    really need, is the `Unity` app, which provides the environment used to construct
    your games. This app is sometimes more specifically termed the Unity Editor, as
    distinct from the Unity runtime engine or Unity Player, which is incorporated
    into final builds. But usually when I just say “Unity,” the context is clear (I
    also refer to Unity Technologies as Unity).


    The `Documentation` folder contains the same User Manual, Component Reference,
    and Script Reference viewable on the Unity web site (on the Learn tab). Each of
    these files can be opened in a web browser from the Unity Help menu, and you can
    always double-click `Documentation.html` directly to see the front page of the
    documentation.


    The `Standard Packages` folder contains several files with the `.unityPackage`
    extension. These Unity package files each hold collections of Unity assets and
    can be imported into Unity (and from Unity, you can export assets into a package
    file).


    The `MonoDevelop` app is the default script editor for Unity and is a custom version
    of the open source MonoDevelop editor used for the Mono Project, known as Mono
    for short. Mono is an open source version of Microsoft’s .NET Framework and forms
    the basis of the Unity scripting system.


    Finally, there’s the Unity Bug Reporter app, which is normally run from the Report
    a Bug item in the Unity Help menu. However, you can always launch the `Unity Bug
    Reporter` directly from the Unity installation folder. That’s pretty helpful if
    you run into a bug where Unity doesn’t even start up!


    Be sure to install the Example Project component, which you will be working on
    in this book. In Figure [1-3](#A310332_2_En_1_Chapter.html#Fig3), I have also
    selected the WebGL Build Support component. If you also plan to build games for
    Windows computers, be sure to install the Windows Build Support component. Now
    would be a good time to grab a coffee or tea or take a walk; depending on how
    many options you selected and the speed of your Internet connection, the download
    may take a while (Figure [1-4](#A310332_2_En_1_Chapter.html#Fig4)).


    ![A310332_2_En_1_Fig4_HTML.jpg](Images/A310332_2_En_1_Fig4_HTML.jpg)


    Figure 1-4. Downloading and installing message


    ![A310332_2_En_1_Fig3_HTML.jpg](Images/A310332_2_En_1_Fig3_HTML.jpg)


    Figure 1-3. Unity component selection


    ### Welcome to Unity!


    After installing Unity, the Unity Editor window will appear with a friendly Unity
    Hello! window appearing on top (Figure [1-5](#A310332_2_En_1_Chapter.html#Fig5)).
    The Hello! window is where you can sign into your Unity account. If you do not
    have a Unity account, select the “create one” link. If you are not currently connected
    to the Internet, you can work offline by clicking the “Work offline” button.


    ![A310332_2_En_1_Fig5_HTML.jpg](Images/A310332_2_En_1_Fig5_HTML.jpg)


    Figure 1-5. The Unity Hello! window


    The Unity Hello! window will appear every time you start up Unity. If you haven’t
    already created a Unity account, now would be a good time to create one.


    After signing in for the first time, you will be presented with the Unity “License
    management” screen. If you have paid for a licensed version (Plus or Pro) version
    of Unity, enter your serial number in the dialog box. If you are planning to use
    the free version of Unity, select the Unity Personal radio button.


    ![A310332_2_En_1_Figa_HTML.jpg](Images/A310332_2_En_1_Figa_HTML.jpg)


    ## Manage Unity


    Before getting into actual game development with Unity, this is a good time to
    look at some of the administrative features in the Unity Editor.


    ### Change Skins (Pro)


    The Unity Editor appears in one of two skins, Dark or Light. If you’re using Unity
    Pro, you have the option of using the Dark skin, and if you’re using the Personal
    version of Unity, you’ll only see the Light skin (Figure [1-6](#A310332_2_En_1_Chapter.html#Fig6)).


    ![A310332_2_En_1_Fig6_HTML.jpg](Images/A310332_2_En_1_Fig6_HTML.jpg)


    Figure 1-6. The Unity Editor


    For the rest of this book, I use the Light skin for screenshots, but aside from
    the hue, there is no difference in the user interface. To change this (for Unity
    Pro), select Preferences in the Unity menu (Figure [1-7](#A310332_2_En_1_Chapter.html#Fig7)).


    ![A310332_2_En_1_Fig7_HTML.jpg](Images/A310332_2_En_1_Fig7_HTML.jpg)


    Figure 1-7. The Preferences menu item in the Unity Editor


    With the Preferences window open, you can change the skin from Dark to Light or
    Light to Dark. If you’re using Unity Personal, you’re stuck with the Light skin,
    as shown by the grayed-out `Editor Skin` option in Figure [1-8](#A310332_2_En_1_Chapter.html#Fig8).


    ![A310332_2_En_1_Fig8_HTML.jpg](Images/A310332_2_En_1_Fig8_HTML.jpg)


    Figure 1-8. General preferences in the Unity Editor


    While you’re in the Preferences window, I recommend making sure `Load Previous
    Project on Startup` is deselected. That will ensure Unity brings up the project
    selection dialog when it starts up, instead of automatically opening the most
    recently opened project, which can be time-consuming and is not always what you
    want. In particular, you don’t want to accidentally upgrade a project to a new
    version of Unity before you’re ready.


    A single Unity license can be used on two machines. In its early years, when the
    Unity Editor ran only on macOS, a Unity license was good for only one machine,
    but the number was increased to two after Windows support for the Unity Editor
    was added.'
