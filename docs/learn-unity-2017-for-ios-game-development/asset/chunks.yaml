- fmt: "### Other Settings\n\nIt so happens that many important settings are collected\
    \ under the generically titled Other Settings (Figure [10-11](#A310332_2_En_10_Chapter.html#Fig11)).\
    \ The static and dynamic batching options under the Rendering settings are really\
    \ optimization options, affecting whether and when meshes are automatically combined\
    \ for performance reasons. That will be discussed among optimization techniques\
    \ in Chapter [16](https://doi.org/10.1007/978-1-4842-3174-6_16).\n\n![A310332_2_En_10_Fig11_HTML.jpg](Images/A310332_2_En_10_Fig11_HTML.jpg)\n\
    \nFigure 10-11. Other settings in the player settings for iOS\n\nThere are two\
    \ settings in the Identification section: `Bundle Identifier` and `Version`. They\
    \ are not important for running in the iOS simulator, but when it comes time for\
    \ app submission, these settings must match the corresponding information for\
    \ the app specified in `iTunesConnect` (covered as part of the app submission\
    \ process in the next chapter).\n\nThe bundle ID is a unique identifier for your\
    \ app, typically expressed like a URL in reverse. For example, all of my apps\
    \ have bundle IDs of the form `com.technicat.<appname>`, so I would change `com.unity.climber`\
    \ to `com.technicat.climber`.\n\nThe bundle version is the same app version number\
    \ displayed for the app on the App Store. It’s usually formatted as two numbers,\
    \ `<major>.<minor>`, or sometimes three, `<major>.<minor>.<revision>`. This number\
    \ has to be incremented every time you submit an update for your app on the App\
    \ Store.\n\nUnder Configuration, most of the settings have reasonable defaults,\
    \ but you do need to decide whether your app will run on iPhones, iPads, or both\
    \ by selecting the target device. Most 3D apps generally run well on a variety\
    \ of screen aspect ratios, at least better than 2D apps, but iPhones and iPod\
    \ touches have narrower screens than iPads. Sometimes, for business reasons, you\
    \ might want to release an app only for the iPad or only for the iPhone.\n\nThe\
    \ SDK version has two options: `Device SDK` and `Simulator SDK`. When building\
    \ for a test device or an app submission, covered in the next chapter, the default\
    \ value of `Device SDK` is the correct choice, but in this chapter, `Simulator\
    \ SDK` should be selected to run our game in the iOS simulator.\n\n> **Note**\
    \  \n> `SDK Version` is an odd property name to distinguish between simulator\
    \ and hardware builds, but it is a holdover from older versions of Unity iOS that\
    \ required specifying the iOS SDK that was installed with Xcode.\n\nThe `Target\
    \ iOS Version` setting specifies the minimum iOS version the app will run on.\
    \ Leaving it on the default and minimum value, iOS 7.0, maximizes the number of\
    \ compatible devices and thus potential customers. However, targeting any iOS\
    \ too old may result in a Unity warning of a potential App Store rejection.\n\n\
    `Scripting Define Symbols` allows you to define your own preprocessor definitions,\
    \ just like the `UNITY_EDITOR` and `UNITY_WEBPLAYER` definitions referenced in\
    \ the `FuguPause` script in the previous chapter. For example, if you had some\
    \ code that calls some functions available only in Unity Pro, then you might wrap\
    \ the code with `#if UNITY_PRO … #endif` and then add `UNITY_PRO` to the `Scripting\
    \ Define Symbols` field in projects that are running with Unity Pro.\n\nMultiple\
    \ definitions can be added using semicolons as a separator. If you also had a\
    \ `USE_ADS` preprocessor definition to control whether ads are displayed, you\
    \ might have `USE_ADS;UNITY_PRO` in the `Scripting Define Symbols` field.\n\n\
    Some of the Optimization settings have nothing to do with optimization. `AOT Compilation\
    \ Options` refers to the ahead-of-time compilation that takes place during a Unity\
    \ iOS build, as opposed to just-in-time (JIT) compilation. This is why `#pragma\
    \ strict` is required in Unity iOS scripts. It gives the AOT compiler enough information\
    \ to do its job.\n\nFinally, `Stripping Level`, `Script Call Optimization`, and\
    \ `Optimize Mesh Data` really are optimization settings, which will be covered\
    \ among other optimization techniques in Chapter [16](https://doi.org/10.1007/978-1-4842-3174-6_16).\
    \ But, briefly, `Stripping Level` is a Unity iOS Pro option that removes unused\
    \ code (or if you’re unlucky, used code, which is why it’s optional), `Script\
    \ Call Optimization` can speed up scripts by eliminating exception handling (exceptions,\
    \ essentially, are errors or “exceptional” conditions that can be caught by calling\
    \ code), and `Optimize Mesh Data` removes unused mesh data (e.g., normals are\
    \ not necessary when an unlit material is used).\n\nAs you can see, there are\
    \ many options in the player settings that affect the appearance and performance\
    \ of Unity iOS builds. After changing the player settings, it’s a good idea to\
    \ save those changes by invoking `Save Project` or `Save Scene` (which implicitly\
    \ performs a `Save Project`, too) from the `File` menu. Although many if not most\
    \ of the player settings will be important at some point, the only change you\
    \ have to make to get Angry Bots running on the iOS simulator is setting `Device\
    \ SDK` to `Simulator SDK`."
  raw: '### Other Settings


    It so happens that many important settings are collected under the generically
    titled Other Settings (Figure [10-11](#A310332_2_En_10_Chapter.html#Fig11)). The
    static and dynamic batching options under the Rendering settings are really optimization
    options, affecting whether and when meshes are automatically combined for performance
    reasons. That will be discussed among optimization techniques in Chapter [16](https://doi.org/10.1007/978-1-4842-3174-6_16).


    ![A310332_2_En_10_Fig11_HTML.jpg](Images/A310332_2_En_10_Fig11_HTML.jpg)


    Figure 10-11.


    Other settings in the player settings for iOS


    There are two settings in the Identification section: Bundle Identifier and Version.
    They are not important for running in the iOS simulator, but when it comes time
    for app submission, these settings must match the corresponding information for
    the app specified in iTunesConnect (covered as part of the app submission process
    in the next chapter).


    The bundle ID is a unique identifier for your app, typically expressed like a
    URL in reverse. For example, all of my apps have bundle IDs of the form com.technicat.<appname>,
    so I would change com.unity.climber to com.technicat.climber.


    The bundle version is the same app version number displayed for the app on the
    App Store. It’s usually formatted as two numbers, <major>.<minor>, or sometimes
    three, <major>.<minor>.<revision>. This number has to be incremented every time
    you submit an update for your app on the App Store.


    Under Configuration, most of the settings have reasonable defaults, but you do
    need to decide whether your app will run on iPhones, iPads, or both by selecting
    the target device. Most 3D apps generally run well on a variety of screen aspect
    ratios, at least better than 2D apps, but iPhones and iPod touches have narrower
    screens than iPads. Sometimes, for business reasons, you might want to release
    an app only for the iPad or only for the iPhone.


    The SDK version has two options: Device SDK and Simulator SDK. When building for
    a test device or an app submission, covered in the next chapter, the default value
    of Device SDK is the correct choice, but in this chapter, Simulator SDK should
    be selected to run our game in the iOS simulator.


    Note


    SDK Version is an odd property name to distinguish between simulator and hardware
    builds, but it is a holdover from older versions of Unity iOS that required specifying
    the iOS SDK that was installed with Xcode.


    The Target iOS Version setting specifies the minimum iOS version the app will
    run on. Leaving it on the default and minimum value, iOS 7.0, maximizes the number
    of compatible devices and thus potential customers. However, targeting any iOS
    too old may result in a Unity warning of a potential App Store rejection.


    Scripting Define Symbols allows you to define your own preprocessor definitions,
    just like the UNITY_EDITOR and UNITY_WEBPLAYER definitions referenced in the FuguPause
    script in the previous chapter. For example, if you had some code that calls some
    functions available only in Unity Pro, then you might wrap the code with #if UNITY_PRO
    … #endif and then add UNITY_PRO to the Scripting Define Symbols field in projects
    that are running with Unity Pro.


    Multiple definitions can be added using semicolons as a separator. If you also
    had a USE_ADS preprocessor definition to control whether ads are displayed, you
    might have USE_ADS;UNITY_PRO in the Scripting Define Symbols field.


    Some of the Optimization settings have nothing to do with optimization. AOT Compilation
    Options refers to the ahead-of-time compilation that takes place during a Unity
    iOS build, as opposed to just-in-time (JIT) compilation . This why `#pragma strict`
    is required in Unity iOS scripts. It gives the AOT compiler enough information
    to do its job.


    Finally, Stripping Level, Script Call Optimization , and Optimize Mesh Data really
    are optimization settings, which will be covered among other optimization techniques
    in Chapter [16](https://doi.org/10.1007/978-1-4842-3174-6_16). But, briefly, Stripping
    Level is a Unity iOS Pro option that removes unused code (or if you’re unlucky,
    used code, which is why it’s optional), Script Call Optimization can speed up
    scripts by eliminating exception handling (exceptions, essentially, are errors
    or “exceptional” conditions that can be caught by calling code), and Optimize
    Mesh Data removes unused mesh data (e.g., normals are not necessary when an unlit
    material is used).


    As you can see, there are many options in the player settings that affect the
    appearance and performance of Unity iOS builds. After changing the player settings,
    it’s a good idea to save those changes by invoking Save Project or Save Scene
    (which implicitly performs a Save Project, too) from the File menu. Although many
    if not most of the player settings will be important at some point, the only change
    you have to make to get Angry Bots running on the iOS simulator is setting Device
    SDK to Simulator SDK.'
  trans: "\n### 其他设置\n\n许多重要的设置被集中在“其他设置”（Other Settings）这个通用标题下（图 10-11）。渲染设置下的静态和动态批处理选项实际上是优化选项，影响是否以及何时自动合并网格以提升性能。这将在第[16](https://doi.org/10.1007/978-1-4842-3174-6_16)章的优化技术中进行讨论。\n\
    \n![A310332_2_En_10_Fig11_HTML.jpg](img/A310332_2_En_10_Fig11_HTML.jpg)\n\n图 10-11.\
    \ iOS 播放器设置中的“其他设置”\n\n在“标识”（Identification）部分有两个设置：`Bundle Identifier` 和 `Version`。它们在\
    \ iOS 模拟器中运行时并不重要，但在提交应用时，这些设置必须与 `iTunesConnect` 中指定的应用信息一致（这将在下一章的应用提交流程中介绍）。\n\
    \n捆绑包 ID (bundle ID) 是应用的唯一标识符，通常以反向 URL 的形式表示。例如，我所有的应用捆绑包 ID 形式都是 `com.technicat.<appname>`，所以我会将\
    \ `com.unity.climber` 更改为 `com.technicat.climber`。\n\n捆绑包版本号 (bundle version)\
    \ 与 App Store 上显示的应用版本号相同。它通常格式化为两个数字，`<主版本>.<次版本>`，有时是三个，`<主版本>.<次版本>.<修订号>`。每次在\
    \ App Store 上提交应用更新时，都需要递增此数字。\n\n在“配置”（Configuration）下，大多数设置都有合理的默认值，但你需要通过选择目标设备来决定你的应用是在\
    \ iPhone、iPad 上运行，还是在两者上都运行。大多数 3D 应用通常在各种屏幕宽高比上都能良好运行，至少比 2D 应用要好，但 iPhone 和\
    \ iPod touch 的屏幕比 iPad 更窄。有时，出于商业原因，你可能只想发布一个仅适用于 iPad 或仅适用于 iPhone 的应用。\n\nSDK\
    \ 版本有两个选项：`Device SDK` 和 `Simulator SDK`。在为测试设备构建或提交应用（将在下一章介绍）时，默认值 `Device SDK`\
    \ 是正确的选择，但在本章中，应选择 `Simulator SDK` 才能在 iOS 模拟器中运行我们的游戏。\n\n> **注意**  \n> `SDK\
    \ Version` 这个属性名称用来区分模拟器和硬件构建有点奇怪，但它是 Unity iOS 旧版本遗留下来的，当时需要指定随 Xcode 安装的 iOS\
    \ SDK。\n\n`Target iOS Version` 设置指定了应用运行所需的最低 iOS 版本。将其保留为默认的最低值 iOS 7.0，可以最大限度地增加兼容设备的数量，从而扩大潜在客户群。然而，如果目标\
    \ iOS 版本太老，可能会导致 Unity 发出警告，提示应用可能被 App Store 拒绝。\n\n`Scripting Define Symbols`\
    \ 允许你定义自己的预处理器定义，就像上一章 `FuguPause` 脚本中引用的 `UNITY_EDITOR` 和 `UNITY_WEBPLAYER` 定义一样。例如，如果你有一些代码调用了\
    \ Unity Pro 才有的功能，你可以用 `#if UNITY_PRO … #endif` 包裹这些代码，然后在使用 Unity Pro 运行的项目中，将\
    \ `UNITY_PRO` 添加到 `Scripting Define Symbols` 字段。\n\n可以使用分号作为分隔符来添加多个定义。如果你还有一个\
    \ `USE_ADS` 预处理器定义来控制是否显示广告，你可以在 `Scripting Define Symbols` 字段中写入 `USE_ADS;UNITY_PRO`。\n\
    \n“优化”（Optimization）设置中的一些选项与优化无关。`AOT Compilation Options` 指的是在 Unity iOS 构建过程中发生的事先（AOT）编译，而不是即时（JIT）编译。这就是为什么在\
    \ Unity iOS 脚本中需要 `#pragma strict` 的原因。它为 AOT 编译器提供了足够的信息来完成其工作。\n\n最后，`Stripping\
    \ Level`、`Script Call Optimization` 和 `Optimize Mesh Data` 确实是优化设置，它们将在第[16](https://doi.org/10.1007/978-1-4842-3174-6_16)章中与其他优化技术一起介绍。简而言之，`Stripping\
    \ Level` 是一个 Unity iOS Pro 选项，用于移除未使用的代码（或者如果你运气不好，可能会移除已使用的代码，这就是它为何是可选项的原因），`Script\
    \ Call Optimization` 可以通过消除异常处理来加速脚本（异常本质上是可以被调用代码捕获的错误或“异常”情况），而 `Optimize Mesh\
    \ Data` 则用于移除未使用的网格数据（例如，当使用无光照材质时，法线数据就不是必需的）。\n\n如你所见，播放器设置中有许多选项会影响 Unity iOS\
    \ 构建的外观和性能。更改播放器设置后，最好通过 `File` 菜单调用 `Save Project` 或 `Save Scene`（后者也会隐式地执行 `Save\
    \ Project`）来保存这些更改。尽管许多（即使不是大多数）播放器设置在某些时候都很重要，但要让 Angry Bots 在 iOS 模拟器上运行，你唯一需要做的更改就是将\
    \ `Device SDK` 设置为 `Simulator SDK`。\n"
- fmt: '# Test with the iOS Simulator


    Now that you have Xcode installed and have `Device SDK` set to `Simulator SDK`,
    you’re ready to build and run `Climber` on the iOS Simulator. The `Build and Run`
    command in the `File` menu and the `Build and Run` button in the `Build Settings`
    window will perform the `Build` phase, generating an Xcode project, and then perform
    the `Run` phase, invoking a build-and-run within the Xcode project. Normally,
    that is pretty convenient, but when working with the iOS simulator, you have more
    control over the iOS simulator when performing the Xcode build-and-run manually
    from Xcode. So, let’s bring up the `Build Settings` window again (from the `File`
    menu) and click the `Build` button.


    > **Tip**

    >

    > Before performing a build, check in the `Build Settings` window that you have
    the correct set of scenes included.


    Unity will bring up a `Save As` window prompting you for a location and file name
    of the soon-to-be-built Xcode project (Figure 10-12).


    ![A310332_2_En_10_Fig12_HTML.jpg](Images/A310332_2_En_10_Fig12_HTML.jpg)


    **Figure 10-12.** Build prompt for location and name of the Xcode project


    It usually defaults to the top level of the Unity project folder. Let’s call the
    Xcode project `Climber_iOSv1.0`. You have added the version number so that you
    can keep track of any changes as needed.


    > **Caution**

    >

    > Be careful not to choose a build destination inside the `Assets` folder or Unity
    will try to import an entire Xcode project as project assets.


    If this isn’t the first time you built this project at this location, Unity will
    detect that an Xcode project with that name already exists and will ask if you
    want to replace the project completely or append the project changes (Figure 10-13).


    ![A310332_2_En_10_Fig13_HTML.jpg](Images/A310332_2_En_10_Fig13_HTML.jpg)


    **Figure 10-13.** Build Append or Replace dialog box


    Appending is faster, but sometimes you need a fresh Xcode project. For example,
    if you change the bundle ID in the player settings, and definitely if you’ve upgraded
    either Unity or Xcode, you should build a new Xcode project.


    > **Tip**

    >

    > `Build and Run` from the `File` menu is not quite the same as the `Build and
    Run` button in the `Build Settings`. The command in the `File` menu assumes you
    want to append the build folder, if it already exists, and doesn’t ask if you
    want to append or replace it. I prefer to stick with performing builds from the
    `Build Settings` window, so I always know what’s going on. I’ve had cases where
    I copied a project and invoking `Build and Run` from the `File` menu still built
    to the original location!


    In any case, after clicking `Build`, a progress bar will display during the build
    (Figure 10-14). As with asset reimporting, this can take a while for a big project,
    and the Editor will be unresponsive during the build.


    ![A310332_2_En_10_Fig14_HTML.jpg](Images/A310332_2_En_10_Fig14_HTML.jpg)


    **Figure 10-14.** The progress indicator during a build


    When the build is complete, an Xcode project will appear in the location you specified
    (Figure 10-15).


    ![A310332_2_En_10_Fig15_HTML.jpg](Images/A310332_2_En_10_Fig15_HTML.jpg)


    **Figure 10-15.** An Xcode project folder generated by a Unity iOS build


    The Xcode project is named `Unity-iPhone.xcodeproj` and is located in the Xcode
    project folder. Double-click that file to open the project in Xcode (Figure 10-16).


    ![A310332_2_En_10_Fig16_HTML.jpg](Images/A310332_2_En_10_Fig16_HTML.jpg)


    **Figure 10-16.** Xcode launched with a Unity iOS project


    Notice how `iPhone 7 Plus` is displayed at the top left of the Xcode window. That
    is a menu for selecting the Xcode scheme, which is a collection of build rules
    in Xcode. The other available schemes are the current iPad and iPhone simulators
    (Figure 10-17).


    ![A310332_2_En_10_Fig17_HTML.jpg](Images/A310332_2_En_10_Fig17_HTML.jpg)


    **Figure 10-17.** Selecting the iPad and iPhone simulators


    Performing a `Build and Run` from Unity would have launched the iOS simulator
    automatically without first giving you a chance to choose between the iPad and
    iPhone simulators. For now, let’s stay with the iPad simulator and click the `Run`
    button at the top left of the Xcode window. The `Run` button is really a `Build
    and Run` button, as it compiles the project if necessary before attempting to
    run it. If successful, an iOS simulator window matching the screen size of an
    iPad will appear, running `Climber` (Figure 10-18).


    ![A310332_2_En_10_Fig18_HTML.jpg](Images/A310332_2_En_10_Fig18_HTML.jpg)


    **Figure 10-18.** `Climber` running in the iOS simulator


    The iOS simulator will interpret mouse input as touchscreen events, so you can
    click the screen to play. In addition, the `Hardware` menu for the iOS simulator
    simulates other device events (Figure 10-19).


    ![A310332_2_En_10_Fig19_HTML.jpg](Images/A310332_2_En_10_Fig19_HTML.jpg)


    **Figure 10-19.** iOS simulator options


    For example, the `Rotate Left` and `Rotate Right` commands simulate rotating the
    device orientation (try it and see the autorotation in action), and invoking `Home`
    is the same as pressing the device `Home` button on a device, which will suspend
    or exit the app and display the `Home` screen of the device. The app icon should
    be there and can be clicked (simulated tap) to restart the app. The `Hardware`
    menu also allows you to select different devices and iOS versions to simulate.


    Besides testing, the iOS simulator is useful for taking screenshots via the `Save
    Screen Shot` command in the `Tools` menu (Figure 10-20). Invoking that command
    immediately saves the screenshot to the desktop. The App Store requires screenshots
    for the devices your app supports, so if you need an iPad screenshot, for example,
    and you don’t have an iPad, the iOS simulator is a convenient tool for getting
    that screenshot.


    ![A310332_2_En_10_Fig20_HTML.jpg](Images/A310332_2_En_10_Fig20_HTML.jpg)


    **Figure 10-20.** The `Save Screen Shot` command in the iOS simulator


    The iOS simulator window doesn’t have an operable close button, but the simulator
    can be exited by the `Quit iOS Simulator` command in the iOS simulator menu or
    its keyboard shortcut `Command+Q` (Figure 10-21).


    ![A310332_2_En_10_Fig21_HTML.jpg](Images/A310332_2_En_10_Fig21_HTML.jpg)


    **Figure 10-21.** Exiting the iOS simulator


    The iOS simulator is fairly complete at simulating iOS features, including iAd
    and Game Center. So if you don’t have an iOS device available for testing, you
    can still get through most of the rest of this book just using the iOS simulator.


    # Explore Further


    You might be experiencing déjà vu because you started with the `Climber` demo
    as your first project and now you’ve returned. The difference, of course, is now
    you’re building the project for iOS. You’ve taken important steps, changing the
    build target to iOS, testing in the Unity Editor with Unity Remote, and then building
    with Xcode to run in the iOS simulator. The next step, building to run on a real
    iOS device, will take place in the next chapter, and then you’ll return to your
    regular programming, the bowling game. By then, ideally, you’ll be comfortable
    with the build process and can concentrate on making the game an iOS game!'
