- fmt: "### Is It Rolling?\n\nYou might notice that if you move the mouse while the\
    \ ball is falling, you can actually push the ball while it’s still in the air,\
    \ which doesn’t seem right. Moving the mouse should roll the ball only when it’s\
    \ on a surface.\n\nFortunately, Unity has callback functions, each prefixed by\
    \ `OnCollision`, that are called when a `GameObject` collides with another `GameObject`\
    \ and when the contact ceases. Each of the callbacks takes one argument, a `Collision`\
    \ object that contains information about the collision, such as a reference to\
    \ the other `GameObject` that was involved.\n\nThe `FuguForce` script could check\
    \ if the colliding `GameObject` is the floor by checking whether its name is `Floor`\
    \ (using the `GameObject.name` variable). But in general it’s a better practice\
    \ and more efficient to find and identify `GameObject`s by their tags (using the\
    \ `GameObject.tag` variable). If you select the `GameObject` named Floor and examine\
    \ it in the Inspector view, you can see in the upper left it has the default tag\
    \ `Untagged`. To change the `GameObject`’s tag to `Floor`, the `Floor` tag must\
    \ first be created by selecting Add Tag from the Tag menu of the `GameObject`\
    \ (Figure [6-28](#A310332_2_En_6_Chapter.html#Fig28)).\n\n![A310332_2_En_6_Fig28_HTML.jpg](Images/A310332_2_En_6_Fig28_HTML.jpg)\n\
    \nFigure 6-28. Adding a new tag\n\nThis brings up the `TagManager` in the Inspector\
    \ view. The `TagManager` manages tags and layers. Tags are used to identify `GameObject`s,\
    \ so you can create practically an unlimited number of them. Layers, on the other\
    \ hand, are used to label groups of `GameObject`s, and at most 32 layers can be\
    \ defined since they are implemented as bits in a 32-bit number. This makes it\
    \ convenient to specify combinations of layers, for example, in the Culling Mask\
    \ properties of cameras and lights.\n\nTo create a new tag named `Floor`, just\
    \ type `Floor` into the first empty tag field in the `TagManager` (Figure [6-29](#A310332_2_En_6_Chapter.html#Fig29)).\
    \ Then select the `GameObject` named Floor in the Hierarchy view again, click\
    \ the Tag menu in the Inspector view again, and the new `Floor` tag is available\
    \ for selection (this might not be visible until you restart Unity).\n\n![A310332_2_En_6_Fig29_HTML.jpg](Images/A310332_2_En_6_Fig29_HTML.jpg)\n\
    \nFigure 6-29. The floor with the Floor tag added\n\nNow the `FuguForce` script\
    \ can be augmented with collision callbacks to see whether the ball is on the\
    \ floor (Listing [6-3](#A310332_2_En_6_Chapter.html#Par93)).\n\n```\nprivate var\
    \ isRolling:boolean=false;\nprivate var floorTag:String = \"Floor\";\nfunction\
    \ Update() {\nforcex = mousepowerx*Input.GetAxis(\"Mouse X\")/Time.deltaTime;\n\
    forcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n}\nfunction FixedUpdate()\
    \ {\nif (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);\n\
    }\n}\nfunction OnCollisionEnter(collider:Collision) {\nif (collider.gameObject.tag\
    \ == floorTag) {\nisRolling = true;\n}\n}\nfunction OnCollisionStay(collider:Collision)\
    \ {\nif (collider.gameObject.tag == floorTag) {\nisRolling = true;\n}\n}\nfunction\
    \ OnCollisionExit(collider:Collision) {\nif (collider.gameObject.tag == floorTag)\
    \ {\nisRolling = false;\n}\n}\n```\n\nListing 6-3. Collision Callbacks in FuguForce.js\n\
    \nTwo private variables are added. The first variable, `isRolling`, is true when\
    \ the ball is on the floor. The second variable, `floorTag`, is the tag assigned\
    \ to the floor.\n\n**Tip**  \nDefining a variable for the tag avoids having to\
    \ spell out the tag in multiple locations (and avoids hard-to-debug spelling errors),\
    \ and if the name of the tag is changed later, only the variable needs to be updated.\
    \ Each of the three collision callbacks checks if the `GameObject` the ball collided\
    \ against is the floor by checking the tag of the colliding `GameObject`. If the\
    \ `GameObject` is not the floor, then the collision callback doesn’t do anything.\n\
    \nThe `OnCollisionEnter` callback is called by Unity when the ball collides with\
    \ another `GameObject`, so that function sets `isRolling` to true. Conversely,\
    \ `OnCollisionExit` is called by Unity when contact ceases between the ball and\
    \ a `GameObject`, and in that case `isRolling` is set to false.\n\nIn the meantime,\
    \ `OnCollisionStay` is called while the ball stays in contact with a `GameObject`,\
    \ so it also ensures that `isRolling` stays true. Now the `FixedUpdate` callback\
    \ can check whether `isRolling` is true, indicating that the ball is on the floor,\
    \ before applying a push to the ball (Listing [6-4](#A310332_2_En_6_Chapter.html#Par98)).\n\
    \n```\nfunction FixedUpdate() {\nif (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);\n\
    }\n}\n```\n\nListing 6-4. Add a Rolling Check in FixedUpdate of FuguForce.js\n\
    \n### Limit the Speed\n\nFinally, as a bit of polish, the ball control script\
    \ can check the ball’s speed before pushing the ball, avoiding cases where the\
    \ ball ends up rolling much faster than you intended because of some freak combination\
    \ of existing velocity, frame rate, and input values (Listing [6-5](#A310332_2_En_6_Chapter.html#Par100)).\n\
    \n```\nvar maxVelocitySquared:float=400.0;\n```\n\nListing 6-5. Add a Speed Check\
    \ in FixedUpdate of FuguForce.js\n\nThis is a pretty simple change, requiring\
    \ only the addition of a variable called `maxVelocitySquared` to hold your maximum\
    \ velocity value, which is actually the square of the maximum velocity value.\n\
    \n### The Complete Script\n\nListing [6-6](#A310332_2_En_6_Chapter.html#Par103)\
    \ presents the complete listing for the ball controller script, `FuguForce.js`,\
    \ put together so far. This is the version in the Chapter [6](../Text/A310332_2_En_6_Chapter.html)\
    \ project at [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739).\n\
    \n```\n#pragma strict\nvar mousepowerx:float = 1.0;\nvar mousepowery:float = 1.0;\n\
    var maxVelocitySquared:float=400.0;\nprivate var forcey:float=0;\nprivate var\
    \ forcex:float=0;\nprivate var isRolling:boolean=false;\nprivate var floorTag:String\
    \ = \"Floor\";\nfunction Update() {\nforcex = mousepowerx*Input.GetAxis(\"Mouse\
    \ X\")/Time.deltaTime;\nforcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n\
    }\nfunction FixedUpdate() {\nif (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);\n\
    }\n}\nfunction OnCollisionEnter(collider:Collision) {\nif (collider.gameObject.tag\
    \ == floorTag) {\nisRolling = true;\n}\n}\n```\n\nListing 6-6. Complete Listing\
    \ of FuguForce.js"
  raw: '### Is It Rolling?


    You might notice that if you move the mouse while the ball is falling, you can
    actually push the ball while it’s still in the air, which doesn’t seem right.
    Moving the mouse should roll the ball only when it’s on a surface.


    Fortunately, Unity has callback functions, each prefixed by OnCollision, that
    are called when a GameObject collides with another GameObject and when the contact
    ceases. Each of the callbacks takes one argument, a Collision object that contains
    information about the collision, such as a reference to the other GameObject that
    was involved.


    The FuguForce script could check if the colliding GameObject is the floor by checking
    whether its name is Floor (using the GameObject name variable). But in general
    it’s a better practice and more efficient to find and identify GameObjects by
    their tags (using the GameObject tag variable). If you select the GameObject named
    Floor and examine it in the Inspector view, you can see in the upper left it has
    the default tag Untagged. To change the GameObject’s tag to Floor, the Floor tag
    must first be created by selecting Add Tag from the Tag menu of the GameObject
    (Figure [6-28](#A310332_2_En_6_Chapter.html#Fig28)).


    ![A310332_2_En_6_Fig28_HTML.jpg](Images/A310332_2_En_6_Fig28_HTML.jpg)


    Figure 6-28.


    Adding a new tag


    This brings up the TagManager in the Inspector view. The TagManager manages tags
    and layers. Tags are used to identify GameObjects, so you can create practically
    an unlimited number of them. Layers, on the other hand, are used to label groups
    of GameObjects, and at most 32 layers can be defined since they are implemented
    as bits in a 32-bit number. This makes it convenient to specify combinations of
    layers, for example, in the Culling Mask properties of cameras and lights.


    To create a new tag named Floor, just type Floor into the first empty tag field
    in the TagManager (Figure [6-29](#A310332_2_En_6_Chapter.html#Fig29)). Then select
    the GameObject named Floor in the Hierarchy view again, click the Tag menu in
    the Inspector view again, and the new Floor tag is available for selection (this
    might not be visible until you restart Unity ).


    ![A310332_2_En_6_Fig29_HTML.jpg](Images/A310332_2_En_6_Fig29_HTML.jpg)


    Figure 6-29.


    The floor with the Floor tag added


    Now the FuguForce script can be augmented with collision callbacks to see whether
    the ball is on the floor (Listing [6-3](#A310332_2_En_6_Chapter.html#Par93)).


    ```

    private var isRolling:boolean=false;

    private var floorTag:String = "Floor";

    function Update() {

    forcex = mousepowerx*Input.GetAxis("Mouse X")/Time.deltaTime;

    forcey = mousepowery*Input.GetAxis("Mouse Y")/Time.deltaTime;

    }

    function FixedUpdate() {

    if (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);

    }

    }

    function OnCollisionEnter(collider:Collision) {

    if (collider.gameObject.tag == floorTag) {

    isRolling = true;

    }

    }

    function OnCollisionStay(collider:Collision) {

    if (collider.gameObject.tag == floorTag) {

    isRolling = true;

    }

    }

    function OnCollisionExit(collider:Collision) {

    if (collider.gameObject.tag == floorTag) {

    isRolling = false;

    }

    }

    Listing 6-3.

    Collision Callbacks in FuguForce.js

    ```


    Two private variables are added. The first variable, isRolling, is true when the
    ball is on the floor. The second variable, floorTag, is the tag assigned to the
    floor.


    Tip


    Defining a variable for the tag avoids having to spell out the tag in multiple
    locations (and avoids hard-to-debug spelling errors), and if the name of the tag
    is changed later, only the variable needs to be updated. Each of the three collision
    callbacks checks if the GameObject the ball collided against is the floor by checking
    the tag of the tag of the colliding GameObject. If the GameObject is not the floor,
    then the collision callback doesn’t do anything.


    The OnCollisionEnter callback is called by Unity when the ball collides with another
    GameObject, so that function sets isRolling to true. Conversely, OnCollisionExit
    is called by Unity when contact ceases between the ball and a GameObject, and
    in that case isRolling is set to false.


    In the meantime, OnCollisionStay is called while the ball stays in contact with
    a GameObject, so it also ensures that isRolling stays true. Now the FixedUpdate
    callback can check whether isRolling is true, indicating that the ball is on the
    floor, before applying a push to the ball (Listing [6-4](#A310332_2_En_6_Chapter.html#Par98)).


    ```

    function FixedUpdate() {

    if (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);

    }

    }

    Listing 6-4.

    Add a Rolling Check in FixedUpdate of FuguForce.js

    ```


    ### Limit the Speed


    Finally, as a bit of polish, the ball control script can check the ball’s speed
    before pushing the ball, avoiding cases where the ball ends up rolling much faster
    than you intended because of some freak combination of existing velocity, frame
    rate, and input values (Listing [6-5](#A310332_2_En_6_Chapter.html#Par100)).


    ```

    var maxVelocitySquared:float=400.0;

    Listing 6-5.

    Add a Speed Check in FixedUpdate of FuguForce.js

    ```


    This is a pretty simple change, requiring only the addition of a variable called
    maxVelocitySquared to hold your maximum velocity value, which is actually the
    square of the maximum velocity value.


    ### The Complete Script


    Listing [6-6](#A310332_2_En_6_Chapter.html#Par103) presents the complete listing
    for the ball controller script, `FuguForce.js`, put together so far. This is the
    version in the Chapter [6](../Text/A310332_2_En_6_Chapter.html) project at [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    .


    ```

    #pragma strict

    var mousepowerx:float = 1.0;

    var mousepowery:float = 1.0;

    var maxVelocitySquared:float=400.0;

    private var forcey:float=0;

    private var forcex:float=0;

    private var isRolling:boolean=false;

    private var floorTag:String = "Floor";

    function Update() {

    forcex = mousepowerx*Input.GetAxis("Mouse X")/Time.deltaTime;

    forcey = mousepowery*Input.GetAxis("Mouse Y")/Time.deltaTime;

    }

    function FixedUpdate() {

    if (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);

    }

    }

    function OnCollisionEnter(collider:Collision) {

    if (collider.gameObject.tag == floorTag) {

    isRolling = true;

    }

    }

    Listing 6-6.

    Complete Listing of FuguForce.js

    ```'
  trans: "\n### 真的在滚动吗？\n\n你可能会注意到，如果在球下落时移动鼠标，实际上可以在球还在空中时就推动它，这看起来不太对劲。移动鼠标只应在球接触表面时才能使其滚动。\n\
    \n幸运的是，Unity 提供了回调函数，每个都以 `OnCollision` 为前缀。当一个 `GameObject` 与另一个 `GameObject`\
    \ 发生碰撞以及接触结束时，这些函数会被调用。每个回调函数都接受一个参数，即包含碰撞信息的 `Collision` 对象，其中包含对方的 `GameObject`\
    \ 引用。\n\n`FuguForce` 脚本可以通过检查碰撞对象的名字是否为 `Floor`（使用 `GameObject.name` 变量）来判断碰撞的\
    \ `GameObject` 是否是地面。但通常来说，通过标签来查找和识别 `GameObject`（使用 `GameObject.tag` 变量）是更好的实践，也更高效。如果你选择名为\
    \ Floor 的 `GameObject`，并在检视面板中查看它，你会在左上角看到它带有默认标签 `Untagged`。要将该 `GameObject`\
    \ 的标签更改为 `Floor`，需要先从该 `GameObject` 的标签菜单中选择添加标签，来创建 `Floor` 标签（图 6-28）。\n\n![A310332_2_En_6_Fig28_HTML.jpg](img/A310332_2_En_6_Fig28_HTML.jpg)\n\
    \n图 6-28. 添加新标签\n\n此时，检视面板中会打开 `TagManager`。`TagManager` 用于管理标签和层级。标签用于标识 `GameObject`，因此你几乎可以创建无限数量的标签。而层级则用于标记\
    \ `GameObject` 组，最多可以定义 32 个层级，因为它们被实现为 32 位数字中的位。这使得指定层级的组合变得十分方便，例如，在摄像机和光源的剔除遮罩属性中就是如此。\n\
    \n要创建一个名为 `Floor` 的新标签，只需在 `TagManager` 的第一个空白标签字段中输入 `Floor`（图 6-29）。然后再次在层级视图中选择名为\
    \ Floor 的 `GameObject`，并再次点击检视面板中的标签菜单，新的 `Floor` 标签便可供选择（可能需要重启 Unity 后才可见）。\n\
    \n![A310332_2_En_6_Fig29_HTML.jpg](img/A310332_2_En_6_Fig29_HTML.jpg)\n\n图 6-29.\
    \ 添加了 Floor 标签的地面\n\n现在，`FuguForce` 脚本可以增加碰撞回调，以判断球是否在地面上（列表 6-3）。\n\n```\nprivate\
    \ var isRolling:boolean=false;\nprivate var floorTag:String = \"Floor\";\nfunction\
    \ Update() {\nforcex = mousepowerx*Input.GetAxis(\"Mouse X\")/Time.deltaTime;\n\
    forcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n}\nfunction FixedUpdate()\
    \ {\nif (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);\n\
    }\n}\nfunction OnCollisionEnter(collider:Collision) {\nif (collider.gameObject.tag\
    \ == floorTag) {\nisRolling = true;\n}\n}\nfunction OnCollisionStay(collider:Collision)\
    \ {\nif (collider.gameObject.tag == floorTag) {\nisRolling = true;\n}\n}\nfunction\
    \ OnCollisionExit(collider:Collision) {\nif (collider.gameObject.tag == floorTag)\
    \ {\nisRolling = false;\n}\n}\n```\n\n列表 6-3. FuguForce.js 中的碰撞回调\n\n添加了两个私有变量。第一个变量\
    \ `isRolling`，当球在地面上时为 true。第二个变量 `floorTag`，是赋给地面的标签。\n\n**提示**  \n为标签定义一个变量，可以避免在多个位置反复拼写该标签（并避免难以调试的拼写错误），并且如果后续标签名称发生更改，只需更新该变量即可。这三个碰撞回调函数都会通过检测碰撞对象的标签，来判断球碰撞的\
    \ `GameObject` 是否是地面。如果该 `GameObject` 不是地面，则碰撞回调不执行任何操作。\n\n当球与另一个 `GameObject`\
    \ 发生碰撞时，Unity 会调用 `OnCollisionEnter` 回调，因此该函数会将 `isRolling` 设置为 true。相反，当球与 `GameObject`\
    \ 的接触结束时，Unity 会调用 `OnCollisionExit`，此时将 `isRolling` 设置为 false。\n\n与此同时，`OnCollisionStay`\
    \ 会在球与 `GameObject` 保持接触时被调用，因此它也确保 `isRolling` 保持为 true。现在，`FixedUpdate` 回调可以在对球施加推力之前，检查\
    \ `isRolling` 是否为 true，以判断球是否在地面上（列表 6-4）。\n\n```\nfunction FixedUpdate() {\n\
    if (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);\n\
    }\n}\n```\n\n列表 6-4. 在 FuguForce.js 的 FixedUpdate 中添加滚动检查\n\n### 限制速度\n\n最后，作为一点润色，球控制脚本可以在推动球之前检查其速度，避免因现有速度、帧率和输入值的某种异常组合，导致球最终滚动的速度远超预期（列表\
    \ 6-5）。\n\n```\nvar maxVelocitySquared:float=400.0;\n```\n\n列表 6-5. 在 FuguForce.js\
    \ 的 FixedUpdate 中添加速度检查\n\n这是一个相当简单的改动，只需添加一个名为 `maxVelocitySquared` 的变量来保存你的最大速度值，该值实际上是最大速度值的平方。\n\
    \n### 完整脚本\n\n列表 6-6 展示了目前为止整合在一起的球控制脚本 `FuguForce.js` 的完整代码。此版本位于第 6 章的项目中，可于\
    \ [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739) 获取。\n\n\
    ```\n#pragma strict\nvar mousepowerx:float = 1.0;\nvar mousepowery:float = 1.0;\n\
    var maxVelocitySquared:float=400.0;\nprivate var forcey:float=0;\nprivate var\
    \ forcex:float=0;\nprivate var isRolling:boolean=false;\nprivate var floorTag:String\
    \ = \"Floor\";\nfunction Update() {\nforcex = mousepowerx*Input.GetAxis(\"Mouse\
    \ X\")/Time.deltaTime;\nforcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n\
    }\nfunction FixedUpdate() {\nif (isRolling && GetComponent.().velocity.sqrMagnitude().AddForce(forcex,0,forcey);\n\
    }\n}\nfunction OnCollisionEnter(collider:Collision) {\nif (collider.gameObject.tag\
    \ == floorTag) {\nisRolling = true;\n}\n}\n```\n\n列表 6-6. FuguForce.js 的完整代码\n"
- fmt: '# Be the Ball


    The `Ball` control works pretty well at this point, but the `Main Camera` just
    sits there while the ball rolls off into the distance. This is a glaring deficiency,
    as any decent 3D game has some kind of camera movement. In HyperBowl, the `Main
    Camera` follows the ball as you roll but always faces the same direction (toward
    the pins). It turns out Unity has a camera-follow script in Standard Assets. The
    Scripts package was already imported from Standard Assets in Chapter [3](../Text/A310332_2_En_3_Chapter.html)
    to obtain the `MouseOrbit` script. The script is also located in the Utility folder
    of the Standard Assets package and is called `SmoothFollow` (Figure [6-30](#A310332_2_En_6_Chapter.html#Fig30)).


    ![A310332_2_En_6_Fig30_HTML.jpg](Images/A310332_2_En_6_Fig30_HTML.jpg)


    Figure 6-30. The Utility scripts in Standard Assets


    You will note that this is a C# script. C# is a common language for creating video
    games. Drag the `SmoothFollow` script from the Project view onto the `Main Camera`
    in the Hierarchy view. Then select the `Main Camera` in the Hierarchy view so
    you can edit the `SmoothFollow` script properties in the Inspector view (Figure
    [6-31](#A310332_2_En_6_Chapter.html#Fig31)).


    ![A310332_2_En_6_Fig31_HTML.jpg](Images/A310332_2_En_6_Fig31_HTML.jpg)


    Figure 6-31. The Inspector view of the `Main Camera` with the `SmoothFollow` script


    The `Main Camera` should follow the ball, so drag the GameObject named `Ball`
    from the Hierarchy view into the `SmoothFollow` script’s `Target` field in the
    Inspector view.


    As for the other `SmoothFollow` properties, set `Distance` to 2, which will leave
    the `Main Camera` trailing 2 m behind the `Ball`, and set `Height` to 1, so the
    camera stays 1 m above the ball instead of following right behind it. A `Height
    Damping` setting of 2 allows the `Main Camera` to spring up and down a bit while
    following the ball’s height, and a `Rotation Damping` setting of 0 ensures the
    `Main Camera` will always stay behind the ball and not swing around to the left
    or right.


    Now click Play, and as you roll around, you’re rolling and following!


    ## Explore Further


    Now we have the beginnings of real gameplay. It’s not a complete bowling game
    yet, but it has physics (a ball rolling on a floor), interactive control (pushing
    the ball), and camera movement (following the ball). Each of those features is
    a rich topic in game development, but in particular you’ll be digging deeper into
    physics in the next chapter with the addition bowling pins and collision-based
    sound effects. Then the game will look a lot more like a bowling game!


    ### Unity Manual


    In the “Asset Import and Creation” section, the “Procedural Materials” page describes
    the Substance archive format a little bit and provides an overview of the tools
    used to create and analyze procedural materials.


    In the “Creating Gameplay” section, the “Input” page describes the `Input` class
    and its `GetAxis` function used in the `BallController` script implemented in
    this chapter and lists the joystick and keyboard values passed to that function.
    The lower portion of that page describes input functions and variables available
    for iOS, so you can read that for a preview of this book’s chapter on iOS input.


    This chapter has been mostly about physics, so the “Physics” page is the most
    important to read. It lists all the collider types, including the `Sphere Collider`,
    `Box Collider`, and `Mesh Collider` used in this chapter. The page describes the
    differences between rigid bodies (the ball) and static colliders (the floor) and
    how physic materials and their properties affect collision behavior.


    ### Reference Manual


    In the “Asset Components” section, the “Procedural Material Assets” page explains
    what you see in the Project view and Inspector view for procedural materials.


    The “Physics Components” section lists all the available colliders in detail,
    along with the available joints (including hinges and springs), constant force,
    and cloth components (cloth is not supported in Unity iOS).


    ### Scripting Reference


    The Unity Scripting Reference is available on the Internet (<https://docs.unity3d.com/ScriptReference/index.html>)
    and provides valuable information. The Unity Scripting Reference is also available
    directly from MonoDevelop. When you enter any of the Unity classes or functions,
    you can use the command key and the single quote key (`⌘ + ''`) to bring up contextually
    relevant information. For example, after typing in the `Input` class, using the
    `⌘ + ''` key combination will open a page in your default web browser and show
    you relevant information about `Input` from the Unity Scripting Reference (Figure
    [6-32](#A310332_2_En_6_Chapter.html#Fig32)).


    ![A310332_2_En_6_Fig32_HTML.jpg](Images/A310332_2_En_6_Fig32_HTML.jpg)


    Figure 6-32. The `Speed` variable added to the ball


    ### On the Web


    The physics implementation in Unity is based on an older version (2.x) of the
    PhysX engine, originally developed by NovodeX, acquired by Ageia and bundled with
    a hardware physics accelerator, and now a product of nVidia. The latest version
    (3.x) is available on the nVidia Developer Zone (<https://developer.nvidia.com/physx>).
    The PhysX software development kit is worth a look just to get a better idea what
    physics engine features underlie the Unity physics components and script functions.


    # 7. Let’s Bowl! Advanced Physics


    At this point, you have the glimmerings of a bowling game, or at least a scene
    in the Unity Editor where the player can roll the ball around on the floor. But
    the game won’t look like a bowling game until it at least has bowling pins. That
    will be remedied in this chapter and involve more Unity physics, including collisions
    between `Rigidbody` components (among the ball and pins) and compound colliders
    (to accommodate the shape of a bowling pin). On top of that, you’ll add collision-based
    sound effects so the game will sound like a bowling game.


    This additional functionality will require the construction of several new scripts,
    which are available in the Unity project for this chapter. You can access it,
    and all other source code for this book, via the Download Source Code button located
    at <http://www.apress.com/9781484231739>. However, the barrel model used for the
    bowling pins and the audio for pin collisions and the ball-rolling sound come
    from the Asset Store and not included in the online project (but they are free).


    ## Lengthen the Lane


    Before adding bowling pins to the bowl scene, which should be open in the Unity
    Editor as you left it in the previous chapter, you need some more room to roll.
    Select the floor in the Hierarchy view, and in the Inspector view (Figure [7-1](#A310332_2_En_7_Chapter.html#Fig1))
    set `Scale` to 10 for X, Y, and Z.


    ![A310332_2_En_7_Fig1_HTML.jpg](Images/A310332_2_En_7_Fig1_HTML.jpg)


    Figure 7-1. The larger `Floor` GameObject, scaled up by a factor of 10


    > **Tip:** For performance reasons, it’s best to avoid changing the scale in the
    `Transform` component (for imported models, change the scale in the Import Settings
    dialog instead). If you have to change the scale, change it uniformly along all
    three axes.


    The floor is now ten times larger (except in height since a plane has zero height).
    But the textures on the floor are also stretched, resulting in some really wide
    planks. To compensate, you should also adjust the tiling for the floor’s Main
    and Normalmap textures by a factor of ten, which results in a new `Tiling` factor
    of 50 in each direction. Now the wooden planks look as they originally did.'
  raw: '## Be the Ball


    The Ball control works pretty well at this point, but the Main Camera just sits
    there while the ball rolls off into the distance. This is a glaring deficiency,
    as any decent 3D game has some kind of camera movement. In HyperBowl, the Main
    Camera follows the ball as you roll but always faces the same direction (toward
    the pins). It turns out Unity has a camera-follow script in Standard Assets. The
    Scripts package was already imported from Standard Assets in Chapter [3](../Text/A310332_2_En_3_Chapter.html)
    to obtain the MouseOrbit script. The script is also located in the Utility folder
    of the Standard Assets package and is called SmoothFollow (Figure [6-30](#A310332_2_En_6_Chapter.html#Fig30)).


    ![A310332_2_En_6_Fig30_HTML.jpg](Images/A310332_2_En_6_Fig30_HTML.jpg)


    Figure 6-30.


    The Utility scripts in Standard Assets


    You will note that this is a C# script. C# is a common language for creating video
    games. Drag the SmoothFollow script from the Project view onto the Main Camera
    in the Hierarchy view. Then select the Main Camera in the Hierarchy view so you
    can edit the SmoothFollow script properties in the Inspector view (Figure [6-31](#A310332_2_En_6_Chapter.html#Fig31)).


    ![A310332_2_En_6_Fig31_HTML.jpg](Images/A310332_2_En_6_Fig31_HTML.jpg)


    Figure 6-31.


    The Inspector view of the Main Camera with the SmoothFollow script


    The Main Camera should follow the ball, so drag the GameObject named Ball from
    the Hierarchy view into the SmoothFollow script’s Target field in the Inspector
    view .


    As for the other SmoothFollow properties, set Distance to 2, which will leave
    the Main Camera trailing 2 m behind the Ball, and set Height to 1, so the camera
    stays 1 m above the ball instead of following right behind it. A Height Damping
    setting of 2 allows the Main Camera to spring up and down a bit while following
    the ball’s height, and a Rotation Damping setting of 0 ensures the Main Camera
    will always stay behind the ball and not swing around to the left or right.


    Now click Play, and as you roll around, you’re rolling and following!


