  trans: '

    你不能再像在 JavaScript 中那样，在协程里直接调用 `yield`。在 C# 中，你需要调用 `yield return null` 来实现等待一帧的效果。


    另一个不同之处在于匿名函数的语法。在我们的 `FuguGameCenter` 脚本中，我们传入了未命名的成功或失败函数，形式为 `function(success:boolean)
    {...}`；但在 C# 中，匿名函数被称为 lambda 函数（这个术语源于 Lisp 语言，它使用 `(lambda (success) ...)`），其形式为
    `(bool success) => {...}`。代码清单 15-5 展示了 `FuguGameCenter` 脚本的 C# 版本。


    ```

    using UnityEngine;

    using System.Collections;

    using UnityEngine.SocialPlatforms.GameCenter;

    namespace Fugu {

    sealed public class GameCenter : MonoBehaviour {

    public bool showAchievementBanners = true;

    // 初始化时调用

    void Start () {

    #if UNITY_IPHONE

    Social.localUser.Authenticate ( (bool success) => {

    if (success && showAchievementBanners) {

    GameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);

    Debug.Log ("已验证身份 "+Social.localUser.userName);

    }

    else {

    Debug.Log ("未能验证身份 "+Social.localUser.userName);

    }

    }

    );

    #endif

    }

    static public void Achievement(string name,double score) {

    #if UNITY_IPHONE

    if (Social.localUser.authenticated) {

    Social.ReportProgress(name,score, (bool success) => {

    if (success) {

    Debug.Log("成就 "+name+" 报告成功");

    }  else {

    Debug.Log("报告成就 "+name+" 失败");

    }

    } );

    }

    #endif

    }

    static public void Score(string name,long score) {

    #if UNITY_IPHONE

    if (Social.localUser.authenticated) {

    Social.ReportScore (score, name, (bool success) => {

    if (success) {

    Debug.Log("已将 "+score+" 提交到排行榜 "+name);

    }  else {

    Debug.Log("将 "+score+" 提交到排行榜 "+name+" 失败");

    }

    } );

    }

    #endif

    }

    }

    }

    代码清单 15-5.

    C# 版本的 FuguGameCenter

    ```


    最后，你可能会最怀念 JavaScript 的一个特性是：能轻松地修改 `transform` 中的 `Vector3` 值。代码清单 15-6 展示了一行简单的
    JavaScript 代码，它仅修改了 transform 位置中的 `x` 分量。


    ```

    function Start () {

    transform.position.x=0;

    }

    代码清单 15-6.

    在 JavaScript 中修改 Transform 的 Vector3

    ```


    在 C# 中，这行代码会产生一个编译器错误，因为 `Vector3` 是一个结构体（struct），而不是类（class），因此它是值类型，而非引用类型。它在
    JavaScript 中能工作是一种便利（尽管有误导性，因为它确实让 `Vector3` 看起来像一个类，而不是结构体）。


    由于 `Vector3` 是一个结构体，你无需担心垃圾回收器需要清理一堆未使用的 `Vector3` 实例，因为，好吧，根本没有实例。但这确实意味着在 C#
    中，如果你想修改 transform 的位置，你必须创建一个新的 `Vector3`，如代码清单 15-7 所示。


    ```

    void Start () {

    transform.position = new Vector3(0,transform.position.y,transform.position.z);

    }

    代码清单 15-7.

    在 C# 中修改 Transform 的有效方法

    ```


    请注意，在 C# 中，你必须在 `Vector3` 构造函数前指定 `new`，而在 JavaScript 中这是可选的。这是 JavaScript 的一个小便利（这类便利通常被称为“语法糖”），但
    C# 的优势在于允许你以类似于定义类的方式定义自己的结构体。在 JavaScript 中，你可以使用结构体，但无法定义新的结构体。Andrew Stellman
    和 Jennifer Greene 的 *深入理解 C#（Head First C#）*（O''Reilly 出版）是一本很好的 C# 入门书籍，但有经验的程序员可以通过
    *C# 7.0 本质论（C# in a Nutshell）*系列（同样由 O''Reilly 出版）快速上手 C#。特别是 Java 程序员会发现 C# 很熟悉（尽管名字如此，C#
    与 C 或 C++ 并无关联，除非你算上遥远的祖先）。


    ### 脚本执行顺序


    在结束脚本编写话题之前，还有一个问题值得一提：指定脚本之间的执行顺序。如果你查看保龄球游戏中用于控制主摄像头的 `SmoothFollow` 脚本，你会看到摄像头位置不是在
    `Update` 回调中更新，而是在 `LateUpdate` 回调中更新。`LateUpdate` 在每个帧中都会被调用，就像 `Update` 一样，但一个帧中的所有
    `LateUpdate` 调用都在所有 `Update` 调用完成之后才进行。`SmoothFollow` 在 `LateUpdate` 中计算摄像头位置，因此它会考虑其目标在
    `Update` 回调中发生的任何位置变化。


    同时拥有 `Update` 和 `LateUpdate` 回调是游戏引擎中的一种常见技术，但它的作用也仅限于此。如果你希望一个 `GameObject` 在另一个
    `GameObject` 的 `LateUpdate` 之后更新呢？抱歉，没有 `LateLateUpdate` 回调！但 Unity 确实有一个更通用的解决方案，即脚本执行顺序设置，可以通过编辑菜单的项目设置子菜单调出（图
    15-3）。


    ![A310332_2_En_15_Fig3_HTML.jpg](img/A310332_2_En_15_Fig3_HTML.jpg)


    **图 15-3.** 调出脚本执行顺序设置


    当选中一个脚本时，也可以通过点击检查器视图中显示的“执行顺序”按钮来调出脚本执行顺序设置。无论哪种方式，脚本执行顺序设置都会显示在检查器视图中（图 15-4）；你会看到一个初始只包含一个“默认时间”项的列表。


    ![A310332_2_En_15_Fig4_HTML.jpg](img/A310332_2_En_15_Fig4_HTML.jpg)


    **图 15-4.** 检查器视图中的脚本执行顺序设置


    要添加一个会在 `FuguForce` 之后执行的脚本，你可以点击脚本执行顺序设置右下角的加号（+）按钮，并从弹出的菜单中选择 `FuguForce` 脚本。默认情况下，`FuguForce`
    脚本会出现在脚本执行顺序设置中“默认时间”设置的下方，这意味着 `FuguBowl` 将在所有其他脚本之后运行。


    然后你可能会决定，游戏控制器脚本 `FuguBowl` 应该在所有其他脚本之后运行（例如，因为它不断检查保龄球的位置），但 `SmoothFollow` 除外。因此，再次点击
    + 按钮添加 `FuguBowl` 脚本，然后使用左侧的拖动柄将 `FuguBowl` 拖到 `SmoothFollow` 上方、默认时间下方，最终得到一个如图
    15-5 所示的列表。任何被拖到默认时间上方的脚本都会在所有其他脚本之前执行。


    ![A310332_2_En_15_Fig5_HTML.jpg](img/A310332_2_En_15_Fig5_HTML.jpg)


    **图 15-5.** 指定 `FuguBowl.js` 和 `SmoothFollow.js` 的执行顺序


    点击脚本右侧的减号（-）按钮将从脚本执行顺序设置中移除该脚本。


    ### 插件


    前面多次提到第三方插件，其中一些可在资源商店中找到，许多来自 Prime31 Studios。但如果你恰好熟悉 C、C++ 或 Objective-C，你可以编写自己的插件，无论是为了访问更多设备功能，还是为了使用用
    C、C+ 或 Objective-C 编写的库。除了包含原生库之外，插件还需要额外的 Unity 封装脚本。该过程在 Unity 手册“高级”部分的“插件”页面中有详细说明。

