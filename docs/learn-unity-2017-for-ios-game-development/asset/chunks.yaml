- fmt: '### Name the Script


    `NewBehaviour` is not a very meaningful name for a script, so the first order
    of business is to give it a new name. An obvious choice is `Rotate`, since the
    eventual purpose of the script is to rotate the cube. But with overly general
    names, you can run into a conflict (Unity will report an error) if there are two
    scripts with the same name, even if they reside in different folders. This is
    because each script defines a new class (a subclass of `MonoBehaviour`, to be
    specific), and you can’t have two classes with the same name.


    One approach is to name each script with a standard prefix (much like how Objective-C
    classes start with `NS`). This is a common technique adopted by third-party Unity
    user interface packages. If everyone names their button class `Button`, they can’t
    coexist!


    **Note**


    C# scripts have the option of partitioning classes among namespaces to avoid name
    clashes. This book uses JavaScript nearly all the way through, but examples of
    C# scripts and namespaces are provided in Chapter [17](https://doi.org/10.1007/978-1-4842-3174-6_17).


    Sometimes I use the game name as a script name prefix, if the script is specific
    to the game (for example, in HyperBowl, I have a lot of scripts that start with
    Hyper). However, I usually prefix my script names with `Fugu`, corresponding to
    my game brand, Fugu Games. This book will stick with that convention, so go ahead
    and name the new script `FuguRotate` (Figure [4-3](#A310332_2_En_4_Chapter.html#Fig3)).
    Of course, in general, you’re free to choose your own script name convention.


    ### Anatomy of a Script


    If you select the `FuguRotate` script in the Project view, the Inspector view
    displays the source code, or at least as much as will fit in the Inspector view
    display (Figure [4-4](#A310332_2_En_4_Chapter.html#Fig4)).


    ![A310332_2_En_4_Fig4_HTML.jpg](Images/A310332_2_En_4_Fig4_HTML.jpg)


    Figure 4-4. Inspector view of the new script


    As the Inspector view shows, when Unity creates a new script, it includes three
    items (Listing [4-1](#A310332_2_En_4_Chapter.html#Par15)).


    ```

    #pragma strict

    function Start () {

    }

    function Update () {

    }

    ```

    Listing 4-1. Contents of a New Script


    The top line of the script, `#pragma strict`, instructs the script compiler that
    all variables have type declarations, or at least have types that are easily inferred
    by the compiler. This is not a requirement for Unity desktop builds, but it is
    required for Unity iOS, so you might as well make a habit of it.


    **Note**


    All the complete script listings in this book start with `#pragma strict`. Any
    code that doesn’t include that line is only an excerpt from a script.


    The two functions in the script are callbacks, which are called by the Unity game
    engine at well-defined moments in the game. The `Start` function is called when
    this script is first enabled. A component is not completely enabled unless the
    `GameObject` it’s attached to is also active. So if a `GameObject` is initially
    active in a scene and it has an enabled script attached, then the `Start` function
    of that script is called when the scene starts playing. Otherwise, the `Start`
    function is not called until the script is enabled (by setting the `enabled` variable
    of the script component) and the `GameObject` is made active (by calling the `SetActive`
    function of the `GameObject`).


    In contrast to the `Start` function, which is called at most once in the lifetime
    of a script component, the `Update` function is called every frame (i.e., once
    before each time Unity renders the current scene). Like the `Start` function,
    `Update` is called only when the script is (completely) enabled, and the first
    call to `Update` happens after the one and only call to `Start`. Thus, the `Start`
    function is useful for performing any initialization needed by the `Update` function.


    ### Attach the Script


    Like other assets in the Project view, a script has no effect until you add it
    to the scene, specifically, as a component of a `GameObject`. Ultimately, you
    want the `FuguRotate` script to rotate the cube, so drag it from the Project view
    onto the cube `GameObject` in the Hierarchy view. The Inspector view now shows
    the script is attached to the cube as a component (Figure [4-5](#A310332_2_En_4_Chapter.html#Fig5)).


    ![A310332_2_En_4_Fig5_HTML.jpg](Images/A310332_2_En_4_Fig5_HTML.jpg)


    Figure 4-5. `FuguRotate` script attached to the cube


    Unity often offers two, and sometimes three, ways to perform the same operation.
    For example, you could also have attached the `FuguRotate` script to the cube
    by clicking the `Add Component` button in the Inspector view of the cube and then
    selecting the `FuguRotate` script from the resulting menu. Or you could have dragged
    the `FuguRotate` script into the area below the `Add Component` button (but that’s
    difficult if there isn’t much space displayed below the button).


    ### Edit the Script


    Now it’s time to fill out the script. Select the `FuguRotate` script in the Project
    view, and then in the Inspector view click the `Open` button to bring up the script
    editor. Double-clicking the script in the Project view, or selecting `Open` from
    the right-click menu on the script, will work, too. The default script editor
    for Unity is a customized version of MonoDevelop, a code editor and debugger tailored
    for Mono, the open source framework underlying Unity’s scripting system (Figure
    [4-6](#A310332_2_En_4_Chapter.html#Fig6)).


    ![A310332_2_En_4_Fig6_HTML.jpg](Images/A310332_2_En_4_Fig6_HTML.jpg)


    Figure 4-6. The MonoDevelop editor


    If you prefer to use another script editor, you can change the default by bringing
    up the Unity Preferences window, selecting the `External Tools` tab, and then
    browsing for the application of your choice (Figure [4-7](#A310332_2_En_4_Chapter.html#Fig7)).


    ![A310332_2_En_4_Fig7_HTML.jpg](Images/A310332_2_En_4_Fig7_HTML.jpg)


    Figure 4-7. Choosing a different script editor


    The `FuguRotate` script as it stands won’t do anything noticeable since the callback
    functions are empty, having no code between their brackets. Let’s start off with
    some tracing code in the `Start` and `Update` functions to demonstrate when those
    callbacks are invoked (Listing [4-2](#A310332_2_En_4_Chapter.html#Par25)).


    ```

    function Start () {

    Debug.Log("Start called on GameObject "+gameObject.name);

    }

    function Update () {

    Debug.Log("Update called at time "+Time.time);

    }

    ```

    Listing 4-2. `FuguRotate.js` with Calls to `Debug.Log`


    One cool feature of Unity’s MonoDevelop is its code autocompletion. For example,
    Figure [4-8](#A310332_2_En_4_Chapter.html#Fig8) shows that as you type `Time.t`,
    MonoDevelop pops up a list of functions and variables that are members of the
    `Time` class and looks for one that starts with `t`.


    ![A310332_2_En_4_Fig8_HTML.jpg](Images/A310332_2_En_4_Fig8_HTML.jpg)


    Figure 4-8. Autocompletion in MonoDevelop'
