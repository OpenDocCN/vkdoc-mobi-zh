- fmt: '# Understand the Script


    Now that the `FuguRotate` script is doing something, let’s try to understand what
    that is. Both `Start` and `Update` call the function `Debug.Log` to print messages
    to the Console view. `Log` is a static function defined in the `Debug` class,
    meaning you can call that function by specifying its class name before the function
    name, instead of an object (functions defined in classes are also called methods).


    **Note**: Static functions and variables are also called class functions and variables
    since they are associated with a class instead of instances of that class.


    The variable `gameObject` references the `GameObject` this component (the script)
    is attached to (in this case, the cube), and every `GameObject` also has a `name`
    variable that references the name of this `GameObject` (in this case, Cube). The
    `+` operator can be used to concatenate two strings (it’s not just for addition
    anymore), so the `Start` function will print “Start called on GameObject” followed
    by the name of the `GameObject`.


    Similarly, the `Update` function calls `Debug.Log`, concatenating “Update called
    at time” with the value of the static variable `Time.time`, which holds the time
    elapsed (in seconds) since the game started (in the case of running from the Unity
    Editor, when you click the Play button). `Time.time` is of type `float` (a floating-point
    number, which can represent noninteger values), but the `+` operator will convert
    the number to a string before appending it.


    # Read the Scripting Reference


    Besides autocompletion, another handy feature of MonoDevelop is the ability to
    bring up the Scripting Reference documentation for any Unity class, function,
    or variable. Clicking `Debug` at the beginning of a `Debug.Log` call in the script
    and pressing Command+’ will bring up the Scripting Reference documentation for
    the `Debug` class in a browser window. Clicking `Log` will bring up the specific
    documentation for the `Debug.Log` function.


    **Tip**: Every time you see a Unity class, function, or variable you’re not familiar
    with, the first thing you should do is read the Script Reference documentation
    on it.


    Figure 4-9 shows the Unity Help menu.


    ![A310332_2_En_4_Fig9_HTML.jpg](Images/A310332_2_En_4_Fig9_HTML.jpg)


    Figure 4-9. Bringing up the Scripting Reference from the Help menu


    The Scripting Reference contains documentation for all Unity classes plus their
    functions and variables. I find the fastest way to look up an arbitrary Unity
    class, function, or variable in the Scripting Reference is to type it in the search
    box. The search function in MonoDevelop enables you to search for the function
    you are looking for help on (Figure 4-10).


    ![A310332_2_En_4_Fig10_HTML.jpg](Images/A310332_2_En_4_Fig10_HTML.jpg)


    Figure 4-10. The Scripting Reference


    However, clicking Classes on the left will give you the list of classes (Figure
    4-11). Some classes, such as `Debug` and `Time`, are static classes, meaning they
    contain only static functions and variables (there are no Unity functions that
    don’t reside in a class), and there’s no reason to subclass them.


    ![A310332_2_En_4_Fig11_HTML.jpg](Images/A310332_2_En_4_Fig11_HTML.jpg)


    Figure 4-11. List of classes


    Most classes, however, act as types of objects. The cube in the scene is an instance
    of the class `GameObject`. And `GameObject` is a subclass of `Object`, meaning
    it inherits all the documented variables and functions of `Object`. Conceptually,
    and in object-oriented parlance, the cube is a `GameObject` and thus also is an
    `Object`. Contrast this with the relationship between `GameObject`s and components.
    The cube is a `GameObject`, and it has a `MeshFilter` (which has a `Mesh`).


    Many components, including lights and cameras, are subclasses of `Behaviour`,
    which is a component that can be enabled or disabled (as evidenced by the check
    boxes in the Inspector view). Some are not, though, like `Transform`, which is
    a direct subclass (no intervening classes) of a component and cannot be disabled
    (no check box in the Inspector view).


    Each script is actually a subclass of `MonoBehaviour`, which is a subclass of
    `Behaviour` (so you can enable and disable scripts). Thus, the `FuguRotate` script
    defines a subclass of `MonoBehaviour` called `FuguRotate`. This class declaration
    is implicit in JavaScript, although you could make it explicit, as shown in Listing
    4-3.


    ```

    #pragma strict

    class FuguRotate extends MonoBehaviour {

    function Start () {

    var object:GameObject = null;

    Debug.Log("Start called on GameObject "+object.name);

    }

    function Update () {

    Debug.Log("Update called at time "+Time.time);

    }

    }

    ```


    Listing 4-3. Version of `FuguRotate.js` with Explicit Class Declaration


    # Run the Script


    Proper programming is a lot like the scientific method you learned in school.
    You should have a general theory on how things work, hypothesize about what your
    code should be doing, and then run an experiment to validate that hypothesis.
    In other words, it’s time to run your code and see whether it does what you expect.
    When you click Play, the messages emitted by `Debug.Log` will show up in the Console
    view (Figure 4-12).


    ![A310332_2_En_4_Fig12_HTML.jpg](Images/A310332_2_En_4_Fig12_HTML.jpg)


    Figure 4-12. Tracing the Start and update callbacks


    If the code doesn’t behave as you expect, it is time to revise your theory on
    what it’s doing. This may be a small consolation, but debugging your code is a
    learning experience!


    # Debug the Script


    Of course, your code will not be perfect as soon as you type it in. On the contrary,
    usually it will require several iterations of debugging. There are basically two
    types of errors: compilation errors that appear even before you try to run the
    game and runtime errors that occur while the game is playing.


    ## Compilation Errors


    Every time a script is saved, it’s automatically compiled (converted from the
    source code to the code format that actually runs). Errors in the script that
    prevent successful compilation will appear in red at the bottom of the Unity Editor
    and in the Console view.


    Double-clicking the error message at the bottom of the Editor will bring up the
    corresponding message in the Console view, and double-clicking the message in
    the Console view will bring up the script editor with the cursor located at the
    offending line of code. Even without that convenience, the error message will
    list the file name and line number of the offending code so you can find it manually.


    For example, if you had typed `Time.tim` instead of `Time.time` in the `Update`
    function, an error message would have appeared as soon as you tried to save the
    script (Figure 4-13). Conveniently, Unity will often do a decent job of suggesting
    what you may have intended to type (although generally computers aren’t good at
    “do what I mean, not what I say”).


    ![A310332_2_En_4_Fig13_HTML.jpg](Images/A310332_2_En_4_Fig13_HTML.jpg)


    Figure 4-13. A script compilation error


    ## Runtime Errors


    Like compilation errors, runtime errors also show up in the Console view. To demonstrate,
    replace the reference to `gameObject` in your `Start` function with a reference
    to a local variable named `object`. A local variable is declared within a function
    declaration and therefore is accessible only within the scope of the function.
    In this case, `object` is initialized as `null`, meaning it’s not referring to
    any actual `GameObject` and is never assigned any `GameObject`. When you click
    Play, an error results when the script tries to reference the name of the `GameObject`
    (Figure 4-14).


    ![A310332_2_En_4_Fig14_HTML.jpg](Images/A310332_2_En_4_Fig14_HTML.jpg)


    Figure 4-14. A script runtime error'
