- fmt: "Although you can check whether an object is selected before calling `SetActiveRecursively`,\
    \ it’s better user interface design to deactivate a menu item if it’s not going\
    \ to have any effect. You can add this by listing the `MenuItem` attributes again,\
    \ but this time with an additional `true` argument, which indicates the next function\
    \ is a static function that returns `true` only if the menu item should be active.\
    \ Both `ActivateRecursively` and `DeactivateRecursively` use `ValidateGameObject`,\
    \ which just checks whether a `GameObject` is selected in the Editor, to decide\
    \ whether the menu item should be available or grayed out.\n\nOnce this script\
    \ has been compiled, the new menu should appear, as shown in Figure [15-2](#A310332_2_En_15_Chapter.html#Fig2)\
    \ (there may be a delay).\n\n![A310332_2_En_15_Fig2_HTML.jpg](Images/A310332_2_En_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2.  \nA menu added to the menu bar using an Editor script\n\nThis\
    \ example has minimal user interface, just some menu items, but Editor scripts\
    \ can create new windows and user interfaces using UnityGUI functions (and the\
    \ Editor is actually implemented in UnityGUI, which is why occasional Editor errors\
    \ show up as UnityGUI errors in the Console view). Editor scripts can also be\
    \ used for batch processing, postprocessing assets after import, or preprocessing\
    \ scenes before a build. I have simple Editor scripts that remove build files,\
    \ show `GameObject` statistics, and even call the macOS `say` command so I can\
    \ talk to myself.\n\n### C#\n\nI’ve focused on using Unity’s JavaScript in this\
    \ book because, well, I had to pick one. JavaScript is more succinct than C#,\
    \ at least for small scripts. Just compare the empty JavaScript (Listing [15-2](#A310332_2_En_15_Chapter.html#Par15))\
    \ and C# script (Listing [15-3](#A310332_2_En_15_Chapter.html#Par16)) generated\
    \ by the Create menu in the Project view.\n\n```\n#pragma strict\nfunction Start\
    \ () {\n}\nfunction Update () {\n}\n```\n\nListing 15-2.  \nNewly Created JavaScript\
    \ Script\n\n```\nusing UnityEngine;\nusing System.Collections;\npublic class NewBehaviourScript\
    \ : MonoBehaviour {\n// Use this for initialization\nvoid Start () {\n}\n// Update\
    \ is called once per frame\nvoid Update () {\n}\n}\n```\n\nListing 15-3.  \nNewly\
    \ Created C# Script\n\nIn the C# script, the class declaration is explicit, and\
    \ you have to ensure that the class name matches the script name. At the top of\
    \ the C# script, two namespaces that are commonly used in Unity scripts, `UnityEngine`\
    \ and `System.Collections`, are explicitly imported. In JavaScript, they are implicitly\
    \ imported.\n\nA lot of JavaScript code will run in C# with little modification,\
    \ but there are some syntactic differences. For example, variable declarations\
    \ begin with `<type> <name>` instead of `var <name>:<type>`. Functions are defined\
    \ the same way, starting with the return type and name instead of starting with\
    \ `function`. There’s no reason to add `#pragma strict` to a C# file because C#\
    \ is already strictly typed.\n\nFor small scripts, JavaScript is more convenient,\
    \ but for large-scale Unity development, C# is arguably the more practical choice,\
    \ given that it’s a better-documented language with industrial-strength testing\
    \ because it’s the most popular Mono and .NET language. Furthermore, many Unity\
    \ extension packages are written in C# (the Prime31 plug-ins, EZGUI, and NGUI\
    \ among them), and mixing JavaScript and C# in Unity is inconvenient; if you have\
    \ JavaScript code referencing C# scripts, those scripts must be placed in the\
    \ `Plugins` or `Standard Assets` folders so they load earlier.\n\nAnother reason\
    \ to use C# is the addition of namespace support for C# in Unity 5. This feature\
    \ allows you to dispense with prefixing class names to avoid conflicts. For example,\
    \ Listing [15-4](#A310332_2_En_15_Chapter.html#Par21) shows a C# version of the\
    \ `FuguFrameRate` script, where the class is defined within a namespace declaration.\n\
    \n```\nusing UnityEngine;\nusing System.Collections;\nnamespace Fugu {\nsealed\
    \ public class FrameRate : MonoBehaviour {\npublic int frameRate = 60;\nvoid Awake\
    \ () {\nApplication.targetFrameRate = frameRate;\n}\n}\n} // end namespace\n```\n\
    \nListing 15-4.  \nC# Version of the `FuguFrameRate` Script\n\nBecause the class\
    \ is inside the namespace `Fugu`, you can safely call the class just `FrameRate`\
    \ and name the script `FrameRate` to match. If you had to refer to this class\
    \ from another script, you would have to use the fully qualified name `Fugu.FrameRate`\
    \ unless you added a `using Fugu;` statement at the top of the script. C# allows\
    \ you to optionally prepend the class definition with `sealed`, which specifies\
    \ that this class is not intended to be subclassed. A compiler error will result\
    \ if you try to define a subclass of `FrameRate`. Java programmers will recognize\
    \ this is the same as the Java `final` declaration.\n\nIn C#, coroutines must\
    \ explicitly return type `IEnumerator` (which is in the `System.Collections` namespace\
    \ and why it’s convenient to always import that namespace). Although Unity automatically\
    \ adds a `Start` callback that returns `void` in newly created C# scripts, that\
    \ `Start` callback can be turned into a coroutine by changing the return type\
    \ from `void` to `IEnumerator`.\n\n`StartCoroutine` can be called from any callback,\
    \ so this technique has the advantage of providing a uniform way to invoke coroutines\
    \ and makes it unnecessary to use callbacks directly as coroutines (and also makes\
    \ it unnecessary to remember which callbacks can be used as coroutines). This\
    \ is not a bad practice to apply in JavaScript, too."
  raw: 'Although you can check whether an object is selected before calling SetActiveRecursively,
    it’s better user interface design to deactivate a menu item if it’s not going
    to have any effect. You can add this by listing the MenuItem attributes again,
    but this time with an additional true argument, which indicates the next function
    is a static function that returns true only if the menu item should be active.
    Both ActivateRecursively and DeactivateRecursively use ValidateGameObject, which
    just checks whether a GameObject is selected in the Editor, to decide whether
    the menu item should be available or grayed out.


    Once this script has been compiled, the new menu should appear, as shown in Figure
    [15-2](#A310332_2_En_15_Chapter.html#Fig2) (there may be a delay).


    ![A310332_2_En_15_Fig2_HTML.jpg](Images/A310332_2_En_15_Fig2_HTML.jpg)


    Figure 15-2.


    A menu added to the menu bar using an Editor script


    This example has minimal user interface, just some menu items, but Editor scripts
    can create new windows and user interfaces using UnityGUI functions (and the Editor
    is actually implemented in UnityGUI, which is why occasional Editor errors show
    up as UnityGUI errors in the Console view). Editor scripts can also be used for
    batch processing, postprocessing assets after import, or preprocessing scenes
    before a build. I have simple Editor scripts that remove build files, show GameObject
    statistics, and even call the macOS say command so I can talk to myself.


    ### C#


    I’ve focused on using Unity’s JavaScript in this book because, well, I had to
    pick one. JavaScript is more succinct than C#, at least for small scripts. Just
    compare the empty JavaScript (Listing [15-2](#A310332_2_En_15_Chapter.html#Par15))
    and C# script (Listing [15-3](#A310332_2_En_15_Chapter.html#Par16)) generated
    by the Create menu in the Project view.


    ```

    #pragma strict

    function Start () {

    }

    function Update () {

    }

    Listing 15-2.

    Newly Created JavaScript Script

    ```


    ```

    using UnityEngine;

    using System.Collections;

    public class NewBehaviourScript : MonoBehaviour {

    // Use this for initialization

    void Start () {

    }

    // Update is called once per frame

    void Update () {

    }

    }

    Listing 15-3.

    Newly Created C# Script

    ```


    In the C# script, the class declaration is explicit, and you have to ensure that
    the class name matches the script name. At the top of the C# script, two namespaces
    that are commonly used in Unity scripts, UnityEngine and System.Collections, are
    explicitly imported. In JavaScript, they are implicitly imported.


    A lot of JavaScript code will run in C# with little modification, but there are
    some syntactic differences. For example, variable declarations begin with <type>
    <name> instead of var <name>:<type>. Functions are defined the same way, starting
    with the return type and name instead of starting with function. There’s no reason
    to add `#pragma strict` to a C# file because C# is already strictly typed.


    For small scripts, JavaScript is more convenient, but for large-scale Unity development,
    C# is arguably the more practical choice, given that it’s a better-documented
    language with industrial-strength testing because it’s the most popular Mono and
    .NET language. Furthermore, many Unity extension packages are written in C# (the
    Prime31 plug-ins, EZGUI, and NGUI among them), and mixing JavaScript and C# in
    Unity is inconvenient; if you have JavaScript code referencing C# scripts, those
    scripts must be placed in the Plugins or Standard Assets folders so they load
    earlier.


    Another reason to use C# is the addition of namespace support for C# in Unity
    5\. This feature allows you to dispense with prefixing class names to avoid conflicts.
    For example, Listing [15-4](#A310332_2_En_15_Chapter.html#Par21) shows a C# version
    of the FuguFrameRate script, where the class is defined within a namespace declaration.


    ```

    using UnityEngine;

    using System.Collections;

    namespace Fugu {

    sealed public class FrameRate : MonoBehaviour {

    public int frameRate = 60;

    void Awake () {

    Application.targetFrameRate = frameRate;

    }

    }

    } // end namespace

    Listing 15-4.

    C# Version of the FuguFrameRate Script

    ```


    Because the class is inside the namespace Fugu, you can safely call the class
    just FrameRate and name the script FrameRate to match. If you had to refer to
    this class from another script, you would have to use the fully qualified name
    Fugu.FrameRate unless you added a using Fugu; statement at the top of the script.
    C# allows you to optionally prepend the class definition with sealed, which specifies
    that this class is not intended to be subclassed. A compiler error will result
    if you try to define a subclass of FrameRate. Java programmers will recognize
    this is the same as the Java final declaration.


    In C#, coroutines must explicitly return type IEnumerator (which is in the System.Collections
    namespace and why it’s convenient to always import that namespace). Although Unity
    automatically adds a Start callback that returns void in newly created C# scripts,
    that Start callback can be turned into a coroutine by changing the return type
    from void to IEnumerator.


    StartCoroutine can be called from any callback, so this technique has the advantage
    of providing a uniform way to invoke coroutines and makes it unnecessary to use
    callbacks directly as coroutines (and also makes it unnecessary to remember which
    callbacks can be used as coroutines). This is not a bad practice to apply in JavaScript,
    too.'
  trans: "\n尽管你可以在调用 `SetActiveRecursively` 之前检查对象是否被选中，但从用户界面设计的角度来说，更好的做法是：如果一个菜单项不会产生任何效果，就将其禁用。你可以通过再次列出\
    \ `MenuItem` 属性来实现，不过这次要额外添加一个 `true` 参数，该参数表示下一个函数是一个静态函数，仅当菜单项应该处于激活状态时才返回 `true`。`ActivateRecursively`\
    \ 和 `DeactivateRecursively` 都使用了 `ValidateGameObject` 函数（该函数仅用于检查编辑器中是否选中了某个 `GameObject`），来判断菜单项是应该可用还是灰显。\n\
    \n此脚本编译后，新的菜单应该会出现，如图 15-2 所示（可能会有延迟）。\n\n![A310332_2_En_15_Fig2_HTML.jpg](img/A310332_2_En_15_Fig2_HTML.jpg)\n\
    \n图 15-2.  \n使用编辑器脚本添加到菜单栏的菜单\n\n这个示例的用户界面很简单，只有几个菜单项，但编辑器脚本可以使用 UnityGUI 函数创建新的窗口和用户界面（实际上编辑器就是用\
    \ UnityGUI 实现的，这就是为什么偶尔在控制台视图中看到的编辑器错误会显示为 UnityGUI 错误）。编辑器脚本还可用于批处理、导入后的资源后处理，或构建前的场景预处理。我编写过一些简单的编辑器脚本，用于删除构建文件、显示\
    \ `GameObject` 统计数据，甚至调用 macOS 的 `say` 命令来让自己能和自己对话。\n\n### C#\n\n我在本书中主要使用 Unity\
    \ 的 JavaScript，原因很简单：我必须选一种语言。JavaScript 比 C# 更简洁，至少对于小型脚本来说是如此。只需比较一下项目视图中通过“创建”菜单生成的空\
    \ JavaScript 脚本（列表 15-2）和 C# 脚本（列表 15-3）就能看出区别。\n\n```\n#pragma strict\nfunction\
    \ Start () {\n}\nfunction Update () {\n}\n```\n\n列表 15-2.  \n新建的 JavaScript 脚本\n\
    \n```\nusing UnityEngine;\nusing System.Collections;\npublic class NewBehaviourScript\
    \ : MonoBehaviour {\n// Use this for initialization\nvoid Start () {\n}\n// Update\
    \ is called once per frame\nvoid Update () {\n}\n}\n```\n\n列表 15-3.  \n新建的 C#\
    \ 脚本\n\n在 C# 脚本中，类声明是显式的，你必须确保类名与脚本名匹配。在 C# 脚本顶部，显式导入了 Unity 脚本中常用的两个命名空间：`UnityEngine`\
    \ 和 `System.Collections`。而在 JavaScript 中，它们是隐式导入的。\n\n大量 JavaScript 代码只需少量修改就能在\
    \ C# 中运行，但两者在语法上存在一些差异。例如，变量声明以 `<type> <name>` 开头，而不是 `var <name>:<type>`。函数的定义方式也不同，C#\
    \ 以返回类型和函数名开头，而不是以 `function` 开头。没有理由在 C# 文件中添加 `#pragma strict`，因为 C# 本身就是强类型语言。\n\
    \n对于小型脚本，JavaScript 更便捷；但对于大型 Unity 开发项目，C# 可以说是更实用的选择，因为它是一种文档更完善、经过工业级强度测试的语言，同时也是最流行的\
    \ Mono 和 .NET 语言。此外，许多 Unity 扩展包都是用 C# 编写的（包括 Prime31 插件、EZGUI 和 NGUI），而且在 Unity\
    \ 中混用 JavaScript 和 C# 很不方便；如果你的 JavaScript 代码引用了 C# 脚本，这些脚本必须放在 `Plugins` 或 `Standard\
    \ Assets` 文件夹中，以便它们更早地加载。\n\n使用 C# 的另一个原因是 Unity 5 中为 C# 增加了对命名空间的支持。这一特性允许你省去给类名添加前缀来避免冲突的操作。例如，列表\
    \ 15-4 展示了 `FuguFrameRate` 脚本的 C# 版本，其中类是在命名空间声明内定义的。\n\n```\nusing UnityEngine;\n\
    using System.Collections;\nnamespace Fugu {\nsealed public class FrameRate : MonoBehaviour\
    \ {\npublic int frameRate = 60;\nvoid Awake () {\nApplication.targetFrameRate\
    \ = frameRate;\n}\n}\n} // end namespace\n```\n\n列表 15-4.  \n`FuguFrameRate` 脚本的\
    \ C# 版本\n\n由于该类位于 `Fugu` 命名空间内，你可以安全地将该类直接称为 `FrameRate`，并将脚本命名为 `FrameRate` 以保持一致。如果你需要从另一个脚本引用此类，就必须使用完全限定名\
    \ `Fugu.FrameRate`，除非你在该脚本顶部添加了 `using Fugu;` 语句。C# 允许你在类定义前使用 `sealed` 关键字，这指定了该类不可被继承。如果尝试定义\
    \ `FrameRate` 的子类，将会导致编译器错误。Java 程序员会认出这等同于 Java 的 `final` 声明。\n\n在 C# 中，协程必须显式返回\
    \ `IEnumerator` 类型（该类型位于 `System.Collections` 命名空间中，这就是为什么总是导入该命名空间会很方便）。尽管 Unity\
    \ 会在新建的 C# 脚本中自动添加一个返回 `void` 的 `Start` 回调，但你可以通过将返回类型从 `void` 改为 `IEnumerator`，将这个\
    \ `Start` 回调变成一个协程。\n\n`StartCoroutine` 可以从任何回调中调用，因此这种技术具有提供统一的协程调用方式的优点，并且无需将回调直接用作协程（也无需记住哪些回调可以用作协程）。在\
    \ JavaScript 中应用这种做法也是不错的。"
- fmt: 'You also can’t just call `yield` within a coroutine as you did in JavaScript.
    In C#, you have to call `yield return null` to equivalently yield for a frame.


    Another difference is the syntax of anonymous functions. In our `FuguGameCenter`
    script, I passed unnamed success or failure functions in the form of `function(success:boolean)
    {...}`, but in C#, anonymous functions are known as lambda functions (dating back
    to terminology from the Lisp language, which used `(lambda (success) ...)`) and
    is specified in the form `(bool success) => {...}`. Listing [15-5](#A310332_2_En_15_Chapter.html#Par27)
    shows a C# version of the `FuguGameCenter` script.


    ```

    using UnityEngine;

    using System.Collections;

    using UnityEngine.SocialPlatforms.GameCenter;

    namespace Fugu {

    sealed public class GameCenter : MonoBehaviour {

    public bool showAchievementBanners = true;

    // Use this for initialization

    void Start () {

    #if UNITY_IPHONE

    Social.localUser.Authenticate ( (bool success) => {

    if (success && showAchievementBanners) {

    GameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);

    Debug.Log ("Authenticated "+Social.localUser.userName);

    }

    else {

    Debug.Log ("Failed to authenticate "+Social.localUser.userName);

    }

    }

    );

    #endif

    }

    static public void Achievement(string name,double score) {

    #if UNITY_IPHONE

    if (Social.localUser.authenticated) {

    Social.ReportProgress(name,score, (bool success) => {

    if (success) {

    Debug.Log("Achievement "+name+" reported successfully");

    }  else {

    Debug.Log("Failed to report achievement "+name);

    }

    } );

    }

    #endif

    }

    static public void Score(string name,long score) {

    #if UNITY_IPHONE

    if (Social.localUser.authenticated) {

    Social.ReportScore (score, name, (bool success) => {

    if (success) {

    Debug.Log("Posted "+score+" on leaderboard "+name);

    }  else {

    Debug.Log("Failed to post "+score+" on leaderboard "+name);

    }

    } );

    }

    #endif

    }

    }

    }

    Listing 15-5.

    C# Version of FuguGameCenter

    ```


    Finally, what you might miss about JavaScript the most is the ability to easily
    modify the `Vector3` values in a `transform`. Listing [15-6](#A310332_2_En_15_Chapter.html#Par29)
    shows a simple line of JavaScript that modifies just the `x` component of a transform’s
    position.


    ```

    function Start () {

    transform.position.x=0;

    }

    Listing 15-6.

    Modifying a Vector3 of a Transform in JavaScript

    ```


    That line of code will generate a compiler error in C# because `Vector3` is a
    struct, not a class, and thus a value type, not a reference type. The fact that
    it works in JavaScript is a convenience (albeit a misleading one, because it does
    make `Vector3` look like a class, not a struct).


    Because `Vector3` is a struct, you don’t have to worry about the garbage collector
    having to clean up a bunch of unused `Vector3` instances since, well, there are
    no instances. But it does mean in C# you have to create a new `Vector3` if you
    want to modify the transform’s position, as shown in Listing [15-7](#A310332_2_En_15_Chapter.html#Par32).


    ```

    void Start () {

    transform.position = new Vector3(0,transform.position.y,transform.position.z);

    }

    Listing 15-7.

    Valid Way to Modify a Transform in C#

    ```


    Notice how in C# you have to specify `new` before the `Vector3` constructor, whereas
    in JavaScript that is optional. That is a minor convenience of JavaScript (these
    types of conveniences are generally known as "syntactic sugar"), but C# has the
    advantage of allowing you to define your own structs, in a manner similar to how
    classes are defined. In JavaScript, you can use structs, but there’s no way to
    define new ones. Andrew Stellman and Jennifer Greene’s *Head First C#* (O’Reilly)
    is a good introduction to C#, but experienced programmers can get a quick start
    in C# with the *C# in a Nutshell* series (also published by O’Reilly). Java programmers
    in particular will find C# familiar (despite the name, C# has no relation to C
    or C++, unless you count distant ancestors).


    ### Script Execution Order


    Before leaving the topic of scripting, there’s one more issue worth mentioning:
    specifying the order of execution among scripts. If you look in the `SmoothFollow`
    script used to control the Main Camera in the bowling game, you’ll see the Camera
    position is updated not in an `Update` callback but in a `LateUpdate` callback.
    `LateUpdate` is called in every frame just like `Update`, but all `LateUpdate`
    calls in a frame take place after all `Update` calls have completed. `SmoothFollow`
    calculates the camera position in `LateUpdate`, so it takes into account any position
    change that has taken place in its target’s `Update` callback.


    Having both `Update` and `LateUpdate` callbacks is a common technique in game
    engines, but it can go only so far. What if you want a `GameObject` to update
    after another `GameObject`’s `LateUpdate`? Sorry, there’s no `LateLateUpdate`
    callback! But Unity does have a more general solution, the Script Execution Order
    settings, which can be brought up from the Project Settings submenu of the Edit
    menu (Figure [15-3](#A310332_2_En_15_Chapter.html#Fig3)).


    ![A310332_2_En_15_Fig3_HTML.jpg](Images/A310332_2_En_15_Fig3_HTML.jpg)


    **Figure 15-3.** Bringing up the Script Execution Order Settings


    The Script Execution Order settings can also be brought up by clicking the Execution
    Order button displayed in the Inspector view when a script is selected. Either
    way, the Script Execution Order settings show up in the Inspector view (Figure
    [15-4](#A310332_2_En_15_Chapter.html#Fig4)); you’ll see a list initially containing
    just one item, Default Time.


    ![A310332_2_En_15_Fig4_HTML.jpg](Images/A310332_2_En_15_Fig4_HTML.jpg)


    **Figure 15-4.** The Script Execution Order settings in the Inspector view


    To add some script that would execute after `FuguForce`, you would click the plus
    (+) sign at the lower right of the Script Execution Order settings and select
    the `FuguForce` script from the resulting menu. By default, the `FuguForce` script
    would appear in the Script Execution Order settings below the Default Time setting,
    meaning `FuguBowl` will run after all other scripts.


    Then you might decide that the game controller script, `FuguBowl`, should run
    after every other script (since it’s constantly checking the bowling position,
    for example) except for `SmoothFollow`. So again, you would click the + button
    to add the `FuguBowl` script and then drag `FuguBowl`, using the handle on the
    left, above `SmoothFollow` but below Default Time, resulting in a list, as shown
    in Figure [15-5](#A310332_2_En_15_Chapter.html#Fig5). Anything dragged above Default
    Time would execute before all the other scripts.


    ![A310332_2_En_15_Fig5_HTML.jpg](Images/A310332_2_En_15_Fig5_HTML.jpg)


    **Figure 15-5.** Specifying the execution order of `FuguBowl.js` and `SmoothFollow.js`


    Clicking the minus (-) button on the right of a script will remove the script
    from the Script Execution Order settings.


    ### Plug-ins


    Much mention has been made of third-party plug-ins, some available on the Asset
    Store and many from Prime31 Studios. But if you happen to be conversant in C,
    C++, or Objective-C, you can write your own plug-ins, either to access more device
    functionality or to make use of libraries written in C, C+, or Objective-C. Besides
    including the native library, plug-ins require additional Unity wrapper scripts.
    The process is documented on the "Plugins" page in the "Advanced" section of the
    Unity Manual.'
