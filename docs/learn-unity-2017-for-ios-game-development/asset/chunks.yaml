  trans: '

    ### 滑动球


    在 Fugu Bowl 中，你将采用我为 HyperBowl 设计的触摸屏控制方式。玩家通过沿屏幕向特定方向滑动，将球推向该方向。向上滑动屏幕会将球向前推，向下滑动则将球向后推，向左滑动会使球向左滚动，向右滑动则使其向右滚动。


    滑动控制方案与鼠标控制非常相似，因此你可以直接在现有的 `FuguForce` 脚本框架内进行修改。打开该脚本，并添加一些新的公共变量 `swipepowerx`
    和 `swipepowery`，以便像调整鼠标控制那样调整滑动力度（代码清单 13-1）。


    ```

    var swipepowerx:float = 0.1;

    var swipepowery:float = 0.1;

    代码清单 13-1.

    FuguForce.js 中滑动控制的调整变量

    ```


    你添加了新变量，而非重复使用 `mousepowerx` 和 `mousepowery`，这样可以在独立版本和 iOS 构建目标之间切换，而不会干扰各自平台的力度调整值。这两个属性都会显示在
    Inspector 视图中（图 13-1）。


    ![A310332_2_En_13_Fig1_HTML.jpg](img/A310332_2_En_13_Fig1_HTML.jpg)


    图 13-1. `FuguForce.js` 中针对桌面端和 iOS 的控制调整


    主要的改动在于 `CalcForce` 函数，该函数每帧会被 Update 回调调用一次。在 iOS 上，`CalcForce` 不会调用静态函数 `Input.GetAxis`
    来检测鼠标移动，而是调用静态函数 `Input.GetTouch` 来检测滑动。`UNITY_IPHONE` 预处理指令确保新代码仅存在于 iOS 平台，而旧代码则应用于其他所有平台（代码清单
    13-2）。


    ```

    function CalcForce() {

    var deltatime:float = Time.deltaTime;

    #if UNITY_IPHONE

    if (Input.touchCount > 0) {

    // 获取自上一帧以来手指的移动

    var touch:Touch = Input.GetTouch(0);

    if (touch.phase == TouchPhase.Moved) {

    var touchPositionDelta:Vector2 = touch.deltaPosition;

    forcey = swipepowery*touchPositionDelta.y/deltatime;

    forcex = swipepowerx*touchPositionDelta.x/deltatime;

    }

    }

    #else

    forcey = mousepowery*Input.GetAxis("Mouse Y")/deltatime;

    forcex = mousepowerx*Input.GetAxis("Mouse X")/deltatime;

    #endif

    }

    代码清单 13-2.

    在 FuguForce.js 中检测滑动

    ```


    与 `Input.GetAxis` 类似，`Input.GetTouch` 返回的是自上一帧以来注册的信息，因此你可以在 `CalcForce` 中调用它。该函数又从
    `Update` 中调用，从而保证每帧调用一次。


    `Input.GetTouch` 返回一个类型为 `Touch` 的结构体，该结构体描述了触摸事件：手指是按下、抬起还是移动，如果移动，则移动了多少像素。


    由于现在处理的是多点触摸屏，`Input.GetTouch` 有一个整数参数，用于指定应返回最新的哪个 `Input.Touch` 事件。触摸事件的数量可通过静态变量
    `Input.touchCount` 获取，因此你可以通过如下循环来处理所有触摸事件：


    ```

    for (var i:int=0; i < Input.touchCount; ++i) {

    var touch:Touch = Input.GetTouch(i);

    // 在这里处理你的逻辑

    }

    ```


    为了简化操作，这里你只关心一根手指，因此只需检查是否有至少一个 `Touch` 事件可用，如果有，则只检查第一个。


    ```

    if (Input.touchCount > 0) {

    var touch:Touch = Input.GetTouch(0);

    ```


    `Touch` 事件可以表示不同的手指动作：按下、释放或拖动。这可以通过检查 `Touch` 对象的 `phase` 属性来判断，该属性属于 `TouchPhase`
    枚举。你只关心表示手指在屏幕上拖动的 `Touch` 事件，因此检查触摸阶段是否为 `TouchPhase.Moved`。


    ```

    if (touch.phase == TouchPhase.Moved) {

    ```


    如果是，则计算推动保龄球的力。这与鼠标控制类似，但不再乘以 `Input.GetAxis`，而是乘以 `Touch` 事件的 `deltaPosition`
    属性，该属性表示手指拖动的像素数。


    ```

    var touchPositionDelta:Vector2 = touch.deltaPosition;

    forcey = powery*touchPositionDelta.y/deltatime;

    forcex = powerx*touchPositionDelta.x/deltatime;

    ```


    请注意，`deltaPosition` 属性是一个 `Vector2`，它与 `Vector3` 类似，但仅有 `x` 和 `y` 属性，没有 `z` 值。


    现在，如果你在编辑器中点击 Play 并使用 Unity Remote 进行测试，或者在设备上执行 Build and Run 操作，球就会朝着你滑动的方向滚动。


    包含触摸屏功能后的完整 `FuguBowlForce` 脚本可在本章对应项目的网站 `http://learnuninty4.com/` 上找到。

    '
- fmt: '```markdown

    ### Tap the Ball


    Although your bowling game doesn’t care where on the screen the swiping takes
    place, many games require the ability to detect whether a specific `GameObject`
    has been touched. On desktop and web platforms, mouse events over `GameObject`s
    with `Collider` components can be detected with callbacks such as `OnMouseDown`,
    `OnMouseUp`, and `OnMouseOver`. For example, the `OnMouseDown` callback in a script
    is invoked at the beginning of a mouse click that takes place over the script’s
    `GameObject` or, rather, the `GameObject`’s `Collider` component.


    **Note**


    The `OnMouse` callbacks also work on `GameObject`s with `GUIText` and `GUITexture`
    components. This was the closest thing to a built-in GUI system in Unity before
    `UnityGUI` was introduced.


    To demonstrate how the `OnMouse` callbacks work, create a new JavaScript named
    `FuguDebugOnMouse` and attach it to the `Ball` `GameObject` (Figure 13-2).


    ![A310332_2_En_13_Fig2_HTML.jpg](Images/A310332_2_En_13_Fig2_HTML.jpg)


    **Figure 13-2.** Ball with the `FuguDebugOnMouse` script attached


    Then add the contents of Listing 13-3 to the script.


    ```

    #pragma strict

    #if !UNITY_IPHONE

    function OnMouseDown () {

    #else

    function OnTap () {

    #endif

    Debug.Log("GameObject "+ gameObject.name + " was touched");

    }

    ```


    **Listing 13-3.** Detecting a Mouse Click in `FuguDebugMouse.js`


    The script contains an `OnMouseDown` callback that logs a message about the `GameObject`
    getting touched. When you run the game in the Editor and click the ball, the debug
    message appears in the Console view (Figure 13-3).


    ![A310332_2_En_13_Fig3_HTML.jpg](Images/A310332_2_En_13_Fig3_HTML.jpg)


    **Figure 13-3.** Debug message demonstrating the `OnMouseDown` callback


    Unity iOS invokes the `OnMouse` callbacks in response to touch events, except
    in the cases where there’s no obvious mapping. For example, what’s the touch equivalent
    of `OnMouseOver`, which is called when the mouse hovers over a `GameObject`? But
    it makes sense to call `OnMouseDown` when a `GameObject` is tapped (and `OnMouseUp`
    when the finger stops touching the screen). And this is what happens, as you can
    see if you run the game again in the Editor with the Unity Remote or if you perform
    a Build and Run operation on a device. In either case, tapping the ball will produce
    the same debug message you saw when clicking it.


    Although it’s convenient that the `OnMouse` callbacks work for touches, at least
    to this extent, it’s useful to know how to implement your own tap-object detection.
    It’s a straightforward combination of checking for a tap and then performing a
    raycast from the screen position into the 3D world along the camera direction.
    Raycasting is the process of finding the first object that a ray intersects (as
    you may recall from high-school math, a ray has a starting position and a direction,
    like an arrow).


    To demonstrate, let’s create a new JavaScript named `FuguTap`, attach it to the
    Main Camera (Figure 13-4), and add the contents of Listing 13-4 to the script.


    ![A310332_2_En_13_Fig4_HTML.jpg](Images/A310332_2_En_13_Fig4_HTML.jpg)


    **Figure 13-4.** Main Camera with the `FuguOnTap` script attached


    ```

    #pragma strict

    #if UNITY_IPHONE

    function Update () {

    for (var i = 0; i < Input.touchCount; ++i) {

    if (Input.GetTouch(i).phase == TouchPhase.Began) {

    var ray:Ray = camera.ScreenPointToRay (Input.GetTouch(i).position);

    var hit:RaycastHit;

    if (Physics.Raycast (ray,hit,camera.farClipPlane,camera.cullingMask)) {

    hit.collider.SendMessage("OnTap",SendMessageOptions.DontRequireReceiver);

    }

    }

    }

    }

    #endif

    ```


    **Listing 13-4.** A Script Mimicking `OnMouseDown` Events


    The entire script consists of an `Update` callback that loops through all the
    touch events registered in the past frame. But in this case, only the beginning
    of a tap is of interest, so only touches that are in the phase `TouchPhase.Began`
    are considered. The screen coordinates of each such touch is extracted and passed
    to the camera function `ScreenPointToRay` to form a ray that originates at the
    screen position and projects along the camera direction into the 3D world.


    The ray is passed in as the first argument to the static function `Physics.Raycast`
    to see whether the ray intersects a `Collider` component of any `GameObject`.
    Information about the first intersection, if any, is returned in the `RayCastHit`
    struct that is passed in as the second argument. The third argument is the raycast
    distance, and the fourth argument is the set of layers that will be tested for
    intersection. You restrict the possible raycast results by supplying the camera’s
    far plane distance as the raycast distance and the camera’s culling mask (set
    of visible layers) as the set of layers to test for intersection.


    If the call to `Physics.Raycast` returns `true`, meaning there’s been an intersection,
    then you retrieve the intersecting `Collider` component and call `SendMessage`
    on it to invoke `OnTap` callbacks in attached scripts (calling `SendMessage` on
    a component is equivalent to calling `SendMessage` on the component’s `GameObject`).


    Notice that the call to `SendMessage` includes an optional second argument, `SendMessageOptions.DontRequireReceiver`.
    Without that argument, Unity will report an error if the message is sent to a
    `GameObject` that doesn’t have any matching functions, or, in this case, any `OnTap`
    functions.


    The entire `Update` callback is wrapped in a `UNITY_IPHONE` ifdef, because it’s
    only intended for iOS touchscreen input. Likewise, you can now use `UNITY_IPHONE`
    to rename the `OnMouseDown` callback to `OnTap` so it will be called by the `FuguOnTap`
    script (Listing 13-5).


    ```

    #pragma strict

    if !UNITY_IPHONE

    function OnMouseDown () {

    #else

    function OnTap () {

    #endif

    Debug.Log("GameObject "+ gameObject.name + " was touched");

    }

    ```


    **Listing 13-5.** `FuguDebugOnMouse` Script with an Alternate Callback Name for
    iOS


    Now if you run the game again and tap the ball, you’ll still see the debug message,
    but it will result from the `OnTap` messages sent from `FuguOnTap`.


    ## The Accelerometer


    Every iOS device has an accelerometer that measures acceleration in three different
    directions. The three values can be examined in the static variable `Input.accelerometer`,
    which is a `Vector3`.


    The `x` value corresponds to acceleration that runs left to right along the face
    of the device. The `y` value represents the acceleration running from top to bottom
    along the face of the device, and the `z` value is the acceleration from the front
    to the back of the device. Starting with Unity 4, the accelerometer values are
    adjusted for the device orientation, so if you’re holding the device in landscape
    mode, the accelerometer `x` values still run from left to right.

    ```'
