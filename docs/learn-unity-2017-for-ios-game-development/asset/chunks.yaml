    ```


    The total score for this frame is set to the sum of the first and second balls,
    except in the case of a spare or strike, in which case one or two future rolls,
    respectively, have to take place before the total can be resolved.


    Given that this is the second roll of the frame and a spare only adds the first
    roll of the next frame to its score, there’s no way this roll can contribute to
    a spare score from the previous frame. However, if the previous frame had a strike,
    calling SetStrikeScore, that frame is warranted what that frame since it’s been
    waiting for the first and second rolls of this frame to complete its total.


    The function SetBall3Score (Listing [8-7](#A310332_2_En_8_Chapter.html#Par37))
    is a special case because a third roll can occur only in the tenth frame, and
    even then only if there was a strike with the first or second ball or a spare
    with the first two balls. When SetBall3Score is called, the function sets the
    ball3 variable with the number of pins down if ball2 was a strike or completed
    a spare, which are the two cases where the pins get reset before the third ball.
    Otherwise, there must have been a strike in the first frame and something other
    than a strike in the second, so ball3 is set to the number of pins down minus
    the pins knocked down by the second ball.


    ```

    function SetBall3Score(frame:int,pinsDown:int) {

    var framescore:FuguBowlScore = scores[frame];

    if (IsStrike(frame) && framescore.ball2 <10) {

    framescore.ball3 = pinsDown - framescore.ball2;

    } else {

    framescore.ball3 = pinsDown; // spare or two strikes

    }

    framescore.total = framescore.ball1+framescore.ball2+framescore.ball3;

    }

    Listing 8-7.

    The SetBall3Score Function in the FuguBowlPlayer Class

    ```


    ### Getting the Score


    Although implementation of a user interface will take place in the next chapter,
    you should make sure the FuguBowlPlayer class supports a score display. A typical
    bowling scoreboard, in real life or in a computer game, displays the score for
    each roll in each frame, which matches perfectly with the ball1, ball2, and ball3
    variables in the FuguBowlScore class. Furthermore, a bowling scoreboard typically
    has special markings to indicate a spare or strike in each frame, which the IsSpare
    and IsStrike functions in the FuguBowlPlayer class can accommodate.


    However, while FuguBowlScore has a total variable that represents the total score
    for the frame, a bowling scoreboard usually shows the game total score for that
    frame, i.e., the total cumulative score up to and including that frame. For example,
    Figure [8-2](#A310332_2_En_8_Chapter.html#Fig2) shows how the scoreboard in HyperBowl
    looks after bowling two frames.


    ![A310332_2_En_8_Fig2_HTML.jpg](Images/A310332_2_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    The HyperBowl scoreboard


    The first frame displays the scores for the first and second rolls and the resulting
    total. The second frame displays the score for its first roll and the mark for
    a spare on the second roll. The game total score displayed in the second frame
    is the game total score from the first frame plus the additional frame total score
    from the second frame.


    This example provides a clue on how to implement a function that returns the game
    total score for a frame. Listing [8-8](#A310332_2_En_8_Chapter.html#Par42) shows
    the code for such a function, GetScore, added to the FuguBowlPlayer class. If
    the specified frame is the first frame of the game, GetScore returns the frame
    total score. If the frame total score is -1, meaning not yet available, then GetScore
    returns -1 to indicate the game total score is not yet available for that frame.


    ```

    function GetScore(frame:int):int {

    if (frame==0 || scores[frame].total==-1) {

    return scores[frame].total;

    } else {

    var prev:int = GetScore(frame-1);

    if (prev==-1) {

    return -1;

    } else {

    return scores[frame].total+prev;

    }

    }

    }

    Listing 8-8.

    The GetScore Function in the FuguBowlPlayer Class

    ```


    But if the frame total is available and the frame is not the first frame, then
    the frame total is added to the game total from the previous frame, unless that
    game total is not yet available. If the game total is not available from the previous
    frame, then, again, -1 is returned.


    The game total from the previous frame is acquired by calling GetScore on that
    frame, which in turn will call GetScore on the frame before it, until the first
    frame is reached. GetScore is an example of a recursive function , which is a
    function that calls itself. Infinite recursion is avoided because eventually GetScore
    arrives at its base case, the first frame, which will always return.


    ### The Complete Listing


    The complete listing for the FuguBowlScore script is too unwieldy to show here
    (it spans four pages), but all of its contents have been shown in this section.
    The entire script, `FuguBowlScore.js`, is available in the project for this chapter
    at [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739) .


    If you want to replace a script with the version from [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    , perform the replacement in the Finder (i.e., drag or paste the file into the
    Scripts folder of this project). Normally, the ability to just drag a file from
    the Finder into the Project view is really convenient, but in this case Unity
    will rename the new file to avoid clobbering the original.


    Don’t rename the original script yourself if your intent is to replace it since
    any references in the scene will still refer to that script under the new name.
    Rather, duplicate the original script (either in the Finder or using Duplicate
    from the Edit menu in the Unity Editor) if you want to keep a copy.'
  trans: '

    `SetBall2Score`函数（见代码清单 8-6）更为复杂，因为它需要处理更多情况。由于传入该函数的第二个参数是当前帧中已击倒的球瓶数，因此`ball2`变量被设定为（击倒的总瓶数）减去（第一球已击倒的瓶数），但有一个特殊情况——第一球为全中时除外。


    通常，如果第一球是全中，则跳过第二球，甚至不会调用`SetBall2Score`。但如果第十局的第一轮是全中，那么第二球就会获得投掷机会，此时`ball2`被设定为击倒的总瓶数，因为第一轮全中后球瓶已被重置。


    ```

    function SetBall2Score(frame:int,pinsDown:int) {

    var framescore:FuguBowlScore = scores[frame];

    if (IsStrike(frame)) { // 此时必定在最后一局

    framescore.ball2=pinsDown;

    } else {

    framescore.ball2=pinsDown-framescore.ball1;

    }

    // 如果不是补中或全中，则计算本局总分

    if (!IsSpare(frame) && !IsStrike(frame)) {

    framescore.total= pinsDown;

    }

    // 如果前一局是全中，则设定该局得分

    if (frame>0 && IsStrike(frame-1)) {

    SetStrikeScore(frame-1);

    }

    }

    ```


    代码清单 8-6. `FuguBowlPlayer`类中的`SetBall2Score`函数


    本局总分设为第一球与第二球得分之和，但补中或全中的情况除外——在这两种情况下，需要分别等待后续一轮或两轮投掷才能确定总分。


    鉴于这是本局的第二球，且补中仅会将下一局的第一球得分累加进来，因此这一球不可能对前一局的补中得分产生贡献。然而，如果前一局是全中，则应当调用前一局的`SetStrikeScore`，因为它一直在等待本局的第一球和第二球以完成其总分。


    `SetBall3Score`函数（见代码清单 8-7）是一个特殊情况，因为第三球只能在第十局中出现，且仅在以下情况中发生：第一球或第二球为全中，或者前两球完成了补中。当调用`SetBall3Score`时，如果第二球是全中或完成了补中（这两种情况下球瓶会在第三球前重置），则该函数将`ball3`变量设定为击倒的瓶数。否则，必然是第一球为全中而第二球并非全中，因此`ball3`被设定为（击倒总瓶数）减去（第二球击倒的瓶数）。


    ```

    function SetBall3Score(frame:int,pinsDown:int) {

    var framescore:FuguBowlScore = scores[frame];

    if (IsStrike(frame) && framescore.ball2 <10) {

    framescore.ball3 = pinsDown - framescore.ball2;

    } else {

    framescore.ball3 = pinsDown; // 补中或两次全中

    }

    framescore.total = framescore.ball1+framescore.ball2+framescore.ball3;

    }

    ```


    代码清单 8-7. `FuguBowlPlayer`类中的`SetBall3Score`函数


    ### 获取得分


    虽然用户界面的实现将在下一章进行，但你需要确保`FuguBowlPlayer`类支持得分显示。在现实或电脑游戏的典型保龄球记分牌中，每个局的每一轮投掷得分都会显示出来，这与`FuguBowlScore`类中的`ball1`、`ball2`和`ball3`变量完美匹配。此外，保龄球记分牌通常会有特殊标记来表示每一局中的补中或全中，`FuguBowlPlayer`类中的`IsSpare`和`IsStrike`函数可以满足这一需求。


    不过，尽管`FuguBowlScore`有一个表示本局总分的`total`变量，但保龄球记分牌通常显示的是该局的游戏总得分，即截止到该局（含该局）的累计总分。例如，图
    8-2 展示了 HyperBowl 中投完两局后的记分牌样式。


    ![A310332_2_En_8_Fig2_HTML.jpg](img/A310332_2_En_8_Fig2_HTML.jpg)


    图 8-2. HyperBowl 记分牌


    第一局显示了第一球和第二球的得分以及最终的局总分。第二局显示了其第一球得分以及第二球补中的标记。第二局中显示的游戏总得分是第一局的游戏总得分加上第二局的额外局总分。


    这个例子为实现一个返回某局游戏总得分的函数提供了思路。代码清单 8-8 展示了这样一个函数——`GetScore`，将其添加到`FuguBowlPlayer`类中。如果指定的局是第一局，则`GetScore`返回该局总分。如果该局总分为`-1`（表示尚未可用），则`GetScore`返回`-1`，表示该局的游戏总得分尚不可用。


    ```

    function GetScore(frame:int):int {

    if (frame==0 || scores[frame].total==-1) {

    return scores[frame].total;

    } else {

    var prev:int = GetScore(frame-1);

    if (prev==-1) {

    return -1;

    } else {

    return scores[frame].total+prev;

    }

    }

    }

    ```


    代码清单 8-8. `FuguBowlPlayer`类中的`GetScore`函数


    但如果局总分可用且该局不是第一局，则将该局总分加到前一局的游戏总得分上，除非前一局的游戏总得分尚不可用。如果前一局的游戏总得分不可用，则同样返回`-1`。


    前一局的游戏总得分通过对该局调用`GetScore`获得，而该函数会继续对其前一局调用`GetScore`，如此直到第一局。`GetScore`是一个递归函数的例子，即调用自身的函数。无限递归被避免，因为最终`GetScore`会到达其基础情况——第一局，该局总会返回结果。


    ### 完整代码清单


    `FuguBowlScore`脚本的完整代码清单过于冗长，在此无法展示（长达四页），但其所有内容均已在本书中呈现。完整的脚本`FuguBowlScore.js`可在本章的项目文件中获得，下载地址为[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)。


    如果你想用来自[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)的版本替换某个脚本，请在
    Finder 中进行替换（即将该文件拖放或粘贴到该项目的 Scripts 文件夹中）。通常，只需从 Finder 将文件拖入 Project 视图这一功能非常方便，但在此情况下，Unity
    会重命名新文件以避免覆盖原文件。


    如果你的目的是替换脚本，请勿自行重命名原脚本，因为场景中的任何引用仍会指向该脚本的新名称。相反，如果你想保留副本，请复制原脚本（可以在 Finder 中复制，或使用
    Unity Editor 中 Edit 菜单的 Duplicate 选项）。'
- fmt: '### Creating a FuguBowlPlayer


    The `FuguBowlPlayer` class is now all set and ready to use. Since the script is
    not attached to a `GameObject` (and can’t be, since `FuguBowlPlayer` is not a
    `MonoBehaviour`), a `FuguBowlPlayer` has to be instantiated at runtime. The natural
    place to do this is in the `FuguBowl` script’s `Awake` callback, which is already
    instantiating the bowling pins (Listing [8-9](#A310332_2_En_8_Chapter.html#Par49)).


    ```

    static var player:FuguBowlPlayer = null;

    function Awake() {

    player = new FuguBowlPlayer();

    CreatePins();

    }

    Listing 8-9.

    Creating a FuguBowlPlayer in FuguBowl.js

    ```


    The augmented `Awake` callback creates a new `FuguBowlPlayer` instance and assigns
    it to the variable `player`, which is declared a static variable for easy access
    from outside the `FuguBowl` script (looking ahead to the scoreboard implementation
    in the next chapter).


    To support multiple players, the variable `player` might instead be an array of
    `FuguBowlPlayers` (a resizable array instead of a built-in array to accommodate
    different numbers of players), and there might be some encapsulating functions
    like `GetPlayer` and `GetNumberOfPlayers`. But for the purposes of this book,
    we’ll keep things simple and focus on a single-player game.


    ## The Pin Status


    The `FuguBowl` script now has a reference to `FuguBowlPlayer` in addition to the
    bowling pins and ball. But to call the `FuguBowlPlayer` score functions, `FuguBowl`
    must pass in the number of pins that have been knocked down. Rather than adding
    code to `FuguBowl` to figure out whether a pin is down, it’s cleaner to write
    that code in a script attached to each pin. Then `FuguBowl` can just ask each
    pin if it’s down and doesn’t have to know about the inner workings of the pins.


    For this new pin script, create a new JavaScript, name it `FuguPinStatus`, and
    place it in the Scripts folder (Figure [8-3](#A310332_2_En_8_Chapter.html#Fig3)).


    ![A310332_2_En_8_Fig3_HTML.jpg](Images/A310332_2_En_8_Fig3_HTML.jpg)


    Figure 8-3.


    Create a FuguPinStatus.js script .


    Next, add the contents of Listing [8-10](#A310332_2_En_8_Chapter.html#Par55) to
    the script.


    ```

    #pragma strict

    var knockedAngle:float = 45.0;

    private var initialAngles:Vector3;

    function Start () {

    initialAngles = transform.localEulerAngles;

    }

    function IsKnockedOver() {

    return Mathf.Abs(transform.localEulerAngles.x-initialAngles.x)>knockedAngle ||

    Mathf.Abs(transform.localEulerAngles.y-initialAngles.y)>knockedAngle ||

    Mathf.Abs(transform.localEulerAngles.z-initialAngles.z)>knockedAngle;

    }

    Listing 8-10.

    Listing for FuguPinStatus.js

    ```


    The `Awake` callback in the script saves the `GameObject`’s initial rotation in
    the private variable `initialAngles` for comparison later. The function `IsKnockedOver`
    returns `true` or `false` depending on whether the pin’s rotation around any axis
    has changed by more than the number of degrees specified in the `knockedAngle`
    variable.


    In the Project view, select the `Barrel` GameObject in the `BarrelPin` prefab
    and use the Add Component button in the Inspector view to attach the `FuguPinStatus`
    script (Figure [8-4](#A310332_2_En_8_Chapter.html#Fig4)).


    ![A310332_2_En_8_Fig4_HTML.jpg](Images/A310332_2_En_8_Fig4_HTML.jpg)


    Figure 8-4.


    The FuguPinStatus.js script attached to the Barrel pin prefab


    Before querying each pin to see whether it’s been knocked over, the `FuguBowl`
    script needs to find the pins. Querying each `GameObject` in the variable `pins`
    would work if the `Array` is filled with the capsule-based `Pin` prefab, but when
    the array is full of `BarrelPin` GameObjects, the `Barrel` GameObjects that act
    as the real pins are children of those `BarrelPin` GameObjects.


    Fortunately, in Chapter [7](../Text/A310332_2_En_7_Chapter.html) you tagged all
    the “real” pins (the GameObjects with `Rigidbody` and `Mesh` components that actually
    move) with the tag `Pin`. This makes it possible to retrieve an array of all the
    real pins using the static function `GameObject.FindGameObjectsWithTag`. That
    should take place at the end of the `CreatePins` function in the `FuguBowl` script,
    after all the pins have been instantiated (Listing [8-11](#A310332_2_En_8_Chapter.html#Par60)).
    The tagged pins are assigned to a private variable called `pinBodies`.


    ```

    private var pinBodies:GameObject[]; // the real physical pins

    function CreatePins() {

    pins = new Array();

    var offset = Vector3.zero;

    for (var row=0; row<pinRows; ++row) {

    offset.z+=pinDistance;

    offset.x=-pinDistance*row/2;

    for (var n=0; n<=row; ++n) {

    pins.push(Instantiate(pin, pinPos+offset, Quaternion.identity));

    offset.x+=pinDistance;

    }

    }

    pinBodies = GameObject.FindGameObjectsWithTag("Pin");

    }

    Listing 8-11.

    Declaring and Setting the pinBodies Variable in FuguBowl.js

    ```


    The number of pins that have been knocked down are counted by the function `GetPinsDown`
    (Listing [8-12](#A310332_2_En_8_Chapter.html#Par62)) that loops through the `pinObjects`
    array, incrementing a local variable `pinsDown` for each pin whose `IsKnockedOver`
    function returns `true`. After the loop is complete, the value of the `pinsDown`
    counter is returned.


    ```

    function GetPinsDown():int {

    var pinsDown:int = 0;

    for (var pin:GameObject in pinBodies) {

    if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {

    ++pinsDown;

    }

    }

    return pinsDown;

    }

    Listing 8-12.

    The GetPinsDown Function in FuguBowl.js

    ```


    Besides counting pins that have been knocked down, you can remove them, like the
    way real pins get scraped away after getting knocked down in a real bowling alley.
    The function `RemoveDownedPins` (Listing [8-13](#A310332_2_En_8_Chapter.html#Par64))
    loops through the `pinBodies` list and calls `SetActive(false)` on each one that
    returns `true` for `IsKnockedDown`. Calling `SetActive(false)` is equivalent to
    deselecting the check box on the top left of a `GameObject` in the Inspector view.
    Each pin that is knocked down, while not getting completely removed from the scene,
    is made invisible and does not collide.


    ```

    function RemoveDownedPins() {

    for (var pin:GameObject in pinBodies) {

    if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {

    pin.SetActive(false);

    }

    }

    }

    Listing 8-13.

    The RemovePins Function in FuguBowl.js

    ```


    Of course, deactivated pins need to be reactivated at some point. The existing
    `ResetPins` function (Listing [8-14](#A310332_2_En_8_Chapter.html#Par66)) is a
    good place to do that since `ResetPins` is called when restoring the pins to their
    original positions in preparation for bowling a new frame.


    ```

    function ResetPins() {

    for (var pin:GameObject in pinBodies) {

    pin.SetActive(true);

    pin.SendMessage("ResetPosition");

    }

    }

    Listing 8-14.

    ResetPins Function in FuguBowl.js

    ```


    In fact, now the loop through the `pins` array can be replaced with a loop through
    `pinBodies`. Within the loop, `SetActive(true)` is called on each pin in case
    it was deactivated, and `SendMessage` can replace `BroadcastMessage` because each
    pin in `pinBodies` is known to have the `FuguReset` script attached.


    ## The Game Logic


    I highly recommend sketching out a game as a finite state machine before attempting
    to code the game logic. A finite state machine represents a program as, surprise,
    a finite set of states. An FSM is in one state at any time and transitions from
    state to state.


    Note


    The term state machine often refers to an FSM, but technically there is a whole
    range of state machines ranging from the FSM, the simplest and least-powerful
    class of automata, up to the Turing machine, which has infinite memory and a potentially
    infinite number of states.


    Once you have your game visualized as an FSM, you can be confident that you can
    code it. Conversely, if you can’t visualize your game flow as an FSM, you probably
    just have a vague idea that you’re not yet ready to implement it!'
