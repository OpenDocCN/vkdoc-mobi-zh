- fmt: '### Make a New `PhysicMaterial`


    Before creating new `PhysicMaterial`s, for organizational purposes, you should
    create a folder to contain them. Select the top-level `Assets` folder in the left
    panel of the Project view. Then using the Create menu in the Project view, create
    a new folder and name it `Physics` (it’s shorter and less oddly spelled than `PhysicMaterials`).


    You can make a new `PhysicMaterial` using the Create menu in the Project view
    and then fill in all the properties of the new `PhysicMaterial` in the Inspector
    view. But you can save yourself some work by copying a `PhysicMaterial` from Standard
    Assets, preferably one that is already close to what you want. Given that the
    floor has a wood material, it’s convenient to start with the Wood `PhysicMaterial`
    in Standard Assets. Make a copy of the Wood `PhysicMaterial` by selecting it in
    the Project view and invoking Duplicate from the Edit menu (or Command+D for the
    keyboard shortcut).


    Drag the copy of the Wood `PhysicMaterial` to your new `Physics` folder in the
    Project view and rename it `Floor`, since you’ll apply it to your GameObject named
    Floor. Then duplicate the Floor `PhysicMaterial` and name the new one `Ball` (Figure
    [6-24](#A310332_2_En_6_Chapter.html#Fig24)) since you’ll apply that one to your
    GameObject named Ball.


    ![A310332_2_En_6_Fig24_HTML.jpg](Images/A310332_2_En_6_Fig24_HTML.jpg)


    Figure 6-24. Custom `PhysicMaterial`s


    Now there’s a `PhysicMaterial` for the floor and one for the ball. To use these
    `PhysicMaterial`s on their intended GameObjects, drag the Floor `PhysicMaterial`
    onto the Floor GameObject in the Hierarchy view and drag the Ball `PhysicMaterial`
    onto the Ball GameObject. (You may want to check the two GameObjects in the Inspector
    view to verify the `PhysicMaterial`s are showing up in the Collider component’s
    Material fields.) Now you’re ready to start tweaking the `PhysicMaterial` properties.


    As you would expect, the Wood `PhysicMaterial` already has values reasonable for
    a wood floor, so you can leave it alone. But you want to tweak the Ball `PhysicMaterial`,
    so select the Ball `PhysicMaterial` and set its values as shown in Figure [6-25](#A310332_2_En_6_Chapter.html#Fig25).


    ![A310332_2_En_6_Fig25_HTML.jpg](Images/A310332_2_En_6_Fig25_HTML.jpg)


    Figure 6-25. Adjusted values for the Ball `PhysicMaterial`


    The ball shouldn’t bounce on the floor (or off the bowling pins when you add them
    later), so set the `Bounciness` value to `0` and `Bounce Combine` to `Minimum`,
    which will ensure that the ball never bounces at all no matter what it collides
    with. Then set the `Dynamic` and `Static Friction` values to `1` and `Friction
    Combine` to `Maximum`, so the ball always has maximum friction whether it’s at
    rest or rolling. The maximum friction values ensure the ball rolls instead of
    slides.


    Now when you click Play, the ball should just drop on the floor and come to rest
    without bouncing.


    ## Make It Roll


    To get the ball rolling, you’ll need to add some controls to the game (for it
    to be even a game, in fact). The original arcade version of HyperBowl was controlled
    by a real bowling ball that acted as a large trackball. Spinning that ball would
    impart a spin on the ball in the game (resulting in comical body movement while
    trying to bowl up the hills of San Francisco).


    Of course, building an air-supported bowling ball peripheral is outside the scope
    of this book, but the PC version of HyperBowl provided a mouse-based version of
    this control, in which pushing the mouse would impart a spin on the ball in that
    direction. This control is fairly straightforward to implement with just a single
    script.


    ### Create the Script


    Select the `Scripts` folder in the Project view, create a new JavaScript script
    using the Create button on the top left of the Project view, and name the new
    script `FuguForce` since you’ll be using it to apply a force to the ball. (I’m
    tempted to call it `FuguRoll` for the sushi connotation, but I don’t want the
    name to imply that you’re applying a torque, a rotational rather than a linear
    force.) Then drag the `FuguForce` script onto the ball in the Hierarchy view so
    you’ll be ready to test it as soon as you add some code to the script.'
