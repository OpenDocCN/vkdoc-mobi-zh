  trans: '

    ### 更新：收集输入


    试图通过计算旋转和平移（位置变化）来模拟球的滚动会非常复杂，这涉及到与地板和球瓶的碰撞检测与响应，还要考虑重力、摩擦力和反弹……这些都是物理引擎已经完成的计算。因此，不把这个任务交给
    Unity 物理系统来管理，那可真是一种浪费。


    由于球体已经添加了 `Rigidbody` 组件，它已经是一个受重力等力影响、并能响应（包括与地板）碰撞的物理对象。所以，要让球滚动，只需要给它一个推力。推力的大小取决于输入，在本设计方案中，输入就是鼠标的移动。请注意，非
    Unity 版本的原始《HyperBowl》游戏是向保龄球施加扭矩（旋转力）使其旋转的。Unity 确实有一个可以向 `Rigidbody` 组件施加扭矩的脚本函数，叫做
    `Rigidbody.AddTorque`，但我发现在 Unity 中，通过 `Rigidbody.AddForce` 施加线性力来推动球滚动，效果更好。


    每帧都可以检测鼠标移动（以及一般的输入），因此收集输入的代码和对应推力的计算应该放在脚本的 `Update` 回调函数中，如清单 6-1 所示。将清单中的代码复制到
    `FuguForce` 脚本中。


    ```csharp

    #pragma strict

    var mousepowerx:float = 1.0;

    var mousepowery:float = 1.0;

    private var forcex:float=0.0;

    private var forcey:float=0.0;

    function Update() {

    forcex = mousepowerx*Input.GetAxis("Mouse X")/Time.deltaTime;

    forcey = mousepowery*Input.GetAxis("Mouse Y")/Time.deltaTime;

    }

    ```


    脚本以变量 `mousepowerx` 和 `mousepowery` 开头，用于缩放施加给球的力。`mousepowerx` 影响左右移动鼠标产生的力，而
    `mousepowery` 影响前后移动鼠标产生的力。这些变量是公开的，因此可以在 `Inspector` 视图中进行调整。


    最终计算出的力存储在私有变量 `forcex` 和 `forcey` 中，它们也分别对应鼠标的左右和前后移动。


    **提示**


    在变量声明时，始终指定一个初始值是个好主意。这能让代码的含义更清晰，并避免因为对初始值的错误假设而导致错误（C 和 C++ 程序员尤其知道要警惕未初始化变量引发的莫名
    bug）。


    `Update` 回调函数正是根据 `mousepowerx`、`mousepowery` 和鼠标移动来计算 `forcex` 和 `forcey` 的地方。在
    Unity 中，使用 `Input` 类来查询输入。例如，可以通过检查静态变量 `Input.mousePosition` 来获取鼠标位置，因此可以通过在每次
    `Update` 调用时保存鼠标位置，并将当前位置与上一帧保存的位置进行比较，来确定鼠标的移动。


    但更高级的 `Input.GetAxis` 函数已经完成了这项工作。`Input.GetAxis` 根据传递给函数的参数，返回一个介于 -1 到 1 之间的值，用于表示鼠标、摇杆或键盘的左右或前后移动。


    在 `Update` 回调函数中，调用 `Input.GetAxis("Mouse X")` 获取鼠标的左右移动，调用 `Input.GetAxis("Mouse
    Y")` 获取上一帧发生的前后移动。在考虑了该帧经过的时间（我们的老朋友 `Time.deltaTime`）并乘以缩放因子 `mousepowerx` 和
    `mousepowery` 之后，结果分别赋值给变量 `forcex` 和 `forcey`。


    将这段代码放入 `FuguForce` 脚本后，你就可以在球的 `Inspector` 视图中看到公开的 `mousepower` 变量了（图 6-26）。


    ![A310332_2_En_6_Fig26_HTML.jpg](img/A310332_2_En_6_Fig26_HTML.jpg)


    当你点击“播放”时，你仍然无法控制球，因为你还没有添加实际的推球代码。不过，如果你在 `Inspector` 视图菜单中选择“调试”选项，私有的 `forcex`
    和 `forcey` 变量就会显示出来，你可以看到它们在鼠标移动时发生变化。


    ### FixedUpdate：使用力


    影响物理效果的函数（包括 `Rigidbody.AddForce`）应该放在 `FixedUpdate` 回调函数中调用。与 `Update` 回调函数（每帧调用一次，耗时不确定）不同，`FixedUpdate`
    回调函数在每个固定的时间步长结束后被调用。为了获得良好效果，物理模拟需要以固定的时间间隔运行，通常频率比 `Update` 更高。物理计算时间间隔的变化可能导致行为不一致以及物理更新之间的长时间延迟。在
    Unity 中，这个时间步长是在 `TimeManager`（图 6-27）中设置的，可以通过 `编辑` 菜单的 `项目设置` 子菜单访问。


    ![A310332_2_En_6_Fig27_HTML.jpg](img/A310332_2_En_6_Fig27_HTML.jpg)


    `FixedUpdate` 回调函数正是在这些物理更新间隔中被调用的（我个人将 `FixedUpdate` 视为 `PhysicsUpdate`，将 `Fixed
    Timestep` 视为 `PhysicsTimestep`），因此，所有对物理模拟的更改都应在此进行，尤其是对 `Rigidbody` 执行的操作。


    由于推动球的力已经在 `Update` 回调函数中计算好了，`FixedUpdate` 回调函数只需在调用球体 `Rigidbody` 组件的 `Rigidbody.AddForce`
    方法时应用这些值即可（清单 6-2）。


    ```csharp

    function FixedUpdate() {

    rigidbody.AddForce(forcex,0,forcey);

    }

    ```


    在变量 `rigidbody` 上调用了 `Rigidbody` 的函数 `AddForce`。`rigidbody` 是一个 `Component` 变量，它始终引用此
    `GameObject` 上的 `Rigidbody` 组件。`GameObject` 类也有一个 `rigidbody` 变量，因此使用 `gameObject.rigidbody`
    的引用也是等价的。


    传递给 `Rigidbody.AddForce` 的三个值分别是力的 x、y 和 z 分量，因为力具有方向和大小，所以它是一个向量。力的方向是世界空间中的方向。从本游戏中
    `Main Camera` 的视角来看，x 轴代表左右方向，z 轴代表前后方向。因此，将 `forcex` 作为 x 参数传入，`forcey` 作为 z
    参数传入。控制指令不会上下推动球，只会前后和侧向推动，所以 y 参数传入 0。


    **注意**


    请务必查看 `Rigidbody.AddForce` 的脚本参考页面。它是一个重载函数，有一种重载形式将力作为 `Vector3` 接收，而不是三个独立的数值。此外，两种重载形式都接受一个可选参数，该参数可以指定应用于
    `Rigidbody` 的值不是力，而是其他物理量，例如加速度、冲量或瞬时速度变化。


    现在，当你点击“播放”并移动鼠标时，球就会朝那个方向滚动了。试着在 `Inspector` 视图中更改 `mousepowerx` 和 `mousepowery`
    的值，以获得你想要的滚动响应效果。

