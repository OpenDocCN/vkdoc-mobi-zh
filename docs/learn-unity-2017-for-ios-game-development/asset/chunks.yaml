  trans: '

    # 隐藏方块


    这个场景的主角是跳舞的骷髅，因此可以省略前两章中重点介绍的方块。不必从场景中删除方块（选中它们后，通过`Edit`菜单调用`Delete`或使用`Command+Delete`快捷键），可以通过停用它们使其不可见、眼不见心不烦。在`Hierarchy`视图中选中父级方块，并取消勾选`Inspector`视图左上角的复选框，此时`Hierarchy`视图中的整个方块树将变灰，表示它们已处于非活动状态（图
    5-5）。


    ![A310332_2_En_5_Fig5_HTML.jpg](img/A310332_2_En_5_Fig5_HTML.jpg)


    图 5-5. 场景中骷髅处于活动状态，方块已停用


    所有子级方块实际上都处于非活动状态，因为父级的活动状态会覆盖子级。换句话说，一个`GameObject`只有在自身标记为活动状态，并且其父级也标记为活动状态、父级的父级同样标记为活动状态……以此类推时，才算是真正激活。任何非活动的`GameObject`，其组件都会被有效禁用。它的`Renderer`不再渲染，`Collider`不再碰撞，附加的脚本也不会触发回调，`OnEnable`和`OnDisable`除外。


    # 让骷髅旋转


    当你将骷髅插入`Hierarchy`视图时，Unity 会将该资源放置在原点（`0,0,0`）。但是，你可能还记得你将方块、摄像机和灯光都放置在了远离这个点的位置。因此，需要将骷髅移近摄像机。你可以使用`Transform`工具移动骷髅，或者直接在`Inspector`中输入位置坐标。`Transform`组件中的`Position`值（即坐标）分别为`X`、`Y`、`Z`对应的
    (`0,0,-10`)（图 5-6）。


    ![A310332_2_En_5_Fig6_HTML.jpg](img/A310332_2_En_5_Fig6_HTML.jpg)


    图 5-6. 骷髅位置的 Transform 值


    在第 2 章中，你创建了`FuguRotate`脚本来让物体绕其 x 轴旋转。在第 2 章中，你将此脚本挂载到了`Cube`这个`GameObject`上。现在你可以将这个脚本应用到任何游戏对象上。在`Project`视图中，从`Scripts`文件夹中选中`FuguRotate`脚本，然后将其拖拽到`Hierarchy`视图中的摄像机上。


    现在点击`Play`，当你移动鼠标时，`Main Camera`就会绕着骷髅旋转（图 5-7）。额外的好处是，由于骷髅预制体包含粒子效果，骷髅看起来就像是站在闪闪发光的薄雾中。


    ![A310332_2_En_5_Fig7_HTML.jpg](img/A310332_2_En_5_Fig7_HTML.jpg)


    图 5-7. 空闲状态骷髅的游戏视图


    # 让骷髅跳舞


    目前，骷髅只是稍微来回移动而非跳舞。如果你选中`skeletonNormal`资源，并在`Inspector`视图中检查它，可以看到该`GameObject`有一个`Animation`组件，其中包含一个引用“idle”或“Run”`AnimationClip`的字段（图
    5-8）。


    ![A310332_2_En_5_Fig8_HTML.jpg](img/A310332_2_En_5_Fig8_HTML.jpg)


    图 5-8. 改变骷髅的位置和动画


    还要注意，`Play Automatically`复选框已被勾选，这就是为什么你一点击`Play`动画就会运行。如果动画意在由脚本在游戏期间的某个时刻触发，则应取消勾选此选项。


    为了将空闲（或奔跑）状态的`AnimationClip`替换为跳舞的`AnimationClip`资源，请点击“idle”右侧的圆圈，调出`AnimationClip`选择列表（图
    5-9）。选择名为“dance”的`AnimationClip`资源。


    ![A310332_2_En_5_Fig9_HTML.jpg](img/A310332_2_En_5_Fig9_HTML.jpg)


    图 5-9. AnimationClip 选择列表


    现在点击`Play`，骷髅就会跳舞了！（见图 5-10）


    ![A310332_2_En_5_Fig10_HTML.jpg](img/A310332_2_En_5_Fig10_HTML.jpg)


    图 5-10. 跳舞的骷髅


    # 让骷髅永远跳舞


    如果你让骷髅跳一会儿，它最终会在`AnimationClip`资源播放完时停止。但`AnimationClip`资源可以设置为循环播放。在`skeletonNormal`的`Inspector`视图中，点击`Animation`组件中指向“dance”`AnimationClip`资源的引用。`Project`视图将显示选中的`AnimationClip`资源、相关的骷髅网格体以及其他`AnimationClip`资源（图
    5-11）。


    ![A310332_2_En_5_Fig11_HTML.jpg](img/A310332_2_En_5_Fig11_HTML.jpg)


    图 5-11. 循环动画


    `Inspector`视图显示一段完整的动画数据，该数据被分割为多个不同的`AnimationClip`资源。在列表中选择“dance”剪辑，其下方的`Wrap
    Mode`将显示为`Default`。将`Wrap Mode`更改为`Loop`，然后点击`Apply`按钮（就在`Wrap Mode`字段下方）。


    现在点击`Play`，骷髅就会不停地跳舞、跳舞、再跳舞。


    > **注意**

    > 此骷髅使用的是 Unity 的传统动画系统。你可以通过点击图 5-11 中显示的`Rig`按钮来验证，并看到`Legacy`复选框已被勾选。Unity
    4 引入了一个名为 Mecanim 的新动画系统，除其他功能外，它允许你为不同的骷髅（或者他们所说的化身）使用动画。

    '
- fmt: '# Add a Dance Floor


    The skeleton looks kind of strange dancing in the sky, so let’s give it a floor
    to dance on. You could make another cube and scale it, but there’s a more suitable
    primitive `GameObject` that you can use—a plane. Like the cube, you can make a
    plane from the `Create` submenu of the `GameObject` menu on the menu bar. But
    this time, try the `Create` button on the top left of the `Hierarchy` view (Figure
    [5-12](#A310332_2_En_5_Chapter.html#Fig12)).


    ![A310332_2_En_5_Fig12_HTML.jpg](Images/A310332_2_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    Creating a plane using the `Create` menu in the `Hierarchy` view


    Note that all the items in the `Create` menu are available in the `GameObject`
    menu on the menu bar, but not all the items that can be created from the `GameObject`
    menu are available in the `Hierarchy` view’s `Create` menu.


    Now a plane is listed in the `Hierarchy` view and displayed in the `Scene` view
    (Figure [5-13](#A310332_2_En_5_Chapter.html#Fig13)). A plane is like a flat cube—it
    has a top and bottom but no sides and no height. If you change its `x` and `z`
    scale in its `Transform` component, the Plane will stretch out, but changing the
    `y` scale (height) makes no difference.


    ![A310332_2_En_5_Fig13_HTML.jpg](Images/A310332_2_En_5_Fig13_HTML.jpg)


    Figure 5-13.


    The `Scene` view of the new plane


    Remember, the skeleton position was set to `(0,0,-10)`, and the skeleton’s origin
    is at the bottom, coinciding with the skeleton''s feet. So, select the new plane
    that’s now shown in the `Hierarchy` view, and then, in the `Inspector` view, set
    the plane’s position also to `(0,0,-10)` so that the floor is placed at the skeleton’s
    feet. Specifically, the `y` positions (height) of the feet and floor have to match
    up.


    That’s a pretty bland-looking floor; it could benefit from a material with a texture.
    The `ArtskillZ Free Texture Pack` is already imported and used for the cube, so
    you might just as well use it here for the floor. With the cubes, you just dragged
    a texture onto the cube in the `Hierarchy` view and then modified the resulting
    material in the `Inspector` view.


    This time around, go straight to the `Inspector` view of the plane (Figure [5-14](#A310332_2_En_5_Chapter.html#Fig14))
    and change its shader to `Bumped Specular`. Then drag a main texture and its associated
    bump (normal map) texture from the `ArtskillZ Free Texture Pack` (in the figure,
    I’ve chosen the `Floor03` and `Floor03_n` textures from the `Fantasy` folder of
    the pack).


    ![A310332_2_En_5_Fig14_HTML.jpg](Images/A310332_2_En_5_Fig14_HTML.jpg)


    Figure 5-14.


    Editing the plane position and material


    Now when you click Play, the skeleton is dancing on a floor! (See Figure [5-15](#A310332_2_En_5_Chapter.html#Fig15).)


    ![A310332_2_En_5_Fig15_HTML.jpg](Images/A310332_2_En_5_Fig15_HTML.jpg)


    Figure 5-15.


    The skeleton dancing on a textured plane


    # Add a Shadow


    One of the `Light` component properties discussed in Chapter [3](../Text/A310332_2_En_3_Chapter.html)
    is `Shadow Type`. Now that the scene has a floor that shadows can be cast on,
    let’s try this feature.


    Select a point light (either in the `Hierarchy` view or in the `Scene` view),
    and in the `Inspector` view (Figure [5-16](#A310332_2_En_5_Chapter.html#Fig16)),
    change `Shadow Type` from `None` to `Soft Shadows`. This provides shadows with
    a nice, soft, fuzzy border (the penumbra of the shadow), which looks better than
    the sharp borders of `Hard Shadows`.


    ![A310332_2_En_5_Fig16_HTML.jpg](Images/A310332_2_En_5_Fig16_HTML.jpg)


    Figure 5-16.


    A point light converted to a directional light with soft shadows


    Now you should change the type from `Point Light` to `Directional Light`. Point
    lights can cast shadows, but only hard shadows and only when rendering in `Deferred
    Mode`, which isn’t available in Unity iOS. Actually, soft shadows aren’t available
    in Unity iOS at all, but they look so good, let’s try them out here.


    Whereas a point light radiates light in all directions from a position, a directional
    light is treated as if it were infinitely far away, and thus its position doesn’t
    matter, but its rotation does. So in the `Transform` component, you can use `0,0,0`
    for the position (which doesn’t really matter for a directional light, but it
    looks cleaner than having an arbitrary position) and `25,0,0` for the rotation,
    indicating the light is rotated 25 degrees around the `x`-axis. In other words,
    the light is looking down 25 degrees from horizontal.


    Instead of entering a rotation, you could manually rotate the light in the `Scene`
    view (Figure [5-17](#A310332_2_En_5_Chapter.html#Fig17)) by selecting the light,
    clicking the `Rotate` tool in the button bar on the top left of the Unity Editor
    (third button from the left), and then dragging the circle representing the `x`-axis
    rotation on the light.


    ![A310332_2_En_5_Fig17_HTML.jpg](Images/A310332_2_En_5_Fig17_HTML.jpg)


    Figure 5-17.


    Rotating a directional light in the `Scene` view


    There’s no reason to use the `Move` tool (second button from the left on the button
    bar) since the position of a directional light doesn’t matter, but it can help
    visualize what the light is illuminating if you move it up and away so that it’s
    obviously pointing at the skeleton.


    Tip


    You can aim a directional or spot light (or anything that can be aimed) in the
    same way you aimed the `Main Camera` at the cube in Chapter [3](../Text/A310332_2_En_3_Chapter.html).
    In this case, you would select the skeleton, press the `F` key to `Frame Selected`,
    click the leftmost button on the top-left toolbar to enter the `Hand tool` mode
    in the `Scene` view, and then in the `Scene` view `Alt+click-drag` until the `Scene`
    view camera is pointing the way you want the light to point. Then select the point
    light and invoke `Align to view` from the `GameObject` menu.


    If you click Play at this point, you should see a shadow, but one with room for
    improvement, even with `Strength` set to `1`. Unity uses a technique called shadow
    maps for generating shadows, where the shadow quality is dependent on the resolution
    of the shadow maps. The default setting for the shadow map resolution in the `Light`
    component is `Use Quality Settings`, which you can override in the `Inspector`
    view. But let’s go to the `Quality Settings` window instead by selecting `Project
    Settings` > `Quality` from the `Edit` menu (Figure [5-18](#A310332_2_En_5_Chapter.html#Fig18)).


    ![A310332_2_En_5_Fig18_HTML.jpg](Images/A310332_2_En_5_Fig18_HTML.jpg)


    Figure 5-18.


    Selecting `Quality Settings` from the `Edit` menu


    The `Quality Settings` manager appears in the `Inspector` view (Figure [5-19](#A310332_2_En_5_Chapter.html#Fig19)),
    displaying a list of quality settings and the selected quality setting for each
    build platform. The default quality setting for desktop platforms is `Good`. Select
    that line in the platform settings table so the individual settings for `Good`
    are displayed. The `Shadows` settings, in particular, control the shadow quality.
    So, change `Shadow Resolution` to `Very High Resolution` and also lower `Shadow
    Distance` to `10` since shorter shadow distances lead to better shadow resolution
    (but too short and the shadow won’t render).


    ![A310332_2_En_5_Fig19_HTML.jpg](Images/A310332_2_En_5_Fig19_HTML.jpg)


    Figure 5-19.


    Adjusted quality settings for shadows


    Now when you click Play, you have a dancing shadow that should look pretty good!
    (See Figure [5-20](#A310332_2_En_5_Chapter.html#Fig20).)


    ![A310332_2_En_5_Fig20_HTML.jpg](Images/A310332_2_En_5_Fig20_HTML.jpg)


    Figure 5-20.


    The `Game` view of the skeleton with a shadow'
