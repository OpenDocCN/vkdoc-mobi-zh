- fmt: '# Scale the GUI


    You now have enough set up to build and run, and the initial screen of your game
    looks fine if you run it on a low-resolution iOS device that has a 320 × 480 pixel
    screen. But on any of the newer devices, all of which have at least double the
    screen resolution, the pause menu looks really small, to the point where it’s
    difficult to read or even tap an individual button.


    To scale the GUI, you first need to figure out the scaling factor you want to
    use, which is the current screen width divided by the screen width you were originally
    targeting. The GUI looks alright on the iPhone 3GS, at 320 × 480 pixels, so let’s
    say the base screen width you’re targeting is 320. So, if you’re actually running
    on an iPhone 5, for example, at 1136 × 640 pixels, you’ll have to scale up the
    GUI.


    The next step is to apply the scaling factor. This can be done in UnityGUI by
    setting the static variable `GUI.matrix`, which is a transformation matrix. In
    computer graphics, a transformation matrix encompasses and applies a translation
    (change of position), rotation, and scale.


    In fact, the local position, rotation, and scale of a `Transform` component corresponds
    to a 4 × 4 transformation matrix for that `GameObject`. And the world position,
    rotation, and scale are calculated by combining (multiplying) all the transformation
    matrices of a `GameObject`’s parent `GameObject`s. In the good ol’ days, you had
    to include this linear algebra code when programming in computer graphics. Now
    you can let the game engine hide this from you, but you’re getting a little taste
    of it here.


    ## Scale the Scoreboard


    Let’s start with the scoreboard, because that’s a little bit simpler, by making
    the modifications shown in Listing [12-1] to the `FuguBowlScoreboard` script.
    The addition is a variable named `baseScreenWidth` that specifies the base screen
    width, defaulting to the 320-pixel width of the iPhone 3GS. The variable is public,
    so you have the option of adjusting it in the Inspector view.


    Then, at the beginning of the `OnGUI` function, add two lines of code to construct
    the scaling matrix and assign it to `GUI.matrix`. (Putting the matrix at the beginning
    of `OnGUI` means it takes effect before any GUI rendering takes place.)


    ```

    #pragma strict

    var style:GUIStyle; // customize the appearance

    var baseScreenWidth:float = 320.0; // for iOS, the screen width we think we''re
    rendering on

    function OnGUI() {

    #if UNITY_IPHONE

    var guiScale:float = Screen.width/baseScreenWidth;

    GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity, Vector3(guiScale,
    guiScale, 1));

    #endif

    for (var f:int=0; f<10; f++) {

    var score:String="";

    var roll1:int = FuguBowl.player.scores[f].ball1;

    var roll2:int = FuguBowl.player.scores[f].ball2;

    var roll3:int = FuguBowl.player.scores[f].ball3;

    switch (roll1) {

    case -1: score += " "; break;

    case 10: score +="X"; break;

    default: score += roll1;

    }

    score+="/";

    if (FuguBowl.player.IsSpare(f)) {

    score +="I";

    } else {

    switch (roll2) {

    case -1: score += " "; break;

    case 10: score +="X"; break;

    default: score += roll2;

    }

    }

    if (f==9) {

    score+="/";

    if (10==roll2+roll3) {

    score +="I";

    } else {

    switch (roll3) {

    case -1: score += " "; break;

    case 10: score +="X"; break;

    default: score += roll3;

    }

    }

    }

    GUI.Label(Rect(f*30+5,5,50,20),score,style);

    var total:int=FuguBowl.player.GetScore(f);

    if (total != -1) {

    GUI.Label(Rect(f*30+5,20,50,20)," "+total,style);

    }

    }

    }

    ```


    **Listing 12-1.** Scaling Added to the `FuguBowlScoreboard.js` Script


    The new code is intended only for iOS (although it would work on any platform),
    so new lines of code are wrapped between `#if UNITY_IPHONE` and `#endif`. `UNITY_IPHONE`
    is a built-in preprocessor definition built that is defined only if the build
    target is iOS (you can also use `UNITY_IOS`). The end result is that the additional
    code only turns into executing code for iOS and essentially disappears if you’re
    building to any other target (you don’t do that for `baseScreenWidth` because
    you don’t want to lose its Inspector view setting if the build target is changed).


    Of the two lines of real code, the first calculates how much you need to scale
    the GUI, based on `Screen.width`, which is the current screen width, and `baseScreenWidth`,
    which is the screen width the GUI is coded to render on. The result is assigned
    to a local variable `guiScale`.


    You might have wondered why we declared `baseScreenWidth` as a `float` instead
    of an `int`. Well, this is why: `Screen.width` is an `int`, and if you divide
    an `int` by an `int`, then the compiler assumes you want the result as an `int`,
    which works out okay if, for example, you’re dividing 640 (iPhone 4) by 320 and
    end up with 2. But if you’re running on an iPad 2, then you would be dividing
    768 by 320, and the result would be rounded down to 2, which is wrong in this
    case. But as long as one number in the operation is a `float`, then the compiler
    will treat the whole thing as a floating-point computation.


    > **Caution:** Watch out for operations where you’re supplying `int`s as inputs
    and expecting `float` results. It’s a common source of errors.


    The result is passed to a call to `Matrix4x4.TRS`, which constructs a 4x4 matrix
    with a translation, rotation, and scale. The translation is `Vector3.zero` (x,
    y, and z are 0), `Quaternion.identity` (the identity `Quaternion` represents no
    rotation), and a `Vector3` representing the scale. The scale factor based on the
    screen size is applied in the x and y directions, and the z-axis is left unscaled
    since that’s the direction pointing into the screen.'
