- fmt: '### Debug with MonoDevelop


    I still perform most of my debugging by calling `Debug.Log` and examining error
    messages in the Console view. But modern programmers are accustomed to more sophisticated
    debugging tools. It turns out that MonoDevelop also provides a full-featured debugger
    that’s been customized to work with Unity.


    If MonoDevelop doesn’t automatically open when you edit the script from within
    the Unity Editor, you can open it from the MonoDevelop File menu, or you can double-click
    the solution file in the Finder (the highlighted file in Figure [4-15](#A310332_2_En_4_Chapter.html#Fig15)).


    ![A310332_2_En_4_Fig15_HTML.jpg](Images/A310332_2_En_4_Fig15_HTML.jpg)


    Figure 4-15. MonoDevelop project files


    With the MonoDevelop solution loaded, enable debugging by selecting `Attach to
    Process` from the MonoDevelop Run menu (Figure [4-16](#A310332_2_En_4_Chapter.html#Fig16)).


    ![A310332_2_En_4_Fig16_HTML.jpg](Images/A310332_2_En_4_Fig16_HTML.jpg)


    Figure 4-16. The MonoDevelop `Attach to Process` command


    Then choose `Unity Editor` in the resulting process list (Figure [4-17](#A310332_2_En_4_Chapter.html#Fig17)).


    ![A310332_2_En_4_Fig17_HTML.jpg](Images/A310332_2_En_4_Fig17_HTML.jpg)


    Figure 4-17. Attaching MonoDevelop to the Unity Editor


    Click Play again, and this time MonoDevelop will show not only the line of code
    where the error occurred but also the specific type of error (`NullReferenceException`)
    and associated information such as the stack trace, which is useful for determining
    what chain of function calls resulted in the error (Figure [4-18](#A310332_2_En_4_Chapter.html#Fig18)).


    ![A310332_2_En_4_Fig18_HTML.jpg](Images/A310332_2_En_4_Fig18_HTML.jpg)


    Figure 4-18. MonoDevelop error details with the Unity Editor attached


    While in debugging mode, the Unity Editor may be unresponsive, so when you’re
    finished with a debugging run, select `Detach` from the Run menu in MonoDevelop
    to detach the Unity Editor process (Figure [4-19](#A310332_2_En_4_Chapter.html#Fig19)).
    The `Detach` command is also available as a button on the MonoDevelop toolbar.


    ![A310332_2_En_4_Fig19_HTML.jpg](Images/A310332_2_En_4_Fig19_HTML.jpg)


    Figure 4-19. Detaching the Unity Editor process from MonoDevelop


    Let’s fix the null reference problem by changing the initial value of the variable
    `object` from `null` to the script’s `GameObject` (Listing [4-4](#A310332_2_En_4_Chapter.html#Par55)).


    ```

    function Start () {

    var object:GameObject = this.gameObject;

    Debug.Log("Start called on GameObject "+object.name);

    }

    Listing 4-4. Start Function in FuguRotate.js with Null Reference Fix

    ```


    The reference to `this.gameObject` is equivalent to just `gameObject`. The variable
    `this` always refers to the current object, which is this script component (in
    some other programming languages, `self` is used in the same way). Sometimes I
    like to explicitly prefix variables like `gameObject` with `this.` to make it
    clear that I’m referring to an instance variable, which is a variable defined
    in the class that is not local to a function and not static, so each instance
    of the class has its own copy.


    Now the script shouldn’t break in the `Start` function (you can click `Play` in
    the Unity Editor to confirm). But you can still make execution stop on any line
    in MonoDevelop by adding a breakpoint. Click to the left of the line in the `Update`
    function, and a breakpoint indicator will appear by the line (Figure [4-20](#A310332_2_En_4_Chapter.html#Fig20)).


    ![A310332_2_En_4_Fig20_HTML.jpg](Images/A310332_2_En_4_Fig20_HTML.jpg)


    Figure 4-20. Adding a breakpoint in MonoDevelop


    Now when you invoke `Attach to Process`, connect to the Unity Editor, and click
    `Play` in the Unity Editor, execution will stop in your `Update` function just
    as if there were an error there (Figure [4-21](#A310332_2_En_4_Chapter.html#Fig21)).
    When execution is halted in MonoDevelop while in debugging mode, you can examine
    the stack trace and inspect the runtime environment in other ways. For example,
    Figure [4-21](#A310332_2_En_4_Chapter.html#Fig21) shows the result of typing `gameObject`
    in the Watch panel and then halting at a breakpoint in the `FuguRotate` Update
    callback. The current value of `gameObject` is the cube `GameObject`, which can
    now have its member variables examined.


    ![A310332_2_En_4_Fig21_HTML.jpg](Images/A310332_2_En_4_Fig21_HTML.jpg)


    Figure 4-21. Execution halted at a breakpoint


    Once you’re finished examining the runtime state at the breakpoint, you have an
    option in the Run menu to continue until the next breakpoint or error. The Run
    menu also has the commands `Step Over` (continue until the next line of code in
    this function), `Step Into` (continue until the first line of code in any function
    called by this line of code), or `Step Out` (continue until you’ve exited this
    function) so you can step through your script one line at a time. All of these
    commands have keyboard shortcuts shown in the Run menu and are also available
    as buttons on the toolbar.


    ## Make It Rotate


    Now that you’re familiar with scripts and how to attach, edit, and debug them,
    you’re ready to make this script do what you ultimately want—rotate the cube.'
