- fmt: '#### Stripping Level


    Three cumulative levels are available: String Assemblies, Strip Bytecode, and
    “Use micro mscorlib.” Let’s choose the latter, which is the most aggressive optimization
    and includes the other two. The micro mscorlib is a custom, slimmed-down version
    of the core Mono library, which may be incompatible with additional .NET libraries
    you might import, but that’s not an issue for this game.


    #### Script Call Optimization


    The Script Call Optimization level determines how calls to native code are made.
    The default setting, Slow and Safe, incurs overhead, so let’s set it to Fast with
    No Exceptions. As the label signifies, this setting is faster but will fail if
    the native code throws an exception (essentially, an error that is expected to
    be handled by calling code).


    #### Optimize Mesh Data


    The Optimize Mesh Data option removes at build time any unnecessary per-vertex
    mesh information. If a mesh is not using a bump-map shader, then the tangents
    can be removed, and if the mesh is using an unlit shader, then normals can be
    removed. This saves space and facilitates batching since batching copies all of
    that mesh data. Of course, if you’re going to change the shader of a mesh at runtime
    via a script to a shader that requires more per-vertex information than the original
    shader, you shouldn’t use this option.


    ## Optimizing GameObjects


    After adjusting the quality settings, Physics Manager, and Time Manager, you’re
    ready to tweak individual GameObjects.


    ### Camera


    Cameras are a focal point (no pun intended) of optimization because they dictate
    what is rendered and how it is rendered. The camera frustum automatically provides
    one source of optimization. Any GameObject that resides entirely outside the frustum
    is not visible to the camera, so no attempt is made to render the GameObject.
    This optimization is called frustum culling and also benefits animation and particle
    systems. The system has no need to play an animation or simulate particles when
    there’s no one to see it.


    **Tip**


    The fastest way to render a GameObject is to not render it all.


    Therefore, adjusting the camera’s frustum so it includes fewer objects in a scene
    is one source of optimization. You can narrow the frustum by lowering its field
    of view, and you can shorten the frustum by decreasing the far distance value,
    bringing the far plane closer to the camera (Figure 14-22).


    ![A310332_2_En_14_Fig22_HTML.jpg](Images/A310332_2_En_14_Fig22_HTML.jpg)


    Figure 14-22. Optimizing the Main Camera


    For example, the default value of 1000 for the far plane value in the Main Camera
    is overkill, considering the bowling floor is much smaller. Setting the far value
    to 100 still leaves everything visible (Unity skyboxes are conveniently visible
    independent of the frustum).


    Minimizing the far plane value has the additional benefit of storing a smaller
    range of values in the depth buffer when rendering. This avoids the problem of
    z-fighting, where an object that is barely behind another seems to poke through
    the one in front because of the limited numerical precision in the depth buffer.


    Another way to cull GameObjects from rendering by a camera is to specify that
    it renders only GameObjects in a certain set of layers, listed in its culling
    mask. This is really a matter of correctness—you want to make sure the camera
    is rendering only what it’s supposed to be rendering and not, say, HUD elements
    that are already rendered by a separate HUD camera. But it does affect performance.
    I once had a bug where the Main Camera was unintentionally rendering GUI elements,
    but it was far enough in the distance that I didn’t notice it.


    Each camera also has an `eventMask` variable that is similar to its culling mask
    (or, equivalently, its `cullingMask` variable), but instead of specifying what
    layers are rendered by the camera, the `eventMask` variable determines what layers
    receive `onMouse` events from the camera. Minimizing the layers present in `eventMask`
    can reduce the overhead of `onMouse` processing, but as it’s not visible in the
    Inspector view, that variable has to be set from a script.


    The last camera optimization to make is to specify the render path. There are
    two render paths available on iOS: Vertex Lit and Forward Rendering (deferred
    rendering is not available for mobile platforms). Forward Rendering is more flexible
    and powerful than Vertex Lit. For example, the Vertex Lit path won’t display bump-mapping.
    But in this chapter, you’re aggressively going for a high frame rate, so let’s
    set the render path to Vertex Lit.


    ### Lights


    You already disabled shadows on your light, which is a big performance improvement
    because it reduces draw calls. And lighting is already influenced by the quality
    settings, which specify no pixel lights and disabled shadows (Figure 14-23).


    ![A310332_2_En_14_Fig23_HTML.jpg](Images/A310332_2_En_14_Fig23_HTML.jpg)


    Figure 14-23. Optimizing the light


    But you can perform some additional adjustments on the light similar to your camera
    tweaks. Like the camera, lights have a specified range, which you can minimize
    to reduce the number of lit GameObjects. Lights also have a culling mask, which,
    as in the case of the Main Camera, can be set to the Default layer, but with judicious
    assignment of layers you can reduce unnecessarily lit GameObjects.


    ### Pins


    In pursuit of speed, you’ve chosen the simplest lighting and the simplest render
    path. You can also simplify the shaders you’re using for each mesh. The bowling
    pins comprise most of the objects in your scene, so let’s modify the BarrelPin
    prefab first (Figure 14-24).


    ![A310332_2_En_14_Fig24_HTML.jpg](Images/A310332_2_En_14_Fig24_HTML.jpg)


    Figure 14-24. Optimizing the BarrelPin prefab


    In the Project view, select the `Barrel` GameObject in the prefab and click the
    Shader selector in the Inspector view. There are many simpler shaders than Bumped
    Specular; anything with less than two materials is likely to be faster, and Vertex
    Lit will be more efficient than any of the pixel shaders. There is even a set
    of shaders specifically implemented for mobile devices, including `Mobile/Vertex
    Lit`. But there’s one that is even better for your situation, a `Mobile/Vertex
    Lit` shader implemented specifically for use only with directional lights. So,
    let’s choose that one, `Mobile/Vertex Lit (Only Directional Light)`.'
  raw: '#### Stripping Level


    Three cumulative levels are available: String Assemblies, Strip Bytecode, and
    “Use micro mscorlib.” Let’s choose the latter, which is the most aggressive optimization
    and includes the other two. The micro mscorlib is a custom, slimmed-down version
    of the core Mono library, which may be incompatible with additional .NET libraries
    you might import, but that’s not an issue for this game.


    #### Script Call Optimization


    The Script Call Optimization level determines how calls to native code are made.
    The default setting, Slow and Safe, incurs overhead, so let’s set it to Fast with
    No Exceptions. As the label signifies, this setting is faster but will fail if
    the native code throws an exception (essentially, an error that is expected to
    be handled by calling code).


    #### Optimize Mesh Data


    The Optimize Mesh Data option removes at build time any unnecessary per-vertex
    mesh information. If a mesh is not using a bump-map shader, then the tangents
    can be removed, and if the mesh is using an unlit shader, then normals can be
    removed. This saves space and facilitates batching since batching copies all of
    that mesh data. Of course, if you’re going to change the shader of a mesh at runtime
    via a script to a shader that requires more per-vertex information than the original
    shader, you shouldn’t use this option.


    ## Optimizing GameObjects


    After adjusting the quality settings, Physics Manager, and Time Manager, you’re
    ready to tweak individual GameObjects.


    ### Camera


    Cameras are a focal point (no pun intended) of optimization because they dictate
    what is rendered and how it is rendered. The camera frustum automatically provides
    one source of optimization. Any GameObject that resides entirely outside the frustum
    is not visible to the camera, so no attempt is made to render the GameObject.
    This optimization is called frustum culling and also benefits animation and particle
    systems. The system has no need to play an animation or simulate particles when
    there’s no one to see it.


    Tip


    The fastest way to render a GameObject is to not render it all.


    Therefore, adjusting the camera’s frustum so it includes fewer objects in a scene
    is one source of optimization. You can narrow the frustum by lowering its field
    of view, and you can shorten the frustum by decreasing the far distance value,
    bringing the far plane closer to the camera (Figure [14-22](#A310332_2_En_14_Chapter.html#Fig22)).


    ![A310332_2_En_14_Fig22_HTML.jpg](Images/A310332_2_En_14_Fig22_HTML.jpg)


    Figure 14-22.


    Optimizing the Main Camera


    For example, the default value of 1000 for the far plane value in the Main Camera
    is overkill, considering the bowling floor is much smaller. Setting the far value
    to 100 still leaves everything visible (Unity skyboxes are conveniently visible
    independent of the frustum).


    Minimizing the far plane value has the additional benefit of storing a smaller
    range of values in the depth buffer when rendering. This avoids the problem of
    z-fighting, where an object that is barely behind another seems to poke through
    the one in front because of the limited numerical precision in the depth buffer.


    Another way to cull GameObjects from rendering by a camera is to specify that
    it renders only GameObjects in a certain set of layers, listed in its culling
    mask. This is really a matter of correctness—you want to make sure the camera
    is rendering only what it’s supposed to be rendering and not, say, HUD elements
    that are already rendered by a separate HUD camera. But it does affect performance.
    I once had a bug where the Main Camera was unintentionally rendering GUI elements,
    but it was far enough in the distance that I didn’t notice it.


    Each camera also has an eventMask variable that is similar to its culling mask
    (or, equivalently, its cullingMask variable), but instead of specifying what layers
    are rendered by the camera, the eventMask variable determines what layers receive
    onMouse events from the camera. Minimizing the layers present in eventMask can
    reduce the overhead of onMouse processing, but as it’s not visible in the Inspector
    view, that variable has to be set from a script.


    The last camera optimization to make is to specify the render path. There are
    two render paths available on iOS: Vertex Lit and Forward Rendering (deferred
    rendering is not available for mobile platforms). Forward Rendering is more flexible
    and powerful than Vertex Lit. For example, the Vertex Lit path won’t display bump-mapping.
    But in this chapter, you’re aggressively going for a high frame rate, so let’s
    set the render path to Vertex Lit.


    ### Lights


    You already disabled shadows on your light, which is a big performance improvement
    because it reduces draw calls. And lighting is already influenced by the quality
    settings, which specify no pixel lights and disabled shadows (Figure [14-23](#A310332_2_En_14_Chapter.html#Fig23)).


    ![A310332_2_En_14_Fig23_HTML.jpg](Images/A310332_2_En_14_Fig23_HTML.jpg)


    Figure 14-23.


    Optimizing the light


    But you can perform some additional adjustments on the light similar to your camera
    tweaks. Like the camera, lights have a specified range, which you can minimize
    to reduce the number of lit GameObjects. Lights also have a culling mask, which,
    as in the case of the Main Camera, can be set to the Default layer, but with judicious
    assignment of layers you can reduce unnecessarily lit GameObjects.


    ### Pins


    In pursuit of speed, you’ve chosen the simplest lighting and the simplest render
    path. You can also simplify the shaders you’re using for each mesh. The bowling
    pins comprise most of the objects in your scene, so let’s modify the BarrelPin
    prefab first (Figure [14-24](#A310332_2_En_14_Chapter.html#Fig24)).


    ![A310332_2_En_14_Fig24_HTML.jpg](Images/A310332_2_En_14_Fig24_HTML.jpg)


    Figure 14-24.


    Optimizing the BarrelPin prefab


    In the Project view, select the Barrel GameObject in the prefab and click the
    Shader selector in the Inspector view. There are many simpler shaders than Bumped
    Specular; anything with less than two materials is likely to be faster, and Vertex
    Lit will be more efficient than any of the pixel shaders. There is even a set
    of shaders specifically implemented for mobile devices, including Mobile/Vertex
    Lit. But there’s one that is even better for your situation, a Mobile/Vertex Lit
    shader implemented specifically for use only with directional lights. So, let’s
    choose that one, Mobile/Vertex Lit (Only Directional Light).'
  trans: '

    #### 剥离级别


    共有三个递进等级可供选择：字符串程序集、剥离字节码以及“使用微型 mscorlib”。我们选择最后一项，这是最具侵略性的优化方案，同时包含了前两个等级。微型
    mscorlib 是核心 Mono 库的一个自定义精简版本，它可能与您导入的其他 .NET 库不兼容，但对于这个游戏来说不成问题。


    #### 脚本调用优化


    脚本调用优化级别决定了调用原生代码的方式。默认设置“慢速且安全”会产生额外开销，因此我们将其设置为“快速且无异常”。如标签所示，此设置速度更快，但如果原生代码抛出异常（本质上，是一种预期由调用代码处理的错误），则会失败。


    #### 优化网格数据


    “优化网格数据”选项会在构建时移除所有不必要的逐顶点网格信息。如果网格未使用凹凸贴图着色器，则可以移除切线；如果网格使用的是无光照着色器，则可以移除法线。这样可以节省空间并有助于合批，因为合批会复制所有网格数据。当然，如果您打算在运行时通过脚本将网格的着色器更改为需要比原始着色器更多逐顶点信息的着色器，则不应使用此选项。


    ## 优化游戏对象


    调整质量设置、物理管理器和时间管理器后，您就可以开始微调单个游戏对象了。


    ### 摄像机


    摄像机是优化的焦点（无意双关），因为它决定了渲染什么以及如何渲染。摄像机视锥体自动提供了一种优化途径。完全位于视锥体外的任何游戏对象都对摄像机不可见，因此不会尝试渲染该游戏对象。这种优化称为视锥体剔除，也有益于动画和粒子系统。当没有人能看到动画或粒子时，系统无需播放动画或模拟粒子。


    **提示**


    渲染游戏对象最快的方法就是根本不渲染它。


    因此，调整摄像机的视锥体以包含场景中更少的对象是一种优化途径。您可以通过降低视野来缩小视锥体，也可以通过减小远距离值来缩短视锥体，将近裁剪面移近摄像机（图
    14-22）。


    ![A310332_2_En_14_Fig22_HTML.jpg](img/A310332_2_En_14_Fig22_HTML.jpg)


    图 14-22. 优化主摄像机


    例如，考虑到保龄球场地要小得多，主摄像机中远裁剪面的默认值 1000 就有些过头了。将远距离值设置为 100，所有物体仍然可见（Unity 天空盒很方便地独立于视锥体显示）。


    最小化远裁剪面值还有一个额外的好处，即在渲染时深度缓冲区中存储的值范围更小。这避免了深度冲突的问题，即由于深度缓冲区数值精度有限，一个几乎与另一物体重叠的物体看起来像是从前面物体中穿透出来。


    通过摄像机剔除游戏对象的另一种方法是，指定它只渲染其剔除掩码中列出的特定层级集合中的游戏对象。这实际上是一个正确性的问题——您需要确保摄像机只渲染它应该渲染的内容，而不是由单独的
    HUD 摄像机渲染的 HUD 元素之类的东西。但它确实会影响性能。我曾经遇到过一个错误，主摄像机无意中渲染了 GUI 元素，但由于距离足够远，我没有注意到。


    每个摄像机还有一个 `eventMask` 变量，类似于它的剔除掩码（或者等效地，它的 `cullingMask` 变量），但 `eventMask` 变量不是指定摄像机渲染哪些层级，而是确定哪些层级接收来自摄像机的
    `onMouse` 事件。最小化 `eventMask` 中存在的层级可以减少 `onMouse` 处理的开销，但由于它在检视面板中不可见，该变量必须通过脚本设置。


    最后一项摄像机优化是指定渲染路径。iOS 上有两种可用的渲染路径：顶点光照和正向渲染（延迟渲染不适用于移动平台）。正向渲染比顶点光照更灵活、更强大。例如，顶点光照路径不会显示凹凸贴图。但本章节中，我们极力追求高帧率，因此我们将渲染路径设置为顶点光照。


    ### 光源


    您已经禁用了光源的阴影，这大大提高了性能，因为它减少了绘制调用。并且光照已经受到质量设置的影响，这些设置指定了无像素光照并禁用了阴影（图 14-23）。


    ![A310332_2_En_14_Fig23_HTML.jpg](img/A310332_2_En_14_Fig23_HTML.jpg)


    图 14-23. 优化光源


    但您可以对光源进行一些额外的调整，类似于对摄像机的微调。与摄像机一样，光源有一个指定的范围，您可以最小化它以减少被照亮的游戏对象数量。光源也有一个剔除掩码，与主摄像机的情况一样，可以将其设置为默认层级，但通过明智地分配层级，可以减少不必要被照亮的游戏对象。


    ### 球瓶


    为了追求速度，您选择了最简单的光照和最简单的渲染路径。您还可以简化每个网格使用的着色器。保龄球瓶构成了场景中的大部分物体，因此我们首先修改 BarrelPin
    预制件（图 14-24）。


    ![A310332_2_En_14_Fig24_HTML.jpg](img/A310332_2_En_14_Fig24_HTML.jpg)


    图 14-24. 优化 BarrelPin 预制件


    在项目视图中，选择预制件中的 `Barrel` 游戏对象，并在检视面板中单击着色器选择器。有许多比凹凸点光源更简单的着色器；任何材质数量少于两个的着色器都可能更快，而顶点光照将比任何像素着色器更高效。甚至还有一组专为移动设备实现的着色器，包括
    `Mobile/Vertex Lit`。但有一种着色器更适合您的情况，即专门实现为仅用于方向光的 `Mobile/Vertex Lit` 着色器。因此，我们选择那个，`Mobile/Vertex
    Lit (Only Directional Light)`。

