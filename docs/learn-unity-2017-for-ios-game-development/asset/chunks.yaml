  trans: '

    ### 为脚本命名


    `NewBehaviour` 这个脚本名称缺乏实际意义，因此首要任务就是为它取一个新名字。一个显而易见的选择是`Rotate`，因为该脚本的最终目的是旋转立方体。但使用过于通用的名称可能会引发冲突（Unity
    会报告错误），即使两个同名脚本位于不同文件夹中也是如此。这是因为每个脚本都会定义一个新类（具体来说是`MonoBehaviour`的子类），而你不能拥有两个同名的类。


    一种解决方案是为每个脚本添加标准前缀（类似于 Objective-C 类以`NS`开头）。这是第三方 Unity 用户界面包常用的技术。如果每个人都把自己的按钮类命名为`Button`，它们就无法共存！


    **注意**


    C#脚本可以选择将类划分到不同的命名空间中，以避免名称冲突。本书几乎全程使用 JavaScript，但在第[17](https://doi.org/10.1007/978-1-4842-3174-6_17)章中提供了
    C#脚本和命名空间的示例。


    有时，如果脚本是特定于某款游戏的，我会使用游戏名称作为脚本名称前缀（例如，在 HyperBowl 中，我有许多以 Hyper 开头的脚本）。不过，我通常会在脚本名称前加上`Fugu`前缀，这对应我的游戏品牌
    Fugu Games。本书将沿用这一惯例，因此可以继续将新脚本命名为`FuguRotate`（图 4-3）。当然，通常你可以自由选择自己的脚本命名规范。


    ### 脚本剖析


    如果在项目视图中选中`FuguRotate`脚本，检查器视图会显示其源代码，至少会显示检查器视图窗口所能容纳的部分（图 4-4）。


    ![A310332_2_En_4_Fig4_HTML.jpg](img/A310332_2_En_4_Fig4_HTML.jpg)


    图 4-4. 新脚本的检查器视图


    如检查器视图所示，当 Unity 创建新脚本时，它包含三个项目（列表 4-1）。


    ```

    #pragma strict

    function Start () {

    }

    function Update () {

    }

    ```

    列表 4-1. 新脚本的内容


    脚本的第一行`#pragma strict`指示脚本编译器所有变量都必须有类型声明，或者至少其类型能被编译器轻松推断。这不是 Unity 桌面版构建的强制要求，但却是
    Unity iOS 的必需项，因此最好养成这个习惯。


    **注意**


    本书中所有完整的脚本列表都以`#pragma strict`开头。任何不包含该行的代码都只是脚本的摘录。


    脚本中的两个函数是回调函数，它们会在游戏中的特定时刻由 Unity 游戏引擎调用。当此脚本首次被启用时，会调用`Start`函数。只有当一个组件所依附的`GameObject`也处于活动状态时，该组件才算完全启用。因此，如果某个`GameObject`在场景中初始即为活动状态，并且它附带了一个已启用的脚本，那么当场景开始播放时，该脚本的`Start`函数就会被调用。否则，`Start`函数要等到脚本被启用（通过设置脚本组件的`enabled`变量）并且`GameObject`被激活（通过调用`GameObject`的`SetActive`函数）时才会被调用。


    与在脚本组件的生命周期中最多只被调用一次的`Start`函数不同，`Update`函数会在每一帧被调用（即，在 Unity 每次渲染当前场景之前调用一次）。与`Start`函数类似，`Update`只在脚本（完全）启用时才会被调用，并且对`Update`的首次调用发生在仅执行一次的`Start`调用之后。因此，`Start`函数非常适合执行`Update`函数所需的任何初始化工作。


    ### 附加脚本


    与项目视图中的其他资源一样，脚本在添加到场景中之前不会产生任何效果，具体来说，是作为`GameObject`的一个组件。最终目标是让`FuguRotate`脚本旋转立方体，因此将其从项目视图拖拽到层级视图中的立方体`GameObject`上。检查器视图现在会显示该脚本已作为组件附加到立方体上（图
    4-5）。


    ![A310332_2_En_4_Fig5_HTML.jpg](img/A310332_2_En_4_Fig5_HTML.jpg)


    图 4-5. 附加到立方体的`FuguRotate`脚本


    Unity 通常提供两种（有时是三种）方式来执行同一操作。例如，你也可以通过点击立方体检查器视图中的`Add Component`按钮，然后从弹出的菜单中选择`FuguRotate`脚本，将脚本附加到立方体上。或者，你也可以将`FuguRotate`脚本拖拽到`Add
    Component`按钮下方的区域中（但如果按钮下方显示的空间不足，这个操作会很难执行）。


    ### 编辑脚本


    现在是时候填充脚本内容了。在项目视图中选中`FuguRotate`脚本，然后在检查器视图中点击`Open`按钮以打开脚本编辑器。在项目视图中双击脚本，或在脚本上右键单击并选择`Open`，也是可行的。Unity
    的默认脚本编辑器是 MonoDevelop 的定制版本，这是一个为 Mono（Unity 脚本系统底层的开源框架）量身定制的代码编辑器和调试器（图 4-6）。


    ![A310332_2_En_4_Fig6_HTML.jpg](img/A310332_2_En_4_Fig6_HTML.jpg)


    图 4-6. MonoDevelop 编辑器


    如果你更喜欢使用其他脚本编辑器，可以通过打开 Unity 的首选项窗口，选择`External Tools`选项卡，然后浏览并选择你喜欢的应用程序来更改默认设置（图
    4-7）。


    ![A310332_2_En_4_Fig7_HTML.jpg](img/A310332_2_En_4_Fig7_HTML.jpg)


    图 4-7. 选择不同的脚本编辑器


    当前的`FuguRotate`脚本不会产生任何明显的效果，因为回调函数是空的，大括号之间没有任何代码。让我们先在`Start`和`Update`函数中添加一些追踪代码，以演示这些回调函数何时被调用（列表
    4-2）。


    ```

    function Start () {

    Debug.Log("Start called on GameObject "+gameObject.name);

    }

    function Update () {

    Debug.Log("Update called at time "+Time.time);

    }

    ```

    列表 4-2. 添加了`Debug.Log`调用的`FuguRotate.js`


    Unity 的 MonoDevelop 的一个很酷的功能是代码自动补全。例如，图 4-8 展示了当输入 `Time.t` 时，MonoDevelop 会弹出一个列表，其中包含作为`Time`类成员的函数和变量，并查找以
    `t` 开头的那个。


    ![A310332_2_En_4_Fig8_HTML.jpg](img/A310332_2_En_4_Fig8_HTML.jpg)


    图 4-8. MonoDevelop 中的自动补全

