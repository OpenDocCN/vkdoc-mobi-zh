- fmt: '#### Floor


    The `Floor` `GameObject` has a few component properties that can be tweaked for
    optimization (Figure [14-25](#A310332_2_En_14_Chapter.html#Fig25)). Starting with
    the `MeshRenderer` component, you have the `Cast Shadows` and `Receive Shadows`
    options enabled. Although you have shadows disabled in the light and in the quality
    settings, you should pay attention to the per-object settings just in case you
    enable shadows in the future. If shadows were enabled, you would want shadows
    cast on the floor, so `Receive Shadows` should be enabled. But because you don’t
    expect the floor to cast a shadow (at least not on anything you can see), let’s
    disable the `Cast Shadows` option. For performance, the fewer shadow casters,
    the better.


    ![A310332_2_En_14_Fig25_HTML.jpg](Images/A310332_2_En_14_Fig25_HTML.jpg)


    Figure 14-25. Optimizing the floor


    Turning to physics, there is another opportunity for optimization. Although you
    have primitive colliders for the bowling pins and bowling ball, your floor has
    a `MeshCollider` component. Because the floor is a flat and square surface, you
    could use a `BoxCollider` instead. Replacing it is a simple process: when you
    add a `BoxCollider` component to the floor, either using the `Add Component` button
    in the `Inspector` view or using the `Component` menu on the menu bar, Unity asks
    if you want to replace the existing `MeshCollider` (say yes), and the new `BoxCollider`
    component will automatically be sized to fit the floor mesh.


    As with the bowling pins, you could also change the shader from the fairly complex
    `Bumped Specular` shader to `Mobile/VertexLit (Only Directional Lights)`, as you
    did with your bowling pin prefab. But the floor is a special case because it’s
    flat. The lighting across its surface is uniform. So, you can use the `Unlit Texture`
    shader and avoid any lighting calculations at all.


    #### Ball


    The last `GameObject` you will optimize is the ball. It’s already using a `SphereCollider`
    component, so the one thing you’ll change is the shader. Like the bowling pins,
    the ball is going to move, so let’s use a lit shader, in particular the same `Mobile/VertexLit
    (Only Directional Light)` shader that you selected for the pins. However, the
    ball is currently using the default diffuse material that was automatically assigned
    when you created the ball, and you can’t change the shader on that material. So,
    you’ll need to assign a different material to the ball.


    You can create a new material in the same way you created the other types of assets.
    In the `Project` view, bring up the `Create` menu and select `Material` (Figure
    [14-26](#A310332_2_En_14_Chapter.html#Fig26)).


    ![A310332_2_En_14_Fig26_HTML.jpg](Images/A310332_2_En_14_Fig26_HTML.jpg)


    Figure 14-26. Creating a new material


    Place the new material in the `Materials` folder and name it `Ball`. Select it
    (Figure [14-27](#A310332_2_En_14_Chapter.html#Fig27)), and in the `Inspector`
    view you can adjust its shader, selecting `Mobile/VertexLit (Directional Light)`.


    ![A310332_2_En_14_Fig27_HTML.jpg](Images/A310332_2_En_14_Fig27_HTML.jpg)


    Figure 14-27. Setting the shader for a new material


    Then drag the `Ball` material onto the `Ball` `GameObject`, and you’re all set
    (Figure [14-28](#A310332_2_En_14_Chapter.html#Fig28)).


    ![A310332_2_En_14_Fig28_HTML.jpg](Images/A310332_2_En_14_Fig28_HTML.jpg)


    Figure 14-28. Optimizing the ball


    Both of the `Mobile/VertexLit` shaders will display a white color if no texture
    is supplied. If you want the ball to have a color other than white, you would
    use the standard `Vertex Lit` shader, which allows you to specify a `Main Color`
    and `Specular (shininess) Color`.


    ## Optimize Assets


    It’s easy to overlook the fact that a lot of optimization can take place when
    the asset is imported, and you have control over this in the import settings for
    each asset.


    ### Textures


    Your textures are already imported with reasonable default settings, but let’s
    look at a couple of textures so you can understand those settings. In the `Project`
    view, let’s look in the `Textures` folder and compare the cat texture you used
    for the example scene in Chapter [3](../Text/A310332_2_En_3_Chapter.html) (Figure
    [14-29](#A310332_2_En_14_Chapter.html#Fig29)) and the texture you used for the
    secondary splash screen in Chapter [12](../Text/A310332_2_En_12_Chapter.html)
    (Figure [14-31](#A310332_2_En_14_Chapter.html#Fig31)). The cat texture used the
    import settings corresponding to the `Texture` preset, while the splash texture
    used the import settings of the `GUI` preset. In both cases, switching from the
    preset to `Advanced` reveals the specific settings of the preset.


    ![A310332_2_En_14_Fig29_HTML.jpg](Images/A310332_2_En_14_Fig29_HTML.jpg)


    Figure 14-29. Import settings for a texture


    The filter type determines how a pixel from the texture (or texel) is calculated
    for rendering purposes. `Bilinear` filtering averages the surrounding texels from
    the closest smaller mipmap, while `trilinear` filtering combines the bilinear
    filtering results from the closest larger mipmap and the closest smaller mipmap.
    `Point` sampling is the simplest and fastest filter, while `trilinear` filtering
    is the most expensive. `Bilinear` filtering is the middle ground and a reasonable
    default.


    Mipmapping is usually appropriate, despite the increased memory usage. Besides
    improving the texture display, mipmapping allows the graphics processor to work
    with a smaller version of the texture, which can improve performance. For a texture
    used in a menu you’ll typically view the texture at just one size, and ideally
    at the texture’s original size, so mipmapping is unnecessary. That’s certainly
    true for the splash screen, especially when it isn’t even loaded into a scene.


    **Tip**: For a texture with sharp details (e.g., one used as a street sign), it
    may be better to use `point` sampling or even disable mipmapping entirely to avoid
    blurring the texture.


    The anisotropic (directionally dependent) filtering level compensates for the
    case where a texture is tilted with respect to the camera, such as the road surface
    in a racing game. In those cases, filtering uniformly across a texture in both
    directions may not look right. For regular textures in a scene, the anisotropic
    level should be chosen on a case-by-case basis. For UI textures, which are viewed
    face on from the camera, no anisotropic filtering is required.


    Normally, textures are imported while taking into account gamma space, the nonlinear
    color space of screens. In general, this isn’t necessary for UI textures, so in
    those cases, the `bypass sRGB` option is selected. If it doesn’t look quite right,
    try both options.


    For mipmapping, textures need to be square and have dimensions that are a power
    of two (POT), because mipmaps are generated at successively halved dimensions.
    For example, a 256 × 256 texture would have mipmaps at 128 × 128, 64 × 64, and
    so on. Even a nonmipmapped texture benefits from POT dimensions because that’s
    what the graphics hardware ultimately uses. Most textures designed for games have
    POT dimensions, but if they don’t, the texture’s import settings can automatically
    size the texture to the nearest POT. For GUI textures, you usually don’t want
    this. Your splash screen has `None` set for its `POT` scaling, and the resulting
    preview displays its original dimensions and NPOT. If you try to use it as a regular
    texture in the scene, Unity will issue a warning in the `Console` view that you’re
    using an NPOT texture in a non-GUI way and will incur a performance penalty.'
