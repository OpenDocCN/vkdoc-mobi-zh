  trans: '

    ### 缩放暂停菜单


    缩放暂停菜单的流程几乎相同。在`FuguPause`脚本的`OnGUI`函数开头，添加同样的`baseScreenWidth`公共变量以及设置`GUI.matrix`的代码（清单
    12-2）。


    ```

    var baseScreenWidth:float = 320.0; // iOS 目标屏幕宽度

    function OnGUI () {

    if (IsGamePaused()) {

    #if UNITY_IPHONE

    var guiScale:float = screenWidth/baseScreenWidth;

    GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity, Vector3(guiScale,
    guiScale, 1));

    #endif

    if (skin != null) {

    GUI.skin = skin;

    } else {

    GUI.color = hudColor;

    }

    switch (currentPage) {

    case Page.Main: ShowPauseMenu(); break;

    case Page.Options: ShowOptions(); break;

    case Page.Credits: ShowCredits(); break;

    }

    }

    }

    Listing 12-2.

    在 FuguPause.js 中缩放暂停菜单

    ```


    不过，还需要另一处修改。`BeginPage`函数使用`Screen.width`来居中 GUI，因此你需要改用`baseScreenWidth`。清单 12-3
    展示了这一代码变更。


    ```

    function BeginPage(width:int,height:int) {

    #if !UNITY_IPHONE

    GUILayout.BeginArea(Rect((Screen.width-width)/2,menutop,width,height));

    #else

    GUILayout.BeginArea(Rect((baseScreenWidth-width)/2,menutop,width,height));

    #endif

    }

    Listing 12-3.

    修改后的 BeginPage 函数以适配缩放后的 GUI

    ```


    注意这里使用了`#if !UNITY_IPHONE`。感叹号表示“非”，因此第一行实际代码适用于除 iOS 以外的所有构建目标，另一行则仅用于 iOS。你也可以调换这两行代码的顺序，以`#if
    UNITY_IPHONE`开头。


    借此机会，你应当从暂停菜单中移除“退出”按钮，因为苹果会拒绝任何提供退出选项的应用。`FuguPause`脚本中`ShowPauseMenu`函数的“退出”按钮已经通过检查`UNITY_WEBPLAYER`预处理定义，从
    Unity Web 播放器构建中排除了，因此你只需再添加`UNITY_IPHONE`的检查即可（清单 12-4）。


    ```

    function ShowPauseMenu() {

    BeginPage(150,300);

    if (GUILayout.Button ("继续")) {

    UnPauseGame();

    }

    if (GUILayout.Button ("选项")) {

    currentPage = Page.Options;

    }

    if (GUILayout.Button ("制作人员")) {

    currentPage = Page.Credits;

    }

    #if !UNITY_IPHONE && !UNITY_WEBPLAYER

    if (GUILayout.Button ("退出")) {

    Application.Quit();

    }

    #endif

    EndPage();

    }

    Listing 12-4.

    从 FuguPause.js 的 iOS 构建中排除退出按钮

    ```


    只有当构建目标既不是 iOS 也不是 Web 播放器时（即`#if !UNITY_IPHONE && !UNITY_WEBPLAYER`条件为真），退出按钮才会被包含在构建中。现在构建游戏，你应该能在设备（或
    iOS 模拟器）上看到暂停菜单会根据屏幕分辨率放大显示，并且没有退出按钮，如图 12-4 中 iPhone 4 的截图所示。


    ![A310332_2_En_12_Fig4_HTML.jpg](img/A310332_2_En_12_Fig4_HTML.jpg)


    Figure 12-4.

    缩放后的暂停菜单


    ## 设置图标


    默认情况下，应用的图标会是 Unity 标志。图 12-6 展示了 Unity Technologies 在 App Store 上发布的几个演示应用的图标。


    如果现在进行构建，由于你未在 iOS 播放器设置中选择“已渲染图标”，苹果会自动为图标添加光泽效果。


    要自定义图标，你可以将任意纹理拖入播放器设置的“默认图标”字段中。让我们使用从本章项目文件（可在[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)获取）`Textures`文件夹中复制的`Icon1024`纹理。我通常会在文件名中注明原始纹理尺寸（此处为
    1024 × 1024 纹理），这能为分配图标和启动画面纹理节省大量时间。


    由于你将纹理用作图标，应当适当调整导入设置。


    在项目视图中选择`Icon1024`纹理，然后在检查器视图中，将`纹理类型`设置为`GUI`而非`Texture`（图 12-5）。这将防止 Unity 应用适合
    3D 模型纹理但不适合 GUI 显示的设置。例如，用于模型的纹理尺寸应为 2 的幂，如 256 × 256 或 512 × 512，因为这是图形硬件所偏好的运算尺寸，而且纹理无论如何都会在模型上拉伸。但
    GUI 纹理通常应保持原始分辨率，因为它们通常根据预期显示尺寸来设定（通常不是 2 的幂分辨率）。你可以将`纹理类型`切换为`高级`，来比较`Texture`和`GUI`预设纹理类型下的实际设置（例如，先选择`Texture`，然后切换到`高级`；再选择`GUI`并切换到`高级`）。在`高级`模式下，你可以覆盖任何预设值，以便更精细地控制导入设置。


    ![A310332_2_En_12_Fig5_HTML.jpg](img/A310332_2_En_12_Fig5_HTML.jpg)


    Figure 12-5.

    图标纹理的导入设置


    提示


    如果你要将一个纹理用于两种不同用途，请复制一份，以便为它们应用不同的导入设置。


    在`纹理类型`区域下方，可以指定纹理的最大尺寸和压缩级别。如果你将压缩过的纹理用作图标，Unity 会在构建时生成警告，正确指出压缩纹理作为图标可能效果不佳。选择`默认`选项卡，以便这些设置适用于所有平台（除非被覆盖），将`最大尺寸`设置为`1024`以避免纹理被缩放，并将`格式`设置为`真彩色`以获得全彩分辨率且无压缩。点击`应用`以调整后的设置重新导入纹理，底部预览区域将反映新的格式、尺寸和内存占用。


    现在，将图标纹理拖入跨平台区域播放器设置的`默认图标`字段中。查看 iOS 设置的图标折叠面板（图 12-6）。只要未勾选“覆盖 iPhone”复选框，默认图标会自动缩放以适配所有其他图标尺寸（图
    12-6）。


    ![A310332_2_En_12_Fig6_HTML.jpg](img/A310332_2_En_12_Fig6_HTML.jpg)


    Figure 12-6.

    播放器设置中默认图标缩放为不同尺寸的图标


    不同的图标尺寸对应不同 iOS 设备的屏幕分辨率：


    *   57 × 57：第四代之前的任何 iPhone 或 iPod touch（iPhone 3GS 或第三代 iPod touch）

    *   114 × 114：第四代及以后的 iPod touch 和 iPhone

    *   72 × 72：初代 iPad、iPad 2 和 iPad Mini

    *   144 × 144：“新”iPad（或者按我的叫法，iPad 3）


    理想情况下，每个尺寸都应该有专属的图标，这时你需要勾选`覆盖`复选框，然后将不同版本的图标拖入相应的方框。任何未填充的方框都会使用`默认图标`文件。但 Unity
    在缩放纹理方面表现出色（向下缩放远优于向上缩放），因此我经常重复使用上传到 iTunes Connect 应用描述的同一张 1024 × 1024 纹理。


    提示


    如果你没有为 iTunes Connect 和播放器设置使用相同的图标文件，请确保各个图标至少看起来相似。我曾有一个应用因为 iTunes Connect
    中的图标与设备上显示的应用图标不相似而被拒绝。


    我建议你始终选择`已渲染图标`选项，以避免苹果自动添加光泽效果。


    除了可选的光泽效果，通过 Xcode 执行的构建部分还会自动为图标圆角并添加投影。所以，不要自己做这些事！只需保持正方形、直角且无特殊边框即可。


    '
- fmt: '# Set the Splash Screen


    All iOS apps display a static “splash” screen on startup. Like the default app
    icon, the splash screen in many Unity-built apps shows the Unity logo (Figure
    [12-7](#A310332_2_En_12_Chapter.html#Fig7)).


    ![A310332_2_En_12_Fig7_HTML.jpg](Images/A310332_2_En_12_Fig7_HTML.jpg)

    Figure 12-7. The default Unity splash screen


    Unless you have the Plus or Pro version of Unity, it is not possible to change
    the Unity splash screen. However, if you use the Personal edition, you can add
    a splash image. The Splash Image foldout is located beneath the Icon foldout in
    the iOS settings, and as with the icon selection, it has slots for multiple resolutions
    appropriate for the various iOS screens and also for both portrait and landscape
    orientations (Figure [12-8](#A310332_2_En_12_Chapter.html#Fig8)):


    ![A310332_2_En_12_Fig8_HTML.jpg](Images/A310332_2_En_12_Fig8_HTML.jpg)

    Figure 12-8. Splash screens for different screen resolutions and orientations


    - Mobile splash screen: 320 × 480 for any iPod touch or iPhone preceding the fourth
    generation (i.e., the iPhone 4)

    - iPhone 3.5"/Retina: 640 × 960 for the Retina display of the iPhone 4, iPhone
    4S, and fourth-generation iPod touches

    - iPhone 4"/Retina: 640 × 1136 for the iPhone 5 and fifth-generation iPod touch

    - iPhone 4.7"/ Retina: 750 × 1334 for the iPhone 6

    - iPhone 5.5"/Retina: 1242 × 2208 for the iPhone 6 Plus and newer

    - iPhone 5.5" Landscape /Retina: 2208 × 1242 for the iPhone 6 Plus and newer

    - iPad Portrait: 768 × 1024 for the original iPad and the iPad 2

    - iPad Landscape: 1024 × 768 for the original iPad and the iPad 2

    - iPad Portrait/Retina: 1536 × 2048 for the Retina display of the new iPad (the
    iPad 3 and newer)

    - iPad Landscape/Retina: 2048 × 1536 for the Retina display of the new iPad (the
    iPad 3 and newer)


    There is no single default splash screen that Unity will automatically resize
    for all the splash resolutions, so you have to populate the splash screen boxes
    for the resolutions and orientations that your game will use. Since only the Portrait
    orientation is selected in the Resolution and Presentation settings, only the
    portrait splash screens need to be assigned. Like icons, the splash screens can
    be any textures, and Unity will scale them as needed, but you’ll get the best
    results with textures that are already the target size. You’ll want to use something
    appropriate for your company and game.


    Note


    Apple recommends that the splash screen resemble an actual screen of your game,
    but it’s typical to just present a company logo. Personally, I think it’s confusing
    to have a screen that acts like an unresponsive game screen.


    Drag each splash screen texture from the Textures folder into the matching Splash
    screen box in the player settings (Figure [12-8](#A310332_2_En_12_Chapter.html#Fig8)),
    meaning `Fugu320×480` into `Mobile Splash Screen`, `Fugu640×960` into `iPhone
    3.5"/Retina`, and `Fugu1536×2048` into `High Res. iPad Portrait`. The `iPhone
    4"/Retina` item needs a texture, so drag the closest match, `Fugu640×9` into it.
    And `Fugu1536×2048` can be used for `iPad Portrait`.


    # Create a Second Splash Screen


    Although you can’t change the splash screen in Unity iOS Basic, you can make a
    splash screen that appears right after the built-in one. You just need to make
    a scene that displays the splash texture on the screen for a few seconds and then
    loads the first game scene. This can also be useful with the Plus and Pro versions
    of Unity if you want to have more than one splash screen. For example, in HyperBowl
    I have some HyperBowl artwork displayed by the built-in splash screen and then
    my Fugu Games logo in the second splash screen.


    ## Create the Splash Scene


    Invoke the `New Scene` command from the `File` menu to create a new empty scene.
    Save it as `Splash`. Bring up the `Build Settings` window and click `Add Open
    Scenes` to add the new scene to your build. It will appear at the bottom of the
    list of scenes, so drag it up to the top. Its scene index should now display as
    0, meaning it’s the first scene loaded (Figure [12-9](#A310332_2_En_12_Chapter.html#Fig9)).


    ![A310332_2_En_12_Fig9_HTML.jpg](Images/A310332_2_En_12_Fig9_HTML.jpg)

    Figure 12-9. The Build Settings with a splash scene added


    ## Create the Splash Screen


    The easiest way to display a full-screen texture is with a UI element (or user
    interaction). In the splash scene, go to the `GameObject` menu, select `UI`, and
    choose `Raw Image` (Figure [12-10](#A310332_2_En_12_Chapter.html#Fig10)).


    ![A310332_2_En_12_Fig10_HTML.jpg](Images/A310332_2_En_12_Fig10_HTML.jpg)

    Figure 12-10. Creating a UI image


    Rename the resulting `GameObject` to `Screen` and examine it in the Inspector
    view. The newly created image needs to be centered on the screen (Figure [12-11](#A310332_2_En_12_Chapter.html#Fig11)).
    Unlike `GUITexture`, `RawImage` uses normalized screen coordinates: `x` and `y`
    range from 0 to 1, where `0,0` is the top-left corner of the screen and `1,1`
    is the bottom right, so setting `x` and `y` to `0.5` specifies that the texture
    is centered on the screen.


    ![A310332_2_En_12_Fig11_HTML.jpg](Images/A310332_2_En_12_Fig11_HTML.jpg)

    Figure 12-11. A default GUITexture


    You have positioned your image at `0,0,0` and made it `400 × 400`. Drag a texture
    from the Textures folder in the Project view into the Texture field of the `RawImage`
    component. To make the texture stretch across the entire screen, change the scale
    to `1,1,1` (Figure [12-12](#A310332_2_En_12_Chapter.html#Fig12)).


    ![A310332_2_En_12_Fig12_HTML.jpg](Images/A310332_2_En_12_Fig12_HTML.jpg)

    Figure 12-12. A full-screen UI


    Now if you run the game, you’ll see the splash texture on your screen. When running
    on a device or the iOS simulator, the splash texture will appear after the built-in
    splash screen (Figure [12-13](#A310332_2_En_12_Chapter.html#Fig13)).


    ![A310332_2_En_12_Fig13_HTML.jpg](Images/A310332_2_En_12_Fig13_HTML.jpg)

    Figure 12-13. The secondary splash screen'
