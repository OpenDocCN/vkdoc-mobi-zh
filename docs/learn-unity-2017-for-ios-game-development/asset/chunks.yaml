- fmt: '### Making Prefabs


    A prefab is a special type of asset created by cloning a `GameObject`. The prefab
    can then be used to create identical copies of that `GameObject`. In that sense,
    Unity prefabs are like prefabricated housing but better. If you make a change
    to one instance of a prefab, you can have that change automatically propagate
    to all other instances of the prefab.


    First, in keeping with our asset organization, create a new folder in the Project
    view named `Prefabs`. Then, with the `Prefabs` folder selected, click `Prefab`
    on the Create menu in the Project view to create an empty prefab in that folder.
    You can then fill out the prefab by dragging the cube from the Hierarchy view
    onto the empty prefab. Alternatively, instead of starting with an empty prefab,
    you can just drag the cube directly into the `Prefabs` folder, and a prefab will
    automatically be created and named after the original `GameObject` (Figure [4-23](#A310332_2_En_4_Chapter.html#Fig23)).


    ![A310332_2_En_4_Fig23_HTML.jpg](Images/A310332_2_En_4_Fig23_HTML.jpg)


    Figure 4-23. The Project view of the Cube prefab


    You can now drag the prefab into the Hierarchy view every time you want to create
    a new cube that looks just like the original cube `GameObject`. But instead of
    having multiple independent cubes in the scene, let’s add some cubes as children
    of the existing cube. Drag the prefab directly onto the cube in the Hierarchy
    view twice, and you’ll now have two new cubes underneath Cube. In the Inspector
    view (Figure [4-24](#A310332_2_En_4_Chapter.html#Fig24)), you can see the new
    cubes are identical to the first cube, featuring the same components and component
    properties. Let’s name the new cubes `child1` and `child2` (by the way, this is
    a good time to try the Lock feature of the Inspector view so you can inspect two
    `GameObjects` at the same time).


    ![A310332_2_En_4_Fig24_HTML.jpg](Images/A310332_2_En_4_Fig24_HTML.jpg)


    Figure 4-24. Editing the child Cube


    As the children of cube, the positions of `child1` and `child2` displayed in the
    Inspector view are relative to the position of their parent, Cube. This means
    if a child cube has position `(0,0,0)`, it is in the exact same position as its
    parent. So, let’s set the positions of `child1` and `child2` to `(2,0,0)` and
    `(-2,0,0)`. The two child cubes now are spaced out from their parent cube like
    satellite cubes (Figure [4-25](#A310332_2_En_4_Chapter.html#Fig25)).


    ![A310332_2_En_4_Fig25_HTML.jpg](Images/A310332_2_En_4_Fig25_HTML.jpg)


    Figure 4-25. Scene view of the cube and its child Cubes


    Before you click Play, change the `FuguRotate` script to the simple `transform.Rotate`
    call (Listing [4-9](#A310332_2_En_4_Chapter.html#Par85)). Now when you click Play,
    the main cube rotates as before, and the child cubes follow around like the spokes
    in a wheel. The child cubes also spin around their own axes since they’re running
    their own copies of the `FuguRotate` script (all three cubes would rotate around
    the same world origin if you had supplied `Space.World` in the `Transform.Rotate`
    call).


    ```

    #pragma strict

    var speed:float = 10.0; // controls how fast we rotate

    function Start () {

    var object:GameObject = this.gameObject;

    Debug.Log("Start called on GameObject "+object.name);

    // rotate around the object''s y axis

    function Update () {

    //Debug.Log("Update called at time "+Time.time);

    transform.Rotate(Vector3.up*speed*Time.deltaTime);

    }

    Listing 4-9.

    FuguRotate.js Reverted to Rotation in Update

    ```


    Change the `FuguRotate` speed property for `child2` from 10 to 50, click Play,
    and you will see that cube spins faster than the others. You can easily make the
    same change in `child1`, but imagine if you had 50 cubes to change. That would
    be tedious! This is where the power of prefabs comes in. Select `child2` and then
    invoke `Apply Changes To Prefab` in the GameObject menu (Figure [4-26](#A310332_2_En_4_Chapter.html#Fig26)).


    ![A310332_2_En_4_Fig26_HTML.jpg](Images/A310332_2_En_4_Fig26_HTML.jpg)


    Figure 4-26. Applying changes to a prefab


    Now `child1` is identical to `child2` again (except for the name and position,
    which Unity reasonably assumes you don’t want the same in every instance of the
    prefab). When you click Play, the child cubes are now spinning at the same faster
    speed.


    ### Breaking Prefabs


    But the main cube is also spinning faster because of the updated rotation speed.
    If that isn’t what you intended, you can change the cube’s speed back to 10, and
    then to ensure that you don’t propagate changes in the child cubes to the main
    cube, you can select the main cube and invoke `Break Prefab Instance` in the GameObject
    menu (Figure [4-27](#A310332_2_En_4_Chapter.html#Fig27)).


    ![A310332_2_En_4_Fig27_HTML.jpg](Images/A310332_2_En_4_Fig27_HTML.jpg)


    Figure 4-27. Breaking a prefab instance


    Now the cube no longer has a relation to the prefab, and any change to the child
    cubes will not be propagated to the cube.


    ## Explore Further


    The scene has evolved from pretty and static to pretty and dynamic, merely with
    the addition of simple scripted movement. You’ll jazz up the scene some more in
    the next chapter with animation and sound, but the major milestone you’ve reached
    at this point really is learning how to create, edit, and debug scripts. From
    now until the end of the book, you’ll be adding scripts, so get used to it!


    ### Unity Manual


    The “Building Scenes” section of the Unity Manual has two pages relevant to the
    work in this chapter—a description of prefabs in the “Prefabs” section and a good
    explanation in the “Component-Script Relationship” section.


    The one new type of asset introduced in this chapter (besides prefabs) is the
    script. The “Using Scripts” page in the “Asset Import and Creation” section introduces
    the basic concepts covered in the rotation script—creating a script, attaching
    it to a `GameObject`, printing to the Console view (using the `print` function
    instead of `Debug.Log` as you did), declaring a variable, and even applying a
    rotation in the `Update` function.


    It’s worth mentioning the “Transforms” page again since your rotation script is
    in the business of modifying `Transform` components. That page also describes
    the parent–child `GameObject` relationship, which technically is among transforms,
    but since there’s a one-to-one relationship between `GameObjects` and transforms,
    it’s less confusing to think of the linkage among `GameObjects`, as displayed
    in the Hierarchy view.


    We dipped into one advanced topic in this chapter—debugging. The “Debugging” section
    describes the Console view, the MonoDevelop debugger, and where to find log files
    on your file system.


    ### Scripting Reference


    I’ve mentioned two of the three main pieces of official Unity documentation so
    far—the Unity Manual and the Reference Manual. The third piece is the Scripting
    Reference. This chapter presented your first foray into scripting, so everything
    in the “Scripting Overview” section of the Scripting Reference is worth reading
    at this point. The “Runtime Classes” list illuminates the inheritance relationship
    among the Unity classes. After that, I recommend making frequent use of the search
    box on that page anytime you see anything in a script you don’t recognize (or
    even if you do recognize it, if you haven’t read its documentation).'
