- fmt: '### Scene View Gizmos


    The `Gizmos` button on the right activates displays of diagnostic graphics associated
    with the Components. The Scene View in Figure [2-42](#A310332_2_En_2_Chapter.html#Fig42)
    shows several gizmos. By clicking the `Gizmos` button and checking the list of
    available gizmos, you can see those icons represent a `Camera`, a couple of `AudioSources`,
    and a few `Lights`.


    ![A310332_2_En_2_Fig42_HTML.jpg](Images/A310332_2_En_2_Fig42_HTML.jpg)


    Figure 2-42. Gizmos in the Scene View


    You can select and deselect the various check boxes in the Gizmos window to focus
    on the objects you’re interested in. The check box at the top left toggles between
    a 3D display of the gizmos or just 2D icons. The adjacent slider controls the
    scale of the gizmos (so a quick way to hide all gizmos is to drag the scale slider
    all the way to the left).


    ## The Game View


    Now let’s go back to the Game View, which you encountered when playing Climber
    in the Editor. Like the Hierarchy View and Scene View, the Game View depicts the
    current scene, but not for editing purposes. Instead, the Game View is intended
    for playing and debugging the game.


    The Game View appears automatically when you click the `Play` button at the top
    of the Unity Editor window. If there isn’t an existing Game View when you click
    `Play`, a new one is created. If the Game view is visible while the Editor is
    not in Play mode, it shows the game in its initial state (i.e., from the vantage
    of the initial `Camera` position).


    The Game View shows how the game will look and function when you actually deploy
    it, but there may be discrepancies from how it will look and behave on the final
    build target. One possible difference is the size and aspect ratio of the Game
    View. This can be changed using the menu at the top left of the view. Figure [2-43](#A310332_2_En_2_Chapter.html#Fig43)
    shows what happens when you switch from the `Free Aspect` ratio, which adjusts
    to the dimensions of the view, to a 5:4 aspect ratio, which results in the scaling
    down the game display so that it fits within the area and maintains the chosen
    aspect ratio.


    ![A310332_2_En_2_Fig43_HTML.jpg](Images/A310332_2_En_2_Fig43_HTML.jpg)


    Figure 2-43. The Game view


    ### Maximize on Play


    Clicking the `Maximize on Play` button will result in the Game view expanding
    to fill the entire Editor window when it is in the Play mode (Figure [2-44](#A310332_2_En_2_Chapter.html#Fig44)).
    If the view is detached from the Editor window, the button has no effect.


    ![A310332_2_En_2_Fig44_HTML.jpg](Images/A310332_2_En_2_Fig44_HTML.jpg)


    Figure 2-44. Game view with Maximize on Play


    ### Stats


    The `Stats` button displays statistics about the scene (Figure [2-45](#A310332_2_En_2_Chapter.html#Fig45))
    that update as the game runs.


    ![A310332_2_En_2_Fig45_HTML.jpg](Images/A310332_2_En_2_Fig45_HTML.jpg)


    Figure 2-45. Game view with Stats


    ### Game View Gizmos


    The `Gizmos` button activates displays of diagnostic graphics associated with
    the Components. The Game View in Figure [2-46](#A310332_2_En_2_Chapter.html#Fig46)
    shows two icons that are gizmos for an Audio Source. The list to the right of
    the `Gizmos` button allows you to select which gizmos you want displayed.


    ![A310332_2_En_2_Fig46_HTML.jpg](Images/A310332_2_En_2_Fig46_HTML.jpg)


    Figure 2-46. Game View with Gizmos


    Both the Game View and Scene View are both depictions of the current scene. A
    Unity project consists of one or more scenes, and the Unity Editor has one scene
    open at a time. Think of the project as a game and the scenes as levels (in fact,
    some Unity script functions that operate on scenes use “level” in their names).
    Unity GameObjects are made interesting by attaching Components, each of which
    provides some specific information or behavior. That’s where the Inspector View
    comes in. If you select a game object in the Hierarchy View or Scene View, the
    Inspector View will display its attached components.


    ## The Console View


    The remaining view in all the preset layouts, the Console View, is easy to ignore
    but it’s pretty useful (Figure [2-47](#A310332_2_En_2_Chapter.html#Fig47)).


    ![A310332_2_En_2_Fig47_HTML.jpg](Images/A310332_2_En_2_Fig47_HTML.jpg)


    Figure 2-47. The Console view


    Informational, warning and error messages appear in the Console View. Errors are
    in red, warnings in yellow, and informational messages in white. Selecting a message
    from the list displays it with more detail in the lower area. Also, the single-line
    area at the bottom of the Unity Editor displays the most recent Console message,
    so you can always see that a message has been logged even if the Console view
    is not visible.


    Tip: Warning messages are easy to ignore, but you ignore them at your peril. They
    are there for a reason and usually indicate something has to be resolved. And
    if you let warnings accumulate, it’s difficult to notice when a really important
    warning shows up.


    The Console can get cluttered pretty quickly. You can manage that clutter with
    the leftmost three buttons on top of the Console View. The `Clear` toggle button
    removes all the messages. The `Collapse` toggle button combines similar messages.
    The `Clear on Play` toggle will remove all messages each time the Editor enters
    Play mode.


    The `Error Pause` button will cause the Editor to halt on an error message, specifically
    when a script calls `Log.LogError`.


    While operating in the Editor, log messages end up in the Editor log, while messages
    generated from a Unity-built executable are directed to the Player log. Selecting
    `Open Player Log` or `Open Editor Log` from the view menu (click the little icon
    at the top right of the Console View) will bring up those logs, either in a text
    file or in the Console app (Figure [2-48](#A310332_2_En_2_Chapter.html#Fig48)).


    ![A310332_2_En_2_Fig48_HTML.jpg](Images/A310332_2_En_2_Fig48_HTML.jpg)


    Figure 2-48. The Unity logs in the Mac Console app


    ## Explore Further


    We’ve come to the end of this Unity tour and our play time with Climber demo.
    Beginning with the next chapter, you’ll be creating Unity projects from scratch
    to learn the game engine features. But this won’t be the last you’ll see of Climber,
    as we’ll return to that project in Chapters [10](../Text/A310332_2_En_10_Chapter.html)
    and [11](../Text/A310332_2_En_11_Chapter.html), repeating this process to introduce
    Unity iOS development. Until then, starting with the next chapter, you’ll be creating
    Unity projects from scratch and exploring general and mostly cross-platform Unity
    game engine features.


    This is the first chapter that really starts using Unity. You haven’t yet started
    building your own scene (that will begin in Chapter [3](../Text/A310332_2_En_3_Chapter.html)),
    but you’ve utilized the sample Climber project installed with Unity to get familiar
    with the Unity Editor. From this point on, there are plenty of official Unity
    resources that expand on the topics I will be covering.


    ### Unity Manual


    As you can see, there’s a lot of Unity user interface, and we’ve hardly covered
    it all. This is a good time to get serious about reading the Unity Manual, either
    from within the Unity Editor (the Welcome screen or the `Help` menu) or on the
    Unity web site ( [`http://unity3d.com/`](http://unity3d.com/) ) under the `Learn`
    tab in the “Documentation” section. The web version is pretty handy when you want
    to look something up or just read about Unity without having a Unity Editor running
    nearby.


    Most of what was covered in this chapter matches topics in the Unity Basics section
    of the Unity Manual, particular the sections on “Learning the Interface,” “Customizing
    Your Workspace,” “Publishing Builds,” and “Unity Hotkeys” (although I think a
    better reference is just to check the keyboard shortcuts listed in the menus).


    I did jump ahead into the Advanced section of the Unity Manual and touch on Unity’s
    support for version control. That’s covered more in depth with the Unity Manual’s
    page on “Using External Version Control with Unity.”'
