  trans: '

    # 添加音乐


    没有音乐的舞蹈演示是不完整的。幸运的是，Asset Store 中有大量免费音乐。我个人经常使用的一个音乐包是 Gianmarco Leone 的 *General
    Music Set*。在 `Project` 视图的搜索框中输入 `general music`，该包中的所有音频片段都会出现在搜索结果中（图 5-21）。点击任意一个，然后从
    `Inspector` 视图中导入该包。


    ![A310332_2_En_5_Fig21_HTML.jpg](img/A310332_2_En_5_Fig21_HTML.jpg)


    图 5-21. 在 Asset Store 中搜索 General Music Set


    在音频片段安装到 `Project` 视图中后（图 5-22），从 Joey 的 `Music` 中选择名为 `Tomorrow` 的音频片段。当然，你也可以自行决定安装哪首曲目。在
    `Inspector` 视图中（图 5-23），点击立体声波形显示上方的 `Play` 按钮，即可试听该音频片段。


    ![A310332_2_En_5_Fig23_HTML.jpg](img/A310332_2_En_5_Fig23_HTML.jpg)


    图 5-23. 音频片段的 Inspector 视图


    ![A310332_2_En_5_Fig22_HTML.jpg](img/A310332_2_En_5_Fig22_HTML.jpg)


    图 5-22. Music Files 音乐集的 Project 视图


    现在，你可以将音频片段添加到场景中了。只需将音频片段从 `Project` 视图拖拽到 `Hierarchy` 视图中，就会自动创建一个同名的 `GameObject`（图
    5-24）。


    ![A310332_2_En_5_Fig24_HTML.jpg](img/A310332_2_En_5_Fig24_HTML.jpg)


    图 5-24. 场景中的音频


    选中 `Tomorrow` 这个 `GameObject`，你会在 `Inspector` 视图中看到它带有一个 `AudioSource` 组件。在其属性中，包含对
    `Tomorrow` 的引用以及一个 `Play On Awake` 复选框。这指定了声音将在场景开始播放时立即播放。你还应该选中 `Loop` 复选框，这样歌曲就会像跳舞动画一样循环播放。由于这是背景音乐，请将
    `Spatial Blend` 设置为 `2D`。


    现在，当你点击 `Play` 时，就真正拥有了一场音乐舞蹈派对！


    # 进一步探索


    至此，我们与骷髅共舞的短暂插曲就告一段落了。在本书的剩余部分，你将专注于开发一个主要基于物理运动控制的保龄球游戏。但是，你应该已经感受到了成就感——用过去三章的时间，将一个简单的静态立方体场景演变成一个伴有音乐跳舞的骷髅场景，并且配备了粒子特效和动态阴影等炫酷的图形功能。炫酷功能往往在性能上代价高昂，请明智地使用它们！


    ## Unity 手册


    “Asset Import and Creation” 部分介绍了本章引入的两种新型资源：音频和动画。“Audio Files” 页面列出了 Unity 支持的音频格式，并描述了导入音频文件后生成的
    `AudioClip` 资源。在前几章，你只是浅尝了 Unity 手册中的 “Creating Gameplay” 部分，但现在你已经深入其中，添加了 “Particles”、“Legacy
    Animation System” 和 “Sound” 等页面中描述的内容。此外，Mecanim 动画系统是 Unity 动画的未来，因此阅读 “Mecanim
    Animation System” 部分是很有价值的。


    使用动态阴影是一个大话题。Unity 手册的 “Advanced” 部分在 “Shadows in Unity” 一节中进行了详尽阐述，涵盖了 “Directional
    Shadows”、“Troubleshooting Shadows” 和 “Shadow Size Computation”。


    ## 参考手册


    参考手册的 “Animation” 部分包含 “Animation Component” 和 “Animation Clip” 页面，涵盖了 Legacy
    动画系统所使用的那些资源。该部分还包含数个关于新 Mecanim 动画系统中使用的组件的页面。


    “Audio” 部分列出了为本章构建的跳舞场景添加音乐所需的音频组件；请参阅 “AudioListener”（通常自动附加到主摄像机上）和 “AudioSource”（附加到音源上）等节。此外，“Audio
    Filter Components” 部分列出了可以添加例如回声等效果的组件（这是一个 Pro 功能）。


    “Effects” 部分包含一个关于新的 Shuriken 粒子系统的页面，以及数个关于 Legacy 粒子系统的页面。


    参考手册还记录了各种设置管理器，包括 “Quality Settings” 页面，你曾用它来调整阴影质量，但它也会影响其他视觉质量元素，例如光照和粒子。


    ## Asset Store


    Asset Store 不仅提供了大量音频类别中的音乐，其中很多是免费的，还提供了播放音乐的脚本。如果你想在你的舞蹈场景中播放多首歌曲，可以编写一个脚本，使用
    `AudioSource` 类（用于播放和停止音乐）和 `AudioListener` 类（用于控制音量）中定义的 Unity 函数来播放固定顺序或随机顺序的歌曲。但更简单的方法是直接下载，例如，从
    Asset Store 下载 `Free Jukebox` 脚本（或者如果你愿意花点小钱，也可以下载 `Jukebox Pro`）。


    ## 计算机图形学


    我在第 3 章末尾提到了 *Real-Time Rendering* 这本书，针对你在本章中遇到的计算机图形学主题——动画、粒子效果和动态阴影——我再次推荐它。有许多专门关于角色动画的书籍，包括面向专业动画师的内容创作方面的书籍，例如
    George Maestri 的 *Digital Character Animation*。


    # 6. 开球吧！物理与操控


    终于，你准备好开始本书的主要 Unity 项目了——一个类似 HyperBowl 风格的保龄球游戏。HyperBowl 是我十多年前参与开发、仅几年前才移植到
    Unity 的一款街机/游乐场游戏。HyperBowl 拥有独特的“化身球球”玩法，玩家需要不断让球在 3D 环境中滚动，以到达球瓶处。本书构建的保龄球游戏会简单得多，但具有相同的控制风格。


    即使是这样一个简单的保龄球游戏也是一个重要的项目。它将包含物理、输入处理、摄像机控制、碰撞音效、游戏规则、分数显示以及开始/暂停菜单。这甚至还不包括为 iOS
    进行任何适配工作。本章仅专注于让一个球滚动起来，这需要一些物理设置，但只需要一个用于控制球的脚本。该脚本可在 [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    上本章的项目中找到。但它是一个相当简单的脚本，并且会在本章中逐步开发完成，所以最好跟着一起从零开始实现它。

    '
- fmt: '# Make a New Scene


    The dance scene in the previous chapter was really a modification of the original
    cube scene you started with in Chapter [3](../Text/A310332_2_En_3_Chapter.html),
    so you didn’t have create the entire scene from scratch again. The light and floor
    would be useful in the bowling game, so by the same token, you could continue
    modifying the cube scene and deactivate or remove the skeleton and music before
    adding content for the bowling game. But there’s no rule saying you can have only
    one scene in a project, so let’s leave the cube/dance scene intact and just make
    a copy of it to use as the beginnings of the bowling scene.


    From the previous chapter, you should have the Unity Editor still open to the
    dance (cube) scene. The quickest way to start working with a copy of this scene
    is to select “Save Scene as” in the `File` menu (Figure [6-1](#A310332_2_En_6_Chapter.html#Fig1)).


    ![A310332_2_En_6_Fig1_HTML.jpg](Images/A310332_2_En_6_Fig1_HTML.jpg)


    Figure 6-1. Saving the scene as a new scene


    This will be a bowling scene, so let’s name it `Bowl` (Figure [6-2](#A310332_2_En_6_Chapter.html#Fig2)).


    ![A310332_2_En_6_Fig2_HTML.jpg](Images/A310332_2_En_6_Fig2_HTML.jpg)


    Figure 6-2. The `Bowl` scene saved at the top level of `Assets`


    Note: To be consistent with the asset organization system, scenes would go into
    a `Scenes` folder, but if I have just one or a few scenes, I often just leave
    them saved at the top level of the `Assets` folder.


    Instead of using “Save Scene as,” you could have duplicated the scene by selecting
    it in the `Project` view and invoking `Duplicate` from the `Edit` menu (or the
    keyboard shortcut `Command+D`), then renamed the new scene, and finally switched
    to it by double-clicking the scene file.


    ## Delete GameObjects


    Now you can clean out anything from the scene that’s not needed for bowling without
    fear of mangling the dance scene. So, instead of deactivating the skeleton, just
    delete it by selecting the skeleton `GameObject` in the `Hierarchy` view and using
    the `Delete` command from the `Edit` menu (or the `Command+Delete` keyboard shortcut).
    Also, delete the cube hierarchy and `Caribbean Isle` `GameObject` (Figure [6-3](#A310332_2_En_6_Chapter.html#Fig3)),
    as cubes and music won’t be necessary for bowling, either.


    ![A310332_2_En_6_Fig3_HTML.jpg](Images/A310332_2_En_6_Fig3_HTML.jpg)


    Figure 6-3. Deleting unneeded `GameObject`s from the bowling scene


    ## Adjust the Light


    Once again, a little housekeeping is in order before starting work on the new
    scene. Let’s start with the color of the light. Beginning with white lights until
    all the assets are in the scene allows you to see everything in the full original
    colors. So, let’s change the light color to white by clicking in its `Color` field
    and selecting white in the color chooser (Figure [6-4](#A310332_2_En_6_Chapter.html#Fig4)).


    ![A310332_2_En_6_Fig4_HTML.jpg](Images/A310332_2_En_6_Fig4_HTML.jpg)


    Figure 6-4. Set the light color to white


    Also, since the point light was actually changed to a directional light in the
    previous chapter to support soft shadows, the name `Point Light` is misleading.
    This is a good time to change its name to just `Light`, which will keep your options
    open if you want to change its type again later.


    ## Retile the Floor


    The shiny patterned floor from the dance scene doesn’t look much like a bowling
    lane, so let’s change its appearance. This is an opportunity to try Unity’s support
    for procedural materials. Procedural materials use textures generated from algorithms
    instead of image files. This allows a lot of variation in the materials by tweaking
    the texture-generation parameters and also potentially offers space savings since
    the procedural materials don’t require loading image files as textures.


    Let’s try a procedural material for the floor. Search for `substance` in the `Asset
    Store` window (the `Project` view searches among individual assets, so in this
    case it won’t bring up any `Asset Store` results). A number of free substance
    packages from Mikołaj Spychał will appear in the `Asset Store` window (Figure
    [6-5](#A310332_2_En_6_Chapter.html#Fig5)).


    ![A310332_2_En_6_Fig5_HTML.jpg](Images/A310332_2_En_6_Fig5_HTML.jpg)


    Figure 6-5. The `Asset Store` results for `substance`


    The package you want is `Parquets – Substances`. Download and import that package,
    and a `Substances` archive (a file with the `.sbsar` extension) will show up in
    the `Project` view in a `Parquet01` folder (Figure [6-6](#A310332_2_En_6_Chapter.html#Fig6)).


    ![A310332_2_En_6_Fig6_HTML.jpg](Images/A310332_2_En_6_Fig6_HTML.jpg)


    Figure 6-6. The `Project` view of the `Substances` package


    The `Substances` folder contains a `ProceduralMaterial` asset (`ProceduralMaterial`
    is a subclass of `Material`) and a supporting texture and script. Clicking the
    right arrow of the `Parquet01` icon will change it to a left arrow and expand
    to show the procedural material of `WoodenParquet` followed by its associated
    textures (Figure [6-7](#A310332_2_En_6_Chapter.html#Fig7)).


    ![A310332_2_En_6_Fig7_HTML.jpg](Images/A310332_2_En_6_Fig7_HTML.jpg)


    Figure 6-7. An expanded view of the `WoodenParquet` from the `Substances` archive


    The `WoodenParquet` procedural material looks like an okay candidate for a bowling
    lane floor (mostly because it is for free), so drag the `WoodenParquet` procedural
    material (not the archive) to the plane in the `Hierarchy` view. You can see in
    the `Scene` view that the plane now has a wooden parquet floor (Figure [6-8](#A310332_2_En_6_Chapter.html#Fig8)).


    ![A310332_2_En_6_Fig8_HTML.jpg](Images/A310332_2_En_6_Fig8_HTML.jpg)


    Figure 6-8. The plane with the `WoodenParquet` procedural material


    The tiles look overly large, but you can adjust how the textures (there’s a main
    texture and a normal map texture) stretch across the plane by editing the `UV`
    scale fields of the textures. Select the plane in the `Hierarchy` view, and in
    the `Inspector` view set the `x` and `y` `Tiling` values (in the `Procedural Properties`
    section) of both textures to 5 instead of 1 (Figure [6-9](#A310332_2_En_6_Chapter.html#Fig9)).


    ![A310332_2_En_6_Fig9_HTML.jpg](Images/A310332_2_En_6_Fig9_HTML.jpg)


    Figure 6-9. The `Inspector` view of the plane with a procedural material


    Now the textures are tiled five times, where before you just had one (Figure [6-10](#A310332_2_En_6_Chapter.html#Fig10)).
    In the `Inspector` view, notice that you have a number of procedural properties
    you can play with to vary the appearance of the generated textures.


    ![A310332_2_En_6_Fig10_HTML.jpg](Images/A310332_2_En_6_Fig10_HTML.jpg)


    Figure 6-10. The plane with its `Tiling` values set to 5


    And as with the light, while you have the `Inspector` view up, this is a good
    time to change the name in the top text field and rename the plane to `Floor`
    to make its function more obvious.


    ## Reset the Camera


    The script attached to the `Main Camera` isn’t suitable for the bowling game,
    so you can disable that script. Better yet, remove the script entirely from the
    `Main Camera` by selecting the `Main Camera` in the `Hierarchy` view; then in
    the `Inspector` view, right-click the script component and select `Remove Component`
    (Figure [6-11](#A310332_2_En_6_Chapter.html#Fig11)).


    ![A310332_2_En_6_Fig11_HTML.jpg](Images/A310332_2_En_6_Fig11_HTML.jpg)


    Figure 6-11. Removing the script from the `Main Camera`


    While you’re at it, set the `Main Camera` position to `(6,1,-10)` and its rotation
    to `(0,-90,0)`. Now you should be looking at a nice floor and skyline and not
    much else (Figure [6-12](#A310332_2_En_6_Chapter.html#Fig12)).


    ![A310332_2_En_6_Fig12_HTML.jpg](Images/A310332_2_En_6_Fig12_HTML.jpg)


    Figure 6-12. The `Game` view with a fixed `Main Camera`


    ## Make a Ball


    Now the scene has a light, a flare, and a floor, as well as a `Main Camera` with
    a fixed viewpoint. It’s time to add the bowling ball.'
  raw: '## Make a New Scene


    The dance scene in the previous chapter was really a modification of the original
    cube scene you started with in Chapter [3](../Text/A310332_2_En_3_Chapter.html),
    so you didn’t have create the entire scene from scratch again. The light and floor
    would be useful in the bowling game, so by the same token, you could continue
    modifying the cube scene and deactivate or remove the skeleton and music before
    adding content for the bowling game. But there’s no rule saying you can have only
    one scene in a project, so let’s leave the cube/dance scene intact and just make
    a copy of it to use as the beginnings of the bowling scene.


    From the previous chapter, you should have the Unity Editor still open to the
    dance (cube) scene. The quickest way to start working with a copy of this scene
    is to select “Save Scene as” in the File menu (Figure [6-1](#A310332_2_En_6_Chapter.html#Fig1)).


    ![A310332_2_En_6_Fig1_HTML.jpg](Images/A310332_2_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Saving the scene as a new scene


    This will be a bowling scene, so let’s name it Bowl (Figure [6-2](#A310332_2_En_6_Chapter.html#Fig2)).


    ![A310332_2_En_6_Fig2_HTML.jpg](Images/A310332_2_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    The Bowl scene saved at the top level of Assets Note


    To be consistent with the asset organization system, scenes would go into a Scenes
    folder, but if I have just one or a few scenes, I often just leave them saved
    at the top level of the Assets folder.


    Instead of using “Save Scene as,” you could have duplicated the scene by selecting
    it in the Project view and invoking Duplicate from the Edit menu (or the keyboard
    shortcut Command+D), then renamed the new scene, and finally switched to it by
    double-clicking the scene file.


    ### Delete GameObjects


    Now you can clean out anything from the scene that’s not needed for bowling without
    fear of mangling the dance scene . So, instead of deactivating the skeleton, just
    delete it by selecting the skeleton GameObject in the Hierarchy view and using
    the Delete command from the Edit menu (or the Command+Delete keyboard shortcut).
    Also, delete the cube hierarchy and Caribbean Isle GameObject (Figure [6-3](#A310332_2_En_6_Chapter.html#Fig3)),
    as cubes and music won’t be necessary for bowling, either.


    ![A310332_2_En_6_Fig3_HTML.jpg](Images/A310332_2_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Deleting unneeded GameObjects from the bowling scene


    ### Adjust the Light


    Once again, a little housekeeping is in order before starting work on the new
    scene . Let’s start with the color of the light. Beginning with white lights until
    all the assets are in the scene allows you to see everything in the full original
    colors. So, let’s change the light color to white by clicking in its Color field
    and selecting white in the color chooser (Figure [6-4](#A310332_2_En_6_Chapter.html#Fig4)).


    ![A310332_2_En_6_Fig4_HTML.jpg](Images/A310332_2_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Set the light color to white


    Also, since the point light was actually changed to a directional light in the
    previous chapter to support soft shadows , the name Point Light is misleading.
    This is a good time to change its name to just Light, which will keep your options
    open if you want to change its type again later.


    ### Retile the Floor


    The shiny patterned floor from the dance scene doesn’t look much like a bowling
    lane, so let’s change its appearance . This is an opportunity to try Unity’s support
    for procedural materials. Procedural materials use textures generated from algorithms
    instead of image files. This allows a lot of variation in the materials by tweaking
    the texture-generation parameters and also potentially offers space savings since
    the procedural materials don’t require loading image files as textures.


    Let’s try a procedural material for the floor. Search for substance in the Asset
    Store window (the Project view searches among individual assets, so in this case
    it won’t bring up any Asset Store results). A number of free substance packages
    from Mikołaj Spychał will appear in the Asset Store window (Figure [6-5](#A310332_2_En_6_Chapter.html#Fig5)).


    ![A310332_2_En_6_Fig5_HTML.jpg](Images/A310332_2_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    The Asset Store results for substance


    The package you want is Parquets – Substances. Download and import that package,
    and a Substances archive (a file with the `.sbsar` extension) will show up in
    the Project view in a Parquet01 folder (Figure [6-6](#A310332_2_En_6_Chapter.html#Fig6)).


    ![A310332_2_En_6_Fig6_HTML.jpg](Images/A310332_2_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    The Project view of the Substances package


    The Substances folder contains a ProceduralMaterial asset (ProceduralMaterial
    is a subclass of Material) and a supporting texture and script. Clicking the right
    arrow of the Parquet01 icon will change it to a left arrow and expand to show
    the procedural material of WoodenParquet followed by its associated textures (Figure
    [6-7](#A310332_2_En_6_Chapter.html#Fig7)).


    ![A310332_2_En_6_Fig7_HTML.jpg](Images/A310332_2_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    An expanded view of the WoodenParquet from the Substances archive


    The WoodenParquet procedural material looks like an okay candidate for a bowling
    lane floor (mostly because it is for free), so drag the WoodenParquet procedural
    material (not the archive) to the plane in the Hierarchy view. You can see in
    the Scene view that the plane now has a wooden parquet floor (Figure [6-8](#A310332_2_En_6_Chapter.html#Fig8)).


    ![A310332_2_En_6_Fig8_HTML.jpg](Images/A310332_2_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    The plane with the WoodenParquet procedural material


    The tiles look overly large, but you can adjust how the textures (there’s a main
    texture and a normal map texture) stretch across the plane by editing the UV scale
    fields of the textures. Select the plane in the Hierarchy view, and in the Inspector
    view set the x and y Tiling values (in the Procedural Properties section) of both
    textures to 5 instead of 1 (Figure [6-9](#A310332_2_En_6_Chapter.html#Fig9)).


    ![A310332_2_En_6_Fig9_HTML.jpg](Images/A310332_2_En_6_Fig9_HTML.jpg)


    Figure 6-9.


    The Inspector view of the plane with a procedural material


    Now the textures are tiled five times, where before you just had one (Figure [6-10](#A310332_2_En_6_Chapter.html#Fig10)).
    In the Inspector view, notice that you have a number of procedural properties
    you can play with to vary the appearance of the generated textures.


    ![A310332_2_En_6_Fig10_HTML.jpg](Images/A310332_2_En_6_Fig10_HTML.jpg)


    Figure 6-10.


    The plane with its Tiling values set to 5


    And as with the light, while you have the Inspector view up, this is a good time
    to change the name in the top text field and rename the plane to Floor to make
    its function more obvious.


    ### Reset the Camera


    The script attached to the Main Camera isn’t suitable for the bowling game, so
    you can disable that script. Better yet, remove the script entirely from the Main
    Camera by selecting the Main Camera in the Hierarchy view; then in the Inspector
    view, right-click the script component and select Remove Component (Figure [6-11](#A310332_2_En_6_Chapter.html#Fig11)).


    ![A310332_2_En_6_Fig11_HTML.jpg](Images/A310332_2_En_6_Fig11_HTML.jpg)


    Figure 6-11.


    Removing the script from the Main Camera


    While you’re at it, set the Main Camera position to (6,1,-10) and its rotation
    to (0,-90,0). Now you should be looking at a nice floor and skyline and not much
    else (Figure [6-12](#A310332_2_En_6_Chapter.html#Fig12)).


    ![A310332_2_En_6_Fig12_HTML.jpg](Images/A310332_2_En_6_Fig12_HTML.jpg)


    Figure 6-12.


    The Game view with a fixed Main Camera


    ## Make a Ball


    Now the scene has a light, a flare, and a floor, as well as a Main Camera with
    a fixed viewpoint. It’s time to add the bowling ball .'
  trans: '

    # 创建新场景


    上一章中的舞蹈场景实际上是对第 3 章中最初创建的立方体场景的修改，因此你无需从头开始重新创建整个场景。灯光和地面在保龄球游戏中也会用到，同理，你也可以继续修改立方体场景，并在添加保龄球游戏内容之前停用或移除骨骼和音乐。不过，并没有规定一个项目中只能有一个场景，因此让我们保留立方体/舞蹈场景不变，直接复制一份作为保龄球场景的起点。


    根据上一章的内容，你的 Unity 编辑器应该仍然打开着舞蹈（立方体）场景。要开始处理此场景的副本，最快的方法是选择 `File` 菜单中的"Save Scene
    as"（图 6-1）。


    ![A310332_2_En_6_Fig1_HTML.jpg](img/A310332_2_En_6_Fig1_HTML.jpg)


    图 6-1. 将场景另存为新场景


    这将是保龄球场景，因此我们将其命名为 `Bowl`（图 6-2）。


    ![A310332_2_En_6_Fig2_HTML.jpg](img/A310332_2_En_6_Fig2_HTML.jpg)


    图 6-2. 保存在 `Assets` 根目录下的 `Bowl` 场景


    注意：为了与资源组织系统保持一致，场景应放入 `Scenes` 文件夹中，但如果我只有一个或几个场景，我通常会将它们直接保存在 `Assets` 文件夹的根目录下。


    除了使用"Save Scene as"，你也可以通过在 `Project` 视图中选择场景，然后从 `Edit` 菜单中选择 `Duplicate`（或使用键盘快捷键
    `Command+D`）来复制场景，接着重命名新场景，最后双击该场景文件切换到它。


    ## 删除游戏对象


    现在，你可以清理场景中保龄球不需要的任何内容，而无需担心损坏舞蹈场景。因此，与其停用骨骼，不如直接在 `Hierarchy` 视图中选中骨骼 `GameObject`，并使用
    `Edit` 菜单中的 `Delete` 命令（或 `Command+Delete` 键盘快捷键）将其删除。同时，删除立方体层级结构和 `Caribbean
    Isle` `GameObject`（图 6-3），因为立方体和音乐在保龄球中也不需要。


    ![A310332_2_En_6_Fig3_HTML.jpg](img/A310332_2_En_6_Fig3_HTML.jpg)


    图 6-3. 从保龄球场景中删除不需要的 `GameObject`


    ## 调整灯光


    同样，在开始处理新场景之前，还需要做一点整理工作。先从灯光颜色开始。在所有资源都放入场景之前使用白色灯光，可以让你看到所有物品的原始颜色。因此，让我们点击灯光属性的
    `Color` 字段，并在颜色选择器中选择白色，将灯光颜色改为白色（图 6-4）。


    ![A310332_2_En_6_Fig4_HTML.jpg](img/A310332_2_En_6_Fig4_HTML.jpg)


    图 6-4. 将灯光颜色设置为白色


    另外，由于上一章中为了支持柔和阴影，点光源实际上已被更改为方向光，因此 `Point Light` 这个名称会产生误导。现在是一个将其重命名为 `Light`
    的好时机，这样如果你以后想再次更改其类型，也能保持灵活性。


    ## 重新铺设地面


    舞蹈场景中闪亮图案的地板看起来不太像保龄球道，所以让我们改变它的外观。这是一个尝试 Unity 对程序化材质支持的好机会。程序化材质使用通过算法生成的纹理，而不是图像文件。这允许通过调整纹理生成参数来实现材质的多样化，并且还可能节省空间，因为程序化材质不需要加载图像文件作为纹理。


    让我们尝试为地面使用一种程序化材质。在 `Asset Store` 窗口中搜索 `substance`（`Project` 视图是在单个资源中搜索，所以在这种情况下它不会显示任何
    `Asset Store` 结果）。`Asset Store` 窗口中将出现许多来自 Mikołaj Spychał 的免费 substance 包（图 6-5）。


    ![A310332_2_En_6_Fig5_HTML.jpg](img/A310332_2_En_6_Fig5_HTML.jpg)


    图 6-5. `Asset Store` 中 `substance` 的搜索结果


    你需要的包是 `Parquets – Substances`。下载并导入该包后，一个 `Substances` 存档（扩展名为 `.sbsar` 的文件）将出现在
    `Project` 视图的 `Parquet01` 文件夹中（图 6-6）。


    ![A310332_2_En_6_Fig6_HTML.jpg](img/A310332_2_En_6_Fig6_HTML.jpg)


    图 6-6. `Substances` 包的 `Project` 视图


    `Substances` 文件夹包含一个 `ProceduralMaterial` 资源（`ProceduralMaterial` 是 `Material`
    的子类），以及一个配套的纹理和脚本。点击 `Parquet01` 图标右侧的箭头，它会变成左箭头并展开，显示 `WoodenParquet` 的程序化材质及其关联的纹理（图
    6-7）。


    ![A310332_2_En_6_Fig7_HTML.jpg](img/A310332_2_En_6_Fig7_HTML.jpg)


    图 6-7. 从 `Substances` 存档中展开查看 `WoodenParquet`


    `WoodenParquet` 程序化材质看起来是保龄球道地板的一个不错的选择（主要是因为它是免费的），所以将 `WoodenParquet` 程序化材质（不是存档）拖到
    `Hierarchy` 视图中的平面上。你可以在 `Scene` 视图中看到，现在该平面有了一个木制镶木地板（图 6-8）。


    ![A310332_2_En_6_Fig8_HTML.jpg](img/A310332_2_En_6_Fig8_HTML.jpg)


    图 6-8. 应用了 `WoodenParquet` 程序化材质的平面


    瓷砖看起来过大，但你可以通过编辑纹理的 `UV` 缩放字段来调整纹理（有一个主纹理和一个法线贴图纹理）在平面上的拉伸方式。在 `Hierarchy` 视图中选择平面，然后在
    `Inspector` 视图中将两个纹理的 `x` 和 `y` 的 `Tiling` 值（在 `Procedural Properties` 部分）从 1
    设置为 5（图 6-9）。


    ![A310332_2_En_6_Fig9_HTML.jpg](img/A310332_2_En_6_Fig9_HTML.jpg)


    图 6-9. 应用了程序化材质的平面的 `Inspector` 视图


    现在纹理被平铺了五次，而之前只有一次（图 6-10）。在 `Inspector` 视图中，请注意你有很多程序化属性可以调整，以改变生成纹理的外观。


    ![A310332_2_En_6_Fig10_HTML.jpg](img/A310332_2_En_6_Fig10_HTML.jpg)


    图 6-10. `Tiling` 值设置为 5 的平面


    与灯光类似，当你打开 `Inspector` 视图时，这也是一个更改顶部文本字段中名称的好时机，将平面重命名为 `Floor` 以使其功能更明确。


    ## 重置摄像机


    附加到 `Main Camera` 上的脚本不适合保龄球游戏，因此你可以禁用该脚本。更好的是，通过选中 `Hierarchy` 视图中的 `Main Camera`，然后在
    `Inspector` 视图中右键单击脚本组件并选择 `Remove Component`，将该脚本从 `Main Camera` 上完全移除（图 6-11）。


    ![A310332_2_En_6_Fig11_HTML.jpg](img/A310332_2_En_6_Fig11_HTML.jpg)


    图 6-11. 从 `Main Camera` 移除脚本


    顺便，将 `Main Camera` 的位置设置为 `(6,1,-10)`，其旋转设置为 `(0,-90,0)`。现在，你应该看到一个漂亮的地板、天际线，除此之外没有别的东西了（图
    6-12）。


    ![A310332_2_En_6_Fig12_HTML.jpg](img/A310332_2_En_6_Fig12_HTML.jpg)


    图 6-12. 固定了 `Main Camera` 后的 `Game` 视图


    ## 制作一个球


    现在场景中有了灯光、光晕、地板，以及一个视角固定的 `Main Camera`。是时候添加保龄球了。

