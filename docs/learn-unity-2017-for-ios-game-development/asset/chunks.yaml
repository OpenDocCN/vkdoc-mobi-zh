  trans: '

    ### 脚本参考


    本章介绍的所有 Unity 功能几乎都是 `Input` 类的成员。事实上，关于 `Input` 的脚本参考文档包含了对 iOS 输入功能的概述。


    阅读完 `Input` 类的概述后，你应该阅读本章中使用的每个函数的页面，特别是 `Input.GetTouch`（以及相关的 `Touch` 结构体），其中包含的代码示例展示了如何遍历每一帧中的所有
    `Touch` 事件；以及 `Input.acceleration`，其中包含的代码示例展示了如何检查每一帧的加速度值。


    需要记住的一点是，加速度计每帧可能会生成多个值。大多数情况下，每帧仅采样一次 `Input.accelerometer` 就足够了，但如果需要更精细的采样，你可以访问
    `Input.accelerationEventCount` 和 `Input.accelerationEvents` 变量来获取所有加速度事件。


    `Input` 类提供了访问其他 iOS 传感器的途径。静态变量 `Input.gyro`、`Input.compass` 和 `Input.location`
    分别返回来自陀螺仪、指南针和定位服务的数据。除了记录这些变量的页面外，你还应查看这些变量所属类别的页面：`Gyroscope`、`Compass` 和 `LocationServices`
    类。文档内容不多，但你可以在各个类的函数中找到代码示例。静态变量 `Input.compensateSensors` 控制是否根据屏幕方向调整加速度计、陀螺仪和指南针的数据。


    除了测试对象选择，射线投射在游戏和图形中也被大量使用，因此你应该熟悉有关 `Physics.Raycast` 的页面，该页面提供了几个代码示例。例如，在 HyperBowl
    中，我使用射线投射来防止主摄像机掉到地面以下，并将 `GameObjects` 的初始位置正好设置在地面上。在这两种情况下，我都会从 `GameObject`
    的位置向地面下方发射射线，并检查得到的距离。最后，我介绍了 `WebCamTexture` 类的使用。`WebCamTexture` 的页面内容很多，但请点击其
    `Play`、`Stop` 和 `Pause` 函数的链接，在这些页面中找到代码示例。另外，请查看 `WebCamTexture` 构造函数的链接。该页面列举了各种构造函数，允许你为不同的分辨率自定义纹理大小。


    ### iOS 开发者库


    建议你在阅读甚至是在阅读 Unity 脚本参考之前，先阅读 iOS 参考库，这样你就能了解哪些 iOS 功能可以通过 Unity 暴露出来，以及 Unity
    的类和函数如何映射到对应的 iOS 组件。


    你可以通过 [`http://developer.apple.com/library`](http://developer.apple.com/library)（无需登录）或在
    Xcode Organizer 中查看 iOS 参考库；从那里选择“Guides”标签并浏览指南，特别是以下内容：


    - “Event Handling Guide”指南概述了触摸事件（与 Unity 的 `Input.GetTouch` 和 `Touch` 类相关）和运动事件（与
    `Input.acceleration` 及其他 `Input` 加速度计变量相关）。

    - “Camera Programming Topics for iOS”指南描述了 Prime31 Etcetera 插件所使用的 `UIImagePickerController`
    类。

    - “AV Foundation Programming Guide”指南描述了 Unity 中 `WebCamTexture` 类最可能使用的视频捕捉功能。


    ### 资源商店


    Unity 的 `Input` 类使你能够访问基本的触摸信息，但它不提供对 iOS 手势识别器的访问，后者用于检测更高级别的“手势”，例如滑动和捏合。这时资源商店再次挺身而出，提供能够进行高级手势检测的第三方包。我使用的是
    FingerGestures 包，它有一个很好的回调系统，用于检测和处理各种手势。


    例如，在 HyperBowl 中，我希望当玩家捏合屏幕（两个手指在屏幕上合拢）时弹出暂停菜单。使用 Finger Gestures 包，只需在暂停菜单脚本中添加一个手势回调即可，如下所示：


    ```

    function OnGesturePinchEnd(pos1:Vector2,pos2:Vector2) {

    PauseGame();

    }

    ```


    还需要在 `Start` 或 `Awake` 函数中添加一行代码，将该回调添加到 `FingerGestures` 的相应手势回调列表中，如下所示：


    ```

    FingerGestures.OnPinchEnd += OnGesturePinchEnd;

    ```


    Unity 并未为 iOS 中的所有可用功能提供脚本访问权限，这就是插件的用武之地。Unity 插件系统允许你添加新的脚本函数来访问“原生”代码。一般来说，如果你能用
    C、C++ 或 Objective-C 编写代码，就可以为其制作一个 Unity 插件。例如，在 Unity 资源商店中，你会发现有基于移动广告 SDK 构建的插件，以及用于访问
    iOS 功能的插件。


    插件安装在 `Assets/Plugins` 文件夹中，正如我之前提到的，这是一个存放需要在任何其他脚本之前加载的脚本的好地方。它们通常还需要在 Xcode
    中手动集成步骤，例如向 `Info.plist` 文件添加条目或安装额外的代码库（这会阻止从 Unity 直接进行“构建并运行”——你必须先选择“构建”，修改
    Xcode 项目，然后从 Xcode 选择“运行”）。并且，多个插件安装在同一 Unity 项目中总是存在冲突的风险。


    这就是为什么我喜欢使用 Prime31 Studios 在 [`http://prime31.com/unity`](http://prime31.com/unity)
    提供的插件。它们提供了大量可以共存于同一 Unity 项目中的插件，并且所有 Xcode 修改都由 Unity 后处理脚本执行，因此从 Unity 进行的“构建并运行”操作仍然有效，无需在
    Xcode 中手动操作。


    例如，资源商店上提供的 Prime31 Etcetera 插件包含许多杂项功能，包括通过一次函数调用访问 iOS 照片库和设备相机，如下所示：


    ```

    EtceteraBinding.promptForPhoto(1.0);

    ```


    图 13-7 显示了在我的 Fugu Maze 应用中出现的提示（我使用照片选择器允许玩家自定义迷宫墙壁纹理）。如果你想尝试一下，请从 App Store
    下载 Fugu Maze Free 或一个免费的 HyperBowl 球道（我使用照片选择器来自定义保龄球纹理）。


    ![A310332_2_En_13_Fig7_HTML.jpg](img/A310332_2_En_13_Fig7_HTML.jpg)


    图 13-7.


    iPad 上的 Prime31 Etcetera 插件照片选择器


    另一个提供额外设备输入的 Prime31 插件是 iCade 插件（仅在 Prime31 网站上提供）。iCade 是一种复古风格的街机机箱，通过蓝牙连接为
    iOS 设备提供摇杆输入。iCade 本质上模拟了一个蓝牙键盘，因此任何使用 iCade 插件的代码都与键盘控制的代码类似。如果你为保龄球代码的 `CalcForce`
    函数添加了 iCade 控制代码，那么它看起来会像代码清单 13-9 中的片段（此示例实际上取自 HyperBowl）。


    ```

    var yinput:float = 0;

    if (iCadeBinding.state.JoystickUp) yinput = 1;

    if (iCadeBinding.state.JoystickDown) yinput = -1;

    var xinput:float = 0;

    if (iCadeBinding.state.JoystickLeft) xinput = 1;

    if (iCadeBinding.state.JoystickRight) xinput = -1;

    var deltatime:float = Time.deltaTime;

    forcey += iCadePowery*yinput/deltatime;

    forcex += iCadePowerx*xinput/deltatime;

    ```


    清单 13-9. 使用 Prime31 iCade 插件对 `CalcForce` 的 iCade 补充


    就像检查四个不同按键是否被按下一样，你只是在检查摇杆是否向四个方向中的任何一个移动。摇杆的灵敏度并不比按键更高。

