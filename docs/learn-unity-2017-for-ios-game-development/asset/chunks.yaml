    Specifying the app name and bundle ID on iTunes Connect


    The default language indicates the primary language you’ll be using for all the
    assets and descriptions you’re submitting with this app.


    The SKU Number setting can be anything you want, but it has to be unique among
    your apps and should be readily identifiable with your app if you see it in reports.


    ### Set Availability and Price


    Upon continuing from the App Information page, iTunes Connect will ask you to
    specify the price of the app and when you would like the app to become available
    on the App Store (Figure [11-14](#A310332_2_En_11_Chapter.html#Fig14)).


    ![A310332_2_En_11_Fig14_HTML.jpg](Images/A310332_2_En_11_Fig14_HTML.jpg)


    Figure 11-14.


    Setting the app availability and price on iTunes Connect


    The availability is contingent on when Apple approves the app, so if you specify
    an availability date one week from the day the app is submitted and the approval
    takes two weeks, then it will be made available on the approval date. If you want
    the app released as soon as possible, just use the default date, which is the
    day you’re entering this information.


    The prices range from free to $.99 to $1.99 to $2.99 and so on. There’s no need
    to worry too much about charging the right price; it can be changed anytime later.


    ### Set Language and Category


    The first section is the language and category information (Figure [11-15](#A310332_2_En_11_Chapter.html#Fig15)).


    ![A310332_2_En_11_Fig15_HTML.jpg](Images/A310332_2_En_11_Fig15_HTML.jpg)


    Figure 11-15.


    The app version, category, and copyright information on iTunes Connect


    Select the appropriate category and subcategories. You might as well also select
    a secondary category to increase the exposure of your app.


    ### Prepare for Submission


    The Prepare for Submission section is the most important for marketing (Figure
    [11-16](#A310332_2_En_11_Chapter.html#Fig16)).


    ![A310332_2_En_11_Fig16_HTML.jpg](Images/A310332_2_En_11_Fig16_HTML.jpg)


    Figure 11-16.


    The product description screen for the app in iTunes Connect


    This section includes the description of your app as it will appear on the App
    Store and keywords that help your app show up in searches on the App Store. You
    also need to include a support URL, and it is advantageous to link to the Marketing
    URL.


    ### Upload the Icon and Screenshots


    This is where you upload the icon and screenshots you prepared earlier (Figure
    [11-17](#A310332_2_En_11_Chapter.html#Fig17)). The icons fit Apple’s requirements
    to resemble the app icons that are built into the app or the app may get rejected
    by Apple .


    ![A310332_2_En_11_Fig17_HTML.jpg](Images/A310332_2_En_11_Fig17_HTML.jpg)


    Figure 11-17.


    Uploading the app icon and screenshots in iTunes Connect


    iTunes Connect will not allow you to proceed without uploading the icon and at
    least one screenshot, although you really need to upload a screenshot for each
    screen type (aspect ratio) that the app will run with. If a Unity iOS app is built
    for the iPhone and iPad, then you need to upload screenshots for two categories,
    basically corresponding to the iPhone and iPad.


    Caution


    iTunes Connect might time out pretty quickly. If it times out before you complete
    this page, the entire app description disappears, and you’ll have to start over.
    That’s why we prepared the icon and screenshots beforehand.


    ### General App Information


    Complete the General App Information. In this section, input the copyright information
    and fill in the rating information (Figure [11-18](#A310332_2_En_11_Chapter.html#Fig18))
    and the contact information for the developer (Figure [11-19](#A310332_2_En_11_Chapter.html#Fig19)).


    ![A310332_2_En_11_Fig19_HTML.jpg](Images/A310332_2_En_11_Fig19_HTML.jpg)


    Figure 11-19.


    Completing the General App Information section


    ![A310332_2_En_11_Fig18_HTML.jpg](Images/A310332_2_En_11_Fig18_HTML.jpg)


    Figure 11-18.


    Setting the app content rating in iTunes Connect


    The Rating section is pretty straightforward (Figure [11-18](#A310332_2_En_11_Chapter.html#Fig18)).
    Fill it out; it’s all mandatory. In the additional information section, there
    is a link to view in the App Store. This information can be updated after you
    have submitted the game for review. You will come back to the later. You still
    need to add more information about your game before you submit to Apple for review.


    If the ratings don’t match the content, at least in Apple’s eyes, the app may
    be rejected. For example, I tried submitting a version of Angry Bots and had the
    app rejected because the game has shooting, albeit against irate automata, and
    according to Apple, that qualifies as realistic violence that should be marked
    as Frequent/Intense.'
  trans: '

    # 在 iTunes Connect 上添加应用


    既然已经准备好了图标和截图，就可以开始在 iTunes Connect 中添加应用信息了。登录 [`http://itunesconnect.apple.com/`](http://itunesconnect.apple.com/)
    后，你会看到主菜单，如图 11-10 所示。


    ![A310332_2_En_11_Fig10_HTML.jpg](img/A310332_2_En_11_Fig10_HTML.jpg)


    图 11-10. iTunes Connect 的主菜单


    点击 `Manage Your Applications` 开始操作。现在你会看到一个已添加应用的列表，以及一个 `Add New App` 按钮。图 11-11
    展示了我 iTunes Connect 账户中的这一页面，其中显示了我的一些应用，每个应用都带有版本号和一个根据应用状态使用颜色编码的圆点。


    ![A310332_2_En_11_Fig11_HTML.jpg](img/A310332_2_En_11_Fig11_HTML.jpg)


    图 11-11. 在 iTunes Connect 中添加或管理应用


    绿色圆点表示该应用已在 App Store 上线，红色表示被拒绝。黄色则代表多种含义，但通常意味着应用尚未上传。对于已上线且有更新已提交或正在进行中的应用，系统会同时列出这两种状态。当然，如果这是你的第一个应用，列表中将不会显示任何应用。


    ## 选择应用类型


    当你点击 `Add New App` 时，下一页（图 11-12）会要求你选择应用类型：适用于 App Store 的 iOS 应用，或适用于 Mac App
    Store 的 macOS 应用。


    ![A310332_2_En_11_Fig12_HTML.jpg](img/A310332_2_En_11_Fig12_HTML.jpg)


    图 11-12. 在 iTunes Connect 中选择新应用类型


    点击 `New App` 将弹出一系列网页，每个页面都包含一个待填写的表单，你可以通过点击 `Continue` 按钮进入下一页或下一个表单。


    ## 输入应用信息


    选择 iOS 作为应用类型后，系统会呈现一个用于输入应用名称和 Bundle ID 的页面。这些信息应与 Unity 编辑器的播放器设置中指定的产品名称和
    Bundle ID 一致。Bundle ID 列表取自你添加到配置门户的应用 ID 列表。如果你添加了通配符应用 ID，可以选择该 ID，然后指定你所添加应用的特定
    Bundle ID 后缀。


    例如，在图 11-13 中，我提供了修改后的 Angry Bots 项目（已更名为 Fugu Bots）的信息。通配符 ID `com.technicat.*`
    和后缀 `FuguBot` 与我在 Unity 播放器设置中的 Bundle ID `com.technicat.FuguBot` 相匹配。


    ![A310332_2_En_11_Fig13_HTML.jpg](img/A310332_2_En_11_Fig13_HTML.jpg)


    图 11-13. 在 iTunes Connect 上指定应用名称和 Bundle ID


    默认语言表示你在提交此应用时，所有资源和描述将使用的主要语言。


    `SKU 编码` 字段可以随意填写，但必须在该账户的所有应用中保持唯一，并且在报告中看到时应能轻易识别出对应应用。


    ## 设置上架时间和价格


    在应用信息页面继续操作后，iTunes Connect 会要求你指定应用的价格以及希望在 App Store 上架的时间（图 11-14）。


    ![A310332_2_En_11_Fig14_HTML.jpg](img/A310332_2_En_11_Fig14_HTML.jpg)


    图 11-14. 在 iTunes Connect 上设置应用上架时间和价格


    上架时间取决于 Apple 何时批准应用。因此，如果你指定的上架日期是提交日的一周后，而审核耗时两周，那么应用将在审核通过之日上架。如果你希望应用尽快发布，只需使用默认日期（即你输入信息的当天）即可。


    价格范围从免费到 0.99 美元、1.99 美元、2.99 美元，以此类推。无需过分担心定价是否准确，以后随时可以更改。


    ## 设置语言和类别


    第一个部分是关于语言和类别信息（图 11-15）。


    ![A310332_2_En_11_Fig15_HTML.jpg](img/A310332_2_En_11_Fig15_HTML.jpg)


    图 11-15. iTunes Connect 上的应用版本、类别和版权信息


    选择合适的类别和子类别。你也可以选择二级类别，以增加应用的曝光度。


    ## 准备提交


    `Prepare for Submission` 部分对于营销来说最为重要（图 11-16）。


    ![A310332_2_En_11_Fig16_HTML.jpg](img/A310332_2_En_11_Fig16_HTML.jpg)


    图 11-16. iTunes Connect 中应用的产品描述界面


    该部分包括应用的描述（将显示在 App Store 上）以及有助于应用在 App Store 搜索中排名靠前的关键词。你还需要提供支持网址，并且链接到营销网址是有利的。


    ## 上传图标和截图


    在此处上传你之前准备好的图标和截图（图 11-17）。图标需符合 Apple 的要求，使其与应用内置的应用图标相似，否则应用可能会被 Apple 拒绝。


    ![A310332_2_En_11_Fig17_HTML.jpg](img/A310332_2_En_11_Fig17_HTML.jpg)


    图 11-17. 在 iTunes Connect 中上传应用图标和截图


    iTunes Connect 不允许你在未上传图标和至少一张截图的情况下继续操作，不过你实际上需要为应用运行的每种屏幕类型（宽高比）上传截图。如果 Unity
    iOS 应用是为 iPhone 和 iPad 构建的，那么你需要为两个类别（基本对应 iPhone 和 iPad）上传截图。


    > **注意**：iTunes Connect 可能会很快超时。如果在你完成此页面之前超时，整个应用描述将消失，你将不得不重新开始。这就是我们事先准备好图标和截图的原因。


    ## 通用应用信息


    完成 `General App Information`。在此部分，输入版权信息并填写评级信息（图 11-18）以及开发者的联系信息（图 11-19）。


    ![A310332_2_En_11_Fig19_HTML.jpg](img/A310332_2_En_11_Fig19_HTML.jpg)


    图 11-19. 完成通用应用信息部分


    ![A310332_2_En_11_Fig18_HTML.jpg](img/A310332_2_En_11_Fig18_HTML.jpg)


    图 11-18. 在 iTunes Connect 中设置应用内容评级


    评级部分相当直观（图 11-18）。请填写该部分，所有字段均为必填项。在附加信息部分，有一个在 App Store 中查看的链接。该信息可以在你提交游戏审核后进行更新。稍后你将回到这里。在提交给
    Apple 审核之前，你还需要添加更多关于游戏的信息。


    如果评级与内容不匹配——至少在 Apple 看来——应用可能会被拒绝。例如，我曾尝试提交一个 `Angry Bots` 版本，但被拒绝，因为游戏包含射击元素（尽管是针对愤怒的机器人），根据
    Apple 的规定，这被视为逼真的暴力，应标记为频繁/强烈。

    '
- fmt: "### 将构建包上传到 iTunes Connect\n\n有两种方式可以将构建包上传到 iTunes Connect，即直接从 Xcode 或 Application\
    \ Loader 上传。这里将使用 Xcode。在 Xcode 中，当构建包准备就绪时，将目标设备选为 Generic iOS Device（如图 [11-20](#A310332_2_En_11_Chapter.html#Fig20)\
    \ 所示）。\n\n![A310332_2_En_11_Fig20_HTML.jpg](Images/A310332_2_En_11_Fig20_HTML.jpg)\n\
    \n图 11-20. 设置 Generic iOS Device 设备\n\n现在，将产品设置为归档文件。为此，请从主菜单栏中选择 `Product` ➤\
    \ `Archive`（如图 [11-21](#A310332_2_En_11_Chapter.html#Fig21) 所示）。\n\n![A310332_2_En_11_Fig21_HTML.jpg](Images/A310332_2_En_11_Fig21_HTML.jpg)\n\
    \n图 11-21. 从 Product 菜单中选择 Archive\n\n当 Xcode 完成归档文件的编译后，你将看到 Archives 屏幕，其中包含一个用于上传到\
    \ App Store 的按钮（如图 [11-22](#A310332_2_En_11_Chapter.html#Fig22) 所示）。点击此按钮后，Xcode\
    \ 将尝试将构建包上传到你的 iTunes Connect 帐户。如果你已正确设置标识符设置，并在 Xcode 中正确登录了你的 iTunes Connect\
    \ 帐户，此文件将成功上传。\n\n![A310332_2_En_11_Fig22_HTML.jpg](Images/A310332_2_En_11_Fig22_HTML.jpg)\n\
    \n图 11-22. 上传构建包\n\n### 提交以供审核\n\n填写完必填项和任何可选的附加信息后，你现在就可以提交以供审核了（如图 [11-23](#A310332_2_En_11_Chapter.html#Fig23)\
    \ 所示）。\n\n![A310332_2_En_11_Fig23_HTML.jpg](Images/A310332_2_En_11_Fig23_HTML.jpg)\n\
    \n图 11-23. 处于“准备提交”状态的应用\n\n点击 `Submit for Review` 后，你可能需要完成一些关于出口合规性的问题，并且如果需要，还需上传加密授权文件。\n\
    \n![A310332_2_En_11_Fig24_HTML.jpg](Images/A310332_2_En_11_Fig24_HTML.jpg)\n\n\
    图 11-24. Xcode Organizer 窗口中的归档分发构建包\n\n提交应用后（如图 [11-24](#A310332_2_En_11_Chapter.html#Fig24)\
    \ 所示），接下来就是等待 Apple 批准或拒绝。\n\n> **提示**\n> \n> 提交后，建议重新登录 iTunes Connect 并确认应用状态为“等待审核”。即使应用的二进制文件是有效的，审核也可能会因为缺少截图等原因而被搁置。\n\
    \n你最终会收到一封电子邮件，通知你应用已在 App Store 上架、被拒绝，或是 Apple 需要更多时间进行审核。此回复通常在提交后的几周内到达，但我也曾遇到过应用在\
    \ 24 小时内被接受，或在两个月后被拒绝的情况。当审核期延长时，Apple 通常会发送一封电子邮件，说明需要更多时间来审核你的应用。\n\n### 为被拒绝做好准备\n\
    \n如果应用被拒绝，电子邮件将指示你返回 iTunes Connect 中的应用，并点击 Resolution Center 按钮，以查看并选择性地回复拒绝原因。原因可能包括技术问题、崩溃\
    \ Bug，或违反 Apple 的 App Store 审核指南（注册成为 iOS 开发者后，你可以在 Apple Developer 网站上阅读这些指南）。\n\
    \n如果你决定修改应用，则必须再次点击 `Reject Binary` 和 `Ready for Upload` 才能重新上传。如果你认为拒绝理由不合理，Resolution\
    \ Center 也允许你向 App Review Board 提出申诉。\n\n如果应用被接受，并且你在 iTunes Connect 中选择了自动发布选项，应用将很快出现在\
    \ App Store 上。否则，应用会处于“等待开发者发布”状态，直到你登录 iTunes Connect，点击应用的 `View Details`，再点击\
    \ `Release this Version` 按钮。\n\n### 更新应用\n\n在应用获得批准后，你可以随时返回 iTunes Connect 的应用页面并点击\
    \ `View Details` 来编辑应用描述，修改后的文本将在几小时内显示在 App Store 上。iTunes Connect 页面还会显示一个 `Add\
    \ New Version` 按钮。点击此按钮将引导你通过一个简化版的原始提交流程来提交应用的更新。除了 Bundle ID 之外，你几乎可以更改所有详细信息，但唯一必须更改的是递增\
    \ Bundle Version。\n\n> **提示**\n> \n> 更新应用时，请记得同时在 iTunes Connect 和 Unity player\
    \ 设置中递增 Bundle Version。\n\n### 跟踪销量\n\n当应用的首个版本出现在 App Store 上后，你可以通过登录 iTunes\
    \ Connect 并点击 `Payments and Financial Reports` 链接来跟踪其下载量和收入（如果是付费应用）。结果页面会显示一个基于时间的销售图表、按国家/地区划分的销售明细，以及生成报告的选项（如图\
    \ [11-25](#A310332_2_En_11_Chapter.html#Fig25) 所示）。\n\n![A310332_2_En_11_Fig25_HTML.jpg](Images/A310332_2_En_11_Fig25_HTML.jpg)\n\
    \n图 11-25. iTunes Connect 中的“付款与财务报告”页面\n\n### 发放促销代码\n\n对于应用的每个版本，Apple 都会提供\
    \ 100 个促销代码，可用于在 App Store 上免费下载该应用（即使是免费应用也提供促销代码，尽管在这种情况下使用它们意义不大）。要获取应用的促销代码，请在\
    \ iTunes Connect 中点击该版本的 `View Details`，然后点击右上角的 `Promo Codes` 按钮（如图 [11-26](#A310332_2_En_11_Chapter.html#Fig26)\
    \ 所示）。\n\n![A310332_2_En_11_Fig26_HTML.jpg](Images/A310332_2_En_11_Fig26_HTML.jpg)\n\
    \n图 11-26. 在 iTunes Connect 中点击已上架应用的 View Details\n\n```\nXY9LJRKMN7JM\nTANFXAHR9EM9\n\
    XP6TMAFFHFLT\nTXJ44ELTHETL\nF9W3WEK7JL4Y\n```\n*代码清单 11-1. 包含五个促销代码的促销代码文件*\n\n\
    代码一旦下载，有效期即为 28 天，即使在此期间应用进行了更新。\n\n> **提示**\n> \n> 由于代码的有效期是从下载日期开始计算的，因此你可以根据需要从\
    \ iTunes Connect 下载代码，而不是一次性下载全部 50 个，这样可以节省代码。\n\n这些代码不再允许用户在 App Store 上为应用撰写评论，但对于发送给托管自己评论的网站来说，这些代码是理想的选择。\n\
    \n## 进一步探索\n\n在 Unity 编辑器和 iOS 模拟器中测试 Unity iOS 应用非常方便，但无法替代在真机上的测试！好消息是，为真实硬件进行构建在\
    \ Unity 方面改动不大（实际上，只需在 Player 设置中将 SDK 设为 Device SDK）。坏消息是，你必须完成整个 Apple 开发者注册流程，为你的测试设备和配置文件完成\
    \ Provisioning Portal 设置，并为你的所有应用完成 iTunes Connect 设置。从某种意义上说，这是你成为 iOS 开发者的一章！\n\
    \n既然已经完成了这一步，你可以再次离开 Angry Bots 项目，回到你的保龄球游戏中。本书的剩余部分将用于将该游戏适配到 iOS。不过，你还会再次用到\
    \ iTunes Connect。在后续整合 Game Center（第 [14](../Text/A310332_2_En_14_Chapter.html)\
    \ 章）和 iAd（第 [15](../Text/A310332_2_En_15_Chapter.html) 章）时，你将再次使用 iTunes Connect。\n\
    \n### Unity 手册\n\n由于 Unity iOS 的模拟器和设备构建步骤几乎相同，上一章中提到的 Unity 手册章节也适用于本章。此外，Unity\
    \ 手册中“iOS 开发入门”部分有一个页面，简要列出了 Apple 提交应用到 App Store 所需的步骤；而“高级”部分中的“调试”页面则解释了如何将\
    \ MonoDevelop 调试会话附加到在设备上运行的 Unity iOS 应用。"
  raw: '#### Uploading the Build to the iTunes Connect


    There are two ways to upload the build to iTunes Connect. The build can be uploaded
    directly from Xcode or Application Loader. You will use Xcode here. In Xcode,
    with the build ready, select Generic iOS Device as the target (Figure [11-20](#A310332_2_En_11_Chapter.html#Fig20)).


    ![A310332_2_En_11_Fig20_HTML.jpg](Images/A310332_2_En_11_Fig20_HTML.jpg)


    Figure 11-20.


    Setting the Generic iOS Device setting


    Now you set the product as an archive. To do this, select Product ➤ Archive from
    the main menu bar (Figure [11-21](#A310332_2_En_11_Chapter.html#Fig21)).


    ![A310332_2_En_11_Fig21_HTML.jpg](Images/A310332_2_En_11_Fig21_HTML.jpg)


    Figure 11-21.


    Selecting Archive from the Product menu


    When Xcode has finished compiling the archive, you will see the Archives screen,
    which includes a button for uploading to the App Store (Figure [11-22](#A310332_2_En_11_Chapter.html#Fig22)).
    After clicking this button, Xcode will attempt to upload the build to your iTunes
    Connect account. If you have set the identifier settings correctly and are correctly
    signed into your iTunes Connect account in Xcode, this file will be successfully
    uploaded.


    ![A310332_2_En_11_Fig22_HTML.jpg](Images/A310332_2_En_11_Fig22_HTML.jpg)


    Figure 11-22.


    Uploading the build


    ### Submit for Review


    After filling out the required and any optional information , you are now ready
    to submit for review (Figure [11-23](#A310332_2_En_11_Chapter.html#Fig23)).


    ![A310332_2_En_11_Fig23_HTML.jpg](Images/A310332_2_En_11_Fig23_HTML.jpg)


    Figure 11-23.


    The app in Prepare for Submission status


    After you click Submit for Review, you may need to complete some questions about
    export compliance and, if needed, upload encryption authorization documents.


    ![A310332_2_En_11_Fig24_HTML.jpg](Images/A310332_2_En_11_Fig24_HTML.jpg)


    Figure 11-24.


    An archived distribution build in the Xcode Organizer window


    After you have submitted the app (Figure [11-24](#A310332_2_En_11_Chapter.html#Fig24)),
    it’s a matter of waiting for Apple to approve or reject it.


    Tip


    It’s a good idea to log back into iTunes Connect after your submission and verify
    the app status is Waiting for Review. Even if the app binary is valid, the review
    may be held up because of a missing screenshot, for example.


    You’ll eventually receive an e-mail notifying you that the app is available on
    the App Store, that it’s been rejected, or that Apple needs more time to review
    it. This response usually arrives within a couple of weeks after submission, but
    I’ve had apps accepted within 24 hours or rejected after two months. When the
    review period is extended, Apple will typically send an e-mail stating it needs
    more time to review your app.


    ### Be Prepared for Rejection


    If the app is rejected, then the e-mail will tell you to return to your app in
    iTunes Connect and click the Resolution Center button to view and optionally respond
    to the rejection reasons, which may include technical issues, crash bugs, or violations
    of Apple’s App Store review guidelines (which you can read on the Apple Developer
    site after becoming a registered iOS developer).


    If you elect to revise your app, you will have to click Reject Binary and Ready
    for Upload again before uploading. The Resolution Center also allows you to file
    an appeal to the App Review Board if you feel the rejection is unreasonable.


    If accepted, the app will appear shortly on the App Store if you selected the
    automatic release option in iTunes Connect. Otherwise, the app is placed in Pending
    Developer Release status until you log in to iTunes Connect, click View Details
    on the app, and click the Release this Version button.


    ### Update the App


    After an app has been approved, you can always return to the iTunes Connect page
    for the app and click View Details to edit the app description, and the modified
    text will show up on the App Store within a few hours. The iTunes Connect page
    will also display an Add New Version button. Clicking this will lead you through
    a condensed version of the original submission process to submit an update of
    the app. You can change nearly all the details except the bundle ID, but the only
    required change is an increment of the bundle version .


    Tip


    When updating apps, remember to increment the bundle version both in iTunes Connect
    and in the Unity player settings.


    ### Track Sales


    After the first version of an app appears on the App Store, you can track its
    downloads and revenue (if it’s a paid app) by logging on to iTunes Connect and
    clicking the Payments and Financial Reports link . The resulting page displays
    a time-based graph of sales, a breakdown of sales per country, and the option
    to generate reports (Figure [11-25](#A310332_2_En_11_Chapter.html#Fig25)).


    ![A310332_2_En_11_Fig25_HTML.jpg](Images/A310332_2_En_11_Fig25_HTML.jpg)


    Figure 11-25.


    The Payment and Financial Reports page in iTunes Connect


    ### Issue Promo Codes


    For each version of an app, Apple provides 100 promo codes that can be used to
    download the app free on the App Store (the promo codes are available even for
    free apps, although there’s not much point in using them in that case). To obtain
    the promo codes for an app, click View Details for that version of the app in
    iTunes Connect and then click the Promo Codes button on the top right (Figure
    [11-26](#A310332_2_En_11_Chapter.html#Fig26)).


    ![A310332_2_En_11_Fig26_HTML.jpg](Images/A310332_2_En_11_Fig26_HTML.jpg)


    Figure 11-26.


    Clicking View Details on a live app in iTunes Connect


    ```

    XY9LJRKMN7JM

    TANFXAHR9EM9

    XP6TMAFFHFLT

    TXJ44ELTHETL

    F9W3WEK7JL4Y

    Listing 11-1.

    A Promo Code File with Five Promo Codes

    ```


    Once downloaded, the codes are valid for 28 days, even if the app is updated in
    the meantime.


    Tip


    Since the expiration date of the codes is based on their download dates, you can
    conserve the codes by downloading them from iTunes Connect only as needed, instead
    of downloading all 50 at the same time.


    The codes no longer allow users to write reviews for the app on the App Store,
    but the codes are ideal for sending to sites that host their own reviews.


    ## Explore Further


    Testing Unity iOS apps in the Unity Editor and in the iOS simulator is convenient,
    but there’s no substitute for the real thing! The good news is that building for
    real hardware doesn’t change much on the Unity side (really, just setting the
    SDK to Device SDK in the player settings). The bad news is that you have to go
    through the entire Apple developer registration, go through the Provisioning Portal
    setup for your test devices and provisioning profiles, and go through the iTunes
    Connect setup for all your apps. In a sense, this is the chapter where you became
    an iOS developer!


    Now that you have that out of the way, you can leave the Angry Bots project again
    and return to your bowling game. You’ll spend the remainder of this book adapting
    the game for iOS. However, you haven’t seen the last of iTunes Connect. You will
    use iTunes Connect later when you incorporate Game Center (Chapter [14](../Text/A310332_2_En_14_Chapter.html))
    and iAd (Chapter [15](../Text/A310332_2_En_15_Chapter.html)).


    ### Unity Manual


    Since the simulator and device builds for Unity iOS involve nearly identical steps,
    the Unity Manual sections mentioned in the previous chapter also apply to this
    chapter. In addition, the “Getting Started in iOS Development” section of the
    Unity Manual has a page that briefly lists the steps required by Apple for submitting
    an app to the App Store, and the “Debugging” page in the “Advanced” section explains
    how to attach a MonoDevelop debugging session to a Unity iOS app running on a
    device.'
