  trans: '

    ## 主页面


    现在你已经掌握了在屏幕上显示菜单所需的所有要素。清单 9-12 展示了一个完整实现的`ShowPauseMenu`函数。


    ```

    function ShowPauseMenu() {

    BeginPage(150,300);

    if (GUILayout.Button ("Play")) {

    UnPauseGame();

    }

    if (GUILayout.Button ("Options")) {

    currentPage = Page.Options;

    }

    if (GUILayout.Button ("Credits")) {

    currentPage = Page.Credits;

    }

    #if !UNITY_WEBPLAYER && !UNITY_EDITOR

    if (GUILayout.Button ("Quit")) {

    Application.Quit();

    }

    #endif

    EndPage();

    }

    Listing 9-12.

    FuguPause.js 中显示暂停菜单的函数

    ```


    `BeginPage`和`EndPage`之间的所有 GUI 代码实际上都运行在`GUILayout.BeginArea`和`GUILayout.EndArea`之间，因此你可以使用
    GUI 调用的`GUILayout`版本创建元素，而无需传递`Rect`参数。例如，你可以调用`GUILayout.Button`代替`GUI.Button`。除了缺少`Rect`参数外，这些函数在其他方面看起来完全相同。


    `GUILayout.Button`与`GUILayout.Label`的区别在于，它会根据按钮是否被按下返回`true`或`false`。因此，每次调用`GUILayout.Button`时，都会在`if`测试语句内执行，并在按钮确实被按下时执行相应的代码。


    现在创建一个`GameObject`并将其命名为`MainMenu`。向该`GameObject`添加`FuguPause`脚本组件。你可以从检视面板中选择`Add
    Component`，或者将项目视图`Scripts`文件夹中的`FuguPause`脚本拖放至新创建的`MainMenu`游戏对象上。


    当你点击 Play 时，现在将看到主菜单，并且菜单中的 Play 按钮应该能取消屏幕暂停（图 9-6）。`Application.Quit`在 Unity
    网页播放器或编辑器中没有任何功能，因此该代码段被包围在对应预处理器定义`UNITY_WEBPLAYER`和`UNITY_EDITOR`的测试中，用于检查构建目标是否为网页播放器或是否在编辑器中运行。这些定义在编译前就会被评估（因此称为预处理器），所以如果`UNITY_WEBPLAYER`为
    false 且`UNITY_EDITOR`为 false，则编译封闭的代码。否则，就像这段代码从未存在过一样。


    ![A310332_2_En_9_Fig6_HTML.jpg](img/A310332_2_En_9_Fig6_HTML.jpg)


    图 9-6. 主菜单


    Credits 和 Options 按钮目前还不会有任何反应，因为`ShowCredits`和`ShowOptions`函数仍然是空壳。Credits 页面相对简单，我们就从它开始。


    ## Credits 页面


    多个致谢条目可以存储在一个`String`数组中。为此定义了一个名为`credits`的变量，以及一个用于显示致谢信息的`ShowCredits`函数，如清单
    9-13 所示。


    ```

    var credits:String[]=[

    "A Fugu Games Production",

    "Copyright (c) 2017 Technicat, LLC. All Rights Reserved.",

    "More information at http://fugugames.com/"] ;

    function ShowCredits() {

    BeginPage(300,300);

    for (var credit in credits) {

    GUILayout.Label(credit);

    }

    EndPage();

    }

    Listing 9-13.

    FuguPause.js 中显示致谢页面的函数

    ```


    由于变量`credits`是公开的，你可以在检视面板中编辑每个致谢条目，向数组中添加或从中移除条目。


    `ShowCredits`函数遍历致谢数组，并在 UnityGUI 标签中显示每一个条目（图 9-7）。请注意，这里有一种使用`in`遍历数组的简单方法，而不是通常通过一系列数组索引进行迭代的习惯。在这种情况下，你不需要索引来做其他事情，所以就采用这种更简单的方法。


    ![A310332_2_En_9_Fig7_HTML.jpg](img/A310332_2_En_9_Fig7_HTML.jpg)


    图 9-7. 致谢页面


    与主菜单一样，你以调用`BeginPage`开始，以`EndPage`结束，因此你是在`GUILayout`区域（这次是 300×300）内操作，可以使用`GUILayout.Label`代替`GUI.Label`。`EndPage`确保自动生成一个返回按钮。请记住，`Update`回调也会将
    Esc 键视为点击返回按钮。


    ## Options 页面


    Options 页面比 Credits 页面复杂得多，因为它包含一个由四个选项卡实现的工具栏：Audio、Graphics、Stats 和 System。清单
    9-14 展示了完整实现的`ShowToolbar`函数，以及一些辅助变量和函数。


    ```

    private var toolbarInt:int=0;

    private var toolbarStrings: String[]= ["Audio","Graphics","System"];

    function ShowOptions() {

    BeginPage(318,300);

    toolbarInt = GUILayout.Toolbar (toolbarInt, toolbarStrings);

    switch (toolbarInt) {

    case 0: ShowAudio(); break;

    case 1: ShowGraphics();  break;

    case 2: ShowSystem(); break;

    }

    EndPage();

    }

    Listing 9-14.

    FuguPause.js 中的 Options 页面

    ```


    同样，`ShowOptions`函数中的所有内容都被包裹在`BeginPage`和`EndPage`函数的调用之间。第一行调用`GUILayout.Toolbar`，从一个字符串数组创建一个工具栏——一排充当选项卡或单选按钮的按钮，其中每个字符串是按钮的标签。该函数还接收一个整数，该整数对应于该字符串数组中的位置。那是要使工具栏上当前处于活动状态的按钮。但如果你只是这样写：


    ```

    GUILayout.Toolbar (toolbarIndex, toolbarStrings);

    ```


    那么`toolbarIndex`永远不会从其初始值（0）改变，即使你点击了另一个按钮，下次调用此函数时（在`OnGUI`的下一次调用中），活动按钮也会被设置回该值。


    但是`GUILayout.Toolbar`返回一个表示当前活动按钮的整数，所以你将这个值反馈回你传入的变量`toolbarIndex`。


    ```

    toolbarIndex = GUILayout.Toolbar (toolbarIndex, toolbarStrings);

    ```


    因此，`toolbarIndex`初始为 0，但如果你点击 Graphics，它将变为 1，如果你点击 Controls，它将变为 2，以此类推。然后有一个`switch`语句检查`toolbarIndex`并调用与所选按钮匹配的显示函数。与主菜单一样，我们从存根函数开始，然后逐个实现。现在继续点击看看，你应该能在控制台视图中看到相应的函数名称显示出来，因为这是你目前告诉程序所做的全部事情！


    ## Audio 面板


    当选中 Audio 选项卡时，它将显示一个用于音量控制的滑块（图 9-8）。


    ![A310332_2_En_9_Fig8_HTML.jpg](img/A310332_2_En_9_Fig8_HTML.jpg)


    图 9-8. 暂停菜单中的音频面板


    将滑块添加到`ShowAudio`函数实际上相当容易；只需要一行代码。好吧，它实际上包含两行，因为没有标签的滑块有点过于神秘（清单 9-15）。


    ```

    function ShowAudio() {

    GUILayout.Label("Volume");

    AudioListener.volume = GUILayout.HorizontalSlider(AudioListener.volume,0.0,1.0);

    Listing 9-15.

    FuguPause.js 中的音频面板

    ```


    第一行调用`GUILayout.Label`，这一点你现在应该已经熟悉了。第二行调用`GUILayout.HorizontalSlider`，它接收滑块表示的最小值、最大值以及一个表示当前设置的值作为参数。


    该滑块反映了`AudioListener.volume`的值，这是 Unity 中所有声音的主音量。因此，`AudioListener.volume`被作为滑块的当前值传递，并且由于`AudioListener.volume`的范围在
    0 到 1 之间，这些值分别作为最小值和最大值传递。而且，为了记录滑块的值，`GUILayout.HorizontalSlider`的返回值被重新赋值给`AudioListener.volume`。否则，`AudioListener.volume`的值将永远不会改变，滑块也不会移动。

    '
- fmt: '# The Graphics Panel


    The Graphics panel will display the some of the same graphics quality information
    shown by the quality settings of the Unity Editor (Figure [9-9](#A310332_2_En_9_Chapter.html#Fig9)).


    ![A310332_2_En_9_Fig9_HTML.jpg](Images/A310332_2_En_9_Fig9_HTML.jpg)


    Figure 9-9. Graphics options in the pause menu


    The two buttons at the bottom of the panel increase and decrease the quality settings
    level. This panel doesn’t require any new UnityGUI controls to implement this
    panel, but it does access the `QualitySettings` class (Listing [9-16](#A310332_2_En_9_Chapter.html#Par87)).


    ```

    function ShowGraphics() {

    GUILayout.Label(QualitySettings.names[QualitySettings.GetQualityLevel()]);

    GUILayout.Label("Pixel Light Count: "+QualitySettings.pixelLightCount);

    GUILayout.Label("Shadow Cascades: "+QualitySettings.shadowCascades);

    GUILayout.Label("Shadow Distance: "+QualitySettings.shadowDistance);

    GUILayout.Label("Soft Vegetation: "+QualitySettings.softVegetation);

    GUILayout.BeginHorizontal();

    if (GUILayout.Button("Decrease")) {

    QualitySettings.DecreaseLevel();

    }

    if (GUILayout.Button("Increase")) {

    QualitySettings.IncreaseLevel();

    }

    GUILayout.EndHorizontal();

    }

    ```


    Listing 9-16. Function That Displays the Quality Settings


    The `ShowGraphics` function is fairly straightforward. It retrieves the current
    quality settings level, represented as an integer, by calling `QualitySettings.GetQualityLevel`,
    and then it uses that integer as an index to the `QualitySettings.names` String
    array to retrieve the name of that quality setting. That name and several quality
    settings are displayed in labels, and two buttons are placed at the bottom: one
    calling `QualitySettings.DecreaseLevel` and the other calling `QualitySettings.IncreaseLevel`.


    The two buttons allow you to increase and decrease the quality settings level,
    within the range of existing levels, and not only will you see the displayed quality
    settings information change, you might see the graphical quality of the scene
    change before your eyes, too, since it’s still being rendered every frame, even
    with the game time pause.


    # The System Panel


    The System panel displays information about the hardware platform (Figure [9-10](#A310332_2_En_9_Chapter.html#Fig10)).


    ![A310332_2_En_9_Fig10_HTML.jpg](Images/A310332_2_En_9_Fig10_HTML.jpg)


    Figure 9-10. The System panel in the pause menu


    As in the Graphics page, the information is displayed with labels, but whereas
    the Graphics page accesses the `QualitySettings` class, the System panel accesses
    the `SystemInfo` class (Listing [9-17](#A310332_2_En_9_Chapter.html#Par92)).


    ```

    function ShowSystem() {

    GUILayout.Label("Graphics: "+SystemInfo.graphicsDeviceName+" "+

    SystemInfo.graphicsMemorySize+"MB\n"+

    SystemInfo.graphicsDeviceVersion+"\n"+

    SystemInfo.graphicsDeviceVendor);

    GUILayout.Label("Shadows: "+ Available(SystemInfo.supportsShadows));

    GUILayout.Label("Image Effects: "+Available(SystemInfo.supportsImageEffects));

    // GUILayout.Label("Render Textures: "+Available(SystemInfo.supportsRenderTextures));

    }

    ```


    Listing 9-17. The System Panel in FuguPause.js


    The `SystemInfo` class provides information about the graphics hardware and its
    capabilities, including some identifying information such as the device name and
    the name of the vendor, its graphics memory size, and whether the hardware supports
    some of the more advanced features, such as dynamic shadows, rendering to a texture,
    or image effects (which requires rendering to a texture).


    ## Customize the GUI Color


    You may have noticed the white text in the pause menu is often difficult to read.
    One solution is to change the static variable `GUI.color`, which tints the entire
    GUI with a Color value (Listing [9-18](#A310332_2_En_9_Chapter.html#Par95)).


    ```

    var hudColor:Color = Color.white;

    function OnGUI () {

    if (IsGamePaused()) {

    if (skin != null) {

    GUI.skin = skin;

    } else {

    GUI.color = hudColor;

    }

    switch (currentPage) {

    case Page.Main: ShowPauseMenu(); break;

    case Page.Options: ShowOptions(); break;

    case Page.Credits: ShowCredits(); break;

    }

    }

    }

    ```


    Listing 9-18. GUI Color Customization in FuguPause.js


    You add a public variable called `hudColor` to the `FuguPause` script so a color
    can be chosen in the Inspector view. All UnityGUI operations, including setting
    variables like `GUI.Color`, must take place within an `OnGUI` callback, so the
    assignment to `GUI.color` is placed inside the `OnGUI` callback before any of
    the GUI controls are created (but after `IsGamePaused` is called since there’s
    no reason to set `GUI.Color` if there’s no GUI rendering). Note that you can set
    `GUI.color` multiple times within `OnGUI` to change the color before rendering
    various parts of the GUI.


    Now you can select a color in the Inspector view (Figure [9-11](#A310332_2_En_9_Chapter.html#Fig11))
    and see the resulting GUI tint (Figure [9-12](#A310332_2_En_9_Chapter.html#Fig12)).


    ![A310332_2_En_9_Fig12_HTML.jpg](Images/A310332_2_En_9_Fig12_HTML.jpg)


    Figure 9-12. The pause menu with a custom color


    ![A310332_2_En_9_Fig11_HTML.jpg](Images/A310332_2_En_9_Fig11_HTML.jpg)


    Figure 9-11. Color selection for the pause menu


    ## Customize the Skin


    The default UnityGUI skin is pretty neutral, and it’s hard to read the text, as
    you can see with the pause menu from the previous section. With the scoreboard,
    you could change the text color by adjusting the style to `GUI.Label`, but if
    you have a lot of GUI elements, that can be a hassle.


    That’s where UnityGUI skins come in. Skins are collections of styles assigned
    to the various GUI elements. Applying a skin is easy—just declare a public variable
    of type `GUISkin` and assign that skin to the variable `GUI.skin`, within the
    `OnGUI` callback, similar to assigning a `GUI.Color` (Listing [9-19](#A310332_2_En_9_Chapter.html#Par100)).


    ```

    var skin:GUISkin;

    function OnGUI () {

    if (IsGamePaused()) {

    if (skin != null) {

    GUI.skin = skin;

    } else {

    GUI.color = hudColor;

    }

    switch (currentPage) {

    case Page.Main: ShowPauseMenu(); break;

    case Page.Options: ShowOptions(); break;

    case Page.Credits: ShowCredits(); break;

    }

    }

    }

    ```


    Listing 9-19. Adding a GUISkin to the Pause Menu


    You can test this skin support with a really cool-looking free UnityGUI skin from
    the Asset Store called the Necromancer GUI (Figure [9-13](#A310332_2_En_9_Chapter.html#Fig13)).


    ![A310332_2_En_9_Fig13_HTML.jpg](Images/A310332_2_En_9_Fig13_HTML.jpg)


    Figure 9-13. The Necromancer GUI on the Asset Store


    Download and import the Necromancer GUI and then drag its skin file (named Necromancer
    GUI) into the Skin property that’s now in the Inspector view (Figure [9-14](#A310332_2_En_9_Chapter.html#Fig14)).


    ![A310332_2_En_9_Fig14_HTML.jpg](Images/A310332_2_En_9_Fig14_HTML.jpg)


    Figure 9-14. The Necromancer GUI


    Then click Play, and you have a much more ornate pause menu. Figure [9-15](#A310332_2_En_9_Chapter.html#Fig15)
    shows how the pause menu Graphics panel looks with the Necromanger GUI. Look at
    all the pretty buttons!


    ![A310332_2_En_9_Fig15_HTML.jpg](Images/A310332_2_En_9_Fig15_HTML.jpg)


    Figure 9-15. The Necromancer GUI skin in action


    ## The Complete Script


    The finalized start/pause menu script is significantly longer than the scoreboard
    script, so the complete listing is omitted here. All the code has been shown in
    this chapter, and the entire script `FuguPause.js` is available in the project
    for this chapter at [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739).'
  raw: '## The Graphics Panel


    The Graphics panel will display the some of the same graphics quality information
    shown by the quality settings of the Unity Editor (Figure [9-9](#A310332_2_En_9_Chapter.html#Fig9)).


    ![A310332_2_En_9_Fig9_HTML.jpg](Images/A310332_2_En_9_Fig9_HTML.jpg)


    Figure 9-9.


    Graphics options in the pause menu


    The two buttons at the bottom of the panel increase and decrease the quality settings
    level. This panel doesn’t require any new UnityGUI controls to implement this
    panel, but it does access the QualitySettings class (Listing [9-16](#A310332_2_En_9_Chapter.html#Par87)).


    ```

    function ShowGraphics() {

    GUILayout.Label(QualitySettings.names[QualitySettings.GetQualityLevel()]);

    GUILayout.Label("Pixel Light Count: "+QualitySettings.pixelLightCount);

    GUILayout.Label("Shadow Cascades: "+QualitySettings.shadowCascades);

    GUILayout.Label("Shadow Distance: "+QualitySettings.shadowDistance);

    GUILayout.Label("Soft Vegetation: "+QualitySettings.softVegetation);

    GUILayout.BeginHorizontal();

    if (GUILayout.Button("Decrease")) {

    QualitySettings.DecreaseLevel();

    }

    if (GUILayout.Button("Increase")) {

    QualitySettings.IncreaseLevel();

    }

    GUILayout.EndHorizontal();

    }

    Listing 9-16.

    Function That Displays the Quality Settings

    ```


    The ShowGraphics function is fairly straightforward. It retrieves the current
    quality settings level, represented as an integer, by calling QualitySettings.GetQualityLevel,
    and then it uses that integer as an index to the QualitySettings.names String
    array to retrieve the name of that quality setting. That name and several quality
    settings are displayed in labels, and two buttons are placed at the bottom: one
    calling QualitySettings.DecreaseLevel and the other calling QualitySettings.IncreaseLevel.


    The two buttons allow you to increase and decrease the quality settings level,
    within the range of existing levels, and not only will you see the displayed quality
    settings information change, you might see the graphical quality of the scene
    change before your eyes, too, since it’s still being rendered every frame, even
    with the game time pause.


    ## The System Panel


    The System panel displays information about the hardware platform (Figure [9-10](#A310332_2_En_9_Chapter.html#Fig10)).


    ![A310332_2_En_9_Fig10_HTML.jpg](Images/A310332_2_En_9_Fig10_HTML.jpg)


    Figure 9-10.


    The System panel in the pause menu


    As in the Graphics page, the information is displayed with labels, but whereas
    the Graphics page accesses the QualitySettings class, the System panel accesses
    the SystemInfo class (Listing [9-17](#A310332_2_En_9_Chapter.html#Par92)).


    ```

    function ShowSystem() {

    GUILayout.Label("Graphics: "+SystemInfo.graphicsDeviceName+" "+

    SystemInfo.graphicsMemorySize+"MB\n"+

    SystemInfo.graphicsDeviceVersion+"\n"+

    SystemInfo.graphicsDeviceVendor);

    GUILayout.Label("Shadows: "+ Available(SystemInfo.supportsShadows));

    GUILayout.Label("Image Effects: "+Available(SystemInfo.supportsImageEffects));

    // GUILayout.Label("Render Textures: "+Available(SystemInfo.supportsRenderTextures));

    }

    Listing 9-17.

    The System Panel in FuguPause.js

    ```


    The SystemInfo class provides information about the graphics hardware and its
    capabilities, including some identifying information such as the device name and
    the name of the vendor, its graphics memory size, and whether the hardware supports
    some of the more advanced features, such as dynamic shadows, rendering to a texture,
    or image effects (which requires rendering to a texture).


    ### Customize the GUI Color


    You may have noticed the white text in the pause menu is often difficult to read.
    One solution is to change the static variable GUI.color, which tints the entire
    GUI with a Color value (Listing [9-18](#A310332_2_En_9_Chapter.html#Par95)).


    ```

    var hudColor:Color = Color.white;

    function OnGUI () {

    if (IsGamePaused()) {

    if (skin != null) {

    GUI.skin = skin;

    } else {

    GUI.color = hudColor;

    }

    switch (currentPage) {

    case Page.Main: ShowPauseMenu(); break;

    case Page.Options: ShowOptions(); break;

    case Page.Credits: ShowCredits(); break;

    }

    }

    }

    Listing 9-18.

    GUI Color Customization in FuguPause.js

    ```


    You add a public variable called hudColor to the FuguPause script so a color can
    be chosen in the Inspector view. All UnityGUI operations, including setting variables
    like GUI.Color, must take place within an OnGUI callback, so the assignment to
    GUI.color is placed inside the OnGUI callback before any of the GUI controls are
    created (but after IsGamePaused is called since there’s no reason to set GUI.Color
    if there’s no GUI rendering). Note that you can set GUI.color multiple times within
    OnGUI to change the color before rendering various parts of the GUI.


    Now you can select a color in the Inspector view (Figure [9-11](#A310332_2_En_9_Chapter.html#Fig11))
    and see the resulting GUI tint (Figure [9-12](#A310332_2_En_9_Chapter.html#Fig12)).


    ![A310332_2_En_9_Fig12_HTML.jpg](Images/A310332_2_En_9_Fig12_HTML.jpg)


    Figure 9-12.


    The pause menu with a custom color


    ![A310332_2_En_9_Fig11_HTML.jpg](Images/A310332_2_En_9_Fig11_HTML.jpg)


    Figure 9-11.


    Color selection for the pause menu


    ### Customize the Skin


    The default UnityGUI skin is pretty neutral, and it’s hard to read the text, as
    you can see with the pause menu from the previous section. With the scoreboard,
    you could change the text color by adjusting the style to GUI.Label, but if you
    have a lot of GUI elements, that can be a hassle.


    That’s where UnityGUI skins come in. Skins are collections of styles assigned
    to the various GUI elements. Applying a skin is easy—just declare a public variable
    of type GUISkin and assign that skin to the variable GUI.skin, within the OnGUI
    callback, similar to assigning a GUI.Color (Listing [9-19](#A310332_2_En_9_Chapter.html#Par100)).


    ```

    var skin:GUISkin;

    function OnGUI () {

    if (IsGamePaused()) {

    if (skin != null) {

    GUI.skin = skin;

    } else {

    GUI.color = hudColor;

    }

    switch (currentPage) {

    case Page.Main: ShowPauseMenu(); break;

    case Page.Options: ShowOptions(); break;

    case Page.Credits: ShowCredits(); break;

    }

    }

    }

    Listing 9-19.

    Adding a GUISkin to the Pause Menu

    ```


    You can test this skin support with a really cool-looking free UnityGUI skin from
    the Asset Store called the Necromancer GUI (Figure [9-13](#A310332_2_En_9_Chapter.html#Fig13)).


    ![A310332_2_En_9_Fig13_HTML.jpg](Images/A310332_2_En_9_Fig13_HTML.jpg)


    Figure 9-13.


    The Necromancer GUI on the Asset Store


    Download and import the Necromancer GUI and then drag its skin file (named Necromancer
    GUI) into the Skin property that’s now in the Inspector view (Figure [9-14](#A310332_2_En_9_Chapter.html#Fig14)).


    ![A310332_2_En_9_Fig14_HTML.jpg](Images/A310332_2_En_9_Fig14_HTML.jpg)


    Figure 9-14.


    The Necromancer GUI


    Then click Play, and you have a much more ornate pause menu. Figure [9-15](#A310332_2_En_9_Chapter.html#Fig15)
    shows how the pause menu Graphics panel looks with the Necromanger GUI. Look at
    all the pretty buttons!


    ![A310332_2_En_9_Fig15_HTML.jpg](Images/A310332_2_En_9_Fig15_HTML.jpg)


    Figure 9-15.


    The Necromancer GUI skin in action


    ### The Complete Script


    The finalized start/pause menu script is significantly longer than the scoreboard
    script, so the complete listing is omitted here. All the code has been shown in
