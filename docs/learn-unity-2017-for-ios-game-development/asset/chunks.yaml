- fmt: '### Reference Manual


    The `Reference Manual` describes all the components and assets you optimized.
    Among those components, you tweaked the camera frustum and visibility mask, adjusted
    the culling mask and distance for the light in addition to disabling its shadow,
    minimized the number of shadow casters and receivers per `MeshFilter`, simplified
    the shaders for each `MeshRenderer`, and replaced a `MeshCollider` with a `Box`
    collider. You looked at the import settings for the various asset types referenced
    by the components: `Texture2D`, `AudioClip`, `Mesh`, and `Animation`. The `Reference
    Manual` also documents the settings managers you customized, including `Quality
    Settings`, `Physics Manager`, `Time Manager`, and `Audio Manager`. You also used
    the `GUIText` component, sibling of the `GUITexture` you use for a splash screen,
    for your frame rate display.


    ### Scripting Reference


    The “Scripting Overview” section of the `Scripting Reference` has a “Performance
    Optimization” page with some tips on how to write faster scripts. The one new
    function you learned in this chapter is the static function `Combine` in the `StaticBatchingUtility`
    class (`Combine` is the only function in that class), which you called to batch
    a hierarchy of `GameObjects` at runtime. The one new variable you learned in this
    chapter is the `useGUILayout` variable in the `MonoBehaviour` class, which when
    set to `true` provides a performance increase by telling the UnityGUI system that
    the current `OnGUI` callback will not be performing any automatic layout using
    the `GUILayout` functions.


    The settings managers all have corresponding classes so that their settings can
    be queried and set with scripts. Because all of the settings managers except `Render
    Settings` are active for the entire game and not per scene, script access allows
    you to adjust settings for each scene. For example, you might define a quality
    level for each scene and add a script to each scene that loads the appropriate
    quality level. The classes corresponding to the settings managers discussed in
    this chapter include `Quality Settings`, `Audio Settings`, `Physics`, and `Time`.


    You also used the `Time` class, evaluating its `timeScale` and `deltaTime` variables
    and setting the `text` variable of a `GUIText` for your rudimentary frame rate
    display.


    ### Asset Store


    The `Asset Store` lists a few profiling systems (search for `profiler`) and some
    object pooling systems (search for `pool`), such as `PoolManager`, `Smart Pool`,
    and `Pooling Manager`.


    ### On the Web


    The Unity wiki at [`http://wiki.unity3d.com/`](http://wiki.unity3d.com/) has some
    performance tips under its “Tips, Tricks and Tools” section and several performance-related
    scripts. In particular, the “FramesPerSecond” page lists several frame-rate display
    scripts more sophisticated than the one you created in this chapter (for example,
    they calculate the frame rate from a series of frames for a steadier display).


    The Umbra occlusion culling system is developed by Umbra Software at [`http://umbrasoftware.com/`](http://umbrasoftware.com/)
    . The Beast lightmapping system is an Autodesk product with a product page at
    [`http://gameware.autodesk.com/beast`](http://gameware.autodesk.com/beast) .


    ### Books


    I’ve mentioned `Real-Time Rendering` ( [`http://realtimerendering.com`](http://realtimerendering.com)
    ) a couple of times already, but it’s really, really relevant to the graphics
    optimizations in this chapter. Just the treatment on mipmapping is a good read.


    # 15. Where to Go from Here?


    You’ve now completed this introduction to Unity and Unity iOS development, including
    downloading and installing Unity, developing a simple bowling game in the Unity
    Editor , getting it to run on iOS, and finally optimizing it to run with decent
    performance. Since not every Unity feature or game development topic was covered
    (this book would start to resemble a multivolume encyclopedia set!), I’ll wrap
    up with a chapter’s worth of “Explore Further.”


    ## More Scripting


    I just scratched the surface with Unity scripting, not only in the variety of
    scripting languages offered and the extensive set of Unity classes but also what
    is scripted.


    ### Editor Scripts


    If you feel there’s something missing in the Unity Editor , there’s a good chance
    you can add the feature by writing Editor scripts. These are scripts also written
    in JavaScript, C#, or Boo, but they’re located in the `Editor` folder in the Project
    view. Editor scripts have access to the Editor GUI, project settings, and project
    assets via a set of Editor classes, documented in the Scripting Reference under
    “Editor Classes.”


    As an example, let’s create a menu on the Unity Editor menu bar with commands
    for activating and deactivating an entire hierarchy of `GameObjects`. In other
    words, the commands call `SetActive` on every `GameObject` in the hierarchy and
    are equivalent to clicking the check box of each `GameObject` in the Inspector
    view.


    Before Unity 4, each `GameObject` just had one active state represented by the
    active check box in the Inspector view and the `GameObject` variable `active`.
    But starting with Unity 4, that check box in the Inspector view represents the
    local active state of the `GameObject`, settable in a script by calling `SetActive`
    and read from the `GameObject` variable `activeSelf`. The global or “really” active
    state depends on all its parents also being locally active. Thus, ensuring all
    `GameObjects` in a hierarchy are locally active allows you to deactivate the entire
    group by toggling the active state of the root `GameObject`. Clicking all those
    check boxes by hand can be laborious and error-prone, so a single command to perform
    that operation would be a boon, especially for developers upgrading projects to
    Unity 4.


    The process of creating an Editor script is the same as creating a script intended
    for use in a scene, except the Editor script has to be located in the `Editor`
    folder. So, let’s create a new JavaScript in the Project view, name it `FuguEditor`,
    and place it in the `Editor` folder (Figure [15-1](#A310332_2_En_15_Chapter.html#Fig1)).


    ![A310332_2_En_15_Fig1_HTML.jpg](Images/A310332_2_En_15_Fig1_HTML.jpg)


    Figure 15-1. Creating a new Editor script


    Now add the code in Listing [15-1](#A310332_2_En_15_Chapter.html#Par8) to the
    script.


    ```

    #pragma strict

    @MenuItem ("FuguGames/ActivateRecursively")

    static function ActivateRecursively() {

    if (Selection.activeGameObject !=null) {

    SetActiveRecursively(Selection.activeGameObject,true);

    }

    }

    @MenuItem ("FuguGames/DeactivateRecursively")

    static function DeactivateRecursively() {

    if (Selection.activeGameObject !=null) {

    SetActiveRecursively(Selection.activeGameObject,false);

    }

    }

    static function SetActiveRecursively(obj:GameObject,val:boolean) {

    obj.SetActive(val);

    for (var i:int=0; i<obj.transform.GetChildCount(); ++i) {

    SetActiveRecursively(obj.transform.GetChild(i).gameObject,val);

    }

    }

    @MenuItem ("FuguGames/ActivateRecursively", true)

    @MenuItem ("FuguGames/DeactivateRecursively", true)

    static function ValidateGameObject() {

    return (Selection.activeGameObject !=null);

    }

    ```


    **Listing 15-1.** Complete Listing for `FuguEditor.js`


    The line `@MenuItem ("FuguGames/ActivateRecursively")` adds an `ActivateRecursively`
    item to the `FuguGames` menu on the Editor menu bar, creating the menu if it hadn’t
    already been created. The function following the `@MenuItem` line is invoked when
    that menu item is selected. `ActivateRecursively` checks whether a `GameObject`
    has been selected in the Editor, and, if so, then it passes that `GameObject`
    to the function `SetActiveRecursively` along with the value `true`. `SetActiveRecursively`
    in turn calls `SetActive` with the passed value `true` call for each `GameObject`
    in the hierarchy.


    After that, a similar block of code adds a `DeactivateRecursively` item to the
    menu, differing only in name and in passing `false` instead of `true` to `SetActiveRecursively`.'
