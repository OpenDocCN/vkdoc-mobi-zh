- fmt: "纹理的最大尺寸（`Max Size`）和压缩级别（`Compression Level`）列在预置设置中，并且独立于预置进行指定。对于常规纹理，默认的最大尺寸值`1024`是合理的（所有设备支持的最大值是`2048\
    \ × 2048`），但应根据具体情况选择。例如，如果一个大的纹理只有一种颜色，你完全可以将其设为`2 × 2`的纹理。如果一个纹理仅用于屏幕上较小或较远的网格，那么也没有理由将其设为大的纹理。对于闪屏（`splash\
    \ screen`），你可以将`Max Size`设为`2048`，以免纹理被缩放得比`iPad Retina`屏幕还小。\n\n> **提示**  \n\
    > 将最大缩放比例设为允许的最大值，并将压缩级别设为`TrueColor`，你可以在导入设置的预览区域中看到纹理的原始格式。\n\n对于常规纹理，默认的压缩级别`4-bit\
    \ PVRTC`（Power VR纹理压缩）是合理的。细节较少的纹理可以使用更激进的`2-bit PVRTC`。与`mipmapping`一样，纹理压缩减少了纹理映射占用的内存，图形处理器对`PVRTC`的支持提供了额外的性能优势。同样与`mipmapping`类似，特别精细的纹理可能会因压缩而过度降质，此时保持纹理为未压缩的`16-bit`或未压缩的`TrueColor`（`24-bit`）可能更好。对于`GUI`纹理，你可能不想压缩纹理（出于这个原因），或者在播放器设置中指定的闪屏纹理的情况下，应保持其原生格式不变。\n\
    \n### 音频\n\n你已在音频管理器（`Audio Manager`）中调整了`DSP Buffer Size`值，以获得更灵敏的碰撞音效，这以一定的处理开销换取了更低的延迟。与纹理类似，你也可以调整`AudioClip`的导入设置。类比于纹理的两大类用途（3D和GUI），声音也有2D和3D之分：3D声音与`GameObject`相关联，或者至少与3D世界中的某个位置相关；而2D声音用于环境音或音乐（例如你在第[5](../Text/A310332_2_En_5_Chapter.html)章的舞蹈场景中添加的歌曲）。\n\
    \n让我们比较一下你的几个保龄球音效：球瓶碰撞音效（图[14-30](#A310332_2_En_14_Chapter.html#Fig30)）和球滚动音效（图[14-31](#A310332_2_En_14_Chapter.html#Fig31)）。这两种音效都源自世界中的某个位置，甚至会相对于主摄像机（`Main\
    \ Camera`）移动（更准确地说，是相对于附加到主摄像机上的`AudioListener`组件移动）。因此，在它们的导入设置中都被标记为3D声音。3D声音应为单声道（`mono`），而非立体声。幸运的是，这两个音效的原始音频文件都是单声道的，所以你无需选择“`Force\
    \ to mono`”。\n\n![A310332_2_En_14_Fig31_HTML.jpg](Images/A310332_2_En_14_Fig31_HTML.jpg)\n\
    \n图 14-31. 优化球滚动音效的导入设置\n\n![A310332_2_En_14_Fig30_HTML.jpg](Images/A310332_2_En_14_Fig30_HTML.jpg)\n\
    \n图 14-30. 优化球瓶碰撞音效的导入设置\n\n碰撞音效文件相当小，因此我们保持其未压缩状态，以避免解压缩音效带来的处理开销，并最大化播放质量。滚动音效文件较大，因此我们将其压缩并在内存中保持压缩状态。由于这是唯一压缩的音效，并且`iOS`有硬件支持同时解码一个压缩音效，因此你不会产生任何软件解码开销。但是，如果场景中同时播放环境音或音乐，那么这些文件很可能大得多，你反而会希望对它们进行压缩。\n\
    \n> **提示**  \n> 导入未压缩的音效，以便灵活决定在编辑器中压缩哪些音效。除非你找到的压缩工具能提供比Unity压缩更好的质量，否则没有必要导入已压缩的音频。\n\
    \n选择压缩后，无间隙循环（`gapless looping`）选项变为可用。这会强制压缩过程处理音频剪辑的结尾，使其能够无缝循环，这正是你需要的，因为你要循环播放这个音效。\n\
    \n对于压缩音频，除了“`Uncompress on load`”和“`Compressed in memory`”之外，还有一个加载选项：“`Stream\
    \ from disc`”。从磁盘流式传输会有一些额外的开销，但对于连续播放多首歌曲的场景来说，这是一个很好的选择，因为将所有歌曲都保留在内存中是行不通的。\n\
    \n### 网格\n\n大多数影响优化的网格相关导入设置（图[14-32](#A310332_2_En_14_Chapter.html#Fig32)）主要影响内存使用。\n\
    \n![A310332_2_En_14_Fig32_HTML.jpg](Images/A310332_2_En_14_Fig32_HTML.jpg)\n\n\
    图 14-32. 优化网格的导入设置\n\n第一个是网格压缩（`Mesh Compression`），它通过降低数值精度（即用于表示顶点、法线、纹理坐标和切线的位数）来减少网格占用的空间和内存。这也会降低视觉质量，因此最好进行试验，找到不降低外观效果的最大压缩级别。可用的级别有低（`Low`）、中（`Medium`）、高（`High`）和无（`None`）。默认值为`None`。\n\
    \n在网格压缩下面列出的是读写启用（`Read/Write Enabled`）。默认情况下它是开启的，会创建一个可以修改的网格副本。但如果你没有任何读取或写入网格变量（如顶点和法线）的脚本（通常不需要），则可以保持此选项关闭。\n\
    \n优化网格（`Optimize Mesh`），不要与播放器设置中的网格优化（`Mesh Optimization`）选项混淆，它通过优化网格三角形列表的排列来提供一些性能改进。\n\
    \n如果你不打算使用网格碰撞器（`Mesh collider`），请关闭生成碰撞体（`Generate Colliders`）。事实上，作为一项规则，关闭此选项是个好主意，因为如果需要，你总可以手动添加网格碰撞器，但通常更倾向于添加一个或多个基本碰撞体。\n\
    \n如果你知道此网格的着色器不需要法线或切线，则可以分别将法线（`Normals`）和切线（`Tangents`）选项设置为`None`。但是，如果你在播放器设置（`Player\
    \ Settings`）中选择了网格优化（`Mesh Optimization`），未使用的顶点数据会在构建时被自动移除。\n\n## 优化脚本\n\n常见的代码优化技巧同样适用于Unity中的脚本编写。例如，你已经特别注意调用`Vector3`的`magnitudeSquared`函数而不是`magnitude`，以避免其内部的开平方根运算。但我将在以下章节中描述一些不太明显的方法，用于提高脚本性能或使用脚本来改善性能。"
  raw: 'The max texture size and compression level of the texture are listed in the
    preset settings and are specified independently of the presets. For regular textures,
    the default Max Size value of 1024 is reasonable (2048 × 2048 is the maximum supported
    by all devices), but it should be chosen on a case-by-case basis. For example,
    if a large texture has just one color, you might as well make it a 2 × 2 texture.
    And if a texture is used only on a mesh that is small or far away on-screen, then
    there’s no reason to make it a big texture. For the splash screen, you set Max
    Size to 2048 so you don’t scale the texture to be smaller than the iPad Retina
    screen.


    Tip


    Setting the max scale to the maximum allowable and the compression level to TrueColor
    allows you to see the original format of the texture in the preview area of the
    import settings.


    For a regular texture, the default compression level, 4-bit PVRTC (Power VR Texture
    Compression), is reasonable. A texture with less detail may work with the more
    aggressive 2-bit PVRTC. As with mipmapping, texture compression reduces the memory
    taken by texture mapping, and the graphics processor support for PVRTC provides
    an additional performance advantage. And as with mipmapping, particularly detailed
    textures may be degraded too much by compression, in which case leaving the texture
    at uncompressed 16-bit or uncompressed TrueColor (24-bit) may be better. For GUI
    textures, you might not want to compress the texture for that reason, or in the
    case of the splash screen that you assign in the player settings, you should leave
    it alone in its native format.


    ### Audio


    You adjusted the DSP Buffer Size value in the Audio Manager for more responsive
    collision sounds, lowering the latency at some processing expense. As with textures,
    you can also adjust the import settings for AudioClips. Analogous to having two
    general categories of texture usage, for 3D and GUI, you also have 2D and 3D sounds;
    3D sounds are associated with GameObjects, or at least a position in the 3D world,
    while 2D sounds are used for ambient audio or music (like the song you added to
    your dance scene in Chapter [5](../Text/A310332_2_En_5_Chapter.html)).


    Let’s compare a couple of your bowling sounds: the pin collision sound (Figure
    [14-30](#A310332_2_En_14_Chapter.html#Fig30)) and the ball-rolling sound (Figure
    [14-31](#A310332_2_En_14_Chapter.html#Fig31)). They’re both sounds that emanate
    from a position in the world and even move with respect to the Main Camera (or
    rather, more precisely, they move with respect to the AudioListener component
    attached to the Main Camera). Thus, they’re both marked as 3D sounds in their
    import settings. 3D sounds should be mono, not stereo. Fortunately, the original
    audio files for both of these sounds are mono, so you don’t have to select “Force
    to mono.”


    ![A310332_2_En_14_Fig31_HTML.jpg](Images/A310332_2_En_14_Fig31_HTML.jpg)


    Figure 14-31.


    Optimizing the import settings for the ball-rolling sound


    ![A310332_2_En_14_Fig30_HTML.jpg](Images/A310332_2_En_14_Fig30_HTML.jpg)


    Figure 14-30.


    Optimizing the import settings for the pin collision sound


    The collision sound is fairly small, so let’s leave it uncompressed to avoid the
    processing involved in uncompressing the sound and to maximize the quality of
    the playback. The rolling sound is a larger sound file, so let’s compress it and
    leave it compressed in memory. Because this is the only compressed sound and iOS
    has hardware support for decoding one compressed sound at any time, you’re not
    incurring any software decoding overhead. However, if you also had ambient sound
    or music playing in the scene, chances are that would be a much larger sound file
    and you would want to compress that instead.


    Tip


    Import uncompressed sounds to allow flexibility in deciding which sounds to compress
    in the Editor. There’s no reason to import compressed audio unless you’ve found
    a compression tool that gives you better quality than Unity’s compression.


    With compression selected, the gapless looping option becomes available. That
    forces the compression to process the end of the audio clip so it can loop seamlessly,
    which is what you want, since you’re playing this sound in a loop.


    For compressed audio, there is one other load option besides “Uncompress on load”
    and “Compressed in memory” called “Stream from disc.” There is some additional
    overhead in streaming from disc, but that’s a good option for a scene that plays
    multiple songs in succession, in which case it would be prohibitive to keep all
    of those songs in memory.


    ### Meshes


    Most of the mesh-related import settings (Figure [14-32](#A310332_2_En_14_Chapter.html#Fig32))
    that affect optimization have an impact principally on memory usage.


    ![A310332_2_En_14_Fig32_HTML.jpg](Images/A310332_2_En_14_Fig32_HTML.jpg)


    Figure 14-32.


    Optimizing the import settings for a mesh


    The first is Mesh Compression, which reduces the amount of space and memory used
    for a mesh by reducing the numerical precision (i.e., number of bits used to represent
    the vertices, normals, texture coordinates, and tangents). This can also reduce
    the visual quality, so it’s best to experiment and find the maximum compression
    level that doesn’t degrade the appearance. The available levels are low, medium,
    high, and none. The default is none.


    Listed below Mesh Compression is Read/Write Enabled. This is by default on, creating
    a copy of the mesh that can be modified. But if you don’t have any scripts that
    read or write mesh variables, such as vertices and normals, and you usually don’t
    need any, then you can leave this option off.


    Optimize Mesh, not to be confused with the Mesh Optimization option in the player
    settings, offers some performance improvement by optimizing the arrangement of
    the mesh’s triangle list.


    Leave Generate Colliders off if you’re not going to use a Mesh collider. In fact,
    it’s not a bad idea to leave this option off as a rule, because you can always
    add a Mesh collider manually if you need one, but it’s often preferable to add
    one or more primitive colliders instead.


    If you know the shader for this mesh will not require normals or tangents, you
    can set the Normals and Tangents options, respectively, to none. But if you have
    Mesh Optimization selected in the Player Settings, unused vertex data will be
    removed at build time anyway.


    ## Optimize Scripts


    The usual tips for optimizing code apply to scripting in Unity. For example, you’ve
    already made a point of calling the magnitudeSquared function of Vector3 instead
    of magnitude to avoid its internal square root operation. But I’ll describe some
    of the less obvious ways to improve script performance or use scripts to improve
    performance in the following sections.'
  trans: "\n纹理的最大尺寸（`Max Size`）和压缩级别（`Compression Level`）列在预置设置中，并且独立于预置进行指定。对于常规纹理，默认的最大尺寸值`1024`是合理的（所有设备支持的最大值是`2048\
    \ × 2048`），但应根据具体情况选择。例如，如果一个大的纹理只有一种颜色，你完全可以将其设为`2 × 2`的纹理。如果一个纹理仅用于屏幕上较小或较远的网格，那么也没有理由将其设为大的纹理。对于闪屏（`splash\
    \ screen`），你可以将`Max Size`设为`2048`，以免纹理被缩放得比`iPad Retina`屏幕还小。\n\n> **提示**  \n\
    > 将最大缩放比例设为允许的最大值，并将压缩级别设为`TrueColor`，你可以在导入设置的预览区域中看到纹理的原始格式。\n\n对于常规纹理，默认的压缩级别`4-bit\
    \ PVRTC`（Power VR 纹理压缩）是合理的。细节较少的纹理可以使用更激进的`2-bit PVRTC`。与`mipmapping`一样，纹理压缩减少了纹理映射占用的内存，图形处理器对`PVRTC`的支持提供了额外的性能优势。同样与`mipmapping`类似，特别精细的纹理可能会因压缩而过度降质，此时保持纹理为未压缩的`16-bit`或未压缩的`TrueColor`（`24-bit`）可能更好。对于`GUI`纹理，你可能不想压缩纹理（出于这个原因），或者在播放器设置中指定的闪屏纹理的情况下，应保持其原生格式不变。\n\
    \n### 音频\n\n你已在音频管理器（`Audio Manager`）中调整了`DSP Buffer Size`值，以获得更灵敏的碰撞音效，这以一定的处理开销换取了更低的延迟。与纹理类似，你也可以调整`AudioClip`的导入设置。类比于纹理的两大类用途（3D\
    \ 和 GUI），声音也有 2D 和 3D 之分：3D 声音与`GameObject`相关联，或者至少与 3D 世界中的某个位置相关；而 2D 声音用于环境音或音乐（例如你在第\
    \ 5 章的舞蹈场景中添加的歌曲）。\n\n让我们比较一下你的几个保龄球音效：球瓶碰撞音效（图 14-30）和球滚动音效（图 14-31）。这两种音效都源自世界中的某个位置，甚至会相对于主摄像机（`Main\
    \ Camera`）移动（更准确地说，是相对于附加到主摄像机上的`AudioListener`组件移动）。因此，在它们的导入设置中都被标记为 3D 声音。3D\
    \ 声音应为单声道（`mono`），而非立体声。幸运的是，这两个音效的原始音频文件都是单声道的，所以你无需选择“`Force to mono`”。\n\n\
    ![A310332_2_En_14_Fig31_HTML.jpg](img/A310332_2_En_14_Fig31_HTML.jpg)\n\n图 14-31.\
    \ 优化球滚动音效的导入设置\n\n![A310332_2_En_14_Fig30_HTML.jpg](img/A310332_2_En_14_Fig30_HTML.jpg)\n\
    \n图 14-30. 优化球瓶碰撞音效的导入设置\n\n碰撞音效文件相当小，因此我们保持其未压缩状态，以避免解压缩音效带来的处理开销，并最大化播放质量。滚动音效文件较大，因此我们将其压缩并在内存中保持压缩状态。由于这是唯一压缩的音效，并且`iOS`有硬件支持同时解码一个压缩音效，因此你不会产生任何软件解码开销。但是，如果场景中同时播放环境音或音乐，那么这些文件很可能大得多，你反而会希望对它们进行压缩。\n\
    \n> **提示**  \n> 导入未压缩的音效，以便灵活决定在编辑器中压缩哪些音效。除非你找到的压缩工具能提供比 Unity 压缩更好的质量，否则没有必要导入已压缩的音频。\n\
    \n选择压缩后，无间隙循环（`gapless looping`）选项变为可用。这会强制压缩过程处理音频剪辑的结尾，使其能够无缝循环，这正是你需要的，因为你要循环播放这个音效。\n\
    \n对于压缩音频，除了“`Uncompress on load`”和“`Compressed in memory`”之外，还有一个加载选项：“`Stream\
    \ from disc`”。从磁盘流式传输会有一些额外的开销，但对于连续播放多首歌曲的场景来说，这是一个很好的选择，因为将所有歌曲都保留在内存中是行不通的。\n\
    \n### 网格\n\n大多数影响优化的网格相关导入设置（图 14-32）主要影响内存使用。\n\n![A310332_2_En_14_Fig32_HTML.jpg](img/A310332_2_En_14_Fig32_HTML.jpg)\n\
    \n图 14-32. 优化网格的导入设置\n\n第一个是网格压缩（`Mesh Compression`），它通过降低数值精度（即用于表示顶点、法线、纹理坐标和切线的位数）来减少网格占用的空间和内存。这也会降低视觉质量，因此最好进行试验，找到不降低外观效果的最大压缩级别。可用的级别有低（`Low`）、中（`Medium`）、高（`High`）和无（`None`）。默认值为`None`。\n\
    \n在网格压缩下面列出的是读写启用（`Read/Write Enabled`）。默认情况下它是开启的，会创建一个可以修改的网格副本。但如果你没有任何读取或写入网格变量（如顶点和法线）的脚本（通常不需要），则可以保持此选项关闭。\n\
    \n优化网格（`Optimize Mesh`），不要与播放器设置中的网格优化（`Mesh Optimization`）选项混淆，它通过优化网格三角形列表的排列来提供一些性能改进。\n\
    \n如果你不打算使用网格碰撞器（`Mesh collider`），请关闭生成碰撞体（`Generate Colliders`）。事实上，作为一项规则，关闭此选项是个好主意，因为如果需要，你总可以手动添加网格碰撞器，但通常更倾向于添加一个或多个基本碰撞体。\n\
    \n如果你知道此网格的着色器不需要法线或切线，则可以分别将法线（`Normals`）和切线（`Tangents`）选项设置为`None`。但是，如果你在播放器设置（`Player\
    \ Settings`）中选择了网格优化（`Mesh Optimization`），未使用的顶点数据会在构建时被自动移除。\n\n## 优化脚本\n\n常见的代码优化技巧同样适用于\
    \ Unity 中的脚本编写。例如，你已经特别注意调用`Vector3`的`magnitudeSquared`函数而不是`magnitude`，以避免其内部的开平方根运算。但我将在以下章节中描述一些不太明显的方法，用于提高脚本性能或使用脚本来改善性能。\n"
- fmt: '### Cache GetComponent


    In general, it’s a good idea to assign a value to a variable if you’re going to
    calculate that value more than once, whether it’s a math expression, the result
    of a function call, or even accessing the value of an instance or static variable,
    which might in fact be internally performing a function call.


    This is the case with the component shortcut variables you’ve been accessing in
    your scripts like `transform`, `audio`, and `rigidbody`, each of which results
    in a call to `GetComponent` that searches among all the components attached to
    the `GameObject` for a component with the matching type.


    So, any time you’re going to reference a component’s shortcut variable more than
    once in a script, whether it’s listed more than once in the script or referenced
    repeatedly in callback like `Update` (especially if the shortcut is referenced
    in a loop with many iterations), you should assign the component to a variable
    early on. Listing [14-6](#A310332_2_En_14_Chapter.html#Par123) shows how to apply
    this optimization to your `FuguReset` script.


    ```

    #pragma strict

    private var startPos:Vector3;

    private var startRot:Vector3;

    // for performance

    private var trans:Transform = null;

    private var body:Rigidbody = null;

    function Awake() {

    // cache the Transform reference

    trans = transform;

    body = rigidbody;

    // save the initial position and rotation of this GameObject

    startPos = trans.localPosition;

    startRot = trans.localEulerAngles;

    }

    function ResetPosition() {

    // set back to initial position

    trans.localPosition = startPos;

    trans.localEulerAngles = startRot;

    // make sure we stop all physics movement

    if (body != null) {

    body.velocity = Vector3.zero;

    body.angularVelocity = Vector3.zero;

    }

    }

    Listing 14-6.

    Optimized FuguReset.js Script

    ```


    The original version of `FuguReset.js` referenced two component shortcut variables:
    `transform` and `rigidbody`. So, you add two private variables, named `trans`
    and `body`, to reference those components and initialize `trans` and `body` in
    the `Awake` callback.


    This cleanup will be applicable to many of your scripts because you commonly reference
    `transform`, `rigidbody`, and `audio`. I won’t list all of the revised code, but
    the updated scripts are available in the project files for this chapter on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739).


    ### UnityGUI


    The detailed profile results indicate that UnityGUI takes up a significant portion
    of your frametime. One source of slowdown in UnityGUI is the overhead of using
    `GUILayout` to automatically place GUI elements. You don’t use `GUILayout` in
    the scoreboard, so you can add an `Awake` callback that sets `useGUILayout` to
    `false` in the `FuguBowlScoreboard` script (Listing [14-7](#A310332_2_En_14_Chapter.html#Par127)).


    ```

    function Awake() {

    useGUILayout = false;

    }

    Listing 14-7.

    Setting useGUILayout to False in FuguBowlScoreboard.js

    ```


    The pause menu still uses `GUILayout`, but because the menu is only up when the
    game is paused and won’t affect gameplay, its performance is less of a concern.


    ### Runtime Static Batching


    Dynamic batching can combine similar meshes that weren’t candidates for static
    batching at build time because they’re moving or happened to be created during
    the game. But dynamic batching has to constantly update the batching, which is
    why the batching time is listed in the profile results. This rebatching seems
    like a waste if the batched objects are moving together or if they are not moving
    but were instantiated at runtime. Also, since batching takes memory, there is
    an upper limit on the amount of dynamic batching that will occur (the Unity documentation
    currently says 30,000 vertices, but that is subject to change).


    Fortunately, there is a class called `StaticBatchingUtility` that allows you to
    perform static batching at runtime by calling a `Combine` function. Listing [14-8](#A310332_2_En_14_Chapter.html#Par131)
    shows a really simple script that just calls `StaticBatchingUtility.Combine` on
    the script’s `GameObject`.


    ```

    #pragma strict

    function Start() {

    StaticBatchingUtility.Combine(gameObject);

    }

    Listing 14-8.

    Script for Statically Batching an Object Hierarchy

    ```


    Although simple, the script is fully functional. For example, in the rotating
    cube scene, if you dragged this script onto the main rotating cube that has two
    child cubes (and disabled the individual rotation scripts of the child cubes),
    all three cubes would be statically batched together when the scene starts playing.
    The batched `GameObjects` don’t have to be in a hierarchy together. `StaticBatchingUtility.Combine`
    is an overloaded function, and with another version it takes two arguments: an
    array of `GameObjects` to batch together and a `GameObject` designated as the
    parent.


    ### Share Materials


    For batching to take place, whether statically, dynamically, or through a call
    to `StaticBatchingUtility.Combine`, the meshes to be batched must share the same
    material or set of materials. But for dynamic batching in particular, you need
    to be careful that you don’t break that sharing if you modify the material.


    For example, the script in Listing [14-9](#A310332_2_En_14_Chapter.html#Par135)
    animates the texture of a material by constantly changing its texture offsets.
    This provides a scrolling texture effect; in HyperBowl, this script is used to
    animate textures for scrolling neon signs, drifting clouds in the sky, and flowing
    water. However, when the script modifies the material by calling its `SetTextureOffset`
    function, a new material is created if the original material happens to be shared.


    ```

    #pragma strict

    var speed:Vector2;

    var materialIndex:int=0;

    private var offset:Vector2;

    private var material:Material;

    function Start() {

    offset=new Vector2(0,0);

    material = renderer.materials[materialIndex];

    }

    function Update () {

    var dtime:float = Time.deltaTime;

    offset.x=(offset.x+speed.x*dtime)%1.0f;

    offset.y=(offset.y+speed.y*dtime)%1.0f;

    material.SetTextureOffset("_MainTex",offset);

    }

    Listing 14-9.

    Script That Animates the Texture Coordinate Offsets of a Material

    ```


    This makes sense, of course. If you create two `GameObjects` with the same material
    and decide you want to alter the appearance of one by modifying its material,
    you don’t necessarily want to make the same change to the other `GameObject`.


    However, if you’re going to apply the same animation to all the `GameObjects`
    that are sharing the material, then there’s no reason to stop sharing the material.
    So, you can modify the script to access the `sharedMaterials` variable of the
    `MeshRenderer` instead of the `materials` variable. Accessing `sharedMaterials`
    (or `sharedMaterial` if you assume only one material on the `GameObject`) means
    you really do want to change the shared material and avoids creating a new one,
    thus preserving eligibility for batching. To handle both shared and nonshared
    material cases, let’s add a public variable that allows you to specify whether
    the animation breaks material sharing, and let’s use that value to determine whether
    to modify `renderer.materials` or `renderer.sharedMaterials` (Listing [14-10](#A310332_2_En_14_Chapter.html#Par138)).


    ```

    #pragma strict

    var speed:Vector2;

    var materialIndex:int=0;

    var shared:boolean = true;

    private var offset:Vector2;

    private var material:Material;

    function Start() {

    offset=new Vector2(0,0);

    if (shared) {

    material = renderer.sharedMaterials[materialIndex];

    } else {

    material = renderer.materials[materialIndex];

    }

    }

    function Update () {

    var dtime:float = Time.deltaTime;

    offset.x=(offset.x+speed.x*dtime)%1.0f;

    offset.y=(offset.y+speed.y*dtime)%1.0f;

    material.SetTextureOffset("_MainTex",offset);

    }

    Listing 14-10.

    Texture Animation Script with Option to Share Material

    ```


    An additional, although less significant, optimization is available when using
    this script to animate a shared material. It would be redundant for every `GameObject`
    with the same material to run the same texture animation script; just one instance
    of the script is sufficient to drive the animation for everyone.'
