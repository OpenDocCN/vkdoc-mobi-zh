    \ with the contents of Listing 9-2.\n\n```javascript\n#pragma strict\nvar style:GUIStyle;\
    \ // customize the appearance\nfunction OnGUI() {\n    for (var f:int=0; f<10;\
    \ f++) {\n        var score:String=\"\";\n        var roll1:int = FuguBowl.player.scores[f].ball1;\n\
    \        var roll2:int = FuguBowl.player.scores[f].ball2;\n        var roll3:int\
    \ = FuguBowl.player.scores[f].ball3;\n        switch (roll1) {\n            case\
