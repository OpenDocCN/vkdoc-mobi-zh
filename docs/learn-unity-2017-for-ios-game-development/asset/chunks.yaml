- fmt: '### The Transform Component


    Like every other `GameObject`, the `Main Camera` has a `Transform Component` that
    specifies the position, rotation, and scale of the `GameObject`. Scale is meaningless
    for Cameras, but the position and rotation allow you to place and point the Camera.


    Click the little question mark icon on the top right of the Component. That will
    bring up the Reference Manual documentation for the `Transform Component` in a
    web browser window.


    **Tip:** Every time you encounter a new Component, the first thing you should
    do is check the documentation.


    The Reference Manual page for each Component describes the properties of the Component
    and explains the usage of the Component. Each Reference Manual page also features
    a link to the corresponding Script Reference page for the Component, detailing
    how to access the Component from within a script.


    ### The Camera Component


    The Camera Component is what makes this `GameObject` a Camera. To be perfectly
    precise, `Main Camera` is a `GameObject` that has a Component which specifically
    is a subclass of Component called `Camera`. But it’s convenient to say `Main Camera`
    is a Camera (since that is its function), and say Camera Component to make clear
    that we’re talking about the Component.


    Again, clicking on the question mark icon of this Component will bring up the
    corresponding Reference manual page, listing the Camera Component properties.
    But I’ll go through them briefly here, in top-down order as they’re displayed
    in the Inspector View.


    #### Clear Flags


    The `Clear Flags` property specifies how the Camera initializes the color and
    depth buffers at the beginning of each rendering pass. The color buffer contains
    the pixels the Camera renders, and the depth buffer holds the distance from the
    Camera of each pixel (this is how it determines if a newly drawn pixel should
    replace the previous pixel at that location).


    - `Solid Color` indicates the color buffer will be cleared to the specified color,
    essentially using it as a background color, and the depth buffer will be cleared.

    - `Skybox` also clears the depth buffer and renders the specified Skybox textures
    in the background (defaulting to `Solid Color` if no Skybox is supplied).

    - `Depth Only` leaves the color buffer alone and only clears the depth buffer.
    This is useful when adding a Camera that renders after the Main Camera and over
    its results, e.g., to render a user interface or HUD (heads-up display) over the
    rendering of the game world. In that case, you don’t want the second Camera to
    clear the screen before rendering.


    #### Culling Mask


    This is where the usefulness of Layers becomes apparent. The `Culling Mask` specifies
    which Layers are rendered by the Camera. In other words, a `GameObject` will only
    be visible to the Camera if its Layer is included in the Camera’s `Culling Mask`.


    The default, `Everything`, corresponds to all Layers, but, for example, if you
    had an HUD Camera, you might define an HUD Layer for all your HUD GameObjects
    and set the `Culling Mask` for the HUD Camera to only render the HUD Layer. And
    then you would set the `Culling Mask` of the Main Camera to include everything
    except the HUD Layer.


    #### Projection


    By default, the Camera is set to use a perspective projection, which as I mentioned
    in describing the Scene View in the previous chapter, means objects are smaller
    as they recede from the Camera (the effect is called foreshortening). In this
    mode, the Camera has a viewing volume resembling a four-sided pyramid (not counting
    the base of the pyramid) emanating from the Camera position in the view direction.
    This viewing volume is called a frustum and is defined by a Field of View (FOV),
    near and far plane.


    The Field of View is analogous to the FOV of a real-world camera. The FOV is the
    vertical viewing angle, in degrees. The horizontal viewing angle is implicitly
    defined by the combination of the FOV and the aspect ratio of the Camera. The
    near and far planes specify how far the screen is in front of the camera and how
    far away the base of the frustum is. Nothing outside the frustum is visible to
    the Camera.


    To get a better idea of how the frustum looks, take a look at the Scene View.
    Figure [3-7](#A310332_2_En_3_Chapter.html#Fig7) shows how the frustum of the Main
    Camera looks when you press the y-axis arrow on the Scene Gizmo, changing the
    vantage to a top-down view. Press the F key (shortcut for the Frame Selected command
    in the Edit menu) to center the Main Camera in the Scene view, then zoom out until
    you can see the entire frustum. You should also uncheck the 3D Gizmos check box
    in the Gizmos menu so that the Camera icon doesn’t shrink to nothingness when
    you zoom out.


    The Scene View also displays a Camera Preview in the lower right corner. This
    is what the Camera would render right now, which is also what the Game View would
    display right now (you can take a look at the Game View right now to confirm).
    There’s nothing visible in this scene yet, but this will be a handy feature later.


    ![A310332_2_En_3_Fig7_HTML.jpg](Images/A310332_2_En_3_Fig7_HTML.jpg)


    **Figure 3-7.** The Camera frustum in the Scene View


    Note that the frustum outline and the Camera Preview only display when the Camera
    is selected and the Camera Component in the Inspector view is open (every Component
    in the Inspector view can be opened or closed by clicking the little triangle
    in the upper left). This is generally true of any Component that has an extra
    graphic display in the Scene View. Opening and closing the Component in the Inspector
    View will toggle that display.


    The alternative to perspective is orthographic, which has no foreshortening and
    thus is appropriate for 2D games, isometric games, user interfaces, and HUDs.
    The only Camera property specific to orthographic mode is the orthographic projection
    size, which is the half-height of the orthographic view in world units.


    #### Viewport


    The viewport of `(0,0,1,1)` indicates the Camera covers the whole screen. The
    numbers are normalized screen coordinates, meaning the coordinates across the
    width and height of the screen range from 0 to 1. For a split screen or a window
    within the screen, you would have multiple Cameras, each with different viewports;
    `(0,0,1,.5)` covers half of the screen. However, Unity iOS doesn’t support viewports
    that don’t cover the full screen.


    #### Depth


    Depth is another property useful when there are multiple Cameras in the scene.
    During each rendering update, the Cameras will perform their rendering passes
    in the order of their depth values, lowest to highest. So if you had a second
    Camera for viewing an HUD, for example, you might specify that the Main Camera
    has a depth of 0 and the HUD Camera a depth of 1 to ensure the game world renders
    first and the game HUD renders on top of that.


    #### Rendering Path


    The rendering path determines how the scene is rendered. Each Camera can have
    its own rendering or default to the one specified in the Player Settings. `Vertex
    Lit` is the simplest but fastest path, `Forward Rendering` supports more advanced
    graphics, and `Deferred` is the fanciest but slowest and not available in Unity
    iOS.


    #### Target Texture


    If a texture is assigned to this property, the camera renders to that texture
    instead of the screen. The texture can then be placed in the scene, for example,
    as a television display or the rear-view mirror in a car.


    #### HDR


    This property enables High Dynamic Range (HDR), which handles pixels with RGB
    components outside the normal 0-to-1 range and facilitates rendering of extremely
    high-contrast scenes. HDR is not available in Unity iOS.'
  raw: '### The Transform Component


    Like every other GameObject, the Main Camera has a Transform Component that specifies
    the position, rotation, and scale of the GameObject. Scale is meaningless for
    Cameras, but the position and rotation allow you to place and point the Camera.


    Click the little question mark icon on the top right of the Component. That will
    bring up the Reference Manual documentation for the Transform Component in a web
    browser window.


    Tip


    Every time you encounter a new Component, the first thing you should do is check
    the documentation.


    The Reference Manual page for each Component describes the properties of the Component
    and explains the usage of the Component. Each Reference Manual page also features
    a link to the corresponding Script Reference page for the Component, detailing
    how to access the Component from within a script.


    ### The Camera Component


    The Camera Component is what makes this GameObject a Camera. To be perfectly precise,
    Main Camera is a GameObject that has a Component which specifically is a subclass
    of Component called Camera. But it’s convenient to say Main Camera is a Camera
    (since that is its function), and say Camera Component to make clear that we’re
    talking about the Component.


    Again, clicking on the question mark icon of this Component will bring up the
    corresponding Reference manual page, listing the Camera Component properties.
    But I’ll go through them briefly here, in top-down order as they’re displayed
    in the Inspector View.


    #### Clear Flags


    The Clear Flags property specifies how the Camera initializes the color and depth
    buffers at the beginning of each rendering pass. The color buffer contains the
    pixels the Camera renders, and the depth buffer holds the distance from the Camera
    of each pixel (this is how it determines if a newly drawn pixel should replace
    the previous pixel at that location).


    Solid Color indicates the color buffer will be cleared to the specified color,
    essentially using it as a background color, and the depth buffer will be cleared.


    Skybox also clears the depth buffer and renders the specified Skybox textures
    in the background (defaulting to Solid Color if no Skybox is supplied).


    Depth Only leaves the color buffer alone and only clears the depth buffer. This
    is useful when adding a Camera that renders after the Main Camera and over its
    results, e.g., to render a user interface or HUD (heads-up display) over the rendering
    of the game world. In that case, you don’t want the second Camera to clear the
    screen before rendering.


    #### Culling Mask


    This is where the usefulness of Layers becomes apparent. The Culling Mask specifies
    which Layers are rendered by the Camera. In other words, a GameObject will only
    be visible to the Camera if its Layer is included in the Camera’s Culling Mask.


    The default, Everything, corresponds to all Layers, but, for example, if you had
    an HUD Camera, you might define an HUD Layer for all your HUD GameObjects and
    set the Culling Mask for the HUD Camera to only render the HUD Layer. And then
    you would set the Culling Mask of the Main Camera to include everything except
    the HUD Layer.


    #### Projection


    By default, the Camera is set to use a perspective projection, which as I mentioned
    in describing the Scene View in the previous chapter, means objects are smaller
    as they recede from the Camera (the effect is called foreshortening). In this
    mode, the Camera has a viewing volume resembling a four-sided pyramid (not counting
    the base of the pyramid) emanating from the Camera position in the view direction.
    This viewing volume is called a frustum and is defined by a Field of View (FOV)
    , near and far plane.


    The Field of View is analogous to the FOV of a real-world camera. The FOV is the
    vertical viewing angle, in degrees. The horizontal viewing angle is implicitly
    defined by the combination of the FOV and the aspect ratio of the Camera. The
    near and far planes specify how far the screen is in front of the camera and how
    far away the base of the frustum is. Nothing outside the frustum is visible to
    the Camera.


    To get a better idea of how the frustum looks, take a look at the Scene View.
    Figure [3-7](#A310332_2_En_3_Chapter.html#Fig7) shows how the frustum of the Main
    Camera looks when you press the y-axis arrow on the Scene Gizmo, changing the
    vantage to a top-down view. Press the F key (shortcut for the Frame Selected command
    in the Edit menu) to center the Main Camera in the Scene view, then zoom out until
    you can see the entire frustum. You should also uncheck the 3D Gizmos check box
    in the Gizmos menu so that the Camera icon doesn’t shrink to nothingness when
    you zoom out.


    The Scene View also displays a Camera Preview in the lower right corner. This
    is what the Camera would render right now, which is also what the Game View would
    display right now (you can take a look at the Game View right now to confirm).
    There’s nothing visible in this scene yet, but this will be a handy feature later.


    ![A310332_2_En_3_Fig7_HTML.jpg](Images/A310332_2_En_3_Fig7_HTML.jpg)


    Figure 3-7.


    The Camera frustum in the Scene View


    Note that the frustum outline and the Camera Preview only display when the Camera
    is selected and the Camera Component in the Inspector view is open (every Component
    in the Inspector view can be opened or closed by clicking the little triangle
    in the upper left). This is generally true of any Component that has an extra
    graphic display in the Scene View. Opening and closing the Component in the Inspector
    View will toggle that display.


    The alternative to perspective is orthographic, which has no foreshortening and
    thus is appropriate for 2D games, isometric games user interfaces, and HUDs. The
    only Camera property specific to orthographic mode is the orthographic projection
    size, which is the half-height of the orthographic view in world units .


    #### Viewport


    The viewport of (0,0,1,1) indicates the Camera covers the whole screen. The numbers
    are normalized screen coordinates, meaning the coordinates across the width and
    height of the screen range from 0 to 1\. For a split screen or a window within
    the screen, you would have multiple Cameras, each with different viewports, (0,0,1,.5)
    covers half of the screen. However, Unity iOS doesn’t support viewports that don’t
    cover the full screen.


    #### Depth


    Depth is another property useful when there are multiple Cameras in the scene.
    During each rendering update, the Cameras will perform their rendering passes
    in the order of their depth values, lowest to highest. So if you had a second
    Camera for viewing an HUD, for example, you might specify that the Main Camera
    has a depth of 0 and the HUD Camera a depth of 1 to ensure the game world renders
    first and the game HUD renders on top of that.


    #### Rendering Path


    The rendering path determines how the scene is rendered. Each Camera can have
    its own rendering or default to the one specified in the Player Settings. Vertex
    Lit is the simplest but fastest path, Forward Rendering supports more advanced
    graphics, and Deferred is the fanciest but slowest and not available in Unity
    iOS.


    #### Target Texture


    If a texture is assigned to this property, the camera renders to that texture
    instead of the screen. The texture can then be placed in the scene, for example,
    as a television display or the rear-view mirror in a car.


    #### HDR


    This property enables High Dynamic Range (HDR) , which handles pixels with RGB
    components outside the normal 0-to-1 range and facilitates rendering of extremely
    high-contrast scenes. HDR is not available in Unity iOS.'
  trans: '

    ### 变换组件


    与其他所有 `GameObject` 一样，`Main Camera` 拥有一个 `Transform 组件`，该组件规定了 `GameObject` 的位置、旋转和缩放比例。缩放比例对于摄像机来说没有意义，但位置和旋转允许你放置并对准摄像机。


    点击组件右上角的小问号图标。这将在网页浏览器中打开 `Transform 组件`的参考手册文档。


    **提示：** 每次遇到新组件时，你首先应该做的就是查阅文档。


    每个组件的参考手册页面都描述了该组件的属性并解释其用法。每个参考手册页面还包含一个指向该组件对应脚本参考页面的链接，详细说明如何从脚本中访问该组件。


    ### 摄像机组件


    摄像机组件是使得此 `GameObject` 成为摄像机的关键。更准确地说，`Main Camera` 是一个拥有一个组件的 `GameObject`，该组件是名为
    `Camera` 的组件子类。但是为了方便，我们可以说 `Main Camera` 是一个摄像机（因为这是它的功能），并称其为摄像机组件，以明确我们谈论的是这个组件。


    同样，点击该组件的问号图标将打开相应的参考手册页面，其中列出了摄像机组件的属性。不过，我将在这里按它们在 Inspector 视图中从上到下的顺序简要介绍一下。


    #### 清除标记


    `清除标记`属性指定了摄像机在每次渲染通道开始时如何初始化颜色和深度缓冲区。颜色缓冲区包含摄像机渲染的像素，而深度缓冲区保存了每个像素到摄像机的距离（这用于确定新绘制的像素是否应替换该位置的先前像素）。


    -   `实心颜色`表示颜色缓冲区会被清除为指定的颜色，本质上用作背景色，同时深度缓冲区也会被清除。

    -   `天空盒`也会清除深度缓冲区，并在背景中渲染指定的天空盒纹理（如果没有提供天空盒，则默认使用 `实心颜色`）。

    -   `仅深度`则保留颜色缓冲区不变，只清除深度缓冲区。这在添加一个在主摄像机之后渲染并覆盖其结果的摄像机时很有用，例如，在游戏世界渲染之上渲染用户界面或
    HUD（抬头显示器）。在这种情况下，你不想让第二个摄像机在渲染前清除屏幕。


    #### 剔除遮罩


    这正是图层（Layers）的实用之处。`剔除遮罩`指定了哪些图层会被该摄像机渲染。换句话说，一个 `GameObject` 仅当其所在的图层包含在摄像机的
    `剔除遮罩`中时，才会对该摄像机可见。


    默认的 `Everything`（全部）对应于所有图层，但是，例如，如果你有一个 HUD 摄像机，你可以为所有 HUD 的 `GameObject` 定义一个
    HUD 图层，并将 HUD 摄像机的 `剔除遮罩`设置为仅渲染 HUD 图层。然后，你可以将主摄像机的 `剔除遮罩`设置为包含除 HUD 图层之外的所有内容。


    #### 投影


    默认情况下，摄像机设置为使用透视投影，正如我在前一章描述 Scene 视图时提到的，这意味着物体离摄像机越远显得越小（这种效果称为透视缩短）。在此模式下，摄像机拥有一个类似四棱锥（不包括底面）的视景体，从摄像机位置沿视线方向发出。这个视景体被称为视锥体（frustum），由视野
    (FOV)、近平面和远平面定义。


    视野类似于现实世界摄像机的 FOV。FOV 是垂直视角，以度为单位。水平视角则由 FOV 和摄像机的宽高比共同隐式定义。近平面和远平面指定了屏幕在摄像机前的距离以及视锥体底部的距离。位于视锥体之外的任何物体对摄像机都是不可见的。


    为了更好地了解视锥体的外观，可以查看 Scene 视图。图 3-7 展示了当你按下 Scene Gizmo 上的 Y 轴箭头，将视角切换到俯视图时，主摄像机视锥体的样子。按下
    F 键（Edit 菜单中 Frame Selected 命令的快捷键）将主摄像机在 Scene 视图中居中，然后拉远镜头，直到你能看到整个视锥体。你还应该取消选中
    Gizmos 菜单中的 3D Gizmos 复选框，这样当你拉远镜头时，摄像机图标不会缩小到看不见。


    Scene 视图右下角还会显示一个摄像机预览。这是摄像机当前会渲染的内容，也就是 Game 视图当前会显示的内容（你现在可以查看 Game 视图来确认）。这个场景中目前还看不到任何东西，但这个功能以后会很方便。


    ![A310332_2_En_3_Fig7_HTML.jpg](img/A310332_2_En_3_Fig7_HTML.jpg)


    **图 3-7.** Scene 视图中的摄像机视锥体


    请注意，只有当摄像机被选中并且 Inspector 视图中的摄像机组件处于打开状态时（Inspector 视图中的每个组件都可以通过点击左上角的小三角形来展开或折叠），视锥体轮廓和摄像机预览才会显示。这对于任何在
    Scene 视图中具有额外图形显示的组件来说通常是成立的。在 Inspector 视图中打开或折叠该组件将切换该显示。


    透视投影的替代方案是正交投影，它没有透视缩短效果，因此适用于 2D 游戏、等距游戏、用户界面和 HUD。正交模式特有的摄像机属性是正交投影大小，即正交视图在世界单位中的半高度。


    #### 视口


    `(0,0,1,1)` 的视口表示摄像机覆盖整个屏幕。这些数字是归一化的屏幕坐标，意味着屏幕宽度和高度上的坐标范围从 0 到 1。对于分屏或屏幕内的窗口，你会有多个摄像机，每个摄像机都有不同的视口；`(0,0,1,.5)`
    覆盖了屏幕的一半。然而，Unity iOS 不支持未覆盖整个屏幕的视口。


    #### 深度


    深度是当场景中有多个摄像机时另一个有用的属性。在每次渲染更新期间，摄像机将按照其深度值从小到大的顺序执行渲染通道。因此，例如，如果你有一个用于显示 HUD
    的第二个摄像机，你可以指定主摄像机的深度为 0，HUD 摄像机的深度为 1，以确保游戏世界先渲染，游戏 HUD 渲染在其之上。


    #### 渲染路径


    渲染路径决定了场景的渲染方式。每个摄像机可以有自己的渲染路径，或者默认使用 Player Settings 中指定的路径。`顶点光照`是最简单但最快的路径，`前向渲染`支持更高级的图形效果，而`延迟渲染`是最华丽但最慢的，并且在
    Unity iOS 中不可用。


    #### 目标纹理


    如果为这个属性指定了一个纹理，摄像机将渲染到该纹理上，而不是屏幕上。然后可以将该纹理放置在场景中，例如，作为电视显示或汽车的后视镜。


    #### HDR


    此属性启用高动态范围 (HDR)，它处理 RGB 分量超出正常 0 到 1 范围的像素，便于渲染极高对比度的场景。HDR 在 Unity iOS 中不可用。

    '
- fmt: '# FlareLayer Component


    When a Camera `GameObject` is created from the `GameObject` menu, both a Camera
    `Component` and a `FlareLayer` Component are automatically attached. The `FlareLayer`
    Component allows the Camera to render Light Flares (described later in this chapter).


    The `FlayerLayer` Component is a little unusual in that it’s not exposed to scripting,
    so it does have a Reference Manual page, but no Script Reference page. However,
    a `FlareLayer` Component can still be accessed from a `GameObject` using its class
    name, i.e., by calling `GetComponent("FlareLayer")`.


    # GUILayer Component


    A `GUILayer` Component is also automatically attached to a Camera `GameObject`.
    This component allows the Camera to render `GUIText` and `GUITexture`, which are
    2D elements often used for user interfaces.


    **Note**


    `GUILayer`, `GUIText` and `GUITexture` (and `GUIElement`, which is the parent
    class of `GUIText` and `GUITexture`) have nothing to do with UnityGUI, which is
    a newer built-in GUI system.


    You may have noticed that the Inspector View displays `GUILayer` as one word and
    `Flare Layer` as two words. The Editor attempts to present class names in a more
    English-like fashion by introducing spaces in the names where an upper-case letter
    follows a lower-case one. That works fine for `FlareLayer` but not `GUILayer`.
    In any case, this book will stick to the original class name, since that is what
    will be referenced in scripts.


    # AudioListener Component


    The `AudioListener` Component is only automatically attached to the Main Camera,
    since there can only be one active `AudioListener` at a time. Whereas the Camera
    Component is analogous to your eyes, responsible for rendering everything visible
    to it on your computer screen, the `AudioListener` Component is responsible for
    routing all the audible `AudioSources` in the scene to the computer speakers.


    ## Add a Cube to the Scene


    You’ll already have noticed the Camera Preview and Game view display nothing,
    and the same happens in the Game view when you click the Play button. Of course,
    that’s because you don’t have anything in the scene besides the Camera. Let’s
    rectify that with the time-honored tradition of creating a cube.


    ### Make the Cube


    Under the `Create Other` submenu of the `GameObject` menu, Unity provides a number
    of `GameObjects` bundled with Components. Among these is a Camera `GameObject`,
    if we wanted to add another one. There is also a Cube `GameObject` along with
    a number of other primitive shapes (Figure [3-8](#A310332_2_En_3_Chapter.html#Fig8)).


    ![A310332_2_En_3_Fig8_HTML.jpg](Images/A310332_2_En_3_Fig8_HTML.jpg)


    Figure 3-8. Creating a Cube from the `GameObject` menu


    Select the Cube item from the `GameObject` menu. That will create a Cube `GameObject`
    and add it to the current scene. The Cube will appear in the Hierarchy View (Figure
    [3-9](#A310332_2_En_3_Chapter.html#Fig9)) as the second `GameObject` of the scene.


    ![A310332_2_En_3_Fig9_HTML.jpg](Images/A310332_2_En_3_Fig9_HTML.jpg)


    Figure 3-9. New cube `GameObject` in the Hierarchy View


    ### Frame the Cube


    Although the Cube is in the scene, it may not be immediately visible in the Scene
    View. To ensure the Cube can be seen in the Scene View, select the Cube in the
    Hierarchy View and press the F key (shortcut for the `Frame Selected` command
    in the `Edit` menu), which will center the Cube in the Scene View (Figure [3-10](#A310332_2_En_3_Chapter.html#Fig10)).


    ![A310332_2_En_3_Fig10_HTML.jpg](Images/A310332_2_En_3_Fig10_HTML.jpg)


    Figure 3-10. The Cube in the Scene View


    ### Move the Cube


    Remember, the `Frame Selected` command moves the Scene View camera, not the `GameObject`
    you’re looking at. The Cube may have been created at an arbitrary position, so
    set its position to the world origin, `(0,0,0)` in the Inspector View, by typing
    those coordinates into the `x,y,z Position` fields of the cube’s `Transform` (Figure
    [3-11](#A310332_2_En_3_Chapter.html#Fig11)). Don’t worry if you make a mistake.
    You can always Undo and Redo changes like this with the `Undo` and `Redo` commands
    in the `Edit` menu. In this case, you can Undo the Position change and then Redo
    it.


    ![A310332_2_En_3_Fig11_HTML.jpg](Images/A310332_2_En_3_Fig11_HTML.jpg)


    Figure 3-11. The Inspector View of a cube


    ### Anatomy of a Cube


    While you have the Cube displayed in the Inspector View, take a look at what it’s
    made of. Or, in other words, see what Components of the Cube make it a Cube.


    #### Transform Component


    Of course, as with every `GameObject`, there’s a `Transform` Component, which
    provides the position, rotation, and scale of the Cube.


    #### MeshFilter Component


    The `MeshFilter` Component references the 3D model, known in Unity as a Mesh,
    which consists of triangles and per-vertex information such as texture coordinates.
    When not referencing a built-in Mesh like the Cube, this property is assigned
    a Mesh from the project assets.


    #### MeshRenderer Component


    Hand-in-hand with the `MeshFilter` is the `MeshRenderer` Component, which determines
    how the mesh is rendered and is largely dictated by the Material (or list of Materials,
    if the Mesh is split into submeshes). You can think of a Material like the fabric
    on a sofa—the Mesh provides the shape and the Material wraps around the Mesh to
    provide the surface appearance.


    The `MeshRenderer` also controls whether the Mesh receives shadows or casts shadows
    (I’ll introduce shadows later in this chapter).


    #### BoxCollider Component


    The `MeshFiler` and `MeshRenderer` Components together only make the Cube visible.
    The `BoxCollider` Component provides a physical surface that is used for collisions
    in the Unity physics system. Since there’s nothing that can collide with the Cube
    in this scene, you don’t need this Component. There’s no harm in leaving it there,
    but you could also disable the Component by unchecking its check box. Or you could
    remove the Component entirely from the `GameObject` by right-clicking it and selecting
    `Remove Component` from the resulting menu (Figure [3-12](#A310332_2_En_3_Chapter.html#Fig12)).


    ![A310332_2_En_3_Fig12_HTML.jpg](Images/A310332_2_En_3_Fig12_HTML.jpg)


    Figure 3-12. Removing a Component


    ### Align With View


    Since you moved the Cube, you can press the F key again to center it in the Scene
    View. But that doesn’t affect the Main Camera, as you can see from the Camera
    Preview in the Scene View and if you check the Game View.


    Fortunately, there’s a convenient way to sync the Main Camera with the Scene View
    camera. Select the Main Camera, and then under the `GameObject` menu, invoke `Align
    With View` (Figure [3-13](#A310332_2_En_3_Chapter.html#Fig13)). Now the Main Camera
    has the same position and rotation as the Scene camera, and you can see in the
    Camera Preview that the Scene View and Game View are identical.


    ![A310332_2_En_3_Fig13_HTML.jpg](Images/A310332_2_En_3_Fig13_HTML.jpg)


    Figure 3-13. The `Align With View` command


    ## Camera Control


    Now if you click the Play button, you can see the Cube, but there’s not much going
    on. The Cube just sits there, and there is no interactivity. The first thing I
    like to do with a scene that has just one object like this is add a Camera orbit
    script so I can inspect the object from all angles. Conveniently, Unity comes
    with several Camera control scripts in the Standard Assets, including a `MouseOrbit`
    script.'
  raw: '### FlareLayer Component


    When a Camera GameObject is created from the GameObject menu, both a Camera Component
    and a FlareLayer Component are automatically attached. The FlareLayer Component
    allows the Camera to render Light Flares (described later in this chapter).


    The FlayerLayer Component is a little unusual in that it’s not exposed to scripting,
    so it does have a Reference Manual page, but no Script Reference page. However,
    a FlareLayer Component can still be accessed from a GameObject using its class
    name, i.e., by calling GetComponent(“FlareLayer”).


    ### GUILayer Component


    A GUILayer Component is also automatically attached to a Camera GameObject. This
    component allows the Camera to render GUIText and GUITextures, which are 2D elements
    often used for user interfaces.


    Note


    GUILayer, GUIText and GUITexture (and GUIElement, which is the parent class of
    GUIText and GUITexture) have nothing to do with UnityGUI, which is a newer built-in
    GUI system.


    You may have noticed that the Inspector View displays GUILayer as one word and
    Flare Layer as two words. The Editor attempts to present class names in a more
    English-like fashion by introducing spaces in the names where an upper-case letter
    follows a lower-case one. That works fine for FlareLayer but not GUILayer. In
    any case, this book will stick to the original class name, since that is what
    will be referenced in scripts.


    ### AudioListener Component


    The AudioListener Component is only automatically attached to the Main Camera,
    since there can only be one active AudioListener at a time. Whereas the Camera
    Component is analogous to your eyes, responsible for rendering everything visible
    to it on your computer screen, the AudioListener Component is responsible for
    routing all the audible AudioSources in the scene to the computer speakers.


    ## Add a Cube to the Scene


    You’ll already have noticed the Camera Preview and Game view display nothing,
    and the same happens in the Game view when you click the Play button. Of course,
    that’s because you don’t have anything in the scene besides the Camera. Let’s
    rectify that with the time-honored tradition of creating a cube.


    ### Make the Cube


    Under the Create Other submenu of the GameObject menu, Unity provides a number
    of GameObjects bundled with Components. Among these is a Camera GameObject, if
    we wanted to add another one. There is also a Cube GameObject along with a number
    of other primitive shapes (Figure [3-8](#A310332_2_En_3_Chapter.html#Fig8)).


    ![A310332_2_En_3_Fig8_HTML.jpg](Images/A310332_2_En_3_Fig8_HTML.jpg)


    Figure 3-8.


    Creating a Cube from the GameObject menu


    Select the Cube item from the GameObject menu. That will create a Cube GameObject
    and add it to the current scene. The Cube will appear in the Hierarchy View (Figure
    [3-9](#A310332_2_En_3_Chapter.html#Fig9)) as the second GameObject of the scene.


    ![A310332_2_En_3_Fig9_HTML.jpg](Images/A310332_2_En_3_Fig9_HTML.jpg)


    Figure 3-9.


    New cube GameObject in the Hierarchy View


    ### Frame the Cube


    Although the Cube is in the scene, it may not be immediately visible in the Scene
    View. To ensure the Cube can be seen in the Scene View, select the Cube in the
    Hierarchy View and press the F key (shortcut for the Frame Selected command in
    the Edit menu), which will center the Cube in the Scene View (Figure [3-10](#A310332_2_En_3_Chapter.html#Fig10)).


    ![A310332_2_En_3_Fig10_HTML.jpg](Images/A310332_2_En_3_Fig10_HTML.jpg)


    Figure 3-10.


    The Cube in the Scene View


    ### Move the Cube


    Remember, the Frame Selected command moves the Scene View camera, not the GameObject
    you’re looking at. The Cube may have been created at an arbitrary position, so
    set its position to the world origin, (0,0,0) in the Inspector View, by typing
    those coordinates into the x,y,z Position fields of the cube’s Transform (Figure
    [3-11](#A310332_2_En_3_Chapter.html#Fig11)). Don’t worry if you make a mistake.
    You can always Undo and Redo changes like this with the Undo and Redo commands
    in the Edit menu. In this case, you can Undo the Position change and then Redo
    it.


    ![A310332_2_En_3_Fig11_HTML.jpg](Images/A310332_2_En_3_Fig11_HTML.jpg)


    Figure 3-11.


    The Inspector View of a cube


    ### Anatomy of a Cube


    While you have the Cube displayed in the Inspector View, take a look at what it’s
    made of. Or, in other words, see what Components of the Cube make it a Cube.


    #### Transform Component


    Of course, as with every GameObject, there’s a Transform Component, which provides
    the position, rotation, and scale of the Cube.


    #### MeshFilter Component


    The MeshFilter Component references the 3D model, known in Unity as a Mesh, which
    consists of triangles and per-vertex information such as texture coordinates.
    When not referencing a built-in Mesh like the Cube, this property is assigned
    a Mesh from the project assets.


    #### MeshRenderer Component


    Hand-in-hand with the MeshFilter is the MeshRenderer Component, which determines
    how the mesh is rendered and is largely dictated by the Material (or list of Materials,
    if the Mesh is split into submeshes). You can think of a Material like the fabric
    on a sofa—the Mesh provides the shape and the Material wraps around the Mesh to
    provide the surface appearance.


    The MeshRenderer also controls whether the Mesh receives shadows or casts shadows
    (I’ll introduce shadows later in this chapter).


    #### BoxCollider Component


    The MeshFiler and MeshRenderer Components together only make the Cube visible.
    The BoxCollider Component provides a physical surface that is used for collisions
    in the Unity physics system. Since there’s nothing that can collide with the Cube
    in this scene, you don’t need this Component. There’s no harm in leaving it there,
    but you could also disable the Component by unchecking its check box. Or you could
    remove the Component entirely from the GameObject by right-clicking it and selecting
    Remove Component from the resulting menu (Figure [3-12](#A310332_2_En_3_Chapter.html#Fig12)).


    ![A310332_2_En_3_Fig12_HTML.jpg](Images/A310332_2_En_3_Fig12_HTML.jpg)


    Figure 3-12.


    Removing a Component


    ### Align With View


    Since you moved the Cube, you can press the F key again to center it in the Scene
    View. But that doesn’t affect the Main Camera, as you can see from the Camera
    Preview in the Scene View and if you check the Game View.


    Fortunately, there’s a convenient way to sync the Main Camera with the Scene View
    camera. Select the Main Camera, and then under the GameObject menu, invoke Align
    With View (Figure [3-13](#A310332_2_En_3_Chapter.html#Fig13)). Now the Main Camera
    has the same position and rotation as the Scene camera, and you can see in the
    Camera Preview that the Scene View and Game View are identical.


    ![A310332_2_En_3_Fig13_HTML.jpg](Images/A310332_2_En_3_Fig13_HTML.jpg)


    Figure 3-13.


    The Align With View command


    ## Camera Control


    Now if you click the Play button, you can see the Cube, but there’s not much going
    on. The Cube just sits there, and there is no interactivity. The first thing I
    like to do with a scene that has just one object like this is add a Camera orbit
    script so I can inspect the object from all angles. Conveniently, Unity comes
    with several Camera control scripts in the Standard Assets, including a MouseOrbit
    script .'
  trans: '

    # FlareLayer 组件


    当通过 `GameObject` 菜单创建摄像机 `GameObject` 时，会自动同时附加一个摄像机 `组件` 和一个 `FlareLayer` 组件。`FlareLayer`
    组件允许摄像机渲染镜头光晕（本章稍后会介绍）。


    `FlayerLayer` 组件有点特殊，因为它不对外公开脚本接口，所以它有参考手册页面，但没有脚本参考页面。但是，仍可以通过其类名从 `GameObject`
    访问 `FlareLayer` 组件，即调用 `GetComponent("FlareLayer")`。


    # GUILayer 组件


    `GUILayer` 组件也会自动附加到摄像机 `GameObject` 上。此组件允许摄像机渲染 `GUIText` 和 `GUITexture`，这些是常用于用户界面的
    2D 元素。


    **注意**


    `GUILayer`、`GUIText` 和 `GUITexture`（以及作为 `GUIText` 和 `GUITexture` 父类的 `GUIElement`）与
    UnityGUI（一个更新的内置 GUI 系统）无关。


    你可能已经注意到，Inspector 视图将 `GUILayer` 显示为一个单词，而 `Flare Layer` 显示为两个单词。编辑器尝试通过在大写字母跟随小写字母的地方引入空格，以更符合英文习惯的方式呈现类名。这对
    `FlareLayer` 有效，但对 `GUILayer` 无效。无论如何，本书将坚持使用原始类名，因为这是在脚本中引用的方式。


    # AudioListener 组件


    `AudioListener` 组件仅自动附加到主摄像机，因为一次只能有一个 `AudioListener` 处于活动状态。摄像机组件类似于你的眼睛，负责将一切可见内容渲染到计算机屏幕上，而
    `AudioListener` 组件负责将场景中所有可听的 `AudioSource` 路由到计算机扬声器。


    ## 向场景添加一个立方体


    你可能已经注意到，Camera Preview 和 Game 视图没有显示任何内容，当你点击 Play 按钮时，Game 视图同样如此。当然，这是因为场景中除了摄像机之外没有任何东西。让我们通过创建立方体这个历史悠久的传统来纠正这一点。


    ### 制作立方体


    在 `GameObject` 菜单的 `Create Other` 子菜单下，Unity 提供了许多捆绑了组件的 `GameObject`。如果我们想添加另一个摄像机，其中就有一个摄像机
    `GameObject`。还有一个立方体 `GameObject` 以及许多其他基本形状（图 3-8）。


    ![A310332_2_En_3_Fig8_HTML.jpg](img/A310332_2_En_3_Fig8_HTML.jpg)


    图 3-8. 从 `GameObject` 菜单创建立方体


    从 `GameObject` 菜单中选择 Cube 项。这将创建一个立方体 `GameObject` 并将其添加到当前场景。该立方体将在层级视图中显示（图
    3-9）为场景中的第二个 `GameObject`。


    ![A310332_2_En_3_Fig9_HTML.jpg](img/A310332_2_En_3_Fig9_HTML.jpg)


    图 3-9. 层级视图中的新立方体 `GameObject`


    ### 框选立方体


    尽管立方体已在场景中，但它可能不会立即在 Scene 视图中可见。为了确保可以在 Scene 视图中看到立方体，请在层级视图中选择该立方体，然后按 F 键（`Edit`
    菜单中 `Frame Selected` 命令的快捷键），这将使立方体在 Scene 视图中居中显示（图 3-10）。


    ![A310332_2_En_3_Fig10_HTML.jpg](img/A310332_2_En_3_Fig10_HTML.jpg)


    图 3-10. Scene 视图中的立方体


    ### 移动立方体


    记住，`Frame Selected` 命令移动的是 Scene 视图摄像机，而不是你所观察的 `GameObject`。立方体可能是在任意位置创建的，因此通过将立方体的
    `Transform` 的 `x,y,z 位置` 字段（图 3-11）中键入坐标 `(0,0,0)`，将其位置设置为世界原点。如果犯错，不必担心。你随时可以使用
    `Edit` 菜单中的 `Undo` 和 `Redo` 命令来撤销和重做此类更改。在这种情况下，你可以撤销位置更改，然后重做。


    ![A310332_2_En_3_Fig11_HTML.jpg](img/A310332_2_En_3_Fig11_HTML.jpg)


    图 3-11. 立方体的 Inspector 视图


    ### 立方体的结构


    在 Inspector 视图中显示立方体时，看看它是由什么构成的。换句话说，看看立方体的哪些组件使其成为立方体。


    #### Transform 组件


    当然，与每个 `GameObject` 一样，都有一个 `Transform` 组件，它提供立方体的位置、旋转和缩放。


    #### MeshFilter 组件


    `MeshFilter` 组件引用 3D 模型，在 Unity 中称为网格，它由三角形和每个顶点的信息（如纹理坐标）组成。当不引用像立方体这样的内置网格时，此属性会分配一个来自项目资源的网格。


    #### MeshRenderer 组件


    与 `MeshFilter` 相辅相成的是 `MeshRenderer` 组件，它决定了网格的渲染方式，并且主要由材质（如果网格被分割成子网格，则是一系列材质）决定。你可以将材质想象成沙发上的布料——网格提供形状，材质包裹在网格周围以提供表面外观。


    `MeshRenderer` 还控制网格是接收阴影还是投射阴影（我将在本章稍后介绍阴影）。


    #### BoxCollider 组件


    `MeshFiler` 和 `MeshRenderer` 组件共同作用只能让立方体可见。`BoxCollider` 组件提供了一个物理表面，用于 Unity
    物理系统中的碰撞。由于此场景中没有可以与立方体碰撞的物体，因此你不需要此组件。将其保留在那里并无害处，但你也可以通过取消选中其复选框来禁用该组件。或者，你可以通过右键单击它并选择出现的菜单中的
    `Remove Component`（图 3-12），从 `GameObject` 中完全移除该组件。


    ![A310332_2_En_3_Fig12_HTML.jpg](img/A310332_2_En_3_Fig12_HTML.jpg)


    图 3-12. 移除组件


    ### 与视图对齐


    由于你移动了立方体，可以再次按 F 键使其在 Scene 视图中居中。但这不会影响主摄像机，正如你可以从 Scene 视图中的 Camera Preview
    和在 Game 视图中检查所见。


    幸运的是，有一种方便的方法可以将主摄像机与 Scene 视图摄像机同步。选择主摄像机，然后在 `GameObject` 菜单下，调用 `Align With
    View`（图 3-13）。现在，主摄像机与 Scene 摄像机具有相同的位置和旋转，并且你可以在 Camera Preview 中看到 Scene 视图和
    Game 视图是相同的。


    ![A310332_2_En_3_Fig13_HTML.jpg](img/A310332_2_En_3_Fig13_HTML.jpg)


    图 3-13. `Align With View` 命令


    ## 摄像机控制


    现在，如果你点击 Play 按钮，你可以看到立方体，但并没有太多内容发生。立方体只是呆在那里，并且没有任何交互性。对于只有一个物体的场景，我喜欢做的第一件事是添加一个摄像机轨道脚本，这样我就可以从各个角度检查这个物体。方便的是，Unity
    在 Standard Assets 中提供了几个摄像机控制脚本，包括一个 `MouseOrbit` 脚本。

    '
- fmt: '### Import the Script


    To import that script, go to the Assets menu and select the Import Package submenu.
    This is the same list of Assets packages available when we created a new project
    (Figure [3-14](#A310332_2_En_3_Chapter.html#Fig14)).


    ![A310332_2_En_3_Fig14_HTML.jpg](Images/A310332_2_En_3_Fig14_HTML.jpg)


    Figure 3-14. Importing scripts from Standard Assets


    From this list, selecting Utility will present a window displaying all the scripts
    in the Scripts package (Figure [3-15](#A310332_2_En_3_Chapter.html#Fig15)). The
    scripts ending in the `.js` extension are written in JavaScript and the ones ending
    in the `.cs` extension are written in C#. You can import just the `MouseOrbit`
    script or all of the scripts. It’s easy enough to delete unwanted assets later.


    ![A310332_2_En_3_Fig15_HTML.jpg](Images/A310332_2_En_3_Fig15_HTML.jpg)


    Figure 3-15. The available Standard Assets scripts


    Now the scripts and their containing folders are displayed in the Project View
    (Figure [3-16](#A310332_2_En_3_Chapter.html#Fig16)). The Project View doesn’t
    list the `.cs` suffixes of the file names, but you can see from the icons that
    this is a C# script, and selecting a script will display the full name on the
    line at the bottom of the Project View.


    ![A310332_2_En_3_Fig16_HTML.jpg](Images/A310332_2_En_3_Fig16_HTML.jpg)


    Figure 3-16. Standard Assets scripts after import


    If you select the C# script in the Project View, the code in that script shows
    up in the Inspector View (Figure [3-17](#A310332_2_En_3_Chapter.html#Fig17)).


    ![A310332_2_En_3_Fig17_HTML.jpg](Images/A310332_2_En_3_Fig17_HTML.jpg)


    Figure 3-17. The Inspector View of the `SimpleMouseRotator` script


    ### Attach the Script


    Drag the `SimpleMouseRotator` script onto the Main Camera GameObject in the Hierarchy
    View. That attaches the script onto the GameObject, so now if you select the Main
    Camera, the `SimpleMouseRotator` script will show up as one of its Components
    (Figure [3-18](#A310332_2_En_3_Chapter.html#Fig18)).


    ![A310332_2_En_3_Fig18_HTML.jpg](Images/A310332_2_En_3_Fig18_HTML.jpg)


    Figure 3-18. The `SimpleMouseRotator` script attached to the Main Camera


    The first property of the `SimpleMouseRotator` Component is a reference to the
    `SimpleMouseRotator` script (notice how Unity pretty-prints the Component type
    as "Mouse Rotator", but don’t be fooled, it’s `SimpleMouseRotator`!). You could
    actually change the script referenced by that property by dragging another one
    from the Project view into that field or by clicking the little circle on its
    right, which would pop up a list of available scripts to choose from (which right
    now are all the Standard Assets script you just imported).


    The script itself determines the properties that follow. Notice that each of those
    properties in the `SimpleMouseRotator` Component corresponds to a public variable
    declared at the top of the `SimpleMouseRotator` (each line beginning with `var`
    is a public variable, while those starting with `private var` are private).


    > **Tip**

    > Selecting the Debug option in the Inspector view menu (top right corner) will
    display private variables as properties, too, which can be useful for debugging.
    Try it now and you’ll see the private variables `x` and `y` show up. The Debug
    option also adds diagnostic properties of built-in Components.


    The first property defined by the script is `Target`, which is the GameObject
    the Camera will orbit around. It defaults to nothing (or in the code, `null`),
    so if you click Play, there is nothing for the Camera to orbit around. To rectify
    that, drag the Cube from the Hierarchy View into the `Target` field (Figure [3-19](#A310332_2_En_3_Chapter.html#Fig19)).


    ![A310332_2_En_3_Fig19_HTML.jpg](Images/A310332_2_En_3_Fig19_HTML.jpg)


    Figure 3-19. Assigning the `Target` property of the `SimpleMouseRotator` script


    Now when you click the Play button, the Camera orbits the Cube as you move the
    mouse. While in Play mode, you can adjust the other properties until you find
    values you like. The `Rotation Range` property is the rotation range of the camera.
    Changing it to 3 dramatically limits Camera movement (Figure [3-20](#A310332_2_En_3_Chapter.html#Fig20)).
    The `Rotation Speed` property controls how fast the Camera orbits in relation
    to the mouse movement, and the `Damping Time` property sets amount of camera damping
    (limit the amount of camera shake).


    When you exit Play mode, the properties revert to the values they had before you
    entered Play mode. At that point it’s necessary to enter the desired values again.
    If you end up with property values that you don’t like, you can always start over
    by clicking the icon on the top right of the Component and selecting Reset to
    revert back to the default property values.


    ![A310332_2_En_3_Fig20_HTML.jpg](Images/A310332_2_En_3_Fig20_HTML.jpg)


    Figure 3-20. Testing the `SimpleMouseRotator` script


    ## Add a Light


    You’ve probably been thinking the Cube looks awfully dark. Well, let’s add a Light!
    Under the Create Other submenu of the GameObject menu, several types of Lights
    are listed (Figure [3-21](#A310332_2_En_3_Chapter.html#Fig21)). Let’s choose Point
    Light.


    ![A310332_2_En_3_Fig21_HTML.jpg](Images/A310332_2_En_3_Fig21_HTML.jpg)


    Figure 3-21. Creating a Point Light


    The Point Light now appears in the Hierarchy View and the Scene View (Figure [3-22](#A310332_2_En_3_Chapter.html#Fig22)),
    and you can see that its distinguishing component is a Light Component, with its
    type set to Point. A Point Light only lights objects within its radius. So you
    should adjust its position or radius so that the cube will be lit. Here you can
    set its position to `5,5,5` (remember, the cube is at `0,0,0`) and set the radius
    to 10.


    ![A310332_2_En_3_Fig22_HTML.jpg](Images/A310332_2_En_3_Fig22_HTML.jpg)


    Figure 3-22. The Inspector View of a Point Light


    ### Anatomy of a Light


    In the same way that a GameObject becomes a Camera when it has a Camera Component
    attached, a GameObject behaves as a Light when it has a Light Component attached.
    Like the Camera Component, the Light Component has several properties, which we’ll
    go over here in top-down order as shown in the Inspector View.


    #### Type


    The `Type` of a Light specifies whether it is a Point Light, Directional Light,
    Spot Light, or Area Light. Since this GameObject was created as a Point Light,
    its `Type` was automatically set to Point. In contrast to a Directional Light,
    which acts as a light source infinitely far away (it’s sometimes called an infinite
    light), a Point Light has a position (and is thus often known as a positional
    light) and radiates in every direction. A Spot Light also has a position, but
    radiates in a certain direction, like a cone. An Area Light is only used in generating
    light maps (lighting that is precalculated and “baked” into textures).


    #### Range


    The `Range` property for Point Lights specifies the radius of the Light. Only
    objects within the radius are affected by the Light.


    #### Color


    The `Color` property is the color emitted by the Light. Clicking the little color
    rectangle brings up a color chooser to assign this property.


    #### Intensity


    The Light `Intensity` ranges from 0 to 1, where 0 is unlit and 1 is maximum brightness.


    #### Shadow Type


    The `Shadow Type` property of a Light specifies whether it the Light projects
    shadows, and if so, whether they are Hard Shadows or Soft Shadows.


    #### Cookie


    Directional and Spot Lights can project a cookie texture onto a surface, typical
    to simulate a shadow.'
