    \nLet’s start off with the scoreboard because it’s a simpler case than the menu.\
    \ The scoreboard only needs to display, with no interaction required. As described\
    \ in the previous chapter, a typical bowling scoreboard will show the results\
    \ for each frame (i.e., the first and second balls, and possibly third, in the\
    \ tenth frame), as well as the total score up to that frame. You won’t do anything\
    \ fancy here; you’ll just display the scores with text by drawing the scoreboard\
    \ as a sequence of labels, with each label displaying the score for that frame\
    \ as text.\n\n### Create the Script\n\nLet’s get started by creating a `GameObject`\
    \ with a scoreboard script attached (this should be a familiar process by now).\
    \ In the Project view, create a new JavaScript in the `Scripts` folder and name\
    \ it `FuguBowlScoreboard` (Figure 9-1).\n\n![A310332_2_En_9_Fig1_HTML.jpg](Images/A310332_2_En_9_Fig1_HTML.jpg)\n\
    \n**Figure 9-1.**  \nCreating the `FuguBowlScoreboard.js` script\n\nNext, create\
    \ a new `GameObject` in the Hierarchy view, name it `Scoreboard`, and attach the\
    \ `FuguBowlScoreboard` script to it.\n\nNow you’re ready to add UnityGUI code\
    \ to the `FuguBowlScoreboard` script. If you’ve developed user interfaces with\
    \ other GUI systems, you’ll probably find UnityGUI a bit unusual. Instead of creating\
    \ and placing GUI objects that have callbacks responding to events like button\
    \ clicks, UnityGUI controls are created inside `OnGUI` callback functions, which\
    \ are called every frame (actually a few times a frame). To demonstrate quickly\
    \ how UnityGUI works, place the contents of Listing 9-1 in the `FuguBowlScoreboard`\
    \ script.\n\n```javascript\n#pragma strict\nfunction OnGUI() {\n    GUI.Label(Rect(5,100,200,20),\"\
    This is a label\");\n}\n```\n\n**Listing 9-1.** Testing a Simple UnityGUI Label\
    \ in `FuguBowlScoreboard.js`\n\nAll UnityGUI controls are created with calls to\
    \ static functions in the `GUI` class (and also `GUILayout`, but I’ll get to that\
    \ in the next section). The `OnGUI` callback of Listing 9-1 calls `GUI.Label`\
    \ to draw a label, passing in a `Rect` (rectangle) that specifies the label is\
    \ to be drawn at the x,y coordinates of `5,100` (the coordinate system for UnityGUI\
    \ has `0,0` at the top left of the screen) and with a width and height of `200`\
