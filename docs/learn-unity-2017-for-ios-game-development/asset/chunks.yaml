  trans: '

    # 在 iOS 模拟器中进行测试


    现在你已经安装了 Xcode，并将 `Device SDK` 设置为 `Simulator SDK`，就可以在 iOS 模拟器上构建并运行 `Climber`
    了。`File` 菜单中的 `Build and Run` 命令以及 `Build Settings` 窗口中的 `Build and Run` 按钮，会先执行
    `Build` 阶段，生成一个 Xcode 项目，然后执行 `Run` 阶段，在 Xcode 项目内发起构建和运行。通常这非常方便，但在使用 iOS 模拟器时，如果手动从
    Xcode 进行构建和运行，你将对 iOS 模拟器拥有更多控制权。因此，让我们再次打开 `Build Settings` 窗口（从 `File` 菜单中），并点击
    `Build` 按钮。


    > **提示**

    >

    > 在执行构建之前，请检查 `Build Settings` 窗口，确保已包含正确的场景集合。


    Unity 会弹出一个 `Save As` 窗口，提示你选择即将构建的 Xcode 项目的位置和文件名（图 10-12）。


    ![A310332_2_En_10_Fig12_HTML.jpg](img/A310332_2_En_10_Fig12_HTML.jpg)


    **图 10-12.** 构建提示：选择 Xcode 项目的位置和名称


    它通常默认使用 Unity 项目文件夹的顶层目录。我们将这个 Xcode 项目命名为 `Climber_iOSv1.0`。你添加了版本号，这样就能根据需要跟踪任何更改。


    > **警告**

    >

    > 注意不要选择 `Assets` 文件夹内的路径作为构建目标，否则 Unity 会尝试将整个 Xcode 项目作为项目资源导入。


    如果这不是你第一次在此位置构建该项目，Unity 会检测到同名 Xcode 项目已存在，并询问你是要完全替换该项目，还是仅追加项目更改（图 10-13）。


    ![A310332_2_En_10_Fig13_HTML.jpg](img/A310332_2_En_10_Fig13_HTML.jpg)


    **图 10-13.** 构建追加或替换对话框


    追加方式更快，但有时你需要一个全新的 Xcode 项目。例如，如果你更改了播放器设置中的包标识符，或者（尤其是在）你升级了 Unity 或 Xcode 之后，都应该构建一个新的
    Xcode 项目。


    > **提示**

    >

    > 从 `File` 菜单执行的 `Build and Run` 与 `Build Settings` 窗口中的 `Build and Run` 按钮并不完全相同。`File`
    菜单中的命令假设你要追加构建文件夹（如果它已存在），并且不会询问你是要追加还是替换它。我更喜欢坚持使用 `Build Settings` 窗口来执行构建，这样我总能清楚当前状况。我曾遇到过这样的情况：复制了一个项目，但从
    `File` 菜单调用 `Build and Run` 时，它仍然构建到了原始位置！


    无论如何，点击 `Build` 后，构建过程中会显示一个进度条（图 10-14）。与资源重新导入一样，对于大型项目，这可能需要一些时间，并且编辑器在构建期间会无响应。


    ![A310332_2_En_10_Fig14_HTML.jpg](img/A310332_2_En_10_Fig14_HTML.jpg)


    **图 10-14.** 构建过程中的进度指示器


    构建完成后，一个 Xcode 项目将出现在你指定的位置（图 10-15）。


    ![A310332_2_En_10_Fig15_HTML.jpg](img/A310332_2_En_10_Fig15_HTML.jpg)


    **图 10-15.** Unity iOS 构建生成的 Xcode 项目文件夹


    该 Xcode 项目名为 `Unity-iPhone.xcodeproj`，位于 Xcode 项目文件夹中。双击该文件可在 Xcode 中打开项目（图 10-16）。


    ![A310332_2_En_10_Fig16_HTML.jpg](img/A310332_2_En_10_Fig16_HTML.jpg)


    **图 10-16.** 启动并加载了 Unity iOS 项目的 Xcode


    注意 Xcode 窗口左上角显示的是 `iPhone 7 Plus`。这是一个用于选择 Xcode 方案的菜单，方案是 Xcode 中构建规则的集合。其他可用的方案包括当前的
    iPad 和 iPhone 模拟器（图 10-17）。


    ![A310332_2_En_10_Fig17_HTML.jpg](img/A310332_2_En_10_Fig17_HTML.jpg)


    **图 10-17.** 选择 iPad 和 iPhone 模拟器


    如果从 Unity 中执行 `Build and Run`，iOS 模拟器会自动启动，而不会让你有机会先选择 iPad 还是 iPhone 模拟器。现在，我们先使用
    iPad 模拟器，点击 Xcode 窗口左上角的 `Run` 按钮。`Run` 按钮实际上就是一个 `Build and Run` 按钮，因为它在尝试运行项目之前，会先编译项目（如果需要的话）。如果成功，一个匹配
    iPad 屏幕尺寸的 iOS 模拟器窗口将会出现，并运行 `Climber`（图 10-18）。


    ![A310332_2_En_10_Fig18_HTML.jpg](img/A310332_2_En_10_Fig18_HTML.jpg)


    **图 10-18.** 在 iOS 模拟器中运行 `Climber`


    iOS 模拟器会将鼠标输入解释为触摸屏事件，因此你可以点击屏幕进行游戏。此外，iOS 模拟器的 `Hardware` 菜单可以模拟其他设备事件（图 10-19）。


    ![A310332_2_En_10_Fig19_HTML.jpg](img/A310332_2_En_10_Fig19_HTML.jpg)


    **图 10-19.** iOS 模拟器选项


    例如，`Rotate Left` 和 `Rotate Right` 命令模拟旋转设备方向（试试看，观察自动旋转效果），而调用 `Home` 等同于按下设备上的
    `Home` 按钮，这将挂起或退出应用并显示设备的 `Home` 屏幕。应用图标应该出现在那里，可以点击（模拟轻触）来重新启动应用。`Hardware` 菜单还允许你选择不同的设备和
    iOS 版本进行模拟。


    除了测试，iOS 模拟器还可以通过 `Tools` 菜单中的 `Save Screen Shot` 命令方便地截取屏幕截图（图 10-20）。调用该命令会立即将截图保存到桌面。App
    Store 要求提供你的应用所支持的设备的截图，因此，例如如果你需要一张 iPad 截图，而你没有 iPad，那么 iOS 模拟器就是一个获取该截图的便捷工具。


    ![A310332_2_En_10_Fig20_HTML.jpg](img/A310332_2_En_10_Fig20_HTML.jpg)


    **图 10-20.** iOS 模拟器中的 `Save Screen Shot` 命令


    iOS 模拟器窗口没有可操作的关闭按钮，但可以通过 iOS 模拟器菜单中的 `Quit iOS Simulator` 命令或其键盘快捷键 `Command+Q`
    来退出模拟器（图 10-21）。


    ![A310332_2_En_10_Fig21_HTML.jpg](img/A310332_2_En_10_Fig21_HTML.jpg)


    **图 10-21.** 退出 iOS 模拟器


    iOS 模拟器在模拟 iOS 功能方面相当完善，包括 iAd 和 Game Center。因此，即使你没有可用于测试的 iOS 设备，你也可以仅使用 iOS
    模拟器完成本书后续的大部分内容。


    # 进一步探索


    你可能会感到似曾相识，因为你最初就是从 `Climber` 演示项目开始的，而现在又回到了它。区别当然在于，现在你是为 iOS 构建项目。你已经迈出了重要的几步：将构建目标改为
    iOS，使用 Unity Remote 在 Unity 编辑器中进行测试，然后用 Xcode 构建以在 iOS 模拟器中运行。下一步，构建并在真实的 iOS
    设备上运行，将在下一章中进行，之后你将回到常规的编程任务，那个保龄球游戏。到那时，理想情况下，你将对构建过程感到得心应手，并能够专注于将游戏打造成一款 iOS
    游戏！

    '
- fmt: '### Unity Manual


    Because the discussion has returned to Climber, it’s fitting that the first relevant
    section in the Unity Manual is the “Unity Basics” section, specifically the “Publishing
    Builds” page.


    The Unity Manual also includes several sections specifically about Unity iOS,
    although you may have to click the iPhone icon at the top of the manual to make
    that content visible. The section “Getting Started with iOS Development” is somewhat
    out of date as of this writing, but its “Unity Remote” page is still useful to
    explain how to set up and operate that app.


    More recent documentation on Unity iOS is listed in the “Advanced” section of
    the Unity Manual, including a “Structure of a Unity Xcode Project” page. It’s
    a good idea to become familiar with the files in the generated Xcode project,
    but you won’t be messing with the Xcode files generated by Unity, except to enable
    the built-in profiler when you get to Chapter [16](https://doi.org/10.1007/978-1-4842-3174-6_16).


    ### Reference Manual


    Most of the work in getting Angry Bots to build consisted of filling in appropriate
    values in the player settings. This chapter provided a cursory overview of the
    iOS-specific settings, and only the Default Orientation and Device SDK settings
    are important for running in the iOS simulator, but the “Player Settings” page
    in the Reference Manual details each of the individual cross-platform and iOS-specific
    player settings, along with the settings for other platforms.


    ### iOS Developer Library


    Download links and documentation for `Xcode` are available on the `Xcode` page
    at the Apple Developer site (`http://developer.apple.com/xcode`). One of the great
    things about using Unity for iOS development is that you can avoid needing to
    know much about `Xcode` and `Objective-C`. But still, learning your way around
    Xcode and understanding `Objective-C` code can only help.


    In addition to the `Xcode` documentation you can find under its `Help` menu, there
    are links to developer documentation from the `Xcode` web site (`http://developer.apple.com/xcode`).
    There are many other articles listed under the `Xcode` topic, and many are also
    available in the `Xcode` Help menu, including the `Xcode` User Guide and `Xcode`
    Basics Help.


    The iOS Developer Library lists “Xcode” in the topics, and most of the relevant
    “IDE” section of the `Xcode` topic can be found in the iOS simulator’s User Guide.
    The guide is extensive, featuring multiple chapters that expand on the introduction
    given in this book, explaining how to launch the simulator from `Xcode`, how to
    operate the simulator, and how to invoke simulated device input.


    Unity does a lot to shield you from working in Xcode, and in this chapter, you
    literally just had to click the `Run` button in Xcode to run the iOS simulator.
    So, it’s a good idea to read up on the tool in preparation for the next chapter,
    where you’ll learn how to build and run your app for testing and build it for
    submission to the App Store.


    # 11. Building for Real: Device Testing and App Submission


    Running an iOS version of the Climber game turned out to be amazingly easy. It
    was just a matter of switching the build target to iOS and then immediately playing
    the game in the Editor using the `Unity Remote` app as the input device (or, when
    running the game in the iOS simulator, performing a build with the target SDK
    set to `Simulator SDK` in the player settings).


    That might seem too easy to be the end of it, and it is. The next step is the
    painful part: building the Unity project so that it installs and runs on real
    iOS hardware. The Unity part of this procedure is easy; it’s nearly identical
    to building a project to run on the iOS simulator. But installing an app on a
    test device requires that the app be built with a mobile provisioning profile
    that is also installed in Xcode and on the test device. Before that, the profile
    has to be created in Apple’s Provisioning Portal using a development certificate
    associated with the test device and the app’s bundle ID. So, before that, the
    test device and bundle ID have to be registered on the Provisioning Portal, and
    the development certificate has to be generated after creating a certificate request.


    That’s just for testing. A similar process is required when building apps for
    submission to the App Store, but with a separate distribution provisioning profile
    and corresponding certificate. Furthermore, submitting an app to the App Store
    also requires adding the app to `iTunes Connect`, a separate web site for managing
    apps on the App Store.


    If dealing with provisioning profiles sounds like a hassle, you may be tempted
    to skip this chapter and return later. In fact, the iOS adaptation of the bowling
    game in the next couple of chapters can be tested with the `Unity Remote` (for
    the input code in Chapter [13](../Text/A310332_2_En_13_Chapter.html)) and iOS
    simulator (the icon, splash screen, and screen size set in Chapter [12](../Text/A310332_2_En_12_Chapter.html)),
    as you did with the Climber game in the previous chapter. Plus, access to the
    Provisioning Portal and `iTunes Connect` (and the associated nonpublic documentation)
    requires membership in the iOS Developer Program, so if you haven’t acquired that
    yet, then you’ll have to wait anyway.


    But you will need an iOS Developer Program membership to set up `Game Center`
    leaderboards and achievements (which I will cover in Chapter [14](../Text/A310332_2_En_14_Chapter.html))
    and an `iAd` banner and interstitial ads (which I will cover in Chapter [15](../Text/A310332_2_En_15_Chapter.html));
    further, the performance measurement (which I cover in Chapter [16](https://doi.org/10.1007/978-1-4842-3174-6_16))
    won’t be very interesting without it being able to run on real hardware. So, at
    the least, it’s best to get the iOS Developer Program registration process started
    as soon as possible!


    ## Register as an iOS Developer


    As you might expect, the Apple developer web site (`http://developer.apple.com/`)
    is the place to find most of the official Apple developer resources (`iTunes Connect`
    is an exception), including all of the Apple developer programs—the Mac Developer
    Program, the Safari Developer Program, and the one you’re interested in, the iOS
    Developer Program. You can register in the iOS Developer Program as an individual
    or a company. Registering as an individual is fairly straightforward, as long
    as you have a credit card and are prepared to pay the `$99` yearly fee. Signing
    up as a company requires the same, but it also requires an actual legal company
    entity and supporting information about the company, including a Data Universal
    Numbering System (DUNS) number, which is a unique identifier assigned to a company
    by Dun & Bradstreet. Both individual and company accounts have to be approved
    by Apple, but approval for company accounts can take longer than individual accounts
    (the approval for my company, Technicat, LLC, took three months).


    The only additional feature for company accounts is the ability for the account
    administrator to add team members, so in this book I’ll assume you’re working
    with an individual account or, equivalently, as the administrator of a company
    account.


    Once you’ve been approved as an iOS developer, you’ll have login access to the
    Apple developer site and also `iTunes Connect` (`http://itunesconnect.apple.com/`)
    using your Apple ID. `ITunes Connect` is the site where you manage all your apps
    that are on or being prepared for the App Store. But before working in `iTunes
    Connect`, you’ll be logging in to the Apple developer site and working in the
    Provisioning Portal to create development and distribution provisioning profiles,
    which are required for test and distribution builds, respectively.'
