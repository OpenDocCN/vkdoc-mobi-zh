    GUILayout.Toolbar (toolbarIndex, toolbarStrings);

    ```


    then `toolbarIndex` would never change from its initial value (0), and even if
    you click another button, the next time this is called (in the next invocation
    of OnGUI), the active button would be set back to that value.


    But GUILayoutToolbar returns an integer that represents the currently active button,
    so you feed that value back into the variable that you passed in, toolbarIndex.


    ```

    toolbarIndex = GUILayout.Toolbar (toolbarIndex, toolbarStrings);

    ```


    Thus, toolbarIndex is 0 initially, but if you click Graphics, it’ll change to
    1, and if you click Controls, it’ll change to 2, and so on. Then there is a switch
