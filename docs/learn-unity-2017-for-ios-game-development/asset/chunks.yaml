  trans: '

    #### `StateRollOver`


    当保龄球的滚动被视为完成（球滚出球道进入沟槽或到达球瓶线）时，FSM 进入 `StateRollOver` 状态（清单 8-25），该状态通过计算得分来结束当前轮次。


    ```

    function StateRollOver() {

    var pinsDown:int = GetPinsDown();

    //    Debug.Log("pins down: "+pinsDown);

    switch (roll) {

    case Roll.Ball1: player.SetBall1Score(frame,pinsDown); break;

    case Roll.Ball2: player.SetBall2Score(frame,pinsDown); break;

    case Roll.Ball3: player.SetBall3Score(frame,pinsDown); break;

    }

    if (roll == Roll.Ball1 && player.IsStrike(frame)) {

    state = "StateStrike";

    return;

    }

    if (roll == Roll.Ball2 && player.IsSpare(frame)) {

    state = "StateSpare";

    return;

    }

    state = "StateKnockedSomeDown";

    }

    ```


    清单 8-25. `FuguBowl.js` 中用于一轮结束的状态


    此状态首先通过调用 `GetPinsDown` 函数确定击倒了多少个球瓶。然后根据这是第一球、第二球还是第三球，将该数字传递给相应的 `FuguBowlPlayer`
    计分函数，从而记录本轮得分。下一个状态取决于本轮结果：是全中（仅可能发生在第一球）、补中（仅可能发生在第二球），还是其他结果。（`StateKnockedSomeDown`
    这个名字不太理想，毕竟你可能一个球瓶都没击倒，但我觉得它比 `StateNotSpareOrStrike` 更好。）


    #### `StateSpare`、`StateStrike` 和 `StateKnockedSomeDown`


    与落沟球状态类似，表示全中、补中及其他结果的状态没有任何操作，只是转换到下一个状态（清单 8-26）。


    ```

    function StateSpare() {

    state="StateNextBall";

    }

    function StateStrike() {

    state = "StateNextBall";

    }

    function StateKnockedSomeDown() {

    state="StateNextBall";

    }

    ```


    清单 8-26. `FuguBowl.js` 中的 `StateSpare`、`StateStrike` 和 `StateKnockedSomeDown`
    状态


    这三个状态都会转换到 `StateNextBall`，因此很容易让人觉得这些状态是多余的，想要完全删除它们。但在一个完整的保龄球游戏中，你可能会在每个状态中触发某种反馈，例如打出全中时的祝贺音效和画面。我提到过，App
    Store 上的 Fugu Bowl 在落沟球时会发出嘘声。同一个应用在全中时会发出欢呼声，这发生在 `StateStrike` 中。而 HyperBowl
    则在 `StateSpare` 和 `StateStrike` 中分别显示动画文字“SPARE”和“STRIKE”。


    #### `StateNextBall`


    `StateNextBall` 是目前为止最复杂的状态（清单 8-27），因为大多数保龄球规则都在这里生效。你需要在此决定是在当前轮次再投一球，还是进入下一轮。


    ```

    function StateNextBall() {

    if (frame == 9) { // 最后一轮

    switch (roll) {

    case Roll.Ball1: // 总是有第二次投球

    state = "StateBall2";

    break;

    case Roll.Ball2: // 如果补中或全中则有奖励球

    if (player.IsSpare(frame) || player.IsStrike(frame)) {

    state = "StateBall3";

    } else {

    state = "StateGameOver";

    }

    break;

    case Roll.Ball3:

    state = "StateGameOver";

    break;

    }

    // 所有其他轮次

    } else if (roll == Roll.Ball1 && !player.IsStrike(frame)) {

    state = "StateBall2";

    } else {

    ++frame;

    state = "StateBall1";

    }

    }

    ```


    清单 8-27. `FuguBowl.js` 中用于过渡到下一球的状态


    第十轮尤其复杂，因为你需要检查游戏是否结束，并且可能有三球投掷机会。那么，我们先看代码底部适用于前九轮的部分。如果你刚完成 `Ball1` 的投掷且未全中，则下一个状态是
    `StateBall2`。否则，要么你投了 `Ball2`，要么你已经全中，因此下一个状态是 `StateBall1`，并将轮次索引加一。在第十轮中，你至少投两球，所以如果你刚投了
    `Ball1`，则下一个状态设置为 `StateBall2`。如果你刚投了 `Ball2` 且结果是补中或全中，则下一个状态设置为 `StateBall3`；否则进入游戏结束状态。当然，如果你刚投了
    `Ball3`，这是最后一次可能的投球，你也会进入游戏结束状态。


    #### `StateGameOver`


    最终，你到达了游戏结束状态 `StateGameOver`（清单 8-28）。


    ```

    function StateGameOver() {

    Debug.Log("Final Score: "+player.GetScore(9));

    yield WaitForSeconds(gameOverTime);

    state="StateNewGame";

    }

    ```


    清单 8-28. `FuguBowl.js` 中的游戏结束状态


    无需花哨的用户界面（Unity GUI 系统将在下一章介绍），我们借此机会通过函数 `Debug.Log` 在控制台视图中打印最终分数。最终分数通过调用 `FuguBowlPlayer`
    函数 `GetScore` 并传入数组索引 `9` 来获取，这表示你需要第十轮计算的总分。


    在一个完整的保龄球游戏中，这里应该显示“游戏结束”消息、将分数提交到排行榜，并执行任何其他游戏结束时合适的操作（在 HyperBowl 中，会调用 `Application.LoadLevel`
    函数切换到显示分数的场景并呈现奖杯）。现在，我们只需过渡回 `StateNewGame` 并开始新游戏。


    ### 完整清单


    经过大修的 `FuguBowl` 脚本甚至比 `FuguBowlPlayer` 脚本还要大得多，因此此处不展示 `FuguBowl.js` 的完整清单。完整脚本可在
    [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739) 获取，其所有内容已在本节中逐一（或大部分按状态）呈现。


    ## 深入探索


    本章改变了节奏，专注于脚本编写。大部分脚本以状态机的形式添加到了游戏控制器脚本 `FuguBowl.js` 中，而计分代码则整合到了一个新脚本 `FuguBowlPlayer.js`
    中。


    如果你厌倦了编写大块代码，渴望回到最初那些短小的脚本片段，那你只需再忍受一章，在下一章为用户界面编写一个更大的脚本。同时，作为本章新增计分代码的对应部分，下一章还将包含一个用于显示记分牌的小型附加脚本。


    ### Unity 手册


    状态机不仅适用于游戏控制逻辑，也适用于任何可以表示为经历不同状态的事物（简单示例：灯亮或灭、武器上膛并锁定、门开或关）。状态机在动画（行走、跑动、投掷）中特别有用，这就是为什么
    Mecanim 动画系统拥有自己的 FSM 功能。这在 Unity 手册的“动画状态机”部分的“Mecanim 动画系统”一节中有详细说明。


    ### 脚本参考


    本章介绍的主要脚本技术是协程的使用，特别是在 `FuguBowl` 脚本中实现 FSM。脚本参考的“脚本概述”部分有一个“协程和 `Yield`”页面，提供了基本解释和一些示例。


    与协程相关的类包括 `Coroutine` 和 `WaitForSeconds`（两者都继承自 `YieldInstruction`）。你使用的一个函数是
    `MonoBehaviour` 的 `StartCoroutine` 函数。每个 `MonoBehaviour` 回调的文档页面都指定了该回调是否可以用作协程（如你所见，`Start`
    可以，但 `Awake`、`Update` 和 `FixedUpdate` 不行）。


    `FuguBowl` 脚本中添加的代码也频繁涉及访问组件，因此“访问组件”页面与此相关。该页面列出了可用于访问常用附加组件的 `Component` 和 `GameObject`
    变量，并提供了如何调用 `GetComponent` 函数（在组件或 `GameObject` 上）来访问组件（包括脚本）的示例。

