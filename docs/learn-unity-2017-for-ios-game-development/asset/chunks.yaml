    Bilinear filtering is the middle ground and a reasonable default.


    Mipmapping is usually appropriate, despite the increased memory usage. Besides
    improving the texture display, mipmapping allows the graphics processor to work
    with a smaller version of the texture, which can improve performance. For a texture
    used in a menu you’ll typically view the texture at just one size, and ideally
    at the texture’s original size, so mipmapping is unnecessary. That’s certainly
    true for the splash screen, especially when it isn’t even loaded into a scene.


    Tip


    For a texture with sharp details (e.g., one used as a street sign), it may be
    better to use point sampling or even disable mipmapping entirely to avoid blurring
    the texture.


    The anisotropic (directionally dependent) filtering level compensates for the
    case where a texture is tilted with respect to the camera, such as the road surface
    in a racing game. In those cases, filtering uniformly across a texture in both
    directions may not look right. For regular textures in a scene, the anisotropic
    level should be chosen on a case-by-case basis. For UI textures, which are viewed
    face on from the camera, no anisotropic filtering is required.


    Normally, textures are imported while taking into account gamma space, the nonlinear
    color space of screens. In general, this isn’t necessary for UI textures, so in
    those cases, the bypass sRGB option is selected. If it doesn’t look quite right,
    try both options.


    For mipmapping , textures need to be square and have dimensions that are a power
    of two (POT), because mipmaps are generated at successively halved dimensions.
    For example, a 256 × 256 texture would have mipmaps at 128 × 128, 64 × 64, and
    so on. Even a nonmipmapped texture benefits from POT dimensions because that’s
    what the graphics hardware ultimately uses. Most textures designed for games have
    POT dimensions, but if they don’t, the texture’s import settings can automatically
    size the texture to the nearest POT. For GUI textures, you usually don’t want
    this. Your splash screen has None set for its POT scaling, and the resulting preview
    displays its original dimensions and NPOT. If you try to use it as a regular texture
    in the scene, Unity will issue a warning in the Console view that you’re using
    an NPOT texture in a non-GUI way and will incur a performance penalty.'
  trans: '

    #### 地面


    `Floor`（地面）`GameObject` 具有一些可通过调整以进行优化的组件属性（图 14-25）。从 `MeshRenderer` 组件开始，`Cast
    Shadows`（投射阴影）和 `Receive Shadows`（接收阴影）选项均处于启用状态。尽管你已在灯*光和质量设置中禁用了阴影，但仍应留意每个对象的设置，以防将来启用阴影。如果启用了阴影，你会希望阴影投射到地面上，因此应启用
    `Receive Shadows`。但由于你并不期望地面投射阴影（至少不会投射到你能看到的任何物体上），让我们禁用 `Cast Shadows` 选项。就性能而言，阴影投射器越少越好。


    ![A310332_2_En_14_Fig25_HTML.jpg](img/A310332_2_En_14_Fig25_HTML.jpg)


    **图 14-25. 优化地面**


    转向物理方面，还有另一个优化机会。尽管保龄球瓶和保龄球使用的是基本碰撞体，但你的地面带有 `MeshCollider`（网格碰撞体）组件。由于地面是平整的方形表面，你可以改用
    `BoxCollider`（盒体碰撞体）。替换过程很简单：当你向地面添加 `BoxCollider` 组件时，无论是通过 `Inspector`（检视面板）视图中的
    `Add Component`（添加组件）按钮，还是通过菜单栏上的 `Component`（组件）菜单，Unity 都会询问你是否要替换现有的 `MeshCollider`（选择“是”），新的
    `BoxCollider` 组件将自动调整大小以适配地面网格。


    与保龄球瓶类似，你也可以将着色器从相当复杂的 `Bumped Specular`（凹凸高光）着色器更改为 `Mobile/VertexLit (Only Directional
    Lights)`（移动设备/顶点光照（仅方向光）），正如你对保龄球瓶预制体所做的那样。但地面是一个特例，因为它是平坦的。其表面上的光照是均匀的。因此，你可以使用
    `Unlit Texture`（无光照纹理）着色器，完全避免任何光照计算。


    #### 球


    你将要优化的最后一个 `GameObject` 是球。它已经在使用 `SphereCollider`（球体碰撞体）组件，因此你唯一要更改的是着色器。与保龄球瓶一样，球也会移动，所以让我们使用一个带光照的着色器，具体来说，与为保龄球瓶选择的
    `Mobile/VertexLit (Only Directional Light)`（移动设备/顶点光照（仅方向光））着色器相同。然而，球当前使用的是创建时自动分配的默认漫反射材质，你无法更改该材质上的着色器。因此，你需要为球分配一个不同的材质。


    你可以用创建其他类型资源相同的方式创建一个新材质。在 `Project`（项目）视图中，调出 `Create`（创建）菜单并选择 `Material`（材质）（图
    14-26）。


    ![A310332_2_En_14_Fig26_HTML.jpg](img/A310332_2_En_14_Fig26_HTML.jpg)


    **图 14-26. 创建新材质**


    将新材质放入 `Materials`（材质）文件夹并将其命名为 `Ball`。选中它（图 14-27），在 `Inspector`（检视面板）视图中你可以调整其着色器，选择
    `Mobile/VertexLit (Directional Light)`（移动设备/顶点光照（方向光））。


    ![A310332_2_En_14_Fig27_HTML.jpg](img/A310332_2_En_14_Fig27_HTML.jpg)


    **图 14-27. 为新材质设置着色器**


    然后将 `Ball`（球）材质拖放到 `Ball` `GameObject` 上，设置就完成了（图 14-28）。


    ![A310332_2_En_14_Fig28_HTML.jpg](img/A310332_2_En_14_Fig28_HTML.jpg)


    **图 14-28. 优化球**


    如果未提供纹理，上述两种 `Mobile/VertexLit`（移动设备/顶点光照）着色器都会显示白色。如果你希望球具有白色以外的颜色，则应使用标准的 `Vertex
    Lit`（顶点光照）着色器，它允许你指定 `Main Color`（主颜色）和 `Specular (shininess) Color`（高光（光泽）颜色）。


    ## 优化资源


    人们很容易忽略一个事实，即在导入资源时可以进行大量优化，而你可以通过每个资源的导入设置来控制这一点。


    ### 纹理


    你的纹理已经以合理的默认设置导入，但让我们查看几个纹理，以便你理解这些设置。在 `Project`（项目）视图中，让我们查看 `Textures`（纹理）文件夹，并比较你在第
    3 章的示例场景中使用的猫纹理（图 14-29）和你在第 12 章中用于次启动画面的纹理（图 14-31）。猫纹理使用了对应 `Texture`（纹理）预设的导入设置，而启动画面纹理使用了
    `GUI`（图形用户界面）预设的导入设置。在这两种情况下，从预设切换到 `Advanced`（高级）都会显示该预设的具体设置。


    ![A310332_2_En_14_Fig29_HTML.jpg](img/A310332_2_En_14_Fig29_HTML.jpg)


    **图 14-29. 纹理的导入设置**


    滤镜类型决定了如何为渲染目的计算纹理中的像素（或纹素）。`Bilinear`（双线性）过滤会对最近较小 mipmap 级别的周围纹素进行平均，而 `trilinear`（三线性）过滤则结合了最近较大
    mipmap 级别和最近较小 mipmap 级别的双线性过滤结果。`Point`（点）采样是最简单、最快的滤镜，而 `trilinear`（三线性）过滤代价最高。`Bilinear`（双线性）过滤是折中方案，也是合理的默认选择。


    Mipmapping（多级渐远纹理）通常是合适的，尽管会占用更多内存。除了改善纹理显示，mipmapping 还允许图形处理器处理更小版本的纹理，这可以提升性能。对于菜单中使用的纹理，你通常只会在一种尺寸下查看它，并且理想情况下是纹理的原始尺寸，因此
    mipmapping 并非必要。这对于启动画面来说确实如此，尤其是当它甚至未被加载到场景中时。


    **提示**：对于细节清晰的纹理（例如用作路标的纹理），最好使用 `point`（点）采样，甚至完全禁用 mipmapping，以避免纹理模糊。


    各向异性（方向相关）过滤级别补偿了纹理相对于摄像机倾斜的情况，例如赛车游戏中的路面。在这些情况下，在两个方向上均匀过滤纹理可能看起来不对。对于场景中的常规纹理，应根据具体情况选择各向异性级别。对于
    UI 纹理（从摄像机正面观察），则不需要各向异性过滤。


    通常，纹理在导入时会考虑伽马空间（屏幕的非线性色彩空间）。一般来说，这对于 UI 纹理并非必要，因此在这些情况下，会选中 `bypass sRGB`（绕过
    sRGB）选项。如果效果不太对劲，可以尝试两种选项。


    对于 mipmapping，纹理需要是正方形，并且尺寸是二的幂（POT），因为 mipmap 是按尺寸逐次减半生成的。例如，一个 256 × 256 的纹理将会有
    128 × 128、64 × 64 等 mipmap 级别。即使是非 mipmap 纹理，POT 尺寸也有好处，因为图形硬件最终使用的是这种尺寸。大多数为游戏设计的纹理都是
    POT 尺寸，但如果不是，纹理的导入设置可以自动将纹理调整为最接近的 POT 尺寸。对于 GUI 纹理，你通常不希望这样。你的启动画面的 `POT` 缩放设置为
    `None`（无），生成的预览会显示其原始尺寸和 NPOT（非二的幂）。如果你尝试将其作为场景中的常规纹理使用，Unity 会在 `Console`（控制台）视图中发出警告，提示你以非
    GUI 方式使用了 NPOT 纹理，并会导致性能开销。

