- fmt: '# Add Music


    No dance demo would be complete without music. Fortunately, there’s plenty of
    free music available in the Asset Store. One music package I’ve used frequently
    is Gianmarco Leone’s General Music Set. If you enter `general music` in the `Project`
    view search field, all of the audio clips in that package show up in the results
    (Figure [5-21](#A310332_2_En_5_Chapter.html#Fig21)). Click any one of them and
    then import the package from the `Inspector` view.


    ![A310332_2_En_5_Fig21_HTML.jpg](Images/A310332_2_En_5_Fig21_HTML.jpg)


    Figure 5-21. Searching for the General Music Set in the Asset Store


    After the audio clips install in the `Project` view (Figure [5-22](#A310332_2_En_5_Chapter.html#Fig22)),
    select the audio clip named `Tomorrow` from `Music` by Joey. However, you can
    decide for yourself which track to install. In the `Inspector` view (Figure [5-23](#A310332_2_En_5_Chapter.html#Fig23)),
    click the `Play` button at the bottom, above the stereo waveform display, to listen
    to the audio clip.


    ![A310332_2_En_5_Fig23_HTML.jpg](Images/A310332_2_En_5_Fig23_HTML.jpg)


    Figure 5-23. The Inspector view of an audio clip


    ![A310332_2_En_5_Fig22_HTML.jpg](Images/A310332_2_En_5_Fig22_HTML.jpg)


    Figure 5-22. The Project view of the Music Files music set


    Now you’re ready to add the audio clip to the scene. Simply drag the audio clip
    from the `Project` view into the `Hierarchy` view, and a same-named `GameObject`
    will automatically be created (Figure [5-24](#A310332_2_En_5_Chapter.html#Fig24)).


    ![A310332_2_En_5_Fig24_HTML.jpg](Images/A310332_2_En_5_Fig24_HTML.jpg)


    Figure 5-24. Audio in the scene


    Select the `Tomorrow` `GameObject`, and you will see in the `Inspector` view that
    it has an `AudioSource` component. Among its properties is a reference to `Tomorrow`
    and a `Play On Awake` check box. That specifies the sound will start playing as
    soon as the scene starts playing. You should select the `Loop` check box too,
    so the song will keep playing over and over, just like the dancing animation.
    As this is background music, set the `Spatial Blend` setting to `2D`.


    Now when you click `Play`, you have a real music dance party!


    # Explore Further


    Thus ends our dalliance with dancing skeletons. For the rest of this book, you’ll
    be concentrating on developing a bowling game with mostly physics-based motion.
    But you should already feel a sense of accomplishment, having spent the past three
    chapters evolving a simple static cube scene into a musical dancing skeleton scene,
    complete with fancy graphics features such as particle effects and dynamic shadows.
    Fancy features tend to be expensive features in terms of performance, so use them
    judiciously!


    ## Unity Manual


    The “Asset Import and Creation” section covers the two new types of assets introduced
    in this chapter: audio and animation. The “Audio Files” page lists the audio formats
    recognized by Unity and describes the `AudioClip` asset that results from importing
    an audio file. In earlier chapters, you just dipped your toes into the “Creating
    Gameplay” section of the Unity Manual, but now you’ve entered the deep end, adding
    content described in the pages “Particles,” “Legacy Animation System,” and “Sound.”
    Also, the Mecanim animation system is the future of Unity animation, so it’s worthwhile
    to read up on that in the “Mecanim Animation System” section.


    Using dynamic shadows is a big topic. The “Advanced” section of the Unity Manual
    has an extensive treatment in the section “Shadows in Unity,” which covers “Directional
    Shadows,” “Troubleshooting Shadows,” and “Shadow Size Computation.”


    ## Reference Manual


    The “Animation” section of the Reference Manual has the “Animation Component”
    and “Animation Clip” pages covering those assets used by the Legacy animation
    system. This section also includes several pages on components used in the new
    Mecanim animation system.


    The “Audio” section lists the audio components needed to add music to the dancing
    scene constructed in this chapter; see the sections “AudioListener” (normally
    automatically attached to the Main Camera) and “AudioSource” (attached to the
    sound source). In addition, the section “Audio Filter Components” lists components
    (a Pro feature) that can add effects like echo, for example.


    The “Effects” section has a page on the new Shuriken particle system and multiple
    pages on the Legacy particle system.


    The Reference Manual also documents the various settings managers, including a
    “Quality Settings” page, which you used to adjust your shadow quality, but it
    also affects other visual quality elements, such as lighting and particles.


    ## Asset Store


    The Asset Store not only offers a lot of music in the Audio category, much of
    it free, but also provides scripts for playing music. If you want to play more
    than one song in your dance scene, you can write a script that plays a fixed or
    random sequence of songs, using the Unity functions defined in the `AudioSource`
    class (to play and stop music) and `AudioListener` class (to control the volume).
    But it’s easier to just download, for example, the `Free Jukebox` script from
    the Asset Store (or `Jukebox Pro` if you’re willing to part with a few dollars).


    ## Computer Graphics


    I mentioned the book *Real-Time Rendering* at the end of Chapter [3](../Text/A310332_2_En_3_Chapter.html),
    and it merits a recommendation again for the computer graphics topics you encountered
    in this chapter: animation, particle effects, and dynamic shadows. There are many
    books just on character animation, including those on the content-creation side
    for professional animators, such as George Maestri’s *Digital Character Animation*.


    # 6. Let’s Roll! Physics and Controls


    At last, you’re ready to begin the main Unity project for this book, a bowling
    game in the style of HyperBowl, an arcade/attraction game I worked on more than
    ten years ago and ported to Unity just a few years ago. HyperBowl has a unique
    be-the-ball gameplay where the player constantly rolls the ball around a 3D environment
    to reach the pins. The bowling game constructed in this book will be much simpler
    but feature the same style of control.


    Even a simple bowling game like this one is a significant project. It will incorporate
    physics, input handling, camera control, collision sounds, game rules, a score
    display, and a start/pause menu. And that’s even before performing any adaptation
    for iOS. This chapter just focuses on getting a ball to roll around and requires
    some physics setup but only a single script for the ball control. The script is
    available in the project for this chapter on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739).
    But it’s a fairly simple script and developed incrementally throughout this chapter,
    so it’s best to follow along, implementing it from scratch.'
