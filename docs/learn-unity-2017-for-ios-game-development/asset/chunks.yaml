    ```markdown

    ### 轻触小球


    虽然你的保龄球游戏不关心滑动操作发生在屏幕上的哪个位置，但许多游戏需要检测特定的 `GameObject` 是否被触碰。在桌面和网页平台上，可以通过 `OnMouseDown`、`OnMouseUp`
    和 `OnMouseOver` 等回调函数来检测带有 `Collider` 组件的 `GameObject` 上的鼠标事件。例如，脚本中的 `OnMouseDown`
    回调会在鼠标点击脚本所挂载的 `GameObject`（更确切地说，是该 `GameObject` 的 `Collider` 组件）时被触发。


    **注意**


    `OnMouse` 回调也适用于带有 `GUIText` 和 `GUITexture` 组件的 `GameObject`。在 `UnityGUI` 引入之前，这是
    Unity 中最接近内置 GUI 系统的东西。


    为了演示 `OnMouse` 回调如何工作，创建一个名为 `FuguDebugOnMouse` 的新 JavaScript 脚本，并将其挂载到 `Ball`
    `GameObject` 上（图 13-2）。


    ![A310332_2_En_13_Fig2_HTML.jpg](img/A310332_2_En_13_Fig2_HTML.jpg)


    **图 13-2.** 挂载了 `FuguDebugOnMouse` 脚本的 Ball


    然后将 列表 13-3 的内容添加到脚本中。


    ```

    #pragma strict

    #if !UNITY_IPHONE

    function OnMouseDown () {

    #else

    function OnTap () {

    #endif

    Debug.Log("GameObject "+ gameObject.name + " was touched");

    }

    ```


    **列表 13-3.** 在 `FuguDebugMouse.js` 中检测鼠标点击


    该脚本包含一个 `OnMouseDown` 回调，用于记录关于 `GameObject` 被触碰的消息。当你在编辑器中运行游戏并点击球体时，调试信息会出现在控制台视图中（图
    13-3）。


    ![A310332_2_En_13_Fig3_HTML.jpg](img/A310332_2_En_13_Fig3_HTML.jpg)


    **图 13-3.** 演示 `OnMouseDown` 回调的调试信息


    Unity iOS 会响应触摸事件来调用 `OnMouse` 回调，但某些情况除外，因为不存在明显的映射关系。例如，当鼠标悬停在 `GameObject`
    上时调用的 `OnMouseOver`，其对应的触摸操作是什么？但当一个 `GameObject` 被轻触时调用 `OnMouseDown`（手指离开屏幕时调用
    `OnMouseUp`）是合情合理的。实际情况也确实如此，你可以通过 Unity Remote 在编辑器中再次运行游戏，或者在设备上执行构建并运行操作来验证。无论哪种方式，轻触球体都会产生与点击它时相同的调试信息。


    尽管 `OnMouse` 回调能处理触摸操作很方便（至少在一定程度上是这样），但了解如何实现你自己的对象轻触检测也很有用。这只需将检测轻触和从屏幕位置沿相机方向向
    3D 世界发射射线（raycast）这两步简单结合起来。Raycasting 是指找到射线与第一个相交物体的过程（你可能还记得高中数学知识，射线有一个起始位置和一个方向，就像一支箭）。


    为了进行演示，让我们创建一个名为 `FuguTap` 的新 JavaScript 脚本，将其挂载到主相机上（图 13-4），并将列表 13-4 的内容添加到脚本中。


    ![A310332_2_En_13_Fig4_HTML.jpg](img/A310332_2_En_13_Fig4_HTML.jpg)


    **图 13-4.** 挂载了 `FuguOnTap` 脚本的主相机


    ```

    #pragma strict

    #if UNITY_IPHONE

    function Update () {

    for (var i = 0; i < Input.touchCount; ++i) {

    if (Input.GetTouch(i).phase == TouchPhase.Began) {

    var ray:Ray = camera.ScreenPointToRay (Input.GetTouch(i).position);

    var hit:RaycastHit;

    if (Physics.Raycast (ray,hit,camera.farClipPlane,camera.cullingMask)) {

    hit.collider.SendMessage("OnTap",SendMessageOptions.DontRequireReceiver);

    }

    }

    }

    }

    #endif

    ```


    **列表 13-4.** 模拟 `OnMouseDown` 事件的脚本


    整个脚本包含一个 `Update` 回调，它遍历上一帧中注册的所有触摸事件。但此例中，我们只关心轻触的开始，因此只考虑处于 `TouchPhase.Began`
    阶段的触摸。提取每个此类触摸的屏幕坐标，并将其传递给相机函数 `ScreenPointToRay`，以形成一条起始于屏幕位置并沿着相机方向射入 3D 世界的射线。


    该射线作为第一个参数传递给静态函数 `Physics.Raycast`，用于检测射线是否与任何 `GameObject` 的 `Collider` 组件相交。关于第一个相交点的信息（如果有的话）通过作为第二个参数传入的
    `RayCastHit` 结构体返回。第三个参数是射线投射的距离，第四个参数是用于检测相交的图层集合。通过将相机的远平面距离作为射线投射距离，并将相机的剔除遮罩（可见图层集合）作为相交检测的图层集合，你可以限制可能的射线投射结果。


    如果对 `Physics.Raycast` 的调用返回 `true`，表示发生了相交，那么你就获取相交的 `Collider` 组件，并在其上调用 `SendMessage`
    来触发挂载脚本中的 `OnTap` 回调（在组件上调用 `SendMessage` 等同于在该组件的 `GameObject` 上调用 `SendMessage`）。


    请注意，对 `SendMessage` 的调用包含一个可选的第二个参数 `SendMessageOptions.DontRequireReceiver`。如果没有这个参数，当消息被发送到一个没有匹配函数的
    `GameObject` 时，或者在此例中，没有任何 `OnTap` 函数时，Unity 会报告错误。


    整个 `Update` 回调被包裹在 `UNITY_IPHONE` ifdef 中，因为它仅用于 iOS 触摸屏输入。同样地，你现在可以使用 `UNITY_IPHONE`
    将 `OnMouseDown` 回调重命名为 `OnTap`，以便它能够被 `FuguOnTap` 脚本调用（列表 13-5）。


    ```

    #pragma strict

    if !UNITY_IPHONE

    function OnMouseDown () {

    #else

    function OnTap () {

    #endif

    Debug.Log("GameObject "+ gameObject.name + " was touched");

    }

    ```


    **列表 13-5.** 为 iOS 使用替代回调名称的 `FuguDebugOnMouse` 脚本


    现在，如果你再次运行游戏并轻触球体，你仍然会看到调试信息，但这是由 `FuguOnTap` 发送的 `OnTap` 消息产生的。


    ## 加速度计


    每个 iOS 设备都配有一个加速度计，用于测量三个不同方向的加速度。这三个值可以通过静态变量 `Input.accelerometer` 来查看，它是一个
    `Vector3`。


    `x` 值对应于沿着设备屏幕从左到右的加速度。`y` 值表示沿着设备屏幕从上到下的加速度，而 `z` 值则是从设备正面到背面的加速度。从 Unity 4 开始，加速度计的值会根据设备方向进行调整，因此如果你手持设备处于横屏模式，加速度计的
    `x` 值仍然是从左到右的。

    ```'
- fmt: "### Debug the Accelerometer\n\nA time-honored way to figure out how code works\
    \ is to print stuff out. Let’s create a new JavaScript called `FuguDebugAccel`\
    \ and attach it to a new `GameObject` named `DebugAccel` in the bowling scene.\
    \ Add the `Update` function shown in Listing [13-6](#A310332_2_En_13_Chapter.html#Par45)\
    \ to the script.\n\n```\nfunction Update () {\nDebug.Log(\"accel x: \"+Input.acceleration.x+\"\
    \ y: \"+Input.acceleration.y+\" z: \"+Input.acceleration.z);\n}\nListing 13-6.\n\
    Code to Print Out Accelerometer Values\n```\n\nThe `Update` function takes the\
    \ `x`, `y`, and `z` accelerometer values and concatenates them into a somewhat\
    \ readable `String`. `Debug.Log` sends that `String` to the Console view if you’re\
    \ testing in the Unity Editor (with the Unity Remote) or to the Xcode debug area\
    \ if you’re running in the iOS simulator or on a device.\n\nTry tilting the device\
    \ around to see how the values change. For example, the `Debug.Log` output shown\
    \ in Figure [13-5](#A310332_2_En_13_Chapter.html#Fig5) results from placing the\
    \ device flat on a table. The `x` and `y` values are nearly 0, and the `z` value\
    \ is close to -1. If the device is flipped upside down, it would be close to 1.\n\
    \n![A310332_2_En_13_Fig5_HTML.jpg](Images/A310332_2_En_13_Fig5_HTML.jpg)\n\nFigure\
    \ 13-5.  \n`Debug.Log` output of accelerometer values\n\nThe acceleration values\
    \ are in units of gravity. At rest, each accelerometer value ranges from -1 to\
    \ 1, where 1 is full earth gravity (9.8 meters per second squared). Now try shaking\
    \ the device. You should see the numbers spike up and down.\n\n### Detect Shakes\n\
    \nAn issue with your pause menu on iOS is that you can’t pause with the `Esc`\
    \ key since there’s no `Esc` key on your devices (although Android devices typically\
    \ have a Back button that behaves like an `Esc` key).\n\nIt’s straightforward\
    \ to add a pause button to the screen in the `FuguPause` script by just adding\
    \ a `GUI.Button` call inside the `OnGUI` function.\n\n```\nif (GUI.Button(Rect(0,0,100,50),\
    \ \"Pause\") { PauseGame(); }\n```\n\nHowever, I don’t like to have buttons on\
    \ the screen during gameplay, especially on really small screens like the iPhone.\
    \ So, let’s take advantage of the alternate input that iOS devices can provide\
    \ and pause by shaking the device.\n\nFrom your previous exercise in printing\
    \ out accelerometer values, you saw that shaking the device causes at least one\
    \ of the `x`, `y`, or `z` values of `Input.acceleration` to spike up or down.\
    \ So, you can check for a shake by checking whether any of the values are much\
    \ larger than 1 or much less than -1, for example. But you don’t have to be exact,\
    \ so you can just take the square of the magnitude (length) of the vector.\n\n\
    ```\nif (Input.acceleration.sqrMagnitude>shakeThreshold)\n```\n\nGetting the `sqrMagnitude`\
    \ of the `Vector3` is faster than getting the magnitude since the magnitude of\
    \ a vector is the square root of x² + y² + z², and this way you avoid the square\
    \ root operation, which is relatively expensive (remember learning to calculate\
    \ square roots by hand in high school?).\n\nSo, let’s start by adding a public\
    \ variable for the shake threshold to the `FuguPause` script.\n\n```\nvar shakeThreshold:float\
    \ = 5;\n```\n\nNow you can tweak that property in the Inspector view (Figure [13-6](#A310332_2_En_13_Chapter.html#Fig6))\
    \ and make it more or less sensitive to shakes.\n\n![A310332_2_En_13_Fig6_HTML.jpg](Images/A310332_2_En_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6.  \nAdjusting the shake-to-pause threshold in the Inspector view\n\
    \nNext, add the check of `Input.acceleration` as a `UNITY_IPHONE` replacement\
    \ for the check of the `Esc` key (Listing [13-7](#A310332_2_En_13_Chapter.html#Par60)).\n\
    \n```\nvar shakeThreshold:float = 5;\nfunction Update() {\n#if UNITY_IPHONE\n\
    if (Input.acceleration.sqrMagnitude>shakeThreshold)\n#else\nif (Input.GetKeyDown(KeyCode.escape))\n\
    #endif\n{\nswitch (currentPage) {\ncase Page.None: PauseGame(); break; // if the\
    \ pause menu is not displayed, then pause\ncase Page.Main: UnPauseGame(); break;\
    \ // if the main pause menu is displaying, then unpause\ndefault: currentPage\
    \ = Page.Main; // any subpage goes back to main page\n}\n}\n}\nListing 13-7.\n\
    Adding Shake to Pause in the FuguPause.js\n```\n\nThat’s all you need. Now when\
    \ you test with the Unity Remote or on a device, shaking the device will pause\
    \ the game! The augmented `FuguPause` script (just two lines of new code!) is\
    \ in the project for this chapter on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739).\n\
    \n## The Camera\n\nUnity 5.x provides built-in support for iOS cameras. Unity\
    \ also provides cross-platform support for reading webcam video into a texture.\n\
    \n### Read the Web Cam\n\nUnity has a special kind of texture (like `Texture2D`,\
    \ a subclass of `Texture`) called `WebCamTexture` that displays video from an\
    \ attached hardware camera. It works on multiple platforms, including iOS. Let’s\
    \ give it a try. Create a JavaScript called `FuguWebCam` and add the `Start` function\
    \ given in Listing [13-8](#A310332_2_En_13_Chapter.html#Par64). The `Start` function\
    \ creates a `WebCamTexture`, assigns the texture to the material of the `GameObject`\
    \ you’ve attached the script to, and then calls `Play` to start updating the texture\
    \ from the camera video.\n\n```\n#pragma strict\nfunction Start () {\nvar webcamTexture:WebCamTexture\
    \ = WebCamTexture();\nGetComponent.().material.mainTexture = webcamTexture;\n\
    webcamTexture.Play();\n}\nListing 13-8.\nPlaying a WebCamTexture in FuguWebCam.js\n\
    ```\n\nNow attach the script to the `Ball` `GameObject`. If you click Play in\
    \ the Editor, you’ll see video from the Mac camera appear on the ball. And if\
    \ you perform a Build and Run operation on a device, you’ll see the same thing,\
    \ only using the device camera.\n\n## Explore Further\n\nAll in all, it didn’t\
    \ take much work (compared to the packaging effort in the previous chapter) to\
    \ implement touchscreen input for the bowling game, although in practice you’ll\
    \ spend a lot of time testing and adjusting controls for a game to get it just\
    \ right. In any case, with the shake-to-pause feature, the functional port of\
    \ the bowling game is complete. In other words, the iOS version game is now playable!\n\
    \nAnd despite that there isn’t a real use for the device camera in this game,\
    \ you did activate it using Unity’s `WebCamTexture` class to render a video texture\
    \ on the bowling ball. Gimmicky, but game development is very much about learning!\
    \ Especially in iOS, there’s an opportunity to play around with a lot of different\
    \ control schemes and input sensors."
  raw: '### Debug the Accelerometer


    A time-honored way to figure out how code works is to print stuff out. Let’s create
    a new JavaScript called FuguDebugAccel and attach it to a new GameObject named
    DebugAccel in the bowling scene. Add the Update function shown in Listing [13-6](#A310332_2_En_13_Chapter.html#Par45)
    to the script.


    ```

    function Update () {

    Debug.Log("accel x: "+Input.acceleration.x+" y: "+Input.acceleration.y+" z: "+Input.acceleration.z);

    }

    Listing 13-6.

    Code to Print Out Accelerometer Values

    ```


    The Update function takes the x, y, and z accelerometer values and concatenates
    them into a somewhat readable String. Debug.Log sends that String to the Console
    view if you’re testing in the Unity Editor (with the Unity Remote) or to the Xcode
    debug area if you’re running in the iOS simulator or on a device.


    Try tilting the device around to see how the values change. For example, the Debug.Log
    output shown in Figure [13-5](#A310332_2_En_13_Chapter.html#Fig5) results from
    placing the device flat on a table. The x and y values are nearly 0, and the z
    value is close to -1\. If the device is flipped upside down, it would be close
    to 1.


    ![A310332_2_En_13_Fig5_HTML.jpg](Images/A310332_2_En_13_Fig5_HTML.jpg)


    Figure 13-5.


    Debug.Log output of accelerometer values


    The acceleration values are in units of gravity. At rest, each accelerometer value
    ranges from -1 to 1, where 1 is full earth gravity (9.8 meters per second squared).
    Now try shaking the device. You should see the numbers spike up and down.


    ### Detect Shakes


    An issue with your pause menu on iOS is that you can’t pause with the Esc key
    since there’s no Esc key on your devices (although Android devices typically have
    a Back button that behaves like an Esc key).


    It’s straightforward to add a pause button to the screen in the FuguPause script
    by just adding a GUI.Button call inside the OnGUI function.


    ```

    if (GUI.Button(Rect(0,0,100,50), "Pause") { PauseGame(); }

    ```


    However, I don’t like to have buttons on the screen during gameplay, especially
    on really small screens like the iPhone. So, let’s take advantage of the alternate
    input that iOS devices can provide and pause by shaking the device.


    From your previous exercise in printing out accelerometer values, you saw that
    shaking the device causes at least one of the x, y, or z values of Input.acceleration
    to spike up or down. So, you can check for a shake by checking whether any of
    the values are much larger than 1 or much less than -1, for example. But you don’t
    have to be exact, so you can just take the square of the magnitude (length) of
    the vector.


    ```

    if (Input.acceleration.sqrMagnitude>shakeThreshold)

    ```


    Getting the sqrMagnitude of the Vector3 is faster than getting the magnitude since
    the magnitude of a vector is the square root of x² + y² + z², and this way you
    avoid the square root operation, which is relatively expensive (remember learning
    to calculate square roots by hand in high school?).


    So, let’s start by adding a public variable for the shake threshold to the FuguPause
    script.


    ```

    var shakeThreshold:float = 5;

    ```


    Now you can tweak that property in the Inspector view (Figure [13-6](#A310332_2_En_13_Chapter.html#Fig6))
    and make it more or less sensitive to shakes.


    ![A310332_2_En_13_Fig6_HTML.jpg](Images/A310332_2_En_13_Fig6_HTML.jpg)


    Figure 13-6.


    Adjusting the shake-to-pause threshold in the Inspector view


    Next, add the check of Input.acceleration as a UNITY_IPHONE replacement for the
    check of the Esc key (Listing [13-7](#A310332_2_En_13_Chapter.html#Par60)).


    ```

    var shakeThreshold:float = 5;

    function Update() {

    #if UNITY_IPHONE

    if (Input.acceleration.sqrMagnitude>shakeThreshold)

    #else

    if (Input.GetKeyDown(KeyCode.escape))

    #endif

    {

    switch (currentPage) {

    case Page.None: PauseGame(); break; // if the pause menu is not displayed, then
    pause

    case Page.Main: UnPauseGame(); break; // if the main pause menu is displaying,
    then unpause

    default: currentPage = Page.Main; // any subpage goes back to main page

    }

    }

    }

    Listing 13-7.

    Adding Shake to Pause in the FuguPause.js

    ```


    That’s all you need. Now when you test with the Unity Remote or on a device, shaking
    the device will pause the game! The augmented FuguPause script (just two lines
    of new code!) is in the project for this chapter on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    .


    ## The Camera


    Unity 5.x provides built-in support for iOS cameras. Unity also provides cross-platform
    support for reading webcam video into a texture.


    ### Read the Web Cam


    Unity has a special kind of texture (like Texture2D, a subclass of Texture) called
    WebCamTexture that displays video from an attached hardware camera. It works on
    multiple platforms, including iOS. Let’s give it a try. Create a JavaScript called
    FuguWebCam and add the Start function given in Listing [13-8](#A310332_2_En_13_Chapter.html#Par64).
    The Start function creates a WebCamTexture, assigns the texture to the material
    of the GameObject you’ve attached the script to, and then calls Play to start
    updating the texture from the camera video.


    ```

    #pragma strict

    function Start () {

    var webcamTexture:WebCamTexture = WebCamTexture();

    GetComponent.().material.mainTexture = webcamTexture;

    webcamTexture.Play();

    }

    Listing 13-8.

    Playing a WebCamTexture in FuguWebCam.js

    ```


    Now attach the script to the Ball GameObject. If you click Play in the Editor,
    you’ll see video from the Mac camera appear on the ball. And if you perform a
    Build and Run operation on a device, you’ll see the same thing, only using the
    device camera.


    ## Explore Further


    All in all, it didn’t take much work (compared to the packaging effort in the
    previous chapter) to implement touchscreen input for the bowling game, although
    in practice you’ll spend a lot of time testing and adjusting controls for a game
    to get it just right. In any case, with the shake-to-pause feature, the functional
    port of the bowling game is complete. In other words, the iOS version game is
    now playable!


    And despite that there isn’t a real use for the device camera in this game, you
    did activate it using Unity’s WebCamTexture class to render a video texture on
    the bowling ball. Gimmicky, but game development is very much about learning!
    Especially in iOS, there’s an opportunity to play around with a lot of different
    control schemes and input sensors.'
  trans: "\n### 调试加速度计\n\n探究代码工作原理的经典方法就是打印输出。让我们创建一个名为 `FuguDebugAccel` 的新 JavaScript\
    \ 脚本，并将其挂载到保龄球场景中名为 `DebugAccel` 的新 `GameObject` 上。将清单 13-6 中所示的 `Update` 函数添加到该脚本中。\n\
    \n```\nfunction Update () {\nDebug.Log(\"accel x: \"+Input.acceleration.x+\" y:\
    \ \"+Input.acceleration.y+\" z: \"+Input.acceleration.z);\n}\n清单 13-6.\n用于打印输出加速度计值的代码\n\
    ```\n\n`Update` 函数接收加速度计的 `x`、`y` 和 `z` 值，并将它们拼接成一个可读的 `字符串`。如果你在 Unity 编辑器（配合\
    \ Unity Remote）中进行测试，`Debug.Log` 会将该 `字符串` 发送到控制台视图；如果你在 iOS 模拟器或设备上运行，则会发送到 Xcode\
    \ 调试区域。\n\n尝试倾斜设备，观察这些值如何变化。例如，图 13-5 中显示的 `Debug.Log` 输出结果，是将设备平放在桌面上得到的。`x`\
    \ 和 `y` 的值接近 0，而 `z` 的值接近 -1。如果设备上下翻转，`z` 值则会接近 1。\n\n![A310332_2_En_13_Fig5_HTML.jpg](img/A310332_2_En_13_Fig5_HTML.jpg)\n\
    \n图 13-5.  \n加速度计值的 `Debug.Log` 输出结果\n\n加速度值的单位是重力加速度。在静止状态下，每个加速度计值的范围是 -1 到\
    \ 1，其中 1 代表完整的地球重力加速度（9.8 米/秒²）。现在尝试摇晃设备。你应该会看到数值上下剧烈跳动。\n\n### 检测摇晃\n\niOS 上暂停菜单的一个问题是，你无法通过\
    \ `Esc` 键暂停，因为设备上没有 `Esc` 键（不过 Android 设备通常有一个类似 `Esc` 键的返回按钮）。\n\n在 `FuguPause`\
    \ 脚本中，通过在 `OnGUI` 函数内添加一个 `GUI.Button` 调用来向屏幕添加暂停按钮很简单。\n\n```\nif (GUI.Button(Rect(0,0,100,50),\
    \ \"Pause\") { PauseGame(); }\n```\n\n但是，我不喜欢在游戏过程中屏幕上出现按钮，尤其是在 iPhone 这种小屏幕设备上。因此，我们不妨利用\
    \ iOS 设备提供的替代输入方式，通过摇晃设备来暂停游戏。\n\n从之前打印加速度计值的练习中，你已经看到摇晃设备会导致 `Input.acceleration`\
    \ 的 `x`、`y` 或 `z` 值至少有一个会向上或向下剧烈跳动。因此，你可以通过检查这些值是否有任何一个远大于 1 或远小于 -1 来判断是否发生了摇晃。不过你无需精确计算，只需获取向量模长的平方即可。\n\
    \n```\nif (Input.acceleration.sqrMagnitude>shakeThreshold)\n```\n\n获取 `Vector3`\
    \ 的 `sqrMagnitude`（模长平方）比获取模长更快，因为向量的模长是 x² + y² + z² 的平方根，而这种方法避免了相对昂贵的平方根运算（还记得高中时手动计算平方根吗？）。\n\
    \n那么，我们首先在 `FuguPause` 脚本中添加一个用于摇晃阈值的公共变量。\n\n```\nvar shakeThreshold:float =\
    \ 5;\n```\n\n现在你可以在检视面板（图 13-6）中调整该属性，使其对摇晃的敏感度更高或更低。\n\n![A310332_2_En_13_Fig6_HTML.jpg](img/A310332_2_En_13_Fig6_HTML.jpg)\n\
    \n图 13-6.  \n在检视面板中调整摇晃暂停的阈值\n\n接下来，添加对 `Input.acceleration` 的检查，作为 `UNITY_IPHONE`\
    \ 平台下对 `Esc` 键检查的替代方案（清单 13-7）。\n\n```\nvar shakeThreshold:float = 5;\nfunction\
    \ Update() {\n#if UNITY_IPHONE\nif (Input.acceleration.sqrMagnitude>shakeThreshold)\n\
    #else\nif (Input.GetKeyDown(KeyCode.escape))\n#endif\n{\nswitch (currentPage)\
    \ {\ncase Page.None: PauseGame(); break; // 如果未显示暂停菜单，则暂停游戏\ncase Page.Main: UnPauseGame();\
    \ break; // 如果显示主暂停菜单，则取消暂停\ndefault: currentPage = Page.Main; // 任何子页面返回主页面\n\
    }\n}\n}\n清单 13-7.\n在 FuguPause.js 中添加摇晃暂停功能\n```\n\n大功告成。现在，当你使用 Unity Remote\
    \ 或在设备上测试时，摇晃设备就能暂停游戏！增强后的 `FuguPause` 脚本（仅增加了两行新代码！）包含在本章的工程项目中，可访问 [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)\
    \ 获取。\n\n## 摄像机\n\nUnity 5.x 为 iOS 摄像机提供了内置支持。Unity 还提供了跨平台支持，可以将网络摄像头视频读取到纹理中。\n\
    \n### 读取网络摄像头\n\nUnity 有一种特殊的纹理（类似于 `Texture2D`，是 `Texture` 的子类），称为 `WebCamTexture`，它可以显示来自连接的硬件摄像头的视频。它适用于包括\
    \ iOS 在内的多个平台。让我们来尝试一下。创建一个名为 `FuguWebCam` 的 JavaScript 脚本，并添加清单 13-8 中给出的 `Start`\
    \ 函数。`Start` 函数创建一个 `WebCamTexture`，将该纹理分配给挂载了该脚本的 `GameObject` 的材质，然后调用 `Play`\
    \ 开始从摄像头视频更新纹理。\n\n```\n#pragma strict\nfunction Start () {\nvar webcamTexture:WebCamTexture\
    \ = WebCamTexture();\nGetComponent.().material.mainTexture = webcamTexture;\n\
    webcamTexture.Play();\n}\n清单 13-8.\n在 FuguWebCam.js 中播放 WebCamTexture\n```\n\n\
    现在将该脚本挂载到 `Ball` `GameObject` 上。如果你在编辑器中点击“播放”，你会看到来自 Mac 摄像头的视频显示在球上。如果你在设备上执行“生成并运行”操作，你会看到同样的效果，只是使用了设备摄像头。\n\
    \n## 进一步探索\n\n总而言之，为保龄球游戏实现触摸屏输入并没有花费太多功夫（与上一章的打包装配工作相比），尽管在实践中，你需要花费大量时间来测试和调整游戏的操控，才能使其恰到好处。无论如何，借助摇晃暂停功能，保龄球游戏的功能移植已经完成。换句话说，iOS\
    \ 版本的游戏现在已经可以玩了！\n\n而且，尽管设备摄像头在这个游戏中没有实际用途，但你确实使用了 Unity 的 `WebCamTexture` 类来激活它，从而在保龄球上渲染视频纹理。虽然有点花哨，但游戏开发很大程度上就是学习！尤其是在\
    \ iOS 上，有很多机会尝试各种不同的控制方案和输入传感器。\n"
- fmt: '### Scripting Reference


    Almost all the Unity features introduced in this chapter are members of the `Input`
    class. In fact, the Scripting Reference documentation on `Input` includes an overview
    of the iOS input features.


    After reading the overview of the `Input` class, you should read the pages for
    each of the functions used in this chapter, in particular `Input.GetTouch` (and
    the associated `Touch` struct), which has code samples showing how to loop through
    all the `Touch` events in each frame, and `Input.acceleration`, which has code
    samples showing how to check acceleration values in every frame.


    One thing to keep in mind is that the accelerometer can generate multiple values
    per frame. For most cases, it should be sufficient to just sample `Input.accelerometer`
    once per frame, but if finer-grained sampling is required, you can access the
    variables `Input.accelerationEventCount` and `Input.accelerationEvents` to obtain
    all acceleration events.


    The `Input` class provides access to other iOS sensors. The static variables `Input.gyro`,
    `Input.compass`, and `Input.location` return data from the gyroscope, compass,
    and location services, respectively. In addition to the pages documenting those
    variables, you should check out the pages on the classes of those variables: the
    `Gyroscope`, `Compass`, and `LocationServices` classes. The documentation is sparse,
    but you can find code samples in the individual class functions. The static variable
    `Input.compensateSensors` controls whether the accelerometer, gyroscope, and compass
    data are adjusted for the screen orientation.


    Besides testing object selection, raycasting is used a lot in games and graphics,
    so you should familiarize yourself with the page on `Physics.Raycast`, which has
    several code examples. For example, in HyperBowl, I use raycasting to keep the
    Main Camera from dipping below the ground and to set the initial positions of
    GameObjects to rest just on top of the ground. In both cases, I raycast down from
    the GameObject position toward the ground and check the resulting distance. Finally,
    I covered the use of the `WebCamTexture` class. The page on `WebCamTexture` has
    a lot of stuff, but click the links to its `Play`, `Stop`, and `Pause` functions
    (the functions you’d most commonly use) to find code samples on each of those
    pages. Also, check out the link to the `WebCamTexture` constructor. That page
    lists a variety of constructors that allow you to customize the texture size for
    different resolutions.


    ### iOS Developer Library


    It’s a good idea to read the iOS Reference Library in addition to, or even before,
    reading the Unity Script Reference, so you’ll know what iOS capabilities are available
    to be exposed through Unity and how Unity classes and functions map to their iOS
    counterparts.


    You can view the iOS Reference Library (no login required) at [`http://developer.apple.com/library`](http://developer.apple.com/library)
    or from the Xcode Organizer; from there select the Guides tab and browse the guides,
    in particular the following:


    - The guide “Event Handling Guide” provides an overview of touch events, which
    relate to Unity’s `Input.GetTouch` and the `Touch` class, and motion events, which
    relate to `Input.acceleration` and the other `Input` accelerometer variables.

    - The guide “Camera Programming Topics for iOS” describes the `UIImagePickerController`
    class used by the Prime31 Etcetera plug-ins.

    - The guide “AV Foundation Programming Guide” describes the video capture functions
    most likely used for the `WebCamTexture` class in Unity.


    ### Asset Store


    The Unity `Input` class gives you access to basic touch information, but it doesn’t
    provide access to the iOS gesture recognizers, which detect higher-level “gestures,”
    such as swiping and pinching. The Asset Store comes to the rescue again, offering
    third-party packages that provide high-level gesture detection. I use the FingerGestures
    package, which has a nice callback system for detecting and handling various gestures.


    For example, in HyperBowl I wanted the pause menu to come up when the player pinches
    the screen (two fingers on the screen coming together). With the Finger Gestures
    package, it just involves adding a callback for the gesture in the pause menu
    script, as shown here:


    ```

    function OnGesturePinchEnd(pos1:Vector2,pos2:Vector2) {

    PauseGame();

    }

    ```


    Also necessary is a line in the `Start` or `Awake` function that adds the callback
    to the `FingerGestures` callback list for that gesture, as shown here:


    ```

    FingerGestures.OnPinchEnd += OnGesturePinchEnd;

    ```


    Unity doesn’t provide script access to everything available in iOS , and that’s
    where plug-ins come in. The Unity plug-in system allows you to add new script
    functions that access “native” code. Generally speaking, if you can code something
    in C, C++, or Objective-C, you can make a Unity plug-in for it. For example, in
    the Unity Asset Store, you’ll find there are plug-ins built around mobile ad SDKs
    and plug-ins for accessing iOS features.


    Plug-ins are installed in the `Assets/Plugins` folder, which, as I mentioned before,
    is a good place to store scripts that have to be loaded before any other scripts.
    They also often require manual integration steps in Xcode, like adding entries
    to the `Info.plist` file or installing additional code libraries (preventing a
    Build and Run operation from Unity—you have to select Build, modify the Xcode
    project, and then select Run from Xcode). And then there’s always the risk that
    multiple plug-ins installed in the same Unity project will have conflicts.


    That’s why I like to use the plug-ins provided by Prime31 Studios at [`http://prime31.com/unity`](http://prime31.com/unity).
    They provide a large variety of plug-ins that can coexist in the same Unity project,
    and all Xcode modifications are performed by a Unity postprocessor script, so
    the Build and Run operation from Unity will still work and no messing around in
    Xcode is required.


    For example, the Prime31 Etcetera plug-in, available on the Asset Store, has a
    bunch of assorted features, including access to the iOS Photos gallery and the
    device camera with one function call, like this:


    ```

    EtceteraBinding.promptForPhoto(1.0);

    ```


    Figure [13-7](#A310332_2_En_13_Chapter.html#Fig7) shows the resulting prompt in
    my Fugu Maze app (where I use the photo chooser to allow players to customize
    the maze wall texture). If you want to try it, download Fugu Maze Free from the
    App Store or one of the free HyperBowl lanes (I use the photo chooser to customize
    the bowling ball texture).


    ![A310332_2_En_13_Fig7_HTML.jpg](Images/A310332_2_En_13_Fig7_HTML.jpg)


    Figure 13-7.


    The Prime31 Etcetera plug-in photo chooser on an iPad


    Another Prime31 plug-in that makes available additional device input is the iCade
    plug-in (available only on the Prime31 web site). The iCade is a retro-style arcade
    cabinet that provides joystick input to iOS devices through a Bluetooth connection.
    The iCade essentially pretends it’s a Bluetooth keyboard, so any code using the
    iCade plug-in is similar to the code for keyboard controls. If you added code
    for iCade controls to the `CalcForce` function of your bowling ball code, it would
    look something like the snippet in Listing [13-9](#A310332_2_En_13_Chapter.html#Par90)
    (this sample is actually taken from HyperBowl).


    ```

    var yinput:float = 0;

    if (iCadeBinding.state.JoystickUp) yinput = 1;

    if (iCadeBinding.state.JoystickDown) yinput = -1;

    var xinput:float = 0;

    if (iCadeBinding.state.JoystickLeft) xinput = 1;

    if (iCadeBinding.state.JoystickRight) xinput = -1;

    var deltatime:float = Time.deltaTime;

    forcey += iCadePowery*yinput/deltatime;

    forcex += iCadePowerx*xinput/deltatime;

    ```


    Listing 13-9. iCade Additions to `CalcForce` Using the Prime31 iCade Plug-In


    Just as if you’re checking whether four different keys were pressed, you’re checking
    whether the joystick was moved in any of four directions. The joysticks aren’t
    any more sensitive than that.'
