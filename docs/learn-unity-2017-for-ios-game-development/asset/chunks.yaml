    \ with a folder named `Prefabs` that contains the `Barrel` prefabs and the `Barrel`\
    \ models (Figure [7-13](#A310332_2_En_7_Chapter.html#Fig13)).\n\n![A310332_2_En_7_Fig13_HTML.jpg](Images/A310332_2_En_7_Fig13_HTML.jpg)\n\
    \n*Figure 7-13. The Project view of the Barrel package*"
  raw: '### Send a Message


    Normally, calling a function in a script attached to one GameObject from a script
    attached to another GameObject is a little bit tricky. It involves calling GetComponent
    on a GameObject to retrieve the script and then referencing that script to call
    the function.


    But in simple cases (e.g., when you don’t care about the return value of the function),
    Unity allows you to call functions by sending messages to GameObjects using either
    the GameObject SendMessage function or GameObject BroadcastMessage function. A
    GameObject receiving a message, which consists of the name of the function to
    call, will pass that message on to any script that might have that function.


    Let’s add some functions to your game controller script that will send ResetPosition
    messages (Listing [7-3](#A310332_2_En_7_Chapter.html#Par28)).


    ```

    var ball:GameObject; // the bowling ball

    Function ResetBall() {

    ball.SendMessage("ResetPosition");

    }

    function ResetPins() {

    for (var pin:GameObject in pins) {

    pin.BroadcastMessage("ResetPosition");

    }

    }

    function ResetCamera() {

    Camera.main.SendMessage("ResetPosition");

    }

    function ResetEverything() {

    ResetBall();

    ResetPins();

    ResetCamera();

    }

    Listing 7-3.

    Functions to Send ResetPosition Messages in FuguBowl.js

    ```


    The additional code begins with a public variable that will refer to the ball.
    The script already has a pins array that references all of the bowling pins, and
    the Main Camera can always be referenced through the static variable Camera.main,
    so now the script can access every GameObject that it needs to reset. The functions
    ResetCamera and ResetBall call SendMessage to send the ResetPosition message to
    their respective target GameObjects. Every ResetPosition function defined in scripts
    attached to those GameObjects will be called. Specifically, since the Main Camera
    and Ball GameObjects have the FuguReset script attached, the ResetPosition function
    in that script will respond to the message. The ResetPins function is a little
    bit different in that it calls BroadcastMessage to send the ResetPosition message
    . BroadcastMessage behaves the same as SendMessage except that the message is
    also propagated to any child GameObjects of the original recipient GameObject.
    This will be useful later in this chapter when you swap in some pins that have
    their Rigidbody components attached to child GameObjects.


    ### Check for Gutter Ball


    When the ball rolls off the edge of the floor, it’s essentially a gutter ball,
    since there’s no hope of reaching the pins at this point. So, a reset of the game
    is definitely in order when this happens. The gutter ball can be implemented by
    checking in every frame whether the y position of the ball has dropped below a
    certain level. That can be implemented by adding the public variable and Update
    callback in Listing [7-4](#A310332_2_En_7_Chapter.html#Par31) to the FuguBowl
    script.


    ```

    var sunkHeight:float = -10.0; // fall below this y position and we have a gutterball

    function Update() {

    if (ball.transform.position.y<sunkHeight) {

    ResetEverything();

    }

    }

    Listing 7-4.

    Update Callback in FuguBowl.js to Test for Gutter Ball

    ```


    The variable sunkHeight specifies what y position the ball has to fall below to
    reset everything. The default value of sunkHeight is some distance below zero,
    so the players has some time to see the ball fall before it resets. The Update
    callback checks every frame whether or not the ball’s y position is below sunkHeight.
    If it is, ResetEverything is called, which sends out all the ResetPosition messages
    to the Ball, Main Camera, and Pin GameObjects. Before you click Play to test this,
    you need to assign the ball public variable in the script by dragging the Ball
    GameObject from the Hierarchy view into the Ball field of the FuguBowl script
    (Figure [7-11](#A310332_2_En_7_Chapter.html#Fig11)).


    ![A310332_2_En_7_Fig11_HTML.jpg](Images/A310332_2_En_7_Fig11_HTML.jpg)


    Figure 7-11.


    Game controller properties in FuguBowl.js to support resetting the ball


    Now when the ball rolls off the floor, the Ball, Main Camera, and Pin GameObjects
    should pop right back into their beginning positions. Continuous gameplay!


    ### The Complete Listing


    Listing [7-5](#A310332_2_En_7_Chapter.html#Par35) gives the complete game controller
    script.


    ```

    // bowling game controller

    #pragma strict

    var pin:GameObject; // pin prefab to instantiate

    var pinPos:Vector3 = Vector3(0,1,20); // position to place rack of pins

    var pinDistance = 1.5; // initial distance between pins

    var pinRows = 4; // number of pin rows

    var ball:GameObject; // the bowling ball

    var sunkHeight:float = -10.0; // fall below this y position and we have a gutterball

    private var pins:Array;

    function Awake () {

    CreatePins();

    }

    function CreatePins() {

    pins = new Array();

    var offset = Vector3.zero;

    for (var row=0; row<pinRows; ++row) {

    offset.z+=pinDistance;

    offset.x=-pinDistance*row/2;

    for (var n=0; n<=row; ++n) {

    pins.push(Instantiate(pin, pinPos+offset, Quaternion.identity));

    offset.x+=pinDistance;

    }

    }

    }

    function Update() {

    if (ball.transform.position.y<sunkHeight) {

    ResetEverything();

    }

    }

    function ResetBall() {

    ball.SendMessage("ResetPosition");

    }

    function ResetPins() {

    for (var pin:GameObject in pins) {

    pin.BroadcastMessage("ResetPosition");

    }

    }

    function ResetCamera() {

    Camera.main.SendMessage("ResetPosition");

    }

    function ResetEverything() {

    ResetBall();

    ResetPins();

    ResetCamera();

    }

    Listing 7-5.

    Complete Listing for FuguBowl.js

    ```


    ## Bowl for Barrels


    Capsules make for simplistic bowling pins, both in appearance and in collision
    shape. A real bowling pin model would be much better, but unfortunately, searching
    for free bowling pins on the Asset Store turns up nothing (although that could
    change at any time if a vendor decides to fill the void). However, there are a
    lot of other models on the Asset Store that, if you’re flexible, could act as
    bowling pin substitutes. It turns out there are several packages of barrel models,
    so you’ll go with barrels as pins for your backup plan.


    ### Pick a Barrel


    A search for barrel on the Asset Store reveals several free packages of barrel
    models (Figure [7-12](#A310332_2_En_7_Chapter.html#Fig12)).


    ![A310332_2_En_7_Fig12_HTML.jpg](Images/A310332_2_En_7_Fig12_HTML.jpg)


    Figure 7-12.


    Free barrels on the Asset Store


    Any of the free packages will work fine, but the Barrel package from Game-Ready,
    the one displaying two rusty metal barrels in its Asset Store icon, already has
    a prefab set up, so let’s download that package. From the Asset Store description
    and from the Project view after you import the package, you can see the Barrel
    package is nicely organized, with a folder named Prefabs that contains the Barrel
    prefabs and the Barrel models (Figure [7-13](#A310332_2_En_7_Chapter.html#Fig13)).


    ![A310332_2_En_7_Fig13_HTML.jpg](Images/A310332_2_En_7_Fig13_HTML.jpg)


    Figure 7-13.


    The Project view of the Barrel package'
  trans: "\n### 发送消息\n\n通常，从一个`GameObject`上挂载的脚本调用另一个`GameObject`上挂载的脚本中的函数会有些棘手。这涉及到对`GameObject`调用`GetComponent`来获取脚本，然后引用该脚本才能调用函数。\n\
    \n但在简单情况下（例如，当你不关心函数的返回值时），Unity 允许你通过向`GameObject`发送消息来调用函数，可以使用`GameObject.SendMessage()`函数或`GameObject.BroadcastMessage()`函数。接收消息的`GameObject`（消息内容为要调用的函数名）会将这条消息传递给所有可能包含该函数的脚本。\n\
    \n让我们在你的游戏控制脚本中添加一些函数，用于发送`ResetPosition`消息（清单 7-3）。\n\n```\nvar ball:GameObject;\
    \ // 保龄球\nFunction ResetBall() {\n    ball.SendMessage(\"ResetPosition\");\n}\n\
    function ResetPins() {\n    for (var pin:GameObject in pins) {\n        pin.BroadcastMessage(\"\
    ResetPosition\");\n    }\n}\nfunction ResetCamera() {\n    Camera.main.SendMessage(\"\
    ResetPosition\");\n}\nfunction ResetEverything() {\n    ResetBall();\n    ResetPins();\n\
    \    ResetCamera();\n}\n```\n*清单 7-3. FuguBowl.js 中用于发送 ResetPosition 消息的函数*\n\
    \n新增代码以一个公开变量开头，该变量将引用保龄球。脚本中已经有一个`pins`数组引用了所有瓶柱，而`Main Camera`始终可以通过静态变量`Camera.main`来引用，因此现在脚本可以访问所有需要重置的`GameObject`。函数`ResetCamera()`和`ResetBall()`调用`SendMessage()`向各自的目标`GameObject`发送`ResetPosition`消息。所有在这些`GameObject`所挂载脚本中定义的`ResetPosition()`函数都将被调用。具体来说，由于`Main\
    \ Camera`和`Ball`这两个`GameObject`都挂载了`FuguReset`脚本，该脚本中的`ResetPosition()`函数将响应此消息。`ResetPins()`函数则略有不同，它调用`BroadcastMessage()`来发送`ResetPosition`消息。`BroadcastMessage()`的行为与`SendMessage()`相同，区别在于消息还会传播给原始接收`GameObject`的所有子`GameObject`。当你稍后在本章中替换一些瓶柱，而这些瓶柱的`Rigidbody`组件挂载在子`GameObject`上时，这个特性将非常有用。\n\
    \n### 检测落沟球\n\n当保龄球滚出地板边缘时，本质上就是一个落沟球，因为此时已无望击中瓶柱。因此，在这种情况下，游戏必须立即重置。实现落沟球检测的方法是在每一帧检查保龄球的`y`位置是否低于某个阈值。可以通过在`FuguBowl`脚本中加入以下公开变量和`Update()`回调来实现（清单\
    \ 7-4）。\n\n```\nvar sunkHeight:float = -10.0; // 低于此 y 位置即为落沟球\nfunction Update()\
    \ {\n    if (ball.transform.position.y < sunkHeight) {\n        ResetEverything();\n\
    \    }\n}\n```\n*清单 7-4. FuguBowl.js 中用于检测落沟球的 Update 回调*\n\n变量`sunkHeight`指定了保龄球的`y`位置需低于多少才触发全部重置。`sunkHeight`的默认值设为零以下一段距离，这样玩家在重置前还能看到球下落一段距离。`Update()`回调每帧检查保龄球的`y`位置是否低于`sunkHeight`。如果是，则调用`ResetEverything()`，它将向`Ball`、`Main\
    \ Camera`和`Pin`这些`GameObject`发送所有`ResetPosition`消息。在点击播放测试之前，你需要通过从层级视图中将`Ball`\
    \ `GameObject`拖拽到`FuguBowl`脚本的`Ball`字段中，来分配脚本中的`ball`公开变量（图 7-11）。\n\n![A310332_2_En_7_Fig11_HTML.jpg](img/A310332_2_En_7_Fig11_HTML.jpg)\n\
    \n*图 7-11. FuguBowl.js 中支持重置保龄球的游戏控制器属性*\n\n现在，当保龄球滚出地板时，`Ball`、`Main Camera`和`Pin`这些`GameObject`应该会立刻弹回它们的初始位置。连续游戏继续进行！\n\
    \n### 完整代码清单\n\n清单 7-5 给出了完整的游戏控制器脚本。\n\n```\n// 保龄球游戏控制器\n#pragma strict\nvar\
    \ pin:GameObject; // 用于实例化的瓶柱预设\nvar pinPos:Vector3 = Vector3(0,1,20); // 放置瓶柱阵列的位置\n\
    var pinDistance = 1.5; // 瓶柱之间的初始距离\nvar pinRows = 4; // 瓶柱行数\nvar ball:GameObject;\
    \ // 保龄球\nvar sunkHeight:float = -10.0; // 低于此 y 位置即为落沟球\nprivate var pins:Array;\n\
    \nfunction Awake () {\n    CreatePins();\n}\n\nfunction CreatePins() {\n    pins\
    \ = new Array();\n    var offset = Vector3.zero;\n    for (var row=0; row < pinRows;\
    \ ++row) {\n        offset.z += pinDistance;\n        offset.x = -pinDistance\
    \ * row / 2;\n        for (var n=0; n <= row; ++n) {\n            pins.push(Instantiate(pin,\
    \ pinPos + offset, Quaternion.identity));\n            offset.x += pinDistance;\n\
    \        }\n    }\n}\n\nfunction Update() {\n    if (ball.transform.position.y\
    \ < sunkHeight) {\n        ResetEverything();\n    }\n}\n\nfunction ResetBall()\
    \ {\n    ball.SendMessage(\"ResetPosition\");\n}\n\nfunction ResetPins() {\n \
    \   for (var pin:GameObject in pins) {\n        pin.BroadcastMessage(\"ResetPosition\"\
    );\n    }\n}\n\nfunction ResetCamera() {\n    Camera.main.SendMessage(\"ResetPosition\"\
    );\n}\n\nfunction ResetEverything() {\n    ResetBall();\n    ResetPins();\n  \
    \  ResetCamera();\n}\n```\n*清单 7-5. FuguBowl.js 的完整代码清单*\n\n## 用木桶代替球瓶\n\n使用胶囊体作为保龄球瓶既简陋又碰撞形状单一。一个真正的保龄球瓶模型会好得多，但可惜的是，在资源商店中搜索免费保龄球瓶一无所获（不过，如果有供应商决定填补这个空白，这种情况随时可能改变）。然而，资源商店中有很多其他模型，如果你灵活变通，它们可以作为保龄球瓶的替代品。结果发现有好几个木桶模型的资源包，所以作为备选方案，你将使用木桶作为瓶柱。\n\
    \n### 挑选一个木桶\n\n在资源商店中搜索`barrel`会发现几个免费的木桶模型资源包（图 7-12）。\n\n![A310332_2_En_7_Fig12_HTML.jpg](img/A310332_2_En_7_Fig12_HTML.jpg)\n\
    \n*图 7-12. 资源商店中的免费木桶*\n\n任何一个免费资源包都可以正常工作，但来自 Game-Ready 的木桶包（其资源商店图标中显示两个生锈的金属木桶）已经设置好了预设体，所以我们就下载这个包吧。从资源商店的描述以及导入该包后的项目视图中，你可以看到木桶包组织得很好，其中有一个名为`Prefabs`的文件夹，包含了`Barrel`预设体和`Barrel`模型（图\
    \ 7-13）。\n\n![A310332_2_En_7_Fig13_HTML.jpg](img/A310332_2_En_7_Fig13_HTML.jpg)\n\
    \n*图 7-13. 木桶包的项目视图*\n"
- fmt: '### Make a Prefab


    You need a `Barrel` prefab to replace the simple `Pin` prefab, but you should
    avoid modifying the original `Barrel` prefab (another import of the `Barrel` package
    would clobber your changes). To make your own copy of the `Barrel` prefab, select
    the prefab, press `Command+D` (or **Duplicate** from the **Edit** menu), and drag
    the copy of the prefab into the **Prefabs** folder. Then rename it to `BarrelPin`
    since it’s a `Barrel` and you’re using it as a bowling pin (Figure [7-14](#A310332_2_En_7_Chapter.html#Fig14)).


    ![A310332_2_En_7_Fig14_HTML.jpg](Images/A310332_2_En_7_Fig14_HTML.jpg)


    Figure 7-14. Copy of the `Barrel` prefab


    Select the `BarrelPin` prefab so that it is displayed in the **Inspector** view.
    If you used the same asset package, a `MeshFilter` component and a `MeshRenderer`
    component are present. But, it needs a `Collider` component and a `Rigidbody`
    component. The prefab also needs a `FuguReset` script attached to handle the `ResetPosition`
    messages sent by the game controller. For now, let’s add a `FuguReset` script.
    Now add a `Rigidbody` component. In the `Rigidbody` component, set **Mass** to
    2 (kg). That’s pretty light for a metal barrel, but the game won’t be fun if the
    ball can’t knock down the barrels-as-pins without too much trouble. In games,
    fun is better than reality!


    You can add the `FuguReset` script to the prefab by dragging the script into the
    **Inspector** view or by using the **AddComponent** button (Figure [7-15](#A310332_2_En_7_Chapter.html#Fig15)).


    ![A310332_2_En_7_Fig15_HTML.jpg](Images/A310332_2_En_7_Fig15_HTML.jpg)


    Figure 7-15. Adding the `FuguReset` script to the `BarrelPin` prefab


    ### Use the Prefab


    To replace the simple capsule-shaped `Pin` prefab with the `BarrelPin` prefab,
    select the `FuguBowl` GameObject in the **Hierarchy** view so that its components
    display in the **Inspector** view and then drag the `BarrelPin` prefab into the
    **Pin** field of the `FuguBowl` script, replacing the `Pin` prefab you started
    with (Figure [7-16](#A310332_2_En_7_Chapter.html#Fig16)).


    ![A310332_2_En_7_Fig16_HTML.jpg](Images/A310332_2_En_7_Fig16_HTML.jpg)


    Figure 7-16. Using the `BarrelPin` prefab as the bowling pin


    Now when you click **Play**, ten barrels will appear instead of ten capsules.
    But they will immediately fall through the floor because the pins don’t have `Collider`
    components yet!


    ### Add a Collider


    You can’t avoid it any longer. It’s time to take care of the `BarrelPin` collision.
    So that you can visualize the `BarrelPin` and its collision shape in the **Scene**
    view, temporarily place the `BarrelPin` prefab in the scene by dragging the prefab
    into the **Hierarchy** view. Once there, press the `F` key to invoke the **Frame
    Selected** command, which will center the barrel in the **Scene** view. Also,
    change the viewing options (top-left pull-down menu in the **Scene** view) from
    **Textured** to **Wireframe**, so the mesh and `Collider` component’s shape can
    be seen more easily. Unfortunately, the **Component** menu doesn’t list any primitive
    colliders that are barrel-shaped (a `CylinderCollider` would be perfect, but it
    doesn’t exist), and although a `MeshCollider` would conform to the shape of the
    barrel, `MeshCollider`s are not appropriate for physical GameObjects because of
    performance issues. The closest matching shape in the **Component** menu is `CapsuleCollider`.
    So, let’s start with a `CapsuleCollider` shape on your `Barrel` GameObject and
    see how well it fits.


    Although Unity tries to size a `Collider` component to fit the GameObject’s mesh
    when the `Collider` component is added, in this case the fit isn’t very good largely
    because, as you can see from the rotation in the `Transform` component, this GameObject
    is rotated 90 degrees around its x-axis. Without that rotation, the barrel is
    lying on its side, but the rotation also affects the orientation of the `Collider`
    component. To adjust for the rotation, switch the axis of the `CapsuleCollider`
    shape to the z-axis. After that, setting the **Radius** to 2 and the **Height**
    to 6 will produce a much closer match between `CapsuleCollider` and the barrel
    (Figure [7-17](#A310332_2_En_7_Chapter.html#Fig17)).


    ![A310332_2_En_7_Fig17_HTML.jpg](Images/A310332_2_En_7_Fig17_HTML.jpg)


    Figure 7-17. Adding a `CapsuleCollider` shape to the barrel


    The capsule matches the barrel shape pretty well around the side but not on the
    top and bottom, which should have flat surfaces instead of just the endpoints
    of the capsule. For flat surfaces, `BoxCollider`s are the obvious choice. So,
    this is a situation where you want to combine multiple `Collider` components into
    a compound collider.'
