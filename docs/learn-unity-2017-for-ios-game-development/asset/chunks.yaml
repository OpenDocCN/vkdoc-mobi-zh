    图 6-22. `Bouncy`和`Ice`物理材质的比较


    注意`Ice`的摩擦力值特别低。`Dynamic Friction`是一个物体在另一个物体上滑动时产生的摩擦力。`Static Friction`是一个物体静止在另一个物体上时的摩擦力。摩擦力的范围是
    0 到 1，其中 0 代表无摩擦，1 代表完全无法滑动。`Ice`的`Bounciness`值为 0，这很合理，因为冰不会弹跳。而`Bouncy`物理材质的`Bounciness`最大值为
    1。


    当两个具有不同`PhysicMaterial`的`GameObject`发生碰撞时会发生什么？它们的`Friction`和`Bounciness`值会分别根据`Friction
    Combine`和`Bounce Combine`值进行组合。`Bouncy`的`Friction Combine`值表示，当它与另一个物理材质碰撞或滑动时，应用的摩擦力是两个材质摩擦力值的平均值。而`Bouncy`的`Bounce
    Combine`值指定将使用两个物理材质中最大的弹性值（由于`Bouncy`已经具有最大弹性值 1，因此结果总是 1）。


    你可能想知道如果两个物理材质具有不同的组合值（就像`Bouncy`和`Ice`那样）会发生什么，会使用哪一个？截至目前，官方并没有明确记录，但优先级顺序（从低到高）似乎是：平均值、相乘、最小值、最大值。因此，如果`Bouncy`和`Ice`碰撞，结果将是取摩擦力最小值（即`Ice`的
    0.1）和弹性最大值（即`Bouncy`的 1）。这正是你所期望的！


    在物理材质的检视视图中显示的最后三个属性允许各向异性摩擦，即在不同方向上具有不同的摩擦力值。如果`Friction Direction`属性被设置为非零向量，那么`Secondary
    Static Friction`和`Secondary Dynamic Friction`将在该方向上生效。对于木质地砖，你可以指定一个沿着木纹方向的次要摩擦方向，并沿着该方向设置较低的静态和动态摩擦力值。


    ### 应用`PhysicMaterial`


    你可以将任意标准物理材质拖放到地板和球的`Collider`组件的`Material`字段中，或者点击`Collider`组件`Material`字段右侧的小圆圈，从弹出窗口中选择（图
    6-23）。或者，你也可以从项目视图将物理材质拖放到检视视图中的`GameObject`上，物理材质将自动出现在正确的位置（即`Collider`组件的`Material`字段）。


    ![A310332_2_En_6_Fig23_HTML.jpg](img/A310332_2_En_6_Fig23_HTML.jpg)


    图 6-23. 给球添加一个`Bouncy`物理材质


    尝试在地板和球上使用不同的物理材质。为球选择`Bouncy`物理材质，为地板选择`Metal`。然后点击播放，观察球一次又一次地弹跳；接着将球切换为`Ice`，观察球沉闷地落地。


    除了在`Collider`组件中来回交换不同的物理材质，你也可以直接调整物理材质本身。例如，在项目视图中选中`Bouncy`物理材质，然后在检视视图中编辑物理材质的属性。但由于这些物理材质来自标准资产包，如果你重新导入该包（无论是意外还是因升级而故意为之），它们可能会被替换。此外，如果一个物理材质被多个`GameObject`使用，更改其属性会影响所有这些对象。


    这里干净且安全的解决方案是为每个需要独立物理材质的`GameObject`创建一个新的物理材质。从概念上讲，当你需要一个独特的材质时，也应该期望有一个独特的物理材质。换句话说，一个独特的表面应该拥有自己的材质和物理材质。例如，球和地板应该有自己的物理材质，而所有的保龄球瓶（你将在下一章创建）应该共享同一个物理材质。

