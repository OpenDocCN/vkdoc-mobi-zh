    ### 添加帧率显示


    仅仅为了查看帧率而启用内置性能分析器或通过网络连接到编辑器性能分析器并不方便。这时，屏幕上的帧率显示就派上用场了。这样，当你坐在沙发上看电视并测试自己的游戏时，只需切换打开即可（至少我是这么做的）。


    对于屏幕上的帧率显示，你可以像之前制作保龄球记分板那样使用 Unity UI 的 Image 组件。但是，还有另一种在屏幕上显示 2D 文本的方法，那就是使用
    UI Text 组件。你可以使用菜单栏上的 **GameObject** 菜单或 Hierarchy 视图中的 **Create** 菜单来创建一个已附加
    UI Text 组件的 `GameObject`（图 14-12）。


    ![A310332_2_En_14_Fig12_HTML.jpg](img/A310332_2_En_14_Fig12_HTML.jpg)


    图 14-12.


    创建一个 UI Text `GameObject`


    让我们继续创建那个 UI Text `GameObject` 并将其命名为 FPS（图 14-13）。


    ![A310332_2_En_14_Fig13_HTML.jpg](img/A310332_2_En_14_Fig13_HTML.jpg)


    图 14-13.


    带有 UI Text 组件的 FPS `GameObject`


    就像你用于次要启动画面的 UI Texture 一样，UI Text 在屏幕上使用归一化坐标定位，其中左下角是 (0,0)，右上角是 (1,1)，坐标在 `GameObject`
    的 Transform 的 x 和 y 值中指定。将帧率显示对象的 x 和 y 位置都设置为 -0.1，使其靠近左下角，并将文本值更改为 FPS。


    不必费心自定义字体，因为帧率显示仅用于开发目的，你不会在发布的应用程序中激活它（尽管在 HyperBowl 中，用户可以激活帧率显示，以便他们报告性能问题）。默认大小值
    0 表示将使用字体导入设置中指定的字体大小，但这相当小，所以让我们将其设置为一个合理的大尺寸，40。在这段时间里，`GUIText` 在 Game 视图中是可见的，因此你可以看到尺寸变化的效果（图
    14-14）。


    ![A310332_2_En_14_Fig14_HTML.jpg](img/A310332_2_En_14_Fig14_HTML.jpg)


    图 14-14.


    带有 UI Text `GameObject` 的 Game 视图


    正如 UI Image 比 Unity UI 更方便显示静态纹理，无需脚本编写一样，UI Text 是一种比 Unity UI Image 更直接的显示静态文本的方式。但是对于你的帧率显示，你确实需要更改
    UI Text 中的文本，你可以通过在脚本中设置 UI Text 实例的 `text` 变量来实现。现在让我们实现帧率显示脚本。创建一个新脚本，将其放置在
    Scripts 文件夹中，并命名为 `FuguFPS`（图 14-15）。


    ![A310332_2_En_14_Fig15_HTML.jpg](img/A310332_2_En_14_Fig15_HTML.jpg)


    图 14-15.


    创建一个新的 `FuguFPS.js` 脚本


    然后将列表 14-5 中的 `Update` 函数添加到脚本中。脚本的 `Update` 回调将计算出的帧率赋值给 `guiText.text` 变量，即显示在屏幕上的文本。计算很简单，基于
    `Time.deltaTime`，即最近的帧时间。通常，每秒帧数计算为 `1/Time.deltaTime`，但由于 `Time.deltaTime` 受
    `Time.timeScale` 缩放，你可以通过使用 `Time.timeScale/Time.deltaTime` 轻松地将其考虑进去。


    `GUIText` 中的 `text` 变量是一个 `String` 变量，因此你需要通过调用数字的 `ToString` 函数将帧率值转换为 `String`（每个内置类型都有一个
    `ToString` 函数）。然后附加字符串 `"FPS"`，这样你就不会疑惑屏幕上那两个数字是什么了！


    ```

    #pragma strict

    function Update()

    {

    if (Time.deltaTime>0) {

    var fps:float = Time.timeScale/Time.deltaTime;

    guiText.text  = fps.ToString("f0")+"FPS";

    }

    }

    ```


