    the next chapter with animation and sound, but the major milestone you’ve reached
    at this point really is learning how to create, edit, and debug scripts. From
    now until the end of the book, you’ll be adding scripts, so get used to it!


    ### Unity Manual


    The “Building Scenes” section of the Unity Manual has two pages relevant to the
    work in this chapter—a description of prefabs in the “Prefabs” section and a good
    explanation in the “Component-Script Relationship” section.


    The one new type of asset introduced in this chapter (besides prefabs) is the
    script. The “Using Scripts” page in the “Asset Import and Creation” section introduces
    the basic concepts covered in the rotation script—creating a script, attaching
    it to a GameObject, printing to the Console view (using the print function instead
    of Debug.Log as you did), declaring a variable, and even applying a rotation in
    the Update function.


    It’s worth mentioning the “Transforms” page again since your rotation script is
    in the business of modifying Transform components. That page also describes the
    parent–child GameObject relationship, which technically is among transforms, but
    since there’s a one-to-one relationship between GameObjects and transforms, it’s
    less confusing to think of the linkage among GameObjects, as displayed in the
    Hierarchy view.


    We dipped into one advanced topic in this chapter—debugging. The “Debugging” section
    describes the Console view, the MonoDevelop debugger, and where to find log files
    on your file system.


    ### Scripting Reference


    I’ve mentioned two of the three main pieces of official Unity documentation so
    far—the Unity Manual and the Reference Manual. The third piece is the Scripting
    Reference . This chapter presented your first foray into scripting, so everything
    in the “Scripting Overview” section of the Scripting Reference is worth reading
    at this point. The “Runtime Classes” list illuminates the inheritance relationship
    among the Unity classes. After that, I recommend making frequent use of the search
    box on that page anytime you see anything in a script you don’t recognize (or
    even if you do recognize it, if you haven’t read its documentation).'
  trans: '

    ### 制作预制体


    预制体是一种特殊类型的资源，通过克隆一个 `GameObject` 创建。随后，该预制体可用于创建该 `GameObject` 的完全相同副本。从这个意义上说，Unity
    的预制体就像预制房屋，但更胜一筹。如果你对一个预制体实例进行了修改，这项修改可以自动传播到该预制体的所有其他实例。


    首先，为了遵循我们的资源组织方式，在项目视图中创建一个名为 `Prefabs` 的新文件夹。然后，选中 `Prefabs` 文件夹，在项目视图的“创建”（Create）菜单中点击
    `Prefab`，在该文件夹中创建一个空预制体。接着，你可以通过将层级视图中的立方体拖拽到这个空预制体上来填充它。或者，你也可以不创建空预制体，直接将立方体拖拽到
    `Prefabs` 文件夹中，这样系统会自动创建一个预制体，并以原始 `GameObject` 的名称命名（图 4-23）。


    ![A310332_2_En_4_Fig23_HTML.jpg](img/A310332_2_En_4_Fig23_HTML.jpg)


    图 4-23. 立方体预制体的项目视图


    现在，每当你想要创建一个与原始立方体 `GameObject` 外观相同的新立方体时，只需将预制体拖入层级视图即可。不过，与其在场景中放置多个独立的立方体，不如将一些立方体作为现有立方体的子对象。将预制体拖拽到层级视图中的立方体上两次，现在你将在“Cube”下看到两个新的立方体。在检视视图（图
    4-24）中，你可以看到新立方体与第一个立方体完全相同，具有相同的组件和组件属性。让我们将新立方体命名为 `child1` 和 `child2`（顺便提一下，现在是尝试使用检视视图锁定功能的好时机，这样你就可以同时检查两个
    `GameObject`）。


    ![A310332_2_En_4_Fig24_HTML.jpg](img/A310332_2_En_4_Fig24_HTML.jpg)


    图 4-24. 编辑子立方体


    作为父立方体的子对象，`child1` 和 `child2` 在检视视图中显示的位置是相对于其父对象 Cube 的位置。这意味着，如果某个子立方体的位置是
    `(0,0,0)`，那么它就与其父对象处于完全相同的位置。因此，让我们将 `child1` 和 `child2` 的位置分别设置为 `(2,0,0)` 和
    `(-2,0,0)`。现在，这两个子立方体与它们的父立方体像卫星一样间隔开来（图 4-25）。


    ![A310332_2_En_4_Fig25_HTML.jpg](img/A310332_2_En_4_Fig25_HTML.jpg)


    图 4-25. 立方体及其子立方体的场景视图


    在点击“播放”之前，将 `FuguRotate` 脚本修改为简单的 `transform.Rotate` 调用（清单 4-9）。现在当你点击“播放”时，主立方体会像之前一样旋转，而子立方体则像车轮的辐条一样跟随旋转。子立方体也会围绕自身的轴旋转，因为它们各自运行着自己的
    `FuguRotate` 脚本副本（如果你在 `Transform.Rotate` 调用中指定了 `Space.World`，那么所有三个立方体都会围绕同一个世界原点旋转）。


    ```

    #pragma strict

    var speed:float = 10.0; // 控制旋转速度

    function Start () {

    var object:GameObject = this.gameObject;

    Debug.Log("Start called on GameObject "+object.name);

    // 围绕物体的 y 轴旋转

    function Update () {

    //Debug.Log("Update called at time "+Time.time);

    transform.Rotate(Vector3.up*speed*Time.deltaTime);

    }

    清单 4-9.

    FuguRotate.js 恢复为在 Update 中进行旋转

    ```


    将 `child2` 的 `FuguRotate` 速度属性从 10 更改为 50，点击“播放”，你会看到那个立方体比其他立方体旋转得更快。你可以很容易地对
    `child1` 进行相同的更改，但想象一下，如果你有 50 个立方体需要更改，那将是多么繁琐！这就是预制体强大之处。选中 `child2`，然后在 GameObject
    菜单中调用 `Apply Changes To Prefab`（图 4-26）。


    ![A310332_2_En_4_Fig26_HTML.jpg](img/A310332_2_En_4_Fig26_HTML.jpg)


    图 4-26. 将更改应用到预制体


    现在 `child1` 再次变得与 `child2` 完全相同（除了名称和位置，Unity 合理地假设你并不希望这些在预制体的每个实例中保持一致）。点击“播放”后，子立方体现在都以相同的、更快的速度旋转。


    ### 断开预制体连接


    但主立方体也因更新后的旋转速度而旋转得更快。如果这不是你的本意，你可以将立方体的速度改回 10，然后为了确保子立方体的更改不会传播到主立方体，你可以选中主立方体，并在
    GameObject 菜单中调用 `Break Prefab Instance`（图 4-27）。


    ![A310332_2_En_4_Fig27_HTML.jpg](img/A310332_2_En_4_Fig27_HTML.jpg)


    图 4-27. 断开预制体实例连接


    现在，该立方体不再与预制体有关联，对子立方体的任何更改都不会传播到该立方体。


    ## 进一步探索


    这个场景仅通过添加简单的脚本化运动，就从精美静态演变为精美动态。你将在下一章通过动画和声音让场景更加生动，但到目前为止你达到的主要里程碑确实是学习了如何创建、编辑和调试脚本。从现在到本书结束，你将不断地添加脚本，所以要习惯它！


    ### Unity 手册


    Unity 手册的“构建场景”（Building Scenes）部分有两个与本章节工作相关的页面——在“预制体”（Prefabs）部分中对预制体的描述，以及在“组件-脚本关系”（Component-Script
    Relationship）部分中的详细解释。


    本章介绍的一种新资源类型（除了预制体）是脚本。“资源导入与创建”（Asset Import and Creation）部分中的“使用脚本”（Using Scripts）页面介绍了旋转脚本中所涵盖的基本概念——创建脚本，将其附加到
    `GameObject`，打印到控制台视图（使用 `print` 函数，而不是你使用的 `Debug.Log`），声明变量，甚至在 `Update` 函数中应用旋转。


    值得再次提及“变换”（Transforms）页面，因为你的旋转脚本就是用来修改 `Transform` 组件的。该页面还描述了父-子 `GameObject`
    关系，从技术上讲，这种关系存在于变换之间，但由于 `GameObject` 和变换之间存在一对一的关系，将这种联系理解为 `GameObject` 之间的链接（如层级视图中显示的那样）会更不容易混淆。


    本章我们触及了一个高级主题——调试。“调试”（Debugging）部分描述了控制台视图、MonoDevelop 调试器，以及在文件系统上查找日志文件的位置。


    ### 脚本参考


    到目前为止，我已经提到了 Unity 官方文档的三个主要部分中的两个——Unity 手册和参考手册。第三部分是脚本参考。本章是你首次涉足脚本编程，因此，脚本参考中的“脚本概述”（Scripting
    Overview）部分中的所有内容此时都值得一读。“运行时类”（Runtime Classes）列表阐明了 Unity 类之间的继承关系。在此之后，我建议，无论何时你在脚本中看到任何你不认识的内容（或者即使你认识，但尚未阅读其文档），都经常使用该页面上的搜索框。'
- fmt: '### Scripting


    Although you’re working only with JavaScript in this book, there’s enough JavaScript
    and C# out in the Unity world that you should get comfortable with both. The book
    *Head First C#* by Andrew Stellman and Jennifer Greene is a great visual step-by-step
    introduction to C#.


    And since C# was created by Microsoft as part of its .NET Framework, the official
    C# documentation and other resources can be found by searching for C# on the Microsoft
    Developer Network (MSDN) at [`http://msdn.microsoft.com/`](http://msdn.microsoft.com/).


    While you’re on MSDN, search also for .NET documentation, as the Unity scripting
    engine is implemented with Mono, which is an open source version of .NET. The
    official Mono web site is at [`http://mono-project.org/`](http://mono-project.org/).


    Put two programmers together in a room, and if there’s anything they’ll fight
    about, it’s coding conventions. My rule of thumb is to go along with the convention
    of the official language and framework that I’m coding in. It’s a dull topic with
    fun names.


    For example, Unity uses a combination of camel case and Pascal case in its capitalization
    rules (or `camelCase` and `PascalCase`, if you apply the conventions to themselves).
    You can look up camel case on Wikipedia.


    Bracket placement is also a common source of contention. The convention I use
    here (and used by Unity, at least when creating the template for new scripts)
    is called Egyptian style, according to Jeff Atwood (of Stack Exchange fame) on
    his popular blog Coding Horror ( [`www.codinghorror.com/blog/2012/07/new-programming-jargon.html`](http://www.codinghorror.com/blog/2012/07/new-programming-jargon.html)
    ). The article also terms the practice of applying a standard prefix to class
    names smurf naming.


    # 5. Let’s Dance! Animation and Sound


    Of the three ways to move GameObjects in Unity, scripted control of the Transform
    component was covered in the previous chapter, and physics will play a significant
    role in the bowling game example initiated in the next chapter. Scripted movement
    is ubiquitous. For example, even in the upcoming bowling game, which relies heavily
    on physics to control and simulate the bowling ball and its collision with the
    floor and bowling pins, the camera-following behavior is implemented by a script
    that modifies its Transform component (much like the script used in the cube scene).
    Not only that, every moving GameObject is reset between rolls and frames by restoring
    the values in its Transform component.


    Before proceeding to that bowling game, you’ll spend a little more time in this
    chapter building on the cube scene constructed so far, enhancing it with a dancing
    character animation to get a feel for Unity’s animation support. And it wouldn’t
    be a dance demo without music, so the scene will incorporate looping sound. It
    will still be a nonphysical and only mildly interactive scene, but ideally it
    will provide a pretty and entertaining way to introduce Unity’s animation and
    audio support before delving into a lot of physics (a big topic, spanning two
    chapters) and even more scripting (a bigger topic, spanning the rest of this book).


    Quality animations, particularly character animations, are not easy to create
    if you’re not a professional. The same goes for music. Fortunately, there are
    plenty of music and character animation packs on the Unity Asset Store, many of
    them free, including the Skeletons Pack and General Music Set used in this chapter.
    Those assets are not included in the corresponding project on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739),
    but that project can be used as a starting point if you’re just jumping in at
    this point and don’t have the cube scene constructed from the previous chapter.


    ## Import the Skeletons Pack


    Search the Asset Store from within the Asset Store window. Type `skeleton` in
    the search field and select Free, and several skeleton asset packs show up in
    the search results (Figure [5-1](#A310332_2_En_5_Chapter.html#Fig1)).


    ![A310332_2_En_5_Fig1_HTML.jpg](Images/A310332_2_En_5_Fig1_HTML.jpg)


    Figure 5-1. The Project view search results for the Skeletons Pack


    Select the skeleton asset and confirm in the Inspector view that the package is
    indeed the Skeletons Pack (Figure [5-2](#A310332_2_En_5_Chapter.html#Fig2)).


    ![A310332_2_En_5_Fig2_HTML.jpg](Images/A310332_2_En_5_Fig2_HTML.jpg)


    Figure 5-2. The Import Unity Package view of the Skeletons Pack


    The installation will add a `SkeletonData` folder in the Project view (Figure
    [5-3](#A310332_2_En_5_Chapter.html#Fig3)) and some prefabs in the `prefabs` folder.


    ![A310332_2_En_5_Fig3_HTML.jpg](Images/A310332_2_En_5_Fig3_HTML.jpg)


    Figure 5-3. The Project view of the Skeletons Pack prefabs


    ## Add a Skeleton


    The four prefabs installed by the Skeletons Pack all have the same skeleton but
    sport different gear, such as a sword and shield. However, it turns out the prefabs
    with armed skeletons look like they’re chopping their own limbs off when dancing,
    so let’s just stick with the `skeletonNormal` prefab, which has just the bare-bones
    (ha!) skeleton. Add an instance of the `skeletonNormal` prefab to the scene by
    dragging that prefab into the Hierarchy view (Figure [5-4](#A310332_2_En_5_Chapter.html#Fig4)).
    The `skeletonNormal` GameObject has an Animation component that references the
    animation data of the skeleton. `skeletonNormal` also has two child GameObjects.
    One, named `Bip01`, is actually a hierarchy of GameObjects that represents the
    bones of the skeleton. As the skeleton moves, so does the arm, and any hand movement
    is relative to the arm, and so on. The skeleton hierarchy is reminiscent of the
    "Dem Bones" song—"The thigh bone’s connected to the hip bone…."


    ![A310332_2_En_5_Fig4_HTML.jpg](Images/A310332_2_En_5_Fig4_HTML.jpg)


    Figure 5-4. Hierarchy view with the skeletonNormal asset


    The other child GameObject, `skeleton`, is a GameObject with a `SkinnedMeshRenderer`
    component, like the `MeshRenderer` component that is a subclass of `Renderer`.
    However, `SkinnedMeshRenderer` renders the mesh that wraps around the skeleton
    and follows its joints as they move. The mesh essentially forms the skin around
    a skeleton, so the process of mapping such a mesh to a skeleton is often called
    *skinning*.


    The `skeletonNormal` prefab also contains a couple of particle effects, implemented
    by GameObjects with `ParticleEmitter` components. Particle effects consist of
    many tiny animated primitives and are great for creating flames, explosions, smoke,
    or any kind of sparkly effects.


    > **Note:** The particle effects included in the Skeletons Pack work with Unity’s
    Legacy particle system, not the newer Shuriken particle system introduced in Unity
    3.5. The Legacy system uses the `ParticleEmitter` component, while Shuriken uses
    the `ParticleSystem` component.'
