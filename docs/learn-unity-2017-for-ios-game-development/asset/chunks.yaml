- fmt: '### Navigate the Scene


    If you’re not familiar with working in 3D space, it’s a straightforward extension
    from working in 2D. Instead of just working in a space with `x` and `y` axes and
    `(x, y)` coordinates, in 3D space, you have an additional `z` axis and `(x, y,
    z)` coordinates. The `x` and `z` axes define the ground plane and `y` is pointing
    up (you can think of `y` as height).


    > **Note:** Some 3D applications and game engines use the `z` axis for height
    and the `x` and `y` axes for the ground plane, so when importing assets you might
    have to adjust (rotate) them.


    The viewpoint in 3D space is usually called the camera. Clicking the `x`, `y`,
    and `z` arrows of the multicolored **Scene Gizmo** in the upper right corner is
    a quick way of flipping the camera so that it faces along the respective axis.
    For example, clicking the `y` arrow gives you a top-down view of the scene (Figure
    2-38), and the text under the **Scene Gizmo** says “Top.”


    The camera here is not the same as the `Camera` GameObject in the scene that is
    used during the game, so you don’t have to worry about messing up the game while
    you’re looking around in the **Scene View**.


    ![A310332_2_En_2_Fig38_HTML.jpg](Images/A310332_2_En_2_Fig38_HTML.jpg)


    *Figure 2-38.* A side view in the **Scene View**


    Clicking the box in the center of the **Scene Gizmo** toggles the camera projection
    between perspective, which renders objects smaller as they recede in the distance,
    and orthographic, which renders everything at their original size whether they
    are close or far. Perspective is more realistic and what you normally use in games,
    but orthographic is often more convenient when designing (hence its ubiquity in
    computer-aided design applications). The little graphic preceding the text under
    the **Scene Gizmo** indicates the current projection.


    You can zoom in and out using the mouse scroll wheel or by selecting the `Hand`
    tool in the upper right toolbar of the **Editor** window and click-dragging the
    mouse while holding the `Control` key down. When the `Hand` tool is selected,
    you can also move the camera by click-dragging the view, and you can rotate (orbit)
    the camera by dragging the mouse while holding the `Option` (or `Alt`) key down,
    so you’re not restricted to just the axis camera angles, like in Figure 2-39.


    ![A310332_2_En_2_Fig39_HTML.jpg](Images/A310332_2_En_2_Fig39_HTML.jpg)


    *Figure 2-39.* A tilted perspective in the **Scene View**


    Notice that when you’re looking from an arbitrary angle, the text under the **Scene
    Gizmo** says `Persp` or `Iso`, depending on whether you’re using perspective or
    orthographic projection (`Iso` is short for isometric, which is the tilted orthographic
    view common in games like *Starcraft* and *Farmville*).


    The other buttons on the toolbar activate modes for moving, rotating, and scaling
    GameObjects. There’s no reason to change the `Climber` scene, so those modes will
    be explained in more detail when you start creating new projects.


    > **Tip:** If you accidentally make a change to the scene, you can select **Undo**
    from the **Edit** menu. If you made a lot of changes you don’t want to keep, you
    can just decline to save this scene when you switch to another scene or exit Unity.
    In the meantime, note that you can still move the camera while in those modes,
    using alternate keyboard and mouse combinations. Table 2-1 lists all the possible
    options.


    *Table 2-1.* Available **Scene View** Camera Controls


    | Action | `Hand` tool | 1-button mouse or trackpad | 2-button mouse | 3-button
    mouse |

    | --- | --- | --- | --- | --- |

    | Move | Click-drag | Hold `Alt-Command` and click-drag | Hold `Alt-Control` and
    click-drag | Hold `Alt` and middle click-drag |

    | Orbit | Hold `Alt` and click-drag | Hold `Alt` and click-drag | Hold `Alt` and
    click-drag | Hold `Alt` and click-drag |

    | Zoom | Hold `Control` and click-drag | Hold `Control` and click-drag or two-finger
    swipe | Hold `Alt` and right-click-drag | Hold `Alt` and right-click drag or scroll
    wheel |


    There are a couple of other handy keyboard-based scene navigation features. Pressing
    the `Arrow` keys will move the camera forward, back, left, and right along the
    `x–z` plane (the ground plane). And holding the right mouse button down allows
    navigation of the scene as in a first-person game. The `AWSD` keys move left,
    forward, right, and back, respectively, and moving the mouse controls where the
    camera (viewpoint) looks.


    When you want to look at a particular GameObject in the **Scene View**, sometimes
    the quickest way to do that is to select the GameObject in the **Hierarchy** view,
    then use the **Frame Selected** menu item in the **Edit** menu (note the handy
    shortcut key `F`). In Figure 2-40, I clicked on the `x` axis of the **Scene Gizmo**
    to get a horizontal view, then selected the `Player` GameObject in the **Hierarchy
    View**, and pressed the `F` key (shortcut for **Frame Selected** in the **Edit**
    menu) to zoom in on and center the player in the **Scene View**.


    You can also select a GameObject directly in the **Scene View**, but you have
    to exit the `Hand` tool first. Just as selecting a GameObject in the **Hierarchy
    View** will result in that selection displaying in the **Scene View** and **Inspector
    View**, selecting a GameObject in the **Scene View** will likewise display that
    selection in the **Inspector View** and display it as the selected GameObject
    back in the **Hierarchy** view. In Figure 2-40, after I invoke **Frame Selected**
    on the `Player`, I clicked the `Move` tool (the button directly right of the `Hand`
    tool button in the top right corner of the **Editor** window) and then clicked
    a GameObject near the `Player` in the **Scene View**. The **Hierarchy View** automatically
    updates to show that GameObject is selected, and the GameObject is also displayed
    in the **Inspector View**.


    ![A310332_2_En_2_Fig40_HTML.jpg](Images/A310332_2_En_2_Fig40_HTML.jpg)


    *Figure 2-40.* Selecting a GameObject in the **Scene View**


    ### Scene View Options


    The buttons lining the top of the **Scene View** provide display options to assist
    in your game development. Each button configures a view mode.


    The leftmost button sets the **Draw mode**. Normally, this mode is set to `Textured`,
    but if you want to see all the polygons, you can set it to `Wireframe`. Because
    `Climber` is a 2D Game, the `Wireframe` view will not show much relevant information
    (Figure 2-41).


    ![A310332_2_En_2_Fig41_HTML.jpg](Images/A310332_2_En_2_Fig41_HTML.jpg)


    *Figure 2-41.* `Wireframe` display in the **Scene** view


    The next button sets the **Render Paths**, which controls whether the scene is
    colored normally or for diagnostics.


    The three buttons to the right of the **Render Paths** mode button are simple
    toggle buttons. They each pop up some mouse-over documentation (otherwise known
    as tooltips) when you let the mouse hover over them.


    The first of those controls the **Scene Lighting** mode. This toggles between
    using a default lighting scheme in the **Scene View** or the actual lights you’ve
    placed in the game.


    The middle button toggles the **Game Overlay** mode, whether the sky, lens flare,
    and fog effects are visible.


    And finally, there is the **Audition Mode**, which toggles sound on and off.'
