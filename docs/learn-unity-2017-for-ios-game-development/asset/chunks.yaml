    ## 优化设置


    正确的优化方法是，从最大的瓶颈开始，有条不紊地逐一排查，在每个阶段分析改进效果，直到达到目标。但为了在本章中介绍一系列优化步骤，我们将按顺序依次进行多项优化。


    ### 质量设置


    首先，调整与优化工作相关的全局设置。最可能影响性能的设置是质量设置，它控制游戏的视觉质量（图[14-17](#A310332_2_En_14_Chapter.html#Fig17)）。


    ![A310332_2_En_14_Fig17_HTML.jpg](Images/A310332_2_En_14_Fig17_HTML.jpg)


    图 14-17. 优化质量设置


    目标是追求速度，因此将当前 iOS 质量设置为`Fastest`，然后在此基础上进行调整。零像素光源对于当前光照设置来说是可以接受的。如果你使用了聚光灯，那么缺少像素光源会很明显。


    然而，你并不希望强制将所有纹理降为半分辨率。依靠纹理导入设置来逐案限制分辨率会带来更大的灵活性。因此，将纹理质量设置为`Full Res`。


    类似地，你还需要将各向异性纹理的设置从`none`改为`per-texture`。各向异性纹理用于补偿倾斜观看时的视觉效果，例如，适用于赛车游戏中道路纹理。与纹理分辨率一样，各向异性可以在其导入设置中针对单个纹理进行调整。


    多重采样抗锯齿（全屏平滑）是一项开销较大的操作，正如你所预期的，这是全屏逐像素操作。


    本游戏中没有粒子系统，因此软粒子设置无关紧要，但它同样是一项像素密集型操作（这类功能通常被称为受限于填充率）。


    阴影已被禁用，因此其下方的所有阴影参数都无关紧要。但如果启用了阴影，两个关键属性是阴影分辨率和阴影距离。这两个属性都会影响阴影的分辨率；提高阴影分辨率自然会使阴影轮廓更清晰，但代价是更大的阴影贴图会消耗更多内存。与缩短相机视锥体以提高深度缓冲区精度类似，更小的阴影距离值减少了对大型阴影贴图纹理的需求。降低阴影分辨率值可以节省空间，但会使阴影边缘更锯齿化；而减小阴影距离值可能会减少参与阴影计算的物体数量。


    ### 物理管理器


    刚体组件在静止时会进入休眠状态，以避免不必要的物理计算。“静止”意味着刚体的平移和旋转运动已停止。你可以在物理管理器（图[14-18](#A310332_2_En_14_Chapter.html#Fig18)）中指定休眠速度和休眠角速度的阈值。物理管理器位于编辑菜单的设置部分。


    ![A310332_2_En_14_Fig18_HTML.jpg](Images/A310332_2_En_14_Fig18_HTML.jpg)


    图 14-18. 优化物理管理器


    在物理管理器的底部，你还可以指定哪些游戏对象层可以相互碰撞。这对于你的保龄球游戏来说无关紧要，因为所有碰撞物体都位于默认层。但为了说明这一点，让我们修改碰撞表，只允许默认层中的游戏对象与默认层中的其他游戏对象发生碰撞。


    ### 时间管理器


    由于物理更新以固定间隔进行，你可以通过增加时间管理器中的固定时间步长来减少物理计算时间（图[14-19](#A310332_2_En_14_Chapter.html#Fig19)）。理想情况下，固定时间步长应尽可能设置得高，同时不影响物理模拟效果。现在，我们将固定时间步长从`0.02`增加到`0.03`。


    ![A310332_2_En_14_Fig19_HTML.jpg](Images/A310332_2_En_14_Fig19_HTML.jpg)


    图 14-19. 优化时间管理器


    紧邻固定时间步长下方的属性也与物理更新相关：最大允许时间步长。该值限制了每帧用于物理更新的最大时间量。这可以防止出现失控情况，即固定更新占用大量时间并增加帧时间，从而导致下一帧包含更多固定更新，以此类推。降低最大允许时间步长值可以最小化固定更新对帧时间的影响，但存在降低物理模拟质量的风险。


    ### 音频管理器


    音频播放方式也存在优化权衡。在音频管理器（图[14-20](#A310332_2_En_14_Chapter.html#Fig20)）中，你可以指定音频延迟，即播放声音前允许的延迟时间。


    ![A310332_2_En_14_Fig20_HTML.jpg](Images/A310332_2_En_14_Fig20_HTML.jpg)


    图 14-20. 优化音频管理器


    对于响应式声音至关重要的游戏（例如保龄球游戏中的碰撞声音），选择“最佳延迟”（即最低延迟）是合适的。


    ### 其他设置


    其他设置部分包含大量优化选项；它们并不仅限于优化部分（图[14-21](#A310332_2_En_14_Chapter.html#Fig21)）。


    ![A310332_2_En_14_Fig21_HTML.jpg](Images/A310332_2_En_14_Fig21_HTML.jpg)


    图 14-21. 优化播放器设置中的其他设置


    #### 静态批处理


    正如在首次分析环节中指出的，绘制调用通常对性能有较大影响。静态批处理通过在构建时合并网格来减少绘制调用，这些网格可以在同一个绘制调用中一起渲染。为了合并网格，它们的游戏对象必须在检查器视图中标记为静态，并且必须共享相同的材质或材质集合。


    静态批处理是一个灵活的系统；它会记住每个游戏对象的独特标识，因此，具有静态批处理网格的游戏对象仍可以随时停用，并且仍然受剔除机制影响。


    你的保龄球游戏只有一个静态网格，即地面，因此启用静态批处理在此处不会有任何效果。通常，静态批处理能带来良好的性能提升，但代价是占用更多内存，因为它本质上会复制每个被批处理的网格。


    #### 动态批处理


    下一个选项是动态批处理，它在运行时进行。与静态批处理一样，它要求网格在合并前共享材质，但动态批处理可以处理移动物体，因为它每帧都会检查是否需要重新批处理物体。例如，游戏中的保龄球瓶可以被批处理，因为它们显然都使用相同的材质，毕竟它们都是由同一个预制体实例化而来。然而，保龄球无法与任何球瓶或球道表面进行批处理。


    批处理确实需要一些时间，因此它会出现在内置分析器中。但与静态批处理一样，它通常对性能有显著提升。


    #### 加速度计频率


    加速度计频率默认设置为每秒 60 个样本。通过将该频率降低到`15`，可以节省一些处理时间，这对于你的摇动检测代码已经足够。如果在应用中完全不使用加速度计，请将其设置为`0`。'
  raw: 'Now attach the script to the FPS GameObject. When you click Play in the Editor,
    you should see the frame rate display flicker among different numbers. And when
    you perform a Build and Run operation to a test device, you should see the frame
    rate display correspond to the numbers you got in the built-in profiler (Figure
    [14-16](#A310332_2_En_14_Chapter.html#Fig16)).


    ![A310332_2_En_14_Fig16_HTML.jpg](Images/A310332_2_En_14_Fig16_HTML.jpg)


    Figure 14-16.


    A frame rate display running on a test device


    Just remember, you should deactivate the FPS GameObject before you release this
    app!


    ## Optimize Settings


    The proper way to optimize is to methodically go through the bottlenecks starting
    with the largest, profiling the improvements at each stage until you achieve your
    target. But for the purposes of getting through a number of optimization procedures
    in this chapter, you’ll plow through a bunch of them in sequence.


    ### Quality Settings


    Let’s start by tweaking the global settings that relate to your optimization effort.
    The settings that are most likely to affect performance are the quality settings,
    which control the visual quality of the game (Figure [14-17](#A310332_2_En_14_Chapter.html#Fig17)).


    ![A310332_2_En_14_Fig17_HTML.jpg](Images/A310332_2_En_14_Fig17_HTML.jpg)


    Figure 14-17.


    Optimizing the quality settings


    You’re going for speed, so set the current iOS quality to Fastest and then adjust
    the settings from there. Zero pixel lights is fine for the lighting setup. If
    you had a spotlight, then the lack of a pixel light would be obvious.


    You don’t want to force all textures to half-resolution, though. Relying on the
    Texture Import settings to limit the resolution on a case-by-case basis gives
    you more flexibility. So, let’s set Texture Quality to Full Res.


    Similarly, you’ll want to change the setting for Anisotropic Textures from none
    to per-texture. Anisotropic Textures are textures that compensate for being viewed
    at an angle, which is appropriate for a texture used for a road in a racing game,
    for example. Like texture resolution, anisotropy can be adjusted for a texture
    in its import settings.


    Multisample Anti Aliasing (full-screen smoothing) is an expensive operation, as
    you would expect a full-screen per-pixel operation would be.


    You don’t have any particle systems in this game, so the Soft Particles setting
    doesn’t matter, but it’s another pixel-dominated operation (these types of features
    are often called fill-rate limited).


    Shadows are disabled, so all the shadow parameters below it are irrelevant, but
    if shadows were enabled, the two key properties are Shadow Resolution and Shadow
    Distance. Both properties affect the shadow’s resolution; increasing the Shadow
    Resolution naturally allows for a more sharply defined shadow at the expense of
    more memory consumed for a larger shadow map, and much like the improved depth
    buffer precision of a shortened camera frustum, a shorter Shadow Distance value
    reduces the need for a large shadow map texture. Reducing the Shadow Resolution
    value saves space while introducing more jaggy shadows, while reducing the Shadow
    Distance value potentially reduces the number of objects involved in the shadows.


    ### Physics Manager


    Rigidbody components go to sleep when they’re at rest to avoid unnecessary physics
    computation. “At rest” means the Rigidbody’s motion has stopped moving and rotating.
    You can specify the threshold for Sleep Velocity and Sleep Angular Velocity in
    the Physics Manager (Figure [14-18](#A310332_2_En_14_Chapter.html#Fig18)), available
    under the Settings portion of the Edit menu.


    ![A310332_2_En_14_Fig18_HTML.jpg](Images/A310332_2_En_14_Fig18_HTML.jpg)


    Figure 14-18.


    Optimizing the PhysicsManager


    At the bottom of the Physics Manager, you can also specify which layers of GameObjects
    can collide with one another. This doesn’t make a difference with your bowling
    game because all of your colliding objects are in the Default layer. But to demonstrate
    this point, let’s modify the collision table to only allow GameObjects in the
    Default layer to collide with other GameObjects in the Default layer.


    ### Time Manager


    Because the physics updates take place at fixed intervals, you can reduce physics
    computation time by increasing the fixed timestep in the Time Manager (Figure
    [14-19](#A310332_2_En_14_Chapter.html#Fig19)). Ideally, the fixed timestep should
    be set as high as possible without degrading the physics simulation. For now,
    you’ll increase the fixed timestep from 0.02 to 0.03.


    ![A310332_2_En_14_Fig19_HTML.jpg](Images/A310332_2_En_14_Fig19_HTML.jpg)


    Figure 14-19.


    Optimizing the Time Manager


    The property immediately below Fixed Timestep is also related to physics updates:
    Maximum Allowed Timestep. This value caps how much time can be spent on physics
    updates in each frame. This prevents the runaway situation where the fixed updates
    take up a lot of time and increase the frametime, thus including more fixed updates
    in the next frame and so on. Lowering the Maximum Allowed Timestep value minimizes
    the Fixed Update impact on the frametime but risks degrading the physics simulation.


    ### Audio Manager


    There is also an optimization trade-off in how the audio is played. In the Audio
    Manager (Figure [14-20](#A310332_2_En_14_Chapter.html#Fig20)), you can specify
    the audio latency, which is how much delay is allowed before the sound is played.


    ![A310332_2_En_14_Fig20_HTML.jpg](Images/A310332_2_En_14_Fig20_HTML.jpg)


    Figure 14-20.


    Optimizing the Audio Manager


    For games where responsive sound is important (e.g., the collision sounds in your
    bowling game), selecting “Best latency” (i.e., the lowest latency) is appropriate.


    The Other Settings section is filled with optimization options; they’re not just
    in the Optimization portion (Figure [14-21](#A310332_2_En_14_Chapter.html#Fig21)).


    ![A310332_2_En_14_Fig21_HTML.jpg](Images/A310332_2_En_14_Fig21_HTML.jpg)


    Figure 14-21.


    Optimizing other settings in player settings


    #### Static Batching


    As I pointed out in the first profiling session, draw calls tend to have a big
    impact on performance. Static batching reduces draw calls by combining meshes
    at build time that can be rendered together in the same draw call. For meshes
    to be combined, their GameObjects must be marked as static in the Inspector view,
    and they must share the same material or set of materials.


    Static batching is a flexible system; it remembers the distinct identity of each
    GameObject, so a GameObject with a statically batched mesh can still be deactivated
    at will and is still subject to culling.


    Your bowling game has only one static mesh, the floor, so enabling static batching
    won’t make any difference here. In general, static batching provides a good performance
    boost but at the expense of taking up more memory because it essentially copies
    each batched mesh .


    #### Dynamic Batching


    The next option, dynamic batching, takes place at runtime. Like static batching,
    it requires meshes to share materials before they can be combined, but dynamic
    batching can handle moving objects because it checks every frame if it needs to
    rebatch objects. For example, the bowling pins in your game can be batched because
    they all obviously have the same material. They were instantiated from the same
    prefab, after all. However, the bowling ball cannot be batched with any of the
    pins or the bowling surface.


    Batching does take some time, which is why it shows up in the built-in profiler,
    but, like static batching, it generally is a big win for performance.


    #### Accelerometer Frequency


    Accelerometer Frequency is set to 60 samples per second by default. You can save
    some processing time by lowering that frequency to 15, which is sufficient for
    your shake detection code. If you don’t use the accelerometer at all in an app,
    set it to 0.'
