  trans: '

    # 8. 开始游戏！为游戏编写脚本


    你的保龄球游戏在前几章中逐渐成形，现在开始有模有样了！游戏包含了保龄球、球瓶（更准确地说，是上一章添加的木桶）、游戏操作和物理效果。但缺少游戏规则和计分系统，它依然更像一个玩具而非真正的游戏。本章将通过大量的脚本来解决这个问题。大部分工作将在游戏控制器脚本
    `FuguBowlPlayer.js` 中完成，该脚本将包含完整的保龄球游戏逻辑，并以有限状态机（FSM）的状态形式呈现。计分规则比较复杂，因此这些规则将被封装在名为
    `FuguBowlPlayer.js` 的脚本中。


    好消息是，本章除了 `FuguBowlPlayer` 脚本之外，不需要添加任何新资源。坏消息是，需要输入大量新代码，特别是游戏控制器脚本。虽然你可能会想直接从本书项目网站上（[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)）复制本章在线版本的
    `FuguBowl` 脚本，但如果你能从头开始、逐块构建（对于 FSM 而言，是逐个状态构建），会更容易掌握为未来项目实现游戏逻辑的方法。新的 `FuguBowlPlayer`
    脚本也是如此。


    ## 游戏规则


    让我们快速回顾一下保龄球的规则。一局游戏包含十个回合。在每个回合中，你有两次投球机会来击倒全部十个球瓶。如果第一次投球就击倒了全部十个球瓶，这称为“全中”（strike），然后进入下一回合。如果两次投球才击倒全部十个球瓶，这称为“补中”（spare）。在第十个回合，如果你获得了补中或全中，将获得一次额外的第三次（也是最后一次）投球机会。游戏的最终得分是每个回合得分的总和。每个回合的得分是该回合击倒的球瓶数，除非该回合是全中或补中。如果是补中，得分是击倒的球瓶数（十个）加上下一次投球击倒的球瓶数。如果是全中，得分同样是十个，但要加上接下来两次投球击倒的球瓶数。因此，一场“完美”的比赛，即连续
    12 次全中，最终得分为 300 分（这个计算留作练习）。


    ## 游戏计分


    `FuguBowl` 脚本已经定义了一个代表游戏的类，但将计分代码封装在玩家类中是有意义的，因为从概念上讲，存在一个玩家（虽然本游戏中只有一个，但潜在可能有多个），并且得分与玩家相关联。


    此外，保龄球的计分规则并不简单。将保龄球得分计算的代码放在一个独立的脚本中，不仅能让游戏控制器脚本更简洁易读，还能使计分代码在其他保龄球游戏中得以复用。


    首先，创建一个新的 JavaScript 文件，命名为 `FuguBowlPlayer`，并将其放在 Scripts 文件夹中（图 8-1）。


    ![A310332_2_En_8_Fig1_HTML.jpg](img/A310332_2_En_8_Fig1_HTML.jpg)


    **图 8-1.** 创建 `FuguBowlPlayer` 脚本


    ### 单回合得分


    在 `FuguBowlPlayer` 脚本中，在实现 `FuguBowlPlayer` 类之前，我们先从一个名为 `FuguBowlScore` 的支持类开始，它代表单个保龄球回合的得分（清单
    8-1）。这个类很小，并且本身不是一个 `MonoBehavior`（例如，没有 `Start` 或 `Update` 回调），因此直接将其添加到 `FuguBowlPlayer`
    脚本中即可。


    ```

    class FuguBowlScore {

    var ball1:int; // 第一次投球击倒的球瓶数

    var ball2:int; // 第二次投球击倒的球瓶数

    var ball3:int; // 第三次投球击倒的球瓶数

    var total:int; // 该回合的总得分（可能包含后续投球的加分）

    function Clear() {

    ball1 = -1;

    ball2 = -1;

    ball3 = -1;

    total = -1;

    }

    function IsSpare():boolean {

    // 不考虑第三次投球构成的补中

    return !IsStrike() &&

    (ball1 + ball2 == 10);

    }

    function IsStrike():boolean {

    return ball1 == 10;

    }

    }

    **清单 8-1.** `FuguBowlPlayer.js` 中的 `FuguBowlScore` 类

    ```


    `FuguBowlScore` 类很简单，不继承自任何其他类（它可以被定义为 `struct` 而不是 `class`，只是 JavaScript 不支持定义新的
    `struct`）。该类包含实例变量，分别表示第一次投球、第二次投球以及（仅在第 10 回合相关的）奖励球的得分。`FuguBowlScore` 还有一个变量用于保存该回合的总得分，如果当前回合是补中或全中，则该得分可能取决于后续投球的结果。


    每个变量都需要一种方式来表明其得分尚未计算。在对应球被投出之前，`ball1`、`ball2` 和 `ball3` 的得分是不可用的。总得分在该回合投球完成之后才可用，即使如此，如果结果是补中或全中，仍然需要等到后续一次或两次投球后才能计算出得分。


    将得分值保留为零是行不通的，因为当玩家没有击倒任何球瓶时，零是一个有效得分。但投球不可能产生负分，因此 -1 可以很好地作为得分尚未计算的指示符。`FuguBowlScore`
    中的 `Clear` 函数通过将所有变量设置为此数值来初始化该回合。


    除了 `Clear` 函数，`FuguBowlScore` 类还有另外两个成员函数。如果该回合投出了全中，`IsStrike` 返回 `true`。这可以通过检查第一次投球击倒的球瓶数是否为十来轻松判断。`IsSpare`
    函数稍复杂一点；如果第一次和第二次投球击倒的球瓶数之和为十，且该回合不是全中（换句话说，你并非第一次投球击中十瓶而第二次击中零瓶），则返回 `true`。


    请注意两个函数声明中添加的 `:boolean`。这明确了每个函数返回一个布尔值，尽管编译器可以从代码中推断出返回类型。'
- fmt: '### The Player Score


    With the `FuguBowlScore` class defined, now you’re ready to add the `FuguBowlPlayer`
    class, which will aggregate the frame scores for the total game score (Listing
    [8-2](#A310332_2_En_8_Chapter.html#Par15)). As with `FuguBowlScore`, the `FuguBowlPlayer`
    class is declared explicitly, even though it has the same name as the script file,
    and it doesn’t inherit from `MonoBehaviour` (otherwise the class declaration would
    include “extends MonoBehaviour”). Besides not having any Unity callback functions,
    this means the `FuguBowlPlayer` class is not a subclass of `Component` and therefore
    the script can’t be attached to a `GameObject`. In other words, the `FuguBowlPlayer`
    script acts as a code library containing classes used by other scripts.


    ```

    class FuguBowlPlayer {

    var scores:FuguBowlScore[]; // all 10 frames of the game

    // constructor

    function FuguBowlPlayer() {

    scores = new FuguBowlScore[10];

    for (var i:int=0; i<scores.length; ++i) {

    scores[i] = new FuguBowlScore();

    }

    ClearScore();

    }

    // reset the score for all frames

    function ClearScore() {

    for (var score:FuguBowlScore in scores) {

    score.Clear();

    }

    }

    Listing 8-2.

    The Beginnings of the FuguBowlPlayer Class in FuguBowlPlayer.js

    ```


    The `FuguBowlPlayer` class naturally contains information about the player, and,
    for example, could have a `String` variable for the player’s name. However, for
    the purposes of this book, you’ll confine yourself to tracking the player’s bowling
    score. Therefore, the class has just one instance variable, `scores`, which is
    a built-in array of `FuguBowlScore` objects. Each `FuguBowlScore` element in the
    array represents the score for one frame of the bowling game.


    **Note**


    Built-in arrays are accessed with indices just like instances of the `Array` class
    (used for the `pins` variable in `FuguBowl.js`). Built-in arrays have much faster
    access than instances of `Array` and can be edited in the Inspector view when
    declared as public variables. However, built-in arrays, unlike instances of `Array`,
    are not resizable at runtime.


    The function `FuguBowlPlayer` within the class definition has the same name as
    the class, which means it’s a constructor, a special function called when an instance
    of this class is created. An explicitly defined constructor isn’t always necessary
    (`FuguBowlScore` doesn’t have one), and it is even prohibited within `MonoBehaviour`.
    But a constructor is warranted in this case because each newly created `FuguBowlPlayer`
    needs to have its `scores` array also created. So, the `FuguBowlPlayer` constructor
    creates a built-in array of ten entries, declared to be of type `FuguBowlScore`,
    and fills the array with newly created `FuguBowlScore` instances.


    The constructor also calls a function `ClearScore`, which in turn calls `Clear`
    on each of the `FuguBowlScore` objects, ensuring they all start out indicating
    no score has been registered. The `FuguBowlPlayer` class also has `IsSpare` and
    `IsStrike` functions that call the same-named functions on the specified `FuguBowlScore`
    object, indexed in the `scores` array by the argument passed in. Since array indices
    begin at zero, the ten frames of a game are represented by the indices 0 to 9.


    **Note**


    In a sense, the `FuguBowlPlayer` class acts as a wrapper around the `FuguBowlScore`
    class so that other scripts need only know about the `FuguBowlPlayer` class. As
    an exercise in polish, you could provide more abstraction by having `IsSpare`
    and `IsStrike` accept frame indices in the range 1 to 10 and then subtract 1 before
    using them as array indices.


    ### Setting the Score


    As the game progresses, the score has to be updated after each roll of the ball.
    Let’s plan on adding functions named `SetBall1Score`, `SetBall2Score`, and `SetBall3Score`
    (for the tenth frame) to the `FuguBowlPlayer` class. Like the `IsSpare` and `IsStrike`
    functions in that class, the additional functions will take a frame index as an
    argument.


    The score for each roll of the ball potentially updates the total score for a
    previous frame if it had a strike or spare. So, first you’ll need functions to
    perform those updates in the `FuguBowlPlayer` class, named `SetSpareScore` (Listing
    [8-3](#A310332_2_En_8_Chapter.html#Par24)) and `SetStrikeScore` (Listing [8-4](#A310332_2_En_8_Chapter.html#Par26)).


    The `SetSpareScore` function sets the total score to the sum of the first and
    second ball scores (which should always be ten), plus the score from the next
    roll, which is the first ball of the next frame.


    ```

    function SetSpareScore(frame:int) {

    var framescore:FuguBowlScore = scores[frame];

    // the score is the score of both rolls in this frame and teh first roll of the
    next

    framescore.total = framescore.ball1+framescore.ball2+scores[frame+1].ball1;

    }

    Listing 8-3.

    The SetSpareScore Function in the FuguBowlPlayer Class

    ```


    The `SetStrikeScore` function is a little more complicated. It sets the total
    score to the score from the first ball (which should be ten) plus the scores from
    the next two rolls, which normally consists of the first and second balls from
    the next frame. But if the next frame is a strike, then the next two rolls are
    the first ball from the next frame and the first ball from the frame after that.


    ```

    function SetStrikeScore(frame:int) {

    var framescore:FuguBowlScore = scores[frame];

    framescore.total = framescore.ball1;

    // always add the score from first roll of the next frame

    framescore.total+=scores[frame+1].ball1;

    if (frame < 8 && IsStrike(frame+1)) {

    framescore.total+=scores[frame+2].ball1;

    } else {

    // for the ninth frame (frame 8) add the second ball from the next (final) frame
    (there always is one)

    framescore.total+=scores[frame+1].ball2;

    }

    }

    Listing 8-4.

    The SetStrikeScore Function in the FuguBowlPlayer Class

    ```


    The use of `SetSpareScore` and `SetStrikeScore` is illustrated in the definition
    of `SetBall1Score` (Listing [8-5](#A310332_2_En_8_Chapter.html#Par30)). The first
    line sets the `ball1` variable of the frame with the number of pins knocked down,
    which is passed in as the second argument of the function. Then, if the current
    frame is not the first frame, `SetBall1Score` checks whether a spare was rolled
    in the previous frame. If that’s the case, then the previous frame is waiting
    for the results of this roll to calculate the frame’s total score, and `SetSpareScore`
    is called on that frame to perform that final calculation.


    If the current frame is not the first or second frame, then `SetBall1Score` checks
    whether strikes have been rolled in the previous two frames, in which case the
    first of those frames is waiting for the result of this roll to update its total
    score, and `SetStrikeScore` is called for that frame.


    Notice `SetBall1Score` doesn’t set the total score for the current frame. If the
    current roll is not a strike, then the frame isn’t over yet, and if the current
    roll is a strike, then two more rolls have to take place before the total for
    this frame can be updated (via `SetStrikeScore`, of course!).


    ```

    function SetBall1Score(frame:int,pinsDown:int) {

    scores[frame].ball1=pinsDown;

    // if previous frame was a spare, set its score

    if (frame>0 && IsSpare(frame-1)) {

    SetSpareScore(frame-1);

    }

    // if the previous two frames were strikes, then set the score of the first frame

    if (frame>1 && IsStrike(frame-1) && IsStrike(frame-2)) {

    SetStrikeScore(frame-2);

    }

    }

    Listing 8-5.

    The SetBall1Score Function in the FuguBowlPlayer Class

    ```'
  raw: '### The Player Score


    With the FuguBowlScore class defined, now you’re ready to add the FuguBowlPlayer
    class, which will aggregate the frame scores for the total game score (Listing
    [8-2](#A310332_2_En_8_Chapter.html#Par15)). As with FuguBowlScore , the FuguBowlPlayer
    class is declared explicitly, even though it has the same name as the script file,
    and it doesn’t inherit from MonoBehaviour (otherwise the class declaration would
    include “extends MonoBehaviour”). Besides not having any Unity callback functions,
    this means the FuguBowlPlayer class is not a subclass of Component and therefore
    the script can’t be attached to a GameObject. In other words, the FuguBowlPlayer
    script acts as a code library containing classes used by other scripts.


    ```

    class FuguBowlPlayer {

    var scores:FuguBowlScore[]; // all 10 frames of the game

    // constructor

    function FuguBowlPlayer() {

    scores = new FuguBowlScore[10];

    for (var i:int=0; i<scores.length; ++i) {

    scores[i] = new FuguBowlScore();

    }

    ClearScore();

    }

    // reset the score for all frames

    function ClearScore() {

    for (var score:FuguBowlScore in scores) {

    score.Clear();

    }

    }

    Listing 8-2.

    The Beginnings of the FuguBowlPlayer Class in FuguBowlPlayer.js

    ```


    The FuguBowlPlayer class naturally contains information about the player, and,
    for example, could have a String variable for the player’s name. However, for
    the purposes of this book, you’ll confine yourself to tracking the player’s bowling
    score. Therefore, the class has just one instance variable, scores, which is a
    built-in array of FuguBowlScore objects. Each FuguBowlScore element in the array
    represents the score for one frame of the bowling game.


    Note


    Built-in arrays are accessed with indices just like instances of the Array class
    (used for the pins variable in `FuguBowl.js`). Built-in arrays have much faster
    access than instances of Array and can be edited in the Inspector view when declared
    as public variables. However, built-in arrays, unlike instances of Array, are
    not resizable at runtime.


    The function FuguBowlPlayer within the class definition has the same name as the
    class, which means it’s a constructor , a special function called when an instance
    of this class is created. An explicitly defined constructor isn’t always necessary
    (FuguBowlScore doesn’t have one), and it is even prohibited within MonoBehaviour.
    But a constructor is warranted in this case because each newly created FuguBowlPlayer
    needs to have its scores array also created. So, the FuguBowlPlayer constructor
    creates a built-in array of ten entries, declared to be of type FuguBowlScore,
    and fills the array with newly created FuguBowlScore instances.


    The constructor also calls a function ClearScore , which in turn calls Clear on
    each of the FuguBowlScore objects, ensuring they all start out indicating no score
    has been registered. The FuguBowlPlayer class also has IsSpare and IsStrike functions
    that call the same-named functions on the specified FuguBowlScore object, indexed
    in the scores array by the argument passed in. Since array indices begin at zero,
    the ten frames of a game are represented by the indices 0 to 9.


    Note


    In a sense, the FuguBowlPlayer class acts as a wrapper around the FuguBowlScore
    class so that other scripts need only know about the FuguBowlPlayer class. As
    an exercise in polish, you could provide more abstraction by having IsSpare and
    IsStrike accept frame indices in the range 1 to 10 and then subtract 1 before
    using them as array indices.


    ### Setting the Score


    As the game progresses, the score has to be updated after each roll of the ball.
    Let’s plan on adding functions named SetBall1Score, SetBall2Score, and SetBall3Score
    (for the tenth frame) to the FuguBowlPlayer class. Like the IsSpare and IsStrike
    functions in that class, the additional functions will take a frame index as an
    argument.


    The score for each roll of the ball potentially updates the total score for a
    previous frame if it had a strike or spare. So, first you’ll need functions to
    perform those updates in the FuguBowlPlayer class, named SetSpareScore (Listing
    [8-3](#A310332_2_En_8_Chapter.html#Par24)) and SetStrikeScore (Listing [8-4](#A310332_2_En_8_Chapter.html#Par26)).


    The SetSpare function sets the total score to the sum of the first and second
    ball scores (which should always be ten), plus the score from the next roll, which
    is the first ball of the next frame.


    ```

    function SetSpareScore(frame:int) {

    var framescore:FuguBowlScore = scores[frame];

    // the score is the score of both rolls in this frame and teh first roll of the
    next

    framescore.total = framescore.ball1+framescore.ball2+scores[frame+1].ball1;

    }

    Listing 8-3.

    The SetSpareScore Function in the FuguBowlPlayer Class

    ```


    The SetStrike function is a little more complicated. It sets the total score to
    the score from the first ball (which should be ten) plus the scores from the next
    two rolls, which normally consists of the first and second balls from the next
    frame. But if the next frame is a strike, then the next two rolls are the first
    ball from the next frame and the first ball from the frame after that.


    ```

    function SetStrikeScore(frame:int) {

    var framescore:FuguBowlScore = scores[frame];

    framescore.total = framescore.ball1;

    // always add the score from first roll of the next frame

    framescore.total+=scores[frame+1].ball1;

    if (frame < 8 && IsStrike(frame+1)) {

    framescore.total+=scores[frame+2].ball1;

    } else {

    // for the ninth frame (frame 8) add the second ball from the next (final) frame
    (there always is one)

    framescore.total+=scores[frame+1].ball2;

    }

    }

    Listing 8-4.

    The SetStrikeScore Function in the FuguBowlPlayer Class

    ```


    The use of SetSpareScore and SetStrikeScore is illustrated in the definition of
    SetBall1Score (Listing [8-5](#A310332_2_En_8_Chapter.html#Par30)). The first line
    sets the ball1 variable of the frame with the number of pins knocked down, which
    is passed in as the second argument of the function. Then, if the current frame
    is not the first frame, SetBall1Score checks whether a spare was rolled in the
    previous frame. If that’s the case, then the previous frame is waiting for the
    results of this roll to calculate the frame’s total score, and SetSpareScore is
    called on that frame to perform that final calculation.


    If the current frame is not the first or second frame, then SetBal1Score checks
    whether strikes have been rolled in the previous two frames, in which case the
    first of those frames is waiting for the result of this roll to update its total
    score, and SetStrikeScore is called for that frame.


    Notice SetBall1Score doesn’t set the total score for the current frame. If the
    current roll is not a strike, then the frame isn’t over yet, and if the current
    roll is a strike, then two more rolls have to take place before the total for
    this frame can be updated (via SetStrikeScore, of course!).


    ```

    function SetBall1Score(frame:int,pinsDown:int) {

    scores[frame].ball1=pinsDown;

    // if previous frame was a spare, set its score

    if (frame>0 && IsSpare(frame-1)) {

    SetSpareScore(frame-1);

    }

    // if the previous two frames were strikes, then set the score of the first frame

    if (frame>1 && IsStrike(frame-1) && IsStrike(frame-2)) {

    SetStrikeScore(frame-2);

    }

    }

    Listing 8-5.

    The SetBall1Score Function in the FuguBowlPlayer Class

    ```'
