    the barrels-as-pins without too much trouble. In games, fun is better than reality!


    You can add the FuguReset script to the prefab by dragging the script into the
    Inspector view or by using the AddComponent button (Figure [7-15](#A310332_2_En_7_Chapter.html#Fig15)).


    ![A310332_2_En_7_Fig15_HTML.jpg](Images/A310332_2_En_7_Fig15_HTML.jpg)


    Figure 7-15.


    Adding the FuguReset script to the BarrelPin prefab


    ### Use the Prefab


    To replace the simple capsule-shaped Pin prefab with the BarrelPin prefab, select
    the FuguBowl GameObject in the Hierarchy view so that its components display in
    the Inspector view and then drag the BarrelPin prefab into the Pin field of the
    FuguBowl script, replacing the Pin prefab you started with (Figure [7-16](#A310332_2_En_7_Chapter.html#Fig16)).


    ![A310332_2_En_7_Fig16_HTML.jpg](Images/A310332_2_En_7_Fig16_HTML.jpg)


    Figure 7-16.


    Using the BarrelPin prefab as the bowling pin


    Now when you click Play, ten barrels will appear instead of ten capsules. But
    they will immediately fall through the floor because the pins don’t have Collider
    components yet!


    ### Add a Collider


    You can’t avoid it any longer. It’s time to take care of the BarrelPin collision.
    So that you can visualize the BarrelPin and its collision shape in the Scene view,
    temporarily place the BarrelPin prefab in the scene by dragging the prefab into
    the Hierarchy view. Once there, press the F key to invoke the Frame Selected command,
    which will center the barrel in the Scene view. Also, change the viewing options
    (top-left pull-down menu in the Scene view) from Textured to Wireframe, so the
    mesh and Collider component’s shape can be seen more easily. Unfortunately, the
    Component menu doesn’t list any primitive colliders that are barrel-shaped (a
    CylinderCollider would be perfect, but it doesn’t exist), and although a MeshCollider
    would conform to the shape of the barrel, MeshColliders are not appropriate for
    physical GameObjects because of performance issues. The closest matching shape
    in the Component menu is CapsuleCollider . So, let’s start with a CapsuleCollider
    shape on your Barrel GameObject and see how well it fits.


    Although Unity tries to size a Collider component to fit the GameObject’s mesh
    when the Collider component is added, in this case the fit isn’t very good largely
    because, as you can see from the rotation in the Transform component, this GameObject
    is rotated 90 degrees around its x-axis. Without that rotation, the barrel is
    lying on its side, but the rotation also affects the orientation of the Collier
    component. To adjust for the rotation, switch the axis of the CapsuleCollider
    shape to the z-axis. After that, setting the radius to 2 and the height to 6 will
    produce a much closer match between CapsuleCollider and the barrel (Figure [7-17](#A310332_2_En_7_Chapter.html#Fig17)).


    ![A310332_2_En_7_Fig17_HTML.jpg](Images/A310332_2_En_7_Fig17_HTML.jpg)


    Figure 7-17.


    Adding a CapsuleCollider shape to the barrel


    The capsule matches the barrel shape pretty well around the side but not on the
    top and bottom, which should have flat surfaces instead of just the endpoints
    the capsule. For flat surfaces, BoxColliders are the obvious choice. So, this
    is a situation where you want to combine multiple Collider components into a compound
    collider.'
  trans: '

    ### 创建预制件


    你需要一个`Barrel`（木桶）预制件来替换简单的`Pin`（球瓶）预制件，但应避免修改原始的`Barrel`预制件（再次导入`Barrel`包会覆盖你的修改）。要制作`Barrel`预制件的副本，请选中该预制件，按下`Command+D`（或从**编辑**菜单中选择**复制**），然后将复制的预制件拖入**预制件**文件夹。接着将其重命名为`BarrelPin`，因为它是一个`Barrel`，而你将其用作保龄球瓶（图
    7-14）。


    ![A310332_2_En_7_Fig14_HTML.jpg](img/A310332_2_En_7_Fig14_HTML.jpg)


    图 7-14. `Barrel`预制件的副本


    选中`BarrelPin`预制件，使其显示在**检查器**视图中。如果你使用了相同的资源包，那么它会包含`MeshFilter`组件和`MeshRenderer`组件。但它还需要`Collider`组件和`Rigidbody`组件。该预制件还需要附加一个`FuguReset`脚本来处理游戏控制器发送的`ResetPosition`消息。现在，我们先添加一个`FuguReset`脚本。接着添加一个`Rigidbody`组件。在`Rigidbody`组件中，将**质量**设置为
    2（千克）。对于金属木桶来说这相当轻，但如果球不能相对轻松地击倒这些充当球瓶的木桶，游戏就会失去乐趣。在游戏中，乐趣比现实更重要！


    你可以通过将脚本拖入**检查器**视图，或使用**添加组件**按钮（图 7-15），将`FuguReset`脚本添加到预制件中。


    ![A310332_2_En_7_Fig15_HTML.jpg](img/A310332_2_En_7_Fig15_HTML.jpg)


    图 7-15. 将`FuguReset`脚本添加到`BarrelPin`预制件中


    ### 使用预制件


    要用`BarrelPin`预制件替换简单的胶囊形`Pin`预制件，请在**层级**视图中选中`FuguBowl`游戏对象，使其组件显示在**检查器**视图中，然后将`BarrelPin`预制件拖入`FuguBowl`脚本的**Pin**字段，替换你最初使用的`Pin`预制件（图
    7-16）。


    ![A310332_2_En_7_Fig16_HTML.jpg](img/A310332_2_En_7_Fig16_HTML.jpg)


    图 7-16. 使用`BarrelPin`预制件作为保龄球瓶


    现在当你点击**播放**时，会出现十个木桶而不是十个胶囊。但它们会立即掉落地板，因为球瓶还没有`Collider`组件！


    ### 添加碰撞体


    你无法再回避这个问题了。是时候处理`BarrelPin`的碰撞了。为了能在**场景**视图中直观地看到`BarrelPin`及其碰撞形状，请将`BarrelPin`预制件拖入**层级**视图，临时将其放置在场景中。放置好后，按下`F`键调用**框选所选**命令，这会将木桶居中显示在**场景**视图中。同时，将查看选项（**场景**视图左上方的下拉菜单）从**纹理**更改为**线框**，以便更容易看到网格和`Collider`组件的形状。不幸的是，**组件**菜单中没有列出任何木桶形状的基本碰撞体（`CylinderCollider`会很完美，但它并不存在），虽然`MeshCollider`可以贴合木桶的形状，但由于性能问题，`MeshCollider`不适用于物理游戏对象。**组件**菜单中最接近的形状是`CapsuleCollider`。因此，我们先在`Barrel`游戏对象上使用`CapsuleCollider`形状，看看它有多贴合。


    虽然 Unity 在添加`Collider`组件时会尝试调整其大小以适配游戏对象的网格，但在此例中，贴合度并不理想，这主要是因为，正如`Transform`组件中的旋转值所示，该游戏对象绕其
    x 轴旋转了 90 度。如果没有这个旋转，木桶是侧躺的，但旋转也影响了`Collider`组件的朝向。为了调整这个旋转，请将`CapsuleCollider`形状的轴切换到
    z 轴。之后，将**半径**设置为 2，**高度**设置为 6，这样`CapsuleCollider`与木桶的匹配度就会大大提高（图 7-17）。


    ![A310332_2_En_7_Fig17_HTML.jpg](img/A310332_2_En_7_Fig17_HTML.jpg)


    图 7-17. 为木桶添加`CapsuleCollider`形状


    胶囊形状在侧面与木桶的匹配度很好，但在顶部和底部则不然，顶部和底部应该是平面，而不仅仅是胶囊的端点。对于平面，`BoxCollider`显然是更好的选择。因此，在这种情况下，你需要将多个`Collider`组件组合成一个复合碰撞体。

    '
- fmt: "### Add a Compound Collider\n\nUnity allows more than one `Collider` component\
    \ on a `GameObject`, but they have to be different types of colliders. For example,\
    \ two `BoxCollider` components cannot be attached to the same `GameObject`. However,\
    \ an arbitrary set of primitive `Collider` components can be combined into a compound\
    \ collider by attaching each of the `Collider` components to its own `GameObject`\
    \ and making all of those `GameObjects` children of the `Rigidbody`’s `GameObject`.\
    \ This is the approach you’ll take in combining a `CapsuleCollider` and a `BoxCollider`\
    \ for the barrel. To hold those two `Collider` components, create two child `GameObjects`\
    \ of the barrel in the Hierarchy view and name them `box` and `capsule` for their\
    \ respective shapes (Figure [7-18](#A310332_2_En_7_Chapter.html#Fig18)). To create\
    \ a child `GameObject`, select `GameObject` from the menu and then `Create Empty\
    \ Child Object`.\n\n![A310332_2_En_7_Fig18_HTML.jpg](Images/A310332_2_En_7_Fig18_HTML.jpg)\n\
    \nFigure 7-18.  \nChild `GameObjects` for a compound collider\n\nRather than create\
    \ a new `CapsuleCollider` from scratch, let’s take advantage of the `CapsuleCollider`\
    \ that’s already oriented and sized properly on the `Barrel GameObject` by copying\
    \ that component. Select the `Barrel GameObject`, and in the Inspector view, right-click\
    \ the `CapsuleCollider` and select `Copy Component` (Figure [7-19](#A310332_2_En_7_Chapter.html#Fig19)).\n\
    \n![A310332_2_En_7_Fig19_HTML.jpg](Images/A310332_2_En_7_Fig19_HTML.jpg)\n\nFigure\
    \ 7-19.  \nCopying a component\n\nThen select the `capsule GameObject` again,\
    \ right-click its `Transform` component in the Inspector view, and in the pop-up\
    \ menu select `Paste Component As New` (Figure [7-20](#A310332_2_En_7_Chapter.html#Fig20)).\
    \ The `capsule GameObject` now has a `CapsuleCollider` just like the one created\
    \ for the `Barrel GameObject`, so you don’t need the original one anymore. Select\
    \ the `Barrel GameObject`, right-click the `CapsuleCollider` you just copied,\
    \ and select `RemoveComponent` in the pop-up menu to remove the `CapsuleCollider`.\
    \ There should be just one `CapsuleCollider` in the `Barrel` hierarchy now.\n\n\
    ![A310332_2_En_7_Fig20_HTML.jpg](Images/A310332_2_En_7_Fig20_HTML.jpg)\n\nFigure\
    \ 7-20.  \nPasting a component\n\nLet’s turn your attention to the `BoxCollider`.\
    \ You could add it directly to the `Box GameObject` using the `Component` menu,\
    \ but if you add the `BoxCollider` to the `Barrel GameObject` instead, then Unity\
    \ will do the work for you in sizing the `BoxCollider` to the mesh. So, let’s\
    \ repeat the process you went through with the `CapsuleCollider`, only this time\
    \ with a `BoxCollider`. With the `Barrel GameObject` selected, add a `BoxCollider`\
    \ using the `Component` menu or the `AddComponent` button. In the Scene view,\
    \ you can see the `BoxCollider` encompasses the barrel (Figure [7-21](#A310332_2_En_7_Chapter.html#Fig21)).\n\
    \n![A310332_2_En_7_Fig21_HTML.jpg](Images/A310332_2_En_7_Fig21_HTML.jpg)\n\nFigure\
    \ 7-21.  \nA `BoxCollider` automatically sized around the barrel\n\nIt’s fine\
    \ that the `BoxCollider` extends from the top to bottom of the mesh since it’s\
    \ desirable to have two flat collision surfaces on both ends. But it’s not so\
    \ desirable to have the `BoxCollider` extending outside the curved portion of\
    \ the barrel. Decrease the width of the `BoxCollider` by lowering its `x` and\
    \ `y` values in the Inspector view (remember, the barrel is rotated) to `2.5`.\
    \ From the top-down vantage of the Scene view (click the `y`-axis of the Scene\
    \ view gizmo), you can see the `BoxCollider` now fits inside the barrel (Figure\
    \ [7-22](#A310332_2_En_7_Chapter.html#Fig22)).\n\n![A310332_2_En_7_Fig22_HTML.jpg](Images/A310332_2_En_7_Fig22_HTML.jpg)\n\
    \nFigure 7-22.  \nTop-down view of a `BoxCollider` fitting within the barrel\n\
    \nNow that you have the `BoxCollider` sized the way you want it, repeat the process\
    \ for the `CapsuleCollider`—right-click the `BoxCollider` in the Inspector view,\
    \ select `Copy Component`, select the `Box GameObject`, right-click its `Transform`\
    \ component in the Inspector view, and select `Paste Component As New`. Don’t\
    \ forget to go back to the `BoxCollider` on the barrel, right-click it, and select\
    \ `Remove Component`. With the barrel selected, you should see both `Collider`\
    \ components displayed in the Scene view, providing a better approximation of\
    \ the barrel shape than either of the `Collider` components individually (Figure\
    \ [7-23](#A310332_2_En_7_Chapter.html#Fig23)).\n\n![A310332_2_En_7_Fig23_HTML.jpg](Images/A310332_2_En_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23.  \nBoth colliders in a compound collider on display\n\n### Update\
    \ the Prefab\n\nFinally, now that the barrel is ready to go, select `Apply Changes\
    \ To Prefab` in the `GameObject` menu (Figure [7-24](#A310332_2_En_7_Chapter.html#Fig24)).\n\
    \n![A310332_2_En_7_Fig24_HTML.jpg](Images/A310332_2_En_7_Fig24_HTML.jpg)\n\nFigure\
    \ 7-24.  \nApplying changes to the `BarrelPin` prefab Tip\n\nIt’s a good idea\
    \ to perform a `Save Project` or `Save Scene` (which implicitly performs a `Save\
    \ Project`) operation to make sure the prefab changes are really saved. Project\
    \ changes are saved when Unity exits normally, but if it exits abnormally, all\
    \ bets are off.\n\nWith the prefab updated, the `Barrel GameObject` is no longer\
    \ needed in the scene and can be removed (`Command+Delete` or choose `Delete`\
    \ from the `Edit` menu). Now when you click `Play`, the barrels no longer fall\
    \ through the floor, and as shown in Figure [7-25](#A310332_2_En_7_Chapter.html#Fig25),\
    \ they tumble when you roll into them!\n\n![A310332_2_En_7_Fig25_HTML.jpg](Images/A310332_2_En_7_Fig25_HTML.jpg)\n\
    \nFigure 7-25.  \nBowling into barrels\n\n### A Complex Collider (HyperBowl)\n\
    \nThe compound collider created for the `BarrelPin` prefab is still fairly simple,\
    \ consisting of just two primitive `Collider` components. Compound colliders can\
    \ be much more complex, depending on the shape they’re approximating. As an example\
    \ of a more realistic bowling pin, take a look at HyperBowl (Figure [7-26](#A310332_2_En_7_Chapter.html#Fig26)).\n\
    \n![A310332_2_En_7_Fig26_HTML.jpg](Images/A310332_2_En_7_Fig26_HTML.jpg)\n\nFigure\
    \ 7-26.  \nCompound collider for HyperBowl bowling pin\n\nThe compound collider\
    \ for a bowling pin in HyperBowl consists of six primitive colliders: a `BoxCollider`\
    \ to provide a flat surface at the bottom, a `CapsuleCollider` for the neck of\
    \ the pin, and four `SphereColliders` of various sizes to fill out the body and\
    \ top of the pin.\n\n## Add Sounds\n\nYour bowling game is starting to look good,\
    \ but it’s awfully quiet! You could add background music or ambient sound like\
    \ the looping music in the dance scene. But a bowling game really should have\
    \ collision-based sounds, such as a rolling sound for the ball and collision sounds\
    \ for each pin.\n\n### Get Sounds\n\nFirst, you need to find some sound files.\
    \ Once again, let’s visit the Asset Store and search for free SFX (Figure [7-27](#A310332_2_En_7_Chapter.html#Fig27)).\n\
    \n![A310332_2_En_7_Fig27_HTML.jpg](Images/A310332_2_En_7_Fig27_HTML.jpg)\n\nFigure\
    \ 7-27.  \nAsset Store search results for free SFX\n\nThe `Free SFX Package` from\
    \ Bleep Blop Audio lists a good variety of audio clips, so let’s download that\
    \ package. The files show up in a Project view folder named `Assets` inside your\
    \ `Assets` folder (submitting packages to the Asset Store is a little tricky,\
    \ so that file organization was probably unintentional)."
  raw: '### Add a Compound Collider


    Unity allows more than one Collider component on a GameObject, but they have to
    be different types of colliders. For example, two BoxCollider components cannot
    be attached to the same GameObject. However, an arbitrary set of primitive Collider
    components can be combined into a compound collider by attaching each of the Collider
    components to its own GameObject and making all of those GameObjects children
    of the Rigidbody’s GameObject. This is the approach you’ll take in combining a
    CapsuleCollider and a BoxCollider for the barrel. To hold those two Collider components,
    create two child GameObjects of the barrel in the Hierarchy view and name them
    box and capsule for their respective shapes (Figure [7-18](#A310332_2_En_7_Chapter.html#Fig18)).
    To create a child GameObject, select GameObject from the menu and then Create
    Empty Child Object.


    ![A310332_2_En_7_Fig18_HTML.jpg](Images/A310332_2_En_7_Fig18_HTML.jpg)


    Figure 7-18.


    Child GameObjects for a compound collider


    Rather than create a new CapsuleCollider from scratch, let’s take advantage of
    the CapsuleCollider that’s already oriented and sized properly on the Barrel GameObject
    by copying that component. Select the Barrel GameObject, and in the Inspector
    view, right-click the CapsuleCollider and select Copy Component (Figure [7-19](#A310332_2_En_7_Chapter.html#Fig19)).


    ![A310332_2_En_7_Fig19_HTML.jpg](Images/A310332_2_En_7_Fig19_HTML.jpg)


    Figure 7-19.


    Copying a component


    Then select the capsule GameObject again, right-click its Transform component
    in the Inspector view, and in the pop-up menu select Paste Component As New (Figure
    [7-20](#A310332_2_En_7_Chapter.html#Fig20)). The capsule GameObject now has a
    CapsuleCollider just like the one created for the Barrel GameObject, so you don’t
    need the original one anymore. Select the Barrel GameObject, right-click the CapsuleCollider
    you just copied, and select RemoveComponent in the pop-up menu to remove the CapsuleCollider.
    There should be just one CapsuleCollider in the Barrel hierarchy now.


    ![A310332_2_En_7_Fig20_HTML.jpg](Images/A310332_2_En_7_Fig20_HTML.jpg)


    Figure 7-20.


    Pasting a component


    Let’s turn your attention to the BoxCollider. You could add it directly to the
    Box GameObject using the Component menu, but if you add the BoxCollider to the
    Barrel GameObject instead, then Unity will do the work for you in sizing the BoxCollider
    to the mesh. So, let’s repeat the process you went through with the CapsuleCollider,
    only this time with a BoxCollider. With the Barrel GameObject selected, add a
    BoxCollider using the Component menu or the AddComponent button. In the Scene
    view, you can see the BoxCollider encompasses the barrel (Figure [7-21](#A310332_2_En_7_Chapter.html#Fig21)).


    ![A310332_2_En_7_Fig21_HTML.jpg](Images/A310332_2_En_7_Fig21_HTML.jpg)


    Figure 7-21.


    A BoxCollider automatically sized around the barrel


    It’s fine that the BoxCollider extends from the top to bottom of the mesh since
    it’s desirable to have two flat collision surfaces on both ends. But it’s not
    so desirable to have the BoxCollider extending outside the curved portion of the
    barrel. Decrease the width of the BoxCollider by lowering its x and y values in
    the Inspector view (remember, the barrel is rotated) to 2.5\. From the top-down
    vantage of the Scene view (click the y-axis of the Scene view gizmo), you can
    see the BoxCollider now fits inside the barrel (Figure [7-22](#A310332_2_En_7_Chapter.html#Fig22)).


    ![A310332_2_En_7_Fig22_HTML.jpg](Images/A310332_2_En_7_Fig22_HTML.jpg)


    Figure 7-22.


    Top-down view of a BoxCollider fitting within the barrel


    Now that you have the BoxCollider sized the way you want it, repeat the process
    for the CapsuleCollider—right-click the BoxCollider in the Inspector view, select
    Copy Component, select the Box GameObject, right-click its Transform component
    in the Inspector view, and select Paste Component As New. Don’t forget to go back
    to the BoxCollider on the barrel, right-click it, and select Remove Component.
    With the barrel selected, you should see both Collider components displayed in
    the Scene view, providing a better approximation of the barrel shape than either
    of the Collider components individually (Figure [7-23](#A310332_2_En_7_Chapter.html#Fig23)).


    ![A310332_2_En_7_Fig23_HTML.jpg](Images/A310332_2_En_7_Fig23_HTML.jpg)


    Figure 7-23.


    Both colliders in a compound collider on display


    ### Update the Prefab


    Finally, now that the barrel is ready to go, select Apply Changes To Prefab in
    the GameObject menu (Figure [7-24](#A310332_2_En_7_Chapter.html#Fig24)).


    ![A310332_2_En_7_Fig24_HTML.jpg](Images/A310332_2_En_7_Fig24_HTML.jpg)


    Figure 7-24.


    Applying changes to the BarrelPin prefab Tip


    It’s a good idea to perform a Save Project or Save Scene (which implicitly performs
    a Save Project) operation to make sure the prefab changes are really saved. Project
    changes are saved when Unity exits normally, but if it exits abnormally, all bets
    are off.


    With the prefab updated, the Barrel GameObject is no longer needed in the scene
    and can be removed (Command+Delete or choose Delete from the Edit menu). Now when
    you click Play, the barrels no longer fall through the floor, and as shown in
    Figure [7-25](#A310332_2_En_7_Chapter.html#Fig25), they tumble when you roll into
    them!


    ![A310332_2_En_7_Fig25_HTML.jpg](Images/A310332_2_En_7_Fig25_HTML.jpg)


    Figure 7-25.


    Bowling into barrels


    ### A Complex Collider (HyperBowl)


    The compound collider created for the BarrelPin prefab is still fairly simple,
    consisting of just two primitive Collider components. Compound colliders can be
    much more complex, depending on the shape they’re approximating. As an example
    of a more realistic bowling pin, take a look at HyperBowl (Figure [7-26](#A310332_2_En_7_Chapter.html#Fig26)).


    ![A310332_2_En_7_Fig26_HTML.jpg](Images/A310332_2_En_7_Fig26_HTML.jpg)


    Figure 7-26.


    Compound collider for HyperBowl bowling pin


    The compound collider for a bowling pin in HyperBowl consists of six primitive
    colliders: a BoxCollider to provide a flat surface at the bottom, a CapsuleCollider
    for the neck of the pin, and four SphereColliders of various sizes to fill out
    the body and top of the pin.


    ## Add Sounds


    Your bowling game is starting to look good, but it’s awfully quiet! You could
    add background music or ambient sound like the looping music in the dance scene.
    But a bowling game really should have collision-based sounds, such as a rolling
    sound for the ball and collision sounds for each pin.


    ### Get Sounds


    First, you need to find some sound files. Once again, let’s visit the Asset Store
    and search for free SFX (Figure [7-27](#A310332_2_En_7_Chapter.html#Fig27)).


    ![A310332_2_En_7_Fig27_HTML.jpg](Images/A310332_2_En_7_Fig27_HTML.jpg)


    Figure 7-27.


    Asset Store search results for free SFX


    The Free SFX Package from Bleep Blop Audio lists a good variety of audio clips,
    so let’s download that package. The files show up in a Project view folder named
    Assets inside your Assets folder (submitting packages to the Asset Store is a
    little tricky, so that file organization was probably unintentional).'
  trans: "\n### 添加复合碰撞体\n\nUnity 允许一个 `GameObject` 上存在多个 `Collider` 组件，但这些碰撞器必须是不同类型。例如，不能将两个\
    \ `BoxCollider` 组件附加到同一个 `GameObject` 上。不过，可以通过将每个 `Collider` 组件附加到其自身的 `GameObject`\
    \ 上，并将所有这些 `GameObject` 设为 `Rigidbody` 的 `GameObject` 的子对象，从而将一组任意的原始 `Collider`\
    \ 组件合并成一个复合碰撞体。你将为木桶组合一个 `CapsuleCollider` 和一个 `BoxCollider`，这正是要采用的方法。要容纳这两个\
    \ `Collider` 组件，请在层级视图中为木桶创建两个子 `GameObject`，并根据它们各自的形状将其命名为 `box` 和 `capsule`（图\
    \ 7-18）。要创建子 `GameObject`，请从菜单中选择 `GameObject`，然后选择 `Create Empty Child Object`。\n\
    \n![A310332_2_En_7_Fig18_HTML.jpg](img/A310332_2_En_7_Fig18_HTML.jpg)\n\n图 7-18.\
    \  \n用于复合碰撞体的子 `GameObject`\n\n与其从头创建一个新的 `CapsuleCollider`，不如利用 `Barrel GameObject`\
    \ 上已经正确定向和调整好大小的 `CapsuleCollider`，通过复制该组件来实现。选中 `Barrel GameObject`，然后在检视面板中，右键单击\
    \ `CapsuleCollider` 并选择 `Copy Component`（图 7-19）。\n\n![A310332_2_En_7_Fig19_HTML.jpg](img/A310332_2_En_7_Fig19_HTML.jpg)\n\
    \n图 7-19.  \n复制组件\n\n然后再次选中 `capsule GameObject`，在检视面板中右键单击其 `Transform` 组件，在弹出菜单中选择\
    \ `Paste Component As New`（图 7-20）。现在 `capsule GameObject` 拥有了一个与为 `Barrel GameObject`\
    \ 创建的完全相同的 `CapsuleCollider`，因此你不再需要原来的那个了。选中 `Barrel GameObject`，右键单击刚才复制的 `CapsuleCollider`，在弹出菜单中选择\
    \ `RemoveComponent` 以移除 `CapsuleCollider`。现在，`Barrel` 层级中应该只存在一个 `CapsuleCollider`。\n\
    \n![A310332_2_En_7_Fig20_HTML.jpg](img/A310332_2_En_7_Fig20_HTML.jpg)\n\n图 7-20.\
    \  \n粘贴组件\n\n让我们把注意力转到 `BoxCollider` 上。你可以使用 `Component` 菜单直接将其添加到 `Box GameObject`，但如果你将\
    \ `BoxCollider` 添加到 `Barrel GameObject` 上，那么 Unity 会替你完成将 `BoxCollider` 适配到网格大小的工作。因此，让我们重复处理\
    \ `CapsuleCollider` 时的流程，只不过这次换成 `BoxCollider`。选中 `Barrel GameObject`，使用 `Component`\
    \ 菜单或 `AddComponent` 按钮添加一个 `BoxCollider`。在场景视图中，你可以看到 `BoxCollider` 包裹住了木桶（图\
    \ 7-21）。\n\n![A310332_2_En_7_Fig21_HTML.jpg](img/A310332_2_En_7_Fig21_HTML.jpg)\n\
    \n图 7-21.  \n自动围绕木桶调整大小的 `BoxCollider`\n\n`BoxCollider` 从网格的顶部延伸到底部是可以接受的，因为这样可以在两端获得两个平坦的碰撞面。但\
    \ `BoxCollider` 延伸到木桶的弯曲部分之外就不太理想了。通过在检视面板中（记住，木桶是旋转过的）将 `x` 和 `y` 值减小到 `2.5`，来降低\
    \ `BoxCollider` 的宽度。从场景视图的俯视角度（点击场景视图辅助工具的 `y` 轴），你可以看到 `BoxCollider` 现在适配到了木桶内部（图\
    \ 7-22）。\n\n![A310332_2_En_7_Fig22_HTML.jpg](img/A310332_2_En_7_Fig22_HTML.jpg)\n\
    \n图 7-22.  \n适配在木桶内的 `BoxCollider` 俯视图\n\n既然 `BoxCollider` 的大小已经调整到符合要求，那么重复处理\
    \ `CapsuleCollider` 时的流程——在检视面板中右键单击 `BoxCollider`，选择 `Copy Component`，选中 `Box\
    \ GameObject`，在检视面板中右键单击其 `Transform` 组件，然后选择 `Paste Component As New`。别忘了回到木桶上的\
    \ `BoxCollider`，右键单击它并选择 `Remove Component`。选中木桶后，你应该能在场景视图中看到两个 `Collider` 组件都被显示出来，它们共同提供的木桶形状近似度，比单独使用任何一个\
    \ `Collider` 组件都要好（图 7-23）。\n\n![A310332_2_En_7_Fig23_HTML.jpg](img/A310332_2_En_7_Fig23_HTML.jpg)\n\
    \n图 7-23.  \n展示复合碰撞体中的两个碰撞器\n\n### 更新预制件\n\n最后，既然木桶已经准备就绪，请在 `GameObject` 菜单中选择\
    \ `Apply Changes To Prefab`（图 7-24）。\n\n![A310332_2_En_7_Fig24_HTML.jpg](img/A310332_2_En_7_Fig24_HTML.jpg)\n\
    \n图 7-24.  \n将更改应用到 `BarrelPin` 预制件\n\n提示：建议执行 `Save Project` 或 `Save Scene`（这会隐式执行\
    \ `Save Project`）操作，以确保预制件的更改确实被保存了。项目更改会在 Unity 正常退出时保存，但如果它异常退出，则无法保证。\n\n更新预制件后，场景中就不再需要\
    \ `Barrel GameObject` 了，可以将其移除（`Command+Delete` 或从 `Edit` 菜单中选择 `Delete`）。现在，当你点击\
    \ `Play` 时，木桶不再会穿过地面掉下去，而且如图 7-25 所示，当你滚向它们时，它们会翻滚起来！\n\n![A310332_2_En_7_Fig25_HTML.jpg](img/A310332_2_En_7_Fig25_HTML.jpg)\n\
    \n图 7-25.  \n撞击木桶\n\n### 复杂碰撞体（HyperBowl）\n\n为 `BarrelPin` 预制件创建的复合碰撞体仍然相当简单，只由两个原始\
    \ `Collider` 组件构成。复合碰撞体可能复杂得多，具体取决于它们所近似的形状。作为更真实保龄球瓶的例子，请看 HyperBowl（图 7-26）。\n\
    \n![A310332_2_En_7_Fig26_HTML.jpg](img/A310332_2_En_7_Fig26_HTML.jpg)\n\n图 7-26.\
    \  \nHyperBowl 保龄球瓶的复合碰撞体\n\nHyperBowl 中保龄球瓶的复合碰撞体由六个原始碰撞器组成：一个提供底部平坦表面的 `BoxCollider`，一个用于球瓶颈部的\
    \ `CapsuleCollider`，以及四个大小不一的用于填充球瓶主体和顶部的 `SphereCollider`。\n\n## 添加声音\n\n你的保龄球游戏看起来不错了，但太安静了！你可以添加背景音乐或环境音效，比如舞厅场景中循环播放的音乐。但保龄球游戏确实应该具有基于碰撞的声音，例如球的滚动声和每个球瓶的碰撞声。\n\
    \n### 获取声音\n\n首先，你需要找到一些声音文件。让我们再次访问资源商店，搜索免费的 SFX（音效）（图 7-27）。\n\n![A310332_2_En_7_Fig27_HTML.jpg](img/A310332_2_En_7_Fig27_HTML.jpg)\n\
    \n图 7-27.  \n免费 SFX 的资源商店搜索结果\n\n来自 Bleep Blop Audio 的 `Free SFX Package` 列出了种类繁多的音频剪辑，让我们下载这个资源包。这些文件会出现在你的\
    \ `Assets` 文件夹内的一个名为 `Assets` 的“项目视图”文件夹中（向资源商店提交资源包有些棘手，所以这种文件组织方式可能并非有意为之）。\n"
- fmt: "### Add a Rolling Sound\n\nFeel free to play the various sounds by selecting\
    \ them and clicking the Play button in the Inspector view. But for now you’ll\
    \ use the `Sci-Fi_Ambiences` sound for the ball-rolling sound. It’s not a great\
    \ ball-rolling sound, but it’s the only audio clip in this package that’s suitable\
    \ for looping (Figure [7-28](#A310332_2_En_7_Chapter.html#Fig28)).\n\n![A310332_2_En_7_Fig28_HTML.jpg](Images/A310332_2_En_7_Fig28_HTML.jpg)\
    \  \nFigure 7-28. The audio clip used for the ball-rolling sound\n\nDrag the audio\
    \ clip to the Ball GameObject in the Hierarchy view and select the ball. The Inspector\
    \ view should display a new `AudioSource` component that was automatically created\
    \ to reference the audio clip (Figure [7-29](#A310332_2_En_7_Chapter.html#Fig29)).\n\
    \n![A310332_2_En_7_Fig29_HTML.jpg](Images/A310332_2_En_7_Fig29_HTML.jpg)  \nFigure\
    \ 7-29. The Inspector view of the ball with an audio source\n\nThe rolling sound\
    \ will be controlled by a script and not played automatically, so make sure the\
    \ **Play On Awake** check box is deselected. But when the rolling sound is played,\
    \ it should continue playing until told to stop, so the **Loop** check box should\
    \ be selected.\n\nThe `AudioClip` component is a 3D sound, as indicated in the\
    \ `AudioSource` component below the `AudioClip` name. That means the sound will\
    \ attenuate with the distance between the `AudioSource` component and `AudioListener`\
    \ component (which is attached to the Main Camera). The attenuation is specified\
    \ by the graph shown at the bottom of the `AudioSource` component. You can adjust\
    \ the attenuation by selecting among the **Volume Rolloff** options and also specifying\
    \ the **Min Distance** value, which specifies at what distance the attenuation\
    \ begins. If the `AudioListener` component is less than the **Min Distance** value\
    \ from the `AudioSource` component, then the sound is not attenuated at all. Or\
    \ you can directly manipulate the attenuation curve by dragging the handle along\
    \ the curve.\n\n**Tip**  \nIf you’re having trouble hearing an audio source, try\
    \ starting with a high **Min Distance** value to be certain you’re hearing it\
    \ at full volume and then adjust the **Min Distance** value and attenuation curve\
    \ to your liking. The script to play the rolling sound will be attached to the\
    \ ball. Create a new JavaScript, place it in the `Scripts` folder, and name it\
    \ `FuguBallSound`. Then add the contents of Listing [7-6](#A310332_2_En_7_Chapter.html#Par66)\
    \ to the script.\n\n```\n#pragma strict\nvar minSpeed:float = 1.0; // actually\
    \ the square of the minSpeed\nprivate var sqrMinSpeed:float = 1.0;\nprivate var\
    \ floorTag = \"Floor\";\nfunction Awake() {\nsqrMinSpeed = minSpeed * minSpeed;\n\
    }\nfunction OnCollisionStay(collider:Collision) {\nif (collider.gameObject.tag\
    \ == floorTag) {\nif (GetComponent.<AudioSource>().velocity.sqrMagnitude>sqrMinSpeed)\
    \ {\nif (!GetComponent.<AudioSource>().isPlaying) {\nGetComponent.<AudioSource>().Play();\n\
    }\n} else {\nif (GetComponent.<AudioSource>().isPlaying) {\nGetComponent.<AudioSource>().Stop();\n\
    }\n}\n}\n}\nfunction OnCollisionExit(collider:Collision) {\nif (collider.gameObject.tag\
    \ == floorTag) {\nif (GetComponent.<AudioSource>().isPlaying) {\nGetComponent.<AudioSource>().Stop();\n\
    }\n}\n}\nListing 7-6.\nFuguBallSound.js Script for Ball-Rolling Sound\n```\n\n\
    There is some similarity with the `FuguForce` script, since both scripts keep\
    \ track of when the ball is rolling using collision callbacks and checking the\
    \ tag of the colliding GameObject to see whether it’s the floor. `FuguBallSound`\
    \ uses just two of the `OnCollision` callbacks: `OnCollisionStay` and `OnCollisionExit`.\
    \ `OnCollisionEnter` isn’t implemented because it would be redundant with `OnCollisionStay`\
    \ (the `FuguForce` script didn’t really need `OnCollisionEnter` either). Both\
    \ of the script's collision callbacks reference the `audio` variable of this component,\
    \ which is equivalent to the `audio` variable of this component’s GameObject and\
    \ references the attached `AudioSource`.\n\nWhen the ball is on the floor, `OnCollisionStay`\
    \ checks whether the ball is moving faster than a minimum speed, which is specified\
    \ in the public variable `minSpeed` so that it can be adjusted in the Inspector\
    \ view. The script actually compares the square of the ball speed against the\
    \ square of `minSpeed` to avoid the computational expense of square root calculations.\
    \ If the ball is on the floor and moving fast enough and if the ball’s `AudioSource`\
    \ is not already playing its audio clip, then the script starts playing the audio\
    \ clip. If the ball’s speed drops far enough, the rolling sound will stop.\n\n\
    The job of `OnCollisionExit` is easier, as it just needs to check whether audio\
    \ is playing and, if it is, then stop playing the audio. In other words, if the\
    \ ball loses contact with the floor because it bounced or rolled off, then the\
    \ rolling sound stops.\n\nDrag the script onto the ball in the Hierarchy view\
    \ (Figure [7-30](#A310332_2_En_7_Chapter.html#Fig30)) and click Play to try it.\
    \ As the ball rolls around, the rolling sound should become audible, and the sound\
    \ should cease when the ball comes to a rest.\n\n![A310332_2_En_7_Fig30_HTML.jpg](Images/A310332_2_En_7_Fig30_HTML.jpg)\
    \  \nFigure 7-30. The `FuguBallSound` script attached to the Ball GameObject"
  raw: '### Add a Rolling Sound


    Feel free to play the various sounds by selecting them and clicking the Play button
    in the Inspector view. But for now you’ll use the Sci-Fi_Ambiences sound for the
    ball-rolling sound. It’s not a great ball-rolling sound, but it’s the only audio
    clip in this package that’s suitable for looping (Figure [7-28](#A310332_2_En_7_Chapter.html#Fig28)).


    ![A310332_2_En_7_Fig28_HTML.jpg](Images/A310332_2_En_7_Fig28_HTML.jpg)


    Figure 7-28.


    The audio clip used for the ball-rolling sound


    Drag the audio clip to the Ball GameObject in the Hierarchy view and select the
    ball. The Inspector view should display a new AudioSource component that was automatically
    created to reference the audio clip (Figure [7-29](#A310332_2_En_7_Chapter.html#Fig29)).


    ![A310332_2_En_7_Fig29_HTML.jpg](Images/A310332_2_En_7_Fig29_HTML.jpg)


    Figure 7-29.


    The Inspector view of the ball with an audio source


    The rolling sound will be controlled by a script and not played automatically,
    so make sure the Play On Awake check box is deselected. But when the rolling sound
    is played, it should continue playing until told to stop, so the Loop check box
    should be selected.


    The AudioClip component is a 3D sound, as indicated in the AudioSource component
    below the AudioClip name. That means the sound will attenuate with the distance
    between the AudioSource component and AudioListener component (which is attached
    to the Main Camera). The attenuation is specified by the graph shown at the bottom
    of the AudioSource component. You can adjust the attenuation by selecting among
    the Volume Rolloff options and also specifying the Min Distance value, which specifies
    at what distance the attenuation begins. If the AudioListener component is less
    than the Min Distance value from the AudioSource component, then the sound is
    not attenuated at all. Or you can directly manipulate the attenuation curve by
    dragging the handle along the curve.


    Tip


    If you’re having trouble hearing an audio source, try starting with a high Min
    Distance value to be certain you’re hearing it at full volume and then adjust
    the Min Distance value and attenuation curve to your liking. The script to play
    the rolling sound will be attached to the ball. Create a new JavaScript, place
    it in the Scripts folder, and name it FuguBallSound. Then add the contents of
    Listing [7-6](#A310332_2_En_7_Chapter.html#Par66) to the script.


    ```

    #pragma strict

    var minSpeed:float = 1.0; // actually the square of the minSpeed

    private var sqrMinSpeed:float = 1.0;

    private var floorTag = "Floor";

    function Awake() {

    sqrMinSpeed = minSpeed * minSpeed;

    }

    function OnCollisionStay(collider:Collision) {

    if (collider.gameObject.tag == floorTag) {

    if (GetComponent.().velocity.sqrMagnitude>sqrMinSpeed) {

    if (!GetComponent.().isPlaying) {

    GetComponent.().Play();

    }

    } else {

    if (GetComponent.().isPlaying) {

    GetComponent.().Stop();

    }

    }

    }

    }

    function OnCollisionExit(collider:Collision) {

    if (collider.gameObject.tag == floorTag) {

    if (GetComponent.().isPlaying) {

    GetComponent.().Stop();

    }

    }

    }

    Listing 7-6.

    FuguBallSound.js Script for Ball-Rolling Sound

    ```


    There is some similarity with the FuguForce script, since both scripts keep track
    of when the ball is rolling using collision callbacks and checking the tag of
    the colliding GameObject to see whether it’s the floor. FuguBallSound uses just
    two of the OnCollision callbacks : OnCollisionStay and OnCollisionExit. OnCollisionEnter
    isn’t implemented because it would be redundant with OnCollisionStay (the FuguForce
    script didn’t really need OnCollisionEnter either). Both of the script''s collision
    callbacks reference the audio variable of this component, which is equivalent
    to the audio variable of this component’s GameObject and references the attached
    AudioSource.


    When the ball is on the floor, OnCollisionStay checks whether the ball is moving
    faster than a minimum speed, which is specified in the public variable minSpeed
    so that it can be adjusted in the Inspector view. The script actually compares
    the square of the ball speed against the square of minSpeed to avoid the computational
    expense of square root calculations. If the ball is on the floor and moving fast
    enough and if the ball’s AudioSource is not already playing its audio clip, then
    the script starts playing the audio clip. If the ball’s speed drops far enough,
    the rolling sound will stop.


    The job of OnCollisionExit is easier, as it just needs to check whether audio
    is playing and, if it is, then stop playing the audio. In other words, if the
    ball loses contact with the floor because it bounced or rolled off, then the rolling
    sound stops.


    Drag the script onto the ball in the Hierarchy view (Figure [7-30](#A310332_2_En_7_Chapter.html#Fig30))
    and click Play to try it. As the ball rolls around, the rolling sound should become
    audible, and the sound should cease when the ball comes to a rest.


    ![A310332_2_En_7_Fig30_HTML.jpg](Images/A310332_2_En_7_Fig30_HTML.jpg)


    Figure 7-30.


    The FuguBallSound script attached to the Ball GameObject'
  trans: "\n### 添加滚动音效\n\n你可以随意选择各种音效，然后在检视面板中点击播放按钮来试听。但目前，你将使用 `Sci-Fi_Ambiences`\
    \ 音效作为球的滚动声。这并非一个完美的球滚动声，但它是这个资源包中唯一适合循环播放的音频剪辑（图 7-28）。\n\n![A310332_2_En_7_Fig28_HTML.jpg](img/A310332_2_En_7_Fig28_HTML.jpg)\
    \  \n图 7-28. 用于球滚动音效的音频剪辑\n\n将此音频剪辑拖拽至层级视图中的 Ball 游戏对象上，然后选中该球。检视面板中应会显示一个新的 `AudioSource`\
    \ 组件，该组件是自动创建并引用了此音频剪辑的（图 7-29）。\n\n![A310332_2_En_7_Fig29_HTML.jpg](img/A310332_2_En_7_Fig29_HTML.jpg)\
    \  \n图 7-29. 带有音频源的球的检视面板\n\n滚动音效将由脚本控制，而非自动播放，因此请确保**唤醒时播放**复选框未被选中。但当滚动音效播放时，它应持续播放直到被告知停止，因此应选中**循环**复选框。\n\
    \n`AudioClip` 组件是一个 3D 音效，正如 `AudioClip` 名称下方的 `AudioSource` 组件所示。这意味着声音会随着 `AudioSource`\
    \ 组件与 `AudioListener` 组件（附着在主摄像机上）之间的距离而衰减。衰减由 `AudioSource` 组件底部显示的图形指定。你可以通过选择**音量衰减**选项并指定**最小距离**值来调整衰减，该值定义了衰减开始的距离。如果\
    \ `AudioListener` 组件与 `AudioSource` 组件之间的距离小于**最小距离**值，则声音完全不会衰减。你也可以通过沿着曲线拖拽手柄来直接操作衰减曲线。\n\
    \n**提示**  \n如果听不到音频源的声音，可以尝试从较高的**最小距离**值开始，确保能以最大音量听到，然后根据你的喜好调整**最小距离**值和衰减曲线。\n\
    \n用于播放滚动音效的脚本将附着在球上。创建一个新的 JavaScript，将其放在 `Scripts` 文件夹中，并命名为 `FuguBallSound`。然后将代码清单\
    \ 7-6 的内容添加到该脚本中。\n\n```\n#pragma strict\nvar minSpeed:float = 1.0; // 实际上是 minSpeed\
    \ 的平方\nprivate var sqrMinSpeed:float = 1.0;\nprivate var floorTag = \"Floor\"\
    ;\nfunction Awake() {\nsqrMinSpeed = minSpeed * minSpeed;\n}\nfunction OnCollisionStay(collider:Collision)\
    \ {\nif (collider.gameObject.tag == floorTag) {\nif (GetComponent.<AudioSource>().velocity.sqrMagnitude>sqrMinSpeed)\
    \ {\nif (!GetComponent.<AudioSource>().isPlaying) {\nGetComponent.<AudioSource>().Play();\n\
    }\n} else {\nif (GetComponent.<AudioSource>().isPlaying) {\nGetComponent.<AudioSource>().Stop();\n\
    }\n}\n}\n}\nfunction OnCollisionExit(collider:Collision) {\nif (collider.gameObject.tag\
    \ == floorTag) {\nif (GetComponent.<AudioSource>().isPlaying) {\nGetComponent.<AudioSource>().Stop();\n\
    }\n}\n}\n代码清单 7-6. 用于球滚动音效的 FuguBallSound.js 脚本\n```\n\n该脚本与 `FuguForce` 脚本有一些相似之处，因为两者都使用碰撞回调函数来跟踪球何时滚动，并检查碰撞游戏对象的标签以判断是否为地板。`FuguBallSound`\
    \ 只使用了两个 `OnCollision` 回调函数：`OnCollisionStay` 和 `OnCollisionExit`。没有实现 `OnCollisionEnter`，因为它与\
    \ `OnCollisionStay` 是冗余的（`FuguForce` 脚本实际上也不需要 `OnCollisionEnter`）。脚本的两个碰撞回调函数都引用了此组件的\
    \ `audio` 变量，该变量等价于此组件所在游戏对象的 `audio` 变量，并引用了附着的 `AudioSource`。\n\n当球在地板上时，`OnCollisionStay`\
    \ 会检查球的移动速度是否快于一个最小速度，该速度由公开变量 `minSpeed` 指定，以便在检视面板中进行调整。脚本实际上是将球速的平方与 `minSpeed`\
    \ 的平方进行比较，以避免平方根计算带来的性能开销。如果球在地板上且移动速度足够快，并且球的 `AudioSource` 尚未播放其音频剪辑，则脚本会开始播放该音频剪辑。如果球的速度降至足够低，滚动音效将停止。\n\
    \n`OnCollisionExit` 的任务则更简单，它只需要检查音频是否在播放，如果正在播放，则停止播放音频。换句话说，如果球因弹起或滚落而失去与地板的接触，则滚动音效停止。\n\
    \n将该脚本拖拽至层级视图中的球上（图 7-30），然后点击播放进行测试。当球滚动时，应能听到滚动声，当球停止时，声音应消失。\n\n![A310332_2_En_7_Fig30_HTML.jpg](img/A310332_2_En_7_Fig30_HTML.jpg)\
    \  \n图 7-30. 附着在 Ball 游戏对象上的 `FuguBallSound` 脚本\n"
- fmt: "### Add a Pin Collision Sound\n\nNow you’re ready for the pin sound. In place\
    \ of a real bowling pin sound, you’ll make do with the `Coin_Pick_Up_03` sound\
    \ from the Free SFX Pack (Figure [7-31](#A310332_2_En_7_Chapter.html#Fig31)).\n\
    \n![A310332_2_En_7_Fig31_HTML.jpg](Images/A310332_2_En_7_Fig31_HTML.jpg)\n\n**Figure\
    \ 7-31.** The audio clip used for pin collision sounds\n\nSelect the `Pin` prefab\
    \ in the Project view and add an `AudioSource` component using the **Add Component**\
    \ button at the bottom of the Inspector view. Then click to the right of the `AudioClip`\
    \ field of the `AudioSource` component to select `Coin_Pick_Up_03` AudioClip.\
    \ Once again, deselect the **Play On Awake** check box or you’ll hear that sound\
    \ play whenever the game starts. Similar to how the ball-rolling sound is played\
    \ by a script attached to the ball, the Pin collision sounds will be played by\
    \ a script attached to each pin. Create a new JavaScript, place it in the `Scripts`\
    \ folder, and name it `FuguPinSound`. Add the code in Listing [7-7](#A310332_2_En_7_Chapter.html#Par73)\
    \ to the script.\n\n```\n#pragma strict\nvar minSpeed = 0.01;\nfunction OnCollisionEnter(collider:Collision)\
    \ {\nif (collider.relativeVelocity.sqrMagnitude > minSpeed) {\nif (collider.gameObject.tag\
    \ != \"Pin\") {\nGetComponent.<AudioSource>().Play(); // hit anything besides\
    \ another pin, play the sound\n} else {\n// otherwise pin with lower ID gets to\
    \ play\nif (gameObject.GetInstanceID() < collider.gameObject.GetInstanceID())\
    \ \nGetComponent.<AudioSource>().Play();\n}\n}\n}\n```\n\n**Listing 7-7.** `FuguPinSound.js`\
    \ script for Pin Collision Sounds\n\nThis script is different from `FuguBallSound`\
    \ in that it uses the `OnCollisionEnter` callback and not the `OnCollisionStay`\
    \ or `OnCollisionExit` callback. Again, there is a `minSpeed` variable that is\
    \ compared with the squared magnitude of a velocity. But this time the velocity\
    \ is the `relativeVelocity` variable of the collision since both the pin and whatever\
    \ it’s colliding with (the ball or another pin) may both be moving.\n\nHere it\
    \ is assumed that each pin has a tag named `Pin`, so you can test whether the\
    \ pin is colliding with another pin. If the pin is not colliding with another\
    \ pin, then it must be getting hit by the ball or is falling on the floor, in\
    \ which case the script plays the collision sound. If the pin is getting hit by\
    \ another pin, then a decision has to be made about which pin gets to play the\
    \ collision sound. Otherwise, they’ll both play the sound at the same time. A\
    \ simple trick is used to arbitrate. Each object in Unity has a unique ID number\
    \ that can be retrieved by the object function `GetInstanceID`. The rule used\
    \ in the script is that the pin with the lower ID number wins and gets to play\
    \ the collision sound.\n\nTo attach the `FuguPinSound` script to the `BarrelPin`\
    \ prefab, select the prefab in the Project view and use the **Add Component**\
    \ button in the Inspector view to select the script. And while you have the `BarrelPin`\
    \ prefab in the Inspector view, set its tag to `Pin`, as the `FuguPinSound` script\
    \ expects. In the same manner that the `Floor` tag was created and assigned to\
    \ the `Floor` GameObject, select **Add Tag** in the Tag menu, add a tag named\
    \ `Pin` in the TagManager (make sure you’re creating a new tag, not a new layer),\
    \ and select the `Pin` prefab again so that you can use the Tag menu to choose\
    \ the new `Pin` tag. This, by the way, is an example of how a tag can be used\
    \ to identify a group of elements rather than uniquely naming one, like you did\
    \ with the floor.\n\nThe `Barrel` GameObject in your `BarrelPin` prefab should\
    \ now look like Figure [7-32](#A310332_2_En_7_Chapter.html#Fig32) in the Inspector\
    \ view.\n\n![A310332_2_En_7_Fig32_HTML.jpg](Images/A310332_2_En_7_Fig32_HTML.jpg)\n\
    \n**Figure 7-32.** `AudioSource` and `FuguPinSound` script attached to the `BarrelPin`\
    \ prefab\n\nNow when you click **Play** and bowl into the barrels, pleasant coin\
    \ sounds chime in as the barrels bounce around!\n\n### Explore Further\n\nThe\
    \ bowling game is starting to look like a bowling game at this point (whereas\
    \ at the end of the previous chapter, you had at best what could be called a *rolling*\
    \ game). But although the player can roll the ball around and knock down bowling\
    \ pins, you still don’t have the rules of the game. Stay tuned for that in the\
    \ next chapter, which will get much heavier into scripting. In fact, this chapter\
    \ is sort of a turning point, trending to more and more scripting and less introduction\
    \ of new components. So from now on, you should be spending most of your time\
    \ in the Scripting Reference of the Unity documentation.\n\n#### Scripting Reference\n\
    \nThe `Instantiate` function in the `Object` class was introduced to create the\
    \ bowling pins at runtime. This is the function used to spawn GameObjects, typically\
    \ from prefabs. In other games, you might use `Instantiate` to spawn anything\
    \ from pickup items to non-player characters (NPCs). The function is described\
    \ in the “Scripting Overview” section, but its page in “Runtime Classes” has more\
    \ detailed information.\n\nOne new callback, `Awake`, was introduced as an alternative\
    \ to the `Start` callback. The `MonoBehaviour` collision callbacks `OnCollisionEnter`,\
    \ `OnCollisionStay`, and `OnCollisionExit` were introduced in the previous chapter\
    \ but used again for the rolling and collision sounds. The `Collision` class for\
    \ information on collisions, `relativeVelocity`, the `GameObject` that was collided\
    \ against. Other data such as the actual point of contact are also available.\n\
    \nThe page for the `Rigidbody` component is worth reading in its entirety. Its\
    \ variables correspond largely to the properties available in the Inspector view,\
    \ and besides the `AddForce` function you used to push the ball, there are many\
    \ related functions: `AddRelativeForce`, `AddTorque`, `AddRelativeTorque`, `AddExplosionForce`,\
    \ and `AddForceAtPosition`.\n\nThe `Transform` class was used again, this time\
    \ checking `Transform.position` to determine whether the ball had rolled off the\
    \ floor. Since Quaternions were mentioned, take a look at the `rotation` and `localRotation`\
    \ variables in `Transform` and compare them to the `eulerAngles` and `localEulerAngles`\
    \ variables. From the `GameObject` class, the `SendMessage` and `BroadcastMessage`\
    \ functions were used to invoke the `ResetPosition` functions in other GameObjects.\
    \ There’s also a `SendMessageUpward` function that works like `BroadcastMessage`,\
    \ except the message is sent up the GameObject’s hierarchy instead of down. The\
    \ message functions are also defined in the `Component` class.\n\n`AudioSource`\
    \ functions were used to play and stop audio clips. Other functions are useful\
    \ if you want to refine your sound code. For example, the HyperBowl rolling sound\
    \ code changes the volume of the sound (using the `AudioSource.volume` variable)\
    \ according to the ball’s velocity, which not only provides a nicer rolling sound\
    \ but also a softer cutoff of the sound when stopping.\n\n#### Assets\n\nYou saw\
    \ the Asset Store has a bountiful selection of free barrel models and sound libraries.\
    \ And there’s much more if you don’t restrict yourself to free assets.\n\nAlthough\
    \ the Asset Store doesn’t yet have bowling pin models, it’s not hard to find some\
    \ on 3D model marketplaces such as [`http://Turbosquid.com/`](http://turbosquid.com/).\
    \ Free audio, including bowling sounds, is available on the Creative Common–licensed\
    \ [`http://freesound.org/`](http://freesound.org/)."
  raw: '### Add a Pin Collision Sound


    Now you’re ready for the pin sound. In place of a real bowling pin sound, you’ll
    make do with the Coin_Pick_Up_03 sound from the Free SFX Pack (Figure [7-31](#A310332_2_En_7_Chapter.html#Fig31)).


    ![A310332_2_En_7_Fig31_HTML.jpg](Images/A310332_2_En_7_Fig31_HTML.jpg)


    Figure 7-31.


    The audio clip used for pin collision sounds


    Select the Pin prefab in the Project view and add an AudioSource component using
    the Add Component button at the bottom of the Inspector view. Then click to the
    right of the AudioClip field of the AudioSource component to select Coin_Pick_Up_03
    AudioClip. Once again, deselect the Play On Awake check box or you’ll hear that
    sound play whenever the game starts. Similar to how the ball-rolling sound is
    played by a script attached to the ball, the Pin collision sounds will be played
    by a script attached to each pin. Create a new JavaScript, place it in the Scripts
    folder, and name it FuguPinSound . Add the code in Listing [7-7](#A310332_2_En_7_Chapter.html#Par73)
    to the script.


    ```

    #pragma strict

    var minSpeed = 0.01;

    function OnCollisionEnter(collider:Collision) {

    if (collider.relativeVelocity.sqrMagnitude > minSpeed) {

    if (collider.gameObject.tag != "Pin") {

    GetComponent.().Play(); // hit anything besides another pin, play the sound

    } else {

    // otherwise pin with lower ID gets to play

    if (gameObject.GetInstanceID() ().Play();

    }

    }

    }

    Listing 7-7.

    FuguPinSound.js script for Pin Collision Sounds

    ```


    This script is different from FuguBallSound in that it uses the OnCollisionEnter
    callback and not the OnCollisionStay or OnCollisionExit callback. Again, there
    is a minSpeed variable that is compared with the squared magnitude of a velocity.
    But this time the velocity is the relativeVelocity variable of the collision since
    both the pin and whatever it’s colliding with (the ball or another pin) may both
    be moving.


    Here it is assumed that each pin has a tag named Pin, so you can test whether
    the pin is colliding with another pin. If the pin is not colliding with another
    pin, then it must be getting hit by the ball or is falling on the floor, in which
    case the script plays the collision sound. If the pin is getting hit by another
    pin, then a decision has to be made about which pin gets to play the collision
    sound. Otherwise, they’ll both play the sound at the same time. A simple trick
    is used to arbitrate. Each object in Unity has a unique ID number that can be
    retrieved by the object function GetInstanceID. The rule used in the script is
    that the pin with the lower ID number wins and gets to play the collision sound
    .


    To attach the FuguPinSound script to the BarrelPin prefab, select the prefab in
    the Project view and use the Add Component button in the Inspector view to select
    the script. And while you have the BarrelPin prefab in the Inspector view, set
    its tag to Pin, as the FuguPinSound script expects. In the same manner that the
    Floor tag was created and assigned to the Floor GameObject, select Add Tag in
    the Tag menu, add a tag named Pin in the TagManager (make sure you’re creating
    a new tag, not a new layer), and select the Pin prefab again so that you can use
    the Tag menu to choose the new Pin tag. This, by the way, is an example of how
    a tag can be used to identify a group of elements rather than uniquely naming
    one, like you did with the floor.


    The Barrel GameObject in your BarrelPin prefab should now look like Figure [7-32](#A310332_2_En_7_Chapter.html#Fig32)
    in the Inspector view.


    ![A310332_2_En_7_Fig32_HTML.jpg](Images/A310332_2_En_7_Fig32_HTML.jpg)


    Figure 7-32.


    AudioSource and FuguPinSound script attached to the BarrelPin prefab


    Now when you click Play and bowl into the barrels, pleasant coin sounds chime
    in as the barrels bounce around!


    ## Explore Further


    The bowling game is starting to look like a bowling game at this point (whereas
    at the end of the previous chapter, you had at best what could be called a rolling
    game ). But although the player can roll the ball around and knock down bowling
    pins, you still don’t have the rules of the game. Stay tuned for that in the next
    chapter, which will get much heavier into scripting. In fact, this chapter is
    sort of a turning point, trending to more and more scripting and less introduction
    of new components. So from now on, you should be spending most of your time in
    the Scripting Reference of the Unity documentation.


    ### Scripting Reference


    The Instantiate function in the Object class was introduced to create the bowling
    pins at runtime. This is the function used to spawn GameObjects, typically from
    prefabs. In other games, you might use Instantiate to spawn anything from pickup
    items to non-player characters (NPCs). The function is described in the “Scripting
    Overview” section, but its page in “Runtime Classes” has more detailed information.


    One new callback, Awake, was introduced as an alternative to the Start callback.
    The MonoBehaviour collision callbacks OnCollisionEnter, OnCollisionStay, and OnCollisionExit
    were introduced in the previous chapter but used again for the rolling and collision
    sounds. The Collision class for information on collisions, relative velocity,
    the GameObject that was collided against. Other data such as the actual point
    of contact are also available.


    The page for the Rigidbody component is worth reading in its entirety. Its variables
    correspond largely to the properties available in the Inspector view, and besides
    the AddForce function you used to push the ball, there are many related functions:
    AddRelativeForce, Add Torque, AddRelativeTorque, AddExplosionForce, and AddForceAtPosition.


    The Transform class was used again, this time checking Transform.position to determine
    whether the ball had rolled off the floor. Since Quaternions were mentioned, take
    a look at the rotation and localRotation variables in Transform and compare them
    to the eulerAngles and localEulerAngles variables. From the GameObject class,
    the SendMessage and BroadcastMessage functions were used to invoke the ResetPosition
    functions in other GameObjects. There’s also a SendMessageUpward function that
    works like BroadcastMessage, except the message is sent up the GameObject’s hierarchy
    instead of down. The message functions are also defined in the Component class.


    AudioSource functions were used to play and stop audio clips. Other functions
    are useful if you want to refine your sound code. For example, the HyperBowl rolling
    sound code changes the volume of the sound (using the AudioSource.volume variable)
    according to the ball’s velocity, which not only provides a nicer rolling sound
    but also a softer cutoff of the sound when stopping.


    ### Assets


    You saw the Asset Store has a bountiful selection of free barrel models and sound
    libraries. And there’s much more if you don’t restrict yourself to free assets.


    Although the Asset Store doesn’t yet have bowling pin models, it’s not hard to
    find some on 3D model marketplaces such as [`http://Turbosquid.com/`](http://turbosquid.com/)
    . Free audio, including bowling sounds , is available on the Creative Common–licensed
    [`http://freesound.org/`](http://freesound.org/) .'
  trans: "\n### 添加球瓶碰撞音效\n\n现在你可以开始处理球瓶音效了。我们将使用免费 SFX 包中的 `Coin_Pick_Up_03` 音效来替代真实的保龄球瓶碰撞声（见图\
    \ 7-31）。\n\n![A310332_2_En_7_Fig31_HTML.jpg](img/A310332_2_En_7_Fig31_HTML.jpg)\n\
    \n**图 7-31.** 用于球瓶碰撞音效的音频片段\n\n在项目视图中选择 `Pin` 预制件，然后使用检查器视图底部的**添加组件**按钮添加一个 `AudioSource`\
    \ 组件。接着，点击 `AudioSource` 组件的 `AudioClip` 字段右侧，选择 `Coin_Pick_Up_03` 音频片段。再次取消勾选**Play\
    \ On Awake**复选框，否则每次游戏启动时都会播放该音效。与球体滚动音效由附加在球体上的脚本播放类似，球瓶碰撞音效将由附加在每个球瓶上的脚本播放。创建一个新的\
    \ JavaScript 脚本，将其放置在 `Scripts` 文件夹中，并命名为 `FuguPinSound`。将代码清单 7-7 中的代码添加到该脚本中。\n\
    \n```\n#pragma strict\nvar minSpeed = 0.01;\nfunction OnCollisionEnter(collider:Collision)\
    \ {\nif (collider.relativeVelocity.sqrMagnitude > minSpeed) {\nif (collider.gameObject.tag\
    \ != \"Pin\") {\nGetComponent.<AudioSource>().Play(); // 击中除了其他球瓶以外的任何物体，播放音效\n\
    } else {\n// 否则，ID 较小的球瓶获得播放权\nif (gameObject.GetInstanceID() < collider.gameObject.GetInstanceID())\
    \ \nGetComponent.<AudioSource>().Play();\n}\n}\n}\n```\n\n**代码清单 7-7.** 用于球瓶碰撞音效的\
    \ `FuguPinSound.js` 脚本\n\n此脚本与 `FuguBallSound` 的不同之处在于，它使用了 `OnCollisionEnter`\
    \ 回调函数，而非 `OnCollisionStay` 或 `OnCollisionExit` 回调函数。同样，这里也有一个 `minSpeed` 变量，用于与速度的平方大小进行比较。但这次的速度是碰撞的\
    \ `relativeVelocity` 变量，因为球瓶及其碰撞对象（球或其他球瓶）可能都在移动。\n\n这里假定每个球瓶都有一个名为 `Pin` 的标签，因此你可以测试球瓶是否正在与另一个球瓶碰撞。如果球瓶没有与另一个球瓶碰撞，那么它一定被球击中或正在掉落到地板上，此时脚本会播放碰撞音效。如果球瓶被另一个球瓶击中，则需要决定哪个球瓶来播放碰撞音效。否则，它们会同时播放音效。这里使用了一个简单的技巧来进行仲裁。Unity\
    \ 中的每个对象都有一个唯一的 ID 号，可以通过对象函数 `GetInstanceID` 获取。脚本中使用的规则是，ID 较小的球瓶获胜并获得播放碰撞音效的权限。\n\
    \n要将 `FuguPinSound` 脚本附加到 `BarrelPin` 预制件上，请在项目视图中选择该预制件，然后使用检查器视图中的**添加组件**按钮选择该脚本。在检查器视图中选中\
    \ `BarrelPin` 预制件时，同时将其标签设置为 `Pin`，这与 `FuguPinSound` 脚本的预期一致。与创建 `Floor` 标签并将其分配给\
    \ `Floor` 游戏对象的方式相同，在标签菜单中选中**添加标签**，在标签管理器（TagManager）中添加一个名为 `Pin` 的标签（确保创建的是新标签，而非新图层），然后再次选择\
    \ `Pin` 预制件，以便使用标签菜单选择新的 `Pin` 标签。顺便说一下，这是一个示例，说明了如何通过标签来标识一组元素，而不是像处理地板那样为每个元素指定唯一的名称。\n\
    \n现在，`BarrelPin` 预制件中的 `Barrel` 游戏对象在检查器视图中应如图 7-32 所示。\n\n![A310332_2_En_7_Fig32_HTML.jpg](img/A310332_2_En_7_Fig32_HTML.jpg)\n\
    \n**图 7-32.** 附加到 `BarrelPin` 预制件上的 `AudioSource` 和 `FuguPinSound` 脚本\n\n现在，当你点击**播放**并将球滚向木桶时，随着木桶的弹跳，会响起悦耳的硬币音效！\n\
    \n### 进一步探索\n\n此时，保龄球游戏开始变得像模像样了（而在上一章结束时，你充其量只能称之为一个*滚动*游戏）。但是，尽管玩家可以滚动球并击倒球瓶，你却仍然没有游戏规则。敬请期待下一章，其中将大量涉及脚本编写。事实上，本章算是一个转折点，趋势是脚本编写越来越多，而新组件的介绍越来越少。因此，从现在开始，你应该将大部分时间花在\
    \ Unity 文档的脚本参考部分。\n\n#### 脚本参考\n\n我们引入了 `Object` 类中的 `Instantiate` 函数，以在运行时创建保龄球瓶。该函数用于生成游戏对象，通常是从预制件生成。在其他游戏中，你可能会使用\
    \ `Instantiate` 来生成从拾取物品到非玩家角色（NPC）的各种对象。该函数在“脚本概述”部分有描述，但“运行时类”中的页面提供了更详细的信息。\n\
    \n引入了一个新的回调函数 `Awake`，作为 `Start` 回调的替代。上一章介绍了 MonoBehaviour 碰撞回调函数 `OnCollisionEnter`、`OnCollisionStay`\
    \ 和 `OnCollisionExit`，本章再次用于滚动和碰撞音效。`Collision` 类用于获取碰撞信息，如 `relativeVelocity`、所碰撞的\
    \ `GameObject`。其他数据，如实际的接触点，也可获取。\n\n`Rigidbody` 组件的页面值得完整阅读。其变量与检查器视图中可用的属性大致对应，除了你用来推动球的\
    \ `AddForce` 函数之外，还有许多相关函数：`AddRelativeForce`、`AddTorque`、`AddRelativeTorque`、`AddExplosionForce`\
    \ 和 `AddForceAtPosition`。\n\n再次使用了 `Transform` 类，这次是通过检查 `Transform.position`\
    \ 来确定球是否滚出了地板。由于提到了四元数，请查看 `Transform` 中的 `rotation` 和 `localRotation` 变量，并将其与\
    \ `eulerAngles` 和 `localEulerAngles` 变量进行比较。从 `GameObject` 类中，使用 `SendMessage`\
    \ 和 `BroadcastMessage` 函数来调用其他游戏对象中的 `ResetPosition` 函数。还有一个 `SendMessageUpward`\
    \ 函数，其工作方式类似于 `BroadcastMessage`，区别在于消息是沿游戏对象的层级结构向上而非向下发送。消息函数也在 `Component`\
    \ 类中定义。\n\n使用 `AudioSource` 函数来播放和停止音频片段。如果你想优化音效代码，其他函数也很有用。例如，HyperBowl 的滚动音效代码会根据球的速度改变音量（使用\
    \ `AudioSource.volume` 变量），这不仅提供了更逼真的滚动音效，而且在停止时也能更柔和地切断声音。\n\n#### 资源\n\n你看到了\
    \ Asset Store 有大量免费的木桶模型和音效库可供选择。如果你不局限于免费资源，还有更多选择。\n\n虽然 Asset Store 还没有保龄球瓶模型，但在诸如\
    \ [`http://Turbosquid.com/`](http://turbosquid.com/) 这样的 3D 模型市场上不难找到。包括保龄球音效在内的免费音频，可在基于知识共享许可的\
    \ [`http://freesound.org/`](http://freesound.org/) 上找到。\n"
- fmt: '# 8. Let’s Play! Scripting the Game


    Your bowling game that has been taking shape over the past few chapters is starting
    to actually look like a bowling game! It has a bowling ball, bowling pins (or
    rather, the barrels added in the previous chapter), game controls, and game physics.
    But it’s still more a toy than a game since it lacks game rules and scoring. That
    will be remedied in this chapter with a healthy dose of scripting. Most of that
    will take place in the game controller script, `FuguBowlPlayer.js`, which will
    be filled out with the complete logic for a bowling game laid out as states in
    a finite state machine (FSM). The scoring rules are complicated, so those will
    be encapsulated in a script named `FuguBowlPlayer.js`.


    The good news is that, for once, there are no added assets in this chapter besides
    the `FuguBowlPlayer` script. The bad news is that there’s a lot of new code to
    type in, particularly in the game controller script. Although it may be tempting
    to just copy the online version of the `FuguBowl` script from the project for
    this chapter at [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739),
    it’ll be easier to get the hang of implementing game logic for future projects
    if you put it together from scratch, piece by piece (or in the case of an FSM,
    state by state). The same goes for the new `FuguBowlPlayer` script.


    ## The Game Rules


    Let’s quickly go over the rules of bowling. A game consists of ten frames. In
    each frame, you have up to two balls to knock down all ten pins. If you knock
    down all ten with the first ball, it’s called a strike, and you advance to the
    next frame. If you knock down all ten pins with two balls, then it’s called a
    spare. In the tenth frame, if you get a spare or strike, then you’re awarded a
    bonus third (and final) ball. The final game score is the sum of the scores from
    each frame. The score for a frame is the number of pins knocked down in that frame,
    except when it’s a spare or strike. If it’s a spare, it’s the number of pins knocked
    down (ten), plus the number of pins knocked down with the next ball. If it’s a
    strike, it’s also ten but added to the number of pins knocked down from the next
    two balls. So, a “perfect” game, 12 consecutive strikes, results in a score of
    300 (I leave that calculation as an exercise for you).


    ## Scoring the Game


    The `FuguBowl` script already defines a class that represents your game, but it
    makes sense to encapsulate the score code in a player class since conceptually
    there is a player (and potentially more than one, although not in this particular
    game) and the score is associated with the player.


    Moreover, the scoring rules for bowling are not simple. Placing the code for the
    bowling score calculation in a separate script not only keeps the game controller
    script smaller and more readable but also allows reuse of the score code for other
    bowling games.


    To begin, create a new JavaScript, name it `FuguBowlPlayer`, and place it in the
    Scripts folder (Figure 8-1).


    ![A310332_2_En_8_Fig1_HTML.jpg](Images/A310332_2_En_8_Fig1_HTML.jpg)


    Figure 8-1. Creating the `FuguBowlPlayer` script


    ### The Frame Score


    In the `FuguBowlPlayer` script, before implementing the `FuguBowlPlayer` class,
    let’s start with a supporting class called `FuguBowlScore` that represents the
    score for a single bowling frame (Listing 8-1). It’s small enough and not a `MonoBehavior`
    in its own right (no `Start` or `Update` callbacks, for example), so it’s fine
    to just add it to the `FuguBowlPlayer` script.


    ```

    class FuguBowlScore {

    var ball1:int; // pins down for ball 1

    var ball2:int; // pins down for ball 2

    var ball3:int; // pins down for ball 3

    var total:int; // total score for this frame (may include future rolls)

    function Clear() {

    ball1 = -1;

    ball2 = -1;

    ball3 = -1;

    total = -1;

    }

    function IsSpare():boolean {

    // doesn''t handle spare on ball3

    return !IsStrike() &&

    (ball1 + ball2 == 10);

    }

    function IsStrike():boolean {

    return ball1 == 10;

    }

    }

    Listing 8-1. The `FuguBowlScore` Class in `FuguBowlPlayer.js`

    ```


    The `FuguBowlScore` class is simple and doesn’t inherit from any other class (it
    could well be defined as a `struct` instead of a `class`, except JavaScript doesn’t
    support defining new `struct`s). The class includes instance variables that represent
    the score for the first ball rolled, the second ball, and (only relevant in the
    tenth frame) the bonus ball. `FuguBowlScore` also has a variable to hold the total
    score for the frame, which can depend on the result of future rolls if the current
    frame is a spare or strike.


    Each of the variables needs a way to indicate that its score hasn’t been calculated.
    The scores for `ball1`, `ball2`, and `ball3` aren’t available until that ball
    has been rolled. The total score isn’t available until the bowling for this frame
    is complete, and even then, if the result has been a spare or strike, the score
    still cannot be calculated until the next ball or two have been rolled.


    Leaving the score values as zero won’t work since zero is a valid score when the
    player doesn’t knock down any pins. But there’s no way a negative score can be
    rolled, so -1 will work fine as an indicator that a score has not been calculated
    yet. The `Clear` function in `FuguBowlScore` initializes this frame by setting
    all the variables to this number.


    Besides the `Clear` function, the `FuguBowlScore` class has two other member functions.
    `IsStrike` returns `true` if there has been a strike rolled in this frame. That
    can be tested easily by seeing whether the number of pins knocked down with the
    first ball is ten. The `IsSpare` function is only slightly more complex; it returns
    `true` if the sum of the pins knocked down by the first and second balls is ten,
    but only if there isn’t a strike in this frame (in other words, if you’re not
    adding ten pins from the first ball and zero pins from the second ball).


    Notice the `:boolean` that is added to the two function declarations. That makes
    it clear that each of these functions returns a Boolean value, although the compiler
    can infer the return type from the code.'
