  trans: "\n# StateBall1\n\n`StateBall1`（清单 8-18）执行的第一个操作是重置球瓶、球以及主摄像机的**位置**。在该状态首次进入时（即游戏开始时），这并不是必须的；但当玩家完成一局的投球并切换回此状态时，需要将所有物体恢复到起始位置和旋转角度（被击倒的球瓶旋转角度会发生变化）。\n\
    \n```\nfunction StateBall1() {\n  ResetEverything(); // 重置球瓶、摄像机和球\n  roll = Roll.Ball1;\n\
    \  state = \"StateRolling\";\n}\n```\n\n执行重置后，该状态将 `roll` 变量设置为 `Roll.Ball1`，表示玩家正在投这一局的第一球。最后，该状态切换到\
    \ `StateRolling`，即球滚向球瓶时所处的状态。\n\n# StateBall2\n\n与 `StateBall1` 类似，`StateBall2`（清单\
    \ 8-19）首先重置球和主摄像机。\n\n```\nfunction StateBall2() {\n  ResetBall();\n  ResetCamera();\n\
    \  if (GetPinsDown() == 10) {\n    ResetPins();\n  } else {\n    RemoveDownedPins();\n\
    \  }\n  roll = Roll.Ball2;\n  state = \"StateRolling\";\n}\n```\n\n如果玩家进入此状态，通常意味着该局的第一球没有打出全中，现在需要在清理上一轮倒下的球瓶后，尝试击倒剩余球瓶。但如果所有球瓶都已倒下，则一定是第十局中的特殊情况：全中后还需投两球，此时球瓶需重置。\n\
    \n在退出该状态前，`roll` 被设置为 `Roll.Ball2`，与 `StateBall1` 一样，下一个状态设置为 `StateRolling`。\n\
    \n# StateBall3\n\n说到第十局，这是唯一出现 `StateBall3`（清单 8-20）的情况，因为只有在那局中玩家才能投掷三次。\n\n\
    ```\nfunction StateBall3() {\n  ResetBall();\n  ResetCamera();\n  if (GetPinsDown()\
    \ == 10) {\n    ResetPins();\n  } else {\n    RemoveDownedPins();\n  }\n  roll\
    \ = Roll.Ball3;\n  state = \"StateRolling\";\n}\n```\n\n`StateBall3` 与 `StateBall2`\
    \ 一样，重置球的位置。如果玩家在该局的前几次投掷中击倒了十个球瓶（补中或两次全中），则重置球瓶；否则，清理上一轮倒下的球瓶。同样，该状态将 `roll`\
    \ 变量设置为 `Roll.Ball3`，并切换到 `StateRolling`。\n\n# StateRolling\n\n`StateRolling`（清单\
    \ 8-21）大致实现了第七章中创建并在本章前面弃用的 `Update` 函数。该状态每帧都会让出控制权，除了等待球的控制权应被释放外，不做任何操作。\n\n\
    ```\nfunction StateRolling() {\n  while (true) {\n    // 当球到达球瓶时释放控制\n    if (ball.transform.position.z\
    \ > pinPos.z) {\n      state = \"StateRolledPast\";\n      return;\n    }\n  \
    \  // 洗沟球\n    if (ball.transform.position.y < sunkHeight) {\n      state = \"\
    StateGutterBall\";\n      return;\n    }\n    yield;\n  }\n}\n```\n\n有两种情况可以确定投球结束：一种是球滚出球道边缘，这基本上与正常保龄球游戏中的洗沟球情况相同；另一种是球已滚动到球瓶位置（如果玩家不释放控制，游戏会变得过于简单——你可以像怪兽卡车一样在球瓶间来回碾压！）。\n\
    \n检测洗沟球很简单。与现已移除的 `Update` 回调类似，该状态检查球是否已下降到 `sunkHeight` 变量指定的 y 轴位置以下。如果是，则切换到洗沟球状态。另一种情况也几乎同样简单：检查球的\
    \ z 轴位置是否超过了第一个球瓶的 z 轴位置。本质上，该状态是在检查球是否已到达从左到右横跨球道、球瓶所在的“球瓶线”。如果到达，则切换到 `StateRolledPast`。\n\
    \n实际上，你在绘制有限状态机草图时并没有考虑加入 `StateGutterBall` 和 `StateRolledPast` ，但这并不棘手。你现在可以直接插入这些状态，取代之前\
    \ `StateRolling` 和 `StateRollOver` 之间的直接转换。\n"
- fmt: "#### `StateRolledPast`\n\nAfter rolling far enough to reach the pins, the\
    \ `StateRolledPast` state is entered (Listing [8-22](#A310332_2_En_8_Chapter.html#Par108)).\
    \ This state “lets go” of the ball by disabling the `Ball` and `Main Camera` controls.\n\
    \n```\nfunction StateRolledPast() {\n\tvar follow:Behaviour = Camera.main.GetComponent(\"\
    SmoothFollow\");\n\tif (follow != null) {\n\t\tfollow.enabled = false;\n\t}\n\t\
    ball.GetComponent(FuguForce).enabled = false;\n\tyield WaitForSeconds(rolledPastTime);\n\
    \tstate = \"StateRollOver\";\n}\nListing 8-22.\nThe State Entered When Reaching\
    \ the Pins in FuguBowl.js\n```\n\nTo disable the `Main Camera` `SmoothFollow`\
    \ script, the state accesses the `Main Camera` through the static variable `main`\
    \ in the `Camera` class and calls `GetComponent` on that `GameObject`, passing\
    \ in `SmoothFollow` as the class of the component to be retrieved. That returns\
    \ the `SmoothFollow` script that’s attached to the `Main Camera`. The script is\
    \ then assigned to a local variable named `follow`.\n\nThe `follow` variable is\
    \ declared to be of type `Behaviour`, which is a direct subclass of `Component`.\
    \ A `Behaviour` can be enabled or disabled by setting its `enabled` variable.\
    \ The `follow` variable could instead have been declared as a more specific class\
    \ like `MonoBehaviour` (a subclass of `Behaviour` and the parent class of any\
    \ script that can be attached to a `GameObject`) or even `SmoothFollow`, the most\
    \ specific class of the `SmoothFollow` script because all of those classes inherit\
    \ the `enabled` variable from `Behaviour`. But choosing the most general class\
    \ that’s suitable provides the most flexibility. For example, if you declared\
    \ `follow` to be of type `SmoothFollow` and then later opted to use a different\
    \ camera control script, you would have to adjust the type declaration for `follow`.\n\
    \n**Tip**\n\nFor type declarations, use the most general class that implements\
    \ the functions and variables you need.\n\nAnother reason not to declare `follow`\
    \ to be of type `SmoothFollow` is that the version of this project available on\
    \ [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739) doesn’t\
    \ include any Asset Store or Standard Assets packages, including the `SmoothFollow`\
    \ script. Referencing the `SmoothFollow` class when it’s not available in the\
    \ project will result in a compiler error.\n\nThis is the reason why `SmoothFollow`\
    \ is passed to `GetComponent` as a `String` so that it’s not used to find a class\
    \ until `GetComponent` is called at runtime, at which point `GetComponent` returns\
    \ null. Attempting to access the `enabled` variable on null will result in an\
    \ error, so the state first checks whether `follow` is null before attempting\
    \ to disable it. The `FuguForce` script attached to the ball is disabled in a\
    \ similar manner, by calling `GetComponent` on the ball to retrieve the `FuguForce`\
    \ script and then setting its `enabled` variable to false. But, unlike the `Main\
    \ Camera` and the `SmoothFollow` script, because you’re certain the ball has a\
    \ `FuguForce` script attached, there’s no need to perform a null check test before\
    \ disabling the script.\n\nFurthermore, `GetComponent` is an overloaded function\
    \ with one version taking a `String` argument and the other taking a class directly.\
    \ So, instead of passing the `String` `\"FuguForce\"` to `GetComponent`, the class\
    \ `FuguForce` is passed directly. This way, a compiler error will result if the\
    \ class name is misspelled (e.g., `GetComponent(FuguFource)`).\n\nPassing in a\
    \ misspelled `String` name of a class (e.g., `GetComponent(\"FuguFource\")`) won’t\
    \ result in an error at compile time, which may at first sound like a good thing,\
    \ but it’s better to catch problems early. At runtime, that call to `GetComponent`\
    \ will return null, which could result in a crash if the code is expecting a non-null\
    \ result, or just produce aggravating debugging sessions, as you wonder why that\
    \ script isn’t getting disabled as you expect.\n\n**Tip**\n\nLet the compiler\
    \ do your error checking whenever possible.\n\nAt some point, the `SmoothFollow`\
    \ and `FuguForce` scripts have to be reenabled. The natural place to do that is\
    \ in the `ResetCamera` and `ResetBall` functions (Listing [8-23](#A310332_2_En_8_Chapter.html#Par118)),\
    \ as they get called when a roll is over and the `Main Camera` and `Ball GameObjects`,\
    \ respectively, are reset to start another roll.\n\n```\nfunction ResetBall()\
    \ {\n\tball.GetComponent(FuguForce).enabled = true;\n\tball.SendMessage(\"ResetPosition\"\
    );\n}\nfunction ResetCamera() {\n\tvar follow:Behaviour = Camera.main.GetComponent(\"\
    SmoothFollow\");\n\tif (follow != null) {\n\t\tfollow.enabled = true;\n\t}\n\t\
    Camera.main.SendMessage(\"ResetPosition\");\n}\nListing 8-23.\nResetBall and ResetCamera\
    \ Functions in FuguBowl.js\n```\n\nIn both the `ResetBall` and `ResetCamera` functions,\
    \ the code to enable the script component is the same one used to disable the\
    \ script, except the `enabled` variable is set to true.\n\nAfter disabling both\
    \ the `FuguForce` and `SmoothFollow` scripts , `StateRolledPast` waits five seconds\
    \ before transitioning to the next state, `StateRollOver`, allowing time for the\
    \ ball to roll into the pins (or past the pins). A `while` loop that calls `yield`\
    \ until the desired amount of time has passed (by checking `Time.time`) would\
    \ do the trick, but it’s much more convenient to call `yield` on the function\
    \ `WaitForSeconds`, which takes a number of seconds as an argument. (In `StateRolledPast`,\
    \ the number of seconds is hard-coded to 5, but it could easily be a public variable\
    \ to allow customization.) As a result, the coroutine `StateRolledPast` will essentially\
    \ pause (without blocking execution in the rest of Unity) until the given time\
    \ has elapsed.\n\n#### `StateGutterBall`\n\nThe gutter ball state is a lot simpler\
    \ than `StateRolledPast`. It just transitions directly to `StateRollOver` (Listing\
    \ [8-24](#A310332_2_En_8_Chapter.html#Par122)).\n\n```\nfunction StateGutterBall()\
    \ {\n\tstate = \"StateRollOver\";\n}\nListing 8-24.\nThe State for a Gutter Ball\
    \ in FuguBowl.js\n```\n\nAlthough it seems `StateRolling` could transition directly\
    \ to `StateRollOver` instead of passing through `StateGutterBall`, the inclusion\
    \ of `StateGutterBall` provides some symmetry with `StateRolledPast`. In a polished\
    \ bowling game, you would most likely implement some kind of feedback that you\
    \ rolled a gutter ball. For example, in HyperBowl, animated letters spelling out\
    \ “Gutter” fly across the screen (Figure [8-7](#A310332_2_En_8_Chapter.html#Fig7)),\
    \ and this animation takes place in `StateGutterBall`.\n\n![A310332_2_En_8_Fig7_HTML.jpg](Images/A310332_2_En_8_Fig7_HTML.jpg)\n\
    \n**Figure 8-7.** Animated text for a gutter ball in HyperBowl\n\nThose letters\
    \ are animated with iTween, by the way. You aren’t limited to visual feedback\
    \ either. In my Fugu Bowl app on the App Store, `StateGutterBall` plays the sound\
    \ of kids booing!"
  raw: '#### StateRolledPast


    After rolling far enough to reach the pins, the StateRolledPast state is entered
    (Listing [8-22](#A310332_2_En_8_Chapter.html#Par108)). This state “lets go” of
    the ball by disabling the Ball and Main Camera controls.


    ```

    function StateRolledPast() {

    var follow:Behaviour = Camera.main.GetComponent("SmoothFollow");

    if (follow != null) {

    follow.enabled = false;

    }

    ball.GetComponent(FuguForce).enabled = false;

    yield WaitForSeconds(rolledPastTime);

    state = "StateRollOver";

    }

    Listing 8-22.

    The State Entered When Reaching the Pins in FuguBowl.js

    ```


    To disable the Main Camera SmoothFollow script, the state accesses the Main Camera
    through the static variable main in the Camera class and calls GetComponent on
    that GameObject, passing in SmoothFollow as the class of the component to be retrieved.
    That returns the SmoothFollow script that’s attached to the Main Camera. The script
    is then assigned to a local variable named follow.


    The follow variable is declared to be of type Behaviour, which is a direct subclass
    of Component. A Behaviour can be enabled or disabled by setting its enabled variable.
    The follow variable could instead have been declared as a more specific class
    like MonoBehaviour (a subclass of Behaviour and the parent class of any script
    that can be attached to a GameObject) or even SmoothFollow, the most specific
    class of the SmoothFollow script because all of those classes inherit the enabled
    variable from Behaviour. But choosing the most general class that’s suitable provides
    the most flexibility. For example, if you declared follow to be of type SmoothFollow
    and then later opted to use a different Camera control script, you would have
    to adjust the type declaration for follow.


    Tip


    For type declarations, use the most general class that implements the functions
    and variables you need.


    Another reason not to declare follow to be of type SmoothFollow is that the version
    of this project available on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    doesn’t include any Asset Store or Standard Assets packages, including the SmoothFollow
    script. Referencing the SmoothFollow class when it’s not available in the project
    will result in a compiler error.


    This is the reason why SmoothFollow is passed to GetComponent as a String so that
    it’s not used to find a class until GetComponent is called at runtime, at which
    point GetComponent returns null. Attempting to access the enabled variable on
    null will result in an error, so the state first checks whether follow is null
    before attempting to disable it. The FuguForce script attached to the ball is
    disabled in a similar manner, by calling GetComponent on the ball to retrieve
    the FuguForce script and then setting its enabled variable to false. But, unlike
    the Main Camera and the SmoothFollow script, because you’re certain the ball has
    a FuguForce script attached, there’s no need to perform a null check test before
    disabling the script.


    Furthermore, GetComponent is an overloaded function with one version taking a
    String argument and the other taking a class directly. So, instead of passing
    the String "FuguForce" to GetComponent, the class FuguForce is passed directly.
    This way, a compiler error will result if the class name is misspelled (e.g.,
    GetComponent(FuguFource)).


    Passing in a misspelled String name of a class (e.g., GetComponent("FuguFource"))
    won’t result in an error at compile time, which may at first sound like a good
    thing, but it’s better to catch problems early. At runtime, that call to GetComponent
    will return null, which could result in a crash if the code is expecting a non-null
    result, or just produce aggravating debugging sessions, as you wonder why that
    script isn’t getting disabled as you expect.


    Tip


    Let the compiler do your error checking whenever possible.


    At some point, the SmoothFollow and FuguForce scripts have to be reenabled. The
    natural place to do that is in the ResetCamera and ResetBall functions (Listing
    [8-23](#A310332_2_En_8_Chapter.html#Par118)), as they get called when a roll is
    over and the Main Camera and Ball GameObjects, respectively, are reset to start
    another roll.


    ```

    function ResetBall() {

    ball.GetComponent(FuguForce).enabled = true;

    ball.SendMessage("ResetPosition");

    }

    function ResetCamera() {

    var follow:Behaviour = Camera.main.GetComponent("SmoothFollow");

    if (follow != null) {

    follow.enabled = true;

    }

    Camera.main.SendMessage("ResetPosition");

    }

    Listing 8-23.

    ResetBall and ResetCamera Functions in FuguBowl.js

    ```


    In both the ResetBall and ResetCamera functions, the code to enable the script
    component is the same one used to disable the script, except the enabled variable
    is set to true.


    After disabling both the FuguForce and SmoothFollow scripts , StateRolledPast
    waits five seconds before transitioning to the next state, StateRollOver, allowing
    time for the ball to roll into the pins (or past the pins). A while loop that
    calls yield until the desired amount of time has passed (by checking Time.time)
    would do the trick, but it’s much more convenient to call yield on the function
    WaitForSeconds, which takes a number of seconds as an argument. (In StateRolledPast,
    the number of seconds is hard-coded to 5, but it could easily be a public variable
    to allow customization.) As a result, the coroutine StateRolledPast will essentially
    pause (without blocking execution in the rest of Unity) until the given time has
    elapsed.


    #### StateGutterBall


    The gutter ball state is a lot simpler than StateRolledPast. It just transitions
    directly to StateRollOver (Listing [8-24](#A310332_2_En_8_Chapter.html#Par122)).


    ```

    function StateGutterBall() {

    state = "StateRollOver";

    }

    Listing 8-24.

    The State for a Gutter Ball in FuguBowl.js

    ```


    Although it seems StateRolling could transition directly to StateRollOver instead
    of passing through StateGutterBall, the inclusion of StateGutterBall provides
    some symmetry with StateRolledPast. In a polished bowling game, you would most
    likely implement some kind of feedback that you rolled a gutter ball. For example,
    in HyperBowl, animated letters spelling out “Gutter” fly across the screen (Figure
    [8-7](#A310332_2_En_8_Chapter.html#Fig7)), and this animation takes place in StateGutterBall.


    ![A310332_2_En_8_Fig7_HTML.jpg](Images/A310332_2_En_8_Fig7_HTML.jpg)


    Figure 8-7.


    Animated text for a gutter ball in HyperBowl


    Those letters are animated with iTween, by the way. You aren’t limited to visual
    feedback either. In my Fugu Bowl app on the App Store, StateGutterBall plays the
    sound of kids booing!'
  trans: "\n#### `StateRolledPast`\n\n在球滚动足够距离到达球瓶后，将进入 `StateRolledPast` 状态（清单 8-22）。该状态通过禁用\
    \ `Ball`（球）和 `Main Camera`（主摄像机）控件来“释放”球。\n\n```\nfunction StateRolledPast() {\n\
    \tvar follow:Behaviour = Camera.main.GetComponent(\"SmoothFollow\");\n\tif (follow\
    \ != null) {\n\t\tfollow.enabled = false;\n\t}\n\tball.GetComponent(FuguForce).enabled\
    \ = false;\n\tyield WaitForSeconds(rolledPastTime);\n\tstate = \"StateRollOver\"\
    ;\n}\n清单 8-22.\nFuguBowl.js 中球到达球瓶时进入的状态\n```\n\n为了禁用 `Main Camera`（主摄像机）的 `SmoothFollow`\
    \ 脚本，该状态通过 `Camera` 类中的静态变量 `main` 访问 `Main Camera`（主摄像机），并在该 `GameObject` 上调用\
    \ `GetComponent`，将要检索的组件类 `SmoothFollow` 作为参数传入。这会返回附加到 `Main Camera`（主摄像机）上的\
    \ `SmoothFollow` 脚本。然后该脚本被赋值给一个名为 `follow` 的局部变量。\n\n`follow` 变量被声明为 `Behaviour`\
    \ 类型，而 `Behaviour` 是 `Component` 的直接子类。一个 `Behaviour` 可以通过设置其 `enabled` 变量来启用或禁用。`follow`\
    \ 变量本可以声明为更具体的类，比如 `MonoBehaviour`（`Behaviour` 的子类，也是任何可附加到 `GameObject` 的脚本的父类），甚至是\
    \ `SmoothFollow`（`SmoothFollow` 脚本最具体的类），因为所有这些类都从 `Behaviour` 继承了 `enabled` 变量。但选择适合的最通用类能提供最大的灵活性。例如，如果你将\
    \ `follow` 声明为 `SmoothFollow` 类型，而之后决定使用不同的摄像机控制脚本，就必须调整 `follow` 的类型声明。\n\n**提示**\n\
    \n对于类型声明，请使用实现了你所需要函数和变量的最通用类。\n\n不将 `follow` 声明为 `SmoothFollow` 类型的另一个原因是：该项目在\
    \ [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739) 上提供的版本并未包含任何\
    \ Asset Store 或 Standard Assets 包，其中就包括 `SmoothFollow` 脚本。在项目中引用一个不存在的 `SmoothFollow`\
    \ 类会导致编译器错误。\n\n正因如此，`SmoothFollow` 是以 `String`（字符串）形式传递给 `GetComponent` 的，这样直到运行时调用\
    \ `GetComponent` 时才会去寻找该类，而在运行时 `GetComponent` 会返回 `null`。尝试访问 `null` 上的 `enabled`\
    \ 变量会导致错误，因此该状态在尝试禁用该脚本前，会先检查 `follow` 是否为空。附加到球上的 `FuguForce` 脚本以类似方式被禁用：在球上调用\
    \ `GetComponent` 来获取 `FuguForce` 脚本，然后将其 `enabled` 变量设为 false。但不同于 `Main Camera`（主摄像机）和\
    \ `SmoothFollow` 脚本，由于你确信球上附加了 `FuguForce` 脚本，因此在禁用该脚本前无需进行空值检查。\n\n此外，`GetComponent`\
    \ 是一个重载函数，其中一个版本接受 `String` 参数，另一个版本直接接受类。因此，这里没有将字符串 `\"FuguForce\"` 传递给 `GetComponent`，而是直接传递了\
    \ `FuguForce` 类。这样一来，如果类名拼写错误（例如 `GetComponent(FuguFource)`），就会产生编译器错误。\n\n如果传入一个拼写错误的类名字符串（例如\
    \ `GetComponent(\"FuguFource\")`），在编译时不会产生错误，这乍听起来可能是件好事，但最好还是尽早发现问题。在运行时，调用 `GetComponent`\
    \ 会返回 `null`，如果代码预期得到非空结果，就可能导致崩溃，或者引发令人头疼的调试过程，让你疑惑为什么那个脚本没有按预期被禁用。\n\n**提示**\n\
    \n尽可能让编译器帮你做错误检查。\n\n在某些时候，`SmoothFollow` 和 `FuguForce` 脚本需要被重新启用。自然的位置是在 `ResetCamera`\
    \ 和 `ResetBall` 函数中（清单 8-23），因为当一轮投球结束，且 `Main Camera`（主摄像机）和 `Ball`（球）`GameObject`\
    \ 各自被重置以开始下一轮投球时，就会调用这些函数。\n\n```\nfunction ResetBall() {\n\tball.GetComponent(FuguForce).enabled\
    \ = true;\n\tball.SendMessage(\"ResetPosition\");\n}\nfunction ResetCamera() {\n\
    \tvar follow:Behaviour = Camera.main.GetComponent(\"SmoothFollow\");\n\tif (follow\
    \ != null) {\n\t\tfollow.enabled = true;\n\t}\n\tCamera.main.SendMessage(\"ResetPosition\"\
    );\n}\n清单 8-23.\nFuguBowl.js 中的 ResetBall 和 ResetCamera 函数\n```\n\n在 `ResetBall`\
    \ 和 `ResetCamera` 这两个函数中，用于启用脚本组件的代码与用于禁用脚本的代码相同，只是将 `enabled` 变量设为了 true。\n\n\
    在同时禁用 `FuguForce` 和 `SmoothFollow` 脚本后，`StateRolledPast` 会等待五秒钟，然后转换到下一个状态 `StateRollOver`，以便让球有时间滚入球瓶（或滚过球瓶）。一个循环调用\
    \ `yield` 直到所需时间过去（通过检查 `Time.time`）的 `while` 循环也能达到目的，但调用带有秒数参数的函数 `WaitForSeconds`\
    \ 并对其使用 `yield` 要方便得多。（在 `StateRolledPast` 中，秒数是硬编码为 5 的，但它可以很容易地改为一个公共变量以允许自定义。）结果就是，协程\
    \ `StateRolledPast` 会有效地暂停（不会阻塞 Unity 其余部分的执行），直到指定的时间过去。\n\n#### `StateGutterBall`\n\
    \n洗沟球状态比 `StateRolledPast` 简单得多。它只是直接转换到 `StateRollOver`（清单 8-24）。\n\n```\nfunction\
    \ StateGutterBall() {\n\tstate = \"StateRollOver\";\n}\n清单 8-24.\nFuguBowl.js\
    \ 中洗沟球的状态\n```\n\n虽然看起来 `StateRolling` 可以直接转换到 `StateRollOver` 而无需经过 `StateGutterBall`，但包含\
    \ `StateGutterBall` 可以提供与 `StateRolledPast` 的某种对称性。在一个精良的保龄球游戏中，你很可能会实现某种关于你投出洗沟球的反馈。例如，在\
    \ HyperBowl 中，拼写出 “Gutter” 的动画字母会飞过屏幕（图 8-7），而这个动画就是在 `StateGutterBall` 中发生的。\n\
    \n![A310332_2_En_8_Fig7_HTML.jpg](img/A310332_2_En_8_Fig7_HTML.jpg)\n\n**图 8-7.**\
    \ HyperBowl 中洗沟球的动画文本\n\n顺便提一下，这些字母是用 iTween 制作动画的。你也不仅限于视觉反馈。在我 App Store 上的\
    \ Fugu Bowl 应用中，`StateGutterBall` 会播放孩子们喝倒彩的声音！"
- fmt: '#### `StateRollOver`


    When the roll of the ball is deemed complete (the ball has guttered by rolling
    off the floor or has reached the pin line), the FSM enters `StateRollOver` (Listing
    [8-25](#A310332_2_En_8_Chapter.html#Par126)), which wraps up the current roll
    by figuring out what was scored.


    ```

    function StateRollOver() {

    var pinsDown:int = GetPinsDown();

    //    Debug.Log("pins down: "+pinsDown);

    switch (roll) {

    case Roll.Ball1: player.SetBall1Score(frame,pinsDown); break;

    case Roll.Ball2: player.SetBall2Score(frame,pinsDown); break;

    case Roll.Ball3: player.SetBall3Score(frame,pinsDown); break;

    }

    if (roll == Roll.Ball1 && player.IsStrike(frame)) {

    state = "StateStrike";

    return;

    }

    if (roll == Roll.Ball2 && player.IsSpare(frame)) {

    state = "StateSpare";

    return;

    }

    state = "StateKnockedSomeDown";

    }

    ```


    Listing 8-25. The State for the End of a Roll in `FuguBowl.js`


    This state first ascertains how many pins are down by calling the `GetPinsDown`
    function. That number is passed to the appropriate `FuguBowlPlayer` scoring function,
    based on whether this is the first, second, or third ball, so the score for this
    roll is recorded. The next state depends on the result of the roll, whether it
    was a strike (which can happen only on the first ball), a spare (which can happen
    only on the second ball), or any other result. (`StateKnockedSomeDown` isn’t a
    great name, considering you might have knocked down zero pins, but I like it better
    than `StateNotSpareOrStrike`.)


    #### `StateSpare`, `StateStrike`, and `StateKnockedSomeDown`


    Like the gutter ball state, the states for bowling a strike, a spare, and anything
    else have no actions except for transitioning to the next state (Listing [8-26](#A310332_2_En_8_Chapter.html#Par129)).


    ```

    function StateSpare() {

    state="StateNextBall";

    }

    function StateStrike() {

    state = "StateNextBall";

    }

    function StateKnockedSomeDown() {

    state="StateNextBall";

    }

    ```


    Listing 8-26. `StateSpare`, `StateStrike`, and `StateKnockedSomeDown` in `FuguBowl.js`


    All three of these states transition to `StateNextBall`, so it’s tempting to consider
    these states redundant and remove them entirely. But for a complete bowling game
    you might initiate some kind of feedback in each of these states, like congratulatory
    audio and graphics for bowling a strike. I mentioned that Fugu Bowl on the App
    Store emits a booing sound during a gutter ball. The same app utters a cheer when
    a strike is bowled, and this happens in `StateStrike`. And HyperBowl displays
    animated “SPARE” and “STRIKE” text in `StateSpare` and `StateStrike`, respectively.


    #### `StateNextBall`


    `StateNextBall` is the most complicated state so far (Listing [8-27](#A310332_2_En_8_Chapter.html#Par132))
    because most of the bowling rules kick in here. This is where you must decide
    whether you’re rolling another ball in this frame or advancing to the next frame.


    ```

    function StateNextBall() {

    if (frame == 9) { // last frame

    switch (roll) {

    case Roll.Ball1: // always has a second roll

    state = "StateBall2";

    break;

    case Roll.Ball2: // bonus roll if we got a spare or strike

    if (player.IsSpare(frame) || player.IsStrike(frame)) {

    state = "StateBall3";

    } else {

    state = "StateGameOver";

    }

    break;

    case Roll.Ball3:

    state = "StateGameOver";

    break;

    }

    // all other frames

    } else if (roll == Roll.Ball1 && !player.IsStrike(frame)) {

    state = "StateBall2";

    } else {

    ++frame;

    state = "StateBall1";

    }

    }

    ```


    Listing 8-27. The State for Transitioning to the Next Ball in `FuguBowl.js`


    The tenth frame in particular is complex because you have to check for the end
    of the game and could potentially have three rolls. So, let’s first look at the
    bottom portion of the code, which applies to the first nine frames. If you just
    finished rolling `Ball1` and didn’t get a strike, then the next state is `StateBall2`.
    Otherwise, you must have rolled `Ball2` or got a strike, so either way, the next
    state is `StateBall1`, and you increment your frame index. In the tenth frame,
    you always roll at least twice, so if you just rolled `Ball1`, you set the next
    state to `StateBall2`. If you just rolled `Ball2` and the result is a spare or
    strike, then you set the next state to `StateBall3`; otherwise, you go to the
    game-over state. And of course if you just rolled `Ball3`, that’s the last possible
    roll, and you go to the game-over state.


    #### `StateGameOver`


    Finally, you’ve reached the end-of-game state, `StateGameOver` (Listing [8-28](#A310332_2_En_8_Chapter.html#Par135)).


    ```

    function StateGameOver() {

    Debug.Log("Final Score: "+player.GetScore(9));

    yield WaitForSeconds(gameOverTime);

    state="StateNewGame";

    }

    ```


    Listing 8-28. The Game Over State in `FuguBowl.js`


    In lieu of a fancy user interface (the Unity GUI system will be introduced in
    the next chapter), let’s take the opportunity to print out the final score in
    the Console view using the function `Debug.Log`. The final score is retrieved
    by calling the `FuguBowlPlayer` function `GetScore` with the array index `9`,
    which indicates you want the total score tallied in the tenth frame.


    In a complete bowling game, this is the place to put up a “Game Over” message,
    submit the score to a leader board, and perform any other action appropriate at
    the end of a game (in HyperBowl, the `Application.LoadLevel` function is called
    to switch to a scene displaying the score and present a trophy). For now, let’s
    just transition back to `StateNewGame` and start a new game.


    ### The Complete Listing


    The overhauled `FuguBowl` script is much larger even than the `FuguBowlPlayer`
    script, so the entire listing for `FuguBowl.js` isn’t shown here. The complete
    script is available on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739),
    and all its contents have been presented in this section, piece by piece (or mostly,
    state by state).


    ## Explore Further


    This chapter was a change of pace, concentrating solely on scripting. Most of
    that scripting was added to the game controller script, `FuguBowl.js`, in the
    form of a state machine, but scoring code was incorporated in a new script, `FuguBowlPlayer.js`.


    If you’re tired of writing big chunks of code and long for the little script snippets
    that you started with, you just have to endure writing one more big script in
    the next chapter, for the user interface. And, as a counterpart for the scoring
    code added in this chapter, the next one includes a small additional script to
    display a scoreboard.


    ### Unity Manual


    State machines are useful not only for game control logic but also for anything
    that can be represented as going through different states (simple examples: a
    light is on or off, a weapon is locked and loaded, a door is open or closed).
    State machines are particularly useful for animation (walking, running, throwing),
    which is why the Mecanim animation system does have its own FSM capability. This
    is described in the Unity Manual in the “The Mecanim Animation System” section
    in “Animation State Machines.”


    ### Scripting Reference


    The major scripting technique introduced in this chapter was the use of coroutines,
    specifically to implement an FSM in the `FuguBowl` script. The “Scripting Overview”
    section of the Scripting Reference has a “Coroutines and `Yield`” page that provides
    a basic explanation and some examples.


    The classes related to coroutines include `Coroutine` and `WaitForSeconds` (both
    of them inherit from `YieldInstruction`). The one function you used is the `StartCoroutine`
    function of `MonoBehaviour`. The documentation page for each `MonoBehaviour` callback
    specifies whether the callback can be used as a coroutine (as you saw, `Start`
    can, but `Awake`, `Update`, and `FixedUpdate` cannot).


    The added code in the `FuguBowl` script also had frequent cause to access components,
    so the “Accessing Components” page is relevant. That page lists the `Component`
    and `GameObject` variables that can be used to access commonly attached components
    and also provides examples on how to call the function `GetComponent` (either
    on a component or on a `GameObject`) to access components, including scripts.'
