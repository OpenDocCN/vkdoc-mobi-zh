    ### 最小化垃圾回收


    垃圾回收会在游戏中引入明显的卡顿。最小化这些卡顿最有效的方法就是尽量减少垃圾回收的必要性，而这可以通过减少最终被回收器回收的对象数量来实现。其中一种技术是将对象保留在对象池中以便重用，而不是让它们被垃圾回收。你也可以通过调用
    `System.GC.Collect` 来显式触发回收器。例如，你可以在保龄球游戏控制器的 `Awake` 回调中添加该调用，以确保在游戏开始前进行一次垃圾回收，这将立即清理上一场景中残留的所有未使用对象（清单
    14-11）。


    ```

    function Awake() {

    player = new FuguBowlPlayer();

    CreatePins();

    System.GC.Collect();

    }

    ```


    ## 离线优化


    到目前为止，你所做的所有更改都是可以立即通过测试运行和分析来观察效果的快速优化。Unity 还集成了一些可以大幅提升性能的商业场景预处理工具：Beast 和
    Umbra。这些工具不会在本章中使用，因为它们的设置和运行相当耗时，而且坦白地说，它们对你这简单的场景作用不大。但我将在下面的章节中简要介绍它们。


    ### Beast


    在不造成严重性能损失的情况下添加高质量实时光照是很困难的。每增加一个像素光源就会产生更多的绘制调用，阴影代价高昂，而且最终的视觉效果不如桌面端，更不用说离线渲染的计算机生成场景了。Beast
    通过生成光照贴图解决了这两个问题，这是一种预先计算好的、被“烘焙”到纹理中的光照。当然，没有任何事情是免费的——除了设置和烘焙时间外，烘焙了光照贴图的场景最终会增加额外的大纹理，占用更多内存，增加应用程序大小，并延长场景加载时间。


    要为当前场景生成光照贴图，你首先必须将所有不动的 `GameObject`（包括灯光）标记为静态，因为你只能为固定的灯光和表面预先计算光照。光照贴图作为第二层纹理叠加在网格之上。然后，你需要从编辑器菜单栏的
    Window 菜单中打开 Lighting 窗口（图 14-33）。


    ![A310332_2_En_14_Fig33_HTML.jpg](img/A310332_2_En_14_Fig33_HTML.jpg)


    图 14-33. Lighting 窗口


    在该窗口中，你可以在 Object 面板中调整每个对象的光照贴图属性，然后切换到 Bake 面板来设置光照贴图属性并启动光照贴图烘焙。


    请注意，Unity iOS 上不支持双光照贴图，因为该功能需要延迟光照，所以只能使用单光照贴图。动态光照和静态光照的效果不太容易混合，尤其是在有阴影的情况下。


    ### Umbra


    我之前提到过，每个摄像机都会执行视锥体裁剪，忽略所有位于摄像机视锥体之外的 `GameObject`。那些不熟悉实时计算机图形学的人可能会认为被遮挡的对象（即被其他对象挡住了视线）也会被裁剪掉，但事实并非如此。视锥体内的所有对象都会被渲染，然后使用深度缓冲来逐像素判断哪个对象在前。判断一个对象是否位于视锥体之外是一个相对直接的计算，但判断哪些对象被遮挡则需要一些预处理。这就是
    Unity 集成 Umbra 作为遮挡剔除工具的作用所在。


    为场景添加遮挡剔除类似于为场景烘焙光照贴图的过程。你需要将不动的对象标记为静态，然后从 Unity 编辑器菜单栏的 Window 菜单中打开 Occlusion
    Culling 窗口（图 14-34）。


    ![A310332_2_En_14_Fig34_HTML.jpg](img/A310332_2_En_14_Fig34_HTML.jpg)


    图 14-34. Occlusion Culling 窗口


    然后，你可以在 Object 标签中调整每个对象的遮挡剔除设置，然后在 Bake 标签中指定遮挡剔除设置并烘焙遮挡剔除数据。


    ## 最终分析


    现在你已经完成了对项目的优化过程，是时候再次对游戏进行分析了（清单 14-12），不过，如果你想有条不紊地进行，就应该在每次更改后都运行一次分析来观察其效果。


    ```

    iPhone Unity internal profiler stats:

    cpu-player>    min:  5.0   max:  9.7   avg:  6.1

    cpu-ogles-drv> min:  3.4   max:  7.4   avg:  4.2

    cpu-present>   min:  0.9   max: 10.5   avg:  4.2

    cpu-waits-gpu> min:  0.9   max: 10.5   avg:  4.2

    msaa-resolve> min:  0.0   max:  0.0   avg:  0.0

    frametime>     min: 13.5   max: 22.1   avg: 16.6

    draw-call #>   min:  30    max:  30    avg:  30     | batched:    10

    tris #>        min:  4592  max:  4592  avg:  4592   | batched:  3420

    verts #>       min:  3728  max:  3728  avg:  3728   | batched:  2750

    player-detail> physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:  2.2
    render:  3.4 fixed-update-count: 0 .. 0

    mono-scripts>  update:  0.1   fixedUpdate:  0.0 coroutines:  0.0

    mono-memory>   used heap: 389120 allocated heap: 524288  max number of collections:
    0 collection total duration:  0.0

    清单 14-12.

    优化后的内置分析结果

    ```


    分析显示平均帧时间为 16.6 毫秒，刚好接近 60 帧/秒。目标达成！这个分析是在第四代 iPod touch（相当于 iPhone 4）上运行的，因此根据你的设备，实际效果可能会有所不同。


    player-detail 行显示帧时间主要由批处理和渲染占用，因此图形是剩下的瓶颈，再花更多时间进行脚本优化将得不偿失。如果你觉得 30 帧/秒也可以接受，那么你现在就有很好的条件来添加更多内容和功能了。


    ## 进一步探索


    我在本章开头提到了过早优化的风险，生怕在你能正常运行之前就把事情搞复杂了。但从开发之初，你就应该牢记你的性能目标。从简单开始（Unity 文档建议在 iPhone
    3GS 上渲染不超过 40,000 个顶点），让一些功能跑起来，优化到足以达到你的性能目标，然后继续添加内容和功能，每当游戏性能低于你的目标时就停下来优化。并且一定要记住分析并优化瓶颈。把时间花在只占你帧时间
    10% 的部分上进行优化，而放着另一个占 50% 的部分不管，是没有任何意义的。


    ### Unity 手册


    在 Unity 手册中，“iOS 开发入门”部分有若干页名为“iOS 性能优化”，涵盖了你在优化构建时调整的播放器设置，描述了内置分析器，并展示了如何优化构建大小。


    “高级”部分记录了 Unity Pro 版中可用的 Profiler 以及之前提到的离线优化功能：光照贴图和遮挡剔除。“高级”部分还包括许多其他与优化相关的页面：“优化图形性能”、“减少文件大小”、“自动内存管理”（垃圾回收）和“阴影”（特别是“阴影性能”）。“资源包”和“加载资源”页面解释了如何按需下载资源并将其带入场景，这是一种可用于管理已安装应用程序大小的技术。

