  trans: '

    ### 教程


    除了“文档”部分外，Unity 网站上的“学习”标签页还包含一个“教程”部分，其中收录了大量的入门编辑器视频。顾名思义，这些视频介绍了 Unity 编辑器的入门知识，实际上，这组视频涵盖了本章讨论的大部分内容，包括对最重要视图（`游戏视图`、`场景视图`、`层级视图`、`检视视图`和`项目视图`）的描述，甚至还包括发布构建版本的过程。


    ### 版本控制


    虽然我只是在解释如何删除元文件时简要地讨论了版本控制，但这个话题值得稍微多讨论一些，因为 VCS 对软件开发至关重要（当你第一次丢失项目或记不起是哪个改动破坏了你的游戏时，你就会意识到这一点！）。如果你已经有了一款钟爱的
    VCS，你可能想在 Unity 中使用它；如果你还没有使用过任何 VCS，那么你可能需要考虑一下，哪怕只是为了保留项目的旧版本，以便在需要回滚时能检查不同版本之间的差异。


    在版本控制系统中，Perforce 是游戏工作室中常用的一款流行商业工具，而 Subversion（`svn`）作为一种开源选择，拥有悠久的历史。如今，像
    Git 和 Mercurial 这样的分布式版本控制系统正成为趋势。我在 Bitbucket（`http://bitbucket.com/`）上使用 Mercurial
    来管理我的内部项目，并在 GitHub 上发布公共项目，包括本书的项目（`www.apress.com/9781484231739`）。


    说 Unity VCS 支持与具体产品无关，这实际上是换种方式说 Unity 并没有将任何特定的版本控制系统集成到 Unity 编辑器中。元文件以及 Unity
    Pro 用户的 YAML 场景文件，只是让 Unity 与常用于源代码的、面向文本的版本控制系统具有更好的兼容性。你仍然需要在 Unity 外部自行执行 VCS
    操作。顺便提一下，你可以在 `http://yaml.org/` 上找到关于 YAML 的更多信息。


    我发现使用 GitHub 网站上提供的 Mac GitHub 应用很方便，类似地，该网站也提供了 BitBucket 的 Sourcetree 应用。


    正如我们在解释编辑器偏好设置中的版本控制模式选项时提到的，Unity 还提供了一款专为 Unity 设计的 VCS，称为 Unity Asset Server。它需要购买
    Unity 团队许可证。


    ## 3. 创建场景


    玩《攀登者》很有趣，但这本书的主题是在 Unity 中制作游戏，而不是在 Unity 中玩游戏！最后，是时候开始游戏开发了。这是一个从零开始，最终打造出一款可玩游戏的漫长旅程，而这就是起点。在本章中，你将从一个
    Unity 编辑器中的空场景开始，并用 3D 环境的基本构建块来填充它：模型、纹理、灯光、天空盒和摄像机。


    游戏开发者（尤其是预算有限的开发者）面临的一个挑战是如何获得这些构建块。Unity 编辑器提供了一些基本模型，任何图像都可以用作纹理（本着互联网的传统，我会提供一张猫的图片作为示例纹理）。并且，正如第一章所述，Unity
    安装包中包含一组标准资源，可以随时导入你的项目中。然而，所有这些只能帮你走到一定程度。


    幸运的是，Unity Technologies 的员工认识到了这一需求，并创建了资源商店，这是一个 Unity 就绪资源的在线市场，其商店界面直接集成在 Unity
    编辑器中。事实证明，这些资源中有很多是免费的，因此我们将利用这一点，将其中一些免费资源整合到本章创建的 Unity 项目中。


    本书中的每一章（除了第 10 章和第 11 章，其中“垃圾猫”项目会短暂回归）都建立在前一章的项目基础之上。因此，到本书结束时，本章创建的简单静态场景将演变成一个带有声音和物理效果的优化保龄球游戏，能够在
    iOS 上运行，并包含排行榜、成就和广告。本章创建的项目，以及后续各章的项目，都可以在 `www.apress.com/9781484231739` 上获取，但不包含来自资源商店或标准包的任何资源。


    让我们开始吧！

    '
- fmt: "## Create a New Project\n\nIf you still have the Unity Editor running from\
    \ the previous chapter, create a new Unity project using the `New Project` item\
    \ in the `File` menu (Figure [3-1](#A310332_2_En_3_Chapter.html#Fig1)).\n\n![A310332_2_En_3_Fig1_HTML.jpg](Images/A310332_2_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1. The `New Project` menu item\n\nThe resulting Project Wizard (Figure\
    \ [3-2](#A310332_2_En_3_Chapter.html#Fig2)) is the same as the one we used when\
    \ selecting `Open Project` in the previous chapter, but now it has the `Create\
    \ New Project` tab selected. If you’re starting up a fresh Unity session and are\
    \ presented with the Project Wizard, you can just click this tab to create a new\
    \ project instead of opening an existing one.\n\n![A310332_2_En_3_Fig2_HTML.jpg](Images/A310332_2_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2. Creating a new project with the Project Wizard\n\nThe Project Wizard\
    \ prompts for the file name and location of the new project, defaulting to your\
    \ home folder and the name `New Unity Project` (if the folder already exists,\
    \ a number is appended, e.g., `New Unity Project 1`, or if that also exists then\
    \ `New Unity Project 2`, and so forth). The ellipse in the `Location` box brings\
    \ up a file chooser so you can browse for a directory location instead of typing\
    \ it in.\n\nYou can name the project as you please or just use the default for\
    \ now. The Unity project itself doesn’t care about its name, so you can rename\
    \ the project folder in the Finder later (just make sure you exit Unity or switch\
    \ to another project first, to avoid wreaking havoc with your current session).\n\
    \n**Tip**  \nIf you have a project that you want to keep around for a while, it’s\
    \ a good idea to give it a meaningful name. More than once, I’ve discovered an\
    \ old `New Unity Project` folder on my Mac and wondered if it was something important.\n\
    \nThe `Add Asset packages` menu item when selected will list Asset Packages that\
    \ we can immediately import into our new project. You don’t need to select any\
    \ right now, as you can always import what you need later.\n\nThe Unity Editor\
    \ will now appear, showing a new and empty project (Figure [3-3](#A310332_2_En_3_Chapter.html#Fig3)).\
    \ The `Project View` displays no assets (you can confirm in the Finder that the\
    \ `Assets` folder in your project contains no files), and the current scene is\
    \ an untitled and unsaved scene consisting only of a `GameObject` named `Main\
    \ Camera`.\n\n![A310332_2_En_3_Fig3_HTML.jpg](Images/A310332_2_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3. How a new Unity project looks in the Editor\n\nThe first thing you\
    \ should do is save and name this scene. The `Save Scene` option is found in the\
    \ `File` menu (Figure [3-4](#A310332_2_En_3_Chapter.html#Fig4)) and has the same\
    \ `Command+S` shortcut that is conventional with application save operations (you\
    \ could think of scenes edited and managed by Unity as analogous to documents\
    \ edited and managed by a word processing application).\n\n![A310332_2_En_3_Fig4_HTML.jpg](Images/A310332_2_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4. The `Save Scene` menu item\n\nThe resulting chooser will provide\
    \ the project’s `Assets` folder as the default location, which is fine; the scene\
    \ is an asset and part of the project, so the scene file has to go in the `Assets`\
    \ folder. A default name is not provided, so you need to provide one. Let’s call\
    \ it `cube`, since this scene will just showcase a cube. The new scene will show\
    \ up in the `Project View`, with a Unity icon (Figure [3-5](#A310332_2_En_3_Chapter.html#Fig5)).\n\
    \n![A310332_2_En_3_Fig5_HTML.jpg](Images/A310332_2_En_3_Fig5_HTML.jpg)\n\nFigure\
    \ 3-5. The new scene in the Project View\n\nWhen you exit Unity or switch scenes\
    \ or projects, Unity will prompt you to save the scene if there are unsaved changes\
    \ (sometimes those changes are innocuous user interface changes, so don’t be alarmed).\
    \ But it’s a good practice to save frequently, in case there’s a crash.\n\nThe\
    \ `File` menu also has a `Save Scene As` command that is similar to the `Save\
    \ As` command of other applications. It lets you save the scene under a new name\
    \ at any time, effectively making a copy of the scene.\n\n**Tip**  \nInstead of\
    \ using the `Save Scene As` command, it’s often simpler to select the scene file\
    \ in the `Project View` and either rename (press `Return`) or duplicate (`Command+D`)\
    \ the scene in the `Project View`.\n\nYou might be wondering about the difference\
    \ between `Save Scene` and `Save Project` in the `File` menu. `Save Project` saves\
    \ any changes to the project but not the current scene, while `Save Scene` also\
    \ saves any changes in the current scene, i.e., changes to the `GameObjects` in\
    \ the scene or changes to per-scene settings (`RenderSettings`). `Save Scene`\
    \ is what you’ll want to use most of the time. `Save Project` is appropriate when\
    \ you’ve made some changes to project settings or assets that you want to save\
    \ but have scene changes you’re not ready to save or maybe even have a new scene\
    \ open that you don’t want to save at all.\n\n## The Main Camera\n\nThe `Hierarchy\
    \ View` of the new scene lists just one `GameObject`, named `Main Camera`. Every\
    \ new scene starts with that Camera `GameObject`, which acts as our eyes in the\
    \ scene when we play the game. The `Main Camera` is special in that it’s easily\
    \ accessible by scripts (it’s referenced by the variable `Camera.main`).\n\n###\
    \ Multiple Cameras\n\nThe fact that the camera’s name is `Main Camera` might lead\
    \ you to believe that multiple Cameras can exist in a scene, and you would be\
    \ correct. It might seem strange to have multiple simultaneous viewpoints, but\
    \ multiple Cameras make it possible to have a split-screen display or a window\
    \ within the screen. Those usages aren’t actually supported in Unity for iOS (see\
    \ the section “Viewport” below), but multiple Cameras are still useful for situations\
    \ like rendering the game world with the `Main Camera` and rendering a user interface\
    \ with another, effectively overlaying one set of `GameObjects` over another.\n\
    \n### Anatomy of a Camera\n\nLet’s select the `Main Camera` so we can see in the\
    \ `Inspector` view what a Camera is made of (Figure [3-6](#A310332_2_En_3_Chapter.html#Fig6)).\n\
    \n![A310332_2_En_3_Fig6_HTML.jpg](Images/A310332_2_En_3_Fig6_HTML.jpg)\n\nFigure\
    \ 3-6. Inspector View of the Main Camera\n\nStarting from the top, you can see\
    \ the name `Main Camera`. The check box to the left specifies whether this `GameObject`\
    \ is active or inactive. If you uncheck the check box, the Camera is deactivated,\
    \ indicated by a grayed-out appearance in the `Hierarchy View`, and you won’t\
    \ see anything in the `Game View`. You can check the check box labeled `Static`\
    \ on the right if you know this `GameObject` will never move. Marking `GameObjects`\
    \ as static can facilitate optimization, although that rarely applies to Cameras.\n\
    \nBelow the name, you can see this `GameObject` has `MainCamera` as its tag, which\
    \ is really what designates this `GameObject` as a `Main Camera`. The name is\
    \ just for display purposes, so you could edit the name here in the `Inspector\
    \ View` without any repercussions.\n\nThe `Layer` menu for this `GameObject` is\
    \ on the right. While names are used for description and tags for identification,\
    \ layers are used to group `GameObjects`. You can think of these layers sort of\
    \ like Photoshop layers. This `Layer` menu should not be confused with the `Layers`\
    \ menu at the top right of the Editor window (they are unfortunately close to\
    \ each other in the Default layout). The `Layers` menu at the top right controls\
    \ which `GameObjects` are visible in the `Scene View` (it really should be located\
    \ in the `Scene View`)."
  raw: '## Create a New Project


    If you still have the Unity Editor running from the previous chapter, create a
    new Unity project using the New Project item in the File menu (Figure [3-1](#A310332_2_En_3_Chapter.html#Fig1)).


    ![A310332_2_En_3_Fig1_HTML.jpg](Images/A310332_2_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    The New Project menu item


    The resulting Project Wizard (Figure [3-2](#A310332_2_En_3_Chapter.html#Fig2))
    is the same as the one we used when selecting Open Project in the previous chapter,
    but now it has the Create New Project tab selected. If you’re starting up a fresh
    Unity session and are presented with the Project Wizard, you can just click this
    tab to create a new project instead of opening an existing one.


    ![A310332_2_En_3_Fig2_HTML.jpg](Images/A310332_2_En_3_Fig2_HTML.jpg)


    Figure 3-2.


    Creating a new project with the Project Wizard


    The Project Wizard prompts for the file name and location of the new project,
    defaulting to your home folder and the name New Unity Project (if the folder already
    exists, a number is appended, e.g., New Unity Project 1, or if that also exists
    then New Unity Project 2, and so forth). The ellipse in the Location box brings
    up a file chooser so you can browse for a directory location instead of typing
    it in.


    You can name the project as you please or just use the default for now. The Unity
    project itself doesn’t care about its name, so you can rename the project folder
    in the Finder later (just make sure you exit Unity or switch to another project
    first, to avoid wreaking havoc with your current session).


    Tip


    If you have a project that you want to keep around for a while, it’s a good idea
    to give it a meaningful name. More than once, I’ve discovered an old New Unity
    Project folder on my Mac and wondered if it was something important.


    The Add Asset packages menu item when selected will list Asset Packages that we
    can immediately import into our new project You don’t need to select any right
    now, as you can always import what you need later.


    The Unity Editor will now appear, showing a new and empty project (Figure [3-3](#A310332_2_En_3_Chapter.html#Fig3)).
    The Project View displays no assets (you can confirm in the Finder that the Assets
    folder in your project contains no files), and the current scene is an untitled
    and unsaved scene consisting only of a GameObject named Main Camera.


    ![A310332_2_En_3_Fig3_HTML.jpg](Images/A310332_2_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    How a new Unity project looks in the Editor


    The first thing you should do is save and name this scene. The Save Scene option
    is found in the File menu (Figure [3-4](#A310332_2_En_3_Chapter.html#Fig4)) and
    has the same Command+S shortcut that is conventional with application save operations
    (you could think of scenes edited and managed by Unity as analogous to documents
    edited and managed by a word processing application).


    ![A310332_2_En_3_Fig4_HTML.jpg](Images/A310332_2_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    The Save Scene menu item


    The resulting chooser will provide the project’s Assets folder as the default
    location, which is fine; the scene is an asset and part of the project, so the
    scene file has to go in the Assets folder. A default name is not provided, so
    you need to provide one. Let’s call it cube, since this scene will just showcase
    a cube. The new scene will show up in the Project View, with a Unity icon (Figure
    [3-5](#A310332_2_En_3_Chapter.html#Fig5)).


    ![A310332_2_En_3_Fig5_HTML.jpg](Images/A310332_2_En_3_Fig5_HTML.jpg)


    Figure 3-5.


    The new scene in the Project View


    When you exit Unity or switch scenes or projects, Unity will prompt you to save
    the scene if there are unsaved changes (sometimes those changes are innocuous
    user interface changes, so don’t be alarmed). But it’s a good practice to save
    frequently, in case there’s a crash.


    The File menu also has a Save Scene As command that is similar to the Save As
    command of other applications. It lets you save the scene under a new name at
    any time, effectively making a copy of the scene.


    Tip


    Instead of using the Save Scene As command, it’s often simpler to select the scene
    file in the Project View and either rename (press Return) or duplicate (Command+D)
    the scene in the Project View.


    You might be wondering about the difference between Save Scene and Save Project
    in the File menu. Save Project saves any changes to the project but not the current
    scene, while Save Scene also saves any changes in the current scene, i.e., changes
    to the GameObjects in the scene or changes to per-scene settings (RenderSettings).
    Save Scene is what you’ll want to use most of the time. Save Project is appropriate
    when you’ve made some changes to project settings or assets that you want to save
    but have scene changes you’re not ready to save or maybe even have a new scene
    open that you don’t want to save at all.


    ## The Main Camera


    The Hierarchy View of the new scene lists just one GameObject, named Main Camera
    . Every new scene starts with that Camera GameObject, which acts as our eyes in
    the scene when we play the game. The Main Camera is special in that it’s easily
    accessible by scripts (it’s referenced by the variable Camera.main).


    ### Multiple Cameras


    The fact that the camera’s name is Main Camera might lead you to believe that
    multiple Cameras can exist in a scene, and you would be correct. It might seem
    strange to have multiple simultaneous viewpoints, but multiple Cameras make it
    possible to have a split-screen display or a window within the screen. Those usages
    aren’t actually supported in Unity for iOS (see the section “Viewport” below),
    but multiple Cameras are still useful for situations like rendering the game world
    with the Main Camera and rendering a user interface with another, effectively
    overlaying one set of GameObjects over another.


    ### Anatomy of a Camera


    Let’s select the Main Camera so we can see in the Inspector view what a Camera
    is made of (Figure [3-6](#A310332_2_En_3_Chapter.html#Fig6)).


    ![A310332_2_En_3_Fig6_HTML.jpg](Images/A310332_2_En_3_Fig6_HTML.jpg)


    Figure 3-6.


    Inspector View of the Main Camera


    Starting from the top, you can see the name Main Camera. The check box to the
    left specifies whether this GameObject is active or inactive. If you uncheck the
    check box, the Camera is deactivated, indicated by a grayed-out appearance in
    the Hierarchy View, and you won’t see anything in the Game View. You can check
    the check box labeled Static on the right if you know this GameObject will never
    move. Marking GameObjects as static can facilitate optimization, although that
    rarely applies to Cameras.


    Below the name, you can see this GameObject has MainCamera as its tag, which is
    really what designates this GameObject as a Main Camera. The name is just for
    display purposes, so you could edit the name here in the Inspector View without
    any repercussions.


    The Layer menu for this GameObject is on the right. While names are used for description
    and tags for identification, layers are used to group GameObjects. You can think
    of these layers sort of like Photoshop layers. This Layer menu should not be confused
    with the Layers menu at the top right of the Editor window (they are unfortunately
    close to each other in the Default layout). The Layers menu at the top right controls
    which GameObjects are visible in the Scene View (it really should be located in
    the Scene View).'
  trans: '好的，遵照您的指示，以下是翻译后的中文文本：



    ## 创建新项目


    如果你还在运行上一章的 Unity 编辑器，请使用 `File` 菜单中的 `New Project` 项创建一个新的 Unity 项目（图 3-1）。


    ![A310332_2_En_3_Fig1_HTML.jpg](img/A310332_2_En_3_Fig1_HTML.jpg)


    图 3-1. `New Project` 菜单项


    出现的项目向导（图 3-2）与我们在上一章选择 `Open Project` 时使用的向导相同，但现在默认选中了 `Create New Project`
    选项卡。如果你启动一个新的 Unity 会话并看到项目向导，你可以直接点击此选项卡来创建一个新项目，而不是打开一个现有项目。


    ![A310332_2_En_3_Fig2_HTML.jpg](img/A310332_2_En_3_Fig2_HTML.jpg)


    图 3-2. 使用项目向导创建新项目


    项目向导会提示输入新项目的文件名和位置，默认位置是你的主文件夹，默认名称为 `New Unity Project`（如果该文件夹已存在，则会附加一个数字，例如
    `New Unity Project 1`，如果这个也存在，则会是 `New Unity Project 2`，以此类推）。`Location` 框中的省略号按钮会打开一个文件选择器，这样你可以浏览并选择文件夹位置，而不必手动输入。


    你可以随意命名项目，或者暂时使用默认名称。Unity 项目本身并不关心它的名字，所以你稍后可以在 Finder 中重命名项目文件夹（只需确保先退出 Unity
    或切换到另一个项目，以避免破坏当前会话）。


    **提示**

    如果你有一个打算长期保留的项目，最好给它起一个有意义的名称。我不止一次在我的 Mac 上发现一个旧的 `New Unity Project` 文件夹，并纳闷它是否是重要的东西。


    当选中 `Add Asset packages` 菜单项时，会列出我们可以立即导入到新项目中的资源包。现在你不需要选择任何包，因为你随时可以在以后导入所需内容。


    现在，Unity 编辑器将会出现，显示一个全新的空项目（图 3-3）。`Project View` 中不显示任何资源（你可以在 Finder 中确认，你项目中的
    `Assets` 文件夹没有文件），当前场景是一个未命名且未保存的场景，其中只包含一个名为 `Main Camera` 的 `GameObject`。


    ![A310332_2_En_3_Fig3_HTML.jpg](img/A310332_2_En_3_Fig3_HTML.jpg)


    图 3-3. 编辑器中的新 Unity 项目外观


    你应该做的第一件事就是保存并命名这个场景。`Save Scene` 选项位于 `File` 菜单中（图 3-4），并且拥有与应用程序保存操作中常见的 `Command+S`
    快捷键相同的效果（你可以将 Unity 编辑和管理的场景类比于文字处理应用程序编辑和管理的文档）。


    ![A310332_2_En_3_Fig4_HTML.jpg](img/A310332_2_En_3_Fig4_HTML.jpg)


    图 3-4. `Save Scene` 菜单项


    由此出现的文件选择器将默认定位到项目的 `Assets` 文件夹，这没问题；场景是一种资源，也是项目的一部分，因此场景文件必须存放在 `Assets` 文件夹中。没有提供默认名称，所以你需要提供一个名称。我们叫它
    `cube`，因为这个场景将只展示一个立方体。新场景会出现在 `Project View` 中，并带有一个 Unity 图标（图 3-5）。


    ![A310332_2_En_3_Fig5_HTML.jpg](img/A310332_2_En_3_Fig5_HTML.jpg)


    图 3-5. Project View 中的新场景


    当你退出 Unity 或切换场景或项目时，如果存在未保存的更改，Unity 会提示你保存场景（有时这些更改是无害的用户界面更改，所以不必惊慌）。但为了以防崩溃，经常保存是一个好习惯。


    `File` 菜单中还有一个 `Save Scene As` 命令，类似于其他应用程序的 `Save As` 命令。它允许你随时以新名称保存场景，从而有效地创建场景的一个副本。


    **提示**

    除了使用 `Save Scene As` 命令，通常更简单的做法是在 `Project View` 中选择场景文件，然后重命名（按 `Return` 键）或在
    `Project View` 中复制（`Command+D`）场景。


    你可能想知道 `File` 菜单中的 `Save Scene` 和 `Save Project` 之间的区别。`Save Project` 保存对项目的任何更改，但不保存当前场景；而
    `Save Scene` 会同时保存当前场景中的任何更改，即对场景中 `GameObjects` 的更改或对每场景设置（`RenderSettings`）的更改。`Save
    Scene` 将是大多数时候你会使用的。`Save Project` 适用于当你已对项目设置或资源进行了更改，希望保存这些更改，但场景的更改尚未准备好保存，或者甚至想保持新打开的场景完全不保存的情况。


    ## 主摄像机


    新场景的 `Hierarchy View` 中只列出了一个名为 `Main Camera` 的 `GameObject`。每个新场景都从该摄像机 `GameObject`
    开始，它在我们玩游戏时充当我们在场景中的眼睛。`Main Camera` 之所以特殊，是因为脚本可以很容易地访问它（它由变量 `Camera.main` 引用）。


    ### 多摄像机


    摄像机名为 `Main Camera` 这一事实可能会让你相信一个场景中可以存在多个摄像机，你是对的。拥有多个同时存在的视点可能看起来很奇怪，但多摄像机使得分屏显示或屏幕内的窗口成为可能。在
    Unity for iOS 中实际上并不支持这些用法（请参阅下面的“视口”部分），但多摄像机在诸如使用 `Main Camera` 渲染游戏世界，并使用另一个摄像机渲染用户界面的情况下仍然有用，这样可以有效地将一组
    `GameObjects` 叠加在另一组之上。


    ### 摄像机构造


    让我们选择 `Main Camera`，以便我们可以在 `Inspector` 视图中看到摄像机的构成（图 3-6）。


    ![A310332_2_En_3_Fig6_HTML.jpg](img/A310332_2_En_3_Fig6_HTML.jpg)


    图 3-6. 主摄像机的 Inspector 视图


    从顶部开始，你可以看到名称 `Main Camera`。左侧的复选框指定此 `GameObject` 是激活的还是未激活的。如果取消选中该复选框，摄像机将被停用，在
    `Hierarchy View` 中显示为灰色，并且你在 `Game View` 中将看不到任何内容。如果你知道此 `GameObject` 将永远不会移动，可以选中右侧标记为
    `Static` 的复选框。将 `GameObjects` 标记为静态有助于优化，尽管这很少适用于摄像机。


    在名称下方，你可以看到此 `GameObject` 将 `MainCamera` 作为其标签，这实际上是将此 `GameObject` 指定为 `Main
    Camera` 的关键。名称仅用于显示目的，因此你可以在此处的 `Inspector View` 中编辑名称而不会产生任何影响。


    此 `GameObject` 的 `Layer` 菜单在右侧。名称用于描述，标签用于识别，而层则用于对 `GameObjects` 进行分组。你可以把这些层想象成类似于
    Photoshop 中的图层。这个 `Layer` 菜单不应与编辑器窗口右上角的 `Layers` 菜单混淆（不幸的是，它们在默认布局中很接近）。右上角的
    `Layers` 菜单控制哪些 `GameObjects` 在 `Scene View` 中可见（它实际上应该位于 `Scene View` 中）。

