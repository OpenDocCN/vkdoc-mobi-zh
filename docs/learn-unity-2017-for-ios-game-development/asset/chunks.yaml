    Unity Xcode 项目中的内置分析器开关


    现在，当你点击`Play`时，应用将重新编译并启用内置分析器。在游戏运行时，Xcode 的调试区域每 30 帧会显示一次统计信息，如代码清单 14-3 所示。


    ```

    iPhone Unity internal profiler stats:

    cpu-player>    min: 39.8   max: 63.2   avg: 58.0

    cpu-ogles-drv> min:  2.1   max:  3.7   avg:  2.4

    cpu-present>   min:  0.7   max:  6.6   avg:  1.8

    frametime>     min: 47.7   max: 72.2   avg: 64.5

    draw-call #>   min:  40    max:  40    avg:  40     | batched:     0

    tris #>        min:  5544  max:  5544  avg:  5544   | batched:     0

    verts #>       min:  4358  max:  4358  avg:  4358   | batched:     0

    player-detail> physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:  0.0
    render: 58.0 fixed-update-count: 0 .. 0

    mono-scripts>  update:  0.2   fixedUpdate:  0.0 coroutines:  0.1

    mono-memory>   used heap: 405504 allocated heap: 524288  max number of collections:
    0 collection total duration:  0.0

    代码清单 14-3.

    第四代 iPod Touch 上的内置分析器输出

    ```


    分析结果中首先要关注的是`frametime`，即一帧所花费的总时间，单位为毫秒。如果你以 60 fps 运行，那么`frametime`的平均值应该在 16.7
    毫秒左右。如果`frametime`超过 34，那么你甚至达不到 30 fps。`frametime`之后的`draw-call #`行也非常重要，因为它对`frametime`的影响很大。`Draw
    calls`（绘制调用）是独立的绘制操作。通常每个渲染的网格会产生一次绘制调用，在此基础上添加的光照和阴影还会增加更多的绘制调用。


    `player-detail`行对顶部`cpu-player`行所列的时间进行了细分。`player-detail`的时间分配包括`physx`（物理）、`animation`（动画）、`culling`（剔除不需要渲染的对象）、`skinning`（更新动画角色的蒙皮位置）、`batching`（合并具有相同材质的网格以便通过一次绘制调用进行渲染）、`rendering`（渲染）以及`fixed
    update count`（固定更新次数）。


    代码清单 14-3 中的分析结果来自第四代 iPod Touch，显示`frametime`甚至远远达不到 30 fps，更不用说 16 fps 了，并且`player-detail`中`render`（渲染）时间占据了主导地位。已知对性能影响较大的一个因素就是动态阴影，因此让我们在`Light`（光照）组件中禁用阴影（图
    14-6）。


    ![A310332_2_En_14_Fig6_HTML.jpg](img/A310332_2_En_14_Fig6_HTML.jpg)


    图 14-6.


    从保龄球场景光照中禁用阴影


    然后再次执行`Build and Run`（构建并运行）操作，开始一次新的分析会话（代码清单 14-4）。

