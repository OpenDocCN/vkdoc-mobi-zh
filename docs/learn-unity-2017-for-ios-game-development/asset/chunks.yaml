- fmt: "### Pause the Game\n\nMaking a pause menu involves solving two problems: making\
    \ a menu and making the game pause. You’ll start with making the game pause. The\
    \ static variable `Time.timeScale` specifies how fast the simulated game time\
    \ progresses and defaults to 1. Setting `Time.timeScale` to 0 effectively pauses\
    \ the game, suspending physics, animation, and anything else dependent on the\
    \ advance of `Time.time`. So, let’s make a `PauseGame()` function that sets `Time.timeScale`\
    \ to 0 (Listing [9-4](#A310332_2_En_9_Chapter.html#Par36)).\n\n```\nprivate var\
    \ savedTimeScale:float;\nfunction PauseGame() {\n    savedTimeScale = Time.timeScale;\n\
    \    Time.timeScale = 0;\n    AudioListener.pause = true;\n    currentPage = Page.Main;\n\
    }\n```\n\n`PauseGame()` first saves the current `Time.timeScale` in a variable\
    \ `savedTimeScale` so you can restore `Time.timeScale` when the game is unpaused\
    \ (you shouldn’t assume `Time.timeScale` is 1 when the game is paused).\n\n`PauseGame()`\
    \ also sets `AudioListener.pause` to `true`, which suspends any playing sounds\
    \ (you don’t want to do this if you’re going to play sounds in the menu).\n\n\
    Finally, the `currentPage` variable is set to `Page.Main`, indicating the main\
    \ pause screen should be displayed.\n\nThe game is unpaused by reversing all of\
    \ that (Listing [9-5](#A310332_2_En_9_Chapter.html#Par41)).\n\n```\nfunction UnPauseGame()\
    \ {\n    Time.timeScale = savedTimeScale;\n    AudioListener.pause = false;\n\
    \    currentPage = Page.None;\n}\n```\n\n`UnPauseGame()` restores `Time.timeScale`\
    \ to the value you saved in the variable `savedTimeScale` by `PauseGame()` and\
    \ sets `AudioListener.pause` to `false` to reenable audio.\n\nTo see whether the\
    \ game is paused, you can just check whether `Time.timeScale` is 0. Listing [9-6](#A310332_2_En_9_Chapter.html#Par44)\
    \ shows a little convenience function for that. Notice that it’s a static function,\
    \ so any script can reference it as `FuguPause.IsGamePaused()`.\n\n```\nstatic\
    \ function IsGamePaused() {\n    return Time.timeScale == 0;\n}\n```\n\nIf the\
    \ game is to start paused, the `Start()` callback should have a call to `PauseGame()`\
    \ (Listing [9-7](#A310332_2_En_9_Chapter.html#Par46)). Adding a public boolean\
    \ `startPaused` variable and checking it before calling `PauseGame()` makes the\
    \ initial pause optional.\n\n```\nvar startPaused:boolean = true;\nfunction Start()\
    \ {\n    if (startPaused) {\n        PauseGame();\n    }\n}\n```\n\nSince the\
    \ default value for `startPaused` is `true`, if you click Play, the game will\
    \ immediately pause, showing the ball suspended in the air. And then you’re stuck,\
    \ since there’s no menu. There’s also no way to unpause and then pause again,\
    \ so let’s have the Escape key (the key labeled Esc on the top left of most keyboards)\
    \ toggle the pause state. Input handling is usually performed in the `Update()`\
    \ callback, and this is no exception (Listing [9-8](#A310332_2_En_9_Chapter.html#Par48)).\n\
    \n```\nfunction Update() {\n    if (Input.GetKeyDown(KeyCode.Escape)) {\n    \
    \    switch (currentPage) {\n            case Page.None: PauseGame(); break; //\
    \ if the pause menu is not displayed, then pause\n            case Page.Main:\
    \ UnPauseGame(); break; // if the main pause menu is displaying, then unpause\n\
    \            default: currentPage = Page.Main; // any subpage goes back to main\
    \ page\n        }\n    }\n}\n```\n\nThe first line checks whether the Esc key\
    \ has been pressed. If so, then it calls `PauseGame()`, unless the pause menu\
    \ is already up. The function also treats Esc as a back key, switching from a\
    \ subpage to the main page or from the main page to an unpaused state.\n\n###\
    \ Check `Time.deltaTime`\n\nSetting `Time.timeScale` to 0 halts the advance of\
    \ `Time.time`, so `Time.deltaTime` is always 0. This works great for `Update()`\
    \ functions that multiply values by `Time.deltaTime`, but dividing by `Time.deltaTime`\
    \ when time is frozen results in a division-by-zero error. There is such a case\
    \ in the `Update()` callback of the `FuguForce` script, so before proceeding with\
    \ the pause menu, that has to be taken care of (Listing [9-9](#A310332_2_En_9_Chapter.html#Par51)).\n\
    \n```\nfunction Update() {\n    forcex = 0;\n    forcey = 0;\n    if (Time.deltaTime\
    \ > 0) {\n        CalcForce();\n    }\n}\n\nfunction CalcForce() {\n    var deltaTime:float\
    \ = Time.deltaTime;\n    forcex = mousepowerx * Input.GetAxis(\"Mouse X\") / deltaTime;\n\
    \    forcey = mousepowery * Input.GetAxis(\"Mouse Y\") / deltaTime;\n}\n```\n\n\
    Instead of immediately dividing the rolling force values by `Time.deltaTime`,\
    \ now the `Update()` callback checks that `Time.deltaTime` is not 0 before proceeding\
    \ with the force calculation, now moved into a `CalcForce()` function. `Update()`\
    \ always initializes the force values to 0 to ensure that no lingering force is\
    \ applied to the bowling ball while the game is paused.\n\n### Display the Menu\n\
    \nThe actual display of the pause menu, as with the scoreboard in the previous\
    \ section, must take place in an `OnGUI()` callback function. Specifically, `OnGUI()`\
    \ needs to check whether the game is paused and, if so, then display the current\
    \ menu page (Listing [9-10](#A310332_2_En_9_Chapter.html#Par54)).\n\n```\nfunction\
    \ OnGUI () {\n    if (IsGamePaused()) {\n        if (skin != null) {\n       \
    \     GUI.skin = skin;\n        } else {\n            GUI.color = hudColor;\n\
    \        }\n        switch (currentPage) {\n            case Page.Main: ShowPauseMenu();\
    \ break;\n            case Page.Options: ShowOptions(); break;\n            case\
    \ Page.Credits: ShowCredits(); break;\n        }\n    }\n}\n```\n\nFor now, there\
    \ are placeholders for each of the page display functions, keeping the script\
    \ in a runnable state (i.e., without compilation errors) as you fill out each\
    \ of the display functions one at a time. It’s a good idea to place `Debug.Log()`\
    \ statements inside these stub functions to verify they’re called when expected.\
    \ For example, if you click Play, you should see “Main Pause” appear in the Console\
    \ view every time you pause the game.\n\n### Automatic Layout\n\nFor the menu\
    \ buttons that are stacked vertically and centered in the screen, you can take\
    \ advantage of the `GUILayout` functions to avoid figuring out all the Rects that\
    \ would otherwise have to be passed for each `GUI.Button()`. Between calls to\
    \ `GUILayout.BeginArea()` and `GUILayout.EndArea()`, you can make calls to create\
    \ GUI controls without passing Rects, using the `GUILayout` versions of the GUI\
    \ functions. The controls will be automatically placed and sized within the Rect\
    \ that was passed to `GUILayout.BeginArea()`. Since all the pause menu pages will\
    \ be displayed the same way, let’s make some convenience functions that wrap around\
    \ the `GUILayout` functions (Listing [9-11](#A310332_2_En_9_Chapter.html#Par57)).\n\
    \n```\nvar menutop:int = 25;\n\nfunction BeginPage(width:int, height:int) {\n\
    \    GUILayout.BeginArea(Rect((Screen.width - width) / 2, menutop, width, height));\n\
    }\n\nfunction EndPage() {\n    // show Back button if not Main page\n    if (currentPage\
    \ != Page.Main && GUILayout.Button(\"Back\")) {\n        currentPage = Page.Main;\n\
    \    }\n    GUILayout.EndArea();\n}\n```\n\nThe `BeginPage()` function calls `GUILayout.BeginArea()`,\
    \ and the area is specified by the `width` and `height` passed as arguments, horizontally\
    \ centered on the screen and with its top edge distance from the top of the screen\
    \ specified by the public variable called `menutop`.\n\nThe `EndPage()` function\
    \ calls `GUILayout.EndArea()`, but before that, if the current page is not the\
    \ main page, it displays a Back button. If that button is clicked, then the current\
    \ page is set to the main page."
  raw: '### Pause the Game


    Making a pause menu involves solving two problems: making a menu and making the
    game pause. You’ll start with making the game pause. The static variable Time.timeScale
    specifies how fast the simulated game time progresses and defaults to 1\. Setting
    Time.timeScale to 0 effectively pauses the game, suspending physics, animation,
    and anything else dependent on the advance of Time.time. So, let’s make a PauseGame
    function that sets Time.timeScale to 0 (Listing [9-4](#A310332_2_En_9_Chapter.html#Par36)).


    ```

    private var savedTimeScale:float;

    function PauseGame() {

    savedTimeScale = Time.timeScale;

    Time.timeScale = 0;

    AudioListener.pause = true;

    currentPage = Page.Main;

    }

    Listing 9-4.

    A Function to Pause the Game in FuguPause.js

    ```


    PauseGame first saves the current Time.timeScale in a variable savedTimeScale
    so you can restore Time.timeScale when the game is unpaused (you shouldn’t assume
    Time.timeScale is 1 when the game is paused).


    PauseGame also sets AudioListener.pause to true, which suspends any playing sounds
    (you don’t want to do this if you’re going to play sounds in the menu).


    Finally, the currentPage variable is set to Page.Main, indicating the main pause
    screen should be displayed.


    The game is unpaused by reversing all of that (Listing [9-5](#A310332_2_En_9_Chapter.html#Par41)).


    ```

    function UnPauseGame() {

    Time.timeScale = savedTimeScale;

    AudioListener.pause = false;

    currentPage = Page.None;

    }

    Listing 9-5.

    Function That Unpauses the Game in FuguPause.js

    ```


    UnPauseGame restores Time.timeScale to the value you saved in the variables savedTimeScale
    by PauseGame and sets AudioListener.pause to false to reenable audio.


    To see whether the game is paused, you can just check whether Time.timeScale is
    0\. Listing [9-6](#A310332_2_En_9_Chapter.html#Par44) shows a little convenience
    function for that. Notice that it’s a static function, so any script can reference
    it as FuguPause.IsGamePaused().


    ```

    static function IsGamePaused() {

    return Time.timeScale==0;

    }

    Listing 9-6.

    Checking Whether the Game Is Paused in FuguPause.js

    ```


    If the game is to start paused, the Start callback should have a call to PauseGame
    (Listing [9-7](#A310332_2_En_9_Chapter.html#Par46)). Adding a public boolean startPaused
    variable and checking it before calling PauseGame makes the initial pause optional.


    ```

    var startPaused:boolean = true;

    function Start() {

    if (startPaused) {

    PauseGame();

    }

    }

    Listing 9-7.

    Pausing the Game in the Start Callback of FuguPause.js

    ```


    Since the default value for startPaused is true, if you click Play, the game will
    immediately pause, showing the ball suspended in the air. And then you’re stuck,
    since there’s no menu. There’s also no way to unpause and then pause again, so
    let’s have the Escape key (the key labeled Esc on the top left of most keyboards)
    toggle the pause state. Input handling is usually performed in the Update callback,
    and this is no exception (Listing [9-8](#A310332_2_En_9_Chapter.html#Par48)).


    ```

    function Update() {

    if (Input.GetKeyDown(KeyCode.Escape))

    {

    switch (currentPage) {

    case Page.None: PauseGame(); break; // if the pause menu is not displayed, then
    pause

    case Page.Main: UnPauseGame(); break; // if the main pause menu is displaying,
    then unpause

    default: currentPage = Page.Main; // any subpage goes back to main page

    }

    }

    }

    Listing 9-8.

    Handling the Escape Key in the Update Callback of FuguPause.js

    ```


    The first line checks whether the Esc key has been pressed. If so, then it calls
    PauseGame, unless the pause menu is already up. The function also treats Esc as
    a back key, switching from a subpage to the main page or from the main page to
    an unpaused state.


    ### Check Time.DeltaTime


    Setting Time.timeScale to 0 halts the advance of Time.time, so Time.deltaTime
    is always 0\. This works great for Update functions that multiply values by Time.deltaTime,
    but dividing by Time.deltaTime when time is frozen results in a division-by-zero
    error. There is such a case in the Update callback of the FuguForce script, so
    before proceeding with the pause menu, that has to be taken care of (Listing [9-9](#A310332_2_En_9_Chapter.html#Par51)).


    ```

    function Update() {

    forcex = 0;

    forcey = 0;

    if (Time.deltaTime > 0) {

    CalcForce();

    }

    }

    function CalcForce() {

    var deltaTime:float = Time.deltaTime;

    forcex = mousepowerx*Input.GetAxis("Mouse X")/deltaTime;

    forcey = mousepowery*Input.GetAxis("Mouse Y")/deltaTime;

    }

    Listing 9-9.

    Avoiding Divide-by-Zero in FuguForce.js

    ```


    Instead of immediately dividing the rolling force values by Time.deltaTime, now
    the Update callback checks that Time.deltaTime is not 0 before proceeding with
    the force calculation, now moved into a CalcForce function. Update always initializes
    the force values to 0 to ensure that no lingering force is applied to the bowling
    ball while the game is paused.


    ### Display the Menu


    The actual display the pause menu, as with the scoreboard in the previous section,
    must take place in an OnGUI callback function. Specifically, OnGUI needs to check
    whether the game is paused and, if so, then display the current menu page (Listing
    [9-10](#A310332_2_En_9_Chapter.html#Par54)).


    ```

    function OnGUI () {

    if (IsGamePaused()) {

    if (skin != null) {

    GUI.skin = skin;

    } else {

    GUI.color = hudColor;

    }

    switch (currentPage) {

    case Page.Main: ShowPauseMenu(); break;

    case Page.Options: ShowOptions(); break;

    case Page.Credits: ShowCredits(); break;

    }

    }

    }

    Listing 9-10.

    The OnGUI Callback in FuguPause.js

    ```


    For now, there are placeholders for each of the page display functions, keeping
    the script in a runnable state (i.e., without compilation errors) as you fill
    out each of the display functions one at a time. It’s a good idea to place Debug.Log
    statements inside these stub functions to verify they’re called when expected.
    For example, if you click Play, you should see “Main Pause” appear in the Console
    view every time you pause the game.


    ### Automatic Layout


    For the menu buttons that are stacked vertically and centered in the screen, you
    can take advantage of the GUILayout functions to avoid figuring out all the Rects
    would otherwise have to be passed for each GUI.Button. Between calls to GUILayout.BeginArea
    and GUILayout.EndArea, you can make calls to create GUI controls without passing
    Rects, using the GUILayout versions of the GUI functions. The controls will be
    automatically placed and sized within the Rect that was passed to GUILayout.BeginArea.
    Since all the pause menu pages will be displayed the same way, let’s make some
    convenience functions that wrap around the GUILayout functions (Listing [9-11](#A310332_2_En_9_Chapter.html#Par57)).


    ```

    var menutop:int=25;

    function BeginPage(width:int,height:int) {

    GUILayout.BeginArea(Rect((Screen.width-width)/2,menutop,width,height));

    }

    function EndPage() {

    // show Back button if not Main page

    if (currentPage != Page.Main && GUILayout.Button("Back")) {

    currentPage = Page.Main;

    }

    GUILayout.EndArea();

    Listing 9-11.

    GUILayout Functions for Positioning Pages in FuguPause.js

    ```


    The BeginPage function calls GUILayout.BeginArea, and the area is specified by
    the width and height passed as arguments, horizontally centered on the screen
    and with its top edge distance from the top of the screen specified by the public
    variable called menutop.


    The EndPage function calls GUILayout.EndArea, but before that, if the current
    pate is not the main page, it displays a Back button. If that button is clicked,
    then the current page is set to the main page.'
  trans: "\n### 暂停游戏\n\n制作暂停菜单需要解决两个问题：创建菜单以及让游戏暂停。我们将从让游戏暂停开始。静态变量 `Time.timeScale`\
    \ 指定模拟游戏时间前进的速度，默认为 1。将 `Time.timeScale` 设置为 0 即可有效暂停游戏，暂停物理、动画以及任何依赖于 `Time.time`\
    \ 推进的内容。因此，我们创建一个将 `Time.timeScale` 设置为 0 的 `PauseGame()` 函数（清单 9-4）。\n\n```\n\
    private var savedTimeScale:float;\nfunction PauseGame() {\n    savedTimeScale\
    \ = Time.timeScale;\n    Time.timeScale = 0;\n    AudioListener.pause = true;\n\
    \    currentPage = Page.Main;\n}\n```\n\n`PauseGame()` 首先将当前的 `Time.timeScale`\
    \ 保存在变量 `savedTimeScale` 中，以便在游戏取消暂停时可以恢复 `Time.timeScale`（你不应假设游戏暂停时 `Time.timeScale`\
    \ 为 1）。\n\n`PauseGame()` 还将 `AudioListener.pause` 设置为 `true`，这会暂停所有正在播放的声音（如果你要在菜单中播放声音，则不应执行此操作）。\n\
    \n最后，将 `currentPage` 变量设置为 `Page.Main`，表示应显示主暂停屏幕。\n\n通过逆转所有这些操作来取消游戏暂停（清单 9-5）。\n\
    \n```\nfunction UnPauseGame() {\n    Time.timeScale = savedTimeScale;\n    AudioListener.pause\
    \ = false;\n    currentPage = Page.None;\n}\n```\n\n`UnPauseGame()` 将 `Time.timeScale`\
    \ 恢复为 `PauseGame()` 保存在变量 `savedTimeScale` 中的值，并将 `AudioListener.pause` 设置为 `false`\
    \ 以重新启用音频。\n\n要查看游戏是否已暂停，你只需检查 `Time.timeScale` 是否为 0。清单 9-6 展示了一个用于此目的的小型便捷函数。请注意，它是一个静态函数，因此任何脚本都可以将其引用为\
    \ `FuguPause.IsGamePaused()`。\n\n```\nstatic function IsGamePaused() {\n    return\
    \ Time.timeScale == 0;\n}\n```\n\n如果游戏要以暂停状态启动，则 `Start()` 回调中应调用 `PauseGame()`（清单\
    \ 9-7）。添加一个公共布尔变量 `startPaused` 并在调用 `PauseGame()` 之前检查它，可以使初始暂停成为可选项。\n\n```\n\
    var startPaused:boolean = true;\nfunction Start() {\n    if (startPaused) {\n\
    \        PauseGame();\n    }\n}\n```\n\n由于 `startPaused` 的默认值是 `true`，如果你单击“播放”，游戏将立即暂停，显示球悬浮在空中。然后你就卡住了，因为没有菜单。也无法取消暂停后再重新暂停，因此我们让\
    \ Escape 键（大多数键盘左上角标有 Esc 的键）切换暂停状态。输入处理通常在 `Update()` 回调中执行，这里也不例外（清单 9-8）。\n\
    \n```\nfunction Update() {\n    if (Input.GetKeyDown(KeyCode.Escape)) {\n    \
    \    switch (currentPage) {\n            case Page.None: PauseGame(); break; //\
    \ 如果未显示暂停菜单，则暂停\n            case Page.Main: UnPauseGame(); break; // 如果正在显示主暂停菜单，则取消暂停\n\
    \            default: currentPage = Page.Main; // 任何子页面都返回主页面\n        }\n   \
    \ }\n}\n```\n\n第一行检查是否已按下 Esc 键。如果是，则调用 `PauseGame()`，除非暂停菜单已经显示。该函数还将 Esc 视为返回键，从子页面切换到主页面，或从主页面切换到未暂停状态。\n\
    \n### 检查 `Time.deltaTime`\n\n将 `Time.timeScale` 设置为 0 会停止 `Time.time` 的前进，因此 `Time.deltaTime`\
    \ 始终为 0。这对于将值乘以 `Time.deltaTime` 的 `Update()` 函数非常有效，但在时间冻结时除以 `Time.deltaTime`\
    \ 会导致除以零错误。`FuguForce` 脚本的 `Update()` 回调中就存在这种情况，因此在继续制作暂停菜单之前，必须处理这个问题（清单 9-9）。\n\
    \n```\nfunction Update() {\n    forcex = 0;\n    forcey = 0;\n    if (Time.deltaTime\
    \ > 0) {\n        CalcForce();\n    }\n}\n\nfunction CalcForce() {\n    var deltaTime:float\
    \ = Time.deltaTime;\n    forcex = mousepowerx * Input.GetAxis(\"Mouse X\") / deltaTime;\n\
    \    forcey = mousepowery * Input.GetAxis(\"Mouse Y\") / deltaTime;\n}\n```\n\n\
    现在，`Update()` 回调不再立即将滚动力值除以 `Time.deltaTime`，而是先检查 `Time.deltaTime` 不为 0，然后再进行力的计算，该计算现已移入\
    \ `CalcForce()` 函数中。`Update()` 总是将力值初始化为 0，以确保游戏暂停时没有残余的力作用于保龄球上。\n\n### 显示菜单\n\
    \n与上一节的记分牌一样，暂停菜单的实际显示必须在 `OnGUI()` 回调函数中进行。具体来说，`OnGUI()` 需要检查游戏是否已暂停，如果已暂停，则显示当前菜单页面（清单\
    \ 9-10）。\n\n```\nfunction OnGUI () {\n    if (IsGamePaused()) {\n        if (skin\
    \ != null) {\n            GUI.skin = skin;\n        } else {\n            GUI.color\
    \ = hudColor;\n        }\n        switch (currentPage) {\n            case Page.Main:\
    \ ShowPauseMenu(); break;\n            case Page.Options: ShowOptions(); break;\n\
    \            case Page.Credits: ShowCredits(); break;\n        }\n    }\n}\n```\n\
    \n目前，每个页面显示函数都只有占位符，这样当你逐个填写每个显示函数时，脚本可以保持可运行状态（即没有编译错误）。将 `Debug.Log()` 语句放入这些桩函数中，以验证它们是否在预期时被调用，这是一个好主意。例如，如果你单击“播放”，则每次暂停游戏时，都应该在控制台视图中看到“Main\
    \ Pause”。\n\n### 自动布局\n\n对于垂直堆叠并居中在屏幕上的菜单按钮，你可以利用 `GUILayout` 函数，避免计算出原本必须为每个\
    \ `GUI.Button()` 传递的所有 `Rect` 值。在 `GUILayout.BeginArea()` 和 `GUILayout.EndArea()`\
    \ 的调用之间，你可以调用创建 GUI 控件的函数，而无需传递 `Rect`，只需使用 GUI 函数的 `GUILayout` 版本即可。这些控件将在传递给\
    \ `GUILayout.BeginArea()` 的 `Rect` 内自动放置和调整大小。由于所有暂停菜单页面都将以相同方式显示，让我们创建一些便捷函数来包装\
    \ `GUILayout` 函数（清单 9-11）。\n\n```\nvar menutop:int = 25;\n\nfunction BeginPage(width:int,\
    \ height:int) {\n    GUILayout.BeginArea(Rect((Screen.width - width) / 2, menutop,\
    \ width, height));\n}\n\nfunction EndPage() {\n    // 如果不是主页面，则显示“返回”按钮\n    if\
    \ (currentPage != Page.Main && GUILayout.Button(\"Back\")) {\n        currentPage\
    \ = Page.Main;\n    }\n    GUILayout.EndArea();\n}\n```\n\n`BeginPage()` 函数调用\
    \ `GUILayout.BeginArea()`，该区域由作为参数传入的 `width` 和 `height` 指定，在屏幕上水平居中，并且其顶部边缘与屏幕顶部的距离由名为\
    \ `menutop` 的公共变量指定。\n\n`EndPage()` 函数调用 `GUILayout.EndArea()`，但在此之前，如果当前页面不是主页面，它会显示一个“返回”按钮。如果单击该按钮，则当前页面被设置为主页面。\n"
- fmt: '## The Main Page


    Now you have all of the pieces to get a menu on the screen. Listing [9-12](#A310332_2_En_9_Chapter.html#Par61)
    shows a fleshed-out `ShowPauseMenu` function.


    ```

    function ShowPauseMenu() {

    BeginPage(150,300);

    if (GUILayout.Button ("Play")) {

    UnPauseGame();

    }

    if (GUILayout.Button ("Options")) {

    currentPage = Page.Options;

    }

    if (GUILayout.Button ("Credits")) {

    currentPage = Page.Credits;

    }

    #if !UNITY_WEBPLAYER && !UNITY_EDITOR

    if (GUILayout.Button ("Quit")) {

    Application.Quit();

    }

    #endif

    EndPage();

    }

    Listing 9-12.

    Function That Displays the Pause Menu in FuguPause.js

    ```


    All of the GUI code between `BeginPage` and `EndPage` effectively takes place
    between `GUILayout.BeginArea` and `GUILayout.EndArea`, so you can use the `GUILayout`
    versions of the GUI calls to create elements without passing `Rect`s. For example,
    instead of calling `GUI.Button`, you could call `GUILayout.Button`. Aside from
    the missing `Rect` parameter, the functions look otherwise identical.


    `GUILayout.Button` is different from `GUILayout.Label` in that it returns `true`
    or `false` depending on whether the button has been pressed. So, each call to
    `GUILayout.Button` takes place inside an `if` test and executes the appropriate
    statement if the button has indeed been pressed.


    Now create a `GameObject` and name this `MainMenu`. Add the `FuguPause` Script
    component to this `GameObject`. You can select `Add Component` from the Inspector
    or drag the `FuguPause` script from the `Scripts` folder in the Project view and
    drop this on the new `MainMenu` GameObject you just created.


    When you click Play, you’ll now see the main menu, and the Play button in the
    menu should unpause the screen (Figure [9-6](#A310332_2_En_9_Chapter.html#Fig6)).
    `Application.Quit` has no functionality in a Unity web player or in the Editor,
    so that piece of code is surrounded by a test of the corresponding preprocessor
    definitions `UNITY_WEBPLAYER` and `UNITY_EDITOR` to see if the build target is
    a web player or if you’re running in the Editor. These definitions are evaluated
    just before compilation takes place (hence the term preprocessor), so if `UNITY_WEBPLAYER`
    is false and `UNITY_EDITOR` is false, the enclosed code is compiled. Otherwise,
    it’s as if the code were never there.


    ![A310332_2_En_9_Fig6_HTML.jpg](Images/A310332_2_En_9_Fig6_HTML.jpg)


    Figure 9-6. The main menu


    The Credits and Options buttons won’t do anything yet because the `ShowCredits`
    and `ShowOptions` functions are still empty shells. The Credits page is simpler,
    so let’s start with that one.


    ## The Credits Page


    Multiple credit entries can be stored in a `String` array. A variable called `credits`
    is defined for that, along with a `ShowCredits` function to display the credits,
    in Listing [9-13](#A310332_2_En_9_Chapter.html#Par68).


    ```

    var credits:String[]=[

    "A Fugu Games Production",

    "Copyright (c) 2017 Technicat, LLC. All Rights Reserved.",

    "More information at http://fugugames.com/"] ;

    function ShowCredits() {

    BeginPage(300,300);

    for (var credit in credits) {

    GUILayout.Label(credit);

    }

    EndPage();

    }

    Listing 9-13.

    Function to Display the Credits Page in FuguPause.js

    ```


    Because the variable `credits` is public, you can edit each of the credit entries
    and add to the array or remove from it in the Inspector view.


    The `ShowCredits` function loops through the array of credits and displays each
    one in a UnityGUI label (Figure [9-7](#A310332_2_En_9_Chapter.html#Fig7)). Notice
    that there is a simple way to loop through the array using `in` instead of the
    usual habit of iterating through a sequence of array indices. In this particular
    case, you don’t need an index for anything else, so let’s go with the simpler
    method.


    ![A310332_2_En_9_Fig7_HTML.jpg](Images/A310332_2_En_9_Fig7_HTML.jpg)


    Figure 9-7. The Credits page


    Like the main menu, you start with a call to `BeginPage` and end with `EndPage`
    so you’re operating inside a `GUILayout` area (this time 300 × 300) and can use
    `GUILayout.Label` instead of `GUI.Label`. `EndPage` ensures that there automatically
    is a Back button. Remember, the `Update` callback also treats the Esc key as equivalent
    to clicking the Back button.


    ## The Options Page


    The Options page is quite a bit more involved than the Credits page, as it features
    a toolbar implemented with four tabs: Audio, Graphics, Stats, and System. Listing
    [9-14](#A310332_2_En_9_Chapter.html#Par73) shows the fleshed-out `ShowToolbar`
    function, with some supporting variables and functions.


    ```

    private var toolbarInt:int=0;

    private var toolbarStrings: String[]= ["Audio","Graphics","System"];

    function ShowOptions() {

    BeginPage(318,300);

    toolbarInt = GUILayout.Toolbar (toolbarInt, toolbarStrings);

    switch (toolbarInt) {

    case 0: ShowAudio(); break;

    case 1: ShowGraphics();  break;

    case 2: ShowSystem(); break;

    }

    EndPage();

    }

    Listing 9-14.

    The Options Page in FuguPause.js

    ```


    Again, everything in the `ShowOptions` function is enclosed between calls to the
    `BeginPage` and `EndPage` functions. The first line calls `GUILayout.Toolbar`
    to create a toolbar—a row of buttons that acts as a tab or radio button—from an
    array of Strings, where each String is the label of the button. The function also
    takes an integer that corresponds to a position in that array of strings. That
    is the button to make currently active on the toolbar. But if you just had


    ```

    GUILayout.Toolbar (toolbarIndex, toolbarStrings);

    ```


    then `toolbarIndex` would never change from its initial value (0), and even if
    you click another button, the next time this is called (in the next invocation
    of `OnGUI`), the active button would be set back to that value.


    But `GUILayout.Toolbar` returns an integer that represents the currently active
    button, so you feed that value back into the variable that you passed in, `toolbarIndex`.


    ```

    toolbarIndex = GUILayout.Toolbar (toolbarIndex, toolbarStrings);

    ```


    Thus, `toolbarIndex` is 0 initially, but if you click Graphics, it’ll change to
    1, and if you click Controls, it’ll change to 2, and so on. Then there is a `switch`
    statement that checks `toolbarIndex` and calls the display function that matches
    the selected button. As with the main menu, we start with stub functions and implement
    them one by one. Go ahead and click around, and you should see the corresponding
    function names show up in the Console view because that’s all you’ve told it to
    do!


    ## The Audio Panel


    When the Audio tab is selected, it will display a slider for volume control (Figure
    [9-8](#A310332_2_En_9_Chapter.html#Fig8)).


    ![A310332_2_En_9_Fig8_HTML.jpg](Images/A310332_2_En_9_Fig8_HTML.jpg)


    Figure 9-8. The Audio panel in the pause menu


    Adding that slider to the `ShowAudio` function is actually pretty easy; it’s just
    one line. Well, it consists two lines since a slider with no label is a bit too
    mysterious (Listing [9-15](#A310332_2_En_9_Chapter.html#Par82)).


    ```

    function ShowAudio() {

    GUILayout.Label("Volume");

    AudioListener.volume = GUILayout.HorizontalSlider(AudioListener.volume,0.0,1.0);

    Listing 9-15.

    The Audio Panel in FuguPause.js

    ```


    The first line calls `GUILayout.Label`, which should be familiar by now. The second
    line calls `GUILayout.HorizontalSlider`, which takes as arguments the minimum
    value represented by the slider, the maximum value, and a value that represents
    the current setting.


    The slider reflects the value of `AudioListener.volume`, which is the master volume
    of all sounds in Unity. So, `AudioListener.volume` is passed as the current value
    of the slider, and because `AudioListener.volume` ranges from 0 to 1, those values
    are passed as the minimum and maximum, respectively. And, to register the slider
    value, the return value of `GUILayout.HorizontalSlider` is assigned back to `AudioListener.volume`.
    Otherwise, the value of `AudioListener.volume` will never change and the slider
    won’t budge.'
  raw: '## The Main Page


    Now you have all of the pieces to get a menu on the screen. Listing [9-12](#A310332_2_En_9_Chapter.html#Par61)
    shows a fleshed-out ShowPauseMenu function.


    ```

    function ShowPauseMenu() {

    BeginPage(150,300);

    if (GUILayout.Button ("Play")) {

    UnPauseGame();

    }

    if (GUILayout.Button ("Options")) {

    currentPage = Page.Options;

    }

    if (GUILayout.Button ("Credits")) {

    currentPage = Page.Credits;

    }

    #if !UNITY_WEBPLAYER && !UNITY_EDITOR

    if (GUILayout.Button ("Quit")) {

    Application.Quit();

    }

    #endif

    EndPage();

    }

    Listing 9-12.

    Function That Displays the Pause Menu in FuguPause.js

    ```


    All of the GUI code between BeginPage and EndPage effectively takes place between
    GUILayout.BeginArea and GUILayout.EndArea, so you can use the GUILayout versions
    of the GUI calls to create elements without passing Rects. For example, instead
    of calling GUI.Button, you could call GUILayout.Button. Aside from the missing
    Rect parameter, the functions look otherwise identical.


    GUILayout.Button is different from GUILayout.Label in that it returns true or
    false depending on whether the button has been pressed. So, each call to GUILayout.Button
    takes place inside an “if” test and executes the appropriate statement if the
    button has indeed been pressed.


    Now create a GameObject and name this MainMenu. Add the FuguPause Script component
    to this GameObject. You can select Add Component from the Inspector or drag the
    FuguPause script from the Scripts folder in the Project view and drop this on
    the new MainMenu GameObject you just created.


    When you click Play, you’ll now see the main menu, and the Play button in the
    menu should unpause the screen (Figure [9-6](#A310332_2_En_9_Chapter.html#Fig6)).
    Application.Quit has no functionality in a Unity web player or in the Editor,
    so that piece of code is surrounded by a test of the corresponding preprocessor
    definitions UNITY_WEBPLAYER and UNITY_EDITOR to see if the build target is a web
    player or if you’re running in the Editor. These definitions are evaluated just
    before compilation takes place (hence the term preprocessor), so if UNITY_WEBPLAYER
    is false and UNITY_EDITOR is false, the enclosed code is compiled. Otherwise,
    it’s as if the code were never there.


    ![A310332_2_En_9_Fig6_HTML.jpg](Images/A310332_2_En_9_Fig6_HTML.jpg)


    Figure 9-6.


    The main menu


    The Credits and Options buttons won’t do anything yet because the ShowCredits
    and ShowOptions functions are still empty shells. The Credits page is simpler,
    so let’s start with that one.


    ## The Credits Page


    Multiple credit entries can be stored in a String array. A variable called credits
    is defined for that, along with a ShowCredits function to display the credits,
