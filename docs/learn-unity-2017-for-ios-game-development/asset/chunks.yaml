    \nThe scoreboard and pause menu scripts are available in the project for this\
    \ chapter, accessible via the Download Source Code button located at [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739).\
    \ To reiterate a point ad nauseam, however, entering the code line by line and\
