    if the Array is filled with the capsule-based Pin prefab, but when the array is
    full of BarrelPin GameObjects, the Barrel GameObjects that act as the real pins
    are children of those BarrelPin GameObjects.


    Fortunately, in Chapter [7](../Text/A310332_2_En_7_Chapter.html) you tagged all
    the “real” pins (the GameObjects with Rigidbody and Mesh components that actually
    move) with the tag Pin. This makes it possible to retrieve an array of all the
    real pins using the static function GameObject.FindGameObjectsWithTag. That should
    take place at the end of the CreatePins function in the FuguBowl script, after
    all the pins have been instantiated (Listing [8-11](#A310332_2_En_8_Chapter.html#Par60)).
    The tagged pins are assigned to a private variable called pinBodies.


    ```

    private var pinBodies:GameObject[]; // the real physical pins

    function CreatePins() {

    pins = new Array();

    var offset = Vector3.zero;

    for (var row=0; row<pinRows; ++row) {

    offset.z+=pinDistance;

    offset.x=-pinDistance*row/2;

    for (var n=0; n<=row; ++n) {

    pins.push(Instantiate(pin, pinPos+offset, Quaternion.identity));

    offset.x+=pinDistance;

    }

    }

    pinBodies = GameObject.FindGameObjectsWithTag("Pin");

    }

    Listing 8-11.

    Declaring and Setting the pinBodies Variable in FuguBowl.js

    ```


    The number of pins that have been knocked down are counted by the function GetPinsDown
    (Listing [8-12](#A310332_2_En_8_Chapter.html#Par62)) that loops through the pinObjects
    array, incrementing a local variable pinsDown for each pin whose IsKnockedOver
    function returns true. After the loop is complete, the value of the pinsDown counter
    is returned.


    ```

    function GetPinsDown():int {

    var pinsDown:int = 0;

    for (var pin:GameObject in pinBodies) {

    if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {

    ++pinsDown;

    }

    }

    return pinsDown;

    }

    Listing 8-12.

    The GetPinsDown Function in FuguBowl.js

    ```


    Besides counting pins that have been knocked down, you can remove them, like the
    way real pins get scraped away after getting knocked down in a real bowling alley.
    The function RemoveDownedPins (Listing [8-13](#A310332_2_En_8_Chapter.html#Par64))
    loops through the pinBodies list and calls SetActive(false) on each one that returns
    true for IsKnockedDown. Calling SetActive(false) is equivalent to deselecting
    the check box on the top left of a GameObject in the Inspector view. Each pin
    that is knocked down, while not getting completely removed from the scene, is
    made invisible and does not collide.


    ```

    function RemoveDownedPins() {

    for (var pin:GameObject in pinBodies) {

    if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {

    pin.SetActive(false);

    }

    }

    }

    Listing 8-13.

    The RemovePins Function in FuguBowl.js

    ```


    Of course, deactivated pins need to be reactivated at some point. The existing
    ResetPins function (Listing [8-14](#A310332_2_En_8_Chapter.html#Par66)) is a good
    place to do that since ResetPins is called when restoring the pins to their original
    positions in preparation for bowling a new frame.


    ```

    function ResetPins() {

    for (var pin:GameObject in pinBodies) {

    pin.SetActive(true);

    pin.SendMessage("ResetPosition");

    }

    }

    Listing 8-14.

    ResetPins Function in FuguBowl.js

    ```


    In fact, now the loop through the pins array can be replaced with a loop through
    pinBodies. Within the loop, SetActive(true) is called on each pin in case it was
    deactivated, and SendMessage can replace BroadcastMessage because each pin in
    pinBodies is known to have the FuguReset script attached.


    ## The Game Logic


    I highly recommend sketching out a game as a finite state machine before attempting
    to code the game logic. A finite state machine represents a program as, surprise,
    a finite set of states. An FSM is in one state at any time and transitions from
    state to state.


    Note


    The term state machine often refers to an FSM, but technically there is a whole
    range of state machines ranging from the FSM, the simplest and least-powerful
    class of automata, up to the Turing machine, which has infinite memory and a potentially
    infinite number of states.


    Once you have your game visualized as an FSM, you can be confident that you can
    code it. Conversely, if you can’t visualize your game flow as an FSM, you probably
    just have a vague idea that you’re not yet ready to implement it!'
