    "A Fugu Games Production",

    "Copyright (c) 2017 Technicat, LLC. All Rights Reserved.",

    "More information at http://fugugames.com/"] ;

    function ShowCredits() {

    BeginPage(300,300);

    for (var credit in credits) {

    GUILayout.Label(credit);

    }

    EndPage();

    }

    Listing 9-13.

    Function to Display the Credits Page in FuguPause.js

    ```


    Because the variable credits is public, you can edit each of the credit entries
    and add to the array or remove from it in the Inspector view.


    The ShowCredits function loops through the array of credits and displays each
    one in a UnityGUI label (Figure [9-7](#A310332_2_En_9_Chapter.html#Fig7)). Notice
    that there is a simple way to loop through the array using in instead of the usual
    habit of iterating through a sequence of array indices. In this particular case,
    you don’t need an index for anything else, so let’s go with the simpler method.


    ![A310332_2_En_9_Fig7_HTML.jpg](Images/A310332_2_En_9_Fig7_HTML.jpg)


    Figure 9-7.


    The Credits page


    Like the main menu, you start with a call to BeginPage and end with EndPage so
    you’re operating inside a GUILayout area (this time 300 × 300) and can use GUILayout.Label
    instead of GUI.Label. EndPage ensures that there automatically is a Back button.
    Remember, the Update callback also treats the Esc key as equivalent to clicking
    the Back button.


