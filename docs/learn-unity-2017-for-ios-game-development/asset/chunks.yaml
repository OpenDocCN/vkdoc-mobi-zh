  trans: '

    ### 场景视图辅助图标


    `Gizmos`（辅助图标）按钮用于激活与组件相关的诊断图形显示。图 2-42 的场景视图中显示了几个辅助图标。点击 `Gizmos` 按钮并查看可用辅助图标列表，可以看到这些图标分别代表一个
    `Camera`（摄像机）、几个 `AudioSources`（音频源）和若干 `Lights`（灯光）。


    ![A310332_2_En_2_Fig42_HTML.jpg](img/A310332_2_En_2_Fig42_HTML.jpg)


    图 2-42. 场景视图中的辅助图标


    你可以在辅助图标窗口中选中或取消选中各个复选框，以便聚焦于你感兴趣的对象。左上角的复选框用于在辅助图标的 3D 显示和仅 2D 图标之间切换。旁边的滑块用于控制辅助图标的缩放比例（因此，快速隐藏所有辅助图标的一种方法就是将缩放滑块一直拖到最左侧）。


    ## 游戏视图


    现在，让我们回到游戏视图，你在编辑器中运行 Climber 游戏时已经遇到过它。与层级视图和场景视图类似，游戏视图也描绘了当前场景，但并非用于编辑目的。相反，游戏视图旨在用于运行和调试游戏。


    当你点击 Unity 编辑器窗口顶部的 `Play`（播放）按钮时，游戏视图会自动出现。如果点击 `Play` 时不存在现有的游戏视图，则会创建一个新的游戏视图。当编辑器未处于播放模式时，如果游戏视图可见，它会显示游戏的初始状态（即，从初始
    `Camera` 位置的角度观察）。


    游戏视图显示了游戏在实际部署时的外观和功能，但它与最终构建目标上的外观和行为可能存在差异。一个可能的差异是游戏视图的大小和宽高比。这可以通过视图左上角的菜单进行更改。图
    2-43 展示了从 `Free Aspect`（自由宽高比，它会适应视图尺寸）切换到 5:4 宽高比时发生的情况，后者会导致游戏显示画面按比例缩小，以适应区域并保持所选的宽高比。


    ![A310332_2_En_2_Fig43_HTML.jpg](img/A310332_2_En_2_Fig43_HTML.jpg)


    图 2-43. 游戏视图


    ### 播放时最大化


    点击 `Maximize on Play`（播放时最大化）按钮后，当游戏视图处于播放模式时，它将扩展以填充整个编辑器窗口（图 2-44）。如果该视图已从编辑器窗口分离，则此按钮无效。


    ![A310332_2_En_2_Fig44_HTML.jpg](img/A310332_2_En_2_Fig44_HTML.jpg)


    图 2-44. 启用了“播放时最大化”的游戏视图


    ### 统计信息


    `Stats`（统计信息）按钮会显示有关场景的统计数据（图 2-45），这些数据会随着游戏运行而更新。


    ![A310332_2_En_2_Fig45_HTML.jpg](img/A310332_2_En_2_Fig45_HTML.jpg)


    图 2-45. 显示统计信息的游戏视图


    ### 游戏视图辅助图标


    `Gizmos`（辅助图标）按钮用于激活与组件相关的诊断图形显示。图 2-46 的游戏视图中显示了两个图标，它们是一个音频源的辅助图标。`Gizmos` 按钮右侧的列表允许你选择要显示的辅助图标。


    ![A310332_2_En_2_Fig46_HTML.jpg](img/A310332_2_En_2_Fig46_HTML.jpg)


    图 2-46. 显示辅助图标的游戏视图


    游戏视图和场景视图都是对当前场景的描绘。一个 Unity 项目由一个或多个场景组成，而 Unity 编辑器一次只能打开一个场景。你可以将项目视为游戏，将场景视为关卡（事实上，一些用于操作场景的
    Unity 脚本函数在其名称中使用了“level”）。Unity 游戏对象通过附加组件变得有趣，每个组件都提供一些特定的信息或行为。这就是检视视图发挥作用的地方。如果你在层级视图或场景视图中选中一个游戏对象，检视视图将显示其附加的组件。


    ## 控制台视图


    在所有预设布局中剩下的那个视图——控制台视图，虽然容易被忽视，但它非常有用（图 2-47）。


    ![A310332_2_En_2_Fig47_HTML.jpg](img/A310332_2_En_2_Fig47_HTML.jpg)


    图 2-47. 控制台视图


    信息、警告和错误消息会显示在控制台视图中。错误消息为红色，警告为黄色，信息消息为白色。从列表中选择一条消息，会在下方区域显示其更详细的信息。此外，Unity
    编辑器底部的单行区域会显示最近的控制台消息，因此即使控制台视图不可见，你也能始终看到已有消息被记录。


    提示：警告消息很容易被忽略，但忽视它们会带来风险。它们的出现是有原因的，通常表明某些问题需要解决。如果你任由警告消息累积，就很难注意到真正重要的警告何时出现。


    控制台很容易变得杂乱。你可以使用控制台视图顶部的左侧三个按钮来管理这些杂乱信息。`Clear`（清除）切换按钮用于移除所有消息。`Collapse`（折叠）切换按钮用于合并相似的消息。`Clear
    on Play`（播放时清除）切换按钮会在编辑器每次进入播放模式时移除所有消息。


    `Error Pause`（错误暂停）按钮会使编辑器在遇到错误消息时暂停，具体来说，是当脚本调用 `Log.LogError` 时。


    在编辑器中操作时，日志消息会进入编辑器日志，而从 Unity 构建的可执行文件生成的消息则会定向到播放器日志。从视图菜单（点击控制台视图右上角的小图标）中选择
    `Open Player Log`（打开播放器日志）或 `Open Editor Log`（打开编辑器日志）将会打开这些日志，它们可能以文本文件形式打开，也可能在控制台应用程序中打开（图
    2-48）。


    ![A310332_2_En_2_Fig48_HTML.jpg](img/A310332_2_En_2_Fig48_HTML.jpg)


    图 2-48. Mac 控制台应用程序中的 Unity 日志


    ## 进一步探索


    我们对 Unity 的探索以及与 Climber 演示项目的互动到此结束。从下一章开始，你将从头开始创建 Unity 项目，以学习游戏引擎的各种特性。但这并不是你最后一次见到
    Climber，我们将在第 10 章和第 11 章中回到这个项目，重复此过程来介绍 Unity iOS 开发。在此之前，从下一章开始，你将从头创建 Unity
    项目，并探索通用的、主要是跨平台的 Unity 游戏引擎特性。


    这是真正开始使用 Unity 的第一章。你尚未开始构建自己的场景（这将在第 3 章开始），但你已经利用 Unity 自带的示例项目 Climber 熟悉了
    Unity 编辑器。从此刻起，有大量的官方 Unity 资源可以扩展我将要涉及的主题。


    ### Unity 手册


    如你所见，Unity 有大量的用户界面，而我们几乎未能涵盖其全部。现在是时候认真阅读 Unity 手册了，你可以在 Unity 编辑器内（欢迎屏幕或 `Help`
    菜单）阅读，也可以在 Unity 网站（[`http://unity3d.com/`](http://unity3d.com/)）的“Documentation”（文档）部分下的
    `Learn`（学习）标签页中阅读。当你想要查询某些内容或只是想在没有打开 Unity 编辑器的情况下阅读有关 Unity 的知识时，网页版非常方便。


    本章涵盖的大部分内容都与 Unity 手册的 Unity 基础知识部分中的主题相匹配，特别是关于“学习界面”、“自定义工作空间”、“发布构建”和“Unity
    快捷键”的章节（尽管我认为更好的参考方法是直接查看菜单中列出的键盘快捷键）。


    我确实提前进入了 Unity 手册的高级部分，并触及了 Unity 对版本控制的支持。Unity 手册中关于“在 Unity 中使用外部版本控制系统”的页面对此进行了更深入的介绍。

    '
- fmt: '### Tutorials


    Besides the “Documentation” section, the `Learn` tab on the Unity web site also
    includes a “Tutorials” section that features an extensive set of Beginning Editor
    videos. As the name implies, these videos provide an introduction to the Unity
    Editor, and in fact the set of videos cover much of what was discussed in this
    chapter, including descriptions of the most important views (the `Game View`,
    `Scene View`, `Hierarchy View`, `Inspector View` and `Project View`) and even
    the process of publishing a build.


    ### Version Control


    Although I only discussed version control briefly, in the context of explaining
    how to remove meta files, that topic is worth a little more discussion, since
    a VCS is so important to software development (which you’ll realize the first
    time you lose your project or can’t remember what change you made that broke your
    game!). If you already have a favorite VCS, you may want to use it with Unity,
    and if you haven’t been using one, then you may want to consider it if only to
    keep old versions of your project around in case you need to roll back, with the
    ability to check differences between versions.


    Among version control systems, Perforce is a popular commercial tool used in game
    studios, and Subversion (`svn`) has a long history as an open source option. These
    days, distributed version control systems like Git and Mercurial are trending.
    I use Mercurial on Bitbucket (`http://bitbucket.com/`) for my internal projects
    and post public projects on GitHub, including the projects for this book (`www.apress.com/9781484231739`).


    To say Unity VCS support is product agnostic is really another way of saying Unity
    doesn’t have any particular version control system integrated into the Unity Editor.
    The meta files, and YAML scene files for Unity Pro users, simply provide better
    compatibility with text-oriented version control systems that are commonly used
    for source code. You still have to run the VCS operations yourself outside of
    Unity. You can find out more about YAML, by the way, on `http://yaml.org/`.


    I find it convenient to use the Mac GitHub app provided on the GitHub web site
    and similarly Sourcetree for BitBucket, also available on that web site.


    And as we mentioned while explaining the options for Version Control Mode in the
    Editor Preferences, Unity also offers a VCS designed specifically for Unity called
    the Unity Asset Server. It requires the purchase of a Unity Team License.


    ## 3. Making a Scene


    Playing Climber was fun, but this book is about making games in Unity, not playing
    games in Unity! Finally, it’s time to get started in game development. It’s a
    long journey starting from nothing and ending up with a playable game, and this
    is the beginning. In this chapter, you’ll start with an empty scene in the Unity
    Editor and populate it with the basic building blocks of a 3D environment: models,
    textures, lights, a sky, and a camera.


    One of the challenges facing a game developer, especially one on a limited budget,
    is how to obtain these building blocks. The Unity Editor provides some primitive
    models, and any image can be used as a texture (in the tradition of the Internet,
    I’ll provide you a picture of a cat as a sample texture). And, as mentioned in
    Chapter 1, the Unity installation includes a set of Standard Assets that can be
    imported into your project at any time. All of that can only take you so far,
    though.


    Fortunately, the folks at Unity Technologies recognized this need and created
    the Asset Store, an online marketplace of Unity-ready assets with its storefront
    integrated directly into the Unity Editor. It turns out that a lot of these assets
    are free, so we’ll take advantage of that fact and incorporate some of these free
    assets into the Unity project created in this chapter.


    Each chapter in this book (with the exception of Chapters 10 and 11 where the
    Trash Cat project stages a brief comeback) builds upon the project from the previous
    chapter. So by the end of this book, the simple static scene created in this chapter
    will have evolved into an optimized bowling game with sound and physics, running
    on iOS with leaderboards, achievements and ads. The project created in this chapter,
    along with the projects for each consecutive chapter, is available on `www.apress.com/9781484231739`
    but minus any assets from the Asset Store or Standard Packages.


    Let’s get started!'
