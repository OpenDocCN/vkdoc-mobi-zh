    ![A310332_2_En_9_Fig8_HTML.jpg](Images/A310332_2_En_9_Fig8_HTML.jpg)


    Figure 9-8.


    The Audio panel in the pause menu


    Adding that slider to the ShowAudio function is actually pretty easy; it’s just
