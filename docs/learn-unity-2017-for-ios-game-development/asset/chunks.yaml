    purchased with IAP, and the iTunes Connect documentation explains how to set up
    in-app purchases.


    ### Asset Store


    I use dozens of free and paid Asset Store packages in my apps, and you will surely
    find the Asset Store useful for your own projects. But the Asset Store is also
    another place to self-publish products and generate revenue (Unity takes a 30
    percent cut, which is the same as what Apple does on the App Store). And you can
    release packages free on the Asset Store for recognition or as a contribution
    to the community (I’ve certainly taken advantage of that generosity for the examples
    in this book).


    Conveniently, Asset Store submissions are made from within the Unity Editor, using
    the Asset Store tools downloaded from, aptly, the Asset Store. You can submit
    any collection of assets from a project—audio, textures, models, scripts, plug-ins,
    or even the entire project itself.


    Tip


    Use preprocessor directives to ensure there are no compiler errors when switching
    build targets, and add a custom UNITY_PRO preprocessor directive if you have Unity
    Pro features so that Unity Basic users won’t have problems.


    Much of the work in an Asset Store submission, as with an App Store submission,
    involves creating screenshots, icons, app descriptions, and store artwork. The
    instructions for becoming a seller on the Asset Store are available at [`http://unity3d.com/asset-store`](http://unity3d.com/asset-store)
    .


    ### Developing for Android


    Almost everything developed for Unity iOS in this book will work fine with Unity
    Android. Unsurprisingly, anything in the iPhone class is not available on Android
    either (e.g., the variable iPhone.generation, which we used to check the device
    type), but everything in the Input class that works for iOS also works the same
