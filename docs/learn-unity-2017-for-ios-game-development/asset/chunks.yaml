  trans: '

    ### 场景导航


    如果你不熟悉 3D 空间操作，其实从 2D 空间延伸过来非常直观。在 2D 空间中，你只在 `x` 轴和 `y` 轴构成的平面内使用 `(x, y)` 坐标工作；而在
    3D 空间中，你额外多了一个 `z` 轴，坐标变为 `(x, y, z)`。其中 `x` 轴和 `z` 轴定义了地面平面，`y` 轴则指向上方（你可以将 `y`
    视为高度）。


    > **注意：** 某些 3D 应用程序和游戏引擎使用 `z` 轴作为高度，`x` 轴和 `y` 轴作为地面平面，因此在导入资源时，你可能需要对其进行调整（旋转）。


    3D 空间中的视点通常被称为摄像机。点击右上角彩色**场景坐标轴控件**上的 `x`、`y`、`z` 箭头，可以快速将摄像机翻转至正对相应轴的方向。例如，点击
    `y` 箭头会获得场景的俯视图（图 2-38），此时**场景坐标轴控件**下方的文字会显示为“Top”。


    这里的摄像机与游戏中运行时使用的 `Camera` 游戏对象不同，因此你无需担心在**场景视图**中环顾四周时会搞乱游戏。


    ![A310332_2_En_2_Fig38_HTML.jpg](img/A310332_2_En_2_Fig38_HTML.jpg)


    *图 2-38. **场景视图**中的侧视图*


    点击**场景坐标轴控件**中心的方框，可以在透视投影和正交投影之间切换摄像机。透视投影会使远处的物体渲染得更小，而正交投影则无论物体远近都以原始大小渲染。透视效果更真实，是游戏中常用的方式，但在设计时正交投影通常更方便（因此它在计算机辅助设计应用中很普遍）。**场景坐标轴控件**下方文字前的图形标识了当前的投影模式。


    你可以使用鼠标滚轮进行缩放，也可以选择**编辑器**窗口右上角工具栏中的 `Hand` 工具，然后按住 `Control` 键并拖拽鼠标来完成缩放。当 `Hand`
    工具被选中时，你还可以通过拖拽视图来移动摄像机，并通过按住 `Option`（或 `Alt`）键并拖拽鼠标来旋转（环绕）摄像机，这样你就不会局限于轴向摄像机的角度，如图
    2-39 所示。


    ![A310332_2_En_2_Fig39_HTML.jpg](img/A310332_2_En_2_Fig39_HTML.jpg)


    *图 2-39. **场景视图**中的倾斜透视*


    请注意，当你从任意角度观察时，**场景坐标轴控件**下方的文字会显示 `Persp` 或 `Iso`，具体取决于你当前使用的是透视投影还是正交投影（`Iso`
    是等距视图的缩写，这是一种倾斜的正交视图，常见于《星际争霸》和《Farmville》等游戏中）。


    工具栏上的其他按钮用于激活移动、旋转和缩放游戏对象的模式。由于我们无需更改 `Climber` 场景，这些模式将在你开始创建新项目时进行更详细的说明。


    > **提示：** 如果你不小心对场景进行了更改，可以从 **Edit** 菜单中选择 **Undo**。如果你做了很多不想保留的更改，可以在切换到其他场景或退出
    Unity 时选择不保存此场景。同时，请注意，在这些模式下，你仍然可以通过其他键盘和鼠标组合来移动摄像机。表 2-1 列出了所有可能的操作选项。


    *表 2-1. 可用的 **场景视图** 摄像机控制*


    | 操作 | `Hand` 工具 | 单键鼠标或触控板 | 双键鼠标 | 三键鼠标 |

    | --- | --- | --- | --- | --- |

    | 移动 | 拖拽 | 按住 `Alt-Command` 并拖拽 | 按住 `Alt-Control` 并拖拽 | 按住 `Alt` 并中键拖拽 |

    | 环绕 | 按住 `Alt` 并拖拽 | 按住 `Alt` 并拖拽 | 按住 `Alt` 并拖拽 | 按住 `Alt` 并拖拽 |

    | 缩放 | 按住 `Control` 并拖拽 | 按住 `Control` 并拖拽，或双指滑动 | 按住 `Alt` 并右键拖拽 | 按住 `Alt` 并右键拖拽或使用滚轮
    |


    还有其他一些方便的基于键盘的场景导航功能。按下 `Arrow` 键将沿 `x-z` 平面（地面平面）向前、向后、向左、向右移动摄像机。按住鼠标右键则允许你像在第一人称游戏中一样导航场景。`AWSD`
    键分别控制向左、向前、向右、向后移动，而移动鼠标则控制摄像机（视点）的观察方向。


    当你想在**场景视图**中查看某个特定的游戏对象时，最快的方法有时是在**层级**视图中选中该游戏对象，然后使用 **Edit** 菜单中的 **Frame
    Selected** 菜单项（注意方便的快捷键 `F`）。在图 2-40 中，我点击了**场景坐标轴控件**的 `x` 轴以获得水平视图，然后在**层级视图**中选中了
    `Player` 游戏对象，并按下了 `F` 键（**Edit** 菜单中 **Frame Selected** 的快捷键），从而在**场景视图**中放大并居中显示该玩家。


    你也可以直接在**场景视图**中选择一个游戏对象，但需要先退出 `Hand` 工具。正如在**层级视图**中选择一个游戏对象会使其在**场景视图**和**检视视图**中显示一样，在**场景视图**中选择一个游戏对象也会在**检视视图**中显示该选择，并使其在**层级**视图中显示为被选中的游戏对象。在图
    2-40 中，我在 `Player` 上执行了 **Frame Selected** 之后，点击了 `Move` 工具（**编辑器**窗口右上角 `Hand`
    工具按钮右侧的按钮），然后在**场景视图**中点击了一个靠近 `Player` 的游戏对象。**层级视图**会自动更新以显示该游戏对象已被选中，并且该游戏对象也会显示在**检视视图**中。


    ![A310332_2_En_2_Fig40_HTML.jpg](img/A310332_2_En_2_Fig40_HTML.jpg)


    *图 2-40. 在**场景视图**中选择游戏对象*


    ### 场景视图选项


    排列在**场景视图**顶部的按钮提供了显示选项，以辅助你的游戏开发。每个按钮都配置一种视图模式。


    最左边的按钮设置**绘制模式**。通常，此模式设置为 `Textured`，但如果你想查看所有多边形，可以将其设置为 `Wireframe`。由于 `Climber`
    是一个 2D 游戏，`Wireframe` 视图不会显示太多相关信息（图 2-41）。


    ![A310332_2_En_2_Fig41_HTML.jpg](img/A310332_2_En_2_Fig41_HTML.jpg)


    *图 2-41. **场景**视图中的 `Wireframe` 显示*


    下一个按钮设置**渲染路径**，它控制场景是正常着色还是用于诊断。


    **渲染路径**模式按钮右侧的三个按钮是简单的开关按钮。当鼠标悬停在它们上方时，它们会弹出一些鼠标悬停文档（也称为工具提示）。


    其中第一个按钮控制**场景光照**模式。此开关用于在**场景视图**中使用默认光照方案或使用你放置在游戏中的实际灯光之间切换。


    中间的按钮切换**游戏覆盖**模式，控制天空、镜头光晕和雾效是否可见。


    最后一个是**听觉模式**，用于开启或关闭声音。

