    ### 参考手册


    `Reference Manual` 描述了您优化的所有组件和资源。在这些组件中，您调整了摄像机视锥体和可见性遮罩，调整了剔除遮罩和灯光距离并禁用了其阴影，最小化了每个
    `MeshFilter` 的阴影投射器和接收器数量，简化了每个 `MeshRenderer` 的着色器，并将 `MeshCollider` 替换为 `Box`
    碰撞器。您还检查了组件所引用的各种资源类型的导入设置：`Texture2D`、`AudioClip`、`Mesh` 和 `Animation`。`Reference
    Manual` 还记录了您自定义的设置管理器，包括 **Quality Settings**、**Physics Manager**、**Time Manager**
    和 **Audio Manager**。您还使用了 `GUIText` 组件（它是用于启动画面的 `GUITexture` 的兄弟组件）来显示帧率。


    ### 脚本参考


    `Scripting Reference` 的“脚本概览”部分有一个“性能优化”页面，其中包含一些关于如何编写更快脚本的技巧。您在本章中学到的一个新函数是
    `StaticBatchingUtility` 类中的静态函数 `Combine`（`Combine` 是该类中唯一的函数），您调用它来在运行时批处理一组
    `GameObjects` 的层级结构。您在本章中学到的一个新变量是 `MonoBehaviour` 类中的 `useGUILayout` 变量，当将其设置为
    `true` 时，它通过告知 UnityGUI 系统当前 `OnGUI` 回调不会使用 `GUILayout` 函数执行任何自动布局来提高性能。


    所有设置管理器都有相应的类，以便可以通过脚本查询和设置它们的设置。由于除 `Render Settings` 之外的所有设置管理器在整个游戏中都是全局激活的，而非按场景激活，因此脚本访问允许您为每个场景调整设置。例如，您可以为每个场景定义一个质量级别，并为每个场景添加一个加载相应质量级别的脚本。本章讨论的设置管理器对应的类包括
    **Quality Settings**、**Audio Settings**、**Physics** 和 **Time**。


    您还使用了 `Time` 类，评估了其 `timeScale` 和 `deltaTime` 变量，并设置 `GUIText` 的 `text` 变量来实现基本的帧率显示。


    ### 资源商店


    `Asset Store` 列出了一些性能分析系统（搜索 `profiler`）和一些对象池系统（搜索 `pool`），例如 **PoolManager**、**Smart
    Pool** 和 **Pooling Manager**。


    ### 网络资源


    Unity 维基百科网站 [`http://wiki.unity3d.com/`](http://wiki.unity3d.com/) 在其“技巧、窍门和工具”部分提供了一些性能优化技巧和几个与性能相关的脚本。特别是，“FramesPerSecond”页面列出了几个比您在本章中创建的更复杂的帧率显示脚本（例如，它们通过一系列帧计算帧率以获得更稳定的显示）。


    Umbra 遮挡剔除系统由 Umbra Software 开发，网址为 [`http://umbrasoftware.com/`](http://umbrasoftware.com/)。Beast
    光照贴图系统是 Autodesk 的产品，其产品页面位于 [`http://gameware.autodesk.com/beast`](http://gameware.autodesk.com/beast)。


    ### 书籍推荐


    我已经多次提到《*Real-Time Rendering*》（ [`http://realtimerendering.com`](http://realtimerendering.com)
    ），但它与本章中的图形优化确实非常相关。仅关于 mipmapping 的论述就值得一读。


    # 15. 接下来去哪里？


    至此，您已经完成了 Unity 和 Unity iOS 开发的入门指南，包括下载和安装 Unity、在 Unity 编辑器中开发一个简单的保龄球游戏、使其在
    iOS 上运行，以及最终优化它以获得可接受的性能。由于本书并未涵盖所有 Unity 功能或游戏开发主题（否则这本手册将开始像一套多卷百科全书！），我将以一章的“深入探索”作为总结。


    ## 更多脚本编程


    关于 Unity 脚本编程，我仅触及了表面，不仅是所提供的脚本语言种类和丰富的 Unity 类库，还涉及了脚本编写的内容。


    ### 编辑器脚本


    如果您觉得 Unity 编辑器中缺少某些功能，那么很有可能您可以通过编写编辑器脚本来自行添加。这些脚本也是用 JavaScript、C# 或 Boo 编写的，但它们位于项目视图的
    `Editor` 文件夹中。编辑器脚本可以通过一组编辑器类访问编辑器 GUI、项目设置和项目资源，这些类在脚本参考的“编辑器类”部分有文档说明。


    举个例子，让我们在 Unity 编辑器菜单栏上创建一个菜单，其中包含用于激活和停用整个 `GameObjects` 层级结构的命令。换句话说，这些命令会对层级结构中的每个
    `GameObject` 调用 `SetActive`，相当于在 Inspector 视图中点击每个 `GameObject` 的复选框。


    在 Unity 4 之前，每个 `GameObject` 只有一个由 Inspector 视图中的活动复选框和 `GameObject` 变量 `active`
    表示的激活状态。但从 Unity 4 开始，Inspector 视图中的复选框表示 `GameObject` 的局部激活状态，可以通过脚本调用 `SetActive`
    设置，并通过 `GameObject` 变量 `activeSelf` 读取。全局或“真正”的激活状态取决于其所有父级是否也在局部处于激活状态。因此，确保层级结构中所有
    `GameObject` 在局部激活后，可以通过切换根 `GameObject` 的激活状态来停用整个组。手动点击所有这些复选框可能既费力又容易出错，因此一个执行此操作的单一命令将非常有用，特别是对于将项目升级到
    Unity 4 的开发者来说。


    创建编辑器脚本的过程与创建用于场景的脚本相同，只是编辑器脚本必须位于 `Editor` 文件夹中。因此，让我们在项目视图中创建一个新的 JavaScript，将其命名为
    `FuguEditor`，并放置到 `Editor` 文件夹中（图 15-1）。


    ![A310332_2_En_15_Fig1_HTML.jpg](img/A310332_2_En_15_Fig1_HTML.jpg)


    图 15-1. 创建新的编辑器脚本


    现在向脚本中添加清单 15-1 中的代码。


    ```

    #pragma strict

    @MenuItem ("FuguGames/ActivateRecursively")

    static function ActivateRecursively() {

    if (Selection.activeGameObject !=null) {

    SetActiveRecursively(Selection.activeGameObject,true);

    }

    }

    @MenuItem ("FuguGames/DeactivateRecursively")

    static function DeactivateRecursively() {

    if (Selection.activeGameObject !=null) {

    SetActiveRecursively(Selection.activeGameObject,false);

    }

    }

    static function SetActiveRecursively(obj:GameObject,val:boolean) {

    obj.SetActive(val);

    for (var i:int=0; i<obj.transform.GetChildCount(); ++i) {

    SetActiveRecursively(obj.transform.GetChild(i).gameObject,val);

    }

    }

    @MenuItem ("FuguGames/ActivateRecursively", true)

    @MenuItem ("FuguGames/DeactivateRecursively", true)

    static function ValidateGameObject() {

    return (Selection.activeGameObject !=null);

    }

    ```


    **清单 15-1.** `FuguEditor.js` 的完整清单


    `@MenuItem ("FuguGames/ActivateRecursively")` 这一行会在编辑器菜单栏的 `FuguGames` 菜单中添加一个
    `ActivateRecursively` 菜单项，如果菜单尚未创建则会创建它。`@MenuItem` 行之后的函数会在选择该菜单项时被调用。`ActivateRecursively`
    会检查编辑器中是否已选中一个 `GameObject`，如果是，则将该 `GameObject` 连同值 `true` 一起传递给函数 `SetActiveRecursively`。`SetActiveRecursively`
    依次对层级结构中的每个 `GameObject` 调用 `SetActive` 并传入值 `true`。


    之后，一段类似的代码会在菜单中添加一个 `DeactivateRecursively` 项，仅在名称和传递给 `SetActiveRecursively`
    的值（传递 `false` 而非 `true`）上有所不同。

