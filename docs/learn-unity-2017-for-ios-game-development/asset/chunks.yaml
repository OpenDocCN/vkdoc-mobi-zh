  trans: '

    `Ball2` 与 `Ball1` 类似，不同之处在于它还显示字母 `I` 表示补中。通常，`I` 会使用斜杠字符（`/`）表示补中，但此处该字符用于分隔
    `Ball1`、`Ball2` 和 `Ball3` 的得分。


    `Ball3` 的 `String` 仅当当前局为第十局（索引 9）时才构建。`Ball3` 与 `Ball2` 相同，只是它检查的是 `Ball2` 和
    `Ball3` 的组合补中，而非 `Ball1` 和 `Ball2`。


    每局总得分仅需调用 `FuguBowlPlayer` 函数的 `GetScore` 即可获取，并且只要得分可用（即不等于 `-1`），就会显示出来。每个 `GUI.Label`
    的 `Rect` 相对于屏幕左上角偏移，偏移量根据 `GUI.Label` 所显示的局数递增（图 9-2）。


    ![A310332_2_En_9_Fig2_HTML.jpg](img/A310332_2_En_9_Fig2_HTML.jpg)


    图 9-2. 由 `FuguBowlScoreboard.js` 显示的保龄球记分牌


    图 9-2 显示了第四局第二球时的比赛情况。第一球击倒了三个球瓶。前两局均为全中，第三局为补中（第一球击倒五个球瓶，第二球也击倒五个）。第一局的总得分为：全中
    10 分，加上后续两球击倒的球瓶数，即第二局全中 10 分，再加上第三局第一球的 5 分，总计 25 分。


    第二局也是全中，因此得分为：10 分加上第三局第一球的 5 分和该局第二球的 5 分，总计 20 分。加上第一局的 25 分，比赛总分为 45 分。


    第三局为补中，因此得分为：10 分再加上下一球击倒的 3 分，总计 13 分；加上上一局后的比赛总分，即 58 分。可见，你的计分代码和记分牌代码运行正常！


    ### 设计 GUI 样式


    GUI 控件的外观可以通过 `GUIStyle` 进行自定义，`GUIStyle` 是一组影响控件显示效果的属性集合。从概念上讲，它类似于用于格式化网页内容的层叠样式表（CSS）。


    每个创建 GUI 控件的 GUI 函数都是重载函数，有两种形式：一种使用默认的 `GUIStyle`，另一种接受 `GUIStyle` 参数。最初的单标签示例仅使用了默认的
    `GUIStyle`，但记分牌使用的是接受 `GUIStyle` 参数的 `GUI.Label` 版本，这样可以自定义记分牌的外观。


    传递给 `GUI.Label` 的 `GUIStyle` 绑定到了一个名为 `style` 的公共变量上，这样就能在 Inspector 视图中自定义 `GUIStyle`。例如，由于记分牌全是文本，你可以点击
    `style` 属性中 Normal 子项的 Text Color 字段（相当于在脚本中访问 `style.onNormal.textColor`），调出颜色选择器并更改记分牌的颜色（图
    9-3）。


    ![A310332_2_En_9_Fig3_HTML.jpg](img/A310332_2_En_9_Fig3_HTML.jpg)


    图 9-3. `GUIStyle` 选项


    在众多其他 `GUIStyle` 属性中，有几个会影响 GUI 字体，默认字体是 Unity 内置的 Arial 字体。你可以通过将项目视图中的字体资源拖拽到
    `GUIStyle` 的 Font 字段（在脚本中，即变量 `style.font`）来更改字体。任何 TrueType、OpenType 或 dfont
    格式的字体都可以导入 Unity。


    其他 `GUIStyle` 属性可控制字号、样式（对于作为动态字体导入的字体）、文本对齐和自动换行。


    富文本格式尤其有趣，因为它允许在标签文本中使用类似 HTML 的标记。因此，虽然脚本很简单，但样式自定义选项非常丰富！


    ## 暂停菜单


    与记分牌相比，开始/暂停菜单需要更多的脚本编写工作，因此，首先需要设计一个方案。让我们创建一个主菜单和两个子菜单：一个用于游戏选项，另一个用于显示游戏致谢。选项菜单将包含音频、图形、系统和统计数据等不同的面板。其逻辑虽然没有保龄球游戏控制器那么复杂，但这也是一个需要先以状态图（图
    9-4）形式勾勒出设计的例子。


    ![A310332_2_En_9_Fig4_HTML.jpg](img/A310332_2_En_9_Fig4_HTML.jpg)


    图 9-4. 暂停菜单的状态图


    该图显示，玩家可以从游戏进行状态（或等同于菜单不可见状态）进入主暂停菜单，然后进入致谢画面或选项菜单，也可以退出游戏。而选项菜单又可以显示音频、图形、系统或统计面板，每个面板都可以列为单独的状态，但为了简化起见，我们暂时将每个顶层菜单画面视为一个状态。


    除 `Quit`（可视为退出状态）之外的所有状态，都可以返回到最初进入它们之前的状态，这就是为什么每个转换箭头都绘制为双向的原因。这意味着玩家可以从主菜单进入选项菜单，再返回主菜单，然后从那里返回到正常游戏模式。但不会有例如从选项菜单直接返回游戏状态的快捷方式。


    ### 创建脚本


    让我们开始实现暂停菜单，在项目视图的 Scripts 文件夹中创建一个新的 JavaScript 脚本，并将其命名为 `FuguPause`（图 9-5）。


    ![A310332_2_En_9_Fig5_HTML.jpg](img/A310332_2_En_9_Fig5_HTML.jpg)


    图 9-5. 创建 `FuguPause.js` 脚本


    现在，为了将脚本添加到场景中，在 Hierarchy 视图中创建一个新的 `GameObject`，将其命名为 `PauseMenu`，并将 `FuguPause`
    脚本附加到 `PauseMenu` `GameObject` 上。


    ### 跟踪当前菜单页面


    在 `FuguBowl` 脚本中使用协程实现状态机的技术不适用于 UnityGUI，因为所有 UnityGUI 函数都必须在 `OnGUI` 回调中调用。但状态图仍然可以作为实现的基础。首先，可以关注表示不同菜单画面的状态。为了将它们与更通用的术语“画面”区分开，我们称这些状态为“页面”。这些菜单状态可以用字符串或整数来区分，但当有多个相关但不同的值时，枚举更合适。因此，让我们定义一个名为
    `Page` 的 `enum` 来表示菜单页面状态，以及一个名为 `currentPage` 的变量来跟踪当前正在显示的页面（清单 9-3）。


    ```enum Page {

    None, Main, Options, Credits

    }```清单 9-3. 菜单页面的枚举


    根据状态图，该 `enum` 列出了无菜单（游戏进行中）、主菜单页面、选项页面和致谢页面的状态。因为变量 `currentPage` 的类型是 `Page`，所以只能将值
    `Page.None`、`Page.Main`、`Page.Options` 和 `Page.Credits` 赋给该变量。

