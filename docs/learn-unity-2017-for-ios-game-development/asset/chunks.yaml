    ### Run the Editor Profiler


    The built-in profiler gives you a general idea of the bottlenecks in your game’s
    performance—whether it’s draw calls, physics computation, or script execution,
    for example. But it’s still a bit of a guessing game figuring out exactly what’s
    taking up the frametime. The Profiler can record the performance of a game run
    in the Editor or profile remotely, capturing performance data from a test device.
    To profile your bowling game running on a test device, you need to select the
    Development Build option in the Build Settings, which will enable the Autoconnect
    Profiler option (Figure [14-7](#A310332_2_En_14_Chapter.html#Fig7)).


    ![A310332_2_En_14_Fig7_HTML.jpg](Images/A310332_2_En_14_Fig7_HTML.jpg)


    Figure 14-7.


    Building with Autoconnect Profiler enabled


    Perform a Build and Run operation, and the Profiler window should appear automatically,
    running a profiling session of the game running on the device (Figure [14-8](#A310332_2_En_14_Chapter.html#Fig8)).


    ![A310332_2_En_14_Fig8_HTML.jpg](Images/A310332_2_En_14_Fig8_HTML.jpg)


    Figure 14-8.


    The Profiler window


    The topmost bar displays the computer processing unit (CPU) usage. This particular
    profile indicates you’re hovering around 30 fps. The area below shows a breakdown
    of the CPU usage by function calls (Figure [14-9](#A310332_2_En_14_Chapter.html#Fig9)).


    ![A310332_2_En_14_Fig9_HTML.jpg](Images/A310332_2_En_14_Fig9_HTML.jpg)


    Figure 14-9.


    The Profiler breakdown of CPU usage


    You can expand the items to reveal the nested function calls. Figure [14-9](#A310332_2_En_14_Chapter.html#Fig9)
    indicates you’re spending a lot of time in your UnityGUI functions, both the scoreboard
    and the pause menu (this profile is taken with the pause menu up).


    ### Manually Connect the Profiler


    If for some reason the Profiler doesn’t start automatically, you can open the
    Profiler from the Window menu (Figure [14-10](#A310332_2_En_14_Chapter.html#Fig10)).


    ![A310332_2_En_14_Fig10_HTML.jpg](Images/A310332_2_En_14_Fig10_HTML.jpg)


    Figure 14-10.


    The Window menu item to display the Profiler


    The Profiler is actually a view, which is why it’s listed among the other views
    in the Window menu. But, like the Asset Store, the Profiler takes up so much screen
    space it is best left by itself in a floating window.


    Once the Profiler window is up, it will automatically start recording the game
    in the Editor (even if the game is not actually running), so click the Record
    button to stop it. Then select your iOS test device in the Active Profiler window
    (Figure [14-11](#A310332_2_En_14_Chapter.html#Fig11)) and click the Record button
    again to start profiling.


    ![A310332_2_En_14_Fig11_HTML.jpg](Images/A310332_2_En_14_Fig11_HTML.jpg)


    Figure 14-11.


    Selecting an iOS device as the active profiler


    ### Add a Frame Rate Display


    Enabling the built-in profiler or attaching to the Editor Profiler over the network
    is inconvenient just to see the frame rate. That’s where an on-screen frame rate
    display would come in handy. That way you can just toggle it on while you’re on
    the sofa watching TV and play-testing your game (at least that’s what I do).


    For an on-screen frame rate display, you could use a Unity UI Image component
    like you did with the bowling scoreboard. However, there’s another way to display
    2D text on screen, and that’s by using the UI Text component. You can create a
    GameObject with a UI Text component already attached using the GameObject menu
    on the menu bar or using the Create menu in the Hierarchy view (Figure [14-12](#A310332_2_En_14_Chapter.html#Fig12)).


    ![A310332_2_En_14_Fig12_HTML.jpg](Images/A310332_2_En_14_Fig12_HTML.jpg)


    Figure 14-12.


    Creating a UI Text GameObject


    Let’s go ahead and create that UI Text GameObject and name it FPS (Figure [14-13](#A310332_2_En_14_Chapter.html#Fig13)).


    ![A310332_2_En_14_Fig13_HTML.jpg](Images/A310332_2_En_14_Fig13_HTML.jpg)


    Figure 14-13.


    The FPS GameObject with a UI Text component


    Like the UI Texture you used for your secondary splash screen, UI Text is positioned
    on the screen in normalized coordinates, where the bottom-left corner is 0,0 and
    the-top right is 1,1, specified in the Transform x and y values of the GameObject.
    Set the x and y positions of your frame rate display to -.1 each, placing it near
    the bottom-left corner, and change the text value to FPS.


    Don’t bother to customize the font because the frame rate display is only for
    development use and you won’t activate it in the released app (although in HyperBowl,
    the frame rate display can be activated by users so they can report performance
    issues). The default size value of 0 indicates the font size specified in the
    font’s import setting is used, but that’s pretty small, so let’s set it to a reasonably
    large size, 40. All this time, the GUIText is visible in the Game view, so you
    can see the effect of the size changes (Figure [14-14](#A310332_2_En_14_Chapter.html#Fig14)).


    ![A310332_2_En_14_Fig14_HTML.jpg](Images/A310332_2_En_14_Fig14_HTML.jpg)


    Figure 14-14.


    The Game view with a UI Text GameObject


    Just as UI Image is a more convenient for displaying static textures than Unity
    UI, requiring no scripting, UI Text is a more straightforward way to display static
    text on the screen than Unity UI Image. But for your frame rate display, you do
    need to change the text in UI Text, and you can do that in a script, setting the
    text variable in the UI Text instance. Let’s implement your frame rate display
    script now. Create a new script, place it in the Scripts folder, and name it FuguFPS
    (Figure [14-15](#A310332_2_En_14_Chapter.html#Fig15)).


    ![A310332_2_En_14_Fig15_HTML.jpg](Images/A310332_2_En_14_Fig15_HTML.jpg)


    Figure 14-15.


    Creating a new FuguFPS.js script


    Then add the Update function in Listing [14-5](#A310332_2_En_14_Chapter.html#Par48)
    to the script. The script’s Update callback sets the GUIText text variable, the
    text that is displayed on the screen, with the calculated frame rate. The calculation
    is simplistic, based on Time.delta time, which is the most recent frametime. Normally,
    frames per second would be calculated as 1/Time.deltaTime, but since Time.deltaTime
    is scaled by Time.timeScale, you can easily take that into account by using Time.timeScale/Time.deltaTime.


    The text variable in GUIText is a String variable, so you need to convert the
    frame value to a String by calling the number’s ToString function (every built-in
    type has a ToString function). And then append the String “FPS” so you won’t wonder
    what those two numbers are on the screen!


    ```

    #pragma strict

    function Update()

    {

    if (Time.deltaTime>0) {

    var fps:float = Time.timeScale/Time.deltaTime;

    guiText.text  = fps.ToString("f0")+"FPS";

    }

    }

    Listing 14-5.

    The Complete Frame Rate Display Script FuguFPS.js

    ```'
