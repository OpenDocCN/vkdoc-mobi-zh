  trans: '

    ### Unity 手册


    既然讨论回到了 Climber，那么 Unity 手册中第一个相关章节便是“Unity 基础知识”部分，特别是“发布构建”页面。


    Unity 手册还包含几个专门关于 Unity iOS 的章节，不过你可能需要点击手册顶部的 iPhone 图标才能看到这些内容。撰写本文时，“iOS 开发入门”部分已有些过时，但其“Unity
    Remote”页面对于解释如何设置和运行该应用仍然有用。


    关于 Unity iOS 的较新文档列在 Unity 手册的“高级”部分，其中包括“Unity Xcode 项目结构”页面。熟悉生成的 Xcode 项目中的文件是个好主意，但除非你需要启用内置分析器（这将在第
    [16](https://doi.org/10.1007/978-1-4842-3174-6_16) 章中进行），否则你不需要改动 Unity 生成的 Xcode
    文件。


    ### 参考手册


    让 Angry Bots 成功构建的大部分工作都是在玩家设置中填写适当的值。本章对 iOS 特有的设置进行了简要概述，只有“默认方向”和“设备 SDK”设置对于在
    iOS 模拟器中运行很重要，但参考手册中的“玩家设置”页面详细介绍了每个独立的跨平台和 iOS 特有的玩家设置，以及其他平台的设置。


    ### iOS 开发者库


    `Xcode` 的下载链接和文档可在 Apple 开发者网站的 `Xcode` 页面（`http://developer.apple.com/xcode`）上找到。使用
    Unity 进行 iOS 开发的一大好处是，你无需深入了解 `Xcode` 和 `Objective-C`。不过，熟悉 Xcode 并理解 `Objective-C`
    代码仍然会对你有所帮助。


    除了在其“帮助”菜单下可以找到的 `Xcode` 文档外，`Xcode` 网站（`http://developer.apple.com/xcode`）上还提供了指向开发者文档的链接。`Xcode`
    主题下还列出了许多其他文章，其中许多也可以在 `Xcode` 的“帮助”菜单中找到，包括 `Xcode` 用户指南和 `Xcode` 基础知识帮助。


    iOS 开发者库在主题中列出了“Xcode”，而 `Xcode` 主题中大多数相关的“IDE”部分都可以在 iOS 模拟器的用户指南中找到。该指南内容详尽，包含多个章节，对本书的介绍进行了扩展，解释了如何从
    `Xcode` 启动模拟器、如何操作模拟器以及如何调用模拟设备输入。


    Unity 在很大程度上让你无需直接接触 Xcode 工作，在本章中，你只需在 Xcode 中单击“运行”按钮即可运行 iOS 模拟器。因此，提前阅读相关工具的资料是个好主意，为下一章做准备，在下一章中，你将学习如何构建并运行应用以进行测试，以及如何构建应用以提交到
    App Store。


    # 11. 真机构建：设备测试与 App 提交


    在 iOS 上运行 Climber 游戏出乎意料地简单。只需将构建目标切换到 iOS，然后在编辑器中立即使用 `Unity Remote` 应用作为输入设备来运行游戏（或者，在
    iOS 模拟器中运行游戏时，在玩家设置中将目标 SDK 设置为 `Simulator SDK` 进行构建）。


    这看起来可能太简单了，以至于不像是最终结果，事实也确实如此。下一步是令人痛苦的部分：构建 Unity 项目，使其能够在真实的 iOS 硬件上安装和运行。这个过程涉及
    Unity 的部分很简单，几乎与构建项目以在 iOS 模拟器上运行相同。但是，在测试设备上安装应用需要使用移动配置文件来构建应用，该配置文件也需要安装在 Xcode
    和测试设备上。在此之前，必须使用与测试设备和应用包标识符关联的开发证书，在 Apple 的配置门户中创建该配置文件。因此，在此之前，必须先在配置门户中注册测试设备和包标识符，并且在创建证书请求后生成开发证书。


    这仅仅是为了测试。构建用于提交到 App Store 的应用也需要类似的过程，但需要使用单独的分发配置文件和相应的证书。此外，将应用提交到 App Store
    还需要将应用添加到 `iTunes Connect`，这是一个用于在 App Store 上管理应用的单独网站。


    如果处理配置文件听起来很麻烦，你可能会想跳过本章，稍后再回来。实际上，接下来几章中保龄球游戏的 iOS 适配版可以使用 `Unity Remote`（针对第
    13 章的输入代码）和 iOS 模拟器（针对第 12 章设置的图标、启动屏幕和屏幕大小）进行测试，就像上一章中处理 Climber 游戏一样。此外，访问配置门户和
    `iTunes Connect`（以及相关的非公开文档）需要成为 iOS 开发者计划的成员，所以如果你还没加入，那无论如何也只能等待。


    但是，你需要加入 iOS 开发者计划才能设置 `Game Center` 排行榜和成就（我将在第 14 章中介绍）以及 `iAd` 横幅广告和插页式广告（我将在第
    15 章中介绍）；此外，性能测量（我将在第 [16](https://doi.org/10.1007/978-1-4842-3174-6_16) 章中介绍）如果不能在实际硬件上运行，也就不那么有趣了。因此，至少最好尽快开始
    iOS 开发者计划的注册流程！


    ## 注册为 iOS 开发者


    正如你所料，Apple 开发者网站（`http://developer.apple.com/`）是查找大多数官方 Apple 开发者资源的地方（`iTunes
    Connect` 除外），包括所有 Apple 开发者计划——Mac 开发者计划、Safari 开发者计划，以及你感兴趣的 iOS 开发者计划。你可以以个人或公司身份注册
    iOS 开发者计划。只要你有信用卡并准备支付每年 `$99` 的费用，以个人身份注册就相当简单。以公司身份注册也需要同样的条件，但还需要一个合法的公司实体以及公司的支持信息，包括一个数据通用编号系统（DUNS）编号，这是
    Dun & Bradstreet 分配给公司的唯一标识符。个人和公司账户都需要经过 Apple 批准，但公司账户的批准时间可能比个人账户更长（我的公司 Technicat,
    LLC 的批准花了三个月时间）。


    公司账户唯一额外功能是账户管理员可以添加团队成员，因此在本书中，我将假定你使用的是个人账户，或者等效地，作为公司账户的管理员。


    一旦你被批准为 iOS 开发者，你就可以使用你的 Apple ID 登录 Apple 开发者网站以及 `iTunes Connect`（`http://itunesconnect.apple.com/`）。`ITunes
    Connect` 是你管理所有已上架或准备上架 App Store 的应用的网站。但在使用 `iTunes Connect` 之前，你将登录 Apple 开发者网站，并在配置门户中创建开发和分发配置文件，这些文件分别用于测试构建和分发构建。

    '
- fmt: '# Use the Provisioning Portal


    Assuming you have an iOS Developer Program membership (if not, you can skip this
    chapter and return later), log in to [`http://developer.apple.com/`](http://developer.apple.com/)
    and enter the Provisioning Portal.


    > **Note**: The Apple developer site has several areas that you can log in to—the
    Member Center, iOS Dev Center, and Developer Forums—and you can reach the Provisioning
    Portal from either the Member Center or the iOS Dev Center (at this time, the
    organization is a bit confusing).


    Detailed documentation is available on the site once you log in (the Provisioning
    Portal is one area where Apple doesn’t have much in the way of public screen-to-screen
    documentation), but I’ll briefly outline the steps that are involved and the information
    you need to provide.


    ## Register Test Devices


    A development provisioning profile is valid only for a specified set of test devices,
    so the first thing to do is register in the Provisioning Portal the iOS devices
    you want to use for testing. You will need to supply the unique device identifier
    (`UDID`) for each device. The `UDID` of a device can be found with iTunes or `Xcode`.
    In iTunes, when an iOS device is connected to your Mac, the `UDID` can be found
    by clicking the serial number of the device, which switches the serial number
    display to a `UDID` display. But that display cannot be copied and pasted, so
    a better option is to obtain the number from `Xcode`.


    When an iOS device is connected to your Mac, the `UDID` will show up in the Xcode
    Devices window. To bring up the Devices window in `Xcode`, launch `Xcode` if it’s
    not running already and then select `Devices` from the `Window` menu (Figure [11-1](#A310332_2_En_11_Chapter.html#Fig1)).


    ![A310332_2_En_11_Fig1_HTML.jpg](Images/A310332_2_En_11_Fig1_HTML.jpg)


    *Figure 11-1. Selecting `Devices` from the Xcode `Window` menu*


    Once the Organizer window is up, all connected iOS devices should be listed in
    the left panel. Select the device you want to register for testing, and the device
    information, including the `UDID` (listed as the `identifier`), will be displayed
    (Figure [11-2](#A310332_2_En_11_Chapter.html#Fig2)).


    ![A310332_2_En_11_Fig2_HTML.jpg](Images/A310332_2_En_11_Fig2_HTML.jpg)


    *Figure 11-2. Obtaining a device ID from the Xcode Organizer*


    You can then copy and paste the `UDID` into the Provisioning Portal to register
    your test device.


    ## Register App Identifiers


    Once you’ve registered your test devices, you need to register app identifiers
    because each provisioning profile is valid for only a single app ID. An app ID
    corresponds to a bundle ID (the same one specified in the Unity player settings
    for your app) or matches many bundle IDs when it ends with an asterisk (then it’s
    called a wildcard app ID). For example, I registered the app ID `com.technicat.*`
    that I can use in a single provisioning profile for all my apps, such as `com.technicat.fugubowl`
    and `com.technicat.hyperbowl`.


    > **Tip**: Create a wildcard app ID that matches all or most of your bundle IDs
    so you don’t have to create a new app ID for every bundle ID.


    ## Use Development Provisioning Profiles


    To create a development provisioning profile, you need to generate a development
    certificate that is associated with the profile. The Provisioning Portal has instructions
    on how to generate and upload a certificate request, which will in turn result
    in a new development certificate. Then you can create a development provisioning
    profile associated with that certificate.


    Actually, once you have generated a development certificate, the Provisioning
    Portal will automatically generate a Team provisioning profile for you that uses
    the asterisk (`*`) as an app ID and thus matches any of your bundle IDs, which
    is a real convenience. But you can also generate any number of other development
    provisioning profiles with the same certificate and the app ID you specify.


    ## Use Distribution Provisioning Profiles


    Creating a distribution provisioning profile is similar to creating a development
    provisioning profile. You’ll need to create a distribution certificate and then
    a distribution provisioning profile associated with that certificate.


    > **Tip**: You can save a little time by reusing the same certificate request
    file to create both the development and distribution certificates.


    # Use the Xcode Organizer


    When your development provisioning profiles are available, you can download them
    into `Xcode`. Bring up the Xcode Organizer window (from the Xcode `Window` menu),
    select `Provisioning Profiles` in the sidebar, and click the `Refresh` button
    on the lower right of the profiles list. After prompting you for your Apple developer
    login, the Organizer will retrieve and display all the provisioning profiles you’ve
    created in the Provisioning Portal.


    Figure [11-3](#A310332_2_En_11_Chapter.html#Fig3) shows all four of my provisioning
    profiles. Notice all the app IDs are prefixed with a number. That’s generated
    by the Provisioning Portal and called the bundle seed ID. For our purposes here,
    you can ignore it.


    ![A310332_2_En_11_Fig3_HTML.jpg](Images/A310332_2_En_11_Fig3_HTML.jpg)


    *Figure 11-3. Provisioning profiles listed in the Xcode Organizer*


    The first provisioning profile, named **La Petite Baguette Distribution**, is
    a distribution provisioning profile that only matches an app called La Petite
    Baguette (a restaurant app). Notice that the app ID is fully specified, exactly
    matching the bundle ID for the La Petite Baguette app. Notice also that the provisioning
    profile has expired.


    The second profile, **iOS Team Provisioning Profile**, is a development provisioning
    profile automatically created by the Provisioning Portal. It matches any app’s
    bundle ID.


    The third profile, named `techdev`, is a development provisioning profile I created
    that will work with any of my apps, as it will match any bundle ID starting with
    `com.technicat`.


    The fourth profile is my sole distribution provisioning profile. It also matches
    any app that has a bundle ID starting with `com.technicat`.


    Notice the expiration date. Certificates, and thus their associated provisioning
    profiles, expire after a year, at which point you’ll have to replace the expired
    profile with a new profile created with a new certificate.


    You can add a provisioning profile (Figure [11-4](#A310332_2_En_11_Chapter.html#Fig4))
    within the Xcode Organizer by clicking the `+` button on the lower left.


    ![A310332_2_En_11_Fig4_HTML.jpg](Images/A310332_2_En_11_Fig4_HTML.jpg)


    *Figure 11-4. Adding a provisioning profile*'
  raw: '## Use the Provisioning Portal


    Assuming you have an iOS Developer Program membership (if not, you can skip this
    chapter and return later), log in to [`http://developer.apple.com/`](http://developer.apple.com/)
    and enter the Provisioning Portal .


    Note


    The Apple developer site has several areas that you can log in to—the Member Center,
    iOS Dev Center, and Developer Forums—and you can reach the Provisioning Portal
    from either the Member Center or the iOS Dev Center (at this time, the organization
    is a bit confusing).


    Detailed documentation is available on the site once you log in (the Provisioning
    Portal is one area where Apple doesn’t have much in the way of public screen-to-screen
    documentation ), but I’ll briefly outline the steps that are involved and the
    information you need to provide.


    ### Register Test Devices


    A development provisioning profile is valid only for a specified set of test devices
    , so the first thing to do is register in the Provisioning Portal the iOS devices
    you want to use for testing. You will need to supply the unique device identifier
    (UDID) for each device. The UDID of a device can be found with iTunes or Xcode.
    In iTunes, when an iOS device is connected to your Mac, the UDID can be found
    by clicking the serial number of the device, which switches the serial number
    display to a UDID display. But that display cannot be copied and pasted, so a
    better option is to obtain the number from Xcode.


    When an iOS device is connected to your Mac, the UDID will show up in the Xcode
    Devices window. To bring up the Devices window in Xcode, launch Xcode if it’s
    not running already and then select Devices from the Window menu (Figure [11-1](#A310332_2_En_11_Chapter.html#Fig1)).


    ![A310332_2_En_11_Fig1_HTML.jpg](Images/A310332_2_En_11_Fig1_HTML.jpg)


    Figure 11-1.


    Selecting Devices from the Xcode Window menu


    Once the Organizer window is up, all connected iOS devices should be listed in
    the left panel. Select the device you want to register for testing, and the device
    information, including the UDID (listed as the identifier), will be displayed
    (Figure [11-2](#A310332_2_En_11_Chapter.html#Fig2)).


    ![A310332_2_En_11_Fig2_HTML.jpg](Images/A310332_2_En_11_Fig2_HTML.jpg)


    Figure 11-2.


    Obtaining a device ID from the Xcode Organizer


    You can then copy and paste the UDID into the Provisioning Portal to register
    your test device .


    ### Register App Identifiers


    Once you’ve registered your test devices , you need to register app identifiers
    because each provisioning profile is valid for only a single app ID. An app ID
    corresponds to a bundle ID (the same one specified in the Unity player settings
    for your app) or matches many bundle IDs when it ends with an asterisk (then it’s
    called a wildcard app ID). For example, I registered the app ID com.technicat.*
    that I can use in a single provisioning profile for all my apps, such as com.technicat.fugubowl
    and com.technicat.hyperbowl.


    Tip


    Create a wildcard app ID that matches all or most of your bundle IDs so you don’t
    have to create a new app ID for every bundle ID.


    ### Use Development Provisioning Profiles


    To create a development provisioning profile , you need to generate a development
    certificate that is associated with the profile. The has instructions on how to
    generate and upload a certificate request, which will in turn result in a new
    development certificate. Then you can create a development provisioning profile
    associated with that certificate.


    Actually, once you have generated a development certificate, the Provisioning
    Portal will automatically generate a Team provisioning profile for you that uses
    the asterisk (*) as an app ID and thus matches any of your bundle IDs, which is
    a real convenience. But you can also generate any number of other development
    provisioning profiles with the same certificate and the app ID you specify.


    ### Use Distribution Provisioning Profiles


    Creating a distribution provisioning profile is similar to creating a development
    provisioning profile. You’ll need to create a distribution certificate and then
    a distribution provisioning profile associated with that certificate .


    Tip


    You can save a little time by reusing the same certificate request file to create
    both the development and distribution certificates.


    ## Use the Xcode Organizer


    When your development provisioning profiles are available, you can download them
    into Xcode . Bring up the Xcode Organizer window (from the Xcode Window menu),
    select Provisioning Profiles in the sidebar, and click the Refresh button on the
    lower right of the profiles list. After prompting you for your Apple developer
    login, the Organizer will retrieve and display all the provisioning profiles you’ve
    created in the Provisioning Portal.


    Figure [11-3](#A310332_2_En_11_Chapter.html#Fig3) shows all four of my provisioning
    profiles. Notice all the app IDs are prefixed with a number. That’s generated
    by the Provisioning Portal and called the bundle seed ID. For our purposes here,
    you can ignore it.


    ![A310332_2_En_11_Fig3_HTML.jpg](Images/A310332_2_En_11_Fig3_HTML.jpg)


    Figure 11-3.


    Provisioning profiles listed in the Xcode Organizer


    The first provisioning profile , named La Petite Baguette Distribution , is a
    distribution provisioning profile that only matches an app called La Petite Baguette
    (a restaurant app). Notice that the app ID is fully specified, exactly matching
    the bundle ID for the La Petite Baguette app. Notice also that the provisioning
    profile has expired.


    The second profile , iOS Team Provisioning Profile , is a development provisioning
    profile automatically created by the Provisioning Portal. It matches any app’s
    bundle ID.


    The third profile , named techdev , is a development provisioning profile I created
    that will work with any of my apps, as it will match any bundle ID starting with
    com.technicat.


    The fourth profile is my sole distribution provisioning profile . It also matches
    any app that has a bundle ID starting with com.technicat.


    Notice the expiration date. Certificates, and thus their associated provisioning
    profiles, expire after a year, at which point you’ll have to replace the expired
    profile with a new profile created with a new certificate.


    You can add a provisioning profile (Figure [11-4](#A310332_2_En_11_Chapter.html#Fig4))
    within the Xcode Organizer by clicking the + button on the lower left.


    ![A310332_2_En_11_Fig4_HTML.jpg](Images/A310332_2_En_11_Fig4_HTML.jpg)


    Figure 11-4.


