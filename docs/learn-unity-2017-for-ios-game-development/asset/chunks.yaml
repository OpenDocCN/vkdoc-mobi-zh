- fmt: "### Culling Mask\n\n`Culling Mask`属性指定光照将影响的层。与相机组件的`Culling Mask`决定哪些对象对相机可见非常相似，光照的`Culling\
    \ Mask`决定哪些对象被光照照亮。\n\n### Flare\n\n`Flare`属性，当分配了一个`Flare`资源时，会从此光照产生一个镜头光晕效果。\n\
    \n### Draw Halo\n\n`Draw Halo`属性会在光照位置周围产生一个光晕效果。启用此属性时，还会提供一个额外的光晕颜色属性。\n\n###\
    \ Render Mode\n\n光照的`Render Mode`指定光照是`Important`、`Not Important`还是`Auto`，这意味着其重要性会根据光照的亮度和当前的`Quality\
    \ Settings`自动确定。光照的重要性决定它是否被应用为像素光照。像素光照是阴影和`Cookie`等效果所必需的。\n\n### Lightmapping\n\
    \n`Lightmapping`属性决定此光照是用于动态光照、生成光照贴图，还是两者兼用。在这些示例中你不会使用光照贴图（它们需要很长的生成时间），因此`RealtimeOnly`或`Auto`对于这些光照来说是可以的。\n\
    \n### 调整光照\n\n与相机一样，当你在`Inspector`中选择点光源并打开其`Light`组件时，`Scene View`中会描绘出关于该光照的更多信息。对于点光源，会显示其半径，因此你可以看到哪些对象受光照影响（图[3-23](#A310332_2_En_3_Chapter.html#Fig23)）。为了让立方体受到点光源影响，它必须位于光照的半径内。但请记住，点光源从自身位置向外辐射，因此你不能将点光源放置在立方体的同一位置，因为那样光照会从立方体内部向外辐射，而不会照亮立方体的外表面。\n\
    \n你可以仅在`Inspector View`中调整光照属性，但这里尝试使用`Scene View`。点击编辑器左上角按钮栏中的`Move`按钮（即`Hand`工具右侧带箭头的按钮）。现在选中点光源后，`Scene\
    \ View`会在光照中心显示对应光照x、y、z轴的箭头。点击并拖动任意箭头，光照就会沿相应轴移动。\n\n![A310332_2_En_3_Fig23_HTML.jpg](Images/A310332_2_En_3_Fig23_HTML.jpg)\n\
    \n图 3-23. 点光源的`Scene View`\n\n光照周围的圆圈描绘了光照的范围。你可以通过点击并拖动圆圈内部的小黄色矩形来调整范围。范围内的任何物体都会被光照照亮，而范围外的物体则不受光照影响。\n\
    \n**警告**  \n与点光源位置完全相同的对象不会受到该光照的影响。\n\n请继续移动光照并根据需要调整其半径，以确保立方体被照亮。现在点击`Play`按钮，立方体被照亮，并且当你围绕立方体旋转相机时，光照会发生变化。\n\
    \n### 创建光晕\n\n目前点光源在`Play`模式下本身是不可见的。光照的存在只能通过它照亮的`GameObject`来体现。但是，如果你启用了光晕，就可以看到光照的来源。在`Inspector\
    \ View`中启用`Draw Halo`属性，同时点击`Color`属性更改光照的颜色（图[3-24](#A310332_2_En_3_Chapter.html#Fig24)）。\n\
    \n![A310332_2_En_3_Fig24_HTML.jpg](Images/A310332_2_En_3_Fig24_HTML.jpg)\n\n图\
    \ 3-24. 选择光晕颜色\n\n这不仅会影响从物体反射的光照颜色，还会影响用于绘制光晕的颜色。你可以在`Scene View`中看到光晕（图[3-25](#A310332_2_En_3_Chapter.html#Fig25)），以及在点击`Play`时看到（图[3-26](#A310332_2_En_3_Chapter.html#Fig26)）。\n\
    \n![A310332_2_En_3_Fig26_HTML.jpg](Images/A310332_2_En_3_Fig26_HTML.jpg)\n\n图\
    \ 3-26. 带有光晕的点光源的`Game View`\n\n![A310332_2_En_3_Fig25_HTML.jpg](Images/A310332_2_En_3_Fig25_HTML.jpg)\n\
    \n图 3-25. 带有光晕的点光源的`Scene View`\n\n## 纹理\n\n### 导入纹理\n\n几乎你Mac上的任何图像文件（`.jpeg`、`.png`、`.tiff`、`.psd`）都可以通过调用`Assets`菜单中的`Import\
    \ Asset`命令（图[3-27](#A310332_2_En_3_Chapter.html#Fig27)）并在弹出的选择器中选择图像文件来导入作为纹理。\n\
    \n![A310332_2_En_3_Fig27_HTML.jpg](Images/A310332_2_En_3_Fig27_HTML.jpg)\n\n图\
    \ 3-27. 导入新资源\n\n在这个例子中，我选择了一张来自`Photos`目录的猫咪图片，该图片由`iPhoto`存储。你可以通过从[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)下载来自由使用此文件（它位于本章项目的`Textures`文件夹下）。但如果你Mac上有任何受支持文件格式的图像，那也是可以的。导入图像文件后，生成的纹理将出现在`Project\
    \ View`中（图[3-28](#A310332_2_En_3_Chapter.html#Fig28)）。\n\n![A310332_2_En_3_Fig28_HTML.jpg](Images/A310332_2_En_3_Fig28_HTML.jpg)\n\
    \n图 3-28. 新导入纹理的`Project View`\n\n选择纹理并在`Inspector View`中检查其导入设置（图[3-29](#A310332_2_En_3_Chapter.html#Fig29)）。默认的`Texture\
    \ Type`（`Texture`）是通常适用于应用于模型的纹理的预设类型。如果有未应用的`Import Settings`，`Apply`按钮会启用并应被点击（否则Unity在尝试使用纹理时会提示你）。\n\
    \n![A310332_2_En_3_Fig29_HTML.jpg](Images/A310332_2_En_3_Fig29_HTML.jpg)\n\n图\
    \ 3-29. 导入纹理的`Inspector View`\n\n注意底部的`Preview`面板如何总结纹理的导入大小和格式。原始图像文件没有以任何方式改变，因此导入文件实际上创建了一个适合我们目标平台的原始文件的副本。你永远不必担心弄乱原始资源。实际上，你始终可以通过在`Project\
    \ View`中右键单击它并选择`Reimport`来从它重新开始。\n\n**注意**  \n我们一直泛泛地、不大写地使用术语`texture`。实际上有一个`Texture`类，它是所有纹理类型的父类，但通过导入图像文件创建的纹理资源的实际类名是`Texture2D`（`Texture`的其他子类包括`Texture3D`、`MovieTexture`和`RenderTexture`）。\n\
    \n要将纹理应用到立方体，将纹理拖到`Hierarchy View`中的立方体上。这会自动使用纹理创建一个`Material`，并将该`Material`应用到立方体，替换掉之前存在的`Material`。（图[3-30](#A310332_2_En_3_Chapter.html#Fig30)）。\n\
    \n![A310332_2_En_3_Fig30_HTML.jpg](Images/A310332_2_En_3_Fig30_HTML.jpg)\n\n图\
    \ 3-30. 应用于立方体的纹理\n\n在`Project View`中，你现在可以看到新创建的`Material`被放置在与纹理相同位置的一个`Materials`文件夹中。现在再次点击`Play`，立方体看起来很棒！（图[3-31](#A310332_2_En_3_Chapter.html#Fig31)）。\n\
    \n![A310332_2_En_3_Fig31_HTML.jpg](Images/A310332_2_En_3_Fig31_HTML.jpg)\n\n图\
    \ 3-31. 带有纹理的立方体的`Game View`"
  raw: '#### Culling Mask


    The Culling Mask property specifies the layers that the Light will affect. Very
    much like how the Culling Mask of the Camera Component dictates what objects are
    visible to the Camera, the Culling Mask of the Light dictates what objects are
    lit by a Light.


    #### Flare


    The Flare property, when assigned a Flare asset, produces a lens flare effect
    emanating from this Light.


    #### Draw Halo


    The Draw Halo property produces a halo effect around the position of the Light.
    When this property is enabled, an additional property for the halo color is made
    available.


    #### Render Mode


    The Render Mode of a Light specifies whether the Light is Important, Not Important,
    or Auto, which means its importance is determined automatically, based on the
    Light’s brightness and the current Quality Settings. A Light’s importance determines
    whether it is applied as a pixel light or not. Pixel lights are required for effects
    like shadows and cookies.


    #### Lightmapping


    The Lightmapping property determines whether this Light is used for dynamic lighting,
    generating lightmaps, or both. You won’t be using lightmaps for these examples
    (they take a long time to generate), so RealtimeOnly or Auto will be fine for
    these Lights.


    ### Adjust the Light


    As with Cameras, when you have the Point Light selected and its Light Component
    open in the Inspector, more information about the Light is depicted in the Scene
    View. For a Point Light, the radius is displayed, so you can see what objects
    are affected by the Light (Figure [3-23](#A310332_2_En_3_Chapter.html#Fig23)).
    In order for the Cube to be affected by the Point Light, it must be within the
    Light’s radius. But remember, a Point Light radiates outward from its position,
    so you can’t have the Point Light at the same position as the Cube, because then
    the Light would be radiating from within the Cube and wouldn’t illuminate the
    Cube’s outer surface.


    You can adjust the Light properties solely in the Inspector View, but this try
    using the Scene View. Click the Move button in the button bar on the top left
    of the Editor (it’s the button with arrows directly right of the Hand tool). Now
    with the Point Light selected, the Scene View displays arrows centered at the
    Light that correspond to the x, y, and z axes of the Light. Click-dragging on
    any of those arrows will move the Light along the corresponding axis .


    ![A310332_2_En_3_Fig23_HTML.jpg](Images/A310332_2_En_3_Fig23_HTML.jpg)


    Figure 3-23.


    The Scene View of a Point Light


    The circles around the Light delineate the range of the Light. You can adjust
    the range by click-dragging the little yellow rectangles just inside the circles.
    Anything within the range is lit by the Light, and anything outside the range
    won’t be affected by the Light.


    Warning


    An object in exactly the same position as a Point Light won’t be affected by that
    Light.


    Go ahead and move the Light and adjust its radius as necessary to make sure the
    Cube is lit. Now when you click the Play button, the Cube is lit, and the lighting
    varies as you orbit the Camera around the Cube.


    ### Make a Halo


    Right now the Point Light itself is invisible when you’re in Play mode. The Light’s
    presence is only evident through the GameObjects that it illuminates. However,
    you can see where the Light is coming from if you enable its halo. Enable the
    Draw Halo property in the Inspector View, and while you’re at it, click the Color
    property to change the Light’s color (Figure [3-24](#A310332_2_En_3_Chapter.html#Fig24)).


    ![A310332_2_En_3_Fig24_HTML.jpg](Images/A310332_2_En_3_Fig24_HTML.jpg)


    Figure 3-24.


    Selecting a halo color


    This affects not only the color of the Light that is reflected off objects, but
    it’s also the color used to draw the halo. You can see the halo in the Scene View
    (Figure [3-25](#A310332_2_En_3_Chapter.html#Fig25)) and when you click Play (Figure
    [3-26](#A310332_2_En_3_Chapter.html#Fig26)).


    ![A310332_2_En_3_Fig26_HTML.jpg](Images/A310332_2_En_3_Fig26_HTML.jpg)


    Figure 3-26.


    The Game View of a Point Light with a halo


    ![A310332_2_En_3_Fig25_HTML.jpg](Images/A310332_2_En_3_Fig25_HTML.jpg)


    Figure 3-25.


    The Scene View of a Point Light with a halo


    ## Textures


    ### Import a Texture


    Just about any image file (.jpeg, .png, .tiff, .psd) on your Mac can be imported
    as a texture by invoking the Import Asset command in the Assets menu (Figure [3-27](#A310332_2_En_3_Chapter.html#Fig27))
    and selecting the image file in the resulting chooser.


    ![A310332_2_En_3_Fig27_HTML.jpg](Images/A310332_2_En_3_Fig27_HTML.jpg)


    Figure 3-27.


    Importing a new asset


    For this example, I’ve chosen a cat picture from my Photos directory, where it
    was stored by iPhoto. Feel free to use this file by downloading it from [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    (it’s in this chapter’s project, under the Textures folder). But if you have any
    image on your Mac in one of the supported file formats, that will be fine. After
    importing the image file, the resulting texture will appear in the Project View
    (Figure [3-28](#A310332_2_En_3_Chapter.html#Fig28)).


    ![A310332_2_En_3_Fig28_HTML.jpg](Images/A310332_2_En_3_Fig28_HTML.jpg)


    Figure 3-28.


    The Project View of a newly imported texture


    Select the texture and examine its import settings in the Inspector View (Figure
    [3-29](#A310332_2_En_3_Chapter.html#Fig29)). The default Texture Type, Texture,
    is the preset type that is generally suitable for textures applied to models.
    If there are unapplied Import Settings, the Apply button is enabled and should
    be clicked (or Unity will prompt you to when it tries to use the texture).


    ![A310332_2_En_3_Fig29_HTML.jpg](Images/A310332_2_En_3_Fig29_HTML.jpg)


    Figure 3-29.


    The Inspector View of an imported Texture


    Notice how the Preview panel at the bottom summarizes the imported size and format
    of the Texture. The original image file has not been changed in any way, so importing
    the file effectively creates a duplicate of the original that is appropriate for
    our target platform. You never have to worry about messing up the original asset.
    In fact, you can always start over from it by right-clicking it in the Project
    View and selecting Reimport.


    Note


    We’ve been using the term texture generically and without capitalization. There
    actually is a Texture class, that is the parent class of all types of textures,
    but the actual class name of the texture asset created by importing an image file
    is Texture2D (the other subclasses of Texture include Texture3D, MovieTexture
    and RenderTexture).


    To apply the texture to the Cube , drag the texture onto the Cube in the Hierarchy
    View. This automatically creates a Material using the texture and applies that
    Material to the Cube, replacing the previous Material that was there. (Figure
    [3-30](#A310332_2_En_3_Chapter.html#Fig30)).


    ![A310332_2_En_3_Fig30_HTML.jpg](Images/A310332_2_En_3_Fig30_HTML.jpg)


    Figure 3-30.


    A texture applied to the Cube


    In the Project View, you can now see the newly created Material is placed in a
    Materials folder located by the texture. Now if you click Play again, the Cube
    looks cool! (Figure [3-31](#A310332_2_En_3_Chapter.html#Fig31)).


    ![A310332_2_En_3_Fig31_HTML.jpg](Images/A310332_2_En_3_Fig31_HTML.jpg)


    Figure 3-31.


    The Game View of the textured Cube'
  trans: "\n### 剔除遮罩\n\n`Culling Mask`属性指定光照将影响的层。与相机组件的`Culling Mask`决定哪些对象对相机可见非常相似，光照的`Culling\
    \ Mask`决定哪些对象被光照照亮。\n\n### 镜头光晕\n\n`Flare`属性，当分配了一个`Flare`资源时，会从此光照产生一个镜头光晕效果。\n\
    \n### 绘制光晕\n\n`Draw Halo`属性会在光照位置周围产生一个光晕效果。启用此属性时，还会提供一个额外的光晕颜色属性。\n\n### 渲染模式\n\
    \n光照的`Render Mode`指定光照是`Important`、`Not Important`还是`Auto`，这意味着其重要性会根据光照的亮度和当前的`Quality\
    \ Settings`自动确定。光照的重要性决定它是否被应用为像素光照。像素光照是阴影和`Cookie`等效果所必需的。\n\n### 光照贴图\n\n`Lightmapping`属性决定此光照是用于动态光照、生成光照贴图，还是两者兼用。在这些示例中你不会使用光照贴图（它们需要很长的生成时间），因此`RealtimeOnly`或`Auto`对于这些光照来说是可以的。\n\
    \n### 调整光照\n\n与相机一样，当你在`Inspector`中选择点光源并打开其`Light`组件时，`Scene View`中会描绘出关于该光照的更多信息。对于点光源，会显示其半径，因此你可以看到哪些对象受光照影响（图\
    \ 3-23）。为了让立方体受到点光源影响，它必须位于光照的半径内。但请记住，点光源从自身位置向外辐射，因此你不能将点光源放置在立方体的同一位置，因为那样光照会从立方体内部向外辐射，而不会照亮立方体的外表面。\n\
    \n你可以仅在`Inspector View`中调整光照属性，但这里尝试使用`Scene View`。点击编辑器左上角按钮栏中的`Move`按钮（即`Hand`工具右侧带箭头的按钮）。现在选中点光源后，`Scene\
    \ View`会在光照中心显示对应光照 x、y、z 轴的箭头。点击并拖动任意箭头，光照就会沿相应轴移动。\n\n![A310332_2_En_3_Fig23_HTML.jpg](img/A310332_2_En_3_Fig23_HTML.jpg)\n\
    \n图 3-23. 点光源的`Scene View`\n\n光照周围的圆圈描绘了光照的范围。你可以通过点击并拖动圆圈内部的小黄色矩形来调整范围。范围内的任何物体都会被光照照亮，而范围外的物体则不受光照影响。\n\
    \n**警告**  \n与点光源位置完全相同的对象不会受到该光照的影响。\n\n请继续移动光照并根据需要调整其半径，以确保立方体被照亮。现在点击`Play`按钮，立方体被照亮，并且当你围绕立方体旋转相机时，光照会发生变化。\n\
    \n### 创建光晕\n\n目前点光源在`Play`模式下本身是不可见的。光照的存在只能通过它照亮的`GameObject`来体现。但是，如果你启用了光晕，就可以看到光照的来源。在`Inspector\
    \ View`中启用`Draw Halo`属性，同时点击`Color`属性更改光照的颜色（图 3-24）。\n\n![A310332_2_En_3_Fig24_HTML.jpg](img/A310332_2_En_3_Fig24_HTML.jpg)\n\
    \n图 3-24. 选择光晕颜色\n\n这不仅会影响从物体反射的光照颜色，还会影响用于绘制光晕的颜色。你可以在`Scene View`中看到光晕（图 3-25），以及在点击`Play`时看到（图\
    \ 3-26）。\n\n![A310332_2_En_3_Fig26_HTML.jpg](img/A310332_2_En_3_Fig26_HTML.jpg)\n\
    \n图 3-26. 带有光晕的点光源的`Game View`\n\n![A310332_2_En_3_Fig25_HTML.jpg](img/A310332_2_En_3_Fig25_HTML.jpg)\n\
    \n图 3-25. 带有光晕的点光源的`Scene View`\n\n## 纹理\n\n### 导入纹理\n\n几乎你 Mac 上的任何图像文件（`.jpeg`、`.png`、`.tiff`、`.psd`）都可以通过调用`Assets`菜单中的`Import\
    \ Asset`命令（图 3-27）并在弹出的选择器中选择图像文件来导入作为纹理。\n\n![A310332_2_En_3_Fig27_HTML.jpg](img/A310332_2_En_3_Fig27_HTML.jpg)\n\
    \n图 3-27. 导入新资源\n\n在这个例子中，我选择了一张来自`Photos`目录的猫咪图片，该图片由`iPhoto`存储。你可以通过从[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)下载来自由使用此文件（它位于本章项目的`Textures`文件夹下）。但如果你\
    \ Mac 上有任何受支持文件格式的图像，那也是可以的。导入图像文件后，生成的纹理将出现在`Project View`中（图 3-28）。\n\n![A310332_2_En_3_Fig28_HTML.jpg](img/A310332_2_En_3_Fig28_HTML.jpg)\n\
    \n图 3-28. 新导入纹理的`Project View`\n\n选择纹理并在`Inspector View`中检查其导入设置（图 3-29）。默认的`Texture\
    \ Type`（`Texture`）是通常适用于应用于模型的纹理的预设类型。如果有未应用的`Import Settings`，`Apply`按钮会启用并应被点击（否则\
    \ Unity 在尝试使用纹理时会提示你）。\n\n![A310332_2_En_3_Fig29_HTML.jpg](img/A310332_2_En_3_Fig29_HTML.jpg)\n\
    \n图 3-29. 导入纹理的`Inspector View`\n\n注意底部的`Preview`面板如何总结纹理的导入大小和格式。原始图像文件没有以任何方式改变，因此导入文件实际上创建了一个适合我们目标平台的原始文件的副本。你永远不必担心弄乱原始资源。实际上，你始终可以通过在`Project\
    \ View`中右键单击它并选择`Reimport`来从它重新开始。\n\n**注意**  \n我们一直泛泛地、不大写地使用术语`texture`。实际上有一个`Texture`类，它是所有纹理类型的父类，但通过导入图像文件创建的纹理资源的实际类名是`Texture2D`（`Texture`的其他子类包括`Texture3D`、`MovieTexture`和`RenderTexture`）。\n\
    \n要将纹理应用到立方体，将纹理拖到`Hierarchy View`中的立方体上。这会自动使用纹理创建一个`Material`，并将该`Material`应用到立方体，替换掉之前存在的`Material`。（图\
    \ 3-30）。\n\n![A310332_2_En_3_Fig30_HTML.jpg](img/A310332_2_En_3_Fig30_HTML.jpg)\n\
    \n图 3-30. 应用于立方体的纹理\n\n在`Project View`中，你现在可以看到新创建的`Material`被放置在与纹理相同位置的一个`Materials`文件夹中。现在再次点击`Play`，立方体看起来很棒！（图\
    \ 3-31）。\n\n![A310332_2_En_3_Fig31_HTML.jpg](img/A310332_2_En_3_Fig31_HTML.jpg)\n\
    \n图 3-31. 带有纹理的立方体的`Game View`\n"
- fmt: '### Shop the Asset Store


    Unity doesn’t have many built-in textures in `Standard Assets` (although there
    are many textures used in the various packages). However, the Unity Asset Store,
    a marketplace of Unity-ready assets, has several free texture packs. Conveniently,
    the Asset Store is integrated into the Unity Editor. Under the `Window` menu (Figure
    [3-32]), select the `Asset Store` item.


    ![A310332_2_En_3_Fig32_HTML.jpg](Images/A310332_2_En_3_Fig32_HTML.jpg)


    **Figure 3-32.** Selecting the Asset Store from the Window menu


    This will bring up the `Asset Store` window and display the Asset Store front
    page (Figure [3-33]), which lists the latest releases (both paid and free), categories,
    and featured items.


    ![A310332_2_En_3_Fig33_HTML.jpg](Images/A310332_2_En_3_Fig33_HTML.jpg)


    **Figure 3-33.** The Unity Asset Store


    Let’s look for some free textures. Click the `Textures & Materials` category in
    the upper-right section of the page, and then select `Free` in the `Maximum Price`
    on the left (Figure [3-34]).


    ![A310332_2_En_3_Fig34_HTML.jpg](Images/A310332_2_En_3_Fig34_HTML.jpg)


    **Figure 3-34.** Free textures on the Asset Store


    There are plenty of good candidates here, but if you scroll down, you should be
    able find to my favorite free texture library, the Free ArtskillZ Texture Pack.
    Click it to see the full product page (Figure [3-35]). It includes the product
    description, screenshots, list of the individual files, and reviews.


    ![A310332_2_En_3_Fig35_HTML.jpg](Images/A310332_2_En_3_Fig35_HTML.jpg)


    **Figure 3-35.** The ArtskillZ Texture Pack on the Asset Store


    ### Import the Texture


    Click the `Download` button, and you’ll see the same type of `Import` window that
    you saw when importing the built-in Unity assets. Go ahead and import everything.


    Now you’ll find all those textures in your `Project View`, separated into three
    folders categorizing them by genre (Figure [3-36]).


    ![A310332_2_En_3_Fig36_HTML.jpg](Images/A310332_2_En_3_Fig36_HTML.jpg)


    **Figure 3-36.** The Project View of the ArtskillZ Textures


    The textures displayed with blue icons are normal maps and are listed as such
    in their `Texture Type` fields. A normal map gives the illusion of a nonflat surface
    (sometimes the term *bump map* is used, although it’s not technically exactly
    the same).


    ### Apply the Texture


    For starters, we’ll try the `ScifiPanel01` Texture. Drag it to the Cube and Unity
    automatically creates a new Material named after the texture and applies that
    Material to the Cube. But we want to use the normal map that accompanies that
    texture, so use the `Shader` selector of the Material in the `Inspector` view
    to change the shader to `Legacy Shaders Bumped Specular`. This shader accepts
    lists a second texture labelled `Normalmap` and also has a slider to control the
    `Shininess` property (it should be noted that the slider moves left to approach
    1 and right to approach 0). Drag the normal map texture, `ScifiPanel01_n`, into
    it the `Normalmap` field (Figure [3-37]).


    ![A310332_2_En_3_Fig37_HTML.jpg](Images/A310332_2_En_3_Fig37_HTML.jpg)


    **Figure 3-37.** Scifi Texture applied to the Cube


    Click `Play`, and you’ll now see the textured Cube (Figure [3-38]).


    ![A310332_2_En_3_Fig38_HTML.jpg](Images/A310332_2_En_3_Fig38_HTML.jpg)


    **Figure 3-38.** The Game View of the Cube with a specular bump map texture


    You could have also searched for free textures using the search field in the `Project
    View`. I’ll use that option in the next chapters as we make use of more Asset
    Store packages.


    ## Explore Further


    This chapter may have seemed like it covered a lot of material (no pun intended)
    just to create a simple static scene, but a lot of basic Unity concepts were explored
    along the way, particularly the relationship between Components and GameObjects.
    As a result, now you have a scene with a bump-mapped and textured Cube, and is
    illuminated by a Point Light that’s sporting a Flare. The scene was populated
    with assets imported from local files, the Unity Standard Assets, and the Unity
    Asset Store. And the scene isn’t completely static due to the `SimpleMouseRotator`
    script attached to the `Main Camera`. Scripting will play a dominant role in this
    book, starting with the next chapter as we move beyond a static scene.


    Before moving on to that, take a break and go over the official Unity documentation
    on the features used so far, if only to get familiar with where to find this documentation
    for future reference.


    ### Unity Manual


    The `Unity Basics` section of the Unity Manual was mostly relevant to the previous
    chapter, describing the user interface, but that section does have a “Creating
    Scenes” page that More relevant is the “Building a Scene” section, which describes
    the relationship among GameObjects, Components, and scripts, how to use the `Inspector
    View` to edit Component properties, and how to navigate the `Scene View` and move
    GameObjects, all of which was covered in this chapter. Lights and Cameras are
    also explained. One feature listed in this section that won’t be used in this
    book is the Terrain Engine (it is available in Unity iOS but slow). Terrain is
    a significant and impressive Unity feature, though, so it’s worth a read the “Asset
    Import and Creation” section describes the asset types used in this chapter: Meshes,
    Materials, textures and scripts. The process of importing assets and the Asset
    Store are also explained.


    We haven’t arrived at a point where we have gameplay, but the “Creating GamePlay”
    section has a page on “Transforms,” which is we saw is fundamental to understand
    even just for placing static GameObjects.'
