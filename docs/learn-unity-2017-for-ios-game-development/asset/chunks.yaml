  trans: '

    # 缩放 GUI


    目前您已完成了构建和运行所需的设置，如果在一台分辨率为 320 × 480 像素的低分辨率 iOS 设备上运行，游戏初始画面看起来还不错。但在任何较新的设备上（屏幕分辨率至少是前者的两倍），暂停菜单会显得非常小，甚至难以看清或点击单个按钮。


    要缩放 GUI，首先需要确定要使用的缩放比例，即当前屏幕宽度除以最初针对的目标屏幕宽度。GUI 在 320 × 480 像素的 iPhone 3GS 上显示效果尚可，因此我们假设目标基础屏幕宽度为
    320。那么，例如在分辨率为 1136 × 640 像素的 iPhone 5 上运行时，就需要对 GUI 进行放大。


    下一步是应用缩放比例。在 UnityGUI 中，可以通过设置静态变量 `GUI.matrix` 来实现，该变量是一个变换矩阵。在计算机图形学中，变换矩阵包含并应用平移（位置变化）、旋转和缩放。


    实际上，`Transform` 组件的局部位置、旋转和缩放对应着该 `GameObject` 的一个 4×4 变换矩阵。而世界坐标的位置、旋转和缩放则通过组合（相乘）一个
    `GameObject` 的父级 `GameObject` 的所有变换矩阵计算得出。在过去，编写计算机图形学程序时必须包含这些线性代数代码。如今可以让游戏引擎隐藏这些细节，但此处您将稍微体验一下。


    ## 缩放记分板


    我们先从记分板开始，因为它稍微简单一些。对 `FuguBowlScoreboard` 脚本进行清单 [12-1] 所示的修改。新增了一个名为 `baseScreenWidth`
    的变量，用于指定基础屏幕宽度，默认值为 iPhone 3GS 的 320 像素宽度。该变量是公共的，因此您可以在 Inspector 视图中调整它。


    然后，在 `OnGUI` 函数的开头，添加两行代码来构造缩放矩阵并将其赋值给 `GUI.matrix`。（将矩阵放在 `OnGUI` 开头意味着它将在任何
    GUI 渲染开始之前生效。）


    ```

    #pragma strict

    var style:GUIStyle; // 自定义外观

    var baseScreenWidth:float = 320.0; // 对于 iOS，我们假设渲染的目标屏幕宽度

    function OnGUI() {

    #if UNITY_IPHONE

    var guiScale:float = Screen.width/baseScreenWidth;

    GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity, Vector3(guiScale,
    guiScale, 1));

    #endif

    for (var f:int=0; f<10; f++) {

    var score:String="";

    var roll1:int = FuguBowl.player.scores[f].ball1;

    var roll2:int = FuguBowl.player.scores[f].ball2;

    var roll3:int = FuguBowl.player.scores[f].ball3;

    switch (roll1) {

    case -1: score += " "; break;

    case 10: score +="X"; break;

    default: score += roll1;

    }

    score+="/";

    if (FuguBowl.player.IsSpare(f)) {

    score +="I";

    } else {

    switch (roll2) {

    case -1: score += " "; break;

    case 10: score +="X"; break;

    default: score += roll2;

    }

    }

    if (f==9) {

    score+="/";

    if (10==roll2+roll3) {

    score +="I";

    } else {

    switch (roll3) {

    case -1: score += " "; break;

    case 10: score +="X"; break;

    default: score += roll3;

    }

    }

    }

    GUI.Label(Rect(f*30+5,5,50,20),score,style);

    var total:int=FuguBowl.player.GetScore(f);

    if (total != -1) {

    GUI.Label(Rect(f*30+5,20,50,20)," "+total,style);

    }

    }

    }

    ```


    **清单 12-1.** 为 `FuguBowlScoreboard.js` 脚本添加缩放功能


    新代码仅针对 iOS 平台（虽然它在任何平台上都能运行），因此新增的代码行被包裹在 `#if UNITY_IPHONE` 和 `#endif` 之间。`UNITY_IPHONE`
    是一个内置的预处理器定义，仅在构建目标为 iOS 时被定义（您也可以使用 `UNITY_IOS`）。最终结果是，这段附加代码仅在 iOS 上作为执行代码生效，而在构建其他目标时基本消失（之所以不为
    `baseScreenWidth` 添加条件，是因为您不希望更改构建目标时丢失其 Inspector 视图中的设置）。


    在两行实际代码中，第一行根据 `Screen.width`（当前屏幕宽度）和 `baseScreenWidth`（GUI 编码时针对的目标屏幕宽度）计算出需要缩放
    GUI 的比例。结果赋值给局部变量 `guiScale`。


    您可能曾疑惑为什么将 `baseScreenWidth` 声明为 `float` 而不是 `int`。原因就在于此：`Screen.width` 是 `int`
    类型，如果用 `int` 除以 `int`，编译器会假定您希望结果也是 `int` 类型。例如，用 640（iPhone 4）除以 320 得到 2 时没问题。但如果在
    iPad 2 上运行时，将 768 除以 320，结果会被向下取整为 2，这就不正确了。但只要参与运算的两个数中有一个是 `float` 类型，编译器就会将整个运算视为浮点数计算。


    > **注意：** 要警惕那些将 `int` 作为输入却期望得到 `float` 结果的操作。这是常见的错误来源。


    计算结果传递给 `Matrix4x4.TRS` 方法，该方法会构建一个包含平移、旋转和缩放的 4x4 矩阵。平移为 `Vector3.zero`（x、y、z
    均为 0），旋转为 `Quaternion.identity`（表示无旋转的恒等四元数），以及表示缩放的 `Vector3`。根据屏幕尺寸的缩放比例应用于
    x 和 y 方向，而 z 轴保持不变，因为该方向指向屏幕内部。'
- fmt: '### Scale the Pause Menu


    Scaling the pause menu is almost the same process. Let’s add the same `baseScreenWidth`
    public variable and the same code to set `GUI.matrix` in the beginning of the
    `OnGUI` function in the `FuguPause` script (Listing [12-2](#A310332_2_En_12_Chapter.html#Par28)).


    ```

    var baseScreenWidth:float = 320.0; // target screen width on iOS

    function OnGUI () {

    if (IsGamePaused()) {

    #if UNITY_IPHONE

    var guiScale:float = screenWidth/baseScreenWidth;

    GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity, Vector3(guiScale,
    guiScale, 1));

    #endif

    if (skin != null) {

    GUI.skin = skin;

    } else {

    GUI.color = hudColor;

    }

    switch (currentPage) {

    case Page.Main: ShowPauseMenu(); break;

    case Page.Options: ShowOptions(); break;

    case Page.Credits: ShowCredits(); break;

    }

    }

    }

    Listing 12-2.

    Scaling the Pause Menu in FuguPause.js

    ```


    However, one more alteration is required. The `BeginPage` function centers the
    GUI using `Screen.width`, so you need to use `baseScreenWidth` instead. Listing
    [12-3](#A310332_2_En_12_Chapter.html#Par30) shows this code change.


    ```

    function BeginPage(width:int,height:int) {

    #if !UNITY_IPHONE

    GUILayout.BeginArea(Rect((Screen.width-width)/2,menutop,width,height));

    #else

    GUILayout.BeginArea(Rect((baseScreenWidth-width)/2,menutop,width,height));

    #endif

    }

    Listing 12-3.

    Modified BeginPage Function to Work with Scaled GUI

    ```


    Notice how you used `#if !UNITY_IPHONE`. The exclamation mark means not, so the
    first line of real code exists for any built target except iOS, and the other
    line is just for iOS. You could have flipped the order of the two lines of code
    and started with `#if UNITY_IPHONE`.


    While you’re at it, you should remove the Quit button from the pause menu, as
    Apple rejects any app with a quit option. The Quit button in the `ShowPauseMenu`
    function of the `FuguPause` script is already excluded from Unity web player builds
    by checking the `UNITY_WEBPLAYER` preprocessor definition, so you can just add
    a check for `UNITY_IPHONE` (Listing [12-4](#A310332_2_En_12_Chapter.html#Par33)).


    ```

    function ShowPauseMenu() {

    BeginPage(150,300);

    if (GUILayout.Button ("Play")) {

    UnPauseGame();

    }

    if (GUILayout.Button ("Options")) {

    currentPage = Page.Options;

    }

    if (GUILayout.Button ("Credits")) {

    currentPage = Page.Credits;

    }

    #if !UNITY_IPHONE && !UNITY_WEBPLAYER

    if (GUILayout.Button ("Quit")) {

    Application.Quit();

    }

    #endif

    EndPage();

    }

    Listing 12-4.

    Excluded Quit Button from the iOS Build of FuguPause.js

    ```


    The Quit button is included in the build only if it sees `#if !UNITY_IPHONE &&
    !UNITY_WEBPLAYER`, which is true when the build target is not iOS and not a web
    player. When you build the game now, you should see the pause menu running on
    a device (or the iOS simulator) scaled up with the screen resolution and missing
    the Quit button, like the iPhone 4 screenshot in Figure [12-4](#A310332_2_En_12_Chapter.html#Fig4).


    ![A310332_2_En_12_Fig4_HTML.jpg](Images/A310332_2_En_12_Fig4_HTML.jpg)


    Figure 12-4.


    The scaled pause menu


    ## Set the Icon


    By default, the icon for your app will be the Unity logo. Figure [12-6](#A310332_2_En_12_Chapter.html#Fig6)
    shows the icons for several demo apps published by Unity Technologies on the App
    Store.


    If we were to build it right now the gloss that is automatically applied by Apple
    since you didn’t select Prerendered Icon in the iOS player settings.


    To customize the icon, you can drag any texture into the Default Icon field of
    the player settings. Let’s use the `Icon1024` texture in the Textures folder,
    copied from the project for this chapter at [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739).
    I often indicate the original texture size in the file name (a 1024 × 1024 texture
    in this case), which saves a lot of time in assigning icon and splash screen textures.


    Since you’re using the texture as an icon, you should adjust the import settings
    appropriately.


    Select the `Icon1024` texture in the Project view, and then in the Inspector view,
    set `Texture Type` to `GUI` instead of `Texture` (Figure [12-5](#A310332_2_En_12_Chapter.html#Fig5)).
    This will prevent Unity from applying settings that are suitable for textures
    with 3D models but not for GUI display. For example, textures used with models
    should have dimensions that are powers of 2, such as 256 × 256 or 512 × 512 because
    that’s what graphics hardware likes to operates with, and the textures are stretched
    around models anyway. But, generally, GUI textures should stay at their original
    resolution since they’re usually sized according to their intended display (which
    is usually not at a power of 2 resolution). You can switch `Texture Type` to `Advanced`
    to compare the underlying settings of the `Texture` and `GUI` preset texture types
    (i.e., select `Texture`, then switch to `Advanced`, and then select `GUI` and
    switch to `Advanced`). Within `Advanced`, you can override any of the preset values
    for more control over the import settings.


    ![A310332_2_En_12_Fig5_HTML.jpg](Images/A310332_2_En_12_Fig5_HTML.jpg)


    Figure 12-5.


    The import settings for the icon texture Tip


    If you’re going to use a texture for two different purposes, duplicate it so you
    can apply different import settings for each.


    Below the `Texture Type` area is where the texture maximum size and the compression
    level are specified. Unity will generate a warning at build time if you have used
    a compressed texture as an icon, pointing out correctly that compressed textures
    may not look good as icons. Select the `Default` tab so these settings apply to
    all platforms unless overridden, set `Max Size` as `1024` to avoid scaling the
    texture, and set `Format` to `TrueColor` for full-color resolution and no compression.
    Click `Apply` to reimport the texture with the adjusted settings, and the preview
    at the bottom will reflect the new format, size, and memory usage.


    Now drag the icon texture into the `Default Icon` field of the player settings
    in the Cross Platform area. Examine the Icon foldout of the iOS settings (Figure
    [12-6](#A310332_2_En_12_Chapter.html#Fig6)). As long as the `Override for iPhone`
    check box is not selected, automatically scaled versions of the default icon will
    appear for all the other icon sizes (Figure [12-6](#A310332_2_En_12_Chapter.html#Fig6)).


    ![A310332_2_En_12_Fig6_HTML.jpg](Images/A310332_2_En_12_Fig6_HTML.jpg)


    Figure 12-6.


    The default icon scaled to different icon sizes in the player settings


    The various icon sizes correspond to the screen resolutions of the various iOS
    devices:


    *   57 × 57: Any iPhone or iPod touch preceding the fourth generation (the iPhone
    3GS or the third-generation iPod touch)

    *   114 × 114: Fourth generation and later iPod touch and iPhone

    *   72 × 72: The original iPad, iPad 2, and iPad Mini

    *   144 × 144: The “new” iPad (or as I like to call it, the iPad 3)


    Ideally, there would be an icon tailored for each size, in which case you would
    select the `Override` check box and then drag the various versions of your icon
    to each appropriate box. Any box that you leave unfilled with use the `Default
    Icon` file. But Unity does a good job of scaling textures down (it is far preferable
    to scale down than up), so I often reuse the same 1024 × 1024 texture that I upload
    for the iTunes Connect app description.


    Tip


    If you don’t use the same icon file for iTunes Connect and the player settings,
    make sure the various icons at least resemble each other. I’ve had an app rejected
    because its icon in iTunes Connect did not resemble the app icon as displayed
    on a device.


    I recommend you always select the `Prerendered Icon` option to avoid the gloss
    that otherwise would be automatically added by Apple.


    Besides the optional shine, the portion of the build executed from Xcode also
    automatically rounds the corners of the icon and adds a drop shadow. So, don’t
    do that yourself! Just keep it square with sharp corners and no special borders.'
