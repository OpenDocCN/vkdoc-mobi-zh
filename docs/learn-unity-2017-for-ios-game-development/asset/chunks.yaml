- fmt: '# 14. Optimization


    Consistent with Donald Knuth’s much-ballyhooed quote that “premature optimization
    is the root of all evil,” I’ve left the topic of optimization until nearly the
    end of this book. In this chapter, you’ll optimize your bowling app and go over
    the precursors to that process, establishing the target performance and measuring
    the current performance. The project for this chapter on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    contains the optimized scripts and optimization helper scripts developed in this
    chapter.


    ## Choose Your Target


    There’s a saying, “Fast, good, or cheap. Pick two.” That’s generally the case
    with optimization. Among quality, space, and speed, you can often at best achieve
    two of the three, at the expense of the third.


    ### Frame Rate


    Before you start optimizing, you should establish your target frame rate. iOS
    devices refresh their screens 60 times per second, but by default, Unity iOS builds
    attempt to achieve 30 frames per second (fps). Targeting a frame rate at half
    the device refresh rate is less demanding on the device battery, and 30 fps is
    a lot easier to achieve than 60 fps. Your bowling game is simple, so you should
    be able to hit 60 fps if you’re willing to make some compromises.


    It might seem obvious to always target the highest possible frame rate, but if
    a game switches frequently between 30 fps and 60 fps, the discontinuity may be
    more distracting than just steadily running at 30 fps.


    Nevertheless, it makes sense to start with a target of 60 fps before profiling
    so you can see your peak performance and then lower it later if you need to do
    so.


    #### Create the Script


    There’s no way to set the target frame rate in the Unity Editor, but fortunately,
    you can adjust the target frame rate in a script by setting the static variable
    `Application.targetFrameRate`. So, let’s create a new JavaScript script, place
    it in the `Scripts` folder, and name it `FuguFrameRate` (Figure [14-1](#A310332_2_En_14_Chapter.html#Fig1)).


    ![A310332_2_En_14_Fig1_HTML.jpg](Images/A310332_2_En_14_Fig1_HTML.jpg)


    Figure 14-1. Adding a script in the Scripts folder


    This will be a really short script, with one public variable and a `Start` callback
    with just one line of code (Listing [14-1](#A310332_2_En_14_Chapter.html#Par8)).


    ```

    #pragma strict

    public var frameRate:int = 60;

    function Start() {

    Application.targetFrameRate = frameRate;

    }

    Listing 14-1. Complete Script for FuguFrameRate.js

    ```


    The script sets the target frame rate by changing the value of the static variable
    `Application.targetFrameRate` to the value of `frameRate`, which is a public variable
    so it can be adjusted in the Inspector view. Since iOS devices all have a screen
    refresh rate of 60 fps, that’s the best frame rate you can achieve and thus a
    reasonable default value for `frameRate`.


    #### Attach the Script


    To utilize the `FuguFrameRate` script, it has to be added to a scene so that its
    `Start` callback is executed when the game starts. So, let’s create an empty `GameObject`
    in the bowling scene, name it `FrameRate`, and drag the `FuguFrameRate` script
    onto it (Figure [14-2](#A310332_2_En_14_Chapter.html#Fig2)).


    ![A310332_2_En_14_Fig2_HTML.jpg](Images/A310332_2_En_14_Fig2_HTML.jpg)


    Figure 14-2. Frame rate script included in the bowling scene


    This script was added to your bowling scene, but you could just as well have added
    it to your splash scene instead since `Application.targetFrameRate` only needs
    to be set once and it stays at that value even when a new scene is loaded. Your
    current splash scene doesn’t really do anything, so running at Unity’s default
    30 fps is fine.


    However, if the splash scene were to display a cool animation, you might want
    to set it at 60 fps, and in that case, you would also add the frame rate script
    to that scene. In fact, if the splash scene looked best at 60 fps and the bowling
    scene ran more smoothly at 30 fps (rather than jittering between 30 fps and 60
    fps), you would add the frame rate script to both scenes, setting the target frame
    rate to 60 fps in the splash scene and to 30 fps in the bowling scene.


    ### Targeting Space


    Besides the frame rate, you should also set a goal for the app size. You have
    to compete for room on iOS devices with songs, photos, videos, and all the other
    apps that users install. A smaller footprint makes the decision easier for a user
    to keep your app.


    A smaller app also downloads in less time and loads faster (both the app load
    and level loads). Especially important, the App Store limits downloads over cellular
    connections to apps less than 50MB in size. You don’t want to miss out on impulse
    buys, so 50MB is a good app size target. This constraint is much easier to meet
    than the App Store’s original 20MB limit, but any app with significant content
    can still easily exceed that size (HyperBowl, with six lanes, is about 40MB).


    ## Profile the Game


    Before you start optimizing, you need to know what to optimize. That’s where profiling,
    obtaining performance information about the game, comes in. You have options including
    viewing statistics displayed in the Editor, profiling the app itself, and even
    writing some of your own performance measurement code.


    ### Game View Stats


    In the Editor, you have immediate access to performance-related information about
    the scene using the Stats overlay in the Game view (Figure [14-3](#A310332_2_En_14_Chapter.html#Fig3)).


    ![A310332_2_En_14_Fig3_HTML.jpg](Images/A310332_2_En_14_Fig3_HTML.jpg)


    Figure 14-3. The Game view statistics overlay


    When you click Play, you’ll see these statistics update while the game is in progress.
    This information is convenient, but it’s no substitute for profiling the actual
    app.'
