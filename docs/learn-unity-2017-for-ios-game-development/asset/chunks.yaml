    \ 或 Application Loader 上传。这里将使用 Xcode。在 Xcode 中，当构建包准备就绪时，将目标设备选为 Generic iOS\
    \ Device（如图 11-20 所示）。\n\n![A310332_2_En_11_Fig20_HTML.jpg](img/A310332_2_En_11_Fig20_HTML.jpg)\n\
