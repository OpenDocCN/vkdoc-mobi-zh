    ### 玩家得分


    定义了 `FuguBowlScore` 类之后，现在你可以添加 `FuguBowlPlayer` 类，该类将聚合各帧的分数以计算整局游戏的总分（清单 8-2）。与
    `FuguBowlScore` 类似，即使 `FuguBowlPlayer` 类与脚本文件同名，它也是显式声明的，并且不会继承 `MonoBehaviour`（否则类声明中会包含“extends
    MonoBehaviour”）。这不仅意味着它没有任何 Unity 回调函数，还意味着 `FuguBowlPlayer` 类不是 `Component` 的子类，因此该脚本无法附加到
    `GameObject` 上。换句话说，`FuguBowlPlayer` 脚本充当了一个代码库，其中包含了供其他脚本使用的类。


    ```

    class FuguBowlPlayer {

    var scores:FuguBowlScore[]; // 游戏的所有 10 帧

    // 构造函数

    function FuguBowlPlayer() {

    scores = new FuguBowlScore[10];

    for (var i:int=0; i<scores.length; ++i) {

    scores[i] = new FuguBowlScore();

    }

    ClearScore();

    }

    // 重置所有帧的分数

    function ClearScore() {

    for (var score:FuguBowlScore in scores) {

    score.Clear();

    }

    }

    清单 8-2.

    FuguBowlPlayer.js 中 FuguBowlPlayer 类的初版

    ```


    `FuguBowlPlayer` 类自然包含关于玩家的信息，例如，可以有一个 `String` 变量来存储玩家姓名。不过，基于本书的目的，我们将仅限于追踪玩家的保龄球得分。因此，该类只有一个实例变量
    `scores`，它是一个 `FuguBowlScore` 对象的内置数组。数组中的每个 `FuguBowlScore` 元素代表保龄球游戏中一帧的分数。


    **注意**


    内置数组的访问方式与 `Array` 类的实例相同（在 `FuguBowl.js` 中用于 `pins` 变量）。内置数组的访问速度比 `Array` 实例快得多，并且当声明为公共变量时，可以在检视面板中编辑。然而，与
    `Array` 实例不同，内置数组在运行时无法调整大小。


    类定义中的 `FuguBowlPlayer` 函数与类同名，这意味着它是一个构造函数，当创建该类的实例时会调用这个特殊函数。显式定义构造函数并非总是必需的（`FuguBowlScore`
    就没有），甚至在 `MonoBehaviour` 中是被禁止的。但在此处使用构造函数是合理的，因为每个新创建的 `FuguBowlPlayer` 都需要同时创建其
    `scores` 数组。因此，`FuguBowlPlayer` 构造函数创建了一个包含十个元素的内置数组，声明其类型为 `FuguBowlScore`，并用新创建的
    `FuguBowlScore` 实例填充该数组。


    构造函数还调用了 `ClearScore` 函数，该函数又对每个 `FuguBowlScore` 对象调用 `Clear`，确保它们初始状态都表示未登记任何分数。`FuguBowlPlayer`
    类还包含 `IsSpare` 和 `IsStrike` 函数，它们对指定的 `FuguBowlScore` 对象调用同名函数，通过传入的参数在 `scores`
    数组中索引该对象。由于数组索引从零开始，游戏中的十帧分别由索引 0 到 9 表示。


    **注意**


    从某种意义上说，`FuguBowlPlayer` 类充当了 `FuguBowlScore` 类的包装器，以便其他脚本只需了解 `FuguBowlPlayer`
    类。作为一种优化练习，你可以提供更多的抽象，让 `IsSpare` 和 `IsStrike` 接受范围在 1 到 10 的帧索引，然后在用作数组索引之前减去
    1。


    ### 设置分数


    随着游戏的进行，每次投球后都需要更新分数。我们计划在 `FuguBowlPlayer` 类中添加名为 `SetBall1Score`、`SetBall2Score`
    和 `SetBall3Score`（用于第十帧）的函数。与该类中的 `IsSpare` 和 `IsStrike` 函数类似，这些新增函数将以帧索引作为参数。


    如果前一帧是补中或全中，每次投球的分数可能会更新该帧的总分。因此，你首先需要在 `FuguBowlPlayer` 类中添加执行这些更新的函数，分别命名为 `SetSpareScore`（清单
    8-3）和 `SetStrikeScore`（清单 8-4）。


    `SetSpareScore` 函数将总分设置为第一次和第二次投球分数之和（应始终为十分），再加上下一次投球的分数，即下一帧的第一次投球分数。


    ```

    function SetSpareScore(frame:int) {

    var framescore:FuguBowlScore = scores[frame];

    // 分数为本帧两次投球的分数与下一帧第一次投球分数之和

    framescore.total = framescore.ball1+framescore.ball2+scores[frame+1].ball1;

    }

    清单 8-3.

    FuguBowlPlayer 类中的 SetSpareScore 函数

    ```


    `SetStrikeScore` 函数稍微复杂一些。它将总分设置为第一次投球的分数（应为十分）加上接下来两次投球的分数，这两次投球通常由下一帧的第一次和第二次投球组成。但如果下一帧是全中，那么接下来的两次投球就是下一帧的第一次投球和下下帧的第一次投球。


    ```

    function SetStrikeScore(frame:int) {

    var framescore:FuguBowlScore = scores[frame];

    framescore.total = framescore.ball1;

    // 总是加上下一帧第一次投球的分数

    framescore.total+=scores[frame+1].ball1;

    if (frame < 8 && IsStrike(frame+1)) {

    framescore.total+=scores[frame+2].ball1;

    } else {

    // 对于第九帧（帧索引 8），加上下一帧（即最后一帧）的第二次投球分数（始终存在）

    framescore.total+=scores[frame+1].ball2;

    }

    }

    清单 8-4.

    FuguBowlPlayer 类中的 SetStrikeScore 函数

    ```


    `SetSpareScore` 和 `SetStrikeScore` 的使用在 `SetBall1Score` 的定义中得到了说明（清单 8-5）。第一行将帧的
    `ball1` 变量设置为击倒的瓶数，该瓶数作为函数的第二个参数传入。然后，如果当前帧不是第一帧，`SetBall1Score` 会检查前一帧是否投出了补中。如果是这种情况，前一帧正在等待本次投球的结果来计算该帧的总分，于是调用该帧的
    `SetSpareScore` 来执行最终计算。


    如果当前帧不是第一帧或第二帧，`SetBall1Score` 会检查前两帧是否都投出了全中。如果是，那么这两帧中的第一帧正在等待本次投球的结果来更新其总分，于是调用该帧的
    `SetStrikeScore`。


    请注意，`SetBall1Score` 不会设置当前帧的总分。如果当前投球不是全中，则该帧尚未结束；如果当前投球是全中，则还需要再投两次才能更新该帧的总分（当然是通过
    `SetStrikeScore` 函数！）。


    ```

    function SetBall1Score(frame:int,pinsDown:int) {

    scores[frame].ball1=pinsDown;

    // 如果前一帧是补中，设置其分数

    if (frame>0 && IsSpare(frame-1)) {

    SetSpareScore(frame-1);

    }

    // 如果前两帧都是全中，则设置第一帧的分数

    if (frame>1 && IsStrike(frame-1) && IsStrike(frame-2)) {

    SetStrikeScore(frame-2);

    }

    }

    清单 8-5.

    FuguBowlPlayer 类中的 SetBall1Score 函数

    ```

