  raw: '#### Asset Store


    Several more sophisticated FSM frameworks are available on the Asset Store . A
    search for fsm in the Asset Store window brings up several, including a popular
    visual programming package called Playmaker, developed by Huton Games at [`http://hutongames.com/`](http://hutongames.com/)
    .


    ### On the Web


    Wikipedia ( [`http://wikipedia.org/`](http://wikipedia.org/) ) has an extensive
    description of bowling and its scoring rules. Just search for bowling on the site.
    And if you search for state machine, you’ll find an article that explains probably
    more than you’ll ever want to know about FSMs!


    One of the most well-known virtual worlds, Second Life, has FSM support. Search
    for state on the Second Life wiki ( [`http://wiki.secondlife.com`](http://wiki.secondlife.com)
    ) to see how states are defined using the Linden Scripting Language (LSL) .


    # 9. The Game GUI


    Over the past several chapters, you’ve put together a fairly complete bowling
    game with 3D graphics, physics, sound, player controls, and automatic camera movement.
    The game has almost every category of feature expected in a 3D game except for
    one: a graphical user interface (GUI) . In particular, the bowling game should
    have a scoreboard, and games usually have a menu that shows up at the beginning
    of the game and when the game is paused.


    Tip


    I have had an iOS game rejected by Apple for not having a pause menu, so I recommend
    including one, if only for that reason.


    In this chapter, you’ll implement both a scoreboard and a start/pause menu with
    Unity’s built-in GUI system, known as UnityGUI. (You can tell how long a Unity
    feature has been around by the coolness of its name—more recent features have
    names like Shuriken, Mecanim, and Beast.)


    The scoreboard and pause menu scripts are available in the project for this chapter,
    accessible via the Download Source Code button located at [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    . To reiterate a point ad nauseam, however, entering the code line by line and
    function by function provides the best learning experience!


    ## The Scoreboard


    Let’s start off with the scoreboard because it’s a simpler case than the menu.
    The scoreboard only needs to display, with no interaction required. As described
    in the previous chapter, a typical bowling scoreboard will show the results for
    each frame (i.e., the first and second balls, and possibly third, in the tenth
    frame), as well as the total score up to that frame. You won’t do anything fancy
    here; you’ll just display the scores with text by drawing the scoreboard as a
    sequence of labels, with each label displaying the score for that frame as text.


    ### Create the Script


    Let’s get started by creating a GameObject with a scoreboard script attached (this
    should be a familiar process by now). In the Project view, create a new JavaScript
    in the Scripts folder and name it FuguBowlScoreboard (Figure [9-1](#A310332_2_En_9_Chapter.html#Fig1)).


    ![A310332_2_En_9_Fig1_HTML.jpg](Images/A310332_2_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    Creating the FuguBowlScoreboard.js script


    Next, create a new GameObject in the Hierarchy view, name it Scoreboard, and attach
    the FuguBowlScoreboard script to it.


    Now you’re ready to add UnityGUI code to the FuguBowlScoreboard script. If you’ve
    developed user interfaces with other GUI systems, you’ll probably find UnityGUI
    a bit unusual. Instead of creating and placing GUI objects that have callbacks
    responding to events like button clicks, UnityGUI controls are created inside
    OnGUI callback functions, which are called every frame (actually a few times a
    frame). To demonstrate quickly how UnityGUI works, place the contents of Listing
    [9-1](#A310332_2_En_9_Chapter.html#Par9) in the FuguBowlScoreboard script.


    ```

    #pragma strict

    function OnGUI() {

    GUI.Label(Rect(5,100,200,20),"This is a label");

    }

    Listing 9-1.

    Testing a Simple UnityGUI Label in FuguBowlScoreboard.js

    ```


    All UnityGUI controls are created with calls to static functions in the GUI class
    (and also GUILayout, but I’ll get to that in the next section). The OnGUI callback
    of Listing [9-1](#A310332_2_En_9_Chapter.html#Par9) calls GUI.Label to draw a
    label, passing in a Rect (rectangle) that specifies the label is to be drawn at
    the x,y coordinates of 5,100 (the coordinate system for UnityGUI has 0,0 at the
    top left of the screen) and with a width and height of 200 and 20 pixels, respectively.
    The second argument is the text to display in the label. Click Play, and you should
    see “This is a label” appear on the screen.


    Placing user interface code in a single script callback can be cumbersome if the
    user interface is complex. But for this simple user interface, the OnGUI callback
    is convenient, and you can expand on it to form a no-frills text-based bowling
    scoreboard. Let’s replace the single-label example in FuguBowlScoreboard with
    the contents of Listing [9-2](#A310332_2_En_9_Chapter.html#Par12).


    ```

    #pragma strict

    var style:GUIStyle; // customize the appearance

    function OnGUI() {

    for (var f:int=0; f<10; f++) {

    var score:String="";

    var roll1:int = FuguBowl.player.scores[f].ball1;

    var roll2:int = FuguBowl.player.scores[f].ball2;

    var roll3:int = FuguBowl.player.scores[f].ball3;

    switch (roll1) {

    case -1: score += " "; break;

    case 10: score +="X"; break;

    default: score += roll1;

    }

    score+="/";

    if (FuguBowl.player.IsSpare(f)) {

    score +="I";

    } else {

    switch (roll2) {

    case -1: score += " "; break;

    case 10: score +="X"; break;

    default: score += roll2;

    }

    }

    if (f==9) {

    score+="/";

    if (10==roll2+roll3) {

    score +="I";

    } else {

    switch (roll3) {

    case -1: score += " "; break;

    case 10: score +="X"; break;

    default: score += roll3;

    }

    }

    }

    GUI.Label(Rect(f*30+5,5,50,20),score,style);

    var total:int=FuguBowl.player.GetScore(f);

    if (total != -1) {

    GUI.Label(Rect(f*30+5,20,50,20)," "+total,style);

    }

    }

    }

    Listing 9-2.

    A Bowling Scoreboard

    ```


    The new OnGUI callback loops through all ten frames, querying the FuguBowlPlayer
    for the FuguBowlScore representing each frame. At the bottom of the loop, one
    or two calls to GUI.Label are issued. The first GUI.Label displays the score for
    each ball of the frame, and the second GUI.Label is drawn below the first, displaying
    the game’s total score for that frame if it is available.


    Most of the code in the loop is devoted to figuring out what to display for each
    ball of the frame. For ball1, if it has not been rolled yet, then the String to
    display is just a space. If a strike has been rolled, then the letter X is displayed.
    Otherwise, you can display the numeric score (1 to 9).'
  trans: "\n# 资源商店\n\n资源商店上提供了多个更复杂的有穷状态机框架。在资源商店窗口中搜索 `fsm` 会显示出多个结果，其中包括由 Huton\
    \ Games 开发的名为 Playmaker 的流行可视化编程包，其官网地址为 [`http://hutongames.com/`](http://hutongames.com/)。\n\
    \n## 网络资源\n\n维基百科（[`http://wikipedia.org/`](http://wikipedia.org/)）对保龄球及其计分规则进行了详尽描述。在该网站搜索\
    \ `bowling` 即可找到相关内容。如果你搜索 `state machine`，则会看到一篇关于有穷状态机的文章，其内容可能超乎你的想象！\n\n最著名的虚拟世界之一《第二人生》也支持有穷状态机。在《第二人生》的维基页面（[`http://wiki.secondlife.com`](http://wiki.secondlife.com)）中搜索\
    \ `state`，即可了解如何通过林登脚本语言（LSL）定义状态。\n\n# 9. 游戏图形用户界面\n\n在过去的几个章节中，你已经构建了一个相当完整的保龄球游戏，涵盖\
    \ 3D 图形、物理、音效、玩家控制和自动摄像机移动。该游戏几乎具备 3D 游戏应包含的所有功能类别，唯独缺少一项：图形用户界面（GUI）。具体而言，保龄球游戏应该有一个记分牌，并且游戏通常还需要一个在游戏开始和暂停时显示的菜单。\n\
    \n提示\n\n我曾有一款 iOS 游戏因未包含暂停菜单而被苹果拒绝，因此我建议你添加一个暂停菜单——即便仅仅为了避免这种情况。\n\n在本章中，你将使用\
    \ Unity 内置的 GUI 系统——UnityGUI 来实现记分牌和启动/暂停菜单。（你可以通过名称的酷炫程度来判断 Unity 功能的存在时长——较新的功能通常有像\
    \ Shuriken、Mecanim 和 Beast 这样的名字。）\n\n本章项目的记分牌和暂停菜单脚本可通过位于 [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)\
    \ 的“下载源代码”按钮获取。但需要再次不厌其烦地强调，逐行逐函数地输入代码才是最佳的学习方式！\n\n## 记分牌\n\n我们先从记分牌开始，因为它比菜单更简单。记分牌只需要显示信息，无需交互功能。如前一章所述，典型的保龄球记分牌会显示每一局的结果（即第一球、第二球，第十局可能还有第三球），以及截止到该局的累计总分。这里不需要任何花哨的设计；只需通过文本显示分数，即将记分牌绘制为一系列标签，每个标签用文字显示对应局的分数。\n\
    \n### 创建脚本\n\n让我们开始创建一个带有记分牌脚本的 `GameObject`（这过程现在应该很熟悉了）。在项目视图中，于 `Scripts` 文件夹内新建一个\
    \ JavaScript 文件，并将其命名为 `FuguBowlScoreboard`（见图 9-1）。\n\n![A310332_2_En_9_Fig1_HTML.jpg](img/A310332_2_En_9_Fig1_HTML.jpg)\n\
    \n**图 9-1.**  \n创建 `FuguBowlScoreboard.js` 脚本\n\n接下来，在层级视图中新建一个 `GameObject`，命名为\
    \ `Scoreboard`，并将 `FuguBowlScoreboard` 脚本附加到该对象上。\n\n现在你可以开始向 `FuguBowlScoreboard`\
    \ 脚本中添加 UnityGUI 代码了。如果你曾使用过其他 GUI 系统开发用户界面，可能会觉得 UnityGUI 有些特别。UnityGUI 控件并非创建和放置具有回调函数（用于响应按钮点击等事件）的\
    \ GUI 对象，而是在每帧（实际上每帧会调用多次）被调用的 `OnGUI` 回调函数内部进行创建。为了快速演示 UnityGUI 的工作原理，请将代码清单\
    \ 9-1 的内容放入 `FuguBowlScoreboard` 脚本中。\n\n```javascript\n#pragma strict\nfunction\
    \ OnGUI() {\n    GUI.Label(Rect(5,100,200,20),\"这是一个标签\");\n}\n```\n\n**代码清单 9-1.**\
    \ 在 `FuguBowlScoreboard.js` 中测试简单的 UnityGUI 标签\n\n所有 UnityGUI 控件都是通过调用 `GUI` 类（以及\
    \ `GUILayout` 类，我将在下一节介绍它）的静态函数来创建的。代码清单 9-1 中的 `OnGUI` 回调调用了 `GUI.Label` 来绘制一个标签，传入了一个\
    \ `Rect`（矩形）参数，指定标签绘制在屏幕坐标 `5,100` 处（UnityGUI 的坐标系以屏幕左上角为 `0,0`），宽度和高度分别为 `200`\
    \ 和 `20` 像素。第二个参数是要在标签中显示的文本。点击播放，你应该会在屏幕上看到“这是一个标签”。\n\n如果用户界面很复杂，将所有界面代码放在一个脚本回调函数中会显得笨重。但对于这个简单的界面，`OnGUI`\
    \ 回调已经足够方便，你可以在此基础上扩展，形成一个基础、纯文本的保龄球记分牌。让我们用代码清单 9-2 的内容替换 `FuguBowlScoreboard`\
    \ 中的单标签示例。\n\n```javascript\n#pragma strict\nvar style:GUIStyle; // 自定义外观\nfunction\
    \ OnGUI() {\n    for (var f:int=0; f<10; f++) {\n        var score:String=\"\"\
    ;\n        var roll1:int = FuguBowl.player.scores[f].ball1;\n        var roll2:int\
    \ = FuguBowl.player.scores[f].ball2;\n        var roll3:int = FuguBowl.player.scores[f].ball3;\n\
    \        switch (roll1) {\n            case -1: score += \" \"; break;\n     \
    \       case 10: score +=\"X\"; break;\n            default: score += roll1;\n\
    \        }\n        score+=\"/\";\n        if (FuguBowl.player.IsSpare(f)) {\n\
    \            score +=\"I\";\n        } else {\n            switch (roll2) {\n\
    \                case -1: score += \" \"; break;\n                case 10: score\
    \ +=\"X\"; break;\n                default: score += roll2;\n            }\n \
    \       }\n        if (f==9) {\n            score+=\"/\";\n            if (10==roll2+roll3)\
    \ {\n                score +=\"I\";\n            } else {\n                switch\
    \ (roll3) {\n                    case -1: score += \" \"; break;\n           \
    \         case 10: score +=\"X\"; break;\n                    default: score +=\
    \ roll3;\n                }\n            }\n        }\n        GUI.Label(Rect(f*30+5,5,50,20),score,style);\n\
    \        var total:int=FuguBowl.player.GetScore(f);\n        if (total != -1)\
    \ {\n            GUI.Label(Rect(f*30+5,20,50,20),\" \"+total,style);\n       \
    \ }\n    }\n}\n```\n\n**代码清单 9-2.** 保龄球记分牌\n\n新的 `OnGUI` 回调会循环遍历全部十局比赛，从 `FuguBowlPlayer`\
    \ 查询代表每局比赛的 `FuguBowlScore`。在循环底部，会调用一次或两次 `GUI.Label`。第一个 `GUI.Label` 显示每局中各球的分值，第二个\
    \ `GUI.Label` 绘制在第一个的下方，显示该局（如果已计算）的游戏累计总分。\n\n循环中的大部分代码用于确定每局中各球应显示的内容。对于 `ball1`，如果尚未投掷，则显示的字符串仅为一个空格。如果投出了全中，则显示字母\
    \ `X`。否则，显示数字分数（`1` 到 `9`）。\n"
- fmt: '`Ball2` is similar to `Ball1`, except it also displays the letter `I` for
    a spare. Normally, `I` would use the slash character (`/`) for a spare, but that
    is used here to separate the scores for `Ball1`, `Ball2`, and `Ball3`.


    The `String` for `Ball3` is constructed only if the frame is the tenth frame (index
    9). `Ball3` is the same as `Ball2`, except it checks for a spare combining `Ball2`
    and `Ball3` instead of `Ball1` and `Ball2`.


    The frame total score is retrieved just by calling the `FuguBowlPlayer` function
    `GetScore` and is displayed as long as the score is available, i.e., not `-1`.
    The `Rect` for each `GUI.Label` is offset from the top left of the screen by an
    increment based on the frame that `GUI.Label` is displaying (Figure [9-2](#A310332_2_En_9_Chapter.html#Fig2)).


    ![A310332_2_En_9_Fig2_HTML.jpg](Images/A310332_2_En_9_Fig2_HTML.jpg)


    Figure 9-2. A bowling scoreboard displayed by `FuguBowlScoreboard.js`


    Figure [9-2](#A310332_2_En_9_Chapter.html#Fig2) shows a game on the second ball
    of the fourth frame. Three pins have been knocked down on the first ball. Strikes
    have been rolled on the first two frames and a spare on the third (five pins on
    the first roll and five on the second). The game total for the first frame is
    10 for the strike plus the pins knocked down by the next two balls, which is 10
    for the second strike and then 5 for the first ball in the third frame, for a
    total of 25.


    The second frame also has a strike, so it’s 10 plus 5 for the first ball of the
    third frame and 5 for the second ball of that frame, for a total of 20. Add that
    to the 25 from the first frame, for a game total of 45.


    The third frame has a spare, so it’s 10 again but with the next ball added, which
    is 3, for a total of 13; add that to the game total from the previous frame, and
    that’s 58. So, your scoring code and scoreboard code works!


    ### Style the GUI


    The appearance of a GUI control can be customized with a `GUIStyle`, which is
    a collection of properties that affect the display of the control. Conceptually,
    it’s similar to how Cascading Style Sheets (CSS) are used in formatting web content.


    Each GUI function that creates a GUI control is an overloaded function that comes
    in two flavors: one that uses the default `GUIStyle` and one that takes a `GUIStyle`
    argument. The initial single-label example just used the default `GUIStyle`, but
    the scoreboard uses the version of `GUI.Label` that takes a `GUIStyle` argument,
    which provides a way to customize the scoreboard’s appearance.


    The `GUIStyle` passed to the `GUI.Label` is bound to a public variable named `style`,
    which allows customization of the `GUIStyle` in the Inspector view. For example,
    since the scoreboard is all text, you can click the Text Color field in the Normal
    subsection of the `style` (equivalent to accessing `style.onNormal.textColor`
    in the script) to bring up a color chooser and change the color of the scoreboard
    (Figure [9-3](#A310332_2_En_9_Chapter.html#Fig3)).


    ![A310332_2_En_9_Fig3_HTML.jpg](Images/A310332_2_En_9_Fig3_HTML.jpg)


    Figure 9-3. `GUIStyle` options


    Among the many other `GUIStyle` properties, several affect the GUI font, which
    defaults to Unity’s built-in font, Arial. You can change the font by dragging
    a Font asset from the Project view into the Font field of the `GUIStyle` (in the
    script, that would be the variable `style.font`). Any font in TrueType, OpenType,
    or dfont format can be imported into Unity.


    Other `GUIStyle` properties control the font size and style (for fonts imported
    as dynamic fonts), text alignment, and word wrap.


    Rich-text format is particularly interesting because it provides for HTML-like
    markup in the label text. So, really, although the script is simple, your style
    customization options are plentiful!


    ## The Pause Menu


    Compared with the scoreboard, a start/pause menu will take considerably more scripting,
    so, first, a design is in order. Let’s create a main menu and two submenus: one
    for game options and one to display the game credits. The options menu will have
    distinct panels for audio, graphics, system, and stats. The logic is not as complicated
    as for the bowling game controller, but it’s another example where you should
    first sketch out the design as a state diagram (Figure [9-4](#A310332_2_En_9_Chapter.html#Fig4)).


    ![A310332_2_En_9_Fig4_HTML.jpg](Images/A310332_2_En_9_Fig4_HTML.jpg)


    Figure 9-4. A state diagram for a pause menu


    The diagram shows that the player can go from the game-playing state (or equivalently,
    the menu-invisible state) to the main pause menu and, from there, to a credits
    screen or an options menu, or the player can quit the game. The options menu in
    turn can display an audio, graphics, system, or statistics panel, each of which
    could be listed as states, but for now, let’s keep it simple by just thinking
    of each top-level menu screen as a state.


    All states except for `Quit` (which you can think of as the exit state) can transition
    back to the state that transitioned to them in the first place, which is why each
    transition arrow is drawn bidirectionally. This means the player can go from the
    main menu to the options menu and back to the main menu and from there can go
    back to the normal gameplay mode. But there won’t be any shortcuts going from
    the options menu straight back to gameplay, for example.


    ### Create the Script


    Let’s start the pause menu implementation by creating a new JavaScript in the
    Scripts folder of the Project view and naming it `FuguPause` (Figure [9-5](#A310332_2_En_9_Chapter.html#Fig5)).


    ![A310332_2_En_9_Fig5_HTML.jpg](Images/A310332_2_En_9_Fig5_HTML.jpg)


    Figure 9-5. Creating the `FuguPause.js` script


    Now, to add the script to the scene, create a new `GameObject` in the Hierarchy
    view, name it `PauseMenu`, and attach the `FuguPause` script to the `PauseMenu`
    `GameObject`.


    ### Track the Current Menu Page


    The technique used in the `FuguBowl` script of implementing a state machine with
    coroutines won’t work with UnityGUI, as all of the UnityGUI functions must be
    called within an `OnGUI` callback. But the state diagram is still useful as the
    basis for an implementation. For starters, you can focus on the states that represent
    distinct menu screens. Let’s call them pages to distinguish them from the more
    general term screen. These menu states could be distinguished by strings or integers,
    but an enumeration fits the bill when you have several related but distinct values.
    So, let’s define an `enum` called `Page` for the menu page states and a variable
    named `currentPage` to track which page is currently being displayed (Listing
    [9-3](#A310332_2_En_9_Chapter.html#Par33)).


    ```enum Page {

    None,Main,Options,Credits

    }```Listing 9-3. Enumerations for Menu Pages


    Following the state diagram, the `enum` lists a state for no menu (the game is
    playing), the main menu page, the options page, and the credits page. Because
    the variable `currentPage` is of type `Page`, only the values `Page.None`, `Page.Main`,
    `Page.Options`, and `Page.Credits` can be assigned to that variable.'
