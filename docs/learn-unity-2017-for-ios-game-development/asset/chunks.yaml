    ## The Hierarchy View


    Every game engine has a top-level object called a game object or entity to represent
    anything that has a position, potential behavior, and a name to identify it. Unity
    game objects are instances of the class GameObject.


    Note


    In general, when we refer to a type of Unity object, we’ll use its class name
    to be precise and make clear how that object would be referenced in a script.


    The Hierarchy View is another representation of the current scene. While the Scene
    View is a 3D representation of the scene that you can work in as you would with
    a content creation tool, and the Game View shows the scene as it looks when playing
    the game, the Hierarchy View lists all the GameObjects in the scene in an easily
    navigable tree structure.


    ### Inspect Game Objects


    When you click a GameObject in the Hierarchy View, it becomes the current Editor
    selection and its components are displayed in the Editor. Every GameObject has
    a Transform Component, which specifies its position, rotation, and scale, relative
    to its parent in the hierarchy (if you’re familiar with the math of 3D graphics,
    the Transform is essentially the transformation matrix of the object). Some components
    provide a function for the game object (e.g., a light is a GameObject with a Light
    Component attached). Other components reference assets such as meshes, textures,
    and scripts. Figure [2-37](#A310332_2_En_2_Chapter.html#Fig37) shows the components
    of the Player GameObject (in the Hierarchy view, the entire Player tree of GameObjects
    is displayed in blue because it’s linked to a prefab, a special type of asset
    that is used to clone a GameObject or group of GameObjects).


    ![A310332_2_En_2_Fig37_HTML.jpg](Images/A310332_2_En_2_Fig37_HTML.jpg)


    Figure 2-37.


    Hierarchy View and Inspector View


    ### Parent and Child GameObjects


    Notice that many of the GameObjects are arranged in a hierarchy, hence the name
    of this view (in computer graphics, this is commonly known as a scene graph).
    Parenting makes sense for game objects that are conceptually grouped together.
    For example, when you want to move a car, you want the wheels to automatically
    move along with the car. So the wheels should be specified as children of the
    car, offset from the center of the car. When the wheels turn, they turn relative
    to the movement of the car. Parenting also allows us to activate or deactivate
    whole groups of game objects at one time.


    ## The Scene View


    Whereas the Hierarchy View allows us to create, inspect, and modify the GameObjects
    in the current scene, it doesn’t give us a way to visualize the scene. That’s
    where the Scene View comes in. The Scene View is similar to the interfaces of
    3D modeling applications. It lets you examine and modify the scene from any 3D
    vantage point and gives you an idea how the final product will look.'
  trans: '

    ### 搜索资源


    在大型复杂项目中，手动搜索特定资源十分困难。幸运的是，与访达（Finder）类似，这里也有一个搜索框，可用于筛选项目视图右侧面板中显示的结果。在图 2-34
    中，项目视图显示了搜索名称中含有“add”的资源的结果。


    ![A310332_2_En_2_Fig34_HTML.jpg](img/A310332_2_En_2_Fig34_HTML.jpg)


    **图 2-34.** 搜索名称中含有“add”的资源


    右侧面板显示了“资源”（Assets）下所有内容的搜索结果（即我们所有的资源）。通过在左侧面板中选择一个子文件夹，可以进一步缩小搜索范围。例如，如果你知道要找的是纹理，并且已经按资源类型将资源整理到了子文件夹中，那么你可以选择“脚本”（Scripts）文件夹进行搜索（图
    2-35）。


    ![A310332_2_En_2_Fig35_HTML.jpg](img/A310332_2_En_2_Fig35_HTML.jpg)


    **图 2-35.** 在文件夹中搜索资源


    注意，搜索框下方有一个显示所选文件夹名称的标签。你仍然可以点击左侧的“资源”（Assets）标签，查看所有资源的搜索结果，包括本地资源和 Unity 资源商店（Unity
    Asset Store）中的资源——我们将在本书中大量使用后者。


    你还可以使用搜索框右侧的菜单，按资源类型过滤搜索。你不必只在“脚本”文件夹内搜索，而是可以选择“脚本”作为感兴趣的资源类型（图 2-36）。注意，这会导致在搜索框中添加
    `s:Texture`。前缀 `t:` 表示搜索结果应按其后的资源类型进行过滤。你也可以不通过菜单，而直接键入该内容。


    ![A310332_2_En_2_Fig36_HTML.jpg](img/A310332_2_En_2_Fig36_HTML.jpg)


    **图 2-36.** 按资源类型过滤的搜索结果


    资源类型菜单右侧的按钮用于按标签过滤（你可以在检视面板中为每个资源分配一个标签），这在搜索资源商店时也非常方便。最右侧的星形按钮则会将当前搜索保存到左侧面板的“收藏夹”（Favorites）部分。


    ### 操作资源


    项目视图中的资源，其操作方式与它们在访达中的对应文件非常相似。


    双击某个资源会尝试打开一个合适的程序来查看或编辑该资源。这等同于右键点击该资源并选择 `打开`。双击场景文件将在当前 Unity 编辑器窗口中打开该场景，就像你在“文件”（File）菜单中选择`打开场景`一样。


    你还可以重命名、复制、删除资源，以及在文件夹之间拖放文件，就像在访达中一样。其中一些操作可通过 Unity 的“编辑”（Edit）菜单，或右键点击资源时弹出的菜单来使用。在接下来的几章中，你将有机会练习这些操作。


    同样，在下一章中，你将学习如何向项目添加资源。这包括导入文件或导入 Unity 包，可以通过菜单栏上的“资源”（Assets）菜单，或者直接将文件从访达拖入项目的“资源”文件夹。


    ## 层级视图


    每个游戏引擎都有一个顶层对象，称为游戏对象（game object）或实体（entity），用来表示任何具有位置、潜在行为以及用于标识其名称的事物。Unity
    游戏对象是 `GameObject` 类的实例。


    **注意：** 通常，当我们提到某种 Unity 对象类型时，为了精确并明确该对象在脚本中如何被引用，我们会使用其类名。


    层级视图是当前场景的另一种表现形式。场景视图是一个三维场景表现，你可以像使用内容创作工具一样在其中工作；游戏视图则显示游戏运行时的场景外观；而层级视图则以易于导航的树形结构列出场景中所有的
    `GameObject`。


    ### 检查游戏对象


    当你在层级视图中点击一个 `GameObject` 时，它就成为当前的编辑器选中对象，其组件会显示在编辑器中。每个 `GameObject` 都有一个变换组件，用于指定其相对于层级中父对象的位置、旋转和缩放（如果你熟悉三维图形数学，那么可以说变换本质上就是该对象的变换矩阵）。一些组件为游戏对象提供特定功能（例如，灯光就是一个附加了灯光组件的
    `GameObject`）。其他组件则引用诸如网格、纹理和脚本等资源。图 2-37 展示了玩家 `GameObject` 的组件（在层级视图中，整个玩家 `GameObjects`
    树以蓝色显示，因为它链接到了预设体——一种用于克隆单个 `GameObject` 或一组 `GameObjects` 的特殊资源类型）。


    ![A310332_2_En_2_Fig37_HTML.jpg](img/A310332_2_En_2_Fig37_HTML.jpg)


    **图 2-37.** 层级视图与检视面板


    ### 父游戏对象与子游戏对象


    请注意，许多 `GameObject` 是按层级结构排列的，因此该视图得名“层级视图”（在计算机图形学中，这通常被称为场景图）。对于在概念上被分组的游戏对象来说，建立父子关系是合理的。例如，当你想移动一辆汽车时，你会希望车轮自动跟随汽车移动。因此，车轮应指定为汽车的子对象，相对于汽车中心偏移。当车轮转动时，它们是相对于汽车的运动而转动的。父子关系还允许我们同时激活或停用整组游戏对象。


    ## 场景视图


    层级视图允许我们创建、检查和修改当前场景中的 `GameObject`，但它并未提供可视化场景的方法。这正是场景视图的作用所在。场景视图类似于三维建模软件的界面。它允许你从任意三维视角检视和修改场景，并让你对最终产品的外观有所了解。

