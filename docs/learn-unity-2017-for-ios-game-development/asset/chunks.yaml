  trans: '

    # 创建保龄球瓶


    现在有了滚动空间，就该添加球瓶了。可以用`Capsule`（胶囊体）基元来制作一个简化版的保龄球瓶，替代球瓶模型。


    从层级视图的创建菜单中选择`Capsule`（图 7-2）。`Capsule`与其他基元模型一样，也可以在菜单栏的`GameObject`菜单中找到。


    ![A310332_2_En_7_Fig2_HTML.jpg](img/A310332_2_En_7_Fig2_HTML.jpg)


    图 7-2. 创建一个胶囊体


    将生成的游戏对象命名为`Pin`。要创建十个球瓶，你可以将球瓶复制九次，但是，与其像立方体场景中复制立方体那样操作，不如先创建一个预制件。这样一来，你对单个球瓶所做的任何更改都可以应用到所有十个球瓶上。


    所以，将球瓶拖拽到项目视图中的`Prefabs`文件夹中，以创建预制件（图 7-3）。


    ![A310332_2_En_7_Fig3_HTML.jpg](img/A310332_2_En_7_Fig3_HTML.jpg)


    图 7-3. 球瓶预制件


    创建预制件可以让你制作一个游戏资源副本，并在游戏中按需多次应用。当你对预制件进行更改时，这些更改将应用到游戏中的所有资源上。


    # 在场景中放置球瓶


    现在你可以在场景中放置球瓶了。从项目文件夹中，将一个球瓶预制件拖拽到场景中。你需要让球瓶与球在一条直线上。因此，将其放置在球的同一 X 轴 `(100,1,0)`
    上（图 7-4）。


    ![A310332_2_En_7_Fig4_HTML.jpg](img/A310332_2_En_7_Fig4_HTML.jpg)


    图 7-4. 初始球瓶变换设置


    现在，再添加九个球瓶，形成一个典型的保龄球瓶阵型（三角形）。


    ![A310332_2_En_7_Fig5_HTML.jpg](img/A310332_2_En_7_Fig5_HTML.jpg)


    图 7-5. 带球瓶的保龄球


    如果你现在测试，你会发现当你把球滚向球瓶时，球只是从它们上面弹开，因为这些球瓶有`Collider`组件，但却是静态的`GameObject`。和球一样，每个球瓶都需要有一个`Rigidbody`组件才能对力做出反应。可以通过组件菜单将`Rigidbody`组件添加到`Pin`预制件上，不过这次，让我们尝试另一种方法。在项目视图中选择`Pin`预制件，然后在检查器视图中点击`Add
    Component`按钮。在弹出的菜单中，在物理（Physics）下选择`Rigidbody`（或者你也可以通过在弹出窗口的搜索字段中输入`rigidbody`来找到该选项）。无论你选择哪种方式，现在`Pin`预制件上应该就有了一个`Rigidbody`组件（图
    7-6）。


    ![A310332_2_En_7_Fig6_HTML.jpg](img/A310332_2_En_7_Fig6_HTML.jpg)


    图 7-6. 带有 `Rigidbody` 组件的球瓶预制件


    与地面和球的碰撞体组件类似，`Pin`预制件应该有自己的`PhysicMaterial`（物理材质）。创建合适的`PhysicMaterial`的快捷方法是复制球所用的物理材质，因此在项目视图中选择`Physics`文件夹中的`Ball
    PhysicMaterial`，使用编辑菜单或`Command+D`进行复制，并将新的物理材质命名为`Pin`（图 7-7）。


    ![A310332_2_En_7_Fig7_HTML.jpg](img/A310332_2_En_7_Fig7_HTML.jpg)


    图 7-7. 球瓶预制件的物理材质


    由于保龄球瓶应该和球一样能够滚动，因此将`Dynamic Friction`（动态摩擦力）和`Static Friction`（静摩擦力）值保留为 1（以防止滚动时的滑动），并将`Friction
    Combine`（摩擦力组合）值保留为`Maximum`（最大值）。然而，与球不同，保龄球瓶应该非常有弹性，因此将`Bounciness`（弹性）设置为 0.5，并将`Bounce
    Combine`（弹性组合）值设置为`Average`（平均值）（考虑到与之碰撞的物体的弹性）。最后，将`Pin PhysicMaterial`指定给`Pin`预制件。在项目视图中选择`Pin`预制件；然后在检查器视图中，点击碰撞体组件`PhysicMaterial`字段右侧的圆圈，并从弹出选择器中选取`Pin
    PhysicMaterial`（图 7-8）。


    ![A310332_2_En_7_Fig8_HTML.jpg](img/A310332_2_En_7_Fig8_HTML.jpg)


    图 7-8. 将球瓶物理材质指定给球瓶预制件


    现在，当你点击播放并将球滚向球瓶时，球瓶会被撞倒，并像图 7-9 那样弹跳滚动起来！


    ![A310332_2_En_7_Fig9_HTML.jpg](img/A310332_2_En_7_Fig9_HTML.jpg)


    图 7-9. 与所有具有 `Rigidbody` 组件的球瓶碰撞


    # 使用摄像机跟随


    你会注意到，球撞击球瓶的视角可能比较远，玩家可能不太容易看清碰撞效果。因此，你需要做的是让摄像机跟随保龄球。为此，你需要创建另一个脚本。在`Script`文件夹中，创建一个新的
    C# 脚本，并将其命名为`CameraFollow`，内容如代码清单 7-1 所示。


    ```

    using UnityEngine;

    using System.Collections;

    public class CameraController : MonoBehaviour {

    public GameObject player;

    private Vector3 offset;

    void Start ()

    {

    offset = transform.position - player.transform.position;

    }

    ```


    代码清单 7-1. CameraFollow 脚本


    你可能需要调整摄像机的起始位置，使其起始位置刚好位于球的后上方。


    # 持续游玩


    每次想要测试一次滚球都得停止游戏再点击播放，这相当烦人。而且，当球滚出地面时，你只能眼睁睁看着球无限下落。所以，让我们实现当球滚到地板边缘时，球和球瓶能够重置。


    ## 返回球的初始状态


    首先，你需要一个能够将`GameObject`恢复到其初始位置和旋转（不能忘记旋转——如果一个球瓶被击倒，你需要将其重置为初始的直立方向）的脚本。创建一个新的
    JavaScript 脚本，将其命名为`FuguReset`，并添加代码清单 7-2 的内容。


    ```

    // 将游戏对象恢复到其原始位置和旋转

    #pragma strict

    private var startPos:Vector3;

    private var startRot:Vector3;

    function Awake() {

    // 保存此游戏对象的初始位置和旋转

    startPos = transform.localPosition;

    startRot = transform.localEulerAngles;

    }

    function ResetPosition() {

    // 回到初始位置

    transform.localPosition = startPos;

    transform.localEulerAngles = startRot;

    // 确保停止所有物理运动

    if (GetComponent.() != null) {

    GetComponent.().velocity = Vector3.zero;

    GetComponent.().angularVelocity = Vector3.zero;

    }

    }

    ```


    代码清单 7-2. FuguReset.js 脚本恢复游戏对象的位置


    `Awake`函数将游戏对象的位置和旋转保存在几个变量中，而`ResetPosition`函数则将游戏对象恢复到这些设置。`ResetPosition`还会检查游戏对象是否具有`Rigidbody`组件。如果有，该函数会停止其移动或旋转。`FuguReset`脚本应该附加到每一个在重新启动游戏时需要重置其位置（以及可能的旋转）的`GameObject`上。这些对象包括球、球瓶和`Main
    Camera`（主摄像机）。首先，将`FuguReset`脚本拖拽到层级视图中的`Main Camera`和`Ball`游戏对象上。然后，在项目视图中选择`Pin`预制件，并在检查器视图中点击`Add
    Component`按钮以添加`FuguReset`脚本（图 7-10）。


    ![A310332_2_En_7_Fig10_HTML.jpg](img/A310332_2_En_7_Fig10_HTML.jpg)


    图 7-10. 将 FuguReset 脚本附加到球瓶预制件上


    `Ball`、`Pin`和`Main Camera`游戏对象现在会在游戏启动时记录它们的原始位置和旋转，并且你有一个可供调用的`ResetPosition`函数，该函数会将这些游戏对象恢复到那些原始位置和旋转。

