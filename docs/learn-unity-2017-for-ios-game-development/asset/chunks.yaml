  trans: '

    # 设置启动画面


    所有 iOS 应用在启动时都会显示一个静态的“启动”画面。与默认的应用图标类似，许多 Unity 构建的应用中的启动画面会显示 Unity 徽标（图 12-7）。


    ![A310332_2_En_12_Fig7_HTML.jpg](img/A310332_2_En_12_Fig7_HTML.jpg)

    图 12-7. 默认的 Unity 启动画面


    除非你拥有 Unity 的 Plus 或 Pro 版本，否则无法更改 Unity 的启动画面。不过，如果你使用个人版，可以添加一个启动图像。启动图像折叠菜单位于
    iOS 设置中图标折叠菜单的下方，与图标选择一样，它提供了多个分辨率的插槽，适用于各种 iOS 屏幕，同时也支持竖屏和横屏方向（图 12-8）：


    ![A310332_2_En_12_Fig8_HTML.jpg](img/A310332_2_En_12_Fig8_HTML.jpg)

    图 12-8. 适用于不同屏幕分辨率和方向的启动画面


    - 移动设备启动画面：320 × 480，适用于第四代之前的任何 iPod touch 或 iPhone（即 iPhone 4 之前的产品）

    - iPhone 3.5 英寸/Retina：640 × 960，适用于 iPhone 4、iPhone 4S 和第四代 iPod touch 的 Retina
    显示屏

    - iPhone 4 英寸/Retina：640 × 1136，适用于 iPhone 5 和第五代 iPod touch

    - iPhone 4.7 英寸/Retina：750 × 1334，适用于 iPhone 6

    - iPhone 5.5 英寸/Retina：1242 × 2208，适用于 iPhone 6 Plus 及更新机型

    - iPhone 5.5 英寸横屏/Retina：2208 × 1242，适用于 iPhone 6 Plus 及更新机型

    - iPad 竖屏：768 × 1024，适用于初代 iPad 和 iPad 2

    - iPad 横屏：1024 × 768，适用于初代 iPad 和 iPad 2

    - iPad 竖屏/Retina：1536 × 2048，适用于新 iPad（iPad 3 及更新机型）的 Retina 显示屏

    - iPad 横屏/Retina：2048 × 1536，适用于新 iPad（iPad 3 及更新机型）的 Retina 显示屏


    Unity 并没有一个能自动调整大小以适配所有启动分辨率的默认启动画面，因此你需要为游戏将使用的分辨率和方向填充启动画面框。由于在“分辨率和演示”设置中只选择了竖屏方向，因此只需要分配竖屏启动画面。与图标类似，启动画面可以是任何纹理，Unity
    会根据需要缩放它们，但使用已经是目标大小的纹理可以获得最佳效果。你应该使用适合你公司或游戏的内容。


    注意


    苹果公司建议启动画面看起来像游戏的实际画面，但通常做法是只显示公司徽标。就我个人而言，我认为显示一个像无响应的游戏画面一样的屏幕会让人感到困惑。


    将每个启动画面纹理从 Textures 文件夹拖到播放器设置中匹配的启动画面框中（图 12-8），即将 `Fugu320×480` 拖入 `Mobile Splash
    Screen`，将 `Fugu640×960` 拖入 `iPhone 3.5"/Retina`，并将 `Fugu1536×2048` 拖入 `High Res.
    iPad Portrait`。`iPhone 4"/Retina` 选项需要一个纹理，因此将最接近的纹理 `Fugu640×9` 拖入其中。而 `Fugu1536×2048`
    可用于 `iPad Portrait`。


    # 创建第二个启动画面


    虽然你在 Unity iOS Basic 中无法更改内置的启动画面，但可以制作一个紧接着内置启动画面显示的启动画面。你只需创建一个场景，在屏幕上显示启动纹理几秒钟，然后加载第一个游戏场景。如果你希望拥有多个启动画面，这在
    Unity Plus 和 Pro 版本中也同样有用。例如，在 HyperBowl 中，我通过内置启动画面显示了一些 HyperBowl 艺术作品，然后在第二个启动画面中显示了我的
    Fugu Games 徽标。


    ## 创建启动场景


    从 `File` 菜单调用 `New Scene` 命令来创建一个新的空场景。将其保存为 `Splash`。打开 `Build Settings` 窗口，点击
    `Add Open Scenes` 将新场景添加到你当前的构建中。它会出现在场景列表的底部，因此将其拖到顶部。此时其场景索引应显示为 0，表示它是第一个被加载的场景（图
    12-9）。


    ![A310332_2_En_12_Fig9_HTML.jpg](img/A310332_2_En_12_Fig9_HTML.jpg)

    图 12-9. 添加了启动场景后的构建设置


    ## 创建启动画面


    显示全屏纹理的最简单方法是使用 UI 元素（或用户交互）。在启动场景中，进入 `GameObject` 菜单，选择 `UI`，然后选择 `Raw Image`（图
    12-10）。


    ![A310332_2_En_12_Fig10_HTML.jpg](img/A310332_2_En_12_Fig10_HTML.jpg)

    图 12-10. 创建一个 UI 图像


    将生成的 `GameObject` 重命名为 `Screen`，并在 Inspector 视图中检查它。新创建的图像需要居中显示在屏幕上（图 12-11）。与
    `GUITexture` 不同，`RawImage` 使用归一化屏幕坐标：`x` 和 `y` 的范围从 0 到 1，其中 `0,0` 是屏幕的左上角，`1,1`
    是右下角，因此将 `x` 和 `y` 设置为 `0.5` 表示纹理在屏幕上居中显示。


    ![A310332_2_En_12_Fig11_HTML.jpg](img/A310332_2_En_12_Fig11_HTML.jpg)

    图 12-11. 默认的 GUITexture


    你已经将图像定位在 `0,0,0`，并使其大小为 `400 × 400`。将 Textures 文件夹中的某个纹理从 Project 视图拖到 `RawImage`
    组件的 Texture 字段中。为了让纹理铺满整个屏幕，将缩放比例改为 `1,1,1`（图 12-12）。


    ![A310332_2_En_12_Fig12_HTML.jpg](img/A310332_2_En_12_Fig12_HTML.jpg)

    图 12-12. 全屏 UI


    现在，如果你运行游戏，将会在屏幕上看到启动纹理。当在设备或 iOS 模拟器上运行时，启动纹理将会在内置启动画面之后出现（图 12-13）。


    ![A310332_2_En_12_Fig13_HTML.jpg](img/A310332_2_En_12_Fig13_HTML.jpg)

    图 12-13. 第二级启动画面

    '
- fmt: '### Load the Next Scene


    As a splash screen, this scene should stay up for just a few seconds and then
    begin to load the game scene. Like any real game level, this scene could use a
    main logic script, so create a new JavaScript script, name it `FuguSplash`, and
    add the contents of Listing [12-5](#A310332_2_En_12_Chapter.html#Par74).


    ```

    #pragma strict

    var waitTime:float=2; // in seconds

    var level:String; // scene name to load

    function Start() {

    yield WaitForSeconds(waitTime);

    Application.LoadLevel(level);

    }

    Listing 12-5.

    Wait-and-Load Code in FuguSplash.js

    ```


    There are two public variables that can be customized in the Inspector view: the
    time (in seconds) to wait before loading the next scene and the name of the scene
    to load. The `Start` function is really simple; it waits for the built-in coroutine
    `WaitForSeconds` to finish, passing in the specified wait time, and then it calls
    `Application.LoadLevel` to load the level you specified. In the process, the current
    scene will be unloaded so the splash screen will disappear.


    Let’s add the script to the splash scene. Create an empty `GameObject`, name it
    `Splash`, and attach the `FuguSplash` script to it. Then in the Inspector view,
    enter the name of the bowling scene in the `Level` field (Figure [12-14](#A310332_2_En_12_Chapter.html#Fig14)).
    Now if you run the game, either in the Editor as in an iOS build, the splash screen
    will appear for a couple of seconds, and then the bowling scene will appear.


    ![A310332_2_En_12_Fig14_HTML.jpg](Images/A310332_2_En_12_Fig14_HTML.jpg)


    Figure 12-14. The `FuguSplash` script added to the splash scene


    Just a few words about `WaitForSeconds`; it is convenient, but you could have
    implemented your own version. Listing [12-6](#A310332_2_En_12_Chapter.html#Par78)
    shows a hypothetical implementation.


    ```

    function WaitForSeconds(waitTime:float) {

    var startTime:float = Time.time;

    while (waitTime > Time.time-startTime) {

    yield;

    }

    }

    Listing 12-6.

    Implementation of WaitForSeconds

    ```


    Note that the specified wait time is game time, not real-world time, so `WaitForSeconds`
    isn’t useful, for example, while the game is paused and game time is stopped.
    But if you need to wait in real seconds, you can use the hypothetical implementation
    of `WaitForSeconds` and replace `Time.time` with `Time.realtimeSinceStartup`,
    which returns the time in real-world seconds since the game was started (Listing
    [12-7](#A310332_2_En_12_Chapter.html#Par80)).


    ```

    function WaitForSecondsRealtime(waitTime:float) {

    var startTime:float = Time.realtimeSinceStartup;

    while (waitTime > Time.realtimeSinceStartup-startTime) {

    yield;

    }

    }

    Listing 12-7.

    A Real-Time Version of WaitForSeconds

    ```


    ### Display the Activity Indicator


    When something is taking a while, it’s nice to have some kind of loading indicator.
    For the initial scene load, there’s a convenient way to display the iOS spinner
    that you often see in apps as an activity indicator. You can enable this by choosing
    one of the activity indicator styles for `Show Loading Indicator` at the bottom
    of the `Resolution and Presentation` foldout in the player settings (Figure [12-15](#A310332_2_En_12_Chapter.html#Fig15)).
    Given the splash screen is providing a mostly white background, `Gray` is the
    best style (the other styles are white).


    ![A310332_2_En_12_Fig15_HTML.jpg](Images/A310332_2_En_12_Fig15_HTML.jpg)


    Figure 12-15. Player settings with `Gray` selected for the `Show Loading Indicator`


    Now when you run the game in an iOS build, you’ll see the `Gray` activity indicator
    spinning on the built-in splash screen.


    ### Script the Activity Indicator


    It would be nice to use the activity indicator elsewhere, especially when loading
    other levels. Fortunately, Unity has a scripting interface for the activity indicator,
    in the form of static functions in the `Handheld` class. You just need a script
    that calls those functions to start and stop the activity indicator. Create a
    new JavaScript called `FuguSpinner` and add the contents of Listing [12-8](#A310332_2_En_12_Chapter.html#Par84)
    to the script.


    ```

    #pragma strict

    #if UNITY_IPHONE

    function Start() {

    DontDestroyOnLoad(this.gameObject);

    Handheld.SetActivityIndicatorStyle(iOSActivityIndicatorStyle.WhiteLarge);

    Handheld.StartActivityIndicator();

    }

    function OnLevelWasLoaded() {

    Handheld.StopActivityIndicator();

    Destroy(gameObject);

    }

    #endif

    Listing 12-8.

    Starting and Stopping an Activity Indicator in FuguSpinner.js

    ```


    In the `Start` callback, the call to `Handheld.SetActivityIndicatorStyle` specifies
    the appearance of the activity indicator. The available options, represented by
    the `iOSActivityIndicatorStyle` enum, match the `Loading Indicator` options available
    in the player settings. You’ll choose `iOSActivityIndicatorStyle.WhiteLarge` since
    you know the secondary splash screen has a mostly black background.


    The call to `Handheld.StartActivityIndicator` makes the activity indicator visible
    in the center of the screen. The Unity Script Reference documentation for `Handheld.StartActivityIndicator`
    says that the activity indicator will be activated after the current frame, so
    you need to yield at least a frame before calling `Application.LoadLevel`. Otherwise,
    the indicator won’t appear until after the new level is loaded, which defeats
    the purpose of activating the indicator in the first place. You don’t have to
    worry about that here because you know the `FuguSplash` script is yielding for
    some number of seconds before loading the next scene.


    However, the activity indicator keeps going even after the new scene is loaded
    by `FuguSplash`. To stop the activity indicator after the scene has finished loading,
    this script has to survive the scene load, which is why `DontDestroyOnLoad` is
    called at the beginning of the `Start` function, passing it the `GameObject` this
    script is attached to. This ensures the `GameObject`, and thus this script, survives
    when the next scene is loaded. Because the `GameObject` survives the scene load,
    you can be assured the `MonoBehaviour` callback `OnLevelWasLoaded` is called after
    the new scene has finished loading. This is a perfect place to turn off the activity
    indicator with a call to `Handheld.StopActivityIndicator`. At this point, the
    script and the `GameObject` it’s attached to aren’t needed anymore, so `Destroy`
    is called on the `GameObject`.


    **Tip:** It’s a good practice to destroy objects when you don’t need them anymore.
    Besides freeing up space, you want to avoid the worst case where you loop back
    into the scene where the object was originally created and then you end up with
    two versions of the same object!


    Note that `DontDestroyOnLoad` and `Destroy` are both static functions in the `Object`
    class. Just as you called `Instantiate` in Chapter [7](../Text/A310332_2_En_7_Chapter.html)
    instead of calling `Object.Destroy`, for example (or `UnityEngine.Object.Destroy`
    to avoid the name clash with `System.Object` class in .NET), here you’re implicitly
    calling `this.Destroy`, which works because `this` is an `Object`.


    Attach the `FuguSpinner` script to a new `GameObject` in the scene, called `Spinner`.
    Now when you perform a Build and Run operation on a device, the activity indicator
    appears in the center of the splash image and disappears after the next scene
    has loaded (Figure [12-16](#A310332_2_En_12_Chapter.html#Fig16)).


    ![A310332_2_En_12_Fig16_HTML.jpg](Images/A310332_2_En_12_Fig16_HTML.jpg)


    Figure 12-16. Secondary splash screen with an activity indicator


    ### Explore Further


    Now your bowling game for iOS looks like a real app! It has an icon, a splash
    screen (or two), and an activity indicator spinning away on the splash screen.
    Also, it runs in portrait orientation, and the graphics scale to fit the screen
    including the UnityGUI scoreboard and pause menu. The menu is even automatically
    functional in iOS, with its buttons responding to taps on the screen. You can’t
    quite say that about the actual gameplay, but you’ll implement touchscreen-based
    game controls in the next chapter.'
  raw: '### Load the Next Scene


    As a splash screen, this scene should stay up for just a few seconds and then
    begin to load the game scene. Like any real game level, this scene could use a
    main logic script, so create a new JavaScript script, name it FuguSplash, and
    add the contents of Listing [12-5](#A310332_2_En_12_Chapter.html#Par74).


    ```

    #pragma strict

    var waitTime:float=2; // in seconds

    var level:String; // scene name to load

    function Start() {

    yield WaitForSeconds(waitTime);

    Application.LoadLevel(level);

    }

    Listing 12-5.

    Wait-and-Load Code in FuguSplash.js

    ```


    There are two public variables that can be customized in the Inspector view: the
    time (in seconds) to wait before loading the next scene and the name of the scene
    to load. The Start function is really simple; it waits for the built-in coroutine
    WaitForSeconds to finish, passing in the specified wait time, and then it calls
    Application.LoadLevel to load the level you specified. In the process, the current
    scene will be unloaded so the splash screen will disappear.


    Let’s add the script to the splash scene. Create an empty GameObject, name it
    Splash, and attach the FuguSplash script to it. Then in the Inspector view, enter
    the name of the bowling scene in the Level field (Figure [12-14](#A310332_2_En_12_Chapter.html#Fig14)).
    Now if you run the game, either in the Editor as in an iOS build, the splash screen
    will appear for a couple of seconds, and then the bowling scene will appear.


    ![A310332_2_En_12_Fig14_HTML.jpg](Images/A310332_2_En_12_Fig14_HTML.jpg)


    Figure 12-14.


    The FuguSplash script added to the splash scene


    Just a few words about WaitForSeconds; it is convenient, but you could have implemented
    your own version. Listing [12-6](#A310332_2_En_12_Chapter.html#Par78) shows a
    hypothetical implementation.


    ```

    function WaitForSeconds(waitTime:float) {

    var startTime:float = Time.time;

    while (waitTime > Time.time-startTime) {

    yield;

    }

    }

    Listing 12-6.

    Implementation of WaitForSeconds

    ```


    Note that the specified wait time is game time, not real-world time, so WaitForSeconds
    isn’t useful, for example, while the game is paused and game time is stopped.
    But if you need to wait in real seconds, you can use the hypothetical implementation
    of WaitForSeconds and replace Time.time with Time.realtimeSinceStartup, which
    returns the time in real-world seconds since the game was started (Listing [12-7](#A310332_2_En_12_Chapter.html#Par80)).


    ```

    function WaitForSecondsRealtime(waitTime:float) {

    var startTime:float = Time.realtimeSinceStartup;

    while (waitTime > Time.realtimeSinceStartup-startTime) {

    yield;

    }

    }

    Listing 12-7.

    A Real-Time Version of WaitForSeconds

    ```


    ## Display the Activity Indicator


    When something is taking a while, it’s nice to have some kind of loading indicator.
    For the initial scene load, there’s a convenient way to display the iOS spinner
    that you often see in apps as an activity indicator. You can enable this by choosing
    one of the activity indicator styles for Show Loading Indicator at the bottom
    of the Resolution and Presentation foldout in the player settings (Figure [12-15](#A310332_2_En_12_Chapter.html#Fig15)).
    Given the splash screen is providing a mostly white background, Gray is the best
    style (the other styles are white).


    ![A310332_2_En_12_Fig15_HTML.jpg](Images/A310332_2_En_12_Fig15_HTML.jpg)


    Figure 12-15.


    Player settings with Gray selected for the Show Loading Indicator


    Now when you run the game in an iOS build, you’ll see the Gray activity indicator
    spinning on the built-in splash screen.


    ## Script the Activity Indicator


    It would be nice to use the activity indicator elsewhere, especially when loading
    other levels. Fortunately, Unity has a scripting interface for the activity indicator,
    in the form of static functions in the Handheld class. You just need a script
    that calls those functions to start and stop the activity indicator. Create a
    new JavaScript called FuguSpinner and add the contents of Listing [12-8](#A310332_2_En_12_Chapter.html#Par84)
    to the script.


    ```

    #pragma strict

    #if UNITY_IPHONE

    function Start() {

    DontDestroyOnLoad(this.gameObject);

    Handheld.SetActivityIndicatorStyle(iOSActivityIndicatorStyle.WhiteLarge);

    Handheld.StartActivityIndicator();

    }

    function OnLevelWasLoaded() {

    Handheld.StopActivityIndicator();

    Destroy(gameObject);

    }

    #endif

    Listing 12-8.

    Starting and Stopping an Activity Indicator in FuguSpinner.js

    ```


    In the Start callback, the call to Handheld.SetActivityIndicatorStyle specifies
    the appearance of the activity indicator. The available options, represented by
    the iOSActivityIndicatorStyle enum, match the Loading Indicator options available
    in the player settings. You’ll choose iOSActivityIndicatorStyle.WhiteLarge since
    you know the secondary splash screen has a mostly black background.


    The call to Handheld.StartActivityIndicator makes the activity indicator visible
    in the center of the screen. The Unity Script Reference documentation for Handheld.StartActivityIndicator
    says that the activity indicator will be activated after the current frame, so
    you need to yield at least a frame before calling Application.LoadLevel. Otherwise,
    the indicator won’t appear until after the new level is loaded, which defeats
    the purpose of activating the indicator in the first place. You don’t have to
    worry about that here because you know the FuguSplash script is yielding for some
    number of seconds before loading the next scene.


    However, the activity indicator keeps going even after the new scene is loaded
    by FuguSplash. To stop the activity indicator after the scene has finished loading,
    this script has to survive the scene load, which is why DontDestroyOnLoad is called
    at the beginning of the Start function, passing it the GameObject this script
    is attached to. This ensures the GameObject, and thus this script, survives when
    the next scene is loaded. Because the GameObject survives the scene load, you
    can be assured the MonoBehaviour callback OnLevelWasLoaded is called after the
    new scene has finished loading. This is a perfect place to turn off the activity
    indicator with a call to Handheld.StopActivityIndicator. At this point, the script
    and the GameObject it’s attached to aren’t needed anymore, so Destroy is called
    on the GameObject.


    Tip


    It’s a good practice to destroy objects when you don’t need them anymore. Besides
    freeing up space, you want to avoid the worst case where you loop back into the
    scene where the object was originally created and then you end up with two versions
    of the same object!


    Note that DontDestroyOnLoad and Destroy are both static functions in the Object
    class. Just as you called Instantiate in Chapter [7](../Text/A310332_2_En_7_Chapter.html)
    instead of calling Object.Destroy, for example (or UnityEngine.Object.Destroy
    to avoid the name clash with System.Object class in .NET), here you’re implicitly
    calling this Destroy, which works because this is an Object.


    Attach the FuguSpinner script to a new GameObject in the scene, called Spinner.
    Now when you perform a Build and Run operation on a device, the activity indicator
    appears in the center of the splash image and disappears after the next scene
    has loaded (Figure [12-16](#A310332_2_En_12_Chapter.html#Fig16)).


    ![A310332_2_En_12_Fig16_HTML.jpg](Images/A310332_2_En_12_Fig16_HTML.jpg)


    Figure 12-16.


    Secondary splash screen with an activity indicator


    ## Explore Further


    Now your bowling game for iOS looks like a real app! It has an icon, a splash
    screen (or two), and an activity indicator spinning away on the splash screen.
    Also, it runs in portrait orientation, and the graphics scale to fit the screen
    including the UnityGUI scoreboard and pause menu. The menu is even automatically
    functional in iOS, with its buttons responding to taps on the screen. You can’t
    quite say that about the actual gameplay, but you’ll implement touchscreen-based
    game controls in the next chapter.'
  trans: '

    ### 加载下一个场景


    作为启动屏，此场景应停留几秒钟，然后开始加载游戏场景。与任何真实游戏关卡一样，此场景可以使用一个主逻辑脚本，因此创建一个新的 JavaScript 脚本，命名为
    `FuguSplash`，并添加清单 12-5 中的内容。


    ```

    #pragma strict

    var waitTime:float=2; // 以秒为单位

    var level:String; // 要加载的场景名称

    function Start() {

    yield WaitForSeconds(waitTime);

    Application.LoadLevel(level);

    }

    清单 12-5.

    FuguSplash.js 中的等待与加载代码

    ```


    在**检查器**视图中可以自定义两个公共变量：加载下一个场景前的等待时间（以秒为单位）以及要加载的场景名称。`Start` 函数非常简单；它等待内置协程 `WaitForSeconds`
    完成，传入指定的等待时间，然后调用 `Application.LoadLevel` 加载指定的关卡。在此过程中，当前场景将被卸载，因此启动屏将消失。


    让我们将脚本添加到启动场景中。创建一个空的 `GameObject`，将其命名为 `Splash`，并将 `FuguSplash` 脚本附加到它上面。然后在**检查器**视图的
    `Level` 字段中输入保龄球场景的名称（图 12-14）。现在，如果你运行游戏（无论是在编辑器中还是在 iOS 构建中），启动屏将显示几秒钟，然后保龄球场景会出现。


    ![A310332_2_En_12_Fig14_HTML.jpg](img/A310332_2_En_12_Fig14_HTML.jpg)


    图 12-14. `FuguSplash` 脚本已添加到启动场景


    关于 `WaitForSeconds` 这里简单说明一下；它很方便，但你也可能实现自己的版本。清单 12-6 展示了一个假设的实现。


    ```

    function WaitForSeconds(waitTime:float) {

    var startTime:float = Time.time;

    while (waitTime > Time.time-startTime) {

    yield;

    }

    }

    清单 12-6.

    WaitForSeconds 的实现

    ```


    请注意，指定的等待时间是游戏时间，而非真实世界时间，因此，例如在游戏暂停且游戏时间停止时，`WaitForSeconds` 就没什么用了。但如果你需要按真实秒数等待，可以使用
    `WaitForSeconds` 的假设实现，并将 `Time.time` 替换为 `Time.realtimeSinceStartup`，后者返回自游戏启动以来经过的真实世界秒数（清单
    12-7）。


    ```

    function WaitForSecondsRealtime(waitTime:float) {

    var startTime:float = Time.realtimeSinceStartup;

    while (waitTime > Time.realtimeSinceStartup-startTime) {

    yield;

    }

    }

    清单 12-7.

    WaitForSeconds 的实时版本

    ```


    ### 显示活动指示器


    当某些操作需要一段时间时，最好能有某种加载指示器。对于初始场景加载，有一种便捷的方式可以显示你在应用中经常见到的 iOS 旋转指示器，作为活动指示器。你可以在
    **Player Settings**（玩家设置）中 `Resolution and Presentation` 折叠面板底部的 `Show Loading
    Indicator` 处选择一种活动指示器样式来启用它（图 12-15）。鉴于启动屏提供了大部分白色背景，`Gray`（灰色）是最佳样式（其他样式为白色）。


    ![A310332_2_En_12_Fig15_HTML.jpg](img/A310332_2_En_12_Fig15_HTML.jpg)


    图 12-15. 在 `Show Loading Indicator` 处选择了 `Gray` 的 Player Settings


    现在，当你在 iOS 构建版本中运行游戏时，你会看到 `Gray` 活动指示器在内置启动屏上旋转。


    ### 为活动指示器编写脚本


    如果能将活动指示器用于其他情况（尤其是在加载其他关卡时）会很好。幸运的是，Unity 为活动指示器提供了脚本接口，形式为 `Handheld` 类中的静态函数。你只需要一个脚本来调用这些函数以启动和停止活动指示器。创建一个名为
    `FuguSpinner` 的新 JavaScript，并将清单 12-8 的内容添加到脚本中。


    ```

    #pragma strict

    #if UNITY_IPHONE

    function Start() {

    DontDestroyOnLoad(this.gameObject);

    Handheld.SetActivityIndicatorStyle(iOSActivityIndicatorStyle.WhiteLarge);

    Handheld.StartActivityIndicator();

    }

    function OnLevelWasLoaded() {

    Handheld.StopActivityIndicator();

    Destroy(gameObject);

    }

    #endif

    清单 12-8.

    在 FuguSpinner.js 中启动和停止活动指示器

    ```


    在 `Start` 回调中，对 `Handheld.SetActivityIndicatorStyle` 的调用指定了活动指示器的外观。可用的选项由 `iOSActivityIndicatorStyle`
    枚举表示，与 Player Settings 中可用的 `Loading Indicator` 选项相匹配。你将选择 `iOSActivityIndicatorStyle.WhiteLarge`，因为你知道二级启动屏的背景大部分是黑色的。


    对 `Handheld.StartActivityIndicator` 的调用使活动指示器在屏幕中央可见。关于 `Handheld.StartActivityIndicator`
    的 Unity 脚本参考文档指出，活动指示器将在当前帧之后激活，因此你需要在调用 `Application.LoadLevel` 之前至少暂停一帧。否则，指示器要等到新关卡加载后才会出现，这违背了首先激活指示器的初衷。这里你无需担心这一点，因为你知道
    `FuguSplash` 脚本在加载下一个场景之前会暂停若干秒。


    然而，即使在 `FuguSplash` 加载新场景后，活动指示器仍会继续旋转。为了在场景加载完成后停止活动指示器，此脚本必须在场景加载期间保持存在，这就是为什么在
    `Start` 函数开始时调用了 `DontDestroyOnLoad`，并传入附加此脚本的 `GameObject`。这确保了 `GameObject`（以及此脚本）在加载下一个场景时保持存在。由于
    `GameObject` 在场景加载期间保持存在，你可以确信在新场景加载完成后会调用 `MonoBehaviour` 回调 `OnLevelWasLoaded`。这是通过调用
    `Handheld.StopActivityIndicator` 关闭活动指示器的完美位置。此时，脚本及其附加的 `GameObject` 不再需要，因此在
    `GameObject` 上调用了 `Destroy`。


    **提示：** 在不再需要对象时销毁它们是一个好习惯。除了释放空间，你还要避免最坏的情况：当你循环回到最初创建对象的场景时，最终会得到该对象的两个版本！


    请注意，`DontDestroyOnLoad` 和 `Destroy` 都是 `Object` 类中的静态函数。就像你在第 7 章中调用 `Instantiate`
    而不是 `Object.Destroy` 一样（或者为了避开与 .NET 中 `System.Object` 类的名称冲突，使用 `UnityEngine.Object.Destroy`），这里你隐式调用了
    `this.Destroy`，这之所以有效，是因为 `this` 是一个 `Object`。


    将 `FuguSpinner` 脚本附加到场景中一个名为 `Spinner` 的新 `GameObject` 上。现在，当你在设备上执行“构建并运行”操作时，活动指示器会出现在启动画面的中央，并在下一个场景加载后消失（图
    12-16）。


    ![A310332_2_En_12_Fig16_HTML.jpg](img/A310332_2_En_12_Fig16_HTML.jpg)


    图 12-16. 带有活动指示器的二级启动屏


    ### 进一步探索


    现在你的 iOS 保龄球游戏看起来就像一个真正的应用了！它有一个图标、一个（或两个）启动屏，以及一个在启动屏上旋转的活动指示器。此外，它可以在竖屏方向运行，并且图形会缩放以适应屏幕，包括
    UnityGUI 记分板和暂停菜单。该菜单在 iOS 中甚至可以自动运行，其按钮会响应屏幕上的点击。虽然还不能完全这么说实际游戏操作，但你将在下一章中实现基于触摸屏的游戏控制。

    '
- fmt: '### Reference Manual


    Once again, you’ve spent some time in the player settings (a recurring theme now
    that you’re making iOS builds), so the Reference Manual documentation on the player
    settings is worth a review.


    You used just one new component in this chapter, a `GUITexture` for your splash
    screen image. `GUITexture` and its parent class `GUIElement` have no relation
    to UnityGUI (in fact, `GUITexture` and its sibling `GUIText` were the closest
    things to user interface elements before UnityGUI arrived).


    This chapter was devoted largely to icon and splash screen images, which should
    all be imported using the GUI preset import settings, which are documented for
    `Texture2D` in the “Asset Components” section.


    ### Scripting Reference


    The one new UnityGUI feature introduced in this chapter was the `matrix` variable
    in the `GUI` class. At the time of this writing, the Scripting Reference page
    for that variable is nearly blank, but the `GUIUtility` class has some better-documented
    functions, including `ScaleAroundPivot`, which can be used as an alternative to
    setting `GUI.matrix` (in fact, it is a helper function that sets `GUI.matrix`
    internally).


    You used only the `Matrix4x4.TRS` constructor, but the Scripting Reference documentation
    on `Matrix4x4` is not bad, explaining how matrices are used in Unity and listing
    many class functions that will be useful if you ever have to start messing around
    with matrices.


    The yield instruction `WaitForSeconds` was already introduced in Chapter [8](../Text/A310332_2_En_8_Chapter.html)
    for the game-over state, and it turns out to be convenient for displaying a splash
    screen a certain number of seconds. You took this opportunity to explore hypothetical
    implementations of `WaitForSeconds` and compare the static `Time` variables `Time.time`
    and `Time.realTimeSinceStartup`. It’s an important distinction when the pause
    menu is up and game time is suspended.


    You called the static `Application` function `LoadLevel` to transition from the
    splash scene to the bowling scene, but you also could have called an asynchronous
    version of the function, `Application.LoadLevelAsync`. As an asynchronous function,
    it doesn’t suspend Unity while it’s loading a new scene, so, really, you could
    have anything happen in the splash scene while waiting for the new scene to finish
    loading.


    As demonstrated with your use of the activity indicator functions in the `Handheld`
    class, you can make Objects survive across scene loads by calling `DontDestroyOnLoad`
    on them, and you use `Destroy` on them when they’re not needed anymore. These
    are both static functions in the `Object` class, which is always worth reading
    up on since it’s the parent class of everything that can be in a scene.


    To display and hide the activity indicator, you called the `StartActivityIndicator`
    and `StopActivityIndicator` functions in the `Handheld` class. See the documentation
    on the activity indicator functions about the necessity to `yield` before performing
    a scene load. Use the `iOSActivityIndicatorStyle` enumeration for a list of the
    available activity indicator styles.


    The `Handheld` class is worth a looking over, as it contains all the scriptable
    Unity mobile features (except those specific to iOS). For example, the `Handheld`
    class has a static `PlayFullScreenMovie` function that can play a movie from local
    storage or can stream it from a web site, which is another possibility for a cool-looking
    splash scene. The Scripting Reference page for that function has details on the
    supported video formats and how to control the movie player (based, at the time
    of this writing, on the native iOS movie player, `MPMoviePlayerController`).


    ### iOS Developer Library


    As you explore Unity iOS features, more and more of the documentation in the iOS
    Developer Library is relevant. Remember, that documentation is available both
    on the Apple developer site ( [`http://developer.apple.com/`](http://developer.apple.com/)
    ) and from the Xcode Organizer window.


    One document worth reading in its entirely, found in the “User Experience” topic
    of the iOS Developer Library, is Apple’s iOS Human Interface Guidelines. The original
    guidelines dating back to the original Mac were the gold standard in user interface
    best practices. Since then, the guidelines have been split into Mac and iOS versions,
    but you should read the iOS version if only to avoid app rejections. Related to
    this chapter, the “Custom Icon and Image Creation Guidelines” section lists requirements
    and recommendations for creating app icons and splash screens (known as launch
    images in Apple’s terminology).


    Many Unity classes that are mobile-specific or iOS-specific will have an Objective-C
    counterpart. For example, the activity indicator controlled by Unity’s `Handheld`
    class is accessed in Objective-C via the `UIActivityIndicatorview` class, also
    found in the “User Experience” topic in the “Windows and Views” section.


    ### Asset Store


    The Smart Scene Changer from Ciitt, available free on the Unity Asset Store, provides
    more sophisticated introductory screen behavior than what was described in this
    chapter, including fading the screen in and out and using multiple screens. I
    use the Transitions Manager ( [`https://www.assetstore.unity3d.com/en/#!/content/80061`](https://www.assetstore.unity3d.com/en/#!/content/80061)
    ) in all my apps.


    ### Books


    Josh Clark’s *Tapworthy: Designing Great Apps* is the book that convinced me to
    eschew automatic icon gloss and always select Prerendered Icon in the Unity player
    settings. It’s also a good treatment of app design in general.


    There are plenty of textbooks on linear algebra (and even a hefty “matrix” article
    on [`http://wikipedia.org/`](http://wikipedia.org/) ), but any computer graphics
    book will have a primer on the matrix math. For example, *Real-time Rendering*
    ( [`http://realtimerendering.com/`](http://realtimerendering.com/) ) has an appendix
    called “Some Linear Algebra.”


    # 13. Handling Device Input


    Although your bowling game is up and running on iOS, it’s not quite in a playable
    state because you don’t have any working player controls. That brings me to the
    issue of input handling, which is perhaps the most obvious difference between
    desktop and mobile games.


    Instead of reading the mouse or keyboard, an iOS game has to use one of its device
    sensors, typically the touchscreen (tapping and swiping) or accelerometer (shaking
    and tilting). You’ll opt for touchscreen input to control the bowling ball in
    this chapter, but you’ll do some shake detection with the accelerometer and play
    with the device camera a little bit, too.


    The project for this chapter on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    has the script changes introduced in this chapter, and no other assets are added.
    This is true for the remainder of this book. It’s all scripting from here on out!


    ## The Touchscreen


    When you build for iOS, Unity works with the touchscreen in iOS, so if you build
    and run your bowling game on a device right now, or test it with the Unity Remote
    in the Editor, you can operate the initial menu by tapping the buttons. When you
    tap the Play button on the pause menu, the bowling ball drops. So far, so good.


    But what about the bowling ball control? `Input.GetAxis` does return values when
    swiping on the screen, but the results are unlikely to be exactly what you want
    (in older versions of Unity iOS, `Input.GetAxis` was not functional at all). In
    any case, you need to first define how the control will work in the iOS version
    of the bowling game.'
  raw: '### Reference Manual


    Once again, you’ve spent some time in the player settings (a recurring theme now
    that you’re making iOS builds), so the Reference Manual documentation on the player
    settings is worth a review .


    You used just one new component in this chapter, a GUITexture for your splash
    screen image. GUITexture and its parent class GUIElement have no relation to UnityGUI
    (in fact, GUITexture and its sibling GUIText were the closest things to user interface
    elements before UnityGUI arrived).


    This chapter was devoted largely to icon and splash screen images, which should
    all be imported using the GUI preset import settings, which are documented for
    Texture2D in the “Asset Components” section.


    ### Scripting Reference


    The one new UnityGUI feature introduced in this chapter was the matrix variable
    in the GUI class. At the time of this writing, the Scripting Reference page for
    that variable is nearly blank, but the GUIUtility class has some better-documented
    functions, including ScaleAroundPivot, which can be used as an alternative to
    setting GUI.matrix (in fact, it is a helper function that sets GUI.matrix internally).


    You used only the Matrix4x4.TRS constructor, but the Scripting Reference documentation
    on Matrix4x4 is not bad, explaining how matrices are used in Unity and listing
    many class functions that will be useful if you ever have to start messing around
    with matrices.


    The yield instruction WaitForSeconds was already introduced in Chapter [8](../Text/A310332_2_En_8_Chapter.html)
    for the game-over state, and it turns out to be convenient for displaying a splash
    screen a certain number of seconds. You took this opportunity to explore hypothetical
    implementations of WaitForSeconds and compare the static Time variables Time.time
    and Time.realTimeSinceStartup. It’s an important distinction when the pause menu
    is up and game time is suspended.


    You called the static Application function LoadLevel to transition from the splash
    scene to the bowling scene, but you also could have called an asynchronous version
    of the function, Application.LoadLevelAsync. As an asynchronous function, it doesn’t
    suspend Unity while it’s loading a new scene, so, really, you could have anything
    happen in the splash scene while waiting for the new scene to finish loading.


    As demonstrated with your use of the activity indicator functions in the Handheld
    class, you can make Objects survive across scene loads by calling DontDestroyOnLoad
    on them, and you use Destroy on them when they’re not needed anymore. These are
    both static functions in the Object class, which is always worth reading up on
    since it’s the parent class of everything that can be in a scene.


    To display and hide the activity indicator, you called the StartActivityIndicator
    and StopActivityIndicator functions in the Handheld class. See the documentation
    on the activity indicator functions about the necessity to yield before performing
    a scene load. Use the iOSActivityIndicatorStyle enumeration for a list of the
    available activity indicator styles.


    The Handheld class is worth a looking over, as it contains all the scriptable
    Unity mobile features (except those specific to iOS). For example, the Handheld
    class has a static PlayFullScreenMovie function that can play a movie from local
    storage or can stream it from a web site, which is another possibility for a cool-looking
    splash scene. The Scripting Reference page for that function has details on the
    supported video formats and how to control the movie player (based, at the time
    of this writing, on the native iOS movie player, MPMoviePlayerController).


    ### iOS Developer Library


    As you explore Unity iOS features, more and more of the documentation in the iOS
    Developer Library is relevant. Remember, that documentation is available both
    on the Apple developer site ( [`http://developer.apple.com/`](http://developer.apple.com/)
    ) and from the Xcode Organizer window.


    One document worth reading in its entirely, found in the “User Experience” topic
    of the iOS Developer Library, is Apple’s iOS Human Interface Guidelines. The original
    guidelines dating back to the original Mac were the gold standard in user interface
    best practices. Since then, the guidelines have been split into Mac and iOS versions,
    but you should read the iOS version if only to avoid app rejections. Related to
    this chapter, the “Custom Icon and Image Creation Guidelines” section lists requirements
    and recommendations for creating app icons and splash screens (known as launch
    images in Apple’s terminology).


    Many Unity classes that are mobile-specific or iOS-specific will have an Objective-C
    counterpart. For example, the activity indicator controlled by Unity’s Handheld
    class is accessed in Objective-C via the UIActivityIndicatorview class, also found
    in the “User Experience” topic in the “Windows and Views” section.


    ### Asset Store


    The Smart Scene Changer from Ciitt, available free on the Unity Asset Store, provides
    more sophisticated introductory screen behavior than what was described in this
    chapter, including fading the screen in and out and using multiple screens. I
    use the Transitions Manager ( [`https://www.assetstore.unity3d.com/en/#!/content/80061`](https://www.assetstore.unity3d.com/en/#!/content/80061)
    ) in all my apps.


    ### Books


    Josh Clark’s Tapworthy: Designing Great Apps is the book that convinced me to
    eschew automatic icon gloss and always select Prerendered Icon in the Unity player
    settings. It’s also a good treatment of app design in general.


    There are plenty of textbooks on linear algebra (and even a hefty “matrix” article
    on [`http://wikipedia.org/`](http://wikipedia.org/) ), but any computer graphics
    book will have a primer on the matrix math. For example, Real-time Rendering (
    [`http://realtimerendering.com/`](http://realtimerendering.com/) ) has an appendix
    called “Some Linear Algebra.”


    # 13. Handling Device Input


    Although your bowling game is up and running on iOS , it’s not quite in a playable
    state because you don’t have any working player controls. That brings me to the
    issue of input handling, which is perhaps the most obvious difference between
    desktop and mobile games.


    Instead of reading the mouse or keyboard, an iOS game has to use one of its device
    sensors, typically the touchscreen (tapping and swiping) or accelerometer (shaking
    and tilting). You’ll opt for touchscreen input to control the bowling ball in
    this chapter, but you’ll do some shake detection with the accelerometer and play
    with the device camera a little bit, too.


    The project for this chapter on [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)
    has the script changes introduced in this chapter, and no other assets are added.
    This is true for the remainder of this book. It’s all scripting from here on out!


    ## The Touchscreen


    When you build for iOS, Unity works with the touchscreen in iOS, so if you build
    and run your bowling game on a device right now, or test it with the Unity Remote
    in the Editor, you can operate the initial menu by tapping the buttons. When you
    tap the Play button on the pause menu, the bowling ball drops. So far, so good.


    But what about the bowling ball control? Input.GetAxis does return values when
    swiping on the screen, but the results are unlikely to be exactly what you want
    (in older versions of Unity iOS, Input.GetAxis was not functional at all). In
    any case, you need to first define how the control will work in the iOS version
    of the bowling game.'
  trans: '

    ### 参考手册


    你再次在播放器设置中花费了一些时间（既然你已经在制作 iOS 版本，这便成了一个反复出现的主题），因此值得回顾一下关于播放器设置的参考手册文档。


    在本章中，你只使用了一个新组件，即用于启动画面的`GUITexture`。`GUITexture`及其父类`GUIElement`与 UnityGUI 无关（事实上，在
    UnityGUI 出现之前，`GUITexture`和它的同类`GUIText`曾是与人机界面元素最相近的组件）。


    本章主要侧重于图标和启动画面图像，这些图像都应使用 GUI 预设导入设置进行导入，相关说明可在“资源组件”部分的`Texture2D`文档中找到。


    ### 脚本参考


    本章介绍的一个新的 UnityGUI 功能是`GUI`类中的`matrix`变量。在撰写本文时，该变量的脚本参考页面几乎为空，但`GUIUtility`类提供了一些文档更完善的函数，其中包括`ScaleAroundPivot`，它可作为设置`GUI.matrix`的替代方案（实际上，它是一个辅助函数，会在内部设置`GUI.matrix`）。


    你只使用了`Matrix4x4.TRS`构造函数，但`Matrix4x4`的脚本参考文档并不差，它解释了矩阵在 Unity 中的使用方式，并列出了许多类函数，如果你需要操作矩阵，这些函数会很有用。


    `WaitForSeconds`的 yield 指令已在第 8 章的游戏结束状态中介绍过，事实证明它在显示启动画面并持续特定秒数时非常方便。你借此机会探索了`WaitForSeconds`的假设实现，并比较了静态`Time`变量`Time.time`和`Time.realTimeSinceStartup`。当暂停菜单出现且游戏时间暂停时，这两者的区别至关重要。


    你调用了静态`Application`函数`LoadLevel`来从启动场景过渡到保龄球场景，但你也可以调用该函数的异步版本`Application.LoadLevelAsync`。作为一个异步函数，它在加载新场景时不会暂停
    Unity，因此，在等待新场景加载完成的过程中，你可以在启动场景中实现任何效果。


    正如你通过使用`Handheld`类中的活动指示器函数所演示的那样，你可以通过对对象调用`DontDestroyOnLoad`使其在场景加载后依然存在，并在不再需要它们时使用`Destroy`来销毁它们。这两个都是`Object`类中的静态函数，由于它是场景中所有对象的父类，因此始终值得一读。


    为了显示和隐藏活动指示器，你调用了`Handheld`类中的`StartActivityIndicator`和`StopActivityIndicator`函数。请参阅关于活动指示器函数的文档，了解在执行场景加载前必须使用`yield`的必要性。使用`iOSActivityIndicatorStyle`枚举可以查看可用的活动指示器样式列表。


    `Handheld`类值得一读，因为它包含了所有可编写脚本的 Unity 移动设备功能（iOS 特有的功能除外）。例如，`Handheld`类有一个静态的`PlayFullScreenMovie`函数，可以播放本地存储的视频或从网站流式传输视频，这也是制作炫酷启动场景的另一种可能。该函数的脚本参考页面详细介绍了支持的视频格式以及如何控制视频播放器（在撰写本文时，它基于原生
    iOS 视频播放器`MPMoviePlayerController`）。


    ### iOS 开发者库


    随着你探索 Unity iOS 功能，iOS 开发者库中的文档也变得越来越相关。请记住，该文档可以在 Apple 开发者网站（[`http://developer.apple.com/`](http://developer.apple.com/)）和
    Xcode Organizer 窗口中获取。


    一篇值得通读的文档是 iOS 开发者库“用户体验”主题中的 Apple iOS 人机界面指南。源自最初 Mac 系统的原始指南曾是用户界面最佳实践的黄金标准。此后，该指南分为
    Mac 和 iOS 版本，但仅为了避免应用被拒，你就应该阅读 iOS 版本。与本章相关，“自定义图标和图像创建指南”部分列出了创建应用图标和启动画面（在 Apple
    术语中称为启动图像）的要求和建议。


    许多移动设备专用或 iOS 专用的 Unity 类都有对应的 Objective-C 类。例如，由 Unity 的`Handheld`类控制的活动指示器，在
    Objective-C 中是通过`UIActivityIndicatorview`类访问的，该类也位于“用户体验”主题的“窗口与视图”部分。


    ### 资源商店


    Ciitt 开发的 Smart Scene Changer（在 Unity 资源商店免费提供）提供了比本章所述更高级的初始屏幕行为，包括屏幕淡入淡出以及使用多个屏幕。我在我的所有应用中都使用了
    Transitions Manager（[`https://www.assetstore.unity3d.com/en/#!/content/80061`](https://www.assetstore.unity3d.com/en/#!/content/80061)）。


    ### 书籍


    Josh Clark 的《Tapworthy: Designing Great Apps》这本书让我决定摒弃自动图标光泽，并始终在 Unity 播放器设置中选择“预渲染图标”。这本书也是对应用设计总体上的良好阐述。


    关于线性代数的教科书有很多（甚至[`http://wikipedia.org/`](http://wikipedia.org/)上也有篇幅较长的“矩阵”文章），但任何计算机图形学书籍都会包含矩阵数学入门知识。例如，《实时渲染》（[`http://realtimerendering.com/`](http://realtimerendering.com/)）中有一个名为“一些线性代数”的附录。


    # 13. 处理设备输入


    虽然你的保龄球游戏已在 iOS 上运行起来，但由于没有任何可用的玩家控制，它尚未达到可玩状态。这就引出了输入处理的问题，这也许是桌面游戏与移动游戏之间最明显的区别。


    iOS 游戏无法读取鼠标或键盘，必须使用其设备传感器之一，通常是触摸屏（点击和滑动）或加速度计（摇晃和倾斜）。在本章中，你将选择触摸屏输入来控制保龄球，但也会使用加速度计进行一些摇晃检测，并稍微操作一下设备摄像头。


    本章项目文件位于[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)，其中包含了本章引入的脚本更改，未添加其他资源。本书剩余部分也是如此。从今以后都是脚本部分！


    ## 触摸屏


    当你为 iOS 构建时，Unity 会与 iOS 的触摸屏协同工作，因此如果你现在在设备上构建并运行保龄球游戏，或者在编辑器中使用 Unity Remote
    进行测试，你可以通过点击按钮来操作初始菜单。当你点击暂停菜单上的“开始”按钮时，保龄球会落下。到目前为止，一切顺利。


    但是保龄球的控制呢？`Input.GetAxis`在屏幕上滑动时确实会返回值，但结果很可能并非你想要的（在旧版本的 Unity iOS 中，`Input.GetAxis`完全不起作用）。无论如何，你需要首先定义在
    iOS 版本的保龄球游戏中控制将如何工作。

    '
- fmt: '### Swipe the Ball


    For Fugu Bowl, you’ll adopt the touchscreen control that I use for HyperBowl.
    The player pushes the ball in a certain direction by swiping along the screen
    in that direction. Swiping up on the screen will push the ball forward, swiping
    down will push the ball back, swiping left will roll it left, and swiping right
    will roll it right.


    The swipe control scheme is similar enough to the mouse controls that you can
    work within the framework of the existing `FuguForce` script. Bring up that script
    and add some new public variables, `swipepowerx` and `swipepowery`, so you can
    adjust the swipe power, just like you did with the mouse control (Listing 13-1).


    ```

    var swipepowerx:float = 0.1;

    var swipepowery:float = 0.1;

    Listing 13-1.

    Adjustment Variables for Swipe Control in FuguForce.js

    ```


    You added new variables instead of reusing `mousepowerx` and `mousepowery` so
    that you can switch between the stand-alone and iOS build targets without clobbering
    the power adjustment values for each platform. The properties for both will always
    show up in the Inspector view (Figure 13-1).


    ![A310332_2_En_13_Fig1_HTML.jpg](Images/A310332_2_En_13_Fig1_HTML.jpg)


    Figure 13-1. Control adjustments for both desktop and iOS in `FuguForce.js`


    The big change is your `CalcForce` function, which gets called by your Update
    callback once per frame. On iOS, instead of calling the static function `Input.GetAxis`
    to see how much the mouse has been moved, `CalcForce` calls the static function
    `Input.GetTouch` to check for swipes. The `UNITY_IPHONE` preprocessor definition
    makes sure the new code exists only on iOS and the old code exists on any other
    platform (Listing 13-2).


    ```

    function CalcForce() {

    var deltatime:float = Time.deltaTime;

    #if UNITY_IPHONE

    if (Input.touchCount > 0) {

    // Get movement of the finger since last frame

    var touch:Touch = Input.GetTouch(0);

    if (touch.phase == TouchPhase.Moved) {

    var touchPositionDelta:Vector2 = touch.deltaPosition;

    forcey = swipepowery*touchPositionDelta.y/deltatime;

    forcex = swipepowerx*touchPositionDelta.x/deltatime;

    }

    }

    #else

    forcey = mousepowery*Input.GetAxis("Mouse Y")/deltatime;

    forcex = mousepowerx*Input.GetAxis("Mouse X")/deltatime;

    #endif

    }

    Listing 13-2.

    Detecting Swipes in FuguForce.js

    ```


    Like `Input.GetAxis`, `Input.GetTouch` returns information registered since the
    previous frame, so you can call it in `CalcForce`, which gets called from `Update`
    and thus once each frame.


    `Input.GetTouch` returns a struct of type `Touch`, which describes the touch event;
    whether the finger was pressed, released, or moved; and if moved, by how many
    pixels.


    You’re now dealing with multitouch screens, so `Input.GetTouch` has one parameter,
    an integer indicating which of the latest `Input.Touch` events to return. The
    number of touch events is available in the static variable `Input.touchCount`,
    so you can process all touch events in a loop like this:


    ```

    for (var i:int=0; i < Input.touchCount; ++i) {

    var touch:Touch = Input.GetTouch(i);

    // do your stuff here

    }

    ```


    To keep things simple here, you’re interested in only one finger, so just check
    whether there’s one or more `Touch` events available, and if so, just check the
    first one.


    ```

    if (Input.touchCount > 0) {

    var touch:Touch = Input.GetTouch(0);

    ```


    `Touch` events can signify different finger actions: a press, release, or drag.
    This can be checked by inspecting the `phase` property of the `Touch` object,
    which is a `TouchPhase` enumeration. You’re interested only in `Touch` events
    that signify a finger has dragged along the screen, so check whether the touch
    phase is `TouchPhase.Moved`.


    ```

    if (touch.phase == TouchPhase.Moved) {

    ```


    If it is, then calculate the force used to push the bowling ball. It’s similar
    to the mouse control, but instead of multiplying by `Input.GetAxis`, multiply
    by the `deltaPosition` property of the `Touch` event, which is the number of pixels
    the finger has dragged across.


    ```

    var touchPositionDelta:Vector2 = touch.deltaPosition;

    forcey = powery*touchPositionDelta.y/deltatime;

    forcex = powerx*touchPositionDelta.x/deltatime;

    ```


    Notice the `deltaPosition` property is a `Vector2`, which is just like a `Vector3`,
    but with only `x` and `y` properties and no `z` value.


    Now if you click Play in the Editor and test with the Unity Remote or if you perform
    a Build and Run operation on a device, the ball will roll in the direction you
    swipe.


    The complete `FuguBowlForce` script with the touchscreen additions is available
    in the project for this chapter on `http://learnuninty4.com/`.'
