- fmt: "### Design the FSM\n\nTo sketch out the FSM, think of all the states that\
    \ the game will go through. All FSMs have an initial state, which in this case\
    \ is the beginning of a new game. The player starts out in the first frame with\
    \ the first ball, starts rolling the ball, and, when finished rolling, has a strike,\
    \ a spare, or a regular score. Then the player moves either onto the second ball\
    \ or back to the first in a new frame, and the process is repeated. If the player\
    \ is on the second ball, the flow is the same except for the transition back to\
    \ the first ball of a new frame or possibly the third ball if this is the tenth\
    \ frame and the player rolled a strike or spare. After all ten frames have been\
    \ completed, the FSM transitions to the `GameOver` state, which may cycle back\
    \ to a new game.\n\nFigure [8-5](#A310332_2_En_8_Chapter.html#Fig5) shows how\
    \ the state machine just described might look.\n\n![A310332_2_En_8_Fig5_HTML.jpg](Images/A310332_2_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5. A state machine for bowling\n\nIt’s not important to get it exactly\
    \ right the first time. Typically, when you sketch out the flow of a program and\
    \ then start scripting, you’ll realize you forgot something or there’s a better\
    \ way, and then you go back and adjust your original design. It’s like what one\
    \ of my professors said about constructing proofs—it’s a messy process completing\
    \ one, but then you go back and clean it up and pretend that’s how you planned\
    \ it in the first place!\n\nTechnically, an FSM doesn’t have memory, so a really\
    \ complete state machine for bowling would have a lot of duplicated states for\
    \ all three balls and even all ten frames. But a state machine with a few hundred\
    \ states would be hard to understand, which would largely defeat its purpose.\
    \ You don’t have to be purists about this, so let’s assume there are variables\
    \ tracking the current frame that’s being played and which ball the player is\
    \ rolling.\n\n### Tracking the Game\n\nListing [8-15](#A310332_2_En_8_Chapter.html#Par76)\
    \ shows the variables defined in the `FuguBowl` script to track the current frame\
    \ and current ball.\n\n```\nprivate var state:String; // current state in the\
    \ state machine\nenum Roll {\n    Ball1,\n    Ball2,\n    Ball3\n}\nListing 8-15.\
    \ The Variables in FuguBowl.js That Track the Current Frame and Ball\n```\n\n\
    The variable `frame` tracks the current frame with an `int`, ranging from 0 to\
    \ 9 instead of 1 to 10 because that number will be used as an array index when\
    \ it’s passed to the `FuguBowlPlayer` functions.\n\nThe variable `roll` tracks\
    \ the current roll of the ball and could also have been declared an `int`, choosing\
    \ a convention where the numbers 0 to 2 or 1 to 3 represent the three possible\
    \ balls in a frame. But it’s cleaner to define an `enum` (short for enumeration),\
    \ which essentially allows you to define a new type where the value is one from\
    \ a list of named values. So, `roll` is declared to be of type `Roll`, which is\
    \ an `enum` with values `Ball1`, `Ball2`, or `Ball3`.\n\nBy the way, at this point\
    \ you’ve encountered several different categories of types: primitive types like\
    \ `int` and `boolean`, built-in arrays that contain other types, enums like the\
    \ `Roll` enum, structs like `Vector3`, and classes like `GameObject`, `Component`,\
    \ and `FuguBowlPlayer`. Of these categories, classes and arrays are reference\
    \ types, meaning different variables can reference the same instance of that type,\
    \ and modifications to the instance will be visible through every variable referencing\
    \ that instance.\n\n### Starting the State Machine\n\nOkay, now that you’ve sketched\
    \ out the state machine, how do you go about coding it? FSMs are useful enough\
    \ that some game engines, including CryEngine, Unreal, and Second Life, have built-in\
    \ support for their scripts. Unfortunately, Unity doesn’t, but since this is software,\
    \ there are a variety of ways to homebrew some FSM support.\n\nOne way is to have\
    \ essentially a big conditional statement inside the `Update` function that performs\
    \ different actions depending on which state it’s in (and we’d probably use an\
    \ `enum` to define those different states). However, that method tends to result\
    \ in unwieldy `Update` functions. In fact, because the `Update` callback added\
    \ to the `FuguBowl` script in Chapter [7](../Text/A310332_2_En_7_Chapter.html)\
    \ will be obviated by the state machine you’re about to add, you should delete\
    \ that callback from the `FuguBowl` script right now.\n\nAnother way to create\
    \ an FSM, which I tried for a while, is to represent a state machine with a `GameObject`\
    \ that has several scripts attached, where each script represents a state. Whenever\
    \ the current state is exited, that script would disable itself and enable the\
    \ next script or state. This method is appealing, since each script or state has\
    \ its own `Update` function and other callbacks. But I find my state machines\
    \ easier to understand and work with if the entire FSM is contained in a single\
    \ script.\n\nUltimately, I’ve settled on implementing state machines with coroutines,\
    \ which are functions that can suspend themselves for one or more frames at a\
    \ time by calling `yield` (the function is yielding control temporarily even though\
    \ it hasn’t finished executing). You can implement each state as a coroutine that\
    \ returns when the state is exited. While in the state, the coroutine performs\
    \ whatever action is supposed to take place during that state, but repeatedly\
    \ yielding so it doesn’t block the rest of Unity (including the renderer and physics)\
    \ from running. And before returning, the coroutine specifies the next state it\
    \ will transition to. Some, but not all, callbacks can be used as coroutines.\
    \ For example, `Awake` cannot be used as a coroutine, nor `Update`, but `Start`\
    \ can yield and thus can act as an FSM controller (Listing [8-16](#A310332_2_En_8_Chapter.html#Par84)).\n\
    \n```\nprivate var state:String; // current state in the state machine\nenum Roll\
    \ {\n    Ball1,\n    Ball2,\n    Ball3\n}\nListing 8-16. Start Callback Running\
    \ State Machine in FuguBowl.js\n```\n\nThe name of the current state, which is\
    \ the name of the coroutine implementing that state, is held as a `String` in\
    \ a private variable named `state`. The `Start` callback loops endlessly, repeatedly\
    \ calling `StartCoroutine` with the value of `state` to invoke the coroutine.\
    \ `Start` yields on the call to `StartCoroutine` so that it waits until the state\
    \ coroutine has finished executing before starting a coroutine with the next value\
    \ of `state`.\n\nThere’s no guarantee the coroutines called will yield at all,\
    \ so `Start` includes an extra yield in the loop for good measure to make sure\
    \ at least one yield occurs between states and gives the rest of the game engine\
    \ an opportunity to work.\n\nAs a debugging aid, `Start` calls `Debug.Log` before\
    \ executing each state coroutine (Figure [8-6](#A310332_2_En_8_Chapter.html#Fig6)).\
    \ This is a convenient way to trace the state machine progress when testing the\
    \ game.\n\n![A310332_2_En_8_Fig6_HTML.jpg](Images/A310332_2_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6. The Console view of a state machine debug trace\n\n### The States\n\
    \nAs a convention, you’ll prefix all the state coroutines with `State` to indicate\
    \ those functions are states in a state machine.\n\n#### StateNewGame\n\nThe initial\
    \ state of the bowling state machine is `StateNewGame` (Listing [8-17](#A310332_2_En_8_Chapter.html#Par90)),\
    \ which starts a new game by clearing the player’s score and setting the current\
    \ frame index to 0, specifying the player is currently bowling the first frame\
    \ of the game.\n\n```\nfunction StateNewGame() {\n    player.ClearScore();\n \
    \   frame = 0;\n    state = \"StateBall1\";\n}\nListing 8-17. StateNewGame in\
    \ FuguBowl.js\n```\n\nBefore returning (effectively exiting the state), `StateNewGame`\
    \ specifies the next state is `StateBall1`, which is the state where the player\
    \ begins rolling the first ball of the frame."
  raw: '### Design the FSM


    To sketch out the FSM, think of all the states that the game will go through.
    All FSMs have an initial state, which in this case is the beginning of a new game.
    The player starts out in the first frame with the first ball, starts rolling the
    ball, and, when finished rolling, has a strike, a spare, or a regular score. Then
    the player moves either onto the second ball or back to the first in a new frame,
    and the process is repeated. If the player is on the second ball, the flow is
    the same except for the transition back to the first ball of a new frame or possibly
    the third ball if this is the tenth frame and the player rolled a strike or spare.
    After all ten frames have been completed, the FSM transitions to the GameOver
    state, which may cycle back to a new game.


    Figure [8-5](#A310332_2_En_8_Chapter.html#Fig5) shows how the state machine just
    described might look.


    ![A310332_2_En_8_Fig5_HTML.jpg](Images/A310332_2_En_8_Fig5_HTML.jpg)


    Figure 8-5.


    A state machine for bowling


    It’s not important to get it exactly right the first time. Typically, when you
    sketch out the flow of a program and then start scripting, you’ll realize you
    forgot something or there’s a better way, and then you go back and adjust your
    original design. It’s like what one of my professors said about constructing proofs—it’s
    a messy process completing one, but then you go back and clean it up and pretend
    that’s how you planned it in the first place!


    Technically, an FSM doesn’t have memory, so a really complete state machine for
    bowling would have a lot of duplicated states for all three balls and even all
    ten frames. But a state machine with a few hundred states would be hard to understand,
    which would largely defeat its purpose. You don’t have to be purists about this,
    so let’s assume there are variables tracking the current frame that’s being played
    and which ball the player is rolling.


    ### Tracking the Game


    Listing [8-15](#A310332_2_En_8_Chapter.html#Par76) shows the variables defined
    in the FuguBowl script to track the current frame and current ball.


    ```

    private var state:String; // current state in the state machin

    enum Roll {

    Ball1,

    Ball2,

    Ball3

    }

    Listing 8-15.

    The Variables in FuguBowl.js That Track the Current Frame and Ball

    ```


    The variable frame tracks the current frame with an int, ranging from 0 to 9 instead
    of 1 to 10 because that number will be used as an array index when it’s passed
    to the FuguBowlPlayer functions.


    The variable roll tracks the current roll of the ball and could also have been
    declared an int, choosing a convention where the numbers 0 to 2 or 1 to 3 represent
    the three possible balls in a frame. But it’s cleaner to define an enum (short
    for enumeration), which essentially allows you to define a new type where the
    value is one from a list of named values. So, roll is declared to be of type Roll,
    which is an enum with values Ball1, Ball2, or Ball3.


    By the way, at this point you’ve encountered several different categories of types:
    primitive types like int and boolean, built-in arrays that contain other types,
    enums like the Roll enum, structs like Vector3, and classes like GameObject, Component,
    and FuguBowlPlayer. Of these categories, classes and arrays are reference types,
    meaning different variables can reference the same instance of that type, and
    modifications to the instance will be visible through every variable referencing
    that instance.


    ### Starting the State Machine


    Okay, now that you’ve sketched out the state machine , how do you go about coding
    it? FSMs are useful enough that some game engines, including CryEngine, Unreal,
    and Second Life, have built-in support for their scripts. Unfortunately, Unity
    doesn’t, but since this is software, there are a variety of ways to homebrew some
    FSM support.


    One way is to have essentially a big conditional statement inside the Update function
    that performs different actions depending on which state it’s in (and we’d probably
    use an enum to define those different states). However, that method tends to result
    in unwieldy Update functions. In fact, because the Update callback added to the
    FuguBowl script in Chapter [7](../Text/A310332_2_En_7_Chapter.html) will be obviated
    by the state machine you’re about to add, you should delete that callback from
    the FuguBowl script right now.


    Another way to create an FSM, which I tried for a while, is to represent a state
    machine with a GameObject that has several scripts attached, where each script
    represents a state. Whenever the current state is exited, that script would disable
    itself and enable the next script or state. This method is appealing, since each
    script or state has its own Update function and other callbacks. But I find my
    state machines easier to understand and work with if the entire FSM is contained
    in a single script.


    Ultimately, I’ve settled on implementing state machines with coroutines, which
    are functions that can suspend themselves for one or more frames at a time by
    calling yield (the function is yielding control temporarily even though it hasn’t
    finished executing). You can implement each state as a coroutine that returns
    when the state is exited. While in the state, the coroutine performs whatever
    action is supposed to take place during that state, but repeatedly yielding so
    it doesn’t block the rest of Unity (including the renderer and physics) from running.
    And before returning, the coroutine specifies the next state it will transition
    to. Some, but not all, callbacks can be used as coroutines. For example, Awake
    cannot be used as a coroutine, nor Update, but Start can yield and thus can act
    as an FSM controller (Listing [8-16](#A310332_2_En_8_Chapter.html#Par84)).


    ```

    private var state:String; // current state in the state machine

    enum Roll {

    Ball1,

    Ball2,

    Ball3

    }

    Listing 8-16.

    Start Callback Running State Machine in FuguBowl.js

    ```


    The name of the current state, which is the name of the coroutine implementing
    that state, is held as a String in a private variable named state. The Start callback
    loops endlessly, repeatedly calling StartCoroutine with the value of state to
    invoke the coroutine. Start yields on the call to StartCoroutine so that it waits
    until the state coroutine has finished executing before starting a coroutine with
    the next value of state.


    There’s no guarantee the coroutines called will yield at all, so Start includes
    an extra yield in the loop for good measure to make sure at least one yield occurs
    between states and gives the rest of the game engine an opportunity to work.


    As a debugging aid, Start calls Debug.Log before executing each state coroutine
    (Figure [8-6](#A310332_2_En_8_Chapter.html#Fig6)). This is a convenient way to
    trace the state machine progress when testing the game.


    ![A310332_2_En_8_Fig6_HTML.jpg](Images/A310332_2_En_8_Fig6_HTML.jpg)


    Figure 8-6.


    The Console view of a state machine debug trace


    ### The States


    As a convention, you’ll prefix all the state coroutines with State to indicate
    those functions are states in a state machine.


    #### StateNewGame


    The initial state of the bowling state machine is StateNewGame (Listing [8-17](#A310332_2_En_8_Chapter.html#Par90)),
    which starts a new game by clearing the player’s score and setting the current
    frame index to 0, specifying the player is currently bowling the first frame of
    the game.


    ```

    function StateNewGame() {

    player.ClearScore();

    frame = 0;

    state="StateBall1";

    }

    Listing 8-17.

    StateNewGame in FuguBowl.js

    ```


    Before returning (effectively exiting the state), StateNewGame specifies the next
    state is StateBall1, which is the state where the player begins rolling the first
    ball of the frame.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 设计 FSM\n\n\
    要绘制 FSM，请思考游戏将经历的所有状态。所有 FSM 都有一个初始状态，在这里是指新游戏开始。玩家从第一局的第一个球开始，滚动保龄球，滚动结束后，会得到一个“全中”、“补中”或普通分数。然后，玩家要么进入同一局的第二个球，要么进入新一局的第一个球，并重复此过程。如果玩家正在投第二个球，流程是相同的，只是转换到新一局的第一个球，或者如果这是第十局且玩家投出了“全中”或“补中”，则可能转换到第三个球。当所有十局完成后，FSM\
    \ 转换到 `GameOver` 状态，该状态可能会循环回到新游戏。\n\n图 8-5 展示了上述状态机可能的样子。\n\n![A310332_2_En_8_Fig5_HTML.jpg](img/A310332_2_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5. 保龄球游戏的状态机\n\n第一次就完全画对并不重要。通常，当你勾勒出程序的流程并开始编写脚本时，你会意识到遗漏了什么或存在更好的方法，然后你会回过头来调整最初的设计。这就像我的一位教授关于构造证明所说的——完成一个证明是一个混乱的过程，但之后你会回过头来清理它，并假装那本来就是你最初计划好的！\n\
    \n从技术上讲，FSM 没有记忆，因此一个真正完整的保龄球状态机需要为所有三个球，甚至所有十局复制大量状态。但是，一个拥有数百个状态的状态机将难以理解，这在很大程度上会违背其目的。你不必过于拘泥于此，因此我们假设存在一些变量来跟踪当前正在进行的局数和玩家正在投的是第几个球。\n\
    \n### 跟踪游戏进程\n\n清单 8-15 显示了 `FuguBowl` 脚本中定义的、用于跟踪当前局数和当前球的变量。\n\n```\nprivate\
    \ var state:String; // current state in the state machine\nenum Roll {\n    Ball1,\n\
    \    Ball2,\n    Ball3\n}\n清单 8-15. FuguBowl.js 中跟踪当前局数和球的变量\n```\n\n变量 `frame`\
    \ 使用 `int` 跟踪当前局数，范围从 0 到 9 而不是 1 到 10，因为当这个数字被传递给 `FuguBowlPlayer` 函数时，它将用作数组索引。\n\
    \n变量 `roll` 跟踪当前的投球数，它也可以被声明为 `int`，并选择一种约定，例如用数字 0 到 2 或 1 到 3 来表示一局中的三个可能的球。但是，定义一个\
    \ `enum`（枚举的简称）会更清晰，它本质上允许你定义一个新类型，其值来自一个命名值列表中的某一个。因此，`roll` 被声明为 `Roll` 类型，这是一个包含\
    \ `Ball1`、`Ball2` 或 `Ball3` 值的 `enum`。\n\n顺便提一下，到目前为止，你已经遇到了几种不同类型的类别：像 `int`\
    \ 和 `boolean` 这样的原始类型，包含其他类型的内置数组，像 `Roll` 枚举这样的枚举，像 `Vector3` 这样的结构体，以及像 `GameObject`、`Component`\
    \ 和 `FuguBowlPlayer` 这样的类。在这些类别中，类和数组是引用类型，这意味着不同的变量可以引用该类型的同一个实例，并且对该实例的修改将通过引用该实例的每个变量可见。\n\
    \n### 启动状态机\n\n好了，现在你已经勾勒出了状态机，接下来该如何编写代码呢？FSM 非常有用，以至于包括 CryEngine、Unreal 和 Second\
    \ Life 在内的一些游戏引擎都为其脚本提供了内置支持。不幸的是，Unity 没有，但既然这是软件，就有多种方法来自制一些 FSM 支持。\n\n一种方法是在\
    \ `Update` 函数内部有一个大的条件语句，根据所处的状态执行不同的操作（我们可能会使用 `enum` 来定义这些不同的状态）。然而，这种方法往往会导致\
    \ `Update` 函数变得笨重。实际上，由于第 7 章添加到 `FuguBowl` 脚本中的 `Update` 回调将被你即将添加的状态机取代，你现在就应该从\
    \ `FuguBowl` 脚本中删除那个回调。\n\n另一种创建 FSM 的方法（我尝试过一段时间）是使用一个附加了多个脚本的 `GameObject` 来表示状态机，每个脚本代表一个状态。每当退出当前状态时，该脚本会禁用自身并启用下一个脚本或状态。这种方法很有吸引力，因为每个脚本或状态都有其自己的\
    \ `Update` 函数和其他回调。但我发现，如果整个 FSM 包含在单个脚本中，我的状态机会更容易理解和处理。\n\n最终，我决定使用协程来实现状态机。协程是可以一次挂起自己一个或多个帧的函数，通过调用\
    \ `yield` 来实现（该函数暂时放弃控制权，即使它尚未执行完毕）。你可以将每个状态实现为一个协程，当退出该状态时返回。在该状态中，协程执行该状态下应该发生的任何动作，但会反复地让步，以免阻塞\
    \ Unity 的其余部分（包括渲染和物理引擎）运行。在返回之前，协程会指定它将转换到的下一个状态。并非所有回调都可以用作协程。例如，`Awake` 不能用作协程，`Update`\
    \ 也不行，但 `Start` 可以让步，因此可以充当 FSM 控制器（清单 8-16）。\n\n```\nprivate var state:String;\
    \ // current state in the state machine\nenum Roll {\n    Ball1,\n    Ball2,\n\
    \    Ball3\n}\n清单 8-16. FuguBowl.js 中运行状态机的 Start 回调\n```\n\n当前状态的名称，即实现该状态的协程的名称，作为\
    \ `String` 保存在名为 `state` 的私有变量中。`Start` 回调无限循环，使用 `state` 的值反复调用 `StartCoroutine`\
    \ 来调用协程。`Start` 在调用 `StartCoroutine` 时让步，这样它会等待状态协程执行完毕，然后再使用 `state` 的下一个值启动一个协程。\n\
    \n被调用的协程不一定会让步，因此 `Start` 在循环中额外增加了一个让步操作，以确保在状态之间至少发生一次让步，让游戏引擎的其余部分有机会运行。\n\n\
    作为调试辅助手段，`Start` 在执行每个状态协程之前会调用 `Debug.Log`（图 8-6）。这是在测试游戏时跟踪状态机进度的便捷方法。\n\n![A310332_2_En_8_Fig6_HTML.jpg](img/A310332_2_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6. 状态机调试跟踪的控制台视图\n\n### 各状态\n\n按照惯例，你将在所有状态协程前加上 `State` 前缀，以表明这些函数是状态机中的状态。\n\
    \n#### StateNewGame\n\n保龄球状态机的初始状态是 `StateNewGame`（清单 8-17），它通过清除玩家得分并将当前局索引设置为\
    \ 0 来开始新游戏，指明玩家当前正在投掷游戏的第一局。\n\n```\nfunction StateNewGame() {\n    player.ClearScore();\n\
    \    frame = 0;\n    state = \"StateBall1\";\n}\n清单 8-17. FuguBowl.js 中的 StateNewGame\n\
    ```\n\n在返回（实际上是退出该状态）之前，`StateNewGame` 指定下一个状态是 `StateBall1`，即玩家开始投掷该局第一个球的状态。\n"
- fmt: "# StateBall1\n\nThe first action `StateBall1` (Listing [8-18](#A310332_2_En_8_Chapter.html#Par93))\
    \ takes is to reset the positions of the pins, the ball, and also the Main Camera.\
    \ This isn’t really necessary the first time the state is entered (i.e., the beginning\
    \ of the game), but when the player finishes bowling a frame and transitions back\
    \ to this state, everything needs to be placed in its starting position and rotation\
    \ (pins that may be knocked over will have their rotations changed).\n\n```\n\
    function StateBall1() {\n  ResetEverything(); // reset pins, camera and ball\n\
    \  roll = Roll.Ball1;\n  state = \"StateRolling\";\n}\n```\n\nAfter performing\
    \ the reset, this state sets the `roll` variable to `Roll.Ball1`, indicating the\
    \ player is rolling the first ball of the frame. Finally, this state transitions\
    \ to `StateRolling`, the state occupied while the ball is rolling toward the pins.\n\
    \n# StateBall2\n\nLike `StateBall1`, `StateBall2` (Listing [8-19](#A310332_2_En_8_Chapter.html#Par96))\
    \ starts by resetting the Ball and Main Camera.\n\n```\nfunction StateBall2()\
    \ {\n  ResetBall();\n  ResetCamera();\n  if (GetPinsDown() == 10) {\n    ResetPins();\n\
    \  } else {\n    RemoveDownedPins();\n  }\n  roll = Roll.Ball2;\n  state = \"\
    StateRolling\";\n}\n```\n\nIf the player has reached this point, normally it means\
    \ the first ball of the frame didn’t result in a strike, and now it’s time to\
    \ try knocking down the remaining pins, after cleaning up the downed pins from\
    \ the previous roll. But if all the pins are down, it must be that special case\
    \ in the tenth frame where a strike then results in two more rolls, and the pins\
    \ are reset.\n\nBefore exiting the state, `roll` is set to `Roll.Ball2`, and as\
    \ with `StateBall1`, the next state is set to `StateRolling`.\n\n# StateBall3\n\
    \nSpeaking of the tenth frame, that’s the only case where `StateBall3` (Listing\
    \ [8-20](#A310332_2_En_8_Chapter.html#Par100)) occurs since that’s the only frame\
    \ in which the player can roll three times.\n\n```\nfunction StateBall3() {\n\
    \  ResetBall();\n  ResetCamera();\n  if (GetPinsDown() == 10) {\n    ResetPins();\n\
    \  } else {\n    RemoveDownedPins();\n  }\n  roll = Roll.Ball3;\n  state = \"\
    StateRolling\";\n}\n```\n\n`StateBall3`, just like `StateBall2`, resets the ball,\
    \ and if you knocked down ten pins from the previous rolls in the frame (either\
    \ a spare or two strikes), it will reset the pins. Otherwise, the downed pins\
    \ from the previous roll are cleaned up. Again, the state sets the `roll` variable\
    \ to `Roll.Ball3` and transitions to `StateRolling`.\n\n# StateRolling\n\n`StateRolling`\
    \ (Listing [8-21](#A310332_2_En_8_Chapter.html#Par103)) more or less fulfills\
    \ the `Update` function created in Chapter [7](../Text/A310332_2_En_7_Chapter.html)\
    \ and discarded earlier in this one. The state yields every frame, doing nothing\
    \ except waiting until the Ball control should cease.\n\n```\nfunction StateRolling()\
    \ {\n  while (true) {\n    // let go of the ball when we reach the pins\n    if\
    \ (ball.transform.position.z > pinPos.z) {\n      state = \"StateRolledPast\"\
    ;\n      return;\n    }\n    // gutterball\n    if (ball.transform.position.y\
    \ < sunkHeight) {\n      state = \"StateGutterBall\";\n      return;\n    }\n\
    \    yield;\n  }\n}\n```\n\nThere are two cases where this roll is definitely\
    \ done. Either the ball rolls off the edge of the floor, which is basically the\
    \ same situation as a gutter ball in a normal bowling game, or you’ve rolled up\
    \ to the pins (if you don’t relinquish control, the game is too easy; you can\
    \ roll back and forth among the pins like a monster truck!).\n\nDetecting a gutter\
    \ ball is easy. As in the now-removed `Update` callback, this state checks whether\
    \ the ball has fallen below the y position specified in the `sunkHeight` variable.\
    \ If so, transition to the gutter ball state. The other case is nearly as simple,\
    \ checking whether the ball’s z position has passed the first pin’s z position.\
    \ Essentially, the state is checking whether the ball has reached the “pin line”\
    \ stretching left to right across the floor where that pin is placed. If it has,\
    \ then transition to `StateRolledPast`.\n\nYou actually didn’t consider having\
    \ `StateGutterBall` and `StateRolledPast` when you sketched out your FSM, but\
    \ it’s not a big deal. You can now just insert those states in place of the formerly\
    \ direct transition between `StateRolling` and `StateRollOver`."
