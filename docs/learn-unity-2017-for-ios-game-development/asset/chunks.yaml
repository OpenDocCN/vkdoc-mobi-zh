- fmt: "### Send a Message\n\nNormally, calling a function in a script attached to\
    \ one `GameObject` from a script attached to another `GameObject` is a little\
    \ bit tricky. It involves calling `GetComponent` on a `GameObject` to retrieve\
    \ the script and then referencing that script to call the function.\n\nBut in\
    \ simple cases (e.g., when you don’t care about the return value of the function),\
    \ Unity allows you to call functions by sending messages to `GameObject`s using\
    \ either the `GameObject.SendMessage()` function or `GameObject.BroadcastMessage()`\
    \ function. A `GameObject` receiving a message, which consists of the name of\
    \ the function to call, will pass that message on to any script that might have\
    \ that function.\n\nLet’s add some functions to your game controller script that\
    \ will send `ResetPosition` messages (Listing [7-3](#A310332_2_En_7_Chapter.html#Par28)).\n\
    \n```\nvar ball:GameObject; // the bowling ball\nFunction ResetBall() {\n    ball.SendMessage(\"\
    ResetPosition\");\n}\nfunction ResetPins() {\n    for (var pin:GameObject in pins)\
    \ {\n        pin.BroadcastMessage(\"ResetPosition\");\n    }\n}\nfunction ResetCamera()\
    \ {\n    Camera.main.SendMessage(\"ResetPosition\");\n}\nfunction ResetEverything()\
    \ {\n    ResetBall();\n    ResetPins();\n    ResetCamera();\n}\n```\n*Listing\
    \ 7-3. Functions to Send ResetPosition Messages in FuguBowl.js*\n\nThe additional\
    \ code begins with a public variable that will refer to the ball. The script already\
    \ has a `pins` array that references all of the bowling pins, and the `Main Camera`\
    \ can always be referenced through the static variable `Camera.main`, so now the\
    \ script can access every `GameObject` that it needs to reset. The functions `ResetCamera()`\
    \ and `ResetBall()` call `SendMessage()` to send the `ResetPosition` message to\
    \ their respective target `GameObject`s. Every `ResetPosition()` function defined\
    \ in scripts attached to those `GameObject`s will be called. Specifically, since\
    \ the `Main Camera` and `Ball` `GameObject`s have the `FuguReset` script attached,\
    \ the `ResetPosition()` function in that script will respond to the message. The\
    \ `ResetPins()` function is a little bit different in that it calls `BroadcastMessage()`\
    \ to send the `ResetPosition` message. `BroadcastMessage()` behaves the same as\
    \ `SendMessage()` except that the message is also propagated to any child `GameObject`s\
    \ of the original recipient `GameObject`. This will be useful later in this chapter\
    \ when you swap in some pins that have their `Rigidbody` components attached to\
    \ child `GameObject`s.\n\n### Check for Gutter Ball\n\nWhen the ball rolls off\
    \ the edge of the floor, it’s essentially a gutter ball, since there’s no hope\
    \ of reaching the pins at this point. So, a reset of the game is definitely in\
    \ order when this happens. The gutter ball can be implemented by checking in every\
    \ frame whether the `y` position of the ball has dropped below a certain level.\
    \ That can be implemented by adding the public variable and `Update()` callback\
    \ in Listing [7-4](#A310332_2_En_7_Chapter.html#Par31) to the `FuguBowl` script.\n\
    \n```\nvar sunkHeight:float = -10.0; // fall below this y position and we have\
    \ a gutterball\nfunction Update() {\n    if (ball.transform.position.y < sunkHeight)\
    \ {\n        ResetEverything();\n    }\n}\n```\n*Listing 7-4. Update Callback\
    \ in FuguBowl.js to Test for Gutter Ball*\n\nThe variable `sunkHeight` specifies\
    \ what `y` position the ball has to fall below to reset everything. The default\
    \ value of `sunkHeight` is some distance below zero, so the player has some time\
    \ to see the ball fall before it resets. The `Update()` callback checks every\
    \ frame whether or not the ball’s `y` position is below `sunkHeight`. If it is,\
    \ `ResetEverything()` is called, which sends out all the `ResetPosition` messages\
    \ to the `Ball`, `Main Camera`, and `Pin` `GameObject`s. Before you click Play\
    \ to test this, you need to assign the `ball` public variable in the script by\
    \ dragging the `Ball` `GameObject` from the Hierarchy view into the `Ball` field\
    \ of the `FuguBowl` script (Figure [7-11](#A310332_2_En_7_Chapter.html#Fig11)).\n\
    \n![A310332_2_En_7_Fig11_HTML.jpg](Images/A310332_2_En_7_Fig11_HTML.jpg)\n\n*Figure\
    \ 7-11. Game controller properties in FuguBowl.js to support resetting the ball*\n\
    \nNow when the ball rolls off the floor, the `Ball`, `Main Camera`, and `Pin`\
    \ `GameObject`s should pop right back into their beginning positions. Continuous\
    \ gameplay!\n\n### The Complete Listing\n\nListing [7-5](#A310332_2_En_7_Chapter.html#Par35)\
    \ gives the complete game controller script.\n\n```\n// bowling game controller\n\
    #pragma strict\nvar pin:GameObject; // pin prefab to instantiate\nvar pinPos:Vector3\
    \ = Vector3(0,1,20); // position to place rack of pins\nvar pinDistance = 1.5;\
    \ // initial distance between pins\nvar pinRows = 4; // number of pin rows\nvar\
    \ ball:GameObject; // the bowling ball\nvar sunkHeight:float = -10.0; // fall\
    \ below this y position and we have a gutterball\nprivate var pins:Array;\n\n\
    function Awake () {\n    CreatePins();\n}\n\nfunction CreatePins() {\n    pins\
    \ = new Array();\n    var offset = Vector3.zero;\n    for (var row=0; row < pinRows;\
    \ ++row) {\n        offset.z += pinDistance;\n        offset.x = -pinDistance\
    \ * row / 2;\n        for (var n=0; n <= row; ++n) {\n            pins.push(Instantiate(pin,\
    \ pinPos + offset, Quaternion.identity));\n            offset.x += pinDistance;\n\
    \        }\n    }\n}\n\nfunction Update() {\n    if (ball.transform.position.y\
    \ < sunkHeight) {\n        ResetEverything();\n    }\n}\n\nfunction ResetBall()\
    \ {\n    ball.SendMessage(\"ResetPosition\");\n}\n\nfunction ResetPins() {\n \
    \   for (var pin:GameObject in pins) {\n        pin.BroadcastMessage(\"ResetPosition\"\
    );\n    }\n}\n\nfunction ResetCamera() {\n    Camera.main.SendMessage(\"ResetPosition\"\
    );\n}\n\nfunction ResetEverything() {\n    ResetBall();\n    ResetPins();\n  \
    \  ResetCamera();\n}\n```\n*Listing 7-5. Complete Listing for FuguBowl.js*\n\n\
    ## Bowl for Barrels\n\nCapsules make for simplistic bowling pins, both in appearance\
    \ and in collision shape. A real bowling pin model would be much better, but unfortunately,\
    \ searching for free bowling pins on the Asset Store turns up nothing (although\
    \ that could change at any time if a vendor decides to fill the void). However,\
    \ there are a lot of other models on the Asset Store that, if you’re flexible,\
    \ could act as bowling pin substitutes. It turns out there are several packages\
    \ of barrel models, so you’ll go with barrels as pins for your backup plan.\n\n\
    ### Pick a Barrel\n\nA search for `barrel` on the Asset Store reveals several\
    \ free packages of barrel models (Figure [7-12](#A310332_2_En_7_Chapter.html#Fig12)).\n\
    \n![A310332_2_En_7_Fig12_HTML.jpg](Images/A310332_2_En_7_Fig12_HTML.jpg)\n\n*Figure\
    \ 7-12. Free barrels on the Asset Store*\n\nAny of the free packages will work\
    \ fine, but the Barrel package from Game-Ready, the one displaying two rusty metal\
    \ barrels in its Asset Store icon, already has a prefab set up, so let’s download\
    \ that package. From the Asset Store description and from the Project view after\
