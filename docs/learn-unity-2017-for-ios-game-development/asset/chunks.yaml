  trans: '

    ### 运行下载助手


    双击 `Unity Download Assistant` 图标启动 Unity 安装（图 1-1）。


    ![A310332_2_En_1_Fig1_HTML.jpg](img/A310332_2_En_1_Fig1_HTML.jpg)


    图 1-1. Unity 下载助手


    安装程序将按典型的安装流程进行（步骤列在安装程序窗口左侧），最后，`Applications` 文件夹中会放入一个 `Unity` 文件夹。


    **提示**：如果你恰好是从旧版 Unity 升级，此过程会直接替换旧版本。如果你想保留之前的副本，请先重命名旧文件夹。例如，如果你从 Unity 4.5
    升级到 Unity 5，在执行新安装前，先将 `Unity` 文件夹重命名为 `Unity45`。这样你就可以同时运行两个版本的 Unity。


    Unity 安装文件夹包含 `Unity` 应用程序以及若干相关文件和文件夹（图 1-2）。


    ![A310332_2_En_1_Fig2_HTML.jpg](img/A310332_2_En_1_Fig2_HTML.jpg)


    图 1-2. Unity 安装文件夹


    Unity 安装文件夹中最重要的文件，也是你唯一真正需要的，是 `Unity` 应用程序，它提供了用于构建游戏的环境。该应用程序有时更具体地被称为 Unity
    编辑器，以区别于集成到最终构建中的 Unity 运行时引擎或 Unity 播放器。但通常，当我说“Unity”时，上下文是明确的（我也将 Unity Technologies
    简称为 Unity）。


    `Documentation` 文件夹包含了与 Unity 网站上（“学习”选项卡下）相同的用户手册、组件参考和脚本参考。这些文件每个都可以从 Unity
    的“帮助”菜单中通过网页浏览器打开，你也可以直接双击 `Documentation.html` 来查看文档首页。


    `Standard Packages` 文件夹包含多个以 `.unityPackage` 为扩展名的文件。这些 Unity 包文件各自包含一组 Unity
    资源，并且可以导入到 Unity 中（同时，你也可以从 Unity 中将资源导出到包文件中）。


    `MonoDevelop` 应用程序是 Unity 的默认脚本编辑器，它是用于 Mono 项目的开源 MonoDevelop 编辑器的定制版本，简称 Mono。Mono
    是微软 .NET 框架的一个开源版本，构成了 Unity 脚本系统的基础。


    最后，还有 Unity Bug Reporter 应用程序，它通常从 Unity“帮助”菜单中的“报告错误”项运行。不过，你也可以直接从 Unity 安装文件夹启动
    `Unity Bug Reporter`。如果你遇到了 Unity 甚至无法启动的 bug，这个功能会非常有帮助。


    请务必安装示例项目组件，你将在本书中使用它。在图 1-3 中，我还选择了 WebGL 构建支持组件。如果你也计划为 Windows 电脑构建游戏，请务必安装
    Windows 构建支持组件。现在是个好时机，去喝杯咖啡或茶，或者散散步；根据你选择的选项数量和网络连接速度，下载可能需要一段时间（图 1-4）。


    ![A310332_2_En_1_Fig4_HTML.jpg](img/A310332_2_En_1_Fig4_HTML.jpg)


    图 1-4. 下载并安装消息


    ![A310332_2_En_1_Fig3_HTML.jpg](img/A310332_2_En_1_Fig3_HTML.jpg)


    图 1-3. Unity 组件选择


    ### 欢迎使用 Unity！


    安装 Unity 后，Unity 编辑器窗口将会出现，并带有一个友好的 Unity Hello! 窗口浮于上方（图 1-5）。Hello! 窗口是你可以登录
    Unity 账户的地方。如果你没有 Unity 账户，请选择“创建一个”链接。如果你当前未连接到互联网，可以通过单击“脱机工作”按钮来离线工作。


    ![A310332_2_En_1_Fig5_HTML.jpg](img/A310332_2_En_1_Fig5_HTML.jpg)


    图 1-5. Unity Hello! 窗口


    每次启动 Unity 时，都会出现 Unity Hello! 窗口。如果你尚未创建 Unity 账户，现在就是创建的好时机。


    首次登录后，你将看到 Unity 的“许可证管理”屏幕。如果你已付费购买了授权版本（Plus 或 Pro）的 Unity，请在对话框中输入你的序列号。如果你打算使用
    Unity 的免费版本，请选择 Unity Personal 单选按钮。


    ![A310332_2_En_1_Figa_HTML.jpg](img/A310332_2_En_1_Figa_HTML.jpg)


    ## 管理 Unity


    在正式开始使用 Unity 进行游戏开发之前，现在是个好时机来了解一下 Unity 编辑器中的一些管理功能。


    ### 更换皮肤（Pro 版）


    Unity 编辑器有两种外观：深色或浅色。如果你使用的是 Unity Pro，可以选择使用深色皮肤；如果你使用的是 Unity Personal 版本，则只能看到浅色皮肤（图
    1-6）。


    ![A310332_2_En_1_Fig6_HTML.jpg](img/A310332_2_En_1_Fig6_HTML.jpg)


    图 1-6. Unity 编辑器


    在本书的剩余部分，我将使用浅色皮肤来截取屏幕截图，但除了色调之外，用户界面没有任何区别。要更改此设置（针对 Unity Pro），请在 Unity 菜单中选择“偏好设置”（图
    1-7）。


    ![A310332_2_En_1_Fig7_HTML.jpg](img/A310332_2_En_1_Fig7_HTML.jpg)


    图 1-7. Unity 编辑器中的“偏好设置”菜单项


    打开“偏好设置”窗口后，你可以将皮肤从深色切换为浅色，或从浅色切换为深色。如果你使用的是 Unity Personal，则只能使用浅色皮肤，如图 1-8 中灰显的
    `Editor Skin` 选项所示。


    ![A310332_2_En_1_Fig8_HTML.jpg](img/A310332_2_En_1_Fig8_HTML.jpg)


    图 1-8. Unity 编辑器中的常规偏好设置


    当你在“偏好设置”窗口中时，我建议确保取消勾选“启动时加载上一项目”。这将确保 Unity 在启动时显示项目选择对话框，而不是自动打开最近打开的项目，后者可能很耗时，并且并不总是你想要的。特别是，在准备好之前，你不想意外地将项目升级到新版本的
    Unity。


    单个 Unity 许可证可用于两台机器。早期，当 Unity 编辑器仅在 macOS 上运行时，一个 Unity 许可证仅适用于一台机器，但在添加了对 Windows
    版 Unity 编辑器的支持后，该数量增加到两台。

    '
- fmt: '### Report Problems


    If you use Unity for a significant period of time, you’ll certainly encounter
    bugs, real or imagined. That’s not a knock on Unity. The 3D game engines are very
    complicated, at least internally, and the pace of their development is remarkable.
    (I started with Unity 1.6 when it ran only on macOS and deployed builds only for
    Windows and macOS.) Bugs don’t fix themselves, especially when they’re not reported.
    That’s where the `Unity Bug Reporter` comes in. As I mentioned when going over
    the Unity installation files, the `Bug Reporter` is available in the Unity folder
    but normally is launched from the Help menu in the Unity Editor (Figure [1-9](#A310332_2_En_1_Chapter.html#Fig9)).


    ![A310332_2_En_1_Fig9_HTML.jpg](Images/A310332_2_En_1_Fig9_HTML.jpg)


    Figure 1-9. The Report a Bug option in the Help menu


    The `Bug Reporter`, as you can see in the list of files in the Unity installation,
    is a separate application from the Unity Editor. So if you encounter a bug that
    prevents the Unity Editor from starting up properly, you can always launch the
    `Bug Reporter` directly by double-clicking that file in the Finder.


    The resulting `Unity Bug Reporter` window (Figure [1-10](#A310332_2_En_1_Chapter.html#Fig10))
    prompts you to select where the bug occurs (in the Unity Editor or in the Unity
    Player, i.e., a deployed build), specify the frequency of the bug’s occurrence,
    and specify an e-mail address to which Unity Technologies will send responses
    about this bug.


    ![A310332_2_En_1_Fig10_HTML.jpg](Images/A310332_2_En_1_Fig10_HTML.jpg)


    Figure 1-10. The Unity Bug Reporter window


    Below that, in the middle of the window, is the list of attachments. Unity automatically
    starts off this list with the current project, and you might include supplemental
    files such as screenshots or log files. You can remove the current project from
    this list, but normally you should include the project so that Unity support can
    reproduce the problem.


    By the same token, you should fill in the problem description with a detailed
    enough explanation that Unity support would know how to replicate the undesired
    behavior and understand why it’s undesired. Basically, you want to avoid responses
    in the mode of “We can’t reproduce the problem” and “This is not a bug. It’s by
    design.”


    Shortly after submitting a bug report, you should receive an e-mail confirmation
    from Unity Technologies with a case number and a link to a copy of the report
    in the Unity bug database, which you can check to see the status of the bug.


    ### Check for Updates


    If you’re lucky, your bug report will result in a fix. If you’re really lucky,
    that fix will show up in the next Unity update. You can always check whether there’s
    a new update by selecting the `Check for Updates` command from the Window menu
    on the menu bar. The resulting window will display whether an update is available
    (Figure [1-11](#A310332_2_En_1_Chapter.html#Fig11)).


    ![A310332_2_En_1_Fig11_HTML.jpg](Images/A310332_2_En_1_Fig11_HTML.jpg)


    Figure 1-11. The Unity Editor update check


    Notice the version number displayed in Figure [1-11](#A310332_2_En_1_Chapter.html#Fig11)
    is Unity 5.6.2f1. The suffix represents the most granular releases, including
    emergency hot fixes. Out of some caution, Unity Technologies usually doesn’t make
    newly released updates immediately available to the Editor update check, so if
    you’re waiting anxiously for a bug-fix update, you can always check the Unity
    web site, too.


    ## Explore Further


    My favorite technical books, like Peter van der Linden’s Just Java (a detailed
    but easygoing introduction to Java for nonprogrammers), provide a nice break at
    the end of each chapter by reciting an interesting anecdote, a bit of trivia,
    or some relevant history. Alas, I won’t be doing that in this book. However, I
    do find simple chapter summaries and recaps dull (I always skip them as a reader),
    and I feel one of the major challenges facing new Unity developers is that they
    need to get in the habit of finding Unity information on their own, and they need
    to know where to find that information, which isn’t always easy!


    Therefore, at the end of each chapter, including this one, I’ll direct you to
    documentation and other resources related to the topics you just learned so you’ll
    know where to find the definitive and comprehensive information sources and can
    take things further when you’ve finished this book. I’ll focus on the official
    Unity manuals and the Unity web site but also mention some third-party resources.
    So now that you have Unity installed, before putting it to use in this book, take
    a break and browse the web sites and reference documentation that you will surely
    be utilizing heavily from now on. It’s always a good idea to figure out where
    to find what you need before you need it!


    ### iOS Development Requirements


    At the beginning of this chapter, I mentioned it’s a good idea to get the ball
    rolling on downloading Xcode and registering for the Apple Developer Program.


    Requirements for iOS development, including required hardware and details about
    the Apple Developer Program, are listed on Apple’s developer support page (`http://developer.apple.com/support`).


    You can find information about Xcode requirements and downloading Xcode at `http://developer.apple.com/xcode`.


    ### The Unity Web Site


    Along with the growth of Unity features and platforms, the Unity web site (`http://unity3d.com/`)
    has grown, too. It’s all worth browsing, but in particular, for general information
    about Unity, check out the FAQ section on the Unity web site (`http://unity3d.com/unity/faq`).


    Many instructional videos are available on the Unity Video archive (`http://video.unity3d.com/`),
    and Unity has recently introduced a Learn tab on its web site for easy access
    to documentation and tutorials.


    ### The Unity Community


    The first three items in the middle of the Unity Help menu are links to the official
    Unity community sites. The forum (`http://forum.unity3d.com`) is where users can
    bring up just about anything related to Unity (the forum does have moderators,
    though).


    The Unity Answers site (`http://answers.unity3d.com/`) follows the format of Stack
    Exchange and provides some quality control over questions and answers. The Unity
    Feedback site (`http://feedback.unity3d.com`) allows users to post feature requests
    and vote on feature requests, whether they’re their own or posted by someone else.


    Tip: Although the bug type selector offers Feature Request as a type of bug, Unity
    encourages everyone to submit feature requests to its Feedback site.


    Welcome to the Unity community!'
