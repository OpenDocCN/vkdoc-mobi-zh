    corner of the area (Figure [2-23](#A310332_2_En_2_Chapter.html#Fig23)). The Close
    Tab item removes the currently displayed view. The Add Tab item provides a list
    of new views for you to choose from.


    ![A310332_2_En_2_Fig23_HTML.jpg](Images/A310332_2_En_2_Fig23_HTML.jpg)


    Figure 2-23.


    Layouts available


    You may want to have different layouts for different target platforms, or different
    layouts for development vs. play testing, or even different layouts for different
    games. For example, I have a custom layout specifically for HyperBowl that preserves
    the Game View in a suitable portrait aspect ratio. It would be a hassle to manually
    reconfigure the Editor every time you start up Unity. Fortunately, you can name
    and save layouts by selecting the Save Layout option in the layout menu, which
    will prompt you for the new layout name (Figure [2-24](#A310332_2_En_2_Chapter.html#Fig24)).


    ![A310332_2_En_2_Fig24_HTML.jpg](Images/A310332_2_En_2_Fig24_HTML.jpg)


    Figure 2-24.


    Prompt for new layout


    After saving, the new layout will be listed in the layout menu and also in the
    list of layouts available for deletion if you select Delete Layout (Figure [2-25](#A310332_2_En_2_Chapter.html#Fig25)).


    ![A310332_2_En_2_Fig25_HTML.jpg](Images/A310332_2_En_2_Fig25_HTML.jpg)


    Figure 2-25.


    Deletion menu for layouts


    If you’ve messed up or deleted the original layouts, you can select the Restore
    Factory Settings option in the area menu (Figure [2-26](#A310332_2_En_2_Chapter.html#Fig26)).
    This will also delete any custom layouts.


    ![A310332_2_En_2_Fig26_HTML.jpg](Images/A310332_2_En_2_Fig26_HTML.jpg)


    Figure 2-26.


    Restore original layout settings


    If you change a layout and haven’t saved the changes, you can always discard them
    by just reselecting that layout in the layout menu.


    ## The Inspector View


    The best view to describe in detail first is the Inspector View, since its function
    is to display information about objects selected in other views. It’s really more
    than an inspector, since it can typically be used to modify the selected item.


    The Inspector View is also used to display and adjust the various settings that
    can be brought up in the Edit menu. For example, you might notice that the Assets
    folder in the Climber Project has a lot of files with a .meta extension , as shown
    in Figure [2-27](#A310332_2_En_2_Chapter.html#Fig27). In fact, there is one of
    these files for each asset file. Unity tracks the assets in a project using these
    meta files, which are in text format to facilitate use with version control systems
    like Perforce and Subversion (or newer distributed version control systems like
    Git and Mercurial).


    ![A310332_2_En_2_Fig27_HTML.jpg](Images/A310332_2_En_2_Fig27_HTML.jpg)


    Figure 2-27.


    The meta files in the Climber project


    But if you aren’t using a version control system you can turn off version control
    compatibility in the Editor Settings and get rid of those unsightly files. Bring
    up the Editor Settings by going to the Edit menu and selecting Editor Settings
    from the Settings submenu (Figure [2-28](#A310332_2_En_2_Chapter.html#Fig28)).


    ![A310332_2_En_2_Fig28_HTML.jpg](Images/A310332_2_En_2_Fig28_HTML.jpg)


    Figure 2-28.


    Bringing up the Editor Settings


    Now the Inspector View displays the Editor Settings . If the project currently
    has meta files, then the Version Control Mode is set to Meta Files (and if you’re
    using the Asset Server, this option is set to Asset Server). To remove the meta
    files, set the Version Control Mode to Disabled (Figure [2-29](#A310332_2_En_2_Chapter.html#Fig29)).


    ![A310332_2_En_2_Fig29_HTML.jpg](Images/A310332_2_En_2_Fig29_HTML.jpg)


    Figure 2-29.


    Editor Settings in the Inspector View


    With the Version Control Mode set to Disabled , Unity will remove the meta files
    (Figure [2-30](#A310332_2_En_2_Chapter.html#Fig30)). The asset tracking is now
    handled within binary files inside the Library folder of the project.


    Note


    Unity users who are using meta files for version control support also have the
    option of setting Asset Serialization Mode to Force Text. In that mode, Unity
    scene files are saved in a text-only YAML (YAML Ain’t Markup Language) format.


    ![A310332_2_En_2_Fig30_HTML.jpg](Images/A310332_2_En_2_Fig30_HTML.jpg)


    Figure 2-30.


    The Climber project folder minus the meta files


    Normally, the Inspector View displays the properties of the most recently selected
    object (when you bring up the Editor Settings, you really selected it). But sometimes
    you don’t want the Inspector View to change while you’re selecting other objects.
    In that case, you can pin the Inspector View to an object by selecting the Lock
    option in the menu at the top right of the view (Figure [2-31](#A310332_2_En_2_Chapter.html#Fig31)).


    ![A310332_2_En_2_Fig31_HTML.jpg](Images/A310332_2_En_2_Fig31_HTML.jpg)


    Figure 2-31.


    Locking the Inspector View


    ## The Project View


    While the Inspector View can be thought of as the lowest-level View in the Editor,
    since it displays the properties of just a single object, the Project View, can
    be considered the highest-level view (Figure [2-32](#A310332_2_En_2_Chapter.html#Fig32)).
    The Project View displays all of the assets available for your game, ranging from
    individual models, textures and scripts to the scene files which incorporate those
    assets. All of the project assets are files residing in the Assets folder of your
    project (so I actually think of the Project View as the Assets View).


    ![A310332_2_En_2_Fig32_HTML.jpg](Images/A310332_2_En_2_Fig32_HTML.jpg)


    Figure 2-32.


    Top level of the Project view


    ### Switch Between One-Column and Two-Columns


    Before Unity 5, the Project View had only a one-column display. That option is
    still available in the menu for the Project View (click the little three-line
    icon at the top right of the view), so you can now switch between one and two
    columns.


    Notice how the Project View Climber project (Figure [2-32](#A310332_2_En_2_Chapter.html#Fig32))
    resembles how the project’s Assets folder looks in the Finder (see Figure [2-30](#A310332_2_En_2_Chapter.html#Fig30)).
    It actually looks more like a Windows file view, where you navigate the folder
    hierarchy in the panel on the left and view the contents of the selected folder
    in the right panel.


    ### Scale Icons


    The slider on the bottom scales the view in the right panel—a larger scale is
    nice for textures and smaller is better for items like scripts that don’t have
    interesting icons. This is a good reason to partition assets by asset type (i.e.,
    put all textures in a Textures folders, scripts in a Script folder, and so on).
    Chances are, a single-scale slider setting won’t be good for a mixture of asset
    types.


    ### Inspect Assets


    Selecting an asset on the right will display the properties of that asset in the
    Inspector View. For example, if you select a sound sample, the Inspector View
    displays information about the sound format, some of which you can change, like
    the compression, and it even lets you play the audio in the Editor (Figure [2-33](#A310332_2_En_2_Chapter.html#Fig33)).
    I’ll explain the sound properties in a later chapter, but for now feel free to
    select various types of assets in the Project View and see what shows up in the
    Inspector View.


    ![A310332_2_En_2_Fig33_HTML.jpg](Images/A310332_2_En_2_Fig33_HTML.jpg)


    Figure 2-33.


    Inspecting a selected asset in the Project View'
  trans: '

    ### 添加和移除视图


    你也可以利用每个区域右上角的菜单来添加或移除该区域内的视图（图 2-23）。`Close Tab`（关闭标签）选项用于移除当前显示的视图。`Add Tab`（添加标签）选项则提供一个新视图列表供你选择。


    ![A310332_2_En_2_Fig23_HTML.jpg](img/A310332_2_En_2_Fig23_HTML.jpg)


    图 2-23. 可用的布局


    你可能希望为不同的目标平台设置不同的布局，或者为开发阶段和试玩测试阶段设置不同的布局，亦或是针对不同的游戏设置不同的布局。例如，我就有一个专门为 HyperBowl
    定制的布局，该布局将游戏视图调整为合适的竖屏宽高比。如果每次启动 Unity 都要手动重新配置编辑器，那将非常麻烦。幸运的是，你可以通过选择布局菜单中的 `Save
    Layout`（保存布局）选项来为布局命名并保存，系统会提示你输入新布局的名称（图 2-24）。


    ![A310332_2_En_2_Fig24_HTML.jpg](img/A310332_2_En_2_Fig24_HTML.jpg)


    图 2-24. 新布局命名提示


    保存后，新布局将出现在布局菜单中，并且当你选择 `Delete Layout`（删除布局）时，它也会出现在可供删除的布局列表中（图 2-25）。


    ![A310332_2_En_2_Fig25_HTML.jpg](img/A310332_2_En_2_Fig25_HTML.jpg)


    图 2-25. 布局删除菜单


    如果你搞乱了或误删了原始布局，可以选取区域菜单中的 `Restore Factory Settings`（恢复出厂设置）选项（图 2-26）。该操作同样会删除所有自定义布局。


    ![A310332_2_En_2_Fig26_HTML.jpg](img/A310332_2_En_2_Fig26_HTML.jpg)


    图 2-26. 恢复原始布局设置


    如果你修改了一个布局但尚未保存更改，只需在布局菜单中重新选择该布局即可丢弃所有更改。


    ## 检视器视图


    首先值得详细描述的是`检视器视图`，因为它的功能是显示在其他视图中选中的对象的信息。它的功能实际上远超“检视器”，因为它通常还可以用来修改选中的项目。


    `检视器视图`也用于显示和调整可从`编辑`菜单中调出的各种设置。例如，你可能会注意到 Climber 项目中的 `Assets` 文件夹里有很多带有 `.meta`
    扩展名的文件，如图 2-27 所示。事实上，每个资源文件都对应一个这样的文件。Unity 使用这些元文件来追踪项目中的资源，这些文件是文本格式，便于配合 Perforce
    和 Subversion（或更新的分布式版本控制系统如 Git 和 Mercurial）这类版本控制系统使用。


    ![A310332_2_En_2_Fig27_HTML.jpg](img/A310332_2_En_2_Fig27_HTML.jpg)


    图 2-27. Climber 项目中的元文件


    但如果你没有使用版本控制系统，你可以在`编辑器设置`中关闭版本控制兼容性，从而移除这些不美观的文件。通过进入`编辑`菜单，然后从`设置`子菜单中选择`编辑器设置`来打开`编辑器设置`（图
    2-28）。


    ![A310332_2_En_2_Fig28_HTML.jpg](img/A310332_2_En_2_Fig28_HTML.jpg)


    图 2-28. 打开编辑器设置


    现在，`检视器视图`会显示`编辑器设置`。如果项目当前包含元文件，那么`版本控制模式`会设置为 `Meta Files`（如果你正在使用`资源服务器`，此选项则设置为
    `Asset Server`）。要移除元文件，请将`版本控制模式`设置为 `Disabled`（禁用）（图 2-29）。


    ![A310332_2_En_2_Fig29_HTML.jpg](img/A310332_2_En_2_Fig29_HTML.jpg)


    图 2-29. 检视器视图中的编辑器设置


    将`版本控制模式`设置为 `Disabled` 后，Unity 将移除元文件（图 2-30）。资源追踪现在由项目 `Library` 文件夹内的二进制文件处理。


    注意：使用元文件进行版本控制的 Unity 用户也可以将`资源序列化模式`设置为 `Force Text`。在该模式下，Unity 场景文件会以纯文本的 YAML（YAML
    Ain’t Markup Language）格式保存。


    ![A310332_2_En_2_Fig30_HTML.jpg](img/A310332_2_En_2_Fig30_HTML.jpg)


    图 2-30. 移除元文件后的 Climber 项目文件夹


    通常情况下，`检视器视图`显示的是最近选中对象的属性（当你打开`编辑器设置`时，你实际上相当于选中了它）。但有时，在选中其他对象时，你并不希望`检视器视图`随之改变。在这种情况下，你可以通过选取视图右上角菜单中的
    `Lock`（锁定）选项，将`检视器视图`固定到某个对象上（图 2-31）。


    ![A310332_2_En_2_Fig31_HTML.jpg](img/A310332_2_En_2_Fig31_HTML.jpg)


    图 2-31. 锁定检视器视图


    ## 项目视图


    如果说`检视器视图`可以被看作是编辑器中层级最低的视图（因为它只显示单个对象的属性），那么`项目视图`则可以被视为层级最高的视图（图 2-32）。`项目视图`显示游戏可用的所有资源，从单独的模型、纹理和脚本，到整合了这些资源的场景文件。项目中所有这些资源都位于你项目的
    `Assets` 文件夹内（因此，我实际上认为`项目视图`就是`资源视图`）。


    ![A310332_2_En_2_Fig32_HTML.jpg](img/A310332_2_En_2_Fig32_HTML.jpg)


    图 2-32. 项目视图的顶层


    ### 单列与双列切换


    在 Unity 5 之前，`项目视图`只有单列显示。该选项在`项目视图`的菜单中仍然可用（点击视图右上角的小三线图标），因此你现在可以在单列和双列之间切换。


    注意 Climber 项目的`项目视图`（图 2-32）看起来与项目的 `Assets` 文件夹在访达中的显示方式（见图 2-30）颇为相似。实际上，它更像
    Windows 的文件视图，你可以在左侧面板中浏览文件夹层级，在右侧面板中查看所选文件夹的内容。


    ### 缩放图标


    底部的滑块可以缩放右侧面板的视图——较大的缩放比例适合查看纹理，较小的缩放比例更适合查看脚本等图标不丰富的项目。这也是按资源类型对资源进行分区的一个好理由（即，将所有纹理放入
    `Textures` 文件夹，脚本放入 `Scripts` 文件夹，依此类推）。因为对于混合资源类型，单一缩放比例的滑块设置很可能无法同时满足所有需求。


    ### 检查资源


    在右侧选中一个资源会在`检视器视图`中显示该资源的属性。例如，如果你选中一个声音样本，`检视器视图`会显示关于声音格式的信息，其中部分属性（比如压缩设置）是可以更改的，甚至还可以让你在编辑器中播放该音频（图
    2-33）。我将在后续章节中讲解声音属性，但现在，你可以自由地在`项目视图`中选择各种类型的资源，看看它们在`检视器视图`中会显示什么。


    ![A310332_2_En_2_Fig33_HTML.jpg](img/A310332_2_En_2_Fig33_HTML.jpg)


    图 2-33. 在项目视图中检查选中的资源

