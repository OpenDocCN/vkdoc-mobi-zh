- fmt: "### Rotate the Transform\n\nMoving a `GameObject` at runtime requires changing\
    \ its `Transform` component. Rotating the `GameObject` specifically requires changing\
    \ the `Rotation` value in its `Transform` component. Replacing the contents of\
    \ the `FuguRotate` script with the code in Listing [4-5](#A310332_2_En_4_Chapter.html#Par62)\
    \ will do the trick.\n\n```\n#pragma strict\nvar speed:float = 10.0; // controls\
    \ how fast we rotate\nfunction Start () {\nvar object:GameObject = this.gameObject;\n\
    Debug.Log(\"Start called on GameObject \"+object.name);\n}\n// rotate around the\
    \ object's y axis\nfunction Update () {\n//Debug.Log(\"Update called at time \"\
    +Time.time);\ntransform.Rotate(Vector3.up*speed*Time.deltaTime);\n}\nListing 4-5.\n\
    FuguRotate.js Script with Rotation Code in Update\n```\n\nLet’s go through the\
    \ new code. First, any line starting with `//` is a comment and not executed as\
    \ code. This is a convenient way to deactivate a line of code without deleting\
    \ it from the file. Comments can also be added within `/*` and `*/`, which is\
    \ useful for multiline comments.\n\n**Note**: Some will say code should be written\
    \ well enough to be self-explanatory, but as a basic rule of thumb, if the intent\
    \ of the code is not obvious, add a comment. I’ve wasted plenty of time trying\
    \ to remember why I wrote some code the way I did. The `speed` variable controls\
    \ how fast the object rotates, and since it’s declared as a public instance variable,\
    \ it’s available as an adjustable property in the Inspector view.\n\nYou could\
    \ have just typed `var speed=10.0` instead of `var speed:float=10.0`. The compiler\
    \ can infer that `speed` must be of type `float` since it’s initialized with a\
    \ floating-point number (this is known as *type inference*), but it’s better to\
    \ be as clear as you can, not just for the Unity compiler but also for any human\
    \ reading the code, including yourself! The variable `speed` is used in the `Update`\
    \ function, which calls the `Rotate` function defined in the `Transform` class.\
    \ `Rotate` takes a `Vector3` as an argument and interprets its `x`, `y`, `z` values\
    \ as Euler angles (rotation, in degrees, around the `GameObject`’s x-, y-, and\
    \ z-axes). A vector represents a direction and magnitude, but it’s common in game\
    \ engines to use the vector data structure to represent Euler angles.\n\n**Note**:\
    \ The movie *Despicable Me* has as good a definition of a vector as any: “I go\
    \ by Vector. It’s a mathematical term, represented by an arrow with both direction\
    \ and magnitude. Vector! That’s me, because I commit crimes with both direction\
    \ and magnitude. Oh yeah!”\n\n`Vector3.up` is a conveniently defined `Vector3`\
    \ with values `(0,1,0)`, so the `Update` function is rotating around the y-axis\
    \ by `speed * Time.deltaTime` degrees. `Time.deltaTime` is the elapsed time since\
    \ the last frame, in seconds, so, effectively, you’re rotating by `speed` degrees\
    \ per second. In `Update` callbacks, you almost always want to multiply any continuous\
    \ change by `Time.deltaTime` so that your game behavior does not fluctuate with\
    \ differences in frame rate. If the multiplication by `Time.deltaTime` was omitted,\
    \ the `FuguRotate` script would rotate objects twice as slow on any machine that’s\
    \ running two times slower.\n\nAs intended, the variable `speed` shows up in the\
    \ Inspector view, and you can edit it (Figure [4-22](#A310332_2_En_4_Chapter.html#Fig22)).\n\
    \n![A310332_2_En_4_Fig22_HTML.jpg](Images/A310332_2_En_4_Fig22_HTML.jpg)  \n**Figure\
    \ 4-22.** The Inspector view of the `FuguRotate` script with adjustable `speed`\n\
    \nIf you click Play, the cube now spins at a moderate rate, and continuous change\
    \ in the `Transform` component’s y `Rotation` value will be displayed in the Inspector\
    \ view. You can edit the `Speed` value of the `FuguRotate` script in the Inspector\
    \ to slow it down or speed it up.\n\n### Other Ways to Rotate\n\n`Transform.Rotate`\
    \ is a good example of why you should read the Scripting Reference for every function\
    \ you encounter. It turns out `Transform.Rotate` is an overloaded function, meaning\
    \ it has variations with different parameters.\n\n**Note**: The term *parameter*\
    \ is used when describing the function declaration, and *argument* refers to the\
    \ same value when it’s passed at runtime, but it’s a subtle distinction. Parameter\
    \ and argument can usually be used interchangeably without confusion.\n\nThe documentation\
    \ for `Transform.Rotate` lists several combinations of arguments that it can take.\
    \ Instead of accepting a `Vector3` to rotate around and an angle (in degrees),\
    \ `Transform.Rotate` can take the x-, y-, and z-axis rotations separately. Listing\
    \ [4-6](#A310332_2_En_4_Chapter.html#Par73) shows an alternative version of the\
    \ `Update` function that just passes in the x, y, and z rotations.\n\n```\nfunction\
    \ Update () {\ntransform.Rotate(0,speed*Time.deltaTime,0);\n}\nListing 4-6.\n\
    Version of Transform.Rotate That Takes Rotation in x, y, and z Angles\n```\n\n\
    Or the x, y, and z rotations can be packaged into a `Vector3`, as shown in Listing\
    \ [4-7](#A310332_2_En_4_Chapter.html#Par75).\n\n```\nfunction Update () {\ntransform.Rotate(Vector3(0,speed*Time.deltaTime,0));\n\
    }\nListing 4-7.\nVersion of Transform.Rotate That Takes Rotation in a Vector3\n\
    ```\n\nAlthough a vector has a precise mathematical definition, Unity follows\
    \ a common practice among 3D application programming interfaces of reusing its\
    \ vector data structure to represent anything that has x, y, and z values. For\
    \ example, if you read the Script Reference page on `Transform` (and you should),\
    \ you’ll see the `position`, `rotation`, and `scale` of `Transform` are all `Vector3`\
    \ values.\n\n### Rotate in World Space\n\nEach of the `Transform.Rotate` variations\
    \ also has an optional parameter, which defaults to `Space.Self`. This specifies\
    \ that the rotation takes place around the transform’s (and thus the `GameObject`’s)\
    \ local axes, which correspond to the axis handles you see in the Scene view when\
    \ the `GameObject` is selected. If you specify `Space.World`, as shown in Listing\
    \ [4-9](#A310332_2_En_4_Chapter.html#Par78), the rotation takes place around the\
    \ world axes (the x-, y-, z-axes centered at 0,0,0).\n\n```\nfunction Update ()\
    \ {\ntransform.Rotate(Vector3.up,speed*Time.deltaTime,Space.World);\n}\nListing\
    \ 4-9.\nRotating Around the World Axes\n```\n\n## Children of the Cube\n\nA scene\
    \ with just one cube is not very interesting, so let’s make it slightly more interesting\
    \ by adding more cubes. You could repeatedly create new cubes in the same manner\
    \ as the first one. Or you could save some time by duplicating the existing cube\
    \ (select the cube and then invoke the `Duplicate` command on the Edit menu or\
    \ use the `Command+D` keyboard shortcut). But let’s take this opportunity to learn\
    \ about prefabs."
  raw: '### Rotate the Transform


    Moving a GameObject at runtime requires changing its Transform component. Rotating
    the GameObject specifically requires changing the Rotation value in its Transform
    component. Replacing the contents of the FuguRotate script with the code in Listing
    [4-5](#A310332_2_En_4_Chapter.html#Par62) will do the trick.


    ```

    #pragma strict

    var speed:float = 10.0; // controls how fast we rotate

    function Start () {

    var object:GameObject = this.gameObject;

    Debug.Log("Start called on GameObject "+object.name);

    }

    // rotate around the object''s y axis

    function Update () {

    //Debug.Log("Update called at time "+Time.time);

    transform.Rotate(Vector3.up*speed*Time.deltaTime);

    }

    Listing 4-5.

    FuguRotate.js Script with Rotation Code in Update

    ```


    Let’s go through the new code. First, any line starting with // is a comment and
    not executed as code. This is a convenient way to deactivate a line of code without
    deleting it from the file. Comments can also be added within /* and */, which
    is useful for multiline comments.


    Note


    Some will say code should be written well enough to be self-explanatory, but as
    a basic rule of thumb, if the intent of the code is not obvious, add a comment.
    I’ve wasted plenty of time trying to remember why I wrote some code the way I
    did. The speed variable controls how fast the object rotates, and since it’s declared
    as a public instance variable, it’s available as an adjustable property in the
    Inspector view.


    You could have just typed var speed=10.0 instead of var speed:float=10.0\. The
    compiler can infer that speed must be of type float since it’s initialized with
    a floating-point number (this is known as type inference ), but it’s better to
    be as clear as you can, not just for the Unity compiler but also for any human
    reading the code, including yourself! The variable speed is used in the Update
    function, which calls the Rotate function defined in the Transform class. Rotate
    takes a Vector3 as an argument and interprets its x,y,z values as Euler angles
    (rotation, in degrees, around the GameObject’s x-, y-, and z-axes). A vector represents
    a direction and magnitude, but it’s common in game engines to use the vector data
    structure to represent Euler angles.


    Note


    The movie Despicable Me has as good a definition of a vector as any: “I go by
    Vector. It’s a mathematical term, represented by an arrow with both direction
    and magnitude. Vector! That’s me, because I commit crimes with both direction
    and magnitude. Oh yeah!”


    Vector3.up is a conveniently defined Vector3 with values (0,1,0), so the Update
    function is rotating around the y-axis by speed * Time.deltaTime degrees. Time.deltaTime
    is the elapsed time since the last frame, in seconds, so, effectively, you’re
    rotating by speed degrees per second. In Update callbacks, you almost always want
    to multiply any continuous change by Time.deltaTime so that your game behavior
    does not fluctuate with differences in frame rate. If the multiplication by Time.deltaTime
    was omitted, the FuguRotate script would rotate objects twice as slow on any machine
    that’s running two times slower.


    As intended, the variable speed shows up in the Inspector view , and you can edit
    it (Figure [4-22](#A310332_2_En_4_Chapter.html#Fig22)).


    ![A310332_2_En_4_Fig22_HTML.jpg](Images/A310332_2_En_4_Fig22_HTML.jpg)


    Figure 4-22.


    The Inspector view of the FuguRotate script with adjustable speed


    If you click Play, the cube now spins at a moderate rate, and continuous change
    in the Transform component’s y Rotation value will be displayed in the Inspector
    view. You can edit the Speed value of the FuguRotate script in the Inspector to
    slow it down or speed it up.


    ### Other Ways to Rotate


    Transform.Rotate is a good example of why you should read the Scripting Reference
    for every function you encounter. It turns out Transform.Rotate is an overloaded
    function, meaning it has variations with different parameters .


    Note


    The term parameter is used when describing the function declaration, and argument
    refers to the same value when its passed at runtime, but it’s a subtle distinction.
    Parameter and argument can usually be used interchangeably without confusion.


    The documentation for Transform.Rotate lists several combinations of arguments
    that it can take. Instead of accepting a Vector3 to rotate around and an angle
    (in degrees), Transform.Rotate can take the x-, y-, and z-axis rotations separately.
    Listing [4-6](#A310332_2_En_4_Chapter.html#Par73) shows an alternative version
    of the Update function that just passes in the x, y, and z rotations.


    ```

    function Update () {

    transform.Rotate(0,speed*Time.deltaTime,0);

    }

    Listing 4-6.

    Version of Transform.Rotate That Takes Rotation in x, y, and z Angles

    ```


    Or the x, y, and z rotations can be packaged into a Vector3, as shown in Listing
    [4-7](#A310332_2_En_4_Chapter.html#Par75).


    ```

    function Update () {

    transform.Rotate(Vector3(0,speed*Time.deltaTime,0));

    }

    Listing 4-7.

    Version of Transform.Rotate That Takes Rotation in a Vector3

    ```


    Although a vector has a precise mathematical definition, Unity follows a common
    practice among 3D application programming interfaces of reusing its vector data
    structure to represent anything that has x, y, and z values. For example, if you
    read the Script Reference page on Transform (and you should), you’ll see the position,
    rotation, and scale of Transform are all Vector3 values.


    ### Rotate in World Space


    Each of the Transform.Rotate variations also has an optional parameter, which
    defaults to Space.Self. This specifies that the rotation takes place around the
    transform’s (and thus the GameObject’s) local axes, which correspond to the axis
    handles you see in the Scene view when the GameObject is selected. If you specify
    Space.World, as shown in Listing [4-9](#A310332_2_En_4_Chapter.html#Par78), the
    rotation takes place around the world axes (the x-, y-, z-axes centered at 0,0,0).


    ```

    function Update () {

    transform.Rotate(Vector3.up,speed*Time.deltaTime,Space.World);

    }

    Listing 4-9.

    Rotating Around the World Axes

    ```


    ## Children of the Cube


    A scene with just one cube is not very interesting, so let’s make it slightly
    more interesting by adding more cubes. You could repeatedly create new cubes in
    the same manner as the first one. Or you could save some time by duplicating the
    existing cube (select the cube and then invoke the Duplicate command on the Edit
    menu or use the Command+D keyboard shortcut). But let’s take this opportunity
    to learn about prefabs .'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行翻译。


    以下是翻译后的中文版本：



    ### 旋转变换 (Transform)


    在运行时移动`GameObject`需要更改其`Transform`组件。要专门旋转`GameObject`，则需要更改其`Transform`组件中的`Rotation`值。用清单
    4-5 中的代码替换`FuguRotate`脚本的内容即可实现。


    ```

    #pragma strict

    var speed:float = 10.0; // 控制旋转速度

    function Start () {

    var object:GameObject = this.gameObject;

    Debug.Log("在 GameObject "+object.name+"上调用了 Start 方法");

    }

    // 绕物体的 y 轴旋转

    function Update () {

    //Debug.Log("在时间 "+Time.time+"上调用了 Update 方法");

    transform.Rotate(Vector3.up*speed*Time.deltaTime);

    }

    清单 4-5.

    包含 Update 旋转代码的 FuguRotate.js 脚本

    ```


    我们来过一下新代码。首先，任何以`//`开头的行都是注释，不会作为代码执行。这是一种在不从文件中删除代码的情况下停用某行代码的便捷方式。注释也可以放在`/*`和`*/`之间，这对于多行注释非常有用。


    **注意**：有些人会说代码应该写得足够好，以至于无需解释就能明白其意图，但一个基本经验法则是，如果代码意图不明显，就添加注释。我过去浪费了很多时间来回忆为什么我要以某种方式编写代码。`speed`变量控制物体旋转的速度，由于它被声明为一个公共实例变量，因此在
    Inspector 视图中它作为一个可调节的属性可用。


    你可以直接输入`var speed=10.0`，而不是`var speed:float=10.0`。编译器可以推断出`speed`必须是`float`类型，因为它用一个浮点数初始化了（这被称为*类型推断*），但最好尽可能清晰，这不仅是为了
    Unity 编译器，也是为了任何阅读代码的人，包括你自己！变量`speed`在`Update`函数中使用，该函数调用了`Transform`类中定义的`Rotate`函数。`Rotate`接受一个`Vector3`作为参数，并将其`x`、`y`、`z`值解释为欧拉角（绕`GameObject`的
    x 轴、y 轴和 z 轴的旋转角度，以度为单位）。向量代表方向和大小，但在游戏引擎中，通常使用向量数据结构来表示欧拉角。


    **注意**：电影《神偷奶爸》中对向量的定义非常到位：“我叫 Vector。这是一个数学术语，用带有方向和大小（magnitude）的箭头表示。Vector！那就是我，因为我犯的罪也兼具方向和大小。哦耶！”


    `Vector3.up`是一个便捷定义的`Vector3`，其值为`(0,1,0)`，所以`Update`函数是绕 y 轴旋转`speed * Time.deltaTime`度。`Time.deltaTime`是自上一帧以来经过的时间（以秒为单位），因此，实际上，你每秒旋转`speed`度。在`Update`回调中，你几乎总是希望将任何连续变化乘以`Time.deltaTime`，这样你的游戏行为就不会因帧率差异而波动。如果省略了乘以`Time.deltaTime`的操作，`FuguRotate`脚本在任何运行速度慢两倍的机器上，其旋转物体的速度也会慢两倍。


    正如预期的那样，变量`speed`会显示在 Inspector 视图中，你可以对其进行编辑（图 4-22）。


    ![A310332_2_En_4_Fig22_HTML.jpg](img/A310332_2_En_4_Fig22_HTML.jpg)

    **图 4-22.** `FuguRotate`脚本的 Inspector 视图，显示了可调节的`speed`


    如果你点击 Play，立方体会以适中的速度旋转，并且`Transform`组件的 y`Rotation`值的连续变化会显示在 Inspector 视图中。你可以在
    Inspector 中编辑`FuguRotate`脚本的`Speed`值来减慢或加快旋转速度。


    ### 其他旋转方式


    `Transform.Rotate`是一个很好的例子，说明了为什么你应该阅读你遇到的每个函数的脚本参考手册。事实证明，`Transform.Rotate`是一个重载函数，意味着它具有不同参数的多种变体。


    **注意**：术语*参数 (parameter)* 用于描述函数声明，而*实参 (argument)* 指的是在运行时传递的相同值，但这是一种细微的区别。*参数
    (parameter)* 和 *实参 (argument)* 通常可以互换使用而不会引起混淆。


    `Transform.Rotate`的文档列出了它可以接受的几种实参组合。除了接受一个`Vector3`来指定旋转轴和一个角度（以度为单位）之外，`Transform.Rotate`还可以分别接受
    x 轴、y 轴和 z 轴的旋转量。清单 4-6 展示了`Update`函数的另一个版本，该版本只传入 x、y、z 旋转量。


    ```

    function Update () {

    transform.Rotate(0,speed*Time.deltaTime,0);

    }

    清单 4-6.

    Transform.Rotate 的一个版本，接受 x、y、z 角度作为旋转量

    ```


    或者，x、y、z 旋转量可以打包成一个`Vector3`，如清单 4-7 所示。


    ```

    function Update () {

    transform.Rotate(Vector3(0,speed*Time.deltaTime,0));

    }

    清单 4-7.

    Transform.Rotate 的一个版本，接受一个 Vector3 作为旋转量

    ```


    尽管向量有精确的数学定义，但 Unity 遵循 3D 应用程序接口中的常见做法，即重用其向量数据结构来表示任何具有 x、y、z 值的东西。例如，如果你阅读了`Transform`的脚本参考页面（你应该阅读），你会看到`Transform`的`position`、`rotation`和`scale`都是`Vector3`类型的值。


    ### 在世界空间中旋转


    `Transform.Rotate`的每个变体都有一个可选参数，其默认值为`Space.Self`。这指定旋转是围绕变换（也就是`GameObject`）的局部轴进行的，这些轴对应于在
    Scene 视图中选中`GameObject`时看到的轴手柄。如果你指定了`Space.World`，如清单 4-9 所示，旋转将围绕世界轴（以 0,0,0
    为中心的 x、y、z 轴）进行。


    ```

    function Update () {

    transform.Rotate(Vector3.up,speed*Time.deltaTime,Space.World);

    }

    清单 4-9.

    围绕世界轴旋转

    ```


    ## 立方体的子物体 (Children of the Cube)


    一个场景只有一个立方体并不有趣，所以让我们通过添加更多立方体来让它变得稍微有趣一些。你可以像创建第一个立方体一样重复创建新的立方体。或者，你可以通过复制现有立方体来节省一些时间（选中立方体，然后在
    Edit 菜单上调用`Duplicate`命令，或使用`Command+D`键盘快捷键）。但让我们借此机会来学习一下预置体 (prefabs)。

