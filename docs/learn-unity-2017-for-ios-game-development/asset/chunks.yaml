    ## 编辑器布局


    既然您已经通过 `Climber` 项目体验了 Unity 的测试和构建工作流程，那么我们来更仔细地看看 Unity 编辑器的布局。主窗口被划分为多个区域（我习惯称之为窗格，但这里我称它们为区域，因为这是
    Xcode 中使用的术语）。每个区域可以包含一个或多个标签页视图。通过点击视图的标签页，可以选择该区域默认显示的视图（出厂设置）。视图可以被添加、移动、移除和调整大小，编辑器支持在不同布局之间切换，因此布局本质上是视图的特定排列方式。例如，主窗口的默认布局（图
    2-13）就包含一个同时有 `Scene View`（图 2-14）和 `Game View`（图 2-15）的区域。


    > **注意：** Unity 文档在命名视图方面有些不一致。从名称上看，`Game View` 和 `Scene View` 显然是视图。但 `Console`
    和 `Inspector` 也是视图。在本书中，我会在所有视图的名称中都加上 `View`，以明确它们都是视图，并且可以以相同的方式操作。


    ![A310332_2_En_2_Fig13_HTML.jpg](img/A310332_2_En_2_Fig13_HTML.jpg)


    图 2-13. Unity 编辑器的默认布局


    ![A310332_2_En_2_Fig14_HTML.jpg](img/A310332_2_En_2_Fig14_HTML.jpg)


    图 2-14. 在多标签页区域中选中的 `Scene View`


    ![A310332_2_En_2_Fig15_HTML.jpg](img/A310332_2_En_2_Fig15_HTML.jpg)


    图 2-15. 在多标签页区域中选中的 `Game View`


    ### 预设布局


    默认布局只是几种预设布局之一。可以从主窗口右上角的菜单中选择其他布局（图 2-16）。请尝试一下它们。图 2-17 到 2-20 显示了由此产生的布局。


    ![A310332_2_En_2_Fig16_HTML.jpg](img/A310332_2_En_2_Fig16_HTML.jpg)


    图 2-16. `Layout` 菜单


    稍后我将更详细地描述各种视图类型，但现在请注意，`2-by-3` 布局（图 2-17）是一个示例，其中 `Scene View` 和 `Game View`
    位于不同的区域，而不是共享同一个区域。`4-split` 布局（图 2-18）有四个 `Scene View` 实例（让人联想到计算机辅助设计工具），这表明布局并不限制每种类型的视图只能有一个。


    ![A310332_2_En_2_Fig20_HTML.jpg](img/A310332_2_En_2_Fig20_HTML.jpg)


    图 2-20. `Wide` 布局


    ![A310332_2_En_2_Fig19_HTML.jpg](img/A310332_2_En_2_Fig19_HTML.jpg)


    图 2-19. `Tall` 布局


    ![A310332_2_En_2_Fig18_HTML.jpg](img/A310332_2_En_2_Fig18_HTML.jpg)


    图 2-18. `4-split` 布局


    ![A310332_2_En_2_Fig17_HTML.jpg](img/A310332_2_En_2_Fig17_HTML.jpg)


    图 2-17. `2-by-3` 布局


    ### 自定义布局


    预设布局提供了多种工作区，但幸运的是，您不必完全照搬使用。Unity 提供了足够的灵活性，让您可以根据自己的喜好完全重新排列编辑器窗口。


    #### 调整区域大小


    首先，在尝试各种预设布局时，您可能会注意到某些区域太窄，例如，在 `Wide` 布局（图 2-20）的左侧面板中。幸运的是，您可以点击区域的边框并拖动来调整其大小。


    #### 移动视图


    更酷的是，您可以移动视图。将视图的标签页拖到另一个标签页区域，即可将该视图移动到那里。将标签页拖到一个“停靠”区域则会创建一个新的区域。例如，从 `Default`
    布局开始，将 `Inspector` 标签页拖到 `Hierarchy` 标签页的右侧。现在 `Inspector View` 和 `Hierarchy View`
    共享同一个区域。结果应如图 2-21 所示。


    ![A310332_2_En_2_Fig21_HTML.jpg](img/A310332_2_En_2_Fig21_HTML.jpg)


    图 2-21. 移动视图后自定义的工作区


    #### 分离视图


    您甚至可以将视图拖到编辑器窗口之外，使其位于自己的“浮动”窗口中，该窗口可以像其他任何区域一样被对待。将 `Scene` 标签页拖到编辑器外部，使其位于一个浮动窗口中，然后将
    `Game` 标签页拖到其标签页区域。结果应如图 2-22 所示。同样，将标签页拖到浮动窗口的停靠区域将为该窗口增加另一个区域。


    > **提示：** 我喜欢将 `Game View` 分离到一个浮动窗口中，因为我在编辑器中工作时通常不需要看到它，直到我点击 `Play`，这样我就可以最大化
    `Game View` 使其填满整个屏幕。


    浮动窗口经常被其他窗口覆盖，因此菜单栏上的 `Windows` 菜单中有使每个视图可见的菜单项（图 2-22）。请注意，每个视图都有对应的键盘快捷键，还有一个
    `Layouts` 子菜单，它与编辑器内的布局菜单相同。


    ![A310332_2_En_2_Fig22_HTML.jpg](img/A310332_2_En_2_Fig22_HTML.jpg)


    图 2-22. `Windows` 菜单中的视图列表

