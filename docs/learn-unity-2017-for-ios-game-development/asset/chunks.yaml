- fmt: "# Explore Further\n\nFinally, the scoreboard display makes your bowling game\
    \ a fully functional bowling game, and the addition of a start/pause menu provides\
    \ some of the polish that players expect!\n\nThe addition of the game GUI not\
    \ only completes the bowling game (in a commercial game project, this might be\
    \ considered a “first playable” milestone) but also marks the end of the introduction\
    \ to Unity’s basic features typically used in a 3D game.\n\n**Tip**  \nAlthough\
    \ I left the GUI development to the end of this phase, which is unfortunately\
    \ common in game development, it’s best to include GUI design early in the project.\
    \ Even just sketching out the menus will help clarify the anticipated game modes\
    \ and options.\n\nFor the most part, although you’ve been modifying and testing\
    \ the game solely in the Editor, these are cross-platform features. Right now,\
    \ you could build this game as a web player or a Mac or Windows executable, and\
    \ the game would run the same on all platforms, performance differences aside.\
    \ But the ultimate goal of this book is to get you into iOS development, so, starting\
    \ with the next chapter, the remainder of this book will be all about Unity iOS.\n\
    \n## Unity Manual\n\nThe Game Interface Elements link in the “Creating Gameplay”\
    \ section of the Unity Manual leads to the “Unity Scripting Guide” section, which\
    \ is a tutorial-style sequence of pages going through the UnityGUI system, from\
    \ creating a single button to adding various other UnityGUI controls such as sliders\
    \ and radio buttons, using automatic layout versus fixed layout, creating reusable\
    \ compound controls, and customizing the GUI appearance with styles and skins.\n\
    \nThe “Unity Scripting Guide” also explains how you can customize the Unity Editor\
    \ using UnityGUI. It turns out the Editor interface is actually implemented with\
    \ UnityGUI (which explains why on occasion you may see an `OnGUI` error message\
    \ in the Console view that is not related to any of your code)!\n\n## Reference\
    \ Manual\n\nI briefly mentioned how additional fonts besides the built-in Unity\
    \ font can be imported into a Unity project and then assigned to UnityGUI styles\
    \ and skins. The Reference Manual has a page in its “Asset Components” section\
    \ describing the Font asset and its important options in more detail.\n\n## Scripting\
    \ Reference\n\nNaturally, the “Runtime Classes” list in the Scripting Reference\
    \ includes pages describing the UnityGUI functions you’ve used, starting with\
    \ the `OnGUI` callback defined in the `MonoBehaviour` class.\n\nMost of the UnityGUI\
    \ functions used in both the scoreboard and pause menu are the static `GUI` and\
    \ `GUILayout` functions used to create the various UnityGUI controls, such as\
    \ `GUI.Button` and `GUI.Label`. It’s worth going through the Scripting Reference\
    \ pages for each of them so you know what GUI controls are available, along with\
    \ customization variables like `GUI.color` and `GUI.skin` (and there are others,\
    \ e.g., to customize the background color). `GUIStyle` and `GUISkin` are classes\
    \ too, and you can change their properties any time in a script.\n\nBesides the\
    \ UnityGUI classes, a few others are used in the pause menu. The static variable\
    \ `Time.timeScale` was set to pause and unpause the game; `Application.Quit` was\
    \ called to exit the game; and the `AudioListener`, `QualitySettings`, and `SystemInfo`\
    \ classes were accessed in the Options page.\n\n## Asset Store\n\nThe Necromancer\
    \ GUI looked great in the pause menu, demonstrating how nice UnityGUI can look\
    \ with a well-crafted `GUISkin`, but there are many others on the Asset Store.\
    \ They’re all listed, along with the Necromancer GUI, in the GUI Skins category\
    \ under Textures and Materials. That category is well populated with skins for\
    \ UnityGUI and also skins for third-party GUI systems, such as the popular EZGUI\
    \ from Above and Beyond Software (`http://anbsoft.com/`) and NGUI from Tasharen\
    \ Entertainment (`http://tasharen.com`).\n\nThose third-party GUI systems are\
    \ available in the Scripting category’s well-populated GUI subcategory, which\
    \ is filled with prescripted GUIs such as minimaps and menus. In fact, a version\
    \ of the pause menu implemented in this chapter is on the Asset Store under Complete\
    \ Projects (with the name FuguPause).\n\nThe Asset Store also has a decent assortment\
    \ of fonts listed under the Fonts category of Textures and Materials. But since\
    \ Unity can import TrueType and OpenType fonts, plenty of free font sites on the\
    \ Web are available to you, along with moderately priced font libraries (I use\
    \ the MacXWare Font Library).\n\n# 10. Using Unity iOS\n\nCongratulations! You\
    \ now have a bowling game incorporating the basic features that typically comprise\
    \ a 3D game: 3D graphics (of course), physics, sound effects, player control (of\
    \ the bowling ball), camera movement, and a graphical user interface.\n\nThe default\
    \ built target is listed on the title bar of the Editor window as PC, Mac and\
    \ Linux Standalone. If you were to perform an macOS build of the bowling project\
    \ right now, the game would run essentially the same as it does in the Editor.\
    \ It’s the same for Linux, Windows, and even a web player (although a web player\
    \ build would require you to switch build targets first).\n\nTargeting iOS is\
    \ another story. You could change the build target for the bowling game to iOS\
    \ right now and build it without any compiler errors. But the bowling ball control\
    \ in `FuguForce.js` is designed for mouse input, so that would have to change.\
    \ Besides re-implementing the input handling, adapting desktop PC games to mobile\
    \ devices (a process called porting) often requires adjustments for the device\
    \ display and compromises to achieve adequate performance.\n\nMoreover, building\
    \ an iOS app involves much more in the way of external procedures than the desktop\
    \ stand-alone and web player targets. Because of Apple’s requirement that all\
    \ iOS apps be compiled with Xcode, Unity iOS builds an app by first generating\
    \ an Xcode project, which in turn is compiled by Xcode to create the final app.\
    \ To actually run the app on a test device and submit the app to the App Store,\
    \ a rather complicated sequence of procedures is required, along with registration\
    \ in Apple’s iOS Developer Program. For now, let’s go back to your roots, so to\
    \ speak, and temporarily return to the Climber project that you started with in\
    \ this book. Conveniently, Climber is ready to run on iOS without modification.\
    \ If you have an iOS device, go ahead and download Climber from the App Store.\
    \ A quick way to find the Climber app is to enter Climber in the App Store search\
    \ field, and Angry Bots will appear, along with other apps from Unity Technologies\
    \ (Figure 10-1).\n\n![A310332_2_En_10_Fig1_HTML.jpg](Images/A310332_2_En_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1.** Example apps from the App Store\n\nBesides Climber, you should\
    \ also search and download the Unity Remote app, which acts as a remote control\
    \ for testing a Unity iOS game in the Editor. While you’re at it, you should download\
    \ and try all the example apps from Unity Technologies. Many of them have not\
    \ been updated in a while, but they do provide an idea of what kinds of games\
    \ can be created with Unity.\n\nBefore you can run this game, you will need to\
    \ make one small change. Select File ➤ Build Settings from the main menu. In the\
    \ dialog box you will see that the game is currently set to PC, Mac, & Linux Standalone\
    \ (Figure 10-2). You need to change the target platform to iOS. Select the iOS\
    \ icon option in the Platform menu and then select the Switch Platform button\
    \ (Figure 10-3).\n\n![A310332_2_En_10_Fig3_HTML.jpg](Images/A310332_2_En_10_Fig3_HTML.jpg)\n\
    \n**Figure 10-3.** The Build setting menu set to iOS\n\n![A310332_2_En_10_Fig2_HTML.jpg](Images/A310332_2_En_10_Fig2_HTML.jpg)\n\
    \n**Figure 10-2.** The Build setting menu set to PC, Mac & Linux Standalone\n\n\
    Now you can select build and run this game on an iOS device."
  raw: '## Explore Further


    Finally, the scoreboard display makes your bowling game a fully functional bowling
    game, and the addition of a start/pause menu provides some of the polish that
    players expect!


    The addition of the game GUI not only completes the bowling game (in a commercial
    game project, this might be considered a “first playable” milestone) but also
    marks the end of the introduction to Unity’s basic features typically used in
    a 3D game.


    Tip


    Although I left the GUI development to the end of this phase, which is unfortunately
    common in game development, it’s best to include GUI design early in the project.
    Even just sketching out the menus will help clarify the anticipated game modes
    and options.


    For the most part, although you’ve been modifying and testing the game solely
    in the Editor, these are cross-platform features. Right now, you could build this
    game as a web player or a Mac or Windows executable, and the game would run the
    same on all platforms, performance differences aside. But the ultimate goal of
    this book is to get you into iOS development, so, starting with the next chapter,
    the remainder of this book will be all about Unity iOS.


    ### Unity Manual


    The Game Interface Elements link in the “Creating Gameplay” section of the Unity
    Manual leads to the “Unity Scripting Guide” section, which is a tutorial-style
    sequence of pages going through the UnityGUI system, from creating a single button
    to adding various other UnityGUI controls such as sliders and radio buttons, using
    automatic layout versus fixed layout, creating reusable compound controls, and
    customizing the GUI appearance with styles and skins.


    The “Unity Scripting Guide” also explains how you can customize the Unity Editor
    using UnityGUI. It turns out the Editor interface is actually implemented with
    UnityGUI (which explains why on occasion you may see an OnGUI error message in
    the Console view that is not related to any of your code)!


    ### Reference Manual


    I briefly mentioned how additional fonts besides the built-in Unity font can be
    imported into a Unity project and then assigned to UnityGUI styles and skins.
    The Reference Manual has a page in its “Asset Components” section describing the
    Font asset and its important options in more detail.


    ### Scripting Reference


    Naturally, the “Runtime Classes” list in the Scripting Reference includes pages
    describing the UnityGUI functions you’ve used, starting with the OnGUI callback
    defined in the MonoBehaviour class.


    Most of the UnityGUI functions used in both the scoreboard and pause menu are
    the static GUI and GUILayout functions used to create the various UnityGUI controls,
    such as GUI.Button and GUI.Label. It’s worth going through the Scripting Reference
    pages for each of them so you know what GUI controls are available, along with
    customization variables like GUI.color and GUI.skin (and there are others, e.g.,
    to customize the background color). GUIStyle and GUISkin are classes too, and
    you can change their properties any time in a script.


    Besides the UnityGUI classes, a few others are used in the pause menu. The static
    variable Time.timeScale was set to pause and unpause the game; Application.Quit
    was called to exit the game; and the AudioListener, QualitySettings, and SystemInfo
    classes were accessed in the Options page.


    ### Asset Store


    The Necromancer GUI looked great in the pause menu, demonstrating how nice UnityGUI
    can look with a well-crafted GUISkin, but there are many others on the Asset Store.
    They’re all listed, along with the Necromancer GUI, in the GUI Skins category
    under Textures and Materials. That category is well populated with skins for UnityGUI
    and also skins for third-party GUI systems, such as the popular EZGUI from Above
    and Beyond Software ( [`http://anbsoft.com/`](http://anbsoft.com/) ) and NGUI
    from Tasharen Entertainment ( [`http://tasharen.com`](http://tasharen.com) ).


    Those third-party GUI systems are available in the Scripting category’s well-populated
    GUI subcategory, which is filled with prescripted GUIs such as minimaps and menus.
    In fact, a version of the pause menu implemented in this chapter is on the Asset
    Store under Complete Projects (with the name FuguPause).


    The Asset Store also has a decent assortment of fonts listed under the Fonts category
    of Textures and Materials. But since Unity can import TrueType and OpenType fonts,
    plenty of free font sites on the Web are available to you, along with moderately
    priced font libraries (I use the MacXWare Font Library).


    # 10. Using Unity iOS


    Congratulations! You now have a bowling game incorporating the basic features
    that typically comprise a 3D game: 3D graphics (of course), physics, sound effects,
    player control (of the bowling ball), camera movement, and a graphical user interface
    .


    The default built target is listed on the title bar of the Editor window as PC,
    Mac and Linux Standalone. If you were to perform an macOS build of the bowling
    project right now, the game would run essentially the same as it does in the Editor.
    It’s the same for Linux, Windows, and even a web player (although a web player
    build would require you to switch build targets first).


    Targeting iOS is another story. You could change the build target for the bowling
    game to iOS right now and build it without any compiler errors. But the bowling
    ball control in `FuguForce.js` is designed for mouse input, so that would have
    to change. Besides re-implementing the input handling, adapting desktop PC games
    to mobile devices (a process called porting ) often requires adjustments for the
    device display and compromises to achieve adequate performance.


    Moreover, building an iOS app involves much more in the way of external procedures
    than the desktop stand-alone and web player targets. Because of Apple’s requirement
    that all iOS apps be compiled with Xcode, Unity iOS builds an app by first generating
    an Xcode project, which in turn is compiled by Xcode to create the final app.
    To actually run the app on a test device and submit the app to the App Store,
    a rather complicated sequence of procedures is required, along with registration
    in Apple’s iOS Developer Program. For now, let’s go back to your roots, so to
    speak, and temporarily return to the Climber project that you started with in
    this book. Conveniently, Climber is ready to run on iOS without modification.
    If you have an iOS device, go ahead and download Climber from the App Store. A
    quick way to find the Climber app is to enter Climber in the App Store search
    field, and Angry Bots will appear, along with other apps from Unity Technologies
    (Figure [10-1](#A310332_2_En_10_Chapter.html#Fig1)).


    ![A310332_2_En_10_Fig1_HTML.jpg](Images/A310332_2_En_10_Fig1_HTML.jpg)


    Figure 10-1.


    Example apps from the App Store


    Besides Climber, you should also search and download the Unity Remote app, which
    acts as a remote control for testing a Unity iOS game in the Editor. While you’re
    at it, you should download and try all the example apps from Unity Technologies.
    Many of them have not been updated in a while, but they do provide an idea of
    what kinds of games can be created with Unity.


    Before you can run this game, you will need to make one small change. Select File
    ➤ Build Settings from the main menu. In the dialog box you will see that the game
    is currently set to PC, Mac, & Linux Standalone (Figure [10-2](#A310332_2_En_10_Chapter.html#Fig2)).
    You need to change the target platform to iOS. Select the iOS icon option in the
    Platform menu and then select the Switch Platform button (Figure [10-3](#A310332_2_En_10_Chapter.html#Fig3)).


    ![A310332_2_En_10_Fig3_HTML.jpg](Images/A310332_2_En_10_Fig3_HTML.jpg)


    Figure 10-3.


    The Build setting menu set to iOS


    ![A310332_2_En_10_Fig2_HTML.jpg](Images/A310332_2_En_10_Fig2_HTML.jpg)


    Figure 10-2.


    The Build setting menu set to PC, Mac & Linux Standalone


    Now you can select build and run this game on an iOS device.'
  trans: "\n# 更进一步\n\n最后，计分板的显示让你的保龄球游戏成为了一款功能完整的保龄球游戏，而开始/暂停菜单的加入则提供了玩家所期望的一些细节打磨！\n\
    \n游戏图形界面的加入不仅完善了保龄球游戏（在商业游戏项目中，这或许可被视为“首次可玩”的里程碑），也标志着对 Unity 3D 游戏常用基础功能介绍的结束。\n\
    \n**提示**  \n尽管我将图形界面开发留到了这个阶段的最后，这在游戏开发中不幸很常见，但最好在项目早期就包含图形界面设计。哪怕只是画出菜单的草图，也有助于厘清预期的游戏模式和选项。\n\
    \n在大多数情况下，尽管你一直在编辑器中修改和测试游戏，但这些功能都是跨平台的。现在，你可以将此游戏构建为网页播放器、Mac 或 Windows 可执行文件，并且游戏在所有平台上的运行表现将基本一致（性能差异除外）。但本书的最终目标是让你进入\
    \ iOS 开发领域，因此，从下一章开始，本书的剩余内容将全部围绕 Unity iOS 展开。\n\n## Unity 手册\n\nUnity 手册中“创建游戏玩法”部分的“游戏界面元素”链接，指向了“Unity\
    \ 脚本指南”部分。该部分是一系列教程风格的页面，详细讲解了 UnityGUI 系统，从创建单个按钮到添加各种其他 UnityGUI 控件（如滑块和单选按钮），从使用自动布局与固定布局，到创建可复用的复合控件，以及使用样式和皮肤自定义\
    \ GUI 外观。\n\n“Unity 脚本指南”还解释了如何使用 UnityGUI 来自定义 Unity 编辑器。事实证明，编辑器界面实际上就是用 UnityGUI\
    \ 实现的（这也解释了为什么有时你会在控制台视图中看到与你的任何代码无关的 `OnGUI` 错误信息）。\n\n## 参考手册\n\n我简要提过，除了 Unity\
    \ 内置字体之外，其他字体也可以导入到 Unity 项目中，然后分配给 UnityGUI 样式和皮肤。参考手册在其“资源组件”部分有一个页面，更详细地描述了字体资源及其重要选项。\n\
    \n## 脚本参考\n\n自然，脚本参考中的“运行时类”列表包含了描述你所使用的 UnityGUI 函数的页面，首先是 `MonoBehaviour` 类中定义的\
    \ `OnGUI` 回调。\n\n在计分板和暂停菜单中使用的大部分 UnityGUI 函数，都是用于创建各种 UnityGUI 控件的静态 `GUI` 和\
    \ `GUILayout` 函数，例如 `GUI.Button` 和 `GUI.Label`。值得逐一查阅这些函数的脚本参考页面，以便了解有哪些 GUI 控件可用，以及像\
    \ `GUI.color` 和 `GUI.skin` 这样的自定义变量（还有其他变量，例如用于自定义背景颜色的）。`GUIStyle` 和 `GUISkin`\
    \ 也是类，你可以在脚本中随时更改它们的属性。\n\n除了 UnityGUI 类之外，暂停菜单中还使用了一些其他类。设置了静态变量 `Time.timeScale`\
    \ 来暂停和恢复游戏；调用了 `Application.Quit` 来退出游戏；并在“选项”页面中访问了 `AudioListener`、`QualitySettings`\
    \ 和 `SystemInfo` 类。\n\n## 资源商店\n\n死灵法师图形界面在暂停菜单中看起来非常棒，它展示了精心制作的 `GUISkin` 能让\
    \ UnityGUI 看起来有多出色，但资源商店上还有很多其他皮肤。它们都与死灵法师图形界面一起，列在“纹理和材质”下的“图形界面皮肤”类别中。该类别中充满了\
    \ UnityGUI 的皮肤，以及第三方 GUI 系统的皮肤，例如来自 Above and Beyond Software (`http://anbsoft.com/`)\
    \ 的流行 EZGUI 和来自 Tasharen Entertainment (`http://tasharen.com`) 的 NGUI。\n\n这些第三方\
    \ GUI 系统可在脚本类别中内容丰富的 GUI 子类别中找到，该子类别充满了预置脚本的 GUI，例如小地图和菜单。事实上，本章实现的暂停菜单的一个版本就在资源商店的“完整项目”下（名为\
    \ FuguPause）。\n\n资源商店在“纹理和材质”下的“字体”类别中也有相当不错的字体选择。但由于 Unity 可以导入 TrueType 和 OpenType\
    \ 字体，网络上有很多免费的字体网站可供使用，以及价格适中的字体库（我使用的是 MacXWare 字体库）。\n\n# 10. 使用 Unity iOS\n\
    \n恭喜！你现在拥有了一款包含典型 3D 游戏基本功能的保龄球游戏：3D 图形（当然）、物理、音效、玩家控制（保龄球）、摄像机运动以及图形用户界面。\n\n\
    默认的构建目标在编辑器窗口的标题栏上显示为 PC、Mac 和 Linux 独立平台。如果你现在就为保龄球项目执行 macOS 构建，游戏运行起来将与在编辑器中基本相同。对于\
    \ Linux、Windows 甚至网页播放器（尽管网页播放器构建需要你先切换构建目标）来说也是如此。\n\n针对 iOS 则是另一回事。你现在可以将保龄球游戏的构建目标更改为\
    \ iOS，并进行构建而不会出现任何编译错误。但 `FuguForce.js` 中的保龄球控制是为鼠标输入设计的，因此必须更改。除了重新实现输入处理之外，将桌面\
    \ PC 游戏适配到移动设备（这个过程称为移植）通常还需要针对设备显示进行调整，并做出妥协以获得可接受的性能。\n\n此外，构建 iOS 应用涉及的外部流程比桌面独立平台和网页播放器目标要多得多。由于\
    \ Apple 要求所有 iOS 应用都必须使用 Xcode 编译，Unity iOS 通过首先生成一个 Xcode 项目来构建应用，然后由 Xcode 编译该项目以创建最终的应用。要真正在测试设备上运行该应用并将其提交到\
    \ App Store，需要一系列相当复杂的流程，以及注册 Apple 的 iOS 开发者计划。现在，不妨让我们回归本源，暂时回到本书开始时使用的 Climber\
    \ 项目。方便的是，Climber 无需修改即可在 iOS 上运行。如果你有 iOS 设备，请继续从 App Store 下载 Climber。快速找到 Climber\
    \ 应用的方法是在 App Store 搜索框中输入“Climber”，然后会看到“Angry Bots”以及其他来自 Unity Technologies\
    \ 的应用（图 10-1）。\n\n![A310332_2_En_10_Fig1_HTML.jpg](img/A310332_2_En_10_Fig1_HTML.jpg)\n\
    \n**图 10-1.** App Store 中的示例应用\n\n除了 Climber，你还应该搜索并下载 Unity Remote 应用，它可以用作在编辑器中测试\
    \ Unity iOS 游戏的遥控器。既然在找了，你也应该下载并尝试所有来自 Unity Technologies 的示例应用。其中许多应用已经很长时间没有更新了，但它们确实能让你了解可以使用\
    \ Unity 创建什么样的游戏。\n\n在运行此游戏之前，你需要做一个小改动。从主菜单中选择“文件”➤“构建设置”。在对话框中，你将看到游戏当前设置为“PC、Mac\
    \ 和 Linux 独立平台”（图 10-2）。你需要将目标平台更改为 iOS。在“平台”菜单中选择 iOS 图标选项，然后选择“切换平台”按钮（图 10-3）。\n\
    \n![A310332_2_En_10_Fig3_HTML.jpg](img/A310332_2_En_10_Fig3_HTML.jpg)\n\n**图 10-3.**\
    \ 构建设置菜单设置为 iOS\n\n![A310332_2_En_10_Fig2_HTML.jpg](img/A310332_2_En_10_Fig2_HTML.jpg)\n\
    \n**图 10-2.** 构建设置菜单设置为 PC、Mac 和 Linux 独立平台\n\n现在你可以选择构建并在 iOS 设备上运行此游戏了。\n"
- fmt: '# Test with the Unity Remote


    Unity has provided a very cool solution for in-editor testing of Unity iOS projects
    in the form of the Unity Remote app, which runs on an iOS device and relays touchscreen
    and accelerometer data from that device over Wi-Fi to the Unity Editor. If you
    don’t have an iOS device, you can skip this section and still get some testing
    done using the iOS simulator, described in the next section.


    Unity Remote can be found on the App Store in the same way as any app. Enter `Unity
    Remote` in the App Store search box (Figure [10-4](#A310332_2_En_10_Chapter.html#Fig4)).


    ![A310332_2_En_10_Fig4_HTML.jpg](Images/A310332_2_En_10_Fig4_HTML.jpg)


    Figure 10-4. The Unity Remote app on the App Store


    Once Unity Remote is installed on your iOS device, make sure the device is connected
    to your Mac that’s running Unity. Now open the Unity Remote app on your iOS device
    and then select the `GameScene` from The Climber ➤ Scenes folder (Figure [10-5](#A310332_2_En_10_Chapter.html#Fig5)).


    ![A310332_2_En_10_Fig5_HTML.jpg](Images/A310332_2_En_10_Fig5_HTML.jpg)


    Figure 10-5. The Climber GameScene


    Now you need to let Unity know that you want to connect to the Unity Remote app
    on your device. Then click the Play button in Unity. The game will load in the
    Unity game screen, and when you press Play, the game should also play on your
    device. From the main menu, select Edit ➤ Project Settings ➤ Editor (Figure [10-6](#A310332_2_En_10_Chapter.html#Fig6)).


    ![A310332_2_En_10_Fig6_HTML.jpg](Images/A310332_2_En_10_Fig6_HTML.jpg)


    Figure 10-6. Setting the Unity Editor


    In the Inspector, select the iOS device that you have installed the Unity Remote
    App on.


    When the Unity Editor is in Play mode, the graphics in the Game view will also
    appear in Unity Remote, and you can play the game on your device. It will may
    a bit coarse, because in Unity you have not scaled the game to the device settings.
    You can improve the performance by minimizing the resolution of the Game view
    in the Unity Editor (Figure [10-7](#A310332_2_En_10_Chapter.html#Fig7)).


    ![A310332_2_En_10_Fig7_HTML.jpg](Images/A310332_2_En_10_Fig7_HTML.jpg)


    Figure 10-7. Minimized device resolution in the Game view


    Regardless of the graphics quality, you are now able to see what the Climber game
    looks like on an iOS device, although you’re really still playing in the Editor
    and just using the device as a controller. Because you have not set up touchscreen
    input in the Climber game, you will need to use the arrow and space keys on the
    Mac. Once this is configured, the touchscreen input is sent back to the Unity
    Editor via the USB cable and is received by the game running in Play mode, so
    you still have all the debugging features of the Unity Editor at your disposal
    during the test run. It’s the best of both worlds!


    ## Install Xcode


    At some point you have to leave the comforts of the Unity Editor and really start
    building for iOS. All iOS apps have to be built through Xcode, Apple’s official
    iOS development tool (and also its official macOS development tool), which is
    why a Unity iOS build first generates an Xcode project, which in turn is built
    by Xcode to create the app. Xcode is available free from the Apple Developer site
    but conveniently also available on the Mac App Store. Search for `xcode` on the
    Mac App Store and click the Free button to download (Figure [10-8](#A310332_2_En_10_Chapter.html#Fig8)).


    ![A310332_2_En_10_Fig8_HTML.jpg](Images/A310332_2_En_10_Fig8_HTML.jpg)


    Figure 10-8. Xcode on the Mac App Store


    After installation, you should see the Xcode application in your Applications
    folder. Now you’re ready to start performing iOS builds from Unity!


    ## Customize the Player Settings


    Unity iOS builds invariably require customization of the player settings in the
    Unity Editor (the Unity Player, as opposed the Unity Editor, is the deployed version
    of the Unity engine). Select Player Settings under the Edit menu, or click the
    Player Settings button in the Build window, and the player settings will show
    up in the Inspector view (Figure [10-9](#A310332_2_En_10_Chapter.html#Fig9)).


    ![A310332_2_En_10_Fig9_HTML.jpg](Images/A310332_2_En_10_Fig9_HTML.jpg)


    Figure 10-9. Selecting the player settings


    The player settings enable you to set the settings for PC, Mac & Linux Standalone
    (the first icon), iOS (the second icon), Android (the third icon), and WebGL (the
    fourth icon).


    Because you’re interested only in the iOS player settings now, click the iOS Settings
    tab that somewhat resembles an iPhone to see the settings for iOS (Figure [10-10](#A310332_2_En_10_Chapter.html#Fig10)).


    ![A310332_2_En_10_Fig10_HTML.jpg](Images/A310332_2_En_10_Fig10_HTML.jpg)


    Figure 10-10. Resolution and Presentation in the player settings for iOS


    The player settings are plentiful, so they are organized into several sections:
    Resolution and Presentation, Icon, Splash Image, Debugging and crash reporting,
    and the catchall Other Settings. Chapter [12](../Text/A310332_2_En_12_Chapter.html)
    is devoted to presentation issues, including the Icon and Splash Image settings,
    so for now, you’ll focus on the Resolution and Presentation and Other Settings.


    ### Resolution and Presentation


    Most of the Resolution and Presentation settings have reasonable defaults (Figure
    [10-8](#A310332_2_En_10_Chapter.html#Fig8)), but I recommend using Auto Rotation
    for Default Orientation since Apple requires iPad apps to autorotate, meaning
    the display is rotated automatically to stay upright. The other Default Orientation
    choices are Landscape Left, Landscape Right, Portrait, or Portrait Upside Down.


    If Auto Rotation is selected, then the Allowed Orientations for Auto Rotation
    are displayed. Climber is intended only to run in Portrait mode, so Climber will
    flip between Portrait and Portrait UpsideDown as the device is turned around,
    but never to a Landscape mode.


    The Use Animated Autorotation option specifies whether the display visibly rotates
    or just switches instantly. I always opt for the animated rotation because it
    looks cool. The status bar options specify whether the iOS status bar is visible
    when the app launches and, if visible, in what style.


    The Show Loading Indicator controls whether the iOS activity indicator, the little
    spinning graphic at the center of the screen, appears when the app launches. This
    setting is also covered among presentation options in Chapter [12](../Text/A310332_2_En_12_Chapter.html).'
  raw: '## Test with the Unity Remote


    Unity has provided a very cool solution for in-editor testing of Unity iOS projects
    in the form of the Unity Remote app, which runs on an iOS device and relays touchscreen
    and accelerometer data from that device over Wi-Fi to the Unity Editor. If you
    don’t have an iOS device, you can skip this section and still get some testing
    done using the iOS simulator, described in the next section.


    Unity Remote can be found on the App Store in the same way as any app. Enter Unity
    Remote in the App Store search box (Figure [10-4](#A310332_2_En_10_Chapter.html#Fig4)).


    ![A310332_2_En_10_Fig4_HTML.jpg](Images/A310332_2_En_10_Fig4_HTML.jpg)


    Figure 10-4.


    The Unity Remote app on the App Store


    Once Unity Remote is installed on your iOS device, make sure the device is connected
    to your Mac that’s running Unity. Now open the Unity Remote app on your iOS device
    and then select the GameScene from The Climber ➤ Scenes folder (Figure [10-5](#A310332_2_En_10_Chapter.html#Fig5)).


    ![A310332_2_En_10_Fig5_HTML.jpg](Images/A310332_2_En_10_Fig5_HTML.jpg)


    Figure 10-5.


    The Climber GameScene


    Now you need to let Unity know that you want to connect to the Unity Remote app
    on your device. Then click the Play button in Unity. The game will load in the
    Unity game screen, and when you press Play, the game should also play on your
    device. From the main menu, select Edit ➤ Project Settings ➤ Editor (Figure [10-6](#A310332_2_En_10_Chapter.html#Fig6)).


    ![A310332_2_En_10_Fig6_HTML.jpg](Images/A310332_2_En_10_Fig6_HTML.jpg)


    Figure 10-6.


    Setting the Unity Editor


    In the Inspector, select the iOS device that you have installed the Unity Remote
    App on.


    When the Unity Editor is in Play mode, the graphics in the Game view will also
    appear in Unity Remote, and you can play the game on your device. It will may
    a bit coarse, because in Unity you have not scaled the game to the device settings.
    You can improve the performance by minimizing the resolution of the Game view
    in the Unity Editor (Figure [10-7](#A310332_2_En_10_Chapter.html#Fig7)).


    ![A310332_2_En_10_Fig7_HTML.jpg](Images/A310332_2_En_10_Fig7_HTML.jpg)


    Figure 10-7.


    Minimized device resolution in the Game view


    Regardless of the graphics quality, you are now able to see what the Climber game
    looks like on an iOS device, although you’re really still playing in the Editor
    and just using the device as a controller. Because you have not set up touchscreen
    input in the Climber game, you will need to use the arrow and space keys on the
    Mac. Once this is configured, the touchscreen input is sent back to the Unity
    Editor via the USB cable and is received by the game running in Play mode, so
    you still have all the debugging features of the Unity Editor at your disposal
    during the test run. It’s the best of both worlds!


    ## Install Xcode


    At some point you have to leave the comforts of the Unity Editor and really start
    building for iOS. All iOS apps have to be built through Xcode, Apple’s official
    iOS development tool (and also its official macOS development tool), which is
    why a Unity iOS build first generates an Xcode project, which in turn is built
    by Xcode to create the app. Xcode is available free from the Apple Developer site
    but conveniently also available on the Mac App Store. Search for xcode on the
    Mac App Store and click the Free button to download (Figure [10-8](#A310332_2_En_10_Chapter.html#Fig8)).


    ![A310332_2_En_10_Fig8_HTML.jpg](Images/A310332_2_En_10_Fig8_HTML.jpg)


    Figure 10-8.


    Xcode on the Mac App Store


    After installation, you should see the Xcode application in your Applications
    folder. Now you’re ready to start performing iOS builds from Unity!


    ## Customize the Player Settings


    Unity iOS builds invariably require customization of the player settings in the
    Unity Editor (the Unity Player, as opposed the Unity Editor, is the deployed version
    of the Unity engine). Select Player Settings under the Edit menu, or click the
    Player Settings button in the Build window, and the player settings will show
    up in the Inspector view (Figure [10-9](#A310332_2_En_10_Chapter.html#Fig9)).


    ![A310332_2_En_10_Fig9_HTML.jpg](Images/A310332_2_En_10_Fig9_HTML.jpg)


    Figure 10-9.


    Selecting the player settings


    The player settings enable you to set the settings for PC, Mac & Linux Standalone
    (the first icon), iOS (the second icon), Android (the third icon), and WebGL (the
    fourth icon).


    Because you’re interested only in the iOS player settings now, click the iOS Settings
    tab that somewhat resembles an iPhone to see the settings for iOS (Figure [10-10](#A310332_2_En_10_Chapter.html#Fig10)).


    ![A310332_2_En_10_Fig10_HTML.jpg](Images/A310332_2_En_10_Fig10_HTML.jpg)


    Figure 10-10.


    Resolution and Presentation in the player settings for iOS


    The player settings are plentiful, so they are organized into several sections:
    Resolution and Presentation, Icon, Splash Image, Debugging and crash reporting,
    and the catchall Other Settings. Chapter [12](../Text/A310332_2_En_12_Chapter.html)
    is devoted to presentation issues, including the Icon and Splash Image settings,
    so for now, you’ll focus on the Resolution and Presentation and Other Settings.


    ### Resolution and Presentation


    Most of the Resolution and Presentation settings have reasonable defaults (Figure
    [10-8](#A310332_2_En_10_Chapter.html#Fig8)), but I recommend using Auto Rotation
    for Default Orientation since Apple requires iPad apps to autorotate, meaning
    the display is rotated automatically to stay upright. The other Default Orientation
    choices are Landscape Left, Landscape Right, Portrait, or Portrait Upside Down.


    If Auto Rotation is selected, then the Allowed Orientations for Auto Rotation
    are displayed. Climber is intended only to run in Portrait mode, so Climber will
    flip between Portrait and Portrait UpsideDown as the device is turned around,
    but never to a Landscape mode.


    The Use Animated Autorotation option specifies whether the display visibly rotates
    or just switches instantly. I always opt for the animated rotation because it
    looks cool. The status bar options specify whether the iOS status bar is visible
    when the app launches and, if visible, in what style.


    The Show Loading Indicator controls whether the iOS activity indicator, the little
    spinning graphic at the center of the screen, appears when the app launches. This
    setting is also covered among presentation options in Chapter [12](../Text/A310332_2_En_12_Chapter.html).'
  trans: '

    # 使用 Unity Remote 进行测试


    Unity 提供了一项非常酷的解决方案，可以让你在编辑器内测试 Unity iOS 项目，即 Unity Remote 应用。该应用运行在 iOS 设备上，并通过
    Wi-Fi 将该设备的触摸屏和加速度计数据中继到 Unity Editor。如果你没有 iOS 设备，可以跳过本节，使用下一节描述的 iOS 模拟器进行一些测试。


    Unity Remote 可以像其他任何应用一样在 App Store 中找到。在 App Store 搜索框中输入 `Unity Remote`（图 10-4）。


    ![A310332_2_En_10_Fig4_HTML.jpg](img/A310332_2_En_10_Fig4_HTML.jpg)


    图 10-4. App Store 上的 Unity Remote 应用


    在 iOS 设备上安装 Unity Remote 后，请确保该设备已连接到运行 Unity 的 Mac。现在，在你的 iOS 设备上打开 Unity Remote
    应用，然后从 The Climber ➤ Scenes 文件夹中选择 `GameScene`（图 10-5）。


    ![A310332_2_En_10_Fig5_HTML.jpg](img/A310332_2_En_10_Fig5_HTML.jpg)


    图 10-5. The Climber 游戏场景


    现在，你需要让 Unity 知道你想要连接到设备上的 Unity Remote 应用。然后，点击 Unity 中的“播放”按钮。游戏将加载到 Unity 的游戏屏幕中，当你按下“播放”键时，游戏也应该在你的设备上运行。从主菜单中选择
    Edit ➤ Project Settings ➤ Editor（图 10-6）。


    ![A310332_2_En_10_Fig6_HTML.jpg](img/A310332_2_En_10_Fig6_HTML.jpg)


    图 10-6. 设置 Unity 编辑器


    在 Inspector 中，选择你已安装 Unity Remote App 的 iOS 设备。


    当 Unity Editor 处于播放模式时，游戏视图中的图形也会显示在 Unity Remote 中，并且你可以在设备上玩游戏。画面可能会有点粗糙，因为在
    Unity 中你还没有将游戏适配到设备设置。你可以通过最小化 Unity Editor 中游戏视图的分辨率来改善性能（图 10-7）。


    ![A310332_2_En_10_Fig7_HTML.jpg](img/A310332_2_En_10_Fig7_HTML.jpg)


    图 10-7. 游戏视图中最小化的设备分辨率


    无论图形质量如何，你现在都能看到 Climber 游戏在 iOS 设备上的样子，尽管你实际上仍在 Editor 中运行游戏，只是将设备用作控制器。由于在 Climber
    游戏中尚未设置触摸屏输入，因此你需要使用 Mac 上的方向键和空格键。一旦配置完成，触摸屏输入将通过 USB 线缆发送回 Unity Editor，并由在播放模式下运行的游戏接收，因此，在测试运行期间，你仍然可以随时使用
    Unity Editor 的所有调试功能。这真是两全其美！


    ## 安装 Xcode


    在某个时候，你必须离开舒适的 Unity Editor，真正开始为 iOS 构建应用。所有 iOS 应用都必须通过 Apple 官方的 iOS 开发工具（也是其官方的
    macOS 开发工具）—— Xcode 来构建，这就是 Unity iOS 构建首先会生成一个 Xcode 项目，然后由 Xcode 构建该项目以创建应用的原因。Xcode
    可从 Apple 开发者网站免费获取，但也可以方便地从 Mac App Store 获取。在 Mac App Store 上搜索 `xcode`，然后点击“免费”按钮下载（图
    10-8）。


    ![A310332_2_En_10_Fig8_HTML.jpg](img/A310332_2_En_10_Fig8_HTML.jpg)


    图 10-8. Mac App Store 上的 Xcode


    安装完成后，你应该能在“应用程序”文件夹中看到 Xcode 应用。现在，你就可以开始从 Unity 执行 iOS 构建了！


    ## 自定义播放器设置


    Unity iOS 构建总是需要在 Unity Editor 中自定义播放器设置（Unity 播放器，与 Unity Editor 相对，是 Unity 引擎的部署版本）。在“Edit”菜单下选择“Player
    Settings”，或者点击“Build”窗口中的“Player Settings”按钮，播放器设置将显示在 Inspector 视图中（图 10-9）。


    ![A310332_2_En_10_Fig9_HTML.jpg](img/A310332_2_En_10_Fig9_HTML.jpg)


    图 10-9. 选择播放器设置


    播放器设置允许你设置 PC、Mac & Linux Standalone（第一个图标）、iOS（第二个图标）、Android（第三个图标）和 WebGL（第四个图标）的设置。


    由于你现在只关心 iOS 播放器设置，请点击看起来有点像 iPhone 的 iOS Settings 标签页，查看 iOS 的设置（图 10-10）。


    ![A310332_2_En_10_Fig10_HTML.jpg](img/A310332_2_En_10_Fig10_HTML.jpg)


    图 10-10. iOS 的播放器设置中的分辨率和显示


    播放器设置非常丰富，因此它们被组织成几个部分：分辨率和显示、图标、启动画面、调试和崩溃报告，以及包罗万象的其他设置。第 12 章专门讨论显示问题，包括图标和启动画面设置，因此，现在你将重点关注分辨率和显示以及其他设置。


    ### 分辨率和显示


    大多数分辨率和显示设置都有合理的默认值（图 10-8），但我建议将默认方向设置为“自动旋转”，因为 Apple 要求 iPad 应用支持自动旋转，这意味着显示会自动旋转以保持直立。其他默认方向选项包括横向左、横向右、纵向或纵向倒置。


    如果选择了自动旋转，则会显示自动旋转允许的方向。Climber 旨在仅在纵向模式下运行，因此当设备旋转时，Climber 将在纵向和纵向倒置之间切换，但绝不会切换到横向模式。


    “使用动画自动旋转”选项指定显示是可见地旋转还是直接切换。我始终选择动画旋转，因为它看起来很酷。状态栏选项指定应用程序启动时 iOS 状态栏是否可见，如果可见，则以何种样式显示。


    “显示加载指示器”控制应用程序启动时是否显示 iOS 活动指示器（屏幕中央的旋转小图形）。此设置也将在第 12 章的显示选项中涵盖。

