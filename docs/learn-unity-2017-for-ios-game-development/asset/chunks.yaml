  trans: '

    ### 创建新的 `PhysicMaterial`


    为便于组织，在创建新的 `PhysicMaterial` 之前，应先新建一个文件夹来存放它们。在“项目”视图左侧面板中选择顶层的 `Assets` 文件夹，然后使用“项目”视图中的“创建”菜单，新建一个文件夹并命名为
    `Physics`（这个名字比 `PhysicMaterials` 更短且拼写更规范）。


    你可以通过“项目”视图中的“创建”菜单来创建新的 `PhysicMaterial`，然后在“检查器”视图中填写新 `PhysicMaterial` 的所有属性。但更省力的方法是，从
    Standard Assets 中复制一个 `PhysicMaterial`，最好选一个已经接近你需求的。由于地板使用了木材材质，从 Standard Assets
    中的 Wood `PhysicMaterial` 开始比较方便。在“项目”视图中选中 Wood `PhysicMaterial`，然后从“编辑”菜单中选择“复制”（或使用快捷键
    Command+D 进行复制）。


    将复制的 Wood `PhysicMaterial` 拖到“项目”视图中新创建的 `Physics` 文件夹内，并将其重命名为 `Floor`，因为稍后你要将其应用于名为
    Floor 的游戏对象上。接着，复制 Floor `PhysicMaterial`，并将新复制的材质命名为 `Ball`（如图 6-24 所示），因为稍后你要将其应用于名为
    Ball 的游戏对象上。


    ![A310332_2_En_6_Fig24_HTML.jpg](img/A310332_2_En_6_Fig24_HTML.jpg)


    图 6-24. 自定义的 `PhysicMaterial`


    现在，地板和球体各自有了对应的 `PhysicMaterial`。要将这些 `PhysicMaterial` 应用到预期的游戏对象上，只需将 Floor `PhysicMaterial`
    拖到“层级”视图中的 Floor 游戏对象上，再将 Ball `PhysicMaterial` 拖到 Ball 游戏对象上。（你可以在“检查器”视图中检查这两个游戏对象，确认
    `PhysicMaterial` 已显示在碰撞体组件的“材质”字段中。）至此，你就可以开始调整 `PhysicMaterial` 的属性了。


    如你所料，Wood `PhysicMaterial` 已经设置了适用于木质地板的合理数值，因此可以保持不变。但你需要调整 Ball `PhysicMaterial`，所以选中
    Ball `PhysicMaterial` 并按图 6-25 所示设置其数值。


    ![A310332_2_En_6_Fig25_HTML.jpg](img/A310332_2_En_6_Fig25_HTML.jpg)


    图 6-25. Ball `PhysicMaterial` 调整后的数值


    球体不应该在地板上弹跳（也不应在后续添加保龄球瓶后弹跳），因此将 `Bounciness` 值设为 `0`，`Bounce Combine` 设为 `Minimum`，这样无论与什么物体碰撞，球体都完全不会弹起。接着，将
    `Dynamic` 和 `Static Friction` 值设为 `1`，`Friction Combine` 设为 `Maximum`，这样无论球体是静止还是滚动，始终具有最大摩擦力。最大摩擦力值可确保球体滚动而非滑动。


    现在，当你点击“播放”时，球体应该直接落到地板上，静止不动，不再弹跳。


    ## 让球滚动起来


    要让球滚动，你需要为游戏添加一些控制（事实上，这样它才能称得上是一个游戏）。原版街机游戏《HyperBowl》使用一个真正的保龄球作为大型轨迹球进行控制。旋转这个球体会为游戏中的球体施加旋转力（结果就是，玩家在试图让球滚过旧金山山坡时，身体会做出滑稽的动作）。


    当然，制作一个空气支撑的保龄球外设超出了本书的范围，但 PC 版《HyperBowl》提供了基于鼠标的控制方式：推动鼠标会向相应方向为球体施加旋转力。这种控制方式只需一个脚本就能相当直接地实现。


    ### 创建脚本


    在“项目”视图中选中 `Scripts` 文件夹，使用“项目”视图左上角的“创建”按钮新建一个 JavaScript 脚本，并将其命名为 `FuguForce`，因为你将用它来为球体施加力。（我本想将其命名为
    `FuguRoll`，以呼应寿司的含义，但我不想让名称暗示你施加的是扭矩——一种旋转力而非线性力。）然后将 `FuguForce` 脚本拖到“层级”视图中的球体上，这样一旦你向脚本中添加代码，就可以立即进行测试。

