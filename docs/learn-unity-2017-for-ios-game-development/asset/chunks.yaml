    \ `Archive`（如图 11-21 所示）。\n\n![A310332_2_En_11_Fig21_HTML.jpg](img/A310332_2_En_11_Fig21_HTML.jpg)\n\
    \n图 11-21. 从 Product 菜单中选择 Archive\n\n当 Xcode 完成归档文件的编译后，你将看到 Archives 屏幕，其中包含一个用于上传到\
    \ App Store 的按钮（如图 11-22 所示）。点击此按钮后，Xcode 将尝试将构建包上传到你的 iTunes Connect 帐户。如果你已正确设置标识符设置，并在\
    \ Xcode 中正确登录了你的 iTunes Connect 帐户，此文件将成功上传。\n\n![A310332_2_En_11_Fig22_HTML.jpg](img/A310332_2_En_11_Fig22_HTML.jpg)\n\
    \n图 11-22. 上传构建包\n\n### 提交以供审核\n\n填写完必填项和任何可选的附加信息后，你现在就可以提交以供审核了（如图 11-23 所示）。\n\
    \n![A310332_2_En_11_Fig23_HTML.jpg](img/A310332_2_En_11_Fig23_HTML.jpg)\n\n图 11-23.\
    \ 处于“准备提交”状态的应用\n\n点击 `Submit for Review` 后，你可能需要完成一些关于出口合规性的问题，并且如果需要，还需上传加密授权文件。\n\
    \n![A310332_2_En_11_Fig24_HTML.jpg](img/A310332_2_En_11_Fig24_HTML.jpg)\n\n图 11-24.\
    \ Xcode Organizer 窗口中的归档分发构建包\n\n提交应用后（如图 11-24 所示），接下来就是等待 Apple 批准或拒绝。\n\n>\
    \ **提示**\n> \n> 提交后，建议重新登录 iTunes Connect 并确认应用状态为“等待审核”。即使应用的二进制文件是有效的，审核也可能会因为缺少截图等原因而被搁置。\n\
    \n你最终会收到一封电子邮件，通知你应用已在 App Store 上架、被拒绝，或是 Apple 需要更多时间进行审核。此回复通常在提交后的几周内到达，但我也曾遇到过应用在\
    \ 24 小时内被接受，或在两个月后被拒绝的情况。当审核期延长时，Apple 通常会发送一封电子邮件，说明需要更多时间来审核你的应用。\n\n### 为被拒绝做好准备\n\
    \n如果应用被拒绝，电子邮件将指示你返回 iTunes Connect 中的应用，并点击 Resolution Center 按钮，以查看并选择性地回复拒绝原因。原因可能包括技术问题、崩溃\
    \ Bug，或违反 Apple 的 App Store 审核指南（注册成为 iOS 开发者后，你可以在 Apple Developer 网站上阅读这些指南）。\n\
    \n如果你决定修改应用，则必须再次点击 `Reject Binary` 和 `Ready for Upload` 才能重新上传。如果你认为拒绝理由不合理，Resolution\
    \ Center 也允许你向 App Review Board 提出申诉。\n\n如果应用被接受，并且你在 iTunes Connect 中选择了自动发布选项，应用将很快出现在\
    \ App Store 上。否则，应用会处于“等待开发者发布”状态，直到你登录 iTunes Connect，点击应用的 `View Details`，再点击\
    \ `Release this Version` 按钮。\n\n### 更新应用\n\n在应用获得批准后，你可以随时返回 iTunes Connect 的应用页面并点击\
    \ `View Details` 来编辑应用描述，修改后的文本将在几小时内显示在 App Store 上。iTunes Connect 页面还会显示一个 `Add\
    \ New Version` 按钮。点击此按钮将引导你通过一个简化版的原始提交流程来提交应用的更新。除了 Bundle ID 之外，你几乎可以更改所有详细信息，但唯一必须更改的是递增\
    \ Bundle Version。\n\n> **提示**\n> \n> 更新应用时，请记得同时在 iTunes Connect 和 Unity player\
    \ 设置中递增 Bundle Version。\n\n### 跟踪销量\n\n当应用的首个版本出现在 App Store 上后，你可以通过登录 iTunes\
    \ Connect 并点击 `Payments and Financial Reports` 链接来跟踪其下载量和收入（如果是付费应用）。结果页面会显示一个基于时间的销售图表、按国家/地区划分的销售明细，以及生成报告的选项（如图\
    \ 11-25 所示）。\n\n![A310332_2_En_11_Fig25_HTML.jpg](img/A310332_2_En_11_Fig25_HTML.jpg)\n\
    \n图 11-25. iTunes Connect 中的“付款与财务报告”页面\n\n### 发放促销代码\n\n对于应用的每个版本，Apple 都会提供\
    \ 100 个促销代码，可用于在 App Store 上免费下载该应用（即使是免费应用也提供促销代码，尽管在这种情况下使用它们意义不大）。要获取应用的促销代码，请在\
    \ iTunes Connect 中点击该版本的 `View Details`，然后点击右上角的 `Promo Codes` 按钮（如图 11-26 所示）。\n\
    \n![A310332_2_En_11_Fig26_HTML.jpg](img/A310332_2_En_11_Fig26_HTML.jpg)\n\n图 11-26.\
    \ 在 iTunes Connect 中点击已上架应用的 View Details\n\n```\nXY9LJRKMN7JM\nTANFXAHR9EM9\n\
    XP6TMAFFHFLT\nTXJ44ELTHETL\nF9W3WEK7JL4Y\n```\n*代码清单 11-1. 包含五个促销代码的促销代码文件*\n\n\
    代码一旦下载，有效期即为 28 天，即使在此期间应用进行了更新。\n\n> **提示**\n> \n> 由于代码的有效期是从下载日期开始计算的，因此你可以根据需要从\
    \ iTunes Connect 下载代码，而不是一次性下载全部 50 个，这样可以节省代码。\n\n这些代码不再允许用户在 App Store 上为应用撰写评论，但对于发送给托管自己评论的网站来说，这些代码是理想的选择。\n\
    \n## 进一步探索\n\n在 Unity 编辑器和 iOS 模拟器中测试 Unity iOS 应用非常方便，但无法替代在真机上的测试！好消息是，为真实硬件进行构建在\
    \ Unity 方面改动不大（实际上，只需在 Player 设置中将 SDK 设为 Device SDK）。坏消息是，你必须完成整个 Apple 开发者注册流程，为你的测试设备和配置文件完成\
    \ Provisioning Portal 设置，并为你的所有应用完成 iTunes Connect 设置。从某种意义上说，这是你成为 iOS 开发者的一章！\n\
    \n既然已经完成了这一步，你可以再次离开 Angry Bots 项目，回到你的保龄球游戏中。本书的剩余部分将用于将该游戏适配到 iOS。不过，你还会再次用到\
    \ iTunes Connect。在后续整合 Game Center（第 14 章）和 iAd（第 15 章）时，你将再次使用 iTunes Connect。\n\
    \n### Unity 手册\n\n由于 Unity iOS 的模拟器和设备构建步骤几乎相同，上一章中提到的 Unity 手册章节也适用于本章。此外，Unity\
    \ 手册中“iOS 开发入门”部分有一个页面，简要列出了 Apple 提交应用到 App Store 所需的步骤；而“高级”部分中的“调试”页面则解释了如何将\
    \ MonoDevelop 调试会话附加到在设备上运行的 Unity iOS 应用。\n"
- fmt: '### Apple Developer Site


    The road to all Apple developer information begins at the Apple developer site
    (`http://developer.apple.com/`), so that should be your first stop. From there,
    you can find descriptions of the iOS Developer Program (and other Apple developer
    programs) and commence the registration process. Even before the registration
    is complete, you can explore the iOS Dev Center, which includes the iOS Developer
    Library, which in turn contains the iTunes Connect Developer Guide (listed under
    Languages and Utilities).


    > **Tip:** The documentation in the iOS Developer Library is also available in
    the Xcode Organizer. As you might gather from all the work that takes place in
    the Organizer (provisioning profiles, screenshots, app submissions), you might
    be spending most of your Xcode time there!


    Once your registration is approved, you can access the iTunes Connect site and
    the Provisioning Portal on the Apple developer site to complete the mobile provisioning
    and app submission steps covered in this chapter.


    # 12. Presentation: Screens and Icons


    Now that your Climber break is over and the basics of building and running a Unity
    iOS project have been covered, it’s time to resume your work on the bowling game
    and get it working on iOS!


    From this point on, I will generally assume you’re testing by building and running
    on a device, but in many cases you can test in the Editor with the Unity Remote
    or test in the iOS simulator.


    > **Tip:** It’s a good idea to always do some testing in the Unity Editor to catch
    errors that might not show up when testing on a device. And if you run into a
    weird problem on a device, go back to the Editor and see whether you can debug
    it there.


    This chapter focuses on making the game look right on an iOS device. This includes
    making sure the game shows up in the correct orientation and all the game elements
    show up at an appropriate resolution on the screen, which is a precursor to making
    the game playable (it’s hard to start playing when you can’t read or tap the Play
    button).


    Furthermore, besides providing required attributes such as the app name and icon,
    you’ll add some polish by including a splash screen and the familiar iOS activity
    indicator to indicate the game is loading.


    Some of these presentation details might seem to be cosmetic and easy enough to
    implement that they could be deferred until the end of a project (and typically
    they are), but easy work could and should be done early. Tasks that can be accomplished
    quickly help you get into a development groove. And when you’re working crunch-time
    hours trying to finish your game, the last thing you want to see is unfinished
    work you could have gotten out of the way early.


    Besides, packaging is important. In fact, when I’m creating desktop software,
    I like to start with the installer because that is the first customer experience.
    For iOS apps, the customer first sees the app icon and name and then the splash
    screen while launching the app. This will form the customer’s first impression
    of whether the app is polished or amateurish. And you’re the first customer of
    your app. You’ll feel better about your project and have a clearer idea of what
    you want your app to be if it’s packaged like a finished product from the beginning.
    And you never know when you’ll need to demo it!


    The corresponding Unity project is available online at `http://www.apress.com/9781484231739`,
    and, as usual, I recommend typing in the scripts rather than copying them from
    the online project. But there are some textures in the project files that will
    be used for the icon and splash screen, so, from the online project for Chapter
    12, copy the additional files in the Textures folder to the Textures folder of
    your bowling project (remember, you can drag the files into the Project view).
    You should have three Fugu Games splash textures of different resolutions, one
    splash screen displaying a book cover (of this book), and an icon texture (Figure
    12-1).


    ![A310332_2_En_12_Fig1_HTML.jpg](Images/A310332_2_En_12_Fig1_HTML.jpg)


    **Figure 12-1.** Textures for this chapter copied from `http://www.apress.com/9781484231739`


    ## Bowling for iOS


    In the Unity Editor, bring up the Project Wizard (Open Project in the File menu)
    and select the bowling project as you last left it in Chapter 9, before you switched
    to Climber. You should now be familiar with the process of switching build targets.


    Bring up the Build Settings window (select Build Settings in the File menu), select
    iOS as the build target, and click the Switch Platform button.


    If you have the Necromancer GUI installed from Chapter 9, some script errors will
    appear in the Console view after switching the build target to iOS, because a
    test script in that package wasn’t written with `#pragma strict` and is missing
    some type declarations. This can be resolved quickly by just removing `GUITestScript.js`
    from the Project view or wrapping `#if !UNITY_IPHONE` around all its contents
    (bonus points for going in and fixing the code by appending `:int` to the function
    parameters). Removing the script will disable the Necromancer GUI test scene,
    but otherwise the GUISkin is still usable in your pause menu. All of the changes
    introduced by this chapter will work with or without the Necromancer GUI (but
    the screenshots show the Necromancer GUI because it’s prettier).


    Once the asset reimport is complete, go to the Edit menu, and under Settings,
    select Player to bring up the player settings in the Inspector view. In the Cross-Platform
    Settings area, fill in the Company Name and Product Name (the app name) fields.
    Select the iOS tab to display the iOS player settings and fill in the bundle ID
    of the app (Figure 12-2).


    ![A310332_2_En_12_Fig2_HTML.jpg](Images/A310332_2_En_12_Fig2_HTML.jpg)


    **Figure 12-2.** FuguBowl player settings


    Both the original and iOS versions of HyperBowl are portrait-mode games (and it
    turns out that portrait mode is best for the swipe-to-roll control that will be
    implemented in the next chapter), so let’s restrict this game to portrait.


    Therefore, set the Default Orientation property in the player settings to Portrait
    (Figure 12-3).


    ![A310332_2_En_12_Fig3_HTML.jpg](Images/A310332_2_En_12_Fig3_HTML.jpg)


    **Figure 12-3.** Portrait orientation in the player settings'
