  trans: '

    # 14. 优化


    正如唐纳德·克努斯那句广为流传的名言——“过早优化是万恶之源”——所言，我将优化这一主题留到了本书将近结尾处。在本章中，你将优化保龄球应用，并回顾该过程的先决条件：设定目标性能并测量当前性能。本章项目文件位于[`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)，其中包含经优化的脚本以及本章开发的优化辅助脚本。


    ## 选择目标


    有句老话说：“速度快、质量好、成本低，三者只能选其二。”优化通常也是如此。在质量、空间和速度三者之间，你往往最多只能兼顾其中两点，而牺牲第三点。


    ### 帧率


    在开始优化之前，你应该先设定好目标帧率。iOS 设备每秒刷新屏幕 60 次，但默认情况下，Unity iOS 构建版本会尝试达到每秒 30 帧（fps）。将目标帧率设为设备刷新率的一半，对设备电池的消耗更小，而且实现
    30 fps 远比 60 fps 容易。你的保龄球游戏很简单，所以只要愿意做出一些妥协，应该能够达到 60 fps。


    将目标始终设为最高帧率似乎理所当然，但若游戏频繁在 30 fps 和 60 fps 之间切换，这种不连贯性可能比稳定运行在 30 fps 更容易分散玩家注意力。


    尽管如此，在性能剖析之前，以 60 fps 为目标开始工作是有意义的，这样你可以看到峰值性能，之后再根据需要降低目标。


    #### 创建脚本


    在 Unity 编辑器中无法直接设置目标帧率，但幸运的是，你可以在脚本中通过设置静态变量 `Application.targetFrameRate` 来调整目标帧率。因此，让我们创建一个新的
    JavaScript 脚本，将其放入 `Scripts` 文件夹，并命名为 `FuguFrameRate`（图 14-1）。


    ![A310332_2_En_14_Fig1_HTML.jpg](img/A310332_2_En_14_Fig1_HTML.jpg)


    图 14-1. 在 Scripts 文件夹中添加脚本


    这将是一个非常简短的脚本，包含一个公共变量和一个只有一行代码的 `Start` 回调（列表 14-1）。


    ```

    #pragma strict

    public var frameRate:int = 60;

    function Start() {

    Application.targetFrameRate = frameRate;

    }

    列表 14-1. FuguFrameRate.js 的完整脚本


    该脚本通过将静态变量 `Application.targetFrameRate` 的值修改为 `frameRate` 的值来设定目标帧率，`frameRate`
    是一个公共变量，因此可以在 Inspector 视图中调整。由于 iOS 设备的屏幕刷新率均为 60 fps，这是你能达到的最佳帧率，因此也是 `frameRate`
    的一个合理默认值。


    #### 挂载脚本


    要使用 `FuguFrameRate` 脚本，必须将其添加到场景中，以便游戏启动时执行其 `Start` 回调。因此，让我们在保龄球场景中创建一个空的 `GameObject`，将其命名为
    `FrameRate`，然后将 `FuguFrameRate` 脚本拖拽到该对象上（图 14-2）。


    ![A310332_2_En_14_Fig2_HTML.jpg](img/A310332_2_En_14_Fig2_HTML.jpg)


    图 14-2. 保龄球场景中包含的帧率脚本


    这个脚本已被添加到你的保龄球场景中，但你也完全可以将其添加到启动场景中，因为 `Application.targetFrameRate` 只需设置一次，即使加载新场景，该值也会保持不变。你当前的启动场景并没有实际功能，因此以
    Unity 默认的 30 fps 运行即可。


    然而，如果启动场景要显示一个酷炫的动画，你可能希望将其设置为 60 fps，在这种情况下，你也需要将帧率脚本添加到该场景。事实上，如果启动场景在 60 fps
    下效果最佳，而保龄球场景在 30 fps 下运行更流畅（而不是在 30 fps 和 60 fps 之间抖动），那么你应该将帧率脚本添加到两个场景中，并将启动场景的目标帧率设为
    60 fps，保龄球场景的目标帧率设为 30 fps。


    ### 空间目标


    除了帧率之外，你还应为应用体积设定一个目标。你必须与用户安装的歌曲、照片、视频以及所有其他应用争夺 iOS 设备上的存储空间。更小的体积能让用户更容易决定保留你的应用。


    体积更小的应用下载耗时更短，加载速度也更快（无论是应用加载还是关卡加载）。尤其重要的是，App Store 限制通过蜂窝网络下载的应用大小不得超过 50MB。你肯定不希望错过用户的冲动购买，因此
    50MB 是一个很好的应用体积目标。这个限制比 App Store 最初 20MB 的限制要容易达到得多，但任何包含大量内容的应用仍然很容易超出这个体积（拥有六条球道的
    HyperBowl 约为 40MB）。


    ## 剖析游戏


    在开始优化之前，你需要知道优化什么。这就用到了性能剖析（Profiling），即获取游戏的性能信息。你有多种选择，包括在编辑器中查看显示的状态信息、剖析应用本身，甚至编写一些自己的性能测量代码。


    ### 游戏视图状态


    在编辑器中，你可以使用 Game 视图中的 Stats 覆盖层即时获取场景的性能相关信息（图 14-3）。


    ![A310332_2_En_14_Fig3_HTML.jpg](img/A310332_2_En_14_Fig3_HTML.jpg)


    图 14-3. 游戏视图状态信息覆盖层


    当你点击 Play 按钮后，在游戏运行过程中你会看到这些统计信息实时更新。这些信息很方便，但无法替代对实际应用的性能剖析。

    '
- fmt: '### The Build Log


    Minimizing your app size is not as important as it used to be when exceeding 20MB
    meant that an app could only be downloaded onto a device over Wi-Fi, not 3G wireless.
    Now the limit is a more generous 50MB, but this is still easy to reach if you’ve
    got a big game, and smaller means faster downloads and more people can fit your
    app into devices with less free storage (I always fill up my iPads fairly quickly).


    You can see a breakdown of assets that went into your app by checking the`Editor`log
    after a build, as shown in Listing [14-2](#A310332_2_En_14_Chapter.html#Par20).


    ```

    Textures      5.2 mb         16.9%

    Meshes        17.4 kb         0.1%

    Animations    0.0 kb          0.0%

    Sounds        21.2 mb        69.1%

    Shaders       0.0 kb          0.0%

    Other Assets  19.1 kb         0.1%

    Levels        10.7 kb         0.0%

    Scripts       175.2 kb        0.6%

    Included DLLs 4.1 mb         13.3%

    File headers  16.6 kb         0.1%

    Complete size 30.6 mb       100.0%

    Used Assets, sorted by uncompressed size:

    21.1 mb         69.0% Assets/Assets/Free/Assets/Sci-Fi_Ambiences/Sci-fi_AmbienceLoop1.wav

    4.0 mb          13.1% Assets/Textures/LearnUnityCover.jpg

    170.8 kb         0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_up.tif

    170.8 kb         0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_right.tif

    170.8 kb         0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_left.tif

    170.8 kb         0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_front.tif

    170.8 kb         0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_back.tif

    170.8 kb         0.5% Assets/Standard Assets/Light Flares/Sources/Textures/50mmflare.psd

    170.8 kb         0.5% Assets/Barrel/Barrel_D.tga

    31.2 kb          0.1% Assets/Assets/Free/Assets/8Bit/Coin_Pick_Up_03.wav

    17.4 kb          0.1% Assets/Barrel/Barrel.fbx

    17.3 kb          0.1% Assets/Substances_Free/Wood_Planks_01.sbsar

    10.8 kb          0.0% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_down.tif

    1.0 kb          0.0% Assets/Prefabs/BarrelPin.prefab

    0.6 kb          0.0% Assets/Standard Assets/Light Flares/50mm Zoom.flare

    0.3 kb          0.0% Assets/Standard Assets/Skyboxes/Sunny3 Skybox.mat

    Listing 14-2.

    Build Log

    ```


    The log lists a breakdown of your app size by type of asset—textures, audio, meshes,
    scripts—and a list of the individual assets that went into it. Unfortunately,
    the size contributions are based on uncompressed sizes and not the final compressed
    asset sizes, but it still give you an idea of which assets are taking the most
    space.


    The log also provides a way to find out which assets in your project are used
    or not used, via the handy search field in the`Console`app. For example, you have
    all your textures for `FuguBowl` in the `Textures` folder, so if you want to check
    which of those textures are used and which ones you can remove from the project,
    you would select `Editor Log` in the `Console` view menu, which should launch
    the`Console`app with the`Editor`log selected (Figure [14-4](#A310332_2_En_14_Chapter.html#Fig4)).


    ![A310332_2_En_14_Fig4_HTML.jpg](Images/A310332_2_En_14_Fig4_HTML.jpg)


    Figure 14-4.


    Filtering the build log using the Console app search field


    In the search box you would type`Textures`to filter the display. Then you could
    compare the resulting list with the`Textures`folder in the`Project`view and see
    whether there’s anything in the`Project`view that didn’t end up in the build.


    ### Run the Built-in Profiler


    After the Unity iOS build has generated its Xcode project, you have the option
    of activating the built-in profiler, which reports information similar to the`Stats`overlay
    in the`Game`view. To activate the built-in profiler, also referred to in the Unity
    documentation as the internal profiler, select the header file`iPhone_Profiler.h`in
    the Xcode project, listed inside the`Classes`folder, and change the value of`ENABLE_INTERNAL_PROFILER`from`0`to`1`(Figure
    [14-5](#A310332_2_En_14_Chapter.html#Fig5)).


    ![A310332_2_En_14_Fig5_HTML.jpg](Images/A310332_2_En_14_Fig5_HTML.jpg)


    Figure 14-5.


    Built-in profiler switch in the Unity Xcode project


    Now when you click`Play`, the app will recompile with the built-in profiler enabled,
    and the debug area of Xcode will display statistics, as shown in Listing [14-3](#A310332_2_En_14_Chapter.html#Par26),
    after every 30 frames while the game is running.


    ```

    iPhone Unity internal profiler stats:

    cpu-player>    min: 39.8   max: 63.2   avg: 58.0

    cpu-ogles-drv> min:  2.1   max:  3.7   avg:  2.4

    cpu-present>   min:  0.7   max:  6.6   avg:  1.8

    frametime>     min: 47.7   max: 72.2   avg: 64.5

    draw-call #>   min:  40    max:  40    avg:  40     | batched:     0

    tris #>        min:  5544  max:  5544  avg:  5544   | batched:     0

    verts #>       min:  4358  max:  4358  avg:  4358   | batched:     0

    player-detail> physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:  0.0
    render: 58.0 fixed-update-count: 0 .. 0

    mono-scripts>  update:  0.2   fixedUpdate:  0.0 coroutines:  0.1

    mono-memory>   used heap: 405504 allocated heap: 524288  max number of collections:
    0 collection total duration:  0.0

    Listing 14-3.

    Built-in Profiler Output on a Fourth-Generation iPod Touch

    ```


    The first number to look at in the profile is the`frametime`, which is the total
    amount of time taken by a frame, in milliseconds. If you’re running at 60 fps,
    you should see an average of around 16.7 ms for the`frametime`. If the`frametime`is
    above 34, then you’re not even getting 30 fps. The line after the`frametime`is
    pretty important, too, as it tends to have a big impact on the`frametime`.`Draw
    calls`are distinct drawing operations. Generally, each rendered mesh incurs a
    draw call, and lighting and shadows on top of that can add more draw calls.


    The`player-detail`line breaks down the time listed in the`cpu-player`line at the
    top. The`player-detail`time is apportioned among`physx`(physics),`animation`,`culling`(determining
    objects that don’t need to be rendered),`skinning`(updating the skin position
    on animated characters),`batching`(combining meshes that have the same materials
    so they are rendered with a single draw call),`rendering`, and the`fixed update
    count`.


    The profile results in Listing [14-3](#A310332_2_En_14_Chapter.html#Par26), taken
    on a fourth-generation iPod touch, show a`frametime`not even close to 30 fps,
    much less 16 fps, and the`player-detail`is dominated by the`render`time. One thing
    that is known to have a big performance impact is dynamic shadows, so let’s disable
    shadows in your`Light`component (Figure [14-6](#A310332_2_En_14_Chapter.html#Fig6)).


    ![A310332_2_En_14_Fig6_HTML.jpg](Images/A310332_2_En_14_Fig6_HTML.jpg)


    Figure 14-6.


    Disabling shadows from the bowling scene light


    Then perform a`Build and Run`operation again to start a new profile session (Listing
    [14-4](#A310332_2_En_14_Chapter.html#Par31)).'
