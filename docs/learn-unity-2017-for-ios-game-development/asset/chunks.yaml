  trans: '

    ### 参考手册


    《参考手册》比《Unity 手册》内容更深入，详细描述了每个组件，解释了其属性并记录了组件的使用方法。《参考手册》还记录了资源类型，并对`GameObject`进行了说明。


    通常，你应该阅读所用每个组件和资源类型的《参考手册》文档。请记住，检查器视图中的每个组件上都有一个帮助图标，点击该图标即可调出相应的《参考手册》页面。与《Unity
    手册》一样，《参考手册》不仅可通过 Unity 帮助菜单获取，还可从 Unity 网站的“学习”选项卡下找到（可直接访问 [`docs.unity3d.com/`](http://docs.unity3d.com/)）。《参考手册》的“设置管理器”部分包含一个关于渲染设置的页面，本章中的天空盒就是在那里分配的。“变换组件”部分只列出了一个组件，即变换组件，它自然附加在每个`GameObject`上。


    “网格组件”部分更有趣，因为它描述了任何带有网格的`GameObject`（例如本章创建的立方体）所需的`MeshFilter`和`MeshRenderer`组件。“渲染组件”部分内容更丰富，其中包含了摄像机组件及其关联的`GUILayer`组件和`FlareLayer`。光照组件也在此处进行了记录。虽然资源并非真正的组件，但《参考手册》中有一个名为“资源组件”的部分，列出了各种资源类别。在本章中，`Flare`、`Material`、`Mesh`和`Texture2D`被整合到了场景中（记住，天空盒实际上是一种`Material`）。


    最有趣的阅读内容在“内置着色器指南”部分，该部分详细（并附有图片）描述了所有内置着色器，范围从简单快速到非常花哨。本章中的立方体最初使用默认的漫反射着色器，随后被替换为高级高光法线贴图着色器。正如本章所述，着色器实际上是一个程序，因此如果你找不到满足需求的内置着色器，可以遵循“着色器参考”部分中的示例和说明自行编写。


    ### 资源商店


    本章开始了我们贯穿全书的实践，即使用 Unity 资源商店中的免费资源。我建议定期浏览资源商店以查看最新发布内容。除了免费的纹理、模型和脚本外，还有大量价格合理的资源包，可以为你节省大量时间和工作。资源商店也可以通过常规网络浏览器在
    [`assetstore.unity3d.com/`](http://assetstore.unity3d.com/) 查看（但无法购买或下载任何资源）。


    ### 计算机图形学


    计算机图形学是一个庞大而复杂的研究领域。本章涉及了 3D 模型、纹理、法线贴图、光晕、天空盒，而我们还只是刚刚开始。因此，非常值得深入阅读基础（和高级）计算机图形学知识，例如由
    Tomas Akenine-Möller、Eric Haines 和 Naty Hoffman 合著的广受欢迎且内容全面的书籍《实时渲染》。Mark Haigh-Hutchinson
    的《实时摄像机》则是一本专门探讨虚拟摄像机及其控制方案的著作。


    我不会涉及创建可导入 Unity 的资源的过程，但 Luke Ahearn 有两本书可能会对你有普遍帮助：《3D 游戏纹理：使用 Photoshop 创建专业游戏美术》和《3D
    游戏环境：创建专业的 3D 游戏世界》。而从 Wes McDermott 的《使用 Unity 为 iPhone 创建 3D 游戏美术》的书名可以看出，它是本书一本合适的补充读物。


    # 4. 让它动起来：为立方体编写脚本


    现在你已经知道如何通过放置游戏对象来构建静态 3D 场景，是时候通过在游戏运行时为游戏对象添加运动来让场景变得动态且更有趣了。毕竟，3D 图形场景很不错，但动画化的
    3D 图形场景更棒！


    但是，应用动画数据并不是移动`GameObject`的唯一方法。将`GameObject`设置为物理对象会使它响应碰撞和力（包括重力）而运动。脚本也可以通过更改其`Transform`组件中的位置和/或旋转值来移动`GameObject`。事实上，任何移动`GameObject`的方法，无论是动画、物理还是脚本，最终都会更改`Transform`组件，该组件始终表示`GameObject`的位置、旋转和缩放。


    本章将重点介绍通过脚本移动游戏对象，演示如何旋转上一章中创建的原本静态的立方体，甚至还会介绍补间风格动画。在此过程中，我将介绍 Unity 脚本系统的基本概念和工具（编辑和调试）。


    你将编写的脚本可在 [www.apress.com/9781484231739](http://www.apress.com/9781484231739)
    的本章项目中找到，但我建议你从头开始创建它们。当你自己输入代码时，你才最有可能理解代码的工作原理（以及何时失效）。


    ## 组织资源


    当资源按类型分类时，在项目视图中查看和浏览资源会更方便。因此，在开始添加脚本之前，现在是整理并为项目中的脚本和纹理创建一些文件夹的好时机。启动 Unity
    编辑器（如果你没有从上一章中打开它），并确保你已加载上一章的项目并打开了立方体场景。然后点击项目视图左上角的创建按钮（图 4-1），弹出一个可以添加到项目中的新资源菜单（或者，你可以在项目视图中右键单击并选择“创建”子菜单）。选择菜单中的“文件夹”项，一个名为“新文件夹”的文件夹将出现在项目视图中。将该文件夹重命名为“Textures”，并将你在上一章中导入的任何纹理（例如我的猫的照片）拖入其中。虽然你还没有创建任何脚本，但也请继续创建一个“Scripts”文件夹。


    ![A310332_2_En_4_Fig1_HTML.jpg](img/A310332_2_En_4_Fig1_HTML.jpg)


    图 4-1. 在项目视图中创建 Textures 文件夹


    ## 创建脚本


    选择新添加的“Scripts”文件夹，然后同样从项目视图的“创建”菜单中，选择“JavaScript”（图 4-2）。一个名为“New Behaviour”（美国读者，你们得习惯这种英式拼写）的脚本将出现在“Scripts”文件夹中。如果你不小心在“Scripts”文件夹之外创建了新的脚本文件，只需将脚本拖入该文件夹即可。


    ![A310332_2_En_4_Fig2_HTML.jpg](img/A310332_2_En_4_Fig2_HTML.jpg)


    图 4-2. 创建 JavaScript 脚本


    注意：虽然项目视图的“创建”菜单中列出的是“Javascript”（只有首字母大写），但我会假装它写的是“JavaScript”，这是官方的大小写形式，并且也是
    Unity 文档中使用的（谁知道呢，也许某次 Unity 更新随时会修正菜单中的拼写）。此外，本书将使用短语“a JavaScript”来指代脚本，而不是更正确但说起来拗口的“a
    JavaScript script”。


    由于这个新文件是 JavaScript，它带有 `.js` 扩展名。项目视图不显示文件扩展名，但脚本的语言可以从其图标中看出来（图 4-3）。并且如果选中该脚本，其完整名称会显示在项目视图底部的行中。


    ![A310332_2_En_4_Fig3_HTML.jpg](img/A310332_2_En_4_Fig3_HTML.jpg)


    图 4-3. 新脚本的项目视图

