- fmt: '# Tracking Apps


    Although iTunes Connect provides download and sales figures (and the graph is
    a lot easier to read than the `.csv` report, which once was the only option),
    there are several third-party products that track app sales and other data like
    app rankings and reviews.


    `App Annie` (`http://appannie.com/`) and `AppFigures` (`http://appfigures.com/`)
    are two of the more popular web-based products that automatically perform daily
    downloads of app data from iTunes Connect (after you provide your iTunes Connect
    login information during account setup). They both have nice graph presentations
    of the sales data and send daily e-mail summaries of the app statistics. `App
    Annie` is currently free (technically in beta), while `AppFigures` charges a fee.


    Figure 15-6 shows an `App Annie` graph of downloads over a month for Fugu Bowl.
    The number of downloads that are updates are overlaid over the downloads that
    are sales. There in the update line corresponding to releases of updates for FuguBowl.


    ![A310332_2_En_15_Fig6_HTML.jpg](Images/A310332_2_En_15_Fig6_HTML.jpg)


    Figure 15-6. The `App Annie` sales graph


    `AppViz` (`http://appviz.com/`) is an macOS application that performs the same
    function but downloads the data onto your Mac and features a variety of graphs,
    including sales by geography (Figure 15-7). `AppViz` is not free, but it doesn’t
    cost much, and I think it’s well worth it.


    ![A310332_2_En_15_Fig7_HTML.jpg](Images/A310332_2_En_15_Fig7_HTML.jpg)


    Figure 15-7. The `AppViz` geographic view


    There’s no reason to restrict yourself to just one of these products. I use `AppViz`
    to ensure I have all of my app sales data available locally, and I like its variety
    of graphics and the App Store review downloads. And I use `AppAnnie` for its automated
    e-mail reports of daily sales figures and rankings display (downloading of all
    that ranking data in `AppViz` takes a long time), and `App Annie` has support
    for some Android app stores. Also, it’s free!


    **Tip**


    From `AppViz`, you can export all the data you’ve downloaded for it and then import
    that data into another product like `App Annie`. Since Apple only makes a year’s
    worth of app sales data available on iTunes Connect, this is a way to ensure you
    can always import the entire sales history of an app into a sales tracking product.


    ## Promo Codes


    I have described how to download promo codes after an app is approved on the App
    Store, but I didn’t explain what to do with them. There are plenty of options.
    Nearly every app review site accepts promo codes with review requests. `Touch
    Arcade` (`http://toucharcade.com/`) is one of those sites, but it also has a very
    active forum where developers issue promo codes. And `AppGiveaway` (`http://appgiveaway.com/`)
    runs promotions where it hands out promo codes over a set period of time. This
    is a lot more convenient than handing them out yourself, although you should do
    that, too. Keeping an inventory of promo codes is also a good reason to crank
    out app updates, since you get a fresh batch of 50 codes with each update.


    ## More Monetization


    Given the yearly Apple developer fee and Unity license costs, chances are you
    want to at least make that money back.


    ### In-App Purchasing


    Apple offers one other revenue channel for iOS besides app sales: an in-app purchasing
    (IAP) system called `Storekit`. Unity iOS doesn’t have a script interface for
    IAP, but `Prime31 Studios` includes a `Storekit` plug-in among its offerings.
    The Unity Manual has some tips for how you might download and activate additional
    content purchased with IAP, and the iTunes Connect documentation explains how
    to set up in-app purchases.


    ### Asset Store


    I use dozens of free and paid `Asset Store` packages in my apps, and you will
    surely find the `Asset Store` useful for your own projects. But the `Asset Store`
    is also another place to self-publish products and generate revenue (Unity takes
    a 30 percent cut, which is the same as what Apple does on the App Store). And
    you can release packages free on the `Asset Store` for recognition or as a contribution
    to the community (I’ve certainly taken advantage of that generosity for the examples
    in this book).


    Conveniently, `Asset Store` submissions are made from within the Unity Editor,
    using the `Asset Store` tools downloaded from, aptly, the `Asset Store`. You can
    submit any collection of assets from a project—audio, textures, models, scripts,
    plug-ins, or even the entire project itself.


    **Tip**


    Use preprocessor directives to ensure there are no compiler errors when switching
    build targets, and add a custom `UNITY_PRO` preprocessor directive if you have
    Unity Pro features so that Unity Basic users won’t have problems.


    Much of the work in an `Asset Store` submission, as with an `App Store` submission,
    involves creating screenshots, icons, app descriptions, and store artwork. The
    instructions for becoming a seller on the `Asset Store` are available at `http://unity3d.com/asset-store`.


    ### Developing for Android


    Almost everything developed for Unity iOS in this book will work fine with Unity
    Android. Unsurprisingly, anything in the `iPhone` class is not available on Android
    either (e.g., the variable `iPhone.generation`, which we used to check the device
    type), but everything in the `Input` class that works for iOS also works the same
    on Android, including the touchscreen and accelerometer functions.


    `Prime31 Studio` and other vendors offer Unity Android plug-ins to provide more
    access to device features and mobile services, such as the `AdMob` mobile ad service.


    The build and submission process is different for Android, too. Instead of Xcode,
    Android requires installation of the Android SDK. You can still invoke a Build
    and Run operation from the Unity Editor, but instead of building an Xcode project
    for the app, Unity Android directly builds the executable app (an APK file). And
    unlike iOS development, Android development can be targeted to a number of app
    stores. Google Play in particular has no approval process, so it’s a good avenue
    to self-publish quickly and a useful fallback channel for apps rejected by Apple.


    ### Contract Work


    While working on that next hit app, independent developers often keep the bills
    paid by taking contract work. Prospective clients can be found in the Paid Work
    topic of the Unity forum and on `http://unity3dwork.com/` and even general contractor
    web sites like `http://odesk.com/`. Some marketplaces specialize in mobile app
    development, such as `http://apptank.com/` and `http://theymakeapps.com/`.


    If you’re looking for full-time game development work, whether it involves Unity
    or not, experience developing games with Unity, not to mention a portfolio of
    self-published games, can only help.'
  raw: '## Tracking Apps


    Although iTunes Connect provides download and sales figures (and the graph is
    a lot easier to read than the `.csv` report, which once was the only option),
    there are several third-party products that track app sales and other data like
    app rankings and reviews.


    App Annie ( [`http://appannie.com/`](http://appannie.com/) ) and AppFigures (
    [`http://appfigures.com/`](http://appfigures.com/) ) are two of the more popular
    web-based products that automatically perform daily downloads of app data from
    iTunes Connect (after you provide your iTunes Connect login information during
    account setup). They both have nice graph presentations of the sales data and
    send daily e-mail summaries of the app statistics. App Annie is currently free
    (technically in beta), while AppFigures charges a fee.


    Figure [15-6](#A310332_2_En_15_Chapter.html#Fig6) shows an App Annie graph of
    downloads over a month for Fugu Bowl. The number of downloads that are updates
    are overlaid over the downloads that are sales. There in the update line corresponding
    to releases of updates for FuguBowl.


    ![A310332_2_En_15_Fig6_HTML.jpg](Images/A310332_2_En_15_Fig6_HTML.jpg)


    Figure 15-6.


    The App Annie sales graph


    AppViz ( [`http://appviz.com/`](http://appviz.com/) ) is an macOS application
    that performs the same function but downloads the data onto your Mac and features
    a variety of graphs, including sales by geography (Figure [15-7](#A310332_2_En_15_Chapter.html#Fig7)).
    AppViz is not free, but it doesn’t cost much, and I think it’s well worth it.


    ![A310332_2_En_15_Fig7_HTML.jpg](Images/A310332_2_En_15_Fig7_HTML.jpg)


    Figure 15-7.


    The AppViz geographic view


    There’s no reason to restrict yourself to just one of these products. I use AppViz
    to ensure I have all of my app sales data available locally, and I like its variety
    of graphics and the App Store review downloads. And I use AppAnnie for its automated
    e-mail reports of daily sales figures and rankings display (downloading of all
    that ranking data in AppViz takes a long time), and App Annie has support for
    some Android app stores. Also, it’s free!


    Tip


    From AppViz, you can export all the data you’ve downloaded for it and then import
    that data into another product like App Annie. Since Apple only makes a year’s
    worth of app sales data available on iTunes Connect, this is a way to ensure you
    can always import the entire sales history of an app into a sales tracking product.


    ## Promo Codes


    I have described how to download promo codes after an app is approved on the App
    Store, but I didn’t explain what to do with them. There are plenty of options.
    Nearly every app review site accepts promo codes with review requests. Touch Arcade
    ( [`http://toucharcade.com/`](http://toucharcade.com/) ) is one of those sites,
    but it also has a very active forum where developers issue promo codes. And AppGiveaway
    ( [`http://appgiveaway.com/`](http://appgiveaway.com/) ) runs promotions where
    it hands out promo codes over a set period of time. This is a lot more convenient
    than handing them out yourself, although you should do that, too. Keeping an inventory
    of promo codes is also a good reason to crank out app updates, since you get a
    fresh batch of 50 codes with each update.


    ## More Monetization


    Given the yearly Apple developer fee and Unity license costs, chances are you
    want to at least make that money back.


    ### In-App Purchasing


    Apple offers one other revenue channel for iOS besides app sales: an in-app purchasing
    (IAP) system called Storekit. Unity iOS doesn’t have a script interface for IAP,
