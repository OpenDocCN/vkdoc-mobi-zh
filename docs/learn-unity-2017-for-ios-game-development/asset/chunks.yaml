    \ including one, if only for that reason.\n\nIn this chapter, you’ll implement\
    \ both a scoreboard and a start/pause menu with Unity’s built-in GUI system, known\
    \ as UnityGUI. (You can tell how long a Unity feature has been around by the coolness\
