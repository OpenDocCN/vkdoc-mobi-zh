  trans: '

    # 使用配置门户


    假设您拥有 iOS 开发者计划会员资格（如果没有，可以跳过本章，稍后再回来看），请登录 [`http://developer.apple.com/`](http://developer.apple.com/)
    并进入配置门户。


    > **注意**：苹果开发者网站有多个可登录的区域——会员中心、iOS 开发中心和开发者论坛——您可以从会员中心或 iOS 开发中心进入配置门户（目前，其组织结构确实有些混乱）。


    登录后，网站上有详细的文档说明（配置门户是苹果几乎没有公开逐步截屏文档的少数区域之一），但我会简要概述涉及的步骤以及您需要提供的信息。


    ## 注册测试设备


    开发配置配置文件仅对指定的测试设备集有效，因此首先要做的是在配置门户中注册您要用于测试的 iOS 设备。您需要提供每个设备的唯一设备标识符（`UDID`）。设备的
    `UDID` 可以通过 iTunes 或 `Xcode` 找到。在 iTunes 中，当 iOS 设备连接到您的 Mac 时，点击设备的序列号即可找到 `UDID`，该操作会将序列号显示切换为
    `UDID` 显示。但该显示内容无法复制粘贴，因此更好的选择是从 `Xcode` 中获取该编号。


    当 iOS 设备连接到您的 Mac 时，`UDID` 会显示在 Xcode 设备窗口中。要调出 `Xcode` 的设备窗口，请启动 `Xcode`（如果尚未运行），然后从
    `Window` 菜单中选择 `Devices`（图 11-1）。


    ![A310332_2_En_11_Fig1_HTML.jpg](img/A310332_2_En_11_Fig1_HTML.jpg)


    *图 11-1. 从 Xcode `Window` 菜单中选择 `Devices`*


    调出设置器窗口后，所有连接的 iOS 设备都应列在左侧面板中。选择您要注册测试的设备，设备信息（包括列为 `identifier` 的 `UDID`）便会显示出来（图
    11-2）。


    ![A310332_2_En_11_Fig2_HTML.jpg](img/A310332_2_En_11_Fig2_HTML.jpg)


    *图 11-2. 从 Xcode 设置器中获取设备 ID*


    然后，您可以将 `UDID` 复制并粘贴到配置门户中，以注册您的测试设备。


    ## 注册应用标识符


    注册测试设备后，您需要注册应用标识符，因为每个配置配置文件仅对单个应用 ID 有效。一个应用 ID 对应一个捆绑包 ID（与您在 Unity 播放器设置中为应用指定的
    ID 相同），或者当它以星号结尾时匹配多个捆绑包 ID（此时称为通配符应用 ID）。例如，我注册了应用 ID `com.technicat.*`，可以在一个配置配置文件中将其用于我所有的应用，例如
    `com.technicat.fugubowl` 和 `com.technicat.hyperbowl`。


    > **提示**：创建一个匹配您所有或大部分捆绑包 ID 的通配符应用 ID，这样您就不必为每个捆绑包 ID 都创建新的应用 ID。


    ## 使用开发配置配置文件


    要创建开发配置配置文件，您需要生成一个与该配置文件关联的开发证书。配置门户有关于如何生成和上传证书请求的说明，该请求将产生一个新的开发证书。然后，您可以创建一个与该证书关联的开发配置配置文件。


    实际上，一旦您生成了开发证书，配置门户会自动为您生成一个团队配置配置文件，该文件使用星号（`*`）作为应用 ID，从而匹配您的任何捆绑包 ID，这非常方便。但您也可以使用相同的证书和您指定的应用
    ID 生成任意数量的其他开发配置配置文件。


    ## 使用发布配置配置文件


    创建发布配置配置文件类似于创建开发配置配置文件。您需要创建一个发布证书，然后创建一个与该证书关联的发布配置配置文件。


    > **提示**：通过重复使用同一个证书请求文件来创建开发证书和发布证书，可以节省一些时间。


    # 使用 Xcode 设置器


    当您的开发配置配置文件可用时，您可以将它们下载到 `Xcode` 中。调出 Xcode 设置器窗口（从 Xcode `Window` 菜单），在侧边栏中选择
    `Provisioning Profiles`，然后点击配置文件列表右下角的 `Refresh` 按钮。在提示您输入 Apple 开发者登录信息后，设置器将检索并显示您在配置门户中创建的所有配置配置文件。


    图 11-3 显示了我的全部四个配置配置文件。请注意，所有应用 ID 都带有一个数字前缀。这是由配置门户生成的，称为捆绑包种子 ID。就我们这里的目的而言，您可以忽略它。


    ![A310332_2_En_11_Fig3_HTML.jpg](img/A310332_2_En_11_Fig3_HTML.jpg)


    *图 11-3. Xcode 设置器中列出的配置配置文件*


    第一个配置配置文件名为 **La Petite Baguette Distribution**，是一个发布配置配置文件，仅匹配一个名为 La Petite
    Baguette 的应用（一个餐厅应用）。请注意，应用 ID 是完全指定的，与 La Petite Baguette 应用的捆绑包 ID 完全匹配。还要注意，该配置配置文件已过期。


    第二个配置文件 **iOS Team Provisioning Profile** 是配置门户自动创建的开发配置配置文件。它匹配任何应用的捆绑包 ID。


    第三个配置文件名为 `techdev`，是我创建的一个开发配置配置文件，可用于我的任何应用，因为它会匹配以 `com.technicat` 开头的任何捆绑包
    ID。


    第四个配置文件是我唯一的发布配置配置文件。它也匹配任何捆绑包 ID 以 `com.technicat` 开头的应用。


    请注意过期日期。证书及其关联的配置配置文件会在一年后过期，届时您必须用使用新证书创建的新配置文件替换已过期的配置文件。


    您可以在 Xcode 设置器中通过点击左下角的 `+` 按钮来添加一个配置配置文件（图 11-4）。


    ![A310332_2_En_11_Fig4_HTML.jpg](img/A310332_2_En_11_Fig4_HTML.jpg)


    *图 11-4. 添加配置配置文件*

    '
- fmt: '## Build and Run


    Now you’re ready to start testing your device. The process is the same as building
    and running for the iOS simulator, except first you will need to go to the Unity
    player settings and set `Target SDK` to `Device SDK` instead of `Simulator SDK`
    (Figure [11-5](#A310332_2_En_11_Chapter.html#Fig5)).


    ![A310332_2_En_11_Fig5_HTML.jpg](Images/A310332_2_En_11_Fig5_HTML.jpg)


    Figure 11-5.


    The player settings for a device build


    Before starting a build, because you’re building for real hardware, you should
    make sure the `Target iOS Version` setting is compatible with your test device
    (or vice versa), meaning the `Target iOS Version` setting should be at least as
    old as whatever version of iOS your test device is running. But really, it’s a
    deployment decision, too. Supporting older versions of iOS increases the potential
    number of customers but may increase your support burden and prevent the use of
    features available only in later versions of iOS. It turns out there is data on
    iOS hardware and versions currently running Unity-based apps, collected by Unity,
    at [`http://stats.unity3d.com/`](http://stats.unity3d.com/). Any Unity app you
    create will contribute to this data, as long as the `Submit HW Statistics` option
    is selected in the player settings. You can perform a `Build and Run` operation,
    which is equivalent to performing a build, manually opening the generated Xcode
    project by double-clicking the project file (Figure [11-6](#A310332_2_En_11_Chapter.html#Fig6)),
    and then clicking the Run button in Xcode.


    ![A310332_2_En_11_Fig6_HTML.jpg](Images/A310332_2_En_11_Fig6_HTML.jpg)


    Figure 11-6.


    An Xcode project generated by a Unity iOS build


    Either way, instead of building and running in the iOS simulator, Xcode will build,
    install, and run on the connected test device.


    **Tip**: It’s best to disable screen lock completely while using a device for
    testing. Initiating a run from Xcode will fail if the connected device has the
    screen locked.


    As with the iOS simulator, any Unity debug text will show up in the Xcode debug
    area (Figure [11-7](#A310332_2_En_11_Chapter.html#Fig7)) instead of the Console
    view as in the Unity Editor.


    ![A310332_2_En_11_Fig7_HTML.jpg](Images/A310332_2_En_11_Fig7_HTML.jpg)


    Figure 11-7.


    Xcode running an app on a test device


    **Note**: The Xcode equivalent of a view in the Unity Editor is called an area.
    Unlike views, Xcode areas are spelled in lowercase (e.g., the navigation area,
    the editor area, and the debug area).


    You can also make use of the MonoDevelop debugger, although there’s more setup
    involved to debug an iOS app than a game running in the Unity Editor. To enable
    the app for remote debugging with MonoDevelop, select the `Development Build`
    option in the Build Settings window (Figure [11-8](#A310332_2_En_11_Chapter.html#Fig8)).
    After the `Development Build` option is enabled, the `Script Debugging` option
    becomes available, and you should select that, too.


    ![A310332_2_En_11_Fig8_HTML.jpg](Images/A310332_2_En_11_Fig8_HTML.jpg)


    Figure 11-8.


    Creating a development build with script debugging enabled


    Remote debugging has problems interacting with Xcode, including the inability
    to resume after breakpoints, so first perform a `Build and Run` operation to get
    the app installed on the test device. Click Stop in Xcode to halt the test run
    and then manually restart the app on the device (i.e., tap the app’s icon just
    like you would to start the app normally). Finally, in MonoDevelop, perform an
    `Attach to Process` operation, only instead of attaching to the Unity Editor,
    attach it to the test device (Figure [11-9](#A310332_2_En_11_Chapter.html#Fig9)).


    ![A310332_2_En_11_Fig9_HTML.jpg](Images/A310332_2_En_11_Fig9_HTML.jpg)


    Figure 11-9.


    Attaching the MonoDevelop debugger to the iOS player


    After you’re satisfied with the device testing, it’s time to submit your app to
    the App Store. This doesn’t require any change within Unity; you only need to
    rebuild the app within Xcode using a distribution provisioning profile instead
    of a development provisioning profile. But first, you need to create an App Store
    entry for the app in iTunes Connect. And before you create the iTunes Connect
    entry, you should have some graphics ready for the App Store.


    ## Prepare App Store Graphics


    You’ll need two kinds of graphics for the App Store: an app icon and a set of
    screenshots for all the devices that you’re targeting. iTunes Connect has a tendency
    to log out after a period of idleness and lose all changes, so you don’t want
    to be messing around with creating an icon and taking screenshots while logged
    in there.


    ### Create an Icon


    iTunes Connect will ask for a 1024 × 1024 version of your app icon, either in
    `.png` or `.jpeg` format, that will accompany the App Store description of your
    app. If you planned ahead when creating the app icon, you’re all set. Otherwise,
    you’ll have to create it now before proceeding to iTunes Connect.


    Ideally, you’d have a professional icon designer create the icon, but if you’re
    low on both funds and art skills, you can do what I do in a pinch—grab a large
    screenshot from the Unity Editor game view and scale it to 1024 × 1024. It’s better
    to scale from large to small. Scaling up a smaller existing icon usually doesn’t
    create good results and is discouraged by Apple, although it probably happens
    a lot because until fairly recently apps were submitted with a 512 × 512 icon
    uploaded.


    **Caution**: Apple may reject an app if the App Store icon does not match any
    of app’s icons that are displayed on a device. So if you create an entirely new
    1024 × 1024 for the App Store, you should set that as the default icon in the
    Unity player settings.


    ### Take Screenshots


    iTunes Connect will also ask you for screenshots in three sizes: matching the
    iPhone 4 (640 × 960 or 960 × 640), iPhone 5 (640 × 1136 or 1136 × 640), and iPad
    (768 × 1024 or 1024 × 768 or double that for the new iPad). That’s assuming you
    selected `iPhone + iPad` as the supported hardware in the Unity player settings.
    If you selected only `iPhone`, then you don’t need to supply the iPad screenshot,
    and if you selected only `iPad`, then you only need to supply the iPad screenshot.


    There are three fairly convenient ways to take screenshots: using the iOS simulator,
    from a device using the Xcode Organizer window, and on the device itself by pressing
    both the Home and Power buttons at the same time.


    Taking screenshots with the iOS simulator is easy. Use the `Screenshot` command
    in the Edit menu, and the resulting screenshot is saved on the desktop. It may
    be inconvenient to use the iOS simulator if your game does not play well with
    the limited iOS simulator input. But if you don’t have an iPhone or an iPad, this
    is one way to get screenshots.


    Taking Xcode screenshots is almost as simple. With a device attached to your Mac,
    select the Screenshots panel of the device as it appears in the Xcode Organizer
    window. Then click the `New Screenshot` button on the lower right when you see
    a screen you like, as you play your game on the test device. The screenshot will
    appear on the desktop for easy access.


    My favorite way to take a screenshot is directly on the device by pressing the
    Home and Power buttons simultaneously. The resulting screenshot is saved to Photos
    on the device, which can later be synced to iPhoto on the Mac and accessible in
    the Finder from there. This method allows me to take screenshots at my leisure,
    and anywhere I want, like on the sofa, instead of being tethered to a Mac. And
    it’s easier to quickly take a screenshot at a propitious moment than trying to
    grab a mouse and quickly click the `New Screenshot` button in the Xcode Organizer.'
