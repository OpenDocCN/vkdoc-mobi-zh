- fmt: '### Update: Gather Input


    Attempting to calculate rotations and translations (changes in position) to simulate
    rolling the ball would be complicated, involving collision detection and responses
    with the floor and pins and taking in account gravity and friction and bouncing…all
    the calculations that the physics engine already does. It would be a waste not
    to leave that aspect up to the Unity physics system.


    And because the ball already has a `Rigidbody` component, it is already a physical
    object subject to forces, including gravity, and responding to collisions, including
    the floor. So, all that’s needed to roll the ball is a push. How much of a push
    depends on the input, which, in this design, is the movement of the mouse. Note
    the original, non-Unity version of HyperBowl applied a torque (rotational force)
    to the bowling ball, effectively spinning it. Unity does have a script function
    to apply torque to a `Rigidbody` component, called `Rigidbody.AddTorque`, but
    I’ve found that it works better in Unity to roll the ball by pushing it with a
    linear force using `Rigidbody.AddForce`.


    The mouse movement, and input in general, can be checked every frame, so the input-gathering
    code and computation of the corresponding push should go in the `Update` callback
    of the script, as shown in Listing [6-1](#A310332_2_En_6_Chapter.html#Par70).
    Copy that listing into the `FuguForce` script.


    ```

    #pragma strict

    var mousepowerx:float = 1.0;

    var mousepowery:float = 1.0;

    private var forcex:float=0.0;

    private var forcey:float=0.0;

    function Update() {

    forcex = mousepowerx*Input.GetAxis("Mouse X")/Time.deltaTime;

    forcey = mousepowery*Input.GetAxis("Mouse Y")/Time.deltaTime;

    }

    ```


    The script begins with the variables `mousepowerx` and `mousepowery` used to scale
    force applied the ball. `mousepowerx` affects the force resulting from moving
    the mouse left or right, and `mousepowery` affects the force resulting from moving
    the mouse forward and backward. The variables are public, so they can be adjusted
    in the `Inspector` view.


    The final calculated force is stored in the private variables `forcex` and `forcey`,
    also corresponding to left-right and forward-backward mouse movement, respectively.


    **Tip**


    It’s a good idea to always specify an initial value for variables in their declarations.
    That makes the meaning of the code clearer and avoids errors because of wrong
    assumptions about the initial values (C and C++ programmers especially know to
    be wary of mystery bugs from uninitialized variables).


    The `Update` callback is where `forcex` and `forcey` are calculated from `mousepowerx`
    and `mousepowery` and the mouse movement. Input in Unity is queried using the
    `Input` class. For example, the mouse position can be checked by examining the
    static variable `Input.mousePosition`, so the mouse movement could be ascertained
    by saving the mouse position in each `Update` call and comparing the current position
    with the saved position from the previous frame.


    But the higher-level `Input.GetAxis` function does that work already. `Input.GetAxis`
    returns a value from -1 to 1 for left-right or forward-backward movement from
    a mouse, joystick, or keyboard, depending on the argument passed to the function.


    In the `Update` callback, `Input.GetAxis("Mouse X")` is called to obtain the left-right
    mouse movement, and `Input.GetAxis("Mouse Y")` is called for the front-back movement
    that occurred over the previous frame. The results are assigned to the variables
    `forcex` and `forcey`, respectively, after taking into account how much time elapsed
    during the frame (our old friend `Time.deltaTime`) and multiplying by scaling
    factors `mousepowerx` and `mousepowery`.


    With this code in the `FuguForce` script, you can see the public `mousepower`
    variables show up in the `Inspector` view of the ball (Figure [6-26](#A310332_2_En_6_Chapter.html#Fig26)).


    ![A310332_2_En_6_Fig26_HTML.jpg](Images/A310332_2_En_6_Fig26_HTML.jpg)


    When you click Play, you still don’t have any control over the ball, since you
    haven’t added the actual ball-pushing code yet. However, if you select the Debug
    option in the `Inspector` view menu, the private `forcex` and `forcey` variables
    will display, and you can see them change as you move the mouse.


    ### FixedUpdate: Use the Force


    Functions that affect physics, including `Rigidbody.AddForce`, should be invoked
    in the `FixedUpdate` callback. Unlike the `Update` callback, which is called once
    per frame and can take any amount of time, the `FixedUpdate` callback takes place
    after every fixed time step has elapsed. For good results, physics simulations
    need to run at a fixed interval, typically with more frequency than `Update`.
    Varying intervals between physics computations can result in varying behavior
    and long lags between physics updates. In Unity, this time step is set in the
    `TimeManager` (Figure [6-27](#A310332_2_En_6_Chapter.html#Fig27)), which is available
    in the `Project Settings` submenu of the `Edit` menu.


    ![A310332_2_En_6_Fig27_HTML.jpg](Images/A310332_2_En_6_Fig27_HTML.jpg)


    The `FixedUpdate` callback is called at these physics update intervals (I think
    of `FixedUpdate` really as `PhysicsUpdate` and of `Fixed Timestep` as `PhysicsTimestep`),
    so this is where any change to the physics simulation should take place, especially
    any action on a `Rigidbody`.


    Since the force for pushing the ball is already calculated in the `Update` callback,
    the `FixedUpdate` callback just needs to apply those values in a call to `Rigidbody.AddForce`
    on the ball’s `Rigidbody` component (Listing [6-2](#A310332_2_En_6_Chapter.html#Par82)).


    ```

    function FixedUpdate() {

    rigidbody.AddForce(forcex,0,forcey);

    }

    ```


    The `Rigidbody` function `AddForce` is called on the variable `rigidbody`, which
    is a `Component` variable that always references the `Rigidbody` component or
    this `GameObject`. The `GameObject` class also has a `rigidbody` variable, so
    a reference to `gameObject.rigidbody` would be equivalent.


    The three values passed to `Rigidbody.AddForce` are the x, y, and z values of
    the force, which is a vector since it has direction and magnitude. The direction
    of the force is in world space, and from the viewpoint of the `Main Camera` in
    this game, x is left-right and z is forward-backward. So, `forcex` is passed in
    for the x argument and `forcey` for the z argument. The controls don’t push the
    ball up or down, just forward and sideways, so 0 is passed in as the y argument.


    **Note**


    Be sure to check the Script Reference page on `Rigidbody.AddForce`. It is an overloaded
    function with a variation that takes the force as a `Vector3` instead of three
    separate numbers. Also, both variations take an optional argument that can specify
    the value applied to the `Rigidbody` is a quantity besides force—either acceleration,
    an impulse, or an instantaneous change in velocity.


    Now when you click Play and move your mouse, the ball rolls in that direction.
    Try changing the `mousepowerx` and `mousepowery` values in the `Inspector` view
    to get the roll responsiveness you want.'
