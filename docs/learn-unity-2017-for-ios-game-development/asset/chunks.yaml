  trans: '

    ### 脚本编写


    虽然本书中你只使用 JavaScript 进行开发，但在 Unity 世界中存在大量 JavaScript 和 C# 代码，因此你应当对两者都熟悉起来。由
    Andrew Stellman 和 Jennifer Greene 合著的《*深入解析 C#*》是一本非常棒的图文并茂的 C# 入门书。


    由于 C# 是微软作为其 .NET 框架的一部分创建的，因此可以通过在微软开发者网络（MSDN）上搜索 C# 来找到官方 C# 文档和其他资源，网址是 [`http://msdn.microsoft.com/`](http://msdn.microsoft.com/)。


    在 MSDN 上，还可以搜索 .NET 文档，因为 Unity 的脚本引擎是通过 Mono 实现的，而 Mono 是 .NET 的一个开源版本。官方 Mono
    网站是 [`http://mono-project.org/`](http://mono-project.org/)。


    如果把两个程序员关在一个房间里，他们最可能争论的就是代码规范。我的经验法则是遵循我编写代码时所使用的官方语言和框架的规范。这是一个枯燥但名字有趣的话题。


    例如，Unity 在其大小写规则中混合使用了驼峰式和帕斯卡式命名法（或者用这些规范本身来描述，就是 `camelCase` 和 `PascalCase`）。你可以在维基百科上搜索驼峰式命名法。


    括号放置位置也是常见的争论点。根据 Jeff Atwood（Stack Exchange 的名人）在其热门博客 Coding Horror（ [`www.codinghorror.com/blog/2012/07/new-programming-jargon.html`](http://www.codinghorror.com/blog/2012/07/new-programming-jargon.html)
    ）上的说法，我这里使用的约定（也是 Unity 使用的，至少在创建新脚本模板时）被称为埃及风格。该文章还将对类名应用标准前缀的做法称为“蓝精灵命名法”。


    # 5. 一起跳舞吧！动画与音效


    在 Unity 中移动游戏对象的三种方式中，上一章介绍了通过脚本控制 Transform 组件，而物理引擎将在下一章启动的保龄球游戏示例中扮演重要角色。脚本控制移动无处不在。例如，即使在即将开发的保龄球游戏中，虽然主要依靠物理引擎来控制物理模拟：保龄球及其与地板和球瓶的碰撞，但摄像机跟随行为仍然是通过一个修改其
    Transform 组件的脚本来实现的（这与立方体场景中使用的脚本非常相似）。不仅如此，在每次投球和每帧之间，所有移动的游戏对象都是通过恢复其 Transform
    组件中的值来进行重置的。


    在进入那个保龄球游戏之前，本章将花一些时间在已构建的立方体场景基础上进行扩展，为其添加一个跳舞的角色动画，让你感受 Unity 的动画支持。没有音乐的舞蹈演示是不完整的，因此这个场景还会加入循环音效。这仍然是一个非物理的、只有轻度交互的场景，但理想情况下，它将以一种漂亮且有趣的方式介绍
    Unity 的动画和音频支持，然后再深入探索大量的物理知识（这是一个大话题，横跨两章）以及更多的脚本编写（一个更大的话题，涵盖本书剩余部分）。


    如果你是新手，制作高质量的动画（尤其是角色动画）并非易事。音乐也一样。幸运的是，Unity 资源商店中有许多音乐和角色动画包，其中很多是免费的，包括本章使用的“骷髅包”和“通用音乐集”。这些资源不包含在对应项目（位于
    [`www.apress.com/9781484231739`](http://www.apress.com/9781484231739)）的下载文件中，但如果您是直接从本章开始，并且没有上一章构建的立方体场景，可以直接使用该项目作为起点。


    ## 导入骷髅包


    在资源商店窗口中搜索资源商店。在搜索框中输入 `skeleton` 并选择“免费”，搜索结果中会出现几个骷髅资源包（图 5-1）。


    ![A310332_2_En_5_Fig1_HTML.jpg](img/A310332_2_En_5_Fig1_HTML.jpg)


    图 5-1. 骷髅包在项目视图中的搜索结果


    选择骷髅资源，并在检查器视图中确认该包确实是“骷髅包”（图 5-2）。


    ![A310332_2_En_5_Fig2_HTML.jpg](img/A310332_2_En_5_Fig2_HTML.jpg)


    图 5-2. 骷髅包的“导入 Unity 包”视图


    安装后，会在项目视图中添加一个 `SkeletonData` 文件夹（图 5-3），并在 `prefabs` 文件夹中添加一些预制件。


    ![A310332_2_En_5_Fig3_HTML.jpg](img/A310332_2_En_5_Fig3_HTML.jpg)


    图 5-3. 骷髅包预制件的项目视图


    ## 添加骷髅


    骷髅包安装的四个预制件都具有相同的骨骼，但配备了不同的装备，例如剑和盾。然而，事实证明，配备武器的骷髅预制件在跳舞时看起来像是在砍自己的肢体，因此我们只使用
    `skeletonNormal` 预制件，它只有光秃秃的骨骼。通过将 `skeletonNormal` 预制件拖拽到层级视图中，即可在场景中添加它的一个实例（图
    5-4）。`skeletonNormal` 游戏对象有一个动画组件，该组件引用了骷髅的动画数据。`skeletonNormal` 还有两个子游戏对象。一个名为
    `Bip01`，实际上是一个代表骷髅骨骼的游戏对象层级结构。当骷髅移动时，手臂也随之移动，任何手部运动都是相对于手臂的，依此类推。这个骨骼层级结构让人想起“骷髅舞”这首歌——"大腿骨连着髋骨…"。


    ![A310332_2_En_5_Fig4_HTML.jpg](img/A310332_2_En_5_Fig4_HTML.jpg)


    图 5-4. 包含 skeletonNormal 资源的层级视图


    另一个子游戏对象 `skeleton` 带有一个 `SkinnedMeshRenderer` 组件，类似于作为 `Renderer` 子类的 `MeshRenderer`
    组件。不过，`SkinnedMeshRenderer` 负责渲染包裹在骨骼周围的网格，并跟随骨骼关节的移动。这个网格本质上构成了骨骼的皮肤，因此将这种网格映射到骨骼的过程通常被称为*蒙皮*。


    `skeletonNormal` 预制件还包含几个粒子效果，这些效果由带有 `ParticleEmitter` 组件的游戏对象实现。粒子效果由许多微小的动画图元组成，非常适合创建火焰、爆炸、烟雾或任何类型的闪光效果。


    > **注意：** 骷髅包中包含的粒子效果使用的是 Unity 的旧版粒子系统，而不是 Unity 3.5 中引入的较新的“手里剑”粒子系统。旧版系统使用
    `ParticleEmitter` 组件，而“手里剑”系统使用 `ParticleSystem` 组件。

    '
- fmt: '# Hide the Cubes


    This scene is all about the dancing skeleton, so you can dispense with the cubes
    that were featured in the previous two chapters. Instead of deleting the cubes
    from the scene (by selecting them and invoking `Delete` from the `Edit` menu or
    by using the `Command+Delete` shortcut), they can be made invisible, out of sight
    and out of mind, by deactivating them. Select the parent cube in the `Hierarchy`
    view and deselect the top-left check box in the `Inspector` view, and the entire
    tree of cubes in the `Hierarchy` view is now grayed out to indicate they are inactive
    (Figure [5-5](#A310332_2_En_5_Chapter.html#Fig5)).


    ![A310332_2_En_5_Fig5_HTML.jpg](Images/A310332_2_En_5_Fig5_HTML.jpg)


    Figure 5-5. Scene with the skeleton active and the cubes deactivated


    All the child cubes are effectively inactive because the parent’s active status
    overrides the children’s. In other words, a `GameObject` is really active only
    if it’s marked as active and its parent is marked as active and its parent’s parent
    is marked as active, and so on. Any inactive `GameObject` has its components effectively
    disabled. Its `Renderer` no longer renders, its `Collider` no longer collides,
    and any attached scripts do not have their callbacks called, with the exception
    of `OnEnable` and `OnDisable`.


    # Orbit the Skeleton


    When you inserted the skeleton into `Hierarchy` view, Unity placed this asset
    at the origin (`0,0,0`). However, you may recall that you placed the cubes, the
    camera, and the lights away from this point. So, you need to move the skeleton
    closer to the camera. You could move the skeleton with the `Transform` tool, or
    you could simply type in the position in the `Inspector`. The `Transform` values
    (or coordinates) for `Position` are (`0,0,-10`) for `X`, `Y`, and `Z`, respectively
    (Figure [5-6](#A310332_2_En_5_Chapter.html#Fig6)).


    ![A310332_2_En_5_Fig6_HTML.jpg](Images/A310332_2_En_5_Fig6_HTML.jpg)


    Figure 5-6. The Transform values for the position of the skeleton


    In Chapter [2](../Text/A310332_2_En_2_Chapter.html), you created the `FuguRotate`
    script to rotate the object around its x-axis. In Chapter [2](../Text/A310332_2_En_2_Chapter.html),
    you put this script on the `Cube` `GameObject`. You can apply this script to any
    game object. In `Project` view, select the `FuguRotate` script from the `Scripts`
    folder and drag this to the camera in the `Hierarchy` view.


    Now when you click `Play`, the `Main Camera` orbits the skeleton as you move the
    mouse (Figure [5-7](#A310332_2_En_5_Chapter.html#Fig7)). As a bonus, since the
    skeleton prefab includes a particle effect, the skeleton appears to be standing
    amid a sparkly haze.


    ![A310332_2_En_5_Fig7_HTML.jpg](Images/A310332_2_En_5_Fig7_HTML.jpg)


    Figure 5-7. The Game view of an idle skeleton


    # Make the Skeleton Dance


    Right now the skeleton just shuffles around a little instead of dancing. If you
    select the `skeletonNormal` asset and examine it in the `Inspector` view, you
    can see the `GameObject` has an `Animation` component with a field referencing
    an “idle” or “Run” `AnimationClip` (Figure [5-8](#A310332_2_En_5_Chapter.html#Fig8)).


    ![A310332_2_En_5_Fig8_HTML.jpg](Images/A310332_2_En_5_Fig8_HTML.jpg)


    Figure 5-8. Changing the skeleton’s position and animation


    Notice also that the `Play Automatically` check box is selected, which is why
    the animation runs as soon as you click `Play`. This option would be deselected
    if the animation is intended to be initiated by a script at some time during the
    game.


    To replace the idle (or run) `AnimationClip` with a dancing `AnimationClip` asset,
    click the circle to the right of “idle” to bring up the `AnimationClip` selection
    list (Figure [5-9](#A310332_2_En_5_Chapter.html#Fig9)). Select the `AnimationClip`
    asset named “dance.”


    ![A310332_2_En_5_Fig9_HTML.jpg](Images/A310332_2_En_5_Fig9_HTML.jpg)


    Figure 5-9. An AnimationClip selection list


    Now when you click `Play`, the skeleton dances! (See Figure [5-10](#A310332_2_En_5_Chapter.html#Fig10).)


    ![A310332_2_En_5_Fig10_HTML.jpg](Images/A310332_2_En_5_Fig10_HTML.jpg)


    Figure 5-10. The dancing skeleton


    # Make the Skeleton Dance Forever


    If you let the skeleton dance for a while, it eventually stops when the `AnimationClip`
    asset ends. But the `AnimationClip` asset can be set to loop. In the `Inspector`
    view of `skeletonNormal`, click the reference to the “dance” `AnimationClip` asset
    in the `Animation` component. The `Project` view will show the selected `AnimationClip`
    asset and associated skeleton mesh along with the skeleton’s other `AnimationClip`
    assets (Figure [5-11](#A310332_2_En_5_Chapter.html#Fig11)).


    ![A310332_2_En_5_Fig11_HTML.jpg](Images/A310332_2_En_5_Fig11_HTML.jpg)


    Figure 5-11. Looping the animation


    The `Inspector` view displays a single stretch of animation data that’s split
    into the various `AnimationClip` assets. Select the “dance” clip in that list,
    and below, the `Wrap Mode` will display as `Default`. Change `Wrap Mode` to `Loop`
    and click the `Apply` button (just below the `Wrap Mode` field).


    Now when you click `Play`, the skeleton will dance and dance and dance.


    > **Note**

    > This skeleton uses Unity’s Legacy animation system. You can verify this by clicking
    the `Rig` button shown in Figure [5-11](#A310332_2_En_5_Chapter.html#Fig11) and
    see that the `Legacy` check box is selected. Unity 4 introduced a new animation
    system called Mecanim, which, among other features, allows you to use animation
    with different skeletons (or avatars, as they call them).'
