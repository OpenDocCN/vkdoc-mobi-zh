  trans: '

    ### 报告问题


    如果你长期使用 Unity，必然会遇到各种真实或臆想的 Bug。这并非对 Unity 的贬低。3D 游戏引擎本身非常复杂（至少在内部实现上），而其开发速度也相当惊人。（我最初使用的是
    Unity 1.6，当时它仅能在 macOS 上运行，且只能针对 Windows 和 macOS 构建部署。）Bug 不会自行修复，尤其是当它们无人上报时。这时就需要用到`Unity
    Bug Reporter`。正如我在介绍 Unity 安装文件时提到的，`Bug Reporter`位于 Unity 文件夹中，但通常从 Unity 编辑器的“帮助”菜单中启动（图
    1-9）。


    ![A310332_2_En_1_Fig9_HTML.jpg](img/A310332_2_En_1_Fig9_HTML.jpg)


    图 1-9. “帮助”菜单中的“报告 Bug”选项


    正如你在 Unity 安装文件列表中所见，`Bug Reporter`是一个独立于 Unity 编辑器的应用程序。因此，如果你遇到导致 Unity 编辑器无法正常启动的
    Bug，可以直接在 Finder 中双击该文件来启动`Bug Reporter`。


    弹出的`Unity Bug Reporter`窗口（图 1-10）会提示你选择 Bug 发生的位置（在 Unity 编辑器还是在 Unity Player
    中，即已部署的构建版本），指定 Bug 出现的频率，并提供一个电子邮件地址，以便 Unity Technologies 就此事发送回复。


    ![A310332_2_En_1_Fig10_HTML.jpg](img/A310332_2_En_1_Fig10_HTML.jpg)


    图 1-10. Unity Bug Reporter 窗口


    在下方窗口中间区域，是附件列表。Unity 会自动将当前项目添加到列表中，你也可以包含截图或日志文件等补充文件。你可以从列表中移除当前项目，但通常情况下，你应该包含该项目，以便
    Unity 支持团队能够复现问题。


    同样，你应该在问题描述中填写足够详细的解释，以便 Unity 支持团队了解如何重现不符合预期的行为，并理解为什么该行为不符合预期。基本上，你需要避免得到诸如“我们无法重现此问题”或“这不是
    Bug，是设计如此”之类的回复。


    提交 Bug 报告后不久，你应该会收到来自 Unity Technologies 的电子邮件确认，其中包含一个案例编号以及 Unity Bug 数据库中该报告副本的链接，你可以通过该链接查看
    Bug 的状态。


    ### 检查更新


    如果幸运的话，你的 Bug 报告会促成一次修复。如果非常幸运，修复将在下一个 Unity 更新中出现。你可以随时通过选择菜单栏中“窗口”菜单下的`Check
    for Updates`命令来检查是否有新更新。打开的窗口会显示是否有可用更新（图 1-11）。


    ![A310332_2_En_1_Fig11_HTML.jpg](img/A310332_2_En_1_Fig11_HTML.jpg)


    图 1-11. Unity 编辑器更新检查


    注意图 1-11 中显示的版本号为 Unity 5.6.2f1。后缀代表最细粒度的发布版本，包括紧急热修复。出于谨慎考虑，Unity Technologies
    通常不会立即将新发布的更新提供给编辑器检查，因此，如果你急切地等待某个 Bug 修复更新，也可以随时查看 Unity 网站。


    ## 进一步探索


    我最喜欢的科技书籍，比如 Peter van der Linden 的《Just Java》（一本为非程序员准备的详细但轻松的 Java 入门书），会在每章末尾通过讲述一段有趣的轶事、冷知识或相关历史来提供一个愉快的间歇。可惜，我不会在这本书中这样做。然而，我确实觉得单纯的章节总结和概述很乏味（作为读者我总会跳过它们），并且我认为新
    Unity 开发者面临的主要挑战之一是：他们需要养成自行查找 Unity 信息的习惯，并且需要知道去哪里找到这些信息——而这并不总是那么容易！


    因此，在包括本章在内的每一章末尾，我都会为你提供与你刚刚学到的主题相关的文档和其他资源，这样你就知道去哪里找到权威且全面的信息来源，并在读完本书后能更进一步。我会重点介绍官方
    Unity 手册和 Unity 网站，但也会提及一些第三方资源。现在你已经安装了 Unity，在本书开始使用它之前，不妨稍作休息，浏览一下你今后一定会大量使用的网站和参考文档。在需要之前就弄清楚去哪里寻找所需信息，总是一个好习惯。


    ### iOS 开发需求


    在本章开头，我提到最好尽早开始下载 Xcode 并注册 Apple Developer Program。


    iOS 开发的需求，包括所需的硬件和关于 Apple Developer Program 的详细信息，都列在 Apple 的开发者支持页面（`http://developer.apple.com/support`）上。


    你可以在`http://developer.apple.com/xcode`查找关于 Xcode 需求及下载 Xcode 的信息。


    ### Unity 网站


    随着 Unity 功能和平台的发展，Unity 网站（`http://unity3d.com/`）也在不断壮大。整个网站都值得浏览，但尤其要了解 Unity
    的通用信息，请查看 Unity 网站上的常见问题解答部分（`http://unity3d.com/unity/faq`）。


    Unity 视频档案库（`http://video.unity3d.com/`）提供了许多教学视频，并且 Unity 最近在其网站上引入了“学习”标签，以便于访问文档和教程。


    ### Unity 社区


    Unity“帮助”菜单中部的头三项是官方 Unity 社区的链接。论坛（`http://forum.unity3d.com`）是用户可以提出任何与 Unity
    相关话题的地方（不过论坛也有版主）。


    Unity Answers 网站（`http://answers.unity3d.com/`）遵循 Stack Exchange 的格式，并对问题和答案提供了一定的质量控制。Unity
    Feedback 网站（`http://feedback.unity3d.com`）允许用户发布功能请求，并对（自己或他人发布的）功能请求进行投票。


    提示：虽然 Bug 类型选择器中提供了“功能请求”作为一种 Bug 类型，但 Unity 鼓励大家将功能请求提交到其 Feedback 网站。


    欢迎来到 Unity 社区！

    '
- fmt: '# 2. A Unity Tour


    Now that you have Unity installed, it’s time to get acquainted with the Unity
    Editor. The Editor (I’ll use the terms Unity, Unity Editor, and Editor interchangeably,
    as long as the meaning is clear) is where you create, test, and build a game for
    one or more target platforms. The Editor operates on a single Unity project containing
    assets included in a game.


    This chapter will introduce the Unity Editor using the Climber Game from the Unity
    Asset Store. I won’t delve into the inner workings of this game here, but it’s
    a convenient ready-made project you can use to get acquainted with Unity, even
    to the point of building the game as a macOS app to get a feel for the build process.
    Hopefully, this will get you comfortable with Unity’s workflow, user interface
    and various file types before learning how to create a new project from scratch
    in the next chapter.


    **Tip**


    Filename extensions are hidden by default in macOS, but anyone performing any
    kind of development should be looking at complete filenames. To ensure extensions
    are displayed, go to the Advanced tab in the Finder Preferences window and check
    “Show all filename extensions.”


    ## Introducing The Climber Game


    To install the Climber Game from the Unity Store, you will need to access the
    Unity Asset Store. The Unity Asset Store can be accessed a number of ways. In
    the main window of the Unity screen, there is an Asset Store tab, this will bring
    up the Asset Store Window. This window can also be access by using the option
    button and 9 (`⌘+9`). To download resources from the asset store, you will need
    to register with Unity to create Unity ID. When you have created a Unity ID, in
    the Unity Asset Store window, there is a search bar. Type in the search bar Climber
    and this will bring up a list of files that meet this search criteria. The default
    window settings in Unity, will show the Unity Store window minimized, to view
    the Asset Store in Full Screen mode, there is a drop-down menu on the top-right
    side of the screen. Select this and click with the left mouse button. This will
    show the screen options, Reload, Maximize, Close Tab, and Add Tab (needs a Figure).
    Select the maximize option (click the left mouse button). At the top of the screen,
    there are several filter options. Below the filter options, there the assets that
    meet your search criteria. Double click the Climber, and this will load the screen
    for this asset (needs a Figure). Select the import button and this Asset will
    be imported into Unity.


    ![A310332_2_En_2_Fig1_HTML.jpg](Images/A310332_2_En_2_Fig1_HTML.jpg)


    Figure 2-1. Unity Project Folder with the Climber Game in the scene folder


    ### Open the Climber Project


    Unity will automatically open the Climber project when imported. If for some reason
    Unity doesn’t immediately open Climber Game, or if you want to return to it later
    (as we will in Chapters [10](../Text/A310332_2_En_10_Chapter.html) and [11](../Text/A310332_2_En_11_Chapter.html)
    where we will use Climber Game to get acquainted with Unity iOS), select the `Open
    Project` item in the `File` menu on the Unity menu bar (Figure [2-2](#A310332_2_En_2_Chapter.html#Fig2)).


    ![A310332_2_En_2_Fig2_HTML.jpg](Images/A310332_2_En_2_Fig2_HTML.jpg)


    Figure 2-2. Open Project menu item


    The Project Wizard will appear (the same Project Wizard referred to by the `Always
    Show Project Wizard` item in the Preferences window). Select the Climber Game
    project from the list of recent projects in the Project Wizard (the same one that
    will show up every time you start Unity if you left the box checked) or click
    the `Open` button (Figure [2-3](#A310332_2_En_2_Chapter.html#Fig3)).


    ![A310332_2_En_2_Fig3_HTML.jpg](Images/A310332_2_En_2_Fig3_HTML.jpg)


    Figure 2-3. Selecting Climber Game from the Open Project menu


    ### Open the Climber Game Scene


    With the Climber Game project open, the Unity Editor should now display the main
    scene of the project, named `New project`. The title bar of the window should
    list the scene file, `New Unity Project`, followed by the project name and the
    target platform (Figure [2-4](#A310332_2_En_2_Chapter.html#Fig4)).


    The scene name is displayed along the upper border of the Editor window, and the
    scene contents are reflected in the Hierarchy View, Scene View, and Game View.
    I’ll explain views in a bit and spend a good portion of this chapter going over
    each view in detail.


    A scene is the same as a level in a game (in fact, the Unity script function that
    loads a scene is called `Application.LoadLevel`). The purpose of the Unity Editor
    is to construct scenes, and thus it always has one scene open at a time.


    If the Editor doesn’t open an existing scene at startup, it will open a newly
    created scene, the same as if you had selected `New Scene` from the `File` menu
    on the Unity menu bar.


    ![A310332_2_En_2_Fig4_HTML.jpg](Images/A310332_2_En_2_Fig4_HTML.jpg)


    Figure 2-4. Climber Game project opened with a new scene


    If you’re not looking at the Climber Game scene right now, then select the `Open
    Scene` command in the `File` menu (Figure [2-5](#A310332_2_En_2_Chapter.html#Fig5)).


    ![A310332_2_En_2_Fig5_HTML.jpg](Images/A310332_2_En_2_Fig5_HTML.jpg)


    Figure 2-5. The Open Scene menu item


    The resulting file chooser will start off in the top level of the project’s Assets
    folder, where you can select the `Scenes` Folder and then select the `Main` scene
    file (Figure [2-6](#A310332_2_En_2_Chapter.html#Fig6)). All scene files are displayed
    with a Unity icon and have the `.unity` filename extension.


    ![A310332_2_En_2_Fig6_HTML.jpg](Images/A310332_2_En_2_Fig6_HTML.jpg)


    Figure 2-6. Selecting the Climber Game scene in the Load Scene chooser


    ### Play Climber


    With the desired scene open, click the `Play` button at the center top of the
    Editor to start the game. The Game View will appear and display the running game,
    which can be played with standard keyboard and mouse controls (Figure [2-7](#A310332_2_En_2_Chapter.html#Fig7)).


    Use the AWSD (or arrow) keys to move forward, back, left, and right, respectively,
    and press the `Esc` key to pause. Clicking the `Play` button again will stop the
    game and exit Play mode. The two buttons next to the `Play` button are used to
    pause and step through the game.


    ![A310332_2_En_2_Fig7_HTML.jpg](Images/A310332_2_En_2_Fig7_HTML.jpg)


    Figure 2-7. Play mode in the Editor'
  raw: '# 2. A Unity Tour


    Now that you have Unity installed, it’s time to get acquainted with the Unity
    Editor. The Editor (I’ll use the terms Unity, Unity Editor, and Editor interchangeably,
    as long as the meaning is clear) is where you create, test, and build a game for
    one or more target platforms. The Editor operates on a single Unity project containing
    assets included in a game.


    This chapter will introduce the Unity Editor using the Climber Game from the Unity
    Asset Store. I won’t delve into the inner workings of this game here, but it’s
    a convenient ready-made project you can use to get acquainted with Unity, even
    to the point of building the game as a macOS app to get a feel for the build process.
    Hopefully, this will get you comfortable with Unity’s workflow, user interface
    and various file types before learning how to create a new project from scratch
    in the next chapter.


    Tip


    Filename extensions are hidden by default in macOS, but anyone performing any
    kind of development should be looking at complete filenames. To ensure extensions
    are displayed, go to the Advanced tab in the Finder Preferences window and check
    “Show all filename extensions.”


    ## Introducing The Climber Game


    To install the Climber Game from the Unity Store, you will need to access the
    Unity Asset Store. The Unity Asset Store can be accessed a number of ways. In
    the main window of the Unity screen, there is an Asset Store tab, this will bring
    up the Asset Store Window. This window can also be access by using the option
    button and 9 (⌘+9). To download resources from the asset store, you will need
    to register with Unity to create Unity ID. When you have created a Unity ID, in
    the Unity Asset Store window, there is a search bar. Type in the search bar Climber
    and this will bring up a list of files that meet this search criteria. The default
    window settings in Unity, will show the Unity Store window minimized, to view
    the Asset Store in Full Screen mode, there is a drop-down menu on the top-right
    side of the screen. Select this and click with the left mouse button. This will
    show the screen options, Reload, Maximize, Close Tab, and Add Tab (needs a Figure).
    Select the maximize option (click the left mouse button). At the top of the screen,
    there are several filter options. Below the filter options, there the assets that
    meet your search criteria. Double click the Climber, and this will load the screen
    for this asset (needs a Figure). Select the import button and this Asset will
    be imported into Unity.


    ![A310332_2_En_2_Fig1_HTML.jpg](Images/A310332_2_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Unity Project Folder with the Climber Game in the scene folder


    ### Open the Climber Project


    Unity will automatically open the Climber project when imported. If for some reason
    Unity doesn’t immediately open Climber Game , or if you want to return to it later
    (as we will in Chapters [10](../Text/A310332_2_En_10_Chapter.html) and [11](../Text/A310332_2_En_11_Chapter.html)
    where we will use Climber Game to get acquainted with Unity iOS), select the Open
    Project item in the File menu on the Unity menu bar (Figure [2-2](#A310332_2_En_2_Chapter.html#Fig2)).


    ![A310332_2_En_2_Fig2_HTML.jpg](Images/A310332_2_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    Open Project menu item


    The Project Wizard will appear (the same Project Wizard referred to by the Always
    Show Project Wizard item in the Preferences window). Select the Climber Game project
    from the list of recent projects in the Project Wizard (the same one that will
    show up every time you start Unity if you left the box checked) or click the Open
    button (Figure [2-3](#A310332_2_En_2_Chapter.html#Fig3)).


    ![A310332_2_En_2_Fig3_HTML.jpg](Images/A310332_2_En_2_Fig3_HTML.jpg)


    Figure 2-3.


    Selecting Climber Game from the Open Project menu


    ### Open the Climber Game Scene


    With the Climber Game project open, the Unity Editor should now display the main
    scene of the project, named New project. The title bar of the window should list
    the scene file, New Unity Project, followed by the project name and the target
    platform (Figure [2-4](#A310332_2_En_2_Chapter.html#Fig4)).


    The scene name is displayed along the upper border of the Editor window, and the
    scene contents are reflected in the Hierarchy View, Scene View, and Game View.
    I’ll explain views in a bit and spend a good portion of this chapter going over
    each view in detail.


    A scene is the same as a level in a game (in fact, the Unity script function that
    loads a scene is called Application.LoadLevel). The purpose of the Unity Editor
    is to construct scenes, and thus it always has one scene open at a time.


    If the Editor doesn’t open an existing scene at startup, it will open a newly
    created scene, the same as if you had selected New Scene from the File menu on
    the Unity menu bar.


    ![A310332_2_En_2_Fig4_HTML.jpg](Images/A310332_2_En_2_Fig4_HTML.jpg)


    Figure 2-4.


    Climber Game project opened with a new scene


    If you’re not looking at the Climber Game scene right now, then select the Open
    Scene command in the File menu (Figure [2-5](#A310332_2_En_2_Chapter.html#Fig5)).


    ![A310332_2_En_2_Fig5_HTML.jpg](Images/A310332_2_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    The Open Scene menu item


    The resulting file chooser will start off in the top level of the project’s Assets
    folder, where you can select the Scenes Folder and then select the Main scene
    file (Figure [2-6](#A310332_2_En_2_Chapter.html#Fig6)). All scene files are displayed
    with a Unity icon and have the .unity filename extension.


    ![A310332_2_En_2_Fig6_HTML.jpg](Images/A310332_2_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    Selecting the Climber Game scene in the Load Scene chooser


    ### Play Climber


    With the desired scene open, click the Play button at the center top of the Editor
    to start the game. The Game View will appear and display the running game, which
    can be played with standard keyboard and mouse controls (Figure [2-7](#A310332_2_En_2_Chapter.html#Fig7)).


    Use the AWSD (or arrow) keys to move forward, back, left, and right, respectively,
    and press the Esc key to pause. Clicking the Play button again will stop the game
    and exit Play mode. The two buttons next to the Play button are used to pause
    and step through the game.


    ![A310332_2_En_2_Fig7_HTML.jpg](Images/A310332_2_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    Play mode in the Editor'
  trans: '

    # 2. Unity 快速入门


    既然你已经安装了 Unity，现在是时候熟悉 Unity 编辑器了。编辑器（我会根据语境混用 Unity、Unity 编辑器以及编辑器这几个词，只要意思明确即可）是你为一个或多个目标平台创建、测试和构建游戏的地方。编辑器针对包含游戏内所有资源的单个
    Unity 项目运行。


    本章将通过 Unity 资源商店中的《攀登者》游戏来介绍 Unity 编辑器。这里我不会深入探讨这款游戏的内部机制，但它是一个现成的、方便的项目，你可以用它来熟悉
    Unity，甚至可以将其构建为 macOS 应用程序来感受构建流程。希望这能让你在下一章学习如何从零开始创建新项目之前，先熟悉 Unity 的工作流程、用户界面和各类文件类型。


    **提示**


    macOS 默认隐藏文件扩展名，但任何从事开发工作的人都应该查看完整的文件名。要确保扩展名显示出来，请前往“访达”偏好设置窗口的“高级”选项卡，并勾选“显示所有文件扩展名”。


    ## 介绍《攀登者》游戏


    要从 Unity 商店安装《攀登者》游戏，你需要访问 Unity 资源商店。可以通过多种方式访问 Unity 资源商店。在 Unity 屏幕的主窗口中，有一个“资源商店”选项卡，点击后会弹出资源商店窗口。也可以按住
    option 键再按 9 键（`⌘+9`）来打开此窗口。要从资源商店下载资源，你需要注册 Unity 以创建 Unity ID。创建 Unity ID 后，在
    Unity 资源商店窗口中会有一个搜索栏。在搜索栏中输入“Climber”，就会显示符合此搜索条件的一系列文件。Unity 中的默认窗口设置会将 Unity
    商店窗口显示为最小化状态。要全屏查看资源商店，屏幕右上角有一个下拉菜单。选择此菜单并点击鼠标左键，会显示屏幕选项：重新加载、最大化、关闭标签页和添加标签页（此处需配图）。选择最大化选项（点击鼠标左键）。屏幕顶部有几个筛选选项。筛选选项下方，是符合你搜索条件的资源。双击“Climber”，会加载该资源的界面（此处需配图）。选择“导入”按钮，此资源就会被导入
    Unity。


    ![A310332_2_En_2_Fig1_HTML.jpg](img/A310332_2_En_2_Fig1_HTML.jpg)


    图 2-1. 场景文件夹中包含《攀登者》游戏的 Unity 项目文件夹


    ### 打开《攀登者》项目


    导入后，Unity 会自动打开《攀登者》项目。如果因为某些原因 Unity 没有立即打开《攀登者》游戏，或者你以后想再次打开它（我们将在第 10 章和第 11
    章中再次使用《攀登者》游戏来熟悉 Unity iOS 版），请在 Unity 菜单栏的“文件”菜单中选择“打开项目”项（图 2-2）。


    ![A310332_2_En_2_Fig2_HTML.jpg](img/A310332_2_En_2_Fig2_HTML.jpg)


    图 2-2. “打开项目”菜单项


    此时会出现项目向导（与偏好设置窗口中“总是显示项目向导”项所指的同一项目向导）。在项目向导的最近项目列表中选择《攀登者》游戏项目（如果勾选了复选框，则每次启动
    Unity 时都会显示该列表），或点击“打开”按钮（图 2-3）。


    ![A310332_2_En_2_Fig3_HTML.jpg](img/A310332_2_En_2_Fig3_HTML.jpg)


    图 2-3. 从“打开项目”菜单中选择《攀登者》游戏


    ### 打开《攀登者》游戏场景


    打开《攀登者》游戏项目后，Unity 编辑器应显示项目的主场景，名为 `New project`。窗口的标题栏应列出场景文件 `New Unity Project`，后跟项目名称和目标平台（图
    2-4）。


    场景名称显示在编辑器窗口的上边框处，场景内容则反映在层级视图、场景视图和游戏视图中。稍后我将解释这些视图，并花本章的很大篇幅详细讲解每个视图。


    场景相当于游戏中的一个关卡（实际上，Unity 中加载场景的脚本函数就叫作 `Application.LoadLevel`）。Unity 编辑器的目的是构建场景，因此它每次都只打开一个场景。


    如果编辑器在启动时没有打开现有场景，它会打开一个新创建的场景，效果与你从 Unity 菜单栏的“文件”菜单中选择“新建场景”相同。


    ![A310332_2_En_2_Fig4_HTML.jpg](img/A310332_2_En_2_Fig4_HTML.jpg)


    图 2-4. 打开新场景后的《攀登者》游戏项目


    如果你现在没有看到《攀登者》游戏场景，请在“文件”菜单中选择“打开场景”命令（图 2-5）。


    ![A310332_2_En_2_Fig5_HTML.jpg](img/A310332_2_En_2_Fig5_HTML.jpg)


    图 2-5. “打开场景”菜单项


    弹出的文件选择器会从项目的 Assets 文件夹顶层开始，你可以选择“Scenes”文件夹，然后选择“Main”场景文件（图 2-6）。所有场景文件都带有
    Unity 图标，并具有 `.unity` 文件扩展名。


    ![A310332_2_En_2_Fig6_HTML.jpg](img/A310332_2_En_2_Fig6_HTML.jpg)


    图 2-6. 在“加载场景”选择器中选择《攀登者》游戏场景


    ### 运行《攀登者》


    打开所需场景后，点击编辑器顶部中央的“Play”按钮即可开始游戏。游戏视图将会出现并显示运行中的游戏，可以使用标准键盘和鼠标控制（图 2-7）。


    使用 AWSD（或方向键）分别控制前进、后退、左移和右移，按下 `Esc` 键暂停。再次点击“Play”按钮将停止游戏并退出运行模式。“Play”按钮旁边的两个按钮用于暂停游戏和单步执行游戏。


    ![A310332_2_En_2_Fig7_HTML.jpg](img/A310332_2_En_2_Fig7_HTML.jpg)


    图 2-7. 编辑器中的运行模式

