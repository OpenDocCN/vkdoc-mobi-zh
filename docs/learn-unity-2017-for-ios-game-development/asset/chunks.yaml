- fmt: '### Building a game


    During normal development, you would alternate between editing a scene and playing
    it.


    When you’re satisfied how the game plays in the Editor, then you’re ready to build
    the app for the target platform. You won’t start building for iOS until Chapter
    [10](../Text/A310332_2_En_10_Chapter.html), but to get a feel for the build process,
    go ahead and build a macOS app version of `Climber` right now. Select the `Build
    Settings` item from the Unity `File` menu to bring up the `Build Settings` window
    (Figure [2-8](#A310332_2_En_2_Chapter.html#Fig8)).


    ![A310332_2_En_2_Fig8_HTML.jpg](Images/A310332_2_En_2_Fig8_HTML.jpg)


    Figure 2-8. Bringing up the `Build Settings` window


    The upper portion of the window lists the scenes to include in the build. Just
    the scene you have open should be checked. Any unchecked or unlisted scenes won’t
    be included in the build (Figure [2-9](#A310332_2_En_2_Chapter.html#Fig9)).


    ![A310332_2_En_2_Fig9_HTML.jpg](Images/A310332_2_En_2_Fig9_HTML.jpg)


    Figure 2-9. `Build Settings` for the Mac platform


    The default platform selected in the `Platform` list on the left is `PC, Mac &
    Linux Standalone`, matching the platform listed on the Editor title bar.


    Select from the `File` menu, `Build Settings`, and select the `PC, Mac & Linux
    Standalone` icon.


    Now you can click either the `Build` or `Build and Play` button in the `Build
    Settings` window. Clicking `Build` will generate a macOS app version of our game.
    Clicking `Build and Play` will do the same but also run the game, which just saves
    the effort of bringing up a Finder window and double-clicking the new app. Unity
    will prompt you for a file name and location for the app, defaulting to the top
    level of the project directory, which is fine (Figure [2-10](#A310332_2_En_2_Chapter.html#Fig10)).


    ![A310332_2_En_2_Fig10_HTML.jpg](Images/A310332_2_En_2_Fig10_HTML.jpg)


    Figure 2-10. Saving a macOS app build


    When the build is complete, double-click the generated app to run the game. Or
    if you selected `Build and Run`, the game should start automatically. Unity-generated
    macOS apps start with a resolution-chooser window (Figure [2-11](#A310332_2_En_2_Chapter.html#Fig11)).


    ![A310332_2_En_2_Fig11_HTML.jpg](Images/A310332_2_En_2_Fig11_HTML.jpg)


    Figure 2-11. Startup dialog for a Unity macOS app


    After selecting the desired resolution and clicking `Play!`, you’ll see a game
    window with the size you just specified. Now you have `Climber` running in its
    own Mac window (Figure [2-12](#A310332_2_En_2_Chapter.html#Fig12)).


    ![A310332_2_En_2_Fig12_HTML.jpg](Images/A310332_2_En_2_Fig12_HTML.jpg)


    Figure 2-12. `Climber` as a Mac app


    ## The Editor Layout


    Now that you’ve got a feel for the Unity test-and-build workflow with the `Climber`
    project, let’s take a closer look at the layout of the Unity Editor. The main
    window is divided into areas (I’m used to calling them panes, but I’ll call them
    areas since that’s the term used in Xcode). Each area holds one or more tabbed
    views. The default displayed view (factory Settings) for an area is selected by
    clicking the view’s tab. Views can be added, moved, removed, and resized, and
    the Editor supports switching among layouts, so a layout essentially is a specific
    arrangement of views. For example, the default layout of the main window (Figure
    [2-13](#A310332_2_En_2_Chapter.html#Fig13)) has an area containing a `Scene View`
    (Figure [2-14](#A310332_2_En_2_Chapter.html#Fig14)) and a `Game View` (Figure
    [2-15](#A310332_2_En_2_Chapter.html#Fig15)).


    > **Note:** The Unity documentation is somewhat inconsistent in naming views.
    It’s obvious from their names that the `Game View` and `Scene View` are views.
    But the `Console` and `Inspector` are also views. In this book, I’ll include `View`
    in all of their names to make clear they are all views and can be manipulated
    the same way.


    ![A310332_2_En_2_Fig13_HTML.jpg](Images/A310332_2_En_2_Fig13_HTML.jpg)


    Figure 2-13. The default layout of the Unity Editor


    ![A310332_2_En_2_Fig14_HTML.jpg](Images/A310332_2_En_2_Fig14_HTML.jpg)


    Figure 2-14. The `Scene View` selected in a multitabbed area


    ![A310332_2_En_2_Fig15_HTML.jpg](Images/A310332_2_En_2_Fig15_HTML.jpg)


    Figure 2-15. The `Game View` selected in a multitabbed area


    ### Preset Layouts


    The default layout is just one of several preset layouts. Alternate layouts can
    be selected from the menu in the top right corner of the main window (Figure [2-16](#A310332_2_En_2_Chapter.html#Fig16)).
    Go ahead and try them out. Figures [2-17](#A310332_2_En_2_Chapter.html#Fig17)
    through [2-20](#A310332_2_En_2_Chapter.html#Fig20) show the resulting layouts.


    ![A310332_2_En_2_Fig16_HTML.jpg](Images/A310332_2_En_2_Fig16_HTML.jpg)


    Figure 2-16. The `Layout` menu


    I’ll describe the individual types of views in more detail shortly, but for now
    note that the `2-by-3` layout (Figure [2-17](#A310332_2_En_2_Chapter.html#Fig17))
    is an example of a layout where the `Scene View` and `Game View` are in separate
    areas instead of sharing the same one. The `4-split` layout (Figure [2-18](#A310332_2_En_2_Chapter.html#Fig18))
    has four instances of the `Scene View` (reminiscent of tools used for computer-aided
    design), demonstrating that a layout is not restricted to one of each type of
    view.


    ![A310332_2_En_2_Fig20_HTML.jpg](Images/A310332_2_En_2_Fig20_HTML.jpg)


    Figure 2-20. The `Wide` layout


    ![A310332_2_En_2_Fig19_HTML.jpg](Images/A310332_2_En_2_Fig19_HTML.jpg)


    Figure 2-19. The `Tall` layout


    ![A310332_2_En_2_Fig18_HTML.jpg](Images/A310332_2_En_2_Fig18_HTML.jpg)


    Figure 2-18. The `4-split` layout


    ![A310332_2_En_2_Fig17_HTML.jpg](Images/A310332_2_En_2_Fig17_HTML.jpg)


    Figure 2-17. The `2-by-3` layout


    ### Custom Layouts


    The preset layouts provide a variety of workspaces, but fortunately you’re not
    restricted to using them exactly as they are. Unity provides the flexibility to
    completely rearrange the Editor window as you like.


    #### Resize Areas


    For starters, you may notice while trying out the various preset layouts that
    some of the areas are too narrow, for example, in the left panel of the `Wide`
    layout (Figure [2-20](#A310332_2_En_2_Chapter.html#Fig20)). Fortunately, you can
    click the border of an area and drag it to resize the area.


    #### Move Views


    Even cooler, you can move views around. Dragging the tab of a view into another
    tab region will move the view there. And dragging the tab into a "docking" area
    will create a new area. For example, start with the `Default` layout, drag the
    `Inspector` tab to the right of the `Hierarchy` tab. Now the `Inspector View`
    shares the same area as the `Hierarchy View`. The result should look like Figure
    [2-21](#A310332_2_En_2_Chapter.html#Fig21).


    ![A310332_2_En_2_Fig21_HTML.jpg](Images/A310332_2_En_2_Fig21_HTML.jpg)


    Figure 2-21. Workspace customized with views moved


    #### Detach Views


    You can even drag a view outside the Editor window so that it resides in its own
    "floating" window, which can be treated just like any other area. Drag the `Scene`
    tab outside the Editor so it resides in a floating window, and then drag the `Game`
    tab into its tab region. The result should look like Figure [2-22](#A310332_2_En_2_Chapter.html#Fig22).
    Likewise, dragging a tab into a docking region of the floating window will add
    another area to the window.


    > **Tip:** I like to detach the `Game View` into a floating window, since I normally
    don’t need to see it while I’m working in the Editor until I click `Play`, and
    this allows me to maximize the `Game View` to fill up to the entire screen.


    Floating windows are often covered up by other windows, so the `Windows` menu
    on the menu bar has menu items for making each view visible (Figure [2-22](#A310332_2_En_2_Chapter.html#Fig22)).
    Notice there is a keyboard shortcut for each, and there is also a `Layouts` submenu
    that is identical to the layout menu inside the Editor.


    ![A310332_2_En_2_Fig22_HTML.jpg](Images/A310332_2_En_2_Fig22_HTML.jpg)


    Figure 2-22. List of views in the `Windows` menu'
  raw: '### Building a game


    During normal development, you would alternate between editing a scene and playing
    it.


    When you’re satisfied how the game plays in the Editor, then you’re ready to build
    the app for the target platform. You won’t start building for iOS until Chapter
    [10](../Text/A310332_2_En_10_Chapter.html), but to get a feel for the build process,
    go ahead and build an macOS app version of Climber right now. Select the Build
    Settings item from the Unity File menu to bring up the Build Settings window (Figure
    [2-8](#A310332_2_En_2_Chapter.html#Fig8)).


    ![A310332_2_En_2_Fig8_HTML.jpg](Images/A310332_2_En_2_Fig8_HTML.jpg)


    Figure 2-8.


    Bringing up the Build Settings window


    The upper portion of the window lists the scenes to include in the build. Just
    the scene you have open should be checked. Any unchecked or unlisted scenes won’t
    be included in the build (Figure [2-9](#A310332_2_En_2_Chapter.html#Fig9)).


    ![A310332_2_En_2_Fig9_HTML.jpg](Images/A310332_2_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    Build Settings for the Mac platform


    The default platform selected in the Platform list on the left is PC, Mac & Linux
    Standalone, matching the platform listed on the Editor title bar.


    Select from the file menu, Build Settings, and select the PC, Mac & Linux Standalone
    icone.


    Now you can click either the Build or Build and Play button in the Build Settings
    window. Clicking Build will generate an macOS app version of our game. Clicking
    Build and Play will do the same but also run the game, which just saves the effort
    of bringing up a Finder window and double-clicking the new app. Unity will prompt
    you for a file name and location for the app, defaulting to the top level of the
    project directory, which is fine (Figure [2-10](#A310332_2_En_2_Chapter.html#Fig10)).


    ![A310332_2_En_2_Fig10_HTML.jpg](Images/A310332_2_En_2_Fig10_HTML.jpg)


    Figure 2-10.


    Saving an macOS app build


    When the build is complete, double-click the generated app to run the game. Or
    if you selected Build and Run, the game should start automatically. Unity-generated
    macOS apps start with a resolution-chooser window (Figure [2-11](#A310332_2_En_2_Chapter.html#Fig11)).


    ![A310332_2_En_2_Fig11_HTML.jpg](Images/A310332_2_En_2_Fig11_HTML.jpg)


    Figure 2-11.


    Startup dialog for a Unity macOS app


    After selecting the desired resolution and clicking Play!, you’ll see a game window
    with the size you just specified. Now you have Climber running in its own Mac
    window (Figure [2-12](#A310332_2_En_2_Chapter.html#Fig12)).


    ![A310332_2_En_2_Fig12_HTML.jpg](Images/A310332_2_En_2_Fig12_HTML.jpg)


    Figure 2-12.


    Climber as a Mac app


    ## The Editor Layout


    Now that you’ve got a feel for the Unity test-and-build workflow with the Climber
    project, let’s take a closer look at the layout of the Unity Editor. The main
    window is divided into areas (I’m used to calling them panes, but I’ll call them
    areas since that’s the term used in Xcode). Each area holds one or more tabbed
    views. The default displayed view (factory Settings) for an area is selected by
    clicking the view’s tab. Views can be added, moved, removed, and resized, and
    the Editor supports switching among layouts, so a layout essentially is a specific
    arrangement of views. For example, the default layout of the main window (Figure
    [2-13](#A310332_2_En_2_Chapter.html#Fig13)) has an area containing a Scene View
    (Figure [2-14](#A310332_2_En_2_Chapter.html#Fig14)) and a Game View (Figure [2-15](#A310332_2_En_2_Chapter.html#Fig15)).


    Note


    The Unity documentation is somewhat inconsistent in naming views. It’s obvious
    from their names that the Game View and Scene View are views. But the Console
    and Inspector are also views. In this book, I’ll include View in all of their
    names to make clear they are all views and can be manipulated the same way.


    ![A310332_2_En_2_Fig13_HTML.jpg](Images/A310332_2_En_2_Fig13_HTML.jpg)


    Figure 2-13.


    The default layout of the Unity Editor


    ![A310332_2_En_2_Fig14_HTML.jpg](Images/A310332_2_En_2_Fig14_HTML.jpg)


    Figure 2-14.


    The Scene View selected in a multitabbed area


    ![A310332_2_En_2_Fig15_HTML.jpg](Images/A310332_2_En_2_Fig15_HTML.jpg)


    Figure 2-15.


    The Game View selected in a multitabbed area


    ### Preset Layouts


    The default layout is just one of several preset layouts. Alternate layouts can
    be selected from the menu in the top right corner of the main window (Figure [2-16](#A310332_2_En_2_Chapter.html#Fig16)).
    Go ahead and try them out. Figures [2-17](#A310332_2_En_2_Chapter.html#Fig17)
    through [2-20](#A310332_2_En_2_Chapter.html#Fig20) show the resulting layouts.


    ![A310332_2_En_2_Fig16_HTML.jpg](Images/A310332_2_En_2_Fig16_HTML.jpg)


    Figure 2-16.


    The Layout menu


    I’ll describe the individual types of views in more detail shortly, but for now
    note that the 2-by-3 layout (Figure [2-17](#A310332_2_En_2_Chapter.html#Fig17))
    is an example of a layout where the Scene View and Game View are in separate areas
    instead of sharing the same one. The 4-split layout (Figure [2-18](#A310332_2_En_2_Chapter.html#Fig18))
    has four instances of the Scene View (reminiscent of tools used for computer-aided
    design), demonstrating that a layout is not restricted to one of each type of
    view.


    ![A310332_2_En_2_Fig20_HTML.jpg](Images/A310332_2_En_2_Fig20_HTML.jpg)


    Figure 2-20.


    The Wide layout


    ![A310332_2_En_2_Fig19_HTML.jpg](Images/A310332_2_En_2_Fig19_HTML.jpg)


    Figure 2-19.


    The Tall layout


    ![A310332_2_En_2_Fig18_HTML.jpg](Images/A310332_2_En_2_Fig18_HTML.jpg)


    Figure 2-18.


    The 4-split layout


    ![A310332_2_En_2_Fig17_HTML.jpg](Images/A310332_2_En_2_Fig17_HTML.jpg)


    Figure 2-17.


    The 2-by-3 layout


    ### Custom Layouts


    The preset layouts provide a variety of workspaces, but fortunately you’re not
    restricted to using them exactly as they are. Unity provides the flexibility to
    completely rearrange the Editor window as you like.


    #### Resize Areas


    For starters, you may notice while trying out the various preset layouts that
    some of the areas are too narrow, for example, in the left panel of the Wide layout
    (Figure [2-20](#A310332_2_En_2_Chapter.html#Fig20)). Fortunately, you can click
    the border of an area and drag it to resize the area.


    #### Move Views


    Even cooler, you can move views around. Dragging the tab of a view into another
    tab region will move the view there. And dragging the tab into a “docking” area
    will create a new area. For example, start with the Default layout, drag the Inspector
    tab to the right of the Hierarchy tab. Now the Inspector View shares the same
    area as the Hierarchy View. The result should look like Figure [2-21](#A310332_2_En_2_Chapter.html#Fig21).


    ![A310332_2_En_2_Fig21_HTML.jpg](Images/A310332_2_En_2_Fig21_HTML.jpg)


    Figure 2-21.


    Workspace customized with views moved


    #### Detach Views


    You can even drag a view outside the Editor window so that it resides in its own
    “floating” window, which can be treated just like any other area. Drag the Scene
    tab outside the Editor so it resides in a floating window, and then drag the Game
    tab into its tab region. The result should look like Figure [2-22](#A310332_2_En_2_Chapter.html#Fig22).
    Likewise, dragging a tab into a docking region of the floating window will add
    another area to the window.


    Tip


    I like to detach the Game View into a floating window, since I normally don’t
    need to see it while I’m working in the Editor until I click Play, and this allows
    me to maximize the Game View to fill up to the entire screen.


    Floating windows are often covered up by other windows, so the Windows menu on
    the menu bar has menu items for making each view visible (Figure [2-22](#A310332_2_En_2_Chapter.html#Fig22)).
    Notice there is a keyboard shortcut for each, and there is also a Layouts submenu
    that is identical to the layout menu inside the Editor.


    ![A310332_2_En_2_Fig22_HTML.jpg](Images/A310332_2_En_2_Fig22_HTML.jpg)


    Figure 2-22.


    List of views in the Windows menu'
