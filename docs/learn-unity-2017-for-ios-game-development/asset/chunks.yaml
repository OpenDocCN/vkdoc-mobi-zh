    # 成为保龄球


    `Ball`（球体）控制目前运行得相当不错，但`Main Camera`（主摄像机）只是静止不动，任由球体滚向远方。这是一个明显的缺陷，因为任何像样的 3D
    游戏都需要某种摄像机运动。在 HyperBowl 中，`Main Camera`会跟随球体滚动，但始终朝向同一方向（对准球瓶）。事实证明，Unity 在标准资源（Standard
    Assets）中提供了一个摄像机跟随脚本。第 3 章中已从标准资源导入脚本包以获取`MouseOrbit`脚本。该脚本同样位于标准资源包的 Utility
    文件夹中，名为`SmoothFollow`（图 6-30）。


    ![A310332_2_En_6_Fig30_HTML.jpg](img/A310332_2_En_6_Fig30_HTML.jpg)


    图 6-30. 标准资源中的 Utility 脚本


    你会注意到这是一个 C#脚本。C#是创建视频游戏的常用语言。将`SmoothFollow`脚本从 Project 视图拖拽至 Hierarchy 视图中的`Main
    Camera`上。然后选中 Hierarchy 视图中的`Main Camera`，以便在 Inspector 视图中编辑`SmoothFollow`脚本属性（图
    6-31）。


    ![A310332_2_En_6_Fig31_HTML.jpg](img/A310332_2_En_6_Fig31_HTML.jpg)


    图 6-31. 带有`SmoothFollow`脚本的`Main Camera`的 Inspector 视图


    `Main Camera`应跟随球体移动，因此将 Hierarchy 视图中名为`Ball`的游戏对象拖拽至 Inspector 视图中`SmoothFollow`脚本的`Target`字段。


    至于其他`SmoothFollow`属性，将`Distance`设置为 2，这将使`Main Camera`在`Ball`后方 2 米处跟随；将`Height`设置为
    1，使摄像机保持在球体上方 1 米处，而非紧跟在正后方。`Height Damping`（高度阻尼）设置为 2，允许`Main Camera`在跟随球体高度时有一定的上下弹性；`Rotation
    Damping`（旋转阻尼）设置为 0，确保`Main Camera`始终保持在球体后方，不会左右摆动。


    现在点击 Play，当你滚动球体时，球体在滚动，摄像机也在跟随！


    ## 进一步探索


    现在我们有了真正游戏玩法的雏形。虽然还不是完整的保龄球游戏，但它已具备物理引擎（球在平面滚动）、交互控制（推动球体）和摄像机运动（跟随球体）。这些特性在游戏开发中都是丰富的主题，但特别是在下一章中，你将通过添加保龄球瓶和碰撞音效来更深入地研究物理引擎。届时游戏将更像一款保龄球游戏！


    ### Unity 手册


    在"Asset Import and Creation"（资源导入与创建）部分，"Procedural Materials"（程序化材质）页面简要介绍了 Substance
    存档格式，并概述了用于创建和分析程序化材质的工具。


    在"Creating Gameplay"（创建游戏玩法）部分，"Input"（输入）页面描述了`Input`类及其`GetAxis`函数（本章实现的`BallController`脚本中使用了该函数），并列出了传递给该函数的摇杆和键盘值。该页面下半部分介绍了适用于
    iOS 的输入函数和变量，你可以提前阅读本章关于 iOS 输入的内容。


    本章主要涉及物理引擎，因此"Physics"（物理）页面是最重要的阅读内容。它列出了所有碰撞器类型，包括本章使用的`Sphere Collider`（球体碰撞器）、`Box
    Collider`（盒体碰撞器）和`Mesh Collider`（网格碰撞器）。该页面还介绍了刚体（球体）与静态碰撞器（地面）之间的区别，以及物理材质及其属性如何影响碰撞行为。


    ### 参考手册


    在"Asset Components"（资源组件）部分，"Procedural Material Assets"（程序化材质资源）页面解释了你在 Project
    视图和 Inspector 视图中对程序化材质看到的内容。


    "Physics Components"（物理组件）部分详细列出了所有可用的碰撞器，以及可用的关节（包括铰链和弹簧）、恒力和布料组件（Unity iOS 不支持布料）。


    ### 脚本参考


    Unity 脚本参考可通过互联网访问（<https://docs.unity3d.com/ScriptReference/index.html>），并提供宝贵信息。Unity
    脚本参考也可直接从 MonoDevelop 获取。当你输入任何 Unity 类或函数时，可以使用 Command 键加单引号键（`⌘ + ''`）调出上下文相关的信息。例如，输入`Input`类后，使用`⌘
    + ''`组合键将在默认网页浏览器中打开一个页面，并显示 Unity 脚本参考中与`Input`相关的信息（图 6-32）。


    ![A310332_2_En_6_Fig32_HTML.jpg](img/A310332_2_En_6_Fig32_HTML.jpg)


    图 6-32. 添加到球体的`Speed`变量


    ### 网络资源


    Unity 中的物理实现基于 PhysX 引擎的旧版本（2.x），该引擎最初由 NovodeX 开发，后被 Ageia 收购并与硬件物理加速器捆绑，现为 nVidia
    的产品。最新版本（3.x）可在 nVidia 开发者专区获取（<https://developer.nvidia.com/physx>）。查看 PhysX
    软件开发工具包有助于更好地理解 Unity 物理组件和脚本函数所依赖的物理引擎特性。


    # 7. 开打吧！高级物理


    此时，你已拥有保龄球游戏的雏形，至少是在 Unity 编辑器中玩家可以在地面滚动球体的场景。但游戏至少需要加上保龄球瓶才能看起来像保龄球游戏。本章将解决这一问题，并涉及更多
    Unity 物理知识，包括`Rigidbody`组件之间的碰撞（球体与球瓶之间）以及复合碰撞器（以适应保龄球瓶的形状）。在此基础上，你还会添加基于碰撞的音效，让游戏听起来更像保龄球游戏。


    这些额外功能需要构建几个新脚本，这些脚本可在本章的 Unity 项目中找到。你可以通过<http://www.apress.com/9781484231739>上的"下载源代码"按钮访问本书所有源代码。不过，用于保龄球瓶的桶模型以及球瓶碰撞和球滚动声音的音频来自
    Asset Store，不包含在在线项目中（但它们都是免费的）。


    ## 加长球道


    在向保龄球场景（应保持上一章关闭时的状态在 Unity 编辑器中打开）添加保龄球瓶之前，你需要更多滚动空间。选中 Hierarchy 视图中的地面，在 Inspector
    视图（图 7-1）中将 X、Y、Z 轴的`Scale`（缩放）设置为 10。


    ![A310332_2_En_7_Fig1_HTML.jpg](img/A310332_2_En_7_Fig1_HTML.jpg)


    图 7-1. 放大了 10 倍的`Floor`游戏对象


    > **提示：** 出于性能考虑，最好避免在`Transform`组件中更改缩放（对于导入的模型，应在 Import Settings 对话框中更改缩放）。如果必须更改缩放，请沿三个轴统一更改。


    现在地面放大了十倍（高度除外，因为平面高度为零）。但地面上的纹理也被拉伸，导致木板变得非常宽。为了补偿，你还应将地面的主纹理和法线贴图的平铺（Tiling）调整十倍，使每个方向上的`Tiling`系数变为
    50。这样木板看起来就恢复原样了。

