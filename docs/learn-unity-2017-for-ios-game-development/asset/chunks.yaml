    ![A310332_2_En_11_Fig5_HTML.jpg](Images/A310332_2_En_11_Fig5_HTML.jpg)


    Figure 11-5.


    The player settings for a device build


    Before starting a build, because you’re building for real hardware, you should
    make sure the Target iOS Version setting is compatible with your test device (or
    vice versa), meaning the Target iOS Version setting should be at least as old
    as whatever version of iOS your test device is running. But really, it’s a deployment
    decision, too. Supporting older versions of iOS increases the potential number
    of customers but may increase your support burden and prevent the use of features
    available only in later versions of iOS. It turns out there is data on iOS hardware
    and versions currently running Unity-based apps, collected by Unity, at [`http://stats.unity3d.com/`](http://stats.unity3d.com/)
    . Any Unity app you create will contribute to this data, as long as the Submit
    HW Statistics option is selected in the player settings. You can perform a Build
    and Run operation, which is equivalent to performing a build, manually opening
    the generated Xcode project by double-clicking the project file (Figure [11-6](#A310332_2_En_11_Chapter.html#Fig6)),
    and then clicking the Run button in Xcode.


    ![A310332_2_En_11_Fig6_HTML.jpg](Images/A310332_2_En_11_Fig6_HTML.jpg)


    Figure 11-6.


    An Xcode project generated by a Unity iOS build


    Either way, instead of building and running in the iOS simulator, Xcode will build,
    install, and run on the connected test device.


    Tip


    It’s best to disable screen lock completely while using a device for testing.
    Initiating a run from Xcode will fail if the connected device has the screen locked.


    As with the iOS simulator, any Unity debug text will show up in the Xcode debug
    area (Figure [11-7](#A310332_2_En_11_Chapter.html#Fig7)) instead of the Console
    view as in the Unity Editor.


    ![A310332_2_En_11_Fig7_HTML.jpg](Images/A310332_2_En_11_Fig7_HTML.jpg)


    Figure 11-7.


    Xcode running an app on a test device Note


    The Xcode equivalent of a view in the Unity Editor is called an area. Unlike views,
    Xcode areas are spelled in lowercase (e.g., the navigation area, the editor area,
    and the debug area).


    You can also make use of the MonoDevelop debugger, although there’s more setup
    involved to debug an iOS app than a game running in the Unity Editor. To enable
    the app for remote debugging with MonoDevelop, select the Development Build option
    in the Build Settings window (Figure [11-8](#A310332_2_En_11_Chapter.html#Fig8)).
    After the Development Build option is enabled, the Script Debugging option becomes
    available, and you should select that, too.


    ![A310332_2_En_11_Fig8_HTML.jpg](Images/A310332_2_En_11_Fig8_HTML.jpg)


    Figure 11-8.


    Creating a development build with script debugging enabled


    Remote debugging has problems interacting with Xcode, including the inability
    to resume after breakpoints, so first perform a Build and Run operation to get
    the app installed on the test device. Click Stop in Xcode to halt the test run
    and then manually restart the app on the device (i.e., tap the app’s icon just
    like you would to start the app normally). Finally, in MonoDevelop, perform an
    Attach to Process operation, only instead of attaching to the Unity Editor, attach
    it to the test device (Figure [11-9](#A310332_2_En_11_Chapter.html#Fig9)).


    ![A310332_2_En_11_Fig9_HTML.jpg](Images/A310332_2_En_11_Fig9_HTML.jpg)


    Figure 11-9.


    Attaching the MonoDevelop debugger to the iOS player


    After you’re satisfied with the device testing, it’s time to submit your app to
    the App Store. This doesn’t require any change within Unity; you only need to
    rebuild the app within Xcode using a distribution provisioning profile instead
    of a development provisioning profile. But first, you need to create an App Store
    entry for the app in iTunes Connect. And before you create the iTunes Connect
    entry, you should have some graphics ready for the App Store.


    ## Prepare App Store Graphics


    You’ll need two kinds of graphics for the App Store: an app icon and a set of
    screenshots for all the devices that you’re targeting. iTunes Connect has a tendency
    to log out after a period of idleness and lose all changes, so you don’t want
    to be messing around with creating an icon and taking screenshots while logged
    in there.


    ### Create an Icon


    iTunes Connect will ask for a 1024 × 1024 version of your app icon, either in
    `.png` or `.jpeg` format, that will accompany the App Store description of your
    app. If you planned ahead when creating the app icon, you’re all set. Otherwise,
    you’ll have to create it now before proceeding to iTunes Connect.


    Ideally, you’d have a professional icon designer create the icon, but if you’re
    low on both funds and art skills, you can do what I do in a pinch—grab a large
    screenshot from the Unity Editor game view and scale it to 1024 × 1024\. It’s
    better to scale from large to small. Scaling up a smaller existing icon usually
    doesn’t create good results and is discouraged by Apple, although it probably
    happens a lot because until fairly recently apps were submitted with a 512 × 512
    icon uploaded.


    Caution


    Apple may reject an app if the App Store icon does not match any of app’s icons
    that are displayed on a device. So if you create an entirely new 1024 × 1024 for
    the App Store, you should set that as the default icon in the Unity player settings.


    ### Take Screenshots


    iTunes Connect will also ask you for screenshots in three sizes: matching the
    iPhone 4 (640 × 960 or 960 × 640), iPhone 5 (640 × 1136 or 1136 × 640), and iPad
    (768 × 1024 or 1024 × 768 or double that for the new iPad). That’s assuming you
    selected iPhone + iPad as the supported hardware in the Unity player settings.
    If you selected only iPhone, then you don’t need to supply the iPad screenshot,
    and if you selected only iPad, then you only need to supply the iPad screenshot.


    There are three fairly convenient ways to take screenshots: using the iOS simulator,
    from a device using the Xcode Organizer window, and on the device itself by pressing
    both the Home and Power buttons at the same time.


    Taking screenshots with the iOS simulator is easy. Use the Screenshot command
    in the Edit menu, and the resulting screenshot is saved on the desktop. It may
    be inconvenient to use the iOS simulator if your game does not play well with
    the limited iOS simulator input. But if you don’t have an iPhone or an iPad, this
    is one way to get screenshots.


    Taking Xcode screenshots is almost as simple. With a device attached to your Mac,
    select the Screenshots panel of the device as it appears in the Xcode Organizer
    window.


    Then click the New Screenshot button on the lower right when you see a screen
    you like, as you play your game on the test device. The screenshot will appear
    on the desktop for easy access.


    My favorite way to take a screenshot is directly on the device by pressing the
    Home and Power buttons simultaneously. The resulting screenshot is saved to Photos
    on the device, which can later be synced to iPhoto on the Mac and accessible in
    the Finder from there. This method allows me to take screenshots at my leisure,
    and anywhere I want, like on the sofa, instead of being tethered to a Mac. And
    it’s easier to quickly take a screenshot at a propitious moment than trying to
    grab a mouse and quickly click the New Screenshot button in the Xcode Organizer.'
  trans: '

    ## 构建与运行


    现在你可以开始测试设备了。该过程与为 iOS 模拟器构建和运行相同，但首先需要进入 Unity 播放器设置，将`Target SDK`设置为`Device
    SDK`而非`Simulator SDK`（如图 11-5 所示）。


    ![A310332_2_En_11_Fig5_HTML.jpg](img/A310332_2_En_11_Fig5_HTML.jpg)


    图 11-5.


    设备构建的播放器设置


    在开始构建之前，由于是针对真实硬件进行构建，你需要确保`Target iOS Version`设置与测试设备兼容（反之亦然），即`Target iOS Version`设置应至少与测试设备运行的
    iOS 版本一样旧。但实际上，这也是一个部署决策。支持更旧的 iOS 版本可以增加潜在用户数量，但可能会增加你的支持负担，并阻止使用仅在较新 iOS 版本中可用的功能。事实上，Unity
    收集了关于当前运行基于 Unity 应用的 iOS 硬件和版本的数据，可访问[`http://stats.unity3d.com/`](http://stats.unity3d.com/)。只要你创建的
    Unity 应用在播放器设置中勾选了`Submit HW Statistics`选项，它就会贡献数据给这些统计。你可以执行`Build and Run`操作，这相当于执行构建、通过双击项目文件手动打开生成的
    Xcode 项目（如图 11-6 所示），然后在 Xcode 中点击运行按钮。


    ![A310332_2_En_11_Fig6_HTML.jpg](img/A310332_2_En_11_Fig6_HTML.jpg)


    图 11-6.


    Unity iOS 构建生成的 Xcode 项目


    无论哪种方式，Xcode 都会在连接的测试设备上构建、安装和运行，而不是在 iOS 模拟器中构建和运行。


    **提示**：在使用设备进行测试时，最好完全禁用屏幕锁定。如果连接的设备屏幕锁定，从 Xcode 启动运行将会失败。


    与 iOS 模拟器一样，任何 Unity 调试文本都会显示在 Xcode 的调试区域（如图 11-7 所示），而不是 Unity 编辑器中的控制台视图。


    ![A310332_2_En_11_Fig7_HTML.jpg](img/A310332_2_En_11_Fig7_HTML.jpg)


    图 11-7.


    Xcode 在测试设备上运行应用


    **注意**：Xcode 中与 Unity 编辑器视图等同的概念称为区域。与视图不同，Xcode 区域全部使用小写拼写（例如，导航区域、编辑器区域和调试区域）。


    你还可以使用 MonoDevelop 调试器，尽管调试 iOS 应用比调试 Unity 编辑器中运行的游戏需要更多的设置。要启用应用以使用 MonoDevelop
    进行远程调试，请在构建设置窗口中勾选`Development Build`选项（如图 11-8 所示）。启用`Development Build`选项后，`Script
    Debugging`选项将变为可用，你也应该勾选它。


    ![A310332_2_En_11_Fig8_HTML.jpg](img/A310332_2_En_11_Fig8_HTML.jpg)


    图 11-8.


    创建启用脚本调试的开发构建


    远程调试与 Xcode 交互时存在问题，包括断点后无法恢复，因此请先执行`Build and Run`操作，将应用安装到测试设备上。在 Xcode 中点击停止以终止测试运行，然后手动在设备上重新启动应用（即像正常启动应用一样点击应用图标）。最后，在
    MonoDevelop 中执行`Attach to Process`操作，但不要附加到 Unity 编辑器，而是附加到测试设备（如图 11-9 所示）。


    ![A310332_2_En_11_Fig9_HTML.jpg](img/A310332_2_En_11_Fig9_HTML.jpg)


    图 11-9.


    将 MonoDevelop 调试器附加到 iOS 播放器


    当你对设备测试感到满意后，就可以将应用提交到 App Store 了。这不需要在 Unity 内进行任何更改；你只需在 Xcode 中使用分发配置文件（distribution
    provisioning profile）而非开发配置文件（development provisioning profile）重新构建应用即可。但首先，你需要在
    iTunes Connect 中为应用创建一个 App Store 条目。在创建 iTunes Connect 条目之前，你应该准备好一些 App Store
    所需的图形素材。


    ## 准备 App Store 图形素材


    你需要为 App Store 准备两种图形素材：一个应用图标和一组针对所有目标设备尺寸的截图。iTunes Connect 在闲置一段时间后容易自动注销并丢失所有更改，因此你最好不要在登录后手忙脚乱地创建图标和截图。


    ### 创建图标


    iTunes Connect 会要求你提供 1024 × 1024 像素版本的应用图标，格式为`.png`或`.jpeg`，它将伴随应用的 App Store
    描述一起出现。如果你在创建应用图标时已经提前规划好，那就万事俱备了。否则，你必须在进入 iTunes Connect 之前现在创建它。


    理想情况下，你应该让专业的图标设计师来创建图标，但如果你资金不足且缺乏艺术技能，可以像我一样在紧急情况下做——从 Unity 编辑器游戏视图中截取一张大截图，然后将其缩放到
    1024 × 1024 像素。从大尺寸缩小到小尺寸效果更好。将较小的现有图标放大通常效果不佳，并且苹果不鼓励这样做，尽管这种情况可能经常发生，因为直到不久之前，应用提交时上传的还是
    512 × 512 像素的图标。


    **注意**：如果 App Store 图标与设备上显示的任何应用图标不匹配，苹果可能会拒绝你的应用。因此，如果你为 App Store 创建了一个全新的
    1024 × 1024 图标，你应该在 Unity 播放器设置中将其设为默认图标。


    ### 截图


    iTunes Connect 还会要求你提供三种尺寸的截图：适配 iPhone 4（640 × 960 或 960 × 640）、iPhone 5（640
    × 1136 或 1136 × 640）和 iPad（768 × 1024 或 1024 × 768，新 iPad 则需双倍尺寸）。这假设你在 Unity
    播放器设置中选择了`iPhone + iPad`作为支持的硬件。如果你只选择了`iPhone`，则无需提供 iPad 截图；如果只选择了`iPad`，则只需提供
    iPad 截图。


    有三种相当方便的截图方法：使用 iOS 模拟器、通过 Xcode 的 Organizer 窗口从设备截取，以及在设备上同时按下 Home 键和电源键。


    使用 iOS 模拟器截图很简单。使用“编辑”菜单中的“截图”命令，生成的截图会保存在桌面上。如果你的游戏在有限的 iOS 模拟器输入方式下表现不佳，使用 iOS
    模拟器可能不太方便。但如果你没有 iPhone 或 iPad，这是一种获取截图的方法。


    通过 Xcode 截图也几乎同样简单。将设备连接到 Mac，在 Xcode 的 Organizer 窗口中选择设备的“截图”面板。然后在测试设备上运行游戏时，看到喜欢的画面就点击右下角的“新截图”按钮。截图会直接显示在桌面上，方便访问。


    我最喜欢的截图方法是直接在设备上同时按下 Home 键和电源键。生成的截图会保存到设备的“照片”应用中，之后可以同步到 Mac 的 iPhoto 中，并可在访达中访问。这种方法让我可以随时随地截图，比如在沙发上，而不必一直连着
    Mac。而且，在关键时刻快速截图，比试图抓住鼠标并迅速点击 Xcode Organizer 中的“新截图”按钮要容易得多。

    '
- fmt: '# Add an App on iTunes Connect


    Now that you’ve got your icon and screenshots ready, you can start adding your
    app information to iTunes Connect. Log in to [`http://itunesconnect.apple.com/`](http://itunesconnect.apple.com/)
    and you’ll see the main menu, as shown in Figure [11-10](#A310332_2_En_11_Chapter.html#Fig10).


    ![A310332_2_En_11_Fig10_HTML.jpg](Images/A310332_2_En_11_Fig10_HTML.jpg)


    Figure 11-10. The main menu in iTunes Connect


    Click `Manage Your Applications` to get started. Now you’ll see a list of apps
    that you’ve already added and an `Add New App` button. Figure [11-11](#A310332_2_En_11_Chapter.html#Fig11)
    shows this page in my iTunes Connect account, displaying some of my apps, each
    with a version number and a dot that is color coded according to the app’s status.


    ![A310332_2_En_11_Fig11_HTML.jpg](Images/A310332_2_En_11_Fig11_HTML.jpg)


    Figure 11-11. Add or manage apps in iTunes Connect


    A green dot means the app is live on the App Store, and red means it has been
    rejected. Yellow has all kinds of meanings, but often means the app has not been
    uploaded yet. An app that is already live and has an update submitted or in progress
    will list the status of both. If this is your first app, of course, no apps will
    be listed.


    ## Select an App Type


    When you click `Add New App`, the next page (Figure [11-12](#A310332_2_En_11_Chapter.html#Fig12))
    asks you to select an app type, either an iOS App for the App Store or a macOS
    app for the Mac App Store.


    ![A310332_2_En_11_Fig12_HTML.jpg](Images/A310332_2_En_11_Fig12_HTML.jpg)


    Figure 11-12. Selecting the new app type in iTunes Connect


    Clicking `New App` will bring up a series of web pages, each with a form to fill
    out, and you can advance to the next page or form by clicking the `Continue` button.


    ## Enter App Information


    After selecting iOS as the app type, you’ll be presented with a page for entering
    the app name and bundle ID. These should match the product name and bundle ID
    specified in the player settings of the Unity Editor. The list of bundle IDs is
    taken from the list of app IDs you added to the provisioning portal. If you added
    a wildcard app ID, you can select that and then the suffix of the specific bundle
    ID for the app you’re adding.


    For example, in Figure [11-13](#A310332_2_En_11_Chapter.html#Fig13), I have the
    info for your modified Angry Bots project, renamed Fugu Bots. The wildcard ID
    `com.technicat.*` and suffix `FuguBot` matches the bundle ID `com.technicat.FuguBot`
    I have in the Unity player settings.


    ![A310332_2_En_11_Fig13_HTML.jpg](Images/A310332_2_En_11_Fig13_HTML.jpg)


    Figure 11-13. Specifying the app name and bundle ID on iTunes Connect


    The default language indicates the primary language you’ll be using for all the
    assets and descriptions you’re submitting with this app.


    The `SKU Number` setting can be anything you want, but it has to be unique among
    your apps and should be readily identifiable with your app if you see it in reports.


    ## Set Availability and Price


    Upon continuing from the App Information page, iTunes Connect will ask you to
    specify the price of the app and when you would like the app to become available
    on the App Store (Figure [11-14](#A310332_2_En_11_Chapter.html#Fig14)).


    ![A310332_2_En_11_Fig14_HTML.jpg](Images/A310332_2_En_11_Fig14_HTML.jpg)


    Figure 11-14. Setting the app availability and price on iTunes Connect


    The availability is contingent on when Apple approves the app, so if you specify
    an availability date one week from the day the app is submitted and the approval
    takes two weeks, then it will be made available on the approval date. If you want
    the app released as soon as possible, just use the default date, which is the
    day you’re entering this information.


    The prices range from free to $0.99 to $1.99 to $2.99 and so on. There’s no need
    to worry too much about charging the right price; it can be changed anytime later.


    ## Set Language and Category


    The first section is the language and category information (Figure [11-15](#A310332_2_En_11_Chapter.html#Fig15)).


    ![A310332_2_En_11_Fig15_HTML.jpg](Images/A310332_2_En_11_Fig15_HTML.jpg)


    Figure 11-15. The app version, category, and copyright information on iTunes Connect


    Select the appropriate category and subcategories. You might as well also select
    a secondary category to increase the exposure of your app.


    ## Prepare for Submission


    The `Prepare for Submission` section is the most important for marketing (Figure
    [11-16](#A310332_2_En_11_Chapter.html#Fig16)).


    ![A310332_2_En_11_Fig16_HTML.jpg](Images/A310332_2_En_11_Fig16_HTML.jpg)


    Figure 11-16. The product description screen for the app in iTunes Connect


    This section includes the description of your app as it will appear on the App
    Store and keywords that help your app show up in searches on the App Store. You
    also need to include a support URL, and it is advantageous to link to the Marketing
    URL.


    ## Upload the Icon and Screenshots


    This is where you upload the icon and screenshots you prepared earlier (Figure
    [11-17](#A310332_2_En_11_Chapter.html#Fig17)). The icons fit Apple’s requirements
    to resemble the app icons that are built into the app or the app may get rejected
    by Apple.


    ![A310332_2_En_11_Fig17_HTML.jpg](Images/A310332_2_En_11_Fig17_HTML.jpg)


    Figure 11-17. Uploading the app icon and screenshots in iTunes Connect


    iTunes Connect will not allow you to proceed without uploading the icon and at
    least one screenshot, although you really need to upload a screenshot for each
    screen type (aspect ratio) that the app will run with. If a Unity iOS app is built
    for the iPhone and iPad, then you need to upload screenshots for two categories,
    basically corresponding to the iPhone and iPad.


    > **Caution**: iTunes Connect might time out pretty quickly. If it times out before
    you complete this page, the entire app description disappears, and you’ll have
    to start over. That’s why we prepared the icon and screenshots beforehand.


    ## General App Information


    Complete the `General App Information`. In this section, input the copyright information
    and fill in the rating information (Figure [11-18](#A310332_2_En_11_Chapter.html#Fig18))
    and the contact information for the developer (Figure [11-19](#A310332_2_En_11_Chapter.html#Fig19)).


    ![A310332_2_En_11_Fig19_HTML.jpg](Images/A310332_2_En_11_Fig19_HTML.jpg)


    Figure 11-19. Completing the General App Information section


    ![A310332_2_En_11_Fig18_HTML.jpg](Images/A310332_2_En_11_Fig18_HTML.jpg)


    Figure 11-18. Setting the app content rating in iTunes Connect


    The Rating section is pretty straightforward (Figure [11-18](#A310332_2_En_11_Chapter.html#Fig18)).
    Fill it out; it’s all mandatory. In the additional information section, there
    is a link to view in the App Store. This information can be updated after you
    have submitted the game for review. You will come back to the later. You still
    need to add more information about your game before you submit to Apple for review.


    If the ratings don’t match the content, at least in Apple’s eyes, the app may
    be rejected. For example, I tried submitting a version of `Angry Bots` and had
    the app rejected because the game has shooting, albeit against irate automata,
    and according to Apple, that qualifies as realistic violence that should be marked
    as Frequent/Intense.'
  raw: '## Add an App on iTunes Connect


