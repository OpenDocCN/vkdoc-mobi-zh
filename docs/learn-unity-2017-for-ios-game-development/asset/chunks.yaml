    ![A310332_2_En_3_Fig16_HTML.jpg](Images/A310332_2_En_3_Fig16_HTML.jpg)


    Figure 3-16.


    Standard Assets scripts after import


    If you select the C# script in the Project View, the code in that script shows
    up in the Inspector View (Figure [3-17](#A310332_2_En_3_Chapter.html#Fig17)).


    ![A310332_2_En_3_Fig17_HTML.jpg](Images/A310332_2_En_3_Fig17_HTML.jpg)


    Figure 3-17.


    The Inspector View of the SimpleMouseRotator script


    ### Attach the Script


    Drag the SimpleMouseRotator script onto the Main Camera GameObject in the Hierarchy
    View. That attaches the script onto the GameObject, so now if you select the Main
    Camera, the SimpleMouseRotator script will show up as one of its Components (Figure
    [3-18](#A310332_2_En_3_Chapter.html#Fig18)).


    ![A310332_2_En_3_Fig18_HTML.jpg](Images/A310332_2_En_3_Fig18_HTML.jpg)


    Figure 3-18.


    The SimpleMouseRotator script attached to the Main Camera


    The first property of the SimpleMouseRotator t Component is a reference to the
    SimpleMouseRotator script (notice how Unity pretty-prints the Component type as
    Mouse Rotator, but don’t be fooled, it’s SimpleMouseRotator!). You could actually
    change the script referenced by that property by dragging another one from the
    Project view into that field or by clicking the little circle on its right, which
    would pop up a list of available scripts to choose from (which right now are all
    the Standard Assets script you just imported).


    The script itself determines the properties that follow. Notice that each of those
    properties in the SimpleMouseRotator Component corresponds to a public variable
    declared at the top of the SimpleMouseRotator (each line beginning with var is
    a public variable, while those starting with private var are private).


    Tip


    Selecting the Debug option in the Inspector view menu (top right corner) will
    display private variables as properties, too, which can be useful for debugging.
    Try it now and you’ll see the private variables x and y show up. The Debug option
    also adds diagnostic properties of built-in Components.


    The first property defined by the script is Target, which is the GameObject the
    Camera will orbit around. It defaults to nothing (or in the code, null), so if
    you click Play, there is nothing for the Camera to orbit around. To rectify that,
    drag the Cube from the Hierarchy View into the Target field (Figure [3-19](#A310332_2_En_3_Chapter.html#Fig19)).


    ![A310332_2_En_3_Fig19_HTML.jpg](Images/A310332_2_En_3_Fig19_HTML.jpg)


    Figure 3-19.


    Assigning the Target property of the SimpleMouseRotator script


    Now when you click the Play button, the Camera orbits the Cube as you move the
    mouse. While in Play mode, you can adjust the other properties until you find
    values you like. The Rotation Range property is the rotation range of the camera.
    Changing it to 3 dramatically limits Camera movement (Figure [3-20](#A310332_2_En_3_Chapter.html#Fig20)).
    The Rotation Speed property controls how fast the Camera orbits in relation to
    the mouse movement, and the Damping Time property sets amount of camera damping
    (limit the amount of camera shake).


    When you exit Play mode, the properties revert to the values they had before you
    entered Play mode. At that point it’s necessary to enter the desired values again.
    If you end up with property values that you don’t like, you can always start over
    by clicking the icon on the top right of the Component and selecting Reset to
    revert back to the default property values.


    ![A310332_2_En_3_Fig20_HTML.jpg](Images/A310332_2_En_3_Fig20_HTML.jpg)


    Figure 3-20.


    Testing the SimpleMouseRotator script


    ## Add a Light


    You’ve probably been thinking the Cube looks awfully dark. Well, let’s add a Light!
    Under the Create Other submenu of the GameObject menu, several types of Lights
    are listed (Figure [3-21](#A310332_2_En_3_Chapter.html#Fig21)). Let’s choose Point
    Light .


    ![A310332_2_En_3_Fig21_HTML.jpg](Images/A310332_2_En_3_Fig21_HTML.jpg)


    Figure 3-21.


    Creating a Point Light


    The Point Light now appears in the Hierarchy View and the Scene View (Figure [3-22](#A310332_2_En_3_Chapter.html#Fig22)),
    and you can see that its distinguishing component is a Light Component, with its
    type set to Point. A Point Light only lights objects within its radius. So you
    should adjust its position or radius so that the cube will be lit. Here you can
    set its position to 5,5,5 (remember, the cube is at 0,0,0) and set the radius
    to 10\.


    ![A310332_2_En_3_Fig22_HTML.jpg](Images/A310332_2_En_3_Fig22_HTML.jpg)


    Figure 3-22.


    The Inspector View of a Point Light


    ### Anatomy of a Light


    In the same way that a GameObject becomes a Camera when it has a Camera Component
    attached, a GameObject behaves as a Light when it has a Light Component attached.
    Like the Camera Component, the Light Component has several properties, which we’ll
    go over here in top-down order as shown in the Inspector View.


    #### Type


    The Type of a Light specifies whether it is a Point Light, Directional Light,
    Spot Light, or Area Light. Since this GameObject was created as a Point Light,
    it’s Type was automatically set to Point. In contrast to a Directional Light,
    which acts as a light source infinitely far away (it’s sometimes called an infinite
    light), a Point Light has a position (and is thus often known as a positional
    light) and radiates in every direction. A Spot Light also has a position, but
    radiates in a certain direction, like a cone. An Area Light is only used in generating
    light maps (lighting that is precalculated and “baked” into textures).


    #### Range


    The Range property for Point Lights specifies the radius of the Light. Only objects
    within the radius are affected by the Light.


    #### Color


    The Color property is the color emitted by the Light. Clicking the little color
    rectangle brings up a color chooser to assign this property.


    #### Intensity


    The Light Intensity ranges from 0 to 1, where 0 is unlit and 1 is maximum brightness.


    #### Shadow Type


    The Shadow Type property of a Light specifies whether it the Light projects shadows,
    and if so, whether they are Hard Shadows or Soft Shadows.


    #### Cookie


    Directional and Spot Lights can project a cookie texture onto a surface, typical
    to simulate a shadow.'
  trans: '好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行翻译。



    ### 导入脚本


    要导入该脚本，请前往 Assets（资源）菜单并选择 Import Package（导入包）子菜单。这与我们创建新项目时可用的 Assets 包列表相同（图
    3-14）。


    ![A310332_2_En_3_Fig14_HTML.jpg](img/A310332_2_En_3_Fig14_HTML.jpg)


    图 3-14. 从 Standard Assets（标准资源）导入脚本


    从该列表中选择 Utility（实用工具），将弹出一个窗口，显示 Scripts（脚本）包中的所有脚本（图 3-15）。以 `.js` 扩展名结尾的脚本是用
    JavaScript 编写的，以 `.cs` 扩展名结尾的脚本是用 C# 编写的。您可以只导入 `MouseOrbit` 脚本，也可以导入所有脚本。之后删除不需要的资源也很容易。


    ![A310332_2_En_3_Fig15_HTML.jpg](img/A310332_2_En_3_Fig15_HTML.jpg)


    图 3-15. 可用的 Standard Assets（标准资源）脚本


    现在，这些脚本及其包含的文件夹将显示在 Project View（项目视图）中（图 3-16）。Project View（项目视图）不会列出文件名的 `.cs`
    后缀，但您可以从图标看出这是一个 C# 脚本，并且选择一个脚本会在 Project View（项目视图）底部的行中显示其完整名称。


    ![A310332_2_En_3_Fig16_HTML.jpg](img/A310332_2_En_3_Fig16_HTML.jpg)


    图 3-16. 导入后的 Standard Assets（标准资源）脚本


    如果您在 Project View（项目视图）中选择 C# 脚本，该脚本中的代码将显示在 Inspector View（检视视图）中（图 3-17）。


    ![A310332_2_En_3_Fig17_HTML.jpg](img/A310332_2_En_3_Fig17_HTML.jpg)


    图 3-17. `SimpleMouseRotator` 脚本的 Inspector View（检视视图）


    ### 附加脚本


    将 `SimpleMouseRotator` 脚本拖拽到 Hierarchy View（层级视图）中的 Main Camera（主摄像机）GameObject
    上。这将把脚本附加到该 GameObject 上，因此现在如果您选择 Main Camera（主摄像机），`SimpleMouseRotator` 脚本将显示为其一个
    Component（组件）（图 3-18）。


    ![A310332_2_En_3_Fig18_HTML.jpg](img/A310332_2_En_3_Fig18_HTML.jpg)


    图 3-18. 附加到 Main Camera（主摄像机）上的 `SimpleMouseRotator` 脚本


    `SimpleMouseRotator` Component 的第一个属性是对 `SimpleMouseRotator` 脚本的引用（注意 Unity 如何美化打印
    Component 类型为 “Mouse Rotator”，但不要被误导，它实际上是 `SimpleMouseRotator`！）。实际上，您可以通过从 Project
    视图中拖拽另一个脚本到该字段，或者点击其右侧的小圆圈（这会弹出一个可用脚本列表供您选择，目前这些脚本都是您刚刚导入的 Standard Assets 脚本）来更改该属性引用的脚本。


    脚本本身决定了其后显示的属性。请注意，`SimpleMouseRotator` Component 中的每个属性都对应一个在 `SimpleMouseRotator`
    脚本顶部声明的公共变量（以 `var` 开头的每一行都是一个公共变量，而以 `private var` 开头的则是私有变量）。


    > **提示**

    > 在 Inspector View（检视视图）菜单中选择 Debug（调试）选项（右上角）也会将私有变量显示为属性，这对于调试非常有用。现在试试，您会看到私有变量
    `x` 和 `y` 显示出来。Debug（调试）选项还会为内置的 Components 添加诊断属性。


    脚本定义的第一个属性是 `Target`，它是 Camera 将围绕旋转的 GameObject。它默认为空（或在代码中为 `null`），因此如果您点击
    Play（播放），Camera 将没有东西可以围绕旋转。要纠正这一点，请将 Hierarchy View（层级视图）中的 Cube（立方体）拖拽到 `Target`
    字段中（图 3-19）。


    ![A310332_2_En_3_Fig19_HTML.jpg](img/A310332_2_En_3_Fig19_HTML.jpg)


    图 3-19. 分配 `SimpleMouseRotator` 脚本的 `Target` 属性


    现在，当您点击 Play（播放）按钮时，随着您移动鼠标，Camera 会围绕 Cube（立方体）旋转。在 Play（播放）模式下，您可以调整其他属性，直到找到您喜欢的数值。`Rotation
    Range` 属性是摄像机的旋转范围。将其更改为 3 会极大地限制相机的移动（图 3-20）。`Rotation Speed` 属性控制 Camera 相对于鼠标移动的旋转速度，`Damping
    Time` 属性设置相机的阻尼量（限制相机抖动的程度）。


    当您退出 Play（播放）模式时，属性将恢复为进入 Play 模式之前的值。此时需要再次输入所需的值。如果您最终得到了不喜欢的属性值，您可以随时点击 Component
    右上角的图标并选择 Reset（重置）来恢复默认属性值。


    ![A310332_2_En_3_Fig20_HTML.jpg](img/A310332_2_En_3_Fig20_HTML.jpg)


    图 3-20. 测试 `SimpleMouseRotator` 脚本


    ## 添加灯光


    您可能一直在想 Cube（立方体）看起来非常暗。好吧，让我们添加一个 Light（灯光）！在 GameObject 菜单的 Create Other（创建其他）子菜单下，列出了几种类型的
    Lights（灯光）（图 3-21）。让我们选择 Point Light（点光源）。


    ![A310332_2_En_3_Fig21_HTML.jpg](img/A310332_2_En_3_Fig21_HTML.jpg)


    图 3-21. 创建一个 Point Light（点光源）


    Point Light（点光源）现在显示在 Hierarchy View（层级视图）和 Scene View（场景视图）中（图 3-22），您可以看到其标志性组件是一个
    Light Component，其类型设置为 Point。一个 Point Light（点光源）只照亮其半径内的物体。因此，您应该调整其位置或半径，以便立方体被照亮。您可以将其位置设置为
    `5,5,5`（请记住，立方体位于 `0,0,0`），并将半径设置为 10。


    ![A310332_2_En_3_Fig22_HTML.jpg](img/A310332_2_En_3_Fig22_HTML.jpg)


    图 3-22. 一个 Point Light（点光源）的 Inspector View（检视视图）


    ### 灯光剖析


    正如 GameObject 在附加了 Camera Component 后成为 Camera 一样，GameObject 在附加了 Light Component
    后会表现为一个 Light。与 Camera Component 类似，Light Component 也有几个属性，我们将按照 Inspector View（检视视图）中自上而下的顺序在此进行介绍。


    #### 类型


    Light 的 `Type` 指定它是 Point Light（点光源）、Directional Light（方向光）、Spot Light（聚光灯）还是
    Area Light（面光源）。由于此 GameObject 是作为 Point Light（点光源）创建的，因此其 `Type` 会自动设置为 Point。与充当无限远处光源的
    Directional Light（方向光）（有时也称为无限光）相比，Point Light（点光源）有一个位置（因此通常被称为位置光）并向各个方向辐射。Spot
    Light（聚光灯）也有一个位置，但像锥体一样向特定方向辐射。Area Light（面光源）仅用于生成光照贴图（预计算并“烘焙”到纹理中的光照）。


    #### 范围


    Point Lights（点光源）的 `Range` 属性指定了 Light 的半径。只有半径内的物体才会受到该 Light 的影响。


    #### 颜色


    `Color` 属性是 Light 发出的颜色。单击小颜色矩形会弹出一个颜色选择器来分配此属性。


    #### 强度


    Light `Intensity` 的范围是从 0 到 1，其中 0 表示无光照，1 表示最大亮度。


    #### 阴影类型


    Light 的 `Shadow Type` 属性指定该 Light 是否投射阴影，如果是，则指定是 Hard Shadows（硬阴影）还是 Soft Shadows（软阴影）。


    #### 轮廓遮罩


    Directional Lights（方向光）和 Spot Lights（聚光灯）可以将一个 Cookie 纹理投射到表面上，通常用于模拟阴影。

