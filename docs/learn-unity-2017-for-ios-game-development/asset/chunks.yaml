- fmt: "### Make a Sphere\n\nTwo primitive GameObjects have been used so far in this\
    \ book: `Plane` and `Cube`. For a ball, there’s another primitive that’s perfect:\
    \ `Sphere`. Like `Plane` and `Cube`, `Sphere` can be selected from the **Create**\
    \ submenu of the **GameObject** menu on the menu bar, but a sphere can also be\
    \ instantiated using the **Create** button on the top left of the **Hierarchy**\
    \ view (Figure [6-13](#A310332_2_En_6_Chapter.html#Fig13)).\n\n![A310332_2_En_6_Fig13_HTML.jpg](Images/A310332_2_En_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13. Creating a ball\n\nAfter selecting `Sphere` from the **Create**\
    \ menu, a new GameObject named `Sphere` should be listed in the **Hierarchy**\
    \ view. Select the GameObject named `Sphere` in the **Hierarchy** view so it can\
    \ be examined in the **Inspector** view (Figure [6-14](#A310332_2_En_6_Chapter.html#Fig14)).\n\
    \n![A310332_2_En_6_Fig14_HTML.jpg](Images/A310332_2_En_6_Fig14_HTML.jpg)\n\nFigure\
    \ 6-14. The Inspector view of the ball\n\nLike the `Cube` and `Plane` primitives,\
    \ the GameObject named `Sphere` has a `MeshFilter` component and a `MeshRenderer`\
    \ component, plus a `Collider` component that is of the same shape as the primitive\
    \ (in this case, a `SphereCollider`). First, in the spirit of meticulously naming\
    \ GameObjects, change the name of the sphere to `Ball` so it’s clear that this\
    \ GameObject is the bowling ball. Then set the ball’s position to `(0,1,5)`, which\
    \ places the center of the ball 1 above the floor. Since the radius of the ball\
    \ is 0.5 meters (the `Sphere Collider`'s **Radius** setting shown in Figure [6-14](#A310332_2_En_6_Chapter.html#Fig14)\
    \ is a good hint), this gives some clearance between the ball and floor. And when\
    \ you click Play, the ball will hang in the air above the floor (Figure [6-15](#A310332_2_En_6_Chapter.html#Fig15)).\n\
    \n![A310332_2_En_6_Fig15_HTML.jpg](Images/A310332_2_En_6_Fig15_HTML.jpg)\n\nFigure\
    \ 6-15. The ball in the air\n\nThis is as expected, of course. Just like everything\
    \ else created so far—the floor, the cubes, and even the dancing character—the\
    \ ball will go or stay where it’s told.\n\n### Make It Fall\n\nFor the ball to\
    \ fall in response to gravity and respond to other forces, the ball must be made\
    \ physical. A GameObject is made physical by adding a `Rigidbody` component.\n\
    \n> **Note**  \n> Most game physics is known as rigid body simulation, which is\
    \ pretty much what it sounds like—simulating how hard objects with nonchanging\
    \ shapes react to forces and collision. A bowling ball is perfect for rigid body\
    \ simulation. A blob of tapioca pudding, on the other hand, is not.\n\nTo add\
    \ a `Rigidbody` component to the ball, select the ball in the **Hierarchy** view;\
    \ then in the **Component** menu on the menu bar, choose the **Physics** menu\
    \ item and then select **Rigidbody** (Figure [6-16](#A310332_2_En_6_Chapter.html#Fig16)).\
    \ You could also click the **Add Component** button on the bottom of the **Inspector**\
    \ view to add a `Rigidbody` component.\n\n![A310332_2_En_6_Fig16_HTML.jpg](Images/A310332_2_En_6_Fig16_HTML.jpg)\n\
    \nFigure 6-16. Adding a Rigidbody component to the ball\n\nThe **Inspector** view\
    \ now shows a `Rigidbody` component attached to the ball (Figure [6-17](#A310332_2_En_6_Chapter.html#Fig17)).\n\
    \n![A310332_2_En_6_Fig17_HTML.jpg](Images/A310332_2_En_6_Fig17_HTML.jpg)\n\nFigure\
    \ 6-17. The Inspector view of the ball with a Rigidbody component\n\nMost of the\
    \ `Rigidbody` properties can be used with their default values, but a mass of\
    \ 1 kilogram is a bit light for a bowling ball. Let’s set it to 5, as 5 kg is\
    \ in the ballpark for a bowling ball weight.\n\nThe minimal values for **Drag**\
    \ (air resistance) and **Angular Drag** (the drag experienced from rotating) are\
    \ fine. There’s no reason to increase the drag unless, say, you’re bowling underwater.\n\
    \nThe **Use Gravity** property specifies that the ball will respond to gravitational\
    \ force. If the check box is not selected, then the ball will behave as if it\
    \ were in a zero-G environment (bowling in space!).\n\nThe **Is Kinematic** property\
    \ is used for GameObjects that move and collide but don’t respond to forces (e.g.,\
    \ an elevator platform). Any GameObject with a `Collider` component that is going\
    \ to move should also have a `Rigidbody` component attached, and if the movement\
    \ is not from physics but from scripting or animation, then it should be a kinematic\
    \ `Rigidbody`.\n\nThe **Interpolation** property allows smoothing of the GameObject’s\
    \ movement (at a computational cost).\n\nLikewise, the **Collision Detection**\
    \ property provides improved collision detection, in particular for fast-moving\
    \ GameObjects (again, at a computational cost).\n\nThe **Constraints** property\
    \ can limit how the GameObject can move in response to forces. For example, a\
    \ GameObject can be limited to movement along one plane or even just one direction.\n\
    \nWith the `Rigidbody` component properties appropriately set, click Play again.\
    \ Now the ball drops, and even better, it lands on the floor! (See Figure [6-18](#A310332_2_En_6_Chapter.html#Fig18).)\n\
    \n![A310332_2_En_6_Fig18_HTML.jpg](Images/A310332_2_En_6_Fig18_HTML.jpg)\n\nFigure\
    \ 6-18. The Game view of the ball landing on the floor\n\nThe default gravitational\
    \ force, by the way, is standard Earth gravity, approximately 9.8 m/s². This can\
    \ be customized in the `PhysicsManager` (Figure [6-19](#A310332_2_En_6_Chapter.html#Fig19)),\
    \ available under the **Project Settings** submenu of the **Edit** menu.\n\n![A310332_2_En_6_Fig19_HTML.jpg](Images/A310332_2_En_6_Fig19_HTML.jpg)\n\
    \nFigure 6-19. The PhysicsManager\n\nThe **Gravity** property of the `PhysicsManager`\
    \ is a vector (specifically, a `Vector3` if you access the `PhysicsManager` from\
    \ a script), with the only nonzero value in the y direction (and negative, so\
    \ the force is downward). Thus, not only could you change the gravitational force\
    \ to, say, that of the moon, you could even change its direction! If you change\
    \ the y value from `-9.81` to `9.81`, the ball will fall upward, and if you change\
    \ the gravitational vector from `(0,-9.81,0)` to `(1,0,0)`, the ball will fall\
    \ sideways at 1 m/s². And if you want weightlessness, a gravitational force of\
    \ `(0,0,0)` will do the trick.\n\n## Customize the Collision\n\nA `Collider` component\
    \ provides a GameObject with a collision shape. If you examine the ball and floor\
    \ in the **Inspector** view, you’ll see each has a `Collider` component that was\
    \ automatically attached and has a shape matching its mesh. The floor has a `MeshCollider`\
    \ component, which always matches the GameObject’s mesh, and the ball has a `SphereCollider`\
    \ component, which always has a spherical shape. When you select the ball or floor,\
    \ the **Scene** view highlights not only the mesh of the GameObject but also the\
    \ shape of its `Collider` component. You can toggle the display of Collider gizmos\
    \ using the **Gizmos** menu in the **Scene** view.\n\nThere is almost a one-to-one\
    \ correspondence among primitive GameObjects and primitive colliders (by “primitive”\
    \ I mean it’s built in to Unity and also that the shape is simple, which is a\
    \ good thing for performance). There are exceptions, though. For example, there\
    \ is a primitive `Cylinder` GameObject that you can create from the **GameObject**\
    \ menu but no available `Collider` in the shape of a cylinder. Instead, if you\
    \ create a `Cylinder`, it automatically uses a `CapsuleCollider`.\n\nThe `MeshCollider`\
    \ is a special case. Automatically following the shape of the associated mesh\
    \ sounds good, but it’s only a good idea for static (i.e., nonmoving) GameObjects.\
    \ Anything that is moving or might move should have a primitive collider or an\
    \ aggregation of primitive colliders (more about that in the next chapter). A\
    \ `MeshCollider` also has to have its **Convex** property (check box) enabled\
    \ if it’s to collide with other `MeshCollider`s."
  raw: '### Make a Sphere


    Two primitive GameObjects have been used so far in this book: Plane and Cube .
    For a ball, there’s another primitive that’s perfect: Sphere. Like Plane and Cube,
    Sphere can be selected from the Create submenu of the GameObject menu on the menu
    bar, but a sphere can also be instantiated using the Create button on the top
    left of the Hierarchy view (Figure [6-13](#A310332_2_En_6_Chapter.html#Fig13)).


    ![A310332_2_En_6_Fig13_HTML.jpg](Images/A310332_2_En_6_Fig13_HTML.jpg)


    Figure 6-13.


    Creating a ball


    After selecting Sphere from the Create menu, a new GameObject named Sphere should
    be listed in the Hierarchy view. Select the GameObject named Sphere in the Hierarchy
    view so it can be examined in the Inspector view (Figure [6-14](#A310332_2_En_6_Chapter.html#Fig14)).


    ![A310332_2_En_6_Fig14_HTML.jpg](Images/A310332_2_En_6_Fig14_HTML.jpg)


    Figure 6-14.


    The Inspector view of the ball


    Like the Cube and Plane primitives, the GameObject named Sphere has a MeshFilter
    component and a MeshRenderer component, plus a Collider component that is of the
    same shape as the primitive (in this case, a SphereCollider ). First, in the spirit
    of meticulously naming GameObjects, change the name of the sphere to Ball so it’s
    clear that this GameObject is the bowling ball. Then set the ball’s position to
    (0,1,5), which places the center of the ball 1 above the floor. Since the radius
    of the ball is 0.5 meters (the Sphere Collider’s Radius setting shown in Figure
    [6-14](#A310332_2_En_6_Chapter.html#Fig14) is a good hint), this gives some clearance
    between the ball and floor. And when you click Play, the ball will hang in the
    air above the floor (Figure [6-15](#A310332_2_En_6_Chapter.html#Fig15)).


    ![A310332_2_En_6_Fig15_HTML.jpg](Images/A310332_2_En_6_Fig15_HTML.jpg)


    Figure 6-15.


    The ball in the air


    This is as expected, of course. Just like everything else created so far—the floor,
    the cubes, and even the dancing character—the ball will go or stay where it’s
    told.


    ### Make It Fall


    For the ball to fall in response to gravity and respond to other forces, the ball
    must be made physical. A GameObject is made physical by adding a Rigidbody component
    .


    Note


    Most game physics is known as rigid body simulation , which is pretty much what
    it sounds like—simulating how hard objects with nonchanging shapes react to forces
    and collision. A bowling ball is perfect for rigid body simulation. A blob of
    tapioca pudding, on the other hand, is not.


    To add a Rigidbody component to the ball, select the ball in the Hierarchy view;
    then in the Component menu on the menu bar, choose the Physics menu item and then
    select Rigidbody (Figure [6-16](#A310332_2_En_6_Chapter.html#Fig16)). You could
    also click the Add Component button on the bottom of the Inspector view to add
    a Rigidbody component .


    ![A310332_2_En_6_Fig16_HTML.jpg](Images/A310332_2_En_6_Fig16_HTML.jpg)


    Figure 6-16.


    Adding a Rigidbody component to the ball


    The Inspector view now shows a Rigidbody component attached to the ball (Figure
    [6-17](#A310332_2_En_6_Chapter.html#Fig17)).


    ![A310332_2_En_6_Fig17_HTML.jpg](Images/A310332_2_En_6_Fig17_HTML.jpg)


    Figure 6-17.


    The Inspector view of the ball with a Rigidbody component


    Most of the Rigidbody properties can be used with their default values, but a
    mass of 1 kilogram is a bit light for a bowling ball. Let’s set it to 5, as 5
    kg is in the ballpark for a bowling ball weight.


    The minimal values for Drag (air resistance) and Angular Drag (the drag experienced
    from rotating) are fine. There’s no reason to increase the drag unless, say, you’re
    bowling underwater.


    The Use Gravity property specifies that the ball will respond to gravitational
    force. If the check box is not selected, then the ball will behave as if it were
    in a zero-G environment (bowling in space!).


    The Is Kinematic property is used for GameObjects that move and collide but don’t
    respond to forces (e.g., an elevator platform). Any GameObject with a Collider
    component that is going to move should also have a Rigidbody component attached,
    and if the movement is not from physics but from scripting or animation, then
    it should be a kinematic Rigidbody.


    The Interpolation property allows smoothing of the GameObject’s movement (at a
    computational cost).


    Likewise, the Collision Detection property provides improved collision detection,
    in particular for fast-moving GameObjects (again, at a computational cost).


    The Constraints property can limit how the GameObject can move in response to
    forces. For example, a GameObject can be limited to movement along one plane or
    even just one direction.


    With the Rigidbody component properties appropriately set, click Play again. Now
    the ball drops, and even better, it lands on the floor! (See Figure [6-18](#A310332_2_En_6_Chapter.html#Fig18).)


    ![A310332_2_En_6_Fig18_HTML.jpg](Images/A310332_2_En_6_Fig18_HTML.jpg)


    Figure 6-18.


    The Game view of the ball landing on the floor


    The default gravitational force, by the way, is standard Earth gravity, approximately
    9.8 m/s². This can be customized in the PhysicsManager (Figure [6-19](#A310332_2_En_6_Chapter.html#Fig19)),
    available under the Project Settings submenu of the Edit menu.


    ![A310332_2_En_6_Fig19_HTML.jpg](Images/A310332_2_En_6_Fig19_HTML.jpg)


    Figure 6-19.


    The PhysicsManager


    The Gravity property of the PhysicsManager is a vector (specifically, a Vector3
    if you access the PhysicsManager from a script), with the only nonzero value in
    the y direction (and negative, so the force is downward). Thus, not only could
    you change the gravitational force to, say, that of the moon, you could even change
    its direction! If you change the y value from -9.81 to 9.81, the ball will fall
    upward, and if you change the gravitational vector from (0,-9.81,0) to (1,0,0),
    the ball will fall sideways at 1 m/s². And if you want weightlessness, a gravitational
    force of (0,0,0) will do the trick.


    ## Customize the Collision


    A Collider component provides a GameObject with a collision shape. If you examine
    the ball and floor in the Inspector view, you’ll see each has a Collider component
    that was automatically attached and has a shape matching its mesh. The floor has
    a MeshCollider component, which always matches the GameObject’s mesh, and the
    ball has a SphereCollider component, which always has a spherical shape. When
    you select the ball or floor, the Scene view highlights not only the mesh of the
    GameObject but also the shape of its Collider component. You can toggle the display
    of Collider gizmos using the Gizmos menu in the Scene view.


    There is almost a one-to-one correspondence among primitive GameObjects and primitive
    colliders (by “primitive” I mean it’s built in to Unity and also that the shape
    is simple, which is a good thing for performance). There are exceptions, though.
    For example, there is a primitive Cylinder GameObject that you can create from
    the GameObject menu but no available Collider in the shape of a cylinder. Instead,
    if you create a Cylinder, it automatically uses a CapsuleCollider.


    The MeshCollider is a special case. Automatically following the shape of the associated
    mesh sounds good, but it’s only a good idea for static (i.e., nonmoving) GameObjects.
    Anything that is moving or might move should have a primitive collider or an aggregation
    of primitive colliders (more about that in the next chapter). A MeshCollider also
    has to have its Convex property (check box) enabled if it’s to collide with other
    MeshColliders.'
  trans: "\n### 制作一个球体\n\n到目前为止，本书使用了两种原始游戏对象：`Plane` 和 `Cube`。对于球体，还有另一个完美的原始对象：`Sphere`。与\
    \ `Plane` 和 `Cube` 类似，`Sphere` 可以从菜单栏的 **GameObject** 菜单中的 **Create** 子菜单中选择，但也可以通过\
    \ **Hierarchy** 视图左上角的 **Create** 按钮来实例化一个球体（图 6-13）。\n\n![A310332_2_En_6_Fig13_HTML.jpg](img/A310332_2_En_6_Fig13_HTML.jpg)\n\
    \n图 6-13. 创建一个球体\n\n从 **Create** 菜单选择 `Sphere` 后，**Hierarchy** 视图中应会列出一个名为 `Sphere`\
    \ 的新游戏对象。在 **Hierarchy** 视图中选择名为 `Sphere` 的游戏对象，以便在 **Inspector** 视图中检查它（图 6-14）。\n\
    \n![A310332_2_En_6_Fig14_HTML.jpg](img/A310332_2_En_6_Fig14_HTML.jpg)\n\n图 6-14.\
    \ 球体的 Inspector 视图\n\n与 `Cube` 和 `Plane` 原始对象一样，名为 `Sphere` 的游戏对象拥有一个 `MeshFilter`\
    \ 组件、一个 `MeshRenderer` 组件，以及一个形状与原始对象相匹配的 `Collider` 组件（此处为 `SphereCollider`）。首先，本着精心命名游戏对象的精神，将球体名称更改为\
    \ `Ball`，以明确此游戏对象是保龄球。然后，将球的位置设置为 `(0,1,5)`，这会将球心置于地板上方 1 米处。由于球的半径为 0.5 米（图 6-14\
    \ 中 `Sphere Collider` 的 **Radius** 设置便是一个很好的提示），这为球与地板之间留出了一些间隙。当你点击 Play 时，球将悬浮在地板上方的空气里（图\
    \ 6-15）。\n\n![A310332_2_En_6_Fig15_HTML.jpg](img/A310332_2_En_6_Fig15_HTML.jpg)\n\
    \n图 6-15. 悬浮在空中的球\n\n当然，这符合预期。就像目前为止创建的所有其他对象（地板、立方体，甚至跳舞的角色）一样，球会按照指示移动或停留在指定位置。\n\
    \n### 让它落下\n\n为了使球能够响应重力而下落并响应其他力，必须让球具有物理属性。通过添加 `Rigidbody` 组件可以使游戏对象具有物理属性。\n\
    \n> **注意**  \n> 大多数游戏物理被称为刚体模拟，这大致就是字面意思——模拟形状不变的坚硬物体如何对力和碰撞做出反应。保龄球非常适合刚体模拟。而一块木薯布丁则不然。\n\
    \n要为球添加 `Rigidbody` 组件，请在 **Hierarchy** 视图中选择球；然后在菜单栏的 **Component** 菜单中，选择 **Physics**\
    \ 菜单项，再选择 **Rigidbody**（图 6-16）。你也可以点击 **Inspector** 视图底部的 **Add Component** 按钮来添加\
    \ `Rigidbody` 组件。\n\n![A310332_2_En_6_Fig16_HTML.jpg](img/A310332_2_En_6_Fig16_HTML.jpg)\n\
    \n图 6-16. 为球体添加 Rigidbody 组件\n\n**Inspector** 视图现在会显示一个附加到球上的 `Rigidbody` 组件（图\
    \ 6-17）。\n\n![A310332_2_En_6_Fig17_HTML.jpg](img/A310332_2_En_6_Fig17_HTML.jpg)\n\
    \n图 6-17. 带有 Rigidbody 组件的球体的 Inspector 视图\n\n大多数 `Rigidbody` 属性可以使用默认值，但 1 千克的质量对于保龄球来说有点轻了。让我们将其设置为\
    \ 5，因为 5 千克大致在保龄球重量的范围内。\n\n**Drag**（空气阻力）和 **Angular Drag**（旋转时受到的阻力）的最小值就可以了。除非你在水下打保龄球，否则没有理由增加阻力。\n\
    \n**Use Gravity** 属性指定球将响应重力。如果未选中此复选框，则球的行为就像处于零重力环境中（在太空打保龄球！）。\n\n**Is Kinematic**\
    \ 属性适用于那些会移动和碰撞，但不响应力的游戏对象（例如，电梯平台）。任何带有 `Collider` 组件且将要移动的游戏对象也应附带 `Rigidbody`\
    \ 组件，并且如果移动不是来自物理引擎而是来自脚本或动画，那么它应该是一个运动学 `Rigidbody`。\n\n**Interpolation** 属性允许平滑游戏对象的运动（以计算成本为代价）。\n\
    \n同样，**Collision Detection** 属性提供了改进的碰撞检测，特别适用于快速移动的游戏对象（同样以计算成本为代价）。\n\n**Constraints**\
    \ 属性可以限制游戏对象如何响应力而移动。例如，游戏对象可以被限制为仅沿一个平面或甚至仅沿一个方向运动。\n\n适当设置 `Rigidbody` 组件属性后，再次点击\
    \ Play。现在球会下落，更棒的是，它会落在地板上！（见图 6-18）。\n\n![A310332_2_En_6_Fig18_HTML.jpg](img/A310332_2_En_6_Fig18_HTML.jpg)\n\
    \n图 6-18. 球落在地板上的游戏视图\n\n顺便说一下，默认的重力是标准地球重力，大约 9.8 m/s²。这可以在 `PhysicsManager`（图\
    \ 6-19）中自定义，该管理器位于 **Edit** 菜单的 **Project Settings** 子菜单下。\n\n![A310332_2_En_6_Fig19_HTML.jpg](img/A310332_2_En_6_Fig19_HTML.jpg)\n\
    \n图 6-19. PhysicsManager\n\n`PhysicsManager` 的 **Gravity** 属性是一个向量（具体来说，如果你从脚本访问\
    \ `PhysicsManager`，它是一个 `Vector3`），唯一非零的值在 y 方向（并且是负值，因此力是向下的）。因此，你不仅可以更改重力大小，例如更改为月球的重力，甚至可以改变其方向！如果你将\
    \ y 值从 `-9.81` 改为 `9.81`，球将向上掉落；如果你将重力向量从 `(0,-9.81,0)` 改为 `(1,0,0)`，球将以 1 m/s²\
    \ 的加速度横向掉落。如果你想要失重状态，将重力设置为 `(0,0,0)` 即可实现。\n\n## 自定义碰撞\n\n`Collider` 组件为游戏对象提供了一个碰撞形状。如果你在\
    \ **Inspector** 视图中检查球和地板，你会看到每个对象都有一个自动附加的 `Collider` 组件，其形状与其网格相匹配。地板有一个 `MeshCollider`\
    \ 组件，它始终与游戏对象的网格匹配；球有一个 `SphereCollider` 组件，它始终具有球形。当你选择球或地板时，**Scene** 视图不仅会高亮显示游戏对象的网格，还会高亮显示其\
    \ `Collider` 组件的形状。你可以使用 **Scene** 视图中的 **Gizmos** 菜单来切换碰撞器 Gizmo 的显示。\n\n原始游戏对象和原始碰撞器之间几乎是一一对应的（我所说的“原始”指的是内置于\
    \ Unity 中且形状简单，这有利于性能）。不过也有例外。例如，有一个原始的 `Cylinder` 游戏对象，你可以从 **GameObject** 菜单中创建它，但没有可用的圆柱体形状的\
    \ `Collider`。相反，如果你创建一个 `Cylinder`，它会自动使用一个 `CapsuleCollider`。\n\n`MeshCollider`\
    \ 是一个特例。自动跟随关联网格的形状听起来不错，但这仅适用于静态（即不移动的）游戏对象。任何正在移动或可能移动的对象都应使用原始碰撞器或原始碰撞器的聚合体（更多内容将在下一章介绍）。一个\
    \ `MeshCollider` 如果要与其他 `MeshCollider` 碰撞，还必须启用其 **Convex** 属性（复选框）。\n"
- fmt: '### `PhysicMaterials`


    `Collider`组件决定了两个`GameObject`何时会发生碰撞，但碰撞检测后实际会发生什么？一个`GameObject`会从另一个上弹开吗？如果是，弹开多少？球会沿着地板滑动、滚动还是粘住？这取决于`Collider`组件的`Material`属性。该属性名称可能有些误导，因为`Collider`组件的`Material`并非用于确定网格表面外观的`MeshRenderer`组件的材质。相反，`Collider`组件使用`PhysicMaterial`来确定碰撞表面的碰撞属性。拼写有点奇怪，但可以把`PhysicMaterial`理解为物理材质或物理材料。


    **注意：** 与`ProceduralMaterial`不同，`PhysicMaterial`类不是`Material`的子类。


    `Collider`组件的`Material`属性默认使用`PhysicsManager`中的`Default Material`属性（图[6-19](#A310332_2_En_6_Chapter.html#Fig19)），该属性为`None`。要自定义碰撞行为，`Collider`组件必须分配一个`PhysicMaterial`。


    ### 标准`PhysicMaterials`


    你可以从项目视图的创建菜单中从头创建新的`PhysicMaterial`，但Unity在Unity商店的标准资产包中提供了一些免费的`PhysicMaterials`。如果你还没有从Unity商店下载并导入标准资产包，现在正是好时机。


    ![A310332_2_En_6_Fig20_HTML.jpg](Images/A310332_2_En_6_Fig20_HTML.jpg)


    图6-20. 从资源商店下载标准资产包


    下载完成后，你可以在`Assets` ➤ `Standard Assets` ➤ `PhysicsMaterials`文件夹中看到几个物理材质。


    ![A310332_2_En_6_Fig21_HTML.jpg](Images/A310332_2_En_6_Fig21_HTML.jpg)


    图6-21. 标准资产包中的物理材质资源


    ### `PhysicMaterial`的结构


    选择不同的`PhysicMaterial`，并在检视视图中比较它们的值。例如，查看`Bouncy`和`Ice`两个物理材质的差异（图[6-22](#A310332_2_En_6_Chapter.html#Fig22)）。


    ![A310332_2_En_6_Fig22_HTML.jpg](Images/A310332_2_En_6_Fig22_HTML.jpg)


    图6-22. `Bouncy`和`Ice`物理材质的比较


    注意`Ice`的摩擦力值特别低。`Dynamic Friction`是一个物体在另一个物体上滑动时产生的摩擦力。`Static Friction`是一个物体静止在另一个物体上时的摩擦力。摩擦力的范围是0到1，其中0代表无摩擦，1代表完全无法滑动。`Ice`的`Bounciness`值为0，这很合理，因为冰不会弹跳。而`Bouncy`物理材质的`Bounciness`最大值为1。


    当两个具有不同`PhysicMaterial`的`GameObject`发生碰撞时会发生什么？它们的`Friction`和`Bounciness`值会分别根据`Friction
    Combine`和`Bounce Combine`值进行组合。`Bouncy`的`Friction Combine`值表示，当它与另一个物理材质碰撞或滑动时，应用的摩擦力是两个材质摩擦力值的平均值。而`Bouncy`的`Bounce
    Combine`值指定将使用两个物理材质中最大的弹性值（由于`Bouncy`已经具有最大弹性值1，因此结果总是1）。


    你可能想知道如果两个物理材质具有不同的组合值（就像`Bouncy`和`Ice`那样）会发生什么，会使用哪一个？截至目前，官方并没有明确记录，但优先级顺序（从低到高）似乎是：平均值、相乘、最小值、最大值。因此，如果`Bouncy`和`Ice`碰撞，结果将是取摩擦力最小值（即`Ice`的0.1）和弹性最大值（即`Bouncy`的1）。这正是你所期望的！


    在物理材质的检视视图中显示的最后三个属性允许各向异性摩擦，即在不同方向上具有不同的摩擦力值。如果`Friction Direction`属性被设置为非零向量，那么`Secondary
    Static Friction`和`Secondary Dynamic Friction`将在该方向上生效。对于木质地砖，你可以指定一个沿着木纹方向的次要摩擦方向，并沿着该方向设置较低的静态和动态摩擦力值。


    ### 应用`PhysicMaterial`


    你可以将任意标准物理材质拖放到地板和球的`Collider`组件的`Material`字段中，或者点击`Collider`组件`Material`字段右侧的小圆圈，从弹出窗口中选择（图[6-23](#A310332_2_En_6_Chapter.html#Fig23)）。或者，你也可以从项目视图将物理材质拖放到检视视图中的`GameObject`上，物理材质将自动出现在正确的位置（即`Collider`组件的`Material`字段）。


    ![A310332_2_En_6_Fig23_HTML.jpg](Images/A310332_2_En_6_Fig23_HTML.jpg)


    图6-23. 给球添加一个`Bouncy`物理材质


    尝试在地板和球上使用不同的物理材质。为球选择`Bouncy`物理材质，为地板选择`Metal`。然后点击播放，观察球一次又一次地弹跳；接着将球切换为`Ice`，观察球沉闷地落地。


    除了在`Collider`组件中来回交换不同的物理材质，你也可以直接调整物理材质本身。例如，在项目视图中选中`Bouncy`物理材质，然后在检视视图中编辑物理材质的属性。但由于这些物理材质来自标准资产包，如果你重新导入该包（无论是意外还是因升级而故意为之），它们可能会被替换。此外，如果一个物理材质被多个`GameObject`使用，更改其属性会影响所有这些对象。


    这里干净且安全的解决方案是为每个需要独立物理材质的`GameObject`创建一个新的物理材质。从概念上讲，当你需要一个独特的材质时，也应该期望有一个独特的物理材质。换句话说，一个独特的表面应该拥有自己的材质和物理材质。例如，球和地板应该有自己的物理材质，而所有的保龄球瓶（你将在下一章创建）应该共享同一个物理材质。'
  raw: '### PhysicMaterials


    Collider components dictate at what point two GameObjects will collide, but what
    actually happens when the collision is detected? Does one GameObject bounce off
    the other, and if so, by how much? Will the ball slide or roll along the floor
    or just stick to it? That’s where the Material property of a Collider component
    comes in. The property name is a little bit misleading, as the material of a Collider
    component isn’t the same material used with MeshRenderer components to determine
    the appearance of a mesh surface. Instead, a Collider component uses a PhysicMaterial
    to determine the collision properties of the collision surface. The spelling is
    a little odd, but I think of a PhysicMaterial as a physics material or physical
    material.


    Note


    Unlike ProceduralMaterial, the PhysicMaterial class is not a subclass of Material.


    The Material property for Collider components defaults to the Default Material
    property in the PhysicsManager (Figure [6-19](#A310332_2_En_6_Chapter.html#Fig19)),
    which is None. To customize its collision behavior, a Collider component has to
    have a PhysicMaterial assigned.


    ### Standard PhysicMaterials


    You can create a new PhysicMaterial from scratch from the Project view’s Create
    menu, but Unity provides some free PhysicMaterials in the Standard Assets package
    on the Unity Store. If you have not already downloaded and imported the Standard
    Assets package from the Unity Store, now would be a good time to do this.


    ![A310332_2_En_6_Fig20_HTML.jpg](Images/A310332_2_En_6_Fig20_HTML.jpg)


    Figure 6-20.


    Downloading the Standard Assets package from the Asset Store


    Once it’s downloaded, you can see several PhysicsMaterials in the Assets ➤ Standard
    Assets ➤ PhysicsMaterials folder .


    ![A310332_2_En_6_Fig21_HTML.jpg](Images/A310332_2_En_6_Fig21_HTML.jpg)


    Figure 6-21.


    The PhysicsMaterials assets in the Standard Assets package


    ### Anatomy of a PhysicMaterial


    Select among the various PhysicMaterials and compare their values in the Inspector
    view. For example, check out the differences between the Bouncy and Ice PhysicMaterials
    (Figure [6-22](#A310332_2_En_6_Chapter.html#Fig22)).


    ![A310332_2_En_6_Fig22_HTML.jpg](Images/A310332_2_En_6_Fig22_HTML.jpg)


    Figure 6-22.


    Comparison of Bouncy and Ice PhysicMaterials


    Notice how Ice has particularly low friction values . Dynamic Friction is the
    friction that occurs while one object is sliding over another. Static Friction
    is the friction of an object resting on the other. The range for friction is 0
    to 1, where 0 is frictionless and 1 means no sliding at all. Ice also has a Bounciness
    value of 0, which makes sense, since ice doesn’t bounce. And the Bouncy PhysicMaterial
    has a maximum Bounciness value of 1.


    What happens when a collision occurs between GameObjects with two different PhysicMaterials?
    Their Friction and Bounciness values are combined according to the Friction Combine
    and Bounce Combine values, respectively. The Friction Combine value for Bouncy
    indicates that when it collides or slides along another PhysicMaterial, the applied
    friction is the average of the friction values from the two materials. And the
    Bounce Combine value for Bouncy specifies that the maximum bounciness from the
    two PhysicMaterials will be used (and since Bouncy already has the maximum bounciness
    value of 1, that will always be the result).


    You might be wondering what happens if the two PhysicMaterials have different
    combine values, as do Bouncy and Ice. Which one will be used? Well, as of this
    writing, it’s not actually documented officially, but the precedence order, from
    low to high, appears to be Average, Multiply, Minimum, and Maximum. So if Bouncy
    and Ice collide, it will result in Minimum friction, which is the Ice friction
    at 0.1, and Maximum bounciness, which is the Bouncy bounciness of 1\. That is
    what you would expect!


    The last three properties shown in the Inspector view of the PhysicMaterials allow
    for anisotropic friction, meaning different friction values in different directions.
    If the Friction Direction property is filled in with a nonzero vector, then the
    secondary static and dynamic friction takes effect in that direction. For the
    wood-tiled floor, you might specify a secondary friction direction that runs along
    the grain of the wood and lower static and dynamic friction values along that
    direction.


    ### Apply the PhysicMaterial


    You can drag any of these standard PhysicMaterials into the Material fields of
    the Floor and Ball Collider components or click the little circle on the right
    of the Collider component’s Material field to select from a pop-up (Figure [6-23](#A310332_2_En_6_Chapter.html#Fig23)).
    Or you can drag the PhysicMaterial from the Project view onto the GameObject in
    the Inspector view, and the PhysicMaterial will show up in the right place (i.e.,
    the Material field of the Collider component ).


    ![A310332_2_En_6_Fig23_HTML.jpg](Images/A310332_2_En_6_Fig23_HTML.jpg)


    Figure 6-23.


    Adding a Bouncy PhysicMaterial to the ball


    Go ahead and try some different PhysicMaterials on the floor and ball. Choose
    the Bouncy PhysicMaterial for the ball and metal for the floor. Then click Play
    and watch the ball bounce and bounce and bounce; then switch the ball to Ice,
    and watch the ball land with a thud.


    Instead of swapping different PhysicMaterials in and out of a Collider component,
    you could adjust the PhysicMaterials themselves. For example, you could select
    the Bouncy PhysicMaterial in the Project view and then in the Inspector view edit
    the PhysicMaterial properties. But since those PhysicMaterials are in a Standard
    Assets package, they could get replaced if you ever reimport the package (either
    accidentally or deliberately if there is an upgrade). Also, if a PhysicMaterial
    is used by more than one GameObject, changing its properties would affect all
    of those GameObjects.


    The clean and safe solution here is to create a new PhysicMaterial for every GameObject
    that needs one. Conceptually, you would expect a unique PhysicMaterial anytime
    you also need a unique material. To put it another way, a unique surface would
    have its own material and PhysicMaterial. For instance, the ball and the floor
    should have their own PhysicMaterials, while all of the bowling pins (that you’ll
    create in the next chapter) should share the same PhysicMaterial.'
