  \ Talk 视频聊天\n    - 硬件加速\n    - 支持多核处理器\n    - 多窗格导航\n- **Version 4 (Ice Cream Sandwich):**\n\
  \    - 针对平板和手机优化的精简用户界面\n    - 高级应用框架\n    - 面部识别\n    - 更好的语音识别\n    - 支持最多 16\
  \ 个标签页的网页浏览器\n    - 可调整大小的小部件\n- **Version 4.1 and 4.2 (Jelly Bean):**\n    - Google\
  \ Now\n    - 语音搜索\n    - Android Beam\n    - 性能提升\n    - 支持 HDR 的相机应用增强功能\n- **Version\
  \ 5 (Key Lime Pie):**\n    - 目前对该版本的功能知之甚少；后续版本可能会带来更多信息。\n\n你会发现，特定 Android 设备最初基于某个特定版本，而升级对于某些设备来说往往来得较慢。这是因为\
  \ Android 发布新版本后，硬件厂商和移动运营商需要修改源代码以满足自身需求。事实上，即使硬件完全具备支持能力，移动运营商也可能不会为旧手机更新新版本的\
  \ Android。\n\n#### 使用 Android 的挑战\n\n我们已经提到，Android 开发工具的一大优势是免费，并且与 Apple 不同，官方的\
  \ Google Play 市场在应用上架时没有审批流程。用户注册后，上传和发布应用就变得相对简单。\n\n虽然 Android 应用开发相对容易，部署也简单，但这并不能保证你的应用能在所有\
  \ Android 设备上完美运行。你可以想象，那些手机不支持你应用的用户，绝不会给你好评！\n\n典型问题可能包括简单的屏幕尺寸适配问题。即使你遵循了所有最佳实践，有些手机的分辨率仍然可能很奇葩。你的应用也许能运行，但布局可能让用户感到不悦，从而导致差评。\n\
  \n使用免费的 Android 手机模拟器可以测试不同的屏幕分辨率。但这个模拟器在处理计算密集型应用时通常运行得太慢。此外，模拟器中存在一些 bug，可能导致某些应用在模拟时行为异常。尽管模拟器适合简单测试，但它并非万无一失。\n\
  \n另一个常见问题与 Android 手机的不同硬件能力有关。例如，并非所有手机都有前置摄像头。有些手机处理计算密集型图形时“马力”不足。每个硬件制造商都可以自由地为手机添加自定义功能和特性，这意味着并非每部手机都具备所有功能。Android\
  \ 为开发者提供了确保手机拥有所需功能的方法，但这些硬件平台之间的差异是 Android 编程面临的主要挑战之一。iPhone 只是一款手机，而 Android\
  \ 是一个真正的操作系统，支持来自数十家制造商的数百种不同设备。\n\n作为开发者，你应该始终思考如何以覆盖最多用户的方式编写应用。通常，使用较旧版本的 Android\
  \ 而非最新版本、避免采用最新炫酷的硬件功能，是更明智的选择。这能让你触达更多用户。Android 拥有庞大的用户基础，但其中使用最新版本的用户寥寥无几。\n\n\
  如果你认真对待 Android 开发，除了你的主力手机（我们假设它也是 Android 手机！）之外，你可能还想购买一两部二手 Android 手机。开发能在旧版\
  \ Android 上运行的应用，可以确保你覆盖大多数市场。唯一能确定应用在多个版本上运行良好的方法就是进行测试。如果你致力于开发高质量的应用，你至少需要在几款不同的手机上测试你的应用。\n\
  \n如果你负担得起，另一种选择是使用像`www.perfectomobile.com/`这样的服务。它允许你通过云端接口在数百部真实 Android 手机上进行测试。\n\
  \n#### 移植的难点\n\n对于那些希望将 iOS 应用转变为成熟的 Android 应用（反之亦然）的人，我们想介绍一下其中的过程和陷阱。如果你只专注于\
  \ Android 市场，可以安全地跳过本节。然而，许多开发者为了最大化收入，目标是同时为 Android 和 iOS 开发应用。我们将在本章末尾介绍如何做到这一点。\n\
  \n假设你已经编写了一款正在市面上销售或正在等待应用审批的 iOS 应用。若要将其转变为 Android 应用，你必须对软件进行适配，以便能针对一个与原始设计不同的计算环境创建可执行程序。这被称为*移植*。\n\
  \niOS 应用通常用`Objective-C`编写，而 Android 应用通常用`Java`编写。尽管这些编程语言的逻辑非常相似（因为它们都是线性的、过程式的，并且使用面向对象的概念），但在操作系统支持、GUI\
  \ 对象和应用生命周期方面，它们差异巨大。遗憾的是，Android 不支持`Objective-C`。\n\n据我们所知，目前还没有任何神奇的程序能让你把 iPhone\
  \ 应用输入，然后直接输出 Android 应用（除非你从一开始就使用为此而设计的开发工具）。稍后我们会讨论跨平台开发工具，但首先我们将解释你可以为 Android\
  \ 和 iOS 做些什么。\n\n\n\n### 将 iOS 应用移植到 Android 平台\n\n虽然你的 iOS 代码无法在 Android 上直接复用，但也不必从头重写所有\
  \ Android 代码。例如，图标、图片以及 SQLite 数据库代码都可以完全复用。此外，iPhone 应用中的某些 C 语言代码（如图像处理或数字信号处理代码）可以通过\
  \ Android NDK（原生开发工具包）直接移植到 Android 平台。你可能会认为用户界面（UI）设计也可以复用，但 iOS 和 Android 的界面元素截然不同，强行让\
  \ Android 应用模仿 iPhone 的行为不仅耗时，而且成本高昂。在某些情况下，你可以复用为 iOS 应用编写的用例，但需考虑 Android 界面对这些用例的影响。另外，与\
  \ iOS 相比，Android 生态更倾向于免费应用加广告或应用内购买的商业模式。换句话说，当移植到 Android 时，可能需要调整整体商业计划。\n\n\
  将 iOS 应用移植到 Android 所需的工作量通常与重新开发一个应用相当。具体取决于应用的规模、代码的复杂性、对图形用户界面（GUI）工具的依赖程度，以及开发者的能力。\n\
  \n顺便提一句，有些开发者专门从事应用开发服务，这可以减轻你的工作量。由于你的应用已有一个现成版本，将移植工作外包出去相当容易；开发者始终可以将原始应用作为参考。\n\
  \n如果你的 iOS 应用是用 ANSI C 或 C++ 编写的，例如使用了为此设计的众多游戏引擎之一，那么你的工作可能会简化。Android 拥有 NDK，允许从\
  \ Android Java 代码调用 ANSI C 或 C++ 代码，反之亦然。\n\n### 跨平台开发工具示例\n\n你很可能希望自己的应用被尽可能多地下载，这意味着你希望它能运行在尽可能多的设备上。如果你想让应用同时支持\
  \ iOS、Android 以及其他移动平台，可以考虑使用跨平台开发工具包。\n\n尽管我们认为应用市场正朝着通用解决方案发展，但目前尚未完全实现。本书专注于使用\
  \ Android SDK（Android 软件开发工具包）来构建 Android 应用。不过，为了完整性，我们也会讨论几个跨平台开发工具包，让你了解还有其他的选择。\n\
  \n#### LiveCode\n\nLiveCode 由 RunRev 公司开发，这是一家专门制作开发工具的公司。用 RunRev 产品经理 Ben Beaumont\
  \ 的话来说，LiveCode 是“一个现已迁移到移动领域的多平台元素环境”。LiveCode 最初是为 Mac、Windows 和 Linux 设计的，并号称“免编译编码”。免编译编码意味着当你对程序做出修改时，可以立即在编程过程中看到效果。这与通常的编辑、编译、运行、调试流程不同。\n\
  \nLiveCode 还提供了一个可视化开发环境，用户可以通过拖放构成最终界面的对象和图片来设计界面。随后，用户可以为这些对象附加脚本，使它们真正“活”起来并提高运行速度。LiveCode\
  \ 使用一种非常高级的语言，允许用户编写接近英语的代码，这使得编写和阅读代码都变得更容易。所有这些特性使得创建能在设备上实际运行的实时原型成为可能，并承诺让你能够快速迭代和优化应用，因为你可以立即看到工作的成果。\n\
  \n#### Appcelerator\n\nTitanium 创建了一个免费且开源的应用开发平台，允许用户打造原生的移动、平板和桌面应用体验。其 Appcelerator\
  \ 程序让用户能够构建功能丰富的应用，效果如同用 Objective-C 或 Java 编写的一样。最终生成的是原生应用，可通过大量功能进行自定义，并且全部使用\
  \ JavaScript 这一网络技术构建。\n\nAppcelerator 允许开发者专注于构建应用本身，并为多种平台提供了一整套工具。\n\n#### appMobi\
  \ XDK\n\nappMobi 移动应用开发 XDK 专为 Web 开发者设计，它声称：如果你能使用 HTML5、CSS3 和 JavaScript 为网页构建应用，那么你也能在\
  \ iPhone、iPad 以及 Android 手机和平板上构建同样的应用。据 appMobi 称，开发者可以使用偏好的编辑器，在几小时内开发出健壮的、100%\
  \ 原生 API 兼容的移动应用，并且只需编写一次代码，即可部署到所有目标平台。\n\n该 XDK 包含一个屏幕模拟器，配有简单易用的工具面板来模拟用户与测试设备的交互。它还允许你通过本地\
  \ Wi-Fi 发送应用项目，或上传到云端，以便在任何地方进行测试。\n\n**注意** 运行 appMobi 移动应用开发 XDK 需要 Java 6 和 Google\
  \ Chrome 6.0。\n\nappMobi 还提供一项名为 MobiUs 的服务，允许任何应用发布者从 Web 的任何位置发布其应用。这可能意味着向传统应用分发商提交和审批的繁琐复杂流程的终结（同时也意味着开发者无需再与这些分发商分享利润）。该服务基于云端，这意味着可以在\
  \ Windows PC 上创建 iPhone 应用，在 Mac 上创建 Android 应用。\n\n#### PhoneGap\n\n根据其网站介绍，`PhoneGap`\
  \ 允许用户使用基于 HTML 5.0 的 Web 标准构建应用。`PhoneGap` 用户还可以访问原生 API，为多个平台创建应用，包括 iOS、Android、Windows、BlackBerry、webOS\
  \ 等。`PhoneGap` 当前版本为 1.0.0。\n\n## 小结\n\n在过去的几年里，Android 应用市场发展迅速。在不久的将来，它很可能会超越苹果\
  \ App Store，成为应用开发者的主要收入来源。然而，市场上 Android 应用数量庞大，开发者必须拿出真正与众不同且卓越的产品才能获得可观的收入。除此之外，仅仅拥有一个出色的应用还不够。你还必须确保应用能触达正确的用户群体，并保证你的商业案例是合理的。\n\
  \n接下来，让我们看看如何让你的应用在众多应用中脱颖而出，并通过有说服力的商业案例触达正确的用户。\n\n"
- "# 第 2 章：确保你的应用能够成功\n\n我们相信你一定听过那句老话：“罗马不是一天建成的。” 如果你想构建一个成功的应用，根据其复杂程度，可能需要几天、几个月甚至几年。不过，我们也确信罗马的建造并非毫无规划。如果你想要建立你的应用帝国，你需要一份商业计划，将应用开发过程中的各种障碍都考虑在内。\n\
  \n## 你的应用与商业计划\n\n*商业计划* 是一份文件，阐明企业的目标、这些目标为何可以实现，以及如何实现这些目标。商业计划没有固定的模板。如果你打算筹集风险投资，你可能需要考虑比我们建议的更正式的方法。不过，大多数应用开发者并不需要筹集资金。因此，我们将坚持采用一种非正式的商业计划来帮助你评估你的想法。\n\
  \n为什么你需要一份商业计划？也许更好的问题是：如果没有商业计划，会发生什么？\n\n\n\n### 我们在第 1 章中已经阐述，Android 领域正在蓬勃发展。尽管可能拥有数亿\
  \ Android 用户，但在一个拥有数十万款应用的世界里，一款应用要想脱颖而出是非常困难的。\n\n虽然 Android 让开发和发布应用变得容易，但坏消息是，如果没有经过深思熟虑并执行的计划，应用很难实现可观的销量。一份商业计划能为你提供关键洞见，让你了解自己的应用在当前\
  \ Android 市场中能否成功。\n\n也许你怀疑自己是否有足够的能力制定一份商业计划，或者认为自己无法预见那些会影响 Android 应用的条件，直到为时已晚。是的，我们不可能预知所有可能影响应用成功的变量，但这正是你需要一份商业计划的原因！\n\
  \n撰写商业计划的最大好处在于，这个过程迫使你深入思考自己究竟想要实现什么目标。你投入多少，才能从中获得多少，所以请不要只是草草浏览接下来的几段文字；打开一个文本编辑器，开始记录这些内容具体如何应用于*你的*应用。\n\
  \n因为你可能并非为了提交给投资者而撰写商业计划，所以我们将聚焦于几个关键因素，它们能帮助你在开始编写代码之前就看清关键问题。我们将这种精简后的商业计划称为*微型商业计划*。让我们把它分解为七个部分：\n\
  \n1.  明确你正在解决的问题。\n2.  分析你的竞争对手。\n3.  确定目标市场。\n4.  评估技术、执行和市场风险。\n5.  思考盈利模式和定价。\n\
  6.  预估时间表。\n7.  测试你的市场需求假设。\n\n把这份商业计划想象成一个烤箱，它将你的应用创意烘焙至成熟。在你的想法还没有“半生不熟”之前，切勿开始编码！企业家（以及作家）最终总免不了要做一次*电梯游说*，这是一种在电梯运行这么短的时间内快速推销想法的浓缩方式。希望你能在电梯门为他们打开时，引起听众的兴趣。在制定商业计划的过程中，问问自己，你会如何向客户做“电梯游说”。这是检验你商业计划是否可行的有效方法。\n\
  \n### 明确你要解决的问题\n\n关于开发一个像样的应用，第一条规则是：好的应用解决问题。你应该问自己这样一个问题：我的应用能为世界带来什么？即使是最简单、易学的游戏，也能消除用户的无聊感；玩几关《愤怒的小鸟》，就能让公交车上的时光或排长队的等待变得快得多。\n\
  \n你的应用是“维生素”还是“止痛药”？“维生素”是“有则更好”的解决方案，人们想起来才会用，但绝不会在绝望时迫切寻找。“止痛药”则是“必须要有”的应用，是我们为了使用它们而特意购买智能手机或平板电脑的理由。\n\
  \n如果你有 Android 设备，我们建议你把它拿出来，翻看屏幕上的应用。很有可能，你最近使用的大部分应用都是“止痛药”。“维生素”往往是那些你一时兴起下载下来，但几乎不怎么用的应用。\n\
  \n显然，我们的建议是开发一款“止痛药”类的应用，而不是“维生素”类的。虽然游戏应用通常是“维生素”，但也有例外。娱乐市场可能变幻莫测，但某些娱乐形式比其他的更像“止痛药”。如果你像马克一样，甚至可能对游戏应用上瘾。你可以思考一下你的游戏能解决什么问题，这会使你受益。例如，如果你的游戏在短时间的游玩中依然有趣，那么它就解决了短暂无聊的问题。有些游戏需要花时间去学习，用户可能需要玩上几个小时才能真正享受其中。你肯定不想在当地公交线路上推广这样的游戏。\n\
  \n### 分析你的竞争对手\n\n每一个创意，无论多么原创，都必须与其他创意争夺用户的关注度。在将你的应用发布到世界之前，了解你的竞争对手是谁，是件好事。*如果你搞不清竞争对手是谁，那你就是在盲目飞行。*\n\
  \n想象一下，如果你制造了一种类似于《星际迷航》中的传送装置。你可能会认为这个想法如此原创且重要，足以主导市场，因此无需进行竞争分析。但如果每次使用需要花费 1\
  \ 万美元呢？即使这个传送装置能安全快速地将人们送达目的地，大多数人仍然会选择他们最喜爱的航空公司（或他们的汽车）进行国内旅行。但竞争分析会揭示，长途头等舱商务旅行的费用也差不多，因此，这也许是最佳的目标市场。\n\
  \n类似地，如果市场上已经有一款应用能以更低的价格（或免费）实现同样的功能（并且在某些情况下做得更好），那么没有人会愿意使用你的应用。在应用的世界里，这个问题比其他竞争环境更为尖锐。热门的应用在\
  \ Google Play 列表中的排名更靠前，因此现有的热门应用往往会形成垄断地位。你必须问自己，为什么人们会使用你的应用，而不是类似的竞争应用。除非你的应用更好，否则你无法取代长期占据用户心智的热门应用。为了成功，你必须*显著地*比你的竞争对手做得更好。否则，你或许应该考虑让你的应用去做些别的事情。\n\
  \n了解竞争对手的方法有很多，但至少你应该在应用商店中搜索你所属类别的应用。阅读用户评论，试用它们，并让你的朋友给你反馈。你甚至可以开展一项调查。你还应该更广泛地思考你的竞争对手。有没有功能类似的\
  \ PC 软件？那电子设备呢？你的首要目标是了解市场上已经存在什么。\n\n在收集了一些原始数据后，分析竞争对手的最佳方法是制作一张名为“竞争对手阵列”的图表。这张图表应该根据多个因素对你的业务和竞争对手进行排名。这些因素因行业而异，但你可以从表\
  \ 2-1 中找到一个简化的竞争对手阵列示例。这里对两款逐向导航应用在四个因素上进行了比较。请注意，这些因素是有权重的。你需要自行决定哪些因素最重要，从而得出合适的权重。一旦你整理好这些信息，它就能为你决策提供依据，帮助你了解在你的应用具备竞争力之前需要做出哪些改变。\n\
  \n**表 2-1.** 使用竞争对手阵列对两款移动导航应用进行排名\n\n![图片](img/Table2-1.jpg)\n\n### 确定目标市场\n\n\
  你可能会担心自己的应用永远无法与竞争对手抗衡。别担心！我们并不是说你必须创建一个新的应用类别才能成功。理想情况下，你会找到一个你的竞争对手未能充分服务的目标市场。通过专门针对这个市场，你可以吸引那些被竞争对手忽略的客户。\n\
  \n\n\n如果你最终发现分析有误，目标市场并不奏效，别灰心！通常你只需做些小改动，就能将现有应用聚焦到竞争对手尚未关注的细分市场。无论哪种方式，通过瞄准特定利基市场，你的应用会更早出现在该子市场相关的搜索结果中。然后你就可以将应用定位为专为这一细分市场设计进行推广。在前面的例子中，假设其他移动导航应用对骑行者的支持有限。或许你可以增加针对骑行者特有问题的功能。这样一来，即使其他逐向导航应用为汽车驾驶员提供了更好的性能，你的应用也会成为理想选择。\n\
  \n我们来谈谈如何确定你的目标市场。你会发现很少有事物能吸引所有人。回想一下你喜爱的电影，你很可能就能找到讨厌这些电影的人或群体。如果你足够聪明，在应用被创建出来之前，就能发现什么样的人会喜欢它。\n\
  \n理想情况下，你希望产品被所有人使用，但这在现实世界中很少发生。通常，最终会发现某个特定的细分市场或群体会大量使用某个产品。广告商意识到这一点，并经常针对这一群体定制他们的商业广告或其他形式的广告。想想你看过的所有广告，从超级碗价值数百万美元的广告到本地低预算广告：它们总是针对特定人群。如果你能弄清楚哪类人更有可能使用你的应用，那么你就已经迈出了寻找目标受众的第一步。\n\
  \n换句话说，很可能有特定的群体，无论是剪贴簿爱好者、邮票收藏家、体育迷，还是其他任何类型的爱好者，他们会比普通消费者更渴望使用你的 Android 应用。在决定如何营销你的\
  \ Android 应用时，这可能是一个需要考虑的最重要问题。\n\n如前所述，Google Play 商店有数十万个 Android 应用，因此要让某个应用脱颖而出需要付出很多努力。思考一下接触你的受众需要投入多少时间和金钱。如果接触他们所需的成本超过了你预期的收入，那就有问题了。我们将在第\
  \ 9 章中详细解释如何接触你的受众。\n\n简而言之，你应该确定你的销售对象。设身处地为客户着想，想象他们在寻找什么。缩小目标群体是否让你更容易接触到他们？缩小目标群体是否让你更容易专注于他们的需求？缩小市场并不是坏事；它有很多营销优势，而成为一个利基产品也是从竞争中脱颖而出的绝佳方式。\n\
  \n事实上，大多数专业风险投资家在听说一家公司正在开拓一个以上市场时会感到担忧。当你刚刚起步时，专注于不止一种类型的客户实在太难了。如果你已经确定了不止一个目标受众，你应该认真考虑只从中挑选出最好的一个，并将你最初的努力集中在那里。\n\
  \n当然，你可能会担心目标市场太小，但请确保你对市场规模的理解是正确的。假设你正在开发一个让人们调音卡祖笛的应用。你可能会认为会吹卡祖笛的 Android 用户数量相当少。但从市场角度思考，这其实是一种错误的方法。问题不在于有多少携带卡祖笛的\
  \ Android 用户；问题在于你能接触到多少用户，以及他们愿意为卡祖笛调音应用支付多少钱。例如，假设有一个非常活跃的卡祖笛兴趣论坛，几乎每个卡祖笛演奏者都会访问，并且该论坛公开抱怨缺乏卡祖笛调音应用。在这种情况下，你实际上可能拥有一个非常好的市场，因为很容易接触到他们。如果你在那里发帖，几乎每个卡祖笛用户都会知道你的应用。\n\
  \n另一方面，你可能有一个非常适合有车一族的好应用，但无法让大多数车主了解它。考虑到超过 95%的美国家庭都拥有一辆汽车，你的目标市场似乎足够大。但如此高的潜在受众并不一定意味着庞大的用户数量。不要忽视让潜在用户了解你的应用的难度。创建一个具有真正巧妙功能的应用，通常足以吸引记者的兴趣，这能让你免费接触到用户。我们将在第\
  \ 9 章中对此进行更多讨论。\n\n我们来谈谈在构想目标市场可能是什么样子时，你可以考虑的一些因素。自然，你可以从思考基本的人口统计信息开始，可能包括年龄、地点、性别、收入水平、教育水平、婚姻状况、职业和种族背景。这些因素可以在你脑海中勾勒出一个特定客户的印象，但会非常模糊。\n\
  \n尝试更详细地想象你的目标客户。思考个人特征，例如他们的个性、态度、价值观、兴趣、爱好、生活方式和一般行为。继续思考，直到你能想象出一个典型的客户。你是否认识某个熟人或电视角色符合这一描述？记住那个形象。\n\
  \n现在想象你的典型客户将如何使用你的应用。你想象他们会在何时以及如何使用你的应用？他们会认为你的应用的哪个方面最重要？你将如何接触到他们？他们是读报纸还是用\
  \ Facebook？他们是你可能联系到的某个组织成员吗？\n\n既然你已经缩小了对客户的想象范围，请确保你的市场足够大。记住，有时市场的大小并不绝对，更重要的是你接触这些客户的能力。但当然，世界上必须有足够数量的人符合你的客户画像，以便你能够实现收入目标。当然，你需要确保你的典型客户能买得起你的应用！最后，你需要能够通过某种营销技巧接触到他们。\n\
  \n---\n\n评估技术、执行和市场风险\n\n任何时候你想做某件事，都存在风险。每一次风险都伴随着失败的可能——这是一个我们讨厌听到的词，尤其是当它与我们的名字联系在一起的时候。我们要告诉你一个小秘密：快速失败。提前评估风险是确定你可能会在哪里失败的好方法。然后你可以决定这些风险是否可控；如果不能，可以尽早止损。\n\
  \n导致失败的原因有三个：\n\n*   技术风险\n*   执行风险\n*   市场风险\n\n我们将在接下来的章节中逐一审视这些风险。\n\n技术风险\n\n\
  \n\n### 技术风险\n\n**技术风险**简单来说就是：能否利用安卓提供的技术和工具来实现某个功能。理想情况下，技术能够满足你的需求，但有些应用会挑战其极限。如果你正在编写一个计算量非常大的应用（即非常耗用处理器资源的应用），就需要特别关注这一风险。运行速度较慢的安卓手机可能根本无法运行你的应用，而即使是运行速度最快的手机，如果你的应用持续运行，也会出现明显的电量消耗。当通过网络传输大量数据时，你也可能遇到类似的技术风险。你应该问自己：网络连接较慢时，能否处理你的应用？其他技术风险领域包括麦克风灵敏度、扬声器音量以及屏幕空间或分辨率不足。从更普遍的角度来看，有些算法根本无法在所有情况下都正常工作。例如，词汇量非常大的语音识别系统经常会遇到问题。视觉对象识别应用可能会混淆某些物体。这类问题需要在开发早期就加以解决，以避免浪费大量时间和金钱。\n\
  \n如果你已经识别出技术风险领域，那么在编写完整的应用之前，应确保你已经掌握这些领域的情况。一个简单的原型，甚至粗糙的拼凑软件，通常能让你更清楚地了解这个想法是否可行。始终努力消除商业计划中的风险！\n\
  \n### 执行风险\n\n**执行风险**是一个简单的问题：你是否能完成你计划要做的事情？例如，你的应用可能需要非常复杂的算法，但你却是个新手程序员。你的应用可能没有高质量图形就无法成功，但你又并非经验丰富的图形设计师。你的应用在技术上或许是可行的，但你可能缺乏实现它的能力，从而导致项目严重延期。如果你是一名新手程序员，你真的应该请一位专家来评估你的计划。如果你无法方便地接触到专家，本书作者之一罗伊（Roy）总是乐于听取同行企业家的意见。即使他本人无法帮助你，他也可能认识能帮你的人。你可以通过他的网站（`www.sandbergsound.com`）联系他。请记住，那些看似简单的事情，通常只是因为我们对其细节知之甚少，才会觉得简单。\n\
  \n### 市场风险\n\n**市场风险**本质上是要弄清楚市场是否会以你所期望的规模使用你的应用。应用开发者面临的一个非常普遍的问题是，无法承担广告费用。如果你的应用售价为`1.00\
  \ 美元`，但获取一个用户的广告成本是`1.05 美元`，那你就面临问题了。虽然广告成本因你使用的媒介（谷歌、Facebook、杂志、电视、广播等）而异，但你可以粗略估算一下：假设通过印刷媒体接触到一位读者的成本是几美分（名义上的`0.05\
  \ 美元`）。你可以大致估算出，将一次点击引导到你的网站的成本也是这么多。多少次浏览或点击会产生一次销售？嗯，这无法提前预知，但如果你必须猜测，你的预估不应超过\
  \ 1% 左右。\n\n幸运的是，你不必猜测。在你的网站上出售你的产品，并记录下有多少独立访客表达了购买意愿（他们点击了`购买`按钮）。你甚至不需要准备好产品就可以这么做；只需记录下潜在购买者的联系信息，并告诉他们产品准备好后会通知他们。除了广告之外，我们将在第\
  \ 9 章中探讨获取用户的其它方法，但你应该确保你有一个吸引目标受众的策略。\n\n你*不应该*做的是这样想：“只要我建好了，他们就会来。”这在棒球场或许行得通，但绝对不适用于应用。将你的应用上架到\
  \ Google Play 商店可能会让一些人安装它，但如果不采取额外措施，你无法获得足够多的用户来取得哪怕是适度的成功。解决这个问题的一个方法是思考你用户的兴趣，以及如何利用这些兴趣来接触他们。是否有他们聚集的在线论坛？他们是否阅读某些杂志？你能通过病毒式传播（朋友的朋友）接触到他们吗？简而言之，如果你想不出如何接触你的客户，你就不可能拥有大量客户。\n\
  \n### 思考盈利与定价\n\n任何业务的关键一步都是为你的产品定价。顾客总是想要不劳而获，而安卓上有许多应用是可以免费获取的。作为开发者，你仍然可以通过免费应用投放广告来赚钱。或者你也可以为你的应用收费。实际上，有多种选择可供考虑。现在是时候考虑这些选项，并评估哪种选择最适合你的应用了。\n\
  \n#### 付费应用\n\n你可以直接销售你的应用，你的应用会有一个明确的价格标签。请记住，大多数市场会收取你标价 30% 的佣金。你必须说服顾客，让他们仅仅凭借你产品的描述和评价就掏钱，而这在没有营销的情况下是很难做到的。你可以忘掉那种把应用往\
  \ Google Play 上一放，就能坐等利润增长的美梦了。好的一面是，你不必非常频繁地更新你的应用，因为用户购买后，你无需再维持他们的兴趣；你无法再从他们身上赚到额外的钱。当然，你确实希望用户给你好评，所以确保你的应用高质量运行且没有任何缺陷，对你是有好处的（也符合你的最佳利益）。\n\
  \n难点在于持续向新用户展示你的应用。虽然你肯定会得到一些通过搜索关键词找到你的用户，但总的来说，你需要持续寻找宣传渠道才能产生真正的收入。对于低价位应用，除非获取新用户的成本非常低，否则广告可能行不通。如果你的应用非常专业，并且可以支撑较高定价（比如`10\
  \ 美元`或更高），你可以预期通过传统广告渠道取得一些成功。\n\n#### 免费应用\n\n世上或许没有免费的午餐，但确实存在免费的应用。然而，我们大多数人不会毫无回报地免费赠送东西。所以，即使你可能不向用户收取运行应用的费用，也有可能通过广告来赚钱。\n\
  \n你需要找到一个服务商，愿意为你在应用中投放广告而付费给你。通常，你会在用户每次点击广告时获得报酬。我们将在第 6 章中进一步讨论这一点。\n\n与付费应用相比，免费应用可能会获得多得多的下载量，轻松达到十倍或更多。不幸的是，通常你从每个用户身上赚到的钱会更少，至少短期内如此。一个广告投放服务商（例如\
  \ Google AdMob）会定期投放一个新广告，可能每分钟一次，尽管这个频率开发者可以调整。因为任何一个广告都可能是用户感兴趣的，所以你的应用投放的广告越多，就越有可能获得点击。这意味着，用户会长时间交互的应用非常适合采用免费的、由广告支撑的模式。相反，如果你的应用解决了一个非常重要的问题，但用户只使用一次或很少使用，那么你最好把它做成一个付费应用。\n\
  \n#### 免费增值应用\n\n\n\n### 变现模式\n\n免费增值应用是完整版应用的轻量版本，旨在促使用户为升级付费。免费版本甚至可以显示广告。如果你采用这种模式，应明确告知用户何时需要付费升级。不要将应用伪装成免费应用，之后又让用户感到意外。\n\
  \n当然，这种方式可能会变得复杂，因为你必须维护同一应用的两个版本，这意味着需要向 Google Play 提交两个应用。\n\n确定免费版与付费版之间的临界点可能很困难。*愤怒的小鸟*之所以能盈利，是因为免费版提供了少量关卡，但这些关卡足以让玩家渴望更多。这是理想的情况：当用户被吸引住时，再让他们从免费版切换到付费版。这时，他们更愿意花钱。\n\
  \n除此之外，通过免费版建立用户的信任，会让他们更愿意选择升级到付费版。关键在于，付费版应提供用户开始使用应用后真正需要的功能。你通常可以在免费版中人为地限制某些功能，使其足够有用，但对高级用户来说又不够用。\n\
  \n#### 服务模式\n\n这种技术让用户在下载应用时为特定服务付费。作为开发者，你甚至可能不是提供该服务的人，但每次你为用户连接服务提供商时，都可能从中赚取一定费用。\n\
  \n可能涉及订阅模式，例如 Kindle Fire 上的许多应用。Kindle Fire 提供杂志订阅功能，但某些期刊、书籍甚至节目会选择以应用形式提供，用户通过订阅来获取最新“期号”。\n\
  \n正如这个例子所示，当应用被用作提供某种底层能力（例如频繁更新的内容）的载体时，这种变现技术效果最佳。由于应用用户对价格非常敏感，你需要让他们相信，他们得到的不仅仅是一个应用。几乎没有人会愿意为不能提供现实价值的应用每月持续付费。\n\
  \n#### 应用内购买\n\n应用内购买是指让用户为应用内的某些功能付费。这在游戏中很常见，角色可以为更大的武器甚至一些看似表面的东西（如不同的皮肤）付费。另一个例子是免费的翻译应用，但要求用户为特定的语言模块付费。\n\
  \n实际上，这种变现策略与免费增值模式非常相似：用户免费获得应用，然后被说服为更多功能付费。应用内购买的优势在于，用户可能会随着时间的推移进行多次购买；因此，对于需要反复使用的应用来说，这可以带来持续的购买收入流。\n\
  \n#### 其他盈利模式\n\n一些最好的商业模式涉及创造性的变现策略。仔细想想，有些移动应用仅仅是实现商业交易的手段。例如，eBay 提供了一个免费的应用程序，有助于查看拍卖状态。任何在\
  \ eBay 上拍卖的人都向 eBay 支付少量佣金；这是其商业计划的核心。eBay 应用程序有助于随时随地进行拍卖；它通过让更多用户更轻松地买卖商品来收回成本，这意味着更多的拍卖交易会发生。\n\
  \nFlywheel、Lyft 和 Uber 通过让用户从 Android 手机叫车（出租车、拼车或专车）来盈利。用户下载免费，没有广告，也没有需要付费的服务。那么它们如何赚钱？它们从司机接到的每笔订单中收取费用！通常，如果你能将应用插入买家和卖家之间，你可以向卖家收取少量费用，他们会很乐意支付，因为你为他们带来了客户。\n\
  \n尽管市场应用内购买库不支持实物商品的销售（参见第 7 章），但你完全可以在应用内链接到实物商品。无论是通过联盟计划（参见第 6 章），还是仅通过链接到你网站上的产品，你都可以利用应用来促进实物商品的销售。\n\
  \n### 估算进度表\n\n正如我们在第 1 章中所述，Android 开源开发工具是完全免费的。但正如谚语所说，时间就是金钱。当然，你可以花大量时间制作完美的应用，但谁来付钱给你？此外，如果你真的创建了这款完美的应用，万一别人也在做同样的事情呢？花时间制定项目进度表，这样你就能知道需要多少时间；这将让你更好地判断开始是否值得。\n\
  \n你不必使用复杂的图表或特殊软件来制定进度表，尽管如果你愿意也可以。这里的关键点在于，将你的想法分解成一系列步骤。然后，将这些步骤进一步分解。当每个步骤的实施时间不超过一天时，你就有了一个合适的进度表。\n\
  \n如果你不知道某项任务需要多长时间，就说明你识别出了一个执行风险（如前所述）。你应该咨询专家，看看能否从他们那里得到估算。他们应该能够将问题分解为一系列步骤；如果他们不能，那他们就不是他们声称的专家。你也可以让他们估算为你实施解决方案需要多长时间以及多少成本。这可以帮助你判断对其中涉及的复杂性是否有现实的把握。\n\
  \n在很多情况下，你可以为应用编写一些伪代码，通过尽可能详细地分解每个子程序，并估算每个例程的代码行数，来获得对实现复杂性的相当清晰的认识。\n\n比尔·盖茨说过：“用代码行数衡量软件生产力，就像用重量衡量飞机的制造进度一样。”因此，提到这一点是有争议的，但一些程序员喜欢估算他们每天能写出\
  \ 80 行高质量代码（完全经过测试，包括单元测试）。在某些情况下，这可能有助于你更好地估算进度表。\n\n不过，你的进度表不应仅限于编码。你还应该考虑为网站开发内容所需的时间（本章后面以及第\
  \ 9 章会讨论）。市场推广和销售任务所花费的时间也应包含在内。随着你对这些主题了解得更多，你可以重新审视你的进度表。\n\n即使是相当复杂的项目进度表，也可以写在纸上，或用文字处理器或电子表格实现。然而，如果你不熟悉项目管理，并想以专业的方式管理进度表，你应该考虑使用项目管理软件。至少，项目管理软件允许你安排任务，以便自动计算任务持续时间，包括休息日。涉及许多可变因素的复杂进度表将最受益于这类软件。Microsoft\
  \ Project 几乎是项目管理的行业标准软件包。幸运的是，你不需要投资昂贵的 Microsoft 产品才能入门。\n\n`ProjectLibre` 是 Microsoft\
  \ Project 的一个免费开源替代品，可在 Windows、Mac 和 Linux 上运行。它提供了 Microsoft Project 中的许多相同功能，并且在世界各地都有用户组，你可以在那里获得帮助。你可以在其官方网站上了解更多信息：`http://www.projectlibre.org/`\n\
  \n### 测试你的市场需求假说\n\n\n\n#### 实际上，如果不真正制作、推广和发布一款应用，根本无法测试其是否成功。要是能放一个假应用出去，看看有多少人下载就好了。可惜这样做既不道德，还会招致极差的评价，甚至可能被应用商店和安卓开发者计划扫地出门。\n\
  \n是的，这根本不值得冒那个风险。不过，你可以退而求其次，建立一个销售应用的网站。先让访客知道你的应用尚未就绪，但要在观察他们的反应之后再说。如果发现应用需求不足，你就省去了大堆麻烦，只需告诉那些注册的人项目取消了就行。你的网站可以利用在线工具轻松免费地设计。我们将在本章后面讨论如何快速搭建网站。\n\
  \n确保你的网站包含应用的详细描述，如果可能的话，还要贴上（模拟的）截图。有不少在线工具可以快速免费地制作用户界面（UI）原型，你的工作不会白费，因为之后你还会用到这些成果。我们将在下一节讨论这些工具。\n\
  \n在撰写描述和制作截图时，你应该回答以下几个问题：\n\n*   你在商业计划的前面部分做了哪些假设，这些假设现在可以验证吗？\n*   你的描述是否能精准聚焦于目标市场？\n\
  *   你的截图能否暗示出盈利策略？\n\n除了包含详细描述和截图外，非常重要的一点是，你要向读者提供下载应用的选项。如果应用不是免费的，这个选项还应列出价格。通过模拟真实用户会经历的实际情况，你可以筛选掉那些只是出于好奇的人，从而聚焦于真正的潜在客户。\n\
  \n当用户尝试下载应用时，你应引导他们进入一个注册页面。这个页面会告诉他们应用目前还不可用，但一旦可用就会立即联系他们。如果你添加一个字段让他们留下评论，那就有了一个从潜在用户那里获取反馈的绝佳方式。利用我们将在下一节讨论的免费网站构建工具，这很容易实现。\n\
  \n待你的假设测试网站准备就绪后，你需要吸引一些访客来浏览。这时，你之前定义目标受众所做的基础工作就开始发挥作用了。你之前想好了如何触及你的受众，对吧？那么，就在你的潜在用户经常出没的（众多）论坛中的某一个上发帖，吸引一些用户访问你的页面。你不需要太多人，但确实要追踪有多少人看到了你的帖子，有多少人点击进入了你的网站，以及有多少人到达了注册页面。这将让你了解你的应用在目标受众中的受欢迎程度。\n\
  \n如果你正在多个目标受众之间做选择，那么对每个受众都重复这个过程，是基于硬数据选出优胜者的绝佳方法。算出一些百分比后，你就能推算出当规模扩大、触达更广泛受众时，会获得多少用户。\n\
  \n仅凭反馈，这个过程就值得去做。有一个想法是一回事，但当真实的人告诉你他们对你的想法有何看法时，又是另一回事。通常你会发现，仅仅通过阅读他们发来的几条评论，就能更好地理解你的目标受众。利用所有这些信息来判断你是否具备成功的条件。请记住，在你与预期的目标受众接触后，最初的想法往往会发生巨大变化。无论做什么，一定要倾听你的潜在客户。他们的意见才是最重要的。\n\
  \n#### 用于制作截图原型的工具\n\n在测试市场需求假设时，让你的截图看起来尽可能真实非常重要。幸运的是，有许多工具可用于制作截图原型。如果你确定应用前景光明，那么在截图上投入的时间将物有所值。在某些情况下，这些原型制作工具可以生成可用的安卓\
  \ XML 代码。\n\n网上有大量的原型制作工具。以下是你可以选择的几种：\n\n*   `Fluid UI` (`http://fluidui.com`)：`Fluid\
  \ UI` 让你无需担心代码就能快速模拟应用。图 2-1 展示了一个安卓的模拟示例。\n\n![9781430250074_Fig02-01.jpg](img/9781430250074_Fig02-01.jpg)\n\
  \n图 2-1。使用 `Fluid UI` 制作的用户界面模拟示例\n\n*   `Android GUI Prototyping` (`http://www.artfulbits.com/products/free`)：如果你是微软\
  \ Visio 用户，可以考虑使用这个模板。你需要 Visio 2003 或更高版本。\n*   `DroidDraw` (`http://www.droiddraw.org/`)：一个基于网页的设计器/编辑器/构建器，用于安卓平台上的手机和平板应用编程。目前处于测试阶段，它甚至能生成与你构建的\
  \ UI 相对应的 XML 文件。在你开始编写代码后，这能为你节省大量时间。\n*   `Pencil` (`http://pencil.evolus.vn/en-US/Home.aspx`)：由\
  \ Pencil 项目设计，是一个免费开源的工具，可用于图形用户界面（GUI）原型设计。`Pencil` 包含一个用于安卓模拟的模板。它作为一个应用程序提供，适用于\
  \ Windows、Macintosh 和 Linux 系统，也可作为 Firefox 扩展使用。\n*   `Fireworks Template for Android`\
  \ (`http://unitid.nl/2009/11/fireworks-template-for-android/`)：如果你是 Adobe Fireworks\
  \ 用户，可以考虑这个模板，它将安卓用户界面元素重新绘制为矢量图像。\n*   `Android Wireframe Templates` (`http://gliderguns.files.wordpress.com/2010/01/android_wireframe_templates3.pdf`)：如果你还处于构思阶段，想先对整体创意做些探索，你总是可以用纸和笔开始。这些线框模板能帮助你制作出更逼真的布局。包含实际的安卓手机插图，涵盖\
  \ HTC Dream、HTC Hero、HTC Magic、HTC Tattoo、HTC Nexus One 和 Motorola Droid。\n\n你可能会考虑创建一个完全原创的界面。例如，你可以非常大胆地做出像立体书那样古怪的风格；或者做出不仅仅是常见的按钮、下拉菜单和手指滑动组合的东西。你应该意识到，安卓的\
  \ UI 有特定的范式，如果违反，可能会破坏用户的思维模型，从而引起困惑。如果你要违反标准的设计规则，必须有充分的理由。请谨慎行事。\n\n#### 用于搭建网站的工具\n\
  \n为了测试你的市场需求假设，你需要搭建一个网站，作为放置截图和应用描述的地方。毕竟，你不能把一个假的应用放到真正的应用市场里！\n\n由于关于网站构建的书籍已有很多，我们就不详细讨论如何创建一个很酷的网站了。只需确保它看起来专业即可。如果你的网站看起来太业余，你无法准确判断市场需求。我们都曾访问过一些给人留下坏印象的网站，而这种印象会影响我们的购买决策。如果你是网站开发新手，你可能想使用像\
  \ Weebly（见图 2-2）这样的服务来搭建你的网站。\n\n![9781430250074_Fig02-02.jpg](img/9781430250074_Fig02-02.jpg)\n\
  \n图 2-2。Weebly 是众多可用于快速搭建网站的免费工具之一\n\n\n  \n"
- "# 第 2 章  \n\n虽然你的网站必须看起来专业，但不必非得复杂精美。只需几个页面，甚至可能一个页面就足够了。只需确保你的网站与你的应用性质相匹配。在这里，你可以选择包含你的图标、Logo、截图以及应用的任何其他风格元素。你或许可以前往`Google\
  \ Play`随便选一款应用。每款应用下方都应有一个指向开发者网站的链接，这样你可以看看它们长什么样。例如，图 2-3 展示了`Waze`应用的网站。这个网页传达了应用的精髓。`Waze`是一款极为知名的应用，但你会发现它的着陆页其实非常简单。要搭建出同等完成度的应用网站，并不需要花很长时间。\
  \  \n\n![9781430250074_Fig02-03.jpg](img/9781430250074_Fig02-03.jpg)  \n\n图 2-3。Waze\
  \ 网站  \n\n有大量工具可以帮你快速搭建网站。为了能快速建站来测试你的商业计划，我们只讨论那些免费提供网页托管服务的在线建站软件。这些工具让你可以免费设计网站，不花一分钱。此外，我们选择的工具不会在你的网站上塞满不专业的广告。遗憾的是，它们都会在页面底部加上一个小页脚，不过并不太碍眼。\
  \  \n\n*   **Weebly**（`www.weebly.com`）：罗伊在使用`Weebly`（如图图 2-2 所示）托管自己的网站时效果不错。`Weebly`非常易用，并提供了大量模板可供选择。\
  \  \n*   **SnapPages**（`www.snappages.com`）：这个网站构建器简单又省心，包含许多网站模板。  \n*   **Webnode**（`www.webnode.com`）：这款工具对个人网站免费，有上百种模板可供选择。你完全可以用个人网站来承载你的市场需求假设，其付费服务从`$4.95/月`起。\
  \  \n\n## 你的“宝宝”或许很丑  \n\n当别人对你花了很长时间才拼凑起来的东西迅速提出批评时，总是很伤人。就像父母养了个丑宝宝一样，开发者往往不顾外界的挑剔眼光，依然深爱着自己的应用。请务必记住，尽管你孕育了一个新想法，但应用*不是*一个宝宝。优秀的企业家能够接受批评。有时，事实就是对你不利，而你的时间最好花在寻找新想法上。\
  \  \n\n## 你才是老板  \n\n我们希望本章为你提供了所需的工具，让你能判断自己的想法是否具备成功的条件。前面列出的七个要点应促使你对你的 Android\
  \ 应用提出尖锐的问题，我们也陈述了一些关于在 Android 应用世界里什么能成功、什么不能成功的规则。这些规则值得考虑，但不要钻牛角尖；实际上，它们只是指导方针。换句话说，规则可以被打破，但你得自担风险。我们试图阐明该遵循哪些规则，但这段旅程终究要靠你自己走。\
  \  \n\n## 总结  \n\n现在你了解了情况，让我们来过一个简单清单：  \n\n*   你正在解决什么问题？  \n*   这是止痛药还是维生素？ \
  \ \n*   你的竞争对手是谁？你有什么是他们没有的？  \n*   目标市场是谁？  \n*   你将如何接触目标市场？  \n*   开发这款应用需要多长时间？你能把任务分解成各个里程碑吗？\
  \  \n*   你必须解决哪些技术风险？你如何向自己证明它们可以被解决？  \n*   你是否有时间和资金来实现这一切？是否需要请一位顾问评估你的想法？  \n\
  *   市场是否足够大，能提供你所需的收入流？  \n*   市场是否足够小，以至于你能精准满足其需求？  \n*   你的目标客户愿意付费吗？  \n*  \
  \ 你针对的是哪个 Android 版本？  \n*   你采用什么定价模式？  \n*   你是否测试过你的市场假设？  \n*   你是否不想再回答问题，只想打破规则？这由你决定，但后果自负。\
  \  \n\n"
- "# 第 3 章：法律问题：安全总比遗憾好  \n\n罗伊曾涉及多起法律诉讼，他可以告诉你，这绝不是什么好事。了解法律如何影响你作为应用开发者的角色，可以让你远离麻烦。我们并非律师，因此无法在法律上给你任何具体的法律建议。话虽如此，或许我们可以推荐一些你可能觉得有用的法律资源，以避免不必要的麻烦。\
  \  \n\n## 聘请律师——控制成本  \n\n你可能会因为费用问题而犹豫是否聘请律师。虽然律师通常不便宜，但他们往往比你可能面临的后果要便宜得多。如果你对应用的合法性有任何疑虑，或者对法律事务有任何不确定，应立即联系律师。大牌律所业务出色，但收费也非常昂贵。如果你资金有限，应考虑找一家较小的律所，或者找一位独立执业的律师。通常，他们的收费比大律所更合理。虽然他们可能没有大律所那么深厚的专业积累，但一般也能很好地提供基本的法律服务。理想情况下，你可以找到一位曾在大律所工作、如今已独立执业的律师。他们既有大律所的工作经验，收费却更为合理。\
  \  \n\n请记住，与律师协商费用是有可能的。如果你与多家律所接触，你就有更多的议价筹码。对于常规工作（例如公司注册或撰写通用雇佣合同），通常可以要求固定费用。然后你可以在不同律所之间货比三家，进行直接的价格比较。\
  \  \n\n年轻律师，即所谓的“初级律师”，通常刚从法学院毕业没几年，往往需要在职培训。要小心别花钱去培训一位律师。你可以要求律所不要在你的案件上使用初级律师。通常，你希望由律所的合伙人或资深律师来处理你的工作。只与那些已经做过你所需类型工作的初级律师合作。典型的安排是初级律师完成大部分工作，然后由合伙人复核。自然，如果初级律师做得不对，你就在为合伙人纠正错误而买单。你应当注意不要为律师之间的内部沟通付费。一般来说，涉及的律师越少，流程效率就越高。\
  \  \n\n\n\n\n如果你开发应用时以从投资者处筹集资金为目标，有时可以说服律师提供无需预付费用的咨询，这种安排被称为“递延补偿”。这通常意味着将一定数量的计费小时数推迟到你与律师商定的融资门槛达成后再收取。律师还可能协商获得你创业公司的部分股权。一旦你达到融资门槛（通常是首轮融资），你就需要支付未结清的款项。这种交易通常只有专门帮助初创公司的律所才会提供。该领域在业内被称为“风险投资法律”。通常，风投律所会在你的公司未能达成融资目标且被迫解散时放弃收费。具体条款通常取决于你向律师推销自己和创意的能力。请记住，这种支付结构的前提是，你计划筹集足够资金来覆盖法律费用。一家风投律所可能会提供\
  \ 1 万到 2.5 万美元甚至更多的递延咨询服务。切记，递延不代表免费；你要警惕服务收费过高。不道德的律师可能会对同等服务收取更高费用，因为他们知道你在此种收费结构下不会太关注成本。\n\
  \n从外部投资者处筹集资金的过程超出本书范围，但请记住，若选择此路，你将稀释公司所有权，并耗费大量时间用于融资而非实现创意。如果你认为市场规模足够大，这或许是个好选择，但需权衡利弊。\n\
  \n请谨记，在聘请律师时，务必注意你所接受的条款。如果访问《美国新闻与世界报道》旗下的 Best Law Firms 网站（`http://bestlawfirms.usnews.com/`），你会看到一个搜索引擎，可帮助你查找当地专精“风险投资法律”或“公司法律”等业务领域的律所。\n\
  \n## 成立公司\n\n如果你以个人名义发布 Android 应用，法律上该业务被视为独资企业。你当然可以随心所欲地命名业务，但作为独资企业，你需对任何债务、不当行为和/或疏忽承担个人责任。例如，若你订购物资后因收入低于预期而无法支付，你需个人承担债务。若你的地图应用导致某人驾车坠崖，原则上他们可以直接起诉你个人索赔。另一方面，当应用由公司（包括有限责任公司，即\
  \ LLC）拥有时，责任通常归属于该独立法律实体。更详细地说，成立法律实体可将企业的资产与负债与所有者(们)的资产和负债分离。因此，通常宜成立公司实体，以保护自己免受与你编写应用相关的诉讼和债务影响。成立公司还可能带来税务优势：你可以抵扣某些商业开支，长期来看能节省资金。\n\
  \n请记住，必须谨慎维护资产与负债的分离，否则法院可能不会保护你免于个人责任。例如，若你将公司资金用于个人事务，这明显违背了个人资产与公司资产分离的原则，也属非法行为，可能导致债权人或股东以挪用公款罪名起诉。\n\
  \n你可以选择不同类型的公司实体。C 股份有限公司、S 股份有限公司和有限责任公司（LLC）各有独特优势和税务影响。法律专家已就此主题撰写了许多书籍，由于我们并非律师，建议你参考这些书籍了解更多细节。\n\
  \n## 最终用户许可协议与隐私政策\n\nEULA 即“最终用户许可协议”。通常，EULA 会向用户展示复杂的法律条款，用户必须同意才能访问网站或安装软件包。\n\
  \n本质上，EULA 是你与用户之间的合同。它规定了最终用户使用你应用的条件和条款。EULA 提供了一种保护方式，防止因软件损坏用户计算机或数据，或因用户以你从未预期的方式使用应用而引发的诉讼。例如，若你的应用用于报税，你可以通过\
  \ EULA 限制用户因错误使用软件而被国税局处罚时的损害赔偿。顺便一提，如果这是你的应用创意，我们强烈建议你在继续前进前先咨询律师。\n\n关于 EULA 的法律可执行性存在许多复杂的法律问题，因此如果你认为应用需要\
  \ EULA，我们再次建议你联系有起草此类合同经验的律师。许多 Android 应用并未附带 EULA，通常是大型应用公司（有能力聘请律师）才会包含。但每种情况都不同，你需要深入思考是否愿意放弃\
  \ EULA 所能提供的法律保护。\n\n网上通常能找到 EULA 范例。EULA 种类繁多，我们无法推荐一种适合你的特定需求。一如既往，若对此问题有疑问，我们建议你咨询律师。\n\
  \n如果你选择包含 EULA，你需要一种方式在应用中通过程序化方式显示它。实现此功能的示例代码可在此找到：\n\n```\nhttp://blog.donnfelker.com/2011/02/17/android-a-simple-eula-for-your-android-apps/\n\
  ```\n\n全球许多司法管辖区将隐私权视为受法律保护的概念。特别是欧洲在这方面拥有高度发达的法律。虽然美国没有联邦强制要求的隐私政策，但加利福尼亚州和康涅狄格州都要求网站和在线服务提供隐私政策。因此，为确保你的应用在其可能被使用的所有司法管辖区合法，你应当包含并遵守隐私政策。一般来说，你需要向用户明确告知收集了哪些数据，并妥善保护信用卡号、驾照号等个人信息。\n\
  \n移动营销协会（一家全球非营利行业协会）提供了可免费使用的移动应用隐私政策模板。该政策简短，仅六页，你只需填写应用的特定信息即可。你可以通过以下链接获取该政策：\n\
  \n```\nhttp://www.mmaglobal.com/node/18771?filename=MMA_Mobile_Application_Privacy_Policy_15Dec2011PC_Update_FINAL.pdf\n\
  ```\n\nGoogle Play 商店极其重视隐私，因此除了向用户展示应用将访问哪些内容（位置、联系人等），它还提供了指向你隐私政策的可选链接。你也可以托管包含隐私政策的网站。\n\
  \n\n\n\n虽然隐私政策目前是可选的，但谷歌与另外五家大型科技公司同加州总检察长达成的一项协议，使其很可能在不久的将来成为强制性要求。不言而喻，你必须遵守隐私政策中明确规定的条款。如果不遵守，你可能会根据多项法律被起诉，包括加州的《不正当竞争法》和/或《虚假广告法》，这两项法律赋予“公众免受欺诈和欺骗的权利”。\n\
  \n## 知识产权\n\n你计划通过分发实际上只是一堆存放在内存中的程序和数据的某个东西来赚钱。幸运的是，即使软件不是实物，你仍然可以像保护有形资产一样保护它免遭盗窃。另一方面，你也可能被指控窃取知识产权。我们想你会同意，每个开发者都应该对知识产权法律有一些基本了解。让我们聚焦于知识产权的四种不同类型：版权、商标权、商业秘密和专利权。\n\
  \n### 版权\n\n版权赋予原创作品的创作者（例如书籍、照片或软件）在有限时间内的专有权利。具体来说，版权持有人有权决定谁可以复制、分发、公开表演、修改或基于其原创作品创作衍生作品。这意味着作为应用的创作者，在版权有效期内，你独享复制、销售或传输该应用的权利。当然，你也可以选择将该权利转让给他人。在大多数司法管辖区，版权在作者去世后至少持续\
  \ 50 年，通常会更长。\n\n出于这些原因，你可能对获得版权感兴趣。好消息是获得版权非常容易。从法律上讲，从你落笔到纸上或向电脑输入字符的那一刻起，版权保护即告成立。版权可以保护诸如源代码、图形、音效以及你在应用程序中投入的其他原创创意作品，但它不保护那些未以创意或艺术方式使用的任何事实或思想。要保护一项发明，你应该申请专利，正如本章后续“专利权”部分所述。\n\
  \n获得版权可以为你提供基础层面的保护，这在起诉明显模仿你作品的人时会派上用场。上一句中强调的重点是*明显*，因为版权保护可以扩展到竞争对手窃取你的图形或应用程序本身的情况，但当模仿者的应用程序恰好与你的基本想法相同（巧合）时，则不适用于此。\n\
  \n为了享受版权保护，并非必须注册版权。然而，版权注册是有效版权的*初步证据*。如果在作品发表后 3 个月内或在侵权行为发生前完成注册，注册将使版权持有人能够寻求法定赔偿和律师费。否则，权利人只能就实际损失和利润提起诉讼。\n\
  \n注册可以在线完成，要求你上传源代码的前 25 页和后 25 页（最好采用 PDF 格式）。由你自行决定应用程序的首页和末页是什么。应用程序的每个新版本都必须重新注册。你也可以为你的应用程序截图进行注册。详细说明请见此处：\n\
  \n```\nhttp://www.copyright.gov/circs/circ61.pdf\n```\n\n虽然并非享受版权保护所必需，但包含版权声明（无论是文字形式还是使用版权符号）有助于克服“善意侵权”的推定。换句话说，如果版权侵权者看到了你的作品受版权保护，那么复制行为就不可能是善意的。\n\
  \n目前的申请费是 65 美元，但如果通过`http://www.copyright.gov/eco/`在线提交，则仅需 35 美元。你可以在`http://www.copyright.gov/eco/eco-tutorial.pdf`的教程中找到许多关于电子申报问题的答案。\n\
  \n### 商标权\n\n现在我们来谈谈商标权。商标旨在防止他人将你公司的产品和服务与其他公司的产品和服务混淆。商标不保护概念或思想，但它能保护你免受他人使用你的名称、标识或其相似物进行经营。在当今市场，保护你的品牌极其重要。想想像麦当劳、微软这样的公司，以及为了讨论需要，谷歌自己的安卓系统。毫无疑问，它们标识的形象会浮现在脑海中：分别是金色拱门、Windows\
  \ 标志和那个绿色机器人。商标法阻止竞争对手以可能混淆消费者的方式使用这些标识。\n\n与版权不同，商标权并非自动授予。但是，根据一项名为“假冒”的普通法原则，你或许可以对未经许可的商标提起法律诉讼。当你使用某个名称或符号作为安卓应用的标识时，你可能就已经获得了该项法律下的保护。然而，法律要求你必须证明该交易商（即你）拥有“商誉”。除非你拥有大量通过你的商标认识你的客户，否则这很难做到。在美国境内，你可能希望通过向美国专利商标局提交商标注册来获得更好的保护，这是在联邦法院提起商标诉讼所必需的。一旦你的商标获得批准，你就得到了保护，无需证明你的商标是众所周知的。在美国以外，你会发现大多数国家按照世界贸易组织《与贸易有关的知识产权协议》的规定提供类似的商标保护。在全球范围内寻求商标保护可能成本高昂，因此你应该思考在哪些地区你最需要这些保护，然后将申请限定在这些区域。\n\
  \n在其他问题中，如果其他人已经在使用你计划使用的商标，你不仅可能得不到任何保护，甚至还可能侵犯了他们的商标。美国专利商标局维护着一个注册商标数据库。你可以使用商标电子检索系统免费搜索该数据库，但你应该聘请商标律师来帮助你解读结果并注册商标。你可以通过以下链接访问商标流程和搜索详情：\n\
  \n```\nhttp://www.uspto.gov/trademarks/\n```\n\n### 保护你的商业秘密\n\n在开发你的知识产权时，有些事情你可能不会向普通人透露。作为一名专业博主，Mark\
  \ 不会在他的个人博文中列出他的商业联系人，并且他有一些策略不会与所有人分享。这类事物受商业秘密法保护。\n\n特别是在美国法律下，“根据美国法典第 18 编第\
  \ 1839(3)(A)、(B)条(1996 年)的定义，商业秘密包含三个部分：(1)信息；(2)为保护该信息而采取的合理措施；(3)该信息因不公开而具有独立的经济价值。”商业秘密不像版权、商标或专利那样有固定的存续期限。但是，独立发现你秘密的第三方并不违反其规定。\n\
  \n\n\n正如您所见，如果您期望获得商业秘密法的保护，就必须采取合理措施来保护相关信息。例如，您需要为关键数据设置密码保护，并粉碎任何包含敏感信息的文件。如果有人为您工作或与您一同开发\
  \ Android 应用，他们必须了解将所有应用相关信息保存在私有驱动器和服务器上的重要性，并且要求他们签署保密合同（如保密协议（`NDA`））至关重要。\n\n\
  网上有许多`NDA`样本可供参考。您可以利用它们入门，但如同所有法律事务一样，您应该始终咨询律师，以解决针对您个人情况的任何法律问题。\n\n以下是一些供您查阅的样本：\n\
  \n```\nhttp://www.hbs.edu/entrepreneurship/pdf/Sample_NDA.pdf\nhttp://www.bitlaw.com/forms/nda.html\n\
  ```\n\n如果您的商业秘密被盗，并且您能向法庭证明您已做出合理努力来保密，那么您就有权获得不同的法律救济，包括禁令和损害赔偿金。\n\n## 专利\n\n\
  在讨论了版权法、专利法和商标法之后，现在我们进入专利部分。专利是发明的一份书面公开声明。作为公开披露（理论上丰富了世界的知识）的回报，发明人有权在一段时间内禁止他人制造、使用、销售、许诺销售或进口该发明主题。大多数\
  \ Android 开发者不太可能从申请自己的专利中受益，因为获取专利的成本极高。起诉其他公司侵权则更加昂贵；一场专利诉讼轻松就能达到七位数。一项普通专利在其有效期内很容易花费\
  \ 10,000 美元甚至更多。此外，很少有 Android 应用能够符合专利申请条件。\n\n如果您决定申请专利，请注意并非任何想法都能获得专利。任何“新颖且有用的流程、机器、制造物或物质组成，或对其任何新颖且有用的改进”都可能获得专利，但发明主题还必须具备新颖性和非显而易见性。专利审查员会将您的发明与现有发明（即现有技术）进行对比，以确定您的发明是否同时满足新颖性（新）和非显而易见性的要求。显然，如果您的想法已被发明，您就不应期望获得专利。此外，任何单独或组合起来会使您的发明变得显而易见的类似发明，也会阻碍专利性。一位优秀的专利律师（或一位糟糕的专利审查员！）可以帮助您的专利更容易通过审查。\n\
  \n在继续开发应用之前，您应该搜索以确认您的应用想法是否已存在（是否有现有技术？）。如果存在但未获得专利，那么您将无法获得专利。如果存在且*已经*获得专利，那么您尝试自己制作该应用就会侵犯专利权人的权利。一如既往，我们建议您联系律师；在专利方面，则需要联系专利律师。不过，简单的谷歌搜索是您自己查找现有技术的好方法。此外，谷歌可以通过以下链接专门搜索专利：\n\
  \n```\nhttp://www.google.com/?tbm=pts\n```\n\n假设您确信自己的应用符合新颖性和非显而易见性的要求。您也确信它带来的收益将远超过申请专利所需的\
  \ 10,000 多美元。一种对冲风险的方法是提交临时专利申请。这是一种法律程序，允许您向专利局发送一份您发明的基本描述，并利用该描述为您发明确立一个专利申请日。该流程对于小型实体仅需\
  \ 130 美元，但费用每年会变动。您有一个不可延长的 1 年期限，可以按正常费用提交正式专利申请。临时专利的优势在于，它允许您以低成本声明您的发明，然后您有一年时间来决定是否值得投入“真金白银”来确保您的专利权。临时专利还授予您使用“专利未决”（`patent\
  \ pending`）这一术语的权利，您在许多产品广告中都能看到它。如果您想知道它是什么意思，它仅仅是向竞争对手表明，针对您的产品和/或服务，有一份专利申请正在处理中。您可以通过以下网站在线提交临时专利申请：`https://efs.uspto.gov/efile/portal/efs-unregistered`。\n\
  \n## 许可\n\n在编写应用时，利用开源软件是很有诱惑力的。有大量免费软件库能实现各种神奇的功能。然而，其中大多数都遵循各种开源许可证进行授权。未能遵守这些许可证的条款可能会使您面临法律诉讼。例如，`Creative\
  \ Commons`许可明确禁止任何商业用途。`GPL`（通用公共许可证）在将您的非`GPL`软件与`GPL`库链接方面引发了许多法律歧义。有些人认为，虽然静态链接`GPL`库违反了许可证，但动态链接是可以的。相比之下，`LPGL`（宽松通用公共许可证）明确允许与非`LGPL`软件进行链接。以上仅仅是许可条款的几个例子。简而言之，您在使用某款免费软件之前，应该研究其许可证。\n\
  \n许多专利发明也可以进行许可。在软件领域，需要许可的技术包括`MPEG`、`MP3`和`Dolby Digital`。在许多情况下，手机（或平板电脑）制造商已经协商了这类许可，但如果您发现自己在使用一个\
  \ Android SDK 中未包含的标准，您可能需要仔细核实以避免麻烦。您可以通过以下链接找到常见许可标准的列表：\n\n```\nhttp://www.musemagic.com/papers/licensinginfo.html\n\
  ```\n\n此外，如果您发现有人已经为您打算实现为应用的确切想法申请了专利，那么在放弃之前联系他们可能是值得的。发明者通常有兴趣许可他们的想法，并希望有人能出于这个目的联系他们。\n\
  \n## 总结\n\n\n\n"
- '# 排版后的文本


  尽管你可能不想为法律问题操心，只想专注于编写、营销和销售软件的具体细节，但提前投入一点时间来避免未来的大麻烦是值得的。你可能已经注意到，我们讨论的一些主题如果有了外部资金支持会更有意义。特别是，注册成立为
  C 类公司、寻找风险投资律师事务所、以及考虑申请专利，这些通常更适合资金充裕的企业。然而，即使是规模较小的创业公司，也至少应该花点时间找一位当地律师，协助处理公司组建事宜。即使你认为以独资企业形式继续经营是合理的，也通常可以与律师进行简短的免费讨论来确保无误。就算对于规模一般的创业公司，花点时间考虑你的应用是否需要最终用户许可协议或隐私政策也是个好主意。当然，如果你认为自己可能侵犯了他人的知识产权，那么从一开始你就面临一个大问题。简而言之，在起步阶段做好功课，你就能自信地推进其他业务规划！


  以下是潜在法律问题的检查清单。请记住，我们建议你在做出任何商业决策前咨询律师。


  *   你是否已完成公司注册或通过其他方式降低个人责任风险？

  *   你是否已开始考虑你的`EULA`和/或隐私政策？

  *   你是否侵犯了他人的版权、商标或专利？如果是，能否获得许可？

  *   你是否遵循了良好的隐私实践，包括要求你的开发者和合作伙伴签署`NDA`，并制定保护所有个人信息的计划？


  '
- '# 第四章：Android 开发简介


  至此，你已经看到 Android 应用营销的混乱中是有章可循的。第 2 章讨论了如何构思那个百万美元的点子，第 3 章则涵盖了一些法律细节。本章将带你了解实际创建
  Android 应用的第一步。


  如果你是一位经验丰富的程序员，可能会觉得本章内容过于基础，更像是复习回顾。如果是这样，不妨快速浏览后继续阅读后续专注于 Android 应用营销的章节。


  如果你是初次接触开发的程序员，则应仔细阅读本章以理解相关概念。我们编写本书是为了让每个人都能在当前的 Android 市场上获得成功，因此在为你的应用编写第一行代码之前尽可能多学习将大有裨益。


  如果你刚开始为 Android 编写应用，可能会发现大量专业术语充斥其中，在这片缩写词的海洋中导航可能困难重重。尽管我们无法在一章内教你如何编写 Android
  应用，但我们可以提供一份非常宏观的概述，希望这能为你自行深入学习提供指引。


  ### 作为开发者的第一步


  如果你刚开始成为 Android 开发者，你需要 Android 开发者工具（`ADT`）包。你还需要 Java 开发工具包（`JDK`）才能使用`ADT`，因为
  Eclipse 集成开发环境（`IDE`）是用 Java 编写的。如果你的电脑上尚未安装`JDK`，应在安装`ADT`之前先安装它。你可以从 Oracle 网站下载`JDK`：`http://www.oracle.com/technetwork/java/javase/downloads/index.html`


  安装标准 Java `JDK`后，你可以从 Android 软件开发工具包（`SDK`）网站安装 Android `ADT`包。该包几乎包含了开始使用`SDK`和
  Eclipse IDE 所需的一切。它还包含其他开发工具，例如可用于模拟 Android 设备进行测试的模拟器。`ADT`还包括 Android 应用程序编程接口（`API`）的文档、Android
  平台的源代码，以及演示如何使用许多`API`元素的示例。只需一键点击，即可下载所需的一切：`http://developer.android.com/sdk/index.html`


  `ADT`包支持 Windows（提供 32 位和 64 位选项），但也提供适用于 Ubuntu Linux（8.04 或更高版本）和 Mac OS X（10.5.8
  或更高版本）的其他包。适合你的操作系统（`OS`）的包应会作为默认选项显示。


  安装`ADT`包后，我们建议你浏览 Android 的在线开发者资源。获取 Android 信息的最佳途径是官方一手资料：`http://developer.android.com/index.html`


  花些时间四处浏览。关于 Android 设计、开发和分发所需了解的一切都在该网站上。如果感到困惑，可以回到本章。我们的目标是为你提供一些基本方向，但在线材料更为详尽。


  如果你需要特定于 Android 应用的信息，以下链接也很有帮助：`http://developer.android.com/guide/components/fundamentals.html`


  安装 Android `ADT`包后，你可以查看一份很棒的应用开发入门指南：`http://developer.android.com/training/index.html`


  ### 集成开发环境（IDE）


  作家倾向于使用文字处理器写作；开发者则倾向于使用 IDE 编码。`IDE`是一种应用程序，与文字处理器有些相似，它使你能够查看和修改源代码。源代码通常采用颜色编码，以突出显示关键字和语法。此外，IDE
  会在你编写代码时检查语法（结构），并与编译器和调试器等开发工具集成（因此得名）。IDE 拥有许多非常有用的功能，使编写软件变得更容易、更愉快。


  Eclipse 是一个著名的开源 IDE，主要用 Java 编写，并围绕插件理念构建。Eclipse 几乎拥有适用于所有功能的插件，包括多种编程语言的开发、调试和版本控制。尽管这与
  Android 开发没有直接关系（就像知道如何使用文字处理器与写作没有直接关系一样），但它非常强大，值得了解。你可以在此处了解更多信息：`http://help.eclipse.org`


  Android 提供了一个非常适合开发 Android 应用的 Eclipse 插件。`ADT`插件将你的 Eclipse 工作区定制为适用于 Android。它包含引导式项目设置、Android
  配置文件的专用编辑器、调试输出等功能。它能完成你所需的一切，甚至包括创建可上传到 Google Play 和其他市场的发布包。


  或者，你可以使用商业 IDE，如 JetBrains 的 IntelliJ IDEA。IntelliJ 有免费的社区版和商业的终极版。一些开发者对终极版推崇备至，认为其拥有卓越的代码索引功能，从而带来更好的代码补全、重构和导航体验。IntelliJ
  也支持插件，使其成为 Android 开发的良好选择。你可以在此处了解更多关于使用 IntelliJ IDEA 进行 Android 开发的信息：`http://www.jetbrains.com/idea/features/android.html`


  ### Android 操作系统的优势


  如第 1 章所述，Android 是一个基于 Linux 的操作系统，依赖 Java 来简化软件开发。它还大量使用可扩展标记语言（`XML`）来进一步简化编码任务。




  Android 基于 Linux 开源操作系统内核。由于 Linux 使用 C 语言和汇编语言编写，因此您可以使用操作系统的“原生”语言开发部分应用程序。Android
  原生开发套件（NDK）为开发者提供了这一能力。请注意，通常没有必要使用 C 或 C++ 进行原生应用开发，除非特定的性能问题要求这样做。在其他问题中，C/C++
  开发依赖于底层硬件，因此如果使用 C/C++ 元素，您的应用将无法保证可移植性。


  将应用中的软件与底层硬件连接起来的软件库统称为应用程序编程接口（API）。Java API 用于与所有设备硬件进行交互。典型的智能手机拥有相当多的硬件需要支持。当然，还有多点触控用户界面功能，如滑动、轻点和捏合。内部硬件设备和传感器，如加速度计（用于检测手机运动和旋转），由操作系统直接支持。摄像头、GPS、麦克风以及现代手机提供的几乎所有其他功能都可以通过
  Java API 访问。


  作为移动操作系统，Android 从设计之初就致力于最小化功耗。这一点体现在用于管理多个应用程序的技术中。当前未使用的应用程序会被挂起——它们会在后台等待，直到再次被需要。这意味着通常只有当前应用会消耗电池电量。这也意味着没有理由关闭应用。用户可以简单地开始使用新应用，而被挂起的应用会等待，直到再次被需要。如果内存不足，Android
  会删除那些用户最不可能用到的应用（那些使用频率最低的应用）。这种管理应用程序的方式与桌面操作系统的工作方式截然不同。我们在本章后面讨论应用生命周期时会进行更详细的介绍。


  在 Android 中，新应用通常通过在线连接到 Google Play 商店进行安装。用户可以通过 Google Play 应用搜索和浏览新应用。如果用户选择安装新应用，他们会被告知该应用需要访问的所有资源。例如，它可能需要访问用户的电话簿联系人或手机的位置信息。因此，用户在下载应用之前会被告知其影响。虽然并非万无一失，但此过程为防范恶意开发者提供了一定的保护。


  应用下载到设备后，Android 的安全模型能进一步保护用户免受恶意应用的侵害。每个应用都在自己的*沙箱*中运行，这意味着应用对系统资源的访问权限有限，并且其通过意外错误或故意恶意攻击对用户造成伤害的能力也受到限制。


  在实践中，安全沙箱通过多种措施实现。Android 的核心是 Linux，而 Linux 支持多用户。Android 将这种支持扩展到应用。正如一个用户在访问其他用户数据时受到限制一样，Android
  中的应用也是如此。从技术角度讲，每个应用都在自己的进程中运行。对于用 Java 编写的应用，每个应用也在自己的 Dalvik 虚拟机实例中运行。我们将在本章后面详细解释
  Dalvik，但现在您应该知道，它阻止了应用之间在没有专门设计的消息传递的情况下相互交互。安全沙箱还有许多其他技术方面，但关键在于 Android 实现了最小权限原则：应用只能访问其所需的系统资源——而且仅此而已。


  ## Java 语言


  Java 是移动应用开发的合理选择。根据 `langpop.com` 的数据，它是世界上第二流行的计算机语言，这意味着许多开发者已经熟悉它，并且存在庞大的软件开发资源基础设施。


  从某种意义上说，Android 使用 Java，因为为 Android 编写的代码遵循所有 Java 语法要求。然而，Android 版本的 Java 无论在执行方式还是支持的库方面，都与
  Oracle 的标准 Java 版本有显著不同。我们将在下一节讨论这些差异，但首先让我们谈谈所有 Java 变体共同的特性。


  即使您对 Java 一无所知，任何程序员学习它都相对容易。其语法类似于 C、C++、C# 和 Objective C。如果您了解这些语言中的任何一种，并理解面向对象编程（OOP）的基础知识，那么您将比其他初学者拥有更大的优势。


  Java 的一个显著特点是在虚拟机内执行。与 C 或 C++ 等传统编译语言不同，只要为特定平台编写了 Java 虚拟机，相同的 Java 二进制文件（由 Java
  字节码组成）就可以在任何硬件平台上运行。这使得 Java 代码具有极高的可移植性。


  与许多现代编程语言一样，Java 是面向对象的。因此，作为开发者，您应该将软件编写为一系列相互交互的对象，每个对象解决一个特定问题。面向对象范式鼓励良好的编码实践，并使您的软件易于重用。正如您所料，Android
  API 积极支持并推广这种开发风格。


  与 C、C++ 和 Objective C 不同，Java 自动在后台管理计算机的内存（仅带来轻微的性能损失），因此您无需记住删除不再使用的数据结构。实际上，Java
  不要求程序员操作指针，而这在许多低级语言中很常见。对于任何曾与指针和内存泄漏作斗争的开发者（包括 Roy）来说，这是一个可喜的变化，无疑会减少开发和调试时间。


  Java 的另一个优秀特性是反射：程序可以在运行时查看自身的软件对象并修改它们。这有点像对自己进行操作，但唯一痛苦的是它可能会让您头晕目眩。反射对作为开发者的您有许多实际好处。许多测试框架（如
  JUnit，在后续章节中讨论）使用反射来提供对所测试代码的更高智能。


  反射好处的另一个有力例子可以在 Eclipse 中找到。使用反射，Eclipse 环境可以在您编写代码时理解它。因此，它可以实时指出代码中的错误。


  Java 功能齐全。一套全面的 API 意味着您可能需要的几乎所有数据结构或软件框架都可以随时获得。在许多情况下，非 Android 的 Java 软件包可以简单地作为预构建包（称为
  Java 存档（JAR）文件）放入您的开发环境中。


  尽管我们可以用整本书来学习 Java，但我们不会这样做，因为我们的出版商已经在销售这些书了。以下是一些很好的起点：


  *   *为 Android 开发学习 Java*，Jeff Friesen 著（Apress，2013）

  *   *使用 Eclipse 开发 Android 应用*，Onur Cinar 著（Apress，2012）

  *   *Android 秘籍：问题解决法*，Dave Smith 和 Jeff Friesen 著（Apress，2012）


  许多免费的在线资源只需点击几下鼠标即可获得，包括 `http://www.oracle.com/technetwork/java/index-jsp-135888.html`
  和 `http://mobile.tutsplus.com/tutorials/android/java-tutorial/`。


  ### Android 上 Java 的特殊性




  ### Android 与传统 Java 的差异


  Android 以其自有的虚拟机 `Dalvik` 而闻名。传统上，Java 使用 Java 虚拟机（`JVM`）执行 `.class` 文件。`Dalvik`
  将 `.class` 文件转换为 Dalvik 可执行文件（`DEX`）。`Dalvik` 针对低内存需求进行了优化，并在许多方面与传统 JVM（例如 Oracle
  支持的 JVM）有所不同。幸运的是，由于 Android 构建工具会自动将非 Android 的 `.class` 文件转换为与 Dalvik 兼容的可执行文件，这些差异对开发者来说基本不可见。


  不幸的是，熟悉传统 Java 的开发者会遇到一些实际差异。Android 使用其自己的图形用户界面（`GUI`）库。Java 标准版（`SE`）提供了 `Swing
  GUI`，这是主要的 Java GUI 组件工具包，但在 Android 上完全不受支持。任何 `Swing` 代码都需要完全重写。但 Android 的 GUI
  确实有实际的好处。通过高度依赖 XML 定义，Android 简化了 GUI 设计，并促进了更易读的界面。


  Android 大量使用 `XML`，这是一种设计为人类和机器都能理解的文本格式。作为开发者，每当你在文本文件中向操作系统传递标准信息时，你都在使用 XML。除了在
  GUI 设计中使用外，XML 文件还可以存储你的应用程序使用的文本字符串。虽然不将文本字符串存储在 XML 中也能应付，但这样做的好处值得付出一点努力。


  一个编写良好的 Android 应用会将其字符串存储在位于 `/res/values` 目录中的 XML 文件中。XML 格式包含标识符，让操作系统知道文件中包含字符串文本数据。每当你在应用程序中需要访问一个字符串时，可以通过标识符
  `R.string.*string_name*` 在代码中引用它。这不仅提高了代码的可读性，还允许 Android 工具自动国际化你的应用程序。


  在你发布应用之前，Android 工具可以自动翻译你的 `/res/values/strings.xml` 文件。它会被自动翻译成不同的语言，以便世界各地的用户可以用他们的母语使用你的应用。当然，翻译可能不完美，因此在大多数情况下，你需要找人检查每项翻译并清理任何问题。此外，你需要将翻译后的文件复制到一系列目录中，每种你计划支持的语言对应一个目录。例如，法语翻译可以放在名为
  `values-fr` 的目录中。花点额外的功夫也不算太差，对吧？你可以在以下网址了解更多关于自动翻译的信息：`http://googledevelopers.blogspot.com/2012/03/localize-your-apps-and-content-more.html`


  我们提到字符串 XML 文件存储在 `/res/values` 目录中。`res` 代表 `resources`（资源），这是 Android 中一个非常强大的概念。Android
  大量使用资源文件，并将其与 Java 紧密集成。你刚刚看到了如何通过标识符在代码中访问资源文件字符串。类似地，可绘制资源（如图标和图像）也可以通过 Java 以编程方式访问。用于
  GUI 布局的 XML 文件也是资源。最后，诸如声音样本之类的任意文件也可以作为资源访问。


  Android API 与传统 Java 使用的 API 之间还有许多其他差异。值得注意的是，以下原本属于 Java 2 平台标准版的包是缺失的：


  *   `java.applet`

  *   `java.awt`

  *   `java.beans`

  *   `java.lang.management`

  *   `java.rmi`

  *   `javax.accessibility`

  *   `javax.activity`

  *   `javax.imageio`

  *   `javax.management`

  *   `javax.naming`

  *   `javax.print`

  *   `javax.rmi`

  *   `javax.security.auth.kerberos`

  *   `javax.security.auth.spi`

  *   `javax.security.sasl`

  *   `javax.swing`

  *   `javax.transaction`

  *   `javax.xml`（除了 `javax.xml.parsers`）

  *   `org.ietf.*`

  *   `org.omg.*`

  *   `org.w3c.dom.*`（子包）


  此外，还包含了以下第三方包：


  *   `org.apache.commons.codec`：编码和解码工具

  *   `org.apache.commons.httpclient`：HTTP 认证、Cookie、方法和协议

  *   `org.bluez`：蓝牙支持

  *   `org.json`：JavaScript 对象表示法（JSON）


  整个 Android API 的详细描述可以在 Google 的 `developer.android.com` 网站上找到：`http://developer.android.com/reference/android/package-summary.html`


  ### 应用生命周期


  当你从传统 Java 编程背景转来时，会遇到的最大差异就是 Android 应用生命周期。如果你有开发个人计算机应用程序的背景，Android 应用生命周期将是一种全新的体验。


  在 Android 从 Google Play 下载应用程序之前，它会先收集一些关于该应用的信息。这些信息存储在一个名为 `AndroidManifest.xml`
  的 XML 文件中。这个文件**必须**位于你的应用程序的根目录中。清单文件包含关于应用程序包名和名称、其组件、应用程序需要的权限、运行应用程序所需的最低 Android
  API 级别以及应用程序需要访问的软件库的信息。


  Google Play 使用此信息来决定是否可以向最终用户展示应用程序。例如，如果你的手机不支持应用程序所需的最低 API 级别，那么你在搜索时将看不到该应用。


  如果你可以下载该应用，清单文件还会规定应用的运行方式。一个应用程序由四个基本的构建块组成，称为应用组件。可能的组件有 `Activity`、`Service`、`Content
  Provider` 和 `Broadcast Receiver`。


  以下是这些构建块的简要说明：


  *   `Activity` 是一段代码，输出一个单独的屏幕。如果你的应用有电话本和配置页面，它们是独立的 `Activity`。

  *   `Service` 为你的应用程序提供后台任务。例如，如果你的应用程序需要在非活跃状态下持续监听数据，你需要使用 `Service`。

  *   `Content Provider` 允许你的应用程序与其他应用程序共享数据。对于基本应用来说，可能不是必需的。

  *   `Broadcast Receiver` 让你的应用程序监听来自操作系统或其他应用程序的公告。例如，如果你的应用需要知道屏幕已从竖屏模式切换到横屏模式，你可以使用
  `Broadcast Receiver`。


  清单文件包含对你应用程序中所有应用组件的引用。通过清单文件，操作系统还可以确定在启动应用程序时应运行哪个应用的 `Activity` 组件。


  假设你启动了应用，并且操作系统确定一个名为“电话本”的 `Activity` 是应该最初启动的组件。每个 `Activity` 都遵循一个活动生命周期，以支持
  Android 的节电、始终可用的应用模型。


  即使是最基本的 Android 应用也遵循一个管理应用生命周期的 `Activity` 生命周期。再次强调，Android 应用的设计目标不是退出。操作系统决定应用何时被强制进入后台以及何时被停止。


  因此，与传统应用开发不同，你的应用程序没有“退出”或“关闭”选项。相反，你必须编写支持特定操作系统钩子的代码。这些钩子对于每个应用组件都不同，但 `Activity`
  组件是最常用且或许也是最复杂的。


  以下是 `Activity` 生命周期中的关键阶段，同样在图 4-1 中展示。


  ![9781430250074_Fig04-01.jpg](img/9781430250074_Fig04-01.jpg)


  图 4-1. Activity 的重要状态路径¹




  ### Android Activity 生命周期


  ### Activity 生命周期方法


  - `onCreate` : 当 Activity 首次创建时调用。Activity 在创建后可能会启动和停止，但这个阶段处理的是当前不在内存中且必须初始化的
  Activity。

  - `onStart` : 在`onCreate`之后立即调用，也在`onRestart`之后立即调用（参见后面的`onRestart`条目）。当应用程序对用户可见时，也会调用此方法。

  - `onResume` : 在`onStart`之后调用，此时 Activity 能够接受用户输入。

  - `onStop` : 当 Activity 不再可见（因为另一个 Activity 已在前台替换了它）时调用。操作系统现在可能选择删除应用程序当前使用的内存以回收系统内存。如果发生这种情况，如果再次调用应用程序，必须使用`onCreate`重新运行。

  - `onRestart` : 在 Activity 恢复时于`onStop`之后调用。

  - `onPause` : 当当前 Activity 被另一个 Activity 替换时调用。这是保存状态信息的地方，但必须快速完成以避免延迟。这不仅会延迟即将启动的应用程序，而且如果等待时间过长，还可能触发“应用程序无响应”（ANR）错误。存储持久数据并迅速退出。

  - `onDestroy` : 当 Activity 完成时调用。操作系统现在可能选择删除您的应用程序以节省内存。


  如您所见，这个过程对于新手来说可能相当复杂且令人困惑。我们建议您花时间研究生命周期图，并通过示例应用程序进行练习，以掌握这一基本概念。幸运的是，对于简单的应用程序，您只需要一个或两个
  Activity 组件。


  请注意，我们尚未讨论实际的“Application”组件。这是因为它并不存在。不过，确实有一个`Application`类对象，但它会在后台自动创建。只有当您需要跨多个应用程序组件跟踪全局信息时，才需要关注`Application`类。


  ### 应用程序部署


  Android 应用程序开发的主要优势之一是应用程序部署的便捷性和灵活性。如果您准备部署到市场，第 8 章将告诉您所需的一切。


  但使用市场只是分发应用程序的一种方式。特别是如果您的产品仍处于测试阶段，您可能希望通过电子邮件或网站上的受保护页面发布它。


  Android 应用程序会被开发环境自动打包为 Android 应用程序包（APK）文件。Android 使得通过电子邮件安装 APK 文件变得异常简单。如果您只是将
  APK 文件作为附件发送到电子邮件，收件人在安卓设备上的 Gmail 中打开该邮件时，会看到一个“安装”按钮。这个技巧在 Gmail 应用程序中有效（参见图 4-2）。当您通过浏览器访问
  Gmail 时，没有“安装”按钮，但应用程序可以毫无问题地下载和安装。


  ![9781430250074_Fig04-02.jpg](img/9781430250074_Fig04-02.jpg)


  图 4-2 通过 Gmail 发送的 APK 文件示例


  请注意，电子邮件的收件人可以自由地将电子邮件（以及您的应用程序）转发给他人。如果您的应用程序不打算公开披露，请确保收件人同意（书面形式）不分发您的 APK。关于保密协议的信息，请参阅第
  2 章。


  从您的网站上分发 Android 应用程序也非常简单。只需在您的网站上包含一个指向 APK 文件的链接。当用户从安卓设备点击该链接时，设备会提示他们安装应用程序。当然，您也可以将应用程序放在
  DropBox、Google Drive 或任何其他文件共享服务上。Android 操作系统知道 APK 文件是可以安装的应用程序，然后会相应地操作。


  但是请注意，Android 通过阻止来自未知来源的电子邮件和基于网页的分发来保护用户免受恶意应用程序的侵害。在用户安装您的应用程序之前，他们需要启用设备以允许安装来自
  Google Play 以外的应用程序。这很简单：在“设置”应用程序中，他们点击“应用程序”或“安全”，然后勾选“允许未知来源”选项。只需在电子邮件或网站上说明这一点即可。当然，用户在完成后禁用“未知来源”选项是最安全的。


  ### 这太复杂了！有更简单的方法吗？


  开发软件并非易事。软件开发人员收入丰厚，这并非没有道理。这些技能不是一夜之间就能学会的。但是，如果您不是程序员并且没有时间学习，这里有一些替代方案。这些选项对于复杂的应用程序没有帮助，但如果您的应用程序简单，它们可能能让您更快地上手。


  - **MIT App Inventor** 是一个拖放式的 Android 应用程序开发工具。它确实由 MIT 支持，并且是免费的。您可以在此了解更多信息：`http://appinventor.mit.edu/`


  - **Appnotch** 是另一个拖放式服务，允许您为 Android（和 iOS）开发应用程序。Appnotch Lite 的基本版本是免费的，但它也有付费版本——Appnotch
  Elite、Pro、Team 和 Enterprise：`http://www.appnotch.com/`


  - **Appery.io** 是另一个允许您为 Android（和 iOS 及 Windows Phone）开发应用程序的服务。Starter 版本是免费的，但
  Appery.io 也提供 Pro、Premium 和 Enterprise 版本：`http://appery.io`


  还有许多其他在线应用程序构建器。如果您选择这条路，我们建议您花一些时间在线探索。这是一个快速发展的领域，我们无法推荐某一个特定的解决方案是最好的。


  ## 总结


  如果您想学习 Android 编程，以下是一些您应该首先回答的问题：


  - 您是否已经设置好了 Android ADT？

  - 您是否了解 Java 编程的基础知识？

  - 您是否遵循了 Android 提供的在线教程？

  - 您是否了解 Android 应用程序生命周期？

  - 您是应该学习 Android 应用程序开发，还是最好将工作外包或使用应用程序构建器？如果您正在寻找 Android 开发人员，本书作者之一 Roy 很乐意提供帮助！


