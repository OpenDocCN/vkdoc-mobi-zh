  ## 关于作者


  ![image](img/9781430250074_unFM-04.jpg)


  **罗伊·桑德伯格**热衷商业与技术的融合。凭借管理工程和运营两方面的经验，他创立了多家公司。这些公司屡获殊荣的产品已销往全球，并受到多项已授权和正在申请的专利保护。


  罗伊在卡内基梅隆大学接受过电气工程和计算机科学教育，并以优异成绩从法学院毕业。他涉足过众多技术领域，包括运动控制、消费电子、电信、生物技术、专利法、机器人、辅助技术以及音乐技术。


  罗伊以 Sandberg Sound 品牌发布的 Android 应用，运用了尖端的信号处理技术来简化音乐人和 DJ 的工作。


  罗伊现居旧金山的 Haight-Ashbury 街区。他乐于听取读者和同行创业者的意见，请随时与他联系。


  ![image](img/9781430250074_unFM-02.jpg)


  **马克·罗林斯**于 1971 年出生于西雅图，就读于华盛顿州普尔曼的华盛顿州立大学，并于 1994 年获得英语学位。大学毕业后，他开始为大学生群体编写短剧。


  2005 年，在 Schweitzer Engineering Laboratories (SEL) 工作了一段时间后，马克决定追寻梦想，开始全职写作。


  马克曾为众多科技和小工具博客撰稿，包括 `screenhead.com`、`image-acquire.com`、`cybertheater.com`、`mobilewhack.com`、`carbuyersnotebook.com`、`gearlive.com`、`zmogo.com`、`gadgetell.com`、`gadgets-weblog.com`、`androidedge.com`
  和 `coolest-gadgets.com`。他还为视频游戏博客如 `gamertell.com` 和 `digitalbattle.com` 撰稿。


  2009 年，马克决定创建自己的科技和小工具博客，名为 `www.TheGeekChurch.com`。该博客旨在报道最新的科技动态，并告知教会群体（通常对技术不太精通）在事工中使用更多技术的益处。自
  2012 年以来，马克将全部时间投入到帮助其他科技企业成功上。


  马克目前与妻子和三个孩子住在华盛顿州的普尔曼。


