  \ 图 1-1）。\n\n![9781430250074_Fig01-01.jpg](img/9781430250074_Fig01-01.jpg)\n\n图\
  \ 1-1. Google Play 市场截图，显示了 Roy Sandberg 的应用\n\n### Android 与 iOS 对比\n\niPhone 首次亮相时，为消费电子产品建立了一种全新的商业模式。尽管\
  \ `史蒂夫·乔布斯` 及其在 `苹果` 的同事并非触摸屏的首创者，但他们成功地创建了一种兼具个性化与实用性的新型软件企业。苹果的“这个应用可以做到”这句口号向用户承诺，他们所需的移动软件随时随地都能方便地获取。它既适用于最聪明的工程师，也适用于最普通的消费者，并开创了一种新型的软件市场。从历史上看，`苹果\
  \ App Store` 在应用数量和下载量方面一直遥遥领先。然而，这种情况即将改变。`Google Play 应用市场` 在应用数量和下载量上几乎与苹果持平。截至\
  \ 2012 年 10 月，iOS 的下载量仅比 Android 多 10%。\n\n尽管 iOS 在总收入方面仍保持着可观的领先优势，但差距也在迅速缩小。如果趋势线按当前速度发展，到\
  \ 2014 年初，Android 可能会在总收入上超越 iOS。在不久的将来，我们可以预期 Android 将在应用总量、应用下载量以及应用收入方面全面领先。如果我们好赌的话，我们会把赌注押在\
  \ Android 上！\n\n#### Android 与 iOS 的区别\n\n作为开发者，您至少应该在某种程度上了解 Android 与 iOS 的区别。\n\
  \n苹果的 iOS 是专有操作系统，而 Android 是开源的，这使得用户有权通过获取源代码来研究、修改和改进其设计。Android 内部使用了 Linux\
  \ 内核。\n\nAndroid 开发者工具的一大优点是免费。这也是为什么该操作系统在智能手机和平板电脑上如此受欢迎，并且很可能在不久的将来在电视领域占据重要地位的原因之一。\n\
  \n\n\nAndroid 与苹果的另一区别在于，Android 对上传至 Google Play 的应用没有审核流程。用户注册后，上传和发布应用就变得相对简单。还记得我们之前提到\
  \ Android 市场充斥着大量应用吗？简化的审核流程确实意味着低质量的应用可能在市场中泛滥，这使得优质应用难以脱颖而出。另一方面，除了 Google Play，Android\
  \ 开发者还可以选择其他许多应用商店。其中不少商店的审核流程更为严格。例如，Roy 发现 SlideMe 商店的效果非常好——尽管该商店规模远小于 Google\
  \ Play，但目前为他的一款应用带来了超过 15% 的下载量。\n\nAndroid 应用主要用 Java 编写，而 Java 是一种非常知名的语言。在 `langpop.com`\
  \ 的计算机语言规范化对比中，Java 是最受欢迎的语言。开放标准意味着大量的开源资源。Java 是 Google Code 上第三受欢迎的语言（数据来源：`langpop.com`），这足以说明有多少新代码正在用\
  \ Java 编写。此外，Java 在所有智能手机操作系统中拥有最大的可寻址用户基础。它易于编写、测试和部署，并且能通过多个市场覆盖全球用户。Google Play\
  \ 和 Amazon Appstore 都是蓬勃发展的应用市场，我们将在后续讨论“将应用发布到市场”的章节中介绍其他市场。\n\nBlackBerry 应用是\
  \ Android 应用的一个新市场。将现有的 Android 应用（v.2.3.3 或更高版本，即将更新至 Jelly Bean 4.1）移植到 BlackBerry\
  \ 平台非常容易。\n\nAndroid 应用程序编程接口（API）文档完善，大多数用户能很快上手。相比之下，iOS 的学习曲线更为陡峭。iOS 应用通常使用\
  \ Objective C 编写，而该语言在 iOS 开发之外很少使用。相比之下，Java 非常知名，这使得现有 Java 开发者能轻松学习 Android 开发。\n\
  \n例如，Roy 在编写第一个应用前只掌握一些基本的 Java 知识，但他仅用几周时间就编写出了一个复杂的多线程应用。学习曲线中最大的挑战在于 Android\
  \ 应用生命周期——这与 PC 或服务器端 Java 编程截然不同。但一旦理解了这一生命周期，它就能促进代码复用，并让你能够利用其他开发者编写的应用功能。此外，Android\
  \ 应用生命周期还促进了能“与其他应用友好协作”的节能型应用的开发。\n\n但 Android 生态系统让应用开发变得容易的方面，并不仅限于编程流程。作为新手开发者，Roy\
  \ 还对其进入国际市场的便捷性印象深刻。他的第一款商业应用 Sandberg Sound BPM Detector 能让用户识别任何听到的歌曲的每分钟节拍数，全球的\
  \ DJ 和音乐家都在使用它。只需几次点击，Roy 就能将应用部署到全球。更令人惊叹的是，描述应用的文字会自动翻译成数十种语言。不懂英语的用户能看到以母语列出的\
  \ Roy 的应用，应用本身也能以用户母语显示文本。类似地，Android 生态系统还处理了国际银行业务和支付的后勤工作。一旦 Roy 以美元设定了应用价格，Android\
  \ 会自动建议世界各地对应本地货币的定价。即使他的应用在全世界 190 个国家/地区上架，购买收入也会以美元形式出现在他的银行账户中，无需他做任何干预。这就是\
  \ Android 的力量。\n\n免费第三方工具也让 Android 更易用，即使对非 Java 程序员也是如此。Scripting Layer for Android（SL4A）允许\
  \ Ruby、Python、Perl、JavaScript 以及其他多种解释型语言在 Android 设备上运行。这些语言能访问大部分 Android API，且不要求开发者遵循应用生命周期。如果你的应用最好以简单脚本的形式实现，这可能是一个选择。目前\
  \ SL4A 仍处于 Alpha 阶段，但已经开发多年。\n\n如果你是 Ruby 程序员，可以尝试 Ruboto（`www.ruboto.org`）。Ruboto\
  \ 使用 JRuby 编译器（将 Ruby 代码转换为 Java 虚拟机字节码）将 Ruby 语言代码转换为 Android 应用代码。由于 JRuby 支持即时（JIT）编译，Ruboto\
  \ 生成的 Ruby 代码运行速度相当快。\n\n因此，我们认为 Android 是更易于开发的平台。但别光听我们的一面之词。在 2013 年《开发者经济学》调查中，1200\
  \ 名同时为 iOS 和 Android 开发的应用开发者中，大多数人表示 Android 开发的学习曲线比 iOS 更平缓，且开发成本更低。\n\n### Android\
  \ 版本\n\nAndroid 起步缓慢，首款设备是 HTC Dream（也称为 T-Mobile G1）。此后，随着每个新版本的发布，Android 越来越受欢迎。在开始开发\
  \ Android 应用时，了解这些版本非常重要，因为新版本比旧版本包含更多功能。在编程层面，这些版本有明确的数字编号。我们将在讨论如何下载 Android SDK\
  \ 和 Eclipse 等开发工具时介绍具体编号。目前你只需知道，除了版本号，每个版本还有一个非正式的甜点名称。这一可爱传统始于版本 1.5。\n\n![9781430250074_Fig01-02.jpg](img/9781430250074_Fig01-02.jpg)\n\
  \n图 1-2\\. 各平台版本在 Android 生态系统中的占比\n\n以下是部分最新 Android 版本的简要总结：\n\n\n\n#### Android\
