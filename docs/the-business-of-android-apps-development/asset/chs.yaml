  \ 次！\n\n大多数成功的 `Android` 应用故事都耳熟能详。例如，`Rovio` 公司开发的 *愤怒的小鸟* 对 Android 用户免费，这款移动游戏巨头为公司带来了巨额资金。该游戏在\
