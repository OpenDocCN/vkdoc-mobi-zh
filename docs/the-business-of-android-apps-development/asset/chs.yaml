  \n从历史角度看，计算机是一项相对较新的发明。如今在各类商业领域都堪称巨头的计算机产业，其历史还不到一个世纪。二战期间开发的最早通用计算机——图灵巨人计算机——最初设计用于空气动力学计算。1947\
  \ 年贝尔实验室发明晶体管，1969 年德州仪器和仙童半导体开发出集成电路，这些突破帮助计算机在 20 世纪 50 年代和 60 年代取得了巨大进步。不久，IBM\
  \ System/360 成为标准的大型机构主机。英特尔联合创始人戈登·摩尔曾做出著名预测：集成电路上的元件数量大约每两年翻一番。摩尔的预测经受住了时间的考验，这个简洁的论断后来被称为\"\
  摩尔定律\"。由于集成电路能以更小的空间为用户执行更多计算，计算机变得越来越小。Z3 计算机曾是占据整栋楼的庞然大物，而这台巨型计算机的处理能力，与我们今天最简单的智能手机相比都微不足道。\n\
  \n经过几十年的技术发展，计算机变得足够小，可以放在家中或办公室的桌子上。很快，台式机的性能移植到了笔记本电脑上，计算机变得更轻、更薄，轻松地从办公桌转移到本地咖啡馆的\
  \ Wi-Fi 热点。\n\n随着计算机技术的进步，蜂窝电话技术也在发展，引发了一场手机革命。手机曾经只有富人才能负担得起的玩具，因为它们的价格高达数千美元。比如\
  \ 1983 年的摩托罗拉 DynaTAC 8000x，因其近两磅的重量成为用户的负担。曾有一段时间，手机重量成为制约因素，但在 90 年代，车载手机非常流行。幸运的是，1989\
  \ 年的摩托罗拉 MicroTAC 9800X 等手机轻到可以放入夹克口袋，而摩托罗拉 StarTAC 等机型则因其翻盖设计广受欢迎。\n\n接下来合乎逻辑的一步是在手机上添加更多功能，而不仅仅是通话和短信，手机很快变得\"\
