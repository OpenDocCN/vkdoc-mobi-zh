  \ BlackBerry 市场：`https://developer.blackberry.com/android/`\n\n## 总结\n\n- 你的应用准备好投放市场了吗？\n\
  - 你是否有至少三张能够解释应用精髓的精美屏幕截图？\n- 你是否有能够解释你的应用并吸引读者注意力的应用描述？\n- 你的图标和其他图形资源是否看起来专业并符合所有正确的格式要求？\n\
  - 你是否已决定哪个市场最适合你？或者你已决定使用多个市场？\n\n"
