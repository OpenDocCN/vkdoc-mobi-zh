  \n当用户搜索应用时，GetJar 会显示 2 行（约 15 个词）的描述。这前两行对于获得关注至关重要。屏幕截图和图标也是必需的。关于如何将应用上传到 GetJar\
  \ 的详细教程可以在这里找到：`http://blog.getjar.com/developer/tutorial-upload-your-app-to-getjar/`\n\
  \n当用户搜索应用时，Samsung App Store 不显示描述。屏幕截图和图标是必需的。你可以在此处了解如何将你的应用提交到三星：`http://developer.samsung.com/distribute/app-submission-guide`\n\
