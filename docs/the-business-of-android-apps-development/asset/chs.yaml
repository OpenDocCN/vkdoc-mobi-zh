  \    - 集成摄像机、相机和图库\n    - 语音搜索\n    - 语音拨号\n    - 书签\n    - 历史记录\n    - 联系人搜索\n\
  \    - WVGA 屏幕分辨率\n    - 配备 Google 逐向导航\n- **Version 2.0/2.1 (Éclair):**\n    -\
  \ 支持 HTML5 和 Exchange ActiveSync 2.5\n    - 速度提升\n    - Google Maps 3.1.2\n    -\
  \ 集成 MS Exchange 服务器\n    - 相机闪光灯\n    - 集成蓝牙 2.1\n    - 可选的虚拟键盘\n- **Version 2.2\
  \ (Froyo):**\n    - 屏幕支持 320dpi 和 720p 分辨率\n    - JIT 编译器\n    - 搭载 JavaScript Engine\
  \ version 8 的 Chrome 浏览器\n    - Wi-Fi 热点共享\n    - 蓝牙联系人共享\n    - 支持 Adobe Flash\
  \ 10.1\n    - 应用可安装到 SD 卡等可扩展存储\n- **Version 2.3 (Gingerbread):**\n    - 改进的游戏图形和音频效果\n\
  \    - 支持 SIP VoIP\n    - WXGA（超大屏幕尺寸和分辨率）\n    - 近场通信\n    - 复制粘贴功能\n    - 大型下载管理器\n\
  \    - 更好的应用控制\n    - 支持多个摄像头\n- **Version 3.0, 3.1, and 3.2 (Honeycomb):**\n  \
