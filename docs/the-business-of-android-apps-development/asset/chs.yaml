  \n如果您对安卓毫无经验，我们会尽力为您指引方向。每个人都是从零开始起步的，而在技术领域，这种情况屡见不鲜。很难想象，在撰写本书时，\"移动应用\"这个概念问世还不到十年。十年前，如果您谈论\"\
  应用\"这个词，人们可能都不确定您指的是什么。\n\n## 智能手机革命\n\n想想您日常做的所有事情——在公交车上查收邮件、在等待下一个预约时上网冲浪、运行最新的应用程序——您很可能会认同，智能手机已成为我们日常生活的一部分。我们确信，那些\
