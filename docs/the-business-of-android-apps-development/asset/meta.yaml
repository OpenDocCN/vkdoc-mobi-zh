- - '###'
  - Google Play 商店 对比 亚马逊应用商店
- - '####'
  - 无论是 Google 还是亚马逊，都不允许你使用应用内结算来销售实体产品、个人服务或任何需要实物交付的商品。要实现这一点，你需要搭建自己的商店。例如，你可以将应用链接到你用
    `http://www.shopify.com` 或类似服务商创建的在线商店。这并不困难；只需在应用内链接到你的商店即可。或者，你也可以将 PayPal SDK
    集成到应用中。更多相关信息可参考这里：`http://androiddevelopement.blogspot.co.il/2011/04/adding-paypal-payment-in-android.html`
