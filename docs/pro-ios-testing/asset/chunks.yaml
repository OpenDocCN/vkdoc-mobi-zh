    ### 验证失败


    假设我们在应用的某个特定屏幕进行了一些 UI 重新设计，改变了特定的字体大小。而我们没有意识到的是，我们破坏了 CityWeather 屏幕。


    让我们看看运行快照测试时会发生什么（参见图 9-7）。


    ![../images/496602_1_En_9_Chapter/496602_1_En_9_Fig7_HTML.jpg](img/496602_1_En_9_Fig7_HTML.jpg)


    图 9-7


    快照测试中的回归问题


    验证功能检测到 UI 已更改并导致测试失败。


    现在，测试中至关重要的一点是能够识别失败的原因。


    回到方案编辑器中，我们之前必须定义一个名为 `IMAGE_DIFF_DIR` 的变量。这是一个可选变量，包含在失败情况下用于存储差异文件夹的路径。


    现在让我们回到文件系统查看（图 9-8）。


    ![../images/496602_1_En_9_Chapter/496602_1_En_9_Fig8_HTML.jpg](img/496602_1_En_9_Fig8_HTML.jpg)


    图 9-8


    失败时生成的 FailureDiffs 文件夹


    我们看到有三张图片：


    *   `Reference`_<测试函数名> - 这是我们最初在记录模式下运行测试时创建的快照文件。

    *   `Failed`_<测试函数名> - 这是失败的最新快照。这张图片与参考 UI 不同。

    *   `Diff`_<测试函数名> - 这是此处最重要的文件。这是一张只显示两张图片之间像素差异的图像。


    让我们打开这三个文件（图 9-9）。


    ![../images/496602_1_En_9_Chapter/496602_1_En_9_Fig9_HTML.jpg](img/496602_1_En_9_Fig9_HTML.jpg)


    图 9-9


    FBSnapshotTestCase 为我们生成的三张图片


    乍一看，参考快照和失败快照似乎是相同的——这种细微差别很容易被我们忽略。但差异图像揭示了真相——我们可以看到温度的字体大小增加了。差异图像仅显示该变化，因此我们可以直接聚焦于变化点。


    ### 快照测试配置


    快照测试最棒之处在于其简单性——只需两行代码，我们就能创建一个快照测试，检测那些我们乍一看几乎无法察觉的变化。


    但这并不意味着我们不能根据需求来调整和定制测试。


    #### 包含设备信息


    默认情况下，生成的快照文件名仅由测试方法名组成，例如：


    ```

    testSnapshotMainScreen@2x.png

    ```


    当然，这意味着如果我们想在不同的设备和操作系统版本上检查视图，这可能会成为问题。


    幸运的是，`FBSnapshotTestCase` 类有一个名为 `fileNameOptions` 的属性，可以让你配置文件名：


    ```

    override func setUp() {

    super.setUp()

    self.recordMode = true

    self.fileNameOptions = [.device, .OS ,.screenSize]

    }

    ```


    现在，当在 iOS 13 的 iPhone 11 模拟器上运行时，生成的文件名是：


    ```

    testSnapshotMainScreen_iPhone_13_6_414x896.png

    ```


    我个人认为这非常方便，尤其是在测试全屏视图时，不同设备间的安全区域空间可能存在显著差异。


    #### 控制变化的容忍度及其他


    在我上一个例子中，我们看到一个小小的改动就导致了测试失败。这可能很棒——这些回归有时很难被发现。唯一的问题是“我们在乎的程度有多大？”我们知道我们的改动可能会导致这里或那里的回归，但有时我们只希望差异达到某个程度时才让测试失败。


    如果你需要对快照测试有更多控制，可以使用 `snapshotVerifyViewOrLayer` 函数。


    这个函数有一些有趣的参数：


    *   `viewOrLayer` - 你可以传递一个视图（`UIView`）或一个核心动画图层（`CALayer`）。

    *   `Identifier` - 为什么需要标识符？嗯，你知道我们的视图通常是动态的，意味着我们可以配置它们来显示不同的数据或状态。你给快照的标识符也会添加到快照文件名中。这意味着你可以在不同状态下测试你的屏幕/视图，并为每个状态保留参考图像。这听起来像是可选的，但我发现这个选项极其有用。

    *   `Suffixes` - 在这里，你可以为测试文件夹添加一个后缀。

    *   `perPixelTolerance` - 一个浮点数，表示对像素 RGB 变化的容忍度。“0”表示任何改变都不可接受，“1”表示所有改变都可接受。

    *   `overallTolerance` - 这是对变化（包括颜色和像素位置）的总容忍度。

    *   `defaultReferenceDirectory` - 如果你没有在方案中定义参考目录，可以在这里定义。

    *   `defaultImageDiffDirectory` - 同上。你可以直接从快照断言函数中定义差异目录。


    让我们看看如何使用它：


    ```

    func testSnapshotMainScreen() {

    let controller = CityWeatherViewController(nibName: "CityWeatherViewController",
    bundle: nil)

    controller.city = "New York"

    let result = snapshotVerifyViewOrLayer(controller.view.layer, identifier: "NewYork",
    suffixes: ["cities"], overallTolerance: 0.1, defaultReferenceDirectory: nil, defaultImageDiffDirectory:
    nil)

    XCTAssertEqual(result, "")

    }

    ```


    如你所见，目录参数不是必需的，如果已在方案中定义，你只需传递 nil。


    ## 总结


    快照测试是快速编写涉及大块或序列化数据的测试的好方法。但在 UI 快照测试方面，它真正大放异彩。


    我的建议是走简单的路。它易于设置和维护，但一如既往，过多使用可能会在未来给你带来大麻烦。事实上，一些开发人员从根本上就忽略快照测试。


    # 10. 在日常工作中实施测试


    > *再多的测试也无法证明软件是正确的，但一个测试就足以证明软件是错的。*

    >

    > ——Amir Ghahrai


    ## 引言


    我们讨论了许多类型的测试——单元测试、集成测试、性能测试、UI 测试和快照测试。但如果你问我编写测试最具挑战性的任务是什么，我会说实际上是编写它们本身。


    作为一名开发者并不容易。我们的日程表充满了压力——截止日期、bug、要阅读的文档、会议，我们中的一些人还有坐在我们头上生气的老板。最终，我们总有很多借口来说明为什么现在没时间写测试。


    编写正确的测试，筛选出重要的测试，并决定测试的重点，这些是我们作为 iOS 开发者必须应对的另一个挑战。


    在本章中，你将学习：

    1.  如何将测试编写作为开发流程的一部分

    2.  如何构建单元测试、集成测试和 UI 测试的良好组合

    3.  如何编写测试场景

    4.  什么是“代码覆盖率”以及如何在 Xcode 中管理它


    ## 我们如何开始？


    要解决这个问题，我们需要理解需要遵循的关键原则。


    ### 测试是开发任务的一部分


    虽然许多开发者倾向于将编写测试留到开发周期的末尾，但这是一个严重的错误。首先，在大多数情况下，我们的开发任务会遇到困难，我们需要放弃一些东西才能按时完成我们的功能。还有什么比放弃编写测试更舒服的呢？我们“知道”我们的应用运行良好；反正我们有
    QA 环节，而且我们确实有截止日期。


    我们需要理解，编写测试是开发本身不可分割的一部分。写了一个复杂的函数吗？我们为它编写一个单元测试以确保我们的代码正常工作。当我们将其推迟到开发会议结束时，实际上是在说“如果一切按计划进行，我会有时间写测试的。”
    很可能会事与愿违。

    '
- fmt: '### 需要决定测试什么


    不要测试所有东西。不仅实现全面覆盖效率低下，长远来看还会增加维护成本。你不仅要理解每个测试的收益，还要理解**其代价**。


    针对不同的目的使用不同的测试技术（单元测试、集成测试等）。如果你的类中包含复杂的代码，就用单元测试对其进行深入覆盖。但如果代码像这样：


    ```

    func onSaveButtonTapped()  {

    interactor.saveToFile()

    }

    ```


    就没必要用单元测试覆盖它。直接跳过即可。


    ### 修复了 Bug？编写一个测试


    这一点与上述内容一脉相承。我们无法预知将会遇到什么问题以及会碰到哪些 bug（否则我们一开始就会处理它们了）。


    一个很棒的技巧是**为我们发现的每一个 bug 编写一个测试**。当我们遇到一个 bug 时，这很好地表明了我们的代码中存在一个覆盖不足但很重要的区域。在这种情况下，最好采用
    TDD（测试驱动开发）方法，**在**修复 bug **之前**编写测试。


    ## 测试组合


    既然我们已经理解了**何时**编写测试，接下来需要理解**编写什么**测试。单元测试很容易编写。我们应该多写单元测试吗？还是应该继续编写 UI 测试，尝试自动化最终用户体验？


    这不是一个简单的问题。这取决于你的团队资源、项目结构，甚至你的应用业务模型。不过，仍然有一些我们可以遵循的方法论，我们称之为“测试金字塔”。


    ## 测试金字塔


    每种类型的测试对我们日常工作都有不同的影响。例如，UI 测试成本高昂。它们可以检查用户交互，有时甚至是端到端场景，但它们构建和维护起来很困难，并且运行时间很长。另一方面，单元测试运行非常快，并且能在更接近代码的地方发现问题，但它们无法从用户的角度告诉你应用的任何情况，也无法测试你的应用流程，甚至无法测试你的各个部分如何协同工作。决定在何处投入更多时间和精力的策略对我们的工作至关重要。Mike
    Cohn 在他的书《*Succeeding with Agile*》中将这一策略描述为“测试自动化金字塔”，或简称为“测试金字塔”。测试金字塔是一种直观的方式来描述测试自动化套件的组合，它在开发工作量与效率之间取得了平衡。


    ### 经典金字塔


    被认为是最佳实践且最著名的金字塔是经典金字塔。当“我们需要做何种测试组合”的问题出现时，你很可能看到的就是这个传统的金字塔（见图 [10-1](#496602_1_En_10_Chapter.xhtml#Fig1)）。


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig1_HTML.jpg](images/496602_1_En_10_Chapter/496602_1_En_10_Fig1_HTML.jpg)


    图 10-1

    经典金字塔


    根据“经典测试金字塔”，我们应该编写尽可能多的单元测试。我们还应该编写集成测试，但要比单元测试少，而编写端到端（UI 测试）则更少。如前所述，其目的是在速度和有效性之间取得平衡。另一个原因是，我们希望在较低层次更接近代码的地方捕获
    bug 和缺陷，而这通过单元测试更容易实现。


    当我们向上移动到金字塔时，我们逐渐远离代码，更接近用户。此外，由于 UI 和 API 的变化比逻辑函数更频繁，当我们向上移动时，我们会发现自己在维护这些层次上投入更多的精力。


    ### 冰淇淋甜筒模型


    **冰淇淋甜筒**模型被认为是一种反模式，但在特定的开发团队中是可以接受的。在这种模型中，金字塔是颠倒的（图 [10-2](#496602_1_En_10_Chapter.xhtml#Fig2)）。


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig2_HTML.jpg](images/496602_1_En_10_Chapter/496602_1_En_10_Fig2_HTML.jpg)


    图 10-2

    冰淇淋甜筒模式


    冰淇淋甜筒模式越来越不受欢迎。然而，仍然有公司采用这种模式，主要是有资源维护这个庞然大物的大公司或用户流程简单的公司。冰淇淋甜筒模式非常关注 GUI 和端到端测试。在大多数情况下，你会发现不同的团队负责不同类型的测试，而开发团队和产品团队之间没有任何协作或同步。


    由于 UI 测试覆盖端到端场景，意味着更接近用户，因此有一种假设认为，我们创建的 UI 测试越多，测试套件就越有效。


    但这种反模式存在几个问题：


    *   **构建难度更大**。构建一个 UI 测试场景需要准备 UI 元素并花费大量时间创建流程。此外，验证你的测试是否按预期运行也需要相当多的时间。

    *   **UI 测试运行时间长**。每个测试很容易花费 10 秒甚至更长时间，具体取决于应用和场景；而单元测试在最坏的情况下也只需不到 0.1 秒。集成测试在服务器或网络前运行时也可能花费相当多的时间。当你运行一个包含许多
    UI 和集成测试的测试套件时，你需要考虑到这些测试可能需要 30 分钟以上的时间才能运行，这在持续集成环境中可能是个问题。

    *   **修复和维护难度更大**。发现问题固然好，但当你在远离代码的地方捕获一个 bug 时，修复起来就更困难。当单元测试失败时，你可以准确地定位到损坏的方法。此外，UI
    的每一次更改都要求我们同时修改 UI 测试；否则，长时间运行的测试套件就会崩溃。


    然而，有几种方法可以避免冰淇淋甜筒模式：


    *   **协作** —— 确保不同的团队成员（开发人员、质量保证和自动化团队）保持同步。尝试“结对测试”，鼓励团队成员在测试内容和方式上保持一致。关注更有效的“启动会议”，确保每个人对功能或任务都清晰明了。

    *   **优先考虑单元测试** —— 单元测试运行速度快且易于维护。如前所述，我们需要更接近代码地测试应用是有原因的 —— 更接近代码意味着修复起来更容易。单元测试允许我们专注于特定的代码片段，并用所有用例覆盖它，这是
    GUI 测试无法做到的。此外，编写和运行单元测试非常简单，因此与其他测试相比，它们的成本很低。

    *   **明确约定测试组合** —— 尝试定义单元测试的百分比和 GUI 测试的百分比。测试组合需要让所有工作人员都清楚，并需要由团队负责人管理。尝试精确决定哪些关键的集成和用户流程需要用非单元测试来覆盖，并仅为这些部分创建测试。'
  raw: '### We Need to Decide What to Test


    Don’t test everything. Not only getting everything covered is not efficient, but
    it also costs you more maintenance in the long run. Understand not only the benefit
    of each test but also **its price**.


    Use each test technique (unit, integrations, etc.) for its purpose. If you have
    a class full of sophisticated code, cover it deeply with unit tests. But if you
    have something like this


    ```

    func onSaveButtonTapped()  {

    interactor.saveToFile()

    }

    ```


    there’s no need to cover that with a unit test. Just move on.


    ### Fixed a Bug? Write a Test


    This one follows the previous point. We can’t tell what our problems will be and
    what bugs we are going to bump into (otherwise, we would handle them in the first
    place).


    One great technique is to write a test **for every bug we find**. When we have
    a bug, it is a great indication for a less covered but yet important area of our
    code. In this case, it is better to use the TDD (Test-Driven Development) approach
    and write the test **before** we fix the bug.


    ## Test Mix


    Now that we understand **when** to write our tests, we need to understand **what**
    to write. Unit tests are easy to write. Should we write more of them? Or should
    we go on UI Tests to try to automate the end-user experience?


    This is not an easy question. It depends on your team resources, on your project
    structure, and on even your app business model. But still, there are some methodologies
    we follow, and we call it Test Pyramids.


    ## The Test Pyramids


    Each type of test has different influences on our daily work. For example, UI
    Tests are pricey. They may check user interaction and sometimes end-to-end scenarios,
    but they are hard to build and maintain and take a long time to run. Unit tests,
    on the other hand, run very fast and catch issues closer to the code, but they
    don’t tell anything about your app from the user perspective point, and they cannot
    test your app flows or even how your parts work together. The strategy where to
    invest more time and effort is crucial to our work. In his book, *Succeeding with
    Agile*, Mike Cohn describes this strategy as the “Test Automation Pyramid” or,
    in short, the “Test Pyramid.” The Test Pyramid is a visual way to describe a mixture
    of test automation suite that balances between development efforts and efficiency.


    ### The Classic Pyramid


    What considered to be the best practice and the most famous pyramid is the classic
    pyramid. The traditional pyramid is the one you probably see when the question
    of “what is the mix of tests we need to do” appears (see Figure [10-1](#496602_1_En_10_Chapter.xhtml#Fig1)).


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig1_HTML.jpg](images/496602_1_En_10_Chapter/496602_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    The classic pyramid


    According to the “Classic Test Pyramid,” we should write as many unit tests as
    we can. We should also write integration tests, but less than unit units, and
    write even less E2E (UI Tests). As mentioned earlier, the idea is to balance between
    speed and effectiveness. Another reason is that we want to catch the bugs and
    defects closer to the code at the low level, and this can be done easier with
    unit tests.


    When we’re going up in the pyramid, we get away from the code and go closer to
    the user. Also, since UI and APIs change more often than logic functions, when
    we’re going up in the pyramid, we find ourselves invest more effort in maintaining
    those layers.


    ### The Ice Cream Cone Model


    Considered to be an anti-pattern but acceptable in specific development teams
    is the **Ice Cream Cone** model . In this model, the pyramid is flipped upside
    down (Figure [10-2](#496602_1_En_10_Chapter.xhtml#Fig2)).


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig2_HTML.jpg](images/496602_1_En_10_Chapter/496602_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    The Ice Cream Cone pattern


    The Ice Cream Cone pattern is getting less and less popular. However, there are
    still companies that adopt this model, mainly big companies that have resources
    to maintain this monster or companies that their user flows are simple. Ice Cream
    Cone model is focusing a lot on GUI and end-to-end testing. In most cases, you
    can find different teams work on different types of tests without any collaboration
    or any sync between the development team and the product team.


    Since UI Tests cover end-to-end cases, meaning closer to the user, there is an
    assumption that the more UI Tests we create, the more effective the test suite
    is.


    But there are several problems with this anti-pattern:


    *   **It’s harder to build**. Building a UI Test scenario requires preparation
    of the UI elements and much time in creating the flows. Also, the verification
    that your tests run as they should takes a fair amount of time.


    *   **UI Tests take time to run**. Each test can easily take 10 seconds and even
    more, depending on the app and the scenario, while unit tests take less than 0.1
    seconds in the worst part. Integration test can also take a fair amount of time
    when running in front of a server or a network. When you run a test suite that
    contains many UI and integration tests, you take into account that those tests
    can take 30+ minutes to run, and that can be an issue in a continuous integration
    environment.


    *   **It’s harder to fix and maintain**. Detecting issues is good, but when you
    catch a bug far from code, it is harder to fix. When a unit test fails, you get
    the exact broken method. Also, every change in the UI requires us to modify the
    UI test as well; otherwise, the long-running suite breaks.


    However, there are several techniques to avoid Ice Cream Cone pattern:


    *   **Collaboration** – Make sure the different teammates (the developers, the
    QA, and the automation team) are synchronized. Try “Pair Testing”, to encourage
    teammates to be aligned on what we are testing and how. Focus on better “kick-off”
    meetings to make sure the feature or the mission is clear to everyone.


    *   **Give Priority to Unit Tests** – Unit tests run fast and easy to maintain.
    As mentioned earlier, there is a reason why we need to test our app closer to
    code – closer to the code means more comfortable to fix. Unit tests allow us to
    focus on a specific piece of code and cover it with all cases, something that
    it’s impossible to do in GUI testing. Also, it’s straightforward to write unit
    tests and run them, so their cost is cheap compared to other tests.


    *   **Explicit Agreement of the Testing Mix** – Try to define the percentage of
    tests, which are unit tests, and the percentage of tests that are GUI. The testing
    mix is something that needs to be clear to all workers and needs to be managed
    by the team leader. Try to decide exactly what are the critical integrations and
    user flows you need to cover with tests that are not unit tests and create only
    them.'
  trans: '

    ### 需要决定测试什么


    不要测试所有内容。全面覆盖不仅效率低下，长期来看还会增加维护成本。你需要理解每个测试的**价值**，同时也需要理解**其代价**。


    针对不同的目的使用不同的测试技术（如单元测试、集成测试等）。如果你的类中包含复杂代码，就用单元测试进行深入覆盖。但如果代码像这样简单：


    ```

    func onSaveButtonTapped()  {

    interactor.saveToFile()

    }

    ```


    就没有必要用单元测试去覆盖它。直接跳过即可。


    ### 修复了 Bug？那就编写一个测试


    这一点与上述内容一脉相承。我们无法预知会遇到哪些问题或出现什么 bug（否则我们一开始就会处理它们了）。


    一个很好的做法是**为我们发现的每一个 bug 都编写一个测试**。遇到 bug 通常表明代码中存在一个覆盖不足但至关重要的区域。在这种情况下，最好采用 TDD（测试驱动开发）方法，**在**修复
    bug **之前**编写测试。


    ## 测试组合


    既然我们已经理解了**何时**编写测试，接下来需要明白**编写什么**测试。单元测试很容易编写。那我们应该多写单元测试吗？还是应该继续编写 UI 测试，试图自动化最终用户体验？


    这没有简单的答案。这取决于团队资源、项目结构，甚至应用的业务模型。不过，有一些我们可以遵循的方法论，我们称之为“测试金字塔”。


    ## 测试金字塔


    每种测试类型对我们日常工作有着不同的影响。例如，UI 测试成本高昂。它们可以检查用户交互，甚至是端到端场景，但构建和维护困难，且运行时间很长。另一方面，单元测试运行非常快，并且能在更接近代码的位置发现问题，但它们无法从用户角度告知应用状况，也无法测试应用流程或各部分如何协同工作。决定在何处投入更多时间和精力的策略至关重要。Mike
    Cohn 在他的书《*敏捷软件开发的成功之道*》中将这一策略描述为“测试自动化金字塔”，或简称为“测试金字塔”。测试金字塔是一种直观的方式，用于描述在开发工作量与测试效率之间取得平衡的测试自动化套件组合。


    ### 经典金字塔


    被认为是最佳实践且最为人熟知的是经典金字塔。当“我们需要什么样的测试组合”这个问题出现时，你很可能看到的就是这个传统的金字塔（见图 10-1）。


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig1_HTML.jpg](img/496602_1_En_10_Fig1_HTML.jpg)


    图 10-1

    经典金字塔


    根据“经典测试金字塔”，我们应该编写尽可能多的单元测试。同时，也应该编写集成测试，但数量少于单元测试，而编写端到端（UI）测试则应更少。如前所述，其目的是在速度与有效性之间取得平衡。另一个原因是，我们希望能在更接近代码的底层捕获
    bug 和缺陷，而这通过单元测试更容易实现。


    随着在金字塔中向上移动，我们逐渐远离代码，更接近用户。此外，由于 UI 和 API 的变化比底层逻辑函数更频繁，当我们向上移动时，会发现在这些层次上需要投入更多维护精力。


    ### 冰淇淋甜筒模型


    **冰淇淋甜筒**模型被认为是一种反模式，但在特定的开发团队中是可以接受的。在这种模型中，金字塔是颠倒的（图 10-2）。


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig2_HTML.jpg](img/496602_1_En_10_Fig2_HTML.jpg)


    图 10-2

    冰淇淋甜筒模式


    冰淇淋甜筒模式正变得越来越不受欢迎。然而，仍有公司采用这种模式，主要是那些有资源维护这个庞然大物的大公司，或用户流程简单的公司。冰淇淋甜筒模式非常侧重于 GUI
    和端到端测试。在大多数情况下，你会发现不同类型的测试由不同的团队负责，而开发团队和产品团队之间缺乏协作或同步。


    由于 UI 测试覆盖端到端场景，意味着更接近用户，因此有一种假设认为，我们创建的 UI 测试越多，测试套件就越有效。


    但这种反模式存在几个问题：


    *   **构建难度更大**。构建一个 UI 测试场景需要准备 UI 元素，并花费大量时间创建流程。此外，验证测试是否按预期运行也需要相当多的时间。

    *   **UI 测试运行时间长**。每个测试很容易花费 10 秒甚至更长时间，具体取决于应用和场景；而单元测试在最坏情况下也只需不到 0.1 秒。集成测试在涉及服务器或网络调用时也可能花费相当多的时间。当你运行一个包含大量
    UI 和集成测试的测试套件时，可能需要 30 分钟以上的运行时间，这在持续集成环境中可能是个问题。

    *   **修复和维护难度更大**。发现问题固然好，但当你在远离代码的地方捕获一个 bug 时，修复起来会更加困难。当单元测试失败时，你可以精确定位到出问题的方法。此外，UI
    的每一次更改都要求我们同步修改 UI 测试；否则，长时间运行的测试套件就会崩溃。


    有几种方法可以避免陷入冰淇淋甜筒模式：


    *   **加强协作** —— 确保不同团队成员（开发人员、质量保证和自动化团队）保持同步。尝试“结对测试”，鼓励团队成员在测试内容和方式上保持一致。关注更高效的“启动会议”，确保每个人对功能或任务都清晰明了。

    *   **优先考虑单元测试** —— 单元测试运行速度快且易于维护。如前所述，我们需要更接近代码地测试应用是有原因的 —— 更接近代码意味着修复更容易。单元测试允许我们专注于特定的代码片段，并用所有用例覆盖它，这是
    GUI 测试无法做到的。此外，编写和运行单元测试非常简单，因此与其他测试相比，它们的成本很低。

    *   **明确约定测试组合** —— 尝试定义单元测试和 GUI 测试的比例。测试组合需要让所有相关人员都清楚，并应由团队负责人进行管理。尝试精确决定哪些关键的集成流程和用户流程需要用非单元测试（如集成测试或
    UI 测试）来覆盖，并仅为这些部分创建测试。

    '
- fmt: '# The Testing Diamond


    So we agree that end-to-end (UI) tests are difficult to create and maintain. They
    take too much time to run, and they are sensitive to small UI changes. But there
    is a significant advantage of end-to-end testing – the ability to test your app
    as a system and not as an isolated piece of code each time.


    Some say that the most important tests you can do are to check how your units
    work together. Although the end-to-end tests fill that need, we do need to balance
    between their effectiveness to the speed and ease of unit tests. The answer here
    is Integration tests, which are often considered to be the “forgotten” layer of
    the test pyramid. The resulting pattern is “Testing Diamond” (Figure [10-3](#496602_1_En_10_Chapter.xhtml#Fig3)).


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig3_HTML.jpg](images/496602_1_En_10_Chapter/496602_1_En_10_Fig3_HTML.jpg)


    Figure 10-3

    The diamond pattern


    As you can see, the testing diamond is focusing mainly on integration tests based
    on the belief that most of the business-related issues and scenarios are in this
    layer. These integrations are between your units. This approach is to look at
    “the problem” as a complex system that needed to be tested and not just individual
    units. In general, the testing diamond can give you much higher confidence in
    your app stability and quality, because it’s closer to the business and product
    requirements than unit tests; however, they are most costly to create.


    ## What Is the Right Approach?


    The bottom line is no matter what strategy you choose, you need to take into account
    the maintenance and running time of your tests to decide the mix of your test
    suites. Also, it depends on the context and type of app. Some apps are full of
    small and complicated logic, and in that case, you should focus on unit tests
    to make sure the basic functionality of your app is working, and some apps are
    built from several layers and require more integration testing. Some teams have
    the resources to create a solid edge-to-edge tests and believe it has value to
    their app so that they choose the Ice Cream Cone. You do need to understand that
    the more UI and integration tests you create, the more it costs you in terms of
    time.


    # How to Compose Test Scenarios?


    Now that we know how to write tests, there’s always a question bumping up – how
    to come up with the test scenarios?


    Sure, we can try and cover every line in the code, but we already know this is
    now practical or useful.


    There are two approaches I want to discuss with you – the one is `TDD` (Test-Driven
    Development) and `BDD` (Behavior-Driven Development). As you can tell by their
    name, both approaches are driven by something. The list of tests driving the TDD
    and BDD is driven by the product requirements.


    You don’t have to follow those approaches one by one. But it can give you a direction
    on how to write tests along with your code.


    ## Test-Driven Development (TDD)


    > *All code is guilty until proven innocent.*


    Test-Driven Development (`TDD`) is a software development technique that states
    a simple principle – write your tests before writing the code. While that sounds
    simple, it is a big thing for the developer. `TDD` ensures the developer is aware
    and knows all the requirements from its class or function, and when done right,
    it leads to high code coverage and minimum bugs.


    Developers consider `TDD` to be part of something called Extreme Programming;
    a methodology started to gain momentum in the late 1990s.


    Kent Beck, a software developer, developed `TDD` as a technique, and while it’s
    simple to understand, it requires different thinking on how to approach the code
    and the functions.


    Look at the following diagram (Figure [10-4](#496602_1_En_10_Chapter.xhtml#Fig4)).


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig4_HTML.jpg](images/496602_1_En_10_Chapter/496602_1_En_10_Fig4_HTML.jpg)


    Figure 10-4

    TDD life cycle


    `TDD` starts with writing a test that fails on the first run (because we haven’t
    written any code yet). After running the test and seeing that it fails, we write
    the code that satisfies the requirement and rerun the test to see that it is passing.
    We refactor our method, verify again with testing, and then repeat the first step
    by adding a new test and continue with the implementation.


    This process makes sure we are adding the minimum code that we need for the function/class
    to operate correctly.


    Let’s stop for a minute and talk about the refactor part – some think that, in
    this case, refactor means “write better code.” But when you think of it, it sounds
    weird – we just wrote this code, so how come we need to refactor it? Well, when
    doing a test-code-test-code process, we are writing the function or the code block
    step by step according to the tests, and this is a different approach of writing
    code than writing the function in one session.


    Think of how you write method and functions today – you write the code with the
    intent that you have to fulfill all the requirements. `TDD` approach is a vast
    difference from the standard approach, and this may lead to duplication in our
    code. Eliminating this duplication is done on the refactor stage, and by that,
    we are making a minimal change before moving to the next test. Refactoring is
    not a recommended step – it’s an essential step.'
