- fmt: '### So Why Do We Need Code Coverage?


    The fact that high code coverage doesn’t necessarily mean “no bugs” doesn’t mean
    it’s useless. Code coverage is an excellent metric to **detect untested code**,
    and it’s an excellent metric to identify areas of your app that are not covered
    or may contain bugs you are not aware of. It doesn’t mean you need to cover them,
    but it gives you the full picture of your app.


    Another issue that code coverage can help you is detecting dead code. If you see
    a private method that is not covered by tests, this could be a sign of unreachable
    code or, in other words, a “dead code.” You can try checking the call hierarchy
    to track what functions call it and decide if you want to cover it or delete it
    if it’s not in use.


    ### And Then There Is Test Coverage. Wait. What?


    When we say “Code Coverage,” we mean “what is the percentage of our code that
    is covered by unit tests.” Or, as mentioned before, if we have 50 lines of code
    and our tests execute 20 of them, we can tell that our code coverage is 40% (20
    out of 50).


    But there is another term – Test Coverage. A lot of teams and developers are confused
    by those two terms. While they may sound similar, they are not the same.


    While code coverage measures the percentage of code covered by tests, Test Coverage
    measures the **percentage of requirements covered by tests**. Since test coverage
    doesn’t deal with code but with requirements, it’s less relevant for developers
    but more relevant to the QA testers. The reason I bring it here is that it can
    give you a sense of how to cover different aspects of your app and not just chasing
    code coverage metric or testing methods randomly.


    So when we say “requirements,” it is best practice to divide them into different
    groups that represent how our app is covered and tested in various aspects:


    **Product** – What are the test coverage areas of your product? If your product
    contains ten features and tests cover only eight of them, we can say that in this
    case, you have a test coverage of 80%.


    **Risk** – Your app requirements is a long list, that some of them are critical
    or blockers, and some of them are minor. Out of those that you define as critical
    and blockers, how many are covered? This is a crucial factor in understanding
    if your app is ready for production or not.


    **Parameter Value Coverage** – Remember the example with the “divided by zero”?
    In main functions, you should test a vast scope of parameters. Of course, we have
    the usual suspects such as nil, 0, and “”, but sometimes it’s not enough. Try
    to focus on edge cases of user input – long texts, big arrays, and more.


    ## Summary


    We’ve learned how to incorporate tests in our daily work; we saw different mixes
    of test suites that we call “test pyramid,” what are TDD and BDD, and what is
    code coverage and how it is covered.


    As I said earlier, writing tests as part of your daily work is a professional
    challenge that is often related to culture and habits.


    Another issue that is related to culture is running those tests automatically
    daily. This is a part of something called “continuous integration” and will be
    discussed in the next chapter.


    # 11. Using Command-Line Tools


    > *The most important practice for continuous integration to work properly is
    frequent check-ins to trunk or mainline. You should be checking in your code at
    least a couple of times a day.*

    >

    > —David Farley


    ## Introduction


    While it’s very convenient to use the Xcode UI interface to configure and run
    tests, it’s impossible to do that when you want to run them on a remote server.


    Fortunately, every new Xcode installed comes with a tool named “Xcode Command-Line
    Tools” to help you run your tests without any UI interface.


    This chapter concludes the final piece in the puzzle by giving you the tools to
    integrate your great test suites into a continuous integration environment.


    In this chapter, you will learn


    1.  What CI/CD means and how tests fit it

    2.  What are the command-line tools provided by Xcode

    3.  Installing and setting up the `xcodebuild` application

    4.  How to run tests from the command line

    5.  How to run test plans from the command line

    6.  Exciting and useful `xcodebuild` features


    ## What Is CI/CD Anyway?


    “CI” and “CD” often come together – “CI/CD.” However, these are two different
    processes:


    **CI (Continuous Integration)** – In a continuous integration process, we take
    the code from all the developers/third party/server changes and **merge it together**
    to a new working build. The goal of this process is to make sure this build is
    stable and nothing broke along the way.


    **CD (Continuous Deployment)** – In “Continuous Deployment,” we upload the build
    to an online service and make sure we have an available app to download. In fact,
    CD is an **extension of the CI** process and cannot stand by itself.


    ### How Tests Fit In?


    Based on the preceding data, you can understand that tests are a central part
    of this process. In fact, a continuous integration without any tests involved
    is like dressing up, taking a babysitter, and going out to a restaurant for a
    glass of water – it just doesn’t worth it.


    There are plenty of tools that can help you integrate your tests automatically
    in a CI environment, but they all rely on Xcode command-line tools to run them.


    ## Command-Line Tools


    Command-Line tools are a great way to script your testing and incorporate it with
    CI/CD environments. They let you build, archive, and test your projects from the
    terminal command line and customize your run with different parameters and arguments.


    Command-Line Tools are not just for CI/CD – they can also help you automate your
    tasks during development. For example, instead of repeating the same actions of
    testing different test plans, committing, and then archiving, you can implement
    all of that in one script file.


    ### Meet `xcodebuild`


    “`xcodebuild`” is the primary tool of the command-line tool package, and it’s
    used to build, archive, and analyze test and any action you can do with the scheme.


    The real power of `xcodebuild` is the flexibility to run various actions and configurations
    and, as a result of that, it is the primary tool for testing.


    ### Install and Set Up `xcodebuild`


    Although you can download Command-Line Tools separately, they come with every
    new Xcode.


    But if you still want to download them, you have two options:


    *   Download from the Developer website.

    *   Install from the command line using `xcode-select`.


    “`xcode-select`” is a command line that comes bundled with macOS. If you want
    to use it to install Command-Line Tools, open the Terminal and type


    ```

    $ xcode-select –install

    ```


    And press Enter.


    Many developers have multiple versions of Xcode installed on their machine, and
    one of the first steps using `xcodebuild` is to make sure it works with the correct
    Xcode version.


    To find out what is the “active” Xcode version, we can use `xcode-select` again
    for that:


    ```

    $ xcode-select -p

    /Applications/Xcode.app/Contents/Developer

    ```


    To change the active Xcode version, locate the developer path and use the `-switch`
    command:


    ```

    $ xcode-select -switch /Applications/Xcode12.app/Contents/Developer

    ```


    To uninstall Command-Line Tools, just delete `/Library/Developer/CommandLineTools`
    with this command:


    ```

    $ sudo rm -r /Library/Developer/CommandLineTools

    ```'
