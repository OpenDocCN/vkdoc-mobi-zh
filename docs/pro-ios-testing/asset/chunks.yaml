- fmt: '# Be Precise with Queries


    Let’s call back to our last query:


    ```

    app.buttons["save"]

    ```


    Our query has two problems:

    *   It searches for all buttons on the screen, no matter their position in the
    view hierarchy.

    *   It does a full scan on the element tree even after it already found an element
    named “save”.


    Those problems lead to potential memory and performance spikes.


    To easily fix it, we can do a small modification:


    ```

    self.navigationBars.buttons["save"].first

    ```


    We did two crucial changes here – first, we are now searching only in the navigation
    bar while eliminating the rest of the tree. Second, we used the property `first`
    to return the first element that we find.


    We now understand how to optimize our queries better. But, do you remember I mentioned
    that, in most cases, we don’t need all the element data when querying, but only
    their references? This leads us to the next optimization.


    ## Resolving Element Data


    When querying for a single element, returning its full data is not a big problem.
    But when querying for a long list of elements, it may cause some memory issues.
    This is why when querying for elements, they return only as references without
    their full data:


    ```

    let saveButton = app.navigationBars.buttons["save"].firstMatch // return only
    element

    let frame = saveButton.frame //resolving the element data

    ```


    XCTest is resolving the element data only when it needs it. So, fetching the button
    frame is done only when calling the `frame` property directly using a second query.
    Similar to what happens in Core Data, if you are familiar with this framework.


    ## Elements by Identifier or Index


    Look at the following code:


    ```

    let buttons = app.buttons

    ```


    Unlike you would think, `app.buttons` doesn’t return a list of buttons, but a
    query from the object type `XCUIElementQuery`. To get the result of the query,
    it has two important properties:


    ```

    let buttons = app.buttons.allElementsBoundByAccessibilityElement

    let buttons = app.buttons.allElementsBoundByIndex

    ```


    So, what is the difference between these two properties?


    Both properties return an array of buttons. The difference is with the resolving
    method.


    We said the querying elements only return their references and not their full
    data. The complete data fetching is happening later, only by demand. At that point
    of fetching the data, there’s a concern that the actual element tree might have
    changed.


    In this case, XCTest needs to know how to fetch the data on the second query –
    is it going to be according to its accessibility label or by its index?


    We can define it to be by label:


    ```

    let buttons = app.buttons.allElementsBoundByAccessibilityElement

    // changes in the UI....

    let firstButton = buttons.first! // fetching its label

    ```


    Or by its index in the array:


    ```

    let buttons = app.buttons.allElementsBoundByIndex

    // changes in the UI....

    let firstButton = buttons.first! // fetching its index

    ```


    In most cases, we are going to use the first property – fetch them and keep sync
    with the accessibility label. But there are situations when we don’t care about
    the label but the position of the array, for example, cells of `UITableView` or
    `UICollectionView`.


    ## Examples for Element’s Queries


    It is always better to be updated with changes in XCTest in that area, since UI
    Testing evolved by Apple every Xcode version.


    But here are some examples to give you an idea of how it works.


    To get just get an element by type (if you have multiple elements from this type/trait,
    you might get an unexpected behavior):


    ```

    app.alerts.element

    app.buttons.element

    app.collectionViews.element

    app.images.element

    app.maps.element

    app.navigationBars.element

    app.pickers.element

    app.progressIndicators.element

    app.scrollViews.element

    app.segmentedControls.element

    app.staticTexts.element

    app.switches.element

    app.tabBars.element

    app.tables.element

    app.textFields.element

    app.textViews.element

    app.webViews.element

    ```


    To get an element by its accessibility identifier:


    ```

    app.testFields["password"]

    ```


    To get all images in a specific scroll view (directly):


    ```

    app.scrollViews["Main"].children(matching: .image)

    ```


    To get all the descendant images for the scroll view (including subviews and their
    subviews, etc.):


    ```

    app.scrollViews["Main"].descendants(matching: .image)

    ```


    To get the fifth element in a query:


    ```

    app.switches.element(bound: 4)

    ```


    # Actions on Elements


    Getting a reference to an element is useless if we don’t interact with it. To
    simulate the user’s actions, we need to have the ability to type, tap, scroll,
    and swipe on elements.


    Fortunately, each `XCUIElement` has a series of actions you can use that can help
    you write scripts for your tests quickly.


    **Table 7-1 XCUIElement Actions List**


    | Method Name | Description |

    | --- | --- |

    | `typeText(string)` | Types a string into an input field element such as text
    field or text view.<br>Note: The text field needs to be in focus when doing that.
    |

    | `tap()` | Taps on a hittable point in the element. |

    | `doubleTap()` | Sends a double-tap event to the element. Triggers the `doubleTap`
    gesture action if it exists. |

    | `press(forDuration : TimeInterval)` | Is a long touching gesture with a specific
    duration. |

    | `press(forDuration: TimeInterval, thenDragTo: XCUIElement)` | Simulates drag
    and drop event. |

    | `twoFingerTap()` | Simulates two fingers tap on a hittable element. |

    | `tap(withNumberOfTaps: Int, numberOfTouches: Int)` | Gives you great flexibility
    in tapping. |

    | `swipeLeft()`<br>`swipeRight()`<br>`swipeDown()`<br>`swipeUp()` | Sends a swipe
    gesture. This is also the way to simulate a scroll. |

    | `pinch(withScale: CGFloat, velocity: CGFloat)` | Pinches the elements to scale
    at a specific velocity. |

    | `adjust(toNormalizedSliderPoisition: CGFloat)` | Is relevant only to `UISlider`
    controls – change the value of the slider with a normalized value from 0 to 1.
    You can use `normalizedSliderPosition: CGFloat` to determine the current slider
    value. |

    | `adjust(toPickereWheelValue: String)` | Is relevant only to pickers such as
    `UIPickerView` and `UIDatePickerView`. |


    **Note**


    I recommend you to be updated with Apple Online Documentation with additional
    available actions.


    Here are some examples of interacting with elements:


    ```

    app.buttons["green"].doubleTap() // double tap the green button

    app.textFields["email"].tap() //makes the email textfield the first responder

    ```


    As you can see, XCTest is full of `XCUIElement` actions to help you set up (almost)
    any scenario with your app.


    **Note**


    When running UI Tests on the simulator, it is better to make sure the software
    keyboard is available. Go to I/O ➤ Keyboard and make sure “Connect Hardware Keyboard”
    is not marked. Simulating a hardware keyboard can cause issues with text fields
    and text views.'
