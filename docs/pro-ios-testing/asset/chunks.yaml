- fmt: "# L – Liskov Substitution Principle\n\nLSP (Liskov Substitution Principle)\
    \ may be hard to understand at first, but it’s very simple to implement. What\
    \ LSP means is that if type A is dependent upon type B, then objects of type B\
    \ may be replaced with objects of type A. In other words, subclass objects should\
    \ keep the behavior of the superclasses in any matter.\n\nLet’s try to understand\
    \ it using the next example:\n\n```\nprotocol ChatMessage {\n    var sender :\
    \ String { get set }\n    var content : String { get set }\n    var time : Date\
    \ { get set }\n    var fileURL : URL { get set }\n}\nstruct TextMessage : ChatMessage\
    \ {\n}\nstruct AudioMessage : ChatMessage {\n}\nstruct ImageMessage : ChatMessage\
    \ {\n}\nstruct FileMessage : ChatMessage {\n}\n```\n\nIn the preceding example,\
    \ we tried to design a basic structure for a chat system. We created a protocol\
    \ named `ChatMessage` and four different struct types that conform to this protocol.\n\
    \nThe protocol assumes that all structs have some `fileURL` data, but this is\
    \ not true – the `fileURL` is not relevant for `TextMessage` struct. The same\
    \ goes for the `content` variable – it’s only relevant for `TextMessage` but not\
    \ for the others. Some may say “So what? I can just ignore and return an empty\
    \ string or empty URL.” Of course, it can be done, but remember the code that\
    \ is going to use `TextMessage` expects the `fileURL` to contain a real value;\
    \ otherwise, it wouldn’t be there. The solution, in this case, is to split the\
    \ protocols:\n\n```\nprotocol ChatMessage {\n    var sender : String { get set\
    \ }\n    var time : Date { get set }\n}\nprotocol ChatMessageFile {\n    var fileURL\
    \ : URL { get set }\n}\nprotocol ChatMessageTextual {\n    var content : String\
    \ { get set }\n}\nstruct TextMessage : ChatMessage, ChatMessageTextual {\n}\n\
    struct AudioMessage : ChatMessage, ChatMessageFile {\n}\nstruct ImageMessage :\
    \ ChatMessage, ChatMessageFile {\n}\nstruct FileMessage : ChatMessage, ChatMessageFile\
    \ {\n}\n```\n\nYou follow this principle also for subclassing. When overriding\
    \ method from the superclass, if you don’t call the superclass method, you are\
    \ actually violating the LSP and may remove a critical behavior.\n\nTo summarize\
    \ it, always call the superclass method and always implement the required protocol\
    \ methods. If they are not relevant, you are probably doing something wrong; consider\
    \ splitting or changing architecture.\n\n# I – Interface-Segregation Principle\n\
    \nThe previous principle is built upon the Interface-Segregation Principle. The\
    \ basic rule here is creating the minimal interface you need for objects and structs.\
    \ This is also true for class public methods and also for protocols. When a class\
    \ needs to implement methods it uses, it requires your mock objects to implement\
    \ those methods as well. This adds levels of complexity to your project and your\
    \ tests. Create small protocols – it will pay off for you in the future.\n\n#\
    \ D – Dependency Inversion Principle\n\nThe Dependency Inversion Principle is\
    \ a form of decoupling software modules. The principle states:\n\n1.  High-level\
    \ modules should not depend on low-level modules. Both should depend on abstractions.\n\
    2.  Abstractions should not depend on details. Details should depend on abstractions.\n\
    \nIn other words, when high-level objects interact with lower-level objects, they\
    \ do not need to know their implementation or even their class, but only their\
    \ interface. This can be done using abstraction (`Protocol` or Base class) and\
    \ reducing coupling.\n\nAlso, when designing an abstraction, it needs to be done\
    \ from the point of what are the goals of this abstraction and not how it is going\
    \ to implement them. The best technique to do that is to design first your architecture\
    \ UML (Unified Modeling Language) and then write it as a protocol in your code.\
    \ Only then you build your classes and start coding.\n\nDecoupling your architecture\
    \ is actually what testing is based on. The ability to exchange each part in your\
    \ system with another object as long as it conforms to the defined abstraction\
    \ is important for mocking and molding your initial testing state.\n\n# Design\
    \ Patterns and Architectures\n\nDesign Pattern is a reusable solution you can\
    \ apply to a common problem you have in your project. The problem can be network\
    \ requests, a screen, communication between objects, and more. An example of such\
    \ a design pattern can be a delegate.\n\nSome design patterns solve UI problems\
    \ or some database access problems; there isn’t a “right” design pattern but rather\
    \ a design pattern that fits your need.\n\nAll design patterns have cons and pros,\
    \ and they have a deep influence on your ability to cover your app with tests.\n\
    \n## Singleton\n\nA Singleton is a case when you have only one copy of a class.\
    \ The reference to the one instance of the class is done using a static variable\
    \ that points to this instance.\n\nWhile it is very convenient to create and use\
    \ a singleton, they are overused in many projects. Overuse of a singleton is not\
    \ a best practice, not only in terms of memory but mostly in control.\n\nUse the\
    \ Singleton pattern only if you need one and only one instance of your class.\
    \ One good example is a network handler or a database connector, because in both\
    \ cases, it’s inefficient to hold multiple connections or requests.\n\nAlso, a\
    \ class that contains a state of something should have one and only one instance\
    \ to avoid data conflicts.\n\nCreating a singleton is very easy, and you can do\
    \ that with one line only:\n\n```\nclass NetworkClient {\n    static let shared\
    \ = NetworkClient()\n    private init() {\n    }\n}\nlet networkClient = NetworkClient.shared\n\
    ```\n\nWriting tests that involve singletons should not be a major problem. You\
    \ should be able to mock singletons easily and make use of them using dependency\
    \ injection covered earlier.\n\nNote: It’s important to note at this point that\
    \ most of the described design patterns here are based on principles you learned\
    \ in this chapter. As long as you are following those principles, choosing the\
    \ right design pattern should be easy and intuitive.\n\n## Facade\n\nFacade is\
    \ a simple interface that hides a complex system of classes. The Facade is used\
    \ when you have a set of classes, and you want to put them under the same “umbrella”\
    \ since they are all related to each other in some way.\n\nFor example, let’s\
    \ go back to our Weather app. We have a class that handles login, a class that\
    \ handles registration, and a class that handles the mechanism of “forget password.”\n\
    \nOn the one hand, it seems good we separated this logic to multiple classes,\
    \ but on the other hand, it’s getting much more complicated now, since our authentication\
    \ logic is spread across three different classes.\n\nSo, we can create a Facade –\
    \ one unified interface that can help you access your public methods from one\
    \ place.\n\nLet’s take a look of such Facade:\n\n```\nclass UserAccessFacade {\n\
    \    lazy private var loginService = LoginService()\n    lazy private var registerService\
    \ = RegisterService()\n    lazy private var forgetPasswordService = ForgetPasswordService()\n\
    \n    func doLogin(email : String, password : String) {\n        loginService.doLogin(email:\
    \ email, password: password)\n    }\n\n    func doRegister(email : String, password:\
    \ String, name : String) {\n        registerService.doRegister(email: email, password:\
    \ password, name: name)\n    }\n\n    func doForgetPassword(email : String) {\n\
    \        forgetPasswordService.doForgetPassword(email: email)\n    }\n}\n```\n\
    \nThe Facade holds the relevant objects as private and has a simple interface\
    \ to the relevant methods. The developer that uses the Facade is not aware of\
    \ the complexity underneath.\n\nIn terms of testing, Facade is very testable as\
    \ it lets you replace the whole object inside it and still maintains its behavior\
    \ while keeping its interface constant."
  raw: '### L – Liskov Substitution Principle


    LSP (Liskov Substitution Principle) may be hard to understand at first, but it’s
    very simple to implement, so try to concentrate here ☺. What LSP means is that
    if type A is dependent upon type B, then objects of type B may be replaced with
    objects of type A. In other words, subclass objects should keep the behavior of
    the superclasses in any matter.


    Let’s try to understand it using the next example:


    ```

    protocol ChatMessage {

    var sender : String { get set }

    var content : String { get set }

    var time : Date { get set }

    var fileURL : URL { get set }

    }

    struct TextMessage : ChatMessage {

    }

    struct AudioMessage : ChatMessage {

    }

    struct ImageMessage : ChatMessage

    {

    }

    struct FileMessage : ChatMessage {

    }

    ```


    In the preceding example, we tried to design a basic structure for a chat system.
    We created a protocol named ChatMessage and four different struct types that conform
    to this protocol.


    The protocol assumes that all structs have some fileURL data, but this is not
    true – the fileURL is not relevant for TextMessage struct. The same goes for the
    content variable – it’s only relevant for TextMessage but not for the others.
    Some may say “So what? I can just ignore and return an empty string or empty URL.”
    Of course, it can be done, but remember the code that is going to use TextMessage
    **expects the fileURL to contain a real value**; otherwise, it wouldn’t be there.
    The solution, in this case, is to split the protocols:


    ```

    protocol ChatMessage {

    var sender : String { get set }

    var time : Date { get set }

    }

    protocol ChatMessageFile {

    var fileURL : URL { get set }

    }

    protocol ChatMessageTextual {

    var content : String { get set }

    }

    struct TextMessage : ChatMessage, ChatMessageTextual {

    }

    struct AudioMessage : ChatMessage, ChatMessageFile {

    }

    struct ImageMessage : ChatMessage, ChatMessageFile

    {

    }

    struct FileMessage : ChatMessage, ChatMessageFile {

    }

    ```


    You follow this principle also for subclassing. When overriding method from the
    superclass, if you don’t call the superclass method, you are actually violating
    the LSP and may remove a critical behavior.


    To summarize it, always call the superclass method and always implement the required
    protocol methods. If they are not relevant, you are probably doing something wrong;
    consider splitting or changing architecture.


    ### I – Interface-Segregation Principle


    The previous principle is built upon the Interface-Segregation Principle. The
    basic rule here is creating the minimal interface you need for objects and structs.
    This is also true also for class public methods and also for protocols. When a
    class needs to implement methods it uses, it requires your mock objects to implement
    those methods as well. This adds levels of complexity to your project and your
    tests. Create small protocols – it will pay off for you in the future.


    ### D – Dependency Inversion Principle


    The Dependency Inversion Principle is a form of decoupling software modules. The
    principle states


    1.  High-level modules should not depend on low-level modules. Both should depend
    on abstractions.


    2.  Abstractions should not depend on details. Details should depend on abstractions.


    In other words, when high-level objects interact with lower-level objects, they
    do not need to know their implementation or even their class, but only their interface.
    This can be done using abstraction (Protocol or Base class) and reducing coupling.


    Also, when designing an abstraction, it needs to be done from the point of **what
    are the goals** of this abstraction and not **how** it is going to implement them.
    The best technique to do that is to design first your architecture UML (Unified
    Modeling Language) and then write it as a protocol in your code. Only then you
    build your classes and start coding.


    Decoupling your architecture is actually what testing is based on. The ability
    to exchange each part in your system with another object **as long as it conforms**
    to the defined abstraction is important for mocking and molding your initial testing
    state.


    ## Design Patterns and Architectures


    Design Pattern is a reusable solution you can apply to a common problem you have
    in your project. The problem can be network requests, a screen, communication
    between objects, and more. An example of such a design pattern can be a **delegate**.


    Some design patterns solve UI problems or some database access problems; there
    isn’t a “right” design pattern but rather a design pattern that fits your need.


    All design patterns have cons and pros, and they have a deep influence on your
    ability to cover your app with tests.


    ### Singleton


    A Singleton is a case when you have only one copy of a class. The reference to
    the one instance of the class is done using a static variable that points to this
    instance.


    While it is very convenient to create and use a singleton, they are overused in
    many projects. Overuse of a singleton is not a best practice, not only in terms
    of memory but mostly in control.


    Use the Singleton pattern only if you need **one and only one** instance of your
    class. One good example is a network handler or a database connector, because
    in both cases, it’s inefficient to hold multiple connections or requests.


    Also, a class that contains a state of something should have one and only one
    instance to avoid data conflicts.


    Creating a singleton is very easy, and you can do that with one line only:


    ```

    class NetworkClient {

    static let shared = NetworkClient()

    private init() {

    }

    }

    let networkClient = NetworkClient.shared

    ```


    Writing tests that involve singletons should not be a major problem. You should
    be able to mock singletons easily and make use of them using dependency injection
    covered earlier.


    Note


    It’s important to note at this point that most of the described design patterns
    here are based on principles you learned in this chapter. As long as you are following
    those principles, choosing the right design pattern should be easy and intuitive.


    ### Facade


    Facade is a simple interface that hides a complex system of classes. The Facade
    is used when you have a set of classes, and you want to put them under the same
    “umbrella” since they are all related to each other in some way.


    For example, let’s go back to our Weather app. We have a class that handles login,
    a class that handles registration, and a class that handles the mechanism of “forget
    password.”


    On the one hand, it seems good we separated this logic to multiple classes, but
    on the other hand, it’s getting much more complicated now, since our authentication
    logic is spread across three different classes.


    So, we can create a Facade – one unified interface that can help you access your
    public methods from one place.


    Let’s take a look of such Facade:


    ```

    class UserAccessFacade {

    lazy private var loginService = LoginService()

    lazy private var registerService = RegisterService()

    lazy private var forgetPasswordService = ForgetPasswordService()

    func doLogin(email : String, password : String) {

    loginService.doLogin(email: email, password: password)

    }

    func doRegister(email : String, password: String, name : String) {

    registerService.doRegister(email: email, password: password, name: name)

    }

    func doForgetPassword(email : String) {

    forgetPasswordService.doForgetPassword(email: email)

    }

    }

    ```


    The Facade holds the relevant objects as private and has a simple interface to
    the relevant methods. The developer that uses the Facade is not aware of the complexity
    underneath.


    In terms of testing, Facade is very testable as it lets you replace the whole
    object inside it and still maintains its behavior while keeping its interface
    constant.'
  trans: "\n# L – 里氏替换原则\n\nLSP（里氏替换原则）初看可能难以理解，但实现起来非常简单。LSP 的意思是，如果类型 A 依赖于类型 B，那么类型\
    \ B 的对象可以被类型 A 的对象替换。换句话说，子类对象在任何情况下都应保持超类的行为。\n\n让我们通过下面的例子来理解它：\n\n```\nprotocol\
    \ ChatMessage {\n    var sender : String { get set }\n    var content : String\
    \ { get set }\n    var time : Date { get set }\n    var fileURL : URL { get set\
    \ }\n}\nstruct TextMessage : ChatMessage {\n}\nstruct AudioMessage : ChatMessage\
    \ {\n}\nstruct ImageMessage : ChatMessage {\n}\nstruct FileMessage : ChatMessage\
    \ {\n}\n```\n\n在前面的例子中，我们试图为聊天系统设计一个基本结构。我们创建了一个名为 `ChatMessage` 的协议，以及四个遵循此协议的不同结构体类型。\n\
    \n该协议假设所有结构体都有一些 `fileURL` 数据，但这并不正确——`fileURL` 与 `TextMessage` 结构体无关。`content`\
    \ 变量也是如此——它仅与 `TextMessage` 相关，与其他类型无关。有人可能会说：“那又怎样？我可以忽略它并返回空字符串或空 URL。” 当然，可以这样做，但请记住，使用\
    \ `TextMessage` 的代码期望 `fileURL` 包含一个真实的值；否则，它就不会在那里。这种情况下的解决方案是拆分协议：\n\n```\n\
    protocol ChatMessage {\n    var sender : String { get set }\n    var time : Date\
    \ { get set }\n}\nprotocol ChatMessageFile {\n    var fileURL : URL { get set\
    \ }\n}\nprotocol ChatMessageTextual {\n    var content : String { get set }\n\
    }\nstruct TextMessage : ChatMessage, ChatMessageTextual {\n}\nstruct AudioMessage\
    \ : ChatMessage, ChatMessageFile {\n}\nstruct ImageMessage : ChatMessage, ChatMessageFile\
    \ {\n}\nstruct FileMessage : ChatMessage, ChatMessageFile {\n}\n```\n\n对于子类化，你也应遵循此原则。当重写超类方法时，如果你不调用超类的方法，实际上就违反了\
    \ LSP，并且可能移除一个关键行为。\n\n总结一下：始终调用超类方法，并始终实现协议所需的方法。如果它们不相关，那你可能做错了什么；请考虑拆分或更改架构。\n\
    \n# I – 接口隔离原则\n\n前一个原则建立在**接口隔离原则**之上。这里的基本规则是为你需要的对象和结构体创建最小的接口。这对于类的公共方法和协议也是如此。当一个类需要实现它使用的方法时，它也要求你的模拟对象实现这些方法。这增加了项目和测试的复杂性。创建小协议——这将在未来为你带来回报。\n\
    \n# D – 依赖倒置原则\n\n依赖倒置原则是解耦软件模块的一种形式。该原则指出：\n\n1.  高层模块不应依赖于低层模块。两者都应依赖于抽象。\n\
    2.  抽象不应依赖于细节。细节应依赖于抽象。\n\n换句话说，当高层对象与低层对象交互时，它们不需要知道其实现甚至其类，只需要知道其接口。这可以通过使用抽象（`Protocol`\
    \ 或基类）和减少耦合来实现。\n\n此外，在设计抽象时，需要从该抽象的目标角度出发，而不是如何实现它们。最好的技术是首先设计你的架构 UML（统一建模语言），然后在代码中将其编写为协议。之后，你才构建类并开始编码。\n\
    \n解耦你的架构实际上是测试的基础。只要符合定义的抽象，能够将系统中的每个部分替换为另一个对象，这对于模拟和塑造初始测试状态非常重要。\n\n# 设计模式与架构\n\
    \n设计模式是一种可重用的解决方案，你可以将其应用于项目中常见的某个问题。问题可能是网络请求、屏幕、对象之间的通信等等。这种设计模式的一个例子可以是委托。\n\
    \n有些设计模式解决 UI 问题或数据库访问问题；没有“正确”的设计模式，只有适合你需求的设计模式。\n\n所有设计模式都有优缺点，并且它们对你用测试覆盖应用的能力有深远影响。\n\
    \n## 单例模式\n\n单例模式是指一个类只有一个副本的情况。通过指向该实例的静态变量来引用该类的唯一实例。\n\n虽然创建和使用单例非常方便，但它们在许多项目中被过度使用。过度使用单例并不是最佳实践，不仅涉及内存，更主要的是在控制方面。\n\
    \n只有在需要且仅需要一个类实例时，才使用单例模式。一个好的例子是网络处理器或数据库连接器，因为在这两种情况下，维护多个连接或请求是低效的。\n\n此外，包含某物状态的类应具有且仅有一个实例，以避免数据冲突。\n\
    \n创建单例非常简单，你只需一行代码即可完成：\n\n```\nclass NetworkClient {\n    static let shared =\
    \ NetworkClient()\n    private init() {\n    }\n}\nlet networkClient = NetworkClient.shared\n\
    ```\n\n编写涉及单例的测试不应该是个大问题。你应该能够轻松地模拟单例，并利用前面提到的依赖注入来使用它们。\n\n注意：重要的是要注意，此处描述的大多数设计模式都基于你在本章中学到的原则。只要你遵循这些原则，选择正确的设计模式就应该变得简单而直观。\n\
    \n## 外观模式\n\n外观模式是一个隐藏复杂类系统的简单接口。当你有一组类，并且由于它们以某种方式相互关联，你希望将它们置于同一个“保护伞”下时，就会使用外观模式。\n\
    \n例如，让我们回到天气应用。我们有一个处理登录的类、一个处理注册的类，以及一个处理“忘记密码”机制的类。\n\n一方面，我们将这个逻辑分离到多个类似乎很好，但另一方面，现在情况变得复杂得多，因为我们的认证逻辑分布在三个不同的类中。\n\
    \n所以，我们可以创建一个外观——一个统一的接口，可以帮助你从一个地方访问公共方法。\n\n让我们看看这样一个外观：\n\n```\nclass UserAccessFacade\
    \ {\n    lazy private var loginService = LoginService()\n    lazy private var\
    \ registerService = RegisterService()\n    lazy private var forgetPasswordService\
    \ = ForgetPasswordService()\n\n    func doLogin(email : String, password : String)\
    \ {\n        loginService.doLogin(email: email, password: password)\n    }\n\n\
    \    func doRegister(email : String, password: String, name : String) {\n    \
    \    registerService.doRegister(email: email, password: password, name: name)\n\
    \    }\n\n    func doForgetPassword(email : String) {\n        forgetPasswordService.doForgetPassword(email:\
    \ email)\n    }\n}\n```\n\n外观将相关对象作为私有属性持有，并为相关方法提供简单的接口。使用外观的开发者不知道其下的复杂性。\n\n\
    在测试方面，外观是非常可测试的，因为它允许你替换其内部的整个对象，同时保持其行为不变，并保持其接口的一致性。\n"
- fmt: "### Decorator\n\n`Decorator` is a popular design pattern that modifies the\
    \ behavior of an object without changing its interface or its code.\n\nThe `Decorator`\
    \ is an object that wraps the core object and has the same interface. The `Decorator`\
    \ acts as a \"middleman\" and by that can \"decorate\" the behavior of the original\
    \ object.\n\nThe `Decorator` is useful in situations when you cannot or don't\
    \ want to change the code of an existing class. Frameworks and legacy code are\
    \ good examples of a situation like that.\n\nFor the \"client\" that uses a `Decorator`,\
    \ it doesn't matter if it works with the original class or a decorator since they\
    \ both use the same interface.\n\nAnother way to decorate an object other than\
    \ wrapping it is to use Swift `extensions` or Objective-C `Categories`. Both are\
    \ good examples for not modifying an existing code but expanding it.\n\n### Factory\n\
    \n`Factory` is a design pattern that encapsulates the object creation process.\
    \ It implements several principles, like single responsibility and isolation.\n\
    \nThe basic form of a `Factory` is an object that creates other objects – for\
    \ example, if you have a table view with different kinds of cells, you can create\
    \ a cell factory to create those cells according to their corresponding object\
    \ models.\n\nBut `Factory` can do more than that – it can decide what type of\
    \ object to return based on the arguments it gets. Let's say we want to create\
    \ a car factory that produces a car according to a customer needs:\n\n```\nstruct\
    \ Mazda : Car {\n}\nstruct Toyota : Car {\n}\nstruct BMW : Car {\n}\nclass CarsFactory\
    \ {\n    func getCar(accordingTo customerNeeds : CustomerNeeds)->Car {\n     \
    \   switch customerNeeds.typeRequested {\n        case .mazda:\n            return\
    \ Mazda()\n        case .toyota:\n            return Toyota()\n        case .bmw:\n\
    \            return BMW()\n        }\n    }\n}\n```\n\nAs you can see from the\
    \ preceding code, the `CarsFactory` encapsulates the logic of the decision what\
    \ type of struct to return by examining the received customer needs. The caller\
    \ for the `getCar` method doesn't care about the implementation as long as it\
    \ gets a `\"Car\"` back. This way, we can write the logic in one place only and\
    \ test it easily while it's isolated nicely from the rest of the codebase.\n\n\
    ## MVC\n\nImportant\n\nSince this book is about testing and not architectures,\
    \ I only want to go over the next parts in general to make you move to more testable\
    \ design patterns. Many books are discussing these topics, and I recommend you\
    \ invest some time studying it in case `MVC`, `MVVM`, `MVP`, and `VIPER` are strange\
    \ words for you.\n\nOne of the first things junior developers struggle with is\
    \ responsibilities' distribution or, in simple words, \"Where do I put this code\
    \ snippet?\" question.\n\nThe `MVC` pattern is considered to be the simplest pattern\
    \ to follow, and Apple itself recommends it.\n\n`MVC` stands for `Model-View-Controller`,\
    \ and it is common not only in Apple development environments but in other platforms\
    \ as well.\n\nAlthough `MVC` is not the best pattern for tests to be based on,\
    \ it's still quite popular, and you should know how to make it testable as much\
    \ as you can. Also, `MVC` is what the other patterns are based on, so knowing\
    \ it better can help you work with more sophisticated design patterns in the future.\n\
    \nSo, what is `MVC` (`Model-View-Controller`)? It's a design pattern that separates\
    \ the business logic and data (\"`Model`\") from the UI (\"`View`\"), while the\
    \ `Controller` is the \"glue\" between them.\n\nTo understand how the interaction\
    \ between the components works, take a look at Figure [6-3](#496602_1_En_6_Chapter.xhtml#Fig3).\n\
    \n![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig3_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3\n\n`MVC` pattern\n\nIf you notice, the `Model` and the `View` don't\
    \ interact with each other. In real `MVC` pattern, the `Model` and the `View`\
    \ don't even have a reference to each other, and all the interaction happens with\
    \ the `controller`.\n\nHere are examples of a flow to demonstrate it:\n\n*   The\
    \ user taps a button (the `View` is sending the action to the `controller`).\n\
    *   The app makes a network request. The `controller` decides to get the information\
    \ and asks for the network layer (which represents the `Model` in this case) to\
    \ make a request.\n*   The network layer (again, the `Model` in this case) makes\
    \ the request and returns the results to the `controller`.\n*   The `controller`\
    \ updates the `TableView` (which is also a part of the `View`) with new data.\n\
    \nFrom the flow described earlier, it's clear that the `View` layer (`Button`\
    \ and `TableView`) doesn't become aware of the `Model` (`Network Layer`), and\
    \ the `controller` acts as the middleman here.\n\nBut when we develop an app,\
    \ what exactly are `Model`, `View`, and `Controller`?\n\n### The Model – M\n\n\
    The `Model` layers hold the app's data, but not only that. There are many examples\
    \ of the `Model` layer:\n\n*   `Network Layer` – Usually a singleton, responsible\
    \ for handling network requests and error handling.\n*   `Managers` and `Services`\
    \ – There are many names for those types of classes: \"`Manager`\", \"`Logic`\"\
    , or \"`Service`\", but at the end, it's those classes that hold the business\
    \ logic and act as a wrapper for other APIs such as `UserDefaults` or `Keychain`.\n\
    *   `Database Layer` – Similar to the `Network Layer`, the `Database layer` is\
    \ usually a singleton, whether it's based on `CoreData` or `SQLite`.\n\nThere\
    \ are more examples for `Model` classes, but the rule thumb is, basically, if\
    \ it doesn't interact with the user or the UI, it's probably part of the `Model`\
    \ layer.\n\n### The View – V\n\nThe `view` layer contains all the objects that\
    \ you see on the user screen and objects that support them. Among the examples\
    \ are classes that are subclasses of `UIView` like `UIButton`, `UITableView`,\
    \ and more. But not only are views part of this layer – you can also find transitions,\
    \ `Core Graphics` code, animation, layouts, images, and colors.\n\nImportantly,\
    \ the `View` doesn't contain any business logic or interacts with the `model`\
    \ layer. It doesn't mean `View` classes are dumb – they are not. There are examples\
    \ of very sophisticated views, such as `MKMapView`, `UICollectionView`, and `UITableView`.\
    \ But `Views` are not familiar with the logic of the data and the app and theoretically\
    \ can be transferred to other apps without special modifications.\n\n### The Controller\
    \ – C\n\nYou already know by now that the `Controller` is responsible for connecting\
    \ the `view` and the `model` layers. When we're talking about \"`Controller`\"\
    \ in iOS apps, we usually mean \"`UIViewController`\".\n\nThe `UIViewController`\
    \ is the layer that connects the UI and the `Model`, and this is why `UIViewController`\
    \ usually represents a screen in the app and has its own life cycle.\n\n`Controller`\
    \ can be any class that connects UI to `Model`, not just `UIViewController`. For\
    \ example, you can connect a progress bar to an audio player class with a `controller`.\
    \ The progress bar doesn't know anything about the audio player, and the audio\
    \ player doesn't know anything about the UI it needs to update. But the `Controller`\
    \ wires them together.\n\nNote\n\nThe root view inside the `UIViewController`\
    \ is not part of the \"`Controller`\" layer. It is considered to be part of the\
    \ `View` layer; therefore it also doesn't need to be aware of the \"`Model`.\"\
    \n\n### The Problem with MVC\n\nOne of the pitfalls `MVC` has is that it can lead\
    \ to other `MVC` form – `Massive View Controller`.\n\n`UIViewControllers` can\
    \ become huge – they might contain business logic, persistent data saving, response\
    \ to user actions, life cycle code, and more. But the biggest problem of all is\
    \ that `MVC` pattern is hard to test.\n\nRemember, most of the things we the developers\
    \ do in mobile development revolve around UI and responding to the UI actions.\
    \ UI elements are hard to use in tests – there's a life cycle you need to mock\
    \ somehow, XIB loading, and layout issues. The line between logic and UI is blurred\
    \ – this is how `MVP`/`MVVM` design patterns were created."
  raw: '### Decorator


    Decorator is a popular design pattern that modifies the behavior of an object
    without changing its interface or its code.


    The Decorator is an object that wraps the core object and has the same interface.
    The Decorator acts as a “middleman” and by that can “decorate” the behavior of
    the original object.


    The Decorator is useful in situations when you cannot or don’t want to change
    the code of an existing class. Frameworks and legacy code are good examples of
    a situation like that.


    For the “client” that uses a Decorator, it doesn’t matter if it works with the
    original class or a decorator since they both use the same interface.


    Another way to decorate an object other than wrapping it is to use Swift extensions
    or Objective-C Categories. Both are good examples for not modifying an existing
    code but expanding it.


    ### Factory


    Factory is a design pattern that encapsulates the object creation process. It
    implements several principles, like single responsibility and isolation.


    The basic form of a Factory is an object that creates other objects – for example,
    if you have a table view with different kinds of cells, you can create a cell
    factory to create those cells according to their corresponding object models.


    But Factory can do more than that – it can decide **what type** of object to return
    based on the arguments it gets. Let’s say we want to create a car factory that
    produces a car according to a customer needs:


    ```

    struct Mazda : Car {

    }

    struct Toyota : Car {

    }

    struct BMW : Car {

    }

    class CarsFactory {

    func getCar(accordingTo customerNeeds : CustomerNeeds)->Car {

    switch customerNeeds.typeRequested {

    case .mazda:

    return Mazda()

    case .toyota:

    return Toyota()

    case .bmw:

    return BMW()

    }

    }

    }

    ```


    As you can see from the preceding code, the CarsFactory encapsulates the logic
    of the decision what type of struct to return by examining the received customer
    needs. The caller for the getCar method doesn’t care about the implementation
    as long as it gets a “Car” back. This way, we can write the logic in one place
    only and test it easily while it’s isolated nicely from the rest of the codebase.


    ## MVC


    Important


    Since this book is about testing and not architectures, I only want to go over
    the next parts in general to make you move to more testable design patterns. Many
    books are discussing these topics, and I recommend you invest some time studying
    it in case MVC, MVVM, MVP, and VIPER are strange words for you.


    One of the first things junior developers struggle with is responsibilities’ distribution
    or, in simple words, “Where do I put this code snippet?” question.


    The MVC pattern is considered to be the simplest pattern to follow, and Apple
    itself recommends it.


    MVC stands for Model-View-Controller, and it is common not only in Apple development
    environments but in other platforms as well.


    Although MVC is not the best pattern for tests to be based on, it’s still quite
    popular, and you should know how to make it testable as much as you can. Also,
    MVC is what the other patterns are based on, so knowing it better can help you
    work with more sophisticated design patterns in the future.


    So, what is MVC (Model-View-Controller)? It’s a design pattern that separates
    the business logic and data (“Model”) from the UI (“View”), while the Controller
    is the “glue” between them.


    To understand how the interaction between the components works, take a look at
    Figure [6-3](#496602_1_En_6_Chapter.xhtml#Fig3).


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig3_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    MVC pattern


    If you notice, the Model and the View don’t interact with each other. In real
    MVC pattern, the Model and the View don’t even have a reference to each other,
    and all the interaction happens with the controller.


    Here are examples of a flow to demonstrate it:


    *   The user taps a button (the View is sending the action to the controller).


    *   The app makes a network request. The controller decides to get the information
    and asks for the network layer (which represents the Model in this case) to make
    a request.


    *   The network layer (again, the Model in this case) makes the request and returns
    the results to the controller.


    *   The controller updates the TableView (which is also a part of the View) with
    new data.


    From the flow described earlier, it’s clear that the View layer (Button and TableView)
    doesn’t become aware of the Model (Network Layer), and the controller acts as
    the middleman here.


    But when we develop an app, what exactly are Model, View, and Controller?


    ### The Model – M


    The Model layers hold the app’s data, but not only that. There are many examples
    of the Model layer:


    *   **Network Layer** – Usually a singleton, responsible for handling network
    requests and error handling.


    *   **Managers and Services** – There are many names for those types of classes:
    “Manager”, “Logic”, or “Service”, but at the end, it’s those classes that hold
    the business logic and act as a wrapper for other APIs such as UserDefaults or
    Keychain.


    *   **Database Layer** – Similar to the Network Layer, the Database layer is usually
    a singleton, whether it’s based on CoreData or SQLite.


    There are more examples for Model classes, but the rule thumb is, basically, if
    it doesn’t interact with the user or the UI, it’s probably part of the Model layer.


    ### The View – V


    The view layer contains all the objects that you see on the user screen and objects
    that support them. Among the examples are classes that are subclasses of UIView
    like UIButton, UITableView, and more. But not only are views part of this layer –
    you can also find transitions, Core Graphics code, animation, layouts, images,
    and colors.


    Importantly, the View doesn’t contain any business logic or interacts with the
    model layer. It doesn’t mean View classes are dumb – they are not. There are examples
    of very sophisticated views, such as MKMapView, UICollectionView, and UITableView.
    But Views are not familiar with the logic of the data and the app and theoretically
    can be transferred to other apps without special modifications.


    ### The Controller – C


    You already know by now that the Controller is responsible for connecting the
    view and the model layers. When we’re talking about “Controller” in iOS apps,
    we usually mean “UIViewController”.


    The UIViewController is the layer that connects the UI and the Model, and this
    is why UIViewController usually represents a screen in the app and has its own
    life cycle.


    Controller can be any class that connects UI to Model, not just UIViewController.
    For example, you can connect a progress bar to an audio player class with a controller.
    The progress bar doesn’t know anything about the audio player, and the audio player
    doesn’t know anything about the UI it needs to update. But the Controller wires
    them together.


    Note


    The root view inside the UIViewController is not part of the “Controller” layer.
    It is considered to be part of the View layer; therefore it also doesn’t need
    to be aware of the “Model.”


    ### The Problem with MVC


    One of the pitfalls MVC has is that it can lead to other MVC form – **Massive
    View Controller**.


    UIViewControllers can become huge – they might contain business logic, persistent
    data saving, response to user actions, life cycle code, and more. But the biggest
    problem of all is that MVC pattern is hard to test.


    Remember, most of the things we the developers do in mobile development revolve
    around UI and responding to the UI actions. UI elements are hard to use in tests –
    there’s a life cycle you need to mock somehow, XIB loading, and layout issues.
    The line between logic and UI is blurred – this is how MVP/MVVM design patterns
    were created.'
  trans: "\n### 装饰器\n\n`Decorator` 是一种流行的设计模式，它可以在不改变对象接口或代码的情况下，修改对象的行为。\n\n`装饰器`\
    \ 是一个包装核心对象且具有相同接口的对象。`装饰器` 充当“中间人”角色，借此可以“装饰”原始对象的行为。\n\n当您无法或不想修改现有类的代码时，`装饰器`\
    \ 非常有用。框架和遗留代码就是这种情况的典型案例。\n\n对于使用 `装饰器` 的“客户端”来说，它与原始类还是与装饰器交互并不重要，因为它们都使用相同的接口。\n\
    \n除了包装对象外，另一种装饰对象的方法是使用 Swift 的 `extensions` 或 Objective-C 的 `Categories`。两者都是不修改现有代码而扩展它的良好范例。\n\
    \n### 工厂\n\n`工厂` 是一种封装对象创建过程的设计模式。它体现了单一职责和隔离等原则。\n\n`工厂` 的基本形式是创建其他对象的对象——例如，如果您有一个包含不同类型单元格的表格视图，您可以创建一个单元格工厂来根据对应的对象模型创建这些单元格。\n\
    \n但 `工厂` 的作用不止于此——它可以根据接收到的参数来决定返回哪种类型的对象。假设我们要创建一个汽车工厂，根据客户需求生产汽车：\n\n```\nstruct\
    \ Mazda : Car {\n}\nstruct Toyota : Car {\n}\nstruct BMW : Car {\n}\nclass CarsFactory\
    \ {\n    func getCar(accordingTo customerNeeds : CustomerNeeds)->Car {\n     \
    \   switch customerNeeds.typeRequested {\n        case .mazda:\n            return\
    \ Mazda()\n        case .toyota:\n            return Toyota()\n        case .bmw:\n\
    \            return BMW()\n        }\n    }\n}\n```\n\n如以上代码所示，`CarsFactory` 通过检查接收到的客户需求，封装了决定返回哪种结构类型的逻辑。调用\
    \ `getCar` 方法的人并不关心其实现，只要它能返回一个 `\"Car\"` 即可。这样，我们可以将逻辑仅写在一个地方，并轻松地进行测试，同时它也能很好地与代码库的其余部分隔离。\n\
    \n## MVC\n\n重要提示\n\n由于本书是关于测试而非架构的，我只想大致介绍接下来的部分，以便让您转向更具可测试性的设计模式。许多书籍都讨论这些主题，我建议您投入一些时间进行研究，以防\
    \ `MVC`、`MVVM`、`MVP` 和 `VIPER` 这些词对您来说还很陌生。\n\n初级开发人员最先遇到的问题之一就是职责分配，或者简单来说，就是“我应该把这段代码放在哪里？”这个问题。\n\
    \n`MVC` 模式被认为是最简单的遵循模式，并且苹果公司自己也推荐它。\n\n`MVC` 代表 `模型-视图-控制器`，它不仅在苹果开发环境中很常见，在其他平台也是如此。\n\
    \n尽管 `MVC` 不是最适合作为测试基础的模式，但它仍然相当流行，您应该知道如何尽可能使其可测试。此外，`MVC` 是其他模式的基础，因此更好地了解它可以帮助您将来使用更复杂的设计模式。\n\
    \n那么，什么是 `MVC`（`模型-视图-控制器`）？它是一种将业务逻辑和数据（\"`模型`\"）与用户界面（\"`视图`\"）分离的设计模式，而 `控制器`\
    \ 是它们之间的“粘合剂”。\n\n要了解各组件之间的交互如何工作，请查看图 6-3。\n\n![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig3_HTML.jpg](img/496602_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3\n\n`MVC` 模式\n\n如果您注意到，`模型` 和 `视图` 彼此之间不直接交互。在真正的 `MVC` 模式中，`模型` 和 `视图`\
    \ 甚至互不引用，所有交互都通过 `控制器` 进行。\n\n以下是一个流程示例来演示这一点：\n\n*   用户点击一个按钮（`视图` 将操作发送给 `控制器`）。\n\
    *   应用程序发起网络请求。`控制器` 决定获取信息，并要求网络层（在此例中代表 `模型`）发出请求。\n*   网络层（同样，此例中为 `模型`）发出请求并将结果返回给\
    \ `控制器`。\n*   `控制器` 用新数据更新 `表格视图`（这也是 `视图` 的一部分）。\n\n从前面描述的流程中可以清楚地看出，`视图` 层（`按钮`\
    \ 和 `表格视图`）并不知道 `模型`（`网络层`）的存在，`控制器` 在这里充当了中间人的角色。\n\n但是当我们开发应用程序时，`模型`、`视图` 和\
    \ `控制器` 具体是什么呢？\n\n### 模型 – M\n\n`模型` 层持有应用程序的数据，但不仅如此。`模型` 层有很多例子：\n\n*   `网络层`\
    \ – 通常是一个单例，负责处理网络请求和错误处理。\n*   `管理器` 和 `服务` – 这类类有很多名称：\"`管理器`\"、\"`逻辑`\"或\"\
    `服务`\"，但归根结底，它们是那些持有业务逻辑并作为其他 API（如 `UserDefaults` 或 `Keychain`）包装器的类。\n*   `数据库层`\
    \ – 类似于 `网络层`，`数据库层` 通常是一个单例，无论它基于 `CoreData` 还是 `SQLite`。\n\n还有更多 `模型` 类的例子，但基本经验法则是，如果它不与用户或用户界面交互，那么它很可能就是\
    \ `模型` 层的一部分。\n\n### 视图 – V\n\n`视图` 层包含用户在屏幕上看到的所有对象以及支持这些对象的对象。其中包括是 `UIView`\
    \ 子类的类，如 `UIButton`、`UITableView` 等。但不仅视图属于这一层——您还可以找到转场、`Core Graphics` 代码、动画、布局、图像和颜色。\n\
    \n重要的是，`视图` 不包含任何业务逻辑，也不与 `模型` 层交互。这并不意味着 `视图` 类是愚蠢的——它们并非如此。有很多非常复杂的视图示例，例如 `MKMapView`、`UICollectionView`\
    \ 和 `UITableView`。但是 `视图` 不熟悉数据和应用程序的逻辑，理论上无需特殊修改即可移植到其他应用程序中。\n\n### 控制器 – C\n\
    \n您现在已经知道，`控制器` 负责连接 `视图` 和 `模型` 层。当我们在 iOS 应用程序中谈论“`控制器`”时，我们通常指的是“`UIViewController`”。\n\
    \n`UIViewController` 是连接用户界面和 `模型` 的层，这就是为什么 `UIViewController` 通常代表应用程序中的一个屏幕，并拥有自己的生命周期。\n\
    \n`控制器` 可以是任何连接用户界面和 `模型` 的类，而不仅仅是 `UIViewController`。例如，您可以使用一个 `控制器` 将进度条与音频播放器类连接起来。进度条对音频播放器一无所知，音频播放器也对其需要更新的用户界面一无所知。但\
    \ `控制器` 将它们连接在一起。\n\n注意\n\n`UIViewController` 内的根视图不属于“`控制器`”层。它被认为是 `视图` 层的一部分；因此，它也不需要了解“`模型`”。\n\
    \n### MVC 的问题\n\n`MVC` 的一个弊端是，它可能导致另一种 `MVC` 形式——`巨大的视图控制器`。\n\n`UIViewController`\
    \ 可能会变得非常庞大——它们可能包含业务逻辑、持久化数据保存、响应用户操作、生命周期代码等。但所有问题中最大的是，`MVC` 模式难以测试。\n\n请记住，我们开发人员在移动开发中做的大部分事情都围绕着用户界面以及响应用户界面操作。用户界面元素在测试中难以使用——需要以某种方式模拟生命周期、XIB\
    \ 加载和布局问题。逻辑和用户界面之间的界限很模糊——这正是 `MVP`/`MVVM` 设计模式被创建出来的原因。\n"
- fmt: '# MVP/MVVM


    我们知道什么是`Model`，也知道什么是`View`。现在我想重点关注**Controller**这个术语。如前所述，`Controller`是管理`Model`和`View`之间数据流的粘合剂。但在
    iOS 中，`Controller`是 UI 的一部分——它包含根视图，拥有`IBOutlets`和`IBActions`，并且是`Storyboard`的一部分。既然`Controller`（我现在可以称它为`UIViewController`吗）是
    UI 的一部分，我们可以谨慎地说它属于**View**层。


    那么什么是“真正的”控制器呢？`MVP`和`MVVM`是两种设计模式，它们遵循大致相同的原则，就是为了解决这个问题而出现的。


    在`MVVM`中，我们可以找到另一个名为**View-Model**的层。在`MVP`中，我们可以找到这个层，但名称不同——**Presenter**。在这两种模式中，当`Presenter`/`View-Model`成为`Controller`层时，`UIViewController`（我们以前的“控制器”）就成了`View`层的一部分。`Presenter`和`View-Model`的主要区别在于它们的实现。


    请查看图 [6-4](#496602_1_En_6_Chapter.xhtml#Fig4) (`MVP`) 和图 [6-5](#496602_1_En_6_Chapter.xhtml#Fig5)
    (`MVVM`)。


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig4_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig4_HTML.jpg)


    图 6-4

    MVP 设计模式


    如图 [6-4](#496602_1_En_6_Chapter.xhtml#Fig4) 和图 [6-5](#496602_1_En_6_Chapter.xhtml#Fig5)
    所示，`MVP`和`MVVM`不仅彼此相似，而且也与`MVC`设计模式相似。


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig5_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig5_HTML.jpg)


    图 6-5

    MVVM 设计模式


    `MVP`/`MVVM`与`MVC`有什么区别呢？嗯，就像`MVC`中的经典`Controller`一样，`Presenter`和`ViewModel`连接到`View`和`Model`，并负责各层之间的更新和数据流。`Presenter`和`ViewModel`与任何
    UI 元素无关，这使得它们更容易测试和维护。


    正如我所说，`MVVM`和`MVP`的主要区别在于它们的实现。


    在`MVP`中，`Presenter`通过协议的形式**持有对`View`的引用**（实际上是`UIViewController`）。在`MVVM`中，`ViewModel`不持有对`View`的任何引用，数据流基于**数据绑定**，这意味着你可以使用`KVO`、闭包或响应式编程框架，如`RxSwift`或`ReactiveCocoa`。


    使用`MVVM`/`MVP`有助于我们更好地遵循**关注点分离**原则。`UIViewController`包含大量的 UI 逻辑，在这种情况下，将其移至`View`部分更有意义。如果你想使你的应用更具可测试性，选择`MVVM`/`MVP`而非`MVC`是一个不错的选择。


    ## VIPER


    对大多数人来说，`VIPER`是一条蛇。但在这里，`VIPER`是`MVVM`/`MVP`的升级版本。


    虽然`MVP`/`MVVM`有三个组件，但`VIPER`还有另外两个组件——`Router`和`Interactor`。让我们看看它是怎样的（图 [6-6](#496602_1_En_6_Chapter.xhtml#Fig6)）。


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig6_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig6_HTML.jpg)


    图 6-6

    VIPER 设计模式


    好吧，我们需要理解这里发生了什么：


    *   我们像`MVP`一样有`View`和`Presenter`。

    *   为了获取数据，`Presenter`会询问一个名为`Interactor`的组件。

    *   `Interactor`会去业务逻辑层请求数据。这个业务逻辑就是模式中的**Entity**部分。`Interactor`接收回数据，并将变化通知给`Presenter`。

    *   `Presenter`根据`Interactor`提供的新数据更新 UI。

    *   `Router`部分负责将用户转换到这个屏幕。


    `VIPER`被认为是更利于测试和扩展的设计模式，因为它通过五个不同的组件实现了关注点分离。在你急着将代码重构为`VIPER`之前，我想在这里强调几点：


    *   `VIPER`应该是一个**基于协议**的架构，意味着所有组件之间的交互都需要仅通过协议进行，而不是直接交互。这对测试非常有帮助，但不仅如此——协议实际上定义了你的架构中的规则和数据流，在这种模块化模式中，这个问题更加关键。

    *   我想解释一下`Interactor`部分，因为它在这里有重要的工作。首先，它需要**转换接收到的数据**（`Entity`）为`Presenter`和
    UI 能够理解并使用的可读格式。`Interactor`应该是唯一“知道”`Entity`并与之交互的组件。`Interactor`的另一项任务是**与业务逻辑和系统服务协同工作**。这可以帮助你轻松地模拟`Presenter`，并模拟许多其他方式无法模拟的情况。

    *   对于简单的屏幕和功能，`VIPER`可能**过于复杂**。尝试根据你构建的功能来适配设计模式。


    ## 不同设计模式的比较


    记住，不存在“最好的设计模式”。所有模式都有利弊，你应该了解它们的差异，以便为自己选择合适的那一个。


    表 [6-1](#496602_1_En_6_Chapter.xhtml#Tab1) 可以帮助你做出正确的决定。


    表 6-1

    设计模式的一般比较


    |          | MVC | **MVP** | **MVVM** | **VIPER** |

    | :------- | :--- | :------ | :------- | :-------- |

    | 职责分配 | 存在问题 | 更好 | 更好 | 最好 |

    | 易用性 | 容易 | 容易 | 可能困难 | 困难 |

    | 可测试性 | 存在问题 | 更好 | 更好 | 最好 |


    如你所见，就测试而言，`VIPER`是最好的模式，而`MVC`对于开发来说更容易。质量不仅仅是测试；它也包括简单性，并非你所有的功能/屏幕都需要采用相同的架构。选择适合你需求的那一个。


    ## 总结


    在开始测试你的应用之前，编写设计更好的代码是关键的一步。本章的主要目标是让你能够模拟不同的组件或轻松测试不同的函数。记住，遵循此处描述的原则比仅仅复制你在这里或其他地方看到的实现更重要。


    接下来——测试不仅基于代码，也基于 UI。这正是下一章的全部内容。


    # 7. 用户界面测试


    > *我不在乎它是否在你的机器上运行！我们不会发布你的机器！*

    >

    > —Vidiu Platon


    ## 引言


    回顾本书的开头，我提到了测试金字塔。如果你还记得的话，与集成测试相比，UI 测试被认为是成本较高且性价比更低的，更不用说单元测试了。


    然而，这并不意味着你应该完全避免 UI 测试。UI 测试在许多流程中都是有益的——从基本的健全性检查到性能测试以及特定屏幕中的用户流程。


    在本章中，你将学习：


    *   UI 测试如何工作，以及它与单元测试和集成测试有何不同

    *   如何编写基本的 UI 测试

    *   如何与屏幕上的元素交互

    *   如何处理 UI 测试中的问题

    *   什么是“页面对象模型”，以及它如何帮助你长期维护测试

    *   如何阅读测试报告、提高其可读性并附加相关的上下文数据

    *   利用 UI 测试的更多功能，例如多应用测试和拖拽操作'
  raw: "## MVP/MVVM\n\nWe know what a Model is, and we know what a View is. I want\
    \ to focus now on the term **Controller**. As I said before, the Controller is\
    \ the glue that manages the data flow between the Model and the View. But in iOS,\
    \ the Controller is part of the UI – it contains the root view, it has IBOutlets\
    \ and IBActions, and it is part of the Storyboard. And since the Controller (may\
    \ I say now **UIView**Controller) is part of the UI, we can cautiously say it\
    \ is part of the **View** layer.\n\nWhat is the “real” controller? MVP and MVVM\
    \ are two design patterns that share roughly the same principles and are here\
    \ to solve this question.\n\nIn MVVM, we can find another layer called **View-Model**\
    \ . In MVP, we can find this layer with another name – **Presenter** . In both\
    \ patterns, the UIViewController (our old “controller”) becomes part of the View\
    \ layer when the Presenter/View-Model becomes the Controller layer. The main difference\
    \ between the Presenter and the View-Model is its implementation.\n\nLook at Figures\
    \ [6-4](#496602_1_En_6_Chapter.xhtml#Fig4) (MVP) and [6-5](#496602_1_En_6_Chapter.xhtml#Fig5)\
    \ (MVVM).\n\n![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig4_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\n\nMVP design pattern\n\nAs you can see in Figures [6-4](#496602_1_En_6_Chapter.xhtml#Fig4)\
    \ and [6-5](#496602_1_En_6_Chapter.xhtml#Fig5), MVP and MVVM are not only similar\
    \ to each other but are also the MVC design pattern.\n\n![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig5_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5\n\nMVVM design pattern\n\nWhat is the difference between MVP/MVVM\
    \ and MVC? Well, just like the classic Controller in MVC, the Presenter and the\
    \ ViewModel are connected to the View and Model and are responsible of the updates\
    \ and data flows between the layers. The Presenter and the ViewModel are clean\
    \ from any UI elements, which makes them much easier to test and maintain.\n\n\
    As I said, the main difference between MVVM and MVP is their implementation.\n\
    \nIn MVP, the Presenter **has a reference to the View** (actually, the UIViewController)\
    \ in the form of a protocol. In MVVM, the ViewModel doesn’t have any reference\
    \ to the View, and the data flow is based on **data binding**, meaning you can\
    \ use KVO, closures, or reactive programming frameworks like RxSwift or ReactiveCocoa.\n\
    \nThe use of MVVM/MVP helps us uphold the principle **of separation of concerns**\
    \ better. The UIViewController contains so much UI logic, and moving it to the\
    \ View part makes so much more sense in this case. If you want to make your app\
    \ more testable, choosing MVVM/MVP over MVC is a good move.\n\n## VIPER\n\nFor\
    \ most people, VIPER is a snake. But in this case, VIPER is an upgraded version\
    \ of MVVM/MVP.\n\nWhile MVP/MVVM has three components, VIPER has two more components –\
    \ the Router and Interactor. Let’s look at how it looks (Figure [6-6](#496602_1_En_6_Chapter.xhtml#Fig6)).\n\
    \n![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig6_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nVIPER design pattern\n\nOK, we need to understand what’s going\
    \ on here:\n\n*   We have the View and the Presenter just like MVP.\n\n*   For\
    \ getting the data, the Presenter asks a component called **Interactor**.\n\n\
    *   The Interactor goes to the business logic and asks for the data. This business\
    \ logic is the **Entity** part of the pattern. The Interactor receives back the\
    \ data and notifies the Presenter with the change.\n\n*   The Presenter updates\
    \ the UI with the new data for the Interactor.\n\n*   The **Router** part is responsible\
    \ for transitioning the user to this screen.\n\nVIPER is considered to be a better\
    \ design pattern for testing and scale because it fulfills the separation of concern\
    \ with five different components. Before you run and refactor your code to VIPER,\
    \ I want to highlight some notes here:\n\n*   VIPER should be a **protocol-based**\
    \ architecture, meaning all the interaction between all components needs to be\
    \ through a protocol only and not directly. This can be very helpful in testing,\
    \ but not only that – the protocol actually defines what the rules and the data\
    \ flow in your architecture are, and in such modular pattern, this issue is much\
    \ more critical.\n\n*   I want to explain the **Interactor** part because it has\
    \ an important job here. First, it needs to **convert the data** it receives (the\
    \ Entity) to a readable format the presenter and the UI can understand and work\
    \ with. The Interactor should be the only component that “knows” the entity and\
    \ interacts with it. Another task the Interactor has is to **work with business\
    \ logic and system services**. This can help you mock your presenter easily and\
    \ simulate many situations you can’t simulate in any other way.\n\n*   VIPER can\
    \ be an **overkill** for simple screens and features. Try to adapt the design\
    \ pattern to the feature you build.\n\n## Comparison Between Different Design\
    \ Patterns\n\nRemember, there isn’t “The Best Design Pattern.” All have cons and\
    \ pros, and you should know the differences to choose the right one for you.\n\
    \nTable [6-1](#496602_1_En_6_Chapter.xhtml#Tab1) can help you make the right decision.\n\
    \nTable 6-1\n\nGeneral Comparison Between the Design Patterns\n\n|   | MVC | **MVP**\
    \ | **MVVM** | **VIPER** |\n| --- | --- | --- | --- | --- |\n| Distribution of\
    \ responsibilities | Problematic | Better | Better | Best |\n| Ease of use | Easy\
    \ | Easy | Can be hard | Hard |\n| Testability | Problematic | Better | Better\
    \ | Best |\n\nAs you can see, VIPER is the best pattern in terms of testing, while\
    \ MVC is easier for development. Quality isn’t just testing; it’s also simple,\
    \ and not all your features/screens need to be with the same architecture. Choose\
    \ the one that is suitable for your needs.\n\n## Summary\n\nWriting a better designed\
    \ code is a crucial step to do before you start testing your app. The main goal\
    \ of the chapter is to get you to the position where you can mock different components\
    \ or easily test different functions. Remember, it is more important to follow\
    \ the principles described here and not just copy the implementation you see here\
    \ or in other places.\n\nNext - tests are not only based on code but also on UI.\
    \ This is what the next chapter is all about.\n\n# 7. User Interface Tests\n\n\
    > *I don’t care if it works on your machine! We are not shipping your machine!*\n\
    > \n> —Vidiu Platon\n\n## Introduction\n\nGoing back to the beginning of the book,\
    \ I mentioned the Testing Pyramid. If you recall, UI tests are considered to be\
    \ pricey and less cost-effective than Integration Tests, not to mention Unit Tests.\n\
    \nNevertheless, it doesn’t mean you should avoid UI Tests altogether. UI Tests\
    \ can be beneficial in many flows – from basic sanity through performance tests\
    \ and user flows in specific screens.\n\nIn this chapter, you will learn\n\n*\
    \   How UI Test works and how it is different from unit and integration tests\n\
    \n*   How to write a basic UI Test\n\n*   How to interact with elements on the\
    \ screen\n\n*   How to deal with issues in UI Tests\n\n*   What is “Page Object\
    \ Model” and how it can help you maintain your tests over time\n\n*   How to read\
    \ your test reports, improve their readability, and attach relevant contextual\
    \ data\n\n*   Take advantage of more features of UI Tests such as multi-app testing\
    \ and dragging"
