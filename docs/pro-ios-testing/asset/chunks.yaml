  trans: '

    ### 为测试创建抽象方法


    这个技巧很直接。我们在本例中创建一个方法（姑且称之为 `runTest`），它负责处理所有繁琐的工作——所有的设置、连接和断言，以及你不想在每个测试中重复执行且与实际被测试数据无关的所有事项。


    对于你实际的测试用例，你为每一个用例创建一个明确的测试方法。这些测试方法不进行断言，而是调用我们的"繁琐"函数，同时传递相关数据。


    下面是一个例子：


    ```

    func runTest(withData events : [Event], expectedLayout : LayoutStructure, file
    : StaticString = #file, line : UInt = #line) {

    // act

    let actualStructure = CalendarLayoutGenerator().generateLayout(events: events)

    // assert

    XCTAssertEqual(actualStructure, expectedLayout, file : file, line : line)

    }

    func testGenerateLayout_abstractMethod1() {

    var events = [Event]()

    events.append(Event(startTime: generateDateFromString(str: "04/27/2020 10:00"),
    endTime: generateDateFromString(str : "04/27/2020 11:00")))

    events.append(Event(startTime: generateDateFromString(str: "04/27/2020 10:30"),
    endTime: generateDateFromString(str : "04/27/2020 11:20")))

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 12:30"),
    endTime: generateDateFromString(str : "04/28/2020 12:30")))

    let expectedLayout = LayoutStructure()

    runTest(withData: events, expectedLayout: LayoutStructure())

    }

    func testGenerateLayout_abstractMethod2() {

    var events = [Event]()

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 10:00"),
    endTime: generateDateFromString(str : "04/28/2020 11:00")))

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 10:30"),
    endTime: generateDateFromString(str : "04/29/2020 11:20")))

    events.append(Event(startTime: generateDateFromString(str: "04/29/2020 12:30"),
    endTime: generateDateFromString(str : "04/30/2020 12:30")))

    let expectedLayout = LayoutStructure()

    runTest(withData: events, expectedLayout: LayoutStructure())

    }

    ```


    在前面的代码示例中，`runTest()` 方法很简单，旨在演示如何在更复杂的测试方法中实现这种模式。


    同时注意，测试方法接收 `file` 和 `line` 参数，以便在测试失败时显示精确的位置。


    ### 从文件加载测试用例


    我们实现参数化单元测试的另一种选择是从文件加载测试用例。


    我们无需为每个用例手动创建测试方法，而是可以创建一个包含所有测试用例数组的 JSON 文件，然后加载并遍历该数组。


    让我们看一个可能的 JSON 文件示例，其中包含几个测试用例：


    ```

    {

    "test":[

    {

    "name":"test1",

    "events":[

    {

    "startDate":"04/27/2020 10:00",

    "endDate":"04/27/2020 11:00"

    },

    {

    "startDate":"04/27/2020 10:30",

    "endDate":"04/27/2020 11:20"

    },

    {

    "startDate":"04/28/2020 12:30",

    "endDate":"04/28/2020 12:30"

    }

    ],

    "expectedStructure":"--==--"

    },

    {

    "name":"test2",

    "events":[

    {

    "startDate":"04/27/2020 10:30",

    "endDate":"04/27/2020 11:30"

    },

    {

    "startDate":"04/27/2020 10:45",

    "endDate":"04/27/2020 11:50"

    },

    {

    "startDate":"04/28/2020 12:20",

    "endDate":"04/28/2020 15:30"

    }

    ],

    "expectedStructure":"--==--"

    }

    ]

    }

    ```


    每个测试用例中 `name` 属性的目的是在发生故障时指向特定的测试用例。从文件加载测试用例有很多优点：


    *   添加更多测试用例**毫不费力**。你可以使用任何编辑器或外部脚本来完成。

    *   验证这些测试也很容易。由于它是 JSON 文件，你的解析代码需要特定的结构来运行测试。想想前面创建越来越多方法的例子，那个过程中出现错误的几率有多大？

    *   任何人都可以编写这些测试。你不需要懂 Swift 甚至编程就能添加更多测试用例。你甚至不需要懂 JSON——可以在 Excel 或其他工具中编写，然后生成
    JSON 文件。当你想让你的 QA 团队参与测试编写时，使用 JSON 非常实用。

    *   将测试保存在一个可读的文件中，当你试图理解正在测试什么以及覆盖了哪些场景时，可以让你的工作更轻松。

    *   这对跨平台测试非常有用。许多工具可以帮助你编写跨平台代码。但如果你坚持在每个平台上编写原生代码，共享测试是确保实现符合相同标准的绝佳方式。


    从 JSON 文件加载数据时需要注意的一点是，你不能为此使用主包。主包仅用于执行代码，而不适用于框架和测试代码。


    你应该这样做：


    ```

    Bundle(for: type(of: self)).path(forResource: "tests", ofType: "json")

    ```


    ### 动态调用测试


    从文件加载测试是一种以可读且易于访问的格式创建许多单元测试的好方法。但我们这里有一个问题；当我们想在运行结束时查看测试报告时，我们只会看到一个测试——即加载文件并循环所有用例的测试方法。


    幸运的是，XCTest 有一个简洁的功能，可以让你动态调用测试，并在运行时将它们添加到测试运行中。


    #### XCTestRun 环境


    在我们继续动态加载测试之前，我们需要了解测试运行时环境。看一下图 4-2。


    ![../images/496602_1_En_4_Chapter/496602_1_En_4_Fig2_HTML.jpg](img/496602_1_En_4_Fig2_HTML.jpg)


    图 4-2


    XCTestRun 环境


    我们之前讨论过测试运行时，但事实上，运行测试是一项需要管理的复杂任务。XCTest 框架使用多种工具来完成这项工作。


    第一个是 `XCTestRun`。`XCTestRun` 是当你启动测试时创建的一个实例。它包含有用的信息，例如测试运行的开始日期、持续时间、失败次数等。同时，文件中表示的
    `XCTestRun` 包含测试和资源的列表。


    在每次测试运行时，我们还有 `XCTestSuite`。`XCTestSuite` 为每个 `XCTestCase` 创建，并根据其所属的对应 `XCTestCase`
    对测试进行分组。


    可以将 `XCTestCase` 视为规划，而 `XCTestSuite` 视为执行。


    同时请记住，正如我们之前讨论的，`XCTestCase` 实例是为每个测试方法创建的。


    每个 `XCTestSuite` 都有一个 `NSInvocations` 列表，用于将消息转发给需要运行的实际测试方法。


    `XCTestSuite` 在运行时自动创建，并由 `XCTestRun` 管理。


    因此，如果我们想在运行时调用测试方法，我们需要找到一种方法在已经创建的 `XCTestSuite` 中调用更多测试。


    如果此刻你对提到的这些"XCT"类感到困惑，这完全正常。让我们尝试通过一些代码示例来理解它。


    #### 第一步 —— 重写 `defaultTestSuite()` 变量


    每个 `XCTestCase` 都有一个名为 `defaultTestSuite()` 的类变量：


    ```

    class var defaultTestSuite : XCTestSuite { get }

    ```


    `XCTestRun` 使用此变量来获取当前 `XCTestCase` 对应的测试套件，并运行其中包含的所有测试。我们需要做的是重写此变量并返回我们自己的
    `XCTestSuite`。


    #### 创建 `XCTestSuite` 对象


    要创建一个基于当前 `XCTestCase` 的相关测试套件，我们需要用当前 `XCTestCase` 子类的名称来初始化它：


    ```

    let testSuite = XCTestSuite(name: NSStringFromClass(self))

    ```


    传递 `XCTestCase` 的类名会创建一个包含源自该测试用例本身的所有测试的测试套件。

    '
- fmt: "# 创建并动态添加新测试用例\n\n现在我们已经有了一个测试套件，可以添加新的测试用例并运行它们。但有些人可能会注意到一个问题——测试方法不能有任何参数，而在我们的例子中，我们需要每次用不同的数据创建一个测试用例。\n\
    \n如果你回忆一下前面的章节，`XCTestRun` 会为它运行的**每个测试方法**创建一个 `XCTestCase` 实例。\n\n例如，如果我们用一个包含四个测试方法的测试用例，我们将会有四个\
    \ `XCTestCase` 实例，每个测试方法一个。\n\n这个机制在这里也适用。对于每个测试方法，我们需要：\n\n*   创建一个新的 `XCTestCase`\
    \ 实例\n*   用测试方法调用初始化它（以将其连接到正确的方法）\n*   使用自定义属性通过数据来定制它\n*   将其添加到测试套件中\n\n虽然听起来可能难以理解，但它其实很简单。让我们看看完整的代码：\n\
    \n```swift\nclass FullNamesGeneratorTests: XCTestCase {\n    var names = [String]()\n\
    \    var expectedFullName = \"\"\n    override class var defaultTestSuite: XCTestSuite\
    \ {\n        get {\n            let testSuite = XCTestSuite(name: NSStringFromClass(self))\n\
    \            addNewTest(withNames: [\"Avi\", \"Tsadok\"], expectedResult: \"Avi\
    \ Tsadok\", testSuite: testSuite)\n            addNewTest(withNames: [\"Bill\"\
    , \"Gates\"], expectedResult: \"Bill Gates\", testSuite: testSuite)\n        \
    \    addNewTest(withNames: [\"Steve\", \"Jobs\"], expectedResult: \"Steve Ballmer\"\
    , testSuite: testSuite)\n            return testSuite\n        }\n    }\n    class\
    \ func addNewTest(withNames names : [String], expectedResult : String, testSuite\
    \ : XCTestSuite) {\n        for invocation in self.testInvocations {\n       \
    \     let newTestCase = FullNamesGeneratorTests(invocation: invocation)\n    \
    \        newTestCase.names = names\n            newTestCase.expectedFullName =\
    \ expectedResult\n            testSuite.addTest(newTestCase)\n        }\n    }\n\
    \    func testFullNameGenerator() {\n        var fullName = \"\"\n        for\
    \ name in names {\n            fullName += name\n            if name != names.last!\
    \ {\n                fullName += \" \"\n            }\n        }\n        XCTAssertEqual(fullName,\
    \ expectedFullName)\n    }\n}\n```\n\n我们这里有什么？让我们一起理解一下。\n\n`FullNamesGeneratorTests`\
    \ 类有两个方法、两个属性和一个类级别的属性。这个类的目标是测试一段代码，该代码接收一个姓名数组并生成一个全名字符串：\n\n*   **`names` 属性**\
    \ —— 这个变量包含我们测试方法的输入。\n*   **`expectedFullName` 属性** —— 这是我们测试方法的预期结果。\n*   **`testFullNameGenerator()`**\
    \ —— 这是类的实际测试方法。它接收 `names` 属性，尝试从中构建一个字符串，然后与 `expectedFullName` 属性进行比较。\n* \
    \  **`addNewTest` 类方法** —— 这个方法遍历所有的类调用（每个测试方法都有一个调用），创建一个新的测试用例，设置其 `names` 和\
    \ `expectedFullName` 属性，并将其添加到接收到的测试套件中。\n*   **类变量 `defaultTestSuite`** —— 在我们创建了一个新的测试套件后，我们扩展其测试列表（使用\
    \ `addNewTest` 函数）并返回修改后的套件。\n\n在运行中调用新测试用例的绝妙之处在于，它会影响我们的测试报告，使其更加可靠和准确。\n\n\
    现在看看我们的测试报告（图 [4-3](#496602_1_En_4_Chapter.xhtml#Fig3)）。\n\n![../images/496602_1_En_4_Chapter/496602_1_En_4_Fig3_HTML.jpg](images/496602_1_En_4_Chapter/496602_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3\n包含三个新测试用例的测试报告\n\n你看到了吗？`testFullNameGenerator` 函数运行了三次，并在第三次运行中失败了。\n\
    \n参数化测试是动态添加更多测试的绝佳方法，无需编写新的测试方法或重复你的代码。这是一个很好的例子，说明如何以动态的方式和遵循 DRY 原则来对待你的测试代码，就像对待“真实代码”一样。\n\
    \n## 总结\n\n在本章中，我们介绍了单元测试中的高级技术，这应该能为你提供工具，快速编写自己可维护且有效的单元测试。\n\n虽然单元测试很重要且必不可少，但你应该记住，我们还需要将应用程序作为一个集成系统进行测试。这就是“集成测试”的作用——让你能更接近用户地测试你的应用程序。\n\
    \n# 集成测试\n\n> *调试的难度是初始编写代码的两倍。因此，如果你的代码写得尽可能巧妙，那么根据定义，你就不够聪明去调试它。*\n>\n> ——Brian\
    \ W. Kernighan\n\n## 引言\n\n在前面的章节中，我们学习了如何测试一个特定的单元。我们讨论了如何将其与应用程序的其余部分隔离，并专注于其具体实现。\n\
    \n然而，我们的项目不仅仅是一堆需要测试的函数。它是一个设计为协同工作的完整系统。\n\n在本章中，你将学习：\n\n*   为什么为你的项目添加集成测试至关重要\n\
    *   集成测试相对于单元测试的成本是什么\n*   如何定义我们测试的范围\n*   如何编写一个简单的集成测试\n*   如何编写增量集成测试\n* \
    \  什么是“自底向上”和“自顶向下”测试\n*   如何编写客户端-服务器测试，包括黑盒测试和白盒测试\n\n## 集成测试背后的理念\n\n集成测试理念的根源可以追溯到多年前，当时开发团队试图构建一个庞大而复杂的系统。问题是每个团队都有自己的使命——开发一个模块，该模块稍后需要集成到一个更大的模块中。虽然每个团队都负责编写单元测试以确保其代码按预期执行，但最大的挑战是将所有模块组合起来。\n\
    \n可以将这个挑战想象成一个拥有非常多才华横溢球员的运动队。球员仅仅状态良好是不够的——他们还需要作为一个团队协同工作，尤其是要加强彼此间的沟通。\n\n\
    ### 什么是集成测试\n\n我们创建的大多数功能都构建在**模块**或**层**之上。这种层的一个例子是 `UIViewController` 代表的 UI\
    \ 层。`Presenter`/`ViewModel` 可以是另一个层。`Interactor`、业务逻辑、日历连接器和网络层是我们应用程序中存在的其他层示例。\n\
    \n事实上，在应用程序中找到五层、六层甚至七层的情况并不少见。\n\n推荐的工作流程是首先单独测试每一层，然后测试所有单元如何协同工作（参见图 [5-1](#496602_1_En_5_Chapter.xhtml#Fig1)）。\n\
    \n![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig1_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1\n集成测试——单独测试每一层，然后测试它们之间的通信\n\n注意，集成测试可以在两个或多个模块之间进行，也可以是整个系统。\n\n### 集成测试\
    \ vs 单元测试\n\n开发人员对集成测试的第一个困惑是如何创建这样的测试。回想一下，在 `XCTest` 中我们只有两种创建测试的方式——UI 测试和单元测试。在这种情况下，集成测试属于单元测试。\n\
    \n另一个困惑是到底什么被认为是**集成**。例如，如果你测试一个依赖于另一个逻辑函数的函数，那是集成吗？再比如说，这个函数使用了你项目中的某个辅助类，那也算是集成吗？毕竟，两个类之间进行了通信——在我看来这像是集成。\n\
    \n然而，在我们的上下文中，并非每个类和函数之间的通信都被视为“集成”。\n\n在 iOS 集成测试中，通常测试的是我们架构中各层之间的集成，这意味着根据数据流来测试这些层，而不仅仅是外部函数或类的使用。\n\
    \n此外，在单元测试中，我们**大量使用测试替身**。并不是说集成测试不包含测试替身——它们确实有，但数量要少得多，而且大多是在边界上（我们稍后会讨论）。"
  raw: "#### Create and Add New Test Cases On the Fly\n\nNow that we have a test suite,\
    \ we can add new test cases and run them. But, some of you might notice a problem\
    \ here – test methods cannot have any parameters, and in our case, we need to\
    \ create a test case with different data each time.\n\nIf you recall from previous\
    \ chapters, XCTestRun creates an XCTestCase instance **for every test method**\
    \ that it runs.\n\nFor example, if we test a case with four test methods, we are\
    \ going to have four XCTestCase instances, one for each test method.\n\nThis mechanism\
    \ also applies here. For every test method, we need to\n\n*   Create a new XCTestCase\
    \ instance\n\n*   Initialize it with the test method invocation (to connect it\
    \ to the right method)\n\n*   Customize it with data using custom properties\n\
    \n*   Add it to the test suite\n\nWhile it might sound difficult to understand,\
    \ it’s quite simple. Let’s see the full code in action:\n\n```\nclass FullNamesGeneratorTests:\
    \ XCTestCase {\nvar names = [String]()\nvar expectedFullName = \"\"\noverride\
    \ class var defaultTestSuite: XCTestSuite {\nget {\nlet testSuite = XCTestSuite(name:\
    \ NSStringFromClass(self))\naddNewTest(withNames: [\"Avi\", \"Tsadok\"], expectedResult:\
    \ \"Avi Tsadok\", testSuite: testSuite)\naddNewTest(withNames: [\"Bill\", \"Gates\"\
    ], expectedResult: \"Bill Gates\", testSuite: testSuite)\naddNewTest(withNames:\
    \ [\"Steve\", \"Jobs\"], expectedResult: \"Steve Ballmer\", testSuite: testSuite)\n\
    return testSuite\n}\n}\nclass func addNewTest(withNames names : [String], expectedResult\
    \ : String, testSuite : XCTestSuite) {\nfor invocation in self.testInvocations\
    \ {\nlet newTestCase = FullNamesGeneratorTests(invocation: invocation)\nnewTestCase.names\
    \ = names\nnewTestCase.expectedFullName = expectedResult\ntestSuite.addTest(newTestCase)\n\
    }\n}\nfunc testFullNameGenerator() {\nvar fullName = \"\"\nfor name in names {\n\
    fullName += name\nif name != names.last! {\nfullName += \" \"\n}\n}\nXCTAssertEqual(fullName,\
    \ expectedFullName)\n}\n}\n```\n\nWhat do we have here? Let’s try to understand\
    \ it together.\n\nThe FullNamesGeneratorTests class has two methods, two properties,\
    \ and one class-level property. The goal of this class is to test a piece of code\
    \ that takes an array of names and produces a full name string:\n\n*   **“names”\
    \ Property** – This variable contains our input for the test method.\n\n*   **“expectedFullName”\
    \ Property** – This is our expected result from the test method.\n\n*   **testFullNameGenerator()** –\
    \ This is the actual test method of the class. It takes the “names” property,\
    \ trying to build a string out of it, and compares it to the “expectedFullName”\
    \ property.\n\n*   **“addNewTest” Class Method** – This method loops all the class\
    \ invocation (there is one invocation for each test method), creates a new test\
    \ case, sets its “names” and “expectedFullName” properties, and adds it to the\
    \ received test suite.\n\n*   **Class Variable defaultTestSuite** – After we create\
    \ a new test suite, we expand its test list (using “addNewTest” function) and\
    \ return the modified suite.\n\nWhat’s excellent with invoking new test cases\
    \ on the run is that it affects our test report and makes it more reliable and\
    \ accurate.\n\nLook at our test report now (Figure [4-3](#496602_1_En_4_Chapter.xhtml#Fig3)).\n\
    \n![../images/496602_1_En_4_Chapter/496602_1_En_4_Fig3_HTML.jpg](images/496602_1_En_4_Chapter/496602_1_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3\n\nTest report with three new test cases\n\nDid you see it? testFullNameGenerator\
    \ function ran three times and failed on the third run.\n\nParameterized tests\
    \ are a great way to dynamically add more and more tests without writing new test\
    \ methods or duplicating your code. It’s an excellent example of how to treat\
    \ your testing code like a “real code,” with a dynamic approach and DRY principle.\n\
    \n## Summary\n\nIn this chapter, we covered advanced techniques in unit testing,\
    \ and this should give you the tools to write your own maintainable and effective\
    \ unit tests quickly.\n\nWhile unit testing is significant and essential, you\
    \ should remember we also need to test our app as an integrated system. This is\
    \ what “Integration Tests” are for – to allow you to test your app closer to the\
    \ user.\n\n# 5. Integration Tests\n\n> *Debugging is twice as hard as writing\
    \ the code in the first place. Therefore, if you write the code as cleverly as\
    \ possible, you are, by definition, not smart enough to debug it.*\n> \n> —Brian\
    \ W. Kernighan\n\n## Introduction\n\nIn the previous chapters, we learned how\
    \ to test a specific unit. We discussed how to isolate it from the rest of the\
    \ app and focus on its specific implementation.\n\nHowever, our project is not\
    \ just a bunch of functions needed to be tested. It’s a whole system designed\
    \ to work together.\n\nIn this chapter, you will learn\n\n*   Why it’s essential\
    \ to add Integration tests to your project\n\n*   What is the cost of Integration\
    \ tests vs. unit tests\n\n*   How to define the scope of our tests\n\n*   How\
    \ to write a simple integration test\n\n*   How to write incremental integration\
    \ tests\n\n*   What is “Bottom-Up” and “Top-Down” testing\n\n*   How to write\
    \ Client-Server tests, including Black Box and White Box\n\n## The Idea Behind\
    \ Integration Tests\n\nThe roots for the idea of integration tests were planted\
    \ years ago, where developer’s teams tried to come up with a big, complicated\
    \ system. The problem was that each team had its mission – to develop a module\
    \ that needed to be integrated later on into a bigger module. While each team\
    \ took care of writing a unit test to make sure its code performs as expected,\
    \ the big challenge was to combine all the modules.\n\nThink of this challenge\
    \ as a sports team with very talented players. It’s not enough for the players\
    \ to be in good shape – they also need to work together as a team, especially\
    \ to improve their communication with each other.\n\n### What Exactly Are Integration\
    \ Tests\n\nMost of the features we create are built upon **modules** or **layers**.\
    \ An example of such a layer is the UI layer represented by UIViewController.\
    \ A presenter/ViewModel can be another layer. Interactor, a business logic, a\
    \ calendar connector, and a network layer are additional examples of layers that\
    \ we have in our app.\n\nIn fact, it’s not unusual to find an app with five, six,\
    \ or even seven layers.\n\nThe recommended workflow is first to test each layer\
    \ of its own and then test how all units work together (see Figure [5-1](#496602_1_En_5_Chapter.xhtml#Fig1)).\n\
    \n![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig1_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nIntegration Tests – Unit Test each layer and then the communication\
    \ between them\n\nNotice that an integration test can be between two modules or\
    \ more or the whole system.\n\n### Integration Tests vs. Unit Tests\n\nThe first\
    \ confusion developers have with integration tests is with the creation of such\
    \ a test. If you recall, we have only two ways to create a test in XCTest – UI\
    \ and Unit Tests. Integration Tests fall under Unit Tests in this case.\n\nAnother\
    \ confusion is what exactly considered to be **an integration**. For instance,\
    \ if you test a function that relies on another logic function, is that an integration?\
    \ And let’s say that this function uses some helper class in your project, is\
    \ that integration as well? After all, two classes talk to each other – sounds\
    \ like integration to me.\n\nWell, not every communication between classes and\
    \ functions is considered being an “integration” in our case.\n\nIn iOS Integration\
    \ Tests, it is common to test integration between layers of our architecture,\
    \ which means testing the layers according to the data flow and not just the use\
    \ of external functions or classes.\n\nAlso, in Unit Tests, we have **heavy use\
    \ of test doubles**. It’s not that integration tests don’t include test doubles –\
    \ they are, but much less and mostly on the edges (we’ll cover that later)."
  trans: "\n# 创建并动态添加新测试用例\n\n现在我们有了一个测试套件，可以添加新的测试用例并运行它们。但有些人可能已经注意到一个问题——测试方法不能有任何参数，而在我们的例子中，我们需要每次使用不同的数据创建一个测试用例。\n\
    \n如果你回忆一下前面的章节，`XCTestRun` 会为它运行的**每个测试方法**创建一个 `XCTestCase` 实例。\n\n例如，如果我们有一个包含四个测试方法的测试用例，我们将会有四个\
    \ `XCTestCase` 实例，每个测试方法对应一个。\n\n这个机制在这里也适用。对于每个测试方法，我们需要：\n\n*   创建一个新的 `XCTestCase`\
    \ 实例\n*   使用测试方法调用进行初始化（以将其连接到正确的方法）\n*   使用自定义属性通过数据来定制它\n*   将其添加到测试套件中\n\n\
    虽然听起来可能有点复杂，但其实很简单。让我们看看完整的代码：\n\n```swift\nclass FullNamesGeneratorTests: XCTestCase\
    \ {\n    var names = [String]()\n    var expectedFullName = \"\"\n    override\
    \ class var defaultTestSuite: XCTestSuite {\n        get {\n            let testSuite\
    \ = XCTestSuite(name: NSStringFromClass(self))\n            addNewTest(withNames:\
    \ [\"Avi\", \"Tsadok\"], expectedResult: \"Avi Tsadok\", testSuite: testSuite)\n\
    \            addNewTest(withNames: [\"Bill\", \"Gates\"], expectedResult: \"Bill\
    \ Gates\", testSuite: testSuite)\n            addNewTest(withNames: [\"Steve\"\
    , \"Jobs\"], expectedResult: \"Steve Ballmer\", testSuite: testSuite)\n      \
    \      return testSuite\n        }\n    }\n    class func addNewTest(withNames\
    \ names : [String], expectedResult : String, testSuite : XCTestSuite) {\n    \
    \    for invocation in self.testInvocations {\n            let newTestCase = FullNamesGeneratorTests(invocation:\
    \ invocation)\n            newTestCase.names = names\n            newTestCase.expectedFullName\
    \ = expectedResult\n            testSuite.addTest(newTestCase)\n        }\n  \
    \  }\n    func testFullNameGenerator() {\n        var fullName = \"\"\n      \
    \  for name in names {\n            fullName += name\n            if name != names.last!\
    \ {\n                fullName += \" \"\n            }\n        }\n        XCTAssertEqual(fullName,\
    \ expectedFullName)\n    }\n}\n```\n\n我们这里有什么？让我们一起理解一下。\n\n`FullNamesGeneratorTests`\
    \ 类有两个方法、两个属性和一个类级别的属性。这个类的目标是测试一段代码，该代码接收一个名字数组并生成一个全名字符串：\n\n*   **`names` 属性**\
    \ —— 这个变量包含我们测试方法的输入。\n*   **`expectedFullName` 属性** —— 这是我们测试方法的预期结果。\n*   **`testFullNameGenerator()`**\
    \ —— 这是类的实际测试方法。它接收 `names` 属性，尝试从中构建一个字符串，然后与 `expectedFullName` 属性进行比较。\n* \
    \  **`addNewTest` 类方法** —— 这个方法遍历所有的类调用（每个测试方法都有一个调用），创建一个新的测试用例，设置其 `names` 和\
    \ `expectedFullName` 属性，并将其添加到接收到的测试套件中。\n*   **类变量 `defaultTestSuite`** —— 在我们创建了一个新的测试套件后，我们扩展其测试列表（使用\
    \ `addNewTest` 函数）并返回修改后的套件。\n\n在运行中调用新测试用例的巧妙之处在于，它会影响我们的测试报告，使其更加可靠和准确。\n\n\
    现在来看看我们的测试报告（图 4-3）。\n\n![../images/496602_1_En_4_Chapter/496602_1_En_4_Fig3_HTML.jpg](img/496602_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3\n包含三个新测试用例的测试报告\n\n看到了吗？`testFullNameGenerator` 函数运行了三次，并在第三次运行时失败了。\n\
    \n参数化测试是一种动态添加更多测试的绝佳方法，无需编写新的测试方法或重复代码。这是一个很好的例子，说明了如何以动态方式和遵循 DRY 原则来对待你的测试代码，就像对待“真实代码”一样。\n\
