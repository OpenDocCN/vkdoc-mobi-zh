- fmt: '# Link Everything Together


    At the beginning of the chapter, I mentioned the term “Schemes.” Schemes let you
    define all the build configurations and options for different types of scenarios.
    You can have multiple schemes that can help you configure different scenarios
    and states for your app. For example, you can have a scheme that works with your
    development environment or a scheme that runs performance tests with an optimized
    code.


    When you look at the top left corner of your Xcode window, next to the “stop”
    button, you can see the scheme menu and the selected scheme.


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig6_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig6_HTML.jpg)


    Scheme’s popup menu in the toolbar


    Tap on the scheme name and select “Edit Scheme” from the popup menu. A box appears
    with the list of available actions and their configurations.


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig7_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig7_HTML.jpg)


    Scheme edit box


    Let’s go over the actions:


    *   **Build** – Compile your app without running it.

    *   **Run** – Build your app and run it either on a simulator or a device.

    *   **Test** – Build your app and run the enabled tests defined in the scheme.

    *   **Profile** – Run your app, and profile it with instruments.

    *   **Analyze** – Build the app with insights about your code.

    *   **Archive** – Build your app and create an IPA file from it to submit to the
    App Store.


    In this chapter, I focus on the Test action. Tapping on the “Test” action displays
    four tabs: **Info**, **Arguments**, **Options**, and **Diagnostics**.


    ## The Info Tab


    **Info** – The Info tab contains general information about your test action in
    the scheme. The two most important settings here are the **Build Configuration**
    and the **list of tests**.


    In `Build Configuration`, you can define if your tests run in `Debug`, `Release`,
    or your custom build configuration. There are cases where this is important –
    for example, sometimes you want to run a test against an optimized code for the
    App Store, or sometimes you want to run your tests with certain flags.


    In the list of tests, you can see all the tests that are relevant for the executable
    product in the scheme. Remember, you can create as many tests as you want, but
    this is the place where you define **what** tests are executed when you test your
    app with this scheme.


    Next to each test in the list, you have an enabled checkbox button that specifies
    if the list runs. On the right, you have a button named “options”. Tap on it,
    and you can set **how** the test runs (again, only in this scheme).


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig8_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig8_HTML.jpg)


    Test options menu in scheme editor


    The options menu is unknown for many developers, and the button may look unimportant,
    but it holds extremely valuable settings.


    ### Parallel Testing


    The first option is the ability to **execute your tests in parallel**. Up until
    Xcode 9, you could only run your tests on one simulator at a time. In Xcode 9,
    Apple gave the ability to run your tests in multiple simulators. Xcode launches
    several simulators and runs the full test bundle on each one of them. Although
    this option speeds up the execution of the tests in case you want to run them
    on different devices, it doesn’t speed up the test bundle itself.


    Xcode 10 finally brings real parallel testing – it launches multiple test runners
    (`Simulators`), and each test runner receives a different test class from executing.
    The number of simulators is a derivative of the number of the available cores
    in the running machines.


    Before you celebrate the parallel testing feature, you should be aware of the
    following:


    *   Parallel testing consumes a lot of **processing power**. If you want to take
    advantage of this feature, it’s better to run it on a heavy machine as part of
    a continuous integration process.

    *   In parallel testing, each simulator receives different test classes. Different
    test classes mean that you **cannot create dependencies** in your tests. For example,
    `testB()` cannot rely on the success of the `testA()` and should run independently.
    Independent tests are important, especially in UI tests, when sometimes tests
    are expected to start in a particular state that is the result of another test.

    *   In case your tests are working against a server, running them in parallel
    can cause **a bottleneck in network requests** and as a result of that timeouts
    and test failures. In general, it’s not the best practice to rely on a network
    in your tests, but sometimes you cannot avoid them in a certain integration and
    edge-to-edge scenarios.


    ### Randomize Execution Order


    In my opinion, “Randomize Execution Order” is a more significant thing than running
    your tests in parallel. While the latter influences the duration of your test
    run, the “randomize execution order” option influences the way you write tests.


    Let me start with a popular hack many developers do when they write tests – in
    many test classes, you may see something like this:


    ```

    func test01() {

    ...

    }

    func test02() {

    ...

    }

    ```


    The hack the developer here tried to do is to make those tests run in a specific
    order. `XCTest` framework **runs tests by the lexicographic order**, and because
    `01` is bigger than `02`, `test01` runs before `test02`.


    Running tests in a constant order can be convenient for some. It can help you
    start the test from the state the previous test ended and save you precious time
    when you want to test user flows. But this feature comes with a price – running
    tests in a constant order creates dependencies between your tests, and this makes
    your test suite much more fragile. Every small change can make one of the tests
    fail and, as a result of that, make the rest of the other tests to fail.


    Tests supposed to run in isolation and not be dependent on an external or previous
    state of another test. The only way to ensure your tests are stable is to turn
    on the “Randomize Execution Order.” Randomizing the test order forces you to write
    independent tests. It’s better to rely on dependency injection and make your code
    more testable.


    ### Location and Application Data


    One of the most challenging tasks in integration and UI Tests is to simulate different
    conditions such as device location and application state. If we could use dependency
    injection in integration tests to somehow solve it, it’s much harder to do that
    in UI Tests. A widespread use case for that is to simulate a particular condition
    for a bug or an edge case hard to debug.


    In the scheme editor under the “test” action, we have two more options: **Location**
    and **Application Data**. Let’s go over them.'
