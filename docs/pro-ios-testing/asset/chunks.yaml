- fmt: '# Too Easy to Fix


    When regular unit tests fail as a result of code changes, we need to define the
    expected result manually. This is a welcome process that forces us to recheck
    our code and verify if it works as expected. Snapshot testing, on the other hand,
    makes this process to be “too easy.” With a click of a button, we delete the associated
    file and create a new snapshot.


    In general, fixing tests shouldn’t be that easy – when you fix a failed snapshot
    test, it actually means you are doing a `manual test` to verify that the function
    (or the state) you are testing is working as expected. And we all know what happens
    when a manual operation is involved in the process – it usually means it’s not
    going to happen.


    # Why My Tests Failed


    Unit tests are usually narrowed. It means that you are checking a specific function
    with a particular condition. So, when you have a failed test, it is really easy
    to understand `why` it failed. This is not always the case with snapshot testing.
    In snapshot testing, we often check a state or a big chunk of serialized data.
    The nature of snapshot testing makes it hard for us to get to the bottom of the
    issue.


    # UI Snapshot Testing with iOSSnapshotTestCase


    One of the areas that snapshot testing really shines is UI Snapshot testing.


    Unlike data snapshot testing, which can be handled easily using TDD, UI snapshot
    testing has a real comparative advantage.


    Imagine the following scenario – you take screenshots of main screens in your
    app, and in every test run, you validate they stay the same at the pixel level.
    This is something that UI designers have trouble to do, not to mention QA testers.


    ## Why Do We Need That?


    UI Screens are very vulnerable. Text changes can affect your UI, changes in reusable
    UI components can break existing screens, and even OS updates can break your UI
    screens.


    Not only that; as mentioned before, sometimes it’s hard to notice those changes
    without making a real diff process.


    ## iOSSnapshotTestCase


    Many, many years ago (actually, it’s only 5–6 years), Facebook developed an open
    source framework named `FBSnapshotTestCase`. After a short period, Facebook ditched
    this project and created a new internal project. Fortunately, Uber took ownership
    of maintaining the framework. Now the framework is named `iOSSnapshotTestCase`,
    and you can find it here: [`https://github.com/uber/ios-snapshot-test-case`](https://github.com/uber/ios-snapshot-test-case).


    ## How Does It Work?


    Once `iOSSnapshotTestCase` is installed, it is elementary to make use of it in
    your app. The process is based on two steps:

    * Run the test in `record mode`, meaning there is no comparison made, just saving
    the initial state to the file system.

    * Change the record mode to `false`, and then run again to see that there are
    no changes vs. the saved snapshot.


    Each test method initializes a view or a CALayer, comparing it to the current
    screenshot it has.


    The expected screenshots are saved in the file system. Each test case has its
    own folder, and every test method has its own file with the name of the method.


    ## Set Up and Run iOSSnapshotTestCase


    Setting up `iOSSnapshotTestCase` is easier than you think.


    The first step is to install the framework using any popular dependency manager,
    for instance, CocoaPods.


    ### Install Using CocoaPods


    Once `CocoaPods` is installed (you are more than welcome to search Google for
    how to install this great dependency manager), it’s easy to add `iOSSnapshotTestCase`
    to your `Podfile`:


    ```

    target ''MyWeatherAppTests'' do

    inherit! :search_paths

    # Pods for testing

    pod ''iOSSnapshotTestCase''

    end

    ```


    Remember to add the framework to your test target and not your primary target.


    ### Defining Environment Variables


    The second step is to configure the environment variables. These variables define
    the folders where our snapshots are saved. It is best practice to set the values
    recommended by the documentation:


    ```

    FB_REFERENCE_IMAGE_DIR = $(SOURCE_ROOT)/$(PROJECT_NAME)Tests/Snapshots/ReferenceImages

    IMAGE_DIFF_DIR = $(SOURCE_ROOT)$/(PROJECT_NAME)Tests/Snapshots/FailureDiffs

    ```


    If you remember, environment variables are set in the scheme editor.


    Notice the format – it adds “`Tests`” right after the project name. That’s because
    the default target name for unit tests is the project name followed by the word
    “Tests”. You just need to make sure that’s the case in your project.


    ### Subclass FBSnapshotTestCase


    Unlike other unit tests, for the snapshot testing to work, you need to subclass
    `FBSnapshotTestCase` (which subclasses `XCTestCase`).


    `FBSnapshotTestCase` handles all the snapshot testing for you.


    The first thing you need to do is to import the `FBSnapshotTestCase` framework:


    ```

    import FBSnapshotTestCase

    ```


    Again, remember that in your `Podfile` you need to include the snapshot framework
    under the test target and not under your primary target.


    Let’s build our first snapshot testing:


    ```

    func testSnapshotMainScreen() {

    // arrange

    let controller = CityWeatherViewController(nibName: "CityWeatherViewController",
    bundle: nil)

    // assert

    FBSnapshotVerifyViewController(controller)

    }

    ```


    Oh, dear, it’s that easy! Yes, snapshot testing (in this case) is only two lines.
    The first line initializes the view controller, and the second line verifies it
    against a snapshot.


    And of course, the problem is that we don’t have a snapshot yet. If we run the
    test as it is, we get an error message.


    To make sure we have a snapshot for a specific function, we need to run the test
    in a record mode. To do that, turn on the record mode under the `setup()` method
    :


    ```

    override func setUp() {

    super.setUp()

    self.recordMode = true

    }

    ```


    `recordMode` goes over the verification functions, and instead of verifying them,
    it creates a snapshot and saves it in the folder defined in your scheme.


    Now, let’s run the test with record mode and see what happens.


    Oh no, another error! Don’t worry; this is perfectly normal. The reason the test
    fails is to remind us that we need to disable the record mode to make sure that
    from now on our test will be verified against a snapshot.


    But first, let’s make sure a snapshot has been saved in our file system.


    Now that we have a snapshot, we can disable record mode


    ```

    override func setUp() {

    super.setUp()

    self.recordMode = false

    }

    ```


    and rerun our test.


    That’s it. Now we can verify our screens automatically.'
