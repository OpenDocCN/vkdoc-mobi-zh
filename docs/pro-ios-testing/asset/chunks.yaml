    ### 测试计划配置


    如果我们打开添加到项目中的新 `My Weather App.xctestplan` 文件，可以看到它只是一个简单的 XML 文件：


    ```

    {

    "configurations" : [

    {

    "id" : "C9003BF5-4AD2-45D6-BB60-30C721C0D075",

    "name" : "Configuration 1",

    "options" : {

    }

    }

    ],

    "defaultOptions" : {

    "codeCoverage" : false

    },

    "testTargets" : [

    {

    "target" : {

    "containerPath" : "container:My Weather App.xcodeproj",

    "identifier" : "9032DE112411A30D00F8F02D",

    "name" : "My Weather AppTests"

    }

    },

    {

    "target" : {

    "containerPath" : "container:My Weather App.xcodeproj",

    "identifier" : "9032DE1C2411A30D00F8F02D",

    "name" : "My Weather AppUITests"

    }

    }

    ],

    "version" : 1

    }

    ```


    尽管我们不应该直接编辑 `.xctestplan` 文件，但可以了解到测试计划其实非常简单。它包含一个配置数组和一个测试目标数组。测试计划还有一个默认选项部分，以防配置本身没有设置这些选项。


    在项目导航器中点击测试计划，将打开测试计划编辑界面（参见图 2-25）。


    如你所见，你可以启用/禁用测试包、测试类和测试函数，就像在方案编辑器中一样。请注意，这里还有一个名为“配置”的新选项卡。如果说“测试”定义了你的测试计划**运行什么**，那么“配置”就定义了测试计划**如何运行**它。一个测试计划配置包含一组值，如位置、区域等，这与方案编辑器中的选项非常相似。重要的区别在于，你可以创建任意多个配置（参见图
    2-26）。


    图 2-26 中的测试计划试图在不同的本地化环境下测试应用。本地化是测试计划发挥用处的一个例子。你可以拥有多个测试计划来处理不同的问题，如内存和性能问题、本地化等。无论何时运行测试计划，Xcode
    都会为每个配置运行一次选定的测试，并且可以创建的配置数量没有限制。不使用测试计划，这是很难做到的事情。


    > 注意

    > 无需逐一介绍测试计划配置中的选项列表，因为本章前面已经介绍过了。


    如果你想禁用某个测试配置使其不运行，请右键点击配置名称并选择“禁用”。


    ### 运行你的测试计划


    由于我们增加了一层复杂性，现在试着简化一下目前学到的内容，以及各个部分是如何联系在一起的（参见图 2-27）。


    从上面的图表中可以看出，一个方案可以有多个测试计划，但当你运行测试时，只有一个会被执行。


    要运行为方案选定的测试计划，请按 `Command + U` 或从测试导航器中运行。


    #### 仅运行一个配置


    如前所述，一个测试计划可以包含许多配置。虽然将它们全部作为持续集成流程的一部分运行很重要，但在开发过程中，你可能只想运行一个配置以节省宝贵的时间。


    在这种情况下，根据特定配置运行测试计划非常容易。


    要做到这一点，右键点击所需的测试函数/类/包并选择所需的配置（参见图 2-28）。


    ## 总结


    从现在开始，方案、目标和测试计划应该是你最好的朋友。深入了解它们可以帮助你根据日常开发流程调整测试，这也是下一章节的先决条件，在下一章我们将学习如何编写各种形式和类型的测试。


    准备好开始测试了吗？


    # 编写测试——基础


    > *注意零。如果有零存在，就会有人用它做除法。*

    >

    > —— Cem Kaner 博士


    ## 引言


    在上一章中，我们学习了如何为测试搭建基础设施。看来我们已经准备好编写了。但是，即使你的代码非常优秀，使用了纯函数和依赖注入，我们仍然需要学习如何编写能够长期维护的、规范的测试的基本知识。


    在本章中，你将学到：


    *   单元测试到底是什么

    *   什么是 `XCTest` 框架和 `XCTestCase` 类

    *   如何配置你的目标和测试包以协同工作

    *   `XCTestCase` 的生命周期及其底层工作原理

    *   如何编写一个简单的单元测试方法及其结构

    *   我们有哪些断言以及如何创建自己的断言

    *   如何测试异步操作


    ## 单元测试到底是什么？


    单元测试是一个函数，它测试特定的一段代码，并在测试结果不符合要求时进行断言。


    当你尝试添加测试时，有两个选项——单元测试和 UI 测试。在这个步骤中，“单元测试”只是一种可以帮助你创建不同类型测试的工具——集成测试、性能测试、回归测试等。


    但从传统意义上讲，“单元测试”是一种软件测试方法。


    单元测试方法的目标是孤立地检查一段代码，而不检查它对其他层或对象的副作用。


    单元测试有几个特点：


    *   它们应该运行得很快。单元测试中不应有任何真正繁重的代码或与服务器或数据库的集成。一个正常的测试套件应该在几秒钟内运行完毕。如果不是这样，你应该检查创建的所有测试是否都是单元测试。

    *   单元测试易于构建。你不应该为了搭建一个单元测试而费很大力气。如果你在这方面花费了太多精力，也许它不是一个单元测试，或者你的代码可测试性不够。在这种情况下，回顾上一章，学习如何提高代码的可测试性。

    *   单元测试需要能够并行运行。隔离是关键。并行运行是确保单元测试没有任何未知副作用的最佳方式，这些副作用不仅会影响其他测试，还可能以不可预测的方式影响你的代码。

    *   单元测试负责检查一个方法甚至是一段特定代码的行为。单元测试不负责检查应用中各层如何协同工作、查找内存泄漏或确保代码运行速度足够快。


    作为日常开发流程的一部分，你应该编写尽可能多的单元测试。如果你编写的代码是可读和清晰的，这不应该是一项困难的任务。


    > 注意

    > 单元测试不是 TDD，TDD 也不是单元测试。开发人员经常混淆这些术语。单元测试是**测试什么**，而 TDD 是**何时测试**。在 TDD 中，你在编写实际代码之前先编写单元测试，并且单元测试被集成在这个流程中。


    ## XCTest 和 XCTestCase


    `XCTest` 是用于为你的应用编写测试的框架。它作为 Xcode 的一部分提供，无需额外设置即可开始编写测试。


    `XCTest` 也是用于创建和执行测试（包括单元测试和 UI 测试）的抽象类的名称。要创建一个新的测试类，我们将使用 `XCTest` 的子类——`XCTestCase`。


    ### XCTestCase


    当我们想要创建一个新的测试类时，需要继承自 `XCTestCase`。在单元测试中，我们通常希望创建一个测试类来对应项目中的一个“常规”类。推荐的命名方式可以是被测类的名称加上“tests”一词。例如，对于一个名为“LoginHandler”的类，我们可以创建一个名为“LoginHandlerTests”的测试类。这可以帮助我们准确理解这个类测试的是什么，也可以防止错误地重复声明相同的类名。

