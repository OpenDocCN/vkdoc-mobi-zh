  trans: "\n# 1. 测试简介\n\n> *如果你不喜欢单元测试你的产品，很可能你的客户也不会喜欢测试它。*\n>\n> ——匿名\n\n## 简介\n\
    \n软件测试是你开发流程的一个补充过程。它可能是长期监控你的工作和项目的唯一方法，因此，它对项目的构建方式和代码的编写方式都有积极影响。\n\n本书将带你从软件测试的入门知识开始，了解如何搭建优秀的基础设施，如何编写优秀、整洁、可测试的代码，当然还包括如何使用多种方式和技术来测试你的代码。\n\
    \n在这第一章中，你将学习：\n*   什么是软件测试\n*   软件测试与我们 iOS 开发者有何关联\n*   为什么它如此重要\n*   我们可以使用哪些主要的不同测试类型\n\
    \n## 如何阅读本书\n\n尽管可以按章节顺序阅读本书，但你无需严格遵循此规则。我建议你从一些理论章节开始，至于实践章节部分，你可以按任何你想要的顺序阅读。\n\
    \n即使你在编写测试方面经验丰富，我相信你也能发现新的有用技巧和令人兴奋的技术，从而提升你的编码和测试技能。\n\n本书提供了大量代码示例，你可以亲自尝试，甚至将它们添加到现有的测试中（如果你已有一些测试的话）。\n\
    \n## 什么是软件测试？\n\n测试是一个旨在获取关于应用程序、功能或函数质量信息的过程。开发人员和 QA 测试人员通过运行一个程序来管理测试，该程序检查你的应用程序代码，并决定它是可以投入生产使用还是存在问题。\n\
    \n测试过程可以通过多种方式检查你的应用程序——产品需求、边界情况、性能、内存、不同屏幕/设备或集成。在许多情况下，测试是持续部署服务或集成的一部分，在自动部署到\
    \ App Store 或 TestFlight 的过程中扮演着重要角色。\n\n## iOS 中的软件测试\n\n如果你尚未编写过测试，测试目标对你来说可能显得陌生。为了让你更熟悉，请看图\
    \ 1-1 中标出的部分。\n\n![../images/496602_1_En_1_Chapter/496602_1_En_1_Fig1_HTML.jpg](img/496602_1_En_1_Fig1_HTML.jpg)\n\
    \n图 1-1 Xcode 项目中的测试目标\n\n这些就是你项目的测试目标，它们的主要使命是帮助你监控代码质量和性能。这是通过使用测试函数来实现的，每个测试函数负责一个特定的用例。\n\
    \n一个测试函数可能看起来像这样：\n\n```\nfunc testPrimeNumberFunction() {\n    // arrange\n \
    \   let number = 7\n    // act\n    let result = MathService().isPrimeFunction(number:\
    \ number)\n    // assert\n    XCTAssertTrue(result)\n}\n```\n\n前面的代码是一个简单测试函数的示例，它检查一个名为\
    \ `isPrimeFunction()` 的函数是否能正确工作。\n\n注意\n尽管本书中的所有代码示例都是用 Swift 编写的，但你也可以用 Objective-C\
    \ 编写测试。不过我相信，即使你的 Swift 知识有限，也能理解本书的大多数示例。\n\n作为 iOS 开发者，我们每天都在编写函数。有些函数非常简单，但有些则极其复杂。我们如何确保它们在不同的情况下都能按预期运行？不仅如此，随着项目规模变大，我们如何确保不会随着时间推移而破坏它们？\n\
    \n如果我们认为自己是专业的开发者，那么编写测试就不是一项“可有可无”的任务——而是必须做的。而且，如果我们编写的代码足够整洁，编写测试也会变得轻松直接。\n\
    \n总的来说，你拥有的测试函数越多，你的代码就能得到更好的监控和控制。\n\n本书的目的不仅是向你展示如何编写优秀且实用的测试，也旨在影响你的工作文化。\n"
- fmt: "```markdown\n## Why Is Testing So Important?\n\nIf we want to dig deeper to\
    \ understand the importance of testing in our projects, I can think of several\
    \ reasons:\n\n**Refactoring** – Some think that refactoring is a negative word\
    \ that you do when you have a crisis or just a poorly written piece of code, but\
    \ refactoring is a part of the developer's daily routine. When we write code,\
    \ we do it based on a specific product assumption, SDK version, architecture,\
    \ or our own experience and point of view. But things change rapidly in the technological\
    \ (and especially in the mobile) world. We often find ourselves refactor parts\
    \ of our code every few months and even less. When we write tests, we define how\
    \ our code **behaves** and not how it is written. When we refactor, we need to\
    \ keep the behavior of our code the same, and tests are our guiding angels for\
    \ doing that. Not only that, tests actually “lock” the code at a specific quality\
    \ level, and that’s the way to make sure nothing is broken when we are making\
    \ changes.\n\n**Check Ourselves** – When we write a code or a feature, we need\
    \ to make sure it works as required in all use cases and scenarios. Writing tests\
    \ is a great way to check ourselves and make sure we covered what we need to answer\
    \ the product requirements. It’s also a great way to make sure we covered edge\
    \ cases and use cases that are hard to test manually. For example, let’s say we\
    \ are working on a calendar app, and we need to test how our code performs when\
    \ we have hundreds or even thousands of calendar events. Simulating a device with\
    \ so many events is difficult and time-consuming, not to mention we need to run\
    \ this simulation over and over again. Automating this process by writing a performance\
    \ test is much more efficient and comfortable.\n\n**Prevent Regressions** – Regressions\
    \ in our code can happen not only when we refactor but also when we make small\
    \ changes to a function, update the iOS version, or even install our app on a\
    \ new device. The more we cover, the more chances we will catch regression bugs\
    \ that could find their way into production. Sometimes it’s hard to detect regressions\
    \ in manual testing even if the QA member works with a very detailed test plan.\
    \ For example, snapshot testing (explained later in the chapter) can detect minimal\
    \ changes in the UI, and performance testing can detect changes in the speed of\
    \ our code or memory usage. Also, it’s tough to catch edge case issues when doing\
    \ a standard manual regression testing, much harder than automated tests.\n\n\
    **Better Code Quality** – Tests can help us to come up with different use cases\
    \ our code can bump into. Also, tests can help us measure our code resources (CPU/memory)\
    \ usage and help to reduce it. Code coverage reports can help us detect untested\
    \ parts of the code and can even bring up product issues we didn’t think of just\
    \ by the look on our code. But I believe that the best contribution tests do in\
    \ terms of code quality is make us write better code and, more precisely, better\
    \ architecture. To make our code testable, we need to write a cleaner, more modular,\
    \ and protocol-oriented code, and this is a clean profit.\n\n**Documentation**\
    \ – I’ve got to admit – I hate writing technical documentation for my code. I\
    \ write comments, but only because I have to. Otherwise, I won’t understand what\
    \ I meant to achieve even in the day after I wrote them. Tests are a great way\
    \ to document your code. Think of it – you take a function and explain what is\
    \ expected to happen when you call it with different parameters and in different\
    \ situations. You won't find better documentation of your code than that.\n\n\
    ## What Can We Test?\n\nShort answer – everything.\n\nLong answer – depends.\n\
    \nIf you have a look at the “Software Testing” page in Wikipedia, you can find\
    \ around 20 different types of software testing techniques! But we are here to\
    \ make our life simpler, so we’ll discuss only some of these techniques which\
    \ are mainly relevant for us as iOS developers.\n\n**Unit Tests** – Unit tests\
    \ are the bread and butter of testing. Unit Tests are responsible for testing\
    \ small code pieces of your app, such as methods and functions. The unit tests\
    \ are best for refactors and TDD (Test-Driven Development), and you should write\
    \ as many of them.\n\nThe goal of a unit test is to test a specific function or\
    \ method while ignoring and isolating the function from any possible side effect\
    \ or outer state. Also, they are easy to write, run very fast, can be run in parallel,\
    \ and writing them should be a natural step when developing a feature.\n\n**Integration\
    \ Tests** – If we said that unit tests live in isolation and that they focus on\
    \ testing a specific method, there are cases when we need to test the integration\
    \ between two or more layers of the app.\n\nFor example, sometimes we want to\
    \ test the integration between the presenter/view model and the database layer.\
    \ Integration tests are precisely for that. Some say integration tests are the\
    \ most important tests you can have in your project even more than unit tests\
    \ because, in the end, it doesn’t matter how your unit tests perform, it’s how\
    \ they perform with each other.\n\n**UI Tests** – UI Test refers to our app as\
    \ a black box and uses the accessibility layer to activate it. The basic commands\
    \ can be something like “press here” and “scroll there,” and it’s the closest\
    \ thing to manual testing. Although UI Tests can perform as an edge-to-edge tests\
    \ and can be very useful, they are expensive – they are harder to write and run\
    \ much slower than unit tests. They can also break easily with every feature change.\
    \ Also, since UI Tests can look only at the accessibility layer, they cannot produce\
    \ a code coverage report. Therefore, they are not valid if you want to detect\
    \ untested parts of your code.\n\n**Snapshot UI Testing** – Snapshot testing is\
    \ an addition to UI Testing. The way snapshot testing works is to take a snapshot\
    \ of the screen or the view and compare it to a previously captured snapshot that\
    \ represents the required one. The goal here is to identify any visual changes\
    \ to the app, a task that is hard to do in any other way – for example, buttons’\
    \ positions, font size changes, layout issues, and more.\n\n**Performance Testing**\
    \ – In every project, some methods are doing a massive job. These functions need\
    \ optimization, and one of the best techniques is a performance test. Performance\
    \ test runs your function several times; calculates the average CPU, memory usage,\
    \ and running time; and decides if it passed or failed according to a minimum\
    \ bar you can set in advance.\n\nYou don’t have to cover every part of your project\
    \ with all types of tests. For example, if we are dealing with view controllers\
    \ or view models, we probably want to write **integration tests** to make sure\
    \ everything works as expected when the user interacts with our app. If we need\
    \ to deal with complex functions and classes, we are going to choose **unit tests**\
    \ to cover our functions from all sides. And if these are heavily loaded functions,\
    \ we can also add **performance** tests.\n\nThe secret is to create the right\
    \ mix so that you could monitor your project from different angles and in various\
    \ aspects.\n\n## Summary\n\nWe discussed what software testing is, how it is implemented\
    \ in iOS, and why it’s important. We also talked about different types of tests\
    \ that are relevant for iOS development.\n\nNow, it’s time to pull our sleeves,\
    \ set up our testing infrastructure in Xcode, and integrate it with our project.\n\
    \n# 2. Setting Up Our Infrastructure\n\n> *To an optimist, the glass is half full.\
    \ To a pessimist, the glass is half empty. To a good tester, the glass is twice\
    \ as big as it needs to be.*\n> \n> —Anonymous\n```"
