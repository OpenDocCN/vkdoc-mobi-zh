  raw: '#### Spy


    Spy is the opposite of stub. We use the stub to configure a dependency of the
    object we are testing. In Spy, we want to inspect the side effect of our tested
    code.


    Spy doesn’t return anything; it’s only there to record our calls, and we can use
    that information later in our assertion part – this is why it is called a “Spy.”


    The way a spy works is straightforward. Let’s say we want to test one of the presenter
    methods, and we know this method calls some methods in the view. All we need to
    do is to create a spy, meaning some object that **conforms** to the same protocol
    of the view and records specific calls.


    Look at Figure [4-1](#496602_1_En_4_Chapter.xhtml#Fig1).


    ![../images/496602_1_En_4_Chapter/496602_1_En_4_Fig1_HTML.jpg](images/496602_1_En_4_Chapter/496602_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Spy vs. Stub


    And now the code version:


    ```

    class LoginViewSpy : LoginViewProtocol {

    var messageReceived = ""

    func showMessage(message : String) {

    messageReceived = message

    }

    }

    func testLoginPresenter_whenTappedOnLoginButtonAndNoNetork_showError() {

    // arrange

    let loginPresenter = LoginPresenter()

    let viewSpy = LoginViewSpy()

    loginPresenter.view = viewSpy

    // act

    loginPresenter.onLoginButtonTapped()

    // assert

    let messageReceived = viewSpy.messageReceived

    XCTAssertEqual(messageReceived, "Error. Please check your network")

    }

    ```


    In the preceding code, we have our LoginPresenter that needs to update its view.


    Usually, its View is some kind of a UIViewController that conforms to LoginViewProtocol,
    but in this case, we created a spy. Just a regular class that conforms to the
    same protocol and the presenter doesn’t know he updates the Spy and not the real
    view controller. This Spy saves the message it receives in a variable, and later
    the method asserts and verifies the received message.


    Spies are a widespread test double, and the inspection can go further – you can
    inspect the order of the calls or even how many calls were made.


    #### Mock


    I mentioned earlier that from many developer’s perspective, all test doubles are
    mocks, and this a common mistake. Up until now, we discussed Dummy, Fake, Stub,
    and Spy.


    So, what is a Mock? Well, a mock is a sophisticated and more independent spy.
    Mock also records method call information. But unlike a spy, it knows what to
    expect and does the verification itself.


    In real mocks (it’s weird to name mocks “real”), we define the expectations on
    the setup, and the mocks verify them on the assertion part.


    The mock object usually has a function “verify()” to make sure it meets the expectations.


    Let’s rewrite our test with mock instead of a spy:


    ```

    class LoginViewMock : LoginViewProtocol {

    var expectedMessage = ""

    private var messageReceived = ""

    func showMessage(message : String) {

    messageReceived = message

    }

    func verify()->Bool {

    return messageReceived == expectedMessage

    }

    }

    func testLoginPresenter_whenTappedOnLoginButtonAndNoNetork_showError() {

    // arrange

    let loginPresenter = LoginPresenter()

    let viewMock = LoginViewMock()

    loginPresenter.view = viewMock

    // setup expectations

    viewMock.expectedMessage = "Error. Please check your network"

    // act

    loginPresenter.onLoginButtonTapped()

    // assert

    XCTAssertTrue(viewMock.verify())

    }

    ```


    In the rewritten test method, we are now using a mock instead of a spy. We define
    the expected message, and in the assert part, we are checking the verify() method.
    The comparison between the expected message and the received message is done **inside
    the mock** and not in the test method.


    While this may not sound like a big deal, in fact, it is, especially in unit testing.


    First, remember we talked about the arrange part – we said we need to set up the
    state of the test in that part. But when dealing with mocks, we also need to set
    up its expectations.


    Second, in stubs, we do **state verifications**, meaning we are checking to see
    if the stub made the right calls to the mock. But in mocks, we do **behavior verification**
    . In this case, we don’t care about the actual calls made to the mock, but instead,
    we want to know that the mock object responded right to our “act” part of the
    test.


    #### Complete vs. Partial Mocking


    We have two ways of mocking objects – “complete” and “partial.” In some of the
    examples I presented, we create the test double by conforming to a protocol. In
    other cases, we subclass the original type and override some of its methods. So,
    we see there is a difference in the way we choose how to create our test doubles.


    **Partial Mocking** is when we create a test double while modifying and changing
    the original type (class or struct). The mocking is done by subclassing and overriding
    the specific methods we want to change.


    In **Complete Mocking**, we create our test double from scratch. This is usually
    done by conforming to a protocol, represented the original type.


    In general, partial mocking is closer to the real code and is “less fake.” I think
    that we need to avoid partial mocking. Using partial mocking might be OK in the
    short run, but in the long term, modifying the existing types may encounter problems.
    Working with a modified real object can lead to unexpected behavior, while these
    objects are being changed over time due to code evolution.


    ### Avoid Test Doubles If Possible


    OK. What? We just had a long session about how to create great test doubles to
    help us test our code. So how come I recommend you not to use test doubles if
    possible?


    Well, in many cases (not all!), test doubles consider being a code smell. A code
    smell is an indication of a deeper problem you might have in your code – maybe
    some anti-pattern you are using or a wrong structure. If you heavily rely on test
    doubles for testing, it might be code coupling, and code coupling is not ideal
    for unit testing.


    #### Coupling


    When a type (class/struct) works with another type, we call it **coupling** .
    In general, we want to reduce coupling in our app to the minimum (zero is not
    realistic. After all, it’s a system). Think of two objects that work together –
    the more they know about each other, the more chances this relationship will break
    in the future. Classes evolve and change, and those changes may have impacts on
    other related classes as well.'
  trans: "\n```markdown\n#### 间谍（Spy）\n\n间谍是桩（stub）的反面。我们使用桩来配置被测对象的依赖项。而在间谍中，我们想要检查被测代码产生的**副作用**。\n\
    \n间谍不返回任何值；它只是用来记录我们的调用，我们可以在后续的断言部分使用这些信息——这就是为什么它被称为“间谍”。\n\n间谍的工作方式很直接。假设我们想测试某个展示器的方法，并且我们知道这个方法会调用视图中的一些方法。我们只需要创建一个间谍，即一个符合视图相同协议并能记录特定调用的对象。\n\
    \n请查看图 4-1。\n\n![../images/496602_1_En_4_Chapter/496602_1_En_4_Fig1_HTML.jpg](img/496602_1_En_4_Fig1_HTML.jpg)\n\
    \n**图 4-1** 间谍 vs. 桩\n\n以下是代码版本：\n\n```\nclass LoginViewSpy : LoginViewProtocol\
    \ {\n    var messageReceived = \"\"\n    func showMessage(message : String) {\n\
    \        messageReceived = message\n    }\n}\n\nfunc testLoginPresenter_whenTappedOnLoginButtonAndNoNetork_showError()\
    \ {\n    // 准备（arrange）\n    let loginPresenter = LoginPresenter()\n    let viewSpy\
    \ = LoginViewSpy()\n    loginPresenter.view = viewSpy\n    // 执行（act）\n    loginPresenter.onLoginButtonTapped()\n\
    \    // 断言（assert）\n    let messageReceived = viewSpy.messageReceived\n    XCTAssertEqual(messageReceived,\
    \ \"Error. Please check your network\")\n}\n```\n\n在上述代码中，我们的 `LoginPresenter`\
    \ 需要更新其视图。\n\n通常，它的视图是某种符合 `LoginViewProtocol` 的 `UIViewController`，但在这个例子中，我们创建了一个间谍。这只是一个符合相同协议的普通类，而展示器并不知道它更新的是间谍而非真正的视图控制器。这个间谍将它接收到的消息保存在一个变量中，之后的方法会断言并验证接收到的消息。\n\
    \n间谍是一种广泛使用的测试替身，而且检查可以更进一步——你可以检查调用的顺序，甚至进行了多少次调用。\n\n#### 模拟（Mock）\n\n我前面提到，从许多开发者的角度来看，所有的测试替身都是模拟，这是一个常见的误解。到目前为止，我们讨论了虚拟对象（Dummy）、伪对象（Fake）、桩和间谍。\n\
    \n那么，什么是模拟呢？模拟是一个更复杂、更独立的间谍。模拟也记录方法调用信息。但与间谍不同的是，它知道预期是什么，并且会自行进行验证。\n\n在真正的模拟中（称模拟为“真正”的有点奇怪），我们在设置阶段定义期望，而模拟对象会在断言部分验证这些期望。\n\
    \n模拟对象通常有一个 `verify()` 函数来确保它满足期望。\n\n让我们用模拟代替间谍来重写测试：\n\n```\nclass LoginViewMock\
    \ : LoginViewProtocol {\n    var expectedMessage = \"\"\n    private var messageReceived\
    \ = \"\"\n    func showMessage(message : String) {\n        messageReceived =\
    \ message\n    }\n    func verify()->Bool {\n        return messageReceived ==\
    \ expectedMessage\n    }\n}\n\nfunc testLoginPresenter_whenTappedOnLoginButtonAndNoNetork_showError()\
    \ {\n    // 准备（arrange）\n    let loginPresenter = LoginPresenter()\n    let viewMock\
    \ = LoginViewMock()\n    loginPresenter.view = viewMock\n    // 设置期望\n    viewMock.expectedMessage\
    \ = \"Error. Please check your network\"\n    // 执行（act）\n    loginPresenter.onLoginButtonTapped()\n\
    \    // 断言（assert）\n    XCTAssertTrue(viewMock.verify())\n}\n```\n\n在重写的测试方法中，我们现在使用了模拟而不是间谍。我们定义了期望的消息，在断言部分检查\
    \ `verify()` 方法。预期消息和接收消息之间的比较是在**模拟内部**完成的，而不是在测试方法中。\n\n虽然这听起来可能没什么大不了的，但事实上，尤其是在单元测试中，这很重要。\n\
    \n首先，记得我们谈过准备部分——我们说需要在该部分设置测试的状态。但在处理模拟时，我们还需要设置其期望。\n\n其次，在桩中，我们进行**状态验证**，这意味着我们检查桩是否对模拟进行了正确的调用。但在模拟中，我们进行**行为验证**。在这种情况下，我们不关心对模拟进行的实际调用，而是想知道模拟对象是否正确响应了我们测试的“执行”部分。\n\
    \n#### 完全模拟 vs. 部分模拟\n\n我们有两种模拟对象的方式——“完全”和“部分”。在我展示的一些例子中，我们通过遵循协议来创建测试替身。在其他情况下，我们子类化原始类型并重写其某些方法。因此，我们看到在选择如何创建测试替身的方式上存在差异。\n\
    \n**部分模拟**是指我们在修改和改变原始类型（类或结构体）的同时创建测试替身。通过子类化并重写我们想要改变的特定方法来实现模拟。\n\n在**完全模拟**中，我们从头开始创建测试替身。这通常通过遵循代表原始类型的协议来完成。\n\
    \n总的来说，部分模拟更接近真实代码，且“伪造程度更低”。我认为我们应该避免使用部分模拟。短期内使用部分模拟可能没问题，但从长远来看，修改现有类型可能会遇到问题。使用修改过的真实对象可能导致意外行为，因为这些对象会随着代码的演变而发生变化。\n\
    \n### 尽量避免使用测试替身\n\n好的。什么？我们刚刚花了很长时间讨论了如何创建好的测试替身来帮助我们测试代码。那我怎么会建议你尽量避免使用测试替身呢？\n\
    \n嗯，在许多情况下（并非全部！），大量使用测试替身被认为是一种代码异味。代码异味表明你的代码中可能存在更深层次的问题——可能是你使用的某些反模式或错误的结构。如果你在测试中严重依赖测试替身，那可能是代码耦合的标志，而代码耦合对于单元测试来说并不理想。\n\
    \n#### 耦合\n\n当一个类型（类/结构体）与另一个类型一起工作时，我们称之为**耦合**。通常，我们希望将应用程序中的耦合减少到最小（零是不现实的，毕竟这是一个系统）。试想两个协同工作的对象——它们彼此了解得越多，未来这种关系破裂的可能性就越大。类会演进和变化，这些变化也可能对其他相关类产生影响。\n\
    ```\n"
- fmt: '# Types of Coupling


    But what exactly do we mean when we say “coupled objects”?There are several types
    of coupling – `Subclass`, `Shared Object`, `Dependencies`, and `Side Effects`.


    ## Subclass Coupling


    When a class is inherited from another class, it depended on its superclass, and
    those two classes become coupled. Not only that – the entire inheritance hierarchy
    is coupled. But this is just logical – think how little you know what happens
    when you override a method in a class with five levels of inheritance. Many developers
    subclass when they could just use a protocol instead and reduce coupling.


    ## Shared Objects


    When different objects mutate properties on a shared object, and at the same time,
    they depend on it, they are coupled through the shared objects. Re-think whether
    the shared object is required to be shared. This is one of the drawbacks with
    the `Singleton` pattern – sharing an object throughout the system reduces your
    ability to predict how your code behaves as a system.


    Second, you need to think about restrictions for changing the shared object state –
    what objects allow to change its state and when. The fewer objects can change
    the state, the smaller the coupling is.


    ## Dependencies


    If your class relies on another class without a chance to change it, you’ve got
    a tight coupling here. There are many ways to decouple such a thing – from injecting
    new dependencies, delegate patterns, protocol-based dependency, or even using
    a closure.


    ## Side Effects


    Always examine your code for side effects. If you have a function that modifies
    other object''s properties or changes persistent data, these are side effects.
    Try to reduce side effects to a minimum. Follow the “Single-Responsibility Principle”
    to isolate these side effects to one place and by that loosen the coupling of
    your objects.


    # How to Decouple Existing Code?


    Decoupling an existing code doesn’t have to be a big refactor task. Sometimes
    small changes are enough to reduce the coupling level in your project.


    First, let’s understand what coupling levels are.


    ## Coupling Severity Levels


    We have four levels of severity:


    ### Tightly Coupled


    A class holds a dependency that cannot be replaced at all, not even with the same
    class. “Tightly coupled” usually happens when the dependency is a constant (`let`)
    and cannot be set.


    ### Coupled


    In “coupled,” the dependency relies on a particular class, meaning we can change
    the dependency with an object from the same class or one of its subclasses (unless
    it’s marked as `final`). Although it still considered a coupled relationship,
    it’s much better than tightly coupled. Usually, this can be done by making the
    dependency a public variable or adding a constructor to set the dependency upon
    initializing.


    ### Loosely Coupled


    In loosely coupled, the class is not dependent on a specific class but rather
    a protocol. Loosely coupled expands the spectrum of possibilities even further
    by letting you connect objects without constraining them to their implementation.
    Loosely coupled is the level when you can easily create mocks/stubs and connect
    them during testing. You can also combine different objects with different implementation
    in runtime.


    ### Decoupled


    In the “decoupled” level, the relationship between objects is not based on a class
    type or even a protocol. It doesn’t mean there are no dependencies at all – we
    do have dependencies. But they can communicate through closure or a notification.
    When this is done, not only can you reuse your classes across your project; chances
    are you can also do it between other projects (sometimes with minor changes).


    ## Make Changes to Your Code


    Let’s see how we can change our code to improve our coupling levels.


    Here we have our `LoginPresenter` class:


    ```

    class LoginPresenter {

    let networkClient = NetworkClient()

    }

    ```


    We see this class has a dependency named `networkClient`. Because it’s a `let`
    dependency, this means we cannot change it at all. Therefore, it’s a `Tightly
    Coupled` level. If we want to improve our coupling level, we just need to make
    a small modification – change `let` to `var`:


    ```

    class LoginPresenter {

    var networkClient = NetworkClient()

    }

    ```


    Great! Now we can change the `networkClient` variable to a different object, as
    long as it’s from the same class (`NetworkClient`) or one of its subclasses.


    Now, we are no longer in `Tightly Coupled`, and we upgraded the coupling level
    to `Coupled`. But we don’t have to stop here – we can add one more thing to improve
    it:


    ```

    class LoginPresenter {

    var networkClient : NetworkClientProtocol = NetworkClient()

    }

    ```


    Now our variable is no longer from the type `NetworkClient`. In fact, the `networkClient`
    variable can hold any object that conforms to `NetworkClientProtocol`. This lets
    us connect other objects with different implementation and even mocks and stubs.


    The use of a protocol leverages our coupling level to `Loosely Coupled`.


    As mentioned before, we can skip the three steps and go straight to `Decoupling`
    level, where we can use a closure or a notification.


    In this way, the class that calls the closure or the notification doesn’t care
    about the type or the interface of the dependency. In most cases, it doesn’t even
    care that there is a dependency:


    ```

    typealias doLoginClosure = ()->Void

    class LoginPresenter {

    var doLoginClosure : doLoginClosure?

    func onLoginButtonTapped() {

    doLoginClosure?()

    }

    }

    ```


    The latest example is simple, but it makes the term “Decoupled” much clearer.


    Decoupled objects reduce the number of mocking you need to do in your tests. When
    any object or piece of code can be a dependency, even your testing method can
    implement the desired behavior for your test.


    # There Are More Ways to Reduce Coupling


    Another way to reduce coupling is how you write your functions. The same principles
    we follow on objects can be implemented in functions as well. For example, Pure
    Functions (which we already discussed) are an excellent example of decoupling
    pieces of code from each other.


    The same goes for function size – when you have a function that handles several
    tasks, you are coupling responsibilities together.


    Take a look at the following code:


    ```

    class myScreenPresenter {

    var view : myScreenViewProtocol?

    func onTappedSave(fileURL : URL) {

    NetworkClient.shared.fetchCities {[weak self] (data) in

    try! data?.write(to: fileURL)

    NotificationCenter.default.post(name: NSNotification.Name(rawValue: "DataSavedNotification"),
    object: nil)

    self?.view?.dismiss()

    }

    }

    }

    ```


    The method `onTappedSave()` has too many responsibilities – it goes to the network,
    saves the returned value, posts a notification, and also asks the view to dismiss
    itself. We already know that we need to write single-responsibility functions,
    but this is part of the reason why – we are chaining too many tasks together.
    Not only it’s a bad practice – but it also makes us fake the network client anytime
    we want to test something not related to fetching the requests (like saving or
    processing the data).


    Creating small functions also helps us reduce the use of test doubles by creating
    short pieces of code that, in many cases, don’t need mocks.


    # Comparing


    The assertion part is not always that simple. Comparing `Int`, `Strings`, and
    `Boolean` values is straightforward. But what about comparing your classes? And
    colors? Arrays?


    In some cases, you need to add changes to your code to make your tests easier
    on the assertion part.'
  raw: '##### Types of Coupling


    But what exactly do we mean when we say “coupled objects”?There are several types
    of coupling – **Subclass, Shared Object, Dependencies, and Side Effects**.


    **Subclass Coupling** – When a class is inherited from another class, it depended
    on its superclass, and those two classes become coupled. Not only that – the entire
    inheritance hierarchy is coupled. But this is just logical – think how little
    you know what happens when you override a method in a class with five levels of
    inheritance. Many developers subclass when they could just use a protocol instead
    and reduce coupling.


    **Shared Objects** – When different objects mutate properties on a shared object,
    and at the same time, they depend on it, they are coupled **through the shared
    objects**. Re-think whether the shared object is required to be shared. This is
    one of the drawbacks with the Singleton pattern – sharing an object throughout
    the system reduces your ability to predict how your code behaves as a system.


    Second, you need to think about restrictions for changing the shared object state –
    what objects allow to change its state and when. The fewer objects can change
    the state, the smaller the coupling is.


    **Dependencies** – If your class relies on another class without a chance to change
    it, you’ve got a tight coupling here. There are many ways to decouple such a thing –
    from injecting new dependencies, delegate patterns, protocol-based dependency,
    or even using a closure.


    **Side Effects** – Always examine your code for side effects. If you have a function
    that modifies other object''s properties or changes persistent data, these are
    side effects. Try to reduce side effects to a minimum. Follow the “Single-Responsibility
    Principle” to isolate these side effects to one place and by that loosen the coupling
    of your objects.


