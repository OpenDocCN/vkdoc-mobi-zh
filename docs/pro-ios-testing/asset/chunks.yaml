- fmt: '### Test Plan Configurations


    If we open our new `My Weather App.xctestplan` file that was added to our project,
    we could see it’s just a simple XML file:


    ```

    {

    "configurations" : [

    {

    "id" : "C9003BF5-4AD2-45D6-BB60-30C721C0D075",

    "name" : "Configuration 1",

    "options" : {

    }

    }

    ],

    "defaultOptions" : {

    "codeCoverage" : false

    },

    "testTargets" : [

    {

    "target" : {

    "containerPath" : "container:My Weather App.xcodeproj",

    "identifier" : "9032DE112411A30D00F8F02D",

    "name" : "My Weather AppTests"

    }

    },

    {

    "target" : {

    "containerPath" : "container:My Weather App.xcodeproj",

    "identifier" : "9032DE1C2411A30D00F8F02D",

    "name" : "My Weather AppUITests"

    }

    }

    ],

    "version" : 1

    }

    ```


    Although we are not supposed to edit the `.xctestplan` file directly, we can learn
    that Test Plan is quite simple. It contains an array of configurations and an
    array of test targets. Test Plan also has a default options section in case they
    are not set in the configurations themselves.


    Tapping on the test plan in the project navigator will open the test plan edit
    screen (see Figure [2-25](#496602_1_En_2_Chapter.xhtml#Fig25)).


    As you can see, you can enable/disable test bundles, classes, and functions just
    like you can do in your scheme editor. If you notice, you also have a new tab
    named “Configurations”. If the “Tests” define what your test plan runs, “Configurations”
    define how your test plan runs it. A test plan configuration contains a list of
    values like location, region, and more, very similar to the options you had in
    your scheme editor. The significant difference here is that you can create as
    many configurations as you want (see Figure [2-26](#496602_1_En_2_Chapter.xhtml#Fig26)).


    The test plan in Figure [2-26](#496602_1_En_2_Chapter.xhtml#Fig26) tries to test
    the app in different localization. Localization is one example of how a Test Plan
    can be useful. You can have several test plans that can handle different issues
    such as memory and performance issues, localization, and more. Whenever you run
    a test plan, Xcode runs the selected tests one time for each configuration, and
    there’s no limit on the number of configurations you can create. This is something
    tough to do without using a test plan.


    > Note

    > There’s no need to go over the list of options in a test plan configuration,
    as it was covered earlier in this chapter.


    If you want to disable a test configuration from running, right-click the configuration
    name and select “Disable”.


    ### Running Your Test Plans


    Because we added a new layer of complexity, let’s try to simplify what we have
    learned till now and how everything is linked together (see Figure [2-27](#496602_1_En_2_Chapter.xhtml#Fig27)).


    As you can see from the preceding diagram, a scheme can have multiple test plans,
    but when you run a test, only one of them executes.


    To run the test plan selected for the scheme, press `Command + U` or run it from
    the Test Navigator.


    #### Running Only One Configuration


    As already mentioned, a test plan can contain many configurations. While it’s
    important to run them all as part of a continuous integration flow, during development,
    you may want to run just one configuration to save precious time.


    In that case, it’s effortless to run the test plan according to a specific configuration.


    To do that, right-click the desired test function/class/ bundle and select the
    desired configuration (see Figure [2-28](#496602_1_En_2_Chapter.xhtml#Fig28)).


    ## Summary


    From now on, schemes, targets, and test plans should be your best friends. Knowing
    them well can help you adapt your tests to your daily development flow, and it’s
    a prerequisite for the next chapters where we are going to learn how to write
    tests in all colors and forms.


    Are you ready to start testing?


    # Writing Tests – The Basics


    > *Pay attention to zeros. If there is a zero, someone will divide by it.*

    >

    > —Dr. Cem Kaner


    ## Introduction


    In the previous chapter, we have learned how to set up our infrastructure for
    testing. It seems we are ready to write. But, even when your code is excellent,
    with pure functions and dependency injection, we need to learn the basics of how
    to write proper tests that we can maintain over time.


    In this chapter, you will learn


    *   What exactly are unit tests

    *   What are the `XCTest` framework and `XCTestCase` class

    *   How to configure your target and your test bundle to work together

    *   About the `XCTestCase` life cycle and how it works under the hood

    *   How to write a simple unit test method and how it is built

    *   What assertions we have and how we can create our assertions

    *   How to test asynchronous operations


    ## What Exactly Are Unit Tests?


    Unit Test is a function that tests a specific piece of code and assets in the
    case the results of the test are not according to the requirements.


    When you try to add a test, you have two options – Unit Tests and UI Tests. In
    this step, “Unit Test” is just a tool that can help you create different kinds
    of tests – integration tests, performance tests, regressions tests, and more.


    But “Unit Tests” in the traditional way of meaning is a software testing method.


    The goal of the unit test method is to check a code, isolated, without examining
    its side effects on other layers or objects.


    Unit Tests have several characteristics:


    *   They should run fast. There shouldn’t be any real heavy loaded code in Unit
    Tests or integration with a server or a database. A normal test suite should run
    in seconds. If this is not the case, you should check if all the tests you created
    are unit tests.

    *   Unit Tests are easy to build. You shouldn’t work hard to set up a unit test.
    If it takes too much effort on your side, maybe it’s not a unit test or maybe
    your code is not testable enough. In this case, go over the previous chapter to
    learn how to improve your code testability.

    *   Unit Tests need the ability to run in parallel. Isolation is the key here.
    Running in parallel is the best way to ensure your unit tests don’t have any unknown
    side effects that can influence not just other tests but also your code in an
    unpredictable way.

    *   Unit Tests are in charge of checking the behavior of a method or even a specific
    piece of code. Unit Tests are not supposed to check how layers in your app work
    together, find memory leaks, or make sure your code runs fast enough.


    You should write as many unit tests as you can as part of your daily development
    routine. If you write a readable and clear code, it’s not supposed to be a difficult
    task.


    > Note

    > Unit Tests are not TDD, and TDD is not Unit Tests. Developers often mix those
    terms. Unit Tests are what you test, and TDD is when you test it. In TDD, you
    write your unit test before the actual code, and unit tests are integrated in
    this process.


    ## XCTest and XCTestCase


    `XCTest` is the framework used to write tests for your app. It comes as part of
    your Xcode, and there is no additional setup required to start writing tests.


    `XCTest` is also the name of the abstract class for creating and executing tests,
    both Unit Tests and UI Tests. To create a new test class, we are going to make
    use of `XCTest`’s subclass – `XCTestCase`.


    ### XCTestCase


    When we want to create a new test class, we need to subclass `XCTestCase`. In
    unit tests, we usually want to create one test class to handle one “regular” class
    in our project. The recommended name can be the name of the tested class with
    the addition of the word “tests.” For example, for a class named “LoginHandler”,
    we can create a test class named “LoginHandlerTests”. This can help us understand
    exactly what this class tests and also prevent redeclaration of the same class
    name by mistake.'
