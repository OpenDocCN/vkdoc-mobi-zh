  trans: '

    ### 定义测试范围


    我之前提到过，集成测试指的是层与层之间的数据流。请记住，其中一些层比较难以测试。例如，`网络层`负责与我们的服务器进行通信。这不仅需要网络连接和一个在线的服务器，有时还需要令牌和其他身份验证数据。另一个难以测试的层的例子可能在我们系统的另一端——`UI
    层`。在这一层，我们经常需要从 `XIB` 文件或 `Storyboards` 加载类。


    总的来说，在处理集成测试时，我们需要定义我们的`测试范围`。一方面，测试整个系统（端到端）是理想状态，即从 UI 层一直到服务器。另一方面，这样的测试编写和维护起来更困难，运行速度也更慢。


    看一下示意性的功能架构图（图 5-2）。


    ![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig2_HTML.jpg](img/496602_1_En_5_Fig2_HTML.jpg)


    图 5-2


    集成测试的范围


    图 5-2 展示了一个经典的屏幕架构——从 UI 层一直到 iOS SDK 框架。你可以看到我们可以进行范围广泛的测试，即在 UI 层执行某些操作并检查另一端（例如
    `Core Data`）的影响；或者进行范围较窄的测试——测试部分层，并对系统的其余部分使用测试替身。


    #### 填补空白


    尽管范围较窄的集成测试非常经济高效，但有些人可能会认为它们没有测试整个系统。这可能是对的，但我们可以克服这一点。我们可以轻松地将集成测试划分为不同的测试套件——一个套件可以测试若干层（从
    UI 到应用核心服务），另一个套件则可以专注于客户端-服务器集成测试。


    将集成测试分离到不同的测试类或测试包中，有助于我们以不同的频率运行它们。问题是“这一切麻烦是否值得？”


    #### 就像单元测试与集成测试的比例关系


    如果你还记得第一章的内容，我们讨论了测试金字塔，并且应该在不同的测试套件之间找到合理的平衡。


    我们需要考虑的因素之一是效果与成本之间的比例。请看图 5-3。


    ![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig3_HTML.jpg](img/496602_1_En_5_Fig3_HTML.jpg)


    图 5-3


    不同类型测试的效果


    上图是关于成本与效果之间比例关系的一个粗略估算。如你所见，范围较窄的集成测试比范围广泛的集成测试有用得多，这就像单元测试和集成测试之间的一般区别一样。


    过多的集成测试可能会让你花费大量时间来维护它们，防止它们失效，这比单元测试花费的时间更多。另一方面，测试关键流程可以让你对你的应用和代码更有信心。


    ## 编写集成测试


    从技术上讲，编写集成测试非常类似于编写单元测试。单元测试和 UI 测试是模板的技术名称，而不是它们的方法论名称。集成测试归属于`单元测试`，并使用相同的断言和函数结构。


    然而，集成测试需要更初步的设计过程，以及对功能和屏幕架构更广泛的知识和认识。


    让我们尝试编写第一个集成测试。


    ### 我们的第一个集成测试


    我们有一个基础待办事项应用（图 5-4），只有三个组件。


    ![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig4_HTML.jpg](img/496602_1_En_5_Fig4_HTML.jpg)


    图 5-4


    包含三个层的基础待办事项应用


    我们的待办事项应用由三层构建——UI 层（屏幕本身）、基础业务逻辑，以及负责处理待办事项项状态的 Core Data 持久化存储。


    我们要编写的测试用例是：当用户将一个项目标记为“已勾选”时，该项目也应在我们 `Core Data` 存储中被标记为“已勾选”。显然，这是一个集成测试，旨在验证我们的三个层能够无缝协作。


    让我们看看我们的层应该如何协同工作：


    *   用户按下视图控制器上的“标记”按钮。

    *   业务逻辑接收点击事件并获取对应的项目。

    *   业务逻辑将项目状态属性更新为“已勾选”。

    *   数据连接器在我们的 `CoreData` 持久化存储中更新数据。


    现在来看一下我们的测试方法：


    ```

    func testMarkItemAsChecked_verifySavedInStore() {

    // arrange

    let viewController = ToDoListItemsViewController(nibName: "ToDoListItemsViewController",
    bundle: nil)

    viewController.loadViewIfNeeded()

    let itemID = UUID().uuidString

    _ = CoreDataConnector.shared.insertNewItem(title: "my Item", id: itemID)

    viewController.itemID = itemID

    // act

    viewController.markItemAsCheckedButtonTapped()

    // assert

    let item = CoreDataConnector.shared.getItem(byID: itemID)!

    XCTAssertTrue(item.checked)

    }

    ```


    首先，和单元测试一样，我们也遵循 AAA 模式——准备-执行-断言。


    在“准备”部分，我们初始化了 UI 层，在本例中是一个 `UIViewController`。


    请注意我们在这里进行了一个不寻常的调用：


    ```

    viewController.loadViewIfNeeded()

    ```


    方法 `loadViewIfNeeded()` 强制加载视图，即使我们没有将其添加到屏幕上。这在测试中处理 UI 元素时非常有用。


    在初始化 UI 层之后，我们准备数据库并向核心数据存储中插入一个新项目。


    “`执行`”部分非常简单直接——因为我们在准备部分已经加载了视图，我们所有的 `IBOutlet` 和 `IBAction` 都已连接。我们可以直接调用其
    `IBAction` 来模拟按下标记按钮。


    在`断言`部分，我们直接访问 `DataConnector`，获取相关的 `CoreData` 对象，并断言其“已勾选”值。


    如你所见，我们测试了三个层如何集成，而无需使用任何测试替身。


    但是，有一些事情我们需要注意，尤其是在集成测试中：


    *   **测试结束后始终要清理**。集成测试会改变状态、写入文件和修改数据库。这不仅会影响你运行的下一个测试的结果，也会影响并行运行的其他测试。考虑到你的设备/模拟器上已经保存了一些数据，当你开始测试时，你的应用并不是“干净”的状态。

    *   鉴于上述原因，你需要**将集成测试与其他测试隔离运行**。请记住，你的测试共享相同的资源。最好为每个测试使用不同的持久化存储文件或其他 `UserDefaults`
    设置。

    *   你必须假设**开始测试时应用状态是不可预测的**。如果你管理某些影响测试的认证状态（例如“已登录”），请在测试开始前重置它（你可以使用 `setup()`
    方法）。


    ### 并行运行


    正如你所看到的，在处理共享资源时，并行运行可能会给我们带来麻烦。不过，有一些方法可以克服这一点。


    例如，使用内存中的 `Core Data` 存储可以帮助你将其与其他测试隔离开来。使用不同的 `SQLite` 文件名启动测试也可能很有用。


    ### 集成测试中的故障点


    编写集成测试时，我们面临的挑战之一是当测试失败时，如何确定我们的故障点。


    与单元测试不同，在集成测试中，我们的数据流会经过多个层，其中任何一层都可能是问题的根源。具体来说，问题的根源可能不是某个层本身，而是**两层之间的集成**。幸运的是，一些技巧可以帮助我们定位问题并精确找到失败的地方。

    '
- fmt: "# A Bigger System to Test\n\nIdentifying the fault point may not seem like\
    \ a big issue when dealing with a three-layer architecture. But there are features\
    \ and architectures with five to six layers that are more difficult to integrate\
    \ and debug.\n\nLet’s take a look at such a system (Figure [5-5](#496602_1_En_5_Chapter.xhtml#Fig5)).\n\
    \n![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig5_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig5_HTML.jpg)\n\
    Figure 5-5: A complex feature with five layers\n\nFigure [5-5](#496602_1_En_5_Chapter.xhtml#Fig5)\
    \ describes a design for a feature with five layers, starting from the UI and\
    \ ending with core services that connect to the device calendar and network.\n\
    \nHow do we write an efficient integration test for such an architecture in a\
    \ way that can help us track issues? One approach can be an incremental integration\
    \ test.\n\n## Incremental Integration Test\n\nWe know that testing integration\
    \ between several layers can be an issue, but testing integration between two\
    \ layers is much more straightforward. In Incremental testing, we take our architecture\
    \ and start with the first two layers. At each step, we add one more layer to\
    \ our test and recheck it until we add all of our layers.\n\nIn this way, we are\
    \ re-testing our integration in each step, which makes it easier for us to locate\
    \ the problem.\n\nBut how exactly can we test one layer at a time? After all,\
    \ we are not dealing with Lego cubes.\n\nWell, there are mainly two ways of implementing\
    \ an Incremental Integration Test – Bottom-Up and Top-Down.\n\n### Bottom-Up\n\
    \nIf the UI layer is considered to be the “Top” layer of our architecture, the\
    \ core services layer is the “Bottom” one. When talking about “top” and “bottom,”\
    \ we usually refer to layers that are closer to the user level as “Top” and layers\
    \ that are closer to the system level as “Bottom.”\n\nIn BUA (Bottom-Up Approach),\
    \ we test the integration starting with the Core Services layer and add one more\
    \ layer on top of it until we fully cover the system.\n\nLet’s try to build a\
    \ test suite for our calendar feature (Figure [5-6](#496602_1_En_5_Chapter.xhtml#Fig6)).\n\
    \n![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig6_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig6_HTML.jpg)\n\
    Figure 5-6: BUA test suite for the calendar feature\n\nThe preceding diagram describes\
    \ the list of tests we write to come up with incremental testing to our feature.\
    \ As you can see, we are adding one test in each step. Just like standard unit\
    \ tests, it is recommended that you test each step in a test method of its own\
    \ to separate your tests from each other.\n\nLet’s take a look at how it’s done\
    \ in code:\n\n```\nclass CalendarConnectorSpy : CalendarConnectorProtocol {\n\
    \    var fetchEventsFromDate : Date?\n    var fetchEventsToDate : Date?\n    func\
    \ fetchEvents(fromDate startDate: Date, toDate endDate: Date, visibleCalendars:\
    \ [String]) -> [EventItem] {\n        return []\n    }\n    func clean() {\n \
    \       fetchEventsFromDate = nil\n        fetchEventsToDate = nil\n    }\n}\n\
    \nclass CalendarScreenIntegrationTests: XCTestCase {\n    var startDate : Date\
    \ = Date()\n    var endDate : Date = {\n        return Calendar.current.date(byAdding:\
    \ .hour, value: 1, to: Date())!\n    }()\n    let spy = CalendarConnectorSpy()\n\
    \    \n    override func setUp() {\n        CalendarService.shared.calendarConnector\
    \ = spy\n    }\n    \n    override func tearDown() {\n        CalendarService.shared.calendarConnector\
    \ = CalendarConnector()\n        spy.clean()\n    }\n    \n    func validateDates(file\
    \ : StaticString = #file, line : UInt = #line) {\n        XCTAssertEqual(spy.fetchEventsFromDate!,\
    \ startDate)\n        XCTAssertEqual(spy.fetchEventsToDate!, endDate)\n    }\n\
    \    \n    // ------ testing the bottom layers ---------\n    func testBusinessLogicLayer()\
    \ {\n        // arrange and act\n        _ = CalendarService.shared.fetchEvents(fromDate:\
    \ startDate, toDate: endDate)\n        // assert\n        validateDates()\n  \
    \  }\n    \n    // ---  adding the interactor -------\n    func testInteractorLayer()\
    \ {\n        // arrange\n        let interactor = CalendarScreenInteractor()\n\
    \        // act\n        _ = interactor.fetchEvents(fromDate: startDate, toDate:\
    \ endDate)\n        // assert\n        validateDates()\n    }\n    \n    // ------\
    \ reaching to the UI Login layer\n    func testPresenterLayer() {\n        //\
    \ arrange\n        let presenter = CalendarScreenPresenter()\n        // act\n\
    \        presenter.onDateChange(toDate: startDate)\n        // assert\n      \
    \  validateDates()\n    }\n    \n    // ---------- this is the top layer ---------\n\
    \    func testVCLayer() {\n        // arrange\n        let vc = CalendarScreenViewController(nibName:\
    \ \"CalendarScreenViewController\", bundle: nil)\n        vc.loadViewIfNeeded()\n\
    \        // act\n        vc.tappedDate(date: startDate)\n        // assert\n \
    \       validateDates()()\n    }\n}\n```\n\nLet’s start with the `setUp()` and\
    \ `tearDown()` methods:\n\n```\noverride func setUp() {\n    CalendarService.shared.calendarConnector\
    \ = spy\n}\noverride func tearDown() {\n    CalendarService.shared.gConnector\
    \ = CalendarConnector()\n    spy.clean()\n}\n```\n\nIn calendar features, it’s\
    \ hard to run a broad integration test, mainly because it requires user permissions\
    \ to the calendar itself.\n\nSo, in this case, we create a spy. If you recall,\
    \ a spy is an object that doesn’t return anything, but instead, it records calls\
    \ and information.\n\nWe connect our spy to our `CalendarService` singleton, and\
    \ on the `teardown()` method, we clean it up.\n\nOur first test is related to\
    \ the next layer after the connector layer – the `CalendarService` layer:\n\n\
    ```\nfunc validateDates(file : StaticString = #file, line : UInt = #line) {\n\
    \    XCTAssertEqual(spy.fetchEventsFromDate!, startDate)\n    XCTAssertEqual(spy.fetchEventsToDate!,\
    \ endDate)\n}\nfunc testBusinessLogicLayer() {\n    // arrange and act\n    _\
    \ = CalendarService.shared.fetchEvents(fromDate: startDate, toDate: endDate)\n\
    \    // assert\n    validateDates()\n}\n```\n\nIn our test method, we run the\
    \ `CalendarService` method (`fetchEvents()`), and hopefully, it will fill our\
    \ spy with useful information.\n\nIn order not to repeat ourselves in each test,\
    \ we create a custom assertion method to validate the dates the spy receives,\
    \ just like we’ve learned in previous chapters.\n\nAfter our business logic test\
    \ passed, we can continue to the next layer – the screen interactor:\n\n```\n\
    func testInteractorLayer() {\n    // arrange\n    let interactor = CalendarScreenInteractor()\n\
    \    // act\n    _ = interactor.fetchEvents(fromDate: startDate, toDate: endDate)\n\
    \    // assert\n    validateDates()\n}\n```\n\nSame goes in here – we call the\
    \ `fetchEvents()` method in the interactor and check the spy at the end.\n\nWe\
    \ continue with the test until we reach the last layer – the `UIViewController`.\n\
    \nIn this layer, we simulate the user action:\n\n```\nvc.tappedDate(date: startDate)\n\
    ```\n\nThe Bottom-Up approach is easy to implement and reduces the use of test\
    \ doubles. However, using the Bottom-Up approach is not possible, and you have\
    \ to go with Top-Down Incremental testing.\n\n### Top-Down\n\nThere are cases\
    \ when the bottom layers are not ready yet. In fact, this is the usual situation\
    \ when starting with the development of a new feature. We start by defining the\
    \ interfaces between all layers and then continue to develop it top to bottom.\n\
    \nAs we make progress in our development, we want to make sure our components\
    \ are integrated correctly. Since our bottom layers are not ready yet, we can\
    \ create a stub to replace them and, by that, create incremental tests on the\
    \ go. This approach is called “Top-Down,” and it is usually the approach we take\
    \ during development when there are components that are not ready yet."
  raw: '### A Bigger System to Test


    Identifying the fault point may not seem like a big issue when dealing with a
    three-layer architecture. But there are features and architectures with five to
    six layers that are more difficult to integrate and debug.


    Let’s take a look at such a system (Figure [5-5](#496602_1_En_5_Chapter.xhtml#Fig5)).


    ![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig5_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    A complex feature with five layers


    Figure [5-5](#496602_1_En_5_Chapter.xhtml#Fig5) describes a design for a feature
    with five layers, starting from the UI and ending with core services that connect
    to the device calendar and network.


    How do we write an efficient integration test for such an architecture in a way
    that can help us track issues? One approach can be an **incremental integration
    test**.


    #### Incremental Integration Test


    We know that testing integration between several layers can be an issue, but testing
    integration between two layers is much more straightforward. In Incremental testing,
    we take our architecture and start with the first two layers. At each step, we
    add one more layer to our test and recheck it until we add all of our layers.


    In this way, we are re-testing our integration in each step, which makes it easier
    for us to locate the problem.


    But how exactly can we test one layer at a time? After all, we are not dealing
    with Lego cubes.


    Well, there are mainly two ways of implementing an Incremental Integration Test –
    **Bottom-Up** and **Top-Down**.


    ##### Bottom-Up


    If the UI layer is considered to be the “Top” layer of our architecture, the core
    services layer is the “Bottom” one. When talking about “top” and “bottom,” we
    usually refer to layers that are closer to the user level as “Top” and layers
    that are closer to the system level as “Bottom.”


    In BUA (Bottom-Up Approach), we test the integration starting with the Core Services
    layer and add one more layer on top of it until we fully cover the system.


    Let’s try to build a test suite for our calendar feature (Figure [5-6](#496602_1_En_5_Chapter.xhtml#Fig6)).


    ![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig6_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    BUA test suite for the calendar feature


    The preceding diagram describes the list of tests we write to come up with incremental
    testing to our feature. As you can see, we are adding one test in each step. Just
    like standard unit tests, it is recommended that you test each step in a test
    method of its own to separate your tests from each other.


    Let’s take a look at how it’s done in code:


    ```

    class CalendarConnectorSpy : CalendarConnectorProtocol {

    var fetchEventsFromDate : Date?

    var fetchEventsToDate : Date?

    func fetchEvents(fromDate startDate: Date, toDate endDate: Date, visibleCalendars:
    [String]) -> [EventItem] {

    return []

    }

    func clean() {

    fetchEventsFromDate = nil

    fetchEventsToDate = nil

    }

    }

    class CalendarScreenIntegrationTests: XCTestCase {

    var startDate : Date = Date()

    var endDate : Date = {

    return Calendar.current.date(byAdding: .hour, value: 1, to: Date())!

    }()

    let spy = CalendarConnectorSpy()

    override func setUp() {

    CalendarService.shared.calendarConnector = spy

    }

    override func tearDown() {

    CalendarService.shared.calendarConnector = CalendarConnector()

    spy.clean()

    }

    func validateDates(file : StaticString = #file, line : UInt = #line) {

    XCTAssertEqual(spy.fetchEventsFromDate!, startDate)

    XCTAssertEqual(spy.fetchEventsToDate!, endDate)

    }

    // ------ testing the bottom layers ---------

    func testBusinessLogicLayer() {

    // arrange and act

    _ = CalendarService.shared.fetchEvents(fromDate: startDate, toDate: endDate)

    // assert

    validateDates()

    }

    // ---  adding the interactor -------

    func testInteractorLayer() {

    // arrange

    let interactor = CalendarScreenInteractor()

    // act

    _ = interactor.fetchEvents(fromDate: startDate, toDate: endDate)

    // assert

    validateDates()

    }

    // ------ reaching to the UI Login layer

    func testPresenterLayer() {

    // arrange

    let presenter = CalendarScreenPresenter()

    // act

    presenter.onDateChange(toDate: startDate)

    // assert

    validateDates()

    }

    // ---------- this is the top layer ---------

    func testVCLayer() {

    // arrange

    let vc = CalendarScreenViewController(nibName: "CalendarScreenViewController",
    bundle: nil)

    vc.loadViewIfNeeded()

    // act

    vc.tappedDate(date: startDate)

    // assert

    validateDates()()

    }

    }

    ```


    Let’s start with the **setUp()** and **tearDown()** methods:


    ```

    override func setUp() {

    CalendarService.shared.calendarConnector = spy

    }

    override func tearDown() {

    CalendarService.shared.gConnector = CalendarConnector()

    spy.clean()

    }

    ```


    In calendar features, it’s hard to run a broad integration test, mainly because
    it requires user permissions to the calendar itself.


    So, in this case, we create a **spy**. If you recall, a spy is an object that
    doesn’t return anything, but instead, it records calls and information.


    We connect our spy to our CalendarService singleton, and on the teardown() method,
    we clean it up.


    Our first test is related to the next layer after the connector layer – the CalendarService
    layer:


    ```

    func validateDates(file : StaticString = #file, line : UInt = #line) {

    XCTAssertEqual(spy.fetchEventsFromDate!, startDate)

    XCTAssertEqual(spy.fetchEventsToDate!, endDate)

    }

    func testBusinessLogicLayer() {

    // arrange and act

    _ = CalendarService.shared.fetchEvents(fromDate: startDate, toDate: endDate)

    // assert

    validateDates()

    }

    ```


    In our test method, we run the CalendarService method (fetchEvents()), and hopefully,
    it will fill our spy with useful information.


    In order not to repeat ourselves in each test, we create a custom assertion method
    to validate the dates the spy receives, just like we’ve learned in previous chapters.


    After our business logic test passed, we can continue to the next layer – the
    screen interactor:


    ```

    func testInteractorLayer() {

    // arrange

    let interactor = CalendarScreenInteractor()

    // act

    _ = interactor.fetchEvents(fromDate: startDate, toDate: endDate)

    // assert

    validateDates()

    }

    ```


    Same goes in here – we call the fetchEvents() method in the interactor and check
    the spy at the end.


    We continue with the test until we reach the last layer – the UIViewController.


    In this layer, we simulate the user action:


    ```

    vc.tappedDate(date: startDate)

    ```


    The Bottom-Up approach is easy to implement and reduces the use of test doubles.
    However, using the Bottom-Up approach is not possible, and you have to go with
    **Top-Down** Incremental testing.


    ##### Top-Down


    There are cases when the bottom layers are not ready yet. In fact, this is the
    usual situation when starting with the development of a new feature. We start
    by defining the interfaces between all layers and then continue to develop it
    top to bottom.


    As we make progress in our development, we want to make sure our components are
    integrated correctly. Since our bottom layers are not ready yet, we can create
    a **stub** to replace them and, by that, create incremental tests on the go. This
    approach is called “Top-Down,” and it is usually the approach we take during development
    when there are components that are not ready yet.'
  trans: "\n# 一个更庞大的测试系统\n\n在处理三层架构时，定位故障点看起来可能不是什么大问题。但当面对具有五到六层、集成和调试难度更高的功能与架构时，情况就不同了。\n\
    \n让我们来看一个这样的系统（图 5-5）。\n\n![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig5_HTML.jpg](img/496602_1_En_5_Fig5_HTML.jpg)\n\
    图 5-5：一个包含五层的复杂功能\n\n图 5-5 描述了一个五层功能的设计，从 UI 开始，到连接设备日历和网络的核心服务结束。\n\n我们如何为这样的架构编写高效的集成测试，以帮助我们追踪问题？一种方法是进行增量式集成测试。\n\
    \n## 增量式集成测试\n\n我们知道，测试几个层之间的集成可能是个问题，但测试两个层之间的集成就直接得多。在增量式测试中，我们拿架构开刀，从最开始的两个层着手。在每一步中，我们在测试中多添加一个层并重新检查，直到添加完所有的层。\n\
    \n通过这种方式，我们在每一步都重新测试集成，从而更容易定位问题。\n\n但是，如何精确地一次测试一个层呢？毕竟，我们面对的不是乐高积木。\n\n实现增量式集成测试主要有两种方法——**自底向上**和**自顶向下**。\n\
    \n### 自底向上\n\n如果将 UI 层视为我们架构的“顶”层，那么核心服务层就是“底”层。在谈论“顶”和“底”时，我们通常将更接近用户级别的层称为“顶”，将更接近系统级别的层称为“底”。\n\
    \n在 BUA（自底向上方法）中，我们从核心服务层开始测试集成，并在其上不断叠加层，直到完全覆盖系统。\n\n让我们尝试为我们的日历功能构建一个测试套件（图\
    \ 5-6）。\n\n![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig6_HTML.jpg](img/496602_1_En_5_Fig6_HTML.jpg)\n\
    图 5-6：日历功能的 BUA 测试套件\n\n上图描述了为我们的功能进行增量测试所需编写的测试列表。如你所见，我们在每一步都添加一个测试。就像标准单元测试一样，建议你在独立的测试方法中测试每个步骤，以将测试彼此分离。\n\
    \n让我们看看在代码中是如何实现的：\n\n```\nclass CalendarConnectorSpy : CalendarConnectorProtocol\
    \ {\n    var fetchEventsFromDate : Date?\n    var fetchEventsToDate : Date?\n\
    \    func fetchEvents(fromDate startDate: Date, toDate endDate: Date, visibleCalendars:\
    \ [String]) -> [EventItem] {\n        return []\n    }\n    func clean() {\n \
    \       fetchEventsFromDate = nil\n        fetchEventsToDate = nil\n    }\n}\n\
    \nclass CalendarScreenIntegrationTests: XCTestCase {\n    var startDate : Date\
    \ = Date()\n    var endDate : Date = {\n        return Calendar.current.date(byAdding:\
    \ .hour, value: 1, to: Date())!\n    }()\n    let spy = CalendarConnectorSpy()\n\
    \    \n    override func setUp() {\n        CalendarService.shared.calendarConnector\
    \ = spy\n    }\n    \n    override func tearDown() {\n        CalendarService.shared.calendarConnector\
    \ = CalendarConnector()\n        spy.clean()\n    }\n    \n    func validateDates(file\
    \ : StaticString = #file, line : UInt = #line) {\n        XCTAssertEqual(spy.fetchEventsFromDate!,\
    \ startDate)\n        XCTAssertEqual(spy.fetchEventsToDate!, endDate)\n    }\n\
    \    \n    // ------ testing the bottom layers ---------\n    func testBusinessLogicLayer()\
    \ {\n        // arrange and act\n        _ = CalendarService.shared.fetchEvents(fromDate:\
    \ startDate, toDate: endDate)\n        // assert\n        validateDates()\n  \
    \  }\n    \n    // ---  adding the interactor -------\n    func testInteractorLayer()\
    \ {\n        // arrange\n        let interactor = CalendarScreenInteractor()\n\
    \        // act\n        _ = interactor.fetchEvents(fromDate: startDate, toDate:\
    \ endDate)\n        // assert\n        validateDates()\n    }\n    \n    // ------\
    \ reaching to the UI Login layer\n    func testPresenterLayer() {\n        //\
    \ arrange\n        let presenter = CalendarScreenPresenter()\n        // act\n\
    \        presenter.onDateChange(toDate: startDate)\n        // assert\n      \
    \  validateDates()\n    }\n    \n    // ---------- this is the top layer ---------\n\
    \    func testVCLayer() {\n        // arrange\n        let vc = CalendarScreenViewController(nibName:\
    \ \"CalendarScreenViewController\", bundle: nil)\n        vc.loadViewIfNeeded()\n\
    \        // act\n        vc.tappedDate(date: startDate)\n        // assert\n \
    \       validateDates()()\n    }\n}\n```\n\n让我们从 `setUp()` 和 `tearDown()` 方法开始：\n\
    \n```\noverride func setUp() {\n    CalendarService.shared.calendarConnector =\
    \ spy\n}\noverride func tearDown() {\n    CalendarService.shared.gConnector =\
    \ CalendarConnector()\n    spy.clean()\n}\n```\n\n在日历功能中，运行广泛的集成测试很困难，主要是因为它需要用户对日历本身的权限。\n\
    \n所以，在这种情况下，我们创建了一个间谍。如果你还记得的话，间谍是一个不返回任何东西的对象，而是记录调用和信息。\n\n我们将间谍连接到 `CalendarService`\
    \ 单例，并在 `teardown()` 方法中清理它。\n\n我们的第一个测试与连接器层之后的下一个层——`CalendarService` 层相关：\n\
    \n```\nfunc validateDates(file : StaticString = #file, line : UInt = #line) {\n\
    \    XCTAssertEqual(spy.fetchEventsFromDate!, startDate)\n    XCTAssertEqual(spy.fetchEventsToDate!,\
    \ endDate)\n}\nfunc testBusinessLogicLayer() {\n    // arrange and act\n    _\
    \ = CalendarService.shared.fetchEvents(fromDate: startDate, toDate: endDate)\n\
    \    // assert\n    validateDates()\n}\n```\n\n在我们的测试方法中，我们运行 `CalendarService`\
    \ 的 `fetchEvents()` 方法，希望它能用有用的信息填充我们的间谍。\n\n为了不在每个测试中重复，我们创建了一个自定义断言方法来验证间谍接收到的日期，就像我们在前几章学的那样。\n\
    \n在我们的业务逻辑测试通过之后，我们可以继续下一个层——屏幕交互器：\n\n```\nfunc testInteractorLayer() {\n   \
    \ // arrange\n    let interactor = CalendarScreenInteractor()\n    // act\n  \
    \  _ = interactor.fetchEvents(fromDate: startDate, toDate: endDate)\n    // assert\n\
    \    validateDates()\n}\n```\n\n这里也一样——我们调用交互器中的 `fetchEvents()` 方法，最后检查间谍。\n\n\
    我们继续测试，直到到达最后一层——`UIViewController`。\n\n在这一层，我们模拟用户操作：\n\n```\nvc.tappedDate(date:\
    \ startDate)\n```\n\n自底向上的方法易于实现，并减少了对测试替身的使用。然而，在某些情况下无法使用自底向上的方法，你不得不采用自顶向下的增量测试。\n\
    \n### 自顶向下\n\n有时底层的组件尚未就绪。实际上，在开始开发新功能时，这通常是常态。我们首先定义所有层之间的接口，然后从上到下继续开发。\n\n\
    随着开发的进展，我们希望确保我们的组件正确集成。由于我们的底层尚未就绪，我们可以创建一个存根来替换它们，并以此在路上创建增量测试。这种方法被称为“自顶向下”，当存在尚未就绪的组件时，这通常是我们开发过程中采用的方法。\n"
- fmt: '# Dealing with the Edges


    The most complicated steps in Integration Tests are the first and last – simulating
    the UI behavior on one side and checking the results on the other side, which
    may involve dealing with system frameworks, network, and maybe a persistent store.


    There are some solutions to those parts.


    On the UI side, it is a best practice to avoid calling directly to UI-related
    methods such as `UIScrollView` delegate methods or `UITableView` `dataSource`.
    One solution is to take out the logic from those methods and put it in pure functions.


    In more complex UI screens, you might consider eliminating the UI layer and only
    test the presenter/`ViewModel` classes. It is better to have a narrower test than
    striving with a hard-to-maintain test that has more chances to break in future
    changes.


    On the core services side, avoid including layers that require user permissions
    such as Calendar, Contacts, and Assets Library. Invest time in fake and record
    data instead of finding hacks to bypass access permissions (and there are some
    techniques for that).


    Remember, although it is better to use the actual objects and simulate a real-life
    flow, it is not worth spending a tremendous amount of time bypassing and hacking
    the system for that.


    ## Client-Server Tests


    One fact is well known – most mobile apps today work with some kind of a back
    end. In fact, some of them are deeply dependent on a server to perform their first
    day-to-day tasks.


    If we said that integration between internal layers could break easily, it’s especially
    true when talking about integration between our client and a server.


    But testing integrations with the server might be complicated and can have several
    challenges and issues:


    *   **Hard to Set Up** – Yes, sending requests to the server may be easy, but
    writing the assertion part when you need to compare the response to the expected
    one might be cumbersome. There are long and complicated JSON responses that are
    just too difficult to write, not to mention maintaining them over time with all
    future changes.


    *   **Slow** – Unlike unit tests or even narrow integration tests, Client-Server
    testing involves working with a server, and as a result, it depends on a network
    connection and back-end resources. When running tens of client-server requests,
    this may be an issue.


    *   **It Can Be Fragile** – In continuation of the previous section, the dependency
    on a server can cause those tests to break easily. Also, the assertion part is
    not simple – sometimes, a simple change in the response, such as an extra field
    or a different timestamp, can fail our test without any justice.


    *   **Dependencies Between Tests** – We always say that tests shouldn’t be dependent
    on each other. But how can we test a data sync method if we didn’t test the login
    method first? Most likely, we have some order we need to run those tests, and
    this is contrary to what we do in almost any other test.


    Before we move on with Client-Server testing, we need to understand what exactly
    is the scope of our tests.


    For instance, do we care about the structure of the response, or do we just need
    to make sure our client processes it correctly?


    If we get an HTTP 200 status code, is it enough for our test to pass?


    As you can tell, it is vital to narrow down what exactly we are going to test
    and what’s important to us.


    In general, it is accepted that client-server tests are divided into two main
    approaches – Black Box and White Box Testing (Figure [5-7](#496602_1_En_5_Chapter.xhtml#Fig7)).


    ![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig7_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Black Box vs. White Box Testing


    Black Box testing ignores structures and protocol and focuses on behavior only.
    White Box testing validates the protocols, structure, requests, and responses.
    These are entirely two approaches, and the decision on what to choose is crucial.


    > **Note**

    > Black Box and White Box are being used in many test areas and not just in Client-Server.
    You can meet these terms especially when talking about UI Testing.


    ### Black Box Client-Server Testing


    In Black Box testing, we don’t care about the actual request and response. We
    don’t deal with JSON’s or any other data structure. What we do care is the functionality.


    When talking about Client-Server Testing, the Black Box approach is more straightforward
    and probably the most common way to go.


    So, where do we start? Since we are dealing with network requests, our tests have
    to be asynchronous. In this case, we’re going to use a tool we previously learned
    – `XCTestExpectation`.


    Look at our first Client-Server test:


    ```

    class LoginServiceIntegrationTests: XCTestCase {

    override func tearDown() {

    // it''s important to reset our state at the end of the test

    LoginService().logout()

    }

    func testLoginFunction() {

    // we define our expectation and a local variable to store the incoming result

    let expectation = self.expectation(description: "Check Login Flow Message")

    var receivedResult : LoginOperationResult = .success

    LoginService().doLogin(email: "avi@myemail.com", password: "123") { (result) in

    receivedResult = result

    expectation.fulfill()

    }

    // since it''s a network request, we wait 10 seconds to make sure we are getting
    an answer even in slow connection

    self.waitForExpectations(timeout: 10.0, handler: nil)

    // assert

    XCTAssertEqual(receivedResult, LoginOperationResult.success)

    }

    }

    ```


    In the preceding example, we test our login mechanism. As you can see, we need
    to use a constant user name and password.


    As alternative, we can chain two requests – Registration and Login:


    ```

    func testRegistrationService() {

    // we define our expectation and a local variable to store the incoming result

    let expectation = self.expectation(description: "Check Register and Login Flow")

    var receivedResult : LoginOperationResult = .failure

    let email = generateEmail()

    let password = generatePassword()

    RegisterService().register(email: email

    , password: password) { (result) in

    if result == .success {

    LoginService().doLogin(email: email, password: password) { (loginResult) in

    receivedResult = loginResult

    expectation.fulfill()

    }

    }

    }

    // since it''s a network request, we wait 10 seconds to make sure we are getting
    an answer even in slow connection

    self.waitForExpectations(timeout: 15.0, handler: nil)

    // assert

    XCTAssertEqual(receivedResult, LoginOperationResult.success)

    }

    ```


    We generate an email and password, create a new user, and then try to log in with
    the same credentials. As mentioned before, unlike other test categories, client-server
    testing sometimes requires chaining requests together. In many situations, Integration
    tests simulate real user flow scenarios, so planning your tests is a little different
    than standard unit tests.


    Also, remember that Client-Server tests not only influence the state of your app
    but also on the data in your server. So, cleaning after your tests is a crucial
    step.'
