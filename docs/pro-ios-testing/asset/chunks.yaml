  trans: '

    # 测试菱形模型


    我们都认同端到端（UI）测试难以创建和维护。它们运行耗时过长，且对细微的 UI 变动非常敏感。但端到端测试有一个显著的优点——它能够每次都将你的应用作为一个系统来测试，而非仅仅是孤立的一段代码。


    有人认为你能进行的最重要的测试，就是检查各个单元如何协同工作。尽管端到端测试满足了这一需求，但我们确实需要在它的效果与单元测试的速度和便捷性之间取得平衡。答案就是集成测试，它常被视为测试金字塔中“被遗忘”的一层。由此产生的模式就是“测试菱形模型”（图
    10-3）。


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig3_HTML.jpg](img/496602_1_En_10_Fig3_HTML.jpg)


    图 10-3

    菱形模型


    正如你所见，测试菱形模型主要聚焦于集成测试，其理念是大部分与业务相关的问题和场景都存在于这一层。这些集成发生在你的各个单元之间。这种方法是将“问题”视为一个需要测试的复杂系统，而不仅仅是独立的单元。总的来说，测试菱形模型能让你对应用的稳定性和质量有更高的信心，因为它比单元测试更贴近业务和产品需求；然而，创建这类测试的成本也最高。


    ## 哪种才是正确的方法？


    归根结底，无论你选择何种策略，都需要权衡测试的维护成本和运行时间，以决定测试套件的组合。此外，这也取决于应用的背景和类型。有些应用充满了小而复杂的逻辑，在这种情况下，你应该专注于单元测试，以确保应用的基本功能正常工作；而有些应用由多个层次构成，需要更多的集成测试。有些团队拥有资源来创建坚实的端到端测试，并且相信这对他们的应用有价值，因此他们选择了冰淇淋筒模型。但你必须明白，你创建的
    UI 测试和集成测试越多，在时间上的代价就越大。


    # 如何构建测试场景？


    既然我们已经知道了如何编写测试，总有一个问题会冒出来——如何构思测试场景？


    当然，我们可以尝试覆盖代码中的每一行，但我们都知道这既不现实也无用处。


    我想与你讨论两种方法——一种是`TDD`（测试驱动开发），另一种是`BDD`（行为驱动开发）。正如它们的名字所示，这两种方法都是由某种事物驱动的。驱动 TDD
    和 BDD 的测试列表是由产品需求驱动的。


    你不必严格地一步步遵循这些方法。但它们可以为你提供一个方向，指导你如何与代码一同编写测试。


    ## 测试驱动开发 (TDD)


    > *所有代码在被证明清白之前都是可疑的。*


    测试驱动开发 (`TDD`) 是一种软件开发技术，它阐述了一个简单的原则——在编写代码之前先编写测试。这听起来简单，但对开发者来说却是件大事。`TDD`确保开发者知晓并理解其类或函数的所有需求，如果做得好，它将带来高代码覆盖率和极少的缺陷。


    开发者们认为`TDD`是被称为极限编程的一部分；这是一种在 20 世纪 90 年代末开始流行的方法论。


    软件开发者 Kent Beck 开发了`TDD`作为一种技术，虽然理解起来简单，但它需要一种不同的思维方式来看待代码和函数。


    请看下面的图示（图 10-4）。


    ![../images/496602_1_En_10_Chapter/496602_1_En_10_Fig4_HTML.jpg](img/496602_1_En_10_Fig4_HTML.jpg)


    图 10-4

    TDD 生命周期


    `TDD`始于编写一个在第一次运行时失败的测试（因为我们还没有编写任何代码）。运行测试并看到它失败后，我们编写满足需求的代码，并重新运行测试以确认它通过了。接着我们重构我们的方法，再次通过测试验证，然后通过添加一个新测试重复第一步并继续实现。


    这个过程确保我们为函数/类的正确运行添加了最少的必要代码。


    让我们稍停片刻，谈谈重构部分——有些人认为，在这种情况下，重构意味着“编写更好的代码”。但仔细想想，这听起来有点奇怪——我们刚刚写完这段代码，为什么需要重构呢？嗯，在进行“测试-编码-测试-编码”的过程中，我们是根据测试一步步地编写函数或代码块的，这与一次性写完函数的传统编码方式是不同的。


    想想你今天是如何编写方法和函数的——你是怀着必须满足所有需求的目的来编写代码。`TDD`方法与标准方法大相径庭，这可能会导致代码重复。在重构阶段消除这种重复，通过这种方式，我们在进行下一个测试前只做最小程度的变更。重构不是可选的步骤——它是必不可少的步骤。

    '
- fmt: '# Behavior-Driven Development (BDD)


    A real story is I have been working on a feature that involved some text processing
    and decided to develop the feature in TDD. I wrote some tests in advance and started
    to develop the function. Some of the tests were a list of text inputs, and I wanted
    to check different cases and cover several points in the function to see how they
    perform.


    So, with test coverage of 100% of the function, I distributed a build to the QA,
    and after 10–15 minutes of QA testing, the app crashed. I said to myself, “But
    it was TDD! I covered every single expression in the code!”. The QA tester was
    checking a use case where the user used an emoji character in his input. That
    caused an exception of out of bounds because of encoding issues.


    Based on the bug’s history and reviews combined with a pre-thinking process, the
    QA team decided to check this scenario, and that was the result.


    So how come the fantastic process of TDD didn’t catch it? That’s the result of
    a situation when a developer works apart from the product and QA teams. Also,
    TDD aims to cover code, not to answer real-world problems. And this is fine –
    thinking about possible and common user behaviors is a mission that requires teamwork
    and collaboration. It’s not a technical issue but rather a procedural issue. When
    teams don’t work together, those things happen quite often, and the preceding
    example is considered to be a light and an easy one. There are use cases that
    not only affect a specific line in the code but can force you to refactor some
    of your implementations if you don’t think about those cases in advance.


    The solution here is to combine BDD (Behavior-Driven Development) to your process.
    BDD is a collaborative process between the product manager, the QA team, and the
    developer, which aims to define different use cases from the user perspective,
    to direct the development, and to focus it on the real-time world scenarios.


    The collaboration between the product, the QA, and the development teams can cover
    many user scenarios and real-world tests. To do this, the team is having a “discovery
    meeting” where they start writing together user stories when each one of the teammates
    brings value to the table.


    `The Product Owner` is responsible for converting user stories into features,
    defining the scope of the product, answering user experience questions, and making
    sure the solutions brought up are aligned with the feature requirements.


    `The QA tester` brings his experience and knowledge about how users behave and
    what are the common pitfalls. He also thinks about edge cases and how the application
    can break. QA can also represent “monkey testing” – what if a monkey is playing
    with the product, pressing fast on buttons, touching different places on the screen,
    entering a huge input, and more?


    `The developer` can bring his knowledge about practical solutions and constraints
    related to what he can do. He is the only one who knows how the app works underneath
    and adds the technical layer that is so important to the discussion.


    The three team heads’ mission is to write tests in plain English, in a way that
    everyone can understand and is answering all the product requirements.


    BDD doesn’t come instead of TDD, but it helps the TDD process to focus on the
    crucial tests. You can think of BDD as part of the design process of the feature
    and TDD as part of the development itself. Some say that the BDD is TDD done right
    or that it’s an extension of TDD. I think that TDD done without BDD is an inefficient
    process, and it’s better to implement BDD in your workflow rather than do a pure
    TDD without any context.


    ## How to Write Good BDD Scenarios


    > *More than the act of testing, the act of designing tests is one of the best
    bug preventers known. The thinking that must be done to create a useful test can
    discover and eliminate bugs before they are coded – indeed, test-design thinking
    can discover and eliminate bugs at every stage in the creation of software, from
    conception to specification, to design, coding and the rest.*

    >

    > —Boris Beizer


    Take a look at the following scenario:


    ```

    "Tapping the register button should start the registration process"

    ```


    We have several problems writing a test for that scenario. For example, we don’t
    know what fields currently have values. We also assume that the user is on the
    registration screen, but we only know that because we see there is a register
    button in the scenario, not because it is mentioned. We may have a register button
    in different places such as popups or even other screens, so it’s important to
    mention the name of the screen in that case. The last thing is there is no title
    for this scenario and no number, so it is hard to find it and put it in a database
    for later use.


    Now look at the following scenario:


    ```

    SCENARIO 01: User Registration from the registration Page GIVEN the user is on
    the registration page

    AND the following fields are filled:

    - Email

    - Full Name

    - Password

    WHEN the user confirm the form

    THEN the app should start the registration process

    ```


    In the preceding example, we describe the context – what is the current screen
    for the user and on what fields there is an input. We describe the action – “confirm
    the form” (it can be either the register button or the return button on the keyboard)
    – and we also describe the expected behavior.


    This style of writing is called GHERKO, and it is an acceptable way of writing
    user scenarios in BDD. Several basic terms are being used here:


    `GIVEN` – This describes the current state of the scenario, for example:

    *   On what screen the user is? Is he logged in? What do the input fields contain?

    *   What is the network condition?

    *   What is currently saved in the DB?


    This section includes the minimum details and conditions that are relevant to
    the scenario.


    `WHEN` – This describes the action the user performs in this scenario. Try to
    make this part more declarative and less technical to cover multiple tests.


    `THEN` – This is the expected result when the action described is performed. Remember,
    it is supposed to be something that can be measured somehow so we can automatically
    test it.


    `AND` – This can be used in `GIVEN`, `WHEN`, and `THEN` sections to describe multiple
    states, actions, or results. Sometimes, if you have many conditions, you can use
    a list like in the preceding example.


    Those test scenarios are an excellent opportunity for the team to communicate
    with each other regarding the product and the development process. The QA testers
    are in charge of writing the scenarios when the developer is in charge of the
    steps. The product manager is the one that makes sure the scenarios are in the
    scope, answering the product requirements and that it does not conflict with them
    in any way. The recommended method is for the developer and the tester to work
    in pairs.


    Some tips for writing scenarios are as follows:'
