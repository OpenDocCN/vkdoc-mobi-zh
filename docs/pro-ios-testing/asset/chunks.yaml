  trans: '

    # 行为驱动开发（BDD）


    一个真实的故事是，我曾负责一个涉及文本处理的功能，并决定采用 TDD 开发该功能。我预先编写了一些测试，然后开始开发函数。部分测试是一个文本输入列表，我想检查不同的情况，并覆盖函数中的多个点，以观察它们如何运行。


    因此，在函数达到 100%测试覆盖率的情况下，我将构建版本分发给 QA 团队。经过 10 到 15 分钟的 QA 测试后，应用程序崩溃了。我对自己说：“但这可是
    TDD 啊！我覆盖了代码中的每一个表达式！” QA 测试人员检查的是一个用户在其输入中使用了表情符号字符的用例。这导致了因编码问题引发的越界异常。


    基于缺陷的历史记录和评审，结合预先的思考过程，QA 团队决定检查这个场景，结果就是发现了这个问题。


    那么，为什么神奇的 TDD 流程没有捕捉到它呢？这是因为开发人员与产品和 QA 团队各自为政的结果。此外，TDD 的目标是覆盖代码，而不是解决现实世界的问题。这本身没有问题——思考可能和常见的用户行为是一项需要团队合作与协作的任务。这不是技术问题，而是流程问题。当团队不一起工作时，这类事情会经常发生，而前面的例子还算是一个轻量级且容易的案例。有些用例不仅会影响代码中的特定行，还可能迫使你重构部分实现，如果你没有提前考虑这些情况的话。


    这里的解决方案是在流程中结合 BDD（行为驱动开发）。BDD 是产品经理、QA 团队和开发人员之间的一个协作过程，旨在从用户角度定义不同的用例，指导开发，并将其聚焦于现实世界的场景。


    产品、QA 和开发团队之间的协作可以覆盖许多用户场景和现实世界测试。为此，团队会召开一个“发现会议”，他们共同编写用户故事，每个团队成员都为此贡献力量。


    `产品负责人`负责将用户故事转化为功能，定义产品范围，回答用户体验问题，并确保提出的解决方案符合功能需求。


    `QA 测试人员`凭借其经验和知识，了解用户行为方式以及常见的陷阱。他还会考虑边界情况以及应用程序可能如何崩溃。QA 还可以代表“猴子测试”——如果一只猴子在玩这个产品，快速点击按钮、触摸屏幕上不同的地方、输入大量内容等等会怎么样？


    `开发人员`可以贡献其实用解决方案方面的知识，以及与自身能力相关的限制条件。他是唯一了解应用程序底层工作原理的人，并为讨论增添了至关重要的技术层面。


    这三个团队负责人的任务是使用浅显易懂的英语编写测试，让每个人都能理解，并能满足所有产品需求。


    BDD 并非取代 TDD，而是帮助 TDD 流程聚焦于关键的测试。你可以将 BDD 视为功能设计过程的一部分，而 TDD 是开发本身的一部分。有人说 BDD
    是正确实施的 TDD，或者说它是 TDD 的扩展。我认为没有 BDD 的 TDD 是低效的，最好在你的工作流程中实施 BDD，而不是在没有任何上下文的情况下进行纯粹的
    TDD。


    ## 如何编写好的 BDD 场景


    > *比测试行为更重要的，是设计测试的行为，这是已知的最佳缺陷预防手段之一。创建有用测试所必须进行的思考，可以在编码之前发现并消除缺陷——实际上，测试设计的思考可以在软件创建的每个阶段发现并消除缺陷，从构思到规格说明，到设计、编码及后续阶段。*

    >

    > —鲍里斯·贝泽


    看一下以下场景：


    ```

    "点击注册按钮应启动注册流程"

    ```


    为该场景编写测试存在几个问题。例如，我们不知道哪些字段当前有值。我们还假设用户在注册屏幕上，但我们知道这一点只是因为我们在场景中看到了注册按钮，而不是因为它被明确提及。我们可能在不同的地方有注册按钮，例如弹窗或其他屏幕，因此在这种情况下提及屏幕名称很重要。最后一点是，这个场景没有标题和编号，所以很难找到它并将其放入数据库供以后使用。


    现在看以下场景：


    ```

    场景 01：从注册页面进行用户注册

    前提：用户位于注册页面

    并且以下字段已填写：

    - 电子邮件

    - 全名

    - 密码

    当：用户确认表单

    那么：应用程序应启动注册流程

    ```


    在前面的例子中，我们描述了上下文——用户当前所在的屏幕以及哪些字段有输入。我们描述了动作——“确认表单”（这可以是注册按钮，也可以是键盘上的回车键）——我们也描述了预期的行为。


    这种写作风格被称为 GHERKIN，是 BDD 中编写用户场景的一种公认方式。这里使用了几个基本术语：


    `前提`——描述场景的当前状态，例如：

    *   用户在哪一个屏幕？他是否已登录？输入字段包含什么内容？

    *   网络条件如何？

    *   数据库中目前保存了什么？


    此部分包含与场景相关的最少细节和条件。


    `当`——描述用户在此场景中执行的动作。尽量使这部分更具声明性，减少技术细节，以覆盖多个测试。


    `那么`——这是执行所描述动作时期望的结果。记住，它应该是可以某种方式度量的内容，以便我们可以自动测试它。


    `并且`——这可以在`前提`、`当`和`那么`部分中使用，以描述多个状态、动作或结果。有时，如果你有很多条件，可以像前面例子那样使用列表。


    这些测试场景是团队就产品和开发过程进行沟通的绝佳机会。QA 测试人员负责编写场景，而开发人员负责步骤。产品经理负责确保场景在范围内，满足产品需求，并且不与它们产生任何冲突。推荐的方法是开发人员和测试人员结对工作。


    编写场景的一些建议如下：

    '
- fmt: "# 尝试撰写描述性场景\n\n*   **尝试撰写描述性场景**以覆盖尽可能多的用例。在“WHEN”行中，尝试描述意图而非实际动作。例如，在前面的例子中，用户的意图是确认表单。至于它是通过按下按钮还是按键盘上的回车键来实现的，这并不重要。写成“点击提交按钮”是一个与场景无关的用户体验动作，甚至可能使开发人员和测试人员都感到困惑。此外，编写UI动作（如点击/滑动）可能会将测试范围缩小到仅限于按钮点击。请记住，一个场景可以产生多个测试。也要记住，有时点击特定按钮可能是一个重要场景，而按下键盘按钮则不是，所以这条规则并非总是适用。这取决于具体场景。\n\
    \n*   **在编写场景时使用真实世界的数据。**这些场景不应检查诸如非常长的输入、大量数据或低网络连接等边界情况。使用真实世界的数据可以确保开发人员、测试人员和产品经理都理解我们所讨论的情况，从而改善他们之间的沟通。例如，不要在之前表单的名字字段中使用“1”或“test”。首先，它无法表达我们设想文本输入包含什么，并且几天后我们阅读场景时也不清楚我们当初写它时的含义。\n\
    \n# 每个场景专注于一个测试\n\n很多时候在编写场景时，很容易写出一个覆盖多个领域或检查多个问题的场景。**尝试每个场景专注于一个测试**。当你的场景涉及不同的测试或领域时，你可能会遇到几个问题：\n\
    \n同一场景中的多个测试意味着它们之间存在依赖关系。如果第一个测试失败，其他测试也会失败，我们希望隔离这些测试，而不是将它们链在一起。\n\n看看以下场景：\n\
    \n```\nSCENARIO 02: User Registration from the registration Page GIVEN the user\
    \ is on the registration page\nAND the following fields are filled:\n- Email\n\
    - Full Name\n- Password\nWHEN the user confirm the form\nTHEN the app should start\
    \ the registration process AND\ncontinue to the next screen\n```\n\n看看THEN部分。看起来团队有点偷懒，不想把场景分成两个。他们添加了两个预期结果——一个是开始注册过程，第二个是继续到下一个屏幕。在这种情况下，我们可能会发现有两个不同的开发人员负责应用程序的那个区域。第一个负责构建表单，第二个开发人员负责服务器API或应用程序的导航。多人负责修复或测试同一场景的情况并不理想。\n\
    \n# 正确理解和使用Gherkin语言\n\n**理解GHERKIN语言**并正确使用它。这里有一个用GHERKIN写的糟糕场景例子：\n\n```\n\
    SCENARIO 03: User Adding A New Note\nGIVEN the user opens the app main menu\n\
    AND the user navigates to the notes screen WHEN the user tapped on ADD NOTE button\
    \ THEN \"Add New Screen\" opened\nWHEN the user types note details\nAND her the\
    \ user tap the \"Save Button\" THEN screen is closed\n```\n\n很明显，场景的编写者不理解GHERKIN语法或如何编写有用的测试。在前面的例子中，GIVEN部分描述了一个动作（“用户打开应用程序主菜单”），而不是给定的状态。但最糟糕的是WHEN-THEN对。命令的顺序总是GIVEN-WHEN-THEN，所以WHEN不能在THEN之后出现。每个WHEN-THEN对都是新的行为，因此，你应该将它们拆分为两个场景。此外，这种场景包含重复。想象一下我们有一个包含所有场景的文档。很可能我们已经有一个描述点击`ADD\
    \ NOTE`按钮时会发生什么的场景，所以这个场景已经被覆盖了。解决方案是正确使用GIVEN部分。GIVEN部分应该将用户带到期望的状态。看看前面场景的修复版本：\n\
    \n```\nSCENARIO 03: User Adding A New Note GIVEN the user in on the add new screen\
    \ AND there is text in the input field WHEN the user tap the \"Save Button\" THEN\
    \ screen is closed\n```\n\n这不仅仅是更好，而且更短，阅读和编写所需时间更少。\n\n# 使用通俗语言编写场景\n\n确保场景**用英语而非技术语言编写**，以便团队中的每个人，尤其是非技术人员，都能理解它们。不要谈论“标志”、文件名、查询等等。保持场景简单并使用用户用语。\n\
    \n# 考虑自动化测试的可行性\n\n由于本书涵盖自动化测试，当你编写BDD场景时，请记住这些场景需要易于自动化，这意味着不要编写难以衡量的场景，例如“THEN它需要动画流畅”等等。\n\
    \n# 基于场景创建测试\n\n写下并商定所有场景后的最后一步是开发人员根据它们创建测试——有些可以是单元测试，有些是集成测试，有些是UI测试。要创建测试，你的代码必须是可测试的（测试友好的）；否则，编写这些测试将非常困难，甚至不可能。\n\
    \n# 代码覆盖率\n\n代码覆盖率是一种衡量指标，用于确定在测试期间执行了你代码的百分比。由于UI测试将你的应用视为黑盒，因此代码覆盖率仅与单元测试和集成测试相关。\n\
    \n要在Xcode中启用代码覆盖率，你需要在方案配置中启用它，而默认情况下它是未启用的。此操作将在下一章详细解释。\n\n代码覆盖率的计算很简单——如果你有十行代码，而你的测试执行了其中的七行，那么你的代码覆盖率就是70%（7/10）。许多团队试图实现高覆盖率，基于“越高越好”的假设。\n\
    \n## 不要为代码覆盖率设定目标\n\n开发人员倾向于为代码覆盖率设定目标——认为高代码覆盖率意味着高质量的代码。恐怕这是不对的。并不是说高代码覆盖率很糟糕——它不是，它可以告诉你关于代码的很多事情，但它最不能告诉你的就是你的代码质量。\n\
    \n让我们看下面的例子：\n\n```\nfunc divide(x :Float, with y :Float)->Float {\n    return\
    \ x / y\n}\n```\n\n这个函数是一个非常简单的例子。当我们使用`x = 4`和`y = 2`对这个函数运行测试，并期望结果为2时，测试通过。这个函数的代码覆盖率是100%。这是否意味着我们完全覆盖了并且这是无错误的代码？当然不是。如果我们在这个函数上运行另一个测试，当`y\
    \ = 0`时，我们会得到一个异常（“除以零”）。\n\n这是一个高覆盖率并不代表无错误代码甚至高质量代码的典型例子。它只是说我们的测试在运行时命中了很多代码行。还有一些公司和团队的例子，他们如此热衷于高覆盖率，以至于创建了没有任何断言的单元测试，这意味着他们的测试永远不会失败（！）。\n\
    \n另一个例子是：\n\n```\nfunc updateFirstName(newFirstName :String) {\n    self.firstName\
    \ = newFirstName\n}\n```\n\n开发人员可能会创建一个测试，使用一个参数运行这个函数，然后验证名为“`firstName`”的实例属性是否接收到新值。但由于这个函数非常简单，很明显开发人员编写这个测试只是为了获得更好的代码覆盖率。\n\
    \n这里的问题是，当高代码覆盖率成为目标时，开发人员偏爱**数量**而非**质量**，他们成为高数字和统计的奴隶，而不是瞄准高质量和捕获错误。在这种情况下，仅仅覆盖函数然后继续编码是很容易的。\n\
    \n此外，我们需要记住，并非代码的所有部分都同等重要，因此在所有项目领域投入相同的精力并不是一个明智的策略。通过测试不重要的代码，你可能会跳过重要的场景。"
  raw: '*   **Try to write declarative scenarios** to cover as many use cases as you
    can. In the “WHEN” rows, try to write the intentions and not the actual actions.
    For example, in the preceding example, the user intends to confirm the form. It
    doesn''t matter if it''s by pressing the button or pressing the return key on
    the keyboard. Writing “Tapping the submit button” is a UX action that is not related
    to the scenario and can even confuse both the developer and the QA. Also, writing
    UI actions (such as tapping/swiping) can narrow down the number of tests to only
    button tapping. Remember, one scenario can produce multiple tests. Remember that
    sometimes tapping on a specific button can be an important scenario as opposed
    to pressing a keyboard button, so this rule is not always valid. It depends on
    the scenario.


    *   **Use real-world data when writing your scenarios.** Those scenarios are not
    supposed to check edge cases such as very long inputs, a significant amount of
    data, or low connectivity. Writing real-world data improves the communication
    between the developer, the QA, and the product manager by making sure everyone
    understands the situation we are talking about. For example, don''t use “1” or
    “test” as the first name in the form earlier. For a start, it doesn''t express
    what we imagine the text input contains and also when we read the scenario a few
    days later. It''s not clear what we meant when we wrote it.


    Many times when writing scenarios, it’s really easy to write one that covers multiple
    areas or check several issues. **Try to focus on one test per scenario**. When
    your scenario refers to different tests or areas, you can have several problems:


    Multiple tests in the same scenarios mean there are dependencies between them.
    If the first test fails, the others fail as well, and we want to isolate those
    tests and not chain them together.


    Look at the following sczenario:


    ```

    SCENARIO 02: User Registration from the registration Page GIVEN the user is on
    the registration page

    AND the following fields are filled:

    - Email

    - Full Name

    - Password

    WHEN the user confirm the form

    THEN the app should start the registration process AND

    continue to the next screen

    ```


    Take a look at the THEN section. It seems that the team was a little bit lazy
    and didn’t want to break the scenario into two scenarios. They added two expected
    results – one is to start the registration process, and the second one continues
    to the next screen. In this case, we may find two different people that work in
    that area of the app. The first one is responsible for building the form, and
    the second developer is responsible for the Server API or with the navigation
    of the app. This situation where multiple people are in charge of fixing or testing
    the same scenario is not ideal.


    **Understand the GHERKO language**, and use it right. Here is a lousy example
    of a scenario written in GHERKO:


    ```

    SCENARIO 03: User Adding A New Note

    GIVEN the user opens the app main menu

    AND the user navigates to the notes screen WHEN the user tapped on ADD NOTE button
    THEN "Add New Screen" opened

    WHEN the user types note details

    AND her the user tap the "Save Button" THEN screen is closed

    ```


    Clearly, the writer of the scenario doesn’t understand the GHERKO syntax or how
    to write useful tests. In the preceding example, the GIVEN section describes an
    action (“The user opens the app main menu”) instead of a given state. But the
    worst part is the WHEN-THEN pair. The order of the commands is always GIVEN-WHEN-THEN,
    so WHEN cannot appear after THEN. Each WHEN-THEN pair is new behavior, and therefore,
    you should slice them to two scenarios. Also, that kind of scenario contains duplicates.
    Imagine we have a document with all the scenarios. Most chances are we already
    have a scenario that describes what happens when you tap on the ADD NOTE button,
    so this scenario is already covered. The solution is to use the GIVEN section
    properly. The GIVEN section should bring the user the desirable state. Take a
    look at the fixed version of the preceding scenario:


    ```

    SCENARIO 03: User Adding A New Note GIVEN the user in on the add new screen AND
    there is text in the input field WHEN the user tap the "Save Button" THEN screen
    is closed

    ```


    It’s not only better, but it’s also shorter and takes less time to read and write.


    Make sure the scenarios are **written in English and not a technical language**,
    so anyone in the team can understand them, especially the non-tech guys. Don’t
    talk about “flags,” file names, queries, and so on. Keep the scenario simple and
    user wording.


    Since this book covers automated tests, when you write BDD scenarios, keep in
    mind that those scenarios need to be easily automated, meaning don’t write scenarios
    that are hard to measure, such as “THEN it needs to animated smooth” and so on.


    The final step after writing down and agreeing about all the scenarios is for
    the developer to create tests out of them – some can be unit tests, some integration
    tests, and some UI Tests. To create tests, your code must be testable (test-friendly);
    otherwise, writing those tests will be hard at best and impossible at worst.


    ## Code Coverage


    Code coverage is a measure used to determine what is the percentage of your code
    that gets executed during testing. Since UI Tests refer to your app as a black
    box, code coverage is only relevant for unit tests and integration tests.


    To enable code coverage in Xcode, you need to enable it in your scheme configuration,
    while it is not enabled on default. This action is explained in detail in the
    next chapter.


    Code Coverage calculations are straightforward – if you have ten lines of code
    and your tests execute seven of them, you have code coverage of 70% (7/10). Many
    teams try to achieve high coverage based on the assumption that “higher is better.”


    ### Don’t Set a Target for Code Coverage


    Setting a target for code coverage is something developers tend to do – assuming
    that high code coverage means high-quality code. I''m afraid that''s not right.
    It''s not that high code coverage is terrible – it isn''t, and it can tell you
    many things about your code, but the last thing it tells you is your code quality.


    Let’s take a look at the following example:


    ```

    func divide(x :Float, with y :Float)->Float { return x / y

    }

    ```


    This function is a very simple example. When we are running a test on this function
    with x = 4 and y = 2, and we are expecting the result to be 2, the test passes.
    The code coverage for this function is 100%. Does this mean we are fully covered
    and this is a bug-free code? Of course not. If we run another test on this function,
    when y = 0, we’ll get an exception (“divided by zero”).


    It’s a classic example of high coverage that doesn’t mean bug-free code or even
    a high-quality code. It’s just said that our tests hit many rows in our code when
    they run. There are also examples of companies and teams that were so passionate
    about high coverage that they created unit tests without any assertions, meaning
    their tests can never fail (!).


    Another example is this:


    ```

    func updateFirstName(newFirstName :String) { self.firstName = newFirstName

    }

    ```


    A developer might create a test that runs this function with a parameter and then
    verify that the instance property named “firstName” received the new value. But
    since this function is so simple, it is clear that the developer is writing this
    test only to gain better code coverage.


    The problem here is that when high code coverage is the target, developers prefer
    **quantity** over **quality**, and they become slaves of high numbers and statistics,
    instead of aiming for high quality and bug catching. It’s easy in this case to
    just cover functions and move on with the code.


    Also, we need to remember not all parts of our code are importantly equal, so
    investing the same effort in all your project areas is not a smart strategy. By
    testing the unimportant code, you might skip essential scenarios.'
  trans: "\n# 尝试撰写描述性场景\n\n*   **尝试撰写描述性场景**以覆盖尽可能多的用例。在“WHEN”行中，尝试描述意图而非实际动作。例如，在前面的例子中，用户的意图是确认表单。至于它是通过按下按钮还是按键盘上的回车键来实现的，这并不重要。写成“点击提交按钮”是一个与场景无关的用户体验动作，甚至可能使开发人员和测试人员都感到困惑。此外，编写\
    \ UI 动作（如点击/滑动）可能会将测试范围缩小到仅限于按钮点击。请记住，一个场景可以产生多个测试。也要记住，有时点击特定按钮可能是一个重要场景，而按下键盘按钮则不是，所以这条规则并非总是适用。这取决于具体场景。\n\
    \n*   **在编写场景时使用真实世界的数据。**这些场景不应检查诸如非常长的输入、大量数据或低网络连接等边界情况。使用真实世界的数据可以确保开发人员、测试人员和产品经理都理解我们所讨论的情况，从而改善他们之间的沟通。例如，不要在之前表单的名字字段中使用“1”或“test”。首先，它无法表达我们设想文本输入包含什么，并且几天后我们阅读场景时也不清楚我们当初写它时的含义。\n\
    \n# 每个场景专注于一个测试\n\n很多时候在编写场景时，很容易写出一个覆盖多个领域或检查多个问题的场景。**尝试每个场景专注于一个测试**。当你的场景涉及不同的测试或领域时，你可能会遇到几个问题：\n\
    \n同一场景中的多个测试意味着它们之间存在依赖关系。如果第一个测试失败，其他测试也会失败，我们希望隔离这些测试，而不是将它们链在一起。\n\n看看以下场景：\n\
    \n```\nSCENARIO 02: User Registration from the registration Page GIVEN the user\
    \ is on the registration page\nAND the following fields are filled:\n- Email\n\
    - Full Name\n- Password\nWHEN the user confirm the form\nTHEN the app should start\
    \ the registration process AND\ncontinue to the next screen\n```\n\n看看 THEN 部分。看起来团队有点偷懒，不想把场景分成两个。他们添加了两个预期结果——一个是开始注册过程，第二个是继续到下一个屏幕。在这种情况下，我们可能会发现有两个不同的开发人员负责应用程序的那个区域。第一个负责构建表单，第二个开发人员负责服务器\
    \ API 或应用程序的导航。多人负责修复或测试同一场景的情况并不理想。\n\n# 正确理解和使用 Gherkin 语言\n\n**理解 GHERKIN 语言**并正确使用它。这里有一个用\
    \ GHERKIN 写的糟糕场景例子：\n\n```\nSCENARIO 03: User Adding A New Note\nGIVEN the user\
    \ opens the app main menu\nAND the user navigates to the notes screen WHEN the\
    \ user tapped on ADD NOTE button THEN \"Add New Screen\" opened\nWHEN the user\
    \ types note details\nAND her the user tap the \"Save Button\" THEN screen is\
    \ closed\n```\n\n很明显，场景的编写者不理解 GHERKIN 语法或如何编写有用的测试。在前面的例子中，GIVEN 部分描述了一个动作（“用户打开应用程序主菜单”），而不是给定的状态。但最糟糕的是\
    \ WHEN-THEN 对。命令的顺序总是 GIVEN-WHEN-THEN，所以 WHEN 不能在 THEN 之后出现。每个 WHEN-THEN 对都是新的行为，因此，你应该将它们拆分为两个场景。此外，这种场景包含重复。想象一下我们有一个包含所有场景的文档。很可能我们已经有一个描述点击`ADD\
    \ NOTE`按钮时会发生什么的场景，所以这个场景已经被覆盖了。解决方案是正确使用 GIVEN 部分。GIVEN 部分应该将用户带到期望的状态。看看前面场景的修复版本：\n\
    \n```\nSCENARIO 03: User Adding A New Note GIVEN the user in on the add new screen\
