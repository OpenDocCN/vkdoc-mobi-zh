    let fileManager = FileManager.default

    try! fileManager.createDirectory(at: snapshotTestingDirectory,withIntermediateDirectories:
    true)

    if fileManager.fileExists(atPath: snapShotFileForFunction.path) {

    let reference =

    try! String(contentsOf: snapShotFileForFunction, encoding: .utf8)

    XCTAssertEqual(reference, verb)

    } else {

    try! verb.write(to: snapShotFileForFunction, atomically: true, encoding: .utf8)

    XCTFail("Failed to write snapshot")

    }

    }

    ```


    ### Creating Our Assertion Function


    Extracting the code to a function makes it reusable in other tests as well:


    ```

    func doAssertSnapshot(match data : Any) {

    var stringData = ""

    dump(data, to: &stringData)

    let snapshotTestingDirectory = URL(fileURLWithPath: "\(#file)")

    .deletingPathExtension()

    let snapShotFileForFunction = snapshotTestingDirectory.appendingPathComponent(#function).appendingPathExtension("snapshot")

    let fileManager = FileManager.default

    try! fileManager.createDirectory(at: snapshotTestingDirectory,withIntermediateDirectories:
    true)

    if fileManager.fileExists(atPath: snapShotFileForFunction.path) {

    let reference =

    try! String(contentsOf: snapShotFileForFunction, encoding: .utf8)

    XCTAssertEqual(reference, stringData)

    } else {

    try! stringData.write(to: snapShotFileForFunction, atomically: true, encoding:
    .utf8)

    XCTFail("Failed to write snapshot")

    }

    }

    ```


    Notice that we convert the `Any` object that we get to a string using the `dump()`
    swift function.


    But we haven’t finished quite yet. If you remember, when we discussed about custom
    assertion, we said that we need to pass the swift keywords such as `#file` and
    `#line` to our custom assertion function. Same goes here – we need to pass `#file`,
    `#line`, and also `#function` to our new assertion code:


    ```

    func doAssertSnapshot(match data : Any, file : StaticString = #file, line : UInt
    = #line, function : String = #function) {

    var stringData = ""

    dump(data, to: &stringData)

    let snapshotTestingDirectory = URL(fileURLWithPath: "\(file)")

    .deletingPathExtension()

    let snapShotFileForFunction = snapshotTestingDirectory.appendingPathComponent(function).appendingPathExtension("snapshot")

    let fileManager = FileManager.default

    try! fileManager.createDirectory(at: snapshotTestingDirectory,withIntermediateDirectories:
    true)

    if fileManager.fileExists(atPath: snapShotFileForFunction.path) {

    let reference =

    try! String(contentsOf: snapShotFileForFunction, encoding: .utf8)

    XCTAssertEqual(reference, stringData, file : file, line : line)

    } else {

    try! stringData.write(to: snapShotFileForFunction, atomically: true, encoding:
    .utf8)

    XCTFail("Failed to write snapshot", file : file, line : line)

    }

    }

    ```


    Now our new test looks like this:


    ```

    func testExtractComponents() {

    // arrange

    let str = "The man is running"

    // act

    let verb = SentencesAnalyzer().getVerb(sentence: str)!

    // assert

    doAssertSnapshot(match: verb)

    }

    ```


    With only one line, we did both assertions and saved the result for the next test.


    ## Snapshot Testing Drawbacks


    We can see that with a fair amount of code, we can implement snapshot testing
    in our bundle quite easily. It doesn’t mean that snapshot testing is a perfect
    solution – it’s not. Snapshot testing has its issues, and you need to be familiar
    with some of them. Let’s list some of them.


    ### Documentation Is Missing


    In the first chapter, I mentioned that tests are actually our documentation to
    the code. While defining the expected behavior precisely and in details, lead
    us to the appropriate state step by step, tests are actually the best documentation
    you can have for your app.


    Some of this documentation, or may I say, the crucial part of it – the expected
    result - is hidden in a data file instead of being upfront. Sure, we can document
    it in a comment right within the test, but if we do that, what’s the point of
    snapshot testing?'
  trans: '

    ## 从零开始快照测试


    假设我们有一个函数，它接收一个句子（作为字符串）并返回其动词。


    以下是该函数的签名：


    ```

    func getSentenceComponents(sentence : String)->Components?

    ```


    现在让我们为这个函数编写第一个测试：


    ```

    func testExtractComponents() {

    // arrange

    let str = "The man is running"

    // act

    let verb = SentencesAnalyzer().getVerb(sentence: str)!

    let reference = ""

    // assert

    XCTAssertEqual(verb, reference)

    }

    ```


    如果你仔细看上面的代码，你会发现我们在这里做了一件新事情——我们创建了一个名为 `reference` 的空字符串，并将其与函数的结果进行比较。现在我们知道测试会失败，因为前面的句子有一个动词——“running”。


    运行测试后，我们收到了预期的失败消息：


    ```

    XCTAssertEqual failed: ("running") is not equal to ("")

    ```


    尽管我们的测试失败了，但我们知道代码如预期般工作。所以，我们现在需要做的就是修复测试，并将 “running” 设置为 `reference` 的值：


    ```

    func testExtractComponents() {

    // arrange

    let str = "The man is running"

    // act

    let verb = SentencesAnalyzer().getVerb(sentence: str)!

    let reference = "running"

    // assert

    XCTAssertEqual(verb, reference)

    }

    ```


    这就是我们的第一次快照测试！


    让我们总结一下：


    *   我们编写了一个测试，将结果与空字符串进行比较。

    *   我们运行了测试，获取函数的结果，并将其保存到 `reference` 变量。

    *   我们重新运行测试，发现它通过了。


    因此，第一次运行只是为了获取预期结果，而之后的每次测试都会对当前状态拍一张“快照”，并与之前保存的结果进行比较。


    ### 使用 Swift 关键字


    如果我们想要完成将快照保存到文件的过程，我们需要理解这里面临的挑战。


    首先，我们需要将所有快照保存到一个文件中，这样在运行测试时就能访问它们。要获取相对于测试目标的目录，我们可以使用 `#file` 关键字。回想一下，我们在单元测试章节学过
    Swift 关键字，`#file` 是我们可以在这里使用的另一个关键字。


    `#file` 返回当前文件的绝对路径：


    ```

    let snapshotTestingDirectory = URL(fileURLWithPath: "\(#file)")

    .deletingPathExtension()

    ```


    前面的代码返回一个目录，其名称与测试文件相同，但没有 `.swift` 扩展名。这是一个巧妙的技巧，可以快速生成相对于你正在处理的文件的目录。


    现在我们有了快照文件夹，我们需要为每个函数保存一个快照。Swift 的关键字特性再次通过 `#function` 来拯救我们。`#function` 返回当前函数的名称，这可以成为我们快照数据库的关键词。


    我们可以为每个函数保存一个快照文件，也可以将所有快照保存在快照目录下的一个大型 JSON 文件中。


    让我们根据函数名为快照文件创建路径：


    ```

    let snapShotFileForFunction = snapshotTestingDirectory.appendingPathComponent(#function).appendingPathExtension("snapshot")

    ```


    让我们继续编写代码，创建文件夹并保存/读取快照，看看完整代码：


    ```

    func testExtractComponents() {

    // arrange

    let str = "The man is running"

    // act

    let verb = SentencesAnalyzer().getVerb(sentence: str)!

    let snapshotTestingDirectory = URL(fileURLWithPath: "\(#file)")

    .deletingPathExtension()

    let snapShotFileForFunction = snapshotTestingDirectory.appendingPathComponent(#function).appendingPathExtension("snapshot")

    let fileManager = FileManager.default

    try! fileManager.createDirectory(at: snapshotTestingDirectory,withIntermediateDirectories:
    true)

    if fileManager.fileExists(atPath: snapShotFileForFunction.path) {

    let reference =

    try! String(contentsOf: snapShotFileForFunction, encoding: .utf8)

    XCTAssertEqual(reference, verb)

    } else {

    try! verb.write(to: snapShotFileForFunction, atomically: true, encoding: .utf8)

    XCTFail("Failed to write snapshot")

    }

    }

    ```


    ### 创建我们的断言函数


    将代码提取到一个函数中，使其在其他测试中也可重用：


    ```

    func doAssertSnapshot(match data : Any) {

    var stringData = ""

    dump(data, to: &stringData)

    let snapshotTestingDirectory = URL(fileURLWithPath: "\(#file)")

    .deletingPathExtension()

    let snapShotFileForFunction = snapshotTestingDirectory.appendingPathComponent(#function).appendingPathExtension("snapshot")

    let fileManager = FileManager.default

    try! fileManager.createDirectory(at: snapshotTestingDirectory,withIntermediateDirectories:
    true)

    if fileManager.fileExists(atPath: snapShotFileForFunction.path) {

    let reference =

    try! String(contentsOf: snapShotFileForFunction, encoding: .utf8)

    XCTAssertEqual(reference, stringData)

    } else {

    try! stringData.write(to: snapShotFileForFunction, atomically: true, encoding:
    .utf8)

    XCTFail("Failed to write snapshot")

    }

    }

    ```


    注意，我们使用 Swift 的 `dump()` 函数将接收到的 `Any` 对象转换为字符串。


    但我们还没完全完成。如果你记得，当我们讨论自定义断言时，我们说过需要将 `#file` 和 `#line` 等 Swift 关键字传递给我们的自定义断言函数。这里也一样——我们需要将
    `#file`、`#line` 以及 `#function` 传递给我们新的断言代码：


    ```

    func doAssertSnapshot(match data : Any, file : StaticString = #file, line : UInt
    = #line, function : String = #function) {

    var stringData = ""

    dump(data, to: &stringData)

    let snapshotTestingDirectory = URL(fileURLWithPath: "\(file)")

    .deletingPathExtension()

    let snapShotFileForFunction = snapshotTestingDirectory.appendingPathComponent(function).appendingPathExtension("snapshot")

    let fileManager = FileManager.default

    try! fileManager.createDirectory(at: snapshotTestingDirectory,withIntermediateDirectories:
    true)

    if fileManager.fileExists(atPath: snapShotFileForFunction.path) {

    let reference =

    try! String(contentsOf: snapShotFileForFunction, encoding: .utf8)

    XCTAssertEqual(reference, stringData, file : file, line : line)

    } else {

    try! stringData.write(to: snapShotFileForFunction, atomically: true, encoding:
    .utf8)

    XCTFail("Failed to write snapshot", file : file, line : line)

    }

    }

    ```


    现在我们的新测试看起来像这样：


    ```

    func testExtractComponents() {

    // arrange

    let str = "The man is running"

    // act

    let verb = SentencesAnalyzer().getVerb(sentence: str)!

    // assert

    doAssertSnapshot(match: verb)

    }

    ```


    只用了一行代码，我们就完成了断言并保存了结果供下次测试使用。


    ## 快照测试的缺点


    我们可以看到，通过适量的代码，我们可以相当轻松地在我们的代码包中实现快照测试。但这并不意味着快照测试是一个完美的解决方案——它并不是。快照测试有其问题，你需要熟悉其中一些问题。让我们列举其中一些。


    ### 缺少文档


    在第一章中，我提到测试实际上是我们代码的文档。在精确而详细地定义预期行为、逐步引导我们达到适当状态的同时，测试实际上是你应用程序**最好**的文档。


    部分这样的文档，或者我应该说，其关键部分——预期结果——被隐藏在一个数据文件中，而不是直接呈现。当然，我们可以在测试内的注释中记录它，但如果我们那样做，快照测试的意义何在？

