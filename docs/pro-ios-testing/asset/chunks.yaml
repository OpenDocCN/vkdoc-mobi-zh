- fmt: "# White Box Client-Server Testing\n\nBlack Box testing is excellent. It’s\
    \ easier to write because you don’t have to deal with test doubles. You are not\
    \ “dirtying” your hands with parsing server response and comparing values. Also,\
    \ usually, black box tests cover the essential things and basic functionality.\n\
    \nBut Black Box testing has its drawbacks. There are cases when checking only\
    \ your functionality is not enough, cases where you need a more profound validation\
    \ and test the structure of your request and response.\n\nData sync is a good\
    \ example–we send a sync request and receive a success response. But is it enough\
    \ to determine that our integration works well? What if we didn’t send all the\
    \ expected data? What if we needed to send a critical flag or essential piece\
    \ of data, but our request was missing this piece of data?\n\nWhite Box Integration\
    \ aims to fill that gap. In white box integration, we go deeper into our testing\
    \ and check the protocols between our client and the server.\n\nThe process of\
    \ creating a white box testing is built upon three steps:\n\n**Bring your app\
    \ to an ideal state**, a state that defined the baseline. From now on, you’re\
    \ going to compare your tests to this state.\n\n**Snapshot that state**–record\
    \ your requests and responses and save them to a file. We can call the saved responses\
    \ “Gold Responses” because those are the ideal responses we should get when we\
    \ run our tests.\n\nIn your tests, **execute your logic functions**, but this\
    \ time, record (again) your requests and responses and, in the end, compare them\
    \ to the gold responses you saved in the early step.\n\nWhile these steps might\
    \ sound scary, building an excellent infrastructure and helpers can help you achieve\
    \ them.\n\n## Bring Your App to an Ideal State\n\nSure, we can implement TDD with\
    \ this process. But TDD is great when defining behaviors in advance. When checking\
    \ data structures, it is simpler and easier to do it while “snapshotting” an ideal\
    \ state that we reached. By the way, in my opinion, it’s not a wrong approach\
    \ when writing tests other than unit tests.\n\n## Record the Current State\n\n\
    To record our requests and responses, we need to create some network recorder.\
    \ The network recorder receives the request and the response, bundles them together,\
    \ and saves them to a file (Figure 5-8).\n\n![images/496602_1_En_5_Chapter/496602_1_En_5_Fig8_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig8_HTML.jpg)\n\
    \n**Figure 5-8. Implementing a network recorder**\n\nThe interface of such a recorder\
    \ is simple:\n\n```\ntypealias RequestData = [AnyHashable : Any]\ntypealias ResponseDate\
    \ = [AnyHashable : Any]\nstruct RequestBundle {\nvar request : RequestData\nvar\
    \ response : ResponseDate\n}\nenum RequestBundleType {\ncase login\ncase register\n\
    case sync\ncase setup\n}\nclass NetworkRecorder {\nvar data = [RequestBundleType\
    \ : RequestBundle]()\nfunc recordRequest(bundle : RequestBundle, type : RequestBundleType)\
    \ {\n// save the bundle to data\n}\nprivate func saveDataToFile(data : [RequestBundleType\
    \ : RequestBundle]) {\n// save the data into a file.\n}\n}\n```\n\nTo activate\
    \ recording, we can use the launch arguments that we’ve already learned in previous\
    \ chapters (Figure 5-9).\n\n![images/496602_1_En_5_Chapter/496602_1_En_5_Fig9_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig9_HTML.jpg)\n\
    \n**Figure 5-9. Launch Arguments to activate recording**\n\nAll we need to do\
    \ after the snapshotting session is to take the “Gold Responses” file and add\
    \ it to our test bundle so we can validate our requests and responses in the future.\n\
    \nThe gold responses file can look something like this:\n\n```\n[\n{\n\"request\"\
    \ : \"login_request\",\n\"response\" : {\n\"id\" : \"f3e0b3a7-6db7-408e-bd26-a91bf31c03d2\"\
    ,\n\"name\" : \"Avi Tsadok\",\n\"token\" : \"peoqFB8KcAjmVtQfe34TmWxgpumIUEhs\"\
    ,\n\"updated_date\" : \"1589603996\"\n}\n},\n{\n\"request\" :        \"configuration\"\
    ,\n\"response\" : {\n\"push_notification_on\" : 1\n}\n}\n]\n```\n\n## Comparing\
    \ Responses with the Gold Responses File\n\nThe recording session is quite simple.\
    \ We just take the request and response and put it in a file. But the real challenge\
    \ is the comparison.\n\nFirst, I must say these white box tests are very fragile.\
    \ Every small, harmless change in the structure or values can make our tests to\
    \ fail. Keep that in mind, and make sure you implement those tests on critical\
    \ use cases such as sync and login.\n\nNevertheless, if we do decide to write\
    \ white box testing, there are some issues we need to take into consideration:\n\
    \n*   The data type that usually causes problems is **Date/Time** or, in other\
    \ words, **Timestamps**. These values are often driven from the computer time\
    \ or server time. There are several ways to deal with it:\n    *   Sometimes it’s\
    \ important to fail the test **if the timestamp is incorrect**.\n    *   Sometimes,\
    \ the timestamp is **relative**. In this case, we need to adapt our comparison\
    \ also to be relative.\n    *   In most cases, it is better to **ignore** any\
    \ comparison to the values, but just make sure it is present.\n*   We need to\
    \ decide what to do if the response or the request contains additional values\
    \ that are not present in the gold responses file. Usually, extra attributes are\
    \ harmless to your code, and you can ignore them.\n*   If your response contains\
    \ arrays, you need to decide if the order of the elements is crucial.\n\nAs you\
    \ can see, the comparison method you need to write can be complicated. The cost\
    \ of writing white box client-server integration tests is much higher than a black\
    \ box and can break easily.\n\n## Summary\n\nWhile Integration Tests are important,\
    \ they are harder to write and maintain. It is better to write integration tests\
    \ to the critical parts of your app, and this is especially true when talking\
    \ about Client-Server tests. Those tests improve not only your confidence in your\
    \ code but in your system.\n\nIn the next chapter, we’ll do a step backward and\
    \ learn how to prepare our code for testing–both integration and unit tests.\n\
    \n# 6. Write Testable Code\n\n> *Quality means doing it right even when no one\
    \ is looking.*\n>\n> —Henry Ford\n\n## Introduction\n\nWe already know that testing\
    \ your app is a crucial task to maintain high-quality code over time. But to do\
    \ that, we need our tests to be simple and easy.\n\nTestable code is a derivative\
    \ of robust, modular architecture and clean, simple code. Although this chapter\
    \ does not deal directly with testing, it’s a prerequisite to learn how to test\
    \ your code, and in general, it’s a good chance to leverage your code quality.\n\
    \nIn this chapter, you will learn\n\n*   What is **Clean Code**, including terms\
    \ like KISS, DRY, and YAGNI\n*   What are **Pure Functions** and how it can help\
    \ your code to be more testable\n*   The different ways to implement **Dependency\
    \ Injection**\n*   What are **SOLID** principles\n*   Design Patterns that you\
    \ can use to organize your code, including **Singleton, Façade, Decorator, and\
    \ Factory**\n*   What are **MVC, MVP, MVVM, and VIPER** and which one is better\
    \ for your needs"
  raw: "#### White Box Client-Server Testing\n\nBlack Box testing is excellent.\n\n\
    It’s easier to write because you don’t have to deal with test doubles. You are\
    \ not “dirtying” your hands with parsing server response and comparing values.\
    \ Also, usually, black box tests cover the essential things and basic functionality.\n\
    \nBut Black Box testing has its drawbacks. There are cases when checking only\
    \ your functionality is not enough, cases where you need a more profound validation\
    \ and test the structure of your request and response.\n\nData sync is a good\
    \ example – we send a sync request and receive a success response. But is it enough\
    \ to determine that our integration works well? What if we didn’t send all the\
    \ expected data? What if we needed to send a critical flag or essential piece\
    \ of data, but our request was missing this piece of data?\n\nWhite Box Integration\
    \ aims to fill that gap. In white box integration, we go deeper into our testing\
    \ and check the protocols between our client and the server.\n\nThe process of\
    \ creating a white box testing is built upon three steps:\n\n**Bring your app\
    \ to an ideal state**, a state that defined the baseline. From now on, you’re\
    \ going to compare your tests to this state.\n\n**Snapshot that state** – record\
    \ your requests and responses and save them to a file. We can call the saved responses\
    \ “Gold Responses” because those are the ideal responses we should get when we\
    \ run our tests.\n\nIn your tests, **execute your logic functions**, but this\
    \ time, record (again) your requests and responses and, in the end, compare them\
    \ to the gold responses you saved in the early step.\n\nWhile these steps might\
    \ sound scary, building an excellent infrastructure and helpers can help you achieve\
    \ them.\n\n##### Bring Your App to an Ideal State\n\nSure, we can implement TDD\
    \ with this process. But TDD is great when defining behaviors in advance. When\
    \ checking data structures, it is simpler and easier to do it while “snapshotting”\
    \ an ideal state that we reached. By the way, in my opinion, it’s not a wrong\
    \ approach when writing tests other than unit tests.\n\n##### Record the Current\
    \ State\n\nTo record our requests and responses, we need to create some network\
    \ recorder. The network recorder receives the request and the response, bundles\
    \ them together, and saves them to a file (Figure [5-8](#496602_1_En_5_Chapter.xhtml#Fig8)).\n\
    \n![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig8_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig8_HTML.jpg)\n\
    \nFigure 5-8\n\nImplementing a network recorder\n\nThe interface of such a recorder\
    \ is simple:\n\n```\ntypealias RequestData = [AnyHashable : Any]\ntypealias ResponseDate\
    \ = [AnyHashable : Any]\nstruct RequestBundle {\nvar request : RequestData\nvar\
    \ response : ResponseDate\n}\nenum RequestBundleType {\ncase login\ncase register\n\
    case sync\ncase setup\n}\nclass NetworkRecorder {\nvar data = [RequestBundleType\
    \ : RequestBundle]()\nfunc recordRequest(bundle : RequestBundle, type : RequestBundleType)\
    \ {\n// save the bundle to data\n}\nprivate func saveDataToFile(data : [RequestBundleType\
    \ : RequestBundle]) {\n// save the data into a file.\n}\n}\n```\n\nTo activate\
    \ recording, we can use the launch arguments that we’ve already learned in previous\
    \ chapters (Figure [5-9](#496602_1_En_5_Chapter.xhtml#Fig9)).\n\n![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig9_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9\n\nLaunch Arguments to activate recording\n\nAll we need to do after\
    \ the snapshotting session is to take the “Gold Responses” file and add it to\
    \ our test bundle so we can validate our requests and responses in the future.\n\
    \nThe gold responses file can look something like this:\n\n```\n[\n{\n\"request\"\
    \ : \"login_request\",\n\"response\" : {\n\"id\" : \"f3e0b3a7-6db7-408e-bd26-a91bf31c03d2\"\
    ,\n\"name\" : \"Avi Tsadok\",\n\"token\" : \"peoqFB8KcAjmVtQfe34TmWxgpumIUEhs\"\
    ,\n\"updated_date\" : \"1589603996\"\n}\n},\n{\n\"request\" :        \"configuration\"\
    ,\n\"response\" : {\n\"push_notification_on\" : 1\n}\n}\n]\n```\n\n##### Comparing\
    \ Responses with the Gold Responses File\n\nThe recording session is quite simple.\
    \ We just take the request and response and put it in a file. But the real challenge\
    \ is the comparison.\n\nFirst, I must say these white box tests are very fragile.\
    \ Every small, harmless change in the structure or values can make our tests to\
    \ fail. Keep that in mind, and make sure you implement those tests on critical\
    \ use cases such as sync and login.\n\nNevertheless, if we do decide to write\
    \ white box testing, there are some issues we need to take into consideration:\n\
    \n*   The data type that usually causes problems is **Date/Time** or, in other\
    \ words, **Timestamps**. These values are often driven from the computer time\
    \ or server time. There are several ways to deal with it:\n    *   Sometimes it’s\
    \ important to fail the test **if the timestamp is incorrect**.\n\n    *   Sometimes,\
    \ the timestamp is **relative**. In this case, we need to adapt our comparison\
    \ also to be relative.\n\n    *   In most cases, it is better to **ignore** any\
    \ comparison to the values, but just make sure it is present.\n\n*   We need to\
    \ decide what to do if the response or the request contains additional values\
    \ that are not present in the gold responses file. Usually, extra attributes are\
    \ harmless to your code, and you can ignore them.\n\n*   If your response contains\
    \ arrays, you need to decide if the order of the elements is crucial.\n\nAs you\
    \ can see, the comparison method you need to write can be complicated. The cost\
    \ of writing white box client-server integration tests is much higher than a black\
    \ box and can break easily.\n\n## Summary\n\nWhile Integration Tests are important,\
    \ they are harder to write and maintain. It is better to write integration tests\
    \ to the critical parts of your app, and this is especially true when talking\
    \ about Client-Server tests. Those tests improve not only your confidence in your\
    \ code but in your system.\n\nIn the next chapter, we’ll do a step backward and\
    \ learn how to prepare our code for testing – both integration and unit tests.\n\
    \n# 6. Write Testable Code\n\n> *Quality means doing it right even when no one\
    \ is looking.*\n> \n> —Henry Ford\n\n## Introduction\n\nWe already know that testing\
    \ your app is a crucial task to maintain high-quality code over time. But to do\
    \ that, we need our tests to be simple and easy.\n\nTestable code is a derivative\
    \ of robust, modular architecture and clean, simple code. Although this chapter\
    \ does not deal directly with testing, it’s a prerequisite to learn how to test\
    \ your code, and in general, it’s a good chance to leverage your code quality.\n\
    \nIn this chapter, you will learn\n\n*   What is **Clean Code**, including terms\
    \ like KISS, DRY, and YAGNI\n\n*   What are **Pure Functions** and how it can\
    \ help your code to be more testable\n\n*   The different ways to implement **Dependency\
    \ Injection**\n\n*   What are **SOLID** principles\n\n*   Design Patterns that\
    \ you can use to organize your code, including **Singleton, Façade, Decorator,\
    \ and Factory**\n\n*   What are **MVC, MVP, MVVM, and VIPER** and which one is\
    \ better for your needs"
  trans: "\n# 白盒客户端-服务器测试\n\n黑盒测试非常出色。编写黑盒测试更容易，因为你无需处理测试替身。你不需要“弄脏”双手去解析服务器响应和比较数值。此外，黑盒测试通常能覆盖核心功能和基本功能。\n\
    \n但黑盒测试也有其缺点。有些情况下，仅检查功能是不够的，你需要进行更深入的验证，测试请求和响应的结构。\n\n数据同步就是一个很好的例子——我们发送一个同步请求并收到一个成功响应。但这足以确定我们的集成工作良好吗？如果我们没有发送所有预期的数据怎么办？如果我们本应发送一个关键标志或重要的数据片段，但我们的请求中缺失了这部分数据怎么办？\n\
    \n白盒集成测试旨在填补这一空白。在白盒集成测试中，我们进行更深入的测试，检查客户端与服务器之间的协议。\n\n创建白盒测试的过程建立在三个步骤之上：\n\n\
    **将你的应用置于理想状态**，一个定义了基线状态的状态。从此刻起，你将把你的测试与这个状态进行比较。\n\n**对该状态进行快照**——记录你的请求和响应，并将它们保存到文件中。我们可以将保存的响应称为“黄金响应”，因为这些是我们在运行测试时应得的理想响应。\n\
    \n在你的测试中，**执行你的逻辑功能**，但这次，再次记录你的请求和响应，最后将它们与你在早期步骤中保存的黄金响应进行比较。\n\n虽然这些步骤听起来可能有些令人生畏，但构建优秀的基础设施和辅助工具可以帮助你实现它们。\n\
    \n## 将你的应用置于理想状态\n\n当然，我们可以通过这个过程实现 TDD。但 TDD 在提前定义行为时效果显著。当检查数据结构时，在“快照”我们达到的理想状态时进行会更为简单和容易。顺便说一句，在我看来，除了单元测试外，在编写其他测试时采取这种方式并非错误的方法。\n\
    \n## 记录当前状态\n\n为了记录我们的请求和响应，我们需要创建一个网络记录器。网络记录器接收请求和响应，将它们捆绑在一起，并保存到一个文件中（图 5-8）。\n\
    \n![images/496602_1_En_5_Chapter/496602_1_En_5_Fig8_HTML.jpg](img/496602_1_En_5_Fig8_HTML.jpg)\n\
    \n**图 5-8. 实现一个网络记录器**\n\n这种记录器的接口很简单：\n\n```\ntypealias RequestData = [AnyHashable\
    \ : Any]\ntypealias ResponseDate = [AnyHashable : Any]\nstruct RequestBundle {\n\
    var request : RequestData\nvar response : ResponseDate\n}\nenum RequestBundleType\
    \ {\ncase login\ncase register\ncase sync\ncase setup\n}\nclass NetworkRecorder\
    \ {\nvar data = [RequestBundleType : RequestBundle]()\nfunc recordRequest(bundle\
    \ : RequestBundle, type : RequestBundleType) {\n// save the bundle to data\n}\n\
    private func saveDataToFile(data : [RequestBundleType : RequestBundle]) {\n//\
    \ save the data into a file.\n}\n}\n```\n\n要激活记录，我们可以使用我们在前几章中学过的启动参数（图 5-9）。\n\
    \n![images/496602_1_En_5_Chapter/496602_1_En_5_Fig9_HTML.jpg](img/496602_1_En_5_Fig9_HTML.jpg)\n\
    \n**图 5-9. 激活记录的启动参数**\n\n快照会话结束后，我们需要做的就是获取“黄金响应”文件并将其添加到我们的测试包中，以便将来验证我们的请求和响应。\n\
    \n黄金响应文件可能看起来像这样：\n\n```\n[\n{\n\"request\" : \"login_request\",\n\"response\"\
    \ : {\n\"id\" : \"f3e0b3a7-6db7-408e-bd26-a91bf31c03d2\",\n\"name\" : \"Avi Tsadok\"\
    ,\n\"token\" : \"peoqFB8KcAjmVtQfe34TmWxgpumIUEhs\",\n\"updated_date\" : \"1589603996\"\
    \n}\n},\n{\n\"request\" :        \"configuration\",\n\"response\" : {\n\"push_notification_on\"\
    \ : 1\n}\n}\n]\n```\n\n## 与黄金响应文件比较响应\n\n记录会话相当简单。我们只需要获取请求和响应并将其放入一个文件。但真正的挑战在于比较。\n\
    \n首先，我必须说这些白盒测试非常脆弱。结构或值上的每一个微小、无害的更改都可能导致我们的测试失败。请记住这一点，并确保你在关键的用例（如同步和登录）上实现这些测试。\n\
    \n尽管如此，如果我们决定编写白盒测试，有一些问题需要考虑：\n\n*   通常引起问题的数据类型是**日期/时间**，或者换句话说，**时间戳**。这些值通常来自计算机时间或服务器时间。有几种处理方法：\n\
    \    *   有时，**如果时间戳不正确**，测试失败很重要。\n    *   有时，时间戳是**相对的**。在这种情况下，我们也需要调整我们的比较方式，使其成为相对的。\n\
    \    *   在大多数情况下，最好**忽略**与这些值的任何比较，只需确保它存在即可。\n*   我们需要决定，如果响应或请求包含黄金响应文件中不存在的额外值，该怎么办。通常，额外的属性对你的代码是无害的，你可以忽略它们。\n\
    *   如果你的响应包含数组，你需要决定元素的顺序是否至关重要。\n\n正如你所看到的，你需要编写的比较方法可能会很复杂。编写白盒客户端-服务器集成测试的成本远高于黑盒测试，并且很容易被破坏。\n\
    \n## 总结\n\n虽然集成测试很重要，但它们更难编写和维护。最好为你应用的关键部分编写集成测试，这在涉及客户端-服务器测试时尤其正确。这些测试不仅能提高你对代码的信心，还能增强你对整个系统的信心。\n\
    \n在下一章中，我们将后退一步，学习如何为集成测试和单元测试准备我们的代码。\n\n# 6. 编写可测试代码\n\n> *质量意味着即使无人监督，也要把事情做好。*\n\
    >\n> —亨利·福特\n\n## 引言\n\n我们已经知道，测试你的应用是长期保持高质量代码的关键任务。但要做到这一点，我们需要我们的测试简单易行。\n\n\
    可测试代码是健壮、模块化架构以及简洁、简单代码的衍生物。尽管本章不直接讨论测试，但它是学习如何测试代码的前提，总的来说，这也是提升代码质量的好机会。\n\n\
    在本章中，你将学习：\n\n*   **什么是整洁代码**，包括 KISS、DRY 和 YAGNI 等术语。\n*   **什么是纯函数**以及它如何帮助你的代码更具可测试性。\n\
    *   实现**依赖注入**的不同方法。\n*   **SOLID** 原则是什么。\n*   可用于组织代码的**设计模式**，包括**单例模式、外观模式、装饰器模式和工厂模式**。\n\
    *   **什么是 MVC、MVP、MVVM 和 VIPER**，以及哪种更适合你的需求。\n"
- fmt: "## What Is a Testable Code?\n\nTestable code is a code you don’t need to struggle\
    \ with writing automated tests for. In most cases, it also means high-quality,\
    \ simple, and readable code.\n\nLook at the following code from the main screen\
    \ of our great My Weather app:\n\n```\noverride func viewDidAppear(_ animated:\
    \ Bool) {\n    super.viewDidAppear(animated)\n    var request = URLRequest(url:\
    \ URL(string: \"http://www.myweatherapp.com/getCities.php\")!)\n    request.httpMethod\
    \ = \"GET\"\n    let task = networkSession.dataTask(with: request) {(data, response,\
    \ error) in\n        if let receivedData = data {\n            try receivedData.write(to:\
    \ self.localURL)\n        }\n    }\n    task.resume()\n}\n```\n\nLet’s summarize\
    \ what this code snippet does:\n*   Runs when the screen appeared\n*   Creates\
    \ a GET request\n*   Creates a data task to send the request\n*   Writes the received\
    \ data from the GET request to a local file\n\nWhile it may seem like a simple\
    \ code, it is unlikely to be testable from the following reasons:\n*   All the\
    \ code is inside the `viewDidAppear` method. This method is part of the `UIViewController`\
    \ life cycle and potentially contains more code not related to downloading files.\
    \ Also, we may want to move this code out in the future and put it in another\
    \ method. This step can cause our tests to fail when doing that.\n*   The code\
    \ sends an HTTP request to our server. While in some integration tests this is\
    \ acceptable, we don’t want to rely on an Internet connection or server state\
    \ in our unit and BDD tests (not even in some UI Tests). We can’t let server or\
    \ network issues affect the result of our tests, and in this example, it is difficult\
    \ to mock our requests.\n*   In case of success, the code writes data to a file.\
    \ Checking if the file is written is excellent for integration tests, less for\
    \ unit tests. Having a function with a side effect is less convenient to test,\
    \ especially if it involves I/O operations.\n\nBut don’t worry! There are a couple\
    \ of things we can do to improve our code.\n\nFirst, we can remove the code from\
    \ the `viewDidAppear` method and put it in its own function. Second, we can create\
    \ two service layers, `NetworkClient` to handle network requests and `DataLayer`\
    \ to handle I/O operations.\n\nLook at the following fixed code:\n\n```\noverride\
    \ func viewDidAppear(_ animated: Bool) {\n    super.viewDidAppear(animated)\n\
    \    loadCities()\n}\n\nfunc loadCities() {\n    NetworkClient.shared.fetchCities\
    \ {(data) in\n        if let receivedData = data {\n            DataLayer().saveCitiesData(data:\
    \ receivedData)\n        }\n    }\n}\n```\n\nNow our code is much cleaner, easy\
    \ to read, and, yes, more testable. You can test `loadCities()` function; without\
    \ worry, it might contain unrelated logic, and it’s straightforward to mock all\
    \ the other dependencies.\n\nWe can say that writing clean and modular code is\
    \ not only a higher-quality code, but it’s also a more testable one. Testable\
    \ code and high-quality code naturally go hand in hand, and this is what this\
    \ chapter is all about.\n\n## Clean Code\n\nThere are plenty of great books discussing\
    \ clean Code. The primary excuse for not writing a clean and structured Code is\
    \ “not enough time.” Well, writing a clean Code doesn’t mean “more time.” Not\
    \ only that, but cleaner code can also actually save you time in the future while\
    \ being easier to maintain and test. Clean Code is a matter of mindset.\n\nThere\
    \ are several principles and guidelines for writing a clean Code, and I will go\
    \ over some of them.\n\n### KISS (Keep It Simple, Stupid)\n\nKISS states for “Keep\
    \ It Simple, Stupid”. KISS is not just the “One Rule to Rule Them All,” but it’s\
    \ also the hardest rule to follow.\n\nThe root of the problem is human nature.\
    \ When we write code, we understand it. We understand it the same day later and\
    \ maybe even the day after.\n\nBut a few months later or even a few weeks later,\
    \ when we look at our code, we find ourselves struggling to understand what we\
    \ wrote.\n\nIronically, it’s more common to see a dirty, complex code in a beginner’s\
    \ code. The reason is that writing a simple code is complicated. It takes a lot\
    \ of experience and knowledge to write a simple, structural code, with clear function\
    \ names, layers, and good, understandable API.\n\nIt also requires abstract thinking,\
    \ technology understating, and mostly much maturity not to chase every new framework\
    \ or language feature the minute they pop up.\n\nBut there are some rule thumbs\
    \ for keeping your code simple.\n\n> *Measuring programming progress by lines\
    \ of code is like measuring aircraft building progress by weight.*\n>\n> —Bill\
    \ Gates\n\n**Less is more**: shorter functions, shorter classes, and shorter files.\
    \ If your function takes more than 50 or 60 lines of code, it’s a good sign for\
    \ you to reconsider rewriting or splitting it.\n\nThe same goes for classes –\
    \ they need to be short with no more than 20 methods. Imagine someone trying to\
    \ read a class interface with 40–50 methods. Just like long methods, consider\
    \ splitting it.\n\nLess code is less code to read and, more importantly, less\
    \ code to debug and test.\n\nAfter 30 statements you have in your function, chances\
    \ to have a bug increase. It becomes harder to cover all the states and output\
    \ the function can produce.\n\nThe nature of big functions is to get bigger and\
    \ bigger until they become code monsters that no one knows how they work, and\
    \ everybody prays they won’t break in the future.\n\n**Handle variables with care**.\
    \ If your code is like a “country,” the variables are its “citizens.” Don’t give\
    \ them meaningless names like “i” or “qty”; try names like “city” or “firstPersonInTheList”.\
    \ Think of your code as a story written in English, not Swift.\n\nKeep your variables’\
    \ scope as small as possible. Don’t declare variables outside of a for loop when\
    \ you only use them inside the loop. Try to avoid instance variables to float\
    \ around your class if you can pass them as an argument to functions.\n\n**Don’t\
    \ reuse variables** – if you have a string variable that was used to store a person’s\
    \ first name, don’t reuse it to store last name or an email. This can cause you\
    \ headaches, trying to understand what that variable represents at a specific\
    \ statement.\n\nUse `Typealias` when you can. `Typealias` is a great way to explain\
    \ your code without the need for comments.\n\n### DRY\n\nDRY stands for **Don’t\
    \ Repeat Yourself**, and it means that every piece of knowledge or logic you have\
    \ in your app should be in one single place and not duplicated across your project.\
    \ This can be either business logic code, network access, UI Component, or anything\
    \ you think of that should be in one place and copied around your project. Code\
    \ duplication is a common source for bugs or inconsistent behavior, and every\
    \ developer knows that it is considered being bad practice.\n\n### YAGNI (You\
    \ Aren’t Gonna Need It)\n\nYAGNI is another simplicity principle saying that you\
    \ shouldn’t develop a feature or be prepared for it unless you are going to use\
    \ or need it.\n\nThere is an assumption that when a developer works on a feature,\
    \ he should take into account potential future extensions to the feature and,\
    \ as a result, to build a flexible architecture in the cost of simplicity and\
    \ readability.\n\nThis assumption is based on the idea that building a system\
    \ at the thought of future changes is more cost-effective than doing those changes\
    \ later.\n\nThe problem is that the cost estimation doesn’t include maintenance\
    \ over time, more complicated tests to support it, and a much more complex system\
    \ to work with. It’s much more comfortable and cost-effective to write simple\
    \ code that works and refactor when the time comes.\n\nI’m not saying don’t write\
    \ flexible architectures – but in most cases, future features that we don’t know\
    \ what they are and if they will come are not developed at all. In the meantime,\
    \ this complex system that we built has cost us with extra maintenance we don’t\
    \ need."
  raw: "## What Is a Testable Code?\n\nTestable code is a code you don’t need to struggle\
    \ with writing automated tests for. In most cases, it also means high-quality,\
    \ simple, and readable code.\n\nLook at the following code from the main screen\
    \ of our great My Weather app:\n\n```\noverride func  viewDidAppear(_ animated:\
    \ Bool) {\nsuper.viewDidAppear(animated)\nvar request = URLRequest(url: URL(string:\
    \ \"http://www.myweatherapp.com/getCities.php\")!)\nrequest.httpMethod = \"GET\"\
    \nlet task = networkSession.dataTask(with: request) {(data, response, error) in\n\
    if let receivedData = data {\ntry receivedData.write(to: self.localURL)\n}\n}\n\
    task.resume()\n}\n```\n\nLet’s summarize what this code snippet does:\n\n*   Runs\
    \ when the screen appeared\n\n*   Creates a GET request\n\n*   Creates a data\
    \ task to send the request\n\n*   Writes the received data from the GET request\
    \ to a local file\n\nWhile it may seem like a simple code, it is unlikely to be\
    \ testable from the following reasons:\n\n*   All the code **is inside the** **ViewDidAppear\
    \ method** . This method is part of the UIViewController life cycle and potentially\
    \ contains more code not related to downloading files. Also, we may want to move\
    \ this code out in the future and put it in another method. This step can cause\
    \ our tests to fail when doing that.\n\n*   The code sends an HTTP request to\
    \ our server. While in some integration tests this is acceptable, we don’t want\
    \ to rely on an Internet connection or server state in our unit and BDD tests\
    \ (not even in some UI Tests). We can’t let **server or network issues** affect\
    \ the result of our tests, and in this example, it is difficult to mock our requests.\n\
    \n*   In case of success, the code writes data to a file. Checking if the file\
    \ is written is excellent for integration tests, less for unit tests. Having a\
    \ function with **a side effect** is less convenient to test, especially if it\
    \ involves I/O operations.\n\nBut don’t worry! There are a couple of things we\
    \ can do to improve our code.\n\nFirst, we can remove the code from the viewDidAppear\
    \ method and put it in its own function. Second, we can create two service layers,\
    \ **NetworkClient** to handle network requests and **DataLayer** to handle I/O\
    \ operations.\n\nLook at the following fixed code:\n\n```\noverride func  viewDidAppear(_\
    \ animated: Bool) {\nsuper.viewDidAppear(animated)\nloadCities()\n}\nfunc loadCities()\
    \ {\nNetworkClient.shared.fetchCities {(data) in\nif let receivedData = data {\n\
    DataLayer().saveCitiesData(data: receivedData)\n}\n}\n}\n```\n\nNow our code is\
    \ much cleaner, easy to read, and, yes, more testable. You can test loadCities()\
    \ function; without worry, it might contain unrelated logic, and it’s straightforward\
    \ to mock all the other dependencies.\n\nWe can say that writing clean and modular\
    \ code is not only a higher-quality code, but it’s also a more testable one. Testable\
    \ code and high-quality code naturally go hand in hand, and this is what this\
    \ chapter is all about.\n\n## Clean Code\n\nThere are plenty of great books discussing\
    \ clean Code. The primary excuse for not writing a clean and structured Code is\
    \ “not enough time.” Well, writing a clean Code doesn’t mean “more time.” Not\
    \ only that, but cleaner code can also actually save you time in the future while\
    \ being easier to maintain and test. Clean Code is a matter of mindset.\n\nThere\
    \ are several principles and guidelines for writing a clean Code, and I will go\
    \ over some of them.\n\n### KISS (Keep It Simple, Stupid)\n\nKISS states for “Keep\
    \ It Simple, Stupid”. KISS is not just the “One Rule to Rule Them All,” but it’s\
    \ also the hardest rule to follow.\n\nThe root of the problem is human nature.\
    \ When we write code, we understand it. We understand it the same day later and\
    \ maybe even the day after.\n\nBut a few months later or even a few weeks later,\
    \ when we look at our code, we find ourselves struggling to understand what we\
    \ wrote.\n\nIronically, it’s more common to see a dirty, complex code in a beginner’s\
    \ code. The reason is that writing a simple code is complicated. It takes a lot\
    \ of experience and knowledge to write a simple, structural code, with clear function\
    \ names, layers, and good, understandable API.\n\nIt also requires abstract thinking,\
    \ technology understating, and mostly much maturity not to chase every new framework\
    \ or language feature the minute they pop up.\n\nBut there are some rule thumbs\
    \ for keeping your code simple.\n\n> *Measuring programming progress by lines\
    \ of code is like measuring aircraft building progress by weight.*\n> \n> —Bill\
    \ Gates\n\n**Less is more**: shorter functions, shorter classes, and shorter files.\
    \ If your function takes more than 50 or 60 lines of code, it’s a good sign for\
    \ you to reconsider rewriting or splitting it.\n\nThe same goes for classes –\
    \ they need to be short with no more than 20 methods. Imagine someone trying to\
    \ read a class interface with 40–50 methods. Just like long methods, consider\
    \ splitting it.\n\nLess code is less code to read and, more importantly, less\
    \ code to debug and test.\n\nAfter 30 statements you have in your function, chances\
    \ to have a bug increase. It becomes harder to cover all the states and output\
    \ the function can produce.\n\nThe nature of big functions is to get bigger and\
    \ bigger until they become code monsters that no one knows how they work, and\
    \ everybody prays they won’t break in the future.\n\n**Handle variables with care**.\
    \ If your code is like a “country,” the variables are its “citizens.” Don’t give\
    \ them meaningless names like “i” or “qty”; try names like “city” or “firstPersonInTheList”.\
    \ Think of your code as a story written in English, not Swift.\n\nKeep your **variables’\
    \ scope as small as possible**. Don’t declare variables outside of a for loop\
    \ when you only use them inside the loop. Try to avoid instance variables to float\
    \ around your class if you can pass them as an argument to functions.\n\n**Don’t\
    \ reuse variables** – if you have a string variable that was used to store a person’s\
    \ first name, don’t reuse it to store last name or an email. This can cause you\
    \ headaches, trying to understand what that variable represents at a specific\
    \ statement.\n\nUse **Typealias** when you can. Typealias is a great way to explain\
    \ your code without the need for comments.\n\n### DRY\n\nDRY stands for **Don’t\
    \ Repeat Yourself** , and it means that every piece of knowledge or logic you\
    \ have in your app should be in one single place and not duplicated across your\
    \ project. This can be either business logic code, network access, UI Component,\
    \ or anything you think of that should be in one place and copied around your\
    \ project. Code duplication is a common source for bugs or inconsistent behavior,\
    \ and every developer knows that it is considered being bad practice.\n\n### YAGNI\
    \ (You Aren’t Gonna Need It)\n\nYAGNI is another simplicity principle saying that\
    \ you shouldn’t develop a feature or be prepared for it unless you are going to\
    \ use or need it.\n\nThere is an assumption that when a developer works on a feature,\
    \ he should take into account potential future extensions to the feature and,\
    \ as a result, to build a flexible architecture in the cost of simplicity and\
    \ readability.\n\nThis assumption is based on the idea that building a system\
    \ at the thought of future changes is more cost-effective than doing those changes\
    \ later.\n\nThe problem is that the cost estimation doesn’t include maintenance\
    \ over time, more complicated tests to support it, and a much more complex system\
    \ to work with. It’s much more comfortable and cost-effective to write simple\
    \ code that works and refactor when the time comes.\n\nI’m not saying **don’t**\
    \ write flexible architectures – but in most cases, future features that we don’t\
    \ know what they are and if they will come are not developed at all. In the meantime,\
    \ this complex system that we built has cost us with extra maintenance we don’t\
    \ need."
  trans: "\n## 什么是可测试的代码？\n\n可测试的代码是指你无需费劲就能为其编写自动化测试的代码。在大多数情况下，它也意味着高质量、简洁且可读性强的代码。\n\
    \n看看我们优秀的“我的天气”应用主屏幕中的以下代码：\n\n```\noverride func viewDidAppear(_ animated: Bool)\
    \ {\n    super.viewDidAppear(animated)\n    var request = URLRequest(url: URL(string:\
    \ \"http://www.myweatherapp.com/getCities.php\")!)\n    request.httpMethod = \"\
    GET\"\n    let task = networkSession.dataTask(with: request) {(data, response,\
    \ error) in\n        if let receivedData = data {\n            try receivedData.write(to:\
    \ self.localURL)\n        }\n    }\n    task.resume()\n}\n```\n\n让我们总结一下这段代码的作用：\n\
    *   在屏幕出现时运行\n*   创建一个 GET 请求\n*   创建一个数据任务来发送请求\n*   将来自 GET 请求的接收数据写入本地文件\n\n\
    虽然这看起来像是一段简单的代码，但它很可能不可测试，原因如下：\n*   所有代码都在 `viewDidAppear` 方法内部。此方法是 `UIViewController`\
    \ 生命周期的一部分，可能还包含与下载文件无关的更多代码。此外，我们将来可能希望将这段代码移出并放入另一个方法中。这一步可能会导致我们的测试在这样做时失败。\n\
    *   代码向我们的服务器发送 HTTP 请求。虽然在某些集成测试中这是可以接受的，但我们不希望在我们的单元测试和 BDD 测试（甚至在一些 UI 测试中）依赖于网络连接或服务器状态。我们不能让服务器或网络问题影响我们的测试结果，而且在这个例子中，模拟我们的请求很困难。\n\
    *   在成功的情况下，代码将数据写入文件。检查文件是否已写入对于集成测试来说很好，但对于单元测试则次之。具有副作用的函数测试起来不太方便，尤其是在涉及 I/O\
    \ 操作时。\n\n但别担心！我们可以做几件事来改进我们的代码。\n\n首先，我们可以将代码从 `viewDidAppear` 方法中移除，并将其放在自己的函数中。其次，我们可以创建两个服务层：`NetworkClient`\
    \ 来处理网络请求，`DataLayer` 来处理 I/O 操作。\n\n看看下面修复后的代码：\n\n```\noverride func viewDidAppear(_\
    \ animated: Bool) {\n    super.viewDidAppear(animated)\n    loadCities()\n}\n\n\
    func loadCities() {\n    NetworkClient.shared.fetchCities {(data) in\n       \
    \ if let receivedData = data {\n            DataLayer().saveCitiesData(data: receivedData)\n\
    \        }\n    }\n}\n```\n\n现在我们的代码更加整洁、易于阅读，是的，也更可测试。你可以测试 `loadCities()` 函数；无需担心它可能包含无关的逻辑，并且模拟所有其他依赖项非常直接。\n\
    \n我们可以说，编写干净和模块化的代码不仅是更高质量的代码，而且也是更具可测试性的代码。可测试的代码和高质量的代码自然相辅相成，这正是本章的全部内容。\n\n\
    ## 整洁代码\n\n有很多优秀的书籍讨论整洁代码。不编写整洁和结构化代码的主要借口是“时间不够”。然而，编写整洁的代码并不意味着“花费更多时间”。不仅如此，更整洁的代码实际上可以在未来为你节省时间，同时也更易于维护和测试。整洁代码是一种思维模式。\n\
    \n编写整洁代码有若干原则和指导方针，我将介绍其中的一些。\n\n### KISS（保持简单）\n\nKISS 代表“保持简单，傻瓜”。KISS 不仅仅是“万法归一的法则”，也是最难遵循的规则。\n\
    \n问题的根源在于人性。当我们编写代码时，我们理解它。我们当天晚些时候甚至第二天也能理解它。\n\n但是几个月后，甚至几周后，当我们查看自己的代码时，我们会发现自己难以理解当初写的是什么。\n\
    \n讽刺的是，在初学者的代码中更常见的是脏乱、复杂的代码。原因在于，编写简单的代码是复杂的。编写一个简单、结构化的代码，具有清晰的函数名、分层以及良好易懂的\
    \ API，需要大量的经验和知识。\n\n它还需要抽象思维、对技术的深刻理解，以及主要是不追逐每一个新出现框架或语言特性的成熟度。\n\n但有一些经验法则可以让你的代码保持简单。\n\
    \n> *用代码行数来衡量编程进度，就像用重量来衡量飞机制造进度。*\n>\n> —比尔·盖茨\n\n**少即是多**：更短的函数、更短的类、更短的文件。如果你的函数超过\
    \ 50 或 60 行代码，这是一个让你考虑重写或拆分它的好迹象。\n\n类也是如此——它们需要简短，方法不要超过 20 个。想象一下，有人试图阅读一个包含\
    \ 40-50 个方法的类接口。就像冗长的方法一样，考虑拆分它。\n\n更少的代码意味着需要阅读的代码更少，更重要的是，需要调试和测试的代码也更少。\n\n\
    当你的函数包含 30 条语句后，出现错误的几率会增加。覆盖所有可能的状态和函数产生的输出变得更加困难。\n\n大型函数的本质是变得越来越大，直到它们变成没有人知道如何工作的代码怪物，每个人都祈祷它们将来不会出问题。\n\
    \n**谨慎处理变量**。如果你的代码就像一个“国家”，那么变量就是它的“公民”。不要给它们起像“i”或“qty”这样无意义的名字；尝试使用像“city”或“firstPersonInTheList”这样的名字。把你的代码想象成用英语写的故事，而不是\
    \ Swift。\n\n尽可能缩小变量的作用域。如果仅在循环内部使用变量，不要将其声明在 for 循环外部。如果可以将其作为参数传递给函数，尽量避免让实例变量在类中随意浮动。\n\
    \n**不要重用变量**——如果你有一个用于存储人名名字的字符串变量，请不要重用它来存储姓氏或电子邮件。这会让你在试图理解某个特定语句中该变量代表什么时感到头疼。\n\
    \n在可能的情况下使用 `Typealias`。`Typealias` 是一种无需注释就能解释代码的好方法。\n\n### DRY\n\nDRY 代表**不要重复你自己**，这意味着你在应用程序中拥有的每一段知识或逻辑都应放在一个单独的地方，而不是在你的项目中重复出现。这可以是业务逻辑代码、网络访问、UI\
    \ 组件，或者任何你认为应该放在一个地方而不应在项目中到处复制的东西。代码重复是错误或不一致行为的常见根源，每个开发者都知道这被认为是糟糕的实践。\n\n\
    ### YAGNI（你不会需要它）\n\nYAGNI 是另一个提倡简单的原则，意思是除非你将使用或需要某个功能，否则不应该开发该功能或为其做准备。\n\n\
    有一种假设认为，当开发人员开发一个功能时，他应该考虑到该功能未来可能的扩展，并因此构建一个灵活的架构，但代价是牺牲简洁性和可读性。\n\n这种假设基于这样一种想法：在设计系统时就考虑到未来的变化，比以后再做这些变更更具成本效益。\n\
    \n问题在于，成本估算没有包括长期的维护、为支持它而编写的更复杂的测试，以及一个更复杂的系统需要处理。编写能工作的简单代码，并在时机成熟时进行重构，要舒适得多，也更具成本效益。\n\
    \n我不是说不应该编写灵活的架构——但在大多数情况下，我们不知道是什么以及是否会出现的未来功能根本没有被开发出来。与此同时，我们构建的这个复杂系统却让我们承担了本不需要的额外维护成本。\n"
- fmt: '### Code That Is Pleasant to Read Is Also Pleasant to Test


    I mentioned before that quality and testability go hand in hand. Pleasant to read
    code is also easier to test. The primary thumb rule for knowing if your code is
    readable is comments. If you overuse comments, this can be a good sign, something
    is wrong with your code, and it may be too complicated to understand.


    Swift has some great tools to help you make your code more delightful.


    I mentioned `Typealias` before as a way to write the names of a descriptive and
    meaningful variable, but there are more ways to make your code look more delicate.


    For example, instead of writing a function with lots of arguments, it is better
    to pass a struct bundling them together.


    Take a look at the following code:


    ```

    func runRegistrationProcess(email : String, name : String, password : String,
    receivingEmailApproval : Bool) {

    }

    ```


    Now it can look like this:


    ```

    struct RegistrationData {

    var email                   :   String

    var name                    :   String

    var password                :   String

    var receivingEmailApproval  :   Bool

    }

    func runRegistrationProcess(registrationData : RegistrationData) {

    }

    ```


    Nice, isn’t it? Also, it’s better for testing, because it makes the API much more
    clear and predefined, and those arguments can be quickly passed forward to more
    functions and objects.


    Another way to make your code more beautiful is to define your code style and
    naming conventions. Code Style (indentations, empty lines between methods, variables
    order, and more) is not only for the look. When you keep your code’s structure
    constant, it makes your code scanning much more comfortable and makes use of the
    short-term memory better. It can help you read old code better and make your debug
    session much easier. It doesn’t matter what code style you choose as long as you
    keep it constant throughout your project.


    Of course, all the principles given also refer to the testing code. You should
    treat your tests as a “Real” code and not just a playground for your app. Testing
    code is also a code you need to maintain and debug overtime.


    ## Pure Functions


    This is another way to make our code more testable and clean.


    One of the key factors for testing is the ability to run your tests over and over
    again with the same arguments and expect the same behavior at each run.


    To reach a very stable testing bundle, we need our tests to be isolated from any
    external state, both for input and for output. One of the problems we have in
    object-oriented programming is that its encapsulation nature encourages us to
    use instance variables inside our functions, which kind of is missing the point
    of isolation.


    `Pure Functions` are functions that don’t generate any side effects or do not
    depend on the external state like global or instance variables in a way that you
    always get the same output for the same input.


    To achieve that, we want to pass all the required data using the function’s arguments,
    including the instance variables. Take a look at Figure [6-1](#496602_1_En_6_Chapter.xhtml#Fig1).


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig1_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Pure Function vs. Standard function


    The class displayed in diagram A doesn’t have any pure functions. It has one function
    that makes use of other functions, and they both work with instance variables.
    By looking at Figure [6-1](#496602_1_En_6_Chapter.xhtml#Fig1), you can understand
    that those functions are not “pure”. This means those functions have side effects,
    and they are based on an instance variable.


    To test those functions, you need to make sure this instance variable is set to
    a specific value before you start the test itself.


    Setting up the initial state before each test run can lead to complicated test
    functions, with a high chance of breaking them in the future.


    Now let’s take a look at the diagram B (still, Figure [6-1](#496602_1_En_6_Chapter.xhtml#Fig1)).
    You can see that the described pure function is not working with any instance
    or global variable and therefore always produces the same results for the same
    arguments.


    This is also true for calling system and SDK framework since they also potentially
    hold their own state.


    ### Refactor Our Functions to Be Pure


    One thumb rule you can use to check if your function is pure is to move it to
    another class. If you have to modify the function implementation to use it, good
    chances are it’s not pure. Pure functions need to be not only class agnostic but
    also SDK agnostic.


    Take a look at the method `updateTitle(:)` in `CitiesViewController`:


    ```

    class CitiesViewController: UIViewController {

    var topTitle : String?

    var placeType: String = "City"

    override func viewDidLoad() {

    super.viewDidLoad()

    updateTitle(newTitle: "New York")

    }

    func updateTitle(newTitle : String) {

    self.topTitle = String(format: "%@ - %@", placeType, newTitle.uppercased())

    }

    }

    ```


    It seems like a straightforward code – `updateTitle(:)` is getting one argument
    and sets the top title according to the new title and `placeType` instance variable.
    You can already understand that this method is not pure. The method is based on
    an instance variable in the input side and updates another instance variable on
    the output side.


    The good news is that it’s really easy to refactor the code and change this function
    to be pure:


    ```

    class CitiesViewController: UIViewController {

    var topTitle : String?

    var placeType : String = "City"

    override func viewDidLoad() {

    super.viewDidLoad()

    topTitle = updateTitle(newTitle: "New York", placeType: placeType)

    }

    func updateTitle(newTitle : String, placeType : String)->String {

    return String(format: "%@ - %@", placeType, newTitle.uppercased())

    }

    }

    ```


    In the refactored code, you can see I added another argument to the function called
    “placeType” and that the method no longer changes the instance variable; instead,
    it returns the new value.


    While this may look like a small change, it makes the function totally pure. This
    isolation means that tests for this function are very easy to set up.


    To summarize pure function:


    *   It is better to try and make your functions return a value instead of updating
    an instance or a global variable.

    *   Try to pass arguments to the function instead of preventing it from accessing
    your instance variables, other frameworks, or singletons.

    *   The best way to check if your function is pure is to try and move it to another
    place in your code. If you can still use it, it’s probably pure.


    ### Protocol-Oriented Programming


    The main advantage of using Protocols instead of basic OOP (object-oriented programming
    ) is that a class can conform to multiple protocols. This ability allows us to
    design a very flexible and modular architecture. This ensures transparent and
    predictable behavior, which is very important for building tests.


    When you design your architecture, try to make your layers connect with each other
    only through protocols. Take a look at Figure [6-2](#496602_1_En_6_Chapter.xhtml#Fig2).


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig2_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Protocol-oriented programming


    Protocols are the “glue” that connects the objects in your architecture. This
    flexibility is reflected by the fact that you can replace each object in your
    system with a new one as long as it conforms to the required protocol. Replacing
    objects easily is really handy when we talk about mocking layers and behaviors.'
  raw: '### Code That Is Pleasant to Read Is Also Pleasant to Test


    I mentioned before that quality and testability go hand in hand. Pleasant to read
    code is also easier to test. The primary thumb rule for knowing if your code is
    readable is comments. If you overuse comments, this can be a good sign, something
    is wrong with your code, and it may be too complicated to understand.


    Swift has some great tools to help you make your code more delightful.


    I mentioned **Typealias** before as a way to write the names of a descriptive
    and meaningful variable, but there are more ways to make your code look more delicate.


    For example, instead of writing a function with lots of arguments, it is better
    to **pass a struct bundling** them together.


    Take a look at the following code:


    ```

    func runRegistrationProcess(email : String, name : String, password : String,
    receivingEmailApproval : Bool) {

    }

    ```


    Now it can look like this:


    ```

    struct RegistrationData {

    var email                   :   String

    var name                    :   String

    var password                :   String

    var receivingEmailApproval  :   Bool

    }

    func runRegistrationProcess(registrationData : RegistrationData) {

    }

    ```


    Nice, isn’t it? Also, it’s better for testing, because it makes the API much more
    clear and predefined, and those arguments can be quickly passed forward to more
    functions and objects.


    Another way to make your code more beautiful is to define your **code style and
    naming conventions**. Code Style (indentations, empty lines between methods, variables
    order, and more) is not only for the look. When you keep your code’s structure
    constant, it makes your code scanning much more comfortable and makes use of the
    short-term memory better. It can help you read old code better and make your debug
    session much easier. It doesn’t matter what code style you choose as long as you
    keep it constant throughout your project.


    Of course, all the principles given also refer to the testing code. You should
    treat your tests as a “Real” code and not just a playground for your app. Testing
    code is also a code you need to maintain and debug overtime.


    ## Pure Functions


    This is another way to make our code more testable and clean.


    One of the key factors for testing is the ability to run your tests over and over
    again with the same arguments and expect the same behavior at each run.


    To reach a very stable testing bundle, we need our tests to be **isolated** from
    any external state, both for input and for output. One of the problems we have
    in object-oriented programming is that its encapsulation nature encourages us
    to use instance variables inside our functions, which kind of is missing the point
    of isolation.


    **Pure Functions** are functions that don’t generate any side effects or do not
    depend on the external state like global or instance variables in a way that you
    always get the same output for the same input.


    To achieve that, we want to pass all the required data using the function’s arguments,
    including the instance variables. Take a look at Figure [6-1](#496602_1_En_6_Chapter.xhtml#Fig1).


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig1_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Pure Function vs. Standard function


    The class displayed in diagram A doesn’t have any pure functions. It has one function
    that makes use of other functions, and they both work with instance variables.
    By looking at Figure [6-1](#496602_1_En_6_Chapter.xhtml#Fig1), you can understand
    that those functions are not “pure”. This means those functions have side effects,
    and they are based on an instance variable.


    To test those functions, you need to make sure this instance variable is set to
    a specific value before you start the test itself.


    Setting up the initial state before each test run can lead to complicated test
    functions, with a high chance of breaking them in the future.


    Now let’s take a look at the diagram B (still, Figure [6-1](#496602_1_En_6_Chapter.xhtml#Fig1)).
    You can see that the described pure function is not working with any instance
    or global variable and therefore always produces the same results for the same
    arguments.


    This is also true for calling system and SDK framework since they also potentially
    hold their own state.


    ### Refactor Our Functions to Be Pure


    One thumb rule you can use to check if your function is pure is to move it to
    another class. If you have to modify the function implementation to use it, good
    chances are it’s not pure. Pure functions need to be not only class agnostic but
    also SDK agnostic.


    Take a look at the method updateTitle(:) in CitiesViewController:


    ```

    class CitiesViewController: UIViewController {

    var topTitle : String?

    var placeType: String = "City"

    override func viewDidLoad() {

    super.viewDidLoad()

    updateTitle(newTitle: "New York")

    }

    func updateTitle(newTitle : String) {

    self.topTitle = String(format: "%@ - %@", placeType, newTitle.uppercased())

    }

    }

    ```


    It seems like a straightforward code – updateTitle(:) is getting one argument
    and sets the top title according to the new title and placeType instance variable.
    You can already understand that this method is not pure. The method is based on
    an instance variable in the input side and updates another instance variable on
    the output side.


    The good news is that it’s really easy to refactor the code and change this function
    to be pure:


    ```

    class CitiesViewController: UIViewController {

    var topTitle : String?

    var placeType : String = "City"

    override func viewDidLoad() {

    super.viewDidLoad()

    topTitle = updateTitle(newTitle: "New York", placeType: placeType)

    }

    func updateTitle(newTitle : String, placeType : String)->String {

    return String(format: "%@ - %@", placeType, newTitle.uppercased())

    }

    }

    ```


    In the refactored code, you can see I added another argument to the function called
    “placeType” and that the method no longer changes the instance variable; instead,
    it returns the new value.


    While this may look like a small change, it makes the function totally pure. This
    isolation means that tests for this function are very easy to set up.


    To summarize pure function:


    *   It is better to try and make your functions return a value instead of updating
    an instance or a global variable.


    *   Try to pass arguments to the function instead of preventing it from accessing
    your instance variables, other frameworks, or singletons.


    *   The best way to check if your function is pure is to try and move it to another
    place in your code. If you can still use it, it’s probably pure.


    ### Protocol-Oriented Programming


    The main advantage of using Protocols instead of basic OOP (object-oriented programming
    ) is that a class can conform to multiple protocols. This ability allows us to
    design a very flexible and modular architecture. This ensures transparent and
    predictable behavior, which is very important for building tests.


    When you design your architecture, try to make your layers connect with each other
    only through protocols. Take a look at Figure [6-2](#496602_1_En_6_Chapter.xhtml#Fig2).


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig2_HTML.jpg](images/496602_1_En_6_Chapter/496602_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Protocol-oriented programming


    Protocols are the “glue” that connects the objects in your architecture. This
    flexibility is reflected by the fact that you can replace each object in your
    system with a new one as long as it conforms to the required protocol. Replacing
    objects easily is really handy when we talk about mocking layers and behaviors.'
  trans: '

    ### 易于阅读的代码也易于测试


    我之前提到过，代码质量和可测试性是相辅相成的。易于阅读的代码也更容易测试。判断代码是否易于阅读的一个主要经验法则是看注释。如果你过度使用注释，这可能是代码存在问题的一个好迹象，可能意味着代码过于复杂，难以理解。


    Swift 提供了一些出色的工具来帮助你使代码更令人愉悦。


    我之前提到过 `Typealias` 作为一种为变量起描述性、有意义名称的方法，但还有更多方式可以让你的代码看起来更精致。


    例如，与其编写一个带有大量参数的函数，不如传递一个将参数捆绑在一起的结构体。


    看看下面的代码：


    ```

    func runRegistrationProcess(email : String, name : String, password : String,
    receivingEmailApproval : Bool) {

    }

    ```


    现在它可以改成这样：


    ```

    struct RegistrationData {

    var email                   :   String

    var name                    :   String

    var password                :   String

    var receivingEmailApproval  :   Bool

    }

    func runRegistrationProcess(registrationData : RegistrationData) {

    }

    ```


    很棒，不是吗？而且，这对测试也更友好，因为它使 API 更加清晰和预定义，这些参数可以快速地传递给更多的函数和对象。


    另一个让你的代码更美观的方法是定义你的代码风格和命名规范。代码风格（缩进、方法间的空行、变量顺序等）不仅仅是为了好看。当你保持代码结构的一致性时，会让代码浏览起来舒服得多，也能更好地利用短期记忆。它能帮助你更好地阅读旧代码，并使调试过程更加轻松。无论你选择哪种代码风格，只要在整个项目中保持一致即可。


    当然，给出的所有原则也同样适用于测试代码。你应该将你的测试视为“真实”的代码，而不仅仅是应用的游乐场。测试代码同样是你需要长期维护和调试的代码。


    ## 纯函数


    这是让我们的代码更具可测试性和更整洁的另一种方法。


    测试的关键因素之一是能够使用相同的参数反复运行测试，并期望每次运行都产生相同的行为。


    为了达到非常稳定的测试套件，我们需要将测试与任何外部状态隔离，无论是输入还是输出。我们在面向对象编程中遇到的问题之一是其封装性质鼓励我们在函数内部使用实例变量，这有点偏离了隔离的初衷。


    `纯函数` 是指不会产生任何副作用，或者不依赖于外部状态（如全局变量或实例变量）的函数，因此对于相同的输入，你总是会得到相同的输出。


    为了实现这一点，我们希望使用函数的参数来传递所有需要的数据，包括实例变量。请看图 6-1。


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig1_HTML.jpg](img/496602_1_En_6_Fig1_HTML.jpg)


    图 6-1


    纯函数 vs. 标准函数


    图 A 中显示的类没有任何纯函数。它有一个使用其他函数的函数，并且它们都使用了实例变量。通过查看图 6-1，你可以理解这些函数不是“纯”的。这意味着这些函数有副作用，并且它们依赖于一个实例变量。


    要测试这些函数，你需要在开始测试本身之前确保这个实例变量被设置成一个特定的值。


    在每次测试运行之前设置初始状态可能导致测试函数变得复杂，并且在未来很容易出错。


    现在让我们看看图 B（仍然是图 6-1）。你可以看到所描述的纯函数不与任何实例或全局变量交互，因此对于相同的参数总是产生相同的结果。


    这同样适用于调用系统和 SDK 框架，因为它们也可能持有自己的状态。


    ### 重构我们的函数使其成为纯函数


    你可以用一个经验法则来检查你的函数是否是纯函数：尝试将它移到另一个类中。如果你必须修改函数的实现才能使用它，那很可能它不是纯函数。纯函数不仅需要与类无关，还需要与
    SDK 无关。


    看看 `CitiesViewController` 中的方法 `updateTitle(:)`：


    ```

    class CitiesViewController: UIViewController {

    var topTitle : String?

    var placeType: String = "City"

    override func viewDidLoad() {

    super.viewDidLoad()

    updateTitle(newTitle: "New York")

    }

    func updateTitle(newTitle : String) {

    self.topTitle = String(format: "%@ - %@", placeType, newTitle.uppercased())

    }

    }

    ```


    这看起来像是一段简单的代码 —— `updateTitle(:)` 接收一个参数，并根据新标题和 `placeType` 实例变量设置顶部标题。你已经可以理解这个方法不是纯的。该方法在输入端依赖于一个实例变量，并在输出端更新另一个实例变量。


    好消息是，重构代码并将此函数改为纯函数非常容易：


    ```

    class CitiesViewController: UIViewController {

    var topTitle : String?

    var placeType : String = "City"

    override func viewDidLoad() {

    super.viewDidLoad()

    topTitle = updateTitle(newTitle: "New York", placeType: placeType)

    }

    func updateTitle(newTitle : String, placeType : String)->String {

    return String(format: "%@ - %@", placeType, newTitle.uppercased())

    }

    }

    ```


    在重构后的代码中，你可以看到我给函数添加了另一个名为“placeType”的参数，并且该方法不再更改实例变量；相反，它返回新值。


    虽然这看起来是一个小变化，但它使函数完全变成了纯函数。这种隔离意味着该函数的测试设置起来非常容易。


    总结一下纯函数：


    *   最好尝试让你的函数返回一个值，而不是更新实例变量或全局变量。

    *   尝试向函数传递参数，而不是阻止它访问你的实例变量、其他框架或单例。

    *   检查函数是否是纯函数的最佳方法是尝试将它移动到代码中的另一个地方。如果你仍然可以使用它，那它很可能就是纯函数。


    ### 面向协议编程


    使用协议而非基本 OOP（面向对象编程）的主要优势在于，一个类可以遵循多个协议。这种能力使我们能够设计出非常灵活和模块化的架构。这确保了透明且可预测的行为，这对于构建测试非常重要。


    当你设计架构时，尝试让各层之间仅通过协议进行连接。请看图 6-2。


    ![../images/496602_1_En_6_Chapter/496602_1_En_6_Fig2_HTML.jpg](img/496602_1_En_6_Fig2_HTML.jpg)


    图 6-2


    面向协议编程


    协议是连接架构中各个对象的“粘合剂”。这种灵活性体现在，只要符合所需的协议，你就可以轻松替换系统中的每个对象。当我们谈论模拟层和行为时，轻松替换对象确实非常方便。

    '
- fmt: '# Dependency Injection


    One of the problems when talking about isolation is the dependencies between layers
    and objects in your code. We know, for example, that UI components are based on
    some business logic components. The business logic components are also dependent
    on some core services such as network and database layers.


    When we want to test a method in one of those layers, we sometimes find ourselves
    struggling to adjust those methods’ behavior to the one that can help us achieve
    the task efficiently. Remember, again, if it’s too hard to test it, it might be
    a good sign that your code isn’t easy enough to maintain over time.


    But there is a way to control the behavior of an object by injecting its instance
    variables – it’s called `Dependency Injection`.


    ## Ways to Implement Dependency Injection


    Now, let’s go back to `Dependency Injection` and see how it is related to protocol-oriented
    programming.


    There are several patterns to implement `Dependency Injection`. There isn’t a
    “best way” or “correct way”; it all depends on your situation and your personal
    flavor.


    Take a look at the following “CitiesManager” business logic unit:


    ```

    class CitiesManager {

    func refreshCitiesFromServer() {

    NetworkClient.shared.fetchCities {[weak self] (data) in

    if data != nil {

    self?.saveCitiesDataToDisk(data: data!)

    }

    }

    }

    private func saveCitiesDataToDisk(data : Data) {

    DatabaseClient.shared.saveCitiesDataToDB(data: data)

    }

    }

    ```


    In `refreshCitiesFromServer()`, the code calls the network client, received its
    data, and then saves it to disk. Although this function is minimal, it’s still
    hard to test. `NetworkClient` opens HTTP requests, and `DatabaseClient` is doing
    I/O operations. We can safely say this class is dependent on these two objects.


    The first way of injecting other dependencies is using its constructor.


    ### The Classic One – Initializer-Based DI


    The `Initializer-based Dependency Injection` is a way to give the object its dependencies
    when it’s being initialized (I guess you knew that from its name). This is done
    by writing a constructor that receives the required dependencies in its arguments.


    Let’s take the `CitiesManager` class from the last example and try to refactor
    it:


    ```

    class CitiesManager {

    var dataBaseClient : DatabaseClientProtocol

    var networkClient : NetworkClientProtocol

    init(databaseClient : DatabaseClientProtocol = DatabaseClient.shared, networkClient
    : NetworkClientProtocol = NetworkClient.shared) {

    self.dataBaseClient = databaseClient

    self.networkClient = networkClient

    }

    func refreshCitiesFromServer() {

    networkClient.fetchCities {[weak self] (data) in

    if data != nil {

    self?.saveCitiesDataToDisk(data: data!)

    }

    }

    }

    private func saveCitiesDataToDisk(data : Data) {

    dataBaseClient.saveCitiesDataToDB(data: data)

    }

    }

    ```


    There are two important things we did here:


    *   We created a new constructor, which expects to receive two dependencies –
    the database client and the network client.

    *   Those dependencies are protocol based, meaning we can inject any objects that
    we want as long as it conforms to the required protocol.


    The big advantage of this approach is that it requires us to inject external dependencies,
    and that ensures that the class behaves the way we want.


    ### The Simple Way – Property-Based DI


    Another way to inject dependencies is `Property-Based injection`, which is also
    the simplest way.


    In `Property-Based injection`, we assigned the dependencies after the object has
    been initialized:


    ```

    class CitiesManager {

    var dataBaseClient : DatabaseClientProtocol = DatabaseClient.shared

    var networkClient : NetworkClientProtocol = NetworkClient.shared

    func refreshCitiesFromServer() {

    networkClient.fetchCities {[weak self] (data) in

    if data != nil {

    self?.saveCitiesDataToDisk(data: data!)

    }

    }

    }

    private func saveCitiesDataToDisk(data : Data) {

    dataBaseClient.saveCitiesDataToDB(data: data)

    }

    }

    let citiesManager = CitiesManager()

    // Setting the dependencies

    citiesManager.dataBaseClient = myCustomDatabaseClient

    citiesManager.networkClient = myCustomNetworkClient

    ```


    You need to be aware that property-based injection has upsides and downsides.
    For example, it is much simpler to implement than the initializer way, and it
    can be convenient when subclassing or doing that on a XIB-based view.


    It also doesn’t require you to refactor existing constructors, which can be quite
    a headache in many projects and let you easily add new dependencies to an existing
    class.


    But `Property-Based injection` also has some downsides. It requires you to expose
    instant variables when all you want is to assign them. Another consideration is
    that the injection is not part of any interface the compiler can assure or notifies
    us, so you may not know what the dependencies are or how to inject them.


    ### The Compromised Way – Parameter-Based DI


    The `Parameter-Based way` doesn’t require you to change your constructor signature
    or expose your instance variables . The idea behind `Parameter-Based DI` is to
    inject the dependencies only to the method you call using its arguments:


    ```

    class CitiesManager {

    func refreshCitiesFromServer(networkClient : NetworkClientProtocol = NetworkClient.shared,
    dataBaseClient : DatabaseClientProtocol = DatabaseClient.shared) {

    networkClient.fetchCities {[weak self] (data) in

    if data != nil {

    self?.saveCitiesDataToDisk(data: data!)

    }

    }

    }

    private func saveCitiesDataToDisk(data : Data, dataBaseClient : DatabaseClientProtocol
    = DatabaseClient.shared) {

    dataBaseClient.saveCitiesDataToDB(data: data)

    }

    }

    let citiesManager = CitiesManager()

    citiesManager.refreshCitiesFromServer(networkClient: myCustomNetworkClient, dataBaseClient:
    myCustomDatabaseClient)

    ```


    Not only you don’t expose your instance variables; in many cases, you do not even
    have dependencies as instance variables. The `Parameter-Based injection` can help
    you make your functions pure, which can make your testing much easier.


    # SOLID Principles


    SOLID is an acronym that represents five important design principles that can
    help you write understandable and easier to maintain code and, as a result, a
    more testable one.


    Following these principles is not hard, but it requires you to pay attention whenever
    you decide to create a new method.


    Let’s go over them.


    ## S – Single-Responsibility Principle


    This means an object should do one thing and should be the only object in your
    project that does this thing. It’s harder to maintain methods and classes that
    are responsible for several things, and breaking them is just a matter of time.
    For example, if your method parses a network response and writes to the disk,
    split it into two methods and test them separately.


    ## O – Open/Closed Principle


    A class should be open to extension but closed to change. Whenever you’re done
    writing a method/class and testing it, consider it closed. If you need to add
    its behavior, do it by subclassing, `dependency injection`, or using Swift extensions
    (or Objective-C Categories). This will help you decrease the number of test’s
    rewrites every time you need to change something and also help you avoid regressions.'
