    </wpt>\n<wpt lat=\"40.7692\" lon=\"-73.9850\">\n  <time>2020-03-01T16:25:26Z</time>\n\
    </wpt>\n```\n\n# 应用程序数据\n\nXcode 的一个简洁功能是能够以特定的应用状态加载应用程序，包括持久数据、用户默认设置甚至缓存。使用名为`XCAppData`文件的内容加载特定数据的应用程序。`XCAppData`文件是一个包含所有应用程序数据的文件包，包括`Documents`、`Library`、`Cache`和`Temporary`文件。\n\
    \n要获取`XCAppData`文件，你需要确保设备已连接到 Mac，然后转到`Window`➤`Devices and Simulators`。在打开的窗口中，在左侧找到你连接的设备并选中它。现在你应该能看到配对的\
    \ Apple Watch 列表和已安装的应用程序（参见图 2-11）。\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig11_HTML.jpg](img/496602_1_En_2_Fig11_HTML.jpg)\n\
    \n图 2-11 从你连接的 iPhone 下载应用程序数据容器\n\n选中你的应用程序后，你可以将其应用程序数据容器下载到 Mac。你应该会看到格式如下的文件：\n\
    \n```\n..xcappdata\n```\n\n例如：\n\n```\nwww.myweatherapp.com.My-Weather-App 2020-03-10\
    \ 06/32.03.037.xcappdata\n```\n\n你应该知道`.xcappdata`是一个包，意味着它是一个显示为普通文件的系统目录，其中包含额外的文件和目录。要打开包，请在\
    \ Finder 中右键单击该包，然后选择“显示包内容”。之后，你可以看到应用程序数据文件的层次结构（参见图 2-12）。\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig12_HTML.jpg](img/496602_1_En_2_Fig12_HTML.jpg)\n\
    \n图 2-12 在 Finder 中展开的应用程序数据包\n\n如图 2-12 所示，该包包含你设备存储的所有应用程序数据，包括文档、临时文件、状态，甚至系统用于应用程序切换用户体验的应用程序屏幕截图。\n\
    \n如果你想在 Xcode 设置中使用应用程序数据包（`.xcappdata`文件），需要将其添加到项目中。\n\n在你的项目中创建一个新组，比如“Tests\
    \ Data”，并将该包添加到该文件夹中。确保`xcappdata`不属于任何目标。\n\n> **注意**\n>\n> 你希望在你的方案中使用的文件，例如`GPX`文件和数据包，不应添加到任何目标中，即使是你的测试目标也不行。如果文件属于某个目标，它将被捆绑到最终产品中，不仅会增加应用程序的大小，还可能泄露安全和敏感的隐私信息。\n\
    \n## Arguments 选项卡\n\nXcode 的方案编辑器中还有另一个简洁且鲜为人知的功能，隐藏在`Arguments`选项卡下，称为`Launch\
    \ Arguments`和`Environments Variables`（参见图 2-13）。\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig13_HTML.jpg](img/496602_1_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13 方案编辑器中的 Arguments 选项卡\n\n`Arguments`选项卡允许你通过设置仅在此方案中应用于应用程序的参数和变量来控制应用程序的运行。\n\
    \n### 启动参数\n\n假设我们想为“我的天气”应用程序添加“应用内购买”功能，并且我们希望在用户已经注册了我们的高级订阅时运行集成和 UI 测试。\n\
    \n许多开发人员测试应用内购买的典型方法是在检查用户是否注册的函数中返回“true”（请查看以下代码）：\n\n```swift\nfunc isTheUserRegistered()->Bool\
    \ {\n    return true\n    // 其余\"真实代码\"，检查钥匙串是否包含有关用户购买的信息\n    ...\n}\n```\n\n\
    在进行开发时检查时，返回“true”可能没问题，但像这样运行测试可能不是正确的解决方案。\n\n幸运的是，我们可以使用“Arguments Passed on\
    \ Launch”列表轻松地在运行时更改值。\n\n参数是在启动时传递给应用程序的值列表，可以在代码中轻松读取。\n\n你的应用程序可以使用参数来运行特定的标志，而无需重新编译或使用不同的目标。参数在测试中可能非常方便，因为有时你想要模拟应用程序中的不同层，例如网络、数据库等。\n\
    \n要添加新参数，请转到方案编辑器中的`Arguments`选项卡，在参数列表下，点击加号按钮（参见图 2-14）。\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig14_HTML.jpg](img/496602_1_En_2_Fig14_HTML.jpg)\n\
    \n图 2-14 添加的参数列表\n\n如果你不希望在启动时传递某个参数，无需将其从列表中删除，只需取消选中其名称旁边的复选框即可。\n\n在你的代码中有两种类似的方式来读取参数列表：`CommandLine`和`ProcessInfo`。\n\
    \n查看以下代码：\n\n```swift\nfunc application(_ application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\n    var purchasedIAP\
    \ = CommandLine.arguments.contains(\"PURCHASED_IAP\")\n    // 或者我们可以使用 ProcessInfo\n\
    \    purchasedIAP = ProcessInfo.processInfo.arguments.contains(\"PURCHASED_IAP\"\
    )\n    if purchasedIAP {\n        // 在这里做一些有用的操作...\n    }\n    return true\n\
    }\n```\n\n为了澄清两者之间的区别，`CommandLine`是 Swift 的一部分，其主要目标是读取命令行参数，在这种情况下是启动时传递的参数。\n\
    \n`ProcessInfo`是 Foundation 的一部分，它包含有关当前进程的信息，包括变量、主机名，以及像`CommandLine`一样的参数列表。\n\
    \n为了读取参数的目标，你可以使用它们中的任何一个。\n"
- fmt: "# Environment Variables\n\nJust like many other development environments,\
    \ iOS also has something similar called “Environment Variables.” An environment\
    \ variable is a collection of key–value which let you configure your app not just\
    \ with a list of argument but also with values.\n\nAdding an environment variable\
    \ is just like adding an argument. Tap on the plus button under the variables\
    \ list and add a new variable (see Figure [2-15](#496602_1_En_2_Chapter.xhtml#Fig15)).\n\
    \n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig15_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig15_HTML.jpg)\n\
    \nFigure 2-15 Adding new environment variable to a scheme\n\n```\nfunc application(_\
    \ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
    \ Any]?) -> Bool {\nlet printInfoLogs = ProcessInfo.processInfo.environment[\"\
    PRINT_INFO_LOGS\"]\nreturn true\n}\n```\n\nAdding Environment Variables is also\
    \ a great way to configure UI Tests by launching the app dynamically with different\
    \ arguments each time. UI Tests will be covered later in this book.\n\n## The\
    \ Options Tab\n\nThe options tab includes different settings related to your tests\
    \ (see Figure [2-16](#496602_1_En_2_Chapter.xhtml#Fig16)).\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig17_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig17_HTML.jpg)\n\
    \nFigure 2-17 The Application Language settings\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig16_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig16_HTML.jpg)\n\
    \nFigure 2-16 The options tab in the scheme editor\n\nLet’s go over those settings:\n\
    \n*   **Application Language** – One of the biggest challenges of mobile development\
    \ is localization – LTR vs. RTL and languages that contain long words and phrases.\
    \ Not only can you set the device language using that option, but you can also\
    \ simulate different text directions and even double the length of the texts to\
    \ detect UI layout glitches.\n*   **Application Region** – Different regions mean\
    \ different date formats, different currencies, and different measuring systems.\
    \ By choosing the application region, you can test your app as if the device is\
    \ in another region.\n\n    **Note** While it’s a convenience to set different\
    \ languages and regions to test functions, sometimes it can be not very easy when\
    \ you want to run a unit test multiple times for different regions. Later in this\
    \ book, I will cover how to do this without the need of scheme options but with\
    \ excellent and testable architecture.\n*   **UI Testing** – Unlike unit and integration\
    \ tests, getting the reason why the UI test failed can be a little tricky. Screenshots\
    \ and attachments are the best way to display the failure reason and the app state\
    \ at that time. The UI Testing options let configure how your test treats attachments\
    \ and screenshots.\n*   **Code Coverage** – We discussed code coverage in Chapter\
    \ [1](#496602_1_En_1_Chapter.xhtml). Without marking this option, `Xcode` won’t\
    \ collect code coverage during your tests.\n\n## The Diagnostics Tab\n\nThe diagnostics\
    \ tab is almost similar to the diagnostics tab you can find under “Run”. This\
    \ tab contains tools that can help determine issues with your app while running\
    \ your tests, such as memory corrupts and thread issues (see Figure [2-19](#496602_1_En_2_Chapter.xhtml#Fig19)).\n\
    \n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig28_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig28_HTML.jpg)\n\
    \nFigure 2-28 Run only English configuration\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig27_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig27_HTML.jpg)\n\
    \nFigure 2-27 How Scheme, Test Plans, Tests, and configurations are linked together\n\
    \n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig26_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig26_HTML.jpg)\n\
    \nFigure 2-26 Test Plan configuration\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig25_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig25_HTML.jpg)\n\
    \nFigure 2-25 Test Plan edit screen\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig24_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig24_HTML.jpg)\n\
    \nFigure 2-24 Scheme converted to use test plans in its tests\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig23_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig23_HTML.jpg)\n\
    \nFigure 2-23 Converting a scheme to use test plans\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig22_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig22_HTML.jpg)\n\
    \nFigure 2-22 Scheme editor, “Convert to use Test Plans…” button\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig21_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig21_HTML.jpg)\n\
    \nFigure 2-21.\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig20_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig20_HTML.jpg)\n\
    \nFigure 2-20 Disable specific test from the scheme editor\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig19_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig19_HTML.jpg)\n\
    \nFigure 2-19 The Diagnostics Tab in the Scheme Editor\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig18_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig18_HTML.jpg)\n\
    \nFigure 2-18 Application Language and Application Region settings\n\nSince those\
    \ tools are not explicitly related to testing, I will go over them in short.\n\
    \nMy recommendation for you is to learn those tools deeper if you want to investigate\
    \ your issues better.\n\n*   **Address Sanitizer** – This tool, introduced in\
    \ `Xcode 7`, can help you debug memory corruption issues with your app. Those\
    \ issues don’t have to be just crashes – it can be general bugs as well. The combination\
    \ of Address Sanitizer and Unit Tests can be beneficial under challenging bugs,\
    \ but you should be aware of two downsides regarding this tool:\n    *   `Address\
    \ Sanitizer` is much more relevant for C and `Objective-C` code rather than `Swift`.\n\
    \    *   `Address Sanitizer` comes with a cost – your app consumes 2x–3x more\
    \ memory and 2x–5x more CPU power when enabled. While this may seem not a big\
    \ issue when running tests, it can be an issue when running performance tests\
    \ when you measure critical metrics such as CPU time and memory.\n*   **Thread\
    \ Sanitizer** – `Thread Sanitizer` is another LLVM-based tool that can help you\
    \ detect data race between threads, which can cause unpredictable behavior. Just\
    \ like `Address Sanitizer`, `Thread Sanitizer` doesn’t come without a cost – memory\
    \ usage increases by 5x–10x, and CPU performance increases by 2x–20x. Also, you\
    \ cannot run `Thread Sanitizer` on a device, only on simulators.\n*   **Main Thread\
    \ Checker** – One of the first rules every developer learns when he starts developing\
    \ for iOS is never to run UI operations in the background but only on the main\
    \ thread. `Main Thread Checker` stops your app at the point when it detects UI\
    \ operation done on any background thread. This can be great in UI testing when\
    \ you entirely run your app and feel safe all of your operations are on the right\
    \ thread as they should.\n*   **Malloc Scribble** – Helps you debug reference\
    \ counting cycles by filling freed memory with predefined values and by that to\
    \ get more accurate results in memory graph.\n*   **Malloc Guard Edges** – Add\
    \ guard pages before and after large allocations.\n*   **Guard Malloc** – Helps\
    \ you catch common memory problems such as buffer overruns and use-after-free.\n\
    *   **Zombie Objects** – One of the most popular tools `Xcode` has to offer. `Zombie\
    \ Objects` are objects that were released (reference count 0) and replaced by\
    \ a zombie object. `Zombie Objects` can help you track variables by keeping a\
    \ copy of them in memory."
