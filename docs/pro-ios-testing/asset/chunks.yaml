  trans: "\n# XCTestExpectation 模式\n\n让我们来看一下为异步测试重构的 `testImageProcessing()` 方法：\n\
    \n```\nfunc testImageProcessing() {\n    // 准备\n    let image = UIImage(named:\
    \ \"cats\")!\n    let manager = CatsProcessingManager()\n    // 执行\n    var cuteCats\
    \ = 0\n    // 创建一个期望来获取猫咪数量。\n    let expectation = self.expectation(description:\
    \ \"Counting number of cats\") //1\n    manager.findCuteCats(image: image) { (numberOfCuteCats)\
    \ in\n        cuteCats = numberOfCuteCats\n        // 我们得到了结果。我们的期望满足了！\n    \
    \    expectation.fulfill() //2\n    }\n    // 断言\n    // 在断言前等待 5 秒...\n    waitForExpectations(timeout:\
    \ 5.0, handler: nil) //3\n    XCTAssertEqual(cuteCats, 3)\n}\n```\n\n在上面的代码中，我们可以看到之前提到的三个部分。我们来逐一看看：\n\
    \n```\nlet expectation = self.expectation(description: \"Counting number of cats\"\
    ) //1\n```\n\n当我们想要创建异步测试时，会创建一个 `XCTestExpectation` 对象。在初始化时，我们传入一个描述性的说明，如果测试失败，可以帮助我们理解哪个期望没有被满足。\n\
    \n可以为同一个测试创建多个期望：\n\n```\nexpectation.fulfill() //2\n```\n\n当异步操作完成其工作时，我们调用之前创建的期望对象的\
    \ `fulfill()` 方法。在大多数情况下，最佳实践是即使在完成块失败时也调用 `fulfill()` 函数。不要混淆——`fulfill()` 并不意味着我们的测试通过了；它只意味着我们可以继续进行断言部分。“期望被满足”这个术语可能会与我们测试中的“期望”部分混淆，所以要注意！\n\
    \n```\nwaitForExpectations(timeout: 5.0, handler: nil) //3\n```\n\n在断言部分之前，我们调用\
    \ `waitForExpectations()` 方法。这个方法的作用是停止测试执行，直到所有期望都被满足或达到超时时间。\n\n如果达到超时时间，我们的测试会自动失败。当所有期望都被满足时，就该进行断言了：\n\
    \n```\nXCTAssertEqual(cuteCats, 3)\n```\n\n## 一个期望多次满足\n\n有些测试中，在我们能说期望已满足并可以进入断言部分之前，我们希望多次执行异步代码。对于这类测试，`XCTestExpectation`\
    \ 有一个名为 `expectedFulfillmentCount` 的属性：\n\n```\nlet expectation = self.expectation(description:\
    \ \"executing closure code 3 times\")\nexpectation.expectedFulfillmentCount =\
    \ 3\n```\n\n一个很好的用例是音乐播放器，它需要多次更新歌曲的进度。期望可以计算它被调用的次数，然后在达到特定次数时进入断言部分。\n\n## 当期望未满足时进行断言\n\
    \n好的，我需要你集中注意力在这一部分。有些情况下，我们想要确保一段代码**没有被**执行。换句话说，如果我们的期望被满足了，我们的测试反而会失败。\n\n\
    在这种情况下，我们可以使用 `isInverted` 属性（默认为“false”）：\n\n```\nlet expectation = self.expectation(description:\
    \ \"Code is not executed\")\nexpectation.isInverted = true\n```\n\n`isInverted`\
    \ 属性的一个很好的用例是**权限处理**。我们想要确保在特定配置和状态下，我们的部分代码**没有被**执行。\n\n## 期望数组，按顺序\n\n如果你在一个测试方法中有多个期望，不必单独等待它们。只需在测试方法末尾等待，同时传入期望数组即可：\n\
    \n```\nwait(for: [loadFromFileExpectation, locateCuteCatsExpectation], timeout:\
    \ 2.0)\n```\n\n你甚至可以确保所有期望按指定顺序被满足！\n\n```\nwait(for: [loadFromFileExpectation,\
    \ locateCuteCatsExpectation], timeout: 2.0, enforceOrder: true)\n```\n\n## XCTestExpectation\
    \ 子类\n\n现在你有了“等待”+“满足”+“断言”的工具，基本上，每个异步作业都可以使用 `XCTestExpectation` 进行测试。但是 Xcode\
    \ 8.3 在这个领域带来了几项改进，以使这些任务更容易构建和阅读。\n\n让我们看下面的代码：\n\n```\nfunc testIfNotificationRaised()\
    \ {\n    let expectation = self.expectation(description: \"Notification Raised\"\
    )\n    _ = NotificationCenter.default.addObserver(forName: NSNotification.Name(\"\
    notif\"), object: nil, queue: nil, using: { (notification) in\n        expectation.fulfill()\n\
    \    })\n    NotificationCenter.default.post(name: NSNotification.Name(\"notif\"\
    ), object: nil)\n    waitForExpectations(timeout: 0.1, handler: nil)\n}\n```\n\
    \n在这段代码中，我们试图测试是否发出了一个通知。我们添加一个观察者，当我们收到通知时，我们就满足期望。在下一行，我们发布通知，并等待 0.1 秒让期望被满足。\n\
    \n很简单，是吧？但问题是，我们的大多数测试**并不**像这个例子。观察代码通常位于其他地方，甚至不在我们的测试代码中，发布通知的代码在大多数情况下也是如此：\n\
    \n```\nfunc testMyScree_savingData_checkNotificationReceived () {\n    // 准备\n\
    \    let dataConnector = DataLayer()\n    let myScreen = MyScreen()\n    // 执行\n\
    \    dataConnector.save()\n    // 断言\n    // 检查 myScreen 是否收到了 \"data updated\"\
    \ 通知...\n}\n```\n\n在前面的例子中，我们有一些数据层和一个 UI 屏幕。测试是保存一些数据并检查屏幕是否收到了“数据已更新”的通知。\n\n\
    我们知道发布通知的代码在数据层内部，而观察者代码在 UI 屏幕内部。那么我们该如何检查呢？\n\n> 当前讨论的这个例子并不是真正的“单元测试”，而是集成测试。我们将在本书后面讨论集成测试。\n\
    \n好吧，我们可以添加一些闭包或委托模式来将事件从 `myScreen` 类传递到测试方法，但这需要我们更改代码，只是为了让我们的测试更容易测试。在许多情况下这可能是真的，但在这个案例中并非如此——除了测试方法，没有其他对象观察这个事件。\n\
    \n幸运的是，我们能够非常容易地在测试中观察通知调用。\n\n让我们解决测试方法中的问题：\n\n```\nfunc testMyScreen_savingData_checkNotificationRaised\
    \ () {\n    // 准备\n    let dataConnector = DataLayer()\n    let myScreen = MyScreen()\n\
    \    let expectation = self.expectation(forNotification: NSNotification.Name(\"\
    dataUpdated\"), object: nil, handler: nil)\n    // 执行\n    dataConnector.save()\n\
    \    // 断言\n    waitForExpectations(timeout: 0.1, handler: nil)\n}\n```\n\n如你所见，我们添加了\
    \ `expectation(forNotification:)`。当通知被发出时，期望被满足。注意，我们并没有检查 `myScreen` 是否收到了通知。这是你需要通过其他方式做的事情，例如检查它的状态。\n\
    \n# 总结\n\n`XCTest` 是一个健壮的框架，它可以帮助你非常容易地建立一个优秀的测试套件。\n\n此外，我们还学习了如何编写结构化的测试方法，以及如何将它们作为测试用例生命周期的一部分来编写。\n\
    \n但这些只是基础——在下一章，我们将学习如何利用我们的技能，编写有用且可维护的单元测试。\n\n# 编写测试——高级技巧\n\n> *相比于测试行为本身，设计测试的行为是已知的最好的预防漏洞的方法之一。为了创建一个有用的测试而必须进行的思考，可以在编写代码之前就发现并消除漏洞——实际上，测试设计的思考可以在软件创建的每个阶段发现并消除漏洞，从概念、到规范、到设计、编码以及后续阶段。*\n\
    >\n> —鲍里斯·贝泽\n"
- fmt: '## Introduction


    In the previous chapter, we’ve learned how to write basic unit tests. But in reality,
    we encounter more significant problems – we need to fake or mock certain parts
    of our code or compare values.


    In this chapter, you will learn advanced techniques in unit tests, like the following:

    *   How to create **test doubles**, such as Mocks, Dummies, Fakes, Stubs, and
    Spies

    *   How to **avoid using test doubles** if possible

    *   How to **compare values** like structs and classes

    *   How to **compare images** and arrays

    *   How to **avoid duplicating your testing** code when trying to run your test
    method multiple times with different values

    *   How to create test cases **dynamically**


    ## Test Doubles (Fake, Fake, Fake)


    It’s true; we have unit tests that are easy to test. There are no dependencies,
    no network or database, and no extra work required to make our test unit to be
    stable and maintainable.


    But with all due respect, we know the reality is different. While we are trying
    to isolate our functions as much as we can, they still operate in a world with
    other living creatures that we need to pay attention to.


    Remember that in unit tests we need to focus on one area of our code at each test.
    Testing a specific area of the code is the reason why we need to isolate our code
    from the rest of the system.


    **Test Double** is a generic term that describes objects that behave or look like
    the real objects our code depended on. Faking a server-layer response might be
    an excellent example of that. It is almost impossible to avoid the use of test
    doubles, especially in unit testing.


    ### Mocks. Mocks Everywhere (?)


    One of the most common mistakes developers do when dealing with test doubles is
    calling them “mocks.” It’s not that there isn’t such a thing, a “mock.” It’s just
    that this term is mistakenly used when talking about test doubles.


    There are several types of test doubles, other than just a “mock.” Each one of
    them aims to solve a different part of our test isolation mission.


    #### Dummy


    A dummy is an object that does nothing. It doesn’t return any value, and you never
    really call it. It’s an object that will never be used in the test. So why do
    we need it? Well, there are methods that, to initialize them, you have to pass
    an object from a certain type. In that case, you can create a new dummy class.
    The dummy can be either a subclass of the original object you need to pass or
    a new class that conforms to the relevant protocol:


    ```

    class ManufactureDummy : Manufacture {

    }

    class CarTests: XCTestCase {

    func testCarMethod(){

    let manufactureDummy = ManufactureDummy()

    let car = Car(manufacture: manufactureDummy)

    // rest of the test method

    }

    }

    ```


    Let’s examine the preceding code – we want to test the class `Car` when its constructor
    requires one argument, `manufacture`.


    But this argument is not going to be used in our test, and it’s only there for
    code design purposes. We just want to create our car object and move on. So we
    create dummy manufacture, which is a subclass (or a protocol based), and pass
    it to the car `init()` method.


    We can say that dummies can help us initialize objects when we have to deal with
    a custom `init()` method.


    #### Fake


    Sure, we can say that every test double is a “fake.” But in this case, “fake”
    is an object that **always returns** the same value. A good example might be a
    network layer to fake a network response.


    Another example can be a fake login service to help you test some login logic
    code:


    ```

    class LoginService {

    var isLoggedIn : Bool {

    return true

    }

    }

    class FakeLoginService : LoginService {

    override var isLoggedIn : Bool {

    return true

    }

    }

    ```


    The simple `FakeLoginService` always returns true in the `isLoggedIn` variable
    getter. You can inject this fake object in tests that require the user to be logged
    in when running your test.


    #### Stub


    A Stub is a test double you can use to control its return value. We can say it’s
    a “sophisticated fake.” For example, you can use a stub to fake a return or success
    of a service.


    Look at `LoginScreenPresenter.swift`:


    ```

    class LoginScreenPresenter {

    var loginService : LoginService

    init(loginService : LoginService) {

    self.loginService = loginService

    }

    func doLogin(withEmail email : String, password : String,  completion : @escaping
    (String)->Void) {

    loginService.doLogin(email: email, password: password) { (result) in

    switch result {

    case .failure:

    completion("Failed!")

    case .success:

    completion("Success")

    }

    }

    }

    }

    ```


    `LoginScreenPresenter` has a dependency called `loginService`. We want to test
    the message output in case of a failure or success.


    For the test, we create a `LoginServiceStub` to control the return value of `doLogin()`
    method :


    ```

    class LoginServiceStub: LoginService {

    var _loginServiceResult : LoginOperationResult = .success

    init(result : LoginOperationResult) {

    _loginServiceResult = result

    }

    override func doLogin(email: String, password: String, completion: (LoginOperationResult)
    -> Void) {

    completion(_loginServiceResult)

    }

    }

    ```


    `LoginServiceStub` is a subclass of the original `LoginService` (remember, OOP
    is not the only way of creating stubs; you can also use Protocol-Oriented).


    We create a new initializer for the stub to set the fake login result and override
    the `doLogin()` method to return that fake value.


    Now let’s see how to use this stub in a test:


    ```

    func testLoginPresenter_whenFailure_expectFailureMessage() {

    //arrange

    let loginServiceStub = LoginServiceStub(result: .failure)

    let presenter = LoginScreenPresenter(loginService: loginServiceStub)

    let expectation = self.expectation(description: "Check Login Flow Message")

    // act

    var message = ""

    presenter.doLogin(withEmail: "avi@emailServer.com", password: "123456") { (resultMessage)
    in

    message = resultMessage

    expectation.fulfill()

    }

    self.waitForExpectations(timeout: 0.1, handler: nil)

    // assert

    XCTAssertEqual(message, "Failed!")

    }

    ```


    Passing the `loginServiceStub` as an argument to the `LoginPresenter` sure makes
    writing this test easy for us, ha? Notice we can easily create another test with
    the same stub while passing a different return value.'
