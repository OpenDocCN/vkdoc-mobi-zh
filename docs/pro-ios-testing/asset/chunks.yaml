    \n![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig1_HTML.jpg](img/496602_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1\n集成测试——单独测试每一层，然后测试它们之间的通信\n\n注意，集成测试可以在两个或多个模块之间进行，也可以是整个系统。\n\n### 集成测试\
    \ vs 单元测试\n\n开发人员对集成测试的第一个困惑是如何创建这样的测试。回想一下，在 `XCTest` 中我们只有两种创建测试的方式——UI 测试和单元测试。在这种情况下，集成测试属于单元测试。\n\
    \n另一个困惑是到底什么被认为是**集成**。例如，如果你测试一个依赖于另一个逻辑函数的函数，那是集成吗？再比如说，这个函数使用了你项目中的某个辅助类，那也算是集成吗？毕竟，两个类之间进行了通信——在我看来这像是集成。\n\
    \n然而，在我们的上下文中，并非每个类和函数之间的通信都被视为“集成”。\n\n在 iOS 集成测试中，通常测试的是我们架构中各层之间的集成，这意味着根据数据流来测试这些层，而不仅仅是外部函数或类的使用。\n\
    \n此外，在单元测试中，我们**大量使用测试替身**。并不是说集成测试不包含测试替身——它们确实有，但数量要少得多，而且大多是在边界上（我们稍后会讨论）。\n"
- fmt: '### Define the Scope


    I previously mentioned that integration tests refer to data flows between layers.
    Remember that some of those layers are harder to test. For example, the `Network
    Layer` is responsible for the communication with our server. This requires not
    only network connections and a live server, but sometimes tokens and other authentication
    data. Another example of a hard-to-test layer might be on the other side of our
    system – the `UI layer`. In this layer, we often required to load classes from
    `XIB` files or `Storyboards`.


    In general, when dealing with Integration Tests, we need to define our `testing
    scope`. On the one hand, it’s ideal for testing the whole system (edge to edge),
    from UI layer all the way down to the server. On the other hand, tests like that
    are harder to write and maintain and would run slower.


    Take a look of schematic feature architecture (Figure [5-2](#496602_1_En_5_Chapter.xhtml#Fig2)).


    ![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig2_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Integration Tests scope


    Figure [5-2](#496602_1_En_5_Chapter.xhtml#Fig2) displays a classic screen architecture –
    from the UI Layer down to the iOS SDK frameworks. You can see we can do extensive
    testing, meaning do some action on the UI Layer and examine the effect on the
    other edge (e.g., `Core Data`), or do a narrow test – test some of the layers
    and use test doubles for the rest of the system.


    #### Filling the Gap


    Although Narrow Integration tests are very cost-effective, some may argue they
    don’t test the system as a whole. This may be true, but we can overcome it. We
    can easily divide our integration tests into different suites – one suite can
    test several layers (from the UI to the app core services), and another suite
    can focus on Client-Server integration tests.


    Separating our integration tests to different test classes or bundles can help
    us run them at different frequencies. The question is “is it worth all that trouble?”


    #### It’s like Unit Tests vs. Integration Tests Ratio


    If you remember from the first chapter, we talked about the testing pyramid and
    that we should come up with a reasonable mix between the different test suites.


    One of the considerations we have is the ratio between effectiveness and cost.
    Take a look at Figure [5-3](#496602_1_En_5_Chapter.xhtml#Fig3).


    ![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig3_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    The effectiveness of the different types of testing


    The preceding figure is a rough estimate regarding the ratio between cost and
    effectiveness. As you can see, Narrow Integration Tests are much more useful than
    Broad Integration Tests, just like the difference between Unit Tests and Integration
    Tests in general.


    Too many integration tests can make you spend much time maintaining them from
    breaking up, more time than Unit Tests. On the other hand, testing the critical
    flows gives you more confidence in your app and your code.


    ## Writing Integration Tests


    Technically wise, writing integration tests is much like writing unit tests. Unit
    Test and UI Test are the technical names of the templates, not their methodological
    names. Integration Tests fall under `Unit Tests` and use the same assertion and
    function structure.


    However, Integration Tests require more preliminary design process and broader
    knowledge and awareness of the feature and screen architecture.


    Let’s try to write our first Integration Test.


    ### Our First Integration Test


    We have a basic To-Do App (Figure [5-4](#496602_1_En_5_Chapter.xhtml#Fig4)) with
    just three components.


    ![../images/496602_1_En_5_Chapter/496602_1_En_5_Fig4_HTML.jpg](images/496602_1_En_5_Chapter/496602_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    A basic To-Do App with three layers


    Our To-Do app is built with three layers – the UI Layer (the screen itself), basic
    business logic, and a core data persistent store, which is responsible for handling
    the state of the to-do items.


    The test case we want to write is when the user marks an item as “checked”; the
    item is expected to be also marked as “checked” in our `Core Data` store. Obviously,
    this is an Integration Test, verifying that our three layers work together seamlessly.


    Let’s see how our layers supposed to work together:


    *   The user presses the “mark” button on the view controller.

    *   The Business Logic receives the tap and receives the corresponding item.

    *   The Business Logic updates the item state property to “checked”.

    *   The Data Connector updates the data in our `CoreData` persistent store.


    Now let’s take a look at our test method:


    ```

    func testMarkItemAsChecked_verifySavedInStore() {

    // arrange

    let viewController = ToDoListItemsViewController(nibName: "ToDoListItemsViewController",
    bundle: nil)

    viewController.loadViewIfNeeded()

    let itemID = UUID().uuidString

    _ = CoreDataConnector.shared.insertNewItem(title: "my Item", id: itemID)

    viewController.itemID = itemID

    // act

    viewController.markItemAsCheckedButtonTapped()

    // assert

    let item = CoreDataConnector.shared.getItem(byID: itemID)!

    XCTAssertTrue(item.checked)

    }

    ```


    First, just like Unit Tests, we also have our AAA pattern – Arrange-Act-Assert.


    In the “Arrange” section, we initialized our UI Layer and, in our case, a `UIViewController`.


    Notice for an unusual call we did there:


    ```

    viewController.loadViewIfNeeded()

    ```


    The method `loadViewIfNeeded()` forces the view to load even if we didn’t add
    it to the screen. This is extremely useful in testing when dealing with UI elements
    is not trivial.


    After initializing the UI Layer, we prepare our database and insert a new item
    to our core data store.


    The “`Act`” part is pretty straightforward – since we already loaded the view
    in the arrange part, all our `IBOutlets` and `IBActions` are connected. We can
    simulate pressing on the mark button by just calling its `IBAction`.


    In the `Assert` part, we go straight to the `DataConnector` and fetch the relevant
    `CoreData` object and assert its “checked” value.


    As you can you, we tested how three layers integrate, without the need of any
    test doubles.


    But, there are a couple of things that we need to pay attention to, especially
    in Integration Tests:


    *   **Always clean after your test**. Integration tests change states, write files,
    and modify databases. This can influence the results not only for the next test
    you run but also for tests that are running in parallel. Take into consideration
    that you already have some data saved on your device/simulator, and your app is
    not “clean” when you start your test.

    *   As a result of what is said, you need to **run your integration tests in isolation**
    from other tests. Remember, your tests share the same resources. It is better
    different persistent store files or other `UserDefaults` settings for each test.

    *   You have to assume your **app state is unpredictable** when you start your
    test. If you manage some authentication state such as “logged in” and it has an
    impact on your tests, reset it before you start (you can use the `setup()` method).


    ### Running in Parallel


    As you can see, running in parallel can cause us a headache when dealing with
    shared resources. However, there are ways to overcome that.


    For instance, using an In-Memory `Core Data` store can help you separate it from
    other tests. Launching your test with different `SQLite` file names can also be
    useful.


    ### Fault Point in Integration Tests


    One of the challenges we have when writing Integration Tests is to identify our
    fault point when the test fails.


    Unlike Unit Tests, in Integration Tests, our data flow goes through several layers,
    when each one of them can be the cause of our issue. To be specific, the source
    of the problem might not be the layer, but the **integration between two layers**.
    Fortunately, some techniques can help us get on the problem and locate precisely
    where it fails.'
