- fmt: '# I’m In. How to Write My Own Assertion?


    The basic method of writing your own assertion is, well, a new method in your
    tests.


    Let’s look at the following example:


    ```

    func testPersonFetcher_getPersonByID_checkProperties() {

    // arrange

    PersonDataBase().insertNewPerson(newPerson: Person(firstName: "Tyler", lastName:
    "Butler"))

    let personFetcher = PersonFetcher()

    // act

    let person = personFetcher.getPerson(byID: "me")!

    // assert

    XCTAssertEqual(person.firstName, "Tyler")

    XCTAssertEqual(person.lastName, "Butler")

    }

    ```


    In this test method, we are fetching a `Person` object and check its first and
    last name. Now let’s say for the sake of our example that we want to bundle those
    two assertions to one function that checks both first and last name. We can create
    a function that gets three arguments, the `Person` object, first name, and last
    name, as strings and run those two assertions:


    ```

    func checkPersonValues(person: Person, firstName : String, lastName : String)
    {

    XCTAssertEqual(person.firstName, firstName)

    XCTAssertEqual(person.lastName, lastName)

    }

    func testPersonFetcher_getPersonByID_checkProperties() {

    // arrange

    PersonDataBase().insertNewPerson(newPerson: Person(firstName: "Tyler", lastName:
    "Butler"))

    let personFetcher = PersonFetcher()

    // act

    let person = personFetcher.getPerson(byID: "me")!

    // assert

    checkPersonValues(person: person, firstName: "Tyler", lastName: "Butler")

    }

    ```


    Simple, ha? Not so quickly. Let’s run this test and see Figure 3-7.


    ![../images/496602_1_En_3_Chapter/496602_1_En_3_Fig7_HTML.jpg](images/496602_1_En_3_Chapter/496602_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Running test with external assertion method


    Our test failed, but this is not the issue. Do you see the problem here? From
    the preceding screenshot, we see the two methods – the test method and the assertion
    method. We also see the failure message, but instead of pointing on the test method,
    it points on the assertion method!


    We see that we have no way of connecting the failure message to the correct test
    method. Also, in case of several failed test methods, we are going to have multiple
    failure messages in the same place, one above the other – it’s a testing nightmare!


    But fortunately, we have a solution. Let’s look for a second on the `XCTAssert`
    function’s signature:


    ```

    func XCTAssert(_ expression: @autoclosure () throws -> Bool, _ message: @autoclosure
    () -> String = "", file: StaticString = #file, line: UInt = #line)

    ```


    As you can see, besides the expression and the message arguments, we also have
    two more arguments – `file` and `line`.


    `file` (`String`) and `line` (`UInt`) contain the information on where in the
    code XCTest shows the failure message. By default, both of them have the values
    of the place where we call the assertion function.


    > Note

    > `#file` and `#line` are two expressions that are part of the Swift language.
    You can use them not only in your tests but also in your project code. Swift also
    has more interesting expressions you can use in your tests and in general, like
    `#function`, `#column`, and more.


    So, if we want to show the message on the right place, all we need to do is to
    pass the `#line` and `#file` expression to our final assertion method:


    ```

    func checkPersonValues(person: Person, firstName : String, lastName : String,
    line : UInt = #line, file : StaticString = #file) {

    XCTAssertEqual(person.firstName, firstName, file: file, line:line)

    XCTAssertEqual(person.lastName, lastName, file: file, line:line)

    }

    ```


    Let me explain what I did here – our custom assertion method has two more arguments,
    `line` and `file`, filled with default values. The default values are the actual
    place where we call the function. Later then, we pass those two arguments to the
    assertion methods inside, overriding their default values. I can say we are kind
    of tricking the system into getting a clear failure message.


    Now let’s run our test with our improved assertion method (Figure 3-8).


    ![../images/496602_1_En_3_Chapter/496602_1_En_3_Fig8_HTML.jpg](images/496602_1_En_3_Chapter/496602_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Custom assertion method with line and file arguments


    Great! Now our failure message displayed is in the right place – in the test method
    and not in the assertion method. Also, we didn’t have to change anything in the
    test method.


    To sum it up, custom assertion methods can help you maintain your testing code
    easier by making it more readable and less duplicated (DRY). Whenever you feel
    your assertion code is a little bit complex or confusing, just write your own
    method. It’s that easy.


    ## Write Asynchronous Operations


    Take a look at the following code:


    ```

    func testImageProcessing() {

    // arrange

    let image = UIImage(named: "3cats")!

    let manager = CatsProcessingManager()

    // act

    var cuteCats = 0

    manager.findCuteCats(image: image) { (numberOfCuteCats) in

    cuteCats = numberOfCuteCats

    }

    // assert

    XCTAssertEqual(cuteCats, 3)

    }

    ```


    In the preceding code, we want to test the method `findCuteCats()`, which receives
    an image and is supposed to find the number of cute cats shown in the picture
    (which is basically the total number of cats displayed since all cats are cute).


    We presented an image with three cats and expected to get three as the return
    answer, but the test failed. At the end of the test, the `cuteCats` variable is
    still 0, and this is because `findCuteCats()` is an asynchronous method. Our intuitive
    fix for that is putting the assertion line inside the completion block of the
    function, but this makes it even worse – now, we get a false positive and our
    test always succeeds because the test run ends before the completion block gets
    executed!


    We need to find a way of keeping the test method, waiting for the `findCuteCats()`
    method to finish before it asserts it.


    ### Expect, Wait, Fulfill, and Assert


    Fortunately, XCTest has an easy solution for asynchronous operations. We base
    this solution on three simple parts:


    *   **Define the Expectation** – We need to work with some kind of expectation
    object that can be transferred into the completion block and to help us manage
    the process. The definition is done using something called `XCTestExpectation`.

    *   **Mark the Expectation As Fulfill** – It’s not enough for the completion block
    to finish; we need to tell the expectation object we created that we have all
    the data that we need, and we are now ready to assert.

    *   **Pause the Test Method Run Until We Have an Answer** – We need to halt the
    run of the test method before we assert; otherwise, it will just continue to the
    end of the method without waiting for an answer. Also, we need to define some
    timeout to prevent the test execution from running forever.'
