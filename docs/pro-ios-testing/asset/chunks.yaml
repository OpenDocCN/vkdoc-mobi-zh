- fmt: "## The Basic Idea of Performance Test\n\nUnlike other tests such as Unit or\
    \ Integration tests, Performance Tests are a little \"catchy.\" They have several\
    \ unique characteristics, which make them less predictable.\n\nFor example, running\
    \ performance tests on an old device probably produces different results than\
    \ running them on a new one.\n\nAlso, on one run, you can have a certain result,\
    \ which may be different than the second or the third run. Not to mention other\
    \ factors such as machine state, CPU load, free memory, caching, and more.\n\n\
    So, based on the given details, we understand that performance tests work a little\
    \ bit differently:\n\n*   Each tested code runs **several times** to prevent any\
    \ one-time result that may affect our test results. At the end of the test run,\
    \ the final results will be based on the **average** of all executions.\n*   Because\
    \ the average result might be different from tests to test, it is not enough to\
    \ satisfy our needs. We still need to set some **baseline** to make sure the change\
    \ is not too big and it’s within the reasonable spectrum.\n*   The last issue\
    \ is also a major one – **the baseline is linked to a specific device** based\
    \ on its UUID. The reason is obvious – not only that each device has different\
    \ hardware, but it also has different settings and installed software.\n\nSo,\
    \ the unpredictable nature of performance tests makes it a unique creature in\
    \ our testing suite, and we should use it for specific use cases or flows that\
    \ may cause us performance issues in future changes.\n\n## The Basic Measuring\
    \ Function\n\nLet’s start with writing our first performance test:\n\n```\nclass\
    \ PerformanceTests: XCTestCase {\n    func testPerformance() {\n        let imageProcessor\
    \ = ImageProcessor()\n        measure {\n            _ = imageProcessor.generateImage()\n\
    \        }\n    }\n}\n```\n\nIn the preceding test, we have a class named `ImageProcessor`\
    \ with a function called `generateImage()`. We know that the function `generateImage()`\
    \ is doing some heavy task, and we want to execute this code as part of the `measure`\
    \ function.\n\nThe `measure()` function is part of `XCTestCase`, and it’s the\
    \ basic performance method we have. It has one single parameter, which is a closure.\
    \ What the `measure()` function does is executing the closure ten times and calculating\
    \ the average time in the end.\n\nLet’s run the test (Figure 8-1).\n\nWe see some\
    \ interesting information after our first run. First, we see the average time,\
    \ 1.127 seconds. We also see a message saying there is no baseline time. This\
    \ leads to our third insight – you can see that our test actually passed.\n\n\
    Unlike other tests, performance tests don’t use assertion. Instead, we define\
    \ a **baseline** for our metric to make sure our result stays below it.\n\n###\
    \ Define the Baseline\n\nYou don’t have to work hard to set a baseline for your\
    \ test. Pressing on the gray diamond next to the message \"No baseline average\
    \ for Time\" opens a small popup window with more details and functionality (see\
    \ Figure 8-2).\n\nIn this popup, you can see additional information about your\
    \ run and an option to set a baseline easily by just pressing a button.\n\nOn\
    \ the lower part of the popup, you can see your executions over time.\n\nNote\n\
    \nIt’s not rare for the first execution to be much longer than the others. It\
    \ has to do with things like caching or internal behaviors of the Swift language.\
    \ This is part of the reason we run this test several times to get a score that\
    \ is closed to a real-life state.\n\nPressing the \"Set Baseline\" button changes\
    \ the state of the popup window to Edit mode (see Figure 8-3).\n\nTapping the\
    \ \"Accept\" button sets the current average result as our baseline for the next\
    \ test.\n\nYou can also edit the baseline manually just by tapping it and type\
    \ the new value.\n\nTo confirm the change, just press on \"Save\".\n\n### What\
    \ the \"Baseline\" Means for Our Test?\n\nPerformance tests are based on two important\
    \ values – Baseline and Max STDDEV.\n\nThe Baseline value is the bar your test\
    \ needs to reach. If your execution code runs 10%+ slower than the baseline, your\
    \ test will fail.\n\nAnother value being calculated is the standard deviation,\
    \ the STDDEV. If the deviation of your runs is more than 10%, a value that can\
    \ be changed easily, your test will fail as well.\n\n#### Why Is the Deviation\
    \ Important?\n\nWhen running performance tests, we need to make sure our score\
    \ is reliable. If you get a high deviation in your tests, it might be a code smell\
    \ and point on two things:\n\n*   It may be an indication of a problem in your\
    \ code. Basically, you need to expect heavily loaded code to perform similarly\
    \ in multiple runs. If this is not the case, it means **your code executes in\
    \ an unexpected manner** and maybe be affected by external values or states.\n\
    *   A big deviation means that there **are some executions that are slow**, much\
    \ slower than the average score you get. It also means that our average score\
    \ is not relevant and our users experience poor performance even though our test\
    \ might be below the baseline.\n\nIf your test fails because of high deviation,\
    \ don’t increase the bar for no reason. You should investigate the behavior of\
    \ your code before making any changes.\n\n## measure(metrics:) Function\n\nUp\
    \ until Xcode 11, the only metric you could measure is execution time.\n\nBut\
    \ the new Xcode version brought new metrics to the table:\n\n*   `XCTClockMetric`\
    \ – This is the execution time metric similar to what we’ve learned in the previous\
    \ section.\n*   `XCTCPUMetric` – This metric gives you information about the CPU\
    \ activity during the run.\n*   `XCTMemoryMetric` – Measure allocated during the\
    \ test.\n*   `XCTStorageMetric` – Record bytes written to disk.\n*   `XCTOSSignpostMetric`\
    \ – Measure execution time for a specific part of your code, defined externally\
    \ in your code using `os_signpost` functions.\n\nThe most basic metric developers\
    \ use is the time/clock metric, but there are many cases why you would want to\
    \ check other metrics as well.\n\nIt doesn’t mean you need to run the performance\
    \ test for each one of your metrics – you can pass array of metrics and get results\
    \ for all of them:\n\n```\nfunc testGeneratingImageWithAllMetrics() {\n    let\
    \ imageProcessor = ImageProcessor()\n    measure(metrics: [XCTClockMetric(), XCTCPUMetric(),\
    \ XCTStorageMetric(), XCTMemoryMetric()]) {\n        _ = imageProcessor.generateImage()\n\
    \    }\n}\n```\n\nRunning the test while passing all the metrics gives you the\
    \ same popup as before, but now with information for each of your metrics (see\
    \ Figure 8-4).\n\nThis is plenty of information! Let’s try to dig in and understand\
    \ what it means.\n\n### Analyzing the Metrics"
  raw: '## The Basic Idea of Performance Test


    Unlike other tests such as Unit or Integration tests, Performance Tests are a
    little “catchy.” They have several unique characteristics, which make them less
    predictable.


    For example, running performance tests on an old device probably produces different
    results than running them on a new one.


    Also, on one run, you can have a certain result, which may be different than the
    second or the third run. Not to mention other factors such as machine state, CPU
    load, free memory, caching, and more.


    So, based on the given details, we understand that performance tests work a little
    bit differently:


    *   Each tested code runs **several times** to prevent any one-time result that
    may affect our test results. At the end of the test run, the final results will
    be based on the **average** of all executions.


    *   Because the average result might be different from tests to test, it is not
    enough to satisfy our needs. We still need to set some **baseline** to make sure
    the change is not too big and it’s within the reasonable spectrum.


    *   The last issue is also a major one – **the baseline is linked to a specific
    device** based on its UUID. The reason is obvious – not only that each device
    has different hardware, but it also has different settings and installed software.


    So, the unpredictable nature of performance tests makes it a unique creature in
    our testing suite, and we should use it for specific use cases or flows that may
    cause us performance issues in future changes.


    ## The Basic Measuring Function


    Let’s start with writing our first performance test:


    ```

    class PerformanceTests: XCTestCase {

    func testPerformance() {

    let imageProcessor = ImageProcessor()

    measure {

    _ = imageProcessor.generateImage()

    }

    }

    }

    ```


    In the preceding test, we have a class named `ImageProcessor` with a function
    called `generateImage()`. We know that the function `generateImage()` is doing
    some heavy task, and we want to execute this code as part of the `measure` function.


    The `Measure`() function is part of `XCTestCase`, and it’s the basic performance
    method we have. It has one single parameter, which is a closure. What `measure`()
    function does is executing the closure ten times and calculating the average time
    in the end.


    Let’s run the test (Figure [8-1](#496602_1_En_8_Chapter.xhtml#Fig1)).


    ![../images/496602_1_En_8_Chapter/496602_1_En_8_Fig1_HTML.jpg](images/496602_1_En_8_Chapter/496602_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Running our first performance test


    We see some interesting information after our first run. First, we see the average
    time, 1.127 seconds. We also see a message saying there is no baseline time. This
    leads to our third insight – you can see that our test actually passed.


    Unlike other tests, performance tests don’t use assertion. Instead, we define
    a **baseline** for our metric to make sure our result stays below it.


    ### Define the Baseline


    You don’t have to work hard to set a baseline for your test. Pressing on the gray
    diamond next to the message “No baseline average for Time” opens a small popup
    window with more details and functionality (see Figure [8-2](#496602_1_En_8_Chapter.xhtml#Fig2)).


    ![../images/496602_1_En_8_Chapter/496602_1_En_8_Fig2_HTML.jpg](images/496602_1_En_8_Chapter/496602_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Performance Result Settings window


    In this popup, you can see additional information about your run and an option
    to set a baseline easily by just pressing a button.


    On the lower part of the popup, you can see your executions over time.


    Note


    It’s not rare for the first execution to be much longer than the others. It has
    to do with things like caching or internal behaviors of the Swift language. This
    is part of the reason we run this test several times to get a score that is closed
    to a real-life state.


    Pressing the “Set Baseline” button changes the state of the popup window to Edit
    mode (see Figure [8-3](#496602_1_En_8_Chapter.xhtml#Fig3)).


    ![../images/496602_1_En_8_Chapter/496602_1_En_8_Fig3_HTML.jpg](images/496602_1_En_8_Chapter/496602_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Performance test baseline edit


    Tapping the “Accept” button sets the current average result as our baseline for
    the next test.


    You can also edit the baseline manually just by tapping it and type the new value.


    To confirm the change, just press on “Save”.


    ### What the “Baseline” Means for Our Test?


    Performance tests are based on two important values – Baseline and Max STDDEV.


    The Baseline value is the bar your test needs to reach. If your execution code
    runs 10%+ slower than the baseline, your test will fail.


    Another value being calculated is the standard deviation, the STDDEV. If the deviation
    of your runs is more than 10%, a value that can be changed easily, your test will
    fail as well.


    #### Why Is the Deviation Important?


    When running performance tests, we need to make sure our score is reliable. If
    you get a high deviation in your tests, it might be a code smell and point on
    two things:


    *   It may be an indication of a problem in your code. Basically, you need to
    expect heavily loaded code to perform similarly in multiple runs. If this is not
    the case, it means **your code executes in an unexpected manner** and maybe be
    affected by external values or states.


    *   A big deviation means that there **are some executions that are slow**, much
    slower than the average score you get. It also means that our average score is
    not relevant and our users experience poor performance even though our test might
    be below the baseline.


    If your test fails because of high deviation, don’t increase the bar for no reason.
    You should investigate the behavior of your code before making any changes.


    ## measure(metrics:) Function


    Up until Xcode 11, the only metric you could measure is execution time.


    But the new Xcode version brought new metrics to the table:


    *   `XCTClockMetric`  – This is the execution time metric similar to what we’ve
    learned in the previous section.


    *   `XCTCPUMetric` – This metric gives you information about the CPU activity
    during the run.


    *   `XCTMemoryMetric` – Measure allocated during the test.


    *   `XCTStorageMetric` – Record bytes written to disk.


    *   `XCTOSSignpostMetric –` Measure execution time for a specific part of your
    code, defined externally in your code using `os_signpost` functions.


    The most basic metric developers use is the time/clock metric, but there are many
    cases why you would want to check other metrics as well.


    It doesn’t mean you need to run the performance test for each one of your metrics –
    you can pass array of metrics and get results for all of them:


    ```

    func testGeneratingImageWithAllMetrics() {

    let imageProcessor = ImageProcessor()

    measure(metrics: [XCTClockMetric(), XCTCPUMetric(), XCTStorageMetric(), XCTMemoryMetric()])
    {

    _ = imageProcessor.generateImage()

    }

    }

    ```


    Running the test while passing all the metrics gives you the same popup as before,
    but now with information for each of your metrics (see Figure [8-4](#496602_1_En_8_Chapter.xhtml#Fig4)).


    ![../images/496602_1_En_8_Chapter/496602_1_En_8_Fig4_HTML.jpg](images/496602_1_En_8_Chapter/496602_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Setting baselines to all metrics


    This is plenty of information! Let’s try to dig in and understand what it means.


    ### Analyzing the Metrics'
  trans: "\n## 性能测试的基本理念\n\n与其他测试（如单元测试或集成测试）不同，性能测试有点\"难以捉摸\"。它们有几个独特的特性，使其结果不那么容易预测。\n\
    \n例如，在老旧的设备上运行性能测试，产生的结果可能与在新设备上运行的结果不同。\n\n同样，在一次测试运行中，你可能得到某个结果，但第二次或第三次运行的结果可能会有所不同。更不用说其他因素，如机器状态、CPU\
    \ 负载、可用内存、缓存等。\n\n因此，根据上述细节，我们了解到性能测试的工作方式略有不同：\n\n*   每个被测代码会运行**多次**，以防止任何一次性结果影响我们的测试结果。在测试运行结束时，最终结果将基于所有执行次数的**平均值**。\n\
    *   因为平均值在不同测试间可能不同，仅凭此并不足以满足我们的需求。我们仍然需要设定一些**基准**，以确保变化不会太大，并且保持在合理的范围内。\n*\
    \   最后一个问题也是主要问题——**基准是与特定设备关联的**，基于其 UUID。原因显而易见——不仅每台设备的硬件不同，其设置和安装的软件也可能不同。\n\
    \n因此，性能测试的不可预测性使其成为我们测试套件中的一个独特存在，我们应该将其用于特定的用例或流程，这些用例或流程在未来的变更中可能引发性能问题。\n\n\
    ## 基础测量函数\n\n让我们从编写第一个性能测试开始：\n\n```\nclass PerformanceTests: XCTestCase {\n \
    \   func testPerformance() {\n        let imageProcessor = ImageProcessor()\n\
    \        measure {\n            _ = imageProcessor.generateImage()\n        }\n\
    \    }\n}\n```\n\n在上面的测试中，我们有一个名为 `ImageProcessor` 的类，它有一个 `generateImage()` 函数。我们知道\
    \ `generateImage()` 函数在执行一些繁重的任务，而我们希望将这些代码作为 `measure` 函数的一部分来执行。\n\n`measure()`\
    \ 函数是 `XCTestCase` 的一部分，是我们拥有的基本性能测量方法。它只有一个参数，即一个闭包。`measure()` 函数的作用是执行这个闭包十次，并最终计算平均时间。\n\
    \n让我们运行这个测试（图 8-1）。\n\n第一次运行后，我们看到了些有趣的信息。首先，我们看到了平均时间，1.127 秒。我们还看到一条消息，说没有基准时间。这引出了我们的第三个认识——你可以看到我们的测试实际上通过了。\n\
    \n与其他测试不同，性能测试不使用断言。相反，我们为指标定义一个**基准**，以确保我们的结果低于这个基准。\n\n### 定义基准\n\n你无需费力地为测试设置基准。点击\"\
    Time 没有基准平均值\"消息旁边的灰色菱形，会打开一个带有更多细节和功能的小弹窗（见图 8-2）。\n\n在这个弹窗中，你可以看到关于此次运行的额外信息，以及一个只需按一下按钮即可轻松设置基准的选项。\n\
    \n弹窗的下半部分，你可以看到随时间推移的执行记录。\n\n注意\n第一次执行比后续执行时间长得多的情况并不少见。这与缓存或 Swift 语言的内部行为等因素有关。这也是我们多次运行此测试以获得接近真实状态分数的部分原因。\n\
    \n按下\"Set Baseline\"按钮会将弹窗状态切换到编辑模式（见图 8-3）。\n\n点击\"Accept\"按钮会将当前的平均结果设置为下次测试的基准。\n\
    \n你也可以手动编辑基准，只需点击它并输入新值即可。\n\n要确认更改，只需点击\"Save\"。\n\n### \"基准\"对我们的测试意味着什么？\n\n\
    性能测试基于两个重要值——基准值和最大标准偏差。\n\n基准值是测试需要达到的门槛。如果你的执行代码运行速度比基准慢 10%或更多，你的测试就会失败。\n\n\
    另一个计算值是标准偏差。如果运行的偏差超过 10%（这个值可以轻松更改），你的测试同样会失败。\n\n#### 为什么偏差很重要？\n\n运行性能测试时，我们需要确保我们的分数是可靠的。如果测试中出现高偏差，这可能是一个代码异味，并指向两方面问题：\n\
    \n*   这可能表示你的代码存在问题。基本上，你应该预期高负载代码在多次运行中表现相似。如果不是这样，就意味着**你的代码以不可预期的方式执行**，可能受到外部值或状态的影响。\n\
    *   大偏差意味着**存在一些执行较慢的情况**，远比你得到的平均分数慢。这也意味着我们的平均分数不具有代表性，即使用户可能体验到了糟糕的性能，而我们的测试却可能低于基准。\n\
    \n如果你的测试因高偏差而失败，不要无故提高标准。你应该在做出任何更改之前，先调查代码的行为。\n\n## measure(metrics:) 函数\n\n\
    直到 Xcode 11，唯一可测量的指标是执行时间。\n\n但新版 Xcode 带来了新的指标：\n\n*   `XCTClockMetric` – 这是执行时间指标，类似于我们在上一节学到的东西。\n\
    *   `XCTCPUMetric` – 此指标提供运行期间 CPU 活动的信息。\n*   `XCTMemoryMetric` – 测量测试期间分配的内存。\n\
    *   `XCTStorageMetric` – 记录写入磁盘的字节数。\n*   `XCTOSSignpostMetric` – 测量代码特定部分的执行时间，该部分需使用\
    \ `os_signpost` 函数在代码中外部定义。\n\n开发者最常使用的基础指标是时间/时钟指标，但在很多情况下，你也会希望检查其他指标。\n\n这并不意味着你需要为每个指标单独运行性能测试——你可以传递一个指标数组，并获得所有指标的结果：\n\
    \n```\nfunc testGeneratingImageWithAllMetrics() {\n    let imageProcessor = ImageProcessor()\n\
    \    measure(metrics: [XCTClockMetric(), XCTCPUMetric(), XCTStorageMetric(), XCTMemoryMetric()])\
    \ {\n        _ = imageProcessor.generateImage()\n    }\n}\n```\n\n传递所有指标运行测试后，会得到与之前相同的弹窗，但现在包含每个指标的信息（见图\
    \ 8-4）。\n\n信息量很大！让我们试着深入挖掘，理解这些信息的含义。\n\n### 分析指标\n"
- fmt: '# Clock Monotonic Time


    This measurement is part of the `XCTClockMetric`, and it measures the exact duration
    of your execution block. At this point, I want to explain what exactly **Monotonic
    Time** means.


    If you want to measure code without using the `measure` function, you can do something
    like this:


    ```

    let startTime = Date()

    _ = imageProcessor.generateImage()

    let endTime = Date()

    let duration = startTime.timeIntervalSince1970 - endTime.timeIntervalSince1970

    ```


    We measure the time before the execution and the time after the execution. Obviously,
    the elapsed time between them is the duration of the execution, right?


    Well, not exactly. Doing that would be wrong.


    There are two different clocks in almost every modern operating system – the **Wall
    Clock** and **Monotonic Clock**.


    The **Wall Clock** is the clock that is presented to the user (and the application).
    This is the time that we get when we use the `Date()` function to get the current
    time. Wall Clock time is affected by NTP (Network Time Protocol) and can be synchronized
    during the application running. Therefore, not only the elapsed time might not
    be accurate; it can even be negative.


    **Monotonic Clock**, on the other hand, cannot be affected by any external influence.
    Monotonic Clock is not aiming to give the current time since it doesn’t have a
    “starting point.” What it does is to give you a stable duration measurement, and
    this is why we use it in performance tests.


    ## CPU Cycles, CPU Time, and CPU Instructions


    OK, so we have a clock time, why do we need a “CPU Time”? And what is it anyway?


    So, first, **CPU Time** doesn’t represent the total execution time, but only the
    time the CPU was busy executing your instructions. For example, the total execution
    duration also includes any I/O operations or even network requests (although it’s
    not recommended to include network time in your performance tests).


    So, if you want to eliminate any external factors and focus on your processing
    time, CPU Time under `XCTCPUMetric` is the way to go.


    So, what are **CPU Instructions Retired and CPU cycles**?


    **CPU Cycles** is the metric that shows you how much your CPU worked hard during
    the block execution, and CPU Instructions metric contains the number of the actual
    instructions completed – in general, a low number of instructions for the same
    task, points of better efficiency, and power consumption.


    ## Checking Your Writing Activity with XCTStorageMetric


    `XCTStorageMetric` is another interesting aspect of the performance tests. Instead
    of measuring time, it measures your writing to disk activity. This might not sound
    like an interesting metric, but when concluding it with the clock metric, it’s
    a great metric to help you optimize your code.


    Writing to disk is considered to be a heavy task much more than writing to memory.
    It is best practice to avoid it if possible. A big increase in this metric can
    explain poor results in the clock metric and can be an indication of unnecessary
    writing activity.


    # More Configuration with XCTMeasureOptions


    Using performance metrics is pretty straightforward. In fact, they are so useful
    and effective that you don’t really need any configuration for them. But, still,
    there is an option that can help you tune your performance tests better to get
    more accurate results.


    The way of doing that is bypassing an object of type `XCTMeasureOptions`. `XCTMeasureOptions`
    was added along with the performance test metrics, and it has two properties that
    you are able to configure.


    ## iterationCount


    The first property you can update is the `iterationCount`. This property defines
    the number of times your test runs. The default is 5, but you should be aware
    that XCTest always adds another iteration and ignores it (it actually ignores
    the first one).


    Why would we want to change the number of iterations? There could be two reasons
    – the first one is **heavy and time-consuming** performance tests that you want
    to run no more than one or two times. The second option might be the opposite
    – very small performance tests that you need to run many times to get accurate
    results as possible.


    In 95% of the cases, you don’t need to change the default value. Also, if you
    run your test without passing an `XCTMeasureOptions` object, the number of iterations
    will be ten times and not five as described earlier in this chapter.


    ## invocationOptions


    Performance tests are great, but they still have one major drawback, and that’s
    controlling the start and the end of the measured part of your code.


    I’ll explain – we know that performance tests run multiple times, and they all
    should start from the **same state**. In fact, they are exactly like any other
    tests – you need to have some setup code before you start and do a cleanup when
    you finish.


    The problem is that you need to execute the setup and cleanup code **inside the**
    measured block, which means that all the metrics cover these parts of your block
    as well.


    The `invocationOptions` property lets you define how your measurements are taken.
    It’s an optionSet that has two options – `manuallyStart` and `manuallyStop`.


    If `invocationOptions` contains `manuallyStart`, it means that measurements are
    taken when you call the function `self.startMeasure()` in your execution code.
    If `manuallyStop` is included in `invocationOptions`, it means the Xcode stops
    the measurement when on `self.stopMeasure()`.


    Look at the following code:


    ```

    func testGeneratingImageWithAllMetrics() {

    let imageProcessor = ImageProcessor()

    let options = XCTMeasureOptions()

    options.invocationOptions = [.manuallyStop ,.manuallyStart]

    measure(metrics: [XCTClockMetric(), XCTCPUMetric(), XCTStorageMetric(), XCTMemoryMetric()],
    options: options) {

    // do some preparations

    self.startMeasuring()

    _ = imageProcessor.generateImage()

    self.stopMeasuring()

    // do some cleanup

    }

    }

    ```


    Looking at the code, you can see we can easily insert some setup and cleanup code
    inside our execution closure and define exactly what part we want to measure.


    ## Measuring App Launch


    One great way you can make use of performance tests is to measure your app launch.


    App launch time is extremely important to your app user experience and, in many
    cases, is the root of ongoing frustrations among users.


    Setting up a test for that mission is very easy. In fact, you don’t need to do
    anything – any new UI testing target comes with a predefined app launch test:


    ```

    func testLaunchPerformance() throws {

    if #available(macOS 10.15, iOS 13.0, tvOS 13.0, *) {

    // This measures how long it takes to launch your application.

    measure(metrics: [XCTOSSignpostMetric.applicationLaunch]) {

    XCUIApplication().launch()

    }

    }

    }

    ```


    It is pretty amazing that in two rows we can measure our app launch time.


    This test also contains baseline just like all the other performance tests, and
    since it’s already written for you, it’s recommended for you to include it in
    your test bundle.'
