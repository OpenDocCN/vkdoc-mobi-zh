    \ is the actual “product” (app or framework) that your new test bundle tests.\
    \ “Target to be Tested” can also be changed later (see Figure [2-5](#496602_1_En_2_Chapter.xhtml#Fig5)).\n\
    \n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig5_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5\n\nChoose options for new test target"
