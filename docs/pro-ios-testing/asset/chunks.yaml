    doing a test-code-test-code process, we are writing the function or the code block
    step by step according to the tests, and this is a different approach of writing
    code than writing the function in one session.


    Think of how you write method and functions today – you write the code with the
    intent that you have to fulfill all the requirements. TDD approach is a vast difference
    from the standard approach, and this may lead to duplication in our code. Eliminating
