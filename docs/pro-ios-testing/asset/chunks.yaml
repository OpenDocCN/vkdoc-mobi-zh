  trans: '

    # 单调时钟时间


    此测量是 `XCTClockMetric` 的一部分，用于测量代码执行块的精确持续时间。在此，我想解释一下**单调时间**的确切含义。


    如果你想在不使用 `measure` 函数的情况下测量代码，可以这样做：


    ```

    let startTime = Date()

    _ = imageProcessor.generateImage()

    let endTime = Date()

    let duration = startTime.timeIntervalSince1970 - endTime.timeIntervalSince1970

    ```


    我们测量执行前的时间和执行后的时间。显然，两者之间的时间差就是执行耗时，对吗？


    嗯，并不完全准确。那样做是错误的。


    几乎每个现代操作系统中都有两种不同的时钟——**挂钟**和**单调时钟**。


    **挂钟**是呈现给用户（和应用程序）的时钟。这就是我们使用 `Date()` 函数获取当前时间时得到的时间。挂钟时间受 NTP（网络时间协议）影响，并且在应用程序运行期间可能会被同步。因此，不仅耗时可能不准确；它甚至可能是负数。


    另一方面，**单调时钟**不受任何外部影响。单调时钟的目标不是提供当前时间，因为它没有“起始点”。它的作用是为你提供稳定的持续时间测量，这就是我们在性能测试中使用它的原因。


    ## CPU 周期、CPU 时间和 CPU 指令


    好的，既然我们有时钟时间，为什么还需要“CPU 时间”呢？它究竟是什么？


    首先，**CPU 时间**并不代表总执行时间，而只代表 CPU 忙于执行指令的时间。例如，总执行时长还包括任何 I/O 操作，甚至是网络请求（尽管不建议在性能测试中包含网络时间）。


    因此，如果你想排除任何外部因素，专注于处理时间，那么使用 `XCTCPUMetric` 下的 CPU 时间就是正确的方法。


    那么，什么是**已退出的 CPU 指令和 CPU 周期**呢？


    **CPU 周期** 这个指标显示 CPU 在执行块期间的工作强度，而 CPU 指令指标则包含实际完成的指令数量——通常，完成相同任务的指令数越少，意味着效率越高，功耗越低。


    ## 使用 XCTStorageMetric 检查写入活动


    `XCTStorageMetric` 是性能测试另一个有趣的方面。它不测量时间，而是测量你向磁盘的写入活动。这听起来可能不是一个有趣的指标，但当它与时钟指标结合时，它是一个帮助你优化代码的优秀指标。


    向磁盘写入被认为是一项比向内存写入繁重得多的任务。如果可能，最好避免这样做。此指标的大幅增加可以解释时钟指标结果不佳的原因，并可能表明存在不必要的写入活动。


    # 使用 XCTMeasureOptions 进行更多配置


    使用性能指标非常简单明了。实际上，它们非常有用且有效，你通常不需要对它们进行任何配置。但是，仍然有一个选项可以帮助你更好地调整性能测试，以获得更准确的结果。


    实现方法是传递一个 `XCTMeasureOptions` 类型的对象。`XCTMeasureOptions` 是随性能测试指标一起添加的，它有两个可以配置的属性。


    ## iterationCount


    你可以更新的第一个属性是 `iterationCount`。此属性定义了测试运行的次数。默认值为 5，但你应该注意，XCTest 总是额外添加一次迭代并忽略它（实际上它忽略的是第一次迭代）。


    我们为什么想要改变迭代次数呢？可能有两个原因——第一个原因是，你希望运行**繁重且耗时**的性能测试，但次数不超过一两次。第二个原因可能相反——非常小的性能测试，你需要运行很多次才能获得尽可能准确的结果。


    在 95% 的情况下，你不需要更改默认值。另外，如果你在运行测试时不传递 `XCTMeasureOptions` 对象，迭代次数将是 10 次，而不是本章前面提到的
    5 次。


    ## invocationOptions


    性能测试很棒，但它们仍然有一个主要缺点，那就是控制代码被测部分的开始和结束。


    我来解释一下——我们知道性能测试会运行多次，并且它们都应该从**相同的状态**开始。实际上，它们和任何其他测试完全一样——你需要在开始前执行一些设置代码，并在结束时进行清理。


    问题是，你需要**在**被测代码块**内部**执行设置和清理代码，这意味着所有指标也会覆盖你代码块的这些部分。


    `invocationOptions` 属性让你可以定义测量的进行方式。它是一个 optionSet，有两个选项——`manuallyStart` 和 `manuallyStop`。


    如果 `invocationOptions` 包含 `manuallyStart`，意味着测量将在你执行代码中调用函数 `self.startMeasure()`
    时开始。如果 `invocationOptions` 中包含 `manuallyStop`，意味着 Xcode 会在 `self.stopMeasure()`
    时停止测量。


    看下面的代码：


    ```

    func testGeneratingImageWithAllMetrics() {

    let imageProcessor = ImageProcessor()

    let options = XCTMeasureOptions()

    options.invocationOptions = [.manuallyStop ,.manuallyStart]

    measure(metrics: [XCTClockMetric(), XCTCPUMetric(), XCTStorageMetric(), XCTMemoryMetric()],
    options: options) {

    // do some preparations

    self.startMeasuring()

    _ = imageProcessor.generateImage()

    self.stopMeasuring()

    // do some cleanup

    }

    }

    ```


    查看代码，你可以看到我们可以轻松地在执行闭包中插入一些设置和清理代码，并准确定义我们想要测量的部分。


    ## 测量应用启动


    利用性能测试的一个好方法是测量应用的启动时间。


    应用启动时间对应用用户体验至关重要，并且在许多情况下，它是导致用户持续感到沮丧的根源。


    为此任务设置测试非常简单。实际上，你不需要做任何事——任何新的 UI 测试目标都会附带一个预定义的应用启动测试：


    ```

    func testLaunchPerformance() throws {

    if #available(macOS 10.15, iOS 13.0, tvOS 13.0, *) {

    // This measures how long it takes to launch your application.

    measure(metrics: [XCTOSSignpostMetric.applicationLaunch]) {

    XCUIApplication().launch()

    }

    }

    }

    ```


    仅仅两行代码就能测量应用启动时间，这相当神奇。


    此测试也像所有其他性能测试一样包含基线，并且由于它已经为你写好，建议你将其包含在你的测试包中。

    '
- fmt: '## Asynchronous Performance Tests


    So, we can see how easy it is to measure the performance of a specific function/method
    by just wrapping it inside the measuring closure. But what if we want to measure
    an a-sync function?


    In general, it is much simpler to measure synced functions, but it is still possible
    to also test a-sync function using the `XCTestExpectation` tool we’ve learned
    in previous chapters.


    > Note

    > If you don’t remember how to use `XCTestExpectation`, go back to the unit test
    chapters and go over this part.


    The basic steps to create a performance test for a-sync function are as follows:


    *   Open measuring closure while setting the `automaticallyStart` to `yes`.

    *   Create the `XCTestExpectations` inside the closure. Now, this step is important.
    Creating the expectation object outside the closure will raise an exception.

    *   Wait for the expectation to be fulfilled inside the closure, just like the
    expectation’s creation itself.


    Let’s see an example:


    ```

    func testImagePrcessongAsync() {

    measure(metrics: [XCTClockMetric()]) {

    let expectation = XCTestExpectation(description: "Image processing")

    let imageProcessing = ImageProcessor()

    imageProcessing.generateImageAsync {

    expectation.fulfill()

    }

    wait(for: [expectation], timeout: 2.0)

    }

    }

    ```


    Remember that executions run one after the other, so the `wait()` function halts
    the run until the expectation is fulfilled before it continues to the next one.


    Also, you need to be careful about the waiting timeout duration – if it’s too
    low, say, lower than the baseline, the test can fail even though it ran better
    than the baseline.


    ## The Baseline Under the Hood


    Unlike other tests, performance tests rely on the specs of the machine that runs
    them.


    So, you can conclude that different machines give you different results; therefore,
    the baseline has to be corresponding to the host machine.


    And this is something you need to understand, especially if you run your tests
    on a continuous integration environment – Xcode saves the baseline values for
    any combination of the host machine (your Mac) and device (including simulators).


    Although iOS simulators are not emulators, meaning there shouldn’t be any CPU
    difference, they can still give you different results.


    For example, you might turn off/on different features for different devices in
    your code. Also, the device resolution can have an impact on the simulator performance
    (again, this is up to the host machine as well).


    ### Where Xcode Saves the Baseline?


    This is an important question, especially if you work in a big corporate, and
    your app integration process is running on different machines.


    True to Xcode 12, the baseline values are saved inside your Xcode project file.


    Xcode project file (`*.xcodeproj`) is a package, meaning it’s actually a folder
    that displayed like a typical file.


    To reveal the package content, right-click the package (`xcodeproj`) and select
    “Show Package Contents”.


    Navigate to `xcshareddata/xcbaselines/`.


    The first important file you see there is `info.plist`. This file contains the
    list of the “host machine+device” combinations. Xcode generates a unique UUID
    for each combination and saves it (see Figure [8-5](#496602_1_En_8_Chapter.xhtml#Fig5)).


    ![../images/496602_1_En_8_Chapter/496602_1_En_8_Fig5_HTML.jpg](images/496602_1_En_8_Chapter/496602_1_En_8_Fig5_HTML.jpg)


    Figure 8-5

    Info.plist file, containing the host machine details along with the target device
    information


    If you look at the `info.plist`, you’ll see the generated UUID. For each UUID,
    Xcode creates another plist file in the same directory, containing the list of
    baselines for each test method (Figure [8-6](#496602_1_En_8_Chapter.xhtml#Fig6)).


    ![../images/496602_1_En_8_Chapter/496602_1_En_8_Fig6_HTML.jpg](images/496602_1_En_8_Chapter/496602_1_En_8_Fig6_HTML.jpg)


    Figure 8-6

    List of test methods and their baselines for each metric


    ### How Xcode Pulls the Baseline from These Files


    If you take a look again at Figure [8-5](#496602_1_En_8_Chapter.xhtml#Fig5), you
    can see that Xcode doesn’t save the serial number of the machine, but rather its
    specs. This means that if you run your tests on a different machine but with the
    same specs, Xcode will pull the corresponding baselines for this test.


    Why is this important? Because this is the way you can set the baselines for your
    CI environment – by adjusting the “combo” settings to match your remote machine.


    ## Summary


    You don’t have to write performance tests for every method in your project. More
    than that, there are projects that performance tests are useless.


    Performance is all about the big numbers – if you have heavily loaded functions
    or pieces of code, this tool is a great way to optimize them and verify you don’t
    have any regressions. Not only testing performance on small, unimportant function
    is useless; it’s also a mistake that can make the maintenance of your test difficult.


    We are heading to the next chapter – a technique that can help you define the
    “expected result” easily.


    # 9. Snapshot Testing


    > *Reminds me of the awesome bug report I saw once: ‘Everything is broken. Steps
    to reproduce: do anything. Expected result: it should work’.*

    >

    > —Felipe Knorr Kuhn


    ## Introduction


    When we think about writing tests, we usually think about defining expected results
    and then writing tests to validate them. But what if we know our code already
    executes as expected, and all we want to do is to prevent regression in the future?


    Snapshot testing is all about saving our current state persistency once we know
    it’s stable and then making an ongoing comparison in each run.


    In this chapter, you will learn


    *   What is Snapshot Testing

    *   How to write your own snapshot testing

    *   What are the problems with snapshot testing

    *   What are UI Snapshot Testing and why do we need it

    *   Meeting FBSnapshotTestCase as an example for a UI Snapshot Testing Framework


    ## What Is Snapshot Testing?


    The following diagram (Figure [9-1](#496602_1_En_9_Chapter.xhtml#Fig1)) is the
    best way to explain what a snapshot testing is.


    ![../images/496602_1_En_9_Chapter/496602_1_En_9_Fig1_HTML.jpg](images/496602_1_En_9_Chapter/496602_1_En_9_Fig1_HTML.jpg)


    Figure 9-1

    What is a snapshot testing


    Snapshot testing is a technique that can help you write tests quickly and easily
    in cases it’s too complicated to cover it with the regular unit or integration
    tests. For example, snapshot testing is a great way to cover UI elements of your
    app or network responses.


    This technique is not recommended in all cases. Still, before I explain why we
    should be careful not to become addicted to snapshot testing, I want to dive into
    the practice – how snapshot testing works.'
