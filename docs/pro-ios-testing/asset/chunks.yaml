- fmt: '## Adding UI Tests


    Adding UI Tests is easy and is similar to adding unit tests. If your project doesn’t
    contain the UI Test bundle already, you can go to `File` ➤ `New` ➤ `Target…` and
    choose the UI Testing template from the popup window (Figure [7-1](#496602_1_En_7_Chapter.xhtml#Fig1)).
    You can use the search field to locate it quickly.


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig1_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig1_HTML.jpg)


    Figure 7-1

    Adding UI Testing target


    The next screen is also similar to adding a unit test target screen (Figure [7-2](#496602_1_En_7_Chapter.xhtml#Fig2)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig2_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig2_HTML.jpg)


    Figure 7-2

    Options window for the new UI testing target


    The new target we create contains one test case, besides the regular `info.plist`
    file any target contains.


    By looking at the new fresh file, you can tell it’s quite different than the unit
    test code you are already familiar with. The changes start at the top of the file
    when the `"@testable import <module name>"` line is missing. To understand why,
    you need to know how UI Tests work.


    ## How Do UI Tests Work?


    Xcode refers to your UI Test bundle as a black box, meaning it doesn’t have access
    to your application code at all. When the test runner starts, it creates a temporary
    outsider app that launches your app and activates it.


    To do that, XCTest uses the `Accessibility` framework in UIKit.


    ### Accessibility in UIKit – accessibilityLabel


    If you are not familiar with Accessibility in UIKit, UI Testing is a great place
    to start. Accessibility in UIKit is not something new, and it helps disabled users
    interact with apps in many ways. Every `UIView` conforms to a protocol named `UIAccessibility`
    that allows iOS features such as `VoiceOver` to identify the different UI elements
    on the screen.


    One of the main properties included in the `UIAccessibility` protocol is `accessibilityLabel`,
    which represents the name of the element on the screen for disabled users.


    There are two easy ways of setting an `accessibilityLabel`. You can do that by
    code


    ```

    saveButton.accessibilityLabel = "save"

    ```


    or by going to the Identity Inspector pane in your storyboard (Figure [7-3](#496602_1_En_7_Chapter.xhtml#Fig3)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig3_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig3_HTML.jpg)


    Figure 7-3

    Accessibility Inspector inside the Identity Inspector


    Some controls such as `UIButtons` have a “built-in” `accessibilityLabel` which
    holds the value of their label unless defined otherwise.


    When running UI Tests, XCTest uses the accessibility labels to “see” the elements
    on the screen and, by that, do actions such as tapping, scrolling, typing, and
    also different validations to make sure the test passed or failed.


    ### Element Tree


    Just like the view’s hierarchy in your `UIWindow`, XCTest “sees” this as a tree
    of accessibility elements.


    Take a look at Figure [7-4](#496602_1_En_7_Chapter.xhtml#Fig4).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig4_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig4_HTML.jpg)


    Figure 7-4

    Application screen and its corresponding element tree


    Figure [7-4](#496602_1_En_7_Chapter.xhtml#Fig4) displays an app screen and on
    the left side its element tree, as it was printed in a console. As you can see,
    we don’t have class names or any other “coding” information in the tree – only
    the types of the elements, their frames, and names. As mentioned before, XCTest
    looks at our app as a black box and the information available for it.


    ## Write Our First UI Test


    Let’s start with a simple test case. We have a screen with a list of fruits. Tapping
    on the “Orange” fruit should lead to a new screen. See Figure [7-5](#496602_1_En_7_Chapter.xhtml#Fig5).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig5_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig5_HTML.jpg)


    Figure 7-5

    Fruits app


    In Figure [7-5](#496602_1_En_7_Chapter.xhtml#Fig5), the accessibility labels are
    marked in red.


    Let’s examine our first test code:


    ```

    func testTappingOnOrangeButton() {

    let app = XCUIApplication() //1

    app.launch() //2

    app.cells["orangeCell"].tap() //3

    // assert        XCTAssertTrue(app.staticTexts["fruitPageTitle"].exists) //4

    }

    ```


    It is surprising how easy it is to set up a short UI Test with not much effort.


    These are the steps in details:

    *   //1 : Create a reference to `XCUIApplication`, which represents the application
    you are testing.

    *   //2 : Launch the application.

    *   //3 : Runs query to `find the orange cell` button, and tap on it.

    *   //4 : `Assert` to make sure the next screen appears.


    Almost all of your UI Tests start with creating an `XCUIApplication` instance.


    ### XCUIApplication


    `XCUIApplication` is a proxy for an application. Using this proxy, you can launch
    an app and get a reference to its visible elements.


    The specific application doesn’t have to be the application being tested – you
    can pass bundle identifier on initializing and, by that, running multiple apps’
    UI Tests:


    ```

    let otherApp = XCUIApplication(bundleIdentifier: "com.myOtherApp.www")

    ```


    ### Elements


    When talking about “elements,” we refer to objects that subclass `XCUIElement`.
    `XCUIElement` represents a view on the screen and has properties and methods that
    let you interact and communicate.


    In fact, `XCUIApplication` itself is a subclass of `XCUIElement`.


    #### Querying Element(s)


    To retrieve elements, we need to query them. Querying is where the `accessibilityLabel`
    property comes in hand.


    Querying elements are natural. For example, if you want to get the “save” button,
    all you need to do is


    ```

    app.buttons["save"]

    ```


    The `buttons` property returns all the buttons on the screen, and the “save” is
    there to get only the button with an accessibility label named “save”.


    But what is considered to be a “button”? Is it only controls that subclass from
    `UIButton`? Can we create our control and define it as a “button”?


    Well, if we return to the Accessibility Inspector in Xcode, we can define the
    trait for the different views on the screen (Figure [7-6](#496602_1_En_7_Chapter.xhtml#Fig6)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig6_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig6_HTML.jpg)


    Figure 7-6

    Accessibility Inspector within Identity Inspector, Traits


    Now that we know what traits are available for us and how we can define a trait
    for an element, let’s take a step back and understand how queries for elements
    work underneath.


    ##### How Queries Work?


    So, what is the problem with querying elements in UI Testing?


    Look at the following diagram (Figure [7-7](#496602_1_En_7_Chapter.xhtml#Fig7)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig7_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig7_HTML.jpg)


    Figure 7-7

    Querying your app for elements


    The querying element mission has some structured pitfalls. First, your app has
    potentially many elements to go over to retrieve your search results. Also, each
    element contains many attributes that, in most cases, are not important to your
    test at all. These pitfalls cause performance and memory issues that may affect
    your test result and fail it without any justification.'
