    \ measuring closure. But what if we want to measure an a-sync function?\n\nIn\
    \ general, it is much simpler to measure synced functions, but it is still possible\
    \ to also test a-sync function using the `XCTestExpectation` tool we’ve learned\
    \ in previous chapters.\n\nNote\n\nIf you don’t remember how to use `XCTestExpectation`,\
    \ go back to the unit test chapters and go over this part.\n\nThe basic steps\
    \ to create a performance test for a-sync function are as follows:\n\n*   Open\
    \ measuring closure while setting the automaticallyStart to `yes`.\n\n*   Create\
    \ the `XCTestExpectations` **inside** the closure. Now, this step is important.\
    \ Creating the expectation object outside the closure will raise an exception.\n\
    \n*   Wait for the expectation to be fulfilled inside the closure, just like the\
    \ expectation’s creation itself.\n\nLet’s see an example:\n\n```\nfunc testImagePrcessongAsync()\
    \ {\nmeasure(metrics: [XCTClockMetric()]) {\nlet expectation = XCTestExpectation(description:\
    \ \"Image processing\")\nlet imageProcessing = ImageProcessor()\nimageProcessing.generateImageAsync\
    \ {\nexpectation.fulfill()\n}\nwait(for: [expectation], timeout: 2.0)\n}\n}\n\
    ```\n\nRemember that executions run one after the other, so the `wait()` function\
    \ halts the run until the expectation is fulfilled before it continues to the\
    \ next one.\n\nAlso, you need to be careful about the waiting timeout duration –\
    \ if it’s too low, say, lower than the baseline, the test can fail even though\
    \ it ran better than the baseline.\n\n## The Baseline Under the Hood\n\nUnlike\
    \ other tests, performance tests rely on the specs of the machine that runs them.\n\
    \nSo, you can conclude that different machines give you different results; therefore,\
    \ the baseline has to be corresponding to the host machine.\n\nAnd this is something\
    \ you need to understand, especially if you run your tests on a continuous integration\
    \ environment – Xcode saves the baseline values for any combination of the host\
    \ machine (your Mac) and device (including simulators).\n\nAlthough iOS simulators\
    \ are not emulators, meaning there shouldn’t be any CPU difference, they can still\
    \ give you different results.\n\nFor example, you might turn off/on different\
    \ features for different devices in your code. Also, the device resolution can\
    \ have an impact on the simulator performance (again, this is up to the host machine\
    \ as well).\n\n### Where Xcode Saves the Baseline?\n\nThis is an important question,\
    \ especially if you work in a big corporate, and your app integration process\
    \ is running on different machines.\n\nTrue to Xcode 12, the baseline values are\
    \ saved inside your Xcode project file.\n\nXcode project file (*.`xcodeproj`)\
    \ is a package, meaning it’s actually a folder that displayed like a typical file.\n\
    \nTo reveal the package content, right-click the package (`xcodeproj`) and select\
    \ “**Show Package Contents**”.\n\nNavigate to `xcshareddata/xcbaselines`/.\n\n\
    The first important file you see there is `info.plist`. This file contains the\
    \ list of the “host machine+device” combinations. Xcode generates a unique UUID\
    \ for each combination and saves it (see Figure [8-5](#496602_1_En_8_Chapter.xhtml#Fig5)).\n\
    \n![../images/496602_1_En_8_Chapter/496602_1_En_8_Fig5_HTML.jpg](images/496602_1_En_8_Chapter/496602_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5\n\nInfo.plist file, containing the host machine details along with\
    \ the target device information\n\nIf you look at the info.plist, you’ll see the\
    \ generated UUID. For each UUID, Xcode creates **another** plist file in the same\
    \ directory, containing the list of baselines for each test method (Figure [8-6](#496602_1_En_8_Chapter.xhtml#Fig6)).\n\
    \n![../images/496602_1_En_8_Chapter/496602_1_En_8_Fig6_HTML.jpg](images/496602_1_En_8_Chapter/496602_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6\n\nList of test methods and their baselines for each metric\n\n###\
    \ How Xcode Pulls the Baseline from These Files\n\nIf you take a look again at\
    \ Figure [8-5](#496602_1_En_8_Chapter.xhtml#Fig5), you can see that Xcode doesn’t\
    \ save the serial number of the machine, but rather its specs. This means that\
    \ if you run your tests on a different machine but with the same specs, Xcode\
    \ will pull the corresponding baselines for this test.\n\nWhy is this important?\
    \ Because this is the way you can set the baselines for your CI environment –\
    \ by adjusting the “combo” settings to match your remote machine.\n\n## Summary\n\
    \nYou don’t have to write performance tests for every method in your project.\
    \ More than that, there are projects that performance tests are useless.\n\nPerformance\
    \ is all about the big numbers – if you have heavily loaded functions or pieces\
    \ of code, this tool is a great way to optimize them and verify you don’t have\
    \ any regressions. Not only testing performance on small, unimportant function\
    \ is useless; it’s also a mistake that can make the maintenance of your test difficult.\n\
    \nWe are heading to the next chapter – a technique that can help you define the\
    \ “expected result” easily.\n\n# 9. Snapshot Testing\n\n> *Reminds me of the awesome\
    \ bug report I saw once: ‘Everything is broken. Steps to reproduce: do anything.\
    \ Expected result: it should work’.*\n> \n> —Felipe Knorr Kuhn\n\n## Introduction\n\
    \nWhen we think about writing tests, we usually think about defining expected\
    \ results and then writing tests to validate them. But what if we know our code\
    \ already executes as expected, and all we want to do is to prevent regression\
    \ in the future?\n\nSnapshot testing is all about saving our current state persistency\
    \ once we know it’s stable and then making an ongoing comparison in each run.\n\
    \nIn this chapter, you will learn\n\n*   What is Snapshot Testing\n\n*   How to\
    \ write your own snapshot testing\n\n*   What are the problems with snapshot testing\n\
    \n*   What are UI Snapshot Testing and why do we need it\n\n*   Meeting FBSnapshotTestCase\
    \ as an example for a UI Snapshot Testing Framework\n\n## What Is Snapshot Testing?\n\
    \nThe following diagram (Figure [9-1](#496602_1_En_9_Chapter.xhtml#Fig1)) is the\
    \ best way to explain what a snapshot testing is.\n\n![../images/496602_1_En_9_Chapter/496602_1_En_9_Fig1_HTML.jpg](images/496602_1_En_9_Chapter/496602_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nWhat is a snapshot testing\n\nSnapshot testing is a technique\
    \ that can help you write tests quickly and easily in cases it’s too complicated\
    \ to cover it with the regular unit or integration tests. For example, snapshot\
    \ testing is a great way to cover UI elements of your app or network responses.\n\
    \nThis technique is not recommended in all cases. Still, before I explain why\
    \ we should be careful not to become addicted to snapshot testing, I want to dive\
    \ into the practice – how snapshot testing works."
