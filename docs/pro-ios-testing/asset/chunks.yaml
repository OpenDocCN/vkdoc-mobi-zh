    \ areas of your app that are not covered or may contain bugs you are not aware\
    \ of. It doesn’t mean you need to cover them, but it gives you the full picture\
    \ of your app.\n\nAnother issue that code coverage can help you is detecting dead\
    \ code. If you see a private method that is not covered by tests, this could be\
    \ a sign of unreachable code or, in other words, a “dead code.” You can try checking\
    \ the call hierarchy to track what functions call it and decide if you want to\
    \ cover it or delete it if it’s not in use.\n\n### And Then There Is Test Coverage.\
    \ Wait. What?\n\nWhen we say “Code Coverage,” we mean “what is the percentage\
    \ of our code that is covered by unit tests.” Or, as mentioned before, if we have\
    \ 50 lines of code and our tests execute 20 of them, we can tell that our code\
    \ coverage is 40% (20 out of 50).\n\nBut there is another term – Test Coverage.\
    \ A lot of teams and developers are confused by those two terms. While they may\
    \ sound similar, they are not the same.\n\nWhile code coverage measures the percentage\
    \ of code covered by tests, Test Coverage measures the **percentage of requirements\
    \ covered by tests**. Since test coverage doesn’t deal with code but with requirements,\
    \ it’s less relevant for developers but more relevant to the QA testers. The reason\
    \ I bring it here is that it can give you a sense of how to cover different aspects\
    \ of your app and not just chasing code coverage metric or testing methods randomly.\n\
    \nSo when we say “requirements,” it is best practice to divide them into different\
    \ groups that represent how our app is covered and tested in various aspects:\n\
