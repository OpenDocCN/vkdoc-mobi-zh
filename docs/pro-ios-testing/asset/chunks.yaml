- fmt: "# Adding a New XCTestCase Subclass\n\nTo add a new test case, go to File ➤\
    \ New ➤ File and select “Unit Test Case Class”.\n\nAfter tapping “Next”, give\
    \ a name for the test class and choose its location in your project just like\
    \ any other file.\n\nNotice that, in the last step, you need to choose the test\
    \ target this test class belongs to – this is extremely important since test classes\
    \ cannot be part of your executable target.\n\n## Our First Test Class\n\nCongratulations,\
    \ it’s a test class!\n\nLook at how our new test class looks like:\n\n```\nimport\
    \ XCTest // 1\nclass DemoTests: XCTestCase { // 2\n    override func setUpWithError()\
    \ throws { // 3\n        // Put setup code here. This method is called before\
    \ the invocation of each test method in the class.\n    }\n    override func tearDownWithError()\
    \ throws { // 4\n        // Put teardown code here. This method is called after\
    \ the invocation of each test method in the class.\n    }\n    func testExample()\
    \ throws { // 5\n        // This is an example of a functional test case.\n  \
    \      // Use XCTAssert and related functions to verify your tests produce the\
    \ correct results.\n    }\n    func testPerformanceExample() throws { // 6\n \
    \       // This is an example of a performance test case.\n        self.measure\
    \ {\n            // Put the code you want to measure the time of here.\n     \
    \   }\n    }\n}\n```\n\nLet’s go over it together:\n\n1.  `import XCTest` – In\
    \ order to subclass `XCTestCase` and add it to the test runner, we need to import\
    \ the `XCTest` framework just like any other framework we want to use.\n2.  `class\
    \ DemoTests: XCTestCase` – Always make sure you are subclassing from `XCTestCase`.\n\
    3.  `setUpWithError()` – This method runs **before** every test method execution.\
    \ It will be explained later in this chapter.\n4.  `tearDownWithError()` – This\
    \ method runs **after** every test method execution. It also will be explained\
    \ later in this chapter.\n5.  `testExample()` – This is our first unit test example.\
    \ Currently, it’s empty.\n6.  `testPerformanceExample()` – This is a performance\
    \ test example. It will be explained later in this book.\n\n## Enable Testability\n\
    \nBefore we move on and add more tests, we need to make sure everything is linked\
    \ up correctly in our project.\n\nYour test code is *not* part of your executable.\
    \ It’s a different module in your Xcode project, and for your tests to have access\
    \ to your app code, you need to take care of access privileges.\n\nBut don’t worry;\
    \ there is a fairly simple flag to help you with the access privileges problem,\
    \ and it’s called “Enable Testability”.\n\nWhen you go to your executable target,\
    \ under “Build Settings”, search for “Enable Testability”. Setting this flag to\
    \ “YES” gives your test targets access to code.\n\nOne thing we notice here is\
    \ that this flag is set to `NO` in release configuration. One reason for that\
    \ is that we do not need access to the executable code since we usually don’t\
    \ test our app in release configuration. The more important reason for that is\
    \ that this option prevents code optimization, which is used in release configuration\
    \ and is not suitable for your tests and for debugging.\n\n### @testable\n\nSo\
    \ now after we took care of the settings in the executable side, we need to import\
    \ the executable target to the test class.\n\nOn the top of the file, just above\
    \ the class declaration, we add a new attribute called `@testable`:\n\n```\nimport\
    \ XCTest\n@testable import My_Weather_App\nclass My_Weather_AppTests: XCTestCase\
    \ {\n    // testing code\n}\n```\n\nWhat `@testable` does and why do we need it?\
    \ First, lets recall the five access levels in Swift:\n\n*   **Public** – Anyone\
    \ can access within the module and in external code that imports the module.\n\
    *   **Open** – It is same as **Public,** but it is possible to subclass it from\
    \ any module and not just the original class module.\n*   **Internal** – Access\
    \ is prohibited outside the module. The internal access level is the **default**\
    \ level for classes and methods.\n*   **Fileprivate** – Access is only from the\
    \ current file.\n*   **Private** – Access is only from the same class or struct.\n\
    \nIf you notice, the default access for classes and methods is **internal**. Because\
    \ Unit Tests require full access to your code outside the module, we may have\
    \ a problem here assuming your access level for most classes and methods is set\
    \ to the default one.\n\nWhat `@testable` does is to elevate access levels in\
    \ the imported module. Members marked as **Public** now behave as **Open,** and\
    \ members marked as **Internal** behave as **Public**.\n\n> **Note:** There are\
    \ some discussions in the Swift developers’ community about `@testable`. Some\
    \ claim `@testable` attribute is a “hack” who tries to overcome the access level\
    \ issue in testing. Those who claim that, say that since it’s a “hack,” why not\
    \ give `private` and `fileprivate` public access level as well?\n\n### CocoaPods\
    \ and Testing Targets\n\nMany projects today use Dependency Manager to integrate\
    \ with external libraries and frameworks. One of the most popular managers is\
    \ CocoaPods with over 72,000 libraries, and it’s used in more than three million\
    \ apps.\n\nOne of the tasks CocoaPods does when linking a new framework is to\
    \ update the *header search path* according to the new integrated frameworks.\n\
    \nIf you want to use those libraries directly in your test target, you need to\
    \ add your test target to the `Podfile` file, like this:\n\n```\ntarget \"My_Weather_AppTests\"\
    \ do\n  inherit! :search_paths\n  pod 'Fabric', '1.10.2'\n  pod 'Firebase'\nend\n\
    ```\n\nAdding pods to the test target is something developers usually forget during\
    \ test writing, so the key to remember that is to treat the test target as a separate\
    \ app. Everything you want to use, you need to link it to your test target, just\
    \ as you would do in your executable target.\n\n## XCTestCase Life Cycle\n\n`XCTestCase`\
    \ life cycle is a little bit different than what you would expect in standard\
    \ Swift classes. Because test cases are part of a test runner, the test runner\
    \ calls the test case methods in a specific timing, suitable for testing.\n\n\
    ### Class Method setUp()\n\nWhen a new test class starts its run (it’s more accurate\
    \ to say that we are “adding the test case to the test runner”), the first method\
    \ to be called is the `setUp()` method in the class level. You don’t have to override\
    \ it, of course, but this method is called once for all the tests in the class.\
    \ `setUp()` method is the place for you to do some initial setup for your tests,\
    \ such as creating a database or setting up a mock server:\n\n```\noverride class\
    \ func setUp() {\n    super.setUp()\n    // runs once before all the tests begin\n\
    }\n```"
  raw: '#### Adding a New XCTestCase Subclass


    To add a new test case, go to File ➤ New ➤ File and select “Unit Test Case Class”
    (see Figure [3-1](#496602_1_En_3_Chapter.xhtml#Fig1)).


    ![../images/496602_1_En_3_Chapter/496602_1_En_3_Fig1_HTML.jpg](images/496602_1_En_3_Chapter/496602_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Adding new Unit Test Case Class


    After tapping “Next”, give a name for the test class and choose its location in
    your project just like any other file.


    Notice that, in the last step, you need to choose the test target this test class
    belongs to (Figure [3-2](#496602_1_En_3_Chapter.xhtml#Fig2)) – this is extremely
    important since test classes cannot be part of your executable target.


    ![../images/496602_1_En_3_Chapter/496602_1_En_3_Fig2_HTML.jpg](images/496602_1_En_3_Chapter/496602_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Selecting a target for your test class


    ### Our First Test Class


    Congratulations, it’s a test class!


    Look at how our new test class looks like:


    ```

    import XCTest // 1

    class DemoTests: XCTestCase { // 2

    override func setUpWithError() throws { // 3

    // Put setup code here. This method is called before the invocation of each test
    method in the class.

    }

    override func tearDownWithError() throws { // 4

    // Put teardown code here. This method is called after the invocation of each
    test method in the class .

    }

    func testExample() throws { // 5

    // This is an example of a functional test case.

    // Use XCTAssert and related functions to verify your tests produce the correct
    results.

    }

    func testPerformanceExample() throws { // 6

    // This is an example of a performance test case.

    self.measure {

    // Put the code you want to measure the time of here.

    }

    }

    }

    ```


    Let’s go over it together:


    1.  **import XCTest** – In order to subclass XCTestCase and add it to the test
    runner, we need to import the XCTest framework just like any other framework we
    want to use.


    2.  **class DemoTests: XCTestCase** – Always make sure you are subclassing from
    XCTestCase.


    3.  **setUpWithError()**  – This method runs **before** every test method execution.
    It will be explained later in this chapter.


    4.  **tearDownWithError()**  – This method runs **after** every test method execution.
    It also will be explained later in this chapter.


    5.  **testExample()** – This is our first unit test example. Currently, it’s empty.


    6.  **testPerformanceExample()** – This is a performance test example. It will
    be explained later in this book.


    ### Enable Testability


    Before we move on and add more tests, we need to make sure everything is linked
    up correctly in our project.


    Your test code is *not* part of your executable. It’s a different module in your
    Xcode project, and for your tests to have access to your app code, you need to
    take care of access privileges.


    But don’t worry; there is a fairly simple flag to help you with the access privileges
    problem, and it’s called “Enable Testability”.


    When you go to your executable target, under “Build Settings”, search for “Enable
    Testability”. Setting this flag to “YES” gives your test targets access to code.
    Take a look at Figure [3-3](#496602_1_En_3_Chapter.xhtml#Fig3).


    ![../images/496602_1_En_3_Chapter/496602_1_En_3_Fig3_HTML.jpg](images/496602_1_En_3_Chapter/496602_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Set "Enable Testability" to YES


    One thing we notice here is that this flag is set to NO in release configuration.
    One reason for that is that we do not need access to the executable code since
    we usually don’t test our app in release configuration. The more important reason
    for that is that this option prevents code optimization, which is used in release
    configuration and is not suitable for your tests and for debugging.


    ### @testable


    So now after we took care of the settings in the executable side, we need to import
    the executable target to the test class.


    On the top of the file, just above the class declaration, we add a new attribute
    called “@testable”:


    ```

    import XCTest

    @testable import My_Weather_App

    class My_Weather_AppTests: XCTestCase {

    // testing code

    }

    ```


    What @testable does and why do we need it? First, lets recall the five access
    levels in Swift:


    *   **Public** – Anyone can access within the module and in external code that
    imports the module.


    *   **Open** – It is same as **Public,** but it is possible to subclass it from
    any module and not just the original class module.


    *   **Internal** – Access is prohibited outside the module. The internal access
    level is the **default** level for classes and methods.


    *   **Fileprivate** – Access is only from the current file.


    *   **Private** – Access is only from the same class or struct.


    If you notice, the default access for classes and methods is **internal**. Because
    Unit Tests require full access to your code outside the module, we may have a
    problem here assuming your access level for most classes and methods is set to
    the default one.


    What @testable does is to elevate access levels in the imported module. Members
    marked as **Public** now behave as **Open,** and members marked as **Internal**
    behave as **Public**.


    Note


    There are some discussions in the Swift developers’ community about @testable.
    Some claim @testable attribute is a “hack” who tries to overcome the access level
    issue in testing. Those who claim that, say that since it’s a “hack,” why not
    give private and fileprivate public access level as well?


    ### CocoaPods and Testing Targets


    Many projects today use Dependency Manager to integrate with external libraries
    and frameworks. One of the most popular managers is CocoaPods with over 72,000
    libraries, and it’s used in more than three million apps.


    One of the tasks CocoaPods does when linking a new framework is to update the
    *header search path* according to the new integrated frameworks.


    If you want to use those libraries directly in your test target, you need to add
    your test target to the Podfile file, like this:


    ```

    target "My_Weather_AppTests" do

    inherit! :search_paths

    pod ''Fabric'', ''1.10.2''

    pod ''Firebase''

    end

    ```


    Adding pods to the test target is something developers usually forget during test
    writing, so the key to remember that is to treat the test target as a separate
    app. Everything you want to use, you need to link it to your test target, just
    as you would do in your executable target.


    ### XCTestCase Life Cycle


    XCTestCase life cycle is a little bit different than what you would expect in
    standard Swift classes. Because test cases are part of a test runner, the test
    runner calls the test case methods in a specific timing, suitable for testing.


    #### Class Method setUp()


    When a new test class starts its run (it’s more accurate to say that we are “adding
    the test case to the test runner”), the first method to be called is the setup()
    method in the class level. You don’t have to override it, of course, but this
    method is called once for all the tests in the class. setup() method is the place
    for you to do some initial setup for your tests, such as creating a database or
    setting up a mock server:


    ```

    override class func setUp() {

    super.setUp()

    // runs once before all the tests begin

    }

    ```'
