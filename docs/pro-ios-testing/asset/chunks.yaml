    点击“下一步”后，为测试类命名，并像处理任何其他文件一样选择其在项目中的位置。\n\n请注意，在最后一步，您需要选择此测试类所属的测试目标——这**极其重要**，因为测试类不能成为您可执行目标的一部分。\n\
    \n## 我们的第一个测试类\n\n恭喜，一个测试类诞生了！\n\n来看看我们新建的测试类长什么样：\n\n```\nimport XCTest // 1\n\
    class DemoTests: XCTestCase { // 2\n    override func setUpWithError() throws\
    \ { // 3\n        // 在此处放入设置代码。此方法会在调用类中的每个测试方法之前被调用。\n    }\n    override func\
    \ tearDownWithError() throws { // 4\n        // 在此处放入清理代码。此方法会在调用类中的每个测试方法之后被调用。\n\
    \    }\n    func testExample() throws { // 5\n        // 这是一个功能测试用例示例。\n     \
    \   // 使用 XCTAssert 及相关函数来验证您的测试是否产生了正确结果。\n    }\n    func testPerformanceExample()\
    \ throws { // 6\n        // 这是一个性能测试用例示例。\n        self.measure {\n          \
    \  // 在此处放入您想要测量时间的代码。\n        }\n    }\n}\n```\n\n让我们一起来过一遍：\n\n1.  `import\
    \ XCTest` – 为了能够继承 `XCTestCase` 并将其添加到测试运行器中，我们需要像导入其他任何想使用的框架一样导入 `XCTest` 框架。\n\
    2.  `class DemoTests: XCTestCase` – 务必确保您是继承自 `XCTestCase`。\n3.  `setUpWithError()`\
    \ – 此方法在**每个**测试方法执行**之前**运行。本章后续会进行解释。\n4.  `tearDownWithError()` – 此方法在**每个**测试方法执行**之后**运行。同样会在本章后续解释。\n\
    5.  `testExample()` – 这是我们的第一个单元测试示例。目前是空的。\n6.  `testPerformanceExample()` –\
    \ 这是一个性能测试示例。本书后续会进行解释。\n\n## 启用可测试性\n\n在我们继续添加更多测试之前，需要确保项目中的所有内容都已正确链接。\n\n\
    您的测试代码并*不*属于可执行文件的一部分。它是您 Xcode 项目中的一个不同模块，为了让您的测试能够访问应用代码，您需要处理好访问权限问题。\n\n但别担心；有一个相当简单的标记可以帮助您解决访问权限问题，它叫做“启用可测试性”。\n\
    \n当您进入可执行目标，在“构建设置”下搜索“启用可测试性”。将此标记设置为“是”，您的测试目标就能访问代码了。\n\n这里我们注意到，此标记在发布配置中默认设置为\
    \ `NO`。原因之一是我们通常不会在发布配置中测试应用，因此不需要访问可执行代码。更重要的原因是，此选项会阻止代码优化，而代码优化在发布配置中使用，并不适合您的测试和调试。\n\
    \n### @testable\n\n那么现在，我们在可执行目标端处理好设置之后，需要将可执行目标导入到测试类中。\n\n在文件的顶部，类声明之上，我们添加一个名为\
    \ `@testable` 的新属性：\n\n```\nimport XCTest\n@testable import My_Weather_App\nclass\
    \ My_Weather_AppTests: XCTestCase {\n    // 测试代码\n}\n```\n\n`@testable` 的作用是什么？我们为什么需要它？首先，让我们回忆一下\
    \ Swift 中的五个访问级别：\n\n*   **Public（公开）** – 模块内部以及导入该模块的外部代码均可访问。\n*   **Open（开放）**\
    \ – 与**公开**相同，但可以从任何模块（而不仅仅是原始类所在的模块）进行子类化。\n*   **Internal（内部）** – 模块外部禁止访问。内部访问级别是类和方法的**默认**级别。\n\
    *   **Fileprivate（文件私有）** – 仅限当前文件内部访问。\n*   **Private（私有）** – 仅限同一类或结构体内部访问。\n\
    \n如果您注意到，类和方法的默认访问级别是**内部**。由于单元测试需要在模块外部完全访问您的代码，如果您的多数类和方法访问级别设置为默认值，我们可能会遇到问题。\n\
    \n`@testable` 的作用是提升导入模块中的访问级别。标记为 **Public** 的成员现在表现为 **Open**，而标记为 **Internal**\
    \ 的成员则表现为 **Public**。\n\n> **注意：** 在 Swift 开发者社区中，有一些关于 `@testable` 的讨论。一些人声称\
    \ `@testable` 属性是一个试图克服测试中访问级别问题的“hack”。持此观点的人认为，既然这是一个“hack”，为什么不也把 `private`\
    \ 和 `fileprivate` 的访问级别提升为公开呢？\n\n### CocoaPods 与测试目标\n\n如今许多项目使用依赖管理器来集成外部库和框架。最流行的管理器之一是\
    \ CocoaPods，它拥有超过 72,000 个库，被用于超过三百万个应用。\n\nCocoaPods 在链接新框架时的任务之一，是根据新集成的框架更新\
    \ *头文件搜索路径*。\n\n如果您想在测试目标中直接使用这些库，您需要将测试目标添加到 `Podfile` 文件中，像这样：\n\n```\ntarget\
    \ \"My_Weather_AppTests\" do\n  inherit! :search_paths\n  pod 'Fabric', '1.10.2'\n\
    \  pod 'Firebase'\nend\n```\n\n将 Pod 添加到测试目标是开发人员在编写测试时经常忘记的事情，所以记住这一点的关键在于，将测试目标视为一个独立的应用。您想使用的任何东西，都需要像在可执行目标中那样，将其链接到您的测试目标。\n\
    \n## XCTestCase 生命周期\n\n`XCTestCase` 的生命周期与您在标准 Swift 类中的预期略有不同。因为测试用例是测试运行器的一部分，测试运行器会按照适合测试的特定时机来调用测试用例方法。\n\
    \n### 类方法 setUp()\n\n当一个新测试类开始运行（更准确地说，是将测试用例“添加到测试运行器”）时，第一个被调用的方法是类级别的 `setUp()`\
    \ 方法。您当然不必重写它，但此方法会为该类中的所有测试**调用一次**。`setUp()` 方法是您为测试进行一些初始设置的地方，例如创建数据库或设置模拟服务器：\n\
    \n```\noverride class func setUp() {\n    super.setUp()\n    // 在所有测试开始前运行一次\n\
    }\n```\n"
- fmt: "# `setUpWithError()` throw\n\n在类方法 `setup()` 之后，XCTest 会定位类中所有以“test”开头且没有参数的方法。\n\
    \n对于每一个这样的测试方法，XCTest 会在运行测试方法本身之前调用 `setUpWithError()` 函数。这是你准备任何实例变量的地方，而不是在每个测试方法中重复这些步骤。\n\
    \n此外，在每个 `setUpWithError()` 调用之后，还会调用实例方法 `setup()`。\n\n你可能会注意到 `setUpWithError()`\
    \ 方法是一个 throwing 方法。这是 Xcode 11.4 中一个受欢迎的改进，因为在此方法中执行的很多代码都是 throwing 代码，例如：\n\
    \n```\noverride func setUpWithError() throws {\n    networkResponse = try buildResponseFromJSON(filename:\
    \ \"response.json\")\n}\n```\n\n如果 `setUpWithError()` 抛出异常，则意味着紧随其后的测试也会失败。\n\n\
    # 测试方法\n\n在设置好测试的初始状态后，XCTest 运行测试方法并在需要时进行断言。XCTest 认为一个方法是测试方法，需满足以下所有条件：\n\n\
    *   它属于 `XCTestCase` 的子类。\n*   它的名称以“test”开头。\n*   该方法没有任何参数。\n\n如果测试方法没有失败的断言或崩溃，则视为通过。我们将在本章后面讨论如何编写测试方法。\n\
    \n# 拆解块\n\n如果你的测试方法更改了某些状态或产生了你想要清理的特定副作用，你可以在测试结束时添加一个拆解块：\n\n```\nfunc testExample()\
    \ throws {\n    // 创建临时文件\n    addTeardownBlock {\n        // 移除临时文件\n    }\n\
    }\n```\n\n你可以添加任意多个拆解块，并且它明确只针对此函数内所做的更改。要创建在每个方法之后运行的拆解代码，你需要重写 `tearDownWithError()`\
    \ 方法。\n\n# `tearDownWithError()` throw\n\n`tearDownWithError` 方法在每个测试方法之后运行，无论其失败还是通过。我们使用此方法来清理测试方法可能引起的任何副作用，在大多数情况下，它应该是\
    \ `setUpWithError()` 方法的逆函数。\n\n例如，如果你在 `setUpWithError()` 中打开了到 SQLite 的连接，那么就在这里关闭它：\n\
    \n```\noverride func tearDownWithError() throws {\n    try super.tearDownWithError()\n\
    \    // 清理由 `setUpWithError()` 引起的任何副作用\n}\n```\n\n就像 `setUpWithError()` 和 `setup()`\
    \ 一样，`tearDownWithError()` 在 `tearDown()` 之前被调用。它们都是有效的，因此你可以在项目中使用它们。\n\n# 类方法\
    \ `tearDown()`\n\n类方法 `tearDown()` 是类方法 `setup()` 对应的结束函数。它在所有测试结束时运行，用于清理你在测试开始运行之前所做的任何设置代码：\n\
    \n```\noverride class func tearDown() {\n    super.tearDown()\n    // 在类中所有测试结束时运行，用于清理类方法\
    \ `setup()` 可能引起的任何副作用。\n}\n```\n\n# 如何协同工作\n\n感到困惑？嗯，这听起来很正常。但是为测试设置初始状态并在之后清理它是实现测试运行稳定性的关键步骤。\n\
    \n因此，我创建了图 [3-4](#496602_1_En_3_Chapter.xhtml#Fig4) 来展示其概览。\n\n![../images/496602_1_En_3_Chapter/496602_1_En_3_Fig4_HTML.jpg](images/496602_1_En_3_Chapter/496602_1_En_3_Fig4_HTML.jpg)\n\
    \n图 3-4 XCTestCase 生命周期\n\n# XCTest 为每个测试方法创建一个 XCTestCase 实例\n\n有些人可能认为，在测试用例类开始执行之前，XCTest\
    \ 会创建该类的一个实例，并逐个运行所有测试。虽然这在标准类中是合理的，但在 XCTest 类中并非如此。\n\n当 Xcode 启动其测试套件时，它实际上会**为每个测试方法**创建一个\
    \ `XCTestCase` 实例，并将其添加到其测试运行器队列中，甚至在测试执行开始**之前**。\n\n假设你有一个名为 `LoginTests` 的测试类，其中包含四个不同的测试方法。当测试运行开始时，XCTest\
    \ 会创建四个 `LoginTests` 类的实例，每个测试方法一个，并将它们添加到测试运行器中。这四个实例会在运行结束时，在所有其他测试完成执行之后才被释放。\n\
    \n这一点很重要，因为它可以让你了解在测试运行执行期间状态是如何管理的。例如，你不能在不同的测试方法之间共享实例变量值，因为每个测试方法都有自己的类实例。\n\
    \n关于内存管理，你需要记住的是，在测试运行结束之前，没有一个类实例会被释放。这意味着你需要注意在 `setup` 和 `tearDown` 方法中做什么，并确保释放和重置可能影响其他测试方法的任何数据。\n\
    \n# 编写单元测试\n\n正如我之前所说，单元测试不仅运行速度快，而且也需要快速编写。但别担心，你不必在这里重新发明轮子——编写单元测试有特定的模式和结构。如果你能保持一个固定的模式，它们不仅容易编写，而且可读性高。\n\
    \n## 单元测试结构\n\n请看以下代码：\n\n```\nfunc testGetSpeedLimit_private_expect110() {\n\
    \    // arrange\n    car.type = .private\n    // act\n    let speedLimit = car.getSpeedLimit()\n\
    \    // assert\n    XCTAssertEqual(speedLimit, 110)\n}\n```\n\n如你所见，在单元测试中，我们有三个步骤：**A**rrange、**A**ct、**A**ssert，简称\
    \ AAA。我们也可以称之为 GWT (**G**iven-**W**hen-**T**hen)。一些开发者偏爱 AAA，因为它的术语更接近代码层面；而另一些则偏爱\
    \ GWT，以便于与业务层面沟通。\n\n但归根结底，这并不重要。其核心思想是一致的：\n\n*   **Arrange/Given** – 在此处进行测试的所有准备工作。连接依赖项、设置属性、分配变量。记住我们学过的生命周期。如果是你在每个测试方法中都会做的事情，请考虑将其移到\
    \ `setup()` 方法中，以避免代码重复。\n*   **Act/When** – 这是执行你想要测试的函数的地方。在这个阶段，最佳实践是将你想要根据需求验证的值保存在一个局部变量中。\n\
    *   **Assert/Then** – 最后的设置是测试的实际验证。在此步骤中，你通常通过断言（我们稍后会讨论）来检查测试是否满足期望。\n\n将你的测试方法分为三个步骤，可以使你的测试代码更具可读性，也更容易理解。"
  raw: '#### Method setUpWithError () throw


    After class method setup(), XCTest locates all the methods in the class that start
    with “test” **and** don’t have any arguments.


    For each one of those methods, XCTest calls setUpWithError() function before it
    runs the test method itself. This is the place where you can prepare any instance
    variables you have instead of duplicating those steps in every test method.


    Also, an instance method setup() is called after each setUpWithError() call.


    You might notice that setUpWithError() method is a throwing method. This is a
    welcome addition in Xcode 11.4, since a lot of code that is done at this method
    is a throwing code, for example:


    ```

    override func setUpWithError() throws {

    networkResponse = try buildResponseFromJSON(filename : "response.json")

    }

    ```


    If setUpWithError() throws, it means that the test that follows it will fail as
    well.


    #### Test Methods


    After setting up the state for the test, XCTest runs the test method and asserts
    if needed. XCTest considers a method to be a test method if all the following
    conditions exist:


    *   It belongs to a subclass of XCTestCase.


    *   Its name starts with “test”.


    *   The method doesn’t have any arguments.


    A test method passes if it doesn’t have any failed assertions or crashes. We’ll
    talk about how to write test methods later in this chapter.


    #### Teardown Block


    If your test method changes some state or has a specific side effect you want
    to clean up, you can add a teardown block that runs at the end of the test:


    ```

    func testExample() throws {

    // creating a temporary file

    addTeardownBlock {

    // removing the temporary file

    }

    }

    ```


    You can add as many teardown blocks as you want, and it’s explicit for changes
    made at this function only. To create a teardown code that runs after each method,
    you need to override the **tearDownWithError()** method .


    #### Method tearDownWithError() throw


    tearDownWithError method runs after each test method whether it failed or passed.
    We use this method to clean up any side effect your test method might have caused,
    and in most cases, it should be the inverse function of setUpWithError() method.


    For example, if you opened up a connection to SQLite in setUpWithError(), this
    is the place to close it:


    ```

    override func tearDownWithError() throws {

    try super.tearDownWithError()

    // clean up any side effects caused by setupWithError()

    }

    ```


    Just like setUpWithError() and setup(), tearDownWithError() is called before “tearDown()”.
    They are both valid so that you can use them in your projects.


    #### Class Method tearDown()


    Class method tearDown() is the parallel closing function of the class method “setup()”.
    It runs at the end of all tests and is used to clean up any setup code you did
    before the tests started to run:


    ```

    override class func tearDown() {

    super.tearDown()

    // runs at the end of all tests in the class, and is used to clean up any side
    effect the class method setup() might have caused.

    }

    ```


    #### How It All Fits Together


    Confused? Well, that sounds normal. But setting up the initial state for a test
    and cleaning it up afterward are crucial steps to achieve stability in your test
    run.


    This is why I created Figure [3-4](#496602_1_En_3_Chapter.xhtml#Fig4) to show
    you how it looks from above.


    ![../images/496602_1_En_3_Chapter/496602_1_En_3_Fig4_HTML.jpg](images/496602_1_En_3_Chapter/496602_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    XCTestCase life cycle


    #### XCTest Creates an XCTestCase Instance for Every Test Method


    Some may think that before a test case class starts its execution, XCTest creates
    an instance of this class and just runs all the tests one by one. While that makes
    sense in standard classes, this is not the case in XCTest classes.


    When Xcode starts its test suite, it actually creates an XCTestCase instance **for
    every test method** and adds it to its test runner queue **before** the test execution
    even begins.


    Let’s say you have a test class named “LoginTests” with four different test methods.
    When the test run begins, XCTest creates four instances of LoginTests class, one
    for each test method, and adds them to the test runner. Those four instances get
    deallocated at the end of the run, only after all the other tests finished their
    execution.


    And this is important because it can give you a sense about how states are managed
    during the test run execution. For example, you cannot share an instance variable
    value across different test methods, since each one of those methods has its own
    class instance.


    And regarding memory management, you need to remember that none of the class instances
    get deallocated until the end of the test run. This means you need to pay attention
    to what you are doing in the setup and tearDown methods and make sure to release
    and reset any data that can affect other test methods.


    ## Writing Unit Tests


    As I said before, not only unit tests are fast to run, but they also need to be
    written fast. But don’t worry; you don’t have to invent the wheel here – there
    are particular pattern and structure on how to write unit tests. If you’ll keep
    a constant pattern, not only will they be easy to write but also readable.


    ### Unit Test Anatomy


    Take a look at the following code:


    ```

    func testGetSpeedLimit_private_expect110() {

    // arrange

    car.type = .private

    // act

    let speedLimit = car.getSpeedLimit()

    // assert

    XCTAssertEqual(speedLimit, 110)

    }

    ```


    As you can see, in a unit test, we have three steps **A**rrange, **A**ct , **A**ssert,
    or in short AAA. We can also call it GWT (**G**iven-**W**hen-**T**hen ). Some
    developers prefer AAA since its terminology is closer to the code level, and some
    prefer GWT for easier communication with the business level.


    But in the bottom line, it doesn’t matter. The idea stays the same:


    *   **Arrange/Given** – Do all the setup for the test here. Connect dependencies,
    set properties, and allocate variables. Remember what we learned about the life
    cycle. If it’s something you do in every test method, consider moving it to the
    setup() method to save yourself code duplication.


    *   **Act/When** – This is the place when you execute the function you want to
    test. In this stage, it is best practice to save the value you want to verify
    against your requirements in a local variable.


    *   **Assert/Then** – The final setup is the actual validation of the test. In
    this step, you check if the test fulfills the expectation, generally by asserting
    (we will discuss it later).


    Separating your test method into three steps makes your testing code much more
    readable and easier to understand.'
