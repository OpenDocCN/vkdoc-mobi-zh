  trans: "\n# 环境变量\n\n与许多其他开发环境类似，iOS 也有类似的功能，称为“环境变量”。环境变量是键值对的集合，它不仅让你能够通过参数列表来配置应用，还可以通过具体的值来配置。\n\
    \n添加环境变量就像添加参数一样简单。点击变量列表下方的加号按钮，然后添加一个新变量（参见图 2-15）。\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig15_HTML.jpg](img/496602_1_En_2_Fig15_HTML.jpg)\n\
    \n图 2-15 向方案添加新的环境变量\n\n```\nfunc application(_ application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\nlet printInfoLogs\
    \ = ProcessInfo.processInfo.environment[\"PRINT_INFO_LOGS\"]\nreturn true\n}\n\
    ```\n\n添加环境变量也是一种配置 UI 测试的好方法，它可以让你每次用不同的参数动态启动应用。UI 测试将在本书后续章节中进行介绍。\n\n## 选项选项卡\n\
    \n选项选项卡包含与你的测试相关的各种设置（参见图 2-16）。\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig17_HTML.jpg](img/496602_1_En_2_Fig17_HTML.jpg)\n\
    \n图 2-17 应用语言设置\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig16_HTML.jpg](img/496602_1_En_2_Fig16_HTML.jpg)\n\
    \n图 2-16 方案编辑器中的选项选项卡\n\n让我们逐一看看这些设置：\n\n*   **应用语言** – 移动开发的最大挑战之一是本地化——LTR（从左到右）与\
    \ RTL（从右到左）以及包含长词和短语的语言。使用此选项，你不仅可以设置设备语言，还可以模拟不同的文本方向，甚至可以将文本长度加倍以检测 UI 布局问题。\n\
    *   **应用区域** – 不同的区域意味着不同的日期格式、不同的货币和不同的计量系统。通过选择应用区域，你可以模拟设备处于另一个区域来测试你的应用。\n\
    \n    **注意** 虽然设置不同的语言和区域来测试功能很方便，但有时当你想为不同区域多次运行单元测试时，这可能不太容易。在本书后续章节中，我将介绍如何无需依赖方案选项，而是通过优秀且可测试的架构来实现这一点。\n\
    *   **UI 测试** – 与单元测试和集成测试不同，找出 UI 测试失败的原因可能有点棘手。截图和附件是显示失败原因和当时应用状态的最佳方式。UI 测试选项可以让你配置测试如何处理附件和截图。\n\
    *   **代码覆盖率** – 我们在第 1 章讨论过代码覆盖率。如果不勾选此选项，`Xcode` 将在测试期间不会收集代码覆盖率数据。\n\n## 诊断选项卡\n\
    \n诊断选项卡与“运行”下的诊断选项卡几乎相同。此选项卡包含的工具可以帮助你在运行测试时确定应用的问题，例如内存损坏和线程问题（参见图 2-19）。\n\n\
    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig28_HTML.jpg](img/496602_1_En_2_Fig28_HTML.jpg)\n\
    \n图 2-28 仅运行英语配置\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig27_HTML.jpg](img/496602_1_En_2_Fig27_HTML.jpg)\n\
    \n图 2-27 方案、测试计划、测试和配置如何链接在一起\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig26_HTML.jpg](img/496602_1_En_2_Fig26_HTML.jpg)\n\
    \n图 2-26 测试计划配置\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig25_HTML.jpg](img/496602_1_En_2_Fig25_HTML.jpg)\n\
    \n图 2-25 测试计划编辑屏幕\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig24_HTML.jpg](img/496602_1_En_2_Fig24_HTML.jpg)\n\
    \n图 2-24 转换方案使其测试使用测试计划\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig23_HTML.jpg](img/496602_1_En_2_Fig23_HTML.jpg)\n\
    \n图 2-23 转换方案以使用测试计划\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig22_HTML.jpg](img/496602_1_En_2_Fig22_HTML.jpg)\n\
    \n图 2-22 方案编辑器，“转换为使用测试计划…”按钮\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig21_HTML.jpg](img/496602_1_En_2_Fig21_HTML.jpg)\n\
    \n图 2-21.\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig20_HTML.jpg](img/496602_1_En_2_Fig20_HTML.jpg)\n\
    \n图 2-20 从方案编辑器禁用特定测试\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig19_HTML.jpg](img/496602_1_En_2_Fig19_HTML.jpg)\n\
    \n图 2-19 方案编辑器中的诊断选项卡\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig18_HTML.jpg](img/496602_1_En_2_Fig18_HTML.jpg)\n\
    \n图 2-18 应用语言和应用区域设置\n\n由于这些工具并非专门与测试相关，我将简要介绍它们。\n\n如果你想更好地调查问题，我建议你深入学习这些工具。\n\
    \n*   **地址消毒器** – 这个工具在 `Xcode 7` 中引入，可以帮助你调试应用的内存损坏问题。这些问题不一定只是崩溃——也可能是一般的错误。地址消毒器与单元测试的结合在处理棘手错误时非常有益，但你应该注意这个工具的两个缺点：\n\
    \    *   `Address Sanitizer` 对于 C 和 `Objective-C` 代码比对于 `Swift` 代码更相关。\n    *\
    \   `Address Sanitizer` 有性能开销——启用时，你的应用会消耗 2 到 3 倍的内存以及 2 到 5 倍的 CPU 性能。虽然在运行测试时这可能看起来不是大问题，但在运行性能测试并测量关键指标（如\
    \ CPU 时间和内存）时，这可能是个问题。\n*   **线程消毒器** – `Thread Sanitizer` 是另一个基于 LLVM 的工具，可以帮助你检测线程间的数据竞争，这可能导致不可预测的行为。与\
    \ `Address Sanitizer` 类似，`Thread Sanitizer` 也有开销——内存使用量增加 5 到 10 倍，CPU 性能增加 2\
    \ 到 20 倍。此外，你无法在真机上运行 `Thread Sanitizer`，只能在模拟器上运行。\n*   **主线程检查器** – 每个开发者开始\
    \ iOS 开发时学到的首要规则之一就是永远不要在后台运行 UI 操作，只能在主线程上运行。`Main Thread Checker` 会在检测到在任何后台线程执行\
    \ UI 操作时暂停你的应用。在 UI 测试中，这非常有用，因为你完整运行应用并确信所有操作都在正确的线程上执行。\n*   **Malloc 涂写** –\
    \ 通过在释放的内存中填入预定义的值，帮助你调试引用计数循环，从而在内存图中获得更准确的结果。\n*   **Malloc 保护边缘** – 在大内存分配前后添加保护页。\n\
    *   **保护性 Malloc** – 帮助你捕获常见的内存问题，如缓冲区溢出和释放后使用。\n*   **僵尸对象** – `Xcode` 提供的最受欢迎的工具之一。`Zombie\
    \ Objects` 是被释放（引用计数为 0）并被僵尸对象替代的对象。`Zombie Objects` 可以通过在内存中保留变量的副本，帮助你跟踪变量。\n"
- fmt: '## Exclude Test Classes


    You might be wondering, “There’s a whole chapter describing the importance of
    tests. Why on earth we want to exclude some of them from our test bundles?”


    Well, in big, old projects, there are situations where tests may fail or even
    are not compiled because of a massive structural change, and we wish to disable
    them from running temporarily.


    Xcode lets you not only disable test bundles in your scheme settings but also
    disable specific test classes and even test functions.


    There are three ways of doing that – from scheme editor, from the Test Navigator,
    and by renaming test functions.


    ### Disable Tests from the Scheme Editor


    If you want to disable a test in a specific scheme, unchecking it from the scheme
    editor is one way of doing that. Open the scheme editor, and under `Test` ➤ `Info`,
    expand the test bundle in the list of test bundles.


    Remember, the disabling test only disables it from the specific scheme, so make
    sure you are doing this operation on the desired scheme.


    Also, you can disable the whole class by unchecking the checkbox near the class
    name or disable the whole test bundle by unchecking the checkbox near the test
    bundle name.


    ### Disable Tests from the Test Navigator


    Maybe the easiest way to disable a test is from the Test Navigator or the code
    editor.


    From the Navigator pane, open the Test Navigator by selecting it or pressing `⌘-6`.


    Search the test you want to disable and right-click it.


    Select `“Disable <name of the test>”` from the popup menu. Disabling can be done
    for classes and test bundles as well. In case the test is already disabled, you
    can re-enable it again from the same menu.


    This approach also works from the code editor – right-click the function of the
    class you want to disable and choose `“Disable <name of the function>”`.


    ### Disable Tests by Renaming Them


    Another way to disable tests is by renaming them with some prefix other than `“test”`.
    Since Xcode runs only test functions that start with `“test”`, changing the prefix
    disables them.


    ```

    func testLogin() {

    // test code

    }

    func testLogout() {

    // test code

    }

    func disable_due_refactor_testOldScreen() {

    // test code

    }

    ```


    In the preceding example, Xcode ignores the third function since we changed its
    prefix.


    In general, renaming test functions is considered to be an anti-pattern, and you
    should follow the natural way of disabling the tests using the scheme editor or
    the Test Navigator. The renaming test function does have one advantage, though
    – you can set a different prefix for a different reason and then relocate them
    by searching their prefix. Renaming a function name is a convenient way when you’re
    doing a big refactor and want to disable tests by categories.


    > It would be best if you never left disabled tests forever. Having disabled tests
    should be a temporary situation only; it exists only to let our project compile.
    Those tests are there for a reason; remember that.


    ## How Many Test Bundles to Create?


    The number of test bundles changed from project to project, but if I have to choose
    one rule of thumb, I would say it’s a separation of concerns. If you remember
    from the first chapter, there are several types of tests: UI tests; unit tests,
    which include BDD and TDD; integration tests, and performance tests. Unit tests
    can be used both for BDD, TDD, Integration, and performance. UI Tests can be used
    for BDD. But it’s a best practice to separate your test bundles according to your
    company flows. For example, if you have a significant new feature in development,
    you can create a test bundle for it, and it will be easier to run it only when
    needed.


    Here are some ideas on how to separate your tests:


    *   Separate BDD from TDD.

    *   Separate regression tests from sanity and feature testing.

    *   Separate significant features from the others.


    Separating your project to different test bundles can give you necessary flexibility
    in the future and can help maintain your test’s infrastructure and control it.


    ## Test Plans


    We saw that schemes are great tools to configure your test runs. Now let’s say
    you want to run your tests several times with a different configuration each time.
    Different configurations mean you need to either create different schemes and
    run them one by one or change your current test scheme configuration each time
    before you run it.


    Fortunately, Apple introduced a new feature in Xcode 11 called `“Test Plans”`
    which aims to solve exactly that – running the same test suite multiple times
    but with a different configuration.


    ### Test Plans to Make Your Life Easier


    Test Plans take the power of the test run customization in Xcode to the next level
    by giving you the flexibility to run your tests with different settings multiple
    times. Each Test Plan can test different issues that you may have in your app.
    Maybe the most common problem developers have with their apps is localization
    – you can create a test plan dedicated to localization and run the same tests
    over and over again but with different languages and regions.


    The same goes for almost every option you currently have in your scheme editor.


    ### Create Your First Test Plan


    The easiest way to start with the Test Plan’s feature is right from the scheme
    editor. Go to your scheme editor, and in the Test action, you can find a button
    called `“Convert to user Test Plans…”` under the list of your test bundles.


    After tapping the button, you’ll have a dialog when you need to choose how to
    convert your new scheme to use test plans instead.


    Let’s talk about those three options:


    *   `Create Test Plan from Scheme` – This option creates a Test Plan based on
    the current scheme configuration. After all, the test plan configuration is similar
    to the scheme test configuration, and it’s easy to create a new test plan with
    the old options. `“Creating Test Plan from Scheme”` is the recommended option
    for the first test plan of your project.

    *   `Create Empty Test Plan` – Creates a new test plan template regarding the
    scheme test configuration.

    *   `Choose Test Plan` – Add an existing test plan to the scheme. It can be a
    test plan you created from scratch (Test Plan is an XML file; you can create it
    with any text editor), but in most cases, this option comes in handy when you
    create a new scheme and want to connect it to an existing test plan from another
    scheme.


    After creating the test plan, it is saved to your project, and the Xcode upgrades
    the scheme to use Test Plans instead of the old `Info/Arguments/Options/Diagnostics`
    screen we covered earlier.


    Scheme can contain multiple test plans. In each test plan, you can see how many
    test targets it runs and how many different configurations it has.


    When you select `“Test”` for this scheme (`Command + U`), the test plan, which
    is marked as default, runs according to its configuration.'
