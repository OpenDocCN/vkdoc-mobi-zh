    # 将一切关联起来


    在本章的开头，我提到了“方案”这个术语。方案允许您为不同类型的场景定义所有的构建配置和选项。您可以拥有多个方案，帮助您为应用配置不同的场景和状态。例如，您可以有一个用于开发环境的方案，或者一个使用优化代码运行性能测试的方案。


    当您查看 Xcode 窗口左上角，“停止”按钮旁边时，可以看到方案菜单和选中的方案。


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig6_HTML.jpg](img/496602_1_En_2_Fig6_HTML.jpg)


    工具栏中的方案弹出菜单


    点击方案名称，然后从弹出菜单中选择“编辑方案”。会弹出一个包含可用操作列表及其配置的窗口。


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig7_HTML.jpg](img/496602_1_En_2_Fig7_HTML.jpg)


    方案编辑窗口


    我们来逐一了解这些操作：


    *   **构建** – 编译您的应用但不运行它。

    *   **运行** – 构建您的应用并在模拟器或设备上运行。

    *   **测试** – 构建您的应用并运行方案中定义的已启用测试。

    *   **性能剖析** – 运行您的应用，并使用 Instruments 进行性能剖析。

    *   **分析** – 构建应用，并提供关于代码的深入洞察。

    *   **归档** – 构建您的应用并从中创建 IPA 文件以提交到 App Store。


    在本章中，我将重点关注“测试”操作。点击“测试”操作会显示四个标签页：**信息**、**参数**、**选项**和**诊断**。


    ## 信息标签页


    **信息** – “信息”标签页包含方案中测试操作的一般信息。这里最重要的两个设置是**构建配置**和**测试列表**。


    在`构建配置`中，您可以定义测试是在`调试`、`发布`还是自定义构建配置下运行。在某些情况下，这很重要 – 例如，有时您可能希望针对 App Store 的优化代码运行测试，或者有时您希望使用某些标志运行测试。


    在测试列表中，您可以看到与该方案中可执行产品相关的所有测试。请记住，您可以创建任意数量的测试，但正是在这里，您定义了当您使用此方案测试应用时，**执行哪些**测试。


    列表中每个测试旁边都有一个启用的复选框按钮，用于指定该测试是否运行。右侧有一个名为“选项”的按钮。点击它，您可以设置测试**如何**运行（同样，仅在此方案中）。


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig8_HTML.jpg](img/496602_1_En_2_Fig8_HTML.jpg)


    方案编辑器中的测试选项菜单


    这个选项菜单对许多开发者来说是陌生的，并且这个按钮看起来可能不重要，但它包含了非常有价值的设置。


    ### 并行测试


    第一个选项是能够**并行执行您的测试**。在 Xcode 9 之前，您一次只能在一个模拟器上运行测试。在 Xcode 9 中，Apple 提供了在多个模拟器上运行测试的能力。Xcode
    会启动多个模拟器，并在每个模拟器上运行完整的测试包。尽管这个选项在您希望在不同设备上运行测试时可以加快测试执行速度，但它并没有加速测试包本身。


    Xcode 10 终于带来了真正的并行测试 – 它会启动多个测试运行器（`模拟器`），每个测试运行器执行不同的测试类。模拟器的数量取决于运行机器的可用核心数。


    在您为并行测试功能欢呼之前，应该注意以下几点：


    *   并行测试会消耗大量的**处理能力**。如果您想利用此功能，最好在性能强大的机器上将其作为持续集成流程的一部分运行。

    *   在并行测试中，每个模拟器接收不同的测试类。不同的测试类意味着您**不能在测试之间创建依赖关系**。例如，`testB()` 不能依赖于 `testA()`
    的成功，而应该独立运行。独立的测试很重要，特别是在 UI 测试中，有时测试需要以另一个测试结果导致的特定状态开始。

    *   如果您的测试需要与服务器交互，并行运行可能会导致**网络请求瓶颈**，从而导致超时和测试失败。通常，在测试中依赖网络并非最佳实践，但在某些集成和端到端场景中，有时您无法避免。


    ### 随机化执行顺序


    在我看来，“随机化执行顺序”比并行运行测试更重要。后者影响测试运行的持续时间，而“随机化执行顺序”选项影响您编写测试的方式。


    让我从一个许多开发者在编写测试时常用的技巧说起 – 在许多测试类中，您可能会看到类似这样的代码：


    ```

    func test01() {

    ...

    }

    func test02() {

    ...

    }

    ```


    开发者试图在这里做的技巧是让这些测试按特定顺序运行。`XCTest` 框架**按字典顺序运行测试**，因为 `01` 大于 `02`，所以 `test01`
    在 `test02` 之前运行。


    对某些人来说，按固定顺序运行测试可能很方便。它可以帮助您从前一个测试结束的状态开始测试，并在您想要测试用户流程时节省宝贵时间。但这个功能是有代价的 – 按固定顺序运行测试会在您的测试之间产生依赖，这使得您的测试套件更加脆弱。每一个微小的更改都可能导致一个测试失败，并因此导致其余所有测试失败。


    测试应该独立运行，不依赖于另一个测试的外部或先前状态。确保测试稳定的唯一方法是打开“随机化执行顺序”。随机化测试顺序会迫使您编写独立的测试。最好依赖依赖注入，使您的代码更具可测试性。


    ### 位置和应用程序数据


    在集成测试和 UI 测试中，最具挑战性的任务之一是模拟不同的条件，例如设备位置和应用程序状态。如果我们在集成测试中可以使用依赖注入以某种方式解决这个问题，那么在
    UI 测试中做起来要困难得多。一个常见的用例是为某个难以调试的 bug 或边界情况模拟特定条件。


    在方案编辑器的“测试”操作下，我们还有另外两个选项：**位置**和**应用程序数据**。让我们来了解一下它们。

    '
- fmt: "# Location\n\n`Location`选项允许你为测试包模拟特定的地理位置，甚至模拟移动。没有位置功能，模拟位置变化或移动跟踪会非常困难。\n\
    \n编辑器方案中的位置弹出菜单包含一个预定义位置列表，如伦敦、莫斯科、纽约等。\n\n你不必局限于预定义列表，可以使用名为“GPX”的文件格式创建自己的位置。GPX（GPS交换）文件包含位置数据，如经度和纬度、航点、路线和轨迹。GPX的基本格式是XML，你可以在任何文本编辑器或在线生成器中创建此类文件。Xcode本身也有创建GPX文件的选项，从菜单中选择`File`➤`New`➤`File`，并在对话框中搜索`GPX`（参见图[2-9](#496602_1_En_2_Chapter.xhtml#Fig9)）。\n\
    \n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig9_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9 创建GPX文件模板\n\nGPX文件的基本格式应类似于：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<gpx version=\"1.1\">\n <wpt lat=\"40.7484\" lon=\"-73.9857\">\n  \
    \ <name>Empire States Building</name>\n </wpt>\n</gpx>\n```\n\n将文件添加到项目后，你可以在位置列表中看到“Empire\
    \ States Building”位置（参见图[2-10](#496602_1_En_2_Chapter.xhtml#Fig10)）。\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig10_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10 从位置列表中选择新的自定义位置\n\nGPX文件也可以包含移动。实现方法是通过添加多个位置和时间戳，以便Xcode可以根据所需的速度模拟位置变化。\n\
    \n```xml\n<wpt lat=\"40.7484\" lon=\"-73.9857\">\n  <time>2020-03-01T16:25:12Z</time>\n\
    </wpt>\n<wpt lat=\"40.7580\" lon=\"-73.9855\">\n  <time>2020-03-01T16:25:17Z</time>\n\
    </wpt>\n<wpt lat=\"40.7692\" lon=\"-73.9850\">\n  <time>2020-03-01T16:25:26Z</time>\n\
    </wpt>\n```\n\n# Application Data\n\nXcode的一个简洁功能是能够以特定的应用状态加载应用程序，包括持久数据、用户默认设置甚至缓存。使用名为`XCAppData`文件的内容加载特定数据的应用程序。`XCAppData`文件是一个包含所有应用程序数据的文件包，包括`Documents`、`Library`、`Cache`和`Temporary`文件。\n\
    \n要获取`XCAppData`文件，你需要确保设备已连接到Mac，然后转到`Window`➤`Devices and Simulators`。在打开的窗口中，在左侧找到你连接的设备并选中它。现在你应该能看到配对的Apple\
    \ Watch列表和已安装的应用程序（参见图[2-11](#496602_1_En_2_Chapter.xhtml#Fig11)）。\n\n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig11_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig11_HTML.jpg)\n\
    \n图 2-11 从你连接的iPhone下载应用程序数据容器\n\n选中你的应用程序后，你可以将其应用程序数据容器下载到Mac。你应该会看到格式如下的文件：\n\
    \n```\n..xcappdata\n```\n\n例如：\n\n```\nwww.myweatherapp.com.My-Weather-App 2020-03-10\
    \ 06/32.03.037.xcappdata\n```\n\n你应该知道`.xcappdata`是一个包，意味着它是一个显示为普通文件的系统目录，其中包含额外的文件和目录。要打开包，请在Finder中右键单击该包，然后选择“显示包内容”。之后，你可以看到应用程序数据文件的层次结构（参见图[2-12](#496602_1_En_2_Chapter.xhtml#Fig12)）。\n\
    \n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig12_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig12_HTML.jpg)\n\
    \n图 2-12 在Finder中展开的应用程序数据包\n\n如图[2-12](#496602_1_En_2_Chapter.xhtml#Fig12)所示，该包包含你设备存储的所有应用程序数据，包括文档、临时文件、状态，甚至系统用于应用程序切换用户体验的应用程序屏幕截图。\n\
    \n如果你想在Xcode设置中使用应用程序数据包（`.xcappdata`文件），需要将其添加到项目中。\n\n在你的项目中创建一个新组，比如“Tests\
    \ Data”，并将该包添加到该文件夹中。确保`xcappdata`不属于任何目标。\n\n> **注意**\n>\n> 你希望在你的方案中使用的文件，例如`GPX`文件和数据包，不应添加到任何目标中，即使是你的测试目标也不行。如果文件属于某个目标，它将被捆绑到最终产品中，不仅会增加应用程序的大小，还可能泄露安全和敏感的隐私信息。\n\
    \n## The Arguments Tab\n\nXcode的方案编辑器中还有另一个简洁且鲜为人知的功能，隐藏在`Arguments`选项卡下，称为`Launch\
    \ Arguments`和`Environments Variables`（参见图[2-13](#496602_1_En_2_Chapter.xhtml#Fig13)）。\n\
    \n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig13_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13 方案编辑器中的Arguments选项卡\n\n`Arguments`选项卡允许你通过设置仅在此方案中应用于应用程序的参数和变量来控制应用程序的运行。\n\
    \n### Launch Arguments\n\n假设我们想为“我的天气”应用程序添加“应用内购买”功能，并且我们希望在用户已经注册了我们的高级订阅时运行集成和UI测试。\n\
    \n许多开发人员测试应用内购买的典型方法是在检查用户是否注册的函数中返回“true”（请查看以下代码）：\n\n```swift\nfunc isTheUserRegistered()->Bool\
    \ {\n    return true\n    // 其余\"真实代码\"，检查钥匙串是否包含有关用户购买的信息\n    ...\n}\n```\n\n\
    在进行开发时检查时，返回“true”可能没问题，但像这样运行测试可能不是正确的解决方案。\n\n幸运的是，我们可以使用“Arguments Passed on\
    \ Launch”列表轻松地在运行时更改值。\n\n参数是在启动时传递给应用程序的值列表，可以在代码中轻松读取。\n\n你的应用程序可以使用参数来运行特定的标志，而无需重新编译或使用不同的目标。参数在测试中可能非常方便，因为有时你想要模拟应用程序中的不同层，例如网络、数据库等。\n\
    \n要添加新参数，请转到方案编辑器中的`Arguments`选项卡，在参数列表下，点击加号按钮（参见图[2-14](#496602_1_En_2_Chapter.xhtml#Fig14)）。\n\
    \n![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig14_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig14_HTML.jpg)\n\
    \n图 2-14 添加的参数列表\n\n如果你不希望在启动时传递某个参数，无需将其从列表中删除，只需取消选中其名称旁边的复选框即可。\n\n在你的代码中有两种类似的方式来读取参数列表：`CommandLine`和`ProcessInfo`。\n\
    \n查看以下代码：\n\n```swift\nfunc application(_ application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\n    var purchasedIAP\
    \ = CommandLine.arguments.contains(\"PURCHASED_IAP\")\n    // 或者我们可以使用ProcessInfo\n\
    \    purchasedIAP = ProcessInfo.processInfo.arguments.contains(\"PURCHASED_IAP\"\
    )\n    if purchasedIAP {\n        // 在这里做一些有用的操作...\n    }\n    return true\n\
    }\n```\n\n为了澄清两者之间的区别，`CommandLine`是Swift的一部分，其主要目标是读取命令行参数，在这种情况下是启动时传递的参数。\n\
    \n`ProcessInfo`是Foundation的一部分，它包含有关当前进程的信息，包括变量、主机名，以及像`CommandLine`一样的参数列表。\n\
    \n为了读取参数的目标，你可以使用它们中的任何一个。"
  raw: '#### Loc**at**ion


    The Location option lets you simulate a specific geo-location for your test bundle
    or even a movement. Without the location feature, it is tough to simulate location
    changes or movement tracking.


    The location popup menu in the editor scheme has a list of predefined locations
    like London, Moscow, New York, and more.


    You don’t have to settle for the predefined list, but you can create your own
    locations using a file format named “GPX.” GPX (GPS Exchange) files contain location
    data such as longitude and latitude, waypoints, routes, and tracks. The basic
    format of GPX is XML, and you can create such a file in any text editor or online
    generator. Xcode itself has an option to create a GPX file, select from the menu
    File ➤ New ➤ File, and search for GPX in the dialog box (see Figure [2-9](#496602_1_En_2_Chapter.xhtml#Fig9)).


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig9_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Creating GPX file template


    The basic format of the GPX file should look something like this:


    ```


    Empire States Building


    ```


    After adding the file to your project, you can see the “Empire States Building”
    location in the list of locations (see Figure [2-10](#496602_1_En_2_Chapter.xhtml#Fig10)).


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig10_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Selecting the new custom location from the locations list


    GPX files can also contain movement. The way to do it is by adding multiple locations
    and timestamps so that Xcode can simulate the location changes according to the
    required pace.


    ```


    2020-03-01T16:25:12Z


    2020-03-01T16:25:17Z


    2020-03-01T16:25:26Z


    ```


    #### Application Data


    One of the neat features Xcode has is the ability to load the app in a specific
    app state, including persistent data, user defaults, and even cache. Loading the
    app with specific data is done using something called **XCAppData** file. XCAppData
    file is a files package that contains all the app data, including documents, Library,
    cache, and temporary file.


    To get the XCAppData file, you need to make sure your device is connected to your
    Mac and go to Window ➤ Devices and Simulators. In the opened window, look for
    your connected device on the left and select it. Now you supposed to see the list
    of paired Apple Watches and installed apps (see Figure [2-11](#496602_1_En_2_Chapter.xhtml#Fig11)).


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig11_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Download application data container from your connected iPhone


    After selecting your app, you can download its app data container to your Mac.
    You should see a file with the following format:


    ```

    ..xcappdata

    ```


    For example:


    ```

    www.myweatherapp.com.My-Weather-App 2020-03-10 06/32.03.037.xcappdata

    ```


    You should be aware of the fact that .xcappdata is a package, meaning it’s a system
    directory displayed as a standard file and it contains additional files and directories.
    To open the package, right-click on the package in the Finder and select “Show
    Package Contents”. After that, you can see the app data files hierarchy (see Figure
    [2-12](#496602_1_En_2_Chapter.xhtml#Fig12)).


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig12_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    Expanded app data package in the finder


    As you can see in Figure [2-12](#496602_1_En_2_Chapter.xhtml#Fig12), the package
    contains all the app data that your device stores, including documents, temporary
    files, states, and even app screenshots the system uses for app switching user
    experience.


    If you want to use the app data package (.xcappdata file) in your Xcode settings,
    you need to add it to your project.


    Create a new group in your project, let’s say “Tests Data,” and add the package
    to that folder. Make sure the xcappdata doesn’t belong to any target.


    Note


    Files that you want to use in your scheme such as GPX files and data packages
    should not be added to any target, not even your test target. If a file belongs
    to a certain target, it will be bundled with the final product and not only will
    increase the application size, but it can also reveal security and sensitive privacy
    information.


    ### The Arguments Tab


    Xcode has another neat and unknown features in their scheme editor, hidden under
    the arguments tab, called Launch Arguments and Environments Variables (see Figure
    [2-13](#496602_1_En_2_Chapter.xhtml#Fig13)).


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig13_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    The Arguments tab in scheme editor


    The Arguments tab lets you control the runtime of your app by setting arguments
    and variables that applied to the app only in this scheme.


    #### Launch Arguments


    Let’s say we want to add an “In-App Purchase” capability to our “My Weather” app,
    and we want to run integration and UI tests when the user is already registered
    to our premium subscription.


    The typical way many developers test their In-App Purchase is by returning “true”
    in the function that checks if the user is registered or not (look at the following
    code):


    ```

    func isTheUserRegistered()->Bool {

    return true

    // The rest of the "real code", checking if the keychain contains information
    about the user purchase

    ...

    }

    ```


    Returning “true” might work fine when you do your checks during development, but
    running tests like that may not be the right solution.


    Fortunately, we can change values in runtime easily using the “**Arguments Passed
    on Launch** ” list.


    Arguments are a list of values passed to the app on launch and can be read in
    the code easily.


    Your app can use arguments to run with specific flags without recompiling or using
    different targets. Arguments can be handy in testing because there are times when
    you want to mock different layers in your app, such as network, database, and
    more.


    To add a new argument, go to the Arguments tab in the scheme editor, and under
    the list of arguments, tap on the plus button (see Figure [2-14](#496602_1_En_2_Chapter.xhtml#Fig14)).


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig14_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    List of added arguments


    If you don’t want an argument to pass on launch, you don’t need to delete it from
    the list; uncheck the checkbox near its name.


    There are two similar ways to read the list of arguments in your code, **CommandLine**
    and **ProcessInfo** .


    Look at the following code:


    ```

    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions:
    [UIApplication.LaunchOptionsKey: Any]?) -> Bool {

    var purchasedIAP = CommandLine.arguments.contains("PURCHASED_IAP")

    // or we can use ProcessInfo

    purchasedIAP = ProcessInfo.processInfo.arguments.contains("PURCHASED_IAP")

    if purchasedIAP {

    // do something useful here...

    }

    return true

    }

    ```


    To clarify the differences between the two, **CommandLine** is part of Swift,
    and its primary goal is to read the command-line arguments, and, in this case,
    Arguments passed on launch.


    **ProcessInfo** is part of foundation, and it contains information about the current
    process, including variables, host name, and also, just like CommandLine, the
    list of arguments.


    For the goal of reading the arguments, you can use both of them.'
