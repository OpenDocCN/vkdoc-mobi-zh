- fmt: '### Assertions


    There is a long list of assertions `XCTest` supports. In all assertions, you have
    the option to include a formatted error message to help you understand what the
    failed test is and the reason for the failure is. This is especially important
    when running tests from the command line or CI/CD environment, but also helpful
    from `Xcode` itself.


    Table 4-1


    List of `XCTest` Assertions


    | Name | Description |

    | --- | --- |

    | `XCTFail` | Unconditionally fails the test |

    | `XCTAssertNil` | Failure when the passed object is not nil |

    | `XCTAssertNotNil` | Failure when the object is nil |

    | `XCTAssertEqual` | Failure when expressions are not equal |

    | `XCTAssertNotEqual` | Failure when expressions are equal |

    | `XCTAssertNotEqualObjects` | Failure when objects are not equal |

    | `XCTAssertNotEqualObjects` | Failure when objects are equal |

    | `XCTAssertNoThrow` | Failure when expression throws expression |

    | `XCTAssertGreaterThan` | Failure when the first object is not greater than the
    second object |

    | `XCTAssertLessThan` | Failure when the first object is not smaller than the
    second object |

    | `XCTAssertLessThanOrEqual` | Failure when the first object is greater than the
    second object |

    | `XCTUnwrap` | Failure when the given expression tries to unwrap and returns
    nil |


    You may wonder, “Why do I need to learn the full assertions list? I can just use
    `XCTAssertTrue`.”


    So basically, you are right. If you use `XCTAssertTrue` and pass the condition
    you want, this will actually do the job.


    But take a look at Figure [3-5](#496602_1_En_3_Chapter.xhtml#Fig5).


    ![../images/496602_1_En_3_Chapter/496602_1_En_3_Fig5_HTML.jpg](images/496602_1_En_3_Chapter/496602_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    `XCTAssertTrue` failure in Xcode


    Do you see the problem? Sure, `x == y` is not `true`. But we didn’t want to check
    a Boolean expression; we wanted to check if two objects are equal.


    Now let’s change it to `XCTAssertEqual` (Figure [3-6](#496602_1_En_3_Chapter.xhtml#Fig6)).


    ![../images/496602_1_En_3_Chapter/496602_1_En_3_Fig6_HTML.jpg](images/496602_1_En_3_Chapter/496602_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    `XCTAssertEqual` failure in Xcode


    As you can see, using the right assertion can help you get a descriptive failure
    message free of charge.


    ### Creating a Custom Assertion


    Believe it or not, there are cases when the existing assertions are not the precise
    and convenient tool for validating your tests.


    Luckily, there’s a way of creating your custom assertions and making your testing
    code much cleaner.


    Here are some of the use cases that can make you consider writing your own custom
    assertion:


    * **Duplicate Assertion Code** – Let’s say you want to validate an object configuration,
    and you need to check a few properties. You can either use one big assertion that
    checks several values (an ugly solution) or use multiple assertions which is not
    an elegant solution either. The bottom line is when you see a repeated use of
    assertion sequence, you should consider a custom assertion.


    * **When Your Assertion Code Is Too Big** – If you need to parse a JSON every
    time and check a certain value or if you need to analyze a string or to do some
    calculation, write your own assertion. When you feel that the last part of your
    test (the “Assert” or “Then” part) is too big and can be a good fit to a function
    of its own, this is a sign you should create a custom assertion.


    * **When Your Assertion Doesn’t Speak the Right Language** – If you are checking
    that an email address is valid or the string contains only one “@”, or maybe you
    want to check if a date object is in a certain month or year. Sure, you can use
    a standard assertion for that, but the standard assertions don’t speak the “same
    language.” “Bigger than,” “Equal,” or `isTrue` is fine to use, but for a more
    stylish way, it is better to use your assertion to do those validations.'
