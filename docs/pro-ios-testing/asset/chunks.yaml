    to write them in Excel or some other tool and later on generate a JSON file. Working
    with JSON is extremely practical when you want your QA team to be a part of test
    writing.


    *   The opportunity to save your tests in a **readable file** can make your life
    easier when trying to understand what exactly you are testing and what scenarios
    you’re covering.


    *   It’s excellent for **cross-platform testing** . Many tools help you write
    cross-platform code. But if you insist on writing native code on each platform,
    sharing tests is a great way to make sure the implementations are on the same
    standards.


    One thing to notice when loading data from a JSON file is that you cannot use
    the main bundle for that. The main bundle is only for execution code, not frameworks
