- fmt: "# Waiting for Elements\n\nXCUIElements have a simple property called `exists`.\
    \ You can use this property to check if an element is visible on the screen:\n\
    \n```\nlet messageExists = app.staticTexts[\"welcomeMessage\"].exists\n```\n\n\
    But, UI Tests are not like standard unit tests, in a sense that when you think\
    \ of it, they actually a-sync tests. Almost every move to a new screen is followed\
    \ by animation, and many actions such as scrolling or heavy task take time.\n\n\
    When pressing on a button on a page that navigates to a second page, we need to\
    \ wait for the appearance of the second page before we can do any query for new\
    \ elements to continue our test.\n\nInstead of writing a “delay” function to halt\
    \ the program, we have a great function called `waitForExistence(timeout:)`.\n\
    \n`waitForExistence(timeout:)` halts the execution and waits for the existence\
    \ of an element before it continues. You can pass a timeout value to make sure\
    \ the waiting doesn’t last forever.\n\nLook at the following code:\n\n*   The\
    \ user presses on `\"nextPage\"` button, and the app navigates to a new screen.\n\
    *   We wait 1 second for the appearance of a cell called `\"newYork\"` on the\
    \ new screen.\n*   We press on the cell called `\"newYork\"`.\n\n```\napp.buttons[\"\
    nextPage\"].tap() //navigating to a new page\napp.cells[\"newYork\"].waitForExistence(timeout:\
    \ 1)\napp.cells[\"newYork\"].tap()\n```\n\n“Waiting for elements” plays a lead\
    \ role in UI Tests and also leads us to the next section – assertions.\n\n## Assertions\n\
    \nWhen talking about assertions in UI Test, it usually means we want to verify\
    \ the state of the screen. Here are some examples of this kind of verification:\n\
    \n*   We want to make sure an element is visible on the screen.\n*   We want to\
    \ verify the text or colors on a specific element.\n*   We want to check the position\
    \ of an element.\n\nRemember UI Tests are actually a black box, and therefore,\
    \ you do not have access to the code, just like the user or the tester.\n\nTo\
    \ verify the existence of an element, you can use the `waitForExistence(timeout:)`\
    \ function I mentioned earlier:\n\n```\nXCTAssertTrue(app.staticTexts[\"hello\"\
    ].firstMatch.waitForExistence(timeout: 2.0))\n```\n\nOr text:\n\n```\nXCTAssertEqual(app.staticTexts[\"\
    result\"].firstMatch.label)\n```\n\nThe assertion function we use for unit and\
    \ integration tests is the same for UI Testing.\n\n### Wrap It All Together\n\n\
    We already know how to query elements, interact with them, and assert them. Let’s\
    \ try to pack everything together:\n\n```\nfunc testLogin() throws {\n    let\
    \ app = XCUIApplication()\n    app.launch()\n    app.textFields[\"email\"].firstMatch.tap()\n\
    \    app.textFields[\"email\"].firstMatch.typeText(\"myEmail@gmail.com\")\n  \
    \  app.textFields[\"password\"].firstMatch.tap()\n    app.textFields[\"password\"\
    ].firstMatch.typeText(\"123456\") // It's a bad password. don't really use it\
    \ :)\n    app.buttons[\"go\"].firstMatch.tap()\n    XCTAssertTrue(app.staticTexts[\"\
    welcome\"].waitForExistence(timeout: 2.0))\n}\n```\n\nGreat, we wrote our first\
    \ UI Test!\n\nLet’s describe in short what our test does – it types email and\
    \ password values in the corresponding text fields, presses on the `\"go\"` button,\
    \ waits for 2 seconds, and then verifies that the welcome message appears.\n\n\
    Notice we had to tap the text fields before inserting the texts, just like a real\
    \ user.\n\n## Record Your Actions\n\nWriting your tests is not the only way to\
    \ create UI tests. Starting iOS 9, Xcode has a neat feature that lets you record\
    \ your actions on the simulator and convert them to scripting code in your `XCTestCase`.\n\
    \nTo start recording, locate your cursor inside a UI test method. Once you do\
    \ that, you will be able to see a record button at the bottom of the Xcode window\
    \ (Figure 7-8).\n\n![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig8_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8\nThe record button in Xcode\n\nClicking the record button again stops\
    \ the recording.\n\nNotice that the generated code might not be readable and straightforward,\
    \ like the code you would write yourself.\n\nFor example, this is a generated\
    \ code for typing inside a text field:\n\n```\nfunc testLoginProcess() {\n   \
    \ let app = XCUIApplication()\n    app.launch()\n    app.textFields[\"email\"\
    ].tap()\n    let aKey = app.keys[\"m\"]\n    aKey.tap()\n    let vKey = app.keys[\"\
    y\"]\n    vKey.tap()\n    let iKey = app.keys[\"e\"]\n    iKey.tap()\n}\n```\n\
    \nAnd this is just for typing three letters.\n\nBut recording your tests can also\
    \ be useful – sometimes it is hard to do something just by code, like swiping,\
    \ scrolling, or doing an action with many interactions. Also, it’s a great way\
    \ to discover more possibilities we have in UI Testing.\n\n# Dealing with Problems\n\
    \nNot only UI Tests take time to run, but they also require significant efforts\
    \ to maintain.\n\nThere are all kinds of issues with UI Tests:\n\n*   Most UI\
    \ Tests involve `dealing with a server or a network`. Every hiccup in our connection\
    \ can lead to a test failure.\n*   The nature of mobile apps is to `change their\
    \ UI` now and then. While most unit and integration tests can survive UI changes,\
    \ this is not the case with UI Testing when it is dependent solely on the element\
    \ tree.\n*   Also, if you `implement A/B` testing in your app, things may start\
    \ being messy when the UI is unpredictable.\n*   Each test has to start with a\
    \ predictable state. Since the order of the tests is inconsistent (and shouldn’t\
    \ be), you need to reset your state before each test. The problem is you don’t\
    \ have access to your code.\n*   There are external changes and interactions in\
    \ the app that are hard to control. A good example is system alerts – for push\
    \ notifications, location permissions, and more. Those alerts interrupt your test\
    \ and have an influence on your element tree.\n\nBut just like (almost) anything\
    \ in coding, it is possible to find a decent solution for every problem.\n\n##\
    \ Keeping Your Tests Consistent\n\nThe first problem with edge-to-edge tests is\
    \ that they are dependent on external states such as network and server.\n\nAlso,\
    \ working with a server means that you cannot expect the same response for the\
    \ same request.\n\nBut, if you go back to the Integration Tests chapter, you can\
    \ see we can simulate the network quickly and make sure we are getting the same\
    \ responses all the time while eliminating any server or network issues.\n\nThe\
    \ second mission that we have is to make sure we always begin from the same app\
    \ state. Most of the times, it means\n\n*   Cleared User Defaults.\n*   Cache\
    \ folder is empty.\n*   Local persistent store is empty.\n*   Any temporary files\
    \ should be cleared.\n\nIn general, it means to reset your app when starting a\
    \ new test case. Just like in previous chapters, we can use launch arguments for\
    \ that.\n\nTo launch your app with specific arguments, you can use the `launchArguments`\
    \ property :\n\n```\nlet app = XCUIApplication()\napp.launchArguments = [\"-clearDB\"\
    , \"-clearUserDefaults\"]\napp.launch()\n```\n\nAnd in your app delegate:\n\n\
    ```\nif CommandLine.arguments.contains(\"-clearDB\") {\n    // clear your db\n\
    }\n```\n\n`launchArguments` are perhaps the only way you have to “inject code”\
    \ to your application in UI Testing. Be careful not to add too many arguments\
    \ – after all, we want our test to reflect the real-life situation of the app."
  raw: '#### Waiting for Elements


    XCUIElements have a simple property called “exists”. You can use this property
    to check if an element is visible on the screen:


    ```

    Let messageExists = app.staticTexts["welcomeMessage"].exists

    ```


    But, UI Tests are not like standard unit tests, in a sense that when you think
    of it, they actually a-sync tests. Almost every move to a new screen is followed
    by animation, and many actions such as scrolling or heavy task take time.


    When pressing on a button on a page that navigates to a second page, we need to
    wait for the appearance of the second page before we can do any query for new
    elements to continue our test.


    Instead of writing a “delay” function to halt the program, we have a great function
    called `waitForExistence(timeout:)`.


    ```

    waitForExistence(:) halts the execution and waits for the existence of an element
    before it continues. You can pass a timeout value to make sure the waiting doesn’t
    last forever.

    ```


    Look at the following code:


    *   The user presses on “nextPage” button, and the app navigates to a new screen.


    *   We wait 1 second for the appearance of a cell called “newYork” on the new
    screen.


    *   We press on the cell called “newYork”.


    ```

    app.buttons["nextPage"].tap() //navigating to a new page

    app.cells["newYork"].waitForExistence(timeout: 1)

    app.cells["newYork"].tap()

    ```


    “Waiting for elements” plays a lead role in UI Tests and also leads us to the
    next section – assertions.


    #### Assertions


    When talking about assertions in UI Test, it usually means we want to verify the
    state of the screen. Here are some examples of this kind of verification:


    *   We want to make sure an element is visible on the screen.


    *   We want to verify the text or colors on a specific element.


    *   We want to check the position of an element.


    Remember UI Tests are actually a black box, and therefore, you do not have access
    to the code, just like the user or the tester.


    To verify the existence of an element, you can use the `waitForExistence(timeout:)`
    function I mentioned earlier:


    ```

    XCTAssertTrue(app.staticTexts["hello"].firstMatch.waitForExistence(timeout: 2.0))

    ```


    Or text:


    ```

    XCTAssertEqual(app.staticTexts["result"].firstMatch.label)

    ```


    The assertion function we use for unit and integration tests is the same for UI
    Testing.


    ### Wrap It All Together


    We already know how to query elements, interact with them, and assert them. Let’s
    try to pack everything together:


    ```

    func testLogin() throws {

    let app = XCUIApplication()

    app.launch()

    app.textFields["email"].firstMatch.tap()

    app.textFields["email"].firstMatch.typeText("myEmail@gmail.com")

    app.textFields["password"].firstMatch.tap()

    app.textFields["password"].firstMatch.typeText("123456") // It''s a bad password.
    don''t really use it :)

    app.buttons["go"].firstMatch.tap()

    XCTAssertTrue(app.staticTexts["welcome"].waitForExistence(timeout: 2.0))

    }

    ```


    Great, we wrote our first UI Test!


    Let’s describe in short what our test does –


    it types email and password values in the corresponding text fields, presses on
    the “go” button, waits for 2 seconds, and then verifies that the welcome message
    appears.


    Notice we had to tap the text fields before inserting the texts, just like a real
    user.


    ### Record Your Actions


    Writing your tests is not the only way to create UI tests. Starting iOS 9, Xcode
    has a neat feature that lets you record your actions on the simulator and convert
    them to scripting code in your XCTestCase.


    To start recording, locate your cursor inside a UI test method. Once you do that,
    you will be able to see a record button at the bottom of the Xcode window (Figure
    [7-8](#496602_1_En_7_Chapter.xhtml#Fig8)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig8_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    The record button in Xcode


    Clicking the record button again stops the recording.


    Notice that the generated code might not be readable and straightforward, like
    the code you would write yourself.


    For example, this is a generated code for typing inside a text field:


    ```

    func testLoginProcess() {

    let app = XCUIApplication()

    app.launch()

    app.textFields["email"].tap()

    let aKey = app.keys["m"]

    aKey.tap()

    let vKey = app.keys["y"]

    vKey.tap()

    let iKey = app.keys["e"]

    iKey.tap()

    }

    ```


    And this is just for typing three letters.


    But recording your tests can also be useful – sometimes it is hard to do something
    just by code, like swiping, scrolling, or doing an action with many interactions.
    Also, it’s a great way to discover more possibilities we have in UI Testing.


    ## Dealing with Problems


    Not only UI Tests take time to run, but they also require significant efforts
    to maintain.


    There are all kinds of issues with UI Tests:


    *   Most UI Tests involve **dealing with a server or a network**. Every hiccup
    in our connection can lead to a test failure.


    *   The nature of mobile apps is to **change their UI** now and then. While most
    unit and integration tests can survive UI changes, this is not the case with UI
    Testing when it is dependent solely on the element tree.


    *   Also, if you **implement A/B** testing in your app, things may start being
    messy when the UI is unpredictable.


    *   Each test has to start with a predictable state. Since the order of the tests
    is inconsistent (and shouldn’t be), you need to reset your state before each test.
    The problem is you don’t have access to your code.


    *   There are external changes and interactions in the app that are hard to control.
    A good example is system alerts – for push notifications, location permissions,
    and more. Those alerts interrupt your test and have an influence on your element
    tree.


    But just like (almost) anything in coding, it is possible to find a decent solution
    for every problem.


    ### Keeping Your Tests Consistent


    The first problem with edge-to-edge tests is that they are dependent on external
    states such as network and server.


    Also, working with a server means that you cannot expect the same response for
    the same request.


    But, if you go back to the Integration Tests chapter, you can see we can simulate
    the network quickly and make sure we are getting the same responses all the time
    while eliminating any server or network issues.


    The second mission that we have is to make sure we always begin from the same
    app state. Most of the times, it means


    *   Cleared User Defaults.


    *   Cache folder is empty.


    *   Local persistent store is empty.


    *   Any temporary files should be cleared.


    In general, it means to reset your app when starting a new test case. Just like
    in previous chapters, we can use launch arguments for that.


    To launch your app with specific arguments, you can use the `launchArguments`
    property :


    ```

    let app = XCUIApplication()

    app.launchArguments = ["-clearDB", "-clearUserDefaults"]

    app.launch()

    ```


    And in your app delegate:


    ```

    if CommandLine.arguments.contains("-clearDB") {

    // clear your db

    }

    ```


    Launch arguments are perhaps the only way you have to “inject code” to your application
    in UI Testing. Be careful not to add too many arguments – after all, we want our
    test to reflect the real-life situation of the app.'
  trans: "\n# 等待元素出现\n\nXCUIElement 有一个名为 `exists` 的简单属性。您可以使用此属性来检查元素是否在屏幕上可见：\n\n\
    ```\nlet messageExists = app.staticTexts[\"welcomeMessage\"].exists\n```\n\n但是，UI\
    \ 测试与标准单元测试不同，从某种意义上说，当您仔细思考时，它们实际上是异步测试。几乎每一次跳转到新屏幕都伴随着动画，并且许多操作（如滚动或繁重任务）都需要时间。\n\
    \n当按下页面上跳转到第二页的按钮时，我们需要等待第二页出现，然后才能查询新元素以继续我们的测试。\n\n我们不是编写一个“延迟”函数来暂停程序，而是有一个很棒的函数叫\
    \ `waitForExistence(timeout:)`。\n\n`waitForExistence(timeout:)` 会暂停执行并等待某个元素存在后再继续。您可以传递一个超时值以确保等待不会无限期持续。\n\
    \n请看以下代码：\n\n*   用户按下 `\"nextPage\"` 按钮，应用导航到新屏幕。\n*   我们等待 1 秒钟，让名为 `\"newYork\"\
    ` 的单元格出现在新屏幕上。\n*   我们按下名为 `\"newYork\"` 的单元格。\n\n```\napp.buttons[\"nextPage\"\
    ].tap() //navigating to a new page\napp.cells[\"newYork\"].waitForExistence(timeout:\
    \ 1)\napp.cells[\"newYork\"].tap()\n```\n\n“等待元素”在 UI 测试中扮演着重要角色，并且也将我们引向下一节——断言。\n\
    \n## 断言\n\n在 UI 测试中谈论断言，通常意味着我们想要验证屏幕的状态。以下是一些这类验证的示例：\n\n*   我们想确保某个元素在屏幕上可见。\n\
    *   我们想验证特定元素上的文本或颜色。\n*   我们想检查元素的位置。\n\n请记住，UI 测试实际上是一个黑盒，因此，您无法访问代码，就像用户或测试人员一样。\n\
    \n要验证元素是否存在，您可以使用我之前提到的 `waitForExistence(timeout:)` 函数：\n\n```\nXCTAssertTrue(app.staticTexts[\"\
    hello\"].firstMatch.waitForExistence(timeout: 2.0))\n```\n\n或者验证文本：\n\n```\nXCTAssertEqual(app.staticTexts[\"\
    result\"].firstMatch.label)\n```\n\n我们用于单元测试和集成测试的断言函数与用于 UI 测试的相同。\n\n### 整合所有内容\n\
    \n我们已经了解了如何查询元素、与它们交互并进行断言。让我们尝试将所有内容整合在一起：\n\n```\nfunc testLogin() throws {\n\
    \    let app = XCUIApplication()\n    app.launch()\n    app.textFields[\"email\"\
    ].firstMatch.tap()\n    app.textFields[\"email\"].firstMatch.typeText(\"myEmail@gmail.com\"\
    )\n    app.textFields[\"password\"].firstMatch.tap()\n    app.textFields[\"password\"\
    ].firstMatch.typeText(\"123456\") // It's a bad password. don't really use it\
    \ :)\n    app.buttons[\"go\"].firstMatch.tap()\n    XCTAssertTrue(app.staticTexts[\"\
    welcome\"].waitForExistence(timeout: 2.0))\n}\n```\n\n很好，我们编写了第一个 UI 测试！\n\n让我们简要描述一下我们的测试做了什么——它在相应的文本字段中输入电子邮件和密码值，按下\
    \ `\"go\"` 按钮，等待 2 秒钟，然后验证欢迎消息是否出现。\n\n请注意，我们必须先点击文本字段才能输入文本，就像真实用户一样。\n\n## 记录您的操作\n\
    \n编写测试并不是创建 UI 测试的唯一方法。自 iOS 9 起，Xcode 提供了一项简洁的功能，允许您记录在模拟器上的操作，并将其转换为 `XCTestCase`\
    \ 中的脚本代码。\n\n要开始录制，请将光标定位在 UI 测试方法内部。完成后，您将能在 Xcode 窗口底部看到一个录制按钮（图 7-8）。\n\n![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig8_HTML.jpg](img/496602_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8\nXcode 中的录制按钮\n\n再次点击录制按钮将停止录制。\n\n请注意，生成的代码可能不像您自己编写的代码那样可读和直接。\n\n例如，这是在文本字段中键入内容的生成代码：\n\
    \n```\nfunc testLoginProcess() {\n    let app = XCUIApplication()\n    app.launch()\n\
    \    app.textFields[\"email\"].tap()\n    let aKey = app.keys[\"m\"]\n    aKey.tap()\n\
    \    let vKey = app.keys[\"y\"]\n    vKey.tap()\n    let iKey = app.keys[\"e\"\
    ]\n    iKey.tap()\n}\n```\n\n而这只是为了输入三个字母。\n\n但是，录制测试也可能很有用——有时仅靠代码很难完成某些操作，比如滑动、滚动或执行包含许多交互的操作。此外，这也是发现\
    \ UI 测试中更多可能性的好方法。\n\n# 处理问题\n\nUI 测试不仅运行耗时，维护也需要付出大量精力。\n\nUI 测试存在各种问题：\n\n*\
    \   大多数 UI 测试都涉及 **与服务器或网络交互**。连接中的任何小故障都可能导致测试失败。\n*   移动应用的本质就是 **界面会不时变化**。虽然大多数单元测试和集成测试可以在\
    \ UI 变化后幸存，但这对于仅依赖于元素树的 UI 测试来说并非如此。\n*   此外，如果您在应用中 **实施 A/B 测试**，当 UI 变得不可预测时，事情可能会开始变得混乱。\n\
    *   每个测试都必须从一个可预测的状态开始。由于测试的顺序是不一致（并且不应该一致）的，您需要在每个测试之前重置状态。问题在于您无法访问您的代码。\n*\
    \   应用中存在难以控制的外部变化和交互。系统弹窗就是一个很好的例子——例如推送通知、位置权限等。这些弹窗会中断您的测试并对您的元素树产生影响。\n\n\
    但就像编码中的（几乎）所有事情一样，每个问题都有可能找到合适的解决方案。\n\n## 保持测试的一致性\n\n端到端测试的第一个问题是它们依赖于网络和服务器等外部状态。\n\
    \n此外，与服务器交互意味着您不能期望相同请求得到相同响应。\n\n但是，如果您回顾一下集成测试章节，您会看到我们可以快速模拟网络，确保始终获得相同的响应，同时消除任何服务器或网络问题。\n\
    \n我们的第二个任务是确保我们总是从相同的应用状态开始。大多数情况下，这意味着：\n\n*   已清除用户默认设置。\n*   缓存文件夹为空。\n*  \
    \ 本地持久存储为空。\n*   应清除所有临时文件。\n\n总的来说，这意味着在开始新的测试用例时重置您的应用。就像在前面的章节中一样，我们可以为此使用启动参数。\n\
    \n要使用特定参数启动您的应用，您可以使用 `launchArguments` 属性：\n\n```\nlet app = XCUIApplication()\n\
    app.launchArguments = [\"-clearDB\", \"-clearUserDefaults\"]\napp.launch()\n```\n\
    \n在您的应用委托中：\n\n```\nif CommandLine.arguments.contains(\"-clearDB\") {\n    //\
    \ clear your db\n}\n```\n\n`launchArguments` 可能是您在 UI 测试中向应用程序“注入代码”的唯一方法。请注意不要添加太多参数——毕竟，我们希望我们的测试能反映应用的真实运行情况。\n"
- fmt: "### Handling System Alerts\n\nAs mentioned before, system alerts such as push\
    \ notification or location permissions can block your test run from interacting\
    \ with UI elements and by that fail your test.\n\nSometimes you can synchronize\
    \ your alerts timing and try to tap the “Allow” button yourself, but I doubt it\
    \ can be a long-term solution.\n\nSo, meet `addUIInterruptionMonitor()` function.\
    \ This function is part of `XCTestCase`, and it can help you monitor and react\
    \ to any system alerts that your app gets on the way.\n\nLet’s see an example\
    \ for that:\n\n```\naddUIInterruptionMonitor(withDescription: \"Some System Alert\"\
    ) { (alert) -> Bool in\n    alert.buttons[\"Allow\"].tap()\n    return true\n\
    }\n```\n\nWhen calling this function, you need to pass a closure that runs each\
    \ time your test run detects some interruption. The closure parameter is the `XCUIElement`\
    \ that interrupts your test. In most cases, it will be some kind of “alert” element.\
    \ Querying for the “Allow” button and tapping is a good option to continue with\
    \ the test.\n\nBut what about other alerts? How can you tell what alert is shown?\
    \ Well, the `XCUIElement` is just like any other element. Query for its label\
    \ to find the exact text shown on the screen and by that decide on what button\
    \ you want to tap.\n\nIf you don’t know in advance if it’s “OK” or “Allow”, you\
    \ can check it:\n\n```\nlet okButton = alert.buttons[\"OK\"]\nif okButton.exists\
    \ {\n    okButton.tap()\n}\nlet allowButton = alert.buttons[\"Allow\"]\nif allowButton.exists\
    \ {\n    allowButton.tap()\n}\n```\n\nOr, you can just tap on the “second button”\n\
    \n```\nalert.buttons.element(boundBy: 1)\n```\n\nRemember that the closure invoked\
    \ only when there is a system alert. In terms of code, you should continue with\
    \ writing the test as if the alert never showed.\n\nNote\n\nDealing with alerts\
    \ is an excellent example of what is the right approach in UI Tests. These are\
    \ not standard developer testing, because it’s from the point of view of the user.\
    \ System alerts block the screen for the test runner just like they do for the\
    \ user, and the handling should be the same.\n\nSometimes you need to use `waitForExistence`\
    \ when tapping on one of the alert buttons because there is a delay between the\
    \ closure invocation and the actual dialog appearance on the screen.\n\n## Page\
    \ Object Model\n\n### The Problem\n\nOK, here’s a situation – we created several\
    \ UI tests, and they work great. But after a few weeks, they all started to fail.\
    \ We did everything according to the book – we handled the system alerts and A/B\
    \ testing, mocked the network, and cleared everything correctly.\n\nSo, what happened?\n\
    \nWell, it seems that we made a change – we added a new step to the login process,\
    \ and naturally, we now need to update all our tests to the new flow.\n\nAs you\
    \ can see, we have a complicated situation here. We did a small change, and now\
    \ we need to go over every test and update it. Undoubtedly, it now hurts our motivation\
    \ to write more UI tests when we know we need to work hard to maintain them. The\
    \ more UI tests we write, the harder we need to work in the future.\n\nBut we\
    \ have a solution, and it’s called the Page Object Model.\n\n### What Is a Page\
    \ Object Model?\n\nThe idea behind the Page Object Model (or in short POM) is\
    \ to separate the test script from the UI locators and actions. Sometimes, it\
    \ also means separating the test script from the assertions as well.\n\nFor every\
    \ screen of the app, we create an object that has several types of methods and\
    \ properties:\n\n*   It has methods that perform main actions. For example, a\
    \ method like `doSignIn(withEmail email : String, password : String)` fills the\
    \ email text field and the password and starts the sign-in process. It doesn’t\
    \ matter if you do a full refactor on the sign-in screen – the only change you\
    \ need to do is within the page object.\n*   It has methods that check different\
    \ states, for example, a method that verifies that you are on the correct screen\
    \ (`isCurrentPageisSignup()`) or method that returns a specific value (`getWelcomeMessageText()`).\
    \ This eliminates any direct access to the elements themselves and prevents code\
    \ duplications.\n*   It has private properties that return central elements on\
    \ the screen. These are actually locators that help us reduce code complications\
    \ and also make it more transparent.\n\nWhen we start working with the POM pattern,\
    \ our test scripts don’t have any direct access to the element tree. All the actions\
    \ are done through the page object.\n\nAnother thing, whenever we call the page\
    \ object for an action that navigates us to a new screen, the page object should\
    \ return the new screen page object.\n\nLet’s take a look at an example for such\
    \ a page object:\n\n```\nclass SignInPageObject {\n    var app : XCUIApplication\n\
    \    init(app : XCUIApplication) {\n        self.app = app\n    }\n    private\
    \ var emailField : XCUIElement {\n        return app.textFields[\"email\"].firstMatch\n\
    \    }\n    private var passwordField : XCUIElement {\n        return app.textFields[\"\
    password\"].firstMatch\n    }\n    private var loginButton : XCUIElement {\n \
    \       return app.buttons[\"login\"].firstMatch\n    }\n    func doSignIn(withEmail\
    \ email : String, password : String)->UpsellPageObject {\n        emailField.tap()\n\
    \        emailField.typeText(email)\n        passwordField.tap()\n        passwordField.typeText(password)\n\
    \        loginButton.tap()\n        return UpsellPageObject(app: app)\n    }\n\
    }\n```\n\nHere are a few notes about the preceding code:\n\n*   We can see the\
    \ page object receives the `XCUIApplication` in its `init()` method. This is because\
    \ the `XCUIApplication` object is the root object for every UI Test action that\
    \ we do. You would think that initializing a new `XCUIApplication` each time can\
    \ be a good option but take into account that sometimes we initialize `XCUIApplication`\
    \ with a specific bundle identifier, so passing on the application object is being\
    \ on the safe side.\n*   We have several private properties that return the main\
    \ elements on the screen using simple queries. This is the only place where you\
    \ query those elements, and whenever the page object needs to interact with those\
    \ elements, it does it using these properties. The reason they are private is\
    \ to make sure that we can only access them through the actions and not directly.\n\
    *   `doSignIn()` method is doing a standard logging flow, and it’s the only non-private\
    \ method/property we currently have in our page object model. Notice that this\
    \ method returns our next page object model, `UpsellPageObject`, which represents\
    \ the next screen.\n\nNow, let’s take a look on a code snippet using our page\
    \ object in test:\n\n```\nfunc testSignIn() {\n    let app = XCUIApplication()\n\
    \    app.launch()\n    SignInPageObject(app: app).doSignIn(withEmail: \"user\"\
    , password: \"12345\").pressSkip().verifyWeAreOnTheMainScreen()\n}\n```\n\nDo\
    \ you see how simple it is? We can chain our screens to create a concise, readable\
    \ test and also maintainable.\n\nWe call `doSignIn()`, receive a new object back,\
    \ press the skip button, obtain a new object back, and verify we are on the right\
    \ screen – all that with one row. Look at Figure 7-9.\n\n![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig9_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9: Chaining page objects together\n\nIf you want to get serious about\
    \ UI Testing in your project, working with POM is not a recommendation – it’s\
    \ a must. Also, this means that recording your tests is only suitable for generating\
    \ the code. Afterward, you need to take the generated code and organize it in\
    \ models."
  raw: '### Handling System Alerts


    As mentioned before, system alerts such as push notification or location permissions
    can block your test run from interacting with UI elements and by that fail your
    test.


    Sometimes you can synchronize your alerts timing and try to tap the “Allow” button
    yourself, but I doubt it can be a long-term solution.


    So, meet `addUIInterruptionMonitor()` function. This function is part of XCTestCase,
    and it can help you monitor and react to any system alerts that your app gets
    on the way.


    Let’s see an example for that:


    ```

    addUIInterruptionMonitor(withDescription: "Some System Alert") { (alert) -> Bool
    in

    alert.buttons["Allow"].tap()

    return true

    }

    ```


    When calling this function, you need to pass a closure that runs each time your
    test run detects some interruption. The closure parameter is the XCUIElement that
    interrupts your test. In most cases, it will be some kind of “alert” element.
    Querying for the “Allow” button and tapping is a good option to continue with
    the test.


    But what about other alerts? How can you tell what alert is shown? Well, the XCUIElement
    is just like any other element. Query for its label to find the exact text shown
    on the screen and by that decide on what button you want to tap.


    If you don’t know in advance if it’s “OK” or “Allow”, you can check it:


    ```

    let okButton = alert.buttons["OK"]

    if okButton.exists {

    okButton.tap()

    }

    let allowButton = alert.buttons["Allow"]

    if allowButton.exists {

    allowButton.tap()

    }

    ```


    Or, you can just tap on the “second button”


    ```

    alert.buttons.element(boundBy: 1)

    ```


    Remember that the closure invoked only when there is a system alert. In terms
    of code, you should continue with writing the test as if the alert never showed.


    Note


    Dealing with alerts is an excellent example of what is the right approach in UI
    Tests. These are not standard developer testing, because it’s from the point of
    view of the user. System alerts block the screen for the test runner just like
    they do for the user, and the handling should be the same.


    Sometimes you need to use `waitForExistence` when tapping on one of the alert
    buttons because there is a delay between the closure invocation and the actual
    dialog appearance on the screen.


    ## Page Object Model


    ### The Problem


    OK, here’s a situation – we created several UI tests, and they work great. But
    after a few weeks, they all started to fail. We did everything according to the
    book – we handled the system alerts and A/B testing, mocked the network, and cleared
    everything correctly.


    So, what happened?


    Well, it seems that we made a change – we added a new step to the login process,
    and naturally, we now need to update all our tests to the new flow.


    As you can see, we have a complicated situation here. We did a small change, and
    now we need to go over every test and update it. Undoubtedly, it now hurts our
    motivation to write more UI tests when we know we need to work hard to maintain
    them. The more UI tests we write, the harder we need to work in the future.


    But we have a solution, and it’s called the **Page Object Model**.


    ### What Is a Page Object Model?


    The idea behind the Page Object Model (or in short POM) is to **separate the test
    script from the UI locators** and actions. Sometimes, it also means separating
    the test script from the assertions as well.


    For every screen of the app, we create an object that has several types of methods
    and properties:


    *   It has methods that **perform main actions**. For example, a method like `doSignIn(withEmail
    email : String, password : String)` fills the email text field and the password
    and starts the sign-in process. It doesn’t matter if you do a full refactor on
    the sign-in screen – the only change you need to do is within the page object.


    *   It has methods that **check different states**, for example, a method that
    verifies that you are on the correct screen (`isCurrentPageisSignup()`) or method
    that returns a specific value (`getWelcomeMessageText()`). This eliminates any
    direct access to the elements themselves and prevents code duplications.


    *   It has private properties that return central elements on the screen. These
    are actually **locators** that help us reduce code complications and also make
    it more transparent.


    When we start working with the POM pattern, our test scripts don’t have any direct
    access to the element tree. All the actions are done through the page object.


    Another thing, whenever we call the page object for an action that navigates us
    to a new screen, the page object should return the new screen page object.


    Let’s take a look at an example for such a page object:


    ```

    class SignInPageObject {

    var app : XCUIApplication

    init(app : XCUIApplication) {

    self.app = app

    }

    private var emailField : XCUIElement {

    return app.textFields["email"].firstMatch

    }

    private var passwordField : XCUIElement {

    return app.textFields["password"].firstMatch

    }

    private var loginButton : XCUIElement {

    return app.buttons["login"].firstMatch

    }

    func doSignIn(withEmail email : String, password : String)->UpsellPageObject {

    emailField.tap()

    emailField.typeText(email)

    passwordField.tap()

    passwordField.typeText(password)

    loginButton.tap()

    return UpsellPageObject(app: app)

    }

    }

    ```


    Here are a few notes about the preceding code:


    *   We can see the page object **receives the** **XCUIApplication** in its `init()`
    method . This is because the `XCUIApplication` object is the root object for every
    UI Test action that we do. You would think that initializing a new `XCUIApplication`
    each time can be a good option but take into account that sometimes we initialize
    `XCUIApplication` with a specific bundle identifier, so passing on the application
    object is being on the safe side.


    *   We have **several private properties** that return the main elements on the
    screen using simple queries. This is the only place where you query those elements,
    and whenever the page object needs to interact with those elements, it does it
    using these properties. The reason they are private is to make sure that we can
    only access them through the actions and not directly.


    *   `doSignIn()` method is doing a standard logging flow, and it’s the only non-private
    method/property we currently have in our page object model. Notice that this method
    returns our next page object model, `UpsellPageObject`, which represents the next
    screen.


    Now, let’s take a look on a code snippet using our page object in test:


    ```

    func testSignIn() {

    let app = XCUIApplication()

    app.launch()

    SignInPageObject(app: app).doSignIn(withEmail: "user", password: "12345").pressSkip().verifyWeAreOnTheMainScreen()

    }

    ```


    Do you see how simple it is? We can chain our screens to create a concise, readable
    test and also maintainable.


    We call `doSignIn()`, receive a new object back, press the skip button, obtain
    a new object back, and verify we are on the right screen – all that with one row.
    Look at Figure [7-9](#496602_1_En_7_Chapter.xhtml#Fig9).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig9_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Chaining page objects together


    If you want to get serious about UI Testing in your project, working with POM
    is not a recommendation – it’s a must. Also, this means that recording your tests
    is only suitable for generating the code. Afterward, you need to take the generated
    code and organize it in models.'
  trans: "\n### 处理系统警报\n\n如前所述，诸如推送通知或位置权限等系统警报可能会阻止你的测试运行与 UI 元素交互，从而导致测试失败。\n\n\
    有时你可以同步警报的触发时机并尝试自行点击\"允许\"按钮，但我认为这很难成为一个长期的解决方案。\n\n那么，来认识一下 `addUIInterruptionMonitor()`\
    \ 函数。这个函数是 `XCTestCase` 的一部分，它可以帮助你监控并响应应用在运行过程中遇到的任何系统警报。\n\n让我们来看一个示例：\n\n```\n\
    addUIInterruptionMonitor(withDescription: \"Some System Alert\") { (alert) ->\
    \ Bool in\n    alert.buttons[\"Allow\"].tap()\n    return true\n}\n```\n\n调用此函数时，你需要传递一个闭包，该闭包会在测试运行检测到某些中断时每次执行。闭包的参数是中断你测试的\
    \ `XCUIElement`。在大多数情况下，它会是某种\"alert\"元素。查询\"允许\"按钮并点击是继续测试的一个好方法。\n\n但是其他警报呢？你如何判断显示的是什么警报？其实，`XCUIElement`\
    \ 和其他任何元素一样。你可以查询它的标签以找到屏幕上显示的确切文本，从而决定点击哪个按钮。\n\n如果你事先不知道是\"确定\"还是\"允许\"按钮，你可以这样检查：\n\
    \n```\nlet okButton = alert.buttons[\"OK\"]\nif okButton.exists {\n    okButton.tap()\n\
    }\nlet allowButton = alert.buttons[\"Allow\"]\nif allowButton.exists {\n    allowButton.tap()\n\
    }\n```\n\n或者，你可以直接点击\"第二个按钮\"：\n\n```\nalert.buttons.element(boundBy: 1)\n```\n\
    \n请记住，该闭包仅在存在系统警报时才会被调用。在代码层面，你应该继续编写测试，就好像警报从未出现一样。\n\n> 注\n>\n> 处理警报是理解 UI 测试正确方法的一个绝佳例子。这些不是标准的开发者测试，因为它是从用户的角度出发的。系统警报会为测试运行器遮挡屏幕，就像为用户遮挡一样，处理方式也应该相同。\n\
    >\n> 有时在点击警报按钮之一时，你需要使用 `waitForExistence`，因为闭包调用与对话框实际出现在屏幕上之间存在延迟。\n\n## 页面对象模型\n\
    \n### 问题所在\n\n好的，假设有这样一种情况——我们创建了几个 UI 测试，它们运行得很好。但几周后，它们全都开始失败了。我们一切都是按照最佳实践来做的——我们处理了系统警报和\
    \ A/B 测试，模拟了网络，并正确地清理了一切。\n\n那么，发生了什么？\n\n嗯，似乎我们做了一个改动——我们在登录流程中添加了一个新步骤，因此，我们现在需要将所有测试更新到新的流程。\n\
    \n如你所见，我们面临一个复杂的情况。我们做了一个小改动，现在却需要检查每个测试并进行更新。毫无疑问，当我们知道需要付出大量努力来维护时，编写更多 UI 测试的动力就会受挫。我们编写的\
    \ UI 测试越多，未来的维护工作量就越大。\n\n但我们有一个解决方案，它叫做**页面对象模型**。\n\n### 什么是页面对象模型？\n\n页面对象模型（简称\
    \ POM）背后的思想是将测试脚本与 UI 定位器和操作分离开来。有时，也意味着将测试脚本与断言分离。\n\n对于应用的每个屏幕，我们创建一个具有几种类型的方法和属性的对象：\n\
    \n*   它拥有执行主要操作的方法。例如，像 `doSignIn(withEmail email : String, password : String)`\
    \ 这样的方法，它会填充电子邮箱文本框和密码，并启动登录流程。即使你对登录界面进行了完全的重构，你唯一需要改动的地方也只在页面对象内部。\n*   它拥有检查不同状态的方法，例如，验证你是否在正确屏幕上的方法（`isCurrentPageisSignup()`）或返回特定值的方法（`getWelcomeMessageText()`）。这消除了对元素本身的任何直接访问，并防止了代码重复。\n\
    *   它拥有返回屏幕上核心元素的私有属性。这些实际上是定位器，有助于我们减少代码复杂性，同时也使其更加清晰透明。\n\n当我们开始使用 POM 模式时，我们的测试脚本不再直接访问元素树。所有操作都通过页面对象完成。\n\
    \n另外一点是，每当我们调用页面对象执行某个会导航到新屏幕的操作时，该页面对象应该返回新屏幕的页面对象。\n\n让我们看一个这样的页面对象示例：\n\n```\n\
    class SignInPageObject {\n    var app : XCUIApplication\n    init(app : XCUIApplication)\
    \ {\n        self.app = app\n    }\n    private var emailField : XCUIElement {\n\
    \        return app.textFields[\"email\"].firstMatch\n    }\n    private var passwordField\
    \ : XCUIElement {\n        return app.textFields[\"password\"].firstMatch\n  \
    \  }\n    private var loginButton : XCUIElement {\n        return app.buttons[\"\
    login\"].firstMatch\n    }\n    func doSignIn(withEmail email : String, password\
    \ : String)->UpsellPageObject {\n        emailField.tap()\n        emailField.typeText(email)\n\
    \        passwordField.tap()\n        passwordField.typeText(password)\n     \
    \   loginButton.tap()\n        return UpsellPageObject(app: app)\n    }\n}\n```\n\
    \n关于前面的代码，有几点需要注意：\n\n*   我们可以看到页面对象在其 `init()` 方法中接收 `XCUIApplication`。这是因为 `XCUIApplication`\
    \ 对象是我们执行的每个 UI 测试操作的根对象。你可能会想，每次初始化一个新的 `XCUIApplication` 可能是个不错的选择，但请考虑到有时我们是用特定的\
    \ bundle identifier 来初始化 `XCUIApplication` 的，所以传递应用程序对象是更稳妥的做法。\n*   我们有几个私有属性，它们使用简单的查询返回屏幕上的主要元素。这是唯一查询这些元素的地方，每当页面对象需要与这些元素交互时，都通过这些属性进行。将它们设为私有是为了确保我们只能通过操作访问它们，而不能直接访问。\n\
    *   `doSignIn()` 方法执行标准的登录流程，它是我们当前页面对象模型中唯一的非私有方法/属性。请注意，此方法返回我们的下一个页面对象模型 `UpsellPageObject`，它代表了下一个屏幕。\n\
    \n现在，让我们看看在测试中使用页面对象的代码片段：\n\n```\nfunc testSignIn() {\n    let app = XCUIApplication()\n\
    \    app.launch()\n    SignInPageObject(app: app).doSignIn(withEmail: \"user\"\
    , password: \"12345\").pressSkip().verifyWeAreOnTheMainScreen()\n}\n```\n\n看到它有多简洁了吗？我们可以将我们的屏幕串联起来，创建出简洁、可读且可维护的测试。\n\
    \n我们调用 `doSignIn()`，接收一个新对象返回，点击跳过按钮，再获得一个新对象返回，并验证我们在正确的屏幕上——所有这些只用了一行代码。请参见图\
    \ 7-9。\n\n![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig9_HTML.jpg](img/496602_1_En_7_Fig9_HTML.jpg)\n\
    \n**图 7-9：将页面对象串联在一起**\n\n如果你希望在项目中认真对待 UI 测试，那么使用 POM 不是一项建议——而是必须的。同时，这也意味着录制测试只适用于生成代码。之后，你需要将生成的代码提取出来，并按模型进行组织。\n"
- fmt: '## Test Reports


    At the end of your test run, the natural thing to do is to read your test report.
    Xcode generates a detailed test report for every run, including test duration
    and attachments.


    The report is generated automatically and can be found in the Reporter Pane in
    Xcode (see Figure [7-10](#496602_1_En_7_Chapter.xhtml#Fig10)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig10_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig10_HTML.jpg)


    Figure 7-10 Xcode test report


    Looking at the test report in Figure [7-10](#496602_1_En_7_Chapter.xhtml#Fig10)
    reveals several information details:


    * It is possible to filter the tests according to their state. You can see only
    passed, failed, skipped, or all tests. This is a handful when you have many tests,
    and you want to focus on the failed ones, for example.

    * You can also see how much time each test took. Don’t forget that UI Tests take
    time. This is an opportunity to nail down long-running tests and try to optimize
    them to reduce the total test duration.

    * Also, you can see each small step in your test and how much time it took.


    Long-running tests are usually loaded with many steps, and you can find yourself
    struggling with information overload, trying to find your path. The solution is
    to break your test into activities.


    ### Activities


    Activities are a group of steps you create in UI Tests that are meaningful and
    can make your test reports look much simpler and short.


    Grouping of steps with Activity is very simple. If I want to group my login test
    script, I will do something like this:


    * Step 1 – Enter user email.

    * Step 2 – Enter the user password.

    * Step 3 – Tap on “Go” button.

    * Step 4 – Verify the welcome message.


    And to the code, now with activities:


    ```

    func testLoginProcess() {

    let app = XCUIApplication()

    app.launch()

    XCTContext.runActivity(named: "Enter Email") { _ in

    app.textFields["email"].firstMatch.tap()

    app.textFields["email"].firstMatch.typeText("myUser@domain.com")

    }

    XCTContext.runActivity(named: "Enter Password") { _ in

    app.textFields["password"].firstMatch.tap()

    app.textFields["password"].firstMatch.typeText("123456")

    }

    XCTContext.runActivity(named: "Pressing Go") { _ in

    app.buttons["go"].firstMatch.tap()

    }

    XCTContext.runActivity(named: "Verify Welcome Message") { _ in

    app.staticTexts["welcome"].firstMatch.waitForExistence(timeout: 2.0)

    }

    }

    ```


    Grouping your steps to activities changes the way your test report looks (Figure
    [7-11](#496602_1_En_7_Chapter.xhtml#Fig11)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig11_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig11_HTML.jpg)


    Figure 7-11 Test report with activities


    Not only that, but you can also group several groups to a new activity:


    ```

    func testLoginProcess() {

    let app = XCUIApplication()

    app.launch()

    XCTContext.runActivity(named: "Do Sign In") { _ in

    XCTContext.runActivity(named: "Enter Email") { _ in

    app.textFields["email"].firstMatch.tap()

    app.textFields["email"].firstMatch.typeText("myUser@domain.com")

    }

    XCTContext.runActivity(named: "Enter Password") { _ in

    app.textFields["password"].firstMatch.tap()

    app.textFields["password"].firstMatch.typeText("123456")

    }

    XCTContext.runActivity(named: "Pressing Go") { _ in

    app.buttons["go"].firstMatch.tap()

    }

    }

    XCTContext.runActivity(named: "Verify Welcome Message") { _ in

    app.staticTexts["welcome"].firstMatch.waitForExistence(timeout: 2.0)

    }

    }

    ```


    And now, your test report looks even better (Figure [7-12](#496602_1_En_7_Chapter.xhtml#Fig12)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig12_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig12_HTML.jpg)


    Figure 7-12 Group of activities in a test report


    If you are working with a page object model, it is even easier to implement activities
    by wrapping the actions with `XCTContext.runActivity` closure:


    ```

    func doSignIn(withEmail email : String, password : String)->UpsellPageObject {

    XCTContext.runActivity(named: "Do Sign In") {_ in

    emailField.tap()

    emailField.typeText(email)

    passwordField.tap()

    passwordField.typeText(password)

    loginButton.tap()

    }

    return UpsellPageObject(app: app)

    }

    ```


    The Page Object Model and Activities go hand in hand. Hooking them together can
    brighten up your test reports without much effort.


    ### Attachments


    One of the most challenging tasks when debugging UI Tests (or actually, debugging
    in general) is to get information about the state of our app at the time of failure
    or the state of the app in a particular step that precedes to the failure itself.


    Starting Xcode 9.0, Apple added a new feature – `XCTAttachment`. `XCTAttachment`
    gives you the ability to attach useful information to your test report and helps
    you investigate your failures. But attachments really shine when dealing with
    a continuous integration environment, for example, not from your computer.


    Attachments show up in your test report and can hold different types of data:


    * Screenshots

    * Images

    * Files

    * Texts

    * Data (blob)


    The most common data is, of course, screenshots.


    #### Screenshots


    Creating screenshot attachments is a great way to record your test steps to help
    you diagnose your test failures. Xcode creates screenshots automatically anytime
    one of your tests fails, but you can also create your own screenshots whenever
    you want.


    To create a screenshot, you need to do three things:


    1. Take a screenshot of your screen or one of your elements.

    2. Create an attachment based on the snapshot.

    3. Add the attachment to the test run.


    Here is a quick code snippet to show you how it’s done:


    ```

    let screenshot = app.windows.firstMatch.screenshot()

    let attachment = XCTAttachment(screenshot: screenshot)

    add(attachment)

    ```


    ##### Screenshots in Test Report


    The best place to see your screenshots is your test report. But adding the preceding
    code to your test probably won’t show you any attachment in your test report.
    Let’s take a look at your test report after adding an attachment (Figure [7-13](#496602_1_En_7_Chapter.xhtml#Fig13)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig13_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig13_HTML.jpg)


    Figure 7-13 Screenshots removed from the test report


    Because screenshots can quickly fill up your storage, we have places where we
    can handle the lifetime of our attachments. The first place is the scheme configuration
    (Figure [7-14](#496602_1_En_7_Chapter.xhtml#Fig14)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig14_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig14_HTML.jpg)


    Figure 7-14 Scheme configuration


    By default, XCTest captures screenshots for every step in your test. This is extremely
    useful when you want to reproduce your test step by step. XCTest also deletes
    those screenshots whenever your tests succeed. This option is enabled by default
    as well.


    The second place you can control the lifetime of your attachments is in the code
    itself:


    ```

    let screenshot = app.screenshot()

    let attachment = XCTAttachment(screenshot: screenshot)

    attachment.lifetime = .keepAlways

    add(attachment)

    ```


    Each attachment has a `lifetime` property, which has two options: `keepAlways`
    and `deleteOnSuccess`. The default value is `deleteOnSuccess`.


    Setting it to `keepAlways` overrides the scheme settings and will keep your attachments
    regardless of your test results.


    ##### Examine Your Attachments


    After we changed our scheme configuration or modified our code, we can have a
    look at our test report to examine our test details (Figure [7-15](#496602_1_En_7_Chapter.xhtml#Fig15)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig15_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig15_HTML.jpg)


    Figure 7-15 Screenshot in the test report


    If you add attachment inside a specific activity, you will see it under the activity
    group. Otherwise, it will appear in the root of your test.'
