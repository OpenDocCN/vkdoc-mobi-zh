- fmt: '### Create Abstract Method for Testing


    The trick is straightforward. We create a method (called `runTest` for that matter)
    in this example that does all the dirty work – all the setup, connections, and
    assertion, and all the stuff you don’t want to repeat yourself every test and
    has nothing to do with the actual data being tested.


    For your actual test cases, you create an explicit test method for each one of
    them. These test methods do not assert but, instead, call our "dirty" function
    while passing the relevant data.


    Here is an example:


    ```

    func runTest(withData events : [Event], expectedLayout : LayoutStructure, file
    : StaticString = #file, line : UInt = #line) {

    // act

    let actualStructure = CalendarLayoutGenerator().generateLayout(events: events)

    // assert

    XCTAssertEqual(actualStructure, expectedLayout, file : file, line : line)

    }

    func testGenerateLayout_abstractMethod1() {

    var events = [Event]()

    events.append(Event(startTime: generateDateFromString(str: "04/27/2020 10:00"),
    endTime: generateDateFromString(str : "04/27/2020 11:00")))

    events.append(Event(startTime: generateDateFromString(str: "04/27/2020 10:30"),
    endTime: generateDateFromString(str : "04/27/2020 11:20")))

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 12:30"),
    endTime: generateDateFromString(str : "04/28/2020 12:30")))

    let expectedLayout = LayoutStructure()

    runTest(withData: events, expectedLayout: LayoutStructure())

    }

    func testGenerateLayout_abstractMethod2() {

    var events = [Event]()

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 10:00"),
    endTime: generateDateFromString(str : "04/28/2020 11:00")))

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 10:30"),
    endTime: generateDateFromString(str : "04/29/2020 11:20")))

    events.append(Event(startTime: generateDateFromString(str: "04/29/2020 12:30"),
    endTime: generateDateFromString(str : "04/30/2020 12:30")))

    let expectedLayout = LayoutStructure()

    runTest(withData: events, expectedLayout: LayoutStructure())

    }

    ```


    In the preceding code example, the `runTest()` method is simple, to demonstrate
    how to implement this pattern in more complicated test methods.


    Also, notice the test method receives the `file` and `line` parameters to show
    the precise location where the test fails.


    ### Loading Test Cases from a File


    Another option we can do to do parameterized unit tests is to load the test cases
    from a file.


    Instead of creating a test method manually for each use case, we can create a
    JSON file with an array of all test cases, load, and iterate the array.


    Let’s take a look at a potentially JSON file, containing several test cases:


    ```

    {

    "test":[

    {

    "name":"test1",

    "events":[

    {

    "startDate":"04/27/2020 10:00",

    "endDate":"04/27/2020 11:00"

    },

    {

    "startDate":"04/27/2020 10:30",

    "endDate":"04/27/2020 11:20"

    },

    {

    "startDate":"04/28/2020 12:30",

    "endDate":"04/28/2020 12:30"

    }

    ],

    "expectedStructure":"--==--"

    },

    {

    "name":"test2",

    "events":[

    {

    "startDate":"04/27/2020 10:30",

    "endDate":"04/27/2020 11:30"

    },

    {

    "startDate":"04/27/2020 10:45",

    "endDate":"04/27/2020 11:50"

    },

    {

    "startDate":"04/28/2020 12:20",

    "endDate":"04/28/2020 15:30"

    }

    ],

    "expectedStructure":"--==--"

    }

    ]

    }

    ```


    The goal of the `name` property for each test case is to point at a specific test
    case if a failure occurs. Loading test cases from a file has many advantages:


    *   It’s effortless to add more test cases. You can do that with any editor or
    external script.

    *   It’s also easy to validate those tests. Since it’s a JSON file, your parsing
    code requires a specific structure to run the tests. Think about the previous
    example of creating more and more methods. What are the odds of having a mistake
    with that process?

    *   Anybody can write those tests. You don’t have to know Swift or even coding
    to add more test cases. Heck, you don’t also have to know JSON – it’s possible
    to write them in Excel or some other tool and later on generate a JSON file. Working
    with JSON is extremely practical when you want your QA team to be a part of test
    writing.

    *   The opportunity to save your tests in a readable file can make your life easier
    when trying to understand what exactly you are testing and what scenarios you’re
    covering.

    *   It’s excellent for cross-platform testing. Many tools help you write cross-platform
    code. But if you insist on writing native code on each platform, sharing tests
    is a great way to make sure the implementations are on the same standards.


    One thing to notice when loading data from a JSON file is that you cannot use
    the main bundle for that. The main bundle is only for execution code, not frameworks
    and test code.


    You should do something like this:


    ```

    Bundle(for: type(of: self)).path(forResource: "tests", ofType: "json")

    ```


    ### Invoke Tests Dynamically


    Loading tests from a file is a great way to create many unit tests in a readable
    and accessible format. But we have a problem here; when we want to read our test
    report at the end of the run, we’re going to see only one test – the test method
    that loads the file and loops all the cases.


    Fortunately, XCTest has a neat feature that lets you invoke tests dynamically
    and add them to the test run on runtime.


    #### The XCTestRun Environment


    Before we move on with loading tests dynamically, we need to understand the test
    runtime environment. Take a look at Figure [4-2](#496602_1_En_4_Chapter.xhtml#Fig2).


    ![../images/496602_1_En_4_Chapter/496602_1_En_4_Fig2_HTML.jpg](images/496602_1_En_4_Chapter/496602_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    XCTestRun environment


    We previously discussed the testing runtime, but in fact, running tests is a complicated
    task needed to be managed. XCTest framework uses several tools to accomplish that.


    The first one is `XCTestRun`. `XCTestRun` is an instance created when you start
    your test. It contains useful information, such as the start date of the test
    run, duration, failure count, and more. Also, `XCTestRun` represented in a file
    contains the list of tests and assets.


    In every test run, we also have `XCTestSuite`. `XCTestSuite` is created for every
    `XCTestCase`, and it groups the tests according to the corresponding `XCTestCase`
    it belongs to.


    Think of `XCTestCase` as planning and `XCTestSuite` as the execution.


    Also, remember, `XCTestCase` instance is created for every test method, as we
    discussed before.


    Every `XCTestSuite` has a list of `NSInvocations` which forwards the message to
    the actual test methods that need to run.


    `XCTestSuite` is created automatically on runtime and managed by `XCTestRun`.


    So, if we want to invoke test methods on runtime, we need to find a way to invoke
    more tests in the already created `XCTestSuite`.


    If right now you are confused with the "XCT" classes mentioned, that’s perfectly
    normal. Let’s try to understand it with some code examples.


    #### First Step – Override `defaultTestSuite()` Variable


    Each `XCTestCase` has a class variable called `defaultTestSuite()`:


    ```

    class var defaultTestSuite : XCTestSuite { get }

    ```


    `XCTestRun` uses this variable to get the corresponding test suite for the current
    `XCTestCase` and to run all tests included. What we need to do is to override
    this variable and return our own `XCTestSuite`.


    #### Creating `XCTestSuite` Object


    To create a relevant test suite which is based on the current `XCTestCase`, we
    need to initialize it with the name of the current `XCTestCase` subclass:


    ```

    let testSuite = XCTestSuite(name: NSStringFromClass(self))

    ```


    Passing the class name of the `XCTestCase` creates a test suite with all the tests
    derived from the test case itself.'
  raw: '### Create Abstract Method for Testing


    The trick is straightforward. We create a method (called “runTest” for that matter)
    in this example that does all the dirty work – all the setup, connections, and
    assertion, and all the stuff you don’t want to repeat yourself every test and
    has nothing to do with the actual data being tested.


    For your actual test cases, you create an explicit test method for each one of
    them. These test methods do not assert but, instead, call our “dirty” function
    while passing the relevant data.


    Here is an example:


    ```

    func runTest(withData events : [Event], expectedLayout : LayoutStructure, file
    : StaticString = #file, line : UInt = #line) {

    // act

    let actualStructure = CalendarLayoutGenerator().generateLayout(events: events)

    // assert

    XCTAssertEqual(actualStructure, expectedLayout, file : file, line : line)

    }

    func testGenerateLayout_abstractMethod1() {

    var events = [Event]()

    events.append(Event(startTime: generateDateFromString(str: "04/27/2020 10:00"),
    endTime: generateDateFromString(str : "04/27/2020 11:00")))

    events.append(Event(startTime: generateDateFromString(str: "04/27/2020 10:30"),
    endTime: generateDateFromString(str : "04/27/2020 11:20")))

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 12:30"),
    endTime: generateDateFromString(str : "04/28/2020 12:30")))

    let expectedLayout = LayoutStructure()

    runTest(withData: events, expectedLayout: LayoutStructure())

    }

    func testGenerateLayout_abstractMethod2() {

    var events = [Event]()

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 10:00"),
    endTime: generateDateFromString(str : "04/28/2020 11:00")))

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 10:30"),
    endTime: generateDateFromString(str : "04/29/2020 11:20")))

    events.append(Event(startTime: generateDateFromString(str: "04/29/2020 12:30"),
    endTime: generateDateFromString(str : "04/30/2020 12:30")))

    let expectedLayout = LayoutStructure()

    runTest(withData: events, expectedLayout: LayoutStructure())

    }

    ```


    In the preceding code example, the “runTest()” method is simple, to demonstrate
    how to implement this pattern in more complicated test methods.


    Also, notice the test method receives the *file* and *line* parameters to show
    the precise location where the test fails.


