    \ of testing. Unit Tests are responsible for testing small code pieces of your\
    \ app, such as methods and functions. The unit tests are best for refactors and\
    \ TDD (Test-Driven Development), and you should write as many of them.\n\nThe\
    \ goal of a unit test is to test a specific function or method while ignoring\
    \ and isolating the function from any possible side effect or outer state. Also,\
    \ they are easy to write, run very fast, can be run in parallel, and writing them\
    \ should be a natural step when developing a feature.\n\n**Integration Tests** –\
    \ If we said that unit tests live in isolation and that they focus on testing\
    \ a specific method, there are cases when we need to test the integration between\
    \ two or more layers of the app.\n\nFor example, sometimes we want to test the\
    \ integration between the presenter/view model and the database layer. Integration\
    \ tests are precisely for that. Some say integration tests are the most important\
    \ tests you can have in your project even more than unit tests because, in the\
    \ end, it doesn’t matter how your unit tests perform, it’s how they perform with\
    \ each other.\n\n**UI Tests** – UI Test refers to our app as a black box and uses\
    \ the accessibility layer to activate it. The basic commands can be something\
    \ like “press here” and “scroll there,” and it’s the closest thing to manual testing.\
    \ Although UI Tests can perform as an edge-to-edge tests and can be very useful,\
    \ they are expensive – they are harder to write and run much slower than unit\
    \ tests. They can also break easily with every feature change. Also, since UI\
    \ Tests can look only at the accessibility layer, they cannot produce a code coverage\
    \ report. Therefore, they are not valid if you want to detect untested parts of\
    \ your code.\n\n**Snapshot UI Testing** – Snapshot testing is an addition to UI\
    \ Testing. The way snapshot testing works is to take a snapshot of the screen\
    \ or the view and compare it to a previously captured snapshot that represents\
    \ the required one. The goal here is to identify any visual changes to the app,\
    \ a task that is hard to do in any other way – for example, buttons’ positions,\
    \ font size changes, layout issues, and more.\n\n**Performance Testing** – In\
    \ every project, some methods are doing a massive job. These functions need optimization,\
    \ and one of the best techniques is a performance test. Performance test runs\
    \ your function several times; calculates the average CPU, memory usage, and running\
    \ time; and decides if it passed or failed according to a minimum bar you can\
    \ set in advance.\n\nYou don’t have to cover every part of your project with all\
    \ types of tests. For example, if we are dealing with view controllers or view\
    \ models, we probably want to write **integration tests** to make sure everything\
    \ works as expected when the user interacts with our app. If we need to deal with\
    \ complex functions and classes, we are going to choose **unit tests** to cover\
    \ our functions from all sides. And if these are heavily loaded functions, we\
    \ can also add **performance** tests.\n\nThe secret is to create the right mix\
    \ so that you could monitor your project from different angles and in various\
    \ aspects.\n\n## Summary\n\nWe discussed what software testing is, how it is implemented\
    \ in iOS, and why it’s important. We also talked about different types of tests\
    \ that are relevant for iOS development.\n\nNow, it’s time to pull our sleeves,\
    \ set up our testing infrastructure in Xcode, and integrate it with our project.\n\
    \n# 2. Setting Up Our Infrastructure\n\n> *To an optimist, the glass is half full.\
    \ To a pessimist, the glass is half empty. To a good tester, the glass is twice\
    \ as big as it needs to be.*\n> \n> —Anonymous"
  trans: "\n```markdown\n## 为什么测试如此重要？\n\n如果我们想更深入地理解测试在项目中的重要性，我可以想到以下几个原因：\n\n**重构**\
    \ – 有些人认为重构是一个贬义词，只有在出现危机或代码写得差时才会进行，但重构实际上是开发者日常工作的一部分。当我们编写代码时，是基于特定的产品假设、SDK\
    \ 版本、架构、或是我们自身的经验和视角来进行的。但技术世界（尤其是移动端）的变化日新月异。我们常常发现自己每隔几个月，甚至更短时间，就需要重构部分代码。当我们编写测试时，我们定义的是代码的**行为**，而不是它的实现方式。当我们重构时，需要保持代码行为不变，而测试就是指引我们做到这一点的守护天使。不仅如此，测试实际上将代码的“质量”锁定在特定水平，这是确保我们进行修改时不会破坏任何功能的方法。\n\
    \n**自我检查** – 当我们编写一段代码或一个功能时，需要确保它在所有用例和场景下都能按要求工作。编写测试是检查自我并确保我们覆盖了满足产品需求所需的全部要点的绝佳方式。它也是确保我们覆盖了难以手动测试的边缘情况和用例的好方法。例如，假设我们正在开发一款日历应用，我们需要测试代码在拥有数百甚至数千个日历事件时的表现。模拟一台拥有如此多事件的设备既困难又耗时，更不用说我们需要反复运行这个模拟了。通过编写性能测试来自动化这个过程要高效和轻松得多。\n\
    \n**防止回归** – 代码中的回归不仅可能在我们重构时发生，也可能在我们对某个函数进行微小更改、更新 iOS 版本，甚至在新设备上安装我们的应用时发生。我们的测试覆盖越广，就越有机会捕获那些可能溜进生产环境的回归错误。有时，即使\
    \ QA 人员按照非常详细的测试计划工作，也很难在手动测试中发现回归。例如，快照测试（本章稍后解释）可以检测到 UI 中的细微变化，而性能测试可以检测代码速度或内存使用量的变化。此外，在进行标准的手动回归测试时，捕捉边缘情况问题也很困难，比自动化测试要困难得多。\n\
    \n**更好的代码质量** – 测试可以帮助我们想出代码可能遇到的不同用例。同时，测试可以帮助我们衡量代码资源（CPU/内存）的使用情况并帮助减少它。代码覆盖率报告可以帮助我们检测代码中未经测试的部分，甚至能通过观察代码本身提出我们未曾想到的产品问题。但我认为，测试对代码质量的最大贡献在于迫使我们编写更好的代码，更准确地说，是更好的架构。为了让代码可测试，我们需要编写更简洁、更模块化、更面向协议的代码，这是一个纯粹的收益。\n\
    \n**文档** – 我不得不承认——我讨厌为我的代码编写技术文档。我会写注释，但那只是因为不得不写。否则，即使在写下它们的第二天，我可能也记不清当时想实现什么。测试是为代码编写文档的好方法。试想一下——你选取一个函数，解释在不同参数和不同情况下调用它时期望发生什么。你不会找到比这更好的代码文档了。\n\
    \n## 我们可以测试什么？\n\n简短的回答——一切。\n\n冗长的回答——视情况而定。\n\n如果你查看维基百科的“软件测试”页面，你会发现大约有 20\
    \ 种不同的软件测试技术！但我们的目标是让生活更简单，所以这里只讨论其中一些与我们 iOS 开发者最相关的技术。\n\n**单元测试** – 单元测试是测试的基础。单元测试负责测试应用程序中的小块代码，例如方法和函数。单元测试最适合重构和\
    \ TDD（测试驱动开发），你应该尽可能多地编写单元测试。\n\n单元测试的目标是在忽略并将被测函数与任何可能的副作用或外部状态隔离的情况下，测试一个特定的函数或方法。此外，它们易于编写，运行速度非常快，可以并行运行，在开发功能时编写单元测试应该成为一个自然的步骤。\n\
    \n**集成测试** – 如果说单元测试是孤立存在的，专注于测试特定方法，那么有些情况下我们需要测试应用程序中两个或多个层之间的集成。\n\n例如，有时我们想测试表示层/视图模型与数据层之间的集成。集成测试就是为此而生的。有人说集成测试是你在项目中可以拥有的最重要的测试，甚至比单元测试更重要，因为最终，单元测试各自的表现如何并不重要，重要的是它们如何协同工作。\n\
    \n**UI 测试** – UI 测试将我们的应用视为一个黑盒，并使用无障碍访问（Accessibility）层来操作它。基本指令可以是类似“点击这里”和“滚动到那里”，这最接近手动测试。尽管\
    \ UI 测试可以作为端到端测试并且非常有用，但它们成本高昂——比单元测试更难编写，运行速度也慢得多。而且每次功能变更都可能导致 UI 测试轻易失效。此外，由于\
    \ UI 测试只能查看无障碍访问层，它们无法生成代码覆盖率报告。因此，如果你想检测代码中未经测试的部分，UI 测试是无效的。\n\n**快照 UI 测试**\
    \ – 快照测试是 UI 测试的一个补充。快照测试的工作方式是截取屏幕或视图的快照，然后与之前捕获的代表正确状态的快照进行比较。其目标是识别应用程序中任何视觉上的变化，这是一个用其他方式很难完成的任务——例如，按钮位置、字体大小变化、布局问题等等。\n\
    \n**性能测试** – 在每个项目中，有些方法执行着繁重的任务。这些函数需要优化，而性能测试是最佳优化技术之一。性能测试会多次运行你的函数；计算平均 CPU\
    \ 使用率、内存使用量和运行时间；并根据你可以预先设定的最低标准判断测试是通过还是失败。\n\n你不需要用所有类型的测试覆盖项目的每个部分。例如，如果我们处理的是视图控制器或视图模型，我们可能希望编写**集成测试**，以确保当用户与我们的应用交互时，所有部分都能按预期工作。如果我们需要处理复杂的函数和类，我们会选择**单元测试**来全方位地覆盖我们的函数。如果这些是负载较重的函数，我们还可以添加**性能**测试。\n\
    \n秘诀在于创造恰当的组合，以便你能从不同角度和多个方面监控你的项目。\n\n## 总结\n\n我们讨论了什么是软件测试，它在 iOS 中是如何实现的，以及为什么它很重要。我们还讨论了与\
    \ iOS 开发相关的不同类型的测试。\n\n现在，是时候卷起袖子，在 Xcode 中设置我们的测试基础设施，并将其集成到我们的项目中了。\n\n# 2.\
    \ 设置我们的基础设施\n\n> *对于乐观主义者，杯子是半满的。对于悲观主义者，杯子是半空的。对于一个优秀的测试者，杯子比需要的足足大了一倍。*\n> \n\
    > —佚名\n```\n"
- fmt: '## Introduction


    You cannot start writing tests without a deep understanding of how Xcode projects
    are built and how the testing layer integrates with it.


    In this chapter, you will learn


    1. The basic terms such as scheme, target, and project

    2. How to customize your testing flows using schemes and test bundles

    3. How to disable specific tests from running

    4. How to take advantage of Xcode 11 great feature – Test Plan – to take your
    testing flows to the next level


    ## Basic Terms


    To start testing your app, you need to understand some basic terms in Xcode and
    how your projects are built.


    Let’s start with one of the core Xcode terms – **Project**.


    Project is a big file that maps all the files for your different products, including
    the build settings, assets, and more. It can stand alone, be included in a workspace,
    or be part of other projects.


    > *An Xcode project is a repository for all the files, resources, and information
    required to build one or more software products. A project contains all the elements
    used to build your products and maintains the relationships between those elements.
    It contains one or more targets, which specify how to build products. A project
    defines default build settings for all the targets in the project (each target
    can also specify its own build settings, which override the project build settings).*

    >

    > —Apple Documentation


    A project contains one or more definitions of products called “targets.”


    **Target** – A target represents a product to build and contains all the instructions
    on how to build it, including what files to compile, the build settings, build
    phases, code signing, and capabilities. A target doesn’t have to be an “app.”
    It can also be a framework/library, an extension (such as Today Widget), and,
    in our case, unit/UI test bundles that test other targets.


    So, we understand that a target can be the app itself, and it can be the unit
    test product that tests the app. But how can we tell Xcode what test targets to
    run when we either start our test, build for the app store, or are just debugging
    and on what configuration?


    That’s what Schemes are for.


    **Schemes** – Scheme connect targets with different scenarios (Build, Run, Test,
    Profile, Analyze, and Archive), and it also specifies what targets to run and
    on what configuration.


    The best way to explain that is with Xcode, so let’s start a new app called “My
    Weather” App.


    ## “My Weather” App


    To start a new Project, select File ➤ New ➤ Project…. A Popup dialog appears where
    you request to select a template for your new project. You can choose either iOS,
    watchOS, tvOS, macOS, or even a cross-platform project. Your project doesn’t have
    to be an app; it can also be a framework or a static library (see Figure [2-1](#496602_1_En_2_Chapter.xhtml#Fig1)).


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig1_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig1_HTML.jpg)


    *Figure 2-1 Xcode project template box*


    **Note**


    Not every platform can be tested using Xcode tools. We’ll discuss it later in
    this section.


    After selecting the template, you are forwarded to a second dialog where you need
    to fill some details about your project. Some fields are required in order to
    continue (this is why the “Next” button is disabled). Take a look at the two options
    at the bottom (Figure [2-2](#496602_1_En_2_Chapter.xhtml#Fig2)), circled in red.
    Those options are suggested to you according to the platform and template you
    chose. If you mark them, Xcode creates an infrastructure for unit tests and UI
    tests. You can always do that later.


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig2_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig2_HTML.jpg)


    *Figure 2-2 New project setup box*


    As I mentioned earlier, not all platforms and templates include those options.
    For example, as of this writing, you cannot add tests at all to an Apple Watch
    app. If you create a framework or a library, you can only add unit tests and not
    UI tests. Since our new cutting-edge and award-winning “My Weather” app is an
    iOS app, we can add both unit and UI tests.


    After pressing the “Next” button, our project window is opened (Figure [2-3](#496602_1_En_2_Chapter.xhtml#Fig3)),
    and we can see the new test bundles under the list of targets. In the project
    navigator, we can see the two test bundles, unit and UI tests, as two groups of
    files. Those are the places where we save our coding test. For every target created,
    Xcode is creating a dedicated group of files in the project navigator.


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig3_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig3_HTML.jpg)


    *Figure 2-3 Test targets appear both in the target list and in the file hierarchy*


    **Note**


    There are “Groups” in the project navigator that represent links to actual folders,
    and there are “Groups” that represent logical folders. In this case, the two groups
    that were created refer to two folders in the project root folder.


    ### Add Test Targets to an Existing Project


    Of course, you don’t have to create a new project to add UI and unit tests. It’s
    straightforward to add tests to an existing project – just like adding any new
    target. To add a new test target, go to File ➤ New ➤ Target…. In the “Choose template”
    box that appears on the screen, look for UI Testing bundle or Unit Testing Bundle
    targets. You can take advantage of the search field in the top corner of the box
    (see Figure [2-4](#496602_1_En_2_Chapter.xhtml#Fig4)). Again, not all platforms
    have the option to add tests, so make sure the correct platform is selected.


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig4_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig4_HTML.jpg)


    *Figure 2-4 Adding test target to an existing project*


    After tapping “Next”, you are being navigated to a new dialog pretty similar to
    the new project dialog. Besides all the usual properties you need to fill there,
    such as bundle ID and name, the most important property is the “Target to be Tested.”
    This target is the actual “product” (app or framework) that your new test bundle
    tests. “Target to be Tested” can also be changed later (see Figure [2-5](#496602_1_En_2_Chapter.xhtml#Fig5)).


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig5_HTML.jpg](images/496602_1_En_2_Chapter/496602_1_En_2_Fig5_HTML.jpg)


    *Figure 2-5 Choose options for new test target*'
