- fmt: "# 1. Introduction for Testing\n\n> *If you don’t like unit testing your product,\
    \ most likely your customers won’t like to test it either.*\n>\n> —Anonymous\n\
    \n## Introduction\n\nSoftware testing is a complementary process to your development\
    \ flow. It may be the only way to monitor your work and your project over time,\
    \ and as a result, it has a positive impact on how your project is built and how\
    \ your code is written.\n\nThis book takes you from the very beginning of what\
    \ software testing is, how to set up an excellent infrastructure, how to write\
    \ a great, clean, testable code, and of course how to test your code in many ways\
    \ and techniques.\n\nIn this first chapter, you will learn\n*   What is software\
    \ testing\n*   How software testing is relevant for us, iOS developers\n*   Why\
    \ it’s so important\n*   What are the different main types of testing which we\
    \ can use\n\n## How to Read This Book\n\nAlthough it’s possible to read this book\
    \ in chronological order, you don’t have to follow that rule. There are some theoretical\
    \ chapters that I recommend you start with, and for the practical chapters’ part,\
    \ you can read them in any order you want.\n\nEven if you have a lot of experience\
    \ with writing tests, I believe you can find new useful tips and exciting techniques\
    \ to leverage your coding and testing skills.\n\nThere are plenty of code samples\
    \ and examples throughout the book you can try yourself and even add them to your\
    \ existing tests (if you have some).\n\n## What Is Software Testing?\n\nTesting\
    \ is a process aimed to retrieve information about the quality of an app, a feature,\
    \ or a function. Developers and QA testers manage testing by running a program\
    \ that examines your app code and decides if it's ready for production or if it's\
    \ broken.\n\nThe testing process can investigate your app in several ways – product\
    \ requirements, edge cases, performance, memory, different screens/devices, or\
    \ integrations. In many cases, testing is a part of a continuous deployment service\
    \ or integration, where it plays a significant role in an automatic deployment\
    \ process to the App Store or TestFlight.\n\n## Software Testing in iOS\n\nIf\
    \ you haven’t written tests yet, the test target may look like an alien to you.\
    \ To be aligned, take a look at the marked part in Figure [1-1](#496602_1_En_1_Chapter.xhtml#Fig1).\n\
    \n![../images/496602_1_En_1_Chapter/496602_1_En_1_Fig1_HTML.jpg](images/496602_1_En_1_Chapter/496602_1_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1 Test targets in Xcode project\n\nThose are your project’s test targets,\
    \ and their primary mission is to help you monitor your code quality and performance.\
    \ This is done using test functions when each of them is responsible for a specific\
    \ use case.\n\nA test function might look something like this:\n\n```\nfunc testPrimeNumberFunction()\
    \ {\n    // arrange\n    let number = 7\n    // act\n    let result = MathService().isPrimeFunction(number:\
    \ number)\n    // assert\n    XCTAssertTrue(result)\n}\n```\n\nThe preceding code\
    \ is an example of a simple test function that checks if a function called `isPrimeFunction()`\
    \ is working correctly.\n\nNote\nAlthough all the code examples in this book are\
    \ written in Swift, you can write tests in Objective-C as well. But I’m sure you’ll\
    \ be able to understand most of my examples even if your Swift knowledge is poor.\n\
    \nAs iOS developers, we write functions every day. Some of them are very simple,\
    \ but some are incredibly complex. How can we make sure they perform as expected\
    \ in different cases? Not only that – how can we make sure we don’t break them\
    \ over time as our project gets bigger?\n\nIf we consider ourselves professional\
    \ developers, writing tests is not a “nice to have” task – it’s a must. And if\
    \ we write clean code, it can also be easy and straightforward.\n\nIn general,\
    \ the more test functions you have, the better your code will be monitored and\
    \ controlled.\n\nThis book aims not only to show you how to write great and useful\
    \ tests. It also aims to influence your work culture."
