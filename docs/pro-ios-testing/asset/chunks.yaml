- fmt: '# Location of Your Screenshots


    Many developers run their tests not on a local machine but in a continuous integration
    environment. Therefore, they do not have access to Xcode, especially to the Report
    Navigation pane. In this case, we need access to the screenshot’s files.


    Up until Xcode 11, it was easy to access the attachments – they were located in
    a folder named “Attachments” in the project’s derived data folder.


    But in Xcode 11, Apple made significant changes in the test results’ file structure,
    and now it’s much more complicated to analyze the test results.


    ## About XCResult


    Xcode saves each one of your test reports to a file with a type of “XCResult”.
    Those files are located in the derived data folder under `Logs/Test/`:


    ```

    ~/Library/Developer/Xcode/DerivedData//Logs/Test/

    ```


    XCResult file is a package, containing a general `.plist` file and a data folder
    with a bunch of binary files.


    You can open the XCResult file in Xcode just by tapping it. But if you want to
    parse it, you may encounter some difficulties and can be cumbersome.


    To parse XCResult file, you need to use the provided `xcresulttool` tool provided
    by Xcode:


    ```

    xcrun xcresulttool get --path <your_file.xcresult> --format json

    ```


    Running this command doesn’t extract your attachments, but it gives you some general
    details about your test run.


    At this point, you need to locate your test within the JSON and run this command
    on the specific test by its id:


    ```

    xcrun xcresulttool get --path <your_file.xcresult> --format json –-id <test_id>

    ```


    On some point, you’ll see the attachments section you were waiting for. Then you
    need to run the export command:


    ```

    xcrun xcresulttool export –path <your_file.xcresult> --output-path <output_path>
    --id <attachment_id>

    ```


    As you can see, it’s not that easy to export attachments from the XCResult file.
    One option to overcome it is to write your own script to do it easily. Another
    option can be using an open source command tool that is doing just that. For example,
    `XCParse` (`https://github.com/ChargePoint/xcparse`) is a tool that can extract
    those attachments with only one command:


    ```

    xcparse -s <your_file.xcresult> <output_path>

    ```


    ## More Attachment Types


    There are additional types of attachments rather than screenshots. For example,
    you can attach files, strings, audio, and more.


    These are the types of available attachments you can create:


    *   Images

    *   Screenshots

    *   Data blob

    *   Zip archive

    *   Texts


    Let’s take a look at how we can create a simple text attachment:


    ```

    let stringAttachment = XCTAttachment(string: "Email: \(emailEntered)")

    stringAttachment.lifetime = .keepAlways

    add(stringAttachment)

    ```


    And this is how it looks in your test report (Figure [7-16](#496602_1_En_7_Chapter.xhtml#Fig16)).


    ![../images/496602_1_En_7_Chapter/496602_1_En_7_Fig16_HTML.jpg](images/496602_1_En_7_Chapter/496602_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Text attachment in the test report


    You should think about attachments as your way to log your test and leave small
    pieces of information that can help you investigate your test failures.


    # More Great UI Test Features


    Xcode UI Testing framework has more features and capabilities if you have additional
    needs. For example, it can help you test your Siri integration, check how your
    app interacts with other installed apps, and make an advanced dragging gesture.


    ## Testing Your Siri Integration


    If your app has a Siri integration, you can start your test with launching it
    using a Siri phrase:


    ```

    XCUIDevice.shared.siriService.activate(voiceRecognitionText: "Open My Weather")

    ```


    If you have a Siri intent, you can verify it like we’ve learned earlier in this
    chapter – querying your screen elements and asserting them.


    Note


    For Siri intents, I recommend you use unit testing. There is no point in testing
    the UI of something that is entirely logical.


    ## Multiple App Testing


    If you recall at the beginning of the chapter, I mentioned it is possible to initialize
    your `XCUIApplication` object with a specific bundle identifier. If you have multiple
    apps and you want to test them together, this is an excellent way of doing that:


    ```

    func testMultipleAppsIntegration() {

    let todoApp = XCUIApplication(bundleIdentifier: "com.myTodoApp.www")

    let notesApp = XCUIApplication(bundleIdentifier: "com.myNotesApp.www")

    todoApp.launch()

    todoApp.buttons["seeMyNotesButton"].tap()

    notesApp.activate()

    notesApp.buttons["addNewNoteButton"].tap()

    _ = notesApp.textViews["notesTextView"].waitForExistence(timeout: 0.5)

    notesApp.textViews["notesTextView"].tap()

    notesApp.textViews["notesTextView"].typeText("This is my note")

    notesApp.buttons["saveNewNote"].tap()

    todoApp.activate()

    // check that the new note appears in todo app as well

    }

    ```


    What you do need to be aware of is that now you have a new method called `activate()`.
    Unlike `launch()`, `activate()` doesn’t terminate the current running app, but
    lets you open another app while keeping the existing app alive.


    Note


    The “Springboard” (the main screen of iOS where you have all your apps) is also
    an app you can activate with the bundle identifier “com.apple.springboard”. Try
    it!


    ## Dragging Using XCUICoordinate


    It is possible to simulate almost any finger movement you want by using something
    called `XCUICoordinate`. `XCUICoordinate` is an object that represents a location
    on the screen relative to a specific element. This element can be even the app
    itself (`XCUIApplication` object).


    After you have a coordinate, you can press it and “drag” it to another coordinate.


    For example, here is a code snippet demonstrating how to do a “pull to refresh”
    easily:


    ```

    func testPullToRefresh() {

    let app = XCUIApplication()

    let fromCoordinate = app.coordinate(withNormalizedOffset: CGVector(dx: 0, dy:
    10))

    let toCoordinate = app.coordinate(withNormalizedOffset: CGVector(dx: 0, dy: 20))

    fromCoordinate.press(forDuration: 0, thenDragTo: toCoordinate)

    }

    ```


    The chances are that you are not going to need it for most of your use cases,
    but for the ones that you need, it can be convenient.


    # Summary


    UI Tests are harder to maintain for many reasons. But they are great for many
    tasks as well, sanity checks, for example. They can also be an excellent alternative
    to integration tests. My recommendation to you is to implement UI testing in your
    critical flows and cover them.


    Another thing UI Tests are useful for is performance tests. We’ll discuss performance
    tests in detail in the next chapter.


    # 8. Cover Another Aspect of Your App – Performance Testing


    > *Just as athletes can’t win without a sophisticated mixture of strategy, form,
    attitude, tactics, and speed, performance engineering requires a good collection
    of metrics and tools to deliver the desired business results.*

    >

    > —Todd DeCapua


    ## Introduction


    Performance Tests are another aspect of software testing. We can say that performance
    tests are not about “if things work” but rather “how things work,” and that positions
    them as a unique test bundle compared to the other test methods.


    In this chapter, you will learn


    *   What is the basic idea of performance testing

    *   How `measure()` function works and how to define a baseline

    *   The different metrics you can use starting from Xcode 11

    *   How to configure your tests

    *   How to write a-sync performance testing

    *   Where Xcode saves your test baseline information so you can adjust it to your
    CI/CD environment'
