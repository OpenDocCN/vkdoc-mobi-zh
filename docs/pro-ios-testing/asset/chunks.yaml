- fmt: '### Verification Failure


    Let’s say that we made some UI re-design in a specific screen in our app by changing
    the particular font size. What we didn’t know is that we broke our CityWeather
    screen.


    Let’s see what happens when we run our snapshot test (see Figure [9-7](#496602_1_En_9_Chapter.xhtml#Fig7)).


    ![../images/496602_1_En_9_Chapter/496602_1_En_9_Fig7_HTML.jpg](images/496602_1_En_9_Chapter/496602_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Regression in snapshot testing


    The verification function detects the UI has been changed and causes our test
    to fail.


    Now, one of the essential things in tests is the ability to identify the reason
    for the failure.


    Back to the scheme editor, we had to define a variable named `IMAGE_DIFF_DIR`.
    This is an optional variable that contains the path for the diff folder in case
    of a failure.


    Let’s go back now to our file system (Figure [9-8](#496602_1_En_9_Chapter.xhtml#Fig8)).


    ![../images/496602_1_En_9_Chapter/496602_1_En_9_Fig8_HTML.jpg](images/496602_1_En_9_Chapter/496602_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    FailureDiffs folder in case of a failure


    We see that we have three images:


    *   `Reference`_<name_of_test_function> – This is the snapshot file that was created
    when we initially ran the test in record mode.


    *   `Failed`_<name_of_test_function> – This is the latest snapshot that failed.
    This one is different from the reference UI.


    *   `Diff`_<name_of_test_function> – This is the most important file here. This
    is an image that shows only the difference of pixels between the two images.


    Let’s open the three files (Figure [9-9](#496602_1_En_9_Chapter.xhtml#Fig9)).


    ![../images/496602_1_En_9_Chapter/496602_1_En_9_Fig9_HTML.jpg](images/496602_1_En_9_Chapter/496602_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    The three images FBSnapshotTestCase generated for us


    At first glance, it seems that the reference and the failed snapshot are identical –
    something that could easily slip our eyes. But the diff image clears things up
    – we can see that the temperature’s font size has increased. The diff image shows
    only that change, so we can directly focus on the change.


    ### Snapshot Testing Configuration


    The best thing about snapshot testing is its simplicity – with literally two lines
    of code, we can create a snapshot test that detects changing our eyes can barely
    see at first glance.


    But it doesn’t mean we cannot adjust and tune the test for our needs.


    #### Include Device Information


    By default, the generated snapshot file name is composed only out of the test
    method name, for example:


    ```

    testSnapshotMainScreen@2x.png

    ```


    Of course, this means that if we want to check our views on different devices
    and OS versions, this might be a problem.


    Fortunately, the `FBSnapshotTestCase` class has a property named `fileNameOptions`,
    which lets you configure the name of the file:


    ```

    override func setUp() {

    super.setUp()

    self.recordMode = true

    self.fileNameOptions = [.device, .OS ,.screenSize]

    }

    ```


    The generated file name, now when running on iPhone 11 simulator with iOS 13,
    is


    ```

    testSnapshotMainScreen_iPhone_13_6_414x896.png

    ```


    Personally, I think this is very handy, especially when testing full-screen views,
    when there are significant changes with safe area spaces between devices.


    #### Control the Tolerance for Changes and More


    In my last example, we see that a small change caused our test to fail. And this
    might be awesome – those regressions are sometimes hard to catch. The only question
    is “how much do we care?” We are aware that our changes can cause regressions
    here and there, but sometimes we want our test to fail, starting from a certain
    level of difference.


    If you need more control over your snapshot testing, you can use the `snapshotVerifyViewOrLayer`
    function.


    This function has some interesting parameters:


    *   `viewOrLayer` – You can pass either view (`UIView`) or a Core Animation Layer
    (`CALayer`).


    *   `Identifier` – Why do we need an identifier? Well, you know our views are
    usually dynamic, meaning we can configure them to display different data or states.
    The identifier you give to your snapshot is also added to the snapshot file name.
    This means you can test your screen/view in different states and keep a reference
    image for each state. This may sound optional, but I find this option extremely
    useful.


    *   `Suffixes` – Here, you can add a suffix to your test folder.


    *   `perPixelTolerance` – A float represents the tolerance to changes in the RGB
    of your pixels. “0” means no change is acceptable, and “1” means every change
    is acceptable.


    *   `overallTolerance` – This is the total tolerance for changes (both color and
    pixel location).


    *   `defaultReferenceDirectory` – In case you don’t define the reference directory
    in your scheme, you can do it here.


    *   `defaultImageDiffDirectory` – Same goes here. You can define the diff directory
    right from your snapshot assertion function.


    Let’s take a look on how to use it:


    ```

    func testSnapshotMainScreen() {

    let controller = CityWeatherViewController(nibName: "CityWeatherViewController",
    bundle: nil)

    controller.city = "New York"

    let result = snapshotVerifyViewOrLayer(controller.view.layer, identifier: "NewYork",
    suffixes: ["cities"], overallTolerance: 0.1, defaultReferenceDirectory: nil, defaultImageDiffDirectory:
    nil)

    XCTAssertEqual(result, "")

    }

    ```


    As you can see, the directory parameters are not mandatory, and you can just pass
    nil in case it’s already defined in your scheme.


    ## Summary


    Snapshot Testing is a great way to write tests that involve big chunk or serialized
    data quickly. But it really shines when talking about UI Snapshot Testing.


    My recommendation is to take the simple path. It is easy to set up and maintain,
    but as always, too much of it can cause you big headaches in the future. In fact,
    some developers ignore snapshot as a principle manner.


    # 10. Implement Tests in Our Daily Work Routine


    > *No amount of testing can prove a software right, a single test can prove a
    software wrong.*

    >

    > —Amir Ghahrai


    ## Introduction


    We discussed many types of tests – unit, integration, performance, UI, and snapshot
    tests. But if you ask me what the most challenging task in writing tests is, I
    would say actually writing them.


    Being a developer is not easy. Our daily schedule is full of stress – deadlines,
    bugs, documentation to read, meetings, and some of us have an angry boss who sits
    on our head. Eventually, we are full of excuses for why we don’t have time right
    now for tests.


    Writing the right tests, narrowing down the important ones, and deciding what
    will be the focus, this are another challenges that we, as iOS Developers, have
    to deal with.


    In this chapter, you will learn


    1.  How to write tests as part of your development routine

    2.  How to build a good mix of unit, integration, and UI tests

    3.  How to compose test scenarios

    4.  What is “code coverage” and how to manage it in Xcode


    ## How Do We Start?


    So, to solve that, we need to understand the keys that we need to follow.


    ### Tests Are Part of the Development Task


    While many developers tend to leave writing tests to the end of the development
    cycle, this is a crucial mistake. First, in most cases, our development tasks
    encounter difficulties, and we need to give up on something to finish our feature
    by time. What is more comfortable than giving up on writing tests? We “know” our
    app works fine; anyway we have a QA session, and we do have a deadline.


    We need to understand that writing tests are an integral part of the development
    itself. Wrote a complicated function? We write a unit test for her to make sure
    our code works fine. When we postpone it to the end of the development session,
    we’re, in fact, saying “If everything works out exactly as planned, I’ll have
    time to write tests.” Most chances are it’s not going to happen.'
