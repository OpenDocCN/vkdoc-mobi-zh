    For example, it is much simpler to implement than the initializer way, and it
    can be convenient when **subclassing or doing that on a XIB-based view**.


    It also **doesn’t require you to refactor existing constructors**, which can be
    quite a headache in many projects and let you easily add new dependencies to an
    existing class.


    But Property-Based injection also has some downsides. It requires you to **expose
    instant variables** when all you want is to assign them. Another consideration
    is that the injection **is not part of any interface** the compiler can assure
    or notifies us, so you may not know what the dependencies are or how to inject
    them.


    #### The Compromised Way – Parameter-Based DI


    The Parameter-Based way doesn’t require you to change your constructor signature
    or expose your instance variables . The idea behind Parameter-Based DI is to inject
    the dependencies only to the method you call using its arguments:


    ```

    class CitiesManager {

    func refreshCitiesFromServer(networkClient : NetworkClientProtocol = NetworkClient.shared,
    dataBaseClient : DatabaseClientProtocol = DatabaseClient.shared) {

    networkClient.fetchCities {[weak self] (data) in

    if data != nil {

    self?.saveCitiesDataToDisk(data: data!)

    }

    }

    }

    private func saveCitiesDataToDisk(data : Data, dataBaseClient : DatabaseClientProtocol
    = DatabaseClient.shared) {

    dataBaseClient.saveCitiesDataToDB(data: data)

    }

    }

    let citiesManager = CitiesManager()

    citiesManager.refreshCitiesFromServer(networkClient: myCustomNetworkClient, dataBaseClient:
    myCustomDatabaseClient)

    ```


    Not only you don’t expose your instance variables; in many cases, you do **not
    even have dependencies as instance variables**. The Parameter-Based injection
    can help you make your functions pure, which can make your testing much easier.


    ## SOLID Principles


    SOLID is an acronym that represents five important design principles that can
    help you write understandable and easier to maintain code and, as a result, a
    more testable one.


    Following these principles is not hard, but it requires you to pay attention whenever
    you decide to create a new method.


    Let’s go over them.


    ### S – Single-Responsibility Principle


    This means an object should do one thing and should be the only object in your
    project that does this thing. It’s harder to maintain methods and classes that
    are responsible for several things, and breaking them is just a matter of time.
    For example, if your method parses a network response and writes to the disk,
    split it into two methods and test them separately.


    ### O – Open/Closed Principle


    A class should be open to extension but closed to change. Whenever you’re done
    writing a method/class and testing it, consider it closed. If you need to add
    its behavior, do it by subclassing, dependency injection, or using Swift extensions
    (or Objective-C Categories). This will help you decrease the number of test’s
    rewrites every time you need to change something and also help you avoid regressions.'
