    ## 简介


    如果没有深入了解 Xcode 项目是如何构建的，以及测试层如何与之集成，你就无法开始编写测试。


    在本章中，你将学到：


    1.  scheme、target 和 project 等基本术语

    2.  如何使用 scheme 和测试包来自定义你的测试流程

    3.  如何禁用特定测试的运行

    4.  如何利用 Xcode 11 的强大功能——测试计划（Test Plan）——将你的测试流程提升到新的高度


    ## 基本术语


    要开始测试你的应用，你需要理解 Xcode 中的一些基本术语以及你的项目是如何构建的。


    让我们从一个核心的 Xcode 术语开始——**项目（Project）**。


    项目是一个大型文件，它为你的不同产品映射了所有文件，包括构建设置、资源等等。它可以独立存在，可以被包含在一个工作空间（workspace）中，或者作为其他项目的一部分。


    > *Xcode 项目是构建一个或多个软件产品所需的所有文件、资源和信息的存储库。项目包含用于构建产品的所有元素，并维护这些元素之间的关系。它包含一个或多个目标（target），这些目标指定了如何构建产品。项目为其内部的所有目标定义了默认的构建设置（每个目标也可以指定其自己的构建设置，这些设置会覆盖项目的构建设置）。*

    >

    > —Apple 官方文档


    一个项目包含一个或多个产品定义，称为“目标（target）”。


    **目标（Target）** – 一个目标代表一个要构建的产品，并包含了如何构建它的所有指令，包括要编译的文件、构建设置、构建阶段、代码签名和能力。一个目标不一定是一个“应用”。它也可以是一个框架/库、一个扩展（例如今日小组件），以及在我们这里，用于测试其他目标的单元/UI
    测试包。


    那么，我们明白了目标可以是应用本身，也可以是测试该应用的单元测试产品。但是，当我们开始测试、为应用商店构建，或者只是进行调试时，我们如何告诉 Xcode 要运行哪些测试目标，以及使用什么配置呢？


    这就是**方案（Scheme）** 的作用。


    **方案（Scheme）** – 方案将目标与不同的场景（构建、运行、测试、性能分析、分析和归档）连接起来，并且它还指定了要运行哪些目标以及使用什么配置。


    解释这一点最好的方式是使用 Xcode，所以让我们启动一个名为“我的天气”的新应用。


    ## “我的天气”应用


    要开始一个新项目，选择 文件 ➤ 新建 ➤ 项目…。会出现一个弹出对话框，要求你为新项目选择一个模板。你可以选择 iOS、watchOS、tvOS、macOS，甚至是一个跨平台项目。你的项目不一定是应用；它也可以是一个框架或一个静态库（参见图
    2-1）。


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig1_HTML.jpg](img/496602_1_En_2_Fig1_HTML.jpg)


    *图 2-1 Xcode 项目模板选择框*


    **注意**


    并非所有平台都可以使用 Xcode 工具进行测试。我们将在本节后面讨论这个问题。


    选择模板后，你会被引导到第二个对话框，你需要填写一些关于项目的详细信息。有些字段是必须填写的才能继续（这就是为什么“下一步”按钮是禁用的）。请看底部的两个选项（图
    2-2，用红圈圈出）。这些选项是根据你选择的平台和模板建议给你的。如果你勾选了它们，Xcode 会为单元测试和 UI 测试创建基础结构。你以后随时可以再添加。


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig2_HTML.jpg](img/496602_1_En_2_Fig2_HTML.jpg)


    *图 2-2 新项目设置框*


    正如我前面提到的，并非所有平台和模板都包含这些选项。例如，截至本文撰写时，你无法为 Apple Watch 应用添加任何测试。如果你创建的是一个框架或库，则只能添加单元测试，不能添加
    UI 测试。由于我们全新、前沿且屡获殊荣的“我的天气”应用是一个 iOS 应用，我们可以同时添加单元测试和 UI 测试。


    按下“下一步”按钮后，我们的项目窗口打开了（图 2-3），我们可以在目标列表中看到新的测试包。在项目导航器中，我们可以看到两个测试包，单元测试和 UI 测试，作为两组文件。这些是我们保存编码测试的地方。对于创建的每个目标，Xcode
    都会在项目导航器中创建一个专用的文件组。


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig3_HTML.jpg](img/496602_1_En_2_Fig3_HTML.jpg)


    *图 2-3 测试目标同时出现在目标列表和文件层次结构中*


    **注意**


    项目导航器中有代表指向实际文件夹链接的“组（Groups）”，也有代表逻辑文件夹的“组”。在本例中，创建的两个组指向项目根文件夹中的两个文件夹。


    ### 向现有项目添加测试目标


    当然，你不需要为了添加 UI 和单元测试而创建一个新项目。向现有项目添加测试非常简单——就像添加任何新目标一样。要添加一个新的测试目标，请转到 文件 ➤ 新建
    ➤ 目标…。在屏幕上出现的“选择模板”框中，寻找 UI 测试包或单元测试包目标。你可以利用该框顶角的搜索字段（参见图 2-4）。再次说明，并非所有平台都有添加测试的选项，因此请确保选择了正确的平台。


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig4_HTML.jpg](img/496602_1_En_2_Fig4_HTML.jpg)


    *图 2-4 向现有项目添加测试目标*


    点击“下一步”后，你会被导航到一个与新项目对话框非常相似的新对话框。除了所有需要填写的常规属性，如 bundle ID 和名称外，最重要的属性是“要测试的目标（Target
    to be Tested）”。这个目标是你的新测试包要测试的实际“产品”（应用或框架）。“要测试的目标”之后也可以更改（参见图 2-5）。


    ![../images/496602_1_En_2_Chapter/496602_1_En_2_Fig5_HTML.jpg](img/496602_1_En_2_Fig5_HTML.jpg)


    *图 2-5 为新测试目标选择选项*

