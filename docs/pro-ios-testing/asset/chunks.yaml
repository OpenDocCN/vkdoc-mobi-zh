  trans: '

    # 耦合类型


    但我们说“耦合的对象”时，究竟指的是什么？存在几种耦合类型——`Subclass`（子类）、`Shared Object`（共享对象）、`Dependencies`（依赖）和
    `Side Effects`（副作用）。


    ## 子类耦合


    当一个类继承自另一个类时，它依赖于其超类，这两个类就变得耦合。不仅如此——整个继承层次结构都是耦合的。但这只是逻辑上的——想想看，当你重写一个有五层继承关系的类中的方法时，你知道会发生什么吗？很多开发者在可能只需使用协议就能减少耦合的情况下，却选择了子类化。


    ## 共享对象


    当不同的对象修改共享对象上的属性，并且同时依赖于该共享对象时，它们就通过共享对象耦合在一起。重新思考该共享对象是否确实需要被共享。这是 `Singleton`（单例）模式的缺点之一——在整个系统中共享一个对象会降低你预测代码作为系统如何运行的能力。


    其次，你需要考虑对更改共享对象状态的限制——哪些对象允许在何时更改其状态。能够更改状态的对象越少，耦合程度就越小。


    ## 依赖


    如果你的类依赖于另一个类，并且无法更改它，那么你就面临紧密耦合。有很多方法可以解耦此类情况——从注入新依赖、委托模式、基于协议的依赖，甚至使用闭包。


    ## 副作用


    始终检查代码中是否存在副作用。如果你有一个函数会修改其他对象的属性或更改持久化数据，这些就是副作用。尽量将副作用减到最少。遵循“单一职责原则”，将这些副作用隔离到一个地方，从而松解对象之间的耦合。


    # 如何解耦现有代码？


    解耦现有代码不一定是一项大的重构任务。有时，只需进行一些小改动就足以降低项目中的耦合程度。


    首先，让我们了解一下什么是耦合级别。


    ## 耦合严重级别


    我们有四个严重级别：


    ### 紧耦合


    一个类持有的依赖项完全无法被替换，即使是同一个类的实例也不行。“紧耦合”通常发生在依赖项是常量（`let`）且无法设置的情况下。


    ### 耦合


    在“耦合”级别，依赖项依赖于一个特定的类，意味着我们可以用同一个类或其子类（除非标记为 `final`）的对象来替换该依赖项。虽然这仍然被视为一种耦合关系，但比紧耦合好得多。通常，这可以通过将依赖项设为公共变量或添加一个构造函数来在初始化时设置依赖项来实现。


    ### 松耦合


    在松耦合级别，类不依赖于特定的类，而是依赖于一个协议。松耦合通过让你连接对象而不将它们约束于具体的实现，进一步扩展了可能性范围。在松耦合级别，你可以轻松地创建模拟/存根并在测试中连接它们。你还可以在运行时组合具有不同实现的对象。


    ### 解耦


    在“解耦”级别，对象之间的关系不是基于类类型，甚至不是基于协议。这并不意味着完全没有依赖——我们确实有依赖。但它们可以通过闭包或通知进行通信。实现这一点后，你不仅可以在项目中重用你的类；很可能还可以在其他项目之间重用（有时只需稍作修改）。


    ## 修改你的代码


    让我们看看如何修改代码来改善我们的耦合级别。


    这里我们有我们的 `LoginPresenter` 类：


    ```

    class LoginPresenter {

    let networkClient = NetworkClient()

    }

    ```


    我们看到这个类有一个名为 `networkClient` 的依赖项。因为它是一个 `let` 依赖项，这意味着我们完全无法更改它。因此，它是 `Tightly
    Coupled`（紧耦合）级别。如果我们想改善耦合级别，只需做一个小修改——将 `let` 改为 `var`：


    ```

    class LoginPresenter {

    var networkClient = NetworkClient()

    }

    ```


    很好！现在我们可以将 `networkClient` 变量更改为不同的对象，只要它来自同一个类（`NetworkClient`）或其子类之一。


    现在，我们不再是 `Tightly Coupled` 了，我们将耦合级别提升到了 `Coupled`（耦合）。但我们不必就此止步——我们可以再添加一些东西来改进它：


    ```

    class LoginPresenter {

    var networkClient : NetworkClientProtocol = NetworkClient()

    }

    ```


    现在我们的变量不再属于 `NetworkClient` 类型。实际上，`networkClient` 变量可以容纳任何符合 `NetworkClientProtocol`
    的对象。这让我们可以连接具有不同实现的其他对象，甚至是模拟和存根。


    使用协议将我们的耦合级别提升到了 `Loosely Coupled`（松耦合）。


    如前所述，我们可以跳过这三个步骤，直接进入 `Decoupling`（解耦）级别，在那里我们可以使用闭包或通知。


    通过这种方式，调用闭包或通知的类不关心依赖项的类型或接口。在大多数情况下，它甚至不关心是否存在依赖项：


    ```

    typealias doLoginClosure = ()->Void

    class LoginPresenter {

    var doLoginClosure : doLoginClosure?

    func onLoginButtonTapped() {

    doLoginClosure?()

    }

    }

    ```


    最新的例子很简单，但它让“解耦”这个术语更加清晰。


    解耦对象减少了你在测试中需要进行的模拟数量。当任何对象或代码片段都可以是依赖项时，即使是你的测试方法也可以为测试实现所需的行为。


    # 减少耦合的更多方法


    减少耦合的另一种方法是编写函数的方式。我们在对象上遵循的相同原则也可以在函数中实现。例如，纯函数（我们之前已经讨论过）是解耦代码片段的一个极佳示例。


    函数大小也是如此——当你有一个函数处理多项任务时，你就是在将职责耦合在一起。


    看看下面的代码：


    ```

    class myScreenPresenter {

    var view : myScreenViewProtocol?

    func onTappedSave(fileURL : URL) {

    NetworkClient.shared.fetchCities {[weak self] (data) in

    try! data?.write(to: fileURL)

    NotificationCenter.default.post(name: NSNotification.Name(rawValue: "DataSavedNotification"),
    object: nil)

    self?.view?.dismiss()

    }

    }

    }

    ```


    方法 `onTappedSave()` 有太多职责——它访问网络，保存返回值，发布通知，还要求视图关闭自身。我们已经知道需要编写单一职责的函数，但这也是原因之一——我们将太多任务链式连接在一起。这不仅是一种不好的做法——而且每当我们想要测试与获取请求无关的东西（如保存或处理数据）时，都迫使我们伪造网络客户端。


    创建小的函数也有助于我们减少测试替身的使用，通过创建在许多情况下不需要模拟的简短代码片段。


    # 比较


    断言部分并不总是那么简单。比较 `Int`、`Strings` 和 `Boolean` 值很直接。但是比较你自己的类呢？颜色呢？数组呢？


    在某些情况下，你需要对代码进行修改，以使测试在断言部分更容易进行。

    '
- fmt: "# 比较的问题\n\n假设我们有一个“Person”类：\n\n```swift\nclass Person {\n    var personID:\
    \ String\n    var firstName: String\n    var lastName: String\n    init(personID:\
    \ String, firstName: String, lastName: String) {\n        self.personID   = personID\n\
    \        self.firstName  = firstName\n        self.lastName   = lastName\n   \
    \ }\n}\n```\n\n在我们的测试中，我们想要比较两个“Person”对象，看看它们是否相等。\n\n我们可以这样做：\n\n```swift\n\
    XCTAssertEqual(person1.personID, person2.personID)\nXCTAssertEqual(person1.firstName,\
    \ person2.firstName)\nXCTAssertEqual(person1.lastName, person2.lastName)\n```\n\
    \n当然，这样可行，但得承认这看起来不像一个优雅的断言部分。此外，像我们之前学的那样，编写一个自定义的断言方法会让人觉得代码有异味——我们试图比较来自同一个类的两个对象。这应该天生就是可能的。\n\
    \n我们也可以尝试这样做：\n\n```swift\nXCTAssertEqual(person1, person2)\n```\n\n但这甚至无法编译——我们会得到一个编译错误：\n\
    \n```\nGlobal function 'XCTAssertEqual(_:_:_:file:line:)' requires that 'Person'\
    \ conform to 'Equatable'\n```\n\n错误信息指出“Person”需要遵循“Equatable”协议。这是什么意思？\n\n##\
    \ Equatable 协议\n\n原始值（`Int`、`String`、`Boolean`）很容易比较和断言，但类和结构体需要额外的工作。\n\n为了比较不同的对象或结构体，我们需要扩展这些类型并实现\
    \ **Equatable** 协议。\n\n让我们以“Person”类为例：\n\n```swift\nextension Person: Equatable\
    \ {\n    static func ==(lhs: Person, rhs: Person) -> Bool {\n        return lhs.personID\
    \ == rhs.personID\n    }\n}\n```\n\n在这段代码片段中，我们使用“personID”属性来比较`Person`，但如果你愿意，也可以扩展到`firstName`和`lastName`。\n\
    \n现在，`XCTAssertEqual(person1, person2)` 就可以正常工作了，你可以像使用原始值一样在测试中使用它。\n\n## Comparable\
    \ 协议\n\n有时`Equatable`不足以创建简单的测试，我们需要更复杂的比较。这就是`Comparable`协议的用武之地。\n\n如果`Equatable`让我们定义相等和不等，那么建立在`Equatable`之上的`Comparable`协议，则让你能够比较对象并识别哪个“更大”或“更小”。“Comparable”在排序任务中很有用，在测试中也同样有用。\n\
    \n让我们给“Person”类添加一个“age”属性：\n\n```swift\nclass Person {\n    var personID: String\n\
    \    var firstName: String\n    var lastName: String\n    var age: Int\n    init(personID:\
    \ String, firstName: String, lastName: String, age: Int) {\n        self.personID\
    \   = personID\n        self.firstName  = firstName\n        self.lastName   =\
    \ lastName\n        self.age        = age\n    }\n}\n```\n\n现在我们想根据它的 **age**\
    \ 属性进行比较。使用“<”和“>”运算符不起作用，因为我们需要明确定义如何比较两个人。\n\n让我们使用`Comparable`协议来扩展“Person”：\n\
    \n```swift\nextension Person: Comparable {\n    static func < (lhs: Person, rhs:\
    \ Person) -> Bool {\n        return lhs.age < rhs.age\n    }\n}\n```\n\n现在，按大小比较`Person`就完全可以了：\n\
    \n```swift\nXCTAssertGreaterThan(person1, person2)\n```\n\n你可能注意到这里有些特别。我们知道在比较对象时可以使用“<”、“>”、“<=”和“>=”运算符。在`Comparable`协议中，仅实现“<”函数就足以支持其他运算符。顺便问一下，那“<”函数本身呢？当然也应该进行测试。\n\
    \n## 比较 UIImages\n\n如果你想测试一个生成图像的方法，你可能需要验证生成的图像是否正确。不幸的是，仅使用“==”运算符来比较`UIImage`是不行的。\n\
    \n幸运的是，我们有简单的工具来解决这个问题。\n\n诀窍是将这些图像转换为`Data`，然后比较两个数据对象。使用图像数据比较，就能符合我们之前讨论过的`Equatable`协议：\n\
    \n```swift\nfunc ==(lhs: UIImage, rhs: UIImage) -> Bool {\n    if let lhsData\
    \ = lhs.pngData(), let rhsData = rhs.pngData() {\n        return lhsData == rhsData\n\
    \    }\n    return false\n}\n```\n\n然后就可以：\n\n```swift\nXCTAssertEqual(image1,\
    \ image2)\n```\n\n比较`UIImage`在测试中听起来可能不常见，但当你有这样的使用场景时，这个扩展可以节省你大量时间。\n\n## 比较数组\n\
    \n比较数组可能有点棘手，因为我们需要解决以下几个问题：\n\n*   我们需要确保数组中的**项可以被比较**。如果数组不包含原始值（`Int`、`String`、`Boolean`），而是引用或结构体，我们需要确保它们都符合之前讨论过的`Comparable`或`Equatable`协议。\n\
    *   我们需要决定是否**关心元素的顺序**。有时我们只想检查两个数组是否包含相同的元素，而不考虑顺序。\n*   另一个问题是**重复元素**——与`Set`不同，数组可以包含重复项。重复项会导致测试失败吗？还是我们可以忽略它？\n\
    \n当你想要断言数组时，这些都是需要自问的问题。\n\n## 比较在测试中的重要性\n\n比较是编写代码的重要组成部分，但在测试中，它甚至更为关键。比较对象和值是我们测试断言部分最常做的任务之一，可能发生在我们身上最危险的事情是**假阴性**，这源于`Equatable`协议的不充分实现。\n\
    \n此外，使用`Equatable`和`Comparable`协议可以简化你的测试技术，因此你应该深入学习它们。\n\n# 参数化单元测试\n\n假设我们正在构建一个日历应用程序，我们编写了一个很棒的函数，它接收一个日历事件列表，并生成布局信息来帮助我们在屏幕上显示它们。\n\
    \n函数的签名大致如下：\n\n```swift\nclass CalendarLayoutGenerator {\n    func generateLayout(events:\
    \ [Event]) -> LayoutStructure {\n        // 这里是生成布局的代码。\n    }\n}\n```\n\n为`generateLayout()`函数编写一个测试方法似乎很简单。我们需要创建一个`Event`对象数组，一个预期的`LayoutStructure`，运行测试方法，然后比较它们。对于如此重要的测试来说，这不是一项复杂的工作：\n\
    \n```swift\nfunc testGenerateLayout() {\n    var events = [Event]()\n    events.append(Event(startTime:\
    \ generateDateFromString(str: \"04/27/2020 10:00\"), endTime: generateDateFromString(str:\
    \ \"04/27/2020 11:00\")))\n    events.append(Event(startTime: generateDateFromString(str:\
    \ \"04/27/2020 10:30\"), endTime: generateDateFromString(str: \"04/27/2020 11:20\"\
    )))\n    events.append(Event(startTime: generateDateFromString(str: \"04/28/2020\
    \ 12:30\"), endTime: generateDateFromString(str: \"04/28/2020 14:20\")))\n   \
    \ var expectedStructure = LayoutStructure()\n    // 用预期的结果修改 expectedStructure\n\
    \    // act\n    let actualStructure = CalendarLayoutGenerator().generateLayout(events:\
    \ events)\n    // assert\n    XCTAssertEqual(actualStructure, expectedStructure)\n\
    }\n```\n\n前面的测试方法只涉及一个用例；然而，我们有许多布局变体需要验证。\n\n所以，我们可以复制我们的测试方法，只改变/添加/删除相关的值。\n\
    \n复制一个方法对于2-3种情况可能是个不错的解决方案，但如果我们想用10-15种不同的数据变化来运行相同的测试呢？\n\n多次复制我们的测试方法可能在第一天有效，但随着时间的推移，它可能导致我们的测试出问题。\n\
    \n对`generateLayout()`方法签名的任何小改动都会迫使我们“查找并替换”类中的所有测试方法。\n\n对断言部分的任何改进都要求我们重构所有的测试方法。\n\
    \n对我们的测试机制或执行代码的任何微小更改，都可能要求我们费力地修改我们创建的大量测试列表。\n\n为了使我们测试代码更易于维护，我们需要做的是找到一种运行多个测试用例的方法，其中**它们之间唯一的区别是数据**。一个选择是在我们的测试方法之上创建一个抽象层。"
  raw: '### The Problem with Comparing


    Let’s say we have a “Person” class:


    ```

    class Person {

    var personID : String

    var firstName : String

    var lastName : String

    init(personID : String, firstName : String, lastName : String) {

    self.personID   = personID

    self.firstName  = firstName

    self.lastName   = lastName

    }

    }

    ```


    In our tests, we want to compare two “Persons” to see if they are equal.


    We can do something like this:


    ```

    XCTAssertEqual(person1.personID,person2.personID)

    XCTAssertEqual(person1.firstName,person2.firstName)

    XCTAssertEqual(person1.lastName,person2.lastName)

    ```


    Sure, it works, but admit it doesn’t look like an elegant assertion part. Also,
    writing a custom assertion method as we’ve learned has a code smell that something
    is wrong here – we are trying to compare two objects from the same class. It should
    be naturally possible.


    We can also try this one:


    ```

    XCTAssertEqual(person1, person2)

    ```


    But this doesn’t even compile – we get a complication error:


    ```

    Global function ''XCTAssertEqual(_:_:_:file:line:)'' requires that ''Person''
    conform to ''Equatable''

    ```


    The error message states that “Person” needs to conform to the “Equatable” protocol.
    What does it mean?


    ### Equatable Protocol


    Primitive values (Int, String, Boolean) are easy to compare and assert, but classes
    and structs require extra work.


    To compare different objects or structs, we need to extend those types and implement
    the **Equatable** protocol .


    Let’s take the example of a “Person” class:


    ```

    extension Person : Equatable {

    static func ==(lhs: Person, rhs : Person)->Bool {

    return lhs.personID == rhs.personID

    }

    }

    ```


    In this code snippet, we make the comparison of Person using the “personID” property,
    but you can also extend it to first and last name if you want.


    Now, the `XCTAssertEqual(person1, person2)` is working correctly, and you can
    use it in your tests just like primitive values.


    ### Comparable Protocol


    Sometimes Equatable is not useful enough to create easy tests, and we need something
    more elaborate. This is where the Comparable protocol gets in.


    If Equatable lets us define equality and inequality, Comparable protocol, which
    is built on top of Equatable, lets you compare between objects and identify which
    is “bigger” or “smaller.” “Comparable” is helpful with ordering tasks, but it’s
    also useful for testing.


    Let’s take our “Person” class and add it an “age” property:


    ```

    class Person {

    var personID : String

    var firstName : String

    var lastName : String

    var age : Int

    init(personID : String, firstName : String, lastName : String, age : Int) {

    self.personID   =   personID

    self.firstName  =   firstName

    self.lastName   =   lastName

    self.age        =   age

    }

    }

    ```


    Now we want to compare it by its **age** property. Using the “<” and “>” operators
    doesn’t work because we need to define exactly how to compare two persons.


    Let’s extend “Person” using Comparable protocol:


    ```

    extension Person : Comparable {

    static func  Bool {

    return lhs.age < rhs.age

    }

    }

    ```


    Now it’s perfectly fine to use the compared “Person” by size:


    ```

    XCTAssertGreaterThan(person1, person2)

    ```


    You probably noticed something unique here. We know we can use “<”, “>”, “<=”,
    and “>=” operators when comparing objects. In Comparable protocol, implementing
    only the “<” function does the job for the rest of the operators. By the way,
    is the “<” function? It should also be tested, of course.


    ### Compare UIImages


    If you want to test a method that generates images, you probably want to verify
    that the generated image is the correct one. Unfortunately, comparing UIImages
    just by using the “==” operator doesn’t work.


    Lucky for us, we have simple tools to fix that.


    The trick is to convert those images to Data and compare the two data objects.
    Using the image data comparison makes it possible to conform to the Equatable
    protocol we discussed earlier:


    ```

    func ==(lhs: UIImage, rhs: UIImage) -> Bool {

    if let lhsData = lhs.pngData(), let rhsData = rhs.pngData() {

    return lhsData == rhsData

    }

    return false

    }

    ```


    And then:


    ```

    XCTAssertEqual(image1, image2)

    ```


    Comparing UIImage may not sound like a common task in testing, but when you have
    a use case for that, this extension can save you a lot of time.


    ### Compare Arrays


    Comparing Arrays can be a little bit tricky since we have several issues we need
    to address here:


    *   We need to make sure the items in the array **can be compared**. If the array
    doesn’t contain primitive values (Int, String, Boolean) but references or structs,
    we need to make sure they are all compliant with Comparable or Equatable protocols,
    as discussed earlier.


    *   We need to decide if we care about **the order of the elements**. Sometimes
    we just want to check if both arrays contain the same elements regardless of their
    order.


    *   Another thing is **duplicate elements** – unlike *Set*, Arrays can contain
    duplicate items. Does a duplicate item cause our test to fail, or can we ignore
    it?


    These are questions you need to ask yourself when you want to assert arrays.


    ### Comparison Is Critical in Testing


    Comparison is an essential part of writing code, but in testing, it’s even more
    critical. Comparing objects and values is one of the most common tasks we do in
    the assertion part of the test, and the most dangerous thing that can happen to
    us is **False Negative**, due to inadequate implementation of Equatable protocol.


    Also, using Equatable and Comparison protocols can simplify your testing techniques,
    so you should learn them deeply.


    ## Parameterized Unit Tests


    Let’s say we are building a calendar application, and we write a great function
    that takes a list of calendar events and generate layout information to help us
    display them on the screen.


    The function signature looks something like this:


    ```

    class CalendarLayoutGenerator {

    func generateLayout(events : [Event])->LayoutStructure {

    // This is where the generated code takes apart.

    }

    }

    ```


    Writing a test method for the “generateLayout()” function seems straightforward.
    We need to create an array of *Event* objects, an expected *LayoutStructure*,
    run the test method, and compare between them. It’s not a complicated work for
    such an important test:


    ```

    func testGenerateLayout() {

    var events = [Event]()

    events.append(Event(startTime: generateDateFromString(str: "04/27/2020 10:00"),
    endTime: generateDateFromString(str : "04/27/2020 11:00")))

    events.append(Event(startTime: generateDateFromString(str: "04/27/2020 10:30"),
    endTime: generateDateFromString(str : "04/27/2020 11:20")))

    events.append(Event(startTime: generateDateFromString(str: "04/28/2020 12:30"),
    endTime: generateDateFromString(str : "04/28/2020 14:20")))

    var expectedStructure = LayoutStructure()

    // modify expectedStructure with the expected results

    // act

    let actualStructure = CalendarLayoutGenerator().generateLayout(events: events)

    // assert

    XCTAssertEqual(actualStructure, expectedStructure)

    }

    ```


    The preceding testing method refers to only one use case; however, we have many
    layout variations we want to verify.


    So, we can duplicate our testing method and just change/add/remove the relevant
    values.


    Duplicating a method can be a decent solution for 2–3 cases, but what if we want
    to run the same test with 10–15 data variations?


    Duplicating our testing method so many times may work on the first day, but over
    time, it can cause our tests to break.


    Any small change to the generateLayout() method signature forces us to “find and
    replace” all the test methods in the class.


    Any improvement to the assertion part makes us refactor all the test methods.


    Any small change in our testing mechanism or our execution code might require
    us to work hard and modify the long list of tests we created.


    What we need to do to make our testing code more maintainable is to find a way
    of running multiple test cases, where the **only difference between them is the
    data**. One option is to create an abstracting layer above our test methods.'
