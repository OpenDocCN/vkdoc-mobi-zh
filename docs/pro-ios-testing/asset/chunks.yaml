- fmt: "# XCTestExpectation Pattern\n\nLet’s look at our `testImageProcessing()` method\
    \ refactored for asynchronous testing:\n\n```\nfunc testImageProcessing() {\n\
    \    // arrange\n    let image = UIImage(named: \"cats\")!\n    let manager =\
    \ CatsProcessingManager()\n    // act\n    var cuteCats = 0\n    // creating an\
    \ expectation to get number of cats.\n    let expectation = self.expectation(description:\
    \ \"Counting number of cats\") //1\n    manager.findCuteCats(image: image) { (numberOfCuteCats)\
    \ in\n        cuteCats = numberOfCuteCats\n        // we've got an answer. our\
    \ expectation is fulfilled!\n        expectation.fulfill() //2\n    }\n    //\
    \ assert\n    // let's wait 5 seconds before asserting...\n    waitForExpectations(timeout:\
    \ 5.0, handler: nil) //3\n    XCTAssertEqual(cuteCats, 3)\n}\n```\n\nIn the preceding\
    \ code, we can see the three parts I mentioned earlier. Let’s go over them:\n\n\
    ```\nlet expectation = self.expectation(description: \"Counting number of cats\"\
    ) //1\n```\n\nWhen we want to create an asynchronous test, we create a `XCTestExpectation`\
    \ object. On its initialization, we pass an informative description that can help\
    \ us understand what expectation was not fulfilled if our test failed.\n\nIt is\
    \ possible to create multiple expectations for the same test:\n\n```\nexpectation.fulfill()\
    \ //2\n```\n\nWhen the asynchronous operation finishes its work, we call the `fulfill()`\
    \ method of the expectation object we created previously. In most cases, it’s\
    \ best practice to call the `fulfill()` function even when the completion block\
    \ failed. Don’t be confused – `fulfill()` doesn’t mean our test passed; it just\
    \ means we can move on to the assertion part. The terminology of “expectation\
    \ is fulfilled” can be mixed with the “Expect” part of our test, so beware!\n\n\
    ```\nwaitForExpectations(timeout: 5.0, handler: nil) //3\n```\n\nBefore the assertion\
    \ part, we call `waitForExpectations()` method. What this method does is to stop\
    \ the test execution until all the expectations are fulfilled or the timeout was\
    \ reached.\n\nIf the timeout is reached, our test fails automatically. When all\
    \ the expectations are fulfilled, it’s time for you to assert:\n\n```\nXCTAssertEqual(cuteCats,\
    \ 3)\n```\n\n## Fulfill Multiple Times for One Expectation\n\nThere are tests\
    \ when we want to execute an asynchronous code several times before we can say\
    \ the expectation is fulfilled, and we can move on to the assertion part. For\
    \ that kind of test, `XCTestExpectation` has a property called `expectedFulfillmentCount`:\n\
    \n```\nlet expectation = self.expectation(description: \"executing closure code\
    \ 3 times\")\nexpectation.expectedFulfillmentCount = 3\n```\n\nA good use case\
    \ for that is a music player that needs to update the progress of the song a few\
    \ times. The expectation can count the number of times it gets called and then\
    \ moves on to the assertion part when it reaches a specific number.\n\n## Assert\
    \ When the Expectation Is Not Fulfilled\n\nOK, I need you to stay focused on this\
    \ one. There are cases when we want to make sure a code **is not** being executed.\
    \ In other words, if our expectation is fulfilled, our test fails.\n\nIn this\
    \ case, we can use the `isInverted` property (default is “false”):\n\n```\nlet\
    \ expectation = self.expectation(description: \"Code is not executed\")\nexpectation.isInverted\
    \ = true\n```\n\nA good use case for `isInverted` property is **permissions handling**.\
    \ We want to make sure parts of our code are **not being** executed in a specific\
    \ configuration and states.\n\n## Expect Array of Expectations, Ordered\n\nIf\
    \ you have multiple expectations in a test method, you don’t have to wait for\
    \ them separately. Just wait at the end of the test method while passing the array\
    \ of expectations:\n\n```\nwait(for: [loadFromFileExpectation, locateCuteCatsExpectation],\
    \ timeout: 2.0)\n```\n\nYou can even make sure all the expectations fulfilled\
    \ in a provided order!\n\n```\nwait(for: [loadFromFileExpectation, locateCuteCatsExpectation],\
    \ timeout: 2.0, enforceOrder: true)\n```\n\n## XCTestExpectation Subclasses\n\n\
    Now that you have “wait” + “fulfill” + “assert” tools, basically, every a-sync\
    \ job can be tested using `XCTestExpectation`. But Xcode 8.3 brought several improvements\
    \ in that area in order to make those tasks much easier to build and read.\n\n\
    Let’s look at the following code:\n\n```\nfunc testIfNotificationRaised() {\n\
    \    let expectation = self.expectation(description: \"Notification Raised\")\n\
    \    _ = NotificationCenter.default.addObserver(forName: NSNotification.Name(\"\
    notif\"), object: nil, queue: nil, using: { (notification) in\n        expectation.fulfill()\n\
    \    })\n    NotificationCenter.default.post(name: NSNotification.Name(\"notif\"\
    ), object: nil)\n    waitForExpectations(timeout: 0.1, handler: nil)\n}\n```\n\
    \nIn this code, we are trying to test if a notification was raised. We add an\
    \ observer, and when we receive it, we fulfill the expectation. In the following\
    \ line, we post the notification and wait 0.1 seconds for the expectation for\
    \ being fulfilled.\n\nSimple, ha? Well, the problem is that most of our tests\
    \ **don't** look like this example. The observing code is usually located somewhere\
    \ else, not even in our test code, and this is also true for posting the notifications\
    \ in most cases:\n\n```\nfunc testMyScree_savingData_checkNotificationReceived\
    \ () {\n    // arrange\n    let dataConnector = DataLayer()\n    let myScreen\
    \ = MyScreen()\n    // act\n    dataConnector.save()\n    // assert\n    // checking\
    \ if myScreen receives a \"data updated\" notification...\n}\n```\n\nIn the preceding\
    \ example, we have some data layers and a UI Screen. The test is to save some\
    \ data and check if the screen receives a “data updated” notification.\n\nWe understand\
    \ that the posting notification code is inside the data layer and the observer\
    \ code is inside the UI Screen. So how do we check it?\n\n> The current discussed\
    \ example is not really a “unit test,” but an integration test. We'll talk about\
    \ Integration tests later in this book.\n\nOK, so we can add some closure or delegate\
    \ pattern to pass the event from the `myScreen` class to the test method, but\
    \ this requires us to change our code only to make our tests easier to test. This\
    \ may be true in many cases, but not in this case – no one observes this event,\
    \ only the test method.\n\nFortunately, we have the ability to observe notification\
    \ calls in our tests very easily.\n\nLet’s solve the issue we have in our test\
    \ method:\n\n```\nfunc testMyScreen_savingData_checkNotificationRaised () {\n\
    \    // arrange\n    let dataConnector = DataLayer()\n    let myScreen = MyScreen()\n\
    \    let expectation = self.expectation(forNotification: NSNotification.Name(\"\
    dataUpdated\"), object: nil, handler: nil)\n    // act\n    dataConnector.save()\n\
    \    // assert\n    waitForExpectations(timeout: 0.1, handler: nil)\n}\n```\n\n\
    As you can see, we are adding `expectation(forNotification:)`. When the notification\
    \ is raised, the expectation is fulfilled. Notice we are not checking if `myScreen`\
    \ receives the notification. This is something you need to do some other way,\
    \ for example, checking its state.\n\n# Summary\n\n`XCTest` is a robust framework,\
    \ and it can help you set up an excellent testing suite very easily.\n\nAlso,\
    \ we’ve learned how to write structured test methods and how to write them as\
    \ part of a test case life cycle.\n\nBut those are only the basics – in the next\
    \ chapter, we will learn how to leverage our skill and write useful and maintainable\
    \ unit tests.\n\n# Writing Tests – Advanced Techniques\n\n> *More than the act\
    \ of testing, the act of designing tests is one of the best bug preventers known.\
    \ The thinking that must be done to create a useful test can discover and eliminate\
    \ bugs before they are coded – indeed, test-design thinking can discover and eliminate\
    \ bugs at every stage in the creation of software, from conception to specification,\
    \ to design, coding and the rest.*\n>\n> —Boris Beizer"
