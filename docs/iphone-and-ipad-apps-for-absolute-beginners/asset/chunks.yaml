- fmt: '# 76. As a geek, you likely want to have the proper "Ü" character in your
    last view controller''s navigation bar.


    Initially, in the video and in [figures 7–76](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos581760)
    through [7–85](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos587857),
    I explained exactly how to do this. It was a beautiful thing. But then something
    happened along the way. Mac OS X Lion removed the need for this entirely; an unexpected
    surprise. Now, you simply hold the `u` key until a little window appears, and
    you make the selection you need. Similar variations are available for other characters.
    You can explore these at your leisure.


    So, all these steps, between [figures 7–76](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos581760)
    and 7–89, were going to be taken out, but then something else funny happened.
    Many universities and community colleges had recently updated to Mac Leopard and
    would not have a Lion license for another year, at least. This meant that there
    would be thousands of students left clueless as to how to create the proper "Ü".
    So, if you have Lion, hold the `u` key down until the correct letter appears,
    and then go to [Figure 7–86](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos588378).
    If you do not have Lion, then follow along. Start by opening the System Preferences
    app from the Apple menu, as shown in [Figure 7–76](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos581760).


    ![images](images/00302.jpg)


    **Figure 7–77.** Open the Language & Text preferences panel.


    # 77. Open the Language & Text preferences panel in the top row, as shown in [Figure
    7–77](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos583435).


    ![images](images/00303.jpg)


    **Figure 7–78.** Select the Keyboard & Character Viewer.


    # 78. In the Input Sources tab, select the Keyboard & Character Viewer from the
    source list. Also, turn on the menu item, as shown near the bottom in [Figure
    7–78](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos583928).


    ![images](images/00304.jpg)


    **Figure 7–79.** Minimize this window to free up screen space.


    # 79. Now, minimize this window to free up screen space. You''ll turn the menu
    item back off later. See [Figure 7–79](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos584490).


    ![images](images/00305.jpg)


    **Figure 7–80.** Bring up the Character Viewer.


    # 80. Now, from the new icon that popped up in the menu bar, select Show Character
    Viewer. A tiny keyboard shows up. As you type on your keyboard, the keys will
    be highlighted, as shown in [Figure 7–80](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos585011).


    ![images](images/00306.jpg)


    **Figure 7–81.** You want the orange keys.


    # 81. Holding the option key shows a plethora of symbols that you can type. The
    orange keys are for special keys with marks above the characters in other languages,
    such as "ö" or "ê". Mmm, this is exactly what you want. See [Figure 7–81](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos585603).


    ![images](images/00307.jpg)


    **Figure 7–82.** Enter your Über Geek!


    # 82. Back in Xcode, double-click the `ÜberView`''s title bar to edit it. Start
    by typing option-u and watch the little keyboard below. Now you have two dots
    in a yellow box. The next letter you type will have these marks above it. Type
    shift-u. Ta-da—Ü. Finish it with "ber Geek," as shown in [Figure 7–83](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos586924).


    ![images](images/00308.jpg)


    **Figure 7–83.** Voila! You now have a proper spelling for Über.


    # 83. [Figure 7–83](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos586924)
    shows the proper spelling of Über Geek.


    ![images](images/00309.jpg)


    **Figure 7–84.** Close the keyboard.


    # 84. [Figure 7–84](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos587389)
    illustrates how you can close the keyboard just like any other window.


    ![images](images/00310.jpg)


    **Figure 7–85.** Hide the menu item.


    # 85. As mentioned earlier, you may want to hide the menu item from the preference
    panel that you minimized earlier, as shown in [Figure 7–85](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos587857).


    ![images](images/00311.jpg)


    **Figure 7–86.** Save it!


    # 86. Let''s save everything and test it out, as shown in [Figure 7–86](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos588378).


    ![images](images/00312.jpg)


    **Figure 7–87.** Run it!


    # 87. [Figure 7–87](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos588816)
    illustrates the final step—running it.


