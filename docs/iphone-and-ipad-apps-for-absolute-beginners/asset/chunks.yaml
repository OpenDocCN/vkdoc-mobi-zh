- fmt: '## Before We Get Started


    This introductory chapter will ensure that you have all of the required tools
    and accessories to proceed fully and confidently through this book. Some of you
    may already have `Xcode`, an up-to-date iOS simulator, and `Interface Builder`
    installed on your Mac and you may believe that because you are solid on these
    points, you are ready to jump right in. If so, you may want to jump ahead to [Chapter
    2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161) and start immediately
    on your first program.


    It will behoove you, though, to understand why I teach certain things and skip
    over others. For those of you who have never programmed in Objective-C, it is
    quite a challenge—even for my engineering students who know Java, C, and C#. Nevertheless,
    with the appropriate preparation and mindset, you will accomplish programming
    in Objective-C.


    So—I urge you to read on. The time you will invest in this chapter will be well
    worth it in peace of mind and confidence. [Chapter 1](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_010.html#filepos54331)
    will help to structure the way that your brain will file away all of the rich
    content that is to come.


    ### Necessities and Accessories


    In order to program for the iPhone and/or iPad, and to follow along with the exercises,
    tutorials, and examples presented in this book, you’ll need to have 5 minimal
    requirements. You may not completely understand them right now, but that’s OK—just
    roll with me for a second. I’ll explain everything as we go through these steps.
    Briefly, the 5 you need are:


    *   A Mac

    *   The correct operating system for your Mac called an “OS X"

    *   Registration as a developer (discussed in detail below)

    *   The correct operating system for your iPhone, called an iOS

    *   The correct Software Development Kit for your iPhone, called an SDK that runs
    a program called `Xcode`.


    Let’s go into some of these in a bit more detail.


    First, you will need an Intel-based Macintosh running Lion (OS X 10.7.2 or later).
    If your system was bought after 2006, you’re OK. I purposely program everything
    on a MacBook bought in 2006. All of the videos on the net are screencast from
    either my MacBook from 2006, or if I broadcast from my 2010 iMac, I first run
    it on my MacBook bought in 2006. You don’t need the latest revved up Mac. If you
    haven’t bought one yet, I suggest you get a basic, no-frills MacBook Air. If you
    do own an older Mac, then you may be able to add some RAM. Make an appointment
    at the Genius Bar at an Apple Store and ask them to increase the RAM as much as
    possible. Also, ask them explicitly: “Can this old computer run Lion at least
    10.7.2, iOS5, and Xcode 4.2 or later?”


    If you do not have a Mac, then keep in mind that, as mentioned, I have made a
    point to code and run every program in this book on Apple’s smallest and cheapest
    model, the MacBook. Apple has discontinued the MacBook; they now sell the MacBook
    Air for $999, which is more advanced than the Author’s MacBook. You can purchase
    a MacBook on eBay and other such sites. See [Figure 1–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos58924).


    > ![images](images/00008.jpg)

    >

    > Figure 1–1. I use the cheapest 2006 Mac on the market, the MacBook, to perform
    all the coding and compiling in this book. Essentially, there is no need at all
    to buy a more expensive or higher-end Mac to perform all the exercises.


    Second, you will need the correct OS X. As I write this, it is OS X 10.7.2. We
    need to make sure that you have the latest and greatest operating system (OS X)
    inside your Mac. I cannot tell you the number of emails and forum questions that
    show that many of you will think: “Ahh my code probably did not compile correctly
    because Dr. Lewis has a different OS X or/and iOS on his machine …”


    **NOTE**: The operating system that runs your computer (OS X) is different from
    the iPhone/iPad Operating System, commonly known as “iOS.” Even if you think that
    everything is up to date, I suggest that you follow along with me and make sure
    that your system has the latest OS X and the latest iOS inside it. As you follow
    along with me and tackle all the programs that I teach you in this book, there
    will be times when your code will not work the first time you run it. In fact,
    most of the time your code will not work the first time you run it (or “compile
    it” as us geeky guys say.) So! Let’s take care of this now.


    Close every program running on your Mac, so that the only program running is “Finder”.
    Go up to the little apple located on the upper left-hand corner of your Mac and
    select “About This Mac,” as illustrated in [Figure 1–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos61094).


    ![images](images/00009.jpg)


    Figure 1–2. Go to your Desktop, click on the Apple, and select “About This Mac.”


    Once you have selected this, you will see a window called “About This Mac,” as
    illustrated in [Figure 1–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos61620).


    ![images](images/00010.jpg)'
