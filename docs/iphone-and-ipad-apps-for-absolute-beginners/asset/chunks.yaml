    \ `UIViewController` 子类，一个用于执行此操作，另一个用于从 Google 服务器获取所需的所有数据。我们还需要一个“我的位置”（`myPos`）Objective-C\
    \ 类，就像在 myStory_01 中做的那样，用于保存当前位置。那么，让我们开始创建这 3 个类：按 ![images](img/00031.jpg)N\
