- fmt: '### Header Files


    Look at this code, not in terms of methods but instead from the dimension of it
    being a header file and how it relates to its implementation file. I want you
    to go back to the point in time after you dragged and dropped your items that
    I called “goodies” onto the header file. Looking back at [Figure 3–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos196589),
    I want you to focus more on the bold text.


    **NOTE:** When naming things in code, you will represent “User Interface” with
    the initials `UI`. You will represent “Interface Builder” with the initials `IB`.


    ![Images](images/00105.jpg)


    There are two things to note here. First, the `@` symbol talks to the innermost
    part of Xcode, which transforms your code into actions, and second, that it’s
    got something essential and important to announce. In fact, we call any statement
    beginning with `@` a “directive.” This `@interface` directive tells Xcode that
    you have interface stuff concerning `helloWorld_03`, and that the particulars
    will be enclosed within brackets `{}`.


    Before you began dragging outlets into your code in [Figure 3–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos186389),
    notice how the opening bracket, `{`, was empty! You had not said anything yet,
    right? You knew what you wanted to do, so you got the compiler’s attention with
    the `@interface` directive, by creating your `IBOutlet`s (Interface Builder Outlets)
    to write on your `UILabel`s (User Interface Labels) and to have a separate Action
    associated with your button.


    ### The Inspector Bar


    Back in Step 8, [Figure 3–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos176529),
    while briefly explaining the Inspector Bar, I said that we’d get into it a little
    more. So as promised, here is some insight as to how the Inspector Bar is set
    up.


    ![images](images/00106.jpg)


    **Figure 3–34.** Focusing in on the Inspector Bar.


    In [Figure 3–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos217547),
    I’ve recreated how I illustrate the Inspector Bar in class on the marker board.
    As you become familiar with the Xcode 4 environment, you will find yourself using
    the Inspector Selector Bar to choose a workspace that you will need at any phase
    of your coding. For now, let’s zoom in on the most intense view: the Utilities
    View. Clicking on Utilities View, as shown in the top right-hand of [Figure 3–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos217547),
    you will see how I’ve created a zoomed up version of the Inspector Selector Bar,
    with its submenus located to the left of the panel. Starting at the top:


    - **File inspector**: This is where one manages file attributes such as name,
    type, and path within your project.

    - **Quick Help**: Just what it says.

    - **Identity inspector**: Gives access to deep stuff such as class names, access,
    and labels.

    - **Attributes inspector**: For adjusting attributes available to an object.

    - **Size inspector**: Allows you to tinker with an interface object’s initial
    size, position, and auto sizing.

    - **Connections inspector**: Allows you to view the outlets and actions for your
    interface objects.

    - **Bindings inspector**: For configuring bindings for view objects.

    - **Effects inspector**: To adjust animation protocol such as transitions, fades,
    and other visual characteristics of selected objects.

    - **File templates**: Common templates that you can drag from the library to the
    project navigator.

    - **Code snippets**: Like clip art but for coders—snippets of source code that
    you can use by dragging into your files.

    - **Objects**: You use these interface objects by directly dragging onto your
    nib file in the Interface Builder editor window.

    - **Media files**: Just as it says, they are graphics, icons, and sound files
    that can be dragged directly to your nib file in the Interface Builder editor
    window.


    ### NSStrings


    Going back and digging a little deeper into the `NSString` statement in your implementation
    file, I went over this with sufficient detail while you wrote it. Here are five
    terms that I want you to associate about `NSString`s:


    - `Output` is your returned value: `Output = [[NSString alloc] initWithFormat:@"%@
    says: Hello World!", Name];`

    - On the right-hand side of the equal sign is the message: `Output = [[NSString
    alloc] initWithFormat:@"%@ says: Hello World!", Name];`

    - `NSString` alloc is the receiver: `Output = [[NSString alloc] initWithFormat:@"%@
    says: Hello World!", Name];`

    - `initWithFormat` is the method name: `Output = [[NSString alloc] initWithFormat:@"%@
    says: Hello World!", Name];`

    - `@"%@ says: Hello World!"` and `Name` are the parameters: `Output = [[NSString
    alloc] initWithFormat:@"%@ says: Hello World!", Name];`


    ### More on Memory Management


    At the end of Step 29, [Figure 3–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos202316),
    in “Step Four: Housekeeping,” we spoke a little about `alloc` and how you allocated
    memory and released it at critical times in your app. I want you to have one last
    look at the implementation code you wrote for the button, but view it in terms
    of memory leaks and management.


    ![Images](images/00107.jpg)


    Looking above, you can see how you first allocated some memory for your string.
    This is represented by the superscript ^(+1), to show that you have gone up one
    level and are allocating memory. Each time you go up one level, you need to also
    fall down one level by releasing that memory as shown by the ^(−1) at the release.
    It’s really easy—when you `alloc`, you need to `release`. In Objective-C, this
    is called reference counting. Where I see students suffer is those times that
    after they `alloc`, they will also perform a `retain`. If you do find yourself
    having to retain some memory after you’ve allocated, then view it as [alloc+1]
    + [retain+1], which means that you have gone two, not one, levels up. This means
    that you need to release not once but twice. In summary:


    - [alloc^(+1)] needs + [release^(−1)]

    - [alloc^(+1)] + [retain^(+1)] needs [release^(−1)] + [release^(−1)]


