  trans: "\n### 将按钮和背景设置为起始状态\n\n让我们来看看如何将所有按钮和背景设置为其起始状态。这是为了在程序开始运行前创建一个干净的状态。为了在代码中创建干净的状态，我们需要将状态改变变量设置为零（或设置为\
    \ `nil`）。我们有三个这样的变量来指示状态是否发生了变化：`hasMoved`、`hasShrunk` 和 `currentBackground`。请记住，`hasMoved`\
    \ 和 `hasShrunk` 都是布尔值，因此它们的值可以是 `YES` 或 `NO`。显然，它们的起始状态是尚未被移动过。因此，我们需要将 `hasMoved`\
    \ 和 `hasShrunk` 都设置为 `NO`。剩下的是 `currentBackground`，它负责追踪当前处于背景中且用户正在查看的是五张壁纸中的哪一张。回想一下，我们将\
    \ `currentBackground` 声明为整数类型。这很简单：我们只需将其设置为零。请参见以下加粗的代码：\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    hasMoved = NO;\n    hasShrunk = NO;\n    currentBackground\
    \ = 0;\n\n    // 创建一个包含所有壁纸的数组\n    // 设置缩小按钮将“噜噜水果”图标缩小的程度\n    // 设置移动按钮将“噜噜水果”图标移动的程度\n\
    \    // 将背景图片设置为当前背景图片\n}\n```\n\n### 创建包含所有壁纸的数组\n\n现在，我们需要创建一个数组（本质上是一个事物列表），并将我们的壁纸放入其中。用极客的说法来解释就是：“我们需要创建一个\
    \ `NSArray` 对象，并用一些类型为 png 的对象来初始化它”。这听起来不算太难理解，对吧？回想一下，我们确实在头文件中声明了这个数组。通常，学生们对数组感到非常畏惧，以至于在编写考试代码时会忘记声明它们。回想一下，我们在头文件中写了\
    \ `NSArray *bgImages`，所以我们声明了一个数组并把它命名为 `bgImages`。紧接着，我们知道需要编写 `bgImages = (让我们的数组活起来的东西)`。使用数组有很多复杂的方法，但我们将使用最朴素的……或者我应该说……使用\
    \ `NSArray` 初始化器的 Apple 方法。它们与工厂方法几乎相同，只是需要自己进行内存分配，形式如 `NSArray` 所示。\n\n```\n\
    你的数组名称 = [[NSArray alloc] initWithObjects: @\"你的第一个对象\", @\"你的第二个对象\", @\"你的第三个对象\"\
    , nil];\n```\n\n这看起来有点杂乱，所以看一下它的结尾，你会发现所有的对象都用逗号分隔开了；然后，我们在末尾加上那个 `nil` 来告诉数组它已经结束。让我们做两件事。首先，我们将数组的真实名称——`bgImages`——填入模板中，然后我们将逗号之间的内容放到单独的行中，看看这样是否更清晰。\n\
    \n```\nbgImages array = [[NSArray alloc] initWithObjects:\n    @\"你的第一个对象\",\n\
    \    @\"你的第二个对象\",\n    @\"你的第三个对象\",\n    nil];\n```\n\n很酷，对吧？！这个看起来有点吓人的代码，现在对你来说变得有意义了！耶！好吧，我们还没有完全完成。在让这个数组活起来之前，我们还需要做一件事。我们需要深入理解\
    \ `UIImage` 类引用，这是 Apple 的工程师编写的一个用于显示图片的对象。我们的对象是图片，但实际上，它们是包含图片的文件名。我们需要将 `UIImage`\
    \ 与一个名为 `imageNamed` 的方法一起使用，该方法返回与文件名相关联的图片对象。因此，对于每个文件名，我们需要使用 `UIImage imageNamed`。我已经在下面说明了这一点：\n\
    \n```\n你的数组名称 = [[NSArray alloc] initWithObjects:\n    [UIImage imageNamed:@\"\
    WallPaper_01.png\"],\n    [UIImage imageNamed:@\"WallPaper_02.png\"],\n    [UIImage\
    \ imageNamed:@\"WallPaper_03.png\"],\n    [UIImage imageNamed:@\"WallPaper_04.png\"\
    ],\n    [UIImage imageNamed:@\"WallPaper_05.png\"],\n    nil];\n```\n\n使用这段代码，我们创建了一个包含五张图片的数组。我们现在需要做的就是将它插入到我们的代码中。请参见以下加粗的代码：\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    hasMoved = NO;\n\
    \    hasShrunk = NO;\n    currentBackground = 0;\n\n    bgImages = [[NSArray alloc]\
    \ initWithObjects:\n                [UIImage imageNamed:@\"WallPaper_01.png\"\
    ],\n                [UIImage imageNamed:@\"WallPaper_02.png\"],\n            \
    \    [UIImage imageNamed:@\"WallPaper_03.png\"],\n                [UIImage imageNamed:@\"\
    WallPaper_04.png\"],\n                [UIImage imageNamed:@\"WallPaper_05.png\"\
    ],\n                nil];\n    // 设置缩小按钮将“噜噜水果”图标缩小的程度\n    // 设置移动按钮将“噜噜水果”图标移动的程度\n\
    \    // 将背景图片设置为当前背景图片\n}\n```\n\n### 设置“噜噜水果”图标的缩小程度\n\n设置当我们按下“缩小”按钮时“噜噜水果”图标的缩小程度非常简单。还记得在本章开头我们讨论过，`CGAffine`\
    \ 如何在接到指令后改变对象的**位置*、*角度*、*形状*、*缩放**等属性吗？现在我们将要使用它。我随机决定将“噜噜水果”图标缩小 25%。这意味着我们需要告诉\
    \ `CGAffine` 两件事：第一，我们要缩放图片；第二，我们在 x 轴和 y 轴上要缩放多少。我们想要使用 `CGAffine` 来缩放我们使用的对象……嗯……让我们猜猜……啊！用\
    \ `CGAffineTransformMakeScale` 怎么样？是的！我们猜对了。好的，接下来是下一个赋值。要将图片缩放 25%，我们需要在 x 轴和\
    \ y 轴上均匀地缩放 0.25；但在将其输入代码之前，请记住，我们在头文件中创建了一个名为 `size` 的变量，类型为 `CGAffineTransform`\
    \ 吗？我们需要将 `size` 变量设置为 25% 的缩小量，即我们告知 `CGAffineTransformMakeScale` 代码要执行的操作。这通过以下代码说明：\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    hasMoved = NO;\n\
    \    hasShrunk = NO;\n    currentBackground = 0;\n\n    bgImages = [[NSArray alloc]\
    \ initWithObjects:\n                [UIImage imageNamed:@\"WallPaper_01.png\"\
    ],\n                [UIImage imageNamed:@\"WallPaper_02.png\"],\n            \
    \    [UIImage imageNamed:@\"WallPaper_03.png\"],\n                [UIImage imageNamed:@\"\
    WallPaper_04.png\"],\n                [UIImage imageNamed:@\"WallPaper_05.png\"\
    ],\n                nil];\n    size = CGAffineTransformMakeScale(.25, .25);\n\
    \    // 设置移动按钮将“噜噜水果”图标移动的程度\n    // 将背景图片设置为当前背景图片\n}\n```\n\n### 设置“噜噜水果”图标的移动距离\n\
    \n与之前使用 `CGAffineTransformMakeScale` 告诉我们的 `size` 变量保存图标缩小量类似，我们现在将使用 `Translation`（位移）。这是用极客的方式来表示我们将使用\
    \ `CGAffineTransformMakeTranslation` 让图标在屏幕上移动多少距离，以告知我们在头文件中创建的 `move` 变量（类型为\
    \ `CGAffineTransform`）保存我们想要移动的量。我随机选择只将“噜噜水果”图标沿 y 轴向上移动 100 像素。“向上”意味着我们需要从\
    \ y 轴减去像素。我们只想在 y 轴上减去 100 像素，而 x 轴保持不变（0, -100）。这通过以下代码说明：\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    hasMoved = NO;\n    hasShrunk = NO;\n    currentBackground\
    \ = 0;\n\n    bgImages = [[NSArray alloc] initWithObjects:\n                [UIImage\
    \ imageNamed:@\"WallPaper_01.png\"],\n                [UIImage imageNamed:@\"\
    WallPaper_02.png\"],\n                [UIImage imageNamed:@\"WallPaper_03.png\"\
    ],\n                [UIImage imageNamed:@\"WallPaper_04.png\"],\n            \
    \    [UIImage imageNamed:@\"WallPaper_05.png\"],\n                nil];\n    size\
    \ = CGAffineTransformMakeScale(.25, .25);\n    translate = CGAffineTransformMakeTranslation(0,\
    \ -100);\n    // 将背景图片设置为当前背景图片\n}\n```\n"
- fmt: "### 将背景图像设置为当前背景图像\n\n在`viewDidLoad`中，我们需要完成的最后一项任务是将背景图像设置为当前背景图像。你可能会大声质疑并挠头思考：“这究竟是什么意思？”让我们仔细分析一下。我们已经创建了一个包含五张图像的数组。我们将用数字来标识这些图像。当我们按下“Change”按钮时，无论当前背景显示的是哪张图像，我们都会用下一张图像替换它。我们已将`currentBackground`设置为0。因此，当用户第一次按下“Change”按钮时，它将使用我们尚未编写的代码将`currentBackground`从0变为0+1，这意味着当前背景将变为数组中的下一张背景图像。\n\
    \n注意：我现在不打算解释这段代码，因为大多数人在需要获取某个索引处的对象并将其放入我们创建的变量中时，只是直接粘贴使用。\n\n我希望你现在和以后按以下方式使用它：包含图像的那个变量应等于`[bgImages\
    \ objectAtIndex:yourVariable]`（在我们的示例中，`yourVariable`保存了当前背景图像）。不要对此想得太多，只需像下面代码中演示的那样使用它即可。\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    hasMoved = NO;\n\
    \    hasShrunk = NO;\n    currentBackground = 0;\n\n    bgImages = [[NSArray alloc]\
    \ initWithObjects:\n                    [UIImage imageNamed:@\"WallPaper_01.png\"\
    ],\n                    [UIImage imageNamed:@\"WallPaper_02.png\"],\n        \
    \            [UIImage imageNamed:@\"WallPaper_03.png\"],\n                   \
    \ [UIImage imageNamed:@\"WallPaper_04.png\"],\n                    [UIImage imageNamed:@\"\
    WallPaper_05.png\"],\n                    nil];\n    size = CGAffineTransformMakeScale(.25,\
    \ .25);\n    translate = CGAffineTransformMakeTranslation(0, -100);\n    myBackground.image\
    \ = [bgImages objectAtIndex:currentBackground];\n}\n```\n\n![images](images/00182.jpg)\n\
    \n**图5–32.** 检查实现文件中的代码是否完整。\n\n32. 完成以上所有步骤后，你的`viewDidLoad`应该与图5–32中所示的一致。\n\
    \n### 新标题\n\n我们将亲自处理大量与视图关联的内存卸载工作。当我们在背景之间切换时，会用自己编写的代码来处理这一切，因此可以删除Apple为我们生成的一些样板代码。\n\
    \n![images](images/00183.jpg)\n\n**图5–33.** 精简`viewDidUnload`方法。\n\n33. 如图5–33所示，转到你的`viewDidUnload`方法，从`[myIcon\
    \ release]`的开头到`shrinkButton = nil`的结尾选中所有代码，并将其全部删除。\n\n![images](images/00184.jpg)\n\
    \n**图5–34.** 编写`touchesMoved`方法。\n\n34. 现在我们将编写`touchesMoved`方法。是的，我知道你甚至还没看到它！在删除`viewDidUnload`中的相应代码后，我希望你向下滚动浏览Apple为你实例化的所有方法。依次查看`viewWillAppear`、`viewDidAppear`、`viewWillDisappear`、`viewDidDisappear`和`shouldAutorotateToInterfaceOrientation`。然后你会看到三个方法，对应我们在头文件中为三个按钮创建的操作。\n\
    \n```\n- (IBAction)shrink:(id)sender {\n}\n- (IBAction)move:(id)sender {\n}\n\
    - (IBAction)change:(id)sender {\n}\n\n@end\n```\n\n这非常棒，因为我们将把所有代码放入这些方法中。但是，等等……我们缺少一个方法，它用于处理触摸并让用户用手指移动那个“lulu\
    \ fruit”图标！是的，我们需要从头创建它。在顶部的`shrink`方法上方，我希望你创建大约四个空行，然后直接输入`touches`，代码补全功能会弹出`touchesMoved`；按下回车，然后再次输入`touches`，代码补全会弹出`touches\
    \ withEvent:(UIEvent *)event{`。这样你就会拥有全部四个需要编码的方法，如下所示，其中我高亮显示了我们在头文件中创建的四个变量。\n\
    \n```\n-(void) touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event{\n}\n\
    - (IBAction) shrink:(id)sender {\n}\n- (IBAction) move:(id)sender {\n}\n- (IBAction)\
    \ change:(id)sender {\n}\n@end\n```\n\n现在我们可以将代码写入`touchesMoved`方法中。但让我们先从宏观角度审视一下。我们希望`touchesMoved`方法做什么？这可能看起来不明显，但我们只是希望`touchesMoved`方法执行以下操作：\n\
    \n```\n-(void) touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event{\n   \
    \ 获取能感知屏幕所有触摸的代码\n    检查屏幕上的触摸是否在“lulu fruit”图标上。如果是，则执行：\n    检查图标是否已通过按钮被移动和缩小。如果是，则执行：\n\
    \        保持缩小的尺寸，并将图标移动到“Move”按钮被按下之前的位置\n    检查图标是否已通过按钮被移动但未缩小。如果是，则执行：\n  \
    \      将图标移动到“Move”按钮被按下之前的位置\n    将图标设置到当前触摸位置\n}\n```\n\n我的教学方法之一，是我并不总是事无巨细地讲解一切。在之前我们盲写前几个“Hello\
    \ World”应用时，你已经有所体会。在这一点上，我将教你如何使用某些工具来完成任务。我现在不会教你所有这些工具是如何工作的，但我将教你该选择哪个工具。目前，我们需要获取能感知屏幕上所有触摸的代码。我希望你记住：当你想让用户界面通过触摸实现炫酷功能时，我们首先需要调用Apple编写的、用于感知和记录所有触摸的代码。因此，输入`UITouches`，代码补全功能会提供的一个选项是`UITouch\
    \ *touch = [[event allTouches] anyObject]`，这就是我希望你在处理任何触摸操作之前调用的工具。暂时不要思考它是如何工作的，只需知道在此处调用它即可。请参考下例中的粗体部分。"
  raw: '##### Set the Background Image to the Current Background Image


    The last job we need to do in the `viewDidLoad` is to set the background image
    to the current background image. What does this mean!? I can just hear you saying
    this out loud and scratching your head. Let''s think about this. We have created
    an array that holds our five images. We will set each of those images with a number.
    When we press the Change button, whatever number image is on our background, we
    will replace it with the next one. We have set `currentBackground` to zero. So,
    the first time somebody presses the Change button, it will use the code we have
    yet to code to change the `currentBackground` from 0 to 0+1, which means that
    the current background will now be the next background in the array.


    NOTE: I am not going to explain the code at this point because most of us just
    paste it in when we need to get the object at an index and place inside a variable
    we created.


    This is how I want you to use it now and later on your own: your variable that
    contains your image will be equal to [`bgImagesobjectAtIndex:your variable that
    in our case holds the back ground image`]. Don''t think about this too much. Just
    use it as I have illustrated in the following code.


      `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `hasMoved = NO;`

    `    hasShrunk = NO;`

    `    currentBackground = 0;`


    `bgImages = [[NSArray alloc] initWithObjects:`

    `                [UIImage imageNamed:@ »WallPaper_01.png »],`

    `                [UIImage imageNamed:@ »WallPaper_02.png »],`

    `                [UIImage imageNamed:@ »WallPaper_03.png »],`

    `                [UIImage imageNamed:@ »WallPaper_04.png »],`

    `                [UIImage imageNamed:@ »WallPaper_05.png »],`

    `                nil];`

    `size = CGAffineTransformMakeScale(.25, .25);`

    `    translate = CGAffineTransformMakeTranslation(0,-100);`

    ` myBackground.image = [bgImages objectAtIndex:currentBackground];`

    `}`   ![images](images/00182.jpg)  


    Figure 5–32\. Check that your code is complete in the implementation file.


    32\. With all of this completed, your `viewDidLoad` should look like mine, as
    illustrated in [Figure 5–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos404871).


    ##### New Heading


    We will be personally handling much of how we unload memory associated with our
    views. We will handle this with our own handwritten code as we switch from one
    background to the next, so we can delete some of the boilerplate code Apple instantiated
    for us.


    ![images](images/00183.jpg)


    Figure 5–33\. Trim down your viewDidUnload.


    33\. As illustrated in [Figure 5–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos405895),
    go to your `viewDidUnload` and select all the code from the beginning of [`myIcon
    release]` to the end of your `shrinkButton = nil` and delete it all.


    ![images](images/00184.jpg)


    Figure 5–34\. Code your touchesMoved method.


    34\. Now we are going to code the `touchesMoved` method. Yes, I know you don''t
    even see it yet! What I want you to do after deleting the appropriate code in
    your `viewDidUnload` is scroll down through all the methods Apple instantiated
    for you. Scroll through your `viewWillAppear`, `viewDidAppear`, `viewWillDisappear`,
    `viewDidDisappear`, and `shouldAutorotateToInterfaceOrientation`. Now you will
    see three methods for our three actions we created in the header file for our
    three buttons.


    `- (IBAction)shrink:(id)sender {`

    `}`

    `- (IBAction)move:(id)sender {`

    `}`

    `- (IBAction)change:(id)sender {`

    `}`


    `@end`


    This is really great because we will place all our code inside these methods,
    but hold on . . .we''re missing the method that will handle our touching and moving
    the lulu fruit icon with our fingertips! Yup, we need to create that from scratch.
    Right above the `shrink` method, which is at the top, I want you to create about
    four blank lines and then simply enter `touches` and code completion will bring
    up `touchesMoved`; press Enter, and then enter `touches` again, and the code completion
    will bring up `touches withEvent:(UIEvent *)event{`. Now you will have all four
    methods you need to code, as illustrated by the following, where I have highlighted
    the four variables we created in the header file.


    `-(void)` `touchesMoved:``(NSSet *)touches withEvent:(UIEvent *)event{`

    `}`

    `- (IBAction)``shrink:``(id)sender {`

    `}`

    `- (IBAction)``move:``(id)sender {`

    `}`

    `- (IBAction)``change:``(id)sender {`

    `}`

    `@end`


    Now we can enter the code inside our `touchesMoved` class. But let''s look at
    it from a high altitude to start off with. What do we want the `touchesMoved`
    method to do? Well, this may not seem obvious, but we simply want the `touchesMoved`
    method to do the following:


    `-(void) touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event{`

    `Grab code that can sense all touches on the screen`

    `Check if a touch on the screen is on the lulu fruit icon. If yes then`

    `Check if icon was moved and shrunk using buttons if yes then`

    `Keep shrunk size and move icon to its position before move button`

    `Check if icon was moved and not shrunk using buttons if yes then`

    `Move icon to its position before move button`

    `Set icon to be at the current touch location`

    `}`


    Part of my teaching method is that I do not always teach you everything. You''ve
    seen this already when we blindly coded the first couple of hello worlds. At this
    point I''m going to teach you how to use certain tools to perform tasks. I will
    not teach you how all of these tools work right now, but I am going to teach you
    what tool to grab. At this point, we need to get code that can sense all touches
    on the screen. I want you to just remember that when you want the User Interface
    to do cool stuff with touches, we need to first call code Apple wrote that senses
    and records all touches. So, type in `UITouches` and one of the options the code
    completion will present is `UITouch *touch = [[event allTouches] anyObject]`,
    and this is the tool I want you to invoke before you do anything with touches.
    Don''t think about how it works right now. Just know to call it at this point.
    Refer to the bold print in the following example.'
  trans: "\n### 将背景图像设置为当前背景图像\n\n在`viewDidLoad`中，我们需要完成的最后一项任务是将背景图像设置为当前背景图像。你可能会大声质疑并挠头思考：“这究竟是什么意思？”让我们仔细分析一下。我们已经创建了一个包含五张图像的数组。我们将用数字来标识这些图像。当我们按下“Change”按钮时，无论当前背景显示的是哪张图像，我们都会用下一张图像替换它。我们已将`currentBackground`设置为\
    \ 0。因此，当用户第一次按下“Change”按钮时，它将使用我们尚未编写的代码将`currentBackground`从 0 变为 0+1，这意味着当前背景将变为数组中的下一张背景图像。\n\
    \n注意：我现在不打算解释这段代码，因为大多数人在需要获取某个索引处的对象并将其放入我们创建的变量中时，只是直接粘贴使用。\n\n我希望你现在和以后按以下方式使用它：包含图像的那个变量应等于`[bgImages\
    \ objectAtIndex:yourVariable]`（在我们的示例中，`yourVariable`保存了当前背景图像）。不要对此想得太多，只需像下面代码中演示的那样使用它即可。\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    hasMoved = NO;\n\
    \    hasShrunk = NO;\n    currentBackground = 0;\n\n    bgImages = [[NSArray alloc]\
    \ initWithObjects:\n                    [UIImage imageNamed:@\"WallPaper_01.png\"\
    ],\n                    [UIImage imageNamed:@\"WallPaper_02.png\"],\n        \
    \            [UIImage imageNamed:@\"WallPaper_03.png\"],\n                   \
    \ [UIImage imageNamed:@\"WallPaper_04.png\"],\n                    [UIImage imageNamed:@\"\
    WallPaper_05.png\"],\n                    nil];\n    size = CGAffineTransformMakeScale(.25,\
    \ .25);\n    translate = CGAffineTransformMakeTranslation(0, -100);\n    myBackground.image\
    \ = [bgImages objectAtIndex:currentBackground];\n}\n```\n\n![images](img/00182.jpg)\n\
    \n**图 5–32.** 检查实现文件中的代码是否完整。\n\n32. 完成以上所有步骤后，你的`viewDidLoad`应该与图 5–32 中所示的一致。\n\
    \n### 新标题\n\n我们将亲自处理大量与视图关联的内存卸载工作。当我们在背景之间切换时，会用自己编写的代码来处理这一切，因此可以删除 Apple 为我们生成的一些样板代码。\n\
    \n![images](img/00183.jpg)\n\n**图 5–33.** 精简`viewDidUnload`方法。\n\n33. 如图 5–33\
    \ 所示，转到你的`viewDidUnload`方法，从`[myIcon release]`的开头到`shrinkButton = nil`的结尾选中所有代码，并将其全部删除。\n\
    \n![images](img/00184.jpg)\n\n**图 5–34.** 编写`touchesMoved`方法。\n\n34. 现在我们将编写`touchesMoved`方法。是的，我知道你甚至还没看到它！在删除`viewDidUnload`中的相应代码后，我希望你向下滚动浏览\
    \ Apple 为你实例化的所有方法。依次查看`viewWillAppear`、`viewDidAppear`、`viewWillDisappear`、`viewDidDisappear`和`shouldAutorotateToInterfaceOrientation`。然后你会看到三个方法，对应我们在头文件中为三个按钮创建的操作。\n\
    \n```\n- (IBAction)shrink:(id)sender {\n}\n- (IBAction)move:(id)sender {\n}\n\
    - (IBAction)change:(id)sender {\n}\n\n@end\n```\n\n这非常棒，因为我们将把所有代码放入这些方法中。但是，等等……我们缺少一个方法，它用于处理触摸并让用户用手指移动那个“lulu\
    \ fruit”图标！是的，我们需要从头创建它。在顶部的`shrink`方法上方，我希望你创建大约四个空行，然后直接输入`touches`，代码补全功能会弹出`touchesMoved`；按下回车，然后再次输入`touches`，代码补全会弹出`touches\
    \ withEvent:(UIEvent *)event{`。这样你就会拥有全部四个需要编码的方法，如下所示，其中我高亮显示了我们在头文件中创建的四个变量。\n\
    \n```\n-(void) touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event{\n}\n\
    - (IBAction) shrink:(id)sender {\n}\n- (IBAction) move:(id)sender {\n}\n- (IBAction)\
    \ change:(id)sender {\n}\n@end\n```\n\n现在我们可以将代码写入`touchesMoved`方法中。但让我们先从宏观角度审视一下。我们希望`touchesMoved`方法做什么？这可能看起来不明显，但我们只是希望`touchesMoved`方法执行以下操作：\n\
    \n```\n-(void) touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event{\n   \
    \ 获取能感知屏幕所有触摸的代码\n    检查屏幕上的触摸是否在“lulu fruit”图标上。如果是，则执行：\n    检查图标是否已通过按钮被移动和缩小。如果是，则执行：\n\
    \        保持缩小的尺寸，并将图标移动到“Move”按钮被按下之前的位置\n    检查图标是否已通过按钮被移动但未缩小。如果是，则执行：\n  \
    \      将图标移动到“Move”按钮被按下之前的位置\n    将图标设置到当前触摸位置\n}\n```\n\n我的教学方法之一，是我并不总是事无巨细地讲解一切。在之前我们盲写前几个“Hello\
    \ World”应用时，你已经有所体会。在这一点上，我将教你如何使用某些工具来完成任务。我现在不会教你所有这些工具是如何工作的，但我将教你该选择哪个工具。目前，我们需要获取能感知屏幕上所有触摸的代码。我希望你记住：当你想让用户界面通过触摸实现炫酷功能时，我们首先需要调用\
    \ Apple 编写的、用于感知和记录所有触摸的代码。因此，输入`UITouches`，代码补全功能会提供的一个选项是`UITouch *touch = [[event\
    \ allTouches] anyObject]`，这就是我希望你在处理任何触摸操作之前调用的工具。暂时不要思考它是如何工作的，只需知道在此处调用它即可。请参考下例中的粗体部分。\n"
