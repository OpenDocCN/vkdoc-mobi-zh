    Here you can see how “connection” consists of three parts:


    * `connection:(NSURLConnection *)connection didReceiveResponse`

    * `connection:(NSURLConnection *)connection didReceiveData`

    * `connectionDidFinishLoading:(NSURLConnection *)connection`


    The `connectionDidFinishLoading:(NSURLConnection *)connection` is the method that
    actually collects the longitudinal and latitudinal data from the Google server
    and stores it.


