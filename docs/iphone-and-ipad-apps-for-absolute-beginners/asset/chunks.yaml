- fmt: '39\. [Figure 4–39](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos320556)
    illustrates the two views of `helloWorld_04`. The first view is what we will see
    when the app first opens. Your images will be different of course, if you used
    your own, but apart from the background image your screen should look very similar.
    The second image is what appears when the button is clicked. The label text appears
    and the second image is superimposed on top of the underlying image.


    ### Digging the Code


    In this section, let''s zoom into some of the key components that we encountered
    earlier in this chapter. I want to talk a little more about `IBOutlets` and `IBActions`
    – specifically how these include keywords… and even quasi-keywords. We''ll also
    touch on pointers and their relationship to addresses in the code.


    #### IBOutlets and IBActions


    Earlier, we worked with `IBOutlet` and `IBAction` keywords, and now we''re going
    to talk about a couple of related concepts. Strictly speaking, these are considered
    by many programmers to be “quasi-keywords.”


    The Appkit of Objective-C has converted original C language preprocessor directives,
    such as `#define`, into usable preprocessor directives. In geekspeak, we would
    pronounce this as “pound-define.”


    NOTE: In the US, the `#` sign is often called the “pound” sign, especially in
    Objective-C and other programming contexts. In the United Kingdom, it is referred
    to as the “hash” character. Many iPhone/iPad developers have recently begun to
    refer to the `#define` preprocessor directive simply as the “define directive.”


    The `#define` preprocessor directive tells the computer to substitute one thing
    for another. That''s an easy concept, right? For example, if I were to program
    the computer to substitute `100` every time it sees an instance of your name,
    our code in C would look like this:


    ```

    #define yourName 100

    ```


    This would tell the computer to substitute `100` each time it processes `yourName`—a
    variable that recognizes instances of your actual name.


    Back to Xcode now, and our topic. In this context, the `IBOutlet` and `IBAction`
    quasi-keywords aren''t really defined to be anything. In other words, they don''t
    do anything substantial for the compiler, which is the core of the computer.


    Quasi-keywords are flags, though, and they are important in the communication
    with the Interface Builder. When it sees the `IBOutlet` and `IBAction` quasi-keywords,
    it gets some of its internal code ready to perform specific tasks. It gets itself
    ready to deal with instance variables and all the hooks and connections that we
    make in that programming arena.


    #### More About Pointers


    It''s difficult for many programming students to understand the concept of “pointers”—also
    sometimes known as the concept of indirection. It''s not easy to explain this
    idea because it''s one of the most sophisticated features of the C programming
    language.


    Earlier in this chapter, I presented the analogy of seeing a criminal doing something,
    and then calling the police and pointing the police to where he is—so they, not
    you, can arrest the criminal. This analogy works for many students, but now let''s
    go a little deeper.


    If you were to ask a Computer Science professor what a “pointer” is, he would
    probably say something like “Pointers hold the address of a variable or a method.”


    “The address?” you ask. Well, consider this new analogy in the way of explanation.


    Have you ever seen a movie in which a detective or some frantic couple is traveling
    all over the place, looking for clues to the treasure map, or the missing painting,
    or the kidnapped daughter? Sometimes they will spot a fingerprint, or a receipt,
    or even an envelope with a piece of paper containing a cryptic message—and these
    take the people one step closer to their goal—of finding the missing objects themselves.


    We can call these pointers; they indicate the next place to go—for the solution
    of the given problem. They don''t necessarily give the ultimate address, at which
    everything is handled and resolved, but they give us intermediate addresses or
    places to continue our work.


    Thus, what the professor of Computer Science means is that pointers do not actually
    contain the items to which they direct us; they contain the locations within the
    code—the addresses—of the desired objects or actions or entities. This important
    feature makes the C-family of languages very powerful.


    This simple idea makes it very efficient to turn complex tasks into easy ones.
    Pointers can pass values to types and arguments to functions, represent huge masses
    of numbers, and manipulate how we manage memory in a computer. Many of you are
    perhaps thinking that pointers are similar to variables in the world of algebra.
    Exactly!


    In our first analogy, a pointer enabled an unarmed citizen to arrest a dangerous
    criminal by using indirection—that is, by calling the police to come and solve
    the problem. (Yes, the term “indirection” is an odd choice given that we are actually
    being directed toward the goal.)


    Consider the following example where we use a pointer to direct us to the amount
    you have in your bank balance. To do this, let''s define a variable called `bankBalance`
    as follows:


    ```

    int  bankBalance = $1,000;

    ```


    Now, let''s throw another variable into the mix and call it `int_pointer`. Let
    us also assume that, for argument''s sake, we have declared it. This will allow
    us to use indirection to indirectly connect to the value of `bankBalance` by the
    declaration:


    ```

    int  *int_pointer;

    ```


    The star, or asterisk, tells the family of C-languages that our variable `int_pointer`
    is allowed to indirectly access the integer value of the amount of money in our
    variable (placeholder): `bankBalance`.


    To close, I want to remind you, and to acknowledge, that our digging around here
    is not an exhaustive or rigorous exploration into these topics… just a fun tangent
    into some related ideas. At this point, there is no reason for you to be bothered
    if you don''t fully understand pointers. Seeds have been planted and that''s what
    counts for now!'
