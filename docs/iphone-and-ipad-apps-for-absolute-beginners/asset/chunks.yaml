- fmt: "# Understanding `IBOutlets`\n\nIn previous chapters, we have already discussed\
    \ the `.m` and `.h` extensions in detail. We've been doing what most Cocoa and\
    \ Objective-C programmers do—start off by programming the header files. In geekspeak,\
    \ you'd say; “After dragging out objects onto the View, we opened the header and\
    \ control-dragged our `IBOutlets` and `IBActions` into the header file.” If anybody\
    \ were to ask you on the forum to explain, you may tell them to, “Click on the\
    \ disclosure triangle in your `Classes` file and open the file with extension\
    \ `ViewController.h`!”\n\nYou've already programmed three previous header files,\
    \ so you should be accustomed to just flying over this portion of your code. However,\
    \ this time we're going to put on the brakes and think about what we're doing.\
    \ For all our previous examples, we've only had to use one `IBOutlet`, a thing\
    \ that allows us to interact with the user. Let's get more technical and specific,\
    \ for that statement is too elementary. Let's dig deeper into what an `IBOutlet`\
    \ is so that, when we get to the “Digging the Code” section, you'll be able to\
    \ really understand it.\n\nLooking at the code in bold, let's see if we can find\
    \ our way to a deeper understanding of these elements:\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface helloWorld_04ViewController : UIViewController {\n\n    IBOutlet\
    \ UILabel *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet UILabel *label;\n@property (nonatomic, retain) IBOutlet UIImageView\
    \ *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n```\n\nLook at the first\
    \ line:\n\n```\n#import <UIKit/UIKit.h>\n```\n\nThis is what permits us to use\
    \ the `IBOutlet` keyword. We use `#import` to import the `UIKit`, which is the\
    \ user interface (UI) framework inside the huge body of core chunks of code called\
    \ `IPhoneRuntime`, which is a stripped-down version of the OS X operating system\
    \ found on a Mac. Of course, `IPhoneRuntime` is smaller, so it can fit onto an\
    \ iPhone or an iPad.\n\nWhen we import the `UIKit` framework, it delivers to our\
    \ toolbox the ability to use tons of code Apple has already written for us—called\
    \ classes—one of which is the very cool and popular class that you've already\
    \ used: `IBOutlet`. The `IBOutlet` keyword is a special directive called an “instance\
    \ variable” that tells Interface Builder to display items that you want to appear\
    \ on your user's iPhone or iPad. In turn, Interface Builder uses these “hints”\
    \ to tell the compiler that you'll be connecting objects to your `.xib` files.\
    \ Interface Builder doesn't connect these outlets to anything, but it tells the\
    \ compiler that you will be adding them.\n\nKeeping inventory of what we'll be\
    \ using: 1) the background image of the stairs; 2) the top-layer image of Kant;\
    \ 3) the text of what he will be “saying” upon his return to the campus. In our\
    \ exercise, we'll be using two `IBOutlets`—one dealing with the text in our label\
    \ where Kant says “Hello World, I'm Back!” and the other with our second view\
    \ where Kant magically appears.\n\nKnowing that we need two `IBOutlets`, we can\
    \ visualize how it will look. We start by focusing inside the brackets that follow\
    \ `@interfacetestViewController : UIViewController`. Our code will need to appear\
    \ as follows:\n\n```\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController\
    \ : UIViewController {\n\nIBOutlet UILabel *label;\nIBOutlet UIImageView *Kant;\n\
    }\n\n@property (nonatomic, retain) IBOutlet UILabel *label;\n@property (nonatomic,\
    \ retain) IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\
    \n@end\n```\n\nAs you can see, by only looking at the bold code and imagining\
    \ that you have not programmed anything else but the bold code, these `IBOutlets`\
    \ are just placeholders; one will produce text for what Kant says, and the other\
    \ will produce a picture that is superimposed on top of the background.\n\nWe\
    \ know that when we shoot text out onto the iPhone or iPad screen we use the `UILabel`\
    \ class. This class draws multiple lines of static text. Therefore, go ahead and\
    \ type in `UILabel` next to your first `IBOutlet`, as shown in the following code.\
    \ Now, consider what we will need for the second `IBOutlet`. We know that we want\
    \ to impose the top layer image as shown in Figure 4–03. A good idea here would\
    \ be to use the `UIImageView` class because it provides us with code written by\
    \ Apple that can display either single images or a series of animated images.\
    \ With this said, enter the `UIImageView` class next to your second `IBOutlet`:\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController : UIViewController\
    \ {\n\nIBOutlet UILabel *label;\n IBOutlet UIImageView *Kant;\n}\n\n@property\
    \ (nonatomic, retain) IBOutlet UILabel *label;\n@property (nonatomic, retain)\
    \ IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n\
    ```\n\nAs you can see it now makes sense when we say that we have two `IBOutlets`:\n\
    \n- We let one call the `UILabel` class to control the text.\n- We let the other\
    \ call the `UIImageView` class to control the second image."
  raw: '#### Understanding IBOutlets


    In previous chapters, we have already discussed the `.m` and `.h` extensions in
    detail. We''ve been doing what most Cocoa and Objective-C programmers do—start
    off by programming the header files. In geekspeak, you''d say; “After dragging
    out objects onto the View, we opened the header and control-dragged our `IBOutlets`
    and `IBActions` into the header file.” If anybody were to ask you on the forum
    to explain, you may tell them to, “Click on the disclosure triangle in your `Classes`
    file and open the file with extension `ViewController.h`!”


    You''ve already programmed three previous header files, so you should be accustomed
    to just flying over this portion of your code. However, this time we''re going
    to put on the brakes and think about what we''re doing. For all our previous examples,
    we''ve only had to use one `IBOutlet`, a thing that allows us to interact with
    the user. Let''s get more technical and specific, for that statement is too elementary.
    Let''s dig deeper into what an `IBOutlet` is so that, when we get to the “Digging
    the Code” section, you''ll be able to really understand it.


    Looking at the code in bold, let''s see if we can find our way to a deeper understanding
    of these elements:


    `#import <UIKit/UIKit.h>`


    `@interface helloWorld_04ViewController : UIViewController {`


    `    IBOutlet UILabel *label;`

    `    IBOutlet UIImageView *Kant;`

    `}`


    `@property (nonatomic, retain) IBOutlet UILabel *label;`

    `@property (nonatomic, retain) IBOutlet UIImageView *Kant;`


    `- (IBAction)buttonGuess:(id)sender;`


    `@end`


    Look at the first line:


    `#import <UIKit/UIKit.h>`


    This is what permits us to use the `IBOutlet` keyword. We use `#import` to import
    the `UIKit`, which is the user interface (UI) framework inside the huge body of
    core chunks of code called `IPhoneRuntime`, which is a stripped-down version of
    the OS X operating system found on a Mac. Of course, `IPhoneRuntime` is smaller,
    so it can fit onto an iPhone or an iPad.


    When we import the `UIKit` framework, it delivers to our toolbox the ability to
    use tons of code Apple has already written for us—called classes—one of which
    is the very cool and popular class that you''ve already used: `IBOutlet`. The
    `IBOutlet` keyword is a special directive called an “instance variable” that tells
    Interface Builder to display items that you want to appear on your user''s iPhone
    or iPad. In turn, Interface Builder uses these “hints” to tell the compiler that
    you''ll be connecting objects to your `.xib` files. Interface Builder doesn''t
    connect these outlets to anything, but it tells the compiler that you will be
    adding them.


    Keeping inventory of what we''ll be using: 1) the background image of the stairs;
    2) the top-layer image of Kant; 3) the text of what he will be “saying” upon his
    return to the campus. In our exercise, we''ll be using two `IBOutlets`—one dealing
    with the text in our label where Kant says “Hello World, I''m Back!” and the other
    with our second view where Kant magically appears.


    Knowing that we need two `IBOutlets`, we can visualize how it will look. We start
    by focusing inside the brackets that follow `@interfacetestViewController : UIViewController.`
    Our code will need to appear as follows:


    `#import <UIKit/UIKit.h>`


    `@interface helloWorld_04ViewController : UIViewController {`


    `IBOutlet` `UILabel *label;`

    `IBOutlet` `UIImageView *Kant;`

    `}`


    `@property (nonatomic, retain) IBOutlet UILabel *label;`

    `@property (nonatomic, retain) IBOutletUIImageView *Kant;`


    `- (IBAction)buttonGuess:(id)sender;`


    `@end`


    As you can see, by only looking at the bold code and imagining that you have not
    programmed anything else but the bold code, these `IBOutlets` are just placeholders;
    one will produce text for what Kant says, and the other will produce a picture
    that is superimposed on top of the background.


    We know that when we shoot text out onto the iPhone or iPad screen we use the
    `UILabel` class. This class draws multiple lines of static text. Therefore, go
    ahead and type in `UILabel` next to your first `IBOutlet,` as shown in the following
    code. Now, consider what we will need for the second `IBOutlet`. We know that
    we want to impose the top layer image as shown in [Figure 4–03](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos254960).
    A good idea here would be to use the `UIImageView` class because it provides us
    with code written by Apple that can display either single images or a series of
    animated images. With this said, enter the `UIImageView` class next to your second
    `IBOutlet`:


    `#import <UIKit/UIKit.h>`


    `@interface helloWorld_04ViewController : UIViewController {`


    `IBOutlet``UILabel` `*label;`

    ` IBOutlet``UIImageView` `*Kant;`

    `}`


    `@property (nonatomic, retain) IBOutlet UILabel *label;`

    `@property (nonatomic, retain) IBOutlet UIImageView *Kant;`


    `- (IBAction)buttonGuess:(id)sender;`


    `@end`


    As you can see it now makes sense when we say that we have two `IBOutlets`:


    *   We let one call the `UILabel` class to control the text.

    *   We let the other call the `UIImageView` class to control the second image.'
  trans: "\n# 理解 `IBOutlets`\n\n在之前的章节中，我们已经详细讨论过 `.m` 和 `.h` 扩展名。我们一直在做大多数 Cocoa\
    \ 和 Objective-C 程序员所做的事情——从编写头文件开始。用极客的话来说，你会说：“将对象拖到视图上后，我们打开了头文件，并通过控制拖拽将 `IBOutlets`\
    \ 和 `IBActions` 添加到了头文件中。”如果有人到论坛上问你如何解释，你可能会告诉他：“点击 `Classes` 文件中的展开三角形，然后打开扩展名为\
    \ `ViewController.h` 的文件！”\n\n你已经编写过三个头文件了，因此应该已经习惯于快速浏览这部分代码。但这次我们要放慢脚步，思考一下我们到底在做什么。在之前的所有示例中，我们只需要使用一个\
    \ `IBOutlet`，它是一个允许我们与用户交互的东西。这个说法太初级了，让我们更具体、更技术化一点。让我们深入探讨 `IBOutlet` 的本质，这样当我们进入“深入代码”部分时，你就能真正理解它。\n\
    \n看看用粗体标出的代码，看看我们是否能够更深入地理解这些元素：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
    \ helloWorld_04ViewController : UIViewController {\n\n    IBOutlet UILabel *label;\n\
    \    IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic, retain) IBOutlet\
    \ UILabel *label;\n@property (nonatomic, retain) IBOutlet UIImageView *Kant;\n\
    \n- (IBAction)buttonGuess:(id)sender;\n\n@end\n```\n\n看第一行：\n\n```\n#import <UIKit/UIKit.h>\n\
    ```\n\n这使我们能够使用 `IBOutlet` 关键字。我们用 `#import` 引入 `UIKit`，它是庞大的核心代码库（称为 `IPhoneRuntime`）中的用户界面（UI）框架，而\
    \ `IPhoneRuntime` 是 Mac 上 OS X 操作系统的精简版本。当然，`IPhoneRuntime` 更小，以便能装进 iPhone 或\
    \ iPad。\n\n当我们引入 `UIKit` 框架时，它使我们能够使用苹果已经为我们编写的大量代码——这些代码被称为类——其中就包括你已经使用过的、非常酷且流行的类：`IBOutlet`。`IBOutlet`\
    \ 关键字是一个特殊的指令，称为“实例变量”，它告诉 Interface Builder 显示你想要出现在用户 iPhone 或 iPad 上的项目。反过来，Interface\
    \ Builder 利用这些“提示”告诉编译器你将把对象连接到你的 `.xib` 文件。Interface Builder 并不会连接这些输出口，但它会告诉编译器你将添加它们。\n\
    \n整理一下我们即将使用的内容：1）楼梯的背景图片；2）康德的上层图像；3）他“返回”校园时会“说”的文本。在我们的练习中，我们将使用两个 `IBOutlets`——一个处理标签中的文本，即康德说的“Hello\
    \ World, I'm Back!”，另一个处理第二个视图，康德会在那里神奇地出现。\n\n了解了我们需要两个 `IBOutlets` 之后，我们可以想象它看起来会是什么样子。我们首先关注\
    \ `@interfacetestViewController : UIViewController` 后面的大括号内的内容。我们的代码需要如下所示：\n\n\
    ```\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController : UIViewController\
    \ {\n\nIBOutlet UILabel *label;\nIBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet UILabel *label;\n@property (nonatomic, retain) IBOutlet UIImageView\
    \ *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n```\n\n如你所见，仅看粗体代码并假设你除了粗体代码之外没有编写任何其他代码，这些\
    \ `IBOutlets` 只是占位符；一个用于生成康德所说的文本，另一个用于生成叠加在背景上的图片。\n\n我们知道，当我们向 iPhone 或 iPad\
    \ 屏幕输出文本时，会使用 `UILabel` 类。这个类用于绘制多行静态文本。因此，继续在你的第一个 `IBOutlet` 旁边输入 `UILabel`，如下代码所示。现在，考虑第二个\
    \ `IBOutlet` 需要什么。我们知道要叠加如图 4-03 所示的上层图像。这里的一个好主意是使用 `UIImageView` 类，因为它提供了苹果编写的代码，可以显示单张图像或一系列动画图像。说完这些，在你的第二个\
    \ `IBOutlet` 旁边输入 `UIImageView` 类：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
    \ helloWorld_04ViewController : UIViewController {\n\nIBOutlet UILabel *label;\n\
    \ IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic, retain) IBOutlet UILabel\
    \ *label;\n@property (nonatomic, retain) IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\
    \n@end\n```\n\n如你所见，现在我们说有两个 `IBOutlets` 就说得通了：\n\n- 我们让其中一个调用 `UILabel` 类来控制文本。\n\
    - 我们让另一个调用 `UIImageView` 类来控制第二张图像。\n"
- fmt: "# Pointers\n\nNow that we have the means to push text and an image onto the\
    \ screen of the iPhone/iPad, we need to specify which text and which image. We\
    \ sometimes use predefined code, created by the folks at Apple, which does what\
    \ it does by virtue of referencing or pointing to our resources—that is, our text\
    \ and images. As you are beginning to see, this is the context in which we will\
    \ be using pointers.\n\nIn previous examples, we told you not to worry about that\
    \ star thing (`*`). Well, now it's time to take a look at it. Let's focus for\
    \ a moment on how these (`*`) things—pointers—do what they do. We need an indirect\
    \ way to get our text and picture onto the screen. We say “indirect” because you\
    \ will not be writing the code to accomplish this—you will use Apple's code to\
    \ retrieve these. You will call up pre-existing classes, and then these classes\
    \ will call up your text and your image. That is why we say this is an indirect\
    \ means of obtaining your stuff.\n\nConsider this little analogy. Suppose you\
    \ make a citizen's arrest of a burglar who breaks into your house. You call the\
    \ police and, when they arrive, you point to the criminal and say, “Here's the\
    \ thief!” Then the policeman, not you, takes the criminal away to be charged.\n\
    \nNow, you want to display text on your iPhone/iPad. You call `UILabel`, and when\
    \ it “arrives,” you point to your words and say, “Here's the text.” Then the `UILabel`,\
    \ not you, deals with the text.\n\nYou will do likewise when you want to display\
    \ an image on your iPhone/iPad. You call `UIImageView`, and when it “arrives,”\
    \ you point to your photograph or picture and say, “Here's the image.” Then, the\
    \ `UIImageView` code, not you, deals with the picture.\n\nPerhaps you're asking\
    \ yourself what the names of these pointers are, or need to be. The good news\
    \ is that you can give them whatever names you want. Let's point the `UILabel`\
    \ to `*label` and the `UIImageView` to a pointer with the name of `*Kant`. So\
    \ again, looking at the code you've just written:\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface helloWorld_04ViewController : UIViewController {\n\n    IBOutlet\
    \ UILabel *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet UILabel *label;\n@property (nonatomic, retain) IBOutlet UIImageView\
    \ *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n```\n\nSome of the clever\
    \ people at Apple describe their reasoning for creating and coding `IBOutlets`\
    \ as giving a hint to Interface Builder as to what it should “expect” to do when\
    \ you tell it to lay out your interface.\n\n- One `IBOutlet` whispers into Interface\
    \ Builder's ear that the `UILabel` class is to use text indicated by the `*label`\
    \ pointer.\n- The other `IBOutlet` whispers into Interface Builder's ear that\
    \ the `UIImageView` class is to use the image referenced by the `*Kant` pointer.\n\
    \nWe're not done yet. After we tell Interface Builder what to expect, we need\
    \ to tell your Mac's microprocessor—through the compiler—that an important event\
    \ is about to descend upon it. One of the most important things your compiler\
    \ wants to know is when an object is coming its way. This is because objects are\
    \ independent masses of numbers and symbols that weigh upon the microprocessor\
    \ and put significant demands on it, and so the processor needs to be told by\
    \ you, the programmer, when it needs to catch the object and put it into a special\
    \ place in memory.\n\nObjects can come in a wide variety of flavors—as conceptually\
    \ different as bird, guru, soccer, and house. So, to allow the processor to handle\
    \ its job when the time comes, we need to inform it that each object we will be\
    \ using in our code has two specific and unique parameters or features: property\
    \ and type.\n\nDon't freak out! Providing this information is really easy, and\
    \ it consists of two steps.\n\nThe first step is what we just covered: we give\
    \ the compiler a head's up about objects we will be using by defining their two\
    \ specific and unique features: property and type. The second step is this: When\
    \ the microprocessor receives this data, it utilizes this information by synthesizing\
    \ it.\n\n- First, we declare that our object has a property with a specific type.\n\
    - Second, we instruct the computer to implement—or synthesize—this information.\n\
    \nIn other words, we tell the compiler about our object by declaring it, including\
    \ specific descriptive parameters of its properties. Then, we give the compiler\
    \ the go-ahead to implement our object by telling it to synthesize the object.\n\
    \nBut how do we do this declaring and implementing? We use tools in our code called\
    \ directives. We signal directives by inserting `@` before stating our directive.\
    \ This means that to declare what property our object has we put the `@` symbol\
    \ in front of the word `property` to make it a property directive: `@property`.\n\
    \nWhen we see `@property` in our code, we know it's a property directive. Similarly,\
    \ when we want to tell the compiler to process and synthesize; that is, to do\
    \ its stuff on our object, we put the `@` symbol in front of our synthesis statement:\
    \ `@synthesize`.\n\nSaying the exact same thing we said before, but translated\
    \ into geekspeak, we get:\n\n- The `@property` directive declares that our object\
    \ has a property with a specific type.\n- The `@synthesize` directive implements\
    \ the methods we declared in the `@property` directive\n\nEasy, huh? OK, just\
    \ two more points now, and then we'll get back to our code."
  raw: '#### Pointers


    Now that we have the means to push text and an image onto the screen of the iPhone/iPad,
    we need to specify which text and which image. We sometimes use predefined code,
    created by the folks at Apple, which does what it does by virtue of referencing
    or pointing to our resources—that is, our text and images. As you are beginning
    to see, this is the context in which we will be using pointers.


    In previous examples, we told you not to worry about that star thing (*). Well,
    now it''s time to take a look at it. Let''s focus for a moment on how these (*)
    things—pointers—do what they do. We need an indirect way to get our text and picture
    onto the screen. We say “indirect” because you will not be writing the code to
    accomplish this—you will use Apple''s code to retrieve these. You will call up
    pre-existing classes, and then these classes will call up your text and your image.
    That is why we say this is an indirect means of obtaining your stuff.


    Consider this little analogy. Suppose you make a citizen''s arrest of a burglar
    who breaks into your house. You call the police and, when they arrive, you point
    to the criminal and say, “Here''s the thief!” Then the policeman, not you, takes
    the criminal away to be charged.


    Now, you want to display text on your iPhone/iPad. You call `UILabel`, and when
    it “arrives,” you point to your words and say, “Here''s the text.” Then the `UILabel`,
    not you, deals with the text.


    You will do likewise when you want to display an image on your iPhone/iPad. You
    call `UIImageView`, and when it “arrives,” you point to your photograph or picture
    and say, “Here''s the image.” Then, the `UIImageView` code, not you, deals with
    the picture.


    Perhaps you''re asking yourself what the names of these pointers are, or need
    to be. The good news is that you can give them whatever names you want. Let''s
    point the `UILabel` to `*label` and the `UIImageView` to a pointer with the name
    of `*Kant`. So again, looking at the code you''ve just written:


    `#import <UIKit/UIKit.h>`


    `@interface helloWorld_04ViewController : UIViewController {`


    `    IBOutlet UILabel *``label;`

    `    IBOutlet UIImageView *``Kant;`

    `}`


    `@property (nonatomic, retain) IBOutlet UILabel *label;`

    `@property (nonatomic, retain) IBOutlet UIImageView *Kant;`


    `- (IBAction)buttonGuess:(id)sender;`


    `@end`


    Some of the clever people at Apple describe their reasoning for creating and coding
    `IBOutlets` as giving a hint to Interface Builder as to what it should “expect”
    to do when you tell it to lay out your interface.


    *   One `IBOutlet` whispers into Interface Builder''s ear that the `UILabel` class
    is to use text indicated by the `*label` pointer.

    *   The other `IBOutlet` whispers into Interface Builder''s ear that the `UIImageView`
    class is to use the image referenced by the `*Kant` pointer.


    We''re not done yet. After we tell Interface Builder what to expect, we need to
    tell your Mac''s microprocessor—through the compiler—that an important event is
    about to descend upon it. One of the most important things your compiler wants
    to know is when an object is coming its way. This is because objects are independent
    masses of numbers and symbols that weigh upon the microprocessor and put significant
    demands on it, and so the processor needs to be told by you, the programmer, when
    it needs to catch the object and put it into a special place in memory.


    Objects can come in a wide variety of flavors—as conceptually different as bird,
    guru, soccer, and house. So, to allow the processor to handle its job when the
    time comes, we need to inform it that each object we will be using in our code
    has two specific and unique parameters or features: property and type.


    Don''t freak out! Providing this information is really easy, and it consists of
    two steps.


    The first step is what we just covered: we give the compiler a head''s up about
    objects we will be using by defining their two specific and unique features: property
    and type. The second step is this: When the microprocessor receives this data,
    it utilizes this information by synthesizing it.


    *   First, we declare that our object has a property with a specific type.

    *   Second, we instruct the computer to implement—or synthesize—this information.


    In other words, we tell the compiler about our object by declaring it, including
    specific descriptive parameters of its properties. Then, we give the compiler
    the go-ahead to implement our object by telling it to synthesize the object.


    But how do we do this declaring and implementing? We use tools in our code called
    directives. We signal directives by inserting `@` before stating our directive.
    This means that to declare what property our object has we put the `@` symbol
    in front of the word `property` to make it a property directive: `@property`.


    When we see `@property` in our code, we know it''s a property directive. Similarly,
    when we want to tell the compiler to process and synthesize; that is, to do its
    stuff on our object, we put the `@` symbol in front of our synthesis statement:
    `@synthesize`.


    Saying the exact same thing we said before, but translated into geekspeak, we
    get:


    *   The `@property` directive declares that our object has a property with a specific
    type.

    *   The `@synthesize` directive implements the methods we declared in the `@property`
    directive


    Easy, huh? OK, just two more points now, and then we''ll get back to our code.'
  trans: "\n# 指针\n\n既然我们已经掌握了将文本和图像推送到 iPhone/iPad 屏幕上的方法，接下来就需要指定具体是哪些文本和图像。有时我们会使用苹果公司预先定义好的代码，这些代码通过引用或指向我们的资源（即文本和图像）来发挥作用。正如你开始意识到的，这就是我们使用指针的上下文。\n\
    \n在之前的例子中，我们告诉你不用去担心那个星号（`*`）。好吧，现在是时候来看看它了。让我们先集中注意力，了解一下这些（`*`）——指针——是如何工作的。我们需要一种间接的方法来将文本和图片放到屏幕上。之所以说“间接”，是因为你不会亲自编写代码来完成这个任务——而是会使用苹果公司的代码来获取它们。你会调用预先存在的类，然后这些类会调用你的文本和图像。这就是为什么我们说这是一种获取你内容的间接方式。\n\
    \n考虑一个简单的类比。假设你亲手逮捕了一名闯入你家的窃贼。你报警后，警察到达时，你指着罪犯说：“这就是小偷！”然后，由警察（而不是你）将罪犯带走并起诉。\n\
    \n现在，你想在 iPhone/iPad 上显示文本。你调用 `UILabel`，等它“到达”时，你指着你的文字说：“这就是文本。”然后，由 `UILabel`（而不是你）来处理这段文本。\n\
    \n同理，当你想在 iPhone/iPad 上显示图像时，你调用 `UIImageView`，等它“到达”时，你指着你的照片或图片说：“这就是图像。”然后，由\
    \ `UIImageView` 代码（而不是你）来处理这张图片。\n\n也许你正在问自己，这些指针的名字是什么，或者应该是什么。好消息是，你可以随意给它们命名。让我们将\
    \ `UILabel` 指向 `*label`，将 `UIImageView` 指向一个名为 `*Kant` 的指针。那么，再看看你刚刚写好的代码：\n\n\
    ```\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController : UIViewController\
    \ {\n\n    IBOutlet UILabel *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property\
    \ (nonatomic, retain) IBOutlet UILabel *label;\n@property (nonatomic, retain)\
    \ IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n\
    ```\n\n苹果公司一些聪明的人这样描述他们创建和编写 `IBOutlet` 的初衷：是为了向 Interface Builder 提供一个提示，告诉它在布置界面时应该“期望”做什么。\n\
    \n- 一个 `IBOutlet` 向 Interface Builder“耳语”：`UILabel` 类将使用 `*label` 指针所指示的文本。\n\
    - 另一个 `IBOutlet` 向 Interface Builder“耳语”：`UIImageView` 类将使用 `*Kant` 指针所引用的图像。\n\
    \n我们还没说完。在告诉 Interface Builder 该期望什么之后，我们需要通过编译器告诉 Mac 的微处理器：一个重要的“事件”即将降临。编译器最关心的事情之一就是某个对象何时到达。这是因为对象是独立的数据和符号集合，它们会占用微处理器资源并对其提出重大需求，因此，作为程序员的你需要告诉处理器何时需要接收该对象并将其放入内存中的一个特殊位置。\n\
    \n对象可以有多种类型——在概念上可以像鸟、大师、足球和房子一样各不相同。因此，为了让处理器在需要时能够完成其工作，我们需要告知它：我们将要在代码中使用的每个对象都有两个特定且唯一的参数或特性：属性和类型。\n\
    \n别慌！提供这些信息其实很简单，只需要两步。\n\n第一步就是我们刚刚讲过的：通过定义对象的两个特定且唯一的特性（属性和类型），来预先告知编译器我们会用到哪些对象。第二步是这样的：当微处理器接收到这些数据时，它会通过综合处理（synthesizing）来利用这些信息。\n\
    \n- 首先，我们声明我们的对象拥有一个特定类型的属性。\n- 其次，我们指示计算机实施（或综合）这一信息。\n\n换句话说，我们通过声明对象（包括对其属性的具体描述参数）来告知编译器该对象的信息。然后，我们通过告诉编译器综合（synthesize）该对象，来授权它实施我们的对象。\n\
    \n但我们如何进行声明和实施呢？我们在代码中使用一种叫做指令（directives）的工具。我们通过在指令前加上 `@` 来发出信号。这意味着，要声明我们的对象拥有什么属性，我们可以在单词\
    \ `property` 前面加上 `@` 符号，使其成为一个属性指令：`@property`。\n\n当我们在代码中看到 `@property`，我们就知道它是一个属性指令。同样地，当我们想告诉编译器进行处理和综合，也就是对对象进行操作时，我们在综合语句前加上\
    \ `@` 符号：`@synthesize`。\n\n把我们刚才说的用“极客”语言重述一遍就是：\n\n- `@property` 指令声明我们的对象拥有一个特定类型的属性。\n\
    - `@synthesize` 指令实现在 `@property` 指令中声明的方法。\n\n很简单，是吧？好了，现在只剩最后两点，然后我们就回到代码部分。\n"
- fmt: "### Properties: Management & Control\n\nThe first elaboration I want to make\
    \ is that we also need to specify whether this property will be read-only or read-write.\
    \ In other words, we need to specify whether it will always stay the same or whether\
    \ it can mutate into something new. In geekspeak, we call this mutability. For\
    \ the most part, we will use Apple code to handle the mutability of properties\
    \ with respect to our objects.\n\nIn order to instruct the Apple code to handle\
    \ the mutability property, we'll designate the property as `nonatomic`. To apply\
    \ this term meaningfully, try contrasting `nonatomic` with `atomic`. Recall that\
    \ `atomic` means powerful, and it implies the ability to go into the microscopic\
    \ world and to effect change. Therefore, `nonatomic` must mean not-so-powerful,\
    \ more superficial, and unmanipulable.\n\nIf we designate a property (such as\
    \ mutability) as `nonatomic`, we are basically saying, \"Apple, please handle\
    \ our mutability and related stuff—I really don't care. I'll take your word for\
    \ it!\" At a later date, you may want to take direct control of this property,\
    \ and then you would designate it as `atomic`. At this time, though, we will use\
    \ the more relaxed approach and let Apple handle the microscopic business. So,\
    \ when it's time to choose one or the other designation, just use `nonatomic`!\n\
    \nThe second elaboration I want to make at this point deals with memory management.\
    \ We need to address the issue of how to let the iPhone/iPad know, when we store\
    \ an object, whether it shall be read-only or read-write. In other words, we need\
    \ to be able to communicate to the computer the nature of the memory associated\
    \ with an object—in terms of who gets to change it, when, and how. Generally speaking,\
    \ we will want to control this information, and keep it in our own hands—that\
    \ is, to retain it. As you move through the remaining exercises in this book,\
    \ we are going to keep the code in our own hands; we will retain the right to\
    \ manage our memory.\n\nWe can summarize the addition of these details to the\
    \ property directives, and how we would modify the code, as follows:\n\n*   The\
    \ `@property (nonatomic, retain)` directive says the following:\n    *   Mutability\
    \ should be `nonatomic`. Apple, please handle this!\n    *   Memory management\
    \ is something we want to `retain`. We will maintain control.\n*   The `@synthesize`\
    \ directive implements the methods we declared in the `@property` directive.\n\
    \nWe have one more layer of complexity to add to this mix. We add those directives\
    \ in two different files. We define the `@property` directive with a statement\
    \ in the header file, and then we implement it by using the `@synthesize` directive\
    \ in our implementation file.\n\n*   Header File: `helloWorld_04_ViewController.h`\n\
    \n```objc\n@property (nonatomic, retain) //\"our stuff\"\n```\n\n*   Implementation\
    \ File: `helloWorld_04_ViewController.m`\n\n```objc\n@synthesize //\"our stuff\"\
    \ we defined in @property in the header file.\n```\n\nWe will need to write two\
    \ of these for each of our two `IBOutlets`: one for the text, and the other for\
    \ the picture. In addition, because we're still in the header file, we need to\
    \ repeat this when we synthesize it in the implementation file. OK, time to go\
    \ ahead and enter your code:\n\n```objc\n#import <UIKit/UIKit.h>\n\n@interface\
    \ helloWorld_04ViewController : UIViewController {\n\n    IBOutlet UILabel *label;\n\
    \    IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic, retain) IBOutlet\
    \ UILabel *label;\n@property (nonatomic, retain) IBOutlet UIImageView *Kant;\n\
    \n- (IBAction)buttonGuess:(id)sender;\n\n@end\n```\n\nYes, that seemed like a\
    \ lot of explanation just to say: `@property (nonatomic, retain)`. Remember, though,\
    \ that we're deep in the trenches… we're telling the computer that we want Apple\
    \ to take care of mutability, but that we want to retain control of the memory.\
    \ Later, we will synthesize these commands in the implementation file, for both\
    \ `IBOutlets`.\n\n`IBOutlets`? Remember them? Oh yeah—let's return to that part\
    \ of your program. The `IBOutlet` for the text is `UILabel` with pointer `*label`,\
    \ so we entered the code to control the text for the label as follows:\n\n```objc\n\
    #import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController : UIViewController\
    \ {\n\n    IBOutlet UILabel *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property\
    \ (nonatomic, retain) IBOutlet UILabel *label;\n@property (nonatomic, retain)\
    \ IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n\
    ```\n\nThe `IBOutlet` for the picture is `UIImageView` with pointer `*uiImageView`,\
    \ so enter the code for the picture:\n\n```objc\n#import <UIKit/UIKit.h>\n\n@interface\
    \ helloWorld_04ViewController : UIViewController {\n\n    IBOutlet UILabel *label;\n\
    \    IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic, retain) IBOutlet\
    \ UILabel *label;\n@property (nonatomic, retain) IBOutlet UIImageView *Kant;\n\
    \n- (IBAction)buttonGuess:(id)sender;\n\n@end\n\n    IBOutlet UIImageView *uiImageView;\n\
    ```\n\nAre we done with the header file yet? Not quite. We need to look at our\
    \ `IBActions`. We've analyzed our `IBOutlets`, both of them, but now we're going\
    \ to analyze the `IBAction` we used for our… can you guess?"
