    # 76. 作为一名极客，你可能希望在最后一个视图控制器的导航栏中显示正确的“Ü”字符。


    最初，在视频和图 7-76 到 7-85 中，我详细解释了如何做到这一点。这本来很完美。但过程中发生了一些事。Mac OS X Lion 完全消除了这一需求，算是个意外之喜。现在，你只需长按
    `u` 键，直到出现一个小窗口，然后做出所需的选择。其他字符也有类似的变体。你可以自行探索。


    因此，从图 7-76 到 7-89 之间的所有这些步骤原本打算删除，但后来又发生了一件有趣的事。许多大学和社区学院最近才更新到 Mac Leopard，并且至少在一年内不会获得
    Lion 的授权。这意味着成千上万的学生将不知道如何正确输入“Ü”。所以，如果你用的是 Lion，请长按 `u` 键直到出现正确的字母，然后转到图 7-86。如果你没有
    Lion，请按照以下步骤操作。首先，从 Apple 菜单中打开系统偏好设置应用，如图 7-76 所示。


    ![images](img/00302.jpg)


    **图 7-77.** 打开“语言与文本”偏好设置面板。


    # 77. 打开顶行中的“语言与文本”偏好设置面板，如图 7-77 所示。


    ![images](img/00303.jpg)


    **图 7-78.** 选择“键盘与字符显示程序”。


    # 78. 在“输入源”选项卡中，从源列表中选择“键盘与字符显示程序”。同时，打开菜单项，如图 7-78 底部附近所示。


    ![images](img/00304.jpg)


    **图 7-79.** 最小化此窗口以释放屏幕空间。


    # 79. 现在，最小化此窗口以释放屏幕空间。稍后你将再次关闭该菜单项。见图 7-79。


    ![images](img/00305.jpg)


    **图 7-80.** 调出“字符显示程序”。


    # 80. 现在，从菜单栏中出现的新图标中，选择“显示字符显示程序”。会显示一个微型键盘。当你在键盘上打字时，相应的按键会高亮显示，如图 7-80 所示。


    ![images](img/00306.jpg)


    **图 7-81.** 你需要的是橙色按键。


    # 81. 按住 Option 键会显示大量可供键入的符号。橙色按键对应其他语言中字符上方带有标记的特殊键，例如“ö”或“ê”。嗯，这正是你需要的。见图 7-81。


    ![images](img/00307.jpg)


    **图 7-82.** 进入“超级极客”（Über Geek）编辑模式！


    # 82. 回到 Xcode，双击`ÜberView`的标题栏进行编辑。首先键入 Option-u，同时观察下方的小键盘。现在你会看到一个黄色方框中的两个点。你接下来键入的字母上方将带有这个标记。键入
    Shift-u。铛铛——Ü。然后输入“ber Geek”完成它，如图 7-83 所示。


    ![images](img/00308.jpg)


    **图 7-83.** 瞧！现在你已经正确拼写了“Über”。


    # 83. 图 7-83 显示了“Über Geek”的正确拼写。


    ![images](img/00309.jpg)


    **图 7-84.** 关闭键盘。


    # 84. 图 7-84 展示了如何像关闭其他窗口一样关闭键盘。


    ![images](img/00310.jpg)


    **图 7-85.** 隐藏菜单项。


    # 85. 如前所述，你可能希望从之前最小化的偏好设置面板中隐藏该菜单项，如图 7-85 所示。


    ![images](img/00311.jpg)


    **图 7-86.** 保存！


    # 86. 让我们保存所有内容并测试一下，如图 7-86 所示。


    ![images](img/00312.jpg)


    **图 7-87.** 运行它！


    # 87. 图 7-87 展示了最后一步——运行它。


    ![images](img/00313.jpg)


    **图 7-88.** 试着在脑子里理清头绪——如你所见，安东尼丢掉了他的头，然后找到了另一个，接着意识到他一开始并没有丢掉自己的第一个头，而现在他有两个头了！


    # 88. 做得好！


    ## 深入代码


    是的，我知道这个过程相当累人。学生们上完这节课后都精疲力尽了。我试图理解为什么会这样。当我告诉他们这比编程容易得多时，他们看着我，仿佛我失去了理智。考虑到这一点，我决定将下一章作为复习内容，但会使用一个业务模型，这样就能一举两得：既能让你练习本章所学的内容，又能增加一些变化，让企业主和其他具有创新思维的人看到如何将故事板应用于财务模型。


    因此，本章的“深入代码”部分将作为一个高级参考保留下来，你可以在以后尝试高级版故事板时再回来查阅。所以，要么直接进入第 8 章，要么快速浏览一下“深入代码”，即使没吸收任何东西也不必慌张。只需让大脑看看这里的内容，放空一下，休息片刻，然后继续下一章。

    '
- fmt: '# Storyboard View Controllers, iOS4 and Programmatically Creating Them


    The question I get asked the most by students, and folks on the web, is whether
    storyboards will be compatible with iOS4. I am not sure why so many people want
    to know this. Move forward, embrace new technology, and keep moving forward into
    new territory. But the answer is NO! Storyboards never have been, and never will
    be, compatible with iOS4 because they are based upon new runtime classes only
    available in iOS5 and Lion. The next most popular question is whether one can
    program the storyboard. Mmm, let''s see, that is almost like saying, “OK, I have
    a car I can drive, but can I get out and push it?”


    I cannot understand why so many people want to change it, or try to get under
    the hood. I could understand this if you had first mastered storyboarding and
    found huge gaps that you want to get around. However, in this case, as I write
    this, storyboarding has hardly been out very long, and people who have not done
    a single storyboarding app want to know if they can change it. I am going to answer
    this question, though, because by the time this book is released there is a chance
    that the latter will apply.


    To answer this, you need to view storyboarding from the runtime point of view.
    The transitions and segues between view controllers ought to be viewed in runtime.
    Here, one will note that there is indeed a mechanism to instantiate segues programmatically.


    * First, looking at how to program and tweak an existing segue programmatically,
    you need to look at the code that exists between the current view controller and
    the destination view controller. This is where you will be able to trigger your
    segue programmatically, using the `performSegueWithIdentifier:sender:` method
    of `UIViewController`.

    * Second, if you do not have a segue between your view controllers, but you have
    defined your destination in your storyboard file, then you are in luck. You can
    load the view controller programmatically with the `instantiateViewControllerWithIdentifier:`
    method of `UIStoryboard`. After you have done this, you can connect your view
    controller by simply pushing it on a navigation stack. Warning—do not attempt
    to access it through Interface Builder. I''ve seen some of my students'' Macs
    completely crash.

    * Finally, if your storyboard is not connected to your destination view controller,
    you can create it programmatically, however the author has not explored this in
    depth in the Apple Dev site. It is there—I have no idea why you would want to
    do this, but it is in the View Controller Programming Guide for iOS.


    If you do want to understand storyboarding, it is important to remember two things:


    * First, it inherits from, and conforms to, `NSObject`

    * Second, its framework is from `/System/Library/Frameworks/UIKit.framework`.


    The important issue I want you to understand is that, right now, you can program
    endlessly using what you already know about storyboarding. Keep in mind the basics,
    and really understand these basics. Forget about programming storyboards programmatically.
    Use it as it is, and understand the basics.


    The first basic function of storyboards that you must know is that they all need
    to begin with an initial view controller that represents the starting point of
    your app and connects to your user interface. This will be the first screen your
    user sees. In your case, it was the My Story View Controller. If you have a bug,
    you may want to check your transitions to the initial view controller in a different
    storyboard file, which is the storyboard file specified in the application''s
    `Info.plist` file, using the `UIMainStoryboardFile` key, which is the initial
    view controller that is loaded and presented automatically when your program begins.


    ## In the Chapter Ahead


    In [Chapter 8](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_024.html#filepos597398),
    we will introduce you to the world of debugging. We will first take a broad look
    at the debugging landscape. We will talk about some of the intimidating debugging
    tools, what they mean, when you may use debugging in the future, and most importantly
    how you can debug now using a very simple tool.


    You will learn how to find a bug in code you wrote in a previous chapter. But
    more importantly you will embrace the art of debugging rather than view it as
    an endless, hopeless, bottomless pit.


    Onward to the bugs that await us in the next chapter!


    # Chapter 8


    # Debugging


    As you begin the eighth chapter, you''ll start operating at a higher level. You
    may notice that in this chapter I use a different approach to teach you about
    debugging. In order for you to understand why this is an important chapter, I
    want you to consider the road that led me to presenting this chapter and its exercises.


    So, what''s the beef with debugging?


    In 1988, at the University of Montana in Bozeman, I found myself in my first computer
    science class. It was fun getting out of the Electrical Engineering building every
    now and again to dabble around in software. We''d rush over—sometimes in bitter,
    minus 20-degree weather and blinding snow—to get to the Computer Science building
    across the quad. During my class in Pascal, an old language we used to learn with
    FORTRAN in order to get to the C Programming Language (which was a categorical
    imperative for all the geeks at Bozeman), something amazing happened.


    I was trying to compile an in-class exercise. But every time I tried to compile
    my code that day, errors would appear in those glowing green numbers on the black
    screen. Back in those days, there was no indication of how many errors had occurred,
    or what or where they could be. It only said, “ERROR: FAILED TO COMPILE.” I could
    not fix it, and suddenly my love for computer science began to plummet at a precipitous
    rate. Upon seeing how upset I was, the TA immediately went to the front of the
    class, and in a loud, piercing voice that got everyone''s attention, announced:


    > Listen, class. I don''t want to see y''all getting weird and upset like Rory
    over there. Your code will NEVER COMPILE THE FIRST TIME!! Do you hearhhhh me?
    Your code will NEVER compile the first time, so just get over it!


    I''ll never forget that—especially now, as I see so many young computer science
    and engineering students drop out of computer science in their freshman year,
    right at the point that debugging and arrays hit them.


    I also remember something my uncle told me when I was just a kid in Durban, South
    Africa, my place of birth. He was teaching me to surf in the huge, treacherous
    waves, and he said that if I wanted to handle the ten- to twenty-foot surf, first
    I had to learn how to “wipe out.”


    > Rory... you WILL wipe out. You WILL be held under the water for 15 to 20 seconds,
    so it is imperative that you learn how to survive a huge wipe. That way, you''ll
    be fearless out there!


    Wow! I could not believe it took me years to associate these two analogous situations
    and their lessons. After that, I started making my students go back to code that
    they knew they could handle and having them program mistakes into it. Then, I''d
    have them give it to a partner, and guide one another as each debugged the other''s
    code. Over the years, debugging tools have evolved. In fact, debugging tools themselves
    have become very complex and intimidating to students. With this in mind, I have
    created a segue for you into learning to love debugging and feeling inspired to
    learn more complex debugging tools. You are at a stage where you are going to
    write more code than you ever have before. You WILL get errors, and I want you
    to be able to handle these tough times. This is why I am going to teach you the
    first lesson of crashing and burning.


    **NOTE**: You WILL crash. Let''s learn how to crash quickly, survive, and get
    back to flying!'
