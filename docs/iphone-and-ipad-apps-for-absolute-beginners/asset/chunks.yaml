- fmt: '# Computer Science: A Broad and Diverse Landscape


    Consider this analogy: suppose that the iPhone/iPad is a car. Most of us drive
    cars in the same way that we use computers. Just as I would not attempt to teach
    you how every part of the car works if I were giving you driving lessons, I would
    not—and will not—approach iPhone and iPad programming with fundamental computer
    engineering as the first step.


    Even great mechanics who work on cars every day rarely know the fundamental physics
    and electronics behind the modern internal combustion engine, not to mention all
    the auxiliary systems. They can drive a car, diagnose what’s wrong with it when
    it needs servicing, and use their tools and machines (including computers) to
    repair and tune it optimally. Similarly, clever programmers who create the apps
    for the iPhone and iPad rarely know the fundamental coding and circuit board designs
    at the root of the Apple platforms. Nevertheless, they can use these devices,
    they can envision a new niche in the broad spectrum of applications needs, and
    they can use their tools and applications—residing on their desktops and laptops—to
    design, code, and deliver their ideas to the market.


    To continue with this analogy, programming the iPhone or iPad is like playing
    with the engine of your car—customizing it to do the things you want it to do.
    Apple has designed a computing engine every bit as fantastic as a V8 motor. Apple
    has also provided a pretty cool chassis in which we can modify and rebuild our
    computing engine. However, we have restrictions on how we can “pimp” our iPhone/iPad
    cars. For those of you who have never pimped a car, I will demonstrate how to
    maximize creative possibilities while honoring these restrictions.


    I’m going to show you, without too much detail, how to swap oil filters, tires,
    seats, and windows to convert your vehicle into an off-road car, a hot rod, a
    racing car, or a car that can get us through the jungle. When you’ve mastered
    this book, you will know how to focus on and modify the engine, the transmission,
    the steering, the power train, the fuel efficiency, or the stereo system of the
    car.


    ## Why Purgatory Exists In Objective-C


    My Assumption: you’ve never worked on a car, and you’ve never gotten grease on
    your hands, and you want to pimp one of the world’s most powerful automobiles—with
    a complex V8 engine. I’m going to show you exactly how to do this, and we’re going
    to have fun doing it!


    First, you need to know a little about how we even came to have the souped-up
    car with the V8—that is, the iPad. In 1971, Steve Jobs and Steve Wozniak met,
    and five years later they formed Apple, producing one of the first commercially
    successful personal computers. In 1979, Jobs visited Xerox PARC (Palo Alto Research
    Center), and secured the Xerox Alto''s features into their new project, then called
    the Lisa. Although the Alto was not a commercial product, it was the first personal
    computer to use the desktop metaphor and graphical user interface (GUI). The Lisa
    was the first Apple product with a mouse and a GUI.


    In early 1985, Jobs lost a power struggle with the Board of Directors at Apple,
    resigned from the company, and founded `NeXT`, which was eventually bought out
    by Apple in 1997. During his time at `NeXT`, Jobs changed some critical features
    of the code on the Macintosh (Mac) to talk in a new language—a very intense but
    beautiful language called `Objective-C`. The power of this language was in its
    ability to efficiently use objects. Rather than reprogramming code that was used
    in one portion of the application, `Objective-C` reused these objects. Jobs’ brain
    was on overdrive at the time, and this incredible code took this new language
    of `Objective-C` to new heights. His inspiration was fused into the guts of the
    Mac by creating a metalanguage we call `Cocoa`. A metalanguage is a language used
    to analyze or define another language. As I’ve indicated, `Objective-C` is a very
    challenging beast, and you can think of `Cocoa` as the linguistic taming of the
    beast, or at least the caging of the beast.


    As an “absolute beginner” to the world of programming, you cannot be expected
    to be concerned with the subtleties of coding language distinctions. I am simply
    giving you an overview here, so that you will have a rough historical context
    in which to place your own experience. The main point I’m making here is that
    `Objective-C` and `Cocoa` are very powerful tools, and both are relevant to the
    programming of the iPhone/iPad.


    ## Houston, We Have a Problem


    This is the essence of the challenge that intrigued me, and led to the design
    of my original course. How can one teach non-engineering students, perhaps like
    you, something that even the best engineering students struggle with? At the university
    level, we typically have students first take introductory programming classes,
    and then proceed to introductory object-oriented programming, such as `C#` or
    `C++`.


    That being said, we are going to dive head on into `Objective-C`! At times, I’m
    going to put blindfolds onto you; at other times, I’m going to cushion the blows.
    There will be times when you may need to reread pages or rewind video examples
    a few times—so that you can wrap your head around a difficult concept.


    ## How We’ll Visit Purgatory Every Now and Again


    At specific places in my courses, I know that half the class will immediately
    get it, a quarter will have to sweat over it before they get it, and the remaining
    quarter will struggle and give up. This third group will typically transfer out
    of engineering and take an easier curriculum. I know where these places are, and
    I’m not going to tell you. I’ll repeat that. I will not tell you.


    Don’t worry, I won’t allow you to disturb a hornet’s nest (of `Objective-C` issues)
    and get stung to death. Nor will I mark off those concepts that you may find difficult.
    I’m not going to explain this now. Just accept it! If you just relax and follow
    my lead, you’ll get through this book with flying colors.


    When you do find yourself in one of those tough spots, persevere. You can always
    reread the section, rewind the video examples, or—most importantly—go visit the
    Forum where many people, including myself, are often online and ready to help
    you immediately. We may refer you to somebody else''s solution or we may help
    you directly. So go to the forum, say “hello” to the crowd, and become immersed
    by first seeking help from others and then going back to help others. The forum
    is located at: [`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)
    or `bit.ly/oLVwpY`. See [Figure 1–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos89581).


    ![images](images/00028.jpg)


    Figure 1–20. Visiting the Forum can help if you find yourself in a tough spot.


    ## Looking Forward… Beginning iPhone 4 Development: Exploring the iPhone SDK


    Down the line, some of you may want to continue your iPhone and iPad programming
    adventure by reading Dave Mark and Jeff Lamarche’s book, `Beginning iPhone 4 Development:
    Exploring the iPhone SDK` (Apress, 2009). Remember the analogy of becoming a mechanic
    for an automobile with a V8 engine mounted on a basic chassis? Their book presumes
    that the readers know what a carburetor is, know what a piston is, and that they
    can mount racing tires and super fly rims on their friends’ pimped-up wheels.


    In other words, they assume that you understand the fundamentals of object-oriented
    programming: that you know what objects, loops, and variables are, and that you
    are familiar with the `Objective-C` programming language.


    On the other hand, I assume that you don’t know, for example, what a “class” is,
    or what a “member” or “void” is. I imagine that you have no idea how memory management
    works on an iPhone/iPad and, furthermore, that you never had an interest—until
    now—in understanding an array, or an `SDK`.'
  raw: '#### Computer Science: A Broad and Diverse Landscape


    Consider this analogy: suppose that the iPhone/iPad is a car. Most of us drive
    cars in the same way that we use computers. Just as I would not attempt to teach
    you how every part of the car works if I were giving you driving lessons, I would
    not—and will not—approach iPhone and iPad programming with fundamental computer
    engineering as the first step.


    Even great mechanics who work on cars every day rarely know the fundamental physics
    and electronics behind the modern internal combustion engine, not to mention all
    the auxiliary systems. They can drive a car, diagnose what’s wrong with it when
    it needs servicing, and use their tools and machines (including computers) to
    repair and tune it optimally. Similarly, clever programmers who create the apps
    for the iPhone and iPad rarely know the fundamental coding and circuit board designs
    at the root of the Apple platforms. Nevertheless, they can use these devices,
    they can envision a new niche in the broad spectrum of applications needs, and
    they can use their tools and applications—residing on their desktops and laptops—to
    design, code, and deliver their ideas to the market.


    To continue with this analogy, programming the iPhone or iPad is like playing
    with the engine of your car—customizing it to do the things you want it to do.
    Apple has designed a computing engine every bit as fantastic as a V8 motor. Apple
    has also provided a pretty cool chassis in which we can modify and rebuild our
    computing engine. However, we have restrictions on how we can “pimp” our iPhone/iPad
    cars. For those of you who have never pimped a car, I will demonstrate how to
    maximize creative possibilities while honoring these restrictions.


    I’m going to show you, without too much detail, how to swap oil filters, tires,
    seats, and windows to convert your vehicle into an off-road car, a hot rod, a
    racing car, or a car that can get us through the jungle. When you’ve mastered
    this book, you will know how to focus on and modify the engine, the transmission,
    the steering, the power train, the fuel efficiency, or the stereo system of the
    car.


    ##### Why Purgatory Exists In Objective-C


    My Assumption: you’ve never worked on a car, and you’ve never gotten grease on
    your hands, and you want to pimp one of the world’s most powerful automobiles—with
    a complex V8 engine. I’m going to show you exactly how to do this, and we’re going
    to have fun doing it!


    First, you need to know a little about how we even came to have the souped-up
    car with the V8—that is, the iPad. In 1971, Steve Jobs and Steve Wozniak met,
    and five years later they formed Apple, producing one of the first commercially
    successful personal computers. In 1979, Jobs visited Xerox PARC (Palo Alto Research
    Center), and secured the Xerox Alto''s features into their new project, then called
    the Lisa. Although the Alto was not a commercial product, it was the first personal
    computer to use the desktop metaphor and graphical user interface (GUI). The Lisa
    was the first Apple product with a mouse and a GUI.


    In early 1985, Jobs lost a power struggle with the Board of Directors at Apple,
    resigned from the company, and founded NeXT, which was eventually bought out by
    Apple in 1997\. During his time at NeXT, Jobs changed some critical features of
    the code on the Macintosh (Mac) to talk in a new language—a very intense but beautiful
    language called Objective-C. The power of this language was in its ability to
    efficiently use objects. Rather than reprogramming code that was used in one portion
    of the application, Objective-C reused these objects. Jobs’ brain was on overdrive
    at the time, and this incredible code took this new language of Objective-C to
    new heights. His inspiration was fused into the guts of the Mac by creating a
    metalanguage we call Cocoa. A metalanguage is a language used to analyze or define
    another language. As I’ve indicated, Objective-C is a very challenging beast,
    and you can think of Cocoa as the linguistic taming of the beast, or at least
    the caging of the beast.


    As an “absolute beginner” to the world of programming, you cannot be expected
    to be concerned with the subtleties of coding language distinctions. I am simply
    giving you an overview here, so that you will have a rough historical context
    in which to place your own experience. The main point I’m making here is that
    Objective-C and Cocoa are very powerful tools, and both are relevant to the programming
    of the iPhone/iPad.


    ##### Houston, We Have a Problem


    This is the essence of the challenge that intrigued me, and led to the design
    of my original course. How can one teach non-engineering students, perhaps like
    you, something that even the best engineering students struggle with? At the university
    level, we typically have students first take introductory programming classes,
    and then proceed to introductory object-oriented programming, such as C# or C++.


    That being said, we are going to dive head on into Objective-C! At times, I’m
    going to put blindfolds onto you; at other times, I’m going to cushion the blows.
    There will be times when you may need to reread pages or rewind video examples
    a few times—so that you can wrap your head around a difficult concept.


    ##### How We’ll Visit Purgatory Every Now and Again


    At specific places in my courses, I know that half the class will immediately
    get it, a quarter will have to sweat over it before they get it, and the remaining
    quarter will struggle and give up. This third group will typically transfer out
    of engineering and take an easier curriculum. I know where these places are, and
    I’m not going to tell you. I’ll repeat that. I will not tell you.


    Don’t worry, I won’t allow you to disturb a hornet’s nest (of Objective-C issues)
    and get stung to death. Nor will I mark off those concepts that you may find difficult.
    I’m not going to explain this now. Just accept it! If you just relax and follow
    my lead, you’ll get through this book with flying colors.


    When you do find yourself in one of those tough spots, persevere. You can always
    reread the section, rewind the video examples, or—most importantly—go visit the
    Forum where many people, including myself, are often online and ready to help
    you immediately. We may refer you to somebody else''s solution or we may help
    you directly. So go to the forum, say “hello” to the crowd, and become immersed
    by first seeking help from others and then going back to help others. The forum
    is located at: [`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)
    or `bit.ly/oLVwpY`. See [Figure 1–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos89581).


      ![images](images/00028.jpg)  


    Figure 1–20\. Visiting the Forum can help if you find yourself in a tough spot.


    ##### Looking Forward… Beginning iPhone 4 Development: Exploring the iPhone SDK


    Down the line, some of you may want to continue your iPhone and iPad programming
    adventure by reading Dave Mark and Jeff Lamarche’s book, Beginning iPhone 4 Development:
    Exploring the iPhone SDK (Apress, 2009). Remember the analogy of becoming a mechanic
    for an automobile with a V8 engine mounted on a basic chassis? Their book presumes
    that the readers know what a carburetor is, know what a piston is, and that they
    can mount racing tires and super fly rims on their friends’ pimped-up wheels.


    In other words, they assume that you understand the fundamentals of object-oriented
    programming: that you know what objects, loops, and variables are, and that you
    are familiar with the Objective-C programming language.


    On the other hand, I assume that you don’t know, for example, what a “class” is,
    or what a “member” or “void” is. I imagine that you have no idea how memory management
    works on an iPhone/iPad and, furthermore, that you never had an interest—until
    now—in understanding an array, or an SDK.'
  trans: '

    # 计算机科学：一片广阔而多元的天地


    打个比方：假设 iPhone/iPad 是一辆汽车。我们大多数人使用电脑的方式，就像开车一样。正如我如果教你开车，不会试图让你了解每个零件的工作原理一样，我也不会——也绝不会——把基础计算机工程学作为学习
    iPhone 和 iPad 编程的第一步。


    即便是每天修车的优秀技师，也鲜少了解现代内燃机背后的基础物理和电子学原理，更不用说所有辅助系统了。他们会开车，能诊断出车辆需要维修时的故障，并能借助工具和机器（包括电脑）进行最佳修复和调试。同理，为
    iPhone 和 iPad 开发应用的聪明程序员，也极少了解 Apple 平台底层的核心代码和电路板设计。尽管如此，他们能使用这些设备，能在广阔的应用需求领域中构想出新的细分市场，并能利用桌面和笔记本电脑上的工具与应用，来设计、编码，并将他们的想法推向市场。


    继续用这个类比，为 iPhone 或 iPad 编程就像摆弄你的汽车引擎——对其进行定制，让它做你想做的事。苹果公司设计了一款和 V8 发动机一样令人赞叹的计算引擎。苹果公司还提供了一个相当酷的“底盘”，我们可以在上面改装和重建我们的计算引擎。然而，我们在“改装”iPhone/iPad
    这辆“汽车”时会受到一些限制。对于从未改装过汽车的朋友，我将演示如何在遵守这些限制的同时，最大化发挥创意。


    我会带你了解，如何在不涉及过多细节的情况下，更换机油滤清器、轮胎、座椅和车窗，把你的车变成一辆越野车、一辆 hot rod 改装车、一辆赛车，或一辆能带我们穿越丛林的车。当你掌握了本书的内容，你就会知道如何专注于并改进汽车的引擎、变速箱、转向系统、动力传动系统、燃油效率或立体声音响。


    ## 为什么 Objective-C 中存在“炼狱”


    我的假设是：你从未修过车，手上从未沾过油污，并且你想改装一辆世界上最强大的汽车——它拥有一台复杂的 V8 发动机。我会精确地向你展示如何做到这一点，而且这个过程会很有趣！


    首先，你需要稍微了解一下，我们是如何拥有这台装有 V8 发动机的改装车——也就是 iPad 的。1971 年，史蒂夫·乔布斯和史蒂夫·沃兹尼亚克相识，五年后他们创立了苹果公司，生产了首批商业上成功的个人电脑之一。1979
    年，乔布斯访问了施乐 PARC（帕洛阿尔托研究中心），并将施乐 Alto 的特性应用到他们的新项目——后来被称为 Lisa 的电脑中。虽然 Alto 不是商业产品，但它是第一台使用桌面隐喻和图形用户界面（GUI）的个人电脑。Lisa
    是第一款配备鼠标和 GUI 的苹果产品。


    1985 年初，乔布斯在与苹果公司董事会的权力斗争中落败，从公司辞职，并创立了 `NeXT`，该公司最终于 1997 年被苹果收购。在 `NeXT` 期间，乔布斯改变了麦金塔电脑（Mac）上的一些关键代码特性，使其使用一种新的语言——一种非常严谨但又优美的语言，叫做
    `Objective-C`。这种语言的优势在于它能高效地使用对象。与其重写应用程序某一部分中已经用过的代码，`Objective-C` 重复利用了这些对象。当时乔布斯的思维高速运转，这段非凡的代码将
    `Objective-C` 这门新语言推向了新的高度。他的灵感通过创造出我们称之为 `Cocoa` 的元语言，融入了 Mac 的内核。元语言是用来分析或定义另一种语言的语言。正如我提到的，`Objective-C`
    是一门非常难掌握的野兽，你可以把 `Cocoa` 看作是驯服这头野兽的语言工具，或者至少是把这头野兽关进笼子。


    作为一个编程世界的“绝对新手”，不能指望你关注编程语言区别的细微之处。我在这里只是给你一个概述，让你对这段历史有个大致了解，从而为你自己的学习经历提供一个背景。我在这里想说的重点是，`Objective-C`
    和 `Cocoa` 是非常强大的工具，它们都与 iPhone/iPad 的编程息息相关。


    ## 休斯顿，我们遇到麻烦了


    这正是吸引我并促使我设计原始课程的核心挑战。如何教会像你一样的非工程专业学生，那些即使是顶尖工程专业学生都觉得困难的东西？在大学层面，我们通常让学生先上编程入门课，然后学习面向对象编程入门，比如
    `C#` 或 `C++`。


    即便如此，我们还是准备一头扎进 `Objective-C` 的世界！有时，我会给你蒙上眼罩；有时，我会为你缓冲冲击。有时，你可能需要重读几页书或回放几遍视频示例——这样才能让你透彻理解一个困难的概念。


    ## 我们将如何不时地探访“炼狱”


    在我的课程中，有些特定的地方，我知道一半学生会立刻理解，四分之一的学生需要下点功夫才能学会，而剩下的四分之一则会挣扎并最终放弃。这第三类学生通常会转出工程专业，选择更简单的课程。我知道这些“难点”在哪里，但我不会告诉你。我重复一遍，我不会告诉你。


    别担心，我不会让你去捅马蜂窝（指 `Objective-C` 的各种复杂问题），然后被蜇得遍体鳞伤。我也不会特意标出那些你可能觉得困难的概念。我现在不打算解释这一点。请接受它！只要你放松心情，跟着我的引导走，你就能出色地学完这本书。


    当你真的遇到困难时，请坚持下去。你可以随时重读相关章节，回放视频示例，或者——最重要的是——去访问论坛，那里有很多人，包括我自己，经常会在线并准备立即帮助你。我们可能会把你引荐给其他人的解决方案，或者直接帮助你。所以，去论坛和大家打个招呼，沉浸其中，先去寻求他人的帮助，然后再回来帮助别人。论坛地址是：[`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)
    或 `bit.ly/oLVwpY`。参见 图 1-20。


    ![images](img/00028.jpg)


    图 1-20. 遇到困难时，访问论坛可以获取帮助。


    ## 展望未来……《Beginning iPhone 4 Development: Exploring the iPhone SDK》


    今后，你们中有些人可能想继续 iPhone 和 iPad 编程的冒险，去读 Dave Mark 和 Jeff Lamarche 的书《Beginning iPhone
    4 Development: Exploring the iPhone SDK》（Apress, 2009 年出版）。还记得那个关于成为一辆装有 V8 发动机的汽车机械师的类比吗？他们的书假设读者知道什么是化油器，什么是活塞，并且他们能在朋友改装的轮子上安装赛车轮胎和超级轮毂。


    换句话说，他们假设你理解面向对象编程的基础知识：你知道什么是对象、循环和变量，并且你熟悉 `Objective-C` 编程语言。


    另一方面，我假设你，例如，不知道什么是“类”，什么是“成员”或“void”。我假设你完全不了解 iPhone/iPad 上的内存管理是如何工作的，而且，在此之前，你从未有兴趣去理解数组或
    `SDK`。

    '
- fmt: '### What You Will Learn


    When students start a challenging class, I have found that it works wonders to
    have them create something really cool, and with relative ease. At each stage
    of this process, I will typically present an example that you can read, see, and
    digest right away. Later on, we will return to analyze some of the early steps
    and go into more detail. I will explain how we accomplished some task or action
    the first time without even knowing it. Then, by comparing the first time through
    with subsequent modifications, you will learn how to tweak the program a little
    here, a little there. This way, you’ll stay on track—motivated and inspired to
    absorb the next new batch of tricks, lessons, and methods.


    #### Creating Cool and Wacky Apps: Why I Teach This Way


    You’ve heard the bit about how we best remember things: doing is better than seeing,
    which is better than hearing, and so on. Well, I know that students love humor—and
    guess what! We remember funny stories and lessons much better than we remember
    dull and boring ones. I have found that, without exception, when students work
    on code that is fun and wacky, they tend to spend much more time solving it.


    The more we apply ourselves mentally toward the solution of a problem, the more
    neural connections are made in our brains. The more neurons we connect, the more
    we remember and—most importantly—the less apt we are to waste time on ineffective
    methods.


    The more time we spend on a particular topic, the more chance there is that you
    will experience gut feelings about whether a particular methodology for solving
    a project is on track or not. So, as we proceed, be aware that I am employing
    humor to burn computer science and Objective-C concepts and methods into your
    brain without your exerting any conscious effort.


    It is common for my students to contact me after receiving a difficult homework
    assignment. First, they’ll send me a tweet asking if they can Skype me. One particular
    night, I was playing chess with a colleague when I received a tweet asking if
    I was available. “Of course,” I responded. I warned my colleague, also a professor
    at the University of North Carolina, that students he knew were about to appear
    on Skype. When they buzzed in, sure enough, they were four of my electrical engineering
    students, wide-eyed and smiling. “Hey, Dr. Lewis, we finally got it, but Dude!
    The last method you assigned…”


    When we finished our conversation, and I turned off my Mac, it was 12:30 a.m.
    My colleague asked, “Rory, I never called a professor this late in the evening—much
    less after midnight! Shouldn’t they ask these questions during office hours?!”
    He was probably right, but after thinking about it for a minute I replied, “I’m
    just happy that they’re working on my wacky assignment!” As we set up the next
    chess game, he murmured something about how I might be comfortable in the insanity
    ward.


    The point is that I want you to read this entire book. I want you to work all
    the examples and to feel elation as you complete each assignment! I have done
    everything I can to make this book enjoyable. If you choose to engage with the
    ideas contained herein, this book will change your life!


    By the way, successfully navigating these lessons will make you a certified geek.
    Everybody around you will sense your growing ability and will witness your transformation;
    as a result, they will seek you out to request that you write apps for them.


    #### Evangelizing to Your Grandmother… What You Coded Is Crucial!


    It’s important that you not let complex code turn you inside-out. Just two minutes
    ago, a student walked into my office—so confused that he couldn’t even tell me
    what it was he didn’t know. He said something like, “My second order array worked
    fine in-line, but not as a class or a method.” I said, “No, that’s too complex!
    Here’s an easier way of saying it…”


    I described how he had a long line of “stuff” going in one end and being spat
    out the other—and it worked really well. But, when he put it in a method, he couldn’t
    see the start of the long line of stuff; when he put it in a class, he couldn’t
    see any of the stuff!”


    “Wow! I know what I did wrong, Dr. Lewis. Thank you!” Now, as I type this, he’s
    explaining it to his two buddies who came in yesterday and tried to ask the same
    question. Don’t worry. The confusion that drove these questions—such as the distinctions
    between “classes” and “methods,” and other coding entities—will be covered later
    in this book. All in good time!


    If you can keep your feet on the ground and transform complex things into simpler
    ideas, then you can remember them—and master them. Grasp this concept, and you
    will be able to convert your far out ideas into code—and who knows where that
    will take you! This is why I am so determined to impart to you the ability to
    convert things your grandmother wants to be able to do into iPhone and iPad programming
    language.'
