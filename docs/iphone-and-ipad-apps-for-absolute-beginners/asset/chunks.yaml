    into your header file.


    23\. As shown in [Figure 5–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos373491),
    after clicking the Shrink button in your Interface Builder once, control-drag
    into your header file, in-between the squiggly brackets of the `@interface` directive.
    We have discussed in §19 why we are, for the first time, connecting a button to
    the `@property` directive. If you skipped that section, I strongly suggest you
    fully understand why we are connecting a button as an outlet.


    ![images](images/00174.jpg)


    Figure 5–24\. Keep the button as an outlet and name it `shrinkButton`.


    24\. As shown in [Figure 5–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos374383),
    when you''ve control-dragged out to the `@interface` directive, drop it in by
    letting go of your mouse and naming it `shrinkButton`—leave it as an outlet.


    #### Coding the Header File


    After we understand that we''ve connected our outlets we would typically leave
    the `@interface` directive, go outside of it, and connect our buttons as actions.
    In this case, we need to do something we''ve never done before: set up a few more
    variables and pointers. We will not go too deep into them, but I will emphasize
    why we need to do this.


    We need to keep track of our images. Specifically we need to


    *   Keep track of the current image being displayed in the background. Remember
    we have five of them, so we''ll call the current background `currentBackground`.

    *   We have to store these 5 background images somewhere. The typical way we do
    this is store all five images in a list we call an array. This means we will need
    to create an array. Let''s call our array `bgArray`.

    *   We also need to know if the Shrink and Move buttons have been pressed because
    that will change the state. This is explained in detail later, but for now, the
    location and size of the icon changes and this affects what can be done to it
    next. So, we''ll need to track two button states: the state of the Shrink button
    and the state of the Move button. Let''s call them `hasShrunk` and `hasMoved`.

    *   Remember when I spoke about how we will use the `CGAffineTransform` class
    to help us manipulate our icon (see the “CGAffineTransform structs” section)?
    Well, we need to use the `CGAffineTransform` class to first move the lulu fruit
    icon when we press the move button, and then change the size of the lulu fruit
    icon when we press the shrink button. So, we need two `CGAffineTransforms`. Let''s
    call one `translate` and the other `size`.


    So we now have six items.


    *   An array we will call `bgImages`

    *   A way to keep track of the `currentBackground`

    *   The state of `hasMoved`

    *   The state of `Shrunk`

    *   A way to transform `translate` (the position of our lulu fruit icon)

    *   A way to transform `size` (the size of our lulu fruit icon)


    Now that we have determined what we need and what we call them, we have one more
    thing to do: associate them with an internal means of doing what we want them
    to do. We have to associate them with a type. This is all very easy. Apple does
    it all for us. We just need to know what tools to reach for in our Apple tool
    bag and attach to each of these variables we have created.


    *   For the array, Apple has an `NSArray` that does the job beautifully.

    *   To keep track of the current background, let''s just give each of the backgrounds
    a number of type integer (`int`).

    *   To keep track of the buttons, we just need to know whether they have been
    pressed. A simple “yes” or “no” will be cool. Hmm, that''s Boolean isn''t it?
    So we''ll associate Booleans with our `hasMoved` and `hasShrunk` buttons.

    *   Lastly, we need to simply assign the `CGAffineTransform` class to our `translate`
    and `size` variables.


    To emphasize how we will associate these named types to our six items, I want
    you to look at the following very carefully:


    `NSArray` `*bgImages;`

    `int` `currentBackground;`

    `bool` `hasMoved;`

    `bool` `hasShrunk;`


    `CGAffineTransform` `translate;`

    `CGAffineTransform` `size;`


    This means that we need to type the preceding code underneath your three `IBOutlet`s
    as follows:


    `@interface touchesViewController : UIViewController`

    `{`

    `    IBOutlet UIImageView *myIcon;`

    `    IBOutlet UIImageView *myBackground;`

    `    IBOutlet UIButton *shrinkButton;`


    `NSArray *bgImages;`

    `int currentBackground;`

    `bool hasMoved;`

    `bool hasShrunk;`


    `CGAffineTransform translate;`

    `CGAffineTransform size;`

    `}`   ![images](images/00175.jpg)


    Figure 5–25\. Create a few more items and then drag your first button.


    25\. Now and only now that we have correctly created and defined our variables
    do we start to connect our buttons, as actions, to the space below the `@directive`.
    Grab your Shrink button by clicking it and control-drag to the header file, right
    under the `@directive`, as illustrated in [Figure 5–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos381149).'
