  trans: "\n### 添加 IBActions\n\n是的，我们需要一个按钮！所以我们为按钮创建了一个 `IBAction`，如图 4–28 所示。我们本可以再次“深入”\
    \ `IBAction` 的代码内部，但这一节已经很有挑战性了。我们将这一元素的技术部分留给“深入代码”环节。现在，先直接输入这里高亮显示的新代码。看看你是否能预测不同部分（即参数）的功能，我们稍后便会揭晓答案。\n\
    \n这就是我们要关注的内容：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController\
    \ : UIViewController {\n\n    IBOutlet UILabel *label;\n    IBOutlet UIImageView\
    \ *Kant;\n}\n\n@property (nonatomic, retain) IBOutlet UILabel *label;\n@property\
    \ (nonatomic, retain) IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\
    \n@end\n```\n\n现在，立刻出去休息一下。\n\n![images](img/00139.jpg)  \n图 4–30. 离开助理编辑器，点击标准编辑器。\n\
    \n30. 现在我们需要重新绘制用户界面，以便处理实现文件。我们需要离开助理编辑器，点击标准编辑器，如图 4–30 所示。\n\n![images](img/00140.jpg)\
    \  \n图 4–31. 显示导航器。\n\n31. 现在我们需要显示导航器，以便从头文件跳转到实现文件。当然，我们有很多不同的方法可以实现，但为了简单起见，请先按照这里的步骤操作。见图\
    \ 4–31。\n\n![images](img/00141.jpg)  \n图 4–32. 保存工作并打开实现文件。\n\n32. 目前，界面生成器显示的是我们的\
    \ `.nib` 文件。保存所有内容，然后转到导航器并点击实现文件（`.m`），如图 4–32 所示。\n\n![images](img/00142.jpg)\
    \  \n图 4–33. 打开实现文件后，我们就可以编码了。\n\n33. 现在你已经打开了实现文件，让我们看看 图 4–33 并首先思考一种提供合成（synthesis）的方法。我们在头文件中已经为标签文本和\
    \ Kant 图像设置了 `@property` 指令，这样我们就可以在实现文件中为这两个 `IBOutlets` 编写 `@synthesize` 语句——那么现在就开始吧。输入如下所示的合成代码：\n\
    \n```\n#import \"helloWorld_04ViewController.h\"\n\n@implementation helloWorld_04ViewController\n\
    @synthesize label, Kant;\n\n- (void)dealloc\n{\n    [label release];\n    [Kant\
    \ release];\n    [super dealloc];\n}\n...\n\n- (IBAction)buttonGuess:(id)sender\
    \ {\n}\n@end\n```  \n![images](img/00143.jpg)  \n图 4–34. 删除 `viewDidLoad` 代码。\n\
    \n34. 我们不需要 `viewDidLoad` 代码，因为我们对其处理方式稍有不同。因此，选中它并删除，如图 4–34 所示。\n\n![images](img/00144.jpg)\
    \  \n图 4–35. 编写 `buttonGuess` 方法的前两行代码。\n\n35. 如图 4–35 所示，我们现在准备编写当用户按下按钮时将执行的代码。换句话说，我们现在准备编写按钮的代码。向下滚动，直到找到\
    \ `buttonGuess` 方法，它存在但当前是空的。\n\n```\n#import \"helloWorld_04ViewController.h\"\
    \n\n@implementation helloWorld_04ViewController\n@synthesize label, Kant;\n...\n\
    \n- (IBAction)buttonGuess:(id)sender {\n\n}\n\n@end\n```\n\n当用户运行这个应用程序并按下按钮时，康德的图像会立即出现在背景楼梯的顶部。他将通过嵌入的文本“说”一些话。比如，“你好，世界，我回来了！”为了实现这一点，我们需要将标签实例变量与我们所需文本所赋值的文本属性关联起来，如下所示：\n\
    \n```\n#import \"helloWorld_04ViewController.h\"\n\n@implementation helloWorld_04ViewController\n\
    @synthesize label, Kant;\n...\n\n- (IBAction)buttonGuess:(id)sender {\nlabel.text\
    \ = @\"Hello World I'm back!\";\n}\n\n@end\n```\n\n完成了文本编码任务后，我们现在需要添加代码来显示康德的图像。为此，我们将使用一个名为\
    \ `imageNamed` 的类方法，该方法将显示 `kantStair.png` 图像，即我们在项目开始时准备的顶层照片。在刚刚输入的文本代码下方，立即输入以下代码中加粗的那一行：\n\
    \n```\n#import \"helloWorld_04ViewController.h\"\n\n@implementation helloWorld_04ViewController\n\
    @synthesize label, Kant;\n...\n\n- (IBAction)buttonGuess:(id)sender {\nlabel.text\
    \ = @\"Hello World I'm back!\";\nUIImage *imageSource = [UIImage imageNamed:@\"\
    kantStair.png\"];\n\n}\n\n@end\n```\n\n我们为图像起的指针名称是 `Kant`，但此时 `kant.png` 图像文件位于\
    \ `UIImage` 分配的指针 `imageSource` 中。\n\n```\n#import \"helloWorld_04ViewController.h\"\
    \n\n@implementation helloWorld_04ViewController\n@synthesize label, Kant;\n...\n\
    \n- (IBAction)buttonGuess:(id)sender {\nlabel.text = @\"Hello World I'm back!\"\
    ;\nUIImage *imageSource = [UIImage imageNamed:@\"kantStair.png\"];\n}\n\n@end\n\
    ```\n\n我们需要将这个自动分配的指针 `imageSource` 赋值给康德图像，如下列代码所示：\n\n```\n#import \"helloWorld_04ViewController.h\"\
    \n\n@implementation helloWorld_04ViewController\n@synthesize label, Kant;\n...\n\
    \n- (IBAction)buttonGuess:(id)sender {\nlabel.text = @\"Hello World I'm back!\"\
    ;\nUIImage *imageSource = [UIImage imageNamed:@\"kantStair.png\"];\nKant.image\
    \ = imageSource;\n}\n\n@end\n```\n\n如果现在对此还不太明白，没关系。确实有很多实体以“image”作为其名称、对象或关联的一部分，这很容易让人混淆。我们会在后续内容中更深入地探讨这个主题，所以现在不必为此纠结！图\
    \ 4–36 展示了此时你的代码应该呈现的样子。现在按 `Cmd+S` 保存你的工作，并为自己鼓鼓掌吧。你已经比前几章更深入地学习了头文件和实现文件。尽管你之前接触过其中一些技术功能，但你再次勇敢面对它们，并保持开放心态以求更深入的理解。同时，你还攻克了一个非常困难的概念：合成（synthesis）。\n\
    \n![images](img/00145.jpg)  \n图 4–36. 代码编写完毕，让我们运行它。\n\n36. 现在我们已经完成了代码编写，让我们运行它，看看是否有错误。见图\
