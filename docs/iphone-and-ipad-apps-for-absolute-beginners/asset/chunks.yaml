  trans: '

    ### 头文件


    看看这段代码，不要从方法的角度，而是从它作为头文件的维度以及它与其实现文件的关系来审视。我希望你回到那个时间点：在你将那些我称之为“好东西”的控件拖放到头文件之后。回顾图
    3–24，我希望你更多地关注粗体文本。


    **注意：** 在代码中命名时，你将使用缩写 `UI` 来表示“用户界面”（User Interface）。你将使用缩写 `IB` 来表示“Interface
    Builder”。


    ![图片](img/00105.jpg)


    这里有两件事需要注意。首先，`@` 符号与 Xcode 的最核心部分通信，它把你的代码转换成动作；其次，它要宣告一些至关重要的事情。事实上，我们把任何以 `@`
    开头的语句称为“指令”。这个 `@interface` 指令告诉 Xcode，你有关于 `helloWorld_03` 的界面内容，并且具体细节将包含在花括号
    `{}` 内。


    在图 3–16 中，你开始将输出口拖入代码之前，请注意左花括号 `{` 内部是空的！你当时还没声明任何东西，对吧？你知道自己想做什么，所以你通过创建你的 `IBOutlet`s（Interface
    Builder 输出口）来写入你的 `UILabel`s（用户界面标签），并为你的按钮关联一个单独的动作，从而用 `@interface` 指令引起了编译器的注意。


    ### 检查器栏


    回顾第 8 步，图 3–8，在简要解释检查器栏时，我曾说过我们会更深入地探讨它。所以，说到做到，这里提供一些关于检查器栏如何设置的见解。


    ![图片](img/00106.jpg)


    **图 3–34.** 聚焦检查器栏。


    在图 3–33 中，我重现了我在黑板上向课堂展示检查器栏的方式。随着你熟悉 Xcode 4 环境，你会发现自己在编码的任何阶段都会使用检查器选择栏来选择所需的工作区。现在，让我们聚焦于最密集的视图：实用工具视图。点击实用工具视图，如图
    3–33 右上角所示，你会看到我创建了一个放大版的检查器选择栏，其子菜单位于面板的左侧。从顶部开始：


    -   **文件检查器**：用于管理项目中的文件属性，例如名称、类型和路径。

    -   **快速帮助**：望文生义。

    -   **身份检查器**：提供对深层内容的访问，例如类名、访问权限和标签。

    -   **属性检查器**：用于调整对象可用的属性。

    -   **尺寸检查器**：允许你调整界面对象的初始大小、位置和自动调整大小。

    -   **连接检查器**：允许你查看界面对象的输出口和动作。

    -   **绑定检查器**：用于配置视图对象的绑定。

    -   **效果检查器**：用于调整选定对象的动画协议，例如过渡、淡入淡出和其他视觉特性。

    -   **文件模板**：你可以从资源库拖到项目导航器中的常见模板。

    -   **代码片段**：类似于剪贴画，但面向编码者——你可以通过拖拽到文件中使用的源代码片段。

    -   **对象**：通过直接拖拽到 Interface Builder 编辑器窗口中的 nib 文件来使用这些界面对象。

    -   **媒体文件**：顾名思义，是可以直接拖拽到 Interface Builder 编辑器窗口中 nib 文件的图形、图标和声音文件。


    ### NSString


    回顾一下，并更深入地探讨一下你实现文件中的 `NSString` 语句，在你编写它的时候，我已经详细地讲解过了。这里有五个与你关联 `NSString` 的术语：


    -   `Output` 是你的返回值：`Output = [[NSString alloc] initWithFormat:@"%@ says: Hello
    World!", Name];`

    -   等号的右边是消息：`Output = [[NSString alloc] initWithFormat:@"%@ says: Hello World!",
    Name];`

    -   `NSString alloc` 是接收者：`Output = [[NSString alloc] initWithFormat:@"%@ says:
    Hello World!", Name];`

    -   `initWithFormat` 是方法名：`Output = [[NSString alloc] initWithFormat:@"%@ says:
    Hello World!", Name];`

    -   `@"%@ says: Hello World!"` 和 `Name` 是参数：`Output = [[NSString alloc] initWithFormat:@"%@
    says: Hello World!", Name];`


    ### 更多关于内存管理


    在步骤 29 结束时，图 3–29，“第四步：清理工作”中，我们简要地讨论了 `alloc` 以及你如何在应用的关键时刻分配和释放内存。我想让你最后再看一次你为按钮编写的实现代码，但要站在内存泄漏和管理的角度来审视。


    ![图片](img/00107.jpg)


    看上面，你可以看到你首先为字符串分配了一些内存。这由右上角标 ^(+1) 表示，表明你已经上升了一个层级并正在分配内存。每当你上升一个层级，你也需要下降一个层级，通过释放该内存，如
    release 处的 ^(−1) 所示。这非常简单——当你 `alloc` 时，你需要 `release`。在 Objective-C 中，这被称为引用计数。我发现学生们感到困惑的地方是，在他们
    `alloc` 之后，有时还会执行一个 `retain`。如果你确实发现在分配内存后还需要保留它，那么将其视为 [alloc+1] + [retain+1]，这意味着你已经上升了两个层级，而不是一个。这意味着你需要释放两次，而不是一次。总结一下：


    -   [alloc^(+1)] 需要 + [release^(−1)]

    -   [alloc^(+1)] + [retain^(+1)] 需要 [release^(−1)] + [release^(−1)]


    ### 好了！


    你还在这里！太棒了！至少休息 6 个小时，别因为没完全掌握你在这里钻研的所有代码而焦虑。希望你享受了禅定与专注的美妙时刻。我们第 4 章见。


    ## 第 4 章

