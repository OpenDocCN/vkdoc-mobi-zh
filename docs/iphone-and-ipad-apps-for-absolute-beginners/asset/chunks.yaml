  trans: "\n#### 处理视图控制器的实现\n\n正如本章引言所述，控制和使用 MapKit 与 CoreLocation 框架并非易事。尽管这些领域看似艰巨，但我不能在本书中忽略它们。我们在这样的基础上继续：我们已经学会寻找熟悉的模式，整合我们能够理解的内容，并在事情变得稍微复杂或超出我们当前理解时遵循指示！\n\
    \n让我们思考一下——在完成必要的 `myPos` 头文件导入以及我们刚刚在头文件中设置的 `ViewController` 的合成之后——我们需要做两件事：\n\
    \n- 在 `viewDidLoad` 方法中设置我办公室的坐标；然后，\n- 让一个图钉精确地落到 `viewDidLoad` 中设定的经纬度上，并添加一个标注，说明这是刘易斯博士的办公室。\n\
    \n在我们的案例中，我们将地图类型设置为混合地图。不过，如果我们愿意，也可以选择使用卫星地图或街道地图。请记住，此时我们将引入我在科罗拉多大学科罗拉多斯普林斯分校办公室的位置，你可以继续使用我的位置，也可以选择你自己的地点。\n\
    \n![images](img/00384.jpg)\n\n**图 9–31.** 编码前的 `ViewController` 实现文件。\n\n21. 当你第一次打开\
    \ `viewController.m` 文件时，会看到如图 9–31 所示的默认代码。我们首先引入头文件并进行合成：\n\n- 在 `#import \"\
    ViewController.h\"` 下方，我们通过编写 `#import \"myPos.h\"` 来导入 `myPos` 头文件。\n- 现在，在 `@implementation`\
    \ 下方，我们将添加对 `mapView` 的合成：`@synthesize mapView;`\n- 现在，我们可以将名为 `viewDidLoad coord.rtf`\
    \ 文件中的样板代码直接粘贴到 `viewDidLoad` 方法中，覆盖并替换掉 `// Do any additional …` 注释，位置在 `[super\
    \ viewDidLoad];` 下方，如下所示：`[super viewDidLoad];`\n  `// Do any additional setup\
    \ after loading the view, typically from a nib.`\n- 样板代码如下所示，但我们将逐步进行说明。`[mapView\
    \ setMapType:MKMapTypeStandard];`\n  `[mapView setZoomEnabled:YES];`\n  `[mapView\
    \ setScrollEnabled:YES];`\n  `mapView.mapType=MKMapTypeHybrid;`\n  `MKCoordinateRegion\
    \ region = { {0.0, 0.0 }, { 0.0, 0.0 } };`\n  `region.center.latitude = 38.893432;`\n\
    \  `region.center.longitude = -104.800161;`\n  `region.span.longitudeDelta = 0.01f;`\n\
    \  `region.span.latitudeDelta = 0.01f;`\n  `[mapView setRegion:region animated:YES];`\n\
    \  `[mapView setDelegate:self];`\n\n`myPos *ann = [[myPos alloc] init];`\n  `ann.title\
    \ = @\"Dr. Rory Lewis\";`\n  `ann.subtitle = @\"University of Colorado at Colorado\
    \ Springs\";`\n  `ann.coordinate = region.center;`\n  `[mapView addAnnotation:ann];`\n\
    \n22. 现在，逐行分析这段代码；\n\n- 首先，我们将其设置为标准类型，并启用缩放和滚动：`[mapView setMapType:MKMapTypeStandard];`\n\
    \  `[mapView setZoomEnabled:YES];`\n  `[mapView setScrollEnabled:YES];`\n- 然后，通过将所有坐标区域设置归零来重置之前的坐标：`MKCoordinateRegion\
    \ region = { {0.0, 0.0 }, { 0.0, 0.0 } };`\n- 接着，输入我们关注地点的坐标——对我来说，就是我在科罗拉多大学科罗拉多斯普林斯分校的办公室。我输入\
    \ `region.center.latitude = 38.893432;`（正值表示赤道以北）和 `region.center.longitude =\
    \ -104.800161;`（负号表示本初子午线以西）。`region.center.latitude = 38.893432;`\n  `region.center.longitude\
    \ = -104.800161;`\n- 与这些参数相关，我们需要设置纬度和经度跨度 Delta `= 0.01f`。如果你的数学或物理知识有些生疏了，请记住“delta”指的是两个值之间的变化或差值。`region.span.longitudeDelta\
    \ = 0.01f;`\n  `region.span.latitudeDelta = 0.01f;`\n- 我选择在落点时为图钉添加动画效果：`[mapView\
    \ setRegion:region animated:YES];`\n- 接下来的操作是将视图控制器类设置为委托，该角色将处理 `mapView` 各框架之间的交互。我们通过以下方式实现：`[mapView\
    \ setDelegate:self];`\n\n**注意：** 关于落下的图钉及其附带的标签：我们需要让标注对象持有我们坐标的信息。我们的标注视图是与标注对象关联的视图类型。我们的标注对象需要遵守我们将在\
    \ `MKAnnotation` 协议中设定的所有规则。为了创建这个标注对象，我们必须定义一个全新的类，我们在创建 `myPos` 类时已经这样做了。\n\n\
    - 现在，我们需要实例化这个 `myPos` 对象并将其添加到我们的地图中。为此，我们添加一个委托函数，它将在地图上显示标注。我们首先让 `myPos` 命名一个指针，我们称之为\
    \ `ann`：`myPos *ann = [[myPos alloc] init];`\n- 接下来，我们设置标题，在我的例子中，我选择使用我的名字：`ann.title\
    \ = @\"Dr. Rory Lewis\";`\n- 我们类似地处理副标题：`ann.subtitle = @\"University of Colorado\
    \ at Colorado Springs\";`\n- 我们还希望图钉落在地图中心：`ann.coordinate = region.center;`\n\
    - 使用 `[mapView addAnnotation:ann];` 来引用上述所有内容。\n\n此时，我们将利用大多数 MapKit 地图使用的下一个样板代码方法。与\
    \ `viewDidLoad coord.rtf` 不同，`MKAnnotationView.rtf` 是一段我们都会使用的代码块。请阅读下面的注释：\n\n\
    **注意：** 我们很少更改像 `viewDidLoad coord.rtf` 这样的代码块，当这本书印刷时，它可能已经属于某个新函数或新类的一部分。原因是，当人们开始反复使用同一段代码，并将其称为“样板代码”时，差不多就是\
    \ Apple 决定从中提取一个新类或新函数并为其指定一个特定名称的时候。因此，继续使用它，并让 Apple 接收到这个信号吧！\n\n现在，关于这段代码，有几件事我们都需要了解：\n\
    \n- 它创建了一个委托方法，用于在缩放和滚动期间管理我们的标注。换句话说，它跟踪我们的位置——即使当用户滚动、放大或缩小地图时也是如此。\n- 它创建了一个静态标识符，用于控制我们的“队列含义”。如果它不能将我们的标注出队，就会分配一个我们选择的标注。我还包含了一段将图钉颜色更改为红色的代码。此外，我允许了标注气泡视图。\n\
    \n将 `MKAnnotationView.rtf` 粘贴到 `- (void)viewDidLoad` 方法之后，`- (void)viewDidUnload`\
    \ 方法之前。粘贴完成后，你的实现文件应如下所示。\n\n```\n#import \"ViewController.h\"\n#import \"myPos.h\"\
    \n```\n"
- fmt: "```objc\n@implementation ViewController\n@synthesize mapView;\n\n- (void)didReceiveMemoryWarning\n\
    {\n    [super didReceiveMemoryWarning];\n    // Release any cached data, images,\
    \ etc., that aren't in use.\n}\n\n#pragma mark - View lifecycle\n\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    [mapView setMapType:MKMapTypeStandard];\n   \
    \ [mapView setZoomEnabled:YES];\n    [mapView setScrollEnabled:YES];\n    mapView.mapType\
    \ = MKMapTypeHybrid;\n\n    MKCoordinateRegion region = { {0.0, 0.0 }, { 0.0,\
    \ 0.0 } };\n    region.center.latitude = 38.893432;\n    region.center.longitude\
    \ = -104.800161;\n    region.span.longitudeDelta = 0.01f;\n    region.span.latitudeDelta\
    \ = 0.01f;\n    [mapView setRegion:region animated:YES];\n    [mapView setDelegate:self];\n\
    \n    myPos *ann = [[myPos alloc] init];\n    ann.title = @\"Dr. Rory Lewis\"\
    ;\n    ann.subtitle = @\"University of Colorado at Colorado Springs\";\n    ann.coordinate\
    \ = region.center;\n    [mapView addAnnotation:ann];\n}\n\n- (MKAnnotationView\
    \ *)mapView:(MKMapView *)mV viewForAnnotation:(id <MKAnnotation>)annotation\n\
    {\n          MKPinAnnotationView *pinView = nil;\n          if (annotation !=\
    \ mapView.userLocation)\n          {\n                  static NSString *defaultPinID\
    \ = @\"com.rorylewis\";\n                  pinView = (MKPinAnnotationView *)[mapView\
    \ dequeueReusableAnnotationViewWithIdentifier:defaultPinID];\n               \
    \   if ( pinView == nil )\n                          pinView = [[MKPinAnnotationView\
    \ alloc] initWithAnnotation:annotation reuseIdentifier:defaultPinID];\n      \
    \            pinView.pinColor = MKPinAnnotationColorRed;\n                  pinView.canShowCallout\
    \ = YES;\n                  pinView.animatesDrop = YES;\n        }\n        else\n\
    \        {\n                  [mapView.userLocation setTitle:@\"I am here\"];\n\
    \        }\n    \n    return pinView;\n}\n\n- (void)viewDidUnload\n{\n    [super\
    \ viewDidUnload];\n    // Release any retained subviews of the main view.\n  \
    \  // e.g. self.myOutlet = nil;\n}\n\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n}\n- (void)viewDidAppear:(BOOL)animated\n\
    {\n    [super viewDidAppear:animated];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n\
    {\n    [super viewWillDisappear:animated];\n}\n- (void)viewDidDisappear:(BOOL)animated\n\
    {\n    [super viewDidDisappear:animated];\n}\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
    \ != UIInterfaceOrientationPortraitUpsideDown);\n}\n\n@end\n```\n\n### The Storyboard\n\
    \nGo ahead and open the Storyboard file. It will look similar to what you see\
    \ in [Figure 9–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos717608).\n\
    \n![images](images/00385.jpg)\n\nFigure 9–32. Open Storyboarding\n\nAs I have\
    \ already mentioned quite a few times, I specifically chose `myStory_01` as a\
    \ segue to `myStory_02`, which will have a very complex Storyboard. In this app,\
    \ I just want you to deal with setting up the MapKit framework. In myStory_02,\
    \ we will set up the MapKit framework as we did here; then, we will set up a pretty\
    \ `tableView` onto a Storyboard. Doing it all at one time would not be practical\
    \ and I do know this. So, for how—this segment of the Storyboarding will be relatively\
    \ easy—just a couple of steps. In `myStory_02`, this will not be the case. So,\
    \ give your brain a break and follow along as we set up this very simple, one-piece\
    \ Storyboard.\n\n![images](images/00386.jpg)\n\nFigure 9–33. Drag a `MKMapView`\
    \ onto the view.\n\n23. With the Storyboard open—close the Inspector and open\
    \ up the Utilities folder. Then drag a Map View (`MKMapView`) onto your view as\
    \ shown in [Figure 9–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos718603).\n\
    \n![images](images/00387.jpg)\n\nFigure 9–34. Open the Connection Inspector and\
    \ control drag to the `MKMapView`.\n\n24. We need to connect the `mapView` to\
    \ the `MKMapView`. In the Document Outline Bar, select the View Controller and\
    \ then click on the Connection Inspector and control–drag from the `mapView` to\
    \ the `MKMapView`.\n\n`(MKAnnotationView *)mapView:(MKMapView *):`\n\n25. That's\
    \ it! Run it. When we see a splash screen appear, we drop a pin right onto my\
    \ office or the location we chose. See [Figure 9–35](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos720191).\n\
    \n![images](images/00388.jpg)\n\nFigure 9–35. MapKIts and Storyboarding! Splash\
    \ screen appears and then a pin drops onto a specified location!\n\nCongratulations!\
    \ Once again, we have successfully implemented an app of fair complexity and we\
    \ started with a body of code that we merely modified. As we compare our own Simulator\
    \ to the images ahead, bask in the glow of accomplishment.\n\nThen, perhaps after\
    \ a brief rest, I hope that we might venture forward to see if some student examples\
    \ in the \"Digging My Students' MapKit Code\" section whet our appetite for further\
    \ development and challenge.\n\n![images](images/00389.jpg)\n\nFigure 9–36. At\
    \ this point, I have my students implement it in class on the iPad. Try it out.\
    \ The zoom is really far out as is shown here.\n\n### Digging the Code\n\nHere,\
