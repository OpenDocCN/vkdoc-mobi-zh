    area, the image that the user sees when they look at their iPhone.


    ![images](images/00074.jpg)


    Figure 3–5\. Open your nib file.


    5\. In order to do this, you open up your nib file, just as you did in the two
    previous apps. So, open up your `nib` file by going to your helloWorld_03 folder
    and selecting the `helloWorld_03ViewController.xib` file, as illustrated in [Figure
    3–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos173967).


    ![images](images/00075.jpg)


    Figure 3–6\. Close the Navigator View.


    6\. You''re going to need to have space in the Xcode 4 environment, so first,
    close the Navigator View, because we do not need it for now, and then, open the
    Utilities View, so we can see the tools and icons we need to dress up the View
    Design area. In [Figure 3–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos174637),
    you can see that I am closing the Navigator View. See [Figure 3–34](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos237208)
    for more details on Xcode 4 nomenclature.


    ![images](images/00076.jpg)


    Figure 3–7\. Drag a UIImageView onto your View Design area.


    7\. With your Utilities pane open, as shown in [Figure 3–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos175442),
    go to the bottom section of the panel and, making sure that you have selected
    the icons view (depicted by four little squares on the icon above the right-hand
    arrow in [Figure 3–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos175442)),
    drag a UIImageView onto your View Design area. The reason we need a UIImageView
    is because we need to have an image of you underneath the buttons and text labels.
    That picture that you just dragged in needs to have a place where it can live.
    A UIImageView is just the guy for this job. He is going to reside underneath all
    of your buttons and embrace whatever picture you tell him to embrace.


    ![images](images/00077.jpg)


    Figure 3–8\. Associate your selected image with your UIImageView.


    8\. Remember the image that you dropped into the `Resources Folder` back in [Figure
    3–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos167718)? Well that’s
    the image that you will want the `UIImageView` to be, so you just drag it onto
    your `View Design area` to encapsulate it. To do this, you need to tell it to
    do so, and this is done by making sure that you have selected the `Attributes
    Inspector` in the `Inspector Bar` (see the icon under “`View`” in [Figure 3–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos176529),
    or as explained in [Figure 3–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos217547)
    at the end of this chapter). With the `Attributes Inspector` open, click on the
    `Image` drop down menu, and guess what you’ll see. You’ll see the name of the
    file you dragged into the `Resources Folder`. Select it, and Voila! The image
    appears in your View Design area. Isn’t that cool?


    ![images](images/00078.jpg)


    Figure 3–9\. Drag a button onto your View Design area.


    9\. Drag a button from your Library onto your View Design area and place it at
    the bottom, as illustrated in [Figure 3–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos177832).
    Make sure it’s nicely centered. Just to remind you: when you click on this button,
    your code will invoke an action that will grab the name of the person that the
    user entered into a Text Field object, and it will output that person’s name in
    a label followed by the text, “Hello World!”


    ![images](images/00079.jpg)


    Figure 3–10\. Type “Press Me” on the button, and then drag a Text Field object
    onto your View Design area.


    10\. Immediately after releasing your button, double click on it and type, “Press
    Me”, just as you did in the two previous assignments. Now go back to your Library
    and drag out a Text Field object onto your View Design area, placing it towards
    the top (as illustrated in [Figure 3–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos178641))
    and nicely centered. Remember that the text that the user types into here will
    be sent out to the label when they press the button saying “Press Me.”


    ![images](images/00080.jpg)


    Figure 3–11\. Center your Text Field object, enter the text “Enter Your Name”
    in the text field, and center the text.


    11\. After centering your Text Field object and expanding it in your View Design
    area, as illustrated in [Figure 3–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos179528)
    (where it says “Enter Your Name”), click in the text field, go over to your Utilities
    Inspector pane, and enter the text that you want the user to see when they look
    inside the Text Field object. You want to tell the user to enter their name here,
    so type “Enter Your Name” inside the text field box. Also, center this text so
    that it is centered inside the text field box, and make sure that the text field
    box is also centered in the View Design area.


    ![images](images/00081.jpg)


    Figure 3–12\. The three steps that ensure that the text in the Text Field object
    clears the instant the user activates the field. Also, note that a clear button
    icon is in the field, and “Done” appears on the Return Key (see [Figure 3–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos216995))


    12\. Once the user starts typing, you want your prompt text to disappear. To make
    doubly sure that your text disappears, keep the `clear button` (the grey crossed
    icon) active in the `Text Field object,` which allows the user to press it to
    clear your text—just in case your professor uses a mouse to grade your homework
    on the simulator and wants to make sure you know two ways to delete the text in
    the `Text Field object`. You should also delete the word “Return” on the keypad’s
    return key, and replace it with the text “Done.” I have illustrated the aforementioned
    three steps in [Figure 3–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos180563).


    ![images](images/00082.jpg)


    Figure 3–13\. Drag a Label object onto your View Design area.


    13\. Once the user has entered their name into the `Text Field object,` and they
    press the button, you need to display the user’s name and text in a label. You
    have yet to place a Label object onto the View Design area, so do it now, by dragging
    it from the Library onto the `View Design area,` as illustrated in [Figure 3–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos181805).


    ![images](images/00083.jpg)


    Figure 3–14\. Center and expand your Label object. Also, change the text color
    if necessary, and center the inside of the Label object.


    14\. Place the Label object just below your Text Field object, and expand it,
    while still keeping it centered, with respect to the View Design area. Do this
    by quickly expanding one side and then expanding the other until the purple center
    line appears. This is the fastest method of expanding and centering at the same
    time. Next, center the text inside the Label object, and then, depending on the
    color of the picture, change the text color to make sure it stands out. In case
    of [Figure 3–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos182561),
    the color behind the text was black, so it was changed to white.'
  trans: '

    #### 创建用户界面


    好了，现在我们准备开始将项目拖放到你的视图设计区域，也就是用户在查看 iPhone 时会看到的图像。


    ![images](img/00074.jpg)


    图 3–5。打开你的 nib 文件。


    5. 为此，你需要打开你的 nib 文件，就像在前两个应用中操作的一样。因此，请进入你的 `helloWorld_03` 文件夹，并选择 `helloWorld_03ViewController.xib`
    文件来打开你的 `nib` 文件，如图 3–5 所示。


    ![images](img/00075.jpg)


    图 3–6。关闭导航器视图。


    6. 你需要在 Xcode 4 环境中腾出空间，所以首先，关闭导航器视图，因为我们暂时不需要它，然后打开实用工具视图，这样我们就能看到装扮视图设计区域所需的工具和图标。在图
    3–6 中，你可以看到我正在关闭导航器视图。有关 Xcode 4 术语的更多详细信息，请参见图 3–34。


    ![images](img/00076.jpg)


    图 3–7。将一个 `UIImageView` 拖到你的视图设计区域上。


    7. 如图 3–7 所示，打开实用工具面板后，转到面板的底部区域，确保你选择了图标视图（如图 3–7 中右向箭头上方图标所示的四个小方块），然后将一个 `UIImageView`
    拖到你的视图设计区域上。我们需要 `UIImageView` 的原因是因为我们需要在按钮和文本标签下方放置你的图像。你刚刚拖入的那张图片需要一个可以存放的地方。`UIImageView`
    正是完成这项工作的合适控件。它将位于你所有按钮的下方，并承载你指定给它的任何图片。


    ![images](img/00077.jpg)


    图 3–8。将你选择的图像与你的 `UIImageView` 关联起来。


    8. 还记得你在图 3–3 中拖入 `Resources Folder` 的那张图片吗？那就是你希望 `UIImageView` 显示的图像，所以你只需将它拖到你的
    `View Design area` 上以进行封装。为此，你需要告诉它这样做，这可以通过确保你在 `Inspector Bar`（检查器栏）中选择了 `Attributes
    Inspector`（属性检查器）来完成（参见图 3–8 中“`View`”下方的图标，或本章末尾的图 3–33 中的说明）。打开 `Attributes
    Inspector` 后，点击 `Image` 下拉菜单，猜猜你会看到什么。你会看到你拖入 `Resources Folder` 的文件名。选中它，瞧！图像就出现在你的视图设计区域中了。是不是很酷？


    ![images](img/00078.jpg)


    图 3–9。将一个按钮拖到你的视图设计区域上。


    9. 从你的库中拖出一个按钮，放到你的视图设计区域上，并将其放置在底部，如图 3–9 所示。确保它完美居中。提醒你一下：当你点击这个按钮时，你的代码将调用一个操作，该操作会获取用户输入到文本字段对象中的名字，并将其输出到一个标签中，后面跟着“Hello
    World!”这段文本。


    ![images](img/00079.jpg)


    图 3–10。在按钮上输入“Press Me”，然后将一个文本字段对象拖到你的视图设计区域上。


    10. 释放按钮后，立即双击它并输入“Press Me”，就像你在前两个作业中做的一样。现在回到你的库中，拖出一个文本字段对象放到你的视图设计区域上，将其放置到顶部附近（如图
    3–10 所示）并完美居中。请记住，用户在这里输入的文本会在他们按下写着“Press Me”的按钮时被发送到标签中。


    ![images](img/00080.jpg)


    图 3–11。将你的文本字段对象居中，在文本字段中输入文本“Enter Your Name”，并将文本居中。


    11. 将你的文本字段对象居中并在视图设计区域中将其展开后，如图 3–11 所示（其中显示着“Enter Your Name”），点击该文本字段，然后转到你的实用工具检查器面板，输入你希望用户在查看文本字段对象时看到的文本。你需要告诉用户在这里输入他们的名字，所以在文本字段框中输入“Enter
    Your Name”。同时，将此文本居中，使其位于文本字段框的正中央，并确保文本字段框在视图设计区域中也是居中的。


    ![images](img/00081.jpg)


    图 3–12。确保文本字段对象中的文本在用户激活该字段时立即清除的三个步骤。另请注意，字段中出现了一个清除按钮图标，并且返回键上显示为“Done”（完成）（参见图
    3–32）


    12. 一旦用户开始输入，你希望提示文本消失。为了加倍确保你的文本消失，请保持 `Text Field object` 中的 `clear button`（灰色叉号图标）处于激活状态，这允许用户按下它来清除你的文本——以防你的教授用鼠标在模拟器上批改你的作业，并想确保你知道两种删除
    `Text Field object` 中文本的方法。你还应该删除键盘返回键上的单词“Return”，并将其替换为文本“Done”。我已在图 3–12 中说明了上述三个步骤。


    ![images](img/00082.jpg)


    图 3–13。将一个标签对象拖到你的视图设计区域上。


    13. 一旦用户将他们的名字输入到 `Text Field object` 中，并按下按钮，你需要在一个标签中显示用户的名字和文本。你还没有在视图设计区域上放置标签对象，所以现在就这样做，从库中将其拖到
    `View Design area` 上，如图 3–13 所示。


    ![images](img/00083.jpg)


    图 3–14。居中并展开你的标签对象。另外，如有必要，更改文本颜色，并让标签对象内部的文本居中。


    14. 将标签对象放置在你的文本字段对象正下方，并将其展开，同时相对于视图设计区域保持居中。通过快速展开一侧，然后展开另一侧，直到出现紫色中心线，这样可以同时最快地完成展开和居中操作。接下来，将标签对象内部的文本居中，然后根据图片的颜色，更改文本颜色以确保其突出显示。以图
    3–14 为例，文本背后的颜色是黑色，因此文本颜色被改成了白色。

