    ![images](images/00019.jpg)


    **图1–12.** 这将带你到页面底部，如[图1–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos73329)所示。


    ![images](images/00020.jpg)


    **图1–13.** 点击“Download Xcode 4”按钮，这将带你进入Xcode 4开发者页面。


    8. 我知道你可能在想：“天哪，我只想下载它！”请记住，Apple.com上有成千上万的下载内容。这个页面（如[图1–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos74393)所示）被称为Xcode
    4开发者页面，其中包含所有相关的下载内容。目前，我们想点击最新版本。这些图示显示的是本书印刷时的最新版本。当你阅读本书时，它肯定会有所不同。现在，此处可用的最新版本是“Xcode
