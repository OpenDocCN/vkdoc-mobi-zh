  trans: '

    ### Xcode 的调试全景


    当你审视调试领域时，会发现一个简单的工具独自矗立在一堆看似复杂的调试程序之中。在本章中，我将使用这个简单的调试工具，教你如何找出自己代码中的错误。在名为“深入代码”的小节中，我将详细阐述那些更困难但也更强大的调试工具——我基本上会先引起你的注意，然后向你介绍它们的工作原理、使用时机，以及当你的编程水平超出本书范围时，如何进一步学习它们。


    ### Xcode 的工具


    在开始之前，我想先谈谈一些更高级、有时甚至令人望而生畏的调试工具，我们暂时先搁置它们，稍后再来回顾。Xcode 一直在稳步增强其调试工具，并提供了一套非常强大的调试环境，你可以用它们来发现并消灭错误，且不会因草率的代码移除而损害你的代码。在“深入代码”部分，我们将驾驶这些工具进行一次试运行，并附上一些图片作为参考。现在，我先向你简要介绍一下它们。


    > **注意:** 要使 Xcode 调试工具正常运行，你必须确保安装了与 Mac 上运行的 iOS 版本相对应的 iOS SDK。如果它们不匹配，调试将无法进行。例如，如果你有一台运行
    iOS 4.2 的设备，但电脑上没有安装相应的 SDK，你将无法进行调试。


    #### Xcode 的工具：文本编辑器


    第一个工具是文本编辑器，它允许你直接在代码行内进行调试，就像你可能已经注意到的，当你的代码无法编译时，所有那些红色感叹号会到处冒出来！文本编辑器允许你添加和设置断点；密切关注“调用堆栈”；通过将鼠标悬停在变量上来访问其值；执行单行代码；以及进入、跳出或跳过函数或方法调用。


    #### Xcode 的工具：调试器窗口


    Xcode 附带的第二个工具称为“调试器窗口”。当你开始处理非常复杂或大量的代码时，你会和调试器窗口成为朋友，因为它不仅使用传统界面提供了与文本编辑器相同的所有调试功能，还允许你查看“调用堆栈”及其关联的变量。假设你有一个名为
    `dog` 的堆栈，与该堆栈关联的变量是 `breed`、`sex`、`age` 和 `name`。如果在查看堆栈时，你只看到了 `sex`、`age` 和
    `name`，那么你立刻就会知道 `breed` 缺失了。这是一个简单的类比，就好比说 NASA 做的事情就是把大块金属发射到太空，有时里面还载着人。调试器窗口是一个很酷、功能强大的工具，也许有一天你会真正欣赏它。


    #### Xcode 的工具：GDB 控制台


    第三个工具称为 GDB 控制台，它被封装在 Xcode IDE 中。它是一个基于文本的 GNU 调试器，功能比调试器窗口更多，并且拥有一个体面的图形用户界面，使得单步调试代码更加容易。根据我的经验，当你看到程序员在
    GDB 控制台上以闪电般的速度迭代时，这通常意味着他们已经使用 GDB 一段时间了。而这反过来又意味着该程序员要么处于 **Über-Geek**（超级极客）级别，要么处于
    **Superkalifragilistic-Geek**（超级无敌极客）级别！


    #### Xcode 的工具：控制台输出和设备日志


    Xcode 提供的第四个调试环境只是与你已经知道正在发生的事情进行交互。我相信你一定见过，当应用程序或程序崩溃时，Mac 上的 iOS 会在控制台中生成日志条目，这些条目指示了崩溃时的下钻代码。你也可以在你的
    iOS 应用程序中生成控制台消息。程序员经常使用 `NSLog` 函数，因为这些控制台日志有助于他们在更低的层次上进行调试。这里的关键词是“更低的层次”。如果你去面试，他们可能会问你，当需要寻找一个显然存在于更低层次的错误时，你用什么来调试。你的回答应该是：“当然，我们都使用控制台输出和设备日志，通过
    `NSLog` 功能来查看底层代码。” 哦，是的——他们会爱上你！


    #### Xcode 的工具：NSZombie


    Xcode 提供的第五个调试工具专门用于调试内存泄漏。在 Xcode 4.2 之前，我们必须亲自监控代码的哪些部分使用了我们设定的内存量。当我们完成一段代码后，必须释放来自该方法或类的内存，以便它能够被接下来执行的代码段使用。尽管如此，了解何时在代码段上启用
    NSZombie 很重要。


    开启 `NSZombieEnabled` 允许我们查看日志，这些日志会告诉我们内存的状态——特别是已释放的内存，如下所示。


    ```

    2011-09-10 20:01:12. 8813 storyboard[2019:f2c] *** -[GSFont ascender]: message
    sent to

    deallocated instance 0x127910

    ```


    #### Xcode 的工具：Shark


    第六个调试工具非常流行，并且像 NSZombie 一样，专门用于调试内存泄漏。不同之处在于，使用用户友好的 Shark 图形用户界面相对来说很有趣。Shark
    让我们能够访问系统级事件，如中断和虚拟内存。你可以看到代码中每个线程如何与其他线程通信，以及在该交互过程中，内存是否被丢弃、泄漏或导致“瓶颈”。Shark
    是一个你在使用 Xcode 时很可能会用到的工具，所以先记住这个名字。


    #### Xcode 的工具：单元测试


    Xcode 提供的第七个也是最后一个工具，就是我们所谓的“单元测试”。单元测试构成了一个高效的项目经理在一个大型编码项目中如何设置一切的基础或平台，以便在编写每一行代码时，都有一整套测试对其进行测试，确保一切按预期工作。


    如果一个项目经理不使用单元测试，却发现自己那 30 人、40000 行的 Xcode 项目无法运行时……再开始调试几乎为时已晚。单元测试通常被大型、管理良好的
    Xcode 公司所采用。你只需要知道，如果你去这样的公司面试，你应该花些时间练习单元测试的示例：在面试中，他们肯定会问你是否有单元测试经验，而你如果能回答“是的，朋友！我对单元测试了如指掌”，那将会非常棒。嗯，这可能不是最好的回答，但你明白我的意思。单元测试远远超出了本书的范围，但我稍后会向你介绍它，至少让你能说你们已经见过面了！

    '
- fmt: '### Our Tool: `FileMerge.app`


    Remember “learning to wipe out”? Well, `FileMerge.app` is what we will use to
    do this. I used to think that giving my students and readers of my books access
    to the code of the apps presented in this book would be all they needed to figure
    out what was wrong with their code. However, I was wrong: simply downloading the
    code from my website to their desktops was not enough to solve all of their problems.
    Being the geek that I am, I love to keep track of things, and I can tell you that
    over the last year I have sent more than 6,070 email responses containing a link
    to my source code to newbie geeks. Out of the 6,070 people that received this
    email and downloaded my code, 4,208 of them STILL could not debug their code!
    Clearly, I was doing something wrong, and I needed to revise my pedagogy. SO,
    I did.


    I present my answer in this chapter, which shows you how to download my source
    code, use `FileMerge.app` to debug your code against my code, and find your mistake—in
    other words, it teaches you how to wipe out (or in computer terms, “crash”).


    In [Chapter 7](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_022.html#filepos504312),
    I introduced storyboarding. It was fun dragging objects around the canvas and
    connecting them with segues. Now, you will start putting a lot of code behind
    those objects to make them shinier and more intelligent. And I do mean a LOT of
    code. You need to know how to debug using `FileMerge.app`, comparing my code against
    yours. This is a lesson I insist you take, even though you may think you''re too
    cool for it.


    ### `switch-mistake`: A Lesson in the Art of Crashing


    You are going to revisit [Chapter 6](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_020.html#filepos449865)''s
    switch code, but this time you will not code the entire app, and most importantly
    you will force an error. Then, you will download my code from the website, open
    up `FileMerge.app`, and debug your code. Now, you may ask, why don''t we just
    do switches in [Chapter 6](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_020.html#filepos449865)
    and then pop back here and do the debugging? The answer is threefold:


    - First, as I said, you won''t be using all the code you wrote in [Chapter 6](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_020.html#filepos449865)''s
    switches, and you need to do it in a different order. So, you need to do it again
    from scratch, following step by step in this chapter.

    - Second, the naming of the code will be different. I want you to have a different
    name on the code you write in this chapter so your bug does not pop up. I''ll
    explain this later.

    - Third, I just want you to practice redoing an app with which you already feel
    comfortable. This way, your error and the debugging becomes your primary focus.


    #### Starting the Project


    So, the first thing we need to do is clear off your desktop and download the source
    code and the images from my website.


    - Download the images here: `bit.ly/raKxPe`


    NOTE: I provide only minimal instructions on each step leading up to the point
    where you create your bug. This is because you''ve already done this exercise,
    and now I''m taking the kid gloves off.


    > ![images](images/00314.jpg)

    > Figure 8–1\. A clean desktop with the three images downloaded, ready to open
    a new project


    1. With a clean desktop containing only the three images downloaded, open a new
    project by using the keyboard shortcut ![image](images/00031.jpg)![image](images/00032.jpg)N.
    When you see the New Project wizard as depicted in [Figure 8–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos615838),
    you will want to click the Tabbed Application template.


      ![images](images/00315.jpg)  

    Figure 8–2\. Name it “switch-mistake” and click “Next”.


    2. As shown in [Figure 8–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos616644),
    name it “switch-mistake”, target it for the iPhone, deselect the Use Storyboard
    option, and click Next or hit ![image](images/00043.jpg) on your keyboard.


      ![images](images/00316.jpg)  

    Figure 8–3\. Drag the icon to the App Icon box.


    3. Drag the application icon, `icon.png`, from your desktop to the App Icon box,
    as shown in [Figure 8–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos617252).


      ![images](images/00317.jpg)  

    Figure 8–4\. App Icon properly dropped into the box


    4. [Figure 8–4](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos617770)
    shows the icon correctly dropped into the App Icon box. Note that you usually
    determine which image will be your icon by using the `plist`. Here, you are using
    the drag and drop method for the second time.'
