  trans: '

    ### 别慌：来看看你的大脑！


    解释这个问题的最佳方式之一，是问你一个与 Objective-C 和计算机科学完全无关的问题。这关乎童年记忆。


    你是否曾闻到一种从未闻过的气味，然后毫无预兆地，你的大脑瞬间将你带回了童年时代的某个地方？是的，我们都有过这种经历。闻到这种气味后，你会突然清晰地看到脑子里的一切：墙壁、人物——一切都无比清晰，有时甚至会让你情绪失控。你可能会感到震惊，因为多年来你从未想起过那些墙壁或画面，而现在它们却突然淹没了你的感官。让我来解释一下这是为什么。我将以我闻到老式肥皂的气味为例来说明，然后展示这与你刚刚建立的神经连接有何关联。


    请看图 6–a。在第一个标题“ILLUSTRATION”下方，你会看到一个非常简化的示意图，展示了一旦你的大脑接收到一个它从未体验过的新输入，它就会在细胞体内创建一个细胞核来保存这一事件。这个细胞核通过神经线和轴突与你大脑的其余部分相连。当你经历与这个新事件相关的其他新事件时，一个由突触和神经元组成的树状结构就会连接到这个细胞核上。其中一些连接会变得非常丰富，我们称之为树突。


    当我还是南非德班的一个小男孩时，我曾跑到佣人们洗衣服的地方。那是在 1963 年左右，大多数家庭都使用一种气味独特的老式氨皂。这种气味在我幼小的大脑中创建了一个新的细胞核。这个细胞核与祖鲁族佣人们手洗衣服时唱的欢快歌曲连接了起来。我的大脑还将墙壁、油漆和我的狗桑普森的画面连接了起来。这些关于歌声、墙壁、油漆和狗的连接，形成了与那种新气味相连的四组连接，如图
    6–a 中“SYNTHESIZED”部分所示。有些组从一开始就有更多的连接，比如歌曲组，因为我小时候经常唱很多祖鲁歌曲。第二大组很可能与我的狗有关。我按大小顺序将这四组标记为
    1 到 4。


    许多年后，在纽约市，大概是 1993 年左右，我匆匆赶去赴约，一位法学教授说他会在一家小餐馆与我共进午餐。当我跑过第八大道时，注意到一些人在另一家餐馆前清洁人行道。他们正用肥皂和水，拿着大草刷擦洗。突然，我闻到了那种气味。那是我三岁那年在洗衣房之后从未再闻到的气味。我猛然间看到了那些佣人，能听到他们的歌声和笑声，还能看到我的老狗桑普森。我被那一天、那些人、那久远的活力所淹没，情绪激动得停下了脚步，开始哭泣。当我到达餐馆时，穿着华美粗花呢西装的教授站在那里说：“罗里，晚了几分钟没关系。哦，天哪，你在哭吗？”


    > ![图片](img/00192.jpg)


    *图 6–a. 别慌：来看看你的大脑。*


    那么，到底发生了什么？当你经历类似事件时会发生什么？为什么这种事情经常与气味有关？我们先来看看生活中的事件，比如你第一次意识到 `1 + 1 = 2` 的时候。你还记得第一次意识到
    `1 + 1 = 2` 的情景吗？很可能不记得。这是因为在你创建了关联 `1 + 1 = 2` 的细胞核之后，已经有数万亿个连接通向 `1 + 1 = 2`。每次你执行任何与
    `1 + 1 = 2` 相关的功能时，你的大脑都会与保存 `1 + 1 = 2` 的细胞核建立连接。甚至当你翻阅这本书，页码从 `page[n]` 变为 `page[n+1]`
    时，你也会为与 `1 + 1` 相关的树突和关联组建立突触连接。在这数万亿个 `1 + 1 = 2` 的连接中，某个地方存储着你意识到这一点时那个房间的视觉和声音效果，但它们迷失在了其他数万亿个连接的迷宫中。


    然而，那种罕见的气味则不同。想想看。我展示了与我三岁时那种气味相关的四组连接。在随后 30 年里，这个细胞核和与之相连的四组连接创建之后，再也没有建立过新的连接。它就那么静静地待在那里。但是，当我穿过第八大道闻到那种气味时，它立刻唤醒了同一个细胞核以及连接到那个事件的四组内容。这些连接非常**强**，因为它们没有与其他复杂关系交织在一起。这使得那些歌声、我对狗的感觉、笑声和其他事件如潮水般向我涌来。


    现在，暂时回到你阅读第 5 章的时候。看看图 6–a 中“你此刻”的图示。当你阅读第 5 章时，你创建了一组细胞核。为了便于说明，我们假设你在阅读第 5 章时只学到了一件事或一个知识点。包含那个知识的细胞核位于浅灰色圆圈中。你最多可能只建立了一个与某个相关想法或概念的连接。这就是为什么我只连接了一个小组到第
    5 章的知识细胞核。更重要的是，注意我还创建了其他五个潜在连接组，可以连接到第 5 章：它们是“书的其他部分”、“解决问题”、“教给别人”、“现实生活应用”和“赚钱”。目前，这些组与第
    5 章的知识细胞核毫无连接，这是完全正常的，因为你还没有时间去创建这些连接。例如，现在，当你阅读本章时，你可能“感觉”自己与第 5 章学到的知识毫无关联。这是因为在你阅读本章时，与它没有连接。同时，通过第
    5 章学到的知识来赚钱，以及与其他组的连接也完全为零。

    '
- fmt: 'I carefully choose topics, innuendo, and semantics to optimize, as best I
    can, connectivity between what I teach at the moment to what was taught in the
    past. By the time you reach the end of this book, create your first app, and sell
    it in the store, your brain will have begun to create many connectors to [Chapter
    5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378). I have illustrated
    this in [Figure 6–a](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos456555)
    under GEEKDOM. Something that connects a huge amount of synapses to nuclei containing
    a difficult-to-understand concept is teaching others. It''s great to go onto forums,
    such as mine at `www.rorylewis.com/ipad_forum/` or `bit.ly/oLVwpY`, and help out
    newbies with their questions (even if you are a newbie yourself) because it creates
    many connections to that difficult concept, making you smarter. In essence, helping
    others forces one to answer the same question in thousands of different ways.
    So I strongly encourage you to go to the forum, ask questions, and then, as you
    become wiser, help others.


    So the first good news is that it''s OK to feel disconnected to what you coded
    in [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378).
    It''s OK; you''ll make those connections as you move forward. The second piece
    of good news is that [Chapter 6](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_020.html#filepos449865)
    will not be as huge a leap as [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378)
    was. Instead, you are going to take a break from serious code and connect new
    ideas to the synapses that you connected with code in [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378).
    In fact, in both [Chapter 6](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_020.html#filepos449865)
    and [Chapter 7](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_022.html#filepos504312)
    there will be very little code! Instead, I will connect cool new thoughts to the
    portion of your brain that is associating code with ideas explored in [Chapter
    5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378). Once you have
    established these connections in your brain, you will associate more code. In
    [Chapter 6](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_020.html#filepos449865), you
    will explore a popular method for navigating through iPhone apps using the platform
    of a "tabbed application." But for now, just relax and enjoy [Chapter 6](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_020.html#filepos449865):
    Switches.


    ### `switch:` A Tabbed Application


    So far you have written code that allowed the user to poke or prod an iPhone or
    iPad in certain ways to make it do interesting things. This is now going to change.
    In this chapter, you will demonstrate how to create an iPhone app that allows
    you to do all of these cool functions without overwhelming your user, by dividing
    the functionality into several easy to locate tabs. This model, called the "tabbed
    model," is so popular amongst app developers that Apple has included a basic tabbed
    application project in the New Project options in Xcode. In other words, the people
    at Apple recognize how much programmers like to use this model, so they created
    most of the code you need. When you''re all done writing this app, you''ll have
    a display with two tabs at the bottom. The content of the first tab will be an
    image that you set using Interface Builder with a button overlaid on top of it.
    This button will cause Mobile Safari to open the Apress Publishing Web Site. The
    content of the second tab will be a different image, but you can set the image
    name and other attributes in the implementation file and only set up enough of
    a framework in Interface Builder to make that possible.


    #### Obtaining the Resources


    You can watch a video of the wild and crazy, beaming-with-life, groovy PhD student
    Brian Parks coding this switches app at `bit.ly/mX4pkk` and simply follow along
    with him. You can also download the code to this project at `bit.ly/vBSKMa` where
    you can visually compare your code with mine. Most importantly, you will either
    need to download the three images at `bit.ly/tIYl9Y` or create your own two images
    and icon using the same dimensions as mine: 320 × 480 pixels for the two large
    images, and, of course, 57 × 57 pixels for your icon.


    ![images](images/00193.jpg)


    Figure 6–1\. Download the three images onto your squeaky clean desktop.


    1. Start off by cleaning out your desktop so there is nothing on it. Then either
    create your two 320 × 480 pixel images, one for each view, and then one icon,
    at 57 × 57 pixels, or download the three images used in the video, as illustrated
    in this book, at `bit.ly/vBSKMa`. This is shown in [Figure 6–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos464850).


    #### Creating the App


    Now let''s create the app.


    ![images](images/00194.jpg)


    Figure 6–2\. Start a Tabbed Application.


    2. Start this app just like you''ve started all the apps so far: use `⌘N` to start
    a new project. Select "Tabbed Application" from the sheet that appears. This template
    sets up a significant portion of the tab framework for you, so you can focus on
    filling in the content and not worrying about the gory details of the interaction
    model. Click "Next." This is illustrated in [Figure 6–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos465838).


    ![images](images/00195.jpg)


    Figure 6–3\. Name the app "switch."


    3. As illustrated in [Figure 6–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos466674),
    name your app "switch" and ensure that both of the checkboxes are unchecked. "Use
    Storyboard" drastically changes how a tabbed application is set up and is explored
    in detail in [Chapter 7](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_022.html#filepos504312).
    In this app, you''ll specifically target the iPhone because tabs become cumbersome
    on the iPad.'
