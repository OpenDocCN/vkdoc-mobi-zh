  trans: '

    # 应用预备知识


    我们将考虑构建应用时会用到的大量组件。但在那之前，我想确保大家都牢固掌握一些重要的术语。对于这个项目，我们程序员需要回顾一些基础的地球科学和地理知识，这样才能让我们的代码发挥最大效用。


    当我们指示计算机将一枚带有注释的图钉动画式地投放到某个特定位置，并给出"经度"和"纬度"时，我们需要真正理解这些术语的含义。纬度线是环绕地球"水平"延伸的假想线，方向为自东向西（或自西向东）。这些无形的线以度、分、秒为单位进行测量，表示赤道以北或以南的距离。赤道是地球表面位于两极中间点的椭圆轨迹——而两极则是真实存在的点，由地球绕地轴自转所定义。纬度线通常被称为纬线（平行圈）。北极位于北纬
    90 度；南极位于南纬 90 度。


    经度线通常被称为子午线，是穿过南北两极的假想"垂直"线（椭圆轨迹）。它们同样以度、分、秒为单位进行测量，表示本初子午线以东或以西的距离。本初子午线是一条贯穿英国格林威治的任意标准线。与环绕全球
    360 度的赤道不同，本初子午线（0 度经度）是一个半圆（半椭圆），从北极延伸到南极；圆弧的另一半被称为国际日期变更线，定义为东经 180 度和/或西经 180
    度。


    对于我们的第 9 章应用，我用来说明在地图上"投放图钉"位置的示例是我在科罗拉多大学斯普林斯分校的办公室。当然，我们可以使用任何我们选择的位置。我们或许想用自家的地址，或者某个著名地标。要这样做，我们必须获取该位置的经纬度数值——最可能来自谷歌地图或直接的
    GPS 读数。互联网上有许多网站可以找到这些坐标；图 9-7 展示了其中一种，网址是[`http://bit.ly/vGszNu`](http://bit.ly/vGszNu)。


    ![images](img/00360.jpg)


    图 9-7\. Batchgeo（[www.batchgeocode.com/lookup](http://www.batchgeocode.com/lookup)）是众多可输入地址并获取其经纬度坐标的互联网站点之一。


    这里有个想法——让我们从流程的终点开始，逆向思考一分钟。请直接跳到本章后面先预览一下应用的样子——如果一切顺利，它会返回什么样的结果。在图 9-34 中，我们看到一幅混合地图的图片，上面显示着一枚红色图钉落在一栋建筑物上。那就是科罗拉多大学斯普林斯分校的工程学院大楼；图钉正位于我的办公室上方。下一幅图带有我们称之为注释的内容，也就是文字。"Rory
    Lewis 博士"是标题，"科罗拉多大学斯普林斯分校"是副标题。


    在教程的后面部分，我们会发现需要对标题和副标题多加注意。我们还可以控制图钉的颜色，并决定动画的风格——即图钉如何落到地图图像上。


    这里正适合提醒大家本书的书名：《iPhone 和 iPad 应用开发入门》。深呼吸一下！即使我们都达到了学会有史以来最多知识的最大期望，即使我们都达到了对自身能力的最高期望——在如此短的时间内学会如此复杂的内容，我们仍然不会成为`MapKit`代码这个极具挑战性领域的专家！在这一点上，我的卑微目标不是熟练精通，而是合理的熟悉程度，以及对未来之路有所感知。


    如果这听起来没问题，那我们就开始吧。


    ## 准备工作


    与之前的章节一样，请下载并解压本章的图片和样板代码。访问[`bit.ly/oDqzvYand`](http://bit.ly/oDqzvYand)下载其内容。图片包括三个图标文件、两个启动画面和两个样板代码文件。稍后我会解释这些图标、启动画面和样板代码的含义。但现在，我们只需将其下载到桌面。然后，把文件解压到我们整洁清爽的桌面上。


    我在视频中编程的示例代码可在此处下载：[`bit.ly/qd6iDT`](http://bit.ly/qd6iDT)。解压所有文件后，记得删除`011_myStory_01.zip`和`myStory_01`文件夹。这是为了避免覆盖文件和/或与练习代码产生潜在冲突。要观看本章练习的录屏，请访问[`bit.ly/owk24r`](http://bit.ly/owk24r)。


    ## 新建单视图模板


    让我们开始并选择模板。


    ![images](img/00361.jpg)


    图 9-8\. 选择"Single View Application"图标，然后按回车键或点击 Next。


    1. 打开 Xcode 并按![images](img/00031.jpg)![images](img/00032.jpg)N 组合键，如图 9-8 所示。然后点击"View-based
    Application"模板。我们将它命名为`myStory_01`，然后保存到桌面。桌面上会出现一个同名文件夹。


    ![images](img/00362.jpg)


    图 9-9\. 将您的应用命名为`myStory_01`，确保 Storyboard 和自动引用计数功能已开启。


    2. 为了尽可能紧密地跟随操作（因为后面会变得复杂），我们将项目命名为"`myStory_01`"。为此，选择 iPhone（而不是 iPad 或 Universal），保留
    Class Prefix 和 Include Unit Tests 选项不变，如图 9-9 所示。请检查 Storyboard 和 Automatic Referencing
    选项是否已开启。


    ![images](img/00363.jpg)


    图 9-10\. 为您的注释创建一个 Objective-C 类。

    '
- fmt: '### Preliminaries: Adding the Annotation File


    3. While we''re here setting up our project, we need to create an annotation file
    and import some frameworks. Let''s start with the annotation file. As previously
    mentioned, we need a means to control our annotation. For that, we will create
    an Objective–C class that will control all the characteristics we want to display
    on this annotation. Click the `Classes` folder and enter `![images](images/00031.jpg)N`
    as shown in [Figure 9–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos678614).
    When finished, click Next.


    ![images](images/00364.jpg)


    Figure 9–11. Name it `myPos` and make sure it''s an `NSObject` subclass.


    4. Because this controller will be in charge of controlling annotations for our
    position, let''s name it something that correlates to my position; how about name
    it `myPos`. Also, make sure that it is not a subclass of `UIView` or any other
    subclass. Make sure it''s a subclass of `NSObject`. This is shown in [Figure 9–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos679646).


    ![images](images/00365.jpg)


    Figure 9–12. Save it inside your `myStory_01` folder.


    5. Make sure to save this inside the `myStory_01` folder. This will make it much
    easier to export and is simply a good habit to have when we start sharing classes
    and objects with other programmers. See [Figure 9–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos680385).


    ![images](images/00366.jpg)


    Figure 9–13. Move the newly created `NSObjects` into the correct folder.


    6. As shown in [Figure 9–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos681005),
    our two newly created `NSObjects` named `myPos.h` and `myPos.m` are located in
    the root directory of our project. We need to move them to the correct place in
    the correct folder. I typically order the files I will be coding in the sequence
    I will code them under the nib or storyboard files. We usually do not work a lot
    with the `AppDelegate` files so I keep them on top and out of the way. Because
    I will start coding the `NSObjects` that keep track of my position, we will put
    them immediately under the Storyboard.


    ![images](images/00367.jpg)


    Figure 9–14. Go to the `myStory_01` root directory and select the `Build Phases`
    tab.


    ### Preliminaries: Adding Frameworks


    7. The first thing we need to do is add two frameworks: For a newbie, we would
    say: “Frameworks are huge gobs of super code that is used for specialized stuff.
    It is too big to be carried around all the time but if we write an app that needs
    a framework—then we drag this framework into our code.” Yeah, but we''re not a
    newbie anymore—we''re heading at a fast and furious pace to becoming a bona fide
    geek, respected by others left in the swamps of technology—so, let''s look at
    this. Yes, it is specialized code. We will put it in a hierarchical directory
    that encapsulates dynamic shared libraries such as, nib files, image files, localized
    strings, header files, and reference documentation in a single package. In our
    app, we will use `CoreLocation` and `MapKit` frameworks and when we bring them
    into our app, the system loads them into memory as needed and shares the one copy
    of the resource among all applications whenever possible. So, we will go to our
    root directory and click on the `Build Phases` tab as shown in [Figure 9–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos681987).


    ![images](images/00368.jpg)


    Figure 9–15. Click on the `Link Binaries with Libraries` bar and click on the
    “+”.


    8. As shown in [Figure 9–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos683595),
    click on the `Link Binaries with Libraries` bar and click on the “+”.


    ![images](images/00369.jpg)


    Figure 9–16. Select the `CoreLocation` Framework.


    9. We will either scroll through all our options or enter location in the search
    bar and select `CoreLocation` Frameworks. Then we will press Add or Enter/Return
    as shown in [Figure 9–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos684120).


    ![images](images/00370.jpg)


    Figure 9–17. Select the `MapKit` Framework.


    10. Repeating step 9, we will now do the same for `MapKit`. We will either scroll
    through all of our options or enter location in the search bar and select `MapKit`
    Framework. Then press Add or Enter/Return as shown in [Figure 9–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos684708).


    ![images](images/00371.jpg)


    Figure 9–18. Move the imported Frameworks to the `Frameworks` folder.


    11. As shown in [Figure 9–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos685333),
    we will grab our two newly imported Frameworks that are by default stored in the
    root directory. We will then move those to our frameworks folder. It is important
    that we create good habits and store all of our Frameworks in the correct folder.


    ![images](images/00372.jpg)


    Figure 9–19. Check your directories and files against mine.


    12. Before we move on, we need to make sure that we check our project against
    the example shown in [Figure 9–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos686023).
    We need to make sure that our `NSObjects` `myPos.h`, `myPos.m` and that our `CoreLocation`
    and `MapKit` Frameworks are placed like those in the example. With this step completed,
    we will move on; place our images and then start coding.'
  raw: '#### Preliminaries: Adding the Annotation File


    3\. While we''re here setting up our project, we need to create an annotation
    file and import some frameworks. Let''s start with the annotation file. As previously
    mentioned, we need a means to control our annotation. For that, we will create
    an Objective–C class that will control all the characteristics we want to display
    on this annotation. Click the Classes folder and enter ![images](images/00031.jpg)N
    as shown in [Figure 9–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos678614).
    When finished, click Next.


      ![images](images/00364.jpg)  


    Figure 9–11\. Name it myPos and make sure it''s an NSObject subclass.


    4\. Because this controller will be in charge of controlling annotations for our
    position, let''s name it something that correlates to my position; how about name
    it “myPos.” Also, make sure that it is not a subclass of UIView or any other subclass.
    Make sure it''s a subclass of NSobject. This is shown in [Figure 9–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos679646)


      ![images](images/00365.jpg)  


    Figure 9–12\. Save it inside you myStory_01 folder.


    5\. Make sure to save this inside the myStory_01 folder. This will make it much
    easier to export and is simply a good habit to have when we start sharing classes
    and objects with other programmers. See [Figure 9–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos680385).


      ![images](images/00366.jpg)  


    Figure 9–13\. Move the newly created NSObjects into the correct folder.


    6\. As shown in [Figure 9–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos681005),
    our two newly created NSObjects named `myPos.h` and `myPos.m` are located in the
    root directory of our project. We need to move them to the correct place in the
    correct folder. I typically order the files I will be coding in the sequence I
    will code them under the nib or storyboard files. We usually do not work a lot
    with the AppDelegate files so I keep them on top and out of the way. Because I
    will start coding the NSObjects that keep track of my position, we will put them
    immediately under the Storyboard.


      ![images](images/00367.jpg)  


    Figure 9–14\. Go to the myStory_01 root directory and select the Build Phases
    tab.


    #### Preliminaries: Adding Frameworks


    7\. The first thing we need to do is add two frameworks: For a newbie, we would
    say: “Frameworks are huge gobs of super code that is used for specialized stuff.
    It is too big to be carried around all the time but if we write an app that needs
    a framework—then we drag this framework into our code.” Yeah, but we''re not a
    newbie anymore—we''re heading at a fast and furious pace to becoming a bona fide
    geek, respected by others left in the swamps of technology—so, let''s look at
    this. Yes, it is specialized code. We will put it in a hierarchical directory
    that encapsulates s dynamic shared libraries such as, nib files, image files,
    localized strings, header files, and reference documentation in a single package.
    In our app, we will use Corelocation and MapKit frameworks and when we bring them
    into our app, the system loads them into memory as needed and shares the one copy
    of the resource among all applications whenever possible. So, we will go to our
    root directory and click on the Build Phases tab as shown in [Figure 9–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos681987).


      ![images](images/00368.jpg)  


    Figure 9–15\. Click on the Link Binaries with Libraries bar and click on the “+”.


    8\. As shown in [Figure 9–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos683595),
    click on the Link Binaries with Libraries bar and click on the “+”.


      ![images](images/00369.jpg)  


    Figure 9–16\. Select the Corelocation Framework.


    9\. We will either scroll through all our options or enter location in the search
    bar and select Corelocation Frameworks. Then we will press Add or Enter/Return
    as shown in [Figure 9–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos684120).


      ![images](images/00370.jpg)  


    Figure 9–17\. Select the MapKit Framework.


    10\. Repeating step 9, we will now do the same for MapKit. We will either scroll
    through all of our options or enter location in the search bar and select MapKit
    Framework. Then press Add or Enter/Return as shown in [Figure 9–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos684708).


      ![images](images/00371.jpg)  


    Figure 9–18\. Move the imported Frameworks to the Frameworks folder.


    11\. As shown in [Figure 9–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos685333),
    we will grab our two newly imported Frameworks that are by default stored in the
    root directory. We will then move those to our frameworks folder. It is important
    that we create good habits and store all of our Frameworks in the correct folder.


      ![images](images/00372.jpg)  


    Figure 9–19\. Check your directories and files against mine.


    12\. Before we move on, we need to make sure that we check our project against
    the example shown in [Figure 9–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos686023).
    We need to make sure that our NSObjects `myPos.h`, `myPos.m` and that our Corelocation
    and MapKit Frameworks are placed like those in the example. With this step completed,
    we will move on; place our images and then start coding.'
  trans: '

    ### 前期准备：添加注释文件


    3.  在设置项目的同时，我们需要创建一个注释文件并导入一些框架。先从注释文件开始。如前所述，我们需要一种方法来控制我们的注释。为此，我们将创建一个 Objective-C
    类，用于控制我们想要在此注释上显示的所有特性。点击 `Classes` 文件夹，然后像图 9-10 所示输入 `![images](img/00031.jpg)N`。完成后，点击“下一步”。


    ![images](img/00364.jpg)


    图 9-11. 将其命名为 `myPos`，并确保它是 `NSObject` 的子类。


    4.  因为这个控制器将负责控制我们位置的注释，所以给它取一个与我的位置相关的名字；叫它 `myPos` 怎么样？同时，确保它不是 `UIView` 或任何其他类的子类。确保它是
    `NSObject` 的子类。如图 9-11 所示。


    ![images](img/00365.jpg)


    图 9-12. 将其保存在你的 `myStory_01` 文件夹内。


    5.  确保将其保存在 `myStory_01` 文件夹内。这将使导出变得更容易，并且当我们开始与其他程序员共享类和对象时，这也是一个好习惯。参见图 9-12。


    ![images](img/00366.jpg)


    图 9-13. 将新创建的 `NSObjects` 移到正确的文件夹中。


    6.  如图 9-13 所示，我们新创建的两个名为 `myPos.h` 和 `myPos.m` 的 `NSObjects` 位于项目的根目录中。我们需要将它们移到正确文件夹中的正确位置。我通常按照在
    nib 或故事板文件下编写的顺序来排列我将要编码的文件。我们通常不会大量处理 `AppDelegate` 文件，所以我将它们放在顶部并避开它们。因为我将开始编写追踪我位置的
    `NSObjects`，所以我们将它们紧挨着 Storyboard 放置。


    ![images](img/00367.jpg)


    图 9-14. 转到 `myStory_01` 根目录并选择 `Build Phases` 选项卡。


    ### 前期准备：添加框架


    7.  我们需要做的第一件事是添加两个框架：对于新手，我们会说：“框架是用于专门用途的大量超级代码。它太大了，不能一直随身携带，但如果我们要编写一个需要框架的应用——那么我们就将这个框架拖入我们的代码中。”
    是的，但我们不再是新手了——我们正以快如闪电的速度奔向成为一名真正的极客，受到那些被困在技术沼泽中的人的尊敬——所以，让我们来看看这个。是的，它是专门的代码。我们将其放入一个分层目录中，该目录将动态共享库（例如
    nib 文件、图像文件、本地化字符串、头文件和参考文档）封装在单个包中。在我们的应用中，我们将使用 `CoreLocation` 和 `MapKit` 框架，当我们将它们引入应用时，系统会根据需要将它们加载到内存中，并尽可能在所有的应用程序之间共享该资源的一个副本。所以，我们将转到根目录并点击
    `Build Phases` 选项卡，如图 9-14 所示。


    ![images](img/00368.jpg)


    图 9-15. 点击 `Link Binaries with Libraries` 栏，然后点击“+”。


    8.  如图 9-15 所示，点击 `Link Binaries with Libraries` 栏，然后点击“+”。


    ![images](img/00369.jpg)


    图 9-16. 选择 `CoreLocation` 框架。


    9.  我们可以滚动浏览所有选项，或者在搜索栏中输入 location，然后选择 `CoreLocation` Framework。然后按 Add 或 Enter/Return
    键，如图 9-16 所示。


    ![images](img/00370.jpg)


    图 9-17. 选择 `MapKit` 框架。


    10. 重复步骤 9，我们现在为 `MapKit` 执行相同操作。我们可以滚动浏览所有选项，或者在搜索栏中输入 location，然后选择 `MapKit`
    Framework。然后按 Add 或 Enter/Return 键，如图 9-17 所示。


    ![images](img/00371.jpg)


    图 9-18. 将导入的框架移到 `Frameworks` 文件夹中。


    11. 如图 9-18 所示，我们将获取默认存储在根目录中的两个新导入的框架。然后我们将它们移动到我们的 frameworks 文件夹。养成良好的习惯并将所有框架存放在正确的文件夹中非常重要。


    ![images](img/00372.jpg)


    图 9-19. 对照我的示例检查你的目录和文件。


    12. 在我们继续之前，我们需要确保对照图 9-19 所示的示例检查我们的项目。我们需要确保我们的 `NSObjects` `myPos.h`、`myPos.m`
    以及我们的 `CoreLocation` 和 `MapKit` 框架的放置位置与示例中的一致。完成这一步后，我们将继续；放置我们的图像，然后开始编码。

    '
- fmt: '### Bringing in the Images!


    We want to have five essential images for every app we make. For convenience,
    these are included in the package available for download from my website at [http://bit.ly/oDqzvY](http://bit.ly/oDqzvY).
    They include the essential icons and two splash screens. These include the `57
    x 57 px` for the iPhone classic, the `72 x 72 px` for the iPad, and the `114 x
    114 px` for the iPhone 4S Retina Display. I''ve also designed two splash screen
    images that are available for your use. Splash screen images appear on the screen
    of the app while the apps code loads. They usually only appear for less than a
    second, but they give the user something cool to look at—and they set the tone
    for the super cool app that is loading. You will need two splash screens because
    you have to accommodate the various iPad and iPhone configurations the user using
    your app might have. The `640 x 960 px` splash screen for iPads and iPhone Retinas
    and a `320 x 480 px` for the classic iPhone are included. After you have downloaded
    them, you can always use them as a template for your future apps.


    > **NOTE:** In this application, we are only using the iPhone. In the next chapter,
    when we design `myStory_02`, we will use both the iPhone and the iPad where we
    can use all the icons. So, just keep the extra iPad icon for later use when you
    design your own icons.


    ![images](images/00373.jpg)


    **Figure 9–20.** Drag in the icons.


    13. Staying in the root directory after importing the frameworks, drag the icon
    images into the icon boxes. [Figure 9–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos688579)
    shows the `57 x 57 px` classic iPhone icon in its box and the Retina icon being
    drug over to it.


    ![images](images/00374.jpg)


    **Figure 9–21.** Drag in the icons.


    14. Similar to step 13, after importing the icons, we now need to import our splash
    screen images into their boxes. [Figure 9–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos689174)
    shows the iPhone Retina `320 x 480 px` classic splash screen already in place
    with the classic iPhone `640 x 960 px` splash screen being dragged in. Once we
    are finished dragging these images in, we are ready to start with the code.


    ![images](images/00375.jpg)


    **Figure 9–22.** Drag in your icons so you can take them to the correct folder.


    15. Before we start to code, we need to make sure that all our files are in the
    correct folders. At this point, we know that `Xcode` will recognize the correct
    icons and splash screens—but look where they are! They''re in the root directory
    again. Grab them, as shown in [Figure 9–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos689912),
    and move them into the `supporting files` folder.


    ![images](images/00376.jpg)


    **Figure 9–23.** Drop the project icons into the `supporting files''` folder.


    16. The `Supporting Files` folder is probably not open. That''s OK. As we drag
    the icons with our mouse, we will need to slow down as we hover over the `Supporting
    Files` folder so it will open up. Once it opens up, drop the files into the folder
    as shown in [Figure 9–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos690665).


    ![images](images/00377.jpg)


    **Figure 9–24.** Ready to paint …erh… code.


    17. Take a good look at [Figure 9–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos691351).
    We are now ready to code. We need to get used to wanting to see our coding canvas
    laid out before we ever start writing our code. This is very much like a painter
    who will first buy a canvas, get paint, turpentine, brushes, rags, and a model
    of what will be painted before the first dab is ever painted. This is what we''ve
    just done. We need to get used to first setting everything up before we write
    our code.


    > **NOTE:** I cannot understand why some students invariably dive into the code
    immediately upon receiving an in-class assignment. I also always stop them immediately
    and make them prep as we have done here and throughout this book. It is during
    this time while I bring in all my files and create whatever new frameworks and
    `NSObjects` that I need that my mind goes into a semi-meditative state and I quietly
    plan out how I will write the code. During this time, my mind tries out all kinds
    of different options and by the time I am finished prepping, I am completely ready
    to code.'
