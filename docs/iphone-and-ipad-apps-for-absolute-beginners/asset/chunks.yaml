  trans: '

    ### 引入图片！


    我们为每款应用准备了五张必备图片。为方便起见，这些图片已包含在可从我的网站 [`bit.ly/oDqzvY`](http://bit.ly/oDqzvY)
    下载的软件包中。其中包括必要的图标和两个启动画面。这些图片包含适用于经典 iPhone 的 `57 x 57 px`、适用于 iPad 的 `72 x 72
    px` 以及适用于 iPhone 4S Retina 显示屏的 `114 x 114 px` 规格。我还设计了两张启动画面图片供你使用。启动画面图片会在应用代码加载时显示在屏幕上。它们通常只出现不到一秒钟，但能为用户提供酷炫的视觉效果，并为正在加载的超酷应用奠定基调。你需要两张启动画面，因为必须适配可能使用你应用的不同
    iPad 和 iPhone 配置。软件包中包含适用于 iPad 和 iPhone Retina 的 `640 x 960 px` 启动画面，以及适用于经典
    iPhone 的 `320 x 480 px` 启动画面。下载后，你始终可以将其用作未来应用的模板。


    > **注意：** 在本应用中，我们仅使用 iPhone。在下一章设计 `myStory_02` 时，我们将同时使用 iPhone 和 iPad，届时即可使用所有图标。因此，请保留额外的
    iPad 图标，以供日后设计自己的图标时使用。


    ![images](img/00373.jpg)


    **图 9–20.** 拖入图标。


    13. 导入框架后，仍在根目录中，将图标图片拖入图标框内。图 9–20 显示了放入框中的 `57 x 57 px` 经典 iPhone 图标，以及正在拖入的
    Retina 图标。


    ![images](img/00374.jpg)


    **图 9–21.** 拖入图标。


    14. 与步骤 13 类似，导入图标后，我们现在需要将启动画面图片导入其对应的框中。图 9–21 显示了已就位的 iPhone Retina `320 x
    480 px` 经典启动画面，以及正在拖入的经典 iPhone `640 x 960 px` 启动画面。拖入这些图片后，我们就可以开始编写代码了。


    ![images](img/00375.jpg)


    **图 9–22.** 拖入图标，以便将其放入正确的文件夹。


    15. 在开始编码之前，我们需要确保所有文件都位于正确的文件夹中。至此，我们知道 `Xcode` 会识别正确的图标和启动画面——但看看它们的位置！它们又回到了根目录。如图
    图 9–22 所示，抓住它们，将其移动到 `supporting files` 文件夹中。


    ![images](img/00376.jpg)


    **图 9–23.** 将项目图标放入 `supporting files` 文件夹。


    16. `Supporting Files` 文件夹可能并未展开。没关系。当我们用鼠标拖拽图标时，需要在悬停于 `Supporting Files` 文件夹上方时放慢速度，以便其展开。一旦展开，如图
    图 9–23 所示，将文件放入文件夹中。


    ![images](img/00377.jpg)


    **图 9–24.** 准备开始绘制……呃……编码。


    17. 仔细观察 图 9–24。我们现在可以开始编码了。我们需要习惯在开始编写代码之前，先规划好编码画布。这很像一位画家，在画下第一笔之前，会先准备好画布、颜料、松节油、画笔、抹布以及要绘制的模型。我们刚刚做的就是这件事。我们需要习惯在编写代码之前先做好一切准备工作。


    > **注意：** 我无法理解为什么有些学生一拿到课堂作业就立刻埋头编码。我也总会立即制止他们，并让他们像我们在此处及本书中所做的那样先做准备工作。正是在我将所有文件导入并创建所需的新框架和
    `NSObjects` 的这段时间里，我的思维会进入一种半冥想状态，并默默规划如何编写代码。在此期间，我的大脑会尝试各种不同的方案，等到准备工作完成时，我已完全准备好开始编码了。

    '
- fmt: "### Coding the `myPos` `NSObject`\n\nRemember that `myStory_01` is a lead-in\
    \ or segue into `myStory_02`, which is where the real action is. In fact, many\
    \ MapKit apps will need a separate `NSObject` to keep track of many positions.\
    \ In this small app, we do not necessarily have to program the `myPos.h` and `myPos.m`\
    \ files at all. But you need to get used to always creating an `NSObject myPos`\
    \ to keep track of your position or an array of positions to feed into the annotations\
    \ and MapKit framework. So, follow along with me as I explain in detail what we\
    \ will be doing here. In `myStory_02`, I skip over some of these steps because\
    \ I assume we all did our homework and programmed `myStory_01` many times until\
    \ we could do it without this book or any accompanying notes.\n\n![images](images/00378.jpg)\n\
    \n**Figure 9–25.** `myPos.h` as it looks upon opening it.\n\n18. Click on the\
    \ `myPos.h` file located in your `myStory_01` folder inside the root folder. Upon\
    \ opening it, as shown in [Figure 9–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos693963),\
    \ we see the following:\n\n```\n#import <Foundation/Foundation.h>\n@interface\
    \ myPos : NSObject\n@end\n```\n\n- The first thing we do is add a MapKit framework\
    \ for our annotations by entering `#import <MapKit/MkAnnotation.h>` to the `@interface\
    \ myPos : NSObject` directive.\n- We also need to add `<MKAnnotation>`, which\
    \ is a protocol. I explain protocols in Digging the Code, but for now, it means\
    \ we'll have to write our own annotation object that implements this protocol.\
    \ Just remember that an object that adopts this protocol must implement a property\
    \ we call the coordinate property. Which, of course, we will do.\n- We also set\
    \ our `CLLocation` Class Reference to incorporate the geographical coordinates\
    \ and altitude of our device with a variable that we'll name `coordinate`, as\
    \ seen in [Figure 9–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos697070).\
    \ We do that with this line: `CLLocationCoordinate2D coordinate;`\n- Now, we need\
    \ two `NSString` variables to hold our titles and subtitles, which we will name\
    \ `*title` and `*subtitle` as follows:\n  ```\n  NSString *title;\n  NSString\
    \ *subtitle;\n  ```\n- Finally, we create `@property` statements for the coordinate,\
    \ title, and subtitle, as shown in the code that follows. Once we have made these\
    \ additions, we will save our work as shown in [Figure 9–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos697070).\n\
    \  ```\n  #import <Foundation/Foundation.h>\n  #import <MapKit/MkAnnotation.h>\n\
    \n  @interface myPos : NSObject <MKAnnotation>\n  {\n      CLLocationCoordinate2D\
    \ coordinate;\n      NSString *title;\n      NSString *subtitle;\n  }\n\n  @property\
    \ (nonatomic, assign) CLLocationCoordinate2D coordinate;\n  @property (nonatomic,\
    \ copy)  NSString *title;\n  @property (nonatomic, copy) NSString *subtitle;\n\
    \n  @end\n  ```\n\n![images](images/00379.jpg)\n\n**Figure 9–26.** The `MyPos.h`\
    \ incorporates the geographical coordinates and altitude of our device.\n\n![images](images/00380.jpg)\n\
    \n**Figure 9–27.** This is how our `myPos` implementation file looks when we open\
    \ it.\n\n19. We are now ready to code the `myPos` implementation file. We will\
    \ click on the `myPos.m` file located in our `myStory_01` folder inside the root\
    \ folder. [Figure 9–27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos697370)\
    \ shows how the `myPos.m` file looks when we open it. Here we simply synthesize\
    \ our coordinate, title, and subtitle with a `@synthesize` statement, which includes\
    \ `coordinate`, `title`, and `subtitle`. Once done, our file should look similar\
    \ to [Figure 9–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos698306).\
    \ We will save our work on this file.\n\n![images](images/00381.jpg)\n\n**Figure\
    \ 9–28.** This is how the `myPos` implementation file looks after the synthesis.\n\
    \n![images](images/00382.jpg)\n\n**Figure 9–29.** Open the view controller.\n\n\
    ### Coding the View Controller\n\nWe will start by declaring our classes, methods,\
    \ and outlets in our `ViewController.h` file and then implementing them in our\
    \ `ViewController.m` file. I have included some boilerplate code that we can drop\
    \ into the implementation file. However, I am going to go over each line separately,\
    \ so it will be better if you follow along without dropping in the boilerplate\
    \ code.\n\n20. We will start, as always, with the header file. We will open up\
    \ our header file by clicking on `ViewController.h` inside the root folder below\
    \ the `myPos.m` file or thereabout. When we first open it up, it will look similar\
    \ to [Figure 9–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos698594)\
    \ and as shown below.\n\n```\n#import <UIKit/UIKit.h>\n@interface ViewController\
    \ : UIViewController\n@end\n```\n\n- The first thing we need to do is tell our\
    \ app that we have imported the MapKit framework; we do this by `#import <MapKit/MapKit.h>`\
    \ under the line `#import <UIKit/UIKit.h>.` The next thing we will do is tell\
    \ the header file that we will be using the `MKMapViewDelegate` protocol. This\
    \ protocol defines a set of optional methods that our app will use to receive\
    \ map update records.\n- Next, we will add the `<MKMapViewDelegate>` protocol\
    \ for the controller class.\n- We are now able to add an outlet with a pointer\
    \ to the `MKMapView` class. We do this by typing in `MKMapView *mapView`, which\
    \ declares an object of type `MKMapView`.\n- The last thing we need to do is define\
    \ the `@property`, by entering: `@property (nonatomic, retain) IBOutlet MKMapView\
    \ *mapView`.\n\n> **NOTE**: Some people may say: “Whoah! You only declared the\
    \ `IBOutlet` outside the interface!” Well, actually, whether we stated `IBOutlet\
    \ MKMapView *mapView` inside the interface or “outside,” they really are both\
    \ still inside and there is no need to declare it twice. I prefer to use outlets\
    \ on `@properties` because it makes memory management of the objects loaded from\
    \ the storyboard clearer. I go deeper into this in Memory Management of Storyboard\
    \ Objects in Digging the Code.\n\n- Once done, save it. Our code should appear\
    \ as follows and as shown in [Figure 9–30](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos702575):\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n@interface ViewController\
    \ : UIViewController <MKMapViewDelegate>\n{\n    MKMapView *mapView;\n}\n\n@property\
    \ (nonatomic, retain) IBOutlet MKMapView *mapView;\n\n@end\n```\n\n![images](images/00383.jpg)\n\
    \n**Figure 9–30.** A completed `ViewController` header file."
