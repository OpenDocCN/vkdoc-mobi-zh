    ![images](img/00229.jpg)


    图 7-4\. 选择 "`MainStoryboard.storyboard`" 文件，您将看到唯一的默认视图。


    4. 现在，在 Xcode 左侧的项目文件浏览器中选择 "`MainStoryboard.storyboard`" 文件。这会显示一些您熟悉的内容，一个 `UIView`。但这不仅仅是一个
    `UIView`，它还有一个自动创建并链接到该视图的关联控制器。您可以稍后添加更多视图，但这里需要注意的一点是，双击网格图案可以放大和缩小。您必须处于正常查看模式才能向视图添加视觉元素。


    ![images](img/00230.jpg)


    图 7-5\. 单击此按钮可返回正常查看模式。两侧的两个按钮允许您放大和缩小。


    5. 熟悉查看和缩放模式非常重要，因为您会经常需要放大以编辑某个详细视图，然后立即缩小以查看整个故事板。单击中间的等号按钮可返回正常查看模式。两侧的两个按钮允许您放大和缩小。


    ![images](img/00231.jpg)


    图 7-6\. 您需要调出实用工具面板来向项目添加一些新视图。


    6. 通过单击图 7-6 中红色圆圈标示的按钮来调出实用工具面板。更大的屏幕会使使用 Xcode 更容易，因为越来越多的面板和视图占用了宝贵的屏幕空间。


    ![images](img/00232.jpg)


    图 7-7\. 选择导航控制器。


    7. 打开实用工具面板后，找到“导航控制器” (`UINavigationController`)。选中它，然后开始将导航控制器拖到您的分镜脚本上，如图 7-7
