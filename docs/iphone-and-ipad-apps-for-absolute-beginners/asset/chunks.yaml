    \ D 了。你会怎么做？（见图 8–21。）\n"
- fmt: '#### Comparing the Source Files


    Now, you are going to look at the online code to see where you went wrong by comparing
    your code with that of the online project.


    ![images](images/00335.jpg)


    Figure 8–22. Go to Dr. Lewis''s website with all the downloads.


    22. To download the source code, go to `bit.ly/oEQcu6`. In the video, I kept my
    browser minimized, so [Figure 8–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos630532)
    shows me maximizing my browser.


    ![images](images/00336.jpg)


    Figure 8–23. Download the source code here.


    23. As shown in [Figure 8–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos631100),
    after going to `bit.ly/oEQcu6`, click the Xcode icon to download the source code
    to your desktop. What you are thinking here is that if you compare your code to
    the source code, you can find and fix the bug. Simple enough with this file, but
    what if you were trying to find the problem in 30,000 lines of source code? You
    would not be able to just eyeball it to find the error. Let''s see how to get
    around that problem.


    ![images](images/00337.jpg)


    Figure 8–24. Unzip the source code.


    24. As shown in [Figure 8–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos631952),
    when the source code arrives, preferably to your desktop, unzip it and open the
    folder.


    ![images](images/00338.jpg)


    Figure 8–25. Open the folder so you can see the `SecondViewController.m` file.


    25. After you have unzipped the folder containing the source code, you just want
    to keep it there for now. Make sure you have your eye on the target, which is
    the `SecondViewController.m` file, as illustrated in [Figure 8–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos632453).


    ![images](images/00339.jpg)


    Figure 8–26. Open a new Finder window.


    26. As shown in [Figure 8–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos633127),
    you need to locate `FileMerge.app`. Press ![image](images/00031.jpg)N to open
    a new window, because you need to keep the other folder containing the source
    code open. That way, you will be able to drag that `SecondViewController.m` file
    into `FileMerge.app` when you locate it inside this window.


    ![images](images/00340.jpg)


    Figure 8–27. Go to the Developer tool.


    27. You need to go to the Developer tool to start navigating your way to `FileMerge.app`,
    so hit ![image](images/00031.jpg)![image](images/00032.jpg)G, enter “/Developer”
    in the pop up, and hit ![image](images/00086.jpg), as shown in [Figure 8–27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos633882).


    ![images](images/00341.jpg)


    Figure 8–28. Navigate to `FileMerge.app`.


    28. Once in the Developer folder, navigate to Applications ![image](images/00027.jpg)Utilities
    and open `FileMerge.app`, as shown in [Figure 8–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos634562).


    ![images](images/00342.jpg)


    Figure 8–29. `FileMerge.app` opened


    29. `FileMerge.app` does not have the spark and flare that one might have imagined.
    It seems benign, but it does the job. Essentially, you want to drag your `SecondViewController.m`
    file location into the Left panel, and then the correct source code into the Right
    panel. The opened `FileMerge.app` is seen in [Figure 8–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos635144).


    ![images](images/00343.jpg)


    Figure 8–30. Open your folder containing the `SecondViewController`.


    30. [Figure 8–30](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos635909)
    illustrates the opened folder containing your `SecondViewController` file. You
    need to drag your code into `FileMerge`, so open the folder containing your code.
    Select the `SecondViewController` file and drag it into `FileMerge.app`.


    ![images](images/00344.jpg)


    Figure 8–31. Dragging your `SecondViewController.m` into the Left panel of `FileMerge.app`


    31. [Figure 8–31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos636618)
    shows the `SecondViewController.m` being dragged into the Left panel of `FileMerge.app`.
    Do it.


    ![images](images/00345.jpg)


    Figure 8–32. `SecondViewController.m` properly located in the Left panel


    32. As shown in [Figure 8–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos637213),
    when you drag `SecondViewController.m` into the Left panel, it pulls out the address.
    Now, you need to pull the correct source code into the Right panel.


    ![images](images/00346.jpg)


    Figure 8–33. Start dragging the correct source code into `FileMerge.app`.


    33. Now, drag the correct source code from the unzipped folder that I made you
    keep open into `FileMerge.app`. This is shown in [Figure 8–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos637839).


    ![images](images/00347.jpg)


    Figure 8–34. Compare.


    34. [Figure 8–34](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos638424)
    shows both files correctly located in `FileMerge.app`. Click Compare or hit ![image](images/00086.jpg)
    to get it working.


    ![images](images/00348.jpg)


    Figure 8–35. `FileMerge.app` doing its thing.


    35. As you can see in [Figure 8–35](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos638959),
    once `FileMerge` opens there are some lines of text that clearly will be different,
    such as your name and my name, your date and my date, and so on. However, down
    in the `viewDidLoad` method, you can see where you made the mistake. It should
    be `UIViewContentModeBottom` instead of `UIViewContentModeScaleAspectFit`. So,
    let''s change it!


    ![images](images/00349.jpg)


    Figure 8–36. All is well!


    36. Once you have gone back into Xcode and correctly changed `UIViewContentModeScaleAspectFit`
    to `UIViewContentModeBottom`, your app will run perfectly, as shown in [Figure
    8–36](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos639781).


    ### Digging the Code


    The most-used tool in Xcode, by far, is setting breakpoints in the Xcode editor.
    Running your application and then seeing the state of your code at each breakpoint
    can illustrate if a variable is being recognized, what it''s returning, and so
    forth. Breakpoints are very powerful. To add a breakpoint at a line, double-click
    in the gutter of your code (located to the left of that line), hold it, and click
    the “+” button. Check the Continue checkbox if you don''t want the debugger to
    actually stop code execution at that breakpoint. Teaching breakpoints is described
    in many more advanced Apress Xcode books, such as `Pro iOS 5 Tools`, shown in
    [Figure 8–37](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos641288).


    ![images](images/00350.jpg)


    Figure 8–37. `Pro iOS 5 Tools`


    `Pro iOS 5 Tools` goes in depth into the subjects of the following review, such
    as the Debugger Console, LLVM, and Organize. For now though, here is a brief overview
    that glosses over more advanced tools that are not in the domain of this Absolute
    Beginner book.


    #### Debugger Console


    The next most important and widely used coder''s tool is the Debugger Console
    window. It is an efficient way for coders to communicate with the GDB. You can
    go to the console window in Xcode from the Run menu by pressing ![image](images/00031.jpg)![image](images/00032.jpg)
    R. You can also choose Edit Active Scheme from the Scheme pop-up to select either
    the LLVM compiler or the GDB under Run item in the left column. I prefer the LLVM
    compiler, because that''s where all the new Fix-it red flags do their job (see
    the next section). For most of the code in this book, the LLVM will be adequate.
    Nonetheless, if you still would like to use GDB, then go to the Info pane and
    choose the debugger you want to use from the Debugger pop-up menu. To view output
    and type commands for GDB, first make sure that your output window is open, and
    then make sure the middle bottom of the View group is enabled.'
