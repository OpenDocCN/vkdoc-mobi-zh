  trans: "\n快完成了。我们只需要取消选中最后一个选中的表格单元格，这样当我们的视图重新出现时，它就不会仍然处于选中状态。我们在请求启动外部应用程序之后执行此操作，因为该对象*不会*被通知视图即将离开，或者在从后台恢复时，如果没有添加额外的管道代码，它也无法获知应用程序是否正在从后台重新启动。\n\
    \n```\n-(void)DeselectRow\n{\n    // 如果存在，则取消选中选中的行\n    NSIndexPath* selection\
    \ = [self.tableViewindexPathForSelectedRow];\n    if (selection) {\n        [self.tableViewdeselectRowAtIndexPath:selectionanimated:YES];\n\
    \    }\n    [self.tableViewreloadData];\n}\n```\n\n最后一部分——Safari 中的三个艺术家页面（`case\
    \ 0`）以及 `6` 和 `7` 的情况。\n\n```\n-(void)LocateArtistPageInSafari\n{\n    NSURL *urlInSafari\
    \ = [NSURL URLWithString:@\"http://bit.ly/poi91o\"];\n    // 如果是 iPad...\n   \
    \ if ([[UIDevicecurrentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPad)\
    \ {\n        // 则在详细视图（UIWebView）中打开页面\n        NSURLRequest *urlRequest = [NSURLRequestrequestWithURL:urlInSafari];\n\
    \        [self.detailViewController.webViewloadRequest:urlRequest];\n    } else\
    \ {\n        // 否则是 iPhone/iPod Touch，则在外部 Safari 中打开\n        [selfStartExternalAppWithURL:urlInSafari];\n\
    \    }\n}\n```\n\n```\n-(void)LocateArtist2PageInSafari\n{\n    NSURL *urlInSafari\
    \ = [NSURL URLWithString:@\"http://on.fb.me/nFwQj6\"];\n    // 如果是 iPad...\n \
    \   if ([[UIDevicecurrentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPad)\
    \ {\n        // 则在详细视图（UIWebView）中打开页面\n        NSURLRequest *urlRequest = [NSURLRequestrequestWithURL:urlInSafari];\n\
    \        [self.detailViewController.webViewloadRequest:urlRequest];\n    } else\
    \ {\n        // 否则是 iPhone/iPod Touch，则在外部 Safari 中打开\n        [selfStartExternalAppWithURL:urlInSafari];\n\
    \    }\n}\n```\n\n```\n-(void)LocateArtist3PageInSafari\n{\n    NSURL *urlInSafari\
    \ = [NSURL URLWithString:@\"http://bit.ly/nxY8AZ\"];\n    // 如果是 iPad...\n   \
    \ if ([[UIDevicecurrentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPad)\
    \ {\n        // 则在详细视图（UIWebView）中打开页面\n        NSURLRequest *urlRequest = [NSURLRequestrequestWithURL:urlInSafari];\n\
    \        [self.detailViewController.webViewloadRequest:urlRequest];\n    } else\
    \ {\n        // 否则是 iPhone/iPod Touch，则在外部 Safari 中打开\n        [selfStartExternalAppWithURL:urlInSafari];\n\
    \    }\n}\n```\n\n```\n@end\n```\n\n#### 编码 DetailViewController\n\n那可真是一番折腾，不是吗！？顺便说个能让你会心一笑的事。当我刚开始为我的课程钻研情节串联图板时，我们用的是测试版，它每周都在变。我不仅从没见过情节串联图板，而且代码还在不断变化，我还得在阶梯教室当众讲授它。我度过了许多不眠之夜。但重点是，如果你掌握了这个应用和情节串联图板，你在编程方面就离巨大的成功不远了。你无需了解以上所有内容，你只需知道何时该用它们。在我们的\
    \ `DetailViewController` 中，我们需要设置 `UIWebview`，但首先，让我们从宏观上了解一下。\n\n### 总体蓝图\n\n\
    > 1.  在情节串联图板中设置弹出框\n> 2.  编写与多媒体平台交互的代码\n>     2.1. MasterView 控制器\n>     2.2.\
    \ DetailView 控制器\n>     > 2.2.1. 将视图连接到 WebViews\n> 3.  调整弹出框以正确获取平台\n\n![images](img/00484.jpg)\n\
    \n**图 11–20.** 选择并打开 DetailViewController 头文件。\n\n20. 保存你的 `MasterViewController`，然后打开\
    \ `DetailViewController.h` 文件，如图 11–20 所示。接着添加如下所示的代码。注意，当我们返回调整情节串联图板时，会将其连接到我们的\
    \ `UIWebView` 上。\n\n```\n#import<UIKit/UIKit.h>\n@interfaceDetailViewController\
    \ : UIViewController<UISplitViewControllerDelegate>\n@property (strong, nonatomic)\
    \ id detailItem;\n@property (strong, nonatomic) IBOutletUILabel *detailDescriptionLabel;\n\
    @property (strong, nonatomic) IBOutletUIWebView *webView;\n@end\n```\n\n![images](img/00485.jpg)\n\
    \n**图 11–21.** 在实现文件中合成 webView。\n\n21. 现在打开你的 `DetailViewController.m` 文件，并合成\
    \ `webView`，如图 11–21 以及此处所示：\n\n```\n#import \"DetailViewController.h\"\n@interfaceDetailViewController\
    \ ()\n@property (strong, nonatomic) UIPopoverController *masterPopoverController;\n\
    - (void)configureView;\n@end\n\n@implementationDetailViewController\n@synthesizedetailItem\
    \ = _detailItem;\n@synthesizedetailDescriptionLabel = _detailDescriptionLabel;\n\
    @synthesizemasterPopoverController = _masterPopoverController;\n@synthesizewebView\
    \ = _webView;\n#pragma mark - 管理详细项\n```\n\n![images](img/00486.jpg)\n\n**图 11–22.**\
    \ 选择样板代码 4。\n\n22. 现在，我们需要重写 `shouldAutorotateToInterfaceOrientation` 方法，以处理之前提到的纵向和横向问题。继续删除\
    \ `shouldAutorotateToInterfaceOrientation` 方法，然后手写这几行代码，或者将样板代码 4 的内容粘贴到其位置。\n\
    \n```\n////////////// 开始 样板代码 4 ////////////////////\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // 返回 YES 表示支持的方向\n    if ([[UIDevicecurrentDevice] userInterfaceIdiom]\
    \ == UIUserInterfaceIdiomPhone) {\n        return (interfaceOrientation != UIInterfaceOrientationPortraitUpsideDown);\n\
    \    } else {\n        return YES;\n    }\n}\n////////////// 结束 样板代码 4 ////////////////////\n\
    ```\n\n![images](img/00487.jpg)\n\n**图 11–23.** 返回情节串联图板，选择表格视图单元格 – 单元格，然后将一个网页视图拖到详细视图上。\n\
    \n23. 保存所有内容，返回情节串联图板，关闭导航器，打开实用工具面板，并在实用工具面板中打开库。我们的表格视图单元格将显示网页视图，因此这里需要放置一个网页视图。返回情节串联图板，选择表格视图单元格\
    \ – 单元格，然后将一个网页视图拖到详细视图上，如图 11–23 所示。\n"
- fmt: '#### Finalizing the Storyboard


    We are almost done. The only thing we need to still do is connect something that
    was not there when we began – the `webView` – `UIWebView` connection in the code.
    Now that it''s there, we need to go back into storyboard and connect them.


    ![images](images/00488.jpg)


    Figure 11–24. Select myMasterTableViewController.


    24. Now go back to the Documents Outline and, inside the Detail View Controller
    - Detail Scene, grab the Web View and drag it up over the Navigation Item - Detail
    above the View into your Detail View Controller -Detail. Now your View disappears
    just as we did in `myStory_02`. Keeping the Detail View Controller - Detail selected
    as shown in the upper left-hand side in Figure 11–24, go back over to your Connection
    Inspector and control-drag from the `webView` to the `UIWebView` as shown in Figure
    11–24. Save it.


    NOTE: Now connect your iPad to your Mac and, rather than selecting iPad simulator,
    select iOS Device. You can run it on the simulator if you like but iTunes cannot
    run inside the simulator so all the iTunes links will not work. Once you have
    connected your iPad to your Mac, press run.


    ![images](images/00489.jpg)


    Figure 11–25. From the icon through to the Popover


    25. Once your app has completed building, which may take up to 17 seconds, you
    will see the icon appear as shown in Figure 11–25. Once you press the icon, you
    will immediately see the popover screen. The first time you select it, it will
    not show anything underneath. However, once you select a page and then select
    the popover again, it keeps the underlying image below the popover as shown in
    Figure 11–26.


    ![images](images/00490.jpg)


    Figure 11–26. A beautiful Splash screen presents itself while the screen loads.


    26. Once we select a cell, the splash screen appears while the page loads from
    the Internet or from iTunes. Here, in the right hand image, we see the popover
    placed on top of the first image.


    ![images](images/00491.jpg)


    Figure 11–27. Orientation working with iTunes


    27. We need to have a little patience with orientation correcting itself with
    iTunes. This is something Apple needs to work on. Just be patient. Figure 11–27
    shows the 2nd selection on the left hand side and the first iTunes selection on
    the right hand side.


    ### In Ending


    This has been a wonderful journey, but it''s really only the start. As I''ve gone
    through this second edition, I cannot help but think of all the fresh minds that
    will read these exercises and struggle through them, then break through to create
    awesome apps and make money! How many more of my students and readers of this
    book will work at Apple!? Wow! It''s been a great motivation for me to think about
    this.


    On a sad note, as I was finishing this book, Steve Jobs passed away. God bless
    you, Steve.


    I hope to see you all on the forum. I do not answer questions submitted to me
    by email but I will answer those exact same questions if you post them on the
    forum (`http://bit.ly/oLVwpY`) because then everybody can share my answers. I
    would also like to encourage you to help. No matter how much of a beginner you
    are, get into the forum and help others. Helping others speeds up your journey.


    Peace.


    Dr. Lewis


    ## Index


    ### Special Characters and Numerics


    - `-` (minus sign), 95

    - `#` (pound sign) symbol, 149

    - `#define`, 149

    - `%@` symbol, 86–88, 98–99

    - `*` symbol, 133

    - `*label pointer`, 137

    - `*uiImageView`, 117, 137

    - `{ }` (curly braces), 74–78, 85–86

    - `+` (plus sign) symbol, 95

    - 7 Wonders of the World app, 370

    - 360 Cities app, 371'
