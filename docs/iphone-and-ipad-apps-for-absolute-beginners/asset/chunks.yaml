  trans: '

    ### 运行代码


    让我解释一下。代码能成功运行的可能性很小，但这没关系！你的代码一开始运行失败是完全正常的。指望代码第一次就能完美运行，就像几年前我母亲告诉我的一件事。她在下午五点从城市另一头打来电话说：“亲爱的，我刚出发；我知道现在是五点，但我应该很快就到，因为我希望今天路上不会太堵！”我简直不敢相信她的话。我回答说：“妈，与其指望
    20 分钟能到，希望路上不堵，最后却大失所望，不如做好花一个小时的准备，听听我给你买的那张 Deva Premal 冥想 CD，放松享受一下？”


    同样地，也要预料到会有错误。调试代码是计算机科学家工作中非常重要的一部分，指望不出任何错误只会让你失望。如果真没有错误，那你可就太幸运了！


    ![图片](img/00189.jpg)


    **图 5–38.** 启动画面


    38\. 运行后，你可以做四件事：按下三个按钮之一，或者在屏幕上移动图标。这个初始视图如图 5–38 所示。


    ![图片](img/00190.jpg)


    **图 5–39.** 其他视图


    39\. 图 5–39 显示了三张图片。第一个背景显示的是按下“缩小”按钮后的状态，之后它变成了“放大”。在第三张图片中，我们看到背景开始翻转到下一个背景。


    ![图片](img/00191.jpg)


    **图 5–40.** 切换背景的视图


    40\. 图 5–40 展示了页面翻转到第四个背景，以及“lulu fruit”图标通过`touches`函数移动的效果。


    ### 深入代码


    通常，我会花时间深入分析我们之前快速浏览过的代码。然而，这一章的跨度很大，我觉得不能让你在自己输入代码时，还要回头翻看这一节才能理解发生了什么。至于更深层次地探究代码，其实也没什么可深挖的了——我们已经做得相当透彻了。在下一章中，我们将学习切换视图；我们会“快速”运行代码，然后再回到“深入代码”一节，看看我们实际做了什么。现在让我们结束这一章，让你的大脑休息一下。


    ### 下一章内容


    在第 6 章中，我们将进入下一层级的复杂性：切换视图应用程序。我们将研究代码中的角色或角色团队如何协同工作，来引导一个结果或一系列结果，从而给用户带来流畅无缝的体验。


    你将学习委托者和切换视图控制器、类和子类，以及“懒加载”。我们将深入探讨`.xib`文件的细节，研究内存释放的概念，并学习嵌入式代码注释。一切变得越来越奇妙……


    继续下一章！


    ## 第 6 章


    ## 开关


    在完成第 5 章的`touches`应用后，你可以说已经能够毫不畏缩地编写 Objective-C 应用了！如果你在编写第 5 章的代码时，感觉像是在艰难地跋涉一条崎岖不平的道路，那你并不孤单。我这么说，是因为所有程序员都经历过这条必经之路。如果你回顾那一章，心里想着自己已经不记得做过什么，这完全正常。是的，这很正常，我即将向你证明这一点。首先，我需要解释为什么你现在需要暂停一下。


    根据我的经验，在教授 C、C++、C#、汇编语言、机器语言、Java 等语言时，许多学生即使看起来表现不错，也会中途放弃。近年来，我开始在学生接近这个转折点时抓住他们，问他们为什么考虑放弃。他们都会告诉我类似的话：“我知道我完成了作业，但我害怕会失败，因为知识就是没真正印在脑子里。我没有掌握它。”大约四年前，我做了一个实验。当学生们走进讲堂时，我让他们合上教科书、关上笔记本电脑、收起书本，他们都震惊了，因为我们要进行一次大脑内部之旅，上一堂神经学课。实际上，我们是要用科学方式说明，为什么很多人会觉得自己笨、学不会，感觉自己像个傻瓜！整个讲堂顿时笑声一片。在我现在称之为“别慌！让我们看看你的大脑！”的讲座结束时，一些学生哭了，课后他们找到我表示感谢。没有一个学生再中途退出。


    现在我敢打赌，你觉得自己从第 5 章中什么都没记住，并且对自己的极客能力感到有点不知所措和不自信。嗯，这没关系——读下去，你就会明白为什么自己会感到有点不安。即使你现在感觉很自信，但随着难度增加，你在后面的某个阶段可能还是会感到犹豫，但我仍然希望你继续读下去。这很重要，所以我希望你能真正理解这一点。

    '
- fmt: '### Don’t Freak Out: Let''s Look at Your Brain!


    One of the best ways to explain this is to ask you something that has nothing
    to do with Objective-C and computer science. It''s about childhood memories.


    Do you ever smell something you''ve not smelt before and without any warning your
    brain immediately takes you back to a place in your early childhood? Yes, this
    happens to all of us. After smelling this smell, you will suddenly see everything
    clearly in your head: the walls, the people—it''s all crystal clear and sometimes
    it may overwhelm you emotionally. You may feel blown away that you''ve not thought
    about those walls or images for many years, and now suddenly they''re overwhelming
    your senses. Let me explain why this happens. I will use my smell of old-fashioned
    soap to illustrate this, and then show how this is related to the neural connectors
    you''ve just created.


    Look at [Figure 6–a](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos456555).
    Under the first title, “ILLUSTRATION,” you will see a very simplified illustration
    of how, once your brain receives a new input that it''s never experienced before,
    it creates a nucleus housed inside a cell body that retains that event. This is
    connected to the rest of your brain by threads and axons. As you experience new
    events that relate to this new event, a tree of synapses and neurons connect to
    this nucleus. Some of these connections become quite full of what we call dendrites.


    When I was a little boy in Durban, South Africa, I went down to where the servants
    were washing laundry. Back in 1963, most families used old-fashioned ammonia-filled
    soap that had a very distinct smell. This smell created a new nucleus in my baby
    brain. It connected with the joyful songs the Zulu servants were singing as they
    hand-washed the laundry. My brain also connected the imagery of the walls, the
    paint, and my dog Samson. These connectors of the singing, the walls, the paint
    and the dog formed four groups of connections to that new smell, as illustrated
    under “SYNTHESIZED” in [Figure 6–a](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos456555).
    Some groups immediately had more connections, such as songs, because I used to
    sing many Zulu songs as a small boy. The next biggest group was probably that
    of my dog. I''ve labeled the groups from 1 to 4 in order of size.


    Many years later, in New York City, probably around 1993, I was rushing to keep
    an appointment with a law professor who had said he would meet me for lunch at
    a little restaurant. As I was running across 8^(th) Avenue, I noticed some people
    cleaning the sidewalk in front of another restaurant. They were using soap and
    water and scrubbing it with these large straw brushes. Suddenly I smelt it. The
    smell I hadn''t smelt since the time I was a three-year-old boy in that laundry
    room. I suddenly saw those servants, I could hear their songs and laughter, and
    I could see my old dog Samson. I became overwhelmed with that day, the people,
    the energy from so long ago, and I was so overwhelmed with emotion I stopped running
    and started crying. When I reached the restaurant, the law professor stood resplendent
    in his tweed suit and said: “Rory, it''s OK that you''re a couple of minutes late.
    Oh my gosh, are you crying?”


    > ![images](images/00192.jpg)


    *Figure 6–a. Don''t freak out: Let''s have a look at your brain.*


    So what happened? What happens when you experience similar events? Why does this
    often happen with smell? Let''s first look at events in life, such as the first
    time you realized that `1 + 1 = 2`. Do you remember the first time you realized
    `1 + 1 = 2`? Probably not. This is because after you created a nucleus associating
    `1 + 1 = 2` there were trillions of connectors going to `1 + 1 = 2`. Every time
    you perform any function that related to `1 + 1 = 2` your brain makes a connection
    to the nucleus housing `1 + 1 = 2`. Even as you flip through this book and it
    goes from `page[n]` to `page[n+1]`, you make synaptic connectors to dendrites
    and groups of associations connected to `1 + 1`. Somewhere in those trillions
    of `1 + 1 = 2` connectors are the visuals and sound effects of the room where
    you realized this, but it is lost in the maze of trillions of other connectors.


    That rare smell though, that''s different. Think about it. I have illustrated
    four groups associated with that smell from when I was three. Over the next 30
    years, following the creation of that nucleus and the four groups linking it,
    there was never a connection made. It just lay there. However, as I crossed 8^(th)
    Avenue and smelt that smell, it immediately invoked that same nucleus AND the
    contents of the four groups connected to that event. These connectors were STRONG
    because they were not interconnected with other complex relationships. This made
    the singing, the feeling I had towards my dog, the laughter, and the other events
    come hurtling into me.


    Now go back to when you read [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378)
    for a moment. Look at the “YOU RIGHT NOW” illustration in [Figure 6–a](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos456555).
    You created a set of nuclei when you made your way through [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378).
    Let''s imagine, for purposes of illustration, that it was only one event or one
    thing you learned while reading [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378).
    The nucleus containing that knowledge is housed in the light grey circle. You
    may, at the most, have created one semblance of connectivity to some related thought
    or concept. That is why I connected one small group to the [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378)
    knowledge nucleus. More importantly, notice that I have created five other groups
    of potential connectors to the [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378):
    they are “rest of the book,” “problem solving,” “teaching to others,” “real life
    application,” and “making $$.” Right now it''s absolutely natural that these groups
    have no connectivity to the nucleus of [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378)''s
    knowledge because you have not had time to create these connections. For example,
    right now, as you read this chapter, you probably “feel” like you have no connection
    to the knowledge you gained in [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378).
    This is because there is no connection to it as you read this. There is also zero
    connectivity to making $$ from what you learned in [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378),
    nor to the other groups.'
