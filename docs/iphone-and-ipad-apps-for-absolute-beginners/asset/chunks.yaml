  trans: "\n# 新的主从模板\n\n> ![images](img/00464.jpg)\n\n图 11–1：选择主从应用程序图标，然后按回车或下一步。\n\
    \n1. 我们将使用主从应用程序。因此，打开 Xcode 并输入 ![images](img/00031.jpg)![images](img/00032.jpg)`N`，如图\
    \ 11–1 所示。选择主从应用程序后，按回车键。\n\n![images](img/00465.jpg)\n\n图 11–2：将你的应用命名为 `myiTunes`，确保启用了\
    \ Storyboard 和自动引用计数。\n\n2. 为了尽可能紧跟我的步骤，请将应用命名为“myiTunes”，选择“iPad”，勾选“使用 Storyboard”和“使用自动引用计数”，但保持“类前缀”和“包含单元测试”不勾选，如图\
    \ 11–2 所示。\n\n# 导入图片！\n\n![images](img/00466.jpg)\n\n图 11–3：拖入你的图形资源。\n\n3. 正如我们在\
    \ `myStory_01` 中所做的那样，先访问我的网站 [`http://bit.ly/uN1uV1`](http://bit.ly/uN1uV1) 并将图片和样板代码下载到桌面，然后将\
    \ 72 × 72 px 的 iPad 图标（iPad 72）拖入 App Icon 框，将 769 × 1004 px 的 Default-Portrait\
    \ iPad 启动画面拖入 Launch Images Landscape 框，并将 1024 × 748 px 的 Default-Landscape iPad\
    \ 启动画面拖入 Launch Images Portrait 框，如图 11–3 所示。\n\n![images](img/00467.jpg)\n\n\
    图 11–4：将图片拖入 Supporting Files 文件夹。\n\n4. 因为我们总是希望保持内容整洁、有序且放在正确的位置，所以你会注意到，刚才拖入\
    \ Xcode 的图片文件位于根目录中。我们需要将它们拖入正确的位置：Supporting Files 文件夹。如图 11–4 所示。\n\n# 在 Storyboard\
    \ 中组织弹出窗口\n\n我们要做的第一件事是在 storyboard 中设置弹出窗口。我会尽量发挥创意和艺术性，但不会过度添加花哨的弹出窗口装饰，因为我不想偏离我的两个目标：教你设置\
    \ storyboard 以及教你编写 storyboard 背后的代码。不过，一旦你完成这个项目，你就打开了通往所有房间的大门，日后可以在其中自行尝试。但现在，我们先保持简洁。\n\
    \n![images](img/00468.jpg)\n\n图 11–5：选择 Storyboard 并关闭导航器。\n\n5. 选择 `MainStoryboard.storyboard`\
    \ 并关闭导航器，如图 11–5 所示。\n\n![images](img/00469.jpg)\n\n图 11–6：此处我们不需要视图控制器。\n\n6.\
    \ 在深入之前，我希望你看看图 11–14，并观察左侧边栏中“文档大纲”（位于“主视图控制器 - 主场景”框内）里所有的表格视图及其层级。比较一下它和我们主视图控制器\
    \ - 主场景中孤立的表格视图的内容丰富程度。这可是一大堆工作。\n\n有两种方法可以用你想要的内容填充这些表格视图：一种是“冗长乏味”的方式，另一种是“有序且高效”的方式。我们提前规划，遵循一个简单的规则：\n\
    \n先创建一个包含所有子属性的表格视图。然后，一旦你按照自己的需求精确完成了这一个，就复制整个集合。\n\n我们选择默认的视图控制器是因为我们需要删除它。从整体来看，我们将创建一个完全符合我们需求的组，如“整体视图”中的\
    \ 1.1 所示。\n\n所以，请打开文档大纲，并在我的“主视图控制器 - 主场景”中选择表格视图，如图 11–6 所示。\n\n## 整体视图\n\n>\
    \ 1. 在 storyboard 中设置弹出窗口\n>    \n>    1.1. 创建一个组\n>    \n>    > 1.1.1. 设置组中每个表格视图单元格的属性\n\
    >    \n>    1.2. 根据需要复制该组\n>    \n>    1.3. 标记所有单元格\n> \n> 2. 编写代码以对接多媒体平台\n>\
    \ 3. 调整弹出窗口以正确抓取平台\n\n![images](img/00470.jpg)\n\n图 11–7：创建一组分组样式的静态单元格。\n\n7.\
    \ 打开“工具”面板中的“属性检查器”，然后向下滚动，确保从“内容”下拉菜单中选择“静态单元格”。接着选择“分组”样式，以便为标题留出间隔空间，如图 11–7\
    \ 所示。\n\n![images](img/00471.jpg)\n\n图 11–8：选择表格视图单元格 - 单元格\n\n8. 这一步看似简单但容易出错，因此请注意这个非常简单的步骤：返回文档大纲，在你的“主视图控制器\
    \ – 主场景”中，从刚才操作的表格视图向下深入两个层级。如图 11–8 所示，你现在应该位于“表格视图单元格—单元格”。如果你选错了层级，等你发现时可能已经迷失方向了。\n\
    \n![images](img/00472.jpg)\n\n图 11–9：为每个表格视图单元格创建副标题。\n\n9. 我们希望在每个表格视图单元格中创建副标题，因为它们能告诉我们——更重要的是告诉用户——如果选择这个选项，将会看到什么或跳转到何处。因此，返回工具面板中的属性检查器，然后向下滚动并从“样式”中选择“副标题”，如图\
    \ 11–9 所示。\n"
- fmt: "# 排版后的内容\n\n**注意：** 当我们首次来到这里设置单元格时，请注意，当你再次回到这里时，可以使用许多有趣且精彩的小技巧。我提到过，我们将打开通往各种设施齐全的房间的“门”。这就是其中之一！在我们探索这些不同房间的过程中，请继续四处看看。\n\
    \n![images](images/00473.jpg)\n\n**图 11–10.** 为每个表格视图单元格创建披露指示器 – 单元格。\n\n10.\
    \ 观察[图 11–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos899662)，我们现在可以看到，在我们单元格的“详细信息”下方，有一个“副标题”。这正是我们想要的。现在，既然我们在这里，为什么不也添加“>”披露指示器，让用户在选中某个特定单元格时，能感知他们将要前往的方向呢？是的，这是个好主意！前往你刚才所在的“样式”部分下方的“附件”部分，并选择“披露指示器”，如[图\
    \ 11–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos899662) 所示。\n\n\
    ![images](images/00474.jpg)\n\n**图 11–11.** 向上返回一级到“表格视图分区”。\n\n11. 啊……看看我们刚刚在[图\
    \ 11–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos900574) 中创建的漂亮的“披露”和“副标题”。真漂亮！在我们过于沉浸之前，请查看“大图”，看看我们即将开始设置“表格视图分区”（1.1.2）。返回到“文档大纲”并选择“表格视图分区”，如[图\
    \ 11–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos900574) 所示。\n\n\
    **大图**\n\n> 1. 在故事板中设置弹出视图\n>     \n>     1.1. 创建一个组\n>     \n>      \n>     \n\
    >     > 1.1.1. 设置组中每个表格视图单元格的属性 – 单元格\n>     \n>      \n>     \n>     > 1.1.1.1.\
    \ 静态单元格、分组样式、副标题和披露指示器\n>     \n>      \n>     \n>     > 1.1.2. 设置表格视图分区\n>  \
    \   \n>      \n>     \n>     > 1.1.2.2. 创建一个标题并创建2行\n>     \n>      \n>     \n\
    >     1.2. 根据需要复制该组\n>     \n>      \n>     \n>     > 1.2.1. 前往主场景并创建4个分区\n> \
    \    \n>      \n>     \n>     1.3. 标记所有单元格\n>     \n>      \n> 2. 编写与多媒体平台交互的代码\n\
    > 3. 调整弹出视图以正确抓取平台\n\n![images](images/00475.jpg)\n\n**图 11–12.** 将第一个组命名为“艺术家”并创建两行。\n\
    \n12. 请记住，我们还没有标记任何表格视图单元格——即单元格。我仅在“大图”的第1.3步中这样做，这也是最后一步，原因有二。首先，这很耗时；其次，我们将会更改它们。然而，在这种情况下，我们需要前往“属性检查器”中的“标题”区域，并简单地给它一个“虚拟”标签，这样当我们在复制这些单元格时，就总有一些东西可供编辑。所以，继续用我们第一个组的名称（即“艺术家”）来标记这个组。然后，创建2行，如[图\
    \ 11–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos903344) 所示，因为每个组中只有两行单元格。你可能想要更多行。你应该始终倾向于创建更多的单元格，因为你可以非常轻松地删除它们；但如果需要重新创建单元格，你往往需要花费时间进行格式化。\n\
    \n![images](images/00476.jpg)\n\n**图 11–13.** 现在我们才创建所有分区。\n\n13. 我们已经按照需求创建好了一个组。所以现在返回我们开始的原始表格视图，并创建4个分区，如[图\
    \ 11–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos904585) 所示。\n\n\
    ![images](images/00477.jpg)\n\n**图 11–14.** 命名单元格和标题。\n\n14. 当然，当你创建自己的项目时，做法会有所不同，但现在让我们命名我们的四个组：`Artists`、`Albums\
    \ on iTunes`、`Songs` 和 `Pictures`。这4个组将有助于我们“乐队”（稍后编写代码时，我会提供披头士乐队的链接）在互联网和 iTunes\
    \ 上的呈现，旗下包含 `Artists`，然后是 `Albums`。对于披头士来说，会有很多专辑。在我们的示例中，我们只使用2张，对于 `Songs` 和\
    \ `Pictures` 也是如此。请注意，在副标题中，有些告诉用户他们将前往 iTunes，有些则告诉用户他们将前往互联网。按照[图 11–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos905150)\
    \ 所示命名所有单元格。请记住，你可以直接双击单元格来创建名称。"
  raw: "NOTE: As we travel here for the first time while we set up the cells, note\
    \ that there are many fun and awesome tricks you can use when you travel back\
    \ here again. I mentioned that we will be opening “doors” that lead into rooms\
    \ with lots of bells and whistles. This is one of them! Keep looking around as\
    \ we travel to these different rooms.\n\n![images](images/00473.jpg)\n\nFigure\
    \ 11–10\\. Create disclosure indicators for each Table View Cell – Cell.\n\n10\\\
    . Looking at [Figure 11–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos899662),\
    \ we can now see that, under Detail in our cell, there is a Subtitle. This is\
    \ exactly what we want. Now, while we're here, why don't we also add disclosure\
    \ indicators “>” that give the user a sense of the direction that they will be\
    \ travelling in when they select a particular cell? Yup, that's a great idea!\
    \ Go to the Accessory section just under the Style section you were in and select\
    \ Disclosure Indicator as shown in[Figure 11–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos899662)\n\
    \n![images](images/00474.jpg)\n\nFigure 11–11\\. Go back up one level to the Table\
    \ View Section.\n\n11\\. Ahh… look at that beautiful Disclosure and subtitle we've\
    \ just created in [Figure11–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos900574).\
    \ Beautiful! Before we get too lost, look at The Big Picture and see that we are\
    \ about to embark on setting up the Table View Section (1.1.2.). Go back to the\
    \ Documents Outline and select the Table View Section as shown in [Figure 11–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos900574).\n\
    \nTHE BIG PICTURE\n\n> 1.  Set up the popover in the storyboard\n>     \n>   \
    \  1.1\\. Create a Group\n>     \n>      \n>     \n>     > 1.1.1\\. Set up the\
    \ attributes of each Table View Cell – Cell in the group\n>     \n>      \n> \
    \    \n>     > 1.1.1.1\\. Static Cells, Grouped Style, subtitles, and disclosure\
    \ indicators\n>     \n>      \n>     \n>     > 1.1.2\\. Set up the Table View\
    \ Section\n>     \n>      \n>     \n>     > 1.1.2.2\\. Create a header and create\
    \ 2 rows\n>     \n>      \n>     \n>     1.2\\. Duplicate the Group as required\n\
    >     \n>      \n>     \n>     > 1.2.1\\. Go to the Master scene and make 4 sections\n\
    >     \n>      \n>     \n>     1.3\\. Label all the cells\n>     \n>      \n>\
    \ 2.  Code the interaction to the multimedia platforms\n> 3.  Tweak the popover\
    \ to grab the platforms correctly\n\n![images](images/00475.jpg)\n\nFigure 11–12\\\
    . Name the first group “Artist” and create two rows.\n\n12\\. Keep in mind that\
    \ we have yet to label any of our Table View Cell—Cells yet. I only do this in\
    \ step 1.3 in The Big Picture, which is the last step for two reasons. First,\
    \ it takes time and, second, we will change them. However, in this instance, we\
    \ need to go to the Header in the Attributes inspector and simply give it a “dummy”\
    \ label that will give us something, anything, to edit when we duplicate these\
    \ cells. So, go ahead and label this group with the name of our first group, which\
    \ will be Artists. Then, create 2 rows as shown in [Figure 11–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos903344)\
    \ because we will only have two rows of cells in each group. You may want more.\
    \ You will always want to err on the side of creating more cells because then\
    \ you can delete them very easily, but if you have to recreate cells, you often\
    \ will have to spend time formatting them.\n\n![images](images/00476.jpg)\n\n\
    Figure 11–13\\. Only now do we create all of our sections.\n\n13\\. We have now\
    \ created one group exactly as we want it. So now go back to the original Table\
    \ View where we began and make 4 sections as shown in [Figure 11–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos904585).\n\
    \n![images](images/00477.jpg)\n\nFigure 11–14\\. Name the cells and headers.\n\
    \n14\\. Of course you will do things differently when you create your own but\
    \ for now let's name our four groups: Artists, Albums on iTunes, Songs, and Pictures.\
    \ These 4 groups will facilitate our “Band's” (I will give you the Beatles links\
    \ when we get to the code) presence on the Web, and iTunes, under Artists, then\
    \ Albums. For the Beatles, there will be many albums. For our example, we're only\
    \ using 2, and likewise for Songs and Pictures. Note that in the subtitles, some\
    \ are telling the user that they will go to iTunes and some are telling the user\
    \ they will go to the Internet. Name all the cells as shown in [Figure 11–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos905150).\
    \ Remember that you can simply double-click on the cell to create a name."
  trans: "\n# 排版后的内容\n\n**注意：** 当我们首次来到这里设置单元格时，请注意，当你再次回到这里时，可以使用许多有趣且精彩的小技巧。我提到过，我们将打开通往各种设施齐全的房间的“门”。这就是其中之一！在我们探索这些不同房间的过程中，请继续四处看看。\n\
