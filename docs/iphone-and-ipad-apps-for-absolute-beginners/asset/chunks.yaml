- fmt: "# Memory Management of Storyboard Objects\n\nIn Objective-C, `ivar` stands\
    \ for Instance Variable. Now, `IBOutlet`s are part of the public interface of\
    \ a class and this is why I personally believe that it's better to declare our\
    \ methods inside the `@property` implementation detail. Remember that `IBOutlet`\
    \ ivars call setters, if they exist; however, if no setter is found, the object\
    \ loaded from the nib is directly retained. This means that advertising the property\
    \ as the `IBOutlet` at least makes it clear that the property's setter will always\
    \ be used and follow whatever memory management rule has been set for that property.\
    \ Apple puts it this way:\n\n> “Objects in the nib file are created with a retain\
    \ count of 1 and then auto released. As it rebuilds the object hierarchy, UIKit\
    \ reestablishes connections between the objects using `setValue:forKey:`, which\
    \ uses the available setter method or retains the object by default if no setter\
    \ method is available. This means that (assuming you follow the pattern shown\
    \ in “Outlets”) any object for which you have an outlet remains valid. If there\
    \ are any top–level objects you do not store in outlets, however, you must retain\
    \ either the array returned by the `loadNibNamed:owner:options:` method or the\
    \ objects inside the array to prevent those objects from being released prematurely.”\n\
    \nSimply put, if given the choice, as in step 20, to either do it the way we did\
    \ it:\n\n```\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n@interface\
    \ ViewController : UIViewController <MKMapViewDelegate>\n{\n    MKMapView *mapView;\n\
    }\n\n@property (nonatomic, retain) IBOutlet MKMapView *mapView;\n\n@end\n```\n\
    \nOr this way:\n\n```\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n\
    @interface ViewController : UIViewController <MKMapViewDelegate>\n{\n    IBOutlet\
    \ MKMapView *mapView;\n}\n\n@property (nonatomic, retain) MKMapView *mapView;\n\
    \n@end\n```\n\nThe most interesting aspect of this is that if you simply drag\
    \ your `IBOutlet` from the Storyboard Interface Builder into your header file—Xcode\
    \ will make these decisions for you. It is “better” to use the first example and\
    \ declare the `IBOutlet` in your `@property`, but that's only ‘style' and you\
    \ may work in an environment that uses the second method or the ‘new' method we\
    \ used in the first few chapters of this book.\n\nDo yourself a favor and just\
    \ do it the way I showed you—the first way.\n\n## Digging My Students' MapKit\
    \ Code\n\nWhen people come up to me and say, “Hey, Dr. Lewis, I have this really\
    \ great idea for a new app…,” it is amazing how often it involves using the MapKit\
    \ framework. We have seen how fun and sexy this stuff is, and by now, you have\
    \ likely also gathered that delving into the code can turn into quite a complexity.\n\
    \nAs a final buffet of tasty, high–calorie, high–tech fun, and flash, I am going\
    \ to share some final project scenarios with you. I certainly hope you actively\
    \ follow along here, but I also want to honor the fact that you're done. You already\
    \ succeeded in making it to the end of [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382).\
    \ So, remember, this section is like one of those “bonus feature” DVDs that Hollywood\
    \ loves to include—at no extra cost. Relax and enjoy!\n\n### Parsing to MapKit\
    \ from the Internet\n\nA little background: I presented my class the MapKit session\
    \ very much as I laid out the first example of this chapter. Then, we moved into\
    \ one of the coolest things there is with MapKit—the ability to parse, or read\
    \ live info, from the ether. This feature allows users to “see” the info on their\
    \ map. I'll explain this to a degree before I present three student final projects.\n\
    \nOne of the most intriguing things we can do with MapKit is get real live information\
    \ from the Internet and configure it in a way that makes the Google Map on the\
    \ user's iPhone come alive with live information (weather, traffic, geographical\
    \ phenomena, taxis, planes, and so on). For example, one of the most popular apps\
    \ for the San Francisco Bay Area is a program demonstrated in iPhone Cool Projects\
    \ (Wolfgang Ante, et al., Apress, 2009) (see [Figure 9–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos698306))\
    \ called “RoutesyBay Area San Francisco Muni and BART,” written by Steven Peterson.\n\
    \nPeterson parses all the data from the BART (Bay Area Rapid Transit, [`http://www.bart.gov/`](http://www.bart.gov/))\
    \ web server that keeps track of how close to schedule its trains are, the location\
    \ of the trains, and their speeds. The app parses all this data and makes it useful\
    \ and relevant to users at their specific locations in the San Francisco Bay Area.\
    \ In [Figure 9–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos698594),\
    \ you will see their app's red icon, and then several iPhone images. The left\
    \ one shows all the places a user can catch buses and trains. The middle picture\
    \ uses the same code we used in our example with a core location to show a user's\
    \ current location with a blue icon, and where a requested station is. The right\
    \ image reports to the user the relevant information on the best train given the\
    \ context, the timing, etc. The app provides data for the next three trains that\
    \ will be arriving at the train station nearest the user.\n\nIn essence, the MapKit\
    \ code on the iPhone is, among other things, a parsing utility. It retrieves live\
    \ information from a server that most people don't even know exists, and it puts\
    \ a stream of data to a novel and useful purpose.\n\nBecause of the immediate\
    \ and practical results that users of Peterson's app, and others like it, can\
    \ reap, I figured this would be a perfect theme to round out this book. I'll first\
    \ go over some of my “Parsing with the MapKit framework” lecture notes. Then I\
    \ will show you several solid final projects created by my students on that basis.\n\
    \nWith my students' blessing, the code for their projects (as shown below) is\
    \ available for download from my website. This gives you the opportunity to have\
    \ the code on your Mac while I simultaneously point out how you can modify it,\
    \ learn the key features from it, or just put it on your iPad and show the folks\
    \ at the bar these cool apps.\n\n![images](images/00390.jpg)\n\nFigure 9–37\\\
    . Apress's iPhone Cool Projects.\n\n![images](images/00391.jpg)\n\nFigure 9–38\\\
    . App icon and examples of three action screens—parsing app: “Routesy Bay Area\
    \ San Francisco Muni and BART.” It combines data from the web and MapKit.\n\n\
    The code for these three student Final Projects is located as follows:\n\n- Stephen\
    \ A. Moraco (Son): [`http://www.rorylewis.com/xCode/011b_TrafficCam.zip`](http://www.rorylewis.com/xCode/011b_TrafficCam.zip)\n\
    - Stephen M. Moraco (Father): [`http://www.rorylewis.com/xCode/011a_APRSkit.zip`](http://www.rorylewis.com/xCode/011a_APRSkit.zip)\n\
    - SatishRege: [`http://www.rorylewis.com/xCode/011c_MyTraffic.zip`](http://www.rorylewis.com/xCode/011c_MyTraffic.zip)\n\
    \n### MapKit Parsing\n\nRemember, this is digging deep into the code at a level\
    \ that is outside the scope of the book. However, all of the following instructions\
    \ are seen in my students' code, which you are welcome to download. For now, just\
    \ read along and see if you can follow their pattern of parsing, creating delegate\
    \ objects, and so forth.\n\nBefore we look at their actual apps, consider a hypothetical\
    \ scenario: Imagine there is a Grateful Dead Server that broadcasts an update\
    \ on every Deadhead's geographical location—at least those who allow themselves\
    \ to be visible on the grid. This hypothetical app allows a (serious) fan of the\
    \ Grateful Dead to locate all the other Deadheads nearby at any given time. These\
    \ fans can meet and share bootlegs, hang out, and generally relate on a plane\
    \ that only other Grateful Dead disciples can appreciate."
