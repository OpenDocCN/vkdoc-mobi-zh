    在本节中，我将教你如何完成前两个任务；其中一个需要在打开实现文件后立即执行。第一个任务是合成（synthesis），通常只需要编写一行代码。第二个任务是 `viewDidLoad`
    方法，通常会自动实例化；但在更复杂的代码中，我们需要向 `viewDidLoad` 方法中添加代码，就像我们今天要做的那样。


    ### 合成


    我一直强调，要鼓励学生和读者养成在头文件中编写 `@property` 指令后，立即在实现文件中进行合成的习惯。你可能已经注意到，无论是在 第 4 章 还是本章中，我在头文件中编写的最后一段代码都是用于合成的
