    39\. 图 4-39 展示了`helloWorld_04`的两个视图。第一个视图是应用首次打开时我们看到的画面。如果你使用了自己的图片，当然画面会有所不同，但除了背景图之外，你的屏幕应该看起来非常相似。第二个图像是点击按钮后出现的画面。标签文字出现，第二张图像叠加在底层图像之上。


    ### 深入解析代码


    在本节中，让我们聚焦于本章前面遇到的一些关键组件。我想再多谈谈`IBOutlets`和`IBActions`——具体来说，它们是如何包含关键字……甚至准关键字的。我们还将涉及指针及其与代码中地址的关系。


    #### IBOutlets 和 IBActions


    之前，我们使用了`IBOutlet`和`IBAction`这两个关键字，现在我们要讨论一些相关概念。严格来说，许多程序员认为它们是“准关键字”。


    Objective-C 的 Appkit 将原始 C 语言预处理指令（例如`#define`）转换为了可用的预处理指令。用极客的话说，我们将其念作“井号-定义”。


    注意：在美国，`#`号常被称为“井号”（pound sign），尤其在 Objective-C 和其他编程语境中。在英国，它被称为“哈希”字符。许多 iPhone/iPad
    开发者最近开始将`#define`预处理指令简称为“define 指令”。


    `#define`预处理指令告诉计算机用一样东西替换另一样东西。这个概念很简单，对吧？例如，如果我要编程让计算机每次看到你名字的实例时就替换成`100`，我们的
    C 代码会像这样：


    ```

    #define yourName 100

    ```


    这会告诉计算机，每次处理`yourName`（一个识别你真实姓名的变量）时，就替换成`100`。


    现在回到 Xcode 和我们的主题。在这个语境下，`IBOutlet`和`IBAction`这两个准关键字实际上并没有被定义成任何实质内容。换句话说，它们对编译器（计算机的核心）来说并不做任何实质性的事情。


    不过，准关键字是标志，它们在 Interface Builder 的通信中很重要。当它看到`IBOutlet`和`IBAction`准关键字时，就会准备好其内部代码来执行特定任务。它会准备好处理实例变量以及我们在那个编程领域中所建立的所有钩子和连接。


    #### 关于指针的更多内容


    许多编程学员难以理解“指针”的概念——有时也被称为间接寻址的概念。解释这个想法并不容易，因为它是 C 语言最复杂的特性之一。


    在本章前面，我打过一个比方：看到一个罪犯在做坏事，然后报警，并告诉警察他的位置——这样警察（而不是你）就能逮捕罪犯。这个比喻对很多学员有效，但现在让我们更深入一点。


    如果你去问一位计算机科学教授什么是“指针”，他可能会说：“指针保存着变量或方法的地址。”


    “地址？”你问道。好吧，考虑一下这个新的解释性比喻。


    你有没有看过这样的电影：侦探或一对疯狂的夫妇四处奔波，寻找藏宝图的线索、失窃的画作或被绑架的女儿？有时他们会发现一个指纹、一张收据，甚至是一个信封，里面装着一张写有神秘信息的纸——这些会让人们离目标更近一步——最终找到丢失的物品本身。


    我们可以把这些称为指针；它们指示要去的下一个地方——以解决给定的问题。它们不一定给出处理并解决所有事情的最终地址，而是给出中间地址或地点，让我们继续工作。


    因此，计算机科学教授的意思是，指针实际上并不包含它们所指向的东西；它们包含代码中所需对象、动作或实体的位置——即地址。这一重要特性使得 C 系列语言非常强大。


    这个简单的想法将复杂任务变成简单任务变得非常高效。指针可以将值传递给类型，将参数传递给函数，表示大量数字，并操控我们管理计算机内存的方式。你们很多人可能在想，指针和代数世界中的变量很相似。正是如此！


    在我们第一个比喻中，指针让一个手无寸铁的市民通过间接方式（即报警来解决问题）逮捕了一名危险的罪犯。（是的，“间接”这个词选得有点奇怪，因为实际上我们是朝着目标被指引。）


    考虑下面的例子，我们使用一个指针来指引我们找到你的银行账户余额。为此，我们定义一个名为`bankBalance`的变量如下：


    ```

    int  bankBalance = $1,000;

    ```


    现在，我们再引入一个变量，叫它`int_pointer`。假设为了论证起见，我们已经声明了它。这将使我们能够通过以下声明，使用间接方式间接连接到`bankBalance`的值：


    ```

    int  *int_pointer;

    ```


    这个星号（即星标）告诉 C 系列语言，我们的变量`int_pointer`被允许间接访问变量（占位符）`bankBalance`中金额的整数值。


    最后，我想提醒你，并且承认，我们在这里的深入探讨并不是对这些主题的详尽或严谨探索……只是一次关于一些相关想法的有趣拓展。在这一点上，即使你没有完全理解指针，也完全不必困扰。种子已经播下，这才是目前最重要的！

    '
- fmt: '#### You''ve Said “Hello!”… but now, INDIO!


    We can divide most iPhone and iPad apps into four different functions: Interaction,
    Navigation, Data, and I/O (Input/Output). We have seen enough apps to know that
    we can interact with them; we can navigate from one screen to another; we can
    manipulate and utilize data; and, we can provide input (type, paste, speak) and
    receive output (images, sounds, text, fun!).


    Before we zoom in again to approach a program from any one of these specific areas,
    we need to first have a better grasp of how these different aspects of iPhone/iPad
    programming work, look, and behave. We also need to learn about their limitations
    and the pros and cons in terms of the projected or desired user experience and,
    because of the differences discussed above, whether the app is for the iPhone
    or the iPad. In `helloWorld_04`, unbeknownst to you, we continued to delve deeper
    into INDIO—Interaction, Navigation, Data, and I/O (input/output). Our code retrieved
    two images, by different means, which will interact with the user. This exercise
    took us closer to the I/O aspect of INDIO, which we have not quite wrapped our
    heads around because, simply put, we''re not there yet.


    Like a digital warrior, you are striding along a path into the forest of Objective-C,
    to a place where you will need to be accustomed to vaulting over rivers, hunting
    tigers, building fires in the rain, and so forth. So far, you''ve learned to start
    a fire with flint and steel—in dry weather—and you''ve gotten pretty good at hopping
    over streams. This lesson will teach you to vault over wider streams and, once
    there, to hunt tigers. Soon, you''ll be equipped to fight the legendary demons
    of I/O in the daunting realm of INDIO.


    As you gain a working knowledge of where any limitations and barriers exist, your
    journey through these four domains—all parts of a vast “forest”—will be more powerful
    and productive. A very important part of my job is to show you how to conduct
    yourself safely through the Forest of INDIO. Some sections of the forest are more
    daunting than others, but the good news is that you will be getting a nice, high-level
    view, as if from a helicopter! After our aerial tour, we will parachute down to
    the forest floor, open Xcode, and continue to explore the paths, the watering
    holes, and the shortcuts—to mark off the unnecessary sections and to be on the
    lookout for wild animals.


    ##### Model-View-Controller


    As mentioned previously, the programmers who developed Cocoa Touch used a concept
    known as the Model-View-Controller (MVC) as the foundation for iPhone and iPad
    app code. Here is the basic idea.


    **Model**: This holds the data and classes that make your application run. It
    is the part of the program where you might find sections of code I told you to
    ignore. This code can also hold objects that represent items you may have in your
    app (e.g., pinballs, cartoon figures, names in databases, appointments in your
    calendar).


    **View**: This is the combination of all the goodies users see when they use your
    app. This is where your users interact with buttons, sliders, controls, and other
    experiences they can sense and appreciate. Here you may have a main view that
    is made up of a number of other views.


    **Controller**: The controller links the model and the view together while always
    keeping track of what the user is doing. Think of this as the structural plan—the
    backbone—of the app. This is how we coordinate what buttons the user presses and,
    if necessary, how to change one view for another, all in response to the user''s
    input, reactions, data, etc.


    ![images](images/00149.jpg)


    Figure 4–40. The model, the view, and the controller (MVC).


    Consider the following example that illustrates how you can use the MVC concept
    to divide the functionality of your iPhone/iPad app into three distinct categories.
    [Figure 4–40](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos334715) shows
    a representation of your app; I''ve called it “MVC Explained.” You can see that
    the VIEW displays a representation—a label—of “Your very cool fantastic App Includes
    3 layers: A, B and C.”


    In the CONTROLLER section of the app, we see the three individual layers separated
    out, Layer “A,” Layer “B,” and Layer “C.” Depending on which control mechanism
    the user clicks in the VIEW domain, the display the user sees, the CONTROLLER
    returns the appropriate response—the next view from the three prepared layers.


    Your app will probably utilize data of some type, and this information will be
    stored in the MODEL section of your program. The data could be phone numbers,
    players'' scores, GPS locations on a map, and so on.


    As the user interacts with the VIEW section of the app, it may have to retrieve
    data from your database. Let''s say your data contains the place your user parked
    her car. When the user hits a particular button in your program, it may retrieve
    the GPS data from the MODEL. If it''s a moving target, it may also track changes
    in the user''s position in relation to a car in the parking lot. Lastly, the CONTROLLER
    may change the state (or mode) of your data. Maybe one state shows telephone numbers,
    while another shows GPS positions or the top ten scores in a game. The CONTROLLER
    is also where animation takes place. What happens in the animation can affect
    and perhaps change the state in your Model. This could be done by using various
    tools, such as `UIKit` objects, to control and animate each layer, state, etc.


    If this sounds complicated, bear in mind that you''ve already done much of this
    without even knowing it! In Example 1, you had the user press a button and up
    popped a label saying “Hello World!” This shows how you have already built an
    interaction with a `ViewController`. We will be delving further into these possibilities,
    of course. In [Chapter 4](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_016.html#filepos245269),
    we will venture deeper into the Interaction quadrant of the Forest of INDIO, and
    allow the user to add and delete table view items.


    When we do this, I will do my best to keep you focused on the big picture when
    it comes to interactions… via Navigation. Our goal will be to have the user move
    from less specific information to more specific information with each new view.


    ### In the Chapter Ahead


    In [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378),
    we will move into the next level of complexity: switch view applications. We will
    examine how a team of characters or roles within your code will work together
    to direct an outcome, or series of outcomes, that will give the user the sense
    of seamless flow.


    You will learn about delegators and switch view controllers, classes and subclasses,
    and “lazy loads.” We will get into the nitty-gritty of the `.xib` files, examine
    the concept of memory deallocation, and learn about imbedded code comments. It''s
    getting curiouser and curiouser…


    Onward to the next chapter!


    ## Chapter 5


    ## Touches


    Here in our fifth app, we take a giant leap forward and really program some code.
    I want to say this right now: even though this is a big leap forward, there is
    always an easy ways out. Yes, I want you to do your very best to type in the all
    the code as you diligently follow the steps. Yes, I even want you to carry on
    when you feel like giving up; however, at this point, I want to clarify something
    with you, as I do with my students.'
