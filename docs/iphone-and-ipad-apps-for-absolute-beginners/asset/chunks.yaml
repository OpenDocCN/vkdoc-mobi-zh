    \ Next, simply follow the instructions and the four screen prompts, as illustrated\
    \ in [Figure 1–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos63533).\n\
    \n![images](images/00011.jpg)\n\nFigure 1–4. Go to your Desktop, click on the\
    \ Apple and select “Software Update...”\n\n![images](images/00012.jpg)\n\nFigure\
    \ 1–5. Top - Checking for new software; 2nd from the top - Select the option to\
    \ download the new software; 2nd from the bottom - Wait for your new software\
    \ to download; Bottom – Select “Restart” to have your Mac properly install the\
    \ new software.\n\nIf, by the time you are reading this book, you realize that\
    \ the OS X, and/or the iOS make my pictures appear dated, then do not freak out.\
    \ I have a forum that is always online where I and many volunteers love to help\
    \ others. We always update the forum with news regarding recent updates of the\
    \ OS X and the iOS. Visit the forum here: [`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)\
    \ or `bit.ly/oLVwpY`. See [Figure 1–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos89581).\n\
    \nThirdly, you will need to become a registered developer via the iPhone/iPad\
    \ Software Development Kit (SDK) and download Xcode. If you are a student, it’s\
    \ likely that your professor has already taken care of this, and you may already\
    \ be registered under your professor’s name. If you are not a student, then you\
    \ will need to follow these numbered steps to sign up.\n\nNOTE: Even if you absolutely\
    \ do not want to be a developer, you can still download Xcode with your purchase\
    \ of Lion or buy it at the Mac store. I have yet to have a student last for more\
    \ than a week trying alternatives to this. The $100 allows you to have access\
    \ to the Apple developer tool kits, tutorials, example code, and help forums,\
    \ and to receive a provisioning license to run your apps on a physical iPhone\
    \ or iPad. Lastly, you’re reading this book so you can make an app and sell it\
    \ on iTunes store and make $$—you need to pay the $100 for this alone. Buying\
    \ a Mac, Xcode, and this book—but not buying the $100 registered license—is like\
    \ paying to learn to drive a car, buying a car, but then never obtaining a driver’s\
    \ license. Many of the tools that I teach you to use in this book to debug assume\
    \ you have a license. It’s your choice.\n\n1.  Go to `developer.apple.com/programs/ios/`\
    \ or `bit.ly/quO4ow`, which will bring you to a page similar to the one shown\
    \ in [Figure 1–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos66409).\
    \ Click the Enroll Now button.\n    ![images](images/00013.jpg)\n\n    Figure\
    \ 1–6. Click the “Enroll Now button”.\n\n2.  Click the Continue button, as illustrated\
    \ in [Figure 1–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos66845).\n\
    \    ![images](images/00014.jpg)\n\n    Figure 1–7. Click the Continue button.\n\
    \n3.  Most people reading this book will select the “I need to create a new account\
    \ for …” option (arrow 1 in [Figure 1–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos67719)).\
    \ Next, click the Continue button as illustrated by arrow 2 in [Figure 1–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos67719).\
    \ If you already have an existing account, then you have been through this process\
    \ before. Go ahead with the process beginning with the “I currently have an Apple\
    \ ID …” option, and I’ll meet you at step 6, where we will log onto the iPhone/iPad\
    \ development page and download the SDK.\n    ![images](images/00015.jpg)\n\n\
    \    Figure 1–8. Click the “I need to create an Apple ID…” option to proceed.\n\
    \n4.  You are probably going to be enrolling as an individual, so click the Individual\
    \ link, as illustrated in [Figure 1–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos68377).\
    \ If you are enrolling as a company, click the Company option to the right and\
    \ follow the appropriate steps; I’ll meet you at step 6.\n    ![images](images/00016.jpg)\n\
    \n    Figure 1–9. Click the Individual option.\n\n5.  From here, you will enter\
    \ all of your information, as shown in [Figure 1–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos69240),\
    \ and you will pay your fee of $99 for the Standard Program. This provides you\
    \ with all of the tools, resources, and technical support that you will need.\
    \ (If you’re reading this book, you really do not want to buy the Enterprise program\
    \ at $299, as it is for commercial in-house applications.) After paying, save\
    \ your Apple ID and Username; then receive and interact with your confirmation\
    \ email appropriately.\n    ![images](images/00017.jpg)\n\n    Figure 1–10. Enter\
    \ all of your information accordingly.\n\n    NOTE: Before we move onto Step 6,\
    \ you will want to make sure that you have received your confirmation email and\
    \ have chosen a password to complete the last step of setting yourself up as a\
    \ bona fide Registered Apple Developer. Congratulations!\n\n6.  Use your Apple\
    \ ID to log into the main iPhone/iPad development page at `developer.apple.com`.\
    \ This page has three icons for the three types of Apple programmers. As shown\
    \ by the arrow in [Figure 1–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos70417),\
    \ click on the top icon—iOSDev Center—to get to the download page for iPhone/iPad\
    \ Operating System software.\n    ![images](images/00018.jpg)\n\n    Figure 1–11.\
    \ For now, click on the “iOS Dev Center” icon indicated by the arrow. Later, you\
    \ may also want to program apps for the Mac Computer or the Safari Web Browser.\n\
    \n    NOTE: While we’re here, let's go over the other 2 download options. The\
    \ icon below the iOS is for people who want to download an environment to program\
    \ wonderful things that run on a Mac. The third and last icon is for people who\
    \ want an environment to program apps that operate inside Safari's web browser.\
    \ Maybe one day you will want to connect your cool zany innovative idea that has\
    \ made thousands of dollars to Safari. Well, this is the place you will want to\
    \ do that.\n\n7.  After logging in to iOSDev with your username and password,\
    \ as described in step 6, you will see a screen similar to that shown in [Figure\
    \ 1–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos73016). The iOS\
    \ Dev Center contains all the tools necessary to build iPhone and iPad apps. Later\
    \ on you will spend time here, but for now we just want to go to the Developer\
    \ Page of the latest build of the iOS SDK. Locate the 'Downloads' icon indicated\
    \ by the arrow and click it. You may notice that this only takes you to the bottom\
    \ of the page, as illustrated in [Figure 1–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos73329).\
    \ Whether you scrolled down or clicked down here, just click on the “Download\
    \ Xcode 4” button so that you can get to the Xcode 4 and iOS SDK 4.3 page."
  raw: 'Figure 1–3\. The “About This Mac” window, and Xcode version window. Here you
    can see that my MacBook is using OS X 10.7.2\. We will discuss iOS later in this
    chapter. If you have already installed Xcode (or after you install Xcode), under
    “Xcode,” click on “About Xcode” and you will see what version you are running
    (as shown here on the right).


    Note again that I have OS X 10.7.2 and this is the operating system I will use
    for this book. By the time you read this book, it will most likely have changed
    to a higher level. You need to bear two things in mind here. First, you need to
    update to that latest OS X, as shown below, and secondly, you need to go to the
    book’s online forum to see if there is anything you need to know about changes
    in the new version of the OS X that may impact this book. So, let’s look at how
    you need to update your system to the latest OS X.


    With all of your programs closed except for “Finder,” go back up to the apple
    in the upper left-hand corner of your Mac and select “Software Update …,” as illustrated
    in [Figure 1–4](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos63244).
    Next, simply follow the instructions and the four screen prompts, as illustrated
    in [Figure 1–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos63533).


    ![images](images/00011.jpg)


    Figure 1–4\. Go to your Desktop, click on the Apple and select “Software Update...”


    ![images](images/00012.jpg)


    Figure 1–5\. Top - Checking for new software; 2nd from the top - Select the option
    to download the new software; 2nd from the bottom - Wait for your new software
    to download; Bottom – Select “Restart” to have your Mac properly install the new
    software.


    If, by the time you are reading this book, you realize that the OS X, and/or the
    iOS make my pictures appear dated, then do not freak out. I have a forum that
    is always online where I and many volunteers love to help others. We always update
    the forum with news regarding recent updates of the OS X and the iOS. Visit the
    forum here: [`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)
    or `bit.ly/oLVwpY`. See [Figure 1–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos89581).


    Thirdly, you will need to become a registered developer via the iPhone/iPad Software
    Development Kit (SDK) and download Xcode. If you are a student, it’s likely that
    your professor has already taken care of this, and you may already be registered
    under your professor’s name. If you are not a student, then you will need to follow
    these numbered steps to sign up.


    NOTE: Even if you absolutely do not want to be a developer, you can still download
    Xcode with your purchase of Lion or buy it at the Mac store. I have yet to have
    a student last for more than a week trying alternatives to this. The $100 allows
    you to have access to the Apple developer tool kits, tutorials, example code,
    and help forums, and to receive a provisioning license to run your apps on a physical
    iPhone or iPad. Lastly, you’re reading this book so you can make an app and sell
    it on iTunes store and make $$—you need to pay the $100 for this alone. Buying
    a Mac, Xcode, and this book—but not buying the $100 registered license—is like
    paying to learn to drive a car, buying a car, but then never obtaining a driver’s
    license. Many of the tools that I teach you to use in this book to debug assume
    you have a license. It’s your choice.


    1.  Go to `developer.apple.com/programs/ios/` or `bit.ly/quO4ow,` which will bring
    you to a page similar to the one shown in [Figure 1–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos66409).
    Click the Enroll Now button. ![images](images/00013.jpg)


    Figure 1–6\. Click the “Enroll Now button”.


    2.  Click the Continue button, as illustrated in [Figure 1–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos66845).
    ![images](images/00014.jpg)


    Figure 1–7\. Click the Continue button.


    3.  Most people reading this book will select the “I need to create a new account
    for …” option (arrow 1 in [Figure 1–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos67719)).
    Next, click the Continue button as illustrated by arrow 2 in [Figure 1–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos67719).
    If you already have an existing account, then you have been through this process
    before. Go ahead with the process beginning with the “I currently have an Apple
    ID …” option, and I’ll meet you at step 6, where we will log onto the iPhone/iPad
    development page and download the SDK. ![images](images/00015.jpg)


    Figure 1–8\. Click the “I need to create an Apple ID…” option to proceed.


    4.  You are probably going to be enrolling as an individual, so click the Individual
    link, as illustrated in [Figure 1–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos68377).
    If you are enrolling as a company, click the Company option to the right and follow
    the appropriate steps; I’ll meet you at step 6. ![images](images/00016.jpg)


    Figure 1–9\. Click the Individual option.


    5.  From here, you will enter all of your information, as shown in [Figure 1–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos69240),
    and you will pay your fee of $99 for the Standard Program. This provides you with
    all of the tools, resources, and technical support that you will need. (If you’re
    reading this book, you really do not want to buy the Enterprise program at $299,
    as it is for commercial in-house applications.) After paying, save your Apple
    ID and Username; then receive and interact with your confirmation email appropriately.
    ![images](images/00017.jpg)


    Figure 1–10\. Enter all of your information accordingly.


    NOTE: Before we move onto Step 6, you will want to make sure that you have received
    your confirmation email and have chosen a password to complete the last step of
    setting yourself up as a bona fide Registered Apple Developer. Congratulations!


    6.  Use your Apple ID to log into the main iPhone/iPad development page at `developer.apple.com`.
    This page has three icons for the three types of Apple programmers. As shown by
    the arrow in [Figure 1–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos70417),
    click on the top icon—iOSDev Center—to get to the download page for iPhone/iPad
    Operating System software. ![images](images/00018.jpg)


    Figure 1–11\. For now, click on the “iOS Dev Center” icon indicated by the arrow.
    Later, you may also want to program apps for the Mac Computer or the Safari Web
    Browser.


    NOTE: While we’re here, let''s go over the other 2 download options. The icon
    below the iOS is for people who want to download an environment to program wonderful
    things that run on a Mac. The third and last icon is for people who want an environment
    to program apps that operate inside Safari''s web browser. Maybe one day you will
    want to connect your cool zany innovative idea that has made thousands of dollars
    to Safari. Well, this is the place you will want to do that.


    7.  After logging in to iOSDev with your username and password, as described in
    step 6, you will see a screen similar to that shown in [Figure 1–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos73016).
    The iOS Dev Center contains all the tools necessary to build iPhone and iPad apps.
    Later on you will spend time here, but for now we just want to go to the Developer
    Page of the latest build of the iOS SDK. Locate the ''Downloads'' icon indicated
    by the arrow and click it. You may notice that this only takes you to the bottom
    of the page, as illustrated in [Figure 1–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos73329).
    Whether you scrolled down or clicked down here, just click on the “Download Xcode
    4” button so that you can get to the Xcode 4 and iOS SDK 4.3 page.'
  trans: "  \n图 1–3. “关于本机”窗口与 Xcode 版本窗口。此处可见我的 MacBook 运行的是 OS X 10.7.2。本章稍后会讨论\
    \ iOS。如果你已安装 Xcode（或在安装 Xcode 后），在“Xcode”下点击“关于 Xcode”，即可查看当前运行的版本（如右侧所示）。\n\n\
    再次说明，我使用的是 OS X 10.7.2，这也是本书所用的操作系统。当你阅读本书时，系统版本很可能已升级至更高版本。这里你需要牢记两点：首先，你需要将系统更新至最新的\
    \ OS X（如下所示）；其次，你需要访问本书的在线论坛，了解新版本 OS X 中可能影响本书内容的变动。那么，接下来我们来看看如何将系统更新至最新的 OS\
    \ X。\n\n在关闭除“访达”以外的所有程序后，返回 Mac 屏幕左上角的苹果图标，选择“软件更新...”，如图 1-4 所示。接着，按照提示和四个屏幕指引操作，如图\
    \ 1-5 所示。\n\n![images](img/00011.jpg)\n\n图 1–4. 进入桌面，点击苹果图标，选择“软件更新...”\n\n![images](img/00012.jpg)\n\
    \n图 1–5. 从上至下依次为：检查新软件；选择下载新软件的选项；等待新软件下载完成；选择“重新启动”以让 Mac 正确安装新软件。\n\n如果你在阅读本书时发现\
    \ OS X 和/或 iOS 的截图已显过时，请不要慌张。我设立了一个常驻在线论坛，我和许多志愿者都乐于在此提供帮助。我们会持续更新论坛，发布有关 OS X\
    \ 和 iOS 最新版本的消息。请访问论坛：[`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)\
    \ 或 `bit.ly/oLVwpY`。参见图 1-20。\n\n第三，你需要通过 iPhone/iPad 软件开发工具包（SDK）注册成为开发者，并下载\
    \ Xcode。如果你是学生，你的教授很可能已代为处理此事，你可能已在教授名下注册。如果不是学生，则需要按以下编号步骤进行注册。\n\n注意：即使你完全不想成为开发者，仍可随购买\
    \ Lion 系统一同下载 Xcode，或在 Mac 应用商店购买。我还没见过有学生能坚持使用替代方案超过一周。支付 100 美元后，你将获得 Apple\
    \ 开发者工具包、教程、示例代码和帮助论坛的访问权限，并获得在实体 iPhone 或 iPad 上运行应用的授权许可。最后，你阅读本书是为了制作应用并在 iTunes\
    \ Store 上销售赚钱——仅此一项你就需要支付这 100 美元。购买 Mac、Xcode 和本书，却不购买这 100 美元的注册许可，就像花钱学开车、买了车，却从未取得驾照一样。我在本书中教授你使用的许多调试工具都假定你拥有许可。这是你的选择。\n\
    \n1.  前往 `developer.apple.com/programs/ios/` 或 `bit.ly/quO4ow`，你将进入一个类似图 1-6 所示的页面。点击“立即注册”按钮。\n\
    \    ![images](img/00013.jpg)\n\n    图 1–6. 点击“立即注册”按钮。\n\n2.  点击“继续”按钮，如图 1-7\
    \ 所示。\n    ![images](img/00014.jpg)\n\n    图 1–7. 点击“继续”按钮。\n\n3.  阅读本书的大多数人应选择“我需要为……创建新帐户”选项（图\
    \ 1-8 中的箭头 1）。接着，点击箭头 2 所示的“继续”按钮（图 1-8）。如果你已有现有帐户，说明你之前已走过此流程。请直接选择“我目前已有 Apple\
    \ ID……”选项开始操作，我们将在第 6 步会合，届时登录 iPhone/iPad 开发页面并下载 SDK。\n    ![images](img/00015.jpg)\n\
    \n    图 1–8. 点击“我需要创建 Apple ID……”选项继续。\n\n4.  你很可能以个人身份注册，因此请点击“个人”链接，如图 1-9 所示。如果你以公司身份注册，请点击右侧的“公司”选项并按照相应步骤操作；我们将在第\
    \ 6 步会合。\n    ![images](img/00016.jpg)\n\n    图 1–9. 点击“个人”选项。\n\n5.  接下来，你将输入所有个人信息，如图\
    \ 1-10 所示，并支付标准计划费用 99 美元。这将为你提供所需的所有工具、资源和技术支持。（如果你在阅读本书，你确实不需要购买 299 美元的企业计划，该计划仅适用于商业内部应用。）支付完成后，请保存好你的\
    \ Apple ID 和用户名；然后接收并按照确认邮件进行相应操作。\n    ![images](img/00017.jpg)\n\n    图 1–10.\
    \ 相应输入所有信息。\n\n    注意：在进入第 6 步之前，请确认你已收到确认邮件并已选择密码，以完成成为正式注册 Apple 开发者的最后一步。恭喜！\n\
    \n6.  使用你的 Apple ID 登录 `developer.apple.com` 的主 iPhone/iPad 开发页面。该页面有三个图标，分别对应三种类型的\
    \ Apple 程序员。如图 1-11 中箭头所示，点击顶部图标——iOS 开发中心——即可进入 iPhone/iPad 操作系统软件的下载页面。\n  \
    \  ![images](img/00018.jpg)\n\n    图 1–11. 目前，请点击箭头所指的“iOS Dev Center”图标。稍后，你可能还想为\
    \ Mac 电脑或 Safari 网页浏览器编写应用。\n\n    注意：趁此机会，我们来介绍另外两个下载选项。iOS 下方的图标适用于希望下载环境以在\
    \ Mac 上运行精彩程序的人。第三个也是最后一个图标适用于希望获得环境以在 Safari 网页浏览器内部运行应用的人。也许有一天，你会想将那个为你赚了数千美元的绝妙创意连接到\
    \ Safari。那么，这里就是你要去的地方。\n\n7.  按照第 6 步所述，使用你的用户名和密码登录 iOS 开发中心后，你将看到一个如图 1-12\
