    \ We want to select Push. This is shown in [Figure 10–43](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos871107).\n\
    \n![images](images/00453.jpg)  \n\nFigure 10–44. Remember the name we gave the\
    \ segue?\n\n44. We now need to give the segue that we just created the name we\
    \ gave it in the `prepareForSegue:` method in the `myMasterTableViewController.m`\
    \ class. In case you forgot the name you gave it, or even if you remember it,\
    \ go back and copy the name of the segue so that your brain can make the connections.\
    \ This is illustrated in [Figure 10–44](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos871705).\n\
    \n![images](images/00454.jpg)  \n\nFigure 10–45. Select the segue.\n\n45. This\
    \ may sound really unnecessary but students have the most difficult time naming\
    \ segues because they forget to first select it. I know it's new but it's amazing\
    \ how many forget to do this. For this reason, I've taken the time to specifically\
    \ include this image in the book. Select the segue, as shown in Figure 10–45,\
    \ and then we will give it its name.\n\n![images](images/00455.jpg)  \n\nFigure\
    \ 10–46. Paste the name in the Identifier.\n\n46. Once you have selected the segue\
    \ connecting the `UITableViewCell` to the Detail View Controller, paste the name\
    \ in the Identifier box, as shown in [Figure 10–46](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos873149).\n\
    \n![images](images/00456.jpg)  \n\nFigure 10–47. Drag a Map View onto the View.\n\
    \n47. We now have everything connected for the map to appear on the view except\
    \ … ahh — the Map View! Grab a Map View from the Library and drag it onto the\
    \ View, as shown in [Figure 10–47](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos873721).\n\
    \n![images](images/00457.jpg)  \n\nFigure 10–48. Select the Map View.\n\n48. We\
    \ now need to make the Map View become the Primary View. As you can see in [Figure\
    \ 10–48](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos874300), the View\
    \ is above the Map View. In geek terms, we say that the Map View is subordinate\
    \ to the View and the View is currently the primary view. Remember how I said\
    \ that Views lying on top of one another can be very confusing. Well, there's\
    \ a reason I'm investing three images into this point.\n\n![images](images/00458.jpg)\
    \  \n\nFigure 10–49. Drag Map View on top of the View.\n\n49. Right now, the Map\
    \ View that we just dragged onto the View is subordinate to the view. To make\
    \ the view go away and have the Map View be the primary view, select the View\
    \ Controller in the View Controller Scene in the Document Outline and then drag\
    \ the Map View above the View, as shown in [Figure 10–49](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos875069).\n\
    \n![images](images/00459.jpg)  \n\nFigure 10–50. Now Map View is the Primary View.\n\
    \n50. Once the Map View is above the View, the View disappears and the MapView\
    \ will be the Primary view. This is critical because nothing else will work if\
    \ this doesn't happen! Make sure you can master this. Don't move on unless your\
    \ screen looks like the screen in [Figure 10–50](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos875773).\n\
    \n![images](images/00460.jpg)  \n\nFigure 10–51. Associate the Map View with your\
    \ `myDetailViewController`.\n\n51. Remember the tons of work you did for the `myDetailViewController.m`?\
    \ Well, that's all got to work underneath the Map View we have just created. Select\
    \ the View Controller Detail in the View Controller Scene in the Document Outline.\
    \ Select the Identity inspector in the Utilities. Then in the Custom Class, go\
    \ to the drop down menu in Class and select `myDetailViewController`, as shown\
    \ in [Figure 10–51](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos876447).\n\
    \n![images](images/00461.jpg)  \n\nFigure 10–52. Run it.\n\n52. Run it.\n\n![images](images/00462.jpg)\
    \  \n\nFigure 10–53. Splash goes to Table View, then selecting a city, Durban.\n\
    \n53. Yes, it is beautiful, isn't it? All that hard work, huh? The Splash appears,\
    \ then we see the table we populated with cities but now we see the beautiful\
    \ disclosures on the right side of each cell that are telling us that if we click\
    \ on the cell then something very cool will happen. We then click on the cell\
    \ and it segues in a Map view, as shown in the right image in [Figure 10–54](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos878445).\n\
    \n![images](images/00463.jpg)  \n\nFigure 10–54. The pin drops and the annotation\
    \ works.\n\n54. Congratulations. The one thing I am going to have you do as an\
    \ exercise is name the Navigation Bar the \"Detail View\" and also call the Table\
    \ View the \"Master\" in the navigation bar. Go back to where you were in [Figure\
    \ 10–47](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos873721) and simply\
    \ double click near the center of the navigation bar and name it whatever you\
    \ like actually. The reason I leave this out is because students often think that\
    \ the name we give the navigation bar actually has some effect on the code. I've\
    \ seen quite a few students changing the name on the navigation bars trying to\
    \ debug their code. Leaving the names out shows you that these names have zero\
    \ effect at all.\n\nThese two series have been very long. There is nothing beyond\
    \ the code that I want to show you. In fact, there have been quite a few times\
    \ that we have gone beyond the scope of \"Beginner\", let alone absolute beginner.\
    \ So we will not dig down any more into the code than what we have already done.\
    \ Now take a break, relax, and glow in the satisfaction!"
  raw: "#### Tweaking the Storyboard\n\nWe now have written or pasted all the code\
