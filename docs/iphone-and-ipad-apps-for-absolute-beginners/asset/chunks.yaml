    \n![images](img/00425.jpg)\n\n*图 10–16. 将其命名为 `myPos`*\n\n16. 正如我们在 myStory_01\
    \ 中所做的那样，这需要是一个 `NSObject` 子类。确保这一点并将其命名为 `myPos` 后，点击下一步或按回车键，如图 10–16 所示。让我们继续。\n\
