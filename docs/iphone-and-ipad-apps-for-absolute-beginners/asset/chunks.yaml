    over there. Your code will NEVER COMPILE THE FIRST TIME!! Do you hearhhhh me?
    Your code will NEVER compile the first time, so just get over it!


    I''ll never forget that—especially now, as I see so many young computer science
    and engineering students drop out of computer science in their freshman year,
    right at the point that debugging and arrays hit them.


    I also remember something my uncle told me when I was just a kid in Durban, South
    Africa, my place of birth. He was teaching me to surf in the huge, treacherous
    waves, and he said that if I wanted to handle the ten- to twenty-foot surf, first
    I had to learn how to “wipe out.”


    > Rory... you WILL wipe out. You WILL be held under the water for 15 to 20 seconds,
    so it is imperative that you learn how to survive a huge wipe. That way, you''ll
    be fearless out there!


    Wow! I could not believe it took me years to associate these two analogous situations
    and their lessons. After that, I started making my students go back to code that
    they knew they could handle and having them program mistakes into it. Then, I''d
    have them give it to a partner, and guide one another as each debugged the other''s
    code. Over the years, debugging tools have evolved. In fact, debugging tools themselves
    have become very complex and intimidating to students. With this in mind, I have
    created a segue for you into learning to love debugging and feeling inspired to
    learn more complex debugging tools. You are at a stage where you are going to
    write more code than you ever have before. You WILL get errors, and I want you
    to be able to handle these tough times. This is why I am going to teach you the
    first lesson of crashing and burning.


    NOTE: You WILL crash. Let''s learn how to crash quickly, survive, and get back
    to flying!'
  trans: '

    # 故事板视图控制器、iOS4 及其编程式创建


    学生和网友们问我最多的问题是，故事板是否兼容 iOS4。我不明白为什么这么多人想了解这一点。向前看，拥抱新技术，不断迈向新领域才是正途。但答案是：不！故事板从未兼容过，将来也永远不会兼容
    iOS4，因为它们基于仅在 iOS5 和 Lion 中可用的新运行时类。其次最热门的问题是，是否可以编程操作故事板。嗯，让我想想，这几乎就像是在说：“好吧，我有一辆能开的车，但我能不能下车去推它？”


    我无法理解为什么这么多人想要改变它，或者试图深入探究其内部机制。如果你已经精通故事板，并发现了需要绕过的巨大缺陷，那我可以理解。然而，就我撰写本文之时，故事板问世并不久，而那些一个故事板应用都没做过的人就想知道能否改变它。尽管如此，我还是会回答这个问题，因为等到这本书出版时，或许后一种情况会适用。


    要回答这个问题，你需要从运行时的角度来审视故事板。视图控制器之间的转换（transitions）和转场（segues）应在运行时中查看。在这里，你将会注意到，确实存在一种机制可以通过编程方式实例化转场。


    *   首先，要了解如何通过编程方式修改现有的转场，你需要查看当前视图控制器与目标视图控制器之间的代码。在这里，你可以使用 `UIViewController`
    的 `performSegueWithIdentifier:sender:` 方法，以编程方式触发你的转场。

    *   其次，如果你的视图控制器之间没有定义转场，但你在故事板文件中定义了目标控制器，那么你很幸运。你可以使用 `UIStoryboard` 的 `instantiateViewControllerWithIdentifier:`
    方法，通过编程方式加载视图控制器。之后，只需将其推入导航堆栈即可连接该控制器。警告——不要尝试通过 Interface Builder 访问它。我见过一些学生的
    Mac 电脑因此完全崩溃。

    *   最后，如果你的故事板没有连接到目标视图控制器，你可以通过编程方式创建它，不过作者尚未在 Apple 开发者网站上对此进行深入探讨。但这一功能确实存在——我不知道你为什么要这么做，但它确实存在于《iOS
    视图控制器编程指南》中。


    如果你确实想理解故事板，请务必记住两件事：


    *   第一，它继承并遵循 `NSObject`。

    *   第二，其框架位于 `/System/Library/Frameworks/UIKit.framework`。


    我想让你理解的关键问题是，现在，你可以利用你对故事板已有的了解无休止地进行编程。牢记基础，并真正理解这些基础。忘掉用编程方式操控故事板这件事。按原样使用它，并理解其基础知识。


    你必须了解的故事板的第一个基本功能是，它们都需要从一个初始视图控制器开始，该控制器代表你应用的起点，并连接到你的用户界面。这将是用户看到的第一个屏幕。在你的案例中，它是“我的故事视图控制器”（My
    Story View Controller）。如果遇到 bug，你可能需要检查你到另一个故事板文件（即在应用的 `Info.plist` 文件中通过 `UIMainStoryboardFile`
    键指定的文件）中初始视图控制器的转换。这个初始视图控制器会在程序启动时自动加载并显示。


    ## 在接下来的章节中


    在第 8 章中，我们将带你进入调试的世界。我们将首先从宏观角度审视调试领域。我们将讨论一些令人望而生畏的调试工具，它们的含义，你将来何时可能用到调试，以及最重要的——你现在如何使用一个非常简单的工具进行调试。


    你将学会如何找出你在之前章节所写代码中的 bug。但更重要的是，你将拥抱调试的艺术，而不是将其视为一个无尽、无望、深不见底的深渊。


    前进吧，向着下一章中等待我们的 bug！


    # 第 8 章


    # 调试


    当你开始学习第八章时，你将在一个更高的层次上运作。你可能会注意到，在这一章中，我采用了不同的方法来教你调试。为了让你理解为什么这是一章重要的内容，我希望你回顾一下促使我编写本章及其练习的历程。


    那么，调试到底有什么难的？


    1988 年，在波兹曼的蒙大拿大学，我迎来了人生中的第一堂计算机科学课。偶尔走出电气工程大楼，去软件领域小试牛刀，感觉很有趣。我们常常会冲过去——有时是在零下
    20 度的刺骨寒风和令人目眩的暴雪中——穿过校园广场，到达计算机科学楼。在我学习 Pascal（一门古老的语言，我们曾用来配合 FORTRAN 学习，以便最终掌握
    C 编程语言，这在波兹曼对所有极客来说是必须掌握的）的课堂上，发生了一件奇妙的事。


    我当时正试着编译一个课堂练习。但那天，每次我尝试编译代码时，黑屏上那些发着绿光的数字都会显示错误信息。在那个年代，它不会提示发生了多少个错误，也不会告诉你错误是什么或在哪里。它只会说：“错误：编译失败。”
    我无法修复它，于是我对计算机科学的热爱开始急剧下滑。看到我如此沮丧，助教立刻走到教室前面，用尖锐而响亮的声音引起了所有人的注意，并宣布：


    > 听着，同学们。我不想看到你们像那边的罗里一样变得奇怪和沮丧。你们的代码永远不可能第一次就编译成功！！听到没有？你们的代码永远不可能第一次就编译成功，所以，接受这个事实吧！


    我永远不会忘记那一刻——尤其是现在，我看到那么多年轻的计算机科学和工程系学生在大一学年，就在遇到调试和数组问题时退学了。


    我还记得一件事，小时候在我出生的地方——南非德班，我叔叔告诉我的。当时他正在教我如何在汹涌危险的海浪中冲浪。他说，如果我想驾驭十到二十英尺的海浪，首先必须学会如何“被浪打翻”。


    > 罗里……你一定会被浪打翻。你一定会被按在水下 15 到 20 秒，所以，学会如何在巨大的翻覆中生存下来是至关重要的。这样，你在那里才会无所畏惧！


    哇！我简直不敢相信，我花了这么多年才将这两个相似的情景及其教训联系起来。在那之后，我开始让我的学生回到他们确信自己能驾驭的代码中，并让他们在代码中故意引入错误。然后，我让他们把代码交给搭档，互相指导，逐一对对方的代码进行调试。多年来，调试工具也在不断发展。事实上，调试工具本身已经变得非常复杂，令学生望而生畏。考虑到这一点，我为你们创造了一个过渡，让你们学会热爱调试，并受到启发去学习更复杂的调试工具。你们正处在一个将编写比以往任何时候都多的代码的阶段。你们一定会遇到错误，我希望你们能够应对这些艰难时刻。这就是为什么我要教你们崩溃与燃烧的第一课。


    **注意**：你一定会崩溃。让我们学习如何快速崩溃、生存下来，并重新振翅高飞！

    '
- fmt: '### Xcode''s Debugging Landscape


    When you look at the debugging landscape, you will see a simple tool standing
    alone among a bunch of complex-looking debugging programs. In this chapter, I
    am going to use the simple debugging tool to teach you how to find a bug in the
    code you have written. In the section entitled "Digging the Code," I will elaborate
    on the more difficult but very much stronger debugging tools—I''ll essentially
    bring them to your attention and introduce you to how they work, when to use them,
    and how to learn more about them when you reach a point in coding that is outside
    the domain of this book.


    ### Xcode''s Tools


    Before you get started, I want to talk about some of the more advanced, sometimes
    intimidating debugging tools that we will dismiss for now and check back on later.
    Xcode has steadily been building up its debugging tools, and provides a very powerful
    set of debugging environments you can use to find bugs and kill them in a way
    that will not harm your code with careless extraction. In "Digging the Code,"
    we''ll take these tools on a test drive with some images for reference. For now,
    I''ll just briefly introduce them to you.


    > **NOTE:** For Xcode debugging tools to work, you must make sure that you install
    the iOS SDK corresponding to the iOS release that you have running on your Mac.
    If they do not match, debugging will not work. For example, if you have a device
    running iOS 4.2, but you do not have the corresponding SDK installed on your computer—you
    will not be able to debug.


    #### Xcode''s Tools: Text Editor


    The first tool is the text editor that gives you the ability to debug code directly
    within the lines, as you may have noticed when your code does not compile and
    all those little red exclamation signs pop up all over it! Text editor allows
    you to add and set breakpoints; keep tabs on your "call stack"; access the value
    of variables by hovering the mouse pointer over them; execute just a single line
    of code; and step into, out of, or over function or method calls.


    #### Xcode''s Tools: Debugger Window


    The second tool that comes along with Xcode is called the "debugger window." When
    you start to work with code that is really intense, or just lots of it, you will
    become friends with the debugger window, because not only does it provide all
    the same debugging features as the text editor using a traditional interface,
    but it allows you to see your "call stack" and the variables associated with it.
    Suppose you had a stack called `dog`, and your variables associated with that
    stack were `breed`, `sex`, `age`, and `name`. If upon looking at your stack, you
    only saw `sex`, `age`, and `name`, then you''d immediately know that `breed` was
    missing. This is a simple example analogous to saying that what NASA does is shoot
    big pieces of metal into space, sometimes with people in them. The debugger window
    is a cool, powerful instrument you may come to really appreciate one day.


    #### Xcode''s Tools: GDB Console


    The third tool, called the GDB console, comes wrapped in the Xcode IDE. It is
    a text-based GNU debugger with more functionality than the debugger window and
    a decent GUI that makes it easier to step through your code. In my experience,
    when you see coders on the GDB console flying through iterations at lightning
    speed, it usually means that they have been on GDB for a while. That, in turn,
    means that the coder is either at the Über-Geek or Superkalifragilistic-Geek level!


    #### Xcode''s Tools: Console Output and Device Logs


    The fourth debugging environment provided in Xcode simply interacts with stuff
    that you already know goes on. I''m sure you''ve seen, when apps and programs
    sometimes crash, that the iOS on your Mac produces log entries to your console
    that indicate drill-down code when it crashes. You can produce console messages
    in your iOS applications, too. Coders will often go to the `NSLog` function, because
    these console logs helps coders debug at a lower level. The key phrase here is
    "lower level." If you wind up at an interview, they may ask you what you use to
    debug when you need to look for a bug that apparently exists at a lower level.
    You''re answer for this should be: "Of course, we all use the console output and
    device logs to see the lower level code via the `NSLog` functionality." Oh, yeah—they
    will love you!


    #### Xcode''s Tools: NSZombie


    The fifth debugging tool provided by Xcode works specifically for memory leaks.
    Before Xcode 4.2 we had to personally monitor what portions of our code were using
    our set amount of memory. When we were finished with one piece of code, we had
    to release the memory from that method or class so it could be used by the next
    section of code being executed. With this said, though, it''s important to know
    when to enable NSZombie on a section of code.


    Turning on `NSZombieEnabled` allows us to view logs that tell us the status of
    our memory—particularly our deallocated memory, as indicated below.


    ```

    2011-09-10 20:01:12. 8813 storyboard[2019:f2c] *** -[GSFont ascender]: message
    sent to

    deallocated instance 0x127910

    ```


    #### Xcode''s Tools: Shark


    The sixth debugging tool is quite popular and, like NSZombie, is specifically
    aimed at debugging memory leaks. The difference is that it''s relatively fun to
    play with the user-friendly shark GUI. Shark gives us access to system-level events
    like interrupts and virtual memory. You can see how each thread talks to other
    threads in your code, and if memory is dropped, leaked, or causes a "bottleneck"
    during that interaction. Shark is a tool you will likely see in your work with
    Xcode, so remember that name for now.


    #### Xcode''s Tools: Unit Testing


    The seventh and last tool provided by Xcode is what we call "unit testing." Unit
    tests comprise the platform or foundation of how an efficient project manager
    sets everything up on a huge coding project so that a suite of tests will run
    on each line of code as it is written to make sure everything works as expected.


    If a project manager does not use unit testing and finds that his or her 30-person,
    40,000-line Xcode project is not working… it''s almost too late to start debugging.
    Unit testing is typically used by larger, well run Xcode companies. Just know
    that if you get an interview with such a company, you should spend some time practicing
    unit testing examples: at the interview they WILL ask you if you have unit testing
    experience, and it will be awesome to say "Yes, dude! I''m all over unit testing."
    Hmm, that may not be the best response, but you get the idea. Unit testing is
    way out of the scope of this book, but I will introduce it to you later, just
    so you can say you''ve all met each other!'
