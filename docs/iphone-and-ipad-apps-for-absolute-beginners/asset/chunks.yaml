    }\n```\n\n这两行代码基本上等同于你在第14和15步中对实用工具视图所做的更改。主要区别在于，第14和15步是在开发时直接在nib文件中设置这些属性，而你现在编写的代码是在项目编译到设备上之后，在运行时设置这些属性。你将在本章的“深入代码”部分更详细地了解编译时和运行时的区别。\n\
    \n![images](images/00215.jpg)\n\n**图6–23.** 是时候为第二个视图编写一些代码了。\n\n23\\. 完成后，将[图6-23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos486942)与你的代码进行比对；它们应该看起来相似。你现在可以关闭第二个视图了。\n\
    \n### 添加按钮\n\n你想制作一个链接到apress.com网站的按钮——仅用于说明如何在你的视图中包含代码。\n\n![images](images/00216.jpg)\n\
    \n**图6–24.** 将一个按钮拖拽到第一个视图上。\n\n24\\. 让我们在第一个视图上执行此操作：打开`FirstViewController.xib`文件，并将一个按钮拖拽到我雨中行走的图片上，如[图6-24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos487831)所示。别忘了在按钮中输入一些文本。你可以将这个带你到Apress网站的按钮命名为“Apress\
    \ Web Site”。你可以根据喜好给按钮起任何名字。\n\n![images](images/00217.jpg)\n\n**图6–25.** 从按钮按住Control键拖拽到你的头文件中。\n\
    \n25\\. 你已经多次将按钮从nib文件拖拽到头文件中，所以我现在只需要说：打开助理编辑器，然后按住Control键将一个输出口拖拽到你的头文件中，如[图6-25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos488570)所示。看看你有多聪明！\n\
    \n![images](images/00218.jpg)\n\n**图6–26.** 将默认的输出口更改为动作（Action）。\n\n26\\. 你知道如果按钮要执行一个动作，它就不能是输出口。因此，如[图6-26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos489202)所示，将默认的输出口更改成一个动作。\n\
    \n![images](images/00219.jpg)\n\n**图6–27.** 将动作命名为“goToApress”。\n\n27\\. 你希望这个动作在用户点击按钮时将用户带到apress.com。你需要给这个动作按钮一个名字，所以我们将其命名为`goToApress`，如[图6-27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos489769)所示。完成后，点击“Connect”或按下Return键。"
  raw: '15\. As shown in [Figure 6–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos478495),
    you can now see `PIC01` being displayed on the view, and you should now see either
    `PIC01,` if you downloaded it from my site, or your own first image. You know
    the image is the correct dimension for a tabbed view, but it''s still a good habit
    to line it up to the top or bottom, so that it fits exactly. In [Figure 6–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos478495),
    one can see Brian selecting a View Mode, placing `PIC01` at the top of the screen.
    I typically place it at the bottom. It makes no difference if your images are
    perfectly sized. This is your choice, though, so get into the habit of selecting
    a view mode that pleases you. I usually choose the bottom alignment because I
    don''t want to cut off the bottom of the image. The other content view modes,
    and what they mean, are described in more detail later in the chapter.


    ![images](images/00208.jpg)


    Figure 6–16\. Run it and see what happens.


    16\. Let''s see what you have now. As expected, you can see in [Figure 6–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos479746)
    that the first tab looks exactly like the way you''ve set it up in Interface Builder.


    ![images](images/00209.jpg)


    Figure 6–17\. Second View still looks the same.


    17\. Of course, you haven''t changed anything on the second tab. Select Second
    View and see that, as expected, it still looks exactly the same as shown in [Figure
    6–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos480287). Let''s add
    an image to this tab, but instead of telling Xcode which image to load directly
    in Interface Builder, you can write a couple of lines of code that load the image
    when the tab is shown.


    ![images](images/00210.jpg)


    Figure 6–18\. Control-drag a connection from your icon in Interface Builder into
    your header file.


    18\. Let''s start by fixing up the Second View in exactly the same way you dealt
    with the first view. Select Second View in the Navigator and get your workspace
    set up. Again, select each label and delete it from the interface so that you
    have a clean UIView. This is illustrated in [Figure 6–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos481036).


    ![images](images/00211.jpg)


    Figure 6–19\. Open the `SecondViewController.xib` and drag a UIImageView into
    the interface.


    19\. You now need to work on the Second View. So open up the `SecondViewController.xib`
    and drag a new image view (UIImageView)into the interface just as you did for
    the first view in [Figure 6–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos476699),
    except now you are resizing the boundaries, as illustrated in [Figure 6–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos481769).
    Note that up to this point you haven''t done anything differently. However, instead
    of using the Attributes Inspector to set the image and Content View Mode, you''ll
    now do something a little different.


    ![images](images/00212.jpg)


    Figure 6–20\. Open the Assistant Editor.


    20\. Pull up the Assistant Editor to show the header (`.h`) file that corresponds
    to your `SecondViewController.xib` file. This will allow you to indicate to Xcode
    how you wish to communicate between your code (which you''ll write in a minute)
    and the interface that you''ve just finished designing. This is illustrated in
    [Figure 6–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos482723).


    ![images](images/00213.jpg)


    Figure 6–21\. Control-drag an outlet into your header file.


    21\. Control-drag from the UIImageView in the main drawing area to anywhere between
    the `@interface` and `@end` directives. As shown in [Figure 6–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos483459),
    Xcode will display a translucent message reading “Insert Outlet or Outlet Collection.”
    Outlet Collections are a more advanced topic, but you''ve seen Outlets before
    and that''s exactly what you''re looking for.


    ![images](images/00214.jpg)


    Figure 6–22\. Name the outlet “myImage.”


    22\. Upon letting go of the mouse button and completing the control-drag, Xcode
    presents you with a popover to get some additional information. You''ve already
    determined you want an Outlet, so all that remains is to give it a name, say “myImage,”
    as illustrated in [Figure 6–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos484237).


    #### Coding the Second View


    Now let''s write some code to make use of this new Outlet. To do so, select the
    file `SecondViewController.m` in the Navigator and find the method definition
    for `viewDidLoad`. It should look something like this:


      `- (void)viewDidLoad`

    `{`

    `[superviewDidLoad];`

    `// Do any additional setup after loading the view, typically from a nib.`

    `}`  


    Add the lines in bold below, so that the method reads as follows (be sure to change
    `myImage` appropriately if you named your Outlet something different). Unless
    you named your image `PIC02,` you will have to change the text in quotes to the
    name of your image (without the “`.png`”):


      `- (void)viewDidLoad`

    `{`

    `    [superviewDidLoad];`

    `// Do any additional setup after loading the view, typically from a nib.`


    `    [myImagesetImage:[UIImageimageNamed:@"PIC02"]];`

    `    [myImagesetContentMode:UIViewContentModeBottom];`

    `}`  


    These two lines of code are more or less equivalent to the changes you made in
    the Utilities View in Steps 14 and 15\. The primary difference is that Steps 14
    and 15 set these attributes directly in the nib file at development time, while
    the code you''ve just written sets these attributes at runtime, after the project
    has already been compiled onto our device. You''ll look at the distinction between
    compile-time and runtime a little bit more in this chapter''s “Digging the Code”
    section.


      ![images](images/00215.jpg)  


    Figure 6–23\. Time to write some code for the Second View.


    23\. When this is done, check [Figure 6–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos486942)
    against your code; they should look similar. You can now close the Second View.


    #### Adding a Button


    You want to make a button that links up to the apress.com site—just for illustrative
    purposes of how to can include code in your view.


      ![images](images/00216.jpg)  


    Figure 6–24\. Drag a button onto the First View.


    24\. Let''s do this on the First View: open up the `FirstViewController.xib` file
    and drag a button onto the image of me walking in the rain, as shown in [Figure
    6–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos487831). Don''t forget
    to type some text into the button. You can call the button that will take you
    to the Apress web site “Apress Web Site.” You can name a button whatever you like.


      ![images](images/00217.jpg)  


    Figure 6–25\. Control-drag from the button into your header file.


    25\. You''ve dragged so many buttons from nib files onto header files that all
    I need to say at this point is open the Assistant and control-drag an outlet onto
    your header, as illustrated in [Figure 6–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos488570).
    See how smart you are!


      ![images](images/00218.jpg)  


    Figure 6–26\. Change the default Outlet to an Action.


    26\. You know that if the button is going to perform an action then it cannot
    be an Outlet. Therefore, as illustrated in [Figure 6–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos489202),
    change the default Outlet to an Action.


      ![images](images/00219.jpg)  


    Figure 6–27\. Name the Action “goToApress.”


    27\. You want this Action to take a user to apress.com when they hit the button.
    You need to give the Action button a name, so let''s call it `goToApress,` as
    illustrated in [Figure 6–27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos489769).
    Once done, click Connect or press Return.'
