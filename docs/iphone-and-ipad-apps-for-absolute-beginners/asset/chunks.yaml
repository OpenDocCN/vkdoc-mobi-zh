    the Attributes dialogue in your Utilities pane, as shown in [Figure 5–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos362274).
    Select the `luluIcon.png` to associate it with your second `UIImageView`.


