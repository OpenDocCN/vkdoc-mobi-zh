    ## 关于合著作者


    ![image](img/00004.jpg)本·伊斯顿毕业于华盛顿与李大学，获哲学学士学位。他涉猎广泛，涵盖音乐、银行业、帆船运动、悬挂式滑翔和零售业。他的大部分工作经历都与某种形式的教育相关。本曾执教
    17 年，主要教授初中数学。最近，作为软件培训师和实施顾问的经历重新唤醒了他长久以来对技术领域的热情。作为一名自由撰稿人，他撰写过多篇科幻故事和剧本，以及为杂志和通讯供稿的特写文章。本现居德克萨斯州奥斯汀市，目前正在创作他的第一部小说。


    ![image](img/00005.jpg)布赖恩·帕克斯，计算机科学博士生，与硕士生安东尼·马吉在科罗拉多大学科罗拉多斯普林斯分校（UCCS）与刘易斯博士合作，协助研究了测试版
    Xcode 的多个版本。


    布赖恩是科罗拉多大学科罗拉多斯普林斯分校计算机科学博士项目的学生，期间常与特伦斯·博尔特博士和罗里·刘易斯博士合作。他在宾夕法尼亚州利哈伊大学获得计算机科学学士学位。布赖恩专精于软件设计与开发技术，尤其关注软件工程与架构，特别是数据驱动型应用。同时，他也是一位教育者和学者，专注于软件工程与设计，以及近期研究的计算机组成和汇编语言编程，其研究重心是计算机视觉及其与心理学视觉理论的关联。


    安东尼目前在科罗拉多大学科罗拉多斯普林斯分校攻读计算机科学硕士学位（即将完成），他也在该校获得了学士学位。安东尼在软件设计与开发方面经验丰富，并在其职业生涯中主导了多款软件应用的实施与发布。因学术及个人兴趣，他专攻多个领域，包括理论与应用数学、软件设计、用户界面设计、计算机科学教育、计算机视觉等，且涉猎范围仍在不断扩展。


    布赖恩和安东尼是 Synapse Software 的管理合伙人。


    ## 关于技术审稿人


    ![image](img/00006.jpg)马修·诺特是一名学习平台开发人员及 SharePoint 专家。他从小就开始编程，此后从未停止学习。作为一名经验丰富的
    C 和 C#开发者，马修最近开始开发 iOS 应用以推动学习平台的移动化。他与妻子、两个孩子居住在英国威尔士，并时常在自己的博客（`mattknott.com`）上撰写文章。


    ## 序言


    ### 本书能为你带来什么


    直说吧：你想学习如何为 iPhone 或 iPad 编程，并且自认为相当聪明——但每当你阅读计算机代码或高度技术性的指导说明时，你的大脑似乎就停摆了。阅读晦涩难懂的指令时，你是否会两眼发直？是否有个声音在脑中责备你：“怎么样！你的大脑六行前就关机了，但你还在假装浏览页面——假装自己不像感觉的那么迟钝。真棒！”


    看看你是否能感同身受……你遇到了一个相当技术性的问题，决定用谷歌搜索并排除故障。你打开排名第一的结果，发现别人也问了完全相同的问题！页面加载时你兴奋起来，但，唉，那只是一个论坛（一个让那些用难以理解的代码互相交谈的极客们的聊天站点）。你看到你的问题后面跟着……但为时已晚！你的大脑已经停摆，你感到紧张和沮丧，仿佛肚里打了结。


    ### 听起来很熟悉？


    是吧？那么这本书就是为你准备的！我猜你现在可能站在书店或机场，浏览着报刊亭，想找点能让你兴奋的东西。因为你是在这种高档场所读到这里，所以你可能买得起 iPhone、Mac、汽车和机票。你或许正被手持设备这个蓬勃发展的行业，以及内存和微处理器呈几何级数进化的速度所吸引……被“想法如何能迅速转化为全新的计算平台、强大的软件应用、实用的工具和巧妙的游戏……甚至转化为金钱”所吸引。现在，你正想知道自己是否能参与其中——运用你的才智和技术悟性为大众服务。


    ### 我如何知道这些关于你的事？


    很简单！经过多年教授学生编程的经验，我知道如果你还在这里读下去，那么你既足够聪明，又有足够的动力踏入编程领域，尤其是为了像 iPhone 这样迷人、或像 iPad
    这样性感的设备编程。如果你对上文描述的那个人有认同感和关联感，那么我了解你。我们很久以前就已经互相认识了。


    你是一个聪明人，即使你有一定的编程背景，在阅读复杂代码时也可能会头脑抽搐。而且，即使你在各种编程语言方面有相当扎实的基础，你也是一个只想寻求一种简单、精准、无虚饰的策略来学习如何为
    iPhone 和 iPad 编程的人。没问题！我能引导你走出你通常经历的各种心理障碍，并帮助你绕开任何（无论真实或想象中的）技术障碍。我已经对我的学生这样做过上千次了，我的方法对你也会有效。


    ### 我采用的方法


    我不会试图解释每一个微小的细节。我也不会期望你在现阶段就知道 iPhone/iPad 应用中的每一行代码。我要做的是，一步一步地向你展示如何实现关键操作。我的方法既全面又轻松，并且我为自己能够指导知识基础和技能水平跨度极大的学生与有兴趣的学习者而感到自豪。


    本质上，我会带领你，按照你自己的节奏，到达一个你能编码、上传、或许还能出售你的第一个 iPhone/iPad 应用（无论简单还是复杂）的程度。好消息是：下载量最大的应用并不复杂。最受欢迎的是那些简单、实用的生活工具……比如在停车场找到你的车、制作更好的购物清单、或追踪你的健身进展。不过，当你完成本书的学习后，你可能想要进阶到
    Apress 和 Friends of ED 系列的其他书籍。你在这里有很多选择，在后面的路途中，我会就最佳的前进方向给你建议。但现在，你可能想多了解我一点，以便有信心让我担任你在这个激动人心的应用冒险中的引路人。


    愿你进入这个神奇而美妙的世界时，体验到巨大的喜悦与成功。


    和平！


    ![image](img/00007.jpg)


    罗里·A·刘易斯博士，法学博士


