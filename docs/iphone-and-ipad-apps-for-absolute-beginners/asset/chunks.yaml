    and iOS SDK.mpkg`，如[图1–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos75665)中箭头所示。


    ![images](images/00023.jpg)


    **图1–16.** 点击“Xcode and iOS SDK.mpkg”图标。


    11. 一旦你点击了`Xcode and iOS SDK.mpkg`图标，一个安全验证窗口将打开。点击“Continue”按钮，如[图1–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos76705)中箭头所示。接下来，你将看到“Install
