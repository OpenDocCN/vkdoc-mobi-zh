  trans: "\n##### 第五步：关闭键盘\n\n当用户输入姓名并点击“完成”按钮后（参见图 3-12 的右侧图片），你需要添加一小段代码来确保键盘被关闭。\n\
    \n你可以通过实现一种名为`textFieldShouldReturn`的特殊委托方法来实现这一点。现在，你无需担心委托、第一响应者等概念。你只需要知道，这段代码会重新指定第一响应者，也就是你的键盘和当前处于活动状态的文本字段（用于输入姓名），然后将其保存在你的工具包中，以便在你需要清除键盘时重复使用。\n\
    \n```\n- (BOOL) textFieldShouldReturn:(UITextField *)theTextField{\n    [textBox\
    \ resignFirstResponder];\n    return YES;\n}\n@end\n```\n\n好了！你的代码部分完成了！\n\n我希望你为自己感到自豪！你让我引导你穿越了\
    \ Objective-C 代码的一些险滩。即使你感觉自己并未完全搞懂这些代码，那也没关系。Objective-C 是一门极其困难的语言，而你能坚持读到此处，已经非常了不起了。请记住，随着你做得越来越多，一切都会融会贯通，变得得心应手。对于那些已经按照我呈现的方式理解了你目前所完成工作的人，恭喜你们！\n\
    \n![images](img/00101.jpg)\n\n**图 3-30.** 编写委托方法 `textFieldShouldReturn`。\n\n\
    图 3-30 展示了已完成按钮方法和正在借助 Xcode 代码补全功能输入的 `textFieldShouldReturn` 方法。完成后，你的编码工作就结束了。耶！\n\
    \n![images](img/00102.jpg)\n\n**图 3-31.** 确保你将运行到正确的目标。\n\n首先，确保你已经保存了所有内容。现在，如果你上次是将应用运行到你的\
    \ iPad 或实体 iPhone 上，那么你需要确保将“目标”更改为 iPhone 模拟器，如图 3-31 所示。\n\n![images](img/00103.jpg)\n\
    \n**图 3-32.** 让我们运行它！\n\n你在这一章付出了很多努力，现在是时候看看你的劳动成果了。点击“运行”按钮，如图 3-32 所示，让我们看看你的应用启动起来！\n\
    \n![images](img/00104.jpg)\n\n**图 3-33.** 应用的四种状态。\n\n如果你使用的是自己的图片，那么你的背景图里会显示你的图片。从图\
    \ 3-32 的左侧开始，向右移动：\n\n1.  第一张图片显示的是提示用户输入姓名的文本框。\n2.  一旦点击文本框，文本消失，键盘出现。\n3. \
    \ 第三张图片显示了用户点击“完成”按钮后的应用状态。\n4.  最后一张图片展示了你所有辛勤工作的最终成果，当用户点击“点我”按钮时就会出现。恭喜你！\n\
    \n### 深究代码\n\n在这些回顾中，我们将重温一些我们写过的代码，我会引用熟悉的代码，并更详细地解释这些过程。在这里，我将向你介绍一些更专业的术语，你将在后续章节以及与其他程序员交流时用到它们。\n\
    \n考虑一下这个类比：在 `helloWorld_01` 和 `helloWorld_02` 中，我教你如何上车、点火、踩油门、以及在前行时掌握方向盘。在\
    \ `helloWorld_03` 中，我给了你类似的指引，但当你驶向目的地时，我解释了汽车是如何混合动力工作的，它既有汽油部件，也有电力部件。我们讨论了类和方法、字符串、输出口和动作。\n\
    \n现在你已经到达了目的地；你已经完成了 `helloWorld_03`，我将打开引擎盖，向你展示当你踩下油门时，它是如何将汽油泵入发动机，或者有时是如何使用电动机的。当你查看引擎盖下时，我会告诉你这些部件的位置。然而，当你读到本书末尾，查看引擎盖下并深究代码时，我将会描述化油器喷射到活塞中的汽油量、电动机的确切扭矩和热量散发等等。猜猜看——你到时候就能应付自如了！\n\
    \n关于这一节，最后一点非常重要：“深究代码”这一节，我鼓励你阅读，但不求完全理解。即使你只理解了部分内容，也没关系。当然，如果你碰巧完全掌握了该主题的所有细节，那当然很好。然而，我建议你以轻松的心态阅读每章结尾的这些章节，因为：\n\
    \n-   我收到了本书第一版读者的数百封邮件，他们表示，知道可以在阅读时放空大脑，不必有理解代码的压力，这对他们来说真的很有帮助。\n-   此外，我的学生们也很喜欢我在每堂课结束时，让他们关掉\
    \ Mac，放下笔，进入禅定和放空状态，只是随意地听我讲解。曾有学生敲开我办公室的门，用各种生动的方式告诉我，这种“禅定”和“放空”的方法对他们真的有效。\n\
    \n请注意，我的研究领域是神经系统急性脑损伤，专攻大脑和神经互联性。这种先连接神经元，然后在大脑放松时注入更深层的关联连接的方法，是我多年来一直发展的。所以，我希望你能借鉴我先前读者和学生们对此事的看法，并吸收我的理论。\n\
    \n> **注：** 成为一名言辞流利、知识渊博、财务上成功的程序员，需要神经上的跨越。这种跨越发生在你的大脑处于吸收新数据的状态下，且下丘脑不会释放污染神经元建立新连接能力的焦虑激素，从而允许将逻辑和代码与本体论推理联系起来。\n\
    \n所以，放空你自己，进入禅定状态，以一种冥想般的、无所畏惧的心态去阅读。当那个声音说：“你根本就没理解”，你要说：“没关系，刘易斯博士说了可以这样，现在走开吧！”你将用这种禅定和放空的心态来阅读以下内容：\n\
    \n-   Nibs、Zibs 和 Xibs\n    -   实例与实例化\n-   方法\n    -   实例方法与类方法\n-   头文件\n- \
    \  检查器栏\n-   NSString 字符串\n-   内存管理\n"
- fmt: '# Nibs, Zibs, and Xibs


    Remember back in [Figure 3–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos173967),
    I instructed you to open your nib file. You could see that it was written “xib”,
    and to make it more confusing, a minority of coders call them “zib” files. Just
    ignore them, refer to xib files by pronouncing them as “nib.” At a recent conference
    in Denver, 360iDev for iPhone Developers, it was clear most of the presenters
    referred to `.xib` files as “nibs” not “zibs.” But no matter how we refer to them,
    it’s important for us to understand what’s going on with these files. What are
    they? Do we need them? Do you need to know how they work?


    Do you recall, from Step 5, [Figure 3–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos173967),
    how you opened Interface Builder view when you clicked on that nib file? It was
    here that you saw your view and began dropping and dragging items onto your View
    Design area. What’s going on here?


    It turns out that when you examine nib files at the level of Cocoa or Objective-C,
    you see that they contain all the information necessary to activate the UI (User
    Interface) files, transforming your code into a graphical iPhone or iPad work
    of art. It’s also possible to join separate nib files together to create more
    complex interactions, as you’ll see later in this book. But in order to follow
    along, you need to add two words to your vocabulary: “Instances” and “Instantiation.”


    - **Instances**: All the information that resides in these files is put there
    so that it can create an instance of the buttons, the labels, the pictures, and
    so forth that you’ve entered. This collection of commands is plonked down and
    saved into your nib files to become the UI. The code and the commands taken together
    become real, and they are sensed by the user—seen or heard, or even felt.

    - **Instantiation**: Remember in Step 29 and [Figure 3–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos202316),
    I explained that you can see that you have the method `- (IBAction)button:(id)sender{…}`,
    which looks pretty similar to the action instantiated when you dragged over an
    action connected to your button from the Interface Builder to your header file
    in [Figures 3–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos192579)
    through [24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos196589)? Well
    the term instantiate is sometimes used in a similar fashion when you first save
    a new project. The computer instantiates—makes real and shows you the evidence
    for—a project entity created by assigning it a body of subfiles. In `helloWorld_03`,
    you saw how in Step 27 I asked you to go over to your nib, header, and implementation
    files that were colored dark grey? Well excuse me, how did these files get here?
    Did you program them or make them? Nope, Xcode instantiated these when you created
    your project. Xcode gave your project “arms and legs”: two AppDelegate files and
    two ViewController files.


    > **NOTE**: You are now manipulating these arm and legs to do cool stuff that
    we call apps, and sell them on the iTunes store.


    We say that we’ve “created an instance” of something when we’ve told the computer
    how and when to grab some memory and set it aside for some particular process
    or collection of processes such that, when the parameters are all met, the user
    has an experience of this data (i.e., whatever was assigned in memory). Sometimes
    we refer to these collections or files of descriptions and commands as classes,
    methods, or objects. In this code-digging session, these terms might seem to run
    together and appear as synonyms, but this is not the case. As you read on, you
    will come to understand each term as a distinct coding tool or apparatus, each
    to be employed in a particular situation, relating to other entities in a grammatically
    correct way.


    When we say that you created an instance of the buttons and labels in your nib
    file, what we’re really saying is that, when you run your code, a specific portion
    of your computer’s memory, known by its address, will take care of things in order
    to generate the user experience you have designed. Each time your application
    is launched on an iPhone or iPad, the interface is recreated by the orchestrated
    commands residing in your nib files. Consider the nib file associated with the
    action depicted in [Figure 3–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos177832).
    You dragged a button from the Library into the View window, and thus you created
    an instance of this button. If somebody were to ask you what that means, you might
    look them in the eye, with a piercing and enigmatic look, and say:


    > > “By creating an instance of this button, I have instructed the computer to
    set aside memory in the appropriate `.xib` file, which, upon the launching of
    my app, will appear and interact with the user, precisely as I have intended.”


    Wow!


    ## Methods


    The next concept I would like to explore a little more deeply is that of methods.
    As I did with nibs, I am only going to give you a high-level look this time. You’ve
    already used methods pretty extensively, so I’m simply going to tell you what
    you did.


    Looking at [Figure 3–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos193238),
    after you dragged the button onto your header file, you changed it from an outlet
    to an action and clicked on the Connect button. Then you saw an instantiation
    of code appear:


    ```

    - (IBAction)button:(id)sender

    ```


    I then suggested that to make things clearer, you could have named the method
    `monkey`, making it become:


    ```

    - (IBAction)monkey:(id)sender;

    ```


    Here, you are instructing the computer to associate an action with a button.


    - The first symbol in this piece of code is a minus sign (`-`). It means that
    `monkey` is something we call an instance method.

    - On the other hand, if you had entered a plus sign (`+`) there, as in `+ (IBAction)`,
    we would have called it a class method.


    One symbol announces (to the processor) an instance, while another symbol announces
    a class. What these two statements have in common, though, is the method `monkey`.
    Furthermore, just by the name alone, you can see that this is an action that will
    be performed in Interface Builder. Yup, that’s what that `IB` in front of the
    `Actions` means. See how Steve Jobs was really saying to himself when he designed
    Cocoa and Objective-C on his NEXT computers, that he wanted `Actions` and called
    them `IBActions`, so as to remind himself and other coders who used his code that
    when we typed in `IBAction` it was for `Actions` used in Interface Builder.


    Consider this analogy: a programmer says, “Here comes an app that will assist
    you in drawing a nice, pretty house.” That is a header type of announcement. Then,
    the programmer enters specific instructions for how the house will be constructed,
    how it will sit on/against the landscape, what kind of weather is in the background,
    and so on. “Draw a slightly curving horizon line one third from the bottom of
    the display, and midway on this, place a rectangle that is 4 × 7, on top of which
    is a trapezoid with a base length of…,” and so on. These specific, how-to instructions
    belong in the implementation file, for they describe the actual actions—the method—of
    drawing the house.


    So, to connect your button to a method named `hello`, you added this code as shown
    in [Figure 3–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos196589):


    ```

    - (IBAction)hello:(id)sender;

    ```


    This created an instance of your `hello` method. Then, you created a place in
    memory to execute the code inside your `hello` method.'
