    ![images](images/00172.jpg)


    Figure 5–22\. Keep the icon as an outlet and name it “`myBackground`.”


    22\. As depicted in [Figure 5–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos372905),
    when you reel the fishing line into your `@property`, keep it as an outlet and
    name it `myBackground`.


