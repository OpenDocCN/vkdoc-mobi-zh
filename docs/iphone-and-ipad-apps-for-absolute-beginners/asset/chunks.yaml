- fmt: '#### Connecting to the Code


    OK, you are now through with dragging objects from the Library onto the View Design
    area. Let’s connect these objects to your file’s owner, so you can associate it
    with code.


    ![images](images/00084.jpg)


    **Figure 3–15.** Open the Assistant Editor.


    15\. One of the really cool properties of Xcode 4 is that in the "olden" days,
    when Xcode first came out, you had to enter `Control + Command + Up Arrow`(^![Images](images/00031.jpg)↑)
    or `Control + Command + Down Arrow` (^![Images](images/00031.jpg)↓) to zip back
    and forth between files that the clever people at Apple knew we would want to
    switch between. These connected pages and files are called counterparts, but you
    don’t have to know that because in Xcode 4, the Assistant Editor figures out cool
    ways to plop them all there on the screen for you. Right now, you should start
    connecting code with all of the goodies that you have brought onto the View. So,
    go to the Editor Selector with your mouse, as shown in [Figure 3–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos184020),
    and select the Assistant Editor, which looks like the chest of a person wearing
    a tuxedo. Here you’ll see how the layout changes. Just for fun, you may want to
    select the button immediately to the left of the Assistant Editor, called the
    Standard Editor, and you’ll see that now you have one screen—just like in the
    old days. Anyway, with the Assistant Editor selected, let’s move on.


    **NOTE:** You can also use keyboard shortcuts to open up the Assistant Editor
    Option, `Command + Return` (![Images](images/00085.jpg)![Images](images/00031.jpg)![Images](images/00086.jpg))
    and `Command + Return` (![Images](images/00031.jpg)![Images](images/00086.jpg))
    to open up the Standard Editor. There are thousands of keyboard shortcuts; some
    make it into superstardom and some never make it out of books and blogs. These
    two shortcut keys are being mentioned because even though Xcode 4 is still young,
    I’m seeing myself and others starting to use these two commands naturally.


    ![images](images/00087.jpg)


    **Figure 3–16.** Control-Drag a connection from your text box in Interface Builder
    directly into your header file.


    16\. As you can see, you''re back at a familiar screen that shows Interface Builder
    with your header file centered in the middle. Here you want to associate Outlets
    and Actions with the buttons and labels you dragged onto the View Design area.
    The last two times you did this, you were told to drag from this to that. Now,
    however, you are going to use a little bit more of the correct nomenclature, so
    that you can sound a little more geeky. Click once inside the text box, and then
    control-drag from the text box to your header file, placing it between the two
    curly braces. If you were to control-drag over to an invalid destination then
    Xcode would not display the insertion indicator, which is shown in [Figure 3–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos186389).


    ![images](images/00088.jpg)


    **Figure 3–17.** When the text box’s connection dialogue appears, specify what
    type of connection you plan to use in your code.


    17\. When you see the insertion indicator appear as you control-drag over to the
    area between the two curly braces, release the mouse button. Xcode displays the
    dialog box, where you will want to tell it that this needs to be an outlet, so
    don’t select anything as this is the default. This is illustrated in [Figure 3–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos187567).
    Later on, why this is done and what this Outlet stuff is all about will be explained.
    Right now, just make sure that you give it a name. In [Figure 3–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos187567),
    it was called `textBox`. Once this is done, click on the Connect button, and see
    how the Outlet code magically appears.


    ![images](images/00089.jpg)


    **Figure 3–18.** Control-drag a connection from your label in Interface Builder
    directly into your header file.


    18\. Click once inside the label and control-drag it into your header file, placing
    it below your `textBox` outlet, inside the two curly braces. Drag until you see
    the Display the Insertion indicator, as shown in [Figure 3–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos188671).


    ![images](images/00090.jpg)


    **Figure 3–19.** When the label’s connection dialogue appears, specify what type
    of connection you plan to use in your code.


    19\. Just as you did with the `textBox` when you made it an outlet, you want to
    do the same here when the label''s dialogue box opens. Leave it as an outlet on
    the top drop down and simply give it a name. In [Figure 3–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos189363),
    it was called "label." When you click Connect, it plants some very cool outlet
    code that you did not even have to program! So you have two lines of code that
    were automatically added: one when you dragged over the `textBox`, and the other
    when you dragged over the label. Both of these will be outlets. Are you thinking
    that the button, like the other ones, will be an action? This is correct. But
    getting back to these outlets—when you look at this code, without understanding
    everything, all you need to know about each of these lines of code, as seen in
    [Figure 3–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos189363),
    is the following:


    ```

    IBOutlet UITextField *textBox;

    ```


    This adds an outlet to a text box.


    ```

    IBOutlet UILabel *label;

    ```


    This adds an outlet to a label, just as you did in previous examples.


    ![images](images/00091.jpg)


    **Figure 3–20.** Control-drag from the button into your header file.


    20\. Click once on the button that says "Press Me" (as shown in [Figure 3–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos191187)),
    and control-drag towards the area below the `@interface` directive and its curly
    braces.


    ![images](images/00092.jpg)


    **Figure 3–21.** The insertion indicator now has three options.


    21\. Control-drag until you see the insertion indicator, as shown in [Figure 3–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos191777).
    Note that as you drag over to this area, Xcode already knows that this could be
    one of three options, not two, as shown in the insertion indicator for your label
    and text box outlets. See how this also includes a third option: "Action." Now,
    release the mouse button when properly located after the curly braces.


    ![images](images/00093.jpg)


    **Figure 3–22.** Open the drop down menu and change the type of connection to
    an Action.


    22\. The first thing you need to do here is change the connection type in the
    top drop down menu in the dialogue box from an outlet to an action. This is just
    like you did before with the outlet. See [Figure 3–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos192579).


    ![images](images/00094.jpg)


    **Figure 3–23.** Name this action "button" and click on the Connect button.


    23\. After changing this button from an outlet to an action, as shown in [Figure
    3–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos193238), you still
    need to name it. In [Figure 2-23](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos156653),
    it is named `button`. Now, click on the Connect button. You will now see code
    appear as follows:


    ```

    - (IBAction)button:(id)sender;

    ```


    **READ IT ALOUD**'
