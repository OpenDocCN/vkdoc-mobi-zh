- fmt: "### Set Buttons and Backgrounds to the Start State\n\nLet's look at how to\
    \ set all our buttons and backgrounds to their start state. This is to create\
    \ a clean slate before the program starts to run. In order to create a clean slate\
    \ in code, we need to set our state-changing variables to zero (or to `nil`).\
    \ We have three such variables that tell us whether a state has changes: `hasMoved`,\
    \ `hasShrunk`, and `currentBackground`. Remember that both `hasMoved` and `hasShrunk`\
    \ are Booleans, so they can either be `YES` or `NO`. The obvious start state for\
    \ these is that they have not been moved yet. So, we need to set both `hasMoved`\
    \ and `hasShrunk` to `NO`. This leaves us with `currentBackground`, which keeps\
    \ track of which one of our five wallpapers is currently in the background and\
    \ viewed by the user. Recall that we assigned `currentBackground` to be of type\
    \ integer. This is easy: we simply set it to zero. See the following bold print:\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    hasMoved = NO;\n\
    \    hasShrunk = NO;\n    currentBackground = 0;\n\n    // Create an array with\
    \ all our wallpapers inside of it\n    // Set how much the shrink button will\
    \ shrink the lulu fruit icon\n    // Set how much the move button will move the\
    \ lulu fruit icon\n    // Set the background image to the current background image\n\
    }\n```\n\n### Create Our Array with All Our Wallpapers Inside of It\n\nNow, we\
    \ need to create an array, which is just a list of things, and fill it up with\
    \ our wallpapers. The supernova geeky way to say this is as follows: \"We need\
    \ to create an `NSArray` object and initialize it with some objects of type png.\"\
    \ That's not too obtuse, is it? Recall that we did declare the array in our header\
    \ file. Often, students are so fearful of arrays that they forget to declare them\
    \ when they write their exam code. Recall in the header file we wrote `NSArray\
    \ *bgImages`, so we have declared an array and called it `bgImages`. Right away,\
    \ we know we need to write `bgImages = (the stuff that will make our array come\
    \ to life)`. There are many complex ways to use arrays, but we will use the plain\
    \ cheeseburger... or should I say... Apple methods using the `NSArray` initializers.\
    \ They are pretty much the same as the factory methods, only you do the allocation\
    \ yourself, which is in the form of `NSArray`.\n\n```\nname of your array = [[NSArray\
    \ alloc] initWithObjects: @\"your 1st object\", @\" your 2nd object \", @\" your\
    \ 3rd object \", nil];\n```\n\nThis looks all cluttered, so looking at the end\
    \ of it, you'll see that all your objects are separated by commas; then, we tell\
    \ the array it has ended by putting that `nil` at the end. Let's do two things\
    \ here. First, let's plug the real name of our array—`bgImages`—into the template,\
    \ and then we'll take the contents between these commas and place them onto their\
    \ own separate lines and see if this makes more sense.\n\n```\nbgImages array\
    \ = [[NSArray alloc] initWithObjects:\n    @\"your 1st object\",\n    @\"your\
    \ 2nd object\",\n    @\"your 3rd object\",\n    nil];\n```\n\nPretty cool, huh?!\
    \ This really spooky code is actually making sense to you! Yeah! OK, we're not\
    \ quite there yet though. We need to do one more thing before we bring this array\
    \ to life. We need to wrap our heads around the `UIImage` class reference, which\
    \ is an object the folks at Apple wrote to display images. Our objects are images,\
    \ but really, they are filenames that contain images. We need to use the `UIImage`\
    \ together with a method called `imageNamed` that returns image objects connected\
    \ to filenames. So, for each file name, we need to use `UIImage imageNamed`. I\
    \ have illustrated this as follows:\n\n```\nname of your array = [[NSArray alloc]\
    \ initWithObjects:\n    [UIImage imageNamed:@\"WallPaper_01.png\"],\n    [UIImage\
    \ imageNamed:@\"WallPaper_02.png\"],\n    [UIImage imageNamed:@\"WallPaper_03.png\"\
    ],\n    [UIImage imageNamed:@\"WallPaper_04.png\"],\n    [UIImage imageNamed:@\"\
    WallPaper_05.png\"],\n    nil];\n```\n\nWith that code, we have created an array\
    \ that contains our five images. All we need to do now is insert it into our code.\
    \ See the following bold print:\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    hasMoved = NO;\n    hasShrunk = NO;\n    currentBackground = 0;\n\n    bgImages\
    \ = [[NSArray alloc] initWithObjects:\n                [UIImage imageNamed:@\"\
    WallPaper_01.png\"],\n                [UIImage imageNamed:@\"WallPaper_02.png\"\
    ],\n                [UIImage imageNamed:@\"WallPaper_03.png\"],\n            \
    \    [UIImage imageNamed:@\"WallPaper_04.png\"],\n                [UIImage imageNamed:@\"\
    WallPaper_05.png\"],\n                nil];\n    // Set how much the shrink button\
    \ will shrink the lulu fruit icon\n    // Set how much the move button will move\
    \ the lulu fruit icon\n    // Set the background image to the current background\
    \ image\n}\n```\n\n### Set How Much We Will Shrink the Lulu Fruit Icon\n\nIt's\
    \ really easy to set how much we will shrink the lulu fruit icon when we press\
    \ the Shrink button. Remember when we discussed at the beginning of this chapter\
    \ how `CGAffine` is able to obey us when we instruct it to change our object's\
    \ position, angle, shape, scale, and so on? Well now we are going to use it. I\
    \ have randomly decided to shrink the lulu fruit icon by 25%. This means that\
    \ we need to tell `CGAffine` two things: first that we want to scale the image,\
    \ and second, how much we want to scale it on the x- and y-axes. We want to use\
    \ `CGAffine` to scale the stuff we use... hmmm... let's guess... Ah! how about\
    \ `CGAffineTransformMakeScale`? Yes! We're correct. Ok, now for the next assignment.\
    \ To scale the image by 25%, we need to scale both the x- and y-axes equally at\
    \ 0.25; but before we enter this into the code, remember in our header file we\
    \ created a variable called `size` of type `CGAffineTransform`? Well we need to\
    \ set the `size` variable equal to the 25% shrinkage we tell the `CGAffineTransformMakeScale`\
    \ code to perform. This is illustrated by the following:\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    hasMoved = NO;\n    hasShrunk = NO;\n    currentBackground\
    \ = 0;\n\n    bgImages = [[NSArray alloc] initWithObjects:\n                [UIImage\
    \ imageNamed:@\"WallPaper_01.png\"],\n                [UIImage imageNamed:@\"\
    WallPaper_02.png\"],\n                [UIImage imageNamed:@\"WallPaper_03.png\"\
    ],\n                [UIImage imageNamed:@\"WallPaper_04.png\"],\n            \
    \    [UIImage imageNamed:@\"WallPaper_05.png\"],\n                nil];\n    size\
    \ = CGAffineTransformMakeScale(.25, .25);\n    // Set how much the move button\
    \ will move the lulu fruit icon\n    // Set the background image to the current\
    \ background image\n}\n```\n\n### Set How Much We Will Move the Lulu Fruit Icon\n\
    \nIn the same way that we made `CGAffineTransformMakeScale` tell our `size` variable\
    \ to hold the amount we will shrink the icon, we will now use `Translation`. This\
    \ is a geeky way of saying how much we will make it travel across the screen in\
    \ `CGAffineTransformMakeTranslation` to tell the `move` variable we created in\
    \ our header file of type `CGAffineTransform` to hold the amount we want to move\
    \ it. I have randomly chosen to only move our lulu fruit icon up 100 pixels on\
    \ the y-axis. \"Up\" means we need to subtract pixels from the y-axis. We only\
    \ want to subtract 100 pixels on the y-axis and leave the x-axis alone (0, -100).\
    \ This is illustrated as follows:\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    hasMoved = NO;\n    hasShrunk = NO;\n    currentBackground = 0;\n\n    bgImages\
    \ = [[NSArray alloc] initWithObjects:\n                [UIImage imageNamed:@\"\
    WallPaper_01.png\"],\n                [UIImage imageNamed:@\"WallPaper_02.png\"\
    ],\n                [UIImage imageNamed:@\"WallPaper_03.png\"],\n            \
    \    [UIImage imageNamed:@\"WallPaper_04.png\"],\n                [UIImage imageNamed:@\"\
    WallPaper_05.png\"],\n                nil];\n    size = CGAffineTransformMakeScale(.25,\
    \ .25);\n    translate = CGAffineTransformMakeTranslation(0, -100);\n    // Set\
    \ the background image to the current background image\n}\n```"
