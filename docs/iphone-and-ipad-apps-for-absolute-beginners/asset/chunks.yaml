    ### Fix-it


    假设你继续使用`LLVM`编译器，`Fix-it`会在你输入时扫描源代码，并用红色下划线和边距中的红色标记标出语法错误。你可以通过点击该符号阅读`Fix-it`消息，它会提供认为可能存在语法错误的原因。通常，对于较小的错误，`Fix-it`会自动修复你的代码。


    ### Documentation


    接下来我要介绍的工具因其易用性而被广泛使用，那就是`Xcode`的文档。你只需打开`Organizer`窗口（![image](img/00031.jpg)![image](img/00032.jpg)2），点击工具栏中的`Documentation`按钮，然后点击跳转栏进行上下导航。参见图
    8–38。


      ![images](img/00351.jpg)  


    图 8–38\. `Organizer`


    `Xcode 4.2`还为`Xcode IDE`提供了在线帮助。可以通过点击文档导航器中`Xcode Help`旁边的展开三角形，或选择`Help` ![image](img/00027.jpg)
    `Xcode Help`来访问。你会发现这些在线帮助文档大多附有视频。你还需要知道，许多`Xcode`的帮助文章也可以作为上下文相关帮助使用，如苹果网站`bit.ly/oY2jG9`所述。这意味着，你可以通过按住`Control`键并点击工作区或`Organizer`窗口中的任何主`UI`区域，从快捷菜单中访问帮助教程。


    从`Xcode 4.2`开始，`Quick Help`比以往更加强大。现阶段我们只需按部就班地学习教程，但当你成长为一名程序员时，你会发现它的用处。按住`Option`键并单击即可打开`Quick
    Help`，如图 8–39 所示。


      ![images](img/00352.jpg)  


    图 8–39\. `Quick Help`


    ### Static Analysis


    `Xcode 4.2`中的`Static Analysis`允许你在工作区窗口内对代码进行分析、调试和编辑。只需在项目导航器中点击要调试的项目，然后选择`Product`
    ![image](img/00027.jpg) `Analyze`。分析器会遍历你的代码，然后导航器会打开一个列表，列出它发现的问题。带有箭头的蓝色矩形会指向你的错误。


    ## 本章前瞻


    在第 9 章中，你将学习为`iPhone`和`iPad`编写一个应用，该应用结合了`iOS5`的两大强大工具：`storyboarding`和`MapKits`。这是一个简单的应用，但背后却蕴含着巨大的教学和学习曲线。你要构建的应用只需在一个预先给定的经纬度位置上放置一个图钉。其关键点在于将`storyboarding`和`MapKits`连接起来。


    ## 第 9 章


    ## MapKit 与 Storyboarding


    自从构思这本书以来，我一直期待撰写关于`MapKit`框架和`Storyboarding`的章节。这一章以及接下来的两章将是我们共同努力的结晶。我们的旅程即将结束，以一个高潮收尾是再合适不过的了。我相信，将`MapKit`框架、`Storyboarding`、`TableViews`和`iTunes`整合起来不会让你失望。这并非易事。我们在过去三章中的旅程将如下进行：第
    9 章介绍`Storyboarding`和`MapKit`框架。第 10 章介绍`Storyboarding`、`TableViews`和`MapKit`框架。最后，在第
    11 章中，我们将探讨`Storyboarding`和`iTunes`商店（即你发布应用的地方）。我们稍后会详细讨论第 11 章，但可以这样说，我将向你展示最引人入胜的应用是如何整合`Storyboarding`、`MapKit`框架、`TableViews`以及互联网/`iTunes`商店的。


    在本章中，我们将看到一些最酷、最成功的应用正是基于`MapKit`框架。我们将把这个框架置于`Storyboarding`平台之上，这将是一项巨大的成就。我之所以把这些概念留到最后，主要是因为这些主题需要一定的经验，以免让学生感到不知所措。我曾在一个坐满渴望学习的、大多是初学者的程序员的阶梯教室教授这门课程，我痛苦地了解到，当我屈从于学生们的热情，试图在学期中途教授`MapKit`时，我总能毫无例外地把全班带进死胡同。


    尽管`MapKit`为我们提供了编写功能强大、生动有趣的应用的手段，但它也要求我们非常清楚并完全理解各种方法、类和框架。将这一应用与`Storyboarding`相结合更增加了挑战的难度。最初，本书的范围并不包含所有这些概念；但最终，我不可能写了这本书却把`MapKit`排除在外！


    因此，在开始之前，我们需要坐下来审视一些东西。`MapKit`作为一个工具箱，是一套具有挑战性的实用程序和工具，但我们将介绍一些基础知识，并学习如何将它们与`Storyboarding`结合使用，以成功且富有创意地完成本章的示例。我们将首先讨论框架和类。然后，我们将看到`MapKit`无需我们编写任何代码就能实现什么。之后，我们将深入挖掘，看看其他程序员使用`MapKit`做了什么，并从中汲取经验。我们已经了解了`Storyboarding`，但现在我们要添加一些真正创新的代码。在磨练了我们对方法的理解，并对`MapKit`中包含的框架、类和其他`Apple`好东西有了相当程度的掌握之后，我们将从容地开始练习。


    在本章的后半部分，我将在“探究我学生的`MapKit`代码”一节中献上一道丰盛的“餐后甜点”。我不会以一堆杂乱的技术参考资料作为结尾，而是会展示我的三位学生在与`MapKit`相关的项目中取得的成果。我希望，当我们看到这些有代表性的学生在完成我的课程后不久就能取得的成就时，我们都会更有动力去迎接下一个挑战。


    我的目标是让我们所有人都能达到这样的境界：我已经用`Storyboarding`编写了一个基本的`iPad MapKit`应用，并且我理解如何充满信心地向前迈进，掌握更高级的目标，即在第
    10 章中协调`Storyboarding`、`TableViews`和`MapKit`框架。

