    ### 深入代码


    到目前为止，Xcode 中最常用的工具是在 Xcode 编辑器中设置断点。运行应用程序，然后查看代码在每个断点处的状态，可以说明某个变量是否被识别、它返回了什么等等。断点非常强大。要在一行代码上添加断点，请双击该行代码左侧的装订线，按住并点击“+”按钮。如果你不希望调试器在该断点处实际停止代码执行，请选中“Continue”复选框。许多更高级的
    Apress Xcode 书籍（如 `Pro iOS 5 Tools`，如图 8–37 所示）都详细介绍了断点的使用方法。


    ![images](img/00350.jpg)


    图 8–37：`Pro iOS 5 Tools`


    `Pro iOS 5 Tools` 深入探讨了以下回顾中的主题，例如调试器控制台、LLVM 和组织工具。不过，这里先做一个简要概述，略过一些不属于本《绝对初学者》书籍范围的高级工具。


    #### 调试器控制台


    下一个最重要且广泛使用的编码者工具是调试器控制台窗口。它是编码者与 GDB 进行通信的有效方式。你可以从 Xcode 的“运行”菜单中，通过按下 ![image](img/00031.jpg)![image](img/00032.jpg)
    R 来进入控制台窗口。你也可以从“方案”弹出菜单中选择“编辑当前方案”，然后在左侧栏的“运行”项下选择 LLVM 编译器或 GDB。我更倾向于使用 LLVM
    编译器，因为所有新的 Fix-it 红色标记都在这里发挥作用（参见下一节）。对于本书中的大部分代码，LLVM 就足够了。尽管如此，如果你仍想使用 GDB，可以转到“信息”面板，然后从“调试器”弹出菜单中选择你要使用的调试器。要查看输出并为
    GDB 输入命令，首先确保你的输出窗口已打开，然后确保视图组的中底部处于启用状态。

