    desktop or embedded with the code and carried along with the application file,
    as shown in [Figure 5–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos355328).
    We want it to be embedded, of course, so click the “Copy items into destination
    group''s folder …” box. Also, check the “Create groups for any added folders”
