    ## Foreword: About the Author


    "Rory and I met in L.A. in 1983\. He reminds me of one of my favorite film characters,
    Buckaroo Banzai—always going in six directions at once. If you stop him and ask
    what he''s doing, he''ll answer comprehensively and with amazing detail. Disciplined,
    colorful, and friendly, he has the uncanny ability to explain the highly abstract
    in simple, organic terms. He always accomplishes what he sets out to do, and he''ll
    help you do the same."


    ### Why you''ll relate to Dr. Lewis


    While attending Syracuse University as a computer-engineering student, Rory scrambled
    to pass his classes and make enough money to support his wife and two young daughters.
    In 1990, he landed a choice on-campus job as a proctor in the computer labs in
    the LC Smith College of Engineering. Even though he was struggling with subjects
    in the Electrical Engineering program, he was always there at the Help Desk. It
    was a daunting experience for Rory because his job was only to help his fellow
    students with computer lab equipment questions, but he invariably found his classmates
    asking deeper and harder questions: "Dude, did you understand the calculus assignment?
    Can you help me?!"


    ![image](images/00003.jpg) These students assumed that, because Rory was the proctor,
    he knew the answers. Afraid and full of self-doubt, he sought a way to help them
    without revealing his inadequacies. Rory learned to start with: "Let''s go back
    to the basics. Remember that last week the professor presented us with an equation…?"
    By going back to the fundamentals, restating and rebranding them, Rory began to
    develop a technique that would, more often than not, lead to working solutions.
    By the time his senior year rolled around, there was often a line of students
    waiting at the Help Desk on the nights Rory worked.'
