    \ on the ViewController’s implementation file. That’s the one that ends with a\
    \ `.m`, as in `helloWorld_03ViewController.m.` Delete the `viewDidUnload` method,\
    \ as shown in [Figure 3–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos201327).\n\
    \n#### Creating a Programming Roadmap\n\nYou’re now ready to get into some code\
    \ that does something useful.\n\n  ![images](images/00100.jpg)  \n\nFigure 3–29\\\
    . The raw IBAction button method, before you start programming it.\n\n29\\. There\
    \ are two items of interest for you here: first, what and where you are programming,\
    \ and second, a roadmap that will guide you as you program your first chunk of\
    \ code:\n\n*   Looking at what you are programming: You can see in [Figures 3–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos192579)\
    \ through [24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos196589),\
    \ that you have the method `(IBAction)button:(id)sender{…}`, which looks pretty\
    \ similar to the action instantiated when you dragged over an action connected\
    \ to your button from the interface builder to your header file. The only difference\
    \ is that in the implementation file you need to implement what needs to happen\
    \ when a person presses this button. To do this, you substitute the semi-colon\
    \ with curly braces, and it’s in these curly braces that you are going to instruct\
    \ what exactly will happen when a person presses this button.\n\n    NOTE: I’m\
    \ going to explain this twice: first, as an overview and then again in a specific\
    \ way that I have developed for newbie Objective-C programmers. I will be doing\
    \ this quite often in the book. It really works well so bear with me and come\
    \ along for the ride.\n\n*   Your roadmap: Looking at [Figure 3–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos202316),\
    \ your road map states that you will have two text strings that you should call\
    \ `Name` and `Output`. `Name`, `NSString`, receives text that the user enters\
    \ into `textBox`. Clear `Output NSString,` and then let it receive the text from\
    \ `NSString`. After placing it in front of “:says Hello World!”, it sends this\
    \ to Label so the viewer can see it. Lastly, clean out `Output NSString`.\n\n\
    The code is divided into 5 steps:\n\n1.  Create strings to manage your text input\
    \ and output\n2.  Manipulate the text around\n3.  Display your hard work\n4. \
    \ Housekeeping\n5.  Get rid of the keyboard"
  trans: "\n> 看看这段代码，我们来简单聊聊。就算你走神了也没关系。我要你做的，正是我在课堂上要求学生做的——把下面这段内容大声朗读三遍：\n\n这段代码被称为“方法”，如果你愿意，甚至可以给它取名为“monkey”。如果那样做，代码会变成这样：\n\
    \n`- (IBAction)monkey:(id)sender;`\n\n关于你命名为“monkey”的这段方法，我只想让你知道两件事：第一，它有一个返回类型；第二，它有一个参数。\n\
    \n- `monkey` 的返回类型：我们的 `monkey` 方法会返回一些内容给我们，用一句话解释就是：“`monkey` 方法的返回类型是 `IBAction`。”请大声朗读**加粗**的代码。\n\
    \n  `- (IBAction)monkey:(id)sender;`\n\n- `monkey` 的参数：`monkey` 的参数类型是 `(id)`，对你而言，它通过\
    \ `sender` 指向你在图 3–23 中拖入头文件的那个按钮。请大声朗读**加粗**的代码。\n\n  `- (IBAction)monkey:(id)sender;`\n\
    \n好了，现在你可以深深地吸一口气。你对“引擎盖下”的初步探索就到此为止了。头文件的工作也已经完成，接下来可以进入实现文件了。\n\n## 避免一个恼人的错误\n\
    \n但在进入实现文件之前，你需要做一些小小的整理工作。\n\n![images](img/00095.jpg)\n\n图 3–24. 关闭 Assistant。\n\
    \n24. 在这第三篇教程中，你可以看到 Xcode 4 已经完成了一些了不起的事情。然而，在我撰写本书时，许多沮丧的 Xcode 4 程序员正遇到一个令人抓狂的错误。在你进入下一步之前，我将告诉你如何避免这个错误。（当你阅读本书时，Xcode\
    \ 4 的这个古怪特性或许已被修复。）如图 3–24 所示，关闭检查器（Inspector），然后重新打开“工具”面板（Utilities pane）。\n\
    \n![images](img/00096.jpg)\n\n图 3–25. 将你的文本框连接到 delegate——第 1 部分：激活 `textBox`\
    \ 并开始按住 Control 键拖拽。\n\n25. 你已经习惯通过从 Interface Builder 直接将对象拖入代码的方式建立连接，这确实很酷，但似乎目前还不能把所有连接工作都交给苹果那帮聪明的家伙。因此，在文本框中单击一次，然后按住\
    \ Control 键拖拽到 File’s Owner 上。如果你不把它连接到 delegate，就会遇到一个非常恼人的错误，叫做 SIGABRT，这意味着\
    \ Xcode 会因为无法建立连接而中止。这确实是个坏消息，但好消息是你可以避免它。操作方法如下。\n\n![images](img/00097.jpg)\n\
    \n图 3–26. 当靠近 File’s Owner 时，你需要将其连接到 delegate。\n\n26. 当你靠近 File’s Owner 时，会出现一个深灰色的上下文对话框，提示你已经将\
    \ File’s Owner 连接到了按钮和 delegate，但你知道，它实际上还是悬空的。你需要将 `textBox` 连接到 delegate。将鼠标直接移动到它上面，当它激活时，松开鼠标。参见图\
    \ 3–26。完成这一步后，你拖入视图的所有好东西就都与头文件连接好了。用极客的方式来说就是：“哟，哥们，我所有的动作和输出口现在都功能性地连接上了！”听起来不错吧？更重要的是，你已经开始理解自己在做什么了！你把按钮、文本框和标签放到了视图上。然后将它们连接起来，使其作为输出口或动作来工作。现在剩下的工作，就是在需要的地方输入一些代码了。\n\
    \n## 设置编码环境\n\n在输入代码之前，你还需要做一些准备工作。\n\n![images](img/00098.jpg)\n\n图 3–27. 打开导航器，然后转到标准视图，并保存所有内容。\n\
    \n27. 首先，让我们通过点击导航器（Navigator，参见图 3–27 中的右箭头），然后点击“标准视图”（Standard View，中间箭头，编辑器部分左侧的图标），来让你的屏幕处于适合编写代码的状态。完成后，请养成保存文件的好习惯。找到你现在呈深灰色的\
    \ nib、头文件和实现文件，分别点击每个文件，然后按 `Command + S` (![Images](img/00031.jpg)S) 保存。或者使用\
    \ `Apple+Option+S` 保存全部。请不要用鼠标去点保存按钮，否则我会神奇地出现，没收你的书，并宣布你成为极客的努力失败了。如果你读完这本书后决定去一家计算机公司工作，而他们看到你用鼠标保存文件，他们会嘲笑你，因为极客们就是用这种方式对待那些用鼠标保存的人的。我是认真的！\n\
    \n![images](img/00099.jpg)\n\n图 3–28. 打开 ViewController 的实现文件，并删除不必要的样板代码。\n\n\
    28. 点击 ViewController 的实现文件。就是那个以 `.m` 结尾的文件，比如 `helloWorld_03ViewController.m`。如图\
    \ 3–28 所示，删除 `viewDidUnload` 方法。\n\n## 创建编程路线图\n\n现在，你已经准备好进入一些真正有用的代码了。\n\n![images](img/00100.jpg)\n\
    \n图 3–29. 原始的 IBAction 按钮方法，在你开始编程之前。\n\n29. 这里有两个你需要注意的要点：第一，你所编程的内容及其位置；第二，一个路线图，它将指导你编写第一段代码：\n\
    \n- 看看你正在编程的内容：在图 3–22 到图 24 中，你可以看到方法 `(IBAction)button:(id)sender{…}`，它看起来与你从\
    \ Interface Builder 将动作拖拽连接到头文件中的按钮时所实例化的动作非常相似。唯一的区别在于，在实现文件中，你需要实现当用户按下这个按钮时应当发生什么。为此，你需要将分号替换为花括号，并且正是在这些花括号中，你将指示当用户按下这个按钮时具体会发生什么。\n\
    \n  > **注意：** 我将解释两遍：第一遍作为概述，第二遍以我为新手 Objective-C 程序员开发的具体方式进行。在本书中，我会经常这样做。这种方法效果很好，所以请耐心跟着我来一次。\n\
    \n- 你的路线图：参见图 3–29，你的路线图指出，你将有两个文本字符串，分别命名为 `Name` 和 `Output`。`Name`（`NSString`\
    \ 类型）接收用户在 `textBox` 中输入的文字。清理 `Output NSString`，然后让它接收来自 `NSString` 的文本。将其放置在“:says\
    \ Hello World!”之前后，发送到 Label 以供查看。最后，清理 `Output NSString`。\n\n代码分为以下 5 个步骤：\n\n\
    1.  创建字符串来管理文本的输入和输出\n2.  对文本进行操作\n3.  展示你的劳动成果\n4.  整理工作\n5.  隐藏键盘\n"
- fmt: "### Step One: Create strings to manage your text input and output\n\nFirst,\
    \ you should type the two `NSString` statements in between the curly braces. What\
    \ you’re doing is creating two strings of text called `NSStrings`, that you will\
    \ call `Name` and `Output`. Make the contents of the `NSString *Name` contains\
    \ the contents of the text that the user types into the `textBox`. Next, make\
    \ the `NSString *Output` contain nothing, or in essence, clean it out by forcing\
    \ `nil` into it. The `*` represent pointers that point to a memory address that\
    \ will contain the contents of each `NSString`.\n\n```\n- (IBAction)button:(id)sender\
    \ {\n    NSString *Name = textBox.text;\n    NSString *Output = Nil;\n}\n```\n\
    \n### Step Two: Manipulate the text around\n\nUnderneath the two `NSString` statements,\
    \ type out the `Output` line as shown below.\n\n```\n- (IBAction)button:(id)sender\
    \ {\n    NSString *Name = textBox.text;\n    NSString *Output = Nil;\n    Output\
    \ = [[NSString alloc] initWithFormat:@\"%@ says: 'Hello World!\", Name];\n}\n\
    ```\n\nWith this typed out, look at the `%@` in the following code:\n\n`@\"%@says:\
    \ Hello  World!\", Name];`\n\nThis is going to be written in progressively technical\
    \ ways, such as:\n\n- The `%@` puts the stuff inside `Name` before the `\"says:\
    \ Hello World!\"`.\n- The `%@` puts the text located at a place in memory pointed\
    \ to by `Name`, and then places that text from the memory before the `\"says:\
    \ Hello World!\"`.\n- The `%@` puts the text located in memory by pointer `Name`,\
    \ and then places that text from the memory before the `\"says: Hello World!\"\
    `.\n- The `%@` places the string at `*Name` before the `\"says: Hello World!\"\
    `.\n\nOK, that wasn’t too bad. The descriptions went from totally non-geek text\
    \ to gradually getting a little more geeky each time. In class, we play games\
    \ where I challenge students to get in groups and try to do their own \"road to\
    \ geekdom\" innovations. What I'm going to ask you to do, before you do the next\
    \ one, is explain the above progression to a person close to you who knows nothing\
    \ about computers. Read the four bullet points to them. When they cannot get it,\
    \ explain it to them in YOUR WORDS. You will learn so much from this. Most of\
    \ you will realize that they can already see that you’ve started the transformation\
    \ from dude to geek.\n\nOK. So moving on, I want you to focus on the `[[NSString\
    \ alloc] initWithFormat:@` in the line:\n\n`[[NSString alloc] initWithFormat:@\"\
    %@ says: Hello  World!\", Name];`\n\nHere it goes:\n\n- The `[[NSString alloc]\
    \ initWithFormat:@` allocates the text saying `\"somebody says: Hello World!\"\
    ` in a way that makes sense to human beings.\n- The `[[NSString alloc] initWithFormat:@`\
    \ allocates all those electrical signals in the iPhone’s microprocessor using\
    \ the code that the clever people at Apple programmed in their `initWithFormat`\
    \ code, that converts the machine language representing `\"somebody says: Hello\
    \ World!\"` into text that makes sense to human beings.\n- Once it has converted\
    \ everything to say `\"somebody says: Hello World!\"` into text, you store it\
    \ in `Output`, as shown in the following code:\n\n`Output = [[NSString alloc]\
    \ initWithFormat:@\"%@ says: Hello  World!\", Name];`\n\n### Step Three: Display\
    \ your hard work\n\nNext, you need to get the text that is being held in `Output`\
    \ onto the screen of the user's iPad or iPhone. Students often tell me at this\
    \ point that they think they’re done. Nope. Your text is just lying there inside\
    \ your microprocessor. You want it out on the screen so the viewer can read it.\
    \ Recall that you created a perfect place for it in [Figure 3–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos181805)?\
    \ Go there, and meet me back here.\n\nCool huh! You need to put the text lying\
    \ in `Output` into `Label`. So type in:\n\n`label.text = Output;`\n\nWhat you’ve\
    \ done here is accessed something that is called the \"text property,\" set it\
    \ to be whatever is in `Output`, and then dump it onto your screen inside `Label`.\n\
    \n```\n- (IBAction)button:(id)sender {\n    NSString *Name = textBox.text;\n \
    \   NSString *Output = Nil;\n    Output = [[NSString alloc] initWithFormat:@\"\
    %@ says: 'Hello World!\", Name];\n    label.text = Output;\n}\n```\n\n### Step\
    \ Four: Housekeeping\n\nYou are not going into this now. But you need to stop\
    \ memory leaks. One of the most common reasons for the iTunes store to reject\
    \ your app is because it has memory leaks. This is too complex for now, and your\
    \ brain is tired. Just know that the `alloc` you used means that you now need\
    \ to release the memory. So write a comment for your own reminding, as you dig\
    \ the code in later chapters.\n\n`//release the object\"`\n\nThen, actually release\
    \ it by typing:\n\n`[Output release];`\n\n```\n- (IBAction)button:(id)sender {\n\
    \    NSString *Name = textBox.text;\n    NSString *Output = Nil;\n    Output =\
    \ [[NSString alloc] initWithFormat:@\"%@ says: 'Hello World!\", Name];\n    label.text\
    \ = Output;\n    [Output release];\n}\n```"
  raw: '##### Step One: Create strings to manage your text input and output


    First, you should type the two `NSString` statements in between the curly braces.
    What you’re doing is creating two strings of text called `NSStrings`, that you
    will call `Name` and `Output`. Make the contents of the `NSString *Name` contains
    the contents of the text that the user types into the `textBox`. Next, make the
    `NSString *Output` contain nothing, or in essence, clean it out by forcing “nil”
    into it. The “*” represent pointers that point to a memory address that will contain
    the contents of each `NSString`.


      `- (IBAction)button:(id)sender {`

    `    NSString *Name = textBox.text;`

    `    NSString *Output = Nil;`

    `}`


    ##### Step Two: Manipulate the text around


    Underneath the two `NSString` statements, type out the `Output` line as shown
    below.


      `- (IBAction)button:(id)sender {`

    `    NSString *Name = textBox.text;`

    `    NSString *Output = Nil;`

    `    Output = [[NSString alloc] initWithFormat:@"%@ says: ''Hello World!", Name];`

    `}`  


    With this typed out, look at the `%@` in the following code


      `@"%@says: Hello  World!", Name];`  


    This is going to be written in progressively technical ways, such as:


    *   The `%@` puts the stuff inside `Name` before the `“says: Hello World!”`.

    *   The `%@` puts the text located at a place in memory pointed to by `Name`,
    and then places that text from the memory before the `“says: Hello World!”`.

    *   The `%@` puts the text located in memory by pointer `Name`, and then places
    that text from the memory before the `“says: Hello World!”`.

    *   The `%@` places the string at `*Name` before the `“says: Hello World!”`.


    OK, that wasn’t too bad. The descriptions went from totally non-geek text to gradually
    getting a little more geeky each time. In class, we play games where I challenge
    students to get in groups and try to do their own “road to geekdom” innovations.
    What I''m going to ask you to do, before you do the next one, is explain the above
    progression to a person close to you who knows nothing about computers. Read the
    four bullet points to them. When they cannot get it, explain it to them in YOUR
    WORDS. You will learn so much from this. Most of you will realize that they can
    already see that you’ve started the transformation from dude to geek.


    OK. So moving on, I want you to focus on the `[[NSString alloc] initWithFormat:@`
    in the line


      `[[NSString alloc] initWithFormat:``@"%@ says: Hello  World!", Name];`  


    Here it goes:


    *   The `[[NSString alloc] initWithFormat:@` allocates the text saying `“somebody
    says: Hello World!”` in a way that makes sense to human beings.

    *   The `[[NSString alloc] initWithFormat:@` allocates all those electrical signals
    in the iPhone’s microprocessor using the code that the clever people at Apple
    programmed in their `initWithFormat` code, that converts the machine language
    representing `“somebody says: Hello World!”` into text that makes sense to human
    beings.

    *   Once it has converted everything to say `“somebody says: Hello World!”` into
    text, you store it in `Output`, as shown in the following code


    `Output` `= [[NSString alloc] initWithFormat:@"%@ says: Hello  World!", Name];`


    ##### Step Three: Display your hard work


    Next, you need to get the text that is being held in `Output` onto the screen
    of the user''s iPad or iPhone. Students often tell me at this point that they
    think they’re done. Nope. Your text is just lying there inside your microprocessor.
    You want it out on the screen so the viewer can read it. Recall that you created
    a perfect place for it in [Figure 3–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos181805)?
    Go there, and meet me back here.


    Cool huh! You need to put the text lying in Outlet into Label. So type in


      `label.text = Output;`  


    What you’ve done here is accessed something that is called the “text property,”
    set it to be whatever is in Outlet, and then dump it onto your screen inside Label.


      `- (IBAction)button:(id)sender {`

    `    NSString *Name = textBox.text;`

    `    NSString *Output = Nil;`

    `    Output = [[NSString alloc] initWithFormat:@"%@ says: ''Hello World!", Name];`

    `    label.text = Output;`

    `}`


    ##### Step Four: Housekeeping


    You are not going into this now. But you need to stop memory leaks. One of the
    most common reasons for the iTunes store to reject your app is because it has
    memory leaks. This is too complex for now, and your brain is tired. Just know
    that the `alloc` you used means that you now need to release the memory. So write
    a comment for your own reminding, as you dig the code in later chapters.


      `//release the object"`  


    Then, actually release it by typing


      `[Output release];`


    `- (IBAction)button:(id)sender {`

    `    NSString *Name = textBox.text;`

    `    NSString *Output = Nil;`

    `    Output = [[NSString alloc] initWithFormat:@"%@ says: ''Hello World!", Name];`

    `    label.text = Output;`

    `    [Output release];`

    `}`'
  trans: "\n### 第一步：创建字符串来管理文本输入与输出\n\n首先，你需要在花括号内键入两条 `NSString` 语句。这样做是为了创建两个名为\
    \ `NSStrings` 的文本字符串，你将分别命名为 `Name` 和 `Output`。请确保 `NSString *Name` 的内容包含用户输入到\
    \ `textBox` 中的文本。接下来，让 `NSString *Output` 不包含任何内容，或者实际上，通过强制将其设为 `nil` 来清空它。`*`\
    \ 表示指针，指向将存储每个 `NSString` 内容的内存地址。\n\n```\n- (IBAction)button:(id)sender {\n \
    \   NSString *Name = textBox.text;\n    NSString *Output = Nil;\n}\n```\n\n###\
    \ 第二步：处理文本\n\n在两条 `NSString` 语句下方，按照下图所示键入 `Output` 行。\n\n```\n- (IBAction)button:(id)sender\
    \ {\n    NSString *Name = textBox.text;\n    NSString *Output = Nil;\n    Output\
    \ = [[NSString alloc] initWithFormat:@\"%@ says: 'Hello World!\", Name];\n}\n\
    ```\n\n键入这段代码后，观察下面代码中的 `%@`：\n\n`@\"%@says: Hello  World!\", Name];`\n\n这将以逐步专业化的方式解释，例如：\n\
    \n- `%@` 将 `Name` 中的内容放在 `\"says: Hello World!\"` 之前。\n- `%@` 将 `Name` 所指向的内存位置中的文本取出，并放在\
    \ `\"says: Hello World!\"` 之前。\n- `%@` 将指针 `Name` 所指向的内存中的文本取出，并放在 `\"says: Hello\
    \ World!\"` 之前。\n- `%@` 将 `*Name` 处的字符串放置在 `\"says: Hello World!\"` 之前。\n\n好吧，这并不太难。这些描述从完全非技术性的文本，逐步变得每次都有点技术化。在课堂上，我会组织游戏，挑战学生们分组进行自己的“通往极客之路”创新。在进入下一步之前，我要你做的，是将上述进展解释给你身边一个完全不懂电脑的人听。向他们阅读这四个要点。当他们不理解时，用你自己的话解释给他们听。你会从中学到很多东西。你们大多数人会意识到，他们可能已经看出你开始从普通人转变为极客了。\n\
    \n好的。继续往下说，我希望你关注这一行中的 `[[NSString alloc] initWithFormat:@`：\n\n`[[NSString alloc]\
    \ initWithFormat:@\"%@ says: Hello  World!\", Name];`\n\n具体如下：\n\n- `[[NSString\
    \ alloc] initWithFormat:@` 以对人类有意义的方式分配文本 `\"somebody says: Hello World!\"`。\n\
    - `[[NSString alloc] initWithFormat:@` 利用苹果聪明人在其 `initWithFormat` 代码中编写的程序，在 iPhone\
    \ 微处理器中分配所有这些电信号，这些代码将代表 `\"somebody says: Hello World!\"` 的机器语言转换为对人类有意义的文本。\n\
    - 一旦将所有内容转换为文本形式，表示 `\"somebody says: Hello World!\"`，你就将其存储在 `Output` 中，如下代码所示：\n\
    \n`Output = [[NSString alloc] initWithFormat:@\"%@ says: Hello  World!\", Name];`\n\
    \n### 第三步：显示你的劳动成果\n\n接下来，你需要将存储在 `Output` 中的文本显示到用户的 iPad 或 iPhone 屏幕上。此时学生常告诉我他们觉得已经完成了。不。你的文本还只是躺在微处理器内部。你需要让它显示在屏幕上，以便用户阅读。还记得你在图\
    \ 3–13 中为它创建了一个完美位置吗？去那里，然后回到我这里。\n\n很酷，对吧！你需要将 `Output` 中的文本放入 `Label` 中。所以请键入：\n\
    \n`label.text = Output;`\n\n你在这里所做的，是访问了一个称为“文本属性”的内容，将其设置为 `Output` 中的任何值，然后将其显示在屏幕上的\
    \ `Label` 中。\n\n```\n- (IBAction)button:(id)sender {\n    NSString *Name = textBox.text;\n\
    \    NSString *Output = Nil;\n    Output = [[NSString alloc] initWithFormat:@\"\
    %@ says: 'Hello World!\", Name];\n    label.text = Output;\n}\n```\n\n### 第四步：内存管理\n\
    \n现在你不需要深入探讨这个问题。但你需要防止内存泄漏。iTunes Store 拒绝你的应用最常见的原因之一就是内存泄漏。这对目前来说太复杂了，你的大脑已经很疲惫。只需知道，你使用的\
    \ `alloc` 意味着你现在需要释放内存。所以在深入后续章节的代码时，自己写一条注释作为提醒。\n\n`//释放对象`\n\n然后，通过键入以下代码实际释放它：\n\
    \n`[Output release];`\n\n```\n- (IBAction)button:(id)sender {\n    NSString *Name\
    \ = textBox.text;\n    NSString *Output = Nil;\n    Output = [[NSString alloc]\
    \ initWithFormat:@\"%@ says: 'Hello World!\", Name];\n    label.text = Output;\n\
    \    [Output release];\n}\n```\n"
- fmt: "##### Step Five: Get Rid of the Keyboard\n\nOnce the user enters their name\
    \ and hits the Done button (see right hand image of [Figure 3–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos180563)),\
    \ you need to add a little code to make sure the keyboard is dismissed.\n\nYou\
    \ do this by implementing a special kind of delegate method called `textFieldShouldReturn`.\
    \ Right now, you do not have to worry about delegates, first responders, and so\
    \ on. All I want you to know is that this code reassigns the first responder,\
    \ your keyboard, and the text field that is active (typing in one’s name), which\
    \ saves it in your toolbag and reuses it every time you need to wipe out the keyboard.\n\
    \n```\n- (BOOL) textFieldShouldReturn:(UITextField *)theTextField{\n    [textBox\
    \ resignFirstResponder];\n    return YES;\n}\n@end\n```\n\nOK! You’re done with\
    \ code!\n\nI want you to feel proud of yourself! You’ve allowed me to guide you\
    \ through some treacherous waters of Objective-C code, and even if you’re not\
    \ feeling like you’ve absolutely wrapped your head around the code, no problem.\
    \ Objective-C is an incredibly difficult language and the fact that you’re still\
    \ reading this means you’re doing awesome. Remember that as you do more of this\
    \ it all comes together and gets dialed in beautifully. For those of you who have\
    \ understood what you’ve done so far in the way that I’m presenting it to you,\
    \ congratulations!\n\n![images](images/00101.jpg)\n\n**Figure 3–30.** Coding the\
    \ delegate method `textFieldShouldReturn`.\n\n[Figure 3–30](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos215720)\
    \ shows the completed button method and the `textFieldShouldReturn` method being\
    \ typed in with Xcode’s code completion doing its work. Once this is done you\
    \ are finished coding. Yeah!\n\n![images](images/00102.jpg)\n\n**Figure 3–31.**\
    \ Make sure you will be running to the correct target.\n\nFirst, let’s make sure\
    \ that you have saved everything. Now, if you ran your last app to your iPad or\
    \ to your actual iPhone, then you will want to make sure that you change the “target”\
    \ to be the iPhone simulator, as shown in [Figure 3–31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos216339).\n\
    \n![images](images/00103.jpg)\n\n**Figure 3–32.** Let’s run it!\n\nYou have worked\
    \ really hard on this one, and now it’s time to see the fruits of your work. Hit\
    \ the Run button, as shown in [Figure 3–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos216995),\
    \ and let’s see your app come to life!\n\n![images](images/00104.jpg)\n\n**Figure\
    \ 3–33.** The four states of your app.\n\nIf you’re using your own picture then\
    \ yours will obviously be in the background. Starting on the left hand side of\
    \ [Figure 3–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos216995)\
    \ and moving to the right:\n\n1.  The first image shows the text box asking the\
    \ user to enter their name.\n2.  The instant one clicks in the text box, the text\
    \ disappears and the keypad appears.\n3.  The third image shows the state of your\
    \ app once the user hits the Done button.\n4.  The last image shows the final\
    \ state of all your hard work, which appears when the user hits the Press Me button.\
    \ Congratulations!\n\n### Digging the Code\n\nIn these reviews, we will go over\
    \ some of the code we have written, and I will reference familiar code and explain\
    \ the processes in more detail. Here, I will introduce you to more technical terms\
    \ that you will use in future chapters and in communicating with other programmers.\n\
    \nConsider this analogy: In `helloWorld_01` and `helloWorld_02` I taught you how\
    \ to get into a car, turn the ignition, press the accelerator, and steer as you\
    \ moved forward. In `helloWorld_03`, I guided you with similar directions, but\
    \ as you drove toward your destination, I explained how the car is a hybrid engine\
    \ and that it has some gasoline components and some electrical components. We\
    \ talked about classes and methods, strings, outlets, and actions.\n\nNow you’ve\
    \ arrived at our destination; you’ve completed `helloWorld_03`, and I will open\
    \ the hood and show you how, when you pressed the accelerator, it either pumped\
    \ gasoline into the engine, or sometimes used the electric motor. When you look\
    \ under the hood, I’ll show you where these components are located. However, by\
    \ the time you reach the end of the book, look under the hood, and dig the code,\
    \ I will describe the amount of gasoline being squirted into the pistons by the\
    \ carburetors, the exact torque and heat emission of the electric motor, and so\
    \ on. Guess what—you’ll be able to handle it!\n\nOne last comment about this section\
    \ that is really important: Digging the Code is a section that I encourage you\
    \ to read without definitive understanding. It’s OK if you only partially “get\
    \ it.” Of course, if you happen to attain full comprehension of the subject in\
    \ all its details, well that’s great. What I suggest, however, is that you read\
    \ these sections at the end of each chapter loosely because:\n\n- I have received\
    \ hundreds of emails from readers from the first edition of the book saying that\
    \ knowing it was OK to blank out and not feel pressured to understand the code\
    \ really worked out for them.\n- Also, my students love it when at the end of\
    \ each class, I make them turn off their Mac, put down their pens, Zen and zone\
    \ out, and just casually listen to me. I’ve had students knocking on my office\
    \ telling me in many colorful ways how the Zenning and zoning really worked for\
    \ them.\n\nNote that my research is in neurological acute brain injuries, where\
    \ I study the brain and neural interconnectivity. This methodology of first connecting\
    \ neurons and then infusing the deeper connective associations when the brain\
    \ is relaxed is one that I’ve developed over the years. So, I want you to consider\
    \ my former readers’ and students’ opinions about this matter and absorb my theorem.\n\
    \n> **NOTE:** Becoming an eloquent, knowledgeable, and financially thriving coder\
    \ takes neurological leaps, during states wherein your brain is open to absorbing\
    \ new data without the hypothalamus releasing anxiety hormones that pollute the\
    \ ability of your neurons to create new connections, which allows linking logic\
    \ and code to ontological reasoning.\n\nSo Zen out, zone out, and read in a meditative\
    \ state with no fear. When that voice says, “You’re not understanding it all,”\
    \ say: “That’s OK, Dr. Lewis said so, now go away!” You will Zen and zone through:\n\
    \n- Nibs, Zibs, and Xibs\n  - Instances and Instantiation\n- Methods\n  - Instance\
    \ methods and class methods\n- Header Files\n- The Inspector Bar\n- NSStrings\n\
    - Memory Management"
