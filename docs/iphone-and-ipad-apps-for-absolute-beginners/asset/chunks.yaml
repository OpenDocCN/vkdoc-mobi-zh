  trans: '

    ### 深入解析代码


    在每章的末尾，我加入了名为“深入解析代码”的章节，在此我将逐步为你剖析那些神奇出现或我直接让你输入的代码背后的含义。不过，我发现人类的大脑如果在不断重复某项操作，并且每次重复都会产生特定结果时，就会自行建立关联。我还发现，如果先让学生们在完全无知的状态下快速浏览大量代码，这大有裨益，因为这样能让大脑建立只有自己才能理解的连接。因此，在“深入解析代码”中，我开始为你提供一些恰到好处的小片段，它们能帮你串联起线索，理解为什么要把这段代码放在这里，或者那段代码放在那里。到了本书结尾部分，你会完全适应并真正深入钻研这些代码。然而，对于第
    2 章来说，我们重复的操作还不够多，不足以让你建立自己的关联。所以，现在先深呼吸一下，我们第 3 章再见。


    ## 第 3 章


    ## 继续前进


    现在你已经通过编程完成了前两个 iPhone 和 iPad 应用，算是小试牛刀了。我希望你告诉自己，你必须继续前进，制作更多的应用，进行更多的练习，并在大脑中建立更自然的神经突触连接。起初，我许多传统的计算机科学同事都鄙视我的方法——在不解释所有代码的情况下，就盲目地带着新手程序员读代码。多年来，我学会了精确判断什么时候该告诉你发生了什么，什么时候该推着你前进。最重要的是，你需要继续前进，并让你的大脑始终专注于
    Xcode。


    这第三个“Hello World”应用将向你介绍一些很酷的新概念，比如字符串、委托以及稍微复杂一点的代码。请记住，这是 Objective-C；它是一种相当复杂且困难的语言，所以我只会解释我认为必要的内容。这就引出了第
    3 章和第 2 章之间的一个区别。回想一下，在第 2 章中，当我提到深入解析代码时，我说：“然而，对于第 2 章来说，我们重复的操作还不够多，不足以让你建立自己的关联。”
    好吧，到了第 3 章，我们开始真正深入解析代码了。那么，让我们开始下一个应用吧。完成之后，休息一下，然后准备好回去复查你输入的每一行，因为我们要专注于代码的某些部分，看看它们是如何协同工作的。


    除了本书中呈现的信息（包括各种截图）之外，我还提供了录屏，你可以在我的网站上获取。你可以使用短链接，或者输入 rorylewis.com，如下所示，点击 Xcode
    4 图标，然后选择视频教程或下载：


    *   短链接：`ow.ly/50ksH`

    *   手动输入网址：[www.rorylewis.com](http://www.rorylewis.com)


    ### helloWorld_03 – 一个交互式基于视图的应用


    在你的前两个程序 `helloWorld_01` 和 `helloWorld_02` 中，你使用一个包含按钮的基于视图的平台向世界说了“Hello”。这第三个应用也将是一个基于视图的应用，但会稍微增加一些复杂性。当用户与你这第三个应用交互时，他们首先会被提示在文本字段对象中输入自己的名字。一旦他们输入了名字并点击“Press
    Me”按钮，就会显示一段文字，说明输入的这个人正是在说“Hello World！”


    在开始下一个方法之前，你需要将 `helloWorld_01` 和 `helloWorld_02` 保存到一个你选择的非桌面的文件夹中。在你的“文稿”文件夹中创建一个名为“My
    Programs”的文件夹，然后通过将整个 `helloWorld_01` 文件夹拖入“My Programs”文件夹来保存它。现在，保持桌面干净整洁，关闭你可能正在运行的其他所有程序。按下
    `Command + Tab` (![Images](img/00031.jpg)![Images](img/00059.jpg))，然后按 `Command
    + Q` (![Images](img/00031.jpg)Q) 关闭所有程序，直到屏幕上只剩下“访达”。


    > ![images](img/00070.jpg)


    **图 3–1.** 打开 Xcode，选择“基于视图的应用”模板，然后点击“下一步”按钮。


    1. 现在，就像你在第一个示例中所做的那样，启动 Xcode 并使用键盘快捷键 `![Images](img/00031.jpg)![Images](img/00032.jpg)
    N` 打开一个新项目。你的屏幕应该会显示新项目向导，如图 3–1 所示。你可能发现你的“基于视图的应用”模板因为上一个示例而被默认选中了。但是，如果你的“基于视图的应用”模板没有被选中，那么请点击“基于视图的应用”图标，然后点击“下一步”按钮，如图
    3–1 所示。


    ![images](img/00071.jpg)


    **图 3–2.** 命名你的项目，确保它用于 iPhone，然后点击“下一步”按钮。


    2. 你将把第三个项目命名为 `helloWorld_03`，因此在“产品名称”框中输入该名称，如图 3–2 所示。“公司标识符”应自动默认为你的 Xcode
    许可名称。请记住，`helloWorld_02` 是为 iPad 创建的，因此你电脑上的“设备系列”可能仍设置为 iPad。无论情况如何，请确保 `helloWorld_03`
    设置为 iPhone 系列。如果你的“使用故事板”、“使用自动引用计数”或“包含单元测试”选项被默认勾选，请取消勾选。完成此操作后，当你的屏幕看起来如图 3–2
    所示时，点击“下一步”按钮。


    ![images](img/00072.jpg)


    **图 3–3.** 将你桌面上的个人图片拖入“Supporting Files”文件夹。

