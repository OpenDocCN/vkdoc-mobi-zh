    \n## 示例 3 的个人简介\n\n> Satish Rege\n>\n> 我为何想成为一名 iPhone 开发者？很简单——iPhone 将大型计算系统的计算、通信和多媒体体验浓缩于掌心。它以协同的方式提供丰富的资源和用户界面原语，以表达创意能力。这些\
    \ iPhone 的特性吸引我想要学习 iPhone 开发工具，来表达我自己的想法。Rory 的课程是一次绝佳的介绍，涵盖了众多 iPhone 功能，并使其易于掌握。\n\
    > \n> > ![images](img/00404.jpg)\n> \n> 图 9–50. Satish Rege\n\n### 期末项目——示例 3\n\
    \nSatish（图 9–42）在所有的家庭作业中总能拿出简洁优雅的代码。在我批改每周作业时，我意识到 Satish 有一种诀窍，别人通常需要三倍长度的代码才能完成的任务，他仅用\
    \ 20 行代码就能实现。在他的期末项目中，Satish 的应用允许用户预先查看前方路口的交通状况，如果某个路口拥堵，则会推荐另一条路线。\n\n至少从理论上讲，这就是它的工作方式。Satish\
    \ 从一个他知道会很棘手的路口——I-25 北向——入手，从而避免了很多麻烦。他专注于控制器实现文件，然后根据在科罗拉多斯普林斯的位置不断来回切换。他为科罗拉多斯普林斯的\
