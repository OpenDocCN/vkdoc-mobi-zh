    HD` ![Images](images/00027.jpg)`Developer` ![Images](images/00027.jpg)`Applications`
    ![Images](images/00027.jpg)`Interface Builder.app`并拖动，将`Interface Builder`添加到程序坞。最后，通过选择`Macintosh
    HD` ![Images](images/00027.jpg)`Developer` ![Images](images/00027.jpg)`Platforms`
    ![Images](images/00027.jpg)`iPhone/iPad Simulator Platform`并拖动，将`iPhone/iPad Simulator`添加到程序坞。我将它们一起放在程序坞的中央，如[图1–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos77891)所示。


    **注意：** 每当我提到“iPhone”或“iPad”时，我指的是任何iPhone或iPad OS设备。这包括`iPod touch`。此外，当我提到`Macintosh
    HD`时，你的硬盘可能被命名为其他名称。


    ### 我不会教你什么


    现在你已经安装好`Xcode`、`Interface Builder`和`iPhone/iPad Simulator`工具并可以轻松访问，你已经准备就绪。但是等等！你需要知道我们要去哪里。


    不过，首先让我说说我们不会涉及的地方——我不会涵盖的内容。我不会试图教你每一行代码是如何工作的。相反，我将采用一种子系统的方法，指出哪些代码片段或部分将在哪些情况下为你服务。


    虽然本书旨在让你（读者和程序员）获得全面的理解和能力，但我们将在分子层面而非原子或亚原子粒子层面进行探讨。重点将是如何识别代码的一般属性、行为和关系，这样你就不必陷入逐字逐句的细节中。我将带你达到一个境界，在那里你可以选择你可能想要专精的领域。'
  raw: 'NOTE: Again, at the time I wrote this book, Xcode 4.2 and iOS SDK 5 were the
    latest versions. The chance is great that by the time you read this book, these
    may have larger numbers. This is not a problem; just go on to Step 8. If, by chance,
    something has really thrown us all a curve ball, it will be discussed and solved
    for you in easy-to-read English at our forum located at [`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)
    or `bit.ly/oLVwpY.`


    ![images](images/00019.jpg)


    Figure 1–12\. This takes you to the bottom of the page, as shown in [Figure 1–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos73329).


    ![images](images/00020.jpg)


    Figure 1–13\. Click on the “Download Xcode 4” button and that will take you to
    the Xcode 4 Developer Page.


    8.  I know you''re probably thinking: “Gee, I just want to download it!'' Remember
    that there are thousands of downloads at Apple.com. This page, illustrated in
    [Figure 1–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos74393), is
    called the Xcode 4 Developer Page and it has all of the relevant downloads for
    you. For now, we want to click on the latest version. These figures show the latest
    version at the time of this printing. It WILL be different by the time you read
    this in print. Right now, the latest version available at this point is “Xcode
    4.2 for Lion,” so this is the link that is indicated by the arrow. It will look
    similar at this point—click on it. ![images](images/00021.jpg)


    Figure 1–14\. Click on the “Xcode 4.2 for Lion in the Mac App Store” link.


    9.  Your download will start and, depending upon your connection speed, it may
    take somewhere between 2 to 15 minutes. Your screen should look something like
    the one shown in [Figure 1–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos74987).
    ![images](images/00022.jpg)


    Figure 1–15\. Wait for the download to complete.


    10.  Once the download has completed, the Xcode and iOS SDK drive icon will appear
    on your desktop and a window with your Xcode and iOS SDK.mpkg will appear, as
    shown in [Figure 1–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos75665).
    Click on the “Xcode and iOS SDK.mpkg,” as indicated by the arrow in [Figure 1–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos75665).
    ![images](images/00023.jpg)


    Figure 1–16\. Click on the “Xcode and iOS SDK.mpkg” icon.


    11.  Once you have clicked on the Xcode and `iOS SDK.mpkg` icon, a security verification
    window will open up. Click on the “Continue” button as shown by the arrow in [Figure
    1–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos76705). Next, you
    will see the “Install Xcode and iOS SDK” window, as shown in left-hand image in
    [Figure 1–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos76990). Now
    click on “Continue,” as indicated by the arrow. After several minutes, the installation
    will be complete and you will see a “The Installation was Successful” window appear.
    Click the “Close” button, as indicated by the arrow in the right-hand image in
    [Figure 1–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos76990). ![images](images/00024.jpg)


    Figure 1–17\. The security verification window. Click on the “Continue” button.


    ![images](images/00025.jpg)


    Figure 1–18\. The “Install Xcode and iOS SDK” window. Click on the “Continue”
    button.


    12.  Included with the Apple SDK that you’ve now downloaded is Apple’s integrated
    development environment (IDE). This programming platform contains a suite of tools,
    sub-applications, and boilerplate code that all enable us to do our jobs more
    easily. We will use Xcode, Interface Builder, and the iPhone/iPad Simulator extensively,
    so I advise you to bring these icons to your dock (see [Figure 1–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos77891))
    as described in Step 13 below. This will save you tons of time searching for them.
    ![images](images/00026.jpg)


    Figure 1–19\. Xcode, Interface Builder, and the iPhone/iPad Simulator—locked &
    loaded, ready to roll!


    13.  Bring Xcode to your dock by choosing Macintosh HD ![Images](images/00027.jpg)Developer
    ![Images](images/00027.jpg)Applications ![Images](images/00027.jpg)Xcode.app and
    dragging it onto your dock, as illustrated in [Figure 1–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos77891).
    In the same way, bring Interface Builder to your dock by choosing Macintosh HD
    ![Images](images/00027.jpg)Developer ![Images](images/00027.jpg)Applications ![Images](images/00027.jpg)Interface
    Builder.app and dragging it. Finally, bring the iPhone/iPad Simulator to your
    dock by choosing Macintosh HD ![Images](images/00027.jpg)Developer ![Images](images/00027.jpg)Platforms
    ![Images](images/00027.jpg)iPhone/iPad Simulator Platform and dragging it. I''ve
    placed them together at the center of my dock, as illustrated in [Figure 1–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos77891).


    NOTE: Whenever I say “iPhone” or “iPad,” I am referring to any iPhone or iPad
    OS device. This includes the iPod touch. In addition, when I say Macintosh HD,
    yours may have been named something different.


    ### What I Won’t Teach You


    With your Xcode, Interface Builder, and iPhone/iPad Simulator tools installed
    and ready to access easily, you’re ready to roll. But wait! You need to know where
    we’re going.


    First, though, let me say something about where we won’t be going—what I will
    not be covering. I will not attempt to teach you how every line of code works.
    Instead, I will take a subsystem approach, indicating which pieces or sections
    of code will serve you in which situations.


    While this book is designed to impart to you, the reader and programmer, a comprehensive
    understanding and ability, we will be dealing in molecules rather than atoms or
    subatomic particles. The emphasis will be on how to recognize general attributes,
    behaviors, and relationships of code so that you need not get bogged down in the
    symbol-by-symbol minutiae. I will get you to a place where you can choose those
    areas where you may want to specialize.'
