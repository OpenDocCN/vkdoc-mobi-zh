  trans: '

    我精心挑选主题、隐含语义和措辞，尽最大努力优化我当前所教内容与过去所教内容之间的连接。当你读完本书，创建第一个应用并成功在商店中销售时，你的大脑将开始为第
    5 章建立许多连接。在 GEEKDOM 下方的图 6-a 中我已对此进行了说明。将大量突触与包含难以理解概念的神经核连接起来的方式之一，就是**教导他人**。去论坛（比如我的论坛
    `www.rorylewis.com/ipad_forum/` 或 `bit.ly/oLVwpY`）帮助新手解答问题（即使你自己也是新手）是非常棒的，因为这能为那个难懂的概念建立诸多连接，让你变得更聪明。本质上，帮助他人会迫使一个人用上千种不同的方式回答同一个问题。因此，我强烈鼓励你去论坛提问，并在你变得更有智慧后，再去帮助他人。


    所以，第一个好消息是：如果你觉得与第 5 章中编写的代码缺乏连接感，这完全没问题。随着你继续学习，你会逐步建立这些连接。第二个好消息是：第 6 章不会像第
    5 章那样有巨大的跨度。相反，你将暂时从繁重的代码中抽身，把新想法与你之前在第 5 章中通过代码建立的突触连接起来。事实上，在第 6 章和第 7 章中，代码量会非常少！相反，我会将酷炫的新想法与你大脑中那些将代码与第
    5 章探讨的概念相关联的部分连接起来。一旦你在大脑中建立了这些连接，你将能关联更多的代码。在第 6 章中，你将探索一种使用“标签页应用程序”平台在 iPhone
    应用中导航的流行方法。但现在，请先放松并享受第 6 章：开关。


    ### `switch:` 一个标签页应用


    到目前为止，你编写的代码允许用户通过特定方式点击或触摸 iPhone 或 iPad，使其执行有趣的操作。现在，情况将有所改变。在本章中，你将演示如何创建一个
    iPhone 应用，在不让用户感到信息过载的情况下，通过将功能划分到几个易于定位的标签页中，来实现所有这些酷炫功能。这种被称为“标签页模型”的模式在应用开发者中非常流行，以至于
    Apple 在 Xcode 的“新建项目”选项中包含了基本的标签页应用项目。换句话说，Apple 的员工认识到程序员有多么喜欢使用这种模式，因此他们为你创建了所需的大部分代码。当你完成这个应用的编写后，你将得到一个底部有两个标签页的显示界面。第一个标签页的内容将是一个你使用
    Interface Builder 设置的图片，并在其上叠加一个按钮。点击此按钮将启动 Mobile Safari 并打开 Apress 出版公司的网站。第二个标签页的内容将是另一张不同的图片，但你可以在实现文件中设置图片名称和其他属性，并仅在
    Interface Builder 中搭建足够的框架来实现这一点。


    #### 获取资源


    你可以观看视频，跟随那位充满活力、风趣迷人的博士生 Brian Parks 一起编写这个开关应用，视频地址为 `bit.ly/mX4pkk`。你也可以在 `bit.ly/vBSKMa`
    下载此项目的代码，以便将自己的代码与我的进行直观对比。最重要的是，你需要从 `bit.ly/tIYl9Y` 下载三张图片，或者使用与我相同的尺寸创建你自己的两张图片和一个图标：两张大图的尺寸为
    320 × 480 像素，图标尺寸当然是 57 × 57 像素。


    ![images](img/00193.jpg)


    图 6-1\. 将三张图片下载到你干净整洁的桌面上。


    1. 首先清理桌面，确保上面没有任何东西。然后，要么创建你的两张 320 × 480 像素的图片（每个视图一张），以及一个 57 × 57 像素的图标，要么从
    `bit.ly/vBSKMa` 下载本书和视频中使用的三张图片。如图 6-1 所示。


    #### 创建应用


    现在让我们创建这个应用。


    ![images](img/00194.jpg)


    图 6-2\. 启动一个标签页应用。


    2. 就像启动之前所有应用一样，使用 `⌘N` 新建一个项目。从出现的表单中选择“标签页应用”。该模板会为你搭建好标签页框架的大部分内容，这样你就可以专注于填充内容，而无需担心交互模型的繁琐细节。点击“下一步”。如图
    6-2 所示。


    ![images](img/00195.jpg)


    图 6-3\. 将应用命名为"switch"。


    3. 如图 6-3 所示，将你的应用命名为“switch”，并确保两个复选框都未被选中。“使用故事板”会彻底改变标签页应用的设置方式，我们将在第 7 章中详细探讨。在这个应用中，你将专门针对
    iPhone 进行开发，因为在 iPad 上使用标签页会显得笨重。

    '
- fmt: '#### Adding the Images to the Project


    At this stage, it''s probably a good idea to drag your imagery to use on the tabs,
    so you won''t have to worry about it later.


    ![images](images/00196.jpg)


    **Figure 6–4.** Drag in your 3 images from the desktop.


    4. Drag your images from the desktop into `supporting files`, and in the process
    develop a very good habit for yourself. After dropping your images into the folder,
    you will be presented with a dialog, as shown in [Figure 6–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos468387).


    ![images](images/00197.jpg)


    **Figure 6–5.** Copy the items into the destination page''s folder.


    5. `Xcode` recognizes that the images are not already part of this project, so
    it strongly recommends that you let it add them for you. As mentioned before,
    it''s also making sure that it has encapsulated your images inside itself, so
    if you go elsewhere to run it then it will be able to find your images and display
    them. This dialog also gives you the opportunity to change the actions it is about
    to perform, but, in general, the assumptions it makes are correct, so accept `Xcode`''s
    recommendations, as illustrated in [Figure 6–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos468387).


    ![images](images/00198.jpg)


    **Figure 6–6.** Drag your icon to the app''s icon property.


    6. Typically, you open the `plist` to include the icon. In this app, you see a
    new way to associate an icon with your app. So, drag your icon file to the app''s
    properties. Notice how `Xcode` takes care of putting it in the right place in
    your project and setting up all the necessary linkages. This step is not critical
    if you don''t have an appropriately sized `.png` readily available. You can always
    change the icon later. Note that it only allows you to drop the correct sized
    icon into each specific box. In [Figure 6–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos469321)
    you see the icon being dragged into the app''s icon property.


    ![images](images/00199.jpg)


    **Figure 6–7.** Warning that you dropped the images into the wrong place.


    7. `Xcode` displays a warning indicating that it will copy the icon from its current
    location to the “correct” place, which is fine. As with the previous warning,
    simply accept `Xcode`''s recommendations. You, of course, will not see this if
    you dropped your images into the correct folder. This is illustrated in [Figure
    6–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos470321).


    #### Running the App


    You do know that some of the readers of this book, and students from my former
    classes, actually work at Apple developing iOS code and doing the very special
    things you are about to see in this step. That''s why I love to say, “The clever
    people at Apple have coded…” because these clever people at Apple include people
    just like you, who began right here, reading the first version of this book. Right
    now, you probably just want to see what the clever people have coded for the `Tabbed
    Application`.


    ![images](images/00200.jpg)


    **Figure 6–8.** Run it so we can see what Apple has already coded for us.


    8. Run the app by clicking the Run button or pressing `R`, as illustrated in [Figure
    6–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos471786). If you''ve
    followed the instructions faithfully, you will see a “Build Succeeded” message
    and the iOS Simulator will start.


    ![images](images/00201.jpg)


    **Figure 6–9.** The first view to pop up will be the… First View.


    9. As illustrated in [Figure 6–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos472443),
    after you run the app you will see how the iOS Simulator pops up a First View.
    This is quite amazing. Those clever people at Apple have coded so much hardcore
    stuff and cool things that it leaves very little for you to do. Go ahead and play
    around with the app; click on the tabs to see that there really are, in fact,
    two different sets of content being shown. Remember that you haven''t even touched
    the `.xib` files or any of the code! However, this is exactly the point where
    the magic of the `Tabbed Application` template ends and your creative input begins.


    ![images](images/00202.jpg)


    **Figure 6–10.** The Second View appears when you select the “Second” tab.


    10. When you press the “Second” tab, located at the bottom of the screen, you
    will see that “Second View” pops up. So the tabs are actually working perfectly.
    I''m sure you will notice that while the `Tabbed Application` template sets up
    quite a bit and has prefilled some content, it''s rather drab and uninteresting.
    Most importantly, it doesn''t reflect anything that you might want it to do. Let''s
    fix that.


    #### Customizing the Tabs


    That Second View that you see in [Figure 6–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos473451)
    can be replaced, along with the first introductory view, with code, or the next
    level of a game, or the details of an address tab or recipe. For your purposes,
    simply insert a first image into the First View and a second image into the Second
    View.


    ![images](images/00203.jpg)


    **Figure 6–11.** Open up the First View nib file.


    11. Switch back to Xcode and click the “Stop” button. Select the `.xib` file called
    `FirstViewController.xib`, as shown in [Figure 6–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos474803).
    This shows what you saw in the iOS Simulator, minus the actual tabs on the Tab
    Bar. Let''s set up your environment to make it easier for you to edit the nib
    (`.xib`). If you don''t already have the Utilities View visible, click the appropriate
    view button to make it visible at the right side of the screen. You don''t need
    the Debug View right now, so you can hide that. You don''t really need the Navigator
    at the moment, either, but some developers (like Brian, the PhD student running
    this video) like to have it visible at all times. That is your choice.


    ![images](images/00204.jpg)


    **Figure 6–12.** Delete the UILabels.


    12. To use your own images, you need to get rid of the ones Apple has provided.
    Click each of the `UILabels` and delete them by pressing the Delete key while
    each is selected. Your screen should resemble [Figure 6–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos475915).
    Many tabs do have text content, but yours will not, so these UI elements are not
    necessary. This leaves you with a blank view, as can be seen explicitly in the
    left side of the Standard Editor.


    ![images](images/00205.jpg)


    **Figure 6–13.** Drag a UIImage onto your view.


    13. From the toolbox at the bottom of the Utilities View, find the image view
    (`UIImageView`) icon and drag it into the main area. As you do so, it expands
    to the same size as the area you can fill (in this case, the whole view). Use
    the guides to line up the `UIImageView` with the borders of the simulated iPhone
    window. This is illustrated in [Figure 6–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos476699).


    ![images](images/00206.jpg)


    **Figure 6–14.** Associate your first images with the first UIImageView.


    14. In the Utilities View, go to the Attributes Inspector (`4`) and click the
    Image drop-down, as shown in [Figure 6–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos477439).
    This list is populated with a list of images that Xcode has found in our project:
    `first.png` and `second.png` are the circle and square that Xcode has used as
    icons for each of the respective tabs, while `icon.png` is our app icon, leaving
    two entries that correspond to the images you dragged into the project in [Figure
    6–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos469321). Select `PIC01`
    and Xcode will show it in the `UIImageView`.


    ![images](images/00207.jpg)


    **Figure 6–15.** Select a View Mode.'
  raw: '#### Adding the Images to the Project


    At this stage, it''s probably a good idea to drag your imagery to use on the tabs,
    so you won''t have to worry about it later.


      ![images](images/00196.jpg)  


    Figure 6–4\. Drag in your 3 images from the desktop.


    4\. Drag your images from the desktop into supporting files, and in the process
    develop a very good habit for yourself. After dropping your images into the folder,
    you will be presented with a dialog, as shown in [Figure 6–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos468387).


      ![images](images/00197.jpg)  


    Figure 6–5\. Copy the items into the destination page''s folder.


    5\. Xcode recognizes that the images are not already part of this project, so
    it strongly recommends that you let it add them for you. As mentioned before,
    it''s also making sure that it has encapsulated your images inside itself, so
    if you go elsewhere to run it then it will be able to find your images and display
    them. This dialog also gives you the opportunity to change the actions it is about
    to perform, but, in general, the assumptions it makes are correct, so accept Xcode''s
    recommendations, as illustrated in [Figure 6–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos468387).


      ![images](images/00198.jpg)  


    Figure 6–6\. Drag your icon to the app''s icon property.


    6\. Typically, you open the `plist` to include the icon. In this app, you see
    a new way to associate an icon with your app. So, drag your icon file to the app''s
    properties. Notice how Xcode takes care of putting it in the right place in your
    project and setting up all the necessary linkages. This step is not critical if
    you don''t have an appropriately sized `.png` readily available. You can always
    change the icon later. Note that it only allows you to drop the correct sized
    icon into each specific box. In [Figure 6–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos469321)
    you see the icon being dragged into the app''s icon property.


      ![images](images/00199.jpg)  


    Figure 6–7\. Warning that you dropped the images into the wrong place.


    7\. Xcode displays a warning indicating that it will copy the icon from its current
    location to the “correct” place, which is fine. As with the previous warning,
    simply accept Xcode''s recommendations. You, of course, will not see this if you
    dropped your images into the correct folder. This is illustrated in [Figure 6–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos470321).


    #### Running the App


    You do know that some of the readers of this book, and students from my former
    classes, actually work at Apple developing iOS code and doing the very special
    things you are about to see in this step. That''s why I love to say, “The clever
    people at Apple have coded…” because these clever people at Apple include people
    just like you, who began right here, reading the first version of this book. Right
    now, you probably just want to see what the clever people have coded for the Tabbed
    Application.


      ![images](images/00200.jpg)  


    Figure 6–8\. Run it so we can see what Apple has already coded for us.


    8\. Run the app by clicking the Run button or pressing ![images](images/00031.jpg)R,
    as illustrated in [Figure 6–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos471786).
    If you''ve followed the instructions faithfully, you will see a “Build Succeeded”
    message and the iOS Simulator will start.


      ![images](images/00201.jpg)  


    Figure 6–9\. The first view to pop up will be the… First View.


    9\. As illustrated in [Figure 6–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos472443),
    after you run the app you will see how the iOS Simulator pops up a First View.
    This is quite amazing. Those clever people at Apple have coded so much hardcore
    stuff and cool things that it leaves very little for you to do. Go ahead and play
    around with the app; click on the tabs to see that there really are, in fact,
    two different sets of content being shown. Remember that you haven''t even touched
    the `.xib` files or any of the code! However, this is exactly the point where
    the magic of the Tabbed Application template ends and your creative input begins.


      ![images](images/00202.jpg)  


    Figure 6–10\. The Second View appears when you select the “Second” tab.


    10\. When you press the “Second” tab, located at the bottom of the screen, you
    will see that “Second View” pops up. So the tabs are actually working perfectly.
    I''m sure you will notice that while the Tabbed Application template sets up quite
    a bit and has prefilled some content, it''s rather drab and uninteresting. Most
    importantly, it doesn''t reflect anything that you might want it to do. Let''s
    fix that.


    #### Customizing the Tabs


    That Second View that you see in [Figure 6–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos473451)
    can be replaced, along with the first introductory view, with code, or the next
    level of a game, or the details of an address tab or recipe. For your purposes,
    simply insert a first image into the First View and a second image into the Second
    View.


    ![images](images/00203.jpg)


    Figure 6–11\. Open up the First View nib file.


    11\. Switch back to Xcode and click the “Stop” button. Select the `.xib` file
    called `FirstViewController.xib,` as shown in [Figure 6–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos474803).
    This shows what you saw in the iOS Simulator, minus the actual tabs on the Tab
    Bar. Let''s set up your environment to make it easier for you to edit the nib
    (`.xib`). If you don''t already have the Utilities View visible, click the appropriate
    view button to make it visible at the right side of the screen. You don''t need
    the Debug View right now, so you can hide that. You don''t really need the Navigator
    at the moment, either, but some developers (like Brian, the PhD student running
    this video) like to have it visible at all times. That is your choice.


    ![images](images/00204.jpg)


    Figure 6–12\. Delete the UILabels.


    12\. To use your own images, you need to get rid of the ones Apple has provided.
    Click each of the UILabels and delete them by pressing the Delete key while each
    is selected. Your screen should resemble [Figure 6–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos475915).
    Many tabs do have text content, but yours will not, so these UI elements are not
    necessary. This leaves you with a blank view, as can be seen explicitly in the
    left side of the Standard Editor.


    ![images](images/00205.jpg)


    Figure 6–13\. Drag a UIImage onto your view.


    13\. From the toolbox at the bottom of the Utilities View, find the image view
    (UIImageView) icon and drag it into the main area. As you do so, it expands to
    the same size as the area you can fill (in this case, the whole view). Use the
    guides to line up the UIImageView with the borders of the simulated iPhone window.
    This is illustrated in [Figure 6–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos476699).


    ![images](images/00206.jpg)


    Figure 6–14\. Associate your first images with the first UIImageView.


    14\. In the Utilities View, go to the Attributes Inspector (![images](images/00085.jpg)![images](images/00031.jpg)4)
    and click the Image drop-down, as shown in [Figure 6–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos477439).
    This list is populated with a list of images that Xcode has found in our project:
    `first.png` and `second.png` are the circle and square that Xcode has used as
    icons for each of the respective tabs, while `icon.png` is our app icon, leaving
    two entries that correspond to the images you dragged into the project in [Figure
    6–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos469321). Select `PIC01`
    and Xcode will show it in the UIImageView.


    ![images](images/00207.jpg)


    Figure 6–15\. Select a View Mode.'
  trans: '好的，遵照您的要求，以下是翻译后的中文文档：



    #### 将图像添加到项目中


    此时，建议您将要用在标签上的图像拖入项目，这样以后就不用再为这件事操心了。


    ![images](img/00196.jpg)


    **图 6–4.** 从桌面拖入您的 3 张图像。


    4. 将图像从桌面拖入`supporting files`文件夹，在这个过程中为自己培养一个好习惯。将图像放入文件夹后，会弹出一个对话框，如图 6–5 所示。


    ![images](img/00197.jpg)


    **图 6–5.** 将项目复制到目标页面的文件夹中。


    5. `Xcode` 检测到这些图像尚未属于本项目，因此强烈建议您让它为您添加它们。如前所述，它还会确保将这些图像封装在自身内部，这样如果您在其他地方运行项目，它也能找到您的图像并显示出来。此对话框还允许您更改它即将执行的操作，但通常它所做的假设是正确的，因此请接受
    `Xcode` 的建议，如图 6–5 所示。


    ![images](img/00198.jpg)


    **图 6–6.** 将您的图标拖到应用的图标属性上。


    6. 通常，您需要打开 `plist` 来包含图标。在这个应用中，您会看到一种将图标与应用关联起来的新方法。因此，将您的图标文件拖到应用的属性中。请注意 `Xcode`
    如何自动将其放在项目中的正确位置并设置所有必要的链接。如果您手头没有尺寸合适的 `.png` 文件，这一步并不是必须的。您可以稍后随时更改图标。请注意，它只允许您将正确尺寸的图标放入每个特定的框中。在
    图 6–6 中，您可以看到图标正被拖入应用的图标属性中。


    ![images](img/00199.jpg)


    **图 6–7.** 警告您将图像放错了位置。


    7. `Xcode` 会显示一条警告，提示它将把图标从其当前位置复制到“正确”的位置，这没问题。与之前的警告一样，只需接受 `Xcode` 的建议即可。当然，如果您把图像拖入了正确的文件夹，就不会看到这个警告。如图
    6–7 所示。


    #### 运行应用


    您知道吗，这本书的一些读者，以及我以前的一些学生，实际上就在苹果公司工作，编写 iOS 代码，做着您即将在这一步中看到的非常特别的事情。这就是为什么我喜欢说：“苹果公司那些聪明的人们已经编写了……”，因为这些苹果公司的聪明人里就包括像您一样，从这里开始，阅读本书第一版的人。现在，您可能只是想看看那些聪明人为
    `Tabbed Application` 编写了些什么。


    ![images](img/00200.jpg)


    **图 6–8.** 运行它，看看苹果已经为我们编写了什么。


    8. 点击“运行”按钮或按下 `R` 键来运行应用，如图 6–8 所示。如果您忠实地遵循了说明，您将看到“构建成功”消息，并且 iOS 模拟器将启动。


    ![images](img/00201.jpg)


    **图 6–9.** 首先弹出的视图将是……第一视图。


    9. 如图 6–9 所示，运行应用后，您将看到 iOS 模拟器弹出一个第一视图。这非常令人惊讶。苹果公司那些聪明的人们已经编写了大量核心代码和很酷的功能，留给您的工作所剩无几。继续，随意摆弄这个应用；点击那些标签，看看是否真的显示了两组不同的内容。请记住，您甚至还没有碰过
    `.xib` 文件或任何代码！然而，这正是 `Tabbed Application` 模板神奇之处的终点，也是您发挥创意的起点。


    ![images](img/00202.jpg)


    **图 6–10.** 当您选择“第二个”标签时，第二视图出现。


    10. 当您按下屏幕底部的“第二个”标签时，您会看到“第二视图”弹出。所以这些标签确实工作得非常完美。我相信您会注意到，虽然 `Tabbed Application`
    模板设置了很多内容并预填了一些内容，但它相当单调乏味。最重要的是，它没有反映出您可能希望它做的任何事情。让我们来修复这个问题。


    #### 自定义标签


    您在 图 6–10 中看到的第二视图以及第一个介绍性视图，都可以被替换为代码、游戏的下一个关卡、地址标签或食谱的详细信息。出于您的目的，只需在第一视图中插入第一张图像，在第二视图中插入第二张图像。


    ![images](img/00203.jpg)


    **图 6–11.** 打开第一视图的 nib 文件。


    11. 切换回 Xcode 并点击“停止”按钮。选择名为 `FirstViewController.xib` 的 `.xib` 文件，如图 6–11 所示。这将显示您在
    iOS 模拟器中看到的内容，只是没有标签栏上的实际标签。让我们设置好您的环境，以便更轻松地编辑 nib (`.xib`) 文件。如果您还没有显示实用工具视图，请点击相应的视图按钮使其在屏幕右侧显示。您现在不需要调试视图，因此可以将其隐藏。您目前也不需要导航器，但有些开发者（比如正在运行此视频的博士生
    Brian）喜欢让它一直可见。这是您的选择。


    ![images](img/00204.jpg)


    **图 6–12.** 删除 UILabels。


    12. 要使用您自己的图像，您需要移除苹果提供的那些图像。依次点击每个 `UILabels`，并在选中它们时按 Delete 键将其删除。您的屏幕应该类似于
    图 6–12。许多标签确实有文本内容，但您的没有，因此这些 UI 元素是不必要的。这会让您得到一个空白的视图，在标准编辑器的左侧可以清晰地看到这一点。


    ![images](img/00205.jpg)


    **图 6–13.** 将 UIImage 拖到您的视图上。


    13. 从实用工具视图底部的工具箱中，找到图像视图 (`UIImageView`) 图标并将其拖到主区域中。当您这样做时，它会扩展到与您可填充区域（在本例中为整个视图）相同的大小。使用参考线将
    `UIImageView` 与模拟 iPhone 窗口的边框对齐。如图 6–13 所示。


    ![images](img/00206.jpg)


    **图 6–14.** 将您的第一个图像与第一个 UIImageView 关联起来。


    14. 在实用工具视图中，转到属性检查器 (`4`) 并点击图像下拉菜单，如图 6–14 所示。此列表填充了 Xcode 在项目中找到的图像列表：`first.png`
    和 `second.png` 是 Xcode 用作各标签图标的圆形和方形，而 `icon.png` 是我们的应用图标，剩下两个条目对应于您在 图 6–6 中拖入项目的图像。选择
    `PIC01`，Xcode 会将其显示在 `UIImageView` 中。


    ![images](img/00207.jpg)


    **图 6–15.** 选择视图模式。

