    16\. Once the `luluIcon.png` appears inside the second `UIImageView`, I want you
    to leave the Attributes dialogue in your Utilities pane and click the Size inspector
    (![images](images/00031.jpg)![images](images/00085.jpg)5 ); make the width of
    the lulu icon a square consisting of 112 × 112 pixels. Also, set the y-axis height
    to be 137 pixels down from the top of the View pane. You can either center the
    icon manually (as I do) or do it in the x-axis box. This is illustrated in [Figure
    5–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos362953).


    ![images](images/00167.jpg)


    Figure 5–17\. Click the Assistant to bring up your touchesViewController header
    file.


    17\. We have completed dragging and positioning all the items necessary onto your
    nib. Now we need to connect these items to your code, as we have done before.
    We need to work on the `touchesViewController` header file. Click the Assistant
    button and your screen will look similar to what is shown in [Figure 5–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos363881).


    ![images](images/00168.jpg)


    Figure 5–18\. Reposition your screen so you can work on the header file.


    18\. There are potentially two things here. First, depending on how large your
    screen is, you may have to resize or position your View pane inside the nib so
    that you can see all three of your buttons. Secondly, add curly brackets to the
    `@property` directive, as illustrated in [Figure 5–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos364638).


    NOTE: If you are in Version 4.0 or earlier, you will not need to add squiggly
    brackets to your `@interface` directive, as they are automatically instantiated
    However, if you are using a higher, more recent version of Xcode, then you will
    probably have to add the squiggly brackets, as shown in [Figure 5–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos364638).


    ![images](images/00169.jpg)


    Figure 5–19\. Control-drag a connection from your icon in Interface Builder into
    your header file.


    19\. Typically, in the past, when we reached this juncture, I instructed you to
    just blindly start control-dragging outlets and action into your `@directive`.
    Today, however, we will first think about what we''re going to do, so we can fuse
    synapses in your brain to understand how to create a robust header file. To recap
    what you have done in the past, I fed you a ration of Outlets and actions using
    the following very broad criteria:


    *   Outlets to connect nib file members with your `UIImageViews` code, which the
    clever people at Apple wrote for us

    *   Actions to connect your buttons with code we wrote in the implementation file


    > Now, we are going to grow up and move on. Remember how I mentioned that when
    we click the Shrink button, it shrinks the lulu fruit icon and the text inside
    it changes to Grow; then when we press the button again, it makes it grow? Well,
    we need to use the code the folks at Apple wrote that allows us to do cool things
    like change the colors, text, and other appearances inside a button.


    NOTE: This code provided by Apple is located in a class called `UIButton`. When
    we use this code, we say we are using an instance of `UIButton`. In short, we
    need an outlet for our Change button, so we can change the text in it to go from
    Shrink to Grow.


    > We will, of course, also need an outlet for the lulu fruit icon and the background
    that will hold whatever `WallPaper_0x.png` is being used. So, we will need three
    outlets. After we have correctly control-dragged our three outlets into the `@properties`
    directive, it will look something like this:


    `IBOutlet UIImageView *``some variable name;`

    `IBOutlet UIImageView *``some variable name;`

    `IBOutlet UIButton *``some variable name;`


    > Yup! We need to give each of these outlets variable names. Let''s use `myIcon`
    for the icon, `myBackground` for the background, and `shrinkButton` for the button
    that shrinks the lulu fruit icon. You could use different names, but do that later.
    Follow along with me now and it will look like this:


    `IBOutlet UIImageView *myIcon;`

    `IBOutlet UIImageView *myBackground;`

    `IBOutlet UIButton *shrinkButton;`


    > Insofar as the actions for the three buttons are concerned, they stay the same.
    We will still have three actions for our three buttons sitting right after and
    outside of the `@properties` directive, and the code will look something like
    this:


    `- (IBAction)``some variable name``:(id)sender;`

    `- (IBAction)``some variable name``:(id)sender;`

    `- (IBAction)``some variable name``:(id)sender;`


    > Yup! We need to give each of these actions variable names. Let''s use `shrink`
    for the Shrink button, `move` for the Move button, and `change` for the Change
    button. Again, you could use different variable names here, but for now just follow
    along with me. It will look like this:


    `- (IBAction)shrink:(id)sender;`

    `- (IBAction)move:(id)sender;`

    `- (IBAction)change:(id)sender;`


    > OK! So let''s get to it! Start off by control-dragging from your icon to the
    `@properties` directive, as illustrated in [Figure 5–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos365914).'
