    I explained exactly how to do this. It was a beautiful thing. But then something
    happened along the way. Mac OS X Lion removed the need for this entirely; an unexpected
    surprise. Now, you simply hold the u key until a little window appears, and you
    make the selection you need. Similar variations are available for other characters.
    You can explore these at your leisure. So, all these steps, between [figures 7–76](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos581760)
