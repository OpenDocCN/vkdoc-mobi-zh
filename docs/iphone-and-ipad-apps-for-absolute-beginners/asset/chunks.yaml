  trans: '

    ### 我们的工具：`FileMerge.app`


    还记得“学会销毁”吗？没错，`FileMerge.app` 就是我们用来实现这一点的工具。我曾以为，让我的学生和读者能够获取本书中应用代码，就足以让他们找出自己代码中的问题。但我错了：简单地将代码从我的网站下载到他们的桌面上，并不能解决他们所有的问题。作为一个极客，我喜欢追踪各种数据。我可以告诉你，在过去一年里，我向新手极客们发送了超过
    6,070 封包含我源代码链接的邮件回复。在这 6,070 位收到邮件并下载了代码的人中，仍有 4,208 人无法调试自己的代码！显然，我之前的做法有问题，我需要修正我的教学方法。于是，我这样做了。


    我在本章中给出了答案，向你展示如何下载我的源代码，使用 `FileMerge.app` 将你的代码与我的代码进行对比调试，从而找出你的错误——换句话说，就是教你如何“销毁”（或者用计算机术语说，“崩溃”）。


    在第 7 章中，我介绍了故事板（storyboarding）。在画布上拖拽对象并通过 segue 连接它们很有趣。现在，你将开始在这些对象背后编写大量代码，让它们更炫酷、更智能。我指的确实是大量的代码。你需要学会如何使用
    `FileMerge.app` 进行调试，将我的代码与你的代码进行对比。这是一堂我坚持要求你上的课，即使你可能觉得自己已经足够优秀，不需要它了。


    ### `switch-mistake`：崩溃艺术的一课


    你将重新审视第 6 章的 switch 代码，但这次你不会编写完整的应用程序，最重要的是，你将故意制造一个错误。然后，从网站下载我的代码，打开 `FileMerge.app`，并调试你的代码。现在，你可能会问，为什么我们不在第
    6 章直接做 switch 练习，然后回到这里进行调试呢？答案有三点：


    - 首先，正如我所说，你不会用上你在第 6 章的 switch 部分编写的所有代码，而且你需要以不同的顺序进行。所以，你需要从头开始，按照本章的步骤一步一步来。

    - 其次，代码的命名会有所不同。我希望你在本章编写的代码使用不同的名称，这样你的错误就不会冒出来。稍后我会解释这一点。

    - 第三，我只是想让你练习重做一个你已经熟悉的应用。这样一来，你的错误和调试过程就成为你的主要关注点。


    #### 启动项目


    所以，我们要做的第一件事是清理你的桌面，然后从我的网站下载源代码和图片。


    - 在此处下载图片：`bit.ly/raKxPe`


    注意：在每一步操作中，我只提供最简明的指示，直到你制造出错误为止。这是因为你已经做过这个练习了，现在我不再小心翼翼地指导了。


    > ![images](img/00314.jpg)

    > 图 8–1\. 一个干净的桌面，已下载三张图片，准备打开一个新项目


    1. 桌面上仅保留已下载的三张图片，保持干净，然后使用键盘快捷键 ![image](img/00031.jpg)![image](img/00032.jpg)N
    打开一个新项目。当出现如图 8–1 所示的新建项目向导时，点击“标签页应用程序”模板。


      ![images](img/00315.jpg)  

    图 8–2\. 将其命名为“switch-mistake”，然后点击“下一步”。


    2. 如图 8–2 所示，将其命名为“switch-mistake”，目标设备选择 iPhone，取消勾选“使用故事板”选项，然后点击“下一步”或按键盘上的
    ![image](img/00043.jpg) 键。


      ![images](img/00316.jpg)  

    图 8–3\. 将图标拖到“应用程序图标”框中。


    3. 将应用程序图标 `icon.png` 从桌面拖拽到“应用程序图标”框中，如图 8–3 所示。


      ![images](img/00317.jpg)  

    图 8–4\. 应用程序图标已正确放入框中


    4. 图 8–4 显示了图标已正确放入“应用程序图标”框中。请注意，通常你会使用 `plist` 来确定哪个图像作为你的图标。在这里，你是第二次使用拖放方法。

    '
- fmt: "### Creating the Views\n\nNow that you have an icon, you can begin building\
    \ the app.\n\n![images](images/00318.jpg)\n\nFigure 8–5. Drag and drop the remaining\
    \ two images into the project.\n\n5. Drag and drop the two remaining images from\
    \ your desktop into the `Supporting Files` folder, as illustrated in Figure 8–5.\n\
    \n![images](images/00319.jpg)\n\nFigure 8–6. Create groups for added folders and\
    \ add the icon image to your targets.\n\n6. After you have dropped all your images\
    \ into the project resources folder, make sure to check your dialog box prompt.\
    \ Make sure that `Create groups for any added folders` is checked and that the\
    \ project is selected under `Add to targets`. This is shown in Figure 8–6.\n\n\
    ![images](images/00320.jpg)\n\nFigure 8–7. Open `FirstViewController.xib`.\n\n\
    7. Open `FirstViewController.xib`, as shown in Figure 8–7.\n\n![images](images/00321.jpg)\n\
    \nFigure 8–8. Open the Utilities Inspector.\n\n8. You need to grab stuff from\
    \ the library, so open up the Utilities Inspector, as shown in Figure 8–8.\n\n\
    ![images](images/00322.jpg)\n\nFigure 8–9. Delete the default labels.\n\n9. You\
    \ need to clear out the First View to add your content, so delete the First View\
    \ label and the label with the text that starts: Loaded by the first view…. Figure\
    \ 8–8 shows the latter label being deleted. The First View label has already been\
    \ deleted in Figure 8–9.\n\n![images](images/00323.jpg)\n\nFigure 8–10. Drag a\
    \ `UIImageView` onto your view design area.\n\n10. With your Utilities panel open,\
    \ drag a `UIImageView` onto your view design area, as shown in Figure 8–10.\n\n\
    ![images](images/00324.jpg)\n\nFigure 8–11. Associate `PIC01.png` with the First\
    \ View.\n\n11. With the first `UIImageView` selected, go to the image drop-down\
    \ menu in the Attributes dialog in your Utilities panel, as indicated in Figure\
    \ 8–11. Select `PIC01.png` and associate it with your first `UIImageView`.\n\n\
    ![images](images/00325.jpg)\n\nFigure 8–12. Select “Bottom” for the View Mode.\n\
    \n12. As shown in Figure 8–12, now click `Mode` and select “Bottom” from the drop-down\
    \ menu.\n\n![images](images/00326.jpg)\n\nFigure 8–13. Open the Second View Controller.\n\
    \n13. Open the Second View Controller, as illustrated in Figure 8–13.\n\n![images](images/00327.jpg)\n\
    \nFigure 8–14. Delete the Second View's labels.\n\n14. Figure 8–14 shows deleting\
    \ the labels in the Second View, just as you did in the First View.\n\n![images](images/00328.jpg)\n\
    \nFigure 8–15. Close the Utilities panel.\n\n15. Close the Utilities panel, as\
    \ shown in Figure 8–15.\n\n![images](images/00329.jpg)\n\nFigure 8–16. Open the\
    \ Assistant.\n\n16. Open the Assistant, as illustrated in Figure 8–16.\n\n![images](images/00330.jpg)\n\
    \nFigure 8–17. Setup an outlet and call it `myImage`.\n\n17. Control-drag onto\
    \ the `SecondViewController` header file and set up an outlet called `myImage`,\
    \ as shown in Figure 8–17.\n\n### Creating the Bug\n\nYou need to enter code for\
    \ the outlet you created and introduce the bug. Then you can debug your app.\n\
    \n![images](images/00331.jpg)\n\nFigure 8–18. Open `SecondViewController`'s implementation\
    \ file.\n\n18. Open the Implementation file, as shown in Figure 8–18.\n\n![images](images/00332.jpg)\n\
    \nFigure 8–19. Click in your `viewDidLoad` method.\n\n19. You're going to make\
    \ the First View load the image incorrectly. So, let's code this now. Go to the\
    \ `viewDidLoad` method and click between the curly brackets to start coding, as\
    \ illustrated in Figure 8–19.\n\nOnce you open `viewDidLoad`, set the `UIImage`\
    \ to `PIC02` (recall that you already set the First View to `PIC01` in Interface\
    \ Builder), you want to set the content, the image, to be placed in scale to the\
    \ bottom of the view. This is a mistake, of course, and functions as the bug that\
    \ you will track down later in the example. This error doesn't exist in my app's\
    \ source code (and you didn't insert it in Chapter 6), so we can use my app to\
    \ track down the problem by comparing the files.\n\nThis bug will not generate\
    \ an error, but it will look “off” when you run it, just odd enough to serve as\
    \ a situation where you can efficiently find the bug you inserted and change it\
    \ to the correct code. The code inside `viewDidLoad` is as follows:\n\n```\n-\
    \ (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    [myImagesetImage:[UIImage\
