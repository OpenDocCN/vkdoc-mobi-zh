- fmt: '### How Does This All Work?


    Before we start our first program in [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161),
    it’s critical that you are able to step back and know where we’ve been, where
    we are now, and where we will go next. In other words, you may ask yourself: How
    do I convert an innovative idea for an iPhone or iPad app into money in my back
    pocket? How does this work? Does it even work or are all those crazy stories of
    people making massive amounts of money from iPhone and iPad Apps untrue?


    So, are these stories of Apps-to-Riches true? This is easy to answer. As of March
    02, 2011, when Steve Jobs revealed the iPad 2, he announced that Apple had paid
    a cumulative $2 billion to developers for apps sold in the App Store (see [Figure
    1–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos109760), #9). Note
    that only eight months earlier Apple announced that it had paid out $1 billion
    to iPhone and iPad app developers since the App Store launched in July 2008.


    A sum of $2 billion has never been paid to programmers before. You are entering
    a booming, epic event in computers and technology. Reading this book and learning
    how to program apps is going to change your life. During this new post-PC era,
    Apple has single-handedly created a never-before-seen environment for developers
    to take advantage of these more personal and powerful machines. This vibrant community
    of programmers that you are about to enter has helped push Apple’s count of apps
    up to more than 350,000. But still you may ask: How does this work?


    I have created map of how the innovative process works and you need to understand
    this to know where you are going with this book. Looking at [Figure 1–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos100865),
    I want you to start by looking at …err…YOU! Yes, that’s you there, at #1, sitting
    next to a bag of money represented by #11, which is the 11^(th) of 12 steps. Starting
    at #1, which is you with your brilliant innovative idea, you take your idea to
    #2, which represents the OSX on your Mac. Once you open your Mac, you are accessing
    the SDK (#3), which includes the iPhone/iPad Simulator (#4), Interface Builder
    (#5) and Xcode (#6), all lying on a gray strip that is part of your SDK iOS. These
    items (#4 to #6) will be explained in detail later; 90 percent of this book deals
    with the items in this strip. The only thing not covered here is where you convert
    your idea into code by programming in Objective-C.


    ![images](images/00029.jpg)


    **Figure 1–21.** The iPhone and iPad app programming landscape


    **NOTE:** In [Figure 1–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos100865),
    the gray box contains the Interface Builder (#5) which technically is not supposed
    to exist in these latest versions of Xcode. The problem is that it’s still there,
    just in the background and we still use it extensively in Storyboarding ([Chapter
    7](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_022.html#filepos504312)) onwards. So,
    be aware that some will say Interface Builder is gone (they’re wrong) and that
    we are not using it (wrong again. We do after [Chapter 7](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_022.html#filepos504312)).
    To the left of this area is where you’ve already been: Remember that you have
    a Mac with an OSX (#2) purchased after 2006 and running Mac OS X 10.7.2 or higher,
    and we’ve just walked through the process of downloading the iPhone and iPad SDK
    (#3) ([Figures 1–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos66409)
    through [1–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos89581)).
    We have also extracted the iPhone/iPad Simulator (#4), Interface Builder (#5)
    and Xcode (#6) and positioned them onto your dock ([Figure 1–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos73016)).


    In [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161),
    we will start using Xcode (#6), Interface Builder (#5), and the iPhone/iPad Simulator
    to turn you into a bona-fide geek! In your geeky state you will test your Apps
    on real iPads (#7) and real iPhones (#8). Once you know that your code works fanatabulously
    (that’s my geekdom word), you will upload your app to the App Store (#9) where
    people with money (#10) will download your app by paying the App Store money.
    The money that is received by the App Store is split up, with two-thirds of it
    going to you and one-third going to Apple.


    We’re going to run all of the programs we create by compiling them to one of several
    possible locations—the icons for these are to the right of the central gray area.
    The primary location will be the iPhone/iPad Simulator. The secondary locations
    will be your local iPhone and/or your local iPad. Lastly, we could use `iTunes`
    to upload your iPhone and/or iPad App to the App Store, where people can purchase
    it or download it for free. This is where we are going.


    The two central objects in [Figure 1–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos100865),
    as you now know, are where we will spend the vast majority of our time within
    this book. We’ll be using Xcode to type in code, just like the serious geeks do.
    I’ll show you how to operate all of its features, such as file management, compilation,
    debugging, and error reporting. Interface Builder is the cool way Apple allows
    us to drag and drop objects onto our iPhone/iPad apps. If you want a button, for
    instance, you simply drag and drop it where you want it to be located on the virtual
    iPhone or iPad.


    Essentially, we’ll use Xcode to manage, write, run, and debug your app—to create
    the content and functionality. We’ll use Interface Builder to drag and drop items
    onto your interface until it looks like the colorful and cool application you
    envisioned—to give it the style, look, and feel that suits your artistic tastes.


    After we integrate all of the interface goodies with the code that we wrote in
    Xcode, we might get advanced and tweak the parameters that deal with memory management
    and efficiency. But that’s jumping too far ahead in our story.


    ### Our Road Map: Using Xcode and Interface Builder


    Very often, authors of programming books do the same old thing. First, they present
    a very simple, ubiquitous “Hello World” application and then they throttle the
    user with intense code that loses a great many readers and students straight away.
    Utilizing Objective-C (being run in Cocoa) along with the iPhone and iPad SDK,
    I’ve had to really rethink this introductory process. I have identified four challenges
    here:


    *   Teaching you “Hello World” and then going into advanced technologies and APIs
    would be counter-productive.

    *   It makes no sense to randomly choose one of the many ways to say Hello to
    the world from your iPhone or iPad. They are all going to be necessary to have
    in your toolkit at a later date.

    *   Trying to write a simple “Hello World” application in Objective-C is more
    involved than the beginner is ready for, unless we break up the process into stages
    or layers.

    *   Deciding how to progress slowly, get comfortable, and become familiar with
    the nomenclature and the process, and then get to Storyboarding and other more
    advanced concepts.


    My solution to overcoming these issues is simple. I’ll show you how to say hello
    to the world from your iPhone/iPad in not one, not two, but quite a few different
    ways. Each time, we’ll go a little bit deeper, and we’ll have a blast as we do
    so.


    Each time you travel down the road into the land of Xcode, you are immediately
    asked what type of vehicle you’d like to drive. A Jeep? A race car? A convertible?
    By focusing on basics, I am going to show you how to “drive” in Xcode. The objective
    here will be to gain competence and confidence in whatever style of vehicle we
    must access. So, let’s take a look at exactly what these different vehicles have
    to offer. Here, I would like you to follow along with me.'
