  trans: '

    ### 时光飞梭十七载


    想象一位长发飘飘、不拘一格的教授，身穿复古与随性碰撞的醒目装扮，行走在科罗拉多大学科罗拉多斯普林斯分校的校园里。当他走进工程楼时，迎接他的是学生们和教职员工，他们微笑着热情打招呼，同时大概仍会对他那身花呢夹克、感恩而死乐队的
    T 恤、卡其裤和人字拖暗自摇头。当他沿着计算机科学系的走廊走去时，办公室门外已排着一队学生。这情景让人想起早年他在计算机实验室担任监考员时，求助台前等候的那排学生。他们转身向他打招呼：“早安，刘易斯博士！”这些科罗拉多大学斯普林斯分校的学生中，许多人甚至不是他班上的，但他们知道刘易斯博士无论如何都会见他们并提供帮助。


    ### 过去—现在—未来


    刘易斯博士拥有三个学位。他获得了雪城大学计算机工程理学学士学位。雪城大学的 LC 史密斯工程学院是全美顶尖学院之一，英特尔、AMD 和微软都会派遣顶尖员工来此攻读博士学位。


    完成学士学业（主攻微处理器电子电路的数学）后，他穿过校园广场，进入雪城大学法学院。在法学院第一个暑假，全国最具影响力的律师事务所富布莱特与贾沃斯基招募罗里到其奥斯汀办公室工作，那里的一些律师专门从事高科技知识产权专利诉讼。作为实习工作的一部分，刘易斯参与了著名的
    AMD 诉英特尔案，协助资深合伙人评估微处理器电路算法的数学原理。


    在法学院第二个暑假，同样参与 AMD 诉英特尔案的另一家律师事务所——斯凯尔文、莫里尔、麦克弗森、富兰克林与弗里尔——邀请罗里到其在硅谷的分支机构（圣何塞和旧金山）工作。在沉浸于法律领域数年并获得雪城大学法学博士学位后，刘易斯意识到自己的热情在于计算机数学，而非硬件和软件的法律纠纷。他更喜欢学习和创造的环境，而非法律中固有的争论与对抗。


    离开学术界三年后，罗里·刘易斯南下北卡罗来纳大学夏洛特分校攻读计算机科学博士学位。在那里，他师从兹比格涅夫·W·拉斯博士，这位学者以其在数据挖掘算法与方法、分布式数据挖掘、本体论和多媒体数据库领域的创新享誉全球。攻读博士学位期间，刘易斯为计算机工程本科生教授计算机科学课程，并为
    MBA 学生讲授电子商务和编程课程。


    获得计算机科学博士学位后，罗里接受了科罗拉多大学科罗拉多斯普林斯分校计算机科学的终身轨教职，他的研究方向是神经科学的计算数学。最近，他与人合著了一份关于下丘脑相关癫痫起源数学分析的资助申请书。然而，随着苹果革命性的
    iPhone 及其独特灵活的平台——以及微型应用、游戏和个人计算工具的市场——的兴起，他变得兴奋不已，开始为了个人乐趣进行实验和编程。在熟练掌握后，刘易斯认为自己可以开设一门包括非工科学生在内的
    iPhone 应用课程。凭借作为 iPhone 测试版测试员的内部知识，他甚至早在 2010 年 4 月官方发布之前，就将拟议的 iPad 平台参数整合到了教学计划中。


    这门课程取得了巨大成功，来自学生和同事的反馈都极为积极。当被问及是否愿意将课程改编成书由 Apress 出版时，刘易斯博士欣然抓住了这个机会。他愉快地接受了将其课程大纲、课堂笔记和视频转化为您手中这本书的邀请。


    ### 为何撰写此书？


    刘易斯博士撰写此书的原因，与他最初决定为工科和非工科专业开设课程的原因相同：挑战与乐趣！据刘易斯所言，iPhone 和 iPad 是“……有史以来最酷、最强大、技术最先进的工具之一——句号！”


    令他着迷的是，在那些高分辨率图像和有趣小图标构成、吸引人的触摸屏之下，iPhone 和 iPad 是用 Objective-C 这一极其困难和先进的编程语言编写的。越来越多的学生和同事找到刘易斯，想为
    iPhone 编写应用程序并征求他的意见。似乎每次 iPhone 更新，更不用说 iPad 扩展界面的问世，都对编程应用兴趣的闸门越开越宽。精彩而创新的想法只是需要一个合适的渠道，将其转化为适当的格式，然后推向世界。


    然而，一般来说，撰写 Objective-C 书籍的人的目标读者是那些精通 Java、C#或 C++的人。因此，由于似乎没有为那些虽有绝佳的 iPhone/iPad
    应用点子却资质平平的普通人提供帮助，刘易斯博士决定开设这样一门课程。他意识到，明智的做法是前半学期使用自己的笔记，然后探索能找到的最佳现有资源。


    在他推进这个计划时，最令他印象深刻的是《Beginning iPhone 3 Development: Exploring the iPhone SDK》这本书。这本
    Apress 出版的畅销教程由戴夫·马克和杰夫·拉马尔什撰写。刘易斯得出结论，他们的书为他的课程提供了一个极好的高层次目标……一种通往全面、流畅地为所有苹果多点触控设备编程的“垫脚石”方法。


    在刘易斯博士的课程成功讲授之后，在与 Apress 代表的一次后续谈话中，刘易斯偶然提到，直到学期中段他才开始使用那本书，因为他必须先让非工科学生跟上进度。编辑建议将他的笔记和大纲改编成一本入门指南——一本面向技术要求较低的编程人群的导论性书籍。从那时起，剩下的只是时间和细节问题——比如整理和修订刘易斯博士广受欢迎的教学视频，让其他渴望自己编写
    iPhone 和/或 iPad 应用的、非工科背景的人们也能获取。


    所以，这就是一位不拘一格的教授如何写出这本书的故事。我们希望您能受到鼓舞，把它带回家并开始行动。用这些知识武装自己，从此刻开始改变您的生活吧！


    本·伊斯顿

    作者、教师、编辑

    '
- fmt: '## About the Contributing Authors


    ![image](images/00004.jpg)Ben Easton is a graduate of Washington & Lee University
    and has a B.A. in Philosophy. His eclectic background includes music, banking,
    sailing, hang gliding, and retail. Most of his work has involved education in
    one form or another. Ben taught school for 17 years, mostly middle-school mathematics.
    More recently, his experience as a software trainer and implementer reawakened
    his long-time affinity for technical subjects. As a freelance writer, he has written
    several science fiction stories and screenplays, as well as feature articles for
    magazines and newsletters. Ben resides in Austin, Texas, and is currently working
    on his first novel.


    ![image](images/00005.jpg)Brian Parks PhD Student, Computer Science and Anthony
    Magee, MS student at UCCS work with Dr. Lewis and assisted in studying the various
    versions of the beta Xcode.


    Brian is in the Ph.D. program in Computer Science at the University of Colorado
    at Colorado Springs, where he regularly collaborates with Dr. Terrance Boult and
    Dr. Rory Lewis. He received his B.S. in Computer Science from Lehigh University,
    Pennsylvania. Brian specializes in software design and development techniques
    with an eye toward software engineering and architecture, especially with data-driven
    applications. Brian is also an educator and an academic; focusing on software
    engineering and design and, most recently, computer organization and assembly
    language programming while research focuses on computer vision and its relationship
    with psychological theories of vision.


    Anthony is currently finishing work towards a Masters degree in Computer Science
    at the University of Colorado at Colorado Springs, where he also received his
    Bachelors degree. Anthony is experienced in the design and development of software
    and has spearheaded the implementation and release of several software applications
    over his career. He has specialized in several fields as part of his collegiate
    and personal interests. These include theoretical and applied mathematics, software
    design, user interface design, computer science education, computer vision, and
    the list continues to expand.


    Brian and Anthony are the managing partners of Synapse Software.


    ## About the Technical Reviewer


    ![image](images/00006.jpg)Matthew Knott is a Learning Platform developer and SharePoint
    expert. He has been programming since a young age and hasn''t stopped learning
    since. An experienced C and C# developer, Matthew has recently started developing
    iOS apps to mobilize the Learning Platform. He lives in Wales, United Kingdom
    with his wife and two children and likes to write on his blog (`mattknott.com`)
    from time to time.


    ## Preface


    ### What This Book Will Do For You


    Let me get this straight: you want to learn how to program for the iPhone or the
    iPad, and you consider yourself to be pretty intelligent—but whenever you read
    computer code or highly technical instructions, your brain seems to shut down.
    Do your eyes glaze over when reading gnarly instructions? Does a little voice
    in your head chide you, “How about that! Your brain shut down six lines ago, but
    you''re still scanning the page—pretending you''re not as dense as you feel. Great!”


    See if you can relate to this…you''re having an issue with something pretty technical
    and you decide to Google it and troubleshoot the problem. You open the top hit
    and somebody else has asked the exact same question! You become excited as the
    page loads, but, alas, it''s only a bulletin board (a chat site for all those
    geeks who yap at one another in unintelligible code). You see your question followed
    by…but it''s too late! Your brain has already shut down, and you feel the tension
    and frustration as knots form in your belly.


    ### Sound familiar?


    Yes? Then this book''s for you! My guess is that you''re probably standing in
    a bookstore or in the airport, checking out a magazine stand for something that
    might excite you. Because you''re reading this in some such upscale place, you
    can probably afford an iPhone, a Mac, a car, and plane tickets. You''re probably
    intrigued by the burgeoning industry of handhelds and the geometric rate at which
    memory and microprocessors are evolving…how quickly ideas can be turned into startlingly
    new computing platforms, into powerful software applications, into helpful tools
    and clever games…perhaps even into greenbacks! And now you are wondering if you
    can get in on the action—using your intellect and technical savvy to serve the
    masses.


    ### How do I know this about you?


    Easy! Through years of teaching students to program, I know that if you''re still
    reading this, then you''re both intelligent enough and sufficiently driven to
    step onto the playing field of programming, especially for a device as sweet as
    the iPhone or as sexy as the iPad. If you identify with and feel connected to
    the person I''ve described above, then I know you. We were introduced to one another
    long ago.


    You are an intelligent person who may have mental spasms when reading complex
    code—even if you have some background in programming. And, even if you do have
    a pretty strong background in various programming languages, you are a person
    who simply wants an easy, on-point, no-frills strategy to learn how to program
    the iPhone and iPad. No problem! I can guide you through whatever psychological
    traffic jams you typically experience and help you navigate around any technical
    obstacles, real or imagined. I''ve done this a thousand times with my students,
    and my methodology will work for you too.


    ### The Approach I Take


    I don''t try and explain everything in minute detail. Nor do I expect you to know
    every line of code in your iPhone/iPad application at this stage. What I will
    do is show you, step by step, how to accomplish key actions. My approach is simultaneously
    comprehensive and easy-going, and I take pride in my ability to instruct students
    and interested learners along a wide spectrum of knowledge and skill sets.


    Essentially, I will lead you, at your own pace, to a point where you can code,
    upload, and perhaps sell your first iPhone/iPad app, simple or complex. Good news:
    the most downloaded apps are not complex. The most popular ones are simple, common-sense
    tools for life…finding your car in a parking lot, or making better grocery lists,
    or tracking your fitness progress. However, when you complete this book, you may
    want to graduate to other books in the Apress and Friends of ED series. You have
    quite a few options here, and down the road I''ll advise you regarding the best
    ways to move forward. Right now, though, you may want to read a little about me
    so you will feel confident in taking me on as your immediate guide in this exciting
    app-venture.


    May you experience great joy and prosperity as you enter this amazing and magical
    world.


    Peace!


    ![image](images/00007.jpg)


    Rory A. Lewis, PhD, JD


    ## Chapter 1'
