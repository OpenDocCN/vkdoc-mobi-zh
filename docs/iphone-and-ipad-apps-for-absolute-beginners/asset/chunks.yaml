    \ 中对此进行了说明。本质上，您需要将 URL 添加到请求中，并让您为其创建了 `IBOutlet` 的 `UIWebView` 对象加载您的请求。以下是实现文件和头文件的代码。请仔细研究，确保您理解两个文件中\
