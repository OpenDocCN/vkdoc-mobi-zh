    \ have really done something very special today. I know you may have cursed me\
    \ a couple of times, or floundered here and there, but in getting here you've\
    \ just done something very special with your life. You've gone from being a user\
    \ to a coder. You've taken that very difficult leap from being a user of technology\
    \ to a coder of technology. We still have a few things to do, so take a break.\
    \ Walk the dog; do something that does not involve technology, even if it’s walking\
    \ out to the street. Take a minute to realize that you’re beginning a long journey.\
    \ It will be difficult at times, but it’s one wherein you can hold your head high\
    \ and say: “Yeah, I code iPhone and iPad apps!”"
  trans: "\n### 12. 按下回车键（![图片](img/00043.jpg)），你会看到 `-(IBAction)button:(id)sender;`，如下所示及图\
    \ 2–12 所示。是的，我们将在本章末尾的“深入代码”部分详细讨论这一点。现在，让我们继续前进。\n\n```\n#import <uikit/UIKit.h>\n\
    @interface helloWorld_01ViewController : UIViewController {\n    IBOutletUILabel\
    \ *label;\n}\n- (IBAction)button:(id)sender;\n@end\n```\n\n在进入第 13 步之前，我们需要环顾四周，看看我们目前所在的位置。还记得吗？在第\
    \ 3 步中，我提到过我们有 2 个类，每个类包含两个文件（一个头文件（`.h`）和一个实现文件（`.m`））。让我稍微谈谈这两个文件的区别：一个带有 `.h`\
    \ 后缀，另一个带有 `.m` 后缀。\n\n`ViewController` 管理你的代码与显示之间的交互，同时也管理用户与代码之间的交互。它包含一个视图，但其本身并不是视图。到目前为止，你对\
    \ `ViewController` 类只有最基本的了解。不过，我希望你明白的是，正如第 3 步所述，每个类都由两部分组成：头文件（`.h`）和实现文件（`.m`）。\n\
    \n接下来这部分我希望你大声读出来，就算你在书店里也别介意，好吗？“我们在头文件中告诉计算机，我们将在实现文件中执行哪些类型的命令。”现在，结合我们的代码再说一遍：“我们在\
    \ `helloWorld_01ViewController.h` 文件中告诉计算机，我们将在 `helloWorld_01ViewController.m`\
    \ 文件中执行哪些类型的命令。”\n\n嗯，承认吧——这没那么难！\n\n让我们回到例子：\n\n![图片](img/00054.jpg)\n\n**图 2–13.**\
    \ 切换到标准编辑器。\n\n### 13. 要从这里进入实现文件，请养成首先切换视图，从助理编辑器（还记得我们在步骤 2-7 中做的吗？）切换到标准编辑器的习惯。为此，请转到视图选择器左侧的编辑器选择器，点击标准编辑器，如图\
    \ 2–13 所示。\n\n![图片](img/00055.jpg)\n\n**图 2–14.** 打开你的 `helloWorld_01ViewController`\
    \ 的实现文件。\n\n### 14. 进入标准编辑器后，选择你的 `ViewController` 的实现文件，如图 2–14 所示。\n\n还记得在第\
    \ 10 步中，当我们按住 Control 键将按钮拖入头文件的代码时，我们“声明了一个动作”吗？记住，在头文件中我们“声明”动作，而在实现文件中我们“实现”动作。在\
    \ `ViewController` 的实现文件中，我们将实现当有人按下按钮时我们希望发生的动作。具体来说，我们希望标签显示“Hello World!”。“嗯，我们该怎么做呢？”你可能会问。好吧，我们需要输入你的第一行代码，开始你走向极客之路的旅程。没错，你将编写文本代码。深吸一口气，跟着做。\n\
    \n查看你的 `helloWorld_01ViewController` 实现文件的文本，我们看到苹果公司的聪明人在 Xcode 中已经预先编写了许多需要在后台运行的方法，以使你的带有标签和按钮的应用能够在你的\
    \ iPhone 上运行。目前，我们将忽略这些方法，从第一个名为 `dealloc`（负责释放内存）的方法开始，一直往下直到我们看到一个名为 `- (IBAction)button:(id)sender`\
    \ 的方法。嗯……等等，这不是在第 12 步中出现的代码吗？对吧？嗯，差不多。那段代码以分号“`;`”结尾，因为在头文件中，我们声明了这个动作。Xcode\
    \ 知道我们现在需要在实现文件中实现这个动作，所以它为我们重写了它，不是作为声明，而是作为一个方法。它通过用花括号替换分号来实现这一点。你需要记住这个规则。你会反复用到它。\n\
    \n**注意：** 在 `.h` 文件中的声明，通过将分号替换为花括号，就成为了 `.m` 文件中的方法！\n\n在你找到了你在头文件中声明的动作的实现后，我希望你将光标放在两个花括号之间，如下方代码所示。点击那里并阅读下方内容。\n\
    \n![图片](img/00056.jpg)\n\n![图片](img/00057.jpg)\n\n**图 2–15.** 当你输入 `label.text`\
    \ 时，自动完成功能会建议代码。如果你同意该选择，则按下 Tab 键（![图片](img/00058.jpg)），Xcode 就会将该命令放入你的代码中。\n\
    \n### 15. 我希望你输入的代码是 `label.text = @\"Hello World!\"`，但这并不是那么简单，因为当你输入时，会发生一些非常酷的事情。Xcode\
    \ 会在其自动完成窗口中推断你可能想要输入的代码，如图 2–15 所示。如果你同意该选择，则按下 Tab 键（![图片](img/00059.jpg)），Xcode\
    \ 就会将完整的、拼写正确的命令放入你的代码中。如果它建议的不是正确的，但你看到正确的在下面几行，只需向下箭头键（↓）直到选中正确的选项，然后按下 ![图片](img/00059.jpg)。很酷吧？写完\
    \ `label.text` 后，继续第 16 步。\n\n![图片](img/00060.jpg)\n\n**图 2–16.** 在“`@`”指令后，输入你希望标签显示的文本。\n\
    \n### 16. 现在我们需要输入 `@\"Hello World!\";`，这就是我们想说的话。你的代码应该像图 2–16 所示。如果你想说的是“我感觉我正在变成一个极客！”，那么就输入\
    \ `label.text = @\"I can feel I’m becoming a geek!\";`。\n\n![图片](img/00061.jpg)\n\
    \n**图 2–17.** 保存你的工作：![图片](img/00062.jpg)S。\n\n### 17. 保存你的工作 ![图片](img/00031.jpg)S，如图\
    \ 2–17 所示。请尽量不要使用鼠标；努力养成每次想要保存时都按下 Control+S（![图片](img/00031.jpg)S）的新习惯。这会让你感觉并看起来非常聪明和极客。你可能还需要检查你的头文件和\
    \ nib 文件是否也已保存，因为在阅读这些说明的过程中，你可能需要返回并更改文件。那么，你需要返回并保存它们。所以现在就动手保存所有内容。如果文件以灰色突出显示，则意味着你也需要保存它们。\n\
    \n![图片](img/00063.jpg)\n\n**图 2–18.** 运行它！！![图片](img/00062.jpg)R。\n\n### 18. 按下\
    \ ![图片](img/00031.jpg)R 运行它，如图 2–18 所述。\n\n如图 2–19 所示，iPhone 模拟器加载了你第一个应用，等待你按下按钮，然后显示“Hello\
    \ World!”。\n\n![图片](img/00064.jpg)\n\n**图 2–19.** iPhone 模拟器加载并等待用户按下按钮，然后显示“Hello\
    \ World!”\n\n祝贺你，我的朋友！你今天真的做了一件非常特别的事。我知道你可能咒骂了我几次，或者在这里或那里挣扎过，但走到这一步，你的人生已经完成了一件非常特别的事。你从一个用户变成了一个编码者。你完成了一个非常艰难的飞跃：从技术的使用者变成了技术的编码者。我们还有一些事情要做，所以先休息一下。遛遛狗；做点与科技无关的事情，哪怕只是走到街上。花一点时间意识到你正在开始一段漫长的旅程。有时会很艰难，但这是一段你可以昂起头说：“是的，我编写\
    \ iPhone 和 iPad 应用！”的旅程。\n"
- fmt: "### Running your app on the iPad Simulator that reads your iPhone environment\n\
    \nTwo methods are available for running your iPhone app on the iPad simulator:\n\
    \n- First we'll change the environment from the iOS simulator, so, while still\
    \ in the iPhone simulator, I want you to click on **Hardware** ![Images](images/00027.jpg)**Device**\
    \ ![Images](images/00027.jpg)**iPad** so that we can see how your first app runs\
    \ if it were being run on an iPad (see [Figure 2–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos150429)).\
    \ The result is the display presented in [Figure 2–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos150708).\
    \ ![images](images/00065.jpg)\n\n    **Figure 2–20.** Let’s see how your iPhone\
    \ app runs on the iPhone simulator.\n\n    ![images](images/00066.jpg)\n\n   \
    \ **Figure 2–21.** Initially it appears in the iPhone mode. Click on the zoom\
    \ and view it full screen as shown here.\n\n- The second method is achieved by\
    \ changing the output device from within Xcode. To do this, I want you to close\
    \ your iPhone simulator by first making sure you're in the simulator and then\
    \ entering **Command + Q** (![Images](images/00031.jpg)Q). You should now be back\
    \ in Xcode.\n\n    **NOTE:** If you're not, then it means you've had other programs\
    \ up, which is something I asked you to not do. In order for you to follow along\
    \ exactly, you really need to keep your desktop and running programs identical\
    \ to how I am teaching you.\n\n    1. So now with Xcode open, change your scheme\
    \ to the iPad simulator by clicking on the **Scheme** drop-down menu on the upper\
    \ left hand portion of your ribbon and select **iPad Simulator**, as shown in\
    \ [Figure 2–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos152570).\
    \ Right now it says iPad 4.3 Simulator, but by the time you read this book it\
    \ probably will be a higher number.\n    2. Now enter ![Images](images/00031.jpg)R\
    \ to run it. Again, you will come up with the same instances displayed in [Figure\
    \ 2–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos150708).![images](images/00067.jpg)\n\
    \n    **Figure 2–22.** Second method of running your iPhone app in the iPad simulator.\n\
    \n### Running your App on the iPad Simulator\n\n##### `helloWorld_02` – iPad Simulator\n\
    \nAt the beginning of this chapter, I made a deal with you. I said we were going\
    \ to take a very simple app and run it in all the different forms possible. Specifically,\
    \ I said we would run your first app on:\n\n- §2.1. The iPhone Simulator: (![Images](images/00068.jpg)\
    \ see [Figure 2–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos148414)).\n\
    - §2.2. The iPad Simulator reading the iPhone environment (![Images](images/00068.jpg)\
    \ see [Figure 2–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos150708)).\n\
    - §2.3. The iPad Simulator.\n\nAt this point, you have already completed the first\
    \ two goals of running it on the iPhone simulator, with the latter being the iPad\
    \ reading an iPhone app. But this is not really an iPad app. A real iPad app is\
    \ made specifically for the iPad and cannot be run on an iPhone because all the\
    \ graphics and sizes of screens are specifically designed for the iPad and are\
    \ too large to be viewed on the iPhone.\n\nLooking at [Figure 2–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos150708),\
    \ you can see that the first image on the left shows your iPhone app inside the\
    \ iPad and scaled exactly to the size of an iPhone. When you clicked the zoom,\
    \ it simply zoomed and expanded everything larger to fit inside the iPad. Well,\
    \ this is what I refer to in class as being \"pseudoiPad,\" as it's not the real\
    \ deal. So let's go ahead and show you how to make an app specifically for the\
    \ iPad.\n\n1. We will need to close your `helloWorld_01` app in Xcode by entering\
    \ ![Images](images/00031.jpg)S to save it and then ![Images](images/00031.jpg)Q\
    \ to quit Xcode. You should now be looking at your empty desktop, except for the\
    \ `helloWorld_01` folder right under your Mac hard-drive icon. Good. We are now\
    \ going to run `helloWorld_02`, which will be exactly like `helloWorld_01` except\
    \ for a couple of steps.\n2. Open up Xcode and enter **Command + Shift + N** at\
    \ the same time. Recall that these three keystrokes appear in [Figure 2–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos123581)\
    \ as ![Images](images/00031.jpg)![Images](images/00032.jpg) N. Select **View-Based\
    \ App** and then press **Return** (![Images](images/00043.jpg)). Now stop and\
    \ look at [Figure 2–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos156653):\
    \ in [Figure 2–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos124680),\
    \ we named it `helloWorld_01`. However in [Figure 2–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos156653),\
    \ we name it `helloWorld_02`. Most importantly, in [Figure 2–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos156653),\
    \ we select **iPad**, NOT iPhone as we did in [Figure 2–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos124680).\
    \ With this done, I want you to try remember all of the steps we performed in\
    \ `helloWorld_01` until you run it, whereupon you will come up to only the right\
    \ hand image of [Figure 2–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos150708).\n\
    \n![images](images/00069.jpg)\n\n**Figure 2–23.** Open Xcode, select the Navigation-based\
    \ Application template, and then save a new project file to your desktop.\n\n\
    Huh? Yes that's what I said: I make my students in the lecture hall redo `helloWorld`\
    \ all over again, but now as a \"real\" iPad app and I encourage them to try and\
    \ not peek at their lecture notes, to try doing it on their own. If you have to\
    \ look at your notes, or this book, that's fine. But try to do it over and over\
    \ again, until you can do this without looking at any notes at all.\n\n### Running\
    \ your App on Physical Devices\n\n**TIP:** You may want to skip this section.\
    \ Read the following carefully.\n\nAfter you have set up your device and profiles,\
    \ you can continue on with steps §2.4, running your app on your iPhone, §2.5,\
    \ running your app on your iPad based off of an iPhone environment and §2.6, and\
    \ running your app on your physical iPad.\n\nWhatever your decision is, you will\
    \ need to first do the following organizational chores. Right now, on your beautiful\
    \ clean open desktop, you only have two folders containing your 2 `helloWorld`\
    \ programs. We need to make a place to store all of your programs that will make\
    \ sense to you as you continue to read this book. Create a folder in your **Documents**\
    \ folder called **My Programs**, and then save the files named `helloWorld_01`\
    \ and `helloWorld_02` there by dragging them to that folder. Now, with a fresh,\
    \ clean empty desktop, close all programs. Press **Command + Tab** and then **Command\
    \ + Q** to close everything until only the Finder is left on your screen.\n\n\
    **NOTE:** For students in my class or at other universities, I or your professor\
    \ has already taken care of this. If you are not a student and did not pay your\
    \ $99 in step 5 in [Chapter 1](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_010.html#filepos54331),\
    \ or/and you do not have an iPhone or iPad, then skip ahead to [Chapter 3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079)."
