- fmt: "**注意**：你可能会注意到我有时会说“按住 Control 键从 Interface Builder 中的 `____` 拖一条连线到你的头文件中”，而另一些时候我会说“按住\
    \ Control 键从 Interface Builder 中的 `_____` 拖一条连线到你的 `@property` 指令中”。这并非为了混淆你，而是想让你明白这两种说法意思相同，并且你可能会与习惯使用其中一种说法的人共事，或者为他们工作，或者在工作中遇到这样的人。\n\
    \n![images](images/00170.jpg)\n\n**图 5–20.** 保持图标作为插座变量，并将其命名为“`myIcon`”。\n\n\
    20\\. 如图 [图 5–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos371707)\
    \ 所示，当你将“钓鱼线”收回到你的 `@property` 中时，请保持它作为插座变量，并将其命名为 `myIcon`。\n\n![images](images/00171.jpg)\n\
    \n**图 5–21.** 按住 Control 键从背景上的任意位置拖一条连线到 `@property` 指令。\n\n21\\. 现在，我们需要将拖入视图设计区域的\
    \ `UIImageView` 与头文件中的 `@property` 指令连接起来，如图 [图 5–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos372281)\
    \ 所示。\n\n![images](images/00172.jpg)\n\n**图 5–22.** 保持图标作为插座变量，并将其命名为“`myBackground`”。\n\
    \n22\\. 如图 [图 5–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos372905)\
    \ 所示，当你将“钓鱼线”收回到你的 `@property` 中时，请保持它作为插座变量，并将其命名为 `myBackground`。\n\n![images](images/00173.jpg)\n\
    \n**图 5–23.** 按住 Control 键从 Interface Builder 中的 Shrink 按钮拖一条连线到你的头文件中。\n\n23\\\
    . 如图 [图 5–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos373491) 所示，在\
    \ Interface Builder 中单击 Shrink 按钮一次后，按住 Control 键将其拖入头文件中 `@interface` 指令的大括号之间。我们在第\
    \ 19 节中已经讨论过为什么这是第一次将按钮连接到 `@property` 指令。如果你跳过了那一节，我强烈建议你充分理解为什么我们要将按钮作为插座变量来连接。\n\
    \n![images](images/00174.jpg)\n\n**图 5–24.** 保持按钮作为插座变量，并将其命名为 `shrinkButton`。\n\
    \n24\\. 如图 [图 5–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos374383)\
    \ 所示，当你按住 Control 键拖到 `@interface` 指令处时，松开鼠标将其放下，并将其命名为 `shrinkButton` — 将其保持为插座变量。\n\
    \n### 编写头文件\n\n在理解了我们已连接好插座变量之后，我们通常会离开 `@interface` 指令，在其外部将按钮作为操作（Action）来连接。在这种情况下，我们需要做一些以前从未做过的事情：设置一些额外的变量和指针。我们不会深入探讨它们，但我将强调为什么需要这样做。\n\
    \n我们需要跟踪我们的图片。具体来说，我们需要：\n\n*   跟踪当前在背景中显示的图片。记住，我们有五张这样的图片，因此我们将当前背景称为 `currentBackground`。\n\
    *   将这五张背景图片存储在某个地方。典型的做法是将这五张图片存储在一个我们称之为数组的列表中。这意味着我们需要创建一个数组。让我们将这个数组称为 `bgArray`。\n\
    *   我们还需要知道 Shrink 和 Move 按钮是否已被按下，因为这会改变状态。这将在后面详细解释，但现在，图标的尺寸和位置会发生变化，这会影响接下来可以对它执行的操作。因此，我们需要跟踪两个按钮的状态：Shrink\
    \ 按钮的状态和 Move 按钮的状态。让我们将它们称为 `hasShrunk` 和 `hasMoved`。\n*   还记得我提到过我们将使用 `CGAffineTransform`\
    \ 类来帮助我们操作图标（参见“`CGAffineTransform` 结构体”部分）吗？是的，我们需要使用 `CGAffineTransform` 类，首先在按下移动按钮时移动\
    \ lulu fruit 图标，然后在按下缩小按钮时更改 lulu fruit 图标的尺寸。因此，我们需要两个 `CGAffineTransform` 类型的变量。让我们将一个称为\
    \ `translate`，另一个称为 `size`。\n\n因此，我们现在有六个项目：\n\n*   一个我们将称为 `bgImages` 的数组\n*\
    \   一种跟踪 `currentBackground` 的方法\n*   `hasMoved` 的状态\n*   `hasShrunk` 的状态\n* \
    \  一种转换 `translate`（我们的 lulu fruit 图标的位置）的方式\n*   一种转换 `size`（我们的 lulu fruit 图标的尺寸）的方式\n\
    \n现在我们已经确定了需要什么以及如何称呼它们，还有一件事要做：将它们与一个内部机制关联起来，以实现我们想让它们做的事情。我们必须将它们与一种类型关联起来。这非常简单。Apple\
    \ 已经为我们做好了这一切。我们只需要知道从我们的 Apple 工具箱中取出什么工具，并将它们附加到我们创建的每个变量上。\n\n*   对于数组，Apple\
    \ 提供的 `NSArray` 可以完美地完成这项工作。\n*   为了跟踪当前背景，我们只需为每个背景分配一个整数（`int`）类型的编号。\n*   为了跟踪按钮，我们只需要知道它们是否已被按下。一个简单的“是”或“否”就很好。嗯，这是布尔类型，对吧？因此，我们将把布尔类型与\
    \ `hasMoved` 和 `hasShrunk` 按钮关联起来。\n*   最后，我们只需将 `CGAffineTransform` 类分配给我们的 `translate`\
    \ 和 `size` 变量。\n\n为了强调如何将这些命名类型关联到我们的六个项目，我希望你仔细查看以下代码：\n\n```\nNSArray *bgImages;\n\
    int currentBackground;\nbool hasMoved;\nbool hasShrunk;\n\nCGAffineTransform translate;\n\
    CGAffineTransform size;\n```\n\n这意味着我们需要在你的三个 `IBOutlet` 下方输入上述代码，如下所示：\n\n```\n\
    @interface touchesViewController : UIViewController\n{\n    IBOutlet UIImageView\
    \ *myIcon;\n    IBOutlet UIImageView *myBackground;\n    IBOutlet UIButton *shrinkButton;\n\
    \n    NSArray *bgImages;\n    int currentBackground;\n    bool hasMoved;\n   \
    \ bool hasShrunk;\n\n    CGAffineTransform translate;\n    CGAffineTransform size;\n\
    }\n```\n\n![images](images/00175.jpg)\n\n**图 5–25.** 创建几个项目，然后拖动你的第一个按钮。\n\n25\\\
    . 现在，只有当我们正确创建并定义了变量之后，才开始将按钮作为操作（Action）连接到 `@directive` 下方的空间。单击选择你的 Shrink\
    \ 按钮，然后按住 Control 键将其拖到头文件中 `@directive` 的正下方，如图 [图 5–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos381149)\
    \ 所示。"
