    # 切换视图，查看交通状况


    iPhone 4 上的地图凭借其高分辨率视网膜显示屏，呈现出惊人的清晰和细腻。我们可以在`地图视图`、`卫星视图`和`混合视图`之间切换。我们甚至可以查看特定地址的街景。我们可以通过双击或捏合手势来缩放地图。iPhone
    地图还能提供实时交通信息，并用易于识别的绿色、黄色和红色高亮显示沿途的交通速度。


    ![图像](img/00355.jpg)


    **图 9-3.** 切换视图并查看交通状况——展示了内置指南针（在 3GS 机型上）的方向指示，标明我们正在注视的方向。


    我们不必再依赖电脑打印路线指引了。有了 iPhone，我们可以查看逐向导航列表，或沿着高亮显示的地图路线行驶，并通过 GPS 追踪我们的进度。我们可以选择步行或驾车路线，甚至可以通过公共交通路线查看下一班火车或公交的发车时间。`指南针`应用与内置数字指南针协同工作，告诉我们
    iPhone 的朝向。此外，在`地图`应用中，指南针会旋转屏幕上的地图，使其与我们面对的方向保持一致。


    ![图像](img/00356.jpg)


    **图 9-4.** 路线导航与方向感知——这是在 iPhone/iPad 上运行`地图`应用时众多强大功能之一。


    ![图像](img/00357.jpg)


    **图 9-5.** `FlightTrack` 应用使用 `MapKit` 框架来追踪航班，并与登机口变更、时刻表以及任何给定机票上的其他个人信息进行集成。


    ## 酷炫且受欢迎的 MapKit 应用给我们带来启发


    在教授学生 MapKit 和 Storyboarding 的过程中，发生了一件有趣的事情：大多数学生自以为了解 MapKit，但实际上，他们根本不知道 `MapKit`
    框架到底有多强大。因此，在深入学习本章之前，我们先花几分钟时间来了解一下 `MapKit` 框架的出色功能。


    ![图像](img/00358.jpg)


    **实例佐证：** 我的一位前学生最近开始在苹果公司从事 iOS 5 相关工作。她在 MapKit 方面表现得异常出色，而在 iOS 5 中可供她选择的众多部门里，她被安排到了
    `MapKit` 框架团队。她告诉我的第一件事就是这个部门规模有多么庞大，尽管她热爱 MapKit，但她完全不知道有这么多团队、这么多才智超群的人都在共同致力于同一件事：那就是
    MapKit！


    我发现，在向学生们展示预构建的应用程序后，再花些时间一起回顾一些超酷的第三方 MapKit 应用——以激发他们的灵感、让他们脑洞大开——这对他们大有裨益。所以，想象一下，你正和我们坐在一起，一同进行这次短暂的巡览。以下是我关注的
    11 款 MapKit 应用，其中一些我经常使用。


    -   `FlightTrack`：这款 MapKit 应用可以让我们管理国内外航班的方方面面，提供实时更新和精美的可缩放地图。我们可以接收关于登机口、延误和取消的通知，以便预订替代航班。该应用覆盖了超过
    5000 个机场和 1400 家航空公司。参见图 9-5。

    -   `Metro Paris Subway`：在光之城巴黎再也不会迷路。`Metro Paris Subway` 是一款全面的巴黎出行指南，包含官方的地铁、RER（区域快铁）和公交地图及时刻表。结合了交互式地图和路线规划器，`Metro
    Paris Subway` 能让我们在短时间内像真正的巴黎人一样穿梭自如。参见图 9-6。

    -   `MapMyRide`：我经常使用这款 MapKit 应用。我只需打开它，然后骑上自行车出发即可。它会记录我的速度、时间、里程以及坡度。它还会综合考虑我的年龄、性别和体重，然后告诉我燃烧了多少卡路里。（状态好的时候，我能消耗掉两个甜甜圈的热量！）关键是，当我只是气喘吁吁地骑行时，这个应用就计算出了所有这些数据！回到家后，我可以在电脑上查看骑行路线。它的主要工作都是通过使用和操作预装的
    MapKit 应用完成的。

    -   `QuikMaps`：这款 DIY 地图应用允许你在涂鸦地图。它集成了多个平台，包括你的网站、Google Earth，甚至你的 GPS。

    -   `360 Cities`：虚拟现实中的世界：该应用展示了全球 50 多个城市的 360 度全景图，包含 6000 张全景照片。对于房地产经纪人、导游和探险家来说，这是一个完美的技术工具。

    -   `Cool Maps`：世界七大奇迹：该应用展示了古代世界七大奇迹，以及现代世界七大奇迹，包括自然奇观、水下奇观、奇异奇观和本地奇观。程序员们将应用的触控和体验做得如此流畅，令我印象深刻。

    -   `Blipstar`：这款应用将互联网上的商业网址转换为对应的实体店地址，并全部显示在一张酷炫的地图上。

    -   `Twitter Spy`：这个应用让人们可以看到正在给自己发推文的人当前所在的位置。没错——有点古怪和疯狂，但确实如此。

    -   `Geo IP Tool`：此应用显示网络上企业的经纬度信息。然后为我们提供到达那里的最佳方式选择。

    -   `Map Tunneling Tool`：这纯粹是一个巧妙的趣味应用。想象一下，如果我们从任意地点垂直向下挖一个洞，我们会从地球的哪里冒出来？答案总是中国吗？

    -   `Tall Eye`：这个应用会告诉你，如果你从地球上的某一点出发，沿着一条直线，始终保持在特定的方位角上一直向前走，你最终会到达哪里。


    ![图像](img/00359.jpg)


    **图 9-6.** `Metro Paris Subway`：解析地铁列车的 GPS 数据，有助于我们了解开往我们方向的列车何时会到达最近的车站。


    ## myStory_01：一个单视图应用


    在这个练习中，我们将从一些满足基本需求的样板代码、启动屏幕和图标开始。然后，我们将在此基础上进行修改。我们将回顾本书中已经见过的一些相同的构建模块和文件，我们还将面临挑战，即根据本应用的性质，识别出哪些代码区域与我们之前遇到的几乎相同，哪些区域有所不同。


    识别表层之下的模式和结构是我们每个人都拥有的强大能力，但我们程序员将其磨练到了更高的水平。我们将玩一个小游戏，看看我们是否能预判出一些接下来需要采取的步骤。

