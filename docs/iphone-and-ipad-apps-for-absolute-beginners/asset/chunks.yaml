  trans: "\n#### `CGAffineTransform` 结构体\n\n我们还将处理苹果公司聪明的工程师编写的一段动画代码，它被打包成一个称为“数据结构”的集合。这是程序员用来对其对象执行动画的关键工具。该数据结构可以缩小对象、改变其角度、移动它、倾斜它，并让它执行各种其他酷炫的动画效果。苹果用于执行这些动画的所有代码都保存在称为结构体的核心动画数据结构中。苹果对此的解释是：“`CGAffineTransform`\
    \ 数据结构表示用于仿射变换的矩阵。” 嗯？这到底是什么意思呢？这意味着`CGAffine`会对你想要动画化的对象的所有关键点进行变换，将其放入一个称为`transform`的属性中。这个属性本质上就是一个矩阵。一旦你想要动画化的对象进入这个矩阵，当我们指示`CGAffine`更改对象的位置、角度、形状、缩放比例等属性时，它就能听从我们的指令。这就是我们接下来要对露露水果图标所做的操作。\n\
    \n> ![images](img/00150.jpg)\n\n**图 5-1.** 从仓库下载的五个背景图片和两个露露水果图标\n\n1.  这个还需要我说吗？关闭所有程序，清空所有垃圾，并将所有重要文件和文件夹拖放到合适的位置，这样你就拥有了一个完全干净的桌面。从[`http://bit.ly/prqKsL`](http://bit.ly/prqKsL)下载这些图片，解压下载的文件后，你的桌面上会看到七张图片。这五张背景图片是本书封面的不同版本。第一张图片将是图\
    \ 5-1 中左上角的那一张，它是没有露露水果图标的书正面图。可以看到，露露水果图标是与背景图片分开的。较大的露露水果图标将出现在用户屏幕上，并通过我们施加的`CGAffineTransforms`进行动画化。较小的露露水果图标是`icon.png`版本。我们的“更改”按钮将循环显示所有五个背景图片。“缩小”按钮和“移动”按钮将使用`CGAffine`结构体来对露露水果图标进行动画。\n\
    \n> **注意：** 你当然也可以使用自己的图片和图标。不过，即使不花精力创建自己的图片，这一章也已经很长了。在课堂上，我告诉学生先用我的图标提交这个作业。之后，他们可以使用自己的图标，如果在规定时间内（三天内）完成，他们可以再次用自己的图标提交作业以获得额外加分。目前还没有学生这样做过。\n\
    \n![images](img/00151.jpg)\n\n**图 5-2.** 桌面上打开的七张图片，准备加载到 Xcode 中\n\n2.  你的桌面应该与我的类似，如图\
    \ 5-2 所示，桌面上只有这七个图标和你的 Mac 硬盘驱动器。一旦一切清理干净，图片叠放整齐并准备就绪，你就可以开始行动了！\n\n![images](img/00152.jpg)\n\
    \n**图 5-3.** 输入 `N`。Xcode 4.2 提供了单视图应用程序选项，与旧版本的基于视图的应用程序相同。\n\n3.  像我们之前做的那样，启动\
    \ Xcode 并使用键盘快捷键 `N` 创建一个新项目。当你看到图 5-5 中所示的新建项目向导时，你需要点击“单视图应用程序”模板。\n\n   一旦你的新建项目窗口打开并选择了“单视图应用程序”，我希望你按下回车键（“Enter”），或者点击“下一步”按钮。\n\
    \n![images](img/00154.jpg)\n\n**图 5-4.** 将你的项目命名为 “touches”。\n\n4.  将你的项目命名为 “touches”，并且最重要的是，记得取消选中“使用故事板”选项。一旦项目正确命名且故事板选项被取消选中，如图\
    \ 5-4 所示，按回车键或点击“下一步”。\n\n![images](img/00155.jpg)\n\n**图 5-5.** 选择将项目保存到你的桌面。\n\
    \n5.  将你的项目保存到桌面。你现在大概能猜到，我们要确保当前项目位于桌面上。等我们处理完后，再把它放到一个合适的文件夹里。\n\n![images](img/00156.jpg)\n\
    \n**图 5-6.** 将你的图片拖拽到 “Supporting Files” 文件夹中。\n\n6.  最初，当 Xcode 启动时，它会创建一个几乎覆盖整个桌面的巨大窗口。抓住窗口的右下角将其缩小，直到刚好能看到你从[`http://www.rorylewis.com`](http://www.rorylewis.com)仓库下载的那七张图片。如图\
    \ 5-6 所示，将所有图片拖拽到 Xcode 中的 “Supporting Files” 文件夹中。\n\n![images](img/00157.jpg)\n\
    \n**图 5-7.** 勾选“将项目复制到目标组的文件夹中...”复选框。\n\n7.  将图片放入 `Resources` 文件夹后，系统会提示你定义该图片是始终与它在桌面上的位置相关联，还是嵌入到代码中并随应用程序文件一起携带，如图\
    \ 5-7 所示。我们当然希望它被嵌入，所以勾选“将项目复制到目标组的文件夹中...”复选框。同时，勾选“为添加的文件夹创建组”复选框。然后，点击“完成”（或按回车键）。\n\
    \n![images](img/00158.jpg)\n\n**图 5-8.** 将你的图片拖入垃圾箱。\n\n8.  当你将所有图片正确导入 Xcode\
    \ 后，实际上就没有必要再保留在桌面上或保存在其他任何地方了。如果你想在另一个版本中再次使用它们，或者如果这次运行不成功，只需打开 `touches` 文件夹，它们全都在那里。无需重复保存这些图片。所以，继续将桌面上剩余的图片拖入垃圾箱，如图\
    \ 5-8 所示。\n\n![images](img/00159.jpg)\n\n**图 5-9.** 让我们先创建你的图标。\n\n9.  首先，我们来创建图标。在\
    \ “Supporting Files” 文件夹中打开你的 plist 文件，并在图标名称栏输入 “`icon.png`”，如图 5-9 所示。在导入所有图片后立即将你的图标关联到\
    \ plist 文件中是个好习惯。一旦离开这个文件夹，你以后可能会忘记做这一步。\n\n![images](img/00160.jpg)\n\n**图 5-10.**\
    \ 点击你的 xib 文件，打开工具视图，然后关闭导航器视图。\n\n10. 一旦你将图标关联到 `icon.png` 或你个人图标的名称（如果你命名不同的话），我希望你打开\
    \ `touchesViewController.xib` 文件，如图 5-10 所示。正如我们之前做过的，我们需要更多空间，所以也要打开工具视图，这样我们就能看到装饰视图设计区域所需的工具和图标。其次，关闭导航器视图，因为我们现在不需要它。\n\
    \n![images](img/00161.jpg)\n\n**图 5-11.** 将一个 `UIImageView` 拖拽到你的视图设计区域中。\n"
- fmt: '11. 打开你的 `Utilities` 窗格，将 `UIImageView` 拖拽到视图设计区域，如图[5–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos358688)所示。`UIImageView`
    将容纳你下载的当前背景图片，即 `WallPaper_01` 至 `WallPaper_05`。稍后，我将解释如何编写代码，以决定在任意特定时间点，该 `UIImageView`
    上显示五张背景图中的哪一张。但我们已经知道，“Change”按钮将触发切换背景的代码。因此，你可以推测，下一步我们需要拖拽一些按钮到视图设计区域。


    > **注意**：Xcode 开发者也将视图设计区域称为视图屏幕（View screen）或视图框架（View frame）。因此，无论是说“视图设计区域”、“视图屏幕”还是“视图框架”，这些术语的含义都是相同的。我在本书中有意地交替使用这三个术语。


    ![images](images/00162.jpg)


    **图 5–12.** 拖拽三个按钮到视图设计区域。


    12. 如图[5–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos360261)所示，开始将三个按钮拖拽到
    View frame 的顶部。将它们保持在一行上。让外侧的两个按钮与外部边距对齐，并让中间的按钮在屏幕上居中。当按钮移动到各自边界范围附近时，蓝色指示线会提示你。


    ![images](images/00163.jpg)


    **图 5–13.** 将三个按钮分别命名为 `Shrink`、`Move` 和 `Change`。


    13. 将三个按钮放置在 View frame 上后，点击按钮并为其命名。如图[5–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos361028)所示，将它们命名为
    `Shrink`、`Move` 和 `Change`。


    ![images](images/00164.jpg)


    **图 5–14.** 拖拽第二个 `UIImageView` 到视图设计区域。


    14. 我们现在需要另一个 `UIImageView` 来容纳 lulu 水果图标，我们可以用手指移动它、用按钮缩放它、用按钮移动它。因此，如图[5–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos361609)所示，在
    View frame 上添加另一个 `UIImageView`。


    ![images](images/00165.jpg)


    **图 5–15.** 将 lulu 水果图标与第二个 `UIImageView` 关联。


    15. 选中第二个 `UIImageView`，转到 `Utilities` 窗格中“Attributes”对话框的图像下拉菜单，如图[5–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos362274)所示。选择
    `luluIcon.png` 以将其与第二个 `UIImageView` 关联。


    ![images](images/00166.jpg)


    **图 5–16.** 设置 `luluIcon.png` 的尺寸和位置。


    16. 当 `luluIcon.png` 出现在第二个 `UIImageView` 内部后，我希望你离开 `Utilities` 窗格中的“Attributes”对话框，点击“Size”检查器（![images](images/00031.jpg)![images](images/00085.jpg)5）；将
    lulu 图标的宽度设为 `112 × 112` 像素的正方形。同时，将其 y 轴高度设置为距 View pane 顶部 137 像素。你可以像笔者一样手动居中图标，也可以在
    x 轴框中设置。如图[5–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos362953)所示。


    ![images](images/00167.jpg)


    **图 5–17.** 点击“Assistant”以打开 `touchesViewController` 头文件。


    17. 我们已经完成了将所有必要的项目拖拽并定位到 nib 中。现在，如同之前的操作，我们需要将这些项目连接到代码。我们需要处理 `touchesViewController`
    头文件。点击“Assistant”按钮，你的屏幕将类似于图[5–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos363881)所示。


    ![images](images/00168.jpg)


    **图 5–18.** 重新调整屏幕位置以便处理头文件。


    18. 这里可能有两件事需要处理。首先，根据屏幕大小，你可能需要调整或定位 nib 中的 View pane，以便能看到所有三个按钮。其次，如图[5–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos364638)所示，在
    `@property` 指令中添加花括号。


    > **注意**：如果你使用的是 4.0 或更早版本，则无需在 `@interface` 指令中添加花括号，因为它们是自动实例化的。然而，如果你使用的是更高、更新的
    Xcode 版本，则可能必须添加花括号，如图[5–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos364638)所示。


    ![images](images/00169.jpg)


    **图 5–19.** 从 Interface Builder 中的图标 Control-drag 连接到你的头文件。


    19. 通常，在过去，当我们达到这个节点时，我指示你直接盲目地开始将 Outlet 和 Action 通过 Control-drag 拖拽到 `@directive`
    中。然而，今天，我们将首先思考我们要做什么，从而在你的大脑中建立神经连接，以理解如何创建一个健壮的头文件。回顾过去你做过的事情，我曾使用以下非常宽泛的标准向你提供
    Outlet 和 Action：


    *   Outlet：用于连接 nib 文件成员与 `UIImageViews` 代码（这是 Apple 的优秀工程师为我们编写的）。

    *   Action：用于将你的按钮与我们在实现文件中编写的代码连接起来。


    > 现在，我们要成长并继续前进。还记得我提到过，当我们点击“Shrink”按钮时，它会缩小 lulu 水果图标，并且按钮内的文字会变为“Grow”；当我们再次按下该按钮时，它会使其变大吗？嗯，我们需要使用
    Apple 编写的代码，这些代码允许我们做一些很酷的事情，比如更改按钮内的颜色、文本和其他外观。


    > **注意**：Apple 提供的这段代码位于名为 `UIButton` 的类中。当我们使用这段代码时，可以说我们正在使用 `UIButton` 的一个实例。简而言之，我们需要为“Change”按钮创建一个
    Outlet，以便我们可以将其中的文字从“Shrink”更改为“Grow”。


    > 当然，我们还需要为 lulu 水果图标以及用于容纳当前正在使用的 `WallPaper_0x.png` 的背景创建一个 Outlet。因此，我们将需要三个
    Outlet。在我们将三个 Outlet 通过 Control-drag 正确拖拽到 `@properties` 指令中后，代码将类似于这样：


    ```

    IBOutlet UIImageView *some variable name;

    IBOutlet UIImageView *some variable name;

    IBOutlet UIButton *some variable name;

    ```


    > 没错！我们需要为这些 Outlet 中的每一个赋予变量名。让我们为图标使用 `myIcon`，为背景使用 `myBackground`，为缩小 lulu
    水果图标的按钮使用 `shrinkButton`。你可以使用不同的名称，但请之后再做。现在请跟随我的步骤，代码将如下所示：


    ```

    IBOutlet UIImageView *myIcon;

    IBOutlet UIImageView *myBackground;

    IBOutlet UIButton *shrinkButton;

    ```


    > 至于三个按钮的 Action，它们保持不变。我们仍然会为三个按钮设置三个 Action，位于 `@properties` 指令之后和之外，代码如下：


    ```

    - (IBAction)some variable name:(id)sender;

    - (IBAction)some variable name:(id)sender;

    - (IBAction)some variable name:(id)sender;

    ```


    > 没错！我们需要为这些 Action 中的每一个赋予变量名。让我们为“Shrink”按钮使用 `shrink`，为“Move”按钮使用 `move`，为“Change”按钮使用
    `change`。同样，你可以在此处使用不同的变量名，但现在请跟随我的步骤。代码将如下所示：


    ```

    - (IBAction)shrink:(id)sender;

    - (IBAction)move:(id)sender;

    - (IBAction)change:(id)sender;

    ```


    > 好的！那么让我们开始吧！首先，如图[5–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos365914)所示，从你的图标
    Control-drag 到 `@properties` 指令。'
  raw: '11\. With your Utilities pane open, drag a `UIImageView` onto your View design
    area, as shown in [Figure 5–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos358688).
    The `UIImageView` will hold the current backgrounds you downloaded named `WallPaper_01`
    to `wallPaper_05`. Later, I will explain how you will write code that will determine
    which of the five background images will be housed on this `UIImageView` at any
    particular point in time. But we do know that the Change button will fire up the
    code that will switch the background. So, you can guess that the next thing we
    need to do is drag some buttons onto the view design area.


    NOTE: Xcoders also call the View design area the View screen and View frame. So,
    whether a person says “View design area, ”“View screen,” or “View frame,” all
    these terms mean the same thing. I purposefully use the three terms interchangeably
    throughout this book.


    ![images](images/00162.jpg)


    Figure 5–12\. Drag three buttons onto your View design area.


    12\. As shown in [Figure 5–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos360261),
    start dragging three buttons onto the top of your View frame. Keep them in line
    with one another. Keep the outer two buttons lined up with the outer margins and
    keep the center button centered on the screen. The blue indicator lines will tell
    you when you move your button close to the range of each of the respective boundaries.


    ![images](images/00163.jpg)


    Figure 5–13\. Name your three buttons Shrink, Move, and Change.


    13\. Once you have positioned your three buttons onto your View frame, click the
    buttons and name them. Name them Shrink, Move, and Change, as illustrated in [Figure
    5–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos361028).


    ![images](images/00164.jpg)


    Figure 5–14\. Drag a second UIImageView onto your View design area.


    14\. We now need another `UIImageView` to hold the lulu fruit icon that we can
    move around with our finger, scale with a button, and move with a button, so add
    another `UIImageView` onto your View frame, as shown in [Figure 5–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos361609).


    ![images](images/00165.jpg)


