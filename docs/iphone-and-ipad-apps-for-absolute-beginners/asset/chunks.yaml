    \ V 形图标，用户可点击该图标访问该业余无线电台的网站。在这个案例中，业余无线电台 KJ6EXD–7 确实有一个网站。\n\n![images](img/00398.jpg)\n\
    \n图 9-44\\. CS–201 期末项目——Stephen M. Moraco 的 App 展示了嵌入在 iPad 中的 KJ6EXD–7 网站。\n"
