    Builder`和`iPhone/iPad Simulator`，因此我建议你将这些图标添加到你的程序坞中（见[图1–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos77891)），如下面第13步所述。这将为你节省大量寻找它们的时间。


    ![images](images/00026.jpg)


