  raw: '10.  We created an icon image file called `icon.png`. We want this one to
    show up on the iPhone/iPad, rather than the generic icon. To do this, double-click
    on the info.plist file in the `Resources` folder, as shown in [Figure 4–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos265302).
    ![images](images/00120.jpg)


    Figure 4–11\. Select the Icon file''s value cell and enter the name of the picture
    you want to associate as the icon for your project.


    11.  Double-click on the Icon file''s value cell. In that space, enter the name
    of your icon file: “`icon`” as illustrated in [Figure 4-11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos265964).
    Now, save your work. The plist (property list), by the way, is another area that
    we will explore later. For now, we''re ready to move on to Interface Builder in
    order to connect and associate various pieces of our puzzle. ![images](images/00121.jpg)


    Figure 4–12\. Open your nib file.


    12.  Click on your nib file, as illustrated in [Figure 4-12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos266806),
    because it''s time to start building the objects we''ll need for our project.
    You should be seeing a pattern now—first we dump our images into the Resources
    folder, then we drag our objects onto the View, and finally we link the objects
    up with code. ![images](images/00122.jpg)


    Figure 4–13\. Position the `UIImageView` onto the View screen, flush with the
    bottom.


    13.  Your top layer image will be placed over the base layer when the user pushes
    the button. Therefore, we want to handle the base layer in the same manner as
    we have in the past. Scroll down in your library to the Cocoa Touch item folder
    and locate the Image View icons. Drag one onto your View frame, as illustrated
    in [Figure 4–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos267480).
    ![images](images/00123.jpg)


    Figure 4–14\. Associate an image with `UIImageView`, which you''ve just dragged
    onto the View screen.


    14.  We want to connect 320 × 460 `STAIR.png` to our Image View so that it will
    appear. Go to the Information tab of the Image View Attributes window, open the
    drop-down window, and select the image, as shown in [Figure 4–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos268243).
    ![images](images/00124.jpg)


    Figure 4–15\. Drag a label onto the View.


    15.  Earlier, we decided that when the user presses the button, Immanuel Kant
    should appear and announce, “Hello World, I''m back!” We decided that the method
    we would employ would be a label instance variable—with a text property assigned
    with “Hello World, I''m back!” So, drag out a label that will be our instance
    variable, and we will assign the text “Hello World, I''m back!” onto the Base
    View later. When you put the label onto the View, repeat the way that you adjusted
    the size in the earlier assignments; i.e., widen it so it can fit this text. See
    [Figure 4–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos268922).
    ![images](images/00125.jpg)


    Figure 4–16\. Center the text and make it white.


    16.  Just as you''ve done before, center the text and change its color to white
    in the Properties frame. Refer to [Figure 4–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos269872),
    and look over to the right-hand side to see that the center text and white text
    properties have been selected. ![images](images/00126.jpg)


    Figure 4–17\. Drag a button onto your base layer.


    17.  We want the picture and the text to appear when a button is pressed, so we
    need a button. Go ahead and drag one onto your base layer and in its title field
    enter “Guess who''s on campus?” as shown in [Figure 4–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos270489).
    When users see a button asking this question, they will be compelled to press
    it. When they do, we want Immanuel Kant to appear, saying, “Hello World, I''m
    back!” You may want to adjust the size of the button as we''ve done before. If
    you are inclined to make your button fancier than the one I created on the video,
    you may want it to look pretty cool and show some of the underlying image. While
    still in the Image View Attributes window, scroll down and shift the Alpha slider
    to about 0.30\. Jumping ahead, you may want to start thinking about what we''re
    doing in terms of the code we will soon write. We''re looking at two `IBOutlets:`
    a label and the underlying base image. Each category “whispers” something to Interface
    Builder. One says that we want a `UILabel` class to use text that the pointer
    `*label` points to; the other says that the `UIImageView` class will put up an
    image located at a place the pointer `*uiImageView` points to.


    Well, what have we done so far in Interface Builder? We''ve installed the background
    image and inserted a button that will trigger these two `IBOutlets`. Now, while
    still taking a minute to think ahead about what happens each time we drag outlets
    onto our header file, let''s take a high altitude view of what we will be doing
    here:


    `- (IBAction)someNameWeWillGiveTheButton:(id) sender`


    This line, in fact, invokes our two friends, our two `IBOutlets` for the label
    and background image. For the label, with:


    `label.text = @"Hello World, I''m back!";`


    and the image, with:


    `UIImage *imageSource = [UIImage imageNamed: @"kantStair.png"];`


    To make the above all work in the implementation file, we will need to perform
    some action on the header file. We have to set the label and the image up—we say
    we need to declare them.


    We will declare the label with:


    `IBOutlet UILabel *someNameWeWillGiveTheLabel`


    and we''ll declare the image with:


    `IBOutlet UIImageView * someNameWeWillGiveTheImageView`


    Then, we will do something that we have not done yet and that I will explain at
    the end of the chapter in the “Digging the Code” section. We will perform something
    we call “Synthesis” on both of our `IBOutlets`. To do this we will run two “@property”
    statements:


    `@property (nonatomic, retain) IBOutlet UILabel *someNameWeWillGiveTheLabel`


    and for the image:


    `@property (nonatomic, retain)IBOutlet UIImageView *``someNameWeWillGiveTheImageView`


    Also, we will synthesize the above in our implementation file, with:


    `@synthesize label, uiImageView`


    OK, that was a quick mental journey into the future. So, that means we''re ready
    for action. We''ve created a button that will call our two friends; all we need
    to do now is to create the image and the label, and then associate them with the
    appropriate pieces of the code.


    ![images](images/00127.jpg)


    Figure 4–18\. Write the button text.


    18.  We need the button to entice the user to press it. So we''ll ask the user:
    “Guess who''s back in school?” by double clicking on the button and writing the
    text in the button. You may notice that the button cleverly adjusts its size to
    accommodate the text width. See [Figure 4–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos274497).
    ![images](images/00128.jpg)


    Figure 4–19\. Drag the second image view onto the View.'
  trans: "\n10. 我们创建了一个名为`icon.png`的图标图像文件。我们希望这个图标显示在 iPhone/iPad 上，而不是通用图标。为此，双击`Resources`文件夹中的`info.plist`文件，如图\
    \ Figure 4–10 所示。  \n    ![images](img/00120.jpg)  \n    **Figure 4–11.** 选择图标文件的值单元格，并输入要关联为项目图标的图片名称。\n\
    \n11. 双击图标文件的值单元格，在空白处输入图标文件的名称：`icon`，如图 Figure 4-11 所示。然后保存你的工作。顺便提一下，plist（属性列表）是我们将在后续探索的另一个领域。现在，我们准备进入\
    \ Interface Builder，以连接和关联拼图中的各个部分。  \n    ![images](img/00121.jpg)  \n    **Figure\
    \ 4–12.** 打开你的 nib 文件。\n\n12. 点击你的 nib 文件，如图 Figure 4-12 所示，因为现在是时候开始构建项目所需的对象了。你应该已经看到了一个模式——首先将图像放入`Resources`文件夹，然后将对象拖到视图上，最后将对象与代码连接起来。\
    \  \n    ![images](img/00122.jpg)  \n    **Figure 4–13.** 将`UIImageView`定位到视图屏幕的底部边缘。\n\
    \n13. 当用户按下按钮时，顶层图像将覆盖在基础层之上。因此，我们希望以与之前相同的方式处理基础层。在库中向下滚动到 Cocoa Touch 项目文件夹，找到\
    \ Image View 图标。将一个 Image View 拖到视图框架上，如图 Figure 4–13 所示。  \n    ![images](img/00123.jpg)\
    \  \n    **Figure 4–14.** 将图像与刚刚拖到视图屏幕上的`UIImageView`关联起来。\n\n14. 我们希望将`320 ×\
    \ 460 STAIR.png`连接到 Image View，以便它能够显示出来。进入 Image View Attributes 窗口的信息选项卡，打开下拉窗口并选择图像，如图\
    \ Figure 4–14 所示。  \n    ![images](img/00124.jpg)  \n    **Figure 4–15.** 将一个标签拖到视图上。\n\
    \n15. 之前，我们决定当用户按下按钮时，伊曼努尔·康德应该出现并宣布：“Hello World, I'm back!”。我们决定采用的方法是一个标签实例变量——其`text`属性被赋值为“Hello\
    \ World, I'm back!”。因此，拖出一个标签作为我们的实例变量，稍后我们会将文本“Hello World, I'm back!”分配给 Base\
    \ View。将标签放到视图上后，按照之前任务中调整大小的方法重复操作；即，加宽标签以容纳这段文本。参见 Figure 4–15。  \n    ![images](img/00125.jpg)\
    \  \n    **Figure 4–16.** 将文本居中并设为白色。\n\n16. 按照你之前做过的方法，在属性框架中将文本居中并将其颜色改为白色。参考\
    \ Figure 4–16，并查看右侧，可以看到居中对齐和白色文本属性已被选中。  \n    ![images](img/00126.jpg)  \n \
    \   **Figure 4–17.** 将一个按钮拖到你的基础层上。\n\n17. 我们希望按下按钮时图片和文本都出现，因此需要一个按钮。继续将一个按钮拖到基础层上，并在其标题字段中输入“Guess\
    \ who's on campus?”，如图 Figure 4–17 所示。当用户看到一个询问这个问题的按钮时，他们会忍不住按下它。当他们按下时，我们希望伊曼努尔·康德出现，并说“Hello\
    \ World, I'm back!”。你可能需要像之前一样调整按钮的大小。如果你想让按钮比我在视频中创建的更花哨，你可能希望它看起来很酷，并显示一些底层图像。仍在\
    \ Image View Attributes 窗口中，向下滚动并将 Alpha 滑块调整到大约 0.30。  \n    提前思考一下，你可能想开始考虑我们即将编写的代码。我们看到了两个`IBOutlets`：一个标签和底层的基础图像。每个类别都向\
    \ Interface Builder“低语”了一些信息。一个说我们希望`UILabel`类使用由指针`*label`指向的文本；另一个说`UIImageView`类将显示一个位于指针`*uiImageView`指向位置的图像。\
    \  \n    那么，到目前为止我们在 Interface Builder 中做了什么？我们安装了背景图像并插入了一个按钮，该按钮将触发这两个`IBOutlets`。现在，花一分钟时间提前思考每次将输出口拖到头文件中会发生什么，让我们从更高层次看一下我们将要做什么：\
    \  \n\n    ```\n    - (IBAction)someNameWeWillGiveTheButton:(id) sender\n    ```\n\
    \n    实际上，这行代码调用了我们的两个伙伴，即标签和背景图像的两个`IBOutlets`。对于标签，使用：\n\n    ```\n    label.text\
    \ = @\"Hello World, I'm back!\";\n    ```\n\n    对于图像，使用：\n\n    ```\n    UIImage\
    \ *imageSource = [UIImage imageNamed: @\"kantStair.png\"];\n    ```\n\n    为了使上述内容在实现文件中正常工作，我们需要对头文件执行一些操作。我们必须设置标签和图像——也就是说我们需要声明它们。\
    \  \n    我们将使用以下方式声明标签：\n\n    ```\n    IBOutlet UILabel *someNameWeWillGiveTheLabel\n\
    \    ```\n\n    并将使用以下方式声明图像：\n\n    ```\n    IBOutlet UIImageView * someNameWeWillGiveTheImageView\n\
    \    ```\n\n    然后，我们将做一件我们还没有做过的事情，我将在本章末尾的“深入代码”部分解释。我们将对两个`IBOutlets`执行所谓的“合成”（Synthesis）。为此，我们将运行两个`@property`语句：\
    \  \n\n    ```\n    @property (nonatomic, retain) IBOutlet UILabel *someNameWeWillGiveTheLabel\n\
    \    ```\n\n    对于图像：\n\n    ```\n    @property (nonatomic, retain) IBOutlet UIImageView\
    \ *someNameWeWillGiveTheImageView\n    ```\n\n    同时，我们将在实现文件中合成上述内容，使用：\n\n \
    \   ```\n    @synthesize label, uiImageView\n    ```\n\n    好的，这是一次快速的心理旅程，展望了未来。这意味着我们已经准备好行动了。我们已经创建了一个按钮，它将调用我们的两个伙伴；我们现在需要做的就是创建图像和标签，然后将它们与代码的相应部分关联起来。\
    \  \n\n    ![images](img/00127.jpg)  \n    **Figure 4–18.** 编写按钮文本。\n\n18. 我们需要按钮来吸引用户按下它。因此，我们将通过双击按钮并在按钮中写入文本来询问用户：“Guess\
    \ who's back in school?”。你可能会注意到，按钮会巧妙地调整其大小以适应文本宽度。参见 Figure 4–18。  \n    ![images](img/00128.jpg)\
    \  \n    **Figure 4–19.** 将第二个图像视图拖到视图上。\n"
