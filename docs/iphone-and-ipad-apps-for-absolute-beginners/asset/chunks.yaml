    \n## BIOGRAPHICAL INFO FOR EXAMPLE 3\n\n> Satish Rege\n>\n> Why do I want to be\
    \ an iPhone developer? Simple—the iPhone imparts the computing, the communicating,\
    \ and the multimedia experience of a large computing system in the palm of your\
    \ hand. It provides rich resources and user interface primitives to express creative\
    \ capabilities in a synergistic way. These iPhone properties attracted me to want\
    \ to learn iPhone development tools to express my own ideas. Rory's course was\
    \ an excellent introduction that covered a multitude of iPhone capabilities and\
    \ made them easy to master.\n> \n> > ![images](images/00404.jpg)\n> \n> Figure\
    \ 9–50. SatishRege\n\n### Final Project—Example 3\n\nSatish ([Figure 9–42](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos755516))\
    \ always came up with simple eloquent code for all his homework assignments. When\
    \ I graded the weekly assignments, I realized that Satish had the knack of being\
    \ able to put into 20 lines of code what others would often take three times as\
    \ much to do the same thing. For his final project, Satish's app allows one to\
    \ look up ahead at the traffic at intersections to come, and, if there is a traffic\
    \ jam at one intersection, to recommend another.\n\nAt least in theory, that is\
    \ how it works. Satish saved a lot of heartache by starting at one location he\
    \ knew would be a tough intersection: I–25Northbound. He focused on controller\
    \ implementation files and then he rotates back and forth from there depending\
    \ on location in Colorado Springs. He has 27 cases for the 27 cameras in Colorado\
    \ Springs. Simple, elegant, beautiful.\n\n[Figure 9–51](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos772681)\
    \ shows the list. [Figures 9–52](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos773020)\
    \ and [9–53](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos773324) show\
    \ two examples of the traffic views.\n\n```\n//Choose the camera depending on\
    \ your co-ordinate\n     switch(cameraCordinate){\n          case1:\n        \
    \      url=[NSURLURLWithString:@\"http://www.springsgov.com/trafficeng/bImage.ASP?camID=17\"\
    ];     //Camera-SAcademy/I-25North\n               break;\n          case2:\n\
    \              url=[NSURLURLWithString:@\"http://www.springsgov.com/trafficeng/bImage.ASP?camID=18\"\
    ];     //Camera-HWY85/87/I-25N\n               break;\n\n>>>>>>>\n>>>>>>>\n>>>>>>>\n\
    \          case26:\n               url=[NSURLURLWithString:@\"http://www.springsgov.com/trafficeng/bImage.ASP?camID=33\"\
    ];     //Camera-Monument/I-25N\n               break;\n          case27:\n   \
    \            url=[NSURLURLWithString:@\"http://www.springsgov.com/trafficeng/bImage.ASP?camID=49\"\
    ];     //Camera-CountyLine/I-25SE\n               break;\n```\n\n![images](images/00405.jpg)\n\
    \nFigure 9–51. CS–201 Final Project—Rege's app selects the traffic lights closest\
    \ to the user as he or she is driving down the street.\n\n![images](images/00406.jpg)\n\
    \nFigure 9–52. CS–201 Final Project—Rege's traffic monitoring app showing the\
    \ embedded camera view.\n\n![images](images/00407.jpg)\n\nFigure 9–53. CS–201\
    \ Final Project—SatishRege's app showing another embedded camera view.\n\n###\
    \ Zoom Out… Seeing the Big Picture\n\nIt's important to know where we came from,\
    \ where we are now, and where we are going next. Not to get too metaphysical,\
    \ but this chapter is a bit of a metaphor for our lives. Where were you five years\
    \ ago? Last year? One day before you bought this book? Where do you intend to\
    \ be six months from now?\n\nThat's why this subject is so popular. People love\
    \ to know where they are! People love to know, and love to be shown how to get\
    \ from “here” to “there.”\n\nYou know how men stereotypically refuse to stop and\
    \ ask for directions? I know I do—it is because I should just know where I'm going.\
    \ When GPS came on the scene, I was impressed. But when Apple included one, by\
    \ way of `Maps`, in my first iPhone, I was totally blown away. All of a sudden,\
    \ I had the ability to consult the oracle and maintain my male ego at the same\
    \ time!\n\nThat's power, that's authority… and that's the same revolution we all\
    \ joined. Now that you have completed this book, and successfully navigated through\
    \ these exercises—some easier, some tougher—you are well on your way in the world\
    \ of programming.\n\nAs I stated earlier, my goals for you in this chapter were\
    \ humble. However, as in any really challenging and worthwhile pursuit, practice\
    \ makes perfect. If you are exhausted, but still excited about these ideas and\
    \ possibilities, then I count that as full success—both for you and for myself.\n\
    \nSome of you are perhaps thinking about topics that we did not cover in this\
    \ book: the accelerometer, cameras/videos, peer–to–peer protocol, RSS feeds, mail\
    \ clients/POP servers, etc. If these areas interest you, my hope is that your\
    \ mind is already racing off in these new directions. That means you do know where\
    \ you are, and that you know where you want to go. Life is good!\n\n## Chapter\
    \ 10\n\n## MapKit & Tables with Storyboarding\n\nThere are five things I want\
    \ you to bear in mind regarding this chapter:"
