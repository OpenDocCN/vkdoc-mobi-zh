  trans: "\n#### 应用准备前的可能工作\n\n让我们先熟悉两组术语：“解析”和“上传到互联网”。我们会频繁用到“解析”这个词，尽管在设计课程和本书时我曾犹豫是否要包含解析内容，但我最终决定宁可教会你这个当代编程基础技能：解析就是编写代码，让你能够进入服务器，仅从数据库中提取你所需的特定数据。例如，谷歌服务器上可能有\
    \ 6000 个与南非德班市相关的指针、链接和术语。我们将解析谷歌服务器，忽略所有信息，只提取德班的经纬度地址。想想看，数百万个应用都需要访问某个服务器，仅提取用户所需的信息。这正是关键编码技能，我将向你精确展示如何操作（并让你在\
    \ iPad 上看起来非常酷）。\n\n当然，你知道互联网并非悬浮在空中或云朵里。确实，有一部分数据会被发送到卫星，但随后会返回地球，通过线缆传输抵达服务器。开发能够从特定服务器抓取重要数据的\
    \ iPad 和 iPhone 应用至关重要。我曾有个学生，他编写的期末课堂项目应用可以解析科罗拉多斯普林斯市交通摄像头（位于科罗拉多州）的服务器。从城市服务器解析出正确图像后，他每秒向\
    \ iPhone 应用发送数张每个路口的快照，让用户能“提前看到”路口情况，并根据交通流量做出决策。太棒了！然而，尽管这位学生很聪明，当他站在讲堂前描述如何编写解析服务器的代码时，他指向了天空。我问他是否知道服务器就位于距离校园仅\
    \ 4 英里的地方。他看着我说道：“这么说，它并不需要上传到云端？”\n\n即便是我，在说“上网”时也会指向云朵，但我希望你记住：当我们解析谷歌服务器时，我们不关心它在哪里或如何到达那里。我们只关心代码是否正确地从服务器中解析出了对我们重要的信息。\n\
    \n#### 预备知识\n\n本章的下载文件与之前的教程略有不同。当然，你也可以不下载任何文件。你可以完全按照本书步骤操作，无需视频、源代码或下载文件也能完美运行应用。我建议你首先尝试不借助视频、下载文件或源代码进行操作。不过，如果你倾向于使用下载文件，请注意以下事项。下载文件包含\
    \ 6 张图片和 9 个样板代码，具体如表 10-1 所示：\n\n![图片](img/00408.jpg)\n\n![图片](img/00409.jpg)\n\
    \n这些下载文件位于[`http://bit.ly/nvc3Xk`](http://bit.ly/nvc3Xk)。你可以在[`http://bit.ly/raKxPe`](http://bit.ly/raKxPe)下载我在视频中编写的示例代码。要观看本章练习的截屏视频，请访问[`http://bit.ly/pEsztt`](http://bit.ly/pEsztt)。\n\
    \n**全局概览**\n\n> 本章中我们会多次用到全局概览。首先，我们从“30,000 英尺”高度审视代码，对整体框架有宏观认识。然后，随着深入细节，我们会始终把握全局。这是第一张全局图：\n\
    > \n> 1.  用城市列表填充表格\n> 2.  编写代码，让图钉落入选定城市地图的中心\n\n#### 新建单视图模板\n\n> ![图片](img/00410.jpg)\n\
    > \n> 图 10-1. 选择单视图应用图标，按回车或下一步。\n\n1.  与`myStory_01`一样，我们将使用单视图应用。因此，打开 Xcode\
    \ 并按 `N`，如图 10-1 所示。选择单视图应用后，按回车/返回。\n\n    ![图片](img/00411.jpg)\n\n    图 10-2.\
    \ 将应用命名为`myStory_02`，确保故事板和自动引用计数功能开启。\n\n2.  为了尽可能紧跟我的步骤，请将应用命名为“`myStory_02`”，选择“iPhone”，勾选“使用故事板”和“使用自动引用计数”，但保持“类前缀”和“包含单元测试”未勾选，如图\
    \ 10-2 所示。自动引用计数实际上超出了本书范围，但从基础层面讲，自动引用计数（ARC）是一种代码，它能调用 Mac 的 Objective-C 对象和块自动内存管理功能。这使经验丰富的程序员无需显式插入保留和释放操作。\n\
    \n#### 导入图片！\n\n![图片](img/00412.jpg)\n\n图 10-3. 拖入你的图形文件。\n\n3.  正如我们在`myStory_01`中所做的那样，先访问我的网站[`http://bit.ly/oqnNM7`](http://bit.ly/oqnNM7)下载图片和样板代码到桌面，然后拖入\
    \ iPhone 经典版所需的 57 × 57 像素图片、iPhone 4S Retina 显示屏所需的 114 × 114 像素图片。同时，拖入 iPad\
    \ 和 iPhone Retina 显示屏所需的 640 × 960px 启动屏幕，以及经典 iPhone 所需的 320 × 480px 启动屏幕，如图\
    \ 10-3 所示。\n\n    ![图片](img/00413.jpg)\n\n    图 10-4. 将图片拖入支持文件文件夹。\n\n4.  因为我们始终希望保持整洁有序，并让文件归入正确位置，你会看到刚刚拖入\
    \ Xcode 的图片文件位于根目录。我们需要将它们拖到正确位置——支持文件文件夹。如图 10-4 所示。\n\n#### 组织故事板\n\n在使用故事板时，最容易迷失方向的原因之一就是没有精确关注结构如何与故事板中的对象连接和关联。人们很容易看着故事板画布，认为一切完美，却没有注意到错误元素实际上已被连接。因此，请务必严格按照我这里的步骤操作。\n\
    \n![图片](img/00414.jpg)\n\n图 10-5. 选择故事板。\n\n5.  选择故事板，如图 10-5 所示。\n\n    ![图片](img/00415.jpg)\n\
    \n    图 10-6. 此处我们不需要视图控制器。\n\n6.  当故事板首次打开时，你会看到一个视图控制器，如图 10-6 所示。我们将选中这个默认视图控制器并删除它。这很容易理解：我们需要一个完整功能的表格视图，而仅仅在视图控制器上添加一个表格是无法获得这些功能的。我们将在稍后创建自己的视图控制器。现在，我们需要删除默认的视图控制器，请继续操作，如图\
    \ 10-6 所示。\n\n**全局概览**\n\n> 1.  用城市列表填充表格\n>     1.  创建表格视图\n> 2.  编写代码，让图钉落入选定城市地图的中心\n"
- fmt: "#### Adding the Table View Controller\n\n![images](images/00416.jpg)\n\n*Figure\
    \ 10–7. Drag a Table View Controller onto the canvas.*\n\n7. As mentioned, we\
    \ need to have a fully loaded Table View to hold our array of cities and interact\
    \ with Storyboarding and MapKit. So drag a Table View Controller onto the canvas,\
    \ as shown in [Figure 10–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos794784).\n\
    \n![images](images/00417.jpg)\n\n*Figure 10–8. Selecting the Table View Cell -\
    \ Cell*\n\n8. Something that is really cool and innovative about Storyboarding\
    \ is that we can edit the Table View right here in Storyboarding. The tricky thing\
    \ is that navigating yourself around the canvas can be challenging.\n   1. In\
    \ order to select the Table View Cell - Cell if you need to unclutter your screen.\
    \ First close Navigator ([Figure 10–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos795396),\
    \ arrow 1)\n   2. Then make sure that your Document Outline is open ([Figure 10–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos795396),\
    \ arrow 2)\n   3. Then, in your My Master Table View Controller Scene, select\
    \ the Table View Cell - Cell open ([Figure 10–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos795396),\
    \ arrow 3a).\n   4. Now, it is true that you could select it by clicking the prototype\
    \ cell on the Storyboard ([Figure 10–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos795396),\
    \ arrow 3b). However, I do NOT want you to get into the habit of selecting objects\
    \ on the canvas because many experienced Objective-C coders have learned the very\
    \ hard way that sometimes the object we think we've selected is actually under\
    \ the object we actually selected. Many painful hours later, or redoing the code\
    \ and bugging endlessly, we found our error. The other reason for not getting\
    \ into the habit of selecting on the Storyboard is that by making you open the\
    \ Document Outline and selecting the correct object in its pane, it helps one\
    \ visualize where we are.\n\n![images](images/00418.jpg)\n\n*Figure 10–9. Name\
    \ the Identifier “Cell” and save your work.*\n\n9. We are going to want to reuse\
    \ the nib cells. In other words, rather than create a massive list of cells, we'll\
    \ just use one and reuse it for whatever the number of cities we have in our array.\
    \ This means we need to give its Identifier a name that we can reuse, so let's\
    \ just call it “Cell”, as shown in [Figure 10–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos797507).\n\
    \n**THE BIG PICTURE**\n\n> 1. Populate a table with a list of cities\n>    1.\
    \ Create a Table View\n>    2. Make the Table View's Identifier be a cell\n> 2.\
    \ Code a pin to drop to the center of a selected cities' map\n\n![images](images/00419.jpg)\n\
    \n*Figure 10–10. Delete the original View Controller.*\n\n10. We see that what\
    \ we just built in the Storyboard was built with the original View Controller.\
    \ We need to build our own View Controller so delete both its header and implementation\
    \ files, as shown in [Figure 10–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos798983).\n\
    \n**NOTE:** Make sure that you delete the entire class, not just its references.\n\
    \n**THE BIG PICTURE: EXPANDED STEPS 10 - 17**\n\n> 1. Populate a table with a\
    \ list of cities\n>    \n>    1.1. Create a Table View\n>    \n>    1.2. Organize\
    \ our classes\n>    \n>    > 1.2.1. Delete the default ViewController\n>    \n\
    >    > 1.2.2. Create 3 Classes\n>    \n>    > 1.2.2.1. Two UIViewController Subclasses\n\
    >    \n>    > 1.2.2.1.1. myMasterTableViewController\n>    \n>    > 1.2.2.1.2.\
    \ myDetailViewController\n>    \n>    > 1.2.2.2. One Objective-C class\n>    \n\
    >    > 1.2.2.2.1. myPos\n>    \n> 2. Code a pin to drop to the center of a selected\
    \ cities' map\n\n![images](images/00420.jpg)\n\n*Figure 10–11. Create the first\
    \ of our two UIViewController subclasses.*\n\n11. Now that we've deleted the table's\
    \ default `ViewController`, we need a new backing class file to hold our cities\
    \ and code structures that will enable a table to be populated with a list of\
    \ cities. We will need two `UIViewController` subclasses, one to do exactly this\
    \ and another to grab all the data we need from the Google server. We will also\
    \ need a “My Position” (`myPos`) Objective-C class just like we did in myStory_01\
    \ to hold the current location. So let's start building these 3 classes: Enter\
    \ ![images](images/00031.jpg)N and select a `UIViewController` subclass, as shown\
    \ in [Figure 10–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos801854).\n\
    \n**THE BIG PICTURE**\n\n> 1. Populate a table with a list of cities\n>    \n\
    >    1.1. Create a Table View\n>    \n>    1.2. Organize our classes\n>    \n\
    >    > 1.2.1. Delete the default ViewController\n>    \n>    1.2.2. Create 3 Classes\n\
    >    \n>    > 1.2.2.1. Two UIViewController Subclasses\n>    \n>    > 1.2.2.1.1.\
    \ myMasterTableViewController\n>    \n>    > 1.2.2.1.2. myDetailViewController\n\
    >    \n>    > 1.2.2.2. One Objective-C class\n>    \n> 2. Code a pin to drop to\
    \ the center of a selected cities' map\n\n![images](images/00421.jpg)\n\n*Figure\
    \ 10–12. Name it `myMasterTableViewController`.*\n\n12. We need to make sure that\
    \ this new class we are creating is a subclass of `UITableViewController` because\
    \ we need it to know how to do table actions, such as hold our cities in the table.\
    \ So, after you name it `myMasterTableViewController`, please make sure you make\
    \ sure it's a subclass of `UITableViewController` because, if you don't, you'll\
    \ be crying later. See [Figure 10–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos804705).\n\
    \n![images](images/00422.jpg)\n\n*Figure 10–13. Create the first of our two UIViewController\
    \ subclasses.*\n\n13. Once you have created your `myMasterTableViewController`,\
    \ enter ![images](images/00031.jpg)N again and select another `UIViewController`\
    \ subclass, as shown in [Figure 10–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos805521).\n\
    \n![images](images/00423.jpg)\n\n*Figure 10–14. Name this `UIViewController` subclass\
    \ `myDetailViewController`.*\n\n14. This `UIViewController` subclass is going\
    \ to be more involved with parsing the Google server and interacting between `myPos`\
    \ and the View the user sees. So, after naming it `myDetailViewController`, make\
    \ sure it's not a subclass of a `UITableViewController` but rather a subclass\
    \ of a `UIViewController`, as shown in [Figure 10–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos806135).\n\
    \n![images](images/00424.jpg)\n\n*Figure 10–15. Select an Objective-C class*\n\
    \n15. We've created our two `UIViewController` subclasses and now we need to create\
    \ our 3rd class, an Objective-C class. So let's do it: enter ![images](images/00031.jpg)N\
    \ again and select an Objective-C class, as shown in [Figure 10–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos818420)\n\
    \n**THE BIG PICTURE**\n\n> 1. Populate a table with a list of cities\n>    \n\
    >    1.1. Create a Table View\n>    \n>    1.2. Organize our classes\n>    \n\
    >    > 1.2.1. Delete the default ViewController\n>    \n>    > 1.2.2. Create 3\
    \ Classes\n>    \n>    > 1.2.2.1. Two UIViewController Subclasses\n>    \n>  \
    \  > 1.2.2.2. One Objective-C class\n>    \n>    > 1.2.2.2.1. myPos\n>    \n>\
    \ 2. Code a pin to drop to the center of a selected cities' map\n\n![images](images/00425.jpg)\n\
    \n*Figure 10–16. Name it `myPos`*\n\n16. Just as we did in myStory_01, this needs\
    \ to be an `NSObject` subclass. Once you've made sure of this and named it `myPos`,\
    \ click next or press enter, as shown in [Figure 10–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos809156).\
    \ Let's move on.\n\n![images](images/00426.jpg)\n\n*Figure 10–17. Housekeeping\
    \ part 1: Drag the files into your myStory_02 folder.*"
