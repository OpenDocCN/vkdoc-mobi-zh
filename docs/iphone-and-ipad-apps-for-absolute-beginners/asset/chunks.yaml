- fmt: '# Buttons & Labels with Multiple Graphics


    In this chapter, we''ll tackle our fourth program together, and it''s time to
    quicken the pace a bit. As in [Chapter 3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079),
    you''ll be able to simply view the screen shots and implement the code if you
    remember most of the details—steps that have been described repeatedly in the
    previous examples. You''ll get fewer figures pertaining to each step, yet more
    procedures; we will be using the short bursts of information introduced in [Chapter
    3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079).


    In addition, as in [Chapter 3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079),
    once you have completed the program, we will do a code review in the “Digging
    the Code” section. Initially, we will cover some of the same aspects and concepts
    we discussed in that section in [Chapter 3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079),
    and then we will zoom in on some of the new code. Not only will we go a little
    deeper, but we will also expand our horizons to consider other computing concepts
    that link up to this deeper level of analysis.


    You will probably also notice a change of style in [Chapter 4](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_016.html#filepos245269),
    for we will be moving away from the “elementary” language used in previous chapters.
    I will also be doing less hand-holding for you with the images. I will start weaning
    you off arrows—all the information is there, so if you cannot immediately find
    what I am referencing in the text, you will need to think a little and find it.
    Think of it as an exercise to force your neurons to make some associations by
    taking baby steps. So, let''s pick up the pace—a little faster, a little more
    advanced, and using more of the technical nomenclature.


    Most importantly, when we get to step 29, we will take twenty minutes of class
    time to open the hood and really get our hands dirty delving into some critical
    code concepts that you will need to wrap your head around in order to move on
    through the book. Don''t worry; I make it easy.


    Again, if you don''t grasp every concept and technique fully, that is perfectly
    okay! Relax and enjoy this next example. However, before we start our fourth app,
    we will take a brief glance at our road map.


    ## Roadmap Recap


    Thus far, we''ve gone through three examples where we said “Hello world!” from
    inside the iPhone/iPad. You''ve had an opportunity to familiarize yourself with
    the creative process in the context of programming apps: go in with an idea and
    come out with a tangible, working product. Several times I asked you to ignore
    heavy-duty code that I judged would be distracting or daunting. You may have also
    noticed that when you did try to understand some of this thicker code, it made
    sense in a weird, wonderful, chaotic way. Well, as we progress forward, we are
    going to make the “chaos” of the unknown less unsettling.


    Before dealing with this issue, let me also put you at ease by telling you that
    when it comes to `Objective-C`, our programming language, I have yet to meet a
    single advanced programmer who actually knows every symbol and command. Just as
    in other industries, people tend to get very knowledgeable in their specific domains
    and specializations (e.g., integrating `Google Maps` to a game or an app).


    An analogy I like goes like this: Car mechanics used to be able to strip an engine
    down completely and then build it back up—presumably better than it was. Nowadays,
    car mechanics are very specialized, with only a handful knowing how to completely
    strip down and rebuild a specific modern-day car. We get an expert in Ford hybrid
    engines, or an expert in the Toyota Prius electrical circuitry, or a specialist
    in the drum brakes that stop big rigs, and so on. There is nothing wrong with
    this!


    This is similar to how you are proceeding. You have just gotten your hands greasy
    and dirty by successfully programming three apps. Now, if all goes according to
    plan, you are going to delve even deeper when you get to step 29 and walk toward
    the future, brimming with confidence. I know from experience that the confidence
    of my students can be derailed if they are intimidated or blown away by too much
    complexity or technicality. I have found that students can handle bumps in the
    road if they know where they are going, and if they know that the rough stretches
    won''t get too scary or dangerous.


    ## helloWorld_04: A View-based Application


    Right this second—feel good about yourself! You are already quite deep into the
    Forest of `Objective-C`. If you lose your way, remember that besides the information
    I present here in this book, including various screenshots, I also offer you screencasts,
    available at my website. You can use the short URL, go to `rorylewis.com` as indicated
    below where you click on the `Xcode 4` icon, ![images](images/00108.jpg) and then
    go to either video tutorial or downloads:


    ![images](images/00109.jpg)


    > ![images](images/00110.jpg)


    Figure 4–1\. Create or download three `.png` image files: a bottom layer, a top
    layer, and a desktop icon. Save them all to a beautiful, clean desktop.


    1.  As usual, let''s begin with a clean desktop and only four icons: your `Macintosh
    HD` and three image files (shown as icons in [Figure 4–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos251779)).
    As I''m sure you have gathered by now, I think it''s essential to have an uncluttered
    desktop, and I want to encourage you to continually hone your organizational mindset.
    Using our familiar shortcuts, close all programs. You are welcome to download
    these images (from either `ow.ly/5l1w8` for the downloads page or from the videos
    page at `ow.ly/5l1wS`), which will become key building blocks of this project,
    but we really want to encourage you to find and prepare images of your own. That
    way, you''ll have more passion about this assignment. You have two basic choices
    at this point: download the images from the aforementioned links or prepare your
    own. Assuming that you are willing to go through the effort of creating three
    distinct photo files of your own choosing, pay attention to the following guidelines.
    ![images](images/00111.jpg)


    Figure 4–2\. `STAIR.png`; this is the background image—or bottom layer.


    2.  The size of the first picture, `STAIR.png`, as shown in [Figure 4-2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos253255),
    will be the iPhone standard of 320 pixels in width by 460 pixels in height. This
    will be the bottom layer of two images, so we''ll call it the background layer.
    Our background, then, is a photograph of the stairs leading out the back of the
    Engineering building, here at the University of Colorado at Colorado Springs.
    We will use this picture as a backdrop for a picture of Immanuel Kant—the greatest
    philosopher of all time—a man whose philosophy formed the basis of that of many
    of our founding forefathers who framed the Constitution. More importantly to us,
    he was the man who began mapping parallels between mathematical logic and words
    in speech. When the program is run, the background will display and, once a button
    is clicked, up will pop the photo of Immanuel Kant at the top of the stairs. Take
    a quick peek at [Figure 4-39](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos320556).
    How nice—Immanuel Kant has decided to return to University! This is our scenario
    then: You will find many times in programming that you will want your user to
    see a familiar background, and then when a button is pressed, somebody (or something)
    unusual or unexpected suddenly appears. This `helloWorld_04` will teach you this.
    ![images](images/00112.jpg)


    Figure 4–3\. This is the modified top-layer image, which will overlay the background.'
