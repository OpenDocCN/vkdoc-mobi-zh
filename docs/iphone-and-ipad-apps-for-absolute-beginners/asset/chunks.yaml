- fmt: '### Phase III: Establishing View Controller Content


    ![images](images/00259.jpg)


    *Figure 7–34\. Add a `UIImageView` to the Male view.*


    34\. Your next step will be to add images to your Male, Female, and Geek view
    controllers. Let''s start at the top and drag an Image View onto the Male view,
    as shown in [Figure 7–34](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos548122).


    ![images](images/00260.jpg)


    *Figure 7–35\. Select the image to use for Male from the Attribute panel.*


    35\. Associate the `man.png` image with the Male controller by selecting it from
    the Attributes Panel, as shown in [Figure 7–35](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos548712).


    ![images](images/00261.jpg)


    *Figure 7–36\. Add a `UIImageView` to the Geek view.*


    36\. You now need to drag the `UIImageView` and associate an image with it—just
    as you did with Male—two more times. So let''s do it: drag a `UIImageView` onto
    the Geek view, as shown in [Figure 7–34](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos548122).


    **NOTE:** Notice how the little icons in the segue lines depict the type of segue
    that will be performed.


    ![images](images/00262.jpg)


    *Figure 7–37\. Select the image to use for Geek from the Attribute panel.*


    37\. Associate the `Geek.png` image with the Geek controller by selecting it from
    the Attributes Panel, as shown in [Figure 7–35](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos548712).


    ![images](images/00263.jpg)


    *Figure 7–38\. Add a `UIImageView` and select the image for Female.*


    38\. Yup! You can do this one on your own now. Add a `UIImageView` and associate
    the `female.png` with it. This is shown in [Figure 7–38](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos550770).


    ![images](images/00264.jpg)


    *Figure 7–39\. Name the Female controller bar title.*


    39\. Naming the controller bar titles in storyboarding actually instantiates connectivity
    under the hood, and this eliminates the need for you to code some of these segues.
    This is explained in more detail in **Digging the Code** but, for now, just accept
    that applying names in a storyboard controller bar title is in essence a "freebie"
    with code. Do this with your Male, Female, and Geek controller bar titles. In
    [Figure 7–39](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos551354) you
    can see the default value of the Female controller changing to "Female."


    ![images](images/00265.jpg)


    *Figure 7–40\. Name the Geek controller bar title.*


    40\. [Figure 7–40](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos552254)
    shows the Geek controller bar title being renamed.


    ![images](images/00266.jpg)


    *Figure 7–41\. Name the Male controller bar title.*


    41\. [Figure 7–41](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos552718)
