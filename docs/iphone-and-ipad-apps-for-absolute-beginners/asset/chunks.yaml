    <fontsize=\\\"-1\\\">\" withString:@\"\"];`\n15.  `strNoParaQueryResults = [strNoParaQueryResults`\n\
    \    `stringByReplacingOccurrencesOfString:@\"</b<\" withString:@\"</b><\"];`\n\
    \n所使用的`TrafficCamAnnotation.h`头文件简明直观，使用了`+(id)annotationWithCam:(TrafficCam*)Cam`和`-(id)initWithCam:(TrafficCam*)Cam`指针，正如之前为假设的`GratefuldeadParser.h`所描述的那样。在此例中，`+(id)annotationWithCam:(TrafficCam*)Cam`创建解析后的文件，而`-(id)initWithCam:(TrafficCam*)Cam`则对其进行初始化。所有处理无用代码的辛勤工作，其结果体现在干净的注解中。请参见[图\
