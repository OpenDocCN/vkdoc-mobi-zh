  trans: "\n# 第 11 章\n\n## 从故事板到多媒体平台\n\n这是本书的最后一章，我期待已久。可以说，这是整个学习的压轴应用。这个应用将教你如何将你的餐厅、企业或任何你喜欢的内容推广到各种多媒体平台。我选择推广一支乐队作为示例，因为它涉及`iTunes`，而我的许多学生都对`iTunes`感到棘手。我们将在这里彻底解决这个问题。在课堂上，我首先带领学生们浏览这个应用，让他们想象自己身处遥远的时空，发现了一支名为“披头士”的乐队。然后，他们将通过网络、`YouTube`和`iTunes`推广这支乐队。在项目的后半部分，学生们需要创建自己的企业，并以类似但更具创意的方式进行推广。\n\
    \n遗憾的是，由于版权问题，未经披头士授权，本书中不允许展示披头士的照片。因此，我创建了一些虚拟网站，上面有我弹吉他的照片，以及存放我多年前（1997 年）歌曲的`iTunes`页面。我将指导你获取披头士的\
    \ URL（公共领域资源），并教会你如何构建网站（首先像我在课堂上那样为披头士制作网站），然后再教你如何寻找其他乐队或其他类型的媒体来进行模拟推广。希望你能拥有自己的企业，比如餐厅、珠饰店、咨询服务机构等，然后为它制作一个推广应用，并上传到`iTunes`商店，供人们免费下载。\n\
    \n这是如何运作的呢？还记得在图 1-21 中，我解释了如何通过互联网上的应用程序赚钱的具体流程吗？现在，我在这里教你的是如何推广你的业务并配置你的应用，可能一开始是免费的。假设你经营一家保姆服务公司。学会管理披头士网站后，你可以为保姆公司制作一个应用，并上传到应用商店供免费下载。过去，我们发放名片；现在，我们发放应用。你可以让潜在客户知道，他们可以免费下载你保姆公司的应用，并通过一个限时有效的密码（仅对潜在客户开放），随时通过实时网络摄像头查看他们的孩子。他们可以看到你的员工正在照顾的其他孩子。他们还可以通过你的应用获取雪天停课通知、生日提醒，并在线支付账单。通过口口相传，这些家长会告诉其他家长你的服务有多棒，而这仅仅是因为你的应用既方便又酷炫。\n\
    \n这同样适用于其他企业；你只需要发挥创意。创新是你的职责，但嘿！能购买这本书本身就说明你极具创新精神，而如果你还在阅读，说明你已经深入“极客”领域，所以我完全相信你拥有为自己的企业、他人的企业或你个人制作出色应用所需的一切。你唯一需要的是技术知识，而我将在这里、现在教会你这些，我们开始吧！\n\
    \n### `myiTunes`：一个主从应用\n\n`myiTunes`基于一种创建故事板应用时较具挑战性的方法：主从应用（Master-Detail Application）。然而，主从应用赋予了`iPad`\
    \ `iOS 5`的分割视图（split view）和弹出视图（popover）与出色的故事板技术相结合的能力。更有甚者，如果这还不够，我们还融入了访问`iTunes`、`Facebook`、`Google+`、包含视频的页面，当然还有两个带有酷炫图标的\
    \ iPad 启动屏的能力。所有这些组合起来，构成一个美观且可推广的应用，随时准备将你、你的企业或他人的业务推向新的高度——声名远扬！\n\n`iTunes`在访问其音乐商店方面存在一些有争议、古怪且不太用户友好的方式。我将一步步讲解，包括如何查找乐队、视频和播客。还有一些其他的多媒体平台，我没有在示例中涵盖，因为那会显得过载，但我会向你准确展示如何将你的媒体从图像转换为视频等等。我还会包含访问这些其他媒体形式的代码以及你下载的样板代码。因此，即使我们并未在样板中使用所有这些类型的媒体，它们依然可供你按需选用。\n\
    \n在继续之前，有一点术语需要说明：我们将在本应用中讨论分割视图和弹出视图。这些是超酷的表格和下拉菜单，它们会根据你握持 iPad 的方式，为用户调用一个表格。分割视图并排显示两个面板。在横屏模式下，主视图宽度为\
    \ 320 像素。然而，当切换到竖屏方向时，分割视图会以弹出视图的形式出现，看起来像是覆盖在现有视图之上。它就像一个下拉菜单，悬浮在底层内容之上（参见图 11–25）。它的工作方式不可能像对话框或普通下拉菜单那样。最近有个学生问我：“刘易斯博士，我们能给弹出视图‘整容’吗？”嗯……不行！你不能随意调整、美化或更改太多内容。但问题在于你是否想这么做，答案很可能是‘不想’。弹出视图精妙、优雅，并且向用户表明，你这位开发者编写的程序非常出色！\n\
    \n那么，我们开始进行准备工作，以便着手构建应用。\n\n#### 准备工作\n\n本章的下载文件在性质上与第 10 章的样板文件和图像类似。不过，如前所述，我包含了我们在本应用中不会用到但你可以自行创建应用时可能需要的代码（使用替代或附加媒体）。这些代码全部可供你使用。在视频和代码中，有大量我预先编写好的代码。然而，我将在本章中对所有内容进行详尽解释，因此我建议你尝试自己编写所有代码。如果一段时间后你发现确实需要使用样板代码，那就用吧，但请先尝试独立完成。如果不得不使用样板代码，那么在成功运行样板代码后，请逐行手动输入代码。如果你仍然无法使其正常运行，即使使用了样板代码，那么请下载我精确的`Xcode`文件，让我的代码运行起来，然后看看你具体遗漏了什么地方。\n\
    \n这些下载文件可以在[`http://bit.ly/sL26vN`](http://bit.ly/sL26vN)找到。我在视频中编程的示例代码可以在这里下载：[`http://bit.ly/uN1uV1`](http://bit.ly/uN1uV1)。要观看本章练习的录屏，请访问[`http://bit.ly/tPatpA`](http://bit.ly/tPatpA)。如果你需要更多帮助，请访问论坛[`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY)。\n\
    \n**全盘概览**\n\n> 正如我们在第 10 章开始编写更大规模代码时所做的那样，我们将使用带有多个视图的“全盘概览”方法。首先，我们将从“30,000”英尺的高度审视代码，对我们所处的整体格局有一个非常宽泛的宏观理解。然后，随着我们逐步深入，我们将始终牢记这个全盘概览。\n\
    > \n> 1.  在故事板中设置弹出视图\n> 2.  编写与多媒体平台交互的代码\n> 3.  调整弹出视图以正确抓取平台\n"
- fmt: "# A New Master-Detail Template\n\n> ![images](images/00464.jpg)\n\nFigure\
    \ 11–1. Select the Master-Detail Application icon, and press return or next.\n\
    \n1. We will use a Master-Detail Application. So open Xcode and enter ![images](images/00031.jpg)![images](images/00032.jpg)`N`,\
    \ as shown in Figure 11–1. After selecting the Master-Detail Application, press\
    \ enter/return.\n\n![images](images/00465.jpg)\n\nFigure 11–2. Name your app `myiTunes`\
    \ making sure Storyboard and automatic referencing is on.\n\n2. In order to follow\
    \ along with me as closely as you can, name it “myiTunes,” select “iPad,” check\
    \ the “Use Storyboard,” and “Use Automatic Reference Counting,” but leave the\
    \ “Class Prefix” and “Include Unit Tests” unchecked as shown in Figure 11–2.\n\
    \n# Bring in the Images!\n\n![images](images/00466.jpg)\n\nFigure 11–3. Drag in\
    \ your graphics.\n\n3. Just as we did in `myStory_01` after going to my website\
    \ at [`http://bit.ly/uN1uV1`](http://bit.ly/uN1uV1) and downloading the images\
    \ and boilerplate code onto your desktop, drag in the 72 × 72 px iPad icon, iPad\
    \ 72, into the App Icon box, drag the 769 × 1004 px Default-Portrait iPad splash\
    \ screen into the Launch Images Landscape box, and drag the 1024 × 748 px Default-Landscape\
    \ iPad splash screen into the Launch Images Portrait box as shown in Figure 11–3.\n\
    \n![images](images/00467.jpg)\n\nFigure 11–4. Drag the images into the Supporting\
    \ Files Folder.\n\n4. Because we always want to keep things nice, orderly, and\
    \ in their proper place, you will see that the files holding the images you just\
    \ dragged into Xcode are in the root directory. We want to drag them into their\
    \ proper location: the Supporting Files folder. This is illustrated in Figure\
    \ 11–4.\n\n# Organize the Popover in Storyboard\n\nThe first thing we will do\
    \ is set up the popover in the storyboard. I am going to be fairly inventive and\
    \ artful but not go overboard with beautiful popover bells and whistles because\
    \ I do not want to take away from my two goals: teaching you to set up the storyboard\
    \ and teaching you to write the code behind the storyboard. However, once you\
    \ complete this project, you will have opened the door to all the rooms where\
    \ you can later tinker around. But, for right now, let's keep it simple.\n\n![images](images/00468.jpg)\n\
    \nFigure 11–5. Select Storyboard and close the Navigator.\n\n5. Select `MainStoryboard.storyboard`\
    \ and close the Navigator as shown in Figure 11–5.\n\n![images](images/00469.jpg)\n\
    \nFigure 11–6. We do not want a View Controller here.\n\n6. Before we get too\
    \ far, I want you to take a look at Figure 11–14 and take a look at all the Table\
    \ views and their levels located in the left hand side bar called the Document\
    \ Outline inside the box called Master View Controller - Master Scene. Compare\
    \ how populated it is compared to our lone Table view in our Master View Controller\
    \ - Master Scene. That's quite a lot of work there.\n\nThere are two ways to populate\
    \ these Table Views with what you want. They are the “long boring” way and the\
    \ “organized and very efficient” way. We plan ahead and we do this by sticking\
    \ to a simple rule:\n\nCreate one Table view with all its sub-attributes. Then,\
    \ once you have one done exactly the way you want it, duplicate the entire set.\n\
    \nWe are selecting the default view Controller because we need to delete it. As\
    \ far as the big picture is concerned, we will create one group exactly as we\
    \ want it to be, as indicated by 1.1 in “The Big Picture”.\n\nSo go ahead and\
    \ open the Documents Outline and select Table View in my Master View Controller–Master\
    \ scene as shown in Figure 11–6.\n\n## THE BIG PICTURE\n\n> 1. Set up the popover\
    \ in the storyboard\n>    \n>    1.1. Create a Group\n>    \n>    > 1.1.1. Set\
    \ up the attributes of each Table View Cell – Cell in the group\n>    \n>    1.2.\
    \ Duplicate the Group as required\n>    \n>    1.3. Label all the cells\n> \n\
    > 2. Code the interaction to the multimedia platforms\n> 3. Tweak the popover\
    \ to grab the platforms correctly\n\n![images](images/00470.jpg)\n\nFigure 11–7.\
    \ Create a grouped-style set of static cells.\n\n7. Open the Attributes Inspector\
    \ in the Utilities pane and then go down and ensure Static Cells from the Content\
    \ drop-down menu. Next select “Grouped” Style to give us space for headers for\
    \ separation as shown in Figure 11–7.\n\n![images](images/00471.jpg)\n\nFigure\
    \ 11–8. Selecting the Table View Cell - Cell\n\n8. This can be benign but tricky\
    \ so pay attention to this very simple step: go back to the Documents Outline\
    \ and, inside your Master View Controller – Master scene, go down two levels from\
    \ the Table View you have just been working on. As shown in Figure 11–8, you should\
    \ now be at the Table View Cell—Cell. If you select the wrong level, you will\
    \ only realize you're lost when you're very lost.\n\n![images](images/00472.jpg)\n\
    \nFigure 11–9. Create subtitles for each Table View Cell – Cell.\n\n9. We want\
    \ to create subtitles in each Table View Cell—Cell because they tell us, and most\
    \ importantly the user, what we will see or where we will be going if we select\
    \ this option. So, go back to the Attributes Inspector in the utilities pane and\
    \ then go down and select Subtitle from the Style as shown in Figure 11–9."
