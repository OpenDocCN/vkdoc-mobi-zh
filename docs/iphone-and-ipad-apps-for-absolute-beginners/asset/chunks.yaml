  trans: "\n# 注意\n\n由于我们是先编写 `MasterViewController` 的代码，此时 Xcode 会给出一些警告和错误标记。请暂时忽略它们。\n\
    \n## 全景概览\n\n> 1.  在故事板中设置弹出框\n> 2.  编写与多媒体平台的交互代码\n>     \n>     2.1\\. 主视图控制器\n\
    >     \n>     > 2.1.1\\. 为每个被选中的单元格编写代码\n>     > \n>     > 2.1.1.1\\. 头文件内容\n\
    >     > \n>     > 2.1.1.2\\. viewDidLoad\n>     > \n>     > 2.1.1.3\\. 设置方向\n\
    >     > \n>     > 2.1.1.4\\. Case 语句\n>     > \n>     > 2.1.1.5\\. 私有方法\n>   \
    \  \n>     2.2\\. 详情视图控制器\n>     \n>     > 2.2.1\\. 将视图连接到 WebView\n> \n> 3. \
    \ 调整弹出框以正确获取平台信息\n\n原始的 `shouldAutorotateToInterfaceOrientation` 方法如下方灰色所示，我们仅当设备为\
    \ iPad 时才会使用它。\n\n```objc\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // 返回支持的方向\n    if ([[UIDevice currentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPhone)\
    \ {\n        return (interfaceOrientation != UIInterfaceOrientationPortraitUpsideDown);\n\
    \    } else {\n        return YES;\n    }\n}\n```\n\n现在我们需要做几件事。我们需要将分区和行号从线性索引转换为从上到下计数的行号。对于正在仔细查看每一行代码的读者，我需要指出，接下来的两行代码假设第一个分区有\
    \ 2 行，而其他分区都只有 1 行。\n\n```objc\nNSInteger nSelectedRowIdx = (indexPath.section\
    \ > 0) ? indexPath.section+1 : 0;\n// 现在值为 0,2,3,4\nnSelectedRowIdx += indexPath.row;\n\
    // 现在值为 0,1,2,3,4\n```\n\n如果你确信这样能将每个 case 与特定行（每个单元格的顶行）对应起来，那也没问题。每次这样做时，直接使用就好。实际上，只需粘贴进去，然后修改下面的\
    \ `case` 语句即可。\n\n```objc\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    NSInteger nSelectedRowIdx = indexPath.section *2 + indexPath.row;\n\
    \    switch (nSelectedRowIdx) {\n```\n\n现在我们需要编写 `case` 语句，它们将映射到我们已经按顺序排列好的行。我们有四个分区：ARTIST（艺人）、ALBUMS\
    \ IN ITUNES（iTunes 中的专辑）、SONGS（歌曲）和 PICTURES（图片）。每个分区内我们需要两个称为 case 的选择项，所以让我们先在“全景概览”中规划一下。\n\
    \n## 全景概览\n\n> 1.  在故事板中设置弹出框\n> 2.  编写与多媒体平台的交互代码\n>     \n>     2.1\\. 主视图控制器\n\
    >     \n>     > 2.1.1\\. 为每个被选中的单元格编写代码\n>     > \n>     > 2.1.1.1\\. 头文件内容\n\
    >     > \n>     > 2.1.1.2\\. viewDidLoad\n>     > \n>     > 2.1.1.3\\. 设置方向\n\
    >     > \n>     > 2.1.1.4\\. Case 语句\n>     > \n>     > 2.1.1.4.1\\. ARTISTS（艺人）\n\
    >     > \n>     > 2.1.1.4.1.1\\. Case 0\n>     > \n>     > 2.1.1.4.1.2\\. Case\
    \ 1\n>     > \n>     > 2.1.1.4.2\\. ALBUMS（专辑）\n>     > \n>     > 2.1.1.4.2.1\\\
    . Case 2\n>     > \n>     > 2.1.1.4.2.2\\. Case 3\n>     > \n>     > 2.1.1.4.3\\\
    . SONGS（歌曲）\n>     > \n>     > 2.1.1.4.3.1\\. Case 4\n>     > \n>     > 2.1.1.4.3.2\\\
    . Case 5\n>     > \n>     > 2.1.1.4.4\\. PICTURES（图片）\n>     > \n>     > 2.1.1.4.4.1\\\
    . Case 6\n>     > \n>     > 2.1.1.4.4.2\\. Case 7\n>     > \n>     > 2.1.1.5\\\
    . 私有方法（用于在将重定向传递给应用打开之前处理重定向的辅助例程）\n>     > \n>     > 2.1.1.5.1.\n>     \n>  \
    \   2.1\\. 详情视图控制器\n>     \n>     > 2.2.1\\. 将视图连接到 WebView\n> \n> 3.  调整弹出框以正确获取平台信息\n\
    \n因此，对应的代码如下：\n\n```objc\n        case 0: // 在 Safari 中打开（艺人）\n            [self\
    \ LocateArtistPageInSafari];\n            break;\n\n        case 1: // 在 iTunes\
    \ 中打开（艺人）\n            //[self LocateArtistPageInItunes];\n        {\n       \
    \     NSURL *urlInItunes = [NSURL URLWithString:@\"http://itunes.apple.com/us/artist/rory-lewis/id65902515?uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 2: // 在 iTunes 中打开（歌曲）\n                     //[self\
    \ LocateArtistPageInItunes];\n        {\n            NSURL *urlInItunes = [NSURL\
    \ URLWithString:@\"http://itunes.apple.com/us/album/songs-for-friday/id408548641?uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 3: // 在 iTunes 中打开（歌曲）\n            //[self LocateArtistPageInItunes];\n\
    \        {\n            NSURL *urlInItunes = [NSURL URLWithString:@\"http://itunes.apple.com/us/album/heroines/id461113548?uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 4: // 在 iTunes 中打开（歌曲）\n            //[self LocateArtistPageInItunes];\n\
    \        {\n            NSURL *urlInItunes = [NSURL URLWithString:@\"http://itunes.apple.com/us/album/elvis-presley/id461113548?i=461113566&uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 5: // 在 iTunes 中打开（歌曲）\n            //[self LocateArtistPageInItunes];\n\
    \        {\n            NSURL *urlInItunes = [NSURL URLWithString:@\"http://itunes.apple.com/us/album/hippie-paradise/id408548641?i=408549591&uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 6: // 在 Safari 中打开（艺人）\n            [self LocateArtist2PageInSafari];\n\
    \            break;\n\n        case 7: // 在 Safari 中打开（艺人）\n            [self\
    \ LocateArtist3PageInSafari];\n            break;\n\n    }\n\n    //[self DeselectRow];\n\
    }\n```\n\n现在我们需要创建辅助例程，以便在将重定向传递给打开的应用程序之前处理它们。具体来说，我们需要处理 `LinkShare/TradeDoubler/DGM`\
    \ 类型的 URL，将其转换成 iPhone 能够处理的格式——如果你打算自己编写一个包含 iPhone 支持的通用应用的话。更多信息请访问 [`http://developer.apple.com/library/ios/#qa/qa1629/_index.htm`](http://developer.apple.com/library/ios/#qa/qa1629/_index.htm)。\n\
    \n```objc\n- (void)openReferralURL:(NSURL *)referralURL {\n    //NSURLConnection\
    \ *connection =\n    (void)[[NSURLConnection alloc] initWithRequest:[NSURLRequest\
    \ requestWithURL:referralURL] delegate:self startImmediately:YES];\n}\n```\n\n\
    现在，出于安全考虑，我们保存最近的 URL（以防发生多次重定向）。请注意，`iTunesURL` 是本类声明中的一个 `NSURL` 属性：\n\n```objc\n\
    - (NSURLRequest *)connection:(NSURLConnection *)connection willSendRequest:(NSURLRequest\
    \ *)request redirectResponse:(NSURLResponse *)response {\n    self.iTunesURL =\
    \ [response URL];\n    NSLog(@\"RxURL [%@]\",[self.iTunesURL absoluteString]);\n\
    \    return request;\n}\n```\n\n好了，不再有重定向了。所以我们使用最后保存的那个 URL：\n\n```objc\n- (void)connectionDidFinishLoading:(NSURLConnection\
    \ *)connection {\n    [self StartExternalAppWithURL:self.iTunesURL];\n}\n```\n\
    \n这有点技术性，但我们需要使用 iTMS 链接（一种用于 iTunes 链接和 URL 的特殊 URL/链接协议）才能连接到网络。我们有一个名为 `StartExternalAppWithURL`\
    \ 的小方法，用于处理我们的 iTMS 链接：\n\n```objc\n-(void)StartExternalAppWithURL:(NSURL *)theURL\n\
    {\n    NSLog(@\"UsingURL [%@]\",[theURL absoluteString]);\n    [[UIApplication\
    \ sharedApplication] openURL:theURL];\n    [self DeselectRow];\n}\n```\n"
- fmt: "Almost done. We just need to deselect our last selected table cell so, when\
    \ our view reappears, it will not still be selected. We do this after our external\
    \ app start has been requested because this object is NOT informed of view leaving\
    \ OR the apprestarting from the background when it is resumed without adding additional\
    \ plumbing.\n\n```\n-(void)DeselectRow\n{\n    // Unselect the selected row if\
    \ any\n    NSIndexPath* selection = [self.tableViewindexPathForSelectedRow];\n\
    \    if (selection) {\n        [self.tableViewdeselectRowAtIndexPath:selectionanimated:YES];\n\
    \    }\n    [self.tableViewreloadData];\n}\n```\n\nLast bit—three Artist pages\
    \ in Safari (`case 0`) and the cases for `6` and `7`.\n\n```\n-(void)LocateArtistPageInSafari\n\
    {\n    NSURL *urlInSafari = [NSURL URLWithString:@\"http://bit.ly/poi91o\"];\n\
