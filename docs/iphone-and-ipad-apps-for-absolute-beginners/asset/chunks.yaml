- fmt: "26. 如[图 7-26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos539203)所示，向视图中添加一个新的`UIButtonView`。你可以通过每个按钮的激活来跳转到另一个视图。你可以重复该过程三次来拖拽三个按钮，也可以练习使用你已经尝试过一次的`option-drag`技术。因此，从你放置的第一个按钮开始，使用`option-drag`复制它两次，因为你总共需要三个按钮，之后只需重新标注它们。按降序将这些按钮命名为“Male”、“Female”和“Geek”，并根据需要调整它们的大小。\n\
    \n![images](images/00252.jpg)\n\n图 7-27. 从每个按钮创建更多跳转到三个视图控制器的转场。\n\n27. 你需要从三个按钮分别创建指向其关联视图控制器的转场。因此，和之前一样，从每个按钮`control-drag`到另一个视图控制器，以便为每个按钮创建一个转场链接。我将“Male”连接到顶部，“Female”连接到底部，“Geek”连接到中间，这样可以使链接线看起来整洁有序。如[图\
    \ 7-27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos540165)所示。\n\n\
    ![images](images/00253.jpg)\n\n图 7-28. 连接到`performSegueWithIdentifier:sender:`。\n\
    \n28. 正如你在 7-15 中所做的那样，当从 Male 按钮`control-drag`到 Male 视图控制器时，你会看到选择模态、推入或自定义的选项，你可以保留默认设置，或者你会看到一个`performSegueWithIdentifier:sender:`选项，该选项包含使用情节串联图板连接这两个对象所需的所有代码。如[图\
    \ 7-28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos540991)所示。\n\n\
    ![images](images/00254.jpg)\n\n图 7-29. 已完成的指向 Male 的转场以及正在进行的指向 Geek 的转场。\n\n\
    29. [图 7-29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos541833)展示了连接\
    \ Male 按钮到 Male 视图控制器的已完成转场。注意，我将 Geek 的视图控制器放在了中间，以便你可以在应用程序的后续阶段向外扩展。这说明了你为用户提供的模式或顺序可能与你情节串联图板上视图控制器的顺序不同。并且我毫不怀疑，在掌握转场如何显示其视觉连接性之前，你将需要一段时间才能让它们看起来像[图\
    \ 7-29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos541833)中展示的那样优雅。不要灰心，只需稍加练习，就能学会如何将视图控制器放置多远，以及如何确保所有对象之间的网格对齐具有对称性。\n\
    \n![images](images/00255.jpg)\n\n图 7-30. 最后一个转场，从 Female 按钮到其视图控制器。\n\n30. 好的，对于这最后一个连接，我要说的只是你应该从\
    \ Female 按钮创建一个转场到其视图控制器。[图 7-30](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos543035)展示了这一步骤的第一部分，但我不会重复所有步骤。\n\
    \n![images](images/00256.jpg)\n\n图 7-31. 缩小视图并排列布局。\n\n31. 起初，我并没有想到需要在情节串联图板上花费大量时间来排列对象/视图。然而，在亲身经历了一些困难，并看到我的学生们制作的混乱的“意大利面条”式布局后，我决定花点时间提出一些基本原则，遵循这些原则可以避免混乱和纠缠。像我一样缩小视图，然后在你遵循我制定的三个规程时，相应地移动你的对象：\n\
    \n*   **互斥性（Mutual Exclusivity）**：我已经提到了第一个技巧，即保持按钮的顺序与视图的顺序互斥。导航控制器上的按钮顺序是 Male、Female\
    \ 和 Geek。在情节串联图板上保持这个顺序会产生问题，因为这将违反我下面将要提到的一些原则。\n*   **保持初始方向（Maintain Initial\
    \ Momentum）**：例如，在[图 7-31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos543678)底部的\
    \ Woman 视图上，如果有 10 条转场呈扇形指向 10 个视图，而这些视图都没有指向 Geek 分支的转场，那么就让这些基于 Woman 的转场保持向下延伸。\n\
    \    *   查看[图 7-32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos546469)，可以看出一个完美的反面例子，展示了如何不保持初始方向。不仅转场连接被隐藏了，而且它们还相互重叠，干扰了追踪转场起点和终点的能力。\n\
    *   **最小化转场连接角度（Minimize Segue Connection Angles）**：这个原则通过直观的观察更容易解释：查看[图 7-31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos543678)中从导航控制器到\
    \ Male 和 Female 的转场连接。注意它们是如何先向后倾斜再向前倾斜的，相比之下，[图 7-32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos546469)及之后图中从导航控制器连接到相同两个\
    \ Male 和 Female 视图的角度则更小。遵循此规程的一个简单方法是，一旦转场连接好，就水平或垂直移动它所连接的对象，直到转场连接几乎完全水平或垂直。\n\
    \n![images](images/00257.jpg)\n\n图 7-32. 哦！违反了“保持初始方向”规程的第二条原则。\n\n32. 你真的需要小心放置对象的方式，因为\
    \ GUI 可能会使事情看起来非常奇怪，如[图 7-32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos546469)所示，该图演示了违反“保持初始方向”规程的情况。但是，请注意，因为你将\
    \ Male 和 Female 分别移到了顶部和底部，所以可以看到你已遵守了最小化转场连接角度的规程。\n\n![images](images/00258.jpg)\n\
    \n图 7-33. 向前移动 Geek 对象。\n\n33. 为了同时遵守“保持初始方向”和“最小化转场连接角度”这两个规程，将 Geek 对象向前移动，如图\
    \ 7-33 所示。一旦 Geek 对象被向前移动，你就将遵守所有这三个规程。"
  raw: "26\\. As shown in [Figure 7–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos539203),\
    \ add a new `UIButtonView` to the view. You can use each button's activation to\
    \ move to another view. You can either drag three buttons, by repeating the process\
    \ three times, or practice using the option-drag technique you tried once already.\
    \ So, option-drag from the first button you have placed and duplicate it twice,\
    \ as you need three, and these will now only need relabeling. Name these buttons\
    \ “Male,” “Female,” and “Geek,” in descending order, and resize them as you see\
    \ fit.\n\n![images](images/00252.jpg)\n\nFigure 7–27\\. Create more segues from\
    \ each button to the three view controllers.\n\n27\\. You need to create segues\
    \ from each of your three buttons to their associated view controllers. So, just\
    \ as before, control-drag from each button to another view controller in order\
    \ to create a seguelink for each button. I connected “Male” to the top, “Female”\
    \ to the bottom, and “Geek” to the center, as it will make the link lines look\
    \ nice and organized. This is illustrated in [Figure 7–27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos540165).\n\
    \n![images](images/00253.jpg)\n\nFigure 7–28\\. Connect to `performSegueWithIdentifier:sender:`.\n\
    \n28\\. Just as you did in 7–15, when you drop the control drag from the Male\
    \ button to the Male view controller, you will get an option to select either\
    \ modal, push, or custom, where you will leave it as the default, or you will\
    \ see an option for `performSegueWithIdentifier:sender:` that holds all the code\
    \ needed to connect these two items appropriately using storyboarding. This is\
    \ illustrated in [Figure 7–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos540991).\n\
    \n![images](images/00254.jpg)\n\nFigure 7–29\\. Completed segue going to Male\
    \ and segue to Geek in progress.\n\n29\\. [Figure 7–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos541833)\
    \ shows the completed segue that connects the Male button to the Male view controller.\
    \ Notice that I have placed the Geek's view controller in the middle, so that\
    \ you can extend beyond in a later stage of this app. This illustrates how you\
    \ may have one pattern or order for the user of your app, and another order of\
    \ view controllers on your storyboard. You will also find, I have no doubt, that\
    \ until you get a feel for how the segues show their visual connectivity, it will\
    \ take a while to make them look as elegant as those illustrated in [Figure 7–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos541833).\
    \ Don't get frustrated, it just takes a little practice to learn how far out to\
    \ place the view controllers and how to make sure your grid alignment has symmetry\
    \ between all the objects.\n\n![images](images/00255.jpg)\n\nFigure 7–30\\. Last\
    \ segue, from the Female's button to its view controller.\n\n30\\. OK, for this\
    \ last connection, all I will say is that you should create a segue from your\
    \ Female button to its view controller. [Figure 7–30](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos543035)\
    \ shows the first portion of this step, but there are steps I am not repeating.\n\
    \n![images](images/00256.jpg)\n\nFigure 7–31\\. Zoom out and arrange the views.\n\
    \n31\\. Initially, I did not think I would have to spend much time on arranging\
    \ the objects/views on the storyboard. However, after having some difficulty myself,\
    \ and then seeing the wonderful spaghetti messes that some of my students came\
    \ up with, I've decided to spend a little time coming up with some basic principles,\
    \ that if adhered to will prevent a chaotic and tangled mess. Zoom out, as I have,\
    \ and then move your objects around accordingly as you follow the three protocols\
    \ I've developed:\n\n*   Mutual Exclusivity: I've already mentioned the first\
    \ tip, which is to keep the order of your buttons mutually exclusive from the\
    \ order of your views. The buttons on the Navigation Controller go Male, Female,\
    \ and then Geek. Maintaining that order on the storyboard would create problems,\
    \ as it would violate some of the principles I will mention below.\n*   Maintain\
    \ Initial Momentum: If, for example, on the Woman view, at the bottom of [Figure\
    \ 7–31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos543678), you have\
    \ a fan of 10 segues to 10 views that were all void of segues to the Geek branch,\
    \ then keep those Woman-based segues going downward.\n    *   Looking at [Figure\
    \ 7–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos546469), one can\
    \ see a perfect example of how NOT to maintain initial momentum. Not only are\
    \ the segue connections hidden, but they also overlap and disrupt the ability\
    \ to follow where the segues start and end.\n*   Minimize Segue Connection Angles:\
    \ This is easier explained when first seeing it visually: look at the Male and\
    \ Female segue connections from the Navigation Controller in [Figure 7–31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos543678).\
    \ Notice how they first slope back and then slope forward, as compared to the\
    \ less angular connections from the Navigation Controller to the same two Male\
    \ and Female views depicted in [Figure 7–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos546469)\
    \ and onward. An easy way to adhere to this protocol is, once segue is connected,\
    \ to move the object it is connected to horizontally and vertically, until the\
    \ segue connection is almost perfectly horizontal or vertical.\n\n![images](images/00257.jpg)\n\
    \nFigure 7–32\\. Oops! Violation of the second principle of “maintaining initial\
    \ momentum” protocol.\n\n32\\. You really need to be careful how you place your\
    \ objects because the GUI can make things look very odd, as illustrated in [Figure\
    \ 7–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos546469), whichdemonstrates\
    \ a violation of the protocol of “maintaining initial momentum. “However, note\
    \ that because you moved the Male and Female to the top and bottom, respectively,\
    \ you can see that you have adhered to the protocol of minimizing segue connection\
    \ angles.\n\n![images](images/00258.jpg)\n\nFigure 7–33\\. Move Geeks forward.\n\
    \n33\\. In order to comply with both the “maintain initial momentum” and the “minimize\
    \ segue connection angles” protocols, move the Geeks object forward, as shown\
    \ in [Figure 7–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos547317).\
    \ Once the Geeks object is moved forward, you will be in adherence to all three\
    \ protocols."
