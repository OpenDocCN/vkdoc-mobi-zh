    [Figure 7–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos521508) 中进行了说明。


    ![images](images/00236.jpg)


    **Figure 7–11.** 打开工具面板并选择`mystory.png`。


    11. 从工具面板的属性检查器中`UIImageView`的设置中，将图像设置为`mystory.png`，如图 [Figure 7–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos522329)
    所示。


    ![images](images/00237.jpg)


    **Figure 7–12.** 将一个`UIButtonView`拖到主视图控制器上，以便有一个可操作的项目来将下一个视图控制器推入堆栈。


    12. 如图 [Figure 7–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos522937)
    所示，你需要在主视图控制器上有一个按钮，因此将圆角矩形按钮（`UIButtonView`）拖到上面，以便有一个可操作的项目供用户按下，从而将下一个视图控制器推入堆栈。


    ![images](images/00238.jpg)


    **Figure 7–13.** 在按钮中插入文本；我使用了“Show Navigation Controller”。


    13. 当用户按下第一个按钮时，你希望它带用户前往导航控制器。让我们告诉用户，如果他们按下这个按钮，将会发生这种情况。这在 [Figure 7–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos523714)
    中进行了说明。


    ![images](images/00239.jpg)


    **Figure 7–14.** 开始实际的链接。


    14. 这一步实际上是故事板的核心。让我们想想这个问题：你希望用户按下标有“Show Navigation Controller”的按钮时，被导向导航控制器。与其编写代码，不如直接将按钮链接到导航控制器。为此，将鼠标悬停在按钮上，然后按住
    Control 键并拖拽到导航控制器上释放，以创建一个过渡链接。这就是神奇之处——无需编写代码即可实现带动画的过渡，如图 [Figure 7–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos524346)
    所示。这是完全免费的！这是苹果公司极其聪明的员工们——如果你不介意我再次提醒你，其中包括本书第一版的读者和学生——所编写的礼物！所以坚持住！


    ![images](images/00240.jpg)


    **Figure 7–15.** 选择“`performSegueWithIdentifier:` ”选项。


    15. 将连接器放到导航控制器上后，会出现`performSegueWithIdentifier:sender`选项，这是方法的名称，它包含了使用故事板正确连接这两个项目所需的所有代码。你可能会注意到，我在“深入代码”部分还添加了一节，描述了如何以编程方式添加`performSegueWithIdentifier:sender`方法。另一方面，如果你没有看到这个选项，请转到步骤
    16。


    > **注意：** 你不能通过从`UIView`或基本视图控制器上按住 Control 键拖拽来创建 Segue。你需要一个可操作的项目来创建 Segue，而`UIButtonView`是一个易于使用的工具。


    ![images](images/00241.jpg)


    **Figure 7–16.** 将根视图控制器的标题栏重命名为更好的名称，例如“Root”。


    16. 你现在要将根视图控制器的标题改为有用的名称。我建议使用“Root”，因为在使用应用时，你不需要关心模型-视图-控制器（MVC）的方面。这个标签也是免费命名导航按钮的一个组成部分，你将在运行应用时看到这些按钮。这在
    [Figure 7–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos526797) 中进行了说明。命名这些标题栏对于用户理解他们在程序中的位置以及他们如何到达那里非常重要。双击标题栏，或在属性面板的“标题”部分输入内容，可以编辑该值。当用户通过导航控制器来回移动时，这些标签会出现在标题和“返回”按钮中。稍后当你测试应用功能时，就会看到这一点。


    ![images](images/00242.jpg)


    **Figure 7–17.** 第一阶段几乎完成——你只需要为 Segues 和转场设置样式，然后进行一次测试运行。


    17. 在继续前进之前，停下来喘口气。你已经成功地为这个故事板应用奠定了基础，也为许多其他应用所使用的方法学奠定了基础，即一个连接到你的根导航控制器的视图控制器。本质上，你已经创建了一个带按钮的视图控制器，该按钮带你到一个你命名为“Root”的导航控制器，如图
    [Figure 7–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos528038) 所示。你故事板的其余部分将从这个根节点发展开来。现在，你将看到
    Segue 样式、转场样式，并且将在接下来的三个步骤中进行一次测试运行。一旦你到达步骤 20，你将被要求返回并运行这前 20 个步骤。


    ![images](images/00243.jpg)


    **Figure 7–18.** 选择你刚刚创建的 Segue，并选择一种 Segue 样式。'
  raw: '8\. As you drag the Navigation Controller onto the storyboard, you will see
    that instead of just a single view, you get a connected pair of controllers that
    are depicted as views. Drop it any place, as you are free to move it around as
    much as you need. This is, in fact, the case for almost everything that you will
    do in storyboards. You are not dealing just with views, you are actually seeing
    Apple instantiate each `UI` element into a set of views and controllers that allow
    you to build transitions. These transitions in Xcode are called segues (pronounced
    seg-ways), as shown in [Figure 7–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos519022).


    NOTE: A Segue (segway) is often articulated in music and performing arts realms
    when the musicians move without interruption from one song, melody, or scene to
    another. We want a smooth transition from one scene to another.


    ![images](images/00234.jpg)


    Figure 7–9\. Keep this first Navigation Controller as a simple view controller.


    9\. You''re going to leave this first Navigation Controller alone for a now. The
    reason is that this is the first view that the user will see, and all you want
    to happen here is to have access to the code Apple has provided for the logic
    associated to the blue navigation bar at the top of the view. Strictly speaking,
    the Root View Controller on the right is actually the first view that your user
    will see, as the Navigation Controller is pushed to the view stack. But for now,
    just arrange the controllers in an orderly fashion.


    ![images](images/00235.jpg)


    Figure 7–10\. Drag a `UIImageView` to your first view controller.


    10\. In the app you will not have code in each state, as already mentioned; instead,
    you will have images, either made or, preferably, downloaded from my site. By
    now you know that images need to be parked in `UIImageViews`. So drag a `UIImageView`
    to your first view controller, so that you can place the `mystory.png` onto it.
    This is illustrated in [Figure 7–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos521508).


    ![images](images/00236.jpg)


    Figure 7–11\. Open the Utilities Panel and select the `mystory.png`.


    11\. From the `UIImageView`''s settings in the Attributes Inspector found in the
    Utilities Panel, set the image to `mystory.png`, as illustrated in [Figure 7–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos522329).


    ![images](images/00237.jpg)


    Figure 7–12\. Drag a `UIButtonView` out to the main view controller so that you
    can have an actionable item in order to push the next view controller to the stack.


    12\. As shown in [Figure 7–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos522937),
    you need to have a button on your main view controller, so drag a Round Rect Button
    (`UIButtonView`) onto it, so that you can have an actionable item to press, which
    will push the next view controller to the stack.


    ![images](images/00238.jpg)


    Figure 7–13\. Insert text into your button; I used “Show Navigation Controller.”


    13\. When the user presses this first button, you want it to take the user to
    the navigation controller. Let''s tell the user this will happen if they press
    this button. This is illustrated in [Figure 7–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos523714).


    ![images](images/00239.jpg)


    Figure 7–14\. Start the actual linking.


    14\. This step is really the heart of storyboarding. Let''s think about this.
    You want your user to be directed to the navigation controller when he or she
    presses the button saying “Show Navigation Controller.” Rather than writing code,
    just link the button to the navigation controller. To do so, place your mouse
    over the button, and then control-drag and release over the Navigation Controller
    to create a transitional link. This is the magic—no code is written to make this
    transition with animation, as shown in [Figure 7–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos524346).
    It''s just free! A gift that was written by the remarkably clever people at Apple
    that—if you don''t mind me reminding you again—includes students and readers of
    the first edition of this book! So hang in there!


    ![images](images/00240.jpg)


    Figure 7–15\. Select the “`performSegueWithIdentifier:` ” option.


    15\. Upon dropping the connector onto the navigation controller, it comes up with
    the option `performSegueWithIdentifier:sender`:, which is the name of the method
    that holds all the code you need for connecting these two items appropriately
    using storyboarding. You may note that I have also added a section in Digging
    the Code that describes how to add the `performSegueWithIdentifier:sender` method
    programmatically. On the other hand, if you do not see this option, go to step
    16.


    NOTE: You cannot create a segue by control-dragging from a `UIView` or the basic
    View Controller. You need an actionable item to create a segue, and the `UIButtonView`
    is an easy one to use.


    ![images](images/00241.jpg)


    Figure 7–16\. Rename the Root View Controller''s title bar to something a little
    better, such as “Root”.


    16\. You are now going to change the title of the Root View Controller to something
    useful. I suggest “Root” because youdon''t need to care about the aspect of the
    Model View Controller (MVC) when using the app. This label is also an integral
    part of the free naming of navigation buttons that you''ll see when you run the
    app. This is illustrated in [Figure 7–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos526797).
    Naming these title bars is important for the user to understand where they are
    in your program, and how they got there. Double clicking the title bar, or typing
    in the Title section of the Attributes Panel, allows you to edit this value. When
    the user travels back and forth through a Navigation Controller, these labels
    appear in the title and the “back" button. You''ll see this shortly when you test
    the app for functionality.


    ![images](images/00242.jpg)


    Figure 7–17\. Phase 1 is almost completed—you just need styles for segues and
    transitions, and then a test run.


    17\. Before moving too far ahead, stop for a minute and catch your breath. You
    have successfully created the foundation not only for this storyboard app, but
    also for the methodology that you will use as the basis for many other apps, which
    is a view controller connected to your Root Navigation Controller. Essentially,
    you have created a view controller with a button that takes you to a navigation
    controller you have named “Root,” as shown in [Figure 7–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos528038).
    The rest of your storyboard will blossom out from this root. Now, however, you
    will see segue styles, transition styles, and you will do a test run over the
    next three steps. Once you reach step 20, you will be asked to go back and run
    these first twenty steps.


    ![images](images/00243.jpg)


    Figure 7–18\. Select the segueyou have just created and select a segue style.'
