    ### 关于框架的一点介绍


    当史蒂夫·乔布斯被苹果公司解雇后，他创立了一家名为 NeXT 的公司。在 90 年代初期，他的公司生产了造型优美、线条流畅的黑色电脑，让我羡慕得直流口水。我的几位教授拥有一台
    NeXT 电脑，我深知其强大功能。这家公司最深远的影响，并非他们生产了这些黑色流线型机箱，而是他们使用了一种名为 Objective–C 的语言。乔布斯发现，尽管用这种复杂的语言编程很困难，但它生成的代码能够非常优雅地与微处理器“对话”。那么，这与
    MapKit 有什么关系呢？


    NeXT 所做的是创建了由复杂 Objective–C 代码构成的框架，我们可以将其视为木匠工具箱中的工具。当我们使用 `MapKit` 时，就是在将一套与地图相关的工具引入我们自己的代码中——就像木匠可能有一套用于橱柜制作的工具，以及另一套专门用于制作精美家具的工具。这些专门的工具与屋顶木匠所用的工具会有很大不同。


    为此，我们将把两个之前没用过的框架引入 `Xcode`。这就好比我们在第 1 章到第 8 章中，一直以地板和橱柜木匠的身份学习技巧；但今天，我们要去五金店为下一个项目——在墙壁和天花板中安装音视频设备——购置装备。因此，在继续下一个程序之前，我们必须先去购买两个全新的工具。其中一个新工具是
    `CoreLocation` 框架，它能显示我们在地理上的位置。另一个工具是 `MapKit`，它能让我们以多种不同方式与地图进行交互。


    众所周知，用户与 iPad 和 iPhone 交互的方式，与以往任何设备都完全不同。在这些精巧设备问世之前，99% 的计算机交互都基于鼠标和键盘。从我们已经编程完成的示例中，我们在学习使用独特的方法和类来切换屏幕，并感知用户何时在屏幕上捏合、点击或滚动。现在，我们将在这个已经很强大的工具集中加入
    `CoreLocation` 和 `MapKit` 框架。


    到目前为止，我们探讨的大部分编程都相对透明。然而，在本章中，情况不会那么显而易见了。我们必须高度集中注意力，才能跟上并理解 `MapKit` 是如何知道我们在地图上的位置的。我们将探究它如何追踪我们的手指交互，以及它如何根据与地图相关的各个屏幕和视图来确定我们的位置。


    iPad/iPhone 应用开发的核心领域之一是事件处理。由于这部分内容让我的许多学生感到困惑，因此我会刻意尽力让大家将注意力集中在我们需要了解的内容上。如果我们牢固掌握了框架和类的概念，就不会因为过度关注事件处理而感到困扰。我们可以通过这一点来了解这个主题的规模：当应用的一部分负责追踪与地图和
    GPS 卫星的交互时，另一部分代码则必须时刻关注用户何时会将程序引导至一个新事件。


    ### 重要须知


    关于 iPad 和 iPhone 领域中 Storyboard 及地图相关应用的基础，有三件重要的事情需要了解。第 9 章和第 10 章中的这两个关键应用依赖于四个重要工具：Storyboarding、`MapKit`、`CoreLocation`
    和 `MKAnnotationView` 类参考。正如我已经指出的，我们不会过多涉足这些复杂工具的工作原理，而是要实践决定何时在我们新扩大的工具箱中取用哪种工具的艺术。


    除了其他功能，这些工具使我们能够利用 Storyboarding 轻松创造优美的技术流程，在我们的应用中显示地图，使用注释，处理地理编码（涉及经度和纬度），并通过
    `CoreLocation` 与我们的位置进行交互。


    当我们要轻松地与谷歌地图交互时，我们将使用苹果提供的 `MapKit` 框架。当我们要获取位置或使用 GPS 卫星技术（配合谷歌地图）做酷炫的事情时，我们将使用
    `CoreLocation` 框架。当我们要将所有功能整合到一起，并与用户无缝集成时，我们将把上述所有技术放到 Storyboarding 上。最后，当我们要在地图上放置大头针、创建引用、绘制
    V 形标记，或者插入一张显示我们狗狗在地图上位置的照片时——我们将这些称为注释，因此需要使用 `MKAnnotationView`。


    ### 预装的 MapKit 应用


    为了充分利用本章提出的新概念，并为拓展至全新的创意水平做好准备，我们首先来浏览一下 iPad 和 iPhone 上预装的现有应用。熟悉这些应用很重要，这样我们就能更容易地为自己创建的应用添加各种提示和附加功能——这些功能是在
    `Apple.com` 上描述的那些现成“地图应用”之上的。


    #### 找到自己


    假设我们在一个不熟悉的街区寻找附近的餐馆。使用 iPhone，我们可以在地图上精确定位自己的位置，从而找出从当前位置到目的地的路线。iPhone 4 结合
    GPS、Wi-Fi 和蜂窝基站，能够快速准确地找到我们的位置。当我们移动时，iPhone 会自动更新我们的位置。到达目的地后，我们可以放下一个大头针来标记我们的位置，并通过电子邮件或彩信与他人分享。


    > ![images](img/00353.jpg)


    *图 9–1\. 找到自己——iPhone/iPad 上强大的缩放地图功能。*


    #### 搜索位置


    我们需要一杯浓缩咖啡。最近的咖啡馆在哪里？搭载了 `MapKit` 框架的 iPhone 知道答案。只需在“地图”应用的搜索栏中输入“咖啡”，附近的咖啡馆就会立刻出现在地图上；全部用大头针表示。搜索功能同样适用于特定地址和商家名称。当我们找到目标时，点击大头针即可获取更多信息，例如电话号码、网址等。“大头针”会提取我们在
    `MKAnnotationView` 中编程设定的所有注释信息。


    ![images](img/00354.jpg)


    *图 9–2\. 搜索位置——将此功能与视觉地图（带高亮路线）结合使用，或作为其替代方案。*

