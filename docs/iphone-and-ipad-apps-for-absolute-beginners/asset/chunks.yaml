    ### 这一切是如何运作的？


    在第 2 章开始我们的第一个程序之前，至关重要的是你能退一步，了解我们之前的位置、现在的位置以及下一步的方向。换句话说，你可能会问自己：如何将我针对 iPhone
    或 iPad 应用的创新想法转化为口袋里的钱？这是如何运作的？它真的有效吗，还是那些靠 iPhone 和 iPad 应用赚得盆满钵满的疯狂故事都是假的？


    那么，这些“应用变财富”的故事是真的吗？这很容易回答。截至 2011 年 3 月 2 日，当史蒂夫·乔布斯发布 iPad 2 时，他宣布苹果已累计向开发者支付了
    20 亿美元，用于在 App Store 中销售的应用（参见图 1–23, #9）。请注意，仅在八个月前，苹果曾宣布自 2008 年 7 月 App Store
    推出以来，已向 iPhone 和 iPad 应用开发者支付了 10 亿美元。


    从未有过如此巨额的 20 亿美元支付给程序员。你正步入计算机与技术领域一个蓬勃发展的史诗级事件。阅读本书并学习如何编写应用将改变你的人生。在这个后 PC 时代的新纪元，苹果独自创造了一个前所未有的环境，让开发者能够充分利用这些更个性化、更强大的机器。你即将加入的这个充满活力的程序员社区，已帮助苹果的应用数量突破了
    35 万。但你可能仍会问：这到底是如何运作的？


    我绘制了一张创新流程的地图，你需要理解它，才能清楚本书将带你走向何方。请看图 1–21，我希望你首先看看……呃……你！是的，那就是你，在#1 的位置，坐在#11
    所代表的一袋钱旁边，这是 12 个步骤中的第 11 步。从#1 开始，也就是你带着绝妙的创新想法，将你的想法带到#2，#2 代表你 Mac 上的 OSX。打开
    Mac 后，你便访问了 SDK (#3)，它包含了 iPhone/iPad 模拟器 (#4)、界面构建器 (#5) 和 Xcode (#6)，所有这些都位于代表
    iOS SDK 一部分的灰色条带上。这些项目 (#4 到#6) 将在后面详细解释；本书 90%的内容都与这个条带上的项目有关。这里唯一没有涉及的是如何通过使用
    Objective-C 编程将你的想法转化为代码。


    ![images](img/00029.jpg)


    **图 1–21.** iPhone 和 iPad 应用编程全景图


    **注意：** 在图 1–21 中，灰色框内包含界面构建器 (#5)，从技术上讲，它本不应存在于这些最新版本的 Xcode 中。问题是它仍然存在，只是隐藏在后台，而且我们在故事板（第
    7 章及以后）中仍在广泛使用它。所以，要知道有人会说界面构建器已经消失了（他们错了），我们也不再用它了（又错了。我们在第 7 章之后仍然在使用）。这个区域的左边是你已经走过的路：请记住，你有一台
    2006 年后购买的、运行 Mac OS X 10.7.2 或更高版本的 Mac，并且我们刚刚完成了下载 iPhone 和 iPad SDK (#3) 的过程（图
    1–6 至 1–20）。我们还将 iPhone/iPad 模拟器 (#4)、界面构建器 (#5) 和 Xcode (#6) 提取出来，并放置到了你的程序坞中（图
    1–12）。


    在第 2 章中，我们将开始使用 Xcode (#6)、界面构建器 (#5) 和 iPhone/iPad 模拟器，将你变成一个货真价实的极客！在这种极客状态下，你将能够在真实的
    iPad (#7) 和真实的 iPhone (#8) 上测试你的应用。一旦你确认你的代码运行得非常棒（这是我创造的极客用语），你就会将应用上传到 App Store
    (#9)，在那里，有钱的人 (#10) 会通过向 App Store 付费来下载你的应用。App Store 收到的款项会被分成两部分，其中三分之二归你，三分之一归苹果。


    我们将运行创建的所有程序，将它们编译到一个或多个可能的位置——这些位置的图标位于中央灰色区域的右侧。主要位置将是 iPhone/iPad 模拟器。次要位置将是你的本地
    iPhone 和/或本地 iPad。最后，我们可以使用`iTunes`将你的 iPhone 和/或 iPad 应用上传到 App Store，供人们购买或免费下载。这就是我们的目标。


    图 1–21 中的两个核心对象，正如你现在所知，将是我们在本书中花费绝大部分时间的地方。我们将使用 Xcode 来输入代码，就像真正的极客那样。我会教你如何操控它的所有功能，例如文件管理、编译、调试和错误报告。界面构建器是苹果提供的一种很酷的方式，允许我们将对象拖放到我们的
    iPhone/iPad 应用中。例如，如果你想要一个按钮，只需简单地将它拖放到虚拟 iPhone 或 iPad 上你希望它出现的位置。


    本质上，我们将使用 Xcode 来管理、编写、运行和调试你的应用——以创建内容和功能。我们将使用界面构建器将项目拖放到你的界面上，直到它看起来像你构想中的那个色彩鲜艳且炫酷的应用——赋予它符合你艺术审美的样式、外观和感觉。


    当我们把所有界面组件与在 Xcode 中编写的代码整合之后，我们可能会进一步操作，调整与内存管理和效率相关的参数。但这在我们的故事中跳得太远了。


    ### 我们的路线图：使用 Xcode 和界面构建器


    很多时候，编程书籍的作者都会做同样老套的事情。首先，他们呈现一个非常简单的、随处可见的“Hello World”应用，然后立刻用密集的代码“轰炸”用户，导致大量读者和学生直接放弃。在使用
    Objective-C（在 Cocoa 中运行）以及 iPhone 和 iPad SDK 的过程中，我不得不真正重新思考这个入门过程。我在这里确定了四个挑战：


    *   教你“Hello World”，然后马上进入高级技术和 API 会适得其反。

    *   从众多在 iPhone 或 iPad 上向世界说 Hello 的方式中随机选择一种是没有意义的。它们之后都将是你工具箱中必需的工具。

    *   试图用 Objective-C 编写一个简单的“Hello World”应用，对初学者来说过于复杂，除非我们将这个过程分解为多个阶段或层次。

    *   决定如何循序渐进，让你感到舒适，熟悉术语和流程，然后再进入故事板及其他更高级的概念。


    我解决这些问题的方法很简单。我会向你展示如何从你的 iPhone/iPad 上，不是以一种、两种，而是以相当多的不同方式向世界说 Hello。每一次，我们都会更深入一点，而且我们会在这个过程中玩得很开心。


    每当你踏上通往 Xcode 世界的道路时，你都会被立即问到想驾驶哪种类型的车辆。一辆吉普车？一辆赛车？一辆敞篷车？通过专注于基础知识，我将向你展示如何在 Xcode
    中“驾驶”。此处的目标是，无论我们使用何种风格的“车辆”，都能获得胜任感和自信心。那么，让我们来看看这些不同的“车辆”究竟能提供些什么。在这里，我希望你跟着我一起看。

    '
- fmt: '# Getting Ready For Your First iPhone/iPad Project


    Assuming that you have already downloaded the SDK and installed Interface Builder,
    `Xcode`, and the iPhone/iPad Simulator, open up your Mac and click the `Xcode`
    icon on your dock. Your screen should look similar to [Figure 1–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos108269).
    Up pops the Welcome to Xcode window; it includes all of your iPhone and iPad resources.


    ![images](images/00030.jpg)


    Figure 1–22\. After clicking the `Xcode` icon, you will see the “Welcome to Xcode”
    screen.


    As indicated by arrow 1, make sure you keep the “Show this window when Xcode launches”
    option checked. You''ll find many valuable resources here that will come in handy.
    I suggest that, after you have completed [Chapter 4](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_016.html#filepos245269),
    you take a little time to explore these resources—give them a test drive, so to
    speak. This practice will open all kinds of creative doors for you.


    Without actually starting a new project, let’s walk up to the showroom floor and
    check out some of the models we might be driving. To open a new project in Xcode,
    click on the `Xcode` icon. When it opens, you can do one of two things: either
    click on the number 2 and then number 3 arrows as indicated on [Figure 1–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos108269),
    or enter `Command + Shift + N` (![Images](images/00031.jpg)![Images](images/00032.jpg)
    N), simultaneously. This will open a new window that showcases the different types
    of vehicles that you can drive in the land of Xcode.


    ![images](images/00033.jpg)


    Figure 1–23\. The new window that showcases the different types of vehicles that
    you can drive in the land of Xcode.


    [Figure 1–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos109760) displays
    the seven vehicle models: Master-Detail Application, OpenGL Game, Page-Based Application,
    Single View Application, Tabbed Application, Utility Application and Empty Application.


    Early on, most of our travel in Xcode will be by one of the latter two styles
    shown. Switching back to computer terms, View-based Application and Window-based
    Application are the structures that we will utilize in the basic development cycle
    for the iPhone/iPad. It is here that we will access cool gadgets and components.


    Don’t worry: I haven’t forgotten our goal of creating a simple “Hello World” application.
    We will say hello to the world while using a number of the six options, and you
    will become familiar with each. Before we drive our car, let''s make sure the
    key works in the ignition—or in computer land, let''s check that the iOS compiles
    a blank document and brings up the iPhone/iPad Simulator. Click on Single View
    Application, as shown in [Figure 1–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos109760).
    Looking at your screen, you should see something very similar to that of [Figure
    1–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos111699). First call
    it “test,” as indicated by arrow 1, then make sure you select iPhone as depicted
    by arrow 2, and then click on the “Next” button as indicated by arrow 3.


    ![images](images/00034.jpg)


    Figure 1–24\. Let’s go for a test drive.


    If your program does not default to saving it onto your Desktop, then navigate
    your way to your Desktop and the click on the “Create” button, as illustrated
    in [Figure 1–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos112251).


    ![images](images/00035.jpg)


    Figure 1–25\. Navigate to your Desktop and create your test app.


    ![images](images/00036.jpg)


    Figure 1–26\. The initial Integrated Development Environment (IDE) screen.


    [Figure 1–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos112521) shows
    the initial view of Xcode 4’s integrated development environment (IDE). We will
    not get tangled up in explaining everything right now. All I want you to do is
    to click on any of the files that end with an “`.h`” or an “`.m`”. Now click on
    the `testViewController.h` file, as indicated by the arrow in [Figure 1–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos112521).
    This will bring up the screen shown in [Figure 1–27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos113782),
    where I want you to run your blank app by clicking on the “go” button as indicated
    by the arrow. Oh Yeah! The iPhone in the iPhone/iPad Simulator pops up, as illustrated
    in [Figure 1–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos114009).
    Congratulations! You''ve loaded Xcode and you''ve taken it for a test drive. It''s
    time to realize that you''re just about to embark into a whole new world.


    ![images](images/00037.jpg)


    Figure 1–27\. Run it!


    ![images](images/00038.jpg)


    Figure 1–28\. Your first test-drive.


    ## The Accompanying Screencasts


    All figures shown in this book have been captured from my screen as I write the
    code—in a screencast. For example, the `helloWorld_001` example in [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161)
    is located at [`www.rorylewis.com/docs/02_iPad_iPhone/06_iphone_Movies/002_helloWorld_002.htm`](http://www.rorylewis.com/docs/02_iPad_iPhone/06_iphone_Movies/002_helloWorld_002.htm)
    or `bit.ly/quO4ow`.


    It is not necessary to view the aforementioned screencast, since I have included
    all the instructions in [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161).
    However, I’ve heard students say that it’s fun to retrace what they heard in the
    lesson. These video examples tend to be rather condensed. If you would like to
    follow along with the screencasts, please note these recommendations:


    - Stop the video when I get ahead of you. Rewind it and get back on track with
    me.

    - After you can complete the project in full, save the screencast to another folder.
    Then, go through it again with fewer stops until you can master it… and compile
    it.

    - For the competitive among you, perhaps a goal is to execute the code in time
    with me as I go. Generally, though, I want you to feel good and comfortable with
    programming at a high level. It would behoove you to practice this for all the
    examples in the book.


    ## The Accompanying PDFs


    I also provide a PDF version of the keynote slides that I give to my students
    at the University of Colorado. These PDFs—which are not required, but merely supplemental—show
    all the slides from this chapter. There are also links for those of you who want
    to probe deeper into subject matter that is not covered in this book.


    NOTE: You can access videos and supplementary materials at the [`www.apress.com`](http://www.apress.com)
    web site.


    ## Pretending Not to Know: The Art of De-Obfuscation


    Before we begin in earnest, I want to reiterate that I am going to show you how
    to program while knowing only the essentials. As we move forward, I will explain
    concepts a little deeper. However, I will only do this once we’ve gotten your
    head wrapped around the easy concepts. This is a new way of teaching, and I have
    had great success with it.


    You may think I’ve completely lost my mind, but I ask you to follow my instructions
    anyway. If you have a question that I don’t appear to address, trust me that it’s
    not important at the time. We will cover it down the road!'
