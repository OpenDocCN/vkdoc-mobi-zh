    ## Working in the Implementation File


    In this section, I will teach you how to go about the first two tasks; one needs
    to be performed immediately upon opening the implementation file. The first task
    is synthesis, which is typically only one line that you will code. Second is the
    `viewDidLoad` method that typically instantiates by itself; however, in more complex
    code, we need to add code into the `viewDidLoad` method, as we will today.


    ### Synthesis


    I have made a point to encourage students and readers to grow into the habit of
    always synthesizing in the implementation immediately after coding the `@property`
    directives in the header files. You may have noticed that both in [Chapter 4](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_016.html#filepos245269)
    and in this chapter, the last code I wrote in the header file was the `@property`
    directives for synthesis. This is because if you get into the habit of immediately
    performing synthesis on the items you just coded in the header file, you will
    not forget to do it at all—you won''t have to waste time going back and refreshing
    your memory as to what you were going to synthesize.


    We just performed `@synthesis` on `myIcon`, `myBackground`, `bgImages` and `shrinkButton`.
    This is what we need to synthesize first when we open up the header. What follows
    is how I think about it; this makes it very easy.


    ```

      @implementation touchesViewController

    @synthesize   items you just performed @properties on

    - (void)didReceiveMemoryWarning

    ...

    ...

    ...  

    ```


    Now, by plugging that idea into this application, we get


    ```

      @implementation touchesViewController

    @synthesize  myIcon, myBackground, bgImages, shrinkButton;

    - (void)didReceiveMemoryWarning

    ...

    ...

    ...

    ```


    ### viewDidLoad


    The code inside the `viewDidLoad` method runs after machine language code reserves
    some space in memory for your View. You will notice that the first thing called
    inside `viewDidLoad` is its superclass, `superviewDidLoad`. Now before you freak
    out, just as rats are a subclass of rodents, `viewDidLoad` is a subclass of `superviewDidLoad`,
    so the first thing Apple gets `viewDidLoad` to do is call all the code from its
    superclass. It''s here, at this exact moment of time, that we need to perform
    some tasks.


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

    Set all our button and backgrounds to the start state

    Create an array with all our wallpapers inside of it

    Set how much the shrink button will shrink the lulu fruit icon

    Set how much the move button will move the lulu fruit icon

    Set the background image to the current background image


    }

    ```'
