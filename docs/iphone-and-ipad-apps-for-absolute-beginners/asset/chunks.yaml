- fmt: '### Coding the Button


    You now need to code the button.


    ![images](images/00220.jpg)


    Figure 6–28. Let''s code the `goToApress` method.


    28. Open up your implementation file, as shown in [Figure 6–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos490660).
    You will see that Xcode has also created a method stub for you (the framework
    for the method, but with no actual code that does anything useful). Click in this
    method and enter the following single line of code:


    ```

    [[UIApplication sharedApplication] openURL:[NSURL URLWithString:@"http://apress.com"]];

    ```


    ![images](images/00221.jpg)


    Figure 6–29. Re-inspecting the code.


    29. When you think about it, it''s really amazing that a seemingly complex operation
    like opening Mobile Safari from within your own app could have been condensed
    into a single statement by the people at Apple. So let''s dissect the code you''ve
    just written, as shown in [Figure 6–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos491519).


    In iOS, all apps are sandboxed into their own little piece of the system''s resources.
    The topic of sandboxing is so complex that books can and have been written about
    the subject, so I won''t go into detail here. Instead, it''s sufficient to understand
    that iOS isn''t going to let your app just do whatever it wants, so you have to
    use certain APIs that Apple has provided to tell the underlying system to do these
    things on your behalf.


    In this case, send a message to the `UIApplication` class to obtain a reference
    to `sharedApplication`—that is, an object representing your application''s gateway
    to the rest of the system. This object has a method called `openURL`, which does
    exactly that when passed an instance of `NSURL`.


    In order to pass `openURL` an instance of `NSURL`, send the `NSURL` class the
    `URLWithString` message, which transparently converts the string you provide into
    an instance of `NSURL`.


    ### Using the Button


    It''s time to test out the button.


    ![images](images/00222.jpg)


    Figure 6–30. Run it!


    30. As shown in [Figure 6–30](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos493777),
    when you run the app and click the button saying "Apress Web Site," your app will
    call off to iOS and launch Mobile Safari, as shown in [Figure 6–31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos494344).


    ![images](images/00223.jpg)


    Figure 6–31. The apress.com website on your iPhone!


    31. Congratulations! You''ve successfully completed your sixth iPhone app! See
    [Figures 6–31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos494344)
    and [6–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos494865).


    ![images](images/00224.jpg)


    Figure 6–32. Your sixth iPhone app.


    ### Digging the Code


    In this chapter, you quickly flew by a few advanced topics in order to get through
    the app. Let''s take a step back from the code you''ve written and have a more
    in-depth look at some of these topics.


    - In Step 15, you set a Content View Mode to alter how your image would be scaled
    and cropped to fit in the `UIImageView`. Take a look at what this means, and how
    each of the options differ from one another.

    - In Step 24, I mentioned the difference between compile-time and runtime. For
    the purposes of writing the app, it was sufficient to know that the distinction
    led to two different ways of evoking the same resulting behavior. Here, I''ll
    diverge into the philosophy of code and talk about why you might want to use one
    strategy over another in a given situation.


    #### Content View Modes


    In Step 15, you loaded an image into a `UIImageView`. If you used the images from
    the companion web site, the image was mostly the right size (it was exactly the
    same size as the full iPhone screen). Since the tab bar took up some of the available
    screen space, the space available for the `UIImageView` was a little shorter than
    your image. Xcode initially squished the image to make it fit. This view mode
    (the default) is called "Scale To Fill" (`UIViewContentModeScaleToFill`) because
    it scales the image in both X and Y directions to fill the content frame.


    Unless your images are exactly the same size as your `UIImageView`, this will
    result in distortion. This might be tolerable if you are loading images that you
    have created directly into your interfaces (either in Interface Builder or via
    the `viewDidLoad` method), but that limits what your app can do. On the other
    hand, if you will be loading an image of unknown or unrestricted dimensions, some
    of the other view modes will be more appropriate. Have a look at [Figure 6–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos497772)
    for a list of the available view modes.


    ![images](images/00225.jpg)


    Figure 6–33. Xcode''s UIImageView Content View Modes.


    Starting at the top of the list in [Figure 6–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos497772),
    following Scale To Fill, Aspect Fit and Aspect Fill (`UIViewContentModeScaleAspectFit`
    and `UIViewContentModeScaleAspectFill`, respectively) will probably be the most
    useful to you.


    - **Aspect Fit.** This scales the content, maintaining aspect ratio, until the
    largest dimension is equal to the corresponding dimension of the image view. Thus,
    if you have a `UIImageView` similar to the one in this chapter''s app and a photo
    that was taken in landscape orientation, the image will be scaled so that the
    entire image is visible and empty space will appear above and below the photo
    in the interface.

    - **Aspect Fill.** This scales the image until the other dimension fills the available
    space. This results in the entire view being filled with your image, at the expense
    of trimming off some of the image. Using the same example, this would cause the
    left and right edges of your photo to be trimmed.


    The nine view modes at the bottom of the list (Center through Bottom Right) do
    no scaling at all on your image, and simply anchor the specified point in your
    image to the corresponding point in the content frame. For instance, choosing
    "Top Left" will cause the top left section of your image to be displayed so that
    the top edge is aligned with the top of the `UIImageView`, and the left edge is
    likewise aligned. Any extra image beyond the size of the content frame is cropped.
    In this app, you chose "Bottom" so that the bottom edges were aligned, and the
    extra portion of the image at the top was cut off.


    The "Redraw" view mode provides a way to customize how your content scales and
    is a far more advanced topic than this discussion.'
  raw: '#### Coding the Button


    You now need to code the button.


      ![images](images/00220.jpg)  


    Figure 6–28\. Let''s code the goToApress method.


    28\. Open up your implementation file, as shown in [Figure 6–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos490660).
    You will see that that Xcode has also created a method stub for you (the framework
    for the method, but with no actual code that does anything useful). Click in this
    method and enter the following single line of code:


      `[[UIApplicationsharedApplication] openURL:[NSURL`

    ![images](images/00188.jpg)`URLWithString:@"http://apress.com"]];`   ![images](images/00221.jpg)
     


    Figure 6–29\. Re-inspecting the code.


    29\. When you think about it, it''s really amazing that a seemingly complex operation
    like opening Mobile Safari from within your own app could have been condensed
    into a single statement by the people at Apple. So let''s dissect the code you''ve
    just written, as shown in [Figure 6–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos491519).


    In iOS, all apps are sandboxed into their own little piece of the system''s resources.
    The topic of sandboxing is so complex that books can and have been written about
    the subject, so I won''t go into detail here. Instead, it''s sufficient to understand
    that iOS isn''t going to let your app just do whatever it wants, so you have to
    use certain APIs that Apple has provided to tell the underlying system to do these
    things on your behalf.


    In this case, send a message to the `UIApplication` class to obtain a reference
    to `sharedApplication`—that is, an object representing your application''s gateway
    to the rest of the system. This object has a method called `openURL`, which does
    exactly that when passed an instance of `NSURL`.


    In order to pass `openURL` an instance of `NSURL`, send the `NSURL` class the
    `URLWithString` message, which transparently converts the string you provide into
    an instance of `NSURL`.


    #### Using the Button


    It''s time to test out the button.


      ![images](images/00222.jpg)  


    Figure 6–30\. Run it!


    30\. As shown in [Figure 6–30](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos493777),
    when you run the app and click the button saying “Apress Web Site,” your app will
    call off to iOS and launch Mobile Safari, as shown in [Figure 6–31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos494344).


      ![images](images/00223.jpg)  


    Figure 6–31\. The apress.com website on your iPhone!


    31\. Congratulations! You''ve successfully completed your sixth iPhone app! See
    [Figures 6–31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos494344)
    and [6–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos494865).


      ![images](images/00224.jpg)  


    Figure 6–32\. Your sixth iPhone app.


    ### Digging the Code


    In this chapter, you quickly flew by a few advanced topics in order to get through
    the app. Let''s take a step back from the code you''ve written and have a more
    in-depth look at some of these topics.


    *   In Step 15, you set a Content View Mode to alter how your image would be scaled
    and cropped to fit in the UIImageView. Take a look at what this means, and how
    each of the options differ from one another.

    *   In Step 24, I mentioned the difference between compile-time and runtime. For
    the purposes of writing the app, it was sufficient to know that the distinction
    led to two different ways of evoking the same resulting behavior. Here, I''ll
    diverge into the philosophy of code and talk about why you might want to use one
    strategy over another in a given situation.


    #### Content View Modes


    In Step 15, you loaded an image into a UIImageView. If you used the images from
    the companion web site, the image was mostly the right size (it was exactly the
    same size as the full iPhone screen). Since the tab bar took up some of the available
    screen space, the space available for the UIImageView was a little shorter than
    your image. Xcode initially squished the image to make it fit. This view mode
    (the default) is called “Scale To Fill” (`UIViewContentModeScaleToFill`) because
    it scales the image in both X and Y directions to fill the content frame.


    Unless your images are exactly the same size as your UIImageView, this will result
    in distortion. This might be tolerable if you are loading images that you have
    created directly into your interfaces (either in Interface Builder or via the
    `viewDidLoad` method), but that limits what your app can do. On the other hand,
    if you will be loading an image of unknown or unrestricted dimensions, some of
    the other view modes will be more appropriate. Have a look at [Figure 6–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos497772)
    for a list of the available view modes.


      ![images](images/00225.jpg)  


    Figure 6–33\. Xcode''s UIImageView Content View Modes.


    Starting at the top of the list in [Figure 6–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_021.html#filepos497772),
    following Scale To Fill, Aspect Fit and Aspect Fill (`UIViewContentModeScaleAspectFit`
    and `UIViewContentModeScaleAspectFill,` respectively) will probably be the most
    useful to you.


    *   Aspect Fit. This scales the content, maintaining aspect ratio, until the largest
    dimension is equal to the corresponding dimension of the image view. Thus, if
    you have a UIImageView similar to the one in this chapter''s app and a photo that
    was taken in landscape orientation, the image will be scaled so that the entire
    image is visible and empty space will appear above and below the photo in the
    interface.

    *   Aspect Fill. This scales the image until the other dimension fills the available
    space. This results in the entire view being filled with your image, at the expense
    of trimming off some of the image. Using the same example, this would cause the
    left and right edges of your photo to be trimmed.


    The nine view modes at the bottom of the list (Center through Bottom Right) do
    no scaling at all on your image, and simply anchor the specified point in your
    image to the corresponding point in the content frame. For instance, choosing
    “Top Left” will cause the top left section of your image to be displayed so that
    the top edge is aligned with the top of the UIImageView, and the left edge is
    likewise aligned. Any extra image beyond the size of the content frame is cropped.
    In this app, you chose “Bottom” so that the bottom edges were aligned, and the
    extra portion of the image at the top was cut off.


    The “Redraw” view mode provides a way to customize how your content scales and
    is a far more advanced topic than this discussion.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的要求，将给定的英文文本翻译成中文。



    ### 编写按钮代码


    现在你需要为按钮编写代码。


    ![images](img/00220.jpg)


    图 6–28. 编写 `goToApress` 方法。


    28. 打开你的实现文件，如图 图 6–28 所示。你会看到 Xcode 也已经为你创建了一个方法存根（方法框架，但没有包含任何实际可用的代码）。点击此方法，并输入下面这一行代码：


    ```

    [[UIApplication sharedApplication] openURL:[NSURL URLWithString:@"http://apress.com"]];

    ```


    ![images](img/00221.jpg)


    图 6–29. 重新审查代码。


    29. 仔细想想，像从你自己的应用程序中打开 Mobile Safari 这样看似复杂的操作，竟能被苹果公司浓缩成一个语句，这实在令人惊叹。那么，让我们剖析一下你刚才编写的代码，如图
    图 6–29 所示。


    在 iOS 中，所有应用程序都被沙盒化到系统资源的各自小块区域中。沙盒化这个主题非常复杂，可以（且已经）有专门的书籍论述，因此我在此不做详述。相反，你只需要理解
    iOS 不会让你的应用为所欲为，因此你必须使用苹果提供的某些 API 来告诉底层系统代表你执行这些操作，这就足够了。


    在这个例子中，我们向 `UIApplication` 类发送一条消息，以获取对 `sharedApplication` 的引用——这是一个代表你的应用程序通往系统其余部分网关的对象。这个对象有一个名为
    `openURL` 的方法，当向其传递一个 `NSURL` 实例时，它会精确地执行打开操作。


    为了向 `openURL` 传递一个 `NSURL` 实例，我们需要向 `NSURL` 类发送 `URLWithString` 消息，它会透明地将你提供的字符串转换为一个
    `NSURL` 实例。


    ### 使用按钮


    是时候测试按钮了。


    ![images](img/00222.jpg)


    图 6–30. 运行它！


    30. 如图 图 6–30 所示，当你运行应用并点击标有 “Apress Web Site” 的按钮时，你的应用将调用 iOS 并启动 Mobile Safari，如图
    图 6–31 所示。


    ![images](img/00223.jpg)


    图 6–31. 在你的 iPhone 上显示的 apress.com 网站！


    31. 恭喜你！你已经成功完成了你的第六个 iPhone 应用！参见 图 6–31 和 图 6–32。


    ![images](img/00224.jpg)


    图 6–32. 你的第六个 iPhone 应用。


    ### 深入剖析代码


    在本章中，为了完成这个应用，你快速接触了几个高级主题。现在让我们从你编写的代码中退一步，更深入地探讨其中的一些主题。


    -   在第 15 步中，你设置了内容视图模式（Content View Mode），以改变图像的缩放和裁剪方式，使其适应 `UIImageView`。接下来，我们来探究一下这意味着什么，以及各个选项之间有何不同。

    -   在第 24 步中，我提到了编译时和运行时之间的区别。就编写应用而言，知道这种区别导致了两种不同的方式来产生相同的行为结果就足够了。在这里，我将深入到代码的哲学层面，讨论为什么在特定情况下你可能更喜欢使用一种策略而不是另一种。


    #### 内容视图模式


    在第 15 步中，你将一个图像加载到了 `UIImageView` 中。如果你使用了配套网站上的图像，那么图像大小基本合适（它与完整的 iPhone 屏幕尺寸完全相同）。由于标签栏占用了部分可用屏幕空间，因此
    `UIImageView` 的可用空间比你的图像略小。Xcode 最初会压缩图像以适应空间。这种视图模式（默认模式）被称为 “Scale To Fill”（`UIViewContentModeScaleToFill`），因为它会在
    X 和 Y 两个方向上缩放图像以填充内容框架。


    除非你的图像与 `UIImageView` 的尺寸完全相同，否则这将导致失真。如果你加载的是直接在界面中创建的图像（无论是在 Interface Builder
    中还是通过 `viewDidLoad` 方法），这可能还可以接受，但这会限制你的应用功能。另一方面，如果你将要加载一个尺寸未知或不受限制的图像，那么其他一些视图模式会更合适。请查看
    图 6–33，其中列出了可用的视图模式。


    ![images](img/00225.jpg)


    图 6–33. Xcode 的 UIImageView 内容视图模式。


    从 图 6–33 列表的顶部开始，在 Scale To Fill 之后，Aspect Fit 和 Aspect Fill（分别为 `UIViewContentModeScaleAspectFit`
    和 `UIViewContentModeScaleAspectFill`）对你来说可能最有用。


    -   **Aspect Fit。** 此模式会缩放内容，保持宽高比，直到最大的维度等于图像视图的相应维度。因此，如果你有一个类似于本章应用中的 `UIImageView`
    和一张横向拍摄的照片，图像将被缩放，使得整个图像可见，而在界面的照片上方和下方会出现空白区域。

    -   **Aspect Fill。** 此模式会缩放图像，直到另一个维度填满可用空间。结果是整个视图被你的图像填满，代价是裁剪掉图像的一部分。使用同样的例子，这将导致照片的左右边缘被裁剪。


    列表底部的九种视图模式（Center 至 Bottom Right）根本不对图像进行任何缩放，只是将图像中指定的锚点锚定到内容框架中的对应点。例如，选择 “Top
    Left” 将导致显示图像的左上部分，使其顶部边缘与 `UIImageView` 顶部对齐，左侧边缘也同样对齐。任何超出内容框架大小的图像部分都会被裁剪。在这个应用中，你选择了
    “Bottom”，这样底部边缘对齐，而图像顶部的多余部分被裁剪掉了。


    “Redraw” 视图模式提供了一种自定义内容缩放方式的途径，这是一个比当前讨论要高级得多的主题。

    '
- fmt: '#### Compile-time and Runtime


    In Step 24, I mentioned the terms compile-time and runtime in passing, noting
    that the distinction in that context was that the former meant you configured
    things in the Interface Builder part of Xcode and the latter meant you did this
    configuration by writing some code in your implementation file. That was a suitable
    definition of the terms at that time, but they can be defined a little more formally
    now.


    `Compile-time` indicates that something happens when your project is compiled,
    or built, prior to being run on the simulator or on a real iOS device. These are
    things like the definition of classes in `.h` and `.m` files, the organization
    and layout of `UIView`s in your nib files, and the configuration you do in Xcode''s
    various inspectors. Everything that is set at compile-time defines exactly the
    state your app will be in when it is started.


    `Runtime`, on the other hand, describes the segment of time after your app has
    started running. This is when all the code you''ve written is actually executed,
    effecting changes in the state of the app from the way it was set up at compile
    time. In this chapter, you specified the image for the second tab through a message
    in your implementation file. Thus, the image to show was unspecified at compile
    time, but at runtime a series of instructions was executed to display the desired
    image in the `UIImageView` you provided.


    Why is this difference significant? You proved, during the course of writing this
    app, that you can do the exact same thing at runtime as you could at compile-time.
    However, executing instructions to do what you wanted required several extra clicks
    and drags, and a few more lines of code. If you already know how you''re going
    to configure something at compile-time, the advantages of writing code to do the
    same thing will diminish. However, if you want to dynamically change the properties
    of an object during the execution of the app (last chapter''s app is a great example
    of this), it is obviously impossible to set all aspects of the state at compile-time.


    In short, compile-time defines the starting state of your app, while runtime describes
    the actions that occur once your app begins running.


    ### In the Chapter Ahead


    In [Chapter 7](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_022.html#filepos504312),
    you will move into the next level of complexity: Storyboarding.


    Storyboarding is the new way Apple allows one to lay out how a user moves through
    an app, in much the same way that a movie producer sets up a storyboard to show
    how a movie will go from one scene to the next. Storyboarding has segues (pronounced
    “segways”) that connect each view in your app with another. It is tempting to
    just go straight to storyboarding, but it''s best to first learn a little about
    the code behind these buttons and images, as you have done. So take a break, and
    then let''s move on to the land of storyboarding.


    ## Chapter 7


    ## Storyboards


    This seventh chapter will introduce a new way to create an app quickly and visually.
    First, some views will be laid out and you will see how they can be connected
    without writing code, and you will get some neat transition animations for free.
    This new technique was first brought to the public''s attention when Apple announced
    that they would be introducing a new and never-before-seen feature called Storyboards,
    which would be built into Xcode. It would allow the easy layout of workflow apps
    that use navigation and tab bars to transition between views.


    Apple went on to say that the new storyboards would manage the view controllers
    for you, while visually creating an easy to manage geospatial view of your project.
    It would specify the transitions and segues that are used when switching between
    views, without having to code them by hand! Everyone waited with anticipation
    for the Beta to come out and, when it did, everyone was blown away. It changed
    the entire coding landscape.


    ### Storytelling


    When you tell a story, you communicate with others. Whether young or old, everyone
    loves a story. Storytelling is an integral part of daily communication with others.
    When you communicate with a user, you are telling them how to travel a path you''ve
    created that will bring them to a place where they will get what they want, be
    it a map, a song, a recipe, the weather, where they parked their car, a phone
    number, a movie, or something else. So why wasn''t this thought of before? Why
    was the creation of apps seen as geeks programming code, while storytellers were
    seen as being something different? I''m not sure of the answer, but as I began
    to think about it, I realized that this was an incredible concept. Think of it.
    When Walt Disney began to think of the most efficient means to organize and structure
    cartoons, back in the early 1920s, he came up with the concept of storyboards.
    He would gather his artists together and they would mount a series of boards with
    key scenes from a story, and then they would organize these boards into a beautiful
    story. This technique became a huge success; it took over the movie industry,
    and it is the blueprint for planning every modern film. You can see a great movie
    that illustrates how Disney''s storyboarding took over the industry here: `bit.ly/oWg5mc`.


    The new iOS5 Storyboard feature is much the same, except you are not necessarily
    looking at pictures; you are looking at a geospatial representation of your app
    that allows you to organize it beautifully. Before iOS5 came out, nib files were
    used to define the user interface. There was no choice but to do this one view
    controller at a time. If you had 16 view controllers, you would have to define
    the user interface 16 times. Not only was this boring, but it became complex and
    confusing. Conversely, as you will soon see, a storyboard file captures all your
    user interfaces in one geospatial view, and gives you the ability to easily create
    and edit all your individual view controllers, and the transitions between your
    view controllers. You can move them around like a deck of cards, just like the
    guys at the Disney studios. It becomes easy to realize and edit the flow of the
    overall user interface and experience in your app.


    ### Roadmap Recap


    You now know enough of what happens behind the scenes to install a new way of
    doing things. It''s as if you''ve spent enough time tinkering around with lawnmower
    engines and basic car engines that you can appreciate installing a brand new engine
    in your old car. As you install this new engine, you know that inside this engine
    are pistons, spark plugs, carburetors, and so on. You do not have to yank the
    engine open to know these items exist; you can just install it and connect it
    to the chassis, the drive train, and the electronics. In storyboarding, you are
    going to use a whole new method for designing your app; you will simply have to
    connect it to your outlets, view controllers, and the other elements of your app.
    You don''t have to open up storyboard and look inside, as you know it works; you
    simply have to know how to connect things. So let''s do it!'
