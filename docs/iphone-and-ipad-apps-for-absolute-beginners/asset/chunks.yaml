- fmt: '# Change the view. See traffic


    Maps on iPhone 4 look amazingly crisp and detailed on the high–resolution Retina
    display. We can switch between `map view`, `satellite view`, and `hybrid view`.
    We can even see a street view of a particular address. We can double–tap or pinch
    to zoom in and out on a map. Maps on iPhone also provide us with live traffic
    information, as well as indicating traffic speed along our route in easy–to–read
    green, yellow, and red highlights.


    ![images](images/00355.jpg)


    Figure 9–3. Change the view and see traffic—shows the orientation with built–in
    compass (on Model 3GS) directions that indicate which way we are looking.


    We can forget printing out directions from our computer. With iPhone, we can view
    a list of turn–by–turn directions or follow a highlighted map route and track
    our progress with GPS. We can choose to see walking or driving directions, or
    even see what time the next train or bus leaves with public transit directions.
    The `Compass` app works with the built–in digital compass to tell us which direction
    our iPhone is facing. In addition, in the `Maps` app, the compass rotates the
    onscreen map to match the direction we''re facing.


    ![images](images/00356.jpg)


    Figure 9–4. Directions and seeing what direction we''re facing—one of the many
    possibilities when running `Maps` on iPhone/iPad.


    ![images](images/00357.jpg)


    Figure 9–5. `FlightTrack` uses the `MapKit` framework to track flights and then
    integrates with gate changes, schedules, and the rest of the personal data on
    any given ticket.


    ## Cool and Popular MapKit Apps Inspire Us


    A funny thing happened along the way to teaching MapKits and Storyboarding to
    my students: Most thought they knew what MapKits were but actually, they had no
    idea how awesome the `MapKit` framework really was. So, before we dive into this
    chapter, we will take a few minutes to learn about the fantastic features of the
    `MapKit` framework.


    ![images](images/00358.jpg)


    **CASE IN POINT:** One of my former students recently started working at Apple
    on iOS 5. She did exceptionally well in MapKits and, of all the departments within
    iOS 5 that she could have worked in, they placed her in the `MapKit` framework.
    One of the first things she told me was how huge this division was and how even
    though she loved MapKits—she had no idea that so many teams with so many incredibly
    intelligent people were all working on one thing: MapKits!


    I found that it really helped my students when, after showing them the pre built
    apps, we spent some time reviewing some super–cool third–party MapKit apps—to
    inspire them and get their brains storming. So, imagine you are sitting with us
    and taking this brief tour as well. Here are 11 MapKit apps that caught my eye,
    some of which I use regularly.


    - `FlightTrack`: This MapKit app lets us manage every aspect of our domestic and
    international flights with real–time updates and beautiful, zoomable maps. We
    can receive updates on gates, delays, and cancellations so we can book an alternate
    flight. The app covers more than 5000 airports and 1400 airlines. See [Figure
    9–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos662947).

    - `Metro Paris Subway`: Never get lost in the City of Light. `Metro Paris Subway`
    is a comprehensive guide to traveling through Paris, including official metro,
    RER, and bus maps and schedules. Complete with an interactive map and route planner,
    `Metro Paris Subway` will have us navigating like a real Parisian in no time.
    See [Figure 9–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos668906).

    - `MapMyRide`: I use this MapKit app all the time. I simply turn it on and start
    riding around on my bike. It tracks my speed, time, and mileage, as well as the
    incline. It takes into account my age, gender, and body weight; then it tells
    me how many calories I burned. (On a good day, I can burn off two doughnuts!)
    The point is, this application calculates all these things while I''m just riding
    along huffing and puffing! When I get home, I can see the route on my computer.
    It does most of its work by using and manipulating preinstalled MapKit apps.

    - `QuikMaps`: This do–it–yourself map app allows you to doodle on the map. It
    integrates with a number of places, including your website, Google Earth, or even
    your GPS.

    - `360 Cities`: The World In Virtual Reality: This shows 360–degree panoramas
    of over 50 world cities and 6000 panoramas. It is the perfect technology for real
    estate agents, tour guides, and adventurers.

    - `Cool Maps`: 7 Wonders of the World: This shows the seven wonders of the ancient
    world, and the seven wonders of the modern world, including natural wonders, underwater
    wonders, strange wonders, and local wonders. I am very impressed with how slick
    the programmers have made the touch and feel of the app.

    - `Blipstar`: This app converts Internet business URL addresses to their corresponding
    brick–and–mortar stores and presents it all on a cool map.

    - `Twitter Spy`: This app lets people see where the person who is tweeting them
    is currently located. Yep—wacky and crazy, but true.

    - `Geo IP Tool`: This app displays the longitude and latitude information of businesses
    on the Web. Then it provides us with a choice of the best ways to get there.

    - `Map Tunneling Tool`: This one is just clever fun. Imagine where we would come
    out if we began digging a hole straight down—from wherever. Is the answer always
    China?

    - `Tall Eye`: This app shows you where you will go if you walk directly, in a
    straight line, around the earth, starting at one point and staying on a specific
    bearing all the way around.


    ![images](images/00359.jpg)


    Figure 9–6. `Metro Paris Subway`: Parsing GPS data from the trains in the subways
    helps us to know when a train going in our direction will appear at the nearest
    train station.


    ## myStory_01: A Single–View Application


    In this exercise, we are going to begin with some boilerplate code and splash
    screens and icons that suit our basic requirements. Then, we will modify it from
    there. We will tour some of the same building blocks and files that we''ve seen
    throughout this book, and we will be challenged to see what areas of the code
    are pretty much the same as what we''ve already encountered and what areas are
    different—given the nature of this application.


    The ability to recognize patterns and see structures just under the surface is
    a powerful aptitude that we all have, but we programmers cultivate ours to a heightened
    degree. We will play a little game to see if we can anticipate some of the moves
    we will have to take.'
