  trans: '

    # 准备你的第一个 iPhone/iPad 项目


    假设你已经下载了 SDK 并安装了 Interface Builder、`Xcode` 和 iPhone/iPad 模拟器，打开你的 Mac，点击 Dock
    上的 `Xcode` 图标。你的屏幕应该会类似于图 1-22。会弹出“欢迎使用 Xcode”窗口；其中包含了所有 iPhone 和 iPad 的资源。


    ![images](img/00030.jpg)


    图 1-22\. 点击 `Xcode` 图标后，你将看到“欢迎使用 Xcode”屏幕。


    如箭头 1 所示，请确保你勾选了“启动 Xcode 时显示此窗口”选项。你会在这里找到许多日后会用到的宝贵资源。我建议你在完成第 4 章后，花点时间探索这些资源——可以说，给它们做个测试。这样做将为你打开各种创意之门。


    在不实际创建新项目的情况下，让我们先到展示厅看看我们可能会用到的某些模型。要在 Xcode 中打开一个新项目，请点击 `Xcode` 图标。当它打开后，你可以做两件事之一：要么点击图
    1-22 中箭头 2 指示的位置，然后点击箭头 3 指示的位置；要么同时按下 `Command + Shift + N` (![Images](img/00031.jpg)![Images](img/00032.jpg)
    N)。这将打开一个新窗口，展示你可以在 Xcode 领域中使用的不同类型的“车辆”。


    ![images](img/00033.jpg)


    图 1-23\. 展示你可以在 Xcode 领域中使用的不同类型“车辆”的新窗口。


    图 1-23 显示了七种车型：主从应用程序、OpenGL 游戏、基于页面的应用程序、单视图应用程序、标签栏应用程序、工具应用程序和空应用程序。


    早期，我们在 Xcode 中的大部分旅程将使用后两种风格之一。转回计算机术语，基于视图的应用程序和基于窗口的应用程序是我们在 iPhone/iPad 基本开发周期中将要使用的结构。正是在这里，我们将接触到各种酷炫的小工具和组件。


    别担心：我没有忘记我们创建一个简单的“Hello World”应用程序的目标。我们将在使用这六个选项中的几个时向世界问好，并且你将熟悉每一个。在我们开车之前，让我们确保钥匙能在点火开关里转动——或者用计算机术语来说，让我们检查一下
    iOS 能否编译一个空白文档并启动 iPhone/iPad 模拟器。点击单视图应用程序，如图 1-23 所示。看着你的屏幕，你应该会看到与图 1-24 非常相似的内容。首先，如箭头
    1 所示，将其命名为"test"，然后确保你如箭头 2 所示选择了 iPhone，接着点击箭头 3 所示的"下一步"按钮。


    ![images](img/00034.jpg)


    图 1-24\. 我们来一次试驾。


    如果你的程序没有默认保存到桌面，那么请导航到你的桌面，然后点击"创建"按钮，如图 1-25 所示。


    ![images](img/00035.jpg)


    图 1-25\. 导航到你的桌面并创建你的测试应用。


    ![images](img/00036.jpg)


    图 1-26\. 初始的集成开发环境（IDE）屏幕。


    图 1-26 显示了 Xcode 4 集成开发环境（IDE）的初始视图。我们现在不会纠缠于解释所有东西。我只希望你做的是，点击任何一个以"`.h`"或"`.m`"结尾的文件。现在，点击
    `testViewController.h` 文件，如图 1-26 中的箭头所示。这将调出图 1-27 所示的屏幕，我希望你通过点击箭头所示的"运行"按钮来运行你的空白应用。哦耶！iPhone/iPad
    模拟器中的 iPhone 弹了出来，如图 1-28 所示。恭喜你！你已经加载了 Xcode 并进行了试驾。是时候意识到你即将踏入一个全新的世界了。


    ![images](img/00037.jpg)


    图 1-27\. 运行它！


    ![images](img/00038.jpg)


    图 1-28\. 你的第一次试驾。


    ## 配套的截屏视频


    本书中显示的所有图片都是在编写代码时从我的屏幕上截取的——来自一个截屏视频。例如，第 2 章中的 `helloWorld_001` 示例位于 [`www.rorylewis.com/docs/02_iPad_iPhone/06_iphone_Movies/002_helloWorld_002.htm`](http://www.rorylewis.com/docs/02_iPad_iPhone/06_iphone_Movies/002_helloWorld_002.htm)
    或 `bit.ly/quO4ow`。


    不必观看上述截屏视频，因为我已经在第 2 章中包含了所有说明。不过，我听到学生们说，重温他们在课上学到的东西很有趣。这些视频示例往往相当紧凑。如果你想跟着截屏视频一起学习，请注意以下建议：


    - 当我的进度超过你时，请暂停视频。倒回去，跟上我的节奏。

    - 在你能够完整地完成项目后，将截屏视频保存到另一个文件夹。然后，以更少的暂停次数再操作一遍，直到你能够掌握它……并编译它。

    - 对于你们中有竞争意识的人，或许目标就是能跟我同步执行代码。不过，总的来说，我希望你们能对高级编程感到良好和舒适。为书中的所有示例练习这个做法，对你们会有好处。


    ## 配套的 PDF 文件


    我还提供了我在科罗拉多大学给学生上课时使用的 Keynote 幻灯片的 PDF 版本。这些 PDF 文件——不是必须的，仅仅是补充材料——展示了本章的所有幻灯片。对于那些希望深入探讨本书未涉及主题的人，我们也提供了链接。


    注意：你可以在 [`www.apress.com`](http://www.apress.com) 网站获取视频和补充材料。


    ## 假装不知：去混淆的艺术


    在我们正式开始之前，我想重申，我将向你展示如何在只了解基本知识的情况下进行编程。随着我们的深入，我会更深入地解释一些概念。但是，我只有在让你掌握了简单概念之后才会这样做。这是一种新的教学方式，并且我已经取得了巨大的成功。


    你可能会觉得我完全疯了，但我还是请求你按照我的指示去做。如果你有一个我似乎没有回答的问题，请相信我，这个问题在当时并不重要。我们会在以后解决它！

