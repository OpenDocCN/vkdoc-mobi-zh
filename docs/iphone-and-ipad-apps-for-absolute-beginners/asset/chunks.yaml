  trans: '

    #### 完成故事板


    我们已接近尾声。唯一还需要做的，就是将代码中原本不存在的部分——`webView` 与 `UIWebView` 的连接建立起来。既然它已经存在，我们需要回到故事板中，将它们连接起来。


    ![images](img/00488.jpg)


    图 11–24. 选择 myMasterTableViewController。


    24. 现在回到文档大纲，在 Detail View Controller - Detail Scene 中，找到 Web View，然后将其向上拖拽至 Detail
    View Controller - Detail 中 View 上方的 Navigation Item - Detail 处。此时，像我们在 `myStory_02`
    中做的那样，你的 View 会消失。保持选中左上角如图 11–24 所示的 Detail View Controller - Detail，回到你的连接检查器，按照图
    11–24 所示，从 `webView` 控制拖拽到 `UIWebView`。然后保存。


    注意：现在将你的 iPad 连接到 Mac，不要选择 iPad 模拟器，而是选择 iOS 设备。如果你愿意，也可以在模拟器上运行，但 iTunes 无法在模拟器内运行，因此所有的
    iTunes 链接都将无法工作。一旦你将 iPad 连接到 Mac，按下运行按钮。


    ![images](img/00489.jpg)


    图 11–25. 从图标到弹出窗口


    25. 应用构建完成后（可能需要 17 秒），你会看到如图 11–25 所示的图标。按下图标后，你会立即看到弹出屏幕。第一次选择时，它下面不会显示任何内容。然而，一旦你选择一个页面然后再次点按弹出，它就会像图
    11–26 那样，在弹出下方保留底层图像。


    ![images](img/00490.jpg)


    图 11–26. 页面加载时，一个漂亮的启动屏幕会呈现出来。


    26. 当我们选中一个单元格时，启动屏幕会出现在页面从互联网或 iTunes 加载的过程中。此处，在右侧图像中，我们看到弹出窗口覆盖在第一张图片之上。


    ![images](img/00491.jpg)


    图 11–27. 配合 iTunes 的方向自适应


    27. 我们需要对方向配合 iTunes 自动纠正这件事有点耐心。这是苹果需要改进的地方。请耐心等待。图 11–27 左侧显示的是第二次选择，右侧显示的是第一次选择的
    iTunes 内容。


    ### 结语


    这是一段奇妙的旅程，但这仅仅是个开始。在编写这第二版时，我忍不住想到那些将要阅读这些练习，努力攻克它们，然后突破自我，创造出精彩应用并赚到钱的新鲜头脑们！我的学生中，以及这本书的读者中，将来又会有多少人进入苹果公司工作呢！？哇！想到这些，对我而言是巨大的动力。


    令人伤感的是，在我完成这本书的时候，史蒂夫·乔布斯去世了。愿上帝保佑你，史蒂夫。


    我希望能在这论坛上见到大家。我不会回答通过电邮提交给我的问题，但如果你们将相同的问题发布到论坛（`http://bit.ly/oLVwpY`）上，我会回答，因为这样每个人都能分享我的答案。我也鼓励大家去帮助别人。无论你多么初学，都可以进入论坛去帮助他人。帮助他人会加速你自己的成长。


    祝好。


    路易斯博士


