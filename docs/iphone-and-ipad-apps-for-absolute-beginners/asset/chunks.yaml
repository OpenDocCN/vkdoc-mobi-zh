    the font from “Shrink” to “Grow” once somebody pressed the button? This is because
    we cannot allow the lulu fruit to be shrunk twice in a row, or it would virtually
    disappear! So, the first thing we need to do is change the text. The second thing
    we need to do is keep track of the possible state of the Shrink and Move buttons,
    so that we can tell the `CGAffine` to properly transform the lulu fruit icon for
    us. The code looks something like this:


    `-(IBAction)shrink:(id)sender`

    `{`

    `if it has not been shrunk, keep the text saying Shrink, else change it to Grow`

