  trans: "\n### 编写移动按钮代码\n\n实现“移动”按钮功能的代码与之前“收缩”按钮的代码完全相同，唯一区别在于我们不需要修改按钮内的文字，因此将这部分省略。\n\
    \n![images](img/00186.jpg)\n\n**图 5–36.** 编写 `move` 方法\n\n36. 这样我们就剩下同样的四种状态。只需将所有\
    \ `shrunk` 替换为 `moved`，其余部分完全一致。请对照图 5–36 中的代码检查你的实现。\n\n**注意：** 我建议你首先从 `shrink`\
    \ 方法中复制粘贴第一个 `if` 语句，然后将 `shrinks` 和 `moves` 互换。之后，将其粘贴三次；将 `if` 相关的分支改为 `else\
    \ if` 和 `else`。最后，在 `CGAffineTransformTranslates` 中将缩放改为移动。\n\n### 编写更改按钮代码\n\n\
    现在剩下的唯一任务是编写按下“更改”按钮时改变背景的代码。\n\n![images](img/00187.jpg)\n\n**图 5–37.** 编写 `change`\
    \ 方法\n\n37. 我们主要需要完成五项工作：递增当前背景索引；确保递增后图片索引仍在数组范围内；初始化 `UIView`；为背景加载创建动画；最后提交并更改背景。我们的\
    \ `change` 方法初始路线图如下：\n\n```\n-(IBAction)change:(id)sender\n{\n  将背景索引递增到下一张背景图片\n\
    \  检查 currentBackground 不超出数组范围\n  初始化 UIView\n  创建动画\n  提交并更改背景\n}\n```\n\n我之前说过，每次按下“更改”按钮，都会通过改变背景图片的编号来切换图片。如果当前背景是\
    \ `wallPaper_01`，按下“更改”按钮后，我们会递增它，即加一并将 `wallPaper_02` 设为下一张背景。这意味着，每次按下“更改”按钮时，我们需要先递增\
    \ `currentBackground`，如下所示：\n\n```\n-(IBAction)change:(id)sender\n{\n  currentBackground++;\n\
    \  检查 currentBackground 不超出数组范围\n  初始化 UIView\n  创建动画\n  提交并更改背景\n}\n```\n\n如果我们持续递增，最终会超过数组中图片的总数。因此，一旦达到数组中的图片数量，我们需要将计数重置为零。如下所示：\n\
    \n```\n-(IBAction)change:(id)sender\n{\n  currentBackground++;\n  if(currentBackground\
    \ >= [bgImages count])\n    currentBackground = 0;\n  初始化 UIView\n  创建动画\n  提交并更改背景\n\
    }\n```\n\n为了初始化 `UIView`，我们需要做两件事，但我为了更酷而添加了第三项任务。我们必须重置（重新启动、归零——无论你如何表述）Apple\
    \ 那帮天才写成的 `beginAnimations` 方法！然后，我们需要设置每个动画的持续时间。正如我之前初始化时提到的，我将两次变化之间的初始时间设置为\
    \ 1 秒。为了更酷，我加入了第三项任务：使用 `UIViewAnimationCurveEaseInOut` 方法决定动画开始和结束的平滑程度。如下所示：\n\
    \n```\n-(IBAction)change:(id)sender\n{\n  currentBackground++;\n  if(currentBackground\
    \ >= [bgImages count])\n    currentBackground = 0;\n  [UIView beginAnimations:@\"\
    changeview\" context:nil];\n  [UIView setAnimationDuration:1];\n  [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n\
    \  创建动画\n  提交并更改背景\n}\n```\n\n**注意：** 要实际更改背景，我们需要谨慎理解这一概念。请仔细阅读并尽力跟上。\n\n我们将每个背景的切换过程分为两步。\n\
    \n1.  首先，我们检查当前背景的数值（或标签）是否与我们正在处理的一致。如果为真，则执行花括号内的代码（如下一点所述）。\n2.  然后，我们将使用 `setAnimationTransition`\
    \ 方法来执行我们选择的任何方法。有卷曲向上、卷曲向下、从左或从右移入、向这边翻转、向那边翻转等多种方法。或者，当你成为超级极客时，也可以创建自己的方法。目前，我只使用卷曲和翻页效果，因此我会恰当地调用这些过渡效果。\n\
    \n更仔细地看，对于每个动画，我们使用如下形式：\n\n```\nif(currentBackground == 我们想要的编号)\n  [UIView setAnimationTransition:\n\
    \                       UIViewAnimationTransition 我们选择的动画\n                  \
    \  forView:self.view\n                    cache:YES];\n```\n\n现在重复此方法，并为每个动画随机选择动画效果，代码变成如下形式：\n\
    \n```\n-(IBAction)change:(id)sender\n{\n  currentBackground++;\n  if(currentBackground\
    \ >= [bgImages count])\n    currentBackground = 0;\n  [UIView beginAnimations:@\"\
    changeview\" context:nil];\n  [UIView setAnimationDuration:1];\n  [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n\
    \  if(currentBackground == 1)\n    [UIView setAnimationTransition:\n         \
    \                UIViewAnimationTransitionFlipFromLeft\n                     forView:self.\n\
    \                     view cache:YES];\n  \n  if(currentBackground == 2)\n   \
    \ [UIView setAnimationTransition:\n                         UIViewAnimationTransitionCurlDown\n\
    \                     forView:self.\n                     view cache:YES];\n \
    \ \n  if(currentBackground == 3)\n    [UIView setAnimationTransition:\n      \
    \                   UIViewAnimationTransitionCurlUp\n                     forView:self.\n\
    \                     view cache:YES];\n  \n  if(currentBackground == 4)\n   \
    \ [UIView setAnimationTransition:\n                         UIViewAnimationTransitionFlipFromRight\n\
    \                     forView:self.\n                     view cache:YES];\n \
    \ \n  提交并更改背景\n}\n```\n\n最后一步，同样如之前所述，我们只需提交更改并执行代码：\n\n```\n-(IBAction)change:(id)sender\n\
    {\n  currentBackground++;\n  if(currentBackground >= [bgImages count])\n    currentBackground\
    \ = 0;\n  [UIView beginAnimations:@\"changeview\" context:nil];\n  [UIView setAnimationDuration:1];\n\
    \  [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n  if(currentBackground\
    \ == 1)\n    [UIView setAnimationTransition:\n                         UIViewAnimationTransitionFlipFromLeft\n\
    \                     forView:self.\n                     view cache:YES];\n \
    \ \n  if(currentBackground == 2)\n    [UIView setAnimationTransition:\n      \
    \                   UIViewAnimationTransitionCurlDown\n                     forView:self.\n\
    \                     view cache:YES];\n  \n  if(currentBackground == 3)\n   \
    \ [UIView setAnimationTransition:\n                         UIViewAnimationTransitionCurlUp\n\
    \                     forView:self.\n                     view cache:YES];\n \
    \ \n  if(currentBackground == 4)\n    [UIView setAnimationTransition:\n      \
    \                   UIViewAnimationTransitionFlipFromRight\n                 \
    \    forView:self.\n                     view cache:YES];\n  \n  [UIView commitAnimations];\n\
    \  myBackground.image = [bgImages objectAtIndex:currentBackground];\n}\n```\n\n\
    请对照图 5–37 检查你的代码。大功告成！你能相信吗？你只需运行它，代码就能完美运行……啊哈……才怪！除非你是个超级极客！\n"
- fmt: '### Running the Code


    Let me explain something. The odds that it will work are small and that''s OK!
    It’s OK that your code does not work at first. Expecting your code to run beautifully
    the first time is similar to what my mother told me a couple of years ago. She
    called from across town at 5:00 o''clock in the afternoon and said, “Darling I’m
    just leaving now; I know it’s 5:00 o''clock, but I should be there soon because
    I hope there will not be too much traffic today!” I could not believe what she
    had just said. I replied, “Mom, rather than expecting to be here in 20 minutes
    hoping there will not be traffic only to be horribly let down, why don''t you
    expect it to take one hour and enjoy that new Deva Premal meditation CD I bought
    you? Relax and enjoy yourself!”


    Likewise, expect there to be errors. Debugging our code is a HUGE part of being
    a computer scientist and expecting not to see any is only going to let you down.
    If there were no errors then you''d be lucky!


    ![images](images/00189.jpg)


    **Figure 5–38.** The opening screen


    38\. Once you run it, you can do four things: press one of the three buttons or
    move the icon around on your screen. This initial view is seen in [Figure 5–38](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos446187).


    ![images](images/00190.jpg)


    **Figure 5–39.** Some more views


    39\. [Figure 5–39](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos446725)
    shows three images. The first background displays where the Shrink button is pressed
    and then it changes to Grow. On the third image, we see the beginning of the flipping
    of the background to the next background.


    ![images](images/00191.jpg)


    **Figure 5–40.** Views of the change backgrounds


    40\. [Figure 5–40](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos447331)
    illustrates the page curling to the fourth background and the lulu fruit icon
    being moved by the `touches` function.


    ### Digging the Code


    Typically, I spend time digging the code that we flew over. However, this chapter
    was a huge leap, and I could not justify leaving you to flip back to this section
    to understand what was going on while you typed the code. As far as going deeper
    into the code is concerned, there''s not much left to dig into—we did a pretty
    thorough job on it. In the next Chapter, we will look at switch views; we will
    “quickly” run the code and then come back to what we really did in the “Digging
    the Code” section. Let''s close this chapter and give your brain a break.


    ### In the Chapter Ahead


    In [Chapter 6](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_020.html#filepos449865),
    we will move into the next level of complexity: switch view applications. We will
    examine how a team of characters or roles within your code will work together
    to direct an outcome, or a series of outcomes, that will give the user the sense
    of seamless flow.


    You will learn about delegators and switch view controllers, classes and subclasses,
    and “lazy loads.” We will get into the nitty-gritty of the `.xib` files, examine
    the concept of memory deallocation, and learn about imbedded code comments. It''s
    getting curiouser and curiouser. . .


    Onward to the next chapter!


    ## Chapter 6


    ## Switches


    After finishing the `touches` app in [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378),
    you can say that you''ve coded Objective-C apps without flinching! You are not
    alone if, while coding [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378),
    you felt as though you were struggling to make your way across a tough and rocky
    road. I say this because all programmers have had to journey over this road. It’s
    absolutely OK to look back on that chapter and think to yourself that you don''t
    remember what you did. Yes, that''s normal, and I''m about to prove to you that
    it''s normal. First, I need to explain why you are going to take time out at this
    point.


    In my experience, when teaching students languages such as C, C++, C#, Assembly,
    Machine Languages, Java, and the list goes on, many students drop out even when
    they seem to be doing fine. In recent years, I began to catch students as they
    neared this junction, and I would ask them why they were contemplating dropping
    out. They would all tell me something similar to this: “I can see I did the homework
    but I''m scared I will fail because it''s just not sinking in. I don''t grasp
    it.” About four years ago I tried an experiment. When the students walked into
    the lecture hall they were in shock when I told them to close their text books,
    close their laptops, and put away their books because we were going to take a
    journey inside their brain and have a class on neurology. In fact, we were going
    to scientifically illustrate why many felt they were stupid, not getting it, and
    essentially feeling like a dork! The entire lecture hall collapsed in laughter.
    At the end of the lecture that I now call “Don''t Freak Out! Let''s Have a Look
    at Your Brain!” some students were crying and came up to me after class and thanked
    me. Not a single student dropped out.


    Right now I bet that you feel you have not retained anything from [Chapter 5](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_018.html#filepos339378)
    and that you feel a little overwhelmed and insecure in your geek abilities. Well,
    that’s OK—just read on and you''ll see why you feel a little uneasy. Even if you
    do feel confident at this point, you probably will falter at some point down the
    road as it gets harder, but I still want you to read on. This is important, so
    I want you to really understand this.'
