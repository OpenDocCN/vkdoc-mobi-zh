- fmt: '# Possible Prepping for the App


    We are going to consider a wide variety of components that we will use to build
    in to our app. Before that, though, I want to make sure we all have a firm grasp
    of some important terminology. For this project, we programmers need to recall
    some basic earth science and geography so that our code will be as effective as
    possible.


    When we direct the computer to animate a pin dropping down, with annotations,
    onto a specific location, giving "longitude" and "latitude," we need to know what
    these terms really mean. Lines of latitude are the imaginary lines that circle
    the globe "horizontally," running east to west (or west to east). These invisible
    lines are measured in degrees, minutes, and seconds, north or south of the Equator.
    The Equator is the elliptical locus of points on the Earth''s surface midway between
    the poles, which physically are real points—defined by the Earth''s rotation on
    its axis. Lines of latitude are often referred to as parallels. The North Pole
    is 90 degrees north latitude; the South Pole is 90 degrees south latitude.


    Lines of longitude, often called meridians, are imaginary "vertical" lines (ellipses)
    that cross through the North and South Poles. They are also measured in degrees,
    minutes, and seconds, east or west of the Prime Meridian, an arbitrary standard
    that runs through Greenwich, England. Unlike the Equator, which goes all the way
    around the world—360 degrees, the Prime Meridian (0 degrees longitude) is a semi–circle
    (semi–ellipse), extending from the North Pole to the South Pole; the other half
    of the arc is called the International Date Line, and it is defined as 180 degrees
    east and/or 180 degrees west longitude.


    For our [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)
    app, the example I used to demonstrate the "pin drop" on location is my office
    at the University of Colorado at Colorado Springs. We, of course, can use any
    location we choose. We may want to use our own address, or a well–known landmark.
    To do this, we must get the latitude and longitude values of that location—most
    likely from Google Maps or a direct GPS reading. There are many sites on the Internet
    where we can find these coordinates; [Figure 9–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos673239)
    illustrates one of them, [`http://bit.ly/vGszNu`](http://bit.ly/vGszNu).


    ![images](images/00360.jpg)


    Figure 9–7\. Batchgeo ([www.batchgeocode.com/lookup](http://www.batchgeocode.com/lookup))
    is one of many Internet sites where one can enter an address and receive its longitudinal
    and latitudinal coordinates.


    Here''s a thought—let''s start to the end of our process and think backwards for
    a minute. Go ahead and jump forward in this chapter for a sneak peek at what the
    app will look like—what results it will return if all goes well. In [Figure 9–34](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos719151),
    we see a picture of a hybrid map showing a red pin that''s sitting on top of a
    building. That''s the Engineering Building at the University of Colorado at Colorado
    Springs; the pin is located right above my office. The next picture has what we
    call an annotation, which is the text. "Dr. Rory Lewis" is the title, and "University
    of Colorado at Colorado Springs" is the subtitle.


    Later in the tutorial, we will see that we need to be careful about the title
    and the subtitle. We also control the color of the pin and we decide on the style
    of animation—how the pin drops on to the map image.


    This is a good place for a reminder of the title of this book: iPhone and iPad
    Apps for Absolute Beginners. Take a deep breath! Even if we were all meeting our
    greatest expectations of learning the most we ever have and even if we were all
    meeting our greatest expectations of ourselves—learning so much complexity in
    such a short time, we would still not be an expert in this challenging area of
    `MapKit` code! At this point, my humble goal is not fluency, but reasonable familiarity
    and a sense of what lies ahead.


    If that sounds right, let''s get on with it.


    ## Preliminaries


    As in previous chapters, please download and extract images and boilerplate code
    for this chapter. Navigate to [http://bit.ly/oDqzvYand](http://bit.ly/oDqzvYand)
    download its contents. The images include three icon files, two splash screens,
    and two files of boilerplate code. Later, I will explain what these icons, splash
    screens, and boilerplates mean. Right now though, we will just download it to
    our desktop. Then, we will extract the files onto our beautifully clean desktop.


    Sample code that I programmed on the video is available for download here: [http://bit.ly/qd6iDT](http://bit.ly/qd6iDT).
    After extracting all the files, remember to delete the `011_myStory_01.zip` and
    `myStory_01` folders. This is to avoid overwriting files and/or potential conflicts
    with the exercise code. To view the screen cast of this chapter''s exercise, go
    to [http://bit.ly/owk24r](http://bit.ly/owk24r).


    ## A New Single View Template


    Let''s get started and choose the template.


    ![images](images/00361.jpg)


    Figure 9–8\. Select the Single View Application icon, and then press Return or
    hit Next.


    1. Open Xcode and enter ![images](images/00031.jpg)![images](images/00032.jpg)N,
    as shown in [Figure 9–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos677102).
    Then click on the View–based Application template. We will call it `myStory_01`
    and then we will save it to our desktop. A folder bearing that name appears on
    the desktop.


    ![images](images/00362.jpg)


    Figure 9–9\. Name your app `myStory_01` making sure Storyboard and automatic referencing
    is on.


    2. In order to follow along as closely as possible, because it will get complex
    later, we will name our project "`myStory_01`." To do so, select iPhone, not iPad
    or Universal, leave the Class Prefix and Include Unit Tests options alone and
    as shown in [Figure 9–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos677845).
    Check that the Storyboard and Automatic Referencing option is on.


    ![images](images/00363.jpg)


    Figure 9–10\. Create an Objective–C class for your annotations.'
