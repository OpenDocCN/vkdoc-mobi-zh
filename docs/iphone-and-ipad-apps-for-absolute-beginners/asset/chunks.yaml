  trans: "\n### 期末项目——示例 1\n\nStephen M. Moraco 开发了一款对他而言意义非凡的应用程序。作为一名业余无线电爱好者，他决定解析\
    \ Bob Bruning 的 WB4APR 网站，Bob 在该网站上开发了一套自动位置报告系统（APRS）。与我之前在课堂上举的“定位死头乐队粉丝”的例子非常相似，Stephen（身为父亲）制作了一款应用，能够定位所有在用户指定距离范围内的业余无线电操作员。我不会逐行讲解\
    \ Stephen 的所有代码，因为你可以下载并仔细阅读。我认为你应该注意以下几个部分：他的 `APRSmapViewController` 头文件列出了包含\
    \ 3 个 IBOutlet、1 个 IBAction 和一个 ViewController 的路线图：\n\n```\n@property (nonatomic,\
    \ retain) IBOutlet MKMapView *mapView;\n@property (nonatomic, retain) APRSwebViewController\
    \ *webBrowserController;\n@property (nonatomic, retain) IBOutlet UISegmentedControl\
    \ *ctlMapTypeChooser;\n@property (nonatomic, retain) IBOutlet UIActivityIndicatorView\
    \ *aiActivityInd;\n\n-(IBAction)selectMapMode:(id)sender;\n```\n\n在 `APRSkit_MoracoDadAppDelegate`\
    \ 的实现文件中，他使用以下代码让用户有机会登录。结果见图 9-41。此步骤的详细信息位于 `-(void)applicationDidFinishLaunching`\
    \ 方法中，该方法还包含了系统搜索匹配项时与用户之间的距离（半径）：\n\n```\n-(void)applicationDidFinishLaunching:(UIApplication*)application{\n\
    \n    NSLog(@\"MapAPRS_MoracoDadAppDelegate:applicationDidFinishLaunching - ENTRY\"\
    );\n    //Override point for customization after app launch\n\n    [window addSubview:[navigationController\
    \ view]];\n          [window makeKeyAndVisible];\n\n     //preload our applcation\
    \ defaults\n     NSUserDefaults *upSettings = [NSUserDefaults standardUserDefaults];\n\
    \     NSString *strDefaultCallsign = [upSettings stringForKey:kCallSignKey];\n\
    \     if(strDefaultCallsign == nil)\n     {\n          strDefaultCallsign = strEmptyString;\n\
    \     }\n     self.callSign = strDefaultCallsign;\n     //[strDefaultCallsign\
    \ release];\n\n     NSString *strDefaultSitePassword = [upSettings stringForKey:kSitePasswordKey];\n\
