  trans: "\n# 调整故事板\n\n我们现在已经编写或粘贴了所有必要的代码，用于解析谷歌服务器中我们在第 1 部分列表里填充的每个城市的地理空间信息；同时，我们也编写了通过一个尚不存在的\
    \ segue 将这些坐标路由到 MapKit 的代码，MapKit 会在所选城市的中心放置一个图钉。简而言之，我们需要一个能包含 MapKit 框架的容器。为此，我们将添加一个导航控制器和一个详细视图。我们需要创建一个新的视图控制器并将其拖到画布上，然后将主视图连接到详细视图，并在其导航中添加一个地图视图。从整体上看，扩展后的结构如下所示。\n\
    \n## 整体概览：故事板调整扩展\n\n> 1.  用城市列表填充表格（已完成）\n> 2.  编写代码，在图钉落在所选城市地图的中心\n>     2.1.\
    \ 添加 MapKit 框架\n>     2.2. 编写代码\n>     2.3. 调整故事板以适配新代码\n>     > 2.3.1. 添加导航控制器\n\
    >     > 2.3.2. 添加将包含 MapKit 框架的详细视图\n>     > 2.3.3. 将视图控制器拖到画布上\n>     > 2.3.4.\
    \ 从主视图到详细视图添加 Push 转换——命名为“详细视图”\n>     > 2.3.5. 向其导航添加地图视图：将地图视图拖到视图上方\n>   \
    \  > 2.3.6. 将地图视图与`myDetailViewController`的后台类关联\n>     > 2.3.6.1. 在文档大纲的视图控制器场景中选择详细视图控制器\n\
    >     > 2.3.6.2. 在实用工具中选择标识检查器\n>     > 2.3.6.3. 在自定义类中，转到类中的下拉菜单\n\n![images](img/00447.jpg)\
    \  \n\n图 10–38. 打开故事板进行最后的调整。\n\n38. 说到这里，让我们打开故事板，如图 10–38 所示。\n\n![images](img/00448.jpg)\
    \  \n\n图 10–39. 添加导航控制器。\n\n39. 我们需要添加一个导航控制器，所以选择 Editor ![images](img/00027.jpg)\
    \ Embed ![images](img/00027.jpg) Navigation Controller，如图 10–39 所示。\n\n![images](img/00449.jpg)\
    \  \n\n图 10–40. 新的导航控制器自动连接到表格视图。\n\n40. 正如我们在图 10–40 中看到的，新的导航控制器自动连接到我们的表格视图。关闭导航器，在故事板上腾出一些空间。\n\
    \n![images](img/00450.jpg)  \n\n图 10–41. 添加将包含 MapKit 框架的详细视图。\n\n41. 缩小视图，以便你能看到更多画布。现在向左滚动，这样表格视图右侧就有一大片空白画布区域。然后抓取一个视图控制器并将其拖到表格视图右侧的画布上，如图\
    \ 10–41 所示。\n\n![images](img/00451.jpg)  \n\n图 10–42. 创建一个 segue。\n\n42. 我们现在需要用\
    \ segue 连接主视图和详细视图——具体来说是使用 push。为此，我希望你选择主视图中的单元格，然后按住 control 键从该单元格拖向视图，如图\
    \ 10–42 所示。\n\n![images](img/00452.jpg)  \n\n图 10–43. 选择 Push。\n\n43. 在你按住 control\
    \ 键从单元格拖到视图后，你会看到一个下拉菜单，其中有三种 segue 连接选项：Push、Modal 和 Custom。我们选择 Push。这如图 10–43\
    \ 所示。\n\n![images](img/00453.jpg)  \n\n图 10–44. 还记得我们给 segue 起的名字吗？\n\n44. 我们现在需要为刚刚创建的\
    \ segue 指定我们在`myMasterTableViewController.m`类的`prepareForSegue:`方法中给出的名称。万一你忘了给它起的名字，或者即使你记得，也请回去复制一下\
    \ segue 的名字，这样你的大脑就能建立起连接。这如图 10–44 所示。\n\n![images](img/00454.jpg)  \n\n图 10–45.\
    \ 选择 segue。\n\n45. 这听起来可能完全没有必要，但学生们在命名 segue 时经常遇到困难，因为他们忘了先选中它。我知道这是新知识，但令人惊讶的是很多人都忘了做这一步。因此，我特意花时间在书中加入了这张图。选择\
    \ segue，如图 10–45 所示，然后我们给它命名。\n\n![images](img/00455.jpg)  \n\n图 10–46. 将名称粘贴到标识符中。\n\
    \n46. 选中连接`UITableViewCell`和详细视图控制器的 segue 后，将名称粘贴到标识符框中，如图 10–46 所示。\n\n![images](img/00456.jpg)\
    \  \n\n图 10–47. 将地图视图拖到视图上。\n\n47. 现在，地图能显示在视图上的所有连接都已就绪，除了……啊——地图视图！从库中抓取一个地图视图并将其拖到视图上，如图\
    \ 10–47 所示。\n\n![images](img/00457.jpg)  \n\n图 10–48. 选择地图视图。\n\n48. 我们现在需要将地图视图设为主视图。正如你在图\
    \ 10–48 中看到的，视图位于地图视图之上。用技术术语来说，地图视图从属于视图，视图当前是主视图。还记得我说过视图层叠在一起可能会非常令人困惑吗？好吧，这就是我针对这一点使用三张图的原因。\n\
    \n![images](img/00458.jpg)  \n\n图 10–49. 将地图视图拖到视图上方。\n\n49. 此刻，我们刚才拖到视图上的地图视图是从属于视图的。为了让视图消失，并使地图视图成为主视图，请在文档大纲的视图控制器场景中选择视图控制器，然后将地图视图拖到视图之上，如图\
    \ 10–49 所示。\n\n![images](img/00459.jpg)  \n\n图 10–50. 现在地图视图是主视图了。\n\n50. 一旦地图视图位于视图之上，视图就会消失，地图视图将成为主视图。这一点至关重要，因为如果这一步不成功，其他所有工作都无法进行！确保你能掌握这一点。除非你的屏幕看起来像图\
    \ 10–50 中的屏幕，否则不要继续。\n\n![images](img/00460.jpg)  \n\n图 10–51. 将地图视图与你的`myDetailViewController`关联。\n\
    \n51. 还记得你在`myDetailViewController.m`中做的大量工作吗？好吧，所有这些都必须在刚刚创建的地图视图之下工作。在文档大纲的视图控制器场景中选择详细视图控制器。在实用工具中选择标识检查器。然后在自定义类中，转到类中的下拉菜单，选择`myDetailViewController`，如图\
    \ 10–51 所示。\n\n![images](img/00461.jpg)  \n\n图 10–52. 运行它。\n\n52. 运行它。\n\n![images](img/00462.jpg)\
    \  \n\n图 10–53. 启动画面转到表格视图，然后选择城市德班。\n\n53. 是的，很漂亮，不是吗？所有那些辛苦的工作？启动画面出现，然后我们看到填充了城市的表格，但现在我们看到每个单元格右侧漂亮的小箭头，它们提示我们，如果点击单元格，会发生很酷的事情。我们点击单元格，它就会通过\
    \ segue 进入一个地图视图，如图 10–54 右侧图所示。\n\n![images](img/00463.jpg)  \n\n图 10–54. 图钉落下，标注正常工作。\n\
    \n54. 恭喜你。我要求你作为练习做的一件事是：将导航栏命名为“详细视图”，并将表格视图的导航栏命名为“主视图”。回到图 10–47 中的位置，只需双击导航栏中央附近，然后随意命名即可。我之所以忽略这一步，是因为学生们经常认为我们给导航栏起的名字实际上会对代码产生影响。我见过不少学生为了调试代码而更改导航栏上的名称。省略这些名称可以向你展示这些名称完全没有任何影响。\n\
    \n这两个系列的内容非常长。除了代码之外，没有什么我想给你看的东西了。事实上，有好几次我们已经超出了“初学者”的范围，更别说是绝对的初学者了。因此，我们不会比已经完成的代码再深入挖掘更多了。现在休息一下，放松，并沉浸在满足感中吧！\n"
- fmt: "# Chapter 11\n\n## Storyboarding to Multimedia Platforms\n\nThis is the last\
    \ chapter of the book and I have been looking forward to writing this chapter\
    \ for a long time. This is the capstone app if you will. The app that teaches\
    \ you how to market your restaurant, business, or whatever you like to various\
    \ multimedia platforms. I chose to promote a band for this app because it includes\
    \ `iTunes` and many of my students struggle with `iTunes`. We will take care of\
    \ that right here. In the lecture hall, I first walk through the app with the\
    \ students as they imagine they are in a distant place and time and they’ve discovered\
    \ a band called The Beatles. They then market that band on the Web, `YouTube`,\
    \ and `iTunes`. In the second half of this project, the students create their\
    \ own business that they market in a similar but much more creative manner.\n\n\
    Unfortunately, due to copyright issues, it is not permissible to show pictures\
    \ of the Beatles in a book that is not authorized by the Beatles. For the purposes\
    \ of this book, I’ve created some dummy sites on the web with pictures of myself\
    \ playing guitar and `iTunes` sites where I have songs from many years ago (1997).\
    \ I will show you where to get the Beatles URLs (public domain) and how to make\
    \ the site (first for the Beatles as I do in class) and then how to find other\
    \ bands or other types of media to pretend to promote. Hopefully, you will have\
    \ your own business, such as a restaurant, bead shop, consulting service, or whatever,\
    \ that you can then make a promotional app of and shoot it up to the `iTunes`\
    \ store so that people can download it for free.\n\nHow does this work? Remember\
    \ back in [Figure 1-21](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos100865),\
    \ I explained the exact process of how one can make money from an app on the Internet?\
    \ Well, here I teach you how to market your business and set your app up, possibly\
    \ for free to begin with. Let’s say you have a babysitting business. After you\
    \ learn how to manage the Beatles website, you can make an app for the babysitting\
    \ business and shoot it up to the app store for free downloads. In the old days,\
    \ we used to hand out cards – now we hand out apps. You let parents and potential\
    \ parents of your babysitting store know that they can download your babysitting\
    \ business’ app for free and, with a password that only works for a limited time\
    \ (and only if they are a potential parent), view their baby on a live webcam\
    \ any time of day. They can see other children being taken care of by your staff.\
    \ They can get updates on snow days, on birthdays, and pay their bills online\
    \ all through your app. By word of mouth, those parents will tell other parents\
    \ how great your business is based solely on how convenient and cool your app\
    \ was.\n\nThe same applies to other businesses; you just need to be creative.\
    \ Innovativeness is your department but hey! You had to have a huge streak of\
    \ innovation to buy this book and, if you’re still reading this, you’re well into\
    \ the realm of Geekdom so I have full faith that you have everything you need\
    \ to make a wonderful app for your business, another person’s business, or yourself.\
    \ All you need is the technical know-how and I will teach you that right here,\
    \ right now, so let’s go!\n\n### `myiTunes`: A Master-Detail Application\n\n`myiTunes`\
    \ is based upon one of the more daunting methods of creating a storyboarding app:\
    \ the Master-Detail Application. However, Master-Detail Applications empower the\
    \ `iPad` `iOS 5`’s split view and popover together with incredible storyboarding\
    \ technology. More so, as if this were not enough, we also throw into the mix\
    \ the ability to access `iTunes`, `Facebook`, `Google+`, pages that have videos,\
    \ and, of course, the two iPad splash screens with cool icons that all add up\
    \ to a beautiful, marketable app just waiting to boost you, your business, or\
    \ another person’s business up into the stratosphere—loudly!\n\n`iTunes` has some\
    \ controversial, quirky, and not so user-friendly means of accessing its `iTunes`\
    \ music store. I will go through this step by step, including the ability to look\
    \ up bands, videos, and podcasts. There are some other multimedia platforms I\
    \ do not cover in the example because that would be overload, but I will show\
    \ you exactly how to convert your media from images to video and so forth. I also\
    \ include the code to access these other forms of multimedia and the boilerplate\
    \ code that you download. So, even though we do not use all these types of media\
    \ in the boilerplate, they are there for you to use as you so choose.\n\nOne thing\
    \ about terminology before we proceed: we will be talking about split views and\
    \ popovers in this app. These are the supercool tables and drop-down menus that,\
    \ depending how you hold your iPad, invoke a table for the user to use. The split\
    \ view shows 2 panels, side-by-side. In landscape mode, the master view is 320px\
    \ wide. However, when you go to portrait orientation, the split view appears as\
    \ a popover that looks like it’s lying on top of the existing view. It looks like\
    \ a drop-down menu sitting on top of what was underneath it (see [Figure 11–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos943732)).\
    \ It cannot be that it works like a dialog box or drop-down menu. One student\
    \ recently asked me: “Dr. Lewis, can we pimp out the popover!?” Hmmm… nope! You\
    \ cannot tweak, pimp out, and change much. But the issue is whether you want to\
    \ or not, and the answer is ‘probably not’. Popovers are sophisticated, elegant,\
    \ and show the user that you, the developer who programmed them, are awesome!\n\
    \nSo let’s get on with the preliminaries so we can make a start on our app.\n\n\
    #### Preliminaries\n\nThis chapter’s download files are similar in nature to [Chapter\
    \ 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)’s boilerplates\
    \ and images. Except that, as mentioned before, I include code that we do not\
    \ use in this app but that you may want to use when you create your own app using\
    \ alternative or additional media. It’s all there for you to use. On the video\
    \ and in the code, there is a substantial amount of code prewritten by me. However,\
    \ I explain it all in intense detail in this chapter so I suggest that you try\
    \ and code it all by yourself. If you find you need to use the boilerplate code\
    \ after a while, then go ahead and use it, but please first try doing it on your\
    \ own. If you do have to use the boilerplate code, then go ahead and try typing\
    \ in the code line by line after you had success running the boilerplate code.\
    \ If you cannot make it work, even using the boilerplate code, then download my\
    \ exact `Xcode` file and, after making my code run, see exactly where you missed\
    \ something.\n\nThese download files can be found at [`http://bit.ly/sL26vN`](http://bit.ly/sL26vN).\
    \ One can download the sample code that I programmed on the video here: [`http://bit.ly/uN1uV1`](http://bit.ly/uN1uV1).\
    \ To view the screencast of this chapter’s exercise, go to [`http://bit.ly/tPatpA`](http://bit.ly/tPatpA).\
    \ If you need more help, go to the forum at [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY).\n\
    \n**THE BIG PICTURE**\n\n> Just as we did in [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)\
    \ when we began to write larger sets of code, we will use “The Big Picture” with\
    \ its many views. First, we will view the code from “30,000” feet, taking a very\
    \ broad overall view of our landscape. Then, as we drill downward, we will always\
    \ keep track of the big picture.\n> \n> 1.  Set up the popover in the storyboard\n\
    > 2.  Code the interaction to the multimedia platforms\n> 3.  Tweak the popover\
    \ to grab the platforms correctly"
