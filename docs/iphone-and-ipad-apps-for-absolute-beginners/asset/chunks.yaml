    \        [self.detailViewController.webViewloadRequest:urlRequest];\n    } else\
    \ {\n        // else we have an iPhone/iPod Touch so open in external safari\n\
    \        [selfStartExternalAppWithURL:urlInSafari];\n    }\n}\n```\n\n```\n@end\n\
