- fmt: "#### Possible Prepping for the App\n\nLet's prep ourselves with two sets of\
    \ terminology: “Parsing” and “going up onto the internet”. We will be using the\
    \ word “parse” quite a lot and, even though I was reticent to include parsing\
    \ when I designed my course and this book, I decided on erring on teaching you\
    \ something that is so fundamental to be able to code in this day and age: parsing\
    \ is writing code that allows you to enter a server and extract only the terms\
    \ you want from your database. For example, the Google server may have 6,000 associated\
    \ pointers, links, and terms associated with the city of Durban, South Africa.\
    \ We will parse the Google server, ignoring everything except for the longitudinal\
    \ and latitudinal address of Durban. Think of the millions of application that\
    \ need to go to a server somewhere and extract only the information that the user\
    \ wants? This is critical coding, and I'm going to show you exactly how to do\
    \ this (and make it look really cool on your iPad).\n\nOf course you know that\
    \ the Internet is not “up” in the air or a cloud. Yes, a certain amount of data\
    \ is sent up to satellites but then comes back down to earth and travels through\
    \ lines until it gets to a server. Having iPad and iPhone apps that can grab important\
    \ data from a particular server is critical. I once had a student who wrote a\
    \ final class project app that parsed the server of Colorado Springs' traffic\
    \ cameras located here in Colorado. After parsing the correct images from the\
    \ city server, he sent a couple of snap shots per second of each intersection\
    \ back to the iPhone app so the user could “see ahead” at intersections and make\
    \ decisions based on the amount of traffic at the intersection. Beautiful! However,\
    \ as bright as this student was, when standing in the front of the lecture hall,\
    \ he pointed to the sky when he described how he wrote the code to parse the server.\
    \ I asked him if he knew that the server was located only 4 miles from campus.\
    \ He looked at me and said: “So, it does not go up into the cloud?”\n\nEven I\
    \ point up at the clouds when I say go onto the internet but I want you to remember\
    \ that, when we parse the Google server, we don't care where it is or how we got\
    \ there. We are only concerned with whether our code correctly parses the server\
    \ for only the information that is important to us.\n\n#### Preliminaries\n\n\
    This chapter's download files are a little different from previous tutorials.\
    \ Of course one does not have to download anything. You can follow along with\
    \ the book and run the app perfectly sans the video, the source code, or the download\
    \ files. I suggest you first try to do it without the video, download files, or\
    \ source code. However, if you feel inclined to utilize the download files, you\
    \ will want to pay attention to the following. The download files contain 6 images\
    \ and 9 boilerplate codes. They are set forth as shown in [Table 10–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos786971):\n\
    \n![images](images/00408.jpg)\n\n![images](images/00409.jpg)\n\nThese download\
    \ files can be located at [`http://bit.ly/nvc3Xk`](http://bit.ly/nvc3Xk). One\
    \ can download the sample code that I programmed on the video here: [`http://bit.ly/raKxPe`](http://bit.ly/raKxPe).\
    \ To view the screencast of this chapter's exercise, go to [`http://bit.ly/pEsztt`](http://bit.ly/pEsztt).\n\
    \n**THE BIG PICTURE**\n\n> We will have many versions of the big picture in this\
    \ chapter. First, we will view the code form “30,000” feet, taking a very broad\
    \ overall view of our landscape. Then, as we drill downward, we will always keep\
    \ track of the big picture. Here's the first big picture:\n> \n> 1.  Populate\
    \ a table with a list of cities\n> 2.  Code a pin to drop to the center of a selected\
    \ cities' map\n\n#### A New Single View Template\n\n> ![images](images/00410.jpg)\n\
    > \n> Figure 10–1\\. Select the Single View Application icon, and press return\
    \ or next.\n\n1.  As in `myStory_01`, we will use a Single View Application. So\
    \ open Xcode and enter `N`, as shown in [Figure 10–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos788657).\
    \ After selecting the Single View Application, press enter/return.\n\n    ![images](images/00411.jpg)\n\
    \n    Figure 10–2\\. Name your app `myStory_02` making sure Storyboard and automatic\
    \ referencing is on.\n\n2.  In order to follow along with me as closely as you\
    \ can, name it “`myStory_02`”, select “iPhone”, check the “Use Storyboard” and\
    \ “Use Automatic Reference Counting” but leave the “Class Prefix” and “Include\
    \ Unit Tests” unchecked, as shown in [Figure 10–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos789396).\
    \ Automatic Referencing is really out of the scope of this book but, in very basic\
    \ terms, Automatic Reference Counting (ARC) is code that invokes your Mac's automatic\
    \ memory management for Objective-C objects and blocks. This frees the experienced\
    \ programmer from the need to explicitly insert retains and releases.\n\n####\
    \ Bring in the Images!\n\n![images](images/00412.jpg)\n\nFigure 10–3\\. Drag in\
    \ your graphics.\n\n3.  Just as we did in `myStory_01` after going to my website\
    \ at [`http://bit.ly/oqnNM7`](http://bit.ly/oqnNM7) and downloading the images\
    \ and boilerplate code onto your desktop, drag in the 57 by 57 px for the iPhone\
    \ classic, the 114 × 114 px for the iPhone 4S Retina Display. Also bring in the\
    \ 640 × 960px splash screen for iPad and iPhone Retina displays and, as shown\
    \ in [Figure 10–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos790539),\
    \ drag in the 320 by 480px for the classic iPhone.\n\n    ![images](images/00413.jpg)\n\
    \n    Figure 10–4\\. Drag the images into the Supporting Files Folder.\n\n4. \
    \ Because we always want to keep thing nice and orderly and in their proper place,\
    \ you will see that the files holding the images you just dragged into Xcode are\
    \ in the root directory. We want to drag them into their proper location – the\
    \ Supporting Files folder. This is illustrated in [Figure 10–4](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos791378).\n\
    \n#### Organize Storyboard\n\nOne of the most benign ways one can really get lost\
    \ in Storyboarding is not focusing on exactly how your structures connect and\
    \ associate with your objects in Storyboarding. It is so easy to look at the Storyboard\
    \ canvas and believe everything is great while not noticing that the wrong element\
    \ is actually connected. So, make sure you follow along exactly as I am here.\n\
    \n![images](images/00414.jpg)\n\nFigure 10–5\\. Select the Storyboard.\n\n5. \
    \ Select the storyboard, as shown in [Figure 10–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos792699).\n\
    \n    ![images](images/00415.jpg)\n\n    Figure 10–6\\. We do not want a View\
    \ Controller here.\n\n6.  When Storyboard first opens up, you'll see a View Controller,\
    \ as shown in [Figure 10–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos793134).\
    \ We are selecting the default view Controller because we need to delete it. This\
    \ is quite easy to grasp: we want a TableView with all its bells and whistles,\
    \ the ones that are not there if you merely add a table onto a View Controller.\
    \ We will make our own view Controller later. Right now, we need to delete the\
    \ default View Controller, so go ahead and do it, as shown in [Figure 10–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos793134).\n\
    \n**THE BIG PICTURE**\n\n> 1.  Populate a table with a list of cities\n>     1.\
    \  Create a Table View\n> 2.  Code a pin to drop to the center of a selected cities'\
    \ map"
