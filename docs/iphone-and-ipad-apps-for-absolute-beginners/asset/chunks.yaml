    a page and then select the popover again, it keeps the underlying image below
    the popover as shown in [Figure 11–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos944567).


      ![images](images/00490.jpg)  


    Figure 11–26\. A beautiful Splash screen presents itself while the screen loads.


    26\. Once we select a cell, the splash screen appears while the page loads from
    the Internet or from iTunes. Here, in the right hand image, we see the popover
    placed on top of the first image.


      ![images](images/00491.jpg)  


    Figure 11–27\. Orientation working with iTunes


    27\. We need to have a little patience with orientation correcting itself with
    iTunes. This is something Apple needs to work on. Just be patient. [Figure 11–27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos945160)
    shows the 2^(nd) selection on the left hand side and the first iTunes selection
    on the right hand side.


    ### In Ending


    This has been a wonderful journey, but it''s really only the start. As I''ve gone
    through this second edition, I cannot help but think of all the fresh minds that
    will read these exercises and struggle through them, then break through to create
    awesome apps and make money! How many more of my students and readers of this
    book will work at Apple!? Wow! It''s been a great motivation for me to think about
    this.


    On a sad note, as I was finishing this book, Steve Jobs passed away. God bless
    you, Steve.


    I hope to see you all on the forum. I do not answer questions submitted to me
    by email but I will answer those exact same questions if you post them on the
    forum ([`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY)) because then everybody
    can share my answers. I would also like to encourage you to help. No matter how
    much of a beginner you are, get into the forum and help others. Helping others
    speeds up your journey.


    Peace.


    Dr. Lewis


