    ### Static Analysis


    `Xcode 4.2`中的`Static Analysis`允许你在工作区窗口内对代码进行分析、调试和编辑。只需在项目导航器中点击要调试的项目，然后选择`Product`
    ![image](images/00027.jpg) `Analyze`。分析器会遍历你的代码，然后导航器会打开一个列表，列出它发现的问题。带有箭头的蓝色矩形会指向你的错误。


    ## 本章前瞻


    在[第9章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)中，你将学习为`iPhone`和`iPad`编写一个应用，该应用结合了`iOS5`的两大强大工具：`storyboarding`和`MapKits`。这是一个简单的应用，但背后却蕴含着巨大的教学和学习曲线。你要构建的应用只需在一个预先给定的经纬度位置上放置一个图钉。其关键点在于将`storyboarding`和`MapKits`连接起来。


    ## 第9章


    ## MapKit 与 Storyboarding


    自从构思这本书以来，我一直期待撰写关于`MapKit`框架和`Storyboarding`的章节。这一章以及接下来的两章将是我们共同努力的结晶。我们的旅程即将结束，以一个高潮收尾是再合适不过的了。我相信，将`MapKit`框架、`Storyboarding`、`TableViews`和`iTunes`整合起来不会让你失望。这并非易事。我们在过去三章中的旅程将如下进行：[第9章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)介绍`Storyboarding`和`MapKit`框架。[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)介绍`Storyboarding`、`TableViews`和`MapKit`框架。最后，在[第11章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_030.html#filepos880094)中，我们将探讨`Storyboarding`和`iTunes`商店（即你发布应用的地方）。我们稍后会详细讨论[第11章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_030.html#filepos880094)，但可以这样说，我将向你展示最引人入胜的应用是如何整合`Storyboarding`、`MapKit`框架、`TableViews`以及互联网/`iTunes`商店的。


    在本章中，我们将看到一些最酷、最成功的应用正是基于`MapKit`框架。我们将把这个框架置于`Storyboarding`平台之上，这将是一项巨大的成就。我之所以把这些概念留到最后，主要是因为这些主题需要一定的经验，以免让学生感到不知所措。我曾在一个坐满渴望学习的、大多是初学者的程序员的阶梯教室教授这门课程，我痛苦地了解到，当我屈从于学生们的热情，试图在学期中途教授`MapKit`时，我总能毫无例外地把全班带进死胡同。


    尽管`MapKit`为我们提供了编写功能强大、生动有趣的应用的手段，但它也要求我们非常清楚并完全理解各种方法、类和框架。将这一应用与`Storyboarding`相结合更增加了挑战的难度。最初，本书的范围并不包含所有这些概念；但最终，我不可能写了这本书却把`MapKit`排除在外！


    因此，在开始之前，我们需要坐下来审视一些东西。`MapKit`作为一个工具箱，是一套具有挑战性的实用程序和工具，但我们将介绍一些基础知识，并学习如何将它们与`Storyboarding`结合使用，以成功且富有创意地完成本章的示例。我们将首先讨论框架和类。然后，我们将看到`MapKit`无需我们编写任何代码就能实现什么。之后，我们将深入挖掘，看看其他程序员使用`MapKit`做了什么，并从中汲取经验。我们已经了解了`Storyboarding`，但现在我们要添加一些真正创新的代码。在磨练了我们对方法的理解，并对`MapKit`中包含的框架、类和其他`Apple`好东西有了相当程度的掌握之后，我们将从容地开始练习。


    在本章的后半部分，我将在“探究我学生的`MapKit`代码”一节中献上一道丰盛的“餐后甜点”。我不会以一堆杂乱的技术参考资料作为结尾，而是会展示我的三位学生在与`MapKit`相关的项目中取得的成果。我希望，当我们看到这些有代表性的学生在完成我的课程后不久就能取得的成就时，我们都会更有动力去迎接下一个挑战。


    我的目标是让我们所有人都能达到这样的境界：我已经用`Storyboarding`编写了一个基本的`iPad MapKit`应用，并且我理解如何充满信心地向前迈进，掌握更高级的目标，即在[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)中协调`Storyboarding`、`TableViews`和`MapKit`框架。'
  raw: '#### Fix-it


    Assuming that you will stay with the LLVM compiler, Fix-it scans your source text
    as you type and marks syntax errors with a red underscore and a red flag in your
    gutter. You can read the Fix-it message by clicking the symbol, and it will provide
    you with the reasons why it thinks you have a possible syntax error. Often, on
    smaller errors, Fix-it repairs your code automatically.


    #### Documentation


    The next tool that I see being widely used because of its easy access is Xcode''s
    documentation. All you do is open the Organizer window (![image](images/00031.jpg)![image](images/00032.jpg)2),
    click the Documentation button located in the toolbar, and then click the jump
    bar to navigate up and down. See [Figure 8–38](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos644314).


      ![images](images/00351.jpg)  


    Figure 8–38\. Organizer


    Xcode 4.2 also provides online help for the Xcode IDE. This can be accessed by
    clicking on the disclosure triangle next to Xcode Help in the documentation navigator
    or by choosing Help ![image](images/00027.jpg) Xcode Help. You will find that
    most of these online help documents come along with a video. You will also want
    to know that many of the Xcode''s help articles are also available as contextual
    help, as explained at the Apple site here: `bit.ly/oY2jG9`. What this means is
    that the help tutorials can be reached from the shortcut menus by control-clicking
    any of the main UI areas in the workspace or Organizer window.


    Quick Help in Xcode 4.2 and onward is more powerful than it ever was. At this
    stage, we just plough through our tutorials, but you will find it useful as you
    evolve as a programmer. Option-single-click to open Quick Help, as illustrated
    in [Figure 8–39](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_025.html#filepos645690).


      ![images](images/00352.jpg)  


    Figure 8–39\. Quick Help


    #### Static Analysis


    Static analysis in Xcode 4.2 allows you to perform analysis on, debug, and edit
    your code within the workspace window. Simply click the project you want to debug
    in your project navigator and then choose Product ![image](images/00027.jpg) Analyze.
    The analyzer grinds through your code, and then the navigator opens with a list
    of the issues it located. Blue rectangles with arrows will point you to your bugs.


    ### In the Chapter Ahead


    In [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382),
    you will experience learning to code an app for iPhone and iPad that combines
    two potent iOS5 tools: storyboarding and MapKits. It''s a simple app that has
    massive teaching and learning curves behind it. The app you will build simply
    has a pin drop on a previously disclosed longitudinal and latitudinal location.
    The important aspect is linking up storyboarding and MapKits.


    ## Chapter 9


    ## MapKit & Storyboarding


    I have been looking forward to writing this chapter on the MapKit framework and
    Storyboardingsince I first conceived this book. This and the next two chapters
    will represent the culmination of our work together. Our journey is almost over
    and it is fitting that we finish with a bang. I am confident that integrating
    the MapKit framework, Storyboarding, TableViews, and iTunes will not disappoint
    you. This is not a trivial matter. Our journey over the last three chapters will
    be as follows: [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)
    will be Storyboarding and the MapKit framework. [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)
    will be Storyboarding, TableViews, and the MapKit framework. Finally, in [Chapter
    11](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_030.html#filepos880094), we will tackle
    Storyboarding and the iTunes stores (the place where you will place your apps).
    We will get more into [Chapter 11](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_030.html#filepos880094)
    later, but suffice to say, I will show you how the most compelling apps incorporate
    Storyboarding, the MapKit framework, TableViews, and the Internet/iTunes store.


    In this chapter, we will see that some of the coolest and most successful apps
    are based on the MapKit framework. We will place this framework on top of the
    Storyboarding platform and doing so will represent a tremendous accomplishment.
    The major reason I saved these concepts for last is that the topics require some
    experience to not overwhelm the student. Teaching this course to a lecture hall
    full of eager, and mostlynovice, programmers, I learned the hard way that when
    I succumbed to the students'' enthusiasm and tried to teach MapKit midway through
    the semester, I invariably led the entire class into a brick wall.


    Even though MapKitprovides usthe means to write powerful and vivid apps, it also
    demands that we be quite aware of and fully understand methods, classes, and frameworks.
    Incorporating this application with Storyboarding further compounds this challenge.
    Originally, the scope of this book didn''t include all of those concepts; but
    in the end, there was no way I could write the book and leave out MapKit!


    So, before we begin, we need to sit back and look at a few things. MapKit, as
    a toolbox, is a challenging set of utilities and devices, but we will cover some
    of the basics and learn how we can use them with Storyboarding to successfully
    and creatively navigate the example in this chapter. We will first talk about
    frameworksand classes. Then, we will see what MapKitcan already do without us
    having to program anything at all. After that, we will dig deeper to see what
    other programmers have done using MapKit and we will glean what we can from them.
    We''ve already looked at Storyboarding; but now we want to add some truly innovative
    code. After honing our understanding of methods, and once we have acquired a respectable
    grasp of frameworks, classes, and other Apple goodies contained inMapKit, we''ll
    gently tackle the exercise.


    In the latter half of the chapter, I will serve an extended dessert in the “Digging
    My Students'' MapKit Code” section. Rather than finishing with an eclectic mix
    of technical references, I will present three of my students'' efforts in MapKit–related
    projects. I am hopeful that when we look at what these representative students
    were able to accomplish very shortly after they passed my class, we will all feel
    even more inspired to set our course for the next challenge.


    My objective is to get us all to a place where we can say: I have programmed a
    basic iPadMapKit app with Storyboarding, and I understand how to move forward
    with confidence into the more advanced goal of coordinating Storyboarding, TableViews,
    and the MapKit framework in [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315).'
