    # Nibs、Zibs 和 Xibs


    还记得在图 3–5 中，我让你打开 nib 文件时的情况吗？你可以看到它写的是“xib”，更令人困惑的是，少数开发者称其为“zib”文件。忽略它们就好，把
    xib 文件读作“nib”。在丹佛最近举行的 360iDev iPhone 开发者大会上，大多数演讲者明确地将 `.xib` 文件称为“nibs”而非“zibs”。但无论我们如何称呼它们，理解这些文件的本质对我们来说都很重要。它们是什么？我们需要它们吗？你需要知道它们如何工作吗？


    你还记得吗？在步骤 5 的图 3–5 中，当你点击那个 nib 文件时，是如何打开 Interface Builder 视图的？正是在这里，你看到了视图，并开始将项目拖放到你的视图设计区域。这到底是怎么回事呢？


    实际上，当你从 Cocoa 或 Objective-C 的层面检查 nib 文件时，你会发现它们包含了激活 UI（用户界面）文件所需的所有信息，将你的代码转化为图形化的
    iPhone 或 iPad 艺术作品。你还可以将不同的 nib 文件连接起来，创建更复杂的交互，正如你将在本书后面看到的那样。但为了继续学习，你需要在词汇表中添加两个词：“实例”和“实例化”。


    - **实例**：这些文件中存放的所有信息，都是为了能够创建你输入的按钮、标签、图片等项目的实例。这一系列指令被放置并保存到你的 nib 文件中，最终形成用户界面。代码和指令共同变得真实，并被用户感知——无论是看到、听到，甚至触摸到。

    - **实例化**：还记得在步骤 29 和图 3–29 中，我解释过你会看到方法 `- (IBAction)button:(id)sender{…}`，它看起来很像你在图
    3–22 到图 24 中从 Interface Builder 将动作拖拽到你的头文件时所实例化的那个动作吗？实际上，“实例化”这个词在你首次保存新项目时，有时也会以类似的方式使用。计算机实例化——使其变为现实并向你展示证据——一个通过分配一组子文件而创建的项目实体。在
    `helloWorld_03` 项目中，你看到了在步骤 27 中，我要求你查看那些颜色变为深灰色的 nib、头文件和实现文件？那么，这些文件是怎么来的呢？是你编程或创建的吗？不，是
    Xcode 在你创建项目时实例化了它们。Xcode 为你的项目赋予了“胳膊和腿”：两个 AppDelegate 文件和两个 ViewController 文件。


    > **注意**：你现在正在操纵这些“胳膊和腿”来做一些很酷的事情，我们称之为应用，并在 iTunes 商店中销售它们。


    当我们告诉计算机如何以及何时获取一些内存，并将其留出用于某个特定进程或一系列进程，当所有参数都满足时，用户就能体验到这些数据（即内存中分配的任何内容），我们就说我们“创建了某个事物的实例”。有时，我们将这些描述和指令的集合或文件称为类、方法或对象。在这次代码挖掘过程中，这些术语可能看起来混在一起，像是同义词，但事实并非如此。随着你继续阅读，你会理解每个术语都是一个独特的编码工具或装置，每个都用于特定情境，并以语法正确的方式与其他实体相关联。


    当我们说你在 nib 文件中创建了按钮和标签的实例时，我们真正想表达的是，当你运行代码时，计算机内存中由地址标识的特定部分，将负责处理事务，以生成你设计的用户体验。每次你的应用在
    iPhone 或 iPad 上启动时，界面都会由 nib 文件中的编排指令重新创建。考虑一下与图 3–9 中所示动作相关联的 nib 文件。你从库中拖了一个按钮到视图窗口，因此你创建了这个按钮的一个实例。如果有人问你这是什么意思，你可以直视他们的眼睛，带着锐利而神秘的眼神说：


    > > “通过创建这个按钮的实例，我指示计算机在适当的 `.xib` 文件中预留内存，当我的应用启动时，它会按照我的精确意图出现并与用户交互。”


    哇！


    ## 方法


    接下来我想更深入探讨的概念是方法。就像我对 nib 文件所做的那样，这次我只给你一个高层次的概述。你已经相当广泛地使用了方法，所以我只需告诉你你做了什么。


    查看图 3–23，在你将按钮拖到你的头文件后，你将其从输出口改为动作，并点击了连接按钮。然后你看到一段代码的实例出现了：


    ```

    - (IBAction)button:(id)sender

    ```


    我随后建议，为了让事情更清晰，你可以将方法命名为 `monkey`，使其变为：


    ```

    - (IBAction)monkey:(id)sender;

    ```


    在这里，你指示计算机将一个动作与按钮关联起来。


    - 这段代码中的第一个符号是减号（`-`）。它表示 `monkey` 是我们称之为实例方法的东西。

    - 另一方面，如果你在那里输入了加号（`+`），比如 `+ (IBAction)`，我们就会称其为类方法。


    一个符号（向处理器）宣告一个实例，而另一个符号宣告一个类。不过，这两个语句的共同点是方法 `monkey`。此外，仅凭这个名称，你就可以看出这是一个将在 Interface
    Builder 中执行的动作。没错，这就是 `Actions` 前面的 `IB` 的含义。明白了吗？史蒂夫·乔布斯在他设计 NEXT 电脑上的 Cocoa
    和 Objective-C 时，他对自己说，他想要 `Actions`，并称它们为 `IBActions`，以便提醒他自己和其他使用他代码的开发者，当我们输入
    `IBAction` 时，它是为 Interface Builder 中使用的 `Actions` 准备的。


    考虑一下这个类比：程序员说，“这是一个能帮助你画一所漂亮房子的应用。”这是一个头文件类型的声明。然后，程序员输入具体的指令，说明房子将如何建造，如何与景观融合/相对，背景是什么样的天气，等等。“在屏幕底部三分之一处画一条略微弯曲的地平线，在其中间位置放置一个
    4×7 的矩形，矩形上方是一个底边长度为……的梯形，”等等。这些具体的操作指令属于实现文件，因为它们描述了绘制房子的实际动作——即方法。


    因此，为了将你的按钮连接到一个名为 `hello` 的方法，你添加了如下代码，如图 3–24 所示：


    ```

    - (IBAction)hello:(id)sender;

    ```


    这创建了你的 `hello` 方法的一个实例。然后，你在内存中创建了一个位置来执行 `hello` 方法内部的代码。

