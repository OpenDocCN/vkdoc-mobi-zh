- fmt: '### A Little about Frameworks


    When Steve Jobs was fired from Apple, he formed a business called NeXT. In the
    early ''90s, his company produced beautiful, black, streamlined computers that
    made me drool with envy. A few of my professors owned a NeXT computer and I was
    aware of their capabilities. The most profound aspect of this outfit was not that
    they cranked out these black, streamlined boxes, but rather that they utilized
    a language called Objective–C. Jobs had found that, even though it was difficult
    to program in this complex language, the code it produced was able to “talk to”
    the microprocessor quite elegantly. So, what does this have to do with MapKit?


    What NeXT did was create frameworks of complex Objective–C code, which we can
    regard much like the tools that a carpenter might have in his toolbox. When we
    use `MapKit`, we are bringing into our own code a framework of map–related tools—just
    as a carpenter may have one set of tools for cabinetry and another specially made
    set specifically for making intricate furniture. These specialized tools will
    differ significantly from the type of tools that a roofing carpenter might use.


    To this end, we will bring two frameworks into `Xcode` that we have not used before.
    It will be almost as if we had been learning techniques as a flooring and cabinetry
    carpenter in [Chapters 1](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_010.html#filepos54331)–[8](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_024.html#filepos597398);
    however, today we are going to the hardware store to get outfitted for our next
    gig, which will be audio–video installations in walls and ceilings. Therefore,
    before we continue on to the next program, we are going to have to go buy two
    brand–new tools. One of our new tools, the `CoreLocation` framework, shows us
    where we are geographically. The other tool, `MapKit`, enables us to interact
    with maps in a number of different of ways.


    As we know, the way users interact with the iPad and iPhone is completely unlike
    anything ever seen before. Before the advent of these slick devices, 99% of all
    interactions with computers were based upon the mouse and a keyboard. As we have
    been learning from the examples we already programmed, we have used unique methods
    and classes to jump between screens and to sense when a user is pinching, tapping,
    or scrolling on the screen. To this already formidable set of tools, we are now
    going to add `CoreLocation` and `MapKit` frameworks.


    Most of the programming we have explored up until now has been relatively transparent.
    However, in this chapter, it won''t be quite so perceptible. We will have to really
    maintain our concentration in order to keep track of and understand how `MapKit`
    knows where we are on a map. We''ll examine how it follows our finger interactions
    and how it knows where we are in terms of the various screens and views associated
    with maps.


    One of the central areas of iPad/iPhone app development is event handling. Since
    this section confused many of my previous students, I will consciously do my best
    to keep us all focused on what we need to know from this area. If we get a firm
    grasp of the concepts of frameworks and classes, we will not be burdened by being
    overly concerned with event handling. We can get an idea of the scale of this
    topic by considering that while part of our app is keeping track of interacting
    both with a map and a GPS satellite, another portion of our code has to always
    be looking at when the user is going to direct the program to a new event.


    ### Important Things to Know


    There are three important things to know about the foundation of Storyboard and
    map–related applications in the iPad and iPhone arena. These two critical apps
    in [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)
    and [10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315) rely
    on four important tools: Storyboarding, `MapKit`, `CoreLocation`, and the `MKAnnotationView`
    class reference. As I have already indicated, we are not going to involve ourselves
    with how these sophisticated tools work so much as we are going to practice the
    art of deciding when to reach for which tool in our newly expanded toolbox.


    Among other things, these tools allow us to effortlessly create a beautiful flow
    of technology with Storyboarding, display maps in our applications, use annotations,
    work with Geocoding (which works with longitude and latitude), and interact with
    our location (via `CoreLocation`).


    When we want to interact effortlessly with Google Maps, we will use the Apple–provided
    `MapKit` framework. When we want to obtain our location or do cool things using
    GPS–satellite technology (with Google Maps)—we will use the `CoreLocation` framework.
    When we want to put it all together and seamlessly integrate with our user—we
    will take all the aforementioned technology and place it onto Storyboarding. Finally,
    when we want to place pins on a map, create references, draw chevron marks, or
    insert an image of our dog showing where he is on a map—we will call these annotations
    and, thus, use `MKAnnotationView`.


    ### Preinstalled MapKit Apps


    In order to take maximum advantage of the new ideas presented in this chapter,
    and be prepared to stretch and expand into a new level of creativity, we will
    first take a tour of the existing apps, preinstalled on the iPad and iPhone. It
    is important that we become familiar with these so that we can more easily add
    bells and whistles to our own creations—and that is on top of these ready–made
    “map apps,” as described at `Apple.com`.


    #### Find Yourself


    Say we''re in an unfamiliar neighborhood looking for a nearby restaurant. With
    iPhone, we can pinpoint our location on a map so we can figure out how to get
    there from where we are. iPhone 4 finds our location quickly and accurately using
    a combination of GPS, Wi–Fi, and cellular towers. As we move, iPhone automatically
    updates our location. When we arrive, we can drop a pin to mark our location and
    share it with others via email or MMS.


    > ![images](images/00353.jpg)


    *Figure 9–1\. Find yourself—a powerful zooming map function on the iPhone/iPad.*


    #### Search for a location


    We need a shot of espresso. Where''s the nearest cafe? iPhone with the `MapKit`
    framework has the answer. Just type “coffee” in the search field within Maps and
    suddenly nearby coffee houses appear on the map; all represented by pins. Searching
    works with specific addresses and business names, too. When we find what we''re
    looking for, we tap the pin to bring up more information, such as phone numbers,
    web addresses, and more. The “pin” extracts all the annotations we programmed
    in our `MKAnnotationView`.


    ![images](images/00354.jpg)


    *Figure 9–2\. Search for a location—use this in conjunction with, or in lieu of,
    the visual map (with highlighted route).*'
