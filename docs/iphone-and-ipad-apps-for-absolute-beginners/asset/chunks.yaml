    initials UI. You will represent “Interface Builder” with the initials IB.


    ![Images](images/00105.jpg)


    There are two things to note here. First, the `@` symbol talks to the innermost
    part of Xcode, which transforms your code into actions, and second, that it’s
    got something essential and important to announce. In fact, we call any statement
    beginning with `@` a “directive.” This `@interface` directive tells Xcode that
    you have interface stuff concerning `helloWorld_03`, and that the particulars
    will be enclosed within brackets `{}`.


    Before you began dragging outlets into your code in [Figure 3–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos186389),
    notice how the opening bracket, “{” was empty! You had not said anything yet,
    right? You knew what you wanted to do, so you got the compiler’s attention with
    the @interface directive, by creating your IBOutlets (Interface Builder Outlets)
    to write on your UILabels (User Interface Labels) and to have a separate Action
    associated with your button.


    #### The Inspector Bar


    Back in Step 8, [Figure 3–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos176529),
    while briefly explaining the Inspector Bar, I said that we’d get into it a little
    more. So as promised, here is some insight as to how the Inspector Bar is set
    up.


      ![images](images/00106.jpg)  


    Figure 3–34\. Focusing in on the Inspector Bar.


    In [Figure 3–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos217547),
    I’ve recreated how I illustrate the Inspector Bar in class on the marker board.
    As you become familiar with the Xcode 4 environment, you will find yourself using
    the Inspector Selector Bar to choose a workspace that you will need at any phase
    of your coding. For now, let’s zoom in on the most intense view: the Utilities
    View. Clicking on Utilities View, as shown in the top right-hand of [Figure 3–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos217547),
    you will see how I’ve created a zoomed up version of the Inspector Selector Bar,
    with its submenus located to the left of the panel. Starting at the top:


    *   File inspector: This is where one manages file attributes such as name, type,
    and path within your project.

    *   Quick Help: Just what it says.

    *   Identity inspector: Gives access to deep stuff such as class names, access,
    and labels.

    *   Attributes inspector: For adjusting attributes available to an object.

    *   Size inspector: Allows you to tinker with an interface object’s initial size,
    position, and auto sizing.

    *   Connections inspector: Allows you to view the outlets and actions for your
    interface objects.

    *   Bindings inspector: For configuring bindings for view objects.

    *   Effects inspector: To adjust animation protocol such as transitions, fades,
    and other visual characteristics of selected objects.

    *   File templates: Common templates that you can drag from the library to the
    project navigator.

    *   Code snippets: Like clip art but for coders—snippets of source code that you
    can use by dragging into your files.

    *   Objects: You use these interface objects by directly dragging onto your nib
    file in the Interface Builder editor window.

    *   Media files: Just as it says, they are graphics, icons, and sound files that
    can be dragged directly to your nib file in the Interface Builder editor window.


    #### NSStrings


    Going back and digging a little deeper into the `NSString` statement in your implementation
