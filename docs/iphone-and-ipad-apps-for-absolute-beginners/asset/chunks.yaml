    \    `stringByReplacingOccurrencesOfString:@\"width=100\" withString:@\"width=\\\
    \"100\\\"\"];`\n9.  `strNoParaQueryResults = [strNoParaQueryResults`\n    `stringByReplacingOccurrencesOfString:@\"\
    height=150\" withString:@\"height=\\\"150\\\"\"];`\n10.  `strNoParaQueryResults\
