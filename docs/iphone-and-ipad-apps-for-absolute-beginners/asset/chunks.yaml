- fmt: '3. 对于本次家庭作业，我要求我的学生们拍摄一张自己的照片，将其裁剪为`320 × 480`像素的图像，然后保存为`.png`文件。这样，我就能更快地将名字与正确的面孔对应起来。对于正在阅读本书且并非我学生的读者，请继续获取一张自己的照片，裁剪至`320
    × 480`像素，并保存为`.png`文件到您的桌面上。如果您没有图形编辑器，那么可以直接使用我在本项目中所用的图片。您可以通过`ow.ly/50ksH`下载它（向下滚动到从顶部数起的第三个视频教程`helloWorld_03`，并点击盒子图标）。一个压缩文件将会下载到您的电脑上，其中包含我在本例中使用的图片，名为`DrLewis.png`。请将其放到您的桌面上。图片放到桌面后，按下`Command
    + Tab`（![Images](images/00031.jpg)![Images](images/00059.jpg)），直到`Xcode`被高亮显示。松开![Images](images/00031.jpg)![Images](images/00059.jpg)键，此时`Xcode`将再次填满您的屏幕。将`Xcode`稍微最小化，以便您能看到带有图片的桌面，或者对于部分读者来说，能看到如[图
    3-3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos167718)所示的我的照片。抓住它，将其拖到您的“Supporting
    Files”文件夹中，然后放入该文件夹内。


    注意：以防您注意到，与提供确切的代码以及从我在线教程中直接截取的我编程精确代码的图片所带来的积极方面相伴的，也有一个消极方面：您会看到我犯错。在这个例子中，我不小心错过了“Supporting
    Files”文件夹。我说了声“哎呀”，然后迅速将其从`helloWorld_03`文件夹拖入“Supporting Files”文件夹，这正是[图 3-3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos167718)中的图片被截取的时刻。如果您注意到了这一点，请忽略它。只需将您的文件放入“Supporting
    Files”文件夹，然后我们继续。


    ![Images](images/00073.jpg)


    图 3-4. 通过选择“将项目复制到目标文件夹…”选项并点击“Finish”按钮来完成图片的导入。


    4. 我看到学生们犯的最常见错误之一就出现在`Xcode`管理的这个简单阶段：他们忘记了勾选“如果需要，将项目复制到目标组文件夹”复选框。当您将文件导入电脑上的“Supporting
    Files”文件夹时，如果您没有勾选“将项目复制到目标组文件夹”，一切都会正常运行，从而给您一种虚假的安全感。在这种情况下，即使`Xcode`被告知您的支持文件（如此例中的图片）位于您的“Supporting
    Files”文件夹中，实际情况是，有一个小的备注在说：“老兄，我对这个不负责，文件不在这里，它还在所有者的桌面上！”所以，作为代码编写者的您，继续完成您的作业。每次您运行代码，并且`Xcode`调用以访问支持文件时，这个不负责任的“指针引用”家伙就一直说：“它不在这里——它还在您的桌面上！”于是您完成作业，一切运行良好。您微笑着压缩工作成果并发送给我。我给您零分，然后您哭了。为什么？嗯，这个不负责任的指针引用告诉我，您的引用文件在我的桌面上。不！它不在我的桌面上，它在您的桌面上，并且您因为疏忽大意、依赖指针引用先生而不是选择“复制项目”复选框，在10分中得了0分。这样，您就解雇了指针引用，并将文件放入了您的程序中。这样，当您压缩并发送给我，我打开您的工作进行评分时，它就会打开，并且所有相关文件都在您想要的确切位置。因此，在将您的图片拖入“Supporting
    Files”文件夹后，请勾选“将项目复制到目标组”复选框，如[图 3-4](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos170344)所示，然后点击“Finish”。现在您就处于良好状态，不会再被指针引用先生弄哭了。


    注意：我能听到您在问：“那为什么还要给我们这个选项呢？”这里有一个简单答案，涵盖了大多数但并非所有情况。假设您正在设计一个游戏或程序，它拥有一个包含数百万个文件、电影、角色或玩家可能说的可能回复的数据库，并且这个数据库太大，无法容纳在iPhone或iPad上。在这种情况下，您就不会勾选“将项目复制到目标组”复选框，并让指针引用先生说：“哟，我对这一切都不负责，它不在这里，它在这个URL上：`http://www.wherever.com`。”'
  raw: '3\. For this homework assignment, my students are required to take a photo
    of themselves, crop it into a 320 × 480 image, and then save it as a `.png` file.
    This way, I can associate names with the correct faces in a faster manner. For
    those of you who are reading this book and are not my students, go ahead and get
    a picture of yourself, crop it to 320 × 480, and save it onto your desktop as
    a `.png` file. If you do not have access to a graphics editor, then feel free
    to use the picture I used for this project. You can download it at ow.ly/50ksH(scroll
    down to the third video tutorial from the top, `helloWorld_03,` and click on the
    box icon). A compressed file will be downloaded to your computer with the picture
    I used in this example, named `DrLewis.png`. Place it onto your desktop. Once
    it is on your desktop, press Command + Tab (![Images](images/00031.jpg)![Images](images/00059.jpg))
    until Xcode is highlighted. Release the ![Images](images/00031.jpg)![Images](images/00059.jpg)
    keys, at which point Xcode will now fill your screen again. Minimize Xcode slightly
    so you can see the desktop with your picture, or for some of you, the picture
    of me as illustrated in [Figure 3–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos167718).
    Grab it, drag it over to your Supporting Files folder, and drop it inside the
    folder.


    NOTE: Just in case you noticed, along with the positive attributes associated
    with giving you the exact code and images of me programming precise code that
    is taken directly from my online tutorials, there comes a negative aspect: you
    seeing me make errors. In this case, I accidently missed the Supporting Files
    folder. I said “Oops” and quickly dragged it from the helloWorld_03 folder into
    the Supporting Files folder, which is exactly when the image from [Figure 3–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos167718)
    was snapped. In case you noticed this, ignore it. Just drop your file into the
    Supporting Files folder, and let’s move on.


    ![images](images/00073.jpg)


    Figure 3–4\. Complete importing your image by selecting the “copy items into destination
    …” option and clicking on the Finish button.


    4\. One of the most common mistakes that I see students make happens at this simple
    stage of Xcode management: they forget to check the “Copy items into destination
    group’s folder if needed” checkbox. When you import a file into the Supporting
    Files folder on your computer, if you do not check “Copy items into destination
    group’s folder” everything will work fine, giving you a false sense of security.
    In this case, even though Xcode is told that your supporting files, such as the
    image in this example, reside in your Supporting Files folder, what''s really
    happening is that there’s a little note saying: “Dude, I take no responsibility
    for this, the file is not here, it’s still on the owner’s desktop!” So you, the
    writer of your code, go on doing your homework. Every time you run your code,
    and Xcode calls to access a supporting file, this irresponsible “Pointer Reference”
    guy just keeps saying, “It''s not here—it''s still on your desktop!” So you finish
    your homework and everything works great. You smile as you zip up your work and
    send it to me. I give you a zero and then you cry. Why? Well, the irresponsible
    pointer reference is telling me that your reference files are on my desktop. Nope!
    It’s not on my desktop, it’s on yours, and you get zero out of 10 for being negligent
    and depending on a Pointer Reference dude rather than selecting the “Copy items”
    check box. This way, you fire the Pointer Reference and have the file in your
    program. This way, when you zip it up and send it to me, and I open up your work
    to grade, it opens with all your relevant files in the exact place you want. So
    after dragging your picture into the Supporting Files folder, check the “Copy
    items into destination group” check box, as shown in [Figure 3–4](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos170344),
    and then click Finish. Now you''re in good standing, and will not be brought to
    tears by the Pointer Reference dude.


    NOTE: I can hear you asking “Why even give us this option then?” Here’s a simple
    answer that covers most but not all bases. Let’s say that you were designing a
    game or program that has a database of millions and millions of files, movies,
    characters, or possible responses that a player may say, and this database was
    too large to fit on an iPhone or iPad. Here, you would not check the “Copy items
    into destination group” box, and allow the Pointer Reference dude to say, “Yo,
    I take no responsibility for any of this, it’s not really here, it’s at this URL
    located at [http://www.wherever.com](http://www.wherever.com).”'
