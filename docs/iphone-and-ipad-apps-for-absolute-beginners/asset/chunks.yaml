    Segue 样式类型之一。`Push` 是标准从右侧滑入的动画。`Modal` 是一种用于在两个视图之间来回切换的 Segue 类型。`Custom` 要求你编写自己的
    Segue 类型。嗯，我们稍后再做吧。无论如何，我希望你尝试这些不同的样式，以便熟悉它们。不同的学生有不同的偏好。暂时保留默认设置即可，因为它们工作良好，如图
    [Figure 7–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos529218) 所示。


    ![images](images/00244.jpg)


    Figure 7–19. 选择你喜欢的转场动画。


    19. 转场是每种 Segue 样式可用的动画类型。同样，坚持使用默认设置。我选择 `Flip Horizontal` 样式，没有特别的原因，只是它适合我。如果你愿意，也可以选择其他样式。请随意尝试，但要牢记可用性。很容易让动画变得过于花哨。我经常发现，流行的应用以及更聪明的学生们，往往更少追求炫酷，而更注重实用和效率。


    ![images](images/00245.jpg)


    Figure 7–20. 运行它，看看你在第一阶段实现了什么。


    20. 此时，运行应用将会向你展示，要得到一个有方向感且能工作的应用，你实际上只需要做多么少的工作。因此，如图 [Figure 7–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos531106)
    所示，点击那个“Run”按钮，看看你得到了什么。


    注意：你可能想模仿我在这个阶段让我的学生们做的事情。我让他们擦除到目前为止所做的一切，除了桌面上的五个图标。然后我让他们一遍又一遍地重复这些步骤，直到他们能够：1)
    到达这个阶段（排除步骤 18 和 19）；2) 运行它；3) 在 50 秒内让它在模拟器中显示出来，且不借助书本。


    我强烈鼓励你这样做！


    就像高尔夫球手需要练习挥杆以形成肌肉记忆一样，你需要能够不假思索地达到这一步。首先，按照自己的节奏，参考书本操作，然后越来越快，直到你做到 50 秒以内！是的！


    ![images](images/00246.jpg)


    Figure 7–21. 果然，点击按钮会翻转视图，显示一个空白视图，顶部有一个名为“Root”的导航栏。


    21. 点击“Run”按钮后，模拟器打开，瞧！它工作了！你几乎没做什么，也没使用任何代码，只是移动、拖拽和连接了几个项目，就拥有了一个运行中的应用！点击按钮会翻转视图，显示一个空白视图，顶部有一个名为“Root”的导航栏，如图
    [Figure 7–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos532799) 所示。太棒了！


    #### Phase II: 设置视图控制器


    当然，你想让这个应用比现在做得更有趣一些。请记住，在这个不断演进的应用中，你有三种类型的人类——男人、女人和极客——他们都有可能进化成超级极客。这意味着你需要有三个视图控制器直接连接到你的导航控制器。因此，在你开始将三个视图控制器拖到
    Storyboard 上之前，请确保：


    *   你能看到所有东西——足以容纳三个水平放置的`UIViewControllers`。

    *   你的网格对齐能够保持，这样你的连接线以后就不会看起来很傻，从而更难跟踪。


    ![images](images/00247.jpg)


    Figure 7–22. 缩小视图并将一个新的视图控制器拖到 Storyboard 上。


    22. 那么，让我们再向 Storyboard 中放入三个视图控制器，放在根视图控制器的右侧。另一种方法是先放入一个，然后按住 Option 键，将第一个拖到另一个位置，这样就可以复制一份。这属于个人偏好，但如果你能做到，肯定会让你看起来像个超级极客。Anthony
    在此视频中做得很好：`bit.ly/oMp984`。尝试让你的屏幕看起来像图 [Figure 7–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos534751)
    所示，该图展示了这三个`UIViewControllers`中的第一个正在被拖到 Storyboard 上。记住，如果你在缩放方面遇到问题，只需点击缩放控制区域中的“等于”按钮，这样你就可以向各个控制器添加其他内容。


    ![images](images/00248.jpg)


    Figure 7–23. 所有三个视图控制器都放置在 Storyboard 上之后的界面。


    23. 如图 [Figure 7–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos535942)
    所示，这是你将所有三个视图控制器拖到 Storyboard 后屏幕应该呈现的样子。注意它们已对齐、等间距分布并锁定在网格上。


    注意：对象无法吸附？如果你不断地尝试将对象拖到视图上而它们始终无法吸附，这会令人沮丧。因此，请确保你回到正常的缩放级别。


    ![images](images/00249.jpg)


    Figure 7–24. 添加一个`UIImageView`。


    24. 展望不久之后，你仍然需要放置四张图片：一张图片放入你的根视图，三张图片（分别代表男人、女人和极客）放置到你刚刚创建的三个`UIViewControllers`上。我无需提醒你，如果你想让图片出现在应用的视图中，你需要将这些图片放在`UIImageViews`上。不过现在，让我们先关注根视图，在那里你需要一张图片和用于导航到三个子视图的按钮。将一个
    Image View 拖到你的根视图上，如图 [Figure 7–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos536979)
    所示。


    ![images](images/00250.jpg)


    Figure 7–25. 在 Attributes 面板中设置图片。


    25. 你现在需要选择我创建的`NavControll.png`图片，该图片现在位于 Attributes 面板中并可供选择，如图 [Figure 7–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos537934)
    所示。同样，你可以选择任何你想要的图片。但是，在你花费太多时间创建自己的图片之前，请记住以下注意事项。


    注意：请记住，在未来的几个月里，当你使用 Storyboard 创建应用时，这里将完全没有图片。相反，你将拥有代表选择器、表格或游戏关卡等内容的代码。现在，暂时使用我的图片，但要记住，未来在这个
    Storyboard 的节点上你将用到更强大的东西。


    ![images](images/00251.jpg)


    Figure 7–26. 将`UIButtonView`拖到导航控制器上并复制它。'
  raw: '18\. Select the storyboard segue you created. Now let''s choose a style of
    segue to use. In the Attributes Panel, you can select one of three style types
    of segue. “Push” is the standard slide in from the right animation. “Modal” is
    a type you can use for a segue that goes back and forth between two views. “Custom”
    requires that you write your own type of segue. Mmm, let''s do that later, huh?
    Anyway, I want you to play around with these different styles, so that you become
    familiar with them. Different students have different tastes. For now, just leave
    the defaults because they work well, as illustrated in [Figure 7–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos529218).


    ![images](images/00244.jpg)


    Figure 7–19\. Select the transition of your choice.


    19\. Transitions are the animation types available for each style of segue. Again,
    just stick with the default. I chose the Flip Horizontal style for no particular
    reason other than it suits me. You can choose another style, if you want. Feel
    free to experiment here, but keep usability in mind. It is very easy to get too
    flashy with the animations. I often find that the popular apps, and smarter students,
    tend to have less flash and more utility and efficiency.


    ![images](images/00245.jpg)


    Figure 7–20\. Run it to see what you achieved in Phase 1.


    20\. At this point, running the app will show you how little you actually had
    to do to get a working app with some direction. So, as depicted in [Figure 7–20](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos531106),
    hit that “Run" button and see what you have.


    NOTE: You may want to emulate what I make my students do at this point. I make
    them erase everything they have done so far, except for the five icons on their
    desktop. Then I make them repeat these steps over and over again until they can
    1) get up to this point, excluding steps 18 and 19; 2) run it; and 3) have it
    appear in the simulator within 50 seconds, without using the book.


    I STRONGLY encourage you to do this!


    Just as a golfer needs to practice his swing to create muscle memory, you need
    to be able to get to this point without even thinking. First, do it at your own
    pace with the book, and then go faster and faster until you get below 50 seconds!
    Yeah!


    ![images](images/00246.jpg)


    Figure 7–21\. And, sure enough, clicking the button flips the view and shows us
    a blank view, with a navigation bar at the top named “Root”.


    21\. After hitting the “Run” button, the simulator opens and voila! It works!
    You''ve hardly done anything, and used no code, simply having shifted, dragged,
    and connected a few items, and you now have a running app! Clicking the button
    flips the view and shows a blank view, with a navigation bar at the top named
    “Root,” as depicted in [Figure 7–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos532799).
    Beautiful!


    #### Phase II: Setting Up the View Controllers


    Of course, you want to make this app do something more interesting than what you
    now have. Remember, in this evolving appyou have three types of human—Men, Women
    and Geeks—and they can all potentially evolve into Über Geeks. This means that
    you need to have three views connected directly to your Navigation Controller.
    So, before you begin to drag three view controllers onto the storyboard, let''s
    make sure:


    *   That you can see everything—enough for three horizontally placed `UIViewControllers`.

    *   That your alignment on the grid can be kept so that your connection lines
    don''t get silly looking later on, and therefore harder to follow.


    ![images](images/00247.jpg)


    Figure 7–22\. Zoom out and drag a new view controller onto the storyboard.


    22\. So, let''s drop three more view controllers into the storyboard, to the right
    of the Root View Controller. Another way to do this is to drop one and then, while
    holding the option key, drag the first one to another position, which makes a
    copy. This is a personal preference, but it sure makes you look like a supercalifragilistic
    geek if you can do it. Anthony does a great job of this in the video seen here:
    `bit.ly/oMp984`. Try to get your screen looking like the one in [Figure 7–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos534751),
    which shows the first of the three `UIViewControllers` being dragged onto the
    storyboard. Remember, if you''re having trouble with the zoom, just click the
    equal button in the zoom control area so that you can add other stuff to the individual
    controllers.


    ![images](images/00248.jpg)


    Figure 7–23\. Your storyboard after all three view controllers are placed onto
    the storyboard.


    23\. As shown in [Figure 7–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos535942),
    this is how your screen should look after you have dragged all three view controllers
    onto your storyboard. Note that they are aligned, spaced equally apart, and locked
    into the grid.


    NOTE: Objects not sticking? It will get frustrating if you continually try to
    drag objects to a view and they never stick. So, be sure you return to the normal
    zoom level.


    ![images](images/00249.jpg)


    Figure 7–24\. Add a `UIImageView`.


    24\. Looking into the immediate future, you still need to place four images: one
    image goes into your Root, and three images (representing Man, Woman, and Geek)
    are placed onto the three `UIViewControllers` you just created. I should not have
    to remind you that if you want to have an image appear on your app''s view, you
    need to park those pictures on `UIImageViews`. For now, though, let''s focus on
    the Root, where you need an image and buttons for going to the three images. Drag
    an Image View onto your Root, as shown in in [Figure 7–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos536979).


    ![images](images/00250.jpg)


    Figure 7–25\. Set the image in the Attributes Panel.


    25\. You now need to choose the `NavControll.png` image I created, which is now
    located and selected from the Attributes Panel, as illustrated in [Figure 7–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos537934).
    Again, you can select any image you want. But, before you spend too much time
    creating your own image, keep the following note in mind.


    NOTE: Remember that in the months to come, as you use storyboarding to create
    your apps, you will not have an image here at all. Instead, you will have code
    representing a picker, a table, or a level of a game, to name a few examples.
    For now, just use my image, but keep in mind that you will later use greater things
    at this juncture of storyboarding.


    ![images](images/00251.jpg)


    Figure 7–26\. Drag a `UIButtonView` to the navigation controller and duplicate
    it.'
