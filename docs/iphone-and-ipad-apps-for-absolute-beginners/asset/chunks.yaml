    are pistons, spark plugs, carburetors, and so on. You do not have to yank the
    engine open to know these items exist; you can just install it and connect it
    to the chassis, the drive train, and the electronics. In storyboarding, you are
    going to use a whole new method for designing your app; you will simply have to
    connect it to your outlets, view controllers, and the other elements of your app.
    You don''t have to open up storyboard and look inside, as you know it works; you
    simply have to know how to connect things. So let''s do it!'
  trans: '

    #### 编译时与运行时


    在第 24 步中，我顺带提到了编译时和运行时这两个术语，并指出在当时的上下文中，两者的区别在于前者意味着你在 Xcode 的界面构建器部分进行配置，而后者意味着你通过在实现文件中编写代码来完成配置。这在那时是对这两个术语的恰当定义，但现在可以对它们进行更正式的定义。


    `编译时` 表示当你的项目在模拟器或真实 iOS 设备上运行之前，进行编译或构建时发生的事情。这些包括在`.h`和`.m`文件中定义类、在 nib 文件中组织和布局`UIView`，以及在
    Xcode 的各种检查器中所做的配置。所有在编译时设置的内容都精确地定义了你的应用启动时的状态。


    而`运行时`则描述了你的应用开始运行后的一段时间。此时，你编写的所有代码才真正执行，从而改变应用的状态，使其不同于编译时设置的状态。在本章中，你通过在实现文件中发送消息的方式来指定第二个标签页的图像。因此，在编译时，要显示的图像是未指定的；但在运行时，一系列指令被执行，以便在你提供的`UIImageView`中显示所需的图像。


    但为什么这个区别很重要呢？在编写这个应用的过程中，你证明了可以在运行时做到与编译时完全相同的事情。然而，通过执行指令来达成目标需要额外多点击几次、多拖拽几次，并多写几行代码。如果你在编译时就已经知道如何配置某样东西，那么编写代码来完成相同操作的优势就会减弱。然而，如果你希望在应用运行期间动态地改变某个对象的属性（上一章的应用就是一个很好的例子），那么在编译时显然不可能设定状态的所有方面。


    简而言之，编译时定义了应用的起始状态，而运行时则描述了应用开始运行后所发生的动作。


    ### 本章前瞻


    在第 7 章中，你将进入下一个复杂层次：故事板。


    故事板是苹果公司提供的一种新方式，用于布局用户如何在应用中导航，这与电影制作人设置故事板来展示电影如何从一个场景过渡到下一个场景的方式非常相似。故事板拥有连接应用中各个视图的转场（发音为“segways”）。直接跳到故事板是很有诱惑力的，但最好先像你已经做的那样，了解一下这些按钮和图像背后的代码。所以休息一下，然后让我们进入故事板的世界。


    ## 第 7 章


    ## 故事板


    这第七章将介绍一种快速且可视化地创建应用的新方法。首先，你将布局一些视图，看看如何在不编写代码的情况下连接它们，并且你将免费获得一些很酷的过渡动画。这项新技术首次引起公众注意是在苹果宣布他们将引入一个前所未见的新功能——故事板时。该功能将被内置到
    Xcode 中。它将允许轻松布局那些使用导航栏和标签栏在视图之间进行转场的工作流应用。


    苹果接着表示，新的故事板将为你管理视图控制器，同时以可视化的方式为你创建易于管理的项目地理空间视图。它将指定在视图之间切换时使用的转场和 segue，而无需手动编写代码！所有人都满怀期待地等待
    Beta 版的发布。当它发布时，所有人都被震撼了。它彻底改变了整个编程格局。


    ### 讲故事


    当你讲故事时，你在与他人交流。无论老幼，人人都爱听故事。讲故事是日常与他人交流中不可或缺的一部分。当你与用户交流时，你是在告诉他们如何沿着你创建的路径前进，这条路径会带他们到达目的地，获取他们想要的东西——无论是一张地图、一首歌、一个食谱、天气信息、他们停车的位置、一个电话号码、一部电影，还是其他东西。那么，为什么以前没有人想到这一点呢？为什么创建应用被视为极客编程代码，而讲故事的人则被看作是另一回事？我不确定答案，但当我开始思考这个问题时，我意识到这是一个不可思议的概念。想想看。早在
    20 世纪 20 年代初，当沃尔特·迪斯尼开始思考组织并构建卡通的最高效方式时，他想出了故事板的概念。他会召集他的艺术家们，他们把一系列包含故事关键场景的板子挂起来，然后将这些板子组织成一个美丽的故事。这项技术取得了巨大的成功；它主导了电影行业，成为了规划每一部现代电影的蓝图。你可以在这里看到一部展示迪斯尼的故事板如何主导电影行业的精彩影片：`bit.ly/oWg5mc`。


    新的 iOS5 故事板功能非常相似，只不过你看到的未必是图片；你看到的是应用的地理空间表示，它允许你出色地组织应用。在 iOS5 出现之前，nib 文件是用来定义用户界面的。别无选择，只能一次定义一个视图控制器。如果你有
    16 个视图控制器，你就必须定义 16 次用户界面。这不仅枯燥乏味，而且变得复杂混乱。相反，正如你很快会看到的，一个故事板文件将你所有的用户界面都捕捉在一个地理空间视图中，使你能够轻松创建和编辑你的所有独立视图控制器，以及视图控制器之间的转场。你可以像
    Disney 工作室的家伙们那样，像摆弄一副扑克牌一样移动它们。这样一来，在你的应用中实现和编辑整个用户界面与体验的流程就变得容易了。


    ### 路线图回顾


    现在，你已经对幕后发生的事情有了足够的了解，可以引入一种新的做事方式了。这就像你已经花了足够多的时间摆弄割草机发动机和基本的汽车发动机，从而能够欣赏往你的旧车里安装一台全新的发动机。当你安装这台新发动机时，你知道发动机内部有活塞、火花塞、化油器等等。你不必把发动机拆开就知道这些东西的存在；你只需安装它，并将其连接到底盘、传动系统和电子设备上即可。在故事板中，你将使用一种全新的方法来设计你的应用；你只需将其连接到你的输出口、视图控制器以及应用的其他元素上。你无需打开故事板去看内部，因为你知道它是如何工作的；你只需知道如何连接东西。所以，让我们开始吧！

    '
- fmt: '### Roadmap: Four Phases


    This app has been divided into four phases. The most important phase is the first
    one because it will be common for most of the potential uses for storyboarding.
    Because Phase I is the lowest common denominator for so many of the future storyboards
    you will find yourself doing, I focus on this quite a bit, and encourage you to
    perform exercises that will enable you to quickly become efficient at storyboarding.
    Phase I sets up the root of what will be done over and over again, and the three
    phases that follow are specific to this particular app.


    - Phase I sets up the core of most potential storyboarding configurations.

    - Phase II starts at [Figure 7–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos534751),
    and is comprised of setting up the view controllers for Male, Female, and Geek.

    - Phase III starts at [Figure 7–34](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos548122),
    and is comprised of establishing the content of the view controllers.

    - Phase IV starts at [Figure 7–54](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos564808),
    and is comprised of closure and coding.


    ### Evolve: A View-based Storyboard Application


    Once again, you will work with images that let you know where in the story you
    are. In more technical terms, you will use images rather than code to represent
    a state in your app. I encourage my students to use images because, if it does
    not work, then you know it''s a bug in the high-level code that directs the user
    from state to state—not a bug in the code for a particular state.


    In this app, you will see a funny set of states that show the state of a male,
    a female, and the other kind of human being—geeks. It will also show that when
    a man or a woman evolves into a higher state of consciousness they become geeks!
    Then, to add another state, for fun and to illustrate the purpose, it will be
    shown that when a geek evolves they become an Über Geek! As funny as this is,
    it simply gives us a nice set of diverse states that, in storyboarding, will be
    easy, but that in the old one-at-a-time nib manipulation would have been substantially
    more complex.


    First, download the images from here: `bit.ly/p1L5cv` where you can also download
    the code or view the video. Once you have downloaded the `.zip` file containing
    the images, unzip the folder, and store the images on your desktop.


    I will not be holding your hand as tightly as I have thus far. Instead, I will
    assume that you know how to perform some of the functions you have done repeatedly
    in this book. Yes, I will be talking to you in a more technical manner.


    #### Phase I: Creating Core Storyboarding Configurations


    Let''s get going with Phase I, where you will build a core configuration.


    > ![images](images/00226.jpg)

    >

    > Figure 7–1\. Start by choosing a Single View Application skeleton. More views
    will be added later.


    1. OK, let''s start a new project in Xcode by using your keyboard shortcut, ![images](images/00031.jpg)![images](images/00032.jpg)N,
    and selecting the Single View Application project type. The Single View Application
    will be the starting place for this application, and likely many more of this
    book''s applications, as well as your own.


    ![images](images/00227.jpg)


    Figure 7–2\. Start with just an iPhone version of the app and the new storyboard
    feature selected to allow us to jump directly into design and layout. I named
    it "`MyStory`."


    2. Let''s name this application "`MyStory`." The Company Identifier is not relevant
    to us at this time, so feel free to put something creative there. For simplicity,
    just target the iPhone device family at this time. The brand new "Use Storyboard"
    option will need to be checked. This will present you with a slightly different
    project layout once you''ve saved the project. Go ahead and click the Next button.


    ![images](images/00228.jpg)


    Figure 7–3\. Drag the images that you downloaded earlier to the project''s "Supporting
    Files" directory in Xcode.


    3. The first thing to do is add some image files to the project by dragging them
    from the desktop to the project Supporting Files directory. This is just a logical
    directory, and the files can actually go almost anywhere in the `MyStory` directory.
    Be sure that these files are copied in the proceeding dialog box.


    ![images](images/00229.jpg)


    Figure 7–4\. Select the "`MainStoryboard.storyboard`" file and you will be presented
    with your only default view.


    4. Now, select the "`MainStoryboard.storyboard`" file in Xcode''s project file
    browser on the left. This shows you something a little familiar, a `UIView`. But
    this is not just a `UIView`, it also has an associated controller that is automatically
    created and linked to the view. You can add more views shortly, but one important
    thing to note here is that double clicking the grid pattern allows you to zoom
    in and out. You must be in normal viewing mode to add visual elements to the views.


    ![images](images/00230.jpg)


    Figure 7–5\. Clicking this button returns you to normal viewing mode. The two
    buttons on either side allow you to zoom in and out.


    5. It''s important to become familiar with the viewing and zoom modes, as you
    will constantly want to zoom in to edit a detailed view and then immediately zoom
    out again to view the entire storyboard. Clicking the center equal sign button
    returns you to the normal viewing mode. The two buttons on either side allow you
    to zoom in and out.


    ![images](images/00231.jpg)


    Figure 7–6\. You need to bring up the Utilities Panel to add some new views to
    the project.


    6. Bring up the Utilities Panel by clicking the button circled in red in [Figure
    7–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos517763). Having a
    larger screen makes working with Xcode easier, as more and more panels and views
    take up valuable screen space.


    ![images](images/00232.jpg)


    Figure 7–7\. Select a Navigation Controller.


    7. Once you have opened up the Utilities Panel, locate the "Navigation Controller"
    (`UINavigationController`). Select it and start dragging the Navigation Controller
    onto your Storyboard, as shown in [Figure 7–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos518407).


    ![images](images/00233.jpg)


    Figure 7–8\. Drag a new Navigation Controller to the storyboard area; placement
    is not important at this point. Two new views appear, with a link between them.'
