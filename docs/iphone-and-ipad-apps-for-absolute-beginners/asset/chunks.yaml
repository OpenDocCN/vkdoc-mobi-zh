    \ 2.2.2.2.1. 导入 `myPos` 头文件 (已完成)\n>     > 2.2.2.2.2. 创建私有接口 (已完成)\n>     > 2.2.2.2.3.\
    \ 合成 `detailItem` (已完成)\n>     > 2.2.2.2.4. 编写 `detailItem` 方法并更新其视图\n>     >\
    \ 2.2.2.2.5. 编写 `configureView` 方法\n>     > 2.2.2.2.5.1. 访问 `googleapis.com`\n\
    >     > 2.2.2.2.5.2. 解析经度和纬度坐标\n>     > 2.2.2.2.5.3. 更新详情项的用户界面\n>     > 2.2.2.2.5.4.\
    \ 设置缩放和放置大头针\n>     > 2.2.3. `myMasterTableViewController` 用于控制到 MapKits 的转场\n\
    >     2.3. 微调 Storyboard 以适应我们的新代码\n\n![图片](img/00443.jpg)\n\n**图 10–34.** 将光标放置在\
    \ `@end` 和 `shouldAutorotate` 结束位置之间。\n\n34. 现在我们要编写代码，以便访问 Google 服务器、获取数据并将其带回\
    \ iPhone 或 iPad。对于解析和其他繁重的代码，我喜欢将其插入到 `shouldAutorotateToInterfaceOrientation`\
    \ 方法之后，当然，要在我所编写类的 `@end` 之前。在我们的例子中，虽然没有其他选择，但你会发现，在 `myMasterDetailViewController`\
    \ 中插入转场方法时，它可能离代码底部很远。因此，请按图 10–34 所示和所指示的位置放置光标。\n\n![图片](img/00444.jpg)\n\n\
    **图 10–35.** 我们来解析 Google 服务器。\n\n35. 我不反对你将解析 Google 服务器的“08 Part 2myDetailViewController\
    \ m”样板代码粘贴过来，因为我们大家都会反复使用它。我们大家都会在各种场合使用并微调它。如果你跳过了步骤 34 的说明，请确保你知道粘贴的位置。我也会讲解你需要了解并微调的关键部分。苹果公司很可能很快就会推出一个类或框架来实现这个功能，因为大家都用这个代码来解析服务器。将代码粘贴到正确的位置后，我们来过一遍。\n\
    \na. 回到我们开始这最后一段代码的地方。我们首先需要导入 `myPos.h` 文件，因为在设置缩放和放置大头针的代码时，我们会用到 `myPos` 标注的标题和坐标。我们看到的第一个方法是\
    \ `setDetailItem`，如下所示。我们设置 `detailItem` 以便使用它，一旦它在本地存储，我们就会配置视图，换句话说，就是创建一个新的地图，当需要更改时，它会自动重绘。`configureView`\
    \ 是 `myDetailViewController.m` 中接下来一个巨大的方法。\n\n```objc\n- (void)setDetailItem:(id)newDetailItem\n\
    {\n    if (_detailItem != newDetailItem) {\n        _detailItem = newDetailItem;\n\
    \n        // Update the view.\n        [self configureView];\n    }\n}\n```\n\n\
    b. 接下来我们研究的是 `configureView` 方法，它是一个实用方法，在内部调用。这是真正行动开始的地方。首先，让我们看看如何连接到服务器。我们访问\
    \ `mapURI` 关联的服务器，在这里就是 Google 的 API 地理编码服务 `maps.googleapis.com`。我们将向它请求一个城市，然后让代码处理其中的空格，无论是以空格还是“%20”表示的空格。\n"
