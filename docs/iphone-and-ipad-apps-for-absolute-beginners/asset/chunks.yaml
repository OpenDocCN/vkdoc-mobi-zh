    \n12. 我们需要确保正在创建的此类是 `UITableViewController` 的子类，因为它需要知道如何执行表格操作，例如在表格中容纳我们的城市。因此，在将其命名为\
    \ `myMasterTableViewController` 之后，请确保它是 `UITableViewController` 的子类，否则你以后会后悔的。参见图\
    \ 10–12。\n\n![images](img/00422.jpg)\n\n*图 10–13. 创建两个 UIViewController 子类中的第一个。*\n\
