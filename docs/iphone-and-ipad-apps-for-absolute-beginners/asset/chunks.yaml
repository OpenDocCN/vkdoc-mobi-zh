    3.  为了创建第二张图像（我们称之为顶层），请复制背景图层照片（在我的示例中是 `STAIR.png`）。然后裁剪此副本，创建一个尺寸精确为 320 ×
    299 像素的图像。是的，我知道这个高度数值有点奇怪——但请相信我！现在你得到了一张大致呈方形的、背景照片底部三分之二的副本。接下来，在上面粘贴一张局部图像——通常是从某个有趣或不同寻常的物体中裁剪出来的部分。这将生成类似图
    4-3 中的图像：伊曼努尔·康德出现在背景场景前。这个修改后的顶层当然会保存为 `.png` 文件。这样，你最终会得到一个准备好的顶层，它由原始背景照片的底部区域以及粘贴在上面的某个有趣人物或物体组成。你大概能猜到，我们将编程让计算机从背景图像开始，然后根据一些用户输入，插入顶层——当然，要确保底边完美对齐。这将营造出一种幻觉，仿佛我们那位有趣的客人或物体突然凭空出现。我们的顶层不会影响背景上半部分的空间；我们将这个区域保留给文本，稍后也会指示计算机插入文本。我们之所以采用这种方式，是因为
