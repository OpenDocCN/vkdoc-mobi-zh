    8. 当你将导航控制器拖到故事板上时，你会看到不仅仅是一个单独的视图，而是一对连接的控制器，它们以视图的形式呈现。将其拖放到任意位置，因为你可以根据需要自由移动它。实际上，对于你在故事板中将要做的几乎所有事情，情况都是如此。你处理的不仅仅是视图，你实际上是在看到苹果将每个`UI`元素实例化为一组视图和控制器，使你能够构建转场。这些转场在
    Xcode 中被称为 Segues（发音为 seg-ways），如图 [Figure 7–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_023.html#filepos519022)
    所示。


