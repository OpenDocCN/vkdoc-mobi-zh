- fmt: '#### Creating the User Interface


    OK, now we’re ready to start dragging and dropping items onto your View Design
    area, the image that the user sees when they look at their iPhone.


    ![images](images/00074.jpg)


    Figure 3–5. Open your nib file.


    5. In order to do this, you open up your nib file, just as you did in the two
    previous apps. So, open up your `nib` file by going to your `helloWorld_03` folder
    and selecting the `helloWorld_03ViewController.xib` file, as illustrated in Figure
    3–5.


    ![images](images/00075.jpg)


    Figure 3–6. Close the Navigator View.


    6. You''re going to need to have space in the Xcode 4 environment, so first, close
    the Navigator View, because we do not need it for now, and then, open the Utilities
    View, so we can see the tools and icons we need to dress up the View Design area.
    In Figure 3–6, you can see that I am closing the Navigator View. See Figure 3–34
    for more details on Xcode 4 nomenclature.


    ![images](images/00076.jpg)


    Figure 3–7. Drag a `UIImageView` onto your View Design area.


    7. With your Utilities pane open, as shown in Figure 3–7, go to the bottom section
    of the panel and, making sure that you have selected the icons view (depicted
    by four little squares on the icon above the right-hand arrow in Figure 3–7),
    drag a `UIImageView` onto your View Design area. The reason we need a `UIImageView`
    is because we need to have an image of you underneath the buttons and text labels.
    That picture that you just dragged in needs to have a place where it can live.
    A `UIImageView` is just the guy for this job. He is going to reside underneath
    all of your buttons and embrace whatever picture you tell him to embrace.


    ![images](images/00077.jpg)


    Figure 3–8. Associate your selected image with your `UIImageView`.


    8. Remember the image that you dropped into the `Resources Folder` back in Figure
    3–3? Well that’s the image that you will want the `UIImageView` to be, so you
    just drag it onto your `View Design area` to encapsulate it. To do this, you need
    to tell it to do so, and this is done by making sure that you have selected the
    `Attributes Inspector` in the `Inspector Bar` (see the icon under “`View`” in
    Figure 3–8, or as explained in Figure 3–33 at the end of this chapter). With the
    `Attributes Inspector` open, click on the `Image` drop down menu, and guess what
    you’ll see. You’ll see the name of the file you dragged into the `Resources Folder`.
    Select it, and Voila! The image appears in your View Design area. Isn’t that cool?


    ![images](images/00078.jpg)


    Figure 3–9. Drag a button onto your View Design area.


    9. Drag a button from your Library onto your View Design area and place it at
    the bottom, as illustrated in Figure 3–9. Make sure it’s nicely centered. Just
    to remind you: when you click on this button, your code will invoke an action
    that will grab the name of the person that the user entered into a Text Field
    object, and it will output that person’s name in a label followed by the text,
    “Hello World!”


    ![images](images/00079.jpg)


    Figure 3–10. Type “Press Me” on the button, and then drag a Text Field object
    onto your View Design area.


    10. Immediately after releasing your button, double click on it and type, “Press
    Me”, just as you did in the two previous assignments. Now go back to your Library
    and drag out a Text Field object onto your View Design area, placing it towards
    the top (as illustrated in Figure 3–10) and nicely centered. Remember that the
    text that the user types into here will be sent out to the label when they press
    the button saying “Press Me.”


    ![images](images/00080.jpg)


    Figure 3–11. Center your Text Field object, enter the text “Enter Your Name” in
    the text field, and center the text.


    11. After centering your Text Field object and expanding it in your View Design
    area, as illustrated in Figure 3–11 (where it says “Enter Your Name”), click in
    the text field, go over to your Utilities Inspector pane, and enter the text that
    you want the user to see when they look inside the Text Field object. You want
    to tell the user to enter their name here, so type “Enter Your Name” inside the
    text field box. Also, center this text so that it is centered inside the text
    field box, and make sure that the text field box is also centered in the View
    Design area.


    ![images](images/00081.jpg)


    Figure 3–12. The three steps that ensure that the text in the Text Field object
    clears the instant the user activates the field. Also, note that a clear button
    icon is in the field, and “Done” appears on the Return Key (see Figure 3–32)


    12. Once the user starts typing, you want your prompt text to disappear. To make
    doubly sure that your text disappears, keep the `clear button` (the grey crossed
    icon) active in the `Text Field object`, which allows the user to press it to
    clear your text—just in case your professor uses a mouse to grade your homework
    on the simulator and wants to make sure you know two ways to delete the text in
    the `Text Field object`. You should also delete the word “Return” on the keypad’s
    return key, and replace it with the text “Done.” I have illustrated the aforementioned
    three steps in Figure 3–12.


    ![images](images/00082.jpg)


    Figure 3–13. Drag a Label object onto your View Design area.


    13. Once the user has entered their name into the `Text Field object`, and they
    press the button, you need to display the user’s name and text in a label. You
    have yet to place a Label object onto the View Design area, so do it now, by dragging
    it from the Library onto the `View Design area`, as illustrated in Figure 3–13.


    ![images](images/00083.jpg)


    Figure 3–14. Center and expand your Label object. Also, change the text color
    if necessary, and center the inside of the Label object.


    14. Place the Label object just below your Text Field object, and expand it, while
    still keeping it centered, with respect to the View Design area. Do this by quickly
    expanding one side and then expanding the other until the purple center line appears.
    This is the fastest method of expanding and centering at the same time. Next,
    center the text inside the Label object, and then, depending on the color of the
    picture, change the text color to make sure it stands out. In case of Figure 3–14,
    the color behind the text was black, so it was changed to white.'
