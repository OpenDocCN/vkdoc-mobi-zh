    ![images](images/00021.jpg)


    **图1–14.** 点击“Xcode 4.2 for Lion in the Mac App Store”链接。


    9. 你的下载将开始，根据你的连接速度，可能需要2到15分钟。你的屏幕应该看起来类似于[图1–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos74987)所示。


