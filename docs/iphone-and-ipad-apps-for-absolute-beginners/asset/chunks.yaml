    *   `Output` is your returned value `Output` `= [[NSString alloc] initWithFormat:@"%@
    says: Hello World!", Name];`  

    *   On the right-hand side of the equal sign is the message `Output =` `[[NSString
    alloc] initWithFormat:@"%@ says: Hello World!", Name];`  

    *   `NSStringalloc` is the receiver `Output = [[NSString alloc] initWithFormat:@"%@
    says: Hello World!", Name];`  

    *   `initWithFormat` is the method name `Output = [[NSString alloc]` `initWithFormat:``@"%@
    says: Hello World!", Name];`  

    *   `@"%@ says: Hello World!"` and `Name` are the parameters `Output = [[NSString
    alloc] initWithFormat:@"%@` `says: Hello World!", Name``];`


