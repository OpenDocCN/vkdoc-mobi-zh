- fmt: "> Looking at this code, let’s talk about it briefly. Don’t worry if you space\
    \ out. What I will ask you to do is what I make my students do in class, and that\
    \ is to read the following out loud three times:\n\nThis is called a method and\
    \ you could have named it “monkey” if you wanted to. If you did, it would look\
    \ like this:\n\n`- (IBAction)monkey:(id)sender;`\n\nI only want you to know two\
    \ things about this method you called “monkey.” First, that it has a return type,\
    \ and second, that it has an argument.\n\n- `monkey`'s return type: Our `monkey`\
    \ method returns stuff to us, which is explained by saying: “Method `monkey`'s\
    \ return type is an `IBAction`.” Read the bold code louder.\n\n  `- (IBAction)monkey:(id)sender;`\n\
    \n- `monkey`'s argument: `monkey`'s argument is of type `(id)`, which in your\
    \ case, points through the `sender` to the button you dragged into the header\
    \ file in [Figure 3–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos193238).\
    \ Read the bold code louder.\n\n  `- (IBAction)monkey:(id)sender;`\n\nOK, you\
    \ can now take a nice deep breath. You are done with peaking under the hood for\
    \ a while. You are also done with the header file, and now you can move onto the\
    \ implementation file.\n\n## Avoiding an Annoying Error\n\nBut before you move\
    \ onto the implementation file, you have to do a little housekeeping.\n\n![images](images/00095.jpg)\n\
    \nFigure 3–24. Close the Assistant.\n\n24. You can see in this 3rd tutorial that\
    \ Xcode 4 has done some remarkable things. However, as I write this book, a number\
    \ of frustrated Xcode 4 programmers are encountering an irritating error. Before\
    \ you move to the next step, I will show you how to avoid this error. (There is\
    \ a chance that this quirky attribute of Xcode 4 will have been fixed by the time\
    \ you read this.) Close the Inspector, as shown in [Figure 3–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos196589),\
    \ and then open up the Utilities pane again.\n\n![images](images/00096.jpg)\n\n\
    Figure 3–25. Connect your text box to the delegate – Part 1: Activate `textBox`\
    \ and start control-dragging.\n\n25. The way you have been connecting objects\
    \ from Interface Builder directly into the code has been really cool, except that\
    \ it seems that you cannot leave everything to the clever folks at Apple to make\
    \ all the connections for you—yet. So, click once in the text box and control-drag\
    \ to File’s Owner. If you do not connect this to the delegate then you will get\
    \ a very irritating error called a SIGABRT, which means Xcode is going to abort\
    \ because it cannot connect. It’s really bad news, but the good news is that you\
    \ can avoid it. Here’s how.\n\n![images](images/00097.jpg)\n\nFigure 3–26. As\
    \ you near File’s Owner, you will want to connect it to the delegate.\n\n26. As\
    \ you near File’s Owner, it presents you with a dark-gray contextual dialogue\
    \ that tells you that you’ve already connected File’s Owner to the button and\
    \ the delegate, but you know better—it’s still dangling there. You want to connect\
    \ `textBox` to the delegate. Move your mouse right over it and when it activates,\
    \ let go of the mouse. See [Figure 3–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos198433).\
    \ With this done, you’ve connected all the goodies you dragged onto the View with\
    \ the header file. The geeky way to say this would be to say: “Yo, dude, all my\
    \ actions and outlets are now functionally connected!” Sounds pretty good, huh?\
    \ What’s more, you kind of understand what you’ve been doing! You brought buttons,\
    \ text boxes, and labels onto your View. Then you wired them up to function as\
    \ either outlets or actions. Now, all that’s left is to dial in some code where\
    \ necessary.\n\n## Setting up the Coding Environment\n\nBefore dialing in the\
    \ code you need to do a little more housework.\n\n![images](images/00098.jpg)\n\
    \nFigure 3–27. Open the Navigator, and then go to Standard View and save everything.\n\
    \n27. First, let’s get your screen in a manner conducive for writing code, by\
    \ clicking on the Navigator (see the right arrow in [Figure 3–27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos200036)),\
    \ and then on Standard View (middle arrow, the left icon in the Editor section).\
    \ With this done, please get in the habit of saving things. Go over to your nib,\
    \ header, and implementation files that are now colored dark grey, click on each\
    \ one, and save them by pressing `command + S` (![Images](images/00031.jpg)S).\
    \ Or use `Apple+Option+S` to save all. Please do not use your mouse to save, as\
    \ I will magically appear, take your book away, and declare that you have failed\
    \ in your endeavor to become a geek. If you decide to work for a computer company\
    \ after reading this book and they see you using your mouse to save, they will\
    \ laugh at you because geeky people do that to those who save with a mouse. I’m\
    \ serious!\n\n![images](images/00099.jpg)\n\nFigure 3–28. Open the ViewController’s\
    \ implementation file and delete unnecessary boilerplate code.\n\n28. Click on\
    \ the ViewController’s implementation file. That’s the one that ends with a `.m`,\
    \ as in `helloWorld_03ViewController.m`. Delete the `viewDidUnload` method, as\
    \ shown in [Figure 3–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos201327).\n\
    \n## Creating a Programming Roadmap\n\nYou’re now ready to get into some code\
    \ that does something useful.\n\n![images](images/00100.jpg)\n\nFigure 3–29. The\
    \ raw IBAction button method, before you start programming it.\n\n29. There are\
    \ two items of interest for you here: first, what and where you are programming,\
    \ and second, a roadmap that will guide you as you program your first chunk of\
    \ code:\n\n- Looking at what you are programming: You can see in [Figures 3–22](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos192579)\
    \ through [24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos196589),\
    \ that you have the method `(IBAction)button:(id)sender{…}`, which looks pretty\
    \ similar to the action instantiated when you dragged over an action connected\
    \ to your button from the interface builder to your header file. The only difference\
    \ is that in the implementation file you need to implement what needs to happen\
    \ when a person presses this button. To do this, you substitute the semi-colon\
    \ with curly braces, and it’s in these curly braces that you are going to instruct\
    \ what exactly will happen when a person presses this button.\n\n  > **NOTE:**\
    \ I’m going to explain this twice: first, as an overview and then again in a specific\
    \ way that I have developed for newbie Objective-C programmers. I will be doing\
    \ this quite often in the book. It really works well so bear with me and come\
    \ along for the ride.\n\n- Your roadmap: Looking at [Figure 3–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos202316),\
    \ your road map states that you will have two text strings that you should call\
    \ `Name` and `Output`. `Name`, `NSString`, receives text that the user enters\
    \ into `textBox`. Clear `Output NSString`, and then let it receive the text from\
    \ `NSString`. After placing it in front of “:says Hello World!”, it sends this\
    \ to Label so the viewer can see it. Lastly, clean out `Output NSString`.\n\n\
    The code is divided into 5 steps:\n\n1.  Create strings to manage your text input\
    \ and output\n2.  Manipulate the text around\n3.  Display your hard work\n4. \
    \ Housekeeping\n5.  Get rid of the keyboard"
