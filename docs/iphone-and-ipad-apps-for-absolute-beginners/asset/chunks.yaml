- fmt: "21\\. We need to allocate the array we are pointing to in our private array.\
    \ In other words, we need to create an array, which we have already called \"\
    cities\" in our private Interface. We are initializing the \"cities\" variable\
    \ with a new array we will construct. So let's make cities be an `NSArray` that\
    \ has objects in it. It goes on until it sees the `nil` at the end of it. Feel\
    \ free to enter your own cities if you like. See the code below and the code in\
    \ \"02 Part myMasterTableViewController m\" being pasted In [Figure 10–21](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos817141).\n\
    \n```\ncities = [NSArrayarrayWithObjects:@\"New Delhi\", @\"Durban\", @\"Islamabad\"\
    ,\n@\"Johannesburg\", @\"Kathmandu\", @\"Dhaka\", @\"Paris\", @\"Rome\", @\"Colorado\
    \ Springs\", @\"Rio\nde Janeiro\", @\"Beijing\", @\"Canberra\", @\"Malaga\", @\"\
    Ottawa\", @\"Santiago de Chile\", nil];\n```\n\n![images](images/00431.jpg)\n\n\
    Figure 10–22\\. Finish coding `myMasterTableViewController.m`\n\n22\\. We need\
    \ to do three small tweaks to make sure our table can handle the list of cities\
    \ we gave it and pop it onto the `TableView`. We need to have the table return\
    \ 1 section, have the number of rows equal the number of cities, and, finally,\
    \ enable viewing of the city names in each cell:\n\na. Have the table return 1\
    \ section: Go to `numberOfSectionsInTableView` and add the `return1` after the\
    \ comment. By default, it contains `return 0` already. Be advised to remove or\
    \ change this. Otherwise, you may wind up with two `return` statements and be\
    \ very upset.\n\nNOTE: The normal weight code is the default code that the clever\
    \ people at Apple have already coded for us. The bold text is what you will need\
    \ to enter.\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
    {\n    // Return the number of sections.\nreturn 1;\n}\n```\n\nb. We now need\
    \ to modify the table view methods for our purposes. We need to first have the\
    \ number of rows equal the number of cities. Go to `numberOfRowsInSection` and\
    \ we'll make the number of rows be dynamic, which means that no matter the amount\
    \ of cities we put into the table, we'll make the return be the `count` of the\
    \ total cities:\n\n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    // Return the number of rows in the section.\nreturn [cities count];\n\
    }\n```\n\nc. Lastly we need to make sure that the city names show up in the cell.\
    \ We need to grab the appropriate city names that we will show in each cell from\
    \ the index and insert it into the `textLabel`. Go to the bottom of `tableViewcellForRowAtIndexPath`\
    \ and enter the following.\n\nNOTE: Right now I do not want you to be concerned\
    \ about the meaning of each line of grey code that Apple has coded on our behalf.\
    \ At this point, I just want you to accept that it works and we will continue.\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n   static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView\ndequeueReusableCellWithIdentifier:CellIdentifier];\n   \
    \ if (cell == nil) {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    reuseIdentifier:CellIdentifier];\n    }\n    // Configure the cell...\n[cell.textLabel\
    \ setText:[cities objectAtIndex:indexPath.row]];\n    return cell;\n}\n```\n\n\
    ![images](images/00432.jpg)\n\nFigure 10–23\\. Go back to Storyboard and select\
    \ the Table View Controller.\n\n23\\. We need to associate the Table View with\
    \ `myMasterTableViewController`. Go back into Storyboard and select the Table\
    \ View Controller in the Document Outline, as shown in [Figure 10–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos822279).\n\
    \nTHE BIG PICTURE: CODING MYMASTERTABLEVIEWCONTROLLER: STEPS 24 to 26.\n\n> 1.\
    \  Populate a table with a list of cities\n>     1.1. Create a Table View\n> \
    \    1.2. Organize our classes\n>     1.3. Code `myMasterTableViewController.m`\n\
    >     1.4. Enable Storyboard to bring up the Table\n>         > 1.4.1. Associate\
    \ the Table View with `myMasterTableViewController`\n> 2.  Code a pin to drop\
    \ to the center of a selected cities' map\n\n![images](images/00433.jpg)\n\nFigure\
    \ 10–24\\. Select `myMasterTableViewController`.\n\n24\\. Select the Identity\
    \ inspector in the Utilities. Then, in Custom Class, open the drop down menu in\
    \ Class and select `myMasterTableViewController`, as shown in [Figure 10–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos824202).\
    \ This ensures that all the code we wrote in Steps 20-22 is now going grind away\
    \ underneath our Table View and make magic!\n\n![images](images/00434.jpg)\n\n\
    Figure 10–25\\. Run It.\n\n25\\. We need to run it. See [Figure 10–25](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos824908).\n\
    \n![images](images/00435.jpg)\n\nFigure 10–26\\. A beautiful Splash screen takes\
    \ us to a populated table.\n\n26\\. Make sure we see a splash screen appear and\
    \ then a table populated with our list of cities, as shown in [Figure 10–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos825319).\
    \ Sure enough, we see a splash screen, Lulu fruit and all. Then we see a table\
    \ that is populated with our cities. It's not doing much at all when you click\
    \ on it, but it's there. We're done with the first part of `myStory_02`.\n\nTHE\
    \ BIG PICTURE\n\n> 1.  Populate a table with a list of cities (COMPLETED – see\
    \ [Figure 10–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos825319))\n\
    > 2.  Code a pin to drop to the center of a selected cities' map (NEXT SECTION)"
