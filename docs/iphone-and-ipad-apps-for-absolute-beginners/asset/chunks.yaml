    \ `helloWorld_02` there by dragging them to that folder. Now, with a fresh, clean\
    \ empty desktop, close all programs. Press Command + Tab and then Command + Q\
    \ to close everything until only the Finder is left on your screen\n\nNOTE: For\
    \ students in my class or at other universities, I or your professor has already\
    \ taken care of this. If you are not a student and did not pay your $99 in step\
    \ 5 in [Chapter 1](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_010.html#filepos54331),\
    \ or/and you do not have an iPhone or iPad, then skip ahead to [Chapter 3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079)."
  trans: "\n### 在读取 iPhone 环境的 iPad 模拟器上运行你的应用\n\n有两种方法可以在 iPad 模拟器上运行你的 iPhone 应用：\n\
    \n- 首先，我们将从 iOS 模拟器中更改环境。因此，在仍处于 iPhone 模拟器中的情况下，请点击 **Hardware** ![Images](img/00027.jpg)**Device**\
    \ ![Images](img/00027.jpg)**iPad**，这样我们就可以看到你的第一个应用在 iPad 上运行的效果（参见图 2–20）。结果如图\
    \ 2–21 所示。 ![images](img/00065.jpg)\n\n    **图 2–20.** 让我们看看你的 iPhone 应用在 iPhone\
    \ 模拟器上如何运行。\n\n    ![images](img/00066.jpg)\n\n    **图 2–21.** 最初它以 iPhone 模式显示。点击缩放按钮，即可全屏查看，如图所示。\n\
    \n- 第二种方法是通过在 Xcode 内部更改输出设备来实现。为此，请先确保你在模拟器中，然后输入 **Command + Q** (![Images](img/00031.jpg)Q)\
    \ 关闭你的 iPhone 模拟器。现在你应该回到了 Xcode。\n\n    **注意：** 如果你没有回到 Xcode，则说明你此前开启了其他程序，这是我说过不允许你做的事情。为了让你能准确地按照步骤操作，你真的需要保持你的桌面和正在运行的程序与我教你的方式完全一致。\n\
    \n    1. 现在，保持 Xcode 打开，通过点击功能区左上角的 **Scheme** 下拉菜单，选择 **iPad Simulator**，来将你的方案更改为\
    \ iPad 模拟器，如图 2–22 所示。目前它显示的是 iPad 4.3 模拟器，但当你读到这本书时，版本号可能会更高。\n    2. 现在输入 ![Images](img/00031.jpg)R\
    \ 来运行它。同样，你会看到与图 2–21 中显示的相同实例。![images](img/00067.jpg)\n\n    **图 2–22.** 在 iPad\
    \ 模拟器中运行 iPhone 应用的第二种方法。\n\n### 在 iPad 模拟器上运行你的应用\n\n##### `helloWorld_02` –\
    \ iPad 模拟器\n\n在本章开头，我与你达成了一个约定。我说过我们将拿一个非常简单的应用，并以所有可能的不同形式运行它。具体来说，我说过我们将在以下设备上运行你的第一个应用：\n\
    \n- §2.1. iPhone 模拟器：(![Images](img/00068.jpg) 参见图 2–19)。\n- §2.2. 读取 iPhone 环境的\
    \ iPad 模拟器 (![Images](img/00068.jpg) 参见图 2–21)。\n- §2.3. iPad 模拟器。\n\n此刻，你已经完成了前两个目标，即在\
    \ iPhone 模拟器上运行，以及后者是在 iPad 上读取 iPhone 应用。但这并不是真正的 iPad 应用。真正的 iPad 应用是专门为 iPad\
    \ 制作的，不能在 iPhone 上运行，因为所有的图形和屏幕尺寸都是专门为 iPad 设计的，尺寸太大以至于无法在 iPhone 上显示。\n\n查看图\
    \ 2–21，你可以看到左侧第一张图片显示你的 iPhone 应用位于 iPad 内部，并且精确地缩放到 iPhone 的尺寸。当你点击缩放按钮时，它只是简单地缩放并放大所有内容以适配\
    \ iPad。嗯，这就是我在课堂上称之为“伪 iPad”的东西，因为它并非真正的应用。那么，让我们继续，并向你展示如何制作一个专门用于 iPad 的应用。\n\
    \n1. 我们需要通过在 Xcode 中输入 ![Images](img/00031.jpg)S 保存你的 `helloWorld_01` 应用，然后输入\
    \ ![Images](img/00031.jpg)Q 退出 Xcode。现在，你的桌面上应该除了 Mac 硬盘图标下的 `helloWorld_01` 文件夹外，空空如也。很好。我们现在将要运行\
    \ `helloWorld_02`，除了少数几个步骤外，它将与 `helloWorld_01` 完全相同。\n2. 打开 Xcode，同时输入 **Command\
    \ + Shift + N**。回忆一下，这三个组合键在图 2–1 中显示为 ![Images](img/00031.jpg)![Images](img/00032.jpg)\
    \ N。选择 **View-Based App**，然后按 **Return** (![Images](img/00043.jpg))。现在停下来，查看图\
    \ 2–23：在图 2–2 中，我们将其命名为 `helloWorld_01`。然而在图 2–23 中，我们将其命名为 `helloWorld_02`。最重要的是，在图\
    \ 2–23 中，我们选择的是 **iPad**，而不是像在图 2–2 中那样选择 iPhone。完成这一步后，我希望你尝试记住我们在 `helloWorld_01`\
    \ 中执行的所有步骤，直到你运行它，此时你将只看到图 2–21 中右侧的图像。\n\n![images](img/00069.jpg)\n\n**图 2–23.**\
    \ 打开 Xcode，选择 Navigation-based Application 模板，然后将新项目文件保存到桌面。\n\n嗯？是的，这就是我说的：我让教室里的学生们重新做一遍\
    \ `helloWorld`，但这次是作为一个“真正的”iPad 应用，我鼓励他们尝试不要偷看课堂笔记，自己尝试完成。如果你必须查看笔记或这本书，那也没问题。但要试着反复做，直到你完全不需要看任何笔记也能完成。\n\
    \n### 在物理设备上运行你的应用\n\n**提示：** 你可能想跳过这一节。请仔细阅读以下内容。\n\n在你设置好设备和配置文件之后，你可以继续执行步骤\
    \ §2.4，在 iPhone 上运行你的应用，§2.5，在基于 iPhone 环境的 iPad 上运行你的应用，以及 §2.6，在你的物理 iPad 上运行你的应用。\n\
    \n无论你做什么决定，你都需要先完成以下整理工作。现在，在你干净整洁的桌面上，只有两个包含你两个 `helloWorld` 程序的文件夹。我们需要创建一个位置来存放你所有的程序，这将有助于你继续阅读本书。在你的\
    \ **Documents** 文件夹中创建一个名为 **My Programs** 的文件夹，然后将 `helloWorld_01` 和 `helloWorld_02`\
    \ 这两个文件拖拽到该文件夹中保存。现在，在拥有一个干净整洁的空桌面的情况下，关闭所有程序。按 **Command + Tab**，然后按 **Command\
    \ + Q** 关闭所有应用，直到屏幕上只剩下 Finder。\n\n**注意：** 对于我课堂上的或其他大学的学生，我或你的教授已经处理好了这件事。如果你不是学生，并且没有在第\
    \ 1 章的步骤 5 中支付 99 美元，或者/并且你没有 iPhone 或 iPad，那么请跳到第 3 章。\n"
- fmt: '### Digging the Code


    At the ends of chapters, I include this section called “Digging the Code,” wherein
    I start to feed you insights into the meaning of much of the code that miraculously
    appeared or that I just instructed you to type. What I have found, though, is
    that the human brain makes its own associations if it keeps on doing something
    over and over again and certain outcomes occur each time we repeat that action.
    I have found that if I first allow students to fly through huge amounts of code
    in sheer ignorant bliss, it does a great deal of good because it allows their
    brains to make connections that only they can make. So here in “Digging the Code”
    I start feeding you little snippets, just the right ones that connect the dots
    as to why we put this code here or that code there. Later, as we get towards the
    end of the book, you will feel totally comfortable really digging the code and
    getting into it. For [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161),
    however, we have not repeated enough actions for you to make your own associations.
    So, for now, take a deep breath and I''ll see you in [Chapter 3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079).


    ## Chapter 3


    ## Keep on Truckin’


    Now that you’ve gotten your feet wet from programming your first two iPhone and
    iPad apps, I want you to tell yourself that you have to keep on truckin’ with
    more apps, more practice, and create a more natural connection of synapses in
    your brain. Initially, many traditional Computer Science colleagues of mine had
    disdain for my approach of blindly hauling newbie programmers through code without
    explaining it all. Over the years, I’ve learned exactly when to tell you what’s
    going on and when to just jostle you through the code. Most importantly, you need
    to keep on truckin’ and keep your brain dialed into Xcode.


    This third “Hello World” application introduces you to some cool new concepts
    such as Strings, Delegates, and slightly more complex code. Remember that this
    is Objective-C; it’s a pretty complex and difficult language, so I will explain
    only what I deem necessary. This brings up a difference between [Chapter 3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079)
    and [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161).
    Recall that in [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161),
    when I mentioned digging the code, I said: “For [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161),
    however, we have not repeated enough actions for you to make your own associations.”
    Well, here in [Chapter 3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079),
    we start really getting into digging the code. So let’s get on with the next application.
    When it’s done, take a break, and then be ready to go back and review lines of
    your input, as we focus on certain portions of the code, and look at how it all
    works together.


    Besides the information I present here in this book, including various screenshots,
    I also offer you screencasts, which are available at my website. You can use the
    short URL, go to rorylewis.com, as indicated below when you click on the Xcode
    4 icon, and then go to either video tutorial or downloads:


    *   Short URL: `ow.ly/50ksH`

    *   Manual URL: [www.rorylewis.com](http://www.rorylewis.com)


    ### helloWorld_03 – An Interactive View-Based App


    In your first two programs, `helloWorld_01` and `helloWorld_02`, you said “Hello”
    to the world using a view-based platform that housed a button. This third app
    will also be a view-based app, but a little complexity will be added to it. When
    a user interacts with this third app of yours, they will first be prompted to
    enter their name into a Text Field object. Once they have entered their name into
    the Text Field object, and they press the Press Me button, text will appear saying
    that the name entered is in fact the person saying “Hello World!”


    Before you get started with the next method, you need to save `helloWorld_01`
    and `helloWorld_02` in a folder of your choice that is not on the desktop. Create
    a folder in your Documents folder called “My Programs,” and then save the file
    named `helloWorld_01` there by dragging the entire folder inside your My Programs
    folder. Now, with a fresh, clean, empty desktop, close all other programs you
    may have running by selecting programs. Press `Command + Tab` (![Images](images/00031.jpg)![Images](images/00059.jpg))
    and then `Command + Q` (![Images](images/00031.jpg)Q) to close everything until
    only the Finder is left on your screen.


    > ![images](images/00070.jpg)


    **Figure 3–1.** Open Xcode, select the View-based Application template, and then
    click the Next button.


    1. Now, just as you did in the first example, launch Xcode and open a new project
    by using your keyboard shortcut: `![Images](images/00031.jpg)![Images](images/00032.jpg)
    N`. Your screen should show the New Project wizard as depicted in [Figure 3–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos165499).
    You may find that your View-based Application template was highlighted by default
    because of the last example. If, however, your View-based Application template
    is not selected, then click on the View-based Application icon, and then click
    the Next button, as indicated in [Figure 3–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos165499).


    ![images](images/00071.jpg)


    **Figure 3–2.** Name your project, make sure it’s for an iPhone, and then click
    on the Next button.


    2. You are going to call this third project `helloWorld_03`, so type that in the
    Product Name box, as shown in [Figure 3–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos166574).
    The Company Identifier should automatically be defaulted to your Xcode license
    name. Remember that `helloWorld_02` was created for an iPad, so the Device Family
    on your computer may still be set to iPad. Whatever the case, make sure that `helloWorld_03`
    is set for the iPhone family. In the event that your “Use Storyboard”, “Use Automatic
    Referencing Counting” or “Include Unit Tests” are checked by default, uncheck
    them. Once this is done and your screen looks like that shown in [Figure 3–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_015.html#filepos166574),
    click the Next button.


    ![images](images/00072.jpg)


    **Figure 3–3.** Drag a picture of yourself from the desktop into your Supporting
    Files folder.'
