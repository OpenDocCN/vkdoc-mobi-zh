    \ Before we simply blurt out that we want an `NSURL *iTunesURL`, we need to bring\
    \ in a protocol that will define this method. In our case, we specifically need\
    \ to define a method that delegates or gives to us all the good stuff necessary\
    \ for a `UIWebView` object that will handle the iTunes web content we want loaded.\
    \ As we did before in `myStory_02`, we will use the `UIWebViewDelegate` Protocol\
    \ Reference `<UIWebViewDelegate>`. Please make sure that you also create the `@property`\
    \ as shown below.\n\n`#import<UIKit/UIKit.h>`\n`@classmyDetailViewController;`\n\
    `@interfacemyMasterViewController : UITableViewController<UIWebViewDelegate>`\n\
    `{`\n`    NSURL *iTunesURL;`\n`}`\n\n`@property (strong, nonatomic) myDetailViewController\
    \ *detailViewController;`\n`@property (strong, nonatomic) NSURL *iTunesURL;`\n\
    `@end`   ![images](images/00479.jpg)\n\nFigure 11–16\\. Paste the first Boilerplate.\n\
    \n16\\. Open up the `MasterViewController` implementation file and then select\
    \ all the contents of the first Boilerplate file (`Boilerplate 01`). After that,\
    \ paste the contents in-between the `#import \"myDetailViewController.h\"` line\
    \ and the `@implementation MasterViewController` line as shown in [Figure 11–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos909775).\
    \ This code is nothing else but forward declarations of private methods I've written\
    \ to accommodate the various types of media we link to in this app and media that\
    \ you may use in later apps. Specifically we have 3:\n\na. `LocateArtistPageInSafari`\n\
    \nb. `LocateArtistPageInItunes`, a `LocateMoviePageInItunes` (we do not use this\
    \ one but I thought you may like to have it at your disposal) and\n\nc. `StartExternalAppWithURL:(NSURL\
    \ *)theURL`).\n\nOnce you paste the first boilerplate in, it should look as follows:\n\
    \n`#import \"MasterViewController.h\"`\n`#import \"myDetailViewController.h\"\
    `\n`////////////// START BOILERPLATE 1 ////////////////////`\n`@interfaceMasterViewController\
    \ (PrivateMethods)`\n`// forward declarations for private methods`\n`-(void)LocateArtistPageInSafari;`\n\
    `-(void)LocateArtist2PageInSafari;`\n`-(void)LocateArtist3PageInSafari;`\n`-(void)LocateArtistPageInItunes;`\n\
    `-(void)LocateMoviePageInItunes;`\n`-(void)LocateAlbumPageInItunes;`\n`-(void)LocateTrackInItunes;`\n\
    `-(void)DeselectRow;`\n`-(void)StartExternalAppWithURL:(NSURL *)theURL;`\n`@end`\n\
    \n`////////////// END BOILERPLATE 1 ////////////////////`\n`@implementationmyMasterViewController`\n\
    `@synthesizedetailViewController = _detailViewController;`   ![images](images/00480.jpg)\n\
    \nFigure 11–17\\. Synthesize the iTunesURL.\n\n17\\. We cannot get too wrapped\
    \ up in the header protocol and forget that we need to synthesize the `iTunesURL`\
    \ we set up in our header file. This is shown in [Figure 11–23](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos940903)\
    \ and also below.\n\n`////////////// END BOILERPLATE 1 ////////////////////`\n\
    `@implementationMasterViewController`\n`@synthesizedetailViewController = _detailViewController;`\n\
    `@synthesizeiTunesURL;`\n`- (void)awakeFromNib`\n`{`\n`    self.clearsSelectionOnViewWillAppear\
    \ = NO;`\n`    self.contentSizeForViewInPopover = CGSizeMake(320.0, 600.0);`\n\
    `    [superawakeFromNib];`\n`}`   ![images](images/00481.jpg)\n\nFigure 11–18\\\
    . Insert boilerplate 2.\n\n18\\. The `viewDidLoad` that comes along with the Master-Detail\
    \ default Instantiation is not exactly what we need. There are two ways to do\
    \ this and I prefer the first way, which is to code it yourself. Here you will\
    \ see why we need to add onto it. For those of you who may feel you're being overwhelmed,\
    \ that's cool too.Hang in there and let me go over how to tweak the `viewDidLoad.`\
    \ After that, we'll show you how to use the boilerplate. As you know, the grey\
    \ lettering is the code that is automatically instantiated. Essentially I've added\
    \ an “If” statement.Mmm…. what is this `if` statement doing?All we're doing here\
    \ is saying that we have code here that is specific to the iPad, and we want to\
    \ make sure that the interface that's being used on the current device is the\
    \ correct one.\n\n`- (void)viewDidLoad`\n`{`\n`    [superviewDidLoad];`\n`        //\
    \ Do any additional setup after loading the view, typically from a nib.`\n`    self.detailViewController\
    \ = (DetailViewController`\n`*)[[self.splitViewController.viewControllerslastObject]\
    \ topViewController];`\n`if ([[UIDevicecurrentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPad)\
    \ {`\n`        [self.tableViewselectRowAtIndexPath:[NSIndexPath indexPathForRow:0\
    \ inSection:0]`\n`animated:NOscrollPosition:UITableViewScrollPositionMiddle];`\n\
    `        self.detailViewController.webView.delegate = self;`\n`}`\n`}`\n\nNow,\
    \ for those of you who feel a little more comfortable pasting in the boilerplate\
    \ code, open boilerplate 02 and select everything. Then select all of `viewDidLoad`\
    \ and paste it over it so that it looks similar to what is shown in [Figure 11–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos913370)\
    \ and as shown here:\n\n`- (void)didReceiveMemoryWarning`\n`{`\n`    [superdidReceiveMemoryWarning];`\n\
    `    // Release any cached data, images, etc that aren't in use.`\n`}`\n\n`#pragma\
    \ mark - View lifecycle`\n`////////////// START BOILERPLATE 2 ////////////////////`\n\
    `- (void)viewDidLoad`\n`{`\n`[superviewDidLoad];`\n`// Do any additional setup\
    \ after loading the view, typically from a nib.`\n`self.detailViewController =\
    \ (DetailViewController`\n`*)[[self.splitViewController.viewControllerslastObject]\
    \ topViewController];`\n`if ([[UIDevicecurrentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPad)\
    \ {`\n`[self.tableViewselectRowAtIndexPath:[NSIndexPath indexPathForRow:0 inSection:0]`\n\
    `animated:NOscrollPosition:UITableViewScrollPositionMiddle];`\n`self.detailViewController.webView.delegate\
    \ = self;`\n`}`\n`}`\n\n`////////////// END BOILERPLATE 2 ////////////////////`\n\
    `- (void)viewDidUnload`\n`{`\n`    [superviewDidUnload];`\n`    // Release any\
    \ retained subviews of the main view.`\n`    // e.g. self.myOutlet = nil;`   ![images](images/00482.jpg)\n\
    \nFigure 11–19\\. Boilerplate 3\n\n19\\. We now need to delete everything from\
    \ `shouldAutorotateToInterfaceOrientation` down to the `@end`. Once it is deleted,\
    \ select all the contents of boilerplate 3, as shown in [Figure 11–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_031.html#filepos916898),\
    \ and paste it in its place. This code is the crux of it all so let's go through\
    \ it now. Let's start by looking at The Big Picture to see that we have completed\
    \ 2.1.1.1 through to 2.1.1.2\\. We need to make sure our app still runs regardless\
    \ of the orientation of the iPad (split view, in landscape, and popover in portrait)\
    \ and have a set of cases of events that we will trigger if a cell is selected.\
    \ We have eight cells so we will have eight cases ranging from 0 through to 7\\\
    . We will then program our private methods to deal with special circumstances."
  trans: "\n#### 编写 myiTunes 应用\n\n我希望让这一切保持非常简单！在编写代码时，我们将完成两大任务：首先创建代码，将每个单元格被按下时我们想要触发的操作连接起来；其次，确保我们的视图与\
    \ WebView 正确连接。\n\n### 总体概览\n\n> 1.  在故事板中设置弹出视图\n> 2.  编写与多媒体平台交互的代码\n>     \n\
    >     2.1. `MasterViewController`\n>     \n>     > 2.1.1. 为每个被选中的单元格编写代码\n>  \
    \   \n>     2.2. `DetailViewController`\n>     \n>     > 2.2.1. 将视图与 WebView 连接\n\
    >     \n> 3.  调整弹出视图以正确获取平台信息\n\n![images](img/00478.jpg)\n\n**图 11–15.** 创建一个连接到\
    \ iTunes 的 `NSURL`。\n\n15. 我们先从 `MasterViewController` 开始，因此请确保头文件允许我们在实现文件中执行所有需要的操作。保存所有内容，关闭工具区，打开导航器，然后打开\
    \ `MasterViewController.h`。我们首先创建一个连接到 iTunes 的 `NSURL`。我将这个指针命名为 `iTunesURL`，如图\
    \ 11–22 所示。在我们直接声明 `NSURL *iTunesURL` 之前，需要引入一个协议来定义这个方法。具体来说，我们需要定义一个方法，该方法将委托或提供所有必要的资源给\
    \ `UIWebView` 对象，由其处理我们想要加载的 iTunes 网页内容。正如我们在 `myStory_02` 中所做的那样，我们将使用 `UIWebViewDelegate`\
    \ 协议参考 `<UIWebViewDelegate>`。请务必也创建如下所示的 `@property`。\n\n```\n#import<UIKit/UIKit.h>\n\
    @classmyDetailViewController;\n@interfacemyMasterViewController : UITableViewController<UIWebViewDelegate>\n\
    {\n    NSURL *iTunesURL;\n}\n\n@property (strong, nonatomic) myDetailViewController\
    \ *detailViewController;\n@property (strong, nonatomic) NSURL *iTunesURL;\n@end\n\
    ```\n\n![images](img/00479.jpg)\n\n**图 11–16.** 粘贴第一个样板代码。\n\n16. 打开 `MasterViewController`\
    \ 的实现文件，然后选中第一个样板文件（`Boilerplate 01`）的全部内容。接着，将其粘贴到 `#import \"myDetailViewController.h\"\
    ` 行和 `@implementation MasterViewController` 行之间，如图 11–16 所示。这段代码只是我编写的私有方法的前向声明，用于适配本应用以及你后续在其它应用中可能用到的各种媒体类型。具体有以下\
    \ 3 个：\n\na. `LocateArtistPageInSafari`\n\nb. `LocateArtistPageInItunes`、`LocateMoviePageInItunes`（虽然我们未使用此方法，但我觉得你可能希望掌握它）以及\n\
    \nc. `StartExternalAppWithURL:(NSURL *)theURL`。\n\n粘贴完第一个样板代码后，效果应如下所示：\n\n```\n\
    #import \"MasterViewController.h\"\n#import \"myDetailViewController.h\"\n//////////////\
    \ 开始 样板代码 1 ////////////////////\n@interfaceMasterViewController (PrivateMethods)\n\
    // 私有方法的前向声明\n-(void)LocateArtistPageInSafari;\n-(void)LocateArtist2PageInSafari;\n\
    -(void)LocateArtist3PageInSafari;\n-(void)LocateArtistPageInItunes;\n-(void)LocateMoviePageInItunes;\n\
    -(void)LocateAlbumPageInItunes;\n-(void)LocateTrackInItunes;\n-(void)DeselectRow;\n\
    -(void)StartExternalAppWithURL:(NSURL *)theURL;\n@end\n\n////////////// 结束 样板代码\
    \ 1 ////////////////////\n@implementationmyMasterViewController\n@synthesizedetailViewController\
    \ = _detailViewController;\n```\n\n![images](img/00480.jpg)\n\n**图 11–17.** 合成\
    \ `iTunesURL`。\n\n17. 我们不能只关注头文件中的协议，而忘记合成我们在头文件中设置的 `iTunesURL`。这一点在图 11–23 及下方展示。\n\
    \n```\n////////////// 结束 样板代码 1 ////////////////////\n@implementationMasterViewController\n\
    @synthesizedetailViewController = _detailViewController;\n@synthesizeiTunesURL;\n\
    - (void)awakeFromNib\n{\n    self.clearsSelectionOnViewWillAppear = NO;\n    self.contentSizeForViewInPopover\
    \ = CGSizeMake(320.0, 600.0);\n    [superawakeFromNib];\n}\n```\n\n![images](img/00481.jpg)\n\
    \n**图 11–18.** 插入样板代码 2。\n\n18. Master-Detail 默认实例化自带的 `viewDidLoad` 并不完全符合我们的需求。有两种方法可以实现，我偏好第一种，即自行编写代码。这里你将看到为什么我们需要对它进行补充。如果你觉得压力太大，那也没关系。请坚持住，让我仔细说明如何调整\
    \ `viewDidLoad`。之后，我们将展示如何使用样板代码。如你所知，灰色字体的代码是自动实例化的。本质上我添加了一个“If”语句。嗯……这个 `if`\
    \ 语句在做什么呢？我们只是在此声明，这段代码是 iPad 专用的，并确保当前设备上使用的界面是正确的。\n\n```\n- (void)viewDidLoad\n\
    {\n    [superviewDidLoad];\n        // 在此处添加任何额外的视图加载后设置，通常从 nib 文件加载。\n    self.detailViewController\
    \ = (DetailViewController\n*)[[self.splitViewController.viewControllerslastObject]\
    \ topViewController];\nif ([[UIDevicecurrentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPad)\
    \ {\n        [self.tableViewselectRowAtIndexPath:[NSIndexPath indexPathForRow:0\
    \ inSection:0]\nanimated:NOscrollPosition:UITableViewScrollPositionMiddle];\n\
            self.detailViewController.webView.delegate = self;\n}\n}\n```\n\n现在，对于更倾向于粘贴样板代码的人来说，请打开样板代码\
    \ 02 并全选。然后选中 `viewDidLoad` 的全部内容，并将其覆盖粘贴，使其看起来类似于图 11–18 及下方所示：\n\n```\n- (void)didReceiveMemoryWarning\n\
    {\n    [superdidReceiveMemoryWarning];\n    // 释放所有未使用的缓存数据、图像等。\n}\n\n#pragma\
    \ mark - 视图生命周期\n////////////// 开始 样板代码 2 ////////////////////\n- (void)viewDidLoad\n\
    {\n[superviewDidLoad];\n// 在此处添加任何额外的视图加载后设置，通常从 nib 文件加载。\nself.detailViewController\
    \ = (DetailViewController\n*)[[self.splitViewController.viewControllerslastObject]\
    \ topViewController];\nif ([[UIDevicecurrentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPad)\
    \ {\n[self.tableViewselectRowAtIndexPath:[NSIndexPath indexPathForRow:0 inSection:0]\n\
    animated:NOscrollPosition:UITableViewScrollPositionMiddle];\nself.detailViewController.webView.delegate\
    \ = self;\n}\n}\n\n////////////// 结束 样板代码 2 ////////////////////\n- (void)viewDidUnload\n\
    {\n    [superviewDidUnload];\n    // 释放主视图中保留的所有子视图。\n    // 例如：self.myOutlet\
    \ = nil;\n```\n\n![images](img/00482.jpg)\n\n**图 11–19.** 样板代码 3\n\n19. 现在我们需要删除从\
    \ `shouldAutorotateToInterfaceOrientation` 到 `@end` 之间的所有内容。删除后，选中样板代码 3 的全部内容，如图\
    \ 11–19 所示，并将其粘贴到该位置。这段代码是核心所在，让我们来仔细看一下。首先回顾一下总体概览，确认我们已经完成了 2.1.1.1 至 2.1.1.2\
    \ 部分。我们需要确保应用无论 iPad 朝向如何（横屏时的分视图，竖屏时的弹出视图）都能正常运行，并且针对单元格被选中的情况触发一系列事件。我们有八个单元格，因此会有从\
    \ 0 到 7 共八个 case。然后，我们将编写私有方法来处理特殊情况。\n"
- fmt: "# NOTE\n\nSince we are first coding the `MasterViewController`, Xcode will\
    \ give you some warnings and error signs at this point. Ignore them for now.\n\
    \n## THE BIG PICTURE\n\n> 1.  Set up the popover in the storyboard\n> 2.  Code\
    \ the interaction to the multimedia platforms\n>     \n>     2.1\\. MasterView\
    \ Controller\n>     \n>     > 2.1.1\\. Code for each cell that is selected\n>\
    \     > \n>     > 2.1.1.1\\. Header Material\n>     > \n>     > 2.1.1.2\\. viewDidLoad\n\
    >     > \n>     > 2.1.1.3\\. Set orientations\n>     > \n>     > 2.1.1.4\\. Case\
    \ statements\n>     > \n>     > 2.1.1.5\\. Private methods\n>     \n>     2.2\\\
    . DetailView Controller\n>     \n>     > 2.2.1\\. Connecting the views to the\
    \ WebViews\n> \n> 3.  Tweak the popover to grab the platforms correctly\n\nThe\
    \ original `shouldAutorotateToInterfaceOrientation` is shown in grey below and\
    \ we'll only use it if it's an iPad.\n\n```objc\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // Return YES for supported orientations\n    if ([[UIDevice currentDevice]\
    \ userInterfaceIdiom] == UIUserInterfaceIdiomPhone) {\n        return (interfaceOrientation\
    \ != UIInterfaceOrientationPortraitUpsideDown);\n    } else {\n        return\
    \ YES;\n    }\n}\n```\n\nWe need to do a couple of things now. We need to convert\
    \ our section and row numbers from a linear index to rows when counting from top\
    \ to bottom. For those of you who are looking carefully at each line of code,\
    \ I need to point out that the next two lines assume that the 1st section is 2\
    \ rows and all others are 1.\n\n```objc\nNSInteger nSelectedRowIdx = (indexPath.section\
    \ > 0) ? indexPath.section+1 : 0;\n//now 0,2,3,4\nnSelectedRowIdx += indexPath.row;\n\
    //now 0,1,2,3,4\n```\n\nIf you're happy that this all relates each case to a specific\
    \ line (the top line in each cell), then that's OK too. Just use this every time\
    \ you do it. In fact, just paste it in and change the `case` statements below\
    \ and you will be fine.\n\n```objc\n- (void)tableView:(UITableView *)tableView\
    \ didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    NSInteger nSelectedRowIdx\
    \ = indexPath.section *2 + indexPath.row;\n    switch (nSelectedRowIdx) {\n```\n\
    \nNow we need to make the `case` statements that will tag along the rows we have\
    \ ordered sequentially. We have four sections: ARTIST, ALBUMS IN ITUNES, SONGS,\
    \ and PICTURES. We need to have two selections called cases within each of them,\
    \ so let's lay it out in The Big Picture for a minute.\n\n## THE BIG PICTURE\n\
    \n> 1.  Set up the popover in the storyboard\n> 2.  Code the interaction to the\
    \ multimedia platforms\n>     \n>     2.1\\. MasterView Controller\n>     \n>\
    \     > 2.1.1\\. Code for each cell that is selected\n>     > \n>     > 2.1.1.1\\\
    . Header Material\n>     > \n>     > 2.1.1.2\\. viewDidLoad\n>     > \n>     >\
    \ 2.1.1.3\\. Set orientations\n>     > \n>     > 2.1.1.4\\. Case statements\n\
    >     > \n>     > 2.1.1.4.1\\. ARTISTS\n>     > \n>     > 2.1.1.4.1.1\\. Case\
    \ 0\n>     > \n>     > 2.1.1.4.1.2\\. Case 1\n>     > \n>     > 2.1.1.4.2\\. ALBUMS\n\
    >     > \n>     > 2.1.1.4.2.1\\. Case 2\n>     > \n>     > 2.1.1.4.2.2\\. Case\
    \ 3\n>     > \n>     > 2.1.1.4.3\\. SONGS\n>     > \n>     > 2.1.1.4.3.1\\. Case\
    \ 4\n>     > \n>     > 2.1.1.4.3.2\\. Case 5\n>     > \n>     > 2.1.1.4.4\\. PICTURES\n\
    >     > \n>     > 2.1.1.4.4.1\\. Case 6\n>     > \n>     > 2.1.1.4.4.2\\. Case\
    \ 7\n>     > \n>     > 2.1.1.5\\. Private methods (Helper routines to process\
    \ redirects prior to handing off to application open)\n>     > \n>     > 2.1.1.5.1.\n\
    >     \n>     2.1\\. DetailView Controller\n>     \n>     > 2.2.1\\. Connecting\
    \ the views to the WebViews\n> \n> 3.  Tweak the popover to grab the platforms\
    \ correctly\n\nAccordingly, the code is as follows:\n\n```objc\n        case 0:\
    \ // in Safari (Artist)\n            [self LocateArtistPageInSafari];\n      \
    \      break;\n\n        case 1: // in iTunes (Artist)\n            //[self LocateArtistPageInItunes];\n\
    \        {\n            NSURL *urlInItunes = [NSURL URLWithString:@\"http://itunes.apple.com/us/artist/rory-lewis/id65902515?uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 2: // in iTunes (Songs)\n                     //[self\
    \ LocateArtistPageInItunes];\n        {\n            NSURL *urlInItunes = [NSURL\
    \ URLWithString:@\"http://itunes.apple.com/us/album/songs-for-friday/id408548641?uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 3: // in iTunes (Songs)\n            //[self LocateArtistPageInItunes];\n\
    \        {\n            NSURL *urlInItunes = [NSURL URLWithString:@\"http://itunes.apple.com/us/album/heroines/id461113548?uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 4: // in iTunes (Songs)\n            //[self LocateArtistPageInItunes];\n\
    \        {\n            NSURL *urlInItunes = [NSURL URLWithString:@\"http://itunes.apple.com/us/album/elvis-presley/id461113548?i=461113566&uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 5: // in iTunes (Songs)\n            //[self LocateArtistPageInItunes];\n\
    \        {\n            NSURL *urlInItunes = [NSURL URLWithString:@\"http://itunes.apple.com/us/album/hippie-paradise/id408548641?i=408549591&uo=4\"\
    ];\n            [self StartExternalAppWithURL:urlInItunes];\n        }\n     \
    \       break;\n        case 6: // in Safari (Artist)\n            [self LocateArtist2PageInSafari];\n\
    \            break;\n\n        case 7: // in Safari (Artist)\n            [self\
    \ LocateArtist3PageInSafari];\n            break;\n\n    }\n\n    //[self DeselectRow];\n\
    }\n```\n\nWe now need to create our helper routines to process redirects prior\
    \ to handing off to the open application. Specifically, we need to process a `LinkShare/TradeDoubler/DGM`\
    \ URL to something iPhone can handle, if you choose to use a universal app on\
    \ your own that does include the iPhone. For more information you can go to [`http://developer.apple.com/library/ios/#qa/qa1629/_index.htm`](http://developer.apple.com/library/ios/#qa/qa1629/_index.htm).\n\
    \n```objc\n- (void)openReferralURL:(NSURL *)referralURL {\n    //NSURLConnection\
    \ *connection =\n    (void)[[NSURLConnection alloc] initWithRequest:[NSURLRequest\
    \ requestWithURL:referralURL] delegate:self startImmediately:YES];\n}\n```\n\n\
    Now we save the most recent URL for a safety measure (just in case multiple redirects\
    \ occur). Note that `iTunesURL` is an `NSURL` property in this class declaration:\n\
    \n```objc\n- (NSURLRequest *)connection:(NSURLConnection *)connection willSendRequest:(NSURLRequest\
    \ *)request redirectResponse:(NSURLResponse *)response {\n    self.iTunesURL =\
    \ [response URL];\n    NSLog(@\"RxURL [%@]\",[self.iTunesURL absoluteString]);\n\
    \    return request;\n}\n```\n\nOK, no more redirects. So we use the last URL\
    \ that we saved:\n\n```objc\n- (void)connectionDidFinishLoading:(NSURLConnection\
    \ *)connection {\n    [self StartExternalAppWithURL:self.iTunesURL];\n}\n```\n\
    \nThis is a little technical, but we need to have an iTMS link (a special kind\
    \ of url/link protocol used for iTunes' links and URLs) to get out there into\
    \ the ether. We have this little method called `StartExternalAppWithURL` in order\
    \ to allow our iTMS links:\n\n```objc\n-(void)StartExternalAppWithURL:(NSURL *)theURL\n\
    {\n    NSLog(@\"UsingURL [%@]\",[theURL absoluteString]);\n    [[UIApplication\
    \ sharedApplication] openURL:theURL];\n    [self DeselectRow];\n}\n```"
