- fmt: "# Tweaking the Storyboard\n\nWe now have written or pasted all the code we\
    \ need to parse the Google server for the geospatial specifics of each city we\
    \ populated in our list on Part 1, and we also have the code to route these coordinates\
    \ through a segue, which does not exist yet, through to a MapKit that will have\
    \ a pin drop down into the middle of the selected city. In short, we need something\
    \ that will contain our MapKit Framework and, to do this, we will add a navigation\
    \ controller and a detail view. We will have to create a new View Controller and\
    \ bring it onto the canvas. Then we need to connect the Master View to the Detail\
    \ View and add a MapView to its Navigation. Looking at the big picture expanded,\
    \ we see the following below.\n\n## The Big Picture: Storyboard Tweaking Expanded\n\
    \n> 1.  Populate a table with a list of cities (COMPLETED)\n> 2.  Code a pin to\
    \ drop to the center of a selected cities' map\n>     2.1. Add MapKit framework\n\
    >     2.2. Write code\n>     2.3. Tweak Storyboard to accept our new code\n> \
    \    > 2.3.1. Add Navigation Controller\n>     > 2.3.2. Add Detail View that will\
    \ contain our MapKit Framework\n>     > 2.3.3. Drag a View Controller onto the\
    \ canvas\n>     > 2.3.4. Add a Push transition from the Master View to the Detail\
    \ View — Name it \"Detail View\"\n>     > 2.3.5. Add a MapView to its Navigation:\
    \ Drag the Map view above the View\n>     > 2.3.6. Associate the Map View with\
    \ the backing class of `myDetailViewController`\n>     > 2.3.6.1. Select the View\
    \ Controller Detail View in the View Controller Scene in the Document Outline\n\
    >     > 2.3.6.2. Select the Identity inspector in the Utilities\n>     > 2.3.6.3.\
    \ In Custom Class go to the drop down menu in Class\n\n![images](images/00447.jpg)\
    \  \n\nFigure 10–38. Open up the Storyboard for some final tweaking.\n\n38. With\
    \ this said, let's open up the Storyboard, as shown in [Figure 10–38](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos868146).\n\
    \n![images](images/00448.jpg)  \n\nFigure 10–39. Add a Navigation Controller.\n\
    \n39. We need to add a Navigation controller, so select Editor ![images](images/00027.jpg)\
    \ Embed ![images](images/00027.jpg) Navigation Controller, as shown in [Figure\
    \ 10–39](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos868631).\n\n![images](images/00449.jpg)\
    \  \n\nFigure 10–40. The new Navigation Controller automatically connects to the\
    \ Table View.\n\n40. As we can see in [Figure 10–40](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos869212),\
    \ the new navigation controller automatically connects to our Table View. Make\
