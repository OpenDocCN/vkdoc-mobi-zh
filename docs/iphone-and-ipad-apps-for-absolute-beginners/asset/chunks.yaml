  trans: "\n# 第二部分\n\n让我们深吸一口气，环顾四周。如果这是在演讲厅，我会让你们看看 YouTube 上最新最火的“失败”视频，或者播放一首“感恩而死”乐队的歌，比如《涟漪》。没错，学生们都知道我完全是个怪人，但因为我曾患有急性脑损伤和癫痫，我对大脑略知一二，并且作为一个人，我知道我们需要休息。\n\
    \n我们已经成功地在表格中填充了一个城市列表。现在，在第二部分中，我们将把这个城市列表发送给谷歌，解析出每个城市的地理空间地址，存储它们，然后在用户选择列表中的某个城市时，将它们发送给\
    \ MapKit。\n\n看下面的整体概览图，我们可以看到，我们需要添加 MapKit 框架，编写代码使其工作，然后调整 Storyboard 以接收我们的新代码。\n\
    \n![images](img/00436.jpg)\n\n**图 10–27.** 点击“构建阶段”以便添加 MapKit 框架。\n\n27\\. 我们需要像在\
    \ myStory_01 中那样添加 MapKit 框架。所以，进入你的根目录，点击“构建阶段”标签，如图 10–27 所示。\n\n## 整体概览：第二部分概述\n\
    \n> 1.  用城市列表填充表格（已完成）\n> 2.  编写代码，让图钉落到所选城市的地图中心\n>     2.1. 添加 MapKit 框架\n>\
    \     2.2. 编写代码\n>     2.3. 调整 Storyboard 以接收我们的新代码。\n\n![images](img/00437.jpg)\n\
    \n**图 10–28.** 输入“map”以定位 MapKit 框架！\n\n28\\. 现在点击“将二进制文件与库链接”栏，并点击“+”按钮。当弹出窗口出现时，输入\
    \ `map` 来搜索 MapKit 框架。选中它，如图 10–28 所示，然后点击“添加”按钮。\n\n![images](img/00438.jpg)\n\
    \n**图 10–29.** 将 MapKit 框架从根文件夹移动到“Frameworks”文件夹。\n\n29\\. MapKit 框架出现在根目录中，就像它在\
    \ myStory_01 的 图 9-18 中那样。不过在那里我们还有 CoreLocation。这里没有，因为我们将使用谷歌的。同样，你需要将它拖到它所属的文件夹，即“Frameworks”文件夹，如图\
    \ 10–29 所示。\n\n![images](img/00439.jpg)\n\n**图 10–30.** 打开 `myPos` 头文件，并编写或粘贴正确的代码。\n\
    \n30\\. 我们现在将编写 `myPos` 头文件的代码。我强烈建议你不要简单地像我视频里那样把它粘贴到你的头文件中。那样做你什么也学不到。跟着我做，你将学会如何编写代码。记住，`myPos`\
    \ 处理的是公共接口，在其头文件中，我们需要设置两个主要字段，即我们城市的名称和地理空间地址。城市的名称将存储在 `title` 所指向的地址上。每个城市的地理空间经纬度地址将由二维定位方法处理，并存储在一个我们将命名为\
    \ `coordinate` 的变量中。\n\n**注意：** `CLLocationCoordinate2D` 是一个结构体，它使用世界大地测量系统（WGS\
    \ 84）参考框架包含我们的地理空间坐标，该框架以其位置来自地心，并且要知道它存在 2 厘米的误差！\n\n当我们第一次打开 `myPos.h` 文件时，我们看到以下内容：\n\
    \n```\n#import <Foundation/Foundation.h>\n@interface myPos : NSObject\n@end\n\
    ```\n\n我们要做的第一件事是通过输入 `#import <MapKit/MKAnnotation.h>` 来添加 MapKit。接下来，我们在给定的\
    \ `@interface myPos :NSObject` 后面插入 `<MKAnnotation>`。每当我们需要在地图视图中使用注解相关信息时，都会使用\
    \ `MKAnnotation` 协议。接下来，我们设置 `CLLocation` 类引用，通过输入 `CLLocationCoordinate2Dcoordinate`\
    \ 来整合我们设备的地理空间坐标和海拔高度，这将使用一个我称之为 `coordinate` 的变量。我们还需要存储城市的名称，这将通过 `NSString`\
    \ 在 `title` 中完成。最后，我们为每个城市的位置和标题创建 `@property` 语句。现在，你的 `myPos` 头文件代码将如图 10–30\
    \ 所示，或如下所示：\n\n```\n#import <Foundation/Foundation.h>\n#import <MapKit/MKAnnotation.h>\n\
    \n@interface myPos : NSObject <MKAnnotation>\n{\n    CLLocationCoordinate2D _coordinate;\n\
    \    NSString *_title;\n}\n\n@property (nonatomic, assign) CLLocationCoordinate2D\
    \ coordinate;\n@property (nonatomic, copy) NSString *title;\n\n@end\n```\n\n**注意：**\
    \ 在用于城市名称的 `@property` 中，它是一个字符串，我们使用 `(nonatomic, copy)`。我只想让你记住，在不被细节搞乱的情况下，作为一般规则，对字符串始终使用\
    \ `(nonatomic, copy)`。\n\n## 整体概览：编码概述\n\n> 1.  用城市列表填充表格（已完成）\n> 2.  编写代码，让图钉落到所选城市的地图中心\n\
    >     2.1. 添加 MapKit 框架\n>     2.2. 编写代码\n>     > 2.2.1. `myPos` 用于跟踪所选城市及其坐标\n\
    >     > 2.2.2. `myDetailViewController` 用于解析谷歌以及其他事项\n>     > 2.2.3. `myMasterTableViewController`\
    \ 用于控制到 MapKit 的转场。\n>     2.3. 调整 Storyboard 以接收我们的新代码。\n\n![images](img/00440.jpg)\n\
    \n**图 10–31.** 现在我们打开 `myPos` 的实现文件。\n\n31\\. 在 `myPos` 头文件的实现中，我们只需要合成你的坐标和标题。最终的代码如图\
    \ 10–31 所示。\n\n```\n#import \"myPos.h\"\n@implementation myPos\n\n@synthesize\
    \ coordinate=_coordinate;\n@synthesize title=_title;\n\n@end\n```\n\n![images](img/00441.jpg)\n\
    \n**图 10–32.** 打开 `myDetailViewController` 头文件进行粘贴或编写代码。\n\n32\\. 我们现在需要构建 `myDetailViewController`\
    \ 类。首先，通过在 `#import <UIKit/UIKit.h>` 之后输入 `#import <MapKit/MapKit.h>` 来导入我们的 MapKit\
    \ 地图套件头文件。现在，查看 `@interface myDetailViewController,`，我们需要让它基于 `UIViewController`，并且我们将通过编写\
    \ `<NSURLConnectionDataDelegate, MKMapViewDelegate>` 来用协议支持 `myDetailViewController`\
    \ 类，首先用于连接数据委托，其次用于支持地图视图委托。完成此操作后，我们将本地数据分配给 `NSMutableData`，如下所示。接下来，我们需要为详细信息项创建一个公共属性，我们将设置它来准备连接表格和地图视图的转场。最后，通过输入\
    \ `@property (strong, nonatomic) id detailItem` 来设置 `@property`。保存所有内容，在继续进入实现文件实现此代码之前，请对照图\
    \ 10–32 或以下内容检查你的代码。\n\n```\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\
    \n@interface myDetailViewController : UIViewController <NSURLConnectionDataDelegate,\
    \ MKMapViewDelegate> {\n    NSMutableData* locData;\n}\n\n@property (strong, nonatomic)\
    \ id detailItem;\n\n@end\n```\n"
- fmt: "### Coding the `myDetailViewController.m` File\n\nYou are about to embark\
