    > 2. 编写与多媒体平台交互的代码\n> 3. 调整弹出视图以正确抓取平台\n\n![images](img/00475.jpg)\n\n**图 11–12.**\
    \ 将第一个组命名为“艺术家”并创建两行。\n\n12. 请记住，我们还没有标记任何表格视图单元格——即单元格。我仅在“大图”的第 1.3 步中这样做，这也是最后一步，原因有二。首先，这很耗时；其次，我们将会更改它们。然而，在这种情况下，我们需要前往“属性检查器”中的“标题”区域，并简单地给它一个“虚拟”标签，这样当我们在复制这些单元格时，就总有一些东西可供编辑。所以，继续用我们第一个组的名称（即“艺术家”）来标记这个组。然后，创建\
