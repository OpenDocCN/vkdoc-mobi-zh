  trans: "\n### 属性：管理与控制\n\n首先我想说明的是，我们还需要指定这个属性是只读还是可读写。换句话说，我们需要指定它是始终保持不变，还是可以变为新的内容。用行话来说，这叫做可变性。大多数情况下，我们将使用苹果代码来处理与对象相关的属性可变性。\n\
    \n为了指示苹果代码处理可变性属性，我们会将属性声明为 `nonatomic`。要合理运用这个术语，可以尝试将 `nonatomic` 与 `atomic`\
    \ 进行对比。回想一下，`atomic` 意味着强大，它暗示着能够进入微观世界并产生影响。因此，`nonatomic` 必然意味着不那么强大、更浅层且不可操控。\n\
    \n如果我们将某个属性（如可变性）指定为 `nonatomic`，基本上是在说：“苹果，请帮我们处理可变性及相关问题——我真的不在乎。我相信你的处理！” 以后，你可能会想直接控制这个属性，届时可以将其指定为\
    \ `atomic`。不过现在，我们将采用更宽松的方式，让苹果处理微观事务。所以，当需要选择其中一种指定方式时，直接使用 `nonatomic` 即可！\n\
    \n关于这一点，我想做的第二个说明涉及内存管理。我们需要解决一个问题：当我们存储一个对象时，如何让 iPhone/iPad 知道它是只读还是可读写。换句话说，我们需要能够向计算机传达与对象相关联的内存的本质——即谁可以更改它、何时以及如何更改。一般来说，我们希望能控制这些信息，并将其掌握在自己手中——也就是保留它。随着你继续学习本书中的后续练习，我们会将代码控制在自己手中；我们将保留管理内存的权利。\n\
    \n我们可以将这些细节总结添加到属性指令中，以及如何修改代码，如下所示：\n\n*   `@property (nonatomic, retain)` 指令的含义如下：\n\
    \    *   可变性应为 `nonatomic`。苹果，请处理这个问题！\n    *   内存管理是我们想要 `retain` 的部分。我们将保持控制权。\n\
    *   `@synthesize` 指令用于实现我们在 `@property` 指令中声明的方法。\n\n我们还需要为这种组合增加一层复杂性。我们将这些指令添加在两个不同的文件中。我们在头文件中使用一条语句定义\
    \ `@property` 指令，然后在实现文件中使用 `@synthesize` 指令来实现它。\n\n*   头文件：`helloWorld_04_ViewController.h`\n\
    \n```objc\n@property (nonatomic, retain) //“我们的内容”\n```\n\n*   实现文件：`helloWorld_04_ViewController.m`\n\
    \n```objc\n@synthesize //我们在头文件的 @property 中定义的“我们的内容”。\n```\n\n我们需要为我们的两个 `IBOutlets`\
    \ 分别编写两个这样的指令：一个用于文本，另一个用于图片。此外，因为我们仍然在头文件中，所以在实现文件中合成时也需要重复这一步。好了，现在开始输入你的代码：\n\
    \n```objc\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController :\
    \ UIViewController {\n\n    IBOutlet UILabel *label;\n    IBOutlet UIImageView\
    \ *Kant;\n}\n\n@property (nonatomic, retain) IBOutlet UILabel *label;\n@property\
    \ (nonatomic, retain) IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\
    \n@end\n```\n\n是的，为了解释 `@property (nonatomic, retain)` 这一句，似乎说了很多。不过请记住，我们正处于深入探讨的阶段……我们告诉计算机，我们希望苹果处理可变性，但我们希望保留对内存的控制权。稍后，我们将在实现文件中为这两个\
    \ `IBOutlets` 合成这些命令。\n\n`IBOutlets`？还记得它们吗？哦，对了——让我们回到程序的那部分。文本的 `IBOutlet` 是带指针\
    \ `*label` 的 `UILabel`，因此我们输入了如下代码来控制标签的文本：\n\n```objc\n#import <UIKit/UIKit.h>\n\
    \n@interface helloWorld_04ViewController : UIViewController {\n\n    IBOutlet\
    \ UILabel *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet UILabel *label;\n@property (nonatomic, retain) IBOutlet UIImageView\
    \ *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n```\n\n图片的 `IBOutlet`\
    \ 是带指针 `*uiImageView` 的 `UIImageView`，因此请为图片输入代码：\n\n```objc\n#import <UIKit/UIKit.h>\n\
    \n@interface helloWorld_04ViewController : UIViewController {\n\n    IBOutlet\
    \ UILabel *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet UILabel *label;\n@property (nonatomic, retain) IBOutlet UIImageView\
    \ *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n\n    IBOutlet UIImageView\
    \ *uiImageView;\n```\n\n头文件处理完了吗？还没有。我们需要看一下我们的 `IBActions`。我们已经分析了两个 `IBOutlets`，但现在我们要分析一下我们用于……你能猜到吗？的\
    \ `IBAction`。\n"
- fmt: "### Adding IBActions\n\nYes, we needed a button! So we made an `IBAction`\
    \ for our button, as shown in [Figure 4–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos281787).\
    \ We could “go deep” again, into the code for the `IBAction`, but this has been\
    \ a challenging section. Let's save the technical part of this element for “Digging\
    \ the Code.” Meanwhile, just enter the new code that is highlighted here. See\
    \ if you can anticipate the functions of the different pieces—or parameters—and\
    \ we'll see how close you are later.\n\nThis is what we will be focusing on:\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController : UIViewController\
    \ {\n\n    IBOutlet UILabel *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property\
    \ (nonatomic, retain) IBOutlet UILabel *label;\n@property (nonatomic, retain)\
    \ IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n\
    ```\n\nGO OUT NOW, AND TAKE A BREAK.\n\n![images](images/00139.jpg)  \nFigure\
    \ 4–30. Leave the Assistant and click on the Standard editor.\n\n30. We now need\
    \ to redraw our user interface so that we can work on our implementation file.\
    \ We need to leave the Assistant editor and click on the Standard editor, as shown\
    \ in [Figure 4–30](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos310156).\n\
    \n![images](images/00140.jpg)  \nFigure 4–31. Show the Navigator.\n\n31. We now\
    \ need to show the Navigator, so we can jump from the header file into the implementation\
    \ file. Of course, we have many different ways to do this, but for now just follow\
    \ along, as this is the least complex means of doing this. See [Figure 4–31](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos310761).\n\
    \n![images](images/00141.jpg)  \nFigure 4–32. Save your work and open the implementation\
    \ file.\n\n32. Right now, the Interface Builder is showing our `.nib` file. Save\
    \ everything and then go to your Navigator and click on the implementation file\
    \ (`.m`), as shown in [Figure 4–32](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos311396).\n\
    \n![images](images/00142.jpg)  \nFigure 4–33. With the implementation file open\
    \ we can now code.\n\n33. Now that you have your implementation file open, let's\
    \ look at [Figure 4–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos312010)\
    \ and first think of a means for providing synthesis. We've gone over making the\
    \ `@property` directives for our label text and Kant image in the header file\
    \ so that we would then have code the `@synthesize` statements for these two `IBOutlets`\
    \ in our implementation file—so let's do it. Type in your synthesis code as shown\
    \ below:\n\n```\n#import \"helloWorld_04ViewController.h\"\n\n@implementation\
    \ helloWorld_04ViewController\n@synthesize label, Kant;\n\n- (void)dealloc\n{\n\
    \    [label release];\n    [Kant release];\n    [super dealloc];\n}\n...\n\n-\
    \ (IBAction)buttonGuess:(id)sender {\n}\n@end\n```  \n![images](images/00143.jpg)\
    \  \nFigure 4–34. Delete the `viewDidLoad` code.\n\n34. We do not need the `viewDidLoad`\
    \ code, since we are manipulating it a little differently. Therefore, select it\
    \ and then delete it, as shown in [Figure 4–34](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos313249).\n\
    \n![images](images/00144.jpg)  \nFigure 4–35. Write the first two lines of the\
    \ `buttonGuess` method.\n\n35. As indicated in [Figure 4–35](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos313823),\
    \ we are now ready to program the code that will execute when the user presses\
    \ the button. In other words, we are now ready to program the button's code. Scroll\
    \ down until you get to the `buttonGuess` method that exists, but is currently\
    \ empty.\n\n```\n#import \"helloWorld_04ViewController.h\"\n\n@implementation\
    \ helloWorld_04ViewController\n@synthesize label, Kant;\n...\n\n- (IBAction)buttonGuess:(id)sender\
    \ {\n\n}\n\n@end\n```\n\nWhen the user runs this app and presses the button, the\
    \ image of Kant will appear instantly on top of the background staircase. He is\
    \ going to “say” something via the embedded text. How about, “Hello World, I'm\
    \ back!” To accomplish this, we need to associate the label instance variable\
    \ with a text property assigned with our desired text as follows:\n\n```\n#import\
    \ \"helloWorld_04ViewController.h\"\n\n@implementation helloWorld_04ViewController\n\
    @synthesize label, Kant;\n...\n\n- (IBAction)buttonGuess:(id)sender {\nlabel.text\
    \ = @\"Hello World I'm back!\";\n}\n\n@end\n```\n\nHaving completed the task of\
    \ coding for the text, we now need to add the code that will cause the image of\
    \ Kant to appear. For this, we will use a class method called `imageNamed` that\
    \ will display the `kantStair.png` image, the top-layer photo we prepared at the\
    \ beginning of this project. Enter the line bolded in the following code, immediately\
    \ under the code you just entered for the text:\n\n```\n#import \"helloWorld_04ViewController.h\"\
    \n\n@implementation helloWorld_04ViewController\n@synthesize label, Kant;\n...\n\
    \n- (IBAction)buttonGuess:(id)sender {\nlabel.text = @\"Hello World I'm back!\"\
    ;\nUIImage *imageSource = [UIImage imageNamed:@\"kantStair.png\"];\n\n}\n\n@end\n\
    ```\n\nOur pointer's name for the image is `Kant`, but right now the `kant.png`\
    \ image file is in `UIImage`'s assigned pointer called `imageSource`.\n\n```\n\
    #import \"helloWorld_04ViewController.h\"\n\n@implementation helloWorld_04ViewController\n\
    @synthesize label, Kant;\n...\n\n- (IBAction)buttonGuess:(id)sender {\nlabel.text\
    \ = @\"Hello World I'm back!\";\nUIImage *imageSource = [UIImage imageNamed:@\"\
    kantStair.png\"];\n}\n\n@end\n```\n\nWe need to assign this automatically assigned\
    \ pointer `imageSource` to the image of Kant as shown in the following code:\n\
    \n```\n#import \"helloWorld_04ViewController.h\"\n\n@implementation helloWorld_04ViewController\n\
    @synthesize label, Kant;\n...\n\n- (IBAction)buttonGuess:(id)sender {\nlabel.text\
    \ = @\"Hello World I'm back!\";\nUIImage *imageSource = [UIImage imageNamed:@\"\
    kantStair.png\"];\nKant.image = imageSource;\n}\n\n@end\n```\n\nIf this doesn't\
    \ quite make sense at the moment, that's OK. There sure are a lot of entities\
    \ with “image” as part of their name, object, or association, and it is confusing.\
    \ We'll be examining this topic more thoroughly as we move forward, so, right\
    \ now, don't lose any sleep over it! [Figure 4–36](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos318730)\
    \ illustrates how your code should appear at this point. Now save your work by\
    \ entering `Cmd+S`, and give yourself a pat on the back. You have worked through\
    \ the header and implementation files at a much deeper level than in previous\
    \ chapters. Even though you have walked through some of these technical functions\
    \ before, you braved them again while remaining open to a deeper understanding.\
    \ You also tackled a very difficult concept: synthesis.\n\n![images](images/00145.jpg)\
    \  \nFigure 4–36. With the code all written, let's run it.\n\n36. Now that we\
    \ are through writing our code, let's run it and see if we have any errors. See\
    \ [Figure 4–36](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos318730).\n\
    \n![images](images/00146.jpg)  \nFigure 4–37. Error! Misspelled label.\n\n37.\
    \ As seen in [Figure 4–37](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos319239),\
    \ we have errors. Clearly `lavel` should be `label`, so I changed it to `label`.\
    \ You, of course, type very much better than I do so this means nothing to you—unless\
    \ you have been diligently following each step in the video. Nonetheless, with\
    \ the typo fixed, let's save it and run it again.\n\n![images](images/00147.jpg)\
    \  \nFigure 4–38. Your screen as it runs.\n\n38. [Figure 4–38](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_017.html#filepos319974)\
    \ shows your screen with `helloWorld_04` running with the button clicked. Notice\
    \ that the icons are still on the side, with the `helloWorld_04` folder below\
    \ it.\n\n![images](images/00148.jpg)  \nFigure 4–39. The two `helloWorld_04` views."
