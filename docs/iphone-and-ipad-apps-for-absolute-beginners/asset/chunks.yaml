    \n### Zoom Out… Seeing the Big Picture\n\nIt's important to know where we came\
    \ from, where we are now, and where we are going next. Not to get too metaphysical,\
    \ but this chapter is a bit of a metaphor for our lives. Where were you five years\
    \ ago? Last year? One day before you bought this book? Where do you intend to\
    \ be six months from now?\n\nThat's why this subject is so popular. People love\
    \ to know where they are! People love to know, and love to be shown how to get\
    \ from “here” to “there.”\n\nYou know how men stereotypically refuse to stop and\
    \ ask for directions? I know I do—it is because I should just know where I'm going.\
    \ When GPS came on the scene, I was impressed. But when Apple included one, by\
    \ way of ‘Maps,' in my first iPhone, I was totally blown away. All of a sudden,\
    \ I had the ability to consult the oracle and maintain my male ego at the same\
    \ time!\n\nThat's power, that's authority… and that's the same revolution we all\
    \ joined. Now that you have completed this book, and successfully navigated through\
    \ these exercises—some easier, some tougher—you are well on your way in the world\
    \ of programming.\n\nAs I stated earlier, my goals for you in this chapter were\
    \ humble. However, as in any really challenging and worthwhile pursuit, practice\
    \ makes perfect. If you are exhausted, but still excited about these ideas and\
    \ possibilities, then I count that as full success—both for you and for myself.\n\
    \nSome of you are perhaps thinking about topics that we did not cover in this\
    \ book: the accelerometer, cameras/videos, peer–to–peer protocol, RSS feeds, mail\
    \ clients/POP servers, etc. If these areas interest you, my hope is that your\
    \ mind is already racing off in these new directions. That means you do know where\
    \ you are, and that you know where you want to go. Life is good!\n\n## Chapter\
    \ 10\n\n## MapKit & Tables with Storyboarding\n\nThere are five things I want\
    \ you to bear in mind regarding this chapter:"
