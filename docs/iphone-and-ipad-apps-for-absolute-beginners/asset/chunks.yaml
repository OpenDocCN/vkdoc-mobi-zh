    \ Import the `myPos` header file\n>     > 2.2.2.2.2. Create a private interface\n\
    >     > 2.2.2.2.3. Synthesize the `detailItem`\n>     > 2.2.2.2.4. Code the `detailItem`\
    \ method and update its view\n>     > 2.2.2.2.5. Code the `configureView` method\n\
    >     > 2.2.2.2.5.1. Go to `googleapis.com`\n>     > 2.2.2.2.5.2. Parse the longitudinal\
    \ and latitudinal cords.\n>     > 2.2.2.2.5.3. Update the user interface for the\
    \ detail item\n>     > 2.2.2.2.5.4. Setup zoom and pin drop.\n>     > 2.2.3. `myMasterTableViewController`\
    \ to control the segue to MapKits.\n>     2.3. Tweak Storyboard to accept our\
    \ new code.\n\n![images](images/00442.jpg)\n\n**Figure 10–33.** Open up the `myDetailViewController`\
    \ implementation file.\n\n33. As one can see from looking at the Big Picture,\
    \ the `myDetailViewController` is going to contain a significant amount of code\
    \ so let's start by coding the code found in the “07 Part 2myDetailViewController\
    \ m” boiler plate code. Open the file, as shown in [Figure 10–33](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos843181).\n\
    \na. We first need to import the `myPos.h` file because, when we setup the zoom\
    \ and pin drop code, we use title and coordinate for the `myPos` annotation.\n\
    \n```objc\n#import \"MyPos.h\"\n```\n\nb. Next we need configure our view as a\
    \ private method by using a forward declaration of our method that you will code\
    \ later. You can see what I mean here by looking at the code before my comment\
    \ below `// private method`. We are declaring `configureView`. Do you see it anywhere\
    \ yet? Nope? That's because we have yet to code it. But we will. It's private\
    \ because it starts with the `@interface [name of this class]` followed by a `()`\
    \ and then ends with an `@end`.\n\n```objc\n@interface myDetailViewController\
    \ ()\n- (void)configureView;  // private method\n@end\n```\n\nc. Lastly, for this\
