  trans: '

    #### 你已经说过了“你好！”……但现在，轮到 INDIO 了！


    我们可以将大多数 iPhone 和 iPad 应用划分为四种不同的功能：交互（Interaction）、导航（Navigation）、数据（Data）和输入/输出（I/O）。我们已经见过足够多的应用，知道我们可以与它们进行交互；可以从一个屏幕导航到另一个屏幕；可以操作和利用数据；还可以提供输入（打字、粘贴、语音）并接收输出（图像、声音、文本、乐趣！）。


    在我们再次聚焦，从这些特定领域中的任何一个入手编写程序之前，我们首先需要更好地理解 iPhone/iPad 编程的这些不同方面是如何工作、呈现和运作的。我们还需要了解它们的局限性，以及在预期或期望的用户体验方面的利弊，并且，由于上述差异，还要考虑应用是为
    iPhone 还是 iPad 开发的。在 `helloWorld_04` 中，你可能并未察觉，但我们继续深入探讨了 INDIO——交互、导航、数据和输入/输出。我们的代码通过不同的方式获取了两张图片，这些图片将与用户进行交互。这次练习让我们更接近
    INDIO 的 I/O 方面，但我们还没有完全理解它，因为简单地说，我们还没到那一步。


    就像一个数字世界的勇士，你正沿着一条小路走进 Objective-C 的森林，去到一个你需要习惯于跨越河流、狩猎老虎、在雨中生火等等的地方。到目前为止，你已经学会了在干燥的天气里用打火石和钢片生火，并且已经相当擅长跳过小溪。这一课将教你跨越更宽的河流，并且到了那里之后，还要学会狩猎老虎。很快，你就能装备齐全，在令人生畏的
    INDIO 领域里与传说中的 I/O 恶魔搏斗了。


    当你对任何限制和障碍所在之处有了实用的认识后，你穿越这四个领域（广阔“森林”的所有部分）的旅程将会更加强大且富有成效。我的工作中非常重要的一部分就是向你展示如何安全地穿越
    INDIO 森林。森林的某些部分比其他部分更令人生畏，但好消息是，你将获得一个很好的、高层次的视野，就像从直升机上俯瞰一样！在我们的空中之旅结束后，我们将跳伞降落到森林地面，打开
    Xcode，继续探索路径、水源地和捷径——标记出不必要的区域，并留意野生动物。


    ##### 模型-视图-控制器


    如前所述，开发 Cocoa Touch 的程序员使用了一种称为模型-视图-控制器（MVC）的概念作为 iPhone 和 iPad 应用代码的基础。以下是基本思想。


    **模型**：它持有使应用程序运行的数据和类。这是程序中你可能会发现我之前让你忽略的代码段的部分。这段代码也可以持有代表你应用中可能有的项目（例如，弹球、卡通人物、数据库中的名字、日历中的约会）的对象。


    **视图**：它是用户在使用你的应用时看到的所有好东西的组合。在这里，你的用户与按钮、滑块、控件以及其他他们能感知和欣赏的体验进行交互。这里你可能有一个由许多其他视图组成的主视图。


    **控制器**：控制器将模型和视图连接在一起，同时始终跟踪用户正在做什么。可以将其视为应用的结构规划——骨架。这就是我们如何协调用户按下的按钮，以及必要时如何从一个视图切换到另一个视图，所有这些都是为了响应用户的输入、反应、数据等。


    ![images](img/00149.jpg)


    图 4–40. 模型、视图和控制器（MVC）。


    考虑以下示例，它说明了如何使用 MVC 概念将 iPhone/iPad 应用的功能划分为三个不同的类别。图 4–40 展示了你的应用表示图；我称它为“MVC
    解释”。你可以看到 VIEW 显示了“你的超酷精彩应用包含 3 层：A、B 和 C”的表示形式——一个标签。


    在应用的 CONTROLLER 部分，我们看到三个独立的层被分开：层 “A”、层 “B” 和层 “C”。根据用户在 VIEW 域中点击的控制机制，用户看到的显示内容，CONTROLLER
    会返回适当的响应——来自三个准备好的层中的下一个视图。


    你的应用可能会使用某种类型的数据，这些信息将被存储在程序的 MODEL 部分。数据可以是电话号码、玩家的分数、地图上的 GPS 位置等等。


    当用户与应用中的 VIEW 部分交互时，它可能需要从你的数据库中检索数据。假设你的数据包含用户停放汽车的位置。当用户按下程序中某个特定按钮时，它可能会从 MODEL
    中检索 GPS 数据。如果是一个移动目标，它还可能追踪用户相对于停车场中汽车的位置变化。最后，CONTROLLER 可能会更改数据的状态（或模式）。可能一种状态显示电话号码，而另一种状态显示
    GPS 位置或游戏中的前十名得分。动画也是在 CONTROLLER 中进行的。动画中发生的事情可能会影响甚至改变模型中状态。这可以通过使用各种工具来实现，例如
    `UIKit` 对象，来控制每个层、状态等并为其设置动画。


    如果这听起来很复杂，请记住，你已经在不知不觉中完成了其中的大部分工作！在示例 1 中，你让用户按下一个按钮，然后弹出一个写着“Hello World！”的标签。这表明你已经构建了一个与
    `ViewController` 的交互。当然，我们将进一步探索这些可能性。在第 4 章中，我们将更深入地探索 INDIO 森林的交互象限，并允许用户添加和删除表格视图项。


    当我们这样做时，我将尽最大努力让你在涉及交互……通过导航时，始终专注于大局。我们的目标是让用户每进入一个新视图，就能从较泛泛的信息移动到更具体的信息。


    ### 接下来的章节


    在第 5 章中，我们将进入下一个复杂层次：切换视图应用。我们将研究代码中的一组角色或角色如何协同工作，以引导出一个结果或一系列结果，从而给用户带来无缝流畅的感觉。


    你将学习委托者和切换视图控制器、类和子类，以及“懒加载”。我们将深入探讨 `.xib` 文件的细节，研究内存释放的概念，并了解嵌入式代码注释。事情变得越来越好奇了……


    继续前进到下一章！


    ## 第 5 章


    ## 触摸


    在我们的第五个应用中，我们向前迈出了一大步，真正编写了一些代码。我现在想说的是：尽管这是一个巨大的飞跃，但总有一条简单的出路。是的，我希望你尽最大努力，在你勤奋地按照步骤操作时，键入所有代码。是的，我甚至希望你在想要放弃的时候也能坚持下去；然而，在这一点上，我想和你澄清一些事情，就像我对我的学生所做的那样。

    '
- fmt: "### Redefining “Giving Up”\n\nWe need to talk about this for one page and\
    \ I want you to read through this—you will probably need to in order to prepare\
    \ yourself for this chapter. In the past, you may have associated “giving up”\
    \ with totally relinquishing a dream you had. So let me share with you my outlook\
    \ on three terms: “giving up,” “dreams,” and “goals”. I want to talk about these\
    \ terms in the context of the following four points:\n\n*   A person can have\
    \ a dream until the day he or she dies. For example, one could dream of being\
    \ a supernova geek who programs phenomenal multi-million dollar apps. A person\
    \ could have that dream until the day he or she dies, even if he or she had never\
    \ even touched an iPhone or knew what the word “`Xcode`” meant. This is because\
    \ the equation that makes up a dream has no element of time.\n*   A goal, however,\
    \ is simply a dream with an added element of time. Think about it. When the element\
    \ of time in your goal's equation runs out, you FAIL! It's really simple. If you\
    \ plan to become a supernova geek and sell a million apps within 12 months and\
    \ you cannot compile “`hello world`” after 12 months, then you've FAILED!\n* \
    \  The more we accomplish goals within our time constraints, the more confident\
    \ we become. That's why a good professor sets baby steps along the way to ensure\
    \ that his or her students accomplish goals and feel really good about themselves.\
    \ That's why good professors make little programs that move students a little\
    \ closer to their ultimate goals. Each week, my students need to finish a set\
    \ goal by programming an app. If they do not send me that completed app within\
    \ the time limit, I fail them for that assignment! However, this is rare because\
    \ rather than give up when it gets really hard, I have some back up angels that\
    \ help my students succeed and meet their goals in time.\n*   Rather than give\
    \ up when the going gets tough, you can\n    *   First, watch me program this\
    \ code in the video at [`http://bit.ly/qp6aCS`](http://bit.ly/qp6aCS) and simply\
    \ follow along. I go a little fast to keep the video short, but you can always\
    \ pause it. In June 2011, the average person paused the video 28.5 times (all\
    \ viewers). The average student of mine paused the video 11.3 times.\n    *  \
    \ Secondly, if watching the video does not result in total success, you can download\
    \ my code for this program at [`http://bit.ly/r1isYn`](http://bit.ly/r1isYn).\
    \ Here, you can visually compare your code with mine. I tell students to try visually\
    \ comparing first; if that doesn't work, I have them paste my code into either\
    \ `Pages` or `Word`, and then paste their code into another similar document.\
    \ After this, they should GO AWAY from their computers and check my code line\
    \ by line against theirs.\n    *   Thirdly, if the preceding steps don't work,\
    \ I don't want you to give up! I want you to paste my code into your code after\
    \ you have dragged your icons from the nib file into your header file. This means\
    \ that you still do steps 1 through to 30, which involve mostly dragging and dropping.\
    \ Then, paste the implementation code into your implementation. When it compiles,\
    \ I want you to then try it again on your own before moving on to the next chapter.\n\
    \nThe preceding steps eliminate the possibility of you giving up on being a supernova\
    \ geek. I LOVE receiving emails from students and readers telling me how proud\
    \ they are of being geeks, and how they cannot believe that so many people are\
    \ downloading and buying their apps. I especially love it when they tell me that\
    \ they never programmed before in their lives, and how this book showed them they\
    \ could program apps and not give up. A wife and mother of four in Helena, Montana\
    \ brought me to tears when she told me that when her husband lost his job as a\
    \ boiler maker, she bought my book and never gave up—she supported her family\
    \ for over a year until her husband found another job. She still programs and\
    \ sells apps.\n\nEssentially, first and foremost, try your hardest to do it by\
    \ just reading the chapter. If it's too much for you, then check out the video.\
    \ If the video does not help, then download the code, move away from your computer,\
    \ and check your code visually, line by line. As a last resort, you can paste\
    \ my code into yours after you drag-and-drop the other elements into your code.\n\
    \nOK—let's do it.\n\n### Roadmap Recap\n\nGoing back to the car mechanic analogy,\
    \ we understand that nowadays, as mentioned in the previous chapter, car mechanics\
    \ are very specialized: only a handful know how to completely strip down and rebuild\
    \ a specific car. So far, we have been peering over the shoulder of one such car\
    \ mechanic, as he has changed and swapped specific components inside the engine.\
    \ Today, you will build a very basic lawnmower engine. It will involve more steps\
    \ than you've had to take thus far, but at the end of this chapter, you will have\
    \ taken a huge leap forward.\n\nAs you build your lawnmower engine, there will\
    \ be times that you look down and see a bigger mess of tools, nuts, and bolts\
    \ than you have ever seen before. But hang in there. Follow me as I ask you to\
    \ stand up from time to time and look at that “mess” from my point of view, not\
    \ yours, and it will all make sense to you.\n\n### Touches: A View-Based Application\n\
    \nThe touches app initially looks like the cover of this book. The lulu fruit\
    \ however, can be moved around with your fingertips after you touch it. There\
    \ are also three buttons on the top called `Shrink`, `Move`, and `Change`. The\
    \ `Shrink` button is a special button; after you press it, the lulu fruit icon\
    \ shrinks and the text inside the button automatically changes to `Grow`. Upon\
    \ pressing the `Grow` button that used to be the `Shrink` button, the lulu fruit\
    \ grows back to its original size. If you like, you can quickly have a look at\
    \ Figures 5–45, 5–46, and 5–47. You can also see the app working right at the\
    \ beginning of the video here: [`http://bit.ly/qp6aCS`](http://bit.ly/qp6aCS).\
    \ Only look at the app working though—don't follow the video through the code,\
    \ as I want to explain the code to you in a specific way."
  raw: "### Redefining “Giving Up”\n\nWe need to talk about this for one page and\
    \ I want you to read through this—you will probably need to in order to prepare\
    \ yourself for this chapter. In the past, you may have associated “giving up”\
    \ with totally relinquishing a dream you had. So let me share with you my outlook\
    \ on three terms: “giving up,” “dreams,” and “goals”. I want to talk about these\
    \ terms in the context of the following four points:\n\n*   A person can have\
    \ a dream until the day he or she dies. For example, one could dream of being\
    \ a supernova geek who programs phenomenal multi-million dollar apps. A person\
    \ could have that dream until the day he or she dies, even if he or she had never\
    \ even touched an iPhone or knew what the word “Xcode” meant. This is because\
    \ the equation that makes up a dream has no element of time.\n*   A goal, however,\
    \ is simply a dream with an added element of time. Think about it. When the element\
    \ of time in your goal's equation runs out, you FAIL! It's really simple. If you\
    \ plan to become a supernova geek and sell a million apps within 12 months and\
    \ you cannot compile “hello world” after 12 months, then you've FAILED!\n*   The\
    \ more we accomplish goals within our time constraints, the more confident we\
    \ become. That's why a good professor sets baby steps along the way to ensure\
    \ that his or her students accomplish goals and feel really good about themselves.\
    \ That's why good professors make little programs that move students a little\
    \ closer to their ultimate goals. Each week, my students need to finish a set\
    \ goal by programming an app. If they do not send me that completed app within\
    \ the time limit, I fail them for that assignment! However, this is rare because\
    \ rather than give up when it gets really hard, I have some back up angels that\
    \ help my students succeed and meet their goals in time.\n*   Rather than give\
    \ up when the going gets tough, you can\n    *   First, watch me program this\
    \ code in the video at [`http://bit.ly/qp6aCS`](http://bit.ly/qp6aCS) and simply\
    \ follow along. I go a little fast to keep the video short, but you can always\
    \ pause it. In June 2011, the average person paused the video 28.5 times (all\
    \ viewers). The average student of mine paused the video 11.3 times.\n    *  \
    \ Secondly, if watching the video does not result in total success, you can download\
    \ my code for this program at [`http://bit.ly/r1isYn`](http://bit.ly/r1isYn).\
    \ Here, you can visually compare your code with mine. I tell students to try visually\
    \ comparing first; if that doesn't work, I have them paste my code into either\
    \ Pages or Word, and then paste their code into another similar document. After\
    \ this, they should GO AWAY from their computers and check my code line by line\
    \ against theirs.\n    *   Thirdly, if the preceding steps don't work, I don't\
    \ want you to give up! I want you to paste my code into your code after you have\
    \ dragged your icons from the nib file into your header file. This means that\
    \ you still do steps 1 through to 30, which involve mostly dragging and dropping.\
    \ Then, paste the implementation code into your implementation. When it compiles,\
    \ I want you to then try it again on your own before moving on to the next chapter.\n\
    \nThe preceding steps eliminate the possibility of you giving up on being a supernova\
    \ geek. I LOVE receiving emails from students and readers telling me how proud\
    \ they are of being geeks, and how they cannot believe that so many people are\
    \ downloading and buying their apps. I especially love it when they tell me that\
    \ they never programmed before in their lives, and how this book showed them they\
    \ could program apps and not give up. A wife and mother of four in Helena, Montana\
    \ brought me to tears when she told me that when her husband lost his job as a\
    \ boiler maker, she bought my book and never gave up—she supported her family\
    \ for over a year until her husband found another job. She still programs and\
    \ sells apps.\n\nEssentially, first and foremost, try your hardest to do it by\
    \ just reading the chapter. If it's too much for you, then check out the video.\
    \ If the video does not help, then download the code, move away from your computer,\
    \ and check your code visually, line by line. As a last resort, you can paste\
    \ my code into yours after you drag-and-drop the other elements into your code.\n\
    \nOK—let's do it.\n\n### Roadmap Recap\n\nGoing back to the car mechanic analogy,\
    \ we understand that nowadays, as mentioned in the previous chapter, car mechanics\
    \ are very specialized: only a handful know how to completely strip down and rebuild\
    \ a specific car. So far, we have been peering over the shoulder of one such car\
    \ mechanic, as he has changed and swapped specific components inside the engine.\
    \ Today, you will build a very basic lawnmower engine. It will involve more steps\
    \ than you've had to take thus far, but at the end of this chapter, you will have\
    \ taken a huge leap forward.\n\nAs you build your lawnmower engine, there will\
    \ be times that you look down and see a bigger mess of tools, nuts, and bolts\
    \ than you have ever seen before. But hang in there. Follow me as I ask you to\
    \ stand up from time to time and look at that “mess” from my point of view, not\
    \ yours, and it will all make sense to you.\n\n### Touches: A View-Based Application\n\
    \nThe touches app initially looks like the cover of this book. The lulu fruit\
    \ however, can be moved around with your fingertips after you touch it. There\
    \ are also three buttons on the top called Shrink, Move, and Change. The Shrink\
    \ button is a special button; after you press it, the lulu fruit icon shrinks\
    \ and the text inside the button automatically changes to Grow. Upon pressing\
    \ the Grow button that used to be the Shrink button, the lulu fruit grows back\
    \ to its original size. If you like, you can quickly have a look at Figures 5–45,\
    \ 5–46, and 5–47\\. You can also see the app working right at the beginning of\
    \ the video here: [`http://bit.ly/qp6aCS.`](http://bit.ly/qp6aCS.) Only look at\
    \ the app working though—don't follow the video through the code, as I want to\
    \ explain the code to you in a specific way."
  trans: "\n### 重新定义“放弃”\n\n我们需要用一页的篇幅来讨论这个问题，我希望你仔细阅读以下内容——你很可能需要这样做，以便为本章做好准备。过去，你可能将“放弃”与完全舍弃你曾拥有的一个梦想联系在一起。那么，请允许我分享我对三个术语的看法：“放弃”、“梦想”和“目标”。我想围绕以下四点来讨论这些术语：\n\
    \n*   一个人可以直至死亡都怀有一个梦想。例如，有人可能梦想成为一名编程奇才，开发出价值数百万美元的惊人应用。即使这个人从未碰过 iPhone，也不知道“`Xcode`”这个词是什么意思，他或她仍可以一直到死都怀有这个梦想。这是因为构成梦想的公式中不包含时间元素。\n\
    *   然而，一个目标，仅仅是一个加入了时间元素的梦想。想想看。当你目标公式中的时间耗尽时，你就**失败**了！这非常简单。如果你计划在 12 个月内成为一名编程奇才并卖出\
    \ 100 万个应用，而 12 个月后你连“`hello world`”都编译不出来，那么你就**失败**了！\n*   我们在规定时间内达成的目标越多，我们就越自信。这就是为什么一位好教授会设置一系列小步快跑的阶段性目标，以确保他或她的学生能达成目标并感觉良好。这也是为什么好教授会设计一些小程序，让学生们逐步接近他们的最终目标。每周，我的学生都需要通过编程一个应用来完成一个既定目标。如果他们未能在规定时间内将完成的应用发送给我，我会判定该作业不及格！然而，这种情况很少发生，因为当遇到困难时，他们不会放弃，我有一些“后备天使”来帮助我的学生成功并及时达成目标。\n\
    *   当进展不顺利时，与其放弃，你可以：\n    *   首先，观看我在视频中编写这段代码的过程，网址是 [`http://bit.ly/qp6aCS`](http://bit.ly/qp6aCS)，然后简单地跟着做。为了让视频简短，我的速度有点快，但你随时可以暂停。在\
    \ 2011 年 6 月，普通观众平均暂停视频 28.5 次（所有观看者）。我的学生平均暂停视频 11.3 次。\n    *   其次，如果观看视频未能让你完全成功，你可以在\
    \ [`http://bit.ly/r1isYn`](http://bit.ly/r1isYn) 下载我这个程序的代码。在这里，你可以直观地将你的代码与我的进行比较。我告诉学生们先尝试通过目视比较；如果不行，我会让他们把我的代码粘贴到\
    \ `Pages` 或 `Word` 中，然后把自己的代码粘贴到另一个类似的文档中。做完这些后，他们应该**离开**电脑，逐行对照我的代码检查他们自己的代码。\n\
    \    *   第三，如果前面的步骤都不奏效，我不希望你放弃！我希望你将我的代码粘贴到你的代码中，前提是你已经将图标从 nib 文件拖拽到了你的头文件中。这意味着你仍然需要完成第\
    \ 1 到第 30 步，这些步骤主要涉及拖放操作。然后，将实现代码粘贴到你的实现部分。当它编译成功后，我希望你在进入下一章之前，再独立尝试一次。\n\n以上步骤排除了你放弃成为编程奇才的可能性。我**非常喜欢**收到学生和读者的邮件，他们告诉我为自己成为极客感到多么自豪，并且难以置信有那么多人正在下载和购买他们的应用。我尤其喜欢他们告诉我，他们以前从未编过程序，而这本书记录了他们如何学会编程应用并且没有放弃。蒙大拿州海伦娜市的一位妻子和四个孩子的母亲曾让我热泪盈眶，她告诉我，当她的锅炉工丈夫失业时，她买了我的书，并且从未放弃——她支撑家庭超过一年，直到她的丈夫找到另一份工作。她现在仍然在编程和销售应用。\n\
    \n本质上，首要任务是，尽最大努力只通过阅读本章来尝试。如果对你来说太难了，那么就去看看视频。如果视频没有帮助，那就下载代码，离开电脑，通过目视逐行检查你的代码。作为最后的手段，你可以先完成其他元素的拖放操作，然后将我的代码粘贴到你的代码中。\n\
    \n好了——我们开始吧。\n\n### 路线图回顾\n\n回到汽车修理工的类比，我们理解到，如今，正如前一章所提到的，汽车维修非常专业化：只有少数人知道如何彻底拆解并重建一辆特定的车。到目前为止，我们一直从一位这样的汽车修理工肩头观察，看他如何更换和调换发动机内部的具体部件。今天，你将构建一个非常基本的割草机发动机。它将涉及比你迄今为止要完成的更多步骤，但在本章结束时，你将向前迈出一大步。\n\
    \n当你构建你的割草机发动机时，有时你会低头看到比你以往见过的更混乱的工具、螺母和螺栓。但请坚持住。跟随我，当我要求你时不时站起来，从我的角度，而不是你的角度，去审视那一团“混乱”时，一切都会变得清晰起来。\n\
    \n### 触摸交互：一个基于视图的应用\n\n触摸交互应用最初看起来就像这本书的封面。然而，鲁鲁果在你触碰它之后，可以用指尖移动。顶部还有三个按钮，分别是\
    \ `Shrink`、`Move` 和 `Change`。`Shrink` 按钮是一个特殊的按钮；按下它后，鲁鲁果图标会缩小，按钮内的文字会自动变成 `Grow`。按下这个曾经是\
    \ `Shrink` 按钮的 `Grow` 按钮，鲁鲁果会恢复其原始大小。如果你愿意，可以快速查看图 5–45、5–46 和 5–47。你也可以在以下视频的开头看到这个应用的实际运行效果：[`http://bit.ly/qp6aCS`](http://bit.ly/qp6aCS)。但**只看**应用的运行效果——不要跟着视频看代码，因为我希望用一种特定的方式向你解释代码。\n"
- fmt: "#### `CGAffineTransform` Structs\n\nWe will also be working on animation code\
    \ that the clever people at Apple wrote into a bundle called a data structure.\
    \ This is a critical tool coders use to perform animations of their objects. The\
    \ data structure can shrink an object, change its angle, move it, tilt it, and\
    \ make it do all sorts of other cool animations. All the code that Apple uses\
    \ to perform these animations is kept in vaults located in core animation data\
    \ structures called structs. Apple explains this by saying that the “`CGAffineTransform`\
    \ data structure represents a matrix used for affine transformations.” Huh? What\
    \ does that mean? It means that the `CGAffine` transforms all the critical points\
    \ of an object you want to animate into a property called a transform. This property\
    \ is simply a matrix. Once the object you want to animate is in this matrix, `CGAffine`\
    \ is able to obey us when we instruct it to change our object's position, angle,\
    \ shape, scale, and so on. This is what we'll do to the lulu fruit icon.\n\n>\
    \ ![images](images/00150.jpg)\n\n**Figure 5–1.** The five background images and\
    \ two lulu fruit icons downloaded from the repository\n\n1. Do I even need to\
    \ say this? Close all programs, delete all trash, and drag all your important\
    \ files and folders to a proper destination so that you have a perfectly clean\
    \ desktop. Download the images from [`http://bit.ly/prqKsL`](http://bit.ly/prqKsL)\
    \ and upon unzipping the downloaded file, you will see seven images on your desktop.\
    \ The five background images are various versions of the cover of this book. The\
    \ first image will be the upper left-hand one in [Figure 5–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos349386),\
    \ which is a picture of the front of the book without the lulu fruit icon. One\
    \ can see that the lulu fruit icon is separate from the background pictures. The\
    \ larger lulu fruit icon is the one that will be on the user screen and will be\
    \ animated via the `CGAffineTransforms` we impose upon it. The smaller lulu fruit\
    \ icon is the `icon.png` version. Our Change button will scroll through all five\
    \ background images. The Shrink button and Move buttons will use `CGAffine` structs\
    \ to animate the lulu fruit icon.\n\n> **NOTE:** You can of course use your own\
    \ images and icons. However, this is a long chapter even without spending resources\
    \ on creating your own images. In class I tell students to hand in this homework\
    \ assignment using my icons first. Later, they can use their own and if done on\
    \ time (within three days), they can hand in their homework again with their own\
    \ icons for extra credit. No students have done this yet.\n\n![images](images/00151.jpg)\n\
    \n**Figure 5–2.** The seven images opened on your desktop, ready to launch into\
    \ Xcode\n\n2. Your desktop should look similar to mine, as shown in [Figure 5–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos351558),\
    \ with nothing but the seven icons and your Mac hard drive on your desktop. Once\
    \ everything is clean and your images are stacked up and ready to go, YOU are\
    \ ready to blast off!\n\n![images](images/00152.jpg)\n\n**Figure 5–3.** Enter\
    \ `N`. Xcode 4.2 provides the option for a Single-View Application, which is the\
    \ same as the older versions of View-Based Application.\n\n3. Like we have done\
    \ before, launch Xcode and open a new project by using your keyboard shortcut\
    \ `N`. When you see the New Project wizard as depicted in [Figure 5–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos353901),\
    \ you will want to click the Single View Application template.\n\n   Once your\
    \ New Project Window has opened and you have selected the Single View Application,\
    \ I want you to press return (“Enter”), or click the Next button.\n\n![images](images/00154.jpg)\n\
    \n**Figure 5–4.** Call your project “touches.”\n\n4. Call your project “touches,”\
    \ and most importantly, remember to deselect the “Use Storyboard” option. Once\
    \ the project is correctly named and the storyboard option is deselected, as shown\
    \ in [Figure 5–4](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos353279),\
    \ press Return or click Next.\n\n![images](images/00155.jpg)\n\n**Figure 5–5.**\
    \ Select the option to save your project to your desktop.\n\n5. Save your project\
    \ to your desktop. You can probably guess by now that we make sure that our current\
    \ project is located on the desktop. After we're done with it, we place it an\
    \ appropriate folder.\n\n![images](images/00156.jpg)\n\n**Figure 5–6.** Drag your\
    \ images over to your Supporting Files folder.\n\n6. Initially, when Xcode instantiates\
    \ itself, it will create a large window that nearly covers your entire desktop.\
    \ Grab the bottom right-hand corner and shrink the window just enough to see the\
    \ seven images you downloaded from the repository at [`http://www.rorylewis.com`](http://www.rorylewis.com).\
    \ As illustrated in [Figure 5–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos354489),\
    \ drag all your images over into your Supporting Files folder in Xcode.\n\n![images](images/00157.jpg)\n\
    \n**Figure 5–7.** Check the “Copy items into the destination group's folder …”\
    \ box.\n\n7. After dropping the image into the `Resources` folder, you will be\
    \ prompted to define whether the image will always be associated with its position\
    \ on your desktop or embedded with the code and carried along with the application\
    \ file, as shown in [Figure 5–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos355328).\
    \ We want it to be embedded, of course, so click the “Copy items into destination\
    \ group's folder …” box. Also, check the “Create groups for any added folders”\
    \ box. Then, click “Finish” (or press Enter).\n\n![images](images/00158.jpg)\n\
    \n**Figure 5–8.** Drag your images into the trash.\n\n8. After you have dumped\
    \ all your images into Xcode appropriately, there is really no need to keep them\
    \ on your desktop or save them anywhere else. If you want to use them again in\
    \ another version or if this run through does not work, simply open up the `touches`\
    \ folder and they will all be there. There is no need to duplicate the images.\
    \ So go ahead and trash the images that remain on your desktop, as shown in [Figure\
    \ 5–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos356227).\n\n![images](images/00159.jpg)\n\
    \n**Figure 5–9.** Let's make your icon first.\n\n9. First, let's make the icon.\
    \ Open up your plist while you are in the Supporting Files folder and enter “`icon.png`”\
    \ into the icon name, as shown in [Figure 5–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos357058).\
    \ It's not a bad habit to immediately connect your icon into the plist right after\
    \ dropping in all your images. Once you leave this folder, you might forget to\
    \ do it later.\n\n![images](images/00160.jpg)\n\n**Figure 5–10.** Click on your\
    \ nib file, open up the Utilities View, and close the Navigator View.\n\n10. Once\
    \ you have associated your icon with `icon.png` or the name of your personal icon\
    \ (if you named it differently), I want you to open your `touchesViewController.xib`\
    \ file, as shown in [Figure 5–10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos357790).\
    \ As we have done before, we need more space, so let's also open the Utilities\
    \ View, so we can see the tools and icons we need to dress up the View design\
    \ area. Secondly, close the Navigator View, because for now, we do not need it.\n\
    \n![images](images/00161.jpg)\n\n**Figure 5–11.** Drag a `UIImageView` onto your\
    \ View design area."
  raw: '#### CGAffineTransform Structs


    We will also be working on animation code that the clever people at Apple wrote
    into a bundle called a data structure. This is a critical tool coders use to perform
    animations of their objects. The data structure can shrink an object, change its
    angle, move it, tilt it, and make it do all sorts of other cool animations. All
    the code that Apple uses to perform these animations is kept in vaults located
    in core animation data structures called structs. Apple explains this by saying
    that the “`CGAffineTransform` data structure represents a matrix used for affine
    transformations.” Huh? What does that mean? It means that the `CGAffine` transforms
    all the critical points of an object you want to animate into a property called
    a transform. This property is simply a matrix. Once the object you want to animate
    is in this matrix, `CGAffin`e is able to obey us when we instruct it to change
    our object''s position, angle, shape, scale, and so on. This is what we''ll do
    to the lulu fruit icon.


    > ![images](images/00150.jpg)


    Figure 5–1\. The five background images and two lulu fruit icons downloaded from
    the repository


    1\. Do I even need to say this ? Close all programs, delete all trash, and drag
    all your important files and folders to a proper destination so that you have
    a perfectly clean desktop. Download the images from [`http://bit.ly/prqKsL`](http://bit.ly/prqKsL)
    and upon unzipping the downloaded file, you will see seven images on your desktop.
    The five background images are various versions of the cover of this book. The
    first image will be the upper left-hand one in [Figure 5–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos349386),
    which is a picture of the front of the book without the lulu fruit icon. One can
    see that the lulu fruit icon is separate from the background pictures. The larger
    lulu fruit icon is the one that will be on the user screen and will be animated
    via the `CGAffineTransforms` we impose upon it. The smaller lulu fruit icon is
    the `icon.png` version. Our Change button will scroll through all five background
    images. The Shrink button and Move buttons will use `CGAffine` structs to animate
    the lulu fruit icon.


    NOTE: You can of course use your own images and icons. However, this is a long
    chapter even without spending resources on creating your own images. In class
    I tell students to hand in this homework assignment using my icons first. Later,
    they can use their own and if done on time (within three days), they can hand
    in their homework again with their own icons for extra credit. No students have
    done this yet.


