    \ = self`.\n3.  Two actions in this step: first, tell the parser to get the Gratefuldead\
    \ data: `[parser getGratefuldeadData];`  \n\n    Second, handle its import:\n\n\
    \    `#import \"GratefuldeadParser.h\"`  \n\n    Then, when the `– (void)viewWillAppear`\
    \ is invoked, it would create an instance of `GratefuldeadParser`. As it receives\
    \ the locations of all the Deadheads, it shows us where they are!\n\nDo you recall\
    \ how we made sure that the user of the app would appear on the map as a blue\
    \ dot? I want you to think of the blue dot as just an annotationview. When added\
    \ to the `deadView,` it essentially asks its delegate for its location.\n\nNOTE:\
    \ If we return anything other than nil, then our annotation view, instead of the\
    \ blue one, will be used and then return that view.\n\nSo, looking at this, we\
    \ return nil when the annotation does not equal the user's current location.\n\
    \n  `- (MKAnnotationView *)deadView:(MKDeadView *)deadView`\n`                  viewForAnnotation:(id\
    \ <MKAnnotation>)annotation {`\n`MKAnnotationView *view = nil;`\n`return view;`\
    \  \n\nBut here's the thing; we do not want to returnnilfor our `Gratefuldead`locations.\
    \ Conversely, we want to do cool things when our annotation is not equal to the\
    \ `deadViewuserLocation` property, which itself is an annotation:\n\n  `if(annotation\
    \ != deadView.userLocation) {`\n\n`                // THIS IS WHERE WE DO OUR\
    \ COOL STUFF`\n`               // BECAUSE IT'S A DEADHEAD, NOT THE USER`\n`}`\
    \  \n\nAt this point, we use the `dequeueReusableAnnotationViewWithIdentifier`,\
    \ delegate method, which is available for reuse the instant they are off screen.\
    \ It has a handy way of storing annotations in a separate data structure and then\
    \ automatically adding and removing them from your map as the user's events require\
    \ it. Note that `dequeueReusableAnnotationViewWithIdentifier`is about getting\
    \ the reusable annotation view from the map, and it has nothing to do with adding\
    \ or removing annotations:\n\n  `GratefuldeadAnnotation *eqAnn = (GratefuldeadAnnotation*)annotation;`\n\
    `view = [self.deadView  dequeueReusableAnnotationViewWithIdentifier:@\"GratefuldeadLoc\"\
    ];`\n`       if(nil == view) {`\n`        view = [[[MKPinAnnotationView alloc]\
    \ initWithAnnotation:eqAnn`\n`                                              reuseIdentifier:@\"\
    GratefuldeadLoc\"] autorelease];`\n`}`  \n\nThe annotation view goes and looks\
    \ in its reuse queue to see if there are any views that can be reused `if(nil\
    \ == view) { …` If there are none, it returns nil, which means we need to create\
    \ a new one `view = [[[MKPinAnnotationViewalloc] initWithAnnotation:eqAnn.`\n\n\
    There are many creative ways to make your annotations appear with animated chevrons,\
    \ bells and whistles, Grateful Dead beads, and so on. You can see what's out there\
    \ and available to make the iCandy portion of your annotations however you might\
    \ wish.\n\nIn this regard, at this point of writing your code, the most important\
    \ step is to review your code for errors using your NSLog debugger; this will\
    \ determine whether it connects to a server of your choice. Once complete, it\
    \ becomes an issue of parsing the XML. Then, the final step is to shop for iCandy\
    \ for the annotations.\n\n#### Three MapKit Final Projects: CS–201 iPhone Apps,\
    \ Objective–C\n\nThe following are three apps that draw heavily on parsing information\
    \ from the Internet. The first two come from a father and son, both named Stephen\
    \ Moraco, and the third is from SatishRege. They were all kind enough to write\
    \ unedited bios as to why they took the class. They also included detailed lecture\
    \ notes, the apps shown in this book, and what they got out of the course.\n\n\
    BIOGRAPHICAL INFO FOR EXAMPLES 1 AND 2\n\n> Stephen A. Moraco (Son)\n> \n>  \n\
    > \n> Stephen M. Moraco (Father)\n> \n>  \n> \n> Steve A. ([Figure 9–39](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos745689))\
    \ is in his senior year in high school. He has been concurrently enrolled at UCCS\
    \ and has taken courses for dual credit (both high school and college). I, Stephen\
    \ M. ([Figure 9–40](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos745990)),\
    \ am a professional software engineer working for Agilent Technologies, Inc. Both\
    \ of us have iPhones and have an interest in learning to write applications for\
    \ the iPhone. The UCCS course caught our attention as a way we could learn this\
    \ together. In fact, we really enjoyed Dr. Lewis' CS201 classes, in which we toured\
    \ the iPhone SDK and practiced writing a number of applications. The discussions\
    \ in class and then between the two of us as we were driving home always had us\
    \ excited about things we could do with the iPhone. Our final projects came from\
    \ these discussions. Dr. Lewis, thank you for offering this course. It provided,\
    \ in our case, a wonderful time of shared learning. We couldn't have had a more\
    \ enjoyable time.\n> \n>  \n> \n> > ![images](images/00393.jpg)\n> \n> Figure\
    \ 9–39\\. StephenA.Moraco(Son)\n> \n>   ![images](images/00394.jpg)  \n> \n> Figure\
    \ 9–40\\. Stephen M.Moraco(Father)"
  trans: "\n# 起点\n\n如果我们要创建这样一款应用，就像“Routesy”示例那样，我们会允许用户通过打开属性检查器并启用“显示用户位置”开关来查看自己的位置。我们会创建一个名为\
    \ `DeadHeadsView` 的控制器，它负责实例化一个我们称之为 `Gratefuldead` 的解析器。然后，我们会让该控制器将自己设置为委托，以便接收反馈，并调用一个名为\
    \ `getGratefuldead` 的数据方法。\n\n# 从网络获取数据\n\n当我们的解析器在“感恩而死”服务器上筛选 XML 时，我们希望它抓取\
    \ `Gratefuldead` 元素数据，并为每个 `Gratefuldead` 对象创建一个实例。因此，对于它创建的每个实例，它会通过 `addGratefuldead`\
    \ 方法回调给我们。我们需要在 `deadHeadsViewcontroller` 中实现我们的 `Gratefuldead` 和 `Parser` 方法。我们可能会发现，以如下方式思考我们的\
    \ `GratefuldeadParser.h` 会更容易：\n\n```\n+ (id)GratefuldeadParser; // 用于创建解析器\n\
    - (void)getGratefuldeadData; // 用于激活数据获取\n```\n\n# 向视图控制器添加方法\n\n在向 `DeadHeadsView`\
    \ 控制器添加实现方法之前，我们需要通过 `GratefuldeadParser` 代理来实现协议，并导入其头文件 `#import <GratefuldeadParser.h>`。至此，头文件部分就完成了，我们将转到实现文件。\n\
    \n首先，我们会从 `GratefuldeadParser.h` 中复制两个实现方法，并将它们粘贴到 `@synthesize` 语句之后：\n\n```\n\
    @implementation DeadHeadsViewC0ntroller\n\n@synthesize deadView\n\n- (void)getGratefuldeadData:(Gratefuldead\
    \ *)Gratefuldead;\n-(void)parserFinished\n```\n\n# 测试解析器数据源\n\n为了测试“感恩而死”服务器，我们将尝试记录一些消息。让我们将这两个方法分开，删除分号，添加大括号，然后输入“log”，如下所示：\n\
    \n```\n- (void)getGratefuldeadData:(![images](img/00392.jpg) Gratefuldead *)Gratefuldead\
    \ {\nNSLog(@\"嬉皮士消息\");\n}\n\n-(void)parserFinished{\nNSLog(@\"在 %@ 位置发现一名死忠粉\"\
    , Gratefuldead.place);\n}\n```\n\n# 启动解析器方法\n\n实现了我们的委托方法之后，我们需要做三件事：\n\n1.  编写解析器方法。将其放入一个我们称之为\
    \ `(void)viewWillAppear` 的方法中。当视图控制器的视图即将显示时，此方法会被调用。如果采用这种方式，请注意我们应始终在 `- (void)viewWillAppear`\
    \ 方法中进行调用。\n2.  创建一个我们称之为 `GratefuldeadParser` 的解析器实例。通过此操作，我们会得到 `GratefuldeadParser\
    \ *parser = [GratefuldeadParsergratefuldeadParser]`。我们希望将自身设置为委托，这意味着，现在 `GratefuldeadParserparser.delegate\
    \ = self`。\n3.  此步骤包含两个操作：首先，告诉解析器获取“感恩而死”数据：`[parser getGratefuldeadData];`\n\
    \n其次，处理其导入：\n\n```\n#import \"GratefuldeadParser.h\"\n```\n\n然后，当调用 `– (void)viewWillAppear`\
    \ 时，它会创建一个 `GratefuldeadParser` 实例。当它接收到所有死忠粉的位置时，它会向我们展示他们的位置！\n\n还记得我们如何确保应用的用户会以蓝点的形式显示在地图上吗？我希望你把蓝点想象成一个注解视图。当它被添加到\
    \ `deadView` 时，它会向其委托请求位置信息。\n\n注意：如果我们返回任何非 nil 的值，那么将使用我们自己的注解视图（而非蓝色的），然后返回那个视图。\n\
    \n因此，由此看来，当注解不等于用户的当前位置时，我们返回 nil。\n\n```\n- (MKAnnotationView *)deadView:(MKDeadView\
    \ *)deadView\n                  viewForAnnotation:(id <MKAnnotation>)annotation\
    \ {\nMKAnnotationView *view = nil;\nreturn view;\n```\n\n但问题在于：我们不希望为 `Gratefuldead`\
    \ 的位置返回 nil。相反，当我们的注解不等于 `deadViewuserLocation` 属性（该属性本身也是一个注解）时，我们希望做一些酷炫的事情：\n\
    \n```\nif(annotation != deadView.userLocation) {\n\n                // 这里是我们做酷炫事情的地方\n\
    \               // 因为这是一个死忠粉，而不是用户\n}\n```\n\n此时，我们使用 `dequeueReusableAnnotationViewWithIdentifier`\
    \ 委托方法，当注解视图一离开屏幕，它就会被回收以供重用。它有一种便捷的方式，可以将注解存储在一个独立的数据结构中，然后根据用户事件的需要自动在地图上添加或移除它们。请注意，`dequeueReusableAnnotationViewWithIdentifier`\
    \ 是关于从地图上获取可重用的注解视图，与添加或移除注解无关：\n\n```\nGratefuldeadAnnotation *eqAnn = (GratefuldeadAnnotation*)annotation;\n\
    view = [self.deadView  dequeueReusableAnnotationViewWithIdentifier:@\"GratefuldeadLoc\"\
    ];\n       if(nil == view) {\n        view = [[[MKPinAnnotationView alloc] initWithAnnotation:eqAnn\n\
    \                                              reuseIdentifier:@\"GratefuldeadLoc\"\
    ] autorelease];\n}\n```\n\n注解视图会去它的重用队列中查找是否有可以重用的视图 `if(nil == view) { …`。如果没有，它会返回\
    \ nil，这意味着我们需要创建一个新的 `view = [[[MKPinAnnotationViewalloc] initWithAnnotation:eqAnn`。\n\
    \n有很多创造性的方法可以让你的注解展示带有动画的 V 形标记、铃铛和口哨、“感恩而死”的珠子等等。你可以查看已有的可用资源，以你希望的任何方式为你的注解打造视觉甜点。\n\
    \n在这方面，当你编写代码到此阶段时，最重要的步骤是使用你的 NSLog 调试器检查代码中的错误；这将决定它是否能连接到你所选的服务器。一旦完成，剩下的就是解析\
    \ XML 的问题。最后一步是为注解寻找视觉甜点。\n\n# 三个 MapKit 最终项目：CS–201 iPhone 应用，Objective–C\n\n\
    以下是三个大量依赖从互联网解析信息的应用。前两个来自一对父子，两人都叫 Stephen Moraco，第三个来自 SatishRege。他们都好心地提供了未经编辑的个人简介，说明了他们为什么选修这门课。他们还包含了详细的课堂笔记、本书中展示的应用，以及他们从课程中的收获。\n\
    \n## 示例 1 和 2 的个人简介信息\n\n> Stephen A. Moraco（儿子）\n>\n> Stephen M. Moraco（父亲）\n\
    >\n> Steve A. (图 9–39) 正在读高中最后一年。他同时还在 UCCS（科罗拉多大学斯普林斯分校）注册并修读了可以获得双重学分（高中和大学均认可）的课程。我，Stephen\
    \ M. (图 9–40)，是安捷伦科技有限公司的一名专业软件工程师。我们俩都拥有 iPhone，并且对学习为 iPhone 编写应用感兴趣。UCCS 的这门课程引起了我们的注意，它让我们有机会一起学习。事实上，我们非常享受\
    \ Lewis 博士的 CS201 课程，在课程中我们探索了 iPhone SDK 并练习编写了许多应用。课堂上的讨论，以及课后我们俩开车回家路上的交流，总是让我们对能用\
    \ iPhone 做些什么感到兴奋不已。我们的最终项目正是源于这些讨论。Lewis 博士，感谢您开设这门课程。对我们而言，这提供了一段美好的共同学习时光。我们度过了无比愉快的时光。\n\
    >\n> ![images](img/00393.jpg)\n>\n> 图 9–39\\. Stephen A. Moraco（儿子）\n>\n> ![images](img/00394.jpg)\n\
    >\n> 图 9–40\\. Stephen M. Moraco（父亲）\n"
- fmt: "### Final Project—Example 1\n\nStephen M. Moraco's app is one that is close\
    \ to his heart. Being an amateur radio hobbyist, he decided to parse Bob Bruning's\
    \ WB4APR site, where Bob had developed an Automatic Position Reporting System\
    \ (APRS). Very much like the example that I gave in class, locating Deadheads,\
    \ Stephen, the father, made an app that can locate all the Amateur Radio Operators\
    \ that are within a user–specified distance from where they are at the time. I\
    \ will not go over all of Stephen's code because you can download it and go over\
    \ it carefully. The portions I think you should take note of are as follows: His\
    \ `APRSmapViewController` header file sets out the road map with 3 IBOutlets,\
    \ 1 IBAction, and a ViewController:\n\n```\n@property (nonatomic, retain) IBOutlet\
    \ MKMapView *mapView;\n@property (nonatomic, retain) APRSwebViewController *webBrowserController;\n\
    @property (nonatomic, retain) IBOutlet UISegmentedControl *ctlMapTypeChooser;\n\
    @property (nonatomic, retain) IBOutlet UIActivityIndicatorView *aiActivityInd;\n\
    \n-(IBAction)selectMapMode:(id)sender;\n```\n\nIn the `APRSkit_MoracoDadAppDelegate`\
    \ implementation file, he uses the following code to give the user a chance to\
    \ log in. See [Figure 9–41](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos749587)\
    \ for the results. The particulars of this step, seen in the `-(void)applicationDidFinishLaunching`\
    \ method, also houses the distance (radius) from the user that the system will\
    \ search for matches:\n\n```\n-(void)applicationDidFinishLaunching:(UIApplication*)application{\n\
    \n    NSLog(@\"MapAPRS_MoracoDadAppDelegate:applicationDidFinishLaunching - ENTRY\"\
    );\n    //Override point for customization after app launch\n\n    [window addSubview:[navigationController\
    \ view]];\n          [window makeKeyAndVisible];\n\n     //preload our applcation\
    \ defaults\n     NSUserDefaults *upSettings = [NSUserDefaults standardUserDefaults];\n\
    \     NSString *strDefaultCallsign = [upSettings stringForKey:kCallSignKey];\n\
    \     if(strDefaultCallsign == nil)\n     {\n          strDefaultCallsign = strEmptyString;\n\
    \     }\n     self.callSign = strDefaultCallsign;\n     //[strDefaultCallsign\
    \ release];\n\n     NSString *strDefaultSitePassword = [upSettings stringForKey:kSitePasswordKey];\n\
    \     if(strDefaultSitePassword == nil)\n     {\n          strDefaultSitePassword\
    \ = strEmptyString;\n     }\n     self.sitePassword = strDefaultSitePassword;\n\
    \n     NSString *strDefaultDistanceInMiles = [upSettings stringForKey:kDistanceInMilesKey];\n\
    \     if(strDefaultDistanceInMiles == nil)\n     {\n          strDefaultDistanceInMiles=@\"\
    30\";\n     }\n     self.distanceInMiles = strDefaultDistanceInMiles;\n     //[strDefaultSitePassword\
    \ release];\n     //INCORRECT DECR [upSettings release];\n}\n```\n\n![images](images/00395.jpg)\n\
    \nFigure 9–41\\. CS–201 Final Project—Stephen M. Moraco's APRS set–up screen where\
    \ users enter their Amateur Radio call signs and passwords.\n\nOne of the first\
    \ things Stephen did when he went to the website was make a list of all the attributes\
    \ in the XML feed. The following list shows what he saw.\n\n* Column–1 was the\
    \ call sign, CALLSIGN\n* Column–2 was the URL to Message traffic if available\n\
    * Column–3 was the URL to Weather page if available\n* Column–4 was the Latitude\n\
    * Column–5 was the Longitude\n* Column–6 was the distance from me (in miles)\n\
    * Column–7 was the DD:HH:MM:SS of the last report\n\nTo account for this data,\
    \ he made eight pointers in his `APRSstationParser.m` file. Note that he has an\
    \ extra one for possible unknown columns.\n\n```\nNSString *kCallSignCol     \
    \     = @\"Callsign\";\nNSString *kMsgURLCol            = @\"MsgURL\";\nNSString\
    \ *kWxURLCol             = @\"WxURL\";\nNSString *kLatitudeCol          = @\"\
    Lat\";\nNSString *kLongitudeCol         = @\"Long\";\nNSString *kDistanceCol \
    \         = @\"Distance\";\nNSString *kLastReportCol        = @\"LastReport\"\
    ;\nNSString *kUnknownCol           = @\"???\";// re didn't recognize column #\n\
    ```\n\nThen, in the same file, he made `case` statements:\n\n```\ncase1:\n   \
    \       m_strColumnName=kCallSignCol;\n          break;\n      case2:\n      \
    \    m_strColumnName=kMsgURLCol;\n          break;\n      case3:\n          m_strColumnName=kWxURLCol;\n\
    \          break;\n      case4:\n          m_strColumnName=kLatitudeCol;\n   \
    \       break;\n      case5:\n          m_strColumnName=kLongitudeCol;\n     \
    \     break;\n      case6:\n          m_strColumnName=kDistanceCol;\n        \
    \  break;\n      case7:\n          m_strColumnName=kLastReportCol;\n         \
    \ break;\n     default:\n          m_strColumnName=kUnknownCol;\n          break;\n\
    ```\n\nAlso, in the `APRSkit_MoracoDadAppDelegate` implementation file, the `-(void)recenterMap`\
    \ method scans all annotations to determine geographical center and, just as we\
    \ did in this chapter's exercise, to calculate the region of the map to display.\
    \ Stephen does likewise after his three `if` statements. [Figure 9–42](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos755516)\
    \ shows an image of the pins dropping.\n\n```\n-(void)recenterMap{\n    NSLog(@\"\
    \ - APRSpinViewController:recenterMap - ENTRY\");\n         NSArray *coordinates\
    \ = [self.mapView\nvalueForKeyPath:@\"annotations.coordinate\"];\n     CLLocationCoordinate2DmaxCoord={-90.0f,-180.0f};\n\
    \     CLLocationCoordinate2DminCoord={90.0f,180.0f};\n     for(NSValue*valueincoordinates){\n\
    \          CLLocationCoordinate2Dcoord={0.0f,0.0f};\n          [value getValue:&coord];\n\
    \               if(coord.longitude>maxCoord.longitude){\n                    maxCoord.longitude=coord.longitude;\n\
    \               }\n               if(coord.latitude>maxCoord.latitude){\n    \
    \                maxCoord.latitude=coord.latitude;\n               }\n       \
    \        if(coord.longitude<minCoord.longitude){\n                    minCoord.longitude=coord.longitude;\n\
    \               }\n               if(coord.latitude<minCoord.latitude){\n    \
    \                minCoord.latitude=coord.latitude;\n               }\n}\n```\n\
    \nNote that in the `APRSstation` class, Stephen represents the details parsed\
    \ from the APRS, which sets the location of the pins.\n\n```\n#import<CoreLocation/CoreLocation.h>\n\
    \n@interfaceAPRSstation:NSObject{\n     NSString    *m_strCallsign;\n     NSDate\
    \      *m_dtLastReport;\n     NSNumber    *m_nDistanceInMiles;\n     NSString\
    \    *m_strMsgURL;\n     NSString    *m_strWxURL;\n     NSString    *m_strTimeSinceLastReport;\n\
    \     CLLocation  *m_locPosition;\n     int          m_nInstanceNbr;\n}\n\n@property(nonatomic,\
    \ copy)NSString *callSign;\n@property(nonatomic, copy)NSNumber *distanceInMiles;\n\
    @property(nonatomic, retain)NSDate *lastReport;\n@property(nonatomic, copy)NSString\
    \ *timeSinceLastReport;\n@property(nonatomic, copy)NSString *msgURL;\n@property(nonatomic,\
    \ copy)NSString *wxURL;\n@property(nonatomic, retain)CLLocation *position;\n\n\
    @end\n```\n\n![images](images/00396.jpg)\n\nFigure 9–42\\. CS–201 Final Project—Stephen\
    \ M. Moraco's Animated pins drop down within the specified radius of the user's\
    \ location. Here on the iPad simulator, the pins drop in the surrounding areas\
    \ of Apple Headquarters.\n\nAnother cool thing Stephen did was to distinguish\
    \ between the amateur radio stations that have their own websites and those that\
    \ do not. For the ones that have web sites, on the annotation view, he includes\
    \ a chevron which, when clicked, yields the web page. See Figures 9–42 and 9–43.\
    \ This code is directly under the switch cases in the `APRSstationParser.m` file.\n\
    \n![images](images/00397.jpg)\n\nFigure 9–43\\. CS–201 Final Project—Stephen M.\
    \ Moraco's app provides Annotations to appear when one clicks on a pin and where\
    \ a linked website is on the APRS server, a blue chevron appears where one may\
    \ click to go to the amateur radio station's website. In this case, amateur radio\
    \ station KJ6EXD–7 does have a website.\n\n![images](images/00398.jpg)\n\nFigure\
    \ 9–44\\. CS–201 Final Project—Stephen M. Moraco's App showing the KJ6EXD–7 website\
    \ embedded in the iPad."
  raw: '##### Final Project—Example 1


    Stephen M. Moraco''s app is one that is close to his heart. Being an amateur radio
    hobbyist, he decided to parse Bob Bruning''s WB4APR site, where Bob had developed
    an Automatic Position Reporting System (APRS). Very much like the example that
    I gave in class, locating Deadheads, Stephen, the father, made an app that can
    locate all the Amateur Radio Operators that are within a user–specified distance
    from where they are at the time. I will not go over all of Stephen''s code because
    you can download it and go over it carefully. The portions I think you should
    take note of are as follows: His `APRSmapViewController` header file sets out
    the road map with 3 IBOutlets, 1 IBAction, and a ViewController:


    `@property (nonatomic, retain) IBOutlet MKMapView *mapView;`

    `@property (nonatomic, retain) APRSwebViewController *webBrowserController;`

    `@property (nonatomic, retain) IBOutlet UISegmentedControl *ctlMapTypeChooser;`

    `@property (nonatomic, retain) IBOutlet UIActivityIndicatorView *aiActivityInd;`


    `-(IBAction)selectMapMode:(id)sender;`


    Inthe `APRSkit_MoracoDadAppDelegate` implementation file, he uses the following
    code to give the user a chance to log in. See [Figure 9–41](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos749587)
    for the results. The particulars of this step, seen in the `-(void)applicationDidFinishLaunching`
    method, also houses the distance (radius) from the user that the system will search
    for matches:


    `-(void)applicationDidFinishLaunching:(UIApplication*)application{`


    `    NSLog(@"MapAPRS_MoracoDadAppDelegate:applicationDidFinishLaunching - ENTRY");`

    `    //Override point for customization after app launch`


    `    [window addSubview:[navigationController view]];`

    `          [windowmakeKeyAndVisible];`


    `     //preload our applcation defaults`

    `     NSUserDefaults *upSettings = [NSUserDefaults standardUserDefaults];`

    `     NSString *strDefaultCallsign = [upSettings stringForKey:kCallSignKey];`

