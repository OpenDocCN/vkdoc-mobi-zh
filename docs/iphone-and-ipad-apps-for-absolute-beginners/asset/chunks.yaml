- fmt: "### Coding the Move Button\n\nProgramming the code that makes the Move button\
    \ operate is exactly the same as the code we used for the Shrink button, except\
    \ that we do not change the text inside the button, so leave that out.\n\n![images](images/00186.jpg)\n\
    \n**Figure 5–36.** Coding the `move` method\n\n36\\. We are then left with the\
    \ same four states. Simply change all the cases of “shrunk” to “moved” and it's\
    \ identical. Check your code against mine in [Figure 5–36](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos433868).\n\
    \n**NOTE:** I suggest that you first cut and paste the first “if” statements from\
    \ the shrink method then swap out the shrinks and moves. After this, paste it\
    \ three times; change the relevant cases of “if” to “else if” and “else.” Lastly,\
    \ change the scaling to moving in the `CGAffineTransformTranslates`.\n\n### Coding\
    \ the Change Button\n\nThe only thing left to do now is to write the code that\
    \ will change the backgrounds when we press the Change button.\n\n![images](images/00187.jpg)\n\
    \n**Figure 5–37.** Code the `change` method.\n\n37\\. We will essentially perform\
    \ five jobs: increment the current background; make sure the incrementation keeps\
    \ the images contained in our array; initialize the `UIView`; create animations\
    \ for our backgrounds as they get loaded; and lastly, commit and change the background.\
    \ Our starting roadmap for our `change` method is as follows:\n\n```\n-(IBAction)change:(id)sender\n\
    {\n  Increment background to the next background image\n  Check to see currentBackground\
    \ doesn't go off the array\n  Initialize the UIView\n  Create animations\n  Commit\
    \ and change\n}\n```\n\nI have said before that each time we press the Change\
    \ button, it will change the image by changing the number of the background image.\
    \ If `wallPaper_01` is presently housed in the background and we press Change,\
    \ then we will increment it; meaning, we will add one and bring on `wallPaper_02`\
    \ as the next background. All this means is that each time the Change button is\
    \ pressed, before we do anything else, we need to increment the `currentBackground`\
    \ as follows:\n\n```\n-(IBAction)change:(id)sender\n{\n  currentBackground++;\n\
    \  Check to see currentBackground doesn't go off the array\n  Initialize the UIView\n\
    \  Create animations\n  Commit and change\n}\n```\n\nIf we keep incrementing,\
    \ then we will go beyond the number of images lined up in our array. Therefore,\
    \ we need to reset the count back to zero once we reach the number of images in\
    \ our array. This is illustrated by the following:\n\n```\n-(IBAction)change:(id)sender\n\
    {\n  currentBackground++;\n  if(currentBackground >= [bgImages count])\n    currentBackground\
    \ = 0;\n  Initialize the UIView\n  Create animations\n  Commit and change\n}\n\
    ```\n\nTo initialize the `UIView`, we need to do two things, but I've added a\
    \ third task just to be cool. We have to reset (reboot, set to zero—however you\
    \ want to say it), the `beginAnimations` method that those incredibly supercalifragilistic\
    \ dudes at Apple wrote! Then, we need to set how long each animation is going\
    \ to be. As I mentioned when we did the initializing before, I set the initializing\
    \ in-between changes to 1 second. To be cool, I incorporated a third task: determining\
    \ how smoothly each animation will start and end using the `UIViewAnimationCurveEaseInOut`\
    \ method. This is illustrated by the following:\n\n```\n-(IBAction)change:(id)sender\n\
    {\n  currentBackground++;\n  if(currentBackground >= [bgImages count])\n    currentBackground\
    \ = 0;\n  [UIView beginAnimations:@\"changeview\" context:nil];\n  [UIView setAnimationDuration:1];\n\
    \  [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n  Create animations\n\
    \  Commit and change\n}\n```\n\n**NOTE:** To actually change the backgrounds,\
    \ we need be careful how we wrap our heads around this concept. Read this carefully\
    \ and do your best to follow along.\n\nWe divide the changing of each background\
    \ into two steps.\n\n1. First, we ask whether the current background's numerical\
    \ value, or tag, is the one we're dealing with. If it's true, then we perform\
    \ the code within the squiggly brackets (shown in the next bullet).\n2. We will\
    \ then use the `setAnimationTransition` method to perform whatever other method\
    \ we have chosen. There are methods to curl up, curl down, move in from the left\
    \ or right, flip this way, do that, or do this. Or you can create your own method\
    \ . . . when you become an uber geek. Right now, I'm just using curls and page\
    \ flips, so I will call these transitions appropriately.\n\nLooking at it a little\
    \ more closely, for each animation, we use the form as follows:\n\n```\nif(currentBackground\
    \ == the # we want)\n  [UIView setAnimationTransition:\n                     \
    \  UIViewAnimationTransition the animation we choose\n                    forView:self.view\n\
    \                    cache:YES];\n```\n\nNow repeating this method and using randomly\
    \ chosen animations for each animation, the code takes on the following form:\n\
    \n```\n-(IBAction)change:(id)sender\n{\n  currentBackground++;\n  if(currentBackground\
    \ >= [bgImages count])\n    currentBackground = 0;\n  [UIView beginAnimations:@\"\
    changeview\" context:nil];\n  [UIView setAnimationDuration:1];\n  [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n\
    \  if(currentBackground == 1)\n    [UIView setAnimationTransition:\n         \
    \                UIViewAnimationTransitionFlipFromLeft\n                     forView:self.\n\
    \                     view cache:YES];\n  \n  if(currentBackground == 2)\n   \
    \ [UIView setAnimationTransition:\n                         UIViewAnimationTransitionCurlDown\n\
    \                     forView:self.\n                     view cache:YES];\n \
    \ \n  if(currentBackground == 3)\n    [UIView setAnimationTransition:\n      \
    \                   UIViewAnimationTransitionCurlUp\n                     forView:self.\n\
    \                     view cache:YES];\n  \n  if(currentBackground == 4)\n   \
    \ [UIView setAnimationTransition:\n                         UIViewAnimationTransitionFlipFromRight\n\
    \                     forView:self.\n                     view cache:YES];\n \
    \ \n  Commit and change\n}\n```\n\nThe last step, again as we did before we simply\
    \ need to commit the change and execute the code:\n\n```\n-(IBAction)change:(id)sender\n\
    {\n  currentBackground++;\n  if(currentBackground >= [bgImages count])\n    currentBackground\
    \ = 0;\n  [UIView beginAnimations:@\"changeview\" context:nil];\n  [UIView setAnimationDuration:1];\n\
    \  [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n  if(currentBackground\
    \ == 1)\n    [UIView setAnimationTransition:\n                         UIViewAnimationTransitionFlipFromLeft\n\
    \                     forView:self.\n                     view cache:YES];\n \
    \ \n  if(currentBackground == 2)\n    [UIView setAnimationTransition:\n      \
    \                   UIViewAnimationTransitionCurlDown\n                     forView:self.\n\
    \                     view cache:YES];\n  \n  if(currentBackground == 3)\n   \
    \ [UIView setAnimationTransition:\n                         UIViewAnimationTransitionCurlUp\n\
    \                     forView:self.\n                     view cache:YES];\n \
    \ \n  if(currentBackground == 4)\n    [UIView setAnimationTransition:\n      \
    \                   UIViewAnimationTransitionFlipFromRight\n                 \
    \    forView:self.\n                     view cache:YES];\n  \n  [UIView commitAnimations];\n\
    \  myBackground.image = [bgImages objectAtIndex:currentBackground];\n}\n```\n\n\
    Check your code against mine, as illustrated in [Figure 5–37](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_019.html#filepos435295).\
    \ We're done! Can you believe that? All you need to do is run it and your code\
    \ will work beautifully . . . Ahh … NOT! Not unless you're a super geek!"
