    One of the first things Stephen did when he went to the website was make a list
    of all the attributes in the XMLfeed. The following list shows what he saw.


    *   Column–1 was the call sign, CALLSIGN

    *   Column–2 was the URLtoMessagetrafficifavailable

    *   Column–3 was the URLtoWeatherpageifavailable

    *   Column–4 was the Latitude

    *   Column–5 was the Longitude

    *   Column–6 was the distancefromme(inmiles)

