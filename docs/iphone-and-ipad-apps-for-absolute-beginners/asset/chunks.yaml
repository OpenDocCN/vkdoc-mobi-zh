    `CGAffineTransformMakeTranslation` to tell the move variable we created in our
    header file of type `CGAffineTransform` to hold the amount we want to move it.
    I have randomly chosen to only move our lulu fruit icon up 100 pixels on the y-axis.
    “Up” means we need to subtract pixels from the y-axis. We only want to subtract
    100 pixels on the y-axis and leave the x-axis alone (0,-100). This is illustrated
    as follows:


