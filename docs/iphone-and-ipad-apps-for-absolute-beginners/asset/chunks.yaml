  trans: "好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 编写 `myPos`\
    \ `NSObject`\n\n请记住，`myStory_01` 是通往`myStory_02`的引子或过渡，而真正的动作发生在`myStory_02`中。事实上，许多\
    \ MapKit 应用都需要一个单独的 `NSObject` 来跟踪多个位置。在这个小应用中，我们不一定非要编写 `myPos.h` 和 `myPos.m`\
    \ 文件。但你需要习惯于总是创建一个 `NSObject myPos` 来跟踪你的位置或一个位置数组，以便将其提供给标注和 MapKit 框架。那么，请跟随我详细解释我们在这里将要做什么。在\
    \ `myStory_02` 中，我跳过了其中一些步骤，因为我认为大家都完成了功课，多次编写了 `myStory_01`，直到可以在没有本书或任何随附笔记的情况下完成。\n\
    \n![images](img/00378.jpg)\n\n**图 9–25.** 打开时的 `myPos.h`。\n\n18. 点击位于根文件夹中 `myStory_01`\
    \ 文件夹内的 `myPos.h` 文件。打开它后，如图 9–25 所示，我们看到了以下内容：\n\n```\n#import <Foundation/Foundation.h>\n\
    @interface myPos : NSObject\n@end\n```\n\n-   我们要做的第一件事是通过在 `@interface myPos\
    \ : NSObject` 指令中输入 `#import <MapKit/MkAnnotation.h>` 来为我们的标注添加 MapKit 框架。\n-\
    \   我们还需要添加 `<MKAnnotation>`，这是一个协议。我将在“深入代码”中解释协议，但就目前而言，这意味着我们必须编写自己的、实现了此协议的标注对象。只需记住，采用此协议的对象必须实现一个我们称之为坐标属性的属性。当然，我们将会实现它。\n\
    -   我们还要设置 `CLLocation` 类引用，以便通过一个我们将命名为`coordinate`的变量，将我们设备的地理坐标和海拔高度整合进来，如图\
    \ 9–26 所示。我们通过这行代码来实现：`CLLocationCoordinate2D coordinate;`\n-   现在，我们需要两个 `NSString`\
    \ 变量来保存我们的标题和副标题，我们将如下命名其为 `*title` 和 `*subtitle`：\n    ```\n    NSString *title;\n\
    \    NSString *subtitle;\n    ```\n-   最后，我们为坐标（coordinate）、标题（title）和副标题（subtitle）创建\
    \ `@property` 声明，如下面的代码所示。完成这些添加后，我们将保存我们的工作，如图 9–26 所示。\n    ```\n    #import\
    \ <Foundation/Foundation.h>\n    #import <MapKit/MkAnnotation.h>\n    \n    @interface\
    \ myPos : NSObject <MKAnnotation>\n    {\n        CLLocationCoordinate2D coordinate;\n\
    \        NSString *title;\n        NSString *subtitle;\n    }\n    \n    @property\
    \ (nonatomic, assign) CLLocationCoordinate2D coordinate;\n    @property (nonatomic,\
    \ copy)  NSString *title;\n    @property (nonatomic, copy) NSString *subtitle;\n\
    \    \n    @end\n    ```\n\n![images](img/00379.jpg)\n\n**图 9–26.** `MyPos.h`\
    \ 整合了我们设备的地理坐标和海拔高度。\n\n![images](img/00380.jpg)\n\n**图 9–27.** 这是我们打开 `myPos`\
    \ 实现文件时的样子。\n\n19. 我们现在准备编写 `myPos` 的实现文件。我们将点击位于根文件夹中 `myStory_01` 文件夹内的 `myPos.m`\
    \ 文件。图 9–27 显示了当我们打开 `myPos.m` 文件时的样子。在这里，我们简单地使用一个包含 `coordinate`、`title` 和 `subtitle`\
    \ 的 `@synthesize` 语句来合成我们的坐标、标题和副标题。完成后，我们的文件应该类似于图 9–28。我们将保存对此文件的更改。\n\n![images](img/00381.jpg)\n\
    \n**图 9–28.** 这是合成后 `myPos` 实现文件的样子。\n\n![images](img/00382.jpg)\n\n**图 9–29.**\
    \ 打开视图控制器。\n\n### 编写视图控制器\n\n我们将首先在 `ViewController.h` 文件中声明我们的类、方法和输出口，然后在 `ViewController.m`\
    \ 文件中实现它们。我提供了一些样板代码，你可以直接放入实现文件中。但是，我将逐行讲解，因此最好跟随我，不要直接将样板代码放进去。\n\n20. 像往常一样，我们从头文件开始。我们将通过点击根文件夹中\
    \ `myPos.m` 文件下方或附近的 `ViewController.h` 来打开我们的头文件。当我们第一次打开它时，它会类似于图 9–29 以及如下所示。\n\
    \n```\n#import <UIKit/UIKit.h>\n@interface ViewController : UIViewController\n\
    @end\n```\n\n-   我们需要做的第一件事是告诉我们的应用，我们已经导入了 MapKit 框架；我们在 `#import <UIKit/UIKit.h>`\
    \ 这行代码下方通过 `#import <MapKit/MapKit.h>` 来实现。接下来要做的，是告诉头文件我们将要使用 `MKMapViewDelegate`\
    \ 协议。该协议定义了一组可选方法，我们的应用将使用这些方法来接收地图更新记录。\n-   接下来，我们为控制器类添加 `<MKMapViewDelegate>`\
    \ 协议。\n-   现在我们可以添加一个指向 `MKMapView` 类的指针输出口。我们通过输入 `MKMapView *mapView` 来实现，这声明了一个\
    \ `MKMapView` 类型的对象。\n-   最后要做的是定义 `@property`，输入：`@property (nonatomic, retain)\
    \ IBOutlet MKMapView *mapView`。\n\n> **注意**：有些人可能会说：“哇！你只在接口外部声明了 `IBOutlet`！”嗯，实际上，无论我们是在接口内部还是“外部”声明\
    \ `IBOutlet MKMapView *mapView`，它们实际上都在接口内部，没有必要声明两次。我更喜欢在 `@properties` 上使用输出口，因为这使得从故事板加载的对象的*内存管理*更加清晰。在“深入代码”的“故事板对象的内存管理”中，我会对此进行更深入的探讨。\n\
    \n-   完成后，保存它。我们的代码应该如下所示，如图 9–30 中所示：\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ <MapKit/MapKit.h>\n\n@interface ViewController : UIViewController <MKMapViewDelegate>\n\
    {\n    MKMapView *mapView;\n}\n\n@property (nonatomic, retain) IBOutlet MKMapView\
    \ *mapView;\n\n@end\n```\n\n![images](img/00383.jpg)\n\n**图 9–30.** 完成后的 `ViewController`\
    \ 头文件。\n"
- fmt: "#### Dealing with the View Controller's Implementation\n\nAs mentioned in\
    \ the introduction to this chapter, controlling and working with the MapKit and\
    \ CoreLocation frameworks is not a trivial matter. Daunting as these areas can\
    \ be, I could not leave them out of this book. We proceed on the basis that we\
    \ have learned by now to look for familiar patterns, integrate what we can, and\
    \ just follow directions when things get a bit complicated or beyond our immediate\
    \ understanding!\n\nLet's think about this—after doing the necessary importing\
    \ of our `myPos` header file and the synthesis of the `ViewController` that we\
    \ just set up in the header file—we need to do two things:\n\n- Set up the coordinates\
    \ of my office into the `viewDidLoad` method; and then,\n- Make a pin drop down\
    \ onto this exact latitude and longitude set forth in the `viewDidLoad` and put\
    \ an annotation on it that states this is the office of Dr. Lewis.\n\nIn our case,\
    \ we will set the map type to a Hybrid map. If we prefer, though, we may choose\
    \ to use a Satellite map or a Street map. Remember, at this point, we will bring\
    \ in the location of my office at the University of Colorado at Colorado Springs,\
    \ we can go ahead and use mine, or you can choose your own point.\n\n![images](images/00384.jpg)\n\
    \n**Figure 9–31.** The `ViewController`'s implementation file before coding.\n\
    \n21. When you first open up the `viewController.m` file, you will see the default\
    \ code as shown in Figure 9–31. Let's first bring in the header file and synthesis:\n\
    \n- Right under the `#import \"ViewController.h\"` We want to import our `myPos`\
    \ header file by coding `#import \"myPos.h\"` \n- Now, under the `@implementation`,\
    \ we will add our synthesis of the `mapView`: `@synthesize mapView;` \n- Now,\
    \ we can either drop in the boiler plate code from the file called `viewDidLoad\
    \ coord.rtf` right over and in place of the comment `// Do any additional …` in\
    \ the `viewDidLoad` method under the `[super viewDidLoad];` as shown: `[super\
    \ viewDidLoad];`\n  `// Do any additional setup after loading the view, typically\
    \ from a nib.` \n- The boilerplate code is as follows, but we will go step–by–step\
    \ through it. `[mapView setMapType:MKMapTypeStandard];`\n  `[mapView setZoomEnabled:YES];`\n\
    \  `[mapView setScrollEnabled:YES];`\n  `mapView.mapType=MKMapTypeHybrid;`\n \
    \ `MKCoordinateRegion region = { {0.0, 0.0 }, { 0.0, 0.0 } };`\n  `region.center.latitude\
    \ = 38.893432;`\n  `region.center.longitude = -104.800161;`\n  `region.span.longitudeDelta\
    \ = 0.01f;`\n  `region.span.latitudeDelta = 0.01f;`\n  `[mapView setRegion:region\
    \ animated:YES];`\n  `[mapView setDelegate:self];`\n\n`myPos *ann = [[myPos alloc]\
    \ init];`\n  `ann.title = @\"Dr. Rory Lewis\";`\n  `ann.subtitle = @\"University\
    \ of Colorado at Colorado Springs\";`\n  `ann.coordinate = region.center;`\n \
    \ `[mapView addAnnotation:ann];`\n\n22. Now, going through this line by line;\n\
    \n- First, we make it standard and enable zoom and scroll: `[mapView setMapType:MKMapTypeStandard];`\n\
    \  `[mapView setZoomEnabled:YES];`\n  `[mapView setScrollEnabled:YES];` \n- Then,\
    \ we do a reset on the previous coordinates by setting all the coordinate regions\
    \ to zeros. `MKCoordinateRegion region = { {0.0, 0.0 }, { 0.0, 0.0 } };` \n- Then,\
    \ we enter coordinates of our place of interest—which, for me, is my office at\
    \ the University of Colorado at Colorado Springs. I enter `region.center.latitude\
    \ = 38.893432;` (the positive value denotes north of the Equator) and `region.center.longitude\
    \ = -104.800161;` (the negative sign denotes west of the Prime Meridian). `region.center.latitude\
    \ = 38.893432;`\n  `region.center.longitude = -104.800161;` \n- Related to these\
    \ parameters, we need to set the latitude and longitude Delta `= 0.01f`. If your\
    \ math or physics is rusty, recall that \"delta\" refers to the change, or difference,\
    \ between two values. `region.span.longitudeDelta = 0.01f;`\n  `region.span.latitudeDelta\
    \ = 0.01f;` \n- I have chosen to animate the pin when it drops. `[mapView setRegion:region\
    \ animated:YES];` \n- The next action is to set the view controller class as the\
    \ delegate, which is the role that will handle the interaction between the frameworks\
    \ of our `mapView`. We do this with: `[mapView setDelegate:self];`\n\n**NOTE:**\
    \ Regarding the dropped pin and the attached label: We need to make the annotation\
    \ object the holder of the information of our coordinates. Our annotation view\
    \ is the type of view associated with the annotation object. Our annotation object\
    \ needs to comply with all the rules we will set forth in our `MKAnnotation` protocol.\
    \ In order to create this annotation object, we must define a new class, which\
    \ we did when we created the `myPos` classes.\n\n- We now need to instantiate\
    \ this `myPos` object and add it to our map. To do this, we add the delegate function\
    \ that will display the annotations onto our map. We start by having `myPos` name\
    \ a pointer we'll call `ann`. `myPos *ann = [[myPos alloc] init];` \n- Next, we\
    \ set the title, and in my case, I chose to use my name. `ann.title = @\"Dr. Rory\
    \ Lewis\";` \n- We handle the subtitle similarly: `ann.subtitle = @\"University\
    \ of Colorado at Colorado Springs\";` \n- We also `want` the pin to drop in the\
    \ center of the map: `ann.coordinate = region.center;` \n- Reference all of the\
    \ above with `[mapView addAnnotation:ann];`.\n\nAt this point, we will take advantage\
    \ of the next boilerplate method of code that most MapKit maps use. Unlike the\
    \ `viewDidLoad coord.rtf`, the `MKAnnotationView.rtf` is a chunk of code we all\
    \ use. Read the note below:\n\n**NOTE:** We seldom change chunks of code like\
    \ `viewDidLoad coord.rtf` and by the time this book is printed, it may be part\
    \ of a new function or a new class. The reason is that when people start using\
    \ the same piece of code over and over, referring to it as \"boilerplate code,\"\
    \ that's about the time Apple decides to make a new class or function out of it,\
    \ and sets it to a specific name. So, keep on using it and get the message through\
    \ to Apple!\n\nFor now, there are a few things we all need to know about this\
    \ code:\n\n- It creates a delegate method that manages our annotation during zooming\
    \ and scrolling. In other words, it keeps track of where we are—even when the\
    \ user scrolls, zooms in, or zooms out of our map.\n- It creates a static identifier,\
    \ which controls our \"queue meaning.\" If it can't dequeue our annotation, it\
    \ will allocate one that we choose. I have also included code that changes the\
    \ pin color to red. In addition, I have allowed callout views.\n\nPaste the `MKAnnotationView.rtf`\
    \ right after the `- (void)viewDidLoad` method and right before the `- (void)viewDidUnload`\
    \ method. After you have pasted it there, your implementation file should look\
    \ like the following.\n\n```\n#import \"ViewController.h\"\n#import \"myPos.h\"\
    \n```"
  raw: "#### Dealing with the View Controller's Implementation\n\nAs mentioned in\
