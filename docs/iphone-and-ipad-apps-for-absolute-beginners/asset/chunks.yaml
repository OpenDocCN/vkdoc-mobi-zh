    \ `lavel` 应该是 `label`，所以我把它改成了 `label`。当然，你的打字技术比我好得多，所以这对你来说不算什么——除非你一丝不苟地跟着视频中的每一步操作。不过，修正了拼写错误之后，让我们保存并再次运行。\n\
    \n![images](img/00147.jpg)  \n图 4–38. 运行时的屏幕。\n\n38. 图 4–38 显示了你的屏幕，`helloWorld_04`\
    \ 正在运行，并且按钮已被点击。注意，图标仍然在侧边，其下方是 `helloWorld_04` 文件夹。\n\n![images](img/00148.jpg)\
