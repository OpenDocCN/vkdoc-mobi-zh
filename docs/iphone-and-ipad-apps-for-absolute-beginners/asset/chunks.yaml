  trans: "\n21\\. 我们需要在我们私有的数组中分配正在指向的数组。换句话说，需要创建一个数组，我们已经在私有接口（Private Interface）中将其命名为\"\
    cities\"。我们将用一个新构造的数组来初始化\"cities\"变量。所以，让 cities 成为一个包含对象的`NSArray`。它会一直持续，直到遇到末尾的`nil`。如果愿意，你可以随意输入自己的城市。请参考下面的代码，以及在图\
    \ 10-21 中粘贴的\"02 Part myMasterTableViewController m\"里的代码。\n\n```\ncities = [NSArrayarrayWithObjects:@\"\
    New Delhi\", @\"Durban\", @\"Islamabad\",\n@\"Johannesburg\", @\"Kathmandu\",\
    \ @\"Dhaka\", @\"Paris\", @\"Rome\", @\"Colorado Springs\", @\"Rio\nde Janeiro\"\
    , @\"Beijing\", @\"Canberra\", @\"Malaga\", @\"Ottawa\", @\"Santiago de Chile\"\
    , nil];\n```\n\n![images](img/00431.jpg)\n\n图 10-22\\. 完成`myMasterTableViewController.m`的编写\n\
    \n22\\. 我们需要做三个小的调整，以确保我们的表格能够处理给定的城市列表，并将其显示到`TableView`上。我们需要让表格返回 1 个分区，让行数等于城市数量，最后，让每个单元格能够显示城市名称：\n\
    \na. 让表格返回 1 个分区：转到`numberOfSectionsInTableView`，在注释后面添加`return 1`。默认情况下，它包含`return\
    \ 0`。请注意删除或修改这行代码，否则你可能会得到两个`return`语句，这会导致问题。\n\n注意：正常字重的代码是苹果公司的聪明开发者已经为我们编写好的默认代码。粗体文本是你需要输入的内容。\n\
    \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n\
    \    // Return the number of sections.\nreturn 1;\n}\n```\n\nb. 接下来我们需要根据我们的目的修改表格视图方法。首先需要让行数等于城市数量。转到`numberOfRowsInSection`，我们将让行数变为动态的，这意味着无论我们在表格中放入多少城市，返回值都是城市的总`count`：\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    // Return the number of rows in the section.\nreturn [cities count];\n\
    }\n```\n\nc. 最后，我们需要确保城市名称显示在单元格中。我们需要从索引中获取要在每个单元格中显示的对应城市名称，并将其插入`textLabel`。转到`tableViewcellForRowAtIndexPath`的底部，输入以下代码。\n\
    \n注意：现在我不希望你担心苹果公司已经为我们编写的灰色代码中每一行的含义。在这一点上，我只希望你接受它能正常工作，我们将继续前进。\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n   static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell\
    \ = [tableView\ndequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
    \ == nil) {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    reuseIdentifier:CellIdentifier];\n    }\n    // Configure the cell...\n[cell.textLabel\
    \ setText:[cities objectAtIndex:indexPath.row]];\n    return cell;\n}\n```\n\n\
    ![images](img/00432.jpg)\n\n图 10-23\\. 返回 Storyboard 并选择 Table View Controller。\n\
    \n23\\. 我们需要将 Table View 与`myMasterTableViewController`关联起来。返回 Storyboard，在文档大纲中选择\
    \ Table View Controller，如图 10-23 所示。\n\n整体概览：编写 MYMASTERTABLEVIEWCONTROLLER：步骤\
    \ 24 至 26。\n\n> 1.  用城市列表填充表格\n>     1.1. 创建一个 Table View\n>     1.2. 组织我们的类\n\
    >     1.3. 编写`myMasterTableViewController.m`的代码\n>     1.4. 启用 Storyboard 以显示表格\n\
    >         > 1.4.1. 将 Table View 与`myMasterTableViewController`关联\n> 2.  编写代码，在所选城市的地图中心放置一个大头针\n\
    \n![images](img/00433.jpg)\n\n图 10-24\\. 选择`myMasterTableViewController`。\n\n\
    24\\. 在实用工具中选择 Identity inspector。然后，在自定义类中，打开 Class 的下拉菜单，选择`myMasterTableViewController`，如图\
    \ 10-24 所示。这确保了我们在步骤 20-22 编写的所有代码现在将在我们的 Table View 底层运行，产生神奇的效果！\n\n![images](img/00434.jpg)\n\
    \n图 10-25\\. 运行它。\n\n25\\. 我们需要运行它。请参见图 10-25。\n\n![images](img/00435.jpg)\n\n\
    图 10-26\\. 一个漂亮的启动画面将我们带到一个填充了数据的表格。\n\n26\\. 确保我们看到启动画面出现，然后是一个填充了城市列表的表格，如图\
    \ 10-26 所示。确实，我们看到了一个启动画面，有 Lulu 水果等等。然后我们看到一个填满了城市的表格。点击它时，它几乎不做什么，但它就在那里。我们完成了`myStory_02`的第一部分。\n\
    \n整体概览\n\n> 1.  用城市列表填充表格（已完成 – 见图 10-26）\n> 2.  编写代码，在所选城市的地图中心放置一个大头针（下一节内容）\n"
- fmt: "# Part 2\n\nLet's take a deep breath and look around. If it was the lecture\
    \ hall, I'd have you look at the latest greatest “Fail” videos on YouTube or play\
    \ a Grateful Dead song like Ripple. Yes, the students know I'm completely whacko\
    \ but, having had an acute brain injury and epilepsy, I know a little bit about\
    \ the brain and, as a human, I know we need to rest.\n\nWe've successfully populated\
    \ our table with a list of cities. Now, in Part Two, we will send that list of\
    \ cities to Google, parse out the geospatial addresses of each city, store them,\
    \ and then shoot them out to the MapKit when a user selects a city on our list.\n\
    \nLooking at the big picture below, one can see that we need to add the MapKit\
    \ framework, do the code to make this work, and then tweak Storyboard to accept\
    \ out new code.\n\n![images](images/00436.jpg)\n\n**Figure 10–27.** Click on Build\
    \ Phases to so you can add the MapKit framework.\n\n27\\. We need to add the MapKit\
    \ framework just as we did on myStory_01. So go to your root directory and click\
    \ on the Build Phases tab, as shown in [Figure 10–27](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos827853).\n\
    \n## THE BIG PICTURE: OVERVIEW OF PART 2\n\n> 1.  Populate a table with a list\
    \ of cities (COMPLETED)\n> 2.  Code a pin to drop to the center of a selected\
    \ cities' map\n>     2.1. Add MapKit framework\n>     2.2. Write code\n>     2.3.\
    \ Tweak Storyboard to accept our new code.\n\n![images](images/00437.jpg)\n\n\
    **Figure 10–28.** Enter “map” to locate the MapKits framework!\n\n28\\. Now click\
    \ on the Link Binaries with Libraries bar and click on the “+”. When the pop-up\
    \ window appears, enter `map` to search for the MapKit framework. Select it, as\
    \ shown in [Figure 10–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos829414),\
    \ and click the Add button.\n\n![images](images/00438.jpg)\n\n**Figure 10–29.**\
    \ Move the MapKit framework from the root folder to the Frameworks folder.\n\n\
    29\\. The MapKit framework appears in the root directory just as it did in [Figure\
    \ 9-18](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos685333) in myStory\\\
    _01. Except there we also had Corelocation. Here we do not because we'll use Google's.\
    \ Again, you will need to drag it to where the framework belongs, the Frameworks\
    \ folder, as shown in [Figure 10–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos830038).\n\
    \n![images](images/00439.jpg)\n\n**Figure 10–30.** Open `myPos` header file and\
    \ either code or paste in the proper code.\n\n30\\. We will now code the `myPos`\
    \ header file. I highly encourage you to not simply paste it into your header\
    \ file as I did on the video. You will learn NOTHING by doing that. Follow along\
    \ with me and you will learn how to code. Remember that `myPos` is handling the\
    \ public interface and, in its header file, we need to set the two main fields,\
    \ which are the name and the geospatial address of our cities. The names of the\
    \ cities will be stored at the address pointed to by `title.` The geospatial longitudinal\
    \ and latitudinal addresses of each city will be handled by 2-Dimensional location\
    \ method and stored in a variable we'll name `coordinate`.\n\n**NOTE:** The `CLLocationCoordinate2D`\
    \ is a structure that contains our geospatial coordinate using the World Geodetic\
    \ System (WGS 84) reference frame, which takes its locations from the core of\
    \ the earth and know that it's off by 2 centimeters!\n\nWhen we first open the\
    \ `myPos.h` file, we see the following:\n\n```\n#import <Foundation/Foundation.h>\n\
    @interface myPos : NSObject\n@end\n```\n\nThe first thing we do is add MapKit\
    \ by entering `#import <MapKit/MKAnnotation.h>`. Next we insert `<MKAnnotation>`\
    \ after the given `@interface myPos :NSObject`. We use the `MKAnnotation` protocol\
    \ every time we need to use annotation-related information in a map view. Next,\
    \ we set our `CLLocation` class reference to incorporate the geospatial coordinates\
    \ and altitude of our device by entering `CLLocationCoordinate2Dcoordinate`, which\
    \ will use a variable I've called `coordinate`. We also need to store the name\
    \ of the city, which we will do in the `title` using `NSString`. Finally, we create\
    \ `@property` statements for both the location and title of each city. Your code\
    \ for the `myPos` header file will now look as shown in [Figure 10–30](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos830795)\
    \ or as follows:\n\n```\n#import <Foundation/Foundation.h>\n#import <MapKit/MKAnnotation.h>\n\
    \n@interface myPos : NSObject <MKAnnotation>\n{\n    CLLocationCoordinate2D _coordinate;\n\
    \    NSString *_title;\n}\n\n@property (nonatomic, assign) CLLocationCoordinate2D\
    \ coordinate;\n@property (nonatomic, copy) NSString *title;\n\n@end\n```\n\n**NOTE:**\
    \ In the `@property` for our name of the city, which is a string we use `(nonatomic,\
    \ copy)`, I just want you to remember that, without getting all screwed up in\
    \ the details, as a general rule, always use `(nonatomic, copy)` with strings.\n\
    \n## THE BIG PICTURE: CODING OVERVIEW\n\n> 1.  Populate a table with a list of\
    \ cities (COMPLETED)\n> 2.  Code a pin to drop to the center of a selected cities'\
    \ map\n>     2.1. Add MapKit framework\n>     2.2. Write code\n>     > 2.2.1.\
    \ `myPos` for keeping track of selected cities and their coordinates\n>     >\
    \ 2.2.2. `myDetailViewController` to parse Google amongst other things\n>    \
    \ > 2.2.3. `myMasterTableViewController` to control the segue to MapKits.\n> \
    \    2.3. Tweak Storyboard to accept our new code.\n\n![images](images/00440.jpg)\n\
    \n**Figure 10–31.** Now we open up the `myPos` Implementation file.\n\n31\\. All\
    \ we need to do in the implementation of the `myPos` header file is synthesize\
