  trans: "\n# 如何逐步推进学习\n\n本书内容全面，自成一体。尽管我为书中的练习提供了视频教程，但您完全不需要依赖它们。即使没有网络连接，仅凭本书，您也能找到所需的一切。\n\
    \n现在，既然您已经完成了系统参数检查、注册成为苹果官方开发者、下载了 SDK、提取了必备工具并配置了程序坞，那么是时候进入第 2 章来编写一些代码了。\n\
    \n## 一个小练习\n\n> 看图 1–28，在测试运行中，我们最终在 iPhone/iPad 模拟器中看到了一个 iPhone 弹了出来。那么 iPad\
    \ 呢？这正是我希望您自己尝试的部分。看看您是否能让 iPad 出现在 iPhone/iPad 模拟器中，如图 1–29 所示。线索可以在图 1–24 和图\
    \ 1–29 中找到，在 test 文件夹下，有一个名为 `test 2` 的全新文件夹。\n\n> ![images](img/00039.jpg)\n\n\
    > 图 1–29. iPhone/iPad 模拟器中的 iPad2。\n\n# 第 2 章\n\n## 启动！\n\n正如第 1 章所述，我们将尝试的第一个程序是一个基础且通用的“Hello\
    \ World”应用程序。本章“启动”恰恰模拟了我在教学实践中发现，在讲授这门课程时非常有效的课堂方式。我使用这个简单、无害、良性的“Hello World\
    \ 应用”作为基础，向学生介绍他们未来会反复使用的最关键的技能组合。就像我自己的学生一样，当您完成第 2 章的学习时，你将知道如何以以下各节所述的 3 种不同方式运行您的第一个应用程序：\n\
    \n> 2.1. iPhone 模拟器。\n> \n> 2.2. 运行于您 iPhone 环境下的 iPad 模拟器（伪 iPad）。\n> \n> 2.3.\
    \ iPad 模拟器。\n\n在我的讲座中，我想通过不断创建应用程序来保持肾上腺素激增，并体验那种征服世界的极客快感。因此，我将 §2.4 至 2.6 留到周六的特殊课程，供那些想要创建自己的应用商店并赚钱的学生选修。同样，对于您，读者，我建议您只完成\
    \ §2.1 至 2.3 部分，然后直接进入第 3 章，这样可以保持学习的连贯性。我们使用这组新工具的第一次冒险，将是在 Xcode 中基于视图的应用程序模板下向世界说声“Hello”。之后，我们将基于导航的应用程序模板，先以非常基础的方式，然后进行一些修改，再次向世界说声“Hello”。\n\
    \n除了本书中呈现的信息（包括各种截图）之外，我还为您提供了我自己逐一讲解本书每个示例的屏幕录像。相关的下载资源将帮助您完成本书的学习，此外还有课堂笔记、第三方资源以及相关的\
    \ YouTube 视频——所有这些都可以通过点击位于页面中央顶部的蓝色 Xcode 4 图标访问，网址为：[`www.rorylewis.com`](http://www.rorylewis.com)。\n\
    \n### 在 iPhone 模拟器上运行您的应用\n\n在第一个示例中，我们将点击一个按钮，按钮上方将显示“Hello World”文本。\n\n> ![images](img/00040.jpg)\n\
    \n图 2–1. 点击 Dock 中的 Xcode 图标打开它。您将看到“欢迎使用 Xcode”窗口，如第 1 章所述。\n\n1.  在打开 Xcode\
    \ 之前，首先关闭所有已打开的程序，以便优化处理能力，将全部注意力集中在新内容上。按下 Command + Tab (![Images](img/00031.jpg)![Images](img/00041.jpg))，然后按下\
    \ Command + Q (![Images](img/00031.jpg) Q) 关闭所有程序，直到屏幕上只剩下 Finder。找到并点击 Dock 中的\
    \ Xcode 图标将其打开。您将看到第 1 章中讨论过的 Xcode“欢迎”屏幕。参见图 2–1。 ![images](img/00042.jpg)\n\n\
    图 2–2. 将其命名为 `hello_World_01`，并使用您的姓名或公司名称作为公司标识符。对于设备，选择 iPhone。\n\n2.  现在在 Xcode\
    \ 中打开一个新项目。实现此操作的两种方法是使用键盘快捷键或点击鼠标。我强烈建议您使用键盘快捷键。这将节省您的时间，并让您感觉像个专业人士。请注意，如果您使用鼠标来执行可以通过快捷键完成的操，那将是阻碍您成为\
    \ iPhone 和 iPad 应用开发者的最快方式。使用键盘，同时按下 Command + Shift + N。这三个按键组合在图 2–1 中显示为 ![Images](img/00031.jpg)![Images](img/00032.jpg)`N`。（如果您使用鼠标打开新项目，则可以选择“创建一个新的\
    \ Xcode 项目”。）选择“基于视图的应用程序”，然后按下 Return 键 (![Images](img/00043.jpg))。将其命名为 `helloWorld_01`，输入您的姓名，并选择\
    \ iPhone，如图 2–2 所示。\n\n> **注意：** 我的“基于视图的应用程序”模板图标默认是高亮显示的；您的可能不是。无论如何，点击它，然后将新项目保存到您的桌面，命名为\
    \ `helloWorld_01`。\n\n![images](img/00044.jpg)\n\n图 2–3. 点击 `helloWorld_01 ViewController.xib`\
    \ 以打开 Interface Builder。\n\n3.  一旦您将项目保存到桌面，Xcode 便会实例化 `helloWorld_01` 项目环境，窗口顶部会显示项目名称（参见图\
    \ 2–3）。如果这看起来有点吓人，请保持冷静……别慌！这是苹果公司用来组织您最终将用于编写复杂应用的所有好东西的方式。目前，请跟着做，并尽量搁置您可能产生的所有疑问。Xcode\
    \ 已经创建了 6 个文件：\n    - 2 个类，每个包含两个文件（一个头文件（`.h`）和一个实现文件（`.m`））。其中两个以 `Appdelegate`\
    \ 结尾，另外两个以 `ViewController` 结尾。我们稍后会回到这一点。现在只需知道：每个“类”由两个文件组成：一个头文件和一个实现文件。\n\
    \    - 2 个 nib 文件（`.xib`）。现在先不要问自己“nib”是什么意思。只需打开可以可视化程序界面的那个文件。到时候，您会对 nib 文件有充分了解的。\n\
    \n如图 2–3 所示，双击打开位于米黄色 `helloWorld_01` 文件夹中的 `helloWorld_01ViewController.xib`（发音为“nib”）文件。该文件夹位于\
    \ Xcode 环境导航区域左上角的蓝色 Xcode 文件夹内。\n"
- fmt: "**注意：** 你的导航窗格（即[图 2-3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos126464)\
    \ 中高亮圆圈内显示的文件夹）有极小的可能处于关闭状态。这不成问题。要打开你的工具区域（包含检查器和库），请前往工作区窗口的左上角。使用工具栏中的`View\
    \ Selector`来打开或关闭导航器、调试区和工具区域。你可能还需要再次选择“运行”按钮正下方的黑色文件夹图标（即项目导航器），它看起来像 iTunes\
    \ 中的“播放”按钮。\n\n![images](images/00045.jpg)\n\n**图 2-4.** 点击`View Selector`中的`Utilities\
    \ Icon`以打开`Utilities Pane`。\n\n4.  我们需要打开位于工作区窗口右侧的工具区域（见[图 2-4](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos129387)），该区域包含检查器和库。导航至包含\
    \ 3 个图标的`View Selector`，并选择最右侧的`Utilities Icon`图标。![images](images/00046.jpg)\n\
    \n**图 2-5.** 将一个标签拖到画布上。删除其文本并将其内容居中。\n\n5.  我们现在需要从库中拖一些好东西到画布上。不过，我们先想想我们要做什么。我们将要点击一个按钮，按钮上方会显示“Hello\
    \ World!”文本。因此，我们需要一个可以点击的东西；那将是一个按钮，并且我们需要一个包含“Hello World!”文本的标签。简单！首先，将一个标签拖到你的画布上，如[图\
    \ 2-5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos130065) 所示。将其移动到适合你的高度，然后水平移动它，直到出现蓝色中心线。此时，松开它，它就会漂亮地居中在画布中央。现在，这个标签最终将包含文本“Hello\
    \ World!”，所以将标签侧面的手柄向右和向左拖动，使其稍微变大，大小大约与[图 2-5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos130065)\
    \ 中所示相同。现在转到`Text`框，删除文本标签使其空白，如[图 2-5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos130065)\
    \ 所示。最后，仍然看[图 2-5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos130065)，注意我的箭头是如何悬停在“居中文本”图标上的。同样地点击它，这样当你的“Hello\
    \ World!”文本出现在标签中时，它将在居中的标签内部很好地居中。太好了。现在我们来处理按钮。![images](images/00047.jpg)\n\
    \n**图 2-6.** 将一个按钮拖到画布上。\n\n6.  拖出一个按钮并将其放在文本下方，左右移动它直到中心线告诉你它已居中。此时松开它，如[图 2-6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos131755)\
    \ 所示。立即双击它并输入文本“Press Me”（见[图 2-7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos132412)）。![images](images/00048.jpg)\n\
    \n**图 2-7.** 关闭`Utilities`文件夹，保存你的工作，并打开`Assistant`，如箭头所示。\n\n7.  我们已经完成了两个项目到画布上的加载，所以再次转到`Utilities\
    \ Folder`并通过点击它将其关闭，如[图 2-7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos132412)\
    \ 所示。既然你已经完成了这个文件，你可能还想使用快捷键`Command + S`（![Images](images/00031.jpg)`S`）来保存它。这是首选的保存方式——而不是使用鼠标。现在我们需要在`Editor\
    \ Selector`中打开`Assistant`，它位于`View Selector`的左侧。如[图 2-7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos132412)\
    \ 中的箭头所示。![images](images/00049.jpg)\n\n**图 2-8.** 从你的标签进行`Control`-拖动以创建一个`Outlet`。\n\
    \n8.  对于那些在 Xcode 4 发布之前涉足过 Xcode 的读者来说，下一部分是与 Xcode 所有先前版本最根本、最酷的背离。对于新手来说，请不要多想；让我们在无知的幸福中继续前进。我们将在第\
    \ 8 步中做一些新的操作，称为`Open URL`上下文菜单。我们想要告诉标签在按下按钮时打印出显示“Hello World!”的文本。我们称这些东西为“`outlet`”，以前我们必须从头开始编写代码。然而，在\
    \ Xcode 4 中，我们的屏幕右侧有源代码，中间是图形构建器，我们可以简单地通过`Control`-拖动（按住`Control`键并拖动鼠标）来创建连接。首先，在`UIViewController`后面添加大括号，然后按回车键，这样它会创建结束括号和一些空间。现在，点击画布上的标签，然后从你的标签按住`Control`键拖动到`@interface`方法的两个大括号之间的任意位置，如[图\
    \ 2-8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos133401) 所示（我们在这里的头部文件中）。一旦出现黑色标签显示`Insert\
    \ Outlet`，松开鼠标。\n\n**注意：** `Assistant`使用一个拆分窗格编辑器，这是 Xcode 4 许多炫酷功能出现的地方。请记住，你可以通过`Option`-点击项目导航器或符号导航器窗格中的文件来自动打开`Assistant`。\n\
    \n![images](images/00050.jpg)\n\n**图 2-9.** 使`IBOutlet`成为一个标签。\n\n9.  如第 8 步所述，我们希望连接类型是`Outlet`——苹果公司的人认为你可能需要这个——所以默认情况下，它会显示出来，我们保持其选中状态。现在不用担心`Object`和`File's\
    \ Owner`。你可以随意命名标签，但现在，像我一样将其命名为`label`（见[图 2-9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos135412)），这样如果你将你的代码与我的视频、本书中的图片或从我网站下载的代码进行比较，你的代码看起来会和我的相同。现在也先不用担心`UILabel`。现在按回车键（![Images](images/00043.jpg)），你会看到代码`IBOutlet\
    \ UILabel *label;`神奇地出现了。你可以在下面的文本中看到它被高亮显示。我们将在本章末尾的“深入代码”部分详细讨论这一点。现在，让我们继续。\n\
    \n```\n#import <UIKit/UIKit.h>\n@interface helloWorld_01ViewController : UIViewController\
    \ {\n    IBOutlet UILabel *label;\n}\n@end\n```\n\n![images](images/00051.jpg)\n\
    \n**图 2-10.** 从你的按钮进行`Control`-拖动以创建一个`Action`。\n\n10. 现在我们需要在我们拖到画布上的按钮后面放置一些代码，这样它才能执行我们想要它做的“操作”。在我们的例子中，我们希望按钮告诉我们在第\
    \ 9 步中连接的标签显示内容。我们称之为“声明一个`action`”。现在，我们只需要将按钮与操作代码关联起来；稍后我们将定义这些操作具体是什么。因此，就像我们对标签所做的那样，点击画布上的按钮，然后从按钮按住`Control`键拖动到闭合大括号的正下方，如[图\
    \ 2-10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos136861) 所示。一旦出现黑色标签显示`Insert\
    \ Outlet, Action…`，松开鼠标。![images](images/00052.jpg)\n\n**图 2-11.** 为你的按钮创建操作。\n\
    \n11. 如第 10 步所述，我们希望连接类型是`Action`，因此你需要通过从下拉菜单中选择`Action`来将连接类型从`Outlet`更改为`Action`。同样，现在不用担心`Object`和`File's\
    \ Owner`。将其命名为`button`，现在忽略其他所有内容。这在[图 2-11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos137886)\
    \ 中进行了说明。![images](images/00053.jpg)\n\n**图 2-12.** 完成你的`ViewController`的头部文件。"
  raw: "NOTE: There is a slight possibility that your Navigation Pane, which bears\
    \ the folders seen in the highlighted circle in [Figure 2–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos126464),\
    \ is closed. This is not a problem. To open your utility area, go to the upper\
    \ left of the workspace window, which includes inspectors and libraries. Use the\
    \ View Selector in the toolbar to open and close the navigator, debug, and utility\
    \ areas. You may also need to again select the black folder icon called the Project\
    \ Navigator located directly under the “Run” button— it looks like the “play”\
    \ button in iTunes.\n\n![images](images/00045.jpg)\n\nFigure 2–4\\. Open the Utilities\
    \ Pane by clicking on the Utilities Icon in the View Selector.\n\n4.  We need\
    \ to open the utility area located to the right of the workspace window (see [Figure\
    \ 2–4](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos129387)), which\
    \ includes inspectors and libraries. Navigate to your View Selector, which contains\
    \ 3 icons, and select the far right icon called the Utilities Icon. ![images](images/00046.jpg)\n\
    \nFigure 2–5\\. Drag out a label onto your canvas. Delete its text and center\
    \ its content.\n\n5.  We now need to drag some goodies from the library onto our\
    \ canvas. First, however, let’s think about what we're going to do. We are going\
    \ to click on a button that will have text that will appear above it saying “Hello\
    \ World!” Therefore, we need something to click on; that will be a button and\
    \ we need a label that will contain the text that says “Hello World!” Easy! First\
    \ drag a label onto your canvas, as shown in [Figure 2–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos130065).\
    \ Move it to a height that suits you and then move it horizontally until the blue\
    \ center line appears. At this point, you will let it go, nicely centered in the\
    \ middle of your canvas. Now, this label will eventually contain the text “Hello\
    \ World!” so drag the label's side handlebars out to the right and left to make\
    \ it a little larger, to about the same size shown in [Figure 2–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos130065).\
    \ Now go to the Text box and delete the text label so that it is blank, as shown\
    \ in [Figure 2–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos130065).\
    \ Lastly, still looking at [Figure 2–5](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos130065),\
    \ notice how my arrow is hovering over the “centered text” icon. Do the same and\
    \ click it so that when your “Hello World!” text appears in the label, it will\
    \ be nicely centered inside the centered label. Beautiful. Now let's move onto\
    \ the button. ![images](images/00047.jpg)\n\nFigure 2–6\\. Drag a button onto\
    \ the canvas.\n\n6.  Drag out a button and place it below your text, moving it\
    \ left to right until the center lines tell you it's centered. At that point,\
    \ you let it go, as shown in [Figure 2–6](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos131755).\
    \ Immediately double click on it and type the text “Press Me” (see [Figure 2–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos132412)).\
    \ ![images](images/00048.jpg)\n\nFigure 2–7\\. Close the Utilities folder, save\
    \ your work, and open the Assistant, as indicated by the arrow.\n\n7.  We are\
    \ finished loading our two items onto the canvas, so go to the Utilities Folder\
    \ again and close it by clicking on it, as shown in [Figure 2–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos132412).\
    \ As you are finished with this file, you may also want to save it by using the\
    \ shortcut Command + S, (![Images](images/00031.jpg)`S`). This is the preferred\
    \ method of saving—rather than using your mouse. Now we need to open up the Assistant\
    \ in the Editor Selector, located to the left of the View Selector. This is indicated\
    \ by the arrow in [Figure 2–7](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos132412).\
    \ ![images](images/00049.jpg)\n\nFigure 2–8\\. Control-drag from your Label to\
    \ create an Outlet.\n\n8.  For those readers who once dabbled in Xcode before\
    \ Xcode 4 came out, this next section is the most radical and cool departure from\
    \ all the previous versions of Xcode. For those newbies, don't think twice about\
    \ it; let’s just move forward in blissful ignorance. We are going to be doing\
    \ something here in Step 8 that is new, called the Open URL contextual menu. We\
    \ want to tell the label to print out text that says “Hello World!” when we push\
    \ the button. We call these things “outlets” and we used to have to code these\
    \ from scratch. In Xcode 4, however, we have the source code on the right of our\
    \ screen, with the graphical builder in the center, and we can simply control-drag\
    \ (holding the control key while dragging your mouse) connections. First, add\
    \ the squiggly brackets after the `UIViewController` and hit return so it creates\
    \ the end bracket and some space. Now, click on the label on your canvas and control-drag\
    \ over from your label to any place in-between the two squiggly brackets of your\
    \ `@interface` method, as shown in [Figure 2–8](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos133401)\
    \ (we're in the header file here). Once the black label appears saying Insert\
    \ Outlet, release your mouse.\n\nNOTE: The Assistant uses a split-pane editor,\
    \ which is where much of the Xcode 4’s dazzle appears. Remember that you can open\
    \ the Assistant automatically by Option-clicking a file in the project navigator\
    \ or symbol navigator pane.\n\n![images](images/00050.jpg)\n\nFigure 2–9\\. Make\
    \ the `IBOutlet` a label.\n\n9.  As mentioned in Step 8, we want the connection\
    \ type to be an Outlet—and the people at Apple figured this is what you probably\
    \ need—so by default, it appears so we keep it selected. Don't worry about Object\
    \ and File's Owner right now. You can name the label anything you like, but for\
    \ now, name it label as I have (see [Figure 2–9](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos135412)),\
    \ so your code will look the same as mine when and if you compare yours to my\
    \ video, the images in this book, or the code you download from my website. Don't\
    \ worry about the `UILabel` for now either. Now hit return (![Images](images/00043.jpg))\
    \ and you will see that the code `IBOutlet UILabel *label;` magically appears.\
    \ You can see it highlighted in the text below. We will discuss this in detail\
    \ in “Digging the Code” at the end of this chapter. For now, let’s move on. `#import`\
    \ <uikit ikit.h=\"\">`@interface helloWorld_01ViewController : UIViewController\
    \ {`\n\n`IBOutletUILabel *label;`\n    `}`\n\n`@end`</uikit>   ![images](images/00051.jpg)\n\
    \nFigure 2–10\\. Control-drag from your button to create an Action.\n\n10.  Now\
    \ we need to place some code behind the button we dragged onto the canvas so it\
    \ can do the “action” we want it to do. In our case, we want the button to tell\
    \ the label we connected in Step 9 to say stuff. We call this “declaring an action.”\
    \ For now, we just need to associate the button with action code; we'll later\
    \ define exactly what these actions will be. So just as we did before with the\
    \ label, click on the button in your canvas and control-drag over from your button\
    \ to just below the closed squiggly bracket, as shown in [Figure 2-10](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos136861).\
    \ Once the black label appears saying Insert Outlet, Action… release your mouse.\
    \ ![images](images/00052.jpg)\n\nFigure 2–11\\. Creating your actions for your\
    \ button.\n\n11.  As mentioned in Step 10, we want the connection type to be an\
    \ action, so you will need to change the connection type from an Outlet to an\
    \ Action by selecting it from the drop-down menu. Again, don't worry about Object\
    \ and File's Owner right now. Name it “button” and ignore everything else for\
    \ now. This is illustrated in [Figure 2–11](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos137886).\
    \ ![images](images/00053.jpg)\n\nFigure 2–12\\. Completing your `ViewController`’s\
    \ header file."
  trans: "\n**注意：** 你的导航窗格（即图 2-3 中高亮圆圈内显示的文件夹）有极小的可能处于关闭状态。这不成问题。要打开你的工具区域（包含检查器和库），请前往工作区窗口的左上角。使用工具栏中的`View\
    \ Selector`来打开或关闭导航器、调试区和工具区域。你可能还需要再次选择“运行”按钮正下方的黑色文件夹图标（即项目导航器），它看起来像 iTunes\
    \ 中的“播放”按钮。\n\n![images](img/00045.jpg)\n\n**图 2-4.** 点击`View Selector`中的`Utilities\
    \ Icon`以打开`Utilities Pane`。\n\n4.  我们需要打开位于工作区窗口右侧的工具区域（见图 2-4），该区域包含检查器和库。导航至包含\
    \ 3 个图标的`View Selector`，并选择最右侧的`Utilities Icon`图标。![images](img/00046.jpg)\n\n\
    **图 2-5.** 将一个标签拖到画布上。删除其文本并将其内容居中。\n\n5.  我们现在需要从库中拖一些好东西到画布上。不过，我们先想想我们要做什么。我们将要点击一个按钮，按钮上方会显示“Hello\
    \ World!”文本。因此，我们需要一个可以点击的东西；那将是一个按钮，并且我们需要一个包含“Hello World!”文本的标签。简单！首先，将一个标签拖到你的画布上，如图\
    \ 2-5 所示。将其移动到适合你的高度，然后水平移动它，直到出现蓝色中心线。此时，松开它，它就会漂亮地居中在画布中央。现在，这个标签最终将包含文本“Hello\
    \ World!”，所以将标签侧面的手柄向右和向左拖动，使其稍微变大，大小大约与图 2-5 中所示相同。现在转到`Text`框，删除文本标签使其空白，如图\
    \ 2-5 所示。最后，仍然看图 2-5，注意我的箭头是如何悬停在“居中文本”图标上的。同样地点击它，这样当你的“Hello World!”文本出现在标签中时，它将在居中的标签内部很好地居中。太好了。现在我们来处理按钮。![images](img/00047.jpg)\n\
    \n**图 2-6.** 将一个按钮拖到画布上。\n\n6.  拖出一个按钮并将其放在文本下方，左右移动它直到中心线告诉你它已居中。此时松开它，如图 2-6\
    \ 所示。立即双击它并输入文本“Press Me”（见图 2-7）。![images](img/00048.jpg)\n\n**图 2-7.** 关闭`Utilities`文件夹，保存你的工作，并打开`Assistant`，如箭头所示。\n\
    \n7.  我们已经完成了两个项目到画布上的加载，所以再次转到`Utilities Folder`并通过点击它将其关闭，如图 2-7 所示。既然你已经完成了这个文件，你可能还想使用快捷键`Command\
    \ + S`（![Images](img/00031.jpg)`S`）来保存它。这是首选的保存方式——而不是使用鼠标。现在我们需要在`Editor Selector`中打开`Assistant`，它位于`View\
    \ Selector`的左侧。如图 2-7 中的箭头所示。![images](img/00049.jpg)\n\n**图 2-8.** 从你的标签进行`Control`-拖动以创建一个`Outlet`。\n\
    \n8.  对于那些在 Xcode 4 发布之前涉足过 Xcode 的读者来说，下一部分是与 Xcode 所有先前版本最根本、最酷的背离。对于新手来说，请不要多想；让我们在无知的幸福中继续前进。我们将在第\
    \ 8 步中做一些新的操作，称为`Open URL`上下文菜单。我们想要告诉标签在按下按钮时打印出显示“Hello World!”的文本。我们称这些东西为“`outlet`”，以前我们必须从头开始编写代码。然而，在\
    \ Xcode 4 中，我们的屏幕右侧有源代码，中间是图形构建器，我们可以简单地通过`Control`-拖动（按住`Control`键并拖动鼠标）来创建连接。首先，在`UIViewController`后面添加大括号，然后按回车键，这样它会创建结束括号和一些空间。现在，点击画布上的标签，然后从你的标签按住`Control`键拖动到`@interface`方法的两个大括号之间的任意位置，如图\
    \ 2-8 所示（我们在这里的头部文件中）。一旦出现黑色标签显示`Insert Outlet`，松开鼠标。\n\n**注意：** `Assistant`使用一个拆分窗格编辑器，这是\
    \ Xcode 4 许多炫酷功能出现的地方。请记住，你可以通过`Option`-点击项目导航器或符号导航器窗格中的文件来自动打开`Assistant`。\n\
    \n![images](img/00050.jpg)\n\n**图 2-9.** 使`IBOutlet`成为一个标签。\n\n9.  如第 8 步所述，我们希望连接类型是`Outlet`——苹果公司的人认为你可能需要这个——所以默认情况下，它会显示出来，我们保持其选中状态。现在不用担心`Object`和`File's\
    \ Owner`。你可以随意命名标签，但现在，像我一样将其命名为`label`（见图 2-9），这样如果你将你的代码与我的视频、本书中的图片或从我网站下载的代码进行比较，你的代码看起来会和我的相同。现在也先不用担心`UILabel`。现在按回车键（![Images](img/00043.jpg)），你会看到代码`IBOutlet\
    \ UILabel *label;`神奇地出现了。你可以在下面的文本中看到它被高亮显示。我们将在本章末尾的“深入代码”部分详细讨论这一点。现在，让我们继续。\n\
    \n```\n#import <UIKit/UIKit.h>\n@interface helloWorld_01ViewController : UIViewController\
    \ {\n    IBOutlet UILabel *label;\n}\n@end\n```\n\n![images](img/00051.jpg)\n\n\
    **图 2-10.** 从你的按钮进行`Control`-拖动以创建一个`Action`。\n\n10. 现在我们需要在我们拖到画布上的按钮后面放置一些代码，这样它才能执行我们想要它做的“操作”。在我们的例子中，我们希望按钮告诉我们在第\
    \ 9 步中连接的标签显示内容。我们称之为“声明一个`action`”。现在，我们只需要将按钮与操作代码关联起来；稍后我们将定义这些操作具体是什么。因此，就像我们对标签所做的那样，点击画布上的按钮，然后从按钮按住`Control`键拖动到闭合大括号的正下方，如图\
    \ 2-10 所示。一旦出现黑色标签显示`Insert Outlet, Action…`，松开鼠标。![images](img/00052.jpg)\n\n\
    **图 2-11.** 为你的按钮创建操作。\n\n11. 如第 10 步所述，我们希望连接类型是`Action`，因此你需要通过从下拉菜单中选择`Action`来将连接类型从`Outlet`更改为`Action`。同样，现在不用担心`Object`和`File's\
    \ Owner`。将其命名为`button`，现在忽略其他所有内容。这在图 2-11 中进行了说明。![images](img/00053.jpg)\n\n\
    **图 2-12.** 完成你的`ViewController`的头部文件。\n"
- fmt: "### 12. Hit return (![Images](images/00043.jpg)) and you will see `-(IBAction)button:(id)sender;`\
    \ which appears as shown below and in [Figure 2–12](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos138610).\
    \ Yes, we will discuss this in detail in “Digging the Code” at the end of this\
    \ chapter. Right now, let's keep moving.\n\n```\n#import <uikit/UIKit.h>\n@interface\
    \ helloWorld_01ViewController : UIViewController {\n    IBOutletUILabel *label;\n\
    }\n- (IBAction)button:(id)sender;\n@end\n```\n\nBefore moving on to Step 13, we\
    \ need to look around and see where we're at. Remember, back in Step 3, I said\
    \ that we have 2 classes that contain two files (a header file (`.h`) and an implementation\
    \ file (`.m`)). Let me talk a little bit about the difference between these two\
    \ files: one with the `.h` suffix, the other with the `.m` suffix.\n\nThe `ViewController`\
    \ manages the interactions your code has with the display, and it manages the\
    \ user’s interactions with your code. It contains a view, but it is not a view\
    \ itself. You only have a minimal understanding of the `ViewController` class,\
    \ so far. What I want you to get, though, is that, as mentioned in Step 3, every\
    \ class consists of two parts: the header (`.h`) file and the implementation (`.m`)\
    \ file.\n\nI want you to read this next part aloud, and I don’t care if you’re\
    \ in the bookstore! OK? “We tell the computer in a header file what types of commands\
    \ we will execute in the implementation file.” Now, let’s say it again in context\
    \ with our code: “We tell the computer in the `helloWorld_01ViewController.h`\
    \ file what types of commands we will execute in the `helloWorld_01ViewController.m`\
    \ file.”\n\nWell, admit it—that wasn’t so bad!\n\nLet's get back to the example:\n\
    \n![images](images/00054.jpg)\n\n**Figure 2–13.** Switch to the Standard Editor.\n\
    \n### 13. To move on to the implementation file from this point, get into the\
    \ habit of first switching views and going from the Assistant Editor (remember\
    \ we did this in Steps 2–7) to the Standard Editor. To do this, go to the Editor\
    \ Selector located to the left of the View Selector and click on the Standard\
    \ Editor, as shown in [Figure 2–13](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos140996).\n\
    \n![images](images/00055.jpg)\n\n**Figure 2–14.** Open your `helloWorld_01ViewController`’s\
    \ implementation file.\n\n### 14. Once in the Standard Editor, select your `ViewController`'s\
    \ implementation file, as shown in [Figure 2–14](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos141710).\n\
    \nRecall how, in Step 10, we “declared an action” when we control-dragged the\
    \ button into our header file's code? Remember that in the header file we “declare”\
    \ actions, while in the implementation file we “implement” actions. Here in your\
    \ `ViewController`'s implementation file, we are going to implement the actions\
    \ that we want to happen when somebody presses on the button. Specifically, we\
    \ want it to say, in the label, “Hello World!” “Mmm, how do we do this?” you may\
    \ ask. Well, we need to type your very first code to start your journey towards\
    \ geekdom. Yup, you're going to code text. Take a deep breath and follow along.\n\
    \nLooking at the text of your `helloWorld_01ViewController`'s implementation file,\
    \ we see that the clever people at Apple programmed Xcode to already write a number\
    \ of methods that need to happen in the background just to get your app with label\
    \ and buttons running on your iPhone. For now we will ignore these methods, starting\
    \ at the first one named `dealloc`, which deallocates memory and going down to\
    \ the end until we get to one named `- (IBAction)button:(id)sender`. Mmm… wait\
    \ a minute, that’s the code that appeared in Step 12, right? Right? Well, almost.\
    \ That code ended with a semicolon “`;`” because, in the header file, we declared\
    \ this action. Xcode knows we now need to implement this action in the implementation\
    \ file, so it rewrites it for us, not as a declaration but as a method. It does\
    \ this by substituting the colon with squiggly brackets. You need to remember\
    \ this rule. You will use it over and over again.\n\n**NOTE:** A declaration in\
    \ `.h` becomes a method in the `.m` file by replacing the colon with squiggly\
    \ brackets!\n\nAfter reaching the implementation of your action that you declared\
    \ in the header, I want you to place your cursor in between the two squiggly brackets,\
    \ as indicated in the code below. Click there and read below.\n\n![Images](images/00056.jpg)\n\
    \n![images](images/00057.jpg)\n\n**Figure 2–15.** As you enter the text `label.text`\
    \ auto completion suggests code. If you agree with the selection, then press the\
    \ Tab (![Images](images/00058.jpg)) key and Xcode places the command into your\
    \ code.\n\n### 15. The code I want you to type is `label.text = @\"Hello World!\"\
    ` but it’s not that straightforward because, as you type, something really cool\
    \ happens. Xcode figures out what you’re probably going to want to code in its\
    \ auto completion window, as illustrated in [Figure 2–15](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos144571).\
    \ If you agree with the selection, then press the Tab (![Images](images/00059.jpg))\
    \ key and Xcode places the completed, correctly typed and spelled command into\
    \ your code. If the one it suggests is not the correct one, but you see the correct\
    \ one a few commands down, just arrow down (↓) until you reach the correct selection\
    \ and then press ![Images](images/00059.jpg). Cool, huh? After you have written\
    \ `label.text`, continue on to Step 16.\n\n![images](images/00060.jpg)\n\n**Figure\
    \ 2–16.** Type in the text you want the label to say after the “`@`” directive.\n\
    \n### 16. Now we need to type `@\"Hello World!\";` which is what we want to say.\
    \ Your code should look like that depicted in [Figure 2–16](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos145885).\
    \ If you wanted to say “I can feel I'm becoming a geek!” instead, then type `label.text\
    \ = @\"I can feel I’m becoming a geek!\";`.\n\n![images](images/00061.jpg)\n\n\
    **Figure 2–17.** Save your work: ![Images](images/00062.jpg)S.\n\n### 17. Save\
    \ your work ![Images](images/00031.jpg)S, as shown in [Figure 2–17](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos146584).\
    \ Please try not to use your mouse; try to make a new habit by always pressing\
    \ the Control+S (![Images](images/00031.jpg)S) every time you want to save. This\
    \ will make you feel and look really smart and geeky. You may also want to check\
    \ that your header files and nib files are also saved because, during the course\
    \ of reading these instructions, you may have had to go back and change files.\
    \ Well, you need to go back and save them. So go ahead and save everything now.\
    \ If the file is highlighted in gray, then it means you need to save them too.\n\
    \n![images](images/00063.jpg)\n\n**Figure 2–18.** Run it!![Images](images/00062.jpg)R.\n\
    \n### 18. Press ![Images](images/00031.jpg)R and run it, as described in [Figure\
    \ 2–18](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos147623).\n\nAs\
    \ [Figure 2–19](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos148414)\
    \ shows, the iPhone simulator loads your very first app, waits for you to press\
    \ the button, and then says “Hello World!”.\n\n![images](images/00064.jpg)\n\n\
    **Figure 2–19.** The iPhone simulator, loading and waiting for the user to press\
    \ the button, and then saying “Hello World!”\n\nCongratulations, my friend! You\
    \ have really done something very special today. I know you may have cursed me\
    \ a couple of times, or floundered here and there, but in getting here you've\
    \ just done something very special with your life. You've gone from being a user\
    \ to a coder. You've taken that very difficult leap from being a user of technology\
    \ to a coder of technology. We still have a few things to do, so take a break.\
    \ Walk the dog; do something that does not involve technology, even if it’s walking\
    \ out to the street. Take a minute to realize that you’re beginning a long journey.\
    \ It will be difficult at times, but it’s one wherein you can hold your head high\
    \ and say: “Yeah, I code iPhone and iPad apps!”"
