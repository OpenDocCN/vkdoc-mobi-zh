  trans: "\n### 编写 `myDetailViewController.m` 文件\n\n接下来你要进入本书中最复杂的代码编写部分。这部分代码很可能会让你受挫甚至崩溃。因此，我允许你直接从我提供的代码中粘贴几大段内容。我希望你保持冷静，跟着我的步骤一步步来。我会教你如何编写代码，以及在哪里粘贴每一组特定的样板代码。不过首先，让我们再来审视一下全局概况。\n\
    \n**全局概况：`myDetailViewController.m` 扩展内容**\n\n> 1.  用城市列表填充表格 (已完成)\n> 2.  编写代码，使大头针落到所选城市地图的中心点\n\
    >     2.1. 添加 MapKit 框架\n>     2.2. 编写代码\n>     > 2.2.1. `myPos` 用于跟踪所选城市及其坐标\n\
    >     > 2.2.2. `myDetailViewController` 用于解析 Google 及其他数据\n>     > 2.2.2.1. 编写头文件\
    \ (已完成)\n>     > 2.2.2.2. 编写实现文件\n>     > 2.2.2.2.1. 导入 `myPos` 头文件\n>     > 2.2.2.2.2.\
    \ 创建私有接口\n>     > 2.2.2.2.3. 合成 `detailItem`\n>     > 2.2.2.2.4. 编写 `detailItem`\
    \ 方法并更新其视图\n>     > 2.2.2.2.5. 编写 `configureView` 方法\n>     > 2.2.2.2.5.1. 访问\
    \ `googleapis.com`\n>     > 2.2.2.2.5.2. 解析经度和纬度坐标\n>     > 2.2.2.2.5.3. 更新详情项的用户界面\n\
    >     > 2.2.2.2.5.4. 设置缩放和放置大头针\n>     > 2.2.3. `myMasterTableViewController`\
    \ 用于控制到 MapKits 的转场\n>     2.3. 微调 Storyboard 以适应我们的新代码\n\n![图片](img/00442.jpg)\n\
    \n**图 10–33.** 打开 `myDetailViewController` 的实现文件。\n\n33. 从全局概况可以看出，`myDetailViewController`\
    \ 将包含大量代码，所以我们先从“07 Part 2myDetailViewController m”样板代码中的部分开始编写。打开文件，如图 10–33\
    \ 所示。\n\na. 我们首先需要导入 `myPos.h` 文件，因为在设置缩放和放置大头针的代码时，我们会用到 `myPos` 标注的标题和坐标。\n\n\
    ```objc\n#import \"MyPos.h\"\n```\n\nb. 接着，我们需要通过前向声明将我们的视图配置为私有方法，这个方法稍后你会编写。你可以看看我注释\
    \ `// private method` 之前的代码来理解我的意思。我们正在声明 `configureView`。你现在看到它了吗？还没看到？那是因为我们还没编写它。但我们马上就会写。它之所以是私有的，是因为它以\
    \ `@interface [类的名称]` 开头，接着是 `()`，然后以 `@end` 结尾。\n\n```objc\n@interface myDetailViewController\
    \ ()\n- (void)configureView;  // private method\n@end\n```\n\nc. 对于这个顶部区域，最后一步是合成属性。\n\
    \n```objc\n@synthesize detailItem=_detailItem;\n```\n\n这就是“06 Part 2myDetailViewController\
    \ h”文件中的所有代码，其内容应如下所示：\n\n```objc\n#import \"myDetailViewController.h\"\n#import\
    \ \"myPos.h\"\n\n@interface myDetailViewController ()\n- (void)configureView;\
    \  // private method\n@end\n\n@implementation myDetailViewController\n\n@synthesize\
    \ detailItem=_detailItem;\n```\n\n如果你在此时收到关于接口不完整的警告，请不要担心，我们马上就会处理它。但在继续之前，让我们再看看全局概况。可以看到，在步骤\
    \ 33 中，我们刚刚完成了 2.2.2.2.1 到 2.2.2.2.3 的内容。在接下来的两步（34 和 35）中，我们将完成 2.2.2.2.4 到 2.2.2.2.5\
    \ 的内容（即从“编写 `configureView` 方法”到“设置缩放和放置大头针”之间的所有步骤）。\n\n**全局概况**\n\n> 1.  用城市列表填充表格\
    \ (已完成)\n> 2.  编写代码，使大头针落到所选城市地图的中心点\n>     2.1. 添加 MapKit 框架\n>     2.2. 编写代码\n\
    >     > 2.2.1. `myPos` 用于跟踪所选城市及其坐标\n>     > 2.2.2. `myDetailViewController` 用于解析\
