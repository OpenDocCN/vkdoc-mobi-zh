    for a new app…,” it is amazing how often it involves using the MapKit framework.
    We have seen how fun and sexy this stuff is, and by now, you have likely also
    gathered that delving into the code can turn into quite a complexity.


    As a final buffet of tasty, high–calorie, high–tech fun, and flash, I am going
    to share some final project scenarios with you. I certainly hope you actively
    follow along here, but I also want to honor the fact that you''re done. You already
    succeeded in making it to the end of [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382).
    So, remember, this section is like one of those “bonus feature” DVDs that Hollywood
    loves to include—at no extra cost. Relax and enjoy!


    #### Parsing to MapKit from the Internet


    A little background: I presented my class the MapKit session very much as I laid
    out the first example of this chapter. Then, we moved into one of the coolest
    things there is with MapKit—the ability to parse, or read live info, from the
    ether. This feature allows users to “see” the info on their map. I''ll explain
    this to a degree before I present three student final projects.


    One of the most intriguing things we can do with MapKit is get real live information
    from the Internet and configure it in a way that makes the Google Map on the user''s
    iPhone come alive with live information (weather, traffic, geographical phenomena,
    taxis, planes, and so on). For example, one of the most popular apps for the San
    Francisco Bay Area is a program demonstrated in iPhone Cool Projects (Wolfgang
    Ante, et al., Apress, 2009) (see [Figure 9–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos698306))
    called “RoutesyBay Area San Francisco Muni and BART,” written by Steven Peterson.


    Peterson parses all the data from the BART (Bay Area Rapid Transit, [`http://www.bart.gov/`](http://www.bart.gov/))
    web server that keeps track of how close to schedule its trains are, the location
    of the trains, and their speeds. The app parses all this data and makes it useful
    and relevant to users at their specific locations in the San Francisco Bay Area.
    In [Figure 9–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos698594),
    you will see their app''s red icon, and then several iPhone images. The left one
    shows all the places a user can catch buses and trains. The middle picture uses
    the same code we used in our example with a core location to show a user''s current
    location with a blue icon, and where a requested station is. The right image reports
    to the user the relevant information on the best train given the context, the
    timing, etc. The app provides data for the next three trains that will be arriving
    at the train station nearest the user.


    In essence, the MapKit code on the iPhone is, among other things, a parsing utility.
    It retrieves live information from a server that most people don''t even know
    exists, and it puts a stream of data to a novel and useful purpose.


    Because of the immediate and practical results that users of Peterson''s app,
    and others like it, can reap, I figured this would be a perfect theme to round
    out this book. I''ll first go over some of my “Parsing with the MapKit framework”
    lecture notes. Then I will show you several solid final projects created by my
    students on that basis.


    With my students'' blessing, the code for their projects (as shown below)is available
    for download from my website. This gives you the opportunity to have the code
    on your Mac while I simultaneously point out how you can modify it, learn the
    key features from it, or just put it on your iPad and show the folks at the bar
    these cool apps.


      ![images](images/00390.jpg)  


    Figure 9–37\. Apress''s iPhone Cool Projects.


      ![images](images/00391.jpg)  


    Figure 9–38\. App icon and examples of three action screens—parsing app: “Routesy
    Bay Area San Francisco Muni and BART.” It combines data from the web and MapKit.


    The code for these three student Final Projects is located as follows:


    *   Stephen A. Moraco (Son): [`http://www.rorylewis.com/xCode/011b_TrafficCam.zip`](http://www.rorylewis.com/xCode/011b_TrafficCam.zip)

    *   Stephen M. Moraco (Father): [`http://www.rorylewis.com/xCode/011a_APRSkit.zip`](http://www.rorylewis.com/xCode/011a_APRSkit.zip)

    *   SatishRege: [`http://www.rorylewis.com/xCode/011c_MyTraffic.zip`](http://www.rorylewis.com/xCode/011c_MyTraffic.zip)


    #### MapKit Parsing


    Remember, this is digging deep into the code at a level that is outside the scope
    of the book. However, all of the following instructions are seen in my students''
    code, which you are welcome to download. For now, just read along and see if you
    can follow their pattern of parsing, creating delegate objects, and so forth.


    Before we look at their actual apps, consider a hypothetical scenario:Imagine
    there is a Grateful Dead Server that broadcasts an update on every Deadhead''s
    geographical location—at least those who allow themselves to be visible on the
    grid. This hypothetical app allows a (serious) fan of the Grateful Dead to locate
    all the other Deadheads nearby at any given time. These fans can meet and share
    bootlegs, hang out, and generally relate on a plane that only other Grateful Dead
    disciples can appreciate.'
  trans: "\n# 故事板对象的內存管理\n\n在 Objective-C 中，`ivar` 代表实例变量。如今，`IBOutlet` 属于类公共接口的一部分，这也是我个人认为将方法声明放在\
    \ `@property` 实现细节中更好的原因。请记住，`IBOutlet` 实例变量会调用 setter 方法（如果存在）；但若未找到 setter 方法，则直接从\
    \ nib 文件加载的对象会被直接保留。这意味着将属性声明为 `IBOutlet` 至少能明确该属性的 setter 方法将始终被使用，并遵循为该属性设定的任何内存管理规则。苹果公司对此说明如下：\n\
    \n> “nib 文件中的对象创建时持有引用计数为 1，随后自动释放。在重建对象层次结构时，UIKit 通过 `setValue:forKey:` 方法重新建立对象之间的连接，该方法会使用可用的\
    \ setter 方法，若没有可用的 setter 方法，则默认保留对象。这意味着（假设你遵循‘输出口’中所示的模式）任何你拥有输出口的对象都将保持有效。然而，如果有任何未存储在输出口中的顶级对象，你必须保留\
    \ `loadNibNamed:owner:options:` 方法返回的数组或数组中的对象，以防止这些对象被过早释放。”\n\n简单来说，如果在第 20\
    \ 步中有选择余地，要么采用我们之前的方式：\n\n```\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\
    \n@interface ViewController : UIViewController <MKMapViewDelegate>\n{\n    MKMapView\
    \ *mapView;\n}\n\n@property (nonatomic, retain) IBOutlet MKMapView *mapView;\n\
    \n@end\n```\n\n要么采用这种方式：\n\n```\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\
    \n@interface ViewController : UIViewController <MKMapViewDelegate>\n{\n    IBOutlet\
    \ MKMapView *mapView;\n}\n\n@property (nonatomic, retain) MKMapView *mapView;\n\
    \n@end\n```\n\n最有趣的一点是，如果你只是将 `IBOutlet` 从故事板界面构建器拖拽到头文件中——Xcode 会自动替你做出这些决定。使用第一个示例，在\
    \ `@property` 中声明 `IBOutlet` 是“更好”的做法，但这只是“风格”问题，你可能在采用第二种方法或我们本书前几章使用的“新”方法的环境中工作。\n\
    \n帮自己一个忙，按照我教你的方式来做——也就是第一种方式。\n\n## 深入剖析我学生的 MapKit 代码\n\n当人们走过来对我说：“嘿，刘易斯博士，我有一个关于新应用的很棒的想法……”，令人惊讶的是，这个想法常常涉及到使用\
    \ MapKit 框架。我们已经见识到这些东西是多么有趣和炫酷，到现在为止，你可能也意识到深入代码可能会变得相当复杂。\n\n作为一顿美味、高热量、高科技、有趣且炫酷的“自助大餐”，我将与你分享一些最终项目场景。我当然希望你积极跟进，但我也要承认你已经完成了任务。你已经成功读到了第\
    \ 9 章的结尾。所以请记住，这一节就像好莱坞喜欢附赠的那些“花絮”DVD——完全免费。放松心情，享受其中吧！\n\n### 从互联网解析数据到 MapKit\n\
    \n先简单介绍一些背景：我在课堂上讲授 MapKit 部分时，很大程度上是按照本章第一个示例的方式进行的。随后，我们进入了 MapKit 最酷的功能之一——从网络中解析（或称读取）实时信息。这个功能允许用户在地图上“查看”信息。在我展示三个学生的最终项目之前，我会先对此进行一定程度的解释。\n\
    \n用 MapKit 能做的最吸引人的事情之一，就是从互联网获取真实的实时信息，并将其配置到用户 iPhone 的谷歌地图上，使其充满实时信息（天气、交通、地理现象、出租车、飞机等）。例如，旧金山湾区最流行的应用之一就是《iPhone\
    \ Cool Projects》（Wolfgang Ante 等人著，Apress，2009 年）中演示的一个程序（见图 9–28），名为“RoutesyBay\
    \ Area San Francisco Muni and BART”，由 Steven Peterson 编写。\n\nPeterson 解析了 BART（湾区快速交通系统，[`http://www.bart.gov/`](http://www.bart.gov/)）网络服务器上的所有数据，该服务器追踪列车时刻表的准时情况、列车位置及其速度。这个应用解析所有这些数据，并使其对旧金山湾区特定位置的用户变得有用且相关。在图\
    \ 9–29 中，你将看到该应用的红色图标，以及几幅 iPhone 图片。左图显示用户所有可以乘坐公交车和火车的地点。中图使用了与我们示例中相同的核心定位代码，用蓝色图标显示用户当前位置，并显示所请求站点的位置。右图根据上下文、时间等因素，向用户报告最佳列车的相关信息。该应用提供了即将到达离用户最近火车站的三趟列车的数据。\n\
    \n本质上，iPhone 上的 MapKit 代码除了其他功能外，还是一个解析工具。它从一个大多数人都不知道其存在的服务器上检索实时信息，并将数据流用于新颖且有价值的目的。\n\
    \n由于 Peterson 的应用及其他类似应用的用户能够获得即时且实用的结果，我认为这将是一个完美的主题来为本书画上句号。我首先会回顾一些我的“使用 MapKit\
    \ 框架进行解析”的课堂笔记。然后，我会向你展示我的学生在此基础上创建的几个扎实的最终项目。\n\n经学生同意，他们项目的代码（如下所示）可从我的网站下载。这样，你就可以在\
    \ Mac 上拥有这些代码，同时我可以指出如何修改它、学习其中的关键功能，或者只是把它放在你的 iPad 上，在酒吧里向朋友们展示这些炫酷的应用。\n\n\
    ![images](img/00390.jpg)\n\n图 9–37\\. Apress 的 iPhone 炫酷项目。\n\n![images](img/00391.jpg)\n\
    \n图 9–38\\. 应用图标和三个操作界面的示例——解析应用：“Routesy Bay Area San Francisco Muni and BART”。它结合了来自网络和\
    \ MapKit 的数据。\n\n这三个学生最终项目的代码如下：\n\n- Stephen A. Moraco (儿子)：[`http://www.rorylewis.com/xCode/011b_TrafficCam.zip`](http://www.rorylewis.com/xCode/011b_TrafficCam.zip)\n\
    - Stephen M. Moraco (父亲)：[`http://www.rorylewis.com/xCode/011a_APRSkit.zip`](http://www.rorylewis.com/xCode/011a_APRSkit.zip)\n\
    - SatishRege：[`http://www.rorylewis.com/xCode/011c_MyTraffic.zip`](http://www.rorylewis.com/xCode/011c_MyTraffic.zip)\n\
    \n### MapKit 解析\n\n请记住，这是在超越本书范围的层面上深入代码。然而，以下所有指令都在我学生的代码中可见，欢迎你下载。现在，请先阅读并看看你是否能理解他们解析、创建委托对象等的模式。\n\
    \n在我们查看他们的实际应用之前，先考虑一个假设场景：想象有一个“感恩而死”服务器，广播每个“死头”粉丝的地理位置更新——至少是那些允许自己在网格上可见的粉丝。这个假设的应用允许一个（铁杆）“感恩而死”乐迷在任何给定时间找到附近的所有其他“死头”粉丝。这些粉丝可以见面、分享私制唱片、一起闲逛，并通常在一个只有其他“感恩而死”信徒才能欣赏的层面上交流。\n"
- fmt: "# Starting Point\n\nIf we were to create such an app, just as in the “Routesy”\
    \ example, we would allow users to see where they are by bringing up the Attributes\
    \ Inspector and turning on a Shows User Location switch. We would create a controller\
    \ called `DeadHeadsView` that creates an instance of a parser we'll call `Gratefuldead`.\
    \ Then, we would make it set itself as the delegate so it receives the feedback\
    \ and calls a `getGratefuldead` data method.\n\n# Getting Data from the Web\n\n\
    As our parser sifts through the XML on the Grateful Dead Server, we would want\
    \ it to grab `Gratefuldead` element data and create an instance of each `Gratefuldead`\
    \ object. So, for each instance it creates, it calls back to us with an `addGratefuldead`\
    \ method. We would need to implement our `Gratefuldead` and `Parser` methods on\
    \ our `deadHeadsViewcontroller`. We might find that it's easier to think of our\
    \ `GratefuldeadParser.h` this way:\n\n```\n+ (id)GratefuldeadParser; // this creates\
    \ it\n- (void)getGratefuldeadData; // this activates it\n```\n\n# Add Methods\
    \ to View Controller\n\nBefore adding implementation methods on our `DeadHeadsView`\
    \ controller, we would need to implement the protocol with `GratefuldeadParser`\
    \ Delegate and import its header file `#import <GratefuldeadParser.h>`. At this\
    \ point, we'd be finished with the header, and we'd move to the implementation\
    \ file.\n\nFirst, we'd copy the two implementation methods from `GratefuldeadParser.h`\
    \ and paste these two methods after the `@synthesize` statement:\n\n```\n@implementation\
    \ DeadHeadsViewC0ntroller\n\n@synthesize deadView\n\n- (void)getGratefuldeadData:(Gratefuldead\
    \ *)Gratefuldead;\n-(void)parserFinished\n```\n\n# Test the Parser Feed\n\nTo\
    \ test the Grateful Dead Server, we would see if we could log some messages. Let's\
    \ separate the two methods, delete the semicolons, add brackets, and then enter\
    \ “log” as shown:\n\n```\n- (void)getGratefuldeadData ![images](images/00392.jpg)\
    \ Gratefuldead *)Gratefuldead {\nNSLog(@\"Hippie Message\");\n}\n\n-(void)parserFinished{\n\
    NSLog(@\"located a Dead Head at %@\", Gratefuldead.place\");\n}\n```\n\n# Start\
    \ the Parser Method\n\nHaving implemented our delegate methods, we would need\
    \ to do three things:\n\n1. Code the parser method. Put it into a method we could\
    \ call `(void)viewWillAppear`. This would be called on by a view controller when\
    \ its view is about to be displayed. If we were to do it this way, note that we\
    \ would always want to call in our `- (void)viewWillAppear` method.\n2. Create\
    \ an instance of our parser that we would call `GratefuldeadParser`. With this,\
    \ we'd get `GratefuldeadParser *parser = [GratefuldeadParsergratefuldeadParser]`.\
    \ We want to make ourselves the delegate, which means that, now, `GratefuldeadParserparser.delegate\
    \ = self`.\n3. Two actions in this step: first, tell the parser to get the Gratefuldead\
    \ data: `[parser getGratefuldeadData];`\n\nSecond, handle its import:\n\n```\n\
    #import \"GratefuldeadParser.h\"\n```\n\nThen, when the `– (void)viewWillAppear`\
    \ is invoked, it would create an instance of `GratefuldeadParser`. As it receives\
    \ the locations of all the Deadheads, it shows us where they are!\n\nDo you recall\
    \ how we made sure that the user of the app would appear on the map as a blue\
    \ dot? I want you to think of the blue dot as just an annotationview. When added\
    \ to the `deadView`, it essentially asks its delegate for its location.\n\nNOTE:\
    \ If we return anything other than nil, then our annotation view, instead of the\
    \ blue one, will be used and then return that view.\n\nSo, looking at this, we\
    \ return nil when the annotation does not equal the user's current location.\n\
    \n```\n- (MKAnnotationView *)deadView:(MKDeadView *)deadView\n               \
    \   viewForAnnotation:(id <MKAnnotation>)annotation {\nMKAnnotationView *view\
    \ = nil;\nreturn view;\n```\n\nBut here's the thing; we do not want to return\
    \ nil for our `Gratefuldead` locations. Conversely, we want to do cool things\
    \ when our annotation is not equal to the `deadViewuserLocation` property, which\
    \ itself is an annotation:\n\n```\nif(annotation != deadView.userLocation) {\n\
    \n                // THIS IS WHERE WE DO OUR COOL STUFF\n               // BECAUSE\
    \ IT'S A DEADHEAD, NOT THE USER\n}\n```\n\nAt this point, we use the `dequeueReusableAnnotationViewWithIdentifier`\
    \ delegate method, which is available for reuse the instant they are off screen.\
    \ It has a handy way of storing annotations in a separate data structure and then\
    \ automatically adding and removing them from your map as the user's events require\
    \ it. Note that `dequeueReusableAnnotationViewWithIdentifier` is about getting\
    \ the reusable annotation view from the map, and it has nothing to do with adding\
    \ or removing annotations:\n\n```\nGratefuldeadAnnotation *eqAnn = (GratefuldeadAnnotation*)annotation;\n\
    view = [self.deadView  dequeueReusableAnnotationViewWithIdentifier:@\"GratefuldeadLoc\"\
    ];\n       if(nil == view) {\n        view = [[[MKPinAnnotationView alloc] initWithAnnotation:eqAnn\n\
    \                                              reuseIdentifier:@\"GratefuldeadLoc\"\
    ] autorelease];\n}\n```\n\nThe annotation view goes and looks in its reuse queue\
    \ to see if there are any views that can be reused `if(nil == view) { …` If there\
    \ are none, it returns nil, which means we need to create a new one `view = [[[MKPinAnnotationViewalloc]\
    \ initWithAnnotation:eqAnn`.\n\nThere are many creative ways to make your annotations\
    \ appear with animated chevrons, bells and whistles, Grateful Dead beads, and\
    \ so on. You can see what's out there and available to make the iCandy portion\
    \ of your annotations however you might wish.\n\nIn this regard, at this point\
    \ of writing your code, the most important step is to review your code for errors\
    \ using your NSLog debugger; this will determine whether it connects to a server\
    \ of your choice. Once complete, it becomes an issue of parsing the XML. Then,\
    \ the final step is to shop for iCandy for the annotations.\n\n# Three MapKit\
    \ Final Projects: CS–201 iPhone Apps, Objective–C\n\nThe following are three apps\
    \ that draw heavily on parsing information from the Internet. The first two come\
    \ from a father and son, both named Stephen Moraco, and the third is from SatishRege.\
    \ They were all kind enough to write unedited bios as to why they took the class.\
    \ They also included detailed lecture notes, the apps shown in this book, and\
    \ what they got out of the course.\n\n## BIOGRAPHICAL INFO FOR EXAMPLES 1 AND\
    \ 2\n\n> Stephen A. Moraco (Son)\n>\n> Stephen M. Moraco (Father)\n>\n> Steve\
    \ A. ([Figure 9–39](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos745689))\
    \ is in his senior year in high school. He has been concurrently enrolled at UCCS\
    \ and has taken courses for dual credit (both high school and college). I, Stephen\
    \ M. ([Figure 9–40](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_027.html#filepos745990)),\
    \ am a professional software engineer working for Agilent Technologies, Inc. Both\
    \ of us have iPhones and have an interest in learning to write applications for\
    \ the iPhone. The UCCS course caught our attention as a way we could learn this\
    \ together. In fact, we really enjoyed Dr. Lewis' CS201 classes, in which we toured\
    \ the iPhone SDK and practiced writing a number of applications. The discussions\
    \ in class and then between the two of us as we were driving home always had us\
    \ excited about things we could do with the iPhone. Our final projects came from\
    \ these discussions. Dr. Lewis, thank you for offering this course. It provided,\
    \ in our case, a wonderful time of shared learning. We couldn't have had a more\
    \ enjoyable time.\n>\n> ![images](images/00393.jpg)\n>\n> Figure 9–39\\. StephenA.Moraco(Son)\n\
    >\n> ![images](images/00394.jpg)\n>\n> Figure 9–40\\. Stephen M.Moraco(Father)"
