- fmt: "# How We’ll Travel Through Each Step\n\nThis book is completely inclusive.\
    \ Even though I provide video tutorials for the exercises in this book, you don’t\
    \ need any of it. You can read this book alone, without any Internet connection,\
    \ and everything that you need you can find within these pages.\n\nSo, now that\
    \ you’ve finished checking your system parameters, signed up as an official Apple\
    \ developer, downloaded the SDK, extracted the essential tools, and configured\
    \ your dock, it is time to advance to [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161)\
    \ and create some code.\n\n## A Little Exercise\n\n> Looking at [Figure 1–28](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos114009),\
    \ you see that on the test drive we ended up with an iPhone popping up on the\
    \ iPhone/iPad Simulator. Well, what about the iPad? Well, that’s what I’d like\
    \ you to do on your own. See if you can get the iPad in the iPhone/iPad Simulator,\
    \ as illustrated in [Figure 1–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos119692).\
    \ The clues are seen in [Figure 1–24](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos111699)\
    \ and in [Figure 1–29](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_011.html#filepos119692)\
    \ where, under the test folder, is a brand new folder called `test 2`.\n\n> ![images](images/00039.jpg)\n\
    \n> Figure 1–29. iPad2 in the iPhone/iPad Simulator.\n\n# Chapter 2\n\n## Blast-Off!\n\
    \nThe first program we shall attempt, as mentioned in [Chapter 1](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_010.html#filepos54331),\
    \ will be a basic and generic “Hello World” application. This Blast-Off chapter\
    \ emulates precisely what I have found, through experience, to work very well\
    \ in the lecture halls when teaching this course. I use this simple, innocent,\
    \ benign “Hello World App” as a basis to introduce students to the most critical\
    \ skill sets that they will use over and over again. As happens with my own students,\
    \ by the time you finish [Chapter 2](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_012.html#filepos120161),\
    \ you will know how to run your first app in 3 different ways, according to each\
    \ of the following sections:\n\n> 2.1. iPhone Simulator.\n> \n> 2.2. iPad Simulator\
    \ reading your iPhone environment (pseudo iPad).\n> \n> 2.3. iPad Simulator.\n\
    \nIn my lectures, I want to keep the flow of adrenaline by continuously creating\
    \ app after app and getting that geeky feeling of conquering the world. Therefore,\
    \ I leave §2.4 to 2.6 for a special Saturday class that is optional for students\
    \ who want to create their own business selling apps and making money. Likewise\
    \ for you, the reader, I suggest that you only do §2.1 to 2.3 and then go to [Chapter\
    \ 3](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_014.html#filepos161079), as this\
    \ will keep the flow going. Our first adventure with this new set of tools will\
    \ be saying “Hello” to the world from the View-based Application template in Xcode.\
    \ Later, we will say “Hello” to the world from the Navigation-based Application\
    \ template, first in a very basic way and then with some modifications.\n\nBesides\
    \ the information I present here in this book, including various screenshots,\
    \ I also offer you screencasts of myself going through each of the examples in\
    \ this book. Downloads for that will assist you in getting through this book,\
    \ as will lecture notes, 3rd party resources, and pertinent YouTube videos—all\
    \ of which can be accessed by clicking on the blue Xcode 4 icon located top center\
    \ at: [`www.rorylewis.com`](http://www.rorylewis.com).\n\n### Running Your App\
    \ on the iPhone Simulator\n\nIn this first example, we are going to click on a\
    \ button that will have text appear above it saying “Hello World.”\n\n> ![images](images/00040.jpg)\n\
    \nFigure 2–1. Click the Xcode icon in your Dock to open it. You will be presented\
    \ with the “Welcome to Xcode” frame, as discussed in [Chapter 1](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_010.html#filepos54331).\n\
    \n1.  Before opening Xcode, first close all open programs so that you will be\
    \ able to optimize your processing capabilities and focus your undivided attention\
    \ on this new material. Press Command + Tab (![Images](images/00031.jpg)![Images](images/00041.jpg))\
    \ and then Command + Q (![Images](images/00031.jpg) Q) to close everything, until\
    \ only the Finder remains on your screen. Find and click the Xcode icon in your\
    \ Dock to open it. You will be presented with the Xcode “Welcome” screen discussed\
    \ in [Chapter 1](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_010.html#filepos54331).\
    \ See [Figure 2–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos123581).\
    \ ![images](images/00042.jpg)\n\nFigure 2–2. Name it `hello_World_01` and use\
    \ your name or company name for the Company Identifier. For the Device, select\
    \ iPhone.\n\n2.  Now open a new project in Xcode. The two ways to accomplish this\
    \ are by using keyboard shortcuts or by clicking your mouse. I strongly suggest\
    \ that you use keyboard shortcuts. These will save you time and make you feel\
    \ like a pro. Be aware that the best way to not get work as an iPhone and iPad\
    \ app developer is to use your mouse for functions that can be done via shortcuts.\
    \ Using your keyboard, press Command + Shift + N at the same time. These three\
    \ keystrokes appear in [Figure 2–1](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos123581)\
    \ as ![Images](images/00031.jpg)![Images](images/00032.jpg)`N`. (If you were using\
    \ your mouse to open a new project, you would choose Create a new Xcode project.)\
    \ Select View-Based App and then press Return (![Images](images/00043.jpg)). Name\
    \ it `helloWorld_01`, enter your name, and select iPhone, as depicted in [Figure\
    \ 2–2](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos124680).\n\n> **NOTE:**\
    \ My View-based Application template icon was highlighted by default; yours may\
    \ not be. Regardless, click on it, and save the new project to your desktop as\
    \ `helloWorld_01`.\n\n![images](images/00044.jpg)\n\nFigure 2–3. Click the `helloWorld_01\
    \ ViewController.xib` to open the Interface Builder.\n\n3.  As soon as you save\
    \ this project to your desktop, Xcode instantiates the `helloWorld_01` project\
    \ environment, as indicated by the name on the top of the window (see [Figure\
    \ 2–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos126464)). If this\
    \ looks a bit scary, stay cool… don’t freak out! This is Apple’s way of arranging\
    \ all of the goodies that you will eventually use to write complex apps. For now,\
    \ just follow along and try to set aside all the questions you may be asking.\
    \ Xcode has created 6 files:\n    - 2 classes that contain two files (a header\
    \ file (`.h`) and an implementation file (`.m`)). Two of them end in `Appdelegate`\
    \ and two of them end in `ViewController`. We will get back to this later. Right\
    \ now just know this: Each “class” is comprised of two files: a header file and\
    \ an implementation file.\n    - 2 nib files (`.xib`). Don’t ask yourself what\
    \ “nib” means yet. Just open the file where you can see a visualization of your\
    \ program. In due time, you’ll get to know plenty about nibs.\n\nAs shown in [Figure\
    \ 2–3](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_013.html#filepos126464), double-click\
    \ to open up the `helloWorld_01ViewController.xib` (pronounced “nib”) file that\
    \ is located in the manila-colored `helloWorld_01` folder that is located inside\
    \ of the blue Xcode folder located at the top left-hand side of the Navigator\
    \ Area of your Xcode environment."
