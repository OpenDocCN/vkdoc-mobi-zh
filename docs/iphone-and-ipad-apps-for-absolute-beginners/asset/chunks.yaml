  trans: '好的，作为一名高级文档工程师和翻译员，我将严格按照您的要求，完成以下翻译任务。



    ## 开始之前


    本章绪论将确保您拥有完整且自信地阅读本书所需的所有工具和配件。有些人可能已经将 `Xcode`、最新的 iOS 模拟器和 `Interface Builder`
    安装到了您的 Mac 上，并且您可能认为，既然在这些方面已经准备就绪，就可以直接开始了。如果是这样，您可能想直接跳到 第 2 章，立即开始您的第一个程序。


    不过，理解我为何讲解某些内容而跳过其他内容，对您来说仍将大有裨益。对于那些从未用 Objective-C 编程过的人来说，这相当具有挑战性——即使是对我那些懂
    Java、C 和 C# 的工程专业学生也是如此。尽管如此，只要有适当的准备和心态，您就能完成 Objective-C 的编程任务。


    所以——我恳请您继续读下去。您在本章投入的时间，将在内心的平静和自信方面得到超值的回报。 第 1 章 将有助于构建您大脑对即将到来的丰富内容的存储方式。


    ### 必需品与配件


    为了能够为 iPhone 和/或 iPad 编程，并跟随本书的练习、教程和示例进行操作，您需要满足 5 个最低要求。您现在可能无法完全理解它们，但没关系——请先跟着我走一遍。我们会在这些步骤中解释一切。简而言之，这
    5 个要求是：


    *   一台 Mac

    *   适合您 Mac 的正确操作系统，称为“OS X”

    *   注册为开发者（下文详述）

    *   适合您 iPhone 的正确操作系统，称为 iOS

    *   适合您 iPhone 的正确软件开发工具包，称为 SDK，它运行一个名为 `Xcode` 的程序。


    让我们更详细地讨论其中一些要求。


    首先，您将需要一台基于 Intel 的 Macintosh，运行 Lion（OS X 10.7.2 或更高版本）。如果您的系统是在 2006 年之后购买的，就没问题。我特意在一台
    2006 年购买的 MacBook 上编写了所有程序。网上的所有视频都是在我的 2006 年 MacBook 上录制的屏幕录像，或者如果我使用 2010 年的
    iMac 进行广播，我会首先在我的 2006 年 MacBook 上运行它。您并不需要最新款的 Mac。如果您还没有购买，我建议您购买一台基础款、无多余功能的
    MacBook Air。如果您确实拥有一台较老的 Mac，那么您可能可以添加一些 RAM。请在 Apple Store 的 Genius Bar 预约，并要求他们尽可能增加
    RAM。同时，明确地问他们：“这台旧电脑能至少运行 Lion 10.7.2、iOS5 和 Xcode 4.2 或更高版本吗？”


    如果您没有 Mac，请记住，如前所述，我特意选择在 Apple 最小、最便宜的型号——MacBook 上编写和运行本书中的每一个程序。Apple 已经停产了
    MacBook；他们现在销售售价 999 美元的 MacBook Air，这比作者的 MacBook 更先进。您可以在 eBay 或其他类似网站上购买 MacBook。请参见
    图 1–1。


    > ![images](img/00008.jpg)

    >

    > 图 1–1。我使用市场上最便宜的 2006 年 Mac——MacBook，来执行本书中的所有编码和编译工作。本质上，完全没有必要购买更贵或更高端的 Mac
    来完成所有的练习。


    其次，您需要正确的 OS X。在我撰写本文时，它是 OS X 10.7.2。我们需要确保您的 Mac 中安装了最新、最好的操作系统（OS X）。我无法告诉您有多少封电子邮件和论坛问题显示，你们中许多人会想：“啊哈，我的代码可能没有正确编译，因为
    Dr. Lewis 的机器上有不同的 OS X 或/和 iOS……”


    **注意**：运行您电脑的操作系统（OS X）与 iPhone/iPad 操作系统（通常称为“iOS”）不同。即使您认为一切都已经是最新的，我建议您跟我一起确认您的系统拥有最新的
    OS X 和最新的 iOS。当您跟着我学习并处理我在本书中教您的所有程序时，有时您的代码在第一次运行时不会工作。实际上，大多数时候，您的代码在第一次运行时（或者用我们这些极客的话说，“编译它”时）都不会工作。所以！我们现在就来处理这个问题。


    关闭您 Mac 上运行的所有程序，以便唯一运行的程序是“Finder”。点击位于 Mac 左上角的小苹果图标，然后选择“关于本机”，如 图 1–2 所示。


    ![images](img/00009.jpg)


    图 1–2。进入您的桌面，点击苹果图标，然后选择“关于本机”。


    选择此项后，您将看到一个名为“关于本机”的窗口，如 图 1–3 所示。


    ![images](img/00010.jpg)

