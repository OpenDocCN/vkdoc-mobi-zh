    \n图 9–52. CS–201 期末项目——Rege 的交通监控应用显示了嵌入式摄像头视图。\n\n![images](img/00407.jpg)\n\n\
    图 9–53. CS–201 期末项目——Satish Rege 的应用显示了另一个嵌入式摄像头视图。\n\n### 缩小视野……纵观全局\n\n了解我们从何处来、现在在何处以及下一步要去向何方，这很重要。不要过于形而上学，但本章有点像我们人生的隐喻。五年前的你在哪里？去年呢？你买这本书的前一天呢？六个月后你打算在哪里？\n\
    \n这就是这个主题如此受欢迎的原因。人们喜欢知道自己在哪里！人们喜欢知道，也乐于被指导如何从“这里”到达“那里”。\n\n你知道男性通常不愿意停车问路吗？我知道我自己就是——因为我觉得自己应该知道要去哪里。当\
    \ GPS 出现时，我印象深刻。但当苹果公司通过 `Maps` 在我第一台 iPhone 中内置了导航功能时，我彻底震惊了。突然间，我既能咨询“先知”，又能同时维护我的男性自尊！\n\
    \n这就是力量，这就是权威……这也是我们所有人加入的同一场革命。既然你已经完成了这本书，并成功通过了这些练习——有些简单些，有些更难些——那么你已经在编程世界中走上了正轨。\n\
    \n正如我之前所说，我在本章中为你设定的目标并不高。然而，正如任何真正具有挑战性和有价值的事业一样，熟能生巧。如果你感到疲惫，但仍然对这些想法和可能性感到兴奋，那么我认为这完全是成功的——无论对你还是对我都是如此。\n\
    \n你们中的一些人可能在想本书未涉及的主题：加速度计、摄像头/视频、点对点协议、RSS 订阅、邮件客户端/POP 服务器等。如果这些领域让你感兴趣，我希望你的思绪已经在向这些新方向飞驰。那意味着你确实知道自己在哪里，也知道自己想去哪里。生活真美好！\n\
    \n## 第 10 章\n\n## 使用 Storyboarding 的 MapKit 与表格\n\n关于本章，我希望你记住五件事：\n"
- fmt: '- 续接[第9章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)：[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)将你在[第9章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)所学的内容注入“兴奋剂”。你需要复习[第9章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)的内容，然后直接进入[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)。在课堂上，我要求我的学生在二十分钟内跑完[第9章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)（如果他们想要成绩的话），然后，在立即通过电子邮件向我发送完成项目的截图后，我们就直接进入[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)。我建议，如果你在完成[第9章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)后休息了几天，你也应该让自己重复[第9章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)几次，直到你可以在二十分钟内完成。即使你必须做15次，在尝试本章之前也要一遍又一遍地做。

    - 非易事：当你完成[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)时，你将真正完成一些值得骄傲的事情。是的，一方面，当我们在辩论学生达到某个水平时的“极客程度”时，学生们会放声大笑，但事实上，在完成这个应用后，你将能够找到一份`Objective-C`程序员的工作，或者至少能够与一位不相信你自称是绝对初学者的面试官进行像样的对话。苹果公司也并非如此，他们雇用了我的一个学生到库比蒂诺从事`iOS
    5`开发工作。八个月前，她还从未拥有过一台`Mac`，并且正在学习本书的第一版，所以请认真对待；这一章将成为你生命中的决定性一章。

    - 大局观：正如你读到这些文字一样真实，总会有那么一刻，这段代码会让你陷入困境，如果你在我的课堂上，我看到你不知所措、惊慌失措，我会走到你身边，提醒你注意大局观。在本章中，我会不断地让你回归大局观，简而言之，就是一个包含一个表格的故事板，表格中填充了许多城市名称。我们访问谷歌的服务器，获取每个城市的地理空间地址，当用户点击表格中列出的某个城市时，我们会沿着另一个转场（segue）跳转，该转场实例化一个`MapKit`，在该城市的中心放置一个图钉。

    - 章节大纲：[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)的预备知识非常少，因为我希望你能无缝地保持从[第9章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos776315)到第10章的势头。我将解释帮助文件和视频的位置，如何选择使用它们，以及它们与以前帮助文件的不同之处。

    - 不要放弃：[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)会考验你，我希望你能突破。听我说，没有人能一次完成[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)！你需要反复从头开始。事实上，重新开始是关键：在花一点时间调试之后，只需从头开始。请不要对自己说：“哦，我搞不定这个，看，我已经试了5次了，还是过不去！”失败并重新开始是可以的，我真心希望你能够通过。我希望看到你去论坛告诉大家你通过了[第10章](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)！好吗？是的！


    注意：我注意到我的一些学生不能正确发音“segue”一词。以下是我从学生那里听到的一些令人惊叹的版本：“Seeg”、“Seg-you”、“Zeeyoo”、“Suh-goo-wee”，当然还有“Sega”，就像游戏机那样！真的吗！如果你还不知道，`Segue`的发音如下：`Seg-way`。这是我定义它的方式。由《梅里亚姆-韦伯斯特词典》定义的恰当且正确的方式如下：


    se·gue\ se-( )gwā, sā-\


    1 : 继续下面的内容而不停顿——作为音乐中的指示使用


    2 : 像前一个那样演奏接下来的音乐——作为音乐中的指示使用


    `SEGUE`的词源：意大利语，意为“接着”，来自`seguire`（跟随），源自拉丁语`sequi`——首次使用时间：约1740年。


    ## `myStory_02`：一个单视图应用


    在`myStory_02`中，我们将项目分为第1部分和第2部分。在第1部分中，我们使用故事板创建一个简单的表格，该表格由一个城市数组填充。列表的长度将是你拥有或编造的城市列表中的“数量”。当用户选择列表中的某个城市时，实际上什么也不会发生。然而，在继续之前，了解你的应用程序在此刻能够正常工作是很重要的。你可以通过查看[图10-26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos825319)来先睹为快。然后，在第2部分中，我们将填充表格的城市列表发送到谷歌服务器，在那里我们解析服务器以获取每个城市的经度和纬度地址。我们存储这些地址，当用户选择一个城市时，我们通过转场从表格“跳转”到一个带有`UIMapKit`的视图，该视图会实例化一张地图，地图上有一个图钉落在城市中心。'
  raw: '*   Continuation of [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382):
    [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315) takes
    what you learned in [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)
    and injects it with steroids. You will need to go over what you learned in [Chapter
    9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382) and go right
    into [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315).
    In the lecture hall, I make my students in class run [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)
    in twenty minutes, that’s if they want a grade and then, immediately after emailing
    me a screenshot of their completed project, we go right into [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315).
    May I suggest that, if you have taken a couple of days off after ending [Chapter
    9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382), that you too
    make yourself repeat [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)
    a couple of times until you can do it under twenty minutes. Even if you have to
    do it 15 times, do it over and over again before trying this chapter.

    *   Non-trivial: When you''re done with [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315),
    you will have really accomplished something you can be proud of. Yes, on one hand
    students shriek with laughter when we debate what level of geekdom a student will
    be at a certain point, but the truth is that after you''ve completed this app,
    you will be able to get work as an Objective-C programmer, or at least be able
    to hold a decent conversation with an interviewer who will not believe you classified
    yourself as an absolute beginner. Neither did Apple when they hired a student
    of mine to work in their iOS 5 development in Cupertino. Eight months earlier,
    she''d never owned a Mac and was studying the first edition of this book, so take
    this seriously; this chapter will be a defining chapter in your life.

    *   Big Picture: As true as you are reading these words, there WILL be a time
    when this code will bog you down and, if you were in my lecture hall and I saw
    you overwhelmed and freaking out, I would walk up to you and remind you of the
    Big Picture. Throughout this chapter, I will bring you back to the Big Picture,
    which, in a nutshell, is a storyboard containing a table that is populated with
    many city names. We go to Google''s server and fetch the geospatial addresses
    of each of these cities and, when the user taps on one of the cities listed in
    your table, we travel along another segue that instantiates a MapKit that drops
    a pin in the center of that city.

    *   Chapter Outline: [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)
    has very little preliminaries because I want you to seamlessly keep your momentum
    from [Chapter 9](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_026.html#filepos647382)
    right into 10\. I will explain where the help files and videos are, how to use
    them if you choose to, and how these are different from previous help files.

    *   DO NOT GIVE UP: [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)
    tests you and I want you to break through. Listen to me when I say that nobody
    is going to do [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)
    in one try! You will have to start from scratch repeatedly. This issue of starting
    over is, in fact, the key: After spending a little time debugging, just start
    again from scratch. Please do not say to yourself: “Oh I can''t get this, look
    I''ve tried this 5 times and I can''t get through it! ” It''s OK to fail and start
    again and I really want you to get through this. I want to see you go to the forum
    and tell everybody you got through [Chapter 10](CR%21DY26GKDHYN22FE0P6A96FDR74J4A_split_028.html#filepos776315)!
    OK? Yeah!


    NOTE: It has come to my attention that a few of my students do not pronounce the
    word segue correctly. Here are some of the amazing renditions of this word I''ve
    heard from my students: “Seeg”, “Seg-you”, “Zeeyoo”, “Suh-goo-wee”, and, of course,
    “Sega”, as in the game system! Really! If you did not know it already Segue is
    pronounced as follows: “Seg-way”. That''s my way of defining it. The proper and
    correct way, as defined by The Merriam-Webster Dictionary, is as follows:


    se·gue\ se-( )gwā, sā-\


    1 : proceed to what follows without pause—used as a direction in music


    2 : perform the music that follows like that which has preceded—used as a direction
    in music


    Origin of SEGUE: Italian, there follows, from seguire to follow, from Latin sequi
    — First Known Use: circa 1740.


    ### myStory_02: A Single-View Application


    In myStory_02, we divide the project into Parts 1 and 2\. In Part 1, we use storyboarding
    to create a simple table that is populated by an array of cities. The length of
    the list will be whatever the “count” of the number of cities on the list is that
    you have or make up. When a user selects one of the cities on the list, nothing
    really happens. However, it''s important to know that your application works at
    this point before moving forward. You can take a sneak peek at this by going to
    [Figure 10–26](#CR!DY26GKDHYN22FE0P6A96FDR74J4A_split_029.html#filepos825319).
    Then, in Part 2, we send the list of cities that populate our table to the Google
    server where we parse the server for the longitudinal and latitudinal addresses
    for each city. We store these address and, when the user selects a city, we “go”
    from the table, through the segue, and onto a View with a UIMapKit that instantiates
    a map of the city with a pin dropping into the city-center.'
  trans: '

    - 续接第 9 章：第 10 章将你在第 9 章所学的内容注入“兴奋剂”。你需要复习第 9 章的内容，然后直接进入第 10 章。在课堂上，我要求我的学生在二十分钟内跑完第
    9 章（如果他们想要成绩的话），然后，在立即通过电子邮件向我发送完成项目的截图后，我们就直接进入第 10 章。我建议，如果你在完成第 9 章后休息了几天，你也应该让自己重复第
    9 章几次，直到你可以在二十分钟内完成。即使你必须做 15 次，在尝试本章之前也要一遍又一遍地做。

    - 非易事：当你完成第 10 章时，你将真正完成一些值得骄傲的事情。是的，一方面，当我们在辩论学生达到某个水平时的“极客程度”时，学生们会放声大笑，但事实上，在完成这个应用后，你将能够找到一份`Objective-C`程序员的工作，或者至少能够与一位不相信你自称是绝对初学者的面试官进行像样的对话。苹果公司也并非如此，他们雇用了我的一个学生到库比蒂诺从事`iOS
    5`开发工作。八个月前，她还从未拥有过一台`Mac`，并且正在学习本书的第一版，所以请认真对待；这一章将成为你生命中的决定性一章。

    - 大局观：正如你读到这些文字一样真实，总会有那么一刻，这段代码会让你陷入困境，如果你在我的课堂上，我看到你不知所措、惊慌失措，我会走到你身边，提醒你注意大局观。在本章中，我会不断地让你回归大局观，简而言之，就是一个包含一个表格的故事板，表格中填充了许多城市名称。我们访问谷歌的服务器，获取每个城市的地理空间地址，当用户点击表格中列出的某个城市时，我们会沿着另一个转场（segue）跳转，该转场实例化一个`MapKit`，在该城市的中心放置一个图钉。

    - 章节大纲：第 10 章的预备知识非常少，因为我希望你能无缝地保持从第 9 章到第 10 章的势头。我将解释帮助文件和视频的位置，如何选择使用它们，以及它们与以前帮助文件的不同之处。

    - 不要放弃：第 10 章会考验你，我希望你能突破。听我说，没有人能一次完成第 10 章！你需要反复从头开始。事实上，重新开始是关键：在花一点时间调试之后，只需从头开始。请不要对自己说：“哦，我搞不定这个，看，我已经试了
    5 次了，还是过不去！”失败并重新开始是可以的，我真心希望你能够通过。我希望看到你去论坛告诉大家你通过了第 10 章！好吗？是的！


    注意：我注意到我的一些学生不能正确发音“segue”一词。以下是我从学生那里听到的一些令人惊叹的版本：“Seeg”、“Seg-you”、“Zeeyoo”、“Suh-goo-wee”，当然还有“Sega”，就像游戏机那样！真的吗！如果你还不知道，`Segue`的发音如下：`Seg-way`。这是我定义它的方式。由《梅里亚姆-韦伯斯特词典》定义的恰当且正确的方式如下：


    se·gue\ se-( )gwā, sā-\


    1 : 继续下面的内容而不停顿——作为音乐中的指示使用


    2 : 像前一个那样演奏接下来的音乐——作为音乐中的指示使用


    `SEGUE`的词源：意大利语，意为“接着”，来自`seguire`（跟随），源自拉丁语`sequi`——首次使用时间：约 1740 年。


    ## `myStory_02`：一个单视图应用


    在`myStory_02`中，我们将项目分为第 1 部分和第 2 部分。在第 1 部分中，我们使用故事板创建一个简单的表格，该表格由一个城市数组填充。列表的长度将是你拥有或编造的城市列表中的“数量”。当用户选择列表中的某个城市时，实际上什么也不会发生。然而，在继续之前，了解你的应用程序在此刻能够正常工作是很重要的。你可以通过查看图
    10-26 来先睹为快。然后，在第 2 部分中，我们将填充表格的城市列表发送到谷歌服务器，在那里我们解析服务器以获取每个城市的经度和纬度地址。我们存储这些地址，当用户选择一个城市时，我们通过转场从表格“跳转”到一个带有`UIMapKit`的视图，该视图会实例化一张地图，地图上有一个图钉落在城市中心。

