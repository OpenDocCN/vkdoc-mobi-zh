  \ 你将让第一个视图错误地加载图片。所以，我们现在就来编写代码。进入 `viewDidLoad` 方法，点击花括号之间开始编码，如图 8–19 所示。\n\n\
  一旦你打开了 `viewDidLoad`，将 `UIImage` 设置为 `PIC02`（回想一下，你已经在 Interface Builder 中将第一个视图设置为\
  \ `PIC01`），你想将内容（即图像）设置为按比例缩放至视图底部。这当然是一个错误，它将作为本例后面要追踪的 Bug。这个错误并不存在于我的应用的源代码中（你也没有在第\
  \ 6 章中插入它），因此我们可以通过比较文件来使用我的应用追踪问题。\n\n这个 Bug 不会生成错误，但它在运行时看起来会“不对劲”，只是足够奇怪，足以让你能够高效地找到你插入的\
  \ Bug 并将其更改为正确的代码。`viewDidLoad` 中的代码如下：\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n\n    [myImagesetImage:[UIImage imageNamed:@\"PIC02\"]];\n    [myImagesetContentMode:\
  \ UIViewContentModeScaleAspectFit;];\n}\n```\n\n那么，我们现在假装“你浑然不知”，`UIViewContentModeScaleAspectFit`\
