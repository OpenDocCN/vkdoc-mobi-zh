  \ Mobile Safari 这样看似复杂的操作，竟能被苹果公司浓缩成一个语句，这实在令人惊叹。那么，让我们剖析一下你刚才编写的代码，如图 图 6–29 所示。\n\
  \n在 iOS 中，所有应用程序都被沙盒化到系统资源的各自小块区域中。沙盒化这个主题非常复杂，可以（且已经）有专门的书籍论述，因此我在此不做详述。相反，你只需要理解\
  \ iOS 不会让你的应用为所欲为，因此你必须使用苹果提供的某些 API 来告诉底层系统代表你执行这些操作，这就足够了。\n\n在这个例子中，我们向 `UIApplication`\
  \ 类发送一条消息，以获取对 `sharedApplication` 的引用——这是一个代表你的应用程序通往系统其余部分网关的对象。这个对象有一个名为 `openURL`\
  \ 的方法，当向其传递一个 `NSURL` 实例时，它会精确地执行打开操作。\n\n为了向 `openURL` 传递一个 `NSURL` 实例，我们需要向 `NSURL`\
  \ 类发送 `URLWithString` 消息，它会透明地将你提供的字符串转换为一个 `NSURL` 实例。\n\n### 使用按钮\n\n是时候测试按钮了。\n\
