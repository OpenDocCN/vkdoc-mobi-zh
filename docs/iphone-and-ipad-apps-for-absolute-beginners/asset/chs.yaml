  \ 写入 `@property` 后，打开导航器。\n\n30\\. 现在我们需要输入用于合成的 `@property`，如 第 4 章 所述。你需要将三个 `IBOutlet`\
  \ 和数组通过包含 `(nonatomic, retain)` 指令的 `@property` 进行合成。回想 第 4 章 的内容：当我们设置可变性为非原子（nonatomic）时，我们实际上是在让\
  \ Apple 来处理！同时，retain 意味着在内存管理方面，我们将保持控制权。好了，现在在为你按钮输入的三个 `IBAction` 正上方写入以下代码，如\
  \ 图 5-30 所示。\n\n```\n@property (retain, nonatomic) UIImageView *myIcon;\n@property\
  \ (retain, nonatomic) UIImageView *myBackground;\n@property (retain, nonatomic)\
  \ NSArray *bgImages;\n@property (retain, nonatomic) UIButton *shrinkButton;\n```\n\
  \n完成这一步后，头文件的编码工作就结束了。在进入实现文件之前，我强烈建议你将头文件代码中的每个字符、空格、分号、空行和逗号都与我的代码仔细对照确认。确认无误后，我们再转向实现文件。好了，你的头文件最终应该如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n@interface touchesViewController : UIViewController\n\
  {\n\n IBOutlet UIImageView *myIcon;\n IBOutlet UIImageView *myBackground;\n IBOutlet\
  \ UIButton *shrinkButton;\n\nNSArray *bgImages;\n int currentBackground;\n bool\
  \ hasMoved;\n bool hasShrunk;\n\n CGAffineTransform translate;\n CGAffineTransform\
  \ size;\n UIButton *move;\n}\n\n@property (retain, nonatomic) UIImageView *myIcon;\n\
  @property (retain, nonatomic) UIImageView *myBackground;\n@property (retain, nonatomic)\
  \ NSArray *bgImages;\n@property (retain, nonatomic) UIButton *shrinkButton;\n- (IBAction)shrink:(id)sender;\n\
  - (IBAction)move:(id)sender;\n- (IBAction)change:(id)sender;\n\n@end\n```\n\n当你确信代码的每一行都与我的匹配后，就需要开始准备视图区域以进行大量编码。首先，打开导航器面板，该面板会出现在屏幕左侧的面板上，如\
  \ 图 5-30 所示。\n\n![images](img/00181.jpg)\n\n图 5-31. 打开导航器后，关闭助手编辑器并点击标准编辑器。\n\n\
  31\\. 我们不再需要同时查看 nib 文件和助手编辑器了。我们只需要足够的空间来编写实现文件。现在你已经打开了导航器，关闭助手编辑器并打开标准编辑器，如 图\
  \ 5-31 所示。然后，进入导航窗格，点击你的实现文件：`touchesViewController.m`。\n\n### 在实现文件中工作\n\n在本节中，我将教你如何完成前两个任务；其中一个需要在打开实现文件后立即执行。第一个任务是合成（synthesis），通常只需要编写一行代码。第二个任务是\
  \ `viewDidLoad` 方法，通常会自动实例化；但在更复杂的代码中，我们需要向 `viewDidLoad` 方法中添加代码，就像我们今天要做的那样。\n\
  \n#### 合成\n\n我一直强调，要鼓励学生和读者养成在头文件中编写 `@property` 指令后，立即在实现文件中进行合成的习惯。你可能已经注意到，无论是在\
  \ 第 4 章 还是本章中，我在头文件中编写的最后一段代码都是用于合成的 `@property` 指令。这是因为如果你养成了对头文件中刚刚编写的项目立即进行合成的习惯，你就完全不会忘记它——你无需浪费时间回头去回忆你要合成什么。\n\
  \n我们刚刚对 `myIcon`、`myBackground`、`bgImages` 和 `shrinkButton` 执行了 `@synthesize`。这就是我们打开头文件时首先需要合成的内容。以下是我的思考方式；这使得操作变得非常简单。\n\
  \n```\n  @implementation touchesViewController\n@synthesize   刚刚对其执行 @property 的项目\n\
  - (void)didReceiveMemoryWarning\n...\n...\n...  \n```\n\n现在，将这个思路应用到当前应用中，我们得到：\n\
  \n```\n  @implementation touchesViewController\n@synthesize  myIcon, myBackground,\
  \ bgImages, shrinkButton;\n- (void)didReceiveMemoryWarning\n...\n...\n...\n```\n\
  \n#### viewDidLoad\n\n`viewDidLoad` 方法中的代码在机器语言代码为你的视图在内存中预留一些空间后执行。你会注意到，在 `viewDidLoad`\
  \ 中首先调用的是它的父类方法 `[super viewDidLoad]`。在你感到紧张之前，请理解：就像老鼠是啮齿动物的子类一样，`viewDidLoad`\
  \ 是 `UIViewController` 的 `viewDidLoad` 方法的子类方法，所以 Apple 让 `viewDidLoad` 做的第一件事就是调用其父类中的所有代码。正是在这个精确的时刻，我们需要执行一些任务。\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n将所有按钮和背景设置为初始状态\n创建一个包含所有壁纸的数组\n\
  设置收缩按钮将噜噜水果图标缩小的量\n设置移动按钮将噜噜水果图标移动的量\n将背景图像设置为当前背景图像\n}\n```\n\n\n\n#### 将按钮和背景设置为起始状态\n\
  \n让我们来看看如何将所有按钮和背景设置为其起始状态。这是为了在程序开始运行前创建一个干净的状态。为了在代码中创建干净的状态，我们需要将状态改变变量设置为零（或设置为\
  \ `nil`）。我们有三个这样的变量来指示状态是否发生了变化：`hasMoved`、`hasShrunk` 和 `currentBackground`。请记住，`hasMoved`\
  \ 和 `hasShrunk` 都是布尔值，因此它们的值可以是 `YES` 或 `NO`。显然，它们的起始状态是尚未被移动过。因此，我们需要将 `hasMoved`\
  \ 和 `hasShrunk` 都设置为 `NO`。剩下的是 `currentBackground`，它负责追踪当前处于背景中且用户正在查看的是五张壁纸中的哪一张。回想一下，我们将\
  \ `currentBackground` 声明为整数类型。这很简单：我们只需将其设置为零。请参见以下加粗的代码：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    hasMoved = NO;\n    hasShrunk = NO;\n    currentBackground\
  \ = 0;\n\n    // 创建一个包含所有壁纸的数组\n    // 设置缩小按钮将“噜噜水果”图标缩小的程度\n    // 设置移动按钮将“噜噜水果”图标移动的程度\n\
  \    // 将背景图片设置为当前背景图片\n}\n```\n\n#### 创建包含所有壁纸的数组\n\n现在，我们需要创建一个数组（本质上是一个事物列表），并将我们的壁纸放入其中。用极客的说法来解释就是：“我们需要创建一个\
  \ `NSArray` 对象，并用一些类型为 png 的对象来初始化它”。这听起来不算太难理解，对吧？回想一下，我们确实在头文件中声明了这个数组。通常，学生们对数组感到非常畏惧，以至于在编写考试代码时会忘记声明它们。回想一下，我们在头文件中写了\
  \ `NSArray *bgImages`，所以我们声明了一个数组并把它命名为 `bgImages`。紧接着，我们知道需要编写 `bgImages = (让我们的数组活起来的东西)`。使用数组有很多复杂的方法，但我们将使用最朴素的……或者我应该说……使用\
  \ `NSArray` 初始化器的 Apple 方法。它们与工厂方法几乎相同，只是需要自己进行内存分配，形式如 `NSArray` 所示。\n\n```\n你的数组名称\
  \ = [[NSArray alloc] initWithObjects: @\"你的第一个对象\", @\"你的第二个对象\", @\"你的第三个对象\",\
  \ nil];\n```\n\n这看起来有点杂乱，所以看一下它的结尾，你会发现所有的对象都用逗号分隔开了；然后，我们在末尾加上那个 `nil` 来告诉数组它已经结束。让我们做两件事。首先，我们将数组的真实名称——`bgImages`——填入模板中，然后我们将逗号之间的内容放到单独的行中，看看这样是否更清晰。\n\
  \n```\nbgImages array = [[NSArray alloc] initWithObjects:\n    @\"你的第一个对象\",\n \
  \   @\"你的第二个对象\",\n    @\"你的第三个对象\",\n    nil];\n```\n\n很酷，对吧？！这个看起来有点吓人的代码，现在对你来说变得有意义了！耶！好吧，我们还没有完全完成。在让这个数组活起来之前，我们还需要做一件事。我们需要深入理解\
  \ `UIImage` 类引用，这是 Apple 的工程师编写的一个用于显示图片的对象。我们的对象是图片，但实际上，它们是包含图片的文件名。我们需要将 `UIImage`\
  \ 与一个名为 `imageNamed` 的方法一起使用，该方法返回与文件名相关联的图片对象。因此，对于每个文件名，我们需要使用 `UIImage imageNamed`。我已经在下面说明了这一点：\n\
  \n```\n你的数组名称 = [[NSArray alloc] initWithObjects:\n    [UIImage imageNamed:@\"WallPaper_01.png\"\
  ],\n    [UIImage imageNamed:@\"WallPaper_02.png\"],\n    [UIImage imageNamed:@\"\
  WallPaper_03.png\"],\n    [UIImage imageNamed:@\"WallPaper_04.png\"],\n    [UIImage\
