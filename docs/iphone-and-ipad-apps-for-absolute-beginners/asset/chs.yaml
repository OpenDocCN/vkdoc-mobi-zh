  \ fruit”图标通过`touches`函数移动的效果。\n\n### 深入代码\n\n通常，我会花时间深入分析我们之前快速浏览过的代码。然而，这一章的跨度很大，我觉得不能让你在自己输入代码时，还要回头翻看这一节才能理解发生了什么。至于更深层次地探究代码，其实也没什么可深挖的了——我们已经做得相当透彻了。在下一章中，我们将学习切换视图；我们会“快速”运行代码，然后再回到“深入代码”一节，看看我们实际做了什么。现在让我们结束这一章，让你的大脑休息一下。\n\
  \n#### 下一章内容\n\n在第 6 章中，我们将进入下一层级的复杂性：切换视图应用程序。我们将研究代码中的角色或角色团队如何协同工作，来引导一个结果或一系列结果，从而给用户带来流畅无缝的体验。\n\
  \n你将学习委托者和切换视图控制器、类和子类，以及“懒加载”。我们将深入探讨`.xib`文件的细节，研究内存释放的概念，并学习嵌入式代码注释。一切变得越来越奇妙……\n\
  \n继续下一章！\n\n## 第 6 章\n\n## 开关\n\n在完成第 5 章的`touches`应用后，你可以说已经能够毫不畏缩地编写 Objective-C\
  \ 应用了！如果你在编写第 5 章的代码时，感觉像是在艰难地跋涉一条崎岖不平的道路，那你并不孤单。我这么说，是因为所有程序员都经历过这条必经之路。如果你回顾那一章，心里想着自己已经不记得做过什么，这完全正常。是的，这很正常，我即将向你证明这一点。首先，我需要解释为什么你现在需要暂停一下。\n\
  \n根据我的经验，在教授 C、C++、C#、汇编语言、机器语言、Java 等语言时，许多学生即使看起来表现不错，也会中途放弃。近年来，我开始在学生接近这个转折点时抓住他们，问他们为什么考虑放弃。他们都会告诉我类似的话：“我知道我完成了作业，但我害怕会失败，因为知识就是没真正印在脑子里。我没有掌握它。”大约四年前，我做了一个实验。当学生们走进讲堂时，我让他们合上教科书、关上笔记本电脑、收起书本，他们都震惊了，因为我们要进行一次大脑内部之旅，上一堂神经学课。实际上，我们是要用科学方式说明，为什么很多人会觉得自己笨、学不会，感觉自己像个傻瓜！整个讲堂顿时笑声一片。在我现在称之为“别慌！让我们看看你的大脑！”的讲座结束时，一些学生哭了，课后他们找到我表示感谢。没有一个学生再中途退出。\n\
  \n现在我敢打赌，你觉得自己从第 5 章中什么都没记住，并且对自己的极客能力感到有点不知所措和不自信。嗯，这没关系——读下去，你就会明白为什么自己会感到有点不安。即使你现在感觉很自信，但随着难度增加，你在后面的某个阶段可能还是会感到犹豫，但我仍然希望你继续读下去。这很重要，所以我希望你能真正理解这一点。\n\
  \n\n\n### 别慌：来看看你的大脑！\n\n解释这个问题的最佳方式之一，是问你一个与 Objective-C 和计算机科学完全无关的问题。这关乎童年记忆。\n\
  \n你是否曾闻到一种从未闻过的气味，然后毫无预兆地，你的大脑瞬间将你带回了童年时代的某个地方？是的，我们都有过这种经历。闻到这种气味后，你会突然清晰地看到脑子里的一切：墙壁、人物——一切都无比清晰，有时甚至会让你情绪失控。你可能会感到震惊，因为多年来你从未想起过那些墙壁或画面，而现在它们却突然淹没了你的感官。让我来解释一下这是为什么。我将以我闻到老式肥皂的气味为例来说明，然后展示这与你刚刚建立的神经连接有何关联。\n\
  \n请看图 6–a。在第一个标题“ILLUSTRATION”下方，你会看到一个非常简化的示意图，展示了一旦你的大脑接收到一个它从未体验过的新输入，它就会在细胞体内创建一个细胞核来保存这一事件。这个细胞核通过神经线和轴突与你大脑的其余部分相连。当你经历与这个新事件相关的其他新事件时，一个由突触和神经元组成的树状结构就会连接到这个细胞核上。其中一些连接会变得非常丰富，我们称之为树突。\n\
  \n当我还是南非德班的一个小男孩时，我曾跑到佣人们洗衣服的地方。那是在 1963 年左右，大多数家庭都使用一种气味独特的老式氨皂。这种气味在我幼小的大脑中创建了一个新的细胞核。这个细胞核与祖鲁族佣人们手洗衣服时唱的欢快歌曲连接了起来。我的大脑还将墙壁、油漆和我的狗桑普森的画面连接了起来。这些关于歌声、墙壁、油漆和狗的连接，形成了与那种新气味相连的四组连接，如图\
  \ 6–a 中“SYNTHESIZED”部分所示。有些组从一开始就有更多的连接，比如歌曲组，因为我小时候经常唱很多祖鲁歌曲。第二大组很可能与我的狗有关。我按大小顺序将这四组标记为\
  \ 1 到 4。\n\n许多年后，在纽约市，大概是 1993 年左右，我匆匆赶去赴约，一位法学教授说他会在一家小餐馆与我共进午餐。当我跑过第八大道时，注意到一些人在另一家餐馆前清洁人行道。他们正用肥皂和水，拿着大草刷擦洗。突然，我闻到了那种气味。那是我三岁那年在洗衣房之后从未再闻到的气味。我猛然间看到了那些佣人，能听到他们的歌声和笑声，还能看到我的老狗桑普森。我被那一天、那些人、那久远的活力所淹没，情绪激动得停下了脚步，开始哭泣。当我到达餐馆时，穿着华美粗花呢西装的教授站在那里说：“罗里，晚了几分钟没关系。哦，天哪，你在哭吗？”\n\
  \n> ![图片](img/00192.jpg)\n\n*图 6–a. 别慌：来看看你的大脑。*\n\n那么，到底发生了什么？当你经历类似事件时会发生什么？为什么这种事情经常与气味有关？我们先来看看生活中的事件，比如你第一次意识到\
  \ `1 + 1 = 2` 的时候。你还记得第一次意识到 `1 + 1 = 2` 的情景吗？很可能不记得。这是因为在你创建了关联 `1 + 1 = 2` 的细胞核之后，已经有数万亿个连接通向\
  \ `1 + 1 = 2`。每次你执行任何与 `1 + 1 = 2` 相关的功能时，你的大脑都会与保存 `1 + 1 = 2` 的细胞核建立连接。甚至当你翻阅这本书，页码从\
  \ `page[n]` 变为 `page[n+1]` 时，你也会为与 `1 + 1` 相关的树突和关联组建立突触连接。在这数万亿个 `1 + 1 = 2` 的连接中，某个地方存储着你意识到这一点时那个房间的视觉和声音效果，但它们迷失在了其他数万亿个连接的迷宫中。\n\
  \n然而，那种罕见的气味则不同。想想看。我展示了与我三岁时那种气味相关的四组连接。在随后 30 年里，这个细胞核和与之相连的四组连接创建之后，再也没有建立过新的连接。它就那么静静地待在那里。但是，当我穿过第八大道闻到那种气味时，它立刻唤醒了同一个细胞核以及连接到那个事件的四组内容。这些连接非常**强**，因为它们没有与其他复杂关系交织在一起。这使得那些歌声、我对狗的感觉、笑声和其他事件如潮水般向我涌来。\n\
  \n现在，暂时回到你阅读第 5 章的时候。看看图 6–a 中“你此刻”的图示。当你阅读第 5 章时，你创建了一组细胞核。为了便于说明，我们假设你在阅读第 5 章时只学到了一件事或一个知识点。包含那个知识的细胞核位于浅灰色圆圈中。你最多可能只建立了一个与某个相关想法或概念的连接。这就是为什么我只连接了一个小组到第\
  \ 5 章的知识细胞核。更重要的是，注意我还创建了其他五个潜在连接组，可以连接到第 5 章：它们是“书的其他部分”、“解决问题”、“教给别人”、“现实生活应用”和“赚钱”。目前，这些组与第\
  \ 5 章的知识细胞核毫无连接，这是完全正常的，因为你还没有时间去创建这些连接。例如，现在，当你阅读本章时，你可能“感觉”自己与第 5 章学到的知识毫无关联。这是因为在你阅读本章时，与它没有连接。同时，通过第\
  \ 5 章学到的知识来赚钱，以及与其他组的连接也完全为零。\n\n\n\n我精心挑选主题、隐含语义和措辞，尽最大努力优化我当前所教内容与过去所教内容之间的连接。当你读完本书，创建第一个应用并成功在商店中销售时，你的大脑将开始为第\
  \ 5 章建立许多连接。在 GEEKDOM 下方的图 6-a 中我已对此进行了说明。将大量突触与包含难以理解概念的神经核连接起来的方式之一，就是**教导他人**。去论坛（比如我的论坛\
  \ `www.rorylewis.com/ipad_forum/` 或 `bit.ly/oLVwpY`）帮助新手解答问题（即使你自己也是新手）是非常棒的，因为这能为那个难懂的概念建立诸多连接，让你变得更聪明。本质上，帮助他人会迫使一个人用上千种不同的方式回答同一个问题。因此，我强烈鼓励你去论坛提问，并在你变得更有智慧后，再去帮助他人。\n\
  \n所以，第一个好消息是：如果你觉得与第 5 章中编写的代码缺乏连接感，这完全没问题。随着你继续学习，你会逐步建立这些连接。第二个好消息是：第 6 章不会像第\
  \ 5 章那样有巨大的跨度。相反，你将暂时从繁重的代码中抽身，把新想法与你之前在第 5 章中通过代码建立的突触连接起来。事实上，在第 6 章和第 7 章中，代码量会非常少！相反，我会将酷炫的新想法与你大脑中那些将代码与第\
  \ 5 章探讨的概念相关联的部分连接起来。一旦你在大脑中建立了这些连接，你将能关联更多的代码。在第 6 章中，你将探索一种使用“标签页应用程序”平台在 iPhone\
  \ 应用中导航的流行方法。但现在，请先放松并享受第 6 章：开关。\n\n### `switch:` 一个标签页应用\n\n到目前为止，你编写的代码允许用户通过特定方式点击或触摸\
  \ iPhone 或 iPad，使其执行有趣的操作。现在，情况将有所改变。在本章中，你将演示如何创建一个 iPhone 应用，在不让用户感到信息过载的情况下，通过将功能划分到几个易于定位的标签页中，来实现所有这些酷炫功能。这种被称为“标签页模型”的模式在应用开发者中非常流行，以至于\
  \ Apple 在 Xcode 的“新建项目”选项中包含了基本的标签页应用项目。换句话说，Apple 的员工认识到程序员有多么喜欢使用这种模式，因此他们为你创建了所需的大部分代码。当你完成这个应用的编写后，你将得到一个底部有两个标签页的显示界面。第一个标签页的内容将是一个你使用\
  \ Interface Builder 设置的图片，并在其上叠加一个按钮。点击此按钮将启动 Mobile Safari 并打开 Apress 出版公司的网站。第二个标签页的内容将是另一张不同的图片，但你可以在实现文件中设置图片名称和其他属性，并仅在\
  \ Interface Builder 中搭建足够的框架来实现这一点。\n\n#### 获取资源\n\n你可以观看视频，跟随那位充满活力、风趣迷人的博士生 Brian\
  \ Parks 一起编写这个开关应用，视频地址为 `bit.ly/mX4pkk`。你也可以在 `bit.ly/vBSKMa` 下载此项目的代码，以便将自己的代码与我的进行直观对比。最重要的是，你需要从\
  \ `bit.ly/tIYl9Y` 下载三张图片，或者使用与我相同的尺寸创建你自己的两张图片和一个图标：两张大图的尺寸为 320 × 480 像素，图标尺寸当然是\
  \ 57 × 57 像素。\n\n![images](img/00193.jpg)\n\n图 6-1\\. 将三张图片下载到你干净整洁的桌面上。\n\n1. 首先清理桌面，确保上面没有任何东西。然后，要么创建你的两张\
  \ 320 × 480 像素的图片（每个视图一张），以及一个 57 × 57 像素的图标，要么从 `bit.ly/vBSKMa` 下载本书和视频中使用的三张图片。如图\
  \ 6-1 所示。\n\n#### 创建应用\n\n现在让我们创建这个应用。\n\n![images](img/00194.jpg)\n\n图 6-2\\. 启动一个标签页应用。\n\
  \n2. 就像启动之前所有应用一样，使用 `⌘N` 新建一个项目。从出现的表单中选择“标签页应用”。该模板会为你搭建好标签页框架的大部分内容，这样你就可以专注于填充内容，而无需担心交互模型的繁琐细节。点击“下一步”。如图\
  \ 6-2 所示。\n\n![images](img/00195.jpg)\n\n图 6-3\\. 将应用命名为\"switch\"。\n\n3. 如图 6-3\
  \ 所示，将你的应用命名为“switch”，并确保两个复选框都未被选中。“使用故事板”会彻底改变标签页应用的设置方式，我们将在第 7 章中详细探讨。在这个应用中，你将专门针对\
  \ iPhone 进行开发，因为在 iPad 上使用标签页会显得笨重。\n\n\n好的，遵照您的要求，以下是翻译后的中文文档：\n\n\n#### 将图像添加到项目中\n\
  \n此时，建议您将要用在标签上的图像拖入项目，这样以后就不用再为这件事操心了。\n\n![images](img/00196.jpg)\n\n**图 6–4.**\
  \ 从桌面拖入您的 3 张图像。\n\n4. 将图像从桌面拖入`supporting files`文件夹，在这个过程中为自己培养一个好习惯。将图像放入文件夹后，会弹出一个对话框，如图\
  \ 6–5 所示。\n\n![images](img/00197.jpg)\n\n**图 6–5.** 将项目复制到目标页面的文件夹中。\n\n5. `Xcode`\
  \ 检测到这些图像尚未属于本项目，因此强烈建议您让它为您添加它们。如前所述，它还会确保将这些图像封装在自身内部，这样如果您在其他地方运行项目，它也能找到您的图像并显示出来。此对话框还允许您更改它即将执行的操作，但通常它所做的假设是正确的，因此请接受\
  \ `Xcode` 的建议，如图 6–5 所示。\n\n![images](img/00198.jpg)\n\n**图 6–6.** 将您的图标拖到应用的图标属性上。\n\
  \n6. 通常，您需要打开 `plist` 来包含图标。在这个应用中，您会看到一种将图标与应用关联起来的新方法。因此，将您的图标文件拖到应用的属性中。请注意 `Xcode`\
  \ 如何自动将其放在项目中的正确位置并设置所有必要的链接。如果您手头没有尺寸合适的 `.png` 文件，这一步并不是必须的。您可以稍后随时更改图标。请注意，它只允许您将正确尺寸的图标放入每个特定的框中。在\
  \ 图 6–6 中，您可以看到图标正被拖入应用的图标属性中。\n\n![images](img/00199.jpg)\n\n**图 6–7.** 警告您将图像放错了位置。\n\
  \n7. `Xcode` 会显示一条警告，提示它将把图标从其当前位置复制到“正确”的位置，这没问题。与之前的警告一样，只需接受 `Xcode` 的建议即可。当然，如果您把图像拖入了正确的文件夹，就不会看到这个警告。如图\
  \ 6–7 所示。\n\n#### 运行应用\n\n您知道吗，这本书的一些读者，以及我以前的一些学生，实际上就在苹果公司工作，编写 iOS 代码，做着您即将在这一步中看到的非常特别的事情。这就是为什么我喜欢说：“苹果公司那些聪明的人们已经编写了……”，因为这些苹果公司的聪明人里就包括像您一样，从这里开始，阅读本书第一版的人。现在，您可能只是想看看那些聪明人为\
  \ `Tabbed Application` 编写了些什么。\n\n![images](img/00200.jpg)\n\n**图 6–8.** 运行它，看看苹果已经为我们编写了什么。\n\
  \n8. 点击“运行”按钮或按下 `R` 键来运行应用，如图 6–8 所示。如果您忠实地遵循了说明，您将看到“构建成功”消息，并且 iOS 模拟器将启动。\n\n\
  ![images](img/00201.jpg)\n\n**图 6–9.** 首先弹出的视图将是……第一视图。\n\n9. 如图 6–9 所示，运行应用后，您将看到\
  \ iOS 模拟器弹出一个第一视图。这非常令人惊讶。苹果公司那些聪明的人们已经编写了大量核心代码和很酷的功能，留给您的工作所剩无几。继续，随意摆弄这个应用；点击那些标签，看看是否真的显示了两组不同的内容。请记住，您甚至还没有碰过\
  \ `.xib` 文件或任何代码！然而，这正是 `Tabbed Application` 模板神奇之处的终点，也是您发挥创意的起点。\n\n![images](img/00202.jpg)\n\
  \n**图 6–10.** 当您选择“第二个”标签时，第二视图出现。\n\n10. 当您按下屏幕底部的“第二个”标签时，您会看到“第二视图”弹出。所以这些标签确实工作得非常完美。我相信您会注意到，虽然\
  \ `Tabbed Application` 模板设置了很多内容并预填了一些内容，但它相当单调乏味。最重要的是，它没有反映出您可能希望它做的任何事情。让我们来修复这个问题。\n\
  \n#### 自定义标签\n\n您在 图 6–10 中看到的第二视图以及第一个介绍性视图，都可以被替换为代码、游戏的下一个关卡、地址标签或食谱的详细信息。出于您的目的，只需在第一视图中插入第一张图像，在第二视图中插入第二张图像。\n\
  \n![images](img/00203.jpg)\n\n**图 6–11.** 打开第一视图的 nib 文件。\n\n11. 切换回 Xcode 并点击“停止”按钮。选择名为\
  \ `FirstViewController.xib` 的 `.xib` 文件，如图 6–11 所示。这将显示您在 iOS 模拟器中看到的内容，只是没有标签栏上的实际标签。让我们设置好您的环境，以便更轻松地编辑\
  \ nib (`.xib`) 文件。如果您还没有显示实用工具视图，请点击相应的视图按钮使其在屏幕右侧显示。您现在不需要调试视图，因此可以将其隐藏。您目前也不需要导航器，但有些开发者（比如正在运行此视频的博士生\
  \ Brian）喜欢让它一直可见。这是您的选择。\n\n![images](img/00204.jpg)\n\n**图 6–12.** 删除 UILabels。\n\
  \n12. 要使用您自己的图像，您需要移除苹果提供的那些图像。依次点击每个 `UILabels`，并在选中它们时按 Delete 键将其删除。您的屏幕应该类似于\
  \ 图 6–12。许多标签确实有文本内容，但您的没有，因此这些 UI 元素是不必要的。这会让您得到一个空白的视图，在标准编辑器的左侧可以清晰地看到这一点。\n\n\
  ![images](img/00205.jpg)\n\n**图 6–13.** 将 UIImage 拖到您的视图上。\n\n13. 从实用工具视图底部的工具箱中，找到图像视图\
  \ (`UIImageView`) 图标并将其拖到主区域中。当您这样做时，它会扩展到与您可填充区域（在本例中为整个视图）相同的大小。使用参考线将 `UIImageView`\
  \ 与模拟 iPhone 窗口的边框对齐。如图 6–13 所示。\n\n![images](img/00206.jpg)\n\n**图 6–14.** 将您的第一个图像与第一个\
  \ UIImageView 关联起来。\n\n14. 在实用工具视图中，转到属性检查器 (`4`) 并点击图像下拉菜单，如图 6–14 所示。此列表填充了 Xcode\
