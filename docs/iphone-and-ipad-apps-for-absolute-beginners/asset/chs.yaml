  *   决定如何循序渐进，让你感到舒适，熟悉术语和流程，然后再进入故事板及其他更高级的概念。\n\n我解决这些问题的方法很简单。我会向你展示如何从你的 iPhone/iPad\
  \ 上，不是以一种、两种，而是以相当多的不同方式向世界说 Hello。每一次，我们都会更深入一点，而且我们会在这个过程中玩得很开心。\n\n每当你踏上通往 Xcode\
  \ 世界的道路时，你都会被立即问到想驾驶哪种类型的车辆。一辆吉普车？一辆赛车？一辆敞篷车？通过专注于基础知识，我将向你展示如何在 Xcode 中“驾驶”。此处的目标是，无论我们使用何种风格的“车辆”，都能获得胜任感和自信心。那么，让我们来看看这些不同的“车辆”究竟能提供些什么。在这里，我希望你跟着我一起看。\n\
