  \ 2-12.** 完成你的`ViewController`的头部文件。\n\n\n\n### 12. 按下回车键（![图片](img/00043.jpg)），你会看到\
  \ `-(IBAction)button:(id)sender;`，如下所示及图 2–12 所示。是的，我们将在本章末尾的“深入代码”部分详细讨论这一点。现在，让我们继续前进。\n\
  \n```\n#import <uikit/UIKit.h>\n@interface helloWorld_01ViewController : UIViewController\
  \ {\n    IBOutletUILabel *label;\n}\n- (IBAction)button:(id)sender;\n@end\n```\n\
  \n在进入第 13 步之前，我们需要环顾四周，看看我们目前所在的位置。还记得吗？在第 3 步中，我提到过我们有 2 个类，每个类包含两个文件（一个头文件（`.h`）和一个实现文件（`.m`））。让我稍微谈谈这两个文件的区别：一个带有\
  \ `.h` 后缀，另一个带有 `.m` 后缀。\n\n`ViewController` 管理你的代码与显示之间的交互，同时也管理用户与代码之间的交互。它包含一个视图，但其本身并不是视图。到目前为止，你对\
  \ `ViewController` 类只有最基本的了解。不过，我希望你明白的是，正如第 3 步所述，每个类都由两部分组成：头文件（`.h`）和实现文件（`.m`）。\n\
  \n接下来这部分我希望你大声读出来，就算你在书店里也别介意，好吗？“我们在头文件中告诉计算机，我们将在实现文件中执行哪些类型的命令。”现在，结合我们的代码再说一遍：“我们在\
  \ `helloWorld_01ViewController.h` 文件中告诉计算机，我们将在 `helloWorld_01ViewController.m`\
  \ 文件中执行哪些类型的命令。”\n\n嗯，承认吧——这没那么难！\n\n让我们回到例子：\n\n![图片](img/00054.jpg)\n\n**图 2–13.**\
  \ 切换到标准编辑器。\n\n### 13. 要从这里进入实现文件，请养成首先切换视图，从助理编辑器（还记得我们在步骤 2-7 中做的吗？）切换到标准编辑器的习惯。为此，请转到视图选择器左侧的编辑器选择器，点击标准编辑器，如图\
  \ 2–13 所示。\n\n![图片](img/00055.jpg)\n\n**图 2–14.** 打开你的 `helloWorld_01ViewController`\
  \ 的实现文件。\n\n### 14. 进入标准编辑器后，选择你的 `ViewController` 的实现文件，如图 2–14 所示。\n\n还记得在第 10\
  \ 步中，当我们按住 Control 键将按钮拖入头文件的代码时，我们“声明了一个动作”吗？记住，在头文件中我们“声明”动作，而在实现文件中我们“实现”动作。在\
  \ `ViewController` 的实现文件中，我们将实现当有人按下按钮时我们希望发生的动作。具体来说，我们希望标签显示“Hello World!”。“嗯，我们该怎么做呢？”你可能会问。好吧，我们需要输入你的第一行代码，开始你走向极客之路的旅程。没错，你将编写文本代码。深吸一口气，跟着做。\n\
  \n查看你的 `helloWorld_01ViewController` 实现文件的文本，我们看到苹果公司的聪明人在 Xcode 中已经预先编写了许多需要在后台运行的方法，以使你的带有标签和按钮的应用能够在你的\
  \ iPhone 上运行。目前，我们将忽略这些方法，从第一个名为 `dealloc`（负责释放内存）的方法开始，一直往下直到我们看到一个名为 `- (IBAction)button:(id)sender`\
  \ 的方法。嗯……等等，这不是在第 12 步中出现的代码吗？对吧？嗯，差不多。那段代码以分号“`;`”结尾，因为在头文件中，我们声明了这个动作。Xcode 知道我们现在需要在实现文件中实现这个动作，所以它为我们重写了它，不是作为声明，而是作为一个方法。它通过用花括号替换分号来实现这一点。你需要记住这个规则。你会反复用到它。\n\
  \n**注意：** 在 `.h` 文件中的声明，通过将分号替换为花括号，就成为了 `.m` 文件中的方法！\n\n在你找到了你在头文件中声明的动作的实现后，我希望你将光标放在两个花括号之间，如下方代码所示。点击那里并阅读下方内容。\n\
