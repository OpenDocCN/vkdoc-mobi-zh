  \ 连接到你的头文件。\n\n19. 通常，在过去，当我们达到这个节点时，我指示你直接盲目地开始将 Outlet 和 Action 通过 Control-drag\
  \ 拖拽到 `@directive` 中。然而，今天，我们将首先思考我们要做什么，从而在你的大脑中建立神经连接，以理解如何创建一个健壮的头文件。回顾过去你做过的事情，我曾使用以下非常宽泛的标准向你提供\
  \ Outlet 和 Action：\n\n*   Outlet：用于连接 nib 文件成员与 `UIImageViews` 代码（这是 Apple 的优秀工程师为我们编写的）。\n\
  *   Action：用于将你的按钮与我们在实现文件中编写的代码连接起来。\n\n> 现在，我们要成长并继续前进。还记得我提到过，当我们点击“Shrink”按钮时，它会缩小\
  \ lulu 水果图标，并且按钮内的文字会变为“Grow”；当我们再次按下该按钮时，它会使其变大吗？嗯，我们需要使用 Apple 编写的代码，这些代码允许我们做一些很酷的事情，比如更改按钮内的颜色、文本和其他外观。\n\
  \n> **注意**：Apple 提供的这段代码位于名为 `UIButton` 的类中。当我们使用这段代码时，可以说我们正在使用 `UIButton` 的一个实例。简而言之，我们需要为“Change”按钮创建一个\
  \ Outlet，以便我们可以将其中的文字从“Shrink”更改为“Grow”。\n\n> 当然，我们还需要为 lulu 水果图标以及用于容纳当前正在使用的 `WallPaper_0x.png`\
  \ 的背景创建一个 Outlet。因此，我们将需要三个 Outlet。在我们将三个 Outlet 通过 Control-drag 正确拖拽到 `@properties`\
  \ 指令中后，代码将类似于这样：\n\n```\nIBOutlet UIImageView *some variable name;\nIBOutlet UIImageView\
  \ *some variable name;\nIBOutlet UIButton *some variable name;\n```\n\n> 没错！我们需要为这些\
  \ Outlet 中的每一个赋予变量名。让我们为图标使用 `myIcon`，为背景使用 `myBackground`，为缩小 lulu 水果图标的按钮使用 `shrinkButton`。你可以使用不同的名称，但请之后再做。现在请跟随我的步骤，代码将如下所示：\n\
  \n```\nIBOutlet UIImageView *myIcon;\nIBOutlet UIImageView *myBackground;\nIBOutlet\
  \ UIButton *shrinkButton;\n```\n\n> 至于三个按钮的 Action，它们保持不变。我们仍然会为三个按钮设置三个 Action，位于\
  \ `@properties` 指令之后和之外，代码如下：\n\n```\n- (IBAction)some variable name:(id)sender;\n\
  - (IBAction)some variable name:(id)sender;\n- (IBAction)some variable name:(id)sender;\n\
  ```\n\n> 没错！我们需要为这些 Action 中的每一个赋予变量名。让我们为“Shrink”按钮使用 `shrink`，为“Move”按钮使用 `move`，为“Change”按钮使用\
  \ `change`。同样，你可以在此处使用不同的变量名，但现在请跟随我的步骤。代码将如下所示：\n\n```\n- (IBAction)shrink:(id)sender;\n\
  - (IBAction)move:(id)sender;\n- (IBAction)change:(id)sender;\n```\n\n> 好的！那么让我们开始吧！首先，如图\
