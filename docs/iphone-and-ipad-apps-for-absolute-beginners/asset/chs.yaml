  ### 理解 `IBOutlets`\n\n在之前的章节中，我们已经详细讨论过 `.m` 和 `.h` 扩展名。我们一直在做大多数 Cocoa 和 Objective-C\
  \ 程序员所做的事情——从编写头文件开始。用极客的话来说，你会说：“将对象拖到视图上后，我们打开了头文件，并通过控制拖拽将 `IBOutlets` 和 `IBActions`\
  \ 添加到了头文件中。”如果有人到论坛上问你如何解释，你可能会告诉他：“点击 `Classes` 文件中的展开三角形，然后打开扩展名为 `ViewController.h`\
  \ 的文件！”\n\n你已经编写过三个头文件了，因此应该已经习惯于快速浏览这部分代码。但这次我们要放慢脚步，思考一下我们到底在做什么。在之前的所有示例中，我们只需要使用一个\
  \ `IBOutlet`，它是一个允许我们与用户交互的东西。这个说法太初级了，让我们更具体、更技术化一点。让我们深入探讨 `IBOutlet` 的本质，这样当我们进入“深入代码”部分时，你就能真正理解它。\n\
  \n看看用粗体标出的代码，看看我们是否能够更深入地理解这些元素：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController\
  \ : UIViewController {\n\n    IBOutlet UILabel *label;\n    IBOutlet UIImageView\
  \ *Kant;\n}\n\n@property (nonatomic, retain) IBOutlet UILabel *label;\n@property\
  \ (nonatomic, retain) IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\
  \n@end\n```\n\n看第一行：\n\n```\n#import <UIKit/UIKit.h>\n```\n\n这使我们能够使用 `IBOutlet`\
  \ 关键字。我们用 `#import` 引入 `UIKit`，它是庞大的核心代码库（称为 `IPhoneRuntime`）中的用户界面（UI）框架，而 `IPhoneRuntime`\
  \ 是 Mac 上 OS X 操作系统的精简版本。当然，`IPhoneRuntime` 更小，以便能装进 iPhone 或 iPad。\n\n当我们引入 `UIKit`\
  \ 框架时，它使我们能够使用苹果已经为我们编写的大量代码——这些代码被称为类——其中就包括你已经使用过的、非常酷且流行的类：`IBOutlet`。`IBOutlet`\
  \ 关键字是一个特殊的指令，称为“实例变量”，它告诉 Interface Builder 显示你想要出现在用户 iPhone 或 iPad 上的项目。反过来，Interface\
  \ Builder 利用这些“提示”告诉编译器你将把对象连接到你的 `.xib` 文件。Interface Builder 并不会连接这些输出口，但它会告诉编译器你将添加它们。\n\
  \n整理一下我们即将使用的内容：1）楼梯的背景图片；2）康德的上层图像；3）他“返回”校园时会“说”的文本。在我们的练习中，我们将使用两个 `IBOutlets`——一个处理标签中的文本，即康德说的“Hello\
  \ World, I'm Back!”，另一个处理第二个视图，康德会在那里神奇地出现。\n\n了解了我们需要两个 `IBOutlets` 之后，我们可以想象它看起来会是什么样子。我们首先关注\
  \ `@interfacetestViewController : UIViewController` 后面的大括号内的内容。我们的代码需要如下所示：\n\n\
  ```\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController : UIViewController\
  \ {\n\nIBOutlet UILabel *label;\nIBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic,\
  \ retain) IBOutlet UILabel *label;\n@property (nonatomic, retain) IBOutlet UIImageView\
  \ *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n```\n\n如你所见，仅看粗体代码并假设你除了粗体代码之外没有编写任何其他代码，这些\
  \ `IBOutlets` 只是占位符；一个用于生成康德所说的文本，另一个用于生成叠加在背景上的图片。\n\n我们知道，当我们向 iPhone 或 iPad 屏幕输出文本时，会使用\
  \ `UILabel` 类。这个类用于绘制多行静态文本。因此，继续在你的第一个 `IBOutlet` 旁边输入 `UILabel`，如下代码所示。现在，考虑第二个\
  \ `IBOutlet` 需要什么。我们知道要叠加如图 4-03 所示的上层图像。这里的一个好主意是使用 `UIImageView` 类，因为它提供了苹果编写的代码，可以显示单张图像或一系列动画图像。说完这些，在你的第二个\
  \ `IBOutlet` 旁边输入 `UIImageView` 类：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
  \ helloWorld_04ViewController : UIViewController {\n\nIBOutlet UILabel *label;\n\
  \ IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic, retain) IBOutlet UILabel\
  \ *label;\n@property (nonatomic, retain) IBOutlet UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\
  \n@end\n```\n\n如你所见，现在我们说有两个 `IBOutlets` 就说得通了：\n\n- 我们让其中一个调用 `UILabel` 类来控制文本。\n\
  - 我们让另一个调用 `UIImageView` 类来控制第二张图像。\n\n\n\n### 指针\n\n既然我们已经掌握了将文本和图像推送到 iPhone/iPad\
  \ 屏幕上的方法，接下来就需要指定具体是哪些文本和图像。有时我们会使用苹果公司预先定义好的代码，这些代码通过引用或指向我们的资源（即文本和图像）来发挥作用。正如你开始意识到的，这就是我们使用指针的上下文。\n\
  \n在之前的例子中，我们告诉你不用去担心那个星号（`*`）。好吧，现在是时候来看看它了。让我们先集中注意力，了解一下这些（`*`）——指针——是如何工作的。我们需要一种间接的方法来将文本和图片放到屏幕上。之所以说“间接”，是因为你不会亲自编写代码来完成这个任务——而是会使用苹果公司的代码来获取它们。你会调用预先存在的类，然后这些类会调用你的文本和图像。这就是为什么我们说这是一种获取你内容的间接方式。\n\
  \n考虑一个简单的类比。假设你亲手逮捕了一名闯入你家的窃贼。你报警后，警察到达时，你指着罪犯说：“这就是小偷！”然后，由警察（而不是你）将罪犯带走并起诉。\n\n\
  现在，你想在 iPhone/iPad 上显示文本。你调用 `UILabel`，等它“到达”时，你指着你的文字说：“这就是文本。”然后，由 `UILabel`（而不是你）来处理这段文本。\n\
  \n同理，当你想在 iPhone/iPad 上显示图像时，你调用 `UIImageView`，等它“到达”时，你指着你的照片或图片说：“这就是图像。”然后，由\
  \ `UIImageView` 代码（而不是你）来处理这张图片。\n\n也许你正在问自己，这些指针的名字是什么，或者应该是什么。好消息是，你可以随意给它们命名。让我们将\
  \ `UILabel` 指向 `*label`，将 `UIImageView` 指向一个名为 `*Kant` 的指针。那么，再看看你刚刚写好的代码：\n\n```\n\
  #import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController : UIViewController\
  \ {\n\n    IBOutlet UILabel *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property\
  \ (nonatomic, retain) IBOutlet UILabel *label;\n@property (nonatomic, retain) IBOutlet\
  \ UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n```\n\n苹果公司一些聪明的人这样描述他们创建和编写\
  \ `IBOutlet` 的初衷：是为了向 Interface Builder 提供一个提示，告诉它在布置界面时应该“期望”做什么。\n\n- 一个 `IBOutlet`\
  \ 向 Interface Builder“耳语”：`UILabel` 类将使用 `*label` 指针所指示的文本。\n- 另一个 `IBOutlet` 向\
  \ Interface Builder“耳语”：`UIImageView` 类将使用 `*Kant` 指针所引用的图像。\n\n我们还没说完。在告诉 Interface\
  \ Builder 该期望什么之后，我们需要通过编译器告诉 Mac 的微处理器：一个重要的“事件”即将降临。编译器最关心的事情之一就是某个对象何时到达。这是因为对象是独立的数据和符号集合，它们会占用微处理器资源并对其提出重大需求，因此，作为程序员的你需要告诉处理器何时需要接收该对象并将其放入内存中的一个特殊位置。\n\
  \n对象可以有多种类型——在概念上可以像鸟、大师、足球和房子一样各不相同。因此，为了让处理器在需要时能够完成其工作，我们需要告知它：我们将要在代码中使用的每个对象都有两个特定且唯一的参数或特性：属性和类型。\n\
  \n别慌！提供这些信息其实很简单，只需要两步。\n\n第一步就是我们刚刚讲过的：通过定义对象的两个特定且唯一的特性（属性和类型），来预先告知编译器我们会用到哪些对象。第二步是这样的：当微处理器接收到这些数据时，它会通过综合处理（synthesizing）来利用这些信息。\n\
  \n- 首先，我们声明我们的对象拥有一个特定类型的属性。\n- 其次，我们指示计算机实施（或综合）这一信息。\n\n换句话说，我们通过声明对象（包括对其属性的具体描述参数）来告知编译器该对象的信息。然后，我们通过告诉编译器综合（synthesize）该对象，来授权它实施我们的对象。\n\
  \n但我们如何进行声明和实施呢？我们在代码中使用一种叫做指令（directives）的工具。我们通过在指令前加上 `@` 来发出信号。这意味着，要声明我们的对象拥有什么属性，我们可以在单词\
  \ `property` 前面加上 `@` 符号，使其成为一个属性指令：`@property`。\n\n当我们在代码中看到 `@property`，我们就知道它是一个属性指令。同样地，当我们想告诉编译器进行处理和综合，也就是对对象进行操作时，我们在综合语句前加上\
  \ `@` 符号：`@synthesize`。\n\n把我们刚才说的用“极客”语言重述一遍就是：\n\n- `@property` 指令声明我们的对象拥有一个特定类型的属性。\n\
  - `@synthesize` 指令实现在 `@property` 指令中声明的方法。\n\n很简单，是吧？好了，现在只剩最后两点，然后我们就回到代码部分。\n\
  \n\n\n#### 属性：管理与控制\n\n首先我想说明的是，我们还需要指定这个属性是只读还是可读写。换句话说，我们需要指定它是始终保持不变，还是可以变为新的内容。用行话来说，这叫做可变性。大多数情况下，我们将使用苹果代码来处理与对象相关的属性可变性。\n\
  \n为了指示苹果代码处理可变性属性，我们会将属性声明为 `nonatomic`。要合理运用这个术语，可以尝试将 `nonatomic` 与 `atomic` 进行对比。回想一下，`atomic`\
  \ 意味着强大，它暗示着能够进入微观世界并产生影响。因此，`nonatomic` 必然意味着不那么强大、更浅层且不可操控。\n\n如果我们将某个属性（如可变性）指定为\
  \ `nonatomic`，基本上是在说：“苹果，请帮我们处理可变性及相关问题——我真的不在乎。我相信你的处理！” 以后，你可能会想直接控制这个属性，届时可以将其指定为\
  \ `atomic`。不过现在，我们将采用更宽松的方式，让苹果处理微观事务。所以，当需要选择其中一种指定方式时，直接使用 `nonatomic` 即可！\n\n\
  关于这一点，我想做的第二个说明涉及内存管理。我们需要解决一个问题：当我们存储一个对象时，如何让 iPhone/iPad 知道它是只读还是可读写。换句话说，我们需要能够向计算机传达与对象相关联的内存的本质——即谁可以更改它、何时以及如何更改。一般来说，我们希望能控制这些信息，并将其掌握在自己手中——也就是保留它。随着你继续学习本书中的后续练习，我们会将代码控制在自己手中；我们将保留管理内存的权利。\n\
  \n我们可以将这些细节总结添加到属性指令中，以及如何修改代码，如下所示：\n\n*   `@property (nonatomic, retain)` 指令的含义如下：\n\
  \    *   可变性应为 `nonatomic`。苹果，请处理这个问题！\n    *   内存管理是我们想要 `retain` 的部分。我们将保持控制权。\n\
  *   `@synthesize` 指令用于实现我们在 `@property` 指令中声明的方法。\n\n我们还需要为这种组合增加一层复杂性。我们将这些指令添加在两个不同的文件中。我们在头文件中使用一条语句定义\
  \ `@property` 指令，然后在实现文件中使用 `@synthesize` 指令来实现它。\n\n*   头文件：`helloWorld_04_ViewController.h`\n\
  \n```objc\n@property (nonatomic, retain) //“我们的内容”\n```\n\n*   实现文件：`helloWorld_04_ViewController.m`\n\
  \n```objc\n@synthesize //我们在头文件的 @property 中定义的“我们的内容”。\n```\n\n我们需要为我们的两个 `IBOutlets`\
  \ 分别编写两个这样的指令：一个用于文本，另一个用于图片。此外，因为我们仍然在头文件中，所以在实现文件中合成时也需要重复这一步。好了，现在开始输入你的代码：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface helloWorld_04ViewController : UIViewController\
  \ {\n\n    IBOutlet UILabel *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property\
  \ (nonatomic, retain) IBOutlet UILabel *label;\n@property (nonatomic, retain) IBOutlet\
  \ UIImageView *Kant;\n\n- (IBAction)buttonGuess:(id)sender;\n\n@end\n```\n\n是的，为了解释\
  \ `@property (nonatomic, retain)` 这一句，似乎说了很多。不过请记住，我们正处于深入探讨的阶段……我们告诉计算机，我们希望苹果处理可变性，但我们希望保留对内存的控制权。稍后，我们将在实现文件中为这两个\
  \ `IBOutlets` 合成这些命令。\n\n`IBOutlets`？还记得它们吗？哦，对了——让我们回到程序的那部分。文本的 `IBOutlet` 是带指针\
  \ `*label` 的 `UILabel`，因此我们输入了如下代码来控制标签的文本：\n\n```objc\n#import <UIKit/UIKit.h>\n\
  \n@interface helloWorld_04ViewController : UIViewController {\n\n    IBOutlet UILabel\
  \ *label;\n    IBOutlet UIImageView *Kant;\n}\n\n@property (nonatomic, retain) IBOutlet\
