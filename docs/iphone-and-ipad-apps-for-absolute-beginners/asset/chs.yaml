  \ 文件中创建了八个指针。请注意，他额外增加了一个指针用于处理可能的未知列。\n\n```\nNSString *kCallSignCol          =\
  \ @\"Callsign\";\nNSString *kMsgURLCol            = @\"MsgURL\";\nNSString *kWxURLCol\
