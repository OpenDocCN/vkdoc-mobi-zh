- "# 第 11 章：故事板走向多媒体平台\n\n- myiTunes：主从应用程序\n- 预备工作\n- 一个新的主从模板\n- 引入图片！\n- 在故事板中组织弹出框\n\
  - 编写 myiTunes 应用\n- 编写 DetailViewController\n- 完成故事板\n- 结语\n\n- 索引\n\n## 前言：关于作者\n\
  \n\"我和罗里于 1983 年在洛杉矶相遇。他让我想起我最喜欢的电影角色之一，巴卡鲁·班萨——总是同时朝六个方向前进。如果你拦住他问他在做什么，他会回答得全面且细节惊人。他自律、丰富多彩且友善，拥有以简单、有机的方式解释高度抽象概念的奇特能力。他总是能达成设定的目标，并且也会帮助你做到同样的事情。\"\
  \n\n### 为何你会与刘易斯博士产生共鸣\n\n在雪城大学就读计算机工程专业时，罗里拼命地通过课程并赚取足够的钱来养活妻子和两个年幼的女儿。1990 年，他在\
  \ LC 史密斯工程学院找到了一份理想的校内工作，担任计算机实验室的监考员。尽管他在电气工程专业的课程中苦苦挣扎，但他始终坚守在服务台。这对罗里来说是一段令人生畏的经历，因为他的工作只是帮助同学解决计算机实验室设备相关的问题，但他总是发现同学们会问更深更难的问题：\"\
  哥们，你理解微积分作业了吗？能帮我一下吗？！\"\n\n![image](img/00003.jpg) 这些学生认为，既然罗里是监考员，他就知道答案。他既害怕又充满自我怀疑，于是寻求一种既能帮助他们又不暴露自己不足的方法。罗里学会了这样开始：\"\
  让我们回到基础。还记得上周教授为我们呈现的方程式吗……？\" 通过回归基本原理，重新阐述并重新包装它们，罗里开始发展出一种技巧，这种方法往往能引导出可行的解决方案。到了大四那年，每逢罗里值班的夜晚，服务台前常常排起一队学生等待帮助。\n\
  \n\n\n### 时光飞梭十七载\n\n想象一位长发飘飘、不拘一格的教授，身穿复古与随性碰撞的醒目装扮，行走在科罗拉多大学科罗拉多斯普林斯分校的校园里。当他走进工程楼时，迎接他的是学生们和教职员工，他们微笑着热情打招呼，同时大概仍会对他那身花呢夹克、感恩而死乐队的\
  \ T 恤、卡其裤和人字拖暗自摇头。当他沿着计算机科学系的走廊走去时，办公室门外已排着一队学生。这情景让人想起早年他在计算机实验室担任监考员时，求助台前等候的那排学生。他们转身向他打招呼：“早安，刘易斯博士！”这些科罗拉多大学斯普林斯分校的学生中，许多人甚至不是他班上的，但他们知道刘易斯博士无论如何都会见他们并提供帮助。\n\
  \n### 过去—现在—未来\n\n刘易斯博士拥有三个学位。他获得了雪城大学计算机工程理学学士学位。雪城大学的 LC 史密斯工程学院是全美顶尖学院之一，英特尔、AMD\
  \ 和微软都会派遣顶尖员工来此攻读博士学位。\n\n完成学士学业（主攻微处理器电子电路的数学）后，他穿过校园广场，进入雪城大学法学院。在法学院第一个暑假，全国最具影响力的律师事务所富布莱特与贾沃斯基招募罗里到其奥斯汀办公室工作，那里的一些律师专门从事高科技知识产权专利诉讼。作为实习工作的一部分，刘易斯参与了著名的\
  \ AMD 诉英特尔案，协助资深合伙人评估微处理器电路算法的数学原理。\n\n在法学院第二个暑假，同样参与 AMD 诉英特尔案的另一家律师事务所——斯凯尔文、莫里尔、麦克弗森、富兰克林与弗里尔——邀请罗里到其在硅谷的分支机构（圣何塞和旧金山）工作。在沉浸于法律领域数年并获得雪城大学法学博士学位后，刘易斯意识到自己的热情在于计算机数学，而非硬件和软件的法律纠纷。他更喜欢学习和创造的环境，而非法律中固有的争论与对抗。\n\
  \n离开学术界三年后，罗里·刘易斯南下北卡罗来纳大学夏洛特分校攻读计算机科学博士学位。在那里，他师从兹比格涅夫·W·拉斯博士，这位学者以其在数据挖掘算法与方法、分布式数据挖掘、本体论和多媒体数据库领域的创新享誉全球。攻读博士学位期间，刘易斯为计算机工程本科生教授计算机科学课程，并为\
  \ MBA 学生讲授电子商务和编程课程。\n\n获得计算机科学博士学位后，罗里接受了科罗拉多大学科罗拉多斯普林斯分校计算机科学的终身轨教职，他的研究方向是神经科学的计算数学。最近，他与人合著了一份关于下丘脑相关癫痫起源数学分析的资助申请书。然而，随着苹果革命性的\
  \ iPhone 及其独特灵活的平台——以及微型应用、游戏和个人计算工具的市场——的兴起，他变得兴奋不已，开始为了个人乐趣进行实验和编程。在熟练掌握后，刘易斯认为自己可以开设一门包括非工科学生在内的\
  \ iPhone 应用课程。凭借作为 iPhone 测试版测试员的内部知识，他甚至早在 2010 年 4 月官方发布之前，就将拟议的 iPad 平台参数整合到了教学计划中。\n\
  \n这门课程取得了巨大成功，来自学生和同事的反馈都极为积极。当被问及是否愿意将课程改编成书由 Apress 出版时，刘易斯博士欣然抓住了这个机会。他愉快地接受了将其课程大纲、课堂笔记和视频转化为您手中这本书的邀请。\n\
  \n### 为何撰写此书？\n\n刘易斯博士撰写此书的原因，与他最初决定为工科和非工科专业开设课程的原因相同：挑战与乐趣！据刘易斯所言，iPhone 和 iPad\
  \ 是“……有史以来最酷、最强大、技术最先进的工具之一——句号！”\n\n令他着迷的是，在那些高分辨率图像和有趣小图标构成、吸引人的触摸屏之下，iPhone 和\
  \ iPad 是用 Objective-C 这一极其困难和先进的编程语言编写的。越来越多的学生和同事找到刘易斯，想为 iPhone 编写应用程序并征求他的意见。似乎每次\
  \ iPhone 更新，更不用说 iPad 扩展界面的问世，都对编程应用兴趣的闸门越开越宽。精彩而创新的想法只是需要一个合适的渠道，将其转化为适当的格式，然后推向世界。\n\
  \n然而，一般来说，撰写 Objective-C 书籍的人的目标读者是那些精通 Java、C#或 C++的人。因此，由于似乎没有为那些虽有绝佳的 iPhone/iPad\
  \ 应用点子却资质平平的普通人提供帮助，刘易斯博士决定开设这样一门课程。他意识到，明智的做法是前半学期使用自己的笔记，然后探索能找到的最佳现有资源。\n\n在他推进这个计划时，最令他印象深刻的是《Beginning\
  \ iPhone 3 Development: Exploring the iPhone SDK》这本书。这本 Apress 出版的畅销教程由戴夫·马克和杰夫·拉马尔什撰写。刘易斯得出结论，他们的书为他的课程提供了一个极好的高层次目标……一种通往全面、流畅地为所有苹果多点触控设备编程的“垫脚石”方法。\n\
  \n在刘易斯博士的课程成功讲授之后，在与 Apress 代表的一次后续谈话中，刘易斯偶然提到，直到学期中段他才开始使用那本书，因为他必须先让非工科学生跟上进度。编辑建议将他的笔记和大纲改编成一本入门指南——一本面向技术要求较低的编程人群的导论性书籍。从那时起，剩下的只是时间和细节问题——比如整理和修订刘易斯博士广受欢迎的教学视频，让其他渴望自己编写\
  \ iPhone 和/或 iPad 应用的、非工科背景的人们也能获取。\n\n所以，这就是一位不拘一格的教授如何写出这本书的故事。我们希望您能受到鼓舞，把它带回家并开始行动。用这些知识武装自己，从此刻开始改变您的生活吧！\n\
  \n本·伊斯顿\n作者、教师、编辑\n\n\n\n## 关于合著作者\n\n![image](img/00004.jpg)本·伊斯顿毕业于华盛顿与李大学，获哲学学士学位。他涉猎广泛，涵盖音乐、银行业、帆船运动、悬挂式滑翔和零售业。他的大部分工作经历都与某种形式的教育相关。本曾执教\
  \ 17 年，主要教授初中数学。最近，作为软件培训师和实施顾问的经历重新唤醒了他长久以来对技术领域的热情。作为一名自由撰稿人，他撰写过多篇科幻故事和剧本，以及为杂志和通讯供稿的特写文章。本现居德克萨斯州奥斯汀市，目前正在创作他的第一部小说。\n\
  \n![image](img/00005.jpg)布赖恩·帕克斯，计算机科学博士生，与硕士生安东尼·马吉在科罗拉多大学科罗拉多斯普林斯分校（UCCS）与刘易斯博士合作，协助研究了测试版\
  \ Xcode 的多个版本。\n\n布赖恩是科罗拉多大学科罗拉多斯普林斯分校计算机科学博士项目的学生，期间常与特伦斯·博尔特博士和罗里·刘易斯博士合作。他在宾夕法尼亚州利哈伊大学获得计算机科学学士学位。布赖恩专精于软件设计与开发技术，尤其关注软件工程与架构，特别是数据驱动型应用。同时，他也是一位教育者和学者，专注于软件工程与设计，以及近期研究的计算机组成和汇编语言编程，其研究重心是计算机视觉及其与心理学视觉理论的关联。\n\
  \n安东尼目前在科罗拉多大学科罗拉多斯普林斯分校攻读计算机科学硕士学位（即将完成），他也在该校获得了学士学位。安东尼在软件设计与开发方面经验丰富，并在其职业生涯中主导了多款软件应用的实施与发布。因学术及个人兴趣，他专攻多个领域，包括理论与应用数学、软件设计、用户界面设计、计算机科学教育、计算机视觉等，且涉猎范围仍在不断扩展。\n\
  \n布赖恩和安东尼是 Synapse Software 的管理合伙人。\n\n## 关于技术审稿人\n\n![image](img/00006.jpg)马修·诺特是一名学习平台开发人员及\
  \ SharePoint 专家。他从小就开始编程，此后从未停止学习。作为一名经验丰富的 C 和 C#开发者，马修最近开始开发 iOS 应用以推动学习平台的移动化。他与妻子、两个孩子居住在英国威尔士，并时常在自己的博客（`mattknott.com`）上撰写文章。\n\
  \n## 序言\n\n### 本书能为你带来什么\n\n直说吧：你想学习如何为 iPhone 或 iPad 编程，并且自认为相当聪明——但每当你阅读计算机代码或高度技术性的指导说明时，你的大脑似乎就停摆了。阅读晦涩难懂的指令时，你是否会两眼发直？是否有个声音在脑中责备你：“怎么样！你的大脑六行前就关机了，但你还在假装浏览页面——假装自己不像感觉的那么迟钝。真棒！”\n\
  \n看看你是否能感同身受……你遇到了一个相当技术性的问题，决定用谷歌搜索并排除故障。你打开排名第一的结果，发现别人也问了完全相同的问题！页面加载时你兴奋起来，但，唉，那只是一个论坛（一个让那些用难以理解的代码互相交谈的极客们的聊天站点）。你看到你的问题后面跟着……但为时已晚！你的大脑已经停摆，你感到紧张和沮丧，仿佛肚里打了结。\n\
  \n### 听起来很熟悉？\n\n是吧？那么这本书就是为你准备的！我猜你现在可能站在书店或机场，浏览着报刊亭，想找点能让你兴奋的东西。因为你是在这种高档场所读到这里，所以你可能买得起\
  \ iPhone、Mac、汽车和机票。你或许正被手持设备这个蓬勃发展的行业，以及内存和微处理器呈几何级数进化的速度所吸引……被“想法如何能迅速转化为全新的计算平台、强大的软件应用、实用的工具和巧妙的游戏……甚至转化为金钱”所吸引。现在，你正想知道自己是否能参与其中——运用你的才智和技术悟性为大众服务。\n\
  \n### 我如何知道这些关于你的事？\n\n很简单！经过多年教授学生编程的经验，我知道如果你还在这里读下去，那么你既足够聪明，又有足够的动力踏入编程领域，尤其是为了像\
  \ iPhone 这样迷人、或像 iPad 这样性感的设备编程。如果你对上文描述的那个人有认同感和关联感，那么我了解你。我们很久以前就已经互相认识了。\n\n\
  你是一个聪明人，即使你有一定的编程背景，在阅读复杂代码时也可能会头脑抽搐。而且，即使你在各种编程语言方面有相当扎实的基础，你也是一个只想寻求一种简单、精准、无虚饰的策略来学习如何为\
  \ iPhone 和 iPad 编程的人。没问题！我能引导你走出你通常经历的各种心理障碍，并帮助你绕开任何（无论真实或想象中的）技术障碍。我已经对我的学生这样做过上千次了，我的方法对你也会有效。\n\
  \n### 我采用的方法\n\n我不会试图解释每一个微小的细节。我也不会期望你在现阶段就知道 iPhone/iPad 应用中的每一行代码。我要做的是，一步一步地向你展示如何实现关键操作。我的方法既全面又轻松，并且我为自己能够指导知识基础和技能水平跨度极大的学生与有兴趣的学习者而感到自豪。\n\
  \n本质上，我会带领你，按照你自己的节奏，到达一个你能编码、上传、或许还能出售你的第一个 iPhone/iPad 应用（无论简单还是复杂）的程度。好消息是：下载量最大的应用并不复杂。最受欢迎的是那些简单、实用的生活工具……比如在停车场找到你的车、制作更好的购物清单、或追踪你的健身进展。不过，当你完成本书的学习后，你可能想要进阶到\
  \ Apress 和 Friends of ED 系列的其他书籍。你在这里有很多选择，在后面的路途中，我会就最佳的前进方向给你建议。但现在，你可能想多了解我一点，以便有信心让我担任你在这个激动人心的应用冒险中的引路人。\n\
  \n愿你进入这个神奇而美妙的世界时，体验到巨大的喜悦与成功。\n\n和平！\n\n![image](img/00007.jpg)\n\n罗里·A·刘易斯博士，法学博士\n\
  \n## 第 1 章\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您的要求，完成以下翻译任务。\n\n\n## 开始之前\n\n本章绪论将确保您拥有完整且自信地阅读本书所需的所有工具和配件。有些人可能已经将\
  \ `Xcode`、最新的 iOS 模拟器和 `Interface Builder` 安装到了您的 Mac 上，并且您可能认为，既然在这些方面已经准备就绪，就可以直接开始了。如果是这样，您可能想直接跳到\
  \ 第 2 章，立即开始您的第一个程序。\n\n不过，理解我为何讲解某些内容而跳过其他内容，对您来说仍将大有裨益。对于那些从未用 Objective-C 编程过的人来说，这相当具有挑战性——即使是对我那些懂\
  \ Java、C 和 C# 的工程专业学生也是如此。尽管如此，只要有适当的准备和心态，您就能完成 Objective-C 的编程任务。\n\n所以——我恳请您继续读下去。您在本章投入的时间，将在内心的平静和自信方面得到超值的回报。\
  \ 第 1 章 将有助于构建您大脑对即将到来的丰富内容的存储方式。\n\n### 必需品与配件\n\n为了能够为 iPhone 和/或 iPad 编程，并跟随本书的练习、教程和示例进行操作，您需要满足\
  \ 5 个最低要求。您现在可能无法完全理解它们，但没关系——请先跟着我走一遍。我们会在这些步骤中解释一切。简而言之，这 5 个要求是：\n\n*   一台 Mac\n\
  *   适合您 Mac 的正确操作系统，称为“OS X”\n*   注册为开发者（下文详述）\n*   适合您 iPhone 的正确操作系统，称为 iOS\n\
  *   适合您 iPhone 的正确软件开发工具包，称为 SDK，它运行一个名为 `Xcode` 的程序。\n\n让我们更详细地讨论其中一些要求。\n\n首先，您将需要一台基于\
  \ Intel 的 Macintosh，运行 Lion（OS X 10.7.2 或更高版本）。如果您的系统是在 2006 年之后购买的，就没问题。我特意在一台\
  \ 2006 年购买的 MacBook 上编写了所有程序。网上的所有视频都是在我的 2006 年 MacBook 上录制的屏幕录像，或者如果我使用 2010 年的\
  \ iMac 进行广播，我会首先在我的 2006 年 MacBook 上运行它。您并不需要最新款的 Mac。如果您还没有购买，我建议您购买一台基础款、无多余功能的\
  \ MacBook Air。如果您确实拥有一台较老的 Mac，那么您可能可以添加一些 RAM。请在 Apple Store 的 Genius Bar 预约，并要求他们尽可能增加\
  \ RAM。同时，明确地问他们：“这台旧电脑能至少运行 Lion 10.7.2、iOS5 和 Xcode 4.2 或更高版本吗？”\n\n如果您没有 Mac，请记住，如前所述，我特意选择在\
  \ Apple 最小、最便宜的型号——MacBook 上编写和运行本书中的每一个程序。Apple 已经停产了 MacBook；他们现在销售售价 999 美元的\
  \ MacBook Air，这比作者的 MacBook 更先进。您可以在 eBay 或其他类似网站上购买 MacBook。请参见 图 1–1。\n\n> ![images](img/00008.jpg)\n\
  >\n> 图 1–1。我使用市场上最便宜的 2006 年 Mac——MacBook，来执行本书中的所有编码和编译工作。本质上，完全没有必要购买更贵或更高端的 Mac\
  \ 来完成所有的练习。\n\n其次，您需要正确的 OS X。在我撰写本文时，它是 OS X 10.7.2。我们需要确保您的 Mac 中安装了最新、最好的操作系统（OS\
  \ X）。我无法告诉您有多少封电子邮件和论坛问题显示，你们中许多人会想：“啊哈，我的代码可能没有正确编译，因为 Dr. Lewis 的机器上有不同的 OS X\
  \ 或/和 iOS……”\n\n**注意**：运行您电脑的操作系统（OS X）与 iPhone/iPad 操作系统（通常称为“iOS”）不同。即使您认为一切都已经是最新的，我建议您跟我一起确认您的系统拥有最新的\
  \ OS X 和最新的 iOS。当您跟着我学习并处理我在本书中教您的所有程序时，有时您的代码在第一次运行时不会工作。实际上，大多数时候，您的代码在第一次运行时（或者用我们这些极客的话说，“编译它”时）都不会工作。所以！我们现在就来处理这个问题。\n\
  \n关闭您 Mac 上运行的所有程序，以便唯一运行的程序是“Finder”。点击位于 Mac 左上角的小苹果图标，然后选择“关于本机”，如 图 1–2 所示。\n\
  \n![images](img/00009.jpg)\n\n图 1–2。进入您的桌面，点击苹果图标，然后选择“关于本机”。\n\n选择此项后，您将看到一个名为“关于本机”的窗口，如\
  \ 图 1–3 所示。\n\n![images](img/00010.jpg)\n\n\n  \n图 1–3. “关于本机”窗口与 Xcode 版本窗口。此处可见我的\
  \ MacBook 运行的是 OS X 10.7.2。本章稍后会讨论 iOS。如果你已安装 Xcode（或在安装 Xcode 后），在“Xcode”下点击“关于\
  \ Xcode”，即可查看当前运行的版本（如右侧所示）。\n\n再次说明，我使用的是 OS X 10.7.2，这也是本书所用的操作系统。当你阅读本书时，系统版本很可能已升级至更高版本。这里你需要牢记两点：首先，你需要将系统更新至最新的\
  \ OS X（如下所示）；其次，你需要访问本书的在线论坛，了解新版本 OS X 中可能影响本书内容的变动。那么，接下来我们来看看如何将系统更新至最新的 OS X。\n\
  \n在关闭除“访达”以外的所有程序后，返回 Mac 屏幕左上角的苹果图标，选择“软件更新...”，如图 1-4 所示。接着，按照提示和四个屏幕指引操作，如图 1-5\
  \ 所示。\n\n![images](img/00011.jpg)\n\n图 1–4. 进入桌面，点击苹果图标，选择“软件更新...”\n\n![images](img/00012.jpg)\n\
  \n图 1–5. 从上至下依次为：检查新软件；选择下载新软件的选项；等待新软件下载完成；选择“重新启动”以让 Mac 正确安装新软件。\n\n如果你在阅读本书时发现\
  \ OS X 和/或 iOS 的截图已显过时，请不要慌张。我设立了一个常驻在线论坛，我和许多志愿者都乐于在此提供帮助。我们会持续更新论坛，发布有关 OS X 和\
  \ iOS 最新版本的消息。请访问论坛：[`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)\
  \ 或 `bit.ly/oLVwpY`。参见图 1-20。\n\n第三，你需要通过 iPhone/iPad 软件开发工具包（SDK）注册成为开发者，并下载 Xcode。如果你是学生，你的教授很可能已代为处理此事，你可能已在教授名下注册。如果不是学生，则需要按以下编号步骤进行注册。\n\
  \n注意：即使你完全不想成为开发者，仍可随购买 Lion 系统一同下载 Xcode，或在 Mac 应用商店购买。我还没见过有学生能坚持使用替代方案超过一周。支付\
  \ 100 美元后，你将获得 Apple 开发者工具包、教程、示例代码和帮助论坛的访问权限，并获得在实体 iPhone 或 iPad 上运行应用的授权许可。最后，你阅读本书是为了制作应用并在\
  \ iTunes Store 上销售赚钱——仅此一项你就需要支付这 100 美元。购买 Mac、Xcode 和本书，却不购买这 100 美元的注册许可，就像花钱学开车、买了车，却从未取得驾照一样。我在本书中教授你使用的许多调试工具都假定你拥有许可。这是你的选择。\n\
