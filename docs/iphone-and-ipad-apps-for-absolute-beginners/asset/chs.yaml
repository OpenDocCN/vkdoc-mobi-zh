  **图 2-10.** 从你的按钮进行`Control`-拖动以创建一个`Action`。\n\n10. 现在我们需要在我们拖到画布上的按钮后面放置一些代码，这样它才能执行我们想要它做的“操作”。在我们的例子中，我们希望按钮告诉我们在第\
  \ 9 步中连接的标签显示内容。我们称之为“声明一个`action`”。现在，我们只需要将按钮与操作代码关联起来；稍后我们将定义这些操作具体是什么。因此，就像我们对标签所做的那样，点击画布上的按钮，然后从按钮按住`Control`键拖动到闭合大括号的正下方，如图\
