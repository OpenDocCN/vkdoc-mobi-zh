  \ `IBOutlet` 的 `UIWebView` 对象加载您的请求。以下是实现文件和头文件的代码。请仔细研究，确保您理解两个文件中 `webView` 的关联关系。\n\
  \n```\n// Header:\n\n#import <UIKit/UIKit.h>\n@interface UberView : UIViewController\
  \ {\n    UIWebView *webView;\n}\n\n@property (nonatomic, strong) IBOutlet UIWebView\
  \ *webView;\n\n@end\n\n// Implementation Files:\n#import \"UberView.h\"\n\n@implementation\
  \ UberView\n@synthesize webView;\n\n- (id)initWithNibName:(NSString *)nibNameOrNil\
  \ bundle:(NSBundle *)nibBundleOrNil\n{\n    self = [super initWithNibName:nibNameOrNil\
  \ bundle:nibBundleOrNil];\n    if (self) {\n        // Custom initialization\n \
  \   }\n    return self;\n}\n\n- (void)didReceiveMemoryWarning\n{\n    // Releases\
  \ the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
  \n    // Release any cached data, images, etc that aren't in use.\n}\n\n#pragma\
  \ mark - View lifecycle\n\n/*\n// Implement loadView to create a view hierarchy\
  \ programmatically, without using a nib.\n- (void)loadView\n{\n}\n*/\n\n// Implement\
  \ viewDidLoad to do additional setup after loading the view, typically from a nib.\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    NSURLRequest* request =\
  \ [NSURLRequest requestWithURL:[NSURL URLWithString:@\"http://www.synapsesoftware.net/about/two.html\"\
  ]];\n    [self.webView loadRequest:request];\n}\n\n- (void)viewDidUnload\n{\n  \
  \  [self setWebView:nil];\n    [super viewDidUnload];\n    // Release any retained\
  \ subviews of the main view.\n    // e.g. self.myOutlet = nil;\n}\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
  {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
  \ == UIInterfaceOrientationPortrait);\n}\n\n@end\n```\n\n![images](img/00301.jpg)\n\
