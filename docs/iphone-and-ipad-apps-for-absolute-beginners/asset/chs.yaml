- "# 调试\n\n当你开始学习第八章时，你将在一个更高的层次上运作。你可能会注意到，在这一章中，我采用了不同的方法来教你调试。为了让你理解为什么这是一章重要的内容，我希望你回顾一下促使我编写本章及其练习的历程。\n\
  \n那么，调试到底有什么难的？\n\n1988 年，在波兹曼的蒙大拿大学，我迎来了人生中的第一堂计算机科学课。偶尔走出电气工程大楼，去软件领域小试牛刀，感觉很有趣。我们常常会冲过去——有时是在零下\
  \ 20 度的刺骨寒风和令人目眩的暴雪中——穿过校园广场，到达计算机科学楼。在我学习 Pascal（一门古老的语言，我们曾用来配合 FORTRAN 学习，以便最终掌握\
  \ C 编程语言，这在波兹曼对所有极客来说是必须掌握的）的课堂上，发生了一件奇妙的事。\n\n我当时正试着编译一个课堂练习。但那天，每次我尝试编译代码时，黑屏上那些发着绿光的数字都会显示错误信息。在那个年代，它不会提示发生了多少个错误，也不会告诉你错误是什么或在哪里。它只会说：“错误：编译失败。”\
  \ 我无法修复它，于是我对计算机科学的热爱开始急剧下滑。看到我如此沮丧，助教立刻走到教室前面，用尖锐而响亮的声音引起了所有人的注意，并宣布：\n\n> 听着，同学们。我不想看到你们像那边的罗里一样变得奇怪和沮丧。你们的代码永远不可能第一次就编译成功！！听到没有？你们的代码永远不可能第一次就编译成功，所以，接受这个事实吧！\n\
  \n我永远不会忘记那一刻——尤其是现在，我看到那么多年轻的计算机科学和工程系学生在大一学年，就在遇到调试和数组问题时退学了。\n\n我还记得一件事，小时候在我出生的地方——南非德班，我叔叔告诉我的。当时他正在教我如何在汹涌危险的海浪中冲浪。他说，如果我想驾驭十到二十英尺的海浪，首先必须学会如何“被浪打翻”。\n\
  \n> 罗里……你一定会被浪打翻。你一定会被按在水下 15 到 20 秒，所以，学会如何在巨大的翻覆中生存下来是至关重要的。这样，你在那里才会无所畏惧！\n\n\
  哇！我简直不敢相信，我花了这么多年才将这两个相似的情景及其教训联系起来。在那之后，我开始让我的学生回到他们确信自己能驾驭的代码中，并让他们在代码中故意引入错误。然后，我让他们把代码交给搭档，互相指导，逐一对对方的代码进行调试。多年来，调试工具也在不断发展。事实上，调试工具本身已经变得非常复杂，令学生望而生畏。考虑到这一点，我为你们创造了一个过渡，让你们学会热爱调试，并受到启发去学习更复杂的调试工具。你们正处在一个将编写比以往任何时候都多的代码的阶段。你们一定会遇到错误，我希望你们能够应对这些艰难时刻。这就是为什么我要教你们崩溃与燃烧的第一课。\n\
  \n**注意**：你一定会崩溃。让我们学习如何快速崩溃、生存下来，并重新振翅高飞！\n\n\n\n### Xcode 的调试全景\n\n当你审视调试领域时，会发现一个简单的工具独自矗立在一堆看似复杂的调试程序之中。在本章中，我将使用这个简单的调试工具，教你如何找出自己代码中的错误。在名为“深入代码”的小节中，我将详细阐述那些更困难但也更强大的调试工具——我基本上会先引起你的注意，然后向你介绍它们的工作原理、使用时机，以及当你的编程水平超出本书范围时，如何进一步学习它们。\n\
  \n### Xcode 的工具\n\n在开始之前，我想先谈谈一些更高级、有时甚至令人望而生畏的调试工具，我们暂时先搁置它们，稍后再来回顾。Xcode 一直在稳步增强其调试工具，并提供了一套非常强大的调试环境，你可以用它们来发现并消灭错误，且不会因草率的代码移除而损害你的代码。在“深入代码”部分，我们将驾驶这些工具进行一次试运行，并附上一些图片作为参考。现在，我先向你简要介绍一下它们。\n\
  \n> **注意:** 要使 Xcode 调试工具正常运行，你必须确保安装了与 Mac 上运行的 iOS 版本相对应的 iOS SDK。如果它们不匹配，调试将无法进行。例如，如果你有一台运行\
  \ iOS 4.2 的设备，但电脑上没有安装相应的 SDK，你将无法进行调试。\n\n#### Xcode 的工具：文本编辑器\n\n第一个工具是文本编辑器，它允许你直接在代码行内进行调试，就像你可能已经注意到的，当你的代码无法编译时，所有那些红色感叹号会到处冒出来！文本编辑器允许你添加和设置断点；密切关注“调用堆栈”；通过将鼠标悬停在变量上来访问其值；执行单行代码；以及进入、跳出或跳过函数或方法调用。\n\
  \n#### Xcode 的工具：调试器窗口\n\nXcode 附带的第二个工具称为“调试器窗口”。当你开始处理非常复杂或大量的代码时，你会和调试器窗口成为朋友，因为它不仅使用传统界面提供了与文本编辑器相同的所有调试功能，还允许你查看“调用堆栈”及其关联的变量。假设你有一个名为\
  \ `dog` 的堆栈，与该堆栈关联的变量是 `breed`、`sex`、`age` 和 `name`。如果在查看堆栈时，你只看到了 `sex`、`age` 和\
  \ `name`，那么你立刻就会知道 `breed` 缺失了。这是一个简单的类比，就好比说 NASA 做的事情就是把大块金属发射到太空，有时里面还载着人。调试器窗口是一个很酷、功能强大的工具，也许有一天你会真正欣赏它。\n\
  \n#### Xcode 的工具：GDB 控制台\n\n第三个工具称为 GDB 控制台，它被封装在 Xcode IDE 中。它是一个基于文本的 GNU 调试器，功能比调试器窗口更多，并且拥有一个体面的图形用户界面，使得单步调试代码更加容易。根据我的经验，当你看到程序员在\
  \ GDB 控制台上以闪电般的速度迭代时，这通常意味着他们已经使用 GDB 一段时间了。而这反过来又意味着该程序员要么处于 **Über-Geek**（超级极客）级别，要么处于\
  \ **Superkalifragilistic-Geek**（超级无敌极客）级别！\n\n#### Xcode 的工具：控制台输出和设备日志\n\nXcode\
  \ 提供的第四个调试环境只是与你已经知道正在发生的事情进行交互。我相信你一定见过，当应用程序或程序崩溃时，Mac 上的 iOS 会在控制台中生成日志条目，这些条目指示了崩溃时的下钻代码。你也可以在你的\
  \ iOS 应用程序中生成控制台消息。程序员经常使用 `NSLog` 函数，因为这些控制台日志有助于他们在更低的层次上进行调试。这里的关键词是“更低的层次”。如果你去面试，他们可能会问你，当需要寻找一个显然存在于更低层次的错误时，你用什么来调试。你的回答应该是：“当然，我们都使用控制台输出和设备日志，通过\
  \ `NSLog` 功能来查看底层代码。” 哦，是的——他们会爱上你！\n\n#### Xcode 的工具：NSZombie\n\nXcode 提供的第五个调试工具专门用于调试内存泄漏。在\
  \ Xcode 4.2 之前，我们必须亲自监控代码的哪些部分使用了我们设定的内存量。当我们完成一段代码后，必须释放来自该方法或类的内存，以便它能够被接下来执行的代码段使用。尽管如此，了解何时在代码段上启用\
  \ NSZombie 很重要。\n\n开启 `NSZombieEnabled` 允许我们查看日志，这些日志会告诉我们内存的状态——特别是已释放的内存，如下所示。\n\
  \n```\n2011-09-10 20:01:12. 8813 storyboard[2019:f2c] *** -[GSFont ascender]: message\
  \ sent to\ndeallocated instance 0x127910\n```\n\n#### Xcode 的工具：Shark\n\n第六个调试工具非常流行，并且像\
  \ NSZombie 一样，专门用于调试内存泄漏。不同之处在于，使用用户友好的 Shark 图形用户界面相对来说很有趣。Shark 让我们能够访问系统级事件，如中断和虚拟内存。你可以看到代码中每个线程如何与其他线程通信，以及在该交互过程中，内存是否被丢弃、泄漏或导致“瓶颈”。Shark\
  \ 是一个你在使用 Xcode 时很可能会用到的工具，所以先记住这个名字。\n\n#### Xcode 的工具：单元测试\n\nXcode 提供的第七个也是最后一个工具，就是我们所谓的“单元测试”。单元测试构成了一个高效的项目经理在一个大型编码项目中如何设置一切的基础或平台，以便在编写每一行代码时，都有一整套测试对其进行测试，确保一切按预期工作。\n\
  \n如果一个项目经理不使用单元测试，却发现自己那 30 人、40000 行的 Xcode 项目无法运行时……再开始调试几乎为时已晚。单元测试通常被大型、管理良好的\
  \ Xcode 公司所采用。你只需要知道，如果你去这样的公司面试，你应该花些时间练习单元测试的示例：在面试中，他们肯定会问你是否有单元测试经验，而你如果能回答“是的，朋友！我对单元测试了如指掌”，那将会非常棒。嗯，这可能不是最好的回答，但你明白我的意思。单元测试远远超出了本书的范围，但我稍后会向你介绍它，至少让你能说你们已经见过面了！\n\
  \n\n\n### 我们的工具：`FileMerge.app`\n\n还记得“学会销毁”吗？没错，`FileMerge.app` 就是我们用来实现这一点的工具。我曾以为，让我的学生和读者能够获取本书中应用代码，就足以让他们找出自己代码中的问题。但我错了：简单地将代码从我的网站下载到他们的桌面上，并不能解决他们所有的问题。作为一个极客，我喜欢追踪各种数据。我可以告诉你，在过去一年里，我向新手极客们发送了超过\
  \ 6,070 封包含我源代码链接的邮件回复。在这 6,070 位收到邮件并下载了代码的人中，仍有 4,208 人无法调试自己的代码！显然，我之前的做法有问题，我需要修正我的教学方法。于是，我这样做了。\n\
  \n我在本章中给出了答案，向你展示如何下载我的源代码，使用 `FileMerge.app` 将你的代码与我的代码进行对比调试，从而找出你的错误——换句话说，就是教你如何“销毁”（或者用计算机术语说，“崩溃”）。\n\
  \n在第 7 章中，我介绍了故事板（storyboarding）。在画布上拖拽对象并通过 segue 连接它们很有趣。现在，你将开始在这些对象背后编写大量代码，让它们更炫酷、更智能。我指的确实是大量的代码。你需要学会如何使用\
  \ `FileMerge.app` 进行调试，将我的代码与你的代码进行对比。这是一堂我坚持要求你上的课，即使你可能觉得自己已经足够优秀，不需要它了。\n\n###\
  \ `switch-mistake`：崩溃艺术的一课\n\n你将重新审视第 6 章的 switch 代码，但这次你不会编写完整的应用程序，最重要的是，你将故意制造一个错误。然后，从网站下载我的代码，打开\
  \ `FileMerge.app`，并调试你的代码。现在，你可能会问，为什么我们不在第 6 章直接做 switch 练习，然后回到这里进行调试呢？答案有三点：\n\
  \n- 首先，正如我所说，你不会用上你在第 6 章的 switch 部分编写的所有代码，而且你需要以不同的顺序进行。所以，你需要从头开始，按照本章的步骤一步一步来。\n\
  - 其次，代码的命名会有所不同。我希望你在本章编写的代码使用不同的名称，这样你的错误就不会冒出来。稍后我会解释这一点。\n- 第三，我只是想让你练习重做一个你已经熟悉的应用。这样一来，你的错误和调试过程就成为你的主要关注点。\n\
  \n#### 启动项目\n\n所以，我们要做的第一件事是清理你的桌面，然后从我的网站下载源代码和图片。\n\n- 在此处下载图片：`bit.ly/raKxPe`\n\
