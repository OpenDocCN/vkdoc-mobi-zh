  \n#### MapKit 解析\n\n请记住，这是在超越本书范围的层面上深入代码。然而，以下所有指令都在我学生的代码中可见，欢迎你下载。现在，请先阅读并看看你是否能理解他们解析、创建委托对象等的模式。\n\
  \n在我们查看他们的实际应用之前，先考虑一个假设场景：想象有一个“感恩而死”服务器，广播每个“死头”粉丝的地理位置更新——至少是那些允许自己在网格上可见的粉丝。这个假设的应用允许一个（铁杆）“感恩而死”乐迷在任何给定时间找到附近的所有其他“死头”粉丝。这些粉丝可以见面、分享私制唱片、一起闲逛，并通常在一个只有其他“感恩而死”信徒才能欣赏的层面上交流。\n\
  \n\n\n### 起点\n\n如果我们要创建这样一款应用，就像“Routesy”示例那样，我们会允许用户通过打开属性检查器并启用“显示用户位置”开关来查看自己的位置。我们会创建一个名为\
  \ `DeadHeadsView` 的控制器，它负责实例化一个我们称之为 `Gratefuldead` 的解析器。然后，我们会让该控制器将自己设置为委托，以便接收反馈，并调用一个名为\
  \ `getGratefuldead` 的数据方法。\n\n### 从网络获取数据\n\n当我们的解析器在“感恩而死”服务器上筛选 XML 时，我们希望它抓取\
  \ `Gratefuldead` 元素数据，并为每个 `Gratefuldead` 对象创建一个实例。因此，对于它创建的每个实例，它会通过 `addGratefuldead`\
  \ 方法回调给我们。我们需要在 `deadHeadsViewcontroller` 中实现我们的 `Gratefuldead` 和 `Parser` 方法。我们可能会发现，以如下方式思考我们的\
  \ `GratefuldeadParser.h` 会更容易：\n\n```\n+ (id)GratefuldeadParser; // 用于创建解析器\n- (void)getGratefuldeadData;\
  \ // 用于激活数据获取\n```\n\n### 向视图控制器添加方法\n\n在向 `DeadHeadsView` 控制器添加实现方法之前，我们需要通过 `GratefuldeadParser`\
  \ 代理来实现协议，并导入其头文件 `#import <GratefuldeadParser.h>`。至此，头文件部分就完成了，我们将转到实现文件。\n\n首先，我们会从\
  \ `GratefuldeadParser.h` 中复制两个实现方法，并将它们粘贴到 `@synthesize` 语句之后：\n\n```\n@implementation\
  \ DeadHeadsViewC0ntroller\n\n@synthesize deadView\n\n- (void)getGratefuldeadData:(Gratefuldead\
  \ *)Gratefuldead;\n-(void)parserFinished\n```\n\n### 测试解析器数据源\n\n为了测试“感恩而死”服务器，我们将尝试记录一些消息。让我们将这两个方法分开，删除分号，添加大括号，然后输入“log”，如下所示：\n\
  \n```\n- (void)getGratefuldeadData:(![images](img/00392.jpg) Gratefuldead *)Gratefuldead\
  \ {\nNSLog(@\"嬉皮士消息\");\n}\n\n-(void)parserFinished{\nNSLog(@\"在 %@ 位置发现一名死忠粉\"\
  , Gratefuldead.place);\n}\n```\n\n### 启动解析器方法\n\n实现了我们的委托方法之后，我们需要做三件事：\n\n1.  编写解析器方法。将其放入一个我们称之为\
  \ `(void)viewWillAppear` 的方法中。当视图控制器的视图即将显示时，此方法会被调用。如果采用这种方式，请注意我们应始终在 `- (void)viewWillAppear`\
  \ 方法中进行调用。\n2.  创建一个我们称之为 `GratefuldeadParser` 的解析器实例。通过此操作，我们会得到 `GratefuldeadParser\
  \ *parser = [GratefuldeadParsergratefuldeadParser]`。我们希望将自身设置为委托，这意味着，现在 `GratefuldeadParserparser.delegate\
  \ = self`。\n3.  此步骤包含两个操作：首先，告诉解析器获取“感恩而死”数据：`[parser getGratefuldeadData];`\n\n\
  其次，处理其导入：\n\n```\n#import \"GratefuldeadParser.h\"\n```\n\n然后，当调用 `– (void)viewWillAppear`\
  \ 时，它会创建一个 `GratefuldeadParser` 实例。当它接收到所有死忠粉的位置时，它会向我们展示他们的位置！\n\n还记得我们如何确保应用的用户会以蓝点的形式显示在地图上吗？我希望你把蓝点想象成一个注解视图。当它被添加到\
  \ `deadView` 时，它会向其委托请求位置信息。\n\n注意：如果我们返回任何非 nil 的值，那么将使用我们自己的注解视图（而非蓝色的），然后返回那个视图。\n\
  \n因此，由此看来，当注解不等于用户的当前位置时，我们返回 nil。\n\n```\n- (MKAnnotationView *)deadView:(MKDeadView\
  \ *)deadView\n                  viewForAnnotation:(id <MKAnnotation>)annotation\
  \ {\nMKAnnotationView *view = nil;\nreturn view;\n```\n\n但问题在于：我们不希望为 `Gratefuldead`\
  \ 的位置返回 nil。相反，当我们的注解不等于 `deadViewuserLocation` 属性（该属性本身也是一个注解）时，我们希望做一些酷炫的事情：\n\
  \n```\nif(annotation != deadView.userLocation) {\n\n                // 这里是我们做酷炫事情的地方\n\
  \               // 因为这是一个死忠粉，而不是用户\n}\n```\n\n此时，我们使用 `dequeueReusableAnnotationViewWithIdentifier`\
  \ 委托方法，当注解视图一离开屏幕，它就会被回收以供重用。它有一种便捷的方式，可以将注解存储在一个独立的数据结构中，然后根据用户事件的需要自动在地图上添加或移除它们。请注意，`dequeueReusableAnnotationViewWithIdentifier`\
  \ 是关于从地图上获取可重用的注解视图，与添加或移除注解无关：\n\n```\nGratefuldeadAnnotation *eqAnn = (GratefuldeadAnnotation*)annotation;\n\
  view = [self.deadView  dequeueReusableAnnotationViewWithIdentifier:@\"GratefuldeadLoc\"\
  ];\n       if(nil == view) {\n        view = [[[MKPinAnnotationView alloc] initWithAnnotation:eqAnn\n\
  \                                              reuseIdentifier:@\"GratefuldeadLoc\"\
  ] autorelease];\n}\n```\n\n注解视图会去它的重用队列中查找是否有可以重用的视图 `if(nil == view) { …`。如果没有，它会返回\
  \ nil，这意味着我们需要创建一个新的 `view = [[[MKPinAnnotationViewalloc] initWithAnnotation:eqAnn`。\n\
  \n有很多创造性的方法可以让你的注解展示带有动画的 V 形标记、铃铛和口哨、“感恩而死”的珠子等等。你可以查看已有的可用资源，以你希望的任何方式为你的注解打造视觉甜点。\n\
  \n在这方面，当你编写代码到此阶段时，最重要的步骤是使用你的 NSLog 调试器检查代码中的错误；这将决定它是否能连接到你所选的服务器。一旦完成，剩下的就是解析\
  \ XML 的问题。最后一步是为注解寻找视觉甜点。\n\n### 三个 MapKit 最终项目：CS–201 iPhone 应用，Objective–C\n\n\
  以下是三个大量依赖从互联网解析信息的应用。前两个来自一对父子，两人都叫 Stephen Moraco，第三个来自 SatishRege。他们都好心地提供了未经编辑的个人简介，说明了他们为什么选修这门课。他们还包含了详细的课堂笔记、本书中展示的应用，以及他们从课程中的收获。\n\
