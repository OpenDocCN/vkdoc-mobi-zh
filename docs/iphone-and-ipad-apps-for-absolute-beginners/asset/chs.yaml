  \n##### 88. 做得好！\n\n### 深入代码\n\n是的，我知道这个过程相当累人。学生们上完这节课后都精疲力尽了。我试图理解为什么会这样。当我告诉他们这比编程容易得多时，他们看着我，仿佛我失去了理智。考虑到这一点，我决定将下一章作为复习内容，但会使用一个业务模型，这样就能一举两得：既能让你练习本章所学的内容，又能增加一些变化，让企业主和其他具有创新思维的人看到如何将故事板应用于财务模型。\n\
  \n因此，本章的“深入代码”部分将作为一个高级参考保留下来，你可以在以后尝试高级版故事板时再回来查阅。所以，要么直接进入第 8 章，要么快速浏览一下“深入代码”，即使没吸收任何东西也不必慌张。只需让大脑看看这里的内容，放空一下，休息片刻，然后继续下一章。\n\
  \n\n\n### 故事板视图控制器、iOS4 及其编程式创建\n\n学生和网友们问我最多的问题是，故事板是否兼容 iOS4。我不明白为什么这么多人想了解这一点。向前看，拥抱新技术，不断迈向新领域才是正途。但答案是：不！故事板从未兼容过，将来也永远不会兼容\
  \ iOS4，因为它们基于仅在 iOS5 和 Lion 中可用的新运行时类。其次最热门的问题是，是否可以编程操作故事板。嗯，让我想想，这几乎就像是在说：“好吧，我有一辆能开的车，但我能不能下车去推它？”\n\
  \n我无法理解为什么这么多人想要改变它，或者试图深入探究其内部机制。如果你已经精通故事板，并发现了需要绕过的巨大缺陷，那我可以理解。然而，就我撰写本文之时，故事板问世并不久，而那些一个故事板应用都没做过的人就想知道能否改变它。尽管如此，我还是会回答这个问题，因为等到这本书出版时，或许后一种情况会适用。\n\
  \n要回答这个问题，你需要从运行时的角度来审视故事板。视图控制器之间的转换（transitions）和转场（segues）应在运行时中查看。在这里，你将会注意到，确实存在一种机制可以通过编程方式实例化转场。\n\
  \n*   首先，要了解如何通过编程方式修改现有的转场，你需要查看当前视图控制器与目标视图控制器之间的代码。在这里，你可以使用 `UIViewController`\
  \ 的 `performSegueWithIdentifier:sender:` 方法，以编程方式触发你的转场。\n*   其次，如果你的视图控制器之间没有定义转场，但你在故事板文件中定义了目标控制器，那么你很幸运。你可以使用\
  \ `UIStoryboard` 的 `instantiateViewControllerWithIdentifier:` 方法，通过编程方式加载视图控制器。之后，只需将其推入导航堆栈即可连接该控制器。警告——不要尝试通过\
  \ Interface Builder 访问它。我见过一些学生的 Mac 电脑因此完全崩溃。\n*   最后，如果你的故事板没有连接到目标视图控制器，你可以通过编程方式创建它，不过作者尚未在\
  \ Apple 开发者网站上对此进行深入探讨。但这一功能确实存在——我不知道你为什么要这么做，但它确实存在于《iOS 视图控制器编程指南》中。\n\n如果你确实想理解故事板，请务必记住两件事：\n\
  \n*   第一，它继承并遵循 `NSObject`。\n*   第二，其框架位于 `/System/Library/Frameworks/UIKit.framework`。\n\
  \n我想让你理解的关键问题是，现在，你可以利用你对故事板已有的了解无休止地进行编程。牢记基础，并真正理解这些基础。忘掉用编程方式操控故事板这件事。按原样使用它，并理解其基础知识。\n\
  \n你必须了解的故事板的第一个基本功能是，它们都需要从一个初始视图控制器开始，该控制器代表你应用的起点，并连接到你的用户界面。这将是用户看到的第一个屏幕。在你的案例中，它是“我的故事视图控制器”（My\
  \ Story View Controller）。如果遇到 bug，你可能需要检查你到另一个故事板文件（即在应用的 `Info.plist` 文件中通过 `UIMainStoryboardFile`\
  \ 键指定的文件）中初始视图控制器的转换。这个初始视图控制器会在程序启动时自动加载并显示。\n\n### 在接下来的章节中\n\n在第 8 章中，我们将带你进入调试的世界。我们将首先从宏观角度审视调试领域。我们将讨论一些令人望而生畏的调试工具，它们的含义，你将来何时可能用到调试，以及最重要的——你现在如何使用一个非常简单的工具进行调试。\n\
  \n你将学会如何找出你在之前章节所写代码中的 bug。但更重要的是，你将拥抱调试的艺术，而不是将其视为一个无尽、无望、深不见底的深渊。\n\n前进吧，向着下一章中等待我们的\
  \ bug！\n\n"
