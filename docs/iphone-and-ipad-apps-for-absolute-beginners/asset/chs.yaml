  ![images](img/00050.jpg)\n\n**图 2-9.** 使`IBOutlet`成为一个标签。\n\n9.  如第 8 步所述，我们希望连接类型是`Outlet`——苹果公司的人认为你可能需要这个——所以默认情况下，它会显示出来，我们保持其选中状态。现在不用担心`Object`和`File's\
  \ Owner`。你可以随意命名标签，但现在，像我一样将其命名为`label`（见图 2-9），这样如果你将你的代码与我的视频、本书中的图片或从我网站下载的代码进行比较，你的代码看起来会和我的相同。现在也先不用担心`UILabel`。现在按回车键（![Images](img/00043.jpg)），你会看到代码`IBOutlet\
