  \n**注意：** 每当我提到“iPhone”或“iPad”时，我指的是任何 iPhone 或 iPad OS 设备。这包括`iPod touch`。此外，当我提到`Macintosh\
  \ HD`时，你的硬盘可能被命名为其他名称。\n\n### 我不会教你什么\n\n现在你已经安装好`Xcode`、`Interface Builder`和`iPhone/iPad\
  \ Simulator`工具并可以轻松访问，你已经准备就绪。但是等等！你需要知道我们要去哪里。\n\n不过，首先让我说说我们不会涉及的地方——我不会涵盖的内容。我不会试图教你每一行代码是如何工作的。相反，我将采用一种子系统的方法，指出哪些代码片段或部分将在哪些情况下为你服务。\n\
  \n虽然本书旨在让你（读者和程序员）获得全面的理解和能力，但我们将在分子层面而非原子或亚原子粒子层面进行探讨。重点将是如何识别代码的一般属性、行为和关系，这样你就不必陷入逐字逐句的细节中。我将带你达到一个境界，在那里你可以选择你可能想要专精的领域。\n\
  \n\n\n### 计算机科学：一片广阔而多元的天地\n\n打个比方：假设 iPhone/iPad 是一辆汽车。我们大多数人使用电脑的方式，就像开车一样。正如我如果教你开车，不会试图让你了解每个零件的工作原理一样，我也不会——也绝不会——把基础计算机工程学作为学习\
  \ iPhone 和 iPad 编程的第一步。\n\n即便是每天修车的优秀技师，也鲜少了解现代内燃机背后的基础物理和电子学原理，更不用说所有辅助系统了。他们会开车，能诊断出车辆需要维修时的故障，并能借助工具和机器（包括电脑）进行最佳修复和调试。同理，为\
  \ iPhone 和 iPad 开发应用的聪明程序员，也极少了解 Apple 平台底层的核心代码和电路板设计。尽管如此，他们能使用这些设备，能在广阔的应用需求领域中构想出新的细分市场，并能利用桌面和笔记本电脑上的工具与应用，来设计、编码，并将他们的想法推向市场。\n\
  \n继续用这个类比，为 iPhone 或 iPad 编程就像摆弄你的汽车引擎——对其进行定制，让它做你想做的事。苹果公司设计了一款和 V8 发动机一样令人赞叹的计算引擎。苹果公司还提供了一个相当酷的“底盘”，我们可以在上面改装和重建我们的计算引擎。然而，我们在“改装”iPhone/iPad\
  \ 这辆“汽车”时会受到一些限制。对于从未改装过汽车的朋友，我将演示如何在遵守这些限制的同时，最大化发挥创意。\n\n我会带你了解，如何在不涉及过多细节的情况下，更换机油滤清器、轮胎、座椅和车窗，把你的车变成一辆越野车、一辆\
  \ hot rod 改装车、一辆赛车，或一辆能带我们穿越丛林的车。当你掌握了本书的内容，你就会知道如何专注于并改进汽车的引擎、变速箱、转向系统、动力传动系统、燃油效率或立体声音响。\n\
  \n### 为什么 Objective-C 中存在“炼狱”\n\n我的假设是：你从未修过车，手上从未沾过油污，并且你想改装一辆世界上最强大的汽车——它拥有一台复杂的\
  \ V8 发动机。我会精确地向你展示如何做到这一点，而且这个过程会很有趣！\n\n首先，你需要稍微了解一下，我们是如何拥有这台装有 V8 发动机的改装车——也就是\
  \ iPad 的。1971 年，史蒂夫·乔布斯和史蒂夫·沃兹尼亚克相识，五年后他们创立了苹果公司，生产了首批商业上成功的个人电脑之一。1979 年，乔布斯访问了施乐\
  \ PARC（帕洛阿尔托研究中心），并将施乐 Alto 的特性应用到他们的新项目——后来被称为 Lisa 的电脑中。虽然 Alto 不是商业产品，但它是第一台使用桌面隐喻和图形用户界面（GUI）的个人电脑。Lisa\
  \ 是第一款配备鼠标和 GUI 的苹果产品。\n\n1985 年初，乔布斯在与苹果公司董事会的权力斗争中落败，从公司辞职，并创立了 `NeXT`，该公司最终于\
  \ 1997 年被苹果收购。在 `NeXT` 期间，乔布斯改变了麦金塔电脑（Mac）上的一些关键代码特性，使其使用一种新的语言——一种非常严谨但又优美的语言，叫做\
  \ `Objective-C`。这种语言的优势在于它能高效地使用对象。与其重写应用程序某一部分中已经用过的代码，`Objective-C` 重复利用了这些对象。当时乔布斯的思维高速运转，这段非凡的代码将\
  \ `Objective-C` 这门新语言推向了新的高度。他的灵感通过创造出我们称之为 `Cocoa` 的元语言，融入了 Mac 的内核。元语言是用来分析或定义另一种语言的语言。正如我提到的，`Objective-C`\
  \ 是一门非常难掌握的野兽，你可以把 `Cocoa` 看作是驯服这头野兽的语言工具，或者至少是把这头野兽关进笼子。\n\n作为一个编程世界的“绝对新手”，不能指望你关注编程语言区别的细微之处。我在这里只是给你一个概述，让你对这段历史有个大致了解，从而为你自己的学习经历提供一个背景。我在这里想说的重点是，`Objective-C`\
  \ 和 `Cocoa` 是非常强大的工具，它们都与 iPhone/iPad 的编程息息相关。\n\n### 休斯顿，我们遇到麻烦了\n\n这正是吸引我并促使我设计原始课程的核心挑战。如何教会像你一样的非工程专业学生，那些即使是顶尖工程专业学生都觉得困难的东西？在大学层面，我们通常让学生先上编程入门课，然后学习面向对象编程入门，比如\
  \ `C#` 或 `C++`。\n\n即便如此，我们还是准备一头扎进 `Objective-C` 的世界！有时，我会给你蒙上眼罩；有时，我会为你缓冲冲击。有时，你可能需要重读几页书或回放几遍视频示例——这样才能让你透彻理解一个困难的概念。\n\
  \n### 我们将如何不时地探访“炼狱”\n\n在我的课程中，有些特定的地方，我知道一半学生会立刻理解，四分之一的学生需要下点功夫才能学会，而剩下的四分之一则会挣扎并最终放弃。这第三类学生通常会转出工程专业，选择更简单的课程。我知道这些“难点”在哪里，但我不会告诉你。我重复一遍，我不会告诉你。\n\
  \n别担心，我不会让你去捅马蜂窝（指 `Objective-C` 的各种复杂问题），然后被蜇得遍体鳞伤。我也不会特意标出那些你可能觉得困难的概念。我现在不打算解释这一点。请接受它！只要你放松心情，跟着我的引导走，你就能出色地学完这本书。\n\
  \n当你真的遇到困难时，请坚持下去。你可以随时重读相关章节，回放视频示例，或者——最重要的是——去访问论坛，那里有很多人，包括我自己，经常会在线并准备立即帮助你。我们可能会把你引荐给其他人的解决方案，或者直接帮助你。所以，去论坛和大家打个招呼，沉浸其中，先去寻求他人的帮助，然后再回来帮助别人。论坛地址是：[`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)\
  \ 或 `bit.ly/oLVwpY`。参见 图 1-20。\n\n![images](img/00028.jpg)\n\n图 1-20. 遇到困难时，访问论坛可以获取帮助。\n\
  \n### 展望未来……《Beginning iPhone 4 Development: Exploring the iPhone SDK》\n\n今后，你们中有些人可能想继续\
  \ iPhone 和 iPad 编程的冒险，去读 Dave Mark 和 Jeff Lamarche 的书《Beginning iPhone 4 Development:\
  \ Exploring the iPhone SDK》（Apress, 2009 年出版）。还记得那个关于成为一辆装有 V8 发动机的汽车机械师的类比吗？他们的书假设读者知道什么是化油器，什么是活塞，并且他们能在朋友改装的轮子上安装赛车轮胎和超级轮毂。\n\
  \n换句话说，他们假设你理解面向对象编程的基础知识：你知道什么是对象、循环和变量，并且你熟悉 `Objective-C` 编程语言。\n\n另一方面，我假设你，例如，不知道什么是“类”，什么是“成员”或“void”。我假设你完全不了解\
  \ iPhone/iPad 上的内存管理是如何工作的，而且，在此之前，你从未有兴趣去理解数组或 `SDK`。\n\n\n\n#### 学习内容\n\n我发现，当学生们开始一门具有挑战性的课程时，让他们相对轻松地创造出真正酷炫的东西，往往会产生神奇的效果。在此过程的每个阶段，我通常会展示一个示例，让你能够立即阅读、观察并消化。稍后，我们会回过头来剖析一些早期步骤，并进行更详细的探讨。我会解释我们如何在第一次执行某些任务或操作时，甚至自己都没意识到就已经完成了。然后，通过对比第一次执行与后续的修改，你将学会如何在这里或那里对程序进行微调。这样一来，你就能始终保持在正轨上——充满动力和灵感，去吸收下一批新的技巧、经验和方法。\n\
  \n##### 创建酷炫古怪的应用：我为什么这样教\n\n你听说过我们如何最好地记住事物的说法：实践优于观察，观察优于听闻，以此类推。嗯，我知道学生们喜欢幽默——而且你猜怎么着！我们对有趣的故事和课程的记忆，远比对枯燥无聊的内容要深刻得多。我发现，无一例外，当学生们处理有趣又古怪的代码时，他们往往会花更多的时间去解决它。\n\
  \n我们在解决问题上投入的脑力越多，大脑中建立的神经连接就越多。我们连接的神经元越多，就记得越牢，而且最重要的是——就越不容易在无效的方法上浪费时间。\n\n\
  我们在某个特定主题上花费的时间越多，你就越有可能对解决某个项目的方法是否正确产生直觉。因此，随着学习的推进，请注意，我是在运用幽默，让你在不耗费任何刻意努力的情况下，将计算机科学和\
  \ Objective-C 的概念与方法烙印在你的脑海中。\n\n我的学生们在收到困难的课后作业后联系我，这是常有的事。首先，他们会发一条推文问我是否可以 Skype\
  \ 沟通。有一个晚上，我正和一位同事下棋，收到一条推文问我是否有空。“当然有空，”我回复道。我提醒我那位也在北卡罗来纳大学任教的同事，他认识的学生们马上要出现在\
  \ Skype 上了。当他们呼叫进来时，果不其然，是我四位电气工程专业的学生，他们睁大眼睛，面带微笑。“嘿，刘易斯博士，我们终于搞定了，但是，老兄！你最后布置的那个方法……”\n\
  \n当我们结束通话，我关上 Mac 时，已经是凌晨 12 点 30 分了。我的同事问道：“罗里，我从没在这么晚给教授打过电话——更别提半夜了！他们难道不应该在办公时间来问这些问题吗？！”他可能说得对，但我想了一分钟后回答说：“我只是很高兴他们正在完成我布置的古怪作业！”当我们摆好下一盘棋时，他咕哝着说我可能适合待在精神病院了。\n\
  \n关键在于，我希望你能读完这本书。我希望你能完成所有的示例，并在完成每项任务时感受到欣喜若狂！我竭尽全力让这本书变得有趣。如果你选择去思考书中包含的思想，这本书将改变你的生活！\n\
  \n顺便说一句，成功掌握这些课程将让你成为一名认证极客。你周围的每个人都会感受到你日益增长的能力，并目睹你的转变；因此，他们会来找你，请你为他们编写应用。\n\n\
  ##### 向你的祖母传道授业… 你编写的东西至关重要！\n\n重要的是，不要让复杂的代码把你搞得晕头转向。就在两分钟前，一个学生走进我的办公室——他困惑到甚至无法告诉我他到底哪里不明白。他含糊地说：“我的二阶数组内联时运行得很好，但作为类或方法就不行。”我说：“不，那太复杂了！这里有个更简单的说法……”\n\
  \n我描述了他是如何有一长串的“东西”从一端进去，从另一端出来——而且效果很好。但是，当他把它放进一个方法时，他看不到那一长串东西的开头；当他把它放进一个类时，他连任何“东西”都看不到了！”\n\
  \n“哇！我知道我哪里做错了，刘易斯博士。谢谢！”现在，在我打字的时候，他正在向昨天进来并试图问同样问题的两个哥们解释。别担心。引发这些问题的困惑——比如“类”和“方法”以及其他编码实体的区别——将在本书后面部分得到解释。一切都会在合适的时候明白！\n\
  \n如果你能脚踏实地，把复杂的事情转化为简单的想法，那么你就能记住它们——并掌握它们。理解了这个概念，你就能把你天马行空的想法转化为代码——谁知道这会带你走向何方！这就是我如此坚定地要传授给你这种能力的原因——将你祖母想做的事情，转化为\
  \ iPhone 和 iPad 的编程语言。\n\n\n\n### 这一切是如何运作的？\n\n在第 2 章开始我们的第一个程序之前，至关重要的是你能退一步，了解我们之前的位置、现在的位置以及下一步的方向。换句话说，你可能会问自己：如何将我针对\
  \ iPhone 或 iPad 应用的创新想法转化为口袋里的钱？这是如何运作的？它真的有效吗，还是那些靠 iPhone 和 iPad 应用赚得盆满钵满的疯狂故事都是假的？\n\
  \n那么，这些“应用变财富”的故事是真的吗？这很容易回答。截至 2011 年 3 月 2 日，当史蒂夫·乔布斯发布 iPad 2 时，他宣布苹果已累计向开发者支付了\
  \ 20 亿美元，用于在 App Store 中销售的应用（参见图 1–23, #9）。请注意，仅在八个月前，苹果曾宣布自 2008 年 7 月 App Store\
  \ 推出以来，已向 iPhone 和 iPad 应用开发者支付了 10 亿美元。\n\n从未有过如此巨额的 20 亿美元支付给程序员。你正步入计算机与技术领域一个蓬勃发展的史诗级事件。阅读本书并学习如何编写应用将改变你的人生。在这个后\
  \ PC 时代的新纪元，苹果独自创造了一个前所未有的环境，让开发者能够充分利用这些更个性化、更强大的机器。你即将加入的这个充满活力的程序员社区，已帮助苹果的应用数量突破了\
  \ 35 万。但你可能仍会问：这到底是如何运作的？\n\n我绘制了一张创新流程的地图，你需要理解它，才能清楚本书将带你走向何方。请看图 1–21，我希望你首先看看……呃……你！是的，那就是你，在#1\
