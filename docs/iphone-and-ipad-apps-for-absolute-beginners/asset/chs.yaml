  \ 3–14 为例，文本背后的颜色是黑色，因此文本颜色被改成了白色。\n\n\n\n#### 连接代码\n\n好了，现在你已经完成了从库中将对象拖拽到视图设计区域的操作。接下来，让我们将这些对象与你的文件所有者（file's\
  \ owner）连接起来，这样你就可以将它们与代码关联起来。\n\n![images](img/00084.jpg)\n\n**图 3-15.** 打开助理编辑器（Assistant\
  \ Editor）\n\n15\\. Xcode 4 最酷的特性之一在于，在过去的“旧时代”，当 Xcode 刚推出时，你必须输入 `Control + Command\
  \ + Up Arrow`(^![Images](img/00031.jpg)↑) 或 `Control + Command + Down Arrow` (^![Images](img/00031.jpg)↓)\
  \ 才能在文件之间快速切换——苹果公司的聪明人知道我们会有这种需求。这些相互关联的页面和文件被称为对应文件（counterparts），但你无需记住这点，因为在\
  \ Xcode 4 中，助理编辑器会找到巧妙的方法，将它们全部显示在屏幕上供你使用。现在，你应该开始将代码与你已放置到视图中的所有元素连接起来。因此，用鼠标点击编辑器选择器（Editor\
  \ Selector），如图 3-15 所示，然后选择助理编辑器（Assistant Editor），它的图标看起来像穿着燕尾服的人的胸部。接下来，你会看到布局如何变化。纯粹为了好玩，你也可以点击助理编辑器左侧紧邻的按钮，即标准编辑器（Standard\
  \ Editor），然后你会看到屏幕变为单窗口——就像过去一样。总之，选择助理编辑器后，我们继续。\n\n**注意：** 你也可以使用键盘快捷键来打开助理编辑器的选项：`Command\
  \ + Return` (![Images](img/00085.jpg)![Images](img/00031.jpg)![Images](img/00086.jpg))\
  \ 打开助理编辑器，`Command + Return` (![Images](img/00031.jpg)![Images](img/00086.jpg))\
  \ 打开标准编辑器。键盘快捷键数以千计，有些成为了明星级快捷键，有些则从未走出书籍和博客。这里之所以提到这两个快捷键，是因为尽管 Xcode 4 还比较新，但我发现自己和其他人已经开始自然地使用这两个命令了。\n\
