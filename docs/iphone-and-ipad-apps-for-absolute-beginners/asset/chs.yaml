  \ 点击 ViewController 的实现文件。就是那个以 `.m` 结尾的文件，比如 `helloWorld_03ViewController.m`。如图\
  \ 3–28 所示，删除 `viewDidUnload` 方法。\n\n### 创建编程路线图\n\n现在，你已经准备好进入一些真正有用的代码了。\n\n![images](img/00100.jpg)\n\
  \n图 3–29. 原始的 IBAction 按钮方法，在你开始编程之前。\n\n29. 这里有两个你需要注意的要点：第一，你所编程的内容及其位置；第二，一个路线图，它将指导你编写第一段代码：\n\
  \n- 看看你正在编程的内容：在图 3–22 到图 24 中，你可以看到方法 `(IBAction)button:(id)sender{…}`，它看起来与你从\
  \ Interface Builder 将动作拖拽连接到头文件中的按钮时所实例化的动作非常相似。唯一的区别在于，在实现文件中，你需要实现当用户按下这个按钮时应当发生什么。为此，你需要将分号替换为花括号，并且正是在这些花括号中，你将指示当用户按下这个按钮时具体会发生什么。\n\
  \n  > **注意：** 我将解释两遍：第一遍作为概述，第二遍以我为新手 Objective-C 程序员开发的具体方式进行。在本书中，我会经常这样做。这种方法效果很好，所以请耐心跟着我来一次。\n\
  \n- 你的路线图：参见图 3–29，你的路线图指出，你将有两个文本字符串，分别命名为 `Name` 和 `Output`。`Name`（`NSString`\
  \ 类型）接收用户在 `textBox` 中输入的文字。清理 `Output NSString`，然后让它接收来自 `NSString` 的文本。将其放置在“:says\
  \ Hello World!”之前后，发送到 Label 以供查看。最后，清理 `Output NSString`。\n\n代码分为以下 5 个步骤：\n\n\
  1.  创建字符串来管理文本的输入和输出\n2.  对文本进行操作\n3.  展示你的劳动成果\n4.  整理工作\n5.  隐藏键盘\n\n\n\n####\
  \ 第一步：创建字符串来管理文本输入与输出\n\n首先，你需要在花括号内键入两条 `NSString` 语句。这样做是为了创建两个名为 `NSStrings`\
  \ 的文本字符串，你将分别命名为 `Name` 和 `Output`。请确保 `NSString *Name` 的内容包含用户输入到 `textBox` 中的文本。接下来，让\
  \ `NSString *Output` 不包含任何内容，或者实际上，通过强制将其设为 `nil` 来清空它。`*` 表示指针，指向将存储每个 `NSString`\
  \ 内容的内存地址。\n\n```\n- (IBAction)button:(id)sender {\n    NSString *Name = textBox.text;\n\
  \    NSString *Output = Nil;\n}\n```\n\n#### 第二步：处理文本\n\n在两条 `NSString` 语句下方，按照下图所示键入\
  \ `Output` 行。\n\n```\n- (IBAction)button:(id)sender {\n    NSString *Name = textBox.text;\n\
  \    NSString *Output = Nil;\n    Output = [[NSString alloc] initWithFormat:@\"\
  %@ says: 'Hello World!\", Name];\n}\n```\n\n键入这段代码后，观察下面代码中的 `%@`：\n\n`@\"%@says:\
  \ Hello  World!\", Name];`\n\n这将以逐步专业化的方式解释，例如：\n\n- `%@` 将 `Name` 中的内容放在 `\"says:\
  \ Hello World!\"` 之前。\n- `%@` 将 `Name` 所指向的内存位置中的文本取出，并放在 `\"says: Hello World!\"\
  ` 之前。\n- `%@` 将指针 `Name` 所指向的内存中的文本取出，并放在 `\"says: Hello World!\"` 之前。\n- `%@` 将\
  \ `*Name` 处的字符串放置在 `\"says: Hello World!\"` 之前。\n\n好吧，这并不太难。这些描述从完全非技术性的文本，逐步变得每次都有点技术化。在课堂上，我会组织游戏，挑战学生们分组进行自己的“通往极客之路”创新。在进入下一步之前，我要你做的，是将上述进展解释给你身边一个完全不懂电脑的人听。向他们阅读这四个要点。当他们不理解时，用你自己的话解释给他们听。你会从中学到很多东西。你们大多数人会意识到，他们可能已经看出你开始从普通人转变为极客了。\n\
  \n好的。继续往下说，我希望你关注这一行中的 `[[NSString alloc] initWithFormat:@`：\n\n`[[NSString alloc]\
  \ initWithFormat:@\"%@ says: Hello  World!\", Name];`\n\n具体如下：\n\n- `[[NSString\
  \ alloc] initWithFormat:@` 以对人类有意义的方式分配文本 `\"somebody says: Hello World!\"`。\n-\
  \ `[[NSString alloc] initWithFormat:@` 利用苹果聪明人在其 `initWithFormat` 代码中编写的程序，在 iPhone\
  \ 微处理器中分配所有这些电信号，这些代码将代表 `\"somebody says: Hello World!\"` 的机器语言转换为对人类有意义的文本。\n\
  - 一旦将所有内容转换为文本形式，表示 `\"somebody says: Hello World!\"`，你就将其存储在 `Output` 中，如下代码所示：\n\
  \n`Output = [[NSString alloc] initWithFormat:@\"%@ says: Hello  World!\", Name];`\n\
  \n#### 第三步：显示你的劳动成果\n\n接下来，你需要将存储在 `Output` 中的文本显示到用户的 iPad 或 iPhone 屏幕上。此时学生常告诉我他们觉得已经完成了。不。你的文本还只是躺在微处理器内部。你需要让它显示在屏幕上，以便用户阅读。还记得你在图\
  \ 3–13 中为它创建了一个完美位置吗？去那里，然后回到我这里。\n\n很酷，对吧！你需要将 `Output` 中的文本放入 `Label` 中。所以请键入：\n\
  \n`label.text = Output;`\n\n你在这里所做的，是访问了一个称为“文本属性”的内容，将其设置为 `Output` 中的任何值，然后将其显示在屏幕上的\
  \ `Label` 中。\n\n```\n- (IBAction)button:(id)sender {\n    NSString *Name = textBox.text;\n\
  \    NSString *Output = Nil;\n    Output = [[NSString alloc] initWithFormat:@\"\
  %@ says: 'Hello World!\", Name];\n    label.text = Output;\n}\n```\n\n#### 第四步：内存管理\n\
  \n现在你不需要深入探讨这个问题。但你需要防止内存泄漏。iTunes Store 拒绝你的应用最常见的原因之一就是内存泄漏。这对目前来说太复杂了，你的大脑已经很疲惫。只需知道，你使用的\
  \ `alloc` 意味着你现在需要释放内存。所以在深入后续章节的代码时，自己写一条注释作为提醒。\n\n`//释放对象`\n\n然后，通过键入以下代码实际释放它：\n\
  \n`[Output release];`\n\n```\n- (IBAction)button:(id)sender {\n    NSString *Name\
  \ = textBox.text;\n    NSString *Output = Nil;\n    Output = [[NSString alloc] initWithFormat:@\"\
  %@ says: 'Hello World!\", Name];\n    label.text = Output;\n    [Output release];\n\
  }\n```\n\n\n\n#### 第五步：关闭键盘\n\n当用户输入姓名并点击“完成”按钮后（参见图 3-12 的右侧图片），你需要添加一小段代码来确保键盘被关闭。\n\
  \n你可以通过实现一种名为`textFieldShouldReturn`的特殊委托方法来实现这一点。现在，你无需担心委托、第一响应者等概念。你只需要知道，这段代码会重新指定第一响应者，也就是你的键盘和当前处于活动状态的文本字段（用于输入姓名），然后将其保存在你的工具包中，以便在你需要清除键盘时重复使用。\n\
  \n```\n- (BOOL) textFieldShouldReturn:(UITextField *)theTextField{\n    [textBox\
  \ resignFirstResponder];\n    return YES;\n}\n@end\n```\n\n好了！你的代码部分完成了！\n\n我希望你为自己感到自豪！你让我引导你穿越了\
  \ Objective-C 代码的一些险滩。即使你感觉自己并未完全搞懂这些代码，那也没关系。Objective-C 是一门极其困难的语言，而你能坚持读到此处，已经非常了不起了。请记住，随着你做得越来越多，一切都会融会贯通，变得得心应手。对于那些已经按照我呈现的方式理解了你目前所完成工作的人，恭喜你们！\n\
  \n![images](img/00101.jpg)\n\n**图 3-30.** 编写委托方法 `textFieldShouldReturn`。\n\n图 3-30\
  \ 展示了已完成按钮方法和正在借助 Xcode 代码补全功能输入的 `textFieldShouldReturn` 方法。完成后，你的编码工作就结束了。耶！\n\
  \n![images](img/00102.jpg)\n\n**图 3-31.** 确保你将运行到正确的目标。\n\n首先，确保你已经保存了所有内容。现在，如果你上次是将应用运行到你的\
  \ iPad 或实体 iPhone 上，那么你需要确保将“目标”更改为 iPhone 模拟器，如图 3-31 所示。\n\n![images](img/00103.jpg)\n\
  \n**图 3-32.** 让我们运行它！\n\n你在这一章付出了很多努力，现在是时候看看你的劳动成果了。点击“运行”按钮，如图 3-32 所示，让我们看看你的应用启动起来！\n\
  \n![images](img/00104.jpg)\n\n**图 3-33.** 应用的四种状态。\n\n如果你使用的是自己的图片，那么你的背景图里会显示你的图片。从图\
  \ 3-32 的左侧开始，向右移动：\n\n1.  第一张图片显示的是提示用户输入姓名的文本框。\n2.  一旦点击文本框，文本消失，键盘出现。\n3.  第三张图片显示了用户点击“完成”按钮后的应用状态。\n\
  4.  最后一张图片展示了你所有辛勤工作的最终成果，当用户点击“点我”按钮时就会出现。恭喜你！\n\n### 深究代码\n\n在这些回顾中，我们将重温一些我们写过的代码，我会引用熟悉的代码，并更详细地解释这些过程。在这里，我将向你介绍一些更专业的术语，你将在后续章节以及与其他程序员交流时用到它们。\n\
  \n考虑一下这个类比：在 `helloWorld_01` 和 `helloWorld_02` 中，我教你如何上车、点火、踩油门、以及在前行时掌握方向盘。在 `helloWorld_03`\
  \ 中，我给了你类似的指引，但当你驶向目的地时，我解释了汽车是如何混合动力工作的，它既有汽油部件，也有电力部件。我们讨论了类和方法、字符串、输出口和动作。\n\n\
  现在你已经到达了目的地；你已经完成了 `helloWorld_03`，我将打开引擎盖，向你展示当你踩下油门时，它是如何将汽油泵入发动机，或者有时是如何使用电动机的。当你查看引擎盖下时，我会告诉你这些部件的位置。然而，当你读到本书末尾，查看引擎盖下并深究代码时，我将会描述化油器喷射到活塞中的汽油量、电动机的确切扭矩和热量散发等等。猜猜看——你到时候就能应付自如了！\n\
  \n关于这一节，最后一点非常重要：“深究代码”这一节，我鼓励你阅读，但不求完全理解。即使你只理解了部分内容，也没关系。当然，如果你碰巧完全掌握了该主题的所有细节，那当然很好。然而，我建议你以轻松的心态阅读每章结尾的这些章节，因为：\n\
  \n-   我收到了本书第一版读者的数百封邮件，他们表示，知道可以在阅读时放空大脑，不必有理解代码的压力，这对他们来说真的很有帮助。\n-   此外，我的学生们也很喜欢我在每堂课结束时，让他们关掉\
  \ Mac，放下笔，进入禅定和放空状态，只是随意地听我讲解。曾有学生敲开我办公室的门，用各种生动的方式告诉我，这种“禅定”和“放空”的方法对他们真的有效。\n\n\
  请注意，我的研究领域是神经系统急性脑损伤，专攻大脑和神经互联性。这种先连接神经元，然后在大脑放松时注入更深层的关联连接的方法，是我多年来一直发展的。所以，我希望你能借鉴我先前读者和学生们对此事的看法，并吸收我的理论。\n\
  \n> **注：** 成为一名言辞流利、知识渊博、财务上成功的程序员，需要神经上的跨越。这种跨越发生在你的大脑处于吸收新数据的状态下，且下丘脑不会释放污染神经元建立新连接能力的焦虑激素，从而允许将逻辑和代码与本体论推理联系起来。\n\
  \n所以，放空你自己，进入禅定状态，以一种冥想般的、无所畏惧的心态去阅读。当那个声音说：“你根本就没理解”，你要说：“没关系，刘易斯博士说了可以这样，现在走开吧！”你将用这种禅定和放空的心态来阅读以下内容：\n\
  \n-   Nibs、Zibs 和 Xibs\n    -   实例与实例化\n-   方法\n    -   实例方法与类方法\n-   头文件\n-   检查器栏\n\
  -   NSString 字符串\n-   内存管理\n\n\n\n### Nibs、Zibs 和 Xibs\n\n还记得在图 3–5 中，我让你打开 nib\
  \ 文件时的情况吗？你可以看到它写的是“xib”，更令人困惑的是，少数开发者称其为“zib”文件。忽略它们就好，把 xib 文件读作“nib”。在丹佛最近举行的\
  \ 360iDev iPhone 开发者大会上，大多数演讲者明确地将 `.xib` 文件称为“nibs”而非“zibs”。但无论我们如何称呼它们，理解这些文件的本质对我们来说都很重要。它们是什么？我们需要它们吗？你需要知道它们如何工作吗？\n\
  \n你还记得吗？在步骤 5 的图 3–5 中，当你点击那个 nib 文件时，是如何打开 Interface Builder 视图的？正是在这里，你看到了视图，并开始将项目拖放到你的视图设计区域。这到底是怎么回事呢？\n\
  \n实际上，当你从 Cocoa 或 Objective-C 的层面检查 nib 文件时，你会发现它们包含了激活 UI（用户界面）文件所需的所有信息，将你的代码转化为图形化的\
  \ iPhone 或 iPad 艺术作品。你还可以将不同的 nib 文件连接起来，创建更复杂的交互，正如你将在本书后面看到的那样。但为了继续学习，你需要在词汇表中添加两个词：“实例”和“实例化”。\n\
  \n- **实例**：这些文件中存放的所有信息，都是为了能够创建你输入的按钮、标签、图片等项目的实例。这一系列指令被放置并保存到你的 nib 文件中，最终形成用户界面。代码和指令共同变得真实，并被用户感知——无论是看到、听到，甚至触摸到。\n\
  - **实例化**：还记得在步骤 29 和图 3–29 中，我解释过你会看到方法 `- (IBAction)button:(id)sender{…}`，它看起来很像你在图\
  \ 3–22 到图 24 中从 Interface Builder 将动作拖拽到你的头文件时所实例化的那个动作吗？实际上，“实例化”这个词在你首次保存新项目时，有时也会以类似的方式使用。计算机实例化——使其变为现实并向你展示证据——一个通过分配一组子文件而创建的项目实体。在\
  \ `helloWorld_03` 项目中，你看到了在步骤 27 中，我要求你查看那些颜色变为深灰色的 nib、头文件和实现文件？那么，这些文件是怎么来的呢？是你编程或创建的吗？不，是\
  \ Xcode 在你创建项目时实例化了它们。Xcode 为你的项目赋予了“胳膊和腿”：两个 AppDelegate 文件和两个 ViewController 文件。\n\
  \n> **注意**：你现在正在操纵这些“胳膊和腿”来做一些很酷的事情，我们称之为应用，并在 iTunes 商店中销售它们。\n\n当我们告诉计算机如何以及何时获取一些内存，并将其留出用于某个特定进程或一系列进程，当所有参数都满足时，用户就能体验到这些数据（即内存中分配的任何内容），我们就说我们“创建了某个事物的实例”。有时，我们将这些描述和指令的集合或文件称为类、方法或对象。在这次代码挖掘过程中，这些术语可能看起来混在一起，像是同义词，但事实并非如此。随着你继续阅读，你会理解每个术语都是一个独特的编码工具或装置，每个都用于特定情境，并以语法正确的方式与其他实体相关联。\n\
  \n当我们说你在 nib 文件中创建了按钮和标签的实例时，我们真正想表达的是，当你运行代码时，计算机内存中由地址标识的特定部分，将负责处理事务，以生成你设计的用户体验。每次你的应用在\
  \ iPhone 或 iPad 上启动时，界面都会由 nib 文件中的编排指令重新创建。考虑一下与图 3–9 中所示动作相关联的 nib 文件。你从库中拖了一个按钮到视图窗口，因此你创建了这个按钮的一个实例。如果有人问你这是什么意思，你可以直视他们的眼睛，带着锐利而神秘的眼神说：\n\
  \n> > “通过创建这个按钮的实例，我指示计算机在适当的 `.xib` 文件中预留内存，当我的应用启动时，它会按照我的精确意图出现并与用户交互。”\n\n哇！\n\
  \n#### 方法\n\n接下来我想更深入探讨的概念是方法。就像我对 nib 文件所做的那样，这次我只给你一个高层次的概述。你已经相当广泛地使用了方法，所以我只需告诉你你做了什么。\n\
  \n查看图 3–23，在你将按钮拖到你的头文件后，你将其从输出口改为动作，并点击了连接按钮。然后你看到一段代码的实例出现了：\n\n```\n- (IBAction)button:(id)sender\n\
  ```\n\n我随后建议，为了让事情更清晰，你可以将方法命名为 `monkey`，使其变为：\n\n```\n- (IBAction)monkey:(id)sender;\n\
  ```\n\n在这里，你指示计算机将一个动作与按钮关联起来。\n\n- 这段代码中的第一个符号是减号（`-`）。它表示 `monkey` 是我们称之为实例方法的东西。\n\
  - 另一方面，如果你在那里输入了加号（`+`），比如 `+ (IBAction)`，我们就会称其为类方法。\n\n一个符号（向处理器）宣告一个实例，而另一个符号宣告一个类。不过，这两个语句的共同点是方法\
  \ `monkey`。此外，仅凭这个名称，你就可以看出这是一个将在 Interface Builder 中执行的动作。没错，这就是 `Actions` 前面的\
  \ `IB` 的含义。明白了吗？史蒂夫·乔布斯在他设计 NEXT 电脑上的 Cocoa 和 Objective-C 时，他对自己说，他想要 `Actions`，并称它们为\
  \ `IBActions`，以便提醒他自己和其他使用他代码的开发者，当我们输入 `IBAction` 时，它是为 Interface Builder 中使用的\
  \ `Actions` 准备的。\n\n考虑一下这个类比：程序员说，“这是一个能帮助你画一所漂亮房子的应用。”这是一个头文件类型的声明。然后，程序员输入具体的指令，说明房子将如何建造，如何与景观融合/相对，背景是什么样的天气，等等。“在屏幕底部三分之一处画一条略微弯曲的地平线，在其中间位置放置一个\
  \ 4×7 的矩形，矩形上方是一个底边长度为……的梯形，”等等。这些具体的操作指令属于实现文件，因为它们描述了绘制房子的实际动作——即方法。\n\n因此，为了将你的按钮连接到一个名为\
  \ `hello` 的方法，你添加了如下代码，如图 3–24 所示：\n\n```\n- (IBAction)hello:(id)sender;\n```\n\n\
  这创建了你的 `hello` 方法的一个实例。然后，你在内存中创建了一个位置来执行 `hello` 方法内部的代码。\n\n\n\n##### 头文件\n\n\
  看看这段代码，不要从方法的角度，而是从它作为头文件的维度以及它与其实现文件的关系来审视。我希望你回到那个时间点：在你将那些我称之为“好东西”的控件拖放到头文件之后。回顾图\
  \ 3–24，我希望你更多地关注粗体文本。\n\n**注意：** 在代码中命名时，你将使用缩写 `UI` 来表示“用户界面”（User Interface）。你将使用缩写\
  \ `IB` 来表示“Interface Builder”。\n\n![图片](img/00105.jpg)\n\n这里有两件事需要注意。首先，`@` 符号与\
  \ Xcode 的最核心部分通信，它把你的代码转换成动作；其次，它要宣告一些至关重要的事情。事实上，我们把任何以 `@` 开头的语句称为“指令”。这个 `@interface`\
  \ 指令告诉 Xcode，你有关于 `helloWorld_03` 的界面内容，并且具体细节将包含在花括号 `{}` 内。\n\n在图 3–16 中，你开始将输出口拖入代码之前，请注意左花括号\
  \ `{` 内部是空的！你当时还没声明任何东西，对吧？你知道自己想做什么，所以你通过创建你的 `IBOutlet`s（Interface Builder 输出口）来写入你的\
  \ `UILabel`s（用户界面标签），并为你的按钮关联一个单独的动作，从而用 `@interface` 指令引起了编译器的注意。\n\n##### 检查器栏\n\
  \n回顾第 8 步，图 3–8，在简要解释检查器栏时，我曾说过我们会更深入地探讨它。所以，说到做到，这里提供一些关于检查器栏如何设置的见解。\n\n![图片](img/00106.jpg)\n\
  \n**图 3–34.** 聚焦检查器栏。\n\n在图 3–33 中，我重现了我在黑板上向课堂展示检查器栏的方式。随着你熟悉 Xcode 4 环境，你会发现自己在编码的任何阶段都会使用检查器选择栏来选择所需的工作区。现在，让我们聚焦于最密集的视图：实用工具视图。点击实用工具视图，如图\
  \ 3–33 右上角所示，你会看到我创建了一个放大版的检查器选择栏，其子菜单位于面板的左侧。从顶部开始：\n\n-   **文件检查器**：用于管理项目中的文件属性，例如名称、类型和路径。\n\
  -   **快速帮助**：望文生义。\n-   **身份检查器**：提供对深层内容的访问，例如类名、访问权限和标签。\n-   **属性检查器**：用于调整对象可用的属性。\n\
  -   **尺寸检查器**：允许你调整界面对象的初始大小、位置和自动调整大小。\n-   **连接检查器**：允许你查看界面对象的输出口和动作。\n-   **绑定检查器**：用于配置视图对象的绑定。\n\
  -   **效果检查器**：用于调整选定对象的动画协议，例如过渡、淡入淡出和其他视觉特性。\n-   **文件模板**：你可以从资源库拖到项目导航器中的常见模板。\n\
  -   **代码片段**：类似于剪贴画，但面向编码者——你可以通过拖拽到文件中使用的源代码片段。\n-   **对象**：通过直接拖拽到 Interface Builder\
  \ 编辑器窗口中的 nib 文件来使用这些界面对象。\n-   **媒体文件**：顾名思义，是可以直接拖拽到 Interface Builder 编辑器窗口中\
  \ nib 文件的图形、图标和声音文件。\n\n##### NSString\n\n回顾一下，并更深入地探讨一下你实现文件中的 `NSString` 语句，在你编写它的时候，我已经详细地讲解过了。这里有五个与你关联\
  \ `NSString` 的术语：\n\n-   `Output` 是你的返回值：`Output = [[NSString alloc] initWithFormat:@\"\
  %@ says: Hello World!\", Name];`\n-   等号的右边是消息：`Output = [[NSString alloc] initWithFormat:@\"\
  %@ says: Hello World!\", Name];`\n-   `NSString alloc` 是接收者：`Output = [[NSString\
  \ alloc] initWithFormat:@\"%@ says: Hello World!\", Name];`\n-   `initWithFormat`\
  \ 是方法名：`Output = [[NSString alloc] initWithFormat:@\"%@ says: Hello World!\", Name];`\n\
  -   `@\"%@ says: Hello World!\"` 和 `Name` 是参数：`Output = [[NSString alloc] initWithFormat:@\"\
  %@ says: Hello World!\", Name];`\n\n##### 更多关于内存管理\n\n在步骤 29 结束时，图 3–29，“第四步：清理工作”中，我们简要地讨论了\
  \ `alloc` 以及你如何在应用的关键时刻分配和释放内存。我想让你最后再看一次你为按钮编写的实现代码，但要站在内存泄漏和管理的角度来审视。\n\n![图片](img/00107.jpg)\n\
  \n看上面，你可以看到你首先为字符串分配了一些内存。这由右上角标 ^(+1) 表示，表明你已经上升了一个层级并正在分配内存。每当你上升一个层级，你也需要下降一个层级，通过释放该内存，如\
  \ release 处的 ^(−1) 所示。这非常简单——当你 `alloc` 时，你需要 `release`。在 Objective-C 中，这被称为引用计数。我发现学生们感到困惑的地方是，在他们\
  \ `alloc` 之后，有时还会执行一个 `retain`。如果你确实发现在分配内存后还需要保留它，那么将其视为 [alloc+1] + [retain+1]，这意味着你已经上升了两个层级，而不是一个。这意味着你需要释放两次，而不是一次。总结一下：\n\
  \n-   [alloc^(+1)] 需要 + [release^(−1)]\n-   [alloc^(+1)] + [retain^(+1)] 需要 [release^(−1)]\
  \ + [release^(−1)]\n\n#### 好了！\n\n你还在这里！太棒了！至少休息 6 个小时，别因为没完全掌握你在这里钻研的所有代码而焦虑。希望你享受了禅定与专注的美妙时刻。我们第\
  \ 4 章见。\n\n## 第 4 章\n\n\n\n"
- "# 多图形按钮与标签\n\n在本章中，我们将共同完成第四个程序，是时候加快一点节奏了。如同第 3 章那样，如果你还记得之前示例中反复描述的大部分步骤细节，那么你只需查看屏幕截图并实现代码即可。每个步骤对应的图示会减少，但操作步骤会增多；我们将使用第\
  \ 3 章介绍的短信息流。\n\n此外，与第 3 章一样，完成程序后，我们将在“深入代码”部分进行代码审查。首先，我们会回顾第 3 章该部分讨论的一些相同方面和概念，然后聚焦于一些新代码。我们不仅会深入一些，还会拓宽视野，思考与这一深层分析相关联的其他计算概念。\n\
  \n你可能还会注意到第 4 章在风格上的变化，因为我们将摆脱前几章使用的“初级”语言。在图片指引上，我也会减少手把手的指导。我将开始逐步减少箭头指引——所有信息都在那里，所以如果你不能立即在文本中找到我所指的内容，就需要稍加思考，自己寻找。把它看作一个练习，迫使你的神经元通过小步前进建立一些关联。那么，让我们加快节奏——更快一点，更高级一点，并使用更多的专业术语。\n\
  \n最重要的是，当我们进行到第 29 步时，我们将花二十分钟的课堂时间打开引擎盖，真正动手深入研究一些关键的代码概念，你需要理解这些概念才能继续阅读本书。别担心，我会让它变得简单。\n\
  \n再次强调，如果你没有完全掌握每个概念和技术，这完全没关系！放松心情，享受下一个示例。但在开始我们的第四个应用之前，我们先快速浏览一下路线图。\n\n###\
  \ 路线图回顾\n\n到目前为止，我们已经完成了三个在 iPhone/iPad 内部说“Hello world!”的示例。你已经有机会熟悉了编程应用背景下的创作过程：带着一个想法进入，带着一个切实可行的工作产品出来。我曾多次要求你忽略那些我判断可能会让人分心或望而生畏的繁重代码。你可能也注意到，当你确实尝试理解这些较复杂的代码时，它们会以一种奇妙而混乱的方式变得有意义。那么，随着我们的进展，我们将让未知的“混乱”不再那么令人不安。\n\
  \n在解决这个问题之前，让我也让你放宽心：就我们的编程语言 `Objective-C` 而言，我还没见过哪个高级程序员真的认识每一个符号和命令。就像其他行业一样，人们往往会在自己的特定领域和专长方向变得非常精通（例如，将`谷歌地图`集成到游戏或应用中）。\n\
  \n我喜欢打这样一个比方：汽车修理工以前能够完全拆解一个发动机，然后再把它装回去——通常比原来更好。如今，汽车修理工非常专业化，只有少数人知道如何完全拆解并重组一辆特定的现代汽车。我们有福特混合动力发动机的专家，或者丰田普锐斯电路的专家，或者大型卡车的鼓式制动器专家，等等。这完全没问题！\n\
  \n这与你现在的学习过程类似。你刚刚成功编写了三个应用，手上沾满了“油污”。现在，如果一切按计划进行，当你进行到第 29 步时，你将更深入地探索，满怀信心地走向未来。根据经验我知道，如果学生被过于复杂或技术性的内容吓倒或压倒，他们的自信心可能会受挫。我发现，如果学生知道自己的方向，并且知道那些艰难的路段不会变得过于可怕或危险，他们就能应对前进道路上的坎坷。\n\
  \n### helloWorld_04: 一个基于视图的应用\n\n此时此刻——为自己感到高兴吧！你已经相当深入`Objective-C`的森林了。如果你迷路了，请记住，除了我在本书中提供的信息（包括各种截图）之外，我还在我的网站上为你提供了截屏视频。你可以使用短网址，前往下面指出的\
  \ `rorylewis.com`，点击 `Xcode 4` 图标，![images](img/00108.jpg) 然后进入视频教程或下载页面：\n\n![images](img/00109.jpg)\n\
  \n> ![images](img/00110.jpg)\n\n图 4–1\\. 创建或下载三个 `.png` 图片文件：一个底层图、一个顶层图和一个桌面图标。将它们全部保存到简洁干净的桌面上。\n\
  \n1.  像往常一样，让我们从一个干净的桌面开始，只保留四个图标：你的 `Macintosh HD` 和三个图片文件（如图 4–1 中的图标所示）。我相信你现在已经明白，我认为保持桌面整洁至关重要，并且我希望鼓励你持续磨练你的组织思维。使用我们熟悉的快捷键，关闭所有程序。欢迎你下载这些图片（从\
  \ `ow.ly/5l1w8` 的下载页面或 `ow.ly/5l1wS` 的视频页面），它们将成为本项目的关键构建块，但我们更希望鼓励你寻找并准备自己的图片。这样，你对这个任务会更有热情。此时你有两个基本选择：从上述链接下载图片，或者准备你自己的图片。假设你愿意花功夫创建三个自己选择的独立图片文件，请注意以下指南。\
  \ ![images](img/00111.jpg)\n\n图 4–2\\. `STAIR.png`；这是背景图像——即底层图。\n\n2.  第一张图片 `STAIR.png`\
  \ 的尺寸，如图 4-2 所示，将是 iPhone 标准尺寸：宽 320 像素，高 460 像素。这将是两个图像的底层，所以我们称之为背景层。我们的背景，是科罗拉多大学科罗拉多斯普林斯分校工程楼后出口台阶的照片。我们将使用这张图片作为伊曼努尔·康德的照片背景——他是有史以来最伟大的哲学家，他的哲学构成了制订宪法的众多开国元勋思想的基础。对我们来说更重要的是，他是开始绘制数学逻辑与言语词汇之间平行关系的人。程序运行时，背景将显示，一旦点击按钮，伊曼努尔·康德的照片就会出现在楼梯顶部。快速浏览一下图\
  \ 4-39。多好啊——伊曼努尔·康德决定回到大学了！这就是我们的场景：在编程中，你会经常遇到这样的情况：你希望用户看到熟悉的背景，然后当按下按钮时，某个不寻常或意想不到的人（或物）突然出现。这个\
  \ `helloWorld_04` 将教会你这一点。 ![images](img/00112.jpg)\n\n图 4–3\\. 这是修改后的顶层图像，它将覆盖在背景之上。\n\
  \n\n\n3.  为了创建第二张图像（我们称之为顶层），请复制背景图层照片（在我的示例中是 `STAIR.png`）。然后裁剪此副本，创建一个尺寸精确为 320\
  \ × 299 像素的图像。是的，我知道这个高度数值有点奇怪——但请相信我！现在你得到了一张大致呈方形的、背景照片底部三分之二的副本。接下来，在上面粘贴一张局部图像——通常是从某个有趣或不同寻常的物体中裁剪出来的部分。这将生成类似图\
  \ 4-3 中的图像：伊曼努尔·康德出现在背景场景前。这个修改后的顶层当然会保存为 `.png` 文件。这样，你最终会得到一个准备好的顶层，它由原始背景照片的底部区域以及粘贴在上面的某个有趣人物或物体组成。你大概能猜到，我们将编程让计算机从背景图像开始，然后根据一些用户输入，插入顶层——当然，要确保底边完美对齐。这将营造出一种幻觉，仿佛我们那位有趣的客人或物体突然凭空出现。我们的顶层不会影响背景上半部分的空间；我们将这个区域保留给文本，稍后也会指示计算机插入文本。我们之所以采用这种方式，是因为\
  \ iPhone 和 iPad 不支持 `.png` 透明度。![images](img/00113.jpg)\n\n**图 4-4.** 这是屏幕图标的图像！\n\
  \n4.  第三个图像文件是你选择的图标。正如前一章所述，你可能想要自定义你的图标。在我的示例中，我从伊曼努尔·康德的照片中截取了一部分脸部，并将其放入“图标”文件中，如图\
  \ 4-4 所示。一旦你拥有了全部三张图像——底层、顶层和图标——将它们保存到你的桌面上，这样看起来就会类似于图 4-1 中显示的我的桌面。\n\n**注意：**\
  \ 请记住，iPhone 的图标建议尺寸是 57 × 57 像素，如图 4-4 所示。但请注意，如果你的应用是仅限 iPad 的应用，那么你需要制作一个更酷、稍大一点的图标，尺寸为\
  \ 72 × 72 像素。请务必留意这些尺寸要求。\n\n![images](img/00114.jpg)\n\n**图 4-5.** 按下 `![images](img/00031.jpg)![images](img/00032.jpg)N`，然后从“新建项目”窗口中选择“单视图应用程序”。\n\
  \n5.  现在，就像你在第一个示例中所做的那样，启动 Xcode，使用键盘快捷键 `![images](img/00031.jpg)![images](img/00032.jpg)N`\
  \ 打开一个新项目。你的屏幕应该会显示“新建项目向导”，如图 4-5 所示。由于上一个示例，你可能会发现“单视图应用程序”模板默认已被选中。但如果你的“基于视图的应用程序”模板未被选中，请单击“基于视图的应用程序”图标，然后点击“下一步”按钮，如图\
  \ 4-5 所示。\n\n你可能会想，“基于视图的应用程序”模板通常用于帮助我们设计只有一个视图的应用，而我们刚刚创建了两个视图（楼梯图像和包含伊曼努尔·康德的修改版楼梯图像），所以应该选择另一个选项。这种推理看似合理，因为基于导航的应用程序使用多个屏幕以层次结构呈现数据。对于这个项目来说，那个选择似乎才是正确的，但实际情况并非如此。\n\
  \n我们将处理的仅是一个视图，我们会在其上叠加图像，而不是另一个视图。如果我们打算让一部分代码在一个导航窗格中，另一部分代码在其他导航窗格中，那么我们可能会选择基于导航的应用程序。但在当前这个项目中，我们将操控一个视图，并在其上叠加图像，而不是从一个窗格导航到另一个。本质上，我们是在用单个视图玩“障眼法”。\n\
