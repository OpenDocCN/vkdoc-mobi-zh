  \n当我们把所有界面组件与在 Xcode 中编写的代码整合之后，我们可能会进一步操作，调整与内存管理和效率相关的参数。但这在我们的故事中跳得太远了。\n\n###\
  \ 我们的路线图：使用 Xcode 和界面构建器\n\n很多时候，编程书籍的作者都会做同样老套的事情。首先，他们呈现一个非常简单的、随处可见的“Hello World”应用，然后立刻用密集的代码“轰炸”用户，导致大量读者和学生直接放弃。在使用\
  \ Objective-C（在 Cocoa 中运行）以及 iPhone 和 iPad SDK 的过程中，我不得不真正重新思考这个入门过程。我在这里确定了四个挑战：\n\
  \n*   教你“Hello World”，然后马上进入高级技术和 API 会适得其反。\n*   从众多在 iPhone 或 iPad 上向世界说 Hello\
