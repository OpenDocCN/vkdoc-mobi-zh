  \n30\\. 我们现在将编写 `myPos` 头文件的代码。我强烈建议你不要简单地像我视频里那样把它粘贴到你的头文件中。那样做你什么也学不到。跟着我做，你将学会如何编写代码。记住，`myPos`\
  \ 处理的是公共接口，在其头文件中，我们需要设置两个主要字段，即我们城市的名称和地理空间地址。城市的名称将存储在 `title` 所指向的地址上。每个城市的地理空间经纬度地址将由二维定位方法处理，并存储在一个我们将命名为\
  \ `coordinate` 的变量中。\n\n**注意：** `CLLocationCoordinate2D` 是一个结构体，它使用世界大地测量系统（WGS\
  \ 84）参考框架包含我们的地理空间坐标，该框架以其位置来自地心，并且要知道它存在 2 厘米的误差！\n\n当我们第一次打开 `myPos.h` 文件时，我们看到以下内容：\n\
  \n```\n#import <Foundation/Foundation.h>\n@interface myPos : NSObject\n@end\n```\n\
  \n我们要做的第一件事是通过输入 `#import <MapKit/MKAnnotation.h>` 来添加 MapKit。接下来，我们在给定的 `@interface\
  \ myPos :NSObject` 后面插入 `<MKAnnotation>`。每当我们需要在地图视图中使用注解相关信息时，都会使用 `MKAnnotation`\
  \ 协议。接下来，我们设置 `CLLocation` 类引用，通过输入 `CLLocationCoordinate2Dcoordinate` 来整合我们设备的地理空间坐标和海拔高度，这将使用一个我称之为\
  \ `coordinate` 的变量。我们还需要存储城市的名称，这将通过 `NSString` 在 `title` 中完成。最后，我们为每个城市的位置和标题创建\
  \ `@property` 语句。现在，你的 `myPos` 头文件代码将如图 10–30 所示，或如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <MapKit/MKAnnotation.h>\n\n@interface myPos : NSObject <MKAnnotation>\n\
  {\n    CLLocationCoordinate2D _coordinate;\n    NSString *_title;\n}\n\n@property\
  \ (nonatomic, assign) CLLocationCoordinate2D coordinate;\n@property (nonatomic,\
  \ copy) NSString *title;\n\n@end\n```\n\n**注意：** 在用于城市名称的 `@property` 中，它是一个字符串，我们使用\
  \ `(nonatomic, copy)`。我只想让你记住，在不被细节搞乱的情况下，作为一般规则，对字符串始终使用 `(nonatomic, copy)`。\n\
