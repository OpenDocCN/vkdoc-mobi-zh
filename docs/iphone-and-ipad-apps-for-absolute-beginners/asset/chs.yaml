  \ 修改为 `UIViewContentModeBottom` 后，你的应用将完美运行，如图 8–36 所示。\n\n### 深入代码\n\n到目前为止，Xcode\
  \ 中最常用的工具是在 Xcode 编辑器中设置断点。运行应用程序，然后查看代码在每个断点处的状态，可以说明某个变量是否被识别、它返回了什么等等。断点非常强大。要在一行代码上添加断点，请双击该行代码左侧的装订线，按住并点击“+”按钮。如果你不希望调试器在该断点处实际停止代码执行，请选中“Continue”复选框。许多更高级的\
  \ Apress Xcode 书籍（如 `Pro iOS 5 Tools`，如图 8–37 所示）都详细介绍了断点的使用方法。\n\n![images](img/00350.jpg)\n\
  \n图 8–37：`Pro iOS 5 Tools`\n\n`Pro iOS 5 Tools` 深入探讨了以下回顾中的主题，例如调试器控制台、LLVM 和组织工具。不过，这里先做一个简要概述，略过一些不属于本《绝对初学者》书籍范围的高级工具。\n\
  \n#### 调试器控制台\n\n下一个最重要且广泛使用的编码者工具是调试器控制台窗口。它是编码者与 GDB 进行通信的有效方式。你可以从 Xcode 的“运行”菜单中，通过按下\
  \ ![image](img/00031.jpg)![image](img/00032.jpg) R 来进入控制台窗口。你也可以从“方案”弹出菜单中选择“编辑当前方案”，然后在左侧栏的“运行”项下选择\
  \ LLVM 编译器或 GDB。我更倾向于使用 LLVM 编译器，因为所有新的 Fix-it 红色标记都在这里发挥作用（参见下一节）。对于本书中的大部分代码，LLVM\
  \ 就足够了。尽管如此，如果你仍想使用 GDB，可以转到“信息”面板，然后从“调试器”弹出菜单中选择你要使用的调试器。要查看输出并为 GDB 输入命令，首先确保你的输出窗口已打开，然后确保视图组的中底部处于启用状态。\n\
  \n\n\n### Fix-it\n\n假设你继续使用`LLVM`编译器，`Fix-it`会在你输入时扫描源代码，并用红色下划线和边距中的红色标记标出语法错误。你可以通过点击该符号阅读`Fix-it`消息，它会提供认为可能存在语法错误的原因。通常，对于较小的错误，`Fix-it`会自动修复你的代码。\n\
  \n### Documentation\n\n接下来我要介绍的工具因其易用性而被广泛使用，那就是`Xcode`的文档。你只需打开`Organizer`窗口（![image](img/00031.jpg)![image](img/00032.jpg)2），点击工具栏中的`Documentation`按钮，然后点击跳转栏进行上下导航。参见图\
  \ 8–38。\n\n  ![images](img/00351.jpg)  \n\n图 8–38\\. `Organizer`\n\n`Xcode 4.2`还为`Xcode\
  \ IDE`提供了在线帮助。可以通过点击文档导航器中`Xcode Help`旁边的展开三角形，或选择`Help` ![image](img/00027.jpg)\
  \ `Xcode Help`来访问。你会发现这些在线帮助文档大多附有视频。你还需要知道，许多`Xcode`的帮助文章也可以作为上下文相关帮助使用，如苹果网站`bit.ly/oY2jG9`所述。这意味着，你可以通过按住`Control`键并点击工作区或`Organizer`窗口中的任何主`UI`区域，从快捷菜单中访问帮助教程。\n\
  \n从`Xcode 4.2`开始，`Quick Help`比以往更加强大。现阶段我们只需按部就班地学习教程，但当你成长为一名程序员时，你会发现它的用处。按住`Option`键并单击即可打开`Quick\
  \ Help`，如图 8–39 所示。\n\n  ![images](img/00352.jpg)  \n\n图 8–39\\. `Quick Help`\n\n\
  ### Static Analysis\n\n`Xcode 4.2`中的`Static Analysis`允许你在工作区窗口内对代码进行分析、调试和编辑。只需在项目导航器中点击要调试的项目，然后选择`Product`\
  \ ![image](img/00027.jpg) `Analyze`。分析器会遍历你的代码，然后导航器会打开一个列表，列出它发现的问题。带有箭头的蓝色矩形会指向你的错误。\n\
  \n### 本章前瞻\n\n在第 9 章中，你将学习为`iPhone`和`iPad`编写一个应用，该应用结合了`iOS5`的两大强大工具：`storyboarding`和`MapKits`。这是一个简单的应用，但背后却蕴含着巨大的教学和学习曲线。你要构建的应用只需在一个预先给定的经纬度位置上放置一个图钉。其关键点在于将`storyboarding`和`MapKits`连接起来。\n\
  \n## 第 9 章\n\n## MapKit 与 Storyboarding\n\n自从构思这本书以来，我一直期待撰写关于`MapKit`框架和`Storyboarding`的章节。这一章以及接下来的两章将是我们共同努力的结晶。我们的旅程即将结束，以一个高潮收尾是再合适不过的了。我相信，将`MapKit`框架、`Storyboarding`、`TableViews`和`iTunes`整合起来不会让你失望。这并非易事。我们在过去三章中的旅程将如下进行：第\
  \ 9 章介绍`Storyboarding`和`MapKit`框架。第 10 章介绍`Storyboarding`、`TableViews`和`MapKit`框架。最后，在第\
  \ 11 章中，我们将探讨`Storyboarding`和`iTunes`商店（即你发布应用的地方）。我们稍后会详细讨论第 11 章，但可以这样说，我将向你展示最引人入胜的应用是如何整合`Storyboarding`、`MapKit`框架、`TableViews`以及互联网/`iTunes`商店的。\n\
  \n在本章中，我们将看到一些最酷、最成功的应用正是基于`MapKit`框架。我们将把这个框架置于`Storyboarding`平台之上，这将是一项巨大的成就。我之所以把这些概念留到最后，主要是因为这些主题需要一定的经验，以免让学生感到不知所措。我曾在一个坐满渴望学习的、大多是初学者的程序员的阶梯教室教授这门课程，我痛苦地了解到，当我屈从于学生们的热情，试图在学期中途教授`MapKit`时，我总能毫无例外地把全班带进死胡同。\n\
  \n尽管`MapKit`为我们提供了编写功能强大、生动有趣的应用的手段，但它也要求我们非常清楚并完全理解各种方法、类和框架。将这一应用与`Storyboarding`相结合更增加了挑战的难度。最初，本书的范围并不包含所有这些概念；但最终，我不可能写了这本书却把`MapKit`排除在外！\n\
  \n因此，在开始之前，我们需要坐下来审视一些东西。`MapKit`作为一个工具箱，是一套具有挑战性的实用程序和工具，但我们将介绍一些基础知识，并学习如何将它们与`Storyboarding`结合使用，以成功且富有创意地完成本章的示例。我们将首先讨论框架和类。然后，我们将看到`MapKit`无需我们编写任何代码就能实现什么。之后，我们将深入挖掘，看看其他程序员使用`MapKit`做了什么，并从中汲取经验。我们已经了解了`Storyboarding`，但现在我们要添加一些真正创新的代码。在磨练了我们对方法的理解，并对`MapKit`中包含的框架、类和其他`Apple`好东西有了相当程度的掌握之后，我们将从容地开始练习。\n\
  \n在本章的后半部分，我将在“探究我学生的`MapKit`代码”一节中献上一道丰盛的“餐后甜点”。我不会以一堆杂乱的技术参考资料作为结尾，而是会展示我的三位学生在与`MapKit`相关的项目中取得的成果。我希望，当我们看到这些有代表性的学生在完成我的课程后不久就能取得的成就时，我们都会更有动力去迎接下一个挑战。\n\
  \n我的目标是让我们所有人都能达到这样的境界：我已经用`Storyboarding`编写了一个基本的`iPad MapKit`应用，并且我理解如何充满信心地向前迈进，掌握更高级的目标，即在第\
  \ 10 章中协调`Storyboarding`、`TableViews`和`MapKit`框架。\n\n\n\n### 关于框架的一点介绍\n\n当史蒂夫·乔布斯被苹果公司解雇后，他创立了一家名为\
  \ NeXT 的公司。在 90 年代初期，他的公司生产了造型优美、线条流畅的黑色电脑，让我羡慕得直流口水。我的几位教授拥有一台 NeXT 电脑，我深知其强大功能。这家公司最深远的影响，并非他们生产了这些黑色流线型机箱，而是他们使用了一种名为\
  \ Objective–C 的语言。乔布斯发现，尽管用这种复杂的语言编程很困难，但它生成的代码能够非常优雅地与微处理器“对话”。那么，这与 MapKit 有什么关系呢？\n\
  \nNeXT 所做的是创建了由复杂 Objective–C 代码构成的框架，我们可以将其视为木匠工具箱中的工具。当我们使用 `MapKit` 时，就是在将一套与地图相关的工具引入我们自己的代码中——就像木匠可能有一套用于橱柜制作的工具，以及另一套专门用于制作精美家具的工具。这些专门的工具与屋顶木匠所用的工具会有很大不同。\n\
  \n为此，我们将把两个之前没用过的框架引入 `Xcode`。这就好比我们在第 1 章到第 8 章中，一直以地板和橱柜木匠的身份学习技巧；但今天，我们要去五金店为下一个项目——在墙壁和天花板中安装音视频设备——购置装备。因此，在继续下一个程序之前，我们必须先去购买两个全新的工具。其中一个新工具是\
  \ `CoreLocation` 框架，它能显示我们在地理上的位置。另一个工具是 `MapKit`，它能让我们以多种不同方式与地图进行交互。\n\n众所周知，用户与\
  \ iPad 和 iPhone 交互的方式，与以往任何设备都完全不同。在这些精巧设备问世之前，99% 的计算机交互都基于鼠标和键盘。从我们已经编程完成的示例中，我们在学习使用独特的方法和类来切换屏幕，并感知用户何时在屏幕上捏合、点击或滚动。现在，我们将在这个已经很强大的工具集中加入\
  \ `CoreLocation` 和 `MapKit` 框架。\n\n到目前为止，我们探讨的大部分编程都相对透明。然而，在本章中，情况不会那么显而易见了。我们必须高度集中注意力，才能跟上并理解\
  \ `MapKit` 是如何知道我们在地图上的位置的。我们将探究它如何追踪我们的手指交互，以及它如何根据与地图相关的各个屏幕和视图来确定我们的位置。\n\niPad/iPhone\
  \ 应用开发的核心领域之一是事件处理。由于这部分内容让我的许多学生感到困惑，因此我会刻意尽力让大家将注意力集中在我们需要了解的内容上。如果我们牢固掌握了框架和类的概念，就不会因为过度关注事件处理而感到困扰。我们可以通过这一点来了解这个主题的规模：当应用的一部分负责追踪与地图和\
  \ GPS 卫星的交互时，另一部分代码则必须时刻关注用户何时会将程序引导至一个新事件。\n\n### 重要须知\n\n关于 iPad 和 iPhone 领域中\
  \ Storyboard 及地图相关应用的基础，有三件重要的事情需要了解。第 9 章和第 10 章中的这两个关键应用依赖于四个重要工具：Storyboarding、`MapKit`、`CoreLocation`\
  \ 和 `MKAnnotationView` 类参考。正如我已经指出的，我们不会过多涉足这些复杂工具的工作原理，而是要实践决定何时在我们新扩大的工具箱中取用哪种工具的艺术。\n\
  \n除了其他功能，这些工具使我们能够利用 Storyboarding 轻松创造优美的技术流程，在我们的应用中显示地图，使用注释，处理地理编码（涉及经度和纬度），并通过\
  \ `CoreLocation` 与我们的位置进行交互。\n\n当我们要轻松地与谷歌地图交互时，我们将使用苹果提供的 `MapKit` 框架。当我们要获取位置或使用\
  \ GPS 卫星技术（配合谷歌地图）做酷炫的事情时，我们将使用 `CoreLocation` 框架。当我们要将所有功能整合到一起，并与用户无缝集成时，我们将把上述所有技术放到\
  \ Storyboarding 上。最后，当我们要在地图上放置大头针、创建引用、绘制 V 形标记，或者插入一张显示我们狗狗在地图上位置的照片时——我们将这些称为注释，因此需要使用\
  \ `MKAnnotationView`。\n\n### 预装的 MapKit 应用\n\n为了充分利用本章提出的新概念，并为拓展至全新的创意水平做好准备，我们首先来浏览一下\
  \ iPad 和 iPhone 上预装的现有应用。熟悉这些应用很重要，这样我们就能更容易地为自己创建的应用添加各种提示和附加功能——这些功能是在 `Apple.com`\
  \ 上描述的那些现成“地图应用”之上的。\n\n#### 找到自己\n\n假设我们在一个不熟悉的街区寻找附近的餐馆。使用 iPhone，我们可以在地图上精确定位自己的位置，从而找出从当前位置到目的地的路线。iPhone\
  \ 4 结合 GPS、Wi-Fi 和蜂窝基站，能够快速准确地找到我们的位置。当我们移动时，iPhone 会自动更新我们的位置。到达目的地后，我们可以放下一个大头针来标记我们的位置，并通过电子邮件或彩信与他人分享。\n\
  \n> ![images](img/00353.jpg)\n\n*图 9–1\\. 找到自己——iPhone/iPad 上强大的缩放地图功能。*\n\n####\
  \ 搜索位置\n\n我们需要一杯浓缩咖啡。最近的咖啡馆在哪里？搭载了 `MapKit` 框架的 iPhone 知道答案。只需在“地图”应用的搜索栏中输入“咖啡”，附近的咖啡馆就会立刻出现在地图上；全部用大头针表示。搜索功能同样适用于特定地址和商家名称。当我们找到目标时，点击大头针即可获取更多信息，例如电话号码、网址等。“大头针”会提取我们在\
  \ `MKAnnotationView` 中编程设定的所有注释信息。\n\n![images](img/00354.jpg)\n\n*图 9–2\\. 搜索位置——将此功能与视觉地图（带高亮路线）结合使用，或作为其替代方案。*\n\
  \n\n\n#### 切换视图，查看交通状况\n\niPhone 4 上的地图凭借其高分辨率视网膜显示屏，呈现出惊人的清晰和细腻。我们可以在`地图视图`、`卫星视图`和`混合视图`之间切换。我们甚至可以查看特定地址的街景。我们可以通过双击或捏合手势来缩放地图。iPhone\
  \ 地图还能提供实时交通信息，并用易于识别的绿色、黄色和红色高亮显示沿途的交通速度。\n\n![图像](img/00355.jpg)\n\n**图 9-3.**\
  \ 切换视图并查看交通状况——展示了内置指南针（在 3GS 机型上）的方向指示，标明我们正在注视的方向。\n\n我们不必再依赖电脑打印路线指引了。有了 iPhone，我们可以查看逐向导航列表，或沿着高亮显示的地图路线行驶，并通过\
  \ GPS 追踪我们的进度。我们可以选择步行或驾车路线，甚至可以通过公共交通路线查看下一班火车或公交的发车时间。`指南针`应用与内置数字指南针协同工作，告诉我们\
  \ iPhone 的朝向。此外，在`地图`应用中，指南针会旋转屏幕上的地图，使其与我们面对的方向保持一致。\n\n![图像](img/00356.jpg)\n\n\
  **图 9-4.** 路线导航与方向感知——这是在 iPhone/iPad 上运行`地图`应用时众多强大功能之一。\n\n![图像](img/00357.jpg)\n\
  \n**图 9-5.** `FlightTrack` 应用使用 `MapKit` 框架来追踪航班，并与登机口变更、时刻表以及任何给定机票上的其他个人信息进行集成。\n\
  \n### 酷炫且受欢迎的 MapKit 应用给我们带来启发\n\n在教授学生 MapKit 和 Storyboarding 的过程中，发生了一件有趣的事情：大多数学生自以为了解\
  \ MapKit，但实际上，他们根本不知道 `MapKit` 框架到底有多强大。因此，在深入学习本章之前，我们先花几分钟时间来了解一下 `MapKit` 框架的出色功能。\n\
  \n![图像](img/00358.jpg)\n\n**实例佐证：** 我的一位前学生最近开始在苹果公司从事 iOS 5 相关工作。她在 MapKit 方面表现得异常出色，而在\
  \ iOS 5 中可供她选择的众多部门里，她被安排到了 `MapKit` 框架团队。她告诉我的第一件事就是这个部门规模有多么庞大，尽管她热爱 MapKit，但她完全不知道有这么多团队、这么多才智超群的人都在共同致力于同一件事：那就是\
  \ MapKit！\n\n我发现，在向学生们展示预构建的应用程序后，再花些时间一起回顾一些超酷的第三方 MapKit 应用——以激发他们的灵感、让他们脑洞大开——这对他们大有裨益。所以，想象一下，你正和我们坐在一起，一同进行这次短暂的巡览。以下是我关注的\
  \ 11 款 MapKit 应用，其中一些我经常使用。\n\n-   `FlightTrack`：这款 MapKit 应用可以让我们管理国内外航班的方方面面，提供实时更新和精美的可缩放地图。我们可以接收关于登机口、延误和取消的通知，以便预订替代航班。该应用覆盖了超过\
  \ 5000 个机场和 1400 家航空公司。参见图 9-5。\n-   `Metro Paris Subway`：在光之城巴黎再也不会迷路。`Metro Paris\
  \ Subway` 是一款全面的巴黎出行指南，包含官方的地铁、RER（区域快铁）和公交地图及时刻表。结合了交互式地图和路线规划器，`Metro Paris Subway`\
  \ 能让我们在短时间内像真正的巴黎人一样穿梭自如。参见图 9-6。\n-   `MapMyRide`：我经常使用这款 MapKit 应用。我只需打开它，然后骑上自行车出发即可。它会记录我的速度、时间、里程以及坡度。它还会综合考虑我的年龄、性别和体重，然后告诉我燃烧了多少卡路里。（状态好的时候，我能消耗掉两个甜甜圈的热量！）关键是，当我只是气喘吁吁地骑行时，这个应用就计算出了所有这些数据！回到家后，我可以在电脑上查看骑行路线。它的主要工作都是通过使用和操作预装的\
  \ MapKit 应用完成的。\n-   `QuikMaps`：这款 DIY 地图应用允许你在涂鸦地图。它集成了多个平台，包括你的网站、Google Earth，甚至你的\
  \ GPS。\n-   `360 Cities`：虚拟现实中的世界：该应用展示了全球 50 多个城市的 360 度全景图，包含 6000 张全景照片。对于房地产经纪人、导游和探险家来说，这是一个完美的技术工具。\n\
  -   `Cool Maps`：世界七大奇迹：该应用展示了古代世界七大奇迹，以及现代世界七大奇迹，包括自然奇观、水下奇观、奇异奇观和本地奇观。程序员们将应用的触控和体验做得如此流畅，令我印象深刻。\n\
  -   `Blipstar`：这款应用将互联网上的商业网址转换为对应的实体店地址，并全部显示在一张酷炫的地图上。\n-   `Twitter Spy`：这个应用让人们可以看到正在给自己发推文的人当前所在的位置。没错——有点古怪和疯狂，但确实如此。\n\
  -   `Geo IP Tool`：此应用显示网络上企业的经纬度信息。然后为我们提供到达那里的最佳方式选择。\n-   `Map Tunneling Tool`：这纯粹是一个巧妙的趣味应用。想象一下，如果我们从任意地点垂直向下挖一个洞，我们会从地球的哪里冒出来？答案总是中国吗？\n\
  -   `Tall Eye`：这个应用会告诉你，如果你从地球上的某一点出发，沿着一条直线，始终保持在特定的方位角上一直向前走，你最终会到达哪里。\n\n![图像](img/00359.jpg)\n\
  \n**图 9-6.** `Metro Paris Subway`：解析地铁列车的 GPS 数据，有助于我们了解开往我们方向的列车何时会到达最近的车站。\n\n\
  ### myStory_01：一个单视图应用\n\n在这个练习中，我们将从一些满足基本需求的样板代码、启动屏幕和图标开始。然后，我们将在此基础上进行修改。我们将回顾本书中已经见过的一些相同的构建模块和文件，我们还将面临挑战，即根据本应用的性质，识别出哪些代码区域与我们之前遇到的几乎相同，哪些区域有所不同。\n\
  \n识别表层之下的模式和结构是我们每个人都拥有的强大能力，但我们程序员将其磨练到了更高的水平。我们将玩一个小游戏，看看我们是否能预判出一些接下来需要采取的步骤。\n\
  \n\n\n### 应用预备知识\n\n我们将考虑构建应用时会用到的大量组件。但在那之前，我想确保大家都牢固掌握一些重要的术语。对于这个项目，我们程序员需要回顾一些基础的地球科学和地理知识，这样才能让我们的代码发挥最大效用。\n\
  \n当我们指示计算机将一枚带有注释的图钉动画式地投放到某个特定位置，并给出\"经度\"和\"纬度\"时，我们需要真正理解这些术语的含义。纬度线是环绕地球\"水平\"\
  延伸的假想线，方向为自东向西（或自西向东）。这些无形的线以度、分、秒为单位进行测量，表示赤道以北或以南的距离。赤道是地球表面位于两极中间点的椭圆轨迹——而两极则是真实存在的点，由地球绕地轴自转所定义。纬度线通常被称为纬线（平行圈）。北极位于北纬\
  \ 90 度；南极位于南纬 90 度。\n\n经度线通常被称为子午线，是穿过南北两极的假想\"垂直\"线（椭圆轨迹）。它们同样以度、分、秒为单位进行测量，表示本初子午线以东或以西的距离。本初子午线是一条贯穿英国格林威治的任意标准线。与环绕全球\
  \ 360 度的赤道不同，本初子午线（0 度经度）是一个半圆（半椭圆），从北极延伸到南极；圆弧的另一半被称为国际日期变更线，定义为东经 180 度和/或西经 180\
  \ 度。\n\n对于我们的第 9 章应用，我用来说明在地图上\"投放图钉\"位置的示例是我在科罗拉多大学斯普林斯分校的办公室。当然，我们可以使用任何我们选择的位置。我们或许想用自家的地址，或者某个著名地标。要这样做，我们必须获取该位置的经纬度数值——最可能来自谷歌地图或直接的\
  \ GPS 读数。互联网上有许多网站可以找到这些坐标；图 9-7 展示了其中一种，网址是[`http://bit.ly/vGszNu`](http://bit.ly/vGszNu)。\n\
  \n![images](img/00360.jpg)\n\n图 9-7\\. Batchgeo（[www.batchgeocode.com/lookup](http://www.batchgeocode.com/lookup)）是众多可输入地址并获取其经纬度坐标的互联网站点之一。\n\
  \n这里有个想法——让我们从流程的终点开始，逆向思考一分钟。请直接跳到本章后面先预览一下应用的样子——如果一切顺利，它会返回什么样的结果。在图 9-34 中，我们看到一幅混合地图的图片，上面显示着一枚红色图钉落在一栋建筑物上。那就是科罗拉多大学斯普林斯分校的工程学院大楼；图钉正位于我的办公室上方。下一幅图带有我们称之为注释的内容，也就是文字。\"\
  Rory Lewis 博士\"是标题，\"科罗拉多大学斯普林斯分校\"是副标题。\n\n在教程的后面部分，我们会发现需要对标题和副标题多加注意。我们还可以控制图钉的颜色，并决定动画的风格——即图钉如何落到地图图像上。\n\
  \n这里正适合提醒大家本书的书名：《iPhone 和 iPad 应用开发入门》。深呼吸一下！即使我们都达到了学会有史以来最多知识的最大期望，即使我们都达到了对自身能力的最高期望——在如此短的时间内学会如此复杂的内容，我们仍然不会成为`MapKit`代码这个极具挑战性领域的专家！在这一点上，我的卑微目标不是熟练精通，而是合理的熟悉程度，以及对未来之路有所感知。\n\
