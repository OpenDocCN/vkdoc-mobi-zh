  \ 的项目，如图 4-8 所示。如前所述，我们正在从基础语言进阶，我会抛出一些更具体的技术术语。请注意，当文件夹高亮时，表示该对象已被选中。专注于你的光标所在位置——那是文件夹会做出反应的点。一旦它高亮，松开鼠标即可将对象放入。有时学生会感到困惑，因为看起来图像应该能够放入文件夹，但文件夹却没有高亮。这是因为只有当你拖着所有图片的鼠标悬停在文件夹上方时，文件夹才会打开或高亮。所以请记住，当你将对象拖到文件夹上时，专注于你的鼠标在哪里，忽略其他一切。![images](img/00118.jpg)\n\
  \n**图 4-9.** 勾选“将项目复制到目标组的文件夹中...”复选框。\n\n9.  将图像放入 `Resources` 文件夹后，系统会提示你定义该图像是始终与它在桌面上的位置相关联，还是与代码一同嵌入并随应用程序文件一起携带，如图\
  \ 4-9 所示。\n\n我们当然希望它是嵌入的，所以请勾选“为任何添加的文件夹创建组”复选框。同时，还要勾选“为任何添加的文件夹创建组”复选框。然后点击“完成”（或按回车键）。\n\
  \n![images](img/00119.jpg)\n\n**图 4-10.** 打开 plist 文件，以便我们关联图标图片。\n\n\n\n10. 我们创建了一个名为`icon.png`的图标图像文件。我们希望这个图标显示在\
  \ iPhone/iPad 上，而不是通用图标。为此，双击`Resources`文件夹中的`info.plist`文件，如图 Figure 4–10 所示。 \
  \ \n    ![images](img/00120.jpg)  \n    **Figure 4–11.** 选择图标文件的值单元格，并输入要关联为项目图标的图片名称。\n\
  \n11. 双击图标文件的值单元格，在空白处输入图标文件的名称：`icon`，如图 Figure 4-11 所示。然后保存你的工作。顺便提一下，plist（属性列表）是我们将在后续探索的另一个领域。现在，我们准备进入\
  \ Interface Builder，以连接和关联拼图中的各个部分。  \n    ![images](img/00121.jpg)  \n    **Figure\
  \ 4–12.** 打开你的 nib 文件。\n\n12. 点击你的 nib 文件，如图 Figure 4-12 所示，因为现在是时候开始构建项目所需的对象了。你应该已经看到了一个模式——首先将图像放入`Resources`文件夹，然后将对象拖到视图上，最后将对象与代码连接起来。\
  \  \n    ![images](img/00122.jpg)  \n    **Figure 4–13.** 将`UIImageView`定位到视图屏幕的底部边缘。\n\
  \n13. 当用户按下按钮时，顶层图像将覆盖在基础层之上。因此，我们希望以与之前相同的方式处理基础层。在库中向下滚动到 Cocoa Touch 项目文件夹，找到\
  \ Image View 图标。将一个 Image View 拖到视图框架上，如图 Figure 4–13 所示。  \n    ![images](img/00123.jpg)\
