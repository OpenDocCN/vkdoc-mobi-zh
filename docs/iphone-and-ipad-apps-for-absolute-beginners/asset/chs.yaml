  \ World 应用”作为基础，向学生介绍他们未来会反复使用的最关键的技能组合。就像我自己的学生一样，当您完成第 2 章的学习时，你将知道如何以以下各节所述的\
  \ 3 种不同方式运行您的第一个应用程序：\n\n> 2.1. iPhone 模拟器。\n> \n> 2.2. 运行于您 iPhone 环境下的 iPad 模拟器（伪\
  \ iPad）。\n> \n> 2.3. iPad 模拟器。\n\n在我的讲座中，我想通过不断创建应用程序来保持肾上腺素激增，并体验那种征服世界的极客快感。因此，我将\
  \ §2.4 至 2.6 留到周六的特殊课程，供那些想要创建自己的应用商店并赚钱的学生选修。同样，对于您，读者，我建议您只完成 §2.1 至 2.3 部分，然后直接进入第\
  \ 3 章，这样可以保持学习的连贯性。我们使用这组新工具的第一次冒险，将是在 Xcode 中基于视图的应用程序模板下向世界说声“Hello”。之后，我们将基于导航的应用程序模板，先以非常基础的方式，然后进行一些修改，再次向世界说声“Hello”。\n\
  \n除了本书中呈现的信息（包括各种截图）之外，我还为您提供了我自己逐一讲解本书每个示例的屏幕录像。相关的下载资源将帮助您完成本书的学习，此外还有课堂笔记、第三方资源以及相关的\
