  \ App Store (#9)，在那里，有钱的人 (#10) 会通过向 App Store 付费来下载你的应用。App Store 收到的款项会被分成两部分，其中三分之二归你，三分之一归苹果。\n\
  \n我们将运行创建的所有程序，将它们编译到一个或多个可能的位置——这些位置的图标位于中央灰色区域的右侧。主要位置将是 iPhone/iPad 模拟器。次要位置将是你的本地\
  \ iPhone 和/或本地 iPad。最后，我们可以使用`iTunes`将你的 iPhone 和/或 iPad 应用上传到 App Store，供人们购买或免费下载。这就是我们的目标。\n\
  \n图 1–21 中的两个核心对象，正如你现在所知，将是我们在本书中花费绝大部分时间的地方。我们将使用 Xcode 来输入代码，就像真正的极客那样。我会教你如何操控它的所有功能，例如文件管理、编译、调试和错误报告。界面构建器是苹果提供的一种很酷的方式，允许我们将对象拖放到我们的\
  \ iPhone/iPad 应用中。例如，如果你想要一个按钮，只需简单地将它拖放到虚拟 iPhone 或 iPad 上你希望它出现的位置。\n\n本质上，我们将使用\
