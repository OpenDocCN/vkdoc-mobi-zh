  \n但在进入实现文件之前，你需要做一些小小的整理工作。\n\n![images](img/00095.jpg)\n\n图 3–24. 关闭 Assistant。\n\
  \n24. 在这第三篇教程中，你可以看到 Xcode 4 已经完成了一些了不起的事情。然而，在我撰写本书时，许多沮丧的 Xcode 4 程序员正遇到一个令人抓狂的错误。在你进入下一步之前，我将告诉你如何避免这个错误。（当你阅读本书时，Xcode\
  \ 4 的这个古怪特性或许已被修复。）如图 3–24 所示，关闭检查器（Inspector），然后重新打开“工具”面板（Utilities pane）。\n\n\
