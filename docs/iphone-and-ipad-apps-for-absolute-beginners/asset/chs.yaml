  \ animated:YES];`\n  `[mapView setDelegate:self];`\n\n`myPos *ann = [[myPos alloc]\
  \ init];`\n  `ann.title = @\"Dr. Rory Lewis\";`\n  `ann.subtitle = @\"University\
  \ of Colorado at Colorado Springs\";`\n  `ann.coordinate = region.center;`\n  `[mapView\
  \ addAnnotation:ann];`\n\n22. 现在，逐行分析这段代码；\n\n- 首先，我们将其设置为标准类型，并启用缩放和滚动：`[mapView\
  \ setMapType:MKMapTypeStandard];`\n  `[mapView setZoomEnabled:YES];`\n  `[mapView\
  \ setScrollEnabled:YES];`\n- 然后，通过将所有坐标区域设置归零来重置之前的坐标：`MKCoordinateRegion region\
  \ = { {0.0, 0.0 }, { 0.0, 0.0 } };`\n- 接着，输入我们关注地点的坐标——对我来说，就是我在科罗拉多大学科罗拉多斯普林斯分校的办公室。我输入\
  \ `region.center.latitude = 38.893432;`（正值表示赤道以北）和 `region.center.longitude = -104.800161;`（负号表示本初子午线以西）。`region.center.latitude\
  \ = 38.893432;`\n  `region.center.longitude = -104.800161;`\n- 与这些参数相关，我们需要设置纬度和经度跨度\
  \ Delta `= 0.01f`。如果你的数学或物理知识有些生疏了，请记住“delta”指的是两个值之间的变化或差值。`region.span.longitudeDelta\
  \ = 0.01f;`\n  `region.span.latitudeDelta = 0.01f;`\n- 我选择在落点时为图钉添加动画效果：`[mapView\
  \ setRegion:region animated:YES];`\n- 接下来的操作是将视图控制器类设置为委托，该角色将处理 `mapView` 各框架之间的交互。我们通过以下方式实现：`[mapView\
  \ setDelegate:self];`\n\n**注意：** 关于落下的图钉及其附带的标签：我们需要让标注对象持有我们坐标的信息。我们的标注视图是与标注对象关联的视图类型。我们的标注对象需要遵守我们将在\
  \ `MKAnnotation` 协议中设定的所有规则。为了创建这个标注对象，我们必须定义一个全新的类，我们在创建 `myPos` 类时已经这样做了。\n\n\
  - 现在，我们需要实例化这个 `myPos` 对象并将其添加到我们的地图中。为此，我们添加一个委托函数，它将在地图上显示标注。我们首先让 `myPos` 命名一个指针，我们称之为\
  \ `ann`：`myPos *ann = [[myPos alloc] init];`\n- 接下来，我们设置标题，在我的例子中，我选择使用我的名字：`ann.title\
  \ = @\"Dr. Rory Lewis\";`\n- 我们类似地处理副标题：`ann.subtitle = @\"University of Colorado\
  \ at Colorado Springs\";`\n- 我们还希望图钉落在地图中心：`ann.coordinate = region.center;`\n-\
  \ 使用 `[mapView addAnnotation:ann];` 来引用上述所有内容。\n\n此时，我们将利用大多数 MapKit 地图使用的下一个样板代码方法。与\
  \ `viewDidLoad coord.rtf` 不同，`MKAnnotationView.rtf` 是一段我们都会使用的代码块。请阅读下面的注释：\n\n\
  **注意：** 我们很少更改像 `viewDidLoad coord.rtf` 这样的代码块，当这本书印刷时，它可能已经属于某个新函数或新类的一部分。原因是，当人们开始反复使用同一段代码，并将其称为“样板代码”时，差不多就是\
  \ Apple 决定从中提取一个新类或新函数并为其指定一个特定名称的时候。因此，继续使用它，并让 Apple 接收到这个信号吧！\n\n现在，关于这段代码，有几件事我们都需要了解：\n\
  \n- 它创建了一个委托方法，用于在缩放和滚动期间管理我们的标注。换句话说，它跟踪我们的位置——即使当用户滚动、放大或缩小地图时也是如此。\n- 它创建了一个静态标识符，用于控制我们的“队列含义”。如果它不能将我们的标注出队，就会分配一个我们选择的标注。我还包含了一段将图钉颜色更改为红色的代码。此外，我允许了标注气泡视图。\n\
  \n将 `MKAnnotationView.rtf` 粘贴到 `- (void)viewDidLoad` 方法之后，`- (void)viewDidUnload`\
  \ 方法之前。粘贴完成后，你的实现文件应如下所示。\n\n```\n#import \"ViewController.h\"\n#import \"myPos.h\"\
  \n```\n\n\n```objc\n@implementation ViewController\n@synthesize mapView;\n\n- (void)didReceiveMemoryWarning\n\
  {\n    [super didReceiveMemoryWarning];\n    // 释放所有未使用的缓存数据、图像等。\n}\n\n#pragma\
  \ mark - 视图生命周期\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [mapView\
  \ setMapType:MKMapTypeStandard];\n    [mapView setZoomEnabled:YES];\n    [mapView\
  \ setScrollEnabled:YES];\n    mapView.mapType = MKMapTypeHybrid;\n\n    MKCoordinateRegion\
  \ region = { {0.0, 0.0 }, { 0.0, 0.0 } };\n    region.center.latitude = 38.893432;\n\
  \    region.center.longitude = -104.800161;\n    region.span.longitudeDelta = 0.01f;\n\
  \    region.span.latitudeDelta = 0.01f;\n    [mapView setRegion:region animated:YES];\n\
  \    [mapView setDelegate:self];\n\n    myPos *ann = [[myPos alloc] init];\n   \
  \ ann.title = @\"Dr. Rory Lewis\";\n    ann.subtitle = @\"University of Colorado\
  \ at Colorado Springs\";\n    ann.coordinate = region.center;\n    [mapView addAnnotation:ann];\n\
  }\n\n- (MKAnnotationView *)mapView:(MKMapView *)mV viewForAnnotation:(id <MKAnnotation>)annotation\n\
  {\n          MKPinAnnotationView *pinView = nil;\n          if (annotation != mapView.userLocation)\n\
  \          {\n                  static NSString *defaultPinID = @\"com.rorylewis\"\
  ;\n                  pinView = (MKPinAnnotationView *)[mapView dequeueReusableAnnotationViewWithIdentifier:defaultPinID];\n\
  \                  if ( pinView == nil )\n                          pinView = [[MKPinAnnotationView\
  \ alloc] initWithAnnotation:annotation reuseIdentifier:defaultPinID];\n        \
  \          pinView.pinColor = MKPinAnnotationColorRed;\n                  pinView.canShowCallout\
  \ = YES;\n                  pinView.animatesDrop = YES;\n        }\n        else\n\
  \        {\n                  [mapView.userLocation setTitle:@\"我在这里\"];\n     \
  \   }\n    \n    return pinView;\n}\n\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n\
  \    // 释放主视图中的所有保留子视图。\n    // 例如 self.myOutlet = nil;\n}\n\n- (void)viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n}\n- (void)viewDidAppear:(BOOL)animated\n\
  {\n    [super viewDidAppear:animated];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n\
  {\n    [super viewWillDisappear:animated];\n}\n- (void)viewDidDisappear:(BOOL)animated\n\
  {\n    [super viewDidDisappear:animated];\n}\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
  {\n    // 返回支持的方向\n    return (interfaceOrientation != UIInterfaceOrientationPortraitUpsideDown);\n\
  }\n\n@end\n```\n\n### 故事板\n\n现在打开故事板文件。它看起来会与你在图 9–32 中看到的内容相似。\n\n![images](img/00385.jpg)\n\
