  \n4. 我看到学生们犯的最常见错误之一就出现在`Xcode`管理的这个简单阶段：他们忘记了勾选“如果需要，将项目复制到目标组文件夹”复选框。当您将文件导入电脑上的“Supporting\
  \ Files”文件夹时，如果您没有勾选“将项目复制到目标组文件夹”，一切都会正常运行，从而给您一种虚假的安全感。在这种情况下，即使`Xcode`被告知您的支持文件（如此例中的图片）位于您的“Supporting\
  \ Files”文件夹中，实际情况是，有一个小的备注在说：“老兄，我对这个不负责，文件不在这里，它还在所有者的桌面上！”所以，作为代码编写者的您，继续完成您的作业。每次您运行代码，并且`Xcode`调用以访问支持文件时，这个不负责任的“指针引用”家伙就一直说：“它不在这里——它还在您的桌面上！”于是您完成作业，一切运行良好。您微笑着压缩工作成果并发送给我。我给您零分，然后您哭了。为什么？嗯，这个不负责任的指针引用告诉我，您的引用文件在我的桌面上。不！它不在我的桌面上，它在您的桌面上，并且您因为疏忽大意、依赖指针引用先生而不是选择“复制项目”复选框，在\
  \ 10 分中得了 0 分。这样，您就解雇了指针引用，并将文件放入了您的程序中。这样，当您压缩并发送给我，我打开您的工作进行评分时，它就会打开，并且所有相关文件都在您想要的确切位置。因此，在将您的图片拖入“Supporting\
  \ Files”文件夹后，请勾选“将项目复制到目标组”复选框，如图 3-4 所示，然后点击“Finish”。现在您就处于良好状态，不会再被指针引用先生弄哭了。\n\
  \n注意：我能听到您在问：“那为什么还要给我们这个选项呢？”这里有一个简单答案，涵盖了大多数但并非所有情况。假设您正在设计一个游戏或程序，它拥有一个包含数百万个文件、电影、角色或玩家可能说的可能回复的数据库，并且这个数据库太大，无法容纳在\
  \ iPhone 或 iPad 上。在这种情况下，您就不会勾选“将项目复制到目标组”复选框，并让指针引用先生说：“哟，我对这一切都不负责，它不在这里，它在这个\
  \ URL 上：`http://www.wherever.com`。”\n\n\n\n#### 创建用户界面\n\n好了，现在我们准备开始将项目拖放到你的视图设计区域，也就是用户在查看\
