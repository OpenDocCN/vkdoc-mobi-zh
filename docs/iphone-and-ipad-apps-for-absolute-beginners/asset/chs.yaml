  图 9–53. CS–201 期末项目——Satish Rege 的应用显示了另一个嵌入式摄像头视图。\n\n### 缩小视野……纵观全局\n\n了解我们从何处来、现在在何处以及下一步要去向何方，这很重要。不要过于形而上学，但本章有点像我们人生的隐喻。五年前的你在哪里？去年呢？你买这本书的前一天呢？六个月后你打算在哪里？\n\
  \n这就是这个主题如此受欢迎的原因。人们喜欢知道自己在哪里！人们喜欢知道，也乐于被指导如何从“这里”到达“那里”。\n\n你知道男性通常不愿意停车问路吗？我知道我自己就是——因为我觉得自己应该知道要去哪里。当\
  \ GPS 出现时，我印象深刻。但当苹果公司通过 `Maps` 在我第一台 iPhone 中内置了导航功能时，我彻底震惊了。突然间，我既能咨询“先知”，又能同时维护我的男性自尊！\n\
  \n这就是力量，这就是权威……这也是我们所有人加入的同一场革命。既然你已经完成了这本书，并成功通过了这些练习——有些简单些，有些更难些——那么你已经在编程世界中走上了正轨。\n\
  \n正如我之前所说，我在本章中为你设定的目标并不高。然而，正如任何真正具有挑战性和有价值的事业一样，熟能生巧。如果你感到疲惫，但仍然对这些想法和可能性感到兴奋，那么我认为这完全是成功的——无论对你还是对我都是如此。\n\
  \n你们中的一些人可能在想本书未涉及的主题：加速度计、摄像头/视频、点对点协议、RSS 订阅、邮件客户端/POP 服务器等。如果这些领域让你感兴趣，我希望你的思绪已经在向这些新方向飞驰。那意味着你确实知道自己在哪里，也知道自己想去哪里。生活真美好！\n\
  \n## 第 10 章\n\n## 使用 Storyboarding 的 MapKit 与表格\n\n关于本章，我希望你记住五件事：\n\n\n\n- 续接第\
  \ 9 章：第 10 章将你在第 9 章所学的内容注入“兴奋剂”。你需要复习第 9 章的内容，然后直接进入第 10 章。在课堂上，我要求我的学生在二十分钟内跑完第\
  \ 9 章（如果他们想要成绩的话），然后，在立即通过电子邮件向我发送完成项目的截图后，我们就直接进入第 10 章。我建议，如果你在完成第 9 章后休息了几天，你也应该让自己重复第\
  \ 9 章几次，直到你可以在二十分钟内完成。即使你必须做 15 次，在尝试本章之前也要一遍又一遍地做。\n- 非易事：当你完成第 10 章时，你将真正完成一些值得骄傲的事情。是的，一方面，当我们在辩论学生达到某个水平时的“极客程度”时，学生们会放声大笑，但事实上，在完成这个应用后，你将能够找到一份`Objective-C`程序员的工作，或者至少能够与一位不相信你自称是绝对初学者的面试官进行像样的对话。苹果公司也并非如此，他们雇用了我的一个学生到库比蒂诺从事`iOS\
  \ 5`开发工作。八个月前，她还从未拥有过一台`Mac`，并且正在学习本书的第一版，所以请认真对待；这一章将成为你生命中的决定性一章。\n- 大局观：正如你读到这些文字一样真实，总会有那么一刻，这段代码会让你陷入困境，如果你在我的课堂上，我看到你不知所措、惊慌失措，我会走到你身边，提醒你注意大局观。在本章中，我会不断地让你回归大局观，简而言之，就是一个包含一个表格的故事板，表格中填充了许多城市名称。我们访问谷歌的服务器，获取每个城市的地理空间地址，当用户点击表格中列出的某个城市时，我们会沿着另一个转场（segue）跳转，该转场实例化一个`MapKit`，在该城市的中心放置一个图钉。\n\
  - 章节大纲：第 10 章的预备知识非常少，因为我希望你能无缝地保持从第 9 章到第 10 章的势头。我将解释帮助文件和视频的位置，如何选择使用它们，以及它们与以前帮助文件的不同之处。\n\
  - 不要放弃：第 10 章会考验你，我希望你能突破。听我说，没有人能一次完成第 10 章！你需要反复从头开始。事实上，重新开始是关键：在花一点时间调试之后，只需从头开始。请不要对自己说：“哦，我搞不定这个，看，我已经试了\
  \ 5 次了，还是过不去！”失败并重新开始是可以的，我真心希望你能够通过。我希望看到你去论坛告诉大家你通过了第 10 章！好吗？是的！\n\n注意：我注意到我的一些学生不能正确发音“segue”一词。以下是我从学生那里听到的一些令人惊叹的版本：“Seeg”、“Seg-you”、“Zeeyoo”、“Suh-goo-wee”，当然还有“Sega”，就像游戏机那样！真的吗！如果你还不知道，`Segue`的发音如下：`Seg-way`。这是我定义它的方式。由《梅里亚姆-韦伯斯特词典》定义的恰当且正确的方式如下：\n\
  \nse·gue\\ se-( )gwā, sā-\\\n\n1 : 继续下面的内容而不停顿——作为音乐中的指示使用\n\n2 : 像前一个那样演奏接下来的音乐——作为音乐中的指示使用\n\
  \n`SEGUE`的词源：意大利语，意为“接着”，来自`seguire`（跟随），源自拉丁语`sequi`——首次使用时间：约 1740 年。\n\n### `myStory_02`：一个单视图应用\n\
  \n在`myStory_02`中，我们将项目分为第 1 部分和第 2 部分。在第 1 部分中，我们使用故事板创建一个简单的表格，该表格由一个城市数组填充。列表的长度将是你拥有或编造的城市列表中的“数量”。当用户选择列表中的某个城市时，实际上什么也不会发生。然而，在继续之前，了解你的应用程序在此刻能够正常工作是很重要的。你可以通过查看图\
  \ 10-26 来先睹为快。然后，在第 2 部分中，我们将填充表格的城市列表发送到谷歌服务器，在那里我们解析服务器以获取每个城市的经度和纬度地址。我们存储这些地址，当用户选择一个城市时，我们通过转场从表格“跳转”到一个带有`UIMapKit`的视图，该视图会实例化一张地图，地图上有一个图钉落在城市中心。\n\
  \n\n\n#### 应用准备前的可能工作\n\n让我们先熟悉两组术语：“解析”和“上传到互联网”。我们会频繁用到“解析”这个词，尽管在设计课程和本书时我曾犹豫是否要包含解析内容，但我最终决定宁可教会你这个当代编程基础技能：解析就是编写代码，让你能够进入服务器，仅从数据库中提取你所需的特定数据。例如，谷歌服务器上可能有\
  \ 6000 个与南非德班市相关的指针、链接和术语。我们将解析谷歌服务器，忽略所有信息，只提取德班的经纬度地址。想想看，数百万个应用都需要访问某个服务器，仅提取用户所需的信息。这正是关键编码技能，我将向你精确展示如何操作（并让你在\
  \ iPad 上看起来非常酷）。\n\n当然，你知道互联网并非悬浮在空中或云朵里。确实，有一部分数据会被发送到卫星，但随后会返回地球，通过线缆传输抵达服务器。开发能够从特定服务器抓取重要数据的\
  \ iPad 和 iPhone 应用至关重要。我曾有个学生，他编写的期末课堂项目应用可以解析科罗拉多斯普林斯市交通摄像头（位于科罗拉多州）的服务器。从城市服务器解析出正确图像后，他每秒向\
  \ iPhone 应用发送数张每个路口的快照，让用户能“提前看到”路口情况，并根据交通流量做出决策。太棒了！然而，尽管这位学生很聪明，当他站在讲堂前描述如何编写解析服务器的代码时，他指向了天空。我问他是否知道服务器就位于距离校园仅\
  \ 4 英里的地方。他看着我说道：“这么说，它并不需要上传到云端？”\n\n即便是我，在说“上网”时也会指向云朵，但我希望你记住：当我们解析谷歌服务器时，我们不关心它在哪里或如何到达那里。我们只关心代码是否正确地从服务器中解析出了对我们重要的信息。\n\
