  \ 9–29 以及如下所示。\n\n```\n#import <UIKit/UIKit.h>\n@interface ViewController : UIViewController\n\
  @end\n```\n\n-   我们需要做的第一件事是告诉我们的应用，我们已经导入了 MapKit 框架；我们在 `#import <UIKit/UIKit.h>`\
  \ 这行代码下方通过 `#import <MapKit/MapKit.h>` 来实现。接下来要做的，是告诉头文件我们将要使用 `MKMapViewDelegate`\
  \ 协议。该协议定义了一组可选方法，我们的应用将使用这些方法来接收地图更新记录。\n-   接下来，我们为控制器类添加 `<MKMapViewDelegate>`\
  \ 协议。\n-   现在我们可以添加一个指向 `MKMapView` 类的指针输出口。我们通过输入 `MKMapView *mapView` 来实现，这声明了一个\
  \ `MKMapView` 类型的对象。\n-   最后要做的是定义 `@property`，输入：`@property (nonatomic, retain)\
  \ IBOutlet MKMapView *mapView`。\n\n> **注意**：有些人可能会说：“哇！你只在接口外部声明了 `IBOutlet`！”嗯，实际上，无论我们是在接口内部还是“外部”声明\
  \ `IBOutlet MKMapView *mapView`，它们实际上都在接口内部，没有必要声明两次。我更喜欢在 `@properties` 上使用输出口，因为这使得从故事板加载的对象的*内存管理*更加清晰。在“深入代码”的“故事板对象的内存管理”中，我会对此进行更深入的探讨。\n\
  \n-   完成后，保存它。我们的代码应该如下所示，如图 9–30 中所示：\n\n```\n#import <UIKit/UIKit.h>\n#import\
  \ <MapKit/MapKit.h>\n\n@interface ViewController : UIViewController <MKMapViewDelegate>\n\
  {\n    MKMapView *mapView;\n}\n\n@property (nonatomic, retain) IBOutlet MKMapView\
  \ *mapView;\n\n@end\n```\n\n![images](img/00383.jpg)\n\n**图 9–30.** 完成后的 `ViewController`\
  \ 头文件。\n\n\n\n##### 处理视图控制器的实现\n\n正如本章引言所述，控制和使用 MapKit 与 CoreLocation 框架并非易事。尽管这些领域看似艰巨，但我不能在本书中忽略它们。我们在这样的基础上继续：我们已经学会寻找熟悉的模式，整合我们能够理解的内容，并在事情变得稍微复杂或超出我们当前理解时遵循指示！\n\
  \n让我们思考一下——在完成必要的 `myPos` 头文件导入以及我们刚刚在头文件中设置的 `ViewController` 的合成之后——我们需要做两件事：\n\
  \n- 在 `viewDidLoad` 方法中设置我办公室的坐标；然后，\n- 让一个图钉精确地落到 `viewDidLoad` 中设定的经纬度上，并添加一个标注，说明这是刘易斯博士的办公室。\n\
  \n在我们的案例中，我们将地图类型设置为混合地图。不过，如果我们愿意，也可以选择使用卫星地图或街道地图。请记住，此时我们将引入我在科罗拉多大学科罗拉多斯普林斯分校办公室的位置，你可以继续使用我的位置，也可以选择你自己的地点。\n\
  \n![images](img/00384.jpg)\n\n**图 9–31.** 编码前的 `ViewController` 实现文件。\n\n21. 当你第一次打开\
  \ `viewController.m` 文件时，会看到如图 9–31 所示的默认代码。我们首先引入头文件并进行合成：\n\n- 在 `#import \"ViewController.h\"\
  ` 下方，我们通过编写 `#import \"myPos.h\"` 来导入 `myPos` 头文件。\n- 现在，在 `@implementation` 下方，我们将添加对\
