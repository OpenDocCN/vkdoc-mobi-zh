  \n![images](img/00277.jpg)\n\n**图 7-52.** 最后一个`UIViewController`！\n\n52\\. 既然你已经在这个极客世界里生活了几个章节，你可能已经注意到，极客们知道一些普通人完全不知晓的事情。没错！人类还有比极客更高的境界！这些特殊的极客，进化到了更高的意识状态，被称为Über\
  \ Geeks。Über Geeks 非常罕见，只有极客才能识别出来。但这将在你的应用中体现出来。所以，你本质上需要在 Geek 之外再添加一个人类进化状态！你需要添加最后一个`UIViewController`，它将演示如何以编程方式访问控制器及其数据。这在图\
  \ 7-52 中进行了说明。\n\n![images](img/00278.jpg)\n\n**图 7-53.** 你可以在背景图像上使用一个简单的不可见按钮，作为一种简单的技巧，避免花时间制作一个花哨的按钮。\n\
  \n53\\. 如你所知，只有极客知道有一种人类的意识状态高于 Geek。下一个更高状态，Über Geek，是不可见的。所以你需要制作一个只有极客才知道会跳转到更高Über\
  \ Geek 意识状态的不可见按钮。嗯，我仿佛听到你在想：“我们怎么做不可见按钮？！” 好吧，这完全是极客的一部分。普通人甚至认为极客符号是“电源”符号！极客知道它实际上是极客符号。还有一些秘密的行事方式，比如运行整个宇宙和所有计算机，并通过不可见的秘密门和通道访问各种酷炫的东西。今天，你已经进化到足以学习如何制作一个不可见按钮了。请仔细阅读，并且务必不要让非极客看到这些内容！如图\
  \ 7-53 所示，将一个看起来无辜无害的圆角矩形按钮拖到你的 Geek 对象上。\n\n#### 阶段四：收尾与编码\n\n你现在进入了最后阶段，让我们完成这个应用吧。\n\
  \n![images](img/00279.jpg)\n\n**图 7-54.** 首先，覆盖整个 Geek 符号。\n\n54\\. 如图 7-54 所示，一旦按钮放置在\
