  \n### 触摸交互：一个基于视图的应用\n\n触摸交互应用最初看起来就像这本书的封面。然而，鲁鲁果在你触碰它之后，可以用指尖移动。顶部还有三个按钮，分别是 `Shrink`、`Move`\
  \ 和 `Change`。`Shrink` 按钮是一个特殊的按钮；按下它后，鲁鲁果图标会缩小，按钮内的文字会自动变成 `Grow`。按下这个曾经是 `Shrink`\
  \ 按钮的 `Grow` 按钮，鲁鲁果会恢复其原始大小。如果你愿意，可以快速查看图 5–45、5–46 和 5–47。你也可以在以下视频的开头看到这个应用的实际运行效果：[`http://bit.ly/qp6aCS`](http://bit.ly/qp6aCS)。但**只看**应用的运行效果——不要跟着视频看代码，因为我希望用一种特定的方式向你解释代码。\n\
  \n\n\n#### `CGAffineTransform` 结构体\n\n我们还将处理苹果公司聪明的工程师编写的一段动画代码，它被打包成一个称为“数据结构”的集合。这是程序员用来对其对象执行动画的关键工具。该数据结构可以缩小对象、改变其角度、移动它、倾斜它，并让它执行各种其他酷炫的动画效果。苹果用于执行这些动画的所有代码都保存在称为结构体的核心动画数据结构中。苹果对此的解释是：“`CGAffineTransform`\
  \ 数据结构表示用于仿射变换的矩阵。” 嗯？这到底是什么意思呢？这意味着`CGAffine`会对你想要动画化的对象的所有关键点进行变换，将其放入一个称为`transform`的属性中。这个属性本质上就是一个矩阵。一旦你想要动画化的对象进入这个矩阵，当我们指示`CGAffine`更改对象的位置、角度、形状、缩放比例等属性时，它就能听从我们的指令。这就是我们接下来要对露露水果图标所做的操作。\n\
