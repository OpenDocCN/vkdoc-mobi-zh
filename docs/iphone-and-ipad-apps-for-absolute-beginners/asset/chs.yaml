  \ 6–31 和 图 6–32。\n\n![images](img/00224.jpg)\n\n图 6–32. 你的第六个 iPhone 应用。\n\n###\
  \ 深入剖析代码\n\n在本章中，为了完成这个应用，你快速接触了几个高级主题。现在让我们从你编写的代码中退一步，更深入地探讨其中的一些主题。\n\n-   在第\
  \ 15 步中，你设置了内容视图模式（Content View Mode），以改变图像的缩放和裁剪方式，使其适应 `UIImageView`。接下来，我们来探究一下这意味着什么，以及各个选项之间有何不同。\n\
  -   在第 24 步中，我提到了编译时和运行时之间的区别。就编写应用而言，知道这种区别导致了两种不同的方式来产生相同的行为结果就足够了。在这里，我将深入到代码的哲学层面，讨论为什么在特定情况下你可能更喜欢使用一种策略而不是另一种。\n\
  \n#### 内容视图模式\n\n在第 15 步中，你将一个图像加载到了 `UIImageView` 中。如果你使用了配套网站上的图像，那么图像大小基本合适（它与完整的\
  \ iPhone 屏幕尺寸完全相同）。由于标签栏占用了部分可用屏幕空间，因此 `UIImageView` 的可用空间比你的图像略小。Xcode 最初会压缩图像以适应空间。这种视图模式（默认模式）被称为\
  \ “Scale To Fill”（`UIViewContentModeScaleToFill`），因为它会在 X 和 Y 两个方向上缩放图像以填充内容框架。\n\
  \n除非你的图像与 `UIImageView` 的尺寸完全相同，否则这将导致失真。如果你加载的是直接在界面中创建的图像（无论是在 Interface Builder\
  \ 中还是通过 `viewDidLoad` 方法），这可能还可以接受，但这会限制你的应用功能。另一方面，如果你将要加载一个尺寸未知或不受限制的图像，那么其他一些视图模式会更合适。请查看\
  \ 图 6–33，其中列出了可用的视图模式。\n\n![images](img/00225.jpg)\n\n图 6–33. Xcode 的 UIImageView\
  \ 内容视图模式。\n\n从 图 6–33 列表的顶部开始，在 Scale To Fill 之后，Aspect Fit 和 Aspect Fill（分别为 `UIViewContentModeScaleAspectFit`\
  \ 和 `UIViewContentModeScaleAspectFill`）对你来说可能最有用。\n\n-   **Aspect Fit。** 此模式会缩放内容，保持宽高比，直到最大的维度等于图像视图的相应维度。因此，如果你有一个类似于本章应用中的\
  \ `UIImageView` 和一张横向拍摄的照片，图像将被缩放，使得整个图像可见，而在界面的照片上方和下方会出现空白区域。\n-   **Aspect Fill。**\
  \ 此模式会缩放图像，直到另一个维度填满可用空间。结果是整个视图被你的图像填满，代价是裁剪掉图像的一部分。使用同样的例子，这将导致照片的左右边缘被裁剪。\n\n\
  列表底部的九种视图模式（Center 至 Bottom Right）根本不对图像进行任何缩放，只是将图像中指定的锚点锚定到内容框架中的对应点。例如，选择 “Top\
  \ Left” 将导致显示图像的左上部分，使其顶部边缘与 `UIImageView` 顶部对齐，左侧边缘也同样对齐。任何超出内容框架大小的图像部分都会被裁剪。在这个应用中，你选择了\
  \ “Bottom”，这样底部边缘对齐，而图像顶部的多余部分被裁剪掉了。\n\n“Redraw” 视图模式提供了一种自定义内容缩放方式的途径，这是一个比当前讨论要高级得多的主题。\n\
  \n\n\n#### 编译时与运行时\n\n在第 24 步中，我顺带提到了编译时和运行时这两个术语，并指出在当时的上下文中，两者的区别在于前者意味着你在 Xcode\
  \ 的界面构建器部分进行配置，而后者意味着你通过在实现文件中编写代码来完成配置。这在那时是对这两个术语的恰当定义，但现在可以对它们进行更正式的定义。\n\n`编译时`\
  \ 表示当你的项目在模拟器或真实 iOS 设备上运行之前，进行编译或构建时发生的事情。这些包括在`.h`和`.m`文件中定义类、在 nib 文件中组织和布局`UIView`，以及在\
  \ Xcode 的各种检查器中所做的配置。所有在编译时设置的内容都精确地定义了你的应用启动时的状态。\n\n而`运行时`则描述了你的应用开始运行后的一段时间。此时，你编写的所有代码才真正执行，从而改变应用的状态，使其不同于编译时设置的状态。在本章中，你通过在实现文件中发送消息的方式来指定第二个标签页的图像。因此，在编译时，要显示的图像是未指定的；但在运行时，一系列指令被执行，以便在你提供的`UIImageView`中显示所需的图像。\n\
  \n但为什么这个区别很重要呢？在编写这个应用的过程中，你证明了可以在运行时做到与编译时完全相同的事情。然而，通过执行指令来达成目标需要额外多点击几次、多拖拽几次，并多写几行代码。如果你在编译时就已经知道如何配置某样东西，那么编写代码来完成相同操作的优势就会减弱。然而，如果你希望在应用运行期间动态地改变某个对象的属性（上一章的应用就是一个很好的例子），那么在编译时显然不可能设定状态的所有方面。\n\
  \n简而言之，编译时定义了应用的起始状态，而运行时则描述了应用开始运行后所发生的动作。\n\n### 本章前瞻\n\n在第 7 章中，你将进入下一个复杂层次：故事板。\n\
  \n故事板是苹果公司提供的一种新方式，用于布局用户如何在应用中导航，这与电影制作人设置故事板来展示电影如何从一个场景过渡到下一个场景的方式非常相似。故事板拥有连接应用中各个视图的转场（发音为“segways”）。直接跳到故事板是很有诱惑力的，但最好先像你已经做的那样，了解一下这些按钮和图像背后的代码。所以休息一下，然后让我们进入故事板的世界。\n\
  \n## 第 7 章\n\n### 故事板\n\n这第七章将介绍一种快速且可视化地创建应用的新方法。首先，你将布局一些视图，看看如何在不编写代码的情况下连接它们，并且你将免费获得一些很酷的过渡动画。这项新技术首次引起公众注意是在苹果宣布他们将引入一个前所未见的新功能——故事板时。该功能将被内置到\
  \ Xcode 中。它将允许轻松布局那些使用导航栏和标签栏在视图之间进行转场的工作流应用。\n\n苹果接着表示，新的故事板将为你管理视图控制器，同时以可视化的方式为你创建易于管理的项目地理空间视图。它将指定在视图之间切换时使用的转场和\
  \ segue，而无需手动编写代码！所有人都满怀期待地等待 Beta 版的发布。当它发布时，所有人都被震撼了。它彻底改变了整个编程格局。\n\n### 讲故事\n\
  \n当你讲故事时，你在与他人交流。无论老幼，人人都爱听故事。讲故事是日常与他人交流中不可或缺的一部分。当你与用户交流时，你是在告诉他们如何沿着你创建的路径前进，这条路径会带他们到达目的地，获取他们想要的东西——无论是一张地图、一首歌、一个食谱、天气信息、他们停车的位置、一个电话号码、一部电影，还是其他东西。那么，为什么以前没有人想到这一点呢？为什么创建应用被视为极客编程代码，而讲故事的人则被看作是另一回事？我不确定答案，但当我开始思考这个问题时，我意识到这是一个不可思议的概念。想想看。早在\
  \ 20 世纪 20 年代初，当沃尔特·迪斯尼开始思考组织并构建卡通的最高效方式时，他想出了故事板的概念。他会召集他的艺术家们，他们把一系列包含故事关键场景的板子挂起来，然后将这些板子组织成一个美丽的故事。这项技术取得了巨大的成功；它主导了电影行业，成为了规划每一部现代电影的蓝图。你可以在这里看到一部展示迪斯尼的故事板如何主导电影行业的精彩影片：`bit.ly/oWg5mc`。\n\
  \n新的 iOS5 故事板功能非常相似，只不过你看到的未必是图片；你看到的是应用的地理空间表示，它允许你出色地组织应用。在 iOS5 出现之前，nib 文件是用来定义用户界面的。别无选择，只能一次定义一个视图控制器。如果你有\
  \ 16 个视图控制器，你就必须定义 16 次用户界面。这不仅枯燥乏味，而且变得复杂混乱。相反，正如你很快会看到的，一个故事板文件将你所有的用户界面都捕捉在一个地理空间视图中，使你能够轻松创建和编辑你的所有独立视图控制器，以及视图控制器之间的转场。你可以像\
  \ Disney 工作室的家伙们那样，像摆弄一副扑克牌一样移动它们。这样一来，在你的应用中实现和编辑整个用户界面与体验的流程就变得容易了。\n\n### 路线图回顾\n\
  \n现在，你已经对幕后发生的事情有了足够的了解，可以引入一种新的做事方式了。这就像你已经花了足够多的时间摆弄割草机发动机和基本的汽车发动机，从而能够欣赏往你的旧车里安装一台全新的发动机。当你安装这台新发动机时，你知道发动机内部有活塞、火花塞、化油器等等。你不必把发动机拆开就知道这些东西的存在；你只需安装它，并将其连接到底盘、传动系统和电子设备上即可。在故事板中，你将使用一种全新的方法来设计你的应用；你只需将其连接到你的输出口、视图控制器以及应用的其他元素上。你无需打开故事板去看内部，因为你知道它是如何工作的；你只需知道如何连接东西。所以，让我们开始吧！\n\
  \n\n\n### 路线图：四个阶段\n\n本应用分为四个阶段。其中最重要的是第一阶段，因为它将构成分镜脚本大部分潜在用途的共同基础。由于第一阶段是未来众多分镜脚本的最低共同标准，我会对此进行重点讲解，并鼓励你完成相关练习，以便快速掌握分镜脚本制作技巧。第一阶段奠定了未来反复操作的核心基础，而随后的三个阶段则针对本应用的具体需求而设计。\n\
  \n-   第一阶段奠定了大多数分镜脚本配置的核心基础。\n-   第二阶段从图 7-22 开始，包括为男性、女性和极客设置视图控制器。\n-   第三阶段从图\
  \ 7-34 开始，包括建立视图控制器的内容。\n-   第四阶段从图 7-54 开始，包括收尾和编码。\n\n### 演进：基于视图的分镜脚本应用\n\n同样，你将使用一些图片来了解当前在故事中所处的位置。用更专业的术语来说，你将使用图像而非代码来表示应用中的某个状态。我鼓励我的学生使用图像，因为如果运行不畅，你就能立刻知道是负责在状态间导航的顶层代码出了\
  \ bug，而不是特定状态下的代码有问题。\n\n在本应用中，你将看到一系列有趣的状态，展示男性、女性以及另一种人类——极客的状态。它还会说明，当男性或女性进化到更高意识状态时，他们就会变成极客！然后，为了增加趣味性并说明目的，还会展示另一个状态：当极客进化时，他们就会变成超级极客！尽管这很有趣，但它为我们提供了一系列不同的状态，这些状态在分镜脚本中很容易实现，但如果使用传统的逐个编辑\
  \ nib 文件的方式，则会复杂得多。\n\n首先，从这里下载图片：`bit.ly/p1L5cv`，你还可以在此处下载代码或观看视频。下载包含图片的 `.zip`\
  \ 文件后，解压缩文件夹，并将图片存储到桌面上。\n\n我不会像之前那样手把手地指导你了。相反，我将假设你已经知道如何执行本书中反复操作过的一些功能。是的，我会用更专业的方式来与你交流。\n\
  \n#### 第一阶段：创建核心分镜脚本配置\n\n让我们开始第一阶段，你将在此构建一个核心配置。\n\n> ![images](img/00226.jpg)\n\
