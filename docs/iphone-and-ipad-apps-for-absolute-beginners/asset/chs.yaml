  \ `shouldAutorotateToInterfaceOrientation` 方法的末尾，创建几个空行，然后开始编写或粘贴代码，并跟着做。\n\na.\
  \ 首先要注意的是，我们在步骤 20 中已经导入了 `myDetailViewController.h` 文件。\n\nb. 现在我们需要告诉 `myDetailViewController`\
