  \ World!”\n\n祝贺你，我的朋友！你今天真的做了一件非常特别的事。我知道你可能咒骂了我几次，或者在这里或那里挣扎过，但走到这一步，你的人生已经完成了一件非常特别的事。你从一个用户变成了一个编码者。你完成了一个非常艰难的飞跃：从技术的使用者变成了技术的编码者。我们还有一些事情要做，所以先休息一下。遛遛狗；做点与科技无关的事情，哪怕只是走到街上。花一点时间意识到你正在开始一段漫长的旅程。有时会很艰难，但这是一段你可以昂起头说：“是的，我编写\
  \ iPhone 和 iPad 应用！”的旅程。\n\n\n\n### 在读取 iPhone 环境的 iPad 模拟器上运行你的应用\n\n有两种方法可以在 iPad\
  \ 模拟器上运行你的 iPhone 应用：\n\n- 首先，我们将从 iOS 模拟器中更改环境。因此，在仍处于 iPhone 模拟器中的情况下，请点击 **Hardware**\
  \ ![Images](img/00027.jpg)**Device** ![Images](img/00027.jpg)**iPad**，这样我们就可以看到你的第一个应用在\
  \ iPad 上运行的效果（参见图 2–20）。结果如图 2–21 所示。 ![images](img/00065.jpg)\n\n    **图 2–20.**\
  \ 让我们看看你的 iPhone 应用在 iPhone 模拟器上如何运行。\n\n    ![images](img/00066.jpg)\n\n    **图\
  \ 2–21.** 最初它以 iPhone 模式显示。点击缩放按钮，即可全屏查看，如图所示。\n\n- 第二种方法是通过在 Xcode 内部更改输出设备来实现。为此，请先确保你在模拟器中，然后输入\
  \ **Command + Q** (![Images](img/00031.jpg)Q) 关闭你的 iPhone 模拟器。现在你应该回到了 Xcode。\n\n\
  \    **注意：** 如果你没有回到 Xcode，则说明你此前开启了其他程序，这是我说过不允许你做的事情。为了让你能准确地按照步骤操作，你真的需要保持你的桌面和正在运行的程序与我教你的方式完全一致。\n\
  \n    1. 现在，保持 Xcode 打开，通过点击功能区左上角的 **Scheme** 下拉菜单，选择 **iPad Simulator**，来将你的方案更改为\
  \ iPad 模拟器，如图 2–22 所示。目前它显示的是 iPad 4.3 模拟器，但当你读到这本书时，版本号可能会更高。\n    2. 现在输入 ![Images](img/00031.jpg)R\
  \ 来运行它。同样，你会看到与图 2–21 中显示的相同实例。![images](img/00067.jpg)\n\n    **图 2–22.** 在 iPad\
  \ 模拟器中运行 iPhone 应用的第二种方法。\n\n### 在 iPad 模拟器上运行你的应用\n\n#### `helloWorld_02` – iPad\
  \ 模拟器\n\n在本章开头，我与你达成了一个约定。我说过我们将拿一个非常简单的应用，并以所有可能的不同形式运行它。具体来说，我说过我们将在以下设备上运行你的第一个应用：\n\
  \n- §2.1. iPhone 模拟器：(![Images](img/00068.jpg) 参见图 2–19)。\n- §2.2. 读取 iPhone 环境的\
  \ iPad 模拟器 (![Images](img/00068.jpg) 参见图 2–21)。\n- §2.3. iPad 模拟器。\n\n此刻，你已经完成了前两个目标，即在\
  \ iPhone 模拟器上运行，以及后者是在 iPad 上读取 iPhone 应用。但这并不是真正的 iPad 应用。真正的 iPad 应用是专门为 iPad\
  \ 制作的，不能在 iPhone 上运行，因为所有的图形和屏幕尺寸都是专门为 iPad 设计的，尺寸太大以至于无法在 iPhone 上显示。\n\n查看图 2–21，你可以看到左侧第一张图片显示你的\
  \ iPhone 应用位于 iPad 内部，并且精确地缩放到 iPhone 的尺寸。当你点击缩放按钮时，它只是简单地缩放并放大所有内容以适配 iPad。嗯，这就是我在课堂上称之为“伪\
  \ iPad”的东西，因为它并非真正的应用。那么，让我们继续，并向你展示如何制作一个专门用于 iPad 的应用。\n\n1. 我们需要通过在 Xcode 中输入\
  \ ![Images](img/00031.jpg)S 保存你的 `helloWorld_01` 应用，然后输入 ![Images](img/00031.jpg)Q\
  \ 退出 Xcode。现在，你的桌面上应该除了 Mac 硬盘图标下的 `helloWorld_01` 文件夹外，空空如也。很好。我们现在将要运行 `helloWorld_02`，除了少数几个步骤外，它将与\
  \ `helloWorld_01` 完全相同。\n2. 打开 Xcode，同时输入 **Command + Shift + N**。回忆一下，这三个组合键在图\
  \ 2–1 中显示为 ![Images](img/00031.jpg)![Images](img/00032.jpg) N。选择 **View-Based App**，然后按\
  \ **Return** (![Images](img/00043.jpg))。现在停下来，查看图 2–23：在图 2–2 中，我们将其命名为 `helloWorld_01`。然而在图\
  \ 2–23 中，我们将其命名为 `helloWorld_02`。最重要的是，在图 2–23 中，我们选择的是 **iPad**，而不是像在图 2–2 中那样选择\
  \ iPhone。完成这一步后，我希望你尝试记住我们在 `helloWorld_01` 中执行的所有步骤，直到你运行它，此时你将只看到图 2–21 中右侧的图像。\n\
  \n![images](img/00069.jpg)\n\n**图 2–23.** 打开 Xcode，选择 Navigation-based Application\
  \ 模板，然后将新项目文件保存到桌面。\n\n嗯？是的，这就是我说的：我让教室里的学生们重新做一遍 `helloWorld`，但这次是作为一个“真正的”iPad\
  \ 应用，我鼓励他们尝试不要偷看课堂笔记，自己尝试完成。如果你必须查看笔记或这本书，那也没问题。但要试着反复做，直到你完全不需要看任何笔记也能完成。\n\n###\
  \ 在物理设备上运行你的应用\n\n**提示：** 你可能想跳过这一节。请仔细阅读以下内容。\n\n在你设置好设备和配置文件之后，你可以继续执行步骤 §2.4，在\
  \ iPhone 上运行你的应用，§2.5，在基于 iPhone 环境的 iPad 上运行你的应用，以及 §2.6，在你的物理 iPad 上运行你的应用。\n\n\
  无论你做什么决定，你都需要先完成以下整理工作。现在，在你干净整洁的桌面上，只有两个包含你两个 `helloWorld` 程序的文件夹。我们需要创建一个位置来存放你所有的程序，这将有助于你继续阅读本书。在你的\
  \ **Documents** 文件夹中创建一个名为 **My Programs** 的文件夹，然后将 `helloWorld_01` 和 `helloWorld_02`\
  \ 这两个文件拖拽到该文件夹中保存。现在，在拥有一个干净整洁的空桌面的情况下，关闭所有程序。按 **Command + Tab**，然后按 **Command\
  \ + Q** 关闭所有应用，直到屏幕上只剩下 Finder。\n\n**注意：** 对于我课堂上的或其他大学的学生，我或你的教授已经处理好了这件事。如果你不是学生，并且没有在第\
  \ 1 章的步骤 5 中支付 99 美元，或者/并且你没有 iPhone 或 iPad，那么请跳到第 3 章。\n\n\n\n### 深入解析代码\n\n在每章的末尾，我加入了名为“深入解析代码”的章节，在此我将逐步为你剖析那些神奇出现或我直接让你输入的代码背后的含义。不过，我发现人类的大脑如果在不断重复某项操作，并且每次重复都会产生特定结果时，就会自行建立关联。我还发现，如果先让学生们在完全无知的状态下快速浏览大量代码，这大有裨益，因为这样能让大脑建立只有自己才能理解的连接。因此，在“深入解析代码”中，我开始为你提供一些恰到好处的小片段，它们能帮你串联起线索，理解为什么要把这段代码放在这里，或者那段代码放在那里。到了本书结尾部分，你会完全适应并真正深入钻研这些代码。然而，对于第\
  \ 2 章来说，我们重复的操作还不够多，不足以让你建立自己的关联。所以，现在先深呼吸一下，我们第 3 章再见。\n\n## 第 3 章\n\n## 继续前进\n\
  \n现在你已经通过编程完成了前两个 iPhone 和 iPad 应用，算是小试牛刀了。我希望你告诉自己，你必须继续前进，制作更多的应用，进行更多的练习，并在大脑中建立更自然的神经突触连接。起初，我许多传统的计算机科学同事都鄙视我的方法——在不解释所有代码的情况下，就盲目地带着新手程序员读代码。多年来，我学会了精确判断什么时候该告诉你发生了什么，什么时候该推着你前进。最重要的是，你需要继续前进，并让你的大脑始终专注于\
  \ Xcode。\n\n这第三个“Hello World”应用将向你介绍一些很酷的新概念，比如字符串、委托以及稍微复杂一点的代码。请记住，这是 Objective-C；它是一种相当复杂且困难的语言，所以我只会解释我认为必要的内容。这就引出了第\
  \ 3 章和第 2 章之间的一个区别。回想一下，在第 2 章中，当我提到深入解析代码时，我说：“然而，对于第 2 章来说，我们重复的操作还不够多，不足以让你建立自己的关联。”\
  \ 好吧，到了第 3 章，我们开始真正深入解析代码了。那么，让我们开始下一个应用吧。完成之后，休息一下，然后准备好回去复查你输入的每一行，因为我们要专注于代码的某些部分，看看它们是如何协同工作的。\n\
  \n除了本书中呈现的信息（包括各种截图）之外，我还提供了录屏，你可以在我的网站上获取。你可以使用短链接，或者输入 rorylewis.com，如下所示，点击 Xcode\
  \ 4 图标，然后选择视频教程或下载：\n\n*   短链接：`ow.ly/50ksH`\n*   手动输入网址：[www.rorylewis.com](http://www.rorylewis.com)\n\
  \n### helloWorld_03 – 一个交互式基于视图的应用\n\n在你的前两个程序 `helloWorld_01` 和 `helloWorld_02`\
  \ 中，你使用一个包含按钮的基于视图的平台向世界说了“Hello”。这第三个应用也将是一个基于视图的应用，但会稍微增加一些复杂性。当用户与你这第三个应用交互时，他们首先会被提示在文本字段对象中输入自己的名字。一旦他们输入了名字并点击“Press\
  \ Me”按钮，就会显示一段文字，说明输入的这个人正是在说“Hello World！”\n\n在开始下一个方法之前，你需要将 `helloWorld_01` 和\
