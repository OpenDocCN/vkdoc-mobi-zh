  \n好了——我们开始吧。\n\n### 路线图回顾\n\n回到汽车修理工的类比，我们理解到，如今，正如前一章所提到的，汽车维修非常专业化：只有少数人知道如何彻底拆解并重建一辆特定的车。到目前为止，我们一直从一位这样的汽车修理工肩头观察，看他如何更换和调换发动机内部的具体部件。今天，你将构建一个非常基本的割草机发动机。它将涉及比你迄今为止要完成的更多步骤，但在本章结束时，你将向前迈出一大步。\n\
