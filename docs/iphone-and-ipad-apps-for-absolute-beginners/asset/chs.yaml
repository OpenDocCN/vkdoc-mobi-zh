  \n31. 起初，我并没有想到需要在情节串联图板上花费大量时间来排列对象/视图。然而，在亲身经历了一些困难，并看到我的学生们制作的混乱的“意大利面条”式布局后，我决定花点时间提出一些基本原则，遵循这些原则可以避免混乱和纠缠。像我一样缩小视图，然后在你遵循我制定的三个规程时，相应地移动你的对象：\n\
  \n*   **互斥性（Mutual Exclusivity）**：我已经提到了第一个技巧，即保持按钮的顺序与视图的顺序互斥。导航控制器上的按钮顺序是 Male、Female\
  \ 和 Geek。在情节串联图板上保持这个顺序会产生问题，因为这将违反我下面将要提到的一些原则。\n*   **保持初始方向（Maintain Initial\
  \ Momentum）**：例如，在图 7-31 底部的 Woman 视图上，如果有 10 条转场呈扇形指向 10 个视图，而这些视图都没有指向 Geek 分支的转场，那么就让这些基于\
  \ Woman 的转场保持向下延伸。\n    *   查看图 7-32，可以看出一个完美的反面例子，展示了如何不保持初始方向。不仅转场连接被隐藏了，而且它们还相互重叠，干扰了追踪转场起点和终点的能力。\n\
  *   **最小化转场连接角度（Minimize Segue Connection Angles）**：这个原则通过直观的观察更容易解释：查看图 7-31 中从导航控制器到\
  \ Male 和 Female 的转场连接。注意它们是如何先向后倾斜再向前倾斜的，相比之下，图 7-32 及之后图中从导航控制器连接到相同两个 Male 和 Female\
  \ 视图的角度则更小。遵循此规程的一个简单方法是，一旦转场连接好，就水平或垂直移动它所连接的对象，直到转场连接几乎完全水平或垂直。\n\n![images](img/00257.jpg)\n\
  \n图 7-32. 哦！违反了“保持初始方向”规程的第二条原则。\n\n32. 你真的需要小心放置对象的方式，因为 GUI 可能会使事情看起来非常奇怪，如图 7-32\
  \ 所示，该图演示了违反“保持初始方向”规程的情况。但是，请注意，因为你将 Male 和 Female 分别移到了顶部和底部，所以可以看到你已遵守了最小化转场连接角度的规程。\n\
  \n![images](img/00258.jpg)\n\n图 7-33. 向前移动 Geek 对象。\n\n33. 为了同时遵守“保持初始方向”和“最小化转场连接角度”这两个规程，将\
