  \ MapKit 框架的容器。为此，我们将添加一个导航控制器和一个详细视图。我们需要创建一个新的视图控制器并将其拖到画布上，然后将主视图连接到详细视图，并在其导航中添加一个地图视图。从整体上看，扩展后的结构如下所示。\n\
