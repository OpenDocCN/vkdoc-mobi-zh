  \ Control 键拖拽。\n\n25. 你已经习惯通过从 Interface Builder 直接将对象拖入代码的方式建立连接，这确实很酷，但似乎目前还不能把所有连接工作都交给苹果那帮聪明的家伙。因此，在文本框中单击一次，然后按住\
  \ Control 键拖拽到 File’s Owner 上。如果你不把它连接到 delegate，就会遇到一个非常恼人的错误，叫做 SIGABRT，这意味着 Xcode\
  \ 会因为无法建立连接而中止。这确实是个坏消息，但好消息是你可以避免它。操作方法如下。\n\n![images](img/00097.jpg)\n\n图 3–26.\
