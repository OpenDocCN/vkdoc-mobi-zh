  \n8.  对于那些在 Xcode 4 发布之前涉足过 Xcode 的读者来说，下一部分是与 Xcode 所有先前版本最根本、最酷的背离。对于新手来说，请不要多想；让我们在无知的幸福中继续前进。我们将在第\
