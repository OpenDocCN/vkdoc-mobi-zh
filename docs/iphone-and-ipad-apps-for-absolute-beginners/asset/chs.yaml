  \ STAIR.png`连接到 Image View，以便它能够显示出来。进入 Image View Attributes 窗口的信息选项卡，打开下拉窗口并选择图像，如图\
  \ Figure 4–14 所示。  \n    ![images](img/00124.jpg)  \n    **Figure 4–15.** 将一个标签拖到视图上。\n\
  \n15. 之前，我们决定当用户按下按钮时，伊曼努尔·康德应该出现并宣布：“Hello World, I'm back!”。我们决定采用的方法是一个标签实例变量——其`text`属性被赋值为“Hello\
  \ World, I'm back!”。因此，拖出一个标签作为我们的实例变量，稍后我们会将文本“Hello World, I'm back!”分配给 Base\
  \ View。将标签放到视图上后，按照之前任务中调整大小的方法重复操作；即，加宽标签以容纳这段文本。参见 Figure 4–15。  \n    ![images](img/00125.jpg)\
  \  \n    **Figure 4–16.** 将文本居中并设为白色。\n\n16. 按照你之前做过的方法，在属性框架中将文本居中并将其颜色改为白色。参考\
  \ Figure 4–16，并查看右侧，可以看到居中对齐和白色文本属性已被选中。  \n    ![images](img/00126.jpg)  \n   \
  \ **Figure 4–17.** 将一个按钮拖到你的基础层上。\n\n17. 我们希望按下按钮时图片和文本都出现，因此需要一个按钮。继续将一个按钮拖到基础层上，并在其标题字段中输入“Guess\
  \ who's on campus?”，如图 Figure 4–17 所示。当用户看到一个询问这个问题的按钮时，他们会忍不住按下它。当他们按下时，我们希望伊曼努尔·康德出现，并说“Hello\
  \ World, I'm back!”。你可能需要像之前一样调整按钮的大小。如果你想让按钮比我在视频中创建的更花哨，你可能希望它看起来很酷，并显示一些底层图像。仍在\
  \ Image View Attributes 窗口中，向下滚动并将 Alpha 滑块调整到大约 0.30。  \n    提前思考一下，你可能想开始考虑我们即将编写的代码。我们看到了两个`IBOutlets`：一个标签和底层的基础图像。每个类别都向\
  \ Interface Builder“低语”了一些信息。一个说我们希望`UILabel`类使用由指针`*label`指向的文本；另一个说`UIImageView`类将显示一个位于指针`*uiImageView`指向位置的图像。\
  \  \n    那么，到目前为止我们在 Interface Builder 中做了什么？我们安装了背景图像并插入了一个按钮，该按钮将触发这两个`IBOutlets`。现在，花一分钟时间提前思考每次将输出口拖到头文件中会发生什么，让我们从更高层次看一下我们将要做什么：\
  \  \n\n    ```\n    - (IBAction)someNameWeWillGiveTheButton:(id) sender\n    ```\n\
  \n    实际上，这行代码调用了我们的两个伙伴，即标签和背景图像的两个`IBOutlets`。对于标签，使用：\n\n    ```\n    label.text\
  \ = @\"Hello World, I'm back!\";\n    ```\n\n    对于图像，使用：\n\n    ```\n    UIImage\
  \ *imageSource = [UIImage imageNamed: @\"kantStair.png\"];\n    ```\n\n    为了使上述内容在实现文件中正常工作，我们需要对头文件执行一些操作。我们必须设置标签和图像——也就是说我们需要声明它们。\
  \  \n    我们将使用以下方式声明标签：\n\n    ```\n    IBOutlet UILabel *someNameWeWillGiveTheLabel\n\
  \    ```\n\n    并将使用以下方式声明图像：\n\n    ```\n    IBOutlet UIImageView * someNameWeWillGiveTheImageView\n\
  \    ```\n\n    然后，我们将做一件我们还没有做过的事情，我将在本章末尾的“深入代码”部分解释。我们将对两个`IBOutlets`执行所谓的“合成”（Synthesis）。为此，我们将运行两个`@property`语句：\
  \  \n\n    ```\n    @property (nonatomic, retain) IBOutlet UILabel *someNameWeWillGiveTheLabel\n\
  \    ```\n\n    对于图像：\n\n    ```\n    @property (nonatomic, retain) IBOutlet UIImageView\
  \ *someNameWeWillGiveTheImageView\n    ```\n\n    同时，我们将在实现文件中合成上述内容，使用：\n\n   \
  \ ```\n    @synthesize label, uiImageView\n    ```\n\n    好的，这是一次快速的心理旅程，展望了未来。这意味着我们已经准备好行动了。我们已经创建了一个按钮，它将调用我们的两个伙伴；我们现在需要做的就是创建图像和标签，然后将它们与代码的相应部分关联起来。\
  \  \n\n    ![images](img/00127.jpg)  \n    **Figure 4–18.** 编写按钮文本。\n\n18. 我们需要按钮来吸引用户按下它。因此，我们将通过双击按钮并在按钮中写入文本来询问用户：“Guess\
  \ who's back in school?”。你可能会注意到，按钮会巧妙地调整其大小以适应文本宽度。参见 Figure 4–18。  \n    ![images](img/00128.jpg)\
  \  \n    **Figure 4–19.** 将第二个图像视图拖到视图上。\n\n\n\n19.  现在我们来思考一下。当按钮被按下时，我们希望 `kantStair.png`\
  \ 图片显示在背景图 `STAIR.png` 之上。它是通过什么来呈现的呢？它是通过`Image View`（图像视图）加载到屏幕上的。因此，将一个`Image\
