  \ m”样板代码粘贴过来，因为我们大家都会反复使用它。我们大家都会在各种场合使用并微调它。如果你跳过了步骤 34 的说明，请确保你知道粘贴的位置。我也会讲解你需要了解并微调的关键部分。苹果公司很可能很快就会推出一个类或框架来实现这个功能，因为大家都用这个代码来解析服务器。将代码粘贴到正确的位置后，我们来过一遍。\n\
  \na. 回到我们开始这最后一段代码的地方。我们首先需要导入 `myPos.h` 文件，因为在设置缩放和放置大头针的代码时，我们会用到 `myPos` 标注的标题和坐标。我们看到的第一个方法是\
  \ `setDetailItem`，如下所示。我们设置 `detailItem` 以便使用它，一旦它在本地存储，我们就会配置视图，换句话说，就是创建一个新的地图，当需要更改时，它会自动重绘。`configureView`\
  \ 是 `myDetailViewController.m` 中接下来一个巨大的方法。\n\n```objc\n- (void)setDetailItem:(id)newDetailItem\n\
  {\n    if (_detailItem != newDetailItem) {\n        _detailItem = newDetailItem;\n\
  \n        // Update the view.\n        [self configureView];\n    }\n}\n```\n\n\
  b. 接下来我们研究的是 `configureView` 方法，它是一个实用方法，在内部调用。这是真正行动开始的地方。首先，让我们看看如何连接到服务器。我们访问\
  \ `mapURI` 关联的服务器，在这里就是 Google 的 API 地理编码服务 `maps.googleapis.com`。我们将向它请求一个城市，然后让代码处理其中的空格，无论是以空格还是“%20”表示的空格。\n\
  \n\n\n`NSString* mapURI =`\n`@\"http://maps.googleapis.com/maps/api/geocode/json?address=city&sensor=false\"\
  ;`\n`mapURI = [mapURI stringByReplacingOccurrencesOfString:@\"city\"`\n`withString:[self.detailItem\
  \ description]];`\n`NSURL* mapURL = [NSURL URLWithString:[mapURI`\n`stringByReplacingOccurrencesOfString:@\"\
  \ \" withString:@\"%20\"]];`\n\n好了，你在上面看到我们已经告知服务器想要数据，但问题在于服务器如何将这些数据返回给我们。这时，我们将要用到的\
  \ `NSURL` 协议就会发挥作用，但我们必须通过调用 `connection` 来触发这些协议。\n\n`NSURLConnection* connection\
  \ = [NSURLConnection connectionWithRequest:[NSURLRequest`\n`requestWithURL:mapURL]\
  \ delegate:self];`\n`if (connection)`\n`locData = [NSMutableData data];`\n\n这里你可以看到“connection”由三部分组成：\n\
  \n* `connection:(NSURLConnection *)connection didReceiveResponse`\n* `connection:(NSURLConnection\
  \ *)connection didReceiveData`\n* `connectionDidFinishLoading:(NSURLConnection *)connection`\n\
  \n`connectionDidFinishLoading:(NSURLConnection *)connection` 是实际从谷歌服务器收集经纬度数据并存储的方法。\n\
  \n`- (void)connectionDidFinishLoading:(NSURLConnection *)connection {`\n\n`NSRegularExpression*\
  \ regex = [NSRegularExpression regularExpressionWithPattern:@\"location.*?\\\\}\"\
  `\n`options:NSRegularExpressionDotMatchesLineSeparators`\n`error:nil];`\n`NSString*\
  \ dataString = [[NSString alloc]`\n`initWithData:locData encoding:NSASCIIStringEncoding];`\n\
  `NSTextCheckingResult* locResult = [regex firstMatchInString:dataString`\n`options:0\
  \ range:NSMakeRange(0, [dataString length])];`\n`NSString* locString = [dataString\
  \ substringWithRange:[locResult range]];`\n\n`NSRange latRange = [locString rangeOfString:@\"\
  \\\"lat\\\" : \"];`\n`NSString* lat = [[[locString substringWithRange:NSMakeRange(latRange.location\
  \ +`\n`latRange.length, 20)] stringByReplacingOccurrencesOfString:@\",\" withString:@\"\
  \"]`\n`stringByTrimmingCharactersInSet:[NSCharacterSet whitespaceAndNewlineCharacterSet]];`\n\
  \n`NSRange lngRange = [locString rangeOfString:@\"\\\"lng\\\" : \"];`\n`NSString*\
  \ lng = [[locString substringWithRange:NSMakeRange(lngRange.location +`\n`lngRange.length,\
  \ 20)]`\n`stringByTrimmingCharactersInSet:[NSCharacterSet whitespaceAndNewlineCharacterSet]];`\n\
  \n`// setup zoom and pin drop stuff`\n`[(MKMapView*)self.view setZoomEnabled:YES];`\n\
  `[(MKMapView*)self.view setScrollEnabled:YES];`\n`MKCoordinateRegion region;`\n\
  `region.center.latitude = [lat floatValue];`\n`region.center.longitude = [lng floatValue];`\n\
  `region.span.longitudeDelta = 0.01f;`\n`region.span.latitudeDelta = 0.01f;`\n`[(MKMapView*)self.view\
  \ setRegion:region animated:YES];`\n\n`MyPos* ann = [[MyPos alloc] init];`\n`ann.title\
  \ = [self.detailItem description];`\n`ann.coordinate = region.center;`\n`[(MKMapView*)self.view\
  \ addAnnotation:ann];`\n`}`\n\nc. 由于我们还需要将地图委托作为一个协议来处理，因此还有一段代码需要在这里处理。这段代码大部分我们不会用到，但它确实能帮我们放置大头针。在课堂上，我会让学生们尝试更改动画、大头针颜色以及\
  \ `setTitle`。简而言之，我们把它直接放进去，就像你也会做的那样。我鼓励你也至少尝试修改 `pinView.pinColor = MKPinAnnotationColorRed`、`pinView.canShowCallout\
  \ = YES` 和 `pinView.animatesDrop = YES`。\n\n`(MKAnnotationView *)mapView:(MKMapView\
  \ *)mV`\n`viewForAnnotation:(id<MKAnnotation>)annotation {`\n`MKPinAnnotationView\
  \ *pinView = nil;`\n`if(annotation != ((MKMapView*)self.view).userLocation) {`\n\
  `static NSString *defaultPinID = @\"pinID\";`\n`pinView = (MKPinAnnotationView *)[(MKMapView*)self.view`\n\
