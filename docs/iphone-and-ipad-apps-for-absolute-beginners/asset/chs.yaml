  \ 7–44\\. 现在，让我们“进化”。*\n\n44. 现在，你即将进入这个应用中有趣的部分，这个部分常让学生在课堂上大笑。你明白，在这个世界上（大部分情况下）存在男性和女性！在你的应用中，你将向世界展示进化仍在发生。你将向世界展示，男性和女性都可以进化到更高的意识水平，当然，这种状态就是……没错，你猜对了……极客(Geek)！因此，你需要添加一条从“男性(Male)”和“女性(Female)”状态指向“极客(Geek)”的连线。嗯，你知道应该怎么做吗？在“男性(Male)”和“女性(Female)”视图的导航栏上各添加一个“按钮栏项(Bar\
