  \n1.  **如果**：两个按钮都未按下，而我们按下了“缩小”按钮，那么我们会\n    -   缩小噜噜水果图标。\n\n2.  **否则如果**：未按下“缩小”按钮，但按下了“移动”按钮，那么我们会\n\
  \    -   将图标保持在移动后的位置，但继续缩小噜噜水果图标。\n\n3.  **否则如果**：同时按下了“缩小”和“移动”按钮，然后再次按下“缩小”按钮，那么我们会\n\
  \    -   将噜噜水果图标恢复至原始大小，并移动到移动后的位置。\n    -   回想一下，我们已经编写了“缩小”按钮内的文本，使其在“缩小”和“放大”之间切换。\n\
  \n4.  **否则如果**：已按下“缩小”按钮，但未按下“移动”按钮，那么我们会\n    -   将噜噜水果图标恢复至原始大小，并保持在当前位置。\n\n\
  将上述场景用非代码纯英语描述，这就是它在代码中的样子：\n\n```objc\n-(IBAction)shrink:(id)sender\n{\n    if\
  \ (hasShrunk) {\n        [shrinkButton setTitle:@\"Shrink\" forState:UIControlStateNormal];\n\
  \    } else {\n        [shrinkButton setTitle:@\"Grow\" forState:UIControlStateNormal];\n\
  \    }\n\n    if(hasShrunk == NO && hasMoved == NO)\n    {\n        启动持续 1 秒的动画\n\
  \        缩小图标\n        提交动画并更新缩小状态\n    }\n    else if(hasShrunk == NO && hasMoved\
  \ == YES)\n    {\n        启动持续 1 秒的动画\n        保持图标已移动并缩小图标\n        提交动画并更新缩小状态\n\
  \    }\n    else if(hasShrunk == YES && hasMoved == YES)\n    {\n        启动持续 1\
  \ 秒的动画\n        保持图标已移动并将图标恢复至正常大小\n        提交动画并更新缩小状态\n    }\n    else\n    {\n\
  \        启动持续 1 秒的动画\n        将图标恢复至原始位置和大小\n        提交动画并更新缩小状态\n    }\n}\n```\n\
  \n现在，我们将它改为实际代码。\n\n-   在第一种情况下，要缩小噜噜水果图标，请执行以下操作：\n    -   将噜噜水果图标的变换设置为变量 `size`\
  \ 中包含的大小。\n\n-   在第二种情况下，要使图标保持在移动后的位置，但仍要缩小它，请执行以下操作：\n    -   将噜噜水果图标的变换设置为 `CGAffineTransformTranslate`\
  \ 方法将其移动到的位置。\n    -   但现在我们丢失了“大小”，因此需要将其重新缩小到原始状态的 `.25`。\n\n-   在第三种情况下，要将噜噜水果图标恢复为原始大小并移动到移动后的位置，应执行以下操作：\n\
  \    -   将噜噜水果图标的变换设置为 `CGAffineTransformTranslate` 方法将其移动到的位置。\n    -   现在，将其恢复为原始大小。\n\
  \n-   在最后一种情况下，要将噜噜水果图标恢复为原始大小并保持在当前位置，请执行以下操作：\n    -   将其全部恢复为原始状态。\n\n将上述示例放入代码中，得到以下结果：\n\
  \n```objc\n-(IBAction)shrink:(id)sender\n{\n    if (hasShrunk) {\n        [shrinkButton\
  \ setTitle:@\"Shrink\" forState:UIControlStateNormal];\n    } else {\n        [shrinkButton\
  \ setTitle:@\"Grow\" forState:UIControlStateNormal];\n    }\n\n    if(hasShrunk\
  \ == NO && hasMoved == NO)\n    {\n        启动持续 1 秒的动画\n        myIcon.transform\
  \ = size;\n        提交动画并更新缩小状态\n    }\n    else if(hasShrunk == NO && hasMoved ==\
  \ YES)\n    {\n        启动持续 1 秒的动画\n        myIcon.transform = CGAffineTransformScale(translate,.25,\
  \ .25);\n        提交动画并更新缩小状态\n    }\n    else if(hasShrunk == YES && hasMoved ==\
  \ YES)\n    {\n        启动持续 1 秒的动画\n        myIcon.transform = CGAffineTransformScale(translate,1,\
  \ 1);\n        提交动画并更新缩小状态\n    }\n    else\n    {\n        启动持续 1 秒的动画\n      \
  \  myIcon.transform = CGAffineTransformIdentity;\n        提交动画并更新缩小状态\n    }\n}\n\
  ```\n\n现在我们需要考虑如何更新噜噜水果图标的缩小状态。在前两种情况下，我们确实缩小了噜噜图标，因此需要将缩小状态更新为 YES。在后两种情况下，图标未被缩小，因此应将缩小状态更新为\
  \ NO。请参见以下代码：\n\n**注意**：如果这不太合理，那么请查看前面代码的解释来思考一下。如果你的大脑已经很累了，那就先跟着走——没关系——只要跟着做就行。\n\
  \n```objc\n-(IBAction)shrink:(id)sender\n{\n    if (hasShrunk) {\n        [shrinkButton\
  \ setTitle:@\"Shrink\" forState:UIControlStateNormal];\n    } else {\n        [shrinkButton\
  \ setTitle:@\"Grow\" forState:UIControlStateNormal];\n    }\n\n    if(hasShrunk\
  \ == NO && hasMoved == NO)\n    {\n        启动持续 1 秒的动画\n        myIcon.transform\
  \ = size;\n        提交动画\n        hasShrunk = YES;\n    }\n    else if(hasShrunk\
  \ == NO && hasMoved == YES)\n    {\n        启动持续 1 秒的动画\n        myIcon.transform\
  \ = CGAffineTransformScale(translate,.25, .25);\n        提交动画\n        hasShrunk\
  \ = YES;\n    }\n    else if(hasShrunk == YES && hasMoved == YES)\n    {\n     \
  \   启动持续 1 秒的动画\n        myIcon.transform = CGAffineTransformScale(translate,1,\
  \ 1);\n        提交动画\n        hasShrunk = NO;\n    }\n    else\n    {\n        启动持续\
  \ 1 秒的动画\n        myIcon.transform = CGAffineTransformIdentity;\n        提交动画\n\
  \        hasShrunk = NO;\n    }\n}\n```\n\n接下来，我们将每个嵌套的 `if` 中的纯英语杂务改为实际代码。我们清除动画状态并将动画设置为\
  \ 1 秒（我随机选择了 1 秒，你可以选择其他时长）。在对噜噜水果执行操作后，我们提交这些操作。这由以下代码说明：\n\n```objc\n-(IBAction)shrink:(id)sender\n\
  {\n    if (hasShrunk) {\n        [shrinkButton setTitle:@\"Shrink\" forState:UIControlStateNormal];\n\
  \    } else {\n        [shrinkButton setTitle:@\"Grow\" forState:UIControlStateNormal];\n\
  \    }\n\n    if(hasShrunk == NO && hasMoved == NO)\n    {\n        [UIView beginAnimations:nil\
  \ context:NULL];\n        [UIView setAnimationDuration:1.0];\n        myIcon.transform\
  \ = size;\n        [UIView commitAnimations];\n        hasShrunk = YES;\n    }\n\
  \    else if(hasShrunk == NO && hasMoved == YES)\n    {\n        [UIView beginAnimations:nil\
  \ context:NULL];\n        [UIView setAnimationDuration:1.0];\n        myIcon.transform\
  \ = CGAffineTransformScale(translate,.25, .25);\n        [UIView commitAnimations];\n\
  \        hasShrunk = YES;\n    }\n    else if(hasShrunk == YES && hasMoved == YES)\n\
  \    {\n        [UIView beginAnimations:nil context:NULL];\n        [UIView setAnimationDuration:1.0];\n\
  \        myIcon.transform = CGAffineTransformScale(translate,1, 1);\n        [UIView\
  \ commitAnimations];\n        hasShrunk = NO;\n    }\n    else\n    {\n        [UIView\
  \ beginAnimations:nil context:NULL];\n        [UIView setAnimationDuration:1.0];\n\
  \        myIcon.transform = CGAffineTransformIdentity;\n        [UIView commitAnimations];\n\
  \        hasShrunk = NO;\n    }\n}\n```\n\n最后，我们在每个条件语句的节之间添加一些间距，效果看起来应该与我在图 5-35\
  \ 中的代码非常相似。\n\n\n\n#### 编写移动按钮代码\n\n实现“移动”按钮功能的代码与之前“收缩”按钮的代码完全相同，唯一区别在于我们不需要修改按钮内的文字，因此将这部分省略。\n\
  \n![images](img/00186.jpg)\n\n**图 5–36.** 编写 `move` 方法\n\n36. 这样我们就剩下同样的四种状态。只需将所有\
  \ `shrunk` 替换为 `moved`，其余部分完全一致。请对照图 5–36 中的代码检查你的实现。\n\n**注意：** 我建议你首先从 `shrink`\
  \ 方法中复制粘贴第一个 `if` 语句，然后将 `shrinks` 和 `moves` 互换。之后，将其粘贴三次；将 `if` 相关的分支改为 `else if`\
  \ 和 `else`。最后，在 `CGAffineTransformTranslates` 中将缩放改为移动。\n\n#### 编写更改按钮代码\n\n现在剩下的唯一任务是编写按下“更改”按钮时改变背景的代码。\n\
  \n![images](img/00187.jpg)\n\n**图 5–37.** 编写 `change` 方法\n\n37. 我们主要需要完成五项工作：递增当前背景索引；确保递增后图片索引仍在数组范围内；初始化\
  \ `UIView`；为背景加载创建动画；最后提交并更改背景。我们的 `change` 方法初始路线图如下：\n\n```\n-(IBAction)change:(id)sender\n\
  {\n  将背景索引递增到下一张背景图片\n  检查 currentBackground 不超出数组范围\n  初始化 UIView\n  创建动画\n  提交并更改背景\n\
  }\n```\n\n我之前说过，每次按下“更改”按钮，都会通过改变背景图片的编号来切换图片。如果当前背景是 `wallPaper_01`，按下“更改”按钮后，我们会递增它，即加一并将\
  \ `wallPaper_02` 设为下一张背景。这意味着，每次按下“更改”按钮时，我们需要先递增 `currentBackground`，如下所示：\n\n\
  ```\n-(IBAction)change:(id)sender\n{\n  currentBackground++;\n  检查 currentBackground\
  \ 不超出数组范围\n  初始化 UIView\n  创建动画\n  提交并更改背景\n}\n```\n\n如果我们持续递增，最终会超过数组中图片的总数。因此，一旦达到数组中的图片数量，我们需要将计数重置为零。如下所示：\n\
  \n```\n-(IBAction)change:(id)sender\n{\n  currentBackground++;\n  if(currentBackground\
  \ >= [bgImages count])\n    currentBackground = 0;\n  初始化 UIView\n  创建动画\n  提交并更改背景\n\
  }\n```\n\n为了初始化 `UIView`，我们需要做两件事，但我为了更酷而添加了第三项任务。我们必须重置（重新启动、归零——无论你如何表述）Apple\
  \ 那帮天才写成的 `beginAnimations` 方法！然后，我们需要设置每个动画的持续时间。正如我之前初始化时提到的，我将两次变化之间的初始时间设置为\
  \ 1 秒。为了更酷，我加入了第三项任务：使用 `UIViewAnimationCurveEaseInOut` 方法决定动画开始和结束的平滑程度。如下所示：\n\
  \n```\n-(IBAction)change:(id)sender\n{\n  currentBackground++;\n  if(currentBackground\
  \ >= [bgImages count])\n    currentBackground = 0;\n  [UIView beginAnimations:@\"\
  changeview\" context:nil];\n  [UIView setAnimationDuration:1];\n  [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n\
  \  创建动画\n  提交并更改背景\n}\n```\n\n**注意：** 要实际更改背景，我们需要谨慎理解这一概念。请仔细阅读并尽力跟上。\n\n我们将每个背景的切换过程分为两步。\n\
  \n1.  首先，我们检查当前背景的数值（或标签）是否与我们正在处理的一致。如果为真，则执行花括号内的代码（如下一点所述）。\n2.  然后，我们将使用 `setAnimationTransition`\
  \ 方法来执行我们选择的任何方法。有卷曲向上、卷曲向下、从左或从右移入、向这边翻转、向那边翻转等多种方法。或者，当你成为超级极客时，也可以创建自己的方法。目前，我只使用卷曲和翻页效果，因此我会恰当地调用这些过渡效果。\n\
  \n更仔细地看，对于每个动画，我们使用如下形式：\n\n```\nif(currentBackground == 我们想要的编号)\n  [UIView setAnimationTransition:\n\
  \                       UIViewAnimationTransition 我们选择的动画\n                    forView:self.view\n\
  \                    cache:YES];\n```\n\n现在重复此方法，并为每个动画随机选择动画效果，代码变成如下形式：\n\n```\n\
  -(IBAction)change:(id)sender\n{\n  currentBackground++;\n  if(currentBackground\
  \ >= [bgImages count])\n    currentBackground = 0;\n  [UIView beginAnimations:@\"\
  changeview\" context:nil];\n  [UIView setAnimationDuration:1];\n  [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n\
  \  if(currentBackground == 1)\n    [UIView setAnimationTransition:\n           \
  \              UIViewAnimationTransitionFlipFromLeft\n                     forView:self.\n\
  \                     view cache:YES];\n  \n  if(currentBackground == 2)\n    [UIView\
  \ setAnimationTransition:\n                         UIViewAnimationTransitionCurlDown\n\
  \                     forView:self.\n                     view cache:YES];\n  \n\
  \  if(currentBackground == 3)\n    [UIView setAnimationTransition:\n           \
  \              UIViewAnimationTransitionCurlUp\n                     forView:self.\n\
  \                     view cache:YES];\n  \n  if(currentBackground == 4)\n    [UIView\
  \ setAnimationTransition:\n                         UIViewAnimationTransitionFlipFromRight\n\
  \                     forView:self.\n                     view cache:YES];\n  \n\
  \  提交并更改背景\n}\n```\n\n最后一步，同样如之前所述，我们只需提交更改并执行代码：\n\n```\n-(IBAction)change:(id)sender\n\
  {\n  currentBackground++;\n  if(currentBackground >= [bgImages count])\n    currentBackground\
  \ = 0;\n  [UIView beginAnimations:@\"changeview\" context:nil];\n  [UIView setAnimationDuration:1];\n\
  \  [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n  if(currentBackground\
  \ == 1)\n    [UIView setAnimationTransition:\n                         UIViewAnimationTransitionFlipFromLeft\n\
  \                     forView:self.\n                     view cache:YES];\n  \n\
  \  if(currentBackground == 2)\n    [UIView setAnimationTransition:\n           \
  \              UIViewAnimationTransitionCurlDown\n                     forView:self.\n\
  \                     view cache:YES];\n  \n  if(currentBackground == 3)\n    [UIView\
  \ setAnimationTransition:\n                         UIViewAnimationTransitionCurlUp\n\
  \                     forView:self.\n                     view cache:YES];\n  \n\
  \  if(currentBackground == 4)\n    [UIView setAnimationTransition:\n           \
  \              UIViewAnimationTransitionFlipFromRight\n                     forView:self.\n\
  \                     view cache:YES];\n  \n  [UIView commitAnimations];\n  myBackground.image\
  \ = [bgImages objectAtIndex:currentBackground];\n}\n```\n\n请对照图 5–37 检查你的代码。大功告成！你能相信吗？你只需运行它，代码就能完美运行……啊哈……才怪！除非你是个超级极客！\n\
  \n\n\n#### 运行代码\n\n让我解释一下。代码能成功运行的可能性很小，但这没关系！你的代码一开始运行失败是完全正常的。指望代码第一次就能完美运行，就像几年前我母亲告诉我的一件事。她在下午五点从城市另一头打来电话说：“亲爱的，我刚出发；我知道现在是五点，但我应该很快就到，因为我希望今天路上不会太堵！”我简直不敢相信她的话。我回答说：“妈，与其指望\
  \ 20 分钟能到，希望路上不堵，最后却大失所望，不如做好花一个小时的准备，听听我给你买的那张 Deva Premal 冥想 CD，放松享受一下？”\n\n同样地，也要预料到会有错误。调试代码是计算机科学家工作中非常重要的一部分，指望不出任何错误只会让你失望。如果真没有错误，那你可就太幸运了！\n\
