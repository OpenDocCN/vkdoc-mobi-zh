  ## 将故事板连接到代码


  尽管完成的故事板很漂亮，但目前如果用户按下任何按钮，它都不会执行任何操作，因为新的用户界面对象尚未绑定到任何代码。在 Xcode 中，将代码连接到故事板的方式是，使用特殊关键字（`IBOutlet`、`IBAction`）定义必须与
  Interface Builder 交互的属性和方法。然后，在`Interface Builder`中找到这些项目，并在故事板与代码之间拖拽连接。




  ### 定义与 Interface Builder 兼容的属性和方法（动作）


  当你从 Xcode 的“标签页应用”模板创建 `IOTFit` 项目时，它已为第一个（创建训练）和第二个（地图训练）视图控制器生成了空白的 Storyboard
  和空白类。如果你在项目导航器中点击 `CreateWorkoutViewController.swift` 文件，编辑器将显示其内容，如代码清单 1-1 所示。此时，`WorkoutMapViewController.swift`
  文件的内容与之类似。


  ```

  import UIKit

  class CreateWorkoutViewController: UIViewController {

  override func viewDidLoad() {

  super.viewDidLoad()

  }

  override func didReceiveMemoryWarning() {

  super.didReceiveMemoryWarning()

  }

  }

  代码清单 1-1

  CreateWorkoutViewController 类的初始内容

  ```


  这并没有什么特别之处，因为初始化视图控制器本身所需的大部分关键代码已由其父类 `UIViewController` 提供。你可能还会注意到，这里没有用于标签的代码。通常来说，对于运行时外观不会显著变化的用户界面元素，你无需声明*属性*（类成员）。然而，那些会变化的元素则应表示为属性。对于“创建训练”视图控制器，你可以忽略“训练距离”和“训练时间”标签，但必须创建属性来表示那些包含数值的标签。


  与 Interface Builder 兼容的属性的初始化方式与普通属性类似，但有两个要点：你必须特别关注它们的类型，并且必须添加一个关键字，让 Interface
  Builder 能将它们暴露给拖放界面（`@IBOutlet`）。


  与普通变量不同，与 Storyboard 关联的用户界面属性将由该 Storyboard 进行初始化。因此，你需要特别关注变量的引用强度和类型。对于大多数属性而言，这意味着你必须将属性定义为
  `optional`（可选择初始化为某个值，或保持可检测的未初始化状态的变量），并且使用 `weak` 引用（其内容不会无限期地保留在内存中）。


  你可以在代码清单 1-2 中找到“创建训练”视图控制器的更新类定义，其中包含了新声明的、格式正确的属性。


  ```

  import UIKit

  class CreateWorkoutViewController: UIViewController {

  @IBOutlet weak var workoutTimeLabel: UILabel?

  @IBOutlet weak var workoutDistanceLabel: UILabel?

  @IBOutlet weak var toggleWorkoutButton: UIButton?

  @IBOutlet weak var pauseWorkoutButton: UIButton?

  override func viewDidLoad() {

  super.viewDidLoad()

  }

  override func didReceiveMemoryWarning() {

  super.didReceiveMemoryWarning()

  }

  }

  代码清单 1-2

  CreateWorkoutViewController 类定义（包含用户界面属性）

  ```


  声明一个可被 Interface 发现的方法的过程与此类似。在 `func` 关键字前添加 `@IBAction` 关键字即可。对于“创建训练”视图控制器，此时需要考虑的用户发起的动作只有两个：开始/停止（切换）训练和暂停/恢复训练。代码清单
  1-3 提供了包含新方法在内的 `CreateWorkoutViewController` 类的修改后定义。


  ```

  import UIKit

  class CreateWorkoutViewController: UIViewController {

  @IBOutlet weak var workoutTimeLabel: UILabel?

  @IBOutlet weak var workoutDistanceLabel:  UILabel?

  @IBOutlet weak var toggleWorkoutButton:  UIButton?

  @IBOutlet weak var pauseWorkoutButton: UIButton?

  override func viewDidLoad() {

  super.viewDidLoad()

  }

  override func didReceiveMemoryWarning() {

  super.didReceiveMemoryWarning()

  }

  @IBAction func toggleWorkout() {

  NSLog("Toggle workout button pressed")

  }

  @IBAction func pauseWorkout() {

  NSLog("Pause workout button pressed")

  }

  }

  代码清单 1-3

  CreateWorkoutViewController 类定义（包含与 Interface Builder 兼容的方法定义）

  ```


  我在这个示例中添加了 `NSLog()` 语句，以便你在点击按钮时，能够在 Xcode 调试面板中查看输出信息。


  接下来是“地图训练”视图控制器，其设置非常直接。你只需向该类添加一个地图视图即可。该视图控制器上的所有用户界面操作都由地图视图处理，因此你无需再定义其他方法。不过，最后还有一点需要注意：要声明一个
  `MKMapView`（地图视图）对象，你必须将 `MapKit` 框架导入到你的类中。代码清单 1-4 展示了包含这些更改的 `WorkoutMapViewController`
  类的修改后类定义。


  ```

