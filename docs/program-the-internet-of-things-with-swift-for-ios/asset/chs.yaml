  ### 自定义项目外观


  虽然您已经为 Create Workout View Controller 中的顶部标签设置了约束，但标签的外观与线框图中的初始设计不符。需要修改文本、应用正确的文本对齐方式（居中）并设置文本大小。请按照图
  1-23 所示的步骤操作。首先，点击故事板中的标签，然后在工具面板（右侧）中点击属性检查器（中心图标）。要更改文本，请在`Text`行中插入您想要的新文本。点击`Font`旁边的`T`图标以更改字体。将弹出一个窗口。不要手动输入字体大小，而是选择
  Apple 预定义的样式`Title 3`。这将有助于文本应用更好地适应有视力障碍的用户。此外，您稍后将使用此系列中的样式，以实现一致的用户界面。点击`Alignment`旁边的“居中”图形以将文本对齐方式设为居中。最后，为防止文本在小屏幕上被截断，请将`Autoshrink`属性设置为`Minimum
  Font Scale`。这将在文本被截断前，将其缩小至原始大小的 50%。


