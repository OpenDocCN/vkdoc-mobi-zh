  提供了 Arduino 兼容性和引脚映射的核心功能。像 Adafruit 这样的制造商可以随后选择要使用的功能以及如何进行封装。要安装构建脚本，你必须通过 `git`
  检出它们。如果你之前安装过 Xcode 命令行工具，那么 `git` 版本控制软件应该已经安装在你的电脑上。如果没有，你可以打开终端并输入以下命令来安装这些工具：


