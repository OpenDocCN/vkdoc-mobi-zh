  \ `SecurityView` 类，包括其属性。\n\n![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig7_HTML.jpg](img/346879_2_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7\n安全视图的最终布局\n\n切换回 `SecurityView.swift` 类，并使用我在代码清单 11-1 中的示例作为您实现的起点。特别注意使用\
  \ `@IBOutlet` 关键字声明按钮和文本字段，并使用 `@IBAction` 关键字声明按钮处理程序，以便两者都与 Interface Builder\
  \ 兼容。\n\n```\nimport UIKit\nclass SecurityView: UIView {\n@IBOutlet var unlockButton:\
  \ UIButton?\n@IBOutlet var passwordTextField: UITextField?\n@IBAction func validatePassword(sender:\n\
  UITextField) {\n//密码处理代码将放在这里\n}\n@IBAction func validateBiometrics(sender:\nUIButton)\
  \ {\n//生物识别处理代码将放在这里\n}\n}\n代码清单 11-1\nSecurityView 类的初始定义\n```\n\n为了完善 `SecurityView`\
  \ 类，您必须将其插座连接到父类。与之前的示例一样，您可以在第 1 章中找到此过程的详细说明。特别不要忘记：\n\n*   在身份检查器（左侧第三个选项卡）中将\
  \ `SecurityView` 类设置为父类。\n*   将 NIB 文件上的 `unlockButton` 和 `passwordTextField` 连接到类中各自的属性（使用连接检查器）。\n\
  *   将 `passwordTextField` 的 `delegate` 属性连接到 `SecurityView` 类（以便处理其事件）。\n*   将 `unlockButton`\
  \ 的 `Touch Up Inside` 事件连接到 `validateBiometrics(sender:)` 方法。\n\n完成所有连接后，安全视图的连接检查器应类似于图\
  \ 11-8 中的截图。\n\n![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig8_HTML.jpg](img/346879_2_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8\n完成后的安全视图连接检查器\n\n对于最后的用户界面设置任务，您必须在 `WorkoutMapViewController` 和 `WorkoutTableViewController`\
  \ 类变为可见时显示安全视图。首先，您必须从 NIB 文件加载安全视图，并使其可供调用类使用。与作为应用程序初始化过程一部分加载的 Main 故事板不同，要加载\
  \ NIB 文件中的视图，您必须尝试通过其 bundle 路径（在 .app 包中的相对路径）加载文件，并验证包含的类是否符合您的预期。在代码清单 11-2 中，我通过\
  \ `setupSecurityView()` 方法实现了这一点，在该方法中，我使用 `Bundle` 类加载此视图，然后使用主视图来调用视图控制器，以设置安全视图的大小和目标位置。\n\
  \n```\nclass WorkoutTableViewController: UITableViewController {\n...\nvar securityView:\
  \ SecurityView?\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n...\nsetupSecurityView()\n\
  }\n...\nfunc setupSecurityView() {\nguard let securityNibItems =\nBundle.main.loadNibNamed(\"\
  SecurityView\", owner:\nnil, options: nil),\nlet securityView = securityNibItems.first\
  \ as?\nSecurityView else { return }\nsecurityView.frame = view.frame\nsecurityView.autoresizingMask\
  \ =  [.flexibleWidth,\n.flexibleHeight]\nself.securityView = securityView\nview.addSubview(securityView)\n\
  }\n}\n代码清单 11-2\n向视图控制器添加安全视图 ( WorkoutTableViewController.swift )\n```\n\n为简洁起见，本章中我的代码清单将仅针对\
  \ `WorkoutTableViewController` 类，但所有相同的逻辑都可以直接复制到 `WorkoutMapViewController` 类中，只有少数例外，我将在本章中指出。\n\
  \n为了让用户看到安全视图，您必须在 `WorkoutTableViewController` 或 `WorkoutMapViewController` 类变为活动状态时，将其置于视图层次结构的顶部。在代码清单\
  \ 11-3 中，我通过 `showSecurityView()` 方法执行此步骤，该方法从 `viewWillAppear()` 方法调用。\n\n```\n\
  class WorkoutTableViewController: UITableViewController {\n...\noverride func viewWillAppear(_\
  \ animated: Bool) {\nsuper.viewWillAppear(animated)\n...\nshowSecurityView()\n}\n\
  ...\nfunc showSecurityView() {\nif let securityView = self.securityView,\nsecurityView.isHidden\
  \ == true {\ntableView.reloadData()\nsecurityView.alpha = 1.0\nsecurityView.isHidden\
  \ = false\nview.bringSubview(toFront: securityView)\n}\n}\n}\n代码清单 11-3\n在选项卡变为活动状态时显示安全视图\
  \ ( WorkoutTableViewController.swift )\n```\n\n顾名思义，*视图层次结构*意味着视图以堆栈的形式呈现，最顶层的视图是用户看到的视图。当您在\
  \ Interface Builder 中构建用户界面时，您只需将子视图添加到主视图即可。由于所有子视图都处于相同的呈现级别（z 顺序），因此无需管理视图可见性。对于安全视图，它应呈现在其调用类中的其他所有视图之上，以便在锁定状态下遮挡用户界面。我能够在\
  \ `showSecurityView()` 方法中执行此操作。我在主视图上使用了 `bringSubview(toFront:)` 方法。为避免副作用，我还在安全视图上使用了\
  \ `isHidden` 属性，以防止视图在已经处于活动状态时被两次呈现。\n\n\n\n## 查询传感器可用性\n\n与本书中实现其他基于硬件的 API 一样，在尝试使用\
  \ Touch ID 或 Face ID 之前，必须先检查设备上是否可用这两种功能，以及您的应用是否有权限访问它们。要查询此信息并最终访问传感器，您需要使用`LocalAuthentication`框架为应用建立安全上下文。为了维护基于设备的安全模型，Apple\
  \ 通过一个名为安全隔区（Security Enclave）的独立微处理器在 iPhone 上执行所有加密。`LocalAuthentication`框架允许您通过称为上下文的会话访问安全隔区，在这些会话中，您可以查询安全策略的可用性（例如，通过生物特征传感器进行身份验证）并尝试通过该安全策略请求验证。您的应用在任何时候都无法访问用户的个人信息或加密密钥，从而维护设备的安全。成功或失败通过一个布尔返回值和错误对象返回，错误对象将在失败时设置为非\
  \ nil 值，并描述失败原因。\n\n您可以使用`LocalAuthentication`框架中的`LAContext`类为安全视图建立安全上下文，并通过`LAContext`对象上的`canEvaluatePolicy(policy:error:)`方法执行可用性查询。在代码清单\
  \ 11-4 中，我扩展了`SecurityView`类，通过将上下文和身份验证类型维护为属性（稍后发起身份验证请求时可重用）来包含此功能。\n\n```\n\
  import UIKit\nimport LocalAuthentication\nclass SecurityView: UIView {\n...\nlet\
  \ context = LAContext()\noverride func awakeFromNib() {\nsuper.awakeFromNib()\n\
  commonInit()\n}\nprivate func commonInit() {\nlet error: ErrorPointer = nil\nif\
  \ context.canEvaluatePolicy(\n.deviceOwnerAuthenticationWithBiometrics, error: error)\
  \ {\n//成功！\n} else {\nNSLog(\"设备上生物特征识别不可用\")\nunlockButton?.isEnabled = false\n\
  }\n}\n}\n```\n\n**代码清单 11-4** 使用上下文检测生物特征识别的可用性（`SecurityView.swift`）\n\n与视图控制器上的`viewDidLoad()`方法类似，视图有一个`awakeFromNib()`方法，该方法在视图从\
  \ NIB 文件加载后被调用。截至撰写本文时，Apple 的主要安全策略是“生物特征识别与设备密码”或仅“生物特征识别”。由于该应用将使用自己的密码，因此我选择为\
  \ IOTFit 应用跳过设备密码选项。\n\n尽管策略查询不返回传感器类型信息，但在确定应用有权访问生物特征识别后，您可以使用`LAContext`对象的`biometryType`属性来确定此信息。在代码清单\
  \ 11-5 中，我扩展了`commonInit()`方法以检查此信息，并更新“使用 Face ID”按钮的标题以正确反映传感器类型。如果生物特征识别不可用，我将禁用该按钮，以防止用户意外点击。\n\
  \n```\nimport UIKit\nimport LocalAuthentication\nenum AuthenticationType : String\
  \ {\ncase faceID\ncase touchID\ncase password\ncase notAvailable\n}\nclass SecurityView:\
  \ UIView {\n...\nvar authenticationType: AuthenticationType?\n...\nprivate func\
  \ commonInit() {\nlet error: ErrorPointer = nil\nif context.canEvaluatePolicy(\n\
  .deviceOwnerAuthenticationWithBiometrics,\nerror: error) {\nswitch (context.biometryType)\
  \ {\ncase LABiometryType.faceID:\nauthenticationType = AuthenticationType.faceID\n\
  unlockButton?.setTitle(\"使用 Face ID\", for:\n.normal)\ncase LABiometryType.touchID:\n\
  authenticationType = AuthenticationType.touchID\nunlockButton?.setTitle(\"使用 Touch\
  \ ID\", for:\n.normal)\ndefault:\nauthenticationType =\nAuthenticationType.notAvailable\n\
  unlockButton?.isEnabled = false\n}\n} else {\nNSLog(\"设备上生物特征识别不可用\")\nunlockButton?.isEnabled\
  \ = false\n}\n}\n}\n```\n\n**代码清单 11-5** 从上下文访问传感器类型（`SecurityView.swift`）\n\n##\
  \ 使用 Face ID 或 Touch ID 限制功能访问\n\n既然您已确定设备上生物特征识别的可用性并确定了传感器类型，就可以利用这些信息通过`SecurityView`类上的`context`属性发起身份验证请求。要发起此调用，您将使用`LAContext`对象上的`evaluatePolicy(policy:localizedReason:)`方法。如前所述，遵循\
  \ Apple 的安全限制，如果请求失败，它将返回一个指示成功或失败的布尔值和一个非 null 的`Error`对象。在代码清单 11-6 中，我从`validateBiometrics(sender:)`方法中发起了此调用。\n\
  \n```\nclass SecurityView: UIView {\n...\n@IBAction func validateBiometrics(sender:\
  \ UIButton) {\npasswordTextField?.resignFirstResponder()\nlet permissionString =\
  \ \"使用生物特征识别解锁以显示运动数据\"\ncontext.evaluatePolicy(\n.deviceOwnerAuthenticationWithBiometrics,\n\
  localizedReason: permissionString) { [weak self]\n(success: Bool, error: Error?)\
  \ in\nguard let authenticationType =\nself?.authenticationType else { return }\n\
  if success == true {\nself?.delegate?.didFinishWithAuthenticationType(\nauthenticationType)\n\
  } else {\nself?.delegate?.didFinishWithError(description:\nerror.debugDescription)\n\
  }\n}\n}\n}\n```\n\n**代码清单 11-6** 请求生物特征授权（`SecurityView.swift`）\n\n除了为您向安全隔区发起调用之外，`LocalAuthorization`上下文还提供了初始权限弹窗，用于为您的应用启用\
  \ Face ID，以及您发起上述授权请求时出现的弹窗。不幸的是，作为开发者，您需要自行处理结果。基于视图的实现的一个限制是视图存在于视图控制器之外，因此默认情况下，您无法在视图外部呈现任何用户界面更新。为解决此问题，您可以建立一个协议，在安全请求成功或失败完成时，将信息传回给展示视图控制器。\n\
  \n在代码清单 11-7 中，我将此协议定义为`SecurityViewDelegate`，以反映实现该协议的类是该协议的委托。其方法包括`didFinishWithAuthenticationType(type:)`（在请求成功完成时调用）和`didFinishWithError(description:)`（在失败时调用）。这与用于\
  \ iPhone 图像选择器的`UIImagePickerControllerDelegate`协议的设计类似，并允许将成功和失败作为独立事件处理。\n\n```\n\
  import UIKit\nimport LocalAuthentication\n...\nprotocol SecurityViewDelegate {\n\
  func didFinishWithAuthenticationType(_ type: AuthenticationType)\nfunc didFinishWithError(description:\
  \ String)\n}\nclass SecurityView: UIView {\n...\nvar delegate: SecurityViewDelegate?\n\
  ...\n@IBAction func validateBiometrics(sender:\nUIButton) {\n...\ncontext.evaluatePolicy(\n\
  .deviceOwnerAuthenticationWithBiometrics,\nlocalizedReason: permissionString) {\n\
  [weak self] (success: Bool, error:\nError?) in\n...\nif success == true {\nself?.delegate?.didFinishWithAuthenticationType(\n\
  authenticationType)\n} else {\nself?.delegate?.didFinishWithError(description:\n\
  error.debugDescription)\n}\n}\n}\n}\n```\n\n**代码清单 11-7** 定义协议以从安全视图传递消息（`SecurityView.swift`）\n\
  \n消息通过安全视图上的`delegate`属性传回给展示视图控制器。它被定义为可选值，以防止开发人员未选择实现委托时发生崩溃。\n\n\n\n## 完成身份验证流程的最后步骤\n\
  \n完成身份验证流程的最后步骤，是将 `WorkoutTableViewController` 和 `WorkoutMapViewController` 类声明为实现\
  \ `SecurityViewDelegate` 协议的委托，并实现在成功或失败事件触发时将被调用的方法。在清单 11-8 中，我通过在从 `WorkoutTableViewController`\
  \ 类呈现安全视图时设置委托属性来实现这一点。对于成功事件，我关闭了安全视图；对于失败事件，我在视图控制器的所有其他视图之上呈现一个包含错误描述的 `UIAlertController`。为了实现更流畅的过渡效果（例如\
  \ 1Password 的解锁动画），我使用了 `UIView` 类的 `animate()` 方法来将安全视图的 alpha 级别（透明度）动画渐变为零。\n\
  \n```\nclass WorkoutTableViewController: UITableViewController {\n...\nfunc setupSecurityView()\
  \ {\n...\nsecurityView.delegate = self\n...\n}\n}\nextension WorkoutTableViewController:\
  \ SecurityViewDelegate {\nfunc didFinishWithError(description: String) {\nlet alert\
  \ = UIAlertController(title: \"身份验证错误\", message: description, preferredStyle:\n\
  .alert)\nlet alertAction = UIAlertAction(title: \"确定\", style:\n.default, handler:\
  \ nil)\nalert.addAction(alertAction)\npresent(alert, animated: true)\n}\nfunc didFinishWithAuthenticationType(_\
  \ type:\nAuthenticationType) {\nUIView.animate(withDuration: 0.3, animations: {\
  \ [weak\nself] in\nDispatchQueue.main.async {\nself?.securityView?.alpha = 0.0\n\
  self?.securityView?.isHidden = true\nself?.securityView?.passwordTextField?.text\
  \ =\nnil\nguard let securityView = self?.securityView\nelse { return }\nself?.view.sendSubview(toBack:\
  \ securityView)\n}\n})\n}\n}\n清单 11-8\n实现 SecurityViewDelegate 协议以从安全视图接收消息 (WorkoutTableViewController.swift)\n\
  ```\n\n在实现此应用程序时，我注意到 `UITableViewController` 类期望成为层次结构中的主视图，并且有时会显示在其上方呈现的视图下方。为了解决这个问题，我修改了清单\
  \ 11-9 中所示的 `UITableViewDataSource` 委托方法，以在安全视图未激活时仅显示来自 HealthKit 的数据。每次影响安全视图呈现状态的调用之后，我都会进行此调用。\n\
  \n```\nclass WorkoutTableViewController: UITableViewController {\n...\n// MARK:\
  \ - 表格视图数据源\n...\noverride func tableView(_ tableView: UITableView,\nnumberOfRowsInSection\
  \ section: Int) -> Int {\nguard let securityView = securityView else { return 0\
  \ }\nif securityView.isHidden {\nreturn self.workouts?.count ?? 0\n} else {\nreturn\
  \ 0\n}\n}\n...\nfunc showSecurityView() {\nif let securityView = self.securityView,\n\
  securityView.isHidden == true {\ntableView.reloadData()\nsecurityView.alpha = 1.0\n\
  securityView.isHidden = false\nview.bringSubview(toFront: securityView)\n}\n}\n\
  }\nextension WorkoutTableViewCon troller: SecurityViewDelegate {\n...\nfunc didFinishWithAuthenticationType(_\
  \ type:\nAuthenticationType) {\nUIView.animate(withDuration: 0.3, animations:\n\
  { [weak self] in\nDispatchQueue.main.async {\nself?.securityView?.alpha = 0.0\n\
  ...\nself?.view.sendSubview(toBack:\nsecurityView)\nself?.tableView.reloadData()\n\
  }\n})\n}\n}\n清单 11-9\n根据安全视图的状态显示或隐藏表格视图数据 (WorkoutTableViewController.swift)\n\
  ```\n\n如果你现在尝试测试该应用程序，在“锻炼历史记录”或“上次运行”屏幕上首次点击“使用面容 ID”按钮时，系统会弹出接受面容 ID 身份验证的对话框，然后是面容\
  \ ID 扫描对话框。验证通过后，安全视图将消失，如图 11-9 所示。\n\n![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig9_HTML.jpg](img/346879_2_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9\n\n使用面容 ID 解锁“上次运行”屏幕\n\n## 使用钥匙串服务保护数据\n\n既然应用程序可以通过生物识别技术授权用户，你现在必须实现密码字段作为备用方案，以防用户在使用面容\
  \ ID 或触控 ID 时遇到问题。正如本章开头所述，你将通过钥匙串服务将密码存储在设备的“安全隔区”中。这些数据仅在应用程序处于活动状态并在前台运行时才被解密并提供。\n\
  \n首先，你必须实现 `UITextFieldDelegate` 协议，以处理来自密码文本字段的事件。尽管该协议定义了几个事件，例如编辑开始或输入文本发生更改时，但你要观察的事件是按下屏幕键盘上的\
  \ Return 键时。在清单 11-10 中，我通过在安全视图中实现 `textFieldShouldReturn()` 委托方法来处理此事件。虽然此方法旨在启用或禁用\
  \ Return 键，但许多开发者会在该方法完成之前通过调用其他方法对其进行扩充。对于 IOTFit 应用，按下 Return 键时，应尝试验证密码并清除文本字段。\n\
  \n```\nextension SecurityView: UITextFieldDelegate {\nfunc textFieldShouldReturn(_\
  \ textField: UITextField) ->\nBool {\ntextField.resignFirstResponder()\nvalidatePassword(sender:\
  \ textField)\nreturn true\n}\n}\n清单 11-10\n按下 Return 键时为文本字段执行操作 (SecurityView.swift)\n\
  ```\n\n接下来，你必须验证密码。不幸的是，到目前为止，应用程序的实现尚未提示用户设置初始密码，也没有将其存储在任何地方。你可以通过类似从应用的 `UserDefaults`\
  \ 中访问值的方式来执行此操作，即检查“安全隔区”中是否存在键值对，如果不存在则设置它。使用钥匙串服务时，这是通过尝试基于*搜索查询*来提取值来完成的。\n\n\
  尽管名称如此，但钥匙串服务搜索查询更接近于谓词，而不是简单的键值对查找。要执行搜索查询，你必须指定要查询的值类型（例如，网站密码、通用密码、SSH 密钥）、要检索的匹配数、是否要从查询中访问数据以及数据的标识信息（例如应用名称）。对于\
  \ IOTFit 应用程序，你要存储的数据是一个通用密码，由应用名称标识，代替账户名称。在清单 **11-11** 中，我扩展了 `SecurityView`\
  \ 类，通过 `checkPasswordExistence()` 方法进行此查询。由于呈现视图控制器必须呈现用于请求密码的用户界面，我扩展了 `SecurityViewDelegate`\
  \ 协议，以包含反映应用密码状态的新方法。\n\n```\nprotocol SecurityViewDelegate {\nfunc didFinishWithAuthenticationType(_\
  \ type:\nAuthenticationType)\nfunc didFinishWithError(description: String)\nfunc\
  \ needsInitialPassword()\n}\nclass SecurityView: UIView {\n...\nlet ACCOUNT_NAME:\
  \ String = \"IOTFit\"\n...\nfunc checkPasswordExistence() {\nguard let accessControl\
  \ = accessControl else { return }\nlet query: [String: Any] = [kSecClass as String:\n\
  kSecClassGenericPassword,\nkSecAttrAccount as String: ACCOUNT_NAME,\nkSecMatchLimit\
  \ as String: kSecMatchLimitOne,\nkSecReturnAttributes as String: true,\nkSecReturnData\
  \ as String: true]\nlet queryStatus = SecItemCopyMatching(query as\nCFDictionary,\
  \ nil)\nif queryStatus != errSecSuccess {\ndelegate?.needsInitialPassword()\n} else\
  \ {\nNSLog(\"密码已被设置\")\n}\n}\n}\n清单 11-11\n查询安全隔区中是否存在密码 (SecurityView.swift)\n\
  ```\n\n\n\n尽管这打破了苹果许多其他 API 的模式，但执行查询的唯一方式是通过尝试对钥匙串（`copy`、`update`、`add` 或 `delete`）执行操作。由于\
  \ `SecItemCopyMatching(query:result:)` 方法**不**返回错误对象，你可以通过执行操作后返回的 `OSStatus` 值来验证操作结果。任何非\
  \ `errSecSuccess` 的值都表示操作失败。在我调试此应用程序时，我注意到在 Google 中搜索该错误码能有效确定失败原因。苹果在 iOS 和 OS\
  \ X 中都使用了 `OSStatus` 类型，因此关于其可能值代表含义的信息非常丰富。\n\n### 注意\n\n术语 `Security Enclave`\
  \ 和 `Keychain` 在 iOS 中可以互换使用，因为钥匙串服务沿用了 macOS 上钥匙串服务的设计。在 macOS 中，安全存储常被通俗地称为 `the\
  \ Keychain`。\n\n接下来，你必须进行调用以检查密码是否存在，如果不存在则提示用户输入密码。在显示包含密码文本字段的安全视图之前，先检查是否有密码用于验证，这是合理的。在我的实现中，我通过在\
  \ `WorkoutMapViewController` 和 `WorkoutTableViewController` 类的 `showSecurityView()`\
  \ 方法中显示安全视图后，添加一个检查密码状态的调用来实现此逻辑，如代码清单 11-12 所示。\n\n```\nclass WorkoutTableViewController:\n\
  UITableViewController {\n...\nfunc showSecurityView() {\nif let securityView = self.securityView,\n\
  securityView.isHidden == true {\n...\n}\nsecurityView?.checkPasswordExistence()\n\
  }\n}\n代码清单 11-12\n在显示安全视图时检查密码是否已设置 (WorkoutTableViewController.swift)\n```\n\n\
  为了处理密码不存在的情况，你必须创建一个用于将字符串值保存到钥匙串的方法。如前所述，所有钥匙串服务操作都必须通过查询来执行。在向钥匙串添加新项目时，查询与查找值几乎完全相同，只是你需要将新值作为二进制数据包含在内。在代码清单\
  \ 11-13 中，我通过 `SecurityView` 类中的 `savePassword(password:)` 方法添加了此逻辑。请特别注意 `kSecValueData`\
  \ 键值对和 `SecItemAdd(query:result:)`，它们负责实现 `add value` 操作。\n\n```\nprotocol SecurityViewDelegate\
  \ {\n...\nfunc needsInitialPassword()\nfunc didSavePassword(success: Bool)\n}\n\
  class SecurityView: UIView {\n...\nfunc savePassword(password: String) {\nguard\
  \ let passwordData = password.data(using:\nString.Encoding.utf8) else { return }\n\
  let query: [String: Any] = [kSecClass as String:\nkSecClassGenericPassword,\nkSecAttrAccount\
  \ as String: ACCOUNT_NAME,\nkSecValueData as String: passwordData]\nlet queryStatus\
  \ = SecItemAdd(query as CFDictionary,\nnil)\nif queryStatus == errSecSuccess {\n\
  delegate?.didSavePassword(success: true)\n} else {\nNSLog(\"Error saving passcode:\
  \ \\(queryStatus)\")\ndelegate?.didSavePassword(success: false)\n}\n}\n}\n代码清单 11-13\n\
  将值保存到钥匙串 (SecurityView.swift)\n```\n\n与检查密码状态类似，我扩展了 `SecurityViewDelegate` 协议，增加了一个用于指示密码是否成功保存的方法。为了完成密码保存过程，需要在\
  \ `WorkoutTableViewController` 和 `WorkoutMapViewController` 类中实现 `needsInitialPassword()`\
  \ 和 `didSavePassword(success:)` 方法，如代码清单 11-14 所示。在我的实现中，我选择展示一个包含文本字段的 `UIAlertController`\
  \ 来接受新密码，并使用 `NSLog()` 将操作结果记录到控制台。\n\n```\nextension WorkoutTableViewController:\
  \ SecurityViewDelegate {\nfunc needsInitialPassword() {\nlet alert = UIAlertController(title:\
  \ \"初始安装\",\nmessage: \"请为您的数据设置密码\", preferredStyle: .alert)\nalert.addTextField\
  \ { (textField: UITextField) in\ntextField.placeholder = \"密码\"\ntextField.isSecureTextEntry\
  \ = true\n}\nlet okAction = UIAlertAction(title: \"确定\", style:\n.default) { [weak\
  \ self] (action: UIAlertAction) in\nguard let textField = alert.textFields?.first,\n\
  let password = textField.text else { return }\nself?.securityView?.savePassword(password:\n\
  password)\n}\nlet cancelAction = UIAlertAction(title: \"取消\",\nstyle: .cancel, handler:\
  \ nil)\nalert.addAction(okAction)\nalert.addAction(cancelAction)\npresent(alert,\
  \ animated: true)\n}\nfunc didSavePassword(success: Bool) {\nNSLog(\"密码保存状态: \\\
  (success)\")\n}\n...\n}\n代码清单 11-14\n提示输入新密码 (WorkoutTableViewController.swift)\n\
  ```\n\n对于密码验证过程的最后一步，你必须在 `SecurityView` 类中实现 `validatePassword()` 方法，该方法应将保存的密码与安全视图文本字段中输入的文字进行比较。从钥匙串提取值的查询与检测值是否存在时的查询完全相同；然而，在执行\
  \ `copy` 操作后，你应该检查其结果以提取密码。在代码清单 11-15 中，我通过向 `SecurityView` 类添加 `getSavedPassword()`\
  \ 方法实现了这一点。\n\n```\nclass SecurityView: UIView {\n...\nprivate func getSavedPassword()\
  \ -> String? {\nlet query: [String: Any] = [kSecClass as String:\nkSecClassGenericPassword,\n\
  kSecAttrAccount as String: ACCOUNT_NAME,\nkSecMatchLimit as String: kSecMatchLimitOne,\n\
  kSecReturnAttributes as String: true,\nkSecReturnData as String: true]\nvar keychainItemRef:\
  \ CFTypeRef?\nlet queryStatus = SecItemCopyMatching(query as\nCFDictionary, &keychainItemRef)\n\
  guard queryStatus == errSecSuccess,\nlet keychainItem = keychainItemRef as? [String:\n\
  Any],\nlet passwordData = keychainItem[kSecValueData as\nString] as? Data,\nlet\
  \ password = String(data: passwordData, encoding:\nString.Encoding.utf8)\nelse {\
  \ return nil }\nreturn password\n}\n@IBAction func validatePassword(sender: UITextField)\
  \ {\nguard let input = sender.text,\nlet savedPassword = getSavedPassword(),\ninput\
  \ == savedPassword else {\ndelegate?.didFinishWithError(description:\n\"无效的密码\"\
  )\nreturn\n}\ndelegate?.didFinishWithAuthenticationType(.password)\n}\n}\n代码清单 11-15\n\
  对照钥匙串中保存的值验证密码 (SecurityView.swift)\n```\n\n正如你需要将字符串序列化为二进制数据才能将其保存到钥匙串中，为了使用存储的值进行字符串比较，你必须使用\
  \ `String(data:encoding:)` 构造方法将它们从二进制数据重新组合成字符串。\n\n\n\n### 使用生物识别或应用密码锁定钥匙串项目\n\
  \n作为一项额外的安全功能，你可以通过将钥匙串项目限制在特定的安全上下文中来进一步锁定它们。例如，如果你正在构建一个密码管理器，你可以使用此功能使特定的一组密码只能通过面容\
  \ ID 或设备密码访问。这是一种替代构建完整安全覆盖层（如本章所述）的技术。\n\n要为你的钥匙串项目添加这一额外的安全层，只需在每个搜索查询中添加一个安全上下文和访问控制设置。类似于`LocalAuthentication`框架为你呈现初始的面容\
  \ ID 权限提示，当你尝试使用启用了访问控制的搜索查询访问值时，它也会呈现系统的生物识别或密码提示。\n\n对于额外的安全设置，你可以使用与`SecurityView`类相同的安全上下文。但是，你需要通过`SecAccessControl`类定义一个单独的访问控制策略。在清单\
  \ 11-16 中，初始化`SecurityView`类后，我指定了一个安全策略，该策略将仅在设备解锁且用户通过面容 ID 或应用特定密码验证其存在时，才使钥匙串项目可用。\n\
  \n```\nclass SecurityView: UIView {\n...\nprivate func commonInit() {\nlet error:\
  \ ErrorPointer = nil\nif context.canEvaluatePolicy(\n.deviceOwnerAuthenticationWithBiometrics,\n\
  error: error) {\n..\n} else {\nNSLog(\"Biometrics unavailable on device\")\n...\n\
  }\naccessControl = SecAccessControlCreateWithFlags(nil,\nkSecAttrAccessibleWhenUnlocked,\
  \ .userPresence,\nnil)\n}\n}\nListing 11-16\nAdding an Access Control Policy (SecurityView.swift)\n\
  ```\n\n要使用访问策略和上下文来保护钥匙串项目，只需修改之前的复制和添加查询，以包含`SecurityView`类的上下文和访问控制策略，如清单 11-17\
  \ 所示。\n\n```\nclass SecurityView: UIView {\n...\nfunc checkPasswordExistence() {\n\
  guard let accessControl = accessControl else { return }\nlet query: [String: Any]\
  \ = [kSecClass as\nString: kSecClassGenericPassword,\nkSecAttrAccount as String:\
  \ ACCOUNT_NAME,\nkSecMatchLimit as String: kSecMatchLimitOne,\nkSecReturnAttributes\
  \ as String: true,\nkSecReturnData as String: true,\nkSecAttrAccessControl as String:\
  \ accessControl as Any,\nkSecUseAuthenticationContext as String: context]\n...\n\
  }\nfunc savePassword(password: String) {\nguard let accessControl = accessControl,\n\
  let passwordData = password.data(using:\nString.Encoding.utf8) else { return }\n\
  let query: [String: Any] = [kSecClass as\nString: kSecClassGenericPassword,\nkSecAttrAccount\
  \ as String: ACCOUNT_NAME,\nkSecAttrAccessControl as String: accessControl as\n\
  Any,\nkSecUseAuthenticationContext as String: context,\nkSecValueData as String:\
  \ passwordData]\n...\n}\nprivate func getSavedPassword() -> String? {\nguard let\
  \ accessControl = accessControl else {\nreturn nil\n}\nlet query: [String: Any]\
  \ = [kSecClass as\nString: kSecClassGenericPassword,\nkSecAttrAccount as String:\
  \ ACCOUNT_NAME,\nkSecMatchLimit as String: kSecMatchLimitOne,\nkSecReturnAttributes\
  \ as String: true,\nkSecAttrAccessControl as String:\naccessControl as Any,\nkSecUseAuthenticationContext\
  \ as String:\ncontext,\nkSecReturnData as String: true]\n...\nreturn password\n\
  }\n}\nListing 11-17\nUsing the Access Control Policy and Context in Keychain Search\
  \ Queries (SecurityView.swift)\n```\n\n现在，如果你在设备上加载`IOTFit`应用并尝试访问“上次跑步”或“锻炼历史”标签，你将在标签加载之前看到一个应用密码对话框，如图\
  \ 11-10 所示。输入密码后，你将有一两分钟的时间在各个标签之间自由导航，然后系统会要求你重新验证应用。虽然额外的密码提示对于`IOTFit`应用来说有点过度，但它可能对你的其他项目有所帮助。\n\
  \n![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig10_HTML.jpg](img/346879_2_En_11_Fig10_HTML.jpg)\n\
  \nFigure 11-10\n\n受访问控制保护的钥匙串项目的应用密码提示\n\n### 注意事项\n\n为钥匙串项目设置安全策略后，每当你尝试再次访问这些值时，系统总是会提示你输入原始安全设置。要重置这些值，你必须在应用中添加一个`delete`操作或重置你的设备。在撰写本文时，即使应用被删除，钥匙串项目也会被保留。\n\
  \n\n\n## 检测应用何时回到前台\n\n作为 IOTFit 应用最后一项安全增强措施，你将在应用从后台返回前台时，在“上次跑步”和“锻炼历史”屏幕上显示安全视图。如果你经常使用密码管理器，你会认出这是它提供的功能之一，用于防止你在首次解锁应用后信息被盗。\n\
  \n如果你曾查看过任一项目中的 `AppDelegate.swift` 文件，你可能会注意到 `applicationDidEnterBackground()`\
  \ 和 `applicationDidEnterForeground()` 方法，它们负责处理应用进入前台或后台的情况。这些方法旨在让你有机会在应用状态发生变化时启动或停止后台任务，例如网络调用或数据库写入。苹果节省电池电量的方法之一是通过一个调度器，该调度器仅根据应用最常使用的时间来分配后台执行时间。不幸的是，这些时间可能不可预测，而这些方法会给你几秒钟的执行时间来准备或结束应用，然后应用就会被发送到后台，所有任务暂停。\n\
  \n然而，对于 IOTFit 应用，并没有全局运行的任务或对象可以从应用委托中暂停。相反，你必须从各个视图控制器中观察状态变化。为了实现这一点，你可以使用 iOS\
  \ 的通知中心来观察“锻炼历史”和“上次跑步”视图控制器中的 `UIApplicationWillResignActive` 事件。观察通知时，无论它们是来自系统事件、内部消息还是推送通知，你都需要指定通知名称和一个选择器（方法签名）来处理该通知。在代码清单\
  \ 11-18 中，我更新了 `WorkoutTableViewController` 类，使其在检测到后台事件时调用 `showSecurityView()`\
  \ 方法。\n\n```\nclass WorkoutTableViewController: UITableViewController {\n...\noverride\
  \ func viewDidLoad() {\nsuper.viewDidLoad()\n...\nsetupSecurityView()\nlet notificationCenter\
  \ = NotificationCenter.default\nnotificationCenter.addObserver(self, selector\n\
  #selector(showSecurityView), name:\nNotification.Name.UIApplicationWillResignActive,\n\
  object: nil)\n}\n}\n代码清单 11-18\n使用通知观察器检测应用进入后台 (WorkoutTableViewController.swift)\n\
  ```\n\n你只应调用通知观察器一次，因为多个观察器会导致选择器被多次调用。在我的示例中，我通过将观察器添加到视图控制器的 `viewDidLoad()` 方法中，确保它只被调用一次。\n\
  \n当你尝试编译应用时，会收到一个编译器错误，提示 `showSecurityView()` 方法不适合作为选择器。要修复此问题，请在函数定义前添加 `@objc`\
  \ 关键字，如代码清单 11-19 所示。这是因为选择器是从 Objective-C 移植过来的概念，需要将 Swift 方法定义为与 Objective-C\
  \ 兼容，才能用作选择器。修改后，应用现在应该可以成功编译了。\n\n```\nclass WorkoutTableViewController: UITableViewController\
  \ {\n...\n@objc func showSecurityView() {\n...\nsecurityView?.checkPasswordExistence()\n\
  }\n}\n代码清单 11-19\n定义与 Objective-C 兼容的方法 (WorkoutTableViewController.swift)\n```\n\
  \n如果你现在在设备上运行应用，在解锁“上次跑步”或“锻炼历史”屏幕并将应用置于后台后，当你重新打开应用时，安全视图会重新出现。现在你已经创建了市面上最安全的健身应用之一。恭喜你！\n\
  \n## 总结\n\n在本章中，你学习了如何利用 Face ID、Touch ID 和钥匙串服务来保护 IOTFit 应用中的敏感用户数据。使用 iOS 的 `LocalAuthentication`\
  \ 框架，你能够检测生物识别是否可用于应用，相应地修改用户界面，并使用设备的生物识别传感器解锁安全视图。作为备选方案，在生物识别不可用或失败的情况下，你学习了如何将应用密码存储在设备的安全隔区中，以及如何使用钥匙串服务对该数据执行添加和查找操作。更进一步，你学习了如何通过使用钥匙串服务的访问控制来避免编写自己的安全视图，并弄清楚了如何在应用进入后台时锁定屏幕。\n\
  \n在设计这个项目时，我从密码管理器中获得了灵感，因为我觉得它们提供的安全用户体验适用于任何需要在设备初始锁屏之外保护用户数据的情况。我希望通过本章的课程，你现在能够构建出可以防止数据被盗的应用——这些盗窃行为可能仅仅因为他人能够访问已解锁的设备，或者将设备连接到计算机并读取其上的用户数据就得以发生。\n\
