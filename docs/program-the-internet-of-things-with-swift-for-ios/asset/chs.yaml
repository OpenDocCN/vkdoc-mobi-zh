  \n对于最后几个与计步器相关的任务，你需要能够停止和暂停计步器更新。要停止计步器更新，只需在 `toggleWorkout()` 方法中，对 `CMPedometer`\
  \ 对象调用 `stopUpdates()` 方法即可，如代码清单 3-6 所示。\n\n```\n@IBAction func toggleWorkout()\
  \ {\n    switch currentWorkoutState {\n    case .inactive:\n        requestLocationPermission()\n\
  \    case .active:\n        currentWorkoutState = .inactive\n        stopWorkoutTimer()\n\
  \        pedometer?.stopUpdates()\n        WorkoutDataManager.sharedManager.saveWorkout(duration:\
  \ workoutDuration)\n    default:\n        NSLog(\"toggleWorkout() called out of\
  \ context!\")\n    }\n    updateUserInterface()\n}\n```\n\n*代码清单 3-6 停止计步器更新*\n\n\
  计步器没有可用的暂停方法；不过，你可以通过精心管理用于处理时间更新的变量来实现同样的功能。`startPedometerUpdates()` 方法的原始实现使用\
  \ `workoutStartTime` 属性作为所有计步器更新的基准。所有更新将根据原始开始时间与上次更新时间之间的时间段生成数据。在这种行为下，你无法实现准确的暂停。然而，如果你使用\
  \ `lastSavedTime`（即你创建的用于管理工作 out 时长标签时间更新的属性），则可以获取到一个查询计步器更新的起始日期值，当用户按下“暂停”和“恢复”按钮时，该日期值会随之更新。在代码清单\
  \ 3-7 中，我更新了 `startPedometerUpdates()` 方法，使其在计算运动距离时使用 `lastSavedTime` 属性和增量数据更新。\n\
  \n```\nfunc startPedometerUpdates() {\n    guard let lastSavedTime = lastSavedTime\
  \ else { return }\n    pedometer = CMPedometer()\n    pedometer?.startUpdates(from:\
  \ lastSavedTime, withHandler: {\n        [weak self] (pedometerData: CMPedometerData?,\
  \ error: Error?) in\n        NSLog(\"Received pedometer update!\")\n        if let\
  \ error = error {\n            NSLog(\"Error reading data: \\(error.localizedDescription)\"\
  )\n            return\n        }\n        guard let pedometerData = pedometerData,\n\
  \              let distance = pedometerData.distance as? Double,\n             \
  \ let averagePace = pedometerData.averageActivePace as? Double,\n              let\
  \ steps = pedometerData.numberOfSteps as? Int,\n              let floorsAscended\
  \ = pedometerData.floorsAscended as? Int else {\n            return\n        }\n\
  \        self?.workoutDistance += distance\n        self?.floorsAscended += floorsAscended\n\
  \        self?.workoutSteps += steps\n        self?.averagePace = averagePace\n\
  \    })\n}\n```\n\n*代码清单 3-7 将暂停功能集成到计步器距离计算中*\n\n### 获取活动类型\n\n正如你之前所学，Core Motion\
  \ 为你提供了一个非常精确且易于使用的计步器。然而，它能提供的不仅仅只是原始数据。当苹果发布 Apple Watch 时，他们引以为傲的幻灯片之一就是公开了其健身实验室，他们雇佣了大量工程师和研究人员，希望能找到更好的方法来测量和利用\
  \ M 系列芯片及 Apple Watch 生成的传感器数据。这项工作的成果之一便是能够确定用户正在参与的活动类型（例如，跑步、步行或骑自行车）。在与接收计步器更新类似的过程中，你可以在类中使用\
  \ `CMMotionActivityManager` 的实例来监听活动类型的异步更新。\n\n用于监听 `CMMotionActivityManager` 对象运动更新的方法是\
  \ `startActivityUpdates(to:withHandler:)`。它接收两个参数：一个 `OperationQueue` 和一个返回活动类型信息的完成处理程序。在\
  \ iOS 编程中，`OperationQueue` 的概念类似于其他高级编程语言中的*线程*。它是一种让一组指令（任务或*操作*）在其自己的执行路径中运行的方式，旨在防止其他指令被阻塞。这些方法常用于长时间运行的任务，例如繁重的\
  \ Core Data 数据库操作。开发者会为 Core Data 任务创建一个单独的 `OperationQueue` 对象，并使用协议或完成处理程序来告知程序的另一部分任务已完成运行。\n\
  \n`startActivityUpdates(to:withHandler:)` 方法要求你指定将运动更新传递到哪个 `OperationQueue`。对于\
  \ IOTFit 应用，你将主要使用运动数据来更新用户界面，因此应该将更新传递到应用的主 `OperationQueue`。在代码清单 3-8 中，我更新了 `CreateWorkoutViewController`\
  \ 类，使其包含一个 `CMMotionActivityManager` 属性，并添加了一个 `startActivityUpdates()` 方法，用于在工作\
  \ out 开始时监控活动变化。\n\n```\nclass CreateWorkoutViewController: UIViewController {\n\
  \    ...\n    var pedometer: CMPedometer?\n    var motionManager: CMMotionActivityManager?\n\
  \    ...\n    func startWorkout() {\n        ...\n        if (CMMotionManager().isDeviceMotionAvailable\
  \ && CMPedometer.isStepCountingAvailable() && CMAltimeter.isRelativeAltitudeAvailable())\
  \ {\n            isMotionAvailable = true\n            startPedometerUpdates()\n\
  \            startActivityUpdates()\n        } else {\n            isMotionAvailable\
  \ = false\n        }\n    }\n    ...\n    func startActivityUpdates() {\n      \
  \  motionManager = CMMotionActivityManager()\n        motionManager?.startActivityUpdates(to:\
  \ OperationQueue.main, withHandler: { (activity: CMMotionActivity?) in\n       \
  \     // 收到运动更新\n        })\n    }\n}\n```\n\n*代码清单 3-8 启动活动类型更新*\n\n\n\n### Note\n\
  \n如果您在 iOS 应用中遇到用户界面无法正确显示项目的问题，请确认您的调用是否发生在主线程（主`OperationQueue`）上。iOS 只允许在主线程上执行用户界面更新。\n\
  \n`CMMotionActivity`响应对象包含一系列`Bool`属性，表示 Core Motion 对当前活动类型的估计，以及一个`confidence`属性，表示估计的准确性（`low`、`medium`、`high`）。对于\
  \ IOTFit 应用，您只需在“创建锻炼视图控制器”上显示活动类型，因此只需在响应处理程序中评估响应并保存最佳值。在清单 3-9 中，我更新了`CreateWorkoutViewController`类，使其包含一个`currentActivity`属性，并在`startActivityUpdates()`方法的运动完成处理程序中保存该值。\n\
  \n```\nimport UIKit\n...\nstruct WorkoutType {\nstatic let automotive = \"Driving\"\
  \nstatic let running = \"Running\"\nstatic let bicycling = \"Bicycling\"\nstatic\
  \ let stationary = \"Stationary\"\nstatic let walking = \"Walking\"\nstatic let\
  \ unknown = \"Unknown\"\n}\nclass CreateWorkoutViewController: UIViewController\
  \ {\n...\nvar currentWorkoutState = WorkoutState.inactive\nvar currentWorkoutType\
  \ = WorkoutType.unknown\n...\nfunc startActivityUpdates() {\nmotionManager = CMMotionActivityManager()\n\
  motionManager?.startActivityUpdates(to:\nOperationQueue.main, withHandler: { [weak\
  \ self]\n(activity: CMMotionActivity?) in\nguard let activity = activity else {\
  \ return }\nif activity.walking {\nself?.currentWorkoutType = WorkoutType.walking\n\
  } else if activity.running {\nself?.currentWorkoutType = WorkoutType.running\n}\
  \ else if activity.cycling {\nself?.currentWorkoutType =\nWorkoutType.bicycling\n\
  } else if activity.stationary {\nself?.currentWorkoutType =\nWorkoutType.stationary\n\
  } else {\nself?.currentWorkoutType = WorkoutType.unknown\n}\n})\n}\n...\n}\nListing\
  \ 3-9\n保存更新的活动类型\n```\n\n`CMMotionActivity`类设计中的一个不足之处在于，它要求您定义活动的优先级，而不是使用枚举值来表示数据。我在完成处理程序前添加了`[weak\
  \ self]`。在使用闭包时，通过强引用访问`self`可能会导致对象被保留，从而引起内存泄漏。使用`weak`可以避免这种情况。\n\n要在用户界面上显示该值，只需更新`updateWorkoutData()`方法，使其包含对`currentActivity`属性的检查，如清单\
  \ 3-10 所示。\n\n```\n@objc func updateWorkoutData() {\nlet now = Date()\nvar workoutPaceText\
  \ = String(format: \"%.2f m/s\", arguments:\n[averagePace])\nif let lastTime = lastSavedTime\
  \ {\nself.workoutDuration +=\nnow.timeIntervalSince(lastTime)\n}\nif currentWorkoutType\
  \ != WorkoutType.unknown {\nworkoutPaceText.append(\" | \\(currentWorkoutType)\"\
  )\n}\n...\nworkoutPaceLabel?.text = workoutPaceText\n...\n}\nListing 3-10\n显示活动类型\n\
  ```\n\n在此示例中，我修改了配速标签以包含活动类型。如果活动类型未知，则不显示该值。这样做反而会让用户感到困惑，而不是提供帮助。\n\n要停止运动（活动类型）更新，只需更新`toggleWorkout()`方法，让`CMMotionActivityManager`停止监听运动更新，方法与停止计步器更新相同，如清单\
  \ 3-11 所示。\n\n```\n@IBAction func toggleWorkout() {\nswitch currentWorkoutState\
  \ {\n...\ncase .active:\ncurrentWorkoutState = .inactive\nstopWorkoutTimer()\npedometer?.stopUpdates()\n\
  motionManager?.stopActivityUpdates()\n...\ndefault:\n...\n}\nupdateUserInterface()\n\
  }\nListing 3-11\n停止运动更新\n```\n\n## 处理气压计更新\n\n在进行 Core Motion 的最后一个实验时，您还可以获取用户的海拔高度。最棒的是，它遵循了其他\
  \ Core Motion 传感器 API 的设计模式，即：\n\n- 实例化一个管理器对象\n- 定义一个完成块来保存最新数据\n- 更新用户界面\n- 在完成后停止更新\n\
  \n由于您应该已经熟悉这种设计模式，我在清单 3-12 中包含了将气压计数据添加到“创建锻炼视图控制器”的代码。\n\n```\nclass CreateWorkoutViewController:\
  \ UIViewController {\n...\nvar workoutAltitude: Double = 0.0\nvar workoutDistance:\
  \ Double = 0.0\n...\nvar motionManager: CMMotionActivityManager?\nvar altimeter:\
  \ CMAltimeter?\n...\n@IBAction func toggleWorkout() {\n...\nswitch currentWorkoutState\
  \ {\n...\ncase .active:\n...\nmotionManager?.stopActivityUpdates()\naltimeter?.stopRelativeAltitudeUpdates()\n\
  default:\n...\n}\nupdateUserInterface()\n}\n...\n@objc func updateWorkoutData()\
  \ {\nlet now = Date()\nvar workoutPaceText = String(format: \"%.2f m/s |\n%0.2fm\
  \ \", arguments: [averagePace, workoutAltitude])\n...\n}\n...\nfunc startWorkout()\
  \ {\ncurrentWorkoutState = .active\n...\nif (CMMotionManager().isDeviceMotionAvailable\n\
  && CMPedometer.isStepCountingAvailable() &&\nCMAltimeter.isRelativeAltitudeAvailable())\
  \ {\n...\nstartActivityUpdates()\nstartAltimeterUpdates()\n} else {\nisMotionAvailable\
  \ = false\n}\n}\n...\nfunc startAltimeterUpdates() {\naltimeter = CMAltimeter()\n\
  altimeter?.startRelativeAltitudeUpdates(to:\nOperationQueue.main, withHandler: {\
  \ [weak self]\n(altitudeData: CMAltitudeData?, error: Error?) in\nif let error =\
  \ error {\nNSLog(\"Error reading altimeter data:\n\\(error.localizedDescription)\"\
  )\nreturn\n}\nguard let altitudeData = altitudeData,\nlet relativeAltitude =\naltitudeData.relativeAltitude\
  \ as? Double\nelse { return }\nself?.workoutAltitude += relativeAltitude\n})\n}\n\
  ...\nfunc resetWorkoutData() {\n...\nworkoutDistance = 0.0\nworkoutAltitude = 0.0\n\
  currentWorkoutType = WorkoutType.unknown\n}\n}\nListing 3-12\n将海拔高度追踪添加到创建锻炼视图控制器\n\
  ```\n\n现在，当您在 iPhone 上运行 IOTFit 应用并稍微走动（或摇晃手机）时，您应该会看到更快、更准确的活动更新，类似于图 3-5 截图中的效果。\n\
  \n![../images/346879_2_En_3_Chapter/346879_2_En_3_Fig5_HTML.jpg](img/346879_2_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5 IOTFit 应用截图（显示额外的锻炼数据）\n\n## 总结\n\n在本章中，您将基于 GPS 的 IOTFit 应用转变为更准确、功能更丰富且更省电的版本，方法是使用\
  \ Core Motion 框架来访问 iPhone 和 Apple Watch 上的 M 系列运动协处理器。您学习了如何为多个传感器设置管理器对象，以及如何使用完成处理程序响应它们的异步更新。经过几个示例后，设置管理器、响应更新和停止请求的过程变得非常明显，成为一种广泛使用的模式，使得气压计集成变得极其简单。\n\
  \n为了可读性，并跟上当前的编程趋势，Apple 在其框架中越来越多地采用基于完成处理程序的工作流程。在需要在一个长时间运行的方法完成后立即执行快速操作的情况下，完成处理程序非常方便。我相信您会在本书以及您自己的项目中多次复用这一知识。\n\
  \n\n\n"
- "# 4. 使用 HealthKit 安全地检索和存储健康数据\n\n到目前为止，你已经学会了如何使用 iOS 设备上的运动传感器和 GPS 传感器来构建一个名为\
  \ IOTFit 的锻炼应用，该应用能够追踪活动数据（步数、海拔、步频），并在地图上显示用户的锻炼路径。此外，你还学会了如何将这些数据以属性列表（`.plist`）文件的形式存储到应用的\
  \ `Documents` 文件夹中。\n\n虽然将数据存储在一个应用中很有用，但通过将数据以其他锻炼应用也能访问的方式进行保存，可以更好地帮助用户。为此，你可以使用\
  \ HealthKit 框架。HealthKit 允许你将锻炼数据抽象为 `HKWorkout` 对象，并将其存储在 iPhone 的 HealthKit 存储区中。HealthKit\
  \ 存储区是内存中的一个加密区域，iOS 健康应用以及经过 HealthKit 授权的第三方应用可以在其中共享用户信息。例如，启用 HealthKit 后，用户可以在\
  \ iOS 健康应用中看到他们在 IOTFit 中创建的锻炼记录，并将其作为独立项目查看。他们还可以使用 HealthKit 在 IOTFit 内读取并展示来自其他应用的锻炼数据。\n\
  \n除了安全性之外，HealthKit 最强大的功能之一是其通过 `HKSample` 类所能存储的广泛数据类型。为清晰起见，本章将重点介绍如何将其应用于与锻炼相关的数据，但你完全可以开发应用来管理从心率、紫外线暴露到维生素\
  \ C 摄入等各种数据。\n\n## 学习目标\n\n在本章中，通过将 HealthKit 集成到 IOTFit 中，你将学习到物联网应用开发中的以下关键概念：\n\
  \n*   向 iOS HealthKit 存储区请求权限\n*   如何将数据保存到 HealthKit\n*   如何从 HealthKit 加载数据\n\
  *   如何在表格视图控制器中展示数据\n\n这些变更将通过扩展之前开发的 `WorkoutDataManager` 类，并为应用添加一个“历史记录”标签页来实现，该标签页将包含一个展示用户锻炼历史的表格视图，如图\
  \ 4-1 所示。\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig1_HTML.jpg](img/346879_2_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** 修改后的 IOTFit 应用线框图，包含新的“历史记录”标签页\n\n与前几章一样，本项目建立在第三章成果的基础之上。如果你遇到困难或需要参考本项目的完整代码，可以在本书的\
  \ GitHub 仓库中找到，位于 `Chapter 4` 文件夹下（ [`github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)\
  \ ）。\n\n## 请求 HealthKit 权限\n\n鉴于健康数据的敏感性，使用 HealthKit 需要你修改应用以声明其想要使用健康相关功能，并在用户尝试访问这些功能时显示权限提示，这并不令人意外。与\
  \ Core Motion 类似，HealthKit 仅在较新的 iPhone、iPod touch 和 Apple Watch 上可用，因此你也需要查询这些功能的可用性。幸运的是，你可以使用在\
  \ Core Motion 和 Core Location 中学到的请求权限的相同工作流程，将 HealthKit 添加到你的应用中。\n\n### 注意\n\n\
  与第三章讨论的 Core Motion 功能类似，本章内容旨在 iPhone 或 iPod touch 上运行。截至撰写本书时，Apple 未在 iPad 上开放健康应用或\
  \ HealthKit。\n\n首先，复制你在第三章中开发的 IOTFit 应用，或从本书的 GitHub 仓库下载一份副本。接下来，点击项目层级导航器中的 `IOTFit`，选择应用的工程设置。如图\
  \ 4-2 所示，要声明应用想要使用 HealthKit，请点击 Capabilities 标签页，将 HealthKit 功能添加到应用中。向下滚动找到 HealthKit，点击旁边的开关将其切换为\
  \ ON。\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig2_HTML.jpg](img/346879_2_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2** 在 IOTFit 项目中启用 HealthKit 功能\n\n如果应用未链接到有效的 Apple Developer 帐户（付费或免费帐户均可），启用\
  \ HealthKit 功能将会失败，表现为开关恢复为 OFF 状态。如果你记不清如何将项目连接到 Apple Developer 帐户，请回顾第一章。\n\n\
  接下来，与所有基于权限的功能一样，你必须在项目的 Info.plist 文件中添加键值对，以定义系统生成的权限提示中将要显示的消息。如图 4-3 所示，点击 Info\
  \ 标签页，然后将鼠标悬停在“Privacy – Location When in Use Description”行上，点击出现的 `(+)` 按钮添加新的键。\n\
  \n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig3_HTML.jpg](img/346879_2_En_4_Fig3_HTML.jpg)\n\
  \n**图 4-3** 向 IOTFit 的信息属性列表中添加新键\n\n要启用从 HealthKit 读取数据，请添加 `Privacy – Health Share\
  \ Usage Description` 键值对。对于描述字符串，我使用的文本是：“IOTFit 希望使用 HealthKit 权限从健康应用导入锻炼数据到应用的历史记录功能中。此信息不会在线共享或与第三方共享。”\
  \ 要启用向 HealthKit 保存数据，请添加 `Privacy – Health Update Usage Description` 键值对。对于描述字符串，我使用的文本是：“IOTFit\
  \ 希望使用 HealthKit 权限将锻炼数据导出到健康应用。此信息不会在线共享或与第三方共享。”\n\n与 Core Location 类似，你应该在首次尝试使用\
  \ HealthKit 框架的操作之前，查询其可用性并显示权限提示。从你的应用中访问 HealthKit 的主要类是 `HKHealthStore`。与 Core\
  \ Motion 的管理器对象类似，你需要实例化该类的实例，并通过该实例调用 HealthKit。与 Core Motion 不同的是，Apple 硬性要求你在应用中只能创建该类的一个实例。为此，将\
  \ `HKHealthStore` 对象放在 `WorkoutDataManager` 单例中是最合适的位置。在清单 4-1 中，我修改了 `WorkoutDataManager`\
  \ 类，添加了一个 `HKHealthStore` 对象作为属性，并在设备支持此功能时对其进行实例化。\n\n```\nimport Foundation\n\
  import CoreLocation\nimport HealthKit\n...\nclass WorkoutDataManager {\nstatic let\
  \ sharedManager = WorkoutDataManager()\n...\nprivate var healthStore: HKHealthStore?\n\
  private init() {\nprint(\"单例已初始化\")\nloadFromPlist()\nif HKHealthStore.isHealthDataAvailable()\
  \ {\nhealthStore = HKHealthStore.init()\n}\n}\n...\n}\n```\n\n**清单 4-1** 为 `WorkoutDataManager`\
  \ 类添加 `HKHealthStore` 属性\n\n\n\n对于 IOTFit 应用，你需要与 HealthKit 进行交互的两个关键点是：保存锻炼记录时，以及读取锻炼列表以在“锻炼历史表格视图控制器”上显示它们时。为了让代码更易读，我将通过`WorkoutDataManager`类中的`loadWorkoutsFromHealthKit()`和`saveWorkoutToHealthKit()`方法来执行这些操作。由于你无法预知用户会先执行哪个操作，因此应在两个方法中都请求权限。如果用户已经接受或拒绝了权限请求，则不会显示任何提示，代码将继续执行下一条指令。\n\
  \nHealthKit 用于请求健康权限的方法是`requestAuthorization(toShare:read:completion:)`，它是`HKHealthStore`类的一部分。该方法接受一组你想要读取和写入的健康数据类型作为参数，以及一个完成回调——当用户做出决定（或第二次调用时立即执行）时，该回调会被触发。要使用\
  \ HealthKit，你必须指定你想要读取或写入的每一种数据类型。我建议在每次 HealthKit 操作前都调用权限请求的第二个原因是：如果你的类型列表在不同应用版本之间发生变化，iOS\
  \ 会再次弹出授权提示，请求用户授权新权限。在代码清单 4-2 中，我向`WorkoutDataManager`类添加了`loadWorkoutsFromHealthKit()`和`saveWorkoutToHealthKit()`方法，并在`saveWorkout(duration:)`方法中添加了对`saveWorkoutToHealthKit()`的调用，以触发健康权限弹窗。得益于`healthStore`属性被声明为可选值，如果`init()`方法中的可用性请求失败，权限请求及其后续的\
  \ HealthKit 操作将不会执行。\n\n```\nclass WorkoutDataManager {\n...\nprivate var hkDataTypes:\
  \ Set {\nvar hkTypesSet = Set()\nif let stepCountType =\nHKQuantityType.quantityType(forIdentifier:\n\
  HKQuantityTypeIdentifier.stepCount) {\nhkTypesSet.insert(stepCountType)\n}\nif let\
  \ flightsClimbedType =\nHKQuantityType.quantityType(forIdentifier:\nHKQuantityTypeIdentifier.flightsClimbed)\
  \ {\nhkTypesSet.insert(flightsClimbedType)\n}\nif let cyclingDistanceType =\nHKQuantityType.quantityType(forIdentifier:\n\
  HKQuantityTypeIdentifier.distanceCycling) {\nhkTypesSet.insert(cyclingDistanceType)\n\
  }\nif let walkingDistanceType =\nHKQuantityType.quantityType(forIdentifier:\nHKQuantityTypeIdentifier.distanceWalkingRunning)\
  \ {\nhkTypesSet.insert(walkingDistanceType)\n}\nhkTypesSet.insert(HKObjectType.workoutType())\n\
  return hkTypesSet\n}\n...\nfunc saveWorkout(duration: TimeInterval) {\n...\nsaveToPlist()\n\
  saveWorkoutToHealthKit()\n}\nfunc loadWorkoutsFromHealthKit() {\nhealthStore?.requestAuthorization(toShare:\
  \ hkDataTypes,\nread: hkDataTypes, completion: { (isAuthorized:\nBool, error: Error?)\
  \ in\n//请求已完成，现在可以安全使用 HealthKit 了\n})\n}\nfunc saveWorkoutToHealthKit() {\nhealthStore?.requestAuthorization(toShare:\
  \ hkDataTypes,\nread: hkDataTypes, completion: { (isAuthorized:\nBool, error: Error?)\
  \ in\n//请求已完成，现在可以安全使用 HealthKit 了\n})\n}\n}\n```\n\n代码清单 4-2：在读取或写入健康数据前请求健康权限\n\
  \n为了减少重复代码，我创建了一个计算属性`hkDataTypes`来表示应用所需的数据类型列表。用于请求权限的类型必须是`HKSampleType`抽象类的实现。顾名思义，它们代表以样本形式保存和测量的数据。你将在下一节中了解更多关于\
  \ HealthKit 如何表示数据的信息。样本只是你可以使用的众多类型之一。目前需要记住的最重要的一点是，与健康权限一样，并非所有样本类型都适用于所有 iOS\
  \ 设备，在尝试使用之前，你必须查询你想要使用的类型。\n\n现在，如果你运行 IOTFit 应用并尝试保存一次锻炼，将会看到健康权限提示，如图 4-4 所示。用户可以在此界面上有选择地允许权限，或全部开启。当他们按下“允许”按钮后，设置将被保存，并且应用中的完成回调将会执行。\n\
  \n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig4_HTML.jpg](img/346879_2_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4：IOTFit 应用的健康权限提示\n\n## 将数据写入 HealthKit\n\n开始使用 HealthKit 最简单的方法就是用它来将锻炼记录保存到\
  \ HealthKit 存储中。在前面的章节中，你已经生成了足够的数据来获取用户活动的良好快照，但这些数据需要被序列化（整理）成 HealthKit 可以消费的格式。HealthKit\
  \ 并非像`String`或`Float`那样以简单数据类型存储，而是采用了一种分层系统，允许你将相关的统计数据分组整理在一起。它还有自己的一套单位系统，你必须学习如何使用，以便使你的数据符合\
  \ HealthKit 存储所能识别的格式。在本节中，你将了解此系统的概念基础，以及如何使用它将原始数值转换为健康数据。\n\n### 理解 HealthKit\
  \ 如何表示数据\n\niOS 中的 HealthKit 存储将数据分为两大类：*特征数据*和*样本数据*。特征数据是关于用户的定性信息，用特征而非单位来描述，并且不经常变化。例如，用户的血型或肤色。在\
  \ HealthKit 中，这些由`HKCharacteristicType`类的实例表示。样本数据是指由用户行为产生的信息，可以用定量单位（例如，米）或数据的定量描述符（例如，步数）或聚合行为（例如，锻炼）来衡量和描述。在\
  \ HealthKit 中，这些由`HKSample`类的子类表示。在 IOTFit 应用中，你将主要处理样本数据。\n\n在 HealthKit 术语中，定量样本数据（例如步数或距离）被称为*数量样本*，由`HKQuantitySample`类的对象表示。描述活动特征的样本数据（例如，一次锻炼应被描述为骑行还是跑步）被称为*类别样本*，由`HKCategorySample`对象表示。为了描述聚合活动，HealthKit\
  \ 定义了两种最终的样本类型：*锻炼*和*关联*。锻炼由`HKWorkout`对象表示，其用途正如其名：旨在表示关于用户执行的一次锻炼的一组数据。关联由`HKCollection`对象表示，虽然其名称的含义有点难以推导，但其用途与锻炼相似：它们专门用于对关于已摄入食物或血压读数的数据进行分组。\n\
  \nHealthKit 中的单位由`HKUnit`对象表示。在存储定量样本时，你必须指定使用哪个`HKUnit`类来表示数据。你可以使用 Apple 为常用单位提供的便捷方法（例如，`HKUnit.meter()`），也可以通过向`HKUnit`类的`init(from:)`便捷初始化方法传递一个`String`来定义你自己的单位。\n\
  \n\n\n### 创建和保存 HealthKit 样本\n\n对于 IOTFit 应用及你自己的项目，必须遵循以下步骤将数据保存到 HealthKit：\n\n\
  - 确认设备能够存储你要处理的样本（锻炼、关联数据和数量样本）\n- 创建一个聚合样本对象（锻炼或关联数据）\n- 创建数量样本\n- 将样本保存到锻炼记录中\n\
  \n在列表 4-2 中，你通过检查要处理的数量类型（步数、爬楼层数、锻炼类型、步行距离和骑行距离）完成了验证步骤。现在你对 HealthKit 如何表示数据有了更清晰的认识，可以开始将“创建锻炼视图控制器”中的简单数值数据转换为\
  \ HealthKit 可消费的数据。\n\n要保存数据到 HealthKit，第一步是创建一个 `HKWorkout` 对象来表示锻炼记录。`HKWorkout`\
  \ 类有多个便捷构造函数，但最适合存储 IOTFit 锻炼记录的是 `init(activityType:start:end:duration:totalEnergyBurned:totalDistance:distanceQuantity:device:metadata)`，该构造方法允许你指定锻炼类型（`HKWorkoutType`）、开始和结束日期（`Date`\
  \ 对象）以及锻炼距离。为了实现这一操作，并最终保存爬楼层数等其他统计数据，你需要修改 `Workout` 结构体以添加新参数，并对调用函数进行重构，使其使用\
  \ `Workout` 对象作为参数，而非冗长的参数列表。在列表 4-3 中，我对 `CreateWorkoutViewController` 和 `WorkoutDataManager`\
  \ 类进行了修改以包含这些变更。\n\n```\nclass CreateWorkoutViewController: UIViewController {\n\
  ...\n@IBAction func toggleWorkout() {\nswitch currentWorkoutState {\n...\ncase .active:\n\
  currentWorkoutState = .inactive\n...\nif let workoutStartTime = workoutStartTime\
  \ {\nlet workout = Workout(startTime: workoutStartTime,\nendTime: Date(), duration:\
  \ workoutDuration,\nlocations: [], workoutType:\nself.currentWorkoutType, totalSteps:\n\
  workoutSteps, flightsClimbed: floorsAscended,\ndistance: workoutDistance)\nWorkoutDataManager.sharedManager.saveWorkout(workout)\n\
  }\ndefault:\nNSLog(\"Error\")\n}\nupdateUserInterface()\n}\n}\n// 以下代码行位于\n// WorkoutDataManager.swift\
  \ 文件中\nstruct Workout: Codable {\nvar startTime: Date\nvar endTime: Date\nvar duration:\
  \ TimeInterval\nvar locations: [Coordinate]\nvar workoutType: String\nvar totalSteps:\
  \ Double\nvar flightsClimbed: Double\nvar distance: Double\n}\nclass WorkoutDataManager\
  \ {\n...\nfunc saveWorkout(_ workout: Workout) {\nvar activeWorkout = workout\n\
  ...\nsaveToPlist()\nworkouts?.append(activeWorkout)\nsaveWorkoutToHealthKit(activeWorkout)\n\
  }\nfunc saveWorkoutToHealthKit(_ workout: Workout) {\nhealthStore?.requestAuthorization(toShare:\n\
  hkDataTypes, read: hkDataTypes, completion: {\n[weak self] (isAuthorized: Bool,\
  \ error:\nError?) in\n...\n})\n}\n}\n```\n*列表 4-3 修改 `CreateWorkoutViewController`\
  \ 和 `WorkoutDataManager` 类以包含所有锻炼数据*\n\n现在你已经能访问所有所需数据，可以尝试创建 `HKWorkout` 对象了。在列表\
  \ 4-4 中，我修改了 `saveWorkoutToHealthKit(...)` 方法，新增了创建 `HKWorkout` 对象的调用。我创建了 `createHKWorkout(workoutType:startDate:endDate)`\
  \ 方法来帮助将自定义的 `WorkoutType` 结构体转换为 HealthKit 的 `HKWorkoutActivityType` 类别样本类型。在尝试使用该对象之前，请使用\
  \ `guard-let` 或 `if-let` 块验证对象是否创建成功。\n\n```\nclass WorkoutDataManager {\nfunc saveWorkoutToHealthKit(stepCount:\
  \ Double,\nflightsClimbed: Double, distance: Double,\nworkoutType: String, startDate:\
  \ Date, endDate:\nDate) {\nhealthStore?.requestAuthorization(toShare:\nhkDataTypes,\
  \ read: hkDataTypes, completion: {\n[weak self] (isAuthorized: Bool, error:\nError?)\
  \ in\nif let error = error {\nNSLog(\"Error accessing HealthKit\")\n} else {\nguard\
  \ let workoutObject =\nself?.createHKWorkout(workout)\nelse { return }\n}\n})\n\
  }\nfunc createHKWorkout(_ workout: Workout) -> HKWorkout? {\nlet distanceQuantity\
  \ = HKQuantity(unit: HKUnit.meter(),\ndoubleValue: workout.distance)\nvar activityType\
  \ = HKWorkoutActivityType.walking\nswitch(workout.workoutType) {\ncase WorkoutType.running:\n\
  activityType = HKWorkoutActivityType.running\ncase WorkoutType.bicycling:\nactivityType\
  \ = HKWorkoutActivityType.cycling\ndefault:\nactivityType = HKWorkoutActivityType.walking\n\
  }\nreturn HKWorkout(activityType: activityType, start:\nworkout.startTime, end:\
  \ workout.endTime, duration:\nworkout.duration, totalEnergyBurned: nil,\ntotalDistance:\
  \ distanceQuantity , device: nil,\nmetadata: nil)\n}\n}\n```\n*列表 4-4 创建 `HKWorkout`\
  \ 对象*\n\n使用 HealthKit 的缺点之一是其配置步骤非常严格。创建锻炼记录后，唯一能将样本附加到锻炼记录的方法就是先将它保存到 HealthKit\
  \ 存储区。如果操作成功，你就可以开始向该锻炼记录添加样本。在列表 4-5 中，我修改了 `saveWorkoutToHealthKit(...)` 方法，先保存锻炼记录，然后调用一个用于添加样本的函数。\n\
  \n```\nclass WorkoutDataManager {\n...\nfunc saveWorkoutToHealthKit(_ workout: Workout)\
  \ {\nhealthStore?.requestAuthorization(toShare:\nhkDataTypes, read: hkDataTypes,\
  \ completion: {\n[weak self] (isAuthorized: Bool,error:Error?)\nin\nif let error\
  \ = error {\nNSLog(\"Error accessing HealthKit\")\n} else {\nguard let workoutObject\
  \ =\nself?.createHKWorkout(workout)\nelse { return }\nself?.healthStore?.save(workoutObject,\n\
  withCompletion: { (completed: Bool,\nerror: Error?) in\nif let error = error {\n\
  NSLog(\"Error creating workout\")\n} else {\nself?.addSamples(hkWorkout:\nworkoutObject,\
  \ workoutData:\nworkout)\n}\n})\n}\n})\n}\n...\nfunc addSamples(hkWorkout: HKWorkout,\
  \ workoutData: Workout){\nvar samples = [HKSample]()\naddStepCountSample(workoutData,\
  \ objectArray: &samples)\naddFlightsClimbedSample(workoutData, objectArray:\n&samples)\n\
  addDistanceSample(workoutData, activityType:\nhkWorkout.workoutActivityType, objectArray:\
  \ &samples)\nself.healthStore?.add(samples, to:hkWorkout, completion:{\n(saveCompleted:\
  \ Bool, saveError: Error?) in\nif let saveError = saveError {\nNSLog(\"Error adding\
  \ workout samples\")\n} else {\nNSLog(\"Workout samples added successfully!\")\n\
  }\n})\n}\n}\n```\n*列表 4-5 准备向锻炼记录添加样本*\n\n如 `addSamples(...)` 方法所示，要向锻炼记录添加样本，你需要构建一系列\
  \ `HKSample` 对象，并使用之前创建的锻炼对象，在 iOS 健康存储区上调用 `add(to:completion:)` 方法。`HKSample`\
  \ 对象的设置代码可能很长，因此我创建了单独的方法来生成每个样本并将其追加到数组中。\n\n回顾之前关于 HealthKit 样本类型的讨论，要存储锻炼的定量数据，你应该使用\
  \ `HKQuantitySample` 类。在比较便捷初始化方法后，最合适的应该是 `init(type: quantity: start: end:)`。至此，脚手架代码开始变得冗长。要使用数量参数，你必须生成一个\
  \ `HKQuantity` 对象，并指定一个 `HKQuantityType` 对象来表示数量类型。同样，你还需要指定单位类型。在列表 4-6 中，我实现了\
  \ `addStepCountSample(...)` 和 `addFlightsClimbedSample(...)` 方法，这两个方法包含了上述所有步骤。\n\
  \n\n\n```\nclass WorkoutDataManager {\n...\nfunc addStepCountSample(_ workoutData:\
  \ Workout,\nobjectArray: inout [HKSample]) {\nguard let stepQuantityType =\nHKQuantityType.quantityType(forIdentifier:\n\
  HKQuantityTypeIdentifier.stepCount)\nelse { return }\nlet stepUnit = HKUnit.count()\n\
  let stepQuantity = HKQuantity(unit: stepUnit,\ndoubleValue: workoutData.totalSteps)\n\
  let stepSample = HKQuantitySample(type:\nstepQuantityType, quantity: stepQuantity,\
  \ start:\nworkoutData.startTime, end: workoutData.endTime)\nobjectArray.append(stepSample)\n\
  }\nfunc addFlightsClimbedSample(_ workoutData: Workout,\nobjectArray: inout [HKSample])\
  \ {\nguard let flightQuantityType =\nHKQuantityType.quantityType(forIdentifier:\n\
  HKQuantityTypeIdentifier.flightsClimbed)\nelse { return }\nlet flightUnit = HKUnit.count()\n\
  let flightQuantity = HKQuantity(unit: flightUnit,\ndoubleValue: workoutData.flightsClimbed)\n\
  let flightSample = HKQuantitySample(type:\nflightQuantityType, quantity: flightQuantity,\n\
  start: workoutData.startTime, end:\nworkoutData.endTime)\nobjectArray.append(flightSample)\n\
  }\n}\n```\n**代码清单 4-6** 创建“步数”和“爬楼层数”样本对象\n\n在这些方法中，最突出的两行是方法签名和数量类型的查找。`inout`\
  \ 关键字指定某个参数应通过*引用传递*。对于 C/C++ 程序员来说，这个术语应该非常熟悉。引用传递是一种从方法内部修改参数内容的方式，而不是对数据的副本进行操作。调用方法时，在要被修改的变量名前加上\
  \ `&` 符号即可实现*按引用传递*。Apple 在传递 `Error` 对象的方法中经常使用这种模式。\n\n在查找数量类型的那一行中，再次需要在使用前检查结果是否有效。如前所述，某些样本类型并非在所有\
  \ iOS 设备或 iOS 版本上可用。谨慎总比后悔好！\n\n最后需要添加的数量类型是锻炼距离。这种数量类型的一个特殊之处在于，Apple 将步行/跑步距离和骑行距离视为两种不同的数量类型。为了消除这一限制，在代码清单\
  \ 4-7 中，我实现了 `addWorkoutDistance(...)` 方法，通过锻炼类型来指定数量类型。\n\n```\nclass WorkoutDataManager\
  \ {\n...\nfunc addDistanceSample(_ workoutData: Workout,\nactivityType: HKWorkoutActivityType,\
  \ objectArray: inout\n[HKSample]) {\nguard let cyclingDistanceType =\nHKQuantityType.quantityType(forIdentifier:\n\
  HKQuantityTypeIdentifier.distanceCycling),\nlet walkingDistanceType =\nHKQuantityType.quantityType(forIdentifier:\n\
  HKQuantityTypeIdentifier.distanceWalkingRunning)\nelse { return }\nlet distanceUnit\
  \ = HKUnit.meter()\nlet distanceQuantity = HKQuantity(unit: distanceUnit,\ndoubleValue:\
  \ workoutData.distance)\nlet distanceQuantityType = activityType ==\nHKWorkoutActivityType.cycling\
  \ ? cyclingDistanceType:\nwalkingDistanceType\nlet distanceSample = HKQuantitySample(type:\n\
  distanceQuantityType, quantity: distanceQuantity,\nstart: workoutData.startTime,\
  \ end:\nworkoutData.endTime)\nobjectArray.append(distanceSample)\n}\n}\n```\n**代码清单\
  \ 4-7** 添加“锻炼距离”样本对象\n\n信不信由你，至此已经完成了将数据保存到 HealthKit 所需的所有步骤！现在，如果你在“创建锻炼”视图控制器中完成一项锻炼，它就会创建一个新的锻炼记录，你可以在\
  \ iOS 健康应用中查看，如图 4-5 所示。要在健康应用中查看锻炼记录，请点击“数据来源”标签，然后依次点击 IOTFit、数据，最后点击“锻炼”。\n\n\
  ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig5_HTML.jpg](img/346879_2_En_4_Fig5_HTML.jpg)\n\
  \n**图 4-5** 在 iOS 健康应用中查看已保存的锻炼记录\n\n## 从 HealthKit 读取锻炼数据\n\n既然你已经了解了 HealthKit\
  \ 如何表示数据，以及将简单数据类型转换为 HealthKit 样本数据所需的步骤，你就可以利用这些知识从 iOS HealthKit 存储中读取数据了。在 IOTFit\
  \ 应用中，你将使用此功能来获取用户的锻炼历史。与写入数据类似，从 HealthKit 存储读取数据时使用的主要数据类型是 `HKSample`。\n\n要获取数据，必须使用\
  \ `HKSampleQuery` 类在 HealthKit 存储上执行*查询*。与创建 `HKSample` 对象一样，有多个便捷初始化器可供使用，但对于 IOTFit\
  \ 应用，`HKSampleQuery(sampleType:predicate:limit:, sortDescriptors:resultsHandler)`\
  \ 是一个合适的选择。这里有很多内容需要理解，但重要的概念是必须指定要获取的样本类型、用于过滤搜索结果的*谓词*以及用于处理结果的完成处理程序。在代码清单 4-8\
  \ 中，我更新了 `loadWorkoutsFromHealthKit()` 方法，使其包含一个针对锻炼记录的查询，结果按日期降序排列（最新的在前），并限制为前一周内最新的十条记录。\n\
  \n```\nfunc loadWorkoutsFromHealthKit(completion: @escaping\n(([Workout]?) -> Void))\
  \ {\nhealthStore?.requestAuthorization(toShare:\nhkDataTypes, read: hkDataTypes,\
  \ completion: {\n[weak self] (isAuthorized: Bool, error :\nError?) in\nif let error\
  \ = error {\nNSLog(\"Error accessing HealthKit\")\n} else {\nlet workoutType = HKCategoryType.workoutType()\n\
  let weekAgo = Date(timeIntervalSinceNow:\n-3600 * 24 * 7)\nlet predicate = HKQuery.predicateForSamples(withStart:\n\
  weekAgo, end: Date(), options: [])\nlet sortDescriptor = NSSortDescriptor(key: \"\
  startDate\",\nascending: false)\nlet query = HKSampleQuery(sampleType: workoutType,\n\
  predicate: predicate, limit: 10, sortDescriptors:\n[sortDescriptor], resultsHandler:\
  \ { (query:\nHKSampleQuery, samples: [HKSample]?, error:\nError?) in\nif let error\
  \ = error {\nNSLog(\"Error fetching items from HealthKit \")\ncompletion(nil)\n\
  } else {\nlet workouts = [Workout]()\ncompletion(workouts)\n}\n})\nself?.healthStore?.execute(query)\n\
  }\n})\n}\n```\n**代码清单 4-8** 设置 HealthKit 样本查询\n\n除非用户禁用了定位和计步功能，否则 iOS 始终在收集用户的健康数据。为避免查询耗时过长，我建议使用基于日期的谓词或（页面）限制来约束查询结果。你始终可以通过用户界面让用户查看更多搜索结果。另一个需要记住的重要点是，声明查询后，必须调用\
  \ `HKHealthStore` 对象的 `execute()` 方法，查询才会开始执行。\n\n接下来，要在应用中使用样本查询的结果，你必须将 `HKSample`\
  \ 数组转换为整个项目中一直使用的自定义 `Workout` 结构体。在代码清单 4-9 中，我进一步扩展了 `loadWorkoutsFromHealthKit(completion:)`\
  \ 方法，以执行转换逻辑。\n\n\n```swift\nfunc loadWorkoutsFromHealthKit(completion: @escaping\
  \ (([Workout]?) -> Void)) {\n    healthStore?.requestAuthorization(toShare: hkDataTypes,\
  \ read: hkDataTypes, completion: {\n        [weak self] (isAuthorized: Bool, error:\
  \ Error?) in\n        if let error = error {\n            NSLog(\"访问 HealthKit 时出错\"\
  )\n        } else {\n            let query = HKSampleQuery(sampleType: workoutType,\
  \ predicate: predicate, limit: 10, sortDescriptors: [sortDescriptor], resultsHandler:\
  \ { (query: HKSampleQuery, samples: [HKSample]?, error: Error?) in\n           \
  \     if let error = error {\n                    NSLog(\"获取项目时出错\")\n         \
  \           completion(nil)\n                } else {\n                    guard\
  \ let hkWorkouts = samples as? [HKWorkout] else {\n                        completion(nil)\n\
  \                        return\n                    }\n                    let\
  \ workouts = hkWorkouts.map({ (hkWorkout: HKWorkout) -> Workout in\n           \
  \             let totalDistance = hkWorkout.totalDistance?.doubleValue(for: HKUnit.meter())\
  \ ?? 0\n                        let flightsClimbed = hkWorkout.totalFlightsClimbed?.doubleValue(for:\
  \ HKUnit.count()) ?? 0\n                        var workoutType = WorkoutType.walking\n\
  \                        switch(hkWorkout.workoutActivityType) {\n             \
  \           case .running:\n                            workoutType = WorkoutType.running\n\
  \                        case .cycling:\n                            workoutType\
  \ = WorkoutType.bicycling\n                        default:\n                  \
  \          workoutType = WorkoutType.walking\n                        }\n      \
  \                  return Workout(startTime: hkWorkout.startDate, endTime: hkWorkout.endDate,\
  \ duration: hkWorkout.duration, locations: [], workoutType: workoutType, totalSteps:\
  \ 0, flightsClimbed: flightsClimbed, distance: totalDistance)\n                \
  \    })\n                    completion(workouts)\n                }\n         \
  \   })\n            self?.healthStore?.execute(query)\n        }\n    })\n}\n```\n\
  代码清单 4-9\n将 HealthKit 样本对象转换为简单数据类型\n\n在这个函数中，我需要解决的第一个挑战是确保样本是一个`HKWorkout`对象。为了创建通用的完成处理程序，Apple\
  \ 必须使用足够通用的类型来处理所有样本数据。但对于 IOTFit 而言，我需要处理的类型是`HKWorkout`。接下来，我需要从`HKSample`对象中提取简单数据类型。为了进行类型转换，我使用了`doubleValue(for:)`方法并指定了要转换的单位。如果操作失败，则返回`0`作为默认值。最后一个挑战是将`HKWorkoutType`属性转换为`String`，以便构建`Workout`对象。不过，这一点通过`switch()`语句轻松解决了。\n\
  \n## 使用表格视图控制器显示数据\n\n本章的最后一步是显示锻炼历史记录。对于许多基于数据的应用程序来说，表格视图控制器是让用户与数据交互的绝佳选择。它开箱即用地提供了可滚动的用户界面、以统一方式（单元格）显示结果的简便方法，以及可通过\
  \ Interface Builder 轻松自定义的组件。然而，难点在于`UITableViewController`类的设置代码非常依赖协议，对于 iOS 新手开发者来说可能有些令人生畏。在学习如何以表格形式显示\
  \ IOTFit 的锻炼结果时，你将掌握使用`UITableViewController`类的三项基本技能，这些技能可应用于其他应用程序：从 Interface\
  \ Builder 添加表格视图控制器、设置`UITableViewDataSource`代理方法以填充表格，以及设置`UITableViewDelegate`代理方法以在每个单元格中显示锻炼内容。\n\
  \n首先，使用 Xcode 的模板功能创建一个新的`UITableViewController`子类。与第 1 章和第 2 章的示例类似，进入“文件”菜单，选择“新建”➤“文件”，然后从模板选择器中选取“Cocoa\
  \ Touch Class”，如图 4-6 所示。\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig6_HTML.jpg](img/346879_2_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n创建新的 Cocoa Touch 类\n\n接下来，系统会要求你为新类命名并选择基类。如图 4-7 所示，将新文件命名为`WorkoutTableViewController`，并选择`UITableViewController`作为基类。\n\
  \n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig7_HTML.jpg](img/346879_2_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n基于模板创建新的`UITableViewController`类\n\n新的`WorkoutTableViewController`类应类似于代码清单\
  \ 4-10，其中 Apple 的模板提供了实现`UITableViewDelegate`和`UITableViewDataSource`协议所需的`required`方法的存根。\n\
  \n```\nimport UIKit\nclass WorkoutTableViewController: UITableViewController {\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n    }\n    // MARK:\
  \ - 表格视图数据源\n    override func numberOfSections(in tableView: UITableView) -> Int\
  \ {\n        return 0\n    }\n    override func tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\n        return 0\n    }\n    override\
  \ func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->\
  \ UITableViewCell {\n        let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"Identifier\", for: indexPath)\n        return cell\n    }\n}\n```\n代码清单 4-10\n\
  空的 WorkoutTableViewController 类\n\n\n### 设置用户界面\n\n首先，从项目导航器中选择 `Main.storyboard`\
  \ 文件，在 Xcode 的编辑器（中央）窗格中打开 Interface Builder。如图 4-8 所示，从对象库中拖拽一个**表格视图控制器**对象到故事板中。\n\
