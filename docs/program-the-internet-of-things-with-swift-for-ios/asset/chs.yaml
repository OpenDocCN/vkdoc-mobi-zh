  \n图 8-10 IOTHome 应用的更新故事板\n\n根据第 6 章之前的实现，Home Manager 屏幕的所有者被设置为 `HomeViewController`\
  \ 类。如代码清单 8-15 所示，更新 `HomeViewController.swift` 文件，以使用 `DoorViewController` 类作为其父类。此外，为新标签添加属性，并使用\
