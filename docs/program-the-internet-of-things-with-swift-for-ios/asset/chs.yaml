  ## 从 iPhone 计步器接收实时步数更新


  21 世纪初，推动量化自我运动的技术之一，是推出了价格低廉的独立计步器，这些计步器可在 LCD 屏幕上显示步数。随着技术的发展，它们开始集成其他统计数据，例如爬楼梯层数和智能手机集成（最著名的是
  Fitbit）。幸运的是，iPhone 现在在 M 系列运动协处理器芯片中内置了非常先进、精确的类似计步器的功能，无需额外外部硬件。


  在代码清单 3-2 中，我用来发起权限请求的方法是 `startUpdates(from:withHandler:)`。此方法指示计步器开始收集数据，并通过你指定的完成处理器*闭包*将数据发送回你的应用。


  Swift 中的闭包与 Objective-C 中的 block 或其他高级编程语言中的匿名函数运行方式相同。闭包通常被定义并作为参数传递给其他方法。对于长时间运行的方法或响应时间不明确的方法（例如来自硬件的更新），或者作为*协议*的替代方案（其实现在往需要大量辅助代码），闭包是一种合适的选择。


  如果操作成功，计步器更新的闭包会返回一个 `CMPedometerData` 对象（如果失败，则返回一个未初始化的可选值）。通过检查此值，你可以确定从开始时间到更新时刻之间用户的步数、上楼或下楼楼层数、距离和步速。在代码清单
  3-3 中，我更新了 `CreateWorkoutViewController` 类，添加了用于跟踪步速和爬楼层数的新属性。我还更新了 `startPedometerUpdates()`
  方法，使其使用基于计步器的值而非 GPS 值，并重构了逻辑，将重置锻炼跟踪值的操作转移到一个新的 `resetWorkoutData()` 方法中。




