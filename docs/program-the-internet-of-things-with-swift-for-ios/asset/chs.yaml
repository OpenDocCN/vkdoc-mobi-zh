  \ Interface Builder 将所有标签的 Outlet 以及“更新”按钮的处理程序连接到视图控制器。你的类连接检查输出应与我在图 8-11 中的实现类似。如果你需要复习如何建立连接，请查阅第\
  \ 1 章和第 6 章。\n\n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig11_HTML.jpg](img/346879_2_En_8_Fig11_HTML.jpg)\n\
  \n**图 8-11**\nHome View Controller 更新后的故事板连接\n\n### 发起并响应 HTTPS 请求\n\n现在 Home View\
  \ Controller 的用户界面已经准备就绪，你可以开始处理项目的网络代码了。在第 6 章中，你创建了一个 `BluetoothService` 类来简化\
  \ Door View Controller 中的蓝牙连接。在本项目中，你将采用类似的模式，创建一个 `NetworkManager` 类来管理应用中的网络连接。与\
  \ `BluetoothService` 不同，`NetworkManager` 需要被应用的 `HomeManager` 和 `AppDelegate` 类访问，并且无论哪个调用者访问，其状态都必须保持一致。为简化起见，在本项目中，我将通过单例（一个懒加载的全局对象）来实现这一行为。我在代码清单\
  \ 8-16 中给出了该类的初始实现。\n\n```swift\nimport Foundation\nclass NetworkManager: NSObject\
  \ {\nstatic let shared = NetworkManager(urlString:\n\"https://raspberrypi.local\"\
  )\nlet baseUrl: URL\ninit(urlString: String) {\nguard let baseUrl = URL(string:\
  \ urlString) else {\nfatalError(\"无效 URL 字符串\")\n}\nself.baseUrl = baseUrl\n}\n\
  }\n```\n\n`代码清单 8-16`\n`NetworkManager` 作为单例的初始实现\n\n单例在 Apple 开发者社区中是一个有争议的话题，因为它本质上是在全局范围内共享。但就本章而言，单例是一个便捷的选择，因为它没有副作用，并且我想重现\
  \ Apple 访问硬件 API 的方法（在整个 iOS 中使用单个对象管理一个资源，例如 GPS、摄像头）。如果你对单例的替代方案感兴趣，我建议研究一下依赖注入。依赖注入并非\
  \ Apple 提供的一等设计模式，因此在选择适合你应用的库或实现时，应谨慎行事。\n\n在 Swift 中，单例通过向对象添加一个静态属性来实现，该属性返回该类的一个已初始化实例。如果该对象之前已被初始化，则返回现有对象；否则，将初始化一个新对象。这被称为*懒加载*。对于我的初始化器，我只需要使用网络请求的基础\
  \ URL 来初始化该类。至于基础 URL，与我的示例一样，使用设备的 Bonjour 名称。截至撰写本文时，Raspbian 默认启用了 Bonjour。Bonjour\
  \ 允许 Apple 设备通过域名而非 IP 地址来查找网络上的设备。\n\n对于网络实现，先从最简单的端点开始（温度）。要查询温度，只需向 `/temperature`\
  \ 端点发送一个 `GET` 请求。在 iOS 中，此操作通过 `URLSession` 类完成。与 `NetworkManager` 一样，这个对象也是一个单例。`URLSession`\
  \ 类将网络操作分为三大类：数据任务、上传任务和下载任务。顾名思义，上传和下载任务适用于长时间运行的文件上传或下载。对于短时间运行的操作（例如 Web 服务器\
  \ API 调用），数据任务是最合适的选择。由于来自 Raspberry Pi 的所有 API 响应均返回 JSON 数据，你可以将网络调用封装在一个方法中。在代码清单\
  \ 8-17 中，我为这些调用创建了基础方法：`request(endpoint:httpMethod:completion:)`。其参数包括端点扩展名和表示方法类型的字符串，并返回一个包含服务器响应（或错误）的\
  \ JSON 字典。\n\n\n\n```swift\nclass NetworkManager: NSObject {\n    func request(endpoint:\
  \ String, httpMethod: String, completion: @escaping (_ jsonDict: [String: Any])\
  \ -> Void) {\n        guard let url = URL(string: endpoint, relativeTo: baseUrl)\
  \ else {\n            return completion([\"error\": \"Invalid URL\"])\n        }\n\
  \        var urlRequest = URLRequest(url: url)\n        urlRequest.httpMethod =\
  \ httpMethod\n        let session = URLSession.default\n        let task = session.dataTask(with:\
  \ urlRequest) { (data: Data?, url: URLResponse?, error: Error?) in\n           \
  \ if error == nil {\n                do {\n                    guard let jsonData\
  \ = data else {\n                        return completion([\"error\": \"Invalid\
  \ input data\"])\n                    }\n                    guard let result =\
  \ try JSONSerialization.jsonObject(with: jsonData, options: []) as? [String : Any]\
  \ else {\n                        return completion([\"error\": \"Invalid JSON data\"\
  ])\n                    }\n                    completion(result)\n            \
  \    } catch let error {\n                    return completion([\"error\": error.localizedDescription])\n\
  \                }\n            } else {\n                guard let errorObject\
  \ = error else { return completion([\"error\": \"Invalid error object\"]) }\n  \
  \              return completion([\"error\": errorObject.localizedDescription])\n\
  \            }\n        }\n        task.resume()\n    }\n}\n代码清单 8-17: 用于发起 HTTP\
  \ 请求的网络管理器方法\n```\n\n该方法的基本流程是：使用端点地址和 HTTP 方法字符串创建一个 URL 请求对象，然后为数据任务创建一个完成处理程序，并通过\
  \ `resume()` 方法执行该任务。你可能会注意到此方法中包含了大量的错误处理逻辑。尽管 `JSONSerializer` 和 `URLSession`\
  \ 类为你抽象了大量的逻辑，但它们很容易因配置不正确而失败。添加详细的错误处理将使你之后更容易定位失败的步骤。由于该方法通过完成处理程序返回结果，你可以传递错误对象，而不是来自服务器的结果。\n\
  \n在代码清单 8-18 中，我通过一个新的 `NetworkManager` 方法 `getTemperature(completion:)`，从主页视图控制器的\
  \ `connect()` 方法中调用该方法来获取温度。通过使用基于完成处理程序的逻辑，你可以快速将 `result` 对象传递到整个流程中，而无需在每个步骤中重新处理它。\n\
  \n```swift\nclass NetworkManager: NSObject {\n    ...\n    func getTemperature(completion:\
  \ @escaping (_ jsonDict: [String: Any]) -> Void) {\n        request(endpoint: \"\
  temperature\", httpMethod: \"GET\") { (resultDict: [String: Any]) in\n         \
  \   completion(resultDict)\n        }\n    }\n}\n\nclass HomeViewController: DoorViewController\
  \ {\n    ...\n    @IBAction override func connect() {\n        NetworkManager.shared.getTemperature\
  \ { [weak self] (resultDict: [String: Any]) in\n            if let error = resultDict[\"\
  error\"] as? String {\n                self?.displayError(errorString: error)\n\
  \            } else {\n                DispatchQueue.main.async {\n            \
  \        if let temperature = resultDict[\"temperature\"] as? String {\n       \
  \                 self?.temperatureLabel?.text = \"\\(temperature) C\"\n       \
  \             }\n                    if let humidity = resultDict[\"humidity\"]\
  \ as? String {\n                        self?.humidityLabel?.text = \"\\(humidity)%\"\
  \n                    }\n                }\n            }\n        }\n    }\n\n\
  \    func displayError(errorString: String) {\n        let alertView = UIAlertController(title:\
  \ \"Error\", message: errorString, preferredStyle: .alert)\n        let alertAction\
  \ = UIAlertAction(title: \"OK\", style: .default, handler: nil)\n        alertView.addAction(alertAction)\n\
  \        DispatchQueue.main.async { [weak self] in\n            self?.present(alertView,\
  \ animated: true, completion: nil)\n        }\n    }\n}\n代码清单 8-18: 使用网络管理器从服务器获取温度\n\
  ```\n\n#### 警告\n\n当你必须在完成处理程序内访问类的属性时，请始终通过弱引用来执行该操作。直接访问 `self` 会创建所谓的*循环引用*：由于对类的强引用从未被完全释放而导致的内存泄漏。\n\
  \n接下来，运行应用程序并按下“更新”按钮，尝试网络请求。该请求应失败，并出现与我图 8-12 中类似的 SSL 错误。这是因为树莓派使用了自签名证书，就像你在\
  \ Postman 和 Google Chrome 中遇到的问题一样。\n\n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig12_HTML.jpg](img/346879_2_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12: 自签名证书的错误信息\n\n如本章前面所述，Apple 希望强制将经过验证的 SSL 证书作为 iOS 应用中网络操作的默认设置，以帮助确保用户数据的安全。要为树莓派启用自签名证书，你可以在\
  \ IOTHome 应用的 `Info.plist` 文件中为服务器添加一个*白名单*条目或例外。在项目资源管理器中找到该文件，然后辅助单击（长按或右键单击）它，选择“打开为\
  \ ➤ 源代码文件”。当文件的文本编辑窗口出现时，追加代码清单 8-19 中的代码片段，以仅为树莓派的域启用自签名证书。\n\n```xml\nCFBundleDevelopmentLanguage\n\
  $(DEVELOPMENT_LANGUAGE)\n...\nNSAppTransportSecurity\n\nNSExceptionDomains\n\nraspberrypi.local\n\
  \nNSExceptionAllowsInsecureHTTPLoads\n\nNSIncludesSubdomains\n\n代码清单 8-19: 启用自签名\
  \ SSL 的 Info.plist 条目\n```\n\n为了启用自签名证书的最终更改，你必须重写用于 HTTPS 身份验证挑战的 `URLSessionDelegate`\
  \ 协议方法。在代码清单 8-20 中，我通过创建一个新的 `URLSession` 对象（该对象在 `request()` 方法中接受一个委托）来实现这一点。在身份验证方法中，我仅将树莓派的域加入白名单。此更改后，当你再次尝试运行应用程序时，网络请求应该可以成功完成。\n\
  \n```swift\nclass NetworkManager: NSObject, URLSessionDelegate {\n    func request(endpoint:\
  \ String, httpMethod: String, completion: @escaping (_ jsonDict: [String: Any])\
  \ -> Void) {\n        ...\n        var urlRequest = URLRequest(url: url)\n     \
  \   urlRequest.httpMethod = httpMethod\n        let session: URLSession = URLSession(configuration:\
  \ URLSessionConfiguration.default, delegate: self, delegateQueue: OperationQueue.main)\n\
  \        let task = session.dataTask(with: urlRequest) { (data: Data?, url: URLResponse?,\
  \ error: Error?) in\n            ...\n        }\n        task.resume()\n    }\n\
  \    ...\n    func urlSession(_ session: URLSession, didReceive challenge: URLAuthenticationChallenge,\
  \ completionHandler: @escaping (URLSession.AuthChallengeDisposition, URLCredential?)\
  \ -> Void) {\n        let method = challenge.protectionSpace.authenticationMethod\n\
  \        let host = challenge.protectionSpace.host\n        NSLog(\"Received challenge\
  \ for \\(host)\")\n        switch (method, host) {\n        case (NSURLAuthenticationMethodServerTrust,\
  \ \"raspberrypi.local\"):\n            let trust = challenge.protectionSpace.serverTrust!\n\
  \            let credential = URLCredential(trust: trust)\n            completionHandler(.useCredential,\
  \ credential)\n        default:\n            completionHandler(.performDefaultHandling,\
  \ nil)\n        }\n    }\n}\n代码清单 8-20: 通过 URLSessionDelegate 启用自签名 SSL 证书\n```\n\
  \n要读取 IOTHome 系统的门状态，你必须先调用 `/door/connect` 端点，然后再调用 `/door/status` 端点。在代码清单 8-21\
  \ 中，我通过在 `/door/connect` 端点的完成处理程序内嵌套对 `/door/status` 端点的调用来实现此行为。与读取温度类似，此网络调用应在你在应用程序中按下“更新”按钮时发起。\n\
  \n\n```\nclass NetworkManager: NSObject, URLSessionDelegate {\n...\nfunc getDoorStatus(completion:\
  \ @escaping (_ jsonDict:\n[String: Any]) -> Void) {\nconnectDoor { [weak self] (result:\
  \ [String: Any]) in\nif (result[\"error\"] as? String) != nil {\nreturn completion(result)\n\
  } else {\nself?.request(endpoint: \"door/status\",\nhttpMethod: \"GET\") { (resultDict:\
  \ [String:\nAny]) in\ncompletion(resultDict)\n}\n}\n}\n}\nfunc connectDoor(completion:\
  \ @escaping (_ jsonDict:\n[String: Any]) -> Void) {\nrequest(endpoint: \"door/connect\"\
  , httpMethod: \"POST\") {\n(resultDict: [String: Any]) in\ncompletion(resultDict)\n\
  }\n}\n}\nclass HomeViewController: DoorViewController {\n...\n@IBAction override\
  \ func connect() {\n...\nNetworkManager.shared.getDoorStatus{ [weak self]\n(resultDict:\
  \ [String: Any]) in\nif let error = resultDict[\"error\"] as? String {\nself?.displayError(errorString:\
  \ error)\n} else {\nDispatchQueue.main.async {\nif let doorStatus =\nresultDict[\"\
  doorStatus\"] as? String {\nself?.statusLabel?.text =\n\"\\(doorStatus)\"\n}\nif\
  \ let batteryStatus =\nresultDict[\"batteryStatus\"] as? String {\nself?.batteryLabel?.text\
  \ =\n\"\\(batteryStatus)\"\n}\nif let lastUpdate =\nresultDict[\"lastUpdate\"] as?\
  \ String {\nself?.lastUpdatedLabel?.text =\n\"\\(lastUpdate)\"\n}\n}\n}\n}\n}\n\
  }\n代码清单 8-21 通过网络管理器获取门磁传感器状态\n```\n\n最后，为了实现应用最终的 API 调用，你应该在应用进入后台或主屏幕被导航离开时，调用\
  \ `/door/disconnect` 端点。这将允许其他设备在应用处于非活动状态时连接到门磁传感器。如代码清单 8-22 所示，你可以通过在 `NetworkManager`\
  \ 中创建一个 `disconnectDoor()` 方法，并从主视图控制器的 `viewWillDisappear()` 方法以及应用委托的 `applicationWillResignActive()`\
  \ 方法中调用它来实现这一点。\n\n```\nclass NetworkManager: NSObject, URLSessionDelegate {\n...\n\
  func disconnectDoor(completion: @escaping (_ jsonDict:\n[String: Any]) -> Void)\
  \ {\nrequest(endpoint: \"door/disconnect\", httpMethod:\n\"POST\") { (resultDict:\
  \ [String: Any]) in\ncompletion(resultDict)\n}\n}\n}\nclass AppDelegate: UIResponder,\
  \ UIApplicationDelegate {\n...\nfunc applicationWillResignActive(_ application:\n\
  UIApplication) {\nNetworkManager.shared.disconnectDoor { (resultDict:\n[String:\
  \ Any]) in\nNSLog(\"Disconnect result:\n\\(resultDict.description)\")\n}\n}\n}\n\
  class HomeViewController: DoorViewController {\n...\noverride func viewWillDisappear(_\
  \ animated: Bool) {\nsuper.viewWillAppear(animated)\nNetworkManager.shared.disconnectDoor\
  \ { (resultDict:\n[String: Any]) in\nNSLog(\"Disconnect result:\n\\(resultDict.description)\"\
  )\n}\n}\n}\n代码清单 8-22 自动断开与门磁传感器的连接\n```\n\n## 本章小结\n\n在本章中，你通过将前几章的 Raspberry Pi\
  \ 扩展为网络服务器并通过 HTTPS 端点暴露其数据，成功构建了一个经典的物联网设备。在此过程中，你还学习了 HTTP 请求的工作原理，`Express` 和\
  \ `Noble` 如何为你分担实现 HTTP 和蓝牙协议栈的繁重工作，以及如何使用 iOS 应用连接到这些端点。与设置 HomeKit 类似，这些任务中的许多并非特定于\
  \ iOS 或 Raspberry Pi，而是对成熟的 Linux 和 Web 应用开发实践的具体实现。\n\n在 Raspberry Pi 等单板计算机取得商业成功之前，许多专有的片上系统解决方案已经提供了相同的核心功能——GPIO\
  \ 和网络服务器，但价格高昂且学习曲线陡峭。得益于这类技术的简化，物联网得以持续扩展，但正如你将在本书后面学到的，你还应记得添加 HTTPS 或其他安全措施，以帮助创造一个安全的物联网。\n\
  \n"
- '# 第三部分：使用 Apple 先进的物联网技术构建应用


  '
- "# 9. 使用 tvOS 构建 Apple TV 仪表盘应用\n\n尽管 Apple TV 于 2007 年推出，但其市场普及率在数年内一直很低，并被史蒂夫·乔布斯戏称为“一个业余爱好”。当时，其主要用途是作为在\
  \ iTunes 上购买媒体的机顶盒。2012 年，一款价格更低、灵感源于 iOS 的 Apple TV 2 问世并迅速走红。用户不再局限于 `iTunes`\
  \ 内容，突然可以通过系统更新附带的应用程序观看来自 `Netflix` 和热门电视频道的内容。这使许多人猜测，该设备实际上基于 iOS 的一个分支，并且人们期望苹果有朝一日能向所有开发者提供其软件开发工具包。\n\
  \n2015 年，这些预测成真了，苹果发布了 Apple TV 4，同时公开发布了其操作系统（现称为 `tvOS`）的软件开发工具包以及该设备的 App Store。正如许多人推测的那样，`tvOS`\
  \ 基于 iOS，开发者可以使用 Swift 以及来自 iOS 的框架（包括 `Cocoa Touch` 和 `Core Location`）的紧密分支为其编写应用。截至撰写本文时，主要的例外是\
  \ `MapKit` 和 `WebKit`——这意味着你不能直接将网页或地图嵌入到你的原生 `tvOS` 应用中。\n\n考虑到这一点，在本章中，你将通过运用所学的\
  \ iOS 知识，为 IOTHome 硬件构建一个 Apple TV 仪表盘，从而将 `tvOS` 与物联网这两个世界连接起来。为了使用户体验更具吸引力，你将整合来自\
  \ IOTHome 网络服务器和 `OpenWeatherMap.org` 天气 API 的数据，从而能够展示用户家室内外的气候信息。\n\n### 注意\n\n\
  虽然你可以使用 Apple TV 模拟器和任何基于 Linux 的设备来开发本章的项目，但代码示例和解释是为 Apple TV 4 和 Raspberry Pi\
  \ 3 或更新版本优化的。\n\n## 学习目标\n\n在本章中，你将学习如何通过向 IOTHome 项目添加 Apple TV 目标、为该目标创建 `tvOS`\
  \ 资源以及编写代码使 `tvOS` 应用自行渲染用户界面并发出网络请求，来构建一个 Apple TV 仪表盘应用。在创建 `tvOS` 仪表盘应用的过程中，你将学习\
  \ iOS 物联网应用开发的以下关键概念：\n\n*   向现有 iOS 应用添加 `tvOS` 目标\n*   为 `tvOS` 项目创建用户界面\n*  \
  \ 在 `tvOS` 应用中发起 HTTP 请求\n*   从 `tvOS` 应用请求用户位置\n*   连接到 `OpenWeatherMap.org` 公共天气\
  \ API\n*   在 Apple TV 上运行 `tvOS` 应用\n\n苹果在 `tvOS` 上的一大成就是，它在很大程度上为该平台保留了 iOS 的开发工具和实践。你会发现自己有时会忘记自己正为哪个平台编写代码，这与\
  \ `watchOS`（许多 API 缺失）或 `macOS`（工作流程或共享框架的重叠很少）形成对比。在研读本章内容时，我将强调这些相似之处以及如何将它们应用于\
  \ `tvOS`。另外，尽管你需要为用户界面编写新代码，但你可以几乎不做任何改动地重用第 8 章中的网络代码。\n\n在本章中，我假设你熟悉 IOTHome 传感器（第\
  \ 5 章至第 7 章）和网络服务器（第 8 章）。如果你对其中任何一项不熟悉，我强烈建议你在继续学习本章之前先回顾一下相关内容。与之前的章节一样，你可以在本书的\
  \ GitHub 仓库（[`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)）的\
  \ `Chapter` `9` 文件夹下找到本章的完整项目。\n\n\n\n## 设置 tvOS 目标\n\n如果你曾为 iOS 下载过任何游戏或天气应用，并且恰好也拥有一台\
  \ Apple TV，你可能会注意到其中一些应用会神奇地出现在你的 Apple TV 主屏幕上。你可以通过将 tvOS 应用作为新目标添加到你的 `IOTHome`\
  \ iOS 应用中，为你的用户重现这种体验，并提高你对 tvOS 体验的采用率。首先，从第 8 章复制一份 `IOTHome` 应用，或者从本书的 GitHub\
  \ 仓库下载一份新的副本。接下来，在 Xcode 中打开该项目，然后从“文件”菜单中选择“新建” ➤ “目标”，如图 9-1 所示。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig1_HTML.jpg](img/346879_2_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1：向现有 iOS 项目添加 tvOS 目标\n\n在点击菜单项后出现的模板选择器窗口中，选择 tvOS，然后选择“单视图应用”，如图 9-2 所示。\n\
  \n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig2_HTML.jpg](img/346879_2_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2：选择单视图应用 tvOS 模板\n\n当被要求命名产品时，将其命名为“`IOTHomeTV`”。你的组织标识符应与之前迭代应用时使用的保持一致（即你的姓名或网站域名的反向域名表示法）。你的项目现在应包含一个用于\
  \ `IOTHomeTV` 目标的新方案和新文件夹，如图 9-3 所示。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig3_HTML.jpg](img/346879_2_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3：`IOTHome` 项目层级结构，包含新的 tvOS 方案和文件\n\n接下来，你必须从 iOS 项目中复制网络白名单，以便连接到自签名的 HTTPS\
  \ 端点。打开 `IOTHome` iOS 应用（位于 `IOTHome` 文件夹中）的 `Info.plist` 文件，然后辅助点击（右键点击）名为“App\
  \ Transport Security Settings”的键。选择“复制”以复制该键值对的内容。接着，打开 `IOTHomeTV` tvOS 应用（位于 `IOTHomeTV`\
  \ 文件夹中）的 `Info.plist` 文件，然后从辅助点击（右键点击）菜单中选择“粘贴”，以粘贴该键值对。你最终得到的 `Info.plist` 文件应类似于图\
  \ 9-4 中我的结果。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig4_HTML.jpg](img/346879_2_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4：`IOTHomeTV` 目标的 `Info.plist` 文件，包含网络白名单\n\n最后一步项目设置，你必须让 tvOS 目标能使用 iOS\
  \ 目标中的 `NetworkManager` 类。使用同一个项目来管理两个目标的好处之一是，你可以在两个项目中使用相同的源文件来完成此任务。如图 9-5 所示，要启用此功能，请点击项目导航器中的\
  \ `NetworkManager.swift` 文件，然后选中 `IOTHomeTV` 旁边的复选框。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig5_HTML.jpg](img/346879_2_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5：在项目中的多个目标之间共享源代码\n\n要验证源文件是否已成功添加并且与 tvOS 兼容，从 Xcode 顶部“运行”按钮旁边的下拉菜单中选择\
  \ `IOTHomeTV` 方案和 Apple TV 4K 目标设备。你应该能够成功编译包含新文件的目标。\n\n## 创建用户界面\n\n现在，tvOS 的新目标已设置完毕并且可以编译，你可以开始为仪表盘应用构建用户界面了。仪表盘通常需要长时间显示，并且应易于阅读。为了实现这些目标，在图\
  \ 9-6 中，我提供了一个基于磁贴的用户界面线框图，用于显示来自 `IOTHome` 传感器的门状态以及室内温度和湿度数据、三天天气预报以及当前室外温度。天气数据通过查询\
  \ OpenWeatherMap.org 并利用用户的当前位置获取。你将导入 `FontAwesome.swift`（ [`github.com/thii/FontAwesome.swift`](https://github.com/thii/FontAwesome.swift)\
  \ ）开源库中的图标。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig6_HTML.jpg](img/346879_2_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6：`IOTHomeTV` 仪表盘线框图\n\ntvOS 最便捷的方面之一在于，Apple 允许你重用从 iOS 开发中熟悉的大部分开发工具和实践来帮助你构建应用。对于\
  \ `IOTHomeTV` 应用，你可以使用 Interface Builder 以及简单的 `UIView`、`UIImage` 和 `UILabel` 对象快速构建用户界面。首先，打开\
  \ `IOTHomeTV` 目标的 `Main.storyboard` 文件。空白的 storyboard 初始显示应类似于图 9-7 中的屏幕截图。\n\n\
  ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig7_HTML.jpg](img/346879_2_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7：Apple TV 应用的空白故事板\n\n与 iOS 应用相同，你可以通过将对象从 Interface Builder 右下角的“对象库”拖放到故事板上来组合你的用户界面。为了进一步控制元素的位置，你也可以像在\
  \ iOS 应用中那样使用自动布局。以表格 9-1 作为指导，布局用户界面。标签和图形应放置在磁贴之上。暂时不必担心视图上的圆角边框，因为稍后你将在本节中以编程方式实现它们。\n\
  \n**表 9-1：** 主视图控制器用户界面元素的样式\n\n| 元素名称 | 文本样式 | 相对于...对齐 | 上边距 | 下边距 | 左边距 | 右边距\
  \ |\n| --- | --- | --- | --- | --- | --- | --- |\n| “三天预报”背景视图 | — | 视图 | 8 | 60\
  \ | 8 | 8 |\n| “底部行”背景视图 | — | 视图 | 60 | 40 | 60 | 60 |\n| “提示”标签 | 标题 3 | 视图 |\
  \ 40 | 20 | 8 | 8 |\n| “标题”标签 | 标题 2 | 父视图（X 中心） | 30 | — | — | — |\n| “图标”图像视图\
  \ | — | 父视图（X、Y 中心） | — | — | — | — |\n| “详情”文本标签 | 标题式 | “图标”图像视图（X 中心） | 20 |\
  \ — | — | — |\n\n截至撰写本文时，tvOS 仅支持一种宽高比，因此，如果你愿意，可以选择跳过为该项目设置自动布局约束。\n\n设置用户界面的最后一步，你必须将故事板链接到你的源代码。在清单\
  \ 9-1 中，我扩展了 `IOTHomeTV` 项目的 `ViewController` 类，以包含所有用户界面元素的可供 Interface Builder\
  \ 访问的属性。\n\n\n\n```swift\nclass ViewController: UIViewController {\n    @IBOutlet\
  \ weak var forecastView: UIView?\n    @IBOutlet weak var indoorView: UIView?\n \
  \   @IBOutlet weak var outdoorView: UIView?\n    @IBOutlet weak var lockView: UIView?\n\
  \    @IBOutlet weak var firstDayLabel: UILabel?\n    @IBOutlet weak var secondDayLabel:\
  \ UILabel?\n    @IBOutlet weak var thirdDayLabel: UILabel?\n    @IBOutlet weak var\
  \ indoorTempLabel: UILabel?\n    @IBOutlet weak var indoorHumidityLabel: UILabel?\n\
  \    @IBOutlet weak var outdoorTempLabel: UILabel?\n    @IBOutlet weak var outdoorHumidityLabel:\
  \ UILabel?\n    @IBOutlet weak var tipLabel: UILabel?\n    @IBOutlet weak var lockImageView:\
  \ UIImageView?\n    @IBOutlet weak var firstDayImageView: UIImageView?\n    @IBOutlet\
  \ weak var secondDayImageView: UIImageView?\n    @IBOutlet weak var thirdDayImageView:\
  \ UIImageView?\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \    }\n}\n```\n\n**列表 9-1** 视图控制器定义，包含用户界面属性\n\n修改源文件后，使用 Xcode 中的连接检查器（Connection\
  \ Inspector）将属性连接到故事板。与之前示例中相同，你可以参考第 1 章来复习如何使用 Interface Builder。完成连接后，你的故事板应类似于我在图\
  \ 9-8 中的实现。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig8_HTML.jpg](img/346879_2_En_9_Fig8_HTML.jpg)\n\
  \n**图 9-8** IOTHomeTV 应用的完成故事板\n\n### 通过编程为元素添加样式以匹配 tvOS 设计语言\n\n布置完用户界面后，你可能已经注意到它有点……平淡。通过为图块背景添加柔和阴影、圆角以及模糊效果，你可以打造出更符合用户在\
  \ Apple TV 主屏幕上所熟悉样式的用户界面。这些更改必须通过代码实现，但幸运的是，实现起来并不复杂。\n\n你可以先为视图添加模糊效果。为此，可以使用\
  \ `UIVisualEffectView` 类，它允许你将 Apple 预构建的复杂视觉效果应用到任何 `UIView` 上。要应用现代的 iOS 模糊效果，请使用\
  \ `UIBlurEffect` 对象。在列表 9-2 中，我通过创建一个名为 `applyEffects()` 的辅助方法，为图块应用了视觉效果。\n\n```swift\n\
  class ViewController: UIViewController {\n    ...\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        applyEffects(to: [forecastView, indoorView,\n\
  \            outdoorView, lockView])\n    }\n    func applyEffects(to views: [UIView?])\
  \ {\n        for view in views {\n            addBlurEffect(to: view)\n        }\n\
  \    }\n    func addBlurEffect(to targetView: UIView?) {\n        guard let targetView\
  \ = targetView else { return }\n        view.backgroundColor = UIColor.clear\n \
  \       let blurEffect = UIBlurEffect(style: .regular)\n        let blurView = UIVisualEffectView(effect:\n\
  \            blurEffect)\n        blurView.frame = view.bounds\n        targetView.addSubview(blurView)\n\
  \        targetView.sendSubview(toBack: blurView)\n    }\n}\n```\n\n**列表 9-2** 向视图添加模糊效果\n\
  \n虽然你必须将视觉效果添加为子视图，但它不必遮挡内容。通过调用 `sendSubview(toBack:)` 方法，你可以将模糊效果置于图块的后方，而不会影响故事板中先前设置的视图布局。应用效果的逻辑在视图控制器的\
  \ `viewDidLoad()` 方法中调用，因为该方法在视图从故事板布局完成后执行，此时视图控制器已准备就绪。\n\n添加圆角半径则是一个更直接的过程。要应用圆角半径，需要为视图的\
  \ `CALayer`（表示视图绘制方式的对象）提供一个数值，并指定要裁剪圆角下方的区域。在列表 9-3 中，我将 `applyEffects()` 方法扩展为包含圆角半径效果。\n\
  \n```swift\nclass ViewController: UIViewController {\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        applyEffects(to: [forecastView, indoorView,\n\
  \            outdoorView, lockView], cornerRadius: 20)\n    }\n    func applyEffects(to\
  \ views: [UIView?],\n                      cornerRadius: CGFloat) {\n        for\
  \ view in views {\n            addBlurEffect(to: view)\n            addRoundedCorners(to:\
  \ view, cornerRadius:\n                cornerRadius)\n        }\n    }\n    func\
  \ addRoundedCorners(to targetView: UIView?,\n                           cornerRadius:\
  \ CGFloat) {\n        guard let targetView = targetView else { return }\n      \
  \  targetView.layer.cornerRadius = cornerRadius\n        targetView.layer.masksToBounds\
  \ = true\n    }\n}\n```\n\n**列表 9-3** 向视图添加圆角\n\n对于阴影，你需要结合这两种效果的概念。阴影本身是通过为 `CALayer`\
  \ 应用阴影颜色、模糊半径和阴影位置来创建的。这用于模拟现实生活中的柔和或硬质光线。不幸的是，启用圆角所需的遮罩会裁剪掉阴影（如果应用到同一个视图上）。你可以通过创建另一个位置相同的视图，将阴影效果应用到该新视图，并将其放置在内容视图下方来解决此问题。在列表\
  \ 9-4 中，我扩展了视图控制器以实现这些步骤，并为图块添加了阴影效果。\n\n```swift\nclass ViewController: UIViewController\
  \ {\n    ...\n    func applyEffects(to views: [UIView?],\n                     \
  \ cornerRadius: CGFloat) {\n        for view in views {\n            addBlurEffect(to:\
  \ view)\n            addRoundedCorners(to: view,\n                             \
  \ cornerRadius: cornerRadius)\n            addShadow(to: view, cornerRadius: cornerRadius)\n\
  \        }\n    }\n    func addShadow(to targetView: UIView?, cornerRadius:\n  \
  \                 CGFloat) {\n        guard let targetView = targetView else { return\
  \ }\n        let shadowView = UIView(frame: targetView.frame)\n        shadowView.layer.cornerRadius\
  \ = cornerRadius\n        shadowView.layer.shadowOffset = CGSize.zero\n        shadowView.layer.shadowOpacity\
  \ = 0.2\n        shadowView.layer.shadowRadius = 10.0\n        shadowView.layer.shadowColor\
  \ = UIColor.black.cgColor\n        let shadowPath = UIBezierPath(roundedRect:\n\
  \            shadowView.bounds, cornerRadius: cornerRadius)\n        shadowView.layer.shadowPath\
  \ = shadowPath.cgPath\n        view.addSubview(shadowView)\n        view.bringSubview(toFront:\
  \ targetView)\n    }\n}\n```\n\n**列表 9-4** 在带圆角的视图下方添加阴影\n\n### 注意\n\n`UIView` 的\
  \ `frame` 属性包含其 x 和 y 位置。而 `bounds` 属性将这些位置设置为 (0,0)。当向视图添加子视图时，请尽量使用 `bounds`。当复制或移动视图时，请尽量使用\
  \ `frame`。\n\n在应用了这两种视觉效果并在 Apple TV 模拟器中运行应用程序后，你的输出结果应类似于图 9-9 中的截图。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig9_HTML.jpg](img/346879_2_En_9_Fig9_HTML.jpg)\n\
  \n**图 9-9** IOTHomeTV 应用的风格化用户界面\n\n\n好的，这是根据您的要求和示例格式翻译的中文版本。\n\n\n### 使用 Font\
  \ Awesome 实现基于字体的图形\n\n作为用户界面拼图的最后一块，您需要为应用程序添加图形。本部分不直接导入图形文件，而是介绍一种非常流行的基于字体的替代方案——Font\
  \ Awesome，及其 Swift 实现 FontAwesome.swift。Font Awesome 是一个字体文件，提供了海量的图标集合。在 Web 开发中，它是一种流行的选择，有助于减小页面大小并减少需要聘请图形设计师的工作量。在\
  \ iOS 上，它同样能带来这些好处，此外，还能让您免去自行管理和缩放图片的负担。您在本节中要使用的实现方案 FontAwesome.swift，允许您基于该字体创建\
  \ `UIImage` 对象，使其使用方法与使用来自“资源目录”或其他来源的图形完全相同。\n\n首先，从其 GitHub 页面下载或克隆 FontAwesome.swift\
  \ 的仓库：[`https://github.com/thii/FontAwesome.swift`](https://github.com/thii/FontAwesome.swift)。接下来，将存档中\
  \ `FontAwesome` 文件夹内的所有文件（`Info.plist` 文件除外）复制到您的项目中。您可以通过“文件”菜单中的“将文件添加到 IOTHome”选项来执行此操作。如图\
  \ 9-10 所示，当文件选择弹出窗口出现时，选择 `IOTHome` 和 `IOTHomeTV` 作为目标，以便将文件同时包含在 iOS 和 tvOS 应用程序中。确保同时选中“如果需要，复制项目”，以复制这些文件，从而将文件的副本添加到项目中。\n\
  \n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig10_HTML.jpg](img/346879_2_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n将 FontAwesome.swift 的文件导入 IOTHome 项目\n\n将 FontAwesome.swift 的文件添加到项目后，选中所有文件，然后使用辅助点击（右键点击）弹出上下文菜单。选择“从选择中新建组”，将所有文件放入项目中的一个文件夹内。您的\
  \ Xcode 项目导航器现在应类似于图 9-11 中的示例。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig11_HTML.jpg](img/346879_2_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\n将 FontAwesome.swift 添加到项目后的项目导航器\n\n最后，要使用该库，您必须基于字体中可用的图标创建 `UIImage`\
  \ 对象。Font Awesome 不仅提供了纯 Unicode 十六进制代码，还为每个图标提供了名称。要了解有哪些图标可用及其名称，我倾向于使用该字体的官方搜索工具，网址为：[`https://fontawesome.com/icons?d=gallery&m=free`](https://fontawesome.com/icons?d=gallery%2526m=free)。开始项目时，使用\
  \ `lock` 表示锁图形，使用 `sun` 表示晴朗天气图形。\n\n要创建图形，您可以使用 FontAwesome.swift 对 `UIImage` 类的扩展方法\
  \ `UIImage.fontAwesome(name:style:textColor:size:)`。顾名思义，您需要调用 API 并传入图标名称、显示样式、着色颜色和尺寸。在代码清单\
  \ 9-5 中，我将这些调用添加到了 `ViewController` 类中。\n\n```\nclass ViewController: UIViewController\
  \ {\n...\noverride func viewDidLoad() {\nsuper.viewDidLoad()\napplyEffects(to: [forecastView,\
  \ indoorView,\noutdoorView, lockView], cornerRadius: 20)\naddFontAwesomeImage(to:\
  \ lockImageView, name: .lock)\naddFontAwesomeImage(to: firstDayImageView, name:\
  \ .sun)\naddFontAwesomeImage(to: secondDayImageView, name:\n.sun)\naddFontAwesomeImage(to:\
  \ thirdDayImageView, name: .sun)\n}\nfunc addFontAwesomeImage(to imageView: UIImageView?,\n\
  name:     FontAwesome)  {\nguard let imageView = imageView else { return }\nimageView.image\
  \ = UIImage.fontAwesomeIcon(name: name,\nstyle: .solid,\ntextColor: UIColor.black,\n\
  size: imageView.bounds.size)\n}\n}\n代码清单 9-5\n向图像视图添加基于 Font Awesome 的图像\n```\n\n\
  添加图像视图后，在 Apple TV 模拟器中运行该应用程序，应得到类似于图 9-12 中截图的输出。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig12_HTML.jpg](img/346879_2_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n\n带有 Font Awesome 图像的 IOTHomeTV\n\n## 向 tvOS 应用添加数据源\n\n现在 IOTHomeTV 应用的用户界面已准备就绪，您可以开始集成其数据源，并用来自您在第\
  \ 5 章至第 7 章构建的 IOTHome 传感器以及 OpenWeatherMap.org 的真实数据来填充它。虽然您可以直接从 Apple TV 连接蓝牙设备，但对于本系统，利用\
  \ Web 服务器处理繁重工作更高效、更可靠。除了能够使用一致的接口外，无需添加额外客户端也能让传感器释放资源以接受更多连接。\n\n在本章开始时，您已验证了来自第\
  \ 8 章的网络客户端代码可以在 tvOS 上无错误编译。要集成该客户端，您只需从 IOTHomeTV 应用中调用它。在代码清单 9-6 中，我开始进行集成，使用\
  \ `NetworkManager` 类请求来自 Raspberry Pi 上传感器的室内气候数据。\n\n```\nclass ViewController:\
  \ UIViewController {\n...\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  applyEffects(to: [forecastView, indoorView,\noutdoorView, lockView], cornerRadius:\
  \ 20)\n...\nfetchNetworkData()\n}\n...\nfunc fetchNetworkData() {\nNetworkManager.shared.getTemperature\
  \ { [weak self]\n(resultDict: [String: Any]) in\nif let error = resultDict[\"error\"\
  ] as? String {\nself?.tipLabel?.text = \"Error: \\(error)\"\n} else {\nDispatchQueue.main.async\
  \ {\nif let temperature =\nresultDict[\"temperature\"] as? String {\nself?.indoorTempLabel?.text\
  \ =\n\"\\(temperature) C\"\n}\nif let humidity = resultDict[\"humidity\"]\nas? String\
  \ {\nself?.indoorHumidityLabel?.text =\n\"Humidity \\(humidity)%\"\n}\n}\n}\n}\n\
  }\n}\n代码清单 9-6\n在 tvOS 应用中从 IOTHome Web 服务器获取温度数据\n```\n\n回顾第 8 章，您会记得 Network Manager\
  \ 负责管理服务器地址、使用 `URLSession` 建立网络连接以及验证 JSON 响应。当网络请求完成时，管理器执行用户指定的完成处理程序，其返回参数是一个\
  \ JSON 字典，其中包含一个 `error` 键值对，或者来自目标端点的响应。在完成处理程序内部，我使用温度（temperature）和湿度（humidity）键值对来更新“室内温度”和“室内湿度”标签的文本。网络请求从\
  \ `viewDidLoad()` 方法触发，这样应用启动时就能更新数据。\n\n在代码清单 9-7 中，我进一步扩展了 `fetchNetworkData()`\
  \ 方法，以包含门传感器的状态。在该示例中，我没有更新标签，而是更新了门状态的图像。\n\n```\nclass ViewController: UIViewController\
  \ {\n...\nfunc fetchNetworkData() {\nNetworkManager.shared.getTemperature { [weak\n\
  self] (resultDict: [String: Any]) in\n...\n}\nNetworkManager.shared.getDoorStatus{\
  \ [weak self]\n(resultDict: [String: Any]) in\nif let error = resultDict[\"error\"\
  ] as? String {\nself?.tipLabel?.text = \"Error: \\(error)\"\n} else {\nDispatchQueue.main.async\
  \ { [weak self] in\nif let doorStatus =\nresultDict[\"doorStatus\"] as? String {\n\
  if doorStatus == \"0\" {\nself?.addFontAwesomeImage(to:\nself?.lockImageView, name:\n\
  .lockOpen)\n} else {\nself?.addFontAwesomeImage(to:\nself?.lockImageView, name:\
  \ .lock)\n}\n}\n}\n}\n}\n}\n}\n代码清单 9-7\n在 tvOS 应用中从 IOTHome Web 服务器获取门传感器数据\n```\n\
  \n\n\n### 请求用户位置信息\n\n在本章开头，我描述了在 IOTHomeTV 仪表盘中显示三天预报和当前天气状况的设想。用户虽然通常了解室内的环境状况，但获取室外天气数据有助于他们为外出做好更充分的准备。为了请求基于位置的气象预报，你需要获取用户的当前位置，正如第\
  \ 2 章中使用位置追踪构建运动应用时所做的那样。\n\n与第 2 章的项目类似，在请求用户位置之前，必须先为 tvOS 的位置权限请求对话框设置描述信息。如图\
  \ 9-13 所示，打开 IOTHomeTV 目标的 `Info.plist` 文件，然后添加 “Privacy – Location When in Use”\
  \ 键值对。我使用的描述字符串是：“IOTHomeTV 希望使用您的位置信息，以便为您显示所在地区的天气信息。”\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig13_HTML.jpg](img/346879_2_En_9_Fig13_HTML.jpg)\n\
  \n**图 9-13** 为 IOTHomeTV 应用添加用户位置权限描述\n\n接下来，你需要在应用启动后添加权限请求。与 iOS 类似，tvOS 中的用户位置通过\
  \ `CLLocationManager` 对象进行管理。如代码清单 9-8 所示，初始化一个对象来管理此请求；实现 `viewWillAppear()` 方法来发出请求；并通过\
  \ `locationManager(didChangeAuthorization status:)` 委托方法来处理结果。\n\n```swift\nimport\
  \ UIKit\nimport CoreLocation\nclass ViewController: UIViewController {\n...\nlet\
  \ locationManager = CLLocationManager()\n...\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  locationManager.delegate = self\n...\n}\noverride func viewDidAppear(_ animated:\
  \ Bool) {\nsuper.viewDidAppear(animated)\nif CLLocationManager.authorizationStatus()\
  \ ==\n.authorizedWhenInUse {\nlocationManager.requestLocation()\n} else {\nlocationManager.requestWhenInUseAuthorization()\n\
  }\n}\n...\n}\nextension ViewController : CLLocationManagerDelegate {\nfunc locationManager(_\
  \ manager: CLLocationManager,\ndidChangeAuthorization status: CLAuthorizationStatus)\
  \ {\nNSLog(\"Authorization state: \\(status)\")\n}\nfunc locationManager(_ manager:\
  \ CLLocationManager,\ndidFailWithError error: Error) {\nlet errorString = \"Location\
  \ error:\n\\(error.localizedDescription)\"\ntipLabel?.text = errorString\nNSLog(errorString)\n\
  }\n}\n```\n\n**代码清单 9-8** 从 IOTHomeTV 应用请求用户位置权限\n\n要验证结果，请在 Apple TV 4K 模拟器中运行应用。您应该会收到一个全屏提示，请求获取用户位置权限，如图\
  \ 9-14 所示。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig14_HTML.jpg](img/346879_2_En_9_Fig14_HTML.jpg)\n\
  \n**图 9-14** IOTHomeTV 应用的用户位置权限弹窗\n\n最后，要请求当前用户位置，请修改 `locationManager(didChangeAuthorization\
  \ status:)` 委托方法，在确认权限已被授予后请求当前位置。如代码清单 9-9 所示，添加另一个委托方法 `locationManager(didUpdateLocations\
  \ locations:)` 来处理位置更新，然后将结果保存到一个可在后续使用的属性中。\n\n```swift\nimport UIKit\nimport CoreLocation\n\
  class ViewController: UIViewController {\n...\nlet locationManager = CLLocationManager()\n\
  var lastSavedLocation : CLLocation?\n...\noverride func viewDidAppear(_ animated:\
  \ Bool) {\n...\n}\n}\nextension ViewController : CLLocationManagerDelegate {\nfunc\
  \ locationManager(_ manager:\nCLLocationManager, didChangeAuthorization\nstatus:\
  \ CLAuthorizationStatus) {\nNSLog(\"Authorization state: \\(status)\")\nif status\
  \ == .authorizedWhenInUse {\nlocationManager.requestLocation()\n}\n}\nfunc locationManager(_\
  \ manager: CLLocationManager\ndidUpdateLocations locations: [CLLocation]) {\nlastSavedLocation\
  \ = locations.first\n}\n}\n```\n\n**代码清单 9-9** 从 IOTHomeTV 应用请求当前用户位置\n\n\n\n###\
  \ 连接 OpenWeatherMap API\n\n有了用户界面、网络功能和用户位置信息之后，你几乎可以开始使用 OpenWeatherMap 的公共天气数据库，为\
  \ IOTHomeTV 应用添加室外天气信息了。在完成最后的设置步骤时，你需要从 OpenWeatherMap.org 申请一个 API 密钥。许多允许他人通过网络\
  \ API 使用其数据的服务，通常都需要 API 密钥来验证请求或根据会员级别强制执行数据访问权限。例如，OpenWeatherMap.org 的免费账户每分钟最多允许\
  \ 60 次请求，但超出此限制则需要付费会员资格。如图 9-15 所示，如需申请免费账户，请在浏览器中导航至 [`www.openweathermap.org`](http://www.openweathermap.org)，然后点击“注册”链接。\n\
  \n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig15_HTML.jpg](img/346879_2_En_9_Fig15_HTML.jpg)\n\
  \n**图 9-15** 在 OpenWeatherMap.org 上创建账户\n\n完成账户创建后，你将被重定向到 API 密钥页面，如图 9-16 所示，其中列出了你所有可用的\
  \ OpenWeatherMap API 密钥。请记下“默认”密钥，不要与他人分享，否则你可能面临账户访问权限丧失的风险。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig16_HTML.jpg](img/346879_2_En_9_Fig16_HTML.jpg)\n\
  \n**图 9-16** OpenWeatherMap.org API 密钥页面\n\n现在你已拥有 OpenWeatherMap API 密钥和用户的当前位置，可以开始使用该服务获取天气数据了。为了填充应用中的天气字段，你将使用\
  \ OpenWeatherMap 的两个端点：`/weather`（用于当前天气状况）和 `/forecast`（用于三天预报）。查看 `/weather` 端点的文档（[`https://openweathermap.org/current`](https://openweathermap.org/current)），你会注意到可以使用\
  \ URL 参数通过地理坐标调用该端点。URL 参数是一种通过将值附加到 URL 末尾来传递给端点的方式。对于坐标 (35.730534, 139.705001)，你将使用以下\
  \ URL：\n\n```\nhttps://api.openweathermap.org/data/2.5/weather?lat=35.730534&lon=139.705001&units=metric&appid=YOUR_APP_ID\n\
  ```\n\n在代码清单 9-10 中，我包含了此 API 调用的 JSON 响应。对于“室外条件”标签，你只需要温度和湿度字段，可以从 `main` 字典中的\
  \ `temp` 和 `humidity` 键值对中提取。\n\n```\n{\n  \"coord\": {\n    \"lon\": 139.71,\n\
  \    \"lat\": 35.73\n  },\n  \"weather\": [{\n    \"id\": 803,\n    \"main\": \"\
  Clouds\",\n    \"description\": \"broken clouds\",\n    \"icon\": \"04n\"\n  }],\n\
  \  \"base\": \"stations\",\n  \"main\": {\n    \"temp\": 27.64,\n    \"pressure\"\
  : 1009,\n    \"humidity\": 74,\n    \"temp_min\": 26,\n    \"temp_max\": 29\n  },\n\
  \  ...\n}\n```\n\n**代码清单 9-10** OpenWeatherMap 当前状况端点的示例 JSON 响应\n\n到目前为止，`NetworkManager`\
  \ 类始终使用相对于 IOTHome 网络服务器域名的端点。为了支持 OpenWeatherMap，你将需要扩展网络管理器，使其能够使用多个基础 URL 并将参数附加到\
  \ URL 末尾。URL 参数的一个特殊要求是：第一个参数必须以 `?` 开头，后续每个参数必须以 `&` 开头。与其自己编写此逻辑，不如利用 `URLComponents`\
  \ 类来构建格式正确的 URL。在代码清单 9-11 中，我扩展了网络管理器中的 `request(endpoint:httpMethod:completion:)`\
  \ 方法，使其接受基础 URL 和 URL 参数字典作为输入参数。此外，我还用新参数修改了其余方法，并添加了一个 `formattedURL(baseUrl:endpoint:parameters:)`\
  \ 方法来构建格式化的 URL。\n\n```\nclass NetworkManager: NSObject, URLSessionDelegate {\n\
  \  let deviceBaseUrl = \"https://raspberrypi.local\"\n  let opmBaseUrl = \"https://api.openweathermap.org/data/2.5\"\
  \n  let opmApiKey = \"YOUR_API_KEY\"\n  static let shared = NetworkManager()\n\n\
  \  func formattedUrl(baseUrl: String, endpoint: String,\n                    parameters:\
  \ [String: String]? ) -> URL? {\n    guard var urlComponents = URLComponents(string:\n\
  \      \"\\(baseUrl)/\\(endpoint)\") else {\n      return nil\n    }\n    urlComponents.queryItems\
  \ = parameters?.compactMap({\n      pair in\n      URLQueryItem(name: pair.key,\
  \ value: pair.value)\n    })\n    return urlComponents.url?.absoluteURL\n  }\n\n\
  \  func request(baseUrl: String, endpoint: String,\n               httpMethod: String,\
  \ parameters: [String: String]? = nil,\n               completion: @escaping (_\
  \ jsonDict: [String: Any]) -> Void) {\n    guard let url = self.formattedUrl(baseUrl:\
  \ baseUrl,\n                                      endpoint: endpoint, parameters:\
  \ parameters) else {\n      return completion([\"error\": \"Invalid URL\"])\n  \
  \  }\n    var urlRequest = URLRequest(url: url)\n    urlRequest.httpMethod = httpMethod\n\
  \    // ...\n  }\n\n  // ...\n  func getTemperature(completion: @escaping (_ jsonDict:\
  \ [String: Any]) -> Void) {\n    request(baseUrl: deviceBaseUrl, endpoint: \"temperature\"\
  ,\n            httpMethod: \"GET\") {\n      (resultDict: [String: Any]) in\n  \
  \    completion(resultDict)\n    }\n  }\n\n  func getDoorStatus(completion: @escaping\
  \ (_ jsonDict: [String: Any]) -> Void) {\n    connectDoor { [weak self] (result:\
  \ [String: Any]) in\n      if (result[\"error\"] as? String) != nil {\n        return\
  \ completion(result)\n      } else {\n        guard let deviceBaseUrl = self?.deviceBaseUrl\
  \ else {\n          return completion([\"error\": \"Invalid device URL\"])\n   \
  \     }\n        self?.request(baseUrl: deviceBaseUrl,\n                      endpoint:\
  \ \"door/status\",\n                      httpMethod: \"GET\") { (resultDict: [String:\
  \ Any]) in\n          completion(resultDict)\n        }\n      }\n    }\n  }\n\n\
  \  func connectDoor(completion: @escaping (_ jsonDict: [String: Any]) -> Void) {\n\
  \    request(baseUrl: deviceBaseUrl, endpoint: \"door/connect\",\n            httpMethod:\
  \ \"POST\") {\n      (resultDict: [String: Any]) in\n      completion(resultDict)\n\
  \    }\n  }\n\n  func disconnectDoor(completion: @escaping (_ jsonDict: [String:\
  \ Any]) -> Void) {\n    request(baseUrl: deviceBaseUrl, endpoint: \"door/disconnect\"\
  ,\n            httpMethod: \"POST\") {\n      (resultDict: [String: Any]) in\n \
  \     completion(resultDict)\n    }\n  }\n}\n```\n\n**代码清单 9-11** 扩展 `NetworkManager`\
  \ 类以支持多个基础 URL 和 URL 参数\n\n在此示例中，我没有使用 `for` 循环来构建 `URLQueryItem` 对象数组，而是使用了新的 `compactMap()`\
  \ 方法。这个 API 借鉴自函数式编程语言（如 Haskell），并且最近作为一种基于迭代集合进行计算的方式越来越流行。\n\n现在网络管理器已准备好处理你的新需求，你可以向网络管理器添加一个\
  \ `getOutdoorTemperature()` 方法，以便在应用的主视图控制器中发起请求并处理响应，如代码清单 9-12 所示。\n\n\n\n```swift\n\
  class NetworkManager: NSObject, URLSessionDelegate {\n...\nfunc getOutdoorTemperature(latitude:\
  \ String, longitude:\nString, completion: @escaping (_ jsonDict: [String: Any])\n\
  -> Void) {\nlet parameters = [\"appid\": opmApiKey,\n\"lat\": latitude,\n\"lon\"\
  : longitude,\n\"units\": \"metric\"]\nrequest(baseUrl: opmBaseUrl, endpoint: \"\
  weather\",\nhttpMethod: \"GET\", parameters: parameters) {\n(resultDict: [String:\
  \ Any]) in\ncompletion(resultDict)\n}\n}\nclass ViewController: UIViewController\
  \ {\n...\n@IBAction func fetchNetworkData() {\n....\nfetchOutdoorTemperature()\n\
  }\n...\nfunc fetchOutdoorTemperature() {\nguard let latitude =\nlastSavedLocation?.coordinate.latitude,\n\
  let longitude =\nlastSavedLocation?.coordinate.longitude else {\nreturn\n}\nNetworkManager.shared.getOutdoorTemperature(latitude:\n\
  \"\\(latitude)\", longitude: \"\\(longitude)\") { [weak\nself] (resultDict: [String:\
  \ Any]) in\nif let error = resultDict[\"error\"] as? String {\nself?.tipLabel?.text\
  \ = \"Error: \\(error)\"\n} else {\nguard let mainDict = resultDict[\"main\"] as?\n\
  [String: Any] else {\nself?.tipLabel?.text = \"Error: Invalid\nresponse\"\nreturn\n\
  }\nif let humidity = mainDict[\"humidity\"] {\nself?.outdoorHumidityLabel?.text\
  \ =\n\"Humidity \\(humidity)%\"\n}\nif let temperature = mainDict[\"temp\"] {\n\
  self?.outdoorTempLabel?.text =\n\"\\(temperature) C\"\n}\n}\n}\n}\n}\nextension\
  \ ViewController : CLLocationManagerDelegate {\n...\nfunc locationManager(_ manager:\n\
  CLLocationManager, didUpdateLocations\nlocations: [CLLocation]) {\nlastSavedLocation\
  \ = locations.first\nfetchOutdoorTemperature()\n}\n}\n代码清单 9-12\n使用网络管理器请求当前天气状况\n\
  ```\n\n为了使体验更加流畅，我在确认当前位置时，与其他网络请求一起添加了请求室外天气状况的调用。由于确认用户位置可能需要几秒钟，因此在位置委托中的调用将使你能够在用户首次加载应用时显示有效数据。\n\
  \nOpenWeatherMap 提供了一个免费端点（`/forecast`）和一个付费端点（`/forecast/daily`）用于获取每日预报。付费端点使用起来更方便，但为了扩大本书的受众范围，我将介绍如何使用免费端点。`/forecast`\
  \ 端点的 API 文档可在 [`https://openweathermap.org/forecast5`](https://openweathermap.org/forecast5)\
  \ 获取。在代码清单 9-13 中，我扩展了网络管理器，增加了一个调用 `/forecast` 端点的方法。这里没有什么特别之处；它与 `/weather` 端点非常相似。\n\
  \n```swift\nclass NetworkManager: NSObject, URLSessionDelegate {\n...\nfunc getForecast(latitude:\
  \ String, longitude: String,\ncompletion: @escaping (_ jsonDict: [String: Any])\
  \ ->\nVoid) {\nlet parameters = [\"appid\": opmApiKey,\n\"lat\": latitude,\n\"lon\"\
  : longitude,\n\"units\": \"metric\"]\nrequest(baseUrl: opmBaseUrl, endpoint: \"\
  forecast\",\nhttpMethod: \"GET\", parameters: parameters) {\n(resultDict: [String:\
  \ Any]) in\ncompletion(resultDict)\n}\n}\n}\n代码清单 9-13\n添加从 OpenWeatherMap 请求预报的方法\n\
  ```\n\n该响应提供五天的每日预报，每三小时为一个数据块。在每个数据块的记录中，你可以找到人类可读的天气状况描述（例如：晴）以及从最低温度到气压的详细统计数据。在代码清单\
  \ 9-14 中，我提供了其中一个响应的极其简化的示例。\n\n```json\n{\n\"cod\": \"200\",\n\"message\": 0.1654,\n\
  \"cnt\": 38,\n\"list\": [{\n\"dt\": 1535781600,\n\"main\": {\n\"temp\": 287.67,\n\
  \"temp_min\": 287.67,\n\"temp_max\": 288.554,\n\"pressure\": 1019.41,\n...\n},\n\
  \"weather\": [{\n\"id\": 800,\n\"main\": \"Clear\",\n\"description\": \"clear sky\"\
  ,\n\"icon\": \"01n\"\n}],\n...\n}],\n\"city\": {\n\"id\": 5391959,\n\"name\": \"\
  Tokyo\",\n...\n}\n}\n代码清单 9-14\nOpenWeatherMap 预报端点的示例响应\n```\n\n不幸的是，这个 API 比 `/weather`\
  \ 端点复杂得多。每个三小时数据块的数据都位于字典数组中。可想而知，你必须遍历这些子字典才能提取所需的值（`list`、`main`、`weather`）。一种常见的方法是嵌套使用\
  \ `guard-let` 语句。\n\n要获得准确的平均最高温和最低温，你需要对每天的结果进行平均。然而，为了演示 API 的使用，我将对此进行简化，并使用间隔\
  \ 24 小时的三个样本。在代码清单 9-15 中，我扩展了视图控制器，使其包含对预报的请求。\n\n```swift\nclass ViewController:\
  \ UIViewController {\n...\nfunc fetchOutdoorTemperature() {\n...\nNetworkManager.shared.getForecast(latitude:\n\
  \"\\(latitude)\", longitude: \"\\(longitude)\") {\n[weak self] (resultDict: [String:\
  \ Any]) in\nif let error = resultDict[\"error\"] as? String {\nself?.tipLabel?.text\
  \ = \"Error: \\(error)\"\n} else {\nguard let resultList = resultDict[\"list\"]\n\
  as? [Any] else {\nself?.tipLabel?.text = \"Error: Invalid\nresponse\"\nreturn\n\
  }\nguard resultList.count > 15 else { return }\n//今天\nself?.setupForecastView(dictionary:\n\
  resultList[0], index: 0)\n//明天\nself?.setupForecastView(dictionary:\nresultList[7],\
  \ index: 1)\n//后天\nself?.setupForecastView(dictionary:\nresultList[15], index: 2)\n\
  }\n}\n}\n}\n代码清单 9-15\n从视图控制器请求预报\n```\n\n我将处理请求并将其映射到视图的逻辑放在了 `setupForecastView(dictionary:index:)`\
  \ 方法中，该方法见代码清单 9-16。\n\n```swift\nclass ViewController: UIViewController {\n...\n\
  func setupForecastView(dictionary: Any, index: Int) {\nguard let dayDict = dictionary\
  \ as? [String: Any],\nlet mainDict = dayDict[\"main\"] as? [String: Any],\nlet weatherArray\
  \ = dayDict[\"weather\"] as? [Any],\nlet weatherDict = weatherArray.first as? [String:\n\
  Any],\nlet minTemp = mainDict[\"temp_min\"] as? Double,\nlet maxTemp = mainDict[\"\
  temp_max\"] as? Double,\nlet conditionCode = weatherDict[\"id\"] as? Int\nelse {\
  \ return }\nlet icon: FontAwesome\nswitch conditionCode {\ncase 300...599: icon\
  \ = .umbrella\ncase 600...699: icon = .snowflake\ncase 700...799: icon = .exclamationTriangle\n\
  case 800: icon = .sun\ndefault: icon = .cloud\n}\nswitch index {\ncase 0:\nguard\
  \ let imageView = firstDayImageView else { return }\nfirstDayLabel?.text = \"\\\
  (maxTemp) / \\(minTemp)\"\nfirstDayImageView?.image =\nUIImage.fontAwesomeIcon(name:\
  \ icon, style:\n.solid, textColor: UIColor.black, size:\nimageView.bounds.size)\n\
  case 1:\nguard let imageView = secondDayImageView else {\nreturn }\nsecondDayLabel?.text\
  \ = \"\\(maxTemp) / \\(minTemp)\"\nsecondDayImageView?.image =\nUIImage.fontAwesomeIcon(name:\
  \ icon, style: .solid,\ntextColor: UIColor.black, size: imageView.bounds.size)\n\
  default:\nguard let imageView = thirdDayImageView else {\nreturn }\nthirdDayLabel?.text\
  \ = \"\\(maxTemp) / \\(minTemp)\"\nthirdDayImageView?.image =\nUIImage.fontAwesomeIcon(name:\
  \ icon, style:\n.solid, textColor: UIColor.black, size:\nimageView.bounds.size)\n\
  }\n}\n代码清单 9-16\n在视图控制器中处理预报请求\n```\n\n这个方法包含大量逻辑，用于从每个数据块的字典中提取嵌套值并将其映射到用户界面。不幸的是，这是许多大数据\
  \ API 中常见的设计缺陷。如果可能，请将这次经历作为倡导在后端项目中设计简单的网络 API 响应的机会。\n\n\n\n## 处理 Siri Remote\
  \ 的触控输入\n\n在开发 IOTHomeTV 应用的最后一个步骤中，你应该充分利用 Apple TV 的主要人机交互设备——Siri Remote。每台 Apple\
  \ TV 都随附了一台遥控器；不过，第四代 Apple TV 引入了 Siri Remote，它配备了一个用于应用类手势的触控板，以及一个用于接收 Siri 语音命令的麦克风。在本节中，我将重点介绍如何接收来自遥控器的按钮和触控板点击输入，以刷新应用中的数据。\n\
  \n首先，你可以实现按钮按下功能。每台 Apple TV 的基本交互界面都依赖于使用方向键在项目间移动，使用播放/暂停键导航到项目的详情页面，以及使用菜单键退出项目。对于\
  \ IOTHomeTV，自然的交互方式就是使用播放/暂停键来刷新应用中的数据。\n\n你可以使用 `UITapGestureRecognizer` 类在 tvOS\
  \ 上实现按钮按下支持。如果你已经在 iOS 上实现过自定义手势识别器（例如，在不使用 `UIButton` 或 `UIPageController` 的情况下使视图可滑动或可点击），那么你应该已经熟悉了\
  \ `UITapGestureRecognizer` 类及其父类 `UIGestureRecognizer`。它们在 tvOS 上的实现方式基本相同。手势识别器的工作原理是：你指定一个要观察的手势（例如，点击、触摸、滑动、捏合），指定一个观察这些事件的视图，以及一个在这些事件被识别时调用的选择器（方法签名）。你可以通过实例化一个单一用途的\
  \ `UIGestureRecognizer` 子类（例如 `UITapGestureRecognizer` 或 `UISwipeGestureRecognizer`）来指定事件。`UIGestureRecognizer`\
  \ 是一个抽象类，不能直接实例化。\n\n要实现播放/暂停按钮的处理程序，请实例化一个 `UITapGestureRecognizer` 对象。如清单 9-17\
  \ 所示，通过创建带有其方法签名的选择器，将 `fetchNetworkData()` 方法指定为点击事件的处理程序。与 iOS 相同，使用 `UIView`\
  \ 类的 `addGestureRecognizer()` 方法将手势附加到视图控制器的主视图。与 iOS 不同的是，你可以使用 `allowedPressTypes`\
  \ 属性将按钮按下操作限制为仅播放/暂停按钮。\n\n```\nclass ViewController: UIViewController {\n...\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\n...\nsetupGestureHandlers()\n\
  }\nfunc setupGestureHandlers() {\nlet tapRecognizer = UITapGestureRecognizer(target:\n\
  self, action:\n#selector(ViewController.fetchNetworkData))\ntapRecognizer.allowedPressTypes\
  \ = [NSNumber(value:\nUIPressType.playPause.rawValue)]\nself.view.addGestureRecognizer(tapRecognizer)\n\
  }\n}\n清单 9-17\n添加播放/暂停按钮手势识别器\n```\n\n要测试手势识别器，请运行 Apple TV 模拟器。如图 9-17 所示，在 Hardware\
  \ 菜单下，选择 Show Apple TV Remote。点击屏幕上的遥控器，并通过显示数据的更新或断点来验证 `fetchNetworkData()` 方法是否被调用。\n\
  \n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig17_HTML.jpg](img/346879_2_En_9_Fig17_HTML.jpg)\n\
  \n图 9-17\n\n在 Apple TV 模拟器中使用屏幕遥控器\n\n在 tvOS 中实现触控板点击利用了 iOS 中的另一个概念——按下事件 (press\
  \ events)。然而，它们的实现方式与手势识别器不同。`UIViewController` 的子类对于由任何触摸或按下事件触发的 `UITouch` 和 `UIPress`\
  \ 事件有默认的处理方法。要添加触控板点击支持，请重写按下完成时的默认委托方法 `pressesEnded(presses:with Event:)`，并仅在选择\
  \ (Select) 事件被识别时插入对刷新网络数据的调用，如清单 9-18 所示。\n\n```\nclass ViewController: UIViewController\
  \ {\n...\noverride func pressesEnded(_ presses: Set, with\nevent: UIPressesEvent?)\
  \ {\nfor pressEvent in presses {\nif pressEvent.type == .select {\nfetchNetworkData()\n\
  }\n}\n}\n}\n清单 9-18\n添加触控板点击支持\n```\n\n要测试触控板点击事件，请再次打开 Apple TV 模拟器。按住键盘上的 Option\
  \ 键以在模拟器中启用触控板支持，然后再次点击触控板内部。此时，对 `fetchNetworkData()` 的调用应该会被触发。\n\n## 在 Apple\
  \ TV 上调试应用\n\n在完全开发了 IOTHomeTV 应用并通过 Apple TV 模拟器验证其工作正常后，完善你的 tvOS 开发之旅只剩下最后一步：在\
  \ Apple TV 硬件上运行应用。与 iOS 设备类似，从 Xcode 9 开始，如果你拥有有效的 Apple 开发者帐户，你可以连接到 Apple TV，并通过你的家庭或办公室网络连接，从你的\
  \ Mac 对其进行无线调试。\n\n首先，请验证你的 Mac 和 Apple TV 已连接到同一无线网络。接下来，在 Apple TV 上打开“设置”应用。如图\
  \ 9-18 所示，选择“遥控器与设备”，然后选择“遥控器 App 与设备”。如果你已通过“遥控器”应用将 Apple TV 与 iPhone 或 iPad 配对，它应该会显示在此屏幕上；否则，该屏幕应为空。\n\
  \n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig18_HTML.jpg](img/346879_2_En_9_Fig18_HTML.jpg)\n\
  \n图 9-18\n\n准备将 Apple TV 与 Mac 配对\n\n让“遥控器 App 与设备”屏幕在 Apple TV 上保持打开状态，然后打开 Xcode。在\
  \ Xcode 中，单击 Window 菜单，然后选择 Devices and Simulators。在 Devices and Simulators 窗口中，你应该能看到一个\
  \ Apple TV 的图标和一个包含你 Apple TV 名称的“配对”按钮。如图 9-19 所示，点击此按钮后，将出现一个身份验证对话框，要求你输入 Apple\
  \ TV 上显示的身份识别码。输入此代码，然后按“连接”。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig19_HTML.jpg](img/346879_2_En_9_Fig19_HTML.jpg)\n\
  \n图 9-19\n\n从 Mac 配对一个 Apple TV\n\n配对过程成功完成后，Devices and Simulators 窗口将更新，显示关于你\
  \ Apple TV 的统计信息，如图 9-20 所示。\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig20_HTML.jpg](img/346879_2_En_9_Fig20_HTML.jpg)\n\
  \n图 9-20\n\n确认与 Apple TV 配对成功\n\n等待几分钟，让 Xcode 下载设备的调试符号后，你将可以从 Xcode 中“运行”按钮旁边的目标选择菜单中，选择你的\
  \ Apple TV 作为调试目标，如图 9-21 所示。首次连接设备时，你还会被提示将其添加到你的 Apple Developer Program 账户中。在弹出的窗口中确认此操作，以完成设备设置过程。\n\
  \n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig21_HTML.jpg](img/346879_2_En_9_Fig21_HTML.jpg)\n\
  \n图 9-21\n\n选择 Apple TV 作为调试目标\n\n此时，你可以按下“运行”按钮在设备上运行应用，并且应该能够访问你在 iOS 设备上习惯使用的调试功能，包括断点和堆栈检查。恭喜你构建并运行了你的第一个\
  \ Apple TV 应用！\n\n\n\n"
- '# 总结


  在本章中，你学习了如何运用 iOS 编程知识，为 `IOTHome` 硬件创建一个 tvOS 仪表板应用。尽管不得不为 tvOS 做出一些特殊处理，但其开发流程和可用的
  API 与 iOS 中的对应部分非常相似。通过将 tvOS 应用作为目标添加到 `IOTHome` 项目中，你甚至能够与 iOS 应用共享代码，包括 `Network
  Manager`。为了让应用锦上添花，你还学习了如何为视图应用视觉效果，使用 `Font Awesome` 实现基于字体的图标，以及使用 `OpenWeatherMap.org`
  获取公共天气数据。


  构建这款应用的过程充满乐趣，同时也让你有机会让 `IOTHome` 传感器的数据对用户更有用、更易于访问。在为部署物联网传感器和大数据的公司提供咨询时，我反复遇到的最大挑战是如何利用所有已生成的数据。通过向用户展示其数据的可视化效果，并补充其他有用的关联信息，你得以减少使用硬件的障碍，并提升其对用户的价值。通过打造改善用户生活质量的系统，你可以帮助物联网设备从“玩具”转变为“工具”。


  '
- "# 10. 使用 watchOS 构建 Apple Watch 应用\n\n从 1940 年代迪克·特雷西的手表电话，到如今极受欢迎的 *《辐射》* 游戏系列中的哔哔小子，将手表作为腕上信息设备的想法，早在\
  \ 2015 年苹果发布 Apple Watch 之前就已深入人心。从 20 世纪 80 年代开始，卡西欧和 Radio Shack 等消费电子公司便率先迈出一步，通过为数字手表添加计算器、FM\
  \ 收音机和通讯录功能，推出了初代智能手表。这一趋势贯穿了 90 年代和 2000 年代，智能手表开始具备越来越多的联网功能，例如蜂窝电话通话和 PC 数据同步。然而，作为一个在新千年初期以修表为第一份兼职工作的人，我可以告诉你，那时我见过的唯一一款智能手表，是我们店里陈列多年却从未售出的那款带摄像头的表。当时市面上能买到的智能手表并不吸引人，原因在于其高昂的售价、华而不实的功能以及平庸的设计。\n\
  \n这一切在 2012 年开始改变，当时 Pebble 推出了他们的 Pebble 智能手表。它并非普通数字手表底部粘上一个计算器，而是一款支持蓝牙、使用 E\
  \ Ink 屏幕显示时间以及手机通知的计时设备。锦上添花的是，你可以使用 Pebble 的软件开发工具包制作自己的表盘和功能完备的应用。它迅速成为众筹网站 Kickstarter\
  \ 上融资最多的项目，并促使谷歌、苹果和三星（以及其他众多公司）开始认真对待联网手表。\n\n2015 年，苹果终于发布了 Apple Watch，并配有自己的\
  \ watchOS 软件开发工具包和 App Store。许多人预测这将是苹果的下一个巨大市场，并会像 iPhone 在 2007 年彻底改变智能手机市场那样，迅速主导智能手表市场。截至撰写本书时的\
  \ 2018 年，Apple Watch 确实实现了成为第一智能手表的预言；然而，这是一个漫长而缓慢的消耗过程。尽管在功能上它们大多相似，但 Apple Watch\
  \ 提供了 Pebble 所没有的更高制造质量、全彩屏幕以及健康传感器。与 Android Wear 相比，Apple Watch 拥有更热情的用户群体，以及提供供需关系以持续改进平台的硬件制造商。\n\
  \n最重要的是，Apple Watch 通过进入主流意识并服务于之前服务不足的市场，才得以成为第一智能手表。尽管该平台并未达到智能手机的普及程度，但它在医疗保健、服务行业和健身社区中已被证明极受欢迎，因为它能在智能手机不适用或不切实际的环境中，以非侵入式的方式提供简短信息片段。我知道，当我在东京拥挤的地铁上时，没有我的\
  \ Apple Watch 我会感到无所适从。在这些方面，Apple Watch 是一个真正的物联网成功故事。\n\n在本章中，你将学习如何利用 Apple Watch，构建能够与你的\
  \ iOS 应用协同运行的应用。与第 9 章的 tvOS 项目类似，你将把第 1-4 章的 `IOTFit` 健身应用拿来，为其添加一个 watchOS 目标，使用户能够查看过去的锻炼历史并创建新的锻炼。你将移植\
  \ iOS 应用中的运动（加速计）和位置追踪功能，以便在 watchOS 应用中生成所有相同的数据。作为额外的好处，你还将利用 iOS 项目中的 `HealthKit`\
  \ 存储，它会在用户的手表和手机之间自动同步数据。\n\n## 学习目标\n\n在本章中，通过构建 `IOTFit` 健身追踪应用的 watchOS 版本，你将学习物联网应用开发的以下关键概念：\n\
  \n- 向 iOS 项目添加 watchOS 目标\n- 在 watchOS 应用上构建基于表格的用户界面\n- 为 watchOS 应用添加 Force Touch\
  \ 支持\n- 在 watchOS 上使用 Core Motion、Core Location 和 HealthKit\n- 在 watchOS 中填充表格视图\n\
  \n与 tvOS 类似，watchOS 基于 iOS 的开发原则和框架提供了一个精简版的开发环境。从 watchOS 2.0 开始，苹果开始向开发者开放更多此类框架，使\
  \ Apple Watch 应用可以在不依赖 iPhone 或互联网连接的情况下运行。虽然这最初是为了提高设备性能，但它是帮助巩固该平台在上述市场中被采纳的关键因素之一。`IOTFit`\
  \ watchOS 应用能够在未与 iPhone 配对的情况下运行，除非用户需要在首次加载应用时启用权限。正如引言所述，应用中的所有数据都将存储在 `HealthKit`\
  \ 中，苹果会在用户的手表和其 iPhone 之间自动同步这些数据。\n\n与 tvOS 不同，由于 watchOS 的内存和处理能力有限，许多此类框架被精简为智能手表用例所需的核心功能。对于大多数框架来说，这表现为可用的\
  \ API 子集更小。然而，在用户界面开发方面，代价相当显著。你将无法使用完整的 `UIView` 子类和 Auto Layout，而必须学习如何使用堆栈视图以及功能更有限的\
  \ `WKInterface*` 类。在本章中，我将同时关注这两点，并特别注意如何让堆栈视图服务于实用的用户界面，以及如何实现基于 `WKInterfaceTable`\
  \ 的表格视图，其实现概念与 iOS 上的 `UITableView` 类有很大不同。\n\n本章内容主要基于第 1-4 章中的 `IOTFit` 健身应用。如果你对\
  \ Xcode 中的用户界面开发仍感生疏，我强烈建议你回顾第 1 章。如果你想复习在 iOS 中实现位置服务和健康 API 的细节，我强烈建议你回顾第 2-4\
  \ 章。\n\n\n\n### 设置项目\n\n与第 9 章中的 tvOS 项目一样，在本章中，你将通过向第 4 章中应用的最后一个迭代版本添加一个新目标，来实现\
  \ `IOTFit` 项目的 watchOS 版本。首先，复制你已完成的项目，或者从本书的官方 GitHub 仓库（[`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)）下载一份新副本。\n\
  \n当向 iOS 项目添加 watchOS 目标时，你不仅能够与 iOS 应用共享代码，而且该 watchOS 目标将在 App Store 中标记为 Apple\
  \ Watch 版本。如图 10-1 所示，当 iOS 应用在 App Store 中提供了 watchOS 版本时，用户会在 App Store 描述页面上看到一个链接，该链接会显示\
  \ watchOS 版本的信息，并提供与 iOS 版本一起自动安装的选项。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig1_HTML.jpg](img/346879_2_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1** 提供 watchOS 版本的 iOS 应用的 App Store 描述页面\n\n准备好原始项目的副本后，进入 `File` 菜单，选择\
  \ **New ➤ Target**，操作方式与第 9 章中添加 tvOS 目标时完全相同。在弹出的模板选择窗口中，选择 **WatchKit App**，如图\
  \ 10-2 所示。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig2_HTML.jpg](img/346879_2_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2** 选择 WatchKit 应用模板\n\n当被要求配置目标时，将其命名为 `IOTFitWatch`。如图 10-3 所示，确认产品设置为使用开发者账户的凭据进行构建，并且**不勾选**“**Include\
  \ Notification Scene**”和“**Include Complication**”复选框。就本项目范围而言，你无需启用这两个选项。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig3_HTML.jpg](img/346879_2_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3** 配置 watchOS 目标\n\n首次向项目添加 watchOS 目标时，系统会要求你激活其目标，如图 10-4 所示。选择 **Activate**\
  \ 以关闭弹出窗口，然后继续设置流程。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig4_HTML.jpg](img/346879_2_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4** 激活 watchOS 应用的方案\n\n完成目标的设置后，你的项目中应包含两个新文件夹：`IOTFitWatch` 和 `IOTFitWatch\
  \ Extension`，如图 10-5 所示。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig5_HTML.jpg](img/346879_2_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5** 包含 watchOS 目标后的 `IOTFit` 项目\n\n自 watchOS 1.0 起，Apple 便将 watchOS 应用分为两部分：一个仅包含静态资源（Storyboard、素材）的应用，以及一个包含代码的扩展。在\
  \ watchOS 1.0 中，Apple 并未在手表硬件上公开 watchOS 框架，而是由 iOS 应用利用该扩展来更新 WatchKit 应用组件所指定的视图。如今，这两部分都在手表硬件上运行，但\
  \ Apple 仍保留了这种逻辑分离模式。\n\n接下来，你必须为 watchOS 应用需要使用的权限受限功能（用户位置、HealthKit 和 Core Motion）设置描述。最简单的方法是将\
  \ iOS 项目 `Info.plist` 文件中的隐私描述键值对复制到 `IOTFitWatch Extension` 文件夹的 `Info.plist` 文件中。你需要复制的键值对已作为代码提供在列表\
  \ 10-1 中。你可以对 `Info.plist` 文件使用二次点击（右键单击）选项 **Open As ➤ Source Code**，以文本形式将其复制到文件中，也可以在属性列表检查器中查找\
  \ `Privacy...` 键值对并手动添加。\n\n```\nWKCompanionAppBundleIdentifier\ncom.devAtelier.IOTFit\n\
  ...\nNSHealthShareUsageDescription\nIOTFit 希望使用 HealthKit 权限来导入锻炼数据\nNSHealthUpdateUsageDescription\n\
  IOTFit 希望使用 HealthKit 权限来将锻炼数据导出到“健康”应用\nNSLocationAlwaysAndWhenInUseUsageDescription\n\
  IOTFit 希望使用位置权限在锻炼期间绘制你的位置信息\nNSLocationAlwaysUsageDescription\nIOTFit 希望使用位置权限在锻炼期间绘制你的位置信息\n\
  NSLocationUsageDescription\nIOTFit 希望使用位置权限在锻炼期间绘制你的位置信息\nNSLocationWhenInUseUsageDescription\n\
  IOTFit 希望使用位置权限在锻炼期间绘制你的位置信息\nNSMotionUsageDescription\nIOTFit 希望使用运动权限来帮助你测量锻炼过程中的步数和海拔\n\
  ```\n\n**列表 10-1** `IOTFitWatch Extension` 的 `Info.plist` 文件中的隐私权限描述键值对\n\n在设置流程的最后一步，你必须为\
  \ WatchKit App 启用后台模式，以便追踪用户的位置。如图 10-6 所示，在项目导航器顶部选择 `IOTFit` 项目文件，然后导航到 `IOTFitWatch\
  \ Extension` 目标，并点击 **Capabilities** 选项卡。在“功能”详情界面中，启用 **Background Modes** 和 **Workout\
  \ Processing**。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig6_HTML.jpg](img/346879_2_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6** 为 `IOTFitWatch` 应用启用后台模式\n\n\n\n## 构建 watchOS 用户界面\n\n现在 watchOS 目标已经配置完成，你可以开始搭建用户界面了。在这个项目中，我将\
  \ IOTFit 应用适配到了 Apple Watch 的尺寸，如图 10-7 所示。由于大多数用户在移动中或无法使用手机时才会与 Apple Watch 交互，因此你的界面设计应便于快速查看应用中最常用的信息，同时也要能轻松地在应用中创建新记录。\n\
  \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig7_HTML.jpg](img/346879_2_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7\n\nIOTFitWatch 应用的设计线框图\n\n在 IOTFitWatch 应用中，我在主屏幕上展示了用户的锻炼历史记录，并提供了一个上下文菜单，用户可以通过它启动详情屏幕来记录新的锻炼。用户可以在锻炼屏幕上通过用力按压（重按）来调出上下文菜单。锻炼历史和记录锻炼屏幕会显示用户的活动类型，以帮助其识别不同的锻炼。\n\
  \n要开始开发用户界面，请打开 `IOTFitWatch` 文件夹下的 `Interface.storyboard` 文件。如图 10-8 所示，你会看到一个故事板，其中包含了应用中第一个视图控制器（`InterfaceController.swift`）的空白界面。\n\
  \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig8_HTML.jpg](img/346879_2_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8\n\nIOTFitWatch 项目的初始故事板（`Interface.storyboard`）\n\n首先，布置锻炼历史记录屏幕。与 iOS\
  \ 或 tvOS 应用类似，从对象库中将一个表格对象拖拽到视图控制器上，如图 10-9 所示。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig9_HTML.jpg](img/346879_2_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9\n\n向记录锻炼视图控制器添加表格\n\n如果你已升级到 Xcode 10，你的用户界面可能默认隐藏了对象库。要在 Xcode 10 中打开对象库，请点击\
  \ Xcode 右上角的库按钮（带 iPhone Home 按钮图标的那个），它位于 Interface Builder 中切换侧边栏的选项旁边，如图 10-10\
  \ 所示。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig10_HTML.jpg](img/346879_2_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10\n\n在 Xcode 10 中找到对象库\n\n接下来，你需要配置表格视图单元格（在 watchOS 中称为*表格行*）的高度。如图 10-11\
  \ 所示，点击表格行，然后在属性检查器（Interface Builder 的右侧详细面板）中，点击高度下拉菜单，选择“固定”。这将使所有行的高度保持一致。在我的实现中，我选择了\
  \ 50 像素作为高度。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig11_HTML.jpg](img/346879_2_En_10_Fig11_HTML.jpg)\n\
  \n图 10-11\n\n配置表格行的单元格高度\n\n正如本章开头提到的，watchOS 仅继承 iOS 一小部分功能的一个副作用是：你必须使用堆栈视图来布局用户界面。堆栈视图管理一个容器视图，并根据一些配置参数（例如等高度、等间距）在容器中垂直或水平排列每个项目。为了实现图\
  \ 10-7 中的用户界面（左侧是一张图片，右侧是两个垂直对齐的标签），你需要嵌套堆栈视图。父级堆栈视图将被配置为水平堆叠项目，并包含图像视图以及用于标签的堆栈视图。而用于标签的堆栈视图则会被配置为垂直堆叠项目。\n\
  \n\n\n### 实现 Stack Views 并配置 WatchKit 界面\n\n要开始实现 Stack Views，从对象库中拖动一个`Group`到表格行上，如图\
  \ 10-12 所示。这些组一开始会比 Apple Watch 的宽度更宽。要解决这个问题，点击每个组的右边缘并调整其大小，使图像视图的组小于标签的组。\n\n\
  ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig12_HTML.jpg](img/346879_2_En_10_Fig12_HTML.jpg)\n\
  \n**图 10-12** 向表格行添加额外的组\n\n接下来，从对象库中拖动`Image`和`Label`项到视图控制器上。您的表格行应该看起来像我图 10-13\
  \ 中的实现。尽管图像视图显示正确，但标签需要调整。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig13_HTML.jpg](img/346879_2_En_10_Fig13_HTML.jpg)\n\
  \n**图 10-13** 使用默认 Stack View 配置的表格行\n\n要修复标签的布局，您必须配置 Stack View 使用垂直布局。如图 10-14\
  \ 所示，选择该组，然后在\"Layout\"下拉菜单中选择\"Vertical\"。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig14_HTML.jpg](img/346879_2_En_10_Fig14_HTML.jpg)\n\
  \n**图 10-14** 为 Stack View 配置垂直布局\n\n要配置视图的字体大小、标签文本或其他选项，请选择该视图并使用 Attributes 检查器中的下拉菜单进行调整，如图\
  \ 10-15 所示。将顶部标签的字体大小修改为\"Subhead\"后，您的表格行现在应该与原始设计中指定的样式匹配。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig15_HTML.jpg](img/346879_2_En_10_Fig15_HTML.jpg)\n\
  \n**图 10-15** 为 Stack View 配置文本大小和颜色\n\n完成 Workout History 视图控制器的布局后，您可以布局 Workout\
  \ Detail 视图控制器。使用对象库，将`Interface Controller`拖到故事板上，将其单个组配置为使用垂直布局，然后将`Label`和`Button`项拖到该组上。在配置视图之前，您的布局应该看起来类似于我图\
  \ 10-16 中的结果。您可以使用左侧高亮显示的视图层次结构来帮助确定是否将子视图正确分配给了 Stack View 或普通的`UIView`。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig16_HTML.jpg](img/346879_2_En_10_Fig16_HTML.jpg)\n\
  \n**图 10-16** 具有初始子视图安排的 Record Workout 视图控制器\n\n配置文本大小、对齐方式和颜色后，您的最终故事板应该看起来类似于我图\
  \ 10-17 中的实现。我将所有视图设置为使用`Body`或`Headline`文本样式并居中对齐。我将按钮的`color`属性设置为红色和蓝色，以使按钮更容易区分。\n\
  \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig17_HTML.jpg](img/346879_2_En_10_Fig17_HTML.jpg)\n\
  \n**图 10-17** IOTFitWatch 项目的最终故事板布局\n\n正如您在 iOS 应用中所做的那样，要完成 watchOS 项目的用户界面设置，您必须将故事板连接到您的界面控制器（视图控制器）类。由于它的布局更直接，先从\
  \ Record Workout 界面控制器类开始。点击项目导航器中的`IOTFitWatch Extension`文件夹，然后从右键菜单中选择\"New File\"\
  。如图 10-18 所示，从模板选择器弹出窗口中导航到\"watchOS\"，然后选择\"WatchKit Class\"。这相当于为 iOS 项目选择 Cocoa\
  \ Touch 类模板。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig18_HTML.jpg](img/346879_2_En_10_Fig18_HTML.jpg)\n\
  \n**图 10-18** 从文件模板窗口创建 WatchKit 类\n\n当被要求选择父类时，输入\"WKInterfaceController\"。输入`RecordInterfaceController`作为类名。使用列表\
  \ 10-2 中的示例作为类的内容。每个用户界面项都由一个`@IBOutlet`属性表示。与 iOS 应用不同，所有元素都是`WKInterface`类。\n\n\
  ```\nclass RecordInterfaceController: WKInterfaceController {\n    @IBOutlet var\
  \ timerLabel: WKInterfaceLabel?\n    @IBOutlet var workoutLabel: WKInterfaceLabel?\n\
  \    @IBOutlet var progressLabel: WKInterfaceLabel?\n    @IBOutlet var toggleButton:\
  \ WKInterfaceButton?\n    @IBOutlet var exitButton: WKInterfaceButton?\n\n    override\
  \ func willActivate() {\n        super.willActivate()\n    }\n\n    override func\
  \ didDeactivate() {\n        super.didDeactivate()\n    }\n}\n```\n\n**列表 10-2**\
  \ Record Interface Controller 类定义（`RecordInterfaceController.swift`）\n\n与 iOS 应用相同的方式，要将故事板连接到`RecordInterfaceController`类，您必须将其设置为父类。如图\
  \ 10-19 所示，在故事板上选择 Interface Controller，然后导航到 Identity Inspector（带有 ID 卡图标的标签页），并在`Class`文本字段中输入`RecordInterfaceController`。\n\
  \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig19_HTML.jpg](img/346879_2_En_10_Fig19_HTML.jpg)\n\
  \n**图 10-19** 设置 watchOS Interface Controller 的所属关系\n\n就像 iOS 故事板一样，从 Attributes\
  \ 检查器将连接拖放到 Interface Controller 中的元素上，以完成连接过程，如图 10-20 所示。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig20_HTML.jpg](img/346879_2_En_10_Fig20_HTML.jpg)\n\
  \n**图 10-20** 将 Outlets 连接到 Interface Controller 元素\n\n\n\n### 使用 `WKInterfaceTable`\
  \ 类设置表格视图\n\n由于表格视图的存在，锻炼历史界面控制器的设置过程更为复杂。首先，修改默认 `InterfaceController` 类的定义，为表格视图添加插座变量，如代码清单\
  \ 10-3 所示。更新定义后，在 Interface Builder 中连接该插座变量。\n\n```\nclass InterfaceController:\
  \ WKInterfaceController {\n@IBOutlet var workoutTable: WKInterfaceTable?\n...\n\
  }\n代码清单 10-3\n锻炼历史界面控制器类定义（InterfaceController.swift）\n```\n\n接下来，必须创建一个类来定义每一行表格，在\
  \ watchOS 术语中称之为*行控制器*。与 iOS 上可以使用 `UITableViewCell` 作为父类的表格视图单元格不同，watchOS 并没有为表格行定义父类。因此，你必须使用\
  \ `NSObject` 来定义一个同时兼容 Swift 和 Objective-C 的通用对象。除此之外，余下的设置过程就很简单了：你只需将用户界面元素作为新类的属性包含进来即可。在代码清单\
  \ 10-4 中，我将表格行定义为 `WorkoutRowController` 类。该定义包含了图片视图和标签的属性。在 `IOTFitWatch Extension`\
  \ 目标中添加一个名为 `WorkoutRowController.swift` 的新文件来存放这个类。\n\n```\nimport WatchKit\nclass\
  \ WorkoutRowController: NSObject {\n@IBOutlet var icon: WKInterfaceImage?\n@IBOutlet\
  \ var dateLabel: WKInterfaceLabel?\n@IBOutlet var durationLabel: WKInterfaceLabel?\n\
  }\n代码清单 10-4\n锻炼行控制器类定义（WorkoutRowController.swift）\n```\n\n接着，返回 Interface Builder\
  \ 并选择表格行。如图 10-21 所示，首先点击属性检查器（右侧窗格的倒数第二个标签页），为该行设置一个标识符。记下这个标识符，稍后在为表格填充数据时会用到。\n\
  \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig21_HTML.jpg](img/346879_2_En_10_Fig21_HTML.jpg)\n\
  \n图 10-21\n\n设置行控制器的标识符\n\n设置完标识符后，点击身份检查器（第三个标签页），以同样的方式将类设置为 `WorkoutRowController`，就像你之前将\
  \ `WorkoutInterfaceController` 与其定义关联起来一样。如果操作成功，你应该能在连接检查器（最后一个标签页）中看到行控制器的属性，并成功将它们连接到故事板，如图\
  \ 10-22 所示。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig22_HTML.jpg](img/346879_2_En_10_Fig22_HTML.jpg)\n\
  \n图 10-22\n\n将输出口连接到行控制器\n\n### 添加 Force Touch 支持\n\n作为用户界面拼图的最后一块，你将学习如何使用 Force\
  \ Touch 来显示一个上下文菜单，以启动向“记录锻炼”界面控制器的跳转。虽然你也可以像在 iOS 应用中那样使用 Segue，但使用 Force Touch\
  \ 能为 Apple Watch 提供更原生的体验。*Force Touch*（在 iPhone 上则称为 3D Touch）是苹果公司用来描述其触摸板压力敏感度的术语，最早从\
  \ iPhone 6S 开始，后来发展到 MacBook Pro 和 Apple Watch。这些设备支持两种触摸事件：*浅按*，即普通的触摸事件，用于选择项目；以及*深按*，即在屏幕上长按用力按压，用于调出上下文菜单。\n\
  \n你可以通过向界面控制器添加上下文菜单，在 watchOS 应用中启用 Force Touch。要向界面控制器添加上下文菜单，从对象库中拖拽一个 `Menu`\
  \ 对象并放到目标界面控制器上。如图 10-23 所示，在向锻炼历史界面控制器添加上下文菜单后，该菜单会被添加到其视图层级中。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig23_HTML.jpg](img/346879_2_En_10_Fig23_HTML.jpg)\n\
  \n图 10-23\n\n添加并配置上下文菜单\n\n默认情况下，上下文菜单会包含一个菜单项。对于 IOTFitWatch 应用，你只需要一个“添加”按钮，用于呈现“记录锻炼”界面控制器。要自定义该菜单项，从视图层级中选择它，然后使用属性检查器设置标题和图标。在我的实现中，我选择了“添加”图标，并将菜单项命名为“新建锻炼”。\n\
  \n为了启用向“记录锻炼”界面控制器的跳转，或根据菜单选择执行其他任何操作，你必须声明一个带有 `@IBAction` 关键字的方法，以表明该方法应能被 Interface\
  \ Builder 发现。在代码清单 10-5 中，我添加了一个名为 `presentRecordInterface()` 的方法来处理跳转。\n\n```\n\
  class InterfaceController: WKInterfaceController {\n@IBOutlet var workoutTable:\
  \ WKInterfaceTable?\n...\n@IBAction func presentRecordInterface() {\npresentController(withName:\n\
  \"RecordInterfaceController\", context: nil)\n}\n}\n代码清单 10-5\n添加用于呈现记录锻炼界面的方法（InterfaceController.swift）\n\
  ```\n\nwatchOS 提供了一个 `presentController(withName:context:)` 方法，用于从一个界面控制器呈现另一个界面控制器，类似于\
  \ iOS 上的 `present(animated:completion:)` 方法。要在 watchOS 上使用此方法，你必须为目标界面控制器提供 `Identifier`\
  \ 字符串和一个上下文对象，该对象可用于在两个界面控制器之间共享数据。在之前的设置步骤中，虽然你为“记录锻炼”界面控制器设置了类，但并未设置标识符。要添加标识符，请选择“记录锻炼”界面控制器，然后导航到属性检查器，如图\
  \ 10-24 所示。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig24_HTML.jpg](img/346879_2_En_10_Fig24_HTML.jpg)\n\
  \n图 10-24\n\n为界面控制器添加标识符字符串\n\n现在，`presentRecordInterface()` 方法的所有前提条件都已满足，你可以将其连接到故事板了。要执行此操作，请在视图层级中选择菜单项，导航到连接检查器，然后从\
  \ selector 项拖拽出一条连接线到“记录锻炼”界面控制器。如图 10-25 所示，`presentRecordInterface()` 方法签名应显示为一个可选项。\n\
  \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig25_HTML.jpg](img/346879_2_En_10_Fig25_HTML.jpg)\n\
  \n图 10-25\n\n\n\n### 将选择器连接到接口控制器中的方法\n\n要测试上下文菜单，请从 Xcode 中运行按钮旁边的菜单中选择一个与 Apple\
  \ Watch 模拟器配对的 iOS 模拟器（例如，`iPhone 8 Plus + Apple Watch Series 3`）。虽然手表的“锻炼历史”屏幕最初是空的，如图\
  \ 10-26 所示，但您可以在 Mac 的触控板上执行深按操作，以在模拟器中调出上下文菜单。或者，您可以通过进入“硬件”菜单并选择“触控压力” ➤ “深按”，在模拟器中启用深按操作。\n\
  \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig26_HTML.jpg](img/346879_2_En_10_Fig26_HTML.jpg)\n\
  \n**图 10-26：** 从 Apple Watch 模拟器调试上下文菜单\n\n要关闭“记录锻炼”接口控制器，请创建一个`exit()`函数，如代码清单\
