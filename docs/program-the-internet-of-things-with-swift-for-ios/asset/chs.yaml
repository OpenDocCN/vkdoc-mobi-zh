  要运行 ESP32 安装脚本，请先关闭 Arduino IDE，然后打开一个终端窗口。在终端窗口中，输入清单 5-1 中的命令。该命令将创建一个新目录，从 `git`
  检出代码，并运行安装脚本。


  ```

  mkdir -p ~/arduino && \

  cd ~/arduino && \

  git clone https://github.com/espressif/arduino-esp32.git esp32 && \

  cd esp32 && \

  git submodule update --init --recursive && \

  cd tools && \

  python get.py

