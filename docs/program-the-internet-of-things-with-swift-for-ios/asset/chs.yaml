  ## 使用 GPIO 监控输入引脚并控制输出引脚


  现在 Arduino IDE 已设置完毕，可以开始编写 Arduino 代码了！门传感器的 Arduino 解决方案可以分为两个部分：监控硬件和通过蓝牙传输结果。在本节中，你将专注于硬件监控代码，因为你可以通过监控
  Arduino IDE 的调试控制台并目视检查电路中的 LED 来调试这部分代码。


  要开始编写新的 Arduino 解决方案，请转到 `File` 菜单并选择 `New`。你将看到一个空的解决方案文件，其中包含两个存根方法：`setup()`
  和 `loop()`。顾名思义，Arduino 解决方案具有简单的架构：`setup()` 方法中的逻辑在设备通电后立即执行，而 `loop()` 方法中的逻辑会重复执行，直到设备断电。初始的
  Arduino 解决方案应类似于清单 5-2。


  ```

  void setup() {

  // put your setup code here, to run once:

  }

  void loop() {

  // put your main code here, to run repeatedly:

  }

  ```

  *清单 5-2 初始的空 Arduino 解决方案*


  在 Arduino 中使用 GPIO 是直接明了的操作。在 `setup()` 方法中，指定引脚号以及该引脚是用于输入还是输出。用于指定此功能的 API 是 `pinMode()`。在清单
  5-3 中，我更新了解决方案以进行这些调用。为了帮助管理代码，我使用 `#define` 关键字将引脚号定义为编译器宏。如果你熟悉 Objective-C，你会认出这个关键字，因为它在
  Objective-C 中用于相同的目的。这些引脚号与你之前在“组装硬件”一节中组装电路时使用的引脚号匹配。


  ```

  #define RED_LED_PIN 14

  #define BLUE_LED_PIN 15

  #define SWITCH_PIN 32

  void setup() {

  pinMode(RED_LED_PIN, OUTPUT);

  pinMode(BLUE_LED_PIN, OUTPUT);

  pinMode(SWITCH_PIN, INPUT);

  }

  void loop() {

  // put your main code here, to run repeatedly:

  }

  ```

  *清单 5-3 在 Arduino 解决方案中设置 GPIO 引脚模式*


  在清单 5-3 中，我将 `BLUE_LED` 和 `RED_LED` 引脚设置为输出，并将 `DOOR_SENSOR` 引脚设置为输入。现在，是时候利用它们了。要与
  Arduino 上的 GPIO 引脚交互，可以使用 `DigitalRead()` 和 `DigitalWrite()` API。顾名思义，它们用于向数字引脚读取或写入值。在本程序的介绍性部分，你将根据磁性传感器是相互接触（门关闭）还是未接触（门打开）来打开或关闭
  `RED_LED`。因为我在 GPIO 引脚和地之间设计了一个下拉电阻，所以当门打开时开关将读取为 OFF，门关闭时读取为 ON。在清单 5-4 中，我更新了
  `loop()` 方法以包含此逻辑。为了更准确地读取磁性开关的值，我使用 `delay()` API 在 `loop()` 方法的末尾添加了 1 秒（1000
  毫秒）的延迟。


  ```

  #define RED_LED_PIN 14

  #define BLUE_LED_PIN 15

  #define SWITCH_PIN 32

  void setup() {

  pinMode(RED_LED_PIN, OUTPUT);

  pinMode(BLUE_LED_PIN, OUTPUT);

  pinMode(SWITCH_PIN, INPUT);

  Serial.begin(9600);

  Serial.println(" Program start");

  }

  void loop() {

  checkSwitch();

  delay(1000);

  }

  void checkSwitch() {

  int currentState = digitalRead(SWITCH_PIN);

  if (currentState != switchState) {

  updateLockBLE(currentState);

  }

  switchState = currentState;

  digitalWrite(LED_PIN, switchState);

  Serial.print("Switch state: ");

  Serial.println(switchState);

  }

  ```

  *清单 5-4 根据 GPIO 状态打开或关闭 LED*


  在下一章中，你将使用蓝色 LED 来指示蓝牙连接是否已建立。


  ## 计算电池状态


  HUZZAH32 最便捷的特性之一是，其内置的电池端口允许你使用廉价的锂聚合物（LiPo）电池为其供电，并在通过 USB 为 HUZZAH32 供电时为其充电。然而，为了帮助用户充分利用设备，通过配套应用传输电池的充电水平是明智的做法。幸运的是，我们可以利用
  ADC 的强大功能来读取电池电量并通过蓝牙进行传输。


  就像软件开发人员一样，硬件开发人员经常发现自己需要调整设计以适应所面临的限制。就 HUZZAH32 而言，其设计者通过允许某些引脚具有多种功能，能够在设备中集成更多功能。为了读取电池电量，你可以利用他们在引脚
  35（ADC #13）上的工程设计智慧。当此引脚未连接任何东西时，你可以使用它来读取所连接电池电压恰好一半的值。HUZZAH32 上的 ADC 引脚的工作方式与
  iOS 代码中的 RGB 值类似，你可以从中读取或写入 12 位的电平。这允许你微调电机的速度，或者像本示例中必须做的那样，从引脚读取非二进制值。为了准确计算电池电量，将
  ADC 输出值除以 4095（2¹² - 1），以找出电池电量（相对于最大值）的百分比，然后将此结果乘以 2，再乘以 1.1（ADC 引脚的参考电压）和 3.3（HUZZAH32
  输出的参考电压）。如果你想将电池电量报告为百分比，请将此数字除以 4.2，这是可以连接到芯片的 LiPo 电池的最大可能电压。在清单 5-5 中，我修改了 Arduino
  解决方案以包含这些计算。现在，我将输出值显示在 Arduino IDE 控制台上。在下一章中，你将学习如何通过低功耗蓝牙对其进行传输。


  ```

  #define RED_LED_PIN 14

  #define BLUE_LED_PIN 15

  #define SWITCH_PIN 32

  #define BATTERY_PIN 35

  void setup() {

  pinMode(RED_LED_PIN, OUTPUT);

  pinMode(BLUE_LED_PIN, OUTPUT);

  pinMode(SWITCH_PIN, INPUT);

  pinMode(BATTERY_PIN, INPUT);

  Serial.begin(9600);

  Serial.println(" Program start");

  }

  void loop() {

  checkSwitch();

  checkBattery();

  delay(1000);

  }

  ...

  void checkBattery() {

  float currentLevel = analogRead(BATTERY_PIN);

  currentLevel = ((currentLevel / 4095) * 2 * 3.3 * 1.1)

  * 100 / 4.3;

  batteryLevel = currentLevel;

  Serial.print("Battery Level: ");

  Serial.print(t);

  Serial.println("%");

  }

  ```

  *清单 5-5 从 ADC 引脚 13 读取电池电量*




  ### 运行与监控 Arduino 解决方案


  现在 Arduino 硬件及其控制软件已经完成，只剩下最后一步：尝试运行程序，检查传感器是否正常工作——当磁传感器断开时打开开关，并定期报告所连接电池的电压水平。


  在编写 Arduino 解决方案时，你可能已经发现自己不断保存程序。如果喜欢冒险，你可能已经编译过几次，以检查代码是否有效。为了充分利用 Arduino IDE，请参考图
  5-18，了解其用户界面的更详细说明。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig18_HTML.jpg](img/346879_2_En_5_Fig18_HTML.jpg)


  图 5-18


  识别 Arduino IDE 中的运行按钮和串口监视器


  与 Xcode 不同，你会注意到 Arduino 有两个运行按钮——验证和上传。验证按钮仅执行编译，类似于 Xcode 中的 `Build` 命令，允许你检查代码是否编译通过并满足基本运行时要求，例如不超过目标设备的可用存储空间。上传按钮则编译解决方案并将其上传到目标设备的硬件。由于
  HUZZAH32 是一款兼容 Arduino 的设备，你之前安装的脚本将在此步骤中用于完成上传。在顶部栏的最右侧，你会找到串口监视器按钮。如果尚未打开，它会将
  UART 端口的输出添加到 IDE 底部的调试控制台窗格中。当编译器或设备准备好新消息时，它们将显示在此窗格中。


  要开始调试应用程序，请点击上传按钮。在串口控制台中，你应该会看到一系列显示上传进度的消息。上传成功后，你会看到开关和电池状态每秒输出一次（即 `loop()`
  方法中延迟的时长）。你还可以通过打开磁开关来点亮红色 LED。Arduino 解决方案在上传后会持续运行，因此你无需每次运行时都重新上传解决方案。只需为设备供电，`start()`
  和 `loop()` 方法便会立即开始执行。


  ### 编译故障排除


  在我成为 iOS 开发者之前，我曾从事嵌入式系统工作。整个过程中最令人沮丧且耗时的事情，总是让程序首次成功运行。以下是我在 Arduino 设备上运行解决方案时遇到的一些最常见问题。


  **电路工作正常，但串口控制台显示乱码字符。**


  串行通信仅在发送方和接收方以相同频率通信时才能正常工作（字面意义上的频率！）。要解决此问题，请验证串口监视器设置的值与你在 Arduino 解决方案中配置串口时使用的值一致。对于门磁监控器，你可以在串口初始化代码中找到它：


  ```

  Serial.begin(9600);

  ```


  **Arduino IDE 成功上传了解决方案，但我无法看到串口消息，也无法让开关工作。**


  这个问题令人沮丧，因为它阻止你验证程序的行为。根据我的经验，此错误通常有两个原因：


  1.  设备需要重置。这是一个简单的操作。只需在 HUZZAH32 芯片仍连接电源时按下其重置按钮即可。设备重新启动后，你应该会在串口监视器和电路上看到正确的输出。


  2.  在上传解决方案到 HUZZAH32 时，你必须按住重置按钮。在较旧的基于 ESP32 的开发板上，乐鑫要求编程期间将重置信号保持为低电平。如果硬件卡在无法重新编程设备或程序无法运行的状态，请尝试在上传操作期间全程按住设备的重置按钮。这应该能重新启用芯片的编程功能。


  **Arduino IDE 无法找到 HUZZAH32 的串口。**


  这是最难排查的问题。HUZZAH32 可能在一次编程会话中正常工作，然后突然无响应。根据我的经验，此问题通常由 OS X 上用于 HUZZAH32 的 USB
  转串口驱动程序引起，而非硬件本身。由于绝大多数现代计算机不再配备串口（RS-232）端口，设备制造商使用集成电路通过 USB 传输串行信号。因为需要此功能的用户群体相较于普通用户较小，驱动程序往往不稳定。要解决此问题，我建议重启你的
  Mac，然后在重启完成后尝试将 HUZZAH32 重新插入电脑。


  就像在 Xcode 上调试连接设备一样，一旦你能够识别连接问题的症状，解决起来就变得轻而易举了。


  ### 总结


  在本章中，你学习了如何使用 Arduino 制作你的第一个传感器。在硬件方面，你了解了面包板如何帮助你在无需焊接的情况下连接组件。除了用于稳定开关信号的下拉电阻外，组装电路的大部分工作就是将原理图中的连接点对应到面包板上。在软件方面，你了解到
  Arduino IDE 和 Arduino 解决方案的运行方式类似于简化版的 Swift 应用程序。你在 Arduino 解决方案中编写的大部分代码并非依赖 `UIKit`
  或其他 Apple 框架，而是利用了 HUZZAH32 芯片上的 GPIO 和 ADC 引脚。在 `setup()` 方法中，你配置了将要使用的每个引脚的角色和模式；然后在
  `loop()` 方法中，你读取数值并用它们来打开或关闭引脚，以控制硬件。在下一章中，你将扩展这个简单程序，通过低功耗蓝牙将这些数据传输到配套的 iOS 应用。


