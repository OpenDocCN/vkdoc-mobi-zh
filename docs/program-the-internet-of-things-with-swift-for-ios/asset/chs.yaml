  \ 文件进行交互。点击表格视图控制器，然后导航到身份检查器，在 **Class** 文本字段中输入 `WorkoutTableViewController` 来设置文件的所属关系，如图\
  \ 4-13 所示。\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig13_HTML.jpg](img/346879_2_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13 — 为表格视图控制器设置所属关系\n\n### 注意\n只有当你在项目中定义了一个基于你正在尝试使用的对象库模板（例如，表格视图控制器、按钮）的子类时，设置所属关系才有效。\n\
  \n在第 1 章和第 2 章中，你使用了输出口来将按钮处理程序连接到对象所属类中的方法。对于表格视图控制器，你必须执行类似的操作来标识 `UITableViewDataSource`\
  \ 和 `UITableViewDelegate` 委托对象。如图 4-14 所示，点击连接检查器，然后从 `dataSource` 和 `delegate`\
  \ 输出口拖拽连线到锻炼表格视图控制器。\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig14_HTML.jpg](img/346879_2_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14 — 为表格视图控制器设置委托输出口\n\n作为最后的连接步骤，你必须在锻炼表格视图控制器中为单元格模板设置一个标识符。基于此标识符，你可以在运行时查找单元格并修改其内容。如图\
  \ 4-15 所示，选择该单元格，然后导航到属性检查器，在 **Identifier** 文本字段中输入一个标题来设置该单元格的标识符。\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig15_HTML.jpg](img/346879_2_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15 — 为表格视图单元格设置标识符\n\n#### 使用 `UITableViewDataSource` 协议填充表格视图\n\n现在锻炼表格视图控制器已完全布局，你必须实现\
  \ `UITableViewDataSource` 协议的方法来填充表格视图。这些方法让你指定表格视图的行数、分区数、标题和编辑特性，例如是否希望用户能够重新排列表格中的单元格。对于\
  \ IOTFit 应用，你需要实现的方法集中在表格视图的分区数和行数上。大多数开发者用来实现此行为的模式是定义一个单一或多维数组来表示数据，并从中提取数据的层次结构。在代码清单\
  \ 4-11 中，我向 `WorkoutTableViewController` 类添加了 `workouts` 属性来保存锻炼数据，并使用该属性来确定 `numberOfSections()`\
  \ 和 `tableView(numberOfRowsInSection:)` 委托方法的值。Apple 的表格视图控制器模板为这些方法提供了空的实现（存根）。\n\
  \n```\nclass WorkoutTableViewController: UITableViewController {\n    var workouts:\
  \ [Workout]?\n\n    override func numberOfSections(in tableView: UITableView) ->\
  \ Int {\n        return 1\n    }\n\n    override func tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\n        return self.workouts?.count\
  \ ?? 0\n    }\n    ...\n}\n```\n\n代码清单 4-11 — 使用数组确定表格视图控制器中的行和分区\n\n尽管你在代码清单 4-11\
  \ 中指定了表格视图控制器的行数和分区数，但 `workouts` 属性在填充之前将为空。为此，你可以综合运用本章至今学到的所有知识，使用来自 Workout\
  \ Data Manager 的 `loadWorkoutsFromHealthKit()` 方法来填充 `workouts` 数组。在代码清单 4-12 中，我修改了\
  \ `WorkoutTableViewController` 类，覆盖了 `viewWillAppear()` 方法，并在其中调用方法加载数据。每当表格视图即将呈现时（例如从应用中的另一个标签切换过来），`viewWillAppear()`\
  \ 方法就会被调用，是检查更新的合适位置。\n\n```\nclass WorkoutTableViewController: UITableViewController\
  \ {\n    ...\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
  \n        WorkoutDataManager.sharedManager.loadWorkoutsFromHealthKit { [weak self]\
  \ (fetchedWorkouts: [Workout]?) in\n            if let fetchedWorkouts = fetchedWorkouts\
  \ {\n                self?.workouts = fetchedWorkouts\n                DispatchQueue.main.async\
  \ {\n                    self?.tableView?.reloadData()\n                }\n    \
  \        }\n        }\n    }\n    ...\n}\n```\n\n代码清单 4-12 — 触发表格视图控制器的更新\n\n在完成处理程序中，我调用了该类\
  \ `tableView` 属性上的 `reloadData()` 方法，以强制其重新加载数据。尽管数组已填充，但除非你明确要求，否则表格视图不会重新加载数据。\n\
  \n\n\n#### 使用 `UITableViewDelegate` 协议将数据映射到单元格\n\n为了在“Workout Table View Controller”上显示\
  \ `workouts` 数组中的数据，你必须实现 `UITableViewDelegate` 协议。该协议负责表格视图的显示和一般用户交互属性，例如每个单元格的高度、填充单元格内容的方法分配，以及用户选择单元格时应执行的操作。与\
  \ `UITableViewDataSource` 协议类似，对于 IOTFit 应用，你无需实现该协议提供的所有方法。为了填充 IOTFit 应用中的单元格，你将实现\
  \ `tableView(cellForRow:)` 方法。这允许在运行时使用分区和行号来确定单元格的显示。此外，每次重新加载表格视图时，都会为每个单元格调用此方法。\n\
  \n使用数组管理 Table View Controller 的数据的优势在于，它使数据映射变得极其简单。你可以简单地将行号与数组中的位置相关联。在代码清单 4-13\
  \ 中，我使用此逻辑实现了 `WorkoutTableViewController` 类的 `tableView(cellForRow:)` 方法。我使用 `workoutCell`\
  \ 标识符查找单元格模板，然后根据每个 `Workout` 项目中的值创建格式化字符串。\n\n```swift\nclass WorkoutTableViewController:\
  \ UITableViewController {\n...\nlet dateFormatter = DateFormatter()\n...\noverride\
