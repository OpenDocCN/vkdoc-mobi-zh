- "# Express 工作原理快速入门\n\nExpress 通过监听指定端口上的 HTTP 请求，然后根据特定的*端点*来响应这些请求。端点定义为可供 API\
  \ 使用者调用的函数，由*路由*（附加到服务器地址上的路径部分）以及用于发起请求的 HTTP 方法（例如 `GET`、`POST`）共同构成。在整个 Web 应用开发过程中，你会看到这两个术语经常互换使用。为了减少混淆，我认为最清晰的解释是：*端点*主要用于描述与服务器之间的外部（面向客户端）交互，而*路由*则主要用于描述\
  \ Express 应用程序的内部逻辑。\n\n例如，如果你想从 IP 地址为 `10.0.1.5` 的服务器获取电影标题列表，请求将是 `GET 10.0.1.5/movie/titles`。`GET`\
  \ 方法通常用于读取数据。在这个例子中，路由是 `/movie/titles`，而 `GET` 是端点。在 Express 中，这个端点的代码看起来像这样：\n\
  \n```\napp.get('/movie/titles', function (req, res) { ... }\n```\n\n另一方面，为新电影创建一条记录可能看起来像这样：`POST\
  \ 10.0.1.5/movie/new`。`POST` 方法通常用于添加新记录。在数据库编程中，术语 *CRUD* 用于描述任何类型数据的四种主要操作：创建、读取、更新和删除。许多后端开发人员喜欢使用相同的模型来命名他们的路由，他们会在路由后面附加\
  \ `/new`、`/delete` 或 `/update`，以表示这是一个创建、更新或删除操作。在 Express 中，这个端点的代码将是：\n\n```\n\
  app.post('/movie/now', function (req, res) { ... }\n```\n\n正如你所看到的，在 `app` 对象上调用的方法以及路由的字符串都发生了变化。\n\
  \n最后，另外两个最常用的 `HTTP` 方法是 `PUT` 和 `DELETE`，它们用于更新和删除记录。在本章中你不会用到它们，但它们在未来的个人项目中可能会对你有帮助。\n\
  \n默认情况下，当你在浏览器中加载一个网页时，浏览器会尝试向服务器文档根目录的 TCP 端口 80（为 HTTP 流量保留的端口）发起一个 `GET` 请求。要在\
  \ Express 中表示这一点，请在你的对象上使用 `get()` 方法，来指定应为根目录执行的代码。要让 Express 监听请求，请使用 `app` 对象上的\
  \ `listen()` 方法。路由和监听器的实现都显示在清单 8-3 中。\n\n```\nvar express = require('express');\n\
  var app = express();\napp.get('/', function (req, res) {\nres.send('Hello World');\n\
  });\napp.listen(3000);\n清单 8-3\n创建一个新的基于 Express 的 Node 应用程序\n```\n\n在这个例子中，我指示\
  \ Node 在收到对文档根目录的 `GET` 请求时发送文本 `Hello World`。`res` 对象内置于 Node 中，它指定了你希望以 HTTP 响应的形式输出内容。在这个例子中，我让\
  \ Express 监听端口 3000 而不是标准的 HTTP 端口 80，因为 Node 将端口 80 视为*特权*端口。除非你以 root 或系统用户帐户登录，否则无法通过此端口运行应用程序。在本节稍后部分，你将切换到端口\
  \ 80，但对于初始测试，最好使用非特权端口。\n\n要验证 Express 应用程序是否正常工作，你必须先告诉 Node 开始执行新脚本，然后尝试从 Web\
  \ 浏览器发起请求。\n\n在启动服务器之前，你必须获取树莓派的 IP 地址。在终端内部，使用 `ifconfig` 命令查看设备信息。如图 8-1 所示，IP\
  \ 地址将出现在 `inet` 字段旁边，位于 `wlan0` 接口（代表内置的 Wi-Fi 接口）的记录下方。\n\n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig1_HTML.jpg](img/346879_2_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\n获取树莓派的 IP 地址\n\n接下来，通过调用 `node` 命令并指定脚本的文件名，开始执行 Node 应用程序。\n\n```\n\
  node app.js\n```\n\n最后，在网络中的另一台计算机上打开你最喜欢的浏览器，输入树莓派的 URL，并附上端口号（3000）。你的 `\"Hello\
  \ World\"` 字符串应该以纯文本形式出现在浏览器中，如图 8-2 所示。\n\n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig2_HTML.jpg](img/346879_2_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\n在浏览器中验证 Hello World 示例\n\n恭喜你创建了第一个 Node 应用程序！它会持续运行，直到你在树莓派上终止 Node\
  \ 进程。\n\n\n\n### 从 DHT 温湿度传感器读取数值\n\n现在你已经掌握了添加 Node 模块和 Express 路由的方法，可以开始完善你的简单示例，通过\
  \ HTTP 来模拟温湿度传感器的状态。首先，在终端中输入`Ctrl+C`停止 Node.js，然后使用`npm`安装`node-dht-sensor`模块。\n\
  \n```\nnpm install node-dht-sensor\n```\n\n在我的示例中，我认为使用`temperature`路径扩展来表示温湿度传感器是合理的。如代码清单\
  \ 8-4 所示，在应用中引入`node-dht-sensor`模块，并为`temperature`路径扩展添加一个用于处理`GET`请求的路由和端点。\n\n\
  ```\nvar express = require('express');\nvar dht = require('node-dht-sensor');\n\
  var app = express();\napp.get('/temperature', function (req, res) {\n//你精妙的代码将放在这里\n\
  });\napp.listen(80);\n代码清单 8-4\n为温湿度传感器定义一个新路由\n```\n\n此时，我建议做两处修改：移除前面示例中的端点，并将端口改为\
  \ 80。许多 Web 服务器因调试端点未关闭而容易被入侵。警惕的代码维护是降低应用中此类风险的简易方法。使用端口 80 还能让你的服务器更符合 HTTP 规范，该规范规定\
  \ HTTP 流量在 TCP/IP 端口 80 上传输。\n\n接下来，你必须使用`node-dht-sensor`模块从传感器获取数据。查阅该模块在其 GitHub\
  \ 仓库（ [`https://github.com/momenso/node-dht-sensor`](https://github.com/momenso/node-dht-sensor)\
  \ ）中的文档，你将了解到可以通过调用`dht`对象上的`read()`方法来执行此操作，指定传感器类型（DHT22 为`22`，DHT11 为`11`）、数据线所连接的通用输入/输出（GPIO）引脚号，以及一个在读取完成时执行的回调函数。在我第\
  \ 7 章的示例中，为 DHT22 传感器使用了 GPIO 21。在代码清单 8-5 中，我扩展了示例，加入了从温湿度传感器读取数据的功能。\n\n```\n\
  var express = require('express');\nvar dht = require('node-dht-sensor');\nvar app\
  \ = express();\napp.get('/temperature', function (req, res) {\ndht.read(22, 21,\
  \ function(err, temperature, humidity) {\nres.type('json');\nif (!err) {\nres.json({\n\
  'temperature': temperature.toFixed(1),\n'humidity':  humidity.toFixed(1)\n});\n\
  } else {\nres.status(500).json({error: '无法访问传感器'});\n}\n});\n});\napp.listen(80);\n\
  代码清单 8-5\n从 Node 应用读取 DHT22 数据\n```\n\n在这个例子中，你会注意到我对`res`对象使用了`json()`方法来返回温湿度数据。虽然纯文本对于`Hello\
  \ World`示例已经足够，但使用 JSON（JavaScript 对象表示法）是在 Web 应用开发中表示字典和层级数据广泛采用的做法。此外，如今大多数 Web\
  \ 和移动框架都提供了内置的 JSON 验证和编码/解码功能，使其比自定义数据类型更容易使用。基于同样的逻辑，你会注意到我还使用了`status()`方法来将错误作为标准的\
  \ HTTP 500 服务器错误返回。这允许你利用内置的 HTTP 错误处理。\n\n接下来，你需要重启 Node 应用。终止现有进程，然后以超级用户权限再次运行脚本。\n\
  \n```\nsudo node app.js\n```\n\n#### 提示\n\n如果你希望 Node 应用在源代码更改时自动重启，我建议了解`nodemon`工具，它可通过`npm`和\
  \ GitHub（ [`https://github.com/remy/nodemon`](https://github.com/remy/nodemon) ）获取。虽然这个工具在开发阶段很方便，但我建议在生产环境中禁用它。\n\
  \n要验证新路由是否正常工作，请在 Web 浏览器中尝试加载它，方法是在旧 URL 后附加`/temperature`。你应该会收到一个包含 JSON 编码的温湿度数据的纯文本响应，如图\
  \ 8-3 所示。\n\n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig3_HTML.jpg](img/346879_2_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\n在浏览器中验证温湿度路由\n\n### 注意\n\nDHT22 温湿度传感器需要大约两秒钟才能获取准确的读数。如果在访问`temperature`路由时遇到数据陈旧或超时的情况，请记住这一点。\n\
  \n\n\n### 从蓝牙设备读取信息\n\n在上一节中，你通过 Node 应用直接读取温度传感器的数据，并使用 Express 进行响应，从而通过 HTTP\
  \ 公开了该数据。在本节中，你将通过 HTTP 公开蓝牙门传感器的数据，方法是让 Node 应用充当蓝牙中央管理器，并使用适用于 Node 的 `Noble`\
  \ 模块（[`https://github.com/noble/noble`](https://github.com/noble/noble)）。你可能还记得前几章的内容，蓝牙通信中风险最高且最耗时的部分之一就是发现设备并建立连接以接收数据。为了简化此操作，在本节中，你将添加用于管理连接状态的端点，并根据最后一次更新传输数据（而不是在每次请求数据时都建立新连接）。\n\
  \n首先，你必须使用 `npm` 包管理器将 `Noble` 添加到项目中。\n\n```\nnpm install noble\n```\n\n接下来，你必须修改\
  \ Node 应用，以包含 `Noble` 以及门传感器的蓝牙服务和特征 UUID，如代码清单 8-6 所示。与前几章的应用一样，你需要使用这些值来帮助识别设备及其数据通知。\n\
  \n```\nvar express = require('express');\nvar dht = require('node-dht-sensor');\n\
  var noble = require('noble');\nvar app = express();\nconst LOCK_SERVICE_UUID = \"\
  4fafc2011fb5459e8fccc5c9c331914b\";\nconst BATT_SERVICE_UUID = \"0af2d54c4d334fc79e34823b02c294d5\"\
  ;\nconst LOCK_CHARACTERISTIC_UUID = \"beb5483e36e14688b7f5ea07361b26a8\";\nconst\
  \ BATT_CHARACTERISTIC_UUID = \"134c298f7d6b4f6484968965e0851d03\";\n...\n代码清单 8-6\n\
  将 Noble 和蓝牙 UUID 添加到 Node 应用\n```\n\n请记住：这些 UUID 在第六章中定义为唯一的随机十六进制值，用于标识设备。与第六章的蓝牙应用以及第七章的\
  \ HomeBridge 配置一样，你需要这些值来查找和识别设备。由于这些值在应用执行期间不会改变，你可以使用 `const` 关键字将它们定义为常量。\n\n\
  与连接蓝牙或 I2C 等硬件协议类似，基于流程的 Web 服务器操作（例如创建新用户账户）通常要求客户端开发人员（例如移动应用开发人员、前端 Web 开发人员）遵循指定的\
  \ API 调用流程来完成操作。对于 IOTHome Node 应用，客户端开发人员必须先向 `/door/connect/` 端点 `POST` 请求，然后才能尝试从设备请求数据。同样，在他们完成会话后，必须向\
  \ `/door/disconnect/` 端点 `POST` 请求，以关闭连接并允许其他应用程序使用该硬件。\n\n在我的实现中，我决定从 Express 端点启动连接过程。在代码清单\
  \ 8-7 中，我扩展了 Node 应用，使其包含一个 `/door/connect/` 端点，该端点使用 `Noble` 扫描门传感器。在这个例子中，我还保存了对\
  \ Express 中 `response` 对象的引用，以便在建立蓝牙连接的同时完成 HTTP 请求。\n\n```\nvar response;\n...\n\
  app.post('/door/connect', function (req, res) {\nconsole.log(\"start connect\");\n\
  response = res;\nnoble.startScanning();\n});\n...\nnoble.on('discover', function(peripheral)\
  \ {\nconsole.log(\"discovered\");\nconsole.log(\"peripheral name \"+peripheral.id+\"\
  \ \"+peripheral.address + \" | \" + peripheral.advertisement.localName);\nvar advertisement\
  \ = peripheral.advertisement;\nif (PERIPHERAL_NAME == advertisement.localName) {\n\
  noble.stopScanning();\nconsole.log('peripheral with name ' +\nadvertisement.localName\
  \ + ' found');\nconsole.log('ready to connect');\n}\n});\n代码清单 8-7\n使用 Noble 发现蓝牙外设\n\
  ```\n\n连接的安排起初可能看起来有点奇怪。在门传感器的 Arduino 代码中，你必须实现完成处理程序来推进蓝牙服务器的连接流程。在 iOS 应用中，你必须实现委托方法。要使用\
  \ `Noble` 接收消息，你必须响应 `discover` 事件，这些事件是通过发起设备扫描触发的。要实现高效的蓝牙低功耗连接过程，你应该只扫描广播了你所需服务的设备。然而，在编写本文时，我注意到指定服务\
  \ UUID 的 `scan` API 的结果难以预测，因此，我决定改为根据设备广播数据中指定的名称来过滤已发现的设备。\n\n在确认设备在范围内后，你必须尝试连接它。在代码清单\
  \ 8-8 中，我扩展了应用以包含连接过程。就像在 iOS 上实现蓝牙中央管理器时一样，在找到设备后，你必须连接它并保存对其的引用，以便稍后可以断开连接。\n\n\
  ```\n...\nvar savedPeripheral;\n...\nnoble.on('discover', function(peripheral) {\n\
  console.log(\"discovered\");\nvar advertisement = peripheral.advertisement;\nif\
  \ (PERIPHERAL_NAME == advertisement.localName) {\nnoble.stopScanning();\nconsole.log('attempting\
  \ to connect');\nconnect(peripheral);\n}\n});\nfunction connect(peripheral) {\n\
  peripheral.connect(function(error) {\nif (error) {\nconsole.log('error = ' + error);\n\
  response.status(500).json({error: 'Could not\nfind sensor'});\n} else {\nconsole.log('connected');\n\
  response.json({'status': 'connected'});\nsavedPeripheral = peripheral;\n}\n});\n\
  }\n代码清单 8-8\n使用 Noble 连接蓝牙外设\n```\n\n连接过程的最后一步是，你必须找到要观察的数据的特征并设置其完成处理程序。在代码清单 8-9\
  \ 中，我调用了 `discoverAllServicesAndCharacteristics()` 方法，然后仅订阅与所需 UUID 匹配的特征的事件。\n\n\
  ```\nfunction connect(peripheral) {\nperipheral.connect(function(error) {\nif (error)\
  \ {\n...\n} else {\n...\ndiscoverServices();\n}\n});\n}\nfunction discoverServices()\
  \ {\nif (savedPeripheral) {\nsavedPeripheral.discoverAllServicesAndCharacteristics(\n\
  function(error, services,  characteristics) {\nif (error) {\nconsole.log('error\
  \  = ' + error);\n}\nconsole.log('services = ' + services);\nconsole.log('characteristics\
  \ = ' + characteristics);\nfor (characteristic in characteristics) {\nif (characteristic.uuid\
  \ ==\nLOCK_CHARACTERISTIC_UUID ||\ncharacteristic.uuid == BATT_CHARACTERISTIC_UUID)\
  \ {\nobserveCharacteristic(characteristic);\n}\n}\n});\n}\n}\nfunction observeCharacteristic(characteristic)\
  \ {\n//Fires when data comes in\ncharacteristic.on('data', (data, isNotification)\
  \ => {\nconsole.log('data: \"' + data + '\"');\nlastUpdateTime = date.getTime();\n\
  if (characteristic.uuid == BATT_CHARACTERISTIC_UUID) {\nbatteryStatus = data;\n\
  }\nif (characteristic.uuid == LOCK_CHARACTERISTIC_UUID) {\nlockStatus = data;\n\
  }\n});\n//Used to setup subscription\ncharacteristic.subscribe(error => {\nif (error)\
  \ {\nconsole.log('error setting up subscription = ' + error +\n'for uuid:' + characteristic.uuid);\n\
  } else {\nconsole.log('subscription successful for uuid:' +\ncharacteristic.uuid);\n\
  }\n});\n代码清单 8-9\n使用 Noble 观察和响应特征更新\n```\n\n订阅过程通过 `subscribe` 方法启动，但数据必须通过 `on`\
  \ 方法进行观察。由于让用户等待直到第一次更新传递是不切实际的，因此我将值保存到稍后可以查询的全局变量中。\n\n\n\n### 注意\n\n在研究本章内容时，我注意到树莓派上的蓝牙工具在进行多次连接调试后，会无法维持连接。如果你的门磁传感器无法通过其蓝色状态\
  \ LED 灯报告连接成功，请尝试重启树莓派，然后再次尝试。\n\n要使用 HTTP 暴露数据，请创建一个 `/door/status` 端点。当该端点被调用时，返回全局变量中保存的值，并将其包装在\
  \ JSON 字典中，如清单 8-10 所示。为了强制实施 API 的连接流程，如果设备连接尚未建立，则返回一个错误。\n\n```\napp.get('/door/status',\
  \ function (req, res) {\nconsole.log(\"开始连接\");\nif (savedPeripheral) {\nres.json({\n\
  'lockStatus': lockStatus,\n'batteryStatus': batteryStatus,\n'lastUpdateTime': lastUpdateTime\n\
  });\n} else {\nres.status(500).json({error: '未连接至传感器。请重新连接后重试。'});\n}\n});\n清单 8-10\n\
  使用 Noble 从蓝牙外设读取数据\n```\n\n为了完善 Node 应用程序，你必须创建 `/door/disconnect/` 端点。如清单 8-11\
  \ 所示，在我的实现中，当该端点被调用时，我会断开与设备的连接。为安全起见，我还会停止扫描 BLE 设备，以防在连接完全建立之前调用了此方法。\n\n```\n\
  app.post('/door/disconnect', function (req, res) {\nnoble.stopScanning();\nconsole.log(\"\
  停止扫描\");\nif (savedPeripheral) {\nconsole.log('已断开连接');\nsavedPeripheral.disconnect();\n\
  }\nres.json({\n'status': '已断开连接'\n});\n});\n清单 8-11\n使用 Noble 断开与蓝牙外设的连接\n```\n\n\
  在继续之前，你可能想知道如何测试基于 `POST` 的端点。对于此任务，我建议从 [`www.getpostman.com/`](http://www.getpostman.com/)\
  \ 下载 Postman OS X 应用程序。如图 8-4 所示，配置好请求后，只需单击“发送”按钮即可开始调试会话。请求的结果将出现在窗口底部的大文本字段中。你可以从窗口左侧的侧边栏访问历史请求列表（及其配置）。\n\
  \n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig4_HTML.jpg](img/346879_2_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n使用 Postman 验证 `POST` 请求\n\n### 使用 HTTPS 提供安全的 HTTP 连接\n\n为了提升用户数据的隐私性并减少互联网上的钓鱼（虚假身份）攻击，自\
  \ 2016 年起，苹果、谷歌及其他主要科技公司宣布其平台将主要转向支持实现 HTTPS 的服务器。HTTPS 是 HTTP 的扩展，要求所有数据都使用传输层安全性协议进行加密。TLS\
  \ 通过向服务器添加安全套接层证书来实现，该证书需由主流浏览器及你的平台（例如 iOS）所信任的提供商签发的 SSL 证书。\n\n在谷歌 Chrome 浏览器中，不使用\
  \ HTTPS 最明显的影响之一是，你的网站在谷歌搜索排名中会显示得更靠后。此外，带有不受信任 TLS 证书的网站将被标记为`不安全`，并在浏览器中加载时向用户显示警告页面。在\
  \ iOS 中，苹果通过使应用程序内的所有 HTTP 请求失败来强制执行 HTTPS，除非开发者手动重新启用它们。此外，所有不受信任的 HTTPS 请求也会失败。\n\
  \n为了解决这些限制并提高 IOTHome 设备的安全性，你应该扩展 Node 应用程序以支持 HTTPS。与该项目中的其他功能类似，你可以利用为 Web 应用程序开发的\
  \ Node 模块和工具，轻松地为 IOTHome 项目添加 HTTPS 支持。\n\n在你的项目中实现 HTTPS 主要有三种选择。\n\n1. 如果你为生产环境进行开发，你必须向受互联网工程任务组（即维护\
  \ HTTPS 标准的组织）信任的服务商请求 SSL 证书。我推荐使用 Comodo、Verisign，或来自亚马逊云服务的证书。这些提供商提供的证书兼容性最好，并附有清晰的说明和支持。\n\
  \n2. 如果你想开发一个生产级别的原型并且已拥有域名，你可以使用 Let’s Encrypt 信任机构（ [`www.letsencrypt.org`](http://www.letsencrypt.org)\
  \ ）及其配套工具 `certbot-auto` ( [`https://certbot.eff.org/docs/install.html`](https://certbot.eff.org/docs/install.html)\
  \ )，为测试生成免费的受信任 SSL 证书。\n\n3. 仅用于原型开发目的，你可以在树莓派上使用 OpenSSL 自行生成 SSL 证书。\n\n就本书而言，我选择了选项\
  \ #3。如果你想使用选项 #1 或 #2，我建议在你域名所关联的服务器上创建这些证书，然后将其复制到树莓派上（前提是你的 SSL 提供商允许此功能）。\n\n\
  \n\n### 生成 OpenSSL 自签名 SSL 证书\n\n使用 OpenSSL，您可以充当自己的信任提供者，生成满足 HTTPS 基本加密要求的 SSL\
  \ 证书。这被称为*自签名证书*。由于它不是由我上述提到的受信任供应商生成的，大多数浏览器和 iOS 最初会拒绝它，直到您执行一些步骤使其在设备上受信任，我将在您完成证书生成后对此进行说明。\n\
  \n如果您曾经创建过 Apple Developer Program iOS 开发证书或推送通知证书，那么您已经熟悉生成 SSL 证书的流程（尽管交付方式不同）。在\
  \ Apple 的模型中，您需要创建一个私钥（一个唯一的十六进制值，用作通信加密/解密的基础），使用`钥匙串访问`工具创建一个证书签名请求 (CSR) 文件，作为您申请新证书的凭证，然后将该\
  \ CSR 文件提交给 Apple 的网站，一旦您的请求被处理，该网站将刷新并提供一个新的 SSL 证书供您下载。\n\n使用 OpenSSL，您可以完全控制此流程，甚至可以导入现有的私钥或将\
  \ CSR 交给其他服务。不过，对于本项目，您将充当自己的证书颁发机构 (CA)，因此您不需要外部 CA；您只需创建一个私钥和一个证书即可。要在 OpenSSL\
  \ 中通过一条命令完成此操作，请输入以下命令：\n\n```\nopenssl req -x509 -nodes -days 365 -newkey rsa:2048\
  \ -keyout express.key -out express.crt\n```\n\n上述命令指定您要创建一个基于 RSA 2048 位加密的私钥，以及一个基于该密钥的证书，该证书有效期为\
  \ 365 天。与您的 iPhone 开发者证书一样，请确保保存好私钥，不要与他人分享。丢失密钥将导致无法使用该证书。分享密钥则会使他人能够破解您的加密。\n\n\
  现在您已经有了有效的 SSL 证书，可以开始在 Node 应用程序中使用它了。首先，将 `https` 和 `fs`（文件系统）模块添加到您的项目中，如清单 8-12\
  \ 所示。这些模块随标准 Node.js 发行版提供，无需任何额外的安装步骤。\n\n```\nvar express = require('express');\n\
  var dht = require('node-dht-sensor');\nvar fs = require('fs');\nvar https = require('https');\n\
  var app = express();\napp.get('/temperature', function (req, res) {\n...\n});\n\
  清单 8-12\n向 Node 项目添加 https 和 fs 模块\n```\n\n在本章前面部分，使用了 `app.listen(80)` 来指示 Express\
  \ 监听 80 端口上的 HTTP 流量。要使用 HTTPS 替代 HTTP，您必须禁用此行代码，转而指示一个 `https` 对象来监听流量。要初始化 `https`\
  \ 对象，您需要向其提供 SSL 证书及其在 Raspberry Pi 上的私钥路径。如果您使用 Let's Encrypt 生成这些文件，它们将位于 `certbot-auto`\
  \ 工具输出的文件夹下。如果您使用自己的供应商生成 SSL 证书，则必须将这些文件保存到 Raspberry Pi 上，可以通过 Pi 上的 Chromium\
  \ 浏览器下载，或者配置另一个工具（如 `avahi-daemon`）来帮助您的 Mac 通过 Bonjour 发现 Raspberry Pi。\n\n在确认了\
  \ SSL 证书和私钥的位置后，创建一个字典来存储文件路径，并初始化一个新的 `https` 对象，如清单 8-13 所示。\n\n```\nvar express\
  \ = require('express');\nvar dht = require('node-dht-sensor');\nvar fs = require('fs');\n\
  var https = require('https');\nvar app = express();\nvar sslOptions = {\nkey: fs.readFileSync('express.key'),\n\
  cert: fs.readFileSync('express.crt')\n}\nhttps.createServer(sslOptions, app);\n\
  https.listen(4443);\n//app.listen(80);\napp.get('/temperature', function (req, res)\
  \ {\n...\n});\n清单 8-13\n配置 Node 项目以使用 HTTPS 替代 HTTP\n```\n\n与之前的 HTTP 示例类似，对于首次\
  \ HTTPS 测试，我建议监听 4443 端口上的流量，而不是 HTTPS 的保护端口 443。要测试您的 SSL 配置是否成功，请终止旧的 Node 进程并重新加载应用程序的文件。如果加载\
  \ SSL 证书时出现问题，此时您将在终端中看到一条错误消息，类似于图 8-5 中的示例。由于这些都是成熟的技术，您可以根据这些错误消息找到大量数据，帮助您解决\
  \ OpenSSL 和 Node HTTPS 问题。\n\n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig5_HTML.jpg](img/346879_2_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5：Node HTTPS 配置失败的示例错误消息\n\n接下来，更改 `/temperature` 端点的 URL，使其包含端口号 4443 并将协议改为\
  \ `https`。尝试在浏览器中加载该 URL。如果您使用 Google Chrome，您将收到一个关于该页面不安全的的安全警告，类似于我在图 8-6 中收到的警告。\n\
  \n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig6_HTML.jpg](img/346879_2_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6：Google Chrome 针对包含不受信任 SSL 证书页面的警告\n\n要解决此错误，请点击页面底部的“高级”链接，然后点击“继续前往…”链接，如图\
  \ 8-7 所示。\n\n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig7_HTML.jpg](img/346879_2_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7：在 Google Chrome 中启用对页面的信任\n\n在确认要加载该页面后，您现在应该能够在浏览器中看到温度 JSON 数据，就像之前通过普通\
  \ HTTP 暴露该数据时一样。\n\n此时，您可以安全地将应用程序改为监听 443 端口。只需记住，您需要以超级用户身份运行 Node，并且您需要在 Chrome\
  \ 中信任 `:443` 端点。对于发往 443 端口的 HTTPS 请求，您无需在 iOS 或 Web 浏览器中追加端口号。\n\n要让 Postman 连接到自签名证书，请点击屏幕右上角的扳手图标，如图\
  \ 8-8 所示，然后将“SSL certificate verification”设置为 OFF。\n\n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig8_HTML.jpg](img/346879_2_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8：在 Postman 中信任自签名证书\n\n\n\n### 配置树莓派开机自启服务器\n\n作为搭建网络服务器的最后一步，你应该让 Node 应用在树莓派启动时自动运行。这样，每次你想通过\
  \ HTTPS 访问数据时，就无需手动启动和运行 Node 应用了。如果你在上章的 HomeBridge 项目中执行过此步骤，那么你对这个设置过程应该非常熟悉。你将使用\
  \ `systemd` 工具创建一个服务来管理此操作。不过，与 HomeBridge 不同，IOTHome 网络服务器作为服务来设置要简单得多。\n\n首先，你必须创建一个服务定义。使用你喜欢的文本编辑器在主目录下创建一个名为\
  \ `iothome.service` 的文件。在此文件中，你需要指定：\n\n-   服务名称\n-   作为服务运行的脚本的工作目录\n-   脚本的位置\n\
  -   脚本的用户权限\n-   脚本的失败行为\n\n在代码清单 8-14 中，我提供了该项目实现的服务定义文件。为了模拟开发环境，请注意用户设置为 `root`，并且工作目录设置为\
  \ `pi` 用户的 `sites/iothome` 文件夹。\n\n```\n[Service]\nWorkingDirectory=/home/pi/sites/iothome\n\
  ExecStart=node app.js\nRestart=always\nStandardOutput=syslog\nStandardError=syslog\n\
  SyslogIdentifier=iothome\nUser=root\nGroup=root\n[Install]\nWantedBy=multi-user.target\n\
  代码清单 8-14\nIOTHome Node 应用的服务定义\n```\n\n接下来，你需要将定义文件复制到 `systemd` 的默认目录，并为该文件启用读取和执行权限。\n\
  \n```\nsudo cp ~/iothome.service \\ /etc/systemd/system/iothome.service\nsudo chmod\
  \ u+rwx /etc/systemd/system/iothome.service\n```\n\n与 HomeBridge 服务一样，你必须使用 `systemctl`\
  \ 注册该服务。\n\n```\nsudo systemctl enable iothome\n```\n\n要启动服务，再次调用 `systemctl` 工具，这次使用\
  \ `start` 命令。\n\n```\nsudo systemctl start iothome\n```\n\n你的脚本现已设置为与树莓派一起重启！要确认操作是否成功，请重启你的树莓派，然后尝试从浏览器调用\
  \ `/temperature` 端点。要查看错误消息，请使用 `status` 命令调用 `systemctl` 工具。\n\n```\nsudo systemctl\
  \ status iothome\n```\n\n从现在开始，如果你需要修改服务定义或脚本本身，请在执行更改前停止服务，然后在完成后重新启动它。\n\n## 从\
  \ iOS App 连接到你的服务器\n\n至此，你可以使用树莓派上的网络服务器访问来自 IOTHome 系统的所有数据。你还学习了许多不同的调试连接工具，包括\
  \ Google Chrome、命令行和 Postman。然而，这是一本关于 iOS 的书，因此学习如何将这些技能应用于 iOS 应用是理所当然的。\n\n在本节中，你将扩展前几章的\
  \ IOTHome 应用，添加一个屏幕，允许用户通过 HTTP（而非蓝牙）访问系统中的传感器。虽然 Apple 平台的 UI 代码大多数情况下是一次性的，但网络代码可以在所有平台之间复用。在第\
  \ 9 章中，你将复用本章的网络代码，为 IOTHome 系统构建一个基于 Apple TV 的仪表盘。\n\n### 设置用户界面\n\n对于这个项目，用户界面扮演着支持网络代码的角色。因此，我不想过多关注为\
  \ Home Manager 屏幕（旨在显示整个系统数据的屏幕）创建新的用户界面。与 Door Manager 不同，它应该显示来自温度系统的信息，并连接到网络服务器（而非蓝牙）来检索数据。为此，你将继承\
  \ `DoorViewController` 类（Door Manager 屏幕的基础），添加用于显示温度的新属性，并重写 `connect()` 方法以发起对\
  \ HTTPS 网络服务器的调用，而不是蓝牙设备。\n\n对于用户界面，我在图 8-9 中提供了更新后的线框图。我使用了与 Door Manager 屏幕相同的基本布局，只是在门传感器信息上方添加了用于显示温度和湿度数据的新标签。我还更改了“更新”按钮的描述文本。\n\
  \n![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig9_HTML.jpg](img/346879_2_En_8_Fig9_HTML.jpg)\n\
