- "# 6. 构建低功耗蓝牙硬件配套应用\n\n在第 5 章中，你通过构建一个基于 Arduino 的无线门磁传感器，初步涉足了嵌入式系统的世界。在本章中，你将通过为门磁传感器开发基于低功耗蓝牙的配套应用，继续你的硬件工程之旅。低功耗蓝牙是一种极为流行的基于无线电的通信协议，与其他无线通信方式相比，它允许设备在长达\
  \ 77 米（约 250 英尺）的距离内以极低的能量需求进行通信（这就是低功耗蓝牙中“低功耗”的含义）。\n\n当今 iOS 开发的一大优点在于，Apple 的\
  \ Core Bluetooth 框架包含了让你的应用利用 iOS 设备内置蓝牙硬件与低功耗蓝牙设备通信（或作为低功耗蓝牙设备）所需的一切。除了简单地建立与设备的连接外，本章还将介绍一些改善用户蓝牙体验的最佳实践，例如保存已配对的设备以及将来自硬件的消息作为推送通知显示在用户的\
  \ iOS 设备上。与 iOS 中的许多事情一样，Apple 在其文档中提供了关于实现低功耗蓝牙协议栈的理论指导，但将澄清实现细节的责任留给了开发者。为了帮助填补这一知识空白，在本章中，我将分享过去对我而言最有效的方法。\n\
  \n\n\n\n## 学习目标\n\n在本章中，你将使用第 5 章搭建的门传感器，学习如何通过向现有 Arduino 程序添加蓝牙配对和数据传输功能，将其打造成完整的低功耗蓝牙解决方案，并构建一个\
  \ iOS 配套应用来监控该传感器。本章将启动一个新应用 `IOTHome`，你将在后续章节中持续迭代它。`IOTHome` 是一个物联网家居管理系统，最终将用于追踪多个物联网设备，并通过\
  \ HomeKit 为硬件提供安全且支持 Siri 的接口。作为介绍，图 6-1 展示了 `IOTHome` 应用首个迭代版本的设计线框。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig1_HTML.jpg](img/346879_2_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1  \n`IOTHome` 应用的设计线框\n\n为了简化迭代过程，你将再次采用基于标签视图控制器的设计，在应用的各个屏幕之间切换。本章中，你将专注于构建“门”标签，该标签允许用户连接到门传感硬件，并监控门的状态以及设备的电池电量。在构建这款\
  \ iPhone 配套应用的过程中，你将学习物联网应用开发的以下关键技能：\n\n*   低功耗蓝牙核心概念\n*   将 Arduino 作为蓝牙外设进行广播\n\
  *   通过蓝牙从 Arduino 发送数据更新\n*   在 iOS 上使用 Core Bluetooth 发现蓝牙设备\n*   在 iOS 上使用 Core\
  \ Bluetooth 监听设备更新\n*   在后台响应蓝牙更新\n\n本章将要求你在 Arduino IDE 和 Xcode 之间来回切换。如果你觉得需要回顾\
  \ Arduino 的知识，我建议重新学习第 5 章，并查看 Adafruit 的一些在线教程，网址为 [`https://learn.adafruit.com`](https://learn.adafruit.com)。\n\
  \n## 低功耗蓝牙快速入门\n\n为了方便你理解本章后续内容，我想先介绍一些与低功耗蓝牙相关的关键概念和术语。在本章中，你将在 Arduino 和 iOS 程序中实现低功耗蓝牙协议栈的不同方面，提前了解整体框架将有助于你更轻松地将各个组件整合起来。\n\
  \n蓝牙最初是由蓝牙技术联盟开发的短距离、低功耗无线通信协议。蓝牙技术联盟是一个由多家计算机硬件和电信公司成员运营的标准组织。它的设计目标从一开始就与 LTE\
  \ 或 Wi-Fi 不同，旨在实现计算机之间或计算机与外设之间的高效、短消息通信。低功耗蓝牙是蓝牙 4.0 规范的一部分，旨在提供功耗更低、成本更低的实现方案，同时不牺牲通信距离，也无需为支持蓝牙经典或低功耗蓝牙任一版本而采用截然不同的硬件。在实践中，苹果和许多其他智能手机制造商使用功耗更低、速度稍慢的低功耗蓝牙标准，与数据量需求小的外设（如物联网健康传感器或位置信标）通信；而使用功耗更高、吞吐量更大的蓝牙标准，与对延迟要求较低的设备（如手机耳机或扬声器）通信。\n\
  \n在实现蓝牙功能时，设备可以扮演两种明确定义的*角色*。*外设*是一种为其设备提供支持功能或数据的设备。你可以把蓝牙外设想象成个人计算机的外设。你连接到外设，它便提供主处理单元原先不具备的*服务*。蓝牙键盘或耳机就是充当*外设*的设备。设备可以扮演的另一种主要角色是*中心*设备，即连接并管理外设的设备。大多数情况下，当计算机或智能手机将音频发送到蓝牙耳机，或使用蓝牙键盘输入时，它就在扮演中心设备的角色。\n\
  \n蓝牙设备并不受硬件限制只能扮演一种角色。例如，在同一个应用中，你可以创建一种模式，使应用充当中心设备，同时创建另一种模式使应用充当外设（例如，如果你正在制作一个离线照片分享应用）。但在一次通信会话中，设备只会扮演一个角色。在本章中，Arduino\
  \ 将扮演外设，而 `IOTHome` 应用将扮演中心设备。\n\n如果你曾用 iPhone 连接过蓝牙外设，可能还记得过程是这样的：\n\n1.  扫描附近设备。\n\
  2.  点击列表中的设备尝试连接。\n3.  使用 PIN 码确认连接。\n4.  开始蓝牙通信。\n\n中心设备发现外设的方式是*扫描*（搜索）外设正在广播的*广播数据包*。类似于以太网数据包，这些是特殊的短消息，用于广播设备的名称、*服务*以及它提供的*特征*（数据类型）。与\
  \ iOS 上的配对方式类似，在大多数应用中，你将利用这些广播数据让用户选择他要连接的设备。一旦设备连接成功，就可以进行双向通信。为了在双方设备上节省电量，扫描和广播是由用户发起的操作，一旦连接建立就会停止。在本章中，Arduino\
  \ 一通电就会开始广播其服务，而 `IOTHome` 应用中的“连接”按钮将用于扫描并连接 Arduino。\n\n最后要提及的蓝牙概念是*规范*。服务和特征通过\
  \ 128 位的通用唯一标识符来标识。然而，对于心率监测器、耳机等重复出现的硬件，蓝牙技术联盟要求你使用这些设备通用的服务与特征 UUID 集合。这些被称为*规范*，通过利用中心设备对已知规范的优化，可以帮助你为用户提供更好的体验。例如，当你连接蓝牙耳机时，iOS\
  \ 会显示电池电量和耳机图标。`IOTHome` 应用的门传感器不属于任何预定义的规范，因此你将使用随机生成的 UUID 来标识它。\n\n\n\n## 为 Arduino\
  \ 解决方案添加蓝牙功能\n\n既然你对蓝牙有了更深入的了解，就可以开始在门磁传感器的 Arduino 解决方案（程序）中应用它了。要将门磁传感器配置为蓝牙外设，你需要在\
  \ Arduino 解决方案中执行以下操作：\n\n- 将设备设置为蓝牙服务器（外设），使其能够接受传入连接\n- 广播外设提供的服务和特征\n- 当磁簧开关状态或电池电量发生变化时，通过低功耗蓝牙发送数据更新\n\
  \n尽管低功耗蓝牙本身是一种高效的协议，但你可以在状态发生变化时（而非每秒）才推送更新，从而使实现更加高效。保持连接建立是一种低功耗操作，但通过它推送数据会产生能耗成本。减少通信将显著延长\
  \ Arduino 和 iOS 应用的电池续航时间。\n\n与 iOS 类似，Arduino 拥有由 Arduino 基金会提供的大量库以及用户社区开发的开源库。在本章中，你将使用\
  \ Neil Kolban 开发的 `ESP32_BLE_Arduino` 库来建立低功耗蓝牙服务器、处理传入连接并通过低功耗蓝牙推送更新。他的付出意味着你无需研究时序图或自行实现底层协议。你可以专注于如何在应用中使用蓝牙，而非如何构建它。此外，他的库还提供了针对基于\
  \ ESP32 的设备（例如本项目使用的 Adafruit HUZZAH32）的定制功能。尽管基于 ESP32 的设备在形态和可用功能上千差万别，但它们都使用来自乐鑫（Espressif）的同一款片上系统（SoC）。设备制造商（OEM）只需决定要使用哪些功能以及如何将它们暴露出来。\n\
  \n### 安装 `ESP32_BLE_Arduino` 库以实现蓝牙通信\n\n要使用 `ESP32_BLE_Arduino` 库，你首先必须将其导入 Arduino\
  \ IDE。导入后，你可以在其他项目中重复使用它，而无需重复导入步骤。首先，在浏览器中访问该库的 GitHub 页面：`https://github.com/nkolban/ESP32_BLE_Arduino`。要下载该库的最新版本，请点击右上角的\
  \ **Clone or download**（克隆或下载）按钮，如图 6-2 所示。你将看到 **Open in Desktop**（在桌面客户端中打开，通常如果电脑上安装了\
  \ GitHub 或 Sourcetree，会打开相应程序）或 **Download ZIP**（将文件以压缩包形式下载）两个选项。由于你只需将库中的部分文件导入\
  \ Arduino IDE，我建议选择 **Download ZIP**。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig2_HTML.jpg](img/346879_2_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2** 从 GitHub 下载仓库\n\n将仓库下载到电脑后，返回 Arduino IDE，进入 **Sketch**（项目）菜单。如图 6-3\
  \ 所示，选择 **Include Library**（加载库），然后选择 **Add .ZIP Library**（添加 .ZIP 库）。当文件浏览器窗口出现时，选择你刚刚下载的\
  \ zip 文件。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig3_HTML.jpg](img/346879_2_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3** 导入 zip 压缩包\n\n导入文件后，再次返回 **Sketch**（项目）菜单。如图 6-4 所示，再次选择 **Include Library**（加载库）。这次，你刚刚导入的库\
  \ **ESP32 BLE Arduino** 应该会出现在上下文菜单中。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig4_HTML.jpg](img/346879_2_En_6_Fig4_HTML.jpg)\n\
  \n**图 6-4** 在项目中包含 ESP32 BLE Arduino 库\n\n选择该库后，你会注意到解决方案的源代码已被修改，包含了该库中的部分文件，如代码清单\
  \ 6-1 所示。\n\n```\n#include \n#include \n#include \n#include \n#define RED_LED_PIN\
  \ 14\n...\nvoid setup() {\n  // put your setup code here, to run once:\n  Serial.begin(9600);\n\
  \  Serial.println(\" Program start\");\n  ...\n}\n...\n```\n\n**代码清单 6-1** 包含 ESP32\
  \ BLE 库后的 Arduino 解决方案\n\n对于本项目，你必须使用该库的蓝牙服务器和数据传输功能，而这些功能并未包含在默认导入的文件集中。请修改你的解决方案，如代码清单\
  \ 6-2 所示，以包含正确的文件。\n\n```\n#include \n#include \n#include \n#include \n#define RED_LED_PIN\
  \ 14\n...\nvoid setup() {\n  // put your setup code here, to run once:\n  Serial.begin(9600);\n\
  \  Serial.println(\" Program start\");\n  pinMode(RED_LED_PIN, OUTPUT);\n  ...\n\
  }\n...\n```\n\n**代码清单 6-2** 包含蓝牙服务器功能文件的 Arduino 解决方案\n\n要确认这些文件与项目兼容，请点击 Arduino\
  \ IDE 中的 **Verify**（验证）按钮。项目应能够成功编译。你可以在未来的项目中重复这些步骤以包含其他库。\n\n\n\n## 将 Arduino\
  \ 设置为蓝牙外设\n\n导入蓝牙库后，即可开始实现蓝牙服务器，这将使设备能够作为外设广播自身并接受传入连接。回顾前面关于蓝牙规范的概述，这是通过广播设备所提供的服务（功能）和数据类型（特征）来实现的。这两个值均以\
  \ 128 位 UUID 表示。UUID 是一串基本随机的十六进制字符；然而，为了将门传感器注册为兼容低功耗蓝牙的设备，你需要将其中部分值替换为蓝牙低功耗规范中已知的标识符。\n\
  \n首先，你需要生成四个 UUID——两个用于表示正在广播的服务（门信息、电池信息），两个用于表示特征（电池电量、门锁状态）。在 Mac 上，你可以使用 `uuidgen`\
  \ 工具通过命令行生成 UUID。我的结果展示在代码清单 6-3 中。\n\n```\nahmeds-macbook:arduino abakir$ uuidgen\n\
  8CED1808-7984-47CE-BE9C-E2DD56317575\n代码清单 6-3\n从 OS X 命令行生成 UUID\n```\n\n如你所见，运行\
  \ `uuidgen` 工具无需额外参数。结果会立即以字符串形式打印在命令行上。运行此命令四次以生成你的四个 UUID 并保存结果。我已将我的结果追加到 Arduino\
  \ 解决方案中，如代码清单 6-4 所示。\n\n```\n#include \n#include \n#include \n#include \n#define\
  \ RED_LED_PIN 14\n...\n#define LOCK_SERVICE_UUID        \"83b46845-6e9c-4b25-89cf-871cc74cc68e\"\
  \n#define BATT_SERVICE_UUID        \"7d6925f3-6e19-48c6-a503-05585abe761e\"\n#define\
  \ LOCK_CHARACTERISTIC_UUID \"4b61d6b9-2e29-4fdf-a74a-7b8bf70ecd9a\"\n#define BATT_CHARACTERISTIC_UUID\
  \ \"8e628af6-0275-4f80-bb64-58f2b2771cba\"\nvoid setup() {\n// put your setup code\
  \ here, to run once:\nSerial.begin(9600);\nSerial.println(\" Program start\");\n\
  pinMode(RED_LED_PIN, OUTPUT);\n...\n}\n...\n代码清单 6-4\n将 UUID 追加到 Arduino 解决方案\n\
  ```\n\n接下来，你必须将从字符串第五个字符开始的四个字符（即第二个双字节组）替换为蓝牙规范中的已知值。这份主记录值被称为蓝牙 GATT（通用属性）。你可以在\
  \ [`www.bluetooth.com/specifications/gatt/services`](http://www.bluetooth.com/specifications/gatt/services)\
  \ 找到服务的值，在 [`www.bluetooth.com/specifications/gatt/characteristics`](http://www.bluetooth.com/specifications/gatt/characteristics)\
  \ 找到特征的值。虽然 GATT 并未涵盖所有用例，但它覆盖了广泛的范围，足以满足大多数项目需求。对于广播电池电量，你可以使用电池服务标识符 (`0x180F`)\
  \ 和电池电量状态特征 (`0x2A1B`)。门的情况稍微复杂一些，因为没有门服务；然而，警报通知服务标识符 (`0x1811`) 和警报状态特征 (`0x2A3F`)\
  \ 能很好地近似此用例，并且在此处适用。如代码清单 6-5 所示，修改你的解决方案以包含这些新值。\n\n```\n#include \n#include \n\
  #include \n#include \n#define RED_LED_PIN 14\n...\n#define LOCK_SERVICE_UUID   \
  \     \"83b41811-6e9c-4b25-89cf-871cc74cc68e\"\n#define BATT_SERVICE_UUID      \
  \  \"7d69180F-6e19-48c6-a503-05585abe761e\"\n#define LOCK_CHARACTERISTIC_UUID \"\
  4b612A3F-2e29-4fdf-a74a-7b8bf70ecd9a\"\n#define BATT_CHARACTERISTIC_UUID \"8e622A1B-0275-4f80-bb64-58f2b2771cba\"\
  \nvoid setup() {\n// put your setup code here, to run once:\nSerial.begin(9600);\n\
  Serial.println(\" Program start\");\npinMode(RED_LED_PIN, OUTPUT);\n...\n}\n...\n\
  代码清单 6-5\n包含有效 GATT UUID 的 Arduino 解决方案\n```\n\n接下来，你可以开始设置蓝牙服务器。`Arduino_ESP32_BLE`\
  \ 库通过 `BLEServer` 类暴露这些函数。该类使用起来很直接，因为设置主要需要注册特征、服务以及服务器事件的回调处理程序（例如，连接已建立、连接已断开）。首先，如代码清单\
  \ 6-6 所示，初始化服务器、特征和服务。\n\n```\n...\n#define BATT_CHARACTERISTIC_UUID \"134c298f-7d6b-4f64-8496-8965e0851d03\"\
  \nBLECharacteristic *lockCharacteristic;\nBLECharacteristic *battCharacteristic;\n\
  void setup() {\n...\npinMode(BATTERY_PIN, INPUT);\nstartBLE();\n}\nvoid startBLE()\
  \ {\n// Create the BLE Device\nBLEDevice::init(\"IOTDoor\");\n// Create the BLE\
  \ Server\nBLEServer *bleServer = BLEDevice::createServer();\n// Create the BLE Service\n\
  BLEService *lockService = bleServer->\ncreateService(LOCK_SERVICE_UUID);\n// Create\
  \ a BLE Characteristic\nlockCharacteristic = lockService->createCharacteristic(\n\
  LOCK_CHARACTERISTIC_UUID,\nBLECharacteristic::PROPERTY_READ   |\nBLECharacteristic::PROPERTY_WRITE\
  \  |\nBLECharacteristic::PROPERTY_NOTIFY |\nBLECharacteristic::PROPERTY_INDICATE\n\
  );\nlockCharacteristic->addDescriptor(new BLE2902());\nBLEService *battService =\
  \ bleServer->\ncreateService(BATT_SERVICE_UUID);\nbattCharacteristic = lockService->createCharacteristic(\n\
  BATT_CHARACTERISTIC_UUID,\nBLECharacteristic::PROPERTY_READ   |\nBLECharacteristic::PROPERTY_WRITE\
  \  |\nBLECharacteristic::PROPERTY_NOTIFY |\nBLECharacteristic::PROPERTY_INDICATE\n\
  );\nbattCharacteristic->addDescriptor(new BLE2902());\n// Start the service\nlockService->start();\n\
  battService->start();\n// Start advertising\nbleServer->getAdvertising()->start();\n\
  }\n代码清单 6-6\n从 Arduino 解决方案初始化低功耗蓝牙服务器\n```\n\n根据 Arduino 解决方案的执行流程，你必须在 `setup()`\
  \ 方法中启动服务器，因为它是程序中仅执行一次的部分。为了稍后发送消息，你需要重用特征对象，因此我将它们声明为全局变量。在设置服务和特征时，请务必正确附加它们，否则将无法工作。与蓝牙规范一致，服务只有在附加到特征时才能被发现。特征属性不必包含我的示例中的完整列表（`READ`、`WRITE`、`NOTIFY`、`INDICATE`）。在未来的项目中，你可以根据需要精简它们。\n\
  \n启动服务器的最后一个要求是注册连接回调。要执行此操作，你需要实现 `BLEServerCallbacks` 协议。由于 C++ 和 Swift 共享共同的语言设计渊源，实现该协议的过程对你来说应该非常熟悉。就像在\
  \ Swift 中一样，定义一个继承该协议的类，并实现所需的命名方法：`onConnect(BLEServer * pServer)` 和 `onDisconnect(BLEServer\
  \ * pServer)`。正如名称所示，这些方法在服务器建立或断开连接时被调用。在代码清单 6-7 中，我修改了解决方案以包含此代码，并添加了将回调附加到服务器对象的调用。目前，你需要在回调中执行的操作仅是将状态对象设置为\
  \ `true` 或 `false`，以及打开或关闭蓝色 LED 灯。稍后，你将再次使用此状态对象，以帮助过滤外发消息。\n\n\n\n```\n...\nBLECharacteristic\
  \ *lockCharacteristic;\nBLECharacteristic *battCharacteristic;\nbool deviceConnected\
  \ = false;\nclass MyServerCallbacks: public BLEServerCallbacks {\nvoid onConnect(BLEServer*\
  \ pServer) {\ndeviceConnected = true;\ndigitalWrite(BLUE_LED_PIN, deviceConnected);\n\
  };\nvoid onDisconnect(BLEServer* pServer) {\ndeviceConnected = false;\ndigitalWrite(BLUE_LED_PIN,\
  \ deviceConnected);\n}\n};\n...\nvoid startBLE() {\n// 创建 BLE 设备\nBLEDevice::init(\"\
  IOTDoor\");\n// 创建 BLE 服务器\nBLEServer *bleServer = BLEDevice::createServer();\n\
  bleServer->setCallbacks(new MyServerCallbacks());\n// 创建 BLE 服务\nBLEService *lockService\
  \ = bleServer->createService(LOCK_SERVICE_UUID);\n...\n}\n...\n清单 6-7\n包含有效蓝牙 LE\
  \ 回调的 Arduino 解决方案\n```\n\n此步骤完成了 Arduino 解决方案中蓝牙 LE 服务器组件的所有设置。为了验证服务器是否正确创建，我喜欢使用蓝牙\
  \ LE 扫描器应用来检查 Arduino 是否正在广播正确的信息。我首选的应用是 LightBlue^® Explorer，可在 App Store 上的 [`https://itunes.apple.com/us/app/lightblue-explorer/id557428110?mt=8`](https://itunes.apple.com/us/app/lightblue-explorer/id557428110?mt=8)\
  \ 下载。在图 6-5 中，我展示了该应用的截图，包括门传感器的状态。在应用的主屏幕上，你应该能看到你在清单 6-6 中指定的广播名称（“IOTDoor”），在详情页面上，你会看到你用于设置服务器的四个\
  \ UUID。要找到该设备，只需将解决方案下载到 HUZZAH32 开发板，按下芯片上的重置按钮，然后等待几秒钟。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig5_HTML.jpg](img/346879_2_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5\n\n使用 LightBlue^® Explorer 验证蓝牙 LE 广播数据\n\n### 注意\n\n添加蓝牙服务器初始化代码后，你的 Arduino\
  \ 解决方案启动速度会明显变慢。你可以打开 Arduino IDE 的串行监视器来验证这一点。在启动过程中，你应该每隔几秒就能看到蓝牙服务器代码记录的日志消息。\n\
  \n### 通过蓝牙 LE 发送数据更新\n\n信不信由你，设置用于广播设备的蓝牙服务器是 Arduino 解决方案中最困难的部分。要通过蓝牙 LE 发送数据更新，你只需使用已保存的特征（电池电量等级、警报状态），并在状态发生变化时推送新的更新。尽管\
  \ Arduino 解决方案设置为每秒轮询一次更新，但在实践中，每秒都传输蓝牙更新并非明智之举。除了消耗电量外，持续传输状态还会导致在设备有更新时（例如当磁传感器检测到门已打开时）无法通知用户。\n\
  \n首先修改你在第 5 章中用于检测门传感器是关闭还是打开的 `checkSensor()` 方法。在该方法的旧实现中，你检查引脚是高电平（连接）还是低电平（断开），然后使用该值来打开或关闭\
  \ LED。虽然这种实现仍然有效，但你必须保存旧值才能触发更新。\n\n要使用 ESP32 BLE Arduino 库发送更新，你可以使用 `setValue()`\
  \ 方法在特征上设置一个新值。然后，你告诉特征对象使用 `notify()` 方法通知所有已连接的设备。在清单 6-8 中，我已更新解决方案，将旧的传感器值保存为全局变量，并且仅当有设备连接到外设且自上次更新以来值发生了变化时，才触发蓝牙更新。\n\
  \n```\nvoid loop() {\n// 在此处放置你的主代码，以便重复运行：\ncheckSensor();\ncheckBattery();\ndelay(1000);\n\
  }\n...\nvoid checkSensor() {\nint currentState = digitalRead(SWITCH_PIN);\nif (currentState\
  \ != switchState) {\nupdateLockBLE(currentState);\n}\nswitchState = currentState;\n\
  digitalWrite(RED_LED_PIN, switchState);\nSerial.print(\"传感器状态: \");\nSerial.println(switchState);\n\
  }\n...\nvoid updateLockBLE(bool currentState) {\nuint8_t value = 0;\nif (deviceConnected)\
  \ {\nvalue = currentState ? 1 : 0;\nlockCharacteristic->setValue(&value, 1);\nlockCharacteristic->notify();\n\
  }\n}\n清单 6-8\n从 Arduino 解决方案发布磁传感器更新\n```\n\n对于 `checkBattery()` 方法，你可以使用相同的过程；但是你需要调整检测状态变化的逻辑。在实践中，你会注意到随着传感器保持通电状态，电池电量会持续下降。这是正常的，但为了方便用户，最好只在有显著变化时才通知他们。在清单\
  \ 6-9 中，我已更新解决方案来保存旧电池值（就像磁传感器一样），但不是每次值变化时都发送通知，而仅当电池电量比上次读数至少低 5% 时才发送通知。\n\n\
  ```\nvoid checkBattery() {\nfloat currentLevel = analogRead(BATTERY_PIN);\ncurrentLevel\
  \ = ((currentLevel / 4095) * 2 * 3.3 *\n1.1) * 100 / 4.3;\nif (currentLevel + 5.0\
  \ < batteryLevel) {\nbatteryLevel = currentLevel;\nString valueString = String(batteryLevel);\n\
  battCharacteristic->setValue(valueString);\nbattCharacteristic->notify();\n}\n}\n\
  清单 6-9\n当电量降低超过 5% 时发布电池更新\n```\n\n完成这些步骤后，本章的 Arduino 解决方案就完整了。从现在开始，你将专注于如何构建一个应用，连接到你所创建的传感器，并读取它传输的值。\n\
  \n## 使用 Core Bluetooth 与蓝牙 LE 设备通信\n\n正如本章开头所述，Apple 提供了 Core Bluetooth 框架，帮助你使用其\
  \ API 快速、安全地连接到蓝牙设备。你无需埋头钻研蓝牙规范来自行实现基本通信，而是可以直接专注于业务逻辑，就像你在 Arduino 解决方案中使用 `ESP32\
  \ BLE` 库一样。在本章后半部分，我将快速引导你完成 `IOTHome` 项目的设置，该项目将作为本节剩余项目的基础，然后介绍设置一个连接到蓝牙 LE 配件的应用的以下步骤：\n\
  \n* 向项目添加蓝牙后台服务权限\n* 发现并连接蓝牙设备\n* 监控蓝牙特征更新\n* 在应用处于后台时响应蓝牙特征更新\n\n与本书之前的项目一样，这里的目标不仅是学习一些有用的技能，还要学会如何应用它们，以便在未来提供便捷的用户体验。\n\
  \n\n### 设置 IOTHome 项目\n\n再次回到图 6-1，本节中的 IOTHome 项目将提供一个基于标签的用户界面，允许用户利用物联网技术监控家中的各种数据点。虽然本章只关注门磁传感器界面，但最好的做法是让项目从一开始就步入正轨，即像你在第一章中为\
  \ IOTFit 项目所做的那样，在 Xcode 中使用标签栏控制器模板创建一个新项目。为了将重点转移到项目的蓝牙部分，我强烈建议你回顾第一章以详细了解此操作流程。不过，为了方便大家，以下是摘要：\n\
  \n1. 从 Xcode “文件”菜单的“新建项目”选项中，选择“标签栏控制器”。\n2. 导航到 `Main.storyboard` 文件，验证基于标签的项目是否创建成功。\n\
  3. 通过双击故事板中的标签将其重命名为“门”和“主页”，然后在 Xcode 右侧窗格的“属性检查器”中选择新名称和图标。\n4. 将代表标签视图控制器的类重命名为\
  \ `HomeViewController`（第一个标签）和 `DoorViewController`（第二个标签）。\n\n完成后，你的故事板和项目结构应类似于图\
  \ 6-6 中的截图。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig6_HTML.jpg](img/346879_2_En_6_Fig6_HTML.jpg)\n\
  \n**图 6-6.** 新的 IOTHome 项目，包含修改后的故事板和视图控制器名称\n\n为了发起蓝牙连接并显示传感器数据，你需要通过代码和 Interface\
  \ Builder 来设置用户界面。在代码清单 6-10 中，我提供了修改后的 `DoorViewController` 类，其中包含了用户界面的属性和存根方法。由于此界面主要用于显示数据，因此用户界面主要由\
  \ `UILabel` 对象组成；不过，你需要使用一个 `UIButton` 来发起和断开连接。用户只能在“已连接”或“未连接”状态下访问应用，因此我的实现方案对连接管理操作共用了同一个按钮。\n\
  \n```\nimport UIKit\nclass DoorViewController: UIViewController {\n    @IBOutlet\
  \ var statusLabel: UILabel?\n    @IBOutlet var batteryLabel: UILabel?\n    @IBOutlet\
  \ var lastUpdatedLabel: UILabel?\n    @IBOutlet var connectButton: UIButton?\n \
  \   let dateFormatter = DateFormatter()\n    override func viewDidLoad() {\n   \
  \     super.viewDidLoad()\n        dateFormatter.dateStyle = .medium\n        dateFormatter.timeStyle\
  \ = .short\n    }\n    @IBAction func connect() {\n    }\n}\n```\n\n**代码清单 6-10.**\
  \ `DoorViewController` 类，包含用户界面属性和存根方法\n\n为了帮助你为主题化视图控制器，我在表 6-1 中提供了我为每个元素使用的样式选项。与第一部分一样，我使用了\
  \ Apple 的字体类来降低字体管理的复杂性，并为用户提供更符合 Apple iOS 设计指南的体验。\n\n**表 6-1.** 门视图控制器用户界面元素的样式\n\
  \n| 元素名称 | 文本样式 | 高度 | 上边距 | 下边距 | 左边距 | 右边距 |\n| --- | --- | --- | --- | --- |\
  \ --- | --- |\n| 导航栏 | 偏好大文本 | — | — | — | — | — |\n| “状态”标题标签 | 标题 2 | 24 | 40\
  \ | — | 30 | 20 |\n| “状态”值标签 | 标题 2 | 24 | 40 | — | 20 | ≥30 |\n| “电池电量”标题标签 | 标题\
  \ 2 | 24 | 8 | — | 30 | 20 |\n| “电池电量”值标签 | 标题 2 | 24 | 8 | — | 20 | ≥30 |\n| “上次更新”标签\
  \ | 正文 | 25 | 8 | — | 20 | 20 |\n| “点击连接”标签 | 正文 | 25 | — | 20 | 20 | 20 |\n| “连接”按钮\
  \ | 标题 1 | 60 | 20 | 30 | 20 | 20 |\n\n在元素样式设置完成后，记得拖放插座（outlet），将代码连接到故事板文件。你完成的故事板及其连接检查器应类似于图\
  \ 6-7 所示的结果。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig7_HTML.jpg](img/346879_2_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7.** 为门视图控制器设置样式后的故事板和 Interface Builder 连接\n\n### 启用蓝牙配件后台更新\n\n尽管 iOS\
  \ 因在应用进入后台时暂停应用而闻名，但低功耗蓝牙外设更新是为数不多的例外之一，就像你在本书第一部分启用的后台位置更新一样。与后台位置更新类似，要启用蓝牙更新，你必须在应用的项目设置中将它们声明为功能。\n\
  \n开始声明该功能的过程时，请点击 IOTHome 项目的 `.xcodeproj` 文件（`IOTHome.xcodeproj`）。如图 6-8 所示，点击“功能”标签。然后点击“后台模式”，接着选中“使用蓝牙\
  \ LE 配件”。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig8_HTML.jpg](img/346879_2_En_6_Fig8_HTML.jpg)\n\
  \n**图 6-8.** 启用蓝牙配件后台模式\n\n对于后台位置更新，你需要更新项目的功能，并在项目的 `Info.plist` 文件中定义位置权限提醒消息。对于后台蓝牙项目，“同样需要”你在\
  \ `Info.plist` 文件中定义 iOS 设备在蓝牙操作中扮演的角色。对于本项目，你只需发现并连接到低功耗蓝牙设备。因此，你只需执行中心管理器的角色。点击项目的\
  \ `Info.plist` 文件，启用 `NSBluetoothPeripheralUsageDescription` 键值对，如图 6-9 所示。对于描述说明，我使用了以下消息：“IOTHome\
  \ 希望使用蓝牙来帮助您监控家中的基于蓝牙的物联网传感器。此信息不会在应用之外共享。”\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig9_HTML.jpg](img/346879_2_En_6_Fig9_HTML.jpg)\n\
  \n**图 6-9.** 在项目的 `Info.plist` 中指定中心管理器提醒消息\n\n这些步骤完成了 IOTHome 项目当前迭代的项目设置。现在，你可以开始充实项目内容，使用\
  \ Core Bluetooth 来发现门磁传感器并与之交互。\n\n\n\n## 将 App 设置为中央管理器\n\n有了基本的用户界面和权限配置，现在你可以从\
  \ `IOTHome` app 开始扫描蓝牙设备。遵循低功耗蓝牙的术语，在本节中，你将让 iOS app 扮演中央管理器的角色，并连接到基于 Arduino 的外围设备。\n\
  \n为了让代码更易于管理，你将把蓝牙操作封装到一个名为 `BluetoothService` 的类中。该类将通过一个你即将定义的名为 `BluetoothServiceDelegate`\
  \ 的协议，将状态消息传回实例化它的类。虽然将所有内容放在一个文件中是可行的，但实现蓝牙所需的逻辑较为繁重，将众多函数塞入一个视图控制器会引入*巨型视图控制器*反模式，许多开发者认为这是苹果\
  \ iOS 应用 Model-View-Controller 架构的弱点。最近，采用协议来缓解这一问题的方法被称为*面向协议编程*。它提供了一种简便的方式拆分代码，通过在协议中定义关键行为，并通过*扩展*将实现分组。如果你曾使用扩展为类添加功能，或拆分过基于委托的大型\
  \ API（例如 `UITableViewDelegate`），那么你就已经熟悉面向协议编程的基础知识了。\n\n对于 `IOTHome` app，你必须向 `BluetoothService`\
  \ 类的使用者暴露以下事件：\n\n- 蓝牙连接状态变化\n- 门状态变化\n- 电池电量变化\n\n根据这些需求，你可以声明 `BluetoothServiceDelegate`\
  \ 协议，其签名如代码清单 6-11 所示。该协议应放在名为 `BluetoothService.swift` 的新文件中。蓝牙是一种基于串行的协议，类似于传统计算中的\
  \ RS-232 串口，这意味着它作为连续的字节流来传递数据。Core Bluetooth 使用 `Data` 类来暴露这些数据。在 Arduino 方案中，状态数据以字符串值的形式传输，因此你可以安全地将来自\
  \ Core Bluetooth 的输入数据转换为 `String` 对象，以便更轻松地进行消息传递。类似地，Core Bluetooth 没有提供简洁的对象来描述连接状态，因此我定义了\
  \ `ConnectionStatus` 枚举来表示它。\n\n```\nenum ConnectionStatus {\n    case unknown\n\
  \    case scanning\n    case connecting\n    case connected\n    case disconnected\n\
  }\n\nprotocol BluetoothServiceDelegate: class {\n    func didUpdateConnection(status:\
  \ ConnectionStatus)\n    func didReceiveDoorUpdate(value: String)\n    func didReceiveBatteryUpdate(value:\
  \ String)\n}\n```\n\n**代码清单 6-11** `BluetoothServiceDelegate` 协议的声明\n\n尽管协议指定了将要使用的方法，但它本身并不执行任何逻辑。为了实现\
  \ `BluetoothServiceDelegate` 协议的行为，你必须在 `BluetoothService.swift` 中提供方法定义，如代码清单 6-12\
  \ 所示。这一初始实现的主要内容包括便捷初始化器、`connect()` 方法的桩代码，以及用于表示你需要与之交互的蓝牙低功耗服务和特征 UUID 的 `CBUUID`\
  \ 对象。\n\n```\nimport Foundation\nimport CoreBluetooth\n\nlet doorServiceUUID = CBUUID(string:\
  \ \"83b46845-6e9c-4b25-89cf-871cc74cc68e\")\nlet battServiceUUID = CBUUID(string:\
  \ \"7d6925f3-6e19-48c6-a503-05585abe761e\")\nlet doorCharUUID = CBUUID(string: \"\
  4b61d6b9-2e29-4fdf-a74a-7b8bf70ecd9a\")\nlet battCharUUID = CBUUID(string: \"8e628af6-0275-4f80-bb64-58f2b2771cba\"\
  )\n\nclass BluetoothService: NSObject {\n    let doorServices = [doorServiceUUID]\n\
  \    let doorCharacteristics = [doorCharUUID, battCharUUID]\n    weak var delegate:\
  \ BluetoothServiceDelegate?\n\n    convenience init(delegate: BluetoothServiceDelegate)\
  \ {\n        self.init()\n        self.delegate = delegate\n    }\n\n    private\
  \ override init() {\n        super.init()\n    }\n\n    func connect() {\n     \
  \   delegate?.didUpdateConnection(status: connectionStatus)\n    }\n}\n```\n\n**代码清单\
  \ 6-12** `BluetoothService` 类的初始定义\n\n声明了 `BluetoothService` 类及其对应的协议后，切换回 `DoorViewController.swift`。如代码清单\
  \ 6-13 所示，创建一个属性来表示 `BluetoothService` 类的实例，并在 `viewDidLoad()` 方法中实例化它。为了确保编译成功，在\
  \ `DoorViewController` 类的定义下方添加 `BluetoothServiceDelegate` 协议的*桩代码*（空扩展）。在你之前定义的表示点击*连接*按钮的\
  \ `connect()` 方法中，调用 `BluetoothService` 类中对应的方法。\n\n```\nclass DoorViewController:\
  \ UIViewController {\n    ...\n    var bluetoothService: BluetoothService?\n\n \
  \   override func viewDidLoad() {\n        super.viewDidLoad()\n        ...\n  \
  \      bluetoothService = BluetoothService(delegate: self)\n    }\n\n    @IBAction\
  \ func connect() {\n        bluetoothService?.connect()\n    }\n}\n\nextension DoorViewController:\
  \ BluetoothServiceDelegate {\n    func didReceiveDoorUpdate(value: String) {\n \
  \   }\n\n    func didReceiveBatteryUpdate(value: String) {\n    }\n\n    func didUpdateConnection(status:\
  \ ConnectionStatus) {\n    }\n}\n```\n\n**代码清单 6-13** `BluetoothServiceDelegate`\
  \ 协议的初始实现\n\n根据应用的逻辑流程，你现在应该开始为 `BluetoothService` 类开发 `connect()` 方法。我之前提供的 `ConnectionState`\
  \ 枚举定义了蓝牙连接的五个状态：`unknown`、`scanning`、`connecting`、`connected` 和 `disconnected`。在\
  \ `unknown` 和 `disconnected` 状态下，可以安全地认为应用未连接到蓝牙外围设备，因此可以利用这些状态开始扫描设备。如果状态是 `connected`\
  \ 或 `connecting`，可以认为用户正在尝试与设备建立连接，这是断开连接的信号。最后，`scanning` 状态表示应用正在扫描设备，你可以利用它来停止扫描。在代码清单\
  \ 6-14 中，我包含了 `connect()` 方法的初始实现，该方法根据前一个状态来更新连接状态。为了正确设置初始状态，我在类中添加了一个 `connectionStatus`\
  \ 属性，默认值为 `unknown`。随着本节内容的深入，你将把这些状态变化连接到 `CoreBluetooth` API 调用。\n\n```\nclass\
  \ BluetoothService: NSObject {\n    func connect() {\n        switch connectionStatus\
  \ {\n        case .unknown, .disconnected:\n            connectionStatus = .scanning\n\
  \        case .connected, .connecting:\n            connectionStatus = .disconnected\n\
  \        default:\n            connectionStatus = .disconnected\n        }\n   \
  \     delegate?.didUpdateConnection(status: connectionStatus)\n    }\n}\n\nextension\
  \ DoorViewController: BluetoothServiceDelegate {\n    ...\n    func didUpdateConnection(status:\
  \ ConnectionStatus) {\n        switch status {\n        case .connecting:\n    \
  \        connectButton?.setTitle(\"Connecting\", for: .normal)\n        case .connected:\n\
  \            connectButton?.setTitle(\"Disconnect\", for: .normal)\n        case\
  \ .scanning:\n            connectButton?.setTitle(\"Scanning\", for: .normal)\n\
  \        default:\n            connectButton?.setTitle(\"Connect\", for: .normal)\n\
  \        }\n    }\n}\n```\n\n**代码清单 6-14** `connect()` 方法的初始实现\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n## 为 IOTHome 应用配置蓝牙中心管理器\n\n对于 IOTHome 应用，`BluetoothService` 类必须提供的唯一蓝牙角色是中心管理器。你可以通过\
  \ `CBCentralManager` 类来实现这一点。要在你的程序中使用它，你必须实例化一个 `CBCentralManager` 对象并设置其委托。在代码清单\
  \ 6-15 中，我将其作为一个属性添加到了类中，并提供了你在此项目中必须使用的 `CBCentralManagerDelegate` 协议方法的存根。\n\n\
  ```\nclass BluetoothService: NSObject {\n...\nweak var delegate: BluetoothServiceDelegate?\n\
  var centralManager: CBCentralManager?\n...\nprivate override init() {\nsuper.init()\n\
  centralManager = CBCentralManager.init(delegate: self,\nqueue: nil)\n}\n}\nextension\
  \ BluetoothService: CBCentralManagerDelegate {\nfunc centralManagerDidUpdateState(_\
  \ central:\nCBCentralManager) {\n}\nfunc centralManager(_ central: CBCentralManager,\n\
  didDiscover peripheral: CBPeripheral, advertisementData:\n[String: Any], rssi RSSI:\
  \ NSNumber) {\n}\nfunc centralManager(_ central: CBCentralManager, didConnect\n\
  peripheral: CBPeripheral) {\n}\n}\n代码清单 6-15 初始化一个 CBCentralManager 对象\n```\n\n\
  ## 连接到蓝牙低功耗外设\n\n现在 `CBCentralManager` 对象已正确初始化，你可以准备建立与蓝牙低功耗外设的连接了。首先，更新 `connect()`\
  \ 方法，如代码清单 6-16 所示，以便根据按下“连接”按钮时应用所处的状态来开始或停止扫描。\n\n```\nclass BluetoothService:\
  \ NSObject {\n...\nvar centralManager: CBCentralManager?\nvar connectedPeripheral:\
  \ CBPeripheral?\n...\nfunc connect() {\nswitch connectionStatus {\ncase .unknown,\
  \ .disconnected :\ncentralManager?.scanForPeripherals(withServices:\nnil, options:\
  \ nil)\nconnectionStatus = .scanning\ncase .connected, .connecting:\nif let connectedPeripheral\
  \ = connectedPeripheral {\ncentralManager?.cancelPeripheralConnection(\nconnectedPeripheral)\n\
  connectionStatus = .disconnected\n}\ndefault:\ncentralManager?.stopScan()\nconnectionStatus\
  \ = .disconnected\n}\ndelegate?.didUpdateConnection(status: connectionStatus)\n\
  }\n}\n代码清单 6-16 开始或停止扫描蓝牙低功耗外设\n```\n\n你通过在中央管理器对象上调用 `scanForPeripherals(withServices:options:)`\
  \ 方法来启动扫描。你可以指定 UUID 进行过滤，但根据我的经验，如果你的广告代码在 Arduino 上设置不正确，这会使设备扫描变得更加困难，因此我在此示例中省略了这一点。停止扫描同样简单，只需调用\
  \ `stopScan()` 方法即可。要断开连接，你必须使用一个已保存的 `CBPeripheral` 对象（在完成连接后你将拥有该对象）调用 `cancelPeripheralConnection()`。\n\
  \n当你的中央管理器发现蓝牙低功耗外设时，它会通过你的 `centralManager(didDiscover:advertisementData:RSSI:)`\
  \ 方法实现进行回调。此方法会为它找到的每个设备返回一个 `CBPeripheral` 对象，包括设备名称及其广播数据中的服务。在你确定了要连接的设备后，应保存其\
  \ `CBPeripheral` 对象并尝试连接到它。在代码清单 6-17 中，我更新了 `BluetoothService` 类中 `centralManager(didDiscover:advertisementData:RSSI:)`\
  \ 方法的实现，将名称匹配“IOTHome”的设备保存到该类的一个属性中，然后尝试连接。\n\n```\nextension BluetoothService:\
  \ CBCentralManagerDelegate {\n...\nfunc centralManager(_ central: CBCentralManager,\n\
  didDiscover peripheral: CBPeripheral, advertisementData:\n[String: Any], rssi RSSI:\
  \ NSNumber) {\nif peripheral.name == \"IOTDoor\" {\nself.connectedPeripheral = peripheral\n\
  self.connectedPeripheral?.delegate = self\ncentralManager?.connect(peripheral, options:\
  \ nil)\n}\n}\n...\n}\n代码清单 6-17 发现并保存一个蓝牙低功耗外设\n```\n\n虽然理想情况是在发现外设后立即开始使用它，但要从设备检索数据，仍需付出更多努力。一旦连接建立，`centralManager(didConnect:)`\
  \ 方法将被触发。在此方法内部，你必须开始扫描你想在外设上使用的服务（门和电池状态）。在连接到 IOTHome 外设后，你不再需要扫描设备，因此应告知中央管理器停止扫描，并更新\
  \ `BluetoothService` 类的连接状态属性。\n\n与 `CBCentralManager` 类似，`CBPeripheral` 通过其委托方法发送更新。在代码清单\
  \ 6-18 中，我更新了 `BluetoothService` 类，加入了完整的 `centralManager(didConnect:)` 方法和一个 `CBPeripheralDelegate`\
  \ 协议的存根。\n\n```\nextension BluetoothService: CBCentralManagerDelegate {\nfunc centralManagerDidUpdateState(_\
  \ central:\nCBCentralManager) {\nswitch(central.state) {\ncase .poweredOn:\nNSLog(\"\
  It's showtime\")\ndefault:\nNSLog(\"Device is not ready\")\n}\n}\n...\nfunc centralManager(_\
  \ central: CBCentralManager, didConnect\nperipheral: CBPeripheral) {\ncentral.stopScan()\n\
  connectedPeripheral?.discoverServices(doorServices)\nself.connectionStatus = .connecting\n\
  delegate?.didUpdateConnection(status: connectionStatus)\n}\n}\nextension BluetoothService:\
  \ CBPeripheralDelegate {\nfunc peripheral(_ peripheral: CBPeripheral,\ndidDiscoverServices\
  \ error: Error?) {\n}\nfunc peripheral(_ peripheral: CBPeripheral,\ndidDiscoverCharacteristicsFor\
  \ service: CBService,\nerror: Error?) {\n}\nfunc peripheral(_ peripheral: CBPeripheral,\n\
  didUpdateValueFor characteristic: CBCharacteristic,\nerror: Error?) {\n}\n}\n代码清单\
  \ 6-18 连接到外设后发送更新\n```\n\n连接到设备后，`CBPeripheral` 对象将响应它发现的服务。考虑到蓝牙低功耗通信的层次结构，在找到服务后，你必须询问它们所公开的特征。如代码清单\
  \ 6-19 所示，这是通过在 `CBPeripheral` 对象上调用 `discoverCharacteristics()` 来完成的。\n\n```\n\
  extension BluetoothService: CBPeripheralDelegate {\nfunc peripheral(_ peripheral:\
  \ CBPeripheral,\ndidDiscoverServices error: Error?) {\nguard let services = peripheral.services\n\
  else { return }\nfor service in services {\nperipheral.discoverCharacteristics(\n\
  doorCharacteristics, for: service)\n}\n}\nfunc peripheral(_ peripheral: CBPeripheral,\n\
  didDiscoverCharacteristicsFor service: CBService, error:\nError?) {\nself.connectionStatus\
  \ = .connected\ndelegate?.didUpdateConnection(status: connectionStatus)\n}\n...\n\
  }\n代码清单 6-19 查询蓝牙低功耗外设的服务和特征\n```\n\n现在，在 `peripheral(didDiscoverCharacteristicsFor:error:)`\
  \ 方法内部，你可以将连接状态设置为已连接，并通知 `BluetoothService` 委托连接已建立。\n\n\n## 监控特征值更新\n\n在发现外设的能力后，最后剩下的步骤是指示`BluetoothService`对象在特征值发生变化时接收更新，并将这些变化传递给`BluetoothService`委托。要注册更新，您需要修改`peripheral(didDiscoverCharacteristicsFor:error:)`方法。该方法返回一个`CBService`对象，其中包含设备上所有可用服务的有效引用。使用`characteristics`属性从服务中提取这些值，然后使用`CBPeripheral`对象上的`setNotifyValue(enabled:for:)`方法指示您想要接收更新，如代码清单\
  \ 6-20 所示。为了限制接收到的消息数量，请使用已知的电池和门锁特征 UUID。\n\n```\nextension BluetoothService: CBPeripheralDelegate\
  \ {\n...\nfunc peripheral(_ peripheral: CBPeripheral,\ndidDiscoverCharacteristicsFor\
  \ service: CBService,\nerror: Error?) {\nguard let characteristics = service.characteristics\n\
  else { return }\nfor characteristic in characteristics {\nif characteristic.uuid\
  \ == doorCharUUID {\nself.connectedPeripheral?.setNotifyValue(true,\nfor: characteristic)\n\
  }\nif characteristic.uuid == battCharUUID {\nself.connectedPeripheral?.setNotifyValue(true,\n\
  for: characteristic)\n}\n}\nself.connectionStatus = .connected\ndelegate?.didUpdateConnection(status:\n\
  connectionStatus)\n}\n}\n```\n*代码清单 6-20* – 注册特征值更新\n\n要处理特征值更新，需要实现`peripheral(didUpdateValueFor:error:)`方法。该方法返回一个`CBCharacteristic`对象，其中包含来自特征对象的原始二进制数据。由于更新是从\
  \ Arduino 设备以字符串形式传输的，因此在此方法中，您应该尝试将原始数据转换为字符串。最简单的方法是使用`String`类的`String(data:encoding:)`构造方法。通常，在解析纯文本英文时，UTF-8\
  \ 是最安全的编码方式，但如果您计划处理非英文字符，也可以尝试 Unicode 编码。\n\n由于`IOTHome`应用应能独立处理门锁或电池更新，您应该通过`BluetoothServiceDelegate`协议中的独立方法传递这些更新。在代码清单\
  \ 6-21 中，我实现了带有此逻辑的`peripheral(didUpdateValueFor:error:)`方法。当更新到来时，我会检查它们来自哪个特征\
  \ UUID，将数据转换为字符串，然后调用`didReceiveDoorUpdate(value:)`方法或`didReceiveBatteryUpdate(value:)`方法。\n\
  \n```\nextension BluetoothService: CBPeripheralDelegate {\n...\nfunc peripheral(_\
  \ peripheral: CBPeripheral,\ndidUpdateValueFor characteristic: CBCharacteristic,\n\
  error: Error?) {\nguard let characteristicData = characteristic.value\nelse { return\
  \ }\nif characteristic.uuid == doorCharUUID,\nlet stringValue = String(data: characteristicData,\n\
  encoding: String.Encoding.utf8) {\ndelegate?.didReceiveDoorUpdate(value: stringValue)\n\
  }\nif characteristic.uuid == battCharUUID,\nlet stringValue = String(data: characteristicData,\n\
  encoding: String.Encoding.utf8) {\ndelegate?.didReceiveBatteryUpdate(value:\nstringValue)\n\
  }\n}\n}\n```\n*代码清单 6-21* – 处理特征值更新\n\n最后，要在更新到来时更新用户界面，请切换到`DoorViewController`类。如代码清单\
  \ 6-22 所示，在`didReceiveDoorUpdate(value:)`和`didReceiveBatteryUpdate(value:)`方法内部，用新值更新状态标签。\n\
  \n```\nextension DoorViewController: BluetoothServiceDelegate {\nfunc didReceiveDoorUpdate(value:\
  \ String) {\nlet statusString = (value == \"1\") ? \"已锁定\" :\n\"未锁定\"\nlet dateString\
  \ = dateFormatter.string(from: Date())\nstatusLabel?.text = statusString\nlastUpdatedLabel?.text\
  \ = \"(最后更新: \\(dateString))\"\n}\nfunc didReceiveBatteryUpdate(value: String) {\n\
  batteryLabel?.text = \"电池电量: \\(value)%\"\n}\n}\n```\n*代码清单 6-22* – 接收特征值更新后更新用户界面\n\
  \n### 在应用后台运行时监控更新\n\n作为`IOTHome`应用的锦上添花之笔，您可以让应用在后台运行且特征值更新到来时，在用户手机上显示通知。这样，即使应用未打开，用户也能知道门是否被打开或传感器电量是否过低。要添加此功能，您必须利用\
  \ iOS 通知框架`UserNotifications`的两个特性：请求用户的通知权限，以及在蓝牙特征值更新到来时安排通知。\n\n要显示通知权限对话框，您需要在代表用户设备的`UNUserNotificationCenter`对象上调用`requestAuthorization(options:completionHandler:)`方法。与定位服务类似，这是一个所有\
  \ iOS 应用共享的单例对象。您可以通过调用`UNUserNotificationCenter`类的`current()`方法来访问它。在代码清单 6-23\
  \ 中，我通过在`DoorViewController`类中添加`viewWillAppear()`实现来请求权限。权限提示的消息来自您在项目的`Info.plist`文件中为`NSBluetoothPeripheralUsageDescription`键值对指定的值。\n\
  \n```\nimport UIKit\nimport UserNotifications\nclass DoorViewController: UIViewController\
  \ {\n...\noverride func viewDidAppear(_ animated: Bool) {\nsuper.viewDidAppear(animated)\n\
  let center =\nUNUserNotificationCenter.current()\ncenter.requestAuthorization(\n\
  options: [.alert, .sound]) { (completed: Bool,\nerror: Error?) in\nNSLog(\"通知请求完成，状态:\
  \ \\(completed)\")\n}\n}\n}\n```\n*代码清单 6-23* – 从门锁视图控制器请求通知权限\n\n`viewWillAppear()`方法在视图控制器呈现时被调用，无论是通过切换标签页还是从导航堆栈中的另一个视图控制器返回。权限对话框仅在用户首次打开门锁视图控制器时出现。它应类似于图\
  \ 6-10 中的截图。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig10_HTML.jpg](img/346879_2_En_6_Fig10_HTML.jpg)\n\
  \n*图 6-10* – `IOTHome`应用的通知权限对话框\n\n要呈现通知，您必须使用内容信息（包括标题、消息和声音）以及触发器（如时间或位置更新）创建通知请求。对于`DoorViewController`类，我将此逻辑封装在一个名为`scheduledLocalNotification()`的方法中，该方法接收指示更新类型和值的字符串作为输入。触发器设置为在接收到值后半秒触发，因为我希望用户在门打开时立即知晓。\n\
  \n由于您在本节开始时请求了应用的蓝牙中心管理器权限，您可以利用这一点来安排通知请求。后台权限允许`IOTHome`应用在每次特征值更新时获得几秒钟的执行时间。如代码清单\
  \ 6-24 所示，在`DoorViewController`类的`BluetoothService`委托方法中，如果应用在后台运行，您可以添加对安排本地通知的调用。检查应用是否在后台运行有助于用户体验，因为用户无需在应用打开时看到通知。通知将持续递送，直到用户断开蓝牙连接或出现物理限制（例如，距离或电量不足）。\n\
  \n\nextension `DoorViewController: BluetoothServiceDelegate` {\n    func `didReceiveDoorUpdate(value:\
  \ String)` {\n        ...\n        let state = `UIApplication.shared.applicationState`\n\
  \        if state == `.background` {\n            `scheduleLocalNotification(updateType:\
  \ \"Door\", updateValue: value)`\n        }\n    }\n\n    func `didReceiveBatteryUpdate(value:\
  \ String)` {\n        ...\n        let state = `UIApplication.shared.applicationState`\n\
  \        if state == `.background` {\n            `scheduleLocalNotification(updateType:\
  \ \"Battery level\", updateValue: \"\\(value)%\")`\n        }\n    }\n\n    ...\n\
  \n    func `scheduleLocalNotification(updateType: String, updateValue: String)`\
  \ {\n        let center = `UNUserNotificationCenter.current()`\n        let content\
  \ = `UNMutableNotificationContent()`\n        content.title = \"IOTHome device update\"\
  \n        content.body = \"\\(updateType) is now \\(updateValue)\"\n        content.sound\
  \ = `UNNotificationSound.default()`\n        let trigger = `UNTimeIntervalNotificationTrigger(timeInterval:\
  \ 0.5, repeats: false)`\n        let request = `UNNotificationRequest(identifier:\
  \ \"IOTHomeNotification\", content: content, trigger: trigger)`\n        `center.add(request)\
  \ { (error: Error?) in`\n            if let errorObject = error {\n            \
  \    `NSLog(\"Error scheduling notification: \\(errorObject.localizedDescription)\"\
  )`\n            } else {\n                `NSLog(\"Notification scheduled successfully\"\
  )`\n            }\n        `}`\n    }\n}\n\n*列表 6-24 接收到特征值更新时安排后台通知*\n\n## 总结\n\
  \n在本章中，你学习了如何实现蓝牙低功耗（Bluetooth LE）的两种角色：外设（提供信息的设备）和中心管理器（从一个或多个外设获取信息的设备）。你在第 5\
  \ 章开始搭建的基于 `ESP32` 的电路作为外设，由开源库 `ESP32_BLE_Arduino` 驱动，而 `IOTHome` iOS 应用则作为中心管理器，使用了\
  \ Core Bluetooth 框架。对于这两种角色，在完成一系列较为冗长的设置步骤后，利用蓝牙低功耗的特征值更新来传输数据变得相当容易。为了帮助用户减少电池消耗，你还配置了两个设备，使其仅在设备发生明显状态变化时（例如，自上次更新以来，门打开程度或电池电量降低\
  \ 10%）才发送和响应更新。\n\n蓝牙仍然是连接硬件配件最常用的通信协议之一。希望你能将本章学到的知识运用到未来对该协议版本的更新，以及你可能选择构建的其他设备上！\n\
  \n"
- "# 7. 搭建树莓派并将其用作 HomeKit 桥接器\n\n在物联网应用开发的旅程中，到目前为止，你已经学习了如何在 iOS 设备上使用传感器（GPS、运动），以及如何利用开放通信协议（包括蓝牙）与第三方硬件设备（如\
  \ Arduino）进行交互。在本章中，你将学习一种介于两者之间的、苹果专属的物联网技术：HomeKit。\n\nHomeKit 于 2014 年随 iOS 8\
  \ 推出，是苹果专有的标准，旨在使 iOS 设备能够与经过认证的家用第三方物联网配件（如智能灯泡和空调）进行通信。其卖点在于，通过苹果的硬件认证流程、专为物联网设备设计的特殊加密芯片，以及与\
  \ iOS 的深度集成，它能够提供最强大、最安全的家用物联网平台。你无需购买专门的硬件设备作为网关，只需使用家中的 iPad、HomePod 或 Apple TV\
  \ 即可实现此功能。此外，你还可以使用 Siri 来检查设备的状态。\n\n不幸的是，对于许多第三方硬件制造商来说，其认证流程和专用硬件芯片被证明过于昂贵且推出太晚，该平台从未达到预期的势头。虽然\
  \ HomeKit 并未证明自己是苹果所期望的立竿见影的商业成功，但每天都有更多兼容设备为其推出。更重要的是，苹果现在允许爱好者通过发布 HomeKit 配件协议规范的非商业版本，创建未经认证的\
  \ HomeKit 设备供个人使用。该许可允许你创建供个人使用的配件，当你通过 iOS 设备连接它们时，这些配件会显示为“未经认证”。更棒的是，你的个人设备可以构建在任何能够实现\
  \ HAP 的平台上，从树莓派到 Mac 都可以。\n\n在软件方面，作为 iOS 的一部分，苹果提供了 HomeKit 框架，允许你管理注册在系统 HomeKit\
  \ 数据库中的房间和设备。HomeKit 与 HealthKit 同时发布，旨在以相同的方式运作，提供一个受保护的系统级 HomeKit 设备数据库，任何获得用户许可的应用程序都可以访问。然而，苹果没有提供的一个主要组件是用于硬件设备的\
  \ HAP 实现。为了填补这一空白，本章中你将使用一个优秀的开源项目 HomeBridge (`https://github.com/nfarina/homebridge`)，它实现了\
  \ HAP 规范的大部分内容，并提供了一个插件系统，使你能够轻松地将其他流行的物联网服务和配件连接到你的项目中。\n\n\n\n## 学习目标\n\n在本章中，你将使用树莓派为在第\
  \ 5 章和第 6 章中制作的门磁传感器构建一个 HomeKit 桥接器，并学习如何在 iOS 中将其注册为有效的 HomeKit 设备。树莓派将通过蓝牙连接传感器以读取其状态，并通过\
  \ HomeKit 配件协议（HAP）报告状态。顾名思义，HomeKit 桥接器可以通过单个接口将多个设备连接到 HomeKit。为了演示设备的桥接功能，你还需要将一个温度传感器连接到树莓派，并通过\
  \ HAP 报告其状态。\n\n虽然有一个 API 可以让你在应用内管理 HomeKit 设备和房间，但在本书第一版出版后，我发现这些功能在 HomeKit 设备中的采用率较低，因为它们与苹果家庭应用中的功能是镜像关系。因此在本版中，我决定放弃这些主题，转而侧重于扩展树莓派的配置，因为这是一个非常复杂的过程。\n\
  \n在部署 HomeKit 桥接器的过程中，你将学习 iOS 物联网应用开发的以下关键概念：\n\n- 设置树莓派\n- 安装 Linux 软件包，例如`Node.js`，及其依赖项\n\
  - 安装和配置`HomeBridge`\n- 通过家庭应用注册设备\n- 调试`HomeBridge`\n\n在本章中，你将使用树莓派作为硬件开发平台。与 Arduino\
  \ 类似，树莓派也是一种流行的开源硬件平台。但与 Arduino 不同的是，只有少数几款由树莓派基金会（[`www.raspberrypi.org`](http://www.raspberrypi.org)）官方支持的树莓派设备，而且树莓派旨在运行\
  \ Linux 并提供类似台式计算机的功能，而 Arduino 则用于驱动传感器。因此，树莓派被称为**单板计算机**。作为一台完整的 Linux 计算机，你可以运行大多数\
  \ Linux 软件包。在本章中，你将利用`Node.js`来运行`HomeBridge`服务及其插件。`Node.js`是一个运行时环境，允许你从命令行运行\
  \ JavaScript 程序，如今常被用作 Web 服务器以及用 C 等编译型语言编写的启动工具的替代品。\n\n根据你的需求，你最终可能会考虑使用 BeagleBone\
  \ 或 Asus Tinker Board 来代替树莓派，但我认为树莓派的设置过程和用户社区对初学者最友好。\n\n像往常一样，你可以在本书 GitHub 页面（[`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)）的`Chapter`\
  \ `7`文件夹下找到此项目的 iOS 代码。该项目树莓派部分的配置脚本包含在`Chapter` `7`文件夹下的`Pi`子文件夹中。\n\n## 设置树莓派\
  \ HomeKit 桥接器\n\n在本章中，你将使用一个树莓派作为 IOTHome 门磁传感器和直接连接到树莓派的温度传感器的 HomeKit 桥接器。这将允许用户通过\
  \ Siri 中的语音命令以及本章稍后将构建的配套应用来访问这两类统计数据。\n\n虽然本章涉及硬件部分，但其中很多内容将基于你在第 5 章中学到的知识。与 Arduino\
  \ 不同，你无需安装特殊的 IDE 来连接树莓派。但是，你将需要多花一点时间在设置上，以确保`HomeBridge`能正常工作。\n\n### 组装硬件\n\n\
  对于这个项目，硬件需求是一块能够运行`HomeBridge`的树莓派，以及一个用于读取树莓派所在房间温度的温度传感器。在表 7-1 中，我列出了组装本项目电路时使用的零件清单。\n\
  \n表 7-1\n\nHomeKit 桥接器项目零件清单\n\n| **零件名称** | **数量** | **贸泽电子零件号** |\n| --- | ---\
  \ | --- |\n| 树莓派 3（或更新版本） | 1 | RPI3-MODBP-BULK |\n| 无焊面包板 | 1 | 854-BB170-WH |\n\
  | 面包板跳线包 | 1 | 713-110990049 |\n| DHT22 温度传感器 | 1 | 485-385 |\n| microSD USB 读卡器/写入器\
  \ | 1 | 485-939 |\n| 16GB（或更大）microSD 存储卡 | 1 | 467-SDSDQAD-016G |\n\n让我们稍微回顾一下第\
  \ 5 章和第 6 章，过去几年物联网应用普及带来的最大好处之一是，爱好者们可以更容易地获得低成本传感器。正如你在零件清单中会注意到的，我为我们的项目选择了 DHT22\
  \ 温湿度传感器模块。该模块将湿度传感器的集成电路及其支持部件（例如电容器、电阻器）集成在一个封装中，并提供了一个简单的三针接口，由电源引脚、接地引脚和数据引脚组成。虽然你可以将传感器直接连接到树莓派的排针上，但我建议使用面包板，以便将来更容易移动和重新配置电路。\n\
  \n在零件清单中，我指定了“任何现代的、支持无线功能的树莓派”。为了运行`HomeBridge`，你的主机设备不仅必须能够运行`Node.js`服务器，还需要\
  \ Wi-Fi 和蓝牙，以便与你的 HomeKit 中枢（家中的 iPad、HomePod 或 Apple TV）进行通信。虽然本章提供的脚本和说明可以在任何能够运行最新版本\
  \ Raspbian Linux 发行版的树莓派上运行，但树莓派 3 和树莓派 Zero W 是首批内置蓝牙和 Wi-Fi 的设备。如果你有树莓派 2 或 Pi\
  \ Zero，并且已经为其配置了 USB 蓝牙和 Wi-Fi 模块，我们非常欢迎你在此使用它们。\n\n另外，如果你不熟悉树莓派的工作原理，它需要一张 microSD\
  \ 卡来运行其系统镜像。它带有一个小型引导加载程序，但该程序只能启动 microSD 卡上的镜像。对于电源，你可以使用任何能够输出 5V 直流电的设备，例如计算机的\
  \ USB 端口、便携式电池或 USB 墙插式电源适配器。\n\n收集齐所有零件后，它们应该类似于图 7-1 照片中的样子。我在实现中使用了树莓派 3，因为我认为它最容易获得，而且其较大的尺寸使得操作非常方便。\n\
  \n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig1_HTML.jpg](img/346879_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\nIOTHome 项目收集的零件\n\n\n\n#### 组装电路\n\n本项目的电路组装非常直接。如图 7-2 所示，你主要需要将温度传感器的\
  \ `VCC` 和 `GND` 引脚连接到树莓派上的对应引脚，然后将 `DATA` 引脚连接到树莓派上任意可用的通用输入/输出（`GPIO`）引脚。在本项目中，我选择了\
  \ `GPIO21`（引脚 40）。\n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig2_HTML.jpg](img/346879_2_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\n\nIOTHome 项目原理图\n\n为了进行连接，我使用了公对母排线。我将母头端连接到树莓派的排针上，公头端插入面包板。然后，我将 `DHT22`\
  \ 温度传感器直接连接到面包板。我在图 7-3 中附上了已完成电路的实物照片。同样，我使用了颜色编码的排线和面包板跳线，以便快速调试电路。\n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig3_HTML.jpg](img/346879_2_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n\nIOTHome 项目完成后的电路实物照片\n\n### 引导启动树莓派\n\n既然项目的辅助电路已经完成，你可以开始引导启动树莓派了。*引导启动*（Bootstrapping）是\
  \ Linux 和嵌入式系统中使用的一个术语，指的是准备系统以便首次启动（\"自举启动\"）。\n\n正如我之前提到的，树莓派上的引导加载程序只能启动插入设备中的\
  \ microSD 卡上的任何内容。对于本项目，你将使用树莓派基金会提供的 Raspbian Linux 发行版作为树莓派的操作系统。如果你之前曾在台式电脑上使用过\
  \ Ubuntu，你会非常熟悉 Raspbian 的工作方式，因为它们共享同一个“亲戚”：Debian Linux。这两个发行版都共享与 Debian 相同的包管理器和架构，只是根据其预期用途进行了细微调整。\n\
  \n要安装 Raspbian，第一步是从树莓派基金会网站（`www.raspberrypi.org/downloads/raspbian/`）下载一个预构建的镜像文件，其中包含一个预构建的、可启动的\
  \ Raspbian 实例。如图 7-4 所示，从下载页面选择 Raspbian、Raspbian Stretch with Desktop，然后点击下载 ZIP。Desktop\
  \ 版和 Lite 版的主要区别在于，Lite 版牺牲了 GNOME 桌面图形用户界面，仅提供命令行界面。如果你对命令行操作感到舒适，欢迎安装 Lite 版，但我推荐完整的\
  \ Desktop 版，因为 GNOME 使树莓派更易于配置，并且方便日后将其用于其他目的。\n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig4_HTML.jpg](img/346879_2_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4\n\n从树莓派网站下载 Raspbian 镜像\n\n一旦 zip 文件下载完成，你需要将其写入 microSD 卡，方式要能让引导加载程序将其识别为有效的磁盘镜像。磁盘镜像打包了操作系统的文件以及创建者认为对镜像使用者有用的任何文档和配置文件。对于\
  \ Linux 发行版，它们提供了一种有用的方式来与最终用户共享发行版，而无需迫使他们经历一个漫长且敏感的安装过程。一位熟练的工程师会构建一个他或她认为对大多数用户来说合适的起始系统，然后进行分享。然而，如果磁盘镜像没有以正确的方式解包和安装，目标计算机将无法使用它。我倾向于用来将树莓派镜像烧录到\
  \ microSD 卡的工具是 Etcher（`https://etcher.io`）。它拥有易于理解的用户界面和高可靠性。如图 7-5 所示，安装 Etcher\
  \ 后，将 microSD 卡插入 Mac 的适配器并打开 Etcher。在其单屏用户界面中，选择 Raspbian 镜像的 ZIP 文件以及对应于 microSD\
  \ 卡的驱动器，然后选择“Flash!”开始镜像烧录过程。如果你的 microSD 卡没有出现在 Etcher 中，请检查 microSD 卡和适配器是否都已牢固地连接到你的\
  \ Mac。\n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig5_HTML.jpg](img/346879_2_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\n\n使用 Etcher 将 Raspbian 镜像烧录到 microSD 卡\n\nEtcher 会播放声音并弹出一个窗口，通知你磁盘镜像已成功写入。此时，可以安全地从\
  \ Mac 上移除 microSD 卡，并将其插入树莓派底部的插槽中，如图 7-6 所示。此时，你还应将一个基于 HDMI 的显示器以及 USB 键盘/鼠标连接到树莓派。\n\
  \n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig6_HTML.jpg](img/346879_2_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6\n\n将 microSD 卡插入树莓派\n\n所有准备工作完成后，将电源连接到标有 `PWR` 的 USB 端口，等待一两分钟，让 GNOME\
  \ 桌面启动。当桌面准备就绪时，显示器上的图像应类似于图 7-7。\n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig7_HTML.jpg](img/346879_2_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n\n新安装的 Raspbian 发行版桌面截图\n\n如图 7-8 所示，在系统托盘的右上角找到 Wi-Fi 图标，然后点击它以显示网络选择下拉菜单。选择你的网络，然后在提示时输入密码。\n\
  \n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig8_HTML.jpg](img/346879_2_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8\n\n从 Raspbian 桌面选择 WiFi 网络\n\n在最后的配置步骤中，你必须使用树莓派配置工具启用树莓派上的硬件接口。这将允许你访问预装在\
  \ Raspbian 中但出于安全原因默认禁用的 `I2C`、`SPI` 和其他硬件通信库。如图 7-9 所示，要找到此工具，请点击系统托盘左上角的树莓派图标，导航至“首选项”，然后选择“树莓派配置”。在弹出的应用程序中，点击“接口”选项卡，然后勾选\
  \ `SPI`、`I2C` 和 `1-Wire` 复选框以启用它们。点击“确定”后，系统将要求你重启树莓派以保存设置。\n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig9_HTML.jpg](img/346879_2_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9\n\n在树莓派上启用硬件接口\n\n如果你想使用如 RealVNC 或 TightVNC 这样的远程桌面客户端来查看树莓派的桌面而无需连接显示器，你同样可以在配置工具中启用此功能。下次树莓派重启时，RealVNC\
  \ 服务器应用程序将启动，并提示你配置设备的 VNC 设置。\n\n\n\n### 安装 HomeBridge  \n\n完成项目的硬件设置阶段后，现在可以将注意力转移到安装\
  \ HomeBridge 及其依赖项上，这是将树莓派用作 HomeKit 桥接器之前的倒数第二步。  \n\n如本章开头所述，HomeBridge 及其核心依赖项\
  \ HAP-NodeJS（实现 HomeKit 配件协议的库）作为 Node.js 应用程序运行。您必须通过安装 Node.js 来开始设置此过程。尽管默认包管理器（`apt-get`）提供的\
  \ Node.js 发行版非常稳定，并且适合大多数常见用例，但 HomeBridge 需要稍新、功能更强大的 Node.js 版本，您必须自行安装。要开始此过程，请导航至\
  \ Node.js 发行版网站（[`nodejs.org/dist/`](http://nodejs.org/dist/)）并选择 Node.js 8 的最新版本（[`nodejs.org/dist/latest-v8.x/`](http://nodejs.org/dist/latest-v8.x/)）。在此目录下，您将看到几个可供下载的不同文件，它们的名称因操作系统和处理器架构而异（例如，`x86`、`ARMv6`）。这些表示所附二进制文件编译的目标平台。对于树莓派，您应搜索最新的\
  \ Linux/ARMv6L 存档。在撰写本文时，此文件的 URL 为 [`nodejs.org/dist/latest-v8.x/node-v8.11.4-linux-armv6l.tar.gz`](http://nodejs.org/dist/latest-v8.x/node-v8.11.4-linux-armv6l.tar.gz)。\
  \  \n\n虽然您可以通过浏览器下载存档，但我建议使用 OS X 终端。默认情况下，您的树莓派会通过 Bonjour 广播其主机名（`raspberrypi.local`）。您可以在终端中尝试以\
  \ `pi` 用户登录 SSH 来连接到它。  \n\n```\nssh pi@raspberrypi.local\n```\n\n如图 7-10 所示，连接到设备后，使用\
  \ `wget` 命令下载文件。  \n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig10_HTML.jpg](img/346879_2_En_7_Fig10_HTML.jpg)\
  \  \n\n**图 7-10** 通过树莓派终端下载 Node.js  \n\n```\nwget http://nodejs.org/dist/latest-v8.x/node-v8.11.4-linux-armv6l.tar.gz\n\
  ```\n\n### 注意  \n\n在撰写本文时，我发现用于树莓派的 Node.js 8 二进制文件比 Node.js 9 二进制文件与 HomeBridge\
  \ 及本章插件的兼容性更好。欢迎您尝试任意一个！  \n\n下载完成后，您必须使用 `tar` 命令解压存档。对于前面提到的文件，我使用的命令是  \n\n```\n\
  tar -xvf node-v8.11.4-linux-armv6l.tar.gz\n```\n\n解压文件后，您必须将 Node 二进制文件复制到用户安装软件的默认位置：`/usr/local`。这将允许\
  \ HomeBridge 和您以后可能编写的其他 Node 应用程序像使用由 `apt-get` 包管理器安装的软件一样使用这些二进制文件。对于我的 Node\
  \ 版本，我使用以下命令来复制文件：  \n\n```\nsudo cp -R node-v8.11.4-linux-armv6l/* /usr/local/\n\
  ```\n\n您可以通过重启树莓派并尝试运行查询当前安装版本的 Node 命令来验证文件是否已正确复制：  \n\n```\nnode -v\n```\n\n\
  结果应打印出您手动下载的版本号。  \n\n在安装 HomeBridge 之前，您必须安装它所依赖的其他几个软件包，具体来说，是最新版本的 C++、Python\
  \ 开发工具、WiringPi、AVAHI、PiGPIO 和 BCM2835。这些将允许 HomeBridge 在 Node 内部与 GPIO 引脚和蓝牙交互。您可以使用\
  \ `apt-get` 包管理器轻松安装 C++ 和 Python 开发工具，如下所示：  \n\n```\nsudo apt-get install g++\n\
  sudo apt-get install libavahi-compat-libdnssd-dev\nsudo apt-get install python-dev\n\
  sudo apt-get install pigpio python-pigpio\n```\n\n运行这些命令后，您必须将 PiGPIO 作为服务启用并重启\
  \ Pi，如下所示：  \n\n```\nsudo systemctl enable pigpiod.service\n```\n\nBCM2835 包是允许\
  \ WiringPi 访问树莓派上 GPIO 引脚的 C 库，必须首先安装。首先从 [www.airspayce.com/mikem/bcm2835/](http://www.airspayce.com/mikem/bcm2835/)\
  \ 找到该包的最新版本，使用 `wget` 命令下载，然后像处理 Node 一样使用 `tar` 解压。  \n\n```\nwget http://www.airspayce.com/mikem/bcm2835/bcm2835-1.56.tar.gz\n\
  tar -xvf bcm2835-1.56.tar.gz\n```\n\n与 Node 不同，您必须运行 BCM2835 的构建脚本来正确安装它。按顺序运行以下命令，为您的硬件配置库、验证它，然后安装它：\
  \  \n\n```\ncd bcm2835-1.56\n./configure\nmake\nsudo make check\nsudo make install\n\
  ```\n\n如果运行最后一个 `make` 命令时没有出现构建失败，则可以验证安装成功。  \n\n要安装 WiringPi，您必须从 GitHub 下载它。您可以按照以下\
  \ `git pull` 命令从命令行执行此操作，该命令会创建项目的本地克隆：  \n\n```\ngit clone git://git.drogon.net/wiringPi\n\
  ```\n\n与 BCM2835 一样，您必须运行构建脚本才能在树莓派上安装该包。对于 WiringPi，这些命令是  \n\n```\ncd wiringPi/\n\
  ./build\n```\n\n要验证包是否正确安装，请尝试运行 `gpio readall` 命令以回显树莓派上所有引脚的状态。您的输出应包含一个引脚状态表，类似于图\
  \ 7-11 截图中的内容。  \n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig11_HTML.jpg](img/346879_2_En_7_Fig11_HTML.jpg)\
  \  \n\n**图 7-11** 使用 `gpio readall` 命令查询 GPIO 状态  \n\n现在，您终于可以安装 HomeBridge 了！要安装\
  \ HomeBridge，请使用 Node 包管理器（NPM）下载它。  \n\n```\nsudo npm install -g --unsafe-perm\
  \ homebridge\n```\n\n安装需要几分钟才能完成。由于 iOS 的 Home App 管理着一个 HomeKit 设备数据库，验证您是否创建了一个有效设备的最简单方法是在您想要使用的所有插件配置完毕后，尝试注册该设备。在接下来的两节中，我将解释从温度传感器和蓝牙设备（您在第\
  \ 6 章中创建的门传感器）读取数据所需执行的步骤。  \n\n### 警告  \n\n`-g` 和 `--unsafe-perm` 标志确保 Node 包被全局安装（适用于所有应用程序），并且不限制谁可以执行它们。运行\
  \ HomeBridge 需要全局设置；但是，如果您担心家庭/办公室网络中的安全威胁，您可能需要考虑寻找非安全权限设置的替代方案。\n\n\n\n### 配置\
  \ HomeBridge 以读取温度传感器数据\n\n正如本章开头所述，HomeBridge 的一大优势在于它拥有一个非常活跃维护、易于使用的插件系统。要读取\
  \ DHT22 温湿度传感器的温度，可以使用 `homebridge-dht` 插件。与 HomeBridge 本身一样，它也可以作为 NPM 包使用。使用以下命令全局安装该插件：\n\
  \n```\nsudo npm install -g homebridge-dht --unsafe-perm\n```\n\n为帮助验证 DHT22 传感器和插件是否正常工作，我建议像之前安装\
  \ Node 一样，在命令行中创建一个用于读取传感器状态的二进制文件。\n\n```\nsudo cp /usr/local/lib/node_modules/homebridge-dht/dht22\
  \ /usr/local/bin/dht22\n```\n\n与 Node 不同，你必须显式地为 `dht22` 二进制文件赋予可执行权限，才能从命令行运行它。你可以使用\
  \ `chmod` 命令配合 `a+x` 参数（添加可执行权限）来执行此操作。\n\n```\nsudo chmod a+x /usr/local/bin/dht22\n\
  ```\n\n现在，你可以使用 `dht22` 命令来验证 HomeBridge 是否能够访问传感器。要测试此功能，请尝试运行 `dht22` 命令，并指定传感器连接到\
  \ GPIO 21 引脚，如下所示：\n\n```\ndht22 -g 21\n```\n\n如果你的电路和 HomeBridge 包设置正确，终端上应打印出三个数字，分别包含读取计数、温度和湿度。对于我的传感器，结果如下：\n\
  \n```\n0 28.2 C 41.5 %\n```\n\n### 注意\n\n在我为此项目调试示例时，我发现此步骤中的错误大多是由于 PiGPIO 和 WiringPi\
  \ 安装不完整，或 DHT22 传感器供电不足造成的。我发现 5V 电压对 DHT22 效果最好，而其较低规格的同类产品 DHT11 则在 3.3V 电压下表现更好。\n\
  \n在确认 DHT22 传感器和二进制文件运行正常后，你可以开始为 HomeBridge 编写配置文件。除了其插件系统外，HomeBridge 还允许你使用 JSON\
  \ 文件轻松配置设备。首先，使用以下命令创建一个空配置文件：\n\n```\nmkdir .homebridge\ntouch .homebridge/config.json\n\
  ```\n\nHomeBridge 要求名为 `config.json` 的配置文件位于用于运行应用程序的用户账户的隐藏文件夹 `.homebridge` 中，因此请务必严格按照上述命令进行输入。\n\
  \n接下来，使用你喜欢的命令行文本编辑器打开 `config.json` 文件。将清单 7-1 中的文本输入此文件作为配置。\n\n```\n{\n    \"\
  bridge\": {\n        \"name\": \"IOTHome\",\n        \"username\": \"CC:22:3D:E3:CD:31\"\
  ,\n        \"port\": 51826,\n        \"pin\": \"031-45-154\"\n    },\n    \"description\"\
  : \"IOTHome HomeBridge\",\n    \"platforms\": [],\n    \"accessories\": [\n    \
  \    {\n            \"accessory\": \"Dht\",\n            \"name\": \"室内舒适度传感器\"\
  ,\n            \"name_temperature\": \"温度\",\n            \"name_humidity\": \"\
  湿度\",\n            \"gpio\": \"21\",\n            \"service\": \"dht22\"\n     \
  \   }\n    ]\n}\n```\n\n*清单 7-1 HomeBridge 的配置文件 JSON（config.json）*\n\n关于该文件，需要说明的是：`bridge`\
  \ 字典指定了用于将树莓派暴露为有效 HomeKit 桥接器的值，具体包括设备名称、端口、PIN 码和 HomeKit 的\"用户名\"。你可以根据需要更改这些值，但要注意保持端口号和用户名的十六进制数字格式。`accessories`\
  \ 字典指定了将连接到桥接器的每个配件的配置数组。具体的键值对必须来自你所用插件的文档。对于 HomeBridge 的 DHT 传感器，此文档可在 [www.npmjs.com/package/homebridge-dht](http://www.npmjs.com/package/homebridge-dht)\
  \ 找到。本项目配置中特别值得关注的是 `gpio` 和 `service` 键值对。你可能已经注意到，`\"gpio\": \"21\"` 表示传感器连接到\
  \ GPIO 21 引脚；`\"service\": \"dht22\"` 键值对指定你使用的是 DHT22 传感器，而不是该系列中的其他芯片，例如 DHT11。\n\
  \n完成这些步骤后，温度传感器即可与你的树莓派和 HomeBridge 进行交互。如果你不希望设置与门磁传感器的蓝牙连接或设备的启动选项，可以直接跳到\"连接到你的新\
  \ HomeKit 桥接器\"部分，立即开始使用传感器。\n\n\n\n### 配置 HomeBridge 以连接蓝牙低功耗配件\n\nHomeBridge 可用的另一个强大插件是\
  \ `homebridge-bluetooth`，它允许你通过 HomeKit 连接蓝牙外设。该插件充当蓝牙客户端（例如第 6 章中的 IOTHome 应用），除了读取状态外，还可用于控制设备。这一功能让你可以询问\
  \ Siri“入户门传感器是否开着”，并根据你自建传感器传来的数据获得响应。\n\n安装插件前，你需要解决几个依赖项。首先，通过 `npm` 安装 `node-gyp`\
  \ 和 `noble` Node.js 模块。\n\n```\nsudo npm install -g --unsafe-perm node-gyp\nsudo\
  \ npm install -g --unsafe-perm noble\n```\n\n接下来，根据 Noble 的 GitHub 文档（`https://github.com/noble/noble`）中的提示，你必须允许非管理员账户在树莓派上使用蓝牙低功耗工具，操作如下：\n\
  \n```\nsudo setcap cap_net_raw+eip $(eval readlink -f `which node`)\n```\n\n出于安全考虑，始终建议仅将网络和硬件访问权限锁定给受信用户。但在原型开发阶段，额外的安全措施可能会增加障碍，导致调试困难。对于计划长期使用的\
  \ HomeKit 桥接器，我建议在熟悉 HomeBridge 后撤销此设置。\n\n现在，你终于可以使用 `npm` 安装 `homebridge-bluetooth`\
  \ 了。\n\n```\nsudo npm install -g --unsafe-perm homebridge-bluetooth\n```\n\n与 `homebridge-dht`\
  \ 类似，要将该插件作为桥接器的一部分使用，你需要按照开发者提供的规范（位于 `www.npmjs.com/package/homebridge-bluetooth`），将配置信息添加到\
  \ HomeBridge 配置文件（`~/.homebridge/config.json`）中。在我的实现中，我选择遵循他们的 `switch` 示例，该示例将门传感器注册为一个智能开关。虽然也有\
  \ `lock` 示例，但它主要针对控制流行的物联网智能锁。遗憾的是，IOTDoor 项目尚未满足该规范。在代码清单 7-2 中，我提供了用于门传感器的配置文件。\n\
  \n```\n{\n    \"bridge\": {\n        \"name\": \"IOTHome\",\n        \"username\"\
  : \"CC:22:3D:E3:CD:31\",\n        \"port\": 51826,\n        \"pin\": \"031-45-154\"\
  \n    },\n    \"description\": \"IOTHome HomeBridge\",\n    \"platforms\": [\n \
  \       {\n            \"platform\": \"Bluetooth\",\n            \"accessories\"\
  : [\n                {\n                    \"name\": \"IOTDoor\",\n           \
  \         \"address\": \"30:AE:A4:28:73:76\",\n                    \"services\"\
  : [\n                        {\n                            \"name\": \"Door Sensor\"\
  ,\n                            \"type\": \"Switch\",\n                         \
  \   \"UUID\": \"83b46845-6e9c-4b25-89cf-871cc74cc68e\",\n                      \
  \      \"characteristics\": [\n                                {\n             \
  \                       \"type\": \"On\",\n                                    \"\
  UUID\": \"4b61d6b9-2e29-4fdf-a74a-7b8bf70ecd9a\"\n                             \
  \   }\n                            ]\n                        }\n              \
  \      ]\n                }\n            ]\n        }\n    ],\n    \"accessories\"\
  : [\n        {\n            \"accessory\": \"Dht\",\n            \"name\": \"Indoor\
  \ Comfort Sensor\",\n            \"name_temperature\": \"Temperature\",\n      \
  \      \"name_humidity\": \"Humidity\",\n            \"gpio\": \"21\",\n       \
  \     \"service\": \"dht22\"\n        }\n    ]\n}\n```\n**代码清单 7-2** 包含蓝牙的 Homebridge\
  \ 配置文件（`config.json`）\n\n配置中有三个方面需要特别注意。首先，`homebridge-bluetooth` 通过 `platform`\
  \ 配置而非 `accessory` 来实现其接口。\n\n其次，为了桥接正确的蓝牙功能，你必须将 Arduino 程序中锁状态的精确服务和特性 UUID 填入\
  \ `config.json` 文件。最后，为了找到设备，你必须提供其广播时使用的名称和硬件地址。在第 6 章的 Arduino 设置代码中，你无需设置硬件地址，因为它由\
  \ ESP32 微控制器中的蓝牙低功耗模块生成。不过，你可以使用树莓派上的扫描工具来查找硬件地址。在确认你的门传感器当前未连接任何设备后，运行以下命令：\n\n\
  ```\nsudo hcitool lescan\n```\n\n输出应包含树莓派物理附近正在广播的蓝牙低功耗设备列表，如图 7-12 所示。\n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig12_HTML.jpg](img/346879_2_En_7_Fig12_HTML.jpg)\n\
  \n**图 7-12** 使用 `hcitool` 工具扫描蓝牙低功耗设备的结果\n\n将 IOTDoor 传感器的十六进制硬件地址复制到 HomeBridge\
  \ 配置文件中后，保存结果。至此，你的 HomeKit 桥接器已完全配置完成！\n\n\n\n### 配置 HomeBridge 开机自启动（实验性功能）\n\n\
  为了让您的新 HomeKit 桥接器满足用户期望，即插电就能正常工作，您需要配置树莓派，使其在开机时自动启动 HomeBridge。我将此部分标记为实验性功能，因为在研究过程中，我发现很难找到一种既符合\
  \ Linux 管理标准、又易于解释且稳定（即每次启动均无错误）的配置方法。我在此提供的解决方案主要参考了官方 HomeBridge GitHub 文档（`https://github.com/nfarina/homebridge/wiki/Running-HomeBridge-on-a-Raspberry-Pi#running-homebridge-on-bootup`）以及\
  \ Tim Leland 的补充指南（`https://timleland.com/setup-homebridge-to-start-on-bootup/`）。根据我的实验，这些说明在经历一到两次调试会话后效果最佳。经过大量试错后，我发现稳定性开始显著下降。此时，重置树莓派并从零开始对我来说效果最好。\n\
  \n要开始配置过程，首先使用 `useradd` 命令创建一个名为 `homebridge` 的系统用户：\n\n```\nsudo useradd --system\
  \ homebridge\n```\n\n对于启动脚本，通常的做法是使用专用的用户账户来运行。这可以让您根据预期角色来区分不同用户，并通过防止任务以完全管理员权限运行来增强安全性。\n\
  \n接下来，您必须指定该任务的启动选项。使用 `nano` 或您喜欢的其他文本编辑器，创建一个名为 `/etc/default/homebridge` 的新文件。\n\
  \n```\nsudo nano /etc/default/homebridge\n```\n\n对于配置文件的内容，请使用示例 7-3。最重要的配置选项是 `HOMEBRIDGE_OPTS`，它指定了\
  \ HomeBridge 配置文件的存放位置。对于本项目，您需要将配置复制到 `/var/lib/homebridge`，以便 `homebridge` 用户可以更方便地访问。\n\
  \n```\n# homebridge 的默认配置/选项\n# 以下设置告诉 homebridge 在哪里找到 config.json 文件以及在哪里持久化数据（例如配对信息等）\n\
  HOMEBRIDGE_OPTS=-U /var/lib/homebridge\n# 如果您取消注释以下行，homebridge 将会记录更多日志\n# 您可以通过\
  \ systemd 的 journalctl 查看：journalctl -f -u homebridge\nDEBUG=*\n列表 7-3\nHomeBridge\
  \ 启动选项文件\n```\n\n保存启动选项文件后，您必须定义服务本身。同样，使用您喜欢的文本编辑器，创建一个名为 `/etc/systemd/system/homebridge.service`\
  \ 的文件。\n\n```\nsudo nano /etc/systemd/system/homebridge.service\n```\n\n使用列表 7-4\
  \ 的内容作为填充服务定义的指南。在此文件中，请注意 `User` 键（它定义了将使用哪个用户账户来运行服务）以及 `ExecStart` 键（它定义了 HomeBridge\
  \ 的安装位置）。\n\n```\n[Unit]\nDescription=Node.js HomeKit 服务器\nAfter=syslog.target network-online.target\n\
  [Service]\nType=simple\nUser=homebridge\nEnvironmentFile=/etc/default/homebridge\n\
  # 根据您的具体设置进行调整（可能是 /usr/bin/homebridge）\n# 更多信息请参阅下方注释\nExecStart=/usr/local/bin/homebridge\
  \ $HOMEBRIDGE_OPTS\nRestart=on-failure\nRestartSec=10\nKillMode=process\n[Install]\n\
  WantedBy=multi-user.target\n列表 7-4\nHomeBridge 启动服务定义\n```\n\n接下来，您必须将本地的 HomeBridge\
  \ 配置文件从您的 `.homebridge` 目录复制到一个专用于 `homebridge` 用户的新目录。如列表 7-5 所示，创建一个名为 `/var/lib/homebridge`\
  \ 的新目录，将所有旧文件复制到那里，然后使这些文件可执行。\n\n```\nsudo mkdir /var/lib/homebridge\nsudo cp ~/.homebridge/config.json\
  \ /var/lib/homebridge/\nsudo chmod -R 0777 /var/lib/homebridge\n列表 7-5\n移动 HomeBridge\
  \ 配置文件\n```\n\n最后，当文件移动完成后，使用 `systemctl` 命令注册该服务。\n\n```\nsudo systemctl daemon-reload\n\
  ```\n\n至此，当树莓派开机启动时，您的 HomeBridge 安装就准备启动就绪了！\n\n\n\n### 连接到你的新 HomeKit 桥接器\n\n\
  在经历了设置树莓派、HomeBridge、其插件以及创建配置文件这一漫长而艰巨的过程后，现在你终于可以启动 HomeBridge，并尝试在 iOS 的“家庭”App\
  \ 中找到你的新 HomeKit 桥接器了。\n\n首先，在你的树莓派上启动 HomeBridge。通过运行命令 `homebridge -D &`（这些选项会提供更多调试信息，并让应用在后台运行）即可完成\
  \ HomeBridge 的标准安装。如果你已经完成了启动服务的设置，那么通过运行命令 `sudo systemctl start homebridge` 即可启动。接下来，需要监控控制台输出，确保\
  \ HomeBridge 在启动过程中没有报错。对于标准安装，这些信息会在 HomeBridge 启动时显示在终端中。对于启动服务安装，你需要通过命令 `sudo\
  \ journalctl -au homebridge` 来监控其状态。当 HomeBridge 成功启动后，你应该会看到日志消息，表明蓝牙和 DHT 传感器接口已成功建立，更重要的是，还会看到一个大型二维码，你可以使用它从“家庭”App\
  \ 来设置桥接器，如图 7-13 所示。\n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig13_HTML.jpg](img/346879_2_En_7_Fig13_HTML.jpg)\n\
  \n图 7-13\n\nHomeBridge 为 HomeKit 配置生成的二维码\n\n接下来，在你的 iPhone 或 iPad 上打开“家庭”App。它应该会以选中“家庭”标签页的状态启动，显示你当前已配置的\
  \ HomeKit 家庭和设备的概览。如图 7-14 所示，按下右上角的“添加”按钮（+ 号），然后从出现的操作列表中选择“添加配件”。这将带你进入一个带有相机视图的屏幕，你可以用它扫描\
  \ HomeKit 设置二维码。此时，扫描 HomeKit 控制台输出中显示的二维码。\n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig14_HTML.jpg](img/346879_2_En_7_Fig14_HTML.jpg)\n\
  \n图 7-14\n\n使用“家庭”App 添加 HomeKit 配件\n\n当“家庭”App 识别出二维码后，你会收到一个弹出窗口，询问你是否确认要添加一个非官方的\
  \ HomeKit 设备。这表示 HomeBridge 已成功将你的桥接器作为有效的 HomeKit 设备进行广播。如果“家庭”App 无法识别你的二维码，你可以使用“添加配件”屏幕上的“没有或无法扫描代码”按钮，手动输入\
  \ HomeBridge 配置文件中的 PIN 码。如果你的设备设置正确，成功输入 PIN 码后应该能找到你的设备，并显示相同的弹出窗口。\n\n确认你的选择后，屏幕上会出现“正在添加...”的消息，持续几秒钟，同时桥接器正在被注册到\
  \ HomeKit 数据库中。如图 7-15 所示，注册完成后，系统会要求你为通过桥接器暴露的每个服务分配房间和显示名称。针对我的配置，我将温度和湿度服务分配给了卧室，门传感器分配给了入口。这样我就可以说“入口的门开关是开着的吗？”或者“卧室的温度是多少？”。\n\
  \n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig15_HTML.jpg](img/346879_2_En_7_Fig15_HTML.jpg)\n\
  \n图 7-15\n\n为新的 HomeKit 设备分配详细信息\n\n设置完成后，你将返回到“家庭”标签页。如图 7-16 所示，该标签页现在将包含来自你 HomeKit\
  \ 桥接器的服务，以及每个服务的最新数值。作为最后一项测试，说“嘿，Siri”以激活 Siri，然后询问你卧室的温度。几秒钟后，Siri 应该会读出树莓派上的最新数值。\n\
  \n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig16_HTML.jpg](img/346879_2_En_7_Fig16_HTML.jpg)\n\
  \n图 7-16\n\n使用“家庭”App 和 Siri 确认 HomeKit 桥接器正常运行\n\n### 排查配置问题\n\n在编写本章时，我遇到的最常见的调试问题是，更改\
  \ HomeBridge 配置后，即使重启了所有设备，HomeKit 也无法找到新的服务。为了解决这个问题，我找到了两个最快捷的技巧：更改 HomeKit 桥接器的\
  \ `username`，以及清空 HomeBridge 配置目录中的 `persist` 文件夹（路径为 `~/.homebridge/persist` 或\
  \ `/var/lib/homebridge`，具体取决于你的启动方法）。\n\n如本章开头所述，HomeKit 是一个安全的设备数据库，由你的 Apple 设备和\
  \ HomeKit 中枢管理。与此相辅相成，HomeBridge 将已保存设备的信息存放在其 `persist` 文件夹中。清空此文件夹会重置树莓派上已保存的信息。虽然你可以通过\
  \ iOS 设备上的“家庭”App 删除并重新添加设备，但你无法自行完全擦除其数据库。但是，通过更改用户名的某些字节（例如，将最后两位数字从 30 改为 31），你可以让\
  \ HomeKit 认为你正在连接一台新设备，从而允许你重新进入配置流程。\n\n## 总结\n\n在本章中，你学习了如何利用树莓派单板计算机的能力，运行 HomeBridge\
  \ 作为一个基于 Node.js 的 HomeKit 桥接器，用于你在第 5 章和第 6 章中构建的门传感器以及温度传感器。这不仅扩展了你 IOTHome 的智能功能，还使你能够利用\
  \ Siri 命令来获取家庭传感器的统计数据。\n\n本章最艰巨的部分是引导树莓派、HomeBridge 及其所有依赖项，但我希望你能够在自己的项目中再次使用本章作为快速设置指南。在后续章节中，你将进一步扩展树莓派的功能，将其打造成一个网络服务器。对于一台\
  \ 35 美元的电脑来说，这已经很不错了！\n\n本章中的说明是针对树莓派优化的，但稍加修改即可适用于 BeagleBone、Mac 或任何其他可以运行 Node.js\
  \ 的基于 Linux 的系统。\n\n\n\n"
- '# 在树莓派上搭建网页服务器


  在万维网（即你今天所知的基于浏览器的*互联网*）早期，网页服务器的概念对大多数开发者而言是透明的。你只需安装一个程序来托管你的 HTML 文件（或者在 GeoCities
  等服务平台免费注册一个账号），然后大部分时间都在思考文字该选多大字号、哪里能找到最炫的 GIF 图片。对多数人来说，网页服务器不过是上传文件的地方。


  随着网页开发技术持续进步，越来越多人开始需要自主掌控网站托管，这使得人们对网页服务器技术的认知随之提升。与其依赖托管服务商承诺的安全性和在线时长保证，你完全可以亲手配置服务器，将主动权掌握在自己手中。


  此外，电子商务和电子病历系统等更先进的应用程序开始兴起，它们对用户个性化、数据库集成和安全性都提出了各自的要求。为满足这些需求，PHP 和 Ruby 等脚本语言逐渐流行起来，让程序员能够创建页面，在用户通过浏览器请求页面后立即完成数据处理和静态页面生成的全部逻辑。人们开始开发*网页应用程序*，而不再局限于静态网页。


  在物联网的世界里，你可以利用网页应用程序技术，通过*HTTP*（超文本传输协议）公开物联网设备的数据。每当你使用网页浏览器或连接服务器的应用程序时，它都在使用
  HTTP 传输数据。正如你可能从前几章了解到的，Bluetooth 或 HomeKit 等协议针对特定场景进行了优化，有时需要大量的领域专业知识才能成功部署。而网页技术是一个众所周知的平台，拥有强大的开发社区和较低的硬件要求——你只需要一台能运行网页服务器的设备即可。


  在本章中，你将重温前几章关于树莓派和 Node.js 开发环境的内容，并对其进行扩展：使用 Node.js 的 Express 模块，通过 HTTP 和 HTTPS
  发布相同的数据。由于 Node 的二进制文件体积小、可扩展性强，且拥有庞大的开发者群体，它已成为一等公民式的网页应用程序脚本语言。


  ## 学习目标


  在本章中，你将学习如何在你一直使用的树莓派上搭建网页服务器，通过 HTTPS 端点发布传感器数据，并从 iOS 版 IOTHome 应用连接该服务器。你将使用
  Node.js 创建网页应用程序，并使用 Swift 开发 iOS 应用。虽然已有一些项目正致力于让 Swift 在树莓派上运行，但在当前环境下，Python
  和 Node.js 是在树莓派上构建基于网页的应用程序时文档最完善、支持度最好的选择。


  在本章中，你将学习如何使用 Node.js 的 Express 模块来完成监听 HTTPS 连接并路由到 Node.js 的任务，而不是依赖 Apache 这样的完整网页服务器应用程序。如果你计划在同一服务器上运行多个网页应用程序，可能需要考虑使用
  Apache 或 NGINX 来更好地管理连接。不过，本章的项目旨在模拟单一用途物联网设备或单一用途网页微服务的用例，例如你在 Heroku 或 Amazon
  Web Services Lambda 上托管的服务。


  在构建树莓派网页服务器的过程中，你将学习 iOS 物联网应用开发的以下核心概念：


  -   网页应用程序开发核心概念

  -   设置 Express 以通过 Node.js 公开网页服务

  -   在 Node.js 应用程序中读取温度传感器的数据

  -   在 Node.js 应用程序中读取蓝牙传感器的数据

  -   使用 HTTPS 提供安全性保障


  本章的项目主要基于 Node.js 的 Express 模块。如果你想了解更多关于该模块的信息或获得更多支持，请访问其官方网站：[`www.expressjs.com`](http://www.expressjs.com)。


  ## 创建用于通过 HTTPS 共享数据的网页服务器


  在本节中，我将重点介绍使用 Node.js 和 Express 搭建网页服务器的过程，以及如何使用 Node 模块通过 HTTPS 公开 IOTHome 传感器（温度、湿度、开关状态）生成的数据。本节中的项目假设
  Node.js 和第 7 章的温度传感器已正确设置。如果你对任一方面仍感觉不熟悉，或者你是直接开始本章的学习，我强烈建议你在继续本章之前，先回顾第 7 章的相关设置章节。


  在本节中，你将首先实现一个通过 HTTP 传输数据的网页服务器，然后学习如何为服务器应用 SSL 证书，使其成为 HTTPS 服务器——这是网页应用程序新的安全标准。成功搭建网页服务器后，你将使用它为
  IOTHome 应用程序的主屏幕提供数据。


  ### 使用 Express 公开网页服务


  与 HomeBridge 项目（主要任务是安装和配置由第三方开发的 Node 应用程序）不同，在本章中，你将从头开始开发自己的 Node 应用程序。要开始开发项目，首先确定项目的位置。打开树莓派并开启终端后，在你的主目录下创建两个新目录：`sites`
  和 `iothome`。这些目录分别对应大多数托管 Linux 发行版用作网页应用程序*文档根目录*（起始点）的 `sites` 或 `/var/www/` 目录，以及应用程序本身的位置。如列表
  8-1 所示，创建新目录，然后使用 `cd` 命令将工作目录切换到 `iothome` 目录。


  ```

  mkdir ~/sites

  mkdir ~/sites/iothome

  cd ~/sites/iothome

  ```


  列表 8-1：为 Express 项目创建文件夹


  接下来，你必须使用 `npm` 在 `iothome` 项目的目录中安装 Express。在第 7 章中，你全局安装了 HomeBridge 的模块，这意味着树莓派上所有基于
  Node 的应用程序都可以使用它们。然而，对于应用程序开发，我建议仅在你当前正在处理的项目中安装模块。在多应用程序环境中，这样可以防止对其他项目产生副作用。要为
  IOTHome 项目安装 Express，运行不带全局标志的 `npm install`。


  ```

  npm install express

  ```


  为了验证安装，你可以编写一个简单的 Node 应用程序，使其通过 HTTP 回显 "Hello World"。要开始开发过程，使用 nano 或你喜欢的文本编辑器创建一个名为
  `app.js` 的新 JavaScript 文件。


  ```

  nano app.js

  ```


  与 iOS 或 Arduino 编程（应用程序从非常具体的方法开始执行，例如 iOS 的 `viewDidLoad`、Arduino 的 `setup`）不同，Node
  应用程序会立即开始执行。由于 Node 实现了面向对象编程（OOP）概念，你应该使用这些概念以可预测的方式控制程序流程。要使用 Express，你必须先引入该模块，然后实例化它的一个对象。在
  Express 运行的同时，你可以继续其他操作，但所有 HTTP 请求都必须通过 Express 对象进行处理。要创建你的空白 Express 应用程序，实现列表
  8-2 中的代码示例。


  ```javascript

  var express = require(''express'');

  var app = express();

  ```


  列表 8-2：创建一个新的基于 Express 的 Node 应用程序




