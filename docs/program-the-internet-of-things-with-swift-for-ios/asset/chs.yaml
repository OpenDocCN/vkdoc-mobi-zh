  ### 组装硬件


  我的第一任老板告诉我，在 NASA 工作最棒的一点就是，所有工程师都必须参加 NASA 的焊接培训课程。话虽如此，焊接是一项需要练习和精准度的操作。当处理像微控制器这样敏感的部件时，你必须要小心，不要使用过多的焊料（一种易熔化的金属，用于形成部件之间的连接），否则会有造成短路（两个不应接触的部件之间发生意外的物理连接）的风险。你还必须注意，不要让烙铁（加热焊料的工具）停留时间过长或温度过高，否则可能会烧坏部件。


  为了降低这两种风险，许多工程师会使用面包板（如图 5-3 所示），通过杜邦线在部件之间建立连接。这在原型设计阶段尤其有用，因为你经常要试验不同的部件并修改电路。为了更准确地模拟真实情况，你也会使用面包板来组装这个项目的硬件。如果你对焊接感到得心应手，并希望将设计转移到更紧凑或更稳定的介质上，也欢迎你这么做。


  尽管面包板有各种形状和尺寸，但它们都有一些共同的特点。


  -   外壳通常由坚固的塑料制成，上面有许多金属插孔。

  -   通常，顶部和底部各有一行，标有共享的正极和负极连接。

  -   面包板上大部分物理空间被紧密排列的引脚列所占据，这些列贯穿整个器件。

  -   面包板的中央行通常会有一个凹槽。


  与所有事物一样，这些特性都有其存在的理由。首先，塑料是绝缘体，意味着它不导电（为电流提供通路）。你可以随意触碰塑料区域，不用担心触电。顶部和底部的行是共享连接。你插入这些行中任何一个引脚的部件或导线，都将与该行中的所有其他引脚共享电气连接。大多数电子部件都在直流电压下工作，需要电源（正极）连接和地（负极）连接，就像电池出来的连接一样，因此这些引脚成为电路中共享最频繁的引脚就说得通了。对于较小的共享连接，你将使用面包板中央的列。一列中的所有引脚都是共享的。由于大多数集成电路（IC）都采用双列直插式封装（DIP）标准的外壳，面包板中央的凹槽为你提供了足够的空间，可以插入一个
  IC，并为每个引脚单独使用一列。这样一来，你就可以在不焊接的情况下将其他部件连接到这些引脚上。为了帮助可视化这一点，我在图 5-3 中加入了一张带有注释的面包板照片，标明了共享连接。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig3_HTML.jpg](img/346879_2_En_5_Fig3_HTML.jpg)


  图 5-3


  面包板上的物理连接


  开始组装项目时，取出你的`HUZZAH32`，将其放在面包板的左中侧。如图 5-4 所示，确保将`HUZZAH32`放在面包板上，并使 USB 端口朝外。这样既能更容易地插入
  USB 线缆进行编程，也能在面包板上留出更多空间来插入其他部件。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig4_HTML.jpg](img/346879_2_En_5_Fig4_HTML.jpg)


  图 5-4


  放置了`HUZZAH32`芯片的面包板


  为了防止弯曲或损坏排针，轻轻向下按压芯片的右侧，直到排针在面包板中感觉稍微稳固，如图 5-5 所示。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig5_HTML.jpg](img/346879_2_En_5_Fig5_HTML.jpg)


  图 5-5


  将`HUZZAH32`芯片固定在面包板上


  继续这个过程，向下按压芯片的左侧，然后左右交替按压，直到排针底部与面包板齐平，如图 5-6 所示。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig6_HTML.jpg](img/346879_2_En_5_Fig6_HTML.jpg)


  图 5-6


  完全固定的`HUZZAH32`芯片


  你将使用同样的方法来插入部件并用排针导线连接它们，以完成这个项目的电路。在继续之前，花点时间查看图 5-7 中的电路图。电路图是一种设计图，它规定了电路中使用了哪些部件以及这些部件之间是如何连接的。所有电路图都使用标准化的符号来表示部件和连接，因此任何工程师都能快速查看电路图并理解如何构建或分析该电路。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig7_HTML.jpg](img/346879_2_En_5_Fig7_HTML.jpg)


  图 5-7


  门磁传感器的电路图


  对于门磁传感器，电路的核心是`HUZZAH32`芯片。它的`3V`和`GND`引脚用于为电路的其余部分提供电源和接地连接。连接到`GPIO14`和`GPIO15`引脚的是
  LED，它们将用于指示门是否锁好以及蓝牙连接是否已经建立。许多部件，尤其是 LED，对驱动（操作）它们所需的电压和电流有特定要求。放置在引脚和 LED 之间的电阻用于将电压降低到使
  LED 能够正常工作、而不会因高于其设计电压而烧坏的水平。电路中的最后一个连接是开关。开关的一侧连接到`3V`引脚和电源连接，另一侧连接到一个电阻，该电阻置于开关另一侧和接地连接之间。这被称为下拉电阻，用于在开关断开时建立稳定的接地连接。如果没有下拉电阻，微控制器将无法可靠地读取引脚是*高电平*（连接到电源）还是*低电平*（接地），你也就无法判断开关是断开还是闭合。


  首先，开始建立电路的电源和接地连接。取出红色和绿色的杜邦线。在`HUZZAH32`芯片上找到标有`3V`的引脚。将红色导线（红色代表电源）的一端插入该引脚所在的排，另一端插入面包板上标有“正极”的列。对`GND`引脚重复此过程，但使用绿色导线（代表接地），并将连接终止于“负极”列。安装了`HUZZAH32`芯片以及电源/接地导线的面包板如图
  5-8 所示。当`HUZZAH32`通过 USB 线缆或电池供电时，这两个连接将为电路的其余部分提供电力。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig8_HTML.jpg](img/346879_2_En_5_Fig8_HTML.jpg)


  图 5-8


  带有`HUZZAH32`芯片和电源/接地连接的面包板




  现在你已准备好开始组装电路的核心部分。首先，用剪线钳剪掉电阻器多余的引脚末端，留出约 10 毫米（0.4 英寸）的长度，以便于在面包板上插拔。你还需要将发光二极管的引脚修剪到合适的尺寸。如电路图符号所示，发光二极管是**有极性**的，这意味着它们只允许电流从一个方向流过——从**阳极**（正极）到**阴极**（负极）。为了指示哪个引脚是阳极，制造商在出厂时将发光二极管的阳极引脚故意剪得比阴极更长。如图
  5-9 所示，使用剪线钳对电阻器的引脚进行斜剪，注意让阳极保持为较长的引脚。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig9_HTML.jpg](img/346879_2_En_5_Fig9_HTML.jpg)


  图 5-9 修剪发光二极管的引脚


  现在零件已准备就绪，你可以开始将它们插入面包板。首先，为红色发光二极管搭建电路。取一根灰色、蓝色或白色的排线（除红色或绿色外的任何颜色均可），将其从`GPIO14`连接到面包板的空白区域。然后，将一个`200Ω`电阻器插入面包板，垂直跨过中央的空隙，连接两列。电阻器无极性，因此方向无关紧要。接着，将红色发光二极管水平插入面包板，阳极（长脚，正极端）插入与电阻器末端（下方列）相同的列中，阴极（短脚，负极端）插入一个空列。最后，取一根绿色排线，连接在阴极所在列与接地行之间。此过程建立了从
  GPIO 引脚到电阻器，再进入发光二极管，最终到达接地的连接。此时，你的面包板应类似于图 5-10 中的照片。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig10_HTML.jpg](img/346879_2_En_5_Fig10_HTML.jpg)


  图 5-10 安装了红色发光二极管及支持零件的面包板


  按照相同的步骤连接蓝色发光二极管，区别在于从标记为`GPIO15`的引脚开始，并确保所有连接都使用空列。


  ### 注意


  工程师通常会对面包板上的连接进行颜色编码，以帮助识别排线的用途。这在处理电源引脚时尤其重要。如果必须重复使用颜色，请尽量将它们放置在面包板的不同物理区域，以便于调试。


  最后要连接的部件是磁簧开关。再次取一根排线，从标记为`GPIO33`的引脚伸至一个空列。接着，将一个`10KΩ`电阻器跨接在列间隙上。最后，将开关的一端连接到电阻器的末端，另一端连接到面包板底部的共用正极行。与电阻器类似，开关无极性，因此方向无关紧要。你的完整电路应类似于图
  5-11 中的照片。


  ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig11_HTML.jpg](img/346879_2_En_5_Fig11_HTML.jpg)


  图 5-11 门磁传感器的完整电路


  ## 编写 Arduino 解决方案（程序）


  现在硬件工作已完成，你可以重新回到软件领域。在 Arduino 问世之前，可重新编程的原始芯片是你开发嵌入式系统的唯一选择。你在电路中所用的零件具有固定用途，你需要仔细查阅零件说明书，弄清楚每个引脚的功能以及使用它们是否需要任何其他条件（例如电流限制或对其他零件的依赖）。


  借助 Arduino，虽然仍有部分引脚只能用于单一用途，但 GPIO 和 ADC 引脚是你的自由发挥空间。你可以编写程序将它们用作简单的输入或输出（GPIO），或更精细、精确的输入输出（ADC）。就像在
  iOS 中使用第三方库一样，你也可以下载第三方库，通过这些引脚控制更复杂的零件。在下一节中，你将学习如何编写你自己的 Arduino 解决方案（程序），利用这些可编程引脚读取磁性接近传感器（开关）和电池电量的状态，并通过发光二极管和蓝牙共享结果。


  ### 设置 Arduino 编程环境


