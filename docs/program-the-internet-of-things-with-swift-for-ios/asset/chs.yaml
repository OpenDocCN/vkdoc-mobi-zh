  \ Interface Builder 中的连接检查器，将`exit()`方法设置为“退出”按钮的选择器，方式与连接上下文菜单的选择器相同。\n\n```swift\n\
  class RecordInterfaceController: WKInterfaceController {\n...\n@IBAction func exit()\
  \ {\ndismiss()\n}\n}\n```\n\n**代码清单 10-6：** 关闭“记录锻炼”屏幕（`RecordInterfaceController.swift`）\n\
  \n## 使用 Core Location 和 Core Motion 创建新锻炼\n\nIOTFit 应用最初是一个基于位置的简单锻炼跟踪应用，随着您学习更多基于传感器的框架，它通过采用\
  \ Core Motion 和 HealthKit 扩展为一个精确、详细的应用。苹果将这两个框架以及 Core Location 都纳入了可以在 Apple Watch\
  \ 上独立运行的二进制文件集，补充了它们在健身应用中的广泛应用。\n\n要开始实现 Apple Watch 应用的独立功能，请从“记录锻炼”接口控制器入手。它服务于与\
  \ iOS 项目中的“创建锻炼”视图控制器相同的目的，允许用户开始和停止锻炼会话。正如本章开头所述，将 IOTFitWatch 应用添加到 IOTFit iOS\
  \ 项目的目标之一是在应用之间共享代码。快速浏览`CreateWorkoutViewController`类，您会注意到许多繁重的工作，包括记录位置、将锻炼保存到\
  \ HealthKit 以及格式化时间字符串，都是由`WorkoutDataManager`类处理的。由于这些功能中的大部分也适用于 watchOS 应用，因此您应尝试将其添加到\
  \ watchOS 目标中。要执行此操作，请在项目导航器中单击`WorkoutDataManager.swift`文件，选择 Xcode 右侧窗格中的“文件检查器”选项卡（带有文档图标的选项卡），然后选中`IOTFitWatch\
  \ Extension`旁边的复选框，如图 10-27 所示。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig27_HTML.jpg](img/346879_2_En_10_Fig27_HTML.jpg)\n\
  \n**图 10-27：** 将`WorkoutDataManager`类添加到`IOTFitWatch Extension`目标\n\n在 Xcode 仍设置为编译\
  \ iPhone + Apple Watch 模拟器的情况下，尝试编译已将`WorkoutDataManager`类包含在目标中的 watchOS 应用。由于无法解析`WorkoutType`和`WorkoutState`的定义，编译应会失败。在\
  \ IOTFit 项目的纯 iOS 实现中，这些类型是在`CreateWorkoutViewController`类内部定义的，该类无法包含在 watchOS\
  \ 目标中。要修复编译问题，请将这些值移到`WorkoutDataManager`类的顶部，如代码清单 10-7 所示。现在，watchOS 应用应能成功编译。\n\
  \n```swift\nimport Foundation\nimport CoreLocation\nimport HealthKit\nenum WorkoutState\
  \ {\ncase inactive\ncase active\ncase paused\n}\nstruct WorkoutType {\nstatic let\
  \ automotive = \"Driving\"\nstatic let running = \"Running\"\nstatic let bicycling\
  \ = \"Bicycling\"\nstatic let stationary = \"Stationary\"\nstatic let walking =\
  \ \"Walking\"\nstatic let unknown = \"Unknown\"\n}\nlet timerInterval : TimeInterval\
  \ = 1.0\n...\nclass WorkoutDataManager {\nstatic let sharedManager = WorkoutDataManager()\n\
  ...\n}\n```\n\n**代码清单 10-7：** 完善`WorkoutDataManager`类\n\n要继续实现“记录锻炼”接口控制器，请从“创建锻炼”视图控制器移植状态初始化代码。回顾\
  \ iOS 版本，您会注意到视图控制器通过一系列最初设置为`0`值的属性来维护其状态。当视图控制器加载时，您使用这些值来初始化用户界面中的标签。在代码清单 10-8\
  \ 中，我扩展了“记录锻炼”接口控制器类，以包含这些属性和`updateUserInterface()`方法。特别要注意，watchOS 接口控制器是通过`willActivate()`方法（而不是\
  \ iOS 上的`viewWillAppear()`）被唤醒的，并且用于设置按钮标题的便捷方法要简短得多。\n\n\n```swift\nclass RecordInterfaceController:\
  \ WKInterfaceController {\n...\nvar currentWorkoutState = WorkoutState.inactive\n\
  var currentWorkoutType = WorkoutType.unknown\nvar workoutStartTime : Date?\nvar\
  \ lastSavedTime : Date?\nvar workoutDuration : TimeInterval = 0.0\nvar workoutTimer\
  \ : Timer?\nvar workoutAltitude : Double = 0.0\nvar workoutDistance : Double = 0.0\n\
  var averagePace : Double = 0.0\nvar floorsAscended : Double = 0.0\nvar workoutSteps\
  \ : Double = 0.0\nvar lastSavedLocation : CLLocation?\nvar isMotionAvailable : Bool\
  \ = false\n...\noverride func willActivate() {\nsuper.willActivate()\nupdateUserInterface()\n\
  }\n...\nfunc updateUserInterface() {\nswitch(currentWorkoutState) {\ncase .active:\n\
  toggleButton?.setTitle(\"Stop\")\ncase .paused:\ntoggleButton?.setTitle(\"Resume\"\
  )\ndefault:\ntoggleButton?.setTitle(\"Start\")\n}\n}\n}\n```\n**列表 10-8** 向 `RecordInterfaceController`\
  \ 类添加状态\n\n接下来，您需要实现开始或停止锻炼的方法。如列表 10-9 所示，通过移植开始、停止和重置锻炼的方法来实现此功能。这些方法利用`currentWorkoutState`变量来确定界面控制器的当前状态，然后据此请求设备权限、开始测量或停止测量并将界面控制器重置回初始状态。这些方法几乎是从\
  \ iOS 版本直接复制过来的。请确保将`toggleWorkout()`方法连接到故事板上的`Start`按钮以启用它。\n\n```swift\nimport\
  \ UIKit\nimport CoreLocation\nimport CoreMotion\nclass RecordInterfaceController:\
  \ WKInterfaceController {\n...\nvar pedometer : CMPedometer?\nvar motionManager\
  \ : CMMotionActivityManager?\nvar altimeter : CMAltimeter?\nlet locationManager\
  \ = CLLocationManager()\n...\nfunc resetWorkoutData() {\nlastSavedTime = Date()\n\
  workoutDuration = 0.0\nworkoutDistance = 0.0\nworkoutAltitude = 0.0\nworkoutSteps\
  \ = 0\nfloorsAscended = 0\naveragePace = 0.0\ncurrentWorkoutType = WorkoutType.unknown\n\
  }\nfunc startWorkout() {\ncurrentWorkoutState = .active\nUserDefaults.standard.setValue(true,\
  \ forKey:\n\"isConfigured\")\nUserDefaults.standard.synchronize()\nworkoutTimer\
  \ = Timer.scheduledTimer(timeInterval:\ntimerInterval, target: self, selector:\n\
  #selector(updateWorkoutData), userInfo: nil,\nrepeats: true)\nlocationManager.startUpdatingLocation()\n\
  lastSavedTime = Date()\nworkoutStartTime = Date()\nWorkoutDataManager.sharedManager.createNewWorkout()\n\
  if (CMMotionManager().isDeviceMotionAvailable &&\nCMPedometer.isStepCountingAvailable()\
  \ &&\nCMAltimeter.isRelativeAltitudeAvailable()) {\nisMotionAvailable = true\nstartPedometerUpdates()\n\
  startActivityUpdates()\nstartAltimeterUpdates()\n} else {\nNSLog(\"Motion acitivity\
  \ not available on device.\")\nisMotionAvailable = false\n}\n}\nfunc stopWorkoutTimer()\
  \ {\nworkoutTimer?.invalidate()\n}\n@IBAction func toggleWorkout() {\nswitch currentWorkoutState\
  \ {\ncase .inactive:\nrequestLocationPermission()\ncase .active:\ncurrentWorkoutState\
  \ = .inactive\nstopWorkoutTimer()\npedometer?.stopUpdates()\nmotionManager?.stopActivityUpdates()\n\
  altimeter?.stopRelativeAltitudeUpdates()\nif let workoutStartTime = workoutStartTime\
  \ {\nlet workout = Workout(startTime:\nworkoutStartTime, endTime: Date(), duration:\n\
  workoutDuration, locations: [], workoutType:\nself.currentWorkoutType, totalSteps:\
  \ workoutSteps, flightsClimbed: floorsAscended, distance: workoutDistance)\nWorkoutDataManager.sharedManager.saveWorkout(workout)\n\
  }\ndefault:\nNSLog(\"toggleWorkout() called out of context!\")\n}\nupdateUserInterface()\n\
  }\n}\n```\n**列表 10-9** 在 `RecordInterfaceController` 类中切换状态\n\n要开始监控用户的位置、运动活动并获取\
  \ HealthKit 的访问权限，请移植用于请求权限和开始更新的方法，如列表 10-10 所示。与 iOS 版本相比，最大的区别在于，您必须限制某些硬件管理器对象的配置选项，因为这些选项在\
  \ watchOS 上不可用。\n\n```swift\nclass RecordInterfaceController: WKInterfaceController\
  \ {\n...\nfunc startPedometerUpdates() {\nguard let workoutStartTime = workoutStartTime\n\
  else { return }\npedometer = CMPedometer()\npedometer?.startUpdates(from: workoutStartTime,\n\
  withHandler: { [weak self] (pedometerData : CMPedometerData?, error: Error?) in\n\
  NSLog(\"Received pedometer update!\")\nif let error = error {\nNSLog(\"Error reading\
  \ pedometer data\")\nreturn\n}\nguard let pedometerData = pedometerData,\nlet distance\
  \ = pedometerData.distance as?\nDouble,\nlet averagePace =\npedometerData.averageActivePace\
  \ as? Double,\nlet steps = pedometerData.numberOfSteps as?\nInt,\nlet floorsAscended\
  \ =\npedometerData.floorsAscended as? Int else {\nreturn\n}\nself?.workoutDistance\
  \ = distance\nself?.floorsAscended = Double(floorsAscended)\nself?.workoutSteps\
  \ = Double(steps)\nself?.averagePace = averagePace\n})\n}\nfunc startActivityUpdates()\
  \ {\nmotionManager = CMMotionActivityManager()\nmotionManager?.startActivityUpdates(to:\n\
  OperationQueue.main, withHandler: { [weak self]\n(activity : CMMotionActivity?)\
  \ in\nguard let activity = activity else {\nreturn\n}\nif activity.walking {\nself?.currentWorkoutType\
  \ = WorkoutType.walking\n} else if activity.running {\nself?.currentWorkoutType\
  \ = WorkoutType.running\n} else if activity.cycling {\nself?.currentWorkoutType\
  \ =\nWorkoutType.bicycling\n} else if activity.stationary {\nself?.currentWorkoutType\
  \ =\nWorkoutType.stationary\n} else {\nself?.currentWorkoutType = WorkoutType.unknown\n\
  }\n})\n}\nfunc startAltimeterUpdates() {\naltimeter = CMAltimeter()\naltimeter?.startRelativeAltitudeUpdates(to:\n\
  OperationQueue.main, withHandler: { [weak self]\n(altitudeData : CMAltitudeData?,\
  \ error: Error?) in\nif let error = error {\nNSLog(\"Error reading altimeter data\"\
  )\nreturn\n}\nguard let altitudeData = altitudeData,\nlet relativeAltitude =\naltitudeData.relativeAltitude\
  \ as? Double else {\nreturn\n}\nself?.workoutAltitude = relativeAltitude\n})\n}\n\
  func requestLocationPermission() {\nif CLLocationManager.locationServicesEnabled()\
  \ {\nlocationManager.desiredAccuracy =\nkCLLocationAccuracyNearestTenMeters\nlocationManager.distanceFilter\
  \ = 10.0\nlocationManager.allowsBackgroundLocationUpdates =\ntrue\nlocationManager.delegate\
  \ = self\nswitch(CLLocationManager.authorizationStatus()) {\ncase .notDetermined:\n\
  locationManager.requestWhenInUseAuthorization()\ncase .authorizedWhenInUse :\nrequestAlwaysPermission()\n\
  case .authorizedAlways:\nresetWorkoutData()\nstartWorkout()\ndefault:\nNSLog(\"\
  Unable to request location\")\n}\n} else {\nNSLog(\"Unable to init location\")\n\
  }\n}\nfunc requestAlwaysPermission() {\nif let isConfigured =\nUserDefaults.standard.value(forKey:\n\
  \"isConfigured\") as? Bool, isConfigured == true {\nstartWorkout()\n} else {\nlocationManager.requestAlwaysAuthorization()\n\
  }\n}\n}\n```\n**列表 10-10** 在 `RecordInterfaceController` 类中请求和监控硬件更新\n\n最后，为完成设置过程，您必须扩展记录界面控制器以实现`CLLocationManagerDelegate`协议。如列表\
  \ 10-11 所示，您可以直接从 iOS 应用移植此内容，但暂停/恢复委托方法除外，因为这些方法在 watchOS 上不可用。\n```\n\n\n```swift\n\
  class RecordInterfaceController: WKInterfaceController {\n...\n}\nextension RecordInterfaceController\
  \ : CLLocationManagerDelegate {\nfunc locationManager(_ manager: CLLocationManager,\n\
  didChangeAuthorization status: CLAuthorizationStatus) {\nswitch status {\ncase .authorizedWhenInUse:\n\
  requestAlwaysPermission()\ncase .authorizedAlways:\nresetWorkoutData()\nstartWorkout()\n\
  case .denied:\nNSLog(\"location permission denied\")\ndefault:\nNSLog(\"Unhandled\
  \ Location Manager Status:\n\\(status)\")\n}\n}\nfunc locationManager(_ manager:\
  \ CLLocationManager,\ndidUpdateLocations locations: [CLLocation]) {\nguard let mostRecentLocation\
  \ = locations.last else {\nNSLog(\"Unable to read most recent location\")\nreturn\n\
  }\nlastSavedLocation = mostRecentLocation\nNSLog(\"Most recent location: \\(String(describing:\n\
  mostRecentLocation))\")\nWorkoutDataManager.sharedManager.addLocation(coordinate:\n\
  mostRecentLocation.coordinate)\n}\n}\n```\n\n**代码清单 10-11** 为 `RecordInterfaceController`\
  \ 类添加 `CLLocationManagerDelegate` 协议支持\n\n要测试应用程序，请选择 iPhone + Apple Watch 模拟器或您的\
  \ iPhone + Apple Watch，然后尝试运行 `IOTFitWatch` 目标。首次运行 Apple Watch 目标时，系统会提示您打开 iPhone\
  \ 上的 `IOTFit` 应用，以接受健康、运动和位置权限，如图 10-28 所示。按下 iOS 上 `IOTFit` 应用中的 Start 按钮以请求这些权限。尽管该应用的大部分功能可以在不与手机配对的情况下运行，但在手机上接受权限请求仍然是\
  \ watchOS 的一个限制。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig28_HTML.jpg](img/346879_2_En_10_Fig28_HTML.jpg)\n\
  \n**图 10-28** Apple Watch 应用的权限请求对话框\n\n接受所有权限后，您可以按下 Apple Watch 应用中的 Close 按钮返回锻炼历史界面控制器。现在，当您从上下文菜单中呈现记录锻炼界面控制器时，您将能够通过用户界面开始和停止锻炼。\n\
  \n## 使用 HealthKit 填充锻炼历史表格\n\n要完成 `IOTFitWatch` 应用的核心功能，您必须用用户过去锻炼的数据填充锻炼历史界面控制器。与记录锻炼界面控制器类似，您可以利用\
  \ `IOTFit` iOS 应用中的代码来完成此任务。在 iOS 应用中，锻炼历史由 `WorkoutTableViewController` 类管理。查看此类时，您会记得您是通过调用共享\
  \ Workout Data Manager 上的 `loadWorkoutsFromHealthKit()` 方法来获取表格视图数据的，该方法会查询 HealthKit\
  \ 以获取用户保存在其设备上的所有锻炼记录。由于您在上一节中成功设置了 HealthKit 权限并将 Workout Data Manager 导入到 `IOTFitWatch`\
  \ 目标中，因此您可以在此处利用它们来加载表格视图数据。\n\n首先，移植加载表格的逻辑。在 `IOTFit` iOS 应用中，每当视图控制器呈现时，都会通过\
  \ `viewWillAppear(animated:)` 方法刷新锻炼表格视图控制器的数据。在 watchOS 中，与此方法对应的是 `willActivate()`\
  \ 方法。如代码清单 10-12 所示，扩展 `InterfaceController` 类以在每次激活时获取数据。`WKInterfaceTable` 类没有定义用于初始化其数据的协议，因此包含一个用于刷新表格视图数据的存根方法。\n\
  \n```swift\nclass InterfaceController: WKInterfaceController {\n    @IBOutlet var\
  \ workoutTable: WKInterfaceTable?\n    var workouts : [Workout]?\n    let dateFormatter\
  \ = DateFormatter()\n\n    override func awake(withContext context: Any?) {\n  \
  \      super.awake(withContext: context)\n        // 在此处配置界面对象。\n        dateFormatter.dateStyle\
  \ = .medium\n    }\n\n    override func willActivate() {\n        // 当手表视图控制器即将对用户可见时调用此方法\n\
  \        super.willActivate()\n        WorkoutDataManager.sharedManager.loadWorkoutsFromHealthKit\
  \ { [weak self] (fetchedWorkouts: [Workout]?) in\n            if let fetchedWorkouts\
  \ = fetchedWorkouts {\n                self?.workouts = fetchedWorkouts\n      \
  \          DispatchQueue.main.async {\n                    self?.refreshTable()\n\
  \                }\n            }\n        }\n    }\n\n    func refreshTable() {\n\
  \        // TODO: 在此处构建表格\n    }\n}\n```\n\n**代码清单 10-12** 在锻炼历史界面控制器变为活动状态时获取数据（`InterfaceController.swift`）\n\
  \n在 watchOS 中设置表格视图需要完成三项主要任务：指定表格中的行数、通过标识符字符串查找单元格以及初始化找到的单元格。在代码清单 10-13 中，我扩展了\
  \ `refreshTable()` 方法以包含此逻辑。请特别注意为行控制器使用与 storyboard 中完全相同的标识符字符串。\n\n```swift\n\
  class InterfaceController: WKInterfaceController {\n    ...\n    func refreshTable()\
  \ {\n        guard let workouts = workouts else { return }\n        workoutTable?.setNumberOfRows(workouts.count,\
  \ withRowType: \"WorkoutRow\")\n        for index in 0..<workouts.count {\n    \
  \        guard let row = workoutTable?.rowController(at: index) as? WorkoutRowController\
  \ else { return }\n            let selectedWorkout = workouts[index]\n         \
  \   let dateString = dateFormatter.string(from: selectedWorkout.startTime)\n   \
  \         let durationString = WorkoutDataManager.stringFromTime(timeInterval: selectedWorkout.duration)\n\
  \            let detailText = String(format: \"%.0f m | %@\", arguments: [selectedWorkout.distance,\
  \ durationString])\n            row.dateLabel?.setText(dateString)\n           \
  \ row.durationLabel?.setText(detailText)\n        }\n    }\n}\n```\n\n**代码清单 10-13**\
  \ 在锻炼历史表格视图（`InterfaceController.swift`）中获取数据\n\n\n\n为应用添加图标时，将`FontAwesome.swift`（[`github.com/thii/FontAwesome.swift`](https://github.com/thii/FontAwesome.swift)）通过拖放其\
  \ Swift 和字体（`.otf`）文件导入项目，操作方式与第 9 章的 tvOS 项目相同。将文件复制到项目后，必须更改文件的所有权以便正确暴露给 watchOS。对于字体文件，需确保它们属于所有三个目标（`IOTFit`、`IOTFitWatch`和`IOTFitWatch\
  \ Extension`）。如前所述，此更改是必需的，因为 watchOS 使用 Watch App 目标来存储静态文件。在 Swift 文件中，从`IOTFitWatch\
  \ Extension`目标中移除 UIView 子类，包括`FontAwesomeBarButtonItem.swift`、`FontAwesomeTabBarItem.swift`和`FontAwesomeSegmentedControl.swift`。完成这些更改后，`IOTFitWatch`应用应能再次编译。\n\
  \n要为每一行设置图像，可借鉴`IOTHomeTV`应用的逻辑：将锻炼类型映射到 Font Awesome 图标名称，然后使用该名称创建`UIImage`对象。与`IOTHomeTV`应用一样，使用\
  \ Font Awesome 官方搜索页面查找符号名称：[www.fontawesome.com/icons?d=gallery&m=free](http://www.fontawesome.com/icons?d=gallery%2526m=free)。在代码清单\
  \ 10-14 中，我已使用此逻辑更新了`refreshTable()`方法。\n\n```\nclass InterfaceController: WKInterfaceController\
  \ {\n...\nfunc refreshTable() {\nguard let workouts = workouts else { return }\n\
  workoutTable?.setNumberOfRows(workouts.count,\nwithRowType: \"WorkoutRow\")\nfor\
  \ index in 0..<workouts.count {\nguard let row =\nworkoutTable?.rowController(at:\n\
  index) as? WorkoutRowController\nelse { return }\n...\nrow.dateLabel?.setText(dateString)\n\
  row.durationLabel?.setText(detailText)\nlet icon: FontAwesome\nswitch selectedWorkout.workoutType\
  \ {\ncase WorkoutType.walking:\nicon = FontAwesome.walking\ncase WorkoutType.bicycling:\n\
  icon = FontAwesome.bicycle\ncase WorkoutType.automotive:\nicon = FontAwesome.car\n\
  default:\nicon = FontAwesome.dumbbell\n}\nlet faImage = UIImage.fontAwesomeIcon(name:\
  \ icon,\nstyle: .solid, textColor: UIColor.white, size:\nCGSize(width: 50, height:\
  \ 50))\nrow.icon?.setImage(faImage)\n}\n}\n代码清单 10-14\n获取数据时的锻炼历史表格视图 (InterfaceController.swift)\n\
  ```\n\n要测试 Workout History Interface Controller 是否已填充来自 HealthKit 的数据，请在 iPhone\
  \ + Apple Watch 模拟器或 Apple Watch 硬件上运行应用。iOS 和 Apple Watch 应用现在都应显示在测试 Record Workout\
  \ Interface Controller 时生成的示例锻炼记录，如图 10-29 所示。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig29_HTML.jpg](img/346879_2_En_10_Fig29_HTML.jpg)\n\
  \n图 10-29\n\n两个应用上的锻炼历史界面，包含填充的数据\n\n## 总结\n\n本章中，您学习了如何利用 watchOS 构建 IOTFit 应用的\
  \ Apple Watch 版本，该版本能够与原始 iOS 版本共享代码和锻炼数据。在某些方面，Apple Watch 应用的设置过程比 iOS 版本更复杂，例如仅使用堆栈视图构建用户界面。然而，watchOS\
  \ 应用的其他部分（如创建表格视图）使用了其 iOS 对应功能的精简版本，实现起来比 iOS 版本更简单。与第 9 章的 Apple TV 项目类似，您能够利用在硬件上原生运行的框架，并制作出与\
  \ iOS 版本具有相同锻炼跟踪功能的 Apple Watch 应用。\n\n延续本书的主题，这是一个物联网应用的完美示例，因为用户能够使用“物”（Apple\
  \ Watch）作为另一种为更大系统提供数据的方式。在本章中，您利用的大系统是 HealthKit，Apple 会自动保护并在用户设备之间同步 HealthKit\
  \ 数据。\n\n# 11. 使用 Face ID、Touch ID 和钥匙串服务保护您的应用\n\n到目前为止，您已在本章中了解到，物联网技术可用于扩展人们生活中的便利性。与几年前相比，这些设备的能力以及创建设备的门槛都已提高。仅在本章中，您就已经使用了\
  \ Arduino、Raspberry Pi 和 iPhone 作为物联网传感器。\n\n然而，常言道，新药总会带来新的副作用。对于物联网来说，其采用过程中最不幸且意想不到的副作用是安全漏洞的增加，这些漏洞源于未正确保护的物联网设备。正如本书中多次提到的，物联网的普及很大程度上得益于价格合理的系统级芯片解决方案的可用性，例如您在之前章节中使用的\
  \ ESP32。不幸的是，当广泛使用的系统设计缺陷被利用时，其高采用率可能导致毁灭性的损害。\n\n这正是 Mirai 僵尸网络所发生的情况。该僵尸网络利用了物联网设备上一组已知的常用默认密码，自动安装、复制并运行程序，使用受感染设备对目标系统进行协同攻击，即所谓的分布式拒绝服务攻击。该攻击影响了超过\
  \ 600,000 台设备，在 2017 年导致多个域名系统服务器（构成互联网流量路由骨干）瘫痪，并被公认为有记录以来最大的 DDoS 攻击^(¹)。截至撰写本书时（2018\
  \ 年末），该僵尸网络在复杂性上持续增加并找到了新目标。\n\n在第 8 章中，当您学习如何使用 Raspberry Pi 构建 Web 服务器时，您学到的提高设备安全性的方法之一是为\
  \ Web 服务器添加 SSL 证书，以便设备和外部客户端（如 iOS 应用）之间传输的所有数据都能通过 HTTPS 保护。尽管这不是完美或完整的解决方案，但这是让您的用户数据更难通过简单的流量嗅探（使用程序监控网络上传输的数据包）被截获的一步。对于完整的解决方案，您应始终尝试研究访问系统管理员账户的所有途径并确保其安全，包括更改密码、使用双因素认证、为\
  \ Web 应用程序 API 添加输入验证，以及安装安全补丁和辅助工具以防止已知攻击。\n\n在本章中，您将在 iOS 应用端学习三种技术，可用于防止用户信息从设备泄露或被盗：Face\
  \ ID、Touch ID 和钥匙串服务。作为 iPhone 用户，您可能已经通过主屏幕熟悉前两项服务。它们允许您使用面部的 3D 表面扫描（iPhone X\
  \ 及更新版本）或指纹（iPhone 5S 至 iPhone 8 Plus，以及 iPad Air 2 及更新版本）解锁主屏幕。但是，您可能不知道可以在自己的应用中使用钥匙串服务来限制对应用某些部分的访问。这是许多密码存储应用（如\
  \ 1Password）中流行的功能。类似地，钥匙串服务允许您为应用数据创建加密数据库，该数据库仅在应用处于活动状态并在用户设备前台运行时才能访问。钥匙串服务是\
  \ Apple 推荐的用于存储用户密码、API 密钥和 SSL 证书的方法，如果这些信息从应用中泄露，可能会被严重利用。\n\n\n\n## 学习目标\n\n\
  在本章中，你将通过学习如何运用**面容 ID**、**触控 ID** 和**钥匙串**服务来保护数据安全。具体做法是沿用前几章中的 IOTFit 应用，利用这些\
  \ API 将应用访问权限仅限授予 iOS 设备所有者，或通过存储在钥匙串中的密码进行授权。通过对 IOTFit 应用实施这些改进，你将掌握以下物联网应用开发的关键概念：\n\
  \n-   创建锁屏用户界面\n-   判断设备是否支持面容 ID 和触控 ID\n-   使用面容 ID 和触控 ID 限制应用访问权限\n-   在 iOS\
  \ 钥匙串中存储和读取值\n-   检测应用从后台返回时的状态\n\n存储在 HealthKit 存储区中的锻炼数据由设备上的“健康”应用进行加密和管理；不过，你可以通过禁用\
  \ `WorkoutDataManager` 类中用于将数据备份到应用 `Documents` 文件夹下 `.plist` 文件的那部分功能，来进一步增强安全性。尽管应用包中的数据对其他应用不可用，但通过\
  \ Mac 或 PC 上的备份应用仍然可以提取这些数据。\n\n与本书之前的项目类似，完整项目的源代码可从本书的 GitHub 页面获取（`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`）。如果你想回顾\
  \ IOTFit 应用中健康功能的创建过程，请参阅第 2 至第 4 章。如果你想了解如何为 Web 服务器应用添加 HTTPS，请参阅第 8 章。\n\n##\
  \ 项目设置\n\n开始之前，请通过复制之前的项目，或从本书的 GitHub 仓库下载副本，来创建第 10 章中 IOTFit 应用的副本。由于面容 ID 比触控\
  \ ID 或在 iPhone 上输入密码更容易被无意触发，Apple 要求在你的应用中启用该功能前必须获得用户许可。与 HealthKit（第 4 章）的情况类似，当用户首次在应用中尝试使用面容\
  \ ID 时，将会弹出此权限提示。另一个与 HealthKit 的相似之处在于，通过在应用的 `Info.plist` 文件中为其定义一条消息字符串，即可启用该权限提示。\n\
  \n如图 11-1 所示，要为你的应用设置面容 ID 权限提示消息，请在项目导航器中打开 `IOTFit` 目标的 `Info.plist` 文件，点击任意列中的\
  \ `(+)` 按钮，并为隐私 – 面容 ID 使用说明键值对添加一个新条目。在我的实现中，我使用了消息：“IOTFit 希望使用面容 ID 来保护您的锻炼数据。”\n\
  \n![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig1_HTML.jpg](img/346879_2_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1 添加面容 ID 权限提示的消息字符串\n\n## 创建锁屏用户界面\n\n当我在思考如何设计一个用于演示面容 ID 的项目时，我脑海中浮现的最佳示例是\
  \ 1Password 密码管理器应用的锁屏。如图 11-2 所示，在访问该应用的用户界面之前，1Password 会要求你输入密码，或按下面容 ID 按钮以使用面容\
  \ ID 解锁应用。验证成功后，锁屏会执行一个模拟门打开的动画，动画完成后便会显示主界面。\n\n![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig2_HTML.jpg](img/346879_2_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2 1Password 密码管理器的锁屏\n\n虽然完整的动画有点超出本项目的范围，但我认为显示全屏覆盖层以屏蔽敏感功能的想法普遍适用。在 IOTFit\
  \ 应用中，最敏感的数据是用户过去的位置和锻炼数据。如图 11-3 所示，我扩展了应用的线框图，在“锻炼历史”和“上次跑步”屏幕上显示了一个简单的锁屏。为简单起见，每当在标签栏中导航到这些屏幕时，以及当应用变为活跃状态时，你将显示锁屏。\n\
  \n![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig3_HTML.jpg](img/346879_2_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3 IOTFit 应用的设计线框图，包含锁屏\n\n与 1Password 一样，我加入了一个用于启动面容 ID（或触控 ID）的按钮，以及一个作为备用验证方式的密码文本字段。在应用中，通过检测设备上可用的传感器，你可以更新文本以显示触控\
  \ ID 或面容 ID。与 1Password 不同的是，我只在显示数据的屏幕上方应用了锁屏，因为该应用的主要目的是记录锻炼，并且减少操作步骤，降低用户的使用门槛是良好的设计实践。\n\
  \n为防止锁屏阻碍访问标签栏，我建议将锁屏实现为一个 `UIView`，它将显示在“锻炼历史”和“上次跑步”视图控制器的内容之上。验证成功后，你将使用一个简单的动画来关闭该视图并显示数据。要开始此过程，你必须创建一个新的\
  \ `UIView` 子类和 NIB (`.xib`) 文件来表示锁屏。\n\n与本书之前的示例类似，通过转到“文件”菜单并选择“新建” ➤ “文件…”来创建\
  \ `UIView` 子类。从出现的模板选择器中，选择 iOS ➤ Cocoa Touch 类。如图 11-4 所示，创建一个名为 `SecurityView`\
  \ 的 `UIView` 子类。\n\n![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig4_HTML.jpg](img/346879_2_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4 向项目添加 `UIView` 子类\n\n由于 `UIView` 子类无需修改即可在 Objective-C 类中使用，当你首次将其添加到 Swift\
  \ 项目时，系统会提示你向项目添加一个 Objective-C 桥接头文件，如图 11-5 所示。选择“创建桥接头文件”以创建桥接头文件并继续设置过程。\n\n\
  ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig5_HTML.jpg](img/346879_2_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5 提示向 Swift 项目添加 Objective-C 桥接头文件\n\n\n\n接下来，您需要创建一个 NIB（`.xib`）文件来管理 `SecurityView`\
  \ 类的可视化布局。虽然本书之前的示例都是在单个故事板文件中管理所有用户界面，但当您创建一个将在应用程序中多个位置复用的视图时，行业惯例是在其自己的 NIB 文件中管理该单个视图。NIB\
  \ 是 Interface Builder 最早的可视化布局工具，旨在管理单个视图或视图控制器，这与故事板不同，故事板旨在管理多个视图控制器之间的常用转场。要创建新的\
  \ NIB，请再次打开“文件”菜单，并再次选择“新建” ➤ “文件`...`”。这一次，在 iOS 模板选择器中进一步向下滚动，如图 11-6 所示，然后选择“视图”。当要求命名文件时，请使用名称\
  \ `SecurityView.xib`，以匹配 `UIView` 子类。\n\n![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig6_HTML.jpg](img/346879_2_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6\n从 Xcode 模板选择器中选择视图 NIB\n\n在项目导航器中点击 NIB 文件后，您应该在 Interface Builder 中看到一个空白视图，类似于创建新故事板文件时的情况。以表\
  \ 11-1 为指南，布局用户界面，特别注意用于密码输入的 `UITextField` 和用于展示 Face ID 的 `UIButton`。\n\n表 11-1\n\
  安全视图用户界面元素样式\n\n| 元素名称 | 文本样式 | 对齐参考 | 上边距 | 下边距 | 左边距 | 右边距 |\n| --- | --- | ---\
  \ | --- | --- | --- | --- |\n| “需要验证”标签 | 标题 1 | 视图 | 60 | 40 | 40 | 40 |\n| “描述”标签\
  \ | 脚注 | “需要验证”标签 | 40 | 40 | 40 | 40 |\n| “密码”文本字段 | 正文 | “描述”标签 | 40 | 8 | 80\
  \ | 80 |\n| “或”标签 | 脚注 | “密码”文本字段 | 8 | 8 | 80 | 80 |\n| “使用 Face ID”按钮 | 正文 | “或”标签\
