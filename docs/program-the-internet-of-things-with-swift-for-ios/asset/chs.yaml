  \n图 4-10 — 更改标签栏项目的图标\n\n为了使单元格与图 4-1 中包含两行文本的线框相匹配，请点击该单元格，然后在属性检查器中将样式设置为 **Subtitle**，如图\
  \ 4-11 所示。\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig11_HTML.jpg](img/346879_2_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11 — 更改表格视图单元格的样式\n\n作为最后的布局任务，你必须将表格视图控制器嵌入到一个导航控制器中。这将有助于应用在锻炼历史记录和地图屏幕之间保持一致。要执行此操作，请点击选择该视图控制器，然后从\
