  trans: '

    ### 运行与监控 Arduino 解决方案


    现在 Arduino 硬件及其控制软件已经完成，只剩下最后一步：尝试运行程序，检查传感器是否正常工作——当磁传感器断开时打开开关，并定期报告所连接电池的电压水平。


    在编写 Arduino 解决方案时，你可能已经发现自己不断保存程序。如果喜欢冒险，你可能已经编译过几次，以检查代码是否有效。为了充分利用 Arduino IDE，请参考图
    5-18，了解其用户界面的更详细说明。


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig18_HTML.jpg](img/346879_2_En_5_Fig18_HTML.jpg)


    图 5-18


    识别 Arduino IDE 中的运行按钮和串口监视器


    与 Xcode 不同，你会注意到 Arduino 有两个运行按钮——验证和上传。验证按钮仅执行编译，类似于 Xcode 中的 `Build` 命令，允许你检查代码是否编译通过并满足基本运行时要求，例如不超过目标设备的可用存储空间。上传按钮则编译解决方案并将其上传到目标设备的硬件。由于
    HUZZAH32 是一款兼容 Arduino 的设备，你之前安装的脚本将在此步骤中用于完成上传。在顶部栏的最右侧，你会找到串口监视器按钮。如果尚未打开，它会将
    UART 端口的输出添加到 IDE 底部的调试控制台窗格中。当编译器或设备准备好新消息时，它们将显示在此窗格中。


    要开始调试应用程序，请点击上传按钮。在串口控制台中，你应该会看到一系列显示上传进度的消息。上传成功后，你会看到开关和电池状态每秒输出一次（即 `loop()`
    方法中延迟的时长）。你还可以通过打开磁开关来点亮红色 LED。Arduino 解决方案在上传后会持续运行，因此你无需每次运行时都重新上传解决方案。只需为设备供电，`start()`
    和 `loop()` 方法便会立即开始执行。


    ### 编译故障排除


    在我成为 iOS 开发者之前，我曾从事嵌入式系统工作。整个过程中最令人沮丧且耗时的事情，总是让程序首次成功运行。以下是我在 Arduino 设备上运行解决方案时遇到的一些最常见问题。


    **电路工作正常，但串口控制台显示乱码字符。**


    串行通信仅在发送方和接收方以相同频率通信时才能正常工作（字面意义上的频率！）。要解决此问题，请验证串口监视器设置的值与你在 Arduino 解决方案中配置串口时使用的值一致。对于门磁监控器，你可以在串口初始化代码中找到它：


    ```

    Serial.begin(9600);

    ```


    **Arduino IDE 成功上传了解决方案，但我无法看到串口消息，也无法让开关工作。**


    这个问题令人沮丧，因为它阻止你验证程序的行为。根据我的经验，此错误通常有两个原因：


    1.  设备需要重置。这是一个简单的操作。只需在 HUZZAH32 芯片仍连接电源时按下其重置按钮即可。设备重新启动后，你应该会在串口监视器和电路上看到正确的输出。


    2.  在上传解决方案到 HUZZAH32 时，你必须按住重置按钮。在较旧的基于 ESP32 的开发板上，乐鑫要求编程期间将重置信号保持为低电平。如果硬件卡在无法重新编程设备或程序无法运行的状态，请尝试在上传操作期间全程按住设备的重置按钮。这应该能重新启用芯片的编程功能。


    **Arduino IDE 无法找到 HUZZAH32 的串口。**


    这是最难排查的问题。HUZZAH32 可能在一次编程会话中正常工作，然后突然无响应。根据我的经验，此问题通常由 OS X 上用于 HUZZAH32 的 USB
    转串口驱动程序引起，而非硬件本身。由于绝大多数现代计算机不再配备串口（RS-232）端口，设备制造商使用集成电路通过 USB 传输串行信号。因为需要此功能的用户群体相较于普通用户较小，驱动程序往往不稳定。要解决此问题，我建议重启你的
    Mac，然后在重启完成后尝试将 HUZZAH32 重新插入电脑。


    就像在 Xcode 上调试连接设备一样，一旦你能够识别连接问题的症状，解决起来就变得轻而易举了。


    ### 总结


    在本章中，你学习了如何使用 Arduino 制作你的第一个传感器。在硬件方面，你了解了面包板如何帮助你在无需焊接的情况下连接组件。除了用于稳定开关信号的下拉电阻外，组装电路的大部分工作就是将原理图中的连接点对应到面包板上。在软件方面，你了解到
    Arduino IDE 和 Arduino 解决方案的运行方式类似于简化版的 Swift 应用程序。你在 Arduino 解决方案中编写的大部分代码并非依赖
    `UIKit` 或其他 Apple 框架，而是利用了 HUZZAH32 芯片上的 GPIO 和 ADC 引脚。在 `setup()` 方法中，你配置了将要使用的每个引脚的角色和模式；然后在
    `loop()` 方法中，你读取数值并用它们来打开或关闭引脚，以控制硬件。在下一章中，你将扩展这个简单程序，通过低功耗蓝牙将这些数据传输到配套的 iOS 应用。


    # 6. 构建低功耗蓝牙硬件配套应用


    在第 5 章中，你通过构建一个基于 Arduino 的无线门磁传感器，初步涉足了嵌入式系统的世界。在本章中，你将通过为门磁传感器开发基于低功耗蓝牙的配套应用，继续你的硬件工程之旅。低功耗蓝牙是一种极为流行的基于无线电的通信协议，与其他无线通信方式相比，它允许设备在长达
    77 米（约 250 英尺）的距离内以极低的能量需求进行通信（这就是低功耗蓝牙中“低功耗”的含义）。


    当今 iOS 开发的一大优点在于，Apple 的 Core Bluetooth 框架包含了让你的应用利用 iOS 设备内置蓝牙硬件与低功耗蓝牙设备通信（或作为低功耗蓝牙设备）所需的一切。除了简单地建立与设备的连接外，本章还将介绍一些改善用户蓝牙体验的最佳实践，例如保存已配对的设备以及将来自硬件的消息作为推送通知显示在用户的
    iOS 设备上。与 iOS 中的许多事情一样，Apple 在其文档中提供了关于实现低功耗蓝牙协议栈的理论指导，但将澄清实现细节的责任留给了开发者。为了帮助填补这一知识空白，在本章中，我将分享过去对我而言最有效的方法。


    '
- fmt: "# Learning Objectives\n\nIn this chapter, you will take the door sensor you\
    \ built in Chapter [5](#346879_2_En_5_Chapter.xhtml) and learn how to make it\
    \ into a full Bluetooth LE solution by adding Bluetooth pairing and data transmission\
    \ capabilities to your existing Arduino program, and then by building an iOS companion\
    \ app to monitor the sensor. This chapter will start the new app that you will\
    \ iterate throughout the section, `IOTHome`. `IOTHome` is an Internet of Things\
    \ (IoT) home-management system, which will eventually be used to track multiple\
    \ IoT devices and provide a secure, Siri-compatible interface to the hardware\
    \ via HomeKit. For the sake of introduction, the design wireframes for the first\
    \ iteration of the `IOTHome` app are provided in Figure [6-1](#346879_2_En_6_Chapter.xhtml#Fig1).\n\
    \n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig1_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1  \nDesign wireframes for the `IOTHome` app\n\nTo make the iteration\
    \ process easy, you will once again use a Tab View Controller–based design to\
    \ switch between screens in the application. In this chapter, you will focus on\
    \ building the “Door” tab, which allows users to connect to the door-sensing hardware\
    \ and monitor the status of their door and the battery level of the device. In\
    \ the process of building the companion iPhone app, you will learn the following\
    \ key skills for IoT app development:\n\n*   Bluetooth LE core concepts\n*   Advertising\
    \ an Arduino as a Bluetooth peripheral\n*   Sending data updates from an Arduino\
    \ over Bluetooth\n*   Using Core Bluetooth on iOS to discover Bluetooth devices\n\
    *   Using Core Bluetooth on iOS to listen for device updates\n*   Responding to\
    \ Bluetooth updates in the background\n\nThis chapter will ask you to jump between\
    \ the Arduino IDE and Xcode. If you feel you need to refresh your knowledge of\
    \ Arduino, I recommend reviewing Chapter [5](#346879_2_En_5_Chapter.xhtml) and\
    \ checking out some of Adafruit’s online tutorials at [`https://learn.adafruit.com`](https://learn.adafruit.com).\n\
    \n## A Quick Introduction to Bluetooth LE\n\nTo make the rest of the chapter easier\
    \ for you to understand, I would first like to introduce some key concepts and\
    \ terminology relating to Bluetooth LE. In this chapter, you will implement different\
    \ aspects of the Bluetooth LE stack in the Arduino and iOS programs, and having\
    \ some knowledge of the big picture at the beginning will help make the components\
    \ easier to put together.\n\nBluetooth was originally developed as a short-distance,\
    \ low-power wireless communications protocol by the Bluetooth Special Interest\
    \ Group (SIG), a standards organization run by members from various computer hardware\
    \ and telecommunications companies. It was always intended to serve a different\
    \ purpose from LTE or Wi-Fi, aiming for efficient, short-message communication\
    \ between computers or computers and peripherals (accessories). Bluetooth LE (Low\
    \ Energy) was developed as part of the 4.0 specification of the Bluetooth standard\
    \ and was designed to provide a lower-power, lower-cost implementation of the\
    \ standard, without sacrificing range or requiring drastically different hardware\
    \ to implement either version of the standard (Classic Bluetooth or Bluetooth\
    \ LE). In practice, Apple and many other smartphone manufacturers use the lower-power,\
    \ slightly slower Bluetooth LE standard to communicate with accessories that require\
    \ little data (such as IoT health sensors or location beacons) and the higher-power,\
    \ higher-throughput Bluetooth standard for devices that require less latency (such\
    \ as phone headsets or speakers).\n\nWhen it comes to implementing Bluetooth,\
    \ there are two firmly defined *roles* (the actual name of the term) that a device\
    \ can play. A *peripheral* is a device whose role is to provide supporting features\
    \ or data for another device. You can think about a Bluetooth peripheral in the\
    \ same way that you would a peripheral for a personal computer. You connect to\
    \ a peripheral, and it provides *services* (features) that were previously not\
    \ available on the main processing unit. When you think of a Bluetooth keyboard\
    \ or headset, these are devices that act as *peripherals*. The other major role\
    \ a device can play is that of a *central* device, a device that connects to and\
    \ manages peripherals. In most cases, when you think of a computer or smartphone,\
    \ when it is sending its audio to a Bluetooth headset or using a Bluetooth keyboard\
    \ for input, it is serving the role of a central device.\n\nBluetooth devices\
    \ are not limited by their hardware to serve only one role. For example, within\
    \ the same application, you can create a mode in which the app is acting as a\
    \ central device and another in which the app is acting as a peripheral (for example,\
    \ if you were making an offline photo-sharing app), but a device will only serve\
    \ one role during a communication session. In this chapter, the Arduino will act\
    \ as the peripheral, and the `IOTHome` app will act as the central device.\n\n\
    If you have connected to a Bluetooth accessory from your iPhone, you may remember\
    \ that the process follows this order:\n\n1.  Scan for nearby devices.\n2.  Click\
    \ a device in the list to try to connect to it.\n3.  Confirm the connection using\
    \ a PIN code.\n4.  Begin Bluetooth communication.\n\nThe way a central device\
    \ finds peripherals is by *scanning* (searching) for their *advertising packets*\
    \ that are being broadcast by peripherals. Similar to an Ethernet packet, these\
    \ are special, short messages that advertise the device’s name, *services* (features),\
    \ and *characteristics* (data types) it provides. In a similar manner to pairing\
    \ from iOS, in most applications, you will use this advertising data to let the\
    \ user select which device he or she wants to connect to. Once the device is connected,\
    \ two-way communication can proceed. To save power on both sides, scanning and\
    \ advertising are operations that are initiated by a user and stop as soon as\
    \ a connection is established. In this chapter, the Arduino will start advertising\
    \ its services as soon as it is powered on, and the `Connect` button in the `IOTHome`\
    \ app will be used to scan for and connect to the Arduino.\n\nA final detail to\
    \ mention about Bluetooth is the idea of a *profile*. Services and characteristics\
    \ are identified by 128-bit universally unique identifiers (UUIDs). However, for\
    \ reoccurring hardware, such as heart rate monitors and headsets, the Bluetooth\
    \ SIG asks you to use the commonly agreed upon set of services and characteristics\
    \ of UUIDs for those devices. These are what are referred to as *profiles* and\
    \ can help you provide a better experience for your users, by taking advantage\
    \ of any optimizations the central device has for known profiles. For example,\
    \ iOS will show battery levels and a headphone icon when you connect to a Bluetooth\
    \ headset. The door sensor for the `IOTHome` app does not fit into any of the\
    \ predefined profiles, so you will use randomly generated UUIDs to identify it."
  raw: '## Learning Objectives


    In this chapter, you will take the door sensor you built in Chapter [5](#346879_2_En_5_Chapter.xhtml)
    and learn how to make it into a full Bluetooth LE solution by adding Bluetooth
    pairing and data transmission capabilities to your existing Arduino program, and
    then by building an iOS companion app to monitor the sensor. This chapter will
    start the new app that you will iterate throughout the section, IOTHome. IOTHome
    is an Internet of Things (IoT) home-management system, which will eventually be
    used to track multiple IoT devices and provide a secure, Siri-compatible interface
    to the hardware via HomeKit. For the sake of introduction, the design wireframes
    for the first iteration of the IOTHome app are provided in Figure [6-1](#346879_2_En_6_Chapter.xhtml#Fig1).


    ![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig1_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Design wireframes for the IOTHome app


    To make the iteration process easy, you will once again use a Tab View Controller–based
    design to switch between screens in the application. In this chapter, you will
    focus on building the “Door” tab, which allows users to connect to the door-sensing
    hardware and monitor the status of their door and the battery level of the device.
    In the process of building the companion iPhone app, you will learn the following
    key skills for IoT app development:


    *   Bluetooth LE core concepts


    *   Advertising an Arduino as a Bluetooth peripheral


    *   Sending data updates from an Arduino over Bluetooth


    *   Using Core Bluetooth on iOS to discover Bluetooth devices


    *   Using Core Bluetooth on IOS to listen for device updates


    *   Responding to Bluetooth updates in the background


    This chapter will ask you to jump between the Arduino IDE and Xcode. If you feel
    you need to refresh your knowledge of Arduino, I recommend reviewing Chapter [5](#346879_2_En_5_Chapter.xhtml)
    and checking out some of Adafruit’s online tutorials at [`https://learn.adafruit.com`](https://learn.adafruit.com)
    .


    ## A Quick Introduction to Bluetooth LE


    To make the rest of the chapter easier for you to understand, I would first like
    to introduce some key concepts and terminology relating to Bluetooth LE. In this
    chapter, you will implement different aspects of the Bluetooth LE stack in the
    Arduino and iOS programs, and having some knowledge of the big picture at the
    beginning will help make the components easier to put together.


    Bluetooth was originally developed as a short-distance, low-power wireless communications
    protocol by the Bluetooth Special Interest Group (SIG), a standards organization
    run by members from various computer hardware and telecommunications companies.
    It was always intended to serve a different purpose from LTE or Wi-Fi, aiming
    for efficient, short-message communication between computers or computers and
    peripherals (accessories). Bluetooth LE (Low Energy) was developed as part of
    the 4.0 specification of the Bluetooth standard and was designed to provide a
    lower-power, lower-cost implementation of the standard, without sacrificing range
    or requiring drastically different hardware to implement either version of the
    standard (Classic Bluetooth or Bluetooth LE). In practice, Apple and many other
    smartphone manufacturers use the lower-power, slightly slower Bluetooth LE standard
    to communicate with accessories that require little data (such as IoT health sensors
    or location beacons) and the higher-power, higher-throughput Bluetooth standard
    for devices that require less latency (such as phone headsets or speakers).


    When it comes to implementing Bluetooth, there are two firmly defined *roles*
    (the actual name of the term) that a device can play. A *peripheral* is a device
    whose role is to provide supporting features or data for another device. You can
    think about a Bluetooth peripheral in the same way that you would a peripheral
    for a personal computer. You connect to a peripheral, and it provides *services*
    (features) that were previously not available on the main processing unit. When
    you think of a Bluetooth keyboard or headset, these are devices that act as *peripherals*.
    The other major role a device can play is that is of a *central* device, a device
    that connects to and manages peripherals. In most cases, when you think of a computer
    or smartphone, when it is sending its audio to a Bluetooth headset or using a
    Bluetooth keyboard for input, it is serving the role of a central device.


    Bluetooth devices are not limited by their hardware to serve only one role. For
    example, within the same application, you can create a mode in which the app is
    acting as a central device and another in which the app is acting as a peripheral
    (for example, if you were making an offline photo-sharing app), but a device will
    only serve one role during a communication session. In this chapter, the Arduino
    will act as the peripheral, and the IOTHome app will act as the central device.


    If you have connected to a Bluetooth accessory from your iPhone, you may remember
    that the process follows this order:


    1.  Scan for nearby devices.


    2.  Click a device in the list to try to connect to it.


    3.  Confirm the connection using a PIN code.


    4.  Begin Bluetooth communication.


    The way a central device finds peripherals is by *scanning* (searching) for their
    *advertising packets* that are being broadcast by peripherals. Similar to an Ethernet
    packet, these are special, short messages that advertise the device’s name, *services*
    (features), and *characteristics* (data types) it provides. In a similar manner
    to pairing from iOS, in most applications, you will use this advertising data
    to let the user select which device he or she wants to connect to. Once the device
    is connected, two-way communication can proceed. To save power on both sides,
    scanning and advertising are operations that are initiated by a user and stop
    as soon as a connection is established. In this chapter, the Arduino will start
    advertising its services as soon as it is powered on, and the Connect button in
    the IOTHome app will be used to scan for and connect to the Arduino.


    A final detail to mention about Bluetooth is the idea of a *profile*. Services
    and characteristics are identified by 128-bit universally unique identifiers (UUIDs).
    However, for reoccurring hardware, such as heart rate monitors and headsets, the
    Bluetooth SIG asks you to use the commonly agreed upon set of services and characteristics
    of UUIDs for those devices. These are what are referred to as *profiles* and can
    help you provide a better experience for your users, by taking advantage of any
    optimizations the central device has for known profiles. For example, iOS will
    show battery levels and a headphone icon when you connect to a Bluetooth headset.
    The door sensor for the IOTHome app does not fit into any of the predefined profiles,
    so you will use randomly generated UUIDs to identify it.'
  trans: "\n# 学习目标\n\n在本章中，你将使用第 5 章搭建的门传感器，学习如何通过向现有 Arduino 程序添加蓝牙配对和数据传输功能，将其打造成完整的低功耗蓝牙解决方案，并构建一个\
    \ iOS 配套应用来监控该传感器。本章将启动一个新应用 `IOTHome`，你将在后续章节中持续迭代它。`IOTHome` 是一个物联网家居管理系统，最终将用于追踪多个物联网设备，并通过\
    \ HomeKit 为硬件提供安全且支持 Siri 的接口。作为介绍，图 6-1 展示了 `IOTHome` 应用首个迭代版本的设计线框。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig1_HTML.jpg](img/346879_2_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1  \n`IOTHome` 应用的设计线框\n\n为了简化迭代过程，你将再次采用基于标签视图控制器的设计，在应用的各个屏幕之间切换。本章中，你将专注于构建“门”标签，该标签允许用户连接到门传感硬件，并监控门的状态以及设备的电池电量。在构建这款\
    \ iPhone 配套应用的过程中，你将学习物联网应用开发的以下关键技能：\n\n*   低功耗蓝牙核心概念\n*   将 Arduino 作为蓝牙外设进行广播\n\
    *   通过蓝牙从 Arduino 发送数据更新\n*   在 iOS 上使用 Core Bluetooth 发现蓝牙设备\n*   在 iOS 上使用 Core\
    \ Bluetooth 监听设备更新\n*   在后台响应蓝牙更新\n\n本章将要求你在 Arduino IDE 和 Xcode 之间来回切换。如果你觉得需要回顾\
    \ Arduino 的知识，我建议重新学习第 5 章，并查看 Adafruit 的一些在线教程，网址为 [`https://learn.adafruit.com`](https://learn.adafruit.com)。\n\
    \n## 低功耗蓝牙快速入门\n\n为了方便你理解本章后续内容，我想先介绍一些与低功耗蓝牙相关的关键概念和术语。在本章中，你将在 Arduino 和 iOS\
    \ 程序中实现低功耗蓝牙协议栈的不同方面，提前了解整体框架将有助于你更轻松地将各个组件整合起来。\n\n蓝牙最初是由蓝牙技术联盟开发的短距离、低功耗无线通信协议。蓝牙技术联盟是一个由多家计算机硬件和电信公司成员运营的标准组织。它的设计目标从一开始就与\
    \ LTE 或 Wi-Fi 不同，旨在实现计算机之间或计算机与外设之间的高效、短消息通信。低功耗蓝牙是蓝牙 4.0 规范的一部分，旨在提供功耗更低、成本更低的实现方案，同时不牺牲通信距离，也无需为支持蓝牙经典或低功耗蓝牙任一版本而采用截然不同的硬件。在实践中，苹果和许多其他智能手机制造商使用功耗更低、速度稍慢的低功耗蓝牙标准，与数据量需求小的外设（如物联网健康传感器或位置信标）通信；而使用功耗更高、吞吐量更大的蓝牙标准，与对延迟要求较低的设备（如手机耳机或扬声器）通信。\n\
    \n在实现蓝牙功能时，设备可以扮演两种明确定义的*角色*。*外设*是一种为其设备提供支持功能或数据的设备。你可以把蓝牙外设想象成个人计算机的外设。你连接到外设，它便提供主处理单元原先不具备的*服务*。蓝牙键盘或耳机就是充当*外设*的设备。设备可以扮演的另一种主要角色是*中心*设备，即连接并管理外设的设备。大多数情况下，当计算机或智能手机将音频发送到蓝牙耳机，或使用蓝牙键盘输入时，它就在扮演中心设备的角色。\n\
    \n蓝牙设备并不受硬件限制只能扮演一种角色。例如，在同一个应用中，你可以创建一种模式，使应用充当中心设备，同时创建另一种模式使应用充当外设（例如，如果你正在制作一个离线照片分享应用）。但在一次通信会话中，设备只会扮演一个角色。在本章中，Arduino\
    \ 将扮演外设，而 `IOTHome` 应用将扮演中心设备。\n\n如果你曾用 iPhone 连接过蓝牙外设，可能还记得过程是这样的：\n\n1.  扫描附近设备。\n\
    2.  点击列表中的设备尝试连接。\n3.  使用 PIN 码确认连接。\n4.  开始蓝牙通信。\n\n中心设备发现外设的方式是*扫描*（搜索）外设正在广播的*广播数据包*。类似于以太网数据包，这些是特殊的短消息，用于广播设备的名称、*服务*以及它提供的*特征*（数据类型）。与\
    \ iOS 上的配对方式类似，在大多数应用中，你将利用这些广播数据让用户选择他要连接的设备。一旦设备连接成功，就可以进行双向通信。为了在双方设备上节省电量，扫描和广播是由用户发起的操作，一旦连接建立就会停止。在本章中，Arduino\
    \ 一通电就会开始广播其服务，而 `IOTHome` 应用中的“连接”按钮将用于扫描并连接 Arduino。\n\n最后要提及的蓝牙概念是*规范*。服务和特征通过\
    \ 128 位的通用唯一标识符来标识。然而，对于心率监测器、耳机等重复出现的硬件，蓝牙技术联盟要求你使用这些设备通用的服务与特征 UUID 集合。这些被称为*规范*，通过利用中心设备对已知规范的优化，可以帮助你为用户提供更好的体验。例如，当你连接蓝牙耳机时，iOS\
    \ 会显示电池电量和耳机图标。`IOTHome` 应用的门传感器不属于任何预定义的规范，因此你将使用随机生成的 UUID 来标识它。\n"
- fmt: "# Adding Bluetooth Functionality to an Arduino Solution\n\nNow that you have\
    \ a better understanding of Bluetooth, you are ready to start implementing it\
    \ in the Arduino solution (program) for the door sensor. To configure the door\
    \ sensor as a Bluetooth peripheral, you must do the following to the Arduino solution:\n\
    \n- Establish the device as a Bluetooth server (peripheral), so it can accept\
    \ incoming connections\n- Advertise the services and characteristics the peripheral\
    \ provides\n- Send data updates over Bluetooth LE when the magnetic switch state\
    \ or battery level changes\n\nAlthough Bluetooth LE itself is an efficient protocol,\
    \ you can make your implementation even more efficient by pushing updates only\
    \ when something changes (rather than every second). Keeping the connection established\
    \ is a low-power operation, but pushing data over it has a cost. Reducing communication\
    \ will help battery life on the Arduino and iOS app significantly.\n\nAs does\
    \ iOS, Arduino has a vast collection of libraries provided by the Arduino foundation\
    \ and open source libraries developed by the user community. In this chapter,\
    \ you will use the `ESP32_BLE_Arduino` library, developed by Neil Kolban, to establish\
    \ the Bluetooth LE server, handle incoming connections, and push updates over\
    \ Bluetooth LE. His hard work means you do not have to study timing diagrams or\
    \ implement the low-level protocol yourself. You can focus on how to use Bluetooth\
    \ in your app, rather than on how to build it. Additionally, his library provides\
    \ customization, specifically for ESP32-based devices such as the Adafruit HUZZAH32\
    \ you are using for this project. Although the form factor and available features\
    \ for ESP32-based devices vary widely, they all use the same system-on-a-chip\
    \ (SoC) from Espressif. The device manufacturers (OEMs) simply decide what they\
    \ want to use and how to expose it.\n\n## Installing the `ESP32_BLE_Arduino` Library\
    \ for Bluetooth Communication\n\nTo take advantage of the `ESP32_BLE_Arduino`\
    \ library, you first must import it into the Arduino IDE. After you have imported\
    \ it, you can use it again in other projects, without having to repeat the import\
    \ step. To begin, navigate to the GitHub page for the library at `https://github.com/nkolban/ESP32_BLE_Arduino`.\
    \ To download the latest version of the library, click the **Clone or download**\
    \ button at the top right, as shown in Figure 6-2. You will have options to **Open\
    \ in Desktop** (normally this will open GitHub or Sourcetree, if they are installed\
    \ on your computer) or **Download ZIP** (download the files as a zipped archive).\
    \ Because you will have to import only a subset of the files into the Arduino\
    \ IDE, I recommend selecting **Download ZIP**.\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig2_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig2_HTML.jpg)\n\
    \n**Figure 6-2** Downloading a repository from GitHub\n\nOnce the repository is\
    \ on your computer, return to the Arduino IDE and go to the **Sketch** menu. As\
    \ shown in Figure 6-3, select **Include Library** and then **Add .ZIP Library**.\
    \ When the file browser window appears, select the zip file you just downloaded.\n\
    \n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig3_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig3_HTML.jpg)\n\
    \n**Figure 6-3** Importing a zip archive\n\nAfter importing the file, return to\
    \ the **Sketch** menu. As shown in Figure 6-4, select **Include Library** one\
    \ more time. This time, the library you just imported, **ESP32 BLE Arduino**,\
    \ should appear in the context menu.\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig4_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig4_HTML.jpg)\n\
    \n**Figure 6-4** Including the ESP32 BLE Arduino library in your project\n\nAfter\
    \ selecting the library, you will notice that the source code for your solution\
    \ has been modified to include some of the files from the library, as shown in\
    \ Listing 6-1.\n\n```\n#include \n#include \n#include \n#include \n#define RED_LED_PIN\
    \ 14\n...\nvoid setup() {\n  // put your setup code here, to run once:\n  Serial.begin(9600);\n\
    \  Serial.println(\" Program start\");\n  ...\n}\n...\n```\n\n**Listing 6-1**\
    \ Arduino Solution After Including ESP32 BLE Library\n\nFor this project, you\
    \ must use the Bluetooth server and data transmission features of the library,\
    \ which are not provided by the default set of included files. Modify your solution,\
    \ as shown in Listing 6-2, to include the correct files.\n\n```\n#include \n#include\
    \ \n#include \n#include \n#define RED_LED_PIN 14\n...\nvoid setup() {\n  // put\
    \ your setup code here, to run once:\n  Serial.begin(9600);\n  Serial.println(\"\
    \ Program start\");\n  pinMode(RED_LED_PIN, OUTPUT);\n  ...\n}\n...\n```\n\n**Listing\
    \ 6-2** Arduino Solution with Files for Bluetooth Server Features\n\nTo confirm\
    \ that the files are compatible with the project, click the **Verify** button\
    \ in the Arduino IDE. The project should compile successfully. You can repeat\
    \ these steps to include other libraries in your future projects."
  raw: "## Adding Bluetooth Functionality to an Arduino Solution\n\nNow that you have\
    \ a better understanding of Bluetooth, you are ready to start implementing it\
    \ in the Arduino solution (program) for the door sensor. To configure the door\
    \ sensor as a Bluetooth peripheral, you must do the following to the Arduino solution:\n\
    \n*   Establish the device as a Bluetooth server (peripheral), so it can accept\
    \ incoming connections\n\n*   Advertise the services and characteristics the peripheral\
    \ provides\n\n*   Send data updates over Bluetooth LE when the magnetic switch\
    \ state or battery level changes\n\nAlthough Bluetooth LE itself is an efficient\
    \ protocol, you can make your implementation even more efficient by pushing updates\
    \ only when something changes (rather than every second). Keeping the connection\
    \ established is a low-power operation, but pushing data over it has a cost. Reducing\
    \ communication will help battery life on the Arduino and iOS app significantly.\n\
    \nAs does iOS, Arduino has a vast collection of libraries provided by the Arduino\
    \ foundation and open source libraries developed by the user community. In this\
    \ chapter, you will use the ESP32_BLE_Arduino library, developed by Neil Kolban,\
    \ to establish the Bluetooth LE server, handle incoming connections, and push\
    \ updates over Bluetooth LE. His hard work means you do not have to study timing\
    \ diagrams or implement the low-level protocol yourself. You can focus on how\
    \ to use Bluetooth in your app, rather than on how to build it. Additionally,\
    \ his library provides customization, specifically for ESP32-based devices such\
    \ as the Adafruit HUZZAH32 you are using for this project. Although the form factor\
    \ and available features for ESP32-based devices vary widely, they all use the\
    \ same system-on-a-chip (SoC) from Espressif. The device manufacturers (OEMs)\
    \ simply decide what they want to use and how to expose it.\n\n### Installing\
    \ the ESP32_BLE_Arduino Library for Bluetooth Communication\n\nTo take advantage\
    \ of the ESP32_BLE_Arduino library, you first must import it into the Arduino\
    \ IDE. After you have imported it, you can use it again in other projects, without\
    \ having to repeat the import step. To begin, navigate to the GitHub page for\
    \ the library at [`https://github.com/nkolban/ESP32_BLE_Arduino`](https://github.com/nkolban/ESP32_BLE_Arduino)\
    \ . To download the latest version of the library, click the Clone or download\
    \ button at the top right, as shown in Figure [6-2](#346879_2_En_6_Chapter.xhtml#Fig2).\
    \ You will have options to Open in Desktop (normally this will open GitHub or\
    \ Sourcetree, if they are installed on your computer) or Download ZIP (download\
    \ the files as a zipped archive). Because you will have to import only a subset\
    \ of the files into the Arduino IDE, I recommend selecting Download ZIP.\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig2_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nDownloading a repository from GitHub\n\nOnce the repository is\
    \ on your computer, return to the Arduino IDE and go to the Sketch menu. As shown\
    \ in Figure [6-3](#346879_2_En_6_Chapter.xhtml#Fig3), select Include Library and\
    \ then Add .ZIP Library. When the file browser window appears, select the zip\
    \ file you just downloaded.\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig3_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3\n\nImporting a zip archive\n\nAfter importing the file, return to\
    \ the Sketch menu. As shown in Figure [6-4](#346879_2_En_6_Chapter.xhtml#Fig4),\
    \ select Include Library one more time. This time, the library you just imported,\
    \ ESP32 BLE Arduino, should appear in the context menu.\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig4_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\n\nIncluding the ESP32 BLE Arduino library in your project\n\nAfter\
    \ selecting the library, you will notice that the source code for your solution\
    \ has been modified to include some of the files from the library, as shown in\
    \ Listing [6-1](#346879_2_En_6_Chapter.xhtml#PC1).\n\n```\n#include \n#include\
    \ \n#include \n#include \n#define RED_LED_PIN 14\n...\nvoid setup() {\n// put\
    \ your setup code here, to run once:\nSerial.begin(9600);\nSerial.println(\" Program\
    \ start\");\n...\n}\n...\nListing 6-1\nArduino Solution After Including ESP32\
    \ BLE Library\n```\n\nFor this project, you must use the Bluetooth server and\
    \ data transmission features of the library, which are not provided by the default\
    \ set of included files. Modify your solution, as shown in Listing [6-2](#346879_2_En_6_Chapter.xhtml#PC2),\
    \ to include the correct files.\n\n```\n#include \n#include \n#include \n#include\
    \ \n#define RED_LED_PIN 14\n...\nvoid setup() {\n// put your setup code here,\
    \ to run once:\nSerial.begin(9600);\nSerial.println(\" Program start\");\npinMode(RED_LED_PIN,\
    \ OUTPUT);\n...\n}\n...\nListing 6-2\nArduino Solution with Files for Bluetooth\
    \ Server Features\n```\n\nTo confirm that the files are compatible with the project,\
    \ click the Verify button in the Arduino IDE. The project should compile successfully.\
    \ You can repeat these steps to include other libraries in your future projects."
  trans: "\n# 为 Arduino 解决方案添加蓝牙功能\n\n既然你对蓝牙有了更深入的了解，就可以开始在门磁传感器的 Arduino 解决方案（程序）中应用它了。要将门磁传感器配置为蓝牙外设，你需要在\
    \ Arduino 解决方案中执行以下操作：\n\n- 将设备设置为蓝牙服务器（外设），使其能够接受传入连接\n- 广播外设提供的服务和特征\n- 当磁簧开关状态或电池电量发生变化时，通过低功耗蓝牙发送数据更新\n\
    \n尽管低功耗蓝牙本身是一种高效的协议，但你可以在状态发生变化时（而非每秒）才推送更新，从而使实现更加高效。保持连接建立是一种低功耗操作，但通过它推送数据会产生能耗成本。减少通信将显著延长\
    \ Arduino 和 iOS 应用的电池续航时间。\n\n与 iOS 类似，Arduino 拥有由 Arduino 基金会提供的大量库以及用户社区开发的开源库。在本章中，你将使用\
    \ Neil Kolban 开发的 `ESP32_BLE_Arduino` 库来建立低功耗蓝牙服务器、处理传入连接并通过低功耗蓝牙推送更新。他的付出意味着你无需研究时序图或自行实现底层协议。你可以专注于如何在应用中使用蓝牙，而非如何构建它。此外，他的库还提供了针对基于\
    \ ESP32 的设备（例如本项目使用的 Adafruit HUZZAH32）的定制功能。尽管基于 ESP32 的设备在形态和可用功能上千差万别，但它们都使用来自乐鑫（Espressif）的同一款片上系统（SoC）。设备制造商（OEM）只需决定要使用哪些功能以及如何将它们暴露出来。\n\
    \n## 安装 `ESP32_BLE_Arduino` 库以实现蓝牙通信\n\n要使用 `ESP32_BLE_Arduino` 库，你首先必须将其导入 Arduino\
    \ IDE。导入后，你可以在其他项目中重复使用它，而无需重复导入步骤。首先，在浏览器中访问该库的 GitHub 页面：`https://github.com/nkolban/ESP32_BLE_Arduino`。要下载该库的最新版本，请点击右上角的\
    \ **Clone or download**（克隆或下载）按钮，如图 6-2 所示。你将看到 **Open in Desktop**（在桌面客户端中打开，通常如果电脑上安装了\
    \ GitHub 或 Sourcetree，会打开相应程序）或 **Download ZIP**（将文件以压缩包形式下载）两个选项。由于你只需将库中的部分文件导入\
    \ Arduino IDE，我建议选择 **Download ZIP**。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig2_HTML.jpg](img/346879_2_En_6_Fig2_HTML.jpg)\n\
    \n**图 6-2** 从 GitHub 下载仓库\n\n将仓库下载到电脑后，返回 Arduino IDE，进入 **Sketch**（项目）菜单。如图 6-3\
    \ 所示，选择 **Include Library**（加载库），然后选择 **Add .ZIP Library**（添加 .ZIP 库）。当文件浏览器窗口出现时，选择你刚刚下载的\
    \ zip 文件。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig3_HTML.jpg](img/346879_2_En_6_Fig3_HTML.jpg)\n\
    \n**图 6-3** 导入 zip 压缩包\n\n导入文件后，再次返回 **Sketch**（项目）菜单。如图 6-4 所示，再次选择 **Include\
    \ Library**（加载库）。这次，你刚刚导入的库 **ESP32 BLE Arduino** 应该会出现在上下文菜单中。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig4_HTML.jpg](img/346879_2_En_6_Fig4_HTML.jpg)\n\
    \n**图 6-4** 在项目中包含 ESP32 BLE Arduino 库\n\n选择该库后，你会注意到解决方案的源代码已被修改，包含了该库中的部分文件，如代码清单\
    \ 6-1 所示。\n\n```\n#include \n#include \n#include \n#include \n#define RED_LED_PIN\
    \ 14\n...\nvoid setup() {\n  // put your setup code here, to run once:\n  Serial.begin(9600);\n\
    \  Serial.println(\" Program start\");\n  ...\n}\n...\n```\n\n**代码清单 6-1** 包含\
    \ ESP32 BLE 库后的 Arduino 解决方案\n\n对于本项目，你必须使用该库的蓝牙服务器和数据传输功能，而这些功能并未包含在默认导入的文件集中。请修改你的解决方案，如代码清单\
    \ 6-2 所示，以包含正确的文件。\n\n```\n#include \n#include \n#include \n#include \n#define\
    \ RED_LED_PIN 14\n...\nvoid setup() {\n  // put your setup code here, to run once:\n\
    \  Serial.begin(9600);\n  Serial.println(\" Program start\");\n  pinMode(RED_LED_PIN,\
    \ OUTPUT);\n  ...\n}\n...\n```\n\n**代码清单 6-2** 包含蓝牙服务器功能文件的 Arduino 解决方案\n\n要确认这些文件与项目兼容，请点击\
    \ Arduino IDE 中的 **Verify**（验证）按钮。项目应能够成功编译。你可以在未来的项目中重复这些步骤以包含其他库。\n"
- fmt: "# Setting Up the Arduino As a Bluetooth Peripheral\n\nNow that the Bluetooth\
    \ library has been imported, you can start implementing the Bluetooth server,\
    \ which will allow the device to advertise itself as a peripheral and accept incoming\
    \ connections. To revisit the earlier overview of the Bluetooth specification,\
    \ this is accomplished by advertising the services (features) and data types (characteristics)\
    \ the device provides. Both of these values are represented as 128-bit UUIDs.\
    \ A UUID is a mostly random pattern of hexadecimal characters; however, in order\
    \ to register the door sensor as a Bluetooth LE–compatible device, you will have\
    \ to replace some of the values with known identifiers from the Bluetooth LE specification.\n\
    \nTo get started, you will have to generate four UUIDs—two to represent the services\
    \ being advertised (information about the door, information about the battery)\
    \ and two to represent the characteristics (battery level, door lock status).\
    \ On your Mac, you can generate UUIDs from the command line, using the `uuidgen`\
    \ tool. I have shared my result in Listing [6-3](#346879_2_En_6_Chapter.xhtml#PC3).\n\
    \n```\nahmeds-macbook:arduino abakir$ uuidgen\n8CED1808-7984-47CE-BE9C-E2DD56317575\n\
    Listing 6-3\nGenerating a UUID from the OS X Command Line\n```\n\nAs you can see,\
    \ no additional parameters are required to run the `uuidgen` tool. The result\
    \ is printed immediately as a string on the command line. Run this command four\
    \ times to generate your four UUIDs and save the results. I have appended my results\
    \ to the Arduino solution, as shown in Listing [6-4](#346879_2_En_6_Chapter.xhtml#PC4).\n\
    \n```\n#include \n#include \n#include \n#include \n#define RED_LED_PIN 14\n...\n\
    #define LOCK_SERVICE_UUID        \"83b46845-6e9c-4b25-89cf-871cc74cc68e\"\n#define\
    \ BATT_SERVICE_UUID        \"7d6925f3-6e19-48c6-a503-05585abe761e\"\n#define LOCK_CHARACTERISTIC_UUID\
    \ \"4b61d6b9-2e29-4fdf-a74a-7b8bf70ecd9a\"\n#define BATT_CHARACTERISTIC_UUID \"\
    8e628af6-0275-4f80-bb64-58f2b2771cba\"\nvoid setup() {\n// put your setup code\
    \ here, to run once:\nSerial.begin(9600);\nSerial.println(\" Program start\");\n\
    pinMode(RED_LED_PIN, OUTPUT);\n...\n}\n...\nListing 6-4\nAppending UUIDs to the\
    \ Arduino Solution\n```\n\nNext, you must replace with known values from the Bluetooth\
    \ specification the second two bytes (the four characters starting at the fifth\
    \ character in the string). This master record of values is called the Bluetooth\
    \ GATT (Generic Attributes). You can find the values for services at [`www.bluetooth.com/specifications/gatt/services`](http://www.bluetooth.com/specifications/gatt/services)\
    \ and the values for characteristics at [`www.bluetooth.com/specifications/gatt/characteristics`](http://www.bluetooth.com/specifications/gatt/characteristics).\
    \ While the GATT do not cover all use cases, they cover a wide range, which should\
    \ be sufficient for most projects. For advertising the battery level, you can\
    \ use the Battery Service identifier (`0x180F`) and the Battery Level State characteristic\
    \ (`0x2A1B`). The door is a bit harder, as there is no door service; however,\
    \ the Alert Notification Service identifier (`0x1811`) and Alert Status characteristic\
    \ (`0x2A3F`) estimate the use case pretty well and are appropriate here. As shown\
    \ in Listing [6-5](#346879_2_En_6_Chapter.xhtml#PC5), modify your solution to\
    \ include these new values.\n\n```\n#include \n#include \n#include \n#include\
    \ \n#define RED_LED_PIN 14\n...\n#define LOCK_SERVICE_UUID        \"83b41811-6e9c-4b25-89cf-871cc74cc68e\"\
    \n#define BATT_SERVICE_UUID        \"7d69180F-6e19-48c6-a503-05585abe761e\"\n\
    #define LOCK_CHARACTERISTIC_UUID \"4b612A3F-2e29-4fdf-a74a-7b8bf70ecd9a\"\n#define\
    \ BATT_CHARACTERISTIC_UUID \"8e622A1B-0275-4f80-bb64-58f2b2771cba\"\nvoid setup()\
    \ {\n// put your setup code here, to run once:\nSerial.begin(9600);\nSerial.println(\"\
    \ Program start\");\npinMode(RED_LED_PIN, OUTPUT);\n...\n}\n...\nListing 6-5\n\
    Arduino Solution with Valid GATT UUIDs\n```\n\nNext, you can begin setting up\
    \ the Bluetooth server. The `Arduino_ESP32_BLE` library exposes these functions\
    \ through the `BLEServer` class. The class is straightforward to use, as the setup\
    \ primarily requires registering the characteristics, services, and callback handlers\
    \ for the server events (for example, connection initiated, disconnected). To\
    \ begin, initialize the server, characteristics, and services, as shown in Listing\
    \ [6-6](#346879_2_En_6_Chapter.xhtml#PC6).\n\n```\n...\n#define BATT_CHARACTERISTIC_UUID\
    \ \"134c298f-7d6b-4f64-8496-8965e0851d03\"\nBLECharacteristic *lockCharacteristic;\n\
    BLECharacteristic *battCharacteristic;\nvoid setup() {\n...\npinMode(BATTERY_PIN,\
    \ INPUT);\nstartBLE();\n}\nvoid startBLE() {\n// Create the BLE Device\nBLEDevice::init(\"\
    IOTDoor\");\n// Create the BLE Server\nBLEServer *bleServer = BLEDevice::createServer();\n\
    // Create the BLE Service\nBLEService *lockService = bleServer->\ncreateService(LOCK_SERVICE_UUID);\n\
    // Create a BLE Characteristic\nlockCharacteristic = lockService->createCharacteristic(\n\
    LOCK_CHARACTERISTIC_UUID,\nBLECharacteristic::PROPERTY_READ   |\nBLECharacteristic::PROPERTY_WRITE\
    \  |\nBLECharacteristic::PROPERTY_NOTIFY |\nBLECharacteristic::PROPERTY_INDICATE\n\
    );\nlockCharacteristic->addDescriptor(new BLE2902());\nBLEService *battService\
    \ = bleServer->\ncreateService(BATT_SERVICE_UUID);\nbattCharacteristic = lockService->createCharacteristic(\n\
    BATT_CHARACTERISTIC_UUID,\nBLECharacteristic::PROPERTY_READ   |\nBLECharacteristic::PROPERTY_WRITE\
    \  |\nBLECharacteristic::PROPERTY_NOTIFY |\nBLECharacteristic::PROPERTY_INDICATE\n\
    );\nbattCharacteristic->addDescriptor(new BLE2902());\n// Start the service\n\
    lockService->start();\nbattService->start();\n// Start advertising\nbleServer->getAdvertising()->start();\n\
    }\nListing 6-6\nInitializing the Bluetooth LE Server from the Arduino Solution\n\
    ```\n\nIn accordance with the execution flow of Arduino solutions, you must start\
    \ the server from the `setup()` method, as it is the only area of the program\
    \ that is executed once. To send messages later on, you will have to reuse the\
    \ characteristic objects, thus I declared them as global variables. When setting\
    \ up the services and characteristics, be careful to attach them correctly, or\
    \ they will not work. As with the Bluetooth specification, services can only be\
    \ discovered when they are attached to a characteristic. The properties for the\
    \ characteristics do not have to include the full list in my example (`READ`,\
    \ `WRITE`, `NOTIFY`, `INDICATE`). For future projects, you can pare them down\
    \ as you need to.\n\nThe final requirement to start the server is to register\
    \ the connection callbacks. To perform this operation, you will have to implement\
    \ the `BLEServerCallbacks` protocol. As C++ and Swift share common language design\
    \ ancestry, the process of implementing the protocol should be very familiar to\
    \ you. Just as in Swift, define a class that inherits the protocol, and implement\
    \ the required named methods, `onConnect(BLEServer * pServer)` and `onDisconnect(BLEServer\
    \ * pServer)`. As the names suggest, these are called when the server establishes\
    \ or destroys a connection. In Listing [6-7](#346879_2_En_6_Chapter.xhtml#PC7),\
    \ I have modified the solution to include this code and added the call to attach\
    \ the callbacks to the server object. Right now, the only actions you must perform\
    \ on the callbacks are setting a status object to `true` or `false` and turning\
    \ the blue LED on or off. Later, you will use this status object again, to help\
    \ filter outgoing messages."
