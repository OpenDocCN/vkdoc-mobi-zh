    There are three primary tasks required to set up a table view in watchOS: specify
    the number of rows in the table, looking up cells by their identifier string,
    and initializing the discovered cells. In Listing [10-13](#346879_2_En_10_Chapter.xhtml#PC13),
    I have expanded the `refreshTable()` method to include this logic. Pay special
    attention to use the exact same identifier string for the row controller that
    you used in the storyboard.


    ```

    class InterfaceController: WKInterfaceController {

    ...

    func refreshTable() {

    guard let workouts = workouts else { return }

    workoutTable?.setNumberOfRows(workouts.count,

    withRowType: "WorkoutRow")

    for index in 0..<workouts.count {

    guard let row = workoutTable?.rowController(at:

    index) as? WorkoutRowController else { return }

    let selectedWorkout = workouts[index]

    let dateString = dateFormatter.string(from:

    selectedWorkout.startTime)

    let durationString =

    WorkoutDataManager.stringFromTime(timeInterval:

    selectedWorkout.duration)

    let detailText = String(format: "%.0f m | %@",

    arguments: [selectedWorkout.distance,

    durationString])

    row.dateLabel?.setText(dateString)

    row.durationLabel?.setText(detailText)

    }

    }

    }

