  trans: '

    ### 配置树莓派开机自启服务器


    作为搭建网络服务器的最后一步，你应该让 Node 应用在树莓派启动时自动运行。这样，每次你想通过 HTTPS 访问数据时，就无需手动启动和运行 Node 应用了。如果你在上章的
    HomeBridge 项目中执行过此步骤，那么你对这个设置过程应该非常熟悉。你将使用 `systemd` 工具创建一个服务来管理此操作。不过，与 HomeBridge
    不同，IOTHome 网络服务器作为服务来设置要简单得多。


    首先，你必须创建一个服务定义。使用你喜欢的文本编辑器在主目录下创建一个名为 `iothome.service` 的文件。在此文件中，你需要指定：


    -   服务名称

    -   作为服务运行的脚本的工作目录

    -   脚本的位置

    -   脚本的用户权限

    -   脚本的失败行为


    在代码清单 8-14 中，我提供了该项目实现的服务定义文件。为了模拟开发环境，请注意用户设置为 `root`，并且工作目录设置为 `pi` 用户的 `sites/iothome`
    文件夹。


    ```

    [Service]

    WorkingDirectory=/home/pi/sites/iothome

    ExecStart=node app.js

    Restart=always

    StandardOutput=syslog

    StandardError=syslog

    SyslogIdentifier=iothome

    User=root

    Group=root

    [Install]

    WantedBy=multi-user.target

    代码清单 8-14

    IOTHome Node 应用的服务定义

    ```


    接下来，你需要将定义文件复制到 `systemd` 的默认目录，并为该文件启用读取和执行权限。


    ```

    sudo cp ~/iothome.service \ /etc/systemd/system/iothome.service

    sudo chmod u+rwx /etc/systemd/system/iothome.service

    ```


    与 HomeBridge 服务一样，你必须使用 `systemctl` 注册该服务。


    ```

    sudo systemctl enable iothome

    ```


    要启动服务，再次调用 `systemctl` 工具，这次使用 `start` 命令。


    ```

    sudo systemctl start iothome

    ```


    你的脚本现已设置为与树莓派一起重启！要确认操作是否成功，请重启你的树莓派，然后尝试从浏览器调用 `/temperature` 端点。要查看错误消息，请使用
    `status` 命令调用 `systemctl` 工具。


    ```

    sudo systemctl status iothome

    ```


    从现在开始，如果你需要修改服务定义或脚本本身，请在执行更改前停止服务，然后在完成后重新启动它。


    ## 从 iOS App 连接到你的服务器


    至此，你可以使用树莓派上的网络服务器访问来自 IOTHome 系统的所有数据。你还学习了许多不同的调试连接工具，包括 Google Chrome、命令行和
    Postman。然而，这是一本关于 iOS 的书，因此学习如何将这些技能应用于 iOS 应用是理所当然的。


    在本节中，你将扩展前几章的 IOTHome 应用，添加一个屏幕，允许用户通过 HTTP（而非蓝牙）访问系统中的传感器。虽然 Apple 平台的 UI 代码大多数情况下是一次性的，但网络代码可以在所有平台之间复用。在第
    9 章中，你将复用本章的网络代码，为 IOTHome 系统构建一个基于 Apple TV 的仪表盘。


    ### 设置用户界面


    对于这个项目，用户界面扮演着支持网络代码的角色。因此，我不想过多关注为 Home Manager 屏幕（旨在显示整个系统数据的屏幕）创建新的用户界面。与 Door
    Manager 不同，它应该显示来自温度系统的信息，并连接到网络服务器（而非蓝牙）来检索数据。为此，你将继承 `DoorViewController` 类（Door
    Manager 屏幕的基础），添加用于显示温度的新属性，并重写 `connect()` 方法以发起对 HTTPS 网络服务器的调用，而不是蓝牙设备。


    对于用户界面，我在图 8-9 中提供了更新后的线框图。我使用了与 Door Manager 屏幕相同的基本布局，只是在门传感器信息上方添加了用于显示温度和湿度数据的新标签。我还更改了“更新”按钮的描述文本。


