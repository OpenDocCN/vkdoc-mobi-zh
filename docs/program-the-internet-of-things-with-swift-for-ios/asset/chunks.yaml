- fmt: '# 3. Using Core Motion to Add Physical Activity Data to Your Apps


    In the last two chapters, you started with a drawing of a workout app and fleshed
    it out with a functioning user interface that could be used to record workout
    distance based on GPS readings and display the path on a map. Unfortunately, as
    you may have noticed by playing with the app, the locations only updated when
    the user moved and the app was suspectible to lost GPS signals, occasionally producing
    inaccurate distance data. To make a more accurate and appropriate workout app,
    in this chapter, you will learn how to use Core Motion, Apple’s interface to the
    M-series motion coprocessor, the chip that provides the pedometer, accelerometer,
    and gyroscope features on the iPhone and Apple Watch.


    With the features provided by the Core Motion framework, you can not only provide
    users with data they expect from other workout trackers (such as step count) but
    reduce your app’s battery impact, as GPS is one of the most power-hungry features
    of the iPhone. As iOS devices continued to evolve, many workout apps followed
    this same transformation by shifting GPS from being the primary sensing method
    to an opt-in feature for power users.


    One last bonus for you as a developer is that you will be able to leverage the
    knowledge from this chapter again later in the book when you build a watchOS version
    of the IOTFit app. When Apple was trying to strengthen watchOS during its 2.0
    release, it added slimmed-down versions of iOS frameworks to the watch itself.
    Core Motion and many of the other workout-related frameworks retain the most APIs
    from iOS, so the porting process should be painless.


    ### Caution


    Core Motion relies on a discrete microprocessor chip to perform its motion-tracking
    functions. While a variation of this chip is available on iPhones and Apple Watch
    devices, as of this writing, it is not available on iPad. You can still develop
    this project with an iPad, but you will not able to test it successfully.


    ## Learning Objectives


    In this chapter, you will learn how to use Core Motion to extend the IOTFit app
    to display live-updating reports on step count and activity type, perform step-based
    distance calculations, and measure changes in elevation. By performing these tasks,
    you will learn the following key skills for Internet of Things (IoT) app development:


    - Setting up an app for motion (activity) permission

    - Requesting step data from the iPhone’s pedometer

    - Measuring difference in altitude during the iPhone’s altimeter

    - Responding to fast-changing events (step count, activity type, altitude)

    - Performing calculations based on motion data


    Just as with Core Location, Core Motion provides your app access to hardware on
    the iPhone that has the potential to collect sensitive data about the user. You
    will apply the lessons you learned from Chapter 2 (location features) to check
    for the availability of motion features on the user’s device and ask for his/her
    permission. This chapter acts like the third iteration, or third sprint, of IOTFit.
    It builds on the foundations in user interface development and permission-based
    resource development you learned in Chapters 1 and 2 to introduce a new concept.
    If you are still unsure of either topic, please review those chapters before continuing
    with this one.


    As with the previous chapters, the project in this chapter is meant to be built
    as you progress through the narrative. If you get stuck on anything or need some
    reference, the completed code for this project is available on the GitHub repository
    for this book, under the `Chapter 3` folder (https://github.com/Apress/program-internet-of-things-w-swift-for-ios).


    ## Requesting Motion Permission from the User


    When you built the location-based features of the IOTFit app in Chapters 1 and
    2, the changes consisted of three major components:


    - Modifying the project file to declare it would use a sensitive permission (and
    why)

    - Checking for the availability of a hardware resource before attempting to use
    it

    - Displaying a pop-up asking the user to allow the app to use the sensitive permission


    These concepts all apply to Core Motion as well; however, unlike Core Location,
    you have less control over how to present the permissions request. With Core Motion,
    the request is presented the first time an attempt to access a protected resource
    is made. While this may seem like it is great, because it means less code, the
    implication is that you will have to move your resource availability check from
    the beginning of execution to before each operation begins.


    The easiest place to start is by declaring your project as requiring motion permission.
    You enable this operation by adding the `NSMotionUsageDescription` key-value pair
    to your project’s `Info.plist` file. First, make a copy of the IOTFit project
    from Chapter 2 (either from your own code or the GitHub repository) and open the
    project. As shown in Figure 3-1, click the project name in the project hierarchy
    to open the Project Setting editor, then click the Info tab. Scroll down to the
    vicinity of the location permission key-value pairs (for example, Privacy - When
    In Use Description) and click the plus (`+`) button to add a new key-value pair.
    The key for motion permission is Privacy - Motion Usage Description.


    ![Figure 3-1: Adding the motion permission description to the IOTFit project](images/346879_2_En_3_Chapter/346879_2_En_3_Fig1_HTML.jpg)


    Click inside the text field to enter in the description that will appear when
    the user is prompted for motion permission. For the IOTFit project, I used the
    following text:


    > IOTFit would like to use motion permission to help you measure the step count
    and altitude of your workouts. This information will not be shared outside of
    the app.


    To help your users (and to prevent getting rejected by the App Store submission
    team), you should always describe why you need to use a restricted resource as
    accurately as possible. During App Store submissions (initial requests and updates),
    Apple will run your app and attempt to verify that you are actually using the
    permissions you requested.


    Now that the project is set up for motion permission, you must check if the M-series
    motion coprocessor is available for use on the user’s device. In a similar manner
    to Core Location, you can query the `CMMotionManager` class to check for hardware
    availability. You can perform this operation by querying the `isDeviceMotionAvailable`
    calculated property. There is more variation in the motion sensing hardware in
    iOS devices, as compared to GPS hardware, so you will also have to add checks
    for the features you are trying to use (step counting, altitude). These have similar
    class methods that you can call to check availability. In Listing 3-1, I have
    updated the `CreateWorkoutViewController` class to include the Core Motion framework
    and check for hardware availability inside the `startWorkout()` method.'
