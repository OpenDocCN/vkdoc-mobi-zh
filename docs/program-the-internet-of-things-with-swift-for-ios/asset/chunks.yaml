    尽管这打破了苹果许多其他 API 的模式，但执行查询的唯一方式是通过尝试对钥匙串（`copy`、`update`、`add` 或 `delete`）执行操作。由于
    `SecItemCopyMatching(query:result:)` 方法**不**返回错误对象，你可以通过执行操作后返回的 `OSStatus` 值来验证操作结果。任何非
    `errSecSuccess` 的值都表示操作失败。在我调试此应用程序时，我注意到在 Google 中搜索该错误码能有效确定失败原因。苹果在 iOS 和 OS
    X 中都使用了 `OSStatus` 类型，因此关于其可能值代表含义的信息非常丰富。


    ### 注意


    术语 `Security Enclave` 和 `Keychain` 在 iOS 中可以互换使用，因为钥匙串服务沿用了 macOS 上钥匙串服务的设计。在
    macOS 中，安全存储常被通俗地称为 `the Keychain`。


    接下来，你必须进行调用以检查密码是否存在，如果不存在则提示用户输入密码。在显示包含密码文本字段的安全视图之前，先检查是否有密码用于验证，这是合理的。在我的实现中，我通过在
    `WorkoutMapViewController` 和 `WorkoutTableViewController` 类的 `showSecurityView()`
    方法中显示安全视图后，添加一个检查密码状态的调用来实现此逻辑，如代码清单 11-12 所示。


    ```

    class WorkoutTableViewController:

    UITableViewController {

    ...

    func showSecurityView() {

    if let securityView = self.securityView,

    securityView.isHidden == true {

    ...

    }

    securityView?.checkPasswordExistence()

    }

    }

    代码清单 11-12

    在显示安全视图时检查密码是否已设置 (WorkoutTableViewController.swift)

    ```


    为了处理密码不存在的情况，你必须创建一个用于将字符串值保存到钥匙串的方法。如前所述，所有钥匙串服务操作都必须通过查询来执行。在向钥匙串添加新项目时，查询与查找值几乎完全相同，只是你需要将新值作为二进制数据包含在内。在代码清单
    11-13 中，我通过 `SecurityView` 类中的 `savePassword(password:)` 方法添加了此逻辑。请特别注意 `kSecValueData`
    键值对和 `SecItemAdd(query:result:)`，它们负责实现 `add value` 操作。


    ```

    protocol SecurityViewDelegate {

    ...

    func needsInitialPassword()

    func didSavePassword(success: Bool)

    }

    class SecurityView: UIView {

    ...

    func savePassword(password: String) {

    guard let passwordData = password.data(using:

    String.Encoding.utf8) else { return }

    let query: [String: Any] = [kSecClass as String:

    kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecValueData as String: passwordData]

    let queryStatus = SecItemAdd(query as CFDictionary,

    nil)

    if queryStatus == errSecSuccess {

    delegate?.didSavePassword(success: true)

    } else {

    NSLog("Error saving passcode: \(queryStatus)")

    delegate?.didSavePassword(success: false)

    }

    }

    }

    代码清单 11-13

    将值保存到钥匙串 (SecurityView.swift)

    ```


    与检查密码状态类似，我扩展了 `SecurityViewDelegate` 协议，增加了一个用于指示密码是否成功保存的方法。为了完成密码保存过程，需要在 `WorkoutTableViewController`
    和 `WorkoutMapViewController` 类中实现 `needsInitialPassword()` 和 `didSavePassword(success:)`
    方法，如代码清单 11-14 所示。在我的实现中，我选择展示一个包含文本字段的 `UIAlertController` 来接受新密码，并使用 `NSLog()`
    将操作结果记录到控制台。


    ```

    extension WorkoutTableViewController: SecurityViewDelegate {

    func needsInitialPassword() {

    let alert = UIAlertController(title: "初始安装",

    message: "请为您的数据设置密码", preferredStyle: .alert)

    alert.addTextField { (textField: UITextField) in

    textField.placeholder = "密码"

    textField.isSecureTextEntry = true

    }

    let okAction = UIAlertAction(title: "确定", style:

    .default) { [weak self] (action: UIAlertAction) in

    guard let textField = alert.textFields?.first,

    let password = textField.text else { return }

    self?.securityView?.savePassword(password:

    password)

    }

    let cancelAction = UIAlertAction(title: "取消",

    style: .cancel, handler: nil)

    alert.addAction(okAction)

    alert.addAction(cancelAction)

    present(alert, animated: true)

    }

    func didSavePassword(success: Bool) {

    NSLog("密码保存状态: \(success)")

    }

    ...

    }

    代码清单 11-14

    提示输入新密码 (WorkoutTableViewController.swift)

    ```


    对于密码验证过程的最后一步，你必须在 `SecurityView` 类中实现 `validatePassword()` 方法，该方法应将保存的密码与安全视图文本字段中输入的文字进行比较。从钥匙串提取值的查询与检测值是否存在时的查询完全相同；然而，在执行
    `copy` 操作后，你应该检查其结果以提取密码。在代码清单 11-15 中，我通过向 `SecurityView` 类添加 `getSavedPassword()`
    方法实现了这一点。


    ```

    class SecurityView: UIView {

    ...

    private func getSavedPassword() -> String? {

    let query: [String: Any] = [kSecClass as String:

    kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecMatchLimit as String: kSecMatchLimitOne,

    kSecReturnAttributes as String: true,

    kSecReturnData as String: true]

    var keychainItemRef: CFTypeRef?

    let queryStatus = SecItemCopyMatching(query as

    CFDictionary, &keychainItemRef)

    guard queryStatus == errSecSuccess,

    let keychainItem = keychainItemRef as? [String:

    Any],

    let passwordData = keychainItem[kSecValueData as

    String] as? Data,

    let password = String(data: passwordData, encoding:

    String.Encoding.utf8)

    else { return nil }

    return password

    }

    @IBAction func validatePassword(sender: UITextField) {

    guard let input = sender.text,

    let savedPassword = getSavedPassword(),

    input == savedPassword else {

    delegate?.didFinishWithError(description:

    "无效的密码")

    return

    }

    delegate?.didFinishWithAuthenticationType(.password)

    }

    }

    代码清单 11-15

    对照钥匙串中保存的值验证密码 (SecurityView.swift)

    ```


    正如你需要将字符串序列化为二进制数据才能将其保存到钥匙串中，为了使用存储的值进行字符串比较，你必须使用 `String(data:encoding:)` 构造方法将它们从二进制数据重新组合成字符串。

    '
- fmt: '### 使用生物识别或应用密码锁定钥匙串项目


    作为一项额外的安全功能，你可以通过将钥匙串项目限制在特定的安全上下文中来进一步锁定它们。例如，如果你正在构建一个密码管理器，你可以使用此功能使特定的一组密码只能通过面容ID或设备密码访问。这是一种替代构建完整安全覆盖层（如本章所述）的技术。


    要为你的钥匙串项目添加这一额外的安全层，只需在每个搜索查询中添加一个安全上下文和访问控制设置。类似于`LocalAuthentication`框架为你呈现初始的面容ID权限提示，当你尝试使用启用了访问控制的搜索查询访问值时，它也会呈现系统的生物识别或密码提示。


    对于额外的安全设置，你可以使用与`SecurityView`类相同的安全上下文。但是，你需要通过`SecAccessControl`类定义一个单独的访问控制策略。在清单[11-16](#346879_2_En_11_Chapter.xhtml#PC16)中，初始化`SecurityView`类后，我指定了一个安全策略，该策略将仅在设备解锁且用户通过面容ID或应用特定密码验证其存在时，才使钥匙串项目可用。


    ```

    class SecurityView: UIView {

    ...

    private func commonInit() {

    let error: ErrorPointer = nil

    if context.canEvaluatePolicy(

    .deviceOwnerAuthenticationWithBiometrics,

    error: error) {

    ..

    } else {

    NSLog("Biometrics unavailable on device")

    ...

    }

    accessControl = SecAccessControlCreateWithFlags(nil,

    kSecAttrAccessibleWhenUnlocked, .userPresence,

    nil)

    }

    }

    Listing 11-16

    Adding an Access Control Policy (SecurityView.swift)

    ```


    要使用访问策略和上下文来保护钥匙串项目，只需修改之前的复制和添加查询，以包含`SecurityView`类的上下文和访问控制策略，如清单[11-17](#346879_2_En_11_Chapter.xhtml#PC17)所示。


    ```

    class SecurityView: UIView {

    ...

    func checkPasswordExistence() {

    guard let accessControl = accessControl else { return }

    let query: [String: Any] = [kSecClass as

    String: kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecMatchLimit as String: kSecMatchLimitOne,

    kSecReturnAttributes as String: true,

    kSecReturnData as String: true,

    kSecAttrAccessControl as String: accessControl as Any,

    kSecUseAuthenticationContext as String: context]

    ...

    }

    func savePassword(password: String) {

    guard let accessControl = accessControl,

    let passwordData = password.data(using:

    String.Encoding.utf8) else { return }

    let query: [String: Any] = [kSecClass as

    String: kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecAttrAccessControl as String: accessControl as

    Any,

    kSecUseAuthenticationContext as String: context,

    kSecValueData as String: passwordData]

    ...

    }

    private func getSavedPassword() -> String? {

    guard let accessControl = accessControl else {

    return nil

    }

    let query: [String: Any] = [kSecClass as

    String: kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecMatchLimit as String: kSecMatchLimitOne,

    kSecReturnAttributes as String: true,

    kSecAttrAccessControl as String:

    accessControl as Any,

    kSecUseAuthenticationContext as String:

    context,

    kSecReturnData as String: true]

    ...

    return password

    }

    }

    Listing 11-17

    Using the Access Control Policy and Context in Keychain Search Queries (SecurityView.swift)

    ```


    现在，如果你在设备上加载`IOTFit`应用并尝试访问“上次跑步”或“锻炼历史”标签，你将在标签加载之前看到一个应用密码对话框，如图[11-10](#346879_2_En_11_Chapter.xhtml#Fig10)所示。输入密码后，你将有一两分钟的时间在各个标签之间自由导航，然后系统会要求你重新验证应用。虽然额外的密码提示对于`IOTFit`应用来说有点过度，但它可能对你的其他项目有所帮助。


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig10_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig10_HTML.jpg)


    Figure 11-10


    受访问控制保护的钥匙串项目的应用密码提示


    ### 注意事项


    为钥匙串项目设置安全策略后，每当你尝试再次访问这些值时，系统总是会提示你输入原始安全设置。要重置这些值，你必须在应用中添加一个`delete`操作或重置你的设备。在撰写本文时，即使应用被删除，钥匙串项目也会被保留。'
  raw: '### Using Biometrics or an App Password to Lock Keychain Items


    As an added bonus security feature, you can lock Keychain items even further,
    by limiting them to a specific security context. For example, if you were building
    a password manager, you could use this feature to make a specific set of passwords
    only available via Face ID or the device’s passcode. This is used as a technique
    to replace building your complete security overlay, as you did in this chapter.


    To add this extra layer of security to your Keychain items, you simply have to
    add a security context and access control settings to each search query. Similar
    to how the `LocalAuthentication` framework presents the initial Face ID permission
    prompt for you, it will also present the system’s biometrics or password prompts
    when you try to access values using access control-enabled search queries.


    For the extra security settings, you can use the same security context you used
    through the `SecurityView` class. However, you will have to define a separate
    access control policy via the `SecAccessControl` class. In Listing [11-16](#346879_2_En_11_Chapter.xhtml#PC16)
    , after initializing the `SecurityView` class, I specified a security policy that
    will keep the Keychain items available only when the device is unlocked, and the
    user has validated his/her presence via Face ID or an app-specific password.


    ```

    class SecurityView: UIView {

    ...

    private func commonInit() {

    let error: ErrorPointer = nil

    if context.canEvaluatePolicy(

    .deviceOwnerAuthenticationWithBiometrics,

    error: error) {

    ..

    } else {

    NSLog("Biometrics unavailable on device")

    ...

    }

    accessControl = SecAccessControlCreateWithFlags(nil,

    kSecAttrAccessibleWhenUnlocked, .userPresence,

    nil)

    }

    }

    Listing 11-16

    Adding an Access Control Policy (SecurityView.swift)

    ```


    To use the access policy and context to protect the Keychain items, simply modify
    the copy and add queries from before, to include the context and access control
    policies for the `SecurityView` class, as shown in Listing [11-17](#346879_2_En_11_Chapter.xhtml#PC17)
    .


    ```

    class SecurityView: UIView {

    ...

    func checkPasswordExistence() {

    guard let accessControl = accessControl else { return }

    let query: [String: Any] = [kSecClass as

    String: kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecMatchLimit as String: kSecMatchLimitOne,

    kSecReturnAttributes as String: true,

    kSecReturnData as String: true,

    kSecAttrAccessControl as String: accessControl as Any,

    kSecUseAuthenticationContext as String: context]

    ...

    }

    func savePassword(password: String) {

    guard let accessControl = accessControl,

    let passwordData = password.data(using:

    String.Encoding.utf8) else { return }

    let query: [String: Any] = [kSecClass as

    String: kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecAttrAccessControl as String: accessControl as

    Any,

    kSecUseAuthenticationContext as String: context,

    kSecValueData as String: passwordData]

    ...

    }

    private func getSavedPassword() -> String? {

    guard let accessControl = accessControl else {

    return nil

    }

    let query: [String: Any] = [kSecClass as

    String: kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecMatchLimit as String: kSecMatchLimitOne,

    kSecReturnAttributes as String: true,

    kSecAttrAccessControl as String:

    accessControl as Any,

    kSecUseAuthenticationContext as String:

    context,

    kSecReturnData as String: true]

    ...

    return password

    }

    }

    Listing 11-17

    Using the Access Control Policy and Context in Keychain Search Queries (SecurityView.swift)

    ```


    Now, if you load the IOTFit app on your device and attempt to access the Last
    Run or Workout History tabs, you will be presented with an App Password dialog
    before the tab loads, as shown in Figure [11-10](#346879_2_En_11_Chapter.xhtml#Fig10).
    After entering the password, you will have a minute or two in which to navigate
    between the tabs freely, before you are asked to re-validate the app. Although
    the extra password prompt is a bit excessive for the IOTFit app, it may be helpful
    to you in your other projects.


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig10_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig10_HTML.jpg)


    Figure 11-10


    App password prompt for Access Control–protected Keychain items


    ### Caution


    After setting a security policy for Keychain items, you will always be prompted
    for the original security settings whenever you try to access those values again.
    To reset these values, you will have to add a `delete` operation to your app or
    reset your device. At the time of writing, Keychain items are retained, even after
    an app is deleted.'
