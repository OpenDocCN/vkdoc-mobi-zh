    ## Using Keychain Services to Secure Data


    Now that the app can authorize users via biometrics, you must implement the password
    field as a backup, in case the user is having trouble with Face ID or Touch ID.
    As mentioned at the beginning of the chapter, you will store the password in the
    device’s Secure Enclave via Keychain Services. This data is only unencrypted and
    available when your app is active and in the foreground.


    To begin, you must implement the `UITextFieldDelegate` protocol, to handle events
    from the password text field. Although the protocol defines several events, such
    as when editing begins or the entered text changes, the event you will want to
    observe is when the Return key is pressed on the onscreen keyboard. In Listing
    [11-10](#346879_2_En_11_Chapter.xhtml#PC10), I have implemented this event in
    the security view, by implementing the `textFieldShouldReturn()` delegate method.
    Although it is intended for enabling or disabling the Return key, many developers
    augment this by calling other methods before this one completes. For the IOTFit
    app, when the Return key is pressed, you should attempt to validate the password
    and clear the text field.


    ```

    extension SecurityView: UITextFieldDelegate {

    func textFieldShouldReturn(_ textField: UITextField) ->

    Bool {

    textField.resignFirstResponder()

    validatePassword(sender: textField)

    return true

    }

    }

    Listing 11-10

    Performing an Action for a Text Field When the Return Key Is Pressed (SecurityView.swift)

    ```


    Next, you must validate the password. Unfortunately, the implementation of the
    application so far has not prompted the user for an initial password yet nor stored
    it anywhere. You can perform this operation in a similar manner to accessing values
    from the `UserDefaults` for your app, namely by checking if a key-value pair exists
    in the Secure Enclave and setting it if it does not. When using Keychain Services,
    this is accomplished by attempting to extract values based on a *search query*.


    Despite its name, a Keychain Services search query is closer to a predicate than
    a simple key-value pair lookup. To perform a search query, you must specify the
    type of value you are trying to interrogate (for example, web site password, general
    password, SSH secret), the number of matches you want to investigate, whether
    you want to access the data from the query, and identifying information for the
    data (such as the app name). For the IOTFit app, the data you will want to store
    is a general password, identified by the app’s name, in place of an account name.
    In Listing [**11-11**](#346879_2_En_11_Chapter.xhtml#PC11), I have expanded the
    `SecurityView` class to make this query, via a `checkPasswordExistence()` method.
    Because the presenting view controller will have to present the user interface
    for requesting the password, I have expanded the `SecurityViewDelegate` protocol
    to include new methods reflecting the password state of the application.


    ```

    protocol SecurityViewDelegate {

    func didFinishWithAuthenticationType(_ type:

    AuthenticationType)

    func didFinishWithError(description: String)

    func needsInitialPassword()

    }

    class SecurityView: UIView {

    ...

    let ACCOUNT_NAME: String = "IOTFit"

    ...

    func checkPasswordExistence() {

    guard let accessControl = accessControl else { return }

    let query: [String: Any] = [kSecClass as String:

    kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecMatchLimit as String: kSecMatchLimitOne,

    kSecReturnAttributes as String: true,

    kSecReturnData as String: true]

    let queryStatus = SecItemCopyMatching(query as

    CFDictionary, nil)

    if queryStatus != errSecSuccess {

    delegate?.needsInitialPassword()

    } else {

    NSLog("Password has already been set")

    }

    }

    }

    Listing 11-11

    Querying If a Password Exists in the Secure Enclave (SecurityView.swift)

    ```'
