- fmt: '### Setting Up a Table View Using the `WKInterfaceTable` Class


    The setup process for the Workout History Interface Controller is more complicated,
    owing to the table view. To begin, modify the definition of the default `InterfaceController`
    class to add the outlet for the table view, as shown in Listing [10-3](#346879_2_En_10_Chapter.xhtml#PC3).
    After updating the definition, connect the outlet in Interface Builder.


    ```

    class InterfaceController: WKInterfaceController {

    @IBOutlet var workoutTable: WKInterfaceTable?

    ...

    }

    Listing 10-3

    Workout History Interface Controller Class Definition ( InterfaceController.swift
    )

    ```


    Next, you must create a class to define each table row otherwise known as a *row
    controller*, in watchOS terminology. Unlike a table view cell on iOS, in which
    you can use `UITableViewCell` as your parent class, watchOS does define a parent
    class for table rows. Instead, you must use `NSObject` to define a generic object
    that is compatible with both Swift and Objective-C. Aside from this restriction,
    the rest of the setup process is straightforward, as you include the user interface
    elements as properties of the new class. In Listing [10-4](#346879_2_En_10_Chapter.xhtml#PC4),
    I have defined my table row as the `WorkoutRowController` class. The definition
    includes the properties for the image view and labels. Add a new file named `WorkoutRowController.swift`
    to the `IOTFitWatch Extension` target to contain this class.


    ```

    import WatchKit

    class WorkoutRowController: NSObject {

    @IBOutlet var icon: WKInterfaceImage?

    @IBOutlet var dateLabel: WKInterfaceLabel?

    @IBOutlet var durationLabel: WKInterfaceLabel?

    }

    Listing 10-4

    Workout Row Controller Class Definition ( WorkoutRowController.swift )

    ```


    Next, navigate back to Interface Builder and select the table row. As shown in
    Figure [10-21](#346879_2_En_10_Chapter.xhtml#Fig21), begin by clicking the Attributes
    inspector (the second-to-last tab in the right pane) and setting an identifier
    for the row. Make a note of this, as you will use it later when you populate the
    data for the table.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig21_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig21_HTML.jpg)


    Figure 10-21


    Setting the identifier for a row controller


    After setting the identifier, click the Identity Inspector (the third tab) and
    set the class to `WorkoutRowController`, in the same manner you connected the
    `WorkoutInterfaceController` to its definition. If the operation was successful,
    you should be able to see the properties for the row controller in the Connections
    Inspector (the last tab) and connect them to the storyboard successfully, as shown
    in Figure [10-22](#346879_2_En_10_Chapter.xhtml#Fig22).


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig22_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig22_HTML.jpg)


    Figure 10-22


    Connecting outlets to a row controller


    ### Adding Force Touch Support


    For the final piece in the user interface puzzle, you will learn how to use Force
    Touch to present a context menu to initiate the transition to the Record Workout
    Interface Controller. Although you can use segues, just as you would in an iOS
    app, using Force Touch provides a more native experience for the Apple Watch.
    *Force Touch* (or 3D touch on the iPhone) is the term Apple uses to describe the
    pressure sensitivity of their touch pads, starting with the iPhone 6S and eventually
    moving into the MacBook Pro and Apple Watch. These devices provide support for
    two kind of touch events: a *shallow press*, a normal touch event, which is used
    to select an item, and a *deep press*, a long, forceful press on the screen, which
    is used to bring up context menus.


    You can enable Force Touch in your watchOS apps by adding a context menu to an
    Interface Controller. To add a context menu to an Interface Controller, drag a
    `Menu` object from the Object Library and drop it on the target Interface Controller.
    As shown in Figure [10-23](#346879_2_En_10_Chapter.xhtml#Fig23), after adding
    a context menu to the Workout History Interface Controller, it will be added to
    its view hierarchy.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig23_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig23_HTML.jpg)


    Figure 10-23


    Adding and configuring a context menu


    By default, a context menu will include one menu item. For the IOTFitWatch app,
    you only need an Add button, for presenting the Record Workout Interface Controller.
    To customize the menu item, select it from the view hierarchy and use the Attributes
    inspector to set a title and icon. For my implementation, I selected the Add icon
    and named the menu item, New Workout.


    To enable the transition to the Record Workout Interface Controller, or perform
    any other action based on the menu selection, you must declare a method with the
    `@IBAction` keyword, to indicate that should be discoverable by Interface Builder.
    In Listing [10-5](#346879_2_En_10_Chapter.xhtml#PC5), I have added a method named
    `presentRecordInterface()` to handle the transition.


    ```

    class InterfaceController: WKInterfaceController {

    @IBOutlet var workoutTable: WKInterfaceTable?

    ...

    @IBAction func presentRecordInterface() {

    presentController(withName:

    "RecordInterfaceController", context: nil)

    }

    }

    Listing 10-5

    Adding a Method for Presenting the Record Workout Screen ( InterfaceController.swift
    )

    ```


    watchOS provides a `presentController(withName:context:)` for presenting one Interface
    Controller from another, similar to the `present(animated:completion:)` method
    on iOS. To use this method on watchOS, you must provide the `Identifier` string
    for the Interface Controller you want to target and a context object, which can
    be used to share data between the two Interface Controllers. In the earlier setup
    steps, although you set the class for the Record Workout Interface Controller,
    you did not have to set an identifier. To add the identifier, select the Record
    Workout Interface Controller and then navigate to the Attributes inspector, as
    shown in Figure [10-24](#346879_2_En_10_Chapter.xhtml#Fig24).


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig24_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig24_HTML.jpg)


    Figure 10-24


    Adding an identifier string to an Interface Controller


    Now that all the prerequisites for the `presentRecordInterface()` method have
    been met, you can connect to the storyboard. To perform this operation, select
    the menu item in the view hierarchy, navigate to the Connection Inspector, and
    drag a connection from the selector item to the Record Workout Interface Controller.
    As shown in Figure [10-25](#346879_2_En_10_Chapter.xhtml#Fig25), the `presentRecordInterface()`
    method signature should appear as a selectable option.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig25_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig25_HTML.jpg)


    Figure 10-25'
  raw: '### Setting Up a Table View Using the WKInterfaceTable Class


    The setup process for the Workout History Interface Controller is more complicated,
    owing to the table view. To begin, modify the definition of the default `InterfaceController`
    class to add the outlet for the table view, as shown in Listing [10-3](#346879_2_En_10_Chapter.xhtml#PC3).
    After updating the definition, connect the outlet in Interface Builder.


    ```

    class InterfaceController: WKInterfaceController {

    @IBOutlet var workoutTable: WKInterfaceTable?

    ...

    }

    Listing 10-3

    Workout History Interface Controller Class Definition ( InterfaceController.swift
    )

    ```


    Next, you must create a class to define each table row otherwise known as a *row
    controller*, in watchOS terminology. Unlike a table view cell on iOS, in which
    you can use `UITableViewCell` as your parent class, watchOS does define a parent
    class for table rows. Instead, you must use `NSObject` to define a generic object
    that is compatible with both Swift and Objective-C. Aside from this restriction,
    the rest of the setup process is straightforward, as you include the user interface
    elements as properties of the new class. In Listing [10-4](#346879_2_En_10_Chapter.xhtml#PC4),
    I have defined my table row as the `WorkoutRowController` class. The definition
    includes the properties for the image view and labels. Add a new file named `WorkoutRowController.swift`
    to the `IOTFitWatch Extension` target to contain this class.


    ```

    import WatchKit

    class WorkoutRowController: NSObject {

    @IBOutlet var icon: WKInterfaceImage?

    @IBOutlet var dateLabel: WKInterfaceLabel?

    @IBOutlet var durationLabel: WKInterfaceLabel?

    }

    Listing 10-4

    Workout Row Controller Class Definition ( WorkoutRowController.swift )

    ```


    Next, navigate back to Interface Builder and select the table row. As shown in
    Figure [10-21](#346879_2_En_10_Chapter.xhtml#Fig21), begin by clicking the Attributes
    inspector (the second-to-last tab in the right pane) and setting an identifier
    for the row. Make a note of this, as you will use it later when you populate the
    data for the table.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig21_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig21_HTML.jpg)


    Figure 10-21


    Setting the identifier for a row controller


    After setting the identifier, click the Identity Inspector (the third tab) and
    set the class to `WorkoutRowController`, in the same manner you connected the
    `WorkoutInterfaceController` to its definition. If the operation was successful,
    you should be able to see the properties for the row controller in the Connections
    Inspector (the last tab) and connect them to the storyboard successfully, as shown
    in Figure [10-22](#346879_2_En_10_Chapter.xhtml#Fig22).


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig22_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig22_HTML.jpg)


    Figure 10-22


    Connecting outlets to a row controller


    ### Adding Force Touch Support


    For the final piece in the user interface puzzle, you will learn how to use Force
    Touch to present a context menu to initiate the transition to the Record Workout
    Interface Controller. Although you can use segues, just as you would in an iOS
    app, using Force Touch provides a more native experience for the Apple Watch.
    *Force Touch* (or 3D touch on the iPhone) is the term Apple uses to describe the
    pressure sensitivity of their touch pads, starting with the iPhone 6S and eventually
    moving into the MacBook Pro and Apple Watch. These devices provide support for
    two kind of touch events: a *shallow press*, a normal touch event, which is used
    to select an item, and a *deep press*, a long, forceful press on the screen, which
    is used to bring up context menus.


    You can enable Force Touch in your watchOS apps by adding a context menu to an
    Interface Controller. To add a context menu to an Interface Controller, drag a
    `Menu` object from the Object Library and drop it on the target Interface Controller.
    As shown in Figure [10-23](#346879_2_En_10_Chapter.xhtml#Fig23), after adding
    a context menu to the Workout History Interface Controller, it will be added to
    its view hierarchy.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig23_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig23_HTML.jpg)


    Figure 10-23


    Adding and configuring a context menu


    By default, a context menu will include one menu item. For the IOTFitWatch app,
    you only need an Add button, for presenting the Record Workout Interface Controller.
    To customize the menu item, select it from the view hierarchy and use the Attributes
    inspector to set a title and icon. For my implementation, I selected the Add icon
    and named the menu item, New Workout.


    To enable the transition to the Record Workout Interface Controller, or perform
    any other action based on the menu selection, you must declare a method with the
    `@IBAction` keyword, to indicate that should be discoverable by Interface Builder.
    In Listing [10-5](#346879_2_En_10_Chapter.xhtml#PC5), I have added a method named
    `presentRecordInterface()` to handle the transition.


    ```

    class InterfaceController: WKInterfaceController {

    @IBOutlet var workoutTable: WKInterfaceTable?

    ...

    @IBAction func presentRecordInterface() {

    presentController(withName:

    "RecordInterfaceController", context: nil)

    }

    }

    Listing 10-5

    Adding a Method for Presenting the Record Workout Screen ( InterfaceController.swift
    )

    ```


    watchOS provides a `presentController(withName:context:)` for presenting one Interface
    Controller from another, similar to the `present(animated:completion:)` method
    on iOS. To use this method on watchOS, you must provide the `Identifier` string
    for the Interface Controller you want to target and a context object, which can
    be used to share data between the two Interface Controllers. In the earlier setup
    steps, although you set the class for the Record Workout Interface Controller,
    you did not have to set an identifier. To add the identifier, select the Record
    Workout Interface Controller and then navigate to the Attributes inspector, as
    shown in Figure [10-24](#346879_2_En_10_Chapter.xhtml#Fig24).


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig24_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig24_HTML.jpg)


    Figure 10-24


    Adding an identifier string to an Interface Controller


    Now that all the prerequisites for the `presentRecordInterface()` method have
    been met, you can connect to the storyboard. To perform this operation, select
    the menu item in the view hierarchy, navigate to the Connection Inspector, and
    drag a connection from the selector item to the Record Workout Interface Controller.
    As shown in Figure [10-25](#346879_2_En_10_Chapter.xhtml#Fig25), the `presentRecordInterface()`
    method signature should appear as a selectable option.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig25_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig25_HTML.jpg)


    Figure 10-25'
  trans: '

    ### 使用 `WKInterfaceTable` 类设置表格视图


    由于表格视图的存在，锻炼历史界面控制器的设置过程更为复杂。首先，修改默认 `InterfaceController` 类的定义，为表格视图添加插座变量，如代码清单
    10-3 所示。更新定义后，在 Interface Builder 中连接该插座变量。


    ```

    class InterfaceController: WKInterfaceController {

    @IBOutlet var workoutTable: WKInterfaceTable?

    ...

    }

    代码清单 10-3

    锻炼历史界面控制器类定义（InterfaceController.swift）

    ```


    接下来，必须创建一个类来定义每一行表格，在 watchOS 术语中称之为*行控制器*。与 iOS 上可以使用 `UITableViewCell` 作为父类的表格视图单元格不同，watchOS
    并没有为表格行定义父类。因此，你必须使用 `NSObject` 来定义一个同时兼容 Swift 和 Objective-C 的通用对象。除此之外，余下的设置过程就很简单了：你只需将用户界面元素作为新类的属性包含进来即可。在代码清单
    10-4 中，我将表格行定义为 `WorkoutRowController` 类。该定义包含了图片视图和标签的属性。在 `IOTFitWatch Extension`
    目标中添加一个名为 `WorkoutRowController.swift` 的新文件来存放这个类。


    ```

    import WatchKit

    class WorkoutRowController: NSObject {

    @IBOutlet var icon: WKInterfaceImage?

    @IBOutlet var dateLabel: WKInterfaceLabel?

    @IBOutlet var durationLabel: WKInterfaceLabel?

    }

    代码清单 10-4

    锻炼行控制器类定义（WorkoutRowController.swift）

    ```


    接着，返回 Interface Builder 并选择表格行。如图 10-21 所示，首先点击属性检查器（右侧窗格的倒数第二个标签页），为该行设置一个标识符。记下这个标识符，稍后在为表格填充数据时会用到。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig21_HTML.jpg](img/346879_2_En_10_Fig21_HTML.jpg)


    图 10-21


    设置行控制器的标识符


    设置完标识符后，点击身份检查器（第三个标签页），以同样的方式将类设置为 `WorkoutRowController`，就像你之前将 `WorkoutInterfaceController`
    与其定义关联起来一样。如果操作成功，你应该能在连接检查器（最后一个标签页）中看到行控制器的属性，并成功将它们连接到故事板，如图 10-22 所示。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig22_HTML.jpg](img/346879_2_En_10_Fig22_HTML.jpg)


    图 10-22


    将输出口连接到行控制器


    ### 添加 Force Touch 支持


    作为用户界面拼图的最后一块，你将学习如何使用 Force Touch 来显示一个上下文菜单，以启动向“记录锻炼”界面控制器的跳转。虽然你也可以像在 iOS
    应用中那样使用 Segue，但使用 Force Touch 能为 Apple Watch 提供更原生的体验。*Force Touch*（在 iPhone 上则称为
    3D Touch）是苹果公司用来描述其触摸板压力敏感度的术语，最早从 iPhone 6S 开始，后来发展到 MacBook Pro 和 Apple Watch。这些设备支持两种触摸事件：*浅按*，即普通的触摸事件，用于选择项目；以及*深按*，即在屏幕上长按用力按压，用于调出上下文菜单。


    你可以通过向界面控制器添加上下文菜单，在 watchOS 应用中启用 Force Touch。要向界面控制器添加上下文菜单，从对象库中拖拽一个 `Menu`
    对象并放到目标界面控制器上。如图 10-23 所示，在向锻炼历史界面控制器添加上下文菜单后，该菜单会被添加到其视图层级中。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig23_HTML.jpg](img/346879_2_En_10_Fig23_HTML.jpg)


    图 10-23


    添加并配置上下文菜单


    默认情况下，上下文菜单会包含一个菜单项。对于 IOTFitWatch 应用，你只需要一个“添加”按钮，用于呈现“记录锻炼”界面控制器。要自定义该菜单项，从视图层级中选择它，然后使用属性检查器设置标题和图标。在我的实现中，我选择了“添加”图标，并将菜单项命名为“新建锻炼”。


    为了启用向“记录锻炼”界面控制器的跳转，或根据菜单选择执行其他任何操作，你必须声明一个带有 `@IBAction` 关键字的方法，以表明该方法应能被 Interface
    Builder 发现。在代码清单 10-5 中，我添加了一个名为 `presentRecordInterface()` 的方法来处理跳转。


    ```

    class InterfaceController: WKInterfaceController {

    @IBOutlet var workoutTable: WKInterfaceTable?

    ...

    @IBAction func presentRecordInterface() {

    presentController(withName:

    "RecordInterfaceController", context: nil)

    }

    }

    代码清单 10-5

    添加用于呈现记录锻炼界面的方法（InterfaceController.swift）

    ```


    watchOS 提供了一个 `presentController(withName:context:)` 方法，用于从一个界面控制器呈现另一个界面控制器，类似于
    iOS 上的 `present(animated:completion:)` 方法。要在 watchOS 上使用此方法，你必须为目标界面控制器提供 `Identifier`
    字符串和一个上下文对象，该对象可用于在两个界面控制器之间共享数据。在之前的设置步骤中，虽然你为“记录锻炼”界面控制器设置了类，但并未设置标识符。要添加标识符，请选择“记录锻炼”界面控制器，然后导航到属性检查器，如图
    10-24 所示。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig24_HTML.jpg](img/346879_2_En_10_Fig24_HTML.jpg)


    图 10-24


    为界面控制器添加标识符字符串


    现在，`presentRecordInterface()` 方法的所有前提条件都已满足，你可以将其连接到故事板了。要执行此操作，请在视图层级中选择菜单项，导航到连接检查器，然后从
    selector 项拖拽出一条连接线到“记录锻炼”界面控制器。如图 10-25 所示，`presentRecordInterface()` 方法签名应显示为一个可选项。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig25_HTML.jpg](img/346879_2_En_10_Fig25_HTML.jpg)


    图 10-25

