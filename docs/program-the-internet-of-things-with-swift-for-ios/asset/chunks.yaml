    One of the challenges of working with optional values in Swift is that you always
    have to check if the value has been initialized. When working with optional values
    inside of another optional value, you must perform both of these checks. To get
    around this issue, many developers have been chaining unwrapping checks in `single
    if-let` or `guard-let` statements, as I did in my example. I recommend against
    force-unwrapping using`!` syntax, as it can crash your app at runtime.


    ### Updating the User Interface


    Now that the IOTFit app can detect more information about a user’s workout, you
    must modify the user interface to display this information. The way I chose to
    deal with this was by tightening the spacing in between the labels on the Create
    Workout View Controller, repurposing the distance label, and adding an extra label
    to show the average pace, as shown in Figure [3-3](#346879_2_En_3_Chapter.xhtml#Fig3).


    ![../images/346879_2_En_3_Chapter/346879_2_En_3_Fig3_HTML.jpg](images/346879_2_En_3_Chapter/346879_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Modified user interface for Create Workout View Controller


    Update the layout for the Create Workout View Controller in your `Main.storyboard`
    file by adding two `UILabel` objects and adjusting the Auto Layout constraints
    to match the values in Table [3-1](#346879_2_En_3_Chapter.xhtml#Tab1). If you
    need a refresher on how to do this, refer back to Chapter [1](#346879_2_En_1_Chapter.xhtml).


    Table 3-1


    New Auto Layout Constraints for the Create Workout View Controller


    | Display Text | Top | Left | Right | Bottom | Height | Text Class |

    | --- | --- | --- | --- | --- | --- | --- |

    | Workout Time | 10 | 20 | 20 | -- | 30 | Title 3 |

    | 0 hrs 00 mins | 0 | 20 | 20 | -- | 50 | Title 1 |

    | Workout Distance | 0 | 20 | 20 | -- | 30 | Title 3 |

    | 0.00 m &#124; 0 steps &#124; 0 floors | 0 | 20 | 20 | -- | 50 | Title 1 |

    | Workout Pace | 0 | 20 | 20 | -- | 30 | Title 3 |

    | 0.00 m / s | 0 | 20 | 20 | ≥20 | 50 | Title 1 |


    In the same manner as Chapter [1](#346879_2_En_1_Chapter.xhtml), in order to update
    the Workout Pace label from the code, you have to add a `UILabel` property to
    the `WorkoutViewController` class, as shown in Listing [3-4](#346879_2_En_3_Chapter.xhtml#PC4).


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    @IBOutlet weak var workoutDistanceLabel: UILabel?

    @IBOutlet weak var workoutPaceLabel: UILabel?

    ...

    }

