    \ 及本章插件的兼容性更好。欢迎您尝试任意一个！  \n\n下载完成后，您必须使用 `tar` 命令解压存档。对于前面提到的文件，我使用的命令是  \n\n\
    ```\ntar -xvf node-v8.11.4-linux-armv6l.tar.gz\n```\n\n解压文件后，您必须将 Node 二进制文件复制到用户安装软件的默认位置：`/usr/local`。这将允许\
    \ HomeBridge 和您以后可能编写的其他 Node 应用程序像使用由 `apt-get` 包管理器安装的软件一样使用这些二进制文件。对于我的 Node\
    \ 版本，我使用以下命令来复制文件：  \n\n```\nsudo cp -R node-v8.11.4-linux-armv6l/* /usr/local/\n\
    ```\n\n您可以通过重启树莓派并尝试运行查询当前安装版本的 Node 命令来验证文件是否已正确复制：  \n\n```\nnode -v\n```\n\n\
    结果应打印出您手动下载的版本号。  \n\n在安装 HomeBridge 之前，您必须安装它所依赖的其他几个软件包，具体来说，是最新版本的 C++、Python\
    \ 开发工具、WiringPi、AVAHI、PiGPIO 和 BCM2835。这些将允许 HomeBridge 在 Node 内部与 GPIO 引脚和蓝牙交互。您可以使用\
    \ `apt-get` 包管理器轻松安装 C++ 和 Python 开发工具，如下所示：  \n\n```\nsudo apt-get install g++\n\
    sudo apt-get install libavahi-compat-libdnssd-dev\nsudo apt-get install python-dev\n\
    sudo apt-get install pigpio python-pigpio\n```\n\n运行这些命令后，您必须将 PiGPIO 作为服务启用并重启\
    \ Pi，如下所示：  \n\n```\nsudo systemctl enable pigpiod.service\n```\n\nBCM2835 包是允许\
    \ WiringPi 访问树莓派上 GPIO 引脚的 C 库，必须首先安装。首先从 [www.airspayce.com/mikem/bcm2835/](http://www.airspayce.com/mikem/bcm2835/)\
    \ 找到该包的最新版本，使用 `wget` 命令下载，然后像处理 Node 一样使用 `tar` 解压。  \n\n```\nwget http://www.airspayce.com/mikem/bcm2835/bcm2835-1.56.tar.gz\n\
    tar -xvf bcm2835-1.56.tar.gz\n```\n\n与 Node 不同，您必须运行 BCM2835 的构建脚本来正确安装它。按顺序运行以下命令，为您的硬件配置库、验证它，然后安装它：\
    \  \n\n```\ncd bcm2835-1.56\n./configure\nmake\nsudo make check\nsudo make install\n\
    ```\n\n如果运行最后一个 `make` 命令时没有出现构建失败，则可以验证安装成功。  \n\n要安装 WiringPi，您必须从 GitHub 下载它。您可以按照以下\
    \ `git pull` 命令从命令行执行此操作，该命令会创建项目的本地克隆：  \n\n```\ngit clone git://git.drogon.net/wiringPi\n\
    ```\n\n与 BCM2835 一样，您必须运行构建脚本才能在树莓派上安装该包。对于 WiringPi，这些命令是  \n\n```\ncd wiringPi/\n\
    ./build\n```\n\n要验证包是否正确安装，请尝试运行 `gpio readall` 命令以回显树莓派上所有引脚的状态。您的输出应包含一个引脚状态表，类似于图\
    \ 7-11 截图中的内容。  \n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig11_HTML.jpg](img/346879_2_En_7_Fig11_HTML.jpg)\
    \  \n\n**图 7-11** 使用 `gpio readall` 命令查询 GPIO 状态  \n\n现在，您终于可以安装 HomeBridge 了！要安装\
    \ HomeBridge，请使用 Node 包管理器（NPM）下载它。  \n\n```\nsudo npm install -g --unsafe-perm\
    \ homebridge\n```\n\n安装需要几分钟才能完成。由于 iOS 的 Home App 管理着一个 HomeKit 设备数据库，验证您是否创建了一个有效设备的最简单方法是在您想要使用的所有插件配置完毕后，尝试注册该设备。在接下来的两节中，我将解释从温度传感器和蓝牙设备（您在第\
    \ 6 章中创建的门传感器）读取数据所需执行的步骤。  \n\n### 警告  \n\n`-g` 和 `--unsafe-perm` 标志确保 Node 包被全局安装（适用于所有应用程序），并且不限制谁可以执行它们。运行\
    \ HomeBridge 需要全局设置；但是，如果您担心家庭/办公室网络中的安全威胁，您可能需要考虑寻找非安全权限设置的替代方案。\n"
- fmt: "### Configuring HomeBridge to Read Data from a Temperature Sensor\n\nAs mentioned\
    \ at the beginning of the chapter, one of the great things about HomeBridge is\
    \ that it has a very actively maintained, easy-to-use plug-in system. To read\
    \ the temperature from the DHT22 temperature/humidity sensor, you can use the\
    \ `homebridge-dht` plug-in. Just as with HomeBridge itself, it is available as\
    \ an NPM package. Install the plug-in globally, using the following command:\n\
    \n```\nsudo npm install -g homebridge-dht --unsafe-perm\n```\n\nTo help verify\
    \ that the DHT22 sensor and plug-in are working correctly, I suggest making the\
    \ binary for reading the status of the sensor available on the command line, similar\
    \ to how you installed Node earlier.\n\n```\nsudo cp /usr/local/lib/node_modules/homebridge-dht/dht22\
    \ /usr/local/bin/dht22\n```\n\nUnlike Node, you must explicitly give the `dht22`\
    \ binary executable permissions to run it from the command line. You can perform\
    \ this operation by using the `chmod` command, along with the `a+x` parameter\
    \ (add executable).\n\n```\nsudo chmod a+x /usr/local/bin/dht22\n```\n\nYou can\
    \ now use the `dht22` command to verify that HomeBridge will be able to access\
    \ the sensor. To test this functionality, attempt to run the `dht22` command,\
    \ specifying that the sensor is connected to GPIO pin 21, as shown following:\n\
    \n```\ndht22 -g 21\n```\n\nIf your circuit and HomeBridge packages are set up\
    \ correctly, three numbers should print out on the terminal containing the reading\
    \ count, temperature, and humidity. For my sensor, the result was as follows:\n\
    \n```\n0 28.2 C 41.5 %\n```\n\n### Note\n\nWhen I was debugging my sample for\
    \ this project, I found that errors on this step were most often caused by incomplete\
    \ PiGPIO and WiringPi installations or the DHT22 sensor not receiving enough power.\
    \ I found that 5V worked best for the DHT22, while its lower-spec sibling, the\
    \ DHT11, worked better with 3.3V.\n\nAfter verifying that the DHT22 sensor and\
    \ binary are operating correctly, you can begin writing the configuration file\
    \ for HomeBridge. In addition to its plug-in system, HomeBridge allows you to\
    \ easily configure the device, using a JSON file. To begin, create an empty configuration\
    \ file using the following:\n\n```\nmkdir .homebridge\ntouch .homebridge/config.json\n\
    ```\n\nHomeBridge requires that a configuration file named `config.json` be in\
    \ the invisible `.homebridge` folder of the user whose account will be employed\
    \ to run the application, so please be careful to type this command exactly as\
    \ written previously.\n\nNext, use your favorite command-line text editor to open\
    \ the `config.json` file. Enter the text in Listing 7-1 into this file as the\
    \ configuration.\n\n```\n{\n    \"bridge\": {\n        \"name\": \"IOTHome\",\n\
    \        \"username\": \"CC:22:3D:E3:CD:31\",\n        \"port\": 51826,\n    \
    \    \"pin\": \"031-45-154\"\n    },\n    \"description\": \"IOTHome HomeBridge\"\
    ,\n    \"platforms\": [],\n    \"accessories\": [\n        {\n            \"accessory\"\
    : \"Dht\",\n            \"name\": \"Indoor Comfort Sensor\",\n            \"name_temperature\"\
    : \"Temperature\",\n            \"name_humidity\": \"Humidity\",\n           \
    \ \"gpio\": \"21\",\n            \"service\": \"dht22\"\n        }\n    ]\n}\n\
    ```\n\n*Listing 7-1 Configuration JSON File for HomeBridge (config.json)*\n\n\
    To comment on this file, the `bridge` dictionary specifies the values that are\
    \ used to expose the Raspberry Pi as a valid HomeKit bridge, specifically its\
    \ device name, port, PIN, and HomeKit \"username.\" You may change the values\
    \ as you wish, but be careful to maintain the port number and hexadecimal number\
    \ format of the username. The `accessories` dictionary specifies an array of configurations\
    \ for each accessory that will be attached to the bridge. The specific key-value\
    \ pairs have to come from the documentation for the plug-in you are using. For\
    \ the HomeBridge DHT sensor, this documentation can be found at [www.npmjs.com/package/homebridge-dht](http://www.npmjs.com/package/homebridge-dht).\
    \ Of special interest to the configuration of this project are the `gpio` and\
    \ `service` key-value pairs. As you may have noted, `\"gpio\": \"21\"` reflects\
    \ that the sensor is connected to GPIO pin 21; the `\"service\": \"dht22\"` key-value\
    \ pair specifies that you are using the DHT22 sensor, as opposed to other chips\
    \ in the family, such as the DHT11.\n\nWith these steps, the temperature sensor\
    \ is ready to interface with your Raspberry Pi and HomeBridge. If you do not wish\
    \ to set up the Bluetooth connection to the door sensor or startup options for\
    \ the device, you can skip to the \"Connecting to Your New HomeKit Bridge\" section,\
    \ to start using the sensor right away."
  raw: '### Configuring HomeBridge to Read Data from a Temperature Sensor


    As mentioned at the beginning of the chapter, one of the great things about HomeBridge
    is that it has a very actively maintained, easy-to-use plug-in system. To read
    the temperature from the DHT22 temperature/humidity sensor, you can use the `homebridge-dht`
    plug-in. Just as with HomeBridge itself, it is available as an NPM package. Install
    the plug-in globally, using the following command:


    ```

    sudo npm install -g homebridge-dht --unsafe-perm

    ```


    To help verify that the DHT22 sensor and plug-in are working correctly, I suggest
    making the binary for reading the status of the sensor available on the command
    line, similar to how you installed Node earlier.


    `sudo cp /usr/local/lib/node_modules/homebridge-dht/dht22 /usr/local/bin/dht22`


    Unlike Node, you must explicitly give the `dht22` binary executable permissions
    to run it from the command line. You can perform this operation by using the `chmod`
    command, along with the `a+x` parameter (add executable).


    ```

    sudo chmod a+x./usr/local/bin/dht22

    ```


    You can now use the `dht22` command to verify that HomeBridge will be able to
    access the sensor. To test this functionality, attempt to run the `dht22` command,
    specifying that the sensor is connected to GPIO pin 21, as shown following:


    ```

    dht22 -g 21

    ```


    If your circuit and HomeBridge packages are set up correctly, three numbers should
    print out on the terminal containing the reading count, temperature, and humidity.
    For my sensor, the result was as follows:


    ```

    0 28.2 C 41.5 %

    ```


    ### Note


    When I was debugging my sample for this project, I found that errors on this step
    were most often caused by incomplete PiGPIO and WiringPi installations or the
    DHT22 sensor not receiving enough power. I found that 5V worked best for the DHT22,
    while its lower-spec sibling, the DHT11, worked better with 3.3V.


    After verifying that the DHT22 sensor and binary are operating correctly, you
    can begin writing the configuration file for HomeBridge. In addition to its plug-in
    system, HomeBridge allows you to easily configure the device, using a JSON file.
    To begin, create an empty configuration file using the following:


    ```

    mkdir .homebridge

    touch .homebridge/config.json

    ```


    HomeBridge requires that a configuration file named `config.json` be in the invisible
    `.homebridge` folder of the user whose account will be employed to run the application,
    so please be careful to type this command exactly as written previously.


    Next, use your favorite command-line text editor to open the `config.json` file.
    Enter the text in Listing [7-1](#346879_2_En_7_Chapter.xhtml#PC18) into this file
    as the configuration.


    ```

    {    "bridge": {

    "name": "IOTHome",

    "username": "CC:22:3D:E3:CD:31",

    "port": 51826,

    "pin": "031-45-154"

    },

    "description": "IOTHome HomeBridge",

    "platforms": [],

    "accessories": [

    { "accessory": "Dht",

    "name": "Indoor Comfort Sensor",

    "name_temperature": "Temperature",

    "name_humidity": "Humidity",

    "gpio":        "21",

    "service": "dht22" }

    ]}

    Listing 7-1

    Configuration JSON File for HomeBridge (config.json)

    ```


    To comment on this file, the `bridge` dictionary specifies the values that are
    used to expose the Raspberry Pi as a valid HomeKit bridge, specifically its device
    name, port, PIN, and HomeKit “username.” You may change the values as you wish,
    but be careful to maintain the port number and hexadecimal number format of the
    username. The `accessories` dictionary specifies an array of configurations for
    each accessory that will be attached to the bridge. The specific key-value pairs
    have to come from the documentation for the plug-in you are using. For the HomeBridge
    DHT sensor, this documentation can be found at [`www.npmjs.com/package/homebridge-dht`](http://www.npmjs.com/package/homebridge-dht)
    . Of special interest to the configuration of this project are the `gpio` and
    `service` key-value pairs. As you may have noted, `"gpio": "21"` reflects that
    the sensor is connected to GPIO pin 21; the "`service": "dht22"` key-value pair
    specifies that you are using the DHT22 sensor, as opposed to other chips in the
    family, such as the DHT11.


    With these steps, the temperature sensor is ready to interface with your Raspberry
    Pi and HomeBridge. If do not wish to set up the Bluetooth connection to the door
    sensor or startup options for the device, you can skip to the “Connecting to Your
    New HomeKit Bridge” section, to start using the sensor right away.'
  trans: "\n### 配置 HomeBridge 以读取温度传感器数据\n\n正如本章开头所述，HomeBridge 的一大优势在于它拥有一个非常活跃维护、易于使用的插件系统。要读取\
    \ DHT22 温湿度传感器的温度，可以使用 `homebridge-dht` 插件。与 HomeBridge 本身一样，它也可以作为 NPM 包使用。使用以下命令全局安装该插件：\n\
    \n```\nsudo npm install -g homebridge-dht --unsafe-perm\n```\n\n为帮助验证 DHT22 传感器和插件是否正常工作，我建议像之前安装\
    \ Node 一样，在命令行中创建一个用于读取传感器状态的二进制文件。\n\n```\nsudo cp /usr/local/lib/node_modules/homebridge-dht/dht22\
    \ /usr/local/bin/dht22\n```\n\n与 Node 不同，你必须显式地为 `dht22` 二进制文件赋予可执行权限，才能从命令行运行它。你可以使用\
    \ `chmod` 命令配合 `a+x` 参数（添加可执行权限）来执行此操作。\n\n```\nsudo chmod a+x /usr/local/bin/dht22\n\
    ```\n\n现在，你可以使用 `dht22` 命令来验证 HomeBridge 是否能够访问传感器。要测试此功能，请尝试运行 `dht22` 命令，并指定传感器连接到\
    \ GPIO 21 引脚，如下所示：\n\n```\ndht22 -g 21\n```\n\n如果你的电路和 HomeBridge 包设置正确，终端上应打印出三个数字，分别包含读取计数、温度和湿度。对于我的传感器，结果如下：\n\
    \n```\n0 28.2 C 41.5 %\n```\n\n### 注意\n\n在我为此项目调试示例时，我发现此步骤中的错误大多是由于 PiGPIO 和\
    \ WiringPi 安装不完整，或 DHT22 传感器供电不足造成的。我发现 5V 电压对 DHT22 效果最好，而其较低规格的同类产品 DHT11 则在\
    \ 3.3V 电压下表现更好。\n\n在确认 DHT22 传感器和二进制文件运行正常后，你可以开始为 HomeBridge 编写配置文件。除了其插件系统外，HomeBridge\
    \ 还允许你使用 JSON 文件轻松配置设备。首先，使用以下命令创建一个空配置文件：\n\n```\nmkdir .homebridge\ntouch .homebridge/config.json\n\
    ```\n\nHomeBridge 要求名为 `config.json` 的配置文件位于用于运行应用程序的用户账户的隐藏文件夹 `.homebridge`\
    \ 中，因此请务必严格按照上述命令进行输入。\n\n接下来，使用你喜欢的命令行文本编辑器打开 `config.json` 文件。将清单 7-1 中的文本输入此文件作为配置。\n\
    \n```\n{\n    \"bridge\": {\n        \"name\": \"IOTHome\",\n        \"username\"\
    : \"CC:22:3D:E3:CD:31\",\n        \"port\": 51826,\n        \"pin\": \"031-45-154\"\
    \n    },\n    \"description\": \"IOTHome HomeBridge\",\n    \"platforms\": [],\n\
    \    \"accessories\": [\n        {\n            \"accessory\": \"Dht\",\n    \
    \        \"name\": \"室内舒适度传感器\",\n            \"name_temperature\": \"温度\",\n\
    \            \"name_humidity\": \"湿度\",\n            \"gpio\": \"21\",\n     \
    \       \"service\": \"dht22\"\n        }\n    ]\n}\n```\n\n*清单 7-1 HomeBridge\
    \ 的配置文件 JSON（config.json）*\n\n关于该文件，需要说明的是：`bridge` 字典指定了用于将树莓派暴露为有效 HomeKit 桥接器的值，具体包括设备名称、端口、PIN\
    \ 码和 HomeKit 的\"用户名\"。你可以根据需要更改这些值，但要注意保持端口号和用户名的十六进制数字格式。`accessories` 字典指定了将连接到桥接器的每个配件的配置数组。具体的键值对必须来自你所用插件的文档。对于\
    \ HomeBridge 的 DHT 传感器，此文档可在 [www.npmjs.com/package/homebridge-dht](http://www.npmjs.com/package/homebridge-dht)\
    \ 找到。本项目配置中特别值得关注的是 `gpio` 和 `service` 键值对。你可能已经注意到，`\"gpio\": \"21\"` 表示传感器连接到\
    \ GPIO 21 引脚；`\"service\": \"dht22\"` 键值对指定你使用的是 DHT22 传感器，而不是该系列中的其他芯片，例如 DHT11。\n\
    \n完成这些步骤后，温度传感器即可与你的树莓派和 HomeBridge 进行交互。如果你不希望设置与门磁传感器的蓝牙连接或设备的启动选项，可以直接跳到\"\
    连接到你的新 HomeKit 桥接器\"部分，立即开始使用传感器。\n"
- fmt: "### Configuring HomeBridge to Connect to a Bluetooth LE Accessory\n\nAnother\
    \ powerful plug-in available to use with HomeBridge is `homebridge-bluetooth`,\
    \ which allows you to connect to a Bluetooth peripheral through HomeKit. The plug-in\
    \ acts as a Bluetooth client, such as the IOTHome app from Chapter [6](#346879_2_En_6_Chapter.xhtml),\
    \ and in addition to reading status, can also be used to control a device. This\
    \ functionality allows you to ask Siri if “the entrance door sensor is on” and\
    \ get a response based on data from a sensor you built.\n\nBefore installing the\
    \ plug-in, you will have to resolve a few dependencies. First, install the `node-gyp`\
    \ and `noble` Node.js modules via `npm`.\n\n```\nsudo npm install -g --unsafe-perm\
    \ node-gyp\nsudo npm install -g --unsafe-perm noble\n```\n\nNext, following a\
    \ tip from Noble’s GitHub documentation (`https://github.com/noble/noble`), you\
    \ must enable non-administrator accounts to use the Bluetooth LE utilities on\
    \ the Raspberry Pi, as follows:\n\n```\nsudo setcap cap_net_raw+eip $(eval readlink\
    \ -f `which node`)\n```\n\nFor security purposes, it is always a good idea to\
    \ lock network and hardware access only to trusted users. However, for prototyping,\
    \ the extra security can add hurdles, which make debugging hard. For a HomeKit\
    \ bridge that is intended to be used for an extended period, I recommend rolling\
    \ back this setting after you have become comfortable with HomeBridge.\n\nNow,\
    \ you can finally install `homebridge-bluetooth` using `npm`.\n\n```\nsudo npm\
    \ install -g --unsafe-perm homebridge-bluetooth\n```\n\nAs with `homebridge-dht`,\
    \ in order to use the plug-in as part of your bridge, you will have to add its\
    \ configuration information to your HomeBridge configuration file (`~/.homebridge/config.json`),\
    \ following the specification provided by the developers at `www.npmjs.com/package/homebridge-bluetooth`.\
    \ For my implementation, I chose to follow their `switch` example, which registers\
    \ the door sensor as a smart switch. Although there is a `lock` example, it is\
    \ geared toward controlling popular IoT smart locks. Unfortunately, the IOTDoor\
    \ project does not meet that specification yet. In Listing [7-2](#346879_2_En_7_Chapter.xhtml#PC22),\
    \ I have provided the configuration I used for my door sensor.\n\n```\n{\n   \
    \ \"bridge\": {\n        \"name\": \"IOTHome\",\n        \"username\": \"CC:22:3D:E3:CD:31\"\
    ,\n        \"port\": 51826,\n        \"pin\": \"031-45-154\"\n    },\n    \"description\"\
    : \"IOTHome HomeBridge\",\n    \"platforms\": [\n        {\n            \"platform\"\
    : \"Bluetooth\",\n            \"accessories\": [\n                {\n        \
    \            \"name\": \"IOTDoor\",\n                    \"address\": \"30:AE:A4:28:73:76\"\
    ,\n                    \"services\": [\n                        {\n          \
    \                  \"name\": \"Door Sensor\",\n                            \"\
    type\": \"Switch\",\n                            \"UUID\": \"83b46845-6e9c-4b25-89cf-871cc74cc68e\"\
    ,\n                            \"characteristics\": [\n                      \
    \          {\n                                    \"type\": \"On\",\n        \
    \                            \"UUID\": \"4b61d6b9-2e29-4fdf-a74a-7b8bf70ecd9a\"\
    \n                                }\n                            ]\n         \
    \               }\n                    ]\n                }\n            ]\n \
    \       }\n    ],\n    \"accessories\": [\n        {\n            \"accessory\"\
    : \"Dht\",\n            \"name\": \"Indoor Comfort Sensor\",\n            \"name_temperature\"\
    : \"Temperature\",\n            \"name_humidity\": \"Humidity\",\n           \
    \ \"gpio\": \"21\",\n            \"service\": \"dht22\"\n        }\n    ]\n}\n\
    ```\n**Listing 7-2** Configuration JSON File for Homebridge (`config.json`), Including\
    \ Bluetooth\n\nThere are three aspects of the configuration that you must pay\
    \ careful attention to. First, `homebridge-bluetooth` implements its interface\
    \ via a `platform` configuration, rather than an `accessory`.\n\nNext, in order\
    \ to bridge the correct Bluetooth functionality, you must put the exact service\
    \ and characteristic UUIDs for the lock status from the Arduino program into the\
    \ `config.json` file. Finally, in order to find the device, you must provide its\
    \ name and hardware address, as they are advertised. In Chapter [6](#346879_2_En_6_Chapter.xhtml)’s\
    \ Arduino setup code, you did not have to set up a hardware address, as it is\
    \ generated by the Bluetooth LE module in the ESP32 microcontroller. However,\
    \ you can use the scanning utilities on the Raspberry Pi to find the hardware\
    \ address. After verifying that your door sensor is not currently connected to\
    \ any devices, run the following command:\n\n```\nsudo hcitool lescan\n```\n\n\
    Your output should contain a list of nearby Bluetooth LE devices that are advertising\
    \ in the physical vicinity of your Raspberry Pi, as shown in Figure [7-12](#346879_2_En_7_Chapter.xhtml#Fig12).\n\
    \n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig12_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig12_HTML.jpg)\n\
    \n**Figure 7-12** Results of using the `hcitool` utility to scan for Bluetooth\
    \ LE devices\n\nAfter copying the hexadecimal hardware address for your IOTDoor\
    \ sensor into the HomeBridge configuration file, save your result. Your HomeKit\
    \ bridge is now fully configured!"
  raw: '### Configuring HomeBridge to Connect to a Bluetooth LE Accessory


    Another powerful plug-in available to use with HomeBridge is `homebridge-bluetooth`,
    which allows you to connect to a Bluetooth peripheral through HomeKit. The plug-in
    acts as a Bluetooth client, such as the IOTHome app from Chapter [6](#346879_2_En_6_Chapter.xhtml),
    and in addition to reading status, can also be used to control a device. This
    functionality allows you to ask Siri if “the entrance door sensor is on” and get
    a response based on data from a sensor you built.


    Before installing the plug-in, you will have to resolve a few dependencies. First,
    install the `node-gyp` and `noble` Node.js modules via `npm`.


    ```

    sudo npm install -g --unsafe-perm node-gyp

    sudo npm install -g --unsafe-perm noble

    ```


    Next, following a tip from Noble’s GitHub documentation ( [`https://github.com/noble/noble`](https://github.com/noble/noble)
    ), you must enable non-administrator accounts to use the Bluetooth LE utilities
    on the Raspberry Pi, as follows:


    ```

    sudo setcap cap_net_raw+eip $(eval readlink -f `which node`)

    ```


    For security purposes, it is always a good idea to lock network and hardware access
    only to trusted users. However, for prototyping, the extra security can add hurdles,
    which make debugging hard. For a HomeKit bridge that is intended to be used for
    an extended period, I recommend rolling back this setting after you have become
    comfortable with HomeBridge.


    Now, you can finally install `homebridge-bluetooth` using `npm`.


    ```

    sudo npm install -g --unsafe-perm homebridge-bluetooth

    ```


    As with `homebridge-dht`, in order to use the plug-in as part of your bridge,
    you will have to add its configuration information to your HomeBridge configuration
    file (`~/.homebridge/config.json`), following the specification provided by the
    developers at [`www.npmjs.com/package/homebridge-bluetooth`](http://www.npmjs.com/package/homebridge-bluetooth)
    . For my implementation, I chose to follow their `switch` example, which registers
    the door sensor as a smart switch. Although there is a `lock` example, it is geared
    toward controlling popular IoT smart locks. Unfortunately, the IOTDoor project
    does not meet that specification yet. In Listing [7-2](#346879_2_En_7_Chapter.xhtml#PC22),
    I have provided the configuration I used for my door sensor.


    ```

    {    "bridge": {

    "name": "IOTHome",

    "username": "CC:22:3D:E3:CD:31",

    "port": 51826,

    "pin": "031-45-154"

    },

    "description": "IOTHome HomeBridge",

    "platforms": "platforms": [

    {

    "platform": "Bluetooth",

    "accessories": [

    {

    "name": "IOTDoor",

    "address": "30:AE:A4:28:73:76",

    "services": [

    {

    "name": "Door Sensor",

    "type": "Switch",

    "UUID": " 83b46845-6e9c-4b25-89cf-

    871cc74cc68e",

    "characteristics": [

    {

    "type": "On",

    "UUID": " 4b61d6b9-2e29-4fdf-a74a-

    7b8bf70ecd9a"

    }

    ]

    }

    ]

    }

    ]

    }

    ],

    "accessories": [

    { "accessory": "Dht",

    "name": "Indoor Comfort Sensor",

    "name_temperature": "Temperature",

    "name_humidity": "Humidity",

    "gpio":        "21",

    "service": "dht22" }

    ]}

    Listing 7-2

    Configuration JSON File for Homebridge (config.json), Including Bluetooth

    ```


    There are three aspects of the configuration that you must pay careful attention
    to. First, `homebridge-bluetooth` implements its interface via a `platform` configuration,
    rather than an `accessory`.


    Next, in order to bridge the correct Bluetooth functionality, you must put the
    exact service and characteristic UUIDs for the lock status from the Arduino program
    into the `config.json` file . Finally, in order to find the device, you must provide
    its name and hardware address, as they are advertised. In Chapter [6](#346879_2_En_6_Chapter.xhtml)’s
    Arduino setup code, you did not have to set up a hardware address, as it is generated
    by the Bluetooth LE module in the ESP32 microcontroller. However, you can use
    the scanning utilities on the Raspberry Pi to find the hardware address. After
    verifying that your door sensor is not currently connected to any devices, run
    the following command:


    ```

    sudo hcitool lescan

    ```


    Your output should contain a list of nearby Bluetooth LE devices that are advertising
    in the physical vicinity of your Raspberry Pi, as shown in Figure [7-12](#346879_2_En_7_Chapter.xhtml#Fig12).


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig12_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Results of using the `hcitool` utility to scan for Bluetooth LE devices


    After copying the hexadecimal hardware address for your IOTDoor sensor into the
    HomeBridge configuration file, save your result. Your HomeKit bridge is now fully
    configured!'
  trans: "\n### 配置 HomeBridge 以连接蓝牙低功耗配件\n\nHomeBridge 可用的另一个强大插件是 `homebridge-bluetooth`，它允许你通过\
    \ HomeKit 连接蓝牙外设。该插件充当蓝牙客户端（例如第 6 章中的 IOTHome 应用），除了读取状态外，还可用于控制设备。这一功能让你可以询问\
    \ Siri“入户门传感器是否开着”，并根据你自建传感器传来的数据获得响应。\n\n安装插件前，你需要解决几个依赖项。首先，通过 `npm` 安装 `node-gyp`\
    \ 和 `noble` Node.js 模块。\n\n```\nsudo npm install -g --unsafe-perm node-gyp\nsudo\
    \ npm install -g --unsafe-perm noble\n```\n\n接下来，根据 Noble 的 GitHub 文档（`https://github.com/noble/noble`）中的提示，你必须允许非管理员账户在树莓派上使用蓝牙低功耗工具，操作如下：\n\
    \n```\nsudo setcap cap_net_raw+eip $(eval readlink -f `which node`)\n```\n\n出于安全考虑，始终建议仅将网络和硬件访问权限锁定给受信用户。但在原型开发阶段，额外的安全措施可能会增加障碍，导致调试困难。对于计划长期使用的\
    \ HomeKit 桥接器，我建议在熟悉 HomeBridge 后撤销此设置。\n\n现在，你终于可以使用 `npm` 安装 `homebridge-bluetooth`\
    \ 了。\n\n```\nsudo npm install -g --unsafe-perm homebridge-bluetooth\n```\n\n与\
    \ `homebridge-dht` 类似，要将该插件作为桥接器的一部分使用，你需要按照开发者提供的规范（位于 `www.npmjs.com/package/homebridge-bluetooth`），将配置信息添加到\
    \ HomeBridge 配置文件（`~/.homebridge/config.json`）中。在我的实现中，我选择遵循他们的 `switch` 示例，该示例将门传感器注册为一个智能开关。虽然也有\
    \ `lock` 示例，但它主要针对控制流行的物联网智能锁。遗憾的是，IOTDoor 项目尚未满足该规范。在代码清单 7-2 中，我提供了用于门传感器的配置文件。\n\
    \n```\n{\n    \"bridge\": {\n        \"name\": \"IOTHome\",\n        \"username\"\
    : \"CC:22:3D:E3:CD:31\",\n        \"port\": 51826,\n        \"pin\": \"031-45-154\"\
    \n    },\n    \"description\": \"IOTHome HomeBridge\",\n    \"platforms\": [\n\
    \        {\n            \"platform\": \"Bluetooth\",\n            \"accessories\"\
    : [\n                {\n                    \"name\": \"IOTDoor\",\n         \
    \           \"address\": \"30:AE:A4:28:73:76\",\n                    \"services\"\
    : [\n                        {\n                            \"name\": \"Door Sensor\"\
    ,\n                            \"type\": \"Switch\",\n                       \
    \     \"UUID\": \"83b46845-6e9c-4b25-89cf-871cc74cc68e\",\n                  \
    \          \"characteristics\": [\n                                {\n       \
    \                             \"type\": \"On\",\n                            \
    \        \"UUID\": \"4b61d6b9-2e29-4fdf-a74a-7b8bf70ecd9a\"\n                \
    \                }\n                            ]\n                        }\n\
    \                    ]\n                }\n            ]\n        }\n    ],\n\
    \    \"accessories\": [\n        {\n            \"accessory\": \"Dht\",\n    \
    \        \"name\": \"Indoor Comfort Sensor\",\n            \"name_temperature\"\
    : \"Temperature\",\n            \"name_humidity\": \"Humidity\",\n           \
    \ \"gpio\": \"21\",\n            \"service\": \"dht22\"\n        }\n    ]\n}\n\
    ```\n**代码清单 7-2** 包含蓝牙的 Homebridge 配置文件（`config.json`）\n\n配置中有三个方面需要特别注意。首先，`homebridge-bluetooth`\
    \ 通过 `platform` 配置而非 `accessory` 来实现其接口。\n\n其次，为了桥接正确的蓝牙功能，你必须将 Arduino 程序中锁状态的精确服务和特性\
    \ UUID 填入 `config.json` 文件。最后，为了找到设备，你必须提供其广播时使用的名称和硬件地址。在第 6 章的 Arduino 设置代码中，你无需设置硬件地址，因为它由\
    \ ESP32 微控制器中的蓝牙低功耗模块生成。不过，你可以使用树莓派上的扫描工具来查找硬件地址。在确认你的门传感器当前未连接任何设备后，运行以下命令：\n\
    \n```\nsudo hcitool lescan\n```\n\n输出应包含树莓派物理附近正在广播的蓝牙低功耗设备列表，如图 7-12 所示。\n\n\
    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig12_HTML.jpg](img/346879_2_En_7_Fig12_HTML.jpg)\n\
    \n**图 7-12** 使用 `hcitool` 工具扫描蓝牙低功耗设备的结果\n\n将 IOTDoor 传感器的十六进制硬件地址复制到 HomeBridge\
    \ 配置文件中后，保存结果。至此，你的 HomeKit 桥接器已完全配置完成！\n"
- fmt: '# Configuring HomeBridge to Run at Startup (Experimental)


    To make your new HomeKit bridge meet user expectations, namely, that it will work
    when you plug it into power, you will have to configure the Raspberry Pi to start
    HomeBridge on startup. I have marked this section as experimental, since, during
    my research, I found it very difficult to find a configuration method that would
    be appropriate by Linux administration standards, easy to explain, and stable
    (i.e., boots up without errors every time). The solution I provide here is heavily
    based on the official HomeBridge GitHub documentation (`https://github.com/nfarina/homebridge/wiki/Running-HomeBridge-on-a-Raspberry-Pi#running-homebridge-on-bootup`)
    and Tim Leland’s supplementary guide (`https://timleland.com/setup-homebridge-to-start-on-bootup/`).
    In my experiments, these instructions worked best through one or two debugging
    sessions. After significant trial-and-error, I noticed much of the stability began
    to degrade. At that point, resetting the Raspberry Pi and starting over from scratch
    worked best for me.


    To begin the setup process, start by creating a new system called `homebridge`,
    using the `useradd` command:


    ```

    sudo useradd --system homebridge

    ```


    For startup scripts, it is a common practice to run them as their own user. This
    allows you to separate users by their intended roles and adds security, by preventing
    jobs from running with full administrator permissions.


    Next, you must specify the startup options for the job. Create a new file called
    `/etc/default/homebridge` using `nano` or your other favorite text editor.


    ```

    sudo nano /etc/default/homebridge

    ```


    For the contents of the configuration file, use the sample from Listing [7-3](#346879_2_En_7_Chapter.xhtml#PC26).
    The most important configuration option is `HOMEBRIDGE_OPTS`, which specifies
    where the HomeBridge configuration file is located. For this project, you will
    copy the configuration to `/var/lib/homebridge`, to make it more accessible by
    the `homebridge` user.


    ```

    # Defaults / Configuration options for homebridge

    # The following settings tells homebridge where to find the config.json file and
    where to persist the data (i.e. pairing and others)

    HOMEBRIDGE_OPTS=-U /var/lib/homebridge

    # If you uncomment the following line, homebridge will log more

    # You can display this via systemd''s journalctl: journalctl -f -u homebridge

    DEBUG=*

    Listing 7-3

    Startup Options File for HomeBridge

    ```


    After saving the startup options file, you must define the service itself. Again,
    using your favorite text editor, create a file called `/etc/systemd/system/homebridge.service`.


    ```

    sudo nano /etc/systemd/system/homebridge.service

    ```


    Use the contents of Listing [7-4](#346879_2_En_7_Chapter.xhtml#PC28) as your guide
    to populating the service definition. In this file, be careful of the `User` key,
    which defines which user account will be employed to run the service, and the
    `ExecStart` key, which defines where HomeBridge is installed.


    ```

    [Unit]

    Description=Node.js HomeKit Server

    After=syslog.target network-online.target

    [Service]

    Type=simple

    User=homebridge

    EnvironmentFile=/etc/default/homebridge

    # Adapt this to your specific setup (could be /usr/bin/homebridge)

    # See comments below for more information

    ExecStart=/usr/local/bin/homebridge $HOMEBRIDGE_OPTS

    Restart=on-failure

    RestartSec=10

    KillMode=process

    [Install]

    WantedBy=multi-user.target

    Listing 7-4

    Startup Service Definition for HomeBridge

    ```


    Next, you must copy the local HomeBridge configuration files from your `.homebridge`
    directory to a new directory for the `homebridge` user. As shown in Listing [7-5](#346879_2_En_7_Chapter.xhtml#PC29),
    create a new directory, called `/var/lib/homebridge`, copy all of your old files
    there, and then make the files executable.


    ```

    sudo mkdir /var/lib/homebridge

    sudo cp ~/.homebridge/config.json /var/lib/homebridge/

    sudo chmod -R 0777 /var/lib/homebridge

    Listing 7-5

    Moving the HomeBridge Configuration Files

    ```


    Finally, when the files have been moved over, register the service using the `systemctl`
    command.


    ```

    sudo systemctl daemon-reload

    ```


    Your HomeBridge installation is now ready to start up when your Raspberry Pi is
    powered on!'
  raw: '#### Configuring HomeBridge to Run at Startup (Experimental )


    To make your new HomeKit bridge meet user expectations, namely, that it will work
    when you plug it into power, you will have to configure the Raspberry Pi to start
    HomeBridge on startup. I have marked this section as experimental, since, during
    my research, I found it very difficult to find a configuration method that would
    be appropriate by Linux administration standards, easy to explain, and stable
    (i.e., boots up without errors every time). The solution I provide here is heavily
    based on the official HomeBridge GitHub documentation ( [`https://github.com/nfarina/homebridge/wiki/Running-HomeBridge-on-a-Raspberry-Pi#running-homebridge-on-bootup`](https://github.com/nfarina/homebridge/wiki/Running-HomeBridge-on-a-Raspberry-Pi#running-homebridge-on-bootup)
    ) and Tim Leland’s supplementary guide ( [`https://timleland.com/setup-homebridge-to-start-on-bootup/`](https://timleland.com/setup-homebridge-to-start-on-bootup/)
    ). In my experiments, these instructions worked best through one or two debugging
    sessions. After significant trial-and-error, I noticed much of the stability began
    to degrade. At that point, resetting the Raspberry Pi and starting over from scratch
    worked best for me.


    To begin the setup process, start by creating a new system called `homebridge`,
    using the `useradd` command:


    ```

    sudo useradd --system homebridge

    ```


    For startup scripts, it is a common practice to run them as their own user. This
    allows you to separate users by their intended roles and adds security, by preventing
    jobs from running with full administrator permissions.


    Next, you must specify the startup options for the job. Create a new file called
    `/etc/default/homebridge` using nano or your other favorite text editor.


    ```

    sudo nano /etc/default/homebridge

    ```


    For the contents of the configuration file, use the sample from Listing [7-3](#346879_2_En_7_Chapter.xhtml#PC26).
    The most important configuration option is `HOMEBRIDGE_OPTS`, which specifies
    where the HomeBridge configuration file is located. For this project, you will
    copy the configuration to `/var/lib/homebridge`, to make it more accessible by
    the `homebridge` user.


    ```

    # Defaults / Configuration options for \homebridge

    # The following settings tells homebridge where \to find the config.json file
    and where to \persist the data (i.e. pairing and others)

    HOMEBRIDGE_OPTS=-U /var/lib/homebridge

    # If you uncomment the following line, \homebridge will log more

    # You can display this via systemd''s journalctl: \journalctl -f -u homebridge

    DEBUG=*

    Listing 7-3

    Startup Options File for HomeBridge

    ```


    After saving the startup options file, you must define the service itself. Again,
    using your favorite text editor, create a file called `/etc/systemd/system/homebridge.service`.


    ```

    sudo nano /etc/systemd/system/homebridge.service

    ```


    Use the contents of Listing [7-4](#346879_2_En_7_Chapter.xhtml#PC28) as your guide
    to populating the service definition. In this file, be careful of the `User` key,
    which defines which user account will be employed to run the service, and the
    `ExecStart` key, which defines where HomeBridge is installed.


    ```

    [Unit]

    Description=Node.js HomeKit Server

    After=syslog.target network-online.target

    [Service]

    Type=simple

    User=homebridge

    EnvironmentFile=/etc/default/homebridge

    # Adapt this to your specific setup (could be \/usr/bin/homebridge)

    # See comments below for more information

    ExecStart=/usr/local/bin/homebridge \$HOMEBRIDGE_OPTS

    Restart=on-failure

    RestartSec=10

    KillMode=process

    [Install]

    WantedBy=multi-user.target

    Listing 7-4

    Startup Service Definition for HomeBridge

    ```


    Next, you must copy the local HomeBridge configuration files from your `.homebridge`
    directory to a new directory for the `homebridge` user. As shown in Listing [7-5](#346879_2_En_7_Chapter.xhtml#PC29),
    create a new directory, called, `/var/lib/homebridge`, copy all of your old files
    there, and then make the files executable.


    ```

    sudo mkdir /var/lib/homebridge

    sudo cp ~/.homebridge/config.json /var/lib/homebridge/

    sudo chmod -R 0777 /var/lib/homebridge

    Listing 7-5

    Moving the HomeBridge Configuration Files

    ```


    Finally, when the files have been moved over, register the service using the `systemctl`
    command.


    ```

    sudo systemctl daemon-reload

    ```


    Your HomeBridge installation is now ready to start up when your Raspberry Pi is
    powered on!'
  trans: '

    # 配置 HomeBridge 开机自启动（实验性功能）


    为了让您的新 HomeKit 桥接器满足用户期望，即插电就能正常工作，您需要配置树莓派，使其在开机时自动启动 HomeBridge。我将此部分标记为实验性功能，因为在研究过程中，我发现很难找到一种既符合
    Linux 管理标准、又易于解释且稳定（即每次启动均无错误）的配置方法。我在此提供的解决方案主要参考了官方 HomeBridge GitHub 文档（`https://github.com/nfarina/homebridge/wiki/Running-HomeBridge-on-a-Raspberry-Pi#running-homebridge-on-bootup`）以及
    Tim Leland 的补充指南（`https://timleland.com/setup-homebridge-to-start-on-bootup/`）。根据我的实验，这些说明在经历一到两次调试会话后效果最佳。经过大量试错后，我发现稳定性开始显著下降。此时，重置树莓派并从零开始对我来说效果最好。


    要开始配置过程，首先使用 `useradd` 命令创建一个名为 `homebridge` 的系统用户：


    ```

    sudo useradd --system homebridge

    ```


    对于启动脚本，通常的做法是使用专用的用户账户来运行。这可以让您根据预期角色来区分不同用户，并通过防止任务以完全管理员权限运行来增强安全性。


    接下来，您必须指定该任务的启动选项。使用 `nano` 或您喜欢的其他文本编辑器，创建一个名为 `/etc/default/homebridge` 的新文件。


    ```

    sudo nano /etc/default/homebridge

    ```


    对于配置文件的内容，请使用示例 7-3。最重要的配置选项是 `HOMEBRIDGE_OPTS`，它指定了 HomeBridge 配置文件的存放位置。对于本项目，您需要将配置复制到
    `/var/lib/homebridge`，以便 `homebridge` 用户可以更方便地访问。


    ```

    # homebridge 的默认配置/选项

    # 以下设置告诉 homebridge 在哪里找到 config.json 文件以及在哪里持久化数据（例如配对信息等）

    HOMEBRIDGE_OPTS=-U /var/lib/homebridge

    # 如果您取消注释以下行，homebridge 将会记录更多日志

    # 您可以通过 systemd 的 journalctl 查看：journalctl -f -u homebridge

    DEBUG=*

    列表 7-3

    HomeBridge 启动选项文件

    ```


    保存启动选项文件后，您必须定义服务本身。同样，使用您喜欢的文本编辑器，创建一个名为 `/etc/systemd/system/homebridge.service`
    的文件。


    ```

    sudo nano /etc/systemd/system/homebridge.service

    ```


    使用列表 7-4 的内容作为填充服务定义的指南。在此文件中，请注意 `User` 键（它定义了将使用哪个用户账户来运行服务）以及 `ExecStart` 键（它定义了
    HomeBridge 的安装位置）。


    ```

    [Unit]

    Description=Node.js HomeKit 服务器

    After=syslog.target network-online.target

    [Service]

    Type=simple

    User=homebridge

    EnvironmentFile=/etc/default/homebridge

    # 根据您的具体设置进行调整（可能是 /usr/bin/homebridge）

    # 更多信息请参阅下方注释

    ExecStart=/usr/local/bin/homebridge $HOMEBRIDGE_OPTS

    Restart=on-failure

    RestartSec=10

    KillMode=process

    [Install]

    WantedBy=multi-user.target

    列表 7-4

    HomeBridge 启动服务定义

    ```


    接下来，您必须将本地的 HomeBridge 配置文件从您的 `.homebridge` 目录复制到一个专用于 `homebridge` 用户的新目录。如列表
    7-5 所示，创建一个名为 `/var/lib/homebridge` 的新目录，将所有旧文件复制到那里，然后使这些文件可执行。


    ```

    sudo mkdir /var/lib/homebridge

    sudo cp ~/.homebridge/config.json /var/lib/homebridge/

    sudo chmod -R 0777 /var/lib/homebridge

    列表 7-5

    移动 HomeBridge 配置文件

    ```


    最后，当文件移动完成后，使用 `systemctl` 命令注册该服务。


    ```

    sudo systemctl daemon-reload

    ```


    至此，当树莓派开机启动时，您的 HomeBridge 安装就准备启动就绪了！

    '
- fmt: '### Connecting to Your New HomeKit Bridge


    After the long and arduous process of setting up the Raspberry Pi, HomeBridge,
    and its plug-ins and creating the configuration file, you can now finally start
    HomeBridge and try to find your new HomeKit bridge in the iOS Home app.


    To begin, start HomeBridge on your Raspberry Pi. A normal installation of HomeBridge
    is accomplished by running the command `homebridge -D &` (these options give you
    more debugging information and let the app run in the background). If you completed
    setting up the startup service, this is accomplished by running the command `sudo
    systemctl start homebridge`. Next, monitor the console output, to make sure HomeBridge
    does not report any errors while starting up. For a normal installation, these
    messages will appear in the terminal as HomeBridge starts up. For a startup service
    installation, you will have to monitor the status through the command `sudo journalctl
    -au homebridge`. When HomeBridge has started successfully, you should see log
    messages indicating that the Bluetooth and DHT sensor interfaces were established
    successfully, and, more important, a large QR code that you can use to set up
    the bridge from the Home app, as shown in Figure [7-13](#346879_2_En_7_Chapter.xhtml#Fig13).


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig13_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig13_HTML.jpg)


    Figure 7-13


    HomeBridge-generated QR code for HomeKit configuration


    Next, open the Home app on your iPhone or iPad. It should start with the Home
    tab selected, showing an overview of your currently configured HomeKit Home and
    devices. As shown in Figure [7-14](#346879_2_En_7_Chapter.xhtml#Fig14), press
    the Add button (+ sign) at the top right, then select Add Accessory from the action
    sheet that appears. This will take you to a screen with a camera view that allows
    you to scan in a HomeKit setup QR code. At this time, scan the QR code that appears
    in the HomeKit console output.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig14_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig14_HTML.jpg)


    Figure 7-14


    Adding a HomeKit accessory using the Home app


    After the QR code has been recognized by the Home app, you will receive a pop-up
    asking you to confirm that you want to add an unofficial HomeKit device. This
    lets you know that HomeBridge is successfully advertising your bridge as a valid
    HomeKit device. If the Home app will not recognize your QR code, you can use the
    Don’t Have a Code or Can’t Scan button on the Add Accessory screen, to manually
    enter the PIN number from your HomeBridge configuration file. If your device is
    correctly set up, successful PIN entry should find your device and present the
    same pop-up.


    After confirming your selection, an Adding message will appear on the screen for
    a few seconds while the bridge is being registered in the HomeKit database. As
    shown in Figure [7-15](#346879_2_En_7_Chapter.xhtml#Fig15), once registration
    is complete, you will be asked to assign the room and display name for each service
    that is exposed through the bridge. For my configuration, I assigned the temperature
    and humidity services to my bedroom and the door sensor to the entrance. This
    will allow me to say, “Is the door switch on at the entrance?” or “What is the
    temperature in the bedroom?”


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig15_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Assigning details to a new HomeKit device


    After setup is complete, you will be returned to the Home tab. As shown in Figure
    [7-16](#346879_2_En_7_Chapter.xhtml#Fig16), it will now include the services from
    your HomeKit bridge, as well as the latest values for each. As one final test,
    say “Hey Siri,” to activate Siri, then ask for the temperature in your bedroom.
    Siri should read back the latest value from your Raspberry Pi after a few seconds.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig16_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Using the Home app and Siri to confirm that the HomeKit bridge is operational


    ### Troubleshooting Configuration Problems


    While I was developing this chapter, the most common debugging problem I ran into
    was that after changing the HomeBridge configuration, HomeKit would not find the
    new services, even after restarting all of my devices. To alleviate this, I found
    the quickest solution in two simple tricks: changing the `username` of the HomeKit
    bridge and emptying the `persist` folder in HomeBridge’s configuration directory
    (`~/.homebridge/persist` or `/var/lib/homebridge`, depending on your startup method).


    As mentioned at the beginning of the chapter, HomeKit serves as a secure database
    of devices, managed by your Apple devices and HomeKit hub. Complementing this,
    HomeBridge keeps information on saved devices in its `persist` folder. Emptying
    this folder resets the saved information on your Raspberry Pi. Although you can
    delete and re-add devices through the Home app on your iOS devices, you cannot
    fully wipe out its database yourself. However, by changing some of the bytes of
    the username (for instance, changing the last two digits from 30 to 31), you can
    make it think you are connecting to a new device, allowing you to enter the provisioning
    process again.


    ## Summary


    In this chapter, you learned how to start harnessing the power of the Raspberry
    Pi single-board computer to run HomeBridge as a Node.js-powered HomeKit bridge
    for the door sensor you built in Chapters [5](#346879_2_En_5_Chapter.xhtml) and
    [6](#346879_2_En_6_Chapter.xhtml), as well as a thermometer sensor. Not only did
    this expand the functionalities of the smart functionalities of your IOTHome,
    it also allowed you to harness Siri commands for getting the statistics of your
    home sensors.


    The most grueling part of this chapter was bootstrapping the Raspberry Pi, HomeBridge,
    and all of their dependencies, but I hope you will be able to use this chapter
    again in your projects as a quick setup guide. In later chapters, you will expand
    the capabilities of your Raspberry Pi even further, to make it as a web server.
    Not bad for a $35 computer!


    The instructions in this chapter were optimized for Raspberry Pi but can be modified
    slightly to work on a BeagleBone, Mac, or any other Linux-based system that can
    run Node.js.'
