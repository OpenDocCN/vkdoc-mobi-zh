    最后，要使用该库，您必须基于字体中可用的图标创建 `UIImage` 对象。Font Awesome 不仅提供了纯 Unicode 十六进制代码，还为每个图标提供了名称。要了解有哪些图标可用及其名称，我倾向于使用该字体的官方搜索工具，网址为：[`https://fontawesome.com/icons?d=gallery&m=free`](https://fontawesome.com/icons?d=gallery%2526m=free)。开始项目时，使用
    `lock` 表示锁图形，使用 `sun` 表示晴朗天气图形。


    要创建图形，您可以使用 FontAwesome.swift 对 `UIImage` 类的扩展方法 `UIImage.fontAwesome(name:style:textColor:size:)`。顾名思义，您需要调用
    API 并传入图标名称、显示样式、着色颜色和尺寸。在代码清单 9-5 中，我将这些调用添加到了 `ViewController` 类中。


    ```

