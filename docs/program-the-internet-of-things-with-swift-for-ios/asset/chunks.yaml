    清单 6-7

    包含有效蓝牙 LE 回调的 Arduino 解决方案

    ```


    此步骤完成了 Arduino 解决方案中蓝牙 LE 服务器组件的所有设置。为了验证服务器是否正确创建，我喜欢使用蓝牙 LE 扫描器应用来检查 Arduino
    是否正在广播正确的信息。我首选的应用是 LightBlue^® Explorer，可在 App Store 上的 [`https://itunes.apple.com/us/app/lightblue-explorer/id557428110?mt=8`](https://itunes.apple.com/us/app/lightblue-explorer/id557428110?mt=8)
    下载。在图 6-5 中，我展示了该应用的截图，包括门传感器的状态。在应用的主屏幕上，你应该能看到你在清单 6-6 中指定的广播名称（“IOTDoor”），在详情页面上，你会看到你用于设置服务器的四个
    UUID。要找到该设备，只需将解决方案下载到 HUZZAH32 开发板，按下芯片上的重置按钮，然后等待几秒钟。


    ![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig5_HTML.jpg](img/346879_2_En_6_Fig5_HTML.jpg)


    图 6-5


    使用 LightBlue^® Explorer 验证蓝牙 LE 广播数据


    ### 注意


    添加蓝牙服务器初始化代码后，你的 Arduino 解决方案启动速度会明显变慢。你可以打开 Arduino IDE 的串行监视器来验证这一点。在启动过程中，你应该每隔几秒就能看到蓝牙服务器代码记录的日志消息。


    ### 通过蓝牙 LE 发送数据更新


    信不信由你，设置用于广播设备的蓝牙服务器是 Arduino 解决方案中最困难的部分。要通过蓝牙 LE 发送数据更新，你只需使用已保存的特征（电池电量等级、警报状态），并在状态发生变化时推送新的更新。尽管
    Arduino 解决方案设置为每秒轮询一次更新，但在实践中，每秒都传输蓝牙更新并非明智之举。除了消耗电量外，持续传输状态还会导致在设备有更新时（例如当磁传感器检测到门已打开时）无法通知用户。


    首先修改你在第 5 章中用于检测门传感器是关闭还是打开的 `checkSensor()` 方法。在该方法的旧实现中，你检查引脚是高电平（连接）还是低电平（断开），然后使用该值来打开或关闭
    LED。虽然这种实现仍然有效，但你必须保存旧值才能触发更新。


    要使用 ESP32 BLE Arduino 库发送更新，你可以使用 `setValue()` 方法在特征上设置一个新值。然后，你告诉特征对象使用 `notify()`
    方法通知所有已连接的设备。在清单 6-8 中，我已更新解决方案，将旧的传感器值保存为全局变量，并且仅当有设备连接到外设且自上次更新以来值发生了变化时，才触发蓝牙更新。


    ```

    void loop() {

    // 在此处放置你的主代码，以便重复运行：

    checkSensor();

    checkBattery();

    delay(1000);

    }

    ...

    void checkSensor() {

    int currentState = digitalRead(SWITCH_PIN);

    if (currentState != switchState) {

    updateLockBLE(currentState);

    }

    switchState = currentState;

    digitalWrite(RED_LED_PIN, switchState);

    Serial.print("传感器状态: ");

    Serial.println(switchState);

    }

    ...

    void updateLockBLE(bool currentState) {

    uint8_t value = 0;

    if (deviceConnected) {

    value = currentState ? 1 : 0;

    lockCharacteristic->setValue(&value, 1);

    lockCharacteristic->notify();

    }

    }

    清单 6-8

    从 Arduino 解决方案发布磁传感器更新

    ```


    对于 `checkBattery()` 方法，你可以使用相同的过程；但是你需要调整检测状态变化的逻辑。在实践中，你会注意到随着传感器保持通电状态，电池电量会持续下降。这是正常的，但为了方便用户，最好只在有显著变化时才通知他们。在清单
    6-9 中，我已更新解决方案来保存旧电池值（就像磁传感器一样），但不是每次值变化时都发送通知，而仅当电池电量比上次读数至少低 5% 时才发送通知。


    ```

    void checkBattery() {

    float currentLevel = analogRead(BATTERY_PIN);

    currentLevel = ((currentLevel / 4095) * 2 * 3.3 *

    1.1) * 100 / 4.3;

    if (currentLevel + 5.0 < batteryLevel) {

    batteryLevel = currentLevel;

    String valueString = String(batteryLevel);

    battCharacteristic->setValue(valueString);

    battCharacteristic->notify();

    }

    }

    清单 6-9

    当电量降低超过 5% 时发布电池更新

    ```


    完成这些步骤后，本章的 Arduino 解决方案就完整了。从现在开始，你将专注于如何构建一个应用，连接到你所创建的传感器，并读取它传输的值。


    ## 使用 Core Bluetooth 与蓝牙 LE 设备通信


    正如本章开头所述，Apple 提供了 Core Bluetooth 框架，帮助你使用其 API 快速、安全地连接到蓝牙设备。你无需埋头钻研蓝牙规范来自行实现基本通信，而是可以直接专注于业务逻辑，就像你在
    Arduino 解决方案中使用 `ESP32 BLE` 库一样。在本章后半部分，我将快速引导你完成 `IOTHome` 项目的设置，该项目将作为本节剩余项目的基础，然后介绍设置一个连接到蓝牙
    LE 配件的应用的以下步骤：


    * 向项目添加蓝牙后台服务权限

    * 发现并连接蓝牙设备

    * 监控蓝牙特征更新

    * 在应用处于后台时响应蓝牙特征更新


    与本书之前的项目一样，这里的目标不仅是学习一些有用的技能，还要学会如何应用它们，以便在未来提供便捷的用户体验。'
- fmt: "### Setting Up the IOTHome Project\n\nJumping back to Figure [6-1](#346879_2_En_6_Chapter.xhtml#Fig1)\
    \ for a second, the IOTHome project for this section will provide a tab-based\
    \ user interface to allow users to monitor various data points about their home,\
    \ using IoT technologies. Although this chapter will focus only on the screen\
    \ for the door sensor, it is a good idea to start the project out on the right\
    \ foot, by creating a new project in Xcode using the Tab Bar Controller template,\
    \ just as you did in Chapter [1](#346879_2_En_1_Chapter.xhtml) for the IOTFit\
    \ project. To shift the focus to the Bluetooth portion of the project, I strongly\
    \ recommend referring back to Chapter [1](#346879_2_En_1_Chapter.xhtml) for a\
    \ detailed review of this operation. However, for everyone’s benefit, the summary\
    \ is:\n\n1. Choose Tab Bar Controller from the New Project option in Xcode’s File\
    \ menu.\n2. Navigate to the `Main.storyboard` file, to verify that the tab-based\
    \ project was created successfully.\n3. Rename the tabs “Door” and “Home” by double-clicking\
    \ them in the storyboard, then choose new names and icons from the Attributes\
    \ Inspector in Xcode’s right-hand side panes.\n4. Rename the classes representing\
    \ the tabbed view controllers to `HomeViewController` (first tab) and `DoorViewController`\
    \ (second tab).\n\nWhen complete, your storyboard and project structure should\
    \ resemble the screenshot in Figure [6-6](#346879_2_En_6_Chapter.xhtml#Fig6).\n\
    \n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig6_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig6_HTML.jpg)\n\
    \n**Figure 6-6.** New IOTHome project, including modified storyboard and view\
    \ controller names\n\nIn order to initiate the Bluetooth connection and display\
    \ the data from the sensor, you will have to set up the user interface with the\
    \ use of code and Interface Builder. In Listing [6-10](#346879_2_En_6_Chapter.xhtml#PC10),\
    \ I have provided the modified `DoorViewController` class, which includes the\
    \ properties and stub method for the user interface. As this screen will be used\
    \ mostly for displaying data, the user interface primarily consists of `UILabel`\
    \ objects; however, you will have to use a `UIButton` to initiate and destroy\
    \ the connection. The user can only access the app from the “connected” or “disconnected”\
    \ state, so my implementation shares the same button for the connection management\
    \ actions.\n\n```\nimport UIKit\nclass DoorViewController: UIViewController {\n\
    \    @IBOutlet var statusLabel: UILabel?\n    @IBOutlet var batteryLabel: UILabel?\n\
    \    @IBOutlet var lastUpdatedLabel: UILabel?\n    @IBOutlet var connectButton:\
    \ UIButton?\n    let dateFormatter = DateFormatter()\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        dateFormatter.dateStyle = .medium\n\
    \        dateFormatter.timeStyle = .short\n    }\n    @IBAction func connect()\
    \ {\n    }\n}\n```\n\n**Listing 6-10.** `DoorViewController` Class, Including\
    \ User Interface Properties and Stub Methods\n\nTo help you theme the view controller,\
    \ in Table [6-1](#346879_2_En_6_Chapter.xhtml#Tab1), I have provided the styling\
    \ options I used for each element. As with the first section, I used Apple’s font\
    \ classes to reduce the complexity of managing fonts and give the user an experience\
    \ more consistent with Apple’s iOS design guidelines.\n\n**Table 6-1.** Styling\
    \ for Door View Controller User Interface Elements\n\n| Element Name | Text Style\
    \ | Height | Top Margin | Bottom Margin | Left Margin | Right Margin |\n| ---\
    \ | --- | --- | --- | --- | --- | --- |\n| Navigation bar | Prefers large text\
    \ | — | — | — | — | — |\n| “Status” title label | Title 2 | 24 | 40 | — | 30 |\
    \ 20 |\n| “Status” value label | Title 2 | 24 | 40 | — | 20 | ≥30 |\n| “Battery\
    \ Level” title label | Title 2 | 24 | 8 | — | 30 | 20 |\n| “Battery Level” value\
    \ label | Title 2 | 24 | 8 | — | 20 | ≥30 |\n| “Last Updated” label | Body | 25\
    \ | 8 | — | 20 | 20 |\n| “Press to Connect” label | Body | 25 | — | 20 | 20 |\
    \ 20 |\n| “Connect” button | Title 1 | 60 | 20 | 30 | 20 | 20 |\n\nAfter the elements\
    \ are styled, remember to drag and drop outlets, to connect the code to the storyboard\
    \ file. Your completed storyboard and its Connection Inspector should resemble\
    \ the output shown in Figure [6-7](#346879_2_En_6_Chapter.xhtml#Fig7).\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig7_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig7_HTML.jpg)\n\
    \n**Figure 6-7.** Styled storyboard and Interface Builder connections for Door\
    \ View Controller\n\n### Enabling Bluetooth Accessory Background Updates\n\nAlthough\
    \ iOS is notorious for pausing applications while they are backgrounded, Bluetooth\
    \ LE peripheral updates are one of the few exceptions, much like the background\
    \ locations updates you enabled in the first section of the book. In the same\
    \ manner as background location updates, to enable Bluetooth updates, you must\
    \ declare them as capabilities in your application’s project settings.\n\nTo begin\
    \ the process of declaring the capability, click the `.xcodeproj` file for the\
    \ IOTHome project (`IOTHome.xcodeproj`). As shown in Figure [6-8](#346879_2_En_6_Chapter.xhtml#Fig8),\
    \ click the Capabilities tab. Click on the Background Modes and then Uses Bluetooth\
    \ LE accessories.\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig8_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig8_HTML.jpg)\n\
    \n**Figure 6-8.** Enabling the Bluetooth accessory background mode\n\nFor background\
    \ location updates, you are required to update the capabilities for your project\
    \ and define a message for the location permission alert in your project’s `Info.plist`\
    \ file. For background Bluetooth projects, the “and” is what you require to define\
    \ the role the iOS device will play in the Bluetooth operation. For this project,\
    \ you only have to discover and connect to Bluetooth LE devices. Thus, you will\
    \ only perform the central manager role. Click the `Info.plist` file for your\
    \ project and enable the `NSBluetoothPeripheralUsageDescription` key-value pair,\
    \ as shown in Figure [6-9](#346879_2_En_6_Chapter.xhtml#Fig9). For the description,\
    \ I used the following message: “IOTHome would like to use Bluetooth to help you\
    \ monitor Bluetooth-based IOT sensors in your home. This information will not\
    \ be shared outside of the app.”\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig9_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig9_HTML.jpg)\n\
    \n**Figure 6-9.** Specifying the central manager alert message in the project’s\
    \ `Info.plist`\n\nThese steps complete the project setup for this iteration of\
    \ the IOTHome project. Now you can begin to flesh out the project, by using Core\
    \ Bluetooth to discover and interact with the door sensor."
  raw: '### Setting Up the IOTHome Project


    Jumping back to Figure [6-1](#346879_2_En_6_Chapter.xhtml#Fig1) for a second,
    the IOTHome project for this section will provide a tab-based user interface to
    allow users to monitor various data points about their home, using IoT technologies.
    Although this chapter will focus only on the screen for the door sensor, it is
    a good idea to start the project out on the right foot, by creating a new project
    in Xcode using the Tab Bar Controller template, just as you did in Chapter [1](#346879_2_En_1_Chapter.xhtml)
    for the IOTFit project. To shift the focus to the Bluetooth portion of the project,
    I strongly recommend referring back to Chapter [1](#346879_2_En_1_Chapter.xhtml)
    for a detailed review of this operation. However, for everyone’s benefit, the
    summary is


    1.  Choose Tab Bar Controller from the New Project option in Xcode’s File menu.


    2.  Navigate to the `Main.storyboard` file, to verify that the tab-based project
    was created successfully.


    3.  Rename the tabs “Door” and “Home” by double-clicking them in the storyboard,
    then choose new names and icons from the Attributes Inspector Xcode’s right-hand
    side panes.


    4.  Rename the classes representing the tabbed view controllers to `HomeViewController`
    (first tab) and `DoorViewController` (second tab).


    When complete, your storyboard and project structure should resemble the screenshot
    in Figure [6-6](#346879_2_En_6_Chapter.xhtml#Fig6).


    ![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig6_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig6_HTML.jpg)


    Figure 6-6


    New IOTHome project, including modified storyboard and view controller names


    In order to initiate the Bluetooth connection and display the data from the sensor,
    you will have to set up the user interface with the use of code and Interface
    Builder. In Listing [6-10](#346879_2_En_6_Chapter.xhtml#PC10), I have provided
    the modified `DoorViewController` class , which includes the properties and stub
    method for the user interface. As this screen will be used mostly for displaying
    data, the user interface primarily consists of `UILabel` objects; however, you
    will have to use a `UIButton` to initiate and destroy the connection. The user
    can only access the app from the “connected” or “disconnected” state, so my implementation
    shares the same button for the connection management actions.


    ```

    import UIKit

    class DoorViewController: UIViewController {

    @IBOutlet var statusLabel: UILabel?

    @IBOutlet var batteryLabel: UILabel?

    @IBOutlet var lastUpdatedLabel: UILabel?

    @IBOutlet var connectButton: UIButton?

    let dateFormatter = DateFormatter()

    override func viewDidLoad() {

    super.viewDidLoad()

    dateFormatter.dateStyle = .medium

    dateFormatter.timeStyle = .short

    }

    @IBAction func connect() {

    }

    }

    Listing 6-10

    DoorViewController Class, Including User Interface Properties and Stub Methods

    ```


    To help you theme the view controller, in Table [6-1](#346879_2_En_6_Chapter.xhtml#Tab1),
    I have provided the styling options I used for each element. As with the first
    section, I used Apple’s font classes to reduce the complexity of managing fonts
    and give the user an experience more consistent with Apple’s iOS design guidelines.


    Table 6-1


    Styling for Door View Controller User Interface Elements


    | Element Name | Text Style | Height | Top Margin | Bottom Margin | Left Margin
    | Right Margin |

    | --- | --- | --- | --- | --- | --- | --- |

    | Navigation bar | Prefers large text | — | — | — | —- | — |

    | “Status” title label | Title 2 | 24 | 40 | — | 30 | 20 |

    | “Status” value label | Title 2 | 24 | 40 | — | 20 | ≥30 |

    | “Battery Level” title label | Title 2 | 24 | 8 | — | 30 | 20 |

    | “Battery Level” value label | Title 2 | 24 | 8 | — | 20 | ≥30 |

    | “Last Updated” label | Body | 25 | 8 | — | 20 | 20 |

    | “Press to Connect” label | Body | 25 | — | 20 | 20 | 20 |

    | “Connect” button | Title 1 | 60 | 20 | 30 | 20 | 20 |


    After the elements are styled, remember to drag and drop outlets, to connect the
    code to the storyboard file. Your completed storyboard and its Connection Inspector
    should resemble the output shown in Figure [6-7](#346879_2_En_6_Chapter.xhtml#Fig7).


    ![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig7_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Styled storyboard and Interface Builder connections for Door View Controller


    #### Enabling Bluetooth Accessory Background Updates


    Although iOS is notorious for pausing applications while they are backgrounded,
    Bluetooth LE peripheral updates are one of the few exceptions, much like the background
    locations updates you enabled in the first section of the book. In the same manner
    as background location updates, to enable Bluetooth updates, you must declare
    them as capabilities in your application’s project settings.


    To begin the process of declaring the capability, click the `.xcodeproj` file
    for the IOTHome project (`IOTHome.xcodeproj`). As shown in Figure [6-8](#346879_2_En_6_Chapter.xhtml#Fig8),
    click the Capabilities tab. Click on the Background Modes and then Uses Bluetooth
    LE accessories.


    ![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig8_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Enabling the Bluetoooth accessory background mode


    For background location updates, you are required to update the capabilities for
    your project and define a message for the location permission alert in your project’s
    `Info.plist` file. For background Bluetooth projects, the “and” is what you require
    to define the role the iOS device will play in the Bluetooth operation. For this
    project, you only have to discover and connect to Bluetooth LE devices. Thus,
    you will only perform the central manager role. Click the `Info.plist` file for
    your project and enable the `NSBluetoothPeripheralUsageDescription` key-value
    pair, as shown in Figure [6-9](#346879_2_En_6_Chapter.xhtml#Fig9). For the description,
    I used the following message: “IOTHome would like to use Bluetooth to help you
    monitor Bluetooth-based IOT sensors in your home. This information will not be
    shared outside of the app.”


    ![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig9_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Specifying the central manager alert message in the project’s *Info.plist*


    These steps complete the project setup for this iteration of the IOTHome project.
    Now you can begin to flesh out the project, by using Core Bluetooth to discover
    and interact with the door sensor.'
  trans: "\n### 设置 IOTHome 项目\n\n再次回到图 6-1，本节中的 IOTHome 项目将提供一个基于标签的用户界面，允许用户利用物联网技术监控家中的各种数据点。虽然本章只关注门磁传感器界面，但最好的做法是让项目从一开始就步入正轨，即像你在第一章中为\
    \ IOTFit 项目所做的那样，在 Xcode 中使用标签栏控制器模板创建一个新项目。为了将重点转移到项目的蓝牙部分，我强烈建议你回顾第一章以详细了解此操作流程。不过，为了方便大家，以下是摘要：\n\
    \n1. 从 Xcode “文件”菜单的“新建项目”选项中，选择“标签栏控制器”。\n2. 导航到 `Main.storyboard` 文件，验证基于标签的项目是否创建成功。\n\
    3. 通过双击故事板中的标签将其重命名为“门”和“主页”，然后在 Xcode 右侧窗格的“属性检查器”中选择新名称和图标。\n4. 将代表标签视图控制器的类重命名为\
    \ `HomeViewController`（第一个标签）和 `DoorViewController`（第二个标签）。\n\n完成后，你的故事板和项目结构应类似于图\
    \ 6-6 中的截图。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig6_HTML.jpg](img/346879_2_En_6_Fig6_HTML.jpg)\n\
    \n**图 6-6.** 新的 IOTHome 项目，包含修改后的故事板和视图控制器名称\n\n为了发起蓝牙连接并显示传感器数据，你需要通过代码和 Interface\
    \ Builder 来设置用户界面。在代码清单 6-10 中，我提供了修改后的 `DoorViewController` 类，其中包含了用户界面的属性和存根方法。由于此界面主要用于显示数据，因此用户界面主要由\
    \ `UILabel` 对象组成；不过，你需要使用一个 `UIButton` 来发起和断开连接。用户只能在“已连接”或“未连接”状态下访问应用，因此我的实现方案对连接管理操作共用了同一个按钮。\n\
    \n```\nimport UIKit\nclass DoorViewController: UIViewController {\n    @IBOutlet\
    \ var statusLabel: UILabel?\n    @IBOutlet var batteryLabel: UILabel?\n    @IBOutlet\
    \ var lastUpdatedLabel: UILabel?\n    @IBOutlet var connectButton: UIButton?\n\
    \    let dateFormatter = DateFormatter()\n    override func viewDidLoad() {\n\
    \        super.viewDidLoad()\n        dateFormatter.dateStyle = .medium\n    \
    \    dateFormatter.timeStyle = .short\n    }\n    @IBAction func connect() {\n\
    \    }\n}\n```\n\n**代码清单 6-10.** `DoorViewController` 类，包含用户界面属性和存根方法\n\n为了帮助你为主题化视图控制器，我在表\
    \ 6-1 中提供了我为每个元素使用的样式选项。与第一部分一样，我使用了 Apple 的字体类来降低字体管理的复杂性，并为用户提供更符合 Apple iOS\
    \ 设计指南的体验。\n\n**表 6-1.** 门视图控制器用户界面元素的样式\n\n| 元素名称 | 文本样式 | 高度 | 上边距 | 下边距 | 左边距\
    \ | 右边距 |\n| --- | --- | --- | --- | --- | --- | --- |\n| 导航栏 | 偏好大文本 | — | —\
    \ | — | — | — |\n| “状态”标题标签 | 标题 2 | 24 | 40 | — | 30 | 20 |\n| “状态”值标签 | 标题 2\
    \ | 24 | 40 | — | 20 | ≥30 |\n| “电池电量”标题标签 | 标题 2 | 24 | 8 | — | 30 | 20 |\n|\
    \ “电池电量”值标签 | 标题 2 | 24 | 8 | — | 20 | ≥30 |\n| “上次更新”标签 | 正文 | 25 | 8 | — | 20\
    \ | 20 |\n| “点击连接”标签 | 正文 | 25 | — | 20 | 20 | 20 |\n| “连接”按钮 | 标题 1 | 60 | 20\
    \ | 30 | 20 | 20 |\n\n在元素样式设置完成后，记得拖放插座（outlet），将代码连接到故事板文件。你完成的故事板及其连接检查器应类似于图\
    \ 6-7 所示的结果。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig7_HTML.jpg](img/346879_2_En_6_Fig7_HTML.jpg)\n\
    \n**图 6-7.** 为门视图控制器设置样式后的故事板和 Interface Builder 连接\n\n### 启用蓝牙配件后台更新\n\n尽管 iOS\
    \ 因在应用进入后台时暂停应用而闻名，但低功耗蓝牙外设更新是为数不多的例外之一，就像你在本书第一部分启用的后台位置更新一样。与后台位置更新类似，要启用蓝牙更新，你必须在应用的项目设置中将它们声明为功能。\n\
    \n开始声明该功能的过程时，请点击 IOTHome 项目的 `.xcodeproj` 文件（`IOTHome.xcodeproj`）。如图 6-8 所示，点击“功能”标签。然后点击“后台模式”，接着选中“使用蓝牙\
    \ LE 配件”。\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig8_HTML.jpg](img/346879_2_En_6_Fig8_HTML.jpg)\n\
    \n**图 6-8.** 启用蓝牙配件后台模式\n\n对于后台位置更新，你需要更新项目的功能，并在项目的 `Info.plist` 文件中定义位置权限提醒消息。对于后台蓝牙项目，“同样需要”你在\
    \ `Info.plist` 文件中定义 iOS 设备在蓝牙操作中扮演的角色。对于本项目，你只需发现并连接到低功耗蓝牙设备。因此，你只需执行中心管理器的角色。点击项目的\
    \ `Info.plist` 文件，启用 `NSBluetoothPeripheralUsageDescription` 键值对，如图 6-9 所示。对于描述说明，我使用了以下消息：“IOTHome\
    \ 希望使用蓝牙来帮助您监控家中的基于蓝牙的物联网传感器。此信息不会在应用之外共享。”\n\n![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig9_HTML.jpg](img/346879_2_En_6_Fig9_HTML.jpg)\n\
    \n**图 6-9.** 在项目的 `Info.plist` 中指定中心管理器提醒消息\n\n这些步骤完成了 IOTHome 项目当前迭代的项目设置。现在，你可以开始充实项目内容，使用\
    \ Core Bluetooth 来发现门磁传感器并与之交互。\n"
- fmt: "# Setting Up the App As a Central Manager\n\nWith the rough user interface\
    \ and capability permissions in place, you are now ready to begin scanning for\
    \ Bluetooth devices from the `IOTHome` app. To follow the vocabulary of Bluetooth\
    \ LE, in this section, you will enable the iOS app to act as a central manager\
    \ and connect to the Arduino-based peripheral.\n\nTo help keep the code manageable,\
    \ you will wrap the Bluetooth operations into a class called `BluetoothService`.\
    \ This will deliver state messages back to the class that instantiated it, via\
    \ a protocol you will define, called `BluetoothServiceDelegate`. While it is possible\
    \ to put everything into one file, the logic required to implement Bluetooth is\
    \ a bit heavy, and sticking that many functions into one view controller will\
    \ introduce the *Massive View Controller* anti-pattern many developers cite as\
    \ a weakness in Apple's Model-View-Controller architecture for iOS applications.\
    \ The recent adoption of protocols as a way to alleviate this is called *Protocol\
    \ Oriented Programming*. It gives you an easy path to split up code, by defining\
    \ key behaviors in protocols and grouping the implementations via *extensions*.\
    \ If you have ever used extensions before to add functionality to classes or split\
    \ up large delegate-based APIs (such as `UITableViewDelegate`), you are already\
    \ familiar with the basics of protocol oriented programming.\n\nFor the `IOTHome`\
    \ app, you must expose the following events to consumers of the `BluetoothService`\
    \ class:\n\n- Bluetooth connection state change\n- Door state change\n- Battery\
    \ level change\n\nFollowing these requirements, you can declare the `BluetoothServiceDelegate`\
    \ protocol, with the signature provided in Listing 6-11. This should go in a new\
    \ file named `BluetoothService.swift`. Bluetooth is a serial-based protocol, like\
    \ the RS-232 serial port of legacy computing, meaning it delivers data as a continuous\
    \ stream of bytes. Core Bluetooth exposes this data using the `Data` class. In\
    \ the Arduino solution, the state data was transmitted as string values, so you\
    \ can safely convert the input data from Core Bluetooth to `String` objects, to\
    \ make message passing easier. On a similar note, Core Bluetooth does not provide\
    \ a terse object to describe the state of a connection, so I defined the `ConnectionStatus`\
    \ enum to represent this.\n\n```\nenum ConnectionStatus {\n    case unknown\n\
    \    case scanning\n    case connecting\n    case connected\n    case disconnected\n\
    }\n\nprotocol BluetoothServiceDelegate: class {\n    func didUpdateConnection(status:\
    \ ConnectionStatus)\n    func didReceiveDoorUpdate(value: String)\n    func didReceiveBatteryUpdate(value:\
    \ String)\n}\n```\n\n**Listing 6-11** Declaration for `BluetoothServiceDelegate`\
    \ Protocol\n\nAlthough the protocol specifies the functions that will be used,\
    \ it does not perform any logic by itself. To implement the behavior for the `BluetoothServiceDelegate`\
    \ protocol, you must provide the method definitions in `BluetoothService.swift`,\
    \ as shown in Listing 6-12. The main points of this initial implementation include\
    \ convenience initializers, a stub for the `connect()` method, and `CBUUID` objects\
    \ to represent the Bluetooth LE service and characteristic UUIDs you will have\
    \ to interact with later.\n\n```\nimport Foundation\nimport CoreBluetooth\n\n\
    let doorServiceUUID = CBUUID(string: \"83b46845-6e9c-4b25-89cf-871cc74cc68e\"\
    )\nlet battServiceUUID = CBUUID(string: \"7d6925f3-6e19-48c6-a503-05585abe761e\"\
    )\nlet doorCharUUID = CBUUID(string: \"4b61d6b9-2e29-4fdf-a74a-7b8bf70ecd9a\"\
    )\nlet battCharUUID = CBUUID(string: \"8e628af6-0275-4f80-bb64-58f2b2771cba\"\
    )\n\nclass BluetoothService: NSObject {\n    let doorServices = [doorServiceUUID]\n\
    \    let doorCharacteristics = [doorCharUUID, battCharUUID]\n    weak var delegate:\
    \ BluetoothServiceDelegate?\n\n    convenience init(delegate: BluetoothServiceDelegate)\
    \ {\n        self.init()\n        self.delegate = delegate\n    }\n\n    private\
    \ override init() {\n        super.init()\n    }\n\n    func connect() {\n   \
    \     delegate?.didUpdateConnection(status: connectionStatus)\n    }\n}\n```\n\
    \n**Listing 6-12** Initial Definition for `BluetoothService` Class\n\nHaving declared\
    \ the `BluetoothService` class and its corresponding protocol, switch back to\
    \ `DoorViewController.swift`. As shown in Listing 6-13, create a property to represent\
    \ an instance of the `BluetoothService` class and instantiate it in the `viewDidLoad()`\
    \ method. To allow compilation to complete successfully, add a *stub* (blank)\
    \ extension of the `BluetoothServiceDelegate` protocol beneath the definition\
    \ for the `DoorViewController` class. In the `connect()` method you defined earlier\
    \ to represent the *Connect* button being pressed, call the corresponding method\
    \ from the `BluetoothService` class.\n\n```\nclass DoorViewController: UIViewController\
    \ {\n    ...\n    var bluetoothService: BluetoothService?\n\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n        ...\n        bluetoothService\
    \ = BluetoothService(delegate: self)\n    }\n\n    @IBAction func connect() {\n\
    \        bluetoothService?.connect()\n    }\n}\n\nextension DoorViewController:\
    \ BluetoothServiceDelegate {\n    func didReceiveDoorUpdate(value: String) {\n\
    \    }\n\n    func didReceiveBatteryUpdate(value: String) {\n    }\n\n    func\
    \ didUpdateConnection(status: ConnectionStatus) {\n    }\n}\n```\n\n**Listing\
    \ 6-13** Initial Implementation of the `BluetoothServiceDelegate` Protocol\n\n\
    Following the logical progression of the application, you should now begin to\
    \ develop the `connect()` method for the `BluetoothService` class. The `ConnectionState`\
    \ enum I provided earlier defines five states of a Bluetooth connection: `unknown`,\
    \ `scanning`, `connecting`, `connected`, and `disconnected`. During the `unknown`\
    \ and `disconnected` states, you can safely assume that the app does not have\
    \ a connection to a Bluetooth peripheral, so you can use these to begin the process\
    \ of scanning for a device. If the state is `connected` or `connecting`, you can\
    \ assume the user is attempting to establish a connection with a device, and this\
    \ is the cue to disconnect. Finally, the `scanning` state indicates that the app\
    \ is scanning for a device, and you can use this to stop scanning. In Listing\
    \ 6-14, I have included an initial implementation of the `connect()` method, which\
    \ updates the connection state, based on the previous one. To set the initial\
    \ state correctly, I have included a `connectionStatus` property in the class,\
    \ with a default value of `unknown`. As you progress in this section, you will\
    \ connect these state changes to `CoreBluetooth` API calls.\n\n```\nclass BluetoothService:\
    \ NSObject {\n    func connect() {\n        switch connectionStatus {\n      \
    \  case .unknown, .disconnected:\n            connectionStatus = .scanning\n \
    \       case .connected, .connecting:\n            connectionStatus = .disconnected\n\
    \        default:\n            connectionStatus = .disconnected\n        }\n \
    \       delegate?.didUpdateConnection(status: connectionStatus)\n    }\n}\n\n\
    extension DoorViewController: BluetoothServiceDelegate {\n    ...\n    func didUpdateConnection(status:\
    \ ConnectionStatus) {\n        switch status {\n        case .connecting:\n  \
    \          connectButton?.setTitle(\"Connecting\", for: .normal)\n        case\
    \ .connected:\n            connectButton?.setTitle(\"Disconnect\", for: .normal)\n\
    \        case .scanning:\n            connectButton?.setTitle(\"Scanning\", for:\
    \ .normal)\n        default:\n            connectButton?.setTitle(\"Connect\"\
    , for: .normal)\n        }\n    }\n}\n```\n\n**Listing 6-14** Initial Implementation\
    \ of the `connect()` Method"
  raw: '### Setting Up the App As a Central Manager


    With the rough user interface and capability permissions in place, you are now
    ready to begin scanning for Bluetooth devices from the IOTHome app. To follow
    the vocabulary of Bluetooth LE, in this section, you will enable the iOS app to
    act as a central manager and connect to the Arduino-based peripheral.


    To help keep the code manageable, you will wrap the Bluetooth operations into
    a class called `BluetoothService` . This will deliver state messages back to the
    class that instantiated it, via a protocol you will define, called `BluetoothServiceDelegate`
    . While it is possible to put everything into one file, the logic required to
    implement Bluetooth is a bit heavy, and sticking that many functions into one
    view controller will introduce the *Massive View Controller* anti-pattern many
    developers cite as a weakness in Apple’s Model-View-Controller architecture for
    iOS applications. The recent adoption of protocols as a way to alleviate this
    is called *Protocol Oriented Programming* . It gives you an easy path to split
    up code, by defining key behaviors in protocols and grouping the implementations
    via *extensions*. If you have ever used extensions before to add functionality
    to classes or split up large delegate-based APIs (such as `UITableViewDelegate`),
    you are already familiar with the basics of protocol oriented programming.


    For the IOTHome app, you must expose the following events to consumers of the
    `BluetoothService` class :


    *   Bluetooth connection state change


    *   Door state change


    *   Battery level change


    Following these requirements, you can declare the `BluetoothServiceDelegate` protocol,
    with the signature provided in Listing [6-11](#346879_2_En_6_Chapter.xhtml#PC11).
    This should go in a new file named `BluetoothService.swift`. Bluetooth is a serial-based
    protocol, like the RS-232 serial port of legacy computing, meaning it delivers
    data as a continuous stream of bytes. Core Bluetooth exposes this data using the
    `Data` class. In the Arduino solution, the state data was transmitted as string
    values, so you can safely convert the input data from Core Bluetooth to `String`
    objects, to make message passing easier. On a similar note, Core Bluetooth does
    not provide a terse object to describe the state of a connection, so I defined
    the `ConnectionStatus` enum to represent this.


    ```

    enum ConnectionStatus {

    case unknown

    case scanning

    case connecting

    case connected

    case disconnected

    }

    protocol BluetoothServiceDelegate: class {

    func didUpdateConnection(status: ConnectionStatus)

    func didReceiveDoorUpdate(value: String)

    func didReceiveBatteryUpdate(value: String)

    }

    Listing 6-11

    Declaration for BluetoothServiceDelegate Protocol

    ```


    Although the protocol specifies the functions that will be used, it does not perform
    any logic by itself. To implement the behavior for the `BluetoothServiceDelegate`
    protocol, you must provide the method definitions in `BluetoothService.swift`,
    as shown in Listing [6-12](#346879_2_En_6_Chapter.xhtml#PC12). The main points
    of this initial implementation include convenience initializers, a stub for the
    `connect()` method, and `CBUUID` objects to represent the Bluetooth LE service
    and characteristic UUIDs you will have to interact with later.


    ```

    import Foundation

    import CoreBluetooth

    let doorServiceUUID = CBUUID(string: "83b46845-6e9c-4b25-89cf-871cc74cc68e")

    let battServiceUUID = CBUUID(string: "7d6925f3-6e19-48c6-a503-05585abe761e")

    let doorCharUUID = CBUUID(string: "4b61d6b9-2e29-4fdf-a74a-7b8bf70ecd9a")

    let battCharUUID = CBUUID(string: "8e628af6-0275-4f80-bb64-58f2b2771cba")

    class BluetoothService: NSObject {

    let doorServices = [doorServiceUUID]

    let doorCharacteristics = [doorCharUUID,

    battCharUUID]

    weak var delegate: BluetoothServiceDelegate?

    convenience init(delegate:

    BluetoothServiceDelegate) {

    self.init()

    self.delegate = delegate

    }

    private override init() {

    super.init()

    }

    func connect() {

    delegate?.didUpdateConnection(status: connectionStatus)

    }

    }

    Listing 6-12

    Initial Definition for BluetoothService Class

    ```


    Having declared the `BluetoothService` class and its corresponding protocol, switch
    back to `DoorViewController.swift`. As shown in Listing [6-13](#346879_2_En_6_Chapter.xhtml#PC13),
    create a property to represent an instance of the `BluetoothService` class and
    instantiate it in the `viewDidLoad()` method. To allow compilation to complete
    successfully, add a *stub* (blank) extension of the `BluetoothServiceDelegate`
    protocol beneath the definition for the `DoorViewController` class. In the `connect()`
    method you defined earlier to represent the *Connect* button being pressed, call
    the corresponding method from the `BluetoothService` class.


    ```

    class DoorViewController: UIViewController {

    ...

    var bluetoothService: BluetoothService?

    override func viewDidLoad() {

    super.viewDidLoad()

    ...

    bluetoothService = BluetoothService(delegate: self)

    }

    @IBAction func connect() {

    bluetoothService?.connect()

    }

    }

    extension DoorViewController: BluetoothServiceDelegate {

    func didReceiveDoorUpdate(value: String) {

    }

    func didReceiveBatteryUpdate(value: String) {

    }

    func didUpdateConnection(status: ConnectionStatus) {

    }

    }

    Listing 6-13

    Initial Implementation of the BluetoothServiceDelegate Protocol

    ```


    Following the logical progression of the application, you should now begin to
    develop the `connect()` method for the `BluetoothService` class. The `ConnectionState`
    enum I provided earlier defines five states of a Bluetooth connection: `unknown`,
    `scanning`, `connecting`, `connected`, and `disconnected`. During the `unknown`
    and `disconnected` states, you can safely assume that the app does not have a
    connection to a Bluetooth peripheral, so you can use these to begin the process
    of scanning for a device. If the state is `connected` or `connecting`, you can
    assume the user is attempting to establish a connection with a device, and this
    is the cue to disconnect. Finally, the `scanning` state indicates that the app
    is scanning for a device, and you can use this to stop scanning. In Listing [6-14](#346879_2_En_6_Chapter.xhtml#PC14),
    I have included an initial implementation of the `connect()` method, which updates
    the connection state, based on the previous one. To set the initial state correctly,
    I have included a `connectionStatus` property in the class, with a default value
    of `unknown`. As you progress in this section, you will connect these state changes
    to `CoreBluetooth` API calls.


    ```

    class BluetoothService: NSObject{

    func connect() {

    switch connectionStatus {

    case .unknown, .disconnected :

    connectionStatus = .scanning

    case .connected, .connecting:

    connectionStatus = .disconnected

    default:

    connectionStatus = .disconnected

    }

    delegate?.didUpdateConnection(status: connectionStatus)

    }

    }

    extension DoorViewController: BluetoothServiceDelegate {

    ...

    func didUpdateConnection(status: ConnectionStatus) {

    switch status {

    case .connecting:

    connectButton?.setTitle("Connecting", for: .normal)

    case .connected:

    connectButton?.setTitle("Disconnect", for: .normal)

    case .scanning:

    connectButton?.setTitle("Scanning", for: .normal)

    default:

    connectButton?.setTitle("Connect", for: .normal)

    }

    }

    }

    Listing 6-14

    Initial Implementation of the connect() Method

    ```'
  trans: "\n# 将 App 设置为中央管理器\n\n有了基本的用户界面和权限配置，现在你可以从 `IOTHome` app 开始扫描蓝牙设备。遵循低功耗蓝牙的术语，在本节中，你将让\
    \ iOS app 扮演中央管理器的角色，并连接到基于 Arduino 的外围设备。\n\n为了让代码更易于管理，你将把蓝牙操作封装到一个名为 `BluetoothService`\
    \ 的类中。该类将通过一个你即将定义的名为 `BluetoothServiceDelegate` 的协议，将状态消息传回实例化它的类。虽然将所有内容放在一个文件中是可行的，但实现蓝牙所需的逻辑较为繁重，将众多函数塞入一个视图控制器会引入*巨型视图控制器*反模式，许多开发者认为这是苹果\
    \ iOS 应用 Model-View-Controller 架构的弱点。最近，采用协议来缓解这一问题的方法被称为*面向协议编程*。它提供了一种简便的方式拆分代码，通过在协议中定义关键行为，并通过*扩展*将实现分组。如果你曾使用扩展为类添加功能，或拆分过基于委托的大型\
    \ API（例如 `UITableViewDelegate`），那么你就已经熟悉面向协议编程的基础知识了。\n\n对于 `IOTHome` app，你必须向\
    \ `BluetoothService` 类的使用者暴露以下事件：\n\n- 蓝牙连接状态变化\n- 门状态变化\n- 电池电量变化\n\n根据这些需求，你可以声明\
    \ `BluetoothServiceDelegate` 协议，其签名如代码清单 6-11 所示。该协议应放在名为 `BluetoothService.swift`\
    \ 的新文件中。蓝牙是一种基于串行的协议，类似于传统计算中的 RS-232 串口，这意味着它作为连续的字节流来传递数据。Core Bluetooth 使用\
    \ `Data` 类来暴露这些数据。在 Arduino 方案中，状态数据以字符串值的形式传输，因此你可以安全地将来自 Core Bluetooth 的输入数据转换为\
    \ `String` 对象，以便更轻松地进行消息传递。类似地，Core Bluetooth 没有提供简洁的对象来描述连接状态，因此我定义了 `ConnectionStatus`\
    \ 枚举来表示它。\n\n```\nenum ConnectionStatus {\n    case unknown\n    case scanning\n\
    \    case connecting\n    case connected\n    case disconnected\n}\n\nprotocol\
    \ BluetoothServiceDelegate: class {\n    func didUpdateConnection(status: ConnectionStatus)\n\
    \    func didReceiveDoorUpdate(value: String)\n    func didReceiveBatteryUpdate(value:\
    \ String)\n}\n```\n\n**代码清单 6-11** `BluetoothServiceDelegate` 协议的声明\n\n尽管协议指定了将要使用的方法，但它本身并不执行任何逻辑。为了实现\
    \ `BluetoothServiceDelegate` 协议的行为，你必须在 `BluetoothService.swift` 中提供方法定义，如代码清单\
    \ 6-12 所示。这一初始实现的主要内容包括便捷初始化器、`connect()` 方法的桩代码，以及用于表示你需要与之交互的蓝牙低功耗服务和特征 UUID\
    \ 的 `CBUUID` 对象。\n\n```\nimport Foundation\nimport CoreBluetooth\n\nlet doorServiceUUID\
    \ = CBUUID(string: \"83b46845-6e9c-4b25-89cf-871cc74cc68e\")\nlet battServiceUUID\
    \ = CBUUID(string: \"7d6925f3-6e19-48c6-a503-05585abe761e\")\nlet doorCharUUID\
    \ = CBUUID(string: \"4b61d6b9-2e29-4fdf-a74a-7b8bf70ecd9a\")\nlet battCharUUID\
    \ = CBUUID(string: \"8e628af6-0275-4f80-bb64-58f2b2771cba\")\n\nclass BluetoothService:\
    \ NSObject {\n    let doorServices = [doorServiceUUID]\n    let doorCharacteristics\
    \ = [doorCharUUID, battCharUUID]\n    weak var delegate: BluetoothServiceDelegate?\n\
    \n    convenience init(delegate: BluetoothServiceDelegate) {\n        self.init()\n\
    \        self.delegate = delegate\n    }\n\n    private override init() {\n  \
    \      super.init()\n    }\n\n    func connect() {\n        delegate?.didUpdateConnection(status:\
    \ connectionStatus)\n    }\n}\n```\n\n**代码清单 6-12** `BluetoothService` 类的初始定义\n\
    \n声明了 `BluetoothService` 类及其对应的协议后，切换回 `DoorViewController.swift`。如代码清单 6-13 所示，创建一个属性来表示\
    \ `BluetoothService` 类的实例，并在 `viewDidLoad()` 方法中实例化它。为了确保编译成功，在 `DoorViewController`\
    \ 类的定义下方添加 `BluetoothServiceDelegate` 协议的*桩代码*（空扩展）。在你之前定义的表示点击*连接*按钮的 `connect()`\
    \ 方法中，调用 `BluetoothService` 类中对应的方法。\n\n```\nclass DoorViewController: UIViewController\
    \ {\n    ...\n    var bluetoothService: BluetoothService?\n\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n        ...\n        bluetoothService\
    \ = BluetoothService(delegate: self)\n    }\n\n    @IBAction func connect() {\n\
    \        bluetoothService?.connect()\n    }\n}\n\nextension DoorViewController:\
    \ BluetoothServiceDelegate {\n    func didReceiveDoorUpdate(value: String) {\n\
    \    }\n\n    func didReceiveBatteryUpdate(value: String) {\n    }\n\n    func\
    \ didUpdateConnection(status: ConnectionStatus) {\n    }\n}\n```\n\n**代码清单 6-13**\
    \ `BluetoothServiceDelegate` 协议的初始实现\n\n根据应用的逻辑流程，你现在应该开始为 `BluetoothService`\
    \ 类开发 `connect()` 方法。我之前提供的 `ConnectionState` 枚举定义了蓝牙连接的五个状态：`unknown`、`scanning`、`connecting`、`connected`\
    \ 和 `disconnected`。在 `unknown` 和 `disconnected` 状态下，可以安全地认为应用未连接到蓝牙外围设备，因此可以利用这些状态开始扫描设备。如果状态是\
    \ `connected` 或 `connecting`，可以认为用户正在尝试与设备建立连接，这是断开连接的信号。最后，`scanning` 状态表示应用正在扫描设备，你可以利用它来停止扫描。在代码清单\
    \ 6-14 中，我包含了 `connect()` 方法的初始实现，该方法根据前一个状态来更新连接状态。为了正确设置初始状态，我在类中添加了一个 `connectionStatus`\
    \ 属性，默认值为 `unknown`。随着本节内容的深入，你将把这些状态变化连接到 `CoreBluetooth` API 调用。\n\n```\nclass\
    \ BluetoothService: NSObject {\n    func connect() {\n        switch connectionStatus\
    \ {\n        case .unknown, .disconnected:\n            connectionStatus = .scanning\n\
    \        case .connected, .connecting:\n            connectionStatus = .disconnected\n\
    \        default:\n            connectionStatus = .disconnected\n        }\n \
    \       delegate?.didUpdateConnection(status: connectionStatus)\n    }\n}\n\n\
    extension DoorViewController: BluetoothServiceDelegate {\n    ...\n    func didUpdateConnection(status:\
    \ ConnectionStatus) {\n        switch status {\n        case .connecting:\n  \
    \          connectButton?.setTitle(\"Connecting\", for: .normal)\n        case\
    \ .connected:\n            connectButton?.setTitle(\"Disconnect\", for: .normal)\n\
    \        case .scanning:\n            connectButton?.setTitle(\"Scanning\", for:\
    \ .normal)\n        default:\n            connectButton?.setTitle(\"Connect\"\
    , for: .normal)\n        }\n    }\n}\n```\n\n**代码清单 6-14** `connect()` 方法的初始实现\n"
- fmt: '# For the IOTHome App – Bluetooth Central Manager Setup


    For the IOTHome app, the only Bluetooth role the `BluetoothService` class must
    provide is that of a central manager. You can accomplish this via the `CBCentralManager`
    class. To use it in your program, you must instantiate a `CBCentralManager` object
    and set its delegate. In Listing [6-15](#346879_2_En_6_Chapter.xhtml#PC15), I
    have added this object as a property to the class and provided stubs for the `CBCentralManagerDelegate`
    protocol methods you must use in this project.


    ```

    class BluetoothService: NSObject {

    ...

    weak var delegate: BluetoothServiceDelegate?

    var centralManager: CBCentralManager?

    ...

    private override init() {

    super.init()

    centralManager = CBCentralManager.init(delegate: self,

    queue: nil)

    }

    }

    extension BluetoothService: CBCentralManagerDelegate {

    func centralManagerDidUpdateState(_ central:

    CBCentralManager) {

    }

    func centralManager(_ central: CBCentralManager,

    didDiscover peripheral: CBPeripheral, advertisementData:

    [String: Any], rssi RSSI: NSNumber) {

    }

    func centralManager(_ central: CBCentralManager, didConnect

    peripheral: CBPeripheral) {

    }

    }

    Listing 6-15

    Initializing a CBCentralManager Object

    ```


    ## Connecting to a Bluetooth LE Peripheral


    Now that the `CBCentralManager` object is initialized correctly, you are ready
    to establish a connection to a Bluetooth LE peripheral. To begin, update the `connect()`
    method, as shown in Listing [6-16](#346879_2_En_6_Chapter.xhtml#PC16), to start
    or stop scanning for what state the app is in when the Connect button is pressed.


    ```

    class BluetoothService: NSObject {

    ...

    var centralManager: CBCentralManager?

    var connectedPeripheral: CBPeripheral?

    ...

    func connect() {

    switch connectionStatus {

    case .unknown, .disconnected :

    centralManager?.scanForPeripherals(withServices:

    nil, options: nil)

    connectionStatus = .scanning

    case .connected, .connecting:

    if let connectedPeripheral = connectedPeripheral {

    centralManager?.cancelPeripheralConnection(

    connectedPeripheral)

    connectionStatus = .disconnected

    }

    default:

    centralManager?.stopScan()

    connectionStatus = .disconnected

    }

    delegate?.didUpdateConnection(status: connectionStatus)

    }

    }

    Listing 6-16

    Starting or Stopping Scanning for Bluetooth LE Peripherals

    ```


    You initiate the scan by calling the `scanForPeripherals(withServices:options:)`
    method on your Central Manager object. You can specify UUIDs to filter by, but
    in my experience, this makes scanning for devices harder, if your advertising
    code is not set up correctly on the Arduino, so I have omitted it in this example.
    Stopping scanning is equally easy, as it simply requires you to call the `stopScan()`
    method. To disconnect, you must call `cancelPeripheralConnection()` with a saved
    `CBPeripheral` object, which you will have after completing the connection.


    When your Central Manager has found Bluetooth LE peripherals, it will reply back
    with your implementation of the `centralManager(didDiscover:advertisementData:RSSI:)`
    method. This method returns a `CBPeripheral` object for each device it finds,
    including the device’s name and services from its advertising data. After you
    have identified the device you want to connect to, you should save its `CBPeripheral`
    object and attempt to connect to it. In Listing [6-17](#346879_2_En_6_Chapter.xhtml#PC17),
    I have updated the `BluetoothService` class’s implementation of the `centralManager(didDiscover:advertisementData:RSSI:)`
    method, to save the device that matches the name "IOTHome" to a property in this
    class, and then try to connect to it.


    ```

    extension BluetoothService: CBCentralManagerDelegate {

    ...

    func centralManager(_ central: CBCentralManager,

    didDiscover peripheral: CBPeripheral, advertisementData:

    [String: Any], rssi RSSI: NSNumber) {

    if peripheral.name == "IOTDoor" {

    self.connectedPeripheral = peripheral

    self.connectedPeripheral?.delegate = self

    centralManager?.connect(peripheral, options: nil)

    }

    }

    ...

    }

    Listing 6-17

    Discovering and Saving a Bluetooth LE Peripheral

    ```


    While it would be ideal to start using the peripheral after finding it, there
    is still a bit more effort required to retrieve data from the device. Once the
    connection is established, the `centralManager(didConnect:)` method will fire.
    Inside this method, you must begin scanning for the services you want to use on
    the peripheral (door and battery status). After you have connected to the IOTHome
    peripheral, you no longer have to scan for devices, so you should tell the Central
    Manager to stop scanning and update the status of the connection status property
    for the `BluetoothService` class.


    Similar to the `CBCentralManager`, the `CBPeripheral` sends its updates back through
    delegate methods. In Listing [6-18](#346879_2_En_6_Chapter.xhtml#PC18), I have
    updated the `BluetoothService` class to include the completed `centralManager(didConnect:)`
    method and a stub for the `CBPeripheralDelegate` protocol.


    ```

    extension BluetoothService: CBCentralManagerDelegate {

    func centralManagerDidUpdateState(_ central:

    CBCentralManager) {

    switch(central.state) {

    case .poweredOn:

    NSLog("It''s showtime")

    default:

    NSLog("Device is not ready")

    }

    }

    ...

    func centralManager(_ central: CBCentralManager, didConnect

    peripheral: CBPeripheral) {

    central.stopScan()

    connectedPeripheral?.discoverServices(doorServices)

    self.connectionStatus = .connecting

    delegate?.didUpdateConnection(status: connectionStatus)

    }

    }

    extension BluetoothService: CBPeripheralDelegate {

    func peripheral(_ peripheral: CBPeripheral,

    didDiscoverServices error: Error?) {

    }

    func peripheral(_ peripheral: CBPeripheral,

    didDiscoverCharacteristicsFor service: CBService,

    error: Error?) {

    }

    func peripheral(_ peripheral: CBPeripheral,

    didUpdateValueFor characteristic: CBCharacteristic,

    error: Error?) {

    }

    }

    Listing 6-18

    Sending Updates After Connecting to a Peripheral

    ```


    After connecting to the device, the `CBPeripheral` object will respond with the
    services it has discovered. Reflecting on the hierarchical nature of Bluetooth
    LE communication, after finding the services, you must inquire about the characteristics
    they reveal. As shown in Listing [6-19](#346879_2_En_6_Chapter.xhtml#PC19), this
    is accomplished by calling `discoverCharacteristics()` on the `CBPeripheral` object.


    ```

    extension BluetoothService: CBPeripheralDelegate {

    func peripheral(_ peripheral: CBPeripheral,

    didDiscoverServices error: Error?) {

    guard let services = peripheral.services

    else { return }

    for service in services {

    peripheral.discoverCharacteristics(

    doorCharacteristics, for: service)

    }

    }

    func peripheral(_ peripheral: CBPeripheral,

    didDiscoverCharacteristicsFor service: CBService, error:

    Error?) {

    self.connectionStatus = .connected

    delegate?.didUpdateConnection(status: connectionStatus)

    }

    ...

    }

    Listing 6-19

    Interrogating Services and Characteristics for a Bluetooth LE Peripheral

    ```


    For now, inside the `peripheral(didDiscoverCharacteristicsFor:error:)` method,
    you can set the connection state to connected and notify the `BluetoothService`
    delegate that the connection has been established.'
