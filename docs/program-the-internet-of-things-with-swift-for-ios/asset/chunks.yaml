    Adding a Shadow Under a View with Rounded Corners

    ```


    ### Note


    The `frame` property of a `UIView` includes its x and y positions. The `bounds`
    property sets these to (0,0). When adding a sub-view to a view, try to use `bounds`.
    When copying or moving a view, try to use `frame`.


