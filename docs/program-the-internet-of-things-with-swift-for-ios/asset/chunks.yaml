    use the framework. The primary class for accessing HealthKit from your applications
    is `HKHealthStore`. Similar to the manager objects from Core Motion, you instantiate
    an instance of the class and make calls to HealthKit through that. Unlike Core
    Motion, there is a hard requirement from Apple that you only create one instance
    of the class in your application. For this purpose, the most appropriate place
    to put the `HKHealthStore` object would be in the `WorkoutDataManager` singleton.
