    ```


    When adopting a permission-based feature, try to design your app to provide value
    to the user, even when the desired feature is disabled. In the case of motion
    permission, I did not prevent the user from starting a workout, but I did set
    the `isMotionAvailable` flag in the `CreateWorkoutViewController` class to `false`,
    so that I could disable hooks for motion-based features later in the class.


    Finally, to make the permission prompt appear, you must attempt to collect data
    through a `CoreMotion` API. Because one of the goals of this third iteration of
    IOTFit is to add step counting, you can trigger the motion permission by initiating
    a request for pedometer updates. As you may have figured out from Listing [3-1](#346879_2_En_3_Chapter.xhtml#PC1),
    the class that manages the pedometer on iOS is `CMPedometer`. To initiate a request
    for pedometer updates, initialize a `CMPedometer` object and call the `startUpdates(from:withHandler:)`
    method on that object, specifying a start date and completion handler. In Listing
    [3-2](#346879_2_En_3_Chapter.xhtml#PC2), I have updated the `CreateWorkoutViewController`
    class to include this logic. The response to the request is initiated from the
    `startWorkout()` method.


    ```swift

