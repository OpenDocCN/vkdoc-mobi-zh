  raw: '#### Implementing File I/O


    iOS is famous for keeping apps in sandboxes, meaning that apps can only access
    and manage resources (such as files) within a space for that app alone, with a
    few exceptions allowed by Apple. One of the most common ways developers work with
    this sandbox is by creating files in the `Documents` folder of the app bundle
    at runtime. For the IOTFit app, you will do the same. Workouts will be stored
    in a property-list file named `Workouts.plist`.


    One of the challenges of working with the `Documents` folder of your app is that
    you must find its file path at runtime. Every time your app is installed, it will
    be created in a unique folder generated by iOS. To help manage this, I have added
    logic in Listing [2-16](#346879_2_En_2_Chapter.xhtml#PC17) that looks up the path
    for IOTFit’s `Documents` folder at runtime and appends the `Workouts.plist` file
    name to the end.


    ```

    class WorkoutDataManager {

    ...

    private var workoutsFileUrl: URL? {

    guard let documentsUrl = documentsDirectoryUrl() else {

    return nil

    }

    return documentsUrl.appendingPathComponent(

    "Workouts.plist")

    }

    func documentsDirectoryUrl() -> URL? {

    let fileManager = FileManager.default

    return fileManager.urls(for: .documentDirectory, in:

    .userDomainMask).first

    }

    }

    Listing 2-16

    Finding a File Path in an App’s Documents Directory at Runtime

    ```


    The `FileManager` class is primarily used to do manual file I/O; however, it comes
    with convenient helper methods to help manage your program’s sandbox. You may
    have also noticed that I used the `guard-let` pattern here. For times when you
    must stop execution of a block after a condition fails, `guard-let` is a perfect
    choice. It also helps increase readability, as subsequent logic is nested in fewer
    chained `if-let` statements.


    To load the data, you must create a `Decoder`. This is an object that uses one
    of Apple’s pre-built file interfaces (or one you write yourself) and your `Codable`-compatible
    data type to map the data in the file to something you can use in your app. In
    Listing [2-17](#346879_2_En_2_Chapter.xhtml#PC18), I have added the `loadFromPlist()`
    method to handle this operation, and a call to the method in the custom initializer.
    To keep data in sync, the first operation you should do after initializing the
    `WorkoutDataManager` class is load past data.


    ```

    class WorkoutDataManager {

    ...

    private init() {

    print("Singleton initialized")

    loadFromPlist()

    }

    ...

    func loadFromPlist() {

    workouts = [Workout]()

    guard let fileUrl = workoutsFileUrl else {

    return

    }

    do {

    let workoutData = try Data(contentsOf: fileUrl)

    let decoder = PropertyListDecoder()

    workouts = try decoder.decode(Workouts.self, from:

    workoutData)

    } catch {

    NSLog("Error reading plist")

    }

    }

    }

    Listing 2-17

    Loading Data from a Property-List Using PropertyListDecoder

    ```


    Writing to a file is a very similar process, except rather than using a decoder,
    you use an encoder to read the contents of a file. To handle saving to files,
    add the `saveToList()` method to the `WorkoutDataManager` class, as shown in Listing
    [2-18](#346879_2_En_2_Chapter.xhtml#PC19).


    ```

    class WorkoutDataManager {

    ...

    func saveToPlist() {

    guard let fileUrl = workoutsFileUrl else {

    return

    }

    let encoder = PropertyListEncoder()

    encoder.outputFormat = .xml

    do {

    let workoutData = try encoder.encode(workouts)

    try workoutData.write(to: fileUrl)

    } catch {

    NSLog("Error writing plist")

    }

    }

    }

    Listing 2-18

    Writing to a Property-List Using PropertyListEncoder

    ```


    #### Using the map() Method to Serialize Data


    The final tasks you must perform to complete the Workout Data Manager are the
    interfaces to Create Workout View Controller and Workout Map View Controller.
    These include the operations required to create a workout, close a workout, append
    locations to a workout, and retrieve the most recent workout. These View Controllers
    receive their data from the Core Location framework as `CLLocation` objects, so
    you will also have to add some logic to convert from `CLLocation` to the `Coordinate`
    data type you created in this section. Luckily, this is where the `map()` higher-order
    function (method) that was introduced in Swift 3.0 comes in


    As with prior examples, before thinking about the details of implementation, think
    about how the user interface will need to connect to the workout life-cycle logic.
    When you start a new workout, you will have to create a new workout. Every time
    Core Location detects a new location, you will have to append it to the current
    workout. When you finish a workout, you should close the current workout and save
    it. Finally, when the map appears, you should load the last saved workout. In
    Listing [2-19](#346879_2_En_2_Chapter.xhtml#PC20), I have modified the `CreateWorkoutViewController`
    class to include these calls, based on the information each method has when it
    is called.


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    func startWorkout() {

    ...

    locationManager.startUpdatingLocation()

    lastSavedTime = Date()

    WorkoutDataManager.sharedManager.createNewWorkout()

    }

    ...

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    case .inactive:

    requestLocationPermission()

    case .active:

    currentWorkoutState = .inactive

    stopWorkoutTimer()

    WorkoutDataManager.sharedManager.saveWorkout(

    duration: workoutDuration)

    default:

    NSLog("toggleWorkout() called out of

    context!")

    }

    updateUserInterface()

    }

    ...

    }

    extension CreateWorkoutViewController: CLLocationManagerDelegate {

    ...

    func locationManager(_ manager:CLLocationManager,

    didUpdateLocations locations: [CLLocation]) {

    guard let mostRecentLocation = locations.last

    else{

    return

    }

    ...

    WorkoutDataManager.sharedManager.addLocation(coordinate:

    mostRecentLocation.coordinate)

    }

    }

    Listing 2-19

    Interacting with the WorkoutDataManager Class from the Create Workout View Controller

    ```


    To manage the coordinate data for an active workout, add a property that holds
    an array of `CLLocationCoordinate2D` objects to the `WorkoutDataManager` class.
    When a workout is reset, clear the array. When a location update is posted, append
    the latest location to the array. In Listing [2-20](#346879_2_En_2_Chapter.xhtml#PC21),
    I have updated the `WorkoutDataManager` class to include this logic. The `CLLocationCoordinate2D`
    class is a good way to get coordinate information from a `CLLocation` object without
    requiring too much extra code.


    ```

    import Foundation

    import CoreLocation

    ...

    class WorkoutDataManager {

    static let sharedManager = WorkoutDataManager()

    private var workouts: Workouts?

    private var activeLocationss: [CLLocationCoordinate2D]?

    ...

    func createNewWorkout() {

    activeLocations = [CLLocationCoordinate2D]()

    }

    func addLocation(coordinate: CLLocationCoordinate2D) {

    activeLocations?.append(coordinate)

    }

    ...

    }

    Listing 2-20

    Adding Active Workout Location Management to the WorkoutDataManager Class

    ```'
