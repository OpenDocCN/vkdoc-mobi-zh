    class NetworkManager: NSObject {

    static let shared = NetworkManager(urlString:

    "https://raspberrypi.local")

    let baseUrl: URL

    init(urlString: String) {

    guard let baseUrl = URL(string: urlString) else {

    fatalError("Invalid URL string")

    }

    self.baseUrl = baseUrl

    }

    }

    ```


    `Listing 8-16`

    Initial implementation of `NetworkManager` as a Singleton


    Singletons are a contentious subject in the Apple developer community, owing to
    their nature of being shared globally, but for this chapter, a singleton is a
    convenient choice, because there are no side effects, and I want to re-create
    Apple’s approach to accessing hardware APIs (using a single object throughout
    iOS to manage one resource, for example, GPS, camera). If you are interested in
    alternatives to singletons, I recommend researching dependency injection. Dependency
    injection is not a first-class design pattern from Apple, so you should exercise
    some caution in picking a library or implementation that suits your application.


    Singletons are implemented in Swift by adding a static property to an object,
    which returns an initialized instance of that class. If the object was initialized
    before, the existing object will be returned; otherwise, a new object will be
    initialized. This is referred to as *lazy-loading*. For my initializer, all I
    needed to do was initialize the class with the base URL for the network requests.
    For the base URL, use the Bonjour name of the device, as I did in my example.
    As of this writing, Raspbian ships with Bonjour enabled by default. Bonjour allows
    Apple devices to find devices on a network by their domain name, instead of an
    IP address.


    For the network implementation, start with the simplest end point first (temperature).
    To query the temperature, all you have to do is make a `GET` request to the `/temperature`
    end point. In iOS, this operation is accomplished using the `URLSession` class.
    Just like the `NetworkManager`, this object is a singleton. The `URLSession` class
    exposes network operations in three main categories: data tasks, upload tasks,
    and download tasks. As the names suggest, upload and download tasks are intended
    for long-running file uploads or downloads. For short-running operations, such
    as web server API calls, data task is the most appropriate operation to use. Because
    all of the API responses from the Raspberry Pi return JSON data, you can wrap
    the network calls in a single method. In Listing [8-17](#346879_2_En_8_Chapter.xhtml#PC30),
    I have created the base method for these calls: `request(endpoint:httpMethod:completion:)`.
    As does its parameters, it takes the end point extension and string representing
    the method types, and it returns a JSON dictionary containing the response from
    the server (or an error).'
