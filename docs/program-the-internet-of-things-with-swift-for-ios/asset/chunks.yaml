    \n*谨以此书献给我的母亲 Layla Bakir，她让我懂得了对教学的热爱和持久的乐观*\n\n# 引言\n\n欢迎回到物联网世界。2016 年，我与最初的合著者\
    \ Gheorghe Chesler 和 Manny de la Torriente 共同撰写本书第一版时，我们将职业生涯、咨询项目及梦想中的收获融汇在一起，希望构建一个能帮助未来开发者使用\
    \ Swift 为 iOS 编写物联网应用的故事架构。如今浏览 Apress 网站，发现仅通过该网站就有超过三万人阅读了本书，我很高兴至少触及了部分读者！\n\
    \n然而，时间在向前推进。自第一版出版以来，Swift 和物联网都经历了巨大演变。我们最初想写的一些技术终于成为现实，而另一些则已被淘汰。最重要的是，Swift\
    \ 作为一种语言终于开始趋于稳定，开发者社区也逐步建立起一套更清晰、适合该语言的设计模式和编码标准。除了最初版本中的 Swift 版本（2.0）与现代语言版本不兼容之外，彻底修订本书的时机也已成熟。\n\
    \n本版在回顾第一版中备受喜爱的内容与呈现上一版未涉及的新概念之间取得了平衡。我删减或精简了那些逐渐消沉的内容，并大幅扩展了那些被证明比以往更重要的部分。特别是，本书增加了更多关于构建硬件项目的内容，因为高质量、价格合理的零部件已迅速普及，且使用难度也大幅降低。此外，我注意到，总体上有更多人希望自行构建硬件及其配套的应用。\n\
    \n同时，我努力让本版内容更便于更多读者理解。虽然我写的每一本书都面向具备 iOS 开发基础知识的开发者，但本卷我调整了格式，以反映在教学和与读者交流中收到的反馈。也就是说，本版允许你在不同主题间更灵活地跳跃，并提供了更详细的逐步指导。我不再仅仅提供可复制的代码，而是尝试解释完成项目中每个任务所需整合的内容。希望这能让你更轻松地调试问题，并使本书在最初编写时所针对的\
    \ Swift 版本（Swift 4.2）之后仍能持续使用。\n\n虽然无法用一段话全面描述物联网，但本书聚焦于如何构建、交互及联网硬件传感器，从而让用户的生活更便捷、信息更丰富。在家中，我可以用语音关闭灯光，判断是否在电价过高时使用电器，以及确认泡茶水温是否完美（温度确实完美，但我需要记得在定时器响起时起身）。在本书中，你将实现的项目包括更精准地记录锻炼情况、确认是否锁门，以及在\
    \ Apple TV 上展示家庭仪表盘。对于 DIY 项目来说，这相当酷！\n\n最后，请记住，这本书为你而存在。写作的最终目标是帮助你及开发者社区更深入地理解与\
    \ iOS 相关的物联网开发，并为你未来的项目提供丰富的灵感。如果你希望确保代码保持更新，请向本书的 GitHub 仓库提交拉取请求（[`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)）。如有任何反馈，我期待通过\
    \ Apress 或我的网站（[`www.devatelier.com`](http://www.devatelier.com)）收到。祝编程愉快！\n\n\
    # 致谢\n\n每位作者写书都是为了讲述故事，无论是为了娱乐、教育，还是为读者提供介于两者之间的体验。经过过去几年的写作，我意识到写作过程本身也构成了一个故事。本书的写作过程比前两本更为曲折，但在此，我想感谢所有参与其中的各位。\n\
    \n首先，我要感谢我的编辑 Jessica Vakili 和 Aaron Black，他们非凡的耐心和支持使我得以完成这部作品。我真诚地为可能给你们带来的任何麻烦道歉，但我为我们共同创作出的成果感到自豪。\n\
    \n接下来，我要感谢本书第一版的原合著者 Gheorghe Chesler 和 Manny de la Torriente。除了共同写作，我们在协作中的经历极大地塑造了我作为开发者的成长，并留下了许多至今仍令我怀念的美好回忆。第一版始终是我引以为傲的作品，尤其是我们在\
    \ Swift 和物联网仍充满不确定性的时代完成了它！\n\n最后，我必须感谢我杰出的家人和朋友，他们一直支持我，甚至包容我移居日本的疯狂冒险。他们帮助我意识到自己正在追寻新的挑战，并不断鼓励我坚持克服其中的每一个困难。谢谢大家！\n\
    \n对所有我可能遗漏的人，请别忘了“花之飞鸟组”的传奇，我很快会回来，与你们在博纳旺蒂尔展开下一次冒险！\n\n## 关于作者与技术审稿人\n\n### 关于作者\n\
    \n### 关于技术审稿人\n\n# 第一部分：为物联网构建健康应用\n"
- fmt: '# Laying the Foundation for Your First IoT App


    Before taking you on a deep dive into Apple’s Internet of Things (IoT) technologies,
    I thought it would be useful to begin with a brief introduction to some of the
    tools and workflows you will use throughout the book to build your projects. In
    this book, your primary tools for building IoT apps will be the Xcode Integrated
    Development Environment from Apple and its `Interface Builder` tool for building
    user interfaces. When teaching iOS development, I always notice that both novice
    and experienced developers find these tools to encompass some of the most challenging
    concepts to master, even more than `Swift` or the eccentricities of any framework.


    To practice using Xcode, in this chapter, you will begin developing your first
    IoT app for iOS: `IOTFit`, a workout app that uses the location services (GPS)
    on a user’s phone to help them keep track of how long they exercised and where.
    If you are an avid user of such workout apps as `Runkeeper` or `Nike Plus`, you
    will recognize time tracking as a minimum requirement and location tracking as
    a feature that engages users and keeps them coming back for more.


    Throughout this book, you will continue to expand the `IOTFit` app to integrate
    more of Apple’s IoT frameworks. I hope this approach will help you to notice when
    some solutions are more appropriate than others. Additionally, I feel this approach
    is very reminiscent of many Agile working environments, in which you constantly
    refine or expand a product, based on one strongly defined feature set at a time.


    If you are already familiar with iOS development, you can safely skim through
    this chapter, but I highly recommend glancing through the screenshots to see if
    anything has changed since you last worked with Xcode. This chapter has been designed
    and tested for Xcode 9 and 10.


    ## Learning Objectives


    In this chapter, you will learn the following critical skills for IoT development
    on iOS by starting development on the `IOTFit` application.


    - Setting up a project in Xcode

    - Modifying a project from its default settings

    - Linking Xcode to your Apple Developer Program account

    - Using `Interface Builder` to lay out an adaptive user interface

    - Connecting your visual layout-based user interface to your code


    One of the most aggravating points of Apple platform development is that you have
    to master certain workflows and aspects of using Xcode in order to achieve critical
    milestones as an iOS developer, such as releasing your first app. To help you
    with this process, in this chapter, I will try to include as many detailed screenshots
    and explanations as possible for the project and user interface setup steps.


    Unfortunately, Apple frequently replaces its old tools and workflows. This allows
    Apple to build tools that are more relevant to current trends, but it also places
    a burden on developers to keep up to date with the latest changes and caveats.
    In my personal experience, I have noticed that while a workflow may change only
    every few years, the project settings change with almost every major release.
    In the past two years, iOS 11 added mandatory settings for enabling permission-locked
    features like location sharing and iOS 12 went even further by replacing the default
    build system.


    In this chapter, I emphasize adaptive (Apple’s term) user interface development,
    because the current range of supported iOS devices is so vast. While devices with
    the form factor of the iPhone 8 and 8 Plus are the most widely used at the time
    of writing, the tiny iPhone SE still makes up a huge segment of active devices,
    and Apple’s bezel-less devices (iPhone X, XR, XS, XS Max) are being positioned
    strongly as the future of the platform. If you take the iPad lineup into consideration,
    you will notice that the iPad mini is nearly the same size as the iPhone 8 Plus,
    and the iPad Pro 13-inch model is larger than many of today’s laptop computers.
    As a developer, it is amazing that the same code can run on all of these devices;
    however, it comes at the cost of having to do some careful preparation work and
    debugging, to make sure the experience is consistent across all devices. In this
    chapter, I will share the workflow I use to build adaptive user interfaces and
    tips I think will help make it easier for you.


    ### Note


    For the sake of clarity, the diagrams in this book illustrate the iPhone implementation
    of these projects. Most of the projects in this book will run fine on iPad as
    well, except for the ones that require device-specific hardware (for example,
    `Core Motion`, `Face ID`). I will indicate what these projects are at the beginning
    of the relevant chapter.


    This chapter is intended to guide you through the process of setting up a project,
    but if you run into any trouble along the way and would like to look at the completed
    project for reference, it is available from the GitHub repository for this book,
    under the `Chapter 1` folder (`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`).


    ## Setting Up the Project


    Before I start developing a project, I always want to know what I am building.
    To help you gain a better understanding of what the first version of the `IOTFit`
    app will encompass, please look at the wireframe diagrams in Figure 1-1. In design
    terms, a wireframe is usually an initial sketch (hand-drawn or computer-generated)
    that lays out the most critical components of a user interface.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig1_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig1_HTML.jpg)


    *Figure 1-1 Wireframe diagrams for the IOTFit app*


    In reviewing the wireframes, you will notice three main states for the application:
    recording a workout (inactive), recording a workout (active), and displaying a
    workout on a map. When users want to start a workout, they press the `Start` button
    on the record screen, and the text on the buttons and labels change to indicate
    that the workout is being recorded. If users want to view their progress on a
    map, they press the `Map` icon in the bottom tab bar, and the app will show an
    annotated map in place of the record screen. If you use the `App Store` or `Facebook`
    apps for iOS, you will already be familiar with the tab bar as a convenient way
    of switching screens in an app, while still preserving the state of each tab.
    Although it is not listed on the wireframe, the background state preservation
    you will implement for the app allows users to keep tracking a workout, even when
    the app is in the background.'
  raw: '# 1. Laying the Foundation for Your First IoT App


    Before taking you on a deep dive into Apple’s Internet of Things (IoT) technologies,
    I thought it would be useful to begin with a brief introduction to some of the
    tools and workflows you will use throughout the book to build your projects. In
    this book, your primary tools for building IoT apps will be the Xcode Integrated
    Development Environment from Apple and its Interface Builder tool for building
    user interfaces. When teaching iOS development, I always notice that both novice
    and experience developers find these tools to encompass some of the most challenging
    concepts to master, even more than Swift or the eccentricities of any framework.


    To practice using Xcode, in this chapter, you will begin developing your first
    IoT app for iOS: IOTFit, a workout app that uses the location services (GPS) on
    a user’s phone to help them keep track of how long they exercised and where. If
    you are an avid user of such workout apps as Runkeeper or Nike Plus, you will
    recognize time tracking as a minimum requirement and location tracking as a feature
    that engages users and keeps them coming back for more.


    Throughout this book, you will continue to expand the IOTFit app to integrate
    more of Apple’s IoT frameworks. I hope this approach will help you to notice when
    some solutions are more appropriate than others. Additionally, I feel this approach
    is very reminiscent of many Agile working environments, in which you constantly
    refine or expand a product, based on one strongly defined feature set at a time.


    If you are already familiar with iOS development, you can safely skim through
    this chapter, but I highly recommend glancing through the screenshots to see if
    anything has changed since you last worked with Xcode. This chapter has been designed
    and tested for Xcode 9 and 10.


    ## Learning Objectives


    In this chapter, you will learn the following critical skills for IoT development
    on iOS by starting development on the IOTFit application.


    *   Setting up a project in Xcode


    *   Modifying a project from its default settings


    *   Linking Xcode to your Apple Developer Program account


    *   Using Interface Builder to lay out an adaptive user interface


    *   Connecting your visual layout-based user interface to your code


    One of the most aggravating points of Apple platform development is that you have
    to master certain workflows and aspects of using Xcode in order to achieve critical
    milestones as an iOS developer, such as releasing your first app. To help you
    with this process, in this chapter, I will try to include as many detailed screenshots
    and explanations as possible for the project and user interface setup steps.


    Unfortunately, Apple frequently replaces its old tools and workflows. This allows
    Apple to build tools that are more relevant to current trends, but it also places
    a burden on developers to keep up to date with the latest changes and caveats.
    In my personal experience, I have noticed that while a workflow may change only
    every few years, the project settings change with almost every major release.
    In the past two years, iOS 11 added mandatory settings for enabling permission-locked
    features like location sharing and iOS 12 went even further by replacing the default
    build system.


    In this chapter, I emphasize adaptive (Apple’s term) user interface development,
    because the current range of supported iOS devices is so vast. While devices with
    the form factor of the iPhone 8 and 8 Plus are the most widely used at the time
    of writing, the tiny iPhone SE still makes up a huge segment of active devices,
    and Apple’s bezel-less devices (iPhone X, XR, XS, XS Max) are being positioned
    strongly as the future of the platform. If you take the iPad lineup into consideration,
    you will notice that the iPad mini is nearly the same size as the iPhone 8 Plus,
    and the iPad Pro 13-inch model is larger than many of today’s laptop computers.
    As a developer, it is amazing that the same code can run on all of these devices;
    however, it comes at the cost of having to do some careful preparation work and
    debugging, to make sure the experience is consistent across all devices. In this
    chapter, I will share the workflow I use to build adaptive user interfaces and
    tips I think will help make it easier for you.


    ### Note


    For the sake of clarity, the diagrams in this book illustrate the iPhone implementation
    of these projects. Most of the projects in this book will run fine on iPad as
    well, except for the ones that require device-specific hardware (for example,
    Core Motion, Face ID). I will indicate what these projects are at the beginning
    of the relevant chapter.


    This chapter is intended to guide you through the process of setting up a project,
    but if you run into any trouble along the way and would like to look at the completed
    project for reference, it is available from the GitHub repository for this book,
    under the Chapter [1](#346879_2_En_1_Chapter.xhtml) folder ( [`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)
    ).


    ## Setting Up the Project


    Before I start developing a project, I always want to know what I am building.
    To help you gain a better understanding of what the first version of the IOTFit
    app will encompass, please look at the wireframe diagrams in Figure [1-1](#346879_2_En_1_Chapter.xhtml#Fig1).
    In design terms, a wireframe is usually an initial sketch (hand-drawn or computer-generated)
    that lays out the most critical components of a user interface.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig1_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Wireframe diagrams for the IOTFit app


    In reviewing the wireframes, you will notice three main states for the application:
    recording a workout (inactive), recording a workout (active), and displaying a
    workout on a map. When users want to start a workout, they press the Start button
    on the record screen, and the text on the buttons and labels change to indicate
    that the workout is being recorded. If users want to view their progress on a
    map, they press the Map icon in the bottom tab bar, and the app will show an annotated
    map in place of the record screen. If you use the App Store or Facebook apps for
    iOS, you will already be familiar with the tab bar as a convenient way of switching
    screens in an app, while still preserving the state of each tab. Although it is
    not listed on the wireframe, the background state preservation you will implement
    for the app allows users to keep tracking a workout, even when the app is in the
    background.'
  trans: '

    # 为你的第一个物联网应用奠定基础


    在深入探讨苹果的物联网技术之前，我认为先简要介绍一下你将在本书中构建项目时使用的一些工具和工作流程会很有帮助。在本书中，你构建物联网应用的主要工具将是苹果的
    Xcode 集成开发环境及其用于构建用户界面的 `Interface Builder` 工具。在教授 iOS 开发时，我经常注意到，无论是新手还是有经验的开发者，都认为掌握这些工具是最大的挑战之一，甚至比掌握
    `Swift` 或任何框架的特性更难。


    为了练习使用 Xcode，在本章中，你将开始开发你的第一个 iOS 物联网应用：`IOTFit`，这是一款利用用户手机定位服务（GPS）帮助他们记录运动时长和地点的健身应用。如果你是
    `Runkeeper` 或 `Nike Plus` 这类健身应用的忠实用户，你会意识到时间追踪是最基本的要求，而位置追踪则是一项能吸引用户并让他们持续使用的功能。


    在本书中，你将不断扩展 `IOTFit` 应用，以集成更多苹果的物联网框架。我希望这种方法能帮助你注意到何时某些解决方案比其他方案更合适。此外，我觉得这种方法非常类似于许多敏捷工作环境，在这种环境中，你基于每次明确定义的一组功能，不断优化或扩展一个产品。


    如果你已经熟悉 iOS 开发，可以快速浏览本章内容，但我强烈建议你看一下截图，看看自你上次使用 Xcode 以来是否有任何变化。本章内容是基于 Xcode
    9 和 10 设计并测试的。


    ## 学习目标


    在本章中，你将通过开始开发 `IOTFit` 应用，学习以下在 iOS 上进行物联网开发的关键技能。


    - 在 Xcode 中设置项目

    - 修改项目的默认设置

    - 将 Xcode 链接到你的 Apple Developer Program 账户

    - 使用 `Interface Builder` 布局自适应用户界面

    - 将基于视觉布局的用户界面连接到代码


    苹果平台开发最令人恼火的一点是，为了实现作为 iOS 开发者的关键里程碑（例如发布你的第一个应用），你必须掌握使用 Xcode 的某些工作流程和方面。为了帮助你完成这个过程，在本章中，我将尽可能在项目设置和用户界面设置步骤中包含详细的截图和解释。


    不幸的是，苹果经常更换其旧工具和工作流程。这使得苹果能够构建更符合当前趋势的工具，但也给开发者带来了跟上最新变化和注意事项的负担。根据我的个人经验，我注意到，虽然工作流程可能每隔几年才改变一次，但项目设置几乎每次重大发布都会改变。在过去两年中，iOS
    11 增加了强制设置，用于启用权限锁定的功能，如位置共享；而 iOS 12 则更进一步，替换了默认的构建系统。


    在本章中，我强调自适应（苹果的术语）用户界面开发，因为目前支持的 iOS 设备种类繁多。虽然 iPhone 8 和 8 Plus 这类外形尺寸的设备在撰写本文时使用最广泛，但小巧的
    iPhone SE 仍在活跃设备中占据很大比例，而苹果的无边框设备（iPhone X、XR、XS、XS Max）正被强势定位为该平台的未来。如果你考虑 iPad
    产品线，你会注意到 iPad mini 几乎与 iPhone 8 Plus 大小相同，而 13 英寸的 iPad Pro 型号比当今许多笔记本电脑还要大。作为开发者，能在所有这些设备上运行相同的代码真是太棒了；然而，这需要付出代价，即必须进行一些仔细的准备工作并调试，以确保在所有设备上体验一致。在本章中，我将分享我用来构建自适应用户界面的工作流程，以及我认为能帮助你更轻松地完成此任务的技巧。


    ### 注意


    为清晰起见，本书中的图表展示了这些项目的 iPhone 实现。本书中的大多数项目在 iPad 上也能正常运行，除非是那些需要特定设备硬件的项目（例如 `Core
    Motion`、`Face ID`）。我会在相关章节的开头说明这些项目。


    本章旨在指导你完成设置项目的过程，但如果你在过程中遇到任何问题，并希望查看已完成的项目作为参考，可以从本书的 GitHub 仓库中获取，位于 `Chapter
    1` 文件夹下 (`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`)。


    ## 设置项目


    在开始开发一个项目之前，我总是想知道自己要构建什么。为了帮助你更好地理解 `IOTFit` 应用的第一个版本将包含哪些内容，请查看图 1-1 中的线框图。在设计术语中，线框图通常是一个初步草图（手绘或计算机生成），它布局了用户界面最关键的组件。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig1_HTML.jpg](img/346879_2_En_1_Fig1_HTML.jpg)


    *图 1-1 IOTFit 应用的线框图*


    查看线框图时，你会注意到应用的三种主要状态：记录运动（非活跃状态）、记录运动（活跃状态）和在地图上显示运动。当用户想要开始运动时，他们按下记录屏幕上的 `Start`
    按钮，按钮和标签上的文字会改变，以指示正在记录运动。如果用户想在地图上查看他们的进度，他们按下底部标签栏中的 `Map` 图标，应用将显示一个带注释的地图来取代记录屏幕。如果你使用
    iOS 上的 `App Store` 或 `Facebook` 应用，你应已熟悉标签栏，这是一种在应用屏幕间切换的便捷方式，同时保留每个标签的状态。虽然线框图上没有列出，但您将为应用实现的背景状态保留功能，允许用户即使在应用处于后台时也能持续追踪运动。

    '
- fmt: '### Wireframes vs. Mockups


    I like to use wireframes at the beginning of a project to put the stakeholders,
    developers, and design team on the same page about what an app has to do, before
    committing to the time-consuming work of generating mockups—the Photoshop- or
    Sketch-generated design resources that specify the fine details of implementation,
    including exact colors, font sizes, and shadows. It is much easier to throw away
    or redo a wireframe than it is a mockup!


    To begin the development process, you will have to set up a new Xcode project
    for the IOTFit app and configure it for the iOS frameworks you will need to use.
    Apple provides a very rich toolbox for you to work with, but it always requires
    some careful preparation. Before getting started, take a second to think about
    what frameworks you would like to use to implement the requirements of the app,
    then refer to Table [1-1](#346879_2_En_1_Chapter.xhtml#Tab1) for the final list
    of what application programming interfaces (APIs) you will end up using in this
    project.


    **Table 1-1** IOTFit Features and Their Corresponding iOS APIs


    | Requirement | Application Programming Interface | Parent Framework |

    | --- | --- | --- |

    | Switching between screens easily | Tab View Controller (`UITabViewController`)
    | UIKit |

    | Displaying a map | Map View (`MKMapViewController`) | MapKit |

    | Accessing GPS hardware | Location Manager (`CLLocationManager`) | Core Location
    |

    | Requesting location permission | Location Manager (`CLLocationManager`) | Core
    Location |


    The `UITabViewController` and `MKMapViewController` classes will drive the most
    complicated parts of the user interface. The Core Location framework will do the
    heavy lifting for requesting and tracking the user’s location.


    Now that you have a better idea of the technical and design aspects of the project,
    you can begin implementation. First, create a new Xcode Project by opening Xcode
    on your Mac and clicking **Create a new Xcode project** from the Welcome to Xcode
    screen shown in Figure [1-2](#346879_2_En_1_Chapter.xhtml#Fig2). Alternatively,
    if Xcode is already open, you can click the **File** menu and then select **New
    > Project**.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig2_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig2_HTML.jpg)


    **Figure 1-2** Creating a new project from the Xcode welcome screen


    Next, Xcode will present a pop-up window asking you to select the template type
    for your project. As shown in Figure [1-3](#346879_2_En_1_Chapter.xhtml#Fig3),
    select **Tabbed App** to create a project based on a template that includes a
    Tab Bar Controller and two empty View Controllers. This template is close to the
    general user interface you must use for the IOTFit app and saves a lot of time
    over manually setting everything up yourself.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig3_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig3_HTML.jpg)


    **Figure 1-3** Selecting the Tabbed App template


    After selecting the correct template, click the **Next** button, then when asked
    to set the options for the project, enter “IOTFit” as the project name, as shown
    in Figure [1-4](#346879_2_En_1_Chapter.xhtml#Fig4). This will be used as a general
    identifier throughout the project and as the default display name of the app on
    the iOS home screen. If you have an organization name or organization identifier
    you would like to use, you can enter those at this time too. You do not have to
    set a team for the project at this time, as you will do that later, after verifying
    that the project has been created successfully.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig4_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig4_HTML.jpg)


    **Figure 1-4** Initial options for IOTFit project


    After confirming these options, click the **Next** button, then select a location
    to save the project. I like to place my projects in an easy-to-find folder in
    my home directory. As shown in Figure [1-5](#346879_2_En_1_Chapter.xhtml#Fig5),
    click the **Create** button to generate the project.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig5_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig5_HTML.jpg)


    **Figure 1-5** Selecting a destination for the IOTFit project


    After the project has been generated successfully, Xcode will greet you with the
    Xcode editor window for your new project, as shown in Figure [1-6](#346879_2_En_1_Chapter.xhtml#Fig6).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig6_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig6_HTML.jpg)


    **Figure 1-6** Default Xcode editor window for the IOTFit project


    If you have been developing apps for a while, this editor window should be very
    familiar to you. For newer users, the major areas of this screen are described
    following.


    *   **Navigator pane (left)**: The atlas for your project. This allows you to
    manage your project hierarchy, search for text in your project, and quickly navigate
    to debugging issues.

    *   **Editor pane (center)**: Your main editing workspace. This lets you modify
    source code, build settings, and view diffs of source-control-managed files.

    *   **Utilities pane (right)**: Your source code concierge. With this, you can
    manage additional settings for individual files and view quick help tips on classes
    you are working with (by simply highlighting them).


    Getting back to the project at hand, verify that the settings for the generated
    project are similar to those in the zoomed-in screenshot in Figure [1-7](#346879_2_En_1_Chapter.xhtml#Fig7).
    In particular, verify that the project has source files in the navigator pane
    and that the app’s Display Name and Bundle Identifier match what you entered into
    the previous screens.


    > **Tip**: If the project setting did not automatically appear with the editor
    window, manually select them by clicking the project name in the Project Navigator
    (the topmost item in the navigation pane).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig7_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig7_HTML.jpg)


    **Figure 1-7** Default Xcode project settings for IOTFit


    ### Linking Your Apple Developer Account to Xcode


    The first time you open Xcode or a project that you did not create yourself, such
    as one that you cloned from GitHub, on your computer, the **Signing** section
    of your project settings will have one of the error messages shown in Figure [1-8](#346879_2_En_1_Chapter.xhtml#Fig8)
    or Figure [1-9](#346879_2_En_1_Chapter.xhtml#Fig9), indicating that it cannot
    find the signing credentials required to build the project.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig9_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig9_HTML.jpg)


    **Figure 1-9** Signing error for missing Apple Developer account


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig8_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig8_HTML.jpg)


    **Figure 1-8** Signing error for fresh Xcode installation


    To resolve these issues, click the drop-down menu next to **Team**, as shown in
    Figure [1-10](#346879_2_En_1_Chapter.xhtml#Fig10). Click **Add an Account**.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig10_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig10_HTML.jpg)


    **Figure 1-10** Team selection drop-down menu


    After making your selection, Xcode will display the sign in prompt shown in Figure
    [1-11](#346879_2_En_1_Chapter.xhtml#Fig11). If you have a paid Apple Developer
    Program membership, sign in with that. Otherwise, enter a valid Apple ID that
    you use with iTunes or on the App Store.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig11_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig11_HTML.jpg)


    **Figure 1-11** Xcode’s Apple ID sign-in prompt'
