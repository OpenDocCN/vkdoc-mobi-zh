    在完成处理程序中，我调用了该类 `tableView` 属性上的 `reloadData()` 方法，以强制其重新加载数据。尽管数组已填充，但除非你明确要求，否则表格视图不会重新加载数据。\n"
- fmt: '### 使用 `UITableViewDelegate` 协议将数据映射到单元格


    为了在“Workout Table View Controller”上显示 `workouts` 数组中的数据，你必须实现 `UITableViewDelegate`
    协议。该协议负责表格视图的显示和一般用户交互属性，例如每个单元格的高度、填充单元格内容的方法分配，以及用户选择单元格时应执行的操作。与 `UITableViewDataSource`
    协议类似，对于 IOTFit 应用，你无需实现该协议提供的所有方法。为了填充 IOTFit 应用中的单元格，你将实现 `tableView(cellForRow:)`
    方法。这允许在运行时使用分区和行号来确定单元格的显示。此外，每次重新加载表格视图时，都会为每个单元格调用此方法。


    使用数组管理 Table View Controller 的数据的优势在于，它使数据映射变得极其简单。你可以简单地将行号与数组中的位置相关联。在代码清单 [4-13](#346879_2_En_4_Chapter.xhtml#PC13)
    中，我使用此逻辑实现了 `WorkoutTableViewController` 类的 `tableView(cellForRow:)` 方法。我使用 `workoutCell`
    标识符查找单元格模板，然后根据每个 `Workout` 项目中的值创建格式化字符串。


    ```swift

    class WorkoutTableViewController: UITableViewController {

    ...

    let dateFormatter = DateFormatter()

    ...

    override func tableView(_ tableView: UITableView,

    cellForRowAt indexPath: IndexPath) ->

    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier:

    "workoutCell", for: indexPath)

    guard let workouts = workouts else {

    return cell

    }

    let selectedWorkout = workouts[indexPath.row]

    let dateString = dateFormatter.string(from:

    selectedWorkout.startTime)

    let durationString =

    WorkoutDataManager.stringFromTime(timeInterval:

    selectedWorkout.duration)

    let titleText = "\(dateString) |

    \(selectedWorkout.workoutType) | \(durationString)"

    let detailText = String(format: "%.0f m | %.0f floors",

    arguments: [selectedWorkout.distance,

    selectedWorkout.flightsClimbed])

    cell.textLabel?.text = titleText

    cell.detailTextLabel?.text = detailText

    return cell

    }

    }

    ```

    *代码清单 4-13：用数据填充表格视图单元格*


    现在，如果你重新编译应用并保存更多锻炼记录，当进入“历史”标签页时，表格视图将显示用户 HealthKit 存储中最近十次锻炼的开始时间、距离、总步数和楼层数，类似于图
    [4-16](#346879_2_En_4_Chapter.xhtml#Fig16) 中的截图。


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig16_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig16_HTML.jpg)


    *图 4-16：IOTFit 应用已完成的“历史”标签页*


    ## 总结


    在本章中，通过扩展 Workout Data Manager 并添加用于显示锻炼历史的 Table View Controller，你学习了如何利用 HealthKit
    的强大功能，在 IOTFit 应用中安全地导入和导出健康数据。在应用的最初版本中，你必须依赖属性列表文件进行数据管理，并且无法将数据导出到应用之外。在应用了访问基于权限的硬件资源的熟悉经验，并学习了
    HealthKit 如何表示数据之后，你能够帮助用户在一个地方管理所有锻炼记录，并查看他们可能使用的其他应用中的锻炼数据。


    尽管 HealthKit 在数据表示方面很独特，但你在本章中练习的基于协议和完成处理程序的通信方法，在 Apple 的物联网相关框架中经常被应用。此外，只需稍作修改，本章中的大部分代码都可以复用于本书后面部分的
    Apple Watch 版本应用中，就像你从前一章的 Core Motion 代码中复用它一样。


    ---


    # 第二部分：构建你自己的物联网设备


    # 5. 构建基于 Arduino 的外围设备


    促成你今天所知的物联网（IoT）发展的最大力量之一，是过去只有大公司才能使用的低成本、高质量电子元件和通信标准的普及。以前，如果你想学习如何编程微处理器，你必须购买一台高性能计算机、芯片编程器、空白芯片以及来自芯片制造商的昂贵软件许可证。今天，只需一块
    30 美元的 Arduino、Raspberry Pi 或 BeagleBone 微控制器板，你就可以编程所有你想要的硬件项目，并且你可以购买到各种内置两针或三针连接、价格低于
    10 美元的传感器。


    类似地，蓝牙过去是一种只能通过使用功能有限的专用硬件芯片并自行编程协议接口才能使用的技术。如今，蓝牙芯片内置在大多数联网设备中，并且可以通过许多协议的开源实现来使用。作为
    iOS 的一部分，Apple 提供了 Core Bluetooth 框架，允许你开发与蓝牙配件通信的应用，或让 iPhone 充当蓝牙配件。


    正如 Apple II 为那些无法自行组装计算机的人打开了个人计算机和编程的大门一样，这些低成本的编程环境正在为新一代的学生、爱好者以及初创公司打开硬件开发的大门。在本章中，你将加入他们的行列，学习如何开始制造你自己的物联网设备！'
  raw: '#### Using the UITableViewDelegate Protocol to Map Data to Cells


    To display the data from the workouts array on the Workout Table View Controller,
    you must implement the `UITableViewDelegate` protocol. This protocol is responsible
    for the display and general user interaction properties of the table view, such
    as the height of each cell, assigning methods to populate cell contents, and what
    should happen when a user selects a cell. As with the `UITableViewDataSource`
    protocol, for the IOTFit app, you do not have to implement all of the methods
    provided by this protocol. To populate the cells in the IOTFit app, you will implement
    the `tableView(cellForRow:)` method. This allows use of a section and row number
    to determine the display of a cell at runtime. Additionally, every time you reload
    the table view, this method is called for each of the cells.


    The advantage of using an array to manage the data for a Table View Controller
    is that it makes mapping data extremely simple. You can simply correlate a row
    number to the position in the array. In Listing [4-13](#346879_2_En_4_Chapter.xhtml#PC13),
    I use this logic to implement the `tableView(cellForRow:)` method for the `WorkoutTableViewController`
    class. I use the `workoutCell` identifier to look up the cell template, then create
    formatted strings, based on the values in each `Workout` item.


    ```

    class WorkoutTableViewController: UITableViewController {

    ...

    let dateFormatter = DateFormatter()

    ...

    override func tableView(_ tableView: UITableView,

    cellForRowAt indexPath: IndexPath) ->

    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier:

    "workoutCell", for: indexPath)

    guard let workouts = workouts else {

    return cell

    }

    let selectedWorkout = workouts[indexPath.row]

    let dateString = dateFormatter.string(from:

    selectedWorkout.startTime)

    let durationString =

    WorkoutDataManager.stringFromTime(timeInterval:

    selectedWorkout.duration)

    let titleText = "\(dateString) |

    \(selectedWorkout.workoutType) | \(durationString)"

    let detailText = String(format: "%.0f m | %.0f floors",

    arguments: [selectedWorkout.distance,

    selectedWorkout.flightsClimbed])

    cell.textLabel?.text = titleText

    cell.detailTextLabel?.text = detailText

    return cell

    }

    }

    Listing 4-13

    Populating Table View Cells with Data

    ```


    Now, if you re-compile the app and save a few more workouts, when you go to the
    History tab, the table view will display the start time, distance, total steps,
    and floor counts for the last ten workouts in the user’s HealthKit store, similar
    to the screenshot in Figure [4-16](#346879_2_En_4_Chapter.xhtml#Fig16).


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig16_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig16_HTML.jpg)


    Figure 4-16


    The completed History tab for the IOTFit app


    ## Summary


    In this chapter, by expanding the Workout Data Manager and adding a Table View
    Controller for displaying workout history, you learned how you to harness the
    power of HealthKit to securely import and export health data in the IOTFit app.
    In the first iterations of the app, you had to rely on a property-list file for
    data management and had no way of getting it out of the app. After applying the
    familiar lessons of accessing permission-based hardware resources and learning
    how HealthKit represents data, you were able to help users manage all of their
    workouts in one place and see your workout data from other apps they may also
    use.


    Although HealthKit is unique in its representations of data, the protocol and
    completion handler-based communication methods you practiced in this chapter are
    applied often through Apple’s IoT-related frameworks. Furthermore, with small
    modifications, most of the code in this chapter can be reused in the Apple Watch
    version of this app later in the book, just as with your Core Motion code from
    the previous chapter.


    # Part 2Building Your Own Internet Things


    # 5. Building Arduino-Based Peripherals


    One of the greatest forces in empowering the Internet of Things (IoT) as you know
    it today has been the expansion of access to lower-cost, higher-quality electronics
    components and communications standards that were once only available to large
    companies. Previously, if you wanted to learn how to program a microprocessor,
    you would have to buy a high-performance computer, chip programmer, blank chips,
    and an expensive software license from the chip manufacturer. Today, you can program
    all the hardware projects you want with a single $30 Arduino, Raspberry Pi, or
    BeagleBone microcontroller board, and you can find a wide variety of sensors with
    two- or three-pin connections built in for less than $10\.


    In a similar vein, Bluetooth used to be a technology that was only available by
    using limited-purpose hardware chips and programming the interface for the protocol
    yourself. Today, Bluetooth chips are built in to most connected devices and are
    available through many open source implementations of the protocol. As part of
    iOS, Apple provides a framework, Core Bluetooth, that allows you to develop apps
    that communicate with the Bluetooth accessory or make the iPhone act as a Bluetooth
    accessory.


    Just as the Apple II opened up personal computers and programming to people who
    couldn’t put together their own computer, these low-cost programming environments
    are opening up hardware development to new waves of students, hobbyists, and startups.
    In this chapter, you will join their ranks and learn how to start making your
    own IoT!'
