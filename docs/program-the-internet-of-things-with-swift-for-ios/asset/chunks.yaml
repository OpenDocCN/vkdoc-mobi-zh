  trans: '

    ### 从基础模板重命名类


    如前所述，使用 Apple 的 Tabbed App 模板的一大优势在于，它会自动为项目预填充一个故事板（storyboard）和多个空类，这些类用于一个以标签界面作为屏幕间主要导航方式的应用。之前我们已经确认项目本身生成成功。要验证故事板是否生成成功，请点击项目导航器中的
    `Main.storyboard` 文件。编辑器窗口的中央面板应切换至界面构建器，并显示默认故事板的内容，如图 1-16 所示。故事板应包含一个连接到两个空白视图控制器的标签视图控制器。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig16_HTML.jpg](img/346879_2_En_1_Fig16_HTML.jpg)


    图 1-16


    Tabbed App 项目的默认故事板


    子视图控制器被命名为 `FirstViewController` 和 `SecondViewController`。然而，随着项目规模的增长，这些类名会给后续维护带来困难。如同自然生态系统，Xcode
    项目中的各项元素之间的关联远比表面看到的要深入。对于故事板所使用的类，更改类名同时也意味着需要修改其他类及故事板文件中的引用。为了管理这一复杂过程，你可以使用
    Xcode 中的重构工具。要重命名 `FirstViewController` 类，请辅助点击 (右键点击或长按) 该符号名称，在上下文菜单中滚动到 "Refactor"，然后选择
    "Rename"，如图 1-17 所示。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig17_HTML.jpg](img/346879_2_En_1_Fig17_HTML.jpg)


    图 1-17


    显示符号的重构菜单


    点击 "Rename" 后，中央面板将显示一个手风琴式的表格。在重命名类的情况下，第一行显示文件名的预览，第二行提供一个编辑区域，你可以在其中修改类名，第三行及之后的行则显示那些依赖你类的文件（如故事板或其他类）中将发生的更改预览。输入
    `CreateWorkoutViewController` 作为视图控制器的新名称，并确认输出结果与图 1-18 类似。然后点击右上角的 "Rename"
    按钮以应用更改。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig18_HTML.jpg](img/346879_2_En_1_Fig18_HTML.jpg)


    图 1-18


    Xcode 编辑器对重构的预览


    按照同样的流程，将 `SecondViewController` 重命名为 `WorkoutMapViewController`。你之后可以在自己的代码中使用
    `Rename` 工具，通过相同的可视化编辑器来修改变量名和数据结构。


    ### 注意


    如果文件没有自动重命名，你可以通过两次点击操作来修复。首先，点击一次文件名以选中该项，然后再次点击以编辑文件名。在 Swift 中，文件名不影响编译。


    ### 布局用户界面


    现在故事板的依赖关系已经解析完毕，你可以开始放置用户界面元素了。如果你开发 iOS 应用已有一段时间，这应该是一个相当常规的操作，但对于新手来说，这可能会澄清过去的一些困惑。


    你的第一个目标是根据图 1-1 中的线框图，布局“创建锻炼”屏幕。该屏幕包含四个标签（两个用于信息，两个用于数值）来显示你的锻炼进度，以及两个按钮供用户开始/停止锻炼或暂停/继续锻炼。


    首先，从项目导航器中点击 `Main.storyboard`。然后，确保工具面板（右侧面板）处于打开状态。右下角是一个分屏，其中有一个看起来像旧款 iPhone
    Home 键的图标。这被称为*对象库*，包含你可以拖放到故事板中视图控制器上的用户界面元素。向下滚动或搜索 `Label`，以找到 `UILabel`。如图
    1-19 所示，将标签对象从对象库拖放到“创建锻炼视图控制器”（该控制器上应该仍保留着模板中的 `First View Controller` 标签）。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig19_HTML.jpg](img/346879_2_En_1_Fig19_HTML.jpg)


    图 1-19


    向视图控制器添加标签


    ### 提示


    为了加快导航速度，你可以通过按下 Command+T (`⌘+T`) 在 Xcode 的标签页中打开文件。


    继续这个过程，添加其他三个标签和两个按钮。你也可以删除带有 `First View` 文字的旧标签。此时，不必担心这些项的确切位置，因为你即将学习如何使用约束来设置大小和自动布局规则。


    ### 应用自动布局约束


    在使用自动布局构建用户界面时，不应思考每个项的 (x, y) 坐标位置，而应考虑它们相对于屏幕边界和其他元素应该位于何处。在 iOS 中，这些规则由*约束*来管理。在运行时，自动布局将使用这些约束来调整屏幕上元素的大小或重新定位。最常见的约束类型是*固定*（固定位置）和*相对*（其位置相对于屏幕边界或其他元素）。约束可以大于、等于或小于某个值。


    对于 IOTFit 应用，我认为“创建锻炼”屏幕的关键特性是，无论用户使用的是何种尺寸的 iPhone，他们都能轻松按下“开始”和“暂停”按钮。通过将按钮固定在屏幕底部，我就不必担心按钮位置会因屏幕尺寸变化而变得难以操作。用户已经习惯于按下屏幕底部的按钮，因为每个
    iOS 设备底部 Home 键的放置方式教会了他们与屏幕底部进行交互以执行控制手势。对于状态标签，我希望能达成两个目标：保持屏幕平衡且不干扰按钮的放置，因此我将它们固定在屏幕顶部。如图
    1-20 所示，在这种布局下，当应用在 iPhone SE、iPhone X 和 iPhone 8 Plus 上运行时，唯一会改变的是元素的缩放比例以及状态标签与操作按钮之间的垂直间距。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig20_HTML.jpg](img/346879_2_En_1_Fig20_HTML.jpg)


    图 1-20


    IOTFit 用户界面如何适配不同的 iPhone 尺寸

    '
- fmt: '### Tip


    Another good Auto Layout strategy to use is to center an item in the middle of
    the screen and place items below or above that.


    In Interface Builder, you can use the `Add New Constraints` tool to set constraints,
    using a graphical user interface. As shown in Figure 1-21, select the topmost
    label, then in the bottom toolbar for the editor window, find the `Add New Constraints`
    button (the icon looks like a box plot graph), and click it. The pop-up window
    that appears will display the label’s distance to its closest neighbors.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig21_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig21_HTML.jpg)


    Figure 1-21 — Steps for setting constraints via Interface Builder’s `Add New Constraints`
    tool


    To set a fixed constant, click the text field containing the value you want to
    fix and type in the new value. The line next to the text field will change from
    a dotted red line to a solid red line, indicating that your value was read successfully.
    For the topmost label, fix the label to 20 pixels from the top, left, and right
    of the screen. Set the height of the label to 30 pixels. Check the check box next
    to height to make sure your change is recorded. Finally, click the `Add 4 Constraints`
    button at the bottom of the pop-up to save your changes. The modified storyboard
    should be similar to the screenshot in Figure 1-22.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig22_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig22_HTML.jpg)


    Figure 1-22 — Create Workout View Controller, after setting constraints for the
    top label


    ### Customizing the Appearance of Items


    Although you have set the constraints for the top label in the Create Workout
    View Controller, the appearance of the label does not match the initial design
    in the wireframe. To modify the text, apply the correct text justification (centered),
    and set the text size. Follow the steps indicated in Figure 1-23. First, click
    the label in the storyboard, then, in the utilities pane (right), click the Attributes
    Inspector (center icon). To change the text, insert the new text you want in the
    `Text` row. Click the `T` icon next to `Font` to change the font. A pop-up will
    appear. Instead of typing in a font size, pick one of Apple’s pre-defined styles,
    `Title 3`. This will help the text app scale better for users with vision impairments.
    Additionally, you will use the style in this family later, enabling a consistent
    user interface. Click the “center” graphic next to `Alignment` to center the text
    alignment. Finally, to prevent text from clipping on small screens, set the `Autoshrink`
    property to `Minimum Font Scale`. This will shrink the text as low as 50% of the
    original size before clipping the text.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig23_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig23_HTML.jpg)


    Figure 1-23 — Steps for setting the correct display properties for the Workout
    Time label


    Follow these same steps of setting constraints and text properties for all the
    labels and buttons, according to the parameters specified in Table 1-2.


    **Table 1-2** — Constraints and Font Settings for Create Workout View Controller
    User Interface Elements


    | Display Text | Top | Left | Right | Bottom | Height | Text Class |

    | --- | --- | --- | --- | --- | --- | --- |

    | Workout Time | 20 | 20 | 20 | -- | 30 | Title 3 |

    | 0 hrs 00 mins | 10 | 20 | 20 | -- | 50 | Title 1 |

    | Workout Distance | 10 | 20 | 20 | -- | 30 | Title 3 |

    | 0.00 meters | 10 | 20 | 20 | ≥20 | 50 | Title 1 |

    | Pause | -- | 20 | 20 | 20 | 60 | Title 2 |

    | Stop | 20 | 20 | 20 | 20 | 60 | Title 2 |


    After applying the constraints and font settings, your storyboard should resemble
    the screenshot in Figure 1-24.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig24_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig24_HTML.jpg)


    Figure 1-24 — Create Workout View Controller after setting all constraints


    By default, `UIButton` objects are styled with a transparent background and text
    style that match the default tint color of your app (as of this writing, the default
    tint color is a shade of blue). To make the app easier to use, in my wireframes,
    I suggested a button with a large colored touchable area and white text. Using
    the Attributes Inspector once again, you can modify the text color and background
    color of a `UIButton` element.


    Click the Pause button to select it, then click the Attributes Inspector (tab
    icon) in the utilities pane, if you have not already. As shown in Figure 1-25,
    click the `Text Color` drop-down menu to bring up a secondary menu with frequently
    used colors. Select `White Color` to make the button text white. The button will
    appear invisible, but it will reappear after setting the background color.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig25_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig25_HTML.jpg)


    Figure 1-25 — Setting the text color for a button


    To set the background color, scroll down in the Attributes Inspector. Under the
    `View` section, select the `Background` drop-down menu. This time, when the secondary
    menu appears, select `Other`. As shown in Figure 1-26, this will bring up a color
    wheel. Select a shade of red, as this is a color that many users recognize in
    the context of stop or pause actions (e.g., a red stop sign).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig26_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig26_HTML.jpg)


    Figure 1-26 — Color wheel for selecting background color


    Follow these same steps to select a blue background color for the Start button.
    Your final layout for the Create Workout View Controller should be similar to
    the screenshot in Figure 1-27.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig27_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig27_HTML.jpg)


    Figure 1-27 — Final layout for Create Workout View Controller'
