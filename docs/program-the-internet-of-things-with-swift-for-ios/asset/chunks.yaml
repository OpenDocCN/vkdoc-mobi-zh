- fmt: '# 使用 GPIO 监控输入引脚并控制输出引脚


    现在 Arduino IDE 已设置完毕，可以开始编写 Arduino 代码了！门传感器的 Arduino 解决方案可以分为两个部分：监控硬件和通过蓝牙传输结果。在本节中，你将专注于硬件监控代码，因为你可以通过监控
    Arduino IDE 的调试控制台并目视检查电路中的 LED 来调试这部分代码。


    要开始编写新的 Arduino 解决方案，请转到 `File` 菜单并选择 `New`。你将看到一个空的解决方案文件，其中包含两个存根方法：`setup()`
    和 `loop()`。顾名思义，Arduino 解决方案具有简单的架构：`setup()` 方法中的逻辑在设备通电后立即执行，而 `loop()` 方法中的逻辑会重复执行，直到设备断电。初始的
    Arduino 解决方案应类似于清单 [5-2](#346879_2_En_5_Chapter.xhtml#PC3)。


    ```

    void setup() {

    // put your setup code here, to run once:

    }

    void loop() {

    // put your main code here, to run repeatedly:

    }

    ```

    *清单 5-2 初始的空 Arduino 解决方案*


    在 Arduino 中使用 GPIO 是直接明了的操作。在 `setup()` 方法中，指定引脚号以及该引脚是用于输入还是输出。用于指定此功能的 API 是
    `pinMode()`。在清单 [5-3](#346879_2_En_5_Chapter.xhtml#PC4) 中，我更新了解决方案以进行这些调用。为了帮助管理代码，我使用
    `#define` 关键字将引脚号定义为编译器宏。如果你熟悉 Objective-C，你会认出这个关键字，因为它在 Objective-C 中用于相同的目的。这些引脚号与你之前在“组装硬件”一节中组装电路时使用的引脚号匹配。


    ```

    #define RED_LED_PIN 14

    #define BLUE_LED_PIN 15

    #define SWITCH_PIN 32

    void setup() {

    pinMode(RED_LED_PIN, OUTPUT);

    pinMode(BLUE_LED_PIN, OUTPUT);

    pinMode(SWITCH_PIN, INPUT);

    }

    void loop() {

    // put your main code here, to run repeatedly:

    }

    ```

    *清单 5-3 在 Arduino 解决方案中设置 GPIO 引脚模式*


    在清单 [5-3](#346879_2_En_5_Chapter.xhtml#PC4) 中，我将 `BLUE_LED` 和 `RED_LED` 引脚设置为输出，并将
    `DOOR_SENSOR` 引脚设置为输入。现在，是时候利用它们了。要与 Arduino 上的 GPIO 引脚交互，可以使用 `DigitalRead()`
    和 `DigitalWrite()` API。顾名思义，它们用于向数字引脚读取或写入值。在本程序的介绍性部分，你将根据磁性传感器是相互接触（门关闭）还是未接触（门打开）来打开或关闭
    `RED_LED`。因为我在 GPIO 引脚和地之间设计了一个下拉电阻，所以当门打开时开关将读取为 OFF，门关闭时读取为 ON。在清单 [5-4](#346879_2_En_5_Chapter.xhtml#PC5)
    中，我更新了 `loop()` 方法以包含此逻辑。为了更准确地读取磁性开关的值，我使用 `delay()` API 在 `loop()` 方法的末尾添加了
    1 秒（1000 毫秒）的延迟。


    ```

    #define RED_LED_PIN 14

    #define BLUE_LED_PIN 15

    #define SWITCH_PIN 32

    void setup() {

    pinMode(RED_LED_PIN, OUTPUT);

    pinMode(BLUE_LED_PIN, OUTPUT);

    pinMode(SWITCH_PIN, INPUT);

    Serial.begin(9600);

    Serial.println(" Program start");

    }

    void loop() {

    checkSwitch();

    delay(1000);

    }

    void checkSwitch() {

    int currentState = digitalRead(SWITCH_PIN);

    if (currentState != switchState) {

    updateLockBLE(currentState);

    }

    switchState = currentState;

    digitalWrite(LED_PIN, switchState);

    Serial.print("Switch state: ");

    Serial.println(switchState);

    }

    ```

    *清单 5-4 根据 GPIO 状态打开或关闭 LED*


    在下一章中，你将使用蓝色 LED 来指示蓝牙连接是否已建立。


    ## 计算电池状态


    HUZZAH32 最便捷的特性之一是，其内置的电池端口允许你使用廉价的锂聚合物（LiPo）电池为其供电，并在通过 USB 为 HUZZAH32 供电时为其充电。然而，为了帮助用户充分利用设备，通过配套应用传输电池的充电水平是明智的做法。幸运的是，我们可以利用
    ADC 的强大功能来读取电池电量并通过蓝牙进行传输。


    就像软件开发人员一样，硬件开发人员经常发现自己需要调整设计以适应所面临的限制。就 HUZZAH32 而言，其设计者通过允许某些引脚具有多种功能，能够在设备中集成更多功能。为了读取电池电量，你可以利用他们在引脚
    35（ADC #13）上的工程设计智慧。当此引脚未连接任何东西时，你可以使用它来读取所连接电池电压恰好一半的值。HUZZAH32 上的 ADC 引脚的工作方式与
    iOS 代码中的 RGB 值类似，你可以从中读取或写入 12 位的电平。这允许你微调电机的速度，或者像本示例中必须做的那样，从引脚读取非二进制值。为了准确计算电池电量，将
    ADC 输出值除以 4095（2^12 - 1），以找出电池电量（相对于最大值）的百分比，然后将此结果乘以 2，再乘以 1.1（ADC 引脚的参考电压）和
    3.3（HUZZAH32 输出的参考电压）。如果你想将电池电量报告为百分比，请将此数字除以 4.2，这是可以连接到芯片的 LiPo 电池的最大可能电压。在清单
    [5-5](#346879_2_En_5_Chapter.xhtml#PC6) 中，我修改了 Arduino 解决方案以包含这些计算。现在，我将输出值显示在
    Arduino IDE 控制台上。在下一章中，你将学习如何通过低功耗蓝牙对其进行传输。


    ```

    #define RED_LED_PIN 14

    #define BLUE_LED_PIN 15

    #define SWITCH_PIN 32

    #define BATTERY_PIN 35

    void setup() {

    pinMode(RED_LED_PIN, OUTPUT);

    pinMode(BLUE_LED_PIN, OUTPUT);

    pinMode(SWITCH_PIN, INPUT);

    pinMode(BATTERY_PIN, INPUT);

    Serial.begin(9600);

    Serial.println(" Program start");

    }

    void loop() {

    checkSwitch();

    checkBattery();

    delay(1000);

    }

    ...

    void checkBattery() {

    float currentLevel = analogRead(BATTERY_PIN);

    currentLevel = ((currentLevel / 4095) * 2 * 3.3 * 1.1)

    * 100 / 4.3;

    batteryLevel = currentLevel;

    Serial.print("Battery Level: ");

    Serial.print(t);

    Serial.println("%");

    }

    ```

    *清单 5-5 从 ADC 引脚 13 读取电池电量*'
  raw: '### Using GPIO to Monitor Input Pins and Control Output Pins


    Now that the Arduino IDE is set up for programming, you can finally start writing
    some Arduino code! The Arduino solution for the door sensor can be split into
    two components: monitoring the hardware and transmitting the results over Bluetooth.
    In this section, you will focus on the hardware-monitoring code, as you can debug
    that by monitoring the Arduino IDE’s debugging console and visually inspecting
    the LEDs in the circuit.


    To begin writing a new Arduino solution, go to the File menu and select New. You
    will be presented with an empty solution file, containing two stub methods: `setup()`
    and `loop()`. As the names suggest, Arduino solutions have a simple architecture:
    the logic in the `setup()` method gets executed as soon the device powers on,
    and the logic in the `loop()` method is repeated until the device is powered off.
    The initial Arduino solution should resemble Listing [5-2](#346879_2_En_5_Chapter.xhtml#PC3).


    ```

    void setup() {

    // put your setup code here, to run once:

    }

    void loop() {

    // put your main code here, to run repeatedly:

    }

    Listing 5-2

    Initial, Empty Arduino Solution

    ```


    Working with GPIO in Arduino is a straightforward operation. In the `setup()`
    method, specify the pin number and whether it will be used for input or output.
    The API for specifying this is `pinMode()`. In Listing [5-3](#346879_2_En_5_Chapter.xhtml#PC4),
    I have updated the solution to make these calls. To help manage the code, I have
    defined the pin numbers as compiler macros using the `#define` keyword. If you
    are familiar with Objective-C, you will recognize this keyword, as it is used
    there for the same purpose. The pin numbers match the ones you used to put together
    the circuit in the “Assembling the Hardware” section.


    ```

    #define RED_LED_PIN 14

    #define BLUE_LED_PIN 15

    #define SWITCH_PIN 32

    void setup() {

    pinMode(RED_LED_PIN, OUTPUT);

    pinMode(BLUE_LED_PIN, OUTPUT);

    pinMode(SWITCH_PIN, INPUT);

    }

    void loop() {

    // put your main code here, to run repeatedly:

    }

    Listing 5-3

    Setting Up GPIO Pin Modes in an Arduino Solution

    ```


    In Listing [5-3](#346879_2_En_5_Chapter.xhtml#PC4), I set the `BLUE_LED` and `RED_LED`
    pins as outputs, and the `DOOR_SENSOR` pin as an input. Now, it is time to take
    advantage of them. To interact with GPIO pins on the Arduino, you use the `DigitalRead()`
    and `DigitalWrite()` APIs. As the names suggest, they are used to read or write
    a value to a digital pin. For this introductory part of the program, you will
    turn the `RED_LED` on or off, based on whether the magnetic sensors are touching
    each other (door closed) or not (door open). Because I designed the circuit with
    a pull-down resistor between GPIO pin and ground, the switch will read OFF while
    the door is open and ON when the door is closed. In Listing [5-4](#346879_2_En_5_Chapter.xhtml#PC5),
    I have updated the `loop()` method to include this logic. To read the value of
    the magnetic switch more accurately, I have added a 1 second (1000 millisecond)
    delay to the end of the `loop()` method, using the `delay()` API.


    ```

    #define RED_LED_PIN 14

    #define BLUE_LED_PIN 15

    #define SWITCH_PIN 32

    void setup() {

    pinMode(RED_LED_PIN, OUTPUT);

    pinMode(BLUE_LED_PIN, OUTPUT);

    pinMode(SWITCH_PIN, INPUT);

    Serial.begin(9600);

    Serial.println(" Program start");

    }

    void loop() {

    checkSwitch();

    delay(1000);

    }

    void checkSwitch() {

    int currentState = digitalRead(SWITCH_PIN);

    if (currentState != switchState) {

    updateLockBLE(currentState);

    }

    switchState = currentState;

    digitalWrite(LED_PIN, switchState);

    Serial.print("Switch state: ");

    Serial.println(switchState);

    }

    Listing 5-4

    Turning an LED On or Off, Based on GPIO Status

    ```


    In the next chapter, you will use the Blue LED to indicate whether the Bluetooth
    connection has been established.


    ### Calculating Battery Status


    One of the most convenient aspects of the HUZZAH32 is that its built-in battery
    port allows you to power it from an inexpensive lithium polymer (LiPo) battery
    and recharge it when the HUZZAH32 is powered via USB. However, to help the user
    get the most out of the device, it would be wise to transmit the battery’s charge
    level through the companion app. Luckily, we can use the power of ADC to read
    the battery level and transmit it over Bluetooth.


    Just like software developers, hardware developers often finding themselves adapting
    their designs to fit the limitations they are given. In the case of the HUZZAH32,
    its designers were able to fit more functionality in the device, by allowing some
    pins to have multiple functions. To read battery level, you can take advantage
    of their engineering ingenuity on Pin 35 (ADC #13). When nothing is plugged into
    this pin, you can use it to read exactly half of the voltage level of the connected
    battery. ADC pins on the HUZZAH32 work just like RGB values in iOS code, in that
    you can read or write 12-bit levels from them. This allows you to fine-tune the
    speed of a motor or read a non-binary value from a pin, as we have to in this
    example. To calculate the battery level accurately, divide the ADC output value
    by 4095 (2^12 - 1), to find what percent the battery level is at (out of the maximum),
    double this by 2, then multiply it by 1.1 (the reference voltage of the ADC pin),
    and 3.3 (the reference voltage of the HUZZAH32’s output). If you want to report
    the battery level as a percentage, divide this number by 4.2, the maximum possible
    voltage of a LiPo battery that can be connected to the chip. In Listing [5-5](#346879_2_En_5_Chapter.xhtml#PC6),
    I have modified the Arduino solution to include these calculations. For now, I
    display the output value on the Arduino IDE console. In the next chapter, you
    will learn how to transmit it across Bluetooth LE.


    ```

    #define RED_LED_PIN 14

    #define BLUE_LED_PIN 15

    #define SWITCH_PIN 32

    #define BATTERY_PIN 35

    void setup() {

    pinMode(RED_LED_PIN, OUTPUT);

    pinMode(BLUE_LED_PIN, OUTPUT);

    pinMode(SWITCH_PIN, INPUT);

    pinMode(BATTERY_PIN, INPUT);

    Serial.begin(9600);

    Serial.println(" Program start");

    }

    void loop() {

    checkSwitch();

    checkBattery();

    delay(1000);

    }

    ...

    void checkBattery() {

    float currentLevel = analogRead(BATTERY_PIN);

    currentLevel = ((currentLevel / 4095) * 2 * 3.3 * 1.1)

    * 100 / 4.3;

    batteryLevel = currentLevel;

    Serial.print("Battery Level: ");

    Serial.print(t);

    Serial.println("%");

    }

    Listing 5-5

    Reading the Battery Level from ADC Pin 13

    ```'
