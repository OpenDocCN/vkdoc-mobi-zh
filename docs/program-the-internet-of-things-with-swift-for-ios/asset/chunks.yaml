- fmt: '### Requesting User Location


    At the beginning of the chapter, I described how I thought it would be useful
    to display a three-day forecast and current weather conditions in the IOTHomeTV
    dashboard. Although users are often aware of the conditions inside their home,
    having data on the weather outside allows them to better prepare for when they
    must leave. In order to request location-based forecasts, you must request the
    user’s current location, just as in Chapter [2](#346879_2_En_2_Chapter.xhtml),
    when you used location tracking to build a workout app.


    As with the project in Chapter [2](#346879_2_En_2_Chapter.xhtml), before you can
    request a user’s location, you must set a description for the tvOS location permission
    request dialog. As shown in Figure [9-13](#346879_2_En_9_Chapter.xhtml#Fig13),
    open the `Info.plist` file for the IOTHomeTV target, then add the Privacy – Location
    When in Use key-value pair. For my description string, I used the text: “IOTHomeTV
    would like to use your location to show you weather information for your area.”


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig13_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig13_HTML.jpg)


    **Figure 9-13** Adding a user location permission description to the IOTHomeTV
    app


    Next, you must add the permission request after the app launches. Just as on iOS,
    user location on tvOS is managed through a `CLLocationManager` object. As shown
    in Listing [9-8](#346879_2_En_9_Chapter.xhtml#PC8), initialize an object to manage
    this request; implement the `viewWillAppear()` method to make the request; and
    the `locationManager(didChangeAuthorization status:)` delegate method to handle
    the result.


    ```swift

    import UIKit

    import CoreLocation

    class ViewController: UIViewController {

    ...

    let locationManager = CLLocationManager()

    ...

    override func viewDidLoad() {

    super.viewDidLoad()

    locationManager.delegate = self

    ...

    }

    override func viewDidAppear(_ animated: Bool) {

    super.viewDidAppear(animated)

    if CLLocationManager.authorizationStatus() ==

    .authorizedWhenInUse {

    locationManager.requestLocation()

    } else {

    locationManager.requestWhenInUseAuthorization()

    }

    }

    ...

    }

    extension ViewController : CLLocationManagerDelegate {

    func locationManager(_ manager: CLLocationManager,

    didChangeAuthorization status: CLAuthorizationStatus) {

    NSLog("Authorization state: \(status)")

    }

    func locationManager(_ manager: CLLocationManager,

    didFailWithError error: Error) {

    let errorString = "Location error:

    \(error.localizedDescription)"

    tipLabel?.text = errorString

    NSLog(errorString)

    }

    }

    ```


    **Listing 9-8** Requesting User Location Permission from the IOTHomeTV App


    To verify the result, run the app in the Apple TV 4K simulator. You should receive
    a full-screen alert asking you for your user location permission, as shown in
    Figure [9-14](#346879_2_En_9_Chapter.xhtml#Fig14).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig14_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig14_HTML.jpg)


    **Figure 9-14** User Location permission pop-up for the IOTHomeTV app


    Finally, to request the current user location, modify the `locationManager(didChangeAuthorization
    status:)` delegate method to request the current user location, after you have
    verified that permission has been granted. As shown in Listing [9-9](#346879_2_En_9_Chapter.xhtml#PC9),
    add another delegate method, `locationManager(didUpdateLocations locations:)`,
    to handle the location update, and then save the result in a property you can
    use later.


    ```swift

    import UIKit

    import CoreLocation

    class ViewController: UIViewController {

    ...

    let locationManager = CLLocationManager()

    var lastSavedLocation : CLLocation?

    ...

    override func viewDidAppear(_ animated: Bool) {

    ...

    }

    }

    extension ViewController : CLLocationManagerDelegate {

    func locationManager(_ manager:

    CLLocationManager, didChangeAuthorization

    status: CLAuthorizationStatus) {

    NSLog("Authorization state: \(status)")

    if status == .authorizedWhenInUse {

    locationManager.requestLocation()

    }

    }

    func locationManager(_ manager: CLLocationManager

    didUpdateLocations locations: [CLLocation]) {

    lastSavedLocation = locations.first

    }

    }

    ```


    **Listing 9-9** Requesting Current User Location from the IOTHomeTV App'
