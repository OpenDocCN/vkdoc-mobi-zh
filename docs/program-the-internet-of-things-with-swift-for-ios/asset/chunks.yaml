- fmt: '### Assembling the Hardware


    My first boss told me that one of the greatest things about working at NASA was
    that all of the engineers had to take NASA’s soldering training classes. That
    being said, soldering is an exercise that requires practice and precision. When
    working with a sensitive part, such as a microcontroller, you must be careful
    to not apply too much solder (the easy-to-melt metal that forms the bond between
    parts), or you will risk creating a short circuit (an unintentional physical connection
    between two parts that should not touch). You must also be careful not to apply
    the soldering iron (the tool that heats up the solder) for too long or at too
    hot a temperature, or you will risk the chance of physically burning out the part.


    To alleviate both of these risks, many engineers use breadboards (like the one
    shown in Figure [5-3](#346879_2_En_5_Chapter.xhtml#Fig3)), to create connections
    between parts using jumper wires. This is particularly useful during the prototyping
    stage, when you are constantly experimenting with different parts and changing
    the circuit. To more accurately reflect the real world, you, too, will use a breadboard
    to assemble the hardware for this project. If you feel comfortable soldering and
    want to transfer the design to a more compact or stable medium, you are welcome
    to do so.


    Although breadboards come in various shapes and sizes, there are a few common
    characteristics shared by all of them.


    - The case is frequently made of solid plastic, with several metal peg holes.

    - Frequently, there are rows at the top and bottom, with markings for shared positive
    and negative connections.

    - Most of the physical space on the breadboard will be occupied by closely spaced
    columns of pins, running across the length of the device.

    - There is usually a gap in the center row of the breadboard.


    As with all things, there are reasons for all of these characteristics. First,
    plastic is an insulator, meaning it does not conduct electricity (form a path
    for electricity to travel). You can handle the plastic area freely, without concern
    of it electrocuting you. The rows on the top and bottom are shared connections.
    Every part or wire you plug into a pin on these rows will share an electrical
    connection with every other pin on these rows. Most electrical parts run on DC
    voltage, which requires a source (positive) connection and ground (negative) connection,
    like the connections coming from a battery, so it makes sense that these pins
    are the ones that will be shared the most in a circuit. For smaller shared connections,
    you will use the columns in the center of the breadboard. All pins in a column
    are shared. Because most integrated circuits (ICs) come in a case that follows
    the dual in-line package (DIP) standard, the gap in the center of the breadboard
    allows you enough space to plug an IC and use a single column for each pin. In
    this manner, you can connect other parts to the pins without soldering. To help
    make this easier to visualize, I have included an annotated photograph of a breadboard
    in Figure [5-3](#346879_2_En_5_Chapter.xhtml#Fig3), indicating the shared connections.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig3_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Physical connections on a breadboard


    To begin assembling the project, take your `HUZZAH32` and place it on the center-left
    side of the breadboard. As shown in Figure [5-4](#346879_2_En_5_Chapter.xhtml#Fig4),
    make sure you place the `HUZZAH32` on the breadboard with the USB port sticking
    out. This will make it easier to insert a USB cable for programming and give you
    more space on the breadboard to insert parts.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig4_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Breadboard with the `HUZZAH32` chip placed on top


    To prevent bending or breaking the header pins, gently push down on the right
    side of the chip until the pins start to feel a little secure in the breadboard,
    as shown in Figure [5-5](#346879_2_En_5_Chapter.xhtml#Fig5).


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig5_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Securing the `HUZZAH32` chip onto the breadboard


    Continue this process by pushing down on the left side of the chip, then alternate
    pushes between the left and right sides, until the bottom of the header is flush
    with the breadboard, as shown in Figure [5-6](#346879_2_En_5_Chapter.xhtml#Fig6).


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig6_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Fully secured `HUZZAH32` chip


    You will use this same process of plugging in parts and connecting them with header
    wires to complete the circuit for this project. Before going further, take a second
    to review the schematic in Figure [5-7](#346879_2_En_5_Chapter.xhtml#Fig7). A
    schematic is a design diagram that specifies which parts are used in a circuit
    and how the connections are made between these parts. All schematics are drawn
    using standardized symbols for the parts and connections, so any engineer can
    quickly look at the schematic and understand how to build or analyze the circuit.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig7_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Schematic diagram for the door sensor


    For the door sensor, the heart of the circuit is the `HUZZAH32` chip. Its `3V`
    and `GND` pins are used to provide the power and ground connections for the rest
    of the circuit. Connected to the `GPIO14` and `GPIO15` pins are LEDs, which will
    be used to indicate if the door is locked and if the Bluetooth connection has
    been established. Many parts, especially LEDs, have specific requirements on the
    voltage and amperage that are required to drive (operate) them. The resistors
    placed in between the pins and LEDs are used to reduce the voltage to a level
    that allows the LEDs to operate without burning out from voltage levels higher
    than what they were designed for. The final connection in the circuit is for the
    switch. One side of the switch is connected to the `3V` pin and power connection,
    and the other side is attached to a resistor placed between the other side of
    the switch and the ground connection. This is called a pull-down resistor and
    is used to establish a stable ground connection when the switch is opened. Without
    the pull-down resistor, the microcontroller is unable to reliably read if the
    pin is *high* (connected to power) or *low* (connected to ground), and you cannot
    tell if the switch is open or closed.


    First, start by establishing the power and ground connections for the circuit.
    Take out red and green header wires. Find the pin marked `3V` on the `HUZZAH32`
    chip. Insert one side of the red wire (red, to represent power) into the row for
    this pin, and the other side into the column marked "positive" on the breadboard.
    Repeat this process for the `GND` pin, except use a green pin (to represent ground)
    and terminate the connection at the "negative" column. The breadboard with the
    `HUZZAH32` chip and power/ground wires attached is pictured in Figure [5-8](#346879_2_En_5_Chapter.xhtml#Fig8).
    When the `HUZZAH32` is powered through the USB cable or a battery, these two connections
    will provide power to the rest of the circuit.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig8_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Breadboard with `HUZZAH32` chip and power/ground connections'
