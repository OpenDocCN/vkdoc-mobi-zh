  trans: "\n### 注意事项\n\n如果你没有将 Apple ID 账户与 Xcode 关联成功，将无法成功设置任何后台模式。\n\n虽然将所有内容管理在同一个屏幕上会很方便，但你仍需切换到“信息”标签页来编辑应用的权限提示信息。在项目设置中点击`Info`标签页，你将会看到一个属性列表编辑器，其中已填充了项目的默认设置，如图\
    \ 2-3 所示。\n\n![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig3_HTML.jpg](img/346879_2_En_2_Fig3_HTML.jpg)\n\
    \n**图 2-3** 信息标签页中的默认属性列表\n\n属性列表（`.plist`文件）是基于 XML 的文本文件。属性列表中的配置设置以键值对（字典）的形式存储。由于其易于阅读和使用，它们成为苹果管理可选项目设置的首选方法。这个文件通常以其文件名`Info.plist`来指代。\n\
    \n虽然你可以在文本编辑器中编辑属性列表文件，但 Xcode 提供了你在图 2-3 中看到的可视化编辑器，使属性列表管理更加便捷。这个编辑器既适用于自动生成的文件（如`Info.plist`），也适用于你手动创建的文件。\n\
    \n要向属性列表添加键值对，请点击任意一行，然后点击加号（`+`）按钮。对于项目设置，会显示一个下拉菜单，其中包含建议的构建设置键。滚动菜单并选择 **隐私\
    \ - 定位始终及使用期间使用描述**，如图 2-4 所示。\n\n![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig4_HTML.jpg](img/346879_2_En_2_Fig4_HTML.jpg)\n\
    \n**图 2-4** 向信息属性列表添加键值对\n\n双击新行的“值”列中的空白区域，并输入你希望在权限提示窗口中显示的文本。苹果的 App Store\
    \ 提交指南之一是你的权限提示应描述你对受保护功能的预期用途。对于此应用，我使用了以下字符串作为权限提示描述：\n\n```\nIOTFit 希望使用定位权限来绘制你在锻炼期间的位置。此信息不会在应用外共享。\n\
    ```\n\n在 iOS 中，用户可以选择三种定位权限：`始终`、`使用期间`以及`始终和使用期间`。为`隐私 - 定位使用期间使用描述`和`隐私 - 定位使用描述`键值对创建额外的行，并同样指定这些权限提示。完成工作后，你的输出应类似于图\
    \ 2-5。\n\n![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig5_HTML.jpg](img/346879_2_En_2_Fig5_HTML.jpg)\n\
    \n**图 2-5** 完成的信息属性列表，包括所有定位权限字符串\n\n### 注意事项\n\n新的键值对在列表中的位置不影响编译。\n\n## 请求定位权限\n\
    \n现在项目依赖项已处理完毕，你可以开始实现向用户请求定位权限的逻辑。此时你需要问自己的一个最关键的问题是：“我应该在哪里放置定位权限弹窗？”\n\n要开始回答这个问题，首先看一下图\
    \ 2-6，回顾你在第 1 章中构建的用户界面。用户可以通过按下“开始”按钮来开始或停止锻炼，通过按下“暂停”按钮来暂停或恢复锻炼。如果用户想要查看地图，他们可以按下“第二个”标签页切换到地图视图。\n\
    \n![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig6_HTML.jpg](img/346879_2_En_2_Fig6_HTML.jpg)\n\
    \n**图 2-6** 来自第 1 章的完整 IOTFit 用户界面\n\n移动应用的最新趋势是在用户首次尝试执行需要你希望使用的资源的操作时请求权限。在\
    \ IOTFit 应用的情况下，这将是用户首次按下“开始”按钮时。除了请求定位权限外，此时你还需要更新用户界面以指示锻炼已开始。一旦确认一切准备就绪，你就可以开始记录用户的锻炼数据。\n\
    \n考虑到“创建锻炼视图控制器”上的其他活动（暂停和停止锻炼），这些将需要额外的用户界面更新以及某种机制来暂停定位和时间跟踪。\n\n在图 2-7 中，我创建了一个记录所有这些决策的流程图。你将在本章中将其作为指南来实现“创建锻炼视图控制器”的行为。\n\
    \n![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig7_HTML.jpg](img/346879_2_En_2_Fig7_HTML.jpg)\n\
    \n**图 2-7** 创建锻炼视图控制器的流程图\n\n非活跃和活跃状态之间的转换由`toggleWorkout()`方法处理，该方法绑定到“切换锻炼”按钮的“触摸内部”事件。位置请求的代码应在此处启动。为了唤起你的记忆，在代码清单\
    \ 2-1 中，我提供了第 1 章中实现的`CreateWorkoutViewController`类中的代码。\n\n```\nimport UIKit\n\
    class CreateWorkoutViewController: UIViewController {\n    @IBOutlet weak var\
    \ workoutTimeLabel :UILabel?\n    @IBOutlet weak var workoutDistanceLabel :UILabel?\n\
    \    @IBOutlet weak var toggleWorkoutButton :UIButton?\n    @IBOutlet weak var\
    \ pauseWorkoutButton :UIButton?\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \    }\n    override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
    \    }\n    @IBAction func toggleWorkout() {\n        NSLog(\"切换锻炼按钮已按下\")\n \
    \   }\n    @IBAction func pauseWorkout() {\n        NSLog(\"暂停锻炼按钮已按下\")\n   \
    \ }\n}\n```\n\n**代码清单 2-1** 来自第 1 章的 `CreateWorkoutViewController` 类\n\n为了表示应用的不同状态，你可以创建一个与流程图中的状态相对应的枚举。在类内部，创建一个以该枚举为类型的属性。当用户按下“开始”按钮时，更新状态属性并调用请求定位权限的方法。要实现此逻辑，请更新`CreateWorkoutViewController`类，如代码清单\
    \ 2-2 所示。\n\n```\nimport UIKit\nenum WorkoutState {\n    case inactive\n    case\
    \ active\n    case paused\n}\nclass CreateWorkoutViewController: UIViewController\
    \ {\n    @IBOutlet weak var workoutTimeLabel: UILabel?\n    @IBOutlet weak var\
    \ workoutDistanceLabel: UILabel?\n    var currentWorkoutState = WorkoutState.inactive\n\
    \    ...\n    @IBAction func toggleWorkout() {\n        switch currentWorkoutState\
    \ {\n        case .inactive:\n            currentWorkoutState = .active\n    \
    \        requestLocationPermission()\n        case .active:\n            currentWorkoutState\
    \ = .inactive\n        default:\n            NSLog(\"toggleWorkout() 在上下文之外被调用！\"\
    )\n        }\n        NSLog(\"切换锻炼按钮已按下\")\n    }\n    func requestLocationPermission()\
    \ {\n        NSLog(\"已请求定位权限\")\n    }\n    ...\n}\n```\n\n**代码清单 2-2** 向 `CreateWorkoutViewController`\
    \ 类添加状态跟踪\n"
- fmt: '### Checking for Hardware Availability


    As I mentioned at the beginning of the chapter, Apple’s recommended design pattern
    is to first check if a hardware device is available and ask for permission to
    use it. Apple has always differentiated its devices by hardware features, favoring
    the newest device with the most advanced features. As a developer, you naturally
    want to use these features, but making decisions based on device model number
    becomes unwieldy quickly. For many hardware features, including the iPhone’s GPS
    and camera, there is an API that allows you to determine the availability of the
    feature.


    In the case of the GPS, the framework that manages its operation is Core Location.
    It provides a class method, `CLLocationManager.locationServicesEnabled()`, that
    you can use to query the availability of location on the device. To use this method,
    you must import the Core Location framework into the `CreateWorkoutViewController`
