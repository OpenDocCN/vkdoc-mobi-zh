    \n在本章中，你学习了如何实现蓝牙低功耗（Bluetooth LE）的两种角色：外设（提供信息的设备）和中心管理器（从一个或多个外设获取信息的设备）。你在第\
    \ 5 章开始搭建的基于 `ESP32` 的电路作为外设，由开源库 `ESP32_BLE_Arduino` 驱动，而 `IOTHome` iOS 应用则作为中心管理器，使用了\
    \ Core Bluetooth 框架。对于这两种角色，在完成一系列较为冗长的设置步骤后，利用蓝牙低功耗的特征值更新来传输数据变得相当容易。为了帮助用户减少电池消耗，你还配置了两个设备，使其仅在设备发生明显状态变化时（例如，自上次更新以来，门打开程度或电池电量降低\
    \ 10%）才发送和响应更新。\n\n蓝牙仍然是连接硬件配件最常用的通信协议之一。希望你能将本章学到的知识运用到未来对该协议版本的更新，以及你可能选择构建的其他设备上！\n\
    \n# 7. 搭建树莓派并将其用作 HomeKit 桥接器\n\n在物联网应用开发的旅程中，到目前为止，你已经学习了如何在 iOS 设备上使用传感器（GPS、运动），以及如何利用开放通信协议（包括蓝牙）与第三方硬件设备（如\
    \ Arduino）进行交互。在本章中，你将学习一种介于两者之间的、苹果专属的物联网技术：HomeKit。\n\nHomeKit 于 2014 年随 iOS\
    \ 8 推出，是苹果专有的标准，旨在使 iOS 设备能够与经过认证的家用第三方物联网配件（如智能灯泡和空调）进行通信。其卖点在于，通过苹果的硬件认证流程、专为物联网设备设计的特殊加密芯片，以及与\
    \ iOS 的深度集成，它能够提供最强大、最安全的家用物联网平台。你无需购买专门的硬件设备作为网关，只需使用家中的 iPad、HomePod 或 Apple\
    \ TV 即可实现此功能。此外，你还可以使用 Siri 来检查设备的状态。\n\n不幸的是，对于许多第三方硬件制造商来说，其认证流程和专用硬件芯片被证明过于昂贵且推出太晚，该平台从未达到预期的势头。虽然\
    \ HomeKit 并未证明自己是苹果所期望的立竿见影的商业成功，但每天都有更多兼容设备为其推出。更重要的是，苹果现在允许爱好者通过发布 HomeKit 配件协议规范的非商业版本，创建未经认证的\
    \ HomeKit 设备供个人使用。该许可允许你创建供个人使用的配件，当你通过 iOS 设备连接它们时，这些配件会显示为“未经认证”。更棒的是，你的个人设备可以构建在任何能够实现\
    \ HAP 的平台上，从树莓派到 Mac 都可以。\n\n在软件方面，作为 iOS 的一部分，苹果提供了 HomeKit 框架，允许你管理注册在系统 HomeKit\
    \ 数据库中的房间和设备。HomeKit 与 HealthKit 同时发布，旨在以相同的方式运作，提供一个受保护的系统级 HomeKit 设备数据库，任何获得用户许可的应用程序都可以访问。然而，苹果没有提供的一个主要组件是用于硬件设备的\
    \ HAP 实现。为了填补这一空白，本章中你将使用一个优秀的开源项目 HomeBridge (`https://github.com/nfarina/homebridge`)，它实现了\
    \ HAP 规范的大部分内容，并提供了一个插件系统，使你能够轻松地将其他流行的物联网服务和配件连接到你的项目中。\n"
- fmt: '# Learning Objectives


    In this chapter, you will use a Raspberry Pi to build a HomeKit bridge for the
    door sensor you created in Chapters [5](#346879_2_En_5_Chapter.xhtml) and [6](#346879_2_En_6_Chapter.xhtml)
    and you will learn how to register it as a valid HomeKit device in iOS. The Raspberry
    Pi will connect to the sensor via Bluetooth to read its status and report it back
    via the HomeKit Accessory Protocol (HAP). As the name implies, a HomeKit bridge
    can connect multiple devices to HomeKit through a single interface. To demonstrate
    the bridge functionality of a device, you will also connect a temperature sensor
    to the Raspberry Pi and report its status over HAP.


    While there is an API that allows you to manage HomeKit devices and rooms within
    your app, after the publication of the first edition of this book, I found those
    features being adopted less in HomeKit devices, as they mirror functions in Apple’s
    Home app. For this edition, I decided to forego those topics in favor of expanding
    on configuring the Raspberry Pi, as it is such an involved process.


    In deploying the HomeKit bridge, you will learn the following key concepts for
    iOS IoT application development:


    - Setting up a Raspberry Pi

    - Installing Linux packages, such as `Node.js`, and their dependencies

    - Installing and configuring `HomeBridge`

    - Registering devices through the Home app

    - Debugging `HomeBridge`


    For this chapter, you will use the Raspberry Pi as your hardware development platform.
    Like the Arduino, the Raspberry Pi is a popular open source hardware platform.
    However, unlike the Arduino, there are only a few officially supported Raspberry
    Pi devices, manufactured by the Raspberry Pi Foundation ([`www.raspberrypi.org`](http://www.raspberrypi.org)),
    and a Raspberry Pi is intended to run Linux and provide desktop computer-like
    functionality, whereas an Arduino is intended to power sensors. For this reason,
    the Raspberry Pi is called a **single-board computer**. As a full Linux computer,
    you can run most Linux packages. For this chapter, you will take advantage of
    `Node.js` to run the `HomeBridge` service and its plug-ins. `Node.js` is a runtime
    environment that allows you to run JavaScript programs from the command line and
    is frequently used today as a replacement for web servers and startup utilities
    written in such compiled languages as C.


    Depending on your needs, you may eventually want to look into using a BeagleBone
    or Asus Tinker Board as a replacement for the Raspberry Pi, but I find the Raspberry
    Pi’s setup process and user community to be the friendliest for beginners.


    As always, you can find the iOS code for this project under the `Chapter` [`7`](#346879_2_En_7_Chapter.xhtml)
    folder of the GitHub page for this book ([`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)).
    The configuration scripts for the Raspberry Pi part of the project are included
    in the `Pi` subfolder under the `Chapter` [`7`](#346879_2_En_7_Chapter.xhtml)
    folder.


    # Setting Up the Raspberry Pi HomeKit Bridge


    In this chapter, you will use a Raspberry Pi to serve as the HomeKit bridge for
    the IOTHome door sensor and a temperature sensor you will connect directly to
    the Raspberry Pi. This will allow the user to access both statistics via voice
    commands in Siri and the companion app you will build later in the chapter.


    While there will be a hardware component to this chapter, much of it will piggyback
    off of what you learned in Chapter [5](#346879_2_En_5_Chapter.xhtml). Unlike the
    Arduino, you will not have to install a special IDE to connect to the Raspberry
    Pi. However, you will have to spend a little bit more time on the setup, to get
    `HomeBridge` working correctly.


    ## Putting Together the Hardware


    For this project, the hardware requirements are a Raspberry Pi capable of running
    `HomeBridge` and a temperature sensor to read the temperature of the room the
    Pi is located in. In Table [7-1](#346879_2_En_7_Chapter.xhtml#Tab1), I have included
    the list of parts that I used when putting together the circuit for this project.


    Table 7-1


    List of Parts for the HomeBridge Project


    | **Part Name** | **Quantity** | **Mouser Part #** |

    | --- | --- | --- |

    | Raspberry Pi 3 (or newer) | 1 | RPI3-MODBP-BULK |

    | Solderless breadboard | 1 | 854-BB170-WH |

    | Breadboard jumper wire pack | 1 | 713-110990049 |

    | DHT22 temperature sensor | 1 | 485-385 |

    | microSD USB reader/writer | 1 | 485-939 |

    | 16GB (or larger) microSD memory card | 1 | 467-SDSDQAD-016G |


    To revisit Chapters [5](#346879_2_En_5_Chapter.xhtml) and [6](#346879_2_En_6_Chapter.xhtml)
    for a second, one of the greatest benefits to come out of the popularity of IoT
    applications in the last few years is the increased availability to hobbyists
    of low-cost sensors. As you will notice in the part list, I selected the DHT22
    temperature/humidity sensor module for our project. In one package, it bundles
    the integrated circuit for the humidity sensor, its supporting parts (for example,
    capacitors, resistors), and provides a simple three-pin interface consisting of
    a power pin, ground pin, and data pin. While you can hook up the sensor directly
    to the Pi’s header pins, I recommend using a breadboard to make the circuit easier
    to move around and reconfigure in the future.


    In the part list, I have specified “any modern, wireless-enabled Raspberry Pi.”
    In order to run `HomeBridge`, not only must your host device be able to run a
    `Node.js` server, it also requires Wi-Fi and Bluetooth, to communicate with your
    HomeKit hub (an iPad, HomePod, or Apple TV in your home). While the scripts and
    instructions provided in this chapter will run on any Raspberry Pi capable of
    running a recent distribution of the Raspbian Linux distribution, the Raspberry
    Pi 3 and Raspberry Pi Zero W were the first devices to include Bluetooth and Wi-Fi
    onboard. If you have a Raspberry Pi 2 or Pi Zero, on which you have already configured
    USB Bluetooth and Wi-Fi modules, you are more than welcome to use them here.


    On a related note, if you are not familiar with how the Raspberry Pi works, it
    requires a microSD card to run its system image. It comes with a small bootloader,
    but it is only capable of starting up the image on your microSD card. For the
    power supply, you can use any device capable of outputting 5V DC, such as the
    USB port on a computer, a portable battery, or a USB wall wart power adapter.


    When collected, your parts should resemble those in the photo in Figure [7-1](#346879_2_En_7_Chapter.xhtml#Fig1).
    I used a Raspberry Pi 3 for my implementation, as I think it is the easiest to
    acquire, and its large size makes it very easy to work with.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig1_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Collected parts for the IOTHome project'
