  trans: '

    ### 连接到你的新 HomeKit 桥接器


    在经历了设置树莓派、HomeBridge、其插件以及创建配置文件这一漫长而艰巨的过程后，现在你终于可以启动 HomeBridge，并尝试在 iOS 的“家庭”App
    中找到你的新 HomeKit 桥接器了。


    首先，在你的树莓派上启动 HomeBridge。通过运行命令 `homebridge -D &`（这些选项会提供更多调试信息，并让应用在后台运行）即可完成
    HomeBridge 的标准安装。如果你已经完成了启动服务的设置，那么通过运行命令 `sudo systemctl start homebridge` 即可启动。接下来，需要监控控制台输出，确保
    HomeBridge 在启动过程中没有报错。对于标准安装，这些信息会在 HomeBridge 启动时显示在终端中。对于启动服务安装，你需要通过命令 `sudo
    journalctl -au homebridge` 来监控其状态。当 HomeBridge 成功启动后，你应该会看到日志消息，表明蓝牙和 DHT 传感器接口已成功建立，更重要的是，还会看到一个大型二维码，你可以使用它从“家庭”App
    来设置桥接器，如图 7-13 所示。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig13_HTML.jpg](img/346879_2_En_7_Fig13_HTML.jpg)


    图 7-13


    HomeBridge 为 HomeKit 配置生成的二维码


    接下来，在你的 iPhone 或 iPad 上打开“家庭”App。它应该会以选中“家庭”标签页的状态启动，显示你当前已配置的 HomeKit 家庭和设备的概览。如图
    7-14 所示，按下右上角的“添加”按钮（+ 号），然后从出现的操作列表中选择“添加配件”。这将带你进入一个带有相机视图的屏幕，你可以用它扫描 HomeKit
    设置二维码。此时，扫描 HomeKit 控制台输出中显示的二维码。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig14_HTML.jpg](img/346879_2_En_7_Fig14_HTML.jpg)


    图 7-14


    使用“家庭”App 添加 HomeKit 配件


    当“家庭”App 识别出二维码后，你会收到一个弹出窗口，询问你是否确认要添加一个非官方的 HomeKit 设备。这表示 HomeBridge 已成功将你的桥接器作为有效的
    HomeKit 设备进行广播。如果“家庭”App 无法识别你的二维码，你可以使用“添加配件”屏幕上的“没有或无法扫描代码”按钮，手动输入 HomeBridge
    配置文件中的 PIN 码。如果你的设备设置正确，成功输入 PIN 码后应该能找到你的设备，并显示相同的弹出窗口。


    确认你的选择后，屏幕上会出现“正在添加...”的消息，持续几秒钟，同时桥接器正在被注册到 HomeKit 数据库中。如图 7-15 所示，注册完成后，系统会要求你为通过桥接器暴露的每个服务分配房间和显示名称。针对我的配置，我将温度和湿度服务分配给了卧室，门传感器分配给了入口。这样我就可以说“入口的门开关是开着的吗？”或者“卧室的温度是多少？”。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig15_HTML.jpg](img/346879_2_En_7_Fig15_HTML.jpg)


    图 7-15


    为新的 HomeKit 设备分配详细信息


    设置完成后，你将返回到“家庭”标签页。如图 7-16 所示，该标签页现在将包含来自你 HomeKit 桥接器的服务，以及每个服务的最新数值。作为最后一项测试，说“嘿，Siri”以激活
    Siri，然后询问你卧室的温度。几秒钟后，Siri 应该会读出树莓派上的最新数值。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig16_HTML.jpg](img/346879_2_En_7_Fig16_HTML.jpg)


    图 7-16


    使用“家庭”App 和 Siri 确认 HomeKit 桥接器正常运行


    ### 排查配置问题


    在编写本章时，我遇到的最常见的调试问题是，更改 HomeBridge 配置后，即使重启了所有设备，HomeKit 也无法找到新的服务。为了解决这个问题，我找到了两个最快捷的技巧：更改
    HomeKit 桥接器的 `username`，以及清空 HomeBridge 配置目录中的 `persist` 文件夹（路径为 `~/.homebridge/persist`
    或 `/var/lib/homebridge`，具体取决于你的启动方法）。


    如本章开头所述，HomeKit 是一个安全的设备数据库，由你的 Apple 设备和 HomeKit 中枢管理。与此相辅相成，HomeBridge 将已保存设备的信息存放在其
    `persist` 文件夹中。清空此文件夹会重置树莓派上已保存的信息。虽然你可以通过 iOS 设备上的“家庭”App 删除并重新添加设备，但你无法自行完全擦除其数据库。但是，通过更改用户名的某些字节（例如，将最后两位数字从
    30 改为 31），你可以让 HomeKit 认为你正在连接一台新设备，从而允许你重新进入配置流程。


    ## 总结


    在本章中，你学习了如何利用树莓派单板计算机的能力，运行 HomeBridge 作为一个基于 Node.js 的 HomeKit 桥接器，用于你在第 5 章和第
    6 章中构建的门传感器以及温度传感器。这不仅扩展了你 IOTHome 的智能功能，还使你能够利用 Siri 命令来获取家庭传感器的统计数据。


    本章最艰巨的部分是引导树莓派、HomeBridge 及其所有依赖项，但我希望你能够在自己的项目中再次使用本章作为快速设置指南。在后续章节中，你将进一步扩展树莓派的功能，将其打造成一个网络服务器。对于一台
    35 美元的电脑来说，这已经很不错了！


    本章中的说明是针对树莓派优化的，但稍加修改即可适用于 BeagleBone、Mac 或任何其他可以运行 Node.js 的基于 Linux 的系统。

