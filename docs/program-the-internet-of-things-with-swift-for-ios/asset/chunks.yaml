    class only, but all of the same logic can be copied directly into the `WorkoutMapViewController`
    class , with a few exceptions, which I will point out throughout the chapter.


    To make the security view visible to the user, you must bring it to the top of
    the view hierarchy when the `WorkoutTableViewController` or `WorkoutMapViewController`
    classes become active. In Listing [11-3](#346879_2_En_11_Chapter.xhtml#PC3), I
