    ### 发起并响应 HTTPS 请求


    现在 Home View Controller 的用户界面已经准备就绪，你可以开始处理项目的网络代码了。在第 6 章中，你创建了一个 `BluetoothService`
    类来简化 Door View Controller 中的蓝牙连接。在本项目中，你将采用类似的模式，创建一个 `NetworkManager` 类来管理应用中的网络连接。与
    `BluetoothService` 不同，`NetworkManager` 需要被应用的 `HomeManager` 和 `AppDelegate` 类访问，并且无论哪个调用者访问，其状态都必须保持一致。为简化起见，在本项目中，我将通过单例（一个懒加载的全局对象）来实现这一行为。我在代码清单
    8-16 中给出了该类的初始实现。


    ```swift

    import Foundation

    class NetworkManager: NSObject {

    static let shared = NetworkManager(urlString:

    "https://raspberrypi.local")

    let baseUrl: URL

    init(urlString: String) {

    guard let baseUrl = URL(string: urlString) else {

    fatalError("无效 URL 字符串")

    }

    self.baseUrl = baseUrl

    }

    }

    ```


    `代码清单 8-16`

    `NetworkManager` 作为单例的初始实现


    单例在 Apple 开发者社区中是一个有争议的话题，因为它本质上是在全局范围内共享。但就本章而言，单例是一个便捷的选择，因为它没有副作用，并且我想重现 Apple
    访问硬件 API 的方法（在整个 iOS 中使用单个对象管理一个资源，例如 GPS、摄像头）。如果你对单例的替代方案感兴趣，我建议研究一下依赖注入。依赖注入并非
    Apple 提供的一等设计模式，因此在选择适合你应用的库或实现时，应谨慎行事。


    在 Swift 中，单例通过向对象添加一个静态属性来实现，该属性返回该类的一个已初始化实例。如果该对象之前已被初始化，则返回现有对象；否则，将初始化一个新对象。这被称为*懒加载*。对于我的初始化器，我只需要使用网络请求的基础
    URL 来初始化该类。至于基础 URL，与我的示例一样，使用设备的 Bonjour 名称。截至撰写本文时，Raspbian 默认启用了 Bonjour。Bonjour
    允许 Apple 设备通过域名而非 IP 地址来查找网络上的设备。


    对于网络实现，先从最简单的端点开始（温度）。要查询温度，只需向 `/temperature` 端点发送一个 `GET` 请求。在 iOS 中，此操作通过 `URLSession`
    类完成。与 `NetworkManager` 一样，这个对象也是一个单例。`URLSession` 类将网络操作分为三大类：数据任务、上传任务和下载任务。顾名思义，上传和下载任务适用于长时间运行的文件上传或下载。对于短时间运行的操作（例如
    Web 服务器 API 调用），数据任务是最合适的选择。由于来自 Raspberry Pi 的所有 API 响应均返回 JSON 数据，你可以将网络调用封装在一个方法中。在代码清单
    8-17 中，我为这些调用创建了基础方法：`request(endpoint:httpMethod:completion:)`。其参数包括端点扩展名和表示方法类型的字符串，并返回一个包含服务器响应（或错误）的
    JSON 字典。

