    In this function, the first challenge I had to tackle was making sure the sample
    was a `HKWorkout` object. In order to make a generic completion handler, Apple
    must use a type general enough to handle all sample data. However, for the purposes
    of IOTFit, the type I had to work with was `HKWorkout`. Next, I had to extract
    simple data types from `HKSample` objects. To cast the data down, I used the `doubleValue(for:)`
    method and specified the unit to convert from. If the operation fails, I return
    `0` as a default value. The final challenge was to convert the `HKWorkoutType`
    property to a `String` with which to build a `Workout` object. This, however,
    was easily taken care of with a `switch()` statement.


    ### Using a Table View Controller to Display Data


    The final step in this chapter is to display the workout history. For many data-based
    apps, a Table View Controller is a great choice for letting users interact with
    the data. Out of the box, it provides you with a scrolling user interface, an
    easy way to display results in a uniform manner (cells), and components that you
    can easily customize through Interface Builder. The difficulty, however, is that
    the setup code for the `UITableViewController` class is very *protocol*-heavy
    and can be intimidating for newer iOS developers. In learning how to display the
    workout results for IOTFit on a table, you will learn three fundamental skills
    for working with the `UITableViewController` class that you can apply to other
    apps: adding a Table View Controller from Interface Builder, setting up the `UITableViewDataSource`
    delegate methods for populating the table, and setting up the `UITableViewDelegate`
    delegate methods for displaying the workout content in each cell.


    To begin, use Xcode’s template feature to create a new `UITableViewController`subclass.
    As in the case of the examples in Chapters [1](#346879_2_En_1_Chapter.xhtml) and
    [2](#346879_2_En_2_Chapter.xhtml), go to the File menu, then select New ➤ File
    and, from the template picker, choose Cocoa Touch Class, as shown in Figure [4-6](#346879_2_En_4_Chapter.xhtml#Fig6).


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig6_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Creating a new Cocoa Touch class


    Next you will be asked to name the new class and select a base class. As shown
    in Figure [4-7](#346879_2_En_4_Chapter.xhtml#Fig7), name the new file `WorkoutTableViewController`
    and choose `UITableViewController` as the base class.


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig7_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig7_HTML.jpg)


