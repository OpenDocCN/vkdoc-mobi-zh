- fmt: '### Resolving Auto Layout Issues


    The `Map` was added successfully to the `View Controller`, as indicated in Figure
    [1-32](#346879_2_En_1_Chapter.xhtml#Fig32), but the frame was not as you might
    have expected (a small centered rectangle instead of a full-screen one). Don’t
    worry! You did nothing wrong.


    One of the issues raised by the introduction of the iPhone X (Apple’s first bezel-less
    phone) is developers’ need to detect the new edges of the phone. To make things
    more complicated, the top edge is interrupted by a sensor bar, and the bottom
    edge shares space with the new iOS app switcher. To address this issue, Apple
    introduced the concept of *safe areas* to iOS 11. Safe areas in storyboards act
    as new boundaries for Auto Layout. When you pin an item to a safe area, the system
    will take care of the logic required to work around the “unsafe” areas on the
    iPhone X. Safe areas can be used on storyboards for all iOS devices.


    Unfortunately, sometimes Apple is not ready with all of its APIs, or there is
    a conflict in how these rules should be applied, such as with the `Map View` in
    this example. To resolve this, I will introduce techniques I like to use to obviate
    Auto Layout conflicts in Interface Builder.


    The first place I look when I run into Auto Layout conflicts is the `Document
    Outline` (the left pane in `Interface Builder`). View Controllers with faulty
    Auto Layout constraints will have a red stop sign icon next to them, like the
    one that appears to the left in Figure [1-33](#346879_2_En_1_Chapter.xhtml#Fig33).
    If you click the stop sign icon, the `Document Outline` will drill down into that
    `View Controller` and provide the list of faulty constraints (often, it will be
    more than one). As shown in Figure [1-33](#346879_2_En_1_Chapter.xhtml#Fig33),
    clicking the stop sign one more time will provide you with a pop-up dialog suggesting
    a solution.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig33_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig33_HTML.jpg)


    Figure 1-33


    *Document Online pop-up for solving constraint issues*


    For this issue, the pop-up was not sufficient; another problem-solving technique
    is required. My second go-to fix would be to use the `Resolve Auto Layout Issues`
    tool at the bottom right of the `Interface Builder` Editor. As shown in Figure
    [1-34](#346879_2_En_1_Chapter.xhtml#Fig34), clicking this will provide you with
    a context menu that asks you to fill in missing constraints, delete all constraints
    for the selected view, or delete all constraints for the `View Controller`. In
    my experience, the best use of this tool is to reset the constraints for the troublesome
    view and then try to apply the constraints again. Many times, when you rearrange
    items in a `View Controller`, you unexpectedly break other constraints that depend
    on the old position. This tool provides a good way to create a clean slate for
    one view.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig34_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig34_HTML.jpg)


    Figure 1-34


    Presenting the `Resolve Auto Layout Issues` context menu


    Unfortunately, this did not solve the issue either. When nothing else goes right,
    I like to open up the `Size Inspector` tool for the troublesome view (indicated
    by the `Ruler` icon in the right-hand side utilities pane), and I like to start
    manually modifying values until the warnings disappear. As shown in Figure [1-35](#346879_2_En_1_Chapter.xhtml#Fig35),
    you can edit values by typing new ones into the text fields or by clicking `Edit`,
    next to a constraint, to bring up a pop-up with its properties.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig35_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig35_HTML.jpg)


    Figure 1-35


    Using the `Size Inspector` to modify constraints


    For the `Map View`, the issue was that the constraints did not pin the top and
    bottom positions of the view, so I set the `y` position to `0` (the top of the
    screen) and make the height match the height of the screen. I verified it by making
    sure the `Document Outline` warnings disappeared.


    After resolving the Auto Layout issues, the final storyboard for the project should
    look similar to Figure [1-36](#346879_2_En_1_Chapter.xhtml#Fig36).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig36_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig36_HTML.jpg)


    Figure 1-36


    Completed storyboard for IOTFit project


    ## Connecting the Storyboard to Your Code


    Although the completed storyboard is beautiful, right now it will not do anything
    if the user presses any of the buttons, because the new user interface objects
    are not attached to any code. In Xcode, the way you connect your code to your
    storyboards is by defining properties and methods that must interact with Interface
    Builder, using special keywords (`IBOutlet`, `IBAction`). Then, you find these
    items in `Interface Builder` and drag-and-drop connections between the storyboard
    and your code.'
