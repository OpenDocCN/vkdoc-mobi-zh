    To make the user experience more streamlined, I added calls to request the outside
    weather conditions, along with the other network requests, and when the current
    location is confirmed. As it can take a few seconds to confirm the user’s location,
    the call in the location delegate will enable you to display valid data the first
    time the user loads the application.


    OpenWeatherMap provides a free end point (`/forecast`) and a paid end point (`/forecast/daily`)
    for getting the daily forecast. The paid end point is significantly more convenient
    to use, but to expand the access of this book, I will cover using the free end
    point. The API documentation for the `/forecast` end point is available at [`https://openweathermap.org/forecast5`](https://openweathermap.org/forecast5)
    . In Listing [9-13](#346879_2_En_9_Chapter.xhtml#PC14), I have expanded the Network
    Manager to include a method for calling the `/forecast` end point. There are no
    surprises here; it closely resembles the `/weather` end point.


    ```swift

    class NetworkManager: NSObject, URLSessionDelegate {

    ...

    func getForecast(latitude: String, longitude: String,

    completion: @escaping (_ jsonDict: [String: Any]) ->

    Void) {

    let parameters = ["appid": opmApiKey,

    "lat": latitude,

    "lon": longitude,

    "units": "metric"]

    request(baseUrl: opmBaseUrl, endpoint: "forecast",

    httpMethod: "GET", parameters: parameters) {

    (resultDict: [String: Any]) in

    completion(resultDict)

    }

    }

    }

    Listing 9-13

    Adding a Method for Requesting the Forecast from OpenWeatherMap

    ```


    The response provides the daily forecast for five days, in three-hour blocks.
    Within the record for each block, you can find a human-readable description of
    the condition (for example: Sunny) and detailed statistics ranging from minimum
    temperature to barometric pressure. In Listing [9-14](#346879_2_En_9_Chapter.xhtml#PC15),
    I have provided an extremely abbreviated sample of one of these responses.


    ```json

