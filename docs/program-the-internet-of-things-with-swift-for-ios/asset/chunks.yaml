    old sensor value as a global variable and to trigger the Bluetooth update only
    if a device is connected to the peripheral and the value has changed since the
    last update.


    ```

    void loop() {

    // put your main code here, to run repeatedly:

    checkSensor();

    checkBattery();

    delay(1000);

    }

    ...

    void checkSensor() {

    int currentState = digitalRead(SWITCH_PIN);

    if (currentState != switchState) {

    updateLockBLE(currentState);

    }

    switchState = currentState;

    digitalWrite(RED_LED_PIN, switchState);

    Serial.print("Sensor state: ");

    Serial.println(switchState);

    }

    ...

    void updateLockBLE(bool currentState) {

    uint8_t value = 0;

    if (deviceConnected) {

    value = currentState ? 1 : 0;

    lockCharacteristic->setValue(&value, 1);

    lockCharacteristic->notify();

    }

    }

    Listing 6-8

    Posting Magnetic Sensor Updates from the Arduino Solution

    ```


    For the `checkBattery()` method , you can use the same process; however, you will
    have to adjust the logic for detecting changes in status. In practice, you will
    notice the battery level continuously decreasing as the sensor stays powered on.
    This is normal, but for the sake of users, it is best to notify them only about
    noticeable changes. In Listing [6-9](#346879_2_En_6_Chapter.xhtml#PC9), I have
    updated the solution to save the old battery value (just as with the magnetic
    sensor), but instead of sending a notification every time the value changes, I
    only send it when the battery level is at least 5% lower than the previous reading.


    ```

    void checkBattery() {

    float currentLevel = analogRead(BATTERY_PIN);

    currentLevel = ((currentLevel / 4095) * 2 * 3.3 *

    1.1) * 100 / 4.3;

    if (currentLevel + 5.0 setValue(string);

    battCharacteristic->notify();

    }

    }

    Listing 6-9

    Posting Battery Updates When the Level Decreases More Than 5%

    ```


    With these steps, the Arduino solution in this chapter is complete. From here
    on out, you will focus on how to build an app that connects to the sensor you
    created and read the values it transmits.


    ## Using Core Bluetooth to Communicate with Bluetooth LE Devices


    As mentioned at the beginning of the chapter, Apple provides the Core Bluetooth
    framework to help you connect to Bluetooth devices quickly and safely, using their
    APIs. Instead of focusing on pouring over the Bluetooth specification to implement
    basic communication yourself, you can focus on the business logic directly, just
    as you did with the ESP32 BLE library for the Arduino solution. In this half of
    the chapter, I will quickly walk you through the setup of the IOTHome project,
    which will be used as the base for the remaining projects in this section, and
    then introduce the following steps for setting up an app that connects to a Bluetooth
    LE accessory:


    *   Adding the Bluetooth background service permission to the project


    *   Discovering and connecting to Bluetooth devices


    *   Monitoring Bluetooth characteristic updates


    *   Responding to Bluetooth characteristic updates while the app is backgrounded


    As with previous projects in the book, the goals here are not only to learn some
    useful skills for yourself but also how to apply them to provide a convenient
    user experience in the future.'
