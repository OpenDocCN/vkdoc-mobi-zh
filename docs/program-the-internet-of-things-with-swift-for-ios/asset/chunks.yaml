- fmt: '#### Assembling the Circuit


    Putting together the circuit for this project is very straightforward. As shown
    in Figure [7-2](#346879_2_En_7_Chapter.xhtml#Fig2), you primarily have to connect
    the temperature sensor''s `VCC` and `GND` pins to those on the Pi, then connect
    the `DATA` pin to any available general-purpose input/output (`GPIO`) pin on the
    Raspberry Pi. For this project, I chose `GPIO21` (Pin 40).


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig2_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Schematic for the IOTHome project


    To make the connections, I used male-to-female header cables. I connected the
    female ends to the header on the Pi and the male ends into the breadboard. From
    there, I connected the `DHT22` temperature sensor directly to the breadboard.
    I have attached a photograph of my completed circuit in Figure [7-3](#346879_2_En_7_Chapter.xhtml#Fig3).
    Once again, I used color-coded header cables and breadboard jumper wires to help
    me quickly debug the circuit.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig3_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Photograph of completed circuit for the IOTHome project


    ### Bootstrapping the Raspberry Pi


    Now that the helper circuit is completed for the project, you can begin to bootstrap
    the Raspberry Pi. *Bootstrapping* is a term used in Linux and embedded systems
    to refer to preparing a system to turn on for the first time ("bringing it up
    by the bootstraps").


    As I mentioned earlier, the bootloader on the Raspberry Pi is only capable of
    booting up whatever is on the microSD card inserted into the device. For this
    project, you will use the Raspbian Linux distribution, provided by the Raspberry
    Pi Foundation, as the operating system for the Raspberry Pi. If you have ever
    used Ubuntu on a desktop computer before, you will be very familiar with how Raspbian
    works, as it shares the same common relative: Debian Linux. Both distributions
    share the same package manager and architecture as Debian, with slight modifications
    for their intended use cases.


    To install Raspbian, the first step is to download a pre-built image file containing
    a pre-built, bootable instance of Raspbian from the Raspberry Pi Foundation''s
    web site (`www.raspberrypi.org/downloads/raspbian/`). As shown in Figure [7-4](#346879_2_En_7_Chapter.xhtml#Fig4),
    from the Downloads page, select Raspbian, Raspbian Stretch with Desktop, and then
    Download ZIP. The major difference between the Desktop and Lite distributions
    is that the Lite distribution sacrifices the GNOME Desktop graphical user interface,
    providing you with a command-line interface only. If you are comfortable with
    the command line, you are welcome to install the Lite version, but I recommend
    the full Desktop version, because GNOME makes the Pi easier to configure and reuse
    for other purposes later.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig4_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Downloading a Raspbian image from the Raspberry Pi web site


    Once the zip file has completed downloading, you will have to write it to the
    microSD card in a way that allows it to be recognized by the bootloader as a valid
    disk image. Disk images package the files for an operating system and any documents
    and configuration files that the creator feels are useful to consumers of the
    image. For Linux distributions, they provide a useful way to share a distribution
    with end users without forcing them to go through a lengthy, sensitive installation
    process. A skilled engineer builds a system he or she feels is an appropriate
    starting place for most users and then shares it. However, if the disk image is
    not unpacked and installed in the correct way, it will be unusable by the target
    computer. The tool I prefer for burning Raspberry Pi images to microSD cards is
    Etcher (`https://etcher.io`). It has an easy-to-understand user interface and
    high reliability rate. As shown in Figure [7-5](#346879_2_En_7_Chapter.xhtml#Fig5),
    after installing Etcher, insert the microSD card into the adapter on your Mac
    and open Etcher. From its single-screen user interface, select the ZIP file for
    the Raspbian image and the drive corresponding to the microSD card, then select
    Flash! to begin the image-burning process. If your microSD card is not appearing
    in Etcher, please check that both the microSD card and adapter are securely attached
    to your Mac.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig5_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Burning a Raspbian image to a microSD card using Etcher


    Etcher will play a sound and present a pop-up to inform you that the disk image
    has been written successfully. At this time, it is safe to remove the microSD
    card from your Mac and insert it into the slot at the bottom of the Raspberry
    Pi, as shown in Figure [7-6](#346879_2_En_7_Chapter.xhtml#Fig6). At this time,
    you should also plug an HDMI-based monitor and USB keyboard/mouse into the Raspberry
    Pi.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig6_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Inserting a microSD card into the Raspberry Pi


    Once all of these preparations are complete, connect your power source to the
    USB port marked `PWR` and wait a minute or two for the GNOME desktop to boot up.
    When the desktop is ready, the image on your monitor should resemble Figure [7-7](#346879_2_En_7_Chapter.xhtml#Fig7).


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig7_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Screenshot of desktop for freshly installed Raspbian distribution


    As shown in Figure [7-8](#346879_2_En_7_Chapter.xhtml#Fig8), find the Wi-Fi icon
    at the top right of the system tray, then click it to present the network selection
    drop-down menu. Select your network, then enter in the password when prompted.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig8_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Selecting a WiFi network from the Raspbian desktop


    For the final configuration step, you must enable the hardware interfaces on the
    Pi, using the Raspberry Pi configuration tool. This will allow you to access the
    `I2C`, `SPI`, and other hardware communication libraries that are preinstalled
    on Raspbian but disabled by default for security reasons. As shown in Figure [7-9](#346879_2_En_7_Chapter.xhtml#Fig9),
    to find this tool, click the raspberry icon at the top-left of the system tray,
    navigate to Preferences, and then select Raspberry Pi Configuration. From the
    application that appears, click the Interfaces tab, then click the `SPI`, `I2C`,
    and `1-Wire` check boxes, to enable them. After you click OK, you will be asked
    to restart the Pi to save the settings.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig9_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Enabling hardware interfaces on the Raspberry Pi


    If you want to use a remote desktop client such as RealVNC or TightVNC to view
    your Pi''s desktop without connecting to a monitor, you can enable this in the
    configuration tool as well. The next time the Pi restarts, the RealVNC server
    application will start up and prompt you to configure the VNC settings for the
    device.'
