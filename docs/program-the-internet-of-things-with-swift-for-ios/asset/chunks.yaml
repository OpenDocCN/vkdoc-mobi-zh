    ### 注意


    在研究本章内容时，我注意到树莓派上的蓝牙工具在进行多次连接调试后，会无法维持连接。如果你的门磁传感器无法通过其蓝色状态 LED 灯报告连接成功，请尝试重启树莓派，然后再次尝试。


    要使用 HTTP 暴露数据，请创建一个 `/door/status` 端点。当该端点被调用时，返回全局变量中保存的值，并将其包装在 JSON 字典中，如清单
    8-10 所示。为了强制实施 API 的连接流程，如果设备连接尚未建立，则返回一个错误。


    ```

    app.get(''/door/status'', function (req, res) {

    console.log("开始连接");

    if (savedPeripheral) {

    res.json({

    ''lockStatus'': lockStatus,

    ''batteryStatus'': batteryStatus,

    ''lastUpdateTime'': lastUpdateTime

    });

    } else {

    res.status(500).json({error: ''未连接至传感器。请重新连接后重试。''});

    }

    });

    清单 8-10

    使用 Noble 从蓝牙外设读取数据

    ```


    为了完善 Node 应用程序，你必须创建 `/door/disconnect/` 端点。如清单 8-11 所示，在我的实现中，当该端点被调用时，我会断开与设备的连接。为安全起见，我还会停止扫描
    BLE 设备，以防在连接完全建立之前调用了此方法。


    ```

    app.post(''/door/disconnect'', function (req, res) {

    noble.stopScanning();

    console.log("停止扫描");

    if (savedPeripheral) {

    console.log(''已断开连接'');

    savedPeripheral.disconnect();

    }

    res.json({

    ''status'': ''已断开连接''

    });

    });

    清单 8-11

    使用 Noble 断开与蓝牙外设的连接

    ```


    在继续之前，你可能想知道如何测试基于 `POST` 的端点。对于此任务，我建议从 [`www.getpostman.com/`](http://www.getpostman.com/)
    下载 Postman OS X 应用程序。如图 8-4 所示，配置好请求后，只需单击“发送”按钮即可开始调试会话。请求的结果将出现在窗口底部的大文本字段中。你可以从窗口左侧的侧边栏访问历史请求列表（及其配置）。


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig4_HTML.jpg](img/346879_2_En_8_Fig4_HTML.jpg)


    图 8-4


    使用 Postman 验证 `POST` 请求


    ### 使用 HTTPS 提供安全的 HTTP 连接


    为了提升用户数据的隐私性并减少互联网上的钓鱼（虚假身份）攻击，自 2016 年起，苹果、谷歌及其他主要科技公司宣布其平台将主要转向支持实现 HTTPS 的服务器。HTTPS
    是 HTTP 的扩展，要求所有数据都使用传输层安全性协议进行加密。TLS 通过向服务器添加安全套接层证书来实现，该证书需由主流浏览器及你的平台（例如 iOS）所信任的提供商签发的
    SSL 证书。


    在谷歌 Chrome 浏览器中，不使用 HTTPS 最明显的影响之一是，你的网站在谷歌搜索排名中会显示得更靠后。此外，带有不受信任 TLS 证书的网站将被标记为`不安全`，并在浏览器中加载时向用户显示警告页面。在
    iOS 中，苹果通过使应用程序内的所有 HTTP 请求失败来强制执行 HTTPS，除非开发者手动重新启用它们。此外，所有不受信任的 HTTPS 请求也会失败。


    为了解决这些限制并提高 IOTHome 设备的安全性，你应该扩展 Node 应用程序以支持 HTTPS。与该项目中的其他功能类似，你可以利用为 Web 应用程序开发的
    Node 模块和工具，轻松地为 IOTHome 项目添加 HTTPS 支持。


    在你的项目中实现 HTTPS 主要有三种选择。


    1. 如果你为生产环境进行开发，你必须向受互联网工程任务组（即维护 HTTPS 标准的组织）信任的服务商请求 SSL 证书。我推荐使用 Comodo、Verisign，或来自亚马逊云服务的证书。这些提供商提供的证书兼容性最好，并附有清晰的说明和支持。


    2. 如果你想开发一个生产级别的原型并且已拥有域名，你可以使用 Let’s Encrypt 信任机构（ [`www.letsencrypt.org`](http://www.letsencrypt.org)
    ）及其配套工具 `certbot-auto` ( [`https://certbot.eff.org/docs/install.html`](https://certbot.eff.org/docs/install.html)
    )，为测试生成免费的受信任 SSL 证书。


    3. 仅用于原型开发目的，你可以在树莓派上使用 OpenSSL 自行生成 SSL 证书。


    就本书而言，我选择了选项 #3。如果你想使用选项 #1 或 #2，我建议在你域名所关联的服务器上创建这些证书，然后将其复制到树莓派上（前提是你的 SSL 提供商允许此功能）。

