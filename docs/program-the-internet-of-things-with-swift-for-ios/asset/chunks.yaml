- fmt: '### Running and Monitoring the Arduino Solution


    Now that the Arduino hardware and its control software are complete, the only
    step left is to try to run the program and see if the sensor is performing its
    functions correctly: turning on a switch when the magnetic sensor is open and
    regularly reporting the voltage level of the connected battery.


    When you were writing your Arduino solution, you may have found yourself constantly
    saving the program. If you were adventurous, you may have tried to compile it
    a few times, to see if the code was valid. To fully take advantage of the Arduino
    IDE, refer to Figure [5-18](#346879_2_En_5_Chapter.xhtml#Fig18), for a more detailed
    description of its user interface.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig18_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig18_HTML.jpg)


    Figure 5-18


    Identifying the Run button and Serial Monitor in the Arduino IDE


    Unlike Xcode, you will notice that the Arduino has two Run buttons—Verify and
    Upload. The Verify button performs compilation only, operating like the `Build`
    command in Xcode, allowing you to check if your code compiles and fulfills basic
    runtime requirements, such as fitting within the available storage on the target
    device. The Upload button compiles the solution and uploads it to the target device’s
    hardware. Because the HUZZAH32 is an Arduino-compatible device, the scripts you
    installed earlier are used in this step to complete the upload to the device.
    At the far right of the top bar, you will find the Serial Monitor button. This
    adds output from the UART port to the Debug Console pane at the bottom of the
    IDE, if it is not already present. When new messages are ready from the compiler
    or device, they will appear in this pane.


    To begin debugging the application, click the Upload button. In the serial console,
    you should see a series of messages indicating the upload progress. After the
    upload has completed successfully, you should see the switch and battery status
    being printed out once per second (the duration of the delay in the `loop()` method).
    You should also be able to turn on the red LED by opening the magnetic switch.
    The Arduino solutions run continuously after they are uploaded, so you do not
    have to re-upload the solution every time you want to run it. Simply power the
    device, and the `start()` and `loop()` methods will start executing immediately.


    ### Troubleshooting Compilation


    Before I was an iOS developer, I worked in embedded systems. The most frustrating
    and time-consuming part of the process was always trying to get the program to
    run for the first time. Following, I have included some of most common problems
    I encountered when I was trying to run solutions on the Arduino devices.


    **The circuit is working correctly, but the serial console is showing junk characters.**


    Serial communication is only able to work when the sender and receiver are communicating
    at the same frequency (literally!). To resolve this issue, verify that the serial
    monitor is set to the same value you used to configure the serial Port in the
    Arduino solution. For the door monitor, you can find it in the serial Port initialization
    code:


    ```

    Serial.begin(9600);

    ```


    **The Arduino IDE is uploading the solution successfully, but I am unable to see
    serial messages or get the switch to work.**


    This problem is frustrating because it prevents you from verifying the behavior
    of the program. In my experience, there are two common causes for this error:


    1.  The device needs to be reset. This is a simple operation to perform. Simply
    press the Reset button on the HUZZAH32 chip while it is still connected to power.
    When the device restarts, you should see the correct output in the serial monitor
    and on the circuit.


    2.  You must hold down the Reset button while uploading the solution to the HUZZAH32.
    On older ESP32-based boards, Espressif requires the Reset signal to be held down
    to a negative value during programming. If the hardware is stuck in a state in
    which you cannot reprogram the device, or the program is not running, try holding
    down the Reset button of the device during the entire duration of the Upload operation.
    This should re-enable programming the chip.


    **The Arduino IDE is unable to find the serial port for the HUZZAH32.**


    This is the most frustrating issue to track down. The HUZZAH32 may be working
    during one programming session and suddenly become unresponsive. In my experience,
    this issue is often caused by the OS X USB-to-Serial driver for the HUZZAH32,
    rather than your hardware itself. As the vast majority of modern computers no
    longer ship with Serial (RS-232) ports, device manufacturers use an integrated
    circuit to transmit serial signals over USB. Because the community of users who
    need this functionality is small compared to general users, the drivers are often
    unstable. To fix this problem, I recommend rebooting your Mac and then trying
    to plug the HUZZAH32 into your computer again, after the reboot completes.


    Much like debugging connected devices on Xcode, once you are able to identify
    the symptoms of a connection issue, it becomes a trivial matter to resolve it.


    ### Summary


    In this chapter, you learned how to make your first sensor using an Arduino. On
    the hardware side, you learned how a breadboard can help you connect components
    without soldering. With the exception of pull-down resistors, which are used to
    stabilize the signal from the switch, most of putting the circuit together is
    connecting dots from the schematic to the breadboard. On the software side, you
    learned that the Arduino IDE and the Arduino solutions operate much like simplified
    Swift applications. Instead of relying on `UIKit` or other Apple frameworks, most
    of the code you wrote in the Arduino solution took advantage of the GPIO and ADC
    pins on HUZZAH32 chip. In the `setup()` method, you configured the roles and modes
    for each pin you would use, then in the `loop()` method, you read the values and
    used them to turn pins on or off, to control the hardware. In the next chapter,
    you will extend this simple program to transmit this data to the companion iOS
    app over Bluetooth LE.


    # 6. Building a Bluetooth LE Hardware Companion App


    In Chapter [5](#346879_2_En_5_Chapter.xhtml), you dipped your toes into the world
    of embedded systems by building an Arduino-based wireless door sensor. In this
    chapter, you will continue your hardware engineering journey by developing the
    Bluetooth LE–based companion app for the door sensor. Bluetooth LE is an extremely
    popular radio-based communication protocol that allows devices to communicate
    at ranges up to 77 meters (~250 feet), with a very low-energy requirement, compared
    to other wireless communication methods (this is the LE part of Bluetooth LE).


    One of the wonderful things about iOS development today is that Apple’s Core Bluetooth
    framework includes everything you need to make your app communicate with (or as)
    a Bluetooth LE device, using the built-in Bluetooth hardware on your iOS devices.
    Beyond simply establishing the connection with the device, this chapter will also
    introduce you to some best practices for improving your users’ Bluetooth experience,
    such as saving the paired device and displaying messages from the hardware as
    push notifications on your users’ iOS devices. As with so many things in iOS,
    Apple provides theoretical guidance on implementation the Bluetooth LE stack in
    their documentation, but leaves the burden of the clarifying the implementation
    details up to the developers. To help fill this knowledge gap, in this chapter
    I will share what has worked best for me in the past.'
