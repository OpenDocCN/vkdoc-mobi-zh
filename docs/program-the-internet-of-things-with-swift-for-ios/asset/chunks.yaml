    \nTo add a key-value pair to a property list, click any row and then click the\
    \ plus (`+`) button. For project settings, a drop-down menu will appear with suggested\
    \ build settings keys. Scroll down the menu and select **Privacy - Location Always\
    \ and When In Use Usage Description** as shown in Figure [2-4](#346879_2_En_2_Chapter.xhtml#Fig4).\n\
    \n![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig4_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig4_HTML.jpg)\n\
    \n**Figure 2-4** Adding a key-value pair to the Info property list\n\nDouble-click\
    \ the blank space in the Value column for the new row and enter the text you would\
    \ like to display in the permission alert window. One of Apple’s App Store submission\
    \ guidelines is that your permission prompts describe your intended use of a protected\
    \ feature. For this application, I used the following string as my permission\
    \ prompt description:\n\n```\nIOTFit would like to use location permission to\
    \ plot your location during workouts. This information will not be shared outside\
    \ of the app.\n```\n\nThere are three variations for location permissions that\
    \ users can select in iOS: `Always`, `When In Use`, and `Always and When in Use`.\
    \ Create additional rows for the `Privacy - Location When In Use Usage Description`\
    \ and `Privacy - Location Usage Description` key-value pairs and specify the permission\
    \ prompts for those as well. When your work is complete, your output should be\
    \ similar to that in Figure [2-5](#346879_2_En_2_Chapter.xhtml#Fig5).\n\n![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig5_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig5_HTML.jpg)\n\
    \n**Figure 2-5** Completed Info property list, including all location permission\
    \ strings\n\n### Note\n\nThe position where your new key-value pairs appear in\
    \ the list has no impact on compilation.\n\n## Requesting Location Permission\n\
    \nNow that the project dependencies have been taken care of, you can start implementing\
    \ the logic to request location permission from the user. One of the most critical\
    \ questions you need to ask yourself at this point is: “Where should I place the\
    \ location permission pop-up?”\n\nTo begin answering this question, first take\
    \ a look at Figure [2-6](#346879_2_En_2_Chapter.xhtml#Fig6), to review the user\
    \ interface you built in Chapter [1](#346879_2_En_1_Chapter.xhtml). The user can\
    \ start or stop a workout by pressing the Start button and can pause or resume\
    \ a workout by pressing the Pause button. If users want to view their map, they\
    \ press the Second tab to switch to the Map View.\n\n![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig6_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig6_HTML.jpg)\n\
    \n**Figure 2-6** Completed IOTFit user interface from Chapter [1](#346879_2_En_1_Chapter.xhtml)\n\
    \nThe recent trend in mobile applications is to ask for a permission the first\
    \ time a user attempts to perform an action that requires the resource you want\
    \ to use. In the case of the IOTFit app, this would be the first time the user\
    \ presses the Start button. In addition to asking for location permission, at\
    \ that time, you would also update the user interface to indicate that the workout\
    \ has started. Once you have confirmed that everything is ready, you can start\
    \ recording the data for the user’s workout.\n\nThinking about the other activities\
    \ on the Create Workout View Controller (pausing and stopping the workout), these\
    \ would require additional user interface updates and some kind of mechanism to\
    \ pause the location and time tracking.\n\nIn Figure [2-7](#346879_2_En_2_Chapter.xhtml#Fig7),\
    \ I have created a flowchart that records all of these decisions. You will use\
    \ this throughout the chapter as a guide to implementing the behavior of the Create\
    \ Workout View Controller.\n\n![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig7_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig7_HTML.jpg)\n\
    \n**Figure 2-7** Flowchart for the Create Workout View Controller\n\nThe transition\
    \ between the Inactive and Active states is handled by the `toggleWorkout()` method,\
    \ which is tied to the Touch Up Inside event for the Toggle Workout button. The\
    \ code for the location request should be initiated there. To help jog your memory,\
    \ in Listing [2-1](#346879_2_En_2_Chapter.xhtml#PC2), I have provided the code\
    \ from the `CreateWorkoutViewController` class that was implemented in Chapter\
    \ [1](#346879_2_En_1_Chapter.xhtml).\n\n```\nimport UIKit\nclass CreateWorkoutViewController:\
    \ UIViewController {\n    @IBOutlet weak var workoutTimeLabel :UILabel?\n    @IBOutlet\
    \ weak var workoutDistanceLabel :UILabel?\n    @IBOutlet weak var toggleWorkoutButton\
    \ :UIButton?\n    @IBOutlet weak var pauseWorkoutButton :UIButton?\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n    }\n    override func\
    \ didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n    }\n\
    \    @IBAction func toggleWorkout() {\n        NSLog(\"Toggle workout button pressed\"\
    )\n    }\n    @IBAction func pauseWorkout() {\n        NSLog(\"Pause workout button\
    \ pressed\")\n    }\n}\n```\n\n**Listing 2-1** `CreateWorkoutViewController` Class\
    \ from Chapter 1\n\nTo represent the different states of the app, you can create\
    \ an enum that corresponds to the states in the flowchart. Inside the class, create\
    \ a property that uses the enum as its type. When the user presses the Start button,\
    \ update the state property and make the call to request location permission.\
    \ To implement this logic, update the `CreateWorkoutViewController` class, as\
    \ indicated in Listing [2-2](#346879_2_En_2_Chapter.xhtml#PC3).\n\n```\nimport\
    \ UIKit\nenum WorkoutState {\n    case inactive\n    case active\n    case paused\n\
    }\nclass CreateWorkoutViewController: UIViewController {\n    @IBOutlet weak var\
    \ workoutTimeLabel: UILabel?\n    @IBOutlet weak var workoutDistanceLabel: UILabel?\n\
    \    var currentWorkoutState = WorkoutState.inactive\n    ...\n    @IBAction func\
    \ toggleWorkout() {\n        switch currentWorkoutState {\n        case .inactive:\n\
    \            currentWorkoutState = .active\n            requestLocationPermission()\n\
    \        case .active:\n            currentWorkoutState = .inactive\n        default:\n\
    \            NSLog(\"toggleWorkout() called out of context!\")\n        }\n  \
    \      NSLog(\"Toggle workout button pressed\")\n    }\n    func requestLocationPermission()\
    \ {\n        NSLog(\"Location permission requested\")\n    }\n    ...\n}\n```\n\
    \n**Listing 2-2** Adding State Tracking to the `CreateWorkoutViewController` Class"
  raw: '### Note


    If you did not finish linking your Apple ID account to Xcode, you will not be
    able to successfully set any background modes.


    Although it would be convenient for everything to be managed on the same screen,
    you will have to switch to the Info tab, to edit the permission messages for the
    app. Click the Info tab in Project Settings. You will be presented with a property
    list editor populated with the default settings for your project, as shown in
    Figure [2-3](#346879_2_En_2_Chapter.xhtml#Fig3).


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig3_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Default property list within Info tab


    Property lists (`.plist` files) are XML-based text files. Configuration settings
    within a property list are stored as key-value pairs (dictionaries). Their ease
    of readability and ease of use make them Apple’s preferred method for managing
    optional project settings. This file is usually referred to by its file name,
    `Info.plist`.


    Although you can edit property list files in a text editor, Xcode provides the
    visual editor you saw in Figure [2-3](#346879_2_En_2_Chapter.xhtml#Fig3) to help
    make property list management even easier. This editor will show up for both auto-generated
    files (such as `Info.plist`) and files you create manually.


    To add a key-value pair to a property list, click any row and then click the plus
    (+) button. For project settings, a drop-down menu will appear with suggested
    build settings keys. Scroll down the menu and select Privacy - Location Always
    and When In Use Usage Description as shown in Figure [2-4](#346879_2_En_2_Chapter.xhtml#Fig4).


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig4_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Adding a key-value pair to the Info property list


    Double-click the blank space in the Value column for the new row and enter the
    text you would like to display in the permission alert window. One of Apple’s
    App Store submission guidelines is that your permission prompts describe your
    intended use of a protected feature. For this application, I used the following
    string as my permission prompt description:


    ```

    IOTFit would like to use location permission to plot your location during workouts.
    This information will not be shared outside of the app.

    ```


    There are three variations for location permissions that users can select in iOS:
    `Always`, `When In Use`, and `Always and When in Use`. Create additional rows
    for the `Privacy - Location When In Use Usage Description` and `Privacy - Location
    Usage Description` key-value pairs and specify the permission prompts for those
    as well. When your work is complete, your output should be similar to that in
    Figure [2-5](#346879_2_En_2_Chapter.xhtml#Fig5).


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig5_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Completed Info property list, including all location permission strings


    ### Note


    The position where your new key-value pairs appear in the list has no impact on
    compilation.


    ## Requesting Location Permission


    Now that the project dependencies have been taken care of, you can start implementing
    the logic to request location permission from the user. One of the most critical
    questions you need to ask yourself at this point is: “Where should I place the
    location permission pop-up?”


    To begin answering this question, first take a look at Figure [2-6](#346879_2_En_2_Chapter.xhtml#Fig6),
    to review the user interface you built in Chapter [1](#346879_2_En_1_Chapter.xhtml).
    The user can start or stop a workout by pressing the Start button and can pause
    or resume a workout by pressing the Pause button. If users want to view their
    map, they press the Second tab to switch to the Map View.


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig6_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Completed IOTFit user interface from Chapter [1](#346879_2_En_1_Chapter.xhtml)


    The recent trend in mobile applications is to ask for a permission the first time
    a user attempts to perform an action that requires the resource you want to use.
    In the case of the IOTFit app, this would be the first time the user presses the
    Start button. In addition to asking for location permission, at that time, you
    would also update the user interface to indicate that the workout has started.
    Once you have confirmed that everything is ready, you can start recording the
    data for the user’s workout.


    Thinking about the other activities on the Create Workout View Controller (pausing
    and stopping the workout), these would require additional user interface updates
    and some kind of mechanism to pause the location and time tracking.


    In Figure [2-7](#346879_2_En_2_Chapter.xhtml#Fig7), I have created a flowchart
    that records all of these decisions. You will use this throughout the chapter
    as a guide to implementing the behavior of the Create Workout View Controller.


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig7_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Flowchart for the Create Workout View Controller


    The transition between the Inactive and Active states is handled by the `toggleWorkout()`
    method , which is tied to the Touch Up Inside event for the Toggle Workout button.
    The code for the location request should be initiated there. To help jog your
    memory, in Listing [2-1](#346879_2_En_2_Chapter.xhtml#PC2), I have provided the
    code from the `CreateWorkoutViewController` class that was implemented in Chapter
    [1](#346879_2_En_1_Chapter.xhtml).


    ```

    import UIKit

    class CreateWorkoutViewController: UIViewController {

    @IBOutlet weak var workoutTimeLabel :UILabel?

    @IBOutlet weak var workoutDistanceLabel :UILabel?

    @IBOutlet weak var toggleWorkoutButton :UIButton?

    @IBOutlet weak var pauseWorkoutButton :UIButton?

    override func viewDidLoad() {

    super.viewDidLoad()

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    }

    @IBAction func toggleWorkout() {

    NSLog("Toggle workout button pressed")

    }

    @IBAction func pauseWorkout() {

    NSLog("Pause workout button pressed")

    }

    }

    Listing 2-1

    CreateWorkoutViewController Class from Chapter 1

    ```


    To represent the different states of the app, you can create an enum that corresponds
    to the states in the flowchart. Inside the class, create a property that uses
    the enum as its type. When the user presses the Start button, update the state property
    and make the call to request location permission. To implement this logic, update
    the `CreateWorkoutViewController` class, as indicated in Listing [2-2](#346879_2_En_2_Chapter.xhtml#PC3).


    ```

    import UIKit

    enum WorkoutState {

    case inactive

    case active

    case paused

    }

    class CreateWorkoutViewController: UIViewController {

    @IBOutlet weak var workoutTimeLabel: UILabel?

    @IBOutlet weak var workoutDistanceLabel: UILabel?

    var currentWorkoutState = WorkoutState.inactive

    ...

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    case .inactive:

    currentWorkoutState = .active

    requestLocationPermission()

    case .active:

    currentWorkoutState = .inactive

    default:

    NSLog("toggleWorkout() called out of context!")

    }

    NSLog("Toggle workout button pressed")

    }

    func requestLocationPermission() {

    NSLog("Location permission requested")

    }

    ...

    }

    Listing 2-2

    Adding State Tracking to the CreateWorkoutViewController Class

