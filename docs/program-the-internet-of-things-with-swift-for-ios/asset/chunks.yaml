    # 4. 使用 HealthKit 安全地检索和存储健康数据


    到目前为止，你已经学会了如何使用 iOS 设备上的运动传感器和 GPS 传感器来构建一个名为 IOTFit 的锻炼应用，该应用能够追踪活动数据（步数、海拔、步频），并在地图上显示用户的锻炼路径。此外，你还学会了如何将这些数据以属性列表（`.plist`）文件的形式存储到应用的
    `Documents` 文件夹中。


    虽然将数据存储在一个应用中很有用，但通过将数据以其他锻炼应用也能访问的方式进行保存，可以更好地帮助用户。为此，你可以使用 HealthKit 框架。HealthKit
    允许你将锻炼数据抽象为 `HKWorkout` 对象，并将其存储在 iPhone 的 HealthKit 存储区中。HealthKit 存储区是内存中的一个加密区域，iOS
    健康应用以及经过 HealthKit 授权的第三方应用可以在其中共享用户信息。例如，启用 HealthKit 后，用户可以在 iOS 健康应用中看到他们在
    IOTFit 中创建的锻炼记录，并将其作为独立项目查看。他们还可以使用 HealthKit 在 IOTFit 内读取并展示来自其他应用的锻炼数据。


    除了安全性之外，HealthKit 最强大的功能之一是其通过 `HKSample` 类所能存储的广泛数据类型。为清晰起见，本章将重点介绍如何将其应用于与锻炼相关的数据，但你完全可以开发应用来管理从心率、紫外线暴露到维生素
    C 摄入等各种数据。


    ## 学习目标


    在本章中，通过将 HealthKit 集成到 IOTFit 中，你将学习到物联网应用开发中的以下关键概念：


    *   向 iOS HealthKit 存储区请求权限

    *   如何将数据保存到 HealthKit

    *   如何从 HealthKit 加载数据

    *   如何在表格视图控制器中展示数据


    这些变更将通过扩展之前开发的 `WorkoutDataManager` 类，并为应用添加一个“历史记录”标签页来实现，该标签页将包含一个展示用户锻炼历史的表格视图，如图
    4-1 所示。


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig1_HTML.jpg](img/346879_2_En_4_Fig1_HTML.jpg)


    **图 4-1** 修改后的 IOTFit 应用线框图，包含新的“历史记录”标签页


    与前几章一样，本项目建立在第三章成果的基础之上。如果你遇到困难或需要参考本项目的完整代码，可以在本书的 GitHub 仓库中找到，位于 `Chapter 4`
    文件夹下（ [`github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)
    ）。


    ## 请求 HealthKit 权限


    鉴于健康数据的敏感性，使用 HealthKit 需要你修改应用以声明其想要使用健康相关功能，并在用户尝试访问这些功能时显示权限提示，这并不令人意外。与 Core
    Motion 类似，HealthKit 仅在较新的 iPhone、iPod touch 和 Apple Watch 上可用，因此你也需要查询这些功能的可用性。幸运的是，你可以使用在
    Core Motion 和 Core Location 中学到的请求权限的相同工作流程，将 HealthKit 添加到你的应用中。


    ### 注意


    与第三章讨论的 Core Motion 功能类似，本章内容旨在 iPhone 或 iPod touch 上运行。截至撰写本书时，Apple 未在 iPad
    上开放健康应用或 HealthKit。


    首先，复制你在第三章中开发的 IOTFit 应用，或从本书的 GitHub 仓库下载一份副本。接下来，点击项目层级导航器中的 `IOTFit`，选择应用的工程设置。如图
    4-2 所示，要声明应用想要使用 HealthKit，请点击 Capabilities 标签页，将 HealthKit 功能添加到应用中。向下滚动找到 HealthKit，点击旁边的开关将其切换为
    ON。


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig2_HTML.jpg](img/346879_2_En_4_Fig2_HTML.jpg)


    **图 4-2** 在 IOTFit 项目中启用 HealthKit 功能


    如果应用未链接到有效的 Apple Developer 帐户（付费或免费帐户均可），启用 HealthKit 功能将会失败，表现为开关恢复为 OFF 状态。如果你记不清如何将项目连接到
    Apple Developer 帐户，请回顾第一章。


    接下来，与所有基于权限的功能一样，你必须在项目的 Info.plist 文件中添加键值对，以定义系统生成的权限提示中将要显示的消息。如图 4-3 所示，点击
    Info 标签页，然后将鼠标悬停在“Privacy – Location When in Use Description”行上，点击出现的 `(+)` 按钮添加新的键。


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig3_HTML.jpg](img/346879_2_En_4_Fig3_HTML.jpg)


    **图 4-3** 向 IOTFit 的信息属性列表中添加新键


    要启用从 HealthKit 读取数据，请添加 `Privacy – Health Share Usage Description` 键值对。对于描述字符串，我使用的文本是：“IOTFit
    希望使用 HealthKit 权限从健康应用导入锻炼数据到应用的历史记录功能中。此信息不会在线共享或与第三方共享。” 要启用向 HealthKit 保存数据，请添加
    `Privacy – Health Update Usage Description` 键值对。对于描述字符串，我使用的文本是：“IOTFit 希望使用 HealthKit
    权限将锻炼数据导出到健康应用。此信息不会在线共享或与第三方共享。”


    与 Core Location 类似，你应该在首次尝试使用 HealthKit 框架的操作之前，查询其可用性并显示权限提示。从你的应用中访问 HealthKit
    的主要类是 `HKHealthStore`。与 Core Motion 的管理器对象类似，你需要实例化该类的实例，并通过该实例调用 HealthKit。与
    Core Motion 不同的是，Apple 硬性要求你在应用中只能创建该类的一个实例。为此，将 `HKHealthStore` 对象放在 `WorkoutDataManager`
    单例中是最合适的位置。在清单 4-1 中，我修改了 `WorkoutDataManager` 类，添加了一个 `HKHealthStore` 对象作为属性，并在设备支持此功能时对其进行实例化。


    ```

    import Foundation

    import CoreLocation

    import HealthKit

    ...

    class WorkoutDataManager {

    static let sharedManager = WorkoutDataManager()

    ...

    private var healthStore: HKHealthStore?

    private init() {

    print("单例已初始化")

    loadFromPlist()

    if HKHealthStore.isHealthDataAvailable() {

    healthStore = HKHealthStore.init()

    }

    }

    ...

    }

    ```


