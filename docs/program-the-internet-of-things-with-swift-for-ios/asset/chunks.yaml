    ## 本章小结


    在本章中，你通过将前几章的 Raspberry Pi 扩展为网络服务器并通过 HTTPS 端点暴露其数据，成功构建了一个经典的物联网设备。在此过程中，你还学习了
    HTTP 请求的工作原理，`Express` 和 `Noble` 如何为你分担实现 HTTP 和蓝牙协议栈的繁重工作，以及如何使用 iOS 应用连接到这些端点。与设置
    HomeKit 类似，这些任务中的许多并非特定于 iOS 或 Raspberry Pi，而是对成熟的 Linux 和 Web 应用开发实践的具体实现。


    在 Raspberry Pi 等单板计算机取得商业成功之前，许多专有的片上系统解决方案已经提供了相同的核心功能——GPIO 和网络服务器，但价格高昂且学习曲线陡峭。得益于这类技术的简化，物联网得以持续扩展，但正如你将在本书后面学到的，你还应记得添加
    HTTPS 或其他安全措施，以帮助创造一个安全的物联网。


    # 第三部分：使用 Apple 先进的物联网技术构建应用


    # 9. 使用 tvOS 构建 Apple TV 仪表盘应用


    尽管 Apple TV 于 2007 年推出，但其市场普及率在数年内一直很低，并被史蒂夫·乔布斯戏称为“一个业余爱好”。当时，其主要用途是作为在 iTunes
    上购买媒体的机顶盒。2012 年，一款价格更低、灵感源于 iOS 的 Apple TV 2 问世并迅速走红。用户不再局限于 `iTunes` 内容，突然可以通过系统更新附带的应用程序观看来自
    `Netflix` 和热门电视频道的内容。这使许多人猜测，该设备实际上基于 iOS 的一个分支，并且人们期望苹果有朝一日能向所有开发者提供其软件开发工具包。


    2015 年，这些预测成真了，苹果发布了 Apple TV 4，同时公开发布了其操作系统（现称为 `tvOS`）的软件开发工具包以及该设备的 App Store。正如许多人推测的那样，`tvOS`
    基于 iOS，开发者可以使用 Swift 以及来自 iOS 的框架（包括 `Cocoa Touch` 和 `Core Location`）的紧密分支为其编写应用。截至撰写本文时，主要的例外是
    `MapKit` 和 `WebKit`——这意味着你不能直接将网页或地图嵌入到你的原生 `tvOS` 应用中。


    考虑到这一点，在本章中，你将通过运用所学的 iOS 知识，为 IOTHome 硬件构建一个 Apple TV 仪表盘，从而将 `tvOS` 与物联网这两个世界连接起来。为了使用户体验更具吸引力，你将整合来自
    IOTHome 网络服务器和 `OpenWeatherMap.org` 天气 API 的数据，从而能够展示用户家室内外的气候信息。


    ### 注意


    虽然你可以使用 Apple TV 模拟器和任何基于 Linux 的设备来开发本章的项目，但代码示例和解释是为 Apple TV 4 和 Raspberry
    Pi 3 或更新版本优化的。


    ## 学习目标


    在本章中，你将学习如何通过向 IOTHome 项目添加 Apple TV 目标、为该目标创建 `tvOS` 资源以及编写代码使 `tvOS` 应用自行渲染用户界面并发出网络请求，来构建一个
    Apple TV 仪表盘应用。在创建 `tvOS` 仪表盘应用的过程中，你将学习 iOS 物联网应用开发的以下关键概念：


    *   向现有 iOS 应用添加 `tvOS` 目标

    *   为 `tvOS` 项目创建用户界面

    *   在 `tvOS` 应用中发起 HTTP 请求

    *   从 `tvOS` 应用请求用户位置

    *   连接到 `OpenWeatherMap.org` 公共天气 API

    *   在 Apple TV 上运行 `tvOS` 应用


    苹果在 `tvOS` 上的一大成就是，它在很大程度上为该平台保留了 iOS 的开发工具和实践。你会发现自己有时会忘记自己正为哪个平台编写代码，这与 `watchOS`（许多
    API 缺失）或 `macOS`（工作流程或共享框架的重叠很少）形成对比。在研读本章内容时，我将强调这些相似之处以及如何将它们应用于 `tvOS`。另外，尽管你需要为用户界面编写新代码，但你可以几乎不做任何改动地重用第
    8 章中的网络代码。


    在本章中，我假设你熟悉 IOTHome 传感器（第 5 章至第 7 章）和网络服务器（第 8 章）。如果你对其中任何一项不熟悉，我强烈建议你在继续学习本章之前先回顾一下相关内容。与之前的章节一样，你可以在本书的
    GitHub 仓库（[`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)）的
    `Chapter` `9` 文件夹下找到本章的完整项目。

