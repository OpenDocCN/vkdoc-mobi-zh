    ## Reading Workout Data from HealthKit


    Now that you understand how HealthKit represents data, as well as the steps required
    to convert simple data types into HealthKit sample data, you can use that knowledge
    to read data from the iOS HealthKit store. In the IOTFit app, you will use this
    to fetch the user’s workout history. Much like writing data, the primary data
    type you will use for reading data from the HealthKit store is `HKSample`.


    To fetch data, you must perform a *query* on the HealthKit store, using the `HKSampleQuery`
    class. As with creating an `HKSample` object, there are several convenience initializers
    you can use, but for the IOTFit app, `HKSampleQuery(sampleType:predicate:limit:,
    sortDescriptors:resultsHandler)` is an appropriate choice. There is a lot to unpack
    in this, but the important concepts are that you must specify a sample type to
    fetch, a *predicate* to filter the search results, and a completion handler to
    process the results. In Listing [4-8](#346879_2_En_4_Chapter.xhtml#PC8), I have
    updated the `loadWorkoutsFromHealthKit()` method to include a query for workouts,
    in decreasing date order (newest first), limited to the newest ten from the preceding
    week.


    ```

    func loadWorkoutsFromHealthKit(completion: @escaping

    (([Workout]?) -> Void)) {

    healthStore?.requestAuthorization(toShare:

    hkDataTypes, read: hkDataTypes, completion: {

    [weak self] (isAuthorized: Bool, error :

    Error?) in

    if let error = error {

    NSLog("Error accessing HealthKit")

    } else {

    let workoutType = HKCategoryType.workoutType()

    let weekAgo = Date(timeIntervalSinceNow:

    -3600 * 24 * 7)

    let predicate = HKQuery.predicateForSamples(withStart:

    weekAgo, end: Date(), options: [])

    let sortDescriptor = NSSortDescriptor(key: "startDate",

    ascending: false)

    let query = HKSampleQuery(sampleType: workoutType,

    predicate: predicate, limit: 10, sortDescriptors:

    [sortDescriptor], resultsHandler: { (query:

    HKSampleQuery, samples: [HKSample]?, error:

    Error?) in

    if let error = error {

    NSLog("Error fetching items from HealthKit ")

    completion(nil)

    } else {

    let workouts = [Workout]()

    completion(workouts)

    }

    })

    self?.healthStore?.execute(query)

    }

    })

    }

    ```

    **Listing 4-8** Setting Up a HealthKit Sample Query


    Unless a user disables location and step counting, iOS is always collecting health
    data on a user. To avoid the risk of your query taking too long, I recommend using
    a date-based predicate or (page) limit to restrict the query results. You can
    always use your user interface to allow the user to see more search results. Another
    important point to remember is that after you declare the query, it will not start
    until you call the `execute()` method on your `HKHealthStore` object.


    Next, to use the results of the sample query in the app, you must convert the
    `HKSample` array to custom `Workout` structs you have been using throughout the
    project. In Listing [4-9](#346879_2_En_4_Chapter.xhtml#PC9), I have further expanded
    the `loadWorkoutsFromHealthKit(completion:)` method to perform the conversion
    logic.'
