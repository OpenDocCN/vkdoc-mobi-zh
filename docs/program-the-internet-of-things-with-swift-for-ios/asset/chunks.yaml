  trans: '好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    # 为 IOTHome 应用配置蓝牙中心管理器


    对于 IOTHome 应用，`BluetoothService` 类必须提供的唯一蓝牙角色是中心管理器。你可以通过 `CBCentralManager` 类来实现这一点。要在你的程序中使用它，你必须实例化一个
    `CBCentralManager` 对象并设置其委托。在代码清单 6-15 中，我将其作为一个属性添加到了类中，并提供了你在此项目中必须使用的 `CBCentralManagerDelegate`
    协议方法的存根。


    ```

    class BluetoothService: NSObject {

    ...

    weak var delegate: BluetoothServiceDelegate?

    var centralManager: CBCentralManager?

    ...

    private override init() {

    super.init()

    centralManager = CBCentralManager.init(delegate: self,

    queue: nil)

    }

    }

    extension BluetoothService: CBCentralManagerDelegate {

    func centralManagerDidUpdateState(_ central:

    CBCentralManager) {

    }

    func centralManager(_ central: CBCentralManager,

    didDiscover peripheral: CBPeripheral, advertisementData:

    [String: Any], rssi RSSI: NSNumber) {

    }

    func centralManager(_ central: CBCentralManager, didConnect

    peripheral: CBPeripheral) {

    }

    }

    代码清单 6-15 初始化一个 CBCentralManager 对象

    ```


    ## 连接到蓝牙低功耗外设


    现在 `CBCentralManager` 对象已正确初始化，你可以准备建立与蓝牙低功耗外设的连接了。首先，更新 `connect()` 方法，如代码清单
    6-16 所示，以便根据按下“连接”按钮时应用所处的状态来开始或停止扫描。


    ```

    class BluetoothService: NSObject {

    ...

    var centralManager: CBCentralManager?

    var connectedPeripheral: CBPeripheral?

    ...

    func connect() {

    switch connectionStatus {

    case .unknown, .disconnected :

    centralManager?.scanForPeripherals(withServices:

    nil, options: nil)

    connectionStatus = .scanning

    case .connected, .connecting:

    if let connectedPeripheral = connectedPeripheral {

    centralManager?.cancelPeripheralConnection(

    connectedPeripheral)

    connectionStatus = .disconnected

    }

    default:

    centralManager?.stopScan()

    connectionStatus = .disconnected

    }

    delegate?.didUpdateConnection(status: connectionStatus)

    }

    }

    代码清单 6-16 开始或停止扫描蓝牙低功耗外设

    ```


    你通过在中央管理器对象上调用 `scanForPeripherals(withServices:options:)` 方法来启动扫描。你可以指定 UUID
    进行过滤，但根据我的经验，如果你的广告代码在 Arduino 上设置不正确，这会使设备扫描变得更加困难，因此我在此示例中省略了这一点。停止扫描同样简单，只需调用
    `stopScan()` 方法即可。要断开连接，你必须使用一个已保存的 `CBPeripheral` 对象（在完成连接后你将拥有该对象）调用 `cancelPeripheralConnection()`。


    当你的中央管理器发现蓝牙低功耗外设时，它会通过你的 `centralManager(didDiscover:advertisementData:RSSI:)`
    方法实现进行回调。此方法会为它找到的每个设备返回一个 `CBPeripheral` 对象，包括设备名称及其广播数据中的服务。在你确定了要连接的设备后，应保存其
    `CBPeripheral` 对象并尝试连接到它。在代码清单 6-17 中，我更新了 `BluetoothService` 类中 `centralManager(didDiscover:advertisementData:RSSI:)`
    方法的实现，将名称匹配“IOTHome”的设备保存到该类的一个属性中，然后尝试连接。


    ```

    extension BluetoothService: CBCentralManagerDelegate {

    ...

    func centralManager(_ central: CBCentralManager,

    didDiscover peripheral: CBPeripheral, advertisementData:

    [String: Any], rssi RSSI: NSNumber) {

    if peripheral.name == "IOTDoor" {

    self.connectedPeripheral = peripheral

    self.connectedPeripheral?.delegate = self

    centralManager?.connect(peripheral, options: nil)

    }

    }

    ...

    }

    代码清单 6-17 发现并保存一个蓝牙低功耗外设

    ```


    虽然理想情况是在发现外设后立即开始使用它，但要从设备检索数据，仍需付出更多努力。一旦连接建立，`centralManager(didConnect:)` 方法将被触发。在此方法内部，你必须开始扫描你想在外设上使用的服务（门和电池状态）。在连接到
    IOTHome 外设后，你不再需要扫描设备，因此应告知中央管理器停止扫描，并更新 `BluetoothService` 类的连接状态属性。


    与 `CBCentralManager` 类似，`CBPeripheral` 通过其委托方法发送更新。在代码清单 6-18 中，我更新了 `BluetoothService`
    类，加入了完整的 `centralManager(didConnect:)` 方法和一个 `CBPeripheralDelegate` 协议的存根。


    ```

    extension BluetoothService: CBCentralManagerDelegate {

    func centralManagerDidUpdateState(_ central:

    CBCentralManager) {

    switch(central.state) {

    case .poweredOn:

    NSLog("It''s showtime")

    default:

    NSLog("Device is not ready")

    }

    }

    ...

    func centralManager(_ central: CBCentralManager, didConnect

    peripheral: CBPeripheral) {

    central.stopScan()

    connectedPeripheral?.discoverServices(doorServices)

    self.connectionStatus = .connecting

    delegate?.didUpdateConnection(status: connectionStatus)

    }

    }

    extension BluetoothService: CBPeripheralDelegate {

    func peripheral(_ peripheral: CBPeripheral,

    didDiscoverServices error: Error?) {

    }

    func peripheral(_ peripheral: CBPeripheral,

    didDiscoverCharacteristicsFor service: CBService,

    error: Error?) {

    }

    func peripheral(_ peripheral: CBPeripheral,

    didUpdateValueFor characteristic: CBCharacteristic,

    error: Error?) {

    }

    }

    代码清单 6-18 连接到外设后发送更新

    ```


    连接到设备后，`CBPeripheral` 对象将响应它发现的服务。考虑到蓝牙低功耗通信的层次结构，在找到服务后，你必须询问它们所公开的特征。如代码清单 6-19
    所示，这是通过在 `CBPeripheral` 对象上调用 `discoverCharacteristics()` 来完成的。


    ```

    extension BluetoothService: CBPeripheralDelegate {

    func peripheral(_ peripheral: CBPeripheral,

    didDiscoverServices error: Error?) {

    guard let services = peripheral.services

    else { return }

    for service in services {

    peripheral.discoverCharacteristics(

    doorCharacteristics, for: service)

    }

    }

    func peripheral(_ peripheral: CBPeripheral,

    didDiscoverCharacteristicsFor service: CBService, error:

    Error?) {

    self.connectionStatus = .connected

    delegate?.didUpdateConnection(status: connectionStatus)

    }

    ...

    }

    代码清单 6-19 查询蓝牙低功耗外设的服务和特征

    ```


    现在，在 `peripheral(didDiscoverCharacteristicsFor:error:)` 方法内部，你可以将连接状态设置为已连接，并通知
    `BluetoothService` 委托连接已建立。

