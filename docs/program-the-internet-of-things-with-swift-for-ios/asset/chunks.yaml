  trans: '

    ### 创建和保存 HealthKit 样本


    对于 IOTFit 应用及你自己的项目，必须遵循以下步骤将数据保存到 HealthKit：


    - 确认设备能够存储你要处理的样本（锻炼、关联数据和数量样本）

    - 创建一个聚合样本对象（锻炼或关联数据）

    - 创建数量样本

    - 将样本保存到锻炼记录中


    在列表 4-2 中，你通过检查要处理的数量类型（步数、爬楼层数、锻炼类型、步行距离和骑行距离）完成了验证步骤。现在你对 HealthKit 如何表示数据有了更清晰的认识，可以开始将“创建锻炼视图控制器”中的简单数值数据转换为
    HealthKit 可消费的数据。


    要保存数据到 HealthKit，第一步是创建一个 `HKWorkout` 对象来表示锻炼记录。`HKWorkout` 类有多个便捷构造函数，但最适合存储
    IOTFit 锻炼记录的是 `init(activityType:start:end:duration:totalEnergyBurned:totalDistance:distanceQuantity:device:metadata)`，该构造方法允许你指定锻炼类型（`HKWorkoutType`）、开始和结束日期（`Date`
    对象）以及锻炼距离。为了实现这一操作，并最终保存爬楼层数等其他统计数据，你需要修改 `Workout` 结构体以添加新参数，并对调用函数进行重构，使其使用
    `Workout` 对象作为参数，而非冗长的参数列表。在列表 4-3 中，我对 `CreateWorkoutViewController` 和 `WorkoutDataManager`
    类进行了修改以包含这些变更。


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    ...

