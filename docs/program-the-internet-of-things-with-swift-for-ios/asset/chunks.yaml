    ## Summary


    In this chapter, you were able to build a classic IoT device by expanding the
    Raspberry Pi from earlier chapters to act as a web server and expose its data
    via HTTPS endpoints. During this process, you also learned how HTTP requests work,
    how `Express` and `Noble` can offload the hard work of implementing the HTTP and
    Bluetooth stacks for you, and how to connect to the endpoints using an iOS app.
    In a similar manner to setting up HomeKit, many of these tasks were not as much
    iOS- or Raspberry Pi–specific as they were implementations of established Linux
    and web application development practices.


    Before single-board computers such as the Raspberry Pi achieved commercial success,
    many proprietary system-on-a-chip solutions were providing this same core functionality,
    GPIO and a web server, with a much higher price tag and learning curve. Thanks
    to the streamlining of technologies such as these, the IoT continues to expand,
    but as you will learn later in the book, you should also remember to add HTTPS
    or other security measures, to help make it a safe IoT.


    # Part 3: Building Apps Using Apple’s Advanced Internet of Things Technologies


    # 9. Using tvOS to Build an Apple TV Dashboard App


    Although the Apple TV was introduced in 2007, its adoption rate was slow for several
    years, and it was famously described as “a hobby” by Steve Jobs. At that time,
    its main purpose was to serve as a set-top box for media purchased on iTunes.
    In 2012, a lower-priced, iOS-inspired Apple TV 2 came out and took off immediately.
    Instead of being limited to `iTunes` content, users could suddenly watch content
    from `Netflix` and popular TV channels via apps that were packaged with system
    updates. This led many people to suspect that the device was, in fact, based on
    a fork of iOS, and the hope was that Apple would one day offer its software development
    kit to all developers.


    In 2015, these predictions came true when Apple announced the Apple TV 4, the
    public release of the software development kit for its operating system (now called
    `tvOS`) and an App Store for the device. As many people speculated, `tvOS` is
    based on iOS, and developers can write apps for it using Swift and close forks
    of frameworks from iOS, including `Cocoa Touch` and `Core Location`. As of this
    writing, the notable exceptions are `MapKit` and `WebKit`—meaning you cannot embed
    web pages or maps directly into your native `tvOS` apps.


    With this in mind, for this chapter, you will bridge the two worlds of `tvOS`
    and the Internet of Things (IoT) by taking what you know about iOS and using it
    to build an Apple TV dashboard for the IOTHome hardware. To make the user experience
    compelling, you will include data from both the IOTHome web server and the `OpenWeatherMap.org`
    weather API, allowing you to show climate inside and outside a user’s home.


    ### Note


    Although you can use the Apple TV simulator and any Linux-based device to develop
    the project in this chapter, the code samples and explanations are optimized for
    an Apple TV 4 and Raspberry Pi 3 or newer versions.


    ## Learning Objectives


    In this chapter, you will learn how to build an Apple TV dashboard app by adding
    an Apple TV target to the IOTHome project, creating `tvOS`-resources for the target,
    and writing code to make the `tvOS` app render its user interface and make network
    requests on its own. In creating the `tvOS` dashboard app, you will learn the
    following key concepts for iOS IoT application development:


    *   Adding a `tvOS` target to an existing iOS app

    *   Creating a user interface for a `tvOS` project

    *   Making HTTP requests within a `tvOS` app

    *   Requesting user location from a `tvOS` app

    *   Connecting to the `OpenWeatherMap.org` public weather API

    *   Running a `tvOS` app on an Apple TV


    One of Apple’s great accomplishments with `tvOS` was the large extent to which
    it preserved iOS development tools and practices for the platform. You will find
    yourself forgetting what platform you are writing code for, compared to `watchOS`,
    in which many APIs are absent, or `macOS`, in which there is little overlap in
    workflows or shared frameworks. As you work through this chapter, I will highlight
    these similarities and how you can apply them to `tvOS`. As an added bonus, although
    you will be writing new code for the user interface, you will be able to reuse
    the network code from Chapter [8](#346879_2_En_8_Chapter.xhtml) with almost no
    changes.


    In this chapter, I assume you are familiar with the IOTHome sensors (Chapters
    [5](#346879_2_En_5_Chapter.xhtml)–[7](#346879_2_En_7_Chapter.xhtml)) and the web
    server (Chapter [8](#346879_2_En_8_Chapter.xhtml)). If you are unfamiliar with
    either of these, I highly recommend reviewing them before continuing with this
    chapter. As with previous chapters, you can find the completed project for this
    chapter on the GitHub repository for this book ([`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)),
    under the `Chapter` [`9`](#346879_2_En_9_Chapter.xhtml) folder.'
