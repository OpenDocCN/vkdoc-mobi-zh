    \ {\n    ...\n    var pedometer: CMPedometer?\n    var motionManager: CMMotionActivityManager?\n\
    \    ...\n    func startWorkout() {\n        ...\n        if (CMMotionManager().isDeviceMotionAvailable\
    \ && CMPedometer.isStepCountingAvailable() && CMAltimeter.isRelativeAltitudeAvailable())\
    \ {\n            isMotionAvailable = true\n            startPedometerUpdates()\n\
    \            startActivityUpdates()\n        } else {\n            isMotionAvailable\
    \ = false\n        }\n    }\n    ...\n    func startActivityUpdates() {\n    \
    \    motionManager = CMMotionActivityManager()\n        motionManager?.startActivityUpdates(to:\
    \ OperationQueue.main, withHandler: { (activity: CMMotionActivity?) in\n     \
    \       // 收到运动更新\n        })\n    }\n}\n```\n\n*代码清单 3-8 启动活动类型更新*\n"
- fmt: '### Note


    如果您在 iOS 应用中遇到用户界面无法正确显示项目的问题，请确认您的调用是否发生在主线程（主`OperationQueue`）上。iOS 只允许在主线程上执行用户界面更新。


    `CMMotionActivity`响应对象包含一系列`Bool`属性，表示 Core Motion 对当前活动类型的估计，以及一个`confidence`属性，表示估计的准确性（`low`、`medium`、`high`）。对于
    IOTFit 应用，您只需在“创建锻炼视图控制器”上显示活动类型，因此只需在响应处理程序中评估响应并保存最佳值。在清单 [3-9](#346879_2_En_3_Chapter.xhtml#PC9)
    中，我更新了`CreateWorkoutViewController`类，使其包含一个`currentActivity`属性，并在`startActivityUpdates()`方法的运动完成处理程序中保存该值。


    ```

    import UIKit

    ...

    struct WorkoutType {

    static let automotive = "Driving"

    static let running = "Running"

    static let bicycling = "Bicycling"

    static let stationary = "Stationary"

    static let walking = "Walking"

    static let unknown = "Unknown"

    }

    class CreateWorkoutViewController: UIViewController {

    ...

    var currentWorkoutState = WorkoutState.inactive

    var currentWorkoutType = WorkoutType.unknown

    ...

    func startActivityUpdates() {

    motionManager = CMMotionActivityManager()

    motionManager?.startActivityUpdates(to:

    OperationQueue.main, withHandler: { [weak self]

    (activity: CMMotionActivity?) in

    guard let activity = activity else { return }

    if activity.walking {

    self?.currentWorkoutType = WorkoutType.walking

    } else if activity.running {

    self?.currentWorkoutType = WorkoutType.running

    } else if activity.cycling {

    self?.currentWorkoutType =

    WorkoutType.bicycling

    } else if activity.stationary {

    self?.currentWorkoutType =

    WorkoutType.stationary

    } else {

    self?.currentWorkoutType = WorkoutType.unknown

    }

    })

    }

    ...

    }

    Listing 3-9

    Saving the Updated Activity Type

    ```


    `CMMotionActivity`类设计中的一个不足之处在于，它要求您定义活动的优先级，而不是使用枚举值来表示数据。我在完成处理程序前添加了`[weak
    self]`。在使用闭包时，通过强引用访问`self`可能会导致对象被保留，从而引起内存泄漏。使用`weak`可以避免这种情况。


    要在用户界面上显示该值，只需更新`updateWorkoutData()`方法，使其包含对`currentActivity`属性的检查，如清单 [3-10](#346879_2_En_3_Chapter.xhtml#PC10)
    所示。


    ```

    @objc func updateWorkoutData() {

    let now = Date()

    var workoutPaceText = String(format: "%.2f m/s", arguments:

    [averagePace])

    if let lastTime = lastSavedTime {

    self.workoutDuration +=

    now.timeIntervalSince(lastTime)

    }

    if currentWorkoutType != WorkoutType.unknown {

    workoutPaceText.append(" | \(currentWorkoutType)")

    }

    ...

    workoutPaceLabel?.text = workoutPaceText

    ...

    }

    Listing 3-10

    Displaying Activity Type

    ```


    在此示例中，我修改了配速标签以包含活动类型。如果活动类型未知，则不显示该值。这样做反而会让用户感到困惑，而不是提供帮助。


    要停止运动（活动类型）更新，只需更新`toggleWorkout()`方法，让`CMMotionActivityManager`停止监听运动更新，方法与停止计步器更新相同，如清单
    [3-11](#346879_2_En_3_Chapter.xhtml#PC11) 所示。


    ```

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    ...

    case .active:

    currentWorkoutState = .inactive

    stopWorkoutTimer()

    pedometer?.stopUpdates()

    motionManager?.stopActivityUpdates()

    ...

    default:

    ...

    }

    updateUserInterface()

    }

    Listing 3-11

    Stopping Motion Updates

    ```


    ## 处理气压计更新


    在进行 Core Motion 的最后一个实验时，您还可以获取用户的海拔高度。最棒的是，它遵循了其他 Core Motion 传感器 API 的设计模式，即：


    - 实例化一个管理器对象

    - 定义一个完成块来保存最新数据

    - 更新用户界面

    - 在完成后停止更新


    由于您应该已经熟悉这种设计模式，我在清单 [3-12](#346879_2_En_3_Chapter.xhtml#PC12) 中包含了将气压计数据添加到“创建锻炼视图控制器”的代码。


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    var workoutAltitude: Double = 0.0

    var workoutDistance: Double = 0.0

    ...

    var motionManager: CMMotionActivityManager?

    var altimeter: CMAltimeter?

    ...

    @IBAction func toggleWorkout() {

    ...

    switch currentWorkoutState {

    ...

    case .active:

    ...

    motionManager?.stopActivityUpdates()

    altimeter?.stopRelativeAltitudeUpdates()

    default:

    ...

    }

    updateUserInterface()

    }

    ...

    @objc func updateWorkoutData() {

    let now = Date()

    var workoutPaceText = String(format: "%.2f m/s |

    %0.2fm ", arguments: [averagePace, workoutAltitude])

    ...

    }

    ...

    func startWorkout() {

    currentWorkoutState = .active

    ...

    if (CMMotionManager().isDeviceMotionAvailable

    && CMPedometer.isStepCountingAvailable() &&

    CMAltimeter.isRelativeAltitudeAvailable()) {

    ...

    startActivityUpdates()

    startAltimeterUpdates()

    } else {

    isMotionAvailable = false

    }

    }

    ...

    func startAltimeterUpdates() {

    altimeter = CMAltimeter()

    altimeter?.startRelativeAltitudeUpdates(to:

    OperationQueue.main, withHandler: { [weak self]

    (altitudeData: CMAltitudeData?, error: Error?) in

    if let error = error {

    NSLog("Error reading altimeter data:

    \(error.localizedDescription)")

    return

    }

    guard let altitudeData = altitudeData,

    let relativeAltitude =

    altitudeData.relativeAltitude as? Double

    else { return }

    self?.workoutAltitude += relativeAltitude

    })

    }

    ...

    func resetWorkoutData() {

    ...

    workoutDistance = 0.0

    workoutAltitude = 0.0

    currentWorkoutType = WorkoutType.unknown

    }

    }

    Listing 3-12

    Adding Altitude Tracking to the Create Workout View Controller

    ```


    现在，当您在 iPhone 上运行 IOTFit 应用并稍微走动（或摇晃手机）时，您应该会看到更快、更准确的活动更新，类似于图 [3-5](#346879_2_En_3_Chapter.xhtml#Fig5)
    截图中的效果。


    ![../images/346879_2_En_3_Chapter/346879_2_En_3_Fig5_HTML.jpg](images/346879_2_En_3_Chapter/346879_2_En_3_Fig5_HTML.jpg)


    图 3-5 IOTFit 应用截图（显示额外的锻炼数据）


    ## 总结


    在本章中，您将基于 GPS 的 IOTFit 应用转变为更准确、功能更丰富且更省电的版本，方法是使用 Core Motion 框架来访问 iPhone 和
    Apple Watch 上的 M 系列运动协处理器。您学习了如何为多个传感器设置管理器对象，以及如何使用完成处理程序响应它们的异步更新。经过几个示例后，设置管理器、响应更新和停止请求的过程变得非常明显，成为一种广泛使用的模式，使得气压计集成变得极其简单。


    为了可读性，并跟上当前的编程趋势，Apple 在其框架中越来越多地采用基于完成处理程序的工作流程。在需要在一个长时间运行的方法完成后立即执行快速操作的情况下，完成处理程序非常方便。我相信您会在本书以及您自己的项目中多次复用这一知识。'
  raw: '### Note


    If you are having issues with your iOS applications not displaying items to the
    user interface correctly, verify that your calls are occurring on the main thread
    (main `OperationQueue`). iOS only executes user interface updates from the main
    thread.


    The `CMMotionActivity` response object contains a series of `Bool` properties,
    indicating Core Motion’s estimation of the current activity type and a `confidence`
    property indicating the accuracy of the estimation (`low`, `medium`, `high`).
    For the IOTFit app, all you must do is display the activity type on the Create
    Workout View Controller, so you only have to evaluate the responses in the response
    handler and save the best value. In Listing [3-9](#346879_2_En_3_Chapter.xhtml#PC9),
    I have updated the `CreateWorkoutViewController` class to include a `currentActivity`
    property and save this value as part of the motion completion handler in the `startActivityUpdates()`
    method .


    ```

    import UIKit

    ...

    struct WorkoutType {

    static let automotive = "Driving"

    static let running = "Running"

    static let bicycling = "Bicycling"

    static let stationary = "Stationary"

    static let walking = "Walking"

    static let unknown = "Unknown"

    }

    class CreateWorkoutViewController: UIViewController {

    ...

    var currentWorkoutState = WorkoutState.inactive

    var currentWorkoutType = WorkoutType.unknown

    ...

    func startActivityUpdates() {

    motionManager = CMMotionActivityManager()

    motionManager?.startActivityUpdates(to:

    OperationQueue.main, withHandler: { [weak self]

    (activity: CMMotionActivity?) in

    guard let activity = activity else { return }

    if activity.walking {

    self?.currentWorkoutType = WorkoutType.walking

    } else if activity.running {

    self?.currentWorkoutType = WorkoutType.running

    } else if activity.cycling {

    self?.currentWorkoutType =

    WorkoutType.bicycling

    } else if activity.stationary {

    self?.currentWorkoutType =

    WorkoutType.stationary

    } else {

    self?.currentWorkoutType = WorkoutType.unknown

    }

    })

    }

    ...

    }

    Listing 3-9

    Saving the Updated Activity Type

    ```


    One of the unfortunate aspects of the design of the `CMMotionActivity` class is
    that it requires you to define what you want to be the priority of the activities,
    rather than using an enumerated value to represent the data. I prefaced the completion
    handler with `[weak self]`. When working with closures, accessing `self` with
    a `strong` reference has the potential of retaining the object, causing memory
    leaks. Using `weak` prevents this.


    To display the value on the user interface, simply update the `updateWorkoutData()`
    method to include inspecting the `currentActivity` property , as shown in Listing
    [3-10](#346879_2_En_3_Chapter.xhtml#PC10).


    ```

    @objc func updateWorkoutData() {

    let now = Date()

    var workoutPaceText = String(format: "%.2f m/s", arguments:

    [averagePace])

    if let lastTime = lastSavedTime {

    self.workoutDuration +=

    now.timeIntervalSince(lastTime)

    }

    if currentWorkoutType != WorkoutType.unknown {

    workoutPaceText.append(" | \(currentWorkoutType)")

    }

    ...

    workoutPaceLabel?.text = workoutPaceText

    ...

    }

    Listing 3-10

    Displaying Activity Type

    ```


    In this example, I modified the pace label to include the activity type. If the
    activity type is unknown, I do not display the value. It would serve to confuse
    users more than it would help them.


    To stop motion (activity type) updates, simply update the `toggleWorkout()` method
    to tell the `CMMotionActivityManager` to stop listening for motion updates, in
    the same manner you used to stop pedometer updates, as shown in Listing [3-11](#346879_2_En_3_Chapter.xhtml#PC11).


    ```

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    ...

    case .active:

    currentWorkoutState = .inactive

    stopWorkoutTimer()

    pedometer?.stopUpdates()

    motionManager?.stopActivityUpdates()

    ...

    default:

    ...

    }

    updateUserInterface()

    }

    Listing 3-11

    Stopping Motion Updates

    ```


    ## Handling Altimeter Updates


    For your final experiment with Core Motion, you can also retrieve the user’s altitude.
    The best part is that it follows the design of the other Core Motion sensor APIs,
    namely to


    *   Instantiate a manager object


    *   Define a completion block to save the most recent data


    *   Update the user interface


    *   Stop updates when complete


    As you should now be familiar with this design pattern, I have included the code
    for adding altimeter data to the Create Workout View Controller in Listing [3-12](#346879_2_En_3_Chapter.xhtml#PC12).


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    var workoutAltitude: Double = 0.0

    var workoutDistance: Double = 0.0

    ...

    var motionManager: CMMotionActivityManager?

    var altimeter: CMAltimeter?

    ...

    @IBAction func toggleWorkout() {

    ...

    switch currentWorkoutState {

    ...

    case .active:

    ...

    motionManager?.stopActivityUpdates()

    altimeter?.stopRelativeAltitudeUpdates()

    default:

    ...

    }

    updateUserInterface()

    }

    ...

    @objc func updateWorkoutData() {

    let now = Date()

    var workoutPaceText = String(format: "%.2f m/s |

    %0.2fm ", arguments: [averagePace, workoutAltitude])

    ...

    }

    ...

    func startWorkout() {

    currentWorkoutState = .active

    ...

    if (CMMotionManager().isDeviceMotionAvailable

    && CMPedometer.isStepCountingAvailable() &&

    CMAltimeter.isRelativeAltitudeAvailable()) {

    ...

    startActivityUpdates()

    startAltimeterUpdates()

    } else {

    isMotionAvailable = false

    }

    }

    ...

    func startAltimeterUpdates() {

    altimeter = CMAltimeter()

    altimeter?.startRelativeAltitudeUpdates(to:

    OperationQueue.main, withHandler: { [weak self]

    (altitudeData: CMAltitudeData?, error: Error?) in

    if let error = error {

    NSLog("Error reading altimeter data:

    \(error.localizedDescription)")

    return

    }

    guard let altitudeData = altitudeData,

    let relativeAltitude =

    altitudeData.relativeAltitude as? Double

    else { return }

    self?.workoutAltitude += relativeAltitude

    })

    }

    ...

    func resetWorkoutData() {

    ...

    workoutDistance = 0.0

    workoutAltitude = 0.0

    currentWorkoutType = WorkoutType.unknown

    }

    }

    Listing 3-12

    Adding Altitude Tracking to the Create Workout View Controller

    ```


    Now, when you run the IOTFit app on your iPhone and walk around a little (or shake
    your phone), you should see faster, more accurate activity updates, similar to
    those in the screenshot in Figure [3-5](#346879_2_En_3_Chapter.xhtml#Fig5).


    ![../images/346879_2_En_3_Chapter/346879_2_En_3_Fig5_HTML.jpg](images/346879_2_En_3_Chapter/346879_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Screenshot of IOTFit app with additional workout data


    ## Summary


    In this chapter, you took the GPS-powered IOTFit app and turned it into a more
    accurate, feature-rich, and battery-friendly version by using the Core Motion
    framework to access the M-series motion co-processor on iPhone and Apple Watch.
    You learned how to set up manager objects for several of the sensors and how to
    respond to their asynchronous updates using completion handlers. After a few examples,
    the process of setting up a manager, responding to updates, and stopping requests
    became very obvious as a widely-used pattern, making altimeter integration extremely
    straightforward.


    For the sake of readability, and to keep up with current programming trends, Apple
    is moving toward more and more completion handler–based workflows in its frameworks.
    Completion handlers are extremely convenient in situations in which you must execute
    a quick action after another long-running method completes, and I am sure you
    will reuse this knowledge many times again in this book and your own projects.'
  trans: '

    ### Note


    如果您在 iOS 应用中遇到用户界面无法正确显示项目的问题，请确认您的调用是否发生在主线程（主`OperationQueue`）上。iOS 只允许在主线程上执行用户界面更新。


    `CMMotionActivity`响应对象包含一系列`Bool`属性，表示 Core Motion 对当前活动类型的估计，以及一个`confidence`属性，表示估计的准确性（`low`、`medium`、`high`）。对于
    IOTFit 应用，您只需在“创建锻炼视图控制器”上显示活动类型，因此只需在响应处理程序中评估响应并保存最佳值。在清单 3-9 中，我更新了`CreateWorkoutViewController`类，使其包含一个`currentActivity`属性，并在`startActivityUpdates()`方法的运动完成处理程序中保存该值。


    ```

    import UIKit

    ...

    struct WorkoutType {

    static let automotive = "Driving"

    static let running = "Running"

    static let bicycling = "Bicycling"

    static let stationary = "Stationary"

    static let walking = "Walking"

    static let unknown = "Unknown"

    }

    class CreateWorkoutViewController: UIViewController {

    ...

    var currentWorkoutState = WorkoutState.inactive

    var currentWorkoutType = WorkoutType.unknown

    ...

    func startActivityUpdates() {

    motionManager = CMMotionActivityManager()

    motionManager?.startActivityUpdates(to:

    OperationQueue.main, withHandler: { [weak self]

    (activity: CMMotionActivity?) in

    guard let activity = activity else { return }

    if activity.walking {

    self?.currentWorkoutType = WorkoutType.walking

    } else if activity.running {

    self?.currentWorkoutType = WorkoutType.running

    } else if activity.cycling {

    self?.currentWorkoutType =

    WorkoutType.bicycling

    } else if activity.stationary {

    self?.currentWorkoutType =

    WorkoutType.stationary

    } else {

    self?.currentWorkoutType = WorkoutType.unknown

    }

    })

    }

    ...

    }

    Listing 3-9

    保存更新的活动类型

    ```


    `CMMotionActivity`类设计中的一个不足之处在于，它要求您定义活动的优先级，而不是使用枚举值来表示数据。我在完成处理程序前添加了`[weak
    self]`。在使用闭包时，通过强引用访问`self`可能会导致对象被保留，从而引起内存泄漏。使用`weak`可以避免这种情况。


    要在用户界面上显示该值，只需更新`updateWorkoutData()`方法，使其包含对`currentActivity`属性的检查，如清单 3-10 所示。


    ```

    @objc func updateWorkoutData() {

    let now = Date()

    var workoutPaceText = String(format: "%.2f m/s", arguments:

    [averagePace])

    if let lastTime = lastSavedTime {

    self.workoutDuration +=

    now.timeIntervalSince(lastTime)

    }

    if currentWorkoutType != WorkoutType.unknown {

    workoutPaceText.append(" | \(currentWorkoutType)")

    }

    ...

    workoutPaceLabel?.text = workoutPaceText

    ...

    }

    Listing 3-10

    显示活动类型

    ```


    在此示例中，我修改了配速标签以包含活动类型。如果活动类型未知，则不显示该值。这样做反而会让用户感到困惑，而不是提供帮助。


    要停止运动（活动类型）更新，只需更新`toggleWorkout()`方法，让`CMMotionActivityManager`停止监听运动更新，方法与停止计步器更新相同，如清单
    3-11 所示。


    ```

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    ...

    case .active:

    currentWorkoutState = .inactive

    stopWorkoutTimer()

    pedometer?.stopUpdates()

    motionManager?.stopActivityUpdates()

    ...

    default:

    ...

    }

    updateUserInterface()

    }

    Listing 3-11

    停止运动更新

    ```


    ## 处理气压计更新


    在进行 Core Motion 的最后一个实验时，您还可以获取用户的海拔高度。最棒的是，它遵循了其他 Core Motion 传感器 API 的设计模式，即：


    - 实例化一个管理器对象

    - 定义一个完成块来保存最新数据

    - 更新用户界面

    - 在完成后停止更新


    由于您应该已经熟悉这种设计模式，我在清单 3-12 中包含了将气压计数据添加到“创建锻炼视图控制器”的代码。


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    var workoutAltitude: Double = 0.0

    var workoutDistance: Double = 0.0

    ...

    var motionManager: CMMotionActivityManager?

    var altimeter: CMAltimeter?

    ...

    @IBAction func toggleWorkout() {

    ...

    switch currentWorkoutState {

    ...

    case .active:

    ...

    motionManager?.stopActivityUpdates()

    altimeter?.stopRelativeAltitudeUpdates()

    default:

    ...

    }

    updateUserInterface()

    }

    ...

    @objc func updateWorkoutData() {

    let now = Date()

    var workoutPaceText = String(format: "%.2f m/s |

    %0.2fm ", arguments: [averagePace, workoutAltitude])

    ...

    }

    ...

    func startWorkout() {

    currentWorkoutState = .active

    ...

    if (CMMotionManager().isDeviceMotionAvailable

    && CMPedometer.isStepCountingAvailable() &&

    CMAltimeter.isRelativeAltitudeAvailable()) {

    ...

    startActivityUpdates()

    startAltimeterUpdates()

    } else {

    isMotionAvailable = false

    }

    }

    ...

    func startAltimeterUpdates() {

    altimeter = CMAltimeter()

    altimeter?.startRelativeAltitudeUpdates(to:

    OperationQueue.main, withHandler: { [weak self]

    (altitudeData: CMAltitudeData?, error: Error?) in

    if let error = error {

    NSLog("Error reading altimeter data:

    \(error.localizedDescription)")

    return

    }

    guard let altitudeData = altitudeData,

    let relativeAltitude =

    altitudeData.relativeAltitude as? Double

    else { return }

    self?.workoutAltitude += relativeAltitude

    })

    }

    ...

    func resetWorkoutData() {

    ...

    workoutDistance = 0.0

    workoutAltitude = 0.0

    currentWorkoutType = WorkoutType.unknown

    }

    }

    Listing 3-12

    将海拔高度追踪添加到创建锻炼视图控制器

    ```


    现在，当您在 iPhone 上运行 IOTFit 应用并稍微走动（或摇晃手机）时，您应该会看到更快、更准确的活动更新，类似于图 3-5 截图中的效果。


    ![../images/346879_2_En_3_Chapter/346879_2_En_3_Fig5_HTML.jpg](img/346879_2_En_3_Fig5_HTML.jpg)


    图 3-5 IOTFit 应用截图（显示额外的锻炼数据）


    ## 总结


    在本章中，您将基于 GPS 的 IOTFit 应用转变为更准确、功能更丰富且更省电的版本，方法是使用 Core Motion 框架来访问 iPhone 和
    Apple Watch 上的 M 系列运动协处理器。您学习了如何为多个传感器设置管理器对象，以及如何使用完成处理程序响应它们的异步更新。经过几个示例后，设置管理器、响应更新和停止请求的过程变得非常明显，成为一种广泛使用的模式，使得气压计集成变得极其简单。


    为了可读性，并跟上当前的编程趋势，Apple 在其框架中越来越多地采用基于完成处理程序的工作流程。在需要在一个长时间运行的方法完成后立即执行快速操作的情况下，完成处理程序非常方便。我相信您会在本书以及您自己的项目中多次复用这一知识。

