- fmt: '### Configuring the Server to Start Up with the Raspberry Pi


    As the final step in setting up the web server, you should make the Node application
    start with the Raspberry Pi on boot. This will prevent you from having to manually
    start and run the Node application every time you want to access its data through
    HTTPS. If you implemented this step for the HomeBridge project from the last chapter,
    this setup process should be extremely familiar to you, as you will create a service
    using the `systemd` tool to manage this operation. Unlike HomeBridge, however,
    the IOTHome web server is much easier to set up as a service.


    To begin, you must create a service definition. First, create a file named `iothome.service`
    in your home directory using your favorite text editor. Within this file, you
    will have to specify:


    - The name of the service

    - The working directory for the script that will be run as a service

    - The location of the script

    - The user permissions for the script

    - The failure behavior for the script


    In Listing [8-14](#346879_2_En_8_Chapter.xhtml#PC23), I have provided the service
    definition file for my implementation of the project. To mimic the development
    environment, note that the user is set to `root`, and the working directory is
    set as the `sites/iothome` folder for the `pi` user.


    ```

    [Service]

    WorkingDirectory=/home/pi/sites/iothome

    ExecStart=node app.js

    Restart=always

    StandardOutput=syslog

    StandardError=syslog

    SyslogIdentifier=iothome

    User=root

    Group=root

    [Install]

    WantedBy=multi-user.target

    Listing 8-14

    Service Definition for the IOTHome Node Application

    ```


    Next, you will have to copy the definition file to the default directory for `systemd`
    and enable read and execute permissions on the file.


    ```

    sudo cp ~/iothome.service \ /etc/systemd/system/iothome.service

    sudo chmod u+rwx /etc/systemd/system/iothome.service

    ```


    As with the HomeBridge service, you must register the service with `systemctl`.


    ```

    sudo systemctl enable iothome

    ```


    To start the service, call the `systemctl` tool again, this time with the `start`
    command.


    ```

    sudo systemctl start iothome

    ```


    Your script is now set up to restart with the Raspberry Pi! To confirm that the
    operation was successful, restart your Raspberry Pi and try to call the `/temperature`
    end point from your browser. To view error messages, call the `systemctl` utility
    with the `status` command.


    ```

    sudo systemctl status iothome

    ```


    From here on out, if you have to modify your service definition or would like
    to modify the script itself, stop the service before performing your changes,
    then restart it once you are done.


    ## Connecting to Your Server from an iOS App


    At this point, you are able to access all of the data from the IOTHome system,
    using the web server on the Raspberry Pi. You also learned many different tools
    to debug the connection, including Google Chrome, the command line, and Postman.
    However, this is an iOS book, so it is only natural to learn how to apply these
    skills to iOS apps.


    In this section, you will expand the IOTHome app from previous chapters to add
    a screen that allows users to access the sensors in the system via HTTP instead
    of Bluetooth. While the UI code for Apple platforms is mostly single-use, the
    networking code can be reused among all platforms. In Chapter [9](#346879_2_En_9_Chapter.xhtml),
    you will reuse the networking code from this chapter to power an Apple TV–based
    dashboard for the IOTHome system.


    ### Setting Up the User Interface


    For this project, the user interface plays a supporting role to the networking
    code. As such, I do not want to focus too much on creating a new user interface
    for the Home Manager screen (the one intended to show data for the entire system).
    As opposed to the Door Manager, it should show information from the temperature
    system and connect to the web server instead of Bluetooth to retrieve data. To
    accomplish this, you will subclass the `DoorViewController` class (the backbone
    for the Door Manager screen), add the new properties for displaying temperature,
    and override the `connect()` method to initiate a call to the HTTPS web server,
    instead of a Bluetooth device.


    For the user interface, I have provided the updated wireframes in Figure [8-9](#346879_2_En_8_Chapter.xhtml#Fig9).
    I used the same basic layout as the Door Manager screen, except I added the new
    labels for the temperature and humidity data above the door sensor information.
    I also changed the description text for the Update button.


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig9_HTML.jpg](images/346879_2_En_8_Chapter/346879_2_En_8_Fig9_HTML.jpg)


    Figure 8-9 Updated wireframes for the IOTHome app


    To start implementing the project, make a clone of the IOTHome app from Chapter
    [6](#346879_2_En_6_Chapter.xhtml). You can copy your project files or a fresh
    copy from the GitHub project for this book (`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`).


    In Table [8-1](#346879_2_En_8_Chapter.xhtml#Tab1), I have provided the property
    names and constraints for the user interface elements. If you need a refresher
    on applying constraints, I recommend reviewing Chapters [1](#346879_2_En_1_Chapter.xhtml)
    and [6](#346879_2_En_6_Chapter.xhtml).


    Table 8-1 Styling for Home View Controller User Interface Elements


    | Element Name | Text Style | Height | Top Margin | Bottom Margin | Left Margin
    | Right Margin |

    | --- | --- | --- | --- | --- | --- | --- |

    | Navigation bar | Prefers large text | — | — | — | — | — |

    | “Temperature” title label | Title 2 | 24 | 40 | — | 30 | 20 |

    | “Temperature” value label | Title 2 | 24 | 40 | — | 20 | ≥30 |

    | “Humidity” title label | Title 2 | 24 | 8 | — | 30 | 20 |

    | “Humidity” value label | Title 2 | 24 | 8 | — | 20 | ≥30 |

    | “Door” title label | Title 2 | 24 | 8 | — | 30 | 20 |

    | “Door” value label | Title 2 | 24 | 8 | — | 20 | ≥30 |

    | “Battery Level” title label | Title 2 | 24 | 8 | — | 30 | 20 |

    | “Battery Level” value label | Title 2 | 24 | 8 | — | 20 | ≥30 |

    | “Last Updated” label | Body | 25 | 8 | — | 20 | 20 |

    | “Press to Connect” label | Body | 25 | — | 20 | 20 | 20 |

    | “Connect” button | Title 1 | 60 | 20 | 30 | 20 | 20 |


    Your final Interface Builder storyboard file (`Main.storyboard`) should be similar
    to my example in Figure [8-10](#346879_2_En_8_Chapter.xhtml#Fig10).


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig10_HTML.png](images/346879_2_En_8_Chapter/346879_2_En_8_Fig10_HTML.png)


    Figure 8-10 Updated storyboard for the IOTHome app


    From the previous implementation in Chapter [6](#346879_2_En_6_Chapter.xhtml),
    the owner for the Home Manager screen was set to the `HomeViewController` class.
    As shown in Listing [8-15](#346879_2_En_8_Chapter.xhtml#PC28), update the `HomeViewController.swift`
    file to use the `DoorViewController` class as its parent. Additionally, add the
    properties for the new labels and create an empty `connect()` method, with the
    `override` keyword, to indicate you will be overriding a method from the parent
    class.'
