  raw: '### Stopping and Pausing Pedometer Updates


    For the final pedometer-related tasks, you must be able to stop and pause pedometer
    updates. To stop pedometer updates, simply call the `stopUpdates()` method on
    your `CMPedometer` object as part of the `toggleWorkout()` method, as shown in
    Listing [3-6](#346879_2_En_3_Chapter.xhtml#PC6).


    ```

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    case .inactive:

    requestLocationPermission()

    case .active:

    currentWorkoutState = .inactive

    stopWorkoutTimer()

    pedometer?.stopUpdates()

    WorkoutDataManager.sharedManager.

    saveWorkout(duration: workoutDuration)

    default:

    NSLog("toggleWorkout() called out of

    context!")

    }

    updateUserInterface()

    }

    Listing 3-6

    Stopping Pedometer Updates

    ```


    There is no pause method available for the pedometer; however, you can accomplish
    the same task through careful management of which variable you use to manage the
    time updates. The original implementation of the `startPedometerUpdates()` method
    used the `workoutStartTime` property as the baseline for all pedometer updates.
    All updates would generate data based on the period between the original start
    time and the last update. You would not be able to implement accurate pausing
    with this behavior. However, if you were to use `lastSavedTime`, the property
    you created to manage the time updates for the workout duration label, you could
    get a value that queried pedometer updates for a starting date that would be updated
    when the user pressed the Pause and Resume buttons. In Listing [3-7](#346879_2_En_3_Chapter.xhtml#PC7),
    I have updated the `startPedometerUpdates()` method to use the `lastSavedTime`
    property and incremental data updates in its calculation of workout distance.


    ```

    func startPedometerUpdates() {

    guard let lastSavedTime = lastSavedTime

    else  { return }

    pedometer = CMPedometer()

    pedometer?.startUpdates(from: lastSavedTime, withHandler: {

    [weak self] (pedometerData: CMPedometerData?, error:     Error?) in

    NSLog("Received pedometer update!")

    if let error = error {

    NSLog("Error reading data:

    \(error.localizedDescription)")

    return

    }

    guard let pedometerData = pedometerData,

    let distance = pedometerData.distance

    as? Double,

    let averagePace =

    pedometerData.averageActivePace

    as? Double,

    let steps = pedometerData.numberOfSteps

    as? Int,

    let floorsAscended =

    pedometerData.floorsAscended as? Int else {

    return

    }

    self?.workoutDistance += distance

    self?.floorsAscended += floorsAscended

    self?.workoutSteps += steps

    self?.averagePace = averagePace

    })

    }

    Listing 3-7

    Incorporating Pausing into Pedometer Distance Calculations

    ```


    ## Getting Activity Type


    As you learned previously, Core Motion provides you with a very accurate, easy-to-use
    pedometer. However, it can provide more than just raw data alone. When Apple announced
    the Apple Watch, one of the slides it was proud of was the public reveal of their
    fitness lab, where they employ a large staff of engineers and researchers in the
    hope of finding better ways of measuring and utilizing the sensor data generated
    by the M-series chips and Apple Watch. One of the fruits of this labor was the
    ability to determine the type of activity the user is participating in (for example,
    running, walking, or bicycling). In a process similar to receiving pedometer updates,
    you can use an instance of `CMMotionActivityManager` in your class to listen to
    asynchronous updates for activity type.


    The method you use to listen to motion updates from a `CMMotionActivityManager`
    object is `startActivityUpdates(to:withHandler:)`. It takes two parameters: an
    Operation Queue and a completion handler that returns information on the activity
    type. In iOS programming, the concept of an Operation Queue is similar to a *thread*
    in other higher-level programming languages. It is a way of making a set of instructions
    (tasks or *Operations*) run in its own path of execution, with the hope of preventing
    others from being able to execute. These are frequently adopted for long-running
    tasks, such as heavy Core Data database operations. A developer will make a separate
    `OperationQueue` object for Core Data tasks and use a protocol or completion handler
    to tell another part of the program that the task has completed running.


    The `startActivityUpdates(to:withHandler:)` method requires you to specify to
    which `OperationQueue` the motion updates should be delivered. For the IOTFit
    app, you will primarily use motion data to update the user interface, so you should
    deliver the updates to the main `OperationQueue` for the application. In Listing
    [3-8](#346879_2_En_3_Chapter.xhtml#PC8), I have updated the `CreateWorkoutViewController`
    class to include a `CMMotionActivityManager` property and added a `startActivityUpdates()`
    method to monitor for activity changes when the workout begins.


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    var pedometer: CMPedometer?

    var motionManager: CMMotionActivityManager?

    ...

    func startWorkout() {

    ...

    if (CMMotionManager().isDeviceMotionAvailable

    && CMPedometer.isStepCountingAvailable()

    && CMAltimeter.isRelativeAltitudeAvailable()){

    isMotionAvailable = true

    startPedometerUpdates()

    startActivityUpdates()

    } else {

    isMotionAvailable = false

    }

    }

    ...

    func startActivityUpdates() {

    motionManager = CMMotionActivityManager()

    motionManager?.startActivityUpdates(to:

    OperationQueue.main, withHandler: { (activity:

    CMMotionActivity?) in

    //received motion update

    })

    }

    }

    Listing 3-8

    Initiating Activity-Type Updates

    ```'
  trans: "\n### 停止与暂停计步器更新\n\n对于最后几个与计步器相关的任务，你需要能够停止和暂停计步器更新。要停止计步器更新，只需在 `toggleWorkout()`\
    \ 方法中，对 `CMPedometer` 对象调用 `stopUpdates()` 方法即可，如代码清单 3-6 所示。\n\n```\n@IBAction\
    \ func toggleWorkout() {\n    switch currentWorkoutState {\n    case .inactive:\n\
    \        requestLocationPermission()\n    case .active:\n        currentWorkoutState\
    \ = .inactive\n        stopWorkoutTimer()\n        pedometer?.stopUpdates()\n\
    \        WorkoutDataManager.sharedManager.saveWorkout(duration: workoutDuration)\n\
    \    default:\n        NSLog(\"toggleWorkout() called out of context!\")\n   \
    \ }\n    updateUserInterface()\n}\n```\n\n*代码清单 3-6 停止计步器更新*\n\n计步器没有可用的暂停方法；不过，你可以通过精心管理用于处理时间更新的变量来实现同样的功能。`startPedometerUpdates()`\
    \ 方法的原始实现使用 `workoutStartTime` 属性作为所有计步器更新的基准。所有更新将根据原始开始时间与上次更新时间之间的时间段生成数据。在这种行为下，你无法实现准确的暂停。然而，如果你使用\
    \ `lastSavedTime`（即你创建的用于管理工作 out 时长标签时间更新的属性），则可以获取到一个查询计步器更新的起始日期值，当用户按下“暂停”和“恢复”按钮时，该日期值会随之更新。在代码清单\
    \ 3-7 中，我更新了 `startPedometerUpdates()` 方法，使其在计算运动距离时使用 `lastSavedTime` 属性和增量数据更新。\n\
    \n```\nfunc startPedometerUpdates() {\n    guard let lastSavedTime = lastSavedTime\
    \ else { return }\n    pedometer = CMPedometer()\n    pedometer?.startUpdates(from:\
    \ lastSavedTime, withHandler: {\n        [weak self] (pedometerData: CMPedometerData?,\
    \ error: Error?) in\n        NSLog(\"Received pedometer update!\")\n        if\
    \ let error = error {\n            NSLog(\"Error reading data: \\(error.localizedDescription)\"\
    )\n            return\n        }\n        guard let pedometerData = pedometerData,\n\
    \              let distance = pedometerData.distance as? Double,\n           \
    \   let averagePace = pedometerData.averageActivePace as? Double,\n          \
    \    let steps = pedometerData.numberOfSteps as? Int,\n              let floorsAscended\
    \ = pedometerData.floorsAscended as? Int else {\n            return\n        }\n\
    \        self?.workoutDistance += distance\n        self?.floorsAscended += floorsAscended\n\
    \        self?.workoutSteps += steps\n        self?.averagePace = averagePace\n\
    \    })\n}\n```\n\n*代码清单 3-7 将暂停功能集成到计步器距离计算中*\n\n### 获取活动类型\n\n正如你之前所学，Core Motion\
    \ 为你提供了一个非常精确且易于使用的计步器。然而，它能提供的不仅仅只是原始数据。当苹果发布 Apple Watch 时，他们引以为傲的幻灯片之一就是公开了其健身实验室，他们雇佣了大量工程师和研究人员，希望能找到更好的方法来测量和利用\
    \ M 系列芯片及 Apple Watch 生成的传感器数据。这项工作的成果之一便是能够确定用户正在参与的活动类型（例如，跑步、步行或骑自行车）。在与接收计步器更新类似的过程中，你可以在类中使用\
    \ `CMMotionActivityManager` 的实例来监听活动类型的异步更新。\n\n用于监听 `CMMotionActivityManager`\
    \ 对象运动更新的方法是 `startActivityUpdates(to:withHandler:)`。它接收两个参数：一个 `OperationQueue`\
    \ 和一个返回活动类型信息的完成处理程序。在 iOS 编程中，`OperationQueue` 的概念类似于其他高级编程语言中的*线程*。它是一种让一组指令（任务或*操作*）在其自己的执行路径中运行的方式，旨在防止其他指令被阻塞。这些方法常用于长时间运行的任务，例如繁重的\
    \ Core Data 数据库操作。开发者会为 Core Data 任务创建一个单独的 `OperationQueue` 对象，并使用协议或完成处理程序来告知程序的另一部分任务已完成运行。\n\
    \n`startActivityUpdates(to:withHandler:)` 方法要求你指定将运动更新传递到哪个 `OperationQueue`。对于\
    \ IOTFit 应用，你将主要使用运动数据来更新用户界面，因此应该将更新传递到应用的主 `OperationQueue`。在代码清单 3-8 中，我更新了\
    \ `CreateWorkoutViewController` 类，使其包含一个 `CMMotionActivityManager` 属性，并添加了一个 `startActivityUpdates()`\
