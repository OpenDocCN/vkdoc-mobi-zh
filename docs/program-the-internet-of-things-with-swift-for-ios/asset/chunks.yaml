    have a Raspberry Pi 2 or Pi Zero, on which you have already configured USB Bluetooth
    and Wi-Fi modules, you are more than welcome to use them here.


    On a related note, if you are not familiar with how the Raspberry Pi works, it
    requires a microSD card to run its system image. It comes with a small bootloader,
    but it is only capable of starting up the image on your microSD card. For the
    power supply, you can use any device capable of outputting 5V DC, such as the
    USB port on a computer, a portable battery, or a USB wall wart power adapter.


    When collected, your parts should resemble those in the photo in Figure [7-1](#346879_2_En_7_Chapter.xhtml#Fig1).
    I used a Raspberry Pi 3 for my implementation, as I think it is the easiest to
    acquire, and its large size makes it very easy to work with.


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig1_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Collected parts for the IOTHome project'
  trans: '

    # 学习目标


    在本章中，你将使用树莓派为在第 5 章和第 6 章中制作的门磁传感器构建一个 HomeKit 桥接器，并学习如何在 iOS 中将其注册为有效的 HomeKit
    设备。树莓派将通过蓝牙连接传感器以读取其状态，并通过 HomeKit 配件协议（HAP）报告状态。顾名思义，HomeKit 桥接器可以通过单个接口将多个设备连接到
    HomeKit。为了演示设备的桥接功能，你还需要将一个温度传感器连接到树莓派，并通过 HAP 报告其状态。


    虽然有一个 API 可以让你在应用内管理 HomeKit 设备和房间，但在本书第一版出版后，我发现这些功能在 HomeKit 设备中的采用率较低，因为它们与苹果家庭应用中的功能是镜像关系。因此在本版中，我决定放弃这些主题，转而侧重于扩展树莓派的配置，因为这是一个非常复杂的过程。


    在部署 HomeKit 桥接器的过程中，你将学习 iOS 物联网应用开发的以下关键概念：


    - 设置树莓派

    - 安装 Linux 软件包，例如`Node.js`，及其依赖项

    - 安装和配置`HomeBridge`

    - 通过家庭应用注册设备

    - 调试`HomeBridge`


    在本章中，你将使用树莓派作为硬件开发平台。与 Arduino 类似，树莓派也是一种流行的开源硬件平台。但与 Arduino 不同的是，只有少数几款由树莓派基金会（[`www.raspberrypi.org`](http://www.raspberrypi.org)）官方支持的树莓派设备，而且树莓派旨在运行
    Linux 并提供类似台式计算机的功能，而 Arduino 则用于驱动传感器。因此，树莓派被称为**单板计算机**。作为一台完整的 Linux 计算机，你可以运行大多数
    Linux 软件包。在本章中，你将利用`Node.js`来运行`HomeBridge`服务及其插件。`Node.js`是一个运行时环境，允许你从命令行运行
    JavaScript 程序，如今常被用作 Web 服务器以及用 C 等编译型语言编写的启动工具的替代品。


    根据你的需求，你最终可能会考虑使用 BeagleBone 或 Asus Tinker Board 来代替树莓派，但我认为树莓派的设置过程和用户社区对初学者最友好。


    像往常一样，你可以在本书 GitHub 页面（[`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)）的`Chapter`
    `7`文件夹下找到此项目的 iOS 代码。该项目树莓派部分的配置脚本包含在`Chapter` `7`文件夹下的`Pi`子文件夹中。


    # 设置树莓派 HomeKit 桥接器


    在本章中，你将使用一个树莓派作为 IOTHome 门磁传感器和直接连接到树莓派的温度传感器的 HomeKit 桥接器。这将允许用户通过 Siri 中的语音命令以及本章稍后将构建的配套应用来访问这两类统计数据。


    虽然本章涉及硬件部分，但其中很多内容将基于你在第 5 章中学到的知识。与 Arduino 不同，你无需安装特殊的 IDE 来连接树莓派。但是，你将需要多花一点时间在设置上，以确保`HomeBridge`能正常工作。


    ## 组装硬件


    对于这个项目，硬件需求是一块能够运行`HomeBridge`的树莓派，以及一个用于读取树莓派所在房间温度的温度传感器。在表 7-1 中，我列出了组装本项目电路时使用的零件清单。


    表 7-1


    HomeKit 桥接器项目零件清单


    | **零件名称** | **数量** | **贸泽电子零件号** |

    | --- | --- | --- |

    | 树莓派 3（或更新版本） | 1 | RPI3-MODBP-BULK |

    | 无焊面包板 | 1 | 854-BB170-WH |

    | 面包板跳线包 | 1 | 713-110990049 |

    | DHT22 温度传感器 | 1 | 485-385 |

    | microSD USB 读卡器/写入器 | 1 | 485-939 |

    | 16GB（或更大）microSD 存储卡 | 1 | 467-SDSDQAD-016G |


    让我们稍微回顾一下第 5 章和第 6 章，过去几年物联网应用普及带来的最大好处之一是，爱好者们可以更容易地获得低成本传感器。正如你在零件清单中会注意到的，我为我们的项目选择了
    DHT22 温湿度传感器模块。该模块将湿度传感器的集成电路及其支持部件（例如电容器、电阻器）集成在一个封装中，并提供了一个简单的三针接口，由电源引脚、接地引脚和数据引脚组成。虽然你可以将传感器直接连接到树莓派的排针上，但我建议使用面包板，以便将来更容易移动和重新配置电路。


    在零件清单中，我指定了“任何现代的、支持无线功能的树莓派”。为了运行`HomeBridge`，你的主机设备不仅必须能够运行`Node.js`服务器，还需要
    Wi-Fi 和蓝牙，以便与你的 HomeKit 中枢（家中的 iPad、HomePod 或 Apple TV）进行通信。虽然本章提供的脚本和说明可以在任何能够运行最新版本
    Raspbian Linux 发行版的树莓派上运行，但树莓派 3 和树莓派 Zero W 是首批内置蓝牙和 Wi-Fi 的设备。如果你有树莓派 2 或 Pi
    Zero，并且已经为其配置了 USB 蓝牙和 Wi-Fi 模块，我们非常欢迎你在此使用它们。


    另外，如果你不熟悉树莓派的工作原理，它需要一张 microSD 卡来运行其系统镜像。它带有一个小型引导加载程序，但该程序只能启动 microSD 卡上的镜像。对于电源，你可以使用任何能够输出
    5V 直流电的设备，例如计算机的 USB 端口、便携式电池或 USB 墙插式电源适配器。


    收集齐所有零件后，它们应该类似于图 7-1 照片中的样子。我在实现中使用了树莓派 3，因为我认为它最容易获得，而且其较大的尺寸使得操作非常方便。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig1_HTML.jpg](img/346879_2_En_7_Fig1_HTML.jpg)


    图 7-1


    IOTHome 项目收集的零件

