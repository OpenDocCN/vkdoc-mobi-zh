    ## Summary


    In this chapter, you learned how to implement both roles of Bluetooth LE: the
    peripheral (the device that offers infromation) and the central manager (the device
    that fetches information from one or more peripherals). The ESP32-based circuit
    you started in Chapter [5](#346879_2_En_5_Chapter.xhtml) served as the peripheral,
    powered by the open source ESP32_BLE_Arduino library, and the IOTHome iOS served
    as the central manager, using the Core Bluetooth framework. For both roles, after
    going through some lengthy setup steps, it became quite easy to transfer data
    using Bluetooth LE characteristic updates. To help the user reduce his/her battery
    usage, you also configured both devices to send and respond to updates only when
    the device experienced a noticeable state change (for example, a 10% reduction
    in the door opening or battery level since the last update).


    Bluetooth continues to be one of the most popular protocols for communicating
    with hardware accessories. My hope is that you will be able to reuse most of what
    you learned in this chapter for future updates to the protocol and on other devices
    you may choose to build!


    # 7. Setting Up a Raspberry Pi and Using It As a HomeKit Bridge


    At this point in your journey through Internet of Things (IoT) app development,
    you have learned how to use sensors on iOS devices (GPS, motion) and how to interact
    with third-party hardware devices, such as Arduino, using open communication protocols,
    including Bluetooth. In this chapter, you will learn about an Apple-specific IoT
    technology that lies somewhere in between both of these: HomeKit.


    HomeKit was introduced in 2014 with iOS 8, as Apple’s proprietary standard to
    enable iOS devices to communicate with certified third-party IoT accessories for
    the home, such as smart lightbulbs and air conditioners. The sales pitch was that
    through Apple’s hardware certification process, special encryption chip for IoT
    devices, and deep integration with iOS, it would be able to deliver the strongest,
    most secure platform for IoT in the home. Rather than buying a special hardware
    device to serve as the gateway for your devices, you could use an iPad, HomePod,
    or Apple TV in your home to serve this purpose. Additionally, you would be able
    to use Siri to check on the status of your devices.


    Unfortunately, the certification process and hardware chip proved to be too expensive
    and too late for many third-party hardware manufacturers, and the platform never
    achieved the momentum that was expected of it. While HomeKit has not proven itself
    to be the instant commercial status Apple hoped for, more compatible devices are
    being released for it every day. And, more important, Apple now allows hobbyists
    to create noncertified HomeKit devices for their personal use, through its release
    of a noncommercial version of the HomeKit Accessory Protocol (HAP) specification.
    This license allows you to create accessories for your personal use, which will
    appear as “non-certified” when you connect to them through an iOS device. To make
    things even better, your personal devices can be built on anything that can implement
    HAP, from a Raspberry Pi to a Mac.


    On the software side, as a part of iOS, Apple provides a HomeKit framework that
    allows you to manage rooms and devices registered in the system’s HomeKit database.
    Released at the same time as HealthKit, HomeKit aims to operate in the same manner,
    by providing a protected, system-wide database of HomeKit devices that any user-permitted
    application can access. However, one major component Apple does not provide is
    an implementation of the HAP for use on hardware devices. To fill this niche,
    in this chapter, you will use an excellent open source project, HomeBridge ( [`https://github.com/nfarina/homebridge`](https://github.com/nfarina/homebridge)
    ), which implements most of the HAP specification and a provides a plug-in system
    that makes it easy to connect other popular IoT services and accessories to your
    project.'
