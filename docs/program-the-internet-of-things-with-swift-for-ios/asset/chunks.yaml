- fmt: '### Caution


    While researching this chapter, I noticed that the Bluetooth utility on the Raspberry
    Pi became unable to maintain a connection after several connection debugging sessions.
    If you are having issues with the door sensor not reporting a successful connection
    via its blue status LED, try restarting the Pi and then trying again.


    To expose the data over HTTP, create a `/door/status` end point. When the end
    point is called, echo the saved values from the global variables and wrap them
    in a JSON dictionary, as shown in Listing [8-10](#346879_2_En_8_Chapter.xhtml#PC18).
    To help enforce the connection flow for the API, return an error if the device
    connection has not been established yet.


    ```

    app.get(''/door/status'', function (req, res) {

    console.log("start connect");

    if (savedPeripheral) {

    res.json({

    ''lockStatus'': lockStatus,

    ''batteryStatus'': batteryStatus,

    ''lastUpdateTime'': lastUpdateTime

    });

    } else {

    res.status(500).json({error: ''Not connected to a

    sensor. Please re-connect and try again.''});

    }

    });

    Listing 8-10

    Reading Data from a Bluetooth Peripheral, Using Noble

    ```


    To wrap up the Node application, you must create the `/door/disconnect/` end point.
    As shown in Listing [8-11](#346879_2_En_8_Chapter.xhtml#PC19), in my implementation,
    I disconnect from the device when the end point is called. To be safe, I also
    stop scanning for the BLE device, just in case this method is called before the
    connection has been fully established.


    ```

    app.post(''/door/disconnect'', function (req, res) {

    noble.stopScanning();

    console.log("stop scan");

    if (savedPeripheral) {

    console.log(''disconnected'');

    savedPeripheral.disconnect();

    }

    res.json({

    ''status'': ''disconnected''

    });

    });

    Listing 8-11

    Disconnecting from a Bluetooth Peripheral, Using Noble

    ```


    Before moving on, you may be wondering how to test the `POST`-based end points.
    For this task, I recommend downloading the Postman OS X app from [`www.getpostman.com/`](http://www.getpostman.com/)
    . As shown in Figure [8-4](#346879_2_En_8_Chapter.xhtml#Fig4), to begin your debugging
    session, simply click the Send button after configuring your request. The results
    of your request will appear in the large text field at the bottom of the window.
    You can access a list of your past requests (and their configurations) from the
    left sidebar of the window.


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig4_HTML.jpg](images/346879_2_En_8_Chapter/346879_2_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Using Postman to verify `POST` requests


    ### Using HTTPS to Provide Secure HTTP Connections


    In a move to increase the privacy of users’ data and reduce phishing (false identity)
    attacks on the Internet, starting in 2016, Apple, Google, and other major technology
    companies announced that their platforms would be moving toward primarily supporting
    servers that implement HTTPS, an extension of HTTP that requires all data to be
    encrypted with Transport Layer Security (TLS). TLS is implemented by adding a
    Secure Sockets Layer (SSL) certificate to your server, which has been issued by
    a provider that is trusted by the major browsers and your platform (for example,
    iOS).


    In Google Chrome, some of the most obvious implications of not using HTTPS are
    that your site will show up lower in Google’s search ranking. Additionally, sites
    with untrusted TLS certificates will be marked as `Not Secure` and present users
    a warning page when they are loaded in the browser. In iOS, Apple enforces HTTPS
    by making all HTTP requests fail inside of an app, unless the developer manually
    re-enables them. Additionally, all untrusted HTTPS requests will fail.


    To work around these limitations and improve the security of the IOTHome device,
    you should extend the Node application to support HTTPS. As with the other functionality
    in this project, you can take advantage of Node modules and tools that have been
    developed for web apps, to easily add HTTPS to the IOTHome project.


    There are three major options for implementing HTTPS in your project.


    1.  If you are developing for a production environment, you must request an SSL
    certification from a service that is trusted by the Internet Engineering Task
    Force (IETF), the organization that maintains the HTTPS standard. I recommend
    using Comodo, Verisign, or a certificate from Amazon Web Services (AWS). Certificates
    from these providers have the greatest compatibility, clear instructions, and
    support.


    2.  If you would like to develop a production-level prototype and already have
    a domain, you can use the Let’s Encrypt trust authority ( [`www.letsencrypt.org`](http://www.letsencrypt.org)
    ) and its accompanying tool, `certbot-auto` ( [`https://certbot.eff.org/docs/install.html`](https://certbot.eff.org/docs/install.html)
    ), to generate a free, trusted SSL certificate for testing.


    3.  For pure prototype purposes, you can generate your own SSL certificate, using
    OpenSSL on your Raspberry Pi.


    For the purposes of this book, I have chosen option #3. If you would like to use
    options #1 or #2, I suggest creating those certificates on the server attached
    to your domain name, then copying it over to your Raspberry Pi (granted your SSL
    provider allows this capability).'
