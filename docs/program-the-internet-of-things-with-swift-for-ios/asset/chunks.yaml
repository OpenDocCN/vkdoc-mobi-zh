- fmt: '### Renaming Classes from the Base Template


    As mentioned earlier, a huge advantage of using the Tabbed App template from Apple
    is that it pre-populates your project with a storyboard and empty classes for
    an application that uses a Tab interface as its primary method for navigation
    between screens. Earlier, you verified that the project itself was generated successfully.
    To verify that your storyboard was generated successfully, click the `Main.storyboard`
    file in the Project Navigator. The center pane of the editor window should switch
    to Interface Builder and display the contents of the default storyboard, as shown
    in Figure [1-16](#346879_2_En_1_Chapter.xhtml#Fig16). The storyboard should contain
    a Tab View Controller linked to two blank View Controllers.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig16_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig16_HTML.jpg)


    Figure 1-16


    Default storyboard for a Tabbed App project


    The child View Controllers are named `FirstViewController` and `SecondViewController`;
    however, these class names will make maintainability difficult as the project
    starts to grow. As with a natural ecosystem, items in an Xcode project are linked
    deeper than what you see on the surface. In the case of classes that are used
    by storyboards, changing the class name also means changing references in other
    classes and the storyboard file itself. To manage this complicated process, you
    can use the refactoring tools in Xcode. To rename the `FirstViewController` class,
    secondary-click (right-click or long-press) the symbol name, scroll down to Refactor
    in the contextual menu, and then select Rename, as shown in Figure [1-17](#346879_2_En_1_Chapter.xhtml#Fig17).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig17_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig17_HTML.jpg)


    Figure 1-17


    Presenting the Refactor menu for a symbol


    After clicking Rename, the center pane will display an accordion-style table.
    In the case of renaming a class, the first row shows a preview of the file name,
    the second provides an editing area where you can make changes to the class name,
    and the third row and later show previews of changes that are made in files that
    use your class as a dependency (such as storyboards or other classes). Enter `CreateWorkoutViewController`
    as the new name for the View Controller and verify that the output is similar
    to that in Figure [1-18](#346879_2_En_1_Chapter.xhtml#Fig18). Click the Rename
    button at the top-right, to apply your changes.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig18_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig18_HTML.jpg)


    Figure 1-18


    Xcode editor preview for refactoring


    Follow the same process to rename `SecondViewController` to `WorkoutMapViewController`.
    You can use the `Rename` tool in your own code later, to rename variable names
    and data structures with the same visual editor.


    ### Note


    If the files did not get renamed automatically, you can fix this with two click
    actions. First, click the file name once, to select the item, then click again,
    to edit the file name. In Swift, the file name does not affect compilation.


    ### Laying Out the User Interface


    Now that the storyboard’s dependencies have been resolved, you can start placing
    user interface elements. If you have been developing iOS apps for a while, this
    should be a fairly routine exercise, but for newer users, it may clear up some
    confusion from the past.


    Your first objective will be to layout the Create Workout screen from the wireframe
    in Figure [1-1](#346879_2_En_1_Chapter.xhtml#Fig1). It has four labels (two for
    information and two for values) to display your workout progress and two buttons
    the user can use to start/stop the workout or pause/resume a workout.


    First, start by clicking `Main.storyboard` from the Project Navigator. From there,
    make sure the utilities pane (right pane) is open. The bottom right has a split
    screen with an icon that looks like the old iPhone Home button. This is called
    the *object library* and contains user interface elements that you can drag onto
    View Controllers in the storyboard. Scroll down or search for `Label`, to find
    a `UILabel`. As shown in Figure [1-19](#346879_2_En_1_Chapter.xhtml#Fig19), drag-and-drop
    the Label object from the object library to the Create Workout View Controller
    (it should still have the `First View Controller` label on it from the template).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig19_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig19_HTML.jpg)


    Figure 1-19


    Adding a label to a View Controller


    ### Tip


    To speed up navigation, you can open files within tabs in Xcode, by pressing Command+T
    (`⌘+T`).


    Continue this process, adding the other three labels and two buttons. You can
    delete the old labels with the `First View` text as well. At this point, don’t
    worry about the exact placement of the items, as you are about to learn how to
    use constraints to set the size and Auto Layout rules.


    ### Applying Auto Layout Constraints


    When building a user interface with Auto Layout, instead of thinking about the
    (x, y) coordinate position of each item, you should think about where they should
    sit relative to the boundaries of the screen and other elements. In iOS, these
    rules are managed by *constraints*. At runtime, Auto Layout will use these constraints
    to resize or reposition elements on the screen. The most common types of constraints
    are *pinned* (fixed position) and *relative* (their position is relative to a
    boundary on the screen or other items). Constraints can be greater than, equal
    to, or less than a value.


    For the IOTFit app, I felt the key feature of the Create Workout screen was that
    users should be able to press the Start and Pause buttons easily, no matter what
    size iPhone they are using. By pinning the buttons to the bottom of the screen,
    I would not have to worry about the button placement becoming too difficult to
    use with changes in screen size. Users are already accustomed to pressing buttons
    on the bottom of the screen, because the placement of the Home button on the bottom
    of every iOS device has taught them to interact with the bottom of the screen
    for control gestures. For the status labels, I wanted to accomplish two goals:
    keeping the screen balanced and not interfering with the placement of the buttons,
    so I pinned them to the top of the screen. As shown in Figure [1-20](#346879_2_En_1_Chapter.xhtml#Fig20),
    with this layout in mind, when the app runs on an iPhone SE, iPhone X, and iPhone
    8 Plus, the only things that will change are the scale of the elements and the
    vertical space in between the status labels and action buttons.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig20_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig20_HTML.jpg)


    Figure 1-20


    How the IOTFit user interface adapts to different iPhone sizes'
