    in a text bubble next to the Touch Up Inside event, as shown in Figure [1-42](#346879_2_En_1_Chapter.xhtml#Fig42).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig42_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig42_HTML.jpg)


    Figure 1-42


    Verifying the successful event connection for the Pause Workout button


    Repeat this process for the Toggle Workout button and you will be all done! To
    verify that everything is working as expected, click the Run button at the top
    right of the Xcode editor window. This will compile and run your application.
    By default, Xcode will run your project on its default setting (currently, the
    iPhone 8 Plus simulator), but you can change it to another simulator or a connected
    device from the drop-down menu to the right of the Run button. As shown in Figure
    [1-43](#346879_2_En_1_Chapter.xhtml#Fig43), after pressing the Run button, the
    simulator will start up with your app in the foreground, and when you click the
    Toggle Workout or Pause Workout buttons, the Debugging Console (bottom right)
    will display the log messages you specified earlier.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig43_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig43_HTML.jpg)


    Figure 1-43


    Testing the IOTFit app using the Xcode iPhone 8 Plus simulator


    ## Summary


    In this chapter, you learned how to perform many critical project life cycle tasks
    in Xcode, which you will use throughout this book and in your own projects. These
    tasks included creating a new project, connecting your Apple Developer Program
    account to Xcode, using Xcode’s refactoring tools, building a user interface,
    and using Interface Builder to connect storyboards to your code. The chapter was
    heavy on images and step-by-step instructions, reflecting the visual nature of
    working with Xcode. In my experience, so much of the joy and frustration of iOS
    development comes from learning workflows in Xcode. I hope that this chapter made
    the learning process a little less painful!


    # 2. Using Core Location to Build a Workout Tracking App


    In the first chapter, you learned how to use Xcode and Interface Builder to set
    up the project for the IOTFit workout app and create its user interface. However,
    due to the complicated setup process, you did not have an opportunity to make
    it a true Internet of Things (IoT) app by accessing the GPS hardware on the phone.
    In this chapter, you will learn how to take advantage of Apple’s Core Location
    framework to request location permission from the user, receive periodic updates
    on the user’s location, and plot those locations on a map.


    This chapter will begin addressing a misconception that you will hear throughout
    your time as an iOS developer: the platform is too hard and inconvenient to use.
    Although there are elements of truth to this, as evidenced by Chapter [1](#346879_2_En_1_Chapter.xhtml)’s
    complicated user interface setup process, you will learn that as you become more
    familiar with Apple’s development patterns, the learning curve for picking up
    new frameworks will drop significantly. Additionally, you will notice that the
    amount of work to learn a new framework is significantly less than the work required
    to implement all of the functionality yourself. In the case of Core Location,
    the framework does the hard work of making the location requests, processing the
    data from the GPS hardware, and delivering it via asynchronous events that your
    app can handle. Imagine having to write all of this by yourself, on a deadline!


    In keeping with the iterative process of this book, this chapter will focus on
    how to implement the features of the IOTFit app that are responsible for recording
    a workout’s duration, tracking the path the user took during the workout, and
    displaying this location information on a map.'
