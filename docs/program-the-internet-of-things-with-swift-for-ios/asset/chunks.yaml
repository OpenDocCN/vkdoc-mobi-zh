- fmt: '### Tip


    You can use the hierarchy panel (the left pane of the editor) to quickly verify
    that items have been added to a View Controller. Similarly, by rearranging items
    in the hierarchy, you can quickly move items in front of or behind other items.


    Now that the `Create Workout View Controller` has been successfully set up, you
    can move on to the `Workout Map View Controller`. If you remember Figure [1-1](#346879_2_En_1_Chapter.xhtml#Fig1),
    this screen consists of a navigation bar at the top, with some information about
    the last recorded workout and a map that fills most of the screen.


    The easiest component to start with is adding the navigation bar. Navigation bars
    are one of iOS’s core navigation features, which emulate the behavior of a browser
    window, by providing a common information bar at the top. A navigation bar is
    loaded with a *Root View Controller* (similar to a home page). When buttons (or
    links) inside the `Root View Controller` are clicked, the navigation bar pushes
    their content into the main window, while also providing a back button at the
    top right, allowing the user to navigate back to the last screen.


    To easily add a navigation bar to the blank `Workout Map View Controller`, click
    to select the `View Controller` in Interface Builder (it should still have the
    “Second View” label on it) and, as pictured in Figure [1-28](#346879_2_En_1_Chapter.xhtml#Fig28),
    go to the Editor menu and select `Embed In` ➤ `Navigation Controller`.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig28_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig28_HTML.jpg)


    Figure 1-28


    Adding a navigation controller via the Editor menu


    As shown in Figure [1-29](#346879_2_En_1_Chapter.xhtml#Fig29), this will add a
    Navigation Controller in between the Tab Bar Controller and `Workout Map View
    Controller`. By holding down on the `Workout Map View Controller`, you can change
    its position on the storyboard, to make it more visually appealing. As you will
    notice, there are directed arrows between the Tab Bar Controller, Navigation Controller,
    and `Workout Map View Controller`. These are called *segues* and specify how View
    Controllers are linked to each other on Storyboards, either through relationships
    (for example, parent-child) or actions (for example, pressing a button). The `Embed
    In` function is very convenient, because it prevents you from having to set up
    all these segues yourself, which, although possible, is very time-consuming and
    error-prone.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig29_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig29_HTML.jpg)


    Figure 1-29


    Storyboard after embedding Navigation Controller


    To customize the title of the `Workout Map View Controller`, click in the middle
    of the Navigation Item (bar) on the `Workout Map View Controller` and begin typing,
    as shown in Figure [1-30](#346879_2_En_1_Chapter.xhtml#Fig30). You may also use
    the Attributes Inspector to enter your text.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig30_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig30_HTML.jpg)


    Figure 1-30


    Editing the title for the `Workout Map View Controller`


    To make the title text large, the new preferred style for iOS 11, click the Navigation
    Controller, then in the Attributes Inspector, select `Prefers Large Titles`, as
    shown in Figure [1-31](#346879_2_En_1_Chapter.xhtml#Fig31).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig31_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig31_HTML.jpg)


    Figure 1-31


    Enabling iOS 11–style Navigation Item titles


    For the final step in preparing the `Workout Map View Controller`, you must add
    a Map View. First, delete the old labels from the template-generated View Controller,
    drag a Map View from the Object Library and set its Top, Bottom, Right, and Left
    constraints to `0`. Then click the Add 4 Constraints button to apply the constraints.
    If you must jog your memory on how to do this, go back to the “Applying Auto Layout
    Constraints” section earlier in this chapter. Your output should look similar
    to that in Figure [1-32](#346879_2_En_1_Chapter.xhtml#Fig32).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig32_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig32_HTML.jpg)


    Figure 1-32


    `Workout Map View Controller` after adding Map View'
  raw: '### Tip


    You can use the hierarchy panel (the left pane of the editor) to quickly verify
    that items have been added to a View Controller. Similarly, by rearranging items
    in the hierarchy, you can quickly move items in front of or behind other items.


    Now that the Create Workout View Controller has been successfully set up, you
    can move on to the Workout Map View Controller. If you remember Figure [1-1](#346879_2_En_1_Chapter.xhtml#Fig1),
    this screen consists of a navigation bar at the top, with some information about
    the last recorded workout and a map that fills most of the screen.


    The easiest component to start with is adding the navigation bar. Navigation bars
    are one of iOS’s core navigation features, which emulate the behavior of a browser
    window, by providing a common information bar at the top. A navigation bar is
    loaded with a *Root View Controller* (similar to a home page). When buttons (or
    links) inside the Root View Controller are clicked, the navigation bar pushes
    their content into the main window, while also providing a back button at the
    top right, allowing the user to navigate back to the last screen.


    To easily add a navigation bar to the blank Workout Map View Controller, click
    to select the View Controller in Interface Builder (it should still have the “Second
    View” label on it) and, as pictured in Figure [1-28](#346879_2_En_1_Chapter.xhtml#Fig28),
    go to the Editor menu and select Embed In ➤ Navigation Controller.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig28_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig28_HTML.jpg)


    Figure 1-28


    Adding a navigation controller via the Editor menu


    As shown in Figure [1-29](#346879_2_En_1_Chapter.xhtml#Fig29), this will add a
    Navigation Controller in between the Tab Bar Controller and Workout Map View Controller.
    By holding down on the Workout Map View Controller, you can change its position
    on the storyboard, to make it more visually appealing. As you will notice, there
    are directed arrows between the Tab Bar Controller, Navigation Controller, and
    Workout Map View Controller. These are called *segues* and specify how View Controllers
    are linked to each other on Storyboards, either through relationships (for example,
    parent-child) or actions (for example, pressing a button). The `Embed In` function
    is very convenient, because it prevents you from having to set up all these segues
    yourself, which, although possible, is very time-consuming and error-prone.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig29_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig29_HTML.jpg)


    Figure 1-29


    Storyboard after embedding Navigation Controller


    To customize the title of the Workout Map View Controller, click in the middle
    of the Navigation Item (bar) on the Workout Map View Controller and begin typing,
    as shown in Figure [1-30](#346879_2_En_1_Chapter.xhtml#Fig30). You may also use
    the Attributes Inspector to enter your text.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig30_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig30_HTML.jpg)


    Figure 1-30


    Editing the title for the Workout Map View Controller


    To make the title text large, the new preferred style for iOS 11, click the Navigation
    Controller, then in the Attributes Inspector, select Prefers Large Titles, as
    shown in Figure [1-31](#346879_2_En_1_Chapter.xhtml#Fig31).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig31_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig31_HTML.jpg)


    Figure 1-31


    Enabling iOS 11–style Navigation Item titles


    For the final step in preparing the Workout Map View Controller, you must add
    a Map View. First, delete the old labels from the template-generated View Controller,
    drag a Map View from the Object Library and set its Top, Bottom, Right, and Left
    constraints to `0`. Then click the Add 4 Constraints button to apply the constraints.
    If you must jog your memory on how to do this, go back to the “Applying Auto Layout
    Constraints” section earlier in this chapter. Your output should look similar
    to that in Figure [1-32](#346879_2_En_1_Chapter.xhtml#Fig32).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig32_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig32_HTML.jpg)


    Figure 1-32


    Workout Map View Controller after adding Map View'
  trans: '

    ### 提示


    你可以使用层级面板（编辑器左侧窗格）快速验证视图控制器中是否已添加项目。同样，通过重新排列层级中的项目，你可以快速将项目移到其他项目的前面或后面。


    现在，`Create Workout View Controller`（创建锻炼视图控制器）已经成功设置好，你可以继续处理`Workout Map View
    Controller`（锻炼地图视图控制器）。如果你还记得图 1-1，这个屏幕由一个位于顶部的导航栏、一些关于上次锻炼记录的信息以及一个占据大部分屏幕的地图组成。


    最容易入手的是添加导航栏。导航栏是 iOS 核心导航功能之一，它通过在顶部提供一个通用信息栏来模拟浏览器窗口的行为。导航栏加载了一个*根视图控制器*（类似于主页）。当`Root
    View Controller`（根视图控制器）内的按钮（或链接）被点击时，导航栏会将其内容推送到主窗口中，同时在右上角提供一个返回按钮，允许用户导航回上一个屏幕。


    要轻松地为空白的`Workout Map View Controller`（锻炼地图视图控制器）添加导航栏，请点击 Interface Builder 中的`View
    Controller`（视图控制器）（它上面应该还标有“Second View”字样），然后按照图 1-28 所示，进入 Editor 菜单并选择`Embed
    In` ➤ `Navigation Controller`。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig28_HTML.jpg](img/346879_2_En_1_Fig28_HTML.jpg)


    图 1-28


    通过 Editor 菜单添加导航控制器


    如图 1-29 所示，这将在 Tab Bar Controller 和`Workout Map View Controller`（锻炼地图视图控制器）之间添加一个
    Navigation Controller（导航控制器）。通过按住`Workout Map View Controller`（锻炼地图视图控制器），你可以更改它在故事板上的位置，使其在视觉上更美观。你会注意到，在
    Tab Bar Controller、Navigation Controller（导航控制器）和`Workout Map View Controller`（锻炼地图视图控制器）之间有带方向的箭头。这些被称为*segues*（转场），用于指定视图控制器之间在故事板上的链接方式，可以通过关系（例如父子关系）或动作（例如按下按钮）来实现。`Embed
    In`（嵌入）功能非常方便，因为它可以避免你手动设置所有这些转场，尽管手动设置是可行的，但非常耗时且容易出错。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig29_HTML.jpg](img/346879_2_En_1_Fig29_HTML.jpg)


    图 1-29


    嵌入导航控制器后的故事板


    要自定义`Workout Map View Controller`（锻炼地图视图控制器）的标题，点击`Workout Map View Controller`（锻炼地图视图控制器）上
    Navigation Item（导航项）（栏）的中间位置并开始输入，如图 1-30 所示。你也可以使用 Attributes Inspector（属性检查器）输入文本。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig30_HTML.jpg](img/346879_2_En_1_Fig30_HTML.jpg)


    图 1-30


    编辑`Workout Map View Controller`（锻炼地图视图控制器）的标题


    要使标题文本变大（iOS 11 的首选新样式），请点击 Navigation Controller（导航控制器），然后在 Attributes Inspector（属性检查器）中选择`Prefers
    Large Titles`（偏好大标题），如图 1-31 所示。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig31_HTML.jpg](img/346879_2_En_1_Fig31_HTML.jpg)


    图 1-31


    启用 iOS 11 风格的 Navigation Item（导航项）标题


    在准备`Workout Map View Controller`（锻炼地图视图控制器）的最后一步中，你必须添加一个 Map View（地图视图）。首先，从模板生成的视图控制器中删除旧的标签，然后从
    Object Library（对象库）中拖出一个 Map View（地图视图），并将其上、下、右、左的约束条件设置为`0`。接着点击 Add 4 Constraints（添加
    4 个约束）按钮来应用这些约束。如果你需要回忆如何操作，请回到本章前面的“应用自动布局约束”部分。你的输出结果应类似于图 1-32。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig32_HTML.jpg](img/346879_2_En_1_Fig32_HTML.jpg)


    图 1-32


    添加 Map View（地图视图）后的`Workout Map View Controller`（锻炼地图视图控制器）

