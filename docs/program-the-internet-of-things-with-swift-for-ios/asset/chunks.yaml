  trans: '

    ## 构建 watchOS 用户界面


    现在 watchOS 目标已经配置完成，你可以开始搭建用户界面了。在这个项目中，我将 IOTFit 应用适配到了 Apple Watch 的尺寸，如图 10-7
    所示。由于大多数用户在移动中或无法使用手机时才会与 Apple Watch 交互，因此你的界面设计应便于快速查看应用中最常用的信息，同时也要能轻松地在应用中创建新记录。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig7_HTML.jpg](img/346879_2_En_10_Fig7_HTML.jpg)


    图 10-7


    IOTFitWatch 应用的设计线框图


    在 IOTFitWatch 应用中，我在主屏幕上展示了用户的锻炼历史记录，并提供了一个上下文菜单，用户可以通过它启动详情屏幕来记录新的锻炼。用户可以在锻炼屏幕上通过用力按压（重按）来调出上下文菜单。锻炼历史和记录锻炼屏幕会显示用户的活动类型，以帮助其识别不同的锻炼。


    要开始开发用户界面，请打开 `IOTFitWatch` 文件夹下的 `Interface.storyboard` 文件。如图 10-8 所示，你会看到一个故事板，其中包含了应用中第一个视图控制器（`InterfaceController.swift`）的空白界面。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig8_HTML.jpg](img/346879_2_En_10_Fig8_HTML.jpg)


    图 10-8


    IOTFitWatch 项目的初始故事板（`Interface.storyboard`）


    首先，布置锻炼历史记录屏幕。与 iOS 或 tvOS 应用类似，从对象库中将一个表格对象拖拽到视图控制器上，如图 10-9 所示。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig9_HTML.jpg](img/346879_2_En_10_Fig9_HTML.jpg)


    图 10-9


    向记录锻炼视图控制器添加表格


    如果你已升级到 Xcode 10，你的用户界面可能默认隐藏了对象库。要在 Xcode 10 中打开对象库，请点击 Xcode 右上角的库按钮（带 iPhone
    Home 按钮图标的那个），它位于 Interface Builder 中切换侧边栏的选项旁边，如图 10-10 所示。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig10_HTML.jpg](img/346879_2_En_10_Fig10_HTML.jpg)


    图 10-10


    在 Xcode 10 中找到对象库


    接下来，你需要配置表格视图单元格（在 watchOS 中称为*表格行*）的高度。如图 10-11 所示，点击表格行，然后在属性检查器（Interface Builder
    的右侧详细面板）中，点击高度下拉菜单，选择“固定”。这将使所有行的高度保持一致。在我的实现中，我选择了 50 像素作为高度。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig11_HTML.jpg](img/346879_2_En_10_Fig11_HTML.jpg)


    图 10-11


    配置表格行的单元格高度


    正如本章开头提到的，watchOS 仅继承 iOS 一小部分功能的一个副作用是：你必须使用堆栈视图来布局用户界面。堆栈视图管理一个容器视图，并根据一些配置参数（例如等高度、等间距）在容器中垂直或水平排列每个项目。为了实现图
    10-7 中的用户界面（左侧是一张图片，右侧是两个垂直对齐的标签），你需要嵌套堆栈视图。父级堆栈视图将被配置为水平堆叠项目，并包含图像视图以及用于标签的堆栈视图。而用于标签的堆栈视图则会被配置为垂直堆叠项目。

    '
- fmt: "# 实现Stack Views并配置WatchKit界面\n\n要开始实现Stack Views，从对象库中拖动一个`Group`到表格行上，如图[10-12](#346879_2_En_10_Chapter.xhtml#Fig12)所示。这些组一开始会比Apple\
    \ Watch的宽度更宽。要解决这个问题，点击每个组的右边缘并调整其大小，使图像视图的组小于标签的组。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig12_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig12_HTML.jpg)\n\
    \n**图10-12** 向表格行添加额外的组\n\n接下来，从对象库中拖动`Image`和`Label`项到视图控制器上。您的表格行应该看起来像我图[10-13](#346879_2_En_10_Chapter.xhtml#Fig13)中的实现。尽管图像视图显示正确，但标签需要调整。\n\
    \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig13_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig13_HTML.jpg)\n\
    \n**图10-13** 使用默认Stack View配置的表格行\n\n要修复标签的布局，您必须配置Stack View使用垂直布局。如图[10-14](#346879_2_En_10_Chapter.xhtml#Fig14)所示，选择该组，然后在\"\
    Layout\"下拉菜单中选择\"Vertical\"。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig14_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig14_HTML.jpg)\n\
    \n**图10-14** 为Stack View配置垂直布局\n\n要配置视图的字体大小、标签文本或其他选项，请选择该视图并使用Attributes检查器中的下拉菜单进行调整，如图[10-15](#346879_2_En_10_Chapter.xhtml#Fig15)所示。将顶部标签的字体大小修改为\"\
    Subhead\"后，您的表格行现在应该与原始设计中指定的样式匹配。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig15_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig15_HTML.jpg)\n\
    \n**图10-15** 为Stack View配置文本大小和颜色\n\n完成Workout History视图控制器的布局后，您可以布局Workout Detail视图控制器。使用对象库，将`Interface\
    \ Controller`拖到故事板上，将其单个组配置为使用垂直布局，然后将`Label`和`Button`项拖到该组上。在配置视图之前，您的布局应该看起来类似于我图[10-16](#346879_2_En_10_Chapter.xhtml#Fig16)中的结果。您可以使用左侧高亮显示的视图层次结构来帮助确定是否将子视图正确分配给了Stack\
    \ View或普通的`UIView`。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig16_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig16_HTML.jpg)\n\
    \n**图10-16** 具有初始子视图安排的Record Workout视图控制器\n\n配置文本大小、对齐方式和颜色后，您的最终故事板应该看起来类似于我图[10-17](#346879_2_En_10_Chapter.xhtml#Fig17)中的实现。我将所有视图设置为使用`Body`或`Headline`文本样式并居中对齐。我将按钮的`color`属性设置为红色和蓝色，以使按钮更容易区分。\n\
    \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig17_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig17_HTML.jpg)\n\
    \n**图10-17** IOTFitWatch项目的最终故事板布局\n\n正如您在iOS应用中所做的那样，要完成watchOS项目的用户界面设置，您必须将故事板连接到您的界面控制器（视图控制器）类。由于它的布局更直接，先从Record\
    \ Workout界面控制器类开始。点击项目导航器中的`IOTFitWatch Extension`文件夹，然后从右键菜单中选择\"New File\"。如图[10-18](#346879_2_En_10_Chapter.xhtml#Fig18)所示，从模板选择器弹出窗口中导航到\"\
    watchOS\"，然后选择\"WatchKit Class\"。这相当于为iOS项目选择Cocoa Touch类模板。\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig18_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig18_HTML.jpg)\n\
    \n**图10-18** 从文件模板窗口创建WatchKit类\n\n当被要求选择父类时，输入\"WKInterfaceController\"。输入`RecordInterfaceController`作为类名。使用列表[10-2](#346879_2_En_10_Chapter.xhtml#PC2)中的示例作为类的内容。每个用户界面项都由一个`@IBOutlet`属性表示。与iOS应用不同，所有元素都是`WKInterface`类。\n\
    \n```\nclass RecordInterfaceController: WKInterfaceController {\n    @IBOutlet\
    \ var timerLabel: WKInterfaceLabel?\n    @IBOutlet var workoutLabel: WKInterfaceLabel?\n\
    \    @IBOutlet var progressLabel: WKInterfaceLabel?\n    @IBOutlet var toggleButton:\
    \ WKInterfaceButton?\n    @IBOutlet var exitButton: WKInterfaceButton?\n\n   \
    \ override func willActivate() {\n        super.willActivate()\n    }\n\n    override\
    \ func didDeactivate() {\n        super.didDeactivate()\n    }\n}\n```\n\n**列表10-2**\
    \ Record Interface Controller类定义（`RecordInterfaceController.swift`）\n\n与iOS应用相同的方式，要将故事板连接到`RecordInterfaceController`类，您必须将其设置为父类。如图[10-19](#346879_2_En_10_Chapter.xhtml#Fig19)所示，在故事板上选择Interface\
    \ Controller，然后导航到Identity Inspector（带有ID卡图标的标签页），并在`Class`文本字段中输入`RecordInterfaceController`。\n\
    \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig19_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig19_HTML.jpg)\n\
    \n**图10-19** 设置watchOS Interface Controller的所属关系\n\n就像iOS故事板一样，从Attributes检查器将连接拖放到Interface\
    \ Controller中的元素上，以完成连接过程，如图[10-20](#346879_2_En_10_Chapter.xhtml#Fig20)所示。\n\n\
    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig20_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig20_HTML.jpg)\n\
    \n**图10-20** 将Outlets连接到Interface Controller元素"
  raw: 'To begin implementing the stack views, drag a `Group` from the Object Library
    onto the table row, as shown in Figure [10-12](#346879_2_En_10_Chapter.xhtml#Fig12).
    The groups will be wider than the width of the Apple Watch at first. To fix this,
    click the right edge of each group and resize it so that the group for the image
    view is smaller than the group for the labels.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig12_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Adding an additional group to a table row


    Next, drag `Image` and `Label` items from the Object Library onto the view controller.
    Your table row should look like my implementation in Figure [10-13](#346879_2_En_10_Chapter.xhtml#Fig13).
    Although the image view is displayed correctly, the labels require adjustment.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig13_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig13_HTML.jpg)


    Figure 10-13


    Table row with default stack view configuration


    To fix the layout of the labels, you must configure the stack view to use vertical
    layout. As shown in Figure [10-14](#346879_2_En_10_Chapter.xhtml#Fig14), select
    the group, then, inside the Layout drop-down menu, select Vertical.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig14_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Configuring vertical layout for a stack view


    To configure the font size, label text, or other options for a view, select it
    and use the drop-downs in the Attributes inspector to make the adjustments, as
    shown in Figure [10-15](#346879_2_En_10_Chapter.xhtml#Fig15). After modifying
    the font size for the top label to Subhead, your table row should now match the
    design specified in the original design.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig15_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Configuring text size and color for a stack view


    Having completed the Workout History view controller’s layout, you can lay out
    the Workout Detail view controller. Using the object library, drag an Interface
    Controller onto the storyboard, configure its single group to use a vertical layout,
    and then drag `Label` and `Button` items onto the group. Before configuring the
    views, your layout should look similar to my result in Figure [10-16](#346879_2_En_10_Chapter.xhtml#Fig16).
    You can use the view hierarchy, highlighted on the left, to help you determine
    if you assigned sub-views to a stack view or normal `UIView` correctly.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig16_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig16_HTML.jpg)


    Figure 10-16


    Record Workout view controller with initial sub-view arrangement


    After configuring text sizes, alignment, and colors, your final storyboard should
    look similar to my implementation in Figure [10-17](#346879_2_En_10_Chapter.xhtml#Fig17).
    I set all of the views to use the `Body` or `Headline` text styles and text centering.
    I set the `color` property of the buttons to Red and Blue, to make the buttons
    easier to differentiate.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig17_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig17_HTML.jpg)


    Figure 10-17


    Final storyboard arrangement for the IOTFitWatch project


    Just as you were required to do for your iOS apps, to finish the user interface
    setup for a watchOS project, you must connect the storyboard to your interface
    controller (view controller) classes. As its layout is more straightforward, begin
    with the Record Workout interface controller class. Click the `IOTFitWatch Extension`
    folder in the Project Navigator, then select New File from the secondary-click
    (right-click) context menu. As shown in Figure [10-18](#346879_2_En_10_Chapter.xhtml#Fig18),
    navigate to watchOS from the template picker pop-up window, then select WatchKit
    Class. This is the equivalent of choosing the Cocoa Touch class template for an
    iOS project.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig18_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig18_HTML.jpg)


    Figure 10-18


    Creating a WatchKit class from the File Template window


    When asked to choose your parent class, type in “WKInterfaceController.” Enter
    `RecordInterfaceController` as the class name. Use my sample in Listing [10-2](#346879_2_En_10_Chapter.xhtml#PC2)
    for the contents of the class. Each user interface item is represented by an `@IBOutlet`
    property. Unlike an iOS app, all of the elements are `WKInterface` classes.


    ```

    class RecordInterfaceController: WKInterfaceController {

    @IBOutlet var timerLabel: WKInterfaceLabel?

    @IBOutlet var workoutLabel: WKInterfaceLabel?

    @IBOutlet var progressLabel: WKInterfaceLabel?

    @IBOutlet var toggleButton: WKInterfaceButton?

    @IBOutlet var exitButton: WKInterfaceButton?

    override func willActivate() {

    super.willActivate()

    }

    override func didDeactivate() {

    super.didDeactivate()

    }

    }

    Listing 10-2

    Record Interface Controller Class Definition ( RecordInterfaceController.swift
    )

    ```


    In the same manner as an iOS application, to connect the storyboard to the `RecordInterfaceController`
    class , you have to set it as the parent class. As shown in Figure [10-19](#346879_2_En_10_Chapter.xhtml#Fig19),
    select the Interface Controller on the storyboard, then navigate to the Identity
    Inspector (the tab with the ID card icon), and enter `RecordInterfaceController`
    in the `Class` text field.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig19_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig19_HTML.jpg)


    Figure 10-19


    Setting ownership for a watchOS Interface Controller


    Just as with an iOS storyboard, drag and drop connections from the Attributes
    inspector onto elements in the Interface Controller, to complete the connection
    process, as shown in Figure [10-20](#346879_2_En_10_Chapter.xhtml#Fig20).


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig20_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig20_HTML.jpg)


    Figure 10-20


    Connecting Outlets to Interface Controller elements'
