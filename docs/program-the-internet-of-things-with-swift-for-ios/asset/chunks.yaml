    pinMode(RED_LED_PIN, OUTPUT);\n...\n}\n...\nListing 6-4\nAppending UUIDs to the\
    \ Arduino Solution\n```\n\nNext, you must replace with known values from the Bluetooth\
    \ specification the second two bytes (the four characters starting at the fifth\
    \ character in the string). This master record of values is called the Bluetooth\
    \ GATT (Generic Attributes). You can find the values for services at [`www.bluetooth.com/specifications/gatt/services`](http://www.bluetooth.com/specifications/gatt/services)\
    \ and the values for characteristics at [`www.bluetooth.com/specifications/gatt/characteristics`](http://www.bluetooth.com/specifications/gatt/characteristics)\
    \ . While the GATT do not cover all use cases, they cover a wide range, which\
    \ should be sufficient for most projects. For advertising the battery level, you\
    \ can use the Battery Service identifier (0x180F) and the Battery Level State\
    \ characteristic (0x2A1B). The door is a bit harder, as there is no door service;\
    \ however, the Alert Notification Service identifier (0x1811) and Alert Status\
    \ characteristic (0x2A3F) estimate the use case pretty well and are appropriate\
    \ here. As shown in Listing [6-5](#346879_2_En_6_Chapter.xhtml#PC5), modify your\
    \ solution to include these new values.\n\n```\n#include \n#include \n#include\
    \ \n#include \n#define RED_LED_PIN 14\n...\n#define LOCK_SERVICE_UUID        \"\
    83b41811-6e9c-4b25-89cf-871cc74cc68e\"\n#define BATT_SERVICE_UUID        \"7d69180F-6e19-48c6-a503-05585abe761e\"\
    \n#define LOCK_CHARACTERISTIC_UUID \"4b612A3F-2e29-4fdf-a74a-7b8bf70ecd9a\"\n\
    #define BATT_CHARACTERISTIC_UUID \"8e622A1B-0275-4f80-bb64-58f2b2771cba”\nvoid\
    \ setup() {\n// put your setup code here, to run once:\nSerial.begin(9600);\n\
    Serial.println(\" Program start\");\npinMode(RED_LED_PIN, OUTPUT);\n...\n}\n...\n\
    Listing 6-5\nArduino Solution with Valid GATT UUIDs\n```\n\nNext, you can begin\
    \ setting up the Bluetooth server. The Arduino_ESP32_BLE library exposes these\
    \ functions through the `BLEServer` class . The class is straightforward to use,\
    \ as the setup primarily requires registering the characteristics, services, and\
    \ callback handlers for the server events (for example, connection initiated,\
    \ disconnected). To begin, initialize the server, characteristics, and services,\
    \ as shown in Listing [6-6](#346879_2_En_6_Chapter.xhtml#PC6).\n\n```\n...\n#define\
    \ BATT_CHARACTERISTIC_UUID \"134c298f-7d6b-4f64-8496-8965e0851d03\"\nBLECharacteristic\
    \ *lockCharacteristic;\nBLECharacteristic *battCharacteristic;\nvoid setup() {\n\
    ...\npinMode(BATTERY_PIN, INPUT);\nstartBLE();\n}\nvoid startBLE() {\n// Create\
    \ the BLE Device\nBLEDevice::init(\"IOTDoor\");\n// Create the BLE Server\nBLEServer\
    \ *bleServer = BLEDevice::createServer();\n// Create the BLE Service\nBLEService\
    \ *lockService = bleServer->\ncreateService(LOCK_SERVICE_UUID);\n// Create a BLE\
    \ Characteristic\nlockCharacteristic = lockService->createCharacteristic(\nLOCK_CHARACTERISTIC_UUID,\n\
    BLECharacteristic::PROPERTY_READ   |\nBLECharacteristic::PROPERTY_WRITE  |\nBLECharacteristic::PROPERTY_NOTIFY\
    \ |\nBLECharacteristic::PROPERTY_INDICATE\n);\nlockCharacteristic->addDescriptor(new\
    \ BLE2902());\nBLEService *battService = bleServer->\ncreateService(BATT_SERVICE_UUID);\n\
    battCharacteristic = lockService->createCharacteristic(\nBATT_CHARACTERISTIC_UUID,\n\
    BLECharacteristic::PROPERTY_READ   |\nBLECharacteristic::PROPERTY_WRITE  |\nBLECharacteristic::PROPERTY_NOTIFY\
    \ |\nBLECharacteristic::PROPERTY_INDICATE\n);\nbattCharacteristic->addDescriptor(new\
    \ BLE2902());\n// Start the service\nlockService->start();\nbattService->start();\n\
    // Start advertising\nbleServer->getAdvertising()->start();\n}\nListing 6-6\n\
    Initializing the Bluetooth LE Server from the Arduino Solution\n```\n\nIn accordance\
    \ with the execution flow of Arduino solutions, you must start the server from\
    \ the `setup()` method , as it is the only area of the program that is executed\
    \ once. To send messages later on, you will have to reuse the characteristic objects,\
    \ thus I declared them as global variables. When setting up the services and characteristics,\
    \ be careful to attach them correctly, or they will not work. As with the Bluetooth\
    \ specification, services can only be discovered when they are attached to a characteristic.\
    \ The properties for the characteristics do not have to include the full list\
    \ in my example (`READ`, `WRITE`, `NOTIFY`, `INDICATE`). For future projects,\
    \ you can pare them down as you need to.\n\nThe final requirement to start the\
    \ server is to register the connection callbacks. To perform this operation, you\
    \ will have to implement the `BLEServerCallbacks` protocol. As C++ and Swift share\
    \ common language design ancestry, the process of implementing the protocol should\
    \ be very familiar to you. Just as in Swift, define a class that inherits the\
    \ protocol, and implement the required named methods, `onConnect(BLEServer * pServer)`\
    \ and `onDisconnect(BLEServer * pServer)`. As the names suggest, these are called\
    \ when the server establishes or destroys a connection. In Listing [6-7](#346879_2_En_6_Chapter.xhtml#PC7),\
    \ I have modified the solution to include this code and added the call to attach\
    \ the callbacks to the server object. Right now, the only actions you must perform\
    \ on the callbacks are setting a status object to `true` or `false` and turning\
    \ the blue LED on or off. Later, you will use this status object again, to help\
    \ filter outgoing messages."
