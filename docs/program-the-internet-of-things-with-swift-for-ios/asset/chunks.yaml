- fmt: "### Installing HomeBridge  \n\nHaving completed the hardware setup phase of\
    \ the project, you can now shift your focus to installing HomeBridge and its dependencies,\
    \ the second-to-last step before you can start using the Raspberry Pi as a HomeKit\
    \ bridge.  \n\nAs mentioned at the beginning of the chapter, HomeBridge and its\
    \ core dependency, HAP-NodeJS (the library that implements the HomeKit Accessory\
    \ Protocol), run as Node.js applications. You must begin to set up this process\
    \ by installing Node.js. Although the distribution of Node.js provided by the\
    \ default package manager (`apt-get`) is very stable and fits most average use\
    \ cases, HomeBridge requires a slightly newer, more powerful version of Node.js,\
    \ which you will have to install yourself. To begin this process, navigate to\
    \ the Node.js distribution web site ([http://nodejs.org/dist/](http://nodejs.org/dist/))\
    \ and select the latest version of Node.js 8 ([http://nodejs.org/dist/latest-v8.x/](http://nodejs.org/dist/latest-v8.x/)).\
    \ Under this directory, you will be presented with several different files that\
    \ you can download whose names vary by operating system and processor architecture\
    \ (for example, `x86`, `ARMv6`). These indicate what the targets the enclosing\
    \ binaries were compiled for. For the Raspberry Pi, you should search for the\
    \ latest Linux/ARMv6L archive. At the time of writing, the URL for this file is\
    \ [http://nodejs.org/dist/latest-v8.x/node-v8.11.4-linux-armv6l.tar.gz](http://nodejs.org/dist/latest-v8.x/node-v8.11.4-linux-armv6l.tar.gz).\
    \  \n\nAlthough you can download the archive via a browser, I recommend using\
    \ the OS X Terminal. By default, your Raspberry Pi will advertise its hostname\
    \ (`raspberrypi.local`) over Bonjour. You can connect to it in the Terminal by\
    \ attempting to log in to SSH with the `pi` user.  \n\n```\nssh pi@raspberrypi.local\n\
    ```\n\nAs shown in Figure [7-10](#346879_2_En_7_Chapter.xhtml#Fig10), after connecting\
    \ to the device, download the file using the `wget` command.  \n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig10_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig10_HTML.jpg)\
    \  \n\n**Figure 7-10** Downloading Node.js via the Raspberry Pi terminal  \n\n\
    ```\nwget http://nodejs.org/dist/latest-v8.x/node-v8.11.4-linux-armv6l.tar.gz\n\
    ```\n\n### Note  \n\nAt the time of this writing, I observed that the Node.js\
    \ 8 binary for Raspberry Pi had greater compatibility with HomeBridge and the\
    \ plug-ins for this chapter than the Node.js 9 binary. You are welcome to try\
    \ either one!  \n\nAfter the download is complete, you must unpack the archive\
    \ using the `tar` command. For the file indicated previously, the command I used\
    \ was  \n\n```\ntar -xvf node-v8.11.4-linux-armv6l.tar.gz\n```\n\nAfter you have\
    \ unpacked the file, you must copy the Node binaries to the default location for\
    \ user-installed software: `/usr/local`. This will allow HomeBridge and other\
    \ Node applications you may write later to use the binaries as if they were installed\
    \ by the `apt-get` package manager. For my version of Node, I used the following\
    \ command to copy the files:  \n\n```\nsudo cp -R node-v8.11.4-linux-armv6l/*\
    \ /usr/local/\n```\n\nYou can verify that your files were copied correctly by\
    \ restarting your Raspberry Pi and attempting to run the Node command that queries\
    \ the currently installed version:  \n\n```\nnode -v\n```\n\nThe result should\
    \ print out the version number you manually downloaded.  \n\nBefore installing\
    \ HomeBridge, you must install a few other packages it depends on, specifically,\
    \ the latest version of C++, the development tools for Python, WiringPi, AVAHI,\
    \ PiGPIO, and BCM2835. These will allow HomeBridge to interface with the GPIO\
    \ pins and Bluetooth from within Node. You can easily install C++ and the Python\
    \ development tools using the `apt-get` package manager, as follows:  \n\n```\n\
    sudo apt-get install g++\nsudo apt-get install libavahi-compat-libdnssd-dev\n\
    sudo apt-get install python-dev\nsudo apt-get install pigpio python-pigpio\n```\n\
    \nAfter running these commands, you must enable PiGPIO as a service and restart\
    \ the Pi, as shown following:  \n\n```\nsudo systemctl enable pigpiod.service\n\
    ```\n\nThe BCM2835 package is the C library that allows WiringPi to access the\
    \ GPIO pins on the Raspberry Pi and will have to be installed first. Begin by\
    \ finding the latest version of the package from [www.airspayce.com/mikem/bcm2835/](http://www.airspayce.com/mikem/bcm2835/),\
    \ using the `wget` command to download it, and then `tar`, to unzip, just as you\
    \ did for Node.  \n\n```\nwget http://www.airspayce.com/mikem/bcm2835/bcm2835-1.56.tar.gz\n\
    tar -xvf bcm2835-1.56.tar.gz\n```\n\nUnlike Node, you will have to run BCM2835’s\
    \ build scripts to install it correctly. Run the following commands, in order\
    \ to configure the library for your hardware, verify it, and then install it:\
    \  \n\n```\ncd bcm2835-1.56\n./configure\nmake\nsudo make check\nsudo make install\n\
    ```\n\nYou can verify that the installation is successful from the absence of\
    \ a build failure while running the last `make` command.  \n\nTo install WiringPi,\
    \ you will have to download it from GitHub. You can perform this option from the\
    \ command line, using the following `git pull` command, which makes a local clone\
    \ of the project:  \n\n```\ngit clone git://git.drogon.net/wiringPi\n```\n\nAs\
    \ with BCM2835, you will have to run build scripts to install the package on your\
    \ Raspberry Pi. For WiringPi, these commands are  \n\n```\ncd wiringPi/\n./build\n\
    ```\n\nTo verify that the packages were installed correctly, attempt to run the\
    \ `gpio readall` command to echo the status of all pins on the Raspberry Pi. Your\
    \ output should contain a table of pin status, similar to that in the screenshot\
    \ in Figure [7-11](#346879_2_En_7_Chapter.xhtml#Fig11).  \n\n![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig11_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig11_HTML.jpg)\
    \  \n\n**Figure 7-11** Querying GPIO status using the `gpio readall` command \
    \ \n\nNow, you are finally ready to install HomeBridge! To install HomeBridge,\
    \ download it using the Node Package Manager (NPM).  \n\n```\nsudo npm install\
    \ -g --unsafe-perm homebridge\n```\n\nThe installation should take several minutes\
    \ to complete. Because iOS’s Home app manages a database of HomeKit devices, the\
    \ easiest way to verify that you created a valid device is by attempting to register\
    \ the device after all of the plug-ins you want to use have been configured. In\
    \ the next two sections, I will explain the steps required to do this for reading\
    \ from a temperature sensor and Bluetooth device (the door sensor you created\
    \ in Chapter [6](#346879_2_En_6_Chapter.xhtml)).  \n\n### Caution  \n\nThe `-g`\
    \ and `--unsafe-perm` flags ensure that Node packages are installed globally (for\
    \ all applications) and without restrictions on who can execute them. The global\
    \ setting is required to run HomeBridge; however, you may want to look at finding\
    \ alternatives to the unsafe permissions setting, if you are worried about security\
    \ threats in your home/office network."
  raw: '### Installing HomeBridge


    Having completed the hardware setup phase of the project, you can now shift your
    focus to installing HomeBridge and its dependencies, the second-to-last step before
    you can start using the Raspberry Pi as a HomeKit bridge.


    As mentioned at the beginning of the chapter, HomeBridge and its core dependency,
    HAP-NodeJS (the library that implements the HomeKit Accessory Protocol), run as
    Node.js applications. You must begin to set up this process by installing Node.js.
    Although the distribution of Node.js provided by the default package manager (`apt-get`)
    is very stable and fits most average use cases, HomeBridge requires a slightly
    newer, more powerful version of Node.js, which you will have to install yourself.
    To begin this process, navigate to the Node.js distribution web site ( [`http://nodejs.org/dist/`](http://nodejs.org/dist/)
    ) and select the latest version of Node.js 8 ( [`http://nodejs.org/dist/latest-v8.x/`](http://nodejs.org/dist/latest-v8.x/)
    ). Under this directory, you will be presented with several different files that
    you can download whose names vary by operating system and processor architecture
    (for example, x86, ARMv6). These indicate what the targets the enclosing binaries
    were compiled for. For the Raspberry Pi, you should search for the latest Linux/ARMv6L
    archive. At the time of writing, the URL for this file is [`http://nodejs.org/dist/latest-v8.x/node-v8.11.4-linux-armv6l.tar.gz`](http://nodejs.org/dist/latest-v8.x/node-v8.11.4-linux-armv6l.tar.gz)
    .


    Although you can download the archive via a browser, I recommend using the OS
    X Terminal. By default, your Raspberry Pi will advertise its hostname (`raspberrypi.local`)
    over Bonjour. You can connect to it in the Terminal by attempting to log in to
    SSH with the `pi` user.


    ```

    ssh pi@raspberrypi.local

    ```


    As shown in Figure [7-10](#346879_2_En_7_Chapter.xhtml#Fig10), after connecting
    to the device, download the file using the `wget` command .


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig10_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Downloading Node.js via the Raspberry Pi terminal


    ```

    wget http://nodejs.org/dist/latest-v8.x/node-v8.11.4-linux-armv6l.tar.gz

    ```


    ### Note


    At the time of this writing, I observed that the Node.js 8 binary for Raspberry
    Pi had greater compatibility with HomeBridge and the plug-ins for this chapter
    than the Node.js 9 binary. You are welcome to try either one!


    After the download is complete, you must unpack the archive using the `tar` command
    . For the file indicated previously, the command I used was


    ```

    tar -xvf node-v8.11.4-linux-armv6l.tar.gz

    ```


    After you have unpacked the file, you must copy the Node binaries to the default
    location for user-installed software: `/usr/local`. This will allow HomeBridge
    and other Node applications you may write later to use the binaries as if they
    were installed by the `apt-get` package manager. For my version of Node, I used
    the following command to copy the files:


    ```

    sudo cp -R node-v8.11.4-linux-armv6l/*/usr/local/

    ```


    You can verify that your files were copied correctly by restarting your Raspberry
    Pi and attempting to run the Node command that queries the currently installed
    version:


    ```

    node -v

    ```


    The result should print out the version number you manually downloaded.


    Before installing HomeBridge, you must install a few other packages it depends
    on, specifically, the latest version of C++, the development tools for Python,
    WiringPi, AVAHI, PiGPIO, and BCM2835\. These will allow HomeBridge to interface
    with the GPIO pins and Bluetooth from within Node. You can easily install C++
    and the Python development tools, using the `apt-get` package manager, as follows:


    ```

    sudo apt-get install g++

    sudo apt-get install libavahi-compat-libdnssd-dev

    sudo apt-get install python-dev

    sudo apt-get install pigpio python-pigpio

    ```


    After running these commands, you must enable PiGPIO as a service and restart
    the Pi, as shown following:


    ```

    sudo systemctl enable pigpiod.service

    ```


    The BCM2835 package is the C library that allows WiringPi to access the GPIO pins
    on the Raspberry Pi and will have to be installed first. Begin by finding the
    latest version of the package from [`www.airspayce.com/mikem/bcm2835/`](http://www.airspayce.com/mikem/bcm2835/)
    , using the `wget` command to download it, and then `tar`, to unzip, just as you
    did for Node.


    ```

    wget http://www.airspayce.com/mikem/bcm2835/bcm2835-\1.56.tar.gz

    tar -xvf bcm2835-1.56.tar.gz

    ```


    Unlike Node, you will have to run BCM2835’s build scripts to install it correctly.
    Run the following commands, in order to configure the library for your hardware,
    verify it, and then install it:


    ```

    cd bcm2835-1.56

    ./configure

    make

    sudo make check

    sudo make install

    ```


    You can verify that the installation is successful from the absences of a build
    failure while running the last `make` command .


    To install WiringPi, you will have to download it from GitHub. You can perform
    this option from the command line, using the following `git pull` command , which
    makes a local clone of the project:


    ```

    git clone git://git.drogon.net/wiringPi

    ```


    As with BCM2835, you will have to run build scripts to install the package on
    your Raspberry Pi. For WiringPi, these commands are


    ```

    cd wiringPi/

    ./build

    ```


    To verify that the packages were installed correctly, attempt to run the `gpio
    readall` command to echo the status of all pins on the Raspberry Pi. Your output
    should contain a table of pin status, similar to that in the screenshot in Figure
    [7-11](#346879_2_En_7_Chapter.xhtml#Fig11).


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig11_HTML.jpg](images/346879_2_En_7_Chapter/346879_2_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Querying GPIO status using the `gpio readall` command


    Now, you are finally ready to install HomeBridge! To install HomeBridge, download
    it using the Node Package Manager (NPM).


    ```

    sudo npm install -g --unsafe-perm homebridge

    ```


    The installation should take several minutes to complete. Because iOS’s Home app
    manages a database of HomeKit devices, the easiest way to verify that you created
    a valid device is by attempting to register the device after all of the plug-ins
    you want to use have been configured. In the next two sections, I will explain
    the steps required to do this for reading from a temperature sensor and Bluetooth
    device (the door sensor you created in Chapter [6](#346879_2_En_6_Chapter.xhtml)).


    ### Caution


    The `-g` and `–unsafe-perm` flags ensure that Node packages are installed globally
    (for all applications) and without restrictions on who can execute them. The global
    setting is required to run HomeBridge; however, you may want to look at finding
    alternatives to the unsafe permissions setting, if you are worried about security
    threats in your home/office network.'
