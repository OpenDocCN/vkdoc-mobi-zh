- fmt: '# Querying for Sensor Availability


    In the same manner you used to implement the other hardware-based APIs in this
    book, before attempting to use Touch ID or Face ID, you must first check if either
    is available on the device and that your app has access to them. To query this
    information, and eventually access the sensor, you will have to establish a security
    context for the app using the `LocalAuthentication` framework. To maintain its
    device-based security model, Apple performs all encryption on the iPhone via a
    discrete microprocessor called the Security Enclave. The `LocalAuthentication`
    framework allows you to access the Security Enclave through sessions referred
    to as contexts, in which you can query the availability of a security policy (for
    example, authentication via a biometric sensor) and attempt to request validation
    through that security policy. At no time does your app have access to the user’s
    personal information or encryption keys, maintaining the security of the device.
    Success or failure is returned through a Boolean return value and an error object,
    which will be set to a non-nil value describing the failure reason.


    You can establish the security context for the security view using the `LAContext`
    class from the `LocalAuthentication` framework, and you can perform the availability
    query using the `canEvaluatePolicy(policy:error:)` method on the `LAContext` object.
    In Listing [11-4](#346879_2_En_11_Chapter.xhtml#PC4), I have expanded the `SecurityView`
    class to include this functionality by maintaining the context and authentication
    type as properties that can be reused when the authentication request is made
    later.


    ```

    import UIKit

    import LocalAuthentication

    class SecurityView: UIView {

    ...

    let context = LAContext()

    override func awakeFromNib() {

    super.awakeFromNib()

    commonInit()

    }

    private func commonInit() {

    let error: ErrorPointer = nil

    if context.canEvaluatePolicy(

    .deviceOwnerAuthenticationWithBiometrics, error: error) {

    //success!

    } else {

    NSLog("Biometrics unavailable on device")

    unlockButton?.isEnabled = false

    }

    }

    }

    ```


    **Listing 11-4** Detecting the Availability of Biometrics Using a Context (`SecurityView.swift`)


    As with the `viewDidLoad()` method on a view controller, a view has an `awakeFromNib()`
    method that is called after it is loaded from a NIB file. As of this writing,
    Apple’s primary security policies are Biometrics and Device Passcode or Biometrics
    only. Because the app will use its own passcode, I have chosen to skip the device
    passcode option for the IOTFit app.


    Although the policy query does not return information on the sensor type, after
    you have determined that the app has access to biometrics, you can use the `biometryType`
    property of the `LAContext` object to determine this information. In Listing [11-5](#346879_2_En_11_Chapter.xhtml#PC5),
    I have expanded the `commonInit()` method to check for this information and update
    the title of the Use Face ID button to properly reflect the sensor type. If biometrics
    are unavailable, I disable the button, so that the user cannot press it by accident.


    ```

    import UIKit

    import LocalAuthentication

    enum AuthenticationType : String {

    case faceID

    case touchID

    case password

    case notAvailable

    }

    class SecurityView: UIView {

    ...

    var authenticationType: AuthenticationType?

    ...

    private func commonInit() {

    let error: ErrorPointer = nil

    if context.canEvaluatePolicy(

    .deviceOwnerAuthenticationWithBiometrics,

    error: error) {

    switch (context.biometryType) {

    case LABiometryType.faceID:

    authenticationType = AuthenticationType.faceID

    unlockButton?.setTitle("Use Face ID", for:

    .normal)

    case LABiometryType.touchID:

    authenticationType = AuthenticationType.touchID

    unlockButton?.setTitle("Use Touch ID", for:

    .normal)

    default:

    authenticationType =

    AuthenticationType.notAvailable

    unlockButton?.isEnabled = false

    }

    } else {

    NSLog("Biometrics unavailable on device")

    unlockButton?.isEnabled = false

    }

    }

    }

    ```


    **Listing 11-5** Accessing the Sensor Type from a Context (`SecurityView.swift`)


    # Using Face ID or Touch ID to Restrict Access to Features


    Now that you have established the availability of biometrics on the device and
    determined the sensor type, you can use this information to make the authentication
    request via the `context` property on the `SecurityView` class. To make this call,
    you will use the `evaluatePolicy(policy:localizedReason:)` method on the `LAContext`
    object. As described earlier, in keeping with Apple’s security restrictions, it
    will return a Boolean value indicating success or failure and a non-null `Error`
    object, if the request failed. In Listing [11-6](#346879_2_En_11_Chapter.xhtml#PC6),
    I make this call from the `validateBiometrics(sender:)` method.


    ```

    class SecurityView: UIView {

    ...

    @IBAction func validateBiometrics(sender: UIButton) {

    passwordTextField?.resignFirstResponder()

    let permissionString = "Unlock with biometrics to

    reveal workout data"

    context.evaluatePolicy(

    .deviceOwnerAuthenticationWithBiometrics,

    localizedReason: permissionString) { [weak self]

    (success: Bool, error: Error?) in

    guard let authenticationType =

    self?.authenticationType else { return }

    if success == true {

    self?.delegate?.didFinishWithAuthenticationType(

    authenticationType)

    } else {

    self?.delegate?.didFinishWithError(description:

    error.debugDescription)

    }

    }

    }

    }

    ```


    **Listing 11-6** Requesting Biometric Authorization (`SecurityView.swift`)


    In addition to making calls to the Security Enclave for you, the `LocalAuthorization`
    context also provides the initial permission pop-up to enable Face ID for your
    app and the pop-up that appears when you make the preceding authorization request.
    Unfortunately, it is up to you, as the developer, to handle the result yourself.
    One limitation of the view-based implementation is that views exist outside of
    view controllers, so by default, you will not be able to present any user interface
    updates outside of the view. To resolve this, you can establish a protocol to
    pass along information back to the presenting view controller when the security
    request has completed with success or failure.


    In Listing [11-7](#346879_2_En_11_Chapter.xhtml#PC7), I have defined this protocol
    as `SecurityViewDelegate`, to reflect that classes that implement it are delegates
    of the protocol. Its methods are `didFinishWithAuthenticationType(type:)`, which
    is called when the request completes successfully, and `didFinishWithError(description:)`,
    which is called in case of a failure. This is similar to the design of the `UIImagePickerControllerDelegate`
    protocol used for the iPhone’s image picker and allows success and failure to
    be treated as discrete events.


    ```

    import UIKit

    import LocalAuthentication

    ...

    protocol SecurityViewDelegate {

    func didFinishWithAuthenticationType(_ type: AuthenticationType)

    func didFinishWithError(description: String)

    }

    class SecurityView: UIView {

    ...

    var delegate: SecurityViewDelegate?

    ...

    @IBAction func validateBiometrics(sender:

    UIButton) {

    ...

    context.evaluatePolicy(

    .deviceOwnerAuthenticationWithBiometrics,

    localizedReason: permissionString) {

    [weak self] (success: Bool, error:

    Error?) in

    ...

    if success == true {

    self?.delegate?.didFinishWithAuthenticationType(

    authenticationType)

    } else {

    self?.delegate?.didFinishWithError(description:

    error.debugDescription)

    }

    }

    }

    }

    ```


    **Listing 11-7** Defining a Protocol to Pass Messages from the Security View (`SecurityView.swift`)


    Messages are passed back to the presenting view controller via the `delegate`
    property on the security view. It is defined as an optional value to prevent crashes
    if the developer did not choose to implement a delegate.'
