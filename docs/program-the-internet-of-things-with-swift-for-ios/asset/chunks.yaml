    "cod": "200",

    "message": 0.1654,

    "cnt": 38,

    "list": [{

    "dt": 1535781600,

    "main": {

    "temp": 287.67,

    "temp_min": 287.67,

    "temp_max": 288.554,

    "pressure": 1019.41,

    ...

    },

    "weather": [{

    "id": 800,

    "main": "Clear",

    "description": "clear sky",

    "icon": "01n"

