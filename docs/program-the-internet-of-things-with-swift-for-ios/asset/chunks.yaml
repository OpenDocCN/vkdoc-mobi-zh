- fmt: '# Learning Objectives


    In this chapter, you will learn how to use Face ID, Touch ID, and Keychain Services
    to secure data, by expanding the IOTFit application from earlier chapters to use
    these APIs, to restrict access to the application to only the owner of the iOS
    device or via a password stored in the keychain. By implementing these improvements
    to the IOTFit app, you will learn the following key concepts for IoT application
    development:


    -   Creating a lock screen user interface

    -   Determining Face ID and Touch ID availability on a device

    -   Using Face ID and Touch ID to restrict access to an application

    -   Storing and retrieving values from the iOS keychain

    -   Detecting when an app returns from the background


    The workout data stored in the HealthKit store is encrypted and managed by the
    Health app on the device; however, you can add further security by disabling the
    portion of the `WorkoutDataManager` class that was used to backup data to a `.plist`
    file in the `Documents` folder for the application. Although the data in an application’s
    bundle is not available to other applications, it is possible to extract this
    data via backup applications on a Mac or PC.


    As with previous projects in this book, the source code for the completed project
    is available from the GitHub page for this book (`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`).
    If you would like to review how the health features of the IOTFit app were created,
    please refer to Chapters 2–4. If you would like to review how HTTPS was added
    to a web server application, please refer to Chapter 8.


    # Setting Up the Project


    To get started, create a duplicate of the IOTFit app from Chapter 10, either by
    copying your old project or downloading a copy from the GitHub repository for
    this book. As Face ID is easier to access unintentionally than Touch ID or typing
    a password into an iPhone, Apple requires permission from the user to enable it
    in your app. As in the case of HealthKit (Chapter 4), this permission prompt will
    appear the first time your users try to use Face ID in the app. Another similarity
    to HealthKit is that the permission prompt is enabled by defining a message string
    for it in your app’s `Info.plist` file.


    As shown in Figure 11-1, to set the Face ID permission prompt message for your
    app, open the `Info.plist` file for the `IOTFit` target in the Project Navigator,
    click the `(+)` button in any column, and add a new entry for the Privacy – Face
    ID Usage Description key-value pair. In my implementation, I used the message,
    “IOTFit would like to use Face ID to secure your workout data.”


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig1_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig1_HTML.jpg)


    Figure 11-1 Adding a message string for the Face ID permission prompt


    ## Creating a Lock Screen User Interface


    When I was thinking about how to design a project for demonstrating Face ID, the
    best example that popped into my head was the lock screen for the 1Password password
    manager app. As shown in Figure 11-2, before you can access the user interface
    for the app, 1Password asks you to type in a password or press a Face ID button
    to unlock the app with Face ID. When verification is successful, the lock screen
    performs an animation that mimics a door opening, revealing the main user interface
    when it is complete.


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig2_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig2_HTML.jpg)


    Figure 11-2 Lock screen for 1Password password manager


    Although the full animation is a bit beyond the scope of this project, I thought
    the idea of showing a full-screen overlay to block sensitive features would be
    universally appropriate. In the IOTFit app, the most sensitive pieces of data
    are the user’s past location and workout data. As shown in Figure 11-3, I have
    expanded the wireframes for the app to show a simple lock screen over the Workout
    History and Last Run screens. For the sake of simplicity, you will reveal the
    lock screen whenever the screens are navigated to within the Tab bar and when
    the app becomes active.


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig3_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig3_HTML.jpg)


    Figure 11-3 Design wireframes for the IOTFit app, including lock screen


    As with 1Password, I have included a button to initiate Face ID (or Touch ID),
    and a password text field as a backup authentication method. In the app, by detecting
    which sensor is available on the device, you can update the text to show Touch
    ID or Face ID. As opposed to 1Password, I only applied the lock screen over the
    screens that display data, as the primary purpose of the app is recording workouts,
    and it is a good design practice to reduce the friction leading up to this activity.


    To prevent the lock screen from blocking access to the Tab bar, I suggest implementing
    the lock screen as a `UIView` that will be displayed over the contents of the
    Workout History and Last Run view controllers. After authentication is successful,
    you will use a simple animation to dismiss the view and present the data. To begin
    this process, you must create a new `UIView` subclass and NIB (`.xib`) file to
    represent the lock screen.


    As with previous examples in the book, create the `UIView` subclass by going to
    the File menu and selecting New ➤ File… . From the template picker that appears,
    select iOS ➤ Cocoa Touch Class. As shown in Figure 11-4, create a subclass of
    `UIView` named `SecurityView`.


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig4_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig4_HTML.jpg)


    Figure 11-4 Adding a `UIView` subclass to the project


    Because `UIView` subclasses can be used without modification in Objective-C classes,
    the first time you add a new one to a Swift project, you will be asked to add
    an Objective-C bridging header to the project, as shown in Figure 11-5. Select
    Create Bridging Header to create the bridging header and continue with the setup
    process.


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig5_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig5_HTML.jpg)


    Figure 11-5 Prompt for adding an Objective-C bridging header to a Swift project'
  raw: '## Learning Objectives


    In this chapter, you will learn how to use Face ID, Touch ID, and Keychain Services
    to secure data, by expanding the IOTFit application from earlier chapters to use
    these APIs, to restrict access to the application to only the owner of the iOS
    device or via a password stored in the keychain. By implementing these improvements
    to the IOTFit app, you will learn the following key concepts for IoT application
    development:


    *   Creating a lock screen user interface


    *   Determining Face ID and Touch ID availability on a device


    *   Using Face ID and Touch ID to restrict access to an application


    *   Storing and retrieving values from the iOS keychain


    *   Detecting when an app returns from the background


    The workout data stored in the HealthKit store is encrypted and managed by the
    Health app on the device; however, you can add further security by disabling the
    portion of the `WorkoutDataManager` class that was used to backup data to a `.plist`
    file in the `Documents` folder for the application. Although the data in an application’s
    bundle is not available to other applications, it is possible to extract this
    data via backup applications on a Mac or PC.


    As with previous projects in this book, the source code for the completed project
    is available from the GitHub page for this book ( [`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)
    ). If you would like to review how the health features of the IOTFit app were
    created, please refer to Chapters [2](#346879_2_En_2_Chapter.xhtml)–[4](#346879_2_En_4_Chapter.xhtml).
    If you would like to review how HTTPS was added to a web server application, please
    refer to Chapter [8](#346879_2_En_8_Chapter.xhtml).


    ## Setting Up the Project


    To get started, create a duplicate of the IOTFit app from Chapter [10](#346879_2_En_10_Chapter.xhtml),
    either by copying your old project or downloading a copy from the GitHub repository
    for this book. As Face ID is easier to access unintentionally than Touch ID or
    typing a password into an iPhone, Apple requires permission from the user to enable
    it in your app. As in the case of HealthKit (Chapter [4](#346879_2_En_4_Chapter.xhtml)),
    this permission prompt will appear the first time your users try to use Face ID
    in the app. Another similarity to HealthKit is that the permission prompt is enabled
    by defining a message string for it in your app’s `Info.plist` file.


    As shown in Figure [11-1](#346879_2_En_11_Chapter.xhtml#Fig1), to set the Face
    ID permission prompt message for your app, open the `Info.plist` file for the
    `IOTFit` target in the Project Navigator, click the `(+)` button in any column,
    and add a new entry for the Privacy – Face ID Usage Description key-value pair.
    In my implementation, I used the message, “IOTFit would like to use Face ID to
    secure your workout data.”


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig1_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Adding a message string for the Face ID permission prompt


    ### Creating a Lock Screen User Interface


    When I was thinking about how to design a project for demonstrating Face ID, the
    best example that popped into my head was the lock screen for the 1Password password
    manager app. As shown in Figure [11-2](#346879_2_En_11_Chapter.xhtml#Fig2), before
    you can access the user interface for the app, 1Password asks you to type in a
    password or press a Face ID button to unlock the app with Face ID. When verification
    is successful, the lock screen performs an animation that mimics a door opening,
    revealing the main user interface when it is complete.


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig2_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Lock screen for 1Password password manager


    Although the full animation is a bit beyond the scope of this project, I thought
    the idea of showing a full-screen overlay to block sensitive features would be
    universally appropriate. In the IOTFit app, the most sensitive pieces of data
    are the user’s past location and workout data. As shown in Figure [11-3](#346879_2_En_11_Chapter.xhtml#Fig3),
    I have expanded the wireframes for the app to show a simple lock screen over the
    Workout History and Last Run screens. For the sake of simplicity, you will reveal
    the lock screen whenever the screens are navigated to within the Tab bar and when
    the app becomes active.


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig3_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Design wireframes for the IOTFit app, including lock screen


    As with 1Password, I have included a button to initiate Face ID (or Touch ID),
    and a password text field as a backup authentication method. In the app, by detecting
    which sensor is available on the device, you can update the text to show Touch
    ID or Face ID. As opposed to 1Password, I only applied the lock screen over the
    screens that display data, as the primary purpose of the app is recording workouts,
    and it is a good design practice to reduce the friction leading up to this activity.


    To prevent the lock screen from blocking access to the Tab bar, I suggest implementing
    the lock screen as a `UIView` that will be displayed over the contents of the
    Workout History and Last Run view controllers. After authentication is successful,
    you will use a simple animation to dismiss the view and present the data. To begin
    this process, you must create a new `UIView` subclass and NIB (`.xib`) file to
    represent the lock screen.


    As with previous examples in the book, create the `UIView` subclass by going to
