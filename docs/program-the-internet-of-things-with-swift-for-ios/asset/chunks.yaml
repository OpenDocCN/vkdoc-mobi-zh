    \n```\nahmeds-macbook:arduino abakir$ uuidgen\n8CED1808-7984-47CE-BE9C-E2DD56317575\n\
    Listing 6-3\nGenerating a UUID from the OS X Command Line\n```\n\nAs you can see,\
    \ no additional parameters are required to run the `uuidgen` tool . The result\
