    ## Summary


    In this chapter, you learned how to take advantage of watchOS to build an Apple
    Watch version of the IOTFit app, which was able to share code and workout data
    with the original iOS version of the app. In some places, the setup process for
    the Apple Watch app was more complicated than the iOS version, for example, putting
    together the user interface using stack views only. However, other parts of the
    watchOS app, like creating the table view, used stripped down versions of their
    iOS counterparts and were easier to implement than their iOS counterparts. Much
    like the Apple TV project in Chapter [9](#346879_2_En_9_Chapter.xhtml), you were
    able to take advantage of running frameworks natively on the hardware and were
    able to make an Apple Watch app with all of the same workout tracking capabilities
    as the iOS version.


    In keeping with the theme of the book, this was a perfect example of an IoT app,
    because users were able to use a “thing” (the Apple Watch) as another way of providing
    data for a bigger system. In this chapter, the large system you were able to take
    advantage of was HealthKit, which Apple automatically secures and syncs between
    devices for users.


    # 11. Using Face ID, Touch ID, and Keychain Services to Secure Your Apps


    As you have learned so far in this book, Internet of Things (IoT) technologies
    can be used to expand the conveniences in people’s lives. Compared to a few years
    ago, these devices have increased in their capabilities, as have the barriers
    of entry to creating a device. In this book alone, you have already taken advantage
    of an Arduino, Raspberry Pi, and iPhone as IoT sensors.


    However, as they say, new medicines come at the cost of new side effects. For
    the IoT, the most unfortunate, unexpected side effect of its adoption has been
    an increase in security exploits, originating from improperly secured IoT devices.
    As mentioned throughout the book, much of the popularity of IoT has been powered
    by the availability of affordable system-on-a-chip (SoC) solutions, such as the
    ESP32 you used in earlier chapters. Unfortunately, when a widely used system’s
    design shortcomings are exploited, its high adoption rate can lead to devastating
    damage.


    This was precisely what has occurred with the Mirai botnet, which exploited a
    known set of commonly used default passwords on IoT devices to automatically install,
    replicate, and run a program to use infected devices for a coordinated attack
    on target systems, otherwise known as a *distributed denial-of-service* (DDoS)
    attack. Having affected more than 600,000 devices, in 2017 it took down several
    Domain Name System (DNS) servers, which form the backbone of routing Internet
    traffic, and was cited as the largest DDoS attack publicly recorded.^([¹](#fn1))
    As of this writing (late 2018), the botnet has continued to increase in sophistication
    and find new targets.


    In Chapter [8](#346879_2_En_8_Chapter.xhtml), when you learned how to build a
    web server using a Raspberry Pi, one of the methods you learned for increasing
    security on a device was adding an SSL certificate to the web server, so that
    all of the data transferred between the devices and external clients (such as
    the iOS app) could be secured via HTTPS. Although not a perfect or complete solution,
    this was one step in making it harder for your users’ data to be intercepted via
    simple traffic sniffing (using a program to monitor packets transferred on a network).
    For a complete solution, you should always try to research all of the paths to
    accessing an administrator account on a system and secure them, including changing
    passwords, using two-factor authentication, adding input validation to your web
    application APIs, and installing security patches and helper utilities to prevent
    known attacks.


    In this chapter, you will learn three techniques on the iOS app side that you
    can use to help prevent your users’ information from being leaked or stolen from
    their devices: Face ID, Touch ID, and Keychain Services. As an iPhone user, you
    may already be familiar with the first two services from your Home screen. They
    allow you to unlock your Home screen using a 3D surface scan of your face (on
    iPhone X and newer versions) or using a fingerprint (on iPhone 5S–iPhone 8 Plus,
    and iPad Air 2 and later versions). However, you may not be aware that you can
    use Keychain Services in your own apps to restrict access to parts of your application.
    This is a feature popular in many password repository applications (such as 1Password).
    Similarly, Keychain Services allows you to create an encrypted database for your
    app’s data, which can only be accessed while your app is active and in the foreground
    on the user’s devices. Keychain Services is Apple’s recommended method for storing
    user passwords, API keys, and SSL certificates, which could be exploited greatly,
    if they were leaked from your app.'
