    ### 使用 Font Awesome 实现基于字体的图形


    作为用户界面拼图的最后一块，您需要为应用程序添加图形。本部分不直接导入图形文件，而是介绍一种非常流行的基于字体的替代方案——Font Awesome，及其
    Swift 实现 FontAwesome.swift。Font Awesome 是一个字体文件，提供了海量的图标集合。在 Web 开发中，它是一种流行的选择，有助于减小页面大小并减少需要聘请图形设计师的工作量。在
    iOS 上，它同样能带来这些好处，此外，还能让您免去自行管理和缩放图片的负担。您在本节中要使用的实现方案 FontAwesome.swift，允许您基于该字体创建
    `UIImage` 对象，使其使用方法与使用来自“资源目录”或其他来源的图形完全相同。


    首先，从其 GitHub 页面下载或克隆 FontAwesome.swift 的仓库：[`https://github.com/thii/FontAwesome.swift`](https://github.com/thii/FontAwesome.swift)。接下来，将存档中
    `FontAwesome` 文件夹内的所有文件（`Info.plist` 文件除外）复制到您的项目中。您可以通过“文件”菜单中的“将文件添加到 IOTHome”选项来执行此操作。如图
    9-10 所示，当文件选择弹出窗口出现时，选择 `IOTHome` 和 `IOTHomeTV` 作为目标，以便将文件同时包含在 iOS 和 tvOS 应用程序中。确保同时选中“如果需要，复制项目”，以复制这些文件，从而将文件的副本添加到项目中。


