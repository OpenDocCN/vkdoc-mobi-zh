  trans: '

    ### 解决自动布局问题


    `Map`已成功添加到`View Controller`中，如图 1-32 所示，但框架并不符合你的预期（是一个居中的小矩形，而非全屏）。别担心！你并没有做错什么。


    iPhone X（苹果首款无边框手机）的推出引发的一个问题在于，开发者需要检测手机的新边缘。更复杂的是，顶部边缘被传感器条打断，底部边缘则与新版 iOS 应用切换器共享空间。为了解决这个问题，苹果在
    iOS 11 中引入了*安全区域*的概念。故事板中的安全区域充当自动布局的新边界。当你将某个元素固定到安全区域时，系统会自动处理在 iPhone X“不安全”区域周围所需逻辑。安全区域可用于所有
    iOS 设备的故事板。


    不幸的是，有时苹果的 API 尚未准备就绪，或者这些规则的应用方式存在冲突，例如本例中的`Map View`。为了解决这个问题，我将介绍一些我喜欢使用的技巧，以消除
    Interface Builder 中的自动布局冲突。


    当我遇到自动布局冲突时，首先查看的是`Document Outline`（`Interface Builder`中的左侧窗格）。自动布局约束有误的视图控制器旁边会有一个红色的停止标志图标，如图
    1-33 左侧所示。点击该停止标志图标，`Document Outline`将向下展开至该`View Controller`，并列出有误的约束（通常不止一个）。如图
    1-33 所示，再次点击停止标志将弹出一个对话框，提供解决方案建议。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig33_HTML.jpg](img/346879_2_En_1_Fig33_HTML.jpg)


    图 1-33


    *用于解决约束问题的`Document Outline`弹出窗口*


    对于这个问题，弹出窗口并不够用；还需要另一种解决技巧。我的第二个常用修复方法是使用`Interface Builder`编辑器右下角的`Resolve Auto
    Layout Issues`工具。如图 1-34 所示，点击它会显示一个上下文菜单，要求你填充缺失的约束、删除所选视图的所有约束，或删除该`View Controller`的所有约束。根据我的经验，此工具的最佳用法是重置有问题视图的约束，然后再次尝试应用约束。很多时候，当你重新排列`View
    Controller`中的元素时，会意外破坏依赖于旧位置的其他约束。此工具为单个视图提供了一个良好的重置方法。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig34_HTML.jpg](img/346879_2_En_1_Fig34_HTML.jpg)


    图 1-34


    展示`Resolve Auto Layout Issues`上下文菜单


    不幸的是，这也没能解决问题。当其他方法都不奏效时，我喜欢打开有问题视图的`Size Inspector`工具（由右侧实用工具面板中的`Ruler`图标指示），然后手动修改数值，直到警告消失。如图
    1-35 所示，你可以通过在文本字段中输入新值来编辑数值，或者点击约束旁边的`Edit`按钮，弹出一个包含其属性的窗口。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig35_HTML.jpg](img/346879_2_En_1_Fig35_HTML.jpg)


    图 1-35


    使用`Size Inspector`修改约束


    对于`Map View`而言，问题在于约束没有固定视图的顶部和底部位置，因此我将`y`位置设置为`0`（屏幕顶部），并使高度匹配屏幕高度。我通过确认`Document
    Outline`中的警告消失来验证这一点。


    解决自动布局问题后，项目的最终故事板应类似于图 1-36。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig36_HTML.jpg](img/346879_2_En_1_Fig36_HTML.jpg)


    图 1-36


    IOTFit 项目完成的故事板


    ## 将故事板连接到代码


    尽管完成的故事板很漂亮，但目前如果用户按下任何按钮，它都不会执行任何操作，因为新的用户界面对象尚未绑定到任何代码。在 Xcode 中，将代码连接到故事板的方式是，使用特殊关键字（`IBOutlet`、`IBAction`）定义必须与
    Interface Builder 交互的属性和方法。然后，在`Interface Builder`中找到这些项目，并在故事板与代码之间拖拽连接。

    '
- fmt: '### Defining Interface Builder-Compatible Properties and Methods (Actions)


    When you created the `IOTFit` project from Xcode''s Tabbed App template, it generated
    a blank storyboard and blank classes for the first (`Create Workout`) and second
    (`Map Workout`) View Controllers. If you click the `CreateWorkoutViewController.swift`
    file in the Project Navigator, the editor will show you its contents, shown in
    Listing [1-1](#346879_2_En_1_Chapter.xhtml#PC1). The `WorkoutMapViewController.swift`
    file will have similar contents, at this point.


    ```

    import UIKit

    class CreateWorkoutViewController: UIViewController {

    override func viewDidLoad() {

    super.viewDidLoad()

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    }

    }

    Listing 1-1

    Intial Contents of the CreateWorkoutViewController Class

    ```


    This is not much to write home about, as most of the critical code required to
    initialize the View Controller itself is provided by its parent class, `UIViewController`.
    You may also notice that there is no code for the labels. Generally speaking,
    you do not have to declare *properties* (class members) for user interface elements
    whose appearance will not change significantly at runtime. However, items that
    will change should be represented as properties. For the Create Workout View Controller,
    you can ignore the Workout Distance and Workout Time labels, but you will have
    to create properties to represent the labels that hold the values.


    Interface builder–compatible properties are initialized much like normal properties,
    with two strengths: you must pay extra attention to their type and you must add
    a keyword that allows Interface Builder to expose them to its drag-and-drop interface
    (`@IBOutlet`).


    Unlike a normal variable, user interface properties that are tied to a storyboard
    will be initialized by that storyboard. Therefore, you need to pay extra attention
    to the reference strength and type of the variable. For most properties, this
    means you will have to define the property as being an `optional` (a variable
    that can be initialized with a value or remain in a detectable, uninitialized
    state) and having a `weak` reference (its contents will not stay in memory indefinitely).


    You can find the updated class definition for the Create Workout View Controller,
    including the new, properly declared properties, in Listing [1-2](#346879_2_En_1_Chapter.xhtml#PC2).


    ```

    import UIKit

    class CreateWorkoutViewController: UIViewController {

    @IBOutlet weak var workoutTimeLabel: UILabel?

    @IBOutlet weak var workoutDistanceLabel: UILabel?

    @IBOutlet weak var toggleWorkoutButton: UIButton?

    @IBOutlet weak var pauseWorkoutButton: UIButton?

    override func viewDidLoad() {

    super.viewDidLoad()

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    }

    }

    Listing 1-2

    CreateWorkoutViewController Class Definition, Including User Interface Properties

    ```


    The process for declaring a method that can be discovered by Interface is similar.
    Add the `@IBAction` keyword in front of the `func` keyword. For the Create Workout
    View Controller, there are only two user-initiated actions to worry about at this
    point: starting/stopping (toggling) a workout and pausing/resuming a workout.
    The modified definition for the `CreateWorkoutViewController` class, including
    the new methods, is provided in Listing [1-3](#346879_2_En_1_Chapter.xhtml#PC3).


    ```

    import UIKit

    class CreateWorkoutViewController: UIViewController {

    @IBOutlet weak var workoutTimeLabel: UILabel?

    @IBOutlet weak var workoutDistanceLabel:  UILabel?

    @IBOutlet weak var toggleWorkoutButton:  UIButton?

    @IBOutlet weak var pauseWorkoutButton: UIButton?

    override func viewDidLoad() {

    super.viewDidLoad()

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    }

    @IBAction func toggleWorkout() {

    NSLog("Toggle workout button pressed")

    }

    @IBAction func pauseWorkout() {

    NSLog("Pause workout button pressed")

    }

    }

    Listing 1-3

    CreateWorkoutViewController Class Definition, Including Interface Builder–Compatible
    Method Definitions

    ```


    I added `NSLog()` statements to this example, to allow you to view output messages
    in the Xcode debugging pane when you click the buttons.


    Moving on to the Workout Map View Controller, the setup is straightforward. You
    simply have to add a Map View to the class. All of the user interface operations
    on this View Controller are handled by the Map View, so there are no additional
    methods you need to define. One last caveat, though. In order to declare a `MKMapView`
    (Map View) object, you must import the `MapKit` framework into your class. The
    modified class definition for the `WorkoutMapViewController` class, including
    these changes, is included in Listing [1-4](#346879_2_En_1_Chapter.xhtml#PC4).


    ```

    import UIKit

    import MapKit

    class WorkoutMapViewController: UIViewController {

    @IBOutlet weak var mapView: MKMapView?

    override func viewDidLoad() {

    super.viewDidLoad()

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    }

    }

    Listing 1-4

    WorkoutMapViewController Class Definition, Including MapKit Framework and Map
    View Property

    ```'
