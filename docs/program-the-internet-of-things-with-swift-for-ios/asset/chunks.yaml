    # 学习目标


    本章开启本书的第二部分，重点围绕构建与外部硬件交互的应用。我们将短暂离开苹果的生态，学习如何利用 Arduino 和 Raspberry Pi 这类流行的通用硬件，创建自己的传感器，并将行业最佳实践应用于自定义硬件。为了给这类硬件开发应用，你将学习允许通过
    HTTPS 和蓝牙等常见协议进行通信的 iOS 框架。


    与本书第一部分类似，在这一部分中，你将构建一个智能家居管理应用`IOTHome`，并随着后续章节的推进不断对其进行迭代。在本章中，你将学习如何组装一个基于
    Arduino 的无线门磁传感器并为其编写软件。在下一章中，你将学习如何通过低功耗蓝牙（Bluetooth LE）让它与 iOS 应用通信。


    与由单一实体设计和生产的 Raspberry Pi 或 BeagleBone 不同，Arduino 项目对其硬件设计采取了更为放手的方式：开源其基础设计和编程环境（`IDE`），并鼓励其他人在此基础上进行迭代。图
    5-1 所示的 Adafruit HUZZAH32 便是这些迭代产品之一，它基于乐鑫 ESP32 片上系统（`SoC`），在保留与常见编程环境兼容性的同时，增加了更多的接口引脚、蓝牙、Wi-Fi
    以及内置电池插头/充电器。


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig1_HTML.jpg](img/346879_2_En_5_Fig1_HTML.jpg)


    图 5-1


    *Adafruit HUZZAH32 微控制器*


    在构建门磁硬件及其控制软件的过程中，你将学习物联网应用开发所需的以下关键技能：


    -   搭建用于检测开关输入的简单电路

    -   配置 Arduino 编程环境

    -   编写基于 C++的 Arduino“解决方案”（程序）

    -   使用通用输入/输出（`GPIO`）和模数转换（`ADC`）监控与控制设备


    由于本书面向软件工程师和爱好者，本章的电子学部分将以非常直接、实用的方式呈现。我的初衷是让硬件新手充分体验这项工作的乐趣，以便他们进一步探索，同时避免让有经验的读者感到乏味。此外，该项目不需要任何焊接，所需的所有零件均可轻松从
    Amazon.com、Adafruit 或 Mouser Electronics 订购。


    本章的 C++部分将借鉴你从 Swift 中已熟悉的概念。得益于 Arduino 项目开发者的辛勤工作，你会注意到 Arduino IDE 所使用的 C++语法非常现代化，并且再次与你在
    Swift 中熟悉的语法非常相似。


    # 构建无线门磁硬件


    现在你已经对蓝牙有了更好的了解，可以开始为`IOTHome`构建外设——门磁传感器了。为此，你需要组装硬件、配置 Arduino 编程环境、编写 Arduino
    程序代码，并将其下载到 HUZZAH32 微控制器中。如今，这些任务比以往任何时候都更加简化和可靠，但仍需细心关注。在本节中，我将引导你完成我创建门磁传感器的步骤，以及帮助我做出决策的设计考量。


    ## 零件清单


    要构建本章的门磁传感器，你需要获取表 5-1 中列出的零件。主要部件包括：负责运行控制软件的 Adafruit HUZZAH32 微控制器、用于组装电路的面包板、用于检测门关闭或打开的磁簧开关、用于直观显示系统状态的两个发光二极管（`LED`），以及用于调节电压的一些电阻。


    表 5-1


    门磁传感器零件清单


    | **零件名称** | **数量** | **Mouser 零件编号** |

    | --- | --- | --- |

    | Adafruit HUZZAH32 微控制器（已预焊） | 1 | 485-3591 |

    | 无焊面包板 | 1 | 589-TW-E40-1020 |

    | 面包板跳线套件 | 1 | 424-WIRE-KIT |

    | 3.7V 190mAh 锂聚合物电池 | 1 | 932-MIKROE-2759 |

    | 磁簧接近传感器 | 1 | 934-59140-1-S-03-F |

    | 10KΩ 电阻 | 1 | 603-FMP200JR-52-10K |

    | 200Ω 电阻 | 2 | 603-CFR-12JB-52-200R |

    | 蓝色 LED（直插式，3.4V，5mm 封装） | 1 | 941-C5SMFBJECR0U045 |

    | 红色 LED（直插式，2.1V，5mm 封装） | 1 | 941-C5SMFRJFCT0W0BB2 |


    Adafruit 提供三种版本的 HUZZAH32：未组装版，需要你将排针或零件直接焊接到其引脚上才能使用；已组装版，引脚上已焊好排针，允许你将微控制器插到面包板上；以及已组装版并带有堆叠排针，允许你将微控制器插到主板上，并使用跳线连接引脚。对于本项目，我推荐后两种版本，它们能为你节省大量时间和避免挫败感，而价格仅相差
    1 或 2 美元。


    对于其余零件，你会注意到我没有提及品牌或对零件施加严格限制。我设计这个项目的目标是创造一些我认为你可以用其他项目剩余的零件或你在 Amazon.com 或本地电子零件店可能见过的廉价
    Arduino 入门套件中的内容来制作的东西。


    本项目中的所有零件都是特别挑选的，以便于在 Amazon.com、Adafruit（`www.adafruit.com`）或 Mouser Electronics（`www.mouser.com`）上购买。比较这三家零售商，Adafruit
    对爱好者最为友好，提供精心挑选的可靠零件以及丰富的教程和示例项目。Mouser 是专业人士以及那些需要订购特殊零件或大量物品的最佳选择。最后，Amazon
    是万能的零售商。在 Amazon 上搜索零件比另外两家要困难得多，而且更难保证你获得的质量（许多小型制造商可以直接通过 Amazon 销售），但它可以是一个好资源，让你在同一次订单中买到流行零件和通用的低价零件。


    你为本项目准备的完整零件套件应类似于图 5-2 中的照片所示。


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig2_HTML.jpg](img/346879_2_En_5_Fig2_HTML.jpg)


    图 5-2


    为`IOTHome`项目收集的零件照片

