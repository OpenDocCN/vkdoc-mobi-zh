    ### 响应位置更新


    当系统检测到位置变化超过你指定的 `distanceFilter` 值时，`locationManager:didUpdateLocations:` 委托方法将触发。不过，你需要在此时更新用户界面以显示新值。此外，当用户改变锻炼状态时，你也应该更改按钮上的标签（如果锻炼完全停止，则隐藏暂停按钮）。最后，你还需要某种方式记录已过去的时间。


    这些任务中最简单的是更新按钮。当锻炼开始时，你将显示暂停按钮，并将开始按钮的标签改为“停止”。当暂停按钮被按下时，将其标签改为“继续”。最后，当停止按钮被按下时，重置用户界面（显示开始按钮，隐藏暂停按钮）。由于此逻辑在应用的所有状态变更中均相同，你可以将其封装到一个方法中，并在整个代码中使用该方法。在清单
    2-9 中，我创建了一个名为 `updateUserInterface()` 的方法来处理这些更新，并在 `viewDidLoad()`、`toggleWorkout()`
    和 `pauseWorkout()` 方法中添加了对该方法的调用。这些是视图被创建以及用户与屏幕交互的关键点。


