    \ and `IOTFitWatch Extension` , as indicated in Figure [10-5](#346879_2_En_10_Chapter.xhtml#Fig5).\n\
    \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig5_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5\n\nIOTFit project after including the watchOS target\n\nSince watchOS\
    \ 1.0, Apple has split watchOS apps into two parts: an app containing the static\
    \ resources only (storyboards, assets) and an extension containing the code. In\
    \ watchOS 1.0, Apple did not expose the watchOS frameworks on the watch hardware,\
    \ and the extension was used by the iOS app to update the views that were specified\
    \ by the WatchKit app component. Today, both pieces run on the watch hardware,\
    \ but this logic separation pattern is still preserved by Apple.\n\nNext, you\
    \ must set the descriptions for the permission-restricted features the watchOS\
    \ app will have to use: user location, HealthKit, and Core Motion. The easiest\
    \ way to do this is to copy the Privacy description key-value pairs from the iOS\
    \ project’s `Info.plist` file into the `Info.plist` file in the `IOTFitWatch Extension`\
    \ folder. The key-value pairs you need to copy are provided as source code in\
    \ Listing [10-1](#346879_2_En_10_Chapter.xhtml#PC1). You can use the Open As ➤\
    \ Source Code secondary-click (right-click) option for the `Info.plist` file,\
    \ to copy them into the file as text, or you can look for the `Privacy...` key-value\
    \ pairs in the Property List Inspector and add them manually.\n\n```\n\nWKCompanionAppBundleIdentifier\n\
    com.devAtelier.IOTFit\n...\nNSHealthShareUsageDescription\nIOTFit would like to\
    \ use HealthKit permission to\nimport workout data \nNSHealthUpdateUsageDescription\n\
    IOTFit would like to use HealthKit permission to\nexport workout data to the Health\
    \ app. \nNSLocationAlwaysAndWhenInUseUsageDescription\nIOTFit would like to use\
    \ location permission to plot your location during workouts. \nNSLocationAlwaysUsageDescription\n\
    IOTFit would like to use location permission to\nplot your location during workouts.\
    \ \nNSLocationUsageDescription\nIOTFit would like to use location permission to\n\
    plot your location during workouts. \nNSLocationWhenInUseUsageDescription\nIOTFit\
    \ would like to use location permission to\nplot your location during workouts.string>\n\
    NSMotionUsageDescription\nIOTFit would like to use motion permission to\nhelp\
    \ you measure the step count and altitude of your\nworkouts.\n\nListing 10-1\n\
    Privacy Permission Description Key-Value Pairs for the IOTFitWatch Extension Info.plist\
    \ File\n```\n\nFor the final step in the setup process, you must enable background\
    \ modes for the WatchKit App, in order to track the user’s location. As shown\
    \ in Figure [10-6](#346879_2_En_10_Chapter.xhtml#Fig6), select the `IOTFit` project\
    \ file at the top of the Project Navigator, then navigate to the `IOTFitWatch\
    \ Extension` target and click the Capabilities tab. In the Capabilities detail\
    \ screen, enable Background Modes and Workout Processing.\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig6_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6\n\nEnabling Background Modes for the IOTFitWatch app"
  trans: '

    ### 设置项目


    与第 9 章中的 tvOS 项目一样，在本章中，你将通过向第 4 章中应用的最后一个迭代版本添加一个新目标，来实现 `IOTFit` 项目的 watchOS
    版本。首先，复制你已完成的项目，或者从本书的官方 GitHub 仓库（[`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)）下载一份新副本。


    当向 iOS 项目添加 watchOS 目标时，你不仅能够与 iOS 应用共享代码，而且该 watchOS 目标将在 App Store 中标记为 Apple
    Watch 版本。如图 10-1 所示，当 iOS 应用在 App Store 中提供了 watchOS 版本时，用户会在 App Store 描述页面上看到一个链接，该链接会显示
    watchOS 版本的信息，并提供与 iOS 版本一起自动安装的选项。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig1_HTML.jpg](img/346879_2_En_10_Fig1_HTML.jpg)


    **图 10-1** 提供 watchOS 版本的 iOS 应用的 App Store 描述页面


    准备好原始项目的副本后，进入 `File` 菜单，选择 **New ➤ Target**，操作方式与第 9 章中添加 tvOS 目标时完全相同。在弹出的模板选择窗口中，选择
    **WatchKit App**，如图 10-2 所示。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig2_HTML.jpg](img/346879_2_En_10_Fig2_HTML.jpg)


    **图 10-2** 选择 WatchKit 应用模板


    当被要求配置目标时，将其命名为 `IOTFitWatch`。如图 10-3 所示，确认产品设置为使用开发者账户的凭据进行构建，并且**不勾选**“**Include
    Notification Scene**”和“**Include Complication**”复选框。就本项目范围而言，你无需启用这两个选项。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig3_HTML.jpg](img/346879_2_En_10_Fig3_HTML.jpg)


    **图 10-3** 配置 watchOS 目标


    首次向项目添加 watchOS 目标时，系统会要求你激活其目标，如图 10-4 所示。选择 **Activate** 以关闭弹出窗口，然后继续设置流程。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig4_HTML.jpg](img/346879_2_En_10_Fig4_HTML.jpg)


    **图 10-4** 激活 watchOS 应用的方案


    完成目标的设置后，你的项目中应包含两个新文件夹：`IOTFitWatch` 和 `IOTFitWatch Extension`，如图 10-5 所示。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig5_HTML.jpg](img/346879_2_En_10_Fig5_HTML.jpg)


    **图 10-5** 包含 watchOS 目标后的 `IOTFit` 项目


    自 watchOS 1.0 起，Apple 便将 watchOS 应用分为两部分：一个仅包含静态资源（Storyboard、素材）的应用，以及一个包含代码的扩展。在
    watchOS 1.0 中，Apple 并未在手表硬件上公开 watchOS 框架，而是由 iOS 应用利用该扩展来更新 WatchKit 应用组件所指定的视图。如今，这两部分都在手表硬件上运行，但
    Apple 仍保留了这种逻辑分离模式。


    接下来，你必须为 watchOS 应用需要使用的权限受限功能（用户位置、HealthKit 和 Core Motion）设置描述。最简单的方法是将 iOS
    项目 `Info.plist` 文件中的隐私描述键值对复制到 `IOTFitWatch Extension` 文件夹的 `Info.plist` 文件中。你需要复制的键值对已作为代码提供在列表
    10-1 中。你可以对 `Info.plist` 文件使用二次点击（右键单击）选项 **Open As ➤ Source Code**，以文本形式将其复制到文件中，也可以在属性列表检查器中查找
    `Privacy...` 键值对并手动添加。


    ```

    WKCompanionAppBundleIdentifier

    com.devAtelier.IOTFit

    ...

    NSHealthShareUsageDescription

    IOTFit 希望使用 HealthKit 权限来导入锻炼数据

    NSHealthUpdateUsageDescription

    IOTFit 希望使用 HealthKit 权限来将锻炼数据导出到“健康”应用

    NSLocationAlwaysAndWhenInUseUsageDescription

    IOTFit 希望使用位置权限在锻炼期间绘制你的位置信息

    NSLocationAlwaysUsageDescription

    IOTFit 希望使用位置权限在锻炼期间绘制你的位置信息

    NSLocationUsageDescription

    IOTFit 希望使用位置权限在锻炼期间绘制你的位置信息

    NSLocationWhenInUseUsageDescription

    IOTFit 希望使用位置权限在锻炼期间绘制你的位置信息

    NSMotionUsageDescription

    IOTFit 希望使用运动权限来帮助你测量锻炼过程中的步数和海拔

    ```


    **列表 10-1** `IOTFitWatch Extension` 的 `Info.plist` 文件中的隐私权限描述键值对


    在设置流程的最后一步，你必须为 WatchKit App 启用后台模式，以便追踪用户的位置。如图 10-6 所示，在项目导航器顶部选择 `IOTFit` 项目文件，然后导航到
    `IOTFitWatch Extension` 目标，并点击 **Capabilities** 选项卡。在“功能”详情界面中，启用 **Background
    Modes** 和 **Workout Processing**。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig6_HTML.jpg](img/346879_2_En_10_Fig6_HTML.jpg)


    **图 10-6** 为 `IOTFitWatch` 应用启用后台模式

    '
- fmt: '## Building a watchOS User Interface


    Now that the watchOS target has been configured completely, you can begin putting
    together the user interface. For this project, I have adapted the IOTFit app to
    an Apple Watch form factor, as shown in Figure [10-7](#346879_2_En_10_Chapter.xhtml#Fig7).
    Because most users interact with their Apple Watches when they are on the go or
    unable to access their phones, you should design your interface so that it is
    easy to view the most commonly used information from the app and equally easy
    to create a new record in the app.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig7_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Design wireframes for the IOTFitWatch app


    In the IOTFitWatch app, I expose the user’s workout history on the Home screen
    and provide a context menu that allows him/her to launch a Detail screen for recording
    a new workout. Users can bring up the context menu by performing a force touch
    (hard press) on the Workout Screen. The Workout History and Record Workout screens
    display the user’s activity type to help him/her identify workouts.


    To get started developing the user interface, open the `Interface.storyboard`
    file under the `IOTFitWatch` folder. As shown in Figure [10-8](#346879_2_En_10_Chapter.xhtml#Fig8),
    you will be greeted with a storyboard containing the blank interface for the first
    view controller in the app (`InterfaceController.swift`).


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig8_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Initial storyboard for the IOTFitWatch project (`Interface.storyboard`)


    Begin by laying out the Workout History screen. In the same manner as an iOS or
    tvOS app, drag a Table object from the Object Library to the view controller,
    as shown in Figure [10-9](#346879_2_En_10_Chapter.xhtml#Fig9).


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig9_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Adding a table to the Record Workout view controller


    If you have upgraded to Xcode 10, your user interface may hide the Object Library
    by default. To open the Object Library on Xcode 10, click the Library button (the
    one with an iPhone Home button icon) at the top-right of Xcode, next to the options
    for toggling the side bars in Interface Builder, as shown in Figure [10-10](#346879_2_En_10_Chapter.xhtml#Fig10).


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig10_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Finding the Object Library in Xcode 10


    Next, you must configure the height of the table view cell (known as a *table
    row* in watchOS). As shown in Figure [10-11](#346879_2_En_10_Chapter.xhtml#Fig11),
    click the table row, then in the Attributes inspector (the right detail pane of
    Interface Builder), click the Height drop-down, and select Fixed. This will allow
    you to make all of the rows a consistent height. For my implementation, I chose
    50 pixels for the height.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig11_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig11_HTML.jpg)


    Figure 10-11


    Configuring cell height for a table row


    As mentioned at the beginning of the chapter, one of the unfortunate side effects
    of watchOS’s small subset of iOS is that you must use stack views to lay out your
    user interfaces. Stack views manage a container view and layout each item vertically
    or horizontally in the container, according to a few configuration parameters
    (e.g., equal heights, equal spacing). In order to implement the user interface
    from Figure [10-7](#346879_2_En_10_Chapter.xhtml#Fig7), in which there is an image
    to the left of two vertically-aligned labels, you will have to nest stack views.
    The parent stack view will be configured to stack items horizontally and contain
    the image view, and stack view for the labels. The stack view for the labels will
    be configured to stack items vertically.'
