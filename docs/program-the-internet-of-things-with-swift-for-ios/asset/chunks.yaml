  raw: '### Connecting to the OpenWeatherMap API


    With the user interface, network functionality, and user location in place, you
    are almost ready to start using OpenWeatherMap’s public weather database, to add
    outside weather information to the IOTHomeTV app. For the final piece in the setup
    puzzle, you must request an API key from OpenWeatherMap.org. Many services that
    allow others to use their data through a web API often require an API key to authenticate
    requests or enforce data access, according to membership level. For example, OpenWeatherMap.org
    allows up to 60 requests a minute on a free account, but anything above this requires
    a paying membership. As shown in Figure [9-15](#346879_2_En_9_Chapter.xhtml#Fig15),
    to request a free account, navigate to [`www.openweathermap.org`](http://www.openweathermap.org)
    in your browser, then click the Sign Up link.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig15_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig15_HTML.jpg)


    Figure 9-15


    Creating an account on OpenWeatherMap.org


    After you have completed creating your account, you will be redirected to the
    API keys page, pictured in Figure [9-16](#346879_2_En_9_Chapter.xhtml#Fig16),
    which lists all of the OpenWeatherMap API keys available to you. Make a note of
    the Default key and do not share it with others, or you may risk losing access
    to your account.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig16_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig16_HTML.jpg)


    Figure 9-16


    OpenWeatherMap.org API keys page


    Now that you have an OpenWeatherMap API key and the user’s current location, you
    can begin using the service to fetch weather data. To populate the weather fields
    on the app, you will use two end points from OpenWeatherMap: `/weather` (for current
    weather conditions) and `/forecast` (for the three-day forecast). Looking at the
    documentation for the `/weather` end point ( [`https://openweathermap.org/current`](https://openweathermap.org/current)
    ), you will notice that you can use URL parameters to call the end point with
    geographic coordinates. URL parameters are a way of passing values to an end point
    by appending them to the end of the URL. For the coordinate (35.730534, 139.705001),
    you would use the URL:


    ```

    https://api.openweathermap.org/data/2.5/weather?lat=35.730534&lon=139.705001&units=metric&appid=YOUR_APP_ID

    ```


    In Listing [9-10](#346879_2_En_9_Chapter.xhtml#PC11), I have included the JSON
    response for this API call. For the Outdoor Conditions label, you need only the
    temperature and humidity fields, which you can extract from the `temp` and `humidity`
    key-value pairs inside the `main` dictionary.


    ```

    {

    "coord": {

    "lon": 139.71,

    "lat": 35.73

    },

    "weather": [{

    "id": 803,

    "main": "Clouds",

    "description": "broken clouds",

    "icon": "04n"

    }],

    "base": "stations",

    "main": {

    "temp": 27.64,

    "pressure": 1009,

    "humidity": 74,

    "temp_min": 26,

    "temp_max": 29

    },

    ...

    }

    Listing 9-10

    Sample JSON Response for the OpenWeatherMap Current Conditions End Point

    ```


    The `NetworkManager` class so far has always used end points relative to the domain
    for the IOTHome web server. To support OpenWeatherMap, you will have to expand
    the Network Manager to use multiple base URLs and append parameters to the end
    of the URL. One special requirement of URL parameters is that the first parameter
    must be prefixed with `?`, and every consecutive parameter must be prefixed with
    `&`. Rather than writing the logic for this yourself, you can take advantage of
    the `URLComponents` class to build a properly formatted URL. In Listing [9-11](#346879_2_En_9_Chapter.xhtml#PC12),
    I have expanded the `request(endpoint:httpMethod:completion:)` method in the Network
    Manager to accept a base URL and URL parameter dictionary as input parameters.
    Additionally, I have modified the remaining methods with the new parameters and
    added a `formattedURL(baseUrl:endpoint:parameters:)` method to build the formatted
    URL.


    ```

    class NetworkManager: NSObject, URLSessionDelegate {

    let deviceBaseUrl = "https://raspberrypi.local"

    let opmBaseUrl = "https://api.openweathermap.org/data/2.5"

    let opmApiKey = "YOUR_API_KEY"

    static let shared = NetworkManager()

    func formattedUrl(baseUrl: String, endpoint: String,

    parameters: [String: String]? ) -> URL? {

    guard var urlComponents = URLComponents(string:

    "\(baseUrl)/\(endpoint)") else {

    return nil

    }

    urlComponents.queryItems = parameters?.compactMap({

    pair in

    URLQueryItem(name: pair.key, value: pair.value)

    })

    return urlComponents.url?.absoluteURL

    }

    func request(baseUrl: String, endpoint: String,

    httpMethod: String, parameters: [String: String]? =

    nil, completion: @escaping (_ jsonDict: [String:     Any]) -> Void) {

    guard let url = self.formattedUrl(baseUrl: baseUrl,

    endpoint: endpoint, parameters: parameters) else {

    return completion(["error": "Invalid URL"])

    }

    var urlRequest = URLRequest(url: url)

    urlRequest.httpMethod = httpMethod

    ...

    }

    ...

    func getTemperature(completion: @escaping (_

    jsonDict: [String: Any]) -> Void) {

    request(baseUrl: deviceBaseUrl, endpoint:

    "temperature", httpMethod: "GET") {

    (resultDict: [String: Any]) in

    completion(resultDict)

    }

    }

    func getDoorStatus(completion: @escaping (_

    jsonDict: [String: Any]) -> Void) {

    connectDoor { [weak self] (result: [String:

    Any]) in

    if (result["error"] as? String) != nil {

    return completion(result)

    } else {

    guard let deviceBaseUrl =

    self?.deviceBaseUrl else {

    return completion(["error":

    "Invalid device URL"])

    }

    self?.request(baseUrl: deviceBaseUrl,

    endpoint: "door/status",

    httpMethod: "GET") { (resultDict

    [String: Any]) in

    completion(resultDict)

    }

    }

    }

    }

    func connectDoor(completion: @escaping (_

    jsonDict: [String: Any]) -> Void) {

    request(baseUrl: deviceBaseUrl, endpoint:

    "door/connect", httpMethod: "POST") {

    (resultDict: [String: Any]) in

    completion(resultDict)

    }

    }

    func disconnectDoor(completion: @escaping (_

    jsonDict: [String: Any]) -> Void) {

    request(baseUrl: deviceBaseUrl, endpoint:

    "door/disconnect", httpMethod: "POST") {

    (resultDict: [String: Any]) in

    completion(resultDict)

    }

    }

    }

    Listing 9-11

    Expanding the NetworkManager Class to Support Multiple Base URLs and URL Parameters

    ```


    In this example, rather than using a `for` loop to build the array of `URLQueryItem`
    objects, I used the new `compactMap()` method . This API takes cues from functional
    programming languages (such as Haskell) and has been taking off in popularity
    recently as a way of performing a calculation based on iterating through a set.


    Now that the Network Manager is ready to handle your new requirements, you can
    add a `getOutdoorTemperature()` method to the Network Manager, to make the request
    and handle the response in the main view controller of the app, as shown in Listing
    [9-12](#346879_2_En_9_Chapter.xhtml#PC13).'
