    按钮。此时连接检查器将显示所有适用于按钮的用户界面事件列表，包括 Touch Up Inside、Touch Down、Value Changed 和 Touch
    Cancel。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig40_HTML.jpg](img/346879_2_En_1_Fig40_HTML.jpg)


    图 1-40：Pause Workout 按钮的连接检查器事件


    你最常用来检测用户按下按钮的事件是 Touch Up Inside。该事件在用户按住并释放按钮后触发一次。要将操作连接到其处理方法`toggleWorkout()`，请选中
    Touch Up Inside 行中的单选按钮，然后将其拖拽到`CreateWorkoutViewController`类上释放。如图 1-41 所示，释放鼠标后，会弹出一个上下文菜单，列出该类中所有兼容
    Interface Builder 的方法。选择`toggleWorkout`。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig41_HTML.jpg](img/346879_2_En_1_Fig41_HTML.jpg)


    图 1-41：将用户界面事件连接到类中的方法


    完成选择后，`pauseWorkout()`方法的名称应出现在 Touch Up Inside 事件旁边的文本气泡中，如图 1-42 所示。


