    ## Using HealthKit to Populate the Workout History Table


    To complete the core functionality of the IOTFitWatch app, you must populate the
    Workout History Interface Controller with data on the user’s past workouts. In
    the same manner as the Record Workout Interface Controller, you can leverage code
    from the IOTFit iOS app, to help with you with this task. In the iOS app, the
    Workout History was managed by the `WorkoutTableViewController` class. Looking
    at this class, you will remember that you fetched by the data for the table view
    by calling the `loadWorkoutsFromHealthKit()` method on the shared Workout Data
    Manager, which queried HealthKit for all the workouts the user saved on their
    device. Because you successfully set up HealthKit permission and imported the
    Workout Data Manager into the IOTFitWatch target in the last section, you can
    leverage them to load the table view data here.


    To begin, port over the logic for loading the table. In the IOTFit iOS app, the
    data for the Workout Table View Controller was refreshed whenever the view controller
    was presented, via the `viewWillAppear(animated:)` method. In watchOS, the parallel
    to this method is the `willActivate()` method. As shown in Listing [10-12](#346879_2_En_10_Chapter.xhtml#PC12),
    expand the `InterfaceController` class to fetch data every time it becomes active.
    The `WKInterfaceTable` class does not define a protocol for initializing its data,
    so include a stub method for refreshing the table view’s data.


