- fmt: '# Summary


    In this chapter, you learned how to leverage your knowledge of iOS programming
    to create a tvOS dashboard app for the `IOTHome` hardware. Although you had to
    make some special exceptions for tvOS, the development flow and APIs that were
    available for use closely resembled their counterparts in iOS. By adding the tvOS
    app as a target to the `IOTHome` project, you were able even to share code with
    the iOS app, including the `Network Manager`. To add that last bit of useful polish
    to the app, you learned how to apply visual effects to views, use `Font Awesome`
    for font-based icons, and `OpenWeatherMap.org` for public weather data.


    As fun as it was building the app, it also gave you an opportunity to make the
    data from the `IOTHome` sensors more useful and easier to access for users. The
    biggest recurring challenge I kept seeing when consulting for companies implementing
    IoT sensors and big data was how to use all the data that has been generated.
    By giving your users a visualization of their data and augmenting it with other
    useful, related information data, you were able to reduce the friction of using
    the hardware and increase its value to your users. By making systems that improve
    a user’s life, you can help transform IoT devices from toys to tools.


    # 10. Using watchOS to Build an Apple Watch App


    From Dick Tracy’s watch phone in the 1940s to the Pip-Boy in today’s extremely
    popular *Fallout* video game series, the idea of a watch as an information device
    on your wrist has been in the public consciousness long before Apple introduced
    the Apple Watch in 2015. Starting in the 1980s, such consumer electronics companies
    as Casio and Radio Shack began taking the leap forward and introduced the first
    smart watches, by adding calculators, FM radios, and contact books to digital
    watches. This trend continued through the 1990s and 2000s, with smart watches
    beginning to gain more and more connected features, such as cellular phone calling
    and PC data synchronization. However, as someone whose first part-time job was
    fixing watches in the early 2000s, I can tell you, the only smart watch I ever
    saw during that time was the single camera watch we had on display and never sold
    for several years. At that time, the only smart watches that were being sold were
    not compelling purchases, stemming from their high price tags, gimmicky features,
    and run-of-the-mill design.


    This all began to change in 2012, when Pebble introduced their Pebble smart watch.
    Rather than being a calculator glued to the bottom of a regular digital watch,
    it was a Bluetooth-enabled timepiece that used an E Ink screen to display the
    time and notifications from your phone. The cherry on the cake was that you could
    use Pebble’s software development kit to make your own watch faces and full-fledged
    applications. It quickly became the most funded project on the Kickstarter crowdfunding
    web site and helped push Google, Apple, and Samsung (among countless others) to
    get serious about connected watches.


    In 2015, when Apple finally released the Apple Watch, with its own watchOS software
    development kit and App Store, many predicted it would be Apple’s next huge market
    and instantly dominate the smart watch market, just as the iPhone revolutionized
    smartphones in 2007. As of this writing, in 2018, the Apple Watch did fulfill
    the prophecy of becoming the number-one smart watch; however, it was a long, slow
    process of attrition. Although feature-wise, they were mostly the same. The Apple
    Watch provided a higher build quality, full-color screen, and health sensors that
    the Pebble did not have. Compared to Android Wear, the Apple Watch had a more
    passionate user base and hardware manufacturers that provided the supply and demand
    to keep improving the platform.


    Most important of all, the Apple Watch was able to become the number-one smart
    watch by expanding into mainstream consciousness and addressing markets that were
    previously underserved. Although the platform did not expand to the popularity
    of smartphones, it has proved to be extremely popular in health care, the service
    sector, and fitness communities, as it provides nonintrusive access to snippets
    of information in environments in which smartphones are inappropriate or impractical.
    I know I personally am lost without my Apple Watch when I get on crowded trains
    in Tokyo. In these respects, the Apple Watch is a true Internet of Things (IoT)
    success story.


    In this chapter, you will learn how to take advantage of the Apple Watch, to build
    apps that can run in tandem with your iOS apps. As with the tvOS project in Chapter
    9, you will take the `IOTFit` fitness app from Chapters 1–4 and add a watchOS
    target that allows users to view their past workout history and create new workouts.
    You will port over the motion (accelerator) and location-tracking features from
    the iOS app, to generate all of the same data in the watchOS app. As an added
    bonus, you will also take advantage of the `HealthKit` store from the iOS project,
    which will automatically sync data between the user’s watch and phone.


    ## Learning Objectives


    In this chapter, by building the watchOS version of the `IOTFit` fitness-tracking
    application, you will learn the following key concepts for IoT application development:


    - Adding a watchOS target to an iOS project

    - Building a table-based user interface on a watchOS app

    - Adding Force Touch support to a watchOS app

    - Using Core Motion, Core Location, and HealthKit on watchOS

    - Populating a table view in watchOS


    Similar to tvOS, watchOS provides a stripped-down development environment based
    on the development principles and frameworks from iOS. Starting with watchOS 2.0,
    Apple began exposing more of these frameworks to developers, so that Apple Watch
    apps could run without being tethered to an iPhone or Internet connection. Although
    this started as a way to improve performance on the device, it was one of the
    key factors that helped solidify the platform’s adoption in the markets described
    previously. The `IOTFit` watchOS app will be able to run without being paired
    with an iPhone, except for when the user must enable permissions the first time
    the app is loaded. As mentioned in the introduction, all of the data in the app
    will be stored in `HealthKit`, which Apple automatically syncs between the user’s
    watch and his/her iPhone.


    Unlike tvOS, due to the limited memory and processing power of watchOS, many of
    these frameworks are stripped down to the core features required for smart watch
    use cases. For most frameworks, this is manifested by seeing a smaller subset
    of APIs available. However, in the area of user interface development, the toll
    is quite significant. Rather than being able to use the full set of `UIView` subclasses
    and Auto Layout, you will have to learn how to use stack views and the more limited
    `WKInterface*` classes. In this chapter, I will focus on both, with careful attention
    to making stack views work for practical user interfaces and implementing a `WKInterfaceTable`-based
    table view whose implementation concepts differ considerably from those of the
    `UITableView` class on iOS.


    This chapter is based heavily on the foundation of the `IOTFit` fitness app from
    Chapters 1–4. If you are still uncomfortable with user interface development in
    Xcode, I highly recommend reviewing Chapter 1. If you would like to review the
    details of implementing location services and health APIs in iOS, I highly recommend
    reviewing Chapters 2–4.'
  raw: '## Summary


    In this chapter, you learned how to leverage your knowledge of iOS programming
    to create a tvOS dashboard app for the IOTHome hardware. Although you had to make
    some special exceptions for tvOS, the development flow and APIs that were available
    for use closely resembled their counterparts in iOS. By adding the tvOS app as
    a target to the IOTHome project, you were able even to share code with the iOS
    app, including the Network Manager. To add that last bit of useful polish to the
    app, you learned how to apply visual effects to views, use Font Awesome for font-based
    icons, and OpenWeatherMap.org for public weather data.


    As fun as it was building the app, it also gave you an opportunity to make the
    data from the IOTHome sensors more useful and easier to access for users. The
    biggest recurring challenge I kept seeing when consulting for companies implementing
    IoT sensors and big data was how to use all the data that has been generated.
    By giving your users a visualization of their data and augmenting it with other
    useful, related information data, you were able to reduce the friction of using
    the hardware and increase its value to your users. By making systems that improve
    a user’s life, you can help transform IoT devices from toys to tools.


    # 10. Using watchOS to Build an Apple Watch App


    From Dick Tracy’s watch phone in the 1940s to the Pip-Boy in today’s extremely
    popular *Fallout* video game series, the idea of a watch as an information device
    on your wrist has been in the public consciousness long before Apple introduced
    the Apple Watch in 2015\. Starting in the 1980s, such consumer electronics companies
    as Casio and Radio Shack began taking the leap forward and introduced the first
    smart watches, by adding calculators, FM radios, and contact books to digital
    watches. This trend continued through the 1990s and 2000s, with smart watches
    beginning to gain more and more connected features, such as cellular phone calling
    and PC data synchronization. However, as someone whose first part-time job was
    fixing watches in the early 2000s, I can tell you, the only smart watch I ever
    saw during that time was the single camera watch we had on display and never sold
    for several years. At that time, the only smart watches that were being sold were
    not compelling purchases, stemming from their high price tags, gimmicky features,
    and run-of-the-mill design.


    This all began to change in 2012, when Pebble introduced their Pebble smart watch.
    Rather than being a calculator glued to the bottom of a regular digital watch,
    it was a Bluetooth-enabled timepiece that used an E Ink screen to display the
    time and notifications from your phone. The cherry on the cake was that you could
    use Pebble’s software development kit to make your own watch faces and full-fledged
    applications. It quickly became the most funded project on the Kickstarter crowdfunding
    web site and helped push Google, Apple, and Samsung (among countless others) to
    get serious about connected watches.


    In 2015, when Apple finally released the Apple Watch, with its own watchOS software
    development kit and App Store, many predicted it would be Apple’s next huge market
    and instantly dominate the smart watch market, just as the iPhone revolutionized
    smartphones in 2007\. As of this writing, in 2018, the Apple Watch did fulfill
    the prophecy of becoming the number-one smart watch; however, it was a long, slow
    process of attrition. Although feature-wise, they were mostly the same. The Apple
    Watch provided a higher build quality, full-color screen, and health sensors that
    the Pebble did not have. Compared to Android Wear, the Apple Watch had a more
    passionate user base and hardware manufacturers that provided the supply and demand
    to keep improving the platform.


    Most important of all, the Apple Watch was able to become the number-one smart
    watch by expanding into mainstream consciousness and addressing markets that were
    previously underserved. Although the platform did not expand to the popularity
    of smartphones, it has proved to be extremely popular in health care, the service
    sector, and fitness communities, as it provides nonintrusive access to snippets
    of information in environments in which smartphones are inappropriate or impractical.
    I know I personally am lost without my Apple Watch when I get on crowded trains
    in Tokyo. In these respects, the Apple Watch is a true Internet of Things (IoT)
    success story.


    In this chapter, you will learn how to take advantage of the Apple Watch, to build
    apps that can run in tandem with your iOS apps. As with the tvOS project in Chapter
    [9](#346879_2_En_9_Chapter.xhtml), you will take the IOTFit fitness app from Chapters
    [1](#346879_2_En_1_Chapter.xhtml)-[4](#346879_2_En_4_Chapter.xhtml) and add a
    watchOS target that allows users to view their past workout history and create
    new workouts. You will port over the motion (accelerator) and location-tracking
    features from the iOS app, to generate all of the same data in the watchOS app.
    As an added bonus, you will also take advantage of the HealthKit store from the
    iOS project, which will automatically sync data between the user’s watch and phone.


    ## Learning Objectives


    In this chapter, by building the watchOS version of the IOTFit fitness-tracking
    application, you will learn the following key concepts for IoT application development:


    *   Adding a watchOS target to an iOS project


    *   Building a table-based user interface on a watchOS app


    *   Adding Force Touch support to a watchOS app


    *   Using Core Motion, Core Location, and HealthKit on watchOS


    *   Populating a table view in watchOS


    Similar to tvOS, watchOS provides a stripped-down development environment based
    on the development principles and frameworks from iOS. Starting with watchOS 2.0,
    Apple began exposing more of these frameworks to developers, so that Apple Watch
    apps could run without being tethered to an iPhone or Internet connection. Although
    this started as a way to improve performance on the device, it was one of the
    key factors that helped solidify the platform’s adoption in the markets described
    previously. The IOTFit watchOS app will be able to run without being paired with
    an iPhone, except for when the user must enable permissions the first time the
    app is loaded. As mentioned in the introduction, all of the data in the app will
    be stored in HealthKit, which Apple automatically syncs between the user’s watch
    and his/her iPhone.


    Unlike tvOS, due to the limited memory and processing power of watchOS, many of
    these frameworks are stripped down to the core features required for smart watch
    use cases. For most frameworks, this is manifested by seeing a smaller subset
    of APIs available. However, in the area of user interface development, the toll
    is quite significant. Rather than being able to use the full set of `UIView` subclasses
    and Auto Layout, you will have to learn how to use stack views and the more limited
    `WKInterface*` classes. In this chapter, I will focus on both, with careful attention
    to making stack views work for practical user interfaces and implementing a `WKInterfaceTable`-based
    table view whose implementation concepts differ considerably from those of the
    `UITableView` class on iOS.


    This chapter is based heavily on the foundation of the IOTFit fitness app from
    Chapters [1](#346879_2_En_1_Chapter.xhtml)-[4](#346879_2_En_4_Chapter.xhtml).
    If you are still uncomfortable with user interface development in Xcode, I highly
    recommend reviewing Chapter [1](#346879_2_En_1_Chapter.xhtml). If you would like
    to review the details of implementing location services and health APIs in iOS,
    I highly recommend reviewing Chapters [2](#346879_2_En_2_Chapter.xhtml)-[4](#346879_2_En_4_Chapter.xhtml).'
  trans: '

    # 总结


    在本章中，你学习了如何运用 iOS 编程知识，为 `IOTHome` 硬件创建一个 tvOS 仪表板应用。尽管不得不为 tvOS 做出一些特殊处理，但其开发流程和可用的
    API 与 iOS 中的对应部分非常相似。通过将 tvOS 应用作为目标添加到 `IOTHome` 项目中，你甚至能够与 iOS 应用共享代码，包括 `Network
    Manager`。为了让应用锦上添花，你还学习了如何为视图应用视觉效果，使用 `Font Awesome` 实现基于字体的图标，以及使用 `OpenWeatherMap.org`
    获取公共天气数据。


    构建这款应用的过程充满乐趣，同时也让你有机会让 `IOTHome` 传感器的数据对用户更有用、更易于访问。在为部署物联网传感器和大数据的公司提供咨询时，我反复遇到的最大挑战是如何利用所有已生成的数据。通过向用户展示其数据的可视化效果，并补充其他有用的关联信息，你得以减少使用硬件的障碍，并提升其对用户的价值。通过打造改善用户生活质量的系统，你可以帮助物联网设备从“玩具”转变为“工具”。


    # 10. 使用 watchOS 构建 Apple Watch 应用


    从 1940 年代迪克·特雷西的手表电话，到如今极受欢迎的 *《辐射》* 游戏系列中的哔哔小子，将手表作为腕上信息设备的想法，早在 2015 年苹果发布 Apple
    Watch 之前就已深入人心。从 20 世纪 80 年代开始，卡西欧和 Radio Shack 等消费电子公司便率先迈出一步，通过为数字手表添加计算器、FM
    收音机和通讯录功能，推出了初代智能手表。这一趋势贯穿了 90 年代和 2000 年代，智能手表开始具备越来越多的联网功能，例如蜂窝电话通话和 PC 数据同步。然而，作为一个在新千年初期以修表为第一份兼职工作的人，我可以告诉你，那时我见过的唯一一款智能手表，是我们店里陈列多年却从未售出的那款带摄像头的表。当时市面上能买到的智能手表并不吸引人，原因在于其高昂的售价、华而不实的功能以及平庸的设计。


    这一切在 2012 年开始改变，当时 Pebble 推出了他们的 Pebble 智能手表。它并非普通数字手表底部粘上一个计算器，而是一款支持蓝牙、使用 E
    Ink 屏幕显示时间以及手机通知的计时设备。锦上添花的是，你可以使用 Pebble 的软件开发工具包制作自己的表盘和功能完备的应用。它迅速成为众筹网站 Kickstarter
    上融资最多的项目，并促使谷歌、苹果和三星（以及其他众多公司）开始认真对待联网手表。


    2015 年，苹果终于发布了 Apple Watch，并配有自己的 watchOS 软件开发工具包和 App Store。许多人预测这将是苹果的下一个巨大市场，并会像
    iPhone 在 2007 年彻底改变智能手机市场那样，迅速主导智能手表市场。截至撰写本书时的 2018 年，Apple Watch 确实实现了成为第一智能手表的预言；然而，这是一个漫长而缓慢的消耗过程。尽管在功能上它们大多相似，但
    Apple Watch 提供了 Pebble 所没有的更高制造质量、全彩屏幕以及健康传感器。与 Android Wear 相比，Apple Watch 拥有更热情的用户群体，以及提供供需关系以持续改进平台的硬件制造商。


    最重要的是，Apple Watch 通过进入主流意识并服务于之前服务不足的市场，才得以成为第一智能手表。尽管该平台并未达到智能手机的普及程度，但它在医疗保健、服务行业和健身社区中已被证明极受欢迎，因为它能在智能手机不适用或不切实际的环境中，以非侵入式的方式提供简短信息片段。我知道，当我在东京拥挤的地铁上时，没有我的
    Apple Watch 我会感到无所适从。在这些方面，Apple Watch 是一个真正的物联网成功故事。


    在本章中，你将学习如何利用 Apple Watch，构建能够与你的 iOS 应用协同运行的应用。与第 9 章的 tvOS 项目类似，你将把第 1-4 章的
    `IOTFit` 健身应用拿来，为其添加一个 watchOS 目标，使用户能够查看过去的锻炼历史并创建新的锻炼。你将移植 iOS 应用中的运动（加速计）和位置追踪功能，以便在
    watchOS 应用中生成所有相同的数据。作为额外的好处，你还将利用 iOS 项目中的 `HealthKit` 存储，它会在用户的手表和手机之间自动同步数据。


    ## 学习目标


    在本章中，通过构建 `IOTFit` 健身追踪应用的 watchOS 版本，你将学习物联网应用开发的以下关键概念：


    - 向 iOS 项目添加 watchOS 目标

    - 在 watchOS 应用上构建基于表格的用户界面

    - 为 watchOS 应用添加 Force Touch 支持

    - 在 watchOS 上使用 Core Motion、Core Location 和 HealthKit

    - 在 watchOS 中填充表格视图


    与 tvOS 类似，watchOS 基于 iOS 的开发原则和框架提供了一个精简版的开发环境。从 watchOS 2.0 开始，苹果开始向开发者开放更多此类框架，使
    Apple Watch 应用可以在不依赖 iPhone 或互联网连接的情况下运行。虽然这最初是为了提高设备性能，但它是帮助巩固该平台在上述市场中被采纳的关键因素之一。`IOTFit`
    watchOS 应用能够在未与 iPhone 配对的情况下运行，除非用户需要在首次加载应用时启用权限。正如引言所述，应用中的所有数据都将存储在 `HealthKit`
    中，苹果会在用户的手表和其 iPhone 之间自动同步这些数据。


    与 tvOS 不同，由于 watchOS 的内存和处理能力有限，许多此类框架被精简为智能手表用例所需的核心功能。对于大多数框架来说，这表现为可用的 API
    子集更小。然而，在用户界面开发方面，代价相当显著。你将无法使用完整的 `UIView` 子类和 Auto Layout，而必须学习如何使用堆栈视图以及功能更有限的
    `WKInterface*` 类。在本章中，我将同时关注这两点，并特别注意如何让堆栈视图服务于实用的用户界面，以及如何实现基于 `WKInterfaceTable`
    的表格视图，其实现概念与 iOS 上的 `UITableView` 类有很大不同。


    本章内容主要基于第 1-4 章中的 `IOTFit` 健身应用。如果你对 Xcode 中的用户界面开发仍感生疏，我强烈建议你回顾第 1 章。如果你想复习在
    iOS 中实现位置服务和健康 API 的细节，我强烈建议你回顾第 2-4 章。

