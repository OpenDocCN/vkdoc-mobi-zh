    **代码清单 4-8** 设置 HealthKit 样本查询


    除非用户禁用了定位和计步功能，否则 iOS 始终在收集用户的健康数据。为避免查询耗时过长，我建议使用基于日期的谓词或（页面）限制来约束查询结果。你始终可以通过用户界面让用户查看更多搜索结果。另一个需要记住的重要点是，声明查询后，必须调用
    `HKHealthStore` 对象的 `execute()` 方法，查询才会开始执行。


    接下来，要在应用中使用样本查询的结果，你必须将 `HKSample` 数组转换为整个项目中一直使用的自定义 `Workout` 结构体。在代码清单 4-9
