  raw: '## Detecting When an App Returns to the Foreground


    For the final security enhancement to the IOTFit app, you will display the security
    view over the Last Run and Workout History screens when the app returns to the
    foreground from the background. If you use a password manager on a regular basis,
    you will recognize this as one of the functions it provides to prevent your information
    from being stolen after you initially unlock the app.


    If you have ever looked into the `AppDelegate.swift` file in any of your projects,
    you may have noticed `applicationDidEnterBackground()` and `applicationDidEnterForeground()`
    methods, which handle when your app enters the foreground or background. These
    are intended to give you an opportunity to start or stop background tasks, such
    as network calls or database writes, when your app’s state changes. One of the
    ways Apple saves battery power is through a scheduler that only gives apps’ background
    execution times based on when they are used most often. Unfortunately, these times
    can be unpredictable, and these methods give you a few seconds of execution time
    to prepare or wind down your app before it gets sent to the background, and all
    tasks are paused.


    For the IOTFit app, however, there are no globally running tasks or objects that
    you can pause from the app delegate. Instead, you must observe the state changes
    from the individual view controllers. To implement this, you can use iOS’s Notification
    Center to observe the `UIApplicationWillResignActive` event within the Workout
    History and Last Run view controllers. When observing notifications, whether they
    originate from system events, internal messages, or push notifications, you always
    specify the notification name and a selector (method signature), to handle the
    notification. In Listing [11-18](#346879_2_En_11_Chapter.xhtml#PC18) , I have
    updated the `WorkoutTableViewController` class to call the `showSecurityView()`
    method when the background event has been detected.


    ```

    class WorkoutTableViewController: UITableViewController {

    ...

    override func viewDidLoad() {

    super.viewDidLoad()

    ...

    setupSecurityView()

    let notificationCenter = NotificationCenter.default

    notificationCenter.addObserver(self, selector

    #selector(showSecurityView), name:

    Notification.Name.UIApplicationWillResignActive,

    object: nil)

    }

    }

    Listing 11-18

    Using a Notification Observer to Detect When the App Is Backgrounded (WorkoutTableViewController.swift)

    ```


    You should call the notification observer only once, as multiple observers will
    cause the selector to be called multiple times. In my example, I ensured it would
    be called once by adding the observer to the `viewDidLoad()` method for the view
    controller.


    When you try to compile the app, you will receive a compiler error about the `showSecurityView()`
    method being unfit as a selector. To fix this, add the `@objc` keyword before
    the function definition, as shown in Listing [11-19](#346879_2_En_11_Chapter.xhtml#PC19)
    . This is owing to the fact that selectors are a concept ported over from Objective-C,
    requiring Swift methods to be defined as compatible with Objective-C, in order
    to be used as selectors. After the modification, the app should now compile successfully.


    ```

    class WorkoutTableViewController: UITableViewController {

    ...

    @objc func showSecurityView() {

    ...

    securityView?.checkPasswordExistence()

    }

    }

    Listing 11-19

    Defining a Method As Compatible with Objective-C (WorkoutTableViewController.swift)

    ```


    If you try to run the app on your device now, after unlocking the Last Run or
    Workout History screens and backgrounding the app, when you reopen the app, the
    security view will reappear. You have now created one of the most secure workout
    applications out there. Congratulations!


    ## Summary


    In this chapter, you learned how to leverage Face ID, Touch ID, and Keychain Services
    to secure the sensitive user data in the IOTFit app. Using iOS’s `LocalAuthentication`
    framework, you were able to detect if biometrics were available to the app, modify
    the user interface accordingly, and unlock the security view, using the device’s
    biometric sensor. As a backup option, in case biometrics were unavailable or failed,
    you learned how to store a password for the app in the device’s Secure Enclave
    and how to perform add and lookup operations for this data, using Keychain Services.
    To go the extra mile, you learned how you could sidestep having to write your
    own security view, using access control for Keychain Services, and figured out
    how to lock the screens when the app was backgrounded.


    When designing this project, I took inspiration from password managers, because
    I feel the security user experience they provide is appropriate for any case in
    which user data must be protected beyond the initial lock screen for the device.
    My hope is that with the lessons in this chapter, you can now build apps that
    protect against data theft that results from simply having access to an unlocked
    device or plugging it into a computer and reading the user data on the device.


