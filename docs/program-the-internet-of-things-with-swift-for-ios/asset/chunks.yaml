    ## 从 HealthKit 读取锻炼数据


    既然你已经了解了 HealthKit 如何表示数据，以及将简单数据类型转换为 HealthKit 样本数据所需的步骤，你就可以利用这些知识从 iOS HealthKit
    存储中读取数据了。在 IOTFit 应用中，你将使用此功能来获取用户的锻炼历史。与写入数据类似，从 HealthKit 存储读取数据时使用的主要数据类型是
    `HKSample`。


    要获取数据，必须使用 `HKSampleQuery` 类在 HealthKit 存储上执行*查询*。与创建 `HKSample` 对象一样，有多个便捷初始化器可供使用，但对于
    IOTFit 应用，`HKSampleQuery(sampleType:predicate:limit:, sortDescriptors:resultsHandler)`
    是一个合适的选择。这里有很多内容需要理解，但重要的概念是必须指定要获取的样本类型、用于过滤搜索结果的*谓词*以及用于处理结果的完成处理程序。在代码清单 4-8
    中，我更新了 `loadWorkoutsFromHealthKit()` 方法，使其包含一个针对锻炼记录的查询，结果按日期降序排列（最新的在前），并限制为前一周内最新的十条记录。


