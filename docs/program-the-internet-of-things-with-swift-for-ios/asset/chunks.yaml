    方法，新增了创建 `HKWorkout` 对象的调用。我创建了 `createHKWorkout(workoutType:startDate:endDate)`
    方法来帮助将自定义的 `WorkoutType` 结构体转换为 HealthKit 的 `HKWorkoutActivityType` 类别样本类型。在尝试使用该对象之前，请使用
    `guard-let` 或 `if-let` 块验证对象是否创建成功。


