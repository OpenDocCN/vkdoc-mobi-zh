    \ Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is a Delaware corporation.\n\
    \n*Dedicated to my mother, Layla Bakir, who shared with me her love of teaching\
    \ and enduring optimism*\n\n# Introduction\n\nWelcome back to the Internet of\
    \ Things (IoT). When my original coauthors, Gheorghe Chesler and Manny de la Torriente,\
    \ and I wrote the first edition of this book in 2016, we combined what we learned\
    \ from our careers, consulting projects, and dreams to put together a narrative\
    \ we hoped would help future developers write their own IoT apps for iOS, using\
    \ Swift. Looking at the Apress web site today, it appears that more than 30,000\
    \ people have read the book through their site alone, so I am glad we were able\
    \ to reach out to at least a few readers!\n\nHowever, time marches on, and since\
    \ the publication of the first edition, Swift and the Internet of Things have\
    \ evolved considerably. Some of the technologies we originally wanted to write\
    \ about have finally become real, and others have fallen by the wayside. Most\
    \ important, Swift as a language has finally begun to stabilize, and the developer\
    \ community has been establishing a clearer set of design patterns and coding\
    \ standards that are appropriate for the language. In addition to the Swift version\
    \ from the original edition (2.0) being incompatible with modern versions of the\
    \ language, the time was right to overhaul the original book.\n\nThis edition\
    \ strikes a balance between revisiting some of the most loved content from the\
    \ first edition and presenting new concepts that were not available when the previous\
    \ edition was published. I have eliminated or streamlined concepts that fizzled\
    \ out and greatly expanded on those that have proven to be more important than\
    \ before. In particular, this book offers more coverage on building hardware projects,\
    \ as the availability of high-quality, affordable parts has expanded rapidly,\
    \ as has their ease of use. Beyond this, I noticed that, in general, more people\
    \ want to build their own hardware, and apps to go along with it.\n\nAdditionally,\
    \ I have tried to make this edition accessible to more readers. While every book\
    \ I have written has been a narrative, aimed at developers with a basic understanding\
    \ of iOS development, in this volume, I have modified the format to reflect the\
    \ feedback I received while teaching and speaking to readers. Namely, this edition\
    \ allows you to skip around more between topics and provides more detailed step-by-step\
    \ instructions. Rather than simply giving you code to copy, I try to explain what\
    \ you need to put together to accomplish each task in a project. My hope is that\
    \ this will allow you to debug problems easier and use this book beyond the initial\
    \ Swift version it was written for (Swift 4.2).\n\nWhile it would be impossible\
    \ to describe the IoT fully in one paragraph, in this book, I focus on how you\
    \ can build, interact with, and network hardware-based sensors to make your users’\
    \ lives more informed and convenient. In my home, I am able to use IoT devices\
    \ to turn off my lights with my voice, determine if I am using my appliances at\
    \ times when power is too expensive, and to figure out if I am brewing my tea\
    \ at the perfect temperature (I am, but I need to remember to get up when the\
    \ timer goes off). In this book, some of the projects you will implement will\
    \ help you to keep better track of your workouts, determine whether you have locked\
    \ your door, and show you a dashboard for your home on your Apple TV. Pretty cool\
    \ for do-it-yourself projects!\n\nFinally, remember, this book exists for you.\
    \ The ultimate goal of writing it was to help you and the developer community\
    \ gain a stronger understanding of IoT development as it relates to iOS and provide\
    \ a wealth of inspiration for your own future projects. If you would like to contribute\
    \ to making sure that the code stays up to date, please submit pull requests to\
    \ the GitHub repository for the book ([`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)).\
    \ If you have any feedback, I would be excited to hear it via Apress or my web\
    \ site ([`www.devatelier.com`](http://www.devatelier.com)). Happy hacking!\n\n\
    # Acknowledgments\n\nEvery author writes a book to tell a story, whether to entertain,\
    \ educate, or provide an experience for the reader that lies somewhere in between.\
    \ What I have learned from writing these past few years is that the process itself\
    \ also has a story. The process of writing this book had a more elaborate story\
    \ than my first two, but on this page, I’d like to thank as many people as possible\
    \ who had a part in it.\n\nFirst and foremost, I would like to thank my editors,\
    \ Jessica Vakili and Aaron Black, whose incredible patience and support allowed\
    \ me to complete this work. I truly apologize for any headaches I may have given\
    \ you, but I am really proud of what we produced together.\n\nNext, I would like\
    \ to thank my original coauthors on the first edition of this book, Gheorghe Chesler\
    \ and Manny de la Torriente. Beyond writing together, our experiences while collaborating\
    \ greatly shaped me as a developer and provided many fond memories that I still\
    \ look back on fondly today. The first edition of this book is something I will\
    \ always be proud of, especially because we produced it at a time when so much\
    \ of Swift and the Internet of Things was still up in the air!\n\nFinally, I must\
    \ thank my incredible family and friends, who have always supported me, even on\
    \ my crazy adventure of moving to Japan. They helped me realize that I was seeking\
    \ a new challenge, and they constantly encouraged me to persevere through every\
    \ part of it. Thank you, all!\n\nTo everyone I may have missed, don’t forget the\
    \ legend of Hana no Asuka-gumi, and I’ll be back again soon for our next misadventures\
    \ at the Bonaventure!\n\n## About the Author and About the Technical Reviewer\n\
    \n### About the Author\n\n### About the Technical Reviewer\n\n# Part 1: Building\
    \ Health Apps for the Internet of Things"
