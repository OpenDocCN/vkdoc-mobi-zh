    ### 使用连接检查器完成最终的故事板连接


    现在项目的类已完全定义，你可以使用 Interface Builder 进行连接。如图 1-37 所示，点击`Main.storyboard`文件，然后选择
    Create Workout View Controller 并点击连接检查器（工具面板中带圆圈的箭头图标）。


