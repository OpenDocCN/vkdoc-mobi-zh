    ## 编写 Arduino 解决方案（程序）


    现在硬件工作已完成，你可以重新回到软件领域。在 Arduino 问世之前，可重新编程的原始芯片是你开发嵌入式系统的唯一选择。你在电路中所用的零件具有固定用途，你需要仔细查阅零件说明书，弄清楚每个引脚的功能以及使用它们是否需要任何其他条件（例如电流限制或对其他零件的依赖）。


    借助 Arduino，虽然仍有部分引脚只能用于单一用途，但 GPIO 和 ADC 引脚是你的自由发挥空间。你可以编写程序将它们用作简单的输入或输出（GPIO），或更精细、精确的输入输出（ADC）。就像在
    iOS 中使用第三方库一样，你也可以下载第三方库，通过这些引脚控制更复杂的零件。在下一节中，你将学习如何编写你自己的 Arduino 解决方案（程序），利用这些可编程引脚读取磁性接近传感器（开关）和电池电量的状态，并通过发光二极管和蓝牙共享结果。


    ### 设置 Arduino 编程环境


    要开始你的 Arduino 编程体验，你必须下载免费的官方 Arduino 集成开发环境（IDE）软件。如图 5-12 所示，导航至[`www.arduino.cc`](http://www.arduino.cc)，并点击顶部的`Software`选项卡。在`Software`页面，向下滚动到`Download
