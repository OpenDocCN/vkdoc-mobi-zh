    ### 检查硬件可用性


    正如我在本章开头提到的，苹果推荐的设计模式是首先检查硬件设备是否可用，然后请求使用权限。苹果一直通过硬件特性来区分其设备，更倾向于采用功能最先进的最新设备。作为开发者，你自然希望使用这些功能，但基于设备型号做决策很快就会变得笨拙。对于许多硬件功能（包括
    iPhone 的 GPS 和摄像头），都有相应的 API 可以让你判断该功能是否可用。


    以 GPS 为例，管理其运行的框架是 Core Location。它提供了一个类方法 `CLLocationManager.locationServicesEnabled()`，你可以用该方法查询设备上定位功能的可用性。要使用这个方法，你必须在
    `CreateWorkoutViewController` 类中导入 Core Location 框架。按照代码清单 2-3 所示更新该类。


    ```swift

    import UIKit

    import CoreLocation

    class CreateWorkoutViewController: UIViewController {

    ...

    func requestLocationPermission() {

    if CLLocationManager.locationServicesEnabled() {

    NSLog("Location services are available")

    } else {

    presentEnableLocationAlert()

    }

    }

    func presentEnableLocationAlert() {

    let alert = UIAlertController(title: "Permission

    Error", message: "Please enable location services on your device", preferredStyle:
    UIAlertControllerStyle.alert)

    let okAction = UIAlertAction(title: "OK", style:

    UIAlertActionStyle.default, handler: nil)

    alert.addAction(okAction)

    self.present(alert, animated: true, completion: nil)

    }

    ...

    }

    代码清单 2-3

    为 CreateWorkoutViewController 类添加定位服务查询功能

    ```


    你会注意到，如果设备上的定位服务未全局启用（由于用户设置或硬件不可用），我添加了一个方法来显示一个警告视图。这是一个很好的方式，可以告知用户定位权限对于获得最佳应用体验至关重要。


    ### 响应定位权限状态的变化


    在确认用户的设备上 GPS 硬件可用之后，你现在可以请求 iOS 的定位权限了。同样，Core Location 框架管理此操作。然而，为了响应状态变化，你必须实例化一个负责与
    Core Location 框架交互的对象，并且必须将 `CreateWorkoutViewController` 类声明为 `CLLocationManagerDelegate`
    协议的委托。


    *协议* 是一种编程概念，允许你在两个类之间定义一个轻量级接口。这在苹果的硬件框架中非常常用，你只需要能够在目标硬件上调用一两个方法，而无需了解其实现的所有细节。实现了协议所指定函数的对象称为委托。它扮演着发起对硬件的调用并*接收*输出的角色。


    为了管理与 Core Location 框架的接口，给 `CreateWorkoutViewController` 类添加一个 `CLLocationManager`
    属性。如代码清单 2-4 所示，在声明时初始化该对象，然后在 `toggleWorkout()` 方法内部，将管理对象的 `delegate` 属性设置为
    `self`（对 `CreateWorkoutViewController` 类的引用）。这将允许该类响应来自 Core Location 框架的消息。


    ```swift

    class CreateWorkoutViewController: UIViewController {

    ...

    let locationManager = CLLocationManager()

    @IBOutlet weak var workoutTimeLabel: UILabel?

    ...

    func requestLocationPermission() {

    if CLLocationManager.locationServicesEnabled(){

    locationManager.delegate = self

    NSLog("Location services are available")

    } else {

    ...

    }

    }

    ...

    }

    代码清单 2-4

    为 CreateWorkoutViewController 类添加 CLLocationManager 属性

    ```


    Swift 编译器会标记你的代码，指出你正试图将属性赋值给一个不兼容的类。要解决这个问题，请添加 `CLLocationManagerDelegate` 协议的定义。


    在 Swift 中，我比较喜欢通过在类定义下添加扩展（extension）的方式来声明类实现了某些协议。从长远来看，这有助于保持代码清晰。扩展是一个代码块，允许你在不修改原始类本身的情况下为其添加额外的功能。一个常见的例子是，当你想扩展
    `UIColor` 类，为你应用中使用的某个苹果未定义的颜色添加一个方法时。


    `CreateWorkoutViewController` 类的扩展如代码清单 2-5 所示。处理定位权限状态更新时必须实现的协议方法是 `func locationManager:didChangeAuthorizationStatus:`。如果你之前已经请求过权限，这个委托方法会立即返回已授权的状态值。如果你之前没有请求过权限，它会在用户做出决定后返回。


    ```swift

    func requestLocationPermission() {

    if CLLocationManager.locationServicesEnabled(){

    ...

    } else {

    ...

    }

    }

    } //类定义结束

    extension CreateWorkoutViewController:

    CLLocationManagerDelegate {

    func locationManager(_ manager: CLLocationManager,

    didChangeAuthorization status: CLAuthorizationStatus) {

    NSLog("Received permission change update!")

    }

    }

    代码清单 2-5

    为 CLLocationManagerDelegate 协议添加扩展

    ```


    与锻炼状态由你定义的 `WorkoutState` 枚举管理类似，你的应用的权限状态由 Core Location 框架提供的 `CLAuthorizationStatus`
    枚举管理。可能的授权状态值及其含义列于表 2-2 中。


    表 2-2


    Core Location 授权状态

    '
- fmt: '| Value | User Action | Impact on App |

    | --- | --- | --- |

    | `notDetermined` | The user has not seen the permission pop-up for your app yet.
    | Your app cannot use any location-based features until you present the location
    permission pop-up and the user approves it. |

    | `restricted` | Due to Parental Controls or Mobile Device Management settings,
    location services are disabled on their device. | Your app cannot use any location-based
    features until the management policy changes. |

    | `denied` | The user has denied location services for your app. | Your app cannot
    use any location-based features until the user allows permission status in the
    iOS Settings app. |

    | `authorizedWhenInUse` | The user has allowed your app to use location services
    while the app is in the foreground. | Your app can access location services only
    when the app is in the foreground. |

    | `authorizedAlways` | The user has allowed your app to use location services
    in the foreground and background. | Your app can use location services while it
    is active and in the background. |


    The `didChangeAuthorizationStatus()` method will fire for all states. Similarly,
    when you check for location permission, the call you make should be different,
    based on the user’s existing authorization state. You can find out the current
    authorization state by calling the `CLLocationManager.authorizationStatus()` method.
    In Listing [2-6](#346879_2_En_2_Chapter.xhtml#PC7), I have updated the `requestLocationPermission()`
    and `didChangeAuthorizationStatus()` methods to include the new authorization
    state-based logic.


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    func requestLocationPermission() {

    if CLLocationManager.locationServicesEnabled(){

    locationManager.delegate = self

    switch(CLLocationManager.authorizationStatus()) {

    case .notDetermined:

    locationManager.requestWhenInUseAuthorization()

    case .authorizedWhenInUse :

    requestAlwaysPermission()

    case .authorizedAlways:

    startWorkout()

    default:

    presentPermissionErrorAlert()

    }

    } else {

    presentEnableLocationAlert()

    }

    }

    func requestAlwaysPermission() {

    if let isConfigured = UserDefaults.standard.value(forKey:

    "isConfigured") as? Bool, isConfigured == true {

    startWorkout()

    } else {

    locationManager.requestAlwaysAuthorization()

    }

    }

    func startWorkout() {

    currentWorkoutState = .active

    UserDefaults.standard.setValue(true, forKey:

    "isConfigured")

    UserDefaults.standard.synchronize()

    }

    func presentPermissionErrorAlert() {

    let alert = UIAlertController(title: "Permission

    Error", message: "Please enable location services

    for this app", preferredStyle:

    UIAlertControllerStyle.alert)

    let okAction = UIAlertAction(title: "OK", style:

    UIAlertActionStyle.default, handler: nil)

    alert.addAction(okAction)

    self.present(alert, animated: true, completion: nil)

    }

    ...

    }

    extension CreateWorkoutViewController :

    CLLocationManagerDelegate {

    func locationManager(_ manager:

    CLLocationManager, didChangeAuthorization

    status: CLAuthorizationStatus) {

    switch status {

    case .authorizedWhenInUse:

    requestAlwaysPermission()

    case .authorizedAlways:

    startWorkout()

    case .denied:

    presentPermissionErrorAlert()

    default:

    NSLog("Unhandled Location Manager Status:

    \(status)")

    }

    }

    Listing 2-6

    Using Authorization State to Present Location Permission and Respond to Changes
    in Authorization Status

    ```


    In the `requestLocationPermission()` method, I added a `switch` statement to direct
    the next action, based on the existing authorization status. In the case of `notDetermined`,
    I mapped this to the first time the user opened the app and called the `locationManager.requestWhenInUseAuthorization()`
    method to ask the user for in-use permission. Apple’s recommended design pattern
    is to first request `authorizedWhenInUse` permission and then `authorizedAlways`
    permission.


    Continuing through the `switch` statement, if the app has already been authorized
    for in-use permission, this is when you can request always permission. To handle
    Apple’s workflow, I wrapped the always permission request in a method. If the
    user is coming directly from the `authorizedWhenInUse` permission request, you
    should show the always permission request; otherwise, start the workout. I needed
    to go outside of Core Location and use the `UserDefaults` class to track whether
    the app has asked for permission before, as checking for `authorizedWhenInUse`
    or `denied` authorization here would cause too many false positives. The `isConfigured`
    value is set to `true` when users start their first workout.


    Finally, in the case of `authorizedAlways` permission, you can start the workout
    normally. For `denied`, I show an error alert. For all other statements, I record
    the unknown statement to the console log for assistance in later debugging.


    The `didChangeAuthorizationStatus()` method uses the same logic as the `requestLocationPermission()`
    method to handle states. If you think of the permission request like a conversation,
    the delegate method is the listener’s reply to the speaker’s question.


    To make sure everything is working, compile and run the app. When you press the
    `Start` button for the first time, you should see the alerts pictured in Figure
    [2-8](#346879_2_En_2_Chapter.xhtml#Fig8).


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig8_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Location permission alerts for IOTFit'
