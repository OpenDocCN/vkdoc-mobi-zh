    ### 生成 OpenSSL 自签名 SSL 证书


    使用 OpenSSL，您可以充当自己的信任提供者，生成满足 HTTPS 基本加密要求的 SSL 证书。这被称为*自签名证书*。由于它不是由我上述提到的受信任供应商生成的，大多数浏览器和
    iOS 最初会拒绝它，直到您执行一些步骤使其在设备上受信任，我将在您完成证书生成后对此进行说明。


    如果您曾经创建过 Apple Developer Program iOS 开发证书或推送通知证书，那么您已经熟悉生成 SSL 证书的流程（尽管交付方式不同）。在
    Apple 的模型中，您需要创建一个私钥（一个唯一的十六进制值，用作通信加密/解密的基础），使用`钥匙串访问`工具创建一个证书签名请求 (CSR) 文件，作为您申请新证书的凭证，然后将该
    CSR 文件提交给 Apple 的网站，一旦您的请求被处理，该网站将刷新并提供一个新的 SSL 证书供您下载。


    使用 OpenSSL，您可以完全控制此流程，甚至可以导入现有的私钥或将 CSR 交给其他服务。不过，对于本项目，您将充当自己的证书颁发机构 (CA)，因此您不需要外部
    CA；您只需创建一个私钥和一个证书即可。要在 OpenSSL 中通过一条命令完成此操作，请输入以下命令：


    ```

    openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout express.key -out express.crt

    ```


    上述命令指定您要创建一个基于 RSA 2048 位加密的私钥，以及一个基于该密钥的证书，该证书有效期为 365 天。与您的 iPhone 开发者证书一样，请确保保存好私钥，不要与他人分享。丢失密钥将导致无法使用该证书。分享密钥则会使他人能够破解您的加密。


    现在您已经有了有效的 SSL 证书，可以开始在 Node 应用程序中使用它了。首先，将 `https` 和 `fs`（文件系统）模块添加到您的项目中，如清单
    8-12 所示。这些模块随标准 Node.js 发行版提供，无需任何额外的安装步骤。


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var fs = require(''fs'');

    var https = require(''https'');

    var app = express();

    app.get(''/temperature'', function (req, res) {

    ...

    });

    清单 8-12

    向 Node 项目添加 https 和 fs 模块

    ```


    在本章前面部分，使用了 `app.listen(80)` 来指示 Express 监听 80 端口上的 HTTP 流量。要使用 HTTPS 替代 HTTP，您必须禁用此行代码，转而指示一个
    `https` 对象来监听流量。要初始化 `https` 对象，您需要向其提供 SSL 证书及其在 Raspberry Pi 上的私钥路径。如果您使用 Let''s
    Encrypt 生成这些文件，它们将位于 `certbot-auto` 工具输出的文件夹下。如果您使用自己的供应商生成 SSL 证书，则必须将这些文件保存到
    Raspberry Pi 上，可以通过 Pi 上的 Chromium 浏览器下载，或者配置另一个工具（如 `avahi-daemon`）来帮助您的 Mac
    通过 Bonjour 发现 Raspberry Pi。


    在确认了 SSL 证书和私钥的位置后，创建一个字典来存储文件路径，并初始化一个新的 `https` 对象，如清单 8-13 所示。


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var fs = require(''fs'');

    var https = require(''https'');

    var app = express();

    var sslOptions = {

    key: fs.readFileSync(''express.key''),

    cert: fs.readFileSync(''express.crt'')

    }

    https.createServer(sslOptions, app);

    https.listen(4443);

    //app.listen(80);

    app.get(''/temperature'', function (req, res) {

    ...

    });

    清单 8-13

    配置 Node 项目以使用 HTTPS 替代 HTTP

    ```


    与之前的 HTTP 示例类似，对于首次 HTTPS 测试，我建议监听 4443 端口上的流量，而不是 HTTPS 的保护端口 443。要测试您的 SSL 配置是否成功，请终止旧的
    Node 进程并重新加载应用程序的文件。如果加载 SSL 证书时出现问题，此时您将在终端中看到一条错误消息，类似于图 8-5 中的示例。由于这些都是成熟的技术，您可以根据这些错误消息找到大量数据，帮助您解决
    OpenSSL 和 Node HTTPS 问题。


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig5_HTML.jpg](img/346879_2_En_8_Fig5_HTML.jpg)


    图 8-5：Node HTTPS 配置失败的示例错误消息


    接下来，更改 `/temperature` 端点的 URL，使其包含端口号 4443 并将协议改为 `https`。尝试在浏览器中加载该 URL。如果您使用
    Google Chrome，您将收到一个关于该页面不安全的的安全警告，类似于我在图 8-6 中收到的警告。


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig6_HTML.jpg](img/346879_2_En_8_Fig6_HTML.jpg)


    图 8-6：Google Chrome 针对包含不受信任 SSL 证书页面的警告


    要解决此错误，请点击页面底部的“高级”链接，然后点击“继续前往…”链接，如图 8-7 所示。


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig7_HTML.jpg](img/346879_2_En_8_Fig7_HTML.jpg)


    图 8-7：在 Google Chrome 中启用对页面的信任


    在确认要加载该页面后，您现在应该能够在浏览器中看到温度 JSON 数据，就像之前通过普通 HTTP 暴露该数据时一样。


    此时，您可以安全地将应用程序改为监听 443 端口。只需记住，您需要以超级用户身份运行 Node，并且您需要在 Chrome 中信任 `:443` 端点。对于发往
    443 端口的 HTTPS 请求，您无需在 iOS 或 Web 浏览器中追加端口号。


    要让 Postman 连接到自签名证书，请点击屏幕右上角的扳手图标，如图 8-8 所示，然后将“SSL certificate verification”设置为
    OFF。


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig8_HTML.jpg](img/346879_2_En_8_Fig8_HTML.jpg)


    图 8-8：在 Postman 中信任自签名证书

