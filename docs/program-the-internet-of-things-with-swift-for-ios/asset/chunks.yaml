    ## 本章小结


    在本章中，你学习了如何在 Xcode 中执行许多关键的项目生命周期任务，这些技能将在本书后续内容及你自己的项目中反复使用。这些任务包括创建新项目、将你的 Apple
    Developer Program 账户连接到 Xcode、使用 Xcode 的重构工具、构建用户界面，以及使用 Interface Builder 将故事板连接到代码。本章包含了大量图片和分步说明，体现了使用
    Xcode 工作的可视化特性。根据我的经验，iOS 开发中的许多乐趣和挫折都来自于学习 Xcode 的工作流程。希望本章能让学习过程少一些痛苦！


    # 2. 使用 Core Location 构建健身追踪应用


    在第一章中，你学习了如何使用 Xcode 和 Interface Builder 为 IOTFit 健身应用搭建项目并创建其用户界面。然而，由于复杂的设置过程，你还没有机会通过访问手机上的
    GPS 硬件来使其成为真正的物联网（IoT）应用。在本章中，你将学习如何利用 Apple 的 Core Location 框架来向用户请求位置权限、定期接收用户位置的更新，并将这些位置标绘在地图上。


    本章将开始纠正你在 iOS 开发过程中经常听到的一个误解：该平台太难用、太不方便了。尽管这有一定道理，正如第一章中复杂的用户界面设置过程所证明的那样，但你会发现，随着你对
    Apple 开发模式越来越熟悉，学习新框架的学习曲线会显著下降。此外，你会注意到，学习新框架所需的工作量远小于自行实现所有功能所需的工作量。以 Core Location
    为例，该框架完成了发送位置请求、处理来自 GPS 硬件的数据，并通过你的应用可以处理的异步事件传递数据等艰巨工作。想象一下，如果要在截止日期前全部自己编写这些代码，那将是多么困难！


    遵循本书的迭代式学习过程，本章将重点介绍如何实现 IOTFit 应用中负责记录锻炼时长、追踪用户在锻炼过程中所经过的路径，以及在地图上显示这些位置信息的功能。

