    图 1-42：验证 Pause Workout 按钮的事件连接是否成功


    对 Toggle Workout 按钮重复此过程，一切就大功告成了！要验证一切是否按预期工作，请点击 Xcode 编辑器窗口右上角的 Run 按钮。这会编译并运行你的应用程序。默认情况下，Xcode
    会使用其默认设置（当前是 iPhone 8 Plus 模拟器）运行你的项目，但你也可以从 Run 按钮右侧的下拉菜单中将其更改为其他模拟器或已连接的设备。如图
    1-43 所示，点击 Run 按钮后，模拟器将启动并显示你的应用界面，当你点击 Toggle Workout 或 Pause Workout 按钮时，调试控制台（右下角）会显示你之前指定的日志消息。


