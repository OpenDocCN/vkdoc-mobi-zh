    As you will notice, I added a method to present an Alert View, if location services
    are not enabled globally on the device (owing to user settings or hardware unavailability).
    This is a good way to inform your users that location permissions are important
    for the best experience with your app.


    ### Responding to Changes in Location Permission Status


    Having verified that the GPS hardware is available on the user’s device, you are
    now ready to request location permission from iOS. Once again, the Core Location
    framework manages this operation. However, in order to respond to the changes,
    you must instantiate an object that takes care of the interface with the Core
    Location framework, and you have to declare the `CreateWorkoutViewController`
    class as delegate of the `CLLocationManagerDelegate` protocol.


    A *protocol* is a programming concept that allows you to define a light interface
    between two classes. These are used frequently in Apple’s hardware frameworks,
    in which you just need to be able to call one or two methods on the target hardware,
    without knowing all the details of its implementation. An object that implements
    the functions specified by a protocol is called a delegate. It plays the role
    of the object that initiates the call to the hardware and *receives* the output.


    To manage the interface to the Core Location framework, add a `CLLocationManager`
    property to the `CreateWorkoutViewController` class. As shown in Listing [2-4](#346879_2_En_2_Chapter.xhtml#PC5),
    initialize the object when you declare it and then inside the `toggleWorkout()`
    method, set the `delegate` property of the manger object to `self` (a reference
    to the `CreateWorkoutViewController` class). This will allow the class to respond
    to messages from the Core Location framework.


