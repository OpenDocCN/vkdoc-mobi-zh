- fmt: "#### Setting Up the User Interface\n\nFirst, select the `Main.storyboard`\
    \ file from the Project Navigator to open Interface Builder in the Xcode’s editor\
    \ (center) pane. As shown in Figure [4-8](#346879_2_En_4_Chapter.xhtml#Fig8),\
    \ drag and drop a Table View Controller object from the Object Library to the\
    \ storyboard.\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig8_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig8_HTML.jpg)\n\
    \nFigure 4-8 — Adding a Table View Controller to the storyboard\n\nTo attach the\
    \ Table View Controller to the Tab View Controller, hold down the Control button\
    \ on your keyboard and drag a line to the Tab View Controller. From the context\
    \ menu, select View Controllers as the relationship type, as shown in Figure [4-9](#346879_2_En_4_Chapter.xhtml#Fig9).\n\
    \n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig9_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig9_HTML.jpg)\n\
    \nFigure 4-9 — Adding new items to a Tab View Controller\n\nTo change the icon\
    \ on the Tab bar, click the Tab Bar under the Table View Controller, and in the\
    \ Attributes Inspector, select History from the System Item row, as shown in Figure\
    \ [4-10](#346879_2_En_4_Chapter.xhtml#Fig10).\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig10_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig10_HTML.jpg)\n\
    \nFigure 4-10 — Changing the icon for a Tab bar item\n\nTo make the cell match\
    \ the wireframe in Figure [4-1](#346879_2_En_4_Chapter.xhtml#Fig1), where there\
    \ are two lines of text, click the cell, and in the Attributes Inspector, set\
    \ the style to Subtitle, as shown in Figure [4-11](#346879_2_En_4_Chapter.xhtml#Fig11).\n\
    \n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig11_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11 — Changing the style of a Table View Cell\n\nFor the final layout\
    \ task, you must embed the Table View Controller in a navigation controller. This\
    \ will help the app maintain consistency between the workout history and map screens.\
    \ To perform this operation, click to select the view controller and then, from\
    \ the Editor menu, select Embed In ➤ Navigation Controller. To edit the title\
    \ of the navigation item for the Workout Table View Controller, double-click the\
    \ navigation bar above the screen and begin typing in the text field that appears.\
    \ To make the text large, enable the Prefers Large Titles option for the navigation\
    \ controller. When all of these operations are completed, your Workout Table View\
    \ Controller should be similar to the screenshot in Figure [4-12](#346879_2_En_4_Chapter.xhtml#Fig12).\n\
    \n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig12_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig12_HTML.jpg)\n\
    \nFigure 4-12 — Completed storyboard for Workout Table View Controller\n\nNow\
    \ that the layout is complete, you must modify the ownership and outlets of the\
    \ Workout Table View Controller so that it can interact with the `WorkoutTableViewController.swift`\
    \ file. Click the Table View Controller, then navigate to the Identity Inspector,\
    \ and in the Class text field, type `WorkoutTableViewController` to set the ownership\
    \ of the file, as shown in Figure [4-13](#346879_2_En_4_Chapter.xhtml#Fig13).\n\
    \n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig13_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig13_HTML.jpg)\n\
    \nFigure 4-13 — Setting ownership for the Table View Controller\n\n### Note\n\
    Setting ownership only works when a class or property is defined in your project\
    \ using a subclass based on the object library template you are trying to use\
    \ (for example, Table View Controller, Button).\n\nIn Chapters [1](#346879_2_En_1_Chapter.xhtml)\
    \ and [2](#346879_2_En_2_Chapter.xhtml), you used outlets to connect button handlers\
    \ to methods in an object’s owning class. For a Table View Controller, you must\
    \ perform a similar operation to identify the `UITableViewDataSource` and `UITableViewDelegate`\
    \ delegate objects. As shown in Figure [4-14](#346879_2_En_4_Chapter.xhtml#Fig14),\
    \ click Connections Inspector, then drag lines from the `dataSource` and `delegate`\
    \ outlets to the Workout Table View Controller.\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig14_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig14_HTML.jpg)\n\
    \nFigure 4-14 — Setting delegate outlets for the Table View Controller\n\nFor\
    \ the final connection step, you must set an identifier for the cell template\
    \ in the Workout Table View Controller. Based on this identifier, you can look\
    \ up the cell and modify its contents at runtime. As shown in Figure [4-15](#346879_2_En_4_Chapter.xhtml#Fig15),\
    \ select the cell, then navigate to the Attributes Inspector and enter a title\
    \ in the Identifier text field to set the identifier for the cell.\n\n![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig15_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15 — Setting an identifier for a Table View Cell\n\n#### Using the\
    \ `UITableViewDataSource` Protocol to Populate the Table View\n\nNow that the\
    \ Workout Table View Controller is completely laid out, you must implement the\
    \ `UITableViewDataSource` protocol methods to populate the table view. These let\
    \ you specify the number of rows, sections, titles, and editing features of the\
    \ table view, such as if you want the user to be able to rearrange cells in the\
    \ table. For the IOTFit app, the methods you must implement are focused on the\
    \ number of sections and rows in the table view. The pattern most developers use\
    \ to implement this behavior is to define a single or multidimensional array to\
    \ represent the data and extract the hierarchy of the data from there. In Listing\
    \ [4-11](#346879_2_En_4_Chapter.xhtml#PC11), I added the `workouts` property to\
    \ the `WorkoutTableViewController` class to hold the workout data and used that\
    \ to determine the values for the `numberOfSections()` and `tableView(numberOfRowsInSection:)`\
    \ delegate methods. Apple’s Table View Controller template provided empty implementations\
    \ (stubs) for these methods.\n\n```\nclass WorkoutTableViewController: UITableViewController\
    \ {\n    var workouts: [Workout]?\n\n    override func numberOfSections(in tableView:\
    \ UITableView) -> Int {\n        return 1\n    }\n\n    override func tableView(_\
    \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n     \
    \   return self.workouts?.count ?? 0\n    }\n    ...\n}\n```\n\nListing 4-11 —\
    \ Using an Array to Determine the Rows and Sections in a Table View Controller\n\
    \nAlthough you specified the number of rows and sections for the Table View Controller\
    \ in Listing [4-11](#346879_2_En_4_Chapter.xhtml#PC11), the `workouts` property\
    \ will be empty until you populate it. For this purpose, you can bring together\
    \ everything you learned so far in this chapter and use the `loadWorkoutsFromHealthKit()`\
    \ method from the Workout Data Manager to populate the `workouts` array. In Listing\
    \ [4-12](#346879_2_En_4_Chapter.xhtml#PC12), I have modified the `WorkoutTableViewController`\
    \ class to override the `viewWillAppear()` method and make the call to load the\
    \ data there. The `viewWillAppear()` method is called every time the table view\
    \ is about to be presented, such as switching from another tab in the app, and\
    \ is an appropriate place to check for updates.\n\n```\nclass WorkoutTableViewController:\
    \ UITableViewController {\n    ...\n    override func viewWillAppear(_ animated:\
    \ Bool) {\n        super.viewWillAppear(animated)\n\n        WorkoutDataManager.sharedManager.loadWorkoutsFromHealthKit\
    \ { [weak self] (fetchedWorkouts: [Workout]?) in\n            if let fetchedWorkouts\
    \ = fetchedWorkouts {\n                self?.workouts = fetchedWorkouts\n    \
    \            DispatchQueue.main.async {\n                    self?.tableView?.reloadData()\n\
    \                }\n            }\n        }\n    }\n    ...\n}\n```\n\nListing\
    \ 4-12 — Triggering Updates for the Table View Controller\n\nInside the completion\
    \ handler, I called the `reloadData()` method on the `tableView` property of the\
    \ class to force it to reload the data. Although the array is populated, the table\
    \ view will not reload the data until you ask it to."
  raw: '#### Setting Up the User Interface


    First, select the `Main.storyboard` file from the Project Navigator to open Interface
    Builder in the Xcode’s editor (center) pane. As shown in Figure [4-8](#346879_2_En_4_Chapter.xhtml#Fig8),
    drag and drop a Table View Controller object from the Object Library to the storyboard.


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig8_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Adding a Table View Controller to the storyboard


    To attach the Table View Controller to the Tab View Controller, hold down the
    Control button on your keyboard and drag a line to the Tab View Controller. From
    the context menu, select View Controllers as the relationship type, as shown in
    Figure [4-9](#346879_2_En_4_Chapter.xhtml#Fig9).


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig9_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Adding new items to a Tab View Controller


    To change the icon on the Tab bar, click the Tab Bar under the Table View Controller,
    and in the Attributes Inspector, select History from the System Item row, as shown
    in Figure [4-10](#346879_2_En_4_Chapter.xhtml#Fig10).


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig10_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Changing the icon for a Tab bar item


    To make the cell match the wireframe in Figure [4-1](#346879_2_En_4_Chapter.xhtml#Fig1),
    where there are two lines of text, click the cell, and in the Attributes Inspector,
    set the style to Subtitle, as shown in Figure [4-11](#346879_2_En_4_Chapter.xhtml#Fig11).


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig11_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Changing the style of a Table View Cell


    For the final layout task, you must embed the Table View Controller in a navigation
    controller. This will help the app maintain consistency between the workout history
    and map screens. To perform this operation, click to select the view controller
    and then, from the Editor menu, select Embed In ➤ Navigation Controller. To edit
    the title of the navigation item for the Workout Table View Controller, double-click
    the navigation bar above the screen and begin typing in the text field that appears.
    To make the text large, enable the Prefers Large Titles option for the navigation
    controller. When all of these operations are completed, your Workout Table View
    Controller should be similar to the screenshot in Figure [4-12](#346879_2_En_4_Chapter.xhtml#Fig12).


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig12_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Completed storyboard for Workout Table View Controller


    Now that the layout is complete, you must modify the ownership and outlets of
    the Workout Table View Controller so that it can interact with the `WorkoutTableViewController.swift`
    file. Click the Table View Controller, then navigate to the Identity Inspector,
    and in the Class text field, type “WorkoutTableViewController,” to set the ownership
    of the file, as shown in Figure [4-13](#346879_2_En_4_Chapter.xhtml#Fig13).


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig13_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Setting ownership for the Table View Controller


    ### Note


    Setting ownership only works when a class or property is defined in your project
    using a subclass based on the object library template you are trying to use (for
    example, Table View Controller, Button).


    In Chapters [1](#346879_2_En_1_Chapter.xhtml) and [2](#346879_2_En_2_Chapter.xhtml),
    you used outlets to connect button handlers to methods in an object’s owning class.
    For a Table View Controller, you must perform a similar operation to identify
    the `UITableViewDataSource` and `UITableViewDelegate` delegate objects. As shown
    in Figure [4-14](#346879_2_En_4_Chapter.xhtml#Fig14), click Connections Inspector,
    then drag lines from the `dataSource` and delegate outlets to the Workout Table
    View Controller.


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig14_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig14_HTML.jpg)


    Figure 4-14


    Setting delegate outlets for the Table View Controller


    For the final connection step, you must set an identifier for the cell template
    in the Workout Table View Controller. Based on this identifier, you can look up
    the cell and modify its contents at runtime. As shown in Figure [4-15](#346879_2_En_4_Chapter.xhtml#Fig15),
    select the cell, then navigate to the Attributes Inspector and enter a title in
    the Identifier text field, to set the identifier for the cell.


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig15_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig15_HTML.jpg)


    Figure 4-15


    Setting an identifier for a Table View Cell


    #### Using the UITableViewDataSource Protocol to Populate the Table View


    Now that the Workout Table View Controller is completely laid out, you must implement
    the `UITableViewDataSource` protocol methods to populate the table view. These
    let you specify the number of rows, sections, titles, and editing features of
    the table view, such as if you want the user to be able to rearrange cells in
    the table. For the IOTFit app, the methods you must implement are focused on the
    number of sections and rows in the table view. The pattern most developers use
    to implement this behavior is to define a single or multidimensional array to
    represent the data and extract the hierarchy of the data from there. In Listing
    [4-11](#346879_2_En_4_Chapter.xhtml#PC11), I added the `workouts` property to
    the `WorkoutTableViewController` class to hold the workout data and used that
    to determine the values for the `numberOfSections()` and `tableView(numberOfRowsInSection:)`
    delegate methods. Apple’s Table View Controller template provided empty implementations
    (stubs) for these methods.


    ```

    class WorkoutTableViewController: UITableViewController {

    var workouts: [Workout]?

    override func numberOfSections(in tableView:

    UITableView) -> Int {

    return 1

    }

    override func tableView(_ tableView: UITableView,

    numberOfRowsInSection section: Int) -> Int {

    return self.workouts?.count ?? 0

    }

    ...

    }

    Listing 4-11

    Using an Array to Determine the Rows and Sections in a Table View Controller

    ```


    Although you specified the number of rows and sections for the Table View Controller
    in Listing [4-11](#346879_2_En_4_Chapter.xhtml#PC11), the `workouts` property
    will be empty until you populate it. For this purpose, you can bring together
    everything you learned so far in this chapter and use the `loadWorkoutsFromHealthKit()`
    method from the Workout Data Manager to populate the `workouts` array. In Listing
    [4-12](#346879_2_En_4_Chapter.xhtml#PC12), I have modified the `WorkoutTableViewController`
    class to override the `viewWillAppear()` method and make the call to load the
    data there. The `viewWillAppear()` method is called every time the table view
    is about to be presented, such as switching from another tab in the app, and is
    an appropriate place to check for updates.


    ```

    class WorkoutTableViewController: UITableViewController {

    ...

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    WorkoutDataManager.sharedManager.loadWorkoutsFromHealthKit

    { [weak self] (fetchedWorkouts: [Workout]?) in

    if let fetchedWorkouts = fetchedWorkouts {

    self?.workouts = fetchedWorkouts

    DispatchQueue.main.async {

    self?.tableView?.reloadData()

    }

    }

    }

    }

    ...

    }

    Listing 4-12

    Triggering Updates for the Table View Controller

    ```


    Inside the completion handler, I called the `reloadData()` method on the `tableView`
    property of the class to force it to reload the data. Although the array is populated,
    the table view will not reload the data until you ask it to.'
