- fmt: "### Setting Up the Project\n\nIn the same manner as the tvOS project from\
    \ Chapter [9](#346879_2_En_9_Chapter.xhtml), in this chapter, you will implement\
    \ the watchOS version of the `IOTFit` project by adding a new target to the last\
    \ iteration of the app from Chapter [4](#346879_2_En_4_Chapter.xhtml). Begin by\
    \ copying your completed project from that chapter or downloading a fresh copy\
    \ from the official GitHub repository for this book at [`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`](https://github.com/Apress/program-internet-of-things-w-swift-for-ios).\n\
    \nWhen a watchOS target is added to an iOS project, not only will you be able\
    \ to share code with the iOS app, but the watchOS target will be tagged as an\
    \ Apple Watch version on the App Store. As shown in Figure [10-1](#346879_2_En_10_Chapter.xhtml#Fig1),\
    \ when a watchOS version is available for an iOS app in the App Store, users are\
    \ provided with a link on the App Store description page that shows them information\
    \ on the watchOS version and the option to automatically install it, along with\
    \ the iOS version.\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig1_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1** App Store description page for an iOS app that offers a watchOS\
    \ version\n\nAfter you have prepared a copy of the original project, go to the\
    \ `File` menu and select **New ➤ Target**, just as you did in Chapter [9](#346879_2_En_9_Chapter.xhtml)\
    \ for the tvOS target. From the template picker pop-up window, select **WatchKit\
    \ App**, as shown in Figure [10-2](#346879_2_En_10_Chapter.xhtml#Fig2).\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig2_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig2_HTML.jpg)\n\
    \n**Figure 10-2** Selecting a WatchKit app template\n\nWhen asked to configure\
    \ the target, name it `IOTFitWatch`. As shown in Figure [10-3](#346879_2_En_10_Chapter.xhtml#Fig3),\
    \ confirm that the product is set to build against the credentials for your developer\
    \ account and that the **Include Notification Scene** and **Include Complication**\
    \ check boxes are not selected. For the scope of this project, you do not have\
    \ to enable either option.\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig3_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig3_HTML.jpg)\n\
    \n**Figure 10-3** Configuring the watchOS target\n\nThe first time you add a watchOS\
    \ target to a project, you will be asked to activate its target, as shown in Figure\
    \ [10-4](#346879_2_En_10_Chapter.xhtml#Fig4). Select **Activate**, to dismiss\
    \ the pop-up, and continue with the setup process.\n\n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig4_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig4_HTML.jpg)\n\
    \n**Figure 10-4** Activating the scheme for the watchOS app\n\nAfter you have\
    \ finished setting up the target, your project should now include two new folders,\
    \ `IOTFitWatch` and `IOTFitWatch Extension`, as indicated in Figure [10-5](#346879_2_En_10_Chapter.xhtml#Fig5).\n\
    \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig5_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig5_HTML.jpg)\n\
    \n**Figure 10-5** `IOTFit` project after including the watchOS target\n\nSince\
    \ watchOS 1.0, Apple has split watchOS apps into two parts: an app containing\
    \ the static resources only (storyboards, assets) and an extension containing\
    \ the code. In watchOS 1.0, Apple did not expose the watchOS frameworks on the\
    \ watch hardware, and the extension was used by the iOS app to update the views\
    \ that were specified by the WatchKit app component. Today, both pieces run on\
    \ the watch hardware, but this logic separation pattern is still preserved by\
    \ Apple.\n\nNext, you must set the descriptions for the permission-restricted\
    \ features the watchOS app will have to use: user location, HealthKit, and Core\
    \ Motion. The easiest way to do this is to copy the Privacy description key-value\
    \ pairs from the iOS project’s `Info.plist` file into the `Info.plist` file in\
    \ the `IOTFitWatch Extension` folder. The key-value pairs you need to copy are\
    \ provided as source code in Listing [10-1](#346879_2_En_10_Chapter.xhtml#PC1).\
    \ You can use the **Open As ➤ Source Code** secondary-click (right-click) option\
    \ for the `Info.plist` file, to copy them into the file as text, or you can look\
    \ for the `Privacy...` key-value pairs in the Property List Inspector and add\
    \ them manually.\n\n```\nWKCompanionAppBundleIdentifier\ncom.devAtelier.IOTFit\n\
    ...\nNSHealthShareUsageDescription\nIOTFit would like to use HealthKit permission\
    \ to\nimport workout data \nNSHealthUpdateUsageDescription\nIOTFit would like\
    \ to use HealthKit permission to\nexport workout data to the Health app. \nNSLocationAlwaysAndWhenInUseUsageDescription\n\
    IOTFit would like to use location permission to plot your location during workouts.\
    \ \nNSLocationAlwaysUsageDescription\nIOTFit would like to use location permission\
    \ to\nplot your location during workouts. \nNSLocationUsageDescription\nIOTFit\
    \ would like to use location permission to\nplot your location during workouts.\
    \ \nNSLocationWhenInUseUsageDescription\nIOTFit would like to use location permission\
    \ to\nplot your location during workouts.string>\nNSMotionUsageDescription\nIOTFit\
    \ would like to use motion permission to\nhelp you measure the step count and\
    \ altitude of your\nworkouts.\n```\n\n**Listing 10-1** Privacy Permission Description\
    \ Key-Value Pairs for the `IOTFitWatch` Extension `Info.plist` File\n\nFor the\
    \ final step in the setup process, you must enable background modes for the WatchKit\
    \ App, in order to track the user’s location. As shown in Figure [10-6](#346879_2_En_10_Chapter.xhtml#Fig6),\
    \ select the `IOTFit` project file at the top of the Project Navigator, then navigate\
    \ to the `IOTFitWatch Extension` target and click the **Capabilities** tab. In\
    \ the Capabilities detail screen, enable **Background Modes** and **Workout Processing**.\n\
    \n![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig6_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6** Enabling Background Modes for the `IOTFitWatch` app"
