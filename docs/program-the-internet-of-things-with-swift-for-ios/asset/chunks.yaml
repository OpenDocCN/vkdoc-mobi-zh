- fmt: '# A Quick Introduction to how Express Works


    Express works by listening for HTTP requests on a port, then responding to them,
    based on the *end point* that is specified. End points are defined as functions
    that are available to consumers of your API, made up of a *route*, the path component
    appended to the server’s address and the HTTP method that is used to make the
    request (for example, `GET`, `POST`). Throughout web application development,
    you will see these two terms used interchangeably. To reduce confusion, I think
    the clearest explanation is that *end point* is primarily used as a term to describe
    external (client-facing) interactions with your server, and *route* is used primarily
    to describe the internal logic of your Express application.


    For example, if you wanted to get a list of movie titles from a server with the
    IP address `10.0.1.5`, the request would be `GET 10.0.1.5/movie/titles`. The `GET`
    method is frequently used for reading data. In this example, the route is `/movie/titles`
    and `GET` is the end point. In Express, the code for this end point would be look
    like this:


    ```

    app.get(''/movie/titles'', function (req, res) { ... }

    ```


    Creating a record for a new movie, on the other hand, may look something like
    this: `POST 10.0.1.5/movie/new`. The `POST` method is often used to add a new
    record. In database programming, the term *CRUD* is used to describe the four
    major operations for any type of data: create, read, update, and delete. Many
    back-end developers like to use this same model for naming their routes, and they
    will append `/new`, `/delete`, or `/update` to a route, to indicate it is a create,
    update, or delete operation. In Express, the code for this end point would be


    ```

    app.post(''/movie/now'', function (req, res) { ... }

    ```


    As you can tell, the method called on the `app` object changed, as well as the
    string for the route.


    Finally, two of the other most frequently used `HTTP` methods are `PUT` and `DELETE`,
    which are used to update and delete records. You will not use them in this chapter,
    but they may be helpful to you in your own projects in the future.


    By default, when you load a web page in a browser, it will try to make a `GET`
    request to the document root of the server on TCP port 80 (the port reserved for
    HTTP traffic). To represent this in Express, use the `get()` method on your object,
    to specify the code that should execute for the root directory. To make Express
    listen for requests, use the `listen()` method on the `app` object. The implementation
    for both the route and listener is shown in Listing [8-3](#346879_2_En_8_Chapter.xhtml#PC7).


    ```

    var express = require(''express'');

    var app = express();

    app.get(''/'', function (req, res) {

    res.send(''Hello World'');

    });

    app.listen(3000);

    Listing 8-3

    Creating a New Express-Based Node Application

    ```


    In this example, I instructed Node to send the text, `Hello World`, upon receiving
    a `GET` request for the document root. The `res` object is built into Node and
    specifies that you want to pipe output as an HTTP response. In this example, I
    asked Express to listen on port 3000 instead of the standard HTTP port 80, because
    Node considers port 80 a *privileged* port. Unless you are logged in to a root
    or system user account, you are not able to run applications from this port. Later
    in this section, you will switch to port 80, but for initial testing, it is best
    to use a non-privileged port.


    To verify that the Express application is working, you must tell Node to start
    executing the new script, then try to make the request from a web browser.


    Before starting the server, you must get the IP address for the Raspberry Pi.
    Inside the terminal, use the `ifconfig` command to view the information for your
    device. As shown in Figure [8-1](#346879_2_En_8_Chapter.xhtml#Fig1), the IP address
    will appear next to the `inet` field, under the record for the `wlan0` interface
    (representing the built-in Wi-Fi interface).


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig1_HTML.jpg](images/346879_2_En_8_Chapter/346879_2_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Getting the IP address for a Raspberry Pi


    Next, begin execution of the Node application, by calling the `node` command with
    your script’s file name.


    ```

    node app.js

    ```


    Finally, open your favorite browser on another computer in your network and type
    in the URL for the Raspberry Pi, with the port number (3000) appended to it. Your
    `"Hello World"` string should appear as plain text in the browser, as shown in
    Figure [8-2](#346879_2_En_8_Chapter.xhtml#Fig2).


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig2_HTML.jpg](images/346879_2_En_8_Chapter/346879_2_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Verifying the Hello World example in a browser


    Congratulations on creating your first Node application! It will keep executing
    until you kill the Node process on your Raspberry Pi.'
