- fmt: '### Caution


    The Arduino development team does an excellent job of ensuring near-identical
    usability on the OS X, Windows, and Linux versions of the IDE; however, the instructions
    in this book require command-line instructions that were tested on the OS X and
    Linux versions only.


    When the download is complete, double-click the zip file to extract it. Drag and
    drop the Arduino binary file to your Applications folder, as shown in Figure [5-13](#346879_2_En_5_Chapter.xhtml#Fig13).


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig13_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig13_HTML.jpg)


    **Figure 5-13** Installing the Arduino IDE


    Next, click the Arduino icon from the Applications folder to open the IDE. You
    will be greeted with a text editor containing the stub functions for a new program,
    as shown in Figure [5-14](#346879_2_En_5_Chapter.xhtml#Fig14). As with any IDE,
    there are compile and run buttons in the top-left corner of the screen. Compile
    is represented by the button with the check mark, and Run is represented by the
    right-pointing arrow.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig14_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig14_HTML.jpg)


    **Figure 5-14** Default display for the Arduino IDE


    Before you can use the HUZZAH32 with the Arduino IDE, you must run a configuration
    script provided by the manufacturer of the SoC it is based on, the ESP32, manufactured
    by Espressif. The SoC provides the core functions of Arduino compatibility and
    pinmapping. Manufacturers such as Adafruit can then choose what features they
    want to use and how to package them. To install the build scripts, you must check
    them out via `git`. If you have installed the Xcode command-line tools in the
    past, the `git` version control software will already be installed on your computer.
    If have not, you can install the tools by opening up the terminal and then typing
    in the following command:


    ```

    xcode-select --install

    ```


    To run the ESP32 installation script, first close the Arduino IDE, then open a
    terminal window. Inside the terminal window, enter the command in Listing [5-1](#346879_2_En_5_Chapter.xhtml#PC2).
    It will create a new directory, check out the code from `git`, and run the installation
    script.


    ```

    mkdir -p ~/arduino && \

    cd ~/arduino && \

    git clone https://github.com/espressif/arduino-esp32.git esp32 && \

    cd esp32 && \

    git submodule update --init --recursive && \

    cd tools && \

    python get.py

    ```


    **Listing 5-1** Command-Line Instructions to Add ESP32 Support to the Arduino
    IDE


    If the script ran successfully, the last line of the output should contain "`Done!`"


    Now that you have added ESP32 support to the Arduino, you must select the HUZZAH32
    as the target device. First, reopen the Arduino IDE, then navigate to the Tools
    menu. As shown in Figure [5-15](#346879_2_En_5_Chapter.xhtml#Fig15), select the
    Board: … menu item and scroll down until you find ESP32 Feather.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig15_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig15_HTML.jpg)


    **Figure 5-15** Selecting target hardware within the Arduino IDE


    Next, you have to select your computer’s USB port as the interface for debugging.
    Navigate to the Tools menu once more and then select `/dev/cu.SLAB_USBtoUART`
    as the port, as shown in Figure [5-16](#346879_2_En_5_Chapter.xhtml#Fig16). For
    consistency’s sake, also confirm that the Flash Frequency is set to 80Hz and that
    the Upload Speed is set to 921600, while you are in the Tools menu.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig16_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig16_HTML.jpg)


    **Figure 5-16** Selecting the USB port for debugging


    Finally, to verify that the Arduino IDE is able to communicate with the HUZZAH32,
    go to the Tools menu and select Get Board Info. If the connection was established
    successfully, you will be presented with a dialog similar to the one in Figure
    [5-17](#346879_2_En_5_Chapter.xhtml#Fig17), listing unique identifier values for
    your microcontroller.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig17_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig17_HTML.jpg)


