- fmt: "### Connecting to the OpenWeatherMap API\n\nWith the user interface, network\
    \ functionality, and user location in place, you are almost ready to start using\
    \ OpenWeatherMap’s public weather database, to add outside weather information\
    \ to the IOTHomeTV app. For the final piece in the setup puzzle, you must request\
    \ an API key from OpenWeatherMap.org. Many services that allow others to use their\
    \ data through a web API often require an API key to authenticate requests or\
    \ enforce data access, according to membership level. For example, OpenWeatherMap.org\
    \ allows up to 60 requests a minute on a free account, but anything above this\
    \ requires a paying membership. As shown in Figure 9-15, to request a free account,\
    \ navigate to [`www.openweathermap.org`](http://www.openweathermap.org) in your\
    \ browser, then click the Sign Up link.\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig15_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig15_HTML.jpg)\n\
    \n**Figure 9-15** Creating an account on OpenWeatherMap.org\n\nAfter you have\
    \ completed creating your account, you will be redirected to the API keys page,\
    \ pictured in Figure 9-16, which lists all of the OpenWeatherMap API keys available\
    \ to you. Make a note of the Default key and do not share it with others, or you\
    \ may risk losing access to your account.\n\n![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig16_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig16_HTML.jpg)\n\
    \n**Figure 9-16** OpenWeatherMap.org API keys page\n\nNow that you have an OpenWeatherMap\
    \ API key and the user’s current location, you can begin using the service to\
    \ fetch weather data. To populate the weather fields on the app, you will use\
    \ two end points from OpenWeatherMap: `/weather` (for current weather conditions)\
    \ and `/forecast` (for the three-day forecast). Looking at the documentation for\
    \ the `/weather` end point ( [`https://openweathermap.org/current`](https://openweathermap.org/current)\
    \ ), you will notice that you can use URL parameters to call the end point with\
    \ geographic coordinates. URL parameters are a way of passing values to an end\
    \ point by appending them to the end of the URL. For the coordinate (35.730534,\
