    saveToPlist()

    }

    func getLastWorkout() -> [CLLocationCoordinate2D]? {

    guard let workouts = workouts, let lastWorkout =

    workouts.last else {

    return nil

    }

    let locations = lastWorkout.locations.map{(value:

    Coordinate) in

    return CLLocationCoordinate2D(latitude:

    value.latitude, longitude: value.longitude)

    }

    return locations

    }

    }

    Listing 2-21

    Using the map() Method to Serialize Data in the saveWorkout() and getLastWorkout()
    Methods

    ```


    Just as with a callback handler or block, the logic in `map()` that must occur
    on each item is defined as an anonymous function. To help make it easier to read,
    I gave a label to the iterated value. This completes the Workout Data Manager;
    now you can use it to display saved locations on a map!


    ## Displaying Saved Locations on a Map


    Of all the capabilities you will learn in this chapter, mapping the data is the
    easiest. To map the data, you must retrieve the data from the Workout Location
    Manager, add pins showing the starting and ending points of the workout, and draw
    a path between them. For the data retrieval operation, you will use the `getLastWorkout:`
    method from the previous exercise. To draw the pinpoints and path, you can use
    MapKit’s built-in annotation (`MKPointAnnotation`) and polyline (`MKPolylineRenderer`)
    APIs.


    Creating a pinpoint (*annotation* in Apple’s terminology) is straightforward.
    All you have to do is initialize an `MKPointAnnotation` object with a `CLLocationCoordinate2D`
    object and assign a title to the annotation. Displaying the annotations is even
    easier. Just call the `showAnnotations:` method on the Map View. It will automatically
    zoom in to fit these annotations on your map. In Listing [2-22](#346879_2_En_2_Chapter.xhtml#PC23),
    I have added the logic to generate these annotations in the `viewWillAppear:`
    method of the `WorkoutMapViewController` class. This is called whenever the Map
    tab is displayed.


    ```

    import MapKit

    class WorkoutMapViewController: UIViewController {

    @IBOutlet weak var mapView: MKMapView?

    ...

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    guard var locations =

    WorkoutDataManager.sharedManager.getLastWorkout(),

    let first = locations.first,

    let last = locations.last else {

    return

    }

    let startPin = workoutAnnotation(title: "Start",

    coordinate: first)

    let finishPin = workoutAnnotation(title: "Finish",

    coordinate: last)

    if let oldAnnotations = mapView?.annotations {

    mapView?.removeAnnotations(oldAnnotations)

    }

    mapView?.showAnnotations([startPin, finishPin],

    animated: true)

    }

    func workoutAnnotation(title: String, coordinate:

    CLLocationCoordinate2D) -> MKPointAnnotation {

    let annotation = MKPointAnnotation()

    annotation.coordinate = coordinate

    annotation.title = title

    return annotation

    }

    }

    Listing 2-22

    Generating and Displaying Annotations on a Map View

    ```


    An important point worth mentioning about Listing [2-22](#346879_2_En_2_Chapter.xhtml#PC23)
    is that you must call the `removeAnnotations:` method to clear old annotations
    before displaying new ones. This is a shortcoming in MapKit’s implementation,
    but it’s not too hard to overcome.


    Drawing a path is also straightforward but requires you to declare the `WorkoutMapViewController`
    as implementing the `MKMapViewDelegate` protocol. To draw the path, you simply
    create an `MKPolyline` object, based on the complete set of saved locations, and
    apply it as an overlay on the map. To define the shape of the path, you have to
    implement the `mapView:rendererFor:overlay:` method from the `MKMapViewDelegate`
    protocol. However, the details of implementation are quite simple. This method
    simply specifies the color, size, and other display properties of the line. In
    Listing [2-23](#346879_2_En_2_Chapter.xhtml#PC24), I have updated the `WorkoutMapViewController`
    class to include the protocol implementation and call for drawing the polyline.
    As with the `CreateWorkoutViewController` class, I implemented the protocol through
    an extension, to improve readability.


    ```

    class WorkoutMapViewController: UIViewController {

    @IBOutlet weak var mapView: MKMapView?

    override func viewDidLoad() {

    super.viewDidLoad()

    mapView?.delegate = self

    }

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    guard var locations =

    WorkoutDataManager.sharedManager.getLastWorkout(), let first = locations.first,
    let last = locations.last else {

    return

    }

    ...

    let workoutRoute = MKPolyline(coordinates:

    &locations, count: locations.count)

    mapView?.addOverlays([workoutRoute])

    }

    ...

    }

    extension WorkoutMapViewController: MKMapViewDelegate {

    func mapView(_ mapView: MKMapView, rendererFor overlay:

    MKOverlay) -> MKOverlayRenderer {

    let pathRenderer = MKPolylineRenderer(overlay: overlay)

    pathRenderer.strokeColor = UIColor.red

    pathRenderer.lineWidth = 3

    return pathRenderer

    }

    }

    Listing 2-23

    Generating and Displaying a Path on a Map View

    ```


    This completes the map portion of the IOTFit app! After saving your first workout,
    when you press the Map tab, you will see two pinpoints indicating the start and
    end points of your workout, as well as a red line between them, similar to the
    screenshot in Figure [2-12](#346879_2_En_2_Chapter.xhtml#Fig12).


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig12_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig12_HTML.jpg)


    Figure 2-12


    IOTFit app with completed workout in Workout Map screen


    ## Summary


    In this chapter, you took the user interface skeleton of the IOTFit app from the
    first chapter and fleshed it out by adding location permissions, workout distance
    calculation, and the ability to display the locations on a map. Along the way,
    you learned that when accessing sensitive permissions on a user’s device, Apple
    makes you jump through a lot of hoops in project setup and make the calls to display
    the request to the user. You also learned how protocols can help you implement
    callbacks from Apple’s hardware frameworks and even define how to draw paths on
    a map. These concepts will keep coming back as you progress through this book
    and IoT app development.'
  trans: '


    创建和更新锻炼位置非常简单；然而，对于保存和检索操作，您需要将这些位置与`Coordinate`对象进行相互转换。与其创建`for-loop`来遍历所有项目，从
    Swift 3.0 开始，您可以使用`map()`高阶函数来定义一个要应用于集合中每个项目的操作（例如，为数组中的每个项目加 3）。对于`WorkoutDataManager`，您可以使用`map()`将每个项目与`Coordinate`数据类型进行相互转换。在**清单
    2-21**中，我向`WorkoutDataManager`类添加了`saveWorkout()`和`getLastWorkout()`方法，实现了此逻辑。


    ```

    class WorkoutDataManager {

    ...

    func saveWorkout(duration: TimeInterval) {

    guard let activeLocations = activeLocations else {

    return

    }

    let mappedCoordinates = activeLocations.map{(value:

    CLLocationCoordinate2D) in

    return Coordinate(latitude: value.latitude,

    longitude: value.longitude)

    }

    let currentWorkout = Workout(endTime: Date(), duration:

    duration, locations: mappedCoordinates)

    workouts?.append(currentWorkout)

    saveToPlist()

    }

    func getLastWorkout() -> [CLLocationCoordinate2D]? {

    guard let workouts = workouts, let lastWorkout =

    workouts.last else {

    return nil

    }

    let locations = lastWorkout.locations.map{(value:

    Coordinate) in

    return CLLocationCoordinate2D(latitude:

    value.latitude, longitude: value.longitude)

    }

    return locations

    }

    }

    Listing 2-21

    Using the map() Method to Serialize Data in the saveWorkout() and getLastWorkout()
    Methods

    ```


    就像回调处理程序或块一样，`map()`中对每个项目执行的逻辑被定义为一个匿名函数。为了便于阅读，我给迭代的值添加了一个标签。至此，`WorkoutDataManager`就完成了；现在您可以使用它在地图上显示已保存的位置！


    ## 在地图上显示已保存的位置


    在本章中您将学到的所有功能中，映射数据是最简单的。要映射数据，您必须从`WorkoutLocationManager`中检索数据，添加显示锻炼起点和终点的图钉，并在它们之间绘制一条路径。对于数据检索操作，您将使用上一个练习中的`getLastWorkout:`方法。要绘制图钉和路径，您可以使用
    MapKit 的内置标注（`MKPointAnnotation`）和折线（`MKPolylineRenderer`）API。


    创建一个图钉（用 Apple 的术语来说是*标注*）很简单。您所需要做的就是用一个`CLLocationCoordinate2D`对象初始化一个`MKPointAnnotation`对象，并为该标注分配一个标题。显示标注甚至更简单。只需在
    Map View 上调用`showAnnotations:`方法即可。它会自动缩放以适应地图上的这些标注。在**清单 2-22**中，我在`WorkoutMapViewController`类的`viewWillAppear:`方法中添加了生成这些标注的逻辑。每当显示
    Map 选项卡时，都会调用此方法。


    ```

    import MapKit

    class WorkoutMapViewController: UIViewController {

    @IBOutlet weak var mapView: MKMapView?

    ...

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    guard var locations =

    WorkoutDataManager.sharedManager.getLastWorkout(),

    let first = locations.first,

    let last = locations.last else {

    return

    }

    let startPin = workoutAnnotation(title: "Start",

    coordinate: first)

    let finishPin = workoutAnnotation(title: "Finish",

    coordinate: last)

    if let oldAnnotations = mapView?.annotations {

    mapView?.removeAnnotations(oldAnnotations)

    }

    mapView?.showAnnotations([startPin, finishPin],

    animated: true)

    }

    func workoutAnnotation(title: String, coordinate:

    CLLocationCoordinate2D) -> MKPointAnnotation {

    let annotation = MKPointAnnotation()

    annotation.coordinate = coordinate

    annotation.title = title

    return annotation

    }

    }

    Listing 2-22

    Generating and Displaying Annotations on a Map View

    ```


    关于**清单 2-22**值得注意的一点是，在显示新标注之前，您必须调用`removeAnnotations:`方法来清除旧标注。这是 MapKit 实现中的一个缺点，但克服起来并不难。


    绘制路径也很简单，但需要您将`WorkoutMapViewController`声明为实现`MKMapViewDelegate`协议。要绘制路径，您只需根据完整的已保存位置集合创建一个`MKPolyline`对象，并将其作为覆盖层应用到地图上。要定义路径的形状，您必须实现`MKMapViewDelegate`协议中的`mapView:rendererFor:overlay:`方法。然而，实现的细节非常简单。此方法仅指定线条的颜色、大小和其他显示属性。在**清单
    2-23**中，我更新了`WorkoutMapViewController`类，使其包含协议实现并调用以绘制折线。与`CreateWorkoutViewController`类一样，我通过扩展来实现协议，以提高可读性。


    ```

    class WorkoutMapViewController: UIViewController {

    @IBOutlet weak var mapView: MKMapView?

    override func viewDidLoad() {

    super.viewDidLoad()

    mapView?.delegate = self

    }

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    guard var locations =

    WorkoutDataManager.sharedManager.getLastWorkout(), let first = locations.first,
    let last = locations.last else {

    return

    }

    ...

    let workoutRoute = MKPolyline(coordinates:

    &locations, count: locations.count)

    mapView?.addOverlays([workoutRoute])

    }

    ...

    }

    extension WorkoutMapViewController: MKMapViewDelegate {

    func mapView(_ mapView: MKMapView, rendererFor overlay:

    MKOverlay) -> MKOverlayRenderer {

    let pathRenderer = MKPolylineRenderer(overlay: overlay)

    pathRenderer.strokeColor = UIColor.red

    pathRenderer.lineWidth = 3

    return pathRenderer

    }

    }

    Listing 2-23

    Generating and Displaying a Path on a Map View

    ```


    至此，IOTFit 应用的地图部分就完成了！保存您的第一次锻炼后，当您按下 Map 选项卡时，您会看到两个图钉指示锻炼的起点和终点，以及它们之间的一条红线，类似于**图
    2-12**中的截图。


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig12_HTML.jpg](img/346879_2_En_2_Fig12_HTML.jpg)


    Figure 2-12


    IOTFit app with completed workout in Workout Map screen


    ## 总结


    在本章中，您采用了第一章中 IOTFit 应用的用户界面骨架，并通过添加位置权限、锻炼距离计算以及在地图上显示位置的能力对其进行了充实。在此过程中，您了解到当访问用户设备上的敏感权限时，Apple
    会让您在项目设置中经历很多步骤，并调用以向用户显示请求。您还学习了协议如何帮助您实现来自 Apple 硬件框架的回调，甚至定义如何在地图上绘制路径。随着您继续阅读本书并进行物联网应用开发，这些概念将不断出现。


