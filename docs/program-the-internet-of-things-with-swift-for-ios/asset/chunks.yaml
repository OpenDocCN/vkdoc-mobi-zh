- fmt: '### Using Font Awesome for Font-Based Graphics


    For the final piece of the user interface puzzle, you must add graphics to the
    application. Instead of importing graphics files directly, for this section, I
    would like to introduce a very popular font-based alternative, Font Awesome, and
    its Swift implementation, FontAwesome.swift. Font Awesome is a font file that
    provides a massive collection of icons. It is a popular choice in web development
    for helping reduce page size and the amount of work you have to hire a graphic
    designer for. On iOS, it provides the same benefits, in addition to allowing you
    to remove the burden of managing and scaling images yourself. The implementation
    you will use in this section, FontAwesome.swift, allows you to create `UIImage`
    objects based on the font, making its use exactly the same as if you were using
    graphics from an Assets Catalog or other source.


    To get started, download or clone the repository for FontAwesome.swift from its
    GitHub page: [`https://github.com/thii/FontAwesome.swift`](https://github.com/thii/FontAwesome.swift).
    Next, copy all of the files in the archive’s `FontAwesome` folder to your project,
    except for the `Info.plist` file. You can perform this operation by using the
    Add Files to IOTHome option in the File menu. As shown in Figure [9-10](#346879_2_En_9_Chapter.xhtml#Fig10),
    when the file section pop-up window appears, select `IOTHome` and `IOTHomeTV`
    as the targets to include the files in both the iOS and tvOS apps. Make sure you
    also select Copy Items If Needed, to copy the files to add a copy of the files
    to the project.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig10_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Importing the files for FontAwesome.swift into the IOTHome project


    After the files for FontAwesome.swift have been added to your project, select
    all of them, then secondary-click (right-click), to present the context menu.
    Select New Group from Selection, to place all of the files in a single folder
    in your project. Your Xcode Project Navigator should now resemble my example in
    Figure [9-11](#346879_2_En_9_Chapter.xhtml#Fig11).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig11_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig11_HTML.jpg)


    Figure 9-11


    Project Navigator after adding FontAwesome.swift to the project


    Finally, to use the library, you must create `UIImage` objects based on icons
    available in the font. Rather than pure Unicode Hex codes alone, Font Awesome
    provides names for each icon. To discover what icons are available, and their
    names, I like to use the official search tool for the font, available at: [`https://fontawesome.com/icons?d=gallery&m=free`](https://fontawesome.com/icons?d=gallery%2526m=free).
    To start the project off, use `lock` for the lock graphic and `sun` for the sunny
    weather graphic.


    To create the graphic, you can use FontAwesome.swift’s extension for the `UIImage`
    class, `UIImage.fontAwesome(name:style:textColor:size:)`. As the name suggests,
    you have to call the API using the icon’s name, display style, a tint color, and
    the size. In Listing [9-5](#346879_2_En_9_Chapter.xhtml#PC5), I have added these
    calls to the `ViewController` class.


    ```

    class ViewController: UIViewController {

    ...

    override func viewDidLoad() {

    super.viewDidLoad()

    applyEffects(to: [forecastView, indoorView,

    outdoorView, lockView], cornerRadius: 20)

    addFontAwesomeImage(to: lockImageView, name: .lock)

    addFontAwesomeImage(to: firstDayImageView, name: .sun)

    addFontAwesomeImage(to: secondDayImageView, name:

    .sun)

    addFontAwesomeImage(to: thirdDayImageView, name: .sun)

    }

    func addFontAwesomeImage(to imageView: UIImageView?,

    name:     FontAwesome)  {

    guard let imageView = imageView else { return }

    imageView.image = UIImage.fontAwesomeIcon(name: name,

    style: .solid,

    textColor: UIColor.black,

    size: imageView.bounds.size)

    }

    }

    Listing 9-5

    Adding FontAwesome–Based Images to Image Views

    ```


    After adding the image views, running the application in the Apple TV simulator
    should provide output resembling that in the screenshot in Figure [9-12](#346879_2_En_9_Chapter.xhtml#Fig12).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig12_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig12_HTML.jpg)


    Figure 9-12


    IOTHomeTV with Font Awesome images


    ## Adding Data Sources to the tvOS App


    Now that the user interface for the IOTHomeTV app is ready, you can begin integrating
    its data sources and populating it with real data from the IOTHome sensors you
    built in Chapters [5](#346879_2_En_5_Chapter.xhtml)–[7](#346879_2_En_7_Chapter.xhtml)
    and OpenWeatherMap.org. Although you can connect directly to Bluetooth devices
    from an Apple TV, for this system, it is more efficient and reliable to take advantage
    of the heavy lifting on the web server. In addition to being able to use a consistent
    interface, removing the need to add additional clients will free up the sensors
    to accept more connections.


    At the beginning of the chapter, you were able to verify that the network client
    code from Chapter [8](#346879_2_En_8_Chapter.xhtml) compiles without issue on
    tvOS. To integrate the client, you simply have to call it from the IOTHomeTV app.
    In Listing [9-6](#346879_2_En_9_Chapter.xhtml#PC6), I began this integration by
    using the `NetworkManager` class to request the indoor climate data from the sensor
    on the Raspberry Pi.


    ```

    class ViewController: UIViewController {

    ...

    override func viewDidLoad() {

    super.viewDidLoad()

    applyEffects(to: [forecastView, indoorView,

    outdoorView, lockView], cornerRadius: 20)

    ...

    fetchNetworkData()

    }

    ...

    func fetchNetworkData() {

    NetworkManager.shared.getTemperature { [weak self]

    (resultDict: [String: Any]) in

    if let error = resultDict["error"] as? String {

    self?.tipLabel?.text = "Error: \(error)"

    } else {

    DispatchQueue.main.async {

    if let temperature =

    resultDict["temperature"] as? String {

    self?.indoorTempLabel?.text =

    "\(temperature) C"

    }

    if let humidity = resultDict["humidity"]

    as? String {

    self?.indoorHumidityLabel?.text =

    "Humidity \(humidity)%"

    }

    }

    }

    }

    }

    }

    Listing 9-6

    Fetching Temperature Data from the IOTHome Web Server in the tvOS App

    ```


    Looking back at Chapter [8](#346879_2_En_8_Chapter.xhtml), you will remember that
    the Network Manager is responsible for managing the address of the server, using
    `URLSession` to make the network connection, and validating the JSON response.
    When a network request is complete, the manager executes the completion handler
    specified by the user, whose return parameter is a JSON dictionary containing
    an `error` key-value pair or the response from the target end point. Inside the
    completion handler, I used the temperature and humidity key-value pairs to update
    the text for the Indoor Temperature and Indoor Humidity labels. The network request
    is triggered from the `viewDidLoad()` method, so that the app can update the data
    when it is launched.


    In Listing [9-7](#346879_2_En_9_Chapter.xhtml#PC7), I have expanded the `fetchNetworkData()`
    method further, to include the status from the door sensor. Instead of updating
    a label, in that sample, I updated the image for the door status.


    ```

    class ViewController: UIViewController {

    ...

    func fetchNetworkData() {

    NetworkManager.shared.getTemperature { [weak

    self] (resultDict: [String: Any]) in

    ...

    }

    NetworkManager.shared.getDoorStatus{ [weak self]

    (resultDict: [String: Any]) in

    if let error = resultDict["error"] as? String {

    self?.tipLabel?.text = "Error: \(error)"

    } else {

    DispatchQueue.main.async { [weak self] in

    if let doorStatus =

    resultDict["doorStatus"] as? String {

    if doorStatus == "0" {

    self?.addFontAwesomeImage(to:

    self?.lockImageView, name:

    .lockOpen)

    } else {

    self?.addFontAwesomeImage(to:

    self?.lockImageView, name: .lock)

    }

    }

    }

    }

    }

    }

    }

    Listing 9-7

    Fetching Door Sensor Data from the IOTHome Web Server in the tvOS App

    ```'
