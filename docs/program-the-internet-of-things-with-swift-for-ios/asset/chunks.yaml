- fmt: '# Building a Web Server on a Raspberry Pi


    Back in the early days of the World Wide Web (the browser-based *Internet* you
    know today), the idea of a web server was transparent to most developers. You
    would install a program to host your HTML files (or open a free account on a service
    such as GeoCities) and spend most of your time thinking about what size to make
    your text or where you could find the best GIFs to put. To most people, a web
    server was just a place where you would upload your files.


    As web development technologies continued to progress, more people found themselves
    needing the ability to control their web hosting themselves, leading to greater
    awareness of web server technologies. Instead of relying on your hosting provider’s
    guarantees of security or uptime, you could begin to take matters into your own
    hands by configuring the server yourself.


    Additionally, more advanced applications such as e-commerce and electronic medical
    records (EMR) systems began taking off, with their own requirements for user personalization,
    database integration, and security. To meet these needs, scripting languages,
    such as PHP and Ruby began to rise in popularity, allowing programmers to create
    pages that could perform all of the logic of processing data and generating a
    static page immediately after a user requested the page from his/her browser.
    Instead of static web pages, people were beginning to develop *web applications*.


    In the world of the Internet of Things (IoT), you can take advantage of web application
    technology to help you expose data from your IoT devices over *HTTP*, the Hypertext
    Transfer Protocol. Whenever you use a web browser or an app that connects to a
    server, it is using HTTP to transfer that data. As you may remember from earlier
    chapters, protocols such as Bluetooth or HomeKit are optimized for specific use
    cases and sometimes require a massive amount of domain-specific knowledge to be
    deployed successfully. Web technologies, on the other hand, are a well-known platform
    with a strong development community and low hardware requirements (you just need
    something that can power a web server).


    In this chapter, you will revisit the Raspberry Pi and Node.js development environment
    from earlier chapters and expand both to advertise the same data over HTTP and
    HTTPS, using the Express module for Node.js. Due to its small binary size, potential
    for scaling, and huge developer base, Node has been taking over as a first-class
    web application scripting language.


    ## Learning Objectives


    In this chapter, you will learn how to set up a web server on the Raspberry Pi
    you have been using throughout this book, expose its sensor data over HTTPS end
    points, and connect to the server from the IOTHome app for iOS. You will use Node.js
    to create the web application and Swift for the iOS app. While some projects to
    get Swift running on Raspberry Pi are starting to gather steam, in today’s environment,
    Python and Node.js are the most well-documented and -supported options for building
    web-based applications on a Raspberry Pi.


    For this chapter, rather than depending on a full web server application, such
    as Apache, to listen for HTTPS connections and route them to Node.js, you will
    learn how to use the Express module for Node.js, to accomplish the same task.
    For projects for which you will be running multiple web applications on the same
    server, you may want to look at Apache or NGINX, to better manage your connections.
    However, the project in this chapter aims to replicate the use case for a single-purpose
    IoT device or a single-purpose web microservice, such as one you would host on
    Heroku or an Amazon Web Services Lambda.


    In building the Raspberry Pi web server, you will learn the following key concepts
    for iOS IoT application development:


    - Web application development core concepts

    - Setting up Express to expose web services through Node.js

    - Reading data from a temperature sensor in a Node.js application

    - Reading data from Bluetooth sensors within a Node.js application

    - Providing security with HTTPS


    The project in this chapter is heavily based on the Express module for Node.js.
    If you would like to learn more about the module or find more support on it, please
    visit its official home page at [`www.expressjs.com`](http://www.expressjs.com).


    ## Creating a Web Server to Share Data over HTTPS


    In this section, I will focus on the process of setting up a web server using
    Node.js and Express, as well as how to use Node modules to expose the data generated
    by the IOTHome sensors (temperature, humidity, status of a switch) over HTTPS.
    The projects in this section assume that Node.js and the temperature sensor from
    Chapter [7](#346879_2_En_7_Chapter.xhtml) have been set up correctly. If you still
    feel uncomfortable with either topic, or are coming into this chapter directly,
    I highly recommend going back to the setup sections of Chapter [7](#346879_2_En_7_Chapter.xhtml)
    before progressing with this chapter.


    In this section, you will start by implementing a web server that transfers data
    over HTTP, then you will learn how to apply an SSL certificate to the server,
    to make it an HTTPS server—the new, secure standard for web applications. After
    the web server is set up successfully, you will use it to provide the data for
    the Home screen on the IOTHome app.


    ### Using Express to Expose Web Services


    Unlike the HomeBridge project, where the primary task was installing and configuring
    a Node application that was developed by another party, in this chapter, you will
    develop your own Node application from scratch. To start developing the project,
    begin by deciding on a location for the project. After turning on your Raspberry
    Pi, open the terminal and create two new directories under your home directory:
    `sites` and `iothome`. These directories are the `sites` or `/var/www/` directory
    that most web hosting Linux distributions use as the *document root* (starting
    point) for web applications, and the location of the application itself. As shown
    in Listing [8-1](#346879_2_En_8_Chapter.xhtml#PC1), create the new directories,
    then use the `cd` command to change your working directory to the `iothome` directory.


    ```

    mkdir ~/sites

    mkdir ~/sites/iothome

    cd ~/sites/iothome

    ```


    Listing 8-1: Creating a Folder for the Express Project


    Next, you must use `npm` to install Express in the directory for the `iothome`
    project. In Chapter [7](#346879_2_En_7_Chapter.xhtml), you installed the modules
    for HomeBridge globally, meaning all Node-based applications on the Raspberry
    Pi could use them. However, for application development, I recommend installing
    modules only in the project you are currently working on. In multi-application
    environments, this will prevent side effects on other projects. To install Express
    for the IOTHome project, run `npm install`, without the global flag.


    ```

    npm install express

    ```


    To verify the installation, you can write a simple Node application, which echoes
    Hello World across HTTP. To begin the development process, create a new JavaScript
    file, called `app.js`, using nano or your favorite text editor.


    ```

    nano app.js

    ```


    Unlike iOS or Arduino programming, in which application execution begins from
    a very specific method (for example, `viewDidLoad` for iOS, `setup` for Arduino),
    Node applications begin executing immediately. As Node implements object-oriented
    programming (OOP) concepts, you should use them to control the flow of your program
    in a predictable manner. To use Express, you must include the module, then instantiate
    an object of it. You can continue other operations while Express is running, but
    all HTTP requests will have to be handled through the Express object. To create
    your blank Express application, implement the code sample in Listing [8-2](#346879_2_En_8_Chapter.xhtml#PC4).


    ```javascript

    var express = require(''express'');

    var app = express();

    ```


    Listing 8-2: Creating a New Express-Based Node Application'
