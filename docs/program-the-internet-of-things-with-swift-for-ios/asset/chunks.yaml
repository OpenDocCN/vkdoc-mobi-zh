    ### Programmatically Styling Elements to Match the tvOS Design Language


    Having laid out the user interface, you may have noticed it is a bit…plain. By
    adding soft shadows, rounded corners, and a blur effect to the backgrounds of
    the tiles, you can make a user interface that more closely matches what users
    are familiar with from the Apple TV home screen. These are changes you must make
    using code, but luckily, they are not very complicated to implement.


    You can begin by adding the blur effect to the view. To achieve this, you can
    use the `UIVisualEffectView` class , which allows you to apply complicated visual
    effects, pre-built by Apple, to any `UIView`. To apply a modern iOS blur effect,
    use a `UIBlurEffect` object. In Listing [9-2](#346879_2_En_9_Chapter.xhtml#PC2),
    I applied the visual effect to the tiles by creating a helper method called `applyEffects()`.


    ```

    class ViewController: UIViewController {

    ...

    override func viewDidLoad() {

    super.viewDidLoad()

    applyEffects(to: [forecastView, indoorView,

    outdoorView, lockView])

    }

    func applyEffects(to views: [UIView?]) {

    for view in views {

    addBlurEffect(to: view)

    }

    }

    func addBlurEffect(to targetView: UIView?) {

    guard let targetView = targetView else { return }

    view.backgroundColor = UIColor.clear

    let blurEffect = UIBlurEffect(style: .regular)

    let blurView = UIVisualEffectView(effect:

    blurEffect)

    blurView.frame = view.bounds

    targetView.addSubview(blurView)

    targetView.sendSubview(toBack: blurView)

    }

    }

    Listing 9-2

    Adding a Blur Effect to a View

    ```


    Although you must add the visual effect as a sub-view, it does not have to block
    the content. By calling the `sendSubview(toBack:)` method, you can blur the effect
    to the back of the tile without affecting the previous layout of the view from
    the storyboard. The logic for applying the effects is called from the `viewDidLoad()`
    method for the view controller, as that method is executed after the view has
    been laid out from the storyboard and the view controller is ready to use.


    Adding the corner radius is a more straightforward process. To apply a corner
    radius, provide a numerical value to apply to the `CALayer` for the view (the
    object that represents how the view is drawn) and specify that you want to clip
    the area under the rounded corners. In Listing [9-3](#346879_2_En_9_Chapter.xhtml#PC3),
    I have expanded the `applyEffects()` method to include the corner radius effect.


    ```

    class ViewController: UIViewController {

    override func viewDidLoad() {

    super.viewDidLoad()

    applyEffects(to: [forecastView, indoorView,

    outdoorView, lockView], cornerRadius: 20)

    }

    func applyEffects(to views: [UIView?],

    cornerRadius: CGFloat) {

    for view in views {

    addBlurEffect(to: view)

    addRoundedCorners(to: view, cornerRadius:

    cornerRadius)

    }

    }

    func addRoundedCorners(to targetView: UIView?,

    cornerRadius: CGFloat) {

    guard let targetView = targetView else { return }

    targetView.layer.cornerRadius = cornerRadius

    targetView.layer.masksToBounds = true

    }

    }

    Listing 9-3

    Adding a Rounded Corner to a View

    ```


    For the shadow, you need to combine concepts from both of these effects. A shadow
    by itself is created by applying a shadow color, blur radius, and shadow position
    to a `CALayer`. This serves to replicate soft or hard light in real life. Unfortunately,
    the required masking to enable the rounded corners would clip the shadows, if
    applied to the same view. You can work around this by creating another view with
    the same position, applying the shadow effect to this new view and placing it
    underneath the content view. In Listing [9-4](#346879_2_En_9_Chapter.xhtml#PC4),
    I have expanded the view controller to implement these steps and add a shadow
    effect to the tiles.


    ```

    class ViewController: UIViewController {

    ...

    func applyEffects(to views: [UIView?],

    cornerRadius: CGFloat) {

    for view in views {

    addBlurEffect(to: view)

    addRoundedCorners(to: view,

    cornerRadius:     cornerRadius)

    addShadow(to: view, cornerRadius: cornerRadius)

    }

    }

    func addShadow(to targetView: UIView?, cornerRadius:

    CGFloat) {

    guard let targetView = targetView else { return }

    let shadowView = UIView(frame: targetView.frame)

    shadowView.layer.cornerRadius = cornerRadius

    shadowView.layer.shadowOffset = CGSize.zero

    shadowView.layer.shadowOpacity = 0.2

    shadowView.layer.shadowRadius = 10.0

    shadowView.layer.shadowColor = UIColor.black.cgColor

    let shadowPath = UIBezierPath(roundedRect:

    shadowView.bounds, cornerRadius: cornerRadius)

    shadowView.layer.shadowPath = shadowPath.cgPath

    view.addSubview(shadowView)

    view.bringSubview(toFront: targetView)

    }

    }

