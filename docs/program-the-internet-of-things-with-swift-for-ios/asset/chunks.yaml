    Listing 11-3

    Presenting the Security View When a Tab Becomes Active ( WorkoutTableViewController.swift
    )

    ```


    As the name *view hierarchy* suggests, views are presented as a stack, with the
    topmost view being the one that the user sees. When you built your user interfaces
    in Interface Builder, you simply added child views to the main view. As all of
    the child views were on the same presentation level (z-order), there was no need
    to manage view visibility. In the case of the security view, it should be presented
    over every other view in its calling class, to obstruct the user interface during
    the locked state. I was able to perform this operation in the `showSecurityView()`
    method . I used the `bringSubview(toFront:)` method on the main view. To avoid
    side effects, I also used the `isHidden` property on the security view, to prevent
    the view from being presented twice, if it was already active.'
