    *passed by reference*. For C/C++ programmers, this term should be very familiar.
    Passing by reference is a way to modify the contents of a parameter from within
    a method, rather than operating on a copy of that data. When you make the method
    call, you add the `&` symbol in front of the name of the variable that will be
    modified to pass it *by reference*. Apple uses this pattern frequently in their
    methods that pass back an `Error` object.


