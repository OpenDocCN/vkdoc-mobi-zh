- fmt: '# Setting Up the tvOS Target


    If you have ever downloaded any games or weather apps for iOS, and happen to also
    own an Apple TV, you may have noticed some of these apps magically appearing on
    your Apple TV home screen. You can re-create this experience for your users and
    increase adoption of your tvOS experience by adding your tvOS app as a new target
    to your `IOTHome` iOS app. To get started, make a copy of the `IOTHome` app from
    Chapter [8](#346879_2_En_8_Chapter.xhtml), or download a fresh copy from the GitHub
    repository for the book. Next, open the project in Xcode and then select New ➤
    Target from the File menu, as shown in Figure [9-1](#346879_2_En_9_Chapter.xhtml#Fig1).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig1_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig1_HTML.jpg)


    Figure 9-1: Adding a tvOS target to an existing iOS project


    In the Template Picker window that appears after clicking the menu item, select
    tvOS and then Single View App, as shown in Figure [9-2](#346879_2_En_9_Chapter.xhtml#Fig2).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig2_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig2_HTML.jpg)


    Figure 9-2: Selecting the Single View App tvOS template


    When asked to name the product, call it "`IOTHomeTV`." Your organization identifier
    should be the same as that you used for the previous iterations of the applications
    (reverse domain notation for your name or web site domain). Your project should
    now contain a new scheme and new folders for the `IOTHomeTV` target, as shown
    in Figure [9-3](#346879_2_En_9_Chapter.xhtml#Fig3).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig3_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig3_HTML.jpg)


    Figure 9-3: IOTHome project hierarchy, including the new tvOS scheme and files


    Next, you must copy over the network whitelist from the iOS project, in order
    to connect to the self-signed HTTPS end points. Open the `Info.plist` file for
    the `IOTHome` iOS app (in the `IOTHome` folder) and secondary-click (right-click)
    the key named App Transport Security Settings. Select Copy to copy the contents
    of the key-value pair. Next, open the `Info.plist` file for the `IOTHomeTV` tvOS
    app (in the `IOTHomeTV` folder), and from the secondary-click (right-click) menu,
    select Paste, to paste the key-value pair. Your resulting `Info.plist` file should
    look similar to my result in Figure [9-4](#346879_2_En_9_Chapter.xhtml#Fig4).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig4_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig4_HTML.jpg)


    Figure 9-4: `Info.plist` file for the `IOTHomeTV` target, including the network
    whitelist


    For the final project setup step, you have to make the `NetworkManager` class
    from the iOS target available to the tvOS target. One of the benefits of using
    the same project to manage both targets is that you can accomplish this task by
    using the same source file in both projects. As shown in Figure [9-5](#346879_2_En_9_Chapter.xhtml#Fig5),
    to enable this capability, click the `NetworkManager.swift` file in the Project
    Navigator, then select the check box next to `IOTHomeTV`.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig5_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig5_HTML.jpg)


    Figure 9-5: Sharing a source code between multiple targets in a project


    To verify that the source file was added successfully and is compatible with tvOS,
    select the `IOTHomeTV` scheme and Apple TV 4K target device from the drop-down
    menu next to the Run button at the top of Xcode. You should be able to compile
    the target successfully with the new file included.


    # Creating the User Interface


    Now that the new target for the tvOS is set up and compiles, you can begin building
    the user interface for the dashboard application. A dashboard is widely expected
    to be displayed for an extended period and should be easy to read. To achieve
    these goals, in Figure [9-6](#346879_2_En_9_Chapter.xhtml#Fig6), I provide a wireframe
    for a tile-based user interface that displays the door status and inside temperature
    and humidity data from the `IOTHome` sensors, a three-day weather forecast, and
    the current outdoor temperature. The weather data is provided by querying OpenWeatherMap.org,
    employing the user’s current location. You will import the icons from the `FontAwesome.swift`
    ( [https://github.com/thii/FontAwesome.swift](https://github.com/thii/FontAwesome.swift)
    ) open source library.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig6_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig6_HTML.jpg)


    Figure 9-6: Wireframe for `IOTHomeTV` dashboard


    One of the most convenient aspects of tvOS is that Apple allows you to reuse a
    significant majority of the development tools and practices you are familiar with
    from iOS development to help you build your apps. For the `IOTHomeTV` app, you
    can quickly build the user interface using Interface Builder and simple `UIView`,
    `UIImage`, and `UILabel` objects. To get started, open the `Main.storyboard` file
    for the `IOTHomeTV` target. The initial display of the empty storyboard should
    resemble the screenshot in Figure [9-7](#346879_2_En_9_Chapter.xhtml#Fig7).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig7_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig7_HTML.jpg)


    Figure 9-7: Blank storyboard for an Apple TV app


    In the same manner as an iOS app, you can compose your user interface by dragging
    and dropping items from the Object Library at the bottom right of Interface Builder
    onto the storyboard. To further control the placement of elements, you can also
    use Auto Layout in the same manner as you would an iOS app. Using Table [9-1](#346879_2_En_9_Chapter.xhtml#Tab1)
    as a guide, lay out the user interface. The labels and graphics should be placed
    over the tiles. Do not worry about the rounded borders on the views, as you will
    implement those programmatically later in this section.


    **Table 9-1:** Styling for Main View Controller User Interface Elements


    | Element Name | Text Style | Align Relative to | Top Margin | Bottom Margin |
    Left Margin | Right Margin |

    | --- | --- | --- | --- | --- | --- | --- |

    | "Three Day Forecast" background view | — | View | 8 | 60 | 8 | 8 |

    | "Bottom Row" background views | — | View | 60 | 40 | 60 | 60 |

    | "Tip" label | Title 3 | View | 40 | 20 | 8 | 8 |

    | "Title" labels | Title 2 | Parent (center X) | 30 | — | — | — |

    | "Icon" image views | — | Parent (center X, Y) | — | — | — | — |

    | "Detail" text labels | Headline | "Icon" image views (center X) | 20 | — | —
    | — |


    As of this writing, there is only one aspect ratio supported by tvOS, so you can
    choose to skip setting the Auto Layout constraints for this project, if you would
    like to.


    For the final step of setting up the user interface, you must link the storyboard
    to your source. In Listing [9-1](#346879_2_En_9_Chapter.xhtml#PC1), I have expanded
    the `ViewController` class for the `IOTHomeTV` project to include Interface Builder–accessible
    properties for all of the user interface elements.'
