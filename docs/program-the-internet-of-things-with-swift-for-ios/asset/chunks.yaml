- fmt: '### Creating and Saving HealthKit Samples


    For the IOTFit app and your own projects, you must follow these steps to save
    data to HealthKit:


    - Verify that the device is capable of storing the samples you want to work with
    (workouts, correlations, and quantity samples)

    - Create an aggregate sample object (workout or correlation)

    - Create quantity samples

    - Save the samples to a workout


    In Listing [4-2](#346879_2_En_4_Chapter.xhtml#PC2), you performed the verify step
    by checking the quantity types you wanted to work with (step count, flights climbed,
    workout type, walking distance, and cycling distance). Now that you have a better
    idea of how HealthKit represents data, you can begin to convert the simple numerical
    data from the Create Workout View Controller into something HealthKit can consume.


    The first step you must perform to save data to HealthKit is to create a `HKWorkout`
    object to represent the workout. There are several convenience constructor methods
    for the `HKWorkout` class, but the most appropriate one for storing workouts from
    IOTFit is `init(activityType:start:end:duration:totalEnergyBurned:totalDistance:distanceQuantity:device:metadata)`,
    which will allow you to specify a workout type (`HKWorkoutType`), start and end
    dates (`Date` objects), and workout distance. To enable this operation, as well
    as eventually saving such other statistics as flights climbed, you have to modify
    the `Workout` struct to add the new parameters and refactor the calling functions
    to use a `Workout` as a parameter, instead of a long list of parameters. In Listing
    [4-3](#346879_2_En_4_Chapter.xhtml#PC3), I have modified the `CreateWorkoutViewController`
    and `WorkoutDataManager` classes to include these changes.


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    ...

    case .active:

    currentWorkoutState = .inactive

    ...

    if let workoutStartTime = workoutStartTime {

    let workout = Workout(startTime: workoutStartTime,

    endTime: Date(), duration: workoutDuration,

    locations: [], workoutType:

    self.currentWorkoutType, totalSteps:

    workoutSteps, flightsClimbed: floorsAscended,

    distance: workoutDistance)

    WorkoutDataManager.sharedManager.saveWorkout(workout)

    }

    default:

    NSLog("Error")

    }

    updateUserInterface()

    }

    }

    // The following lines are part of the

    // WorkoutDataManager.swift file

    struct Workout: Codable {

    var startTime: Date

    var endTime: Date

    var duration: TimeInterval

    var locations: [Coordinate]

    var workoutType: String

    var totalSteps: Double

    var flightsClimbed: Double

    var distance: Double

    }

    class WorkoutDataManager {

    ...

    func saveWorkout(_ workout: Workout) {

    var activeWorkout = workout

    ...

    saveToPlist()

    workouts?.append(activeWorkout)

    saveWorkoutToHealthKit(activeWorkout)

    }

    func saveWorkoutToHealthKit(_ workout: Workout) {

    healthStore?.requestAuthorization(toShare:

    hkDataTypes, read: hkDataTypes, completion: {

    [weak self] (isAuthorized: Bool, error:

    Error?) in

    ...

    })

    }

    }

    ```

    *Listing 4-3 Modifying the `CreateWorkoutViewController` and `WorkoutDataManager`
    Classes to Include All Workout Data*


    Now that you have access to all the data you require, you can try to create the
    `HKWorkout` object. In Listing [4-4](#346879_2_En_4_Chapter.xhtml#PC4), I have
    modified the `saveWorkoutToHealthKit(...)` method to include the new call to create
    the `HKWorkout` object. I created the `createHKWorkout(workoutType:startDate:endDate)`
    method to help manage converting the custom `WorkoutType` struct to HealthKit''s
    `HKWorkoutActivityType` category sample type. Use a `guard-let` or `if-let` block
    to verify that the object was created successfully, before attempting to use it.


    ```

    class WorkoutDataManager {

    func saveWorkoutToHealthKit(stepCount: Double,

    flightsClimbed: Double, distance: Double,

    workoutType: String, startDate: Date, endDate:

    Date) {

    healthStore?.requestAuthorization(toShare:

    hkDataTypes, read: hkDataTypes, completion: {

    [weak self] (isAuthorized: Bool, error:

    Error?) in

    if let error = error {

    NSLog("Error accessing HealthKit")

    } else {

    guard let workoutObject =

    self?.createHKWorkout(workout)

    else { return }

    }

    })

    }

    func createHKWorkout(_ workout: Workout) -> HKWorkout? {

    let distanceQuantity = HKQuantity(unit: HKUnit.meter(),

    doubleValue: workout.distance)

    var activityType = HKWorkoutActivityType.walking

    switch(workout.workoutType) {

    case WorkoutType.running:

    activityType = HKWorkoutActivityType.running

    case WorkoutType.bicycling:

    activityType = HKWorkoutActivityType.cycling

    default:

    activityType = HKWorkoutActivityType.walking

    }

    return HKWorkout(activityType: activityType, start:

    workout.startTime, end: workout.endTime, duration:

    workout.duration, totalEnergyBurned: nil,

    totalDistance: distanceQuantity , device: nil,

    metadata: nil)

    }

    }

    ```

    *Listing 4-4 Creating an `HKWorkout` Object*


    One of the downsides of working with HealthKit is that the setup steps required
    to use it are very rigid. After creating a workout, the only way to attach samples
    to it is by first saving it to the HealthKit store. If the operation is successful,
    you can begin to add samples to the workout. In Listing [4-5](#346879_2_En_4_Chapter.xhtml#PC5),
    I have modified the `saveWorkoutToHealthKit(...)` method to save the workout and
    then make a call to a function that will be used to add the samples.


    ```

    class WorkoutDataManager {

    ...

    func saveWorkoutToHealthKit(_ workout: Workout) {

    healthStore?.requestAuthorization(toShare:

    hkDataTypes, read: hkDataTypes, completion: {

    [weak self] (isAuthorized: Bool,error:Error?)

    in

    if let error = error {

    NSLog("Error accessing HealthKit")

    } else {

    guard let workoutObject =

    self?.createHKWorkout(workout)

    else { return }

    self?.healthStore?.save(workoutObject,

    withCompletion: { (completed: Bool,

    error: Error?) in

    if let error = error {

    NSLog("Error creating workout")

    } else {

    self?.addSamples(hkWorkout:

    workoutObject, workoutData:

    workout)

    }

    })

    }

    })

    }

    ...

    func addSamples(hkWorkout: HKWorkout, workoutData: Workout){

    var samples = [HKSample]()

    addStepCountSample(workoutData, objectArray: &samples)

    addFlightsClimbedSample(workoutData, objectArray:

    &samples)

    addDistanceSample(workoutData, activityType:

    hkWorkout.workoutActivityType, objectArray: &samples)

    self.healthStore?.add(samples, to:hkWorkout, completion:{

    (saveCompleted: Bool, saveError: Error?) in

    if let saveError = saveError {

    NSLog("Error adding workout samples")

    } else {

    NSLog("Workout samples added successfully!")

    }

    })

    }

    }

    ```

    *Listing 4-5 Preparing to Add Samples to a Workout*


    As shown in the `addSamples(...)` method, to add samples to a workout, you build
    a series of `HKSample` objects and call the `add(to:completion:)` method on the
    iOS health store, using the workout object you created earlier. The setup code
    for an `HKSample` object can get lengthy, so I created methods to generate each
    sample and append it to the array.


    Harkening back to the discussion on sample types in HealthKit, to store quantitative
    data about the workout, you will want to use the `HKQuantitySample` class. In
    comparing the convenience initializers, the best one to use would be `init(type:
    quantity: start: end:)`. At this point, the scaffolding code starts to get lengthy.
    To use the quantity parameter, you must generate a `HKQuantity` object and specify
    an `HKQuantityType` object to represent the quantity type. Similarly, you will
    also have to specify the unit type. In Listing [4-6](#346879_2_En_4_Chapter.xhtml#PC6),
    I have implemented the `addStepCountSample(...)` and `addFlightsClimbedSample(...)`
    methods, which implement all of these steps.'
