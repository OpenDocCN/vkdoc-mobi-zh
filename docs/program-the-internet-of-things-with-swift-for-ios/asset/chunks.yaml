- fmt: '# 4. Using HealthKit to Securely Retrieve and Store Health Data


    So far, you have learned how to use the motion and GPS sensors on iOS devices
    to build a workout app called IOTFit, with the capabilities to track activity
    data (steps, altitude, step count) and display the user''s workout path on a map.
    Additionally, you’ve learned how to store this data to a property-list (`.plist`)
    file inside the app''s `Documents` folder.


    While it is useful to store data within one app, you can help the user even more
    by saving the data in a way that is accessible to other workout apps. For this
    purpose, you can use the HealthKit framework. HealthKit allows you to abstract
    workouts into `HKWorkout` objects and store them in the iPhone’s HealthKit store.
    The HealthKit store is an encrypted area in memory in which the iOS Health app
    and HealthKit-authorized third-party apps can share information about a user.
    For example, by enabling HealthKit, users can see workouts they created in IOTFit
    as discrete items on the iOS Health app. They can also use HealthKit to read display
    workouts from other apps within IOTFit.


    Aside from security, one of HealthKit’s most powerful features is the breadth
    of data it can store via its `HKSample` class. For the sake of clarity, this chapter
    will focus on how to apply it to workout-related data, but you can make apps to
    manage everything from heart rate to UV exposure to vitamin C consumption.


    ## Learning Objectives


    In this chapter, by integrating HealthKit into IOTFit, you will learn the following
    key concepts of Internet of Things (IoT) app development:


    * Requesting permission to the iOS HealthKit Store

    * How to save data to HealthKit

    * How to load data from HealthKit

    * How to display data on a Table View Controller


    These changes will be expressed by expanding the previously developed `WorkoutDataManager`
    class and adding a History tab to the app, which will contain a table view documenting
    the user’s workout history, as shown in Figure 4-1.


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig1_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig1_HTML.jpg)


    **Figure 4-1** Modified wireframe for the IOTFit app, including the new History
    tab


    As in the previous chapters, this project builds on the progress you have made
    through Chapter 3. If you get stuck or have to reference the completed code for
    this project, it is available on the GitHub repository for this book, under the
    `Chapter 4` folder ( [https://github.com/Apress/program-internet-of-things-w-swift-for-ios](https://github.com/Apress/program-internet-of-things-w-swift-for-ios)
    ).


    ## Requesting HealthKit Permission


    Given the sensitive nature of health data, it should come as no surprise that
    using HealthKit requires you to modify your app to declare that it wants to use
    health-related features and presents a permission alert when users want to access
    these features. Similar to Core Motion, HealthKit is only available on newer iPhones,
    iPod touches, and the Apple Watch, requiring you also to query for the availability
    of these features. Luckily, you can use the same workflow you learned for requesting
    permissions in Core Motion and Core Location to add HealthKit to your app.


    ### Note


    Similar to the Core Motion features discussed in Chapter 3, this chapter is designed
    to run on an iPhone or iPod touch. As of this writing, Apple does not expose the
    Health app or HealthKit on iPad.


    To begin, make a copy of the IOTFit app you developed in Chapter 3 or download
    a copy from the GitHub repository for this book. Next, select the project settings
    for the app, by clicking `IOTFit` in the project hierarchy navigator. As shown
    in Figure 4-2, to declare that the app wants to advantage HealthKit, add the HealthKit
    capability to the app by clicking the Capabilities tab. Scrolling down to HealthKit,
    and clicking the switch once to flip it to ON.


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig2_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig2_HTML.jpg)


    **Figure 4-2** Enabling the HealthKit capability in the IOTFit project


    If the app is not linked to a valid Apple Developer account (paid or free are
    both acceptable), enabling the HealthKit capability will fail. This will be expressed
    by the switch reverting to the OFF position. If you are having trouble remembering
    how to connect your project to an Apple Developer account, refer back to Chapter
    1.


    Next, as with all permission-based features, you must add keys to the project’s
    information property list (`Info.plist`), to define the messages that will appear
    in the system-generated permission alerts. As shown in Figure 4-3, click the Info
    tab, then click the `(+)` button that appears when you hover over the Privacy
    – Location When in Use Description row, to add a new key.


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig3_HTML.jpg](images/346879_2_En_4_Chapter/346879_2_En_4_Fig3_HTML.jpg)


    **Figure 4-3** Adding new keys to IOTFit’s information property list


    To enable reading data from HealthKit, add the Privacy – Health Share Usage Description
    key-value pair. For the description string, the text I used was “IOTFit would
    like to use HealthKit permission to import workout data from the Health app into
    the History feature of the app. This information will not be shared online or
    with third parties.” To enable saving data to HealthKit, add the Privacy – Health
    Share Usage Description key-value pair. The text I used for the description string
    was “IOTFit would like to use HealthKit permission to export workout data to the
    Health app. This information will not be shared online or with third parties.”


    In the same manner as Core Location, you should query for HealthKit availability
    and display its permission prompt before your first operation that attempts to
    use the framework. The primary class for accessing HealthKit from your applications
    is `HKHealthStore`. Similar to the manager objects from Core Motion, you instantiate
    an instance of the class and make calls to HealthKit through that. Unlike Core
    Motion, there is a hard requirement from Apple that you only create one instance
    of the class in your application. For this purpose, the most appropriate place
    to put the `HKHealthStore` object would be in the `WorkoutDataManager` singleton.
    In Listing 4-1, I have modified the `WorkoutDataManager` class to add a `HKHealthStore`
    object as a property and instantiate it if the feature is available on the device.


    ```

    import Foundation

    import CoreLocation

    import HealthKit

    ...

    class WorkoutDataManager {

    static let sharedManager = WorkoutDataManager()

    ...

    private var healthStore: HKHealthStore?

    private init() {

    print("Singleton initialized")

    loadFromPlist()

    if HKHealthStore.isHealthDataAvailable() {

    healthStore = HKHealthStore.init()

    }

    }

    ...

    }

    ```


    **Listing 4-1** Adding an `HKHealthStore` Property to the `WorkoutDataManager`
    Class'
