- fmt: '### Generating an OpenSSL Self-Signed SSL Certificate


    With OpenSSL, you act as your own trust provider and generate an SSL certificate
    that meets the basic encryption requirements of HTTPS. This is referred to as
    a *self-signed certificate*. Because it is not generated by one of the trusted
    vendors I mentioned above, most browsers and iOS will initially reject it, until
    you perform some steps to trust it on the device, which I will explain after you
    are done generating the certificate.


    If you have ever created an Apple Developer Program iOS development certificate
    or Push Notification certificate, you are already familiar with the process of
    generating SSL certificates (although the delivery method is different). In Apple’s
    model, you create a private key (a unique hex value that is used as the base for
    the encryption/decryption of communications), create a Certificate Signing Request
    (CSR) file using the `Keychain Access` tool to serve as a receipt for your application
    for a new certificate, and then submit the CSR file to Apple’s web site, which
    will refresh with a new SSL certificate you can download once your request has
    been processed.


    With OpenSSL, you can have complete control of this flow, to the point where you
    can even import existing private keys or hand CSRs to another service. For this
    project, though, you will act as your own Certificate Authority (CA), so you do
    not require a CA; you simply have to create a private key and a certificate. To
    do this in one command in OpenSSL, input the following command:


    ```

    openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout express.key -out express.crt

    ```


    The preceding command specifies that you want to create a private key based on
    RSA 2048-bit encryption and a certificate based on that key, which is good for
    365 days. As with your iPhone developer certificate, make sure that you save the
    private key and do not share it with others. Losing the key will result in being
    unable to use the certificate. Sharing the key will allow others to break your
    encryption.


    Now that you have a valid SSL certificate, you can begin using it in your Node
    application. To begin, add the `https` and `fs` (filesystem) modules to your project,
    as shown in Listing [8-12](#346879_2_En_8_Chapter.xhtml#PC21). These modules are
    provided with the standard Node.js distribution and do not require any additional
    installation steps.


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var fs = require(''fs'');

    var https = require(''https'');

    var app = express();

    app.get(''/temperature'', function (req, res) {

    ...

    });

    Listing 8-12

    Adding the https and fs Modules to the Node Project

    ```


    Earlier in the chapter, `app.listen(80)` was used to instruct Express to listen
    for HTTP traffic on port 80. To use HTTPS in place of HTTP, you must disable this
    line and, instead, instruct an `https` object to listen for traffic. To initialize
    the `https` object, you must provide it with the paths to the SSL certificate
    and its private key on the Raspberry Pi. If you used Let’s Encrypt to generate
    these, they will be under the folder that was output by the `certbot-auto` tool.
    If you generated the SSL certificates with your own provider, you will have to
    save the files to your Raspberry Pi, either by downloading them via the Chromium
    browser on the Pi itself or configuring another tool, such as `avahi-daemon`,
    to help make the Raspberry Pi discoverable by your Mac over Bonjour.


    Once you have verified the location of the SSL certificate and private key, create
    a dictionary to store the file paths, and initialize a new `https` object, as
    shown in Listing [8-13](#346879_2_En_8_Chapter.xhtml#PC22).


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var fs = require(''fs'');

    var https = require(''https'');

    var app = express();

    var sslOptions = {

    key: fs.readFileSync(''express.key''),

    cert: fs.readFileSync(''express.crt)

    }

    https.createServer(sslOptions, app);

    https.listen(4443);

    //app.listen(80);

    app.get(''/temperature'', function (req, res) {

    ...

    });

    Listing 8-13

    Configuring the Node Project to Use HTTPS Instead of HTTP

    ```


    As with the earlier HTTP example, for the first HTTPS test, I suggest listening
    for traffic on port 4443 instead of the protected port for HTTPS, 443. To test
    that your SSL configuration was successful, kill your old Node process and reload
    the file for the application. If there is a problem loading the SSL certificate,
    you will see an error message in the terminal at this point, similar to the example
    in Figure [8-5](#346879_2_En_8_Chapter.xhtml#Fig5). As they are well-adopted technologies,
    you can find a great deal of data to help you resolve OpenSSL and Node HTTPS issues,
    based on these error messages.


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig5_HTML.jpg](images/346879_2_En_8_Chapter/346879_2_En_8_Fig5_HTML.jpg)


    Figure 8-5: Sample error message for failed Node HTTPS configuration


    Next, change the URL for the `/temperature` end point to include port number 4443
    and `https` as the protocol. Attempt to load the URL in your browser. If you are
    using Google Chrome, you will receive a security warning about the page being
    insecure, similar to the one I received in Figure [8-6](#346879_2_En_8_Chapter.xhtml#Fig6).


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig6_HTML.jpg](images/346879_2_En_8_Chapter/346879_2_En_8_Fig6_HTML.jpg)


    Figure 8-6: Google Chrome warning for pages with untrusted SSL certificates


    To resolve this error, click the ADVANCED link at the bottom of the page, and
    then click the Proceed to… link, as shown in Figure [8-7](#346879_2_En_8_Chapter.xhtml#Fig7).


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig7_HTML.jpg](images/346879_2_En_8_Chapter/346879_2_En_8_Fig7_HTML.jpg)


    Figure 8-7: Enabling trust for a page in Google Chrome


    After verifying that you want to load the page, you should now be able to see
    the temperature JSON data in the browser, just like you did when it was exposed
    through normal HTTP.


    At this point, it is safe to change your application to listen on port 443. Just
    remember that you will have to run Node as a superuser, and that you will have
    to trust the `:443` end point in Chrome. For HTTPS requests to port 443, you do
    not have to append the port number in iOS or your web browser.


    To enable Postman to connect to self-signed certificates, click the Wrench icon
    at the top-right of the screen, as shown in Figure [8-8](#346879_2_En_8_Chapter.xhtml#Fig8),
    then set SSL certificate verification to OFF.


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig8_HTML.jpg](images/346879_2_En_8_Chapter/346879_2_En_8_Fig8_HTML.jpg)


    Figure 8-8: Trusting self-signed certificates in Postman'
