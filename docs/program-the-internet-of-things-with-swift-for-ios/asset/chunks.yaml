- fmt: '# Learning Objectives


    In this chapter, you will learn the following critical skills for IoT development
    on iOS by building the location-based functions of the `IOTFit` application:


    - Configuring an application for background activity

    - Checking for availability of hardware resources

    - Asking the user for permission to access sensitive permissions

    - Requesting and responding to location updates

    - Displaying saved locations on a map


    One of the most critical lessons you will learn in this chapter is the workflow
    of checking if a hardware feature is available and then asking the user for permission
    to access that resource before doing any work with it. Not only is this a good
    strategy to help you design your app’s flow (for example, thinking about what
    to do when the user does not want to allow access), but it also helps you prevent
    some of the most common sources of runtime crashes. Apple’s SDKs will cause your
    applications to crash, if you try to access unavailable or forbidden resources.


    As with the first chapter, the code for this project is available on the GitHub
    repository for this book, under the `Chapter 2` folder (`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`).


    ## Configuring Your Project for Background Location Activity


    During a workout, users will often put their phone in their pocket, in a case
    on their arm, or on top of their workout equipment. To enable the `IOTFit` app
    to be useful to users in these cases, you should configure the `IOTFit` app to
    continue workout tracking while the app is backgrounded. Users will have to enable
    this functionality the first time the app is launched, via an alert that iOS presents
    in your app. To allow these features to work, you will learn how to declare the
    app as one that would like to use background location updates and how to configure
    the message for the permission alert. It is important to perform these setup steps
    early in the development process, as both affect how your app is compiled and
    can only be configured through the Project Settings editor.


    Apple imposes strict limitations on the background actions individual apps can
    take in iOS, to save power and prevent memory leaks. Unless your app is correctly
    configured to ask for permission to a background-enabled feature (mode), your
    app will not be able to perform any actions while it is in the background. The
    special features Apple allows you to configure your app to access in the background
    are described in Table 2-1. For the `IOTFit` application, you will use background
    location updates. In later chapters in the book, you will enable the Bluetooth
    LE features.


    **Table 2-1** Configurable Background Modes for iOS Apps


    | Background Mode Name | Purpose |

    | --- | --- |

    | Audio, AirPlay, and Picture-in-Picture | Allows multimedia apps to continue
    playback uninterrupted when the user backgrounds the app |

    | Location updates | Allows developers to perform small tasks, based on location
    change events that happen while an app is backgrounded |

    | Newsstand downloads | Allows Newsstand apps (for example, magazines, newspapers)
    to fetch new content while the app is inactive |

    | External accessory communication | Allows apps to maintain active data channels
    with physically connected, Made for iPhone (MFI) hardware |

    | Uses Bluetooth LE accessories | Allows an app to act as a Bluetooth LE central
    manager and communicate with external devices that are configured as Bluetooth
    LE Peripherals |

    | Acts as a Bluetooth LE accessory | Allows an app to serve as a Bluetooth LE
    Peripheral and accept messages from Bluetooth LE central manager devices |

    | Background fetch | Allows an app to periodically fetch data from HTTPS end points
    in the background (frequency determined by iOS task manager) |

    | Remote notifications | Allows apps to respond to Apple Push Notifications |


    To start developing this chapter’s iteration of the `IOTFit` app, begin by copying
    your completed project from Chapter 1 or by downloading the code from the `Chapter
    1` folder of this book’s GitHub repository (`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`).


    Open your new project and click the project name (`IOTFit`) in the Project Navigator
    (within Xcode’s left pane). To configure the `IOTFit` project to use the Location
    updates background mode, click on the Capabilities tab of the Project Settings
    editor view, indicated in Figure 2-1.


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig1_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig1_HTML.jpg)


    **Figure 2-1** Capabilities tab within Project Settings


    Scroll down to Background Modes and click the switch to turn it on. Click the
    check box labeled Location updates, to enable background location updates. After
    the changes, your capabilities screen should match Figure 2-2.


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig2_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig2_HTML.jpg)


    **Figure 2-2** Capabilities tab with location updates configured correctly'
