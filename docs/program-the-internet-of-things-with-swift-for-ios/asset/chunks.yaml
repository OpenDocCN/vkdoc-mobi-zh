  trans: '

    #### 请求用户更改应用设置


    从 `denied` 权限恢复的唯一方法是让用户在 iOS 的设置应用中为你的应用页面开启权限。一种常见的鼓励用户进行此操作的方法是创建一个提示框，直接引导用户进入该页面。尽管与桌面电脑或安卓手机相比，iOS
    在应用间共享数据方面的设置非常有限，但 `URL Schemes`（特殊格式的 URL）一直是官方支持的、在注册了各自 scheme（例如 `mySocalApp://`）的应用之间传递少量数据的方式。数据通过
    URL 参数来回传递（例如 `mySocalApp://?request=shareLink`）。


    iOS 的设置应用注册了 `prefs://` scheme。幸运的是，苹果为你提供了查找特定设置的 URL。你只需要调用 `UIApplicationOpenSettingsURLSetting`
    宏即可。在代码清单 2-7 中，我修改了 `presentPermissionErrorAlert()` 方法，以便通过此 URL 启动设置应用。


    ```

    func presentPermissionErrorAlert() {

    let alert = UIAlertController(title: "Permission Error",

    message: "Please enable location services for this app",

    preferredStyle: UIAlertControllerStyle.alert)

    let okAction = UIAlertAction(title: "OK", style:

    UIAlertActionStyle.default, handler: {

    (action:  UIAlertAction) in

    if let settingsUrl = URL(string:

    UIApplicationOpenSettingsURLString),

    UIApplication.shared.canOpenURL(settingsUrl) {

    UIApplication.shared.open(settingsUrl,

    options: [:], completionHandler: nil)

    }

    })

    let cancelAction = UIAlertAction(title: "Cancel", style:

    UIAlertActionStyle.cancel, handler: nil)

    alert.addAction(okAction)

    alert.addAction(cancelAction)

    self.present(alert, animated: true, completion: nil)

    }

    代码清单 2-7

    将用户引导至你应用的设置页面

    ```


    与请求权限前必须检查定位服务是否可用一样，在尝试打开设置 URL 之前，你必须询问应用是否可以打开该 URL。苹果实现其受保护资源的方式所带来的最不幸的副作用之一就是，如果你不请求权限或检查可用性，应用可能会在运行时崩溃。运行时崩溃是应用被
    App Store 拒绝的首要原因。


    如果用户拒绝了应用的位置权限，那么下次他们按下“开始”按钮时，将会看到如图 2-9 所示的流程。按下“确定”按钮将带他们进入 IOTFit 的设置页面。当他们返回应用时，就可以正常使用了。你可以通过在设置应用中禁用位置权限，然后在
    IOTFit 应用中按下“开始”按钮来测试此功能。


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig9_HTML.jpg](img/346879_2_En_2_Fig9_HTML.jpg)


    图 2-9


    IOTFit 的设置请求流程


    ## 请求位置更新


    现在应用已经被允许与 iOS 的位置功能交互，你可以开始轮询位置更新了。如图 2-7 中的应用流程图所示，每隔几秒钟，你必须保存最近的位置，计算新的锻炼时间，并计算新的锻炼距离。当用户暂停锻炼时，你必须暂停更新。恢复则会继续更新时间和距离。


    在 iOS 中处理位置更新的流程与请求位置权限的流程非常相似。首先，让你的位置管理器实例知道你需要位置更新，然后通过 `locationManager:didUpdateLocations:`
    代理方法来响应这些更新。为了减少更新次数，你还需要对位置管理器的精度设置一个限制。


    在代码清单 2-8 中，我更新了 `requestLocationPermission()` 和 `startWorkout()` 方法以及 `CLLocationManagerDelegate`
    扩展，以包含位置更新请求和代理处理方法。


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    func requestLocationPermission() {

    if CLLocationManager.locationServicesEnabled(){

    locationManager.desiredAccuracy =

    kCLLocationAccuracyHundredMeters

    locationManager.distanceFilter = 10.0 //米

    locationManager.delegate = self

    ...

    }

    } else {

    presentEnableLocationAlert()

    }

    }

    func startWorkout() {

    currentWorkoutState = .active

    ...

    locationManager.startUpdatingLocation()

    }

    }

    extension CreateWorkoutViewController:

    CLLocationManagerDelegate {

    ...

    func locationManager(_ manager: CLLocationManager,

    didUpdateLocations locations: [CLLocation]) {

    guard let mostRecentLocation = locations.last else {

    NSLog("无法读取最近位置")

    return

    }

    NSLog("最近位置: \(String(describing:

    mostRecentLocation))")

    }

    代码清单 2-8

    在锻炼开始时请求位置权限

    ```


    `locationManager:didUpdateLocations:` 代理方法会返回多个位置，但就计算距离而言，最后一个就足够了。在我的代码中，我添加了一个
    `guard-let` 来在访问值之前进行验证。对于来自硬件的可选值，它们未被初始化的风险很高（例如当硬件未就绪或连接断开时）。在这种情况下，强制解包是不明智的。

    '
- fmt: '### Responding to Location Updates


    The `locationManager:didUpdateLocations:` delegate method will fire anytime it
    detects a location change greater than the `distanceFilter` value you specified.
    However, you will have to update the user interface at these times, to show the
    new value. Additionally, when the user changes the state of the workout, you should
    also change the labels in the buttons (and hide the Pause button, if the workout
    is stopped altogether). Finally, you will also require some way of keeping track
    of the time that has elapsed.


    The easiest of these tasks is updating the buttons. When the workout is started,
    you will show the Pause button and change the label of the Start button to “Stop.”
    When the Pause button is pressed, change the label of this button to “Resume.”
    Finally, when the Stop button is pressed, reset the user interface (Show Start
    button, hide Pause button). Because this logic is the same for all state changes
    in the app, you can wrap it in a method and use that method throughout your code.
    In Listing [2-9](#346879_2_En_2_Chapter.xhtml#PC10), I have created a method called
    `updateUserInterface()` to handle these updates and added calls to it in the `viewDidLoad()`,
    `toggleWorkout()`, and `pauseWorkout()` methods. These are the points at which
    the view is created, and the user interacts with the screen.


    ```swift

    class CreateWorkoutViewController: UIViewController {

    ...

    override func viewDidLoad() {

    super.viewDidLoad()

    updateUserInterface()

    }

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    case .inactive:

    requestLocationPermission()

    case .active:

    currentWorkoutState = .inactive

    default:

    NSLog("toggleWorkout() called out of context!")

    }

    updateUserInterface()

    }

    @IBAction func pauseWorkout() {

    updateUserInterface()

    }

    func updateUserInterface() {

    switch(currentWorkoutState) {

    case .active:

    toggleWorkoutButton?.setTitle("Stop", for: UIControlState.normal)

    pauseWorkoutButton?.setTitle("Pause", for: UIControlState.normal)

    pauseWorkoutButton?.isHidden = false

    case .paused:

    pauseWorkoutButton?.setTitle("Resume", for: UIControlState.normal)

    pauseWorkoutButton?.isHidden = false

    default:

    toggleWorkoutButton?.setTitle("Start", for: UIControlState.normal)

    pauseWorkoutButton?.setTitle("Pause", for: UIControlState.normal)

    pauseWorkoutButton?.isHidden = true

    }

    }

    ...

    }

    Listing 2-9

    Updating the Buttons When the App Changes State

    ```


    The next easiest task is to update the time display. Because the location updates
    fire at unpredictable times (whenever the threshold has changed), you will have
    to come up with an independent time-tracking mechanism. Luckily, there’s an API
    for that! You can use the `Timer` class to create a timer object, which can call
    a method at a later time or repeatedly at an interval you specify. For the IOTFit
    app, every time the timer fires, you must calculate the new total time of the
    workout and update the workout time label. In Listing [2-10](#346879_2_En_2_Chapter.xhtml#PC11),
    I have updated the `CreateWorkoutViewController` class with properties and helper
    methods to assist with managing the timer and inserted the appropriate calls for
    timer state management.


    ```swift

    import UIKit

    import CoreLocation

    ...

    let timerInterval: TimeInterval = 1.0

    class CreateWorkoutViewController: UIViewController {

    ...

    var lastSavedTime: Date?

    var workoutDuration: TimeInterval = 0.0

    var workoutTimer: Timer?

    ...

    func startWorkout() {

    currentWorkoutState = .active

    UserDefaults.standard.setValue(true, forKey: "isConfigured")

    UserDefaults.standard.synchronize()

    workoutDuration = 0.0

    workoutTimer = Timer.scheduledTimer(timeInterval: timerInterval, target: self,
    selector: #selector(updateWorkoutData), userInfo: nil, repeats: true)

    locationManager.startUpdatingLocation()

    }

    @objc func updateWorkoutData() {

    let now = Date()

    if let lastTime = lastSavedTime {

    self.workoutDuration += now.timeIntervalSince(lastTime)

    }

    self.workoutDuration += timerInterval

    workoutTimeLabel?.text = stringFromTime(timeInterval: self.workoutDuration)

    }

    func stringFromTime(timeInterval: TimeInterval) -> String{

    let integerDuration = Int(timeInterval)

    let seconds = integerDuration % 60

    let minutes = (integerDuration / 60) % 60

    let hours = (integerDuration / 3600)

    if hours > 0 {

    return String("\(hours) hrs \(minutes) mins \(seconds) secs")

    } else {

    return String("\(minutes) min \(seconds) secs")

    }

    }

    @IBAction func toggleWorkout() {

    switch currentWorkoutState {

    case .inactive:

    requestLocationPermission()

    case .active:

    currentWorkoutState = .inactive

    stopWorkoutTimer()

    default:

    NSLog("toggleWorkout() called out of context!")

    }

    updateUserInterface()

    }

    @IBAction func pauseWorkout() {

    switch currentWorkoutState {

    case .paused:

    startWorkout()

    case .active:

    currentWorkoutState = .paused

    stopWorkoutTimer()

    default:

    NSLog("pauseWorkout() called out of context!")

    }

    updateUserInterface()

    }

    ...

    func stopWorkoutTimer() {

    workoutTimer?.invalidate()

    lastSavedTime = nil

    }

    }

    Listing 2-10

    Using a Timer to Track Workout Time Updates

    ```


    To track the time elapsed, I have created a `TimeInterval` object. `Timer` objects
    are initialized with `TimeInterval` values, so using this same class for tracking
    time makes the code much more consistent. Next, you initialize the `Timer` and
    reset the `workoutDuration` inside the `startWorkout()` method. The `Timer` is
    initialized to repeat every second. When it fires, it calls the `updateWorkoutData()`
    method. Inside this method, I use the `stringFromTime()` helper method to convert
    the `workoutDuration` property to a string and update the `workoutTime` label.
    I calculated the difference in time by comparing two `Date` objects (`lastSavedTime`
    and `now`). This allowed me to keep an accurate track of time, even when the app
    is in the background.


    For the final timer-related tasks, you may notice that I inserted the appropriate
    calls to `stopWorkoutTimer()` inside the `toggleWorkout()` and `pauseWorkout()`
    methods and fleshed out the `pauseWorkout()` method with the logic it requires
    to implement the states in the flowchart from Figure [2-7](#346879_2_En_2_Chapter.xhtml#Fig7).


    With all of this user interface update groundwork now in place, it is straightforward
    to update the total workout distance. In the same way you created a property to
    track total time, you can create properties to track workout distance and the
    last location saved. When the `locationManager:didUpdateLocations:` delegate method
    fires, you can add the distance between the most recent location and last saved
    location using the distance property of the `CLLocation` object (the class that
    represents locations as coordinate points). In Listing [2-11](#346879_2_En_2_Chapter.xhtml#PC12),
    I have updated the `CreateWorkoutViewController` class, `locationManager:didUpdateLocations:`
    delegate method, and `updateWorkoutData()` method, to implement this logic.


    ```swift

    class CreateWorkoutViewController: UIViewController {

    ...

    var workoutDistance: Double = 0.0

    var lastSavedLocation: CLLocation?

    ...

    @objc func updateWorkoutData() {

    self.workoutDuration += timerInterval

    workoutTimeLabel?.text = stringFromTime(timeInterval: self.workoutDuration)

    workoutDistanceLabel?.text = String(format: "%.2f meters", arguments: [workoutDistance])

    }

    ...

    }

    extension CreateWorkoutViewController: CLLocationManagerDelegate {

    ...

    func locationManager(_ manager: CLLocationManager, didUpdateLocations locations:
    [CLLocation]) {

    guard let mostRecentLocation = locations.last else {

    NSLog("Unable to read most recent location")

    return

    }

    if let savedLocation = lastSavedLocation {

    let distanceDelta = savedLocation.distance(from: mostRecentLocation)

    workoutDistance += distanceDelta

    }

    lastSavedLocation = mostRecentLocation

    }

    }

    Listing 2-11

    Calculating Workout Distance

