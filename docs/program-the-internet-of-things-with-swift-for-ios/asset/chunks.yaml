    ### 注意事项


    Apple 允许你在不付费的情况下创建一个受限的开发者账户，这样每个 Apple ID 最多可以测试三台设备。对于本书而言，这种类型的账户就足够了。但是，当你需要在
    App Store 上发布应用，或者希望通过 TestFlight 或企业级分发进行共享时，你就必须将账户升级到付费级别。


    登录后，“账户”窗口会显示你的 Apple ID 所关联的所有 Apple Developer Program 团队列表，如图 1-12 所示。若要登录另一个
    Apple ID 账户，或向 Xcode 添加源代码管理账户（例如 GitHub、Bitbucket），可以点击左下角的加号（+）按钮（在图 1-12 中用圆圈标出）。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig12_HTML.jpg](img/346879_2_En_1_Fig12_HTML.jpg)


    图 1-12：成功登录后的“账户”窗口


    成功链接账户后，就可以安全地关闭“账户”窗口了。当你返回编辑器窗口时，你的项目设置应该类似于图 1-13，但项目中已经将你的团队设为默认团队。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig13_HTML.jpg](img/346879_2_En_1_Fig13_HTML.jpg)


    图 1-13：成功登录后的项目设置


    如果关闭“账户”窗口后，你的选择仍未出现，请再次点击“团队”下拉菜单，手动选择一个已关联的团队。你也可以使用同样的方法更改项目所关联的团队。


    至此，本章的项目设置阶段就完成了。在后续的章节中，你将回到项目设置中为应用添加新功能。届时可以将本节内容作为快速参考。


    ## 构建自适应用户界面


    作为一名应用开发者，你始终需要牢记三个要点：“*如何构建它？*”、“*如何说服用户下载它？*”以及“*如何让用户持续使用？*”虽然营销策略对于建立和维护客户群至关重要，但作为开发者，你可以通过确保应用拥有完善的功能集，并在所有设备上提供引人入胜且一致的用户体验，来让应用对用户更具吸引力。在本节中，我将向你介绍如何使用
    iOS 的 Auto Layout 功能，来构建一个能够*适应* iOS 所支持的所有不同设备的用户界面。


    在 iPhone 5 发布之前，iOS 开发者只需要关注两款设备：iPhone 和 iPad。如果开发者想要走在技术前沿，还需要配置所有用户界面元素以支持设备旋转。对于这种工作流程，我们大多数人可以自行编写整个布局代码，并为
    iPhone 和 iPad，以及竖屏和横屏模式分别维护独立的 Interface Builder（`.xib`）文件。然而，自 iPhone 4 发布后，情况开始迅速变化，而如今的
    iOS 设备阵容相比早期已经大大扩展。例如，图 1-14 展示了截至 2018 年底，Interface Builder 中的设备预览选项截图。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig14_HTML.jpg](img/346879_2_En_1_Fig14_HTML.jpg)


    图 1-14：Xcode 9 的 Interface Builder 设备预览选择器


    按屏幕尺寸递减的顺序，你可以预览以下设备：


    - iPad Pro 13"

    - iPad Pro 10.5"

    - iPad Pro 9.7"

    - iPhone 8 Plus

    - iPhone X

    - iPhone 8

    - iPhone SE

    - iPhone 4S


    再回头看图 1-14，如果你仔细观察，会发现列表中的每款 iPhone 都有不同的屏幕宽高比。当将这些变量与竖屏和横屏模式结合起来时，iOS 开发者为何很久以前就放弃了为用户界面元素硬编码像素位置，原因就显而易见了。那样做会让你陷入无穷无尽的
    `if` 语句深渊！


    通过使用 Apple 的特征 API（`horizontalSizeClass`、`verticalSizeClass`、`displayScale`、`userInterfaceIdiom`），你可以在运行时确定当前运行设备的显示特性，而无需关心具体的设备型号或像素尺寸。然后，你可以利用这些信息来定义规则（*约束*），告诉
    Auto Layout 如何针对不同的屏幕配置（例如，横屏模式下的 iPad Pro，竖屏模式下的 iPhone SE）来调整界面元素。


    每个尺寸类别有两个可能的值：`regular`（常规）或 `compact`（紧凑）。Auto Layout 将 iPad 定义为纯粹的 `regular`
    设备。无论屏幕方向如何，其水平和垂直尺寸类别都返回 `regular` 值。然而，iPhone 会根据设备方向引入 `compact` 值。处于竖屏方向的
    iPhone，其垂直尺寸类别返回 `regular`，水平尺寸类别返回 `compact`。处于横屏方向的 iPhone，其垂直尺寸类别返回 `compact`，水平尺寸类别也返回
    `compact`。如果你想知道原因，图 1-15 应该能提供帮助。当你将竖屏方向的 iPhone X 与横屏方向的 10 英寸 iPad Pro 放在一起比较时，你会注意到它们的屏幕高度大致相同，但
    iPhone X 的宽度要小得多。当你将 iPhone X 旋转至横屏方向时，它的两个维度都会比 iPad Pro 小得多。


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig15_HTML.jpg](img/346879_2_En_1_Fig15_HTML.jpg)


    图 1-15：iPhone X 和 iPad Pro 物理尺寸对比


    在本项目中，你将通过 Interface Builder 将界面元素放置到应用的主故事板中，然后使用 IDE 为每个元素设置 Auto Layout 约束。Interface
    Builder 的预览工具允许你在不同的设备配置之间切换，从而查看你定义的规则是否足以完美适配目标设备。根据我以往的经验，最有效的方法是先在 Interface
    Builder 中处理好 Auto Layout 的大部分细节，然后再通过代码进行微调。

