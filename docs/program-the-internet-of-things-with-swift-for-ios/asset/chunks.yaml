- fmt: "### Stopping and Pausing Pedometer Updates\n\nFor the final pedometer-related\
    \ tasks, you must be able to stop and pause pedometer updates. To stop pedometer\
    \ updates, simply call the `stopUpdates()` method on your `CMPedometer` object\
    \ as part of the `toggleWorkout()` method, as shown in Listing [3-6](#346879_2_En_3_Chapter.xhtml#PC6).\n\
    \n```\n@IBAction func toggleWorkout() {\n    switch currentWorkoutState {\n  \
    \  case .inactive:\n        requestLocationPermission()\n    case .active:\n \
    \       currentWorkoutState = .inactive\n        stopWorkoutTimer()\n        pedometer?.stopUpdates()\n\
    \        WorkoutDataManager.sharedManager.saveWorkout(duration: workoutDuration)\n\
    \    default:\n        NSLog(\"toggleWorkout() called out of context!\")\n   \
    \ }\n    updateUserInterface()\n}\n```\n\n*Listing 3-6 Stopping Pedometer Updates*\n\
    \nThere is no pause method available for the pedometer; however, you can accomplish\
    \ the same task through careful management of which variable you use to manage\
    \ the time updates. The original implementation of the `startPedometerUpdates()`\
    \ method used the `workoutStartTime` property as the baseline for all pedometer\
    \ updates. All updates would generate data based on the period between the original\
    \ start time and the last update. You would not be able to implement accurate\
    \ pausing with this behavior. However, if you were to use `lastSavedTime`, the\
    \ property you created to manage the time updates for the workout duration label,\
    \ you could get a value that queried pedometer updates for a starting date that\
    \ would be updated when the user pressed the Pause and Resume buttons. In Listing\
    \ [3-7](#346879_2_En_3_Chapter.xhtml#PC7), I have updated the `startPedometerUpdates()`\
    \ method to use the `lastSavedTime` property and incremental data updates in its\
    \ calculation of workout distance.\n\n```\nfunc startPedometerUpdates() {\n  \
    \  guard let lastSavedTime = lastSavedTime else { return }\n    pedometer = CMPedometer()\n\
    \    pedometer?.startUpdates(from: lastSavedTime, withHandler: {\n        [weak\
    \ self] (pedometerData: CMPedometerData?, error: Error?) in\n        NSLog(\"\
    Received pedometer update!\")\n        if let error = error {\n            NSLog(\"\
    Error reading data: \\(error.localizedDescription)\")\n            return\n  \
    \      }\n        guard let pedometerData = pedometerData,\n              let\
    \ distance = pedometerData.distance as? Double,\n              let averagePace\
    \ = pedometerData.averageActivePace as? Double,\n              let steps = pedometerData.numberOfSteps\
    \ as? Int,\n              let floorsAscended = pedometerData.floorsAscended as?\
    \ Int else {\n            return\n        }\n        self?.workoutDistance +=\
    \ distance\n        self?.floorsAscended += floorsAscended\n        self?.workoutSteps\
    \ += steps\n        self?.averagePace = averagePace\n    })\n}\n```\n\n*Listing\
    \ 3-7 Incorporating Pausing into Pedometer Distance Calculations*\n\n### Getting\
    \ Activity Type\n\nAs you learned previously, Core Motion provides you with a\
    \ very accurate, easy-to-use pedometer. However, it can provide more than just\
    \ raw data alone. When Apple announced the Apple Watch, one of the slides it was\
    \ proud of was the public reveal of their fitness lab, where they employ a large\
    \ staff of engineers and researchers in the hope of finding better ways of measuring\
    \ and utilizing the sensor data generated by the M-series chips and Apple Watch.\
    \ One of the fruits of this labor was the ability to determine the type of activity\
