- fmt: '#### Asking the User to Change App Settings


    The only way to recover from the `denied` permission is when the user allows it
    in the page for your app within iOS''s Settings app. A common way to help encourage
    this activity is by creating an alert that sends the user directly to this page.
    Although iOS has much more limited settings for sharing data between apps when
    compared to a desktop computer or Android phone, `URL Schemes` (specially formatted
    URLs) have been an officially supported way of passing tiny bits of data between
    apps that register for their own scheme (for example, `mySocalApp://`). Data is
    passed back and forth as URL parameters (for example, `mySocalApp://?request=shareLink`).


    The iOS Settings app registers the `prefs://` scheme. Luckily, Apple makes finding
    the settings-specific URL for you. All you have to do is call the `UIApplicationOpenSettingsURLSetting`
    macro. In Listing [2-7](#346879_2_En_2_Chapter.xhtml#PC8), I have modified the
    `presentPermissionErrorAlert()` method to launch the Settings app from this URL.


    ```

    func presentPermissionErrorAlert() {

    let alert = UIAlertController(title: "Permission Error",

    message: "Please enable location services for this app",

    preferredStyle: UIAlertControllerStyle.alert)

    let okAction = UIAlertAction(title: "OK", style:

    UIAlertActionStyle.default, handler: {

    (action:  UIAlertAction) in

    if let settingsUrl = URL(string:

    UIApplicationOpenSettingsURLString),

    UIApplication.shared.canOpenURL(settingsUrl) {

    UIApplication.shared.open(settingsUrl,

    options: [:], completionHandler: nil)

    }

    })

    let cancelAction = UIAlertAction(title: "Cancel", style:

    UIAlertActionStyle.cancel, handler: nil)

    alert.addAction(okAction)

    alert.addAction(cancelAction)

    self.present(alert, animated: true, completion: nil)

    }

    Listing 2-7

    Sending the User to the Settings Page for Your App

    ```


    In the same way you had to check if location services were available before requesting
    permission, you must ask if the app can open the Settings URL before attempting
    to open it. One of the most unfortunate side effects of how Apple implements its
    protected resources is that if you do not ask for permission or availability,
    your app may crash at runtime. Runtime crashes are the number-one reason for App
    Store rejection.


    If users reject location permission for the app, the next time they press the
    Start button, they will see the flow in Figure [2-9](#346879_2_En_2_Chapter.xhtml#Fig9).
    Pressing the OK button will take them to the Settings page for IOTFit. When they
    return to the app, they can use it without a problem. You can test this by disabling
    location permission in the Settings app and then pressing the Start button within
    the IOTFit app.


    ![../images/346879_2_En_2_Chapter/346879_2_En_2_Fig9_HTML.jpg](images/346879_2_En_2_Chapter/346879_2_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Settings request flow for IOTFit


    ## Requesting Location Updates


    Now that the app is allowed to interact with the location features of iOS, you
    can begin polling for location updates. As indicated in the flowchart for the
    app from Figure [2-7](#346879_2_En_2_Chapter.xhtml#Fig7), every few seconds, you
    must save the most recent location, calculate the new workout time, and calculate
    the new workout distance. When the user pauses the workout, you must pause the
    updates. Resuming continues the time and distance updates.


    The flow for handling location updates in iOS is very similar to the flow for
    requesting location permission. First, let your location manager instance know
    you want location updates, then respond to these updates through the `locationManager:didUpdateLocations:`
    delegate method. To reduce the number of updates, you will have to set a limit
    on the accuracy of the location manager as well.


    In Listing [2-8](#346879_2_En_2_Chapter.xhtml#PC9), I have updated the `requestLocationPermission()`
    and `startWorkout()` methods and `CLLocationManagerDelegate` extension to include
    the location update request and delegate handler method.


    ```

    class CreateWorkoutViewController: UIViewController {

    ...

    func requestLocationPermission() {

    if CLLocationManager.locationServicesEnabled(){

    locationManager.desiredAccuracy =

    kCLLocationAccuracyHundredMeters

    locationManager.distanceFilter = 10.0 //meters

    locationManager.delegate = self

    ...

    }

    } else {

    presentEnableLocationAlert()

    }

    }

    func startWorkout() {

    currentWorkoutState = .active

    ...

    locationManager.startUpdatingLocation()

    }

    }

    extension CreateWorkoutViewController:

    CLLocationManagerDelegate {

    ...

    func locationManager(_ manager: CLLocationManager,

    didUpdateLocations locations: [CLLocation]) {

    guard let mostRecentLocation = locations.last else {

    NSLog("Unable to read most recent location")

    return

    }

    NSLog("Most recent location: \(String(describing:

    mostRecentLocation))")

    }

    Listing 2-8

    Requesting Location Permission When the Workout Begins

    ```


    The `locationManager:didUpdateLocations:` delegate method returns multiple locations,
    but for the sake of calculating distance, the last one is sufficient. In my code,
    I added a `guard-let` to validate the value before accessing it. With optional
    values that come back from hardware, the risk that they were not initialized is
    high (such as when the hardware is not ready, or a connection is down). It is
    not wise to force-unwrap in these situations.'
