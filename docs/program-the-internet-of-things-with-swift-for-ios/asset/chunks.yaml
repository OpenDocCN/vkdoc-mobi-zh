    ## Displaying Location Data on a Map


    Now that the IOTFit app is able to use location services on the iPhone to help
    users figure out how far they ran, it would be good to make this data useful to
    the users. When building an IoT application, you should think of how to use the
    data to help the user improve his/her life, as much as what it takes to talk to
    the hardware to collect that data. By allowing your users to visualize their workouts
    on a map, you can help them think about the effect of a path on their performance,
    research a path they liked, or give them a fun image to share with their friends.


    In the first half of this chapter, you learned how to use the `CLLocation` class
    to save location coordinate data and calculate the distance between two points.
    In this section, you will learn how to take that further, by converting this data
    into map pinpoints and a path. As you will learn, it is actually quite simple.
    Unfortunately, these operations require a set of data to work on, and Apple does
    not give you a free store for locations out of the box, so you will have to build
    one yourself. Luckily, however, this has also become a lot easier with iOS 11,
    with the help of the `Codable` protocol.


    ### Using the Codable Protocol for File-Based Data Storage


    One of the key features of any workout app is a history feature, which allows
    users to see their past workouts. In this first iteration of IOTFit, the history
    feature is a map that shows a path between the user’s starting and end points
    (represented as pinpoints). To enable this feature, you must add a class to save
    and retrieve workout data and modify the existing classes, to use it as their
    data source. For the IOTFit app, you will make a new class called `WorkoutDataManager`
    , to manage these duties and access it through a singleton object.


    A singleton is an object that can only be instantiated once within an application.
    It is a controversial design pattern, as many developers think singletons serve
    the same purpose as global variables (having side effects and being shared everywhere
    in an application), but I want to introduce them, as Apple uses them frequently
    in its hardware APIs, and I feel they are appropriate in situations in which you
    must manage access to a shared resource within an application.


    To let users access data after closing the app, the `WorkoutDataManager` will
    use a property-list (`.plist`) file as its persistent data store. Property-lists,
    like the one you used earlier to configure location permissions for the app, are
    frequently used to store settings and simple data sets in iOS, both as bundled
    files and documents. In the old days, you would have to write the entire data
    input/output (I/O) stack yourself, but now, thanks to the `Codable` protocol,
    all you have to do is abstract your information into basic data types (for example,
    `Int`, `String`) that implement the protocol, write adapters to help serialize
    more complex types (like `CLLocation`) to your basic ones, and then specify the
    format you want to store your data as (for example, JSON, Property-List).


    ### Caution


    The code in this section will only work in iOS 11 and later versions. The `Codable`
    protocol was introduced in iOS 11, along with Swift 4.


    To get started, you must create the `WorkoutDataManager` class. As shown in Figure
    [2-10](#346879_2_En_2_Chapter.xhtml#Fig10), go to the File menu and select New
    ➤ File.


