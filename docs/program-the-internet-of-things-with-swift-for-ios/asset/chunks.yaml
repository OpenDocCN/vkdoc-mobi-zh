    # Express 工作原理快速入门


    Express 通过监听指定端口上的 HTTP 请求，然后根据特定的*端点*来响应这些请求。端点定义为可供 API 使用者调用的函数，由*路由*（附加到服务器地址上的路径部分）以及用于发起请求的
    HTTP 方法（例如 `GET`、`POST`）共同构成。在整个 Web 应用开发过程中，你会看到这两个术语经常互换使用。为了减少混淆，我认为最清晰的解释是：*端点*主要用于描述与服务器之间的外部（面向客户端）交互，而*路由*则主要用于描述
    Express 应用程序的内部逻辑。


    例如，如果你想从 IP 地址为 `10.0.1.5` 的服务器获取电影标题列表，请求将是 `GET 10.0.1.5/movie/titles`。`GET`
    方法通常用于读取数据。在这个例子中，路由是 `/movie/titles`，而 `GET` 是端点。在 Express 中，这个端点的代码看起来像这样：


    ```

    app.get(''/movie/titles'', function (req, res) { ... }

    ```


    另一方面，为新电影创建一条记录可能看起来像这样：`POST 10.0.1.5/movie/new`。`POST` 方法通常用于添加新记录。在数据库编程中，术语
    *CRUD* 用于描述任何类型数据的四种主要操作：创建、读取、更新和删除。许多后端开发人员喜欢使用相同的模型来命名他们的路由，他们会在路由后面附加 `/new`、`/delete`
    或 `/update`，以表示这是一个创建、更新或删除操作。在 Express 中，这个端点的代码将是：


    ```

    app.post(''/movie/now'', function (req, res) { ... }

    ```


    正如你所看到的，在 `app` 对象上调用的方法以及路由的字符串都发生了变化。


    最后，另外两个最常用的 `HTTP` 方法是 `PUT` 和 `DELETE`，它们用于更新和删除记录。在本章中你不会用到它们，但它们在未来的个人项目中可能会对你有帮助。


    默认情况下，当你在浏览器中加载一个网页时，浏览器会尝试向服务器文档根目录的 TCP 端口 80（为 HTTP 流量保留的端口）发起一个 `GET` 请求。要在
    Express 中表示这一点，请在你的对象上使用 `get()` 方法，来指定应为根目录执行的代码。要让 Express 监听请求，请使用 `app` 对象上的
    `listen()` 方法。路由和监听器的实现都显示在清单 8-3 中。


    ```

    var express = require(''express'');

    var app = express();

    app.get(''/'', function (req, res) {

    res.send(''Hello World'');

    });

    app.listen(3000);

    清单 8-3

    创建一个新的基于 Express 的 Node 应用程序

    ```


    在这个例子中，我指示 Node 在收到对文档根目录的 `GET` 请求时发送文本 `Hello World`。`res` 对象内置于 Node 中，它指定了你希望以
    HTTP 响应的形式输出内容。在这个例子中，我让 Express 监听端口 3000 而不是标准的 HTTP 端口 80，因为 Node 将端口 80 视为*特权*端口。除非你以
    root 或系统用户帐户登录，否则无法通过此端口运行应用程序。在本节稍后部分，你将切换到端口 80，但对于初始测试，最好使用非特权端口。


    要验证 Express 应用程序是否正常工作，你必须先告诉 Node 开始执行新脚本，然后尝试从 Web 浏览器发起请求。


    在启动服务器之前，你必须获取树莓派的 IP 地址。在终端内部，使用 `ifconfig` 命令查看设备信息。如图 8-1 所示，IP 地址将出现在 `inet`
    字段旁边，位于 `wlan0` 接口（代表内置的 Wi-Fi 接口）的记录下方。


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig1_HTML.jpg](img/346879_2_En_8_Fig1_HTML.jpg)


    图 8-1


    获取树莓派的 IP 地址


    接下来，通过调用 `node` 命令并指定脚本的文件名，开始执行 Node 应用程序。


    ```

    node app.js

    ```


    最后，在网络中的另一台计算机上打开你最喜欢的浏览器，输入树莓派的 URL，并附上端口号（3000）。你的 `"Hello World"` 字符串应该以纯文本形式出现在浏览器中，如图
    8-2 所示。


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig2_HTML.jpg](img/346879_2_En_8_Fig2_HTML.jpg)


    图 8-2


    在浏览器中验证 Hello World 示例


    恭喜你创建了第一个 Node 应用程序！它会持续运行，直到你在树莓派上终止 Node 进程。

    '
- fmt: '### Reading Values from the DHT Temperature Sensor


    Now that you have the hang of adding a Node module and Express route, you can
    begin to refine your simple example to mirror the status of the temperature sensor
    via HTTP. To begin, enter `Ctrl+C` into the terminal, to kill Node.js, then install
    the `node-dht-sensor` module using `npm`.


    ```

    npm install node-dht-sensor

    ```


    For my example, I thought it would make sense to use the `temperature` path extension
    to represent the temperature and humidity sensor. As shown in Listing [8-4](#346879_2_En_8_Chapter.xhtml#PC10),
    include the `node-dht-sensor` module in your application and add a route and end
    point for `GET` requests to the `temperature` path extension.


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var app = express();

    app.get(''/temperature'', function (req, res) {

    //Your cool code will go here

    });

    app.listen(80);

    Listing 8-4

    Defining a New Route for the Temperature Sensor

    ```


    At this point, I recommend making two changes: removing the end point for the
    earlier example and changing the port to 80. Many web servers are easily hacked
    when debugging end points are left active. Vigilant code maintenance is an easy
    way to reduce this risk in your applications. By using port 80, you will also
    be able to make your server behave closer to the HTTP specification, which states
    that HTTP traffic is transmitted on TCP/IP port 80.


    Next, you must use the `node-dht-sensor` module to retrieve the data from the
    sensor. Referring to the documentation for the module available at its GitHub
    repository ( [`https://github.com/momenso/node-dht-sensor`](https://github.com/momenso/node-dht-sensor)
    ), you will learn that you can perform this operation by calling the `read()`
    method on your `dht` object, specifying the sensor type (`22` for DHT22 or `11`
    for DHT11), the general-purpose input/output (GPIO) pin its data line is connected
    to, and a callback method that will execute when the reading is complete. In my
    example in Chapter [7](#346879_2_En_7_Chapter.xhtml), I used GPIO 21 for the DHT22
    sensor. In Listing [8-5](#346879_2_En_8_Chapter.xhtml#PC11), I have expanded the
    example to include reading the data from the temperature sensor.


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var app = express();

    app.get(''/temperature'', function (req, res) {

    dht.read(22, 21, function(err, temperature, humidity) {

    res.type(''json'');

    if (!err) {

    res.json({

    ''temperature'': temperature.toFixed(1),

    ''humidity'':  humidity.toFixed(1)

    });

    } else {

    res.status(500).json({error: ''Could not access

    sensor''});

    }

    });

    });

    app.listen(80);

    Listing 8-5

    Reading DHT22 Data from a Node Application

    ```


    In this example, you will notice that I used the `json()` method on the `res`
    object, to send back the temperature data. While plain text was sufficient for
    the `Hello World` example, using JSON (JavaScript Object Notation) is a widely
    adopted practice to represent dictionaries and hierarchical data in web application
    development. Additionally, most web and mobile frameworks these days provide built-in
    JSON validation and encoding/decoding, making it much easier to work with than
    custom data types. Following this line of reasoning, you will notice that I also
    used the `status()` method to return the error as a standard HTTP 500 server error.
    This allows you to use built-in HTTP error handling.


    Next, you must restart the Node application. Kill the existing process, then run
    the script again with superuser permission.


    ```

    sudo node app.js

    ```


    ### Tip


    If you would like your Node application to automatically restart whenever you
    change its source code, I recommend looking into the `nodemon` tool, available
    via `npm` and GitHub at [`https://github.com/remy/nodemon`](https://github.com/remy/nodemon).
    While this tool can be convenient during the development phase, I recommend disabling
    it in production.


    To verify that the new route is working, attempt to load it in a web browser,
    by appending `/temperature` to the old URL. You should receive a plain text response
    containing the JSON-encoded temperature and humidity, as shown in Figure [8-3](#346879_2_En_8_Chapter.xhtml#Fig3).


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig3_HTML.jpg](images/346879_2_En_8_Chapter/346879_2_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Verifying the temperature route in a browser


    ### Caution


    It takes approximately two seconds for the DHT22 temperature and humidity sensor
    to get an accurate reading. Keep this in mind if you are getting stale data or
    time-outs when pinging the `temperature` route.'
