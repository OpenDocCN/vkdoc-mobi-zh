- fmt: 'Although it breaks the pattern of many of Apple’s other APIs, the only way
    to execute the query is by attempting to perform an operation on the Keychain
    (`copy`, `update`, `add`, or `delete`). Because the `SecItemCopyMatching(query:result:)`
    method does not return an error object, you can verify the result of the operation
    via the `OSStatus` value that is returned after performing the operation. Any
    value other than `errSecSuccess` indicates that the operation failed. When I was
    debugging this application, I noticed that searching for the error code in Google
    was effective in determining the failure reason. Apple uses the `OSStatus` type
    in both iOS and OS X, so there is a wealth of information on what its possible
    values represent.


    ### Note


    The terms `Security Enclave` and `Keychain` are used interchangeably on iOS, as
    Keychain Services borrows its design from Keychain Services on macOS. In macOS,
    the secure store is referred to colloquially as `the Keychain`.


    Next, you must make the call to check if the passcode exists and prompt the user
    to enter a password if it does not. It would make sense that before presenting
    the security view, which contains a password text field, you should check if there
    is a password to validate against. In my implementation, I performed this logic
    by adding a call to check the password state, after presenting the security view
    in the `showSecurityView()` methods in the `WorkoutMapViewController` and `WorkoutTableViewController`
    classes, as shown in Listing [11-12](#346879_2_En_11_Chapter.xhtml#PC12).


    ```

    class WorkoutTableViewController:

    UITableViewController {

    ...

    func showSecurityView() {

    if let securityView = self.securityView,

    securityView.isHidden == true {

    ...

    }

    securityView?.checkPasswordExistence()

    }

    }

    Listing 11-12

    Checking If a Password Has Been Set When Presenting the Security View (WorkoutTableViewController.swift)

    ```


    To handle the case in which the password does not exist, you must create a method
    for saving a string value to the Keychain. As mentioned earlier, all Keychain
    Services operations must be executed with a query. When it comes to adding a new
    item to the Keychain, the query is almost exactly like that for looking up a value,
    except that you need to include the new value as binary data. In Listing [11-13](#346879_2_En_11_Chapter.xhtml#PC13),
    I have added this logic to the `SecurityView` class via the `savePassword(password:)`
    method. Pay careful attention to the `kSecValueData` key-value pair and `SecItemAdd(query:result:)`,
    as they are responsible for implementing the `add value` operation.


    ```

    protocol SecurityViewDelegate {

    ...

    func needsInitialPassword()

    func didSavePassword(success: Bool)

    }

    class SecurityView: UIView {

    ...

    func savePassword(password: String) {

    guard let passwordData = password.data(using:

    String.Encoding.utf8) else { return }

    let query: [String: Any] = [kSecClass as String:

    kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecValueData as String: passwordData]

    let queryStatus = SecItemAdd(query as CFDictionary,

    nil)

    if queryStatus == errSecSuccess {

    delegate?.didSavePassword(success: true)

    } else {

    NSLog("Error saving passcode: \(queryStatus)")

    delegate?.didSavePassword(success: false)

    }

    }

    }

    Listing 11-13

    Saving a Value to the Keychain (SecurityView.swift)

    ```


    As with checking the password status, I expanded the `SecurityViewDelegate` protocol
    to include a method for indicating whether the password was saved successfully.
    To complete the process of saving the password, implement the `needsInitialPassword()`
    and `didSavePassword(success:)` methods in the `WorkoutTableViewController` and
    `WorkoutMapViewController` classes, as shown in Listing [11-14](#346879_2_En_11_Chapter.xhtml#PC14).
    In my implementation, I chose to present a `UIAlertController` with a text field
    to accept the new password and logged the result of the operation to the console
    using `NSLog()`.


    ```

    extension WorkoutTableViewController: SecurityViewDelegate {

    func needsInitialPassword() {

    let alert = UIAlertController(title: "Initial

    installation", message: "Please set a passcode for

    your data", preferredStyle: .alert)

    alert.addTextField { (textField: UITextField) in

    textField.placeholder = "Password"

    textField.isSecureTextEntry = true

    }

    let okAction = UIAlertAction(title: "OK", style:

    .default) { [weak self] (action: UIAlertAction) in

    guard let textField = alert.textFields?.first,

    let password = textField.text else { return }

    self?.securityView?.savePassword(password:

    password)

    }

    let cancelAction = UIAlertAction(title: "Cancel",

    style: .cancel, handler: nil)

    alert.addAction(okAction)

    alert.addAction(cancelAction)

    present(alert, animated: true)

    }

    func didSavePassword(success: Bool) {

    NSLog("Password save status: \(success)")

    }

    ...

    }

    Listing 11-14

    Prompting for a New Password (WorkoutTableViewController.swift)

    ```


    For the final step in the password validation process, you must implement the
    `validatePassword()` method in the `SecurityView` class, which should compare
    the saved password to the text that was entered into the text field on the security
    view. The query for extracting the value from the Keychain is exactly like that
    for detecting the presence of a value; however, after performing the `copy` operation,
    you should inspect its result to extract the password. In Listing [11-15](#346879_2_En_11_Chapter.xhtml#PC15),
    I have implemented this by adding a `getSavedPassword()` method to the `SecurityView`
    class.


    ```

    class SecurityView: UIView {

    ...

    private func getSavedPassword() -> String? {

    let query: [String: Any] = [kSecClass as String:

    kSecClassGenericPassword,

    kSecAttrAccount as String: ACCOUNT_NAME,

    kSecMatchLimit as String: kSecMatchLimitOne,

    kSecReturnAttributes as String: true,

    kSecReturnData as String: true]

    var keychainItemRef: CFTypeRef?

    let queryStatus = SecItemCopyMatching(query as

    CFDictionary, &keychainItemRef)

    guard queryStatus == errSecSuccess,

    let keychainItem = keychainItemRef as? [String:

    Any],

    let passwordData = keychainItem[kSecValueData as

    String] as? Data,

    let password = String(data: passwordData, encoding:

    String.Encoding.utf8)

    else { return nil }

    return password

    }

    @IBAction func validatePassword(sender: UITextField) {

    guard let input = sender.text,

    let savedPassword = getSavedPassword(),

    input == savedPassword else {

    delegate?.didFinishWithError(description:

    "Invalid password")

    return

    }

    delegate?.didFinishWithAuthenticationType(.password)

    }

    }

    Listing 11-15

    Validating a Password Against a Saved Value in the Keychain (SecurityView.swift)

    ```


