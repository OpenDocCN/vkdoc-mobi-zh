    代码清单 4-2：在读取或写入健康数据前请求健康权限


    为了减少重复代码，我创建了一个计算属性`hkDataTypes`来表示应用所需的数据类型列表。用于请求权限的类型必须是`HKSampleType`抽象类的实现。顾名思义，它们代表以样本形式保存和测量的数据。你将在下一节中了解更多关于
    HealthKit 如何表示数据的信息。样本只是你可以使用的众多类型之一。目前需要记住的最重要的一点是，与健康权限一样，并非所有样本类型都适用于所有 iOS
    设备，在尝试使用之前，你必须查询你想要使用的类型。


    现在，如果你运行 IOTFit 应用并尝试保存一次锻炼，将会看到健康权限提示，如图 4-4 所示。用户可以在此界面上有选择地允许权限，或全部开启。当他们按下“允许”按钮后，设置将被保存，并且应用中的完成回调将会执行。


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig4_HTML.jpg](img/346879_2_En_4_Fig4_HTML.jpg)


    图 4-4：IOTFit 应用的健康权限提示


    ## 将数据写入 HealthKit


    开始使用 HealthKit 最简单的方法就是用它来将锻炼记录保存到 HealthKit 存储中。在前面的章节中，你已经生成了足够的数据来获取用户活动的良好快照，但这些数据需要被序列化（整理）成
    HealthKit 可以消费的格式。HealthKit 并非像`String`或`Float`那样以简单数据类型存储，而是采用了一种分层系统，允许你将相关的统计数据分组整理在一起。它还有自己的一套单位系统，你必须学习如何使用，以便使你的数据符合
    HealthKit 存储所能识别的格式。在本节中，你将了解此系统的概念基础，以及如何使用它将原始数值转换为健康数据。


    ### 理解 HealthKit 如何表示数据


    iOS 中的 HealthKit 存储将数据分为两大类：*特征数据*和*样本数据*。特征数据是关于用户的定性信息，用特征而非单位来描述，并且不经常变化。例如，用户的血型或肤色。在
    HealthKit 中，这些由`HKCharacteristicType`类的实例表示。样本数据是指由用户行为产生的信息，可以用定量单位（例如，米）或数据的定量描述符（例如，步数）或聚合行为（例如，锻炼）来衡量和描述。在
    HealthKit 中，这些由`HKSample`类的子类表示。在 IOTFit 应用中，你将主要处理样本数据。


    在 HealthKit 术语中，定量样本数据（例如步数或距离）被称为*数量样本*，由`HKQuantitySample`类的对象表示。描述活动特征的样本数据（例如，一次锻炼应被描述为骑行还是跑步）被称为*类别样本*，由`HKCategorySample`对象表示。为了描述聚合活动，HealthKit
    定义了两种最终的样本类型：*锻炼*和*关联*。锻炼由`HKWorkout`对象表示，其用途正如其名：旨在表示关于用户执行的一次锻炼的一组数据。关联由`HKCollection`对象表示，虽然其名称的含义有点难以推导，但其用途与锻炼相似：它们专门用于对关于已摄入食物或血压读数的数据进行分组。


    HealthKit 中的单位由`HKUnit`对象表示。在存储定量样本时，你必须指定使用哪个`HKUnit`类来表示数据。你可以使用 Apple 为常用单位提供的便捷方法（例如，`HKUnit.meter()`），也可以通过向`HKUnit`类的`init(from:)`便捷初始化方法传递一个`String`来定义你自己的单位。

