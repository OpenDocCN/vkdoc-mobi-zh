    2 章中使用位置追踪构建运动应用时所做的那样。


    与第 2 章的项目类似，在请求用户位置之前，必须先为 tvOS 的位置权限请求对话框设置描述信息。如图 9-13 所示，打开 IOTHomeTV 目标的 `Info.plist`
