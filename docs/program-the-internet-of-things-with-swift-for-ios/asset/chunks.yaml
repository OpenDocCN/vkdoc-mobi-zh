  trans: '

    # 学习目标


    在本章中，你将通过学习如何运用**面容 ID**、**触控 ID** 和**钥匙串**服务来保护数据安全。具体做法是沿用前几章中的 IOTFit 应用，利用这些
    API 将应用访问权限仅限授予 iOS 设备所有者，或通过存储在钥匙串中的密码进行授权。通过对 IOTFit 应用实施这些改进，你将掌握以下物联网应用开发的关键概念：


    -   创建锁屏用户界面

    -   判断设备是否支持面容 ID 和触控 ID

    -   使用面容 ID 和触控 ID 限制应用访问权限

    -   在 iOS 钥匙串中存储和读取值

    -   检测应用从后台返回时的状态


    存储在 HealthKit 存储区中的锻炼数据由设备上的“健康”应用进行加密和管理；不过，你可以通过禁用 `WorkoutDataManager` 类中用于将数据备份到应用
    `Documents` 文件夹下 `.plist` 文件的那部分功能，来进一步增强安全性。尽管应用包中的数据对其他应用不可用，但通过 Mac 或 PC 上的备份应用仍然可以提取这些数据。


    与本书之前的项目类似，完整项目的源代码可从本书的 GitHub 页面获取（`https://github.com/Apress/program-internet-of-things-w-swift-for-ios`）。如果你想回顾
    IOTFit 应用中健康功能的创建过程，请参阅第 2 至第 4 章。如果你想了解如何为 Web 服务器应用添加 HTTPS，请参阅第 8 章。


    # 项目设置


    开始之前，请通过复制之前的项目，或从本书的 GitHub 仓库下载副本，来创建第 10 章中 IOTFit 应用的副本。由于面容 ID 比触控 ID 或在
    iPhone 上输入密码更容易被无意触发，Apple 要求在你的应用中启用该功能前必须获得用户许可。与 HealthKit（第 4 章）的情况类似，当用户首次在应用中尝试使用面容
    ID 时，将会弹出此权限提示。另一个与 HealthKit 的相似之处在于，通过在应用的 `Info.plist` 文件中为其定义一条消息字符串，即可启用该权限提示。


    如图 11-1 所示，要为你的应用设置面容 ID 权限提示消息，请在项目导航器中打开 `IOTFit` 目标的 `Info.plist` 文件，点击任意列中的
    `(+)` 按钮，并为隐私 – 面容 ID 使用说明键值对添加一个新条目。在我的实现中，我使用了消息：“IOTFit 希望使用面容 ID 来保护您的锻炼数据。”


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig1_HTML.jpg](img/346879_2_En_11_Fig1_HTML.jpg)


    图 11-1 添加面容 ID 权限提示的消息字符串


    ## 创建锁屏用户界面


    当我在思考如何设计一个用于演示面容 ID 的项目时，我脑海中浮现的最佳示例是 1Password 密码管理器应用的锁屏。如图 11-2 所示，在访问该应用的用户界面之前，1Password
    会要求你输入密码，或按下面容 ID 按钮以使用面容 ID 解锁应用。验证成功后，锁屏会执行一个模拟门打开的动画，动画完成后便会显示主界面。


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig2_HTML.jpg](img/346879_2_En_11_Fig2_HTML.jpg)


    图 11-2 1Password 密码管理器的锁屏


    虽然完整的动画有点超出本项目的范围，但我认为显示全屏覆盖层以屏蔽敏感功能的想法普遍适用。在 IOTFit 应用中，最敏感的数据是用户过去的位置和锻炼数据。如图
    11-3 所示，我扩展了应用的线框图，在“锻炼历史”和“上次跑步”屏幕上显示了一个简单的锁屏。为简单起见，每当在标签栏中导航到这些屏幕时，以及当应用变为活跃状态时，你将显示锁屏。


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig3_HTML.jpg](img/346879_2_En_11_Fig3_HTML.jpg)


    图 11-3 IOTFit 应用的设计线框图，包含锁屏


    与 1Password 一样，我加入了一个用于启动面容 ID（或触控 ID）的按钮，以及一个作为备用验证方式的密码文本字段。在应用中，通过检测设备上可用的传感器，你可以更新文本以显示触控
    ID 或面容 ID。与 1Password 不同的是，我只在显示数据的屏幕上方应用了锁屏，因为该应用的主要目的是记录锻炼，并且减少操作步骤，降低用户的使用门槛是良好的设计实践。


    为防止锁屏阻碍访问标签栏，我建议将锁屏实现为一个 `UIView`，它将显示在“锻炼历史”和“上次跑步”视图控制器的内容之上。验证成功后，你将使用一个简单的动画来关闭该视图并显示数据。要开始此过程，你必须创建一个新的
    `UIView` 子类和 NIB (`.xib`) 文件来表示锁屏。


    与本书之前的示例类似，通过转到“文件”菜单并选择“新建” ➤ “文件…”来创建 `UIView` 子类。从出现的模板选择器中，选择 iOS ➤ Cocoa
    Touch 类。如图 11-4 所示，创建一个名为 `SecurityView` 的 `UIView` 子类。


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig4_HTML.jpg](img/346879_2_En_11_Fig4_HTML.jpg)


    图 11-4 向项目添加 `UIView` 子类


    由于 `UIView` 子类无需修改即可在 Objective-C 类中使用，当你首次将其添加到 Swift 项目时，系统会提示你向项目添加一个 Objective-C
    桥接头文件，如图 11-5 所示。选择“创建桥接头文件”以创建桥接头文件并继续设置过程。


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig5_HTML.jpg](img/346879_2_En_11_Fig5_HTML.jpg)


    图 11-5 提示向 Swift 项目添加 Objective-C 桥接头文件

    '
- fmt: 'Next, you must create a NIB (`.xib`) file to manage the visual layout of the
    `SecurityView` class. While previous examples in the book managed all of these
    user interfaces on a single storyboard file, when you are creating a view that
    will be reused multiple places in an app, the common practice in the industry
    is to manage the single view in its own NIB file. NIBs are the original visual
    layout tool for Interface Builder and are intended to manage single views or view
    controllers, as opposed to storyboards, which are designed to manage common segues
    between multiple view controllers. To create a new NIB, open the File menu again
    and select New ➤ File`...` one more time. This time, scroll further down in the
    iOS template picker, as shown in Figure [11-6](#346879_2_En_11_Chapter.xhtml#Fig6),
    and select View. When asked to name the file, use the name `SecurityView.xib`,
    to match the `UIView` subclass.


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig6_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig6_HTML.jpg)


    Figure 11-6

    Selecting a View NIB from the Xcode template picker


    After clicking the NIB file in the Project Navigator, you should see a single
    blank view inside Interface Builder, similar to when you created a new storyboard
    file. Using Table [11-1](#346879_2_En_11_Chapter.xhtml#Tab1) as a guide, lay out
    the user interface, paying particular attention to the `UITextField` for password
    entry and the `UIButton` for presenting Face ID.


    Table 11-1

    Styling for Security View User Interface Elements


    | Element Name | Text Style | Align Relative to | Top Margin | Bottom Margin |
    Left Margin | Right Margin |

    | --- | --- | --- | --- | --- | --- | --- |

    | “Verification Required” label | Title 1 | View | 60 | 40 | 40 | 40 |

    | “Description” label | Footnote | “Verification” label | 40 | 40 | 40 | 40 |

    | “Password” text field | Body | “Description” label | 40 | 8 | 80 | 80 |

    | “or” label | Footnote | “Password” text field | 8 | 8 | 80 | 80 |

    | “Use Face ID” button | Body | “or” label | 8 | — | 80 | 80 |


    The NIB file for your completed security view should resemble the screenshot in
    Figure [11-7](#346879_2_En_11_Chapter.xhtml#Fig7), after applying these styles.
    In the same manner as in previous chapters, your next step should be to define
    the `SecurityView` class, including its properties.


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig7_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig7_HTML.jpg)


    Figure 11-7

    Final layout for the security view


    Switch back to the `SecurityView.swift` class and use my example in Listing [11-1](#346879_2_En_11_Chapter.xhtml#PC1)
    as a starting point for your implementation. Pay careful attention to declare
    the button and text field with the `@IBOutlet` keyword and the button handlers
    with the `@IBAction` keyword, so that both will be compatible with Interface Builder.


    ```

    import UIKit

    class SecurityView: UIView {

    @IBOutlet var unlockButton: UIButton?

    @IBOutlet var passwordTextField: UITextField?

    @IBAction func validatePassword(sender:

    UITextField) {

    //password handling will go here

    }

    @IBAction func validateBiometrics(sender:

    UIButton) {

    //biometrics handling will go here

    }

    }

    Listing 11-1

    Initial Definition for the SecurityView Class

    ```


    To round out the `SecurityView` class, you will have to connect its outlets to
    the parent class. As with previous examples, you can find detailed instructions
    for this process in Chapter [1](#346879_2_En_1_Chapter.xhtml). In particular,
    do not forget to:


    *   Set the `SecurityView` class as the parent class in the Identity Inspector
    (the third tab from the left).

    *   Connect the `unlockButton` and `passwordTextField` on the NIB file to their
    respective properties in the class (using the Connections Inspector).

    *   Connect the `passwordTextField`’s `delegate` property to the `SecurityView`
    class (so you can handle its events).

    *   Connect the `unlockButton`’s `Touch Up Inside` event to the `validateBiometrics(sender:)`
    method.


    After making all of the connections, the Connections Inspector for the security
    view should resemble the screenshot in Figure [11-8](#346879_2_En_11_Chapter.xhtml#Fig8).


    ![../images/346879_2_En_11_Chapter/346879_2_En_11_Fig8_HTML.jpg](images/346879_2_En_11_Chapter/346879_2_En_11_Fig8_HTML.jpg)


    Figure 11-8

    Connections Inspector for completed security view


    For the final user interface setup tasks, you must display the security view when
    the `WorkoutMapViewController` and `WorkoutTableViewController` classes become
    visible. To begin, you must load the security view from the NIB file and make
    it available to the calling class. Unlike the Main storyboard, which is loaded
    as part of the app’s initialization process, to load a view from a NIB file, you
    must attempt to load the file via its bundle path (its relative path in the .app
    bundle) and verify that the contained class matches your expectations. In Listing
    [11-2](#346879_2_En_11_Chapter.xhtml#PC2), I have implemented this via a `setupSecurityView()`
    method, in which I use the `Bundle` class to load this view and then use the main
    view for calling the view controller to set the size and destination for the security
    view.


    ```

    class WorkoutTableViewController: UITableViewController {

    ...

    var securityView: SecurityView?

    override func viewDidLoad() {

    super.viewDidLoad()

    ...

    setupSecurityView()

    }

    ...

    func setupSecurityView() {

    guard let securityNibItems =

    Bundle.main.loadNibNamed("SecurityView", owner:

    nil, options: nil),

    let securityView = securityNibItems.first as?

    SecurityView else { return }

    securityView.frame = view.frame

    securityView.autoresizingMask =  [.flexibleWidth,

    .flexibleHeight]

    self.securityView = securityView

    view.addSubview(securityView)

    }

    }

    Listing 11-2

    Adding the Security View to a View Controller ( WorkoutTableViewController.swift
    )

    ```


    For the sake of brevity, my code listings for this chapter will be for the `WorkoutTableViewController`
    class only, but all of the same logic can be copied directly into the `WorkoutMapViewController`
    class, with a few exceptions, which I will point out throughout the chapter.


    To make the security view visible to the user, you must bring it to the top of
    the view hierarchy when the `WorkoutTableViewController` or `WorkoutMapViewController`
    classes become active. In Listing [11-3](#346879_2_En_11_Chapter.xhtml#PC3), I
    perform this step via the `showSecurityView()` method, which is called from the
    `viewWillAppear()` method.


    ```

    class WorkoutTableViewController: UITableViewController {

    ...

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    ...

    showSecurityView()

    }

    ...

    func showSecurityView() {

    if let securityView = self.securityView,

    securityView.isHidden == true {

    tableView.reloadData()

    securityView.alpha = 1.0

    securityView.isHidden = false

    view.bringSubview(toFront: securityView)

    }

    }

    }

    Listing 11-3

    Presenting the Security View When a Tab Becomes Active ( WorkoutTableViewController.swift
    )

    ```


    As the name *view hierarchy* suggests, views are presented as a stack, with the
    topmost view being the one that the user sees. When you built your user interfaces
    in Interface Builder, you simply added child views to the main view. As all of
    the child views were on the same presentation level (z-order), there was no need
    to manage view visibility. In the case of the security view, it should be presented
    over every other view in its calling class, to obstruct the user interface during
    the locked state. I was able to perform this operation in the `showSecurityView()`
    method. I used the `bringSubview(toFront:)` method on the main view. To avoid
    side effects, I also used the `isHidden` property on the security view, to prevent
    the view from being presented twice, if it was already active.'
