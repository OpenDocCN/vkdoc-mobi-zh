- fmt: '# Monitoring Characteristic Updates


    Having discovered what the peripheral is capable of, the last remaining steps
    are to indicate that the `BluetoothService` object should receive updates when
    the characteristic values change and to pass these changes along to the `BluetoothService`
    delegate. To register for the updates, you will have to modify the `peripheral(didDiscoverCharacteristicsFor:error:)`
    method. The method returns a `CBService` object containing valid references to
    all of the available services on the device. Use the `characteristics` property
    to extract these values from the service, then use the `setNotifyValue(enabled:for:)`
    method on the `CBPeripheral` object to indicate that you want to receive the updates,
    as shown in Listing 6-20. To limit the number of messages that are received, use
    the known UUIDs for the battery and lock characteristics.


    ```

    extension BluetoothService: CBPeripheralDelegate {

    ...

    func peripheral(_ peripheral: CBPeripheral,

    didDiscoverCharacteristicsFor service: CBService,

    error: Error?) {

    guard let characteristics = service.characteristics

    else { return }

    for characteristic in characteristics {

    if characteristic.uuid == doorCharUUID {

    self.connectedPeripheral?.setNotifyValue(true,

    for: characteristic)

    }

    if characteristic.uuid == battCharUUID {

    self.connectedPeripheral?.setNotifyValue(true,

    for: characteristic)

    }

    }

    self.connectionStatus = .connected

    delegate?.didUpdateConnection(status:

    connectionStatus)

    }

    }

    ```

    *Listing 6-20* – Registering for Characteristic Updates


    To handle the characteristic updates, implement the `peripheral(didUpdateValueFor:error:)`
    method. This method returns a `CBCharacteristic` object, including the raw binary
    data from the characteristic object. Since the updates were transmitted from the
    Arduino device as character strings, in this method, you should try to convert
    the raw data to strings. The easiest way to do this is with the `String` class''s
    `String(data:encoding:)` constructor method. Generally, UTF-8 is the safest encoding
    to use when parsing plain text English, but you can also try Unicode encoding,
    if you plan on working with non-English characters.


    Because the `IOTHome` app should be able to handle door or battery updates independently
    of each other, you should pass their updates via separate methods in the `BluetoothServiceDelegate`
    protocol. In Listing 6-21, I have implemented the `peripheral(didUpdateValueFor:error:)`
    method with this logic. When the updates come in, I check which characteristic
    UUID they are originating from, convert the data to a string, and then call the
    `didReceiveDoorUpdate(value:)` method or `didReceiveBatteryUpdate(value:)` method.


    ```

    extension BluetoothService: CBPeripheralDelegate {

    ...

    func peripheral(_ peripheral: CBPeripheral,

    didUpdateValueFor characteristic: CBCharacteristic,

    error: Error?) {

    guard let characteristicData = characteristic.value

    else { return }

    if characteristic.uuid == doorCharUUID,

    let stringValue = String(data: characteristicData,

    encoding: String.Encoding.utf8) {

    delegate?.didReceiveDoorUpdate(value: stringValue)

    }

    if characteristic.uuid == battCharUUID,

    let stringValue = String(data: characteristicData,

    encoding: String.Encoding.utf8) {

    delegate?.didReceiveBatteryUpdate(value:

    stringValue)

    }

    }

    }

    ```

    *Listing 6-21* – Handling Characteristic Updates


    Finally, to update the user interface when the updates come in, switch to the
    `DoorViewController` class. As shown in Listing 6-22, inside the `didReceiveDoorUpdate(value:)`
    and `didReceiveBatteryUpdate(value:)` methods, update the status labels with the
    new values.


    ```

    extension DoorViewController: BluetoothServiceDelegate {

    func didReceiveDoorUpdate(value: String) {

    let statusString = (value == "1") ? "Locked" :

    "Unlocked"

    let dateString = dateFormatter.string(from: Date())

    statusLabel?.text = statusString

    lastUpdatedLabel?.text = "(Last Updated: \(dateString))"

    }

    func didReceiveBatteryUpdate(value: String) {

    batteryLabel?.text = "Battery Level: \(value)%"

    }

    }

    ```

    *Listing 6-22* – Updating the User Interface After Receiving Characteristic Updates


    ## Monitoring Updates While the App Is in the Background


    As a nice finishing touch on the `IOTHome` app, you can make the app present a
    notification on the user''s phone when characteristic updates come in while the
    app is backgrounded. This way, even if users do not have the `IOTHome` app open,
    they can still find out if their door was opened or the sensor''s battery level
    is low. To add this feature, you must take advantage of two features from iOS''s
    notification framework, `UserNotifications`: requesting notification permission
    from the user and scheduling a notification when the Bluetooth characteristic
    updates come in.


    To present the notification permission dialog, you must call the `requestAuthorization(options:completionHandler:)`
    method on the `UNUserNotificationCenter` object, which represents the user''s
    device. Similar to location services, this is a singleton object shared by all
    iOS apps. You can access it by calling the `current()` method on the `UNUserNotificationCenter`
    class. In Listing 6-23, I have made the call to request the permission, by adding
    a `viewWillAppear()` implementation to the `DoorViewController` class. The message
    for the permission prompt comes from the value you specified in the project''s
    `Info.plist` file for the `NSBluetoothPeripheralUsageDescription` key-value pair.


    ```

    import UIKit

    import UserNotifications

    class DoorViewController: UIViewController {

    ...

    override func viewDidAppear(_ animated: Bool) {

    super.viewDidAppear(animated)

    let center =

    UNUserNotificationCenter.current()

    center.requestAuthorization(

    options: [.alert, .sound]) { (completed: Bool,

    error: Error?) in

    NSLog("Notification request completed with    status:

    \(completed)")

    }

    }

    }

    ```

    *Listing 6-23* – Requesting Notification Permission from the Door View Controller


    The `viewWillAppear()` method is called when the view controller is presented,
    either by switching tabs or navigating back to the view controller from another
    view controller in a navigation stack. The permission dialog will only appear
    the first time the user opens the Door View Controller. It should look like the
    screenshot in Figure 6-10.


    ![../images/346879_2_En_6_Chapter/346879_2_En_6_Fig10_HTML.jpg](images/346879_2_En_6_Chapter/346879_2_En_6_Fig10_HTML.jpg)


    *Figure 6-10* – Notification permission dialog for the `IOTHome` app


    To present the notification, you must create a notification request, using content
    information, including a title, message, and sound, and a trigger, such as time
    or a location update. For the `DoorViewController` class, I have enclosed this
    logic in a method called `scheduledLocalNotification()`, which takes strings indicating
    the update type and value as its input. The trigger is set to fire half a second
    after the value is received, as I want the user to know immediately when his or
    her door has opened.


    Because you requested Bluetooth central manager permission for the app at the
    beginning of this section, you can use that to your advantage to schedule the
    notification request. The background permission allows the `IOTHome` app a couple
    of seconds of executions upon every characteristic update. As shown in Listing
    6-24, in the `DoorViewController` class''s `BluetoothService` delegate methods,
    you can add a call to schedule a local notification if the app is backgrounded.
    The check for whether the app is backgrounded is good for user experience, as
    the user does not have to see notifications when the app is open. The notifications
    will continue to be delivered until the Bluetooth connection is disconnected by
    the user or a physical limitation (for example, distance or insufficient power).'
