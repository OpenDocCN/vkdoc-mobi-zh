- fmt: '# Handling Touch Input from the Siri Remote


    For the final step in developing the IOTHomeTV app, you should take advantage
    of the primary human interface device for the Apple TV, the Siri Remote. Every
    Apple TV has included a remote control with the device; however, the fourth-generation
    Apple TV introduced the Siri Remote, with a touchpad for app-like gestures and
    a microphone for accepting Siri voice commands. In this section, I will focus
    on how to accept button and touchpad click input from the remote, to refresh the
    data in the application.


    To begin, you can implement a button press. The basic interface of every Apple
    TV has relied on using directional buttons for moving between items, using the
    Play/Pause button to navigate to the detail page for an item, and the Menu button
    to navigate out of the item. For the IOTHomeTV, the natural interaction to implement
    would be to use the Play/Pause button to refresh the data in the application.


    You can implement support for button presses on tvOS, using the `UITapGestureRecognizer`
    class. If you have implemented your own custom gesture recognizer on iOS (for
    example, making a view swipeable or clickable without using `UIButton` or `UIPageController`),
    you are already familiar with the `UITapGestureRecognizer` class and its parent
    class, `UIGestureRecognizer`. Their implementations are mostly the same on tvOS.
    The way gesture recognizers work is that you specify a gesture to observe (for
    example, tap, touch, swipe, pinch), a view to observe these events on, and a selector
    (method signature) to call when these events are recognized. You specify your
    event by instantiating a single-purpose subclass of `UIGestureRecognizer`, such
    as `UITapGestureRecognizer` or `UISwipeGestureRecognizer`. `UIGestureRecognizer`
    is an abstract class and cannot be instantiated directly.


    To implement the Play/Pause button handler, instantiate a `UITapGestureRecognizer`
    object. As shown in Listing [9-17](#346879_2_En_9_Chapter.xhtml#PC18), specify
    the `fetchNetworkData()` method as the handler for the tap event by creating a
    selector with its method signature. In the same manner as on iOS, use the `addGestureRecognizer()`
    method from the `UIView` class, to attach the gesture to the main view for the
    view controller. Unlike iOS, you can limit button presses to only the Play/Pause
    button, using the `allowedPressTypes` property.


    ```

    class ViewController: UIViewController {

    ...

    override func viewDidLoad() {

    super.viewDidLoad()

    ...

    setupGestureHandlers()

    }

    func setupGestureHandlers() {

    let tapRecognizer = UITapGestureRecognizer(target:

    self, action:

    #selector(ViewController.fetchNetworkData))

    tapRecognizer.allowedPressTypes = [NSNumber(value:

    UIPressType.playPause.rawValue)]

    self.view.addGestureRecognizer(tapRecognizer)

    }

    }

    Listing 9-17

    Adding a Play/Pause Button Gesture Recognizer

    ```


    To test the gesture recognizer, run the Apple TV simulator. As shown in Figure
    [9-17](#346879_2_En_9_Chapter.xhtml#Fig17), under the Hardware menu, select Show
    Apple TV Remote. Click the onscreen remote control, and verify that the `fetchNetworkData()`
    method is called, via an update in the displayed data or a breakpoint.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig17_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig17_HTML.jpg)


    Figure 9-17


    Using the onscreen remote in the Apple TV simulator


    Implementing a touchpad click in tvOS takes advantage of another concept from
    iOS, press events. However, these are implemented in a different fashion from
    gesture recognizers. Subclasses of `UIViewController` have default handler methods
    for `UITouch` and `UIPress` events, which are triggered by any touch or press
    event. To add touchpad click support, override the default delegate method for
    when a press is completed, `pressesEnded(presses:with Event:)`, and insert a call
    to refresh the network data only when the Select event has been recognized, as
    shown in Listing [9-18](#346879_2_En_9_Chapter.xhtml#PC19).


    ```

    class ViewController: UIViewController {

    ...

    override func pressesEnded(_ presses: Set, with

    event: UIPressesEvent?) {

    for pressEvent in presses {

    if pressEvent.type == .select {

    fetchNetworkData()

    }

    }

    }

    }

    Listing 9-18

    Adding Touchpad Click Support

    ```


    To test the touchpad click event, open the Apple TV simulator again. Press down
    on the Option key on your keyboard to enable touchpad support in the simulator,
    and click inside the touchpad again. Once again, the call to `fetchNetworkData()`
    should be triggered.


    # Debugging the App on an Apple TV


    Having completely developed the IOTHomeTV app and verified that it works through
    the Apple TV simulator, there is just one step left to round out your journey
    into tvOS development: running the app on Apple TV hardware. In the same vein
    as iOS devices, starting with Xcode 9, if you have a valid Apple Developer account,
    you can connect to an Apple TV and debug it wirelessly from your Mac, via your
    home or office network connection.


    To begin, verify that your Mac and Apple TV are connected to the same wireless
    network. Next, open the Settings app on your Apple TV. As shown in Figure [9-18](#346879_2_En_9_Chapter.xhtml#Fig18),
    select Remotes and Devices, and then Remote App and Devices. If you pair your
    Apple TV with an iPhone or iPad via the Remote app, it should show up on this
    screen; otherwise, it should be empty.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig18_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig18_HTML.jpg)


    Figure 9-18


    Preparing an Apple TV for pairing with a Mac


    Leave the Remote App and Devices screen open on your Apple TV and open up Xcode.
    Within Xcode, click the Window menu and then Devices and Simulators. Inside the
    Devices and Simulators window, you should see a graphic of an Apple TV and a Pair
    button that includes the name of your Apple TV in its title text. As shown in
    Figure [9-19](#346879_2_En_9_Chapter.xhtml#Fig19), after clicking this button,
    you will be presented with an authentication dialog that asks you to type in the
    identification code displayed on your Apple TV. Enter this code and then press
    Connect.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig19_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig19_HTML.jpg)


    Figure 9-19


    Pairing an Apple TV from a Mac


    After the pairing process has been completed successfully, the Devices and Simulators
    window will update to show statistics about your Apple TV, as shown in Figure
    [9-20](#346879_2_En_9_Chapter.xhtml#Fig20).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig20_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig20_HTML.jpg)


    Figure 9-20


    Confirmation of successful pairing with an Apple TV


    After waiting several minutes for Xcode to download the debugging symbols for
    your device, you will be able to select your Apple TV as a Debugging Target from
    the target selection menu next to the Run button in Xcode, as shown in Figure
    [9-21](#346879_2_En_9_Chapter.xhtml#Fig21). The first time you connect a device,
    you will also be prompted to add it to your Apple Developer Program account. Select
    the confirm action in this pop-up, to complete the device setup process.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig21_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig21_HTML.jpg)


    Figure 9-21


    Selecting an Apple TV as a debugging target


    At this point, you can press the Run button to run the app on the device, and
    you should be able to access debugging features you are used to on iOS devices,
    including breakpoints and stack inspection. Congratulations on building and running
    your first Apple TV app!'
  raw: '## Handling Touch Input from the Siri Remote


    For the final step in developing the IOTHomeTV app, you should take advantage
    of the primary human interface device for the Apple TV, the Siri Remote. Every
    Apple TV has included a remote control with the device; however, the fourth-generation
    Apple TV introduced the Siri Remote, with a touchpad for app-like gestures and
    a microphone for accepting Siri voice commands. In this section, I will focus
    on how to accept button and touchpad click input from the remote, to refresh the
    data in the application.


    To begin, you can implement a button press. The basic interface of every Apple
    TV has relied on using directional buttons for moving between items, using the
    Play/Pause button to navigate to the detail page for an item, and the Menu button
    to navigate out of the item. For the IOTHomeTV, the natural interaction to implement
    would be to use the Play/Pause button to refresh the data in the application.


    You can implement support for button presses on tvOS, using the `UITapGestureRecognizer`
    class . If you have implemented your own custom gesture recognizer on iOS (for
    example, making a view swipeable or clickable without using `UIButton` or `UIPageController`),
    you are already familiar with the `UITapGestureRecognizer` class and its parent
    class, `UIGestureRecognizer`. Their implementations are mostly the same on tvOS.
    The way gesture recognizers work is that you specify a gesture to observe (for
    example, tap, touch, swipe, pinch), a view to observe these events on, and a selector
    (method signature) to call when these events are recognized. You specify your
    event by instantiating a single-purpose subclass of `UIGestureRecognizer`, such
    as `UITapGestureRecognizer` or `UISwipeGestureRecognizer`. `UIGestureRecognizer`
    is an abstract class and cannot be instantiated directly.


    To implement the Play/Pause button handler, instantiate a `UITapGestureRecognizer`
    object. As shown in Listing [9-17](#346879_2_En_9_Chapter.xhtml#PC18), specify
    the `fetchNetworkData()` method as the handler for the tap event by creating a
    selector with its method signature. In the same manner as on iOS, use the `addGestureRecognizer()`
    method from the `UIView` class, to attach the gesture to the main view for the
    view controller. Unlike iOS, you can limit button presses to only the Play/Pause
    button, using the `allowedPressTypes` property.


    ```

    class ViewController: UIViewController {

    ...

    override func viewDidLoad() {

    super.viewDidLoad()

    ...

    setupGestureHandlers()

    }

    func setupGestureHandlers() {

    let tapRecognizer = UITapGestureRecognizer(target:

    self, action:

    #selector(ViewController.fetchNetworkData))

    tapRecognizer.allowedPressTypes = [NSNumber(value:

    UIPressType.playPause.rawValue)]

    self.view.addGestureRecognizer(tapRecognizer)

    }

    }

    Listing 9-17

    Adding a Play/Pause Button Gesture Recognizer

    ```


    To test the gesture recognizer, run the Apple TV simulator. As shown in Figure
    [9-17](#346879_2_En_9_Chapter.xhtml#Fig17), under the Hardware menu, select Show
    Apple TV Remote. Click the onscreen remote control, and verify that the `fetchNetworkData()`
    method is called, via an update in the displayed data or a breakpoint.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig17_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig17_HTML.jpg)


    Figure 9-17


    Using the onscreen remote in the Apple TV simulator


    Implementing a touchpad click in tvOS takes advantage of another concept from
    iOS, press events. However, these are implemented in a different fashion from
    gesture recognizers. Subclasses of `UIViewController` have default handler methods
    for `UITouch` and `UIPress` events, which are triggered by any touch or press
    event. To add touchpad click support, override the default delegate method for
    when a press is completed, `pressesEnded(presses:with Event:)`, and insert a call
    to refresh the network data only when the Select event has been recognized, as
    shown in Listing [9-18](#346879_2_En_9_Chapter.xhtml#PC19).


    ```

    class ViewController: UIViewController {

    ...

    override func pressesEnded(_ presses: Set, with

    event: UIPressesEvent?) {

    for pressEvent in presses {

    if pressEvent.type == .select {

    fetchNetworkData()

    }

    }

    }

    }

    Listing 9-18

    Adding Touchpad Click Support

    ```


    To test the touchpad click event, open the Apple TV simulator again. Press down
    on the Option key on your keyboard to enable touchpad support in the simulator,
    and click inside the touchpad again. Once again, the call to `fetchNetworkData()`
    should be triggered.


    ## Debugging the App on an Apple TV


    Having completely developed the IOTHomeTV app and verified that it works through
    the Apple TV simulator, there is just one step left to round out your journey
    into tvOS development: running the app on Apple TV hardware. In the same vein
    as iOS devices, starting with Xcode 9, if you have a valid Apple Developer account,
    you can connect to an Apple TV and debug it wirelessly from your Mac, via your
    home or office network connection.


    To begin, verify that your Mac and Apple TV are connected to the same wireless
    network. Next, open the Settings app on your Apple TV. As shown in Figure [9-18](#346879_2_En_9_Chapter.xhtml#Fig18),
    select Remotes and Devices, and then Remote App and Devices. If you pair your
    Apple TV with an iPhone or iPad via the Remote app, it should show up on this
    screen; otherwise, it should be empty.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig18_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig18_HTML.jpg)


    Figure 9-18


    Preparing an Apple TV for pairing with a Mac


    Leave the Remote App and Devices screen open on your Apple TV and open up Xcode.
    Within Xcode, click the Window menu and then Devices and Simulators. Inside the
    Devices and Simulators window, you should see a graphic of an Apple TV and a Pair
    button that includes the name of your Apple TV in its title text. As shown in
    Figure [9-19](#346879_2_En_9_Chapter.xhtml#Fig19), after clicking this button,
    you will be presented with an authentication dialog that asks you to type in the
    identification code displayed on your Apple TV. Enter this code and then press
    Connect.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig19_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig19_HTML.jpg)


    Figure 9-19


    Pairing an Apple TV from a Mac


    After the pairing process has been completed successfully, the Devices and Simulators
    window will update to show statistics about your Apple TV, as shown in Figure
    [9-20](#346879_2_En_9_Chapter.xhtml#Fig20).


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig20_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig20_HTML.jpg)


    Figure 9-20


    Confirmation of successful pairing with an Apple TV


    After waiting several minutes for Xcode to download the debugging symbols for
    your device, you will be able to select your Apple TV as a Debugging Target from
    the target selection menu next to the Run button in Xcode, as shown in Figure
    [9-21](#346879_2_En_9_Chapter.xhtml#Fig21). The first time you connect a device,
    you will also be prompted to add it to your Apple Developer Program account. Select
    the confirm action in this pop-up, to complete the device setup process.


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig21_HTML.jpg](images/346879_2_En_9_Chapter/346879_2_En_9_Fig21_HTML.jpg)


    Figure 9-21


    Selecting an Apple TV as a debugging target


    At this point, you can press the Run button to run the app on the device, and
    you should be able to access debugging features you are used to on iOS devices,
    including breakpoints and stack inspection. Congratulations on building and running
    your first Apple TV app!'
  trans: '

    # 处理 Siri Remote 的触控输入


    在开发 IOTHomeTV 应用的最后一个步骤中，你应该充分利用 Apple TV 的主要人机交互设备——Siri Remote。每台 Apple TV 都随附了一台遥控器；不过，第四代
    Apple TV 引入了 Siri Remote，它配备了一个用于应用类手势的触控板，以及一个用于接收 Siri 语音命令的麦克风。在本节中，我将重点介绍如何接收来自遥控器的按钮和触控板点击输入，以刷新应用中的数据。


    首先，你可以实现按钮按下功能。每台 Apple TV 的基本交互界面都依赖于使用方向键在项目间移动，使用播放/暂停键导航到项目的详情页面，以及使用菜单键退出项目。对于
    IOTHomeTV，自然的交互方式就是使用播放/暂停键来刷新应用中的数据。


    你可以使用 `UITapGestureRecognizer` 类在 tvOS 上实现按钮按下支持。如果你已经在 iOS 上实现过自定义手势识别器（例如，在不使用
    `UIButton` 或 `UIPageController` 的情况下使视图可滑动或可点击），那么你应该已经熟悉了 `UITapGestureRecognizer`
    类及其父类 `UIGestureRecognizer`。它们在 tvOS 上的实现方式基本相同。手势识别器的工作原理是：你指定一个要观察的手势（例如，点击、触摸、滑动、捏合），指定一个观察这些事件的视图，以及一个在这些事件被识别时调用的选择器（方法签名）。你可以通过实例化一个单一用途的
    `UIGestureRecognizer` 子类（例如 `UITapGestureRecognizer` 或 `UISwipeGestureRecognizer`）来指定事件。`UIGestureRecognizer`
    是一个抽象类，不能直接实例化。


    要实现播放/暂停按钮的处理程序，请实例化一个 `UITapGestureRecognizer` 对象。如清单 9-17 所示，通过创建带有其方法签名的选择器，将
    `fetchNetworkData()` 方法指定为点击事件的处理程序。与 iOS 相同，使用 `UIView` 类的 `addGestureRecognizer()`
    方法将手势附加到视图控制器的主视图。与 iOS 不同的是，你可以使用 `allowedPressTypes` 属性将按钮按下操作限制为仅播放/暂停按钮。


    ```

    class ViewController: UIViewController {

    ...

    override func viewDidLoad() {

    super.viewDidLoad()

    ...

    setupGestureHandlers()

    }

    func setupGestureHandlers() {

    let tapRecognizer = UITapGestureRecognizer(target:

    self, action:

    #selector(ViewController.fetchNetworkData))

    tapRecognizer.allowedPressTypes = [NSNumber(value:

    UIPressType.playPause.rawValue)]

    self.view.addGestureRecognizer(tapRecognizer)

    }

    }

    清单 9-17

    添加播放/暂停按钮手势识别器

    ```


    要测试手势识别器，请运行 Apple TV 模拟器。如图 9-17 所示，在 Hardware 菜单下，选择 Show Apple TV Remote。点击屏幕上的遥控器，并通过显示数据的更新或断点来验证
    `fetchNetworkData()` 方法是否被调用。


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig17_HTML.jpg](img/346879_2_En_9_Fig17_HTML.jpg)


    图 9-17


    在 Apple TV 模拟器中使用屏幕遥控器


    在 tvOS 中实现触控板点击利用了 iOS 中的另一个概念——按下事件 (press events)。然而，它们的实现方式与手势识别器不同。`UIViewController`
    的子类对于由任何触摸或按下事件触发的 `UITouch` 和 `UIPress` 事件有默认的处理方法。要添加触控板点击支持，请重写按下完成时的默认委托方法
    `pressesEnded(presses:with Event:)`，并仅在选择 (Select) 事件被识别时插入对刷新网络数据的调用，如清单 9-18
    所示。


    ```

    class ViewController: UIViewController {

    ...

    override func pressesEnded(_ presses: Set, with

    event: UIPressesEvent?) {

    for pressEvent in presses {

    if pressEvent.type == .select {

    fetchNetworkData()

    }

    }

    }

    }

    清单 9-18

    添加触控板点击支持

    ```


    要测试触控板点击事件，请再次打开 Apple TV 模拟器。按住键盘上的 Option 键以在模拟器中启用触控板支持，然后再次点击触控板内部。此时，对 `fetchNetworkData()`
    的调用应该会被触发。


    # 在 Apple TV 上调试应用


    在完全开发了 IOTHomeTV 应用并通过 Apple TV 模拟器验证其工作正常后，完善你的 tvOS 开发之旅只剩下最后一步：在 Apple TV 硬件上运行应用。与
    iOS 设备类似，从 Xcode 9 开始，如果你拥有有效的 Apple 开发者帐户，你可以连接到 Apple TV，并通过你的家庭或办公室网络连接，从你的
    Mac 对其进行无线调试。


    首先，请验证你的 Mac 和 Apple TV 已连接到同一无线网络。接下来，在 Apple TV 上打开“设置”应用。如图 9-18 所示，选择“遥控器与设备”，然后选择“遥控器
    App 与设备”。如果你已通过“遥控器”应用将 Apple TV 与 iPhone 或 iPad 配对，它应该会显示在此屏幕上；否则，该屏幕应为空。


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig18_HTML.jpg](img/346879_2_En_9_Fig18_HTML.jpg)


    图 9-18


    准备将 Apple TV 与 Mac 配对


    让“遥控器 App 与设备”屏幕在 Apple TV 上保持打开状态，然后打开 Xcode。在 Xcode 中，单击 Window 菜单，然后选择 Devices
    and Simulators。在 Devices and Simulators 窗口中，你应该能看到一个 Apple TV 的图标和一个包含你 Apple
    TV 名称的“配对”按钮。如图 9-19 所示，点击此按钮后，将出现一个身份验证对话框，要求你输入 Apple TV 上显示的身份识别码。输入此代码，然后按“连接”。


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig19_HTML.jpg](img/346879_2_En_9_Fig19_HTML.jpg)


    图 9-19


    从 Mac 配对一个 Apple TV


    配对过程成功完成后，Devices and Simulators 窗口将更新，显示关于你 Apple TV 的统计信息，如图 9-20 所示。


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig20_HTML.jpg](img/346879_2_En_9_Fig20_HTML.jpg)


    图 9-20


    确认与 Apple TV 配对成功


    等待几分钟，让 Xcode 下载设备的调试符号后，你将可以从 Xcode 中“运行”按钮旁边的目标选择菜单中，选择你的 Apple TV 作为调试目标，如图
    9-21 所示。首次连接设备时，你还会被提示将其添加到你的 Apple Developer Program 账户中。在弹出的窗口中确认此操作，以完成设备设置过程。


    ![../images/346879_2_En_9_Chapter/346879_2_En_9_Fig21_HTML.jpg](img/346879_2_En_9_Fig21_HTML.jpg)


    图 9-21


    选择 Apple TV 作为调试目标


    此时，你可以按下“运行”按钮在设备上运行应用，并且应该能够访问你在 iOS 设备上习惯使用的调试功能，包括断点和堆栈检查。恭喜你构建并运行了你的第一个 Apple
    TV 应用！

