  trans: '

    #### 组装电路


    本项目的电路组装非常直接。如图 7-2 所示，你主要需要将温度传感器的 `VCC` 和 `GND` 引脚连接到树莓派上的对应引脚，然后将 `DATA` 引脚连接到树莓派上任意可用的通用输入/输出（`GPIO`）引脚。在本项目中，我选择了
    `GPIO21`（引脚 40）。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig2_HTML.jpg](img/346879_2_En_7_Fig2_HTML.jpg)


    图 7-2


    IOTHome 项目原理图


    为了进行连接，我使用了公对母排线。我将母头端连接到树莓派的排针上，公头端插入面包板。然后，我将 `DHT22` 温度传感器直接连接到面包板。我在图 7-3
    中附上了已完成电路的实物照片。同样，我使用了颜色编码的排线和面包板跳线，以便快速调试电路。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig3_HTML.jpg](img/346879_2_En_7_Fig3_HTML.jpg)


    图 7-3


    IOTHome 项目完成后的电路实物照片


    ### 引导启动树莓派


    既然项目的辅助电路已经完成，你可以开始引导启动树莓派了。*引导启动*（Bootstrapping）是 Linux 和嵌入式系统中使用的一个术语，指的是准备系统以便首次启动（"自举启动"）。


    正如我之前提到的，树莓派上的引导加载程序只能启动插入设备中的 microSD 卡上的任何内容。对于本项目，你将使用树莓派基金会提供的 Raspbian Linux
    发行版作为树莓派的操作系统。如果你之前曾在台式电脑上使用过 Ubuntu，你会非常熟悉 Raspbian 的工作方式，因为它们共享同一个“亲戚”：Debian
    Linux。这两个发行版都共享与 Debian 相同的包管理器和架构，只是根据其预期用途进行了细微调整。


    要安装 Raspbian，第一步是从树莓派基金会网站（`www.raspberrypi.org/downloads/raspbian/`）下载一个预构建的镜像文件，其中包含一个预构建的、可启动的
    Raspbian 实例。如图 7-4 所示，从下载页面选择 Raspbian、Raspbian Stretch with Desktop，然后点击下载 ZIP。Desktop
    版和 Lite 版的主要区别在于，Lite 版牺牲了 GNOME 桌面图形用户界面，仅提供命令行界面。如果你对命令行操作感到舒适，欢迎安装 Lite 版，但我推荐完整的
    Desktop 版，因为 GNOME 使树莓派更易于配置，并且方便日后将其用于其他目的。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig4_HTML.jpg](img/346879_2_En_7_Fig4_HTML.jpg)


    图 7-4


    从树莓派网站下载 Raspbian 镜像


    一旦 zip 文件下载完成，你需要将其写入 microSD 卡，方式要能让引导加载程序将其识别为有效的磁盘镜像。磁盘镜像打包了操作系统的文件以及创建者认为对镜像使用者有用的任何文档和配置文件。对于
    Linux 发行版，它们提供了一种有用的方式来与最终用户共享发行版，而无需迫使他们经历一个漫长且敏感的安装过程。一位熟练的工程师会构建一个他或她认为对大多数用户来说合适的起始系统，然后进行分享。然而，如果磁盘镜像没有以正确的方式解包和安装，目标计算机将无法使用它。我倾向于用来将树莓派镜像烧录到
    microSD 卡的工具是 Etcher（`https://etcher.io`）。它拥有易于理解的用户界面和高可靠性。如图 7-5 所示，安装 Etcher
    后，将 microSD 卡插入 Mac 的适配器并打开 Etcher。在其单屏用户界面中，选择 Raspbian 镜像的 ZIP 文件以及对应于 microSD
    卡的驱动器，然后选择“Flash!”开始镜像烧录过程。如果你的 microSD 卡没有出现在 Etcher 中，请检查 microSD 卡和适配器是否都已牢固地连接到你的
    Mac。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig5_HTML.jpg](img/346879_2_En_7_Fig5_HTML.jpg)


    图 7-5


    使用 Etcher 将 Raspbian 镜像烧录到 microSD 卡


    Etcher 会播放声音并弹出一个窗口，通知你磁盘镜像已成功写入。此时，可以安全地从 Mac 上移除 microSD 卡，并将其插入树莓派底部的插槽中，如图
    7-6 所示。此时，你还应将一个基于 HDMI 的显示器以及 USB 键盘/鼠标连接到树莓派。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig6_HTML.jpg](img/346879_2_En_7_Fig6_HTML.jpg)


    图 7-6


    将 microSD 卡插入树莓派


    所有准备工作完成后，将电源连接到标有 `PWR` 的 USB 端口，等待一两分钟，让 GNOME 桌面启动。当桌面准备就绪时，显示器上的图像应类似于图 7-7。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig7_HTML.jpg](img/346879_2_En_7_Fig7_HTML.jpg)


    图 7-7


    新安装的 Raspbian 发行版桌面截图


    如图 7-8 所示，在系统托盘的右上角找到 Wi-Fi 图标，然后点击它以显示网络选择下拉菜单。选择你的网络，然后在提示时输入密码。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig8_HTML.jpg](img/346879_2_En_7_Fig8_HTML.jpg)


    图 7-8


    从 Raspbian 桌面选择 WiFi 网络


    在最后的配置步骤中，你必须使用树莓派配置工具启用树莓派上的硬件接口。这将允许你访问预装在 Raspbian 中但出于安全原因默认禁用的 `I2C`、`SPI`
    和其他硬件通信库。如图 7-9 所示，要找到此工具，请点击系统托盘左上角的树莓派图标，导航至“首选项”，然后选择“树莓派配置”。在弹出的应用程序中，点击“接口”选项卡，然后勾选
    `SPI`、`I2C` 和 `1-Wire` 复选框以启用它们。点击“确定”后，系统将要求你重启树莓派以保存设置。


    ![../images/346879_2_En_7_Chapter/346879_2_En_7_Fig9_HTML.jpg](img/346879_2_En_7_Fig9_HTML.jpg)


    图 7-9


    在树莓派上启用硬件接口


    如果你想使用如 RealVNC 或 TightVNC 这样的远程桌面客户端来查看树莓派的桌面而无需连接显示器，你同样可以在配置工具中启用此功能。下次树莓派重启时，RealVNC
    服务器应用程序将启动，并提示你配置设备的 VNC 设置。

