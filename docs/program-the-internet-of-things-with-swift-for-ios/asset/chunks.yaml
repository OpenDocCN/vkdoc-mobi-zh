    ## Writing Data to HealthKit


    The easiest way to start working with HealthKit is to use it to save workouts
    to the HealthKit store. In the preceding chapters, you generated enough data to
    get a good snapshot of the user’s activity, but it needs to be serialized (massaged)
    into a format that can be consumed by HealthKit. Rather than storing data as simple
    data types, such as `String` or `Float`, HealthKit employs a hierarchical system
    that allows you to group related statistics together. It also has its own system
    of units that you must learn to work with, in order to make your data conform
    to a format the HealthKit store can recognize. In this section, you will learn
    the conceptual foundations for this system and how to use it to convert raw numbers
    into health data.


    ### Understanding How HealthKit Represents Data


    The HealthKit store in iOS classifies data into two primary categories: *characteristic
    data* and *sample data*. Characteristic data refers to qualitative information
    about a user, which is described in characteristics, rather than units, and does
    not change frequently. For instance, a user’s blood type or skin color. In HealthKit,
    these are represented by instantiations of the `HKCharacteristicType` class. Sample
    data refers to information arising from a user action, which can be measured and
    described in quantitative units (for example, meters) or quantitative descriptors
    of the data (for example, steps) or the aggregate action (for example, workouts).
    In HealthKit, these are represented by subclasses of the `HKSample` class. In
    the IOTFit app, you will be working primarily with sample data.


    In HealthKit terminology, quantitative sample data (such as step count or distance)
    are called *quantity samples* and represented by objects of the `HKQuantitySample`
    class. Sample data that describes the characteristics of an activity (such as
    if a workout should be described as bicycling or running) are called *category
    samples* and represented by `HKCategorySample` objects. For describing aggregate
    activities, HealthKit defines two final sample types: *workouts* and *correlations*.
    Workouts are represented by `HKWorkout` objects and fit the purpose their name
    suggests: they are meant to represent a set of data about a workout the user has
    performed. Correlations are represented by `HKCollection` objects and although
    their name is a bit hard to derive meaning from, their purpose is similar to that
    of workouts: they are specifically intended for grouping data about food that
    was consumed or a blood pressure reading.


    Units in HealthKit are represented by `HKUnit` objects. When storing quantitative
    samples, you must specify which `HKUnit` class to use to represent the data. You
    can do this by either using a convenience method provided by Apple for commonly
    used units (for example, `HKUnit.meter()`) or defining your own by passing a `String`
    to the `init(from:)` convenience initializer method for the `HKUnit` class.'
