  trans: '

    ### 从 DHT 温湿度传感器读取数值


    现在你已经掌握了添加 Node 模块和 Express 路由的方法，可以开始完善你的简单示例，通过 HTTP 来模拟温湿度传感器的状态。首先，在终端中输入`Ctrl+C`停止
    Node.js，然后使用`npm`安装`node-dht-sensor`模块。


    ```

    npm install node-dht-sensor

    ```


    在我的示例中，我认为使用`temperature`路径扩展来表示温湿度传感器是合理的。如代码清单 8-4 所示，在应用中引入`node-dht-sensor`模块，并为`temperature`路径扩展添加一个用于处理`GET`请求的路由和端点。


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var app = express();

    app.get(''/temperature'', function (req, res) {

    //你精妙的代码将放在这里

    });

    app.listen(80);

    代码清单 8-4

    为温湿度传感器定义一个新路由

    ```


    此时，我建议做两处修改：移除前面示例中的端点，并将端口改为 80。许多 Web 服务器因调试端点未关闭而容易被入侵。警惕的代码维护是降低应用中此类风险的简易方法。使用端口
    80 还能让你的服务器更符合 HTTP 规范，该规范规定 HTTP 流量在 TCP/IP 端口 80 上传输。


    接下来，你必须使用`node-dht-sensor`模块从传感器获取数据。查阅该模块在其 GitHub 仓库（ [`https://github.com/momenso/node-dht-sensor`](https://github.com/momenso/node-dht-sensor)
    ）中的文档，你将了解到可以通过调用`dht`对象上的`read()`方法来执行此操作，指定传感器类型（DHT22 为`22`，DHT11 为`11`）、数据线所连接的通用输入/输出（GPIO）引脚号，以及一个在读取完成时执行的回调函数。在我第
    7 章的示例中，为 DHT22 传感器使用了 GPIO 21。在代码清单 8-5 中，我扩展了示例，加入了从温湿度传感器读取数据的功能。


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var app = express();

    app.get(''/temperature'', function (req, res) {

    dht.read(22, 21, function(err, temperature, humidity) {

    res.type(''json'');

    if (!err) {

    res.json({

    ''temperature'': temperature.toFixed(1),

    ''humidity'':  humidity.toFixed(1)

    });

    } else {

    res.status(500).json({error: ''无法访问传感器''});

    }

    });

    });

    app.listen(80);

    代码清单 8-5

    从 Node 应用读取 DHT22 数据

    ```


    在这个例子中，你会注意到我对`res`对象使用了`json()`方法来返回温湿度数据。虽然纯文本对于`Hello World`示例已经足够，但使用 JSON（JavaScript
    对象表示法）是在 Web 应用开发中表示字典和层级数据广泛采用的做法。此外，如今大多数 Web 和移动框架都提供了内置的 JSON 验证和编码/解码功能，使其比自定义数据类型更容易使用。基于同样的逻辑，你会注意到我还使用了`status()`方法来将错误作为标准的
    HTTP 500 服务器错误返回。这允许你利用内置的 HTTP 错误处理。


    接下来，你需要重启 Node 应用。终止现有进程，然后以超级用户权限再次运行脚本。


    ```

    sudo node app.js

    ```


    ### 提示


    如果你希望 Node 应用在源代码更改时自动重启，我建议了解`nodemon`工具，它可通过`npm`和 GitHub（ [`https://github.com/remy/nodemon`](https://github.com/remy/nodemon)
    ）获取。虽然这个工具在开发阶段很方便，但我建议在生产环境中禁用它。


    要验证新路由是否正常工作，请在 Web 浏览器中尝试加载它，方法是在旧 URL 后附加`/temperature`。你应该会收到一个包含 JSON 编码的温湿度数据的纯文本响应，如图
    8-3 所示。


    ![../images/346879_2_En_8_Chapter/346879_2_En_8_Fig3_HTML.jpg](img/346879_2_En_8_Fig3_HTML.jpg)


    图 8-3


    在浏览器中验证温湿度路由


    ### 注意


    DHT22 温湿度传感器需要大约两秒钟才能获取准确的读数。如果在访问`temperature`路由时遇到数据陈旧或超时的情况，请记住这一点。

    '
- fmt: '### Reading Information from Bluetooth Devices


    In the last section, you exposed the data from the temperature sensor over HTTP
    by reading its value directly from a Node application and then echoing it via
    Express. In this section, you will expose the Bluetooth door sensor’s data over
    HTTP, by making the Node application act like a Bluetooth central manager, using
    the `Noble` module for Node ([`https://github.com/noble/noble`](https://github.com/noble/noble)).
    You may remember from previous chapters that one of the riskiest and time-consuming
    parts of Bluetooth communication is discovering the device and establishing a
    connection to receive data. To help with this operation, in this section, you
    will add end points for managing the connection state and transmit data based
    on the last update (rather than making a new connection each time data is requested).


    To begin, you must add `Noble` to the project, using the `npm` package manager.


    ```

    npm install noble

    ```


    Next, you must modify the Node application to include `Noble` and the UUIDs for
    Bluetooth services and characteristics for the door sensor, as shown in Listing
    [8-6](#346879_2_En_8_Chapter.xhtml#PC14). Just as with the apps in previous chapters,
    you will need these values to help identify the device and its data notifications.


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var noble = require(''noble'');

    var app = express();

    const LOCK_SERVICE_UUID = "4fafc2011fb5459e8fccc5c9c331914b";

    const BATT_SERVICE_UUID = "0af2d54c4d334fc79e34823b02c294d5";

    const LOCK_CHARACTERISTIC_UUID = "beb5483e36e14688b7f5ea07361b26a8";

    const BATT_CHARACTERISTIC_UUID = "134c298f7d6b4f6484968965e0851d03";

    ...

    Listing 8-6

    Adding Noble and Bluetooth UUIDs to the Node Application

    ```


    Remember: These UUIDs were defined in Chapter [6](#346879_2_En_6_Chapter.xhtml)
    as unique, random hexadecimal values that identify the device. Just as with Chapter
    [6](#346879_2_En_6_Chapter.xhtml)’s Bluetooth app and Chapter [7](#346879_2_En_7_Chapter.xhtml)’s
    HomeBridge configuration, you need these values to find and identify the device.
    Because the values will not change while the application is executing, you can
    define them as constants, using the `const` keyword.


    Just as with connecting to a hardware protocol like Bluetooth or I2C, it is common
    for flow-based web server operations, such as creating a new user account, to
    require the client developer (for example, mobile app developer, front-end web
    developer) to follow a specified flow of API calls to complete the operation.
    For the IOTHome Node application, the client developer must `POST` the `/door/connect/`
    end point before attempting to request data from the device. Similarly, after
    they have finished their session, they must `POST` to the `/door/disconnect/`
    end point, to close the connection and allow other applications to use the hardware.


    In my implementation, I decided to start the connection process from the Express
    end point. In Listing [8-7](#346879_2_En_8_Chapter.xhtml#PC15), I have expanded
    the Node application to include a `/door/connect/` end point that uses `Noble`
    to scan for the door sensor. In this example, I also saved a reference to the
    `response` object from Express, so that I could complete the HTTP request at the
    same time the Bluetooth connection was established.


    ```

    var response;

    ...

    app.post(''/door/connect'', function (req, res) {

    console.log("start connect");

    response = res;

    noble.startScanning();

    });

    ...

    noble.on(''discover'', function(peripheral) {

    console.log("discovered");

    console.log("peripheral name "+peripheral.id+" "+peripheral.address + " | " +
    peripheral.advertisement.localName);

    var advertisement = peripheral.advertisement;

    if (PERIPHERAL_NAME == advertisement.localName) {

    noble.stopScanning();

    console.log(''peripheral with name '' +

    advertisement.localName + '' found'');

    console.log(''ready to connect'');

    }

    });

    Listing 8-7

    Discovering a Bluetooth Peripheral Using Noble

    ```


    The arrangement of the connection may seem a bit odd at first. In the Arduino
    code for the door sensor, you had to implement completion handlers to progress
    through the connection flow for the Bluetooth server. In the iOS app, you had
    to implement delegate methods. To receive messages with `Noble`, you must respond
    to `discover` events, which are triggered by initiating a scan for devices. To
    implement an efficient Bluetooth LE connection process, you should scan only for
    the devices advertising the services you need. However, at the time of writing,
    I noticed that the results of the `scan` API that specifies service UUIDs were
    hard to predict, so, instead, I decided to filter discovered devices by the name
    specified in their advertisement data.


    After you have confirmed that the device is within range, you must try to connect
    to it. In Listing [8-8](#346879_2_En_8_Chapter.xhtml#PC16), I have expanded the
    application to include the connection process. Just as when you implemented a
    Bluetooth central manager on iOS, after finding a device, you must connect to
    it and save a reference to it, so you can disconnect from it later.


    ```

    ...

    var savedPeripheral;

    ...

    noble.on(''discover'', function(peripheral) {

    console.log("discovered");

    var advertisement = peripheral.advertisement;

    if (PERIPHERAL_NAME == advertisement.localName) {

    noble.stopScanning();

    console.log(''attempting to connect'');

    connect(peripheral);

    }

    });

    function connect(peripheral) {

    peripheral.connect(function(error) {

    if (error) {

    console.log(''error = '' + error);

    response.status(500).json({error: ''Could not

    find sensor''});

    } else {

    console.log(''connected'');

    response.json({''status'': ''connected''});

    savedPeripheral = peripheral;

    }

    });

    }

    Listing 8-8

    Connecting to a Bluetooth Peripheral Using Noble

    ```


    For the final step in the connection process, you must find the characteristics
    for the data you want to observe and set up their completion handlers. In Listing
    [8-9](#346879_2_En_8_Chapter.xhtml#PC17), I call the `discoverAllServicesAndCharacteristics()`
    method, then subscribe to events only for the characteristics matching the desired
    UUIDs.


    ```

    function connect(peripheral) {

    peripheral.connect(function(error) {

    if (error) {

    ...

    } else {

    ...

    discoverServices();

    }

    });

    }

    function discoverServices() {

    if (savedPeripheral) {

    savedPeripheral.discoverAllServicesAndCharacteristics(

    function(error, services,  characteristics) {

    if (error) {

    console.log(''error  = '' + error);

    }

    console.log(''services = '' + services);

    console.log(''characteristics = '' + characteristics);

    for (characteristic in characteristics) {

    if (characteristic.uuid ==

    LOCK_CHARACTERISTIC_UUID ||

    characteristic.uuid == BATT_CHARACTERISTIC_UUID) {

    observeCharacteristic(characteristic);

    }

    }

    });

    }

    }

    function observeCharacteristic(characteristic) {

    //Fires when data comes in

    characteristic.on(''data'', (data, isNotification) => {

    console.log(''data: "'' + data + ''"'');

    lastUpdateTime = date.getTime();

    if (characteristic.uuid == BATT_CHARACTERISTIC_UUID) {

    batteryStatus = data;

    }

    if (characteristic.uuid == LOCK_CHARACTERISTIC_UUID) {

    lockStatus = data;

    }

    });

    //Used to setup subscription

    characteristic.subscribe(error => {

    if (error) {

    console.log(''error setting up subscription = '' + error +

    ''for uuid:'' + characteristic.uuid);

    } else {

    console.log(''subscription successful for uuid:'' +

    characteristic.uuid);

    }

    });

    Listing 8-9

    Observing and Responding to Characteristic Updates with Noble

    ```


    The subscription process is initiated through the `subscribe` method, but the
    data must be observed through the `on` method. Because it is impractical to make
    the user wait until the first update has been delivered, I save the values to
    global variables that can be queried later.'
  raw: '### Reading Information from Bluetooth Devices


    In the last section, you exposed the data from the temperature sensor over HTTP
    by reading its value directly from a Node application and then echoing it via
    Express. In this section, you will expose the Bluetooth door sensor’s data over
    HTTP, by making the Node application act like a Bluetooth central manager, using
    the Noble module for Node ( [`https://github.com/noble/noble`](https://github.com/noble/noble)
    ). You may remember from previous chapters that one of the riskiest and time-consuming
    parts of Bluetooth communication is discovering the device and establishing a
    connection to receive data. To help with this operation, in this section, you
    will add end points for managing the connection state and transmit data based
    on the last update (rather than making a new connection each time data is requested).


    To begin, you must add Noble to the project, using the `npm` package manager.


    ```

    npm install noble

    ```


    Next, you must modify the Node application to include Noble and the UUIDs for
    Bluetooth services and characteristics for the door sensor, as shown in Listing
    [8-6](#346879_2_En_8_Chapter.xhtml#PC14). Just as with the apps in previous chapters,
    you will need these values to help identify the device and its data notifications.


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var noble = require(''noble'');

    var app = express();

    const LOCK_SERVICE_UUID = "4fafc2011fb5459e8fccc5c9c331914b";

    const BATT_SERVICE_UUID = "0af2d54c4d334fc79e34823b02c294d5";

    const LOCK_CHARACTERISTIC_UUID = "beb5483e36e14688b7f5ea07361b26a8";

    const BATT_CHARACTERISTIC_UUID = "134c298f7d6b4f6484968965e0851d03";

    ...

    Listing 8-6

    Adding Noble and Bluetooth UUIDs to the Node Application

    ```


    Remember: These UUIDs were defined in Chapter [6](#346879_2_En_6_Chapter.xhtml)
    as unique, random hexadecimal values that identify the device. Just as with Chapter
    [6](#346879_2_En_6_Chapter.xhtml)’s Bluetooth app and Chapter [7](#346879_2_En_7_Chapter.xhtml)’s
    HomeBridge configuration, you need these values to find and identify the device.
    Because the values will not change while the application is executing, you can
    define them as constants, using the `const` keyword.


    Just as with connecting to a hardware protocol like Bluetooth or I2C, it is common
    for flow-based web server operations, such as creating a new user account, to
    require the client developer (for example, mobile app developer, front-end web
    developer) to follow a specified flow of API calls to complete the operation.
    For the IOTHome Node application, the client developer must `POST` the `/door/connect/`
    end point before attempting to request data from the device. Similarly, after
    they have finished their session, they must `POST` to the `/door/disconnect/`
    end point, to close the connection and allow other applications to use the hardware.


    In my implementation, I decided to start the connection process from the Express
    end point. In Listing [8-7](#346879_2_En_8_Chapter.xhtml#PC15), I have expanded
    the Node application to include a `/door/connect/` end point that uses Noble to
    scan for the door sensor. In this example, I also saved a reference to the `response`
    object from Express, so that I could complete the HTTP request at the same time
    the Bluetooth connection was established.


    ```

    var response;

    ...

    app.post(''/door/connect'', function (req, res) {

    console.log("start connect");

    response = res;

    noble.startScanning();

    });

    ...

    noble.on(''discover'', function(peripheral) {

    console.log("discovered");

    console.log("peripheral name "+peripheral.id+" "+peripheral.address + " | " +
    peripheral.advertisement.localName);

    var advertisement = peripheral.advertisement;

    if (PERIPHERAL_NAME == advertisement.localName) {

    noble.stopScanning();

    console.log(''peripheral with name '' +

    advertisement.localName + '' found'');

    console.log(''ready to connect'');

    }

    });

    Listing 8-7

    Discovering a Bluetooth Peripheral Using Noble

    ```


    The arrangement of the connection may seem a bit odd at first. In the Arduino
    code for the door sensor, you had to implement completion handlers to progress
    through the connection flow for the Bluetooth server. In the iOS app, you had
    to implement delegate methods. To receive messages with Noble, you must respond
    to `discover` events, which are triggered by initiating a scan for devices. To
    implement an efficient Bluetooth LE connection process, you should scan only for
    the devices advertising the services you need. However, at the time of writing,
    I noticed that the results of the `scan` API that specifies service UUIDs were
    hard to predict, so, instead, I decided to filter discovered devices by the name
    specified in their advertisement data.


    After you have confirmed that the device is within range, you must try to connect
    to it. In Listing [8-8](#346879_2_En_8_Chapter.xhtml#PC16), I have expanded the
    application to include the connection process. Just as when you implemented a
    Bluetooth central manager on iOS, after finding a device, you must connect to
    it and save a reference to it, so you can disconnect from it later.


    ```

    ...

    var savedPeripheral;

    ...

    noble.on(''discover'', function(peripheral) {

    console.log("discovered");

    var advertisement = peripheral.advertisement;

    if (PERIPHERAL_NAME == advertisement.localName) {

    noble.stopScanning();

    console.log(''attempting to connect'');

    connect(peripheral);

    }

    });

    function connect(peripheral) {

    peripheral.connect(function(error) {

    if (error) {

    console.log(''error = '' + error);

    response.status(500).json({error: ''Could not

    find sensor''});

    } else {

    console.log(''connected'');

    response.json({''status'': ''connected''});

    savedPeripheral = peripheral;

    }

    });

    }

    Listing 8-8

    Connecting to a Bluetooth Peripheral Using Noble

    ```


    For the final step in the connection process, you must find the characteristics
    for the data you want to observe and set up their completion handlers. In Listing
    [8-9](#346879_2_En_8_Chapter.xhtml#PC17), I call the `discoverAllServicesAndCharacteristics()`
    method , then subscribe to events only for the characteristics matching the desired
    UUIDs.


    ```

    function connect(peripheral) {

    peripheral.connect(function(error) {

    if (error) {

    ...

    } else {

    ...

    discoverServices();

    }

    });

    }

    function discoverServices() {

    if (savedPeripheral) {

    savedPeripheral.discoverAllServicesAndCharacteristics(

    function(error, services,  characteristics) {

    if (error) {

    console.log(''error  = '' + error);

    }

    console.log(''services = '' + services);

    console.log(''characteristics = '' + characteristics);

    for (characteristic in characteristics) {

    if (characteristic.uuid ==

    LOCK_CHARACTERISTIC_UUID ||

    characteristic.uuid == BATT_CHARACTERISTIC_UUID) {

    observeCharacteristic(characteristic);

    }

    }

    });

    }

    }

    function observeCharacteristic(characteristic) {

    //Fires when data comes in

    characteristic.on(''data'', (data, isNotification) => {

    console.log(''data: "'' + data + ''"'');

    lastUpdateTime = date.getTime();

    if (characteristic.uuid == BATT_CHARACTERISTIC_UUID) {

    batteryStatus = data;

    }

    if (characteristic.uuid == LOCK_CHARACTERISTIC_UUID) {

    lockStatus = data;

    }

    });

    //Used to setup subscription

    characteristic.subscribe(error => {

    if (error) {

    console.log(''error setting up subscription = '' + error +

    ''for uuid:'' + characteristic.uuid);

    } else {

    console.log(''subscription successful for uuid:'' +

    characteristic.uuid);

    }

    });

    Listing 8-9

    Observing and Responding to Characteristic Updates with Noble

    ```


    The subscription process is initiated through the `subscribe` method, but the
    data must be observed through the `on` method. Because it is impractical to make
    the user wait until the first update has been delivered, I save the values to
    global variables that can be queried later.'
  trans: '

    ### 从蓝牙设备读取信息


    在上一节中，你通过 Node 应用直接读取温度传感器的数据，并使用 Express 进行响应，从而通过 HTTP 公开了该数据。在本节中，你将通过 HTTP
    公开蓝牙门传感器的数据，方法是让 Node 应用充当蓝牙中央管理器，并使用适用于 Node 的 `Noble` 模块（[`https://github.com/noble/noble`](https://github.com/noble/noble)）。你可能还记得前几章的内容，蓝牙通信中风险最高且最耗时的部分之一就是发现设备并建立连接以接收数据。为了简化此操作，在本节中，你将添加用于管理连接状态的端点，并根据最后一次更新传输数据（而不是在每次请求数据时都建立新连接）。


    首先，你必须使用 `npm` 包管理器将 `Noble` 添加到项目中。


    ```

    npm install noble

    ```


    接下来，你必须修改 Node 应用，以包含 `Noble` 以及门传感器的蓝牙服务和特征 UUID，如代码清单 8-6 所示。与前几章的应用一样，你需要使用这些值来帮助识别设备及其数据通知。


    ```

    var express = require(''express'');

    var dht = require(''node-dht-sensor'');

    var noble = require(''noble'');

    var app = express();

    const LOCK_SERVICE_UUID = "4fafc2011fb5459e8fccc5c9c331914b";

    const BATT_SERVICE_UUID = "0af2d54c4d334fc79e34823b02c294d5";

    const LOCK_CHARACTERISTIC_UUID = "beb5483e36e14688b7f5ea07361b26a8";

    const BATT_CHARACTERISTIC_UUID = "134c298f7d6b4f6484968965e0851d03";

    ...

    代码清单 8-6

    将 Noble 和蓝牙 UUID 添加到 Node 应用

    ```


    请记住：这些 UUID 在第六章中定义为唯一的随机十六进制值，用于标识设备。与第六章的蓝牙应用以及第七章的 HomeBridge 配置一样，你需要这些值来查找和识别设备。由于这些值在应用执行期间不会改变，你可以使用
    `const` 关键字将它们定义为常量。


    与连接蓝牙或 I2C 等硬件协议类似，基于流程的 Web 服务器操作（例如创建新用户账户）通常要求客户端开发人员（例如移动应用开发人员、前端 Web 开发人员）遵循指定的
    API 调用流程来完成操作。对于 IOTHome Node 应用，客户端开发人员必须先向 `/door/connect/` 端点 `POST` 请求，然后才能尝试从设备请求数据。同样，在他们完成会话后，必须向
    `/door/disconnect/` 端点 `POST` 请求，以关闭连接并允许其他应用程序使用该硬件。


    在我的实现中，我决定从 Express 端点启动连接过程。在代码清单 8-7 中，我扩展了 Node 应用，使其包含一个 `/door/connect/`
    端点，该端点使用 `Noble` 扫描门传感器。在这个例子中，我还保存了对 Express 中 `response` 对象的引用，以便在建立蓝牙连接的同时完成
    HTTP 请求。


    ```

    var response;

    ...

    app.post(''/door/connect'', function (req, res) {

    console.log("start connect");

    response = res;

    noble.startScanning();

    });

    ...

    noble.on(''discover'', function(peripheral) {

    console.log("discovered");

    console.log("peripheral name "+peripheral.id+" "+peripheral.address + " | " +
    peripheral.advertisement.localName);

    var advertisement = peripheral.advertisement;

    if (PERIPHERAL_NAME == advertisement.localName) {

    noble.stopScanning();

    console.log(''peripheral with name '' +

    advertisement.localName + '' found'');

    console.log(''ready to connect'');

    }

    });

    代码清单 8-7

    使用 Noble 发现蓝牙外设

    ```


    连接的安排起初可能看起来有点奇怪。在门传感器的 Arduino 代码中，你必须实现完成处理程序来推进蓝牙服务器的连接流程。在 iOS 应用中，你必须实现委托方法。要使用
    `Noble` 接收消息，你必须响应 `discover` 事件，这些事件是通过发起设备扫描触发的。要实现高效的蓝牙低功耗连接过程，你应该只扫描广播了你所需服务的设备。然而，在编写本文时，我注意到指定服务
    UUID 的 `scan` API 的结果难以预测，因此，我决定改为根据设备广播数据中指定的名称来过滤已发现的设备。


    在确认设备在范围内后，你必须尝试连接它。在代码清单 8-8 中，我扩展了应用以包含连接过程。就像在 iOS 上实现蓝牙中央管理器时一样，在找到设备后，你必须连接它并保存对其的引用，以便稍后可以断开连接。


    ```

    ...

    var savedPeripheral;

    ...

    noble.on(''discover'', function(peripheral) {

    console.log("discovered");

    var advertisement = peripheral.advertisement;

    if (PERIPHERAL_NAME == advertisement.localName) {

    noble.stopScanning();

    console.log(''attempting to connect'');

    connect(peripheral);

    }

    });

    function connect(peripheral) {

    peripheral.connect(function(error) {

    if (error) {

    console.log(''error = '' + error);

    response.status(500).json({error: ''Could not

    find sensor''});

    } else {

    console.log(''connected'');

    response.json({''status'': ''connected''});

    savedPeripheral = peripheral;

    }

    });

    }

    代码清单 8-8

    使用 Noble 连接蓝牙外设

    ```


    连接过程的最后一步是，你必须找到要观察的数据的特征并设置其完成处理程序。在代码清单 8-9 中，我调用了 `discoverAllServicesAndCharacteristics()`
    方法，然后仅订阅与所需 UUID 匹配的特征的事件。


    ```

    function connect(peripheral) {

    peripheral.connect(function(error) {

    if (error) {

    ...

    } else {

    ...

    discoverServices();

    }

    });

    }

    function discoverServices() {

    if (savedPeripheral) {

    savedPeripheral.discoverAllServicesAndCharacteristics(

    function(error, services,  characteristics) {

    if (error) {

    console.log(''error  = '' + error);

    }

    console.log(''services = '' + services);

    console.log(''characteristics = '' + characteristics);

    for (characteristic in characteristics) {

    if (characteristic.uuid ==

    LOCK_CHARACTERISTIC_UUID ||

    characteristic.uuid == BATT_CHARACTERISTIC_UUID) {

    observeCharacteristic(characteristic);

    }

    }

    });

    }

    }

    function observeCharacteristic(characteristic) {

    //Fires when data comes in

    characteristic.on(''data'', (data, isNotification) => {

    console.log(''data: "'' + data + ''"'');

    lastUpdateTime = date.getTime();

    if (characteristic.uuid == BATT_CHARACTERISTIC_UUID) {

    batteryStatus = data;

    }

    if (characteristic.uuid == LOCK_CHARACTERISTIC_UUID) {

    lockStatus = data;

    }

    });

    //Used to setup subscription

    characteristic.subscribe(error => {

    if (error) {

    console.log(''error setting up subscription = '' + error +

    ''for uuid:'' + characteristic.uuid);

    } else {

    console.log(''subscription successful for uuid:'' +

    characteristic.uuid);

    }

    });

    代码清单 8-9

    使用 Noble 观察和响应特征更新

    ```


    订阅过程通过 `subscribe` 方法启动，但数据必须通过 `on` 方法进行观察。由于让用户等待直到第一次更新传递是不切实际的，因此我将值保存到稍后可以查询的全局变量中。

