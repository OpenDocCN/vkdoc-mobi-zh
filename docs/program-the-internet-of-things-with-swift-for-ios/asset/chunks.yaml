    ## Summary


    本章中，您学习了如何利用watchOS构建IOTFit应用的Apple Watch版本，该版本能够与原始iOS版本共享代码和锻炼数据。在某些方面，Apple
    Watch应用的设置过程比iOS版本更复杂，例如仅使用堆栈视图构建用户界面。然而，watchOS应用的其他部分（如创建表格视图）使用了其iOS对应功能的精简版本，实现起来比iOS版本更简单。与第[9章](#346879_2_En_9_Chapter.xhtml)的Apple
    TV项目类似，您能够利用在硬件上原生运行的框架，并制作出与iOS版本具有相同锻炼跟踪功能的Apple Watch应用。


    延续本书的主题，这是一个物联网应用的完美示例，因为用户能够使用“物”（Apple Watch）作为另一种为更大系统提供数据的方式。在本章中，您利用的大系统是HealthKit，Apple会自动保护并在用户设备之间同步HealthKit数据。


    # 11. 使用Face ID、Touch ID和钥匙串服务保护您的应用


    到目前为止，您已在本章中了解到，物联网技术可用于扩展人们生活中的便利性。与几年前相比，这些设备的能力以及创建设备的门槛都已提高。仅在本章中，您就已经使用了Arduino、Raspberry
    Pi和iPhone作为物联网传感器。


    然而，常言道，新药总会带来新的副作用。对于物联网来说，其采用过程中最不幸且意想不到的副作用是安全漏洞的增加，这些漏洞源于未正确保护的物联网设备。正如本书中多次提到的，物联网的普及很大程度上得益于价格合理的系统级芯片解决方案的可用性，例如您在之前章节中使用的ESP32。不幸的是，当广泛使用的系统设计缺陷被利用时，其高采用率可能导致毁灭性的损害。


    这正是Mirai僵尸网络所发生的情况。该僵尸网络利用了物联网设备上一组已知的常用默认密码，自动安装、复制并运行程序，使用受感染设备对目标系统进行协同攻击，即所谓的分布式拒绝服务攻击。该攻击影响了超过600,000台设备，在2017年导致多个域名系统服务器（构成互联网流量路由骨干）瘫痪，并被公认为有记录以来最大的DDoS攻击^([¹](#fn1))。截至撰写本书时（2018年末），该僵尸网络在复杂性上持续增加并找到了新目标。


    在第[8章](#346879_2_En_8_Chapter.xhtml)中，当您学习如何使用Raspberry Pi构建Web服务器时，您学到的提高设备安全性的方法之一是为Web服务器添加SSL证书，以便设备和外部客户端（如iOS应用）之间传输的所有数据都能通过HTTPS保护。尽管这不是完美或完整的解决方案，但这是让您的用户数据更难通过简单的流量嗅探（使用程序监控网络上传输的数据包）被截获的一步。对于完整的解决方案，您应始终尝试研究访问系统管理员账户的所有途径并确保其安全，包括更改密码、使用双因素认证、为Web应用程序API添加输入验证，以及安装安全补丁和辅助工具以防止已知攻击。


    在本章中，您将在iOS应用端学习三种技术，可用于防止用户信息从设备泄露或被盗：Face ID、Touch ID和钥匙串服务。作为iPhone用户，您可能已经通过主屏幕熟悉前两项服务。它们允许您使用面部的3D表面扫描（iPhone
    X及更新版本）或指纹（iPhone 5S至iPhone 8 Plus，以及iPad Air 2及更新版本）解锁主屏幕。但是，您可能不知道可以在自己的应用中使用钥匙串服务来限制对应用某些部分的访问。这是许多密码存储应用（如1Password）中流行的功能。类似地，钥匙串服务允许您为应用数据创建加密数据库，该数据库仅在应用处于活动状态并在用户设备前台运行时才能访问。钥匙串服务是Apple推荐的用于存储用户密码、API密钥和SSL证书的方法，如果这些信息从应用中泄露，可能会被严重利用。'
