    ### 使用 `UITableViewDelegate` 协议将数据映射到单元格


    为了在“Workout Table View Controller”上显示 `workouts` 数组中的数据，你必须实现 `UITableViewDelegate`
    协议。该协议负责表格视图的显示和一般用户交互属性，例如每个单元格的高度、填充单元格内容的方法分配，以及用户选择单元格时应执行的操作。与 `UITableViewDataSource`
    协议类似，对于 IOTFit 应用，你无需实现该协议提供的所有方法。为了填充 IOTFit 应用中的单元格，你将实现 `tableView(cellForRow:)`
    方法。这允许在运行时使用分区和行号来确定单元格的显示。此外，每次重新加载表格视图时，都会为每个单元格调用此方法。


    使用数组管理 Table View Controller 的数据的优势在于，它使数据映射变得极其简单。你可以简单地将行号与数组中的位置相关联。在代码清单 4-13
    中，我使用此逻辑实现了 `WorkoutTableViewController` 类的 `tableView(cellForRow:)` 方法。我使用 `workoutCell`
    标识符查找单元格模板，然后根据每个 `Workout` 项目中的值创建格式化字符串。


    ```swift

    class WorkoutTableViewController: UITableViewController {

    ...

    let dateFormatter = DateFormatter()

    ...

    override func tableView(_ tableView: UITableView,

    cellForRowAt indexPath: IndexPath) ->

    UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier:

    "workoutCell", for: indexPath)

    guard let workouts = workouts else {

    return cell

    }

    let selectedWorkout = workouts[indexPath.row]

    let dateString = dateFormatter.string(from:

    selectedWorkout.startTime)

    let durationString =

    WorkoutDataManager.stringFromTime(timeInterval:

    selectedWorkout.duration)

    let titleText = "\(dateString) |

    \(selectedWorkout.workoutType) | \(durationString)"

    let detailText = String(format: "%.0f m | %.0f floors",

    arguments: [selectedWorkout.distance,

    selectedWorkout.flightsClimbed])

    cell.textLabel?.text = titleText

    cell.detailTextLabel?.text = detailText

    return cell

    }

    }

    ```

    *代码清单 4-13：用数据填充表格视图单元格*


    现在，如果你重新编译应用并保存更多锻炼记录，当进入“历史”标签页时，表格视图将显示用户 HealthKit 存储中最近十次锻炼的开始时间、距离、总步数和楼层数，类似于图
    4-16 中的截图。


    ![../images/346879_2_En_4_Chapter/346879_2_En_4_Fig16_HTML.jpg](img/346879_2_En_4_Fig16_HTML.jpg)


    *图 4-16：IOTFit 应用已完成的“历史”标签页*


    ## 总结


    在本章中，通过扩展 Workout Data Manager 并添加用于显示锻炼历史的 Table View Controller，你学习了如何利用 HealthKit
    的强大功能，在 IOTFit 应用中安全地导入和导出健康数据。在应用的最初版本中，你必须依赖属性列表文件进行数据管理，并且无法将数据导出到应用之外。在应用了访问基于权限的硬件资源的熟悉经验，并学习了
    HealthKit 如何表示数据之后，你能够帮助用户在一个地方管理所有锻炼记录，并查看他们可能使用的其他应用中的锻炼数据。


    尽管 HealthKit 在数据表示方面很独特，但你在本章中练习的基于协议和完成处理程序的通信方法，在 Apple 的物联网相关框架中经常被应用。此外，只需稍作修改，本章中的大部分代码都可以复用于本书后面部分的
    Apple Watch 版本应用中，就像你从前一章的 Core Motion 代码中复用它一样。


    ---


    # 第二部分：构建你自己的物联网设备


    # 5. 构建基于 Arduino 的外围设备


    促成你今天所知的物联网（IoT）发展的最大力量之一，是过去只有大公司才能使用的低成本、高质量电子元件和通信标准的普及。以前，如果你想学习如何编程微处理器，你必须购买一台高性能计算机、芯片编程器、空白芯片以及来自芯片制造商的昂贵软件许可证。今天，只需一块
    30 美元的 Arduino、Raspberry Pi 或 BeagleBone 微控制器板，你就可以编程所有你想要的硬件项目，并且你可以购买到各种内置两针或三针连接、价格低于
    10 美元的传感器。


    类似地，蓝牙过去是一种只能通过使用功能有限的专用硬件芯片并自行编程协议接口才能使用的技术。如今，蓝牙芯片内置在大多数联网设备中，并且可以通过许多协议的开源实现来使用。作为
    iOS 的一部分，Apple 提供了 Core Bluetooth 框架，允许你开发与蓝牙配件通信的应用，或让 iPhone 充当蓝牙配件。


    正如 Apple II 为那些无法自行组装计算机的人打开了个人计算机和编程的大门一样，这些低成本的编程环境正在为新一代的学生、爱好者以及初创公司打开硬件开发的大门。在本章中，你将加入他们的行列，学习如何开始制造你自己的物联网设备！

    '
- fmt: '# Learning Objectives


    This chapter starts the second section of the book, centered on building apps
    that interact with external hardware. Leaving Apple’s universe briefly, you will
    learn how you can take advantage of popular general-purpose hardware, such as
    Arduino and Raspberry Pi, to create your own sensors and apply industry best practices
    to your custom hardware. To make apps for this hardware, you will learn about
    iOS frameworks that allow you to communicate over common protocols, such as HTTPS
    and Bluetooth.


    In the same manner as the first section of the book, in this section, you will
    build a smart home management app, `IOTHome`, and continue to iterate on it with
    each successive chapter. In this chapter, you will learn how to put together and
    write the software for an Arduino-based wireless door sensor. In the next chapter,
    you will learn how to make it communicate with an iOS app via Bluetooth LE.


    Unlike Raspberry Pi or BeagleBone, which are designed and produced by single entities,
    the Arduino project takes a more hands-off approach to its hardware designs by
    open sourcing their base designs and programming environment (`IDE`), and encouraging
    others to iterate on them. The Adafruit HUZZAH32, pictured in Figure [5-1](#346879_2_En_5_Chapter.xhtml#Fig1),
    is one of those iterations, based on the Espressif ESP32 system on a chip (`SoC`),
    which adds more interface pins, Bluetooth, Wi-Fi, and a built-in battery plug/charger
    to the original Arduino design, while still retaining compatibility with the common
    programming environment.


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig1_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    *Adafruit HUZZAH32 microcontroller*


    In the process of building the door-sensing hardware and its control software,
    you will learn the following key skills for IoT app development:


    - Building a simple circuit for detecting input from a switch

    - Setting up the Arduino programming environment

    - Writing a C++-based Arduino “solution” (program)

    - Monitoring and controlling devices using general purpose input/output (`GPIO`)
    and analog-to-digital conversion (`ADC`)


    As this book is targeted at software engineers and enthusiasts, the electronics
    sections of this chapter are presented in a very straightforward, practical manner.
    My intention is to give hardware newbies enough of a taste of the work to explore
    it further, while not making it too boring for readers with a bit more experience.
    Furthermore, the project does not require any soldering, and all of the parts
    required can easily be ordered from Amazon.com, Adafruit, or Mouser Electronics.


    The C++ section of this chapter will piggyback off of concepts you are familiar
    with from Swift. Thanks to the hard work of the developers of the Arduino project,
    you will notice that the C++ syntax used by the Arduino IDE is very modern and
    should, once again, look very similar to what you are familiar with from Swift.


    # Building the Wireless Door-Sensor Hardware


    Now that you have a better understanding of Bluetooth, you can start building
    the peripheral for `IOTHome`, the door sensor. For this task, you will have to
    assemble the hardware, set up the Arduino programming environment, write the code
    for the Arduino program, and download it to the HUZZAH32 microcontroller. Today,
    more than ever, these tasks have become more streamlined and reliable, but they
    still require some careful attention. In this section, I will guide you through
    the steps I took to create the door sensor and the design considerations that
    helped inform my decisions.


    ## Part List


    To build the door sensor for this chapter, you will have to acquire the parts
    listed in Table [5-1](#346879_2_En_5_Chapter.xhtml#Tab1). The major components
    are the Adafruit HUZZAH32 microcontroller, which will run the control software;
    a breadboard, to assemble the circuit on; a magnetic switch, to detect if the
    door is closed or opened; two light emitting diodes (`LEDs`), to visually indicate
    the status of the system; and some resistors, to regulate voltage.


    Table 5-1


    Part List for Door Sensor


    | **Part Name** | **Quantity** | **Mouser Part #** |

    | --- | --- | --- |

    | Adafruit HUZZAH32 microcontroller (pre-soldered) | 1 | 485-3591 |

    | Solderless breadboard | 1 | 589-TW-E40-1020 |

    | Breadboard jumper wire kit | 1 | 424-WIRE-KIT |

    | 3.7V 190mAh lithium polymer battery | 1 | 932-MIKROE-2759 |

    | Magnetic proximity sensor | 1 | 934-59140-1-S-03-F |

    | 10KΩ resistor | 1 | 603-FMP200JR-52-10K |

    | 200Ω resistor | 2 | 603-CFR-12JB-52-200R |

    | Blue LED (through hole, 3.4V, 5mm package) | 1 | 941-C5SMFBJECR0U045 |

    | Red LED (through hole, 2.1V, 5mm package) | 1 | 941-C5SMFRJFCT0W0BB2 |


    Adafruit offers three varieties of the HUZZAH32: an unassembled version, which
    requires you to solder a header or parts directly to its pins, in order to use
    it; an assembled version with a header already soldered to the pins, allowing
    you to plug the microcontroller into a breadboard; and an assembled version with
    stacking headers attached, allowing you to plug the microcontroller into a motherboard
    and use jumper wires to attach the pins. For this project, I recommend the latter
    two versions, as they will save you considerable amounts of time and frustration,
    in exchange for a $1 or $2 price difference.


    For the remaining parts, you will notice that I did not mention a brand name or
    place strict restrictions on the parts. My goal in designing this project was
    to create something I felt you could create with spare parts from other projects
    or the contents of an inexpensive Arduino Starter Kit you may have seen on Amazon.com
    or at a local electronics parts store.


    All of the parts in this project were specifically selected to be easy to purchase
    on Amazon.com, Adafruit (`www.adafruit.com`), or Mouser Electronics (`www.mouser.com`).
    Comparing the three retailers, Adafruit is the most accessible to hobbyists, providing
    a curated collection of reliable parts and a wealth of tutorials and sample projects
    to accompany them. Mouser is the best choice for professionals and those looking
    to order specialty parts or large quantities of items. Finally, Amazon is the
    retailer of all things. Searching for parts on Amazon is significantly harder
    than the other two, and it is harder to guarantee the quality of what you are
    getting (many small manufacturers are able to sell directly through Amazon), but
    it can be a good resource to get popular parts and generic, lower-priced parts
    as part of the same order.


    Your completed set of parts for the project should resemble that in the photograph
    in Figure [5-2](#346879_2_En_5_Chapter.xhtml#Fig2).


    ![../images/346879_2_En_5_Chapter/346879_2_En_5_Fig2_HTML.jpg](images/346879_2_En_5_Chapter/346879_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Photograph of collected parts for the `IOTHome` project'
