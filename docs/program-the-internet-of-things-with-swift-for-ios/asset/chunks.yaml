    To test the context menu, select one of the iOS simulators that is paired with
    an Apple Watch simulator from the menu next to the run button in Xcode (for example,
    iPhone 8 Plus + Apple Watch Series 3). Although the Workout History screen of
    the watch app will initially be empty, as shown in Figure [10-26](#346879_2_En_10_Chapter.xhtml#Fig26),
    you can perform a deep press on your Mac’s touchpad, to bring up the context menu
    in the simulator. Alternatively, you can enable deep presses in the simulator
    by going to the Hardware menu and selecting Touch Pressure ➤ Deep Press.


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig26_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig26_HTML.jpg)


    Figure 10-26


    Debugging the context menu from the Apple Watch simulator


    To dismiss the Record Workout Interface Controller, create an `exit()` function,
    as shown in Listing [10-6](#346879_2_En_10_Chapter.xhtml#PC6), which will call
    the `dismiss()` method to dismiss the Interface Controller. This method behaves
    in the same fashion as the `dismissViewController()` method in iOS, by dismissing
    modal Interface Controllers from the view hierarchy. Use the Connection Inspector
    in Interface Builder to set the `exit()` method as the selector for the Exit button,
    in the same fashion you connected the selector for the context menu.


    ```

    class RecordInterfaceController: WKInterfaceController {

    ...

    @IBAction func exit() {

    dismiss()

    }

    }

    Listing 10-6

    Dismissing the Record Workout Screen ( RecordInterfaceController.swift )

    ```


    ## Creating a New Workout Using Core Location and Core Motion


    The IOTFit app started as a simple location-based workout tracking app, and as
    you learned more sensor-based frameworks, it expanded into an accurate, detailed
    application through the adoption of Core Motion and HealthKit. Complementing its
    wide adoption in fitness applications, Apple included both of these frameworks,
    as well as Core Location, among the set of binaries that can run untethered on
    an Apple Watch.


    To begin implementing the stand-alone features of the Apple Watch app, start with
    the Record Workout Interface Controller. It serves the same purpose as the Create
    Workout View Controller from the iOS project, allowing the user to start and stop
    a workout session. As mentioned at the beginning of the chapter, one of the goals
    of adding the IOTFitWatch app to the IOTFit iOS project is to share code between
    applications. Quickly skimming through the `CreateWorkoutViewController` class,
    you will notice that much of the heavy lifting, including logging locations, saving
    the workout to HealthKit, and formatting the time strings was taken care of by
    the `WorkoutDataManager` class. Because a great deal of this functionality is
    also applicable to the watchOS app, you should try to add it to the watchOS target.
    To perform this action, click the `WorkoutDataManager.swift` file in the Project
    Navigator, select the File Inspector tab (the one with the Document icon) in the
    right pane of Xcode, and click the check box next to `IOTFitWatch Extension`,
    as shown in Figure [10-27](#346879_2_En_10_Chapter.xhtml#Fig27).


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig27_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig27_HTML.jpg)


    Figure 10-27


    Adding the `WorkoutDataManager` class to the `IOTFitWatch Extension` target


    With Xcode still set to compile for the iPhone + Apple Watch simulator, attempt
    to compile the watchOS app with the `WorkoutDataManager` class now included in
    the target. Compilation should fail, owing to being unable to resolve the definitions
    for `WorkoutType` and `WorkoutState`. In the iOS-only implementation of the IOTFit
    project, these types were defined inside the `CreateWorkoutViewController` class,
    which cannot be included in the watchOS target. To fix the compilation issue,
    move these values to the top of the `WorkoutDataManager` class, as shown in Listing
    [10-7](#346879_2_En_10_Chapter.xhtml#PC7). The watchOS app should now compile
    successfully.


    ```

    import Foundation

    import CoreLocation

    import HealthKit

    enum WorkoutState {

    case inactive

    case active

    case paused

    }

    struct WorkoutType {

    static let automotive = "Driving"

    static let running = "Running"

    static let bicycling = "Bicycling"

    static let stationary = "Stationary"

    static let walking = "Walking"

    static let unknown = "Unknown"

    }

    let timerInterval : TimeInterval = 1.0

    ...

    class WorkoutDataManager {

    static let sharedManager = WorkoutDataManager()

    ...

    }

    Listing 10-7

    Completing the WorkoutDataManager Class

    ```


