    Arduino IDE 的调试控制台并目视检查电路中的 LED 来调试这部分代码。


    要开始编写新的 Arduino 解决方案，请转到 `File` 菜单并选择 `New`。你将看到一个空的解决方案文件，其中包含两个存根方法：`setup()`
    和 `loop()`。顾名思义，Arduino 解决方案具有简单的架构：`setup()` 方法中的逻辑在设备通电后立即执行，而 `loop()` 方法中的逻辑会重复执行，直到设备断电。初始的
    Arduino 解决方案应类似于清单 5-2。


    ```

    void setup() {

    // put your setup code here, to run once:

    }

    void loop() {

    // put your main code here, to run repeatedly:

    }

    ```

    *清单 5-2 初始的空 Arduino 解决方案*


    在 Arduino 中使用 GPIO 是直接明了的操作。在 `setup()` 方法中，指定引脚号以及该引脚是用于输入还是输出。用于指定此功能的 API 是
    `pinMode()`。在清单 5-3 中，我更新了解决方案以进行这些调用。为了帮助管理代码，我使用 `#define` 关键字将引脚号定义为编译器宏。如果你熟悉
    Objective-C，你会认出这个关键字，因为它在 Objective-C 中用于相同的目的。这些引脚号与你之前在“组装硬件”一节中组装电路时使用的引脚号匹配。


    ```

    #define RED_LED_PIN 14

    #define BLUE_LED_PIN 15

    #define SWITCH_PIN 32

    void setup() {

    pinMode(RED_LED_PIN, OUTPUT);

    pinMode(BLUE_LED_PIN, OUTPUT);

    pinMode(SWITCH_PIN, INPUT);

    }

    void loop() {

    // put your main code here, to run repeatedly:

    }

    ```

    *清单 5-3 在 Arduino 解决方案中设置 GPIO 引脚模式*


    在清单 5-3 中，我将 `BLUE_LED` 和 `RED_LED` 引脚设置为输出，并将 `DOOR_SENSOR` 引脚设置为输入。现在，是时候利用它们了。要与
    Arduino 上的 GPIO 引脚交互，可以使用 `DigitalRead()` 和 `DigitalWrite()` API。顾名思义，它们用于向数字引脚读取或写入值。在本程序的介绍性部分，你将根据磁性传感器是相互接触（门关闭）还是未接触（门打开）来打开或关闭
    `RED_LED`。因为我在 GPIO 引脚和地之间设计了一个下拉电阻，所以当门打开时开关将读取为 OFF，门关闭时读取为 ON。在清单 5-4 中，我更新了
    `loop()` 方法以包含此逻辑。为了更准确地读取磁性开关的值，我使用 `delay()` API 在 `loop()` 方法的末尾添加了 1 秒（1000
    毫秒）的延迟。


    ```

    #define RED_LED_PIN 14

    #define BLUE_LED_PIN 15

    #define SWITCH_PIN 32

    void setup() {

    pinMode(RED_LED_PIN, OUTPUT);

    pinMode(BLUE_LED_PIN, OUTPUT);

    pinMode(SWITCH_PIN, INPUT);

    Serial.begin(9600);

    Serial.println(" Program start");

    }

    void loop() {

    checkSwitch();

    delay(1000);

    }

    void checkSwitch() {

    int currentState = digitalRead(SWITCH_PIN);

    if (currentState != switchState) {

    updateLockBLE(currentState);

    }

    switchState = currentState;

    digitalWrite(LED_PIN, switchState);

    Serial.print("Switch state: ");

    Serial.println(switchState);

    }

    ```

    *清单 5-4 根据 GPIO 状态打开或关闭 LED*


    在下一章中，你将使用蓝色 LED 来指示蓝牙连接是否已建立。


    ## 计算电池状态


    HUZZAH32 最便捷的特性之一是，其内置的电池端口允许你使用廉价的锂聚合物（LiPo）电池为其供电，并在通过 USB 为 HUZZAH32 供电时为其充电。然而，为了帮助用户充分利用设备，通过配套应用传输电池的充电水平是明智的做法。幸运的是，我们可以利用
    ADC 的强大功能来读取电池电量并通过蓝牙进行传输。


    就像软件开发人员一样，硬件开发人员经常发现自己需要调整设计以适应所面临的限制。就 HUZZAH32 而言，其设计者通过允许某些引脚具有多种功能，能够在设备中集成更多功能。为了读取电池电量，你可以利用他们在引脚
    35（ADC #13）上的工程设计智慧。当此引脚未连接任何东西时，你可以使用它来读取所连接电池电压恰好一半的值。HUZZAH32 上的 ADC 引脚的工作方式与
    iOS 代码中的 RGB 值类似，你可以从中读取或写入 12 位的电平。这允许你微调电机的速度，或者像本示例中必须做的那样，从引脚读取非二进制值。为了准确计算电池电量，将
    ADC 输出值除以 4095（2¹² - 1），以找出电池电量（相对于最大值）的百分比，然后将此结果乘以 2，再乘以 1.1（ADC 引脚的参考电压）和 3.3（HUZZAH32
    输出的参考电压）。如果你想将电池电量报告为百分比，请将此数字除以 4.2，这是可以连接到芯片的 LiPo 电池的最大可能电压。在清单 5-5 中，我修改了
    Arduino 解决方案以包含这些计算。现在，我将输出值显示在 Arduino IDE 控制台上。在下一章中，你将学习如何通过低功耗蓝牙对其进行传输。


    ```

    #define RED_LED_PIN 14

    #define BLUE_LED_PIN 15

    #define SWITCH_PIN 32

    #define BATTERY_PIN 35

    void setup() {

    pinMode(RED_LED_PIN, OUTPUT);

    pinMode(BLUE_LED_PIN, OUTPUT);

    pinMode(SWITCH_PIN, INPUT);

    pinMode(BATTERY_PIN, INPUT);

    Serial.begin(9600);

    Serial.println(" Program start");

    }

    void loop() {

    checkSwitch();

    checkBattery();

    delay(1000);

    }

    ...

    void checkBattery() {

    float currentLevel = analogRead(BATTERY_PIN);

    currentLevel = ((currentLevel / 4095) * 2 * 3.3 * 1.1)

    * 100 / 4.3;

    batteryLevel = currentLevel;

    Serial.print("Battery Level: ");

    Serial.print(t);

    Serial.println("%");

    }

    ```

    *清单 5-5 从 ADC 引脚 13 读取电池电量*

