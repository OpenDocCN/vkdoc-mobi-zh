    Adding a CLLocationManager Property to the CreateWorkoutViewController Class

    ```


    The Swift compiler will flag your code with an error saying that you are attempting
    to assign the property to an incompatible class. To resolve this issue, add the
    definition for the `CLLocationManagerDelegate` protocol.


    The way I like to declare classes as implementing protocols in Swift is by adding
    an extension under the class definition. In the long term, this helps with code
    clarity. An extension is a code block that allows you to add additional functionality
    to a class without modifying the original class itself. A common example is when
    you want to extend the `UIColor` class by adding a method for a color you have
    open in your app that is not defined by Apple.


    The extension for the `CreateWorkoutViewController` class is provided in Listing
    [2-5](#346879_2_En_2_Chapter.xhtml#PC6). The protocol method you must implement
    to handle location permission status updates is `func locationManager:didChangeAuthorizationStatus:`.
    If you already requested permission before, the delegate method will immediately
    return with the authorized value. If you have not requested permission before,
    it will return when the user has made his or her decision.


