- fmt: '# 将选择器连接到接口控制器中的方法


    要测试上下文菜单，请从 Xcode 中运行按钮旁边的菜单中选择一个与 Apple Watch 模拟器配对的 iOS 模拟器（例如，`iPhone 8 Plus
    + Apple Watch Series 3`）。虽然手表的“锻炼历史”屏幕最初是空的，如图 [10-26](#346879_2_En_10_Chapter.xhtml#Fig26)
    所示，但您可以在 Mac 的触控板上执行深按操作，以在模拟器中调出上下文菜单。或者，您可以通过进入“硬件”菜单并选择“触控压力” ➤ “深按”，在模拟器中启用深按操作。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig26_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig26_HTML.jpg)


    图 10-26：从 Apple Watch 模拟器调试上下文菜单


    要关闭“记录锻炼”接口控制器，请创建一个`exit()`函数，如代码清单 [10-6](#346879_2_En_10_Chapter.xhtml#PC6)
    所示，该函数将调用`dismiss()`方法来关闭接口控制器。此方法的行为方式与 iOS 中的`dismissViewController()`方法相同，即从视图层次结构中关闭模态接口控制器。使用
    Interface Builder 中的连接检查器，将`exit()`方法设置为“退出”按钮的选择器，方式与连接上下文菜单的选择器相同。


    ```swift

    class RecordInterfaceController: WKInterfaceController {

    ...

    @IBAction func exit() {

    dismiss()

    }

    }

    ```

    代码清单 10-6：关闭“记录锻炼”屏幕（`RecordInterfaceController.swift`）


    ## 使用 Core Location 和 Core Motion 创建新锻炼


    IOTFit 应用最初是一个基于位置的简单锻炼跟踪应用，随着您学习更多基于传感器的框架，它通过采用 Core Motion 和 HealthKit 扩展为一个精确、详细的应用。苹果将这两个框架以及
    Core Location 都纳入了可以在 Apple Watch 上独立运行的二进制文件集，补充了它们在健身应用中的广泛应用。


    要开始实现 Apple Watch 应用的独立功能，请从“记录锻炼”接口控制器入手。它服务于与 iOS 项目中的“创建锻炼”视图控制器相同的目的，允许用户开始和停止锻炼会话。正如本章开头所述，将
    IOTFitWatch 应用添加到 IOTFit iOS 项目的目标之一是在应用之间共享代码。快速浏览`CreateWorkoutViewController`类，您会注意到许多繁重的工作，包括记录位置、将锻炼保存到
    HealthKit 以及格式化时间字符串，都是由`WorkoutDataManager`类处理的。由于这些功能中的大部分也适用于 watchOS 应用，因此您应尝试将其添加到
    watchOS 目标中。要执行此操作，请在项目导航器中单击`WorkoutDataManager.swift`文件，选择 Xcode 右侧窗格中的“文件检查器”选项卡（带有文档图标的选项卡），然后选中`IOTFitWatch
    Extension`旁边的复选框，如图 [10-27](#346879_2_En_10_Chapter.xhtml#Fig27) 所示。


    ![../images/346879_2_En_10_Chapter/346879_2_En_10_Fig27_HTML.jpg](images/346879_2_En_10_Chapter/346879_2_En_10_Fig27_HTML.jpg)


    图 10-27：将`WorkoutDataManager`类添加到`IOTFitWatch Extension`目标


    在 Xcode 仍设置为编译 iPhone + Apple Watch 模拟器的情况下，尝试编译已将`WorkoutDataManager`类包含在目标中的
    watchOS 应用。由于无法解析`WorkoutType`和`WorkoutState`的定义，编译应会失败。在 IOTFit 项目的纯 iOS 实现中，这些类型是在`CreateWorkoutViewController`类内部定义的，该类无法包含在
    watchOS 目标中。要修复编译问题，请将这些值移到`WorkoutDataManager`类的顶部，如代码清单 [10-7](#346879_2_En_10_Chapter.xhtml#PC7)
    所示。现在，watchOS 应用应能成功编译。


    ```swift

    import Foundation

    import CoreLocation

    import HealthKit

    enum WorkoutState {

    case inactive

    case active

    case paused

    }

    struct WorkoutType {

    static let automotive = "Driving"

    static let running = "Running"

    static let bicycling = "Bicycling"

    static let stationary = "Stationary"

    static let walking = "Walking"

    static let unknown = "Unknown"

    }

    let timerInterval : TimeInterval = 1.0

    ...

    class WorkoutDataManager {

    static let sharedManager = WorkoutDataManager()

    ...

    }

    ```

    代码清单 10-7：完善`WorkoutDataManager`类


    要继续实现“记录锻炼”接口控制器，请从“创建锻炼”视图控制器移植状态初始化代码。回顾 iOS 版本，您会注意到视图控制器通过一系列最初设置为`0`值的属性来维护其状态。当视图控制器加载时，您使用这些值来初始化用户界面中的标签。在代码清单
    [10-8](#346879_2_En_10_Chapter.xhtml#PC8) 中，我扩展了“记录锻炼”接口控制器类，以包含这些属性和`updateUserInterface()`方法。特别要注意，watchOS
    接口控制器是通过`willActivate()`方法（而不是 iOS 上的`viewWillAppear()`）被唤醒的，并且用于设置按钮标题的便捷方法要简短得多。'
