- fmt: '### Note


    Apple allows you to create a limited Developer account without a paid membership
    that lets you test up to three devices per Apple ID. For this book, this type
    of account is sufficient. However, when you reach the stage where you must release
    your app on the App Store, or wish to share it via TestFlight or Enterprise distribution,
    you will have to upgrade your account to a paid tier.


    After signing in, the Accounts window will show a list of all the Apple Developer
    Program teams your Apple ID is associated with, as shown in Figure [1-12](#346879_2_En_1_Chapter.xhtml#Fig12).
    To sign onto another Apple ID account or add a Source Control Management account
    (for example, GitHub, Bitbucket) to Xcode, you can click the plus (+) button at
    the bottom-left (circled in Figure [1-12](#346879_2_En_1_Chapter.xhtml#Fig12)).


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig12_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig12_HTML.jpg)


    Figure 1-12: Accounts window for successful sign-in


    After successfully linking your account, it is safe to close the Accounts window.
    When you return to the editor window, your project settings should resemble those
    in Figure [1-13](#346879_2_En_1_Chapter.xhtml#Fig13), but with your team set as
    the team for the project.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig13_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig13_HTML.jpg)


    Figure 1-13: Project settings after successfully signing in


    If your selection still does not appear after closing the Accounts window, click
    the Team drop-down menu again, to select one of your linked teams manually. You
    can use this same method to change the team a project is associated with.


    These steps complete the project setup phase for this chapter. In later chapters,
    you will return to the project settings to add new features to the app. Feel free
    to use this section as a quick refresher at those times.


    ## Building an Adaptive User Interface


    As an app developer, you always have to keep three thoughts in the back of your
    head: “*How do I build it?*”, “*How do I convince people to download it?*”, and
    “*How do I keep people coming back for more?*” Although marketing strategies are
    critical to building and maintaining a customer base, as a developer, you can
    make an app more attractive to your users by making sure it has a solid feature
    set and provides a compelling, consistent user experience across all devices.
    In this section, I will introduce you to using the Auto Layout features of iOS,
    to build a user interface that can *adapt* to all of the different devices iOS
    runs on.


    Until the release of the iPhone 5, iOS developers only had to worry about two
    devices: the iPhone and the iPad. If a developer wanted to be on the cutting edge,
    he or she could also configure all of the user interface elements to handle rotating
    with the device. For this workflow, many of us could get by programming the entire
    layout ourselves and maintaining separate Interface Builder (`.xib`) files for
    the iPhone and iPad and for portrait and landscape modes. However, things started
    to change rapidly after the iPhone 4 was released, and today’s device lineup for
    iOS has expanded greatly since those early days. As an example, in Figure [1-14](#346879_2_En_1_Chapter.xhtml#Fig14),
    I have provided a screenshot of the device preview options in Interface Builder
    as of late 2018.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig14_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig14_HTML.jpg)


    Figure 1-14: Xcode 9’s Interface Builder device preview selector


    In order of decreasing screen size, you are able to view previews for the following
    devices:


    - iPad Pro 13"

    - iPad Pro 10.5"

    - iPad Pro 9.7"

    - iPhone 8 Plus

    - iPhone X

    - iPhone 8

    - iPhone SE

    - iPhone 4S


    Going back to Figure [1-14](#346879_2_En_1_Chapter.xhtml#Fig14) for a second,
    if you look carefully, you will notice that every iPhone in the list has a different
    aspect ratio. When you combine these variables with portrait and landscape mode,
    it starts to become obvious why iOS developers moved away from hard-coding pixel
    positions for user interface elements a long time ago. It sends you down an endless
    `if` statement rabbit hole!


    By using Apple’s trait APIs (`horizontalSizeClass`, `verticalSizeClass`, `displayScale`,
    `userInterfaceIdiom`), you can determine at runtime the display characteristics
    of the device you are running on, without having to worry about the exact device
    model or pixel size. You can then use these to define rules (*constraints*) for
    how Auto Layout should adapt items for different screen configurations (for example,
    iPad Pro in landscape mode, iPhone SE in portrait mode).


    Each size class has two possible values: `regular` or `compact`. Auto Layout defines
    iPads as purely `regular` devices. Both its horizontal and vertical size classes
    return `regular` values, regardless of what the screen orientation is. iPhones,
    however, introduce compact values, based on their device orientation. An iPhone
    in portrait orientation returns `regular` for its vertical size class and `compact`
    for its horizontal size class. An iPhone in landscape orientation returns `compact`
    for its vertical size class and `compact` for its horizontal size class. If you
    are wondering why, Figure [1-15](#346879_2_En_1_Chapter.xhtml#Fig15) should help.
    When you put an iPhone X in portrait orientation next to a ten-inch iPad Pro in
    landscape orientation, you will notice their screen heights are about the same,
    but the iPhone X is much smaller in width. When you rotate the iPhone X to landscape
    orientation, both dimensions will be much smaller than the iPad Pro.


    ![../images/346879_2_En_1_Chapter/346879_2_En_1_Fig15_HTML.jpg](images/346879_2_En_1_Chapter/346879_2_En_1_Fig15_HTML.jpg)


    Figure 1-15: Comparing the physical dimensions of an iPhone X and iPad Pro


    The way you will use Auto Layout in this project is by placing elements on the
    main storyboard for the app via Interface Builder and then using the IDE to set
    the Auto Layout constraints for each. Interface Builder’s preview tools let you
    toggle between different device configurations, so you can see if your rules are
    sufficient to be a good fit for the devices you are targeting. What has worked
    best for me in the past has been to work out most of the details of Auto Layout
    in Interface Builder first and then fine-tune settings in my code later.'
