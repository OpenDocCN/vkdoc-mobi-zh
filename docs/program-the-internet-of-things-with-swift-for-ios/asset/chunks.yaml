    ...

    lastSavedTime = Date()

    workoutStartTime = Date()

    WorkoutDataManager.sharedManager.

    createNewWorkout()

    if(CMMotionManager().isDeviceMotionAvailable

    && CMPedometer.isStepCountingAvailable()

    && CMAltimeter.isRelativeAltitudeAvailable()){

    isMotionAvailable = true

    startPedometerUpdates()

    } else {

    NSLog("Motion activity not available on

    device.")

    isMotionAvailable = false

    }

    }

    func startPedometerUpdates() {

    guard let workoutStartTime = workoutStartTime else {

    return

    }

    pedometer = CMPedometer()

    pedometer?.startUpdates(from: workoutStartTime,

    withHandler: { (pedometerData:

    CMPedometerData?, error: Error?) in

    NSLog("Received pedometer update!")

    })

    }

    ...

    }

    // Listing 3-2

    // Adding a Step Count Request to the CreateWorkoutViewController Class

    ```


    The completion handler is intentionally empty, as the purpose of this exercise
    is to learn how to present the permission alert. In the next section, you will
    learn how to work with the data to display step count in your apps.


    Now, run the modified application on an iPhone and press the Start button. The
    first time you press the Start button, you will see a permission alert on your
    phone, similar to that in the screenshot in Figure [3-2](#346879_2_En_3_Chapter.xhtml#Fig2).


    ![../images/346879_2_En_3_Chapter/346879_2_En_3_Fig2_HTML.jpg](images/346879_2_En_3_Chapter/346879_2_En_3_Fig2_HTML.jpg)


    **Figure 3-2** Motion permission alert for the IOTFit app


    ## Receiving Real-Time Step Count Updates from the iPhone‘s Pedometer


    One of the technologies that kicked off the Quantified Self movement in the early
    2000s was the introduction of inexpensive standalone pedometers that displayed
    step counts on an LCD screen. As technology evolved, they began to integrate other
    statistics, such as floors climbed and smartphone integration (the most famous
    being the Fitbit). Luckily, iPhones now include very advanced, accurate pedometer-like
    features built into the M-series motion coprocessor chips, without the need for
    additional external hardware.


    In Listing [3-2](#346879_2_En_3_Chapter.xhtml#PC2), the method I used to initiate
    the permission request was `startUpdates(from:withHandler:)`. This method tells
    the pedometer to start collecting data and send it back to your app via the completion
    handler *closure* you specify.


    A closure in Swift operates the same way as a block in Objective-C or an anonymous
    function in other high-level programming languages. Closures are often defined
    and passed as parameters for other methods. They are an appropriate choice for
    long-running methods or methods whose response time is unclear (such as updates
    from hardware), or in place of *protocols*, whose implementations often end up
    requiring a lot of supporting code.


    The closure for pedometer updates returns a `CMPedometerData` object, if the operation
    was a success (or an uninitialized optional value, in case of failure). By inspecting
    this value, you can determine the number of steps traveled, floors ascended or
    descended, distance, and pace of the user between the starting time and the time
    of the update. In Listing [3-3](#346879_2_En_3_Chapter.xhtml#PC3), I have updated
    the `CreateWorkoutViewController` class to include new properties for tracking
    pace and floors climbed. I also updated the `startPedometerUpdates()` method to
    use the pedometer-based values instead of the GPS values and refactored the logic
    to reset the workout tracking values into a new `resetWorkoutData()` method.'
