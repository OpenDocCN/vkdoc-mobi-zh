    {`

    `    NSIndexPath *indexPath =`

    `              [NSIndexPath indexPathForRow:[[imageIndexes objectForKey:connectionIdentifier]
    intValue]`

    `                                                           inSection:0];`

    `    ProductCell *prod = (ProductCell *)[[self tableView] cellForRowAtIndexPath:indexPath];`


    `    [prod setProductImage:[image resizedImageWithSize:CGSizeMake(64.0, 64.0)]];`


    `    [imageIndexes removeObjectForKey:connectionIdentifier];`

    `}`


    Finally, in `didReceiveMemoryWarning`, add this line:


    `[apiEngine clearCache];`


    Now the API engine creates a simple in-memory cache, and the products list view
    takes full advantage of it. The product details view doesn''t need to change anything,
    however. This is because the API engine checks the cache before making the request.
    Simple and intelligent caching solutions usually hide the details of the cache
    from most view controllers.


    Since the first level of our two-tier approach is complete, let''s take a look
    at our disk caching solution.


    ##### Implementing Our Disk Caching Solution


    The `ASIHTTPRequest` team members have given us the second tier of our caching
    solution. They have created a class called `ASIDownloadCache`. This class is the
    default implementation of the `ASICacheDelegate` protocol. If you have your own
    disk caching system, conform to that protocol, and you can tie that implementation
    into `ASIHTTPRequest`.


    For Super Checkout, we''ll be using the default implementation that comes with
    the project. To implement these changes, we''ll be editing only the `SuperCheckoutAPIEngine.m`
    source file. Open it, and add `#import "ASIDownloadCache.h"` to the import statements.
    Then, modify the class extension interface to look like [Listing 6–9](#Chapter06.html#list_6_9).


    **Listing 6–9.** *Modifying the Class Extension to Add Cache Control to It*


    `// Utility methods`

    `- (NSString *)_queryStringWithBase:(NSString *)base`

    `                                               parameters:(NSDictionary *)params`

    `                                                     prefixed:(BOOL)prefixed;`

    `- (NSString *)_encodeString:(NSString *)string;`


    `// Connection/Request methods`


    **`- (NSString *)_sendRequest:(NSURL *)theURL`**

    **`withRequestType:(SuperCheckoutRequestType)requestType`**

    **`responseType:(SuperCheckoutResponseType)responseType`**

