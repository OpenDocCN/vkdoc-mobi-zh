  trans: "\n图 4–14 同时还展示了这些事件的发生时间、对应的库以及调用方。我们主要关注的是调用方。查看 Instruments 提供的信息，我们可以看到对\
    \ `SBJsonParser` 类的三次调用、两次 `NSAutoreleasePool` 的排空操作，以及在 `ShoppingCartViewController`\
    \ 中发生的僵尸对象调用。查看僵尸对象调用的调用栈：打开 Instruments 窗口的右侧面板（使用窗口顶部工具栏“查看”上方的右侧按钮），然后在事件列表中选择\
    \ Zombie 调用。\n\n![images](img/0415.jpg)\n\n**图 4–15.** *导致消息被发送给僵尸引用的调用栈。*\n\n\
    图 4–15 展示了如何检查导致消息被发送给僵尸对象并最终导致应用崩溃的调用栈。我们看到的这个调用栈中包含了一些 Objective-C 运行时和框架的调用。我们对这些调用不太感兴趣，因此双击调用栈中的\
    \ `ShoppingCartViewController` 调用。这会带我们定位到有问题的代码。有问题的代码行就在这里：\n\n```\nNSDictionary\
    \ *cartItem = [[shoppingCart objectForKey:@\"items\"] objectAtIndex:[indexPath\n\
    row]];\n```\n\n这段代码看起来很简单。我们从一个字典中获取一个数组，然后从该数组中取出一项。那么这里的僵尸对象是什么呢？我们唯一操作的对象就是\
    \ `shoppingCart`，所以问题肯定出在它身上。但为什么它会成为僵尸引用呢？线索在于这个对象的历史。该对象始于 `SBJsonParser`，最终辗转到了\
    \ `ShoppingCartViewController`。为什么视图控制器没有对它进行持有（retain）呢？问得好！让我们看看其中一个委托回调方法，确切地说是\
    \ `cartContentsReceived:forRequest:`。方法如下：\n\n```\n-(void) cartContentsReceived:(NSDictionary\
    \ *)cart forRequest:(NSString\n*)connectionIdentifier {\n    shoppingCart = cart;\n\
    \n    NSNotification *note = [NSNotification notificationWithName:@\"CartUpdated\"\
    \nobject:[NSNumber\nnumberWithInt:[[shoppingCart objectForKey:@\"items\"] count]]];\n\
    \n    [[NSNotificationCenter defaultCenter] postNotification:note];\n\n    [self.tableView\
    \ reloadData];\n\n    if([[shoppingCart objectForKey:@\"items\"] count] == 0)\
    \ {\n        [self setEditing:NO];\n    }\n}\n```\n\n你能发现问题所在吗？没错，问题就出在方法的第一行。要修复它，我们只需将该行代码改为：\n\
    \n```\nshoppingCart = [cart retain];\n```\n\n现在，让我们运行应用并重复之前的操作步骤。当你进入购物车界面时，应用还会崩溃吗？不崩溃了？很好。恭喜！我们已经修复了应用中第一个明显的\
    \ bug。\n\n### 其他线程中的僵尸对象（大致如此）\n\n到目前为止，我们已经修复了一系列问题，从静态分析器发现的简单内存泄漏到查找 `NSZombie`\
    \ 实例。然而这个应用中还有更多问题。假设在这个例子中，质量保证（QA）部门反馈了一个崩溃 bug，描述如下：“当用户查看详情屏幕并快速导航回产品屏幕时，应用崩溃。该问题在通过\
    \ 3G 网络连接的 iPhone 上（比) 在 Wi-Fi 连接上更常见。”\n\nQA 工程师随 bug 报告发送了一个崩溃日志（实际的崩溃日志更长，但我们只关注主线程，因为崩溃就发生在这里）：\n\
    \n```\nThread 0 name:  Dispatch queue: com.apple.main-thread\nThread 0 Crashed:\n\
    0   libobjc.A.dylib               0x00002c9a objc_msgSend + 18\n1   Foundation\
    \                    0x000122ee -[NSURLConnection(NSURLConnectionReallyInternal)\n\
    \ sendDidFinishLoading] + 62\n2   Foundation                    0x00012270 _NSURLConnectionDidFinishLoading\
    \ + 72\n3   CFNetwork                     0x0000f40a URLConnectionClient::_clientDidFinishLoading(URLConnectionClient::ClientConnectionEventQueu\n\
    e*) + 130\n4   CFNetwork                     0x00003f42\n URLConnectionClient::ClientConnectionEventQueue::processAllEventsAndConsumePayload(XCo\n\
    nnectionEventInfo<XClientEvent, XClientEventParams>*, long) + 94\n5   CFNetwork\
    \                     0x00003e34 URLConnectionClient::processEvents() + 64\n6\
    \   CFNetwork                     0x00003de6\n URLConnection::multiplexerClientPerform(RunLoopMultiplexer*)\
    \ + 30\n7   CFNetwork                     0x00003d58 MultiplexerSource::perform()\
    \ + 120\n8   CFNetwork                     0x00003cd6 MultiplexerSource::_perform(void*)\
    \ + 2\n9   CoreFoundation                0x00075a72\n __CFRUNLOOP_IS_CALLING_OUT_TO_A_SOURCE0_PERFORM_FUNCTION__\
    \ + 6\n10  CoreFoundation                0x00077758 __CFRunLoopDoSources0 + 376\n\
    11  CoreFoundation                0x000784e4 __CFRunLoopRun + 224\n12  CoreFoundation\
    \                0x00008ebc CFRunLoopRunSpecific + 224\n13  CoreFoundation   \
    \             0x00008dc4 CFRunLoopRunInMode + 52\n14  GraphicsServices       \
    \       0x00004418 GSEventRunModal + 108\n15  GraphicsServices              0x000044c4\
    \ GSEventRun + 56\n16  UIKit                         0x0002ed62 -[UIApplication\
    \ _run] + 398\n17  UIKit                         0x0002c800 UIApplicationMain\
    \ + 664\n18  Super Checkout                0x00002648 0x1000 + 5704\n19  Super\
    \ Checkout                0x00002608 0x1000 + 5640\n```\n\n没什么帮助，对吧？查看崩溃日志，我们可以确定是\
    \ `objc_msgSend` 调用失败了。嗯，消息发送失败，这是一个相当重要的线索；最可能的原因似乎是某条消息被发送给了僵尸对象。所以我们现在要做的就是使用\
    \ Zombie 仪器启动应用。但这里有个问题。根据 bug 报告，这个问题是间歇性的，并且在 3G 连接上更常见。有一种方法可以减慢你的网络连接速度，但我们将在后面章节中介绍。目前，我们将绕过使用\
    \ Instruments，而是连接一台设备，让 Xcode 在出问题的代码处中断。\n\n**注意：** 如果你没有可以连接到 Mac 的设备，你可以按照第\
    \ 6 章中的步骤来减慢你的连接速度。由于你是在模拟器中运行，你可以使用 Zombies 仪器运行应用，并得到与我们修复购物车屏幕 bug 时相同的结果。\n"
- fmt: "设备是否已连接？请确保设备未连接 Wi-Fi（如果\n*是iPhone）。现在，通过 Scheme 选择器（Scheme selector）选择设备部署目标，在设备上运行应用程序（参见[图4-16](#Chapter04.html#fig_4_16)）。然后，通过转到\
    \ `Product` > `Run` 在设备上运行应用程序。当应用程序开始在单元格中加载图像时，开始快速选择一个产品并点击返回。在某个时刻，应用程序将会崩溃，Xcode\
    \ 将接管控制权，您会看到 GDB 提示符，并且应用程序停止在[图4-1](#Chapter04.html#fig_4_1)所示的位置。\n\n![images](images/0416.jpg)\n\
    \n**图4-16.** *Xcode 会显示您的设备在 iTunes 中的名称。在此例中，设备名为 Communicator。*\n\n![images](images/0417.jpg)\n\
    \n**图4-17.** *Super Checkout 已停止运行，调试器已接管控制权，并向您显示有问题的代码。*\n\n查看控制台，您会在 GDB 提示符前看到以下文本：\n\
    \n```\n2011-03-20 18:54:01.276 Super Checkout[2859:707] *** -[ProductDetailsViewController\n\
    \ respondsToSelector:]: message sent to deallocated instance 0x13a620\n```\n\n\
    我们的猜测是正确的！我们正在向一个已释放的 `ProductDetailsViewController` 类型的对象发送消息。崩溃的代码位于 `SuperCheckoutAPIEngine.m`\
    \ 中，我们可以看到断点停在了对该类委托（delegate）的调用之后。为了验证委托是否是罪魁祸首，请在控制台旁边的变量视图中展开 `self` 指针，如图[4-18](#Chapter04.html#fig_4_18)所示。如果看不到变量视图，请点击“清除”按钮上方、控制台右侧的按钮，该按钮可同时显示变量视图和控制台。\n\
    \n![images](images/0418.jpg)\n\n**图4-18.** *Xcode 中的变量列表，显示委托是一个 NSZombie*\n\n\
    通过展开 `self` 变量，我们可以看到委托是 `NSZombie` 的一个实例。现在，让我们看看幕后发生了什么。通过快速选择一个产品并返回产品列表，我们每次都会分配一个新的视图控制器。由于产品详情屏幕会加载图像，它使用\
    \ API 引擎来获取图像。打开 `ProductDetailsViewController.m` 文件查看 `dealloc` 方法：\n\n```\n\
    - (void)dealloc {\n    [apiEngine release];\n    [selectedProduct release];\n\
    \    [productDetailsHeader release];\n    [productImage release];\n    [productNameLabel\
    \ release];\n    [productPriceLabel release];\n    [addToBasketCell release];\n\
    \    [quantityCell release];\n    [super dealloc];\n}\n```\n\n缺少了一些东西。在释放 `apiEngine`\
    \ 之前，我们没有清除其委托。继续操作，在释放 `apiEngine` 之前添加 `[apiEngine setDelegate:nil];`。提交该更改后，我们又修复了一个崩溃错误。\n\
    \n这个 Bug 更难发现和重现，因为它位于一些异步网络代码中——很容易看出这类问题变得多么复杂。这是针对内存相关 Bug 的第二道防线。\n\n### 泄露（Leaks）\n\
    \n现在，假设 QA 提交了一份报告，指出应用程序使用时间越长，运行越缓慢。在上下滚动几分钟后，应用程序最终崩溃。这个问题听起来像内存泄漏，所以让我们看看能发现什么。\n\
    \n请注意，这个问题是在一次部署后出现的，那次部署更新了一些其他代码，并对 `Super_CheckoutViewController.m` 中的 `imageReceived:forRequest:`\
    \ 方法做出了以下更改：\n\n```\n-(void) imageReceived:(UIImage *)image forRequest:(NSString\
    \ *)connectionIdentifier {\n    ProductCell *cell = (ProductCell *)[self.tableView\n\
    cellForRowAtIndexPath:[imageIndexPaths\n objectForKey:connectionIdentifier]];\n\
    \n    CGFloat target = 64;\n\n    CGImageRef oldImage = [image CGImage];\n   \
    \ CGFloat imageWidth = (CGFloat)CGImageGetWidth(oldImage);\n    CGFloat imageHeight\
    \ = (CGFloat)CGImageGetHeight(oldImage);\n\n    CGFloat widthFactor = target /\
    \ imageWidth;\n    CGFloat heightFactor = target / imageHeight;\n    CGFloat factor\
    \ = 1.0;\n\n    if (widthFactor > 1.0 && heightFactor > 1.0) {\n        factor\
    \ = 1.0;\n    } else {\n        if (widthFactor >= heightFactor) {\n         \
    \   factor = widthFactor;\n        } else {\n            factor = heightFactor;\n\
    \        }\n    }\n\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
    \    CGContextRef imageContext = CGBitmapContextCreate(NULL, imageWidth, imageHeight,\
    \ 8, 4\n * imageWidth, colorSpace, kCGImageAlphaPremultipliedFirst);\n    CGContextDrawImage(imageContext,\
    \ CGRectMake(0, 0, imageWidth, imageHeight), oldImage);\n    CGContextScaleCTM(imageContext,\
    \ imageWidth * factor, imageHeight * factor);\n    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);\n\
    \n    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];\n\n\
    \    [cell.productImage setImage:resizedImage];\n\n    [imageIndexPaths removeObjectForKey:connectionIdentifier];\n\
    }\n```\n\n需求是将图像调整为与要显示的图像尺寸匹配。新代码有一些非常明显的问题，但我们将通过 Instruments 运行它并定位代码中的问题。\n\
    \n我们不需要在设备上运行应用程序，因此使用方案选择器切换到模拟器。对应用程序进行性能分析（Profile），这次在 Instruments 启动并询问您使用哪个模板时，选择“Leaks”（参见[图4-19](#Chapter04.html#fig_4_19)）。\n\
    \n![images](images/0419.jpg)\n\n**图4-19.** *使用 Leaks 模板启动 Instruments*\n\n当应用程序在模拟器中启动后，在表视图中上下滚动几次，您会看到“Leaks”工具图表中出现一些泄漏。退出\
    \ iOS 模拟器，将 Instruments 置于前台以分析数据。点击“Leaks”图表，即可看到如图[4-20](#Chapter04.html#fig_4_20)所示的视图。\n\
    \n![images](images/0420.jpg)\n\n**图4-20.** *Instruments 显示几处泄漏以及检测到泄漏的内存位置*\n\n\
    让我们花点时间看看这些数据。Instruments 告诉我们有几处内存泄漏。引入最新版本代码中的一些 Core Graphics 代码以及一些 `UIImage`\
    \ 实例似乎正在泄漏。Instruments 证实了怀疑，但我们不知道泄漏的细节。展开 `UIImage` 树，选择顶部的 `UIImage` 实例。接着，点击内存地址旁边的箭头以显示泄漏的详细信息。这类似于向僵尸对象发送消息时的分配工具。图[4-21](#Chapter04.html#fig_4_21)展示了此示例。\n\
    \n![images](images/0421.jpg)\n\n**图4-21.** *在此 Instruments 单次泄漏的详细信息视图中，请注意引用计数视图及其计数剩余为\
    \ 1 的情况。*"
  raw: 'Is the device connected? Make sure the device isn''t connected to a Wi-Fi
    connection (if it is an iPhone). Now, run the application on the device by selecting
    the device deployment target in the Scheme selector (see [Figure 4–16](#Chapter04.html#fig_4_16)).
    Now, run the application on the device by going to Product![image](images/U001.jpg)Run.
    As the application starts loading images in the cells, begin rapidly selecting
    a product and tapping back. At some point, the application is going to crash,
    and Xcode will take over and you''ll be presented at a GDB prompt with the application
    halted at the location shown in [Figure 4–1](#Chapter04.html#fig_4_1).


    ![images](images/0416.jpg)


    **Figure 4–16.** *Xcode presents your device as it is named in iTunes. In this
    case, the device is called Communicator.*


    ![images](images/0417.jpg)


    **Figure 4–17.** *Super Checkout has halted, and the debugger has taken control
    showing you the offending code.*


    Take a look at the console, and you''ll see the following text right before the
    GDB prompt:


    `2011-03-20 18:54:01.276 Super Checkout[2859:707] *** -[ProductDetailsViewController`

    ` respondsToSelector:]: message sent to deallocated instance 0x13a620`


    Our suspicions were correct! We are sending a message to a deallocated object
    of type `ProductDetailsViewController`. The code that crashed is in `SuperCheckoutAPIEngine.m`
    and we can see the breakpoint stopped right after a call to the delegate of the
    class. To verify that the delegate is the culprit, expand the `self` pointer in
    the variables view next to the console as shown in [Figure 4–18](#Chapter04.html#fig_4_18).
    If you don''t see the variables view, click the button that shows both the Variables
    View and the console right above the console next to the Clear button.


    ![images](images/0418.jpg)


    **Figure 4–18.** *The variables list in Xcode showing the delegate as an NSZombie*


    By expanding the `self` variable, we can see that the delegate is an instance
    of an `NSZombie`. Now, let''s look at what is going on behind the scenes. By rapidly
    selecting a product and going back to the product list, we''re allocating a new
    view controller each time. Since the product details screen loads an image, it
    is using the API engine to get the image. Open the `ProductDetailsViewController.m`
    file to view the `dealloc` method:


    `- (void)dealloc {`

    `    [apiEngine release];`

    `    [selectedProduct release];`

    `    [productDetailsHeader release];`

    `    [productImage release];`

    `    [productNameLabel release];`

    `    [productPriceLabel release];`

    `    [addToBasketCell release];`

    `    [quantityCell release];`

    `    [super dealloc];`

    `}`


    Something is missing. We''re not clearing out the delegate on the `apiEngine`
    before we release it. Go ahead and add `[apiEnginesetDelegate:nil];` before releasing
    `apiEngine`. Commit that change, and we''ve fixed another crashing bug.


    This bug was a bit more difficult to find and reproduce, since it was sitting
    inside some asynchronous network code—it is easy to see how complicated these
    things become. This is the second line of defense against memory-related bugs.


    ### Leaks


    Now, assume QA has come back with a report that states the application grows more
    and more sluggish the longer it is being used. After several minutes of scrolling
    up and down, the application finally crashes. This problem sounds like a memory
    leak, so let''s see what we can find.


    Note that this problem arose after a deployment was made where some other code
    was updated and the following change was made to the `imageReceived:forRequest:`
    selector in `Super_CheckoutViewController.m`:


    `-(void) imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier
    {`

    `    ProductCell *cell = (ProductCell *)[self.tableView`

    `cellForRowAtIndexPath:[imageIndexPaths`

    ` objectForKey:connectionIdentifier]];`


    `    CGFloat target = 64;`


    `    CGImageRef oldImage = [image CGImage];`

    `    CGFloat imageWidth = (CGFloat)CGImageGetWidth(oldImage);`

    `    CGFloat imageHeight = (CGFloat)CGImageGetHeight(oldImage);`


    `    CGFloat widthFactor = target / imageWidth;`

    `    CGFloat heightFactor = target / imageHeight;`

    `    CGFloat factor = 1.0;`


    `    if (widthFactor > 1.0 && heightFactor > 1.0) {`

    `        factor = 1.0;`

    `    } else {`

    `        if (widthFactor >= heightFactor) {`

    `            factor = widthFactor;`

    `        } else {`

    `            factor = heightFactor;`

    `        }`

    `    }`


    `    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();`

    `    CGContextRef imageContext = CGBitmapContextCreate(NULL, imageWidth, imageHeight,
    8, 4`

    ` * imageWidth, colorSpace, kCGImageAlphaPremultipliedFirst);`

    `    CGContextDrawImage(imageContext, CGRectMake(0, 0, imageWidth, imageHeight),
    oldImage);`

    `    CGContextScaleCTM(imageContext, imageWidth * factor, imageHeight * factor);`

    `    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);`


    `    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];`


    `    [cell.productImage setImage:resizedImage];`


    `    [imageIndexPaths removeObjectForKey:connectionIdentifier];`

    `}`


    The requirements were to resize the image to match the dimensions of the image
    to be displayed. The new code has some pretty obvious issues, but we''re going
    to run it through Instruments and locate the issues with the code.


    We don''t need to run the application on the device, so switch back to the simulator
    using the scheme selector. Profile the application, and this time, select Leaks
    when Instruments comes up and asks you which template to use (see [Figure 4–19](#Chapter04.html#fig_4_19)).


    ![images](images/0419.jpg)


    **Figure 4–19.** *Launching Instruments with the Leaks template*


    When the application launches in the simulator, scroll up and down the table view
    several times, and you''ll see a few leaks pop up in the Leaks instrument chart.
    Quit the iOS Simulator, and bring Instruments to the foreground to analyze the
    data. Click the Leaks chart to see a view like the one shown in [Figure 4–20](#Chapter04.html#fig_4_20).


    ![images](images/0420.jpg)


    **Figure 4–20.** *Instruments showing a few leaks and the memory where the leak
    has been detected*


    Let''s take a moment to look at this data. Instruments is telling us there are
    several places where memory is leaking. The code that was introduced to the latest
    build has some Core Graphics code as well as some `UIImage` instances that appeared
    to be leaking. Instruments confirms the suspicions, but we don''t know the details
    of the leaks. Expand the `UIImage` tree, and select the top `UIImage` instance.
    Now, click the arrow that is next to the memory address to display the details
    of the leak. This is like the allocations instrument when a zombie was sent a
    message. [Figure 4–21](#Chapter04.html#fig_4_21) shows an example of this.


    ![images](images/0421.jpg)


    **Figure 4–21.** *In this Instruments detail view of a single leak, notice the
    reference count view and how it is left with a count of 1.*'
  trans: "\n设备是否已连接？请确保设备未连接 Wi-Fi（如果\n*是 iPhone）。现在，通过 **方案选择器（Scheme selector）**\
    \ 选择设备部署目标，在设备上运行应用程序（参见图 4-16）。然后，通过转到 `Product` > `Run` 在设备上运行应用程序。当应用程序开始在单元格中加载图像时，开始快速选择一个产品并点击返回。在某个时刻，应用程序将会崩溃，Xcode\
    \ 将接管控制权，您会看到 GDB 提示符，并且应用程序停止在图 4-1 所示的位置。\n\n![images](img/0416.jpg)\n\n**图\
    \ 4-16.** *Xcode 会显示您的设备在 iTunes 中的名称。在此例中，设备名为 Communicator。*\n\n![images](img/0417.jpg)\n\
    \n**图 4-17.** *Super Checkout 已停止运行，调试器已接管控制权，并向您显示有问题的代码。*\n\n查看控制台，您会在 GDB 提示符前看到以下文本：\n\
    \n```\n2011-03-20 18:54:01.276 Super Checkout[2859:707] *** -[ProductDetailsViewController\n\
    \ respondsToSelector:]: message sent to deallocated instance 0x13a620\n```\n\n\
    我们的猜测是正确的！我们正在向一个已释放的 `ProductDetailsViewController` 类型的对象发送消息。崩溃的代码位于 `SuperCheckoutAPIEngine.m`\
    \ 中，我们可以看到断点停在了对该类委托（delegate）的调用之后。为了验证委托是否是罪魁祸首，请在控制台旁边的变量视图中展开 `self` 指针，如图\
    \ 4-18 所示。如果看不到变量视图，请点击“清除”按钮上方、控制台右侧的按钮，该按钮可同时显示变量视图和控制台。\n\n![images](img/0418.jpg)\n\
    \n**图 4-18.** *Xcode 中的变量列表，显示委托是一个 NSZombie*\n\n通过展开 `self` 变量，我们可以看到委托是 `NSZombie`\
    \ 的一个实例。现在，让我们看看幕后发生了什么。通过快速选择一个产品并返回产品列表，我们每次都会分配一个新的视图控制器。由于产品详情屏幕会加载图像，它使用\
    \ API 引擎来获取图像。打开 `ProductDetailsViewController.m` 文件查看 `dealloc` 方法：\n\n```\n\
    - (void)dealloc {\n    [apiEngine release];\n    [selectedProduct release];\n\
    \    [productDetailsHeader release];\n    [productImage release];\n    [productNameLabel\
    \ release];\n    [productPriceLabel release];\n    [addToBasketCell release];\n\
    \    [quantityCell release];\n    [super dealloc];\n}\n```\n\n缺少了一些东西。在释放 `apiEngine`\
    \ 之前，我们没有清除其委托。继续操作，在释放 `apiEngine` 之前添加 `[apiEngine setDelegate:nil];`。提交该更改后，我们又修复了一个崩溃错误。\n\
    \n这个 Bug 更难发现和重现，因为它位于一些异步网络代码中——很容易看出这类问题变得多么复杂。这是针对内存相关 Bug 的第二道防线。\n\n### 泄露（Leaks）\n\
    \n现在，假设 QA 提交了一份报告，指出应用程序使用时间越长，运行越缓慢。在上下滚动几分钟后，应用程序最终崩溃。这个问题听起来像内存泄漏，所以让我们看看能发现什么。\n\
    \n请注意，这个问题是在一次部署后出现的，那次部署更新了一些其他代码，并对 `Super_CheckoutViewController.m` 中的 `imageReceived:forRequest:`\
    \ 方法做出了以下更改：\n\n```\n-(void) imageReceived:(UIImage *)image forRequest:(NSString\
    \ *)connectionIdentifier {\n    ProductCell *cell = (ProductCell *)[self.tableView\n\
    cellForRowAtIndexPath:[imageIndexPaths\n objectForKey:connectionIdentifier]];\n\
    \n    CGFloat target = 64;\n\n    CGImageRef oldImage = [image CGImage];\n   \
    \ CGFloat imageWidth = (CGFloat)CGImageGetWidth(oldImage);\n    CGFloat imageHeight\
    \ = (CGFloat)CGImageGetHeight(oldImage);\n\n    CGFloat widthFactor = target /\
    \ imageWidth;\n    CGFloat heightFactor = target / imageHeight;\n    CGFloat factor\
    \ = 1.0;\n\n    if (widthFactor > 1.0 && heightFactor > 1.0) {\n        factor\
    \ = 1.0;\n    } else {\n        if (widthFactor >= heightFactor) {\n         \
    \   factor = widthFactor;\n        } else {\n            factor = heightFactor;\n\
    \        }\n    }\n\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
    \    CGContextRef imageContext = CGBitmapContextCreate(NULL, imageWidth, imageHeight,\
    \ 8, 4\n * imageWidth, colorSpace, kCGImageAlphaPremultipliedFirst);\n    CGContextDrawImage(imageContext,\
    \ CGRectMake(0, 0, imageWidth, imageHeight), oldImage);\n    CGContextScaleCTM(imageContext,\
    \ imageWidth * factor, imageHeight * factor);\n    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);\n\
    \n    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];\n\n\
    \    [cell.productImage setImage:resizedImage];\n\n    [imageIndexPaths removeObjectForKey:connectionIdentifier];\n\
    }\n```\n\n需求是将图像调整为与要显示的图像尺寸匹配。新代码有一些非常明显的问题，但我们将通过 Instruments 运行它并定位代码中的问题。\n\
    \n我们不需要在设备上运行应用程序，因此使用方案选择器切换到模拟器。对应用程序进行性能分析（Profile），这次在 Instruments 启动并询问您使用哪个模板时，选择“Leaks”（参见图\
    \ 4-19）。\n\n![images](img/0419.jpg)\n\n**图 4-19.** *使用 Leaks 模板启动 Instruments*\n\
    \n当应用程序在模拟器中启动后，在表视图中上下滚动几次，您会看到“Leaks”工具图表中出现一些泄漏。退出 iOS 模拟器，将 Instruments 置于前台以分析数据。点击“Leaks”图表，即可看到如图\
    \ 4-20 所示的视图。\n\n![images](img/0420.jpg)\n\n**图 4-20.** *Instruments 显示几处泄漏以及检测到泄漏的内存位置*\n\
    \n让我们花点时间看看这些数据。Instruments 告诉我们有几处内存泄漏。引入最新版本代码中的一些 Core Graphics 代码以及一些 `UIImage`\
    \ 实例似乎正在泄漏。Instruments 证实了怀疑，但我们不知道泄漏的细节。展开 `UIImage` 树，选择顶部的 `UIImage` 实例。接着，点击内存地址旁边的箭头以显示泄漏的详细信息。这类似于向僵尸对象发送消息时的分配工具。图\
    \ 4-21 展示了此示例。\n\n![images](img/0421.jpg)\n\n**图 4-21.** *在此 Instruments 单次泄漏的详细信息视图中，请注意引用计数视图及其计数剩余为\
    \ 1 的情况。*\n"
- fmt: "# 扩展详细窗格\n\n展开“扩展详细”窗格（点击工具栏中的右侧主视图按钮），然后根据泄漏历史记录中的任意一项查看调用堆栈。您之前已经见过此视图，因此双击出现在我们代码中的某个调用堆栈项。这将打开有问题的源代码文件，文件上带有一些注释，让您了解哪些变量正在泄漏以及泄漏了多少。图\
    \ 4–22 显示了相同的视图。\n\n![images](images/0422.jpg)\n\n**Figure 4–22.** *检查源代码可以找到一些可能的罪魁祸首*\n\
    \n我们已经能够通过变更追踪到哪些对象被泄漏了，所以让我们修复这些泄漏。点击编辑器中的 Xcode 图标，将打开 Xcode 并显示有问题的代码。由于部分代码使用了\
    \ C 语言 API，我们需要记住：几乎所有名称中包含“create”的 C 函数都会创建一个新的引用；我们需要通过释放操作来平衡它。\n\n在 Xcode\
    \ 中打开该文件，并修改`if`语句下的代码段，使其与以下内容匹配：\n\n```\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
    \    CGContextRef imageContext = CGBitmapContextCreate(NULL, imageWidth, imageHeight,\
    \ 8, 4\n* imageWidth, colorSpace, kCGImageAlphaPremultipliedFirst);\n    CGContextDrawImage(imageContext,\
    \ CGRectMake(0, 0, imageWidth, imageHeight), oldImage);\n    CGContextScaleCTM(imageContext,\
    \ imageWidth * factor, imageHeight * factor);\n    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);\n\
    \n    CGColorSpaceRelease(colorSpace);\n    CGContextRelease(imageContext);\n\n\
    \    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];\n\n \
    \   [cell.productImage setImage:resizedImage];\n\n    CGImageRelease(newImage);\
    \  \n    [resizedImage release];\n```\n\n现在，在泄漏检测工具中重新运行应用程序，并多滚动一些内容。这修复了问题吗？Instruments\
    \ 仍然检测到了一些泄漏。好吧，我们将深入探究这些泄漏。我们已经修复了最初的问题，但在所有泄漏都处理完毕之前，我不会感到满意。图 4–23 显示了 Instruments\
    \ 中一个它认为正在泄漏的项目：\n\n![images](images/0423.jpg)\n\n**Figure 4–23.** *在自动释放池中发现的一个泄漏示例*\n\
    \n图 4–23 显示了在自动释放池中检测到的一个泄漏示例（列表中的最后一个）。如果我们追踪该对象的内存历史记录，会看到以下内容：\n\n*   *Malloc*：引用计数为\
    \ 1\n*   *Autorelease*：添加到当前的自动释放池\n*   *Retain*：引用计数为 2\n*   *Release*：引用计数为\
    \ 1\n\n我们现在有一个位于自动释放池中、准备被释放的对象。那它为什么还没有被释放呢？答案在于我们的`main`函数。当应用程序启动时，会创建一个自动释放池。如果没有创建另一个自动释放池，并且代码在主线程上执行，那么这些对象会被添加到为应用程序创建的自动释放池中。这意味着这些内存会一直存在，直到应用程序终止，最顶层的自动释放池被清空。有关自动释放池的更多信息，请查看\
    \ Apple 开发者库中的“内存管理编程指南”。\n\n不过，不要觉得你可以随意在任何地方创建自动释放池。作为 iOS 开发者，我们生活在一个内存受限的世界中，需要做好本分，清理自己产生的垃圾。创建自动释放池可能会引起意外后果，所以只有在绝对必要时才使用自动释放池。一个使用自动释放池的好时机是在一个非常紧凑的循环中，这种循环很容易快速产生大量临时对象。\n\
    \n## 重新审视保留循环\n\n在本章前面部分，我们讨论了如何使用 Instruments 检测保留循环。由于 Super Checkout 没有任何保留循环，我们需要人为制造一个。我不需要引导您从头构建一个新项目并制造保留循环，而是已经为您完成了这些艰苦的工作。这个示例与在\
    \ Instruments 中使用泄漏检测工具的工作流程相同。\n\nInstruments 中显示保留循环的新功能可以在泄漏检测工具的跳转栏中找到。图 4–24\
    \ 显示了制造出来的保留循环，并在跳转栏中选中了相应的项目。\n\n![images](images/0424.jpg)\n\n**Figure 4–24.**\
    \ *Instruments 显示一个简单的保留循环*\n\n在图 4–17 中，首先要注意的是右侧的图表。它显示了内存中的确切循环以及引用之间的关系。所讨论的循环展示了一个典型的子对象持有父对象的情况。在左侧的列表中，您可以看到本次运行中的各种循环。在这个例子中它们都是相同的，并且工作流程是查找堆栈跟踪以确定循环是在哪里创建的。\n\
    \n在这个示例中，点击循环旁边的箭头将会调出图 4–25（右侧区域已展开以显示更多细节）。结果显示的视图能更好地展示保留循环以及导致该循环的堆栈跟踪。点击每个节点会显示不同的堆栈跟踪，因此您可以确定循环真正在代码中的哪个位置被创建并打破它。\n\
    \n![images](images/0425.jpg)\n\n**Figure 4–25.** *循环详情，堆栈跟踪显示了循环开始的位置*\n\n处理完循环问题后，我们就能够熟练地使用我们手中的工具来查找和修复与内存相关的问题了。\n\
    \n## GDB 功夫\n\n当其他方法都失败时，你遇到的就是一个非常有趣的 Bug。正如你在前面的示例中发现的那样，异步代码极难调试。再加上多线程代码会修改相同的对象（无论加锁与否），你就会创造出一些有趣的问题去解决。计算机科学中甚至有专门的分支来应对这些类型的问题。\n\
    \nSuper Checkout 是一个非常简单的应用程序。输入和输出定义明确，网络通信也相当简单。你的应用程序很可能不会这么简单。你可能会遇到死锁（两个线程相互等待对方完成对资源的操作）或竞态条件。如果不使用非常底层的工具进行介入，这两个问题很难诊断。\n\
    \n### GDB，现在别让我失望\n\n我成长过程中最喜欢的歌曲之一是 Little Feat 的《Don't Fail Me Now》。这首歌发行的时候，差不多也是理查德·斯托曼开始推动他的\
    \ GNU 就是 Unix（GNU's Not Unix）自由软件运动的时候。那时，C 语言是任何 Unix 编程的事实标准。他的调试器是 GDB，即 GNU\
    \ 调试器。\n\nGDB 是 Xcode 和 Instruments 调试工具的核心与灵魂。许多漂亮的图表、直方图和菜单都是苹果在 GDB 的基础上应用其精美的设计和营销能力的结果。\n\
    \n然而，图形用户界面有时也会碍事。如果你读到了本章的这个阶段，仍然没有找到你的 Bug，那么真的是时候活动一下指关节，甩甩手，深入命令行 GDB 工具套件了。你可能会对自己哼唱：“GDB，现在别让我失望。”"
  raw: 'Expand the Extended Detail pane (click the right main view button in the toolbar),
    and look at the call stack based on any of the items in the history of the leak.
    You''ve seen this view before, so double-click one of the call stack items that
    occur in our code. This brings up the source code for the offending file, and
    it has some annotations on it to let you know which variables are leaking and
    how much they are leaking. [Figure 4–22](#Chapter04.html#fig_4_22) shows the same
    view.


    ![images](images/0422.jpg)


    **Figure 4–22.** *Inspecting the source shows some likely culprits*


    We''ve been able to track down which objects were leaked by the changes, so let''s
    fix those leaks. Clicking the Xcode icon in the editor will bring up Xcode with
    the offending code in view. Since some of the code is using C APIs, we need to
    remember that pretty much any C function that has “create” in the name will create
    a new reference; we need to balance that with a release.


    Open the file in Xcode, and modify the section under the `if` statement to match
    this:


    `    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();`

    `    CGContextRef imageContext = CGBitmapContextCreate(NULL, imageWidth, imageHeight,
    8, 4`

    `* imageWidth, colorSpace, kCGImageAlphaPremultipliedFirst);`

    `    CGContextDrawImage(imageContext, CGRectMake(0, 0, imageWidth, imageHeight),
    oldImage);`

    `    CGContextScaleCTM(imageContext, imageWidth * factor, imageHeight * factor);`

    `    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);`


    `    CGColorSpaceRelease(colorSpace);`

    `    CGContextRelease(imageContext);`


    `    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];`


    `    [cell.productImage setImage:resizedImage];`


    `    CGImageRelease(newImage);  `

    `    [resizedImage release];`


    Now, rerun the application through leaks, and scroll around a bunch. Did that
    fix the issue? A few leaks are still detected by Instruments. OK, we''re going
    to dive in and look at these leaks. We''ve fixed the original issue, but I''m
    not happy until all leaks are taken care of. [Figure 4–23](#Chapter04.html#fig_4_23)
    shows one of the items from Instruments that it thinks is leaking:


    ![images](images/0423.jpg)


    **Figure 4–23.** *An example of a leak found in an autorelease pool*


    [Figure 4–23](#Chapter04.html#fig_4_23) shows an example of a leak (the last in
    the list) that was detected in an autorelease pool. If we follow the memory history
    for this object, we see the following:


    *   *Malloc*: Retain count is 1

    *   *Autorelease*: Added to the current autorelease pool

    *   *Retain*: Retain count is 2

    *   *Release*: Retain count is 1


    What we have is an object that is sitting in an autorelease pool ready to be released.
    Why hasn''t it been released then? The answer lies in our main function. When
    the application starts up, an autorelease pool is created. If another autorelease
    pool isn''t created, and the code is being executed on the main thread, those
    objects get added to the autorelease pool created for the application. This means
    the memory will stick around until the application is terminated, and the topmost
    autorelease pool is drained. For more information about autorelease pools, check
    out “Memory Management Programming Guide” in the Apple Developer Library.


    Don''t feel like you have license to create autorelease pools everywhere, however.
    Since we live in a memory-constrained world as iOS developers, we need to be good
    citizens and clean up after ourselves. Creating autorelease pools can cause unintended
    consequences, so use an autorelease pool only when absolutely necessary. A good
    time to create one is in a pretty tight loop that could very easily create a lot
    of quickly used temporary objects.


    #### Revisiting Retain Cycles


    Earlier in the chapter, we discussed detecting retain cycles with Instruments.
    Since Super Checkout doesn''t have any retain cycles, we''re going to have to
    manufacture one. Rather than walking you through building a brand new project
    and manufacturing a retain cycle, I''ve already done the hard work for you. This
    example fits within the same workflow as using the Leaks instrument in Instruments.


    The new feature in Instruments that shows you retain cycles can be found in the
    Jump Bar for the Leaks instrument. [Figure 4–24](#Chapter04.html#fig_4_24) shows
    the manufactured retain cycle with the appropriate item selected in the Jump Bar.


    ![images](images/0424.jpg)


    **Figure 4–24.** *Instruments showing a simple retain cycle*


    The first thing to notice in [Figure 4–17](#Chapter04.html#fig_4_17) is the graph
    to the right. This shows the exact cycle in memory and how the references relate
    to each other. The cycle in question shows a typical child retaining a parent.
    In the list to the left, you can see the various cycles from this run. They are
    all the same in this case, and the workflow for finding the stack trace to determine
    where the cycle was created.


    In this example, clicking the arrow next to the cycle will bring up [Figure 4–25](#Chapter04.html#fig_4_25)
    (the right area is expanded for extra detail). The resulting view is a better
    view of the retain cycle, and the stack trace that caused the cycle. Clicking
    each node will bring up a different stack trace, so you can determine where in
    the code the cycle was truly created and break it.


    ![images](images/0425.jpg)


    **Figure 4–25.** *The cycle details with the stack trace showing where the cycle
    started.*


    With cycles out of the way, we are well on our way to fully using the tools at
    our disposal for finding and fixing memory related issues.


    ### GDB Kung Fu


    When all else fails, you have a very interesting bug. As you discovered in the
    previous example, asynchronous code is extremely hard to debug. Throw in multithreaded
    code that modifies the same objects, locking or not, and you can create some interesting
    problems to solve. There are entire branches of computer science to tackling some
    of these types of problems.


    Super Checkout is a pretty simple application. The inputs and outputs are well
    defined, and the network communication is fairly trivial. Your application is
    likely not going to be as trivial. You might be running into deadlocks, an occurrence
    where two threads are waiting on each other to finish with a resource or race
    conditions. Those two problems are very hard to diagnose without stepping in with
    a very low level tool.


    #### GDB, Don''t Fail Me Now


    One of my favorite songs growing up was Little Feat''s, “Don''t Fail Me Now.”
    The song came out about the same time that Richard Stallman was starting his GNU''s
    Not Unix push for free software. Back then, C was the de facto standard for any
    sort of Unix programming. His debugger was GDB, the Gnu Debugger.


    GDB is the heart and soul of the Xcode and Instrument debugging tools. Many of
    the beautiful charts, histograms, and menus are Apple''s delicious design and
    marketing prowess applied to GDB.


    Sometimes, however, the GUI can get in the way. If you''ve reached at this stage
    of our chapter and still haven''t found your bug, its truly time to crack your
    knuckles, shake your fingers a bit, and dive into the command-line GDB tool suite.
    You might hum to yourself, “GDB, don''t fail me now.”'
  trans: "\n# 扩展详细窗格\n\n展开“扩展详细”窗格（点击工具栏中的右侧主视图按钮），然后根据泄漏历史记录中的任意一项查看调用堆栈。您之前已经见过此视图，因此双击出现在我们代码中的某个调用堆栈项。这将打开有问题的源代码文件，文件上带有一些注释，让您了解哪些变量正在泄漏以及泄漏了多少。图\
    \ 4–22 显示了相同的视图。\n\n![images](img/0422.jpg)\n\n**Figure 4–22.** *检查源代码可以找到一些可能的罪魁祸首*\n\
    \n我们已经能够通过变更追踪到哪些对象被泄漏了，所以让我们修复这些泄漏。点击编辑器中的 Xcode 图标，将打开 Xcode 并显示有问题的代码。由于部分代码使用了\
    \ C 语言 API，我们需要记住：几乎所有名称中包含“create”的 C 函数都会创建一个新的引用；我们需要通过释放操作来平衡它。\n\n在 Xcode\
    \ 中打开该文件，并修改`if`语句下的代码段，使其与以下内容匹配：\n\n```\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
    \    CGContextRef imageContext = CGBitmapContextCreate(NULL, imageWidth, imageHeight,\
    \ 8, 4\n* imageWidth, colorSpace, kCGImageAlphaPremultipliedFirst);\n    CGContextDrawImage(imageContext,\
    \ CGRectMake(0, 0, imageWidth, imageHeight), oldImage);\n    CGContextScaleCTM(imageContext,\
    \ imageWidth * factor, imageHeight * factor);\n    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);\n\
    \n    CGColorSpaceRelease(colorSpace);\n    CGContextRelease(imageContext);\n\n\
    \    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];\n\n \
    \   [cell.productImage setImage:resizedImage];\n\n    CGImageRelease(newImage);\
    \  \n    [resizedImage release];\n```\n\n现在，在泄漏检测工具中重新运行应用程序，并多滚动一些内容。这修复了问题吗？Instruments\
    \ 仍然检测到了一些泄漏。好吧，我们将深入探究这些泄漏。我们已经修复了最初的问题，但在所有泄漏都处理完毕之前，我不会感到满意。图 4–23 显示了 Instruments\
    \ 中一个它认为正在泄漏的项目：\n\n![images](img/0423.jpg)\n\n**Figure 4–23.** *在自动释放池中发现的一个泄漏示例*\n\
    \n图 4–23 显示了在自动释放池中检测到的一个泄漏示例（列表中的最后一个）。如果我们追踪该对象的内存历史记录，会看到以下内容：\n\n*   *Malloc*：引用计数为\
    \ 1\n*   *Autorelease*：添加到当前的自动释放池\n*   *Retain*：引用计数为 2\n*   *Release*：引用计数为\
    \ 1\n\n我们现在有一个位于自动释放池中、准备被释放的对象。那它为什么还没有被释放呢？答案在于我们的`main`函数。当应用程序启动时，会创建一个自动释放池。如果没有创建另一个自动释放池，并且代码在主线程上执行，那么这些对象会被添加到为应用程序创建的自动释放池中。这意味着这些内存会一直存在，直到应用程序终止，最顶层的自动释放池被清空。有关自动释放池的更多信息，请查看\
    \ Apple 开发者库中的“内存管理编程指南”。\n\n不过，不要觉得你可以随意在任何地方创建自动释放池。作为 iOS 开发者，我们生活在一个内存受限的世界中，需要做好本分，清理自己产生的垃圾。创建自动释放池可能会引起意外后果，所以只有在绝对必要时才使用自动释放池。一个使用自动释放池的好时机是在一个非常紧凑的循环中，这种循环很容易快速产生大量临时对象。\n\
    \n## 重新审视保留循环\n\n在本章前面部分，我们讨论了如何使用 Instruments 检测保留循环。由于 Super Checkout 没有任何保留循环，我们需要人为制造一个。我不需要引导您从头构建一个新项目并制造保留循环，而是已经为您完成了这些艰苦的工作。这个示例与在\
    \ Instruments 中使用泄漏检测工具的工作流程相同。\n\nInstruments 中显示保留循环的新功能可以在泄漏检测工具的跳转栏中找到。图 4–24\
    \ 显示了制造出来的保留循环，并在跳转栏中选中了相应的项目。\n\n![images](img/0424.jpg)\n\n**Figure 4–24.**\
    \ *Instruments 显示一个简单的保留循环*\n\n在图 4–17 中，首先要注意的是右侧的图表。它显示了内存中的确切循环以及引用之间的关系。所讨论的循环展示了一个典型的子对象持有父对象的情况。在左侧的列表中，您可以看到本次运行中的各种循环。在这个例子中它们都是相同的，并且工作流程是查找堆栈跟踪以确定循环是在哪里创建的。\n\
    \n在这个示例中，点击循环旁边的箭头将会调出图 4–25（右侧区域已展开以显示更多细节）。结果显示的视图能更好地展示保留循环以及导致该循环的堆栈跟踪。点击每个节点会显示不同的堆栈跟踪，因此您可以确定循环真正在代码中的哪个位置被创建并打破它。\n\
    \n![images](img/0425.jpg)\n\n**Figure 4–25.** *循环详情，堆栈跟踪显示了循环开始的位置*\n\n处理完循环问题后，我们就能够熟练地使用我们手中的工具来查找和修复与内存相关的问题了。\n\
    \n## GDB 功夫\n\n当其他方法都失败时，你遇到的就是一个非常有趣的 Bug。正如你在前面的示例中发现的那样，异步代码极难调试。再加上多线程代码会修改相同的对象（无论加锁与否），你就会创造出一些有趣的问题去解决。计算机科学中甚至有专门的分支来应对这些类型的问题。\n\
    \nSuper Checkout 是一个非常简单的应用程序。输入和输出定义明确，网络通信也相当简单。你的应用程序很可能不会这么简单。你可能会遇到死锁（两个线程相互等待对方完成对资源的操作）或竞态条件。如果不使用非常底层的工具进行介入，这两个问题很难诊断。\n\
    \n### GDB，现在别让我失望\n\n我成长过程中最喜欢的歌曲之一是 Little Feat 的《Don't Fail Me Now》。这首歌发行的时候，差不多也是理查德·斯托曼开始推动他的\
    \ GNU 就是 Unix（GNU's Not Unix）自由软件运动的时候。那时，C 语言是任何 Unix 编程的事实标准。他的调试器是 GDB，即 GNU\
    \ 调试器。\n\nGDB 是 Xcode 和 Instruments 调试工具的核心与灵魂。许多漂亮的图表、直方图和菜单都是苹果在 GDB 的基础上应用其精美的设计和营销能力的结果。\n\
    \n然而，图形用户界面有时也会碍事。如果你读到了本章的这个阶段，仍然没有找到你的 Bug，那么真的是时候活动一下指关节，甩甩手，深入命令行 GDB 工具套件了。你可能会对自己哼唱：“GDB，现在别让我失望。”\n"
- fmt: "#### Getting Started with GDB\n\nTo get yourself comfortable with GDB, place\
    \ a visual breakpoint in the `viewDidLoad:` method of `Super_CheckoutViewController.m`\
    \ (see [Figure 4–26](#Chapter04.html#fig_4_26)). To create a visual breakpoint,\
    \ click anywhere in the gutter of the editor.\n\n![images](images/0426.jpg)\n\n\
    **Figure 4–26.** *A visual breakpoint on line 178 placed in* `Super_CheckoutViewController.m`\n\
    \nRun the application and when the app breaks, press ![image](images/U002.jpg)\
    \ + shift + Y to pull up the debugging console if it is not already visible. Three\
    \ unassuming blue letters will be waiting for you, ensconced in parentheses, as\
    \ shown [Figure 4–27](#Chapter04.html#fig_4_27).\n\n![images](images/0427.jpg)\n\
    \n**Figure 4–27.** *GDB awaiting your command after breaking on a visual breakpoint*\n\
    \n[Figure 4–27](#Chapter04.html#fig_4_27) shows the default prompt for the GDB\
    \ debugger. Do not be afraid. It's friendly. It knows how to add, multiply, and\
    \ perform any C expression. Click next to the `(gdb)` prompt. We often use the\
    \ `p` command followed by an expression for quick evaluations. Try typing `p 2+2`\
    \ and pressing return. You should see the following output:\n\n```\n(gdb) p 2+2\n\
    $1 = 4\n```\n\nYou can build on the result. GDB sets dollar sign variables for\
    \ expressions you enter. Let's take our number and add 10:\n\n```\n(gdb) p $1+10\n\
    $2 = 14\n```\n\nPlay with it a bit. Soon, you may get bored. The real value in\
    \ GDB is the ability to dynamically evaluate expressions, inspect variables, set\
    \ breakpoints, and adjust variables' values on the fly as you hunt down your memory\
    \ bug.\n\nRemove the visual breakpoint by dragging the breakpoint out of the gutter\
    \ into some other space. The breakpoint will then go “poof,” similar to the way\
    \ an icon gets removed from the Dock in OS X. You can enable or disable breakpoints\
    \ by selecting or deselecting the breakpoints button next to the scheme selector\
    \ in the toolbar in Xcode.\n\n#### Determining Context—Where Am I?\n\nNow that\
    \ you're comfortable with typing some basic commands, let's find a place where\
    \ our application needs more debugging help. Run the application, and add a fruit\
    \ to your cart. Move to the shopping cart view, and try to remove the item by\
    \ touching the edit button or swiping the cell to delete it. The application blows\
    \ up with an exception from the table view. This is a great place to dive into\
    \ GDB, since this is a runtime exception and not a memory issue. The exception\
    \ occurs on line 170, so place a visual breakpoint on line 168, where we invoke\
    \ `[tableView beginUpdates].`\n\nStop the application, and rerun the application\
    \ performing the same steps. This time the application halts at our breakpoint.\
    \ Let's see where our breakpoint has occurred in code. Click in the console panel,\
    \ and enter the `l` command, for “listing,” and press return:\n\n```\n(gdb) l\n\
    163        // Delete the row from the data source\n164        NSDictionary *item\
    \ = [[shoppingCart objectForKey:@\"items\"] objectAtIndex:[indexPath row]];\n\
    165\n166        [apiEngine removeProductFromCart:[item objectForKey:@\"id\"] withQuantity:[item\
    \ objectForKey:@\"quantity\"]];\n167       \n168        [tableView beginUpdates];\n\
    169        [tableView deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\
    \ withRowAnimation:UITableViewRowAnimationRight];\n170        [tableView endUpdates];\n\
    171       \n172    }\n(gdb)\n```\n\nGDB shows a block of code that surrounds the\
    \ current breakpoint. You can see more information about why GDB has stopped with\
    \ the `backtrace` command, asking for the first item on the stack. That will be\
    \ the most recent function call.\n\n```\n(gdb) bt 1\n#0  -[ShoppingCartViewController\
    \ tableView:commitEditingStyle:forRowAtIndexPath:]\n(self=0x12e080, _cmd=0x31ab6e38,\
    \ tableView=0x9c0c00,\neditingStyle=UITableViewCellEditingStyleDelete, indexPath=0x1b6750)\
    \ at\n/Users/brandon/Development/iOS/Super Checkout/Super Checkout/../Super\n\
    Checkout/ShoppingCartViewController.m:168\n(More stack frames follow...)\n(gdb)\n\
    ```\n\nWe see that the debugger has stopped at line 168 of our source code. The\
    \ listing showed us a visual context, a few lines before and after where it stopped.\
    \ That's the static part of your code. It gives you a sense of what your app is\
    \ about to do. The debugger also shows the dynamic context, or the live stack\
    \ of function calls that got you here in the first place.\n\nLet's look a little\
    \ deeper now. Type the command `bt 5`, which stands for “show me five function\
    \ calls into the stack;” this command is called a backtrace:\n\n```\n(gdb) bt\
    \ 5\n#0  -[ShoppingCartViewController tableView:commitEditingStyle:forRowAtIndexPath:]\n\
    (self=0x12e080, _cmd=0x31ab6e38, tableView=0x9c0c00, editingStyle=UITableViewCellEditingStyleDelete,\
    \ indexPath=0x1b6750) at /Users/brandon/Development/iOS/Super Checkout/Super Checkout/../Super\
    \ Checkout/ShoppingCartViewController.m:168\n#1  -[ShoppingCartViewController\
    \ tableView:commitEditingStyle:forRowAtIndexPath:] (self=0x1b6750, _cmd=0x318bb84b,\
    \ tableView=0x2fdfdcac, editingStyle=10226688, indexPath=0x12e080) at /Users/brandon/Development/iOS/Super\
    \ Checkout/Super Checkout/../Super Checkout/ShoppingCartViewController.m:168\n\
    #2  0x3193dfb4 in -[UITableViewCell(UITableViewCellInternal) deleteConfirmationControlWasClicked:]\
    \ ()\n#3  0x330da570 in -[NSObject(NSObject) performSelector:withObject:withObject:]\
    \ ()\n#4  0x31766ec8 in -[UIApplication sendAction:to:from:forEvent:] ()\n(More\
    \ stack frames follow...)\n(gdb)\n```\n\nThis is a manual way of showing the same\
    \ information Xcode gives us in the Debug navigator, in the Navigator area. You\
    \ can navigate the stack backtrace visually and see the code change from other\
    \ source if the code is your own, or assembly if it is into framework code (see\
    \ [Figure 4–28](#Chapter04.html#fig_4_28)).\n\n![images](images/0428.jpg)\n\n\
    **Figure 4–28.** *Navigating the stack backtrace visually using the Debug Navigator*\n\
    \n#### Inspecting Data—What Have I Got?\n\nWe should also take a peek at the runtime\
    \ values to understand what's been going on. GDB provides a wealth of tools for\
    \ inspecting values. Check out the arguments to our method with `info args`. See\
    \ all the local variables in your current stack frame with `info locals`:\n\n\
    ```\n(gdb) info args\nself = (ShoppingCartViewController *) 0x12e080\n_cmd = (SEL)\
    \ 0x31ab6e38\ntableView = (UITableView *) 0x9c0c00\neditingStyle = UITableViewCellEditingStyleDelete\n\
    indexPath = (NSIndexPath *) 0x1b6750\n(gdb) info locals\nitem = (NSDictionary\
    \ *) 0x126f00\n(gdb)\n```\n\nThat's nice.\n\nThe command `whatis` inspects the\
    \ runtime type of an argument and is quite useful for `NSDictionary` entries,\
    \ delegates (of type `id`), and polymorphic arguments. Memory bugs can occur when\
    \ you've got a type mismatch, that is, when performing operations you think are\
    \ safe on the wrong type. Here we examine the type of `item`:\n\n```\n(gdb) whatis\
    \ item\ntype = NSDictionary *\n(gdb)\n```\n\nOK, that's what we expected. We can\
    \ peek inside the structure. This is what Xcode uses when you ask to print an\
    \ argument on your console. Type `po` followed by your variable name; `po` is\
    \ short for “print object”:\n\n```\n(gdb) po item\n{\n    id = 3;\n    name =\
    \ \"Blood Orange\";\n    price = 110;\n    quantity = 1;\n    subtotal = 110;\n\
    }\n(gdb)\n```\n\nHere, we can inspect that state of the application before it\
    \ blows up. We haven't quite looked at the error we ran into earlier though. Type\
    \ `c` at the GDB prompt to continue execution and allow the application to crash\
    \ again. Let's inspect the problem a bit deeper. The console reads as follows:"
