    \ 追踪和修复时间上带来的隐性节省所抵消。\n\n## UI 测试与自动化仪器\n\n单元测试能帮助您将应用程序分解为更小、独立且可测试的模块。而自动化 UI\
    \ 测试则允许您从整体上测试应用程序。通过编写用户操作脚本并验证预期结果，您可以构建一个测试库，从而在整个开发周期中监控应用程序行为和性能的变化。\n\n\
    在开发工具中，自动化操作是通过 Instruments 中的自动化仪器（Automation Instrument）来完成的。自动化仪器允许您在模拟器或设备上录制、编辑和运行脚本。脚本使用\
    \ JavaScript 编写，并通过`UIAutomation`框架暴露的 API 进行调用。`UIAutomation`是核心服务层的一部分，它利用 UIKit\
    \ 的无障碍功能来遍历可见元素的层级结构。\n\n为了充分利用`UIAutomation`，建议您熟练掌握`UIAccessibility`协议，并在代码中加以运用。Interface\
    \ Builder 使这一过程变得极为简便，它提供了对`accessibilityLabel`属性及部分`accessibilityTraits`数据的直接访问。如果您的应用界面包含大量自定义控件或手势识别器，那么使用`UIAccessibility`向脚本接口指示视图对象所扮演的角色就显得至关重要。\n\
    \n**注意：** 设置自动化测试的一个额外好处是，它能促使您让界面更易于访问。这是开发应用中最容易被忽视，却又最重要的任务之一。\n\n`UIAutomation`\
    \ API 的根元素是`UIAElement`。`UIAElement`为所有界面元素提供了通用接口。该对象最实用的组件之一是其遍历方法。除了访问给定元素的父元素或子元素的方法外，`UIAElement`还允许您获取几种不同类型中的某一种子元素列表。例如，如果您有一个引用特定`UIView`的元素对象，您可以像这样获取该视图中包含的所有按钮：\n\
    \n`var buttons = myViewElement.buttons();`\n\n这会返回相关视图中所有被报告为按钮的子视图。也就是说，它会返回所有`accessibilityTrait`属性为`UIAccessibilityTraitButton`的子视图。`UIButton`默认设置了此属性，但如果您通过手势识别器或`UIResponder`方法使一个`UIView`可点击，则需要手动设置此特征，以便`UIAutomation`将其识别为按钮。\n\
    \n除了遍历功能，`UIAElement`还提供了在元素上执行手势和交互、检查元素状态、查看无障碍详情以及将元素记录到 Instruments 日志接口的方法。元素的交互功能对于测试复杂界面来说，也许是最有趣和最实用的。例如，如果您的界面包含一个可以在指定边界内增量拖动的元素，您可以使用`dragInsideWithOptions`方法进行测试。它可能看起来像这样：\n\
    \n```javascript\nelement.dragInsideWithOptions({\n    startOffset: { x: 0.0, y:\
    \ 5.0 },\n    endOffset: { x: 24.0, y: 5.0 },\n    touchCount: 1,\n    duration:\
    \ 1.5\n});\n```\n\n除了`UIAElement`，`UIAutomation`还提供了一个与 UIKit 组件相对应的对象库，以及一些 UIKit\
    \ 无法直接访问的内容，比如键盘的按键。\n\n除了界面交互，`UIAutomation`还提供了一些对象，使您的脚本能够与设备、应用、仪器，甚至运行测试的计算机进行交互。\n"
- fmt: '`UIATarget` gives you access to the device with which you''re currently interacting.
    This device could be the simulator or a connected device. With this object you
    can manipulate the device orientation and accelerometer, simulate pressing of
    hardware buttons, take screen shots, and many more things.


    `UIAApplication` exposes information about the running application, like the bundle
    identifier, version, windows, etc. In addition, it provides access to application-level
    interface elements. For example, `UIAlertViews` are not presented within your
    view hierarchy, but at the application level. You would use `UIAApplication` to
    respond to alerts, action sheets, the status bar, etc.


    `UIALogger` is a basic logging object with the ability to log several different
    types of messages, including pass/failure, debug, and errors.


    `UIAHost` allows you to execute commands on the host computer from the context
    of Instruments.


    Being a JavaScript interface, it''s extremely easy to traverse through complex
    hierarchies in only a few lines of code. For example, you could drill down to
    a specific button of a screen using a single line. Let''s assume that the button''s
    accessibility label is set to "Hello World."


    `var button = UIATarget.localTarget().frontMostApp().mainWindow().buttons()["Hello
    World"];`


    If the accessibility label were not set, you would not be able to reference it
    this way. You would instead have to get all of the `mainWindow`''s buttons, and
    either identify the button by other means or specify the index of the button directly.
    Either one of these methods would be fragile and undesirable.


    As of iOS 5.0, the Automation Instrument includes the ability to record scripts
    by simply interacting with the target device. The script is recorded in real time,
    using the same UIAutomation elements we''ve been discussing. As such, the script
    is completely human readable and editable. Coupled with a good understanding of
    the scripting interface, this feature is incredibly powerful and will save you
    hours of scripting time.


    ## Getting Started


    To get started, you need to build your app for profiling. To take advantage of
    the new script recording features, you''ll need to build for iOS 5.0. Set your
    scheme to iPhone 5.0 Simulator and then go to `Product`![images](images/U001.jpg)`Profile`
    (or just hit ![images](images/U003.jpg)+I). When Instruments launches, you''ll
    be asked to select an instrument template ([Figure 8–12](#Chapter08.html#fig_8_12)).
    Choose the Automation template and click Profile.


    ![images](images/0812.jpg)


    **Figure 8–12.** *The Automation tool can be combined with multiple instruments.*


    When the instrument has loaded, it will probably automatically start recording
    and launch the simulator. This is a real time saver if you''ve got scripts already
    written, but you haven''t gotten that far yet, so for now you can stop the profiling.


    Let''s take a look at the Automation tool ([Figure 8–13](#Chapter08.html#fig_8_13)).
    The Detail view contains a sidebar, an editor pane, and an extended detail view.
    The editor pane''s jump bar allows you to switch between the Trace Log, Editor
    Log, and Script views. The Trace Log displays debugging data you post from your
    scripts. The Editor Log shows you the script execution process. The Script view
    is where you will write and record your scripts.


    The detail view on the right displays details about specific output from the detail
    view. It''s also where you''ll see screenshots of your interface on test failures.


    On the left sidebar you''ll see the various settings for the tool. These settings
    are broken into four sections: Status, Scripts, Script Options, and Logging. Let''s
    go through these one at a time.


    - *The Status section* simply tells you whether the script is currently running.
    No more, no less. However, double-clicking on this section of the sidebar will
    toggle the editor pane between the current view and the Script view.

    - *The Scripts section* allows you to add or remove scripts from the current Instrument.
    Clicking the Add button will allow you to create a new script or import an existing
    one.

    - *The Script Options section* lets you choose to run your scripts as soon as
    the instrument begins recording or to wait for you to start them. There is also
    a Pause button to halt the current script temporarily.

    - *The Logging section* allows you to choose where logging should occur, export
    the current log, and take screenshots of the current app state.


    ![images](images/0813.jpg)


    **Figure 8–13.** *As your script library expands, the script section of the sidebar
    will help you keep track.*


    Go ahead and create a script. From the Scripts section in the sidebar, click the
    Add button and choose the Create menu item. You''ll notice a New Script item has
    appeared in the Scripts section, and the editor pane has switched to the Script
    view. To rename your script, simply double-click the script item in the sidebar.


    **NOTE:** If you have a pre-existing script, or if you want to create a library
    of scripts separate from Instruments, you can create the script on the filesystem
    and then choose the Import menu option to navigate to the script.


    In the editor pane, your script should already have some code in it.


    `var target = UIATarget.localTarget();`


    At the bottom of the editor, you''ll see Play, Record, and Stop buttons. These
    buttons control the script itself and are different from the Instruments app''s
    own control buttons, found at the top-left of the window. In order to get a jumpstart
    on this script, you want to use the record functionality. Script recording requires
    a version of the UIAutomation provided in iOS 5.0, so before you can do that,
    you need to ensure that Instruments is set to run your app under iOS 5.0.'
