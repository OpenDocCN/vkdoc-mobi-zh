- fmt: '# Prepare the Beta!


    So now we have an application that we think is ready to ship. Many a developer
    has been humbled by an application he or she thought was bulletproof, only to
    discover a litany of bugs once it was released. Often you, as the developer, will
    only exercise certain application paths or specific test cases. Sometimes, it
    takes fresh pair of eyes (and hands!) to truly put your application through its
    paces.


    This is where *beta testing* comes in. Beta testing releases your application
    to small set of external users, called *testers* or *beta testers*. The goal is
    to get their feedback on bugs in the application. You''ll want to find patient
    users who are willing to put up with (potentially) erratic, or even buggy, behavior
    from your application. The last thing you want is an angry tester who trashes
    your application to people before it''s even released.


    We''ll also want to capture *crash reports* if the application crashes while our
    beta testers are using it. If you have savvy beta testers, they will be able to
    access the crash reports when they sync their devices to `iTunes`. There are several
    other options where we can have the application send us crash reports via e-mail,
    to a web server, or to a third-party service that analyzes crash reports for us.
    We''ll briefly touch on those as well.


    To distribute your application to your beta testers, you will need to utilize
    an ad-hoc provisioning profile via the iOS provisioning portal. You access the
    portal via the iOS Dev Center. It can be a complicated process, but don''t worry,
    we''ll walk through the process step-by-step and screen-by-screen. Just a reminder,
    you''ll need to a member of the iOS Developer Program (currently $99 per year)
    to create an ad-hoc provisioning profile. We''ll discuss the program briefly later
    in the chapter. If you''re not a member of the iOS Developer Program, the rest
    of this chapter will be of limited usefulness.


    ## Managing Beta Testing


    So we think our Super Checkout application is ready for testing by outsiders.
    But we can''t just throw our application into the wild and hope that somebody
    will test it for us. It will require a little bit of preparation on our part.
    We can break down preparation into five steps. Let''s briefly describe all the
    steps before going into more detail.


    First, we need to *define* the beta test. What kind of testers do we want? What
    kind of devices do we want to test against? Next, we need to *acquire* our beta
    testers. How are we going to find testers? Once we''ve gotten our testers on board,
    we have to *instruct* them. What do we want them to test? How should they submit
    feedback?


    Now that we''ve explained what we need out testers to do, we can *distribute*
    the application and *collate* their feedback. Preparing the application for distribution
    is a difficult task, so we''ll discuss that in the section titled “Creating Ad
    Hoc Builds.” Afterward, we''ll briefly discuss what do with our testers'' feedback.


    ### Defining the Beta


    What do we mean by “defining the beta”? It means spending a little bit of time
    planning what the goals of the beta test are. Normally, if this is the first time
    you''re sending the application out to your testers, your goals may be open ended.
    You simply want your testers to put the application through its paces, uncovering
    any bugs, and commenting on general usability. As the testing progresses, you
    may release application builds that address specific issues. As a result, you
    may want your users to focus on specific parts of the application.


    Once we decide on the goals of the beta test, we can focus on deciding on what
    kind of testers we want. It is important to remember that you want to find testers
    who will find your application useful. In our case with Super Checkout, if we
    have a tester who doesn''t like fruit or shopping, they probably won''t be a good
    tester. Simply because they won''t find our application useful and won''t use
    it. If they don''t use it, we won''t get any meaningful feedback about our application,
    nor will they find any bugs.


    Finally, we have to decide what the device requirements are for our application.
    You may only be targeting the latest and greatest iOS device and operating system.
    Or you may be targeting many versions of the operating system on a specific device.
    Typically, you probably decided this before developing your application, but those
    criteria might have changed as you progressed.


    ### Acquiring Beta Testers


    How do we find our beta testers? There are several ways we can go about it, but
    it all breaks down to one simple step: asking for volunteers. Whatever you think
    the best way is the find the users your application is targeting. Simply asking
    your friends and family is one method. Or you can reach out via any number of
    web sites, forums, or social media to find people who are willing to be guinea
    pigs.


    On the flip side, being a beta tester requires a little bit of commitment. Application
    developers depend on you to provide meaningful feedback. In addition, providing
    crash reports and logs are incredibly helpful in finding show-stopping application
    bugs. We''ll show how to find the crash reports later.


    Before putting the word out you may want to consider setting up a sign up form.
    If you intend to have a small testing group, this may be overkill. However, if
    you are expecting an overwhelming response (don''t we all?), a sign up form may
    have advantages. It may aid you in keeping track of all your volunteers, so you
    can rotate testers. You may be able to get specific information about your testers
    if you wish.


    Regardless of how you track your testers, you need get one key piece of information
    from them: their iOS device''s Unique Device Identifier (UDID). This information
    is available when the device is connected to `iTunes`. Once connected to `iTunes`,
    select the device in the navigation pane. `iTunes` will display the device information
    (see [Figure 7–1](#Chapter07.html#fig_7_1)).


    ![images](images/0701.jpg)

    **Figure 7–1.** *Device information in iTunes*


    Click the label Serial Number. The label should change to read Identifier (UDID),
    followed by a 40-character string (see [Figure 7–2](#Chapter07.html#fig_7_2)).
    This is the string your testers need to send to you.


    ![images](images/0702.jpg)

    **Figure 7–2.** *UDID in iTunes*'
