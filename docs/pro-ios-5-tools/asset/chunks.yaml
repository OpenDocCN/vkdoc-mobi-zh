    - (BOOL) _isValidDelegateForSelector:(SEL)selector;\n\n@end\n```\n\n接下来需要注意的行是\
    \ `// Connection/Request methods`。将该行之后直到包含 `#pragma mark - API Methods` 的那一行之间的代码替换为代码清单\
    \ 6-4 中的代码。\n\n**代码清单 6-4.** *连接/请求管理的实现*\n\n```\n// 连接/请求方法\n- (NSString*)_sendRequest:(NSURL\
    \ *)theURL\n                  withRequestType:(SuperCheckoutRequestType)requestType\n\
