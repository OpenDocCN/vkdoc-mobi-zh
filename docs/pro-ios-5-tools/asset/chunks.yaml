  trans: '

    `UIATarget` 让你能够访问当前正在交互的设备。该设备可能是模拟器，也可能是已连接的物理设备。通过此对象，你可以操作设备方向和加速计、模拟硬件按钮的按压、截取屏幕截图以及执行更多操作。


    `UIAApplication` 会暴露正在运行的应用的相关信息，例如包标识符、版本、窗口等。此外，它还提供对应用级界面元素的访问权限。例如，`UIAlertViews`
    不会显示在视图层级中，而是显示在应用层级。你可以使用 `UIAApplication` 来响应弹窗、操作列表、状态栏等。


    `UIALogger` 是一个基础的日志记录对象，能够记录多种不同类型的消息，包括通过/失败、调试信息和错误信息。


    `UIAHost` 允许你在 Instruments 环境中，从上下文对主机计算机执行命令。


    作为 JavaScript 接口，仅需几行代码就能极其轻松地遍历复杂的层级结构。例如，你可以使用一行代码深入定位到某个屏幕上的特定按钮。假设该按钮的无障碍标签设置为“Hello
    World”。


    `var button = UIATarget.localTarget().frontMostApp().mainWindow().buttons()["Hello
    World"];`


    如果未设置无障碍标签，你将无法以这种方式引用它。相反，你必须获取 `mainWindow` 的所有按钮，然后要么通过其他方式识别该按钮，要么直接指定按钮的索引。这两种方法都不稳定且不理想。


    从 iOS 5.0 开始，自动化工具包含了一项功能：只需与目标设备交互即可录制脚本。脚本会使用我们一直在讨论的相同 UIAutomation 元素进行实时录制。因此，脚本是完全人类可读且可编辑的。结合对脚本接口的深入理解，此功能极其强大，将为你节省大量脚本编写时间。


    ## 开始使用


    首先，你需要构建应用以供分析。要利用新的脚本录制功能，你需要为 iOS 5.0 构建应用。将方案设置为 iPhone 5.0 Simulator，然后进入
    `Product`![images](img/U001.jpg)`Profile`（或者直接按 ![images](img/U003.jpg)+I）。Instruments
    启动后，系统会要求你选择一个工具模板（图 8–12）。选择“自动化”模板，然后点击“Profile”。


    ![images](img/0812.jpg)


    **图 8–12.** *自动化工具可以与其他多种工具组合使用。*


    当工具加载完成后，它通常会自动开始录制并启动模拟器。如果你已经有写好的脚本，这能省下不少时间；不过你还没到那一步，所以现在可以先停止分析。


    让我们来看看自动化工具（图 8–13）。详情视图包含一个侧边栏、一个编辑器面板和一个扩展详情视图。编辑器面板的跳转栏允许你在“跟踪日志”、“编辑器日志”和“脚本”视图之间切换。“跟踪日志”显示你从脚本中发布的调试数据。“编辑器日志”显示脚本执行过程。“脚本”视图则是你编写和录制脚本的地方。


    右侧的详情视图显示来自详情视图的特定输出的详细信息。你还可以在这里看到测试失败时界面的截图。


    在左侧侧边栏中，你可以看到该工具的各种设置。这些设置分为四个部分：状态、脚本、脚本选项和日志记录。我们逐一进行介绍。


    - *“状态”部分* 仅告诉你脚本当前是否正在运行。仅此而已。不过，双击侧边栏的这部分会在当前视图和“脚本”视图之间切换编辑器面板。

    - *“脚本”部分* 允许你向当前工具添加或移除脚本。点击“添加”按钮可以创建新脚本或导入现有脚本。

    - *“脚本选项”部分* 让你选择是在工具开始录制时立即运行脚本，还是等待你手动启动。还有一个“暂停”按钮用于暂时停止当前脚本。

    - *“日志记录”部分* 允许你选择日志记录的位置、导出当前日志以及截取当前应用状态的截图。


    ![images](img/0813.jpg)


    **图 8–13.** *随着脚本库的扩展，侧边栏的脚本部分将帮助你进行管理。*


    现在创建一个脚本。从侧边栏的“脚本”部分，点击“添加”按钮并选择“创建”菜单项。你会注意到“脚本”部分出现了一个“新脚本”项，并且编辑器面板已切换到“脚本”视图。要重命名你的脚本，只需双击侧边栏中的脚本项即可。


    **注意：** 如果你已有现有脚本，或者想创建一个独立于 Instruments 的脚本库，你可以在文件系统中创建脚本，然后选择“导入”菜单选项来定位该脚本。


    在编辑器面板中，你的脚本应该已经包含了一些代码。


    `var target = UIATarget.localTarget();`


    在编辑器底部，你会看到“播放”、“录制”和“停止”按钮。这些按钮控制脚本本身，与位于窗口左上角的 Instruments 应用自身的控制按钮不同。为了快速上手这个脚本，你需要使用录制功能。脚本录制需要
    iOS 5.0 中提供的 UIAutomation 版本，因此在此之前，你需要确保 Instruments 设置为在 iOS 5.0 下运行你的应用。

    '
- fmt: "Although you built our app for 5.0, Instruments can still simulate the app\
    \ under a different OS version, and depending on your settings, may default to\
    \ a prior version. To ensure you have the right configuration, you need to change\
    \ the Launch Options. From the target drop-down, go to Options, and choose “iPhone\
    \ - Simulator - iOS 5.0” under the Simulator Configuration section ([Figure 8–14](#Chapter08.html#fig_8_14)).\
    \ Note that you'll need to make sure the instrument is stopped before changing\
    \ this configuration.\n\n![images](images/0814.jpg)\n\n**Figure 8–14.** *It can\
    \ be very handy to test your user interface in multiple iOS versions.*\n\nNow\
    \ that you're set up, you can click the Record button to start the simulator.\
    \ The app should launch automatically. Once Super Checkout has launched, you can\
    \ start interacting with it. As you do so, you'll see the script editor start\
    \ to populate with JavaScript actions. These actions are broken out into tokens.\
    \ Clicking the disclosure arrow on the right side of these tokens will display\
    \ other options. This will come in handy in a moment. You can stop the script\
    \ recording session at any time by clicking the Record button again. If you then\
    \ click the Instrument Session Record button (not the Script Record button) at\
    \ the top-left of the window, your script should begin replaying on the device.\n\
    \n**NOTE:** If you have any trouble launching the app from the Record button,\
    \ ensure that the simulator isn't being used by any other processes. If Xcode\
    \ is currently debugging an app in the simulator, this can prevent Instruments\
    \ from attaching correctly.\n\nLet's write a useful script using the recorder\
    \ and learn a little more about the UI Automation JavaScript library. From the\
    \ sidebar, remove the script you just wrote, and create a new one called “Cycle\
    \ Through Products.” Start recording your new script. First, select a product\
    \ from the product table. From the product details view, click the Back button.\
    \ Your script should look something like this:\n\n```\nvar target = UIATarget.localTarget();\n\
    \ntarget.frontMostApp().mainWindow().tableViews()[\"Empty list\"].cells()[0].scrollToVisible();\n\
    target.frontMostApp().mainWindow().tableViews()[\"Empty list\"].cells()[0].tap();\n\
    target.frontMostApp().mainWindow().navigationBar().leftButton().tap();\n```\n\n\
    **NOTE:** It's important to be aware that because the Automation Instrument is\
    \ recording every UI event, your results may be slightly different, depending\
    \ on your interactions with the simulator.\n\n![images](images/0815.jpg)\n\n**Figure\
    \ 8–15.** *The automation script's tokens are incredibly useful when creating\
    \ iterative scripts.*\n\nIf you play this script back, it will do exactly what\
    \ you recorded, and nothing more. Not very useful, but this is a great jumpstart\
    \ on a script. The element tokens ([Figure 8–15](#Chapter08.html#fig_8_15)) in\
    \ each of those expressions are extremely powerful. Clicking the arrow on the\
    \ right-hand side of one will display options for that token. Each of these options\
    \ is another way of pointing to the exact same interface element. For example,\
    \ `cells()[0]` might evaluate to the same cell as `cells()[\"First Cell\"]`, and\
    \ both of these options would be present in the token. If you double-click on\
    \ a token, it will be converted to plain text, and you can modify it as needed.\n\
    \nWhat you want to do is loop through all the cells and perform the same action\
    \ on each of the products in the table. First, you need to get the cells as an\
    \ array so that you can use its length as the limit of a `for` loop. Let's take\
    \ one of the lines of the recording, trim it down to just the cells array, and\
    \ store it in a variable.\n\n```\nvar cells = target.frontMostApp().mainWindow().tableViews()[\"\
    Empty list\"].cells();\n```\n\nNext, write a simple `for` loop that will iterate\
    \ over the cells and execute your recording on each of them. To do this, you'll\
    \ just double-click the `cells()[0]` tokens and replace the 0 with your iteration\
    \ index.\n\n```\nfor(var i = 0; i < cells.length; i++) {\n        target.frontMostApp().mainWindow().tableViews()[\"\
    Empty list\"].cells()[i].scrollToVisible();\n        target.frontMostApp().mainWindow().tableViews()[\"\
    Empty list\"].cells()[i].tap();\n        target.frontMostApp().mainWindow().navigationBar().leftButton().tap();\n\
    }\n```\n\nIf you run this script, the app should launch, and the script should\
    \ cycle through each product in the table. You've got a pretty good iterative\
    \ script going now, but it doesn't do anything useful. Take what you've learned,\
    \ step back, and write a useful script that tests a complete user flow.\n\n##\
    \ Scripting User Interface Tests\n\nYou've decided to write a series of tests\
    \ for a handful of connected user flows. The flows include adding products to\
    \ the cart, moving from the store to the cart, checking out, and returning to\
    \ the store. These four actions will each be tested using the expected interface\
