    ### Instruments Time


    We''re not going to go very far into Instruments; that topic is for the rest of
    this book. For this chapter, we''ll take a look at how to launch Instruments from
    Xcode and the different instruments that are available.


    You could go to **Product ![images](images/U001.jpg) Profile** to launch Instruments,
    but we''re going to look at build schemes and see what options we have for building
    our application. [Figure 2–13](#Chapter02.html#fig_2_13) shows the left part of
    the toolbar in the Xcode window. In the middle, you''ll see the active scheme
    for launching the application. If you click the drop-down, you''ll see the available
    schemes and within each scheme, the deployment type. For now, we''re using the
    iPhone Simulator to run everything.


    First, a scheme is a collection of targets to build, a configuration to use, and
    a collection of tests to run. Schemes can be defined on a per-project basis, or
    you can define a workspacewide scheme. How you set these depends on your project.
    In our Super Hello World project, we have one scheme that can be run against three
    different destinations. We''ll cover schemes in depth in a later chapter. A destination
    is the architecture in which the project is built against and run against, [Figure
    2–14](#Chapter02.html#fig_2_14) shows the Super Hello World target building on
    the iPhone 4.


    ![images](images/0214.jpg)


    **Figure 2–14.** *The scheme drop-down points you to the availble build schemes
    for your project.*


    Go ahead and click **Edit Schemes…** in the drop-down menu, and take a look at
    the configuration options for running applications. There are six different activities
    to perform on your application: build, run, test, profile, analyze, and archive.
    The build activity is performed when you build your project. You can modify the
    targets that are built based on the scheme and choose which other activities can
    be run on a specified target. The run activity (see [Figure 2–15](#Chapter02.html#fig_2_15))
    installs and runs the application on whichever destination you chose. The test
    action simply builds and executes the unit test target against the chosen destination.
    The profile activity will be explained later in this section. The analyze action
    runs the static analyzer against your code; we''ll cover the static analyzer in
    a later chapter. The archive action builds the appropriate configuration and packages
    the artifacts for archiving and sends it to the Archives section of the Organizer
    for further action.


    ![images](images/0215.jpg)


    **Figure 2–15.** *The scheme editor sheet shows you the different options available
    for launching your application in different contexts.*


    Now, let''s work with the profile action. [Figure 2–16](#Chapter02.html#fig_2_16)
    shows the scheme editor with the profile action expanded. As with all of the different
    actions, there are pre-actions and post-actions to perform; running a script or
    sending e-mail. Being able to execute actions before and after your profile action
    can be helpful when automating a build process.


    Take a look at [Figure 2–16](#Chapter02.html#fig_2_16), which shows the settings
    for building and running the application for profiling. In the Info tab, you can
    change the build configuration that is used, use a different executable, define
    a particular instrument that will be launched on a successful build, change the
    working directory for the application, and change the UI resolution while the
    application is being run. In the Arguments tab, you can choose to use the run
    action''s arguments or define specific ones for profiling.


    ![images](images/0216.jpg)


    **Figure 2–16.** *The configuration sheet for the Profile action in the scheme
    editor.*'
  trans: "\n`abort()` 会导致应用程序生成崩溃日志并终止。虽然此函数在开发过程中可能有用，但你不应在正式发布的应用程序中使用它。如果无法从错误中恢复，请显示一个警示面板，指示用户通过按下\
    \ Home 键来退出应用程序。\n\n```\nNSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    abort();\n```\n\n```\n[delegate viewController:self didSaveWithPerson:newPerson];\n\
    ```\n\n```\n-(void) cancelPressed:(id)sender {\n    [delegate viewControllerDidCancel:self];\n\
    }\n```\n\n`@end`\n\n![images](img/0213.jpg)\n\n**图 2–13.** 在代码中创建一些 `UITableViewCells`\
    \ 的最终产物。现在不再需要在代码中创建然后再通过 Interface Builder 进行连接——只需一步即可通过 Interface Builder 创建你的用户界面。\n\
    \n现在我们需要修改我们的 `RootViewController` 来启动新的视图控制器。如果你在头文件中注意到了，我们正在为委托声明一个协议。我们还需要告诉\
    \ `RootViewController` 它符合该协议，以便在模态视图控制器完成后能接收到相应的消息。\n\n让我们首先修改头文件以遵循该协议：\n\n\
    `@interface RootViewController : UITableViewController <NSFetchedResultsControllerDelegate,\
    \ NewPersonViewControllerDelegate>`\n\n现在我们将更新实现中的 `insertNewObject` 方法，如代码清单\
    \ 2–4 所示，以弹出新的视图控制器。我们不要忘记导入 `NewPersonViewController.h`。\n\n**代码清单 2–4.** 处理显示新创建的\
    \ `NewPersonViewController` 的 `insertNewObject` 选择器。\n\n```\n- (void)insertNewObject\n\
    {\n    NewPersonViewController *newPersonVC = [[NewPersonViewController alloc]\
    \ initWithNibName:@\"NewPersonViewController\" bundle:nil];\n    [newPersonVC\
    \ setDelegate:self];\n    [newPersonVC setManagedObjectContext:[self.fetchedResultsController\
    \ managedObjectContext]];\n\n    UINavigationController *navController = [[UINavigationController\
    \ alloc] initWithRootViewController:newPersonVC];\n\n    [self presentModalViewController:navController\
    \ animated:YES];\n    [navController release];\n    [newPersonVC release];\n}\n\
    ```\n\n最后一步是实现协议方法，如代码清单 2–5 所示。\n\n**代码清单 2–5.** `NewPersonViewControllerDelegate`\
    \ 协议实现\n\n```\n#pragma mark - NewPersonViewControllerDelegate Methods\n-(void)\
    \ viewController:(NewPersonViewController *)vc didSaveWithPerson:(Person *)p {\n\
    \    [self dismissModalViewControllerAnimated:YES];\n}\n\n-(void) viewControllerDidCancel:(NewPersonViewController\
    \ *)vc {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n我们已完成为该项目添加新的视图控制器。将更改提交到源代码控制，然后继续。\n\
    \n### 回顾我们目前的进展\n\n我们创建了一个超级简单的应用程序，它向 Core Data 存储中添加数据，并使用通过 Interface Builder\
    \ 构建的界面。大部分代码都是由系统为我们生成的，而且我们从未离开 Xcode。现在我们已经有了一个可以正常工作的应用程序和由源代码管理工具管理的源代码，让我们花点时间回顾一下我们所做的工作。\n\
    \n我们简要了解了新的开发工具，并且你已经看到了 Apple 为改进开发工作流程所做的一些增强。还有许多其他功能我们尚未触及，因此多花些时间熟悉环境并学习一些键盘快捷键。\n\
    \n我们在本章中创建的项目是一个极其简单的项目，不需要引用任何静态库。Xcode 4 支持一个工作区中的多个项目，而我们只使用了工作区中的一个项目。\n\n\
    既然我们的应用程序可以工作了，让我们来看看如何启动我们的应用程序以使用 Instruments 进行分析。\n\n### Instruments 时间\n\n\
    我们不会深入探讨 Instruments；那是本书剩余部分要讨论的主题。在本章中，我们将了解如何从 Xcode 启动 Instruments，以及有哪些不同的\
    \ Instruments 可用。\n\n你可以通过 **Product ![images](img/U001.jpg) Profile** 来启动 Instruments，但我们将重点放在构建方案上，看看在构建应用程序时有哪些选项。图\
    \ 2–13 显示了 Xcode 窗口中工具栏的左侧部分。在中间，你会看到用于启动应用程序的活动方案。如果单击下拉菜单，你会看到可用的方案，以及在每个方案内部的部署类型。目前，我们使用\
    \ iPhone 模拟器来运行所有内容。\n\n首先，一个方案是一个构建目标集合、一个要使用的配置以及一组要运行的测试的集合。方案可以在每个项目的基础上定义，也可以定义工作区范围的方案。如何设置这些取决于你的项目。在我们的\
    \ `Super Hello World` 项目中，我们有一个方案可以针对三个不同的目标运行。我们将在后面的章节中深入介绍方案。目标是指项目的构建和运行所针对的架构，图\
    \ 2–14 显示了在 iPhone 4 上构建的 `Super Hello World` 目标。\n\n![images](img/0214.jpg)\n\
    \n**图 2–14.** 方案下拉菜单指向项目可用的构建方案。\n\n继续在下拉菜单中点击 **Edit Schemes…**，查看运行应用程序的配置选项。可以对应用程序执行六种不同的操作：构建、运行、测试、分析、性能分析和归档。构建操作在你构建项目时执行。你可以根据方案修改构建的目标，并选择哪些其他操作可以在指定目标上运行。运行操作（参见图\
    \ 2–15）会将应用程序安装并运行在你选择的任何目标上。测试操作只是针对所选目标构建并执行单元测试目标。性能分析操作将在本节后面解释。分析操作会对你的代码运行静态分析器；我们将在后面的章节中介绍静态分析器。归档操作会构建适当的配置，打包构建产物以进行归档，并将其发送到\
    \ Organizer 的 Archives 部分以供进一步处理。\n\n![images](img/0215.jpg)\n\n**图 2–15.** 方案编辑器工作表显示在不同上下文中启动应用程序的不同选项。\n\
    \n现在，我们来处理性能分析操作。图 2–16 显示了展开性能分析操作后的方案编辑器。与所有其他操作一样，这里可以执行前置操作和后置操作；例如运行脚本或发送电子邮件。能够在性能分析操作前后执行操作在自动化构建过程中会非常有帮助。\n\
    \n看看图 2–16，它显示了用于性能分析而构建和运行应用程序的设置。在信息（Info）选项卡中，你可以更改使用的构建配置，使用不同的可执行文件，定义在成功构建后将启动的特定\
    \ Instruments，更改应用程序的工作目录，以及在应用程序运行期间更改 UI 分辨率。在参数（Arguments）选项卡中，你可以选择使用运行操作的参数，或者为性能分析定义特定的参数。\n\
    \n![images](img/0216.jpg)\n\n**图 2–16.** 方案编辑器中性能分析操作的配置工作表。\n"
- fmt: '#### Get to Instruments Already


    OK, I know, we''re not in Instruments yet; we''re getting there. If the scheme
    editor sheet is still open, click OK. Now, go ahead and launch Instruments by
    going to `Product ![images](images/U001.jpg) Profile`, and Xcode will build the
    project and launch Instruments. After Instruments is launched, you will be presented
    with the launch screen shown in [Figure 2–17](#Chapter02.html#fig_2_17).


    If you are launching to an iOS device, you will see more instruments available
    to you. For this example, we''re going to use the `Leaks` instrument against the
    simulator. Select `Leaks` in the dialog box, and click Profile.


    Instruments will launch with the `Leaks` and `Allocations` instruments running.
    After the application launches, you''ll see some spikes in the `Allocations` instrument
    as objects are allocated in memory. We won''t go into what that means quite yet,
    but now you know how to launch instruments from Xcode.


    ![images](images/0217.jpg)


    **Figure 2–17.** *The Instruments launch screen allows profiling through the simulator.
    Profiling against the device will show more instruments.*


    #### So Many Instruments


    `Instruments` is a great tool for diagnosing issues within your application. However,
    learning how to use its tools effectively is the key for tuning an application
    to make it hum. Before we dive into many of the instruments in the coming chapters,
    let''s take a brief look into the `Instruments` UI and a brief overview of each
    of the different instruments available to you.


    [Figure 2–18](#Chapter02.html#fig_2_18) shows a run of our application for this
    chapter. The toolbar at the top lets you start or stop the collection of data,
    attach to different applications running on the system, and perform other high-level
    tasks to pare down the data you are collecting. The Instruments part shows different
    graphs of the data that each instrument is collecting. In our example, there are
    zero leaks detected and a spike of memory allocated near application launch.


    ![images](images/0218.jpg)


    **Figure 2–18.** *Instruments running `Allocations` and `Leaks` against our `Super
    Hello World` application*


    The area below the Instruments pane shows the active instrument with the Jump
    Bar to the right. The detailed information below the Jump Bar is specific data
    from the selected instrument. Clicking either the instrument in the Instruments
    pane or selecting it in the active instrument drop-down changes the view of data.
    Go ahead and check out what data the `Leaks` instrument would show if it had detected
    any leaks.


    We''ve taken a look at the `Allocations` and `Leak` instruments. There are a number
    of other instruments to use:


    - **Activity Monitor**: This instrument monitors overall system activity and statistics.
    These statistics include CPU, memory, disk, and network usage. It also monitors
    other processes to see how the entire system is performing under various conditions.

    - **Time Profiler**: This instrument performs low-overhead time-based sampling
    of processes running on the system at any given time.

    - **Automation**: This instrument executes a script that simulates user interaction
    on an iOS application launched from `Instruments`.

    - **Energy Diagnostics**: This instrument monitors the on/off state of different
    components of the device and provides energy usage while the application is running.

    - **System Usage**: This instrument records I/O system activity related to files,
    sockets, and shared memory for a single process.

    - **Core Animation**: This instrument measures graphics performance of an application
    as well as CPU usage of a process.

    - **OpenGL ES Driver**: This instrument measures `OpenGL ES` performance. This
    instrument will not be covered in this book.

    - **OpenGL ES Analysis**: This instrument measures and analyzes `OpenGL ES` activity
    to detect correctness and performance issues. This instrument will not be covered
    in this book.


    ### Tuning Performance


    The rest of this book is going to use the routine outlined in this section when
    tracking down performance bottlenecks. When diagnosing a performance problem,
    the process is basically the same regardless of what the performance issue is.
    Following these principles will save headaches and reduce the number of errors
    you might introduce to the application.


    Performance tuning is a very scientific process. First, come up with a part of
    the application that you think might need a tune-up and collect data around that
    part of the application. Your hypothesis might be correct, and you''ll find where
    the bottleneck might be. However, the aspect of the application you are testing
    might not be the problem. Always be prepared for that to happen. Always be prepared
    to change the hypothesis and adapt to your data. If the data says something isn''t
    running poorly, chances are it isn''t.


    When you find the bottleneck or poor performance, find one or two metrics to measure.
    The key to tuning is always metrics. Ensuring the changes you are making only
    tweak that one metric will make for a successful tuning session.


    Another rule of thumb is to change one thing at a time. Changing multiple things
    simultaneously can cause problems because the two changes might cancel themselves
    out or introduce unknown errors. We''re usually working with very complex systems
    with many moving parts, and introducing changes can introduce bugs. A good idea
    is to have unit tests in place to make sure you aren''t changing the functionality
    while improving performance. I ran into that problem once when I was taking a
    course in high-performance computing. The task was to write an evolutionary algorithm
    to solve a complex, multivariate algebraic equation. I had a working algorithm,
    but I thought it was a bit slow so I started tweaking it. After I completed my
    tweaks, I tested it, and it worked only half the time, while the original version
    worked 100 percent of the time. I ultimately realized that I had changed too much
    and couldn''t track down the change that broke the algorithm. I was truly thankful
    for version control after realizing that.


    As you read the rest of this book, remember that we''re truly interested in large
    improvements in performance (but still striving for zero leaks—users hate leaky
    applications). Do you think it would be worth spending hours on a tweak that could
    potentially improve the speed by less than one percent? Will your users notice
    that you squeezed two extra frames per second to top out at 80 frames per second?
    I don''t think so. We''re interested in large-scale changes that will be noticeable
    to the user.


    ### Summary


    We covered a lot of material in this chapter. We''ve taken a brand new project
    and added some new classes and user interfaces using Xcode''s new built-in Interface
    Builder component. We''ve also modified the data model and generated model classes
    to create a slightly more complicated application.


    At the end, we looked at the Scheme editor to understand where the build configurations
    are housed in Xcode. The final step was to launch Instruments and see the great
    integration between these great tools. Everything we covered in this chapter may
    seem overwhelming at first, but you''ll get the hang of it. Apple has truly provided
    developers with some top-notch tools that get out of the way as we take some great
    ideas and turn them into wonderful experiences for our users.


    It is time to dive into the project for the rest of this book. You know what the
    tools do; now let''s use them.


    ## Chapter 3'
