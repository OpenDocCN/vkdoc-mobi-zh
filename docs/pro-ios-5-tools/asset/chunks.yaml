- fmt: '## Introduction


    The iOS platform has exploded in popularity over the past few years and is showing
    no signs of slowing down. The app marketplace has become highly competitive and
    the users are becoming accustomed to great experiences. This makes our jobs as
    app developers very difficult. What sets a great application apart from other
    applications? We''re going to attempt to answer that question through the course
    of this book.


    ### Why Write a Book on Tools?


    They say, “An artisan is only as good as his/her tools.” This is generally true
    for most professions. As developers, we usually only need a text editor and a
    compiler. While that setup can get the job done, a great set of tools starting
    with the IDE (Integrated Development Environment) and moving to performance analysis
    and debugging tools can greatly improve a developer''s efficiency during the development
    and debugging process. The main problem a developer faces, especially with new
    versions of these tools being released, is how does one effectively use these
    tools? This is the space where this book fits. This book is all about using the
    amazing developer tools that Apple has provided and how to use them to make our
    apps great.


    ### How This Book Is Organized


    This book is all about process. As you''ll read in [Chapter 1](#Chapter01.html#ch1),
    no matter what stage you are in, this book will help you on your journey to being
    a better developer. The first few chapters of this book are all about debugging
    and performance tuning. We''re going to take a project from a state that needs
    a lot of work to ready for beta testing. Then we take a look at how to improve
    our efficiency as developers and let the tools do most of our work for us. We
    will even automate a lot of the process to let us focus on more important issues.
    The final part of the book is how to share our application with testers, respond
    to feedback and finally start sharing code between our applications. The last
    chapter is all about navigating and customizing Xcode to fit our own workflow.


    ### Support and Contributions


    If you run into any issues or find a great tip to help those reading this book,
    head over to [`http://proiostools.com/forum/`](http://proiostools.com/forum/)
    and participate in the discussion! The goal here is to get a great community going
    that will intersect with the great iOS development community that already exists.
    We''re here to help and would love to see what kind of tips and tricks you discover
    while going through the book.


    ## Chapter 1


    ## Wax On, Wax Off


    By now, you have written an iOS application or two. You have also learned that
    making a great app is hard work. From spontaneous crashes to memory leaks and
    bugs that create other bugs, the simplest of apps can quickly become a nightmare.
    Fortunately, these issues are easy to diagnose with the tools at our disposal.


    That is what this book is mostly about. We have a toolbox available to us as iOS
    developers. Ultimately, the question quickly becomes: Which tool is best for the
    task at hand? This book will answer that question for most of your cases. For
    the cases where there is no obvious answer, you will be equipped with some approaches
    and techniques that will point you in the right direction.


    ### Who Is This Book For?


    In most crafts, the transition from being a complete beginner to being capable
    is usually swift. The goal during this transition is simply to become functional
    with the tools and understand the language the craftsmen speak. This transition
    also builds confidence in the new practitioner. At the end of this transition,
    practitioners are fully capable of accomplishing most tasks and solving most problems
    thrown at them.


    Most stop at proficient, however. As a magician, I progressed from a newcomer
    to the art to a proficient amateur relatively quickly. As I learned a new technique
    or a new effect, I was very excited to practice. As my skill improved, that desire
    to practice lessened, and I even became bored with rehearsing the same effect
    or technique over and over. My skill had reached a plateau. I know what I must
    do to get to the next level, but I don''t want to go there right now. That is
    OK with me.


    How is this relevant to software development? First, like any craft, a certain
    set of programming skills is rapidly acquired, including learning the syntax of
    a language, understanding flow control, using basic software design patterns,
    and debugging by writing to standard out and basic use of the provided debugger.
    The next phase of a developer''s path to mastery is learning more about how a
    language and platform work, more design patterns and their appropriate uses, and
    more about the debugger. The final, never-ending, phase is simply fine-tuning
    all of these skills and finding better solutions to existing problems, as well
    as learning how to reuse code more. This learning path is not the same for every
    developer. Sometimes, different parts of development are easier to grasp than
    others.


    The point here is that I don''t want you to get frustrated when you don''t progress
    as fast as you''d like. Software development is hard. The thing that separates
    a hobbyist from a professional is the level of commitment. The commitment to go
    from a proficient hobbyist to a professional generally takes you into career mode.
    This level of dedication takes more than just hours of practice. You have to start
    looking at how other software is made. Surrounding yourself with others that develop
    for the same platform, especially those who are better than you, is key to growing.
    By purchasing this book, you are also acknowledging that you want to be a better
    developer. My goal is to help you learn at least one new skill. If you do that,
    my job is done, and if you do more, even better!


    So who is this book for? This book is for those who are ready to reach the next
    level. Whatever skill level you are at, this book has something for you. Perhaps
    you are a master at object-oriented programming, and performance tuning is something
    you want to learn. Or maybe you want to know the best way to create a universal
    application for iOS without rewriting half your application. The only prerequisite
    is that you have some exposure to iOS development and Objective-C.


    ### What This Book Is


    This book is a guide that will take you from an alpha quality application to a
    feature-complete and tested application ready for submission to the App Store.
    This book contains many tricks of the trade, from diagnosing memory issues to
    tweaking scroll views to squeeze the last bit of performance out of the device.
    In the end, you''ll want to have this book on your desk with pages marked for
    quick reference on how to solve common problems.


    Will this book solve all of your problems? Probably not, but you will walk away
    with some techniques for solving problems in a very systematic way. Deep down,
    we''re scientists, and following the scientific method for solving problems in
    software will, in the end, help us learn how to prevent the problem next time.


    This book also follows a realistic software life cycle. We''ll pick up a project
    at the end of development, and we''ll take it through beta testing and finish
    with a shippable product. We''ll hit some common roadblocks and look at how iOS
    works; we''ll even work around some interesting issues. We''ll also find some
    useful libraries written by people who cared enough to share their solutions to
    particular problems.'
