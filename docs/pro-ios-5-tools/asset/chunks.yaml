    \ Imagine having to go into all of the view controllers to make this update!\n\
    \nLet's look at a little piece of the code we just implemented.\n\nIn [Listing\
    \ 6–5](#Chapter06.html#list_6_5), you'll see we're creating an `ASIHTTPRequest`,\
    \ setting the delegate, and adding a dictionary that gets passed around with the\
    \ request. This dictionary holds the request identifier (to hold backward compatibility\
    \ with the previous API), the request type and response type. `ASIHTTPRequest`\
    \ handles cookies automatically, so we don't have to worry about dealing with\
    \ them.\n\nAs far as threading goes, `ASIHTTPRequest` is a subclass of `NSOperation`,\
    \ and the `startAsynchronous` method adds it to a local `NSOperationQueue` that\
    \ spawns new threads and the delegate callbacks occur on the main thread. This\
    \ also means that, if it was found to be necessary, our `SuperCheckoutAPIEngine`\
    \ class could manage its own `NSOperationQueue` to control how many requests are\
    \ occurring at once.\n\n**Listing 6–5.** *The code that creates the actual request*\n\
    \n```\n   ASIHTTPRequest *request = [ASIHTTPRequest requestWithURL:theURL];\n\
    \    [request setDelegate:self];\n    NSString *requestIdentifier = [NSString\
