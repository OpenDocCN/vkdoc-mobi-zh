  trans: '#### 提交我们的更改


    在将代码推送到 GitHub 之前，我们需要在本地提交更改。请记住，每个 Git 仓库都是一个功能完备的独立仓库。从 Git 的角度来看，代码的规范副本位于你的计算机上，而
    GitHub 上的仓库只是一个远程副本。现在，让我们将工作保存到本地仓库中。


    在 Xcode 中打开 `SBJSON` 静态库项目。选择 File ![image](img/U001.jpg) Source Control ![image](img/U001.jpg)
    Commit。Xcode 会显示源代码控制面板（参见图 11–37）。左侧是 SBJSON 项目文件的列表。大多数文件会被勾选，有些则不会。你无需更改任何设置。未勾选的文件是
    Xcode 认为无需提交到仓库的文件。选择 `JSON.h` 文件。在文件查看器面板中，`JSON.h` 的内容应显示在左侧。右侧的文件查看器会显示“File
    has no revisions”。由于这是首次提交，因此没有内容可显示。在提交已有文件时，左侧文件查看器会显示 `JSON.h` 的当前状态，而右侧文件查看器会显示仓库中的上一个版本。Xcode
    会高亮显示文件版本之间的差异，以便你查看更改内容。


    ![images](img/1137.jpg)


    **图 11–37.** *Xcode 的源代码控制面板*


    在面板底部附近，有一个标有“Enter commit message here”的文本区域。你可以在该区域输入关于将要提交到仓库的更改的注释。描述可以详尽，也可以简洁，随你而定。在此例中，请输入
    **Initial commit**。然后点击 Commit。


    提交完成后，源代码控制面板会消失，显示出项目窗口。现在，我们准备将更改推送到 GitHub。


    这次，选择 File ![image](img/U001.jpg) Source Control ![image](img/U001.jpg) Push。此时会出现一个对话框（参见图
    11–38）。Remote 下拉菜单可能需要几秒钟才能填充。请稍候，Xcode 正在检查远程仓库的存在性和可访问性。最终，下拉菜单应显示“origin/master
    (Create)”。这表示 GitHub 将通过向 origin（我们为远程 GitHub 仓库设置的别名）发送 master（我们的本地仓库）的副本来创建仓库。点击
    Push。


    ![images](img/1138.jpg)


    **图 11–38.** *Xcode 的远程仓库对话框*


    **注意：** 如果 Xcode 无法连接到远程仓库，下拉菜单将持续显示“Loading Remotes”。此外，绿色圆点和“Repository is online”文本也不会出现。点击
    Cancel，并检查你的网络连接。如果连接正常，请检查你是否在 GitHub 上成功创建了仓库。最后，请检查你在添加远程仓库时是否正确输入了 GitHub
    URL，方法如下：


    打开一个 Terminal.app 窗口，并导航到我们的项目目录。输入命令：


    ```

    > git config –-get remote.origin.url

    ```


    确保返回的 URL 与 GitHub 上的 URL 匹配。如果 URL 错误，你可以通过先取消设置再重新输入 URL 来修复：


    ```

    > git config –unset remote.origin.url

    > git remote add origin git@github.com:username/SBJSON.git

    ```


    推送成功后，对话框应消失。你可以通过登录 GitHub 并检查仓库页面来确认推送是否成功（参见图 11–39）。


    ![images](img/1139.jpg)


    **图 11–39.** *推送后的 GitHub 仓库*


    #### 使用 GitHub 功能


    在继续之前，我想简要介绍 Git 和 GitHub 提供的一些功能：标签、拉取请求和问题跟踪。


    ##### 标签


    标签的概念在版本控制系统中很常见。其思想是，一旦源代码达到稳定状态或完成了一个开发里程碑，我们希望以某种方式标记源代码。本质上，你是在创建一个特定时间点的源代码快照。这通过为发布版本打标签来实现。使用
    Git，标签是一个非常简单的命令行过程。一旦你将更改提交到 Git，只需输入以下命令：


    ```

    > git tag "tag-name"

    ```


    你可以将 `tag-name` 替换为任何你想要的值。通常的做法是用点分隔的数字来打标签，表示主版本和次版本（例如 `1.0`）。要将标签推送到 GitHub，只需在
    push 命令中添加 `–tags` 标志：


    ```

    > git push –-tags origin remote

    ```


    ##### 拉取请求


    GitHub 允许其用户派生 GitHub 上的一个仓库。当你派生一个项目时，你会为自己创建该仓库的一份副本，这样你就可以修改代码以修复错误或添加新功能。


    一旦你对派生的仓库进行了一些更改，就可以将这些更改回馈给原始仓库的所有者以及整个社区。在 GitHub 上，你可以通过拉取请求来实现。拉取请求只是一个发送给原始仓库维护者的消息，表明你有一些更改要提供给他们。创建拉取请求很简单：只需在你派生的仓库上点击拉取请求按钮。系统会要求你为拉取请求添加评论，然后将其发送给原始仓库的维护者。


    反之亦然，你需要管理那些由派生你仓库的人发送给你的拉取请求。你可以查看拉取请求、进行评论、拒绝它们，或将其合并到你的项目中。


    GitHub 对拉取请求流程做了详尽的说明。你可以在 `http://help.github.com/send-pull-requests/` 阅读更多信息。


    ##### 问题跟踪


    问题跟踪是收集错误报告的一个有用工具。它还允许人们评论他们希望在应用程序或库中看到哪些新功能。GitHub 为每个仓库都使用了问题跟踪器。它的使用相当简单。只需点击任何仓库顶部的
    Issues 链接即可。


    **注意：** 如果你的项目在仓库中没有显示 Issues 链接，说明它已被禁用。这通常发生在你派生一个仓库时。你可以在仓库的管理部分重新启用它。点击你仓库的
    Admin 按钮。你应该会进入 Options 管理页面。在 Features 下，点击 Issues 旁边的复选框。当你返回仓库页面时，Issues 链接应该就会出现。'
- fmt: '### Choosing Your License Wisely


    Now that you''ve got a project up on GitHub, you''ll want to pick a license for
    your code. Since you''ve made the repository public, you probably want to use
    an open source license. Depending on whom in the open source community you ask,
    you''ll get different answers as to what makes a project “open source.” Generally
    speaking, open source software is software that is distributed as source code
    with a license that allows the user to use the software, freely modify it, and
    distribute it in either the original or modified form. The intent of an open source
    license is to allow any users of the software the ability to modify the code to
    suit their needs and assist the community with bug fixes and improvements.


    There are a plethora of open source licenses to choose from. A fairly comprehensive
    list can be found at the Open Source Initiative (OSI) web site ([`http://opensource.org/`](http://opensource.org/)).
    The site offers a simple, ten-point checklist of what constitutes an open source
    license, and a comprehensive list of licenses that meet these criteria.


    ### Summary


    We''ve covered a lot of ground in this chapter. We''ve pulled out the reusable
    components of our Super Checkout application and put them into static libraries.
    Then, we reintegrated the code into the project, using the subproject and workspace
    methods. Finally, we shared our project with the rest of the world via GitHub,
    improving the lives of iOS developers all over the world. This way, if Super Checkout
    doesn''t become a bestseller in the App Store (no way!), we''ll still get the
    love and respect of our fellow iOS hackers.


    Before you close this book and move on, I have just “one more thing” to share
    with you. What is it? Turn the page and find out.


    ## Chapter 12


    ## One More Thing


    What a ride! We have a stable application with a good automated testing setup
    and static libraries too. We''ve used Instruments to help find bottlenecks in
    our application. Throughout this process, we''ve covered some nice features of
    Xcode and explored how to navigate through the tool set. Xcode has a lot of features
    that we haven''t covered though. That''s what this chapter is about. While the
    chapter is titled “One More Thing,” we''re going to cover more than that.


    In this chapter, we''ll cover customizing Xcode as well as common keyboard shortcuts
    to improve your workflow as you start your own projects. You''ll also find a handy
    quick reference guide to some common keyboard shortcuts for Xcode 4.2\. In time,
    you''ll adapt the things you''ve learned in this book and the contents of this
    chapter to your own workflow.


    ### Customizing Xcode


    Throughout this book, we''ve simply used the default configurations of Xcode.
    Now, it is time to start customizing it to your liking. You''ve seen what Xcode
    can do, so make it yours. The first place to look is Xcode''s preferences (if
    you haven''t poked around already). As with any Mac OS X application, the way
    to open Xcode''s preferences is to go to **Xcode** ![Image](images/U001.jpg) **Preferences**
    or press ![Image](images/U002.jpg), (comma). When you do this, the dialog in [Figure
    12–1](#Chapter12.html#fig_12_1) will come up.


    ![images](images/1201.jpg)


    **Figure 12–1.** *This is Xcode''s preferences window. We''ll go through each
    tab in the window to talk about how to customize each piece.*


    The General tab (see [Figure 12–1](#Chapter12.html#fig_12_1)) is the starting
    point for Xcode''s preferences. Here, we can set some of the basic options for
    Xcode like autosave (if you are running on Mac OS X Lion) and control how files
    are opened from a navigator. The legend at the bottom of the screen gives you
    a reference for how to use the keyboard to modify clicks when you are editing
    code.


    #### Behaviors


    Behaviors in Xcode 4.2 are a huge lifesaver. [Figure 12–2](#Chapter12.html#fig_12_2)
    shows the Behaviors tab open.


    ![images](images/1202.jpg)


    **Figure 12–2.** *The Behaviors tab helps you configure how Xcode behaves and
    notifies you on certain events.*


    With the Behaviors tab, you can configure Xcode to change its appearance when
    you start a run on your application and play a sound when a build fails.


    Clicking the plus button at the bottom lets you add a new behavior and bind it
    to a keyboard shortcut. Do you want to quickly switch to full screen and have
    only code open? You can configure it to do that with any keyboard shortcut you
    wish to map it to.


    #### Fonts & Colors


    [Figure 12–3](#Chapter12.html#fig_12_3) shows the Fonts & Colors tab. This tab
    lets you configure the appearance of the source editor. This is great for those
    times when you need to project your code up on a projector because you''ll be
    presenting on some great topics to your local user group, right?


    ![images](images/1203.jpg)


    **Figure 12–3.** *The Fonts & Colors tab lets you configure the appearance of
    your editor.*


    Click the Console button to configure what the console looks like.


    If the provided themes aren''t your cup of tea and you have a theme you wish to
    use that is for Xcode 4.2, you can take the `dvtcolortheme` file and place it
    in the `~/Library/Developer/Xcode/UserData/FontAndColorThemes` folder.


    If you just want to tweak an existing theme, clicking the add button under the
    list will let you duplicate a theme. A duplicated theme will be placed in the
    folder mentioned previously.


    #### Text Editing


    The next tab is Text Editing (see [Figure 12–4](#Chapter12.html#fig_12_4)). This
    is where you configure how Xcode handles the features of the code editor. This
    is where you configure how the editor behaves and how things like code folding
    and code completion are handled.


    ![images](images/1204.jpg)


    **Figure 12–4.** *The Text Editing tab allows you to configure how the text editor
    behaves and controls how the code is automatically structured.*


    [Figure 12–5](#Chapter12.html#fig_12_5) shows the Indentation section for this
    tab. The famous battle between spaces and tabs is waged in this tab in this section.


    ![images](images/1205.jpg)


    **Figure 12–5.** *The eternal battle between spaces and tabs! Which will you choose?*


    #### Key Bindings


    Need to see what keyboard shortcuts are set or want to modify them? The Key Bindings
    tab is for you! [Figure 12–6](#Chapter12.html#fig_12_6) shows the default configuration.
    This tab behaves similarly to the Fonts & Colors tab. To create your own custom
    configuration, duplicate the default configuration. As soon as you make a modification,
    a new configuration file is placed in `~/Library/Developer/Xcode/UserData/KeyBindings`.


    ![images](images/1206.jpg)


    **Figure 12–6.** *Configuring your keyboard shortcuts is as simple as opening
    this tab.*


    If you are trying to figure out why a certain keyboard shortcut isn''t working,
    check out the Conflicts section. Take a look at [Figure 12–7](#Chapter12.html#fig_12_7).
    Currently, there are 10 conflicts on the computer Xcode is installed on.


    ![images](images/1207.jpg)


    **Figure 12–7.** *Key binding conflicts prevent your favorite bindings from working.*


    The yellow warning triangle indicates a conflict with the system. Since the system
    handles shortcuts before the application, Xcode is just telling you that the shortcut
    won''t work. The red error indicates a conflict within Xcode. The binding will
    not trigger as long as there is an internal conflict in Xcode.


    #### Downloads


    Moving down the line, we find ourselves in the Downloads tab. In this tab we see
    two different areas to visit. The first is the Components tab. This tab, found
    in [Figure 12–8](#Chapter12.html#fig_12_8), allows you to download extra components
    into Xcode. These components include older devices support and even older versions
    of iOS to run in the simulator.


    ![images](images/1208.jpg)


    **Figure 12–8** *Xcode ships with the latest and greatest of iOS. If you need
    “legacy” support, go to the downloads preference and download the support here.*'
  raw: '### Choosing Your License Wisely


    Now that you''ve got a project up on GitHub, you''ll want to pick a license for
    your code. Since you''ve made the repository public, you probably want to use
    an open source license. Depending on whom in the open source community you ask,
    you''ll get different answers as to what makes a project “open source.” Generally
    speaking, open source software is software that is distributed as source code
    with a license that allows the user to use the software, freely modify it, and
    distribute it in either the original or modified form. The intent of an open source
    license is to allow any users of the software the ability to modify the code to
    suit their needs and assist the community with bug fixes and improvements.


    There are a plethora of open source licenses to choose from. A fairly comprehensive
    list can be found at the Open Source Initiative (OSI) web site ([`http://opensource.org/`](http://opensource.org/)).
    The site offers a simple, ten-point checklist of what constitutes an open source
    license, and a comprehensive list of licenses that meet these criteria.


