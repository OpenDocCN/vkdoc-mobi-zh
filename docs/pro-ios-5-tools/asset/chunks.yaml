  trans: '

    # 为 iPad 进行设计


    `iPad` SDK 引入了一些利用更大屏幕尺寸的新用户界面组件。与 iPhone 相比，iPad 还可用于多种方向。这些因素会影响我们如何决定用户界面的外观，以及用户如何在任一设备上与应用程序交互。每种设备所使用的范式也需要相似，这样用户在不同设备上使用应用程序时，才能获得一致的体验。


    目前，`Super Checkout` 被设计为双面视图。主要的一面是向下钻取产品详细信息的库存列表（见图 10–1）。


    ![images](img/1001.jpg)


    **图 10–1.** *Super Checkout 的正面视图，显示库存、产品详情以及购物车中的一个商品。*


    点击 `Inventory` 屏幕顶部的 `Cart` 按钮，屏幕将会翻转，显示用户的购物车（见图 10–2）。


    ![images](img/1002.jpg)


    **图 10–2.** *用户购物车的翻转视图*


    对于 `Super Checkout` 来说，将 `iPhone/iPod Touch` 版本的正面视图转换为分割视图是完全合理的。图 10–3 到 10–5
    展示了将当前用户体验转换为 iPad 后，应用程序的外观示例。特定的表格单元格和设计细节将沿用 `iPhone/iPod Touch` 版本。这些线框图展示了我们在完成更改实现后，应用程序外观的基本构思。


    ![images](img/1003.jpg)


    **图 10–3.** *Super Checkout iPad 版本的竖屏方向视图*


    ![images](img/1004.jpg)


    **图 10–4.** *用户界面的横屏方向版本*


    ![images](img/1005.jpg)


    **图 10–5.** *作为模态视图显示的购物车屏幕*


    这些线框图展示了两个 iPad 特有的界面元素。第一个是分割视图，它会根据设备方向显示不同的视图。库存视图在竖屏时以弹出视图显示，在横屏时则显示在左侧视图。购物车仍然作为模态视图显示，但它会覆盖在界面上方，而不会像
    `iPhone/iPod Touch` 版本那样将整个视图翻转。


    ## 实现 iPad 版本


    现在，是时候实现这个设计了。在开始处理项目之前，我们先来谈谈什么是通用应用程序。通用二进制文件会根据设备支持多种用户界面。作为通用应用程序实现的一部分，我们将拥有一些
    iPad 特有的部分，以及一些在设备之间共享的部分。从现在开始，术语“idiom”将用于指代特定设备的形态。这个术语在用于判断应用程序运行在哪个设备上的 API
    中被使用。


    ### 修改目标


    将应用程序转换为通用应用程序的第一步是更新项目的应用程序目标。在 `Xcode` 的 `Project navigator` 面板中选择 `Super Checkout`
    项目，然后选择 `Super Checkout` 目标。在 `Summary` 选项卡下的 `iOS Application Target` 部分中，有一个用于选择应用程序支持的设备的下拉菜单（见图
    10–6）。将 `Devices` 配置从 `iPhone` 更改为 `Universal`。


    ![images](img/1006.jpg)


    **图 10–6.** *将 Devices 配置从 iPhone 更改为 Universal。*


    随后，`Xcode` 会询问你是否希望将 `MainWindow` nib 文件的副本作为 iPad 应用程序的起点（见图 10–7）。点击 `Yes`，你会注意到
    `Super Checkout` 组下新增了一个名为 `iPad` 的新组。其中包含了已创建的 `MainWindow-iPad.xib` 文件。


    ![images](img/1007.jpg)


    **图 10–7.** *转换为通用应用程序时，Xcode 会创建一个新的 MainWindow.xib 文件。*


    `Xcode` 在创建通用目标时修改的另一个文件是 `Super_Checkout-Info.plist` 文件。对该文件所做的唯一更改是告知 `Cocoa`
    支持的方向以及新的 nib 文件。

    '
- fmt: '#### The App Delegate and Starting UI


    Now that we have the entry point to the application complete, we will need to
    subclass `Super_CheckoutAppDelegate` and set the new class as the app delegate
    on the iPad version of the `MainWindow` nib. To do this, create a new Objective-C
    class, and call it `Super_CheckoutAppDelegate_iPad`. Update the header to look
    like [Listing 10–1](#Chapter10.html#list_10_1), in which our subclass of `Super_CheckoutAppDelegate`
    sets us up for some custom iPad code.


    **Listing 10–1.** *A Subclass of Super_CheckoutAppDelegate, Ready for Some Custom
    iPad Code*


    ```

    #import <Foundation/Foundation.h>

    #import "Super_CheckoutAppDelegate.h"


    @interface Super_CheckoutAppDelegate_iPad : Super_CheckoutAppDelegate {


        UISplitViewController *splitViewController;

    }

    @property (nonatomic, retain) IBOutlet UISplitViewController *splitViewController;


    @end

    ```


    Now, update the implementation to look like [Listing 10–2](#Chapter10.html#list_10_2).


    **Listing 10–2.** *The Implementation of Our iPad-specific Subclass*


    ```

    #import "Super_CheckoutAppDelegate_iPad.h"


    @implementation Super_CheckoutAppDelegate_iPad

    @synthesize splitViewController;


    - (void)dealloc {

        [splitViewController release];

        [super dealloc];

    }


    - (BOOL)application:(UIApplication *)application

        didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {


        self.window.rootViewController = self.splitViewController;

        [self.window makeKeyAndVisible];


        return YES;

    }

    @end

    ```


    What we''re doing here is setting the actual launch point for the iPad version
    of the application. The next step is to update the nib for the iPad. Open `MainWindow-iPad.xib`
    in the iPad group. From the Object Library, drag Split View Controller into the
    Objects list in the editor, and remove Main Navigation Controller from the Objects
    list (see [Figure 10–8](#Chapter10.html#fig_10_8)).


    ![images](images/1008.jpg)


    **Figure 10–8.** *The new Objects list in the MainWindow-iPad nib*


    **NOTE:** If the Document Outline is collapsed (it only shows icons, not text),
    click the arrow button at the bottom of the Document Outline to expand (or collapse)
    it.


    The next part is to configure the split view controller to have the appropriate
    view controllers. To do this, expand all of children of the Split View Controller
    object by option-clicking the disclosure triangle. We want the final configuration
    to look like [Figure 10–9](#Chapter10.html#fig_10_9).


    ![images](images/1009.jpg)


    **Figure 10–9.** *The final configuration of the split view controller in the
    MainWindow-iPad nib.*


    Your view will look slightly different from [Figure 10–9](#Chapter10.html#fig_10_9).
    The view controller that is the child of the navigation controller needs to be
    the Super Checkout view controller. To do this, select the child controller (Table
    View Controller) of the navigation controller, and open the Identity Inspector
    by clicking the Show the Identity inspector tab in the right-hand panel. Then,
    change the Class to `Super_CheckoutViewController` (see [Figure 10–10](#Chapter10.html#fig_10_10)).


    ![images](images/1010.jpg)


    **Figure 10–10.** *Updating the root view controller of the navigation controller
    to be the inventory view controller from the iPhone/iPod touch version of Super
    Checkout*


    Do the same thing with the bottom view controller, except make it an instance
    of `ProductDetailsViewController`.


    The final thing to finish up the app delegate and the main nib is to wire up the
    split view controller to the app delegate. First, select `Super_Checkout App Delegate`,
    and in the Identity Inspector of the Utility area, make sure the class type is
    `Super_CheckoutAppDelegate_iPad`. Next, control-drag from the `Super_Checkout
    App Delegate` proxy to the split view controller, and select `splitViewController`
    (see [Figure 10–11](#Chapter10.html#fig_10_11)).


    ![images](images/1011.jpg)


    **Figure 10–11.** *Wiring up the `splitViewController` property on the app delegate*


    Creating and configuring the app delegate and wiring up the nib are now complete.
    Now, we are off to update some of the user interfaces to support the iPad along
    with keeping backward compatibility.


    #### Updating Inventory and Product Details


    Now that the entry point of the iPad application is set, we can now modify the
    front side view controllers to support the new idiom. The primary way to detect
    what device the application is running on is to compare the result of `UI_USER_INTERFACE_IDIOM()`
    and see if it is equal to `UIUserInterfaceIdiomPhone` or `UIUserInterfaceIdiomPad`.'
