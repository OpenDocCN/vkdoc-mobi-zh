- fmt: '### Editors and the Utilities That Follow Them


    The area you''ll spend most of your time in will be the Editor area. Xcode has
    several file editors available for you to access:


    - Source code

    - Project and build settings

    - Property list (`plist`) files

    - Rich text files

    - Core data models

    - Core data mapping models

    - XIB (XML nib) files

    - AppleScript

    - Scripting dictionary files


    There are also file viewers that include graphics, videos, and several other file
    viewers.


    There are also three different types of editors to choose from. You can access
    these editor types from the toolbar. The Standard Editor is your basic editor
    that lets you edit files as you would normally. The Assistant Editor (see [Figure
    2–5](#Chapter02.html#fig_2_5)) is a new type of editor that lets you edit your
    source files with an assistant showing you a related file next to it. For example,
    when you are editing a source file and you select the Assistant Editor, the header
    file is displayed next to it. If you were to open a nib file, the assistant allows
    you to view the associated header (from the File''s Owner property of the nib)
    and interact with it. From here, you can actually control-drag elements from the
    nib into the source editor, and Xcode will place the appropriate property in the
    code where you put it.


    ![images](images/0205.jpg)


    **Figure 2–5.** *The Assistant Editor shows you a nib with the File''s Owner header
    next to it.*


    Some file types will not have any counterparts that you can open with the assistant.
    If this is the case, you can manually select which editor you want next to the
    selected file. In order to do this, you''ll use the Jump Bar in the Assistant
    Editor to select the file that is shown. You can edit the location of the assistant
    editor by going to **View ![images](images/U001.jpg) Assistant Editor** and indicating
    whether the Assistant editor goes on the right or underneath the Standard Editor.


    The other editor option is the Version Editor. This editor will show you the changes
    you''ve made to the selected file if you have source control turned on. At the
    time of this writing, Xcode 4 only supports Git and Subversion for source control.
    From the Version Editor, you can view the history of the file by clicking the
    time button at the bottom of the space between the diff viewer. From the same
    screen, you can also view the blame history as well as a log-annotated view of
    the file''s history (see [Figure 2–6](#Chapter02.html#fig_2_6)).


    ![images](images/0206.jpg)


    **Figure 2–6.** *The Version Editor gives you the ability to view the file''s
    history as well as version annotations, affectionately known as the blame view.*


    In [Figure 2–6](#Chapter02.html#fig_2_6), you can also see the Utilities area
    to the right of the editors. This pane shows contextual information based on your
    selection. In [Figure 2–5](#Chapter02.html#fig_2_5), we have the `RootViewController`
    nib selected, and you can see that the Utilities area looks similar to the Inspector
    window from Interface Builder in the previous version of Xcode. If you select
    a source file, you''ll see the same information you would see when clicking Get
    Info in Xcode 3. From there, you can select which target the source file belongs
    to as well as numerous other tidbits about the file.


    As you navigate through the source file, you can click the Show Quick Help button
    of the Utilities area to see brief information about any symbols the cursor is
    in. From there, you can click any blue item, which may open the headers file,
    other documentation, or sample code depending on the context of what was clicked.
    Take a moment to play around with the different editors and get familiar with
    the new interface. Don''t worry; I''ll be here when you get back.


    ### Jump Bars


    While you were getting acquainted to the editor, did you notice the bar at the
    top? It is called the Jump Bar, which allows you to navigate quickly through your
    file. [Figure 2–7](#Chapter02.html#fig_2_7) shows the Jump Bar for the `RootViewController`
    in the project we have created.


    ![images](images/0207.jpg)


    **Figure 2–7.** *The Jump Bar is a navigation tool that is always available to
    the editor it is above. It is also available in Instruments to perform the same
    types of tasks.*


    Using the Jump Bar is a quick way to navigate through your project without having
    to find the file using the Project navigator. The Related Files button (the one
    that looks like an equal sign) pops up a list that allows you to see recent files,
    unsaved files, and numerous other lists that pertain to the file currently being
    viewed.


    The back and forward buttons allow you to navigate through your history of files
    in the editor that is open. Swiping left and right with two fingers will allow
    you to quickly navigate through the files, as you can within Safari on Lion.


    Everything else to the right is a breadcrumb trail showing how to get to the method
    you are editing, starting with the project. In [Figure 2–7](#Chapter02.html#fig_2_7),
    you see we started with the project and in the Super Hello World group is the
    file `RootViewController.m`, and we are looking at the `fetchedResultsController`
    selector. Clicking any of the items displays a list of siblings and allows you
    to drill down into each successive level.


    ### The Organizer


    Xcode 4 brings a new organizer that does pretty much what the name implies: it
    organizes your development workspace. You can open it by clicking the Organizer
    button on the toolbar or by pressing ![images](images/U004.jpg) ![images](images/U003.jpg)2.
    [Figure 2–8](#Chapter02.html#fig_2_8) shows the Organizer open to the Projects
    tab. The Organizer has five main purposes:


    - Manage development devices

    - Manage source control repositories

    - Manage recent projects

    - Manage archived builds

    - Show documentation


    Take a look at the Devices section. If you are a registered developer, you can
    manage all of your developer profile, provisioning profiles, old iOS software
    images, device logs, and screenshots from this section. You can also see specific
    device information that Xcode collects on each device when you plug it in. When
    you plug in a device, you can take screenshots (for App Store submissions) and
    even save a screenshot as the launch image.


    The next tab to look at is the Repositories tab. It shows the repositories for
    recent projects that have been set up with source control. You can set up repository
    links and check out new working copies of repositories if there is an existing
    project you are checking out. As was mentioned previously, Xcode only supports
    Git and Subversion. Any other source control will have to be managed from an external
    tool.


    [Figure 2–8](#Chapter02.html#fig_2_8) shows the Projects tab. This tab shows you
    the projects that Xcode knows about. It shows you which projects are currently
    open and other basic information about the project. This view also lets you manage
    project snapshots.


    ![images](images/0208.jpg)


    **Figure 2–8.** *The Organizer with the list of projects you''ve worked with*


    The next tab lets you manage archived applications. Application archiving was
    brought to Xcode in version 3 to allow iOS developers an easy way to submit applications
    for approval. After archiving the application, you can validate the binary to
    check for commonly missed items before you submit the application to the store,
    share an ad hoc build with beta testers, or submit the application to the store.


    The final tab in the organizer is the documentation tab. This is your gateway
    to the documentation for iOS, Mac OS, and Xcode 4. While looking at any documentation,
    you''ll find a Jump Bar at the top, which acts just like the Jump Bar in your
    source editors.'
