  trans: '

    ## 简介


    近年来，iOS 平台人气飙升，并且丝毫没有放缓的迹象。应用市场竞争变得异常激烈，用户对优秀体验也习以为常。这使得我们作为应用开发者的工作变得非常困难。是什么让一款出色的应用从其他应用中脱颖而出？我们将通过本书来尝试回答这个问题。


    ### 为什么要写一本关于工具的书？


    常言道：“工匠的手艺好坏，取决于他/她的工具。”这对大多数行业来说基本都是如此。作为开发者，我们通常只需要一个文本编辑器和编译器。虽然这种配置也能完成工作，但一套优秀的工具——从
    IDE（集成开发环境）到性能分析和调试工具——能极大地提升开发者在开发和调试过程中的效率。开发者面临的主要问题，尤其是在这些工具不断推出新版本的情况下，是如何有效地使用它们。这正是本书的定位所在。本书将全面介绍如何运用
    Apple 提供的出色开发者工具，以及如何利用它们来打造卓越的应用。


    ### 本书的组织结构


    本书的核心是流程。正如你将在第 1 章中读到的那样，无论你处于哪个阶段，本书都将帮助你在成为更优秀开发者的道路上不断前行。本书开头的几章主要涉及调试和性能调优。我们将把一个急需改进的项目推进到可以进入
    Beta 测试的阶段。接着，我们会探讨如何提升开发者自身的效率，并让工具为我们完成大部分工作。我们甚至会将很多流程自动化，以便专注于更重要的问题。本书的最后部分将介绍如何与测试人员共享应用、如何回应反馈，以及最终如何在我们的应用之间共享代码。最后一章则聚焦于如何导航和自定义
    Xcode，以适应我们自己的工作流程。


    ### 支持与贡献


    如果你遇到任何问题，或者发现了对本书读者有帮助的实用技巧，请访问 [`http://proiostools.com/forum/`](http://proiostools.com/forum/)
    并参与讨论！我们的目标是建立一个出色的社区，并与已有的庞大 iOS 开发社区相互交融。我们在此提供帮助，也热切期待看到你在阅读本书过程中发现的各类技巧与诀窍。


    ## 第 1 章


    ## 蜡上蜡，蜡下蜡


    到现在为止，你应该已经编写过一两个 iOS 应用了。你也懂得了打造一款出色的应用绝非易事。从突如其来的崩溃，到内存泄漏，再到引发其他 Bug 的 Bug，即使最简单的应用也可能迅速演变成一场噩梦。幸运的是，借助我们手中的工具，这些问题很容易诊断。


    这正是本书的主要内容。作为 iOS 开发者，我们拥有一套工具箱。但随之而来的核心问题很快变成了：对于手头的任务，哪种工具是最佳选择？本书将为你的大部分情况解答这个问题。对于那些没有明确答案的情况，你也会学到一些能为你指明正确方向的方法和技巧。


    ### 本书面向哪些读者？


    在大多数技艺中，从完全新手到能够胜任的转变通常非常迅速。这一转变的目标仅仅是能够熟练使用工具，并理解工匠们的行话。这个转变过程也能建立新从业者的信心。在这个转变结束时，从业者已经能够完全胜任大部分任务，并解决大多数抛给他们的难题。


    然而，大多数人停留在“熟练”这个阶段。作为一名魔术师，我相对较快地从一名艺术新手成长为一名熟练的业余爱好者。每当我学到一项新技术或一个新效果时，我都非常兴奋地练习。但随着技艺的提升，练习的欲望减弱了，甚至对反复排练同一个效果或技巧感到厌倦。我的技艺陷入了瓶颈。我知道要进入下一阶段需要做什么，但当下我不想去做。我觉得这样也挺好。


    这与软件开发有何关联？首先，和任何技艺一样，一套特定的编程技能可以很快习得，包括学习语言语法、理解流程控制、使用基本的软件设计模式、通过标准输出进行调试以及基本使用提供的调试器。开发者在走向精通之路的下一阶段，是更深入地学习语言和平台的工作原理、更多的设计模式及其恰当用法，以及更深入地掌握调试器。最后的、永无止境的阶段，就是不断微调所有这些技能，为现有问题找到更优解，并学习如何更多地复用代码。这个学习路径并非对每个开发者都相同。有时，开发的某些部分会比另一些更容易掌握。


    我要表达的重点是，当你没有像期望的那样快速进步时，我不希望你感到沮丧。软件开发很难。区分爱好者与专业人士的是投入程度。从一名熟练的爱好者转变为专业人士，通常会使你进入职业模式。这种投入程度需要的不仅仅是练习的时间。你必须开始审视其他软件是如何制作的。让自己身边围绕着为同一个平台进行开发的人，尤其是那些比你更优秀的人，这对成长至关重要。购买这本书，也说明你认同自己希望成为一名更优秀的开发者。我的目标是帮助你至少学会一项新技能。如果你做到了，我的任务就完成了；如果你学到的更多，那就更棒了！


    那么，这本书是写给谁的呢？这本书是写给那些准备好迈向更高层次的读者的。无论你目前处于何种技能水平，本书都能让你有所收获。也许你已经精通面向对象编程，而性能调优是你想学习的方向。或者你想知道，如何在不重写一半应用代码的情况下，为
    iOS 创建一个通用应用。唯一的先决条件是，你对 iOS 开发和 Objective-C 有一定了解。


    ### 本书是什么


    本书是一本指南，它将带领你从一个 Alpha 质量的应用起步，最终打造出一个功能完备、经过测试、可提交至 App Store 的应用。本书包含了众多行业技巧，从诊断内存问题到调整滚动视图以榨取设备的最后一丝性能。最后，你会希望把这本书放在办公桌上，标记好相应的页面，以便快速查阅常见问题的解决方法。


    这本书能解决你所有的问题吗？恐怕不能，但你将学到一些用非常系统化的方式解决问题的方法。从本质上讲，我们是科学家，而运用科学方法来解决软件问题，最终将帮助我们学会如何在下一次避免问题的发生。


    本书还遵循一个真实的软件生命周期。我们将在开发接近尾声时接手一个项目，带领它经过 Beta 测试阶段，最终交付一个可以发布的产品。我们会遇到一些常见障碍，并探究
    iOS 的工作方式；我们甚至会解决一些有趣的问题。我们还会发现一些由热心人编写的有用库，他们慷慨地分享了自己针对特定问题的解决方案。

    '
- fmt: '### What You Need to Get Started


    To get the most out of this book, you''ll need a paid developer account in the
    iOS Dev Center. This will give you the ability to test on an iOS device as well
    as run the performance tools against the iOS device. We will do several things
    on the device itself, and your best bet is to go ahead and sign up for the paid
    developer account if you don''t have one already. At the time of this writing,
    the cost is $99 USD for a one-year subscription to the iOS developer program.


    If creating an account is not an option for you, you can download `Xcode 4` from
    the Mac App Store. This will give you the Xcode IDE as well as Instruments. You''ll
    have the ability to develop and debug your applications in the iOS Simulator,
    and you can run some of the performance tools against that simulator. However,
    you won''t be able to do some of the debugging and performance testing that we''ll
    cover later on in this book.


    To get set up with the iOS Dev Center, go to [`http://developer.apple.com/ios/`](http://developer.apple.com/ios/).
    [Figure 1–1](#Chapter01.html#fig_1_1) shows what the home page looks like. Click
    the Register link at the top to get started. If you want to deploy your applications
    to iOS devices, this is your best bet. If you are an enterprise developer, check
    out the enterprise developer program.


    ![images](images/0101.jpg)


    **Figure 1–1.** *The iOS Dev Center home page*


    After you download and install the latest development tools, fire up Xcode, and
    take a look around. If you are used to Xcode 3, you''ll notice Xcode 4 looks completely
    different. Don''t worry; we''ll step through the features as we make it through
    the chapters in this book. If you''re new to the platform, say hello to Xcode.
    I''m sure you''ll be friends in no time (don''t worry; friends have fights from
    time to time). Either way, we''re in for quite the journey as you learn how to
    get the most out of the toolbox Apple provides, as well as some great third-party
    tools.


    ### What''s in This Book


    This book follows one single project. We''re going to pick up this project from
    an initial alpha state and prepare it for beta testing. Then, we''ll walk through
    the beta testing phase and get some useful feedback from the testers in the form
    of bug reports and feature requests. You''ll learn how to optimize your workflow
    with automation and migrate to a universal application. The final part is figuring
    out a great way to share some code with the developer community and finally talk
    about getting the most out of Xcode 4 and some other useful tools.


    Here is a quick overview of each chapter:


    - *[Chapter 2](#Chapter02.html#ch2), First Class Tools (Xcode, Interface Builder
    and Instruments)*: In this chapter, you''ll meet Xcode 4, and the other tools
    included with the developer tools package for iOS development. Here, we''ll talk
    about new layout of Xcode and what the integration of Interface Builder gives
    us. We''ll also open Instruments, and you''ll get acquainted with a tool we''ll
    be using for some of our performance testing and debugging.

    - *[Chapter 3](#Chapter03.html#ch3), Three Screens and…Well, It Runs*: Here, we''ll
    dive right into checking out an existing project and take a look at how to use
    Git and GitHub directly from Xcode. We''ll also walk through the first build of
    our project for this book: Super Checkout.

    - *[Chapter 4](#Chapter04.html#ch4), Memory Management and Diagnostics*: In this
    chapter, we''ll diagnose and solve the number one reason for application crashes.
    We''ll talk about memory management in Objective-C and some best practices. We''ll
    also dive into our first use of Instruments to help diagnose some of these pesky
    memory issues.

    - *[Chapter 5](#Chapter05.html#ch5), Core Animation and Smooth Scrolling*: Now
    that we''ve fixed the memory issues, we''ll dive into tuning Core Animation and
    make our tables scroll like butter. You''ll learn your second instrument and some
    interesting quirks about the rendering model on iOS.

    - *[Chapter 6](#Chapter06.html#ch6), Networking, Cache, and Power Management*:
    In this chapter, you''ll learn all about networking and how the built-in iOS networking
    APIs work. We''ll take a look at a popular networking library and replace the
    existing networking layer to enhance the application. We''ll also talk about caches;
    we''ll explore some caching techniques and why caching might or might not be a
    good idea. The final part of this chapter will be all about power management.
    You''ll learn about the different radios on an iOS device and how they affect
    battery drain and how to detect problems.

    - *[Chapter 7](#Chapter07.html#ch7), Prepare the Beta!*: Now that we''ve addressed
    some of the big problems in Super Checkout, we''ll prepare the application for
    beta testing. We''ll take a look at some beta distribution techniques and some
    ideas for managing beta testing.

    - *[Chapter 8](#Chapter08.html#ch8), Why are things Breaking?*: We''re getting
    bug reports, the server API changes and all sorts of things are going wrong. In
    this chapter, we''ll take a look at a way to break down our application into testable
    components to reduce the number of bugs in our code. You''ll also learn how to
    have Instruments automatically drive the application and report any errors. We''ll
    end with a suite of tests to ensure our application is stable and stays that way
    if we need to make changes.

    - *[Chapter 9](#Chapter09.html#ch9), Can we Automate Some of This?*: We''re one
    step away from a fully automated build system that runs our tests for each new
    push to source control. We''ll meet our trusty build management tool of choice
    and how to push new builds out to testers automatically.

    - *[Chapter 10](#Chapter10.html#ch10), Now They Want an iPad Version*: Now that
    feature requests are slowing down, we find that we need an iPad-compatible version
    of Super Checkout. In this chapter, you''ll learn how to migrate Super Checkout
    to a universal binary and the different techniques for sharing code among the
    different sizes of iOS devices.

    - *[Chapter 11](#Chapter11.html#ch11), How do I Share Some of This?*: Our application
    is ready to ship, but we''ve created some great stuff that we want to break out
    into a static library so we can share the code among multiple projects and even
    with the development community as a whole. We''ll take a look at how to share
    the code on GitHub and have a brief discussion over open source licenses.

    - *[Chapter 12](#Chapter12.html#ch12), One More Thing*: By now, we''ve taken an
    application from being crash prone and buggy to being something that is ready
    to ship. Here, we''ll look at some other pieces of Xcode and how to speed up our
    workflow. We''ll also look at some great third-party tools that will speed up
    development and reduce the amount of boilerplate code you have to write.


    ### Here We Go


    Are you ready to get started? Good! A quick note before you turn the page and
    dive into the project. We''re going to cover a lot of information. Trying to take
    in all of this information in one sitting is probably not a good idea. Take it
    one chapter at a time, and repeat sections as necessary. Trust me; some of these
    topics had to be revisited several times before they were put down in this book.


    If you get stuck or find yourself getting sleepy, step away for a moment or even
    grab some shut-eye. This will help you clear your head, and your brain will work
    on the material while you are doing other things. You''ll come back, something
    will click, and you''ll notice that you understand the topic better. Learning
    is an active process, and as Aaron Hillegass says in *Cocoa Programming for Mac
    OS X*, “Caffeine is not a substitute for sleep.”


    Now, fire up Xcode 4, open your notebook, and turn the page to get started. We''re
    going to have some fun.


