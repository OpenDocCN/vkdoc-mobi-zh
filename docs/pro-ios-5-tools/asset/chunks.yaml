  trans: '

    ### 编辑器及配套的实用工具


    你绝大部分时间都会在编辑器区域中度过。Xcode 提供了多种文件编辑器供你使用：


    - 源代码

    - 项目和构建设置

    - 属性列表（`plist`）文件

    - 富文本文件

    - Core Data 数据模型

    - Core Data 映射模型

    - XIB（XML nib）文件

    - AppleScript

    - 脚本字典文件


    此外，还包含一些文件查看器，可用于查看图形、视频以及其他多种文件。


    你还可以选择三种不同类型的编辑器。你可以从工具栏访问这些编辑器类型。**标准编辑器** 是最基本的编辑器，你可以像往常一样编辑文件。**辅助编辑器**（参见图
    2–5）是一种新型编辑器，它允许你在编辑源文件时，旁边会有一个辅助视图显示相关的文件。例如，当你编辑一个源文件并选择辅助编辑器时，头文件会显示在它的旁边。如果你打开一个
    nib 文件，辅助编辑器允许你查看关联的头文件（来自 nib 的“文件所有者”属性）并与其交互。从这里，你实际上可以将 nib 中的元素通过 Control
    拖拽到源代码编辑器中，Xcode 会将相应的属性放入你放置的代码位置。


    ![images](img/0205.jpg)


    **图 2–5.** *辅助编辑器显示一个 nib，旁边是与之对应的文件所有者头文件。*


    某些文件类型可能没有对应的文件可以通过辅助编辑器打开。如果出现这种情况，你可以手动选择要在所选文件旁边显示的编辑器。为此，你需要使用辅助编辑器中的**跳转栏**来选择要显示的文件。你可以通过前往**视图
    ![images](img/U001.jpg) 辅助编辑器**来修改辅助编辑器的位置，并指定辅助编辑器是位于标准编辑器的右侧还是下方。


    另一种编辑器选项是**版本编辑器**。如果你开启了源代码控制，此编辑器将显示你对所选文件所做的更改。在撰写本书时，Xcode 4 仅支持 Git 和 Subversion
    作为源代码控制工具。通过版本编辑器，你可以点击差异查看器下方的时间按钮来查看文件的历史记录。在同一屏幕中，你还可以查看追溯历史以及带有日志注释的文件历史视图（参见图
    2–6）。


    ![images](img/0206.jpg)


    **图 2–6.** *版本编辑器让你能够查看文件历史记录以及版本注释，俗称责备视图。*


    在图 2–6 中，你还可以看到编辑器右侧的**实用工具**区域。这个面板会根据你的选择显示上下文相关的信息。在图 2–5 中，我们选择了 `RootViewController`
    nib，你可以看到实用工具区域与旧版 Xcode 中 Interface Builder 的检查器窗口相似。如果你选择了一个源文件，你会看到与在 Xcode
    3 中点击“获取信息”时相同的信息。在该区域，你可以选择源文件所属的目标，以及关于该文件的许多其他细节信息。


    当你浏览源文件时，可以点击实用工具区域的**显示快速帮助**按钮，查看光标所在任意符号的简要信息。在该区域，你可以点击任何一个蓝色条目，根据点击的上下文，它可能会打开头文件、其他文档或示例代码。花点时间尝试不同的编辑器，熟悉新的界面。别担心，我在这儿等你回来。


    ### 跳转栏


    在你熟悉编辑器的过程中，有没有注意到顶部的栏？它叫做**跳转栏**，可以让你快速浏览文件。图 2–7 显示了我们创建的`项目`中 `RootViewController`
    文件的跳转栏。


    ![images](img/0207.jpg)


    **图 2–7.** *跳转栏是一种导航工具，始终位于其对应的编辑器上方。它也出现在 Instruments 中，用于执行相同类型的任务。*


    使用跳转栏是在项目中快速导航的一种方式，无需使用项目导航栏查找文件。**相关文件按钮**（看起来像一个等号）会弹出一个列表，让你查看最近文件、未保存的文件，以及与当前查看文件相关的许多其他列表。


    **后退**和**前进**按钮允许你在已打开的编辑器中的文件历史记录中导航。用双指左右滑动可以快速浏览文件，就像在 Lion 系统中的 Safari 浏览器中一样。


    右侧其余部分是一个面包屑导航路径，从项目开始，显示如何到达你正在编辑的方法。在图 2–7 中，你可以看到我们从项目开始，在“Super Hello World”组中是文件
    `RootViewController.m`，我们正在查看 `fetchedResultsController` 选择器。点击任何一项都会显示同级项列表，并允许你深入到每一个后续层级。


    ### 管理器


    Xcode 4 引入了一个新管理器，它的功能名副其实：**管理**你的开发工作空间。你可以通过点击工具栏上的**管理器**按钮或按下 ![images](img/U004.jpg)
    ![images](img/U003.jpg)2 来打开它。图 2–8 显示了打开到“项目”选项卡的管理器。管理器有以下五项主要功能：


    - 管理开发设备

    - 管理源代码控制仓库

    - 管理最近项目

    - 管理归档构建

    - 显示文档


    查看一下**设备**部分。如果你是注册开发者，你可以在此部分管理你的所有开发者配置文件、预置描述文件、旧的 iOS 软件镜像、设备日志和屏幕截图。你还可以查看
    Xcode 在你连接每台设备时收集的特定设备信息。当连接设备时，你可以截取屏幕截图（用于 App Store 提交），甚至可以将屏幕截图保存为启动图像。


    接下来要看的是**仓库**选项卡。它显示了已设置源代码控制的最近项目的仓库。如果有要签出的现有项目，你可以设置仓库链接并签出仓库的新工作副本。如前所述，Xcode
    仅支持 Git 和 Subversion。任何其他源代码控制都必须通过外部工具进行管理。


    图 2–8 显示了**项目**选项卡。此选项卡会显示 Xcode 已知的项目。它显示了哪些项目当前处于打开状态，以及关于项目的其他基本信息。此视图还允许你管理项目快照。


    ![images](img/0208.jpg)


    **图 2–8.** *显示你曾处理过的项目列表的管理器*


    接下来的选项卡允许你管理已归档的应用程序。应用程序归档功能是在 Xcode 3 中引入的，旨在为 iOS 开发者提供一种简化的方式来提交应用进行审批。归档应用程序后，你可以验证二进制文件以检查是否有常见遗漏项，然后再将应用程序提交到商店、与测试人员共享临时构建版本，或者将应用程序提交到商店。


    管理器中的最后一个选项卡是**文档**选项卡。这是你访问 iOS、Mac OS 和 Xcode 4 文档的门户。查看任何文档时，你都会在顶部找到一个跳转栏，它的工作方式与源代码编辑器中的跳转栏完全相同。

