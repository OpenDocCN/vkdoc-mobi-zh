  trans: '

    #### 海森堡虫


    如果问题是竞态条件（尤其是在多线程环境下），你可能会忍不住在代码里到处插入 `NSLog` 语句来检查状态。别这样做。我再说一遍：别这么做。添加 `NSLog`
    语句会改变竞态条件的条件，甚至可能完全消除它。


    等等，我猜你肯定在问：“他是说不要消除竞态条件吗？”是的，我确实这么说了。虽然这在短期内或许是个可接受的解决方案，但应用程序中很可能存在一个根本性的设计问题，之后会再次暴露出来。


    我们把这类 bug 称为“海森堡虫”，因为它们遵循海森堡测不准原理。该原理指出，测量某种现象这一行为本身就会完全改变其行为。想了解更多，可以读一读“双缝衍射实验”的资料，你就会明白这其中的微妙之处了。


    #### 求助同事


    你很可能是在团队中工作，所以随时可以向队友求助。让一双新的眼睛审视问题，往往能找到 bug 的根本原因，尤其是当对方问出“你为什么用这种方式处理？”时。这一个问题就能带来全新的视角，并在解决难题时揭示出那些错误的假设。


    被你拉来审查代码的人，对某些 API 的熟练程度也可能不同。如果问题出在你使用 API 的方式上，他们很可能会发现不对劲。他们或许还遇到过类似类型的 bug。利用团队的专业知识，是解决棘手问题并在团队内部建立信任的好方法。真的，这是双赢的局面。


    #### 推倒重来


    现在，我们来到了列表的末尾。你已经用尽一切办法对付这个问题，但它仍然时不时冒出来。如果已经折腾了很长时间，那就休息一下，或者睡一觉。有时候，好好睡一晚上能让大脑潜意识地思考问题，醒来时或许就有了可能的解决方案。


    如果问题牵涉时间紧迫，也许是时候举白旗，重新设计那段代码了。先从用图表和其他具体的形式勾勒出系统应有的行为开始，然后列出所有可能导致失败的边界情况。请记住，现在不是重新设计整个系统或模块的时候。重新评估你的方法，然后想出一个解决方案。


    在问题上推倒重来并非真正的放弃；你只是发现了一种行不通的方法而已。经历过这次之后，你将有绝佳的故事可以分享，并在调试这类问题方面获得宝贵的经验。


    ### 我们快完成了……几乎


    哇，这一章我们真是经历了一段漫长的旅程。我们从一款存在严重内存问题的应用程序开始。它在一些简单操作上就会崩溃，而我们已经解决了这些问题。应用还有一些其他问题，我们将继续迭代应用，朝着发布
    Super Checkout 的 beta 版本迈进。


    还剩下什么？我们必须将分支合并回主分支，以便继续在主分支上开发。在修改应用的过程中，你是否逐步提交了更改？是的？很好。如果没有，对这个应用来说也不是什么大事。我建议尽早并频繁地提交，尤其是在将修改推送到远程仓库之前，Git
    仓库只在本地修改。


    如果还没做，请对项目执行最终提交到 `memory` 分支，然后打开 Organizer（管理器）的 Repositories（仓库）标签页。在仓库导航器中，选中仓库下的工作副本。我们要切换回
    `master` 分支，因为它将是合并的目标。你可以点击工作副本底部的“Switch Branch”（切换分支）按钮来完成此操作（参见图 4–30）。


    ![images](img/0430.jpg)


    **图 4–30.** *查看工作副本的变更历史*


    当你点击“Switch Branch”按钮时，会弹出一个工作表，要求你选择要切换到的分支（参见图 4–31）。选择 `master` 分支，然后点击 OK。


    ![images](img/0431.jpg)


    **图 4–31.** *切换分支工作表*


    现在，回到 Xcode，我们要合并来自另一个分支的更改，因此需要选择 File（文件）![image](img/U001.jpg)Source Control（源代码控制）![image](img/U001.jpg)Merge（合并）。会显示一个工作表（见图
    2–32），询问你要合并哪个分支；选择 `Memory_Fixes`，然后点击 Choose（选择）。


    ![images](img/0432.jpg)


    **图 4–32.** *选择要合并的分支*


    **提示：** 确保你的工作副本是你想要合并到的目标分支。


    接下来你会看到最终的合并确认。这个工作表允许你决定要包含哪些差异，并在左侧显示本地副本的预览。如果遇到实际冲突，底部的按钮让你选择如何处理冲突（参见图 4–33）。


    ![images](img/0433.jpg)


    **图 4–33.** *合并工作表是在提交前直观查看合并结果的好工具*


    点击 Merge（合并）会触发 Xcode 按照你的配置方式执行合并，并将更改提交到该分支。合并完成，切换回 Organizer 查看工作副本的修订历史，会反映出已合并的提交（参见图
    4–34）。


    ![images](img/0434.jpg)


    **图 4–34.** *Xcode 自动将合并提交到仓库*


    合并完成，我们可以继续处理剩下的优化工作了。


    ### 总结


    本章我们涉及了大量内容！我们讨论了最新的编译器技术以及如何解决内存相关问题。现在，你可以把自己看作僵尸杀手和内存管工了。然而，这些成就只是解决 Super
    Checkout 问题的第一步。接下来要处理的是缓慢的用户界面，并优化我们的应用以实现流畅的转场和快速表格。是时候学习如何使用下一组可用的工具了。准备好了吗？很好，翻过这一页，开始吧！


    ## 第 5 章


    ## 核心动画与平滑滚动


    没有什么比缓慢的用户界面更让人恼火的了。作为开发者，我们的职责是确保应用响应迅速且交互灵敏。这并非总是易事。算法可能变得复杂，运行时间超出预期。设计师会设计带有大量图形元素的复杂视图。两者结合，就很容易出现滚动时界面卡顿的情况。`UITableView`
    尤其容易出现这类问题。


    在本章中，你将学习如何设计高效运行的算法（或者说是模拟高效），以及如何设计视图以帮助设备自行计算动画，而非让视图本身承担计算负担。到本章结束时，Super
    Checkout 的产品列表屏幕将滚动得飞快，而且你将掌握一些绝佳的视图设计技巧，避免图形处理器在渲染这些视图到屏幕时出现瓶颈。


    你即将踏上一段精彩的旅程。我们将涉及一些相当复杂的内容，所以请冲杯咖啡，准备出发。'
- fmt: "### Leveraging with the Main Thread\n\nThe most important part of your application\
    \ is the main thread. It is the heartbeat of your application. Understanding how\
    \ the main thread, also referred to as the event loop or run loop, works and its\
    \ place in the life cycle of your application is key to designing a responsive\
    \ application. To that end, let's take a look at how our application is launched\
    \ and the run loop that our instance of `UIApplication` creates and manages.\n\
    \nThe first thing we'll look at is the `main.m` file. In Listing 1-1, you'll see\
    \ the `main.m` file as it exists in Super Checkout:\n\n**Listing 5–1.** *Super\
    \ Checkout's main.m File*\n\n```\n#import <UIKit/UIKit.h>\n\nint main(int argc,\
    \ char *argv[]) {\n    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n\
    \    int retVal = UIApplicationMain(argc, argv, nil, nil);\n    [pool release];\n\
    \    return retVal;\n}\n```\n\nOK, you've seen this plenty of times. It is the\
    \ default code created when Xcode creates a new project. What does it do though?\
    \ Let's go line by line:\n\n`NSAutoreleasePool *pool = [[NSAutoreleasePool alloc]\
    \ init];` creates an autorelease pool for the application.\n\n`int retVal = UIApplicationMain(argc,\
    \ argv, nil, nil);` creates a single instance (a singleton) of `UIApplication`\
    \ for the application, loads the `MainWindow` nib, and finally starts the main\
    \ run loop. Loading the nib creates an instance of our implementation of the application\
    \ delegate, so the application can receive the appropriate notifications during\
    \ the application's life cycle.\n\n`[pool release];` releases the autorelease\
    \ pool to free up any leftover memory that was allocated and autoreleased. We\
    \ discussed issues surrounding autorelease pools of this type in [Chapter 4](#Chapter04.html#ch4).\n\
    \n`return retVal;` returns from the function and allows the application to exit\
    \ and send the caller the return code.\n\nThis is all pretty simple stuff, but\
    \ the beef of our concern lies within the invocation of `UIApplicationMain()`.\
    \ This method, as mentioned previously, creates our instance of the `UIApplication`\
    \ singleton and wires up everything so our application delegate gets called to\
    \ set up the initial view and add it to the window for the application. After\
    \ that happens, Cocoa Touch and UIKit take over and start the process for listening\
    \ to inputs and drawing the user interface.\n\n![images](images/0501.jpg)\n\n\
    **Figure 5–1.** *The flow of an application outlining some important pieces of\
    \ the application life cycle.*\n\n#### Exploring the Event Loop\n\nBefore we get\
    \ into finding badly performing code, let's take a detailed look at the event\
    \ loop. When your application is launched, a process is created, and a single\
    \ thread is created for that process. The event loop runs in this thread. As shown\
    \ in [Figure 5–1](#Chapter05.html#fig_5_1), the event loop performs two tasks:\
    \ it responds to inputs and responds to timers. This concept is pretty simple,\
    \ but in practice, things are complicated when you want to create an application\
    \ that remains responsive. Timers are different from input sources in that they\
    \ are triggered based on time-based calculation and are handled specially by the\
    \ event loop. The second responsibility of the run loop is to respond to input\
    \ sources. APIs like `NSURLConnection` run on the main thread and tie into the\
    \ event loop when run in asynchronous mode.\n\nWhen something happens, like the\
    \ methods `viewDidLoad:` or `touchesBegan:withEvent:` are called, your code is\
    \ executed on the main thread holding up the event loop. Generally, the code being\
    \ executed is quick and control is returned back to where it belongs. Sometimes,\
    \ however, that code can take quite some time to execute.\n\nThe mantra has always\
    \ been, “Don't block the main thread.” This is absolutely true when it comes to\
    \ creating an application with a responsive user interface. The caveat to this\
    \ mindset, however, is to avoid premature optimization. Donald Knuth once said,\
    \ “We should forget about small efficiencies, say about 97% of the time: premature\
    \ optimization is the root of all evil.”\n\nWith that in mind, let's dive in and\
    \ see what is broken with Super Checkout.\n\n#### Optimizing Code Execution\n\n\
    For this part of the chapter, we're going to dive into some techniques for diagnosing\
    \ (and hopefully fixing) code that is running too long. To do this, we need to\
    \ spend a little time talking about how we can go about fixing this type of issue.\
    \ Since we are looking at performance issues, we need to run the application in\
    \ the environment it is meant to run in. This means running the application on\
    \ whichever device is going to be the primary deployment target.\n\nAfter that,\
    \ we'll need to compile the application and prepare it to be run in a release\
    \ configuration. Ideally, this would mean no `NSLog` statements and a full release-ready\
    \ build. Getting this controlled environment is key to a good performance-tuning\
    \ session.\n\nSo how do we set this up? I'm glad you asked! Fire up Xcode, follow\
    \ the steps to create a new “Master-Detail application” project named Performance\
    \ Tuning. You won't need all of the other options in the create project sheet;\
    \ we're just using this project as a quick demonstration app.\n\nOnce your app\
    \ is created, click the project name in the Project navigator panel to open the\
    \ project settings in your editor. Next, click the project name in this new panel\
    \ to show the project settings. In the Info tab, click the plus sign in the Configuration\
    \ section and duplicate the release configuration. Name this configuration Profile\
    \ (see [Figure 5–2](#Chapter05.html#fig_5_2)).\n\n![images](images/0502.jpg)\n\
    \n**Figure 5–2.** *Creating a Profile configuration*\n\nThe reason we're doing\
    \ this is to separate the Release configuration, which is meant for distribution\
    \ (ad hoc or to the App Store), and our profiling configuration, which is meant\
    \ to run on a test device. Now click the Build Settings tab. In the Code Signing\
    \ section, ensure the Profile entry has the iPhone Developer setting set. Notice\
    \ in [Figure 5–3](#Chapter05.html#fig_5_3), the All item is selected, as is Combined.\n\
    \n![images](images/0503.jpg)\n\n**Figure 5–3.** *Setting the code signing configuration\
    \ for the new Profile configuration*\n\n**TIP:** Having different configurations\
    \ for debugging, profiling, ad hoc releases, and distribution releases can really\
    \ help with ensuring you're working with the appropriate build. The debug configuration\
    \ may have some preprocessor macros defined that you might not need to use in\
    \ your release configurations. Also, the release configurations will have some\
    \ compiler optimization flags set that will create compiled code that runs faster.\
    \ By duplicating the release configuration for the profile configuration, you\
    \ ensure that the compiler optimization settings are duplicated, so you can see\
    \ how your code will perform in real world situation."
  raw: '### Leveraging with the Main Thread


    The most important part of your application is the main thread. It is the heartbeat
    of your application. Understanding how the main thread, also referred to as the
    event loop or run loop, works and its place in the life cycle of your application
    is key to designing a responsive application. To that end, let''s take a look
    at how our application is launched and the run loop that our instance of `UIApplication`
    creates and manages.


    The first thing we''ll look at is the `main.m` file. In Listing 1-1, you''ll see
    the `main.m` file as it exists in Super Checkout:


    **Listing 5–1.** *Super Checkout''s main.m File*


    `#import <UIKit/UIKit.h>`


    `int main(int argc, char *argv[]) {`

    `    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`

    `    int retVal = UIApplicationMain(argc, argv, nil, nil);`

    `    [pool release];`

    `    return retVal;`

    `}`


    OK, you''ve seen this plenty of times. It is the default code created when Xcode
    creates a new project. What does it do though? Let''s go line by line:


    `NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`


    creates an autorelease pool for the application.


    `int retVal = UIApplicationMain(argc, argv, nil, nil);`


    creates a single instance (a singleton) of `UIApplication` for the application,
    loads the `MainWindow` nib, and finally starts the main run loop. Loading the
    nib creates an instance of our implementation of the application delegate, so
    the application can receive the appropriate notifications during the application''s
    life cycle.


    ` [pool release];`


    releases the autorelease pool to free up any leftover memory that was allocated
    and autoreleased. We discussed issues surrounding autorelease pools of this type
    in [Chapter 4](#Chapter04.html#ch4).


    `return retVal;`


    returns from the function and allows the application to exit and send the caller
    the return code.


    This is all pretty simple stuff, but the beef of our concern lies within the invocation
    of `UIApplicationMain()`. This method, as mentioned previously, creates our instance
    of the `UIApplication` singleton and wires up everything so our application delegate
    gets called to set up the initial view and add it to the window for the application.
    After that happens, Cocoa Touch and UIKit take over and start the process for
    listening to inputs and drawing the user interface.


    ![images](images/0501.jpg)


    **Figure 5–1.** *The flow of an application outlining some important pieces of
    the application life cycle.*


    #### Exploring the Event Loop


    Before we get into finding badly performing code, let''s take a detailed look
    at the event loop. When your application is launched, a process is created, and
    a single thread is created for that process. The event loop runs in this thread.
    As shown in [Figure 5–1](#Chapter05.html#fig_5_1), the event loop performs two
    tasks: it responds to inputs and responds to timers. This concept is pretty simple,
    but in practice, things are complicated when you want to create an application
    that remains responsive. Timers are different from input sources in that they
    are triggered based on time-based calculation and are handled specially by the
    event loop. The second responsibility of the run loop is to respond to input sources.
    APIs like `NSURLConnection` run on the main thread and tie into the event loop
    when run in asynchronous mode.


    When something happens, like the methods `viewDidLoad:` or `touchesBegan:withEvent:`
    are called, your code is executed on the main thread holding up the event loop.
    Generally, the code being executed is quick and control is returned back to where
    it belongs. Sometimes, however, that code can take quite some time to execute.


    The mantra has always been, “Don''t block the main thread.” This is absolutely
    true when it comes to creating an application with a responsive user interface.
    The caveat to this mindset, however, is to avoid premature optimization. Donald
    Knuth once said, “We should forget about small efficiencies, say about 97% of
    the time: premature optimization is the root of all evil.”


    With that in mind, let''s dive in and see what is broken with Super Checkout.


    #### Optimizing Code Execution


    For this part of the chapter, we''re going to dive into some techniques for diagnosing
    (and hopefully fixing) code that is running too long. To do this, we need to spend
    a little time talking about how we can go about fixing this type of issue. Since
    we are looking at performance issues, we need to run the application in the environment
    it is meant to run in. This means running the application on whichever device
    is going to be the primary deployment target.


    After that, we''ll need to compile the application and prepare it to be run in
    a release configuration. Ideally, this would mean no `NSLog` statements and a
    full release-ready build. Getting this controlled environment is key to a good
    performance-tuning session.


    So how do we set this up? I''m glad you asked! Fire up Xcode, follow the steps
    to create a new “Master-Detail application” project named Performance Tuning.
    You won''t need all of the other options in the create project sheet; we''re just
    using this project as a quick demonstration app.


    Once your app is created, click the project name in the Project navigator panel
    to open the project settings in your editor. Next, click the project name in this
    new panel to show the project settings. In the Info tab, click the plus sign in
    the Configuration section and duplicate the release configuration. Name this configuration
    Profile (see [Figure 5–2](#Chapter05.html#fig_5_2)).


    ![images](images/0502.jpg)


    **Figure 5–2.** *Creating a Profile configuration*


    The reason we''re doing this is to separate the Release configuration, which is
    meant for distribution (ad hoc or to the App Store), and our profiling configuration,
    which is meant to run on a test device. Now click the Build Settings tab. In the
    Code Signing section, ensure the Profile entry has the iPhone Developer setting
    set. Notice in [Figure 5–3](#Chapter05.html#fig_5_3), the All item is selected,
    as is Combined.


    ![images](images/0503.jpg)


    **Figure 5–3.** *Setting the code signing configuration for the new Profile configuration*


    **TIP:** Having different configurations for debugging, profiling, ad hoc releases,
    and distribution releases can really help with ensuring you''re working with the
    appropriate build. The debug configuration may have some preprocessor macros defined
    that you might not need to use in your release configurations. Also, the release
    configurations will have some compiler optimization flags set that will create
    compiled code that runs faster. By duplicating the release configuration for the
    profile configuration, you ensure that the compiler optimization settings are
    duplicated, so you can see how your code will perform in real world situation.'
  trans: "\n### 利用主线程\n\n应用程序最重要的部分就是主线程，它是应用的心跳。了解主线程（也称为事件循环或运行循环）的工作方式及其在应用生命周期中的位置，是设计响应式应用的关键。为此，让我们看看应用是如何启动的，以及`UIApplication`实例创建和管理的运行循环。\n\
    \n我们首先要看的是`main.m`文件。在代码清单 1-1 中，你会看到 Super Checkout 中现有的`main.m`文件：\n\n**代码清单\
    \ 5–1.** *Super Checkout 的 main.m 文件*\n\n```\n#import <UIKit/UIKit.h>\n\nint main(int\
    \ argc, char *argv[]) {\n    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc]\
    \ init];\n    int retVal = UIApplicationMain(argc, argv, nil, nil);\n    [pool\
    \ release];\n    return retVal;\n}\n```\n\n好吧，这个你已经见过很多次了。这是 Xcode 创建新项目时生成的默认代码。但它到底做了什么？我们逐行来看：\n\
    \n`NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];` 为应用创建了一个自动释放池。\n\
    \n`int retVal = UIApplicationMain(argc, argv, nil, nil);` 为应用创建了一个`UIApplication`的单例实例，加载`MainWindow`\
    \ nib 文件，最后启动主运行循环。加载 nib 文件会创建应用委托的实现实例，这样应用就能在生命周期中接收相应的通知。\n\n`[pool release];`\
    \ 释放自动释放池，以收回已分配并被自动释放的剩余内存。我们在第 4 章中讨论过这类自动释放池的相关问题。\n\n`return retVal;` 从函数返回，允许应用退出并向调用者发送返回码。\n\
    \n这些都是相当简单的内容，但我们的重点在于调用`UIApplicationMain()`。如前所述，这个方法创建了`UIApplication`单例实例，并连接好一切，使得应用委托被调用以设置初始视图，并将其添加到应用窗口中。之后，Cocoa\
    \ Touch 和 UIKit 接管，开始监听输入并绘制用户界面。\n\n![images](img/0501.jpg)\n\n**图 5–1.** *应用流程图，概述应用生命周期中的一些重要环节。*\n\
    \n#### 探索事件循环\n\n在开始查找性能不佳的代码之前，让我们详细看看事件循环。当你的应用启动时，会创建一个进程，并为该进程创建一个单线程。事件循环在这个线程中运行。如图\
    \ 5–1 所示，事件循环执行两项任务：响应输入和响应定时器。这个概念非常简单，但在实践中，当你想要创建一个保持响应性的应用时，事情就会变得复杂。定时器与输入源不同，它们基于时间计算触发，并由事件循环特殊处理。运行循环的第二个职责是响应输入源。像`NSURLConnection`这样的\
    \ API 在主线程上运行，并且在异步模式下运行时与事件循环关联。\n\n当某些事件发生时，比如调用`viewDidLoad:`或`touchesBegan:withEvent:`方法，你的代码会在主线程上执行，从而占用事件循环。通常，执行的代码很快，控制权会迅速交回它所属的地方。然而，有时这些代码可能需要相当长的时间来执行。\n\
    \n一直以来都有一条准则：“不要阻塞主线程。”在创建具有响应式用户界面的应用时，这绝对正确。但这种思维模式的一个注意事项是避免过早优化。唐纳德·克努斯曾说过：“我们应该忘记小的效率提升，大约\
    \ 97%的情况下都是如此：过早优化是万恶之源。”\n\n记住这一点，让我们深入看看 Super Checkout 出了什么问题。\n\n#### 优化代码执行\n\
    \n在本章的这部分，我们将深入探讨一些诊断（并希望修复）运行时间过长的代码的技术。为此，我们需要花点时间讨论如何解决这类问题。由于我们关注的是性能问题，我们需要在应用预期的运行环境中运行它。这意味着要在将要作为主要部署目标的设备上运行应用。\n\
    \n之后，我们需要编译应用并准备以发布配置运行。理想情况下，这意味着没有`NSLog`语句，并且是完全准备好发布的构建版本。获得这种受控环境是进行良好性能调优的关键。\n\
    \n那么如何设置呢？很高兴你问到！启动 Xcode，按照步骤创建一个名为 Performance Tuning 的新“主-从应用”项目。你不需要创建项目面板中的其他选项；我们只是将这个项目作为快速演示应用。\n\
    \n创建应用后，点击项目导航面板中的项目名称，在编辑器中打开项目设置。接着，点击这个新面板中的项目名称以显示项目设置。在“信息”标签页中，点击“配置”部分的加号，复制发布配置。将此配置命名为\
    \ Profile（见图 5–2）。\n\n![images](img/0502.jpg)\n\n**图 5–2.** *创建 Profile 配置*\n\n\
    我们这样做的目的是将 Release 配置（用于分发，如临时发布或 App Store 发布）与我们用于测试设备上运行的 Profile 配置分开。现在点击“构建设置”标签页。在“代码签名”部分，确保\
    \ Profile 条目设置了 iPhone Developer 设置。注意图 5–3 中，选择了“全部”项和“组合”项。\n\n![images](img/0503.jpg)\n\
    \n**图 5–3.** *为新 Profile 配置设置代码签名配置*\n\n**提示：** 为调试、性能分析、临时发布和分发发布设置不同的配置，确实有助于确保你使用的是合适的构建版本。调试配置可能定义了一些在发布配置中不需要使用的预处理器宏。此外，发布配置会设置一些编译器优化标志，从而生成运行更快的编译代码。通过复制发布配置来创建\
    \ Profile 配置，你可以确保编译器优化设置也被复制，从而能够看到你的代码在实际场景中的性能表现。\n"
- fmt: "##### Brief Tangent—All about Targets\n\nWhile we're mucking about in Build\
    \ Settings, let's talk briefly about the difference between the project settings,\
    \ targets, and schemes. In the Build Settings shown in [Figure 5–3](#Chapter05.html#fig_5_3),\
    \ you selected the Combined option. This defines the build configuration for the\
    \ project. You can override these settings in a target. The target is the configuration\
    \ for a build. It inherits settings from the project-level Build Settings, and\
    \ you can see it by clicking the Levels view in the Build Settings tab. So click\
    \ the Performance Tuning target, and click the Build Settings tab. Now click Levels,\
    \ and make sure All is selected. In [Figure 5–4](#Chapter05.html#fig_5_4), you'll\
    \ see the resulting screen and the inheritance of each build setting.\n\n![images](images/0504.jpg)\n\
    \n**Figure 5–4.** *The inheritance chain of the target all the way down to the\
    \ resolved (final) setting*\n\nWhat you are looking at is how each setting is\
    \ finally resolved by Xcode. On the far right is the default setting. As you scan\
    \ to the left, you see the project level setting and then the target setting with\
    \ the final resolved value. The project and target settings are editable in this\
    \ view.\n\nAs was mentioned previously, we'll talk briefly about schemes. We've\
    \ opened the scheme editor before and are about to open it again. What we haven't\
    \ defined is the scheme itself. The scheme is how a target, or targets, is put\
    \ together to make a final build artifact. That's pretty much all there is to\
    \ know about schemes at this level.\n\n##### Getting Back to Profiling\n\nMoving\
    \ right along. Now, that the profile configuration is ready to go, we need to\
    \ tell the profile scheme to use this configuration. Open the scheme editor like\
    \ we did in [Chapter 4](#Chapter04.html#ch4) (by going to **Product** ![Images](images/U001.jpg)\
    \ **Edit Scheme**). Click the Profile action, and modify the Build Configuration\
    \ option in the Info tab to use the new configuration we just created (see [Figure\
    \ 5–5](#Chapter05.html#fig_5_5)). Click OK, and we're ready to go.\n\n**NOTE:**\
    \ In [Chapter 4](#Chapter04.html#ch4), we ran the application through Instruments\
    \ and didn't go through the steps to create a new build configuration. We did\
    \ so because we weren't running the application on a device. All the testing was\
    \ through the simulator, so didn't have to worry about code signing issues. We're\
    \ going to be running all of our tests on the device to get real-world performance\
    \ so we need to worry about code signing issues that will come up when you prepare\
    \ your app for release (ad hoc or to the App Store). This will reduce the number\
    \ of headaches you will experience.\n\n![images](images/0505.jpg)\n\n**Figure\
    \ 5–5.** *Modifying the build configuration for running the application through\
    \ the profiler*\n\nNow that the configuration stuff is out of the way, let's implement\
    \ some code to show an example of blocking the main thread. Open the `MasterViewController.m`\
    \ file (the prefix may differ due to Xcode's automatic prefixing feature), and\
    \ modify it to look like [Listing 5--2](#Chapter05.html#list_5_2).\n\n**Listing\
    \ 5–2.** *The Updated RootViewController (Substitute Your MasterViewController\
    \ for RootViewController)*\n\n```\n#import \"RootViewController.h\"\n\n@interface\
    \ RootViewController()\n-(NSInteger) fibonacci:(NSInteger) term;\n@end\n\n@implementation\
    \ RootViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n}\n\n\
    - (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    }\n\n- (void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear:animated];\n\
    }\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    }\n\n- (void)viewDidDisappear:(BOOL)animated\n{\n    [super viewDidDisappear:animated];\n\
    }\n\n// Customize the number of sections in the table view.\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return 35;\n}\n\n// Customize\
    \ the appearance of table view cells.\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n               cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
    \ == nil) {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    reuseIdentifier:CellIdentifier] autorelease];\n    }\n\n    [[cell textLabel]\
    \ setText:[NSString stringWithFormat:@\"%i\", [self\nfibonacci:[indexPath row]]]];\n\
    \n    // Configure the cell.\n    return cell;\n}\n\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath\n*)indexPath\n{\n}\n\n- (void)didReceiveMemoryWarning\n\
    {\n    // Releases the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
    \n    // Relinquish ownership any cached data, images, etc that aren't in use.\n\
    }\n\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n\n    // Relinquish\
    \ ownership of anything that can be recreated in viewDidLoad or on\ndemand.\n\
    \    // For example: self.myOutlet = nil;\n}\n\n- (void)dealloc\n{\n    [super\
    \ dealloc];\n}\n\n#pragma mark - Private\n-(NSInteger) fibonacci:(NSInteger) term\
    \ {\n    if(term == 0) {\n        return 0;\n    } else if(term == 1) {\n    \
    \    return 1;\n    } else {\n        return [self fibonacci:term - 1] + [self\
    \ fibonacci:term - 2];\n    }\n}\n\n@end\n```"
  raw: '##### Brief Tangent—All about Targets


    While we''re mucking about in Build Settings, let''s talk briefly about the difference
    between the project settings, targets, and schemes. In the Build Settings shown
    in [Figure 5–3](#Chapter05.html#fig_5_3), you selected the Combined option. This
    defines the build configuration for the project. You can override these settings
    in a target. The target is the configuration for a build. It inherits settings
    from the project-level Build Settings, and you can see it by clicking the Levels
    view in the Build Settings tab. So click the Performance Tuning target, and click
    the Build Settings tab. Now click Levels, and make sure All is selected. In [Figure
    5–4](#Chapter05.html#fig_5_4), you''ll see the resulting screen and the inheritance
    of each build setting.


    ![images](images/0504.jpg)


    **Figure 5–4.** *The inheritance chain of the target all the way down to the resolved
    (final) setting*


    What you are looking at is how each setting is finally resolved by Xcode. On the
    far right is the default setting. As you scan to the left, you see the project
    level setting and then the target setting with the final resolved value. The project
    and target settings are editable in this view.


    As was mentioned previously, we''ll talk briefly about schemes. We''ve opened
    the scheme editor before and are about to open it again. What we haven''t defined
    is the scheme itself. The scheme is how a target, or targets, is put together
    to make a final build artifact. That''s pretty much all there is to know about
    schemes at this level.


    ##### Getting Back to Profiling


    Moving right along. Now, that the profile configuration is ready to go, we need
    to tell the profile scheme to use this configuration. Open the scheme editor like
    we did in [Chapter 4](#Chapter04.html#ch4) (by going to **Product** ![Images](images/U001.jpg)
    **Edit Scheme**). Click the Profile action, and modify the Build Configuration
    option in the Info tab to use the new configuration we just created (see [Figure
    5–5](#Chapter05.html#fig_5_5)). Click OK, and we''re ready to go.


    **NOTE:** In [Chapter 4](#Chapter04.html#ch4), we ran the application through
    Instruments and didn''t go through the steps to create a new build configuration.
    We did so because we weren''t running the application on a device. All the testing
    was through the simulator, so didn''t have to worry about code signing issues.
    We''re going to be running all of our tests on the device to get real-world performance
    so we need to worry about code signing issues that will come up when you prepare
    your app for release (ad hoc or to the App Store). This will reduce the number
    of headaches you will experience.


    ![images](images/0505.jpg)


    **Figure 5–5.** *Modifying the build configuration for running the application
    through the profiler*


    Now that the configuration stuff is out of the way, let''s implement some code
    to show an example of blocking the main thread. Open the `MasterViewController.m`
    file (the prefix may differ due to Xcode''s automatic prefixing feature), and
    modify it to look like [Listing 5--2](#Chapter05.html#list_5_2).


