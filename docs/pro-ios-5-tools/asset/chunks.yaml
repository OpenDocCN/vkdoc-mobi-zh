- fmt: '### Creating the iOS Distribution Certificate


    To create our iOS distribution certificate, we need to enter the iOS provisioning
    portal. We access the provisioning portal via the iOS Dev Center (see [Figure
    7–9](#Chapter07.html#fig_7_9)). You can only access the provisioning portal if
    you signed in as a register developer. In addition, you''ll need to sign up for
    the iOS Developer Program. The program currently cost `$99` per year for individuals.
    In addition to the benefits of the Registered Developer Program, you receive access
    to pre-release software and tools, internal developer forums, and technical support
    from Apple. Additionally, you will be able to test your applications on physical
    iOS devices (rather than just the simulator). Most importantly, you can distribute
    your application, either ad hoc or via the App Store. If you''re interested, you
    can find out more about it at [`http://developer.apple.com/programs/ios/`](http://developer.apple.com/programs/ios/).


    ![images](images/0709.jpg)


    **Figure 7–9.** *Signed in the iOS Dev Center as a registered developer*


    If you signed in properly, you should see iOS Provisioning Portal on the right
    site of the iOS Dev Center, under the title iOS Developer Program (see [Figure
    7–10](#Chapter07.html#fig_7_10)). Click the iOS Provisioning Portal link.


    ![images](images/0710.jpg)


    **Figure 7–10.** *iOS Developer Program links*


    Once you enter the iOS Provisioning Portal page (see [Figure 7–11](#Chapter07.html#fig_7_11)),
    you should see a menu of options on the left side (see [Figure 7–12](#Chapter07.html#fig_7_12)).
    The first option under Home is Certificates. Click it.


    ![images](images/0711.jpg)


    **Figure 7–11.** *iOS Provisioning Portal page*


    ![images](images/0712.jpg)


    **Figure 7–12.** *Provisioning Portal menu*


    Once the Certificates page, click the Distribution tab (make sure not to click
    the Distribution link shown in [Figure 7–12](#Chapter07.html#fig_7_12)!) at the
    top to show your distribution certificates. There may a certificate that Xcode
    would have created for you automatically, or there may be no certificates present
    (see [Figure 7–13](#Chapter07.html#fig_7_13)). Regardless, we''ll create a new
    one. Find the row of the table that ends with a button labelled Request Certificate.
    Click this button.


    ![images](images/0713.jpg)


    **Figure 7–13.** *Distribution tab of the Certificates page*


    The panel should change to expose a set of instructions. These are instructions
    to create a certificate request, which we just completed. Click the button labelled
    Choose File at the end of the instructions. In the file chooser, navigate to the
    location where you saved `CertificateSigningRequest.certSigningRequest`, and select
    that file. Confirm that the file name appears next to the Choose File button (see
    [Figure 7–14](#Chapter07.html#fig_7_14)), and click Submit.


    ![images](images/0714.jpg)


    **Figure 7–14.** *Submitting the Certificate Request*


    Once submitted, the Distribution Certificate pane should refresh, listing the
    certificate with a status of Pending Issuance (see [Figure 7–15](#Chapter07.html#fig_7_15)).
    Wait a few moments, and refresh the pane by clicking on the Distribution tab.
    The certificate status should update to Issued (see [Figure 7–16](#Chapter07.html#fig_7_16))
    and have an expiration date one year in the future. Click the Download button
    on the right of the certificate row. This should download a file named `distribution_identity.cer`.
    Also download the WWDR intermediate certificate. This file should be named `AppleWWDRCA.cer`.


    ![images](images/0715.jpg)


    **Figure 7–15.** *Distribution certificate pending issuance*


    ![images](images/0716.jpg)


    **Figure 7–16.** *Distribution certificate issued*


    Find the `AppleWWDRCA.cer` file in the Finder, and double-click it. This should
    launch Keychain Assistant, and install the Apple WWDR Intermediate certificate.
    You can confirm this is installed by selecting Certificates on the lower left
    pane of the Keychain Assistant window and searching for the name Apple Worldwide
    Developer Relations Certificate Authority (see [Figure 7–17](#Chapter07.html#fig_7_17)).


    ![images](images/0717.jpg)


    **Figure 7–17.** *Confirming Apple WWDR Intermediate Certificate installation
    (highlighted)*


    Repeat the installation process for `distribution_identity.cer`.


    ### Uploading UDIDs


    Head back to the iOS Provisioning Portal, and click Devices on the left side menu.
    You should be on the Manage tab of the Devices page (see [Figure 7–18](#Chapter07.html#fig_7_18)).


    ![images](images/0718.jpg)


    **Figure 7–18.** *Devices page of the iOS Provisioning Portal page*


    You are allowed to add up to 100 devices per year for development and testing
    purposes. While you can remove devices, those devices, even if removed, count
    toward your annual allotment of 100\. So be careful about adding devices.


    There are two ways to add devices: individual and bulk. Individual is exactly
    what you would expect, you enter the devices one by one via a web form. Bulk on
    the other hand, allows you to add multiple devices at once. You accomplish this
    via uploading a file. The file is in a simple tab delimited format.


    Let''s go over each process.


    #### Individual


    From the Devices page, navigate to the Manage tab. On the right side of the Manage
    page, click the button labelled Add Devices. The Manage pane should refresh to
    provide a form where you can add the device name and ID (see [Figure 7–19](#Chapter07.html#fig_7_19)).


    ![images](images/0719.jpg)


    **Figure 7–19.** *Add Device page*


    The Device Name can be a free-form string that you will use to identify the device.
    It could be your beta tester''s name or e-mail address. Or it could be some identifier
    you assign to your tester. The Device ID is the unique device identifier. You
    will need to collect this information from your beta testers. You can find the
    UDID by launching Xcode and opening the Organizer window. Choose the Devices icon
    at the top of the window. On the left side, select the relevant device. You should
    see the device information displayed. Next to the label Identifier should be the
    40-character UDID of your device (see [Figure 7–20](#Chapter07.html#fig_7_20)).
    Remember, I showed you how to access the UDID in iTunes earlier in the chapter
    (see [Figures 7–1](#Chapter07.html#fig_7_1) and [7](#Chapter07.html#fig_7_7)–[2](#Chapter07.html#fig_7_2)).


    ![images](images/0720.jpg)


    **Figure 7–20.** *Xcode Organizer window, Device details*


    It is possible to enter more than one device name and ID via the web form. Once
    you have filled in the name and ID, click the plus button to the right. An additional
    row should appear (see [Figure 7–21](#Chapter07.html#fig_7_21)), allowing you
    to enter another device name and ID.


    ![images](images/0721.jpg)


    **Figure 7–21.** *Entering another device via web form*


    When you have completed entering the device information, click the *Submit* button.


    #### Bulk


    From the Devices page, under the Manage tab, click the Upload Devices button.
    This will refresh the Manage pane to allow you to upload a file (see [Figure 7–22](#Chapter07.html#fig_7_22)).
    As we stated earlier, you can upload a tab delimited file.


    ![images](images/0722.jpg)


    **Figure 7–22.** *Upload Devices page*


    The tab-delimited file follows a simple format. Each line of the file should contain
    one device ID, followed by the device name, separated by a tab. The first line
    of the file will be considered a header row and be ignored. The file should end
    with the extension `.txt`. Following shows a sample device file:


    ```

    DEVICE UDID                                DEVICE NAME

    0aeb4240266f544ef8a4d0bb658a1fc6cf0a559a   iPhone 3GS

    1f01c47915477711d8bc700090272ff72528531e   iPhone 4

    3b02d9e6d59467382e8f9b9300a64ac3cd6c0e89   iPad 2

    ```


    Click the Choose File button, and select the `.txt` file containing the list of
    device names and IDs. Then click Submit to upload the file and add the devices.'
  raw: '##### Creating the iOS Distribution Certificate


    To create our iOS distribution certificate, we need to enter the iOS provisioning
    portal. We access the provisioning portal via the iOS Dev Center (see [Figure
    7–9](#Chapter07.html#fig_7_9)). You can only access the provisioning portal if
    you signed in as a register developer. In addition, you''ll need to sign up for
    the iOS Developer Program. The program currently cost $99 per year for individuals.
    In addition to the benefits of the Registered Developer Program, you receive access
    to pre-release software and tools, internal developer forums, and technical support
    from Apple. Additionally, you will be able to test your applications on physical
    iOS devices (rather than just the simulator). Most importantly, you can distribute
    your application, either ad hoc or via the App Store. If you''re interested, you
    can find out more about it at [`http://developer.apple.com/programs/ios/`.](http://developer.apple.com/programs/ios/)


    ![images](images/0709.jpg)


    **Figure 7–9.** *Signed in the iOS Dev Center as a registered developer*


    If you signed in properly, you should see iOS Provisioning Portal on the right
    site of the iOS Dev Center, under the title iOS Developer Program (see [Figure
    7–10](#Chapter07.html#fig_7_10)). Click the iOS Provisioning Portal link.


    ![images](images/0710.jpg)


    **Figure 7–10.** *iOS Developer Program links*


    Once you enter the iOS Provisioning Portal page (see [Figure 7–11](#Chapter07.html#fig_7_11)),
    you should see a menu of options on the left side (see [Figure 7–12](#Chapter07.html#fig_7_12)).
    The first option under Home is Certificates. Click it.


    ![images](images/0711.jpg)


    **Figure 7–11.** *iOS Provisioning Portal page*


    ![images](images/0712.jpg)


    **Figure 7–12.** *Provisioning Portal menu*


    Once the Certificates page, click the Distribution tab (make sure not to click
    the Distribution link shown in [Figure 7–12](#Chapter07.html#fig_7_12)!) at the
    top to show your distribution certificates. There may a certificate that Xcode
    would have created for you automatically, or there may be no certificates present
    (see [Figure 7–13](#Chapter07.html#fig_7_13)). Regardless, we''ll create a new
    one. Find the row of the table that ends with a button labelled Request Certificate.
    Click this button.


    ![images](images/0713.jpg)


    **Figure 7–13.** *Distribution tab of the Certificates page*


    The panel should change to expose a set of instructions. These are instructions
    to create a certificate request, which we just completed. Click the button labelled
    Choose File at the end of the instructions. In the file chooser, navigate to the
    location where you saved `CertificateSigningRequest.certSigningRequest`, and select
    that file. Confirm that the file name appears next to the Choose File button (see
    [Figure 7–14](#Chapter07.html#fig_7_14)), and click Submit.


    ![images](images/0714.jpg)


    **Figure 7–14.** *Submitting the Certificate Request*


    Once submitted, the Distribution Certificate pane should refresh, listing the
    certificate with a status of Pending Issuance (see [Figure 7–15](#Chapter07.html#fig_7_15)).
    Wait a few moments, and refresh the pane by clicking on the Distribution tab.
    The certificate status should update to Issued (see [Figure 7–16](#Chapter07.html#fig_7_16))
    and have an expiration date one year in the future. Click the Download button
    on the right of the certificate row. This should download a file named `distribution_identity.cer`.
    Also download the WWDR intermediate certificate. This file should be named `AppleWWDRCA.cer`.


    ![images](images/0715.jpg)


    **Figure 7–15.** *Distribution certificate pending issuance*


    ![images](images/0716.jpg)


    **Figure 7–16.** *Distribution certificate issued*


    Find the `AppleWWDRCA.cer` file in the Finder, and double-click it. This should
    launch Keychain Assistant, and install the Apple WWDR Intermediate certificate.
    You can confirm this is installed by selecting Certificates on the lower left
    pane of the Keychain Assistant window and searching for the name Apple Worldwide
    Developer Relations Certificate Authority (see [Figure 7–17](#Chapter07.html#fig_7_17)).


    ![images](images/0717.jpg)


    **Figure 7–17.** *Confirming Apple WWDR Intermediate Certificate installation
    (highlighted)*


    Repeat the installation process for `distribution_identity.cer`.


    ##### Uploading UDIDs


    Head back to the iOS Provisioning Portal, and click Devices on the left side menu.
    You should be on the Manage tab of the Devices page (see [Figure 7–18](#Chapter07.html#fig_7_18)).


    ![images](images/0718.jpg)


    **Figure 7–18.** *Devices page of the iOS Provisioning Portal page*


    You are allowed to add up to 100 devices per year for development and testing
    purposes. While you can remove devices, those devices, even if removed, count
    toward your annual allotment of 100\. So be careful about adding devices.


    There are two ways to add devices: individual and bulk. Individual is exactly
    what you would expect, you enter the devices one by one via a web form. Bulk on
    the other hand, allows you to add multiple devices at once. You accomplish this
    via uploading a file. The file is in a simple tab delimited format.


    Let''s go over each process.


    ###### Individual


    From the Devices page, navigate to the Manage tab. On the right side of the Manage
    page, click the button labelled Add Devices. The Manage pane should refresh to
    provide a form where you can add the device name and ID (see [Figure 7–19](#Chapter07.html#fig_7_19)).


    ![images](images/0719.jpg)


    **Figure 7–19.** *Add Device page*


    The Device Name can be a free-form string that you will use to identify the device.
    It could be your beta tester''s name or e-mail address. Or it could be some identifier
    you assign to your tester. The Device ID is the unique device identifier. You
    will need to collect this information from your beta testers. You can find the
    UDID by launching Xcode and opening the Organizer window. Choose the Devices icon
    at the top of the window. On the left side, select the relevant device. You should
    see the device information displayed. Next to the label Identifier should be the
