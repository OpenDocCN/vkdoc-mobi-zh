  raw: '#### Adding a New View Controller


    Now that our application has a modified model and we''re able to add some managed
    objects, let''s create a modal view controller to insert new objects that come
    from user input. Before we add the files, create a new group called `NewPersonViewController`
    under the Super Hello World group (by right-clicking Super Hello World and selecting
    `New Group`). Next, add a new file to this group by right-clicking the group and
    selecting `New File`. Select the `UIViewController` subclass, and click Next.
    Make it a subclass of `UITableViewController`, and check “With XIB for user interface.”
    Click Next, name the file `NewPersonViewController.m`, and click Save.


    Let''s add some custom cells. Open the `NewPersonViewController.xib` file, turn
    on Assistant editor mode, and make sure the header file is open to the right of
    the `.xib` file. We''re going to add some custom table cells to our XIB and plug
    them into our new view controller. The library of user interface (UI) elements
    to drag into the XIB is located at the bottom of the Utilities pane. Click “Show
    the Object library”, and drag in two `UITableViewCell` items (shown as Table View
    Cell in the list). Drag a `UITextField` (Text Field in the list) inside each of
    those cells, and modify the border style to be invisible (by clicking the “Show
    the Attributes inspector” button in the Utilities pane and selecting the first
    button in the Border Style tab bar). Set the placeholder text to be **First Name**
    and **Last Name** respectively. Close the Utilities pane, and control-drag the
    First Name cell (`UITableViewCell`, not `UITextField`) to the header file (open
    in the right editor pane), putting the cursor where you would place properties—under
    the closing curly bracket of the interface declaration. Name the property `firstName`.
    Do the same with the last name cell, naming it `lastName`.


    You have created the outlet properties for the cells; now, we''re going to create
    outlet properties for the text fields. Control-drag the text fields themselves
    and name them: `firstNameInput` and `lastNameInput`. [Figure 2–13](#Chapter02.html#fig_2_13)
    shows the final product.


    So far, we''ve created a new view controller, modified the XIB to include some
    new interface elements, and tied the XIB to the class. Now, let''s fill in the
    details. [Listing 2–2](#Chapter02.html#list_2_2) shows the updates we''re making
    to the header for the new person view controller.


    **Listing 2–2.** *The modifications for NewPersonViewController.h*


    `#import <UIKit/UIKit.h>`


    `#define kSectionCount    1`

    `#define kRowCount          2`


    `@class Person;`


    `@class NewPersonViewController;`


    `@protocol NewPersonViewControllerDelegate <NSObject>`


    `@required`

    `-(void) viewController:(NewPersonViewController *)vc didSaveWithPerson:(Person
    *)p;`

    `-(void) viewControllerDidCancel:(NewPersonViewController *)vc;`


    `@end`


    `@interface NewPersonViewController : UITableViewController {`

    `    id<NewPersonViewControllerDelegate> delegate;`

    `    UITableViewCell *firstNameCell;`

    `    UITableViewCell *lastNameCell;`

    `    UITextField *firstNameInput;`

    `    UITextField *lastNameInput;`


