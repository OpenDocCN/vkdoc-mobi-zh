    #### 应用委托与启动界面


    既然应用的入口点已经完成，我们需要创建 `Super_CheckoutAppDelegate` 的子类，并将这个新类设置为 iPad 版本 `MainWindow`
    界面的应用委托。为此，新建一个 Objective-C 类，命名为 `Super_CheckoutAppDelegate_iPad`。将头文件更新为列表 10–1
    所示，这样我们的 `Super_CheckoutAppDelegate` 子类就为自定义 iPad 代码做好了准备。


    **列表 10–1.** *为自定义 iPad 代码做好准备的 Super_CheckoutAppDelegate 子类*


    ```

    #import <Foundation/Foundation.h>

    #import "Super_CheckoutAppDelegate.h"


    @interface Super_CheckoutAppDelegate_iPad : Super_CheckoutAppDelegate {


        UISplitViewController *splitViewController;

    }

    @property (nonatomic, retain) IBOutlet UISplitViewController *splitViewController;


    @end

    ```


    接下来，将实现文件更新为列表 10–2 所示。


    **列表 10–2.** *我们针对 iPad 的子类的实现*


    ```

    #import "Super_CheckoutAppDelegate_iPad.h"


    @implementation Super_CheckoutAppDelegate_iPad

    @synthesize splitViewController;


    - (void)dealloc {

        [splitViewController release];

        [super dealloc];

    }


    - (BOOL)application:(UIApplication *)application

        didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {


        self.window.rootViewController = self.splitViewController;

        [self.window makeKeyAndVisible];


        return YES;

    }

    @end

    ```


    这里我们是在设置 iPad 版本应用的实际启动点。下一步是更新 iPad 的界面文件。打开 iPad 组中的 `MainWindow-iPad.xib`。从对象库中，将“分视图控制器”拖拽到编辑器的对象列表，并将“主导航控制器”从对象列表中移除（参见图
    10–8）。


    ![images](img/1008.jpg)


    **图 10–8.** *MainWindow-iPad 界面中的新对象列表*


    **注意：** 如果文档大纲处于折叠状态（只显示图标而不显示文字），请点击文档大纲底部的箭头按钮来展开（或折叠）它。


    下一步是配置分视图控制器，使其包含合适的视图控制器。为此，按住 Option 键点击展开三角形，展开分视图控制器的所有子项。我们希望最终的配置如图 10–9
    所示。


    ![images](img/1009.jpg)


    **图 10–9.** *MainWindow-iPad 界面中分视图控制器的最终配置。*


    你的视图可能与图 10–9 略有不同。导航控制器的子视图控制器需要设置为 Super Checkout 视图控制器。为此，选择导航控制器的子控制器（表视图控制器），然后点击右侧面板中的“显示身份检查器”标签，打开身份检查器。接着，将
    Class 改为 `Super_CheckoutViewController`（参见图 10–10）。


    ![images](img/1010.jpg)


    **图 10–10.** *将导航控制器的根视图控制器更新为来自 iPhone/iPod touch 版 Super Checkout 的库存视图控制器*


    对底部的视图控制器执行相同操作，但要将它设为 `ProductDetailsViewController` 的实例。


    完成应用委托和主界面的最后一步，是将分视图控制器连接到应用委托。首先，选择 `Super_Checkout App Delegate`，然后在实用工具区域的身份检查器中，确保类类型为
    `Super_CheckoutAppDelegate_iPad`。接着，按住 Control 键从 `Super_Checkout App Delegate`
    代理拖拽到分视图控制器，并选择 `splitViewController`（参见图 10–11）。


    ![images](img/1011.jpg)


    **图 10–11.** *连接应用委托上的 `splitViewController` 属性*


    创建并配置应用委托以及连接界面文件现已完成。接下来，我们将着手更新部分用户界面，以支持 iPad 并保持向后兼容性。


    #### 更新库存和产品详情


    既然 iPad 应用的入口点已经设置好，我们现在可以修改正面视图控制器以支持新的设备类型。检测应用程序运行在哪种设备上的主要方法，是比较 `UI_USER_INTERFACE_IDIOM()`
    的结果，看它是否等于 `UIUserInterfaceIdiomPhone` 或 `UIUserInterfaceIdiomPad`。

    '
- fmt: "### Revamping the Inventory list\n\nOur first stop for making our edits is\
    \ the `Super_CheckoutViewController` class. This class is responsible for showing\
    \ the inventory list and leading the user to the product details view. Currently,\
    \ this class pushes the `ProductDetailsViewController` onto the navigation controller's\
    \ stack. We need to update it to support the split view controller we added to\
    \ the main window nib.\n\nIn order to do this, open `Super_CheckoutViewController.h`,\
    \ and modify it to look like [Listing 10–3](#Chapter10.html#list_10_3).\n\n**Listing\
    \ 10–3.** *Updating the Main View Controller to Support Both Interface Idioms*\n\
    \n```objc\n#import <UIKit/UIKit.h>\n#import \"SuperCheckoutAPIEngineDelegate.h\"\
    \n@class ProductDetailsViewController;\n@class SuperCheckoutAPIEngine;\n@class\
    \ ProductCell;\n\n@interface Super_CheckoutViewController : UITableViewController\n\
    \                                                      <SuperCheckoutAPIEngineDelegate,\
    \ UIScrollViewDelegate> {\n    NSArray *inventory;\n    SuperCheckoutAPIEngine\
    \ *apiEngine;\n\n    UINib *cellNib;\n    ProductCell *productCell;\n\n    NSMutableDictionary\
    \ *imageIndexes;\n    NSMutableDictionary *imageDownloadsInProgress;\n    ProductDetailsViewController\
    \ *detailsViewController;\n}\n\n@property (nonatomic, retain) IBOutlet ProductCell\
    \ *productCell;\n@property (nonatomic, retain) IBOutlet ProductDetailsViewController\n\
    *detailsViewController;\n\n@end\n```\n\nThe real difference here is that we're\
    \ adding in the reference to the `ProductDetailsViewController`. We'll still need\
    \ to wire it up, but we're not ready for that yet. Open `Super_CheckoutViewController.m`\
    \ and hold on tight; we're in for some updates.\n\nFirst, synthesize the `detailsViewController`\
    \ property at the top of the implementation.\n\nNext, in the `dealloc` method,\
    \ release the instance variable by adding `[detailsViewController release];` before\
    \ the call to `[super dealloc]`.\n\nFor the next update, in `tableView:cellForRowAtIndexPath:`,\
    \ remove the following line:\n\n```objc\n[cell setAccessoryType:UITableViewCellAccessoryDisclosureIndicator];\n\
    ```\n\nand replace it with:\n\n```objc\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPhone)\
    \ {\n    [cell setAccessoryType:UITableViewCellAccessoryDisclosureIndicator];\n\
    } else {\n    [cell setAccessoryType:UITableViewCellAccessoryNone];\n}\n```\n\n\
    What we're doing here is identifying the current idiom by calling `UI_USER_INTERFACE_IDIOM()`,\
    \ and if we're on the iPhone/iPod Touch, we're setting the disclosure indicator\
    \ as the accessory view. For iPads, we don't need an accessory view because the\
    \ product details screen is already present.\n\nThe next update is to replace\
    \ the entire method for selecting a product. Find the `tableView:didSelectRowAtIndexPath:`\
    \ method and replace the entire implementation with this:\n\n```objc\n- (void)tableView:(UITableView\
    \ *)tableView\n                           didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    ProductDetailsViewController *newVC = [[ProductDetailsViewController\
    \ alloc] initWithNibName:@\"ProductDetailsViewController\" bundle:nil];\n\n  \
    \  [newVC setSelectedProduct:[inventory objectAtIndex:[indexPath row]]];\n\n \
    \   [self.navigationController pushViewController:newVC animated:YES];\n    [newVC\
    \ release];\n        if(detailsViewController == nil) {\n                ProductDetailsViewController\
    \ *newVC =\n                              [[ProductDetailsViewController alloc]\
    \           \n                                  initWithNibName:@\"ProductDetailsViewController\"\
    \n                                                       bundle:nil];\n\n    \
    \            [newVC setSelectedProduct:[inventory objectAtIndex:[indexPath row]]];\n\
    \n                [self.navigationController pushViewController:newVC animated:YES];\n\
    \                [newVC release];\n        } else {\n                [detailsViewController\
    \ setSelectedProduct:\n                            [inventory objectAtIndex:[indexPath\
    \ row]]];\n        }\n}\n```\n\nIn this modification, we're checking to see if\
    \ the product details view controller is nil. Since we are using the split view\
    \ controller on the iPad, the details view controller will be set, and we can\
    \ check to see if it is nil or not to detect which device the application is running\
    \ on.\n\nThe next method to search for is `viewDidLoad:`. In this method, add\
    \ the following block below `[self setTitle:@\"Inventory\"]`, which sets the view\
    \ controller's title:\n\n```objc\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad)\
    \ {\n    [[self navigationItem] setRightBarButtonItem:nil];\n}\n```\n\nHere, we're\
    \ removing the right button from the navigation bar because we're moving the cart\
    \ button to the product details screen's toolbar. That update is coming; first\
    \ we need to finish up the inventory screen updates.\n\nWe're almost done in this\
    \ file, so head on to the `viewDidUnload` method, and add the following line above\
    \ the call to `[super viewDidUnload]`:\n\n```objc\n[self setDetailsViewController:nil];\n\
    ```\n\nThe final update to make is in `shouldAutorotateToInterfaceOrientation:`.\
    \ This is the method that tells the application if it should autorotate to adapt\
    \ to the device's orientation. For the iPad, we want to support both orientations.\
    \ For the iPhone/iPod Touch, we only want to support portrait. Here is the update\
    \ to the method to make:\n\n```objc\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad)\
    \ {\n    return YES;\n}\n\nreturn (interfaceOrientation == UIInterfaceOrientationPortrait);\n\
    ```\n\nFor this method, we're checking the device we're on and returning `YES`\
    \ for the iPad. The following line is the same as it was in the iPhone/iPod Touch\
    \ version.\n\nWe're done with the inventory list now. The final thing to do is\
    \ open `MainWindow-iPad.xib` and wire up the `detailsViewControllerIBOutlet` on\
    \ the Super Checkout view controller to the Product Details view controller (see\
    \ [Figure 10–12](#Chapter10.html#fig_10_12)).\n\n![images](images/1012.jpg)\n\n\
    **Figure 10–12.** *The final set up for the Inventory screen for the split view\
    \ controller*\n\nNow that the inventory screen is complete, we have quite a bit\
    \ of work left to update the product details screen."
