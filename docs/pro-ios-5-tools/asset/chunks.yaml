  trans: "\n# 图片懒加载\n\n以下更新将在滚动停止时触发相应的图片请求。为此，我们需要创建一个实际的模型对象，解析商品列表并保留已下载的图片。新建一个\
    \ `NSObject` 子类，命名为 `Product`。\n\n打开 `Product.h`，为其添加代码清单 5–5 所示的接口。\n\n**代码清单\
    \ 5–5.** *Product 的接口*\n\n```objc\n#import <Foundation/Foundation.h>\n@interface\
    \ Product : NSObject {\n    NSString *productId;\n    NSString *name;\n    NSNumber\
    \ *price;\n    NSString *description;\n    NSString *image;\n    NSString *thumb;\n\
    \n    UIImage *productImage;\n}\n\n@property (nonatomic, retain) NSString *productId;\n\
    @property (nonatomic, retain) NSString *name;\n@property (nonatomic, retain) NSNumber\
    \ *price;\n@property (nonatomic, retain) NSString *description;\n@property (nonatomic,\
    \ retain) NSString *image;\n@property (nonatomic, retain) NSString *thumb;\n@property\
    \ (nonatomic, retain) UIImage *productImage;\n\n- (id) initWithDictionary:(NSDictionary\
    \ *)data;\n\n@end\n```\n\n实现文件如代码清单 5–6 所示。\n\n**代码清单 5–6.** *Product 的实现*\n\n\
    ```objc\n#import \"Product.h\"\n\n@implementation Product\n@synthesize productId;\n\
    @synthesize name;\n@synthesize price;\n@synthesize description;\n@synthesize image;\n\
    @synthesize thumb;\n@synthesize productImage;\n\n- (void)dealloc {\n    [productId\
    \ release], productId = nil;\n    [name release], name = nil;\n    [price release],\
    \ price = nil;\n    [description release], description = nil;\n    [image release],\
    \ image = nil;\n    [thumb release], thumb = nil;\n    [productImage release],\
    \ productImage = nil;\n\n    [super dealloc];\n}\n\n- (id) initWithDictionary:(NSDictionary\
    \ *)data {\n    self = [super init];\n    if(self) {\n        productId = [[data\
    \ objectForKey:@\"id\"] copy];\n        name = [[data objectForKey:@\"name\"]\
    \ copy];\n        price = [[data objectForKey:@\"price\"] copy];\n        description\
    \ = [[data objectForKey:@\"description\"] copy];\n        image = [[data objectForKey:@\"\
    image\"] copy];\n        thumb = [[data objectForKey:@\"thumb\"] copy];\n    }\n\
    \n    return self;\n}\n\n@end\n```\n\n现在我们已经定义了 `Product` 模型，需要更新多个文件，从解析代码到数据展示都要修改。\n\
    \n打开 `SuperCheckoutAPIEngine.m`，找到 `parsingSucceededForRequest:ofResponseType:parsedObjects:`\
    \ 选择器，将其更新为代码清单 5–7 所示。别忘了在文件顶部导入 `Product` 头文件！\n\n**代码清单 5–7.** *是时候加速了！*\n\n\
    ```objc\n-(void)parsingSucceededForRequest:(NSString *)identifier\n    ofResponseType:(SuperCheckoutResponseType)responseType\n\
    \                    parsedObjects:(NSDictionary *)parsedObject {\n    switch\
    \ (responseType) {\n        case SuperCheckoutProductList:\n            if([self\n\
    _isValidDelegateForSelector:@selector(productListReceived:forRequest:)]) {\n \
    \               NSArray *result = [parsedObject objectForKey:@\"result\"];\n \
    \               NSMutableArray *newResult = [NSMutableArray arrayWithCapacity:[result\n\
    count]];\n\n                for(NSDictionary *obj in result) {\n             \
    \       Product *prod = [[Product alloc] initWithDictionary:obj];\n          \
    \          [newResult addObject:prod];\n\n                    [prod release];\n\
    \                }\n\n                [delegate productListReceived:[NSArray arrayWithArray:newResult]\n\
    forRequest:identifier];\n            }\n            break;\n        case SuperCheckoutCartContents:\n\
    \            if([self\n_isValidDelegateForSelector:@selector(cartContentsReceived:forRequest:)])\
    \ {\n                [delegate cartContentsReceived:[parsedObject objectForKey:@\"\
    result\"]\nforRequest:identifier];\n            }\n\n        default:\n      \
    \      break;\n    }\n}\n```\n"
- fmt: "Next, update `ProductCell.h`, and import `Product.h` at the top of the file.\
    \ Replace\n\n`@property (nonatomic, retain) NSDictionary *productInformation;`\n\
    \nwith the following line\n\n`@property (nonatomic, retain) Product *productInformation;`\n\
    \nIn `ProductCell.m`, replace the `setProductInformation:` selector with\n\n```\n\
    -(void) setProductInformation:(Product *)newProductInformation {\n    Product\
    \ *oldInfo = productInformation;\n    [oldInfo removeObserver:self forKeyPath:@\"\
    productImage\"];\n\n    productInformation = [newProductInformation retain];\n\
    \    [productInformation addObserver:self forKeyPath:@\"productImage\"\noptions:NSKeyValueObservingOptionNew\
    \ context:NULL];\n\n    [productNameLabel setText:[productInformation name]];\n\
    \n    [productPriceLabel setText:[NSString stringWithFormat:@\"$%1.2f\",\n[[productInformation\
    \ price] floatValue]]];\n\n    [oldInfo release];\n}\n```\n\nAlso, add the following\
    \ key value observing method:\n\n```\n- (void)observeValueForKeyPath:(NSString\
    \ *)keyPath\n                                                ofObject:(id)object\n\
    \                                                   change:(NSDictionary *)change\n\
    \                                                  context:(void *)context {\n\
    \    if ([keyPath isEqual:@\"productImage\"]) {\n        [productImage setImage:[change\
    \ objectForKey:NSKeyValueChangeNewKey]];\n    }\n}\n```\n\nThe next update is\
    \ in `Super_CheckoutViewController.h`. For this one, make the file look like this:\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"SuperCheckoutAPIEngineDelegate.h\"\n\
    @class SuperCheckoutAPIEngine;\n@class ProductCell;\n\n@interface Super_CheckoutViewController\
    \ :\nUITableViewController<SuperCheckoutAPIEngineDelegate, UIScrollViewDelegate>\
    \ {\n    NSArray *inventory;\n    SuperCheckoutAPIEngine *apiEngine;\n\n    UINib\
    \ *cellNib;\n    ProductCell *productCell;\n\n    NSMutableDictionary *imageIndexes;\n\
    \    NSMutableDictionary *imageDownloadsInProgress;\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet ProductCell *productCell;\n\n@end\n```\n\nFor `Super_CheckoutViewController.m`,\
    \ update the file to look like this:\n\n```\n#import \"Super_CheckoutViewController.h\"\
    \n#import \"SuperCheckoutAPIEngine.h\"\n#import \"ProductCell.h\"\n#import \"\
    ProductDetailsViewController.h\"\n#import \"Product.h\"\n@interface Super_CheckoutViewController(Private)\n\
    - (void)loadImagesForOnscreenRows;\n@end\n\n@implementation Super_CheckoutViewController\n\
    @synthesize productCell;\n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle\
    \ *)nibBundleOrNil{\n    self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\n\
    \    if (self) {\n        // Custom initialization\n    }\n    return self;\n\
    }\n\n//We are loading from a nib, so initWithCoder: is used\n- (id) initWithCoder:(NSCoder\
    \ *)aDecoder {\n    self = [super initWithCoder:aDecoder];\n\n    if(self) {\n\
    \        imageIndexes = [[NSMutableDictionary alloc] init];\n    }\n    return\
    \ self;\n}\n\n- (void)dealloc{\n    [productCell release];\n    [imageIndexes\
    \ release];\n    [super dealloc];\n}\n\n- (void)didReceiveMemoryWarning{\n   \
    \ // Releases the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
    }\n\n#pragma mark - UITableViewDataSource Methods\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return [inventory count];\n\
    }\n\n// Customize the appearance of table view cells.\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    ProductCell\
    \ *cell = (ProductCell *)[tableView dequeueReusableCellWithIdentifier:\n[ProductCell\
    \ reuseIdentifier]];\n\n    if(cell == nil) {\n        [cellNib instantiateWithOwner:self\
    \ options:nil];\n        cell = productCell;\n    }\n    Product *item = (Product\
    \ *)[inventory objectAtIndex:[indexPath row]];\n    [cell setProductInformation:item];\n\
    \    [self setProductCell:nil];\n\n    //Fetch image for the cell\n    if([item\
    \ productImage] == nil) {\n        if (self.tableView.dragging == NO && self.tableView.decelerating\
    \ == NO) {\n            NSString *requestId = [apiEngine getImageForProduct:[item\
    \ thumb]];\n\n            [imageIndexes setObject:[NSNumber numberWithInt:[indexPath\
    \ row]]\nforKey:requestId];\n        }\n    }\n\n    return cell;\n}\n\n#pragma\
    \ mark - UITableViewDelegate\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\n\
    *)indexPath {\n    ProductDetailsViewController *newVC =\n        [[ProductDetailsViewController\
    \ alloc]\ninitWithNibName:@\"ProductDetailsViewController\"\nbundle:nil];\n  \
    \  [newVC setSelectedProduct:[inventory objectAtIndex:[indexPath row]]];\n\n \
    \   [self.navigationController pushViewController:newVC animated:YES];\n    [newVC\
    \ release];\n}\n\n- (CGFloat)tableView:(UITableView *)tableView\n        heightForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath{\n    return 76.0;\n}\n\n#pragma mark - SuperCheckoutAPIEngineDelegate\
    \ Methods\n- (void)requestSucceeded:(NSString *)connectionIdentifier {\n}\n\n\
    - (void)requestFailed:(NSString *)connectionIdentifier withError:(NSError *)error\
    \ {\n}\n\n-(void) productListReceived:(NSArray *)products\n                  \
    \               forRequest:(NSString *)connectionIdentifier {\n    NSLog(@\"Products\
    \ list: %@\", [products description]);\n    inventory = [products retain];\n \
    \   [self.tableView reloadData];\n}\n\n-(void) imageReceived:(UIImage *)image\
    \ forRequest:(NSString *)connectionIdentifier {\n    Product *prod = (Product\
    \ *)[inventory objectAtIndex:[[imageIndexes\nobjectForKey:connectionIdentifier]\
    \ intValue]];\n\n    CGFloat target = 64;\n\n    CGImageRef oldImage = [image\
    \ CGImage];\n    CGFloat imageWidth = (CGFloat)CGImageGetWidth(oldImage);\n  \
    \  CGFloat imageHeight = (CGFloat)CGImageGetHeight(oldImage);\n\n    CGFloat widthFactor\
    \ = target / imageWidth;\n    CGFloat heightFactor = target / imageHeight;\n \
    \   CGFloat factor = 1.0;\n\n    if (widthFactor > 1.0 && heightFactor > 1.0)\
    \ {\n        factor = 1.0;\n    } else {\n        if (widthFactor >= heightFactor)\
    \ {\n            factor = widthFactor;\n        } else {\n            factor =\
