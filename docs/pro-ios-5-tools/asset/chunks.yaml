    # 使用静态库


    将部分 Super Checkout 代码拆分到 `SBJSON` 和 `ASIHTTPRequest` 这两个静态库中的目的之一，是为了促进代码复用。而开始复用的最佳场所莫过于
    Super Checkout 项目本身。在开始之前，我们先讨论一下如何在 Super Checkout 中使用这些静态库。


    在 Super Checkout 项目中使用静态库项目有两种不同的方法：子项目和工作区。


    子项目是嵌入到另一个项目中的项目。在 Xcode 中，这很容易实现。从逻辑上讲，这种方法很有道理：Super Checkout 项目将依赖于 `SBJSON`
    和 `ASIHTTPRequest` 项目。将这两个项目作为子项目嵌入 Super Checkout 中，在结构上会带来一些视觉上的清晰度。然而，采用这种方法时，需要解决一些配置问题。在讨论子项目方法时，我们会解决这些问题。


    随着 Xcode 4 的发布，Apple 引入了工作区的概念。工作区是多个项目的逻辑容器。所有项目共享同一个构建目录。通过使用工作区，所有项目在构建时都可以使用彼此的构建产品。


    子项目和工作区这两种方法各有优缺点。你应该选择最适合自己风格的方法。我会将两者都讨论一遍，以求全面。在开始之前，请备份所有三个项目（Super Checkout、SBJSON
    和 ASIHTTPRequest），这样如果你愿意，可以尝试这两种方法。


    ## 将静态库作为子项目使用


    在 Xcode 中打开 Super Checkout 项目。选择 File ![image](img/U001.jpg) Add Files to “Super
    Checkout”。当文件对话框出现时，导航到 `SBJSON` 文件夹，并选择文件 `SBJSON.xcodeproj`（参见 图 11–12）。确保“Copy
    items into destination group''s folder (if needed)”未被勾选。仅将其添加到 Super Checkout
    target。点击 Add。


    ![images](img/1112.jpg)


    **图 11–12.** *将 SBJSON 项目添加到 Super Checkout*


    `SBJSON` 项目应该会出现在导航窗格中的 Super Checkout 项目内部（参见 图 11–13）。


    ![images](img/1113.jpg)


    **图 11–13.** *将 SBJSON 添加到 Super Checkout 之后*


    当我们构建 Super Checkout 时，我们希望 `SBJSON` 项目首先被构建。我们将通过在 Super Checkout 的 Build Phases
    中添加一个 Target Dependency 来实现这一点。


    在导航窗格中，点击 Super Checkout 项目以打开 Project Editor 视图。在 Targets 下，选择 Super Checkout，然后选择
    Build Phases 标签。第一个构建阶段应该是“Target Dependencies (0 items)”。点击右侧的展开三角形以展开它（参见 图
    11–14）。


    ![images](img/1114.jpg)


    **图 11–14.** *展开 Target Dependencies 后的 Super Checkout*


    点击 Target Dependencies 构建阶段底部的加号。应该会出现一个目标选择窗格（参见 图 11–15）。在 `SBJSON` 项目下选择 `SBJSON`
    target，然后点击 Add。`SBJSON` target 应该会出现在依赖项列表中（参见 图 11–16）。


