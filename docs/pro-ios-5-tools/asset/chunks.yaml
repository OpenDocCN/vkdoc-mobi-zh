  trans: "\n##### 小插曲——关于目标（Targets）的一切\n\n当我们在构建设置里摸索时，先简要聊聊项目设置、目标和方案之间的区别。在图 5-3\
    \ 所示的构建设置中，你选择了“合并”选项。这将定义项目的构建配置。你可以在目标中覆盖这些设置。目标是构建的配置。它继承了项目级构建设置，你可以通过点击“构建设置”选项卡中的“层级”视图来查看。现在点击“性能调优”目标，然后点击“构建设置”选项卡。接着点击“层级”，并确保选中“全部”。在图\
    \ 5-4 中，你将看到生成的界面以及每个构建设置的继承关系。\n\n![images](img/0504.jpg)\n\n**图 5-4.** *目标直至最终解析（最终）设置的继承链*\n\
    \n你现在看到的是每个设置最终如何被 Xcode 解析。最右边是默认设置。当你向左扫描时，你会看到项目级设置，然后是带有最终解析值的目标设置。在这个视图中，项目和目标设置是可编辑的。\n\
    \n如前所述，我们简要地谈谈方案。我们之前打开过方案编辑器，即将再次打开它。我们还没有定义的是方案本身。方案是一个或多个目标如何组合在一起生成最终构建产物的方式。在这个层面上，关于方案需要了解的大致就是这些。\n\
    \n##### 回到性能分析\n\n继续下一步。现在，分析配置已经准备就绪，我们需要告诉分析方案使用这个配置。像我们在第 4 章中那样打开方案编辑器（通过**产品**\
    \ ![Images](img/U001.jpg) **编辑方案**）。点击“分析”操作，然后在“信息”选项卡中修改“构建配置”选项，使其使用我们刚刚创建的新配置（参见图\
    \ 5-5）。点击“确定”，我们就准备好开始了。\n\n**注意：** 在第 4 章中，我们通过 Instruments 运行了应用程序，但没有经历创建新构建配置的步骤。我们这样做是因为我们不是在设备上运行应用程序。所有测试都是通过模拟器进行的，所以不必担心代码签名问题。我们将要在设备上运行所有测试以获取真实的性能数据，因此需要担心在准备发布应用（ad\
    \ hoc 或上架 App Store）时会出现代码签名问题。这将会减少你遇到的麻烦。\n\n![images](img/0505.jpg)\n\n**图\
    \ 5-5.** *修改通过性能分析器运行应用程序的构建配置*\n\n现在配置问题已经解决，让我们实现一些代码来展示阻塞主线程的例子。打开 `MasterViewController.m`\
    \ 文件（由于 Xcode 的自动前缀功能，前缀可能有所不同），并将其修改为代码清单 5-2 所示。\n\n**代码清单 5-2.** *更新后的根视图控制器（用你的\
    \ MasterViewController 替换 RootViewController）*\n\n```\n#import \"RootViewController.h\"\
    \n\n@interface RootViewController()\n-(NSInteger) fibonacci:(NSInteger) term;\n\
    @end\n\n@implementation RootViewController\n\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n}\n\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    }\n\n- (void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear:animated];\n\
    }\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    }\n\n- (void)viewDidDisappear:(BOOL)animated\n{\n    [super viewDidDisappear:animated];\n\
    }\n\n// 自定义表视图中的分区数量。\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
    {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return 35;\n}\n\n// 自定义表视图单元格的外观。\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n               cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
    \ == nil) {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    reuseIdentifier:CellIdentifier] autorelease];\n    }\n\n    [[cell textLabel]\
    \ setText:[NSString stringWithFormat:@\"%i\", [self\nfibonacci:[indexPath row]]]];\n\
    \n    // 配置单元格。\n    return cell;\n}\n\n- (void)tableView:(UITableView *)tableView\
    \ didSelectRowAtIndexPath:(NSIndexPath\n*)indexPath\n{\n}\n\n- (void)didReceiveMemoryWarning\n\
    {\n    // 如果视图没有父视图，则释放它。\n    [super didReceiveMemoryWarning];\n\n    // 放弃对任何未使用缓存数据、图像等的所有权。\n\
    }\n\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n\n    // 放弃对任何可在 viewDidLoad\
    \ 或按需重新创建的内容的所有权。\n    // 例如：self.myOutlet = nil;\n}\n\n- (void)dealloc\n{\n \
    \   [super dealloc];\n}\n\n#pragma mark - 私有方法\n-(NSInteger) fibonacci:(NSInteger)\
    \ term {\n    if(term == 0) {\n        return 0;\n    } else if(term == 1) {\n\
    \        return 1;\n    } else {\n        return [self fibonacci:term - 1] + [self\
    \ fibonacci:term - 2];\n    }\n}\n\n@end\n```\n"
- fmt: "Before we run the app, let’s take a brief look at what is going on. In short,\
    \ we’re displaying the first 35 terms of the Fibonacci sequence. I chose the Fibonacci\
    \ sequence mainly because the first terms can be calculated relatively quickly.\
    \ As the terms get higher, the recursive nature of the algorithm makes the table\
    \ a bit sluggish. If your device isn’t selected as the deployment target, choose\
    \ it in the scheme selector. Go ahead and run the app on your device, and check\
    \ out the performance toward the bottom of the table view.\n\nPerformance is pretty\
    \ bad toward the bottom, right? We know what the problem is, so let’s consider\
    \ how to use Instruments to diagnose the issue. With the device selected, run\
    \ the application, and attach Instruments like we did in [Chapter 4](#Chapter04.html#ch4)\
    \ by going to **Product** ![Images](images/U001.jpg) **Profile** or pressing ![Images](images/U002.jpg)I.\
    \ Another way to run the application is by clicking and holding the run button\
    \ at the top of the window and selecting Profile, as shown in [Figure 5–6](#Chapter05.html#fig_5_6).\n\
    \n![images](images/0506.jpg)\n\n**Figure 5–6.** *The actions available for the\
    \ active scheme.*\n\nThis will launch Instruments before the application is launched,\
    \ and you will see the welcome screen. Select the Time Profiler template, and\
    \ click Profile. After the application launches on your device, scroll down and\
    \ watch the Instruments window display a nice chart showing what is going on.\
    \ Check out [Figure 5–7](#Chapter05.html#fig_5_7) to see the chart that was generated\
    \ for me.\n\n![images](images/0507.jpg)\n\n**Figure 5–7.** *The Time Profiler\
    \ showing the amount of time in each method.*\n\nNow that we have a pretty chart,\
    \ what are we looking at? The Time Profiler Instrument stops your application\
    \ on an interval to record stack trace information for each thread. This collected\
    \ information gives you insight into what your application is spending most of\
    \ its time doing, so you can determine bottlenecks in performance. Knowing that,\
    \ let’s take another look at the information presented in [Figure 5–7](#Chapter05.html#fig_5_7).\
    \ The table shows two main columns of information (note that right-clicking the\
    \ headers will allow you to turn on other columns). The left-most column shows\
    \ the running time of the methods on the right-most column. Looking at the second\
    \ item from the top, we can see that we are spending quite a bit of time in the\
    \ `fibonacci:` method.\n\nWe thought this would happen, and the data we collected\
    \ confirms that hypothesis. If the data didn’t suggest that, we would be able\
    \ to interpret the data to figure out what is going on.\n\nSo why is the `fibonacci:`\
    \ method taking so much time? Option-click the disclosure indicator to the left\
    \ of `[RootViewController fibonacci:]`, and check out how deeply the recursion\
    \ goes. Pretty surprising, isn’t it? This gives us insight as to how bad this\
    \ algorithm performs in this scenario. So how do we fix it?\n\n**TIP:** Option-clicking\
    \ a disclosure triangle will disclose all children of the triangle. This is an\
    \ operating-system-wide feature.\n\nThere are a number of ways to approach this\
    \ kind of problem. The problem could be purely algorithmic, and a tweak to improve\
    \ running time or space could solve the issue. It could also be an approach issue.\
    \ If the algorithm can’t be improved and the running time really is quite bad,\
    \ break the long running code off of the main thread (or pass it off to Grand\
    \ Central Dispatch), and display a loading indicator. Your users will thank you.\n\
    \nThis isn’t a book on algorithms and computer science, so we’re going to skip\
    \ all of the theoretical stuff and go straight to the answer with a small explanation\
    \ as to why it works. First, return to Xcode, and update the `fibonacci:` method\
    \ to look like [Listing 5–3](#Chapter05.html#list_5_3).\n\n**Listing 5–3.** *An\
    \ Iterative Fibonacci Implementation Doesn’t Create the Stack Issues You’ll See\
    \ with the Recursive Implementation*\n\n```objc\n#pragma mark - Private\n-(NSInteger)\
    \ fibonacci:(NSInteger) term {\n    NSInteger first = 0;\n    NSInteger second\
    \ = 1;\n\n    if(term == 0) {\n        return first;\n    } else if(term == 1)\
    \ {\n        return second;\n    } else {\n        NSInteger actualTerm = 0;\n\
    \        for(int t = 1; t < term; t++) {\n            actualTerm = first + second;\n\
    \n            first = second;\n            second = actualTerm;\n        }\n\n\
    \        return actualTerm;\n    }\n}\n```\n\nWhat we’ve done here is transform\
    \ the recursive algorithm to an iterative algorithm. This was a purely algorithmic\
    \ approach to solving this problem. Now that we have a potential solution to the\
    \ problem, profile the application again through the Time Profiler. If you still\
    \ have the old Instruments session open and if the Time Profiler icon is toggled,\
    \ open in the Instruments panel to see the old run below the current run. That\
    \ way, you can perform the same test and see what the final results are. Check\
    \ out [Figure 5–8](#Chapter05.html#fig_5_8) to see the second run.\n\n![images](images/0508.jpg)\n\
    \n**Figure 5–8.** *This run looks much better.*\n\nLooking at [Figure 5–8](#Chapter05.html#fig_5_8),\
    \ we can see clearly that the `fibonacci:` method isn’t blocking the main thread\
    \ at all. This verifies our solution, and now, we can move on to other issues\
    \ in our code."
  raw: 'Before we run the app, let''s take a brief look at what is going on. In short,
    we''re displaying the first 35 terms of the Fibonacci sequence. I chose the Fibonacci
    sequence mainly because the first terms can be calculated relatively quickly.
    As the terms get higher, the recursive nature of the algorithm makes the table
    a bit sluggish. If your device isn''t selected as the deployment target, choose
    it in the scheme selector. Go ahead and run the app on your device, and check
    out the performance toward the bottom of the table view.


    Performance is pretty bad toward the bottom, right? We know what the problem is,
    so let''s consider how to use Instruments to diagnose the issue. With the device
    selected, run the application, and attach Instruments like we did in [Chapter
    4](#Chapter04.html#ch4) by going to **Product** ![Images](images/U001.jpg) **Profile**
    or pressing ![Images](images/U002.jpg)I. Another way to run the application is
    by clicking and holding the run button at the top of the window and selecting
    Profile, as shown in [Figure 5–6](#Chapter05.html#fig_5_6).


    ![images](images/0506.jpg)


    **Figure 5–6.** *The actions available for the active scheme.*


    This will launch Instruments before the application is launched, and you will
    see the welcome screen. Select the Time Profiler template, and click Profile.
    After the application launches on your device, scroll down and watch the Instruments
    window display a nice chart showing what is going on. Check out [Figure 5–7](#Chapter05.html#fig_5_7)
    to see the chart that was generated for me.


    ![images](images/0507.jpg)


    **Figure 5–7.** *The Time Profiler showing the amount of time in each method.*


    Now that we have a pretty chart, what are we looking at? The Time Profiler Instrument
    stops your application on an interval to record stack trace information for each
    thread. This collected information gives you insight into what your application
    is spending most of its time doing, so you can determine bottlenecks in performance.
    Knowing that, let''s take another look at the information presented in [Figure
    5–7](#Chapter05.html#fig_5_7). The table shows two main columns of information
    (note that right-clicking the headers will allow you to turn on other columns).
    The left-most column shows the running time of the methods on the right-most column.
    Looking at the second item from the top, we can see that we are spending quite
    a bit of time in the `fibonacci:` method.


    We thought this would happen, and the data we collected confirms that hypothesis.
    If the data didn''t suggest that, we would be able to interpret the data to figure
    out what is going on.


    So why is the `fibonacci:` method taking so much time? Option-click the disclosure
    indicator to the left of `[RootViewController fibonacci:]`, and check out how
    deeply the recursion goes. Pretty surprising, isn''t it? This gives us insight
    as to how bad this algorithm performs in this scenario. So how do we fix it?


    **TIP:** Option-clicking a disclosure triangle will disclose all children of the
    triangle. This is an operating-system-wide feature.


    There are a number of ways to approach this kind of problem. The problem could
    be purely algorithmic, and a tweak to improve running time or space could solve
    the issue. It could also be an approach issue. If the algorithm can''t be improved
    and the running time really is quite bad, break the long running code off of the
    main thread (or pass it off to Grand Central Dispatch), and display a loading
    indicator. Your users will thank you.


    This isn''t a book on algorithms and computer science, so we''re going to skip
    all of the theoretical stuff and go straight to the answer with a small explanation
    as to why it works. First, return to Xcode, and update the `fibonacci:` method
    to look like [Listing 5–3](#Chapter05.html#list_5_3).


    **Listing 5–3.** *An Iterative Fibonacci Implementation Doesn''t Create the Stack
    Issues You''ll See with the Recursive Implementation*


    `#pragma mark - Private`

    `-(NSInteger) fibonacci:(NSInteger) term {`

    `    NSInteger first = 0;`

    `    NSInteger second = 1;`


    `    if(term == 0) {`

    `        return first;`

    `    } else if(term == 1) {`

    `        return second;`

    `    } else {`

    `        NSInteger actualTerm = 0;`

    `        for(int t = 1; t < term; t++) {`

    `            actualTerm = first + second;`


    `            first = second;`

    `            second = actualTerm;`

    `        }`


    `        return actualTerm;`

    `    }`

    `}`


    What we''ve done here is transform the recursive algorithm to an iterative algorithm.
    This was a purely algorithmic approach to solving this problem. Now that we have
    a potential solution to the problem, profile the application again through the
    Time Profiler. If you still have the old Instruments session open and if the Time
    Profiler icon is toggled, open in the Instruments panel to see the old run below
    the current run. That way, you can perform the same test and see what the final
    results are. Check out [Figure 5–8](#Chapter05.html#fig_5_8) to see the second
    run.


    ![images](images/0508.jpg)


    **Figure 5–8.** *This run looks much better.*


    Looking at [Figure 5–8](#Chapter05.html#fig_5_8), we can see clearly that the
    `fibonacci:` method isn''t blocking the main thread at all. This verifies our
    solution, and now, we can move on to other issues in our code.'
  trans: "\n在运行应用之前，我们先简要了解一下当前的情况。简而言之，我们正在显示斐波那契数列的前 35 项。我选择斐波那契数列主要是因为前几项计算起来相对较快。随着项数增加，算法的递归性质会让表格变得有些迟缓。如果你的设备没有被选为部署目标，请在方案选择器中进行选择。试着在设备上运行该应用，并查看表格视图底部的性能表现。\n\
    \n底部的性能表现很糟糕，对吧？我们知道问题所在，现在来考虑如何使用 Instruments 诊断问题。在设备选中的情况下运行应用，然后像第 4 章那样，通过\
    \ **Product** ![Images](img/U001.jpg) **Profile** 或按下 ![Images](img/U002.jpg)I\
    \ 附加 Instruments。另一种运行应用的方法是单击并按住窗口顶部的运行按钮，然后选择 Profile，如图 5-6 所示。\n\n![images](img/0506.jpg)\n\
    \n**图 5-6.** *当前方案可用的操作。*\n\n这将在应用启动前启动 Instruments，你会看到欢迎界面。选择 Time Profiler\
    \ 模板，然后点击 Profile。应用在你的设备上启动后，向下滚动并观察 Instruments 窗口，它会显示一个直观的图表，展示正在发生的情况。查看图\
    \ 5-7 以查看为我生成的图表。\n\n![images](img/0507.jpg)\n\n**图 5-7.** *Time Profiler 显示每个方法所耗费的时间。*\n\
    \n现在我们有了一个直观的图表，具体在看什么呢？Time Profiler 工具会定时暂停你的应用，以记录每个线程的堆栈跟踪信息。这些收集到的信息能让你深入了解应用将大部分时间花在了哪些操作上，从而确定性能瓶颈。知道这一点后，我们再来看看图\
    \ 5-7 中呈现的信息。该表格显示了两列主要信息（请注意，右键单击表头可以启用其他列）。最左边一列显示了最右边一列中方法的运行时间。查看从上数起的第二项，我们可以看到大量时间花费在了\
    \ `fibonacci:` 方法上。\n\n我们预料到了这一点，收集到的数据也证实了这个假设。如果数据没有指示这一点，我们也可以解读数据来弄清楚具体情况。\n\
    \n那么，为什么 `fibonacci:` 方法会花费如此多的时间呢？按住 Option 键并单击 `[RootViewController fibonacci:]`\
    \ 左侧的展开指示器，查看递归的深度有多深。相当令人惊讶，不是吗？这让我们了解到该算法在此场景下的表现有多糟糕。那么，我们该如何修复呢？\n\n**提示：**\
    \ Option 单击展开三角形会展开该三角形的所有子项。这是一个操作系统级别的功能。\n\n解决这类问题有多种方法。问题可能纯粹是算法层面的，通过调整以改善运行时间或空间即可解决。也可能是方法层面的问题。如果算法无法改进且运行时间确实很糟糕，可将长时间运行的代码从主线程中分离出来（或交给\
    \ Grand Central Dispatch 处理），并显示加载指示器。你的用户会感谢你的。\n\n这不是一本关于算法和计算机科学的书，因此我们将跳过所有理论内容，直接给出答案，并附上简要的解释。首先，返回\
    \ Xcode，将 `fibonacci:` 方法更新为代码清单 5-3 所示。\n\n**代码清单 5-3.** *迭代式斐波那契实现不会产生递归实现中会遇到的堆栈问题*\n\
    \n```objc\n#pragma mark - 私有方法\n-(NSInteger) fibonacci:(NSInteger) term {\n  \
    \  NSInteger first = 0;\n    NSInteger second = 1;\n\n    if(term == 0) {\n  \
    \      return first;\n    } else if(term == 1) {\n        return second;\n   \
    \ } else {\n        NSInteger actualTerm = 0;\n        for(int t = 1; t < term;\
    \ t++) {\n            actualTerm = first + second;\n\n            first = second;\n\
    \            second = actualTerm;\n        }\n\n        return actualTerm;\n \
    \   }\n}\n```\n\n我们在这里所做的，是将递归算法转换为迭代算法。这是解决该问题的一种纯算法方法。现在，既然我们有了一个潜在的解决方案，就再次通过\
    \ Time Profiler 分析应用。如果你仍然开着旧的 Instruments 会话，并且 Time Profiler 图标处于切换状态，请在 Instruments\
    \ 面板中打开，即可在当前运行的下方看到旧的运行记录。这样，你就可以执行相同的测试并查看最终结果。查看图 5-8 了解第二次运行的情况。\n\n![images](img/0508.jpg)\n\
    \n**图 5-8.** *这次运行看起来好多了。*\n\n从图 5-8 可以清楚地看到，`fibonacci:` 方法完全没有阻塞主线程。这验证了我们的解决方案，现在我们可以继续解决代码中的其他问题了。\n"
- fmt: "### Improving the Product Screen\n\nThe product screen in Super Checkout does\
    \ not scroll very well. Since you learned how to diagnose a similar problem previously,\
    \ let's give the Time Profiler a run through to see if we can find out what is\
    \ going on in the application.\n\nBefore we do this, we need to create a new branch\
    \ off of the `Memory_Fixes` branch and call it `Scrolling_Enhancements`. Follow\
    \ the same procedure that we followed in [Chapter 4](#Chapter04.html#ch4), and\
    \ make sure your working copy is the newly created branch. After Xcode is finished\
    \ making the branch and you are able to edit the code, ensure your device is connected\
    \ and is selected as the deployment target in the scheme selector. Run the application\
    \ using the Profile action, and select the Time Profiler instrument in Instruments.\n\
    \nThe results you see in Instruments of scrolling up and down the product list\
    \ several times is a bit confusing (see [Figure 5–9](#Chapter05.html#fig_5_9)).\n\
    \n![images](images/0509.jpg)\n\n**Figure 5–9.** *Where is my code getting executed?*\n\
    \nIn the Fibonacci example, it was pretty obvious where our code was misbehaving.\
    \ In [Figure 5–9](#Chapter05.html#fig_5_9), we can't see where our code is being\
    \ executed. To weed out all of the stuff going on behind the scenes, click the\
    \ `Hide System Libraries` check box on the left in the Call Tree section. This\
    \ will give you a view that looks similar to the one shown in [Figure 5–10](#Chapter05.html#fig_5_10).\n\
    \n![images](images/0510.jpg)\n\n**Figure 5–10.** *The offending code is highlighted.*\n\
    \nBy selecting the `Hide System Libraries` check box, we filter out all of the\
    \ noise, so we can spot which line of our code is behaving badly. As [Figure 5–10](#Chapter05.html#fig_5_10)\
    \ shows, the `imageReceived:forRequest:` selector is misbehaving. Let's go ahead\
    \ and take a look at [Listing 5–4](#Chapter05.html#list_5_4) to analyze that method.\n\
    \n**Listing 5–4.** *Can You Spot the Bottleneck in This Offending Method?*\n\n\
    ```\n-(void) imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier\
    \ {\n    ProductCell *cell =\n        (ProductCell *)[self.tableView\ncellForRowAtIndexPath:[imageIndexPathsobjectForKey:connectionIdentifier]];\n\
    \n    CGFloat target = 64;\n\n    CGImageRef oldImage = [image CGImage];\n   \
    \ CGFloat imageWidth = (CGFloat)CGImageGetWidth(oldImage);\n    CGFloat imageHeight\
    \ = (CGFloat)CGImageGetHeight(oldImage);\n\n    CGFloat widthFactor = target /\
    \ imageWidth;\n    CGFloat heightFactor = target / imageHeight;\n    CGFloat factor\
    \ = 1.0;\n\n    if (widthFactor > 1.0 && heightFactor > 1.0) {\n        factor\
    \ = 1.0;\n    } else {\n        if (widthFactor >= heightFactor) {\n         \
    \   factor = widthFactor;\n        } else {\n            factor = heightFactor;\n\
    \        }\n    }\n\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
    \    CGContextRef imageContext = CGBitmapContextCreate(NULL,\n\nimageWidth,\n\n\
    imageHeight,\n\n8,\n\n4 * imageWidth,\n\ncolorSpace,\n\nkCGImageAlphaPremultipliedFirst);\n\
    \    CGContextDrawImage(imageContext, CGRectMake(0, 0, imageWidth, imageHeight),\n\
    oldImage);\n    CGContextScaleCTM(imageContext, imageWidth * factor, imageHeight\
    \ * factor);\n    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);\n\
    \n    CGColorSpaceRelease(colorSpace);\n    CGContextRelease(imageContext);\n\n\
    \    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];\n\n \
    \   CGImageRelease(newImage);\n    [cell.productImage setImage:resizedImage];\n\
    \n    [resizedImage release];\n\n    [imageIndexPaths removeObjectForKey:connectionIdentifier];\n\
    }\n```\n\nThis is the code that was added in [Chapter 4](#Chapter04.html#ch4).\
    \ It is doing quite a bit and is executed for each image returned. Furthermore,\
    \ an image for a product is loaded each time a cell is created. Since this is\
    \ a complicated issue with two possible causes, let's pick one of the issues.\
    \ Doing network requests is the most expensive (and time consuming operation,\
    \ we'll talk more about that in [Chapter 6](#Chapter06.html#ch6)) so we're going\
    \ to change how our images are loaded. Before we do so, we'll need to look a bit\
    \ deeper at how `UITableView` and `UIScrollView` instances work. So before we\
    \ implement a fix, let's talk about what the Cocoa Touch framework does while\
    \ the user is scrolling a table view.\n\n### Looking Behind the Scenes of a Scroll\
    \ View\n\nWhen a scroll view is scrolling, it puts the current run loop in a special\
    \ mode. This mode blocks pretty much everything from executing except for the\
    \ pieces that draw the scroll view that is in motion. `NSURLConnection` is a great\
    \ example of something that gets blocked while a scroll view is scrolling. While\
    \ the view is scrolling, any data that comes back from the open socket gets queued\
    \ up until the run loop is switched from `UITrackingRunLoopMode` to the default\
    \ mode.\n\nKnowing this will help you design a solution that will make sure requests\
    \ aren't being made while the view is scrolling. Ideally, when scrolling is finished,\
    \ the data that was queued up by any `NSURLConnection`s that were open won't flood\
    \ the app, and multiple calls to the delegate method are accomplished at once.\
    \ This is going to require a pretty hefty update. Are you ready?"
  raw: '#### Improving the Product Screen


    The product screen in Super Checkout does not scroll very well. Since you learned
    how to diagnose a similar problem previously, let''s give the Time Profiler a
    run through to see if we can find out what is going on in the application.


    Before we do this, we need to create a new branch off of the Memory_Fixes branch
    and call it Scrolling_Enhancements. Follow the same procedure that we followed
    in [Chapter 4](#Chapter04.html#ch4), and make sure your working copy is the newly
    created branch. After Xcode is finished making the branch and you are able to
    edit the code, ensure your device is connected and is selected as the deployment
    target in the scheme selector. Run the application using the Profile action, and
    select the Time Profiler instrument in Instruments.


    The results you see in Instruments of scrolling up and down the product list several
    times is a bit confusing (see [Figure 5–9](#Chapter05.html#fig_5_9)).


    ![images](images/0509.jpg)


    **Figure 5–9.** *Where is my code getting executed?*


    In the Fibonacci example, it was pretty obvious where our code was misbehaving.
    In [Figure 5–9](#Chapter05.html#fig_5_9), we can''t see where our code is being
    executed. To weed out all of the stuff going on behind the scenes, click the Hide
    System Libraries check box on the left in the Call Tree section. This will give
    you a view that looks similar to the one shown in [Figure 5–10](#Chapter05.html#fig_5_10).


    ![images](images/0510.jpg)


    **Figure 5–10.** *The offending code is highlighted.*


    By selecting the Hide System Libraries check box, we filter out all of the noise,
    so we can spot which line of our code is behaving badly. As [Figure 5–10](#Chapter05.html#fig_5_10)
    shows, the `imageReceived:forRequest:` selector is misbehaving. Let''s go ahead
    and take a look at [Listing 5–4](#Chapter05.html#list_5_4) to analyze that method.


    **Listing 5–4.** *Can You Spot the Bottleneck in This Offending Method?*


    ` -(void) imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier
    {`

    `    ProductCell *cell =`

    `        (ProductCell *)[self.tableView`

    `cellForRowAtIndexPath:[imageIndexPathsobjectForKey:connectionIdentifier]];`


    `    CGFloat target = 64;`


    `    CGImageRef oldImage = [image CGImage];`

    `    CGFloat imageWidth = (CGFloat)CGImageGetWidth(oldImage);`

    `    CGFloat imageHeight = (CGFloat)CGImageGetHeight(oldImage);`


    `    CGFloat widthFactor = target / imageWidth;`

    `    CGFloat heightFactor = target / imageHeight;`

    `    CGFloat factor = 1.0;`


    `    if (widthFactor > 1.0 && heightFactor > 1.0) {`

    `        factor = 1.0;`

    `    } else {`

    `        if (widthFactor >= heightFactor) {`

    `            factor = widthFactor;`

    `        } else {`

    `            factor = heightFactor;`

    `        }`

    `    }`


    `    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();`

    `    CGContextRef imageContext = CGBitmapContextCreate(NULL,`


    `imageWidth,`


    `imageHeight,`


    `8,`


    `4 * imageWidth,`


    `colorSpace,`


    `kCGImageAlphaPremultipliedFirst);`

    `    CGContextDrawImage(imageContext, CGRectMake(0, 0, imageWidth, imageHeight),`

    `oldImage);`

    `    CGContextScaleCTM(imageContext, imageWidth * factor, imageHeight * factor);`

    `    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);`


    `    CGColorSpaceRelease(colorSpace);`

    `    CGContextRelease(imageContext);`


    `    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];`


    `    CGImageRelease(newImage);`

    `    [cell.productImage setImage:resizedImage];`


    `    [resizedImage release];`


    `    [imageIndexPaths removeObjectForKey:connectionIdentifier];`

    `}`


    This is the code that was added in [Chapter 4](#Chapter04.html#ch4). It is doing
    quite a bit and is executed for each image returned. Furthermore, an image for
    a product is loaded each time a cell is created. Since this is a complicated issue
    with two possible causes, let''s pick one of the issues. Doing network requests
    is the most expensive (and time consuming operation, we''ll talk more about that
    in [Chapter 6](#Chapter06.html#ch6)) so we''re going to change how our images
    are loaded. Before we do so, we''ll need to look a bit deeper at how `UITableView`
    and `UIScrollView` instances work. So before we implement a fix, let''s talk about
    what the Cocoa Touch framework does while the user is scrolling a table view.


    #### Looking Behind the Scenes of a Scroll View


    When a scroll view is scrolling, it puts the current run loop in a special mode.
    This mode blocks pretty much everything from executing except for the pieces that
    draw the scroll view that is in motion. `NSURLConnection` is a great example of
    something that gets blocked while a scroll view is scrolling. While the view is
    scrolling, any data that comes back from the open socket gets queued up until
    the run loop is switched from `UITrackingRunLoopMode` to the default mode.


    Knowing this will help you design a solution that will make sure requests aren''t
    being made while the view is scrolling. Ideally, when scrolling is finished, the
    data that was queued up by any `NSURLConnection`s that were open won''t flood
    the app, and multiple calls to the delegate method are accomplished at once. This
    is going to require a pretty hefty update. Are you ready?'
  trans: "\n### 改进产品屏幕\n\nSuper Checkout 中的产品屏幕滚动效果不佳。既然你之前已经学会了如何诊断类似问题，那我们不妨运行一下时间分析器，看看能否找出应用中的问题所在。\n\
    \n在此之前，我们需要在 `Memory_Fixes` 分支的基础上创建一个新分支，命名为 `Scrolling_Enhancements`。按照我们在第\
    \ 4 章中遵循的相同步骤操作，并确保你的工作副本位于新创建的分支上。Xcode 完成分支创建并且你可以编辑代码后，请确保设备已连接，并在方案选择器中将其选为部署目标。通过\
    \ Profile 操作运行应用，然后在 Instruments 中选择时间分析器工具。\n\n在 Instruments 中，上下滚动产品列表几次后看到的结果有点令人困惑（参见图\
    \ 5-9）。\n\n![images](img/0509.jpg)\n\n**图 5-9.** *我的代码在哪里被执行？*\n\n在斐波那契数列的例子中，我们的代码在哪里出了问题一目了然。但在图\
    \ 5-9 中，我们无法看到代码是在哪里执行的。为了排除所有后台运行的内容，请勾选调用树部分左侧的 `隐藏系统库` 复选框。这样你将看到一个类似于图 5-10\
    \ 所示的视图。\n\n![images](img/0510.jpg)\n\n**图 5-10.** *有问题的代码已被高亮显示。*\n\n通过选择 `隐藏系统库`\
    \ 复选框，我们过滤掉了所有干扰信息，从而能够发现哪一行代码行为异常。如图 5-10 所示，`imageReceived:forRequest:` 选择器存在问题。接下来，我们查看代码清单\
    \ 5-4 来分析该方法。\n\n**代码清单 5-4.** *你能在这个有问题的代码中找出瓶颈吗？*\n\n```\n-(void) imageReceived:(UIImage\
    \ *)image forRequest:(NSString *)connectionIdentifier {\n    ProductCell *cell\
    \ =\n        (ProductCell *)[self.tableView\ncellForRowAtIndexPath:[imageIndexPathsobjectForKey:connectionIdentifier]];\n\
    \n    CGFloat target = 64;\n\n    CGImageRef oldImage = [image CGImage];\n   \
    \ CGFloat imageWidth = (CGFloat)CGImageGetWidth(oldImage);\n    CGFloat imageHeight\
    \ = (CGFloat)CGImageGetHeight(oldImage);\n\n    CGFloat widthFactor = target /\
    \ imageWidth;\n    CGFloat heightFactor = target / imageHeight;\n    CGFloat factor\
    \ = 1.0;\n\n    if (widthFactor > 1.0 && heightFactor > 1.0) {\n        factor\
    \ = 1.0;\n    } else {\n        if (widthFactor >= heightFactor) {\n         \
    \   factor = widthFactor;\n        } else {\n            factor = heightFactor;\n\
    \        }\n    }\n\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
    \    CGContextRef imageContext = CGBitmapContextCreate(NULL,\n\nimageWidth,\n\n\
    imageHeight,\n\n8,\n\n4 * imageWidth,\n\ncolorSpace,\n\nkCGImageAlphaPremultipliedFirst);\n\
    \    CGContextDrawImage(imageContext, CGRectMake(0, 0, imageWidth, imageHeight),\n\
    oldImage);\n    CGContextScaleCTM(imageContext, imageWidth * factor, imageHeight\
    \ * factor);\n    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);\n\
    \n    CGColorSpaceRelease(colorSpace);\n    CGContextRelease(imageContext);\n\n\
    \    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];\n\n \
    \   CGImageRelease(newImage);\n    [cell.productImage setImage:resizedImage];\n\
    \n    [resizedImage release];\n\n    [imageIndexPaths removeObjectForKey:connectionIdentifier];\n\
    }\n```\n\n这是第 4 章中添加的代码。它执行了大量操作，并且每次返回图片时都会被调用。此外，每当创建一个单元格时，都会加载产品的图片。由于这是一个有两个可能原因导致的复杂问题，我们不妨先解决其中一个。执行网络请求是最耗资源（也是最耗时的操作，我们将在第\
    \ 6 章中进一步讨论），因此我们将更改图片的加载方式。在此之前，我们需要更深入地了解 `UITableView` 和 `UIScrollView` 实例的工作原理。因此，在实施修复之前，我们先来谈谈用户滚动表格视图时\
    \ Cocoa Touch 框架做了什么。\n\n### 探究滚动视图的幕后机制\n\n当滚动视图正在滚动时，它会将当前运行循环置于一种特殊模式。这种模式会阻止几乎所有内容的执行，只留下绘制正在移动的滚动视图的相关部分。`NSURLConnection`\
    \ 就是一个很好的例子，它在滚动视图滚动时会被阻塞。当视图滚动时，从已打开的 socket 返回的任何数据都会被排队，直到运行循环从 `UITrackingRunLoopMode`\
    \ 切换到默认模式。\n\n了解这一点将有助于你设计一个解决方案，确保在视图滚动时不会发起请求。理想情况下，当滚动结束时，任何打开的 `NSURLConnection`\
    \ 排队的请求数据都不会涌入应用，并且对委托方法的多次调用可以在同一时间完成。这将需要一个相当大的更新。你准备好了吗？\n"
- fmt: "# Lazily Loading Images\n\nThe following update will initiate the appropriate\
    \ image requests when scrolling has stopped. To do this, we are going to have\
    \ to create an actual model object and parse the products and to hold on to the\
    \ image that is downloaded. Create a new `NSObject` subclass, and call it `Product`.\n\
    \nOpen `Product.h`, and give it the interface in [Listing 5–5](#Chapter05.html#list_5_5).\n\
    \n**Listing 5–5.** *The Interface for a Product*\n\n```objc\n#import <Foundation/Foundation.h>\n\
    @interface Product : NSObject {\n    NSString *productId;\n    NSString *name;\n\
    \    NSNumber *price;\n    NSString *description;\n    NSString *image;\n    NSString\
    \ *thumb;\n\n    UIImage *productImage;\n}\n\n@property (nonatomic, retain) NSString\
    \ *productId;\n@property (nonatomic, retain) NSString *name;\n@property (nonatomic,\
    \ retain) NSNumber *price;\n@property (nonatomic, retain) NSString *description;\n\
    @property (nonatomic, retain) NSString *image;\n@property (nonatomic, retain)\
    \ NSString *thumb;\n@property (nonatomic, retain) UIImage *productImage;\n\n-\
    \ (id) initWithDictionary:(NSDictionary *)data;\n\n@end\n```\n\nThe implementation\
    \ file looks like [Listing 5–6](#Chapter05.html#list_5_6).\n\n**Listing 5–6.**\
    \ *The Implementation for a Product*\n\n```objc\n#import \"Product.h\"\n\n@implementation\
    \ Product\n@synthesize productId;\n@synthesize name;\n@synthesize price;\n@synthesize\
    \ description;\n@synthesize image;\n@synthesize thumb;\n@synthesize productImage;\n\
    \n- (void)dealloc {\n    [productId release], productId = nil;\n    [name release],\
    \ name = nil;\n    [price release], price = nil;\n    [description release], description\
    \ = nil;\n    [image release], image = nil;\n    [thumb release], thumb = nil;\n\
    \    [productImage release], productImage = nil;\n\n    [super dealloc];\n}\n\n\
    - (id) initWithDictionary:(NSDictionary *)data {\n    self = [super init];\n \
    \   if(self) {\n        productId = [[data objectForKey:@\"id\"] copy];\n    \
    \    name = [[data objectForKey:@\"name\"] copy];\n        price = [[data objectForKey:@\"\
    price\"] copy];\n        description = [[data objectForKey:@\"description\"] copy];\n\
    \        image = [[data objectForKey:@\"image\"] copy];\n        thumb = [[data\
    \ objectForKey:@\"thumb\"] copy];\n    }\n\n    return self;\n}\n\n@end\n```\n\
    \nNow that we have the `Product` model defined, we need to update quite a few\
    \ files starting with the parsing code and the presentation of the data.\n\nOpen\
    \ `SuperCheckoutAPIEngine.m`; look for the `parsingSucceededForRequest:ofResponseType:parsedObjects:`\
    \ selector, and update it to look like [Listing 5–7](#Chapter05.html#list_5_7).\
    \ Don't forget to import the `Product` header at the top of the file!\n\n**Listing\
    \ 5–7.** *Time to Speed Up This Baby!*\n\n```objc\n-(void)parsingSucceededForRequest:(NSString\
    \ *)identifier\n    ofResponseType:(SuperCheckoutResponseType)responseType\n \
    \                   parsedObjects:(NSDictionary *)parsedObject {\n    switch (responseType)\
    \ {\n        case SuperCheckoutProductList:\n            if([self\n_isValidDelegateForSelector:@selector(productListReceived:forRequest:)])\
    \ {\n                NSArray *result = [parsedObject objectForKey:@\"result\"\
    ];\n                NSMutableArray *newResult = [NSMutableArray arrayWithCapacity:[result\n\
    count]];\n\n                for(NSDictionary *obj in result) {\n             \
    \       Product *prod = [[Product alloc] initWithDictionary:obj];\n          \
    \          [newResult addObject:prod];\n\n                    [prod release];\n\
    \                }\n\n                [delegate productListReceived:[NSArray arrayWithArray:newResult]\n\
    forRequest:identifier];\n            }\n            break;\n        case SuperCheckoutCartContents:\n\
    \            if([self\n_isValidDelegateForSelector:@selector(cartContentsReceived:forRequest:)])\
    \ {\n                [delegate cartContentsReceived:[parsedObject objectForKey:@\"\
    result\"]\nforRequest:identifier];\n            }\n\n        default:\n      \
    \      break;\n    }\n}\n```"
