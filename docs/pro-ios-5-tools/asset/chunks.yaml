    \ directly from the editor. Since this is simply a GUI on top of GDB, the pickiness\
    \ is still valid. Typecast everything!\n\n![images](images/0429.jpg)\n\n**Figure\
    \ 4–29.** *Editing a breakpoint directly from Xcode*\n\nKnowing both ways to make\
    \ a breakpoint conditional is important. There are times where data can change\
    \ rapidly and you will need to interact with GDB directly.\n\n#### Putting It\
    \ All Together\n\nTo finish our GDB training, we're going to step away from the\
    \ bug for a moment and discuss one last thing with GDB.\n\nThe trick for evaluating\
    \ expressions with typecasting is also useful for manipulating live data, in addition\
    \ to evaluating conditional breakpoints. Let's combine what you've learned so\
    \ far. Here, we append a string to a local argument, have GDB create a new string\
    \ for us with a dollar-sign variable, and then inspect it with `po`:\n\n```\n\
    (gdb) p (NSString *) [caption stringByAppendingString: @\" foo\"]\n$6 = (NSString\
    \ *) 0x3d9ef0\n(gdb) po $6\nSeen near Searching... foo\n```\n\nWe can stuff these\
    \ values into local variables, too. We change a value with the `set <arg>=<value>`\
    \ command. Let's change the caption:\n\n```\n(gdb) set caption=$6\n(gdb) po caption\n\
    Seen near Searching... foo\n```\n\nThe best way to learn your way around GDB is\
    \ to experiment. I keep a handy, though slightly ruffled, copy of the GDB quick\
    \ reference guide next to us when I'm debugging particularly thorny problems;\
    \ you can download it here:\n\n`http://refcards.com/docs/peschr/gdb/gdb-refcard-a4.pdf`\n\
    \n#### Fixing Our Bug\n\nSince you now have a white belt in GDB kungfu, let's\
    \ try to solve this issue. We have the breakpoints set, and we are armed with\
    \ the ability to modify live data and inspect memory. Let's tackle this bug and\
    \ see what is going on.\n\nRun the application, and add some items to the cart;\
    \ make sure one of them is the same item that you have your conditional breakpoint\
    \ set to break at. Try to remove that item from your cart, and let's step through\
    \ the code.\n\nInstead of typing `c` to continue, use `n` to step through and\
    \ skip over function calls. Typing `s` steps into a function call and lets you\
    \ follow the code through different function calls; it may take you into assembly\
    \ code. When the application breaks, type `n`, and step over each line until we\
    \ break on the line where we are skipping the item being removed.\n\nWhen we break\
    \ in the loop in question, before we continue, let's make sure the item gets skipped,\
    \ and then we can compare the two arrays to make sure that item really was removed.\
    \ To do that, keep stepping through until the method is about to return (or place\
    \ a breakpoint at the closing curly brace and continue). Print out the contents\
    \ of `shoppingCart` and `newItemsArray`. Here is an example:\n\n```\n(gdb) po\
    \ shoppingCart\n{\n    items =     (\n                {\n            id = 1;\n\
    \            name = Apple;\n            price = 79;\n            quantity = 1;\n\
    \            subtotal = 79;\n        },\n                {\n            id = 3;\n\
    \            name = \"Blood Orange\";\n            price = 110;\n            quantity\
    \ = 1;\n            subtotal = 110;\n        },\n                {\n         \
    \   id = 2;\n            name = Honeydew;\n            price = 100;\n        \
    \    quantity = 1;\n            subtotal = 100;\n        }\n    );\n    total\
    \ = 289;\n}\n(gdb) po newItemsArray\n<__NSArrayM 0x4ce8260>(\n{\n    id = 1;\n\
    \    name = Apple;\n    price = 79;\n    quantity = 1;\n    subtotal = 79;\n},\n\
    {\n    id = 2;\n    name = Honeydew;\n    price = 100;\n    quantity = 1;\n  \
    \  subtotal = 100;\n}\n)\n```\n\nThe item is missing in the new array, but the\
    \ shopping cart hasn't been updated. Wait! We're not modifying the shopping cart.\
    \ Well, that was a silly mistake; let's fix this issue by adding the following\
    \ lines after the end of the loop:\n\n```\nNSMutableDictionary *newCart = [NSMutableDictionary\
    \ dictionaryWithDictionary:shoppingCart];\n[newCart setValue:newItemsArray forKey:@\"\
    items\"];\nshoppingCart = newCart;\n```\n\nNow, turn breakpoints off, and test\
    \ the app. Works like a charm! Without GDB, we would have to resort to using `NSLog`\
    \ statements everywhere.\n\n### When All Else Fails\n\nIf you have reached this\
    \ point of debugging a problem, still have no solution, and a Google search on\
    \ your issue is returning the same sites you've visited numerous times, it is\
    \ time to punt. No, I don't mean punt your computer. That would hurt your foot,\
    \ and you'd have to buy a new computer; hospital bills and a new computer won't\
    \ fix the bug. Seriously, though, we've exhausted all options at this point because\
    \ we've done the following:\n\n- Ruled out messages going to deallocated memory\n\
    - Ruled out asynchronous code calling deallocated memory\n- Prevented running\
    \ out of memory and removed memory leaks\n- Re-created the issue and stepped through\
    \ the code using GDB\n\nWow, we've gone through a nice list of troubleshooting\
    \ steps and gotten to the end. So what's next?"
  raw: '#### Breaking Up Is Not Hard to Do


    The first thing we want to do is add a breakpoint to the conditional in the loop
    we just created (line 247 in `ShoppingCartViewController.m`). Run the application
    again and this time add several items to your cart. Enter the cart screen and
    remove one of the items to trigger the first breakpoint. Enter the breakpoint
    or ‘`info break`’ command see the internal breakpoint number assigned by GDB.


    `(gdb) info break`

    `Num Type           Disp Enb Address    What`

    `1   breakpoint     keep y   0x00003fd2 in -[ShoppingCartViewController`

    `tableView:commitEditingStyle:forRowAtIndexPath:] at /Users/brandon/Development/iOS/Super`

    `Checkout/Super Checkout/../Super Checkout/ShoppingCartViewController.m:172`

    `breakpoint already hit 1 time`

    `2   breakpoint     keep y   0x00004622 in -[ShoppingCartViewController removeItemFromCart:]
    at`

    `/Users/brandon/Development/iOS/Super Checkout/Super Checkout/../Super`

    `Checkout/ShoppingCartViewController.m:247`

    `(gdb)`


    You may see other breakpoints listed. Look for the breakpoint corresponding to
    the loop we want to break once in. I''ve excerpted it in the preceding code snippet.
    We want the number in the leftmost column, 2\. We want to stop this routine only
    when the `id` value in a dictionary has reached a value of the `id` of the item
    to be removed. Since we have that variable in scope, lets ask GDB what the item
    variable looks like by typing `po item`. The output for this run follows:


    `(gdb) po item`

    `{`

    `    id = 3;`

    `    name = "Blood Orange";`

    `    price = 110;`

    `    quantity = 1;`

    `    subtotal = 110;`

    `}`

    `(gdb)`


    The `id` we''re interested in is 3\. The objective-c code for this would be


    `[[item objectForKey: @" id"] intValue] == 3`


    The compiler would normally parse this statement, figure out the type of values
    for each message we send, and compute the expression. GDB can help us evaluate
    this, too, on the fly. We have to help it out a bit, though. Every single message
    must be strongly typed. All ambiguities must be eliminated. We do this with typecasting.


    Change every message passing call in the condition by casting its type. We do
    that here:


    `((int) [[item objectForKey: @"id"] intValue] ==3)`


    Let''s tell GDB to make breakpoint 14 conditional, that is, GDB will stop only
    when this condition becomes true. The syntax is `condition NN code`:


    `(gdb) condition 2 ((int) [[item objectForKey: @"id"] intValue] == 3)`

    `(gdb)`


    That''s it! Continue with the execution of our program by using the command `c`,
    for “continue”:


    `(gdb) c`


    Soon enough, your debugger will stop when this condition has been reached.


    Is there a way to do this in Xcode? Of course there is! What you want to do is
    go to the Breakpoint Navigator in the Navigator area, or right click the breakpoint
    you want to edit and click Edit Breakpoint in the contextual menu. [Figure 4–29](#Chapter04.html#fig_4_29)
    shows the edit directly from the editor. Since this is simply a GUI on top of
    GDB, the pickiness is still valid. Typecast everything!


    ![images](images/0429.jpg)


    **Figure 4–29.** *Editing a breakpoint directly from Xcode*


    Knowing both ways to make a breakpoint conditional is important. There are times
    where data can change rapidly and you will need to interact with GDB directly.


    #### Putting It All Together


    To finish our GDB training, we''re going to step away from the bug for a moment
    and discuss one last thing with GDB.


    The trick for evaluating expressions with typecasting is also useful for manipulating
    live data, in addition to evaluating conditional breakpoints. Let''s combine what
    you''ve learned so far. Here, we append a string to a local argument, have GDB
    create a new string for us with a dollar-sign variable, and then inspect it with
    `po`:


    `(gdb) p (NSString *) [caption stringByAppendingString: @" foo"]`

    `$6 = (NSString *) 0x3d9ef0`

    `(gdb) po $6`

    `Seen near Searching... foo`


    We can stuff these values into local variables, too. We change a value with the
    `set <arg>=<value>` command. Let''s change the caption:


    `(gdb) set caption=$6`

    `(gdb) po caption`

    `Seen near Searching... foo`


    The best way to learn your way around GDB is to experiment. I keep a handy, though
    slightly ruffled, copy of the GDB quick reference guide next to us when I''m debugging
    particularly thorny problems; you can download it here:


    `http://refcards.com/docs/peschr/gdb/gdb-refcard-a4.pdf`


    #### Fixing Our Bug


    Since you now have a white belt in GDB kungfu, let''s try to solve this issue.
    We have the breakpoints set, and we are armed with the ability to modify live
    data and inspect memory. Let''s tackle this bug and see what is going on.


    Run the application, and add some items to the cart; make sure one of them is
    the same item that you have your conditional breakpoint set to break at. Try to
    remove that item from your cart, and let''s step through the code.


    Instead of typing `c` to continue, use `n` to step through and skip over function
    calls. Typing `s` steps into a function call and lets you follow the code through
    different function calls; it may take you into assembly code. When the application
    breaks, type `n`, and step over each line until we break on the line where we
    are skipping the item being removed.


    When we break in the loop in question, before we continue, let''s make sure the
    item gets skipped, and then we can compare the two arrays to make sure that item
    really was removed. To do that, keep stepping through until the method is about
    to return (or place a breakpoint at the closing curly brace and continue). Print
    out the contents of `shoppingCart` and `newItemsArray`. Here is an example:


    `(gdb) po shoppingCart`

    `{`

    `    items =     (`

    `                {`

    `            id = 1;`

    `            name = Apple;`

    `            price = 79;`

    `            quantity = 1;`

    `            subtotal = 79;`

    `        },`

    `                {`

    `            id = 3;`

    `            name = "Blood Orange";`

    `            price = 110;`

    `            quantity = 1;`

    `            subtotal = 110;`

    `        },`

    `                {`

    `            id = 2;`

    `            name = Honeydew;`

    `            price = 100;`

    `            quantity = 1;`

    `            subtotal = 100;`

    `        }`

    `    );`

    `    total = 289;`

    `}`

    `(gdb) po newItemsArray`

    `<__NSArrayM 0x4ce8260>(`

    `{`

    `    id = 1;`

    `    name = Apple;`

    `    price = 79;`

    `    quantity = 1;`

    `    subtotal = 79;`

    `},`

    `{`

    `    id = 2;`

    `    name = Honeydew;`

    `    price = 100;`

    `    quantity = 1;`

    `    subtotal = 100;`

    `}`

    `)`


    The item is missing in the new array, but the shopping cart hasn''t been updated.
    Wait! We''re not modifying the shopping cart. Well, that was a silly mistake;
    let''s fix this issue by adding the following lines after the end of the loop:


    `NSMutableDictionary *newCart = [NSMutableDictionary dictionaryWithDictionary:shoppingCart];`

    `[newCart setValue:newItemsArray forKey:@"items"];`

    `shoppingCart = newCart;`


    Now, turn breakpoints off, and test the app. Works like a charm! Without GDB,
    we would have to resort to using `NSLog` statements everywhere.


    ### When All Else Fails


    If you have reached this point of debugging a problem, still have no solution,
    and a Google search on your issue is returning the same sites you''ve visited
    numerous times, it is time to punt. No, I don''t mean punt your computer. That
    would hurt your foot, and you''d have to buy a new computer; hospital bills and
    a new computer won''t fix the bug. Seriously, though, we''ve exhausted all options
    at this point because we''ve done the following:


    *   Ruled out messages going to deallocated memory

    *   Ruled out asynchronous code calling deallocated memory

    *   Prevented running out of memory and removed memory leaks

    *   Re-created the issue and stepped through the code using GDB


    Wow, we''ve gone through a nice list of troubleshooting steps and gotten to the
    end. So what''s next?'
