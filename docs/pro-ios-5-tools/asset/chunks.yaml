    ### Sharing on GitHub


    Let''s take a step away from our application and think about sharing our code.
    There are many ways we can share the project. We could post a package of the source
    code on our blog or web site, but a better solution would be to use a public source
    code repository (repo). A good repository should allow us to limit who can check
    in the code, while allowing anyone to view or download the code. Other beneficial
    features should include an integrated bug/issues tracker and wiki system.


    There are many choices out there that fulfill this criteria. One popular choice
    is GitHub ([`http://www.github.com`](http://www.github.com)); see [Figure 11–32](#Chapter11.html#fig_11_32).
    GitHub is a web site built on top of the Git distributed revision control system,
    which emphasizes on speed and was originally developed by Linus Torvalds (him
    again!) to aid in the development of the Linux kernel. One feature of Git is that
    every working directory is a full-fledged repository with a complete history and
    complete revision-tracking capabilities. Each Git repository does not depend on
    network access or a central server.


    ![images](images/1132.jpg)


    **Figure 11–32.** *GitHub home page*


    If you recall, when we created our projects, we checked the box labeled “Create
    local git repository for this project.” That created a local git repository in
    our project directory. Normally, this repository is hidden, but using `Terminal.app`,
    we''re able to see it from the command line using `ls –aCF` (see [Figure 11–33](#Chapter11.html#fig_11_33)).


    ![images](images/1133.jpg)


    **Figure 11–33.** *The Git repository, named .git, in the SBJSON project directory*


    #### Signing In to GitHub


    The first thing is to log in to your GitHub account. If you haven''t created an
    account yet, do so now. See [Chapter 3](#Chapter03.html#ch3) for information on
    setting up an account.


    In your GitHub dashboard (see [Figure 11–34](#Chapter11.html#fig_11_34)), on the
    left side are status updates about the repositories you may be watching. On the
    right are your repositories. Below your repositories are the repositories you
    are watching.


    When you watch a repository, you are telling GitHub you are interested in following
    a project but that you probably don''t want to contribute to it. This is a fairly
    convenient feature that lets you easily track a project. You might want to explore
    the GitHub site, if you''re not already familiar with it, to learn more about
    features like this one.


    ![images](images/1134.jpg)


    **Figure 11–34.** *A sample GitHub dashboard*


    #### Create a Shared Repository


    From your GitHub dashboard, click the New Repository button next to the Your Repositories
    label. This will take you to the new repository page ([`https://github.com/repositories/new`](https://github.com/repositories/new))
    ; see [Figure 11–35](#Chapter11.html#fig_11_35).


    ![images](images/1135.jpg)


    **Figure 11–35.** *The GitHub new repository page*


    Enter **SBJSON** for the Project Name field. The remaining fields are optional,
    but enter **SBJSON static library for Super Checkout** as the Description. This
    project doesn''t have a home page, so leave that field blank. Since we''re using
    the free account, and we plan on sharing this code with everyone, leave the radio
    button next to the label “Anyone (learn more about public repos)” selected. Click
    the Create Repository button.


    We should be redirected to our new GitHub repository (see [Figure 11–36](#Chapter11.html#fig_11_36)).
    Since this is an empty repository, GitHub has helpfully given us the commands
    we need to execute on our computer to set up our project.


    ![images](images/1136.jpg)


    **Figure 11–36.** *Our GitHub repository''s home page*


    Back on your computer, open `Terminal.app`. Navigate down to the project directory
    for the SBJSON static library project. At the command line, enter the global setup
    commands from the GitHub project page:


    `> git config –global user.name "Your Name"`

    `> git config –global user.email your@email.com`


    Replace `"Your Name"` with the name you wish to use with GitHub. `your@email.com`
    should be the e-mail address you used to sign up on GitHub.


    Next, we''re going to tell our local Git repository about the repository on GitHub.
    We should still be in the SBJSON directory. This directory should have the `.git`
    directory we saw earlier. Enter this command:


    `> git remote add origin git@github.com:username/SBJSON.git`


    Replace `username` with your GitHub username. In this command, `git@github.com:username/SBJSON.git`
    is the URL for the repository on GitHub. This command says we want to add a remote
    repository and give it the local alias of `origin`.'
