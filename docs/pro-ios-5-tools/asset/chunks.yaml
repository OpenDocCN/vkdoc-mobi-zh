  trans: '

    ### 持续集成


    持续集成通常简称为“CI”，是指在项目生命周期中持续执行质量控制检查的过程，而非定期进行。在非 CI 项目团队中，成员可能每周聚在一起运行测试并评估项目的底层健康状况；而采用
    CI 导向的团队则会持续运行测试，以随时掌握情况，确保其集成不会引入错误。


    过去，持续集成系统可能简单到只需设置一个定时任务，每小时执行一次项目的单元测试。这种方式能提供持续的反馈，并通知开发者集成问题，但它实际上只适用于单人开发团队。现代
    CI 主要依赖软件来自动化测试和分析。这类软件通常运行在服务器上，并配置为在开发者的代码导致构建失败时通知他们。该服务器通常负责多个 CI 任务；在某些情况下，它会分布在多台服务器上以处理更大的构建负载。


    市场上有许多持续集成软件包。其中最流行的 CI 应用之一是 Jenkins。为了让你的新团队保持正轨，你将搭建一个 Jenkins 实例，用于自动化构建、测试、分析和部署。


    #### 认识 Jenkins


    Jenkins 是一款基于 Java 的应用程序，拥有 Web 界面，允许你通过 Shell 脚本接口或丰富的插件库，设置由各种事件触发的构建任务。Jenkins
    还提供用户和权限管理功能，非常适合包含承包商和客户的大型团队。借助其庞大的插件库，Jenkins 支持包括 Subversion、CVS 和 Git 在内的多种版本控制系统。此外，Jenkins
    是开源且免费的。


    **注意：** 在使用 Jenkins 时，你可能会看到名为 Hudson 的产品。2011 年之前，Jenkins 被称为 Hudson 项目，该项目始于
    Sun Microsystems 公司。2010 年底，出现了一个商标问题，导致项目开发出现分支，于是 Jenkins 诞生了。如今，Hudson 项目由
    Oracle 支持，而 Jenkins 则由社区继续开发。


    #### 让 Jenkins 启动并运行


    Jenkins 可以从[`http://jenkins-ci.org/`](http://jenkins-ci.org/)下载。由于基于 Java，它支持跨平台，可以安装在各种操作系统上，包括
    OS X。在撰写本文时，Jenkins 的最低要求是 Java 运行环境 v1.5。要安装它，你需要三样东西：目标服务器的管理员访问权限；创建运行用户的能力；以及通过远程屏幕共享或直接方式控制机器的能力。


    创建新用户时，你需要做几件事来为 Jenkins 做准备。首先，需要生成新的密钥。你需要任何从你的代码仓库（无论是 Github 还是其他）检出代码所需的
    SSH 认证。Jenkins 将定期检出你的项目，你需要确保它能够做到这一点。其次，你需要从苹果开发者门户获取证书和密钥。你的开发机器或账户上可能已有这些密钥，但
    Jenkins 用户需要拥有自己的、包含独立密钥和证书的钥匙串。你还需要为这些证书获取有效的配置文件，并将其导入 Xcode 的组织器中。一旦 Jenkins
    用户完成了恰当的密钥配置、证书认证和配置文件准备，你就可以设置 Jenkins 环境了。


    Jenkins 的安装非常简单。只需下载安装程序包并运行它（图 9–1）。安装完成后，你会在“应用程序”目录中找到名为 Jenkins 的文件夹。


    ![图片](img/0901.jpg)


    **图 9–1.** *安装过程应该很熟悉。不会有意外或陷阱。*


    在 Jenkins 文件夹中，你会找到 Jenkins 的`.WAR`（Java Web 存档）文件。如果你不熟悉 Java，这就是 Web 应用程序的可执行文件。通常无需手动运行`.WAR`文件，因为安装脚本应该已经为你启动了
    Jenkins。要确认它正在运行，只需打开浏览器并访问[`http://localhost:8080/`](http://localhost:8080/)即可。

