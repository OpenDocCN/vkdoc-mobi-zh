    to the exact same interface element. For example, ‘`cells()[0]`’ might evaluate
    to the same cell as ‘`cells()[“First Cell”]`’, and both of these options would
    be present in the token. If you double-click on a token, it will be converted
    to plain text, and you can modify it as needed.


