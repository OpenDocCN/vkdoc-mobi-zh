    `          forPopoverController: (UIPopoverController *)pc {`

    `    barButtonItem.title = @"Products";`

    `    NSMutableArray *items = [[self.toolbar items] mutableCopy];`

    `    [items insertObject:barButtonItem atIndex:0];`

    `    [self.toolbar setItems:items animated:YES];`

    `    [items release];`

    `    self.popoverController = pc;`

    `}`


    `// Called when the view is shown again in the split view, invalidating the button
    and popover controller.`

    `- (void)splitViewController:(UISplitViewController *)svc`

    `     willShowViewController:(UIViewController *)aViewController`

    `invalidatingBarButtonItem:(UIBarButtonItem *)barButtonItem {`

    `    NSMutableArray *items = [[self.toolbar items] mutableCopy];`

    `    [items removeObjectAtIndex:0];`

    `    [self.toolbar setItems:items animated:YES];`

    `    [items release];`

    `    self.popoverController = nil;`

    `}`


    This chunk adds support for the split view controller delegate protocol. The first
    method is called when the device is rotated to portrait mode. This sets up the
    toolbar that is going to be put in the iPad nib and prepares the popover view
    controller that will be displayed in portrait orientation. The second method is
    called when the device is rotated to the landscape orientation and is about to
    show the full split view controller. It removes the button bar item and disables
    the popover view controller.


    The next significant update was made in the `viewDidLoad` method. In this method,
    we are checking to see if the selected product is not nil and updating the user
    interface with the product details and loading the product''s image. The last
    piece of the method is to begin listening to the notification center for cart
    updates.'
  trans: "\n```objc\n`name:@\"CartUpdated\"`\n\n`object:nil];`\n`}`\n\n`- (void)viewDidUnload\
    \ {`\n`    [self setProductDetailsHeader:nil];`\n`    [self setProductImage:nil];`\n\
    `    [self setProductNameLabel:nil];`\n`    [self setProductPriceLabel:nil];`\n\
    `    [self setAddToBasketCell:nil];`\n`    [self setQuantityCell:nil];`\n`   \
    \ [self setTableView:nil];`\n\n`    [[NSNotificationCenter defaultCenter] removeObserver:self];`\n\
    `    [self setShoppingCartButton:nil];`\n`    [super viewDidUnload];`\n`    //\
    \ 释放主视图的任何保留子视图。`\n`    // 例如 self.myOutlet = nil;`\n`}`\n\n`- (BOOL)shouldAutorotateToInterfaceOrientation:`\n\
    \n`(UIInterfaceOrientation)interfaceOrientation {`\n`    if(UI_USER_INTERFACE_IDIOM()\
    \ == UIUserInterfaceIdiomPad) {`\n`        return YES;`\n`    }`\n`    // 返回支持的取向的\
    \ YES`\n`    return (interfaceOrientation == UIInterfaceOrientationPortrait);`\n\
    `}`\n\n`- (IBAction)cartButtonPressed:(id)sender {`\n`    ShoppingCartViewController\
    \ *cartVC =`\n`        [[ShoppingCartViewController alloc]`\n`initWithNibName:@\"\
    ShoppingCartViewController\"`\n\n`bundle:nil];`\n`    [cartVC setDelegate:self];`\n\
    `    UINavigationController *navController =`\n`        [[UINavigationController\
    \ alloc] initWithRootViewController:cartVC];`\n\n`    [navController setModalPresentationStyle:UIModalPresentationFormSheet];`\n\
    `    [self presentModalViewController:navController animated:YES];`\n\n`    [cartVC\
    \ release];`\n`    [navController release];`\n`}`\n\n`#pragma mark - SCModalDelegate\
    \ Methods`\n`-(void) viewController:(UIViewController *)vc didFinishWithData:(id)\
    \ data {`\n`    [self dismissModalViewControllerAnimated:YES];`\n`}`\n\n`-(void)\
    \ viewControllerDidCancel:(UIViewController *)vc {`\n`    [self dismissModalViewControllerAnimated:YES];`\n\
    `}`\n`@end`\n```\n\n这段代码量不小，但我们会逐步分析，讨论每个相对于原始版本的更新。\n\n第一个改动是创建了一个类扩展。类扩展如下：\n\
    \n```objc\n@interface ProductDetailsViewController()\n@property (nonatomic, retain)\
    \ UIPopoverController *popoverController;\n@end\n```\n\n我们在这里所做的只是为来自 `UISplitViewController`\
    \ 的 `UIPopoverController` 创建一个本地属性。稍后我们会随其余合成的属性一起，使用 `@synthesize popoverController=_myPopoverController;`\
    \ 来合成它。我们也在合成新属性，但这并不太有趣，所以我只是在此提一下。\n\n下一个有趣的改动是：\n\n```objc\n- (id) initWithCoder:(NSCoder\
    \ *)aDecoder {\n        self = [super initWithCoder:aDecoder];\n        if(self)\
    \ {\n                apiEngine = [[SuperCheckoutAPIEngine alloc] initWithDelegate:self];\n\
    \        }\n        return self;\n}\n```\n\n这里，我们实现了 `initWithCoder:`，因为在 `MainWindow-iPad`\
    \ 的 nib 文件中，`ProductDetailsViewController` 是作为 nib 的一部分被加载的。由于我们受 nib 加载器的控制，因此必须实现\
    \ `initWithCoder:` 方法。该方法的其余部分与其他初始化方法基本相同。\n\n下一组改动位于 `dealloc` 方法中（请参见代码清单 10–6）。我们正在清理资源，并将对象从\
    \ `NSNotificationCenter` 的通知观察者中移除。这是因为稍后在该文件中，我们会开始监听 `NSNotificationCenter`\
    \ 上的购物车更新。这些改动并不十分引人注目，但仍然值得一提。\n\n**代码清单 10–6.** *非 ARC 项目中至关重要的 dealloc 方法。*\n\
    \n```objc\n- (void)dealloc {\n    apiEngine.delegate = nil;\n    [apiEngine release];\n\
    \    [selectedProduct release];\n    [productDetailsHeader release];\n    [productImage\
    \ release];\n    [productNameLabel release];\n    [productPriceLabel release];\n\
    \    [addToBasketCell release];\n    [quantityCell release];\n    [tableView release];\n\
    \    [_myPopoverController release];\n\n    [[NSNotificationCenter defaultCenter]\
    \ removeObserver:self];\n    [shoppingCartButton release];\n    [super dealloc];\n\
    }\n```\n\n接下来是选定产品的存取方法（请参见代码清单 10–7）。由于我们现在需要处理 iPad 版本，并且控制器始终存在，因此我们更新了存取方法，以设置适当的视图属性，并让弹出视图控制器关闭。\n\
    \n**代码清单 10–7.** *选定产品的存取方法和更新的视图*\n\n```objc\n- (void) setSelectedProduct:(Product\
    \ *)aProduct {\n    [self willChangeValueForKey:@\"selectedProduct\"];\n    Product\
    \ *oldProduct = selectedProduct;\n    selectedProduct  = [aProduct retain];\n\
    \    [oldProduct release];\n    [self didChangeValueForKey:@\"selectedProduct\"\
    ];\n    [[self tableView] reloadData];\n    [apiEngine getImageForProduct:[selectedProduct\
    \ image]];\n\n    [productNameLabel setText:[selectedProduct name]];\n    [productPriceLabel\
    \ setText:\n        [NSString stringWithFormat:@\"$%1.2f\", [[selectedProduct\
    \ price] floatValue]]];\n\n    [[self popoverController] dismissPopoverAnimated:YES];\n\
    }\n```\n\n在 `numberOfSectionsInTableView:` 方法中（请参见代码清单 10–8），当选定产品为 nil 时，我们返回\
    \ 0。这是因为视图控制器将使用一个 nil 的选定产品来创建，而我们不希望在此显示任何 UI，因为没有什么可显示的内容。\n\n**代码清单 10–8.**\
    \ *根据所选产品是否存在来改变表格的构建方式*\n\n```objc\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView {\n    if(selectedProduct == nil) {\n        return 0;\n    }\n\
    \    return 3;\n}\n```\n\n下一个重要的更新在代码清单 10–9 中；我们正在为类添加分屏视图支持，以确保我们的应用程序也能在 iPhone/iPod\
    \ Touch 上正常运行。\n\n**代码清单 10–9.** *向类添加分屏视图支持*\n\n```objc\n#pragma mark - 分屏视图支持\n\
    \n- (void)splitViewController:(UISplitViewController *)svc\n      willHideViewController:(UIViewController\
    \ *)aViewController\n              withBarButtonItem:(UIBarButtonItem *)barButtonItem\n\
    \          forPopoverController: (UIPopoverController *)pc {\n    barButtonItem.title\
    \ = @\"产品\";\n    NSMutableArray *items = [[self.toolbar items] mutableCopy];\n\
    \    [items insertObject:barButtonItem atIndex:0];\n    [self.toolbar setItems:items\
    \ animated:YES];\n    [items release];\n    self.popoverController = pc;\n}\n\n\
    // 当视图再次显示在分屏视图中时调用，使按钮和弹出视图控制器失效。\n- (void)splitViewController:(UISplitViewController\
    \ *)svc\n     willShowViewController:(UIViewController *)aViewController\ninvalidatingBarButtonItem:(UIBarButtonItem\
    \ *)barButtonItem {\n    NSMutableArray *items = [[self.toolbar items] mutableCopy];\n\
    \    [items removeObjectAtIndex:0];\n    [self.toolbar setItems:items animated:YES];\n\
    \    [items release];\n    self.popoverController = nil;\n}\n```\n\n这段代码为分屏视图控制器委托协议添加了支持。第一个方法在设备旋转为竖屏模式时被调用。它设置将要在\
    \ iPad nib 文件中使用的工具栏，并准备在竖屏方向显示的弹出视图控制器。第二个方法在设备旋转为横屏模式并即将显示完整的分屏视图控制器时被调用。它会移除按钮栏项，并禁用弹出视图控制器。\n\
    \n下一个重要的更新是在 `viewDidLoad` 方法中进行的。在此方法中，我们检查选定的产品是否为 nil，并用产品详情更新用户界面，并加载产品图片。方法的最后一部分是开始监听通知中心的购物车更新。\n"
- fmt: "以下是对给定文本的排版处理结果：\n\nThe next updates are in the `viewDidUnload` method, which\
    \ is pretty standard. Giving the outlets loaded from the nib nil values and removing\
    \ itself as an observer of the notification center undoes what occurs in the `viewDidLoad`\
    \ method. The next method that was updated was `shouldAutorotateToInterfaceOrientation:`,\
    \ and it was updated to return `YES` when the device running the application is\
    \ an iPad.\n\nThe previous section was pretty simple stuff, the next (and final)\
    \ set of changes for this file are\n\n```\n- (IBAction)cartButtonPressed:(id)sender\
    \ {\n        ShoppingCartViewController *cartVC =\n            [[ShoppingCartViewController\
    \ alloc] initWithNibName:@\"ShoppingCartViewController\" \n            bundle:nil];\n\
    \        [cartVC setDelegate:self];\n        UINavigationController *navController\
    \ =\n            [[UINavigationController alloc] initWithRootViewController:cartVC];\n\
    \n        [navController setModalPresentationStyle:UIModalPresentationFormSheet];\n\
    \        [self presentModalViewController:navController animated:YES];\n\n   \
    \     [cartVC release];\n        [navController release];\n}\n\n#pragma mark -\
    \ SCModalDelegate Methods\n-(void) viewController:(UIViewController *)vc didFinishWithData:(id)\
    \ data {\n        [self dismissModalViewControllerAnimated:YES];\n}\n\n-(void)\
    \ viewControllerDidCancel:(UIViewController *)vc {\n        [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nThe first piece is the action for the cart button that will be placed\
    \ on the iPad version's nib. Since it is iPad only, we can cater the implementation\
    \ to the iPad. The final two methods are implementing the delegate methods for\
    \ the modal view controller. This is a great example of a device-specific implementation\
    \ where a different nib will be loaded for one view controller. These are the\
    \ types of design decisions that need to be made when transitioning to or developing\
    \ universal applications.\n\nThe ultimate design is to have the same view controller\
    \ for details that have different nib files that set the appropriate `IBOutlet`s.\
    \ This outlines one of the strengths of the MVC design pattern. Maintaining this\
    \ view controller will stay relatively simple and updating the user interface\
    \ will be easy and won't require controller changes.\n\n### Creating the Product\
    \ Details Nib for the iPad Version\n\nThe nib for the product details screen is\
    \ iPad specific. It shares the same components as the iPhone/iPod Touch screen\
    \ except it has a few minor modifications. [Figure 10–13](#Chapter10.html#fig_10_13)\
    \ shows the final nib that will be loaded by Super Checkout when it is launched\
    \ on an iPad. Notice that it shares the same exact cells and other elements as\
    \ the iPhone/iPod Touch nib with one slight difference—the header view. For the\
    \ iPad, we need to wrap the image and labels into a view and wrap that with another\
    \ view. This way, we can get each view centered to the table.\n\n![images](images/1013.jpg)\n\
    \n**Figure 10–13.** *The final Product Details nib for the iPad*\n\nThe first\
    \ thing we need to do to get the nib going is to create it. Go to File → New →\
    \ New File, and in the sheet that is displayed, select User Interface under the\
    \ iOS section, and select the Empty nib icon (see [Figure 10–14](#Chapter10.html#fig_10_14)).\n\
    \n![images](images/1014.jpg)\n\n**Figure 10–14.** *Selecting the type of nib to\
    \ create*\n\nClick Next, and in the next screen, choose iPad for the Device Family\
    \ (see [Figure 10–15](#Chapter10.html#fig_10_15)).\n\n![images](images/1015.jpg)\n\
    \n**Figure 10–15.** *Selecting the Device Family for the nib*\n\nClick Next. Name\
    \ the nib `ProductDetailsViewController_iPad.xib`, and make sure it is saved to\
    \ the ViewControllers group. (see [Figure 10–16](#Chapter10.html#fig_10_16)).\n\
    \n![images](images/1016.jpg)\n\n**Figure 10–16.** *Saving the nib to the right\
    \ group is important to keep your project organized.*\n\nThe first thing we want\
    \ to do for the new nib is to set the File's Owner proxy. After selecting the\
    \ nib, select File's Owner so the Custom Class section is visible in the Identity\
    \ Inspector of the Utility area (expand it if it isn't visible). Change the class\
    \ from `NSObject` to `ProductDetailsViewController`.\n\nNow, we want to set up\
    \ the view for the view controller. In the Object Library section of the Utility\
    \ area, select View (`UIView`), and drag an instance onto the nib's preview area.\
    \ Now, drag in a Toolbar (`UIToolbar`), and place it at the top of the view. Inside\
    \ the toolbar, select and delete the button in the upper-left corner. Next, drag\
    \ in a Flexible Space Button Bar Item, and to the right of that, drag in a Bar\
    \ Button Item and set its title to **Cart** (edit it by double-clicking the Item\
    \ text). The final piece of the view configuration is to drag in a Table View\
    \ (`UITableView`) under the toolbar. In the attributes inspector for the table\
    \ view, set the Style drop-down to Grouped to make it a grouped table. Last, resize\
    \ the table view to fit the area under the toolbar. The final product should look\
    \ like [Figure 10–17](#Chapter10.html#fig_10_17).\n\n![images](images/1017.jpg)\n\
    \n**Figure 10–17.** *The configured main view for the iPad*\n\nSince we are using\
    \ the same interface elements from the iPhone/iPod Touch version, we can copy\
    \ the elements we're going to use from the iPhone/iPod Touch nib. The easiest\
    \ way to do this is to use “Assistant editor” mode to open both nibs. With the\
    \ `ProductDetailsViewController_iPad` nib editor open, click “Assistant editor”\
    \ on the right side of the toolbar. Depending on your settings, the assistant\
    \ editor will be to the right of the main editor or underneath the main editor.\
    \ Either way, using the Jump Bar of the assistant editor you will be able to choose\
    \ the appropriate file to view in the assistant editor (see [Figure 10–18](#Chapter10.html#fig_10_18)).\n\
    \n![images](images/1018.jpg)\n\n**Figure 10–18.** *Using the Jump Bar to select\
    \ a different file in the assistant editor*\n\nUse the Jump Bar to open `ProductDetailsViewController.xib`\
    \ and select all of the views except the table view. Drag those items over to\
    \ the iPad version of the nib, and go back to the standard editor view. We're\
    \ pretty much done except for one piece."
