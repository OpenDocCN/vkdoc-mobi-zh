    \ means \"no sections\".\nNSFetchedResultsController *aFetchedResultsController\
    \ = [[NSFetchedResultsController alloc]\n    initWithFetchRequest:fetchRequest\n\
    \     managedObjectContext:self.managedObjectContext\n         sectionNameKeyPath:nil\n\
    \                            cacheName:@\"Root\"];\naFetchedResultsController.delegate\
    \ = self;\nself.fetchedResultsController = aFetchedResultsController;\n\n[aFetchedResultsController\
    \ release];\n[fetchRequest release];\n[sortDescriptor release];\n[sortDescriptors\
    \ release];\n\n    NSError *error = nil;\n    if (![self.fetchedResultsController\
    \ performFetch:&error])\n    {\n        /*\n         Replace this implementation\
    \ with code to handle the error appropriately.\n\n         abort() causes the\
    \ application to generate a crash log and terminate. You should not use this function\
    \ in a shipping application, although it may be useful during development. If\
    \ it is not possible to recover from the error, display an alert panel that instructs\
    \ the user to quit the application by pressing the Home button.\n         */\n\
    \        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n     \
    \   abort();\n    }\n\nreturn __fetchedResultsController;\n}\n```\n\nOne last\
    \ thing to do is to add `#import \"Person.h\"` under the header import. All we've\
