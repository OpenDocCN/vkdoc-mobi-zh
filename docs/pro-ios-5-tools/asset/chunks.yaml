    - (void)_parseDataForConnection:(ASIHTTPRequest *)connection;\n\n// Delegate methods\n\
    - (BOOL) _isValidDelegateForSelector:(SEL)selector;\n\n- (NSCache *) imageCache;\n\
    ```\n\n这样，我们就可以控制哪些请求会被缓存，哪些不会。\n\n现在，在实现部分，将我们刚修改的签名更新以匹配声明。接下来，在 `[request setDelegate:self]`\
    \ 之后添加以下代码块：\n\n```\n[request setDelegate:self];\n\nif(cache) {\n[request setDownloadCache:[ASIDownloadCache\
    \ sharedCache]];\n[request setCachePolicy:\nASIAskServerIfModifiedCachePolicy|ASIFallbackToCacheIfLoadFailsCachePolicy];\n\
    [request setCacheStoragePolicy:ASICachePermanentlyCacheStoragePolicy];\n}\nNSString\
    \ *requestIdentifier = [NSString stringWithNewUUID];    \n```\n\n接下来的更新是更改对更新后方法的调用。\n\
    \n在 `_sendRequestWithMethod:path:queryParameters:body:requestType:responseType:`\
    \ 中，将返回值修改为向该方法传递 `NO`，如下所示：\n\n```\nreturn [self _sendRequest:theUrl\n      \
    \          withRequestType:requestType\n                    responseType:responseType\n\
    \                                        cache:NO];\n```\n\n并在 `_sendImageRequestWithURL:`\
    \ 中将返回行修改为如下所示：\n\n```\nreturn [self _sendRequest:theURL\n                withRequestType:SuperCheckoutProductImage\n\
    \                    responseType:SuperCheckoutImage\n                       \
    \             cache:YES];\n```\n\n对于这一层缓存，最重要的更新是：\n\n`[request setDownloadCache:[ASIDownloadCache\
    \ sharedCache]];`\n`[request setCachePolicy:`\n`ASIAskServerIfModifiedCachePolicy|ASIFallbackToCacheIfLoadFailsCachePolicy];`\n\
    `[request setCacheStoragePolicy:ASICachePermanentlyCacheStoragePolicy];`\n\n我们这里所做的，是为请求设置下载缓存为\
    \ ASI 团队提供的默认缓存。然后，我们设置缓存策略，以便向服务器询问请求的资源是否已更改。如果资源未更改，请求将使用缓存。如果资源已更改，则加载新资源并缓存。如果请求失败，则会使用缓存（如果存在的话）。\n\
    \n最后一行是告诉缓存永久存储文件。默认情况下，缓存设置为设备上的缓存目录。当设备连接到 iTunes 时，此文件夹不会同步到电脑，并且 iOS 会在必要时清空该文件夹。\n\
    \n现在我们已经有了一个可靠的缓存方案，可以进入最终测试阶段——电池寿命管理。\n"
- fmt: '### Looking at Power Management


    “How''s the battery life?” is one of the first questions any person asks when
    talking about a mobile device. As mobile developers, we are responsible for making
    sure our applications are not only memory efficient but also power efficient.
    This means we must write efficient code that doesn''t leak.


    This balance is a difficult, especially with more powerful devices and more types
    of chips being packed in them. The iPhone 4, for example, has chips for almost
    every function: A CPU, a GPU, `802.11`, `GSM`/`CDMA`, accelerometer, compass and
    a gyroscope round out the main types of chips within that small package powered
    by a battery. Since we have access to each of the different types of sensors and
    chips, we have to be extremely careful which ones we use and how long we use them.


    #### The Hardware


    Each iOS device has at least one radio of some sort. They all have Wi-Fi radios
    and iPhone/iPad 3G have `GSM`/`CDMA` radios that can communicated over a 3G or
    2G network. These radios consume quite a bit of power while powered on. The operating
    system uses different techniques to turn off each chip when it is not in use,
    so it is up to the developer to activate those chips when turning them on is absolutely
    necessary.


    Using the 3G chip is the quickest ways to drain the device''s battery. This is
    only exacerbated by the fact that the 3G networks keep the chip on full power
    for a few seconds after data transmission is complete. [Figure 6–16](#Chapter06.html#fig_6_16)
    shows the power usage over time if an application performs short bursts in rapid
    succession over a 3G network.


    ![images](images/0616.jpg)


    **Figure 6–16.** *In this power chart for a 3G radio, notice the chip stays on
    high power for a few seconds.*


    The other, non–Wi-Fi radio is the 2G radio. This radio consumes less power than
    the 3G chip, but the transmission speed is slower, so it might be less efficient
    for transmitting large payloads across the Internet. The 2G chip is different
    from the 3G chip in that it will power down to a low power state as soon as the
    data transmission is complete. [Figure 6–17](#Chapter06.html#fig_6_17) shows the
    power usage over time.


    ![images](images/0617.jpg)


    **Figure 6–17.** *The power chart for a 2G radio*


    The last, and most efficient, radio is the Wi-Fi radio. Like the 2G radio, the
    Wi-Fi radio will enter a low power state when the data transfer is finished. Since
    the data transfer speed of Wi-Fi is extremely fast, this is the preferred data
    transfer radio for the device. Since we''ve shown the power vs. time graphs for
    the 3G and 2G radios, [Figure 6–18](#Chapter06.html#fig_6_18) will round out the
    collection.


    ![images](images/0618.jpg)


    **Figure 6–18.** *The Wi-Fi chip is the fastest and most efficient chip on the
    device.*


    Managing data communication is very important to maintain good battery life. Keeping
    transmission session as short as possible and letting the radios idle as much
    as possible will keep the battery from draining as fast and will make for happier
    users.


    The rest of the chips on the device, the CPU, GPU, GPS and motion chips, all have
    differing power requirements. The CPU and GPU are responsible for running the
    code and rendering the on screen content, respectively. This means that writing
    fast and efficient code keeps the CPU at a lower load and keeping animations/views
    relatively simple will keep the GPU from taking a large amount of power. These
    chips are always active, so the only way to keep them idle is to write good code.
    Frameworks activate the other chips in the device. `Core Location` controls the
    GPS and `Core Motion` controls the accelerometer and gyroscope. As we move on
    to the more software controllable devices, we will need to discuss how our code
    affects these chips and ultimately, the battery life.


    #### Coding Techniques


