    The idea here is to create a local branch for a feature and roll that set of changes
    into the master branch when the feature is complete. In short, this allows us
    to have a feature branch so we could quickly switch back to the master branch
    to work on something else without losing any changes. Since we''re using Git,
    we can leverage some of the basic integrations with Xcode and leave some of the
    more powerful features for the command line (or GUI tool of your choice). Gone
    are the days of a commit breaking the build, causing you to anger your team and
    buy them donuts.


    **NOTE:** We can also branch projects with Subversion. The difference is the branches
    are created on the server as well. The concept is the same as with Git, but the
    location of everything is slightly different.


    Before we begin mucking around with the application, we''re going to create a
    branch and merge it when we''re finished fixing our iteration of updates to the
    application. To create the branch, open Xcode 4 and go to File ![image](images/U001.jpg)
    Source Control ![image](images/U001.jpg) Repositories, which will open up the
    Organizer window. Click the Repositories tab. Find Super Checkout in the list
    on the left, and click Branches to see one branch in the list. Click the Add Branch
    button at the bottom of the window. A sheet like the one shown in [Figure 4–1](#Chapter04.html#fig_4_1)
    is displayed that lets you create the branch. Type **ARC_Transition** for the
    branch name and base it off the master branch by setting the starting point to
    “master.” Check the option to automatically switch to the branch so we can begin
    making changes after the branch is complete.


    ![images](images/0401.jpg)


    **Figure 4–1.** *Creating a new branch is easy via Xcode 4''s new source control
    management GUI.*


    Finally, click Create. Now that we have switched to the newly created branch,
    we can start performing major surgery on this branch without messing up anything,
    other than possibly the current branch. We''re now ready to start transitioning
    Super Checkout to automatic reference counting. Each chapter will create one or
    more branches, so we can collect each set of updates to the repository. This doesn''t
    follow what will happen in real life, but we''re going to get as close to it as
    we can.


    ### Automatic Reference Counting


    Automatic reference counting, or ARC, is a brand new technology Apple has given
    us in the latest LLVM compiler. When the ARC flag is set on the compiler, all
    of the memory management code is generated for you. This means any type of memory
    management code can now get removed from the source. Put simply, any calls to
    release, copy, retain, or autorelease are simply removed.


    Memory management isn''t quite a simple as that though. Some new lifetime qualifiers
    must be implemented to give the compiler hints on what needs to be done from a
    memory management point of view. These qualifiers are


    *   `_strong`: In a strong (retained) reference, the balancing release or autorelease
    is generated by the compiler.

    *   `_weak`: In this reference, when the reference is released, the pointer is
    set to `nil` automatically.

    *   `_unsafe_unretained`: This is simply a reference. This qualifier is dangerous
    because you can still have a dangling pointer.

    *   `_autoreleasing`: This one tells the compiler that it will be passed by reference
    (`id *`) and will be autoreleased upon return.


    When declaring properties, there are three new property attributes; two can be
    used in iOS 4 and above and one can be used only in iOS 5:


    *   `strong`: This is a strong reference; it works like the `__strong` qualifier
    and can be used in iOS 4 and above.

    *   `weak`: An automatically nilling reference, like the `__weak` qualifier, and
    it can only be used in iOS 5.

    *   `unsafe_unretained`: This is simply a reference, like the `__unsafe_unretained`
    qualifier, and can be used in iOS 4 and above.


    This list is not exhaustive, and there are many other new things to keep in mind
    when developing with ARC enabled. One such thing is the autorelease pool. In short,
    with ARC, there is no such thing as an `NSAutoreleasePool` object. Instead, you
    will use the new `@autorelease` block. It looks like what you see in [Listing
    4–1](#Chapter04.html#list_4_1).


    **Listing 4–1.** *The New and Improved Autorelease Pool*


    `@autoreleasepool {`

    `        //long loop with a lot of objects created and destroyed`

    `}`


    The next important thing to remember when coding with ARC is to never invoke retain,
    release, or autorelease. Ever. The compiler will even complain about it when you
    do. ARC enforces several other rules, and the “Programming with ARC” article in
    Apple''s developer documentation is a great place to start. When we convert our
    project to ARC, we might run into some of these rules during the conversion. If
    we do, we''ll talk about them.'
  trans: "\n### 分支是我们的好帮手\n\n“尽早提交、频繁提交”是开发者应当奉行的准则。借助 Git 或 Mercurial 这类分布式版本控制系统，这一准则得以更好地实现。具体做法是：为某个功能创建一个本地分支，待功能完成后，再将这组变更合并到\
    \ `master` 分支。简而言之，这样我们就能拥有一个功能分支，从而可以快速切换回 `master` 分支处理其他任务，而不会丢失任何更改。由于我们使用的是\
    \ Git，可以利用它与 Xcode 的一些基本集成，同时将更强大的功能留给命令行（或你选择的 GUI 工具）来处理。那种因一次提交导致构建失败、惹怒团队并被迫买甜甜圈道歉的日子，已经一去不复返了。\n\
    \n**注意：** 我们也可以用 Subversion 为项目创建分支。区别在于，Subversion 的分支也会在服务器上创建。概念上与 Git 相同，但所有内容的存放位置略有不同。\n\
    \n在开始对应用程序进行改动之前，我们先创建一个分支，待本轮应用程序更新迭代完成后，再将其合并。要创建分支，请打开 Xcode 4，转到 `File` ![image](img/U001.jpg)\
    \ `Source Control` ![image](img/U001.jpg) `Repositories`，这将打开“Organizer”窗口。点击\
    \ `Repositories` 标签页。在左侧列表中找到 `Super Checkout`，点击 `Branches`，列表中会显示一个分支。点击窗口底部的\
    \ `Add Branch` 按钮。此时会显示一个如 图 4-1 所示的操作表，供您创建分支。在分支名称处输入 `ARC_Transition`，并将起始点设置为“master”，使其基于\
    \ `master` 分支。勾选自动切换到该分支的选项，这样分支创建完成后我们就可以立即开始修改。\n\n![images](img/0401.jpg)\n\
    \n**图 4-1.** *通过 Xcode 4 新的源代码管理 GUI 创建新分支非常容易。*\n\n最后，点击 `Create`。现在，我们已经切换到了新创建的分支，可以开始在这个分支上进行重大改造，而不会影响其他内容（最多只影响当前分支）。我们已准备好开始将\
    \ `Super Checkout` 迁移到自动引用计数。每一章都会创建一个或多个分支，这样我们就可以将每一组更新都收集到仓库中。虽然这并不完全符合真实开发场景，但我们会尽可能贴近实际。\n\
    \n### 自动引用计数\n\n自动引用计数（ARC）是苹果在最新的 LLVM 编译器中提供的一项全新特性。当编译器启用了 ARC 标志后，所有内存管理代码都会自动为您生成。这意味着源代码中任何类型的内存管理代码都可以被移除。简单来说，所有对\
    \ `release`、`copy`、`retain` 或 `autorelease` 的调用都会被直接删除。\n\n然而，内存管理并非如此简单。必须引入一些新的生命周期限定符，为编译器提供关于内存管理方面所需操作的提示。这些限定符包括：\n\
    \n*   `__strong`：对于强引用（保留），编译器会生成对应的 release 或 autorelease 操作。\n*   `__weak`：对于弱引用，当所指对象被释放时，指针会自动被设置为\
    \ `nil`。\n*   `__unsafe_unretained`：这只是一个普通的引用。这个限定符很危险，因为仍然可能出现悬垂指针。\n*   `__autoreleasing`：该限定符告诉编译器，该参数将通过引用（`id\
    \ *`）传递，并在返回时自动释放。\n\n在声明属性时，有三个新的属性特性；其中两个可用于 iOS 4 及以上版本，一个仅可用于 iOS 5：\n\n*\
    \   `strong`：这是一个强引用；其作用类似于 `__strong` 限定符，可用于 iOS 4 及以上版本。\n*   `weak`：一个自动置\
    \ nil 的引用，类似于 `__weak` 限定符，仅可用于 iOS 5。\n*   `unsafe_unretained`：这只是一个普通的引用，类似于\
    \ `__unsafe_unretained` 限定符，可用于 iOS 4 及以上版本。\n\n这份列表并不详尽，在启用 ARC 进行开发时，还有许多其他新事项需要注意。其中之一就是自动释放池。简而言之，使用\
    \ ARC 后，不再有 `NSAutoreleasePool` 对象。取而代之的是新的 `@autorelease` 块。效果如 代码清单 4-1 所示。\n\
    \n**代码清单 4-1.** *全新且改进的自动释放池*\n\n```\n@autoreleasepool {\n        // 长时间循环，创建并销毁大量对象\n\
    }\n```\n\n使用 ARC 编码时，另一个需要牢记的重点是：永远不要调用 `retain`、`release` 或 `autorelease`。永远不要。如果你调用了，编译器甚至会报错。ARC\
    \ 还强制执行其他一些规则，苹果开发者文档中的“Programming with ARC”一文是很好的入门资料。当我们将项目转换为 ARC 时，在转换过程中可能会遇到其中一些规则。如果遇到了，我们会进行讨论。\n"
- fmt: "### Converting to ARC\n\nWe're going to convert Super Checkout to ARC now.\
    \ This conversion will require some major surgery on the code base, which is why\
    \ we branched the code. So, without further ado, let's start the conversion. The\
    \ first thing is open up the project and go to Edit → Refactor → Convert to Objective-C\
    \ ARC. When you do this, a sheet (see [Figure 4–2](#Chapter04.html#fig_4_2)) is\
    \ displayed. Check both of the boxes to convert the unit test and application\
    \ targets. If any of the targets are currently using an older version of the compiler,\
    \ the compiler version will be updated to LLVM 3.0.\n\n![images](images/0402.jpg)\n\
    \n**Figure 4–2.** *The target selection sheet before the precheck is performed.*\n\
    \nClicking the Precheck button will perform a compilation and inform you whether\
    \ or not the project can be converted. As [Figure 4–3](#Chapter04.html#fig_4_3)\
    \ shows, Super Checkout is not quite ready for ARC yet. We will need to fix some\
    \ errors first.\n\n![images](images/0403.jpg)\n\n**Figure 4–3.** *The errors returned\
    \ by the precheck run.*\n\nClicking the first item in the list will take us to\
    \ `SuperCheckoutAPIEngine.h` and you'll find that the file was modified by adding\
    \ `__weak` to the property declaration. To fix this, remove `__weak` and replace\
    \ assign with `unsafe_unretained`. We are doing this because we're targeting iOS\
    \ 4 and later. If we were targeting iOS 5, we would use the `weak` attribute.\
    \ The line should now look like this:\n\n```\n@property (nonatomic, unsafe_unretained)\
    \ NSObject<SuperCheckoutAPIEngineDelegate> *delegate;\n```\n\nIn this instance,\
    \ there is also an `ivar` declared previously. Since the `ivar` is declared and\
    \ the property attributes are set, we have two options. The first is to label\
    \ the delegate `ivar` as `__unsafe_unretained`. The second is to remove the line\
    \ altogether and let the compiler synthesize the `ivar`. Since we are adopting\
    \ the modern way of doing things, remove the line altogether. This will make the\
    \ `ivar` block of the class look like this:\n\n```\n@interface SuperCheckoutAPIEngine\
    \ : NSObject<SCJSONParserDelegate> {\n    NSMutableDictionary *connections;  \
    \ // MGTwitterHTTPURLConnection objects\n    NSString *APIDomain;\n}\n```\n\n\
    There are some `ivar`s remaining. Since the default behavior for ARC is strong,\
    \ we don't need to update them. Now, perform the transition again. This time,\
    \ the error you run into is an `NSString` being cast as a `CFStringRef`. We know\
    \ we can do this because `NSString` is toll-free bridged between the CF object\
    \ and the Objective-C object. If you notice, Xcode will recommend to place `__bridge`\
    \ in front of the `CFStringRef` cast using the Fix-It feature. Go ahead and let\
    \ Xcode do this.\n\nPerform the conversion again. This should bring you a new\
    \ set of errors. This set exists in some external library code. Since we're in\
    \ a branch, let's go ahead and modify the code. None of the problems are particularly\
    \ tricky. Either let Fix-It add the appropriate code or remove calls to memory\
    \ management code. When you are done with these edits, run the conversion tool\
    \ again and if all the problems have been removed, you'll be greeted with [Figure\
    \ 4–4](#Chapter04.html#fig_4_4). This sheet tells you that the conversion will\
    \ be successful. Click Next to continue.\n\n![images](images/0404.jpg)\n\n**Figure\
    \ 4–4.** *The precheck has passed, and now, we're ready to make the final conversion\
    \ to ARC.*\n\nAfter clicking Next, Xcode will recommend creating a snapshot. Snapshots\
    \ are great to take a quick snapshot of the current configuration just in case\
    \ something goes wrong during the conversion process. Click Enable, and Xcode\
    \ will continue with the conversion after creating a new snapshot.\n\nWhen the\
    \ conversion is complete, Xcode will give you a view as to what was changed and\
    \ will give you the opportunity to back out if some of the changes look a bit\
    \ extreme (see [Figure 4–5](#Chapter04.html#fig_4_5)). Click Continue, and then\
    \ commit your code with a meaningful commit message.\n\n![images](images/0405.jpg)\n\
    \n**Figure 4–5.** *The conversion to ARC is complete, and Xcode is showing you\
    \ its handiwork.*\n\n### Recognizing Retain Cycles\n\nAs great as ARC is, we still\
    \ have to be cognizant as to what is going on within our application. You may\
    \ be saying, “It is 2011, and I still have to worry about memory leaks?” The answer\
    \ is yes. No matter how sophisticated our tools get, they won't catch everything.\
    \ The most likely error we'll run into with ARC is the retain cycle.\n\nA retain\
    \ cycle is defined as an object graph that contains a closed loop of retained\
    \ references. [Figure 4–6](#Chapter04.html#fig_4_6) shows a typical retain cycle.\
    \ If we release objects A and B, ARC will think that the rest of the objects are\
    \ still in use and will not insert the appropriate release statements.\n\n![images](images/0406.jpg)\n\
    \n**Figure 4–6.** *In this common retain cycle, the numbers show the retain count\
    \ before A and B are deallocated.*\n\nSo how do we fix retain cycles? Well, it\
    \ depends. If we are targeting iOS 5 and above, make one of the references in\
    \ the cycle a weak reference to break the cycle. [Figure 4–7](#Chapter04.html#fig_4_7)\
    \ shows what the object graph will look like if we make the appropriate reference\
    \ weak.\n\n![images](images/0407.jpg)\n\n**Figure 4–7.** *Breaking the cycle requires\
    \ making the correct reference.*\n\nBy making the reference to the parent node\
    \ in the object graph, the graph is reclaimed when A and B go away.\n\nHow do\
    \ we detect these cycles? Fortunately, Instruments has a new feature that detects\
    \ retain cycles and visually shows you what the cycle looks like. When we cover\
    \ using Instruments to detect leaks, we'll take a look at how Instruments will\
    \ show you these cycles in a very simple example.\n\n## Getting Back to Manual\
    \ Reference Counting\n\nWe're heading back to the land of `release`, `retain`,\
    \ and `autorelease`. ARC is nice, but many things can be learned from manual reference\
    \ counting. Since we created a branch for the ARC conversion, we can do the same\
    \ thing to keep our fixes for the memory related issues we fix throughout this\
    \ chapter. Give this new branch a name of `Memory_Fixes`, and base it off of the\
    \ master branch and remember to switch to the new branch after creation!\n\n##\
    \ Establishing Healthy Coding Practices\n\nBenjamin Franklin once said, “An ounce\
    \ of prevention is worth a pound of cure.” So before we dive into modifying the\
    \ code, let's take a moment to discuss some best practices for proper memory management\
    \ and things you can do while developing an application to prevent memory-related\
    \ bugs and crashes before they crop up. These practices range from how the language\
    \ and runtime work to good coding practices and general guidelines.\n\nThe first\
    \ thing about memory management, especially with iOS development, is the retain\
    \ count. Since the iOS platform does not have garbage collection, we have to maintain\
    \ our memory appropriately manually. Understanding the concepts of when to retain\
    \ memory and when to release it is absolutely necessary to be a good citizen on\
    \ an iOS device. We won't spend too much time talking about the nuances of retain\
    \ counts and these things, but it is necessary to touch some of the highlights."
  raw: '#### Converting to ARC


    We''re going to convert Super Checkout to ARC now. This conversion will require
    some major surgery on the code base, which is why we branched the code. So, without
    further ado, let''s start the conversion. The first thing is open up the project
    and go to Edit![image](images/U001.jpg)Refactor![image](images/U001.jpg)Convert
    to Objective-C ARC. When you do this, a sheet (see [Figure 4–2](#Chapter04.html#fig_4_2))
    is displayed. Check both of the boxes to convert the unit test and application
    targets. If any of the targets are currently using an older version of the compiler,
    the compiler version will be updated to LLVM 3.0.


    ![images](images/0402.jpg)


    **Figure 4–2.** *The target selection sheet before the precheck is performed.*


    Clicking the Precheck button will perform a compilation and inform you whether
    or not the project can be converted. As [Figure 4–3](#Chapter04.html#fig_4_3)
    shows, Super Checkout is not quite ready for ARC yet. We will need to fix some
    errors first.


    ![images](images/0403.jpg)


    **Figure 4–3.** *The errors returned by the precheck run.*


    Clicking the first item in the list will take us to `SuperCheckoutAPIEngine.h`
    and you''ll find that the file was modified by adding `__weak` to the property
    declaration. To fix this, remove `__weak` and replace assign with `unsafe_unretained`.
    We are doing this because we''re targeting iOS 4 and later. If we were targeting
    iOS 5, we would use the `weak` attribute. The line should now look like this:


    `@property (nonatomic, unsafe_unretained) NSObject<SuperCheckoutAPIEngineDelegate>`

    `*delegate;`


    In this instance, there is also an `ivar` declared previously. Since the `ivar`
    is declared and the property attributes are set, we have two options. The first
    is to label the delegate `ivar` as `__unsafe_unretained`. The second is to remove
    the line altogether and let the compiler synthesize the `ivar`. Since we are adopting
    the modern way of doing things, remove the line altogether. This will make the
    `ivar` block of the class look like this:


    `@interface SuperCheckoutAPIEngine : NSObject<SCJSONParserDelegate> {`

    `    NSMutableDictionary *connections;   // MGTwitterHTTPURLConnection objects`

    `    NSString *APIDomain;`

    `}`


    There are some `ivar`s remaining. Since the default behavior for ARC is strong,
    we don''t need to update them. Now, perform the transition again. This time, the
    error you run into is an `NSString` being cast as a `CFStringRef`. We know we
    can do this because `NSString` is toll-free bridged between the CF object and
    the Objective-C object. If you notice, Xcode will recommend to place `__bridge`
    in front of the `CFStringRef` cast using the Fix-It feature. Go ahead and let
    Xcode do this.


    Perform the conversion again. This should bring you a new set of errors. This
    set exists in some external library code. Since we''re in a branch, let''s go
    ahead and modify the code. None of the problems are particularly tricky. Either
    let Fix-It add the appropriate code or remove calls to memory management code.
    When you are done with these edits, run the conversion tool again and if all the
    problems have been removed, you''ll be greeted with [Figure 4–4](#Chapter04.html#fig_4_4).
    This sheet tells you that the conversion will be successful. Click Next to continue.


    ![images](images/0404.jpg)


    **Figure 4–4.** *The precheck has passed, and now, we''re ready to make the final
    conversion to ARC.*


    After clicking Next, Xcode will recommend creating a snapshot. Snapshots are great
    to take a quick snapshot of the current configuration just in case something goes
    wrong during the conversion process. Click Enable, and Xcode will continue with
    the conversion after creating a new snapshot.


    When the conversion is complete, Xcode will give you a view as to what was changed
    and will give you the opportunity to back out if some of the changes look a bit
    extreme (see [Figure 4–5](#Chapter04.html#fig_4_5)). Click Continue, and then
    commit your code with a meaningful commit message.


    ![images](images/0405.jpg)


    **Figure 4–5.** *The conversion to ARC is complete, and Xcode is showing you its
    handiwork.*


    #### Recognizing Retain Cycles


    As great as ARC is, we still have to be cognizant as to what is going on within
    our application. You may be saying, “It is 2011, and I still have to worry about
    memory leaks?” The answer is yes. No matter how sophisticated our tools get, they
    won''t catch everything. The most likely error we''ll run into with ARC is the
    retain cycle.


    A retain cycle is defined as an object graph that contains a closed loop of retained
    references. [Figure 4–6](#Chapter04.html#fig_4_6) shows a typical retain cycle.
    If we release objects A and B, ARC will think that the rest of the objects are
    still in use and will not insert the appropriate release statements.


    ![images](images/0406.jpg)


    **Figure 4–6.** *In this common retain cycle, the numbers show the retain count
    before A and B are deallocated.*


    So how do we fix retain cycles? Well, it depends. If we are targeting iOS 5 and
    above, make one of the references in the cycle a weak reference to break the cycle.
    [Figure 4–7](#Chapter04.html#fig_4_7) shows what the object graph will look like
    if we make the appropriate reference weak.


    ![images](images/0407.jpg)


    **Figure 4–7.** *Breaking the cycle requires making the correct reference.*


    By making the reference to the parent node in the object graph, the graph is reclaimed
    when A and B go away.


    How do we detect these cycles? Fortunately, Instruments has a new feature that
    detects retain cycles and visually shows you what the cycle looks like. When we
    cover using Instruments to detect leaks, we''ll take a look at how Instruments
    will show you these cycles in a very simple example.


    ### Getting Back to Manual Reference Counting


    We''re heading back to the land of release, retain, and autorelease. ARC is nice,
    but many things can be learned from manual reference counting. Since we created
    a branch for the ARC conversion, we can do the same thing to keep our fixes for
    the memory related issues we fix throughout this chapter. Give this new branch
    a name of `Memory_Fixes`, and base it off of the master branch and remember to
    switch to the new branch after creation!


    ### Establishing Healthy Coding Practices


    Benjamin Franklin once said, “An ounce of prevention is worth a pound of cure.”
    So before we dive into modifying the code, let''s take a moment to discuss some
    best practices for proper memory management and things you can do while developing
    an application to prevent memory-related bugs and crashes before they crop up.
    These practices range from how the language and runtime work to good coding practices
    and general guidelines.


    The first thing about memory management, especially with iOS development, is the
    retain count. Since the iOS platform does not have garbage collection, we have
    to maintain our memory appropriately manually. Understanding the concepts of when
    to retain memory and when to release it is absolutely necessary to be a good citizen
    on an iOS device. We won''t spend too much time talking about the nuances of retain
    counts and these things, but it is necessary to touch some of the highlights.'
  trans: "\n### 转换为 ARC\n\n现在我们要将 Super Checkout 转换为 ARC。这次转换需要对代码库进行一些重大修改，这也是我们创建分支的原因。那么，闲话少说，让我们开始转换吧。首先打开项目，进入\
    \ Edit → Refactor → Convert to Objective-C ARC。执行此操作后，会显示一个表单（参见图 4-2）。勾选两个复选框以转换单元测试和应用目标。如果任何目标当前使用的是旧版编译器，编译器版本将更新为\
    \ LLVM 3.0。\n\n![images](img/0402.jpg)\n\n**图 4-2.** *执行预检查前显示的目标选择表单。*\n\n点击\
    \ Precheck 按钮将执行编译，并告知您项目是否可以转换。如图 4-3 所示，Super Checkout 尚未完全准备好进行 ARC 转换。我们需要先修复一些错误。\n\
    \n![images](img/0403.jpg)\n\n**图 4-3.** *预检查运行返回的错误。*\n\n点击列表中的第一项，我们会跳转到 `SuperCheckoutAPIEngine.h`，您会发现该文件已被修改，属性声明中添加了\
    \ `__weak`。要修复此问题，请移除 `__weak`，并将 assign 替换为 `unsafe_unretained`。我们这样做是因为目标平台是\
    \ iOS 4 及更高版本。如果目标平台是 iOS 5，我们会使用 `weak` 属性。现在这行代码应该如下所示：\n\n```\n@property (nonatomic,\
    \ unsafe_unretained) NSObject<SuperCheckoutAPIEngineDelegate> *delegate;\n```\n\
    \n在此实例中，之前还声明了一个 `ivar`。由于 `ivar` 已声明且属性已设置，我们有两个选择。第一个是将委托 `ivar` 标记为 `__unsafe_unretained`。第二个是直接删除该行，让编译器合成\
    \ `ivar`。既然我们采用现代方式，就完全删除该行。这样类的 `ivar` 块将如下所示：\n\n```\n@interface SuperCheckoutAPIEngine\
    \ : NSObject<SCJSONParserDelegate> {\n    NSMutableDictionary *connections;  \
    \ // MGTwitterHTTPURLConnection 对象\n    NSString *APIDomain;\n}\n```\n\n还有一些剩余的\
    \ `ivar`。由于 ARC 的默认行为是强引用，我们无需更新它们。现在，再次执行转换。这次，您遇到的错误是一个 `NSString` 被强制转换为 `CFStringRef`。我们知道可以进行此操作，因为\
    \ `NSString` 在 CF 对象和 Objective-C 对象之间是免费桥接的。如果您注意到，Xcode 会建议使用 Fix-It 功能在 `CFStringRef`\
    \ 强制转换前放置 `__bridge`。继续操作，让 Xcode 完成此操作。\n\n再次执行转换。这次会带来一组新的错误。这些错误存在于一些外部库代码中。由于我们在分支中，让我们继续修改代码。这些问题都不特别棘手。要么让\
    \ Fix-It 添加适当的代码，要么删除对内存管理代码的调用。完成这些编辑后，再次运行转换工具，如果所有问题都已解决，您将看到图 4-4 的界面。这个表单告诉您转换将成功。点击\
    \ Next 继续。\n\n![images](img/0404.jpg)\n\n**图 4-4.** *预检查已通过，现在，我们准备最终转换为 ARC。*\n\
    \n点击 Next 后，Xcode 会建议创建快照。快照非常适合快速保存当前配置的快照，以防转换过程中出现问题。点击 Enable，Xcode 将在创建新快照后继续转换。\n\
    \n转换完成后，Xcode 会显示更改内容，并允许您在某些更改看起来过于极端时撤销（参见图 4-5）。点击 Continue，然后使用有意义的提交信息提交您的代码。\n\
    \n![images](img/0405.jpg)\n\n**图 4-5.** *转换为 ARC 已完成，Xcode 向您展示其成果。*\n\n### 识别保留循环\n\
    \n尽管 ARC 非常出色，我们仍然需要关注应用程序内部的情况。您可能会说，“都 2011 年了，我还需要担心内存泄漏吗？”答案是肯定的。无论我们的工具变得多么复杂，它们也无法捕获所有问题。我们在使用\
    \ ARC 时最可能遇到的错误是保留循环。\n\n保留循环被定义为包含封闭循环保留引用的对象图。图 4-6 显示了一个典型的保留循环。如果我们释放对象 A\
    \ 和 B，ARC 会认为其余对象仍在使用中，并且不会插入适当的释放语句。\n\n![images](img/0406.jpg)\n\n**图 4-6.**\
    \ *在这个常见的保留循环中，数字显示了在释放 A 和 B 之前的保留计数。*\n\n那么我们如何修复保留循环呢？这取决于具体情况。如果目标平台是 iOS\
    \ 5 及以上版本，将循环中的一个引用设为弱引用以打破循环。图 4-7 显示了将适当引用设为弱引用后的对象图。\n\n![images](img/0407.jpg)\n\
    \n**图 4-7.** *打破循环需要设置正确的引用。*\n\n通过将对象图中的父节点引用设为弱引用，当 A 和 B 被释放时，该图会被回收。\n\n我们如何检测这些循环？幸运的是，Instruments\
    \ 有一个新功能可以检测保留循环，并以可视化方式向您展示循环的样子。当我们介绍使用 Instruments 检测泄漏时，我们将通过一个非常简单的示例来看看\
    \ Instruments 如何向您展示这些循环。\n\n## 回到手动引用计数\n\n我们将回到 `release`、`retain` 和 `autorelease`\
    \ 的世界。ARC 很好，但通过手动引用计数可以学到很多东西。由于我们为 ARC 转换创建了一个分支，我们可以做同样的事情，将我们在本章中修复的内存相关问题保存下来。将此新分支命名为\
    \ `Memory_Fixes`，基于主分支创建，并记得在创建后切换到新分支！\n\n## 建立健康的编码实践\n\n本杰明·富兰克林曾说过：“一分预防胜于十分治疗。”因此，在我们深入修改代码之前，让我们花点时间讨论一些关于正确内存管理的最佳实践，以及您在开发应用程序时可以用来预防内存相关错误和崩溃的方法。这些实践涵盖了语言和运行时的工作原理、良好的编码实践以及通用准则。\n\
    \n关于内存管理，尤其是在 iOS 开发中，首先要了解的是保留计数。由于 iOS 平台没有垃圾回收机制，我们必须适当地手动管理内存。理解何时保留内存以及何时释放内存的概念，对于成为\
    \ iOS 设备上的良好公民是绝对必要的。我们不会花太多时间讨论保留计数的细微差别等内容，但有必要提一些要点。\n"
- fmt: "#### To Retain or Not to Retain, That Is the Question\n\nA common mistake\
    \ that is made when developing applications in Objective-C is not releasing retained\
    \ memory. Most of the time, failing to release memory is a mistake, so picking\
    \ up some good habits is always a good thing. Unreleased memory leaks, plain and\
    \ simple. A good rule of thumb for knowing when to release memory is given by\
    \ the acronym NARC:\n\n- `New`\n- `Alloc`\n- `Retain`\n- `Copy`\n\nAnytime any\
    \ of these messages is sent to an object, you now own that object, so you must\
    \ release it when you are finished. However, there are always exceptions to this\
    \ rule. When a method should return an object, sending `autorelease` to the object\
    \ is always necessary. There are some performance considerations when using `autorelease`\
    \ however. Since `autorelease` sends the object to live in the autorelease pool\
    \ for the current scope block, sending thousands of objects to such a pool would\
    \ be a bad idea, especially on an older iOS device. A good example of what we're\
    \ talking about is creating a fast loop to create one million strings ([Listing\
    \ 4–2](#Chapter04.html#list_4_2)).\n\n**Listing 4–2.** *One Million Autoreleased\
    \ Strings!*\n\n```\nfor(int i = 0; i < 1000000; i++) {\n     string = [[[NSString\
    \ alloc] initWithFormat:@\"String %i\", i] autorelease];\n     //Process string\
    \ and create other autoreleased objects….\n}\n```\n\nThe preceding code creates\
    \ one million strings and autoreleases them. Running the Allocations instrument\
    \ against this code gives you the graph shown in [Figure 4–7](#Chapter04.html#fig_4_7).\n\
    \nThe appropriate way to fix this issue can be found in [Listing 4–3](#Chapter04.html#list_4_3).\n\
    \n**Listing 4–3.** *One Million Autoreleased Strings in Their Very Own Autorelease\
    \ Pools*\n\n```\nfor(int i = 0; i < 1000000; i++) {\n     NSAutoreleasePool *pool\
    \ = [[NSAutoreleasePool alloc] init];\n     string = [[[NSString alloc] initWithFormat:@\"\
    String %i\", i] autorelease];\n     //Process string and create other autoreleased\
    \ objects….\n     [pool release];\n}\n```\n\nCompare the graph from [Figure 4–8](#Chapter04.html#fig_4_8)\
    \ to the graph in [Figure 4–9](#Chapter04.html#fig_4_9). What these graphs don't\
    \ show is the scale. Since we're creating one million strings, each string is\
    \ allocated and autoreleased upon the next iteration of the run loop. By creating\
    \ an autorelease pool, as [Figure 4–8](#Chapter04.html#fig_4_8) shows, the system\
    \ reclaims the memory more frequently and allows for better utilization of the\
    \ resources available.\n\n![images](images/0408.jpg)\n\n**Figure 4–8.** *The Allocation\
    \ graph of one million strings autoreleased to the same pool*\n\n![images](images/0409.jpg)\n\
    \n**Figure 4–9.** *The Allocation graph of one million strings autoreleased in\
    \ their own pool*\n\nSince devices have a finite amount of memory, using autorelease\
    \ pools is absolutely necessary to keep your application from triggering memory\
    \ warnings and the operating system from terminating your application as well\
    \ as keeping the application responsive. Manual releasing of objects during a\
    \ tight loop is expensive.\n\nRemembering and being disciplined when managing\
    \ memory is the key to reducing memory leaks. Take a look at your approach and\
    \ decide which memory management technique is best for you. If you are creating\
    \ discrete objects and manipulating them, release them when you are finished.\
    \ If you are creating a large number of objects, creating an autorelease pool\
    \ and draining it when you are finished is the best idea. The best time to do\
    \ the latter is when performing a large number of string operations, since most\
    \ string operations return autoreleased string instances.\n\nOverall, remembering\
    \ when to release or autorelease an object isn't very difficult. As long as the\
    \ memory management is done when the code is first written, memory leaks will\
    \ be kept at a minimum and leave you free to track down other types of issues.\n\
    \n#### Connecting Properties and Polymorphic Dots\n\nNext in our discussion of\
    \ memory management, we need to talk about Objective-C 2.0 properties. This very\
    \ popular feature comes with the new Objective-C runtime and brings a new concept\
    \ to the Objective-C language—dot notation.\n\nLet's take a quick look at what\
    \ properties give us and how they fit in the scope of memory management. For the\
    \ sake of this discussion, we're going to talk about an object defined in [Listings\
    \ 4–4](#Chapter04.html#list_4_4) and [4–5](#Chapter04.html#list_4_4).\n\n**Listing\
    \ 4–4.** *The Header for Foo*\n\n```\n@interface Foo : NSObject {\n     NSDictionary\
    \ *bar;\n}\n\n@property (retain, nonatomic) NSDictionary *bar;\n\n@end\n```\n\n\
    **Listing 4–5.** *The Implementation for Foo*\n\n```\n#import \"Foo.h\"\n@implementation\
    \ Foo\n@synthesize bar;\n\n- (id) init {\n    self = [super init];\n\n    if(self)\
    \ {\n        self.bar = [NSDictionary dictionary];\n    }\n\n    return self;\n\
    }\n\n-(void) setBar:(NSDictionary *)newBar {\n     NSDictionary *oldDictionary\
    \ = self.bar;\n     bar = [newBar retain];\n     [oldDictionary release];\n\n\
    \     NSNotification *note = [NSNotification notificationWithName:@\"barUpdated\"\
    \ object:self];\n     [[NSNotificationCenter defaultCenter] postNotification:note];\n\
    }\n\n-(void) dealloc {\n     self.bar = nil;\n     [super dealloc];\n}\n\n@end\n\
    ```\n\nThe `Foo` object has one property, an `NSDictionary` called `bar`. We are\
    \ synthesizing the accessor and providing our own mutator. The idea behind the\
    \ mutator is to send a notification that the property has changed. In the `init`\
    \ method, we are using the property to initialize `bar` to be nil. Also note that\
    \ in our `dealloc` method, the property is being set to nil.\n\nNow, let's look\
    \ at what is really going on when this code is executed. When the code is compiled,\
    \ the code that uses properties basically gets translated into method calls. The\
    \ following translations occur:\n\n`{symbol}.foo`\n\nis turned into\n\n`[{sybmol}\
    \ foo]`\n\nSimilarly, the following line\n\n`{symbol}.foo = {some new object}`\n\
    \nis turned into\n\n`[{symbol} setFoo:{some new object}]`\n\nIt is very easy to\
    \ forget that this conversion happens. So when `init` is called, the new instance\
    \ is actually calling `[self setFoo:[NSDictionary dictionary]]`. This means a\
    \ notification is getting sent out when the object is created. The `dealloc` method\
    \ does the same thing, so a notification is getting sent out when the object is\
    \ deallocated. The latter is likely to cause more problems than the former because\
    \ the notification carries with it a pointer to newly released memory.\n\nA simple\
    \ way to address those issues is to use the `ivar` directly in the `init` and\
    \ `dealloc` methods. This reduces the likelihood of introducing `EXEC_BAD_ACCESS`\
    \ errors when `bar` is updated on an instance of `Foo`. This also frees up any\
    \ subclasses of `Foo` to do what they wish if they were to override the `setBar`\
    \ method.\n\nA very subtle topic with regards to memory management and properties\
    \ is understanding what is going on. In the `init` method above, the compiled\
    \ code is `[self setBar:[NSDictionary dictionary]]` so the method is getting passed\
    \ an autoreleased object that is then retained by the `setBar` method. If `[[NSDictionary\
    \ alloc] init]` was passed in, the dictionary would leak when `bar` was assigned\
    \ a new object or the instance of `Foo` was released. This probably just saved\
    \ an hour of debugging one leak.\n\nThis brings up an interesting topic regarding\
    \ the use of properties, mainly the use of dot notation. While not necessarily\
    \ a memory management topic, this topic is about the use of dot notation and good\
    \ coding practices. Properties are a great thing; they make the generation of\
    \ accessors and mutators fast and easy, since most of them are the basic boilerplate\
    \ code that is very tedious and time consuming to write. Being able to control\
    \ the type of code that is generated (i.e., retained, assigned or copied, atomic\
    \ or nonatomic, read-write or read-only) is a great help as well."
  raw: '#### To Retain or Not to Retain, That Is the Question


    A common mistake that is made when developing applications in Objective-C is not
    releasing retained memory. Most of the time, failing to release memory is a mistake,
    so picking up some good habits is always a good thing. Unreleased memory leaks,
    plain and simple. A good rule of thumb for knowing when to release memory is given
    by the acronym NARC:


    *   New

    *   Alloc

    *   Retain

    *   Copy


    Anytime any of these messages is sent to an object, you now own that object, so
    you must release it when you are finished. However, there are always exceptions
    to this rule. When a method should return an object, sending autorelease to the
    object is always necessary. There are some performance considerations when using
    autorelease however. Since autorelease sends the object to live in the autorelease
    pool for the current scope block, sending thousands of objects to such a pool
    would be a bad idea, especially on an older iOS device. A good example of what
    we''re talking about is creating a fast loop to create one million strings ([Listing
    4–2](#Chapter04.html#list_4_2)).


    **Listing 4–2.** *One Million Autoreleased Strings!*


    `for(int i = 0; i < 1000000; i++) {`

    `     string = [[[NSString alloc] initWithFormat:@"String %i", i] autorelease];`

    `     //Process string and create other autoreleased objects….`

    `}`


    The preceding code creates one million strings and autoreleases them. Running
    the Allocations instrument against this code gives you the graph shown in [Figure
    4–7](#Chapter04.html#fig_4_7).


    The appropriate way to fix this issue can be found in [Listing 4–3](#Chapter04.html#list_4_3).


    **Listing 4–3.** *One Million Autoreleased Strings in Their Very Own Autorelease
    Pools*


    `for(int i = 0; i < 1000000; i++) {`

    `     NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`

    `     string = [[[NSString alloc] initWithFormat:@"String %i", i] autorelease];`

    `     //Process string and create other autoreleased objects….`

    `     [pool release];`

    `}`


    Compare the graph from [Figure 4–8](#Chapter04.html#fig_4_8) to the graph in [Figure
    4–9](#Chapter04.html#fig_4_9). What these graphs don''t show is the scale. Since
    we''re creating one million strings, each string is allocated and autoreleased
    upon the next iteration of the run loop. By creating an autorelease pool, as [Figure
    4–8](#Chapter04.html#fig_4_8) shows, the system reclaims the memory more frequently
    and allows for better utilization of the resources available.


    ![images](images/0408.jpg)


    **Figure 4–8.** *The Allocation graph of one million strings autoreleased to the
    same pool*


    ![images](images/0409.jpg)


    **Figure 4–9.** *The Allocation graph of one million strings autoreleased in their
    own pool*


    Since devices have a finite amount of memory, using autorelease pools is absolutely
    necessary to keep your application from triggering memory warnings and the operating
    system from terminating your application as well as keeping the application responsive.
    Manual releasing of objects during a tight loop is expensive.


    Remembering and being disciplined when managing memory is the key to reducing
    memory leaks. Take a look at your approach and decide which memory management
    technique is best for you. If you are creating discrete objects and manipulating
    them, release them when you are finished. If you are creating a large number of
    objects, creating an autorelease pool and draining it when you are finished is
    the best idea. The best time to do the latter is when performing a large number
    of string operations, since most string operations return autoreleased string
    instances.


    Overall, remembering when to release or autorelease an object isn''t very difficult.
    As long as the memory management is done when the code is first written, memory
    leaks will be kept at a minimum and leave you free to track down other types of
    issues.


    #### Connecting Properties and Polymorphic Dots


    Next in our discussion of memory management, we need to talk about Objective-C
    2.0 properties. This very popular feature comes with the new Objective-C runtime
    and brings a new concept to the Objective-C language—dot notation.


    Let''s take a quick look at what properties give us and how they fit in the scope
    of memory management. For the sake of this discussion, we''re going to talk about
    an object defined in [Listings 4–4](#Chapter04.html#list_4_4) and [4–5](#Chapter04.html#list_4_4).


    **Listing 4–4.** *The Header for Foo*


    `@interface Foo : NSObject {`

    `     NSDictionary *bar;`

    `}`


    `@property (retain, nonatomic) NSDictionary *bar;`


    `@end`


    **Listing 4–5.** *The Implementation for Foo*


    `#import "Foo.h"`

    `@implementation Foo`

    `@synthesize bar;`


    `- (id) init {`

    `    self = [super init];`


    `    if(self) {`

    `        self.bar = [NSDictionary dictionary];`

    `    }`


    `    return self;`

    `}`


    `-(void) setBar:(NSDictionary *)newBar {`

    `     NSDictionary *oldDictionary = self.bar;`

    `     bar = [newBar retain];`

    `     [oldDictionary release];`


    `     NSNotification *note = [NSNotification notificationWithName:@"barUpdated"
    object:self];`

    `     [[NSNotificationCenter defaultCenter] postNotification:note];`

    `}`


    `-(void) dealloc {`

    `     self.bar = nil;`

    `     [super dealloc];`

    `}`


    `@end`


    The `Foo` object has one property, an `NSDictionary` called `bar`. We are synthesizing
    the accessor and providing our own mutator. The idea behind the mutator is to
    send a notification that the property has changed. In the `init` method, we are
    using the property to initialize `bar` to be nil. Also note that in our `dealloc`
    method, the property is being set to nil.


    Now, let''s look at what is really going on when this code is executed. When the
    code is compiled, the code that uses properties basically gets translated into
    method calls. The following translations occur:


    `{symbol}.foo`


    is turned into


    `[{sybmol} foo]`


    Similarly, the following line


    `{symbol}.foo = {some new object}`


    is turned into


    `[{symbol} setFoo:{some new object}]`


    It is very easy to forget that this conversion happens. So when `init` is called,
    the new instance is actually calling `[self setFoo:[NSDictionary dictionary]]`.
    This means a notification is getting sent out when the object is created. The
    `dealloc` method does the same thing, so a notification is getting sent out when
    the object is deallocated. The latter is likely to cause more problems than the
    former because the notification carries with it a pointer to newly released memory.


    A simple way to address those issues is to use the `ivar` directly in the `init`
    and `dealloc` methods. This reduces the likelihood of introducing `EXEC_BAD_ACCESS`
    errors when `bar` is updated on an instance of `Foo`. This also frees up any subclasses
    of `Foo` to do what they wish if they were to override the `setBar` method.


    A very subtle topic with regards to memory management and properties is understanding
    what is going on. In the init method above, the compiled code is `[self setBar:[NSDictionary
    dictionary]]` so the method is getting passed an autoreleased object that is then
    retained by the `setBar` method. If `[[NSDictionaryalloc] init]` was passed in,
    the dictionary would leak when bar was assigned a new object or the instance of
    Foo was released. This probably just saved an hour of debugging one leak.


    This brings up an interesting topic regarding the use of properties, mainly the
    use of dot notation. While not necessarily a memory management topic, this topic
    is about the use of dot notation and good coding practices. Properties are a great
    thing; they make the generation of accessors and mutators fast and easy, since
    most of them are the basic boilerplate code that is very tedious and time consuming
    to write. Being able to control the type of code that is generated (i.e., retained,
    assigned or copied, atomic or nonatomic, read-write or read-only) is a great help
    as well.'
  trans: "\n#### 保留还是释放，这是个问题\n\n在 Objective-C 开发应用中，一个常见错误是没有释放已保留的内存。大多数情况下，未能释放内存是一个错误，因此养成一些好习惯总是有益的。未释放的内存会导致泄漏，简单明了。判断何时释放内存的一个好用经验法则是缩略词\
    \ NARC：\n\n- `New`\n- `Alloc`\n- `Retain`\n- `Copy`\n\n每当这些消息之一被发送给对象时，你就拥有了该对象，因此使用完后必须释放它。然而，这一规则总有例外。当一个方法需要返回对象时，必须向该对象发送\
    \ `autorelease` 消息。不过，使用 `autorelease` 时也有一些性能方面的考量。由于 `autorelease` 将对象放入当前作用域块的自动释放池中，因此将成千上万个对象送入这样一个池子将是个糟糕的主意，尤其是在较旧的\
    \ iOS 设备上。我们所说的一个典型例子就是创建一个快速循环来生成一百万个字符串（代码清单 4–2）。\n\n**代码清单 4–2.** *一百万个自动释放的字符串！*\n\
    \n```\nfor(int i = 0; i < 1000000; i++) {\n     string = [[[NSString alloc] initWithFormat:@\"\
    String %i\", i] autorelease];\n     //处理字符串并创建其他自动释放的对象….\n}\n```\n\n上面的代码创建了一百万个字符串并自动释放它们。针对此代码运行\
    \ Allocations 工具，你会得到如 图 4–7 所示的图表。\n\n解决此问题的合适方法见 代码清单 4–3。\n\n**代码清单 4–3.**\
    \ *一百万个字符串各自拥有独立的自动释放池*\n\n```\nfor(int i = 0; i < 1000000; i++) {\n     NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n     string = [[[NSString alloc]\
    \ initWithFormat:@\"String %i\", i] autorelease];\n     //处理字符串并创建其他自动释放的对象….\n\
    \     [pool release];\n}\n```\n\n对比 图 4–8 和 图 4–9 中的图表。这些图表没有显示的是比例尺。由于我们创建了一百万个字符串，每个字符串在运行循环的下一次迭代时被分配并自动释放。如\
    \ 图 4–8 所示，通过创建自动释放池，系统会更频繁地回收内存，从而更好地利用可用资源。\n\n![images](img/0408.jpg)\n\n**图\
    \ 4–8.** *一百万个字符串释放到同一个池中的内存分配图*\n\n![images](img/0409.jpg)\n\n**图 4–9.** *一百万个字符串在各自池中自动释放的内存分配图*\n\
    \n由于设备的内存有限，使用自动释放池对于防止应用触发内存警告、避免操作系统终止应用以及保持应用响应迅速是绝对必要的。在紧密循环中手动释放对象代价高昂。\n\
    \n在管理内存时保持记忆和自律是减少内存泄漏的关键。审视你的方法，决定哪种内存管理技术最适合你。如果你正在创建离散对象并对它们进行操作，使用完毕后立即释放它们。如果你正在创建大量对象，那么创建一个自动释放池并在使用完毕后排空它是最佳选择。执行后者操作的最佳时机是在进行大量字符串操作时，因为大多数字符串操作都会返回自动释放的字符串实例。\n\
    \n总体而言，记住何时释放或自动释放对象并不太难。只要在初次编写代码时就完成内存管理，内存泄漏就能被控制在最低限度，这样你就能腾出手来追踪其他类型的问题。\n\
    \n#### 连接属性与多态点语法\n\n接下来在我们关于内存管理的讨论中，需要谈谈 Objective-C 2.0 的属性。这个非常流行的特性随新的 Objective-C\
    \ 运行时而来，并为 Objective-C 语言带来了一个新概念——点语法。\n\n让我们快速了解一下属性为我们提供了什么，以及它们如何融入内存管理的范畴。为了便于讨论，我们来谈谈在代码清单\
    \ 4–4 和 4–5 中定义的一个对象。\n\n**代码清单 4–4.** *Foo 的头文件*\n\n```\n@interface Foo : NSObject\
    \ {\n     NSDictionary *bar;\n}\n\n@property (retain, nonatomic) NSDictionary\
    \ *bar;\n\n@end\n```\n\n**代码清单 4–5.** *Foo 的实现文件*\n\n```\n#import \"Foo.h\"\n\
    @implementation Foo\n@synthesize bar;\n\n- (id) init {\n    self = [super init];\n\
    \n    if(self) {\n        self.bar = [NSDictionary dictionary];\n    }\n\n   \
    \ return self;\n}\n\n-(void) setBar:(NSDictionary *)newBar {\n     NSDictionary\
    \ *oldDictionary = self.bar;\n     bar = [newBar retain];\n     [oldDictionary\
    \ release];\n\n     NSNotification *note = [NSNotification notificationWithName:@\"\
    barUpdated\" object:self];\n     [[NSNotificationCenter defaultCenter] postNotification:note];\n\
    }\n\n-(void) dealloc {\n     self.bar = nil;\n     [super dealloc];\n}\n\n@end\n\
    ```\n\n`Foo` 对象有一个属性，即名为 `bar` 的 `NSDictionary`。我们合成了访问器并提供了自己的设置器。该设置器的设计意图是在属性发生变化时发送一条通知。在\
    \ `init` 方法中，我们使用属性将 `bar` 初始化为 nil。还需注意，在 `dealloc` 方法中，该属性被设置为 nil。\n\n现在，让我们看看此代码执行时实际发生了什么。当代码被编译时，使用属性的代码基本上被转换成方法调用。发生以下转换：\n\
    \n`{symbol}.foo`\n\n被转换为\n\n`[{sybmol} foo]`\n\n类似地，下面这行代码\n\n`{symbol}.foo =\
    \ {some new object}`\n\n被转换为\n\n`[{symbol} setFoo:{some new object}]`\n\n很容易忘记这种转换的发生。因此，当调用\
    \ `init` 时，新实例实际上是在调用 `[self setFoo:[NSDictionary dictionary]]`。这意味着当对象被创建时会发送一条通知。`dealloc`\
    \ 方法做了同样的事情，因此当对象被释放时也会发送一条通知。后一种情况可能比前一种引起更多问题，因为通知携带了一个指向刚释放内存的指针。\n\n解决这些问题的一个简单方法是在\
    \ `init` 和 `dealloc` 方法中直接使用实例变量。这降低了在 `Foo` 实例上更新 `bar` 时引入 `EXEC_BAD_ACCESS`\
    \ 错误的可能性。这也使得 `Foo` 的任何子类在重写 `setBar` 方法时可以自由地做它们想做的事情。\n\n关于内存管理和属性，一个非常微妙的话题是理解底层发生了什么。在上面的\
    \ `init` 方法中，编译后的代码是 `[self setBar:[NSDictionary dictionary]]`，因此该方法接收到的是一个自动释放的对象，然后由\
    \ `setBar` 方法将其保留。如果传入的是 `[[NSDictionary alloc] init]`，那么当 `bar` 被赋值为一个新对象或 `Foo`\
    \ 实例被释放时，该字典就会泄漏。这大概能节省一个小时调试某个泄漏问题的时间。\n\n这就引出了一个关于属性使用的有趣话题，主要是点语法的使用。虽然这未必是内存管理的话题，但此话题关于点语法的使用和良好的编码实践。属性是一个很棒的机制；它们使得访问器和设置器的生成快速且容易，因为大多数都是非常繁琐且耗时的基本样板代码。能够控制生成的代码类型（例如，保留、赋值或复制，原子性或非原子性，可读写或只读）也是一个很大的帮助。\n"
- fmt: "当你在 Objective-C 的属性中混入 C 语言的`struct`时，问题就出现了。点语法在两者之间会很快变得令人困惑。一个使源代码意图清晰的好建议是：在你的\
    \ Objective-C 代码中不要使用点语法。这为多态的点赋予单一含义。请看以下示例：\n\n```\nUIView *newView = [[UIView\
    \ alloc] init];\nCGRect viewRect;\n\nviewRect.origin.x = 0;\nviewRect.origin.y\
    \ = 0;\nviewRect.size.height = 100;\nviewRect.size.width = 100;\n\nnewView.frame\
    \ = viewRect;\n\nUIColor *color = [[UIColor alloc] initWithPatternImage:{some\
    \ image}];\nnewView.backgroundColor = color;\n[color release];\n\n[self.view addSubview:newView];\n\
    [newView release];\n```\n\n我们正在创建一个新视图，设置其`frame`，并在将其添加到当前视图之前设置其背景颜色。这相当直接明了，但刚接触该平台的新手不会完全理解代码的意图。看看设置背景颜色的代码。在将其设置到新视图上后，很容易忘记释放正在设置的颜色，因为意图不够清晰。借鉴前面的建议，我们可以将代码重写为如下形式：\n\
    \n```\nUIView *newView = [[UIView alloc] init];\nCGRect viewRect;\n\nviewRect.origin.x\
    \ = 0;\nviewRect.origin.y = 0;\nviewRect.size.height = 100;\nviewRect.size.width\
    \ = 100;\n\n[newView setFrame:viewRect];\n\nUIColor *color = [[UIColor alloc]\
    \ initWithPatternImage:image];\n[newView setBackgroundColor:color];\n[color release];\n\
    \n[self.view addSubview:newView];\n[newView release];\n```\n\n完整的意图更容易理解了。创建并设置在所创建视图上的背景颜色，显然由该视图拥有，并在设置后被释放。操作视图`frame`的代码清楚地表明是在操作一个\
    \ C 语言的`struct`，而其余代码则是 Objective-C。\n\n**注意**：讨论代码结构总是一个敏感话题，因此关于不使用点语法的想法仅仅是一个建议。这些并非硬性规定；可以把它们视为关于花括号位置以及使用空格而非制表符的规则。虽然就使用哪种方式的优点在喝咖啡时争论一番可能很有趣，但我们的目标是开发应用程序。用户并不关心源代码长什么样。\n\
    \n## 执行静态分析\n\n在应用程序运行之前，有一些方法可以发现常见的编码错误。新的 LLVM 编译器将这一能力带给了我们。经常对源码运行静态分析器总是一个好主意。它可以在应用程序实际运行之前就指出代码中的问题。\n\
    \nXcode 4 集成了静态分析器，允许你在问题出现之前分析代码并发现它们。要运行静态分析器，请转到 Product![image](images/U001.jpg)Analyze。这会构建应用程序，并将构建产物通过静态分析器运行，然后将结果返回给你。[图\
    \ 4-10](#Chapter04.html#fig_4_10) 显示了在导航器区域的“问题”标签中静态分析运行的结果。\n\n![images](images/0410.jpg)\n\
    \n**图 4-10.** *静态分析展示了不同类型的问题，从死代码到内存泄漏。*\n\n在开发过程中经常运行静态分析器是一个好主意，可以防止代码中最常见的错误。这些结果为你提供了足够的信息来了解问题所在，以及如何着手修复它们。其中一些项目可能非常复杂。例如，在方法顶部声明的一个对象，经过一系列复杂的循环和条件判断后，可能会使该对象处于泄漏状态。另一个例子是过度释放一个对象。一个对象被实例化，然后被指示`autorelease`，最后在方法内部被释放，这会触发静态分析错误。\n\
    \n让我们来看 [图 4-9](#Chapter04.html#fig_4_9) 中的两个案例。\n\n[图 4-9](#Chapter04.html#fig_4_9)\
    \ 列表中的第一项位于`Super_CheckoutViewController.m` 的第 91 行。让我们看看有问题的那个方法：\n\n```\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    ProductDetailsViewController\
    \ *newVC = [[ProductDetailsViewController alloc]\n         initWithNibName:@\"\
    ProductDetailsViewController\" bundle:nil];\n\n    [newVC setSelectedProduct:[inventory\
    \ objectAtIndex:[indexPath row]]];\n\n    [self.navigationController pushViewController:newVC\
    \ animated:YES];\n}\n```\n\n静态分析器告诉我们，该方法退出时一个对象具有“+1 的保留计数”。你能找出有问题的代码吗？基于 NARC\
    \ 系统，我们有一个已分配的对象，现在缺少一个对应的释放。添加`[newVC release];` 作为最后一行将解决这个问题。\n\n下一个例子是使用静态分析器来查找死代码。在`SuperCheckoutAPIEngine.m`\
    \ 中，我们可以看到分析器发现了一个“Dead store”问题。点击该问题，编辑器将向你展示代码中的错误位置。这是有问题的那个方法：\n\n```\n-\
    \ (NSMutableURLRequest *)_baseRequestWithMethod:(NSString *)method\n         \
    \                                  path:(NSString *)path\n                   \
    \                 requestType:(SuperCheckoutRequestType)requestType\n        \
    \                        queryParameters:(NSDictionary *)params\n{\n    NSString\
    \ *contentType = [params objectForKey:@\"Content-Type\"];\n    if(contentType){\n\
    \        params = [params MGTE_dictionaryByRemovingObjectForKey:@\"Content-Type\"\
    ];\n    }else{\n        contentType = @\"application/x-www-form-urlencoded\";\n\
    \    }\n\n    // Construct appropriate URL string.\n    NSString *fullPath = [path\n\
    \ stringByAddingPercentEscapesUsingEncoding:NSNonLossyASCIIStringEncoding];\n\
    \    if (params && ![method isEqualToString:HTTP_POST_METHOD]) {\n        fullPath\
    \ = [self _queryStringWithBase:fullPath parameters:params prefixed:YES];\n   \
    \ }\n\n    NSString *connectionType = @\"http\";\n```\n\n静态分析器将焦点放在了`contentType`\
    \ 对象未被读取上。似乎分析器发现该方法后面某处的代码被移除了，但它的部分设置却没有被移除。移除包含`contentType` 对象的代码块将满足静态分析器的要求。\n\
    \n你为什么不自己检查一下静态分析器的其余结果，并修复它发现的问题呢？"
  raw: 'The problem comes when you start mixing in C `struct`s with your Objective-C
    properties. The dot syntax gets confusing fast with the two. A good suggestion
    for making the intent of the source code clear is to not use dot syntax with your
    Objective-C code. This gives the polymorphic dot one meaning. Take the following
    example:


    `    UIView *newView = [[UIView alloc] init];`


    `    CGRect viewRect;`


    `    viewRect.origin.x = 0;`

    `    viewRect.origin.y = 0;`

    `    viewRect.size.height = 100;`

    `    viewRect.size.width = 100;`


    `    newView.frame = viewRect;`


    `    UIColor *color = [[UIColor alloc] initWithPatternImage:{some image}];`

    `    newView.backgroundColor = color;`

    `    [color release];`


    `    [self.view addSubview:newView];`

    `    [newView release];`


    We''re creating a new view, setting up its frame, and setting its background color
    before adding it to the current view. It''s pretty straightforward, but someone
    new to the platform won''t know the full intent of the code. Look at the code
    that sets the background color. It is very easy to forget to release the color
    being set after setting it on the new view because the intent isn''t very clear.
    Taking the suggestion offered previously, we can rewrite the code to look like
    this:


    `    UIView *newView = [[UIView alloc] init];`


    `    CGRect viewRect;`


    `    viewRect.origin.x = 0;`

    `    viewRect.origin.y = 0;`

    `    viewRect.size.height = 100;`

    `    viewRect.size.width = 100;`


    `    [newView setFrame:viewRect];`


    `    UIColor *color = [[UIColor alloc] initWithPatternImage:image];`

    `    [newView setBackgroundColor:color];`

    `    [color release];`


    `    [self.view addSubview:newView];`

    `    [newView release];`


    The full intent is more easily understood. The background color that is created
    and set on the created view is clearly owned by the created view and released
    after it''s set. The code that is manipulating the view''s frame is clearly manipulating
    a C `struct`, and the rest of the code is Objective-C.


    **NOTE**: Talking about code structure is always a touchy thing, so the thoughts
    behind not using the dot syntax are simply a suggestion. These are not hard and
    fast rules; think of them like the rules about the location of the curly brace
    and spaces over tabs. While the merits of using one over the other can be fun
    to argue over coffee, we''re in this to develop applications. Users don''t care
    what the source code looks like.


    #### Performing Static Analysis


    There are ways to find common coding errors before the application is run. The
    new LLVM compiler brings this capability to us. Running the static analyzer on
    the source often is always a good idea. It can outline problems with the code
    before the application is even run.


    Xcode 4 has the static analyzer integrated and allows you to analyze your code
    and find problems before they come up. To run the static analyzer, go to Product![image](images/U001.jpg)Analyze.
    This builds the application and runs the build artifacts through the static analyzer
    and returns the results to you. [Figure 4–10](#Chapter04.html#fig_4_10) shows
    the results of a static analysis run in the problems tab in the Navigator area.


    ![images](images/0410.jpg)


    **Figure 4–10.** *Static analysis shows different kind of problems from dead code
    to memory leaks.*


    Running the static analyzer often during development is a good idea to prevent
    the most common errors in your code. These results give you enough information
    to see what the problem is and a start on how to fix them. Some of these items
    can be very complicated. For example, an object that is declared at the top of
    a method and then a complicated set of loops and conditionals can leave the object
    in a state where it is leaking. Another example is overreleasing an object. An
    object that is instantiated and then told to autorelease and finally is released
    later in the method will trigger a static analysis error.


    Let''s take two of the cases from [Figure 4–9](#Chapter04.html#fig_4_9).


    The first item in the list from [Figure 4–9](#Chapter04.html#fig_4_9) is in `Super_CheckoutViewController.m`
    on line 91\. Let''s take a look at the offending method:


    `- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath {`

    `ProductDetailsViewController *newVC = [[ProductDetailsViewController alloc]`

    `     initWithNibName:@"ProductDetailsViewController" bundle:nil];`


    `    [newVC setSelectedProduct:[inventory objectAtIndex:[indexPath row]]];`


    `    [self.navigationController pushViewController:newVC animated:YES];`

    `}`


    The static analyzer tells us the method exits with an object having a “+1 retain
    count.” Can you spot the offending code? Based on the NARC system, we have an
    allocated object and now balancing release. Adding `[newVC release];` as the last
    line will resolve this problem.


    The next example is using the static analyzer to find dead code. In `SuperCheckoutAPIEngine.m`,
    we can see the analyzer found a “Dead store” problem. Click on the problem and
    the editor will show you the error location in the code. Here is the offending
    method:


    `- (NSMutableURLRequest *)_baseRequestWithMethod:(NSString *)method`

    `                                           path:(NSString *)path`

    `                                    requestType:(SuperCheckoutRequestType)requestType`

    `                                queryParameters:(NSDictionary *)params`

    `{`

    `    NSString *contentType = [params objectForKey:@"Content-Type"];`

    `    if(contentType){`

    `        params = [params MGTE_dictionaryByRemovingObjectForKey:@"Content-Type"];`

    `    }else{`

    `        contentType = @"application/x-www-form-urlencoded";`

    `    }`


    `    // Construct appropriate URL string.`

    `    NSString *fullPath = [path`

    ` stringByAddingPercentEscapesUsingEncoding:NSNonLossyASCIIStringEncoding];`

    `    if (params && ![method isEqualToString:HTTP_POST_METHOD]) {`

    `        fullPath = [self _queryStringWithBase:fullPath parameters:params prefixed:YES];`

    `    }`


    `    NSString *connectionType = @"http";`


    The static analyzer keyed in on the `contentType` object not being read. It appears
    the analyzer found an instance where some code later in the method was removed
    and some of its setup wasn''t. Removing the block of code containing the `contentType`
    object will satisfy the static analyzer.


    Why don''t you go through the rest of the static analyzer results and fix the
    problems it found?'
