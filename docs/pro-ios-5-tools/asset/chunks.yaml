  trans: '

    #### 控制缓存


    要让应用在慢速网络环境中表现出高性能，最好的方式是什么？那就是存储请求的响应结果。**缓存**。缓存之所以强大，是因为应用能快速获取所需数据，用户无需等待。既然缓存这么棒，为什么我们不把所有内容都缓存起来呢？第一个原因是互联网上大部分数据都是**实时**的。如果所有内容都被缓存，应用将严重滞后于最新信息，用户将被迫频繁刷新。


    面对这种矛盾，你可能在想：“缓存方案的最佳方法是什么？”


    问得好！答案相当复杂。正如我之前提到的，缓存方法一直是学术论文的研究重点。我们不会深入探讨缓存算法的工作原理或哪种情况最适合使用哪种算法——那将是另一本书的内容。相反，我们将了解如何在
    Cocoa 或其他框架中使用什么工具，来为 Super Checkout 实现合适的缓存级别，并希望以此为你应用的缓存方案开个好头。


    ##### 开始之前


    在深入代码之前，我们先花点时间讨论一下缓存的本质，以及什么样的数据适合缓存。在我们讨论的缓存语境中，缓存是一个能极大提高数据检索速度的临时存储。其核心理念是尽可能多地将信息存储在本地，只在需要时才从服务器获取。


    我们这里的基本思路是先开发一个不带缓存的应用。通过避免过早优化，我们可以确保应用在开始优化网络层之前功能完备且相对无 Bug。这样一来，任何引入的 Bug
    都能被轻松追踪。


    ##### 决定缓存什么


    我们如何决定缓存什么？答案可以通过两种基本方法之一找到。第一种方法是“猜测并测试”。这种方法可能会产生一些积极效果，但不够科学，也可能引入一些问题。第二种方法基本上是对所请求数据进行统计分析，包括从应用中收集数据并进行分析。


    要捕获数据，我们可以使用 Charles 来收集信息，然后直接在 Charles 中分析数据，或将请求信息导出为其他格式在你选择的应用程序中分析。对于这个示例，我们将使用一个相对较小的样本量，并通过一次完整的应用操作流程——获取产品、查看产品、将产品加入购物车，最后完成结账——来生成数据。图
    6-14 显示了我们将要查看的数据集。


    ![图片](img/0614.jpg)


    **图 6-14.** *来自 Charles 的数据集*


    我们是如何获得这些数据的？启动 Charles，确保启用了 Mac OS X 代理：前往 **Proxy** ![图片](img/U002.jpg) **Mac
    OS X Proxy**，并确认它处于选中状态。接下来点击工具栏中的录制按钮，瞧，你就在捕获 HTTP 数据了。在数据捕获过程中，你很可能会注意到有其他条目弹出。


    查看表格，首先映入眼帘的是请求了两种类型的数据。第一类是 JSON 编码的数据，第二类是图片。响应大小也明显不同。记住这些信息，我们还需要查看请求的使用模式。


    产品列表响应包含产品信息，包括价格。由于价格可能波动，这个服务调用并不适合缓存。我们不想向用户显示错误的价格。不过，如果返回的数据集很大，我们可能需要修改服务器代码，返回分页数据集，并尽量保持数据规模较小。


    在这个案例中，最适合缓存的数据是图片。当我们优化产品列表的滚动性能时，我们实现了一个非常基础的内存缓存。这个方案并非最佳，因为视图控制器负责处理缓存，却没有考虑内存使用情况，也没有响应内存警告。`APIEngine`
    应该负责缓存。我们希望采用双层缓存策略：内存缓存和磁盘缓存。当内存不足时，可以清除内存缓存，磁盘缓存将接管并缓存图片约一周左右。


    **注意：** 这些决策完全基于应用的实际使用方式。在真实场景中，会进行用户测试，这有助于确定合适的缓存策略。

    '
- fmt: '#### NSCache


    谈缓存谈得够多了！让我们深入代码，了解存在哪些缓存机制以及如何使用它们。


    我们将使用的第一个API是`NSCache`。`NSCache`内置于Cocoa Touch中，并在iOS 4.0中引入。`NSCache`只是一个内存存储，类似于我们在Super
    Checkout中使用的机制。`NSCache`是一个键值存储，并具有在缓存填满且系统需要更多内存时移除过期项目的机制。


    这将是我们缓存策略的第一道防线。作为本次重构的一部分，我们将把缓存逻辑从视图控制器中移出，让`APIEngine`来处理缓存。这将允许`APIEngine`在必要时缓存数据，而使用它的每个视图控制器都可以清除缓存。


    那么如何实现呢？很简单！打开`SuperCheckoutAPIEngine.m`，并进行以下更改。


    在类扩展中，以粗体添加[清单 6–6](#Chapter06.html#list_6_6)中的方法声明。


    **清单 6–6.** *向类扩展添加图片缓存方法*


    `- (BOOL) _isValidDelegateForSelector:(SEL)selector;`


    **`- (NSCache *) imageCache;`**


    `@end`


    在实现中，在`#pragma mark – API Methods`行正上方添加[清单 6–7](#Chapter06.html#list_6_7)。


    **清单 6–7.** *实现图片缓存*


    `- (NSCache *) imageCache {`

    `    static NSCache *imageCache = nil;`


    `    if(imageCache == nil) {`

    `        imageCache = [[NSCache alloc] init];`

    `    }`


    `    return imageCache;`

    `}`


    这向引擎添加了一个静态`NSCache`对象，接下来我们将添加代码来使用这个缓存。


    在`SuperCheckoutAPIEngine.h`中，添加以下两个方法声明：


    `-(void) clearCache;`

    `-(UIImage *) cachedImageForProduct:(NSString *)stringURL;`


    回到`SuperCheckoutAPIEngine.m`，在`checkout`方法之后添加这些方法的实现：


    `-(void) clearCache {`

    `    [[self imageCache] removeAllObjects];`

    `}`


    `-(UIImage *) cachedImageForProduct:(NSString *)stringURL {`

    `    return [[self imageCache] objectForKey:stringURL];`

    `}`


    下一步是使用缓存。有两个地方需要编辑以启用其使用。第一个是在我们从请求获得响应并准备将图片发送回委托时。在`requestFinished:`中找到以下行，该行解码数据并创建`UIImage`：


    `UIImage *image = [[[UIImage alloc] initWithData:receivedData] autorelease];`


    在这一行代码下方，添加以下内容：


    `[[self imageCache] setObject:image forKey:[[request url] absoluteString]];`


    现在还有一处需要编辑引擎。在`_sendImageRequestWithURL:`中，使用以下代码块替换实现：


    `- (NSString *)_sendImageRequestWithURL:(NSString *)imageURL {`

    `    NSURL *theURL = [NSURL URLWithString:imageURL];`


    `    UIImage *image = [[self imageCache] objectForKey:[theURL absoluteString]];`


    `    if(image) {`

    `        NSString *requestIdentifier = [NSString stringWithNewUUID];`


    `        if ([self _isValidDelegateForSelector:@selector(imageReceived:forRequest:)])
    {`

    `            dispatch_time_t popTime = dispatch_time(DISPATCH_TIME_NOW, 1ull);`

    `            dispatch_after(popTime, dispatch_get_main_queue(), ^(void){`

    `                [delegate imageReceived:image forRequest:requestIdentifier];`

    `            });`

    `        }`


    `        return requestIdentifier;`

    `    }`


    `    return [self _sendRequest:theURL`

    `                    withRequestType:SuperCheckoutProductImage`

    `                           responseType:SuperCheckoutImage];`

    `}`


    在继续其他更改之前，让我们快速回顾一下刚刚做了什么。首先我们创建了缓存对象。我们将缓存设为静态，因此引擎的所有实例将共享同一个缓存。由于Super Checkout是一个小型应用，且我们只缓存产品图片，这种方法是可以接受的。如果处理更多内容，可能需要一个更健壮的、管理不同级别内存缓存的系统，但目前我们只使用一个主缓存，并在需要时清空它。


    接下来的更改是允许视图控制器请求缓存的图片。如果图片不在缓存中，此方法将返回`nil`。由视图控制器自行处理此情况并请求图片。


    最后，在`_sendImageRequestWithURL:`中，我们检查缓存中是否有图片，并模拟一个完整的请求。为此，创建请求标识符，然后将一个延迟的block派发到Grand
    Central Dispatch，方法返回。这使得委托回调几乎是即时的。


    现在，我们准备好进行其余的更改。这些更改包括更新`ProductCell`以拥有自己管理的图片，以及`Super_CheckoutViewController`利用`APIEngine`中的新API。打开`ProductCell.h`，添加以下实例变量和属性：


    `UIImage *productImage;`

    `@property (nonatomic, retain) UIImage *productImage;`


    由于我们直接在单元格中处理图片，可以移除`productInformation`设置方法中的键值观察代码。打开`ProductCell.m`，像这样添加新的设置方法：


    `-(void) setProductInformation:(Product *)newProductInformation {`

    `    Product *oldInfo = productInformation;`

    `    productInformation = [newProductInformation retain];`

    `    [oldInfo release];`

    `    [self setNeedsDisplay];`

    `}`


    接下来，通过添加以下行来合成`productImage`属性：


    `@synthesize productImage;`


    然后，添加以下代码：


    `- (void) setProductImage:(UIImage *)theProductImage {`

    `    UIImage *oldImage = productImage;`

    `    productImage = [theProductImage retain];`

    `    [oldImage release];`


    `    [self setNeedsDisplay];`

    `}`


    `- (void) prepareForReuse {`

    `    [super prepareForReuse];`


    `    [self setProductImage:nil];`

    `}`


    在`drawCellView:`中，修改这一行：


    `CGImageRef prodImage = [[productInformation productImage] CGImage];`


    使其变成这样：


    `CGImageRef prodImage = [[self productImage] CGImage];`


    最后，在`dealloc`方法中释放`productImage`实例变量，添加：


    `[productImage release];`


    接下来，我们想为`UIImage`创建一个类别，添加一个返回自身缩放版本的方法。为此，转到 **File** ![images](images/U002.jpg)
    **New** ![images](images/U002.jpg) **New File**，在Cocoa Touch下选择Objective-C category。将类别命名为
    **Resize**，并创建在`UIImage`上（参见[图 6–15](#Chapter06.html#fig_6_15)）。点击Next，将文件保存在项目中，然后点击Create。


    ![images](images/0615.jpg)


    **图 6–15.** *Xcode 使得创建类别变得超级简单！*


    创建新类别后，打开新创建的`UIImage+Resize.h`文件，并将此方法添加到头文件中：


    `- (UIImage*) resizedImageWithSize:(CGSize)size;`


    接下来，切换到实现文件，并将[清单 6–8](#Chapter06.html#list_6_8)中的实现添加到类别中。创建缩放后的UIImage的实现非常实用。


    **清单 6–8.** *创建缩放后的UIImage*


    `- (UIImage*) resizedImageWithSize:(CGSize)size {`

    `    UIGraphicsBeginImageContext(size);`


    `    [self drawInRect:CGRectMake(0.0f, 0.0f, size.width, size.height)];`


    `    // An autoreleased image`

    `    UIImage *newImage = UIGraphicsGetImageFromCurrentImageContext();`


    `    UIGraphicsEndImageContext();`


    `    return newImage;`

    `}`'
  raw: '##### NSCache


    Enough about talking about caching! Let''s get into some code and learn what mechanisms
    exist for caching and how to use them.


    The first API we''ll work with is `NSCache`. `NSCache` is built into Cocoa Touch
    and was introduced in iOS 4.0\. `NSCache` is simply an in-memory store, similar
    to what we''re using in Super Checkout. `NSCache` is a key-value store and has
    mechanisms to remove stale items as the cache fills up and the system needs more
    memory.


    This is going to be the first line of defense for our caching strategy. As a part
    of this set of refactoring, we''ll be taking the caching out of the view controller
    and let the `APIEngine` handle the caching. This will allow the `APIEngine` to
    cache the data as necessary and each view control using it can clear the cache.


    So how do we implement this? Simple! Open `SuperCheckoutAPIEngine.m`, and make
    the following changes.


    In the class extension, add the method declaration in bold in [Listing 6–6](#Chapter06.html#list_6_6).


    **Listing 6–6.** *Adding the Image Cache Method to the Class Extension*


    `- (BOOL) _isValidDelegateForSelector:(SEL)selector;`


    **`- (NSCache *) imageCache;`**


    `@end`


    And in the implementation, add [Listing 6–7](#Chapter06.html#list_6_7) directly
    above the `#pragma mark – API Methods` line.


    **Listing 6–7.** *Implementing the Image Cache*


    `- (NSCache *) imageCache {`

    `    static NSCache *imageCache = nil;`


    `    if(imageCache == nil) {`

    `        imageCache = [[NSCache alloc] init];`

    `    }`


    `    return imageCache;`

    `}`


    This adds a static `NSCache` object to the engine, and we''re going to add code
    to use this cache.


    In `SuperCheckoutAPIEngine.h`, add the following two method declarations:


    `-(void) clearCache;`

    `-(UIImage *) cachedImageForProduct:(NSString *)stringURL;`


    Back in `SuperCheckoutAPIEngine.m`, add the following implementations for those
    methods after the `checkout` method:


    `-(void) clearCache {`

    `    [[self imageCache] removeAllObjects];`

    `}`


    `-(UIImage *) cachedImageForProduct:(NSString *)stringURL {`

    `    return [[self imageCache] objectForKey:stringURL];`

    `}`


    The next step is to use the cache. There are two places to edit to enable its
    use. The first is when we are getting the response from the request and are preparing
    to send the image back to the delegate. In `requestFinished:` find the following
    line, which decodes the data and creates the `UIImage`:


    `UIImage *image = [[[UIImage alloc] initWithData:receivedData] autorelease];`


    Underneath this line of code, add the following:


    `[[self imageCache] setObject:image forKey:[[request url] absoluteString]];`


    We now have one more place to edit the engine. In `_sendImageRequestWithURL:`,
    replace the implementation with the following block of code:


    `- (NSString *)_sendImageRequestWithURL:(NSString *)imageURL {`

    `        NSURL *theURL = [NSURL URLWithString:imageURL];`


    `    UIImage *image = [[self imageCache] objectForKey:[theURL absoluteString]];`


    `    if(image) {`

    `        NSString *requestIdentifier = [NSString stringWithNewUUID];`


    `        if ([self _isValidDelegateForSelector:@selector(imageReceived:forRequest:)])
    {`

    `            dispatch_time_t popTime = dispatch_time(DISPATCH_TIME_NOW, 1ull);`

    `            dispatch_after(popTime, dispatch_get_main_queue(), ^(void){`

    `                [delegate imageReceived:image forRequest:requestIdentifier];`

    `            });`

    `        }`


    `        return requestIdentifier;`

    `    }`


    `        return [self _sendRequest:theURL`

    `                        withRequestType:SuperCheckoutProductImage`

    `                               responseType:SuperCheckoutImage];`

    `}`


    Before we move on to the rest of the changes, let''s quickly look over what we
    just did. The first thing we did was create the cache object. We made the cache
    static, so all instances of the engine will use the same cache. Since Super Checkout
    is a small application and we are only caching the product images, this approach
    is OK. If we were doing more, a more robust system that manages different levels
    of in-memory cache might be necessary, but for now, we''ll just have a master
    cache that gets cleared when asked.


    The next change was to allow a view controller to ask for a cached product image.
    This method will return nil if the image is not in the cache. It is up to the
    view controller to handle this case and request an image.


    Finally, in `_sendImageRequestWithURL:`, we are checking the cache for the image
    and mimicking a full request being made. To do this, the request identifier is
    created, and then a delayed block is dispatched to Grand Central Dispatch and
    the method returns. This makes an almost instantaneous delegate callback.


    Now, we are ready for the rest of the changes. These changes include updating
    the `ProductCell` to have its own image that it manages and the `Super_CheckoutViewController`
    to utilize the new APIs in the `APIEngine`. Open `ProductCell.h`, and add the
    following `ivar` and property:


    `UIImage *productImage;`

    `@property (nonatomic, retain) UIImage *productImage;`


    Since we are handling the images directly in the cell, we can remove the key-value
    observing code from the `productInformation` mutator. Open `ProductCell.m`, and
    add the new mutator like this:


    `-(void) setProductInformation:(Product *)newProductInformation {`

    `    Product *oldInfo = productInformation;`

    `    productInformation = [newProductInformation retain];`

    `    [oldInfo release];`

    `    [self setNeedsDisplay];`

    `}`


    Next, synthesize the `productImage` property by adding the following line:


    `@synthesize productImage;`


    Then, add the following code:


    `- (void) setProductImage:(UIImage *)theProductImage {`

    `    UIImage *oldImage = productImage;`

    `    productImage = [theProductImage retain];`

    `    [oldImage release];`


    `    [self setNeedsDisplay];`

    `}`


    `- (void) prepareForReuse {`

    `    [super prepareForReuse];`


    `    [self setProductImage:nil];`

    `}`


    In `drawCellView:`, modify this line:


    `CGImageRef prodImage = [[productInformation productImage] CGImage];`


    to look like this one:


    `CGImageRef prodImage = [[self productImage] CGImage];`


    Finally, release the `productImageivar` in the `dealloc` method by adding


    `[productImage release];`


    Next, we want to create a category on `UIImage` that will add a method return
    a resized version of itself. To do this, go to **File** ![images](images/U002.jpg)
    **New** ![images](images/U002.jpg) **New File**, and under Cocoa Touch, select
    Objective-C Category. Name the category **Resize**, and make the category on `UIImage`
    (see [Figure 6–15](#Chapter06.html#fig_6_15)). Click Next, save the file within
    the project, and click Create.


    ![images](images/0615.jpg)


    **Figure 6–15.** *Xcode has added the ability to make categories super easy!*


    With the new category created, open the newly created `UIImage+Resize.h` file,
    and add this method to the header:


    `- (UIImage*) resizedImageWithSize:(CGSize)size;`


    Next, switch to the implementation, and add the implementation in [Listing 6–8](#Chapter06.html#list_6_8)
    to the category. The implementation of creating a resized UIImage is a handy thing
    to have around.


    **Listing 6–8.** *Creating a Resized UIImage*


    `- (UIImage*) resizedImageWithSize:(CGSize)size {`

    `        UIGraphicsBeginImageContext(size);`


    `        [self drawInRect:CGRectMake(0.0f, 0.0f, size.width, size.height)];`


    `        // An autoreleased image`

    `        UIImage *newImage = UIGraphicsGetImageFromCurrentImageContext();`


    `        UIGraphicsEndImageContext();`


    `        return newImage;`

    `}`'
