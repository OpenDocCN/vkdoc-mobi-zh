    you call either the `logFail()` or `logPass()` function. The scenario will be
    displayed as passed or failed, based on which of these functions were called.
    The `logFail()` function has the added feature of taking a screenshot when it
    is called. This, along with any information about the failure, will be available
    in the instrument. All debug logs and element logs that occur within a test scenario
    (that is, between a `logStart()` and either a pass or fail call) will be enveloped
    by the scenario in the log.


