    ## Chapter 2'
  trans: '

    ### 开始前的准备工作


    要充分利用本书，你需要在 iOS 开发者中心拥有一个付费开发者账号。这样你才能在实际的 iOS 设备上进行测试，并针对设备运行性能分析工具。我们将在设备上完成多项操作，因此如果你还没有付费账号，最好立即注册一个。截至本书撰写时，iOS
    开发者项目的年费为 **99 美元**。


    如果无法创建账号，你也可以从 Mac App Store 下载 `Xcode 4`。安装后即可获得 Xcode IDE 和 Instruments 工具。你将能够在
    iOS 模拟器中开发和调试应用，并对其运行部分性能分析工具。但本书后续介绍的某些调试和性能测试将无法进行。


    要配置 iOS 开发者中心，请访问 [`http://developer.apple.com/ios/`](http://developer.apple.com/ios/)。图
    1-1 展示了主页的样式。点击顶部的“注册”链接即可开始。如果你希望将应用部署到 iOS 设备，这是最佳途径。若你是企业开发者，请查阅企业开发者计划。


    ![images](img/0101.jpg)


    **图 1-1.** *iOS 开发者中心主页*


    下载并安装最新开发工具后，启动 Xcode 并熟悉一下界面。如果你习惯使用 Xcode 3，会发现 Xcode 4 的界面完全不同。别担心，在阅读本书各章节时，我们会逐步介绍各项功能。如果你是
    iOS 平台新手，不妨和 Xcode 打个招呼。相信你们很快就能成为朋友（放心，朋友之间偶尔也会闹别扭）。无论如何，你将开启一段精彩的旅程，学习如何充分利用苹果提供的工具箱以及一些优秀的第三方工具。


    ### 本书内容概览


    本书将围绕一个项目展开。我们会从项目初期的 Alpha 阶段开始，准备进行 Beta 测试。接着，我们将经历 Beta 测试阶段，通过错误报告和功能请求收集测试者提供的宝贵反馈。你将学习如何通过自动化优化工作流程，并将项目迁移为通用应用。最后，我们将探讨如何与开发者社区共享代码，并介绍如何充分发挥
    Xcode 4 及其他实用工具的作用。


    以下是各章节的快速概览：


    - *第 2 章，顶级的工具集（Xcode、Interface Builder 与 Instruments）*：在本章中，你将认识 Xcode 4 以及 iOS
    开发工具包中的其他工具。我们将讨论 Xcode 的新布局以及集成 Interface Builder 带来的好处。我们还将打开 Instruments，让你熟悉这款用于性能测试和调试的工具。

    - *第 3 章，三个界面…嗯，它能运行了*：在这里，我们将深入检查一个现有项目，学习如何直接在 Xcode 中使用 Git 和 GitHub。我们还将完成本书项目的首次构建：Super
    Checkout。

    - *第 4 章，内存管理与诊断*：本章将诊断并解决应用崩溃的首要原因。我们会讨论 Objective-C 的内存管理及最佳实践，并首次使用 Instruments
    来帮助诊断这些棘手的内存问题。

    - *第 5 章，核心动画与流畅滚动*：解决内存问题后，我们将深入优化核心动画，让表格的滚动丝般顺滑。你将学习第二款工具的使用，并了解 iOS 渲染模型的一些有趣特性。

    - *第 6 章，网络、缓存与电源管理*：在本章中，你将全面了解网络知识以及内置 iOS 网络 API 的工作原理。我们将考察一个流行的网络库，并替换现有的网络层以增强应用功能。我们还会探讨缓存技术及其利弊。本章最后将聚焦电源管理，介绍
    iOS 设备上的不同无线模块、它们对电池消耗的影响以及如何检测问题。

    - *第 7 章，准备 Beta 测试！*：在解决 Super Checkout 的一些重大问题后，我们将为 Beta 测试做准备。我们会了解一些 Beta
    分发技术和管理测试的思路。

    - *第 8 章，为什么总是出问题？*：我们收到了错误报告，服务器 API 发生了变化，各种问题层出不穷。本章将研究如何将应用分解为可测试的组件，以减少代码中的错误数量。你还将学习如何让
    Instruments 自动驱动应用并报告错误。最后，我们将建立一套测试套件，确保应用稳定运行，并在后续修改中保持稳定。

    - *第 9 章，我们能实现自动化吗？*：距离实现完全自动化的构建系统只差一步，该系统能在每次向源代码仓库推送新代码时自动运行测试。我们将介绍选用的可靠构建管理工具，以及如何自动向测试者推送新版应用。

    - *第 10 章，现在他们想要 iPad 版本*：随着功能请求逐渐减少，我们发现需要开发与 iPad 兼容的 Super Checkout 版本。在本章中，你将学习如何将
    Super Checkout 迁移为通用二进制文件，以及在不同尺寸的 iOS 设备间共享代码的不同技术。

    - *第 11 章，如何分享部分代码？*：我们的应用已准备发布，但我们还创建了一些出色的功能，希望将其提取为静态库，以便在多个项目甚至整个开发者社区中共享代码。我们将探讨如何在
    GitHub 上分享代码，并简要讨论开源许可证问题。

    - *第 12 章，还有一件事*：到现在为止，我们已经将一个充满崩溃和错误的应用打磨成了可以发布的产品。本章将介绍 Xcode 的其他功能，以及如何加速工作流程。我们还将了解一些出色的第三方工具，它们能提升开发效率并减少需要编写的样板代码。


    ### 让我们开始吧


    准备好开始了吗？很好！在翻页深入项目之前，先提醒一点：本书涵盖的信息量很大，试图一次性消化所有内容并非明智之举。建议一次只读一章，必要时可反复阅读相关章节。相信我，书中的某些主题在成文之前也经过多次反复推敲。


    如果遇到困难或感到困倦，不妨暂时放下书本，甚至小睡片刻。这能让你头脑清醒，大脑会在你做其他事情时继续处理这些信息。重新阅读时，你会豁然开朗，发现自己对内容的理解更深入了。学习是一个主动的过程，正如
    Aaron Hillegass 在《Cocoa Programming for Mac OS X》中所说：“咖啡因不能替代睡眠。”


    现在，启动 Xcode 4，打开笔记本，翻页开始吧。让我们一起来享受这个过程。


    ## 第 2 章

