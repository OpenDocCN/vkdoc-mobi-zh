- fmt: '# Tracking Energy Usage


    Modern iOS devices have the ability to log power consumption and `Instruments`
    gives you a great way to see how the device consumes power and which chips are
    consuming the most power. To enable this feature, first the device needs to have
    development mode activated. This enables the `Developer` item in the `Settings`
    app. [Figure 6–22](#Chapter06.html#fig_6_22) shows this section.


    ![images](images/0622.jpg)


    **Figure 6–22.** *The Developer settings in the `Settings` app with the power
    logging turned off*


    Turning power logging on will start a new power logging session. This session
    will track power consumption by component and by app. After the session is complete,
    the data can be imported into `Instruments` to be analyzed.


    **CAUTION:** The power logging diagnostic information is reset every time logging
    is turned off. When the device is power off or runs out of battery, logging is
    turned off.


    To get a good look at how your app behaves within the ecosystem and if it coexists
    well with other applications, it is a good idea to turn on power logging and use
    the device normally for an hour or two. Going back and seeing what processes are
    doing what is very enlightening.


    In order to import the collected data, create a new `Instruments` session, and
    select `Energy Diagnostics` (see [Figure 6–23](#Chapter06.html#fig_6_23)).


    ![images](images/0623.jpg)


    **Figure 6–23.** *Selecting the `Energy Diagnostics` instrument template*


    Now, plug in the device, and go to **File** ![images](images/U002.jpg) **Import
    Energy Diagnostics** from Device. [Figure 6–24](#Chapter06.html#fig_6_24) shows
    a session I ran for almost three hours.


    ![images](images/0624.jpg)


    **Figure 6–24.** *Some real data from the battery diagnostics on the device*


    What are we looking at in this view? First, look at the top of the time line.
    You''ll see flags that represent significant events like sleep/wake or an app
    going to the background or getting suspended. Keeping mental notes, or real notes
    if you''re inclined to do so, while logging power usage will help remember what
    happened when you start the analysis process.


    Each level within the `Instruments` window gives a different type of information.
    The `Energy Usage` bar shows how much power is being used for that particular
    moment of time. As each component uses more power, the bar will get taller, and
    vice versa, as chips are turned off.


    The `CPU activity` monitor will show you a good idea of what processes are doing
    what. In the `Jump Bar`, you can select `App Activity` or `CPU Activity`. In `App
    Activity`, you can see what apps are running and when they switch to the background
    or are suspended. The `CPU Activity` view lets you see where the processor is
    spending time doing processing. You can see what part of the processor is processing
    graphics or audio. Each bar represents a scale. The scale is from 1 to 20. [Figure
    6–25](#Chapter06.html#fig_6_25) gives you an idea as to how this is measured.
    The numbers really represent a calculation that says, “If the CPU stays like this
    for a long time, this is how much battery life is left.”


    ![images](images/0625.jpg)


    **Figure 6–25.** *CPU Activity reference chart*


    `Display Brightness` tells you what the device''s display was doing. The backlight
    takes power, so knowing how bright the screen is in a situation can be useful.
    When the chart is 0, the screen is off.


    `Sleep/Wake` shows you, in an on/off view, when the device wakes up. When the
    brightness is 0 and the device is awake, something is doing some background processing.
    It is likely that `Mail` is getting new messages, or you might see some audio
    processing in the `CPU Activity` view.


    The final three charts show the status of radio instrumentation.


    # Using the Tricks of the Trade


    When doing power consumption testing, there are some good experimental controls
    to keep in mind. These things can be turned on or off to see how the device behaves
    in a multitude of situations. These include turning off iOS 4 features like mail
    fetching, push notifications, and automatic dimming. Another good idea is to test
    with the various radios on/off. It is also worth noting that colder climates will
    decrease battery life.


    Performance testing and tuning is more like a science when it comes to gathering
    data. Setting the appropriate experimental controls will help you isolate exactly
    what is going on when you go to analyze your data. For example, if you notice
    that your application is spending too much time talking with the server and the
    battery drain is too much, you can modify how the application is talking to the
    server. If your application has background tasks, consider changing how the background
    task is written to potentially shorten the amount of time the task needs to take.
    This could entail changing how the data is structured when talking to a server
    or updating the task to run as short as possible. Ultimately, you know your application
    the best, and each `Instrument` is going to show you information specific to your
    application. Sometimes, the data you find can be pretty surprising and eye opening.


    # Summary


    We''re all communication experts now, right? We''ve actually only scratched the
    surface on what you can do to improve the performance of your networking code
    and proper caching strategies. The approach we took in this chapter is a pretty
    common approach, but it is a very blunt approach. If you find your application
    doesn''t fit this scheme, there are plenty of really smart people out there whose
    entire job is to research caching approaches and squeeze every bit of performance
    out of the system.


    This sums up the performance tuning part of the book. From here on out, we''re
    going to be working on our workflow for distributing builds to beta testers and
    automating some other pieces of our workflow. Performance tuning is hard work,
    but seeing the increased performance of the application is worth every bit of
    tweaking and multiple test runs. I hope you have enjoyed the experience thus far;
    more fun stuff awaits you in the coming chapters.


