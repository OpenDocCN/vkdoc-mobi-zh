    ![images](images/0818.jpg)


    **Figure 8–18.** *Using other instruments together with Automation lets you to
    tie data back to user actions.*


    Setting up and using automation early in your development cycle and scripting
    all of your user interactions will pay off greatly in the long run, both in better
    performance and more sanity.


    ### Test, One Way or Another


    That''s testing, in a nutshell. You''ve got the beginnings of a unit test suite,
    your JSON parser-wrapper is a little better off than when you started, and you''ve
    got most of your use cases scripted for the automation instrument. Admittedly,
    this has all been very ad hoc. What you really need is a testing strategy.


    Your testing strategy is what brings method to the madness. As you saw, testing
    takes time to set up, regardless of how much time it can save. It can do you a
    lot of good, and save you a lot of time, but if it''s always an afterthought,
    you won''t get the most out of it.


    Whether you''re a TDD stickler or just need to figure out why your app is leaking
    memory left and right, testing is an important skill to learn, and Xcode and the
    developer tools well help you do it.


    ## Chapter 9


    ## Can We Automate Some of This?


    Now that your app is being thoroughly tested and your beta is underway, you''re
    starting to get requests for some new features. You''ve decided to bring a couple
    more people onto the project to help get it over the line. The new developers
    are good, but they aren''t as intimately familiar with the inner workings of your
    lovely app as you are, so you''re concerned that they might get in there and accidentally
    wreck the place. You''re very busy fixing bugs and adding features, so you can''t
    spare the time it takes to run all the tests and static analysis every time one
    of the new developers pushes an update to the project. Not only that, but adding
    developers always increases risk in integration bugs, especially on small projects.


    Fortunately, you''re far from the first person to experience this. In fact, this
    is such a common problem that there are entire methodologies, processes, and enterprise-level
    applications in place to help manage development teams. You''re not going to implement
    a new methodology, but you are going to introduce a process and some software
    that will help the team work better and keep your app on the right path.'
  trans: "\n# 引入一个 Bug\n\n现在你已经拥有一个功能完备的自动化测试脚本，可以成功测试指定的用户流程，我们来看看它的价值所在。与单元测试不同，在应用程序构建完成之前编写自动化脚本虽然并非完全不可能，但极其困难。你确实应该记录并规划好用户旅程和界面，完全可以基于这些文档编写脚本，但手工编写脚本可能非常繁琐。自动化界面测试的主要用途是维护用户流程的完整性，在开发过程中剔除回归性错误，以及进行性能测试。让我们看看你的测试如何在应用中实现这一目标。\n\
    \n举个例子，假设你采用了一种新的日志格式，需要更新应用中所有使用的 `NSLog` 函数。你正在处理 `ProductDetailsViewController`。当\
    \ API 引擎通知你已收到将产品添加到购物车的请求时，你会发布一条通知并记录一条日志信息。这部分需要重新设计，而在开发过程中，你无意中犯了一些小错误。\n\
    \n在你修改之前，该方法看起来是这样的：\n\n```\n-(void) cartContentsReceived:(NSDictionary *)cart\
    \ forRequest:(NSString *)connectionIdentifier {\n        NSLog(@\"Shopping cart\
    \ contents: %@\", cart);\n        NSNotification *note = [NSNotification notificationWithName:@\"\
    CartUpdated\" object:[NSNumber numberWithInt:[[cart objectForKey:@\"items\"] count]]];\n\
    \n        [[NSNotificationCenter defaultCenter] postNotification:note];\n\n  \
    \      [self.navigationController popViewControllerAnimated:YES];\n}\n```\n\n\
    新方法原本只是打算增加更多日志记录，现在看起来是这样的：\n\n```\n-(void) cartContentsReceived:(NSDictionary\
    \ *)cart forRequest:(NSString *)connectionIdentifier {\n        NSLog(@\"%s Shopping\
    \ cart contents: %@\", __PRETTY_FUNCTION__, cart);\n        NSNotification *note\
    \ = [NSNotification notificationWithName:@\"CartUpdated\" object:[NSNumber numberWithInt:[[cart\
    \ objectForKey:@\"items\"] count]]];\n\n        [[NSNotificationCenter defaultCenter]\
    \ postNotification:note];\n\n        NSLog(@\"%s Notification posted: %@\", __PRETTY_FUNCTION__,\
    \ note);\n}\n```\n\n你可能会注意到，旧方法和新方法之间存在一个主要的、不符合预期的差异。在你过度热情的日志记录工作中，你意外删除了方法的最后一行，即将当前视图控制器从堆栈中弹出。\n\
    \n这种错误用肉眼特别难以发现，因为它并不会表现为一个明显的错误。应用程序不会崩溃，商品依然会被添加到用户的购物车中，当用户点击返回按钮时，购物车按钮也已更新显示新数量。唯一改变的是用户体验。\n\
    \n现在，让我们在应用上运行该脚本，看看它能否帮你找到这个棘手的界面/回归性错误。按 Control+I 启动 Instruments 并设置一个 Automation\
    \ 工具。运行你之前运行过的脚本。一旦到达将产品添加到购物车的测试部分，脚本就会在导航栏中查找一个标签反映了新购物车商品数量的按钮。\n\n```\nvar\
    \ cartButton = target.frontMostApp().mainWindow().navigationBar().rightButton();\n\
    var quantity = i + 1;\n\nif(cartButton.label().search(\"(\"+quantity+\")\") ==\
    \ -1) {\n        UIALogger.logFail(\"Expected cart button to display \"+quantity+\"\
    \ items, but found \"+cartButton.label());\n} else {\n        UIALogger.logPass();\n\
    }\n```\n\n由于你意外修改了应用的流程，这个脚本将会失败。幸运的是，你会获得脚本失败瞬间的截图记录，以及一条指示哪里出错的提示信息。隔离出负责这部分代码并检查修订历史以找出改变之处，应该不会太困难。\n\
    \n# 自动化的力量\n\n除了发现错误和确保用户体验的完整性外，自动化还可以帮助你微调应用的性能。通过将其与其他 Instruments 工具结合使用，你可以详细了解应用在各种情况下的行为表现。为所有用户流程和用例编写脚本是一个绝佳的主意。当所有这些脚本都编写完成后，你可以结合\
    \ CoreData instruments 工具运行它们，以找到可能需要优化数据获取的地方。你可以添加 Allocations 工具来查看应用在任何给定时刻使用了多少内存，从而找出需要消除的可能有害的内存峰值（图\
    \ 8-18）。\n\n![images](img/0818.jpg)\n\n**图 8-18.** *将其他 Instruments 工具与 Automation\
    \ 结合使用，可以将数据与用户操作关联起来。*\n\n在开发周期早期就设置并使用自动化，并为所有用户交互编写脚本，从长远来看将带来巨大的回报，无论是更好的性能还是更高的可控性。\n\
    \n## 无论如何都要测试\n\n简而言之，这就是测试。你已经有了单元测试套件的雏形，你的 JSON 解析器包装器比开始时要好一些，并且你已经为自动化工具编写了大部分用例的脚本。诚然，这一切都非常临时。你真正需要的是一个测试策略。\n\
    \n你的测试策略是用来为混乱局面带来条理性的。正如你所见，无论测试能节省多少时间，设置测试本身需要时间。它可以为你带来很多好处，节省大量时间，但如果它总是事后才被想起，你就无法充分利用它。\n\
    \n无论你是 TDD 的坚定拥护者，还是只需要弄清楚为什么你的应用左右不停地泄漏内存，测试都是一项需要学习的重要技能，而 Xcode 和开发者工具将帮助你做到这一点。\n\
    \n# 第 9 章\n\n# 我们能自动化部分内容吗？\n\n现在你的应用经过了全面测试，Beta 版也已经启动，你开始收到一些新功能请求。你决定再带几个人加入项目来帮助完成最后冲刺。新来的开发者很优秀，但他们不像你那样熟悉你漂亮应用内部的工作机制，所以你担心他们可能会一头扎进去，不小心把地方搞砸。你正忙于修复错误和添加功能，所以没法每次都抽出时间在新来的开发者推送更"
- fmt: '### Continuous Integration


    Continuous Integration, commonly referred to as simply “CI”, is a process of performing
    quality control checks continuously through the life of a project, rather than
    at intervals. Where a non-CI project team might gather together every week to
    run tests and evaluate the low-level project health, a CI-oriented team is constantly
    running tests to stay informed and ensure their integrations are not introducing
    bugs.


    In the past, a Continuous Integration system might have been as simple as having
    a cron job execute a project''s unit tests on an hourly basis. This gives continuous
    feedback and notifies the developer of integration issues, but it really only
    works for a team of one developer. Modern CI relies largely on software, which
    automates the tests and analysis. This software is typically run on a server and
    is set up to notify developers when their code has broken the build. This server
    is often responsible for multiple CI jobs; in some cases it''s distributed across
    multiple servers to handle larger build loads.


    There are many Continuous Integration software packages on the market. One of
    the most popular CI applications is Jenkins. In order to keep your new team on
    the straight and narrow, you''re going to set up an instance of Jenkins to automate
    your building, testing, analysis, and deployment.


    #### Meet Jenkins


    Jenkins is a Java-based application with a web interface that allows you to set
    up build jobs, triggered by a variety of events, using a shell scripting interface
    or any of a library of plug-ins. Jenkins also offers the ability to manage users
    and permissions, which is ideal for large teams or teams that include contractors
    and clients. Jenkins, through the extensive plug-in library, supports multiple
    version control systems including Subversion, CVS, and Git. Also, Jenkins is open-source
    and free.


    **NOTE:** While working with Jenkins, you may see reference to a product called
    Hudson. Prior to 2011, Jenkins was known as the Hudson project, which started
    at Sun Microsystems. In late 2010, a trademarking issue arose, which caused a
    fork in the project development, and Jenkins was born. Today, the Hudson project
    is supported by Oracle, and Jenkins continues to be developed by the community.


    #### Getting Jenkins Up and Running


    Jenkins can be downloaded from [`http://jenkins-ci.org/`](http://jenkins-ci.org/).
    Being Java-based, it is cross platform and can be installed on a variety of operating
    systems, including OS X. The minimum requirement for Jenkins at time of writing
    is the Java Runtime Environment v1.5. In order to install it, you''ll need three
    things: administrator access to the server it''ll run on; the ability to create
    a user for it to run under; and the ability to control the machine, either through
    remote screen sharing or directly.


    When creating a new user, you need to do several things to prepare for Jenkins.
    First, you need to get new keys made. You''re going to need any SSH auth necessary
    for checking out from your repository, be it Github or anything else. Jenkins
    is going to be checking out your project regularly, and you need to ensure that
    it is able to do so. Second, you''ve got to get certificates and keys from the
    Apple developer portal. You may already have these keys on your development machine
    or account, but the Jenkins user needs to have its own keychain with its own keys
    and certs. You''ll also need to get a valid provisioning profile for the certificates
    and throw it into Xcode''s organizer. Once you''ve got the Jenkins user adequately
    keyed, certified, and provisioned, you''re ready to set up the Jenkins environment.


    Jenkins is incredibly easy to install. Simply download the installer package and
    run it ([Figure 9–1](#Chapter09.html#fig_9_1)). When installation is complete,
    you''ll find a Jenkins folder in your Applications directory.


    ![images](images/0901.jpg)


    **Figure 9–1.** *Installation should be a familiar process. No surprises or gotchas.*


    Inside the Jenkins folder, you''ll find the Jenkins `.WAR` (Java Web Archive)
    file. If you''re not familiar with Java, this is the executable for the web application.
    There shouldn''t be any need to run the `.WAR` file, as the installation script
    should have launched Jenkins for you. To ensure that it''s running, simply fire
    up your browser and go to [`http://localhost:8080/`](http://localhost:8080/).'
