    \ should see something similar to [Figure 2–11](#Chapter02.html#fig_2_11).\n\n\
    ![images](images/0211.jpg)\n\n**Figure 2–11.** *The Project navigator uses your\
    \ source control system to track your files and shows you what files are modified\
    \ and what files are new.*\n\nNow, we'll check in all of the modified files as\
