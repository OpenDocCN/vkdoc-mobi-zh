    \ 247 行）。再次运行应用程序，这次向购物车中添加几个商品。进入购物车界面，移除其中一个商品以触发第一个断点。输入`info break`命令查看 GDB\
    \ 分配的内部断点编号。\n\n```\n(gdb) info break\nNum Type           Disp Enb Address   \
    \ What\n1   breakpoint     keep y   0x00003fd2 in -[ShoppingCartViewController\n\
    tableView:commitEditingStyle:forRowAtIndexPath:] at /Users/brandon/Development/iOS/Super\n\
    Checkout/Super Checkout/../Super Checkout/ShoppingCartViewController.m:172\nbreakpoint\
    \ already hit 1 time\n2   breakpoint     keep y   0x00004622 in -[ShoppingCartViewController\
    \ removeItemFromCart:] at\n/Users/brandon/Development/iOS/Super Checkout/Super\
    \ Checkout/../Super\nCheckout/ShoppingCartViewController.m:247\n(gdb)\n```\n\n\
    你可能会看到其他断点被列出。找到对应我们想要中断一次的循环的那个断点。我在前面的代码片段中已经摘录了它。我们需要最左侧列中的数字，即 2。我们只想在字典中的`id`值等于要移除商品的`id`值时，才停止该例程。由于该变量在作用域内，让我们通过输入`po\
    \ item`来查看`item`变量是什么样的。本次运行的输出如下：\n\n```\n(gdb) po item\n{\n    id = 3;\n   \
    \ name = \"Blood Orange\";\n    price = 110;\n    quantity = 1;\n    subtotal\
    \ = 110;\n}\n(gdb)\n```\n\n我们关心的`id`是 3。对应的 Objective-C 代码如下：\n\n```\n[[item objectForKey:\
    \ @\" id\"] intValue] == 3\n```\n\n编译器通常会解析这条语句，确定我们发送的每条消息的值的类型，并计算表达式。GDB 也能帮助我们即时评估这个表达式。不过，我们需要稍微帮它一把。每条消息都必须有强类型。必须消除所有歧义。我们可以通过类型转换来实现。\n\
    \n通过类型转换来修改条件中的每条消息传递调用。我们在这里这样做：\n\n```\n((int) [[item objectForKey: @\"id\"\
    ] intValue] ==3)\n```\n\n让 GDB 将 14 号断点设置为条件断点，即 GDB 仅在条件为真时才停止。语法是`condition\
    \ NN code`：\n\n```\n(gdb) condition 2 ((int) [[item objectForKey: @\"id\"] intValue]\
    \ == 3)\n(gdb)\n```\n\n就是这样！使用`c`命令（代表“continue”）继续执行我们的程序：\n\n```\n(gdb) c\n\
    ```\n\n很快，当条件满足时，你的调试器就会停止。\n\n有没有办法在 Xcode 中做到这一点？当然有！你需要做的是，在导航区域中前往断点导航器（Breakpoint\
    \ Navigator），或者右键点击你想要编辑的断点，然后从上下文菜单中选择“Edit Breakpoint”。图 4-29 展示了直接从编辑器中编辑的方式。由于这仅仅是\
    \ GDB 之上的一个图形用户界面，因此挑剔性依然有效。将所有内容进行类型转换！\n\n![images](img/0429.jpg)\n\n**图 4-29.**\
    \ *直接从 Xcode 中编辑断点*\n\n了解两种设置条件断点的方法都很重要。有时数据可能快速变化，你需要直接与 GDB 交互。\n\n#### 融会贯通\n\
    \n为了完成我们的 GDB 训练，我们将暂时离开这个 bug，讨论 GDB 的最后一个话题。\n\n利用类型转换来评估表达式的技巧，除了用于评估条件断点之外，同样适用于操作实时数据。让我们结合到目前为止所学的内容。在这里，我们向一个局部参数追加一个字符串，让\
    \ GDB 用一个美元符号变量为我们创建一个新字符串，然后用`po`来检查它：\n\n```\n(gdb) p (NSString *) [caption\
    \ stringByAppendingString: @\" foo\"]\n$6 = (NSString *) 0x3d9ef0\n(gdb) po $6\n\
    Seen near Searching... foo\n```\n\n我们也可以将这些值塞入局部变量中。我们使用`set <arg>=<value>`命令来改变一个值。让我们修改一下`caption`：\n\
    \n```\n(gdb) set caption=$6\n(gdb) po caption\nSeen near Searching... foo\n```\n\
    \n学习使用 GDB 的最佳方法就是动手实验。在调试特别棘手的问题时，我手边总会放着一份 GDB 快速参考指南的副本（虽然有点皱巴巴的）；你可以从这里下载：\n\
    \n`http://refcards.com/docs/peschr/gdb/gdb-refcard-a4.pdf`\n\n#### 修复我们的 Bug\n\
    \n既然你现在已经掌握了 GDB 的白带功夫，让我们尝试解决这个问题。我们设置好了断点，并且具备了修改实时数据和检查内存的能力。让我们来处理这个 bug，看看发生了什么。\n\
    \n运行应用程序，向购物车中添加一些商品；确保其中一个是你在条件断点中设置要中断的那个商品。尝试从购物车中移除该商品，然后让我们逐步执行代码。\n\n不要输入`c`来继续，而是使用`n`来逐步执行并跳过函数调用。输入`s`则会进入函数调用，让你跟随代码穿过不同的函数调用；这可能会让你进入汇编代码。当应用程序中断时，输入`n`，逐行跳过，直到我们停在跳过正在被移除商品的代码行上。\n\
    \n当我们中断在相关的循环中时，在继续之前，让我们确保该商品被跳过，然后我们可以比较两个数组，以确保该商品确实被移除了。为此，继续逐步执行，直到方法即将返回（或者在右花括号处设置一个断点并继续执行）。打印出`shoppingCart`和`newItemsArray`的内容。示例如下：\n\
    \n```\n(gdb) po shoppingCart\n{\n    items =     (\n                {\n      \
    \      id = 1;\n            name = Apple;\n            price = 79;\n         \
    \   quantity = 1;\n            subtotal = 79;\n        },\n                {\n\
    \            id = 3;\n            name = \"Blood Orange\";\n            price\
    \ = 110;\n            quantity = 1;\n            subtotal = 110;\n        },\n\
    \                {\n            id = 2;\n            name = Honeydew;\n      \
    \      price = 100;\n            quantity = 1;\n            subtotal = 100;\n\
    \        }\n    );\n    total = 289;\n}\n(gdb) po newItemsArray\n<__NSArrayM 0x4ce8260>(\n\
    {\n    id = 1;\n    name = Apple;\n    price = 79;\n    quantity = 1;\n    subtotal\
    \ = 79;\n},\n{\n    id = 2;\n    name = Honeydew;\n    price = 100;\n    quantity\
    \ = 1;\n    subtotal = 100;\n}\n)\n```\n\n该商品在新数组中不见了，但购物车并没有被更新。等等！我们并没有修改购物车。好吧，这是一个愚蠢的错误；让我们通过在循环结束后添加以下几行代码来修复这个问题：\n\
    \n```\nNSMutableDictionary *newCart = [NSMutableDictionary dictionaryWithDictionary:shoppingCart];\n\
    [newCart setValue:newItemsArray forKey:@\"items\"];\nshoppingCart = newCart;\n\
    ```\n\n现在，关闭断点，测试应用程序。运行完美！如果没有 GDB，我们可能就不得不在各处使用`NSLog`语句了。\n\n### 当所有方法都失败时\n\
    \n如果你已经到了调试问题的这一步，仍然没有解决方案，并且在 Google 上搜索你的问题得到的都是你已经访问过多次的相同网站，那么是时候放弃了。不，我不是说把你的电脑扔了。那样会伤到你的脚，你还得买一台新电脑；医药费和新电脑并不能修复这个\
    \ bug。不过说真的，至此我们已经用尽了所有选项，因为我们已经完成了以下步骤：\n\n- 排除了消息发送到已释放内存的情况\n- 排除了异步代码调用已释放内存的情况\n\
    - 防止了内存耗尽并消除了内存泄漏\n- 重现了问题并使用 GDB 逐步调试了代码\n\n哇，我们已经完成了一系列不错的故障排查步骤，并走到了最后。那么接下来呢？\n"
- fmt: '#### Heisenbugs


    If the issue is a race condition, especially within multiple threads, you might
    be tempted to litter the code with `NSLog` statements to check state. Don''t.
    Let me repeat that. Don''t do it. By adding `NSLog` statements, you are changing
    the conditions of the race condition and could remove it altogether.


    Wait, I bet you''re asking, “Did he say not to remove the race condition?” Yes,
    I did say that. While that might be an acceptable solution in the short term,
    you could very well have a fundamental design issue in the application that will
    crop up later.


    We call these types of bugs Heisenbugs, because they obey the Heisenberg uncertainty
    principle. The principle states that the simple act of measuring the occurrence
    of something changes the behavior altogether. For more information about this
    behavior, do some reading on the “double slit diffraction experiment,” and you''ll
    see what the big deal is.


    #### Phone a Friend


    Chances are, you''re working within a team, so you can always ask a teammate.
    Having a fresh set of eyes on a problem can bring out the root cause of a bug,
    especially because of one question, “Why are you doing it this way?” That one
    question can bring a fresh perspective to the problem and bring about false assumptions
    when tackling a difficult issue.


    The person you bring over to review the code will also have a different level
    of expertise with certain APIs. They will likely find a problem with the way you
    are using an API if that is the case. They might also have experience with that
    type of bug. Leveraging the expertise of your team is a great way to solve tricky
    issues and build trust within the team. Really, it''s a win-win situation.


    #### Start Over


    Now, we''ve reached the end of our list. You''ve thrown everything at the issue,
    and it still crops up from time to time. If you''ve been at this for quite a while,
    take a break, or sleep on it. Sometimes, a good night''s sleep can let your mind
    ponder on a problem, and you''ll wake up with a possible solution.


    If the issue is time critical, it might be time to throw up a white flag and redesign
    that section of code. Start by outlining how the system should behave with diagrams
    and other tangible things, and map out any edge cases that you think might cause
    the failure. Keep in mind that this isn''t the time to redesign the entire system
    or module. Reassess your approach, and come up with a solution.


    Starting over on the issue isn''t really giving up; you''ve simply discovered
    one way that doesn''t work. After this experience, you''ll have a great story
    to share and experience with debugging that type of issue.


    ### And We''re Done … Almost


    Wow, we''ve been on quite the journey through this chapter. We started off with
    an application that had some severe memory issues. It was crashing on some simple
    actions, and we''ve solved them. There are still some issues with the app, and
    we''re going to continue with iterating through the application to march forward
    to releasing a beta version of Super Checkout.


    What''s left? We have to merge our branch back in with the master branch to continue
    development with master. Were you committing your changes incrementally as we
    modified the application? Yes? Good. If not, it''s not a big deal for this application.
    I suggest committing early and often, especially since the Git repository is modified
    locally until you push to the remote repository.


    If you haven''t done so, perform a final commit of the project to the memory branch,
    and open up the Organizer to the Repositories tab. Select your working copy underneath
    the repository in the repository navigator. We want to switch back to the master
    branch, since it is going to be the destination of the merge. You can do this
    by clicking the Switch Branch button at the bottom of the working copy (see [Figure
    4–30](#Chapter04.html#fig_4_30)).


    ![images](images/0430.jpg)


    **Figure 4–30.** *Viewing the history of your working copy*


    When you click the Switch Branch button, a sheet is brought up asking you to choose
    which branch to switch to (see [Figure 4–31](#Chapter04.html#fig_4_31)). Select
    the master branch, and click OK.


    ![images](images/0431.jpg)


    **Figure 4–31.** *The switch branch sheet*


    Now, back in Xcode, we want to merge in the changes from the other branch, so
    you''ll want to select File![image](images/U001.jpg)Source Control![image](images/U001.jpg)Merge.
    A sheet is displayed (see Figure 2–32) that asks you which branch to merge in;
    select Memory_Fixes, and click Choose.


    ![images](images/0432.jpg)


    **Figure 4–32.** *Choosing the branch to merge from*


    **TIP:** Make sure your working copy is the branch you wish to merge to.


    The next thing you will see is the final merge confirmation. This sheet allows
    you to decide which differences you want to include and shows you the preview
    of the local copy on the left. In the instance of a real conflict, the buttons
    at the bottom let you choose how you wish to merge the conflict in (see [Figure
    4–33](#Chapter04.html#fig_4_33)).


    ![images](images/0433.jpg)


    **Figure 4–33.** *The merge sheet is a handy way to visually see your merge before
    it is committed.*


    Clicking Merge triggers Xcode to perform the merge exactly as you configured it
    and to commit the changes to the branch. The merge is complete, and switching
    back to the Organizer to view the revision history of your working copy will reflect
    the commits that were merged in (see [Figure 4–34](#Chapter04.html#fig_4_34)).


    ![images](images/0434.jpg)


    **Figure 4–34.** *Xcode automatically commits the merge to the repository.*


    The merge is complete, and we''re ready to move on with the rest of the polish.


    ### Summary


    We''ve covered a lot of ground in this chapter! We talked about the latest compiler
    technology and how to address memory relates issues. You can now consider yourself
    a zombie slayer and memory plumber. These accomplishments, however, are only the
    first steps in solving the problems with Super Checkout. Coming up next are addressing
    sluggish user interfaces and optimizing our application for creating fluid transitions
    and fast tables. It is time to learn how to use the next set of tools available
    to us. Are you ready? Good, turn the page, and let''s go!


    ## Chapter 5


    ## Core Animation and Smooth Scrolling


    There is nothing more annoying than a sluggish user interface. As developers,
    we have the job of ensuring applications are responsive and snappy. This is not
    always easy. Algorithms can become complicated and run for longer than expected.
    Designers design complicated views with heavy graphics. Combine the two, and you
    can easily run into a situation where a user interface becomes a bit choppy when
    scrolling. `UITableView`s are notorious for having this kind of issue.


    In this chapter, you''re going to learn how to design algorithms to run efficiently
    (or fake it) and design views to help the device calculate animations rather than
    the views themselves. By the end of this chapter, the product list screen of Super
    Checkout will scroll super fast, and you''ll have some great techniques for designing
    views that will not choke the graphics processor when it is rendering those views
    to the screen.


    You are in for quite the journey. We''re going to cover some pretty complicated
    stuff, so grab some coffee and prepare for the ride.'
