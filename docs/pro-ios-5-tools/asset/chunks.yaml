  raw: '### What You Need to Get Started


    To get the most out of this book, you''ll need a paid developer account in the
    iOS Dev Center. This will give you the ability to test on an iOS device as well
    as run the performance tools against the iOS device. We will do several things
    on the device itself, and your best bet is to go ahead and sign up for the paid
    developer account if you don''t have one already. At the time of this writing,
    the cost is $99 USD for a one-year subscription to the iOS developer program.


    If creating an account is not an option for you, you can download Xcode 4 from
    the Mac App Store. This will give you the Xcode IDE as well as Instruments. You''ll
    have the ability to develop and debug your applications in the iOS Simulator,
    and you can run some of the performance tools against that simulator. However,
    you won''t be able to do some of the debugging and performance testing that we''ll
    cover later on in this book.


    To get set up with the iOS Dev Center, go to [`http://developer.apple.com/ios/`.](http://developer.apple.com/ios/.)
    [Figure 1–1](#Chapter01.html#fig_1_1) shows what the home page looks like. Click
    the Register link at the top to get started. If you want to deploy your applications
    to iOS devices, this is your best bet. If you are an enterprise developer, check
    out the enterprise developer program.


    ![images](images/0101.jpg)


