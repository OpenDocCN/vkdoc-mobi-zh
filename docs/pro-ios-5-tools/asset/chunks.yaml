    # 驱逐 Jenkins 的守护进程


    你将设置托管在 Github 上的 Super Checkout 任务。Git 插件为 Jenkins 增加了对 Git 作为版本控制系统（VCS）的支持，但由于
    Github 需要 SSH 认证密钥，而 Jenkins 目前是由一个名为 `daemon` 的隐藏用户运行的，因此暂时无法与 Github 通信。为了启用
    SSH 密钥，你需要用你自己的用户（在安装之前设置好的）来替换这个用户。或者，你也可以简单地使用 HTTPS 协议的 Git，但那样速度会慢一些。


    让 Jenkins 使用你自定义的用户相当简单。首先，你需要关闭 Jenkins。即使你还没有设置任何任务，养成通知 Jenkins 即将关闭的习惯也是个好主意。所以，请先在浏览器中打开
    Jenkins 仪表板。从侧边栏点击**管理 Jenkins**，然后点击页面底部的**准备关闭**。


    准备好关闭 Jenkins 后，打开终端。你需要完全关闭 Jenkins 守护进程。正确的方法是使用 `launchctl` 来卸载它，通过指定其配置 plist
    文件，可以加载和卸载守护进程。配置 plist 包含了关于 `launchctl` 应如何运行守护进程的信息，包括应从哪个用户生成该进程。卸载 Jenkins
    守护进程后，你可以调整 plist 以使用你的具有 SSH 授权的苹果认证用户，然后重新启动守护进程。


    首先，像这样卸载 Jenkins 守护进程：


    ```

    sudo launchctl unload -w /Library/LaunchDaemons/org.jenkins-ci.plist

    ```


    在对 plist 本身进行任何操作之前，你需要先保存它的备份。


    ```

    cp /Library/LaunchDaemons/org.jenkins-ci.plist ~/Desktop/org.jenkins-ci_backup.plist

    ```


    接下来，在你选择的终端编辑器中打开 plist 文件。这是一个 plist 文件，所以其格式应该相当熟悉。这是一个简单的编辑，但如果你对终端不太熟悉，使用类似
    `nano` 的工具来编辑可能会更合适。


    ```

    sudo nano /Library/LaunchDaemons/org.jenkins-ci.plist

    ```


    你感兴趣的键是 `UserName`，默认情况下它被设置为 `daemon`。只需将此值更改为 `jenkins`（或你给用户账户起的任何名字）。plist
    中的该部分现在应如下所示：


    ```

    <key>UserName</key>

    <string>jenkins</string>

    ```


    你也可以修改 Jenkins 存储其文件的位置。将 Jenkins 主目录放在 `/Users/Shared`（默认位置）是一个好主意，这样所有用户都能访问它。此设置的键是
    `JENKINS_HOME`。无论你是否更改，请务必记下该位置，因为你稍后需要确保你的新用户对其拥有读写权限。完成后，保存更改并关闭 plist 文件。如果你使用
    `nano`，可以通过按 `ctrl+X`，然后在确认对话框中按 `Y` 来完成。


    最后一步是给予你的新用户对 Jenkins 主目录的所有权（如果你的用户和 Jenkins 主目录不同，你可能需要修改此代码）：


    ```

    sudo chown -R jenkins /Users/Shared/Jenkins

    ```


    现在，守护进程的配置 plist 已反映出你的用户，该用户对 Github 拥有足够的访问权限，你可以重新启动守护进程了。


    ```

    sudo launchctl load -w /Library/LaunchDaemons/org.jenkins-ci.plist

    ```


    跳回你的浏览器并重新加载 Jenkins 仪表板。Jenkins 应该正在启动。为了确认它是在正确的用户下运行的，打开**活动监视器**工具（图 9–6），并在**所有进程**下搜索一个由
    `jenkins` 用户（或你给 Jenkins 起的任何名字）运行的 `java` 进程。


    ![images](img/0906.jpg)


    **图 9–6.** *你可能会有多个名为 java 的进程，但应该只有一个属于 jenkins。*


    # 获取一个任务


    在 Jenkins 中，与许多 CI 系统一样，一个任务（也称为一个项目）是一组构建指令，当触发事件发生时执行。这组指令通常包括从仓库重新检出或更新源代码、从源代码进行全新构建、单元测试、静态分析、文档生成和部署。简而言之，任务在触发器上执行项目构建。


    触发器就是可用于启动任务的事件。Jenkins 支持三种类型的触发器。


    *   **任务依赖**：当另一个任务完成时，可以触发任务。这非常适用于在依赖库被修改时级联执行一组任务。

    *   **时间间隔**：当经过指定时间后，可以简单地触发任务。这非常适用于夜间构建或未使用源代码控制的项目。但你不会在像那样的项目上工作，对吧？

    *   **SCM 轮询**：这可能是最有用的触发器。本质上，Jenkins 会轮询给定的仓库以查找更新，如果发现任何更新，就会触发构建。这确保了构建始终基于最新的代码库，并减少了因使用时间间隔触发器可能导致的不必要构建。


    那么，让我们开始设置你的任务。首先，点击 Jenkins 侧边栏中的**新建任务**链接。任务创建页面（图 9–7）允许你为任务命名并选择项目的起点。你将专注于自由风格软件项目选项。一旦你在系统中有了一个任务，此列表底部将出现另一个选项，允许你使用现有任务作为新任务的模板。


    ![images](img/0907.jpg)


    **图 9–7.** *请确保为你的任务指定一个独特且易识别的名称，因为你可能会发现仪表板很快就会变得杂乱。*


    **注意：** 你的任务名称将用于在 Jenkins 主目录中创建一个目录，该目录将存放项目的所有资源和元数据。由于某些插件的编写方式，建议在任务名称中避免使用空格或其他对文件系统不友好的字符。


    命名项目后，点击**确定**继续进入任务配置页面。配置页面允许你管理任务的许多方面，包括版本控制信息、触发器、构建步骤和构建选项。让我们从宏观层面浏览配置页面的每个部分。


    *   **基本项目信息**：页面的最顶部部分允许你编辑项目的名称和描述，以及一些其他基本配置。**禁用构建**选项允许你禁用任务。

    *   **高级项目选项**：高级选项主要用于更复杂的任务或拥有大型团队的项目。**静默期**选项允许你防止 Jenkins 在“提交突增”时为每次 VCS
    提交进行构建，这通常会使系统过载。它创建了一个宽限期，在此期间 Jenkins 会等待，在构建前查看是否有其他提交正在处理。

    *   **源代码管理**：这是你选择和配置仓库的地方。开箱即用，Jenkins 支持一些 SCM，但当你向系统添加插件以启用其他 SCM（例如 Git）时，它们将被添加到此列表中。

    *   **构建触发器**：如前所述，任务的执行必须由事件触发。触发器部分允许你选择哪些事件将执行任务。

    *   **构建**：这是任务配置的核心部分。它允许你向流程添加构建步骤，这些步骤可以采用多种形式。最常见的形式，至少是你最感兴趣的形式，是**执行 shell**
    构建步骤类型（稍后会详细介绍）。

    *   **构建后操作**：一旦你完成了成功（或不成功）的构建，你应该对其执行一些操作。构建后操作允许你通知用户、将构建结果发布到某处，甚至启动另一个任务的执行。

