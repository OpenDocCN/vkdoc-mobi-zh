    问题导航器显示问题出在`SuperCheckoutAPIEngine.m`中。错误是“词法或预处理器问题‘`ASIHTTPRequest.h`’未找到。”嗯，修复对`SBJSON/JSON.h`有效，为什么对`ASIHTTPRequest.h`无效？


    原因很简单。我们只需要在导入的`ASIHTTPRequest.h`前面加上其父目录。因此编辑`SuperCheckoutAPIEngine.m`，内容如下：


    ```

    #import "SuperCheckoutAPIEngine.h"

    #import "SuperCheckoutRequestTypes.h"

    #import "SCJSONParser.h"

    #import "Product.h"

    #import "ASIHTTPRequest/ASIHTTPRequest.h"

    #import "ASIHTTPRequest/ASIDownloadCache.h"

    #import "NSString+UUID.h"

    ```


    为什么我们需要添加`ASIHTTPRequest/`？我们告诉 Xcode 在`Super-Checkout`目录旁边的目录`SBJSON`和`ASIHTTPRequest`中查找。但是当我们导入（`#import`）头文件时，我们正在做两件不同的事情。`#import
    "SBJSON/JSON.h"`表示导入位于目录`SBJSON`内的文件`JSON.h`。如果您查看`SBJSON`项目文件夹内部，您会看到另一个`SBJSON`文件夹。文件`JSON.h`在那里。`#import
    "ASIHTTPRequest.h"`表示导入位于某处的`ASIHTTPRequest.h`文件。如果您查看`ASIHTTPRequest`文件夹内部，有另一个`ASIHTTPRequest`文件夹，其中`ASIHTTPRequest.h`位于那里。


    Super Checkout 现在应该可以构建了。


    ## 使用工作区


    如前所述，Apple 在 Xcode 4 中引入了工作区的概念。工作区是多个相关项目的通用逻辑容器。通过使用工作区，您让 Xcode 管理工作区项目之间的显式和隐式关系。在我们的案例中，Xcode
    将在我们构建 Super Checkout 应用程序时构建静态库。


    **注意：** 请记住，您需要从我们在创建子项目之前制作的副本开始工作。如果您的 Super Checkout 应用程序项目将静态库作为子项目，那么您正在使用错误的项目。


    如果尚未打开，请在 Xcode 中打开 Super Checkout。


    选择文件 ![image](img/U001.jpg) 新建 ![image](img/U001.jpg) 新建工作区。当另存为对话框出现时，导航到包含 Super
    Checkout 项目的目录。您还应该看到我们之前创建的 ASIHTTPRequest 和 SBJSON 静态库项目。输入`Super-Checkout.xcworkspace`作为工作区的名称，然后单击保存（参见
    Figure 11–26）。


