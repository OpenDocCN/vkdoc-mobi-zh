  trans: '

    ### 运行超级结账应用


    在模拟器或测试设备上运行该应用。你的屏幕应显示为图 3-10 所示。首先你会注意到图片加载存在延迟；我们将在后续章节解决该问题。点击产品可进入详情界面，点击"加入购物车"按钮可将商品添加至订单。而"购物车"按钮则会翻转视图，显示你的购物车内容。


    ![images](img/0310.jpg)


    **图 3-10.** *处于 Alpha 版本的超级结账应用*


    在浏览和熟悉应用的过程中，你会发现如果快速连续地从商品详情页返回库存列表，应用很可能会闪退。正是这类崩溃及其他问题，表明该应用仍处于 Alpha 阶段，需要进一步优化调整。


    ### 项目导航（与 Xcode）


    在 Xcode 中管理工作流是高效开发和优化任何项目的关键。学会在不离开键盘的情况下导航编辑器，不仅能提升开发速度，还能显得很酷。Xcode 4 新增了一些实用特性来充分利用新界面，同时也改变了
    Xcode 3 中的部分常用快捷键。


    Xcode 4 中最实用的快捷键之一当属`![images](img/U003.jpg)J`。按下该组合键会弹出"将焦点移至..."编辑器窗口（见图 3-11）。高亮区域即为按下回车键后焦点所至位置。使用方向键移动选择即可轻松切换标签页。将选择移至当前编辑器侧边（带加号的区域）可创建新的助手编辑器。


    ![images](img/0311.jpg)


    **图 3-11.** *"将焦点移至..."功能让你在标签页间切换并创建助手编辑器*


    此前在实现文件与头文件间切换需要按下`command-option-上方向键`。Xcode 4 将其改为`command-control-上方向键`，或在触控板上使用三指向上/向下滑动手势（前提是该手势未被操作系统占用——Lion
    系统大量使用三指滑动）。


    `Option-点击`符号可弹出显示该符号详细信息的小浮窗。通过浮窗可查看类的头文件，若为框架类则可查阅文档。


    `Command-点击`符号可跳转至其声明处。若符号为变量，该变量声明将被高亮；若为类，编辑器将显示声明该符号的头文件。


    `Option-command-点击`符号可打开助手编辑器并执行与`command-点击`相同的操作。


    按下`command-shift-O`会弹出"快速打开"对话框。在该对话框中输入文件名开头，匹配的文件便会显示在下方。这是快速打开文件的便捷方式。


    上述快捷键（及其他快捷键）可在第 12 章快速查阅。


    ### 本章小结


    本章所展示的应用旨在模拟一个 Alpha 质量的应用，以便我们找到大量性能优化空间。最终产品将是一个不闪退、具备合理架构性能的应用。随着本书性能调优章节的推进，我们将对应用的不同方面进行分析、重构和重写。这将是一段精彩的旅程，现在翻页开始吧！


    ## 第 4 章


    ## 内存管理与诊断


    上一章我们接触了一个功能基本完备但仍需大量优化的应用。我们已经建立了基于 Github 的源代码控制项目，并准备开始修复该应用使其达到 Beta 测试标准。有趣的内容将从本章开始。


    目前应用闪退的可能性极高。我们知道 App Store 拒绝应用的主要原因之一就是闪退。本章你将学习如何修复与内存相关的闪退问题，并在内存泄漏影响设备性能之前发现它们。我们将采用系统化的方法解决这些问题，以便你将来在其他项目中也能套用这些步骤。随着逐步深入硬件层面，每一步的技术含量都会递增。幸运的是，我们有强大工具可用，能够解决大量内存相关问题。


    本章的应用采用手动引用计数开发。最新工具引入了名为自动引用计数（ARC）的新技术。我们首先会创建 ARC 分支来转换应用，之后讨论 ARC 可能引发的问题，并探究如何使用
    Instruments 解决这些问题。不过本书后续内容将默认使用手动引用计数。


    本章剩余部分将聚焦于手动引用计数下的内存闪退修复与内存泄漏解决。首先我们会创建本地仓库分支来隔离修改，便于最终与主分支合并。接着讨论预防技术以避免问题发生。本章后半部分将从宏观层面切入，处理超级结账应用中的内存闪退问题。随着深入排查闪退原因，我们也会更深入地探讨如何诊断此类问题。


    本章最后将重点讨论内存泄漏。你将学习如何使用 Instruments 检测和定位内存泄漏。完成这部分学习后，你将掌握在应用上架 App Store 前应对内存闪退和堵塞内存泄漏的工具与知识。'
- fmt: "### Branches Are Our Friends\n\n“Commit early and often” is a mantra developers\
    \ should live by. This mantra is aided by the use of distributed version control\
    \ systems such as Git or Mercurial. The idea here is to create a local branch\
    \ for a feature and roll that set of changes into the `master` branch when the\
    \ feature is complete. In short, this allows us to have a feature branch so we\
    \ could quickly switch back to the `master` branch to work on something else without\
    \ losing any changes. Since we’re using Git, we can leverage some of the basic\
    \ integrations with Xcode and leave some of the more powerful features for the\
    \ command line (or GUI tool of your choice). Gone are the days of a commit breaking\
    \ the build, causing you to anger your team and buy them donuts.\n\n**NOTE:**\
    \ We can also branch projects with Subversion. The difference is the branches\
    \ are created on the server as well. The concept is the same as with Git, but\
    \ the location of everything is slightly different.\n\nBefore we begin mucking\
    \ around with the application, we’re going to create a branch and merge it when\
    \ we’re finished fixing our iteration of updates to the application. To create\
    \ the branch, open Xcode 4 and go to `File` ![image](images/U001.jpg) `Source\
    \ Control` ![image](images/U001.jpg) `Repositories`, which will open up the Organizer\
    \ window. Click the `Repositories` tab. Find `Super Checkout` in the list on the\
    \ left, and click `Branches` to see one branch in the list. Click the `Add Branch`\
    \ button at the bottom of the window. A sheet like the one shown in [Figure 4–1](#Chapter04.html#fig_4_1)\
    \ is displayed that lets you create the branch. Type `ARC_Transition` for the\
    \ branch name and base it off the `master` branch by setting the starting point\
    \ to “master.” Check the option to automatically switch to the branch so we can\
    \ begin making changes after the branch is complete.\n\n![images](images/0401.jpg)\n\
    \n**Figure 4–1.** *Creating a new branch is easy via Xcode 4’s new source control\
    \ management GUI.*\n\nFinally, click `Create`. Now that we have switched to the\
    \ newly created branch, we can start performing major surgery on this branch without\
    \ messing up anything, other than possibly the current branch. We’re now ready\
    \ to start transitioning `Super Checkout` to automatic reference counting. Each\
    \ chapter will create one or more branches, so we can collect each set of updates\
    \ to the repository. This doesn’t follow what will happen in real life, but we’re\
    \ going to get as close to it as we can.\n\n### Automatic Reference Counting\n\
    \nAutomatic reference counting, or ARC, is a brand new technology Apple has given\
    \ us in the latest LLVM compiler. When the ARC flag is set on the compiler, all\
    \ of the memory management code is generated for you. This means any type of memory\
    \ management code can now get removed from the source. Put simply, any calls to\
    \ `release`, `copy`, `retain`, or `autorelease` are simply removed.\n\nMemory\
    \ management isn’t quite as simple as that though. Some new lifetime qualifiers\
    \ must be implemented to give the compiler hints on what needs to be done from\
    \ a memory management point of view. These qualifiers are:\n\n*   `__strong`:\
    \ In a strong (retained) reference, the balancing release or autorelease is generated\
    \ by the compiler.\n*   `__weak`: In this reference, when the reference is released,\
    \ the pointer is set to `nil` automatically.\n*   `__unsafe_unretained`: This\
    \ is simply a reference. This qualifier is dangerous because you can still have\
    \ a dangling pointer.\n*   `__autoreleasing`: This one tells the compiler that\
    \ it will be passed by reference (`id *`) and will be autoreleased upon return.\n\
    \nWhen declaring properties, there are three new property attributes; two can\
    \ be used in iOS 4 and above and one can be used only in iOS 5:\n\n*   `strong`:\
    \ This is a strong reference; it works like the `__strong` qualifier and can be\
    \ used in iOS 4 and above.\n*   `weak`: An automatically nilling reference, like\
    \ the `__weak` qualifier, and it can only be used in iOS 5.\n*   `unsafe_unretained`:\
    \ This is simply a reference, like the `__unsafe_unretained` qualifier, and can\
    \ be used in iOS 4 and above.\n\nThis list is not exhaustive, and there are many\
    \ other new things to keep in mind when developing with ARC enabled. One such\
    \ thing is the autorelease pool. In short, with ARC, there is no such thing as\
    \ an `NSAutoreleasePool` object. Instead, you will use the new `@autorelease`\
    \ block. It looks like what you see in [Listing 4–1](#Chapter04.html#list_4_1).\n\
    \n**Listing 4–1.** *The New and Improved Autorelease Pool*\n\n```\n@autoreleasepool\
    \ {\n        //long loop with a lot of objects created and destroyed\n}\n```\n\
    \nThe next important thing to remember when coding with ARC is to never invoke\
    \ `retain`, `release`, or `autorelease`. Ever. The compiler will even complain\
    \ about it when you do. ARC enforces several other rules, and the “Programming\
    \ with ARC” article in Apple’s developer documentation is a great place to start.\
    \ When we convert our project to ARC, we might run into some of these rules during\
    \ the conversion. If we do, we’ll talk about them."
