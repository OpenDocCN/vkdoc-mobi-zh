    ## Chapter 4


    ## Memory Management and Diagnostics


    In the previous chapter, we looked at an application that is basically feature
    complete but still needs a lot of work. We have our project set up with source
    control from Github, and we are ready to start fixing this application to make
    it ready for beta testing. The fun stuff starts in this chapter.


    The likelihood of our application crashing is very high at this point. We know
    that one of the main reasons an application is rejected from the App Store is
    because it crashes. In this chapter, you are going to learn how to fix memory-related
    crashes and find memory leaks before they cause performance issues on the device.
    We''re going to approach finding these issues in a very methodical way so that
    these steps can be followed for your future applications. Each step will be incrementally
    more technical as we will be getting closer and closer to the hardware. Fortunately,
    we have access to some very powerful tools and will be able to knock out a number
    of memory-related bugs.


    This chapter''s application was developed using manual reference counting. The
    latest tools introduce a new technology called automatic reference counting (ARC).
    The first thing we''ll do is to create an ARC branch to convert the application
    to ARC. After that, we''ll discuss issues that can arise with ARC and look at
    what Instruments gives us to fix those problems. The rest of the book will assume
