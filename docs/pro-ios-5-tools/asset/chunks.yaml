    interface enhancements.


    To get started, launch Xcode 4\. We''re going to create a new project, so click
    the Create a new Xcode project button shown in [Figure 2–1](#Chapter02.html#fig_2_1).


    ![images](images/0201.jpg)


    **Figure 2–1.** *The familiar screen that greets us when we launch Xcode*


    For this chapter, we''re going to create a Navigation-based Application. Select
    that option, and click Next. In the next screen, we name our project, declare
    our company identifier, and select any other project preferences. Go ahead and
    name the project **Super Hello World**, and fill in the company identifier in
    reverse DNS form. For this exercise, we will use **com.example**. Also check Use
    Core Data and Include Unit Tests for this project. Your screen should look similar
    to the one shown in [Figure 2–2](#Chapter02.html#fig_2_2).


    ![images](images/0202.jpg)


    **Figure 2–2.** *The project naming screen now includes the creation of a unit
    test target.*


    Clicking Next will bring up a sheet asking us where to save the project. Go ahead
    and choose a location for the project, and select the check box for creating a
    local Git repository. Clicking Create creates the project and takes you directly
    into the project settings for Super Hello World.


    The first things shown are the project details (see [Figure 2–3](#Chapter02.html#fig_2_3)).
    The item selected in the middle column is the default target for the project.
    You will also notice the unit testing target is placed below it. If you want to
    make any changes to the way the project is compiled and packaged, modify the particular
    target. If you are used to the way this was done in Xcode 3, you''ll notice that
    modifying targets is now consolidated into this one area; you no longer have to
    go to the Info pane for modifying the target as you did in Xcode 3.


    ![images](images/0203.jpg)


    **Figure 2–3.** *Xcode now had a default editor modifying project metadata and
    targets.*


    Now that our project is created, you can see a somewhat familiar view that you
    are used to in Xcode 3—except there are some new items there.


    [Figure 2–4](#Chapter02.html#fig_2_4) shows the following main sections of the
    application:


    *   On the top, the toolbar

    *   On the left, the Navigator area

    *   On the bottom, the Debugger area

    *   On the right, the Utilities area

    *   In the middle, the Editor area


    ![images](images/0204.jpg)


    **Figure 2–4.** *The Xcode workspace window with every pane open*


    #### So Many Panes!


    The first thing you probably noticed is how easy it is to lose precious editor
    space. The good news is we can close all the panes and focus on code alone. Before
    we get too far ahead of ourselves, shall we take a look at each section of Xcode
    and see what it brings us?


    At the top is the toolbar. In the toolbar, you can select the active deployment
    target and run your application. You can also select the appropriate editor for
    you as well as open and close panes. The button on the far right launches the
    Organizer window that allows you to manage iOS devices and all of your projects.


    The pane on the left is the Navigator area. In this pane, you can choose one of
    many navigators to interact with. The navigators available to you are Project,
    Symbol, Search, Issue, Debug, Breakpoint, and Log. The Project navigator is the
    default navigator that allows you to navigate the files within your project. The
    Symbol navigator shows you the symbols in the project in a hierarchical or flat
    view. The Search navigator lets you search your project for text and shows the
    results below. The Issue navigator shows you any compiler errors or warnings in
    near-real time with the new compiler technologies built into Xcode.


    The next two navigators are for debugging. The Debug navigator is only active
    during a debug session. You can view information based on threads or queues. Viewing
    by queues lets you see into the different dispatch queues and shows what kind
    of queue you''re looking at. The Breakpoint pane is where you manage the breakpoints
    in your application. As with Xcode 3, you can create new breakpoints, move them
    around, disable them, and remove them.


    The final navigator is the Log navigator. Any action you perform that is normally
    recorded will be placed in here, including builds, static analysis, source control
    operations, and debug sessions.'
  trans: '

    ## 一流工具


    Xcode 经历了又一次重大更新。这一次，Xcode 采用了一个带有标签页的巨大窗口。此版本中的大量新功能让开发者的工作更加轻松。其中一些新功能包括：


    - 单一、统一的窗口，将所有功能整合在一起。

    - 跳转栏可以更快速地浏览项目以及单个源文件，且不会占用太多空间。

    - Interface Builder 完全集成到 Xcode 中，使 nib 文件和源代码之间的集成更加紧密。

    - Xcode 助理是一个双窗格编辑器，启用后，它会为你当前编辑的文件在旁边选择一个合适的文件进行查看。

    - LLVM 3.0 完全集成到 Xcode 中，这意味着更好的语法高亮、代码补全以及 LLVM 提供的许多其他功能。

    - 修复工具利用 LLVM 的一些功能，不仅能显示编译错误，还能建议快速修复。

    - Xcode 与一些常见的版本控制系统集成得更好：Git 和 Subversion (SVN)。

    - 全新的调试器：LLDB 之于 GDB 就如同 LLVM 之于 GCC。

    - Instruments 拥有一个采用跳转栏和从 Xcode 界面借鉴的其他功能的新界面。


    有了这些新功能和增强的工作流程，当你习惯了 Xcode 3 时，可能会感觉有些不知所措。本章的计划是了解 Xcode 的一些新特性，并查看一些常见功能被移动到了哪里。


    ### 环顾四周


    首先，我们创建一个简单的项目，并将其中一些功能付诸实践。我们现在还不会创建什么有意义的东西；精彩的内容将在下一章开始。我们将了解在 Xcode 4 中完成一些常见任务的位置，以及一些新的用户界面增强功能。


    首先，启动 Xcode 4。我们将创建一个新项目，因此单击图 2–1 中显示的 `Create a new Xcode project` 按钮。


    ![images](img/0201.jpg)


    **图 2–1.** *启动 Xcode 时映入眼帘的熟悉画面*


    在本章中，我们将创建一个基于导航的应用程序。选择该选项，然后单击 `Next`。在下一个屏幕中，我们为项目命名，声明我们的公司标识符，并选择任何其他项目偏好设置。继续，将项目命名为
    `Super Hello World`，并以反向 DNS 形式填写公司标识符。在本练习中，我们将使用 `com.example`。同时选中 `Use Core
    Data` 和 `Include Unit Tests` 复选框。你的屏幕应类似于图 2–2 所示。


    ![images](img/0202.jpg)


    **图 2–2.** *项目命名屏幕现在包含了创建单元测试目标的功能。*


    单击 `Next` 将弹出一个工作表，询问我们将项目保存到哪里。继续为项目选择一个位置，并选中创建本地 Git 存储库的复选框。单击 `Create` 将创建项目，并直接将你带入
    `Super Hello World` 的项目设置中。


    首先显示的是项目详细信息（参见图 2–3）。中间列选中的项目是项目的默认目标。你还会注意到单元测试目标位于其下方。如果你想更改项目编译和打包的方式，请修改特定的目标。如果你习惯于在
    Xcode 3 中执行此操作的方式，你会注意到修改目标现在集中到这一个区域了；你不再需要像在 Xcode 3 中那样进入信息窗格来修改目标。


    ![images](img/0203.jpg)


    **图 2–3.** *现在 Xcode 有一个默认编辑器用于修改项目元数据和目标。*


    现在我们的项目已经创建好了，你可以看到一些在 Xcode 3 中熟悉的视图——只是有一些新的项目。


    图 2–4 显示了应用程序的以下主要部分：


    - 顶部，工具栏

    - 左侧，导航器区域

    - 底部，调试器区域

    - 右侧，实用工具区域

    - 中间，编辑器区域


    ![images](img/0204.jpg)


    **图 2–4.** *所有窗格都打开的 Xcode 工作区窗口*


    #### 这么多窗格！


    你首先注意到的可能是宝贵的编辑器空间很容易丢失。好消息是，我们可以关闭所有窗格，只专注于代码。在我们过于深入之前，要不要先看看 Xcode 的每个部分，看看它们为我们带来了什么？


    顶部是工具栏。在工具栏中，你可以选择活动的部署目标并运行你的应用程序。你也可以为你选择合适的编辑器，以及打开和关闭窗格。最右边的按钮启动 Organizer
    窗口，允许你管理 iOS 设备和所有项目。


    左侧的窗格是导航器区域。在这个窗格中，你可以选择多个导航器之一进行交互。可用于你的导航器有 `Project`、`Symbol`、`Search`、`Issue`、`Debug`、`Breakpoint`
    和 `Log`。`Project` 导航器是默认导航器，允许你浏览项目中的文件。`Symbol` 导航器以层次结构或平面视图显示项目中的符号。`Search`
    导航器允许你在项目中搜索文本，并在下方显示结果。`Issue` 导航器借助 Xcode 内置的新编译器技术，近乎实时地显示任何编译器错误或警告。


    接下来的两个导航器用于调试。`Debug` 导航器仅在调试会话期间处于活动状态。你可以根据线程或队列查看信息。按队列查看可以让你深入了解不同的调度队列，并显示你正在查看的队列类型。`Breakpoint`
    窗格是你管理应用程序中断点的位置。与 Xcode 3 一样，你可以创建新的断点，移动它们，禁用它们，以及删除它们。


    最后一个导航器是 `Log` 导航器。你执行的任何通常会被记录的操作都将放在这里，包括构建、静态分析、源代码控制操作和调试会话。

