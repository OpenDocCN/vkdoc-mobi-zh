    `- (NSString *)_sendRequestWithMethod:(NSString *)method`

    `                                path:(NSString *)path`

    `                     queryParameters:(NSDictionary *)params`

    `                                body:(NSString *)body`

    `                         requestType:(SuperCheckoutRequestType)requestType`

    `                        responseType:(SuperCheckoutResponseType)responseType;`


    `- (NSString *)_sendImageRequestWithURL:(NSString *)imageURL;`

    `- (NSURL *)_baseURLWithMethod:(NSString *)method`

    `                         path:(NSString *)path`

    `                  requestType:(SuperCheckoutRequestType)requestType`

    `              queryParameters:(NSDictionary *)params;`


    `// Parsing methods`

    `- (void)_parseDataForConnection:(ASIHTTPRequest *)connection;`


    `// Delegate methods`

    `- (BOOL) _isValidDelegateForSelector:(SEL)selector;`


    `- (NSCache *) imageCache;`


    This way, we can control what requests do or do not get cached.


    Now, in the implementation, update the same signature we just modified to match
    the declaration. Next, add the following block after `[request setDelegate:self]`:


    `[request setDelegate:self];`


    **`if(cache) {`**

    **`[request setDownloadCache:[ASIDownloadCache sharedCache]];`**

    **`[request setCachePolicy:`**

    **`ASIAskServerIfModifiedCachePolicy|ASIFallbackToCacheIfLoadFailsCachePolicy];`**

    **`[request setCacheStoragePolicy:ASICachePermanentlyCacheStoragePolicy];`**

    **`}`**

    `NSString *requestIdentifier = [NSString stringWithNewUUID];    `


    The next updates are to change the calls to the updated method.


    In `_sendRequestWithMethod:path:queryParameters:body:requestType:responseType:`
    change the return to pass NO to the method, like this:


    `return [self _sendRequest:theUrl`

    `                withRequestType:requestType`

    `                    responseType:responseType`

    `                                        cache:NO];`


    And in `_sendImageRequestWithURL:` change the return line to look like this:


    `return [self _sendRequest:theURL`

    `                withRequestType:SuperCheckoutProductImage`

    `                    responseType:SuperCheckoutImage`

    `                                    cache:YES];`


    The most important updates for this tier of the cache are:


    `[request setDownloadCache:[ASIDownloadCache sharedCache]];`

    `[request setCachePolicy:`


    `ASIAskServerIfModifiedCachePolicy|ASIFallbackToCacheIfLoadFailsCachePolicy];`

    `[request setCacheStoragePolicy:ASICachePermanentlyCacheStoragePolicy];`


    What we''re doing here is setting the download cache for the request to the default
    cache provided by the ASI team. Then, we''re setting up the cache policy such
    that the server is asked if the requested resource has changed. If the resource
    has not changed, the request will use the cache. If the resource has changed,
    a new resource will be loaded and cached. If the request fails, the cache will
    be used (if one exists).


    The final line is to tell the cache to store the files permanently. By default,
    the cache is set to the cache directory on the device. This folder is not synchronized
    to the computer when the device is plugged in to iTunes and iOS will clear out
    the folder as necessary.


    Now that we have a solid caching scheme in place, we can move on to the final
    level of testing—Battery Life Management.'
