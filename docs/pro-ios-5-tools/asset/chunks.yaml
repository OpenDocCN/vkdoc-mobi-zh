    ## About the Authors


    ![image](images/brandon_alexander.jpg) **Brandon Alexander** is an iOS developer,
    writer and conference speaker living in Decatur, Georgia with his wife and daughter.
    Brandon began iOS development in 2008 and has spoken at several conferences. As
    a developer, Brandon enjoys making technology transparent to users and elegantly
    useful; as a speaker and writer, he loves teaching others about technology so
    that they can do the same. When he''s not coding, writing or speaking at conferences,
    Brandon enjoys magic and photography. He can be found on twitter at `@whilethis`
    and via email at [`brandon.alexander@gmail.com`](http://brandon.alexander@gmail.com).


    ![image](images/brad_dillon.jpg) Coming from an autodidactic background, **Brad
    Dillon** taught himself the technologies of his trade, working his way through
    web development, animation, and other desktop-based interactive platforms, finally
    finding his home in touchscreen interface development. Since the iPhone SDK launched,
    Brad has been building apps for iOS devices full time. With a passion for user
    experience and a deep understanding of the technologies at play, Brad has helped
    to build solutions that bridge the gap between the devices, users, and global
    brands. He can be found online at [`http://jbradforddillon.com`](http://jbradforddillon.com),
    and followed on Twitter at `@jbradforddillon`.


    ![image](images/kevin_y_Kim.jpg) **Kevin Y. Kim** is a founder and partner of
    AppOrchard LLC, a Tipping Point Partners company focused on sustainable iOS development.
    A graduate of Carnegie Mellon University, he was first exposed to the NeXTStep
    computer (the ancestor of today''s iPhone) while a programmer at the Pittsburgh
    Supercomputing Center and has been hooked ever since. His career has spanned finance,
    government, biotech and technology, including Apple where he managed the Apple
    Enterprise Services team for the New York metro area. He resides in the Alphabet
    City section of New York City with his wife and a clowder of rescued cats.


    ## About the Technical Reviewer


    ![image](images/anselm_bradford.jpg) **Anselm Bradford** is a lecturer in digital
    media at the Auckland University of Technology (AUT) in New Zealand, where he
    researches interactive media, web media, and visual communication. His experience
    with Internet-related development stretches back to 1996, when he hand-coded his
    first web site. He may be found `@anselmbradford` on Twitter and occasionally
    blogs at [`AnselmBradford.com`](http://AnselmBradford.com).'
