    #### Inspecting Data—What Have I Got?


    We should also take a peek at the runtime values to understand what''s been going
    on. GDB provides a wealth of tools for inspecting values. Check out the arguments
    to our method with `info args`. See all the local variables in your current stack
    frame with `info locals`:


    `(gdb) info args`

    `self = (ShoppingCartViewController *) 0x12e080`

    `_cmd = (SEL) 0x31ab6e38`

    `tableView = (UITableView *) 0x9c0c00`

    `editingStyle = UITableViewCellEditingStyleDelete`

    `indexPath = (NSIndexPath *) 0x1b6750`

    `(gdb) info locals`

    `item = (NSDictionary *) 0x126f00`

    `(gdb)`


    That''s nice.


    The command `whatis` inspects the runtime type of an argument and is quite useful
    for `NSDictionary` entries, delegates (of type `id`), and polymorphic arguments.
    Memory bugs can occur when you''ve got a type mismatch, that is, when performing
    operations you think are safe on the wrong type. Here we examine the type of `item`:


    `(gdb) whatis item`

    `type = NSDictionary *`

    `(gdb)`


    OK, that''s what we expected. We can peek inside the structure. This is what Xcode
    uses when you ask to print an argument on your console. Type `po` followed by
    your variable name;`po` is short for “printobject”:


    `(gdb) po item`

    `{`

    `    id = 3;`

    `    name = "Blood Orange";`

    `    price = 110;`

    `    quantity = 1;`

    `    subtotal = 110;`

    `}`

    `(gdb)`


