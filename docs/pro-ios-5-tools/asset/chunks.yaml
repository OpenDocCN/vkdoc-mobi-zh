  trans: '

    ### 创建 iOS 发布证书


    要创建 iOS 发布证书，我们需要进入 iOS 预配门户。我们可以通过 iOS 开发者中心访问预配门户（参见图 7–9）。只有以注册开发者身份登录后才能访问预配门户。此外，你还需要注册
    iOS 开发者计划。该计划目前个人用户每年需花费 `$99`。除了注册开发者计划的权益外，你还可以访问预发布软件和工具、内部开发者论坛，并获得苹果的技术支持。此外，你可以在物理
    iOS 设备（而不仅仅是模拟器）上测试应用。最重要的是，你可以通过临时分发或 App Store 来分发你的应用。如果你感兴趣，可以在 [`http://developer.apple.com/programs/ios/`](http://developer.apple.com/programs/ios/)
    了解更多信息。


    ![images](img/0709.jpg)


    **图 7–9.** *以注册开发者身份登录 iOS 开发者中心*


    如果登录成功，你应该会在 iOS 开发者中心右侧的“iOS 开发者计划”标题下看到“iOS 预配门户”（参见图 7–10）。点击“iOS 预配门户”链接。


    ![images](img/0710.jpg)


    **图 7–10.** *iOS 开发者计划链接*


    进入 iOS 预配门户页面后（参见图 7–11），你应该会在左侧看到一个选项菜单（参见图 7–12）。“主页”下的第一个选项是“证书”。点击它。


    ![images](img/0711.jpg)


    **图 7–11.** *iOS 预配门户页面*


    ![images](img/0712.jpg)


    **图 7–12.** *预配门户菜单*


    进入“证书”页面后，点击顶部的“发布”标签页（注意不要点击图 7–12 中所示的“发布”链接！）以显示你的发布证书。可能 Xcode 已自动为你创建了一个证书，也可能没有证书显示（参见图
    7–13）。无论如何，我们将创建一个新的。找到表格中末尾带有“请求证书”按钮的行。点击此按钮。


    ![images](img/0713.jpg)


    **图 7–13.** *证书页面的“发布”标签页*


    面板应会切换显示一组说明。这些是创建证书请求的说明，而我们刚刚完成了这一步。点击说明末尾的“选择文件”按钮。在文件选择器中，导航到保存 `CertificateSigningRequest.certSigningRequest`
    的位置，并选择该文件。确认文件名出现在“选择文件”按钮旁边（参见图 7–14），然后点击“提交”。


    ![images](img/0714.jpg)


    **图 7–14.** *提交证书请求*


    提交后，“发布证书”窗格应会刷新，列出状态为“待签发”的证书（参见图 7–15）。稍等片刻，然后点击“发布”标签页刷新窗格。证书状态应更新为“已签发”（参见图
    7–16），并显示一年后的到期日期。点击证书行右侧的“下载”按钮。这将下载一个名为 `distribution_identity.cer` 的文件。同时下载
    WWDR 中间证书。该文件应命名为 `AppleWWDRCA.cer`。


    ![images](img/0715.jpg)


    **图 7–15.** *发布证书等待签发*


    ![images](img/0716.jpg)


    **图 7–16.** *发布证书已签发*


    在 Finder 中找到 `AppleWWDRCA.cer` 文件，然后双击它。这将启动“钥匙串访问”，并安装 Apple WWDR 中间证书。你可以通过在“钥匙串访问”窗口左下角窗格中选择“证书”，并搜索名称“Apple
    Worldwide Developer Relations Certificate Authority”来确认是否已安装（参见图 7–17）。


    ![images](img/0717.jpg)


    **图 7–17.** *确认 Apple WWDR 中间证书已安装（高亮显示）*


    对 `distribution_identity.cer` 重复安装过程。


    ### 上传 UDID


    返回 iOS 预配门户，点击左侧菜单中的“设备”。你应该会进入“设备”页面的“管理”标签页（参见图 7–18）。


    ![images](img/0718.jpg)


    **图 7–18.** *iOS 预配门户页面的“设备”页面*


    每年你最多可以添加 100 台设备用于开发和测试目的。虽然你可以移除设备，但即使被移除，这些设备仍会计入你每年的 100 台配额中。因此添加设备时要小心。


    添加设备有两种方式：单个添加和批量添加。单个添加正如你所料，通过网页表单逐一输入设备信息。而批量添加则允许你一次性添加多台设备。这是通过上传文件来实现的。该文件采用简单的制表符分隔格式。


    我们逐一介绍每个过程。


    #### 单个添加


    在“设备”页面中，进入“管理”标签页。在“管理”页面的右侧，点击标有“添加设备”的按钮。“管理”窗格应会刷新，提供一个可以添加设备名称和 ID 的表单（参见图
    7–19）。


    ![images](img/0719.jpg)


    **图 7–19.** *“添加设备”页面*


    “设备名称”可以是一个自由格式的字符串，用于标识设备。它可以是你的 Beta 测试者的姓名或电子邮件地址。也可以是分配给测试者的某个标识符。“设备 ID”是唯一的设备标识符。你需要从
    Beta 测试者那里收集此信息。你可以通过启动 Xcode 并打开“管理器”窗口来查找 UDID。选择窗口顶部的“设备”图标。在左侧选择相关设备。你应该会看到显示的设备信息。在“标识符”标签旁边，应该是你设备的
    40 个字符的 UDID（参见图 7–20）。记住，我在本章前面已经向你展示了如何在 iTunes 中访问 UDID（参见图 7–1 和图 7–2）。


    ![images](img/0720.jpg)


    **图 7–20.** *Xcode 管理器窗口，设备详细信息*


    通过网页表单可以输入多个设备名称和 ID。填写完名称和 ID 后，点击右侧的加号按钮。应会出现额外的一行（参见图 7–21），允许你输入另一台设备的名称和
    ID。


    ![images](img/0721.jpg)


    **图 7–21.** *通过网页表单输入另一台设备*


    完成设备信息输入后，点击*提交*按钮。


    #### 批量添加


    在“设备”页面中，在“管理”标签页下，点击“上传设备”按钮。这将刷新“管理”窗格，允许你上传文件（参见图 7–22）。正如我们之前所述，你可以上传一个制表符分隔的文件。


    ![images](img/0722.jpg)


    **图 7–22.** *“上传设备”页面*


    制表符分隔的文件遵循简单的格式。文件的每一行应包含一个设备 ID，后跟设备名称，两者用制表符分隔。文件的第一行将被视为标题行并被忽略。文件应以扩展名 `.txt`
    结尾。以下显示了一个示例设备文件：


    ```

    DEVICE UDID                                DEVICE NAME

    0aeb4240266f544ef8a4d0bb658a1fc6cf0a559a   iPhone 3GS

    1f01c47915477711d8bc700090272ff72528531e   iPhone 4

    3b02d9e6d59467382e8f9b9300a64ac3cd6c0e89   iPad 2

    ```


    点击“选择文件”按钮，选择包含设备名称和 ID 列表的 `.txt` 文件。然后点击“提交”以上传文件并添加设备。

