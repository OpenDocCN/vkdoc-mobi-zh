- fmt: '# 技术文档排版


    当我们最初构建Super Checkout时，我们将所有SBJSON代码放在一个名为`SBJSON`的文件夹中。在`SBJSON`文件夹中的文件包括头文件`JSON.h`。如果您还记得，我们删除了那个文件夹及其所有文件。那么如何解决这个问题呢？


    首先，头文件`JSON.h`在哪里？它在SBJSON静态库项目中（参见[Figure 11–23](#Chapter11.html#fig_11_23)）。`JSON.h`仍然位于名为`SBJSON`的文件夹中。因此`SCJSONParser.m`中的`#import
    "SBJSON/JSON.h"`行在技术上是正确的。但Xcode似乎不知道如何找到它。请注意，`SBJSON`和`Super-Checkout`文件夹彼此相邻。回想一下，就Xcode而言，所有项目文件应该位于`Super-Checkout`文件夹中，因此我们需要告诉Xcode也查看`SBJSON`文件夹内部。


    ![images](images/1123.jpg)


    **Figure 11–23.** *The current location of `JSON.h`*


    返回导航窗格中的项目导航器。单击Super Checkout项目以打开项目编辑器视图，然后选择Super Checkout目标。选择构建设置选项卡，并确保选中全部视图设置。接下来，向下滚动并搜索具有搜索路径标题的构建设置组。该组的第一行应该标题为始终搜索用户路径。将此值从否更改为是（参见[Figure
    11–24](#Chapter11.html#fig_11_24)）。


    ![images](images/1124.jpg)


    **Figure 11–24.** *Turn on the Always Search User Paths build setting*


    搜索路径构建设置组的最后一行应该是用户头文件搜索路径。双击此行，位于文本用户头文件搜索路径的右侧。应出现一个窗格。单击左下角的加号按钮，并在出现的行中输入`../SBJSON`（参见[Figure
    11–25](#Chapter11.html#fig_11_25)）。单击完成。字符串`../SBJSON`应出现在用户头文件搜索路径行上。


    ![images](images/1125.jpg)


    **Figure 11–25.** *Adding a user-defined search path*


    保存您的工作，并尝试再次构建。成功！


    对ASIHTTPRequest库重复此过程。添加库后，您可以删除导航窗格中的`ASIHTTPRequest`组（如果需要，您也可以删除`ExternalLibraries`组，以整理项目）。在用户头文件搜索路径构建设置中，输入`../ASIHTTPRequest`。


    构建项目。这次发生了什么？


    问题导航器显示问题出在`SuperCheckoutAPIEngine.m`中。错误是“词法或预处理器问题‘`ASIHTTPRequest.h`’未找到。”嗯，修复对`SBJSON/JSON.h`有效，为什么对`ASIHTTPRequest.h`无效？


    原因很简单。我们只需要在导入的`ASIHTTPRequest.h`前面加上其父目录。因此编辑`SuperCheckoutAPIEngine.m`，内容如下：


    ```

    #import "SuperCheckoutAPIEngine.h"

    #import "SuperCheckoutRequestTypes.h"

    #import "SCJSONParser.h"

    #import "Product.h"

    #import "ASIHTTPRequest/ASIHTTPRequest.h"

    #import "ASIHTTPRequest/ASIDownloadCache.h"

    #import "NSString+UUID.h"

    ```


    为什么我们需要添加`ASIHTTPRequest/`？我们告诉Xcode在`Super-Checkout`目录旁边的目录`SBJSON`和`ASIHTTPRequest`中查找。但是当我们导入（`#import`）头文件时，我们正在做两件不同的事情。`#import
    "SBJSON/JSON.h"`表示导入位于目录`SBJSON`内的文件`JSON.h`。如果您查看`SBJSON`项目文件夹内部，您会看到另一个`SBJSON`文件夹。文件`JSON.h`在那里。`#import
    "ASIHTTPRequest.h"`表示导入位于某处的`ASIHTTPRequest.h`文件。如果您查看`ASIHTTPRequest`文件夹内部，有另一个`ASIHTTPRequest`文件夹，其中`ASIHTTPRequest.h`位于那里。


    Super Checkout现在应该可以构建了。


    ## 使用工作区


    如前所述，Apple在Xcode 4中引入了工作区的概念。工作区是多个相关项目的通用逻辑容器。通过使用工作区，您让Xcode管理工作区项目之间的显式和隐式关系。在我们的案例中，Xcode将在我们构建Super
    Checkout应用程序时构建静态库。


    **注意：** 请记住，您需要从我们在创建子项目之前制作的副本开始工作。如果您的Super Checkout应用程序项目将静态库作为子项目，那么您正在使用错误的项目。


    如果尚未打开，请在Xcode中打开Super Checkout。


    选择文件 ![image](images/U001.jpg) 新建 ![image](images/U001.jpg) 新建工作区。当另存为对话框出现时，导航到包含Super
    Checkout项目的目录。您还应该看到我们之前创建的ASIHTTPRequest和SBJSON静态库项目。输入`Super-Checkout.xcworkspace`作为工作区的名称，然后单击保存（参见[Figure
    11–26](#Chapter11.html#fig_11_26)）。


    ![images](images/1126.jpg)


    **Figure 11–26.** *Creating our new workspace*


    现在，我们需要将项目添加到工作区。


    如果导航窗格未显示，请单击工具栏上的导航器区域选择器（![image](images/p332-01.jpg)）将其打开。此外，如果工具栏编辑器选择器中未选择标准编辑器（![image](images/p332-02.jpg)），请选择它。


    在工作区导航窗格中，按住Control键单击以显示上下文菜单。选择将文件添加到“Super-Checkout”（参见[Figure 11–27](#Chapter11.html#fig_11_27)）。当文件选择对话框打开时，导航到Super-Checkout项目的文件夹。选择`Super-Checkout.xcodeproj`。确保如果需要将项目复制到目标组的文件夹复选框未选中。选择为任何添加的文件夹创建组单选按钮。确保您的对话框看起来像[Figure
    11–28](#Chapter11.html#fig_11_28)。单击添加。


    **注意：** 不要使用文件菜单中的“将文件添加到‘Super-Checkout’”选项。这不会以我们想要的方式将项目添加到工作区。


    ![images](images/1127.jpg)


    **Figure 11–27.** *The context menu to add files to the workspace*


    ![images](images/1128.jpg)


    **Figure 11–28.** *Adding the Super Checkout application to the workspace*


    您的工作区现在应该有一个项目，Super Checkout（参见[Figure 11–29](#Chapter11.html#fig_11_29)）。重复此过程以添加ASIHTTPRequest和SBJSON项目。再次使用导航窗格中的上下文菜单，而不是文件菜单。完成后，您的工作区窗口应类似于[Figure
    11–30](#Chapter11.html#fig_11_30)。


    ![images](images/1129.jpg)


    **Figure 11–29.** *Our workspace with the Super Checkout application*


    ![images](images/1130.jpg)


    **Figure 11–30.** *Our workspace with all the projects*


    像我们之前所做的那样，将`libASIHTTPRequest.a`和`libSBJSON.a`库添加到Super Checkout应用程序。单击导航窗格中的Super
    Checkout项目以显示项目编辑器视图。选择构建阶段选项卡，并展开标题为“Link Binary With Libraries (7 Items)”的构建阶段。单击加号，添加这两个静态库。


    此外，我们可以删除Super Checkout应用程序中不需要的原始ASIHTTPRequest和SBJSON文件。单击导航窗格中Super Checkout项目旁边的展开三角形。打开Super
    Checkout组，并删除名为外部库的组。当对话框出现时，真正删除这些文件。


    最后，我们需要调整源文件`SCJSONParser.m`。我们需要更正SBJSON头文件的`#import`指令。调整文件内容如下：


    ```

    #import "SCJSONParser.h"

    #import "JSON.h"

    ```'
  raw: 'When we first built Super Checkout, we put all the SBJSON code in a folder
    named `SBJSON`. Among the files in the `SBJSON` folder was the header file, `JSON.h`.
    If you recall, we deleted that folder and all its files. So how do we fix this?


    First, where is the header file `JSON.h`? It''s in the SBJSON static library project
    (see [Figure 11–23](#Chapter11.html#fig_11_23)). `JSON.h` still lives in a folder
    named `SBJSON`. So the `#import "SBJSON/JSON.h"` line in `SCJSONParser.m` is technically
    correct. But Xcode doesn''t seem to know how to find it. Notice that the `SBJSON`
    and `Super-Checkou`t folders are next to each other. Recall that, as far as Xcode
    is concerned, all the project files should be located in the `Super-Checkou`t
    folder, so we need to tell Xcode to look inside the `SBJSON` folder as well.


    ![images](images/1123.jpg)


    **Figure 11–23.** *The current location of JSON.h*


    Head back to the Project Navigator in the Navigation pane. Click the Super Checkout
    project to open the Project Editor view, and select the Super Checkout target.
    Select the Build Settings tab, and make sure the All view setting is selected.
    Next, scroll down and search for the build setting group with the Search Pathsheader.
    The first row of this group should be titled Always Search User Paths. Change
    this value from No to Yes (see [Figure 11–24](#Chapter11.html#fig_11_24)).


    ![images](images/1124.jpg)


    **Figure 11–24.** *Turn on the Always Search User Paths build setting*


    The last row of the Search Paths build setting group should read User Header Search
    Paths. Double-click this row, to the right of the text “User Header Search Paths”.
    A pane should appear. Click the plus sign button on the bottom-left corner, and
    enter **../SBJSON** on the row that appears (see [Figure 11–25](#Chapter11.html#fig_11_25)).
    Click Done. The string, `../SBJSON`, should appear on the User Header Search Paths
    row.


    ![images](images/1125.jpg)


    **Figure 11–25.** *Adding a user-defined search path*


    Save your work, and try building again. Success!


    Repeat the process for the ASIHTTPRequest library. After you add the library,
    you can delete the `ASIHTTPRequest` group in the Navigation pane (if you want,
    you can delete the `ExternalLibraries` group as well, just to tidy up the project).
    Inside the User Header Search Paths build setting, type **../ASIHTTPRequest**.


    Build the project. What happened this time?


    The Issue Navigator says the problem is in `SuperCheckoutAPIEngine.m`. The error
    is “Lexical or Preprocessor Issue ‘ASIHTTPRequest.h’ not found.” Hmm, the fix
    worked for `SBJSON/JSON.h`, why is it not working for `ASIHTTPRequest.h`?


    The reason is pretty straightforward. We just need to prefix the imported `ASIHTTPRequest.h`
    with its parent directory. So edit `SuperCheckoutAPIEngine.m` to read as follows:


    `#import "SuperCheckoutAPIEngine.h"`

    `#import "SuperCheckoutRequestTypes.h"`

    `#import "SCJSONParser.h"`

    `#import "Product.h"`

    **`#import "ASIHTTPRequest/ASIHTTPRequest.h"`**

    **`#import "ASIHTTPRequest/ASIDownloadCache.h"`**

    `#import "NSString+UUID.h"`


    Why did we need to add `ASIHTTPRequest/`? We told Xcode to look in the directories
    `SBJSON` and `ASIHTTPRequest` that are next to the `Super-Checkout` directory.
    But when we import (**#**`import`) the headers, we are doing two different things.
    `#import` "`SBJSON/JSON.h`" says import the file `JSON.h` that lives inside the
    directory `SBJSON`. If you look inside the `SBJSON` project folder, you''ll see
    another `SBJSON` folder. The file `JSON.h` lives there. `#import` "`ASIHTTPRequest.h`"
    says to import the `ASIHTTPRequest.h` file that lives somewhere. If you look inside
    the `ASIHTTPRequest` folder, there''s another `ASIHTTPRequest` folder where `ASIHTTPRequest.h`
    lives.


    Super Checkout should now build.


    ##### Using a Workspace


    As stated earlier, Apple introduced the concept of a workspace in Xcode 4\. A
    workspace is a common logical container for several related projects. By using
    a workspace, you let Xcode manage the explicit and implicit relationships between
    the workspace projects. In our case, Xcode will build the static libraries when
    we build the Super Checkout application.


    **NOTE:** Remember that you''ll need to work from the copy you made before we
    created the subprojects. If your Super Checkout application project has the static
    libraries as subprojects, you''re working with the wrong project.


    If it''s not already open, open Super Checkout in Xcode.


    Select File ![image](images/U001.jpg) New ![image](images/U001.jpg) New Workspace.
    When the Save As dialog appears, navigate to the directory containing the Super
    Checkout project. You should also see the ASIHTTPRequest and SBJSON static library
    projects we created earlier. Type **Super-Checkout.xcworkspace** for the name
    of the workspace, and click Save (see [Figure 11–26](#Chapter11.html#fig_11_26)).


    ![images](images/1126.jpg)


    **Figure 11–26.** *Creating our new workspace*


    Now, we need to add our projects to the workspace.


    If the Navigation pane is not exposed, open it by clicking on the Navigator area
    selector(![image](images/p332-01.jpg)) on the Toolbar. Also, if the Standard Editor
    (![image](images/p332-02.jpg)) is not selected in the Toolbar Editor Selector,
    select it.


    In the workspace Navigation pane, control-click to expose the context menu. Select
    “Add Files to ‘Super-Checkout’” (see [Figure 11–27](#Chapter11.html#fig_11_27)).
    When the file selection dialog opens, navigate to the Super-Checkout project''s
    folder. Select `Super-Checkout.xcodeproj`. Make sure the checkbox next “Copy items
    into destination group''s folder (if needed)” is unchecked. Select the “Create
    groups for any added folders” radio button. Make sure your dialog looks like [Figure
    11–28](#Chapter11.html#fig_11_28). Click Add.


    **NOTE:** Don''t use the “Add File to ‘Super-Checkout’” option from the File menu.
    This won''t add the projects to the workspace in the manner we want.


    ![images](images/1127.jpg)


    **Figure 11–27.** *The context menu to add files to the workspace*


    ![images](images/1128.jpg)


    **Figure 11–28.** *Adding the Super Checkout application to the workspace*


    Your workspace should now have one project, Super Checkout (see [Figure 11–29](#Chapter11.html#fig_11_29)).
    Repeat this process to add the ASIHTTPRequest and SBJSON projects. Again, use
    the context menu from the Navigation pane, not the File menu. When complete, your
    workspace window should look like [Figure 11–30](#Chapter11.html#fig_11_30).


    ![images](images/1129.jpg)


    **Figure 11–29.** *Our workspace with the Super Checkout application*


    ![images](images/1130.jpg)


    **Figure 11–30.** *Our workspace with all the projects*


    As we did previously, add the `libASIHTTPRequest.a` and `libSBJSON.a` libraries
    to the Super Checkout application. Click the Super Checkout project in the Navigation
    pane to expose the Project Editor view. Select the Build Phases tab, and expose
    the build phase titled “Link Binary With Libraries (7 Items)”. Click the plus
    sign, and add the two static libraries.


    Also, we can delete the unnecessary original ASIHTTPRequest and SBJSON files within
    the Super Checkout application. Click the disclosure triangle next to the Super
    Checkout project in the Navigation pane. Open the Super Checkout group, and delete
    the group named External Libraries. When the dialog appears, really delete the
    files.


    Finally, we need to adjust the source file `SCJSONParser.m`. We need to correct
    the `#import` directives for the SBJSON header files. Adjust the file to read
    like this:


    `#import "SCJSONParser.h"`

    `#import "JSON.h"`'
