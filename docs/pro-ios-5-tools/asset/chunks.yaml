  trans: '

    ### 三个屏幕……嗯，它能跑起来


    上一章，我们介绍了如何使用新版 iOS 开发工具的一些亮点。接下来的章节将以此为基础，展示一些出色的技巧，让你的应用能够吸引用户反复使用。为此，我们将在接下来的几章中逐步剖析一个应用，这个应用嘛，可以说存在一些问题。有些问题显而易见，而另一些则需要深入挖掘才能发现。我们将要使用的应用是一个虚拟水果摊。该应用的需求包括：展示包含产品图片的产品库存、查看产品详情、添加到购物车、查看购物车以及结算。目前该应用处于
    Alpha 阶段；它已满足基本需求，但在性能方面需要改进，并且存在一些崩溃问题。


    ### 使用 GitHub


    对于这个项目，我们将从一个现有仓库中拉取源代码。该项目托管在一个名为 GitHub 的社交编程网站上。前往 [`www.github.com/signup/free`](http://www.github.com/signup/free)
    并创建一个免费账户。在撰写本文时，注册表单如图 3-1 所示。


    ![images](img/0301.jpg)


    **图 3-1.** *GitHub 注册界面*


    GitHub 提供的免费账户允许你创建无限数量（在撰写本文时）的公共 Git 仓库。付费账户则可以邀请其他开发者参与私有仓库的协作。本书中我们将要使用的应用托管在一个公共仓库中。


    **注意：** Git 是一个分布式版本控制系统。它已随 Xcode 一同打包，因此无需额外安装。在本书中，我们将利用 Xcode 内置的 Git 支持来跟踪我们的更改。Git
    拥有非常强大的命令行界面，因此掌握一些 Git 命令行技巧将提升你作为开发者的生产力。


    从 GitHub 检出代码的下一步是设置你的 SSH 公钥。前往 [`https://github.com/account/ssh`](https://github.com/account/ssh)，点击“添加另一个公钥”（见图
    3-2）。


    ![images](img/0302.jpg)


    **图 3-2.** *我们将要添加一个公钥，以便通过 SSH 安全地检出代码。*


    设置 SSH 公钥非常简单。事实上，GitHub 的友好团队已经发布了如何设置 SSH 密钥的说明：[`http://help.github.com/mac-set-up-git/`](http://help.github.com/mac-set-up-git/)（见图
    3-3）。


    ![images](img/0303.jpg)


    **图 3-3.** *在 OS X 上设置 SSH 密钥*


    一旦在你的机器上设置好 Git 并配置好 SSH 密钥，你就可以继续执行分支项目并浏览应用了。


    ### 连接到 Super Checkout


    现在，让我们分支项目，以便将其拉取下来并开始进行修改。主项目位于 [`https://github.com/whilethis/Super-Checkout`](https://github.com/whilethis/Super-Checkout)。当你分支项目后，你将拥有该仓库的个人副本，可以进行检出、推送或拉取操作。要创建分支，请点击主项目网页右上角的
    Fork 按钮（见图 3-4）。


    ![images](img/0304.jpg)


    **图 3-4.** *在原始项目界面上，点击 Fork 按钮将创建你个人专属的 Git 仓库副本。*


    从分支项目的站点，复制如图 3-5 所示的 URL。


    ![images](img/0305.jpg)


    **图 3-5.** *你的项目 URL 中将包含你的 github.com 用户名，而非 whilethis*


    现在，启动 Xcode 4，会出现如图 3-6 所示的“欢迎使用 Xcode”界面。上一章我们从头创建了一个新项目。这一次，我们将连接到一个仓库。


    ![images](img/0306.jpg)


    **图 3-6.** *“欢迎使用 Xcode”界面让你可以创建新项目或连接到源代码仓库。*


    点击“连接到仓库”按钮。系统会提示你输入仓库的位置，如图 3-7 所示。输入从 GitHub 复制的仓库 URL，Xcode 会自动检查主机是否可达，并允许你继续操作。点击“下一步”，我们将把代码保存到磁盘上。


    如果在配置 SSH 密钥之前尝试连接到 GitHub，系统会提示你确认 Git 服务器的身份，并要求输入用户名和密码。我们设置 SSH 密钥的全部原因就是为了防止这些问题发生。但是，如果你已经设置了
    SSH 密钥但没有执行 `ssh -T` 命令，则会弹出图 3-8 所示的身份确认界面。


    ![images](img/0307.jpg)


    **图 3-7.** *Xcode 4 在从现有仓库检出代码时会自动检测仓库类型。*


    **注意：** 直接连接到远程仓库时，请确保选择了正确的仓库类型。Xcode 将尝试使用图 3-8 中选择的类型所对应的协议来克隆或检出仓库。


    接下来，告诉 Xcode 项目名称和仓库类型（见图 3-8）。将项目命名为 `Super Checkout`，然后点击“克隆”。


    ![images](img/0308.jpg)


    **图 3-8.** *命名项目并选择仓库类型*


    下一个界面会询问你将工作副本存放在何处。在磁盘上选择一个位置，然后点击“克隆”。如果克隆操作完成，你将看到“打开项目”和“不打开”选项（见图 3-9）。点击“打开项目”，我们就准备开始工作了。如果你跳过了之前介绍的公钥创建步骤，你会看到一些确认对话框和其他身份验证问题。如果遇到任何问题，请回到公钥创建步骤并重试。


    ![images](img/0309.jpg)


    **图 3-9.** *成功克隆我们的 Super Checkout 项目*


    ### 四处看看


    这个应用非常简单。它包含一个带有表格视图控制器的导航控制器，用于展示产品库存；一个产品详情视图控制器，作为产品库存的下钻视图；以及一个购物车控制器，以翻转模式视图控制器的形式呈现。与服务通信的模块是一个简单的引擎，采用了与
    Matt Gemmell ([`http://instinctivecode.com/`](http://instinctivecode.com/)) 在其
    Twitter 引擎中相同的思路。


    API 引擎负责处理与服务器的通信，并调用解析器来解析来自服务器的数据。服务器使用 JSON（JavaScript 对象表示法）进行通信，该项目使用 SBJSON
    库 ([`https://github.com/stig/json-framework/`](https://github.com/stig/json-framework/))
    将数据解析为原生的 Cocoa Touch 类。每个视图控制器都拥有该引擎的一个独立实例，并使用委托来确保服务器通信是异步的。


    用户界面主要由表格视图以及一些在 Interface Builder 中设计的自定义单元格组成。

    '
- fmt: '### Running Super Checkout


    Run the application in the simulator or your test device. Your screen should match
    the ones shown in [Figure 3–10](#Chapter03.html#fig_3_10). The first thing you
    should notice is a lag in loading images; we''ll address that issue in a later
    chapter. Tapping a product takes you to the product details screen, and tapping
    the Add To Basket button adds the item to your order. The Cart button flips the
    view over and shows you your cart.


    ![images](images/0310.jpg)


    **Figure 3–10.** *The Super Checkout application in its alpha form*


    As you navigate and become accustomed to the application, you''ll notice that
    if you move from the product details back to the inventory quickly and in rapid
    succession, the application will likely crash. It is crashes like this and other
    such issues that make this application alpha quality and in need of some updating
    and tweaking.


    ### Navigating the Project (and Xcode)


    Managing the workflow within Xcode is key to being efficient in developing and
    enhancing any project. Knowing how to navigate the editors without leaving the
    keyboard can improve your speed of development and, well, is just plain cool.
    Xcode 4 has introduced some nice new features that take advantage of the new interface.
    It has also changed a number of common keyboard shortcuts from Xcode 3.


    Quite possibly one of the most useful keyboard shortcuts in Xcode 4 is `![images](images/U003.jpg)J`.
    When pressed, the shortcut pops up the “Move focus to…” editor window (see [Figure
    3–11](#Chapter03.html#fig_3_11)). The highlighted area is where the focus will
    move to if you press enter. Navigating between tabs is as easy as moving the selection
    with the arrow keys. Moving the selection to the side of the current editor (the
    area with a plus sign) creates a new assistant editor.


    ![images](images/0311.jpg)


    **Figure 3–11.** *The “Move focus to…” feature lets you move focus between tabs
    and create assistant editors.*


    Switching between an implementation file and its header used to be accomplished
    by pressing `command-option-up arrow`. Xcode 4 has changed that shortcut to `command-control-up
    arrow`, or you can use a three-finger swipe up or down gesture on a trackpad if
    that gesture is not already mapped by the Operating System (Lion uses the three-finger
    swipe extensively).


    `Option-click` a symbol to bring up a small popover that displays details about
    the symbol. From the popover, you can view the header of the class or view the
    documentation if it is a framework class.


    `Command-click` a symbol to go to its declaration. If the symbol is a variable,
    the declaration of that variable will be highlighted. If the symbol is a class,
    the editor will show the header where the symbol is declared.


    `Option-command-click` a symbol to open an assistant editor and perform the same
    operation as `command-click`.


    Pressing `command-shift-O` will bring up an Open Quickly dialogue box. In this
    box, you can type the beginning of a filename, and the files that match that name
    will be displayed below it. This is a very handy way to quickly open files.


    These keyboard shortcuts (and many others) can be quickly referenced in [Chapter
    12](#Chapter12.html#ch12).


    ### Summary


    The idea behind the application in this chapter is to mimic an alpha-quality application
    to give us plenty of areas to improve performance. The final product will be an
    application that doesn''t crash and performs on a level of a properly architected
    application. We''re going to be profiling, refactoring, and rewriting different
    aspects of the application as we move forward with the tuning part of this book.
    We''re in for quite the ride, so turn the page and let''s get started!


    ## Chapter 4


    ## Memory Management and Diagnostics


    In the previous chapter, we looked at an application that is basically feature
    complete but still needs a lot of work. We have our project set up with source
    control from Github, and we are ready to start fixing this application to make
    it ready for beta testing. The fun stuff starts in this chapter.


    The likelihood of our application crashing is very high at this point. We know
    that one of the main reasons an application is rejected from the App Store is
    because it crashes. In this chapter, you are going to learn how to fix memory-related
    crashes and find memory leaks before they cause performance issues on the device.
    We''re going to approach finding these issues in a very methodical way so that
    these steps can be followed for your future applications. Each step will be incrementally
    more technical as we will be getting closer and closer to the hardware. Fortunately,
    we have access to some very powerful tools and will be able to knock out a number
    of memory-related bugs.


    This chapter''s application was developed using manual reference counting. The
    latest tools introduce a new technology called automatic reference counting (ARC).
    The first thing we''ll do is to create an ARC branch to convert the application
    to ARC. After that, we''ll discuss issues that can arise with ARC and look at
    what Instruments gives us to fix those problems. The rest of the book will assume
    manual reference counting, however.


    The rest of this chapter is going to be all about memory-related crashes and fixing
    memory leaks as they pertain to manual reference counting. The first thing we''re
    going to cover is creating a branch in our local repository to localize our changes
    and make it easier to merge with the master branch at the end. Then, we''ll talk
    about prevention techniques so issues won''t come up. The rest of this chapter
    will start off pretty high level, and we''ll tackle a memory-related crash in
    Super Checkout. As we go deeper into tackling crashing bugs, we''ll be talking
    more in depth about how to diagnose these types of bugs.


    The last part of this chapter will be spent talking about memory leaks. You''ll
    learn how to use Instruments to detect and locate memory leaks. After we''re done
    with that, you''ll be armed with the tools and knowledge to combat memory related
    crashes and to plug leaking memory before the application reaches the App Store.'
