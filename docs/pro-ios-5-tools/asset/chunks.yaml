    Super-Checkout 项目的文件夹。选择`Super-Checkout.xcodeproj`。确保如果需要将项目复制到目标组的文件夹复选框未选中。选择为任何添加的文件夹创建组单选按钮。确保您的对话框看起来像
    Figure 11–28。单击添加。


    **注意：** 不要使用文件菜单中的“将文件添加到‘Super-Checkout’”选项。这不会以我们想要的方式将项目添加到工作区。


