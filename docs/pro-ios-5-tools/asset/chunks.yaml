    to the parser''s protocol. One solution would be to make your test case class
    act as the delegate for the parser. This is a bad idea because it involves your
    test agent, the test case class, in your test. In order to ensure you''re getting
    accurate results, you need to keep your test class as separate from the test subject
    as possible. What you need is a simple object that conforms to the required protocol
    and reports results back to the test case.


    #### Mock Objects


    Mock objects are used when test subjects are depended upon by, or were designed
    to be dependent on, other objects. Composite objects, delegation pattern objects,
    and responder chain objects are good examples of this. A mock object is an extremely
    simple object with limited functionality. The purpose of a mock is only to confirm
    the functionality of the test subject, not to provide any functionality of their
    own. You want your mocks to be simple enough to avoid introducing any defects
    into the test.


    An example of a good mock object is a simple echo object, also known as a recorder
    object. An echo object simply waits for the output of your test subject and stores
    it. You can then test the received output against the expected output in your
    test case. You need to create a mock echo object to act as the delegate for your
    JSON parser so that you can test the output.


    Creating an object in a test target is the same as creating an object in any other
    target. You just need to make sure it''s associated with the test target and not
    your app target. Here''s the interface for your `MockJSONDelegate` object:


    `#import <Foundation/Foundation.h>`

    `#import "SCJSONParser.h"`

    `#import "SuperCheckoutRequestTypes.h"`


    `@interface MockJSONDelegate : NSObject <SCJSONParserDelegate>`


    `@property (nonatomic, copy) NSString *identifier;`

    `@property (nonatomic, assign) SuperCheckoutResponseType responseType;`

    `@property (nonatomic, copy) NSDictionary *parsedObject;`


    `@end`


    As you can see, it''s an extremely simple interface. The class extends `NSObject`
    and conforms to the `SCJSONParserDelegate` protocol. It has three properties to
    store the three outputs of the parser''s delegate method, `-parsingSucceededForRequest:ofResponseType:parsedObjects:`.
    The implementation is equally simple.


    `#import "MockJSONDelegate.h"`


    `@implementation MockJSONDelegate`

    `@synthesize identifier;`

    `@synthesize responseType;`

    `@synthesize parsedObject;`


    `-(void)parsingSucceededForRequest:(NSString *)anIdentifier`

    `                  ofResponseType:(SuperCheckoutResponseType)aResponseType`

    `                       parsedObjects:(NSDictionary *)aParsedObject {`

    `        self.identifier = aIdentifier;`

    `        self.responseType = aResponseType;`

    `        self.parsedObject = aParsedObject;`

    `}`


    `@end`


    The object is as simple as possible. It conforms to the required protocol and
    simply stores the values it is sent by the parser. In your tests, you can then
    check these values against your expected output and evaluate the results.


    Since `SCJSONParser` receives all required data during initialization, and you
    are going to want to provide various data sets to see how it behaves, you probably
    shouldn''t use the `-setUp` or `-tearDown` methods. You''re going to want to do
    all of your instantiation within the tests themselves. As a result, your test
    class interface is pretty vanilla.


    `#import <SenTestingKit/SenTestingKit.h>`


    `@interface SCJSONParserTests : SenTestCase`


    `@end`


    Since you''re not going to use the `-setUp` or `-tearDown` methods, you can go
    ahead and remove them from the class. Your first order of duty should be to test
    valid JSON input. It should look something like this:


    `- (void)testParseWithValidJSON {`


    `        MockJSONDelegate *mockDelegate = [[MockJSONDelegate alloc] init];`


    `        NSString *testIdentifier = @"testParseWithValidJSON";`

    `        NSURL *testURL = [NSURL URLWithString:@"http://www.test.com"];`

    `        NSString *jsonString = @"{ \"hello\" : \"world\" }";`

    `        NSData *jsonData = [jsonString dataUsingEncoding:NSUTF8StringEncoding];`


    `        SCJSONParser *parser = [[SCJSONParser alloc] initWithJSON:jsonData`

    `                                delegate:mockDelegate`

    `                                connectionIdentifier:testIdentifier`

    `                                requestType:SuperCheckoutCheckout`

    `                                responseType:SuperCheckoutCheckoutResponse`

    `                                URL:testURL];`'
