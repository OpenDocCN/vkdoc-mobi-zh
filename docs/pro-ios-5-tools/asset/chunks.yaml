  trans: '

    ### 总结


    现在，我们拥有了一款能够在 iPhone 和 iPad 上运行的通用应用程序。支持这两种设备系列可能会有些困难，但只要前期考虑周全，开发这款应用的速度会比开发两个独立的应用程序更快。


    那么下一步是什么？到目前为止，本书已涵盖了几乎所有的必需主题，但我们还为你准备了更多惊喜。在第 11 章中，我们将探索如何与全世界分享你的杰作。在第 12
    章中，我们将讨论如何使用键盘在 Xcode 中导航以及至关重要的开发者工作流程。这些内容包含键盘快捷键以及其他改善工作流程的方法。我不知道你怎么样，但我是一个键盘快捷键爱好者。我喜欢只需按下几个键就能让应用执行许多任务。我希望你会发现第
    12 章中的技巧很有用，并且能够将这些内容融入到你的工作流程中。但首先，让我们先分享我们的应用。


    ## 第 11 章


    ## 我该如何分享这些内容？


    现在，我们已经构建了 Super Checkout 的通用版本。我们可以打包我们的应用程序以提交到 App Store，然后看着金钱和赞誉滚滚而来。当然，我们还需要处理
    bug 报告和添加新功能，但我们已经涵盖了如何处理这些问题。我们真正想做的是继续前进，创建下一个伟大的 iOS 应用程序。


    我们可以从头开始，但这很可能意味着要重复为 Super Checkout 所做的许多工作。一个简单的解决方案是将我们想从 Super Checkout 中使用的代码复制到新项目中。你可能已经意识到，这种方法存在许多问题。


    例如，假设我们收到一个来自 Super Checkout 用户的 bug 报告，该 bug 涉及我们已复制到新应用程序中的部分代码。我们必须修复两套相同的代码（以及它们相关的测试）。当然，我们可以通过剪切和粘贴来修复。但在剪切和粘贴的过程中，我们可能会犯错。


    我们需要弄清楚如何在最大化代码重用的同时，最小化冗余工作量。在 iOS 中实现这一目标的方法是使用静态库。在本章中，我们将把 Super Checkout
    的一些代码拆分到 Xcode 中的一个单独静态库项目中。然后，我们将把这个新的静态库项目集成到 Super Checkout 中。


    销售大量 Super Checkout 副本可能对我们的钱包大有裨益，但这可能不会提升我们作为程序员的自我价值感。提升我们极客信誉的一种方法是将部分代码作为开源项目发布。这样，其他程序员就能看到我们的编程技能有多棒。真正的额外好处是分享我们的工作并提高代码质量。埃里克·雷蒙德在他的文章《大教堂与市集》（[`http://www.catb.org/~esr/writings/homesteading/cathedral-bazaar/`](http://www.catb.org/~esr/writings/homesteading/cathedral-bazaar/)）中提到：“足够多的眼睛，就可让所有问题浮出水面”，这暗示了以
    Linux 项目创始人林纳斯·托瓦兹命名的林纳斯定律。他的意思是，源代码分发得越广泛，错误被发现和修复的速度就越快。为了分发我们的新静态库，我们将通过 GitHub（[`http://www.github.com/`](http://www.github.com/)）与世界分享，这是一个专注于简化代码共享的源代码仓库。


    最后，我们将简要介绍几种你可以为新静态库采用的开源软件许可证，包括各自的优缺点。没有正确或错误的选择。你选择的许可证高度依赖于你的目标和意愿。


    ### 将代码拆分为静态库


    简单来说，静态库是编译后文件的存档。这些文件随后被链接到一个应用程序中，使其看起来像是库的源代码是应用程序的一部分。正如我之前所说，其主要目的是将应用程序代码拆分为可重用的包，以便在多个应用程序之间共享。


    让我们来看看我们的 Super Checkout 应用程序。哪些代码应该被提取到静态库中？查看我们设置的分组，很明显，`ExternalLibraries`
    文件夹中的文件是很好的候选：`ASIHTTPRequest` 和 `SBJSON`（参见图 11--1）。


    ![images](img/1101.jpg)


    **图 11–1.** *Super Checkout 项目分组*


    **注意：** 我们的外部库代码库已经作为静态库和开源项目存在。你可以在它们对应的主页上阅读更多信息：[`http://allseeing-i.com/ASIHTTPRequest/`](http://allseeing-i.com/ASIHTTPRequest/)
    (`ASIHTTPRequest`) 和 [`http://stig.github.com/json-framework/`](http://stig.github.com/json-framework/)
    (`SBJSON`)。

    '
- fmt: '#### Creating a Static Library


    If it''s not already running, launch Xcode. Create a new project (File ![images](images/U001.jpg)
    New ![images](images/U001.jpg) New Project). When the new project pane appears,
    choose Framework & Library under the iOS group, and choose the Cocoa Touch Static
    Library template (see [Figure 11–2](#Chapter11.html#fig_11_2)). Click Next.


    ![images](images/1102.jpg)


    **Figure 11–2.** *Choose the Cocoa Touch Static Library template*


    When prompted for a Product Name, enter **SBJSON** (see [Figure 11–3](#Chapter11.html#fig_11_3)).
    Make sure the Include Unit Tests check box is checked, and the Use Automatic Reference
    Counting box is unchecked. Click Next.


    ![images](images/1103.jpg)


    **Figure 11–3.** *Name the static library*


    Save the project next to the `Super-Checkout` directory (see [Figure 11–4](#Chapter11.html#fig_11_4)).
    Check “Create local git repository for this project” (we will cover why we want
    this later). Click Create.


    ![images](images/1104.jpg)


    **Figure 11–4.** *Creating the static library project folder with a local Git
    repository*


    Now our new static library project window for SBJSON should appear (see [Figure
    11–5](#Chapter11.html#fig_11_5)). You should be in the SBJSON target Build Settings
    pane. If not, navigate to it. Make sure the All option is selected. Scroll down
    until you see the section with the heading Deployment. Look for the row titled
    Targeted Device Family, and change the value to iPhone/iPad (see [Figure 11–6](#Chapter11.html#fig_11_6)).


    ![images](images/1105.jpg)


    **Figure 11–5.** *Our SBJSON static library project window*


    ![images](images/1106.jpg)


    **Figure 11–6.** *Changing the target device of our library*


    In the Navigation pane, hold down the shift key, and select the two files `SBJSON.h`
    and `SBJSON.m`. We don''t need these two files, so delete them. A dialog should
    appear asking if you want remove the file references or really delete them (see
    [Figure 11–7](#Chapter11.html#fig_11_7)). We really want to delete them, so click
    Delete.


    ![images](images/1107.jpg)


    **Figure 11–7.** *Yes, we really want to delete the files.*


    Now, let''s copy the relevant files from Super Checkout. In the Navigation pane,
    select the SBJSON group. Either click the File menu or right-click the Navigation
    pane, and choose Add Files to SBJSON. When the file selection dialog opens, navigate
    to the `SBJSON` folder inside the Super Checkout project''s folder. Select all
    the files in this folder (see [Figure 11–8](#Chapter11.html#fig_11_8)). Next to
    the Destination label, check “Copy items into destination group''s folder (if
    needed)”. For the Folders option, select the “Create groups for any added folders”
    option. Finally, make sure only SBJSON is checked in the “Add to targets” list.
    Click Add. Now, the files should appear in the SBJSON group in the Navigation
    pane (see [Figure 11–9](#Chapter11.html#fig_11_9)).


    ![images](images/1108.jpg)


    **Figure 11–8.** *Copying the SBJSON files from Super Checkout*


    ![images](images/1109.jpg)


    **Figure 11–9.** *Source files in SBJSON*


    If you try to build the SBJSON static library, it will succeed. But we''re not
    finished yet. When you use a static library, you *link* it to your application.
    Remember, a static library is an archive of compiled object files. When you link
    it to your application, it''s the same as if you had compiled the code directly
    in your application (just like how we built Super Checkout to start). The problem
    is that we don''t really know what classes, methods, or functions live inside
    the static library. Generally, to tell one class how another class works, we include
    the header file, the file with the `.h` extension. To do this with a static library,
    we need to publish our header files.


    In the Navigation pane, select the SBJSON project to enter the project editor.
    Select the SBJSON target, and open the Build Phases view. Expand the build phase
    named “Copy Headers (6 items)” (see [Figure 11–10](#Chapter11.html#fig_11_10)).
    Drag the file `JSON.h` from Project to Public. Drag the remaining header files
    in Project to Private. Your screen should look like the one shown in [Figure 11–11](#Chapter11.html#fig_11_11).


    ![images](images/1110.jpg)


    **Figure 11–10.** *Copying the headers*


    ![images](images/1111.jpg)


    **Figure 11–11.** *Moving the header files from Public to Private*


    Why did we move only the `JSON.h` header file to Public and not the others? Don''t
    we need to know about all the classes and categories? Well, yes, we do, but if
    you look at `JSON.h`, you will notice that it imports (`#imports`) all the other
    header files. So by importing `JSON.h`, we will import all the other header files.


    Save your work, and build. It should succeed.


    **NOTE:** At this point, I suggest you add the unit tests for the SBJSON code.
    Testing a static library is very similar to testing an application, and adding
    these tests is optional. So I''ll leave this as an exercise in writing tests.


    Let''s repeat this process to create a static library for `ASIHTTPRequest`. There
    are a few differences, which I''ll highlight.


    Again, create a new Cocoa Touch static library. This time, we''ll name it **ASIHTTPRequest**.
    Make sure you included unit tests and disabled automatic reference counting. Save
    the project in the same location you saved the SBJSON project.


    Once the ASIHTTPRequest project is created and the project window opens, select
    Target ASIHTTPRequest. Navigate to Build Settings (making sure the All view option
    is selected), and change the Targeted Device Family in the Deployment section
    to iPhone/iPad.


    Delete the files `ASIHTTPRequest.h` and `ASIHTTPRequest.m`. When asked, make sure
    you really delete the files. Select the `ASIHTTPRequest` group in the Navigation
    pane, and either click the File menu or right-click the Navigation pane, and choose
    Add Files to “ASIHTTPRequest”. When the file selection dialog opens, navigate
    to the `ASIHTTPRequest` folder inside the Super Checkout project, select all the
    files in this folder, and copy the files into the ASIHTTPRequest project.


    Unlike when we built the SBJSON static library, we''re not finished adding files.
    Again, select Add Files to “ASIHTTPRequest”, and navigate to the Super Checkout
    project. Add the files `Reachability.h` and `Reachability.m` to the ASIHTTPRequest
    project. Remember to make sure you copy the files by checking the “Copy items
    into destination''s folder (if needed)” check box.


    Enter the project editor for ASIHTTPRequest, and select the ASIHTTPRequest target.
    Choose the Build Phases tab, and expand the “Copy Headers (13 items)” build phase.
    Drag `ASIHTTPRequest.h` and `ASIDownloadCache.h` to the Public section. Drag the
    remaining header files to the Private section. Build the library.


    At this point, we should have two static library projects: SBJSON and ASIHTTPRequest.
