- fmt: '# Jenkins Job: 配置与执行


    Jobs are procedural, so before you start configuring yours, let''s think about
    the steps of execution. First, you''re going to want to check out the project
    from Github. Once Jenkins has a fresh copy of the latest code, you need to build
    it. Once it''s been built, you need to run it through the static analyzer and
    archive the binary.


    ## 配置源码检出


    Checking out from Github is simple enough to set up, assuming you''ve got the
    Git plug-in installed. Simply scroll down to the Source Control Management section
    ([Figure 9–8](#Chapter09.html#fig_9_8)) of the Configuration page and select the
    Git radio button. If you''ve given Jenkins access to SSH keys, you can use the
    SSH repository URL from Github, which looks something like this:


    `git@github.com:<username>/<ProjectName>.git`


    If you haven''t done this or are unable to use SSH, you can use the HTTPS repository
    URL with basic authentication, which will look something like this:


    `https://<username>:<password>@github.com/<username>/<ProjectName>.git`


    If you''re at all familiar with security, you''ll see a risk with this situation
    right away. The username and password for the Github repo will be stored in plain
    text. This isn''t an ideal situation, which is part of the reason you should be
    going the SSH key route.


    ![images](images/0908.jpg)


    **Figure 9–8.** *Fortunately, once you''ve got the Jenkins user sorted out, setting
    up Git over SSH is easy.*


    In addition to the repository URL, the Git plug-in allows you to specify which
    branch to check out, as well as several other advanced settings.


    Once you''ve got the Git settings plugged in, go ahead and test your job. Scroll
    to the bottom of the page and click the Save button. This will take you to the
    Job Details page ([Figure 9–9](#Chapter09.html#fig_9_9)).


    ![images](images/0909.jpg)


    **Figure 9–9.** *The Job Details page can become an extremely useful tool as your
    job gets more fleshed out.*


    ## 理解任务详情页


    The Job Details page will give you a bird''s eye view of the job, its history,
    and its current products. It has three primary sections: the sidebar, the Build
    History module, and the Permalinks section. The sidebar offers navigation options
    similar to what you''ve seen elsewhere in Jenkins. The Build History module, located
    below the sidebar, provides links to the most recent job executions. The Permalinks
    section has some extremely handy links to the most recent successful builds, failed
    builds, etc.


    At the moment, the Details page will probably look pretty stark. In the sidebar,
    you should see the `Build Now` link ([Figure 9–10](#Chapter09.html#fig_9_10)),
    which allows you to manually start a job''s execution. Go ahead and click it now
    to add your job to the build queue. If the queue is clear (which you can assume),
    the job will build immediately. Of course, “build” is a relative term at the moment,
    since all your job is set up to do is checkout a working copy of your project.


    ![images](images/0910.jpg)


    **Figure 9–10.** *The build status indicators in the build history sidebar module
    tell you whether previous builds were successful.*


    Once your build has finished, click on its link in either the `Build History`
    sidebar module or the `Permalinks` section. This will bring up the `Build Details`
    page. Similar to the `Job Details` page, the `Build Details` page bubbles up info
    about a specific build. With the Git plug-in installed, you''ll see some data
    regarding the checkout. If the job was triggered by a SCM poll, the commit message
    will be printed near the top of the page. In the sidebar, you''ll see a few options,
    including the ability to edit build information. This is useful for indicating
    a milestone build. There''s also a link to the console output for the build. Click
    on that to review the output for this build. The output should look something
    like this:


    ```

    Started by user anonymous

    Checkout:workspace / /Users/Shared/Jenkins/Home/jobs/Super Checkout/workspace
    - hudson.remoting.LocalChannel@56de24c5

    Using strategy: Default

    Last Built Revision: Revision 6eaa5c595fa51a898434f5d300f4a49712f567b4 (origin/master)

    Checkout:workspace / /Users/Shared/Jenkins/Home/jobs/Super Checkout/workspace
    - hudson.remoting.LocalChannel@56de24c5

    Fetching changes from 1 remote Git repository

    Fetching upstream changes from git@github.com:jbradforddillon/Super-Checkout.git

    Commencing build of Revision 6eaa5c595fa51a898434f5d300f4a49712f567b4 (origin/master)

    Checking out Revision 6eaa5c595fa51a898434f5d300f4a49712f567b4 (origin/master)

    Finished: SUCCESS

    ```


    The `Console Output` page is extremely useful for debugging a job. If you entered
    the Git repo information incorrectly, for example, the console will display information
    about the failed checkout, and you can determine the cause.


    ## 配置构建触发器


    Now that you''ve got a working Github checkout, let''s finish configuring the
    job. Head back to the `Job Details` page and click the `Configure` link. On the
    Job Configuration page, scroll down to the `Build Triggers` section ([Figure 9–11](#Chapter09.html#fig_9_11)).


    Being based on your Github project, this job should be built every time a change
    is made to the `master` branch. So, an SCM polling trigger is just what the doctor
    ordered. Clicking the `Poll SCM` checkbox will display the `Schedule` textbox
    where you can tell Jenkins how often to poll the repo for changes. When changes
    are found during an interval, the build will be triggered.


    The polling schedule is essentially a CRON expression. The input consists of five
    fields: minute, hour, day of the month, month, day of the week. An asterisk is
    a wildcard, which means all values are valid for that field. There are also several
    useful directives you can use, including `@hourly` and `@midnight`. You want your
    job to poll Github every five minutes, so your schedule expression will be `5
    * * * *`.


    ![images](images/0911.jpg)


    **Figure 9–11.** *The CRON expression format gives you a great deal of control.*


    Your trigger is set, so you''re ready to set up your build steps. As always, don''t
    forget to save at the bottom of the page.'
