  trans: '

    # 谁破坏了构建？


    通知是一种简单的方式，可确保每个人都了解代码的当前状态。这也是确保人们不提交不良代码的有效手段。如果 Johnny Sigabort 提交了一个已完成的功能，`Jenkins`会启动一次构建。如果构建失败，则会向预定义的人员列表（通常是整个开发团队）发送通知，宣布
    Johnny 的提交破坏了构建，并附带详细构建结果的链接。在 Johnny 因自己的疏忽而感到羞愧并加以清理后，可以再次发送通知，让团队知道构建已恢复。


    设置通知非常简单且高度可扩展。有多种插件可用于通过多种渠道广播构建失败通知。如果你希望如此透明地展示进度（或者想加剧 Johnny 的羞愧感），你甚至可以在
    Twitter 上发布构建结果。


    标准且内置的通知类型是电子邮件。要启用电子邮件通知，首先需要配置邮件服务器信息。前往“管理 Jenkins”部分中的系统配置页面，向下滚动到“电子邮件通知”部分（图
    9-13）。在提供的字段中，你可以指定邮件服务器的设置。


    ![images](img/0913.jpg)


    **图 9-13.** *你的系统可能需要为 Jenkins 提供一个真实账户，以免所有通知都进入垃圾邮件箱。*


    启用电子邮件后，你就可以设置通知了。返回你的作业配置页面，向下滚动到“构建后操作”部分。勾选`电子邮件通知`复选框以显示通知设置表单（图 9-14）。在`收件人`字段中输入你团队的电子邮件地址，并勾选`不稳定的构建`复选框。点击`保存`按钮，大功告成！


    ![images](img/0914.jpg)


    **图 9-14.** *你可以为个人或邮件列表配置电子邮件通知。*


    # 质量可控


    正如任何优秀开发者所知，构建成功并不意味着代码质量好。这就是为什么有静态分析器等工具来为我们查找潜在陷阱。`Xcode`项目可以配置为在编译期间运行静态分析，这在
    Xcode 内部构建时非常棒。但是，为了对分析结果进行有意义的处理，你需要借助几个工具。首先，你需要获取 LLVM 基金会的`scan-build`命令行工具副本，以便提取构建结果并以更人性化的方式呈现。其次，你需要在
    Jenkins 中安装 Clang Scan-Build 插件，该插件会向你的作业添加一种新的构建步骤类型，并为你管理`scan-build`的结果。


    Clang 静态分析器工具可从 LLVM 基金会网站[`http://clang-analyzer.llvm.org`](http://clang-analyzer.llvm.org)获取（图
    9-15）。`Scan-build`是一个极其强大的命令行工具，它封装对`xcodebuild`的调用，提取静态分析结果，并以`plist`格式和（使用附带的`scan-view`工具）HTML
    格式生成报告。要使用这些工具，只需下载并解压最新的压缩包。它们可以从任何位置运行，但要在 Jenkins 内部运行，需要将它们放置在 Jenkins 用户可以访问的地方。现在，让我们将解压后的文件夹放置在
    Jenkins 用户的主目录中，并重命名为`static-analyzer`。


    ![images](img/0915.jpg)


    **图 9-15.** *LLVM 网站提供了关于编译器、分析器及相关工具的丰富信息。*


    `scan-build`命令本身是一个极其简单的工具，类似于`xcodebuild`。它具有多种标志，允许进行深度定制和配置，并且还需要一个`xcodebuild`调用作为其输入。要了解可用于自定义结果的标志，只需在终端中执行`scan-build`脚本即可查看使用说明。对于你在
    Jenkins 中的用途，你无需担心这些标志，因为它们将由构建步骤插件处理。


    现在，为了查看`scan-build`脚本的实际运行效果，打开终端并导航到包含 Xcode 项目（以及一个`xcodeproj`文件）的目录。然后，只需执行一个`xcodebuild`命令，并在前面加上`scan-build`的路径，如下所示：


    ```

    /path/to/static-analyzer/scan-build xcodebuild -sdk iphonesimulator5.0

    ```


    你应该会看到正常的`xcodebuild`输出，随后是`scan-build`的输出。它应该看起来像这样：


    ```

    scan-build: 2 bugs found.

    scan-build: Run ''scan-view /var/folders/pz/k88r03q535g2ztqwgb52bv4c0000gq/T/scan-build-2011-08-21-1''
    to examine bug reports.

    ```


    执行单引号内的命令（以`scan-view`开头）将启动你的网页浏览器，并指向`127.0.0.1:8181`，这将提供静态分析结果（图 9-16），直到你在终端窗口中按`Ctrl+C`停止`scan-view`。


    ![images](img/0916.jpg)


    **图 9-16.** *静态分析器的结果页面提供了分析结果的出色摘要。*


    现在你已经拥有了自己的静态分析器，让我们设置 Jenkins 插件。从 Jenkins 管理页面，打开“管理插件”页面。打开`可选插件`选项卡，查找 Clang
    Scan-Build 插件。与 Git 插件类似，最方便的方法可能是按`Command+F`并在页面中搜索`Clang`。勾选该插件的复选框，并点击页面底部的`安装`按钮。安装完成后，请务必记得重启
    Jenkins。

    '
- fmt: '安装插件后，请前往“配置系统”页面，滚动至“Clang Static Analyzer”部分进行插件配置（参见[图9–17](#Chapter09.html#fig_9_17)）。该插件需要知道静态分析工具副本的位置。点击“Add
    Clang Static Analyzer”按钮以显示配置表单。插件允许添加多个版本的工具集，这在处理测试版工具集时非常有用。稍后我们会详细讨论这一点，但眼下，请为工具集命名，输入`scan-build`脚本的绝对路径，然后保存配置并前往您的构建任务。


    ![images](images/0917.jpg)


    **Figure 9–17.** *为分析器命名时，最好能反映其版本号。*


    在“任务配置”页面，您需要添加一个新的构建步骤。`Clang Scan-Build`选项已添加到“添加构建步骤”下拉菜单中，请选择它以创建新的静态分析步骤（参见[图9–18](#Chapter09.html#fig_9_18)）。指定需要构建的目标（或工作区和方案）。在高级选项中，您还可以选择要使用的分析器、发送给`xcodebuild`的配置以及要使用的SDK。


    ![images](images/0918.jpg)


    **Figure 9–18.** *确保使用调试配置，因为您需要保留调试符号。*


    **注意：** 与任务名称中的空格类似，`Clang Scan-Build`插件不会转义目标名称中的空格，因此您需要将诸如“Super Checkout”之类的目标重命名为“SuperCheckout”，如[图9–18](#Chapter09.html#fig_9_18)所示。


    配置好构建步骤后，您需要告诉插件发布结果，以便快速了解代码库的状态。在“构建后操作”部分，您会看到一个标有“Publish Clang Scan-Build
    Results”的复选框。勾选此复选框，将告知插件在任务详情页面发布一个显示项目汇总分析结果的漂亮图表，同时还会显示另一个标有“Mark build as
    unstable when threshold is exceeded?”的复选框。此功能与您之前设置的电子邮件通知相结合，为跟踪代码质量提供了宝贵的手段。当Johnny
    Sigabort的构建完成时，如果静态分析器报告的错误数量超过您指定的阈值，构建将被标记为不稳定，这将触发电子邮件通知操作，团队会被告知周五晚上的酒水都由Johnny买单。


    一旦构建步骤配置完成且构建后操作已启用，请保存任务配置并触发一次构建。构建完成后，刷新任务详情页面，右侧会出现一个图表（参见[图9–19](#Chapter09.html#fig_9_19)），显示分析器警告随时间的变化情况。目前它看起来几乎是空的。


    ![images](images/0919.jpg)


    **Figure 9–19.** *此图表展示了一个（终于）重回正轨的项目。*


    打开刚刚完成的构建结果，方法可以是点击构建历史侧边栏中的链接，或者点击图表中的相应点。在构建结果页面，您会看到静态分析插件添加的一些新功能。请注意，要充分发挥这些功能的效果，您的项目需要包含一些错误。这可能是您唯一一次从向项目中引入错误中获益的机会，所以请尽情操作。在“摘要”部分，会新增一个数据点，列出分析发现的错误数量，并附带一个指向详细信息的链接。这些详细信息也会在侧边栏中提供链接。点击其中一个链接，即可查看该构建的错误报告（参见[图9–20](#Chapter09.html#fig_9_20)）。


    ![images](images/0920.jpg)


    **Figure 9–20.** *`ProductDetailsViewController`的127行出了大问题！*


    点击其中一个错误的“详细信息”链接，将打开与运行`scan-view`时相同的HTML视图（参见[图9–21](#Chapter09.html#fig_9_21)）。


    ![images](images/0921.jpg)


    **Figure 9–21.** *哦，Johnny，你又干了些什么？*


    至此，您已完成：自动化构建、静态分析和电子邮件通知，以促进良好的代码质量和责任感。此外，您的应用程序正在为分发而构建，存放在一个集中且可访问的位置，因此您可以停止传递证书这个烫手山芋了。但如果能定期向您的测试人员分发构建版本，岂不是更好？


    #### 使分发更简单


    为了让您的应用程序交到测试人员手中，需要构建一个项目归档（IPA文件），其中包含一份配置描述文件的副本，以便使用iOS的OTA分发方法。为此，您有几个选择。如果您使用的是Xcode
    4工作区，可以直接使用`xcodebuild`的归档操作。但是，如果您构建的是一个简单项目，则需要自行创建归档。这并不难，事实上，开发者工具集附带了一个非常便捷的接口来实现这一点：`PackageApplication`命令。`PackageApplication`执行将所有必要的步骤，将应用程序包（`MyApp.app`）转换为应用程序归档（`MyApp.ipa`），并将所有必需的配置描述文件嵌入其中。


    在对应用程序包进行操作之前，您需要先访问到它。在Xcode 4之前的黑暗岁月里，构建产物存储在项目相对路径下的`Build`文件夹中。这意味着，在Jenkins内部，您只需在`$WORKSPACE/Build`目录下执行分发脚本即可。然而，当使用Xcode
    4工作区时，`Build`文件夹将放置在“派生数据”文件夹中，不再那么容易找到。在这种情况下，访问应用程序包的一种方法是使用编译器标志来告知`xcodebuild`将应用程序放置的位置，例如：


    `xcodebuild -sdk iphoneos -configuration Release DSTROOT=/Users/Shared/JenkinsProducts
    DEPLOYMENT_LOCATION=YES`


    `DSTROOT`编译器标志指向包含`Applications`文件夹的路径，编译后应用程序包应放置在此路径下。这通常用于Mac开发，默认指向文件系统的根目录，并将构建产物放置在`/Applications`目录下。通过指向一个`JenkinsProducts`文件夹，应用程序包将被放置在：


    `/Users/Shared/JenkinsProducts/Applications/MyApp.app`


    `DEPLOYMENT_LOCATION`标志只是告知`xcodebuild`将应用程序包“安装”到`DSTROOT`指定的位置，对于iOS应用程序，它通常不会这样做。


    现在您已经可以访问构建产物（无论是在相对构建文件夹中还是在安装文件夹中），几乎可以开始打包了。应用程序归档的最后一个要素是配置描述文件。您需要知道配置描述文件的绝对路径。Xcode目前管理着您的描述文件，并将它们存储在用户的`Library`文件夹中（这意味着您的Jenkins用户拥有自己的一套配置描述文件，您可能还记得之前的说明）。您可以简单地使用这些文件的路径，但如果您查看该文件夹，会发现它们已被重命名为其配置文件标识符，这极难管理。


    `ls ~/Library/MobileDevice/Provisioning\ Profiles`

    `685FDD6E-5555-4402-BFCC-62F1064EFF2F.mobileprovision`


    相反，您应该做的是将描述文件导出到一个可访问的位置，在那里您可以自行管理它们。在Xcode的Organizer中，选择要导出的配置描述文件，然后点击窗口底部的“Export”按钮。将描述文件放置在Jenkins可以访问的位置。我们建议使用`/Users/Shared/JenkinsProvisioning/`。请务必为描述文件起一个描述性的名称。


    将描述文件放置到位后，您终于可以打包应用程序进行分发了。跳转到Jenkins中的任务配置页面，并添加一个新的Shell脚本构建步骤。'
  raw: 'With the plug-in installed, head over to the Configure System page and scroll
    down to the Clang Static Analyzer section to configure the plug-in ([Figure 9–17](#Chapter09.html#fig_9_17)).
    The Clang plug-in needs to know the location of your copy of the static analyzer
    tools. Click the Add Clang Static Analyzer button to reveal the form. The plug-in
    allows you to add multiple versions of the toolset, which comes in handy when
    working with beta toolsets. We''ll talk more about that in a moment, but for now,
    give the toolset a name and enter the absolute path to the scan-build script,
    then save your configuration and head over to your build job.


    ![images](images/0917.jpg)


    **Figure 9–17.** *It''s a good idea to give the analyzer a name that reflects
    its version number*


    In the Job Configuration screen, you need to add a new build step. The Clang Scan-Build
    option has been added to the Add build step drop-down menu, so select that to
    create a new static analysis step ([Figure 9–18](#Chapter09.html#fig_9_18)). Specify
    the target (or workspace and scheme) that needs to be built. In the advanced options,
    you can also choose which analyzer to use, what configuration send to xcodebuild,
    as well as which SDK to use.


    ![images](images/0918.jpg)


    **Figure 9–18.** *Ensure that you are using a debug configuration, as you''ll
    want the debug symbols in tact.*


    **NOTE:** Similar to whitespace in job names, the Clang Scan-Build plug-in doesn''t
    escape whitespace in target names, so you''ll need to rename targets like “Super
    Checkout” to “SuperCheckout,” as shown in [Figure 9–18](#Chapter09.html#fig_9_18).


    Once you''ve got the build step configured, you need to tell the plug-in to publish
    the results so that you can see the status of your codebase at a glance. In the
    Post-build Actions section you''ll see a checkbox marked “Publish Clang Scan-Build
    Results.” Checking this box will tell the plug-in to publish a nice chart of your
    project''s aggregate analysis results on the Job Details page and will also reveal
    another checkbox labeled “Mark build as unstable when threshold is exceeded?”
    This feature, coupled with the e-mail notifications you set up earlier, provides
    an invaluable means to keep track of code quality. When Johnny Sigabort''s build
    is completed, if the number of bugs reported by the static analyzer is higher
    than a threshold you specify, the build will be marked as unstable, which will
    trigger e-mail notification action, and the team will be notified that Friday
    night''s drinks are all on Johnny.


    Once the build step is configured and the post-build action is enabled, save the
    job configuration and fire off a build. When the build is finished, refresh the
    Job Details page to reveal a chart ([Figure 9–19](#Chapter09.html#fig_9_19)) on
    the right-hand side, depicting the number of analyzer warnings over time. It will
    be pretty empty at the moment.


    ![images](images/0919.jpg)


    **Figure 9–19.** *This chart shows a project that has (finally) gotten back on
    track*


    Open the results of the build that just finished by either clicking its link in
    the Build History sidebar or by clicking the right point in the chart. In the
    Build Results page, you''ll see a few new features added by the static analysis
    plug-in. Note that in order to see these features in their full effect, your project
    needs to have some bugs. This might be the only time you''ll ever benefit from
    introducing bugs into your project, so just go nuts. In the Summary section, there
    will be a new data point that lists the number of bugs found by the analysis,
    with a link to the details. These details are also linked to in the sidebar. Click
    on one of those links to see the bug report for the build ([Figure 9–20](#Chapter09.html#fig_9_20)).


    ![images](images/0920.jpg)


    **Figure 9–20.** *Something is horribly wrong with line 127 of the ProductDetailsViewController!*


    Clicking on the Details link for one of these bugs will open the same HTML view
    you get when running scan-view ([Figure 9–21](#Chapter09.html#fig_9_21)).


    ![images](images/0921.jpg)


    **Figure 9–21.** *Oh, Johnny, what have you done now?*


    So there you have it: automated builds, static analysis, and e-mail notifications
    to promote good code quality and accountability. In addition, your app is being
    built for distribution in a central, accessible location, so you can stop playing
    hot potato with certificates. But wouldn''t it be great to be able to distribute
    builds to your beta testers on a regular basis?


    #### Distribution Made Easier


    In order to get your app in the hands of your beta testers, you need to build
    an archive of your project (an IPA file), with a copy of your provisioning profile
    included, to allow you to use iOS''s OTA distribution method. To do this, you
    have some options. If you are working with an Xcode 4 workspace, you can simply
    uses xcodebuild''s archive action. However, if you''re building a simple project,
    you''re going to have to make the archive yourself. This isn''t very hard, and
    in fact, the developer toolset comes with a very handy interface for doing this:
    the PackageApplication command. PackageApplication performs all the tasks necessary
    to convert an application bundle (`MyApp.app`) into an application archive (`MyApp.ipa`),
    with all of the necessary provisioning embedded within.


    Before you can do anything to your application bundle, you need access to it.
    In the dark days before Xcode 4, build products were stored relative to the project
    in a Build folder. This meant that, from within Jenkins, you simply needed to
    perform your distribution scripts in `$WORKSPACE/Build`. When working with an
    Xcode 4 workspace, however, the Build folder will be placed in the Derived Data
    folder, and it won''t be as easy to find. One way to get to the app bundle in
    those cases is to use compiler flags to tell xcodebuild where to put the app,
    such as


    `xcodebuild -sdk iphoneos -configuration Release DSTROOT=/Users/Shared/JenkinsProducts
    DEPLOYMENT_LOCATION=YES`


    The DSTROOT compiler flag points to the path containing the Applications folder
    where the app bundle should be placed after compilation. This is typically used
    in Mac development, and it points to the root of your filesystem by default, placing
    built products in `/Applications`. By pointing to a JenkinsProducts folder, the
    app bundle will be placed at:


    `/Users/Shared/JenkinsProducts/Applications/MyApp.app`


    The DEPLOYMENT_LOCATION flag simply tells xcodebuild to “install” the app bundle
    in the location specified in DSTROOT, which it wouldn''t ordinarily do with an
    iOS app.


    Now that you''ve got access to your built product, be it in your relative build
    folder or an installation folder, you''re almost ready to package it up. The last
    ingredient in the app archive is the provisioning profile. You''re going to need
    the absolute path to the profile. Xcode is currently managing your profiles and
    storing them in the user''s Library folder (which means that your Jenkins user
    has her own set of provisioning profiles, as you may remember from earlier). You
    could simply use the paths to these profiles, but if you look in the folder, you''ll
    find that they''ve been renamed to their Profile Identifier, which is unbelievably
    unmanageable.


    `ls ~/Library/MobileDevice/Provisioning\ Profiles`

    `685FDD6E-5555-4402-BFCC-62F1064EFF2F.mobileprovision`


    What you should do, instead, is export the profiles to an accessible location
    where you can manage them yourself. From the Organizer in Xcode, select the provisioning
    profile you want to export and click the Export button at the bottom of the window.
    Place the profile somewhere that Jenkins can access. Let''s use `/Users/Shared/JenkinsProvisioning/`.
    Be sure to name the profile something descriptive.


    Once you''ve got the profile in place, you can finally package up your app for
    distribution. Jump into your Job Configuration in Jenkins, and add a new shell
    script build step.'
  trans: '

    安装插件后，请前往“配置系统”页面，滚动至“Clang Static Analyzer”部分进行插件配置（参见图 9–17）。该插件需要知道静态分析工具副本的位置。点击“Add
    Clang Static Analyzer”按钮以显示配置表单。插件允许添加多个版本的工具集，这在处理测试版工具集时非常有用。稍后我们会详细讨论这一点，但眼下，请为工具集命名，输入`scan-build`脚本的绝对路径，然后保存配置并前往您的构建任务。


    ![images](img/0917.jpg)


    **Figure 9–17.** *为分析器命名时，最好能反映其版本号。*


    在“任务配置”页面，您需要添加一个新的构建步骤。`Clang Scan-Build`选项已添加到“添加构建步骤”下拉菜单中，请选择它以创建新的静态分析步骤（参见图
    9–18）。指定需要构建的目标（或工作区和方案）。在高级选项中，您还可以选择要使用的分析器、发送给`xcodebuild`的配置以及要使用的 SDK。


    ![images](img/0918.jpg)


    **Figure 9–18.** *确保使用调试配置，因为您需要保留调试符号。*


    **注意：** 与任务名称中的空格类似，`Clang Scan-Build`插件不会转义目标名称中的空格，因此您需要将诸如“Super Checkout”之类的目标重命名为“SuperCheckout”，如图
    9–18 所示。


    配置好构建步骤后，您需要告诉插件发布结果，以便快速了解代码库的状态。在“构建后操作”部分，您会看到一个标有“Publish Clang Scan-Build
    Results”的复选框。勾选此复选框，将告知插件在任务详情页面发布一个显示项目汇总分析结果的漂亮图表，同时还会显示另一个标有“Mark build as
    unstable when threshold is exceeded?”的复选框。此功能与您之前设置的电子邮件通知相结合，为跟踪代码质量提供了宝贵的手段。当
    Johnny Sigabort 的构建完成时，如果静态分析器报告的错误数量超过您指定的阈值，构建将被标记为不稳定，这将触发电子邮件通知操作，团队会被告知周五晚上的酒水都由
    Johnny 买单。


    一旦构建步骤配置完成且构建后操作已启用，请保存任务配置并触发一次构建。构建完成后，刷新任务详情页面，右侧会出现一个图表（参见图 9–19），显示分析器警告随时间的变化情况。目前它看起来几乎是空的。


    ![images](img/0919.jpg)


    **Figure 9–19.** *此图表展示了一个（终于）重回正轨的项目。*


    打开刚刚完成的构建结果，方法可以是点击构建历史侧边栏中的链接，或者点击图表中的相应点。在构建结果页面，您会看到静态分析插件添加的一些新功能。请注意，要充分发挥这些功能的效果，您的项目需要包含一些错误。这可能是您唯一一次从向项目中引入错误中获益的机会，所以请尽情操作。在“摘要”部分，会新增一个数据点，列出分析发现的错误数量，并附带一个指向详细信息的链接。这些详细信息也会在侧边栏中提供链接。点击其中一个链接，即可查看该构建的错误报告（参见图
    9–20）。


    ![images](img/0920.jpg)


    **Figure 9–20.** *`ProductDetailsViewController`的 127 行出了大问题！*


    点击其中一个错误的“详细信息”链接，将打开与运行`scan-view`时相同的 HTML 视图（参见图 9–21）。


    ![images](img/0921.jpg)


    **Figure 9–21.** *哦，Johnny，你又干了些什么？*


    至此，您已完成：自动化构建、静态分析和电子邮件通知，以促进良好的代码质量和责任感。此外，您的应用程序正在为分发而构建，存放在一个集中且可访问的位置，因此您可以停止传递证书这个烫手山芋了。但如果能定期向您的测试人员分发构建版本，岂不是更好？


    #### 使分发更简单


    为了让您的应用程序交到测试人员手中，需要构建一个项目归档（IPA 文件），其中包含一份配置描述文件的副本，以便使用 iOS 的 OTA 分发方法。为此，您有几个选择。如果您使用的是
    Xcode 4 工作区，可以直接使用`xcodebuild`的归档操作。但是，如果您构建的是一个简单项目，则需要自行创建归档。这并不难，事实上，开发者工具集附带了一个非常便捷的接口来实现这一点：`PackageApplication`命令。`PackageApplication`执行将所有必要的步骤，将应用程序包（`MyApp.app`）转换为应用程序归档（`MyApp.ipa`），并将所有必需的配置描述文件嵌入其中。


    在对应用程序包进行操作之前，您需要先访问到它。在 Xcode 4 之前的黑暗岁月里，构建产物存储在项目相对路径下的`Build`文件夹中。这意味着，在 Jenkins
    内部，您只需在`$WORKSPACE/Build`目录下执行分发脚本即可。然而，当使用 Xcode 4 工作区时，`Build`文件夹将放置在“派生数据”文件夹中，不再那么容易找到。在这种情况下，访问应用程序包的一种方法是使用编译器标志来告知`xcodebuild`将应用程序放置的位置，例如：


    `xcodebuild -sdk iphoneos -configuration Release DSTROOT=/Users/Shared/JenkinsProducts
    DEPLOYMENT_LOCATION=YES`


    `DSTROOT`编译器标志指向包含`Applications`文件夹的路径，编译后应用程序包应放置在此路径下。这通常用于 Mac 开发，默认指向文件系统的根目录，并将构建产物放置在`/Applications`目录下。通过指向一个`JenkinsProducts`文件夹，应用程序包将被放置在：


    `/Users/Shared/JenkinsProducts/Applications/MyApp.app`


    `DEPLOYMENT_LOCATION`标志只是告知`xcodebuild`将应用程序包“安装”到`DSTROOT`指定的位置，对于 iOS 应用程序，它通常不会这样做。


    现在您已经可以访问构建产物（无论是在相对构建文件夹中还是在安装文件夹中），几乎可以开始打包了。应用程序归档的最后一个要素是配置描述文件。您需要知道配置描述文件的绝对路径。Xcode
    目前管理着您的描述文件，并将它们存储在用户的`Library`文件夹中（这意味着您的 Jenkins 用户拥有自己的一套配置描述文件，您可能还记得之前的说明）。您可以简单地使用这些文件的路径，但如果您查看该文件夹，会发现它们已被重命名为其配置文件标识符，这极难管理。


    `ls ~/Library/MobileDevice/Provisioning\ Profiles`

    `685FDD6E-5555-4402-BFCC-62F1064EFF2F.mobileprovision`


    相反，您应该做的是将描述文件导出到一个可访问的位置，在那里您可以自行管理它们。在 Xcode 的 Organizer 中，选择要导出的配置描述文件，然后点击窗口底部的“Export”按钮。将描述文件放置在
    Jenkins 可以访问的位置。我们建议使用`/Users/Shared/JenkinsProvisioning/`。请务必为描述文件起一个描述性的名称。


