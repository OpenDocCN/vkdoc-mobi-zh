    ### 认识电源管理


    任何人在谈论移动设备时，最先问的问题之一就是：“电池续航怎么样？”作为移动开发者，我们有责任确保应用程序不仅节省内存，而且节省电量。这意味着我们必须编写高效的、没有内存泄漏的代码。


    这种平衡很难实现，尤其是在设备功能更强大、内部集成的芯片类型更多的情况下。例如，iPhone 4 几乎为每个功能都配备了芯片：CPU、GPU、`802.11`、`GSM`/`CDMA`、加速度计、指南针和陀螺仪，这些主要芯片都集成在由电池供电的小巧机身内。由于我们可以访问各种不同类型的传感器和芯片，因此我们必须极其谨慎地选择使用哪些芯片以及使用多长时间。


    #### 硬件部分


    每台 iOS 设备至少有一种无线芯片。它们都有 Wi-Fi 无线芯片，而 iPhone/iPad 3G 则有可以在 3G 或 2G 网络上通信的`GSM`/`CDMA`无线芯片。这些无线芯片在通电时会消耗相当多的电量。操作系统会采用不同的技术在芯片不使用时将其关闭，因此，开发者有责任在绝对必要时才启动这些芯片。


    使用 3G 芯片是耗尽设备电池最快的方式之一。而 3G 网络在数据传输完成后仍会让芯片保持满功率运行几秒钟，这更加剧了耗电问题。图 6–16 展示了应用程序在
    3G 网络上快速连续进行短时突发传输时的电量消耗情况。


    ![images](img/0616.jpg)


    **图 6–16.** *在这个 3G 无线芯片的功率图中，请注意芯片在数据发送后会保持高功率状态数秒。*


    另一种非 Wi-Fi 的无线芯片是 2G 无线芯片。这个芯片比 3G 芯片功耗低，但传输速度也更慢，因此在互联网上传输大块数据时可能效率较低。2G 芯片与
    3G 芯片的不同之处在于，一旦数据传输完成，它会立即进入低功耗状态。图 6–17 显示了其功耗随时间的变化。


    ![images](img/0617.jpg)


    **图 6–17.** *2G 无线芯片的功率图*


    最后，也是最高效的无线芯片是 Wi-Fi 无线芯片。与 2G 无线芯片类似，Wi-Fi 无线芯片在数据传输完成后会进入低功耗状态。由于 Wi-Fi 的数据传输速度极快，它是设备首选的无线数据传输方式。我们已经展示了
    3G 和 2G 无线芯片的功耗随时间变化图，图 6–18 将完善这一系列图表。


    ![images](img/0618.jpg)


    **图 6–18.** *Wi-Fi 芯片是设备上最快、最高效的芯片。*


    管理数据通信对于保持良好的电池寿命至关重要。尽可能缩短传输会话时间，并让无线芯片尽可能多地处于空闲状态，可以减缓电池消耗，并让用户更满意。


    设备上的其他芯片，包括 CPU、GPU、GPS 和运动传感器芯片，都有不同的功耗需求。CPU 和 GPU 分别负责运行代码和渲染屏幕内容。这意味着编写快速高效的代码可以降低
    CPU 负载，而保持动画/视图相对简单则可以减少 GPU 的功耗。这些芯片始终处于活动状态，因此让它们保持空闲的唯一方式就是编写优秀的代码。而框架则会控制设备上的其他芯片。`Core
    Location` 控制 GPS，`Core Motion` 控制加速度计和陀螺仪。当我们转向更多由软件控制的设备时，我们需要讨论代码如何影响这些芯片，并最终影响电池寿命。


    #### 编码技巧


    iOS 是一个非常复杂的操作系统。它专为移动设备设计，并针对最大化电池寿命进行了优化，同时还能提供足够的性能来运行出色的应用程序！为了让我们的应用程序在 iOS
    环境中成为“好市民”，有一些技巧可以确保我们的应用程序表现出色，同时不会过度消耗电池。


    ##### 网络通信


    正如我们在上一节讨论的，无线芯片会消耗相当多的电量。然而，我们可以通过智能地请求数据来减少维持这些芯片运行的间接开销。由于大多数网络通信是通过 HTTP 进行的，这里真正需要牢记的就是内容大小和内容压缩。如果数据以
    JSON 格式编码并使用 gzip 压缩，那么内容体积会很小，无线芯片就不会那么活跃。


    网络通信的另一个好方法是将请求分组在一起。这会使无线芯片活跃时间稍长一些，但最终比频繁的小网络请求或长时间保持套接字打开要好得多。轮询也是一个坏主意。与其轮询，不如利用推送通知。这可以让无线芯片保持静默并消耗更少的电量。


    至于寻找真正的性能瓶颈，可以使用 `Activity Monitor` 工具来跟踪网络使用情况。要找到 `Activity Monitor` 工具中的网络选项可能有点棘手。因此，请启动带有
    `Activity Monitor` 工具的 Instruments，然后点击工具区域中的信息“i”按钮。这将调出如图 图 6–19 所示的界面。


    ![images](img/0619.jpg)


    **图 6–19.** *显示默认选项未选中的工具配置面板*


    请注意，在此示例中，复选框是未选中的。它们默认是选中的，但我们在查看处理器使用情况时不一定需要监视 CPU。在这个实例中我将它们取消了选中。要获取网络选项，请点击
    `Configure` 按钮。配置面板会翻转过来，呈现出 图 6–20 所示的界面。


    ![images](img/0620.jpg)


    **图 6–20.** *工具配置面板，允许您为工具选择可见的传感器。*


    选择与 图 6–20 中相同的复选框。点击 `Done`，并确保在信息面板中这些传感器已被勾选。点击原来显示“i”位置的“x”，然后从 `Target` 下拉菜单中选择
    `Super Checkout` 目标。点击录制按钮开始录制数据。应用程序将启动，当发起网络请求时，您会看到网络图表出现峰值。随着应用程序缓存更多数据，您会发现随着您在应用程序中导航，网络请求变得不那么频繁。图
    6–21 显示了所有图像被缓存后的一次运行结果。


    ![images](img/0621.jpg)


    **图 6–21.** *将网络请求峰值保持在最低限度是保持无线芯片静默、节省更多电量的好方法。*

