- fmt: "### When Should I Start Testing?\n\nWhether you're doing TDD or just need\
    \ to test a seemingly irreproducible bug, the only good time to start testing\
    \ is right now. The sooner you start, the easier it will be to define tests that\
    \ accurately test against your requirements without being clouded by preconceived\
    \ notions or \"but-I've-already-spent-so-much-time-doing-it-this-way-itis.\"\n\
    \nBuilding tests definitely takes time. However, it can also save time in the\
    \ long run. One of the benefits of tests is that they run extremely quickly. It\
    \ only takes a few moments for Xcode to execute a test suite. This means you can\
    \ run your tests a lot more often, without sacrificing much time. Running a fully\
    \ baked test suite will almost always be exceedingly faster than re-creating a\
    \ bug in an app in order to diagnose it.\n\nAnother benefit to testing is that\
    \ well-written tests only need to be written once. If you write tests that match\
    \ up to your requirements, then your tests shouldn't need to change unless your\
    \ requirements do. If you're adding a new feature, you should only need to add\
    \ new tests. Your previously written tests should all remain valid. The benefit\
    \ of having a fully baked test suite is that it protects your code from regression\
    \ bugs.\n\n### Xcode Makes It Easy to Test\n\nXcode does many things that make\
    \ testing easy, no matter how much you want to do. There are two main categories\
    \ of testing that Xcode helps with: unit testing and UI testing.\n\nUnit testing\
    \ is done within Xcode using a framework called OCUnit. Don't worry about needing\
    \ to learn a new framework. From an interface perspective, OCUnit is one of the\
    \ simplest frameworks you'll work with. In addition, Xcode does a lot of the setup\
    \ and heavy lifting for you by providing target and file templates. As you'll\
    \ see in a moment, starting a new unit testing-enabled project in Xcode is as\
    \ simple as clicking a single checkbox.\n\nUI testing is handled by running scripts\
    \ in Instruments using the Automation template. This instrument uses a custom\
    \ JavaScript framework to traverse a running application's user interface, allowing\
    \ you to interact with the application without actually touching the screen.\n\
    \n#### The Target\n\nThere are two ways to get a unit test target into your project.\
    \ The first, simplest way is to tell Xcode to include the target when you set\
    \ up your project (see [Figure 8–3](#Chapter08.html#fig_8_3)). Before incorporating\
    \ unit tests in the Super Checkout project, let's get comfortable with the way\
    \ they work in a new, separate project. For this example, you'll be building a\
    \ very simple calculator.\n\n![images](images/0803.jpg)\n\n**Figure 8–3.** *Including\
    \ a unit test target in your new project is as simple as checking a box.*\n\n\
    If you're adding testing to an existing project, need to add another testing target,\
    \ or simply forgot to check the box during setup, you can always add a unit testing\
    \ target to your project by simply adding a new target to your project and choosing\
    \ the unit test template. From the menu bar, choose File ![images](images/U001.jpg)\
    \ New ![images](images/U001.jpg) New Target ([Figure 8–4](#Chapter08.html#fig_8_4)).\n\
    \n![images](images/0804.jpg)\n\n**Figure 8–4.** *You can also create new targets\
    \ from the project screen's Add Target button.*\n\nThis will present the target\
    \ template dialog ([Figure 8–5](#Chapter08.html#fig_8_5)). You'll find the Unit\
    \ Testing Bundle target template in the section labeled Other.\n\n![images](images/0805.jpg)\n\
    \n**Figure 8–5.** *You can add multiple unit testing bundles to your project.*\n\
    \nOnce you've got your target created, you can begin writing tests. Before we\
    \ get to that, let's take a look at the contents of the new testing target. If\
    \ you created the test target as part of a new project, the target will be named\
    \ the same as your project, appended with the word “Tests.” If you created the\
    \ target as a part of an existing project, it will be named whatever you chose\
    \ to name it. It's important to follow a naming convention, so it's wise to name\
    \ your test target after your project, appended with the word “Tests.”\n\nIn the\
    \ Project Navigator, there will be a group for each target. Inside the test target's\
    \ group, you'll find a class that is named the same as your target, as well as\
    \ a Supporting Files group, similar to what you would find in any other target\
    \ group.\n\nIn `SimpleCalculatorTests.m`, you should see the following:\n\n```\n\
    @implementation SimpleCalculatorTests\n\n- (void)setUp\n{\n    [super setUp];\n\
    \n    // Set-up code here.\n}\n\n- (void)tearDown\n{\n    // Tear-down code here.\n\
    \n    [super tearDown];\n}\n\n- (void)testExample\n{\n    STFail(@\"Unit tests\
    \ are not implemented yet in SimpleCalculatorTests\");\n}\n\n@end\n```\n\nWe'll\
    \ get to the details of this in a moment. For now, it's sufficient to understand\
    \ that this sets up a single, failing test.\n\nNow that you've got a testing target,\
    \ you need to run the tests. Before you do that, you need to get comfortable with\
    \ the testing configuration and ensure that the tests are active. Xcode makes\
    \ it really simple to control what tests are being run and provides the ability\
    \ to modify some of your testing environment variables as well.\n\n#### Setting\
    \ Up the Tests\n\nTo run the tests, you need to ensure that your scheme is setup\
    \ for testing. From the menu bar, select `Product` ![images](images/U001.jpg)\
    \ `Edit Scheme` to bring up the scheme editor ([Figure 8–6](#Chapter08.html#fig_8_6)).\n\
    \n![images](images/0806.jpg)\n\n**Figure 8–6.** *If you don't include a testing\
    \ target in your scheme, the Test action will be disabled.*\n\nFrom the sidebar,\
    \ select Test. If you opted to include a unit testing target during project setup,\
    \ you should see the test target listed in the Info pane. If you created your\
    \ unit test target manually, you'll have to add it to the scheme manually. Click\
    \ the + button to bring up a list of all unit test targets included in your project.\
    \ Select your target and add it to the Test action of your scheme.\n\n![images](images/0807.jpg)\n\
    \n**Figure 8–7.** *All unit testing targets for all projects in the workspace\
    \ will be available here.*\n\nOnce you have your target included in your scheme,\
    \ you can do some more advanced configuration. The drop-down menus above the test\
    \ target list allow you to choose the build configuration and debugger to use\
    \ for the tests. These settings apply to all test targets in the current scheme.\
    \ The target list allows you to modify configurations for the individual targets.\
    \ If you expand a target, you'll see a list of all the `SenTestCase` subclasses\
    \ in the target. In your example, you'll see a single list item, `SimpleCalculatorTests`.\
    \ Expanding one of these test cases will expose the individual tests, listed by\
    \ method name ([Figure 8–8](#Chapter08.html#fig_8_8)). Each of these items has\
    \ a corresponding checkbox on the right, which allows you to toggle them on and\
    \ off. Prior to Xcode 4, this would be done in code by configuring `SenTestSuite`\
    \ objects.\n\nAlso of note on this screen is the Test Location column, which allows\
    \ you to specify the locale from which the test should be run. This allows you\
    \ to test behaviors that depend on locale, including `CoreLocation`, `NSDate`,\
    \ `NSCalendar`, etc.\n\n![images](images/0808.jpg)\n\n**Figure 8–8.** *Once you\
    \ have a fully baked test suite, the ability to select which tests to run will\
    \ come in handy.*\n\nThe Arguments pane ([Figure 8–9](#Chapter08.html#fig_8_9))\
    \ allows you to modify the action's environment arguments. By default, the “Use\
    \ the Run action's options” checkbox is checked, which will be the preferred choice\
    \ for most cases. As in any testing scenario, it's important to keep the testing\
    \ environment as similar to the running environment as possible.\n\n![images](images/0809.jpg)\n\
    \n**Figure 8–9.** *Modifying the arguments of the test action causes a divergence\
    \ from the running environment.*"
  raw: '#### When Should I Start Testing?


    Whether you''re doing TDD or just need to test a seemingly irreproducible bug,
    the only good time to start testing is right now. The sooner you start, the easier
    it will be to define tests that accurately test against your requirements without
    being clouded by preconceived notions or but-I''ve-already-spent-so-much-time-doing-it-this-way-itis.


    Building tests definitely takes time. However, it can also save time in the long
    run. One of the benefits of tests is that they run extremely quickly. It only
    takes a few moments for Xcode to execute a test suite. This means you can run
    your tests a lot more often, without sacrificing much time. Running a fully baked
    test suite will almost always be exceedingly faster than re-creating a bug in
    an app in order to diagnose it.


    Another benefit to testing is that well-written tests only need to be written
    once. If you write tests that match up to your requirements, then your tests shouldn''t
    need to change unless your requirements do. If you''re adding a new feature, you
    should only need to add new tests. Your previously written tests should all remain
    valid. The benefit of having a fully baked test suite is that it protects your
    code from regression bugs.


    #### Xcode Makes It Easy to Test


    Xcode does many things that make testing easy, no matter how much you want to
    do. There are two main categories of testing that Xcode helps with: unit testing
    and UI testing.


    Unit testing is done within Xcode using a framework called OCUnit. Don''t worry
    about needing to learn a new framework. From an interface perspective, OCUnit
    is one of the simplest frameworks you''ll work with. In addition, Xcode does a
    lot of the setup and heavy lifting for you by providing target and file templates.
    As you''ll see in a moment, starting a new unit testing-enabled project in Xcode
    is as simple as clicking a single checkbox.


    UI testing is handled by running scripts in Instruments using the Automation template.
    This instrument uses a custom JavaScript framework to traverse a running application''s
    user interface, allowing you to interact with the application without actually
    touching the screen.


    ##### The Target


    There are two ways to get a unit test target into your project. The first, simplest
    way is to tell Xcode to include the target when you set up your project (see [Figure
    8–3](#Chapter08.html#fig_8_3)). Before incorporating unit tests in the Super Checkout
    project, let''s get comfortable with the way they work in a new, separate project.
    For this example, you''ll be building a very simple calculator.


    ![images](images/0803.jpg)


    **Figure 8–3.** *Including a unit test target in your new project is as simple
    as checking a box.*


    If you''re adding testing to an existing project, need to add another testing
    target, or simply forgot to check the box during setup, you can always add a unit
    testing target to your project by simply adding a new target to your project and
    choosing the unit test template. From the menu bar, choose File ![images](images/U001.jpg)
    New ![images](images/U001.jpg) New Target ([Figure 8–4](#Chapter08.html#fig_8_4)).


    ![images](images/0804.jpg)


    **Figure 8–4.** *You can also create new targets from the project screen''s Add
    Target button.*


    This will present the target template dialog ([Figure 8–5](#Chapter08.html#fig_8_5)).
    You''ll find the Unit Testing Bundle target template in the section labeled Other.


    ![images](images/0805.jpg)


    **Figure 8–5.** *You can add multiple unit testing bundles to your project.*


    Once you''ve got your target created, you can begin writing tests. Before we get
    to that, let''s take a look at the contents of the new testing target. If you
    created the test target as part of a new project, the target will be named the
    same as your project, appended with the word “Tests.” If you created the target
    as a part of an existing project, it will be named whatever you chose to name
    it. It''s important to follow a naming convention, so it''s wise to name your
    test target after your project, appended with the word “Tests.”


    In the Project Navigator, there will be a group for each target. Inside the test
    target''s group, you''ll find a class that is named the same as your target, as
    well as a Supporting Files group, similar to what you would find in any other
    target group.


    In `SimpleCalculatorTests.m`, you should see the following:


    `@implementation SimpleCalculatorTests`


    `- (void)setUp`

    `{`

    `    [super setUp];`


    `    // Set-up code here.`

    `}`


    `- (void)tearDown`

    `{`

    `    // Tear-down code here.`


    `    [super tearDown];`

    `}`


    `- (void)testExample`

    `{`

    `    STFail(@"Unit tests are not implemented yet in SimpleCalculatorTests");`

    `}`


    `@end`


    We''ll get to the details of this in a moment. For now, it''s sufficient to understand
    that this sets up a single, failing test.


    Now that you''ve got a testing target, you need to run the tests. Before you do
    that, you need to get comfortable with the testing configuration and ensure that
    the tests are active. Xcode makes it really simple to control what tests are being
    run and provides the ability to modify some of your testing environment variables
    as well.


    ##### Setting Up the Tests


    To run the tests, you need to ensure that your scheme is setup for testing. From
    the menu bar, select `Product` ![images](images/U001.jpg) `Edit Scheme` to bring
    up the scheme editor ([Figure 8–6](#Chapter08.html#fig_8_6)).


    ![images](images/0806.jpg)


    **Figure 8–6.** *If you don''t include a testing target in your scheme, the Test
    action will be disabled.*


    From the sidebar, select Test. If you opted to include a unit testing target during
    project setup, you should see the test target listed in the Info pane. If you
    created your unit test target manually, you''ll have to add it to the scheme manually.
    Click the + button to bring up a list of all unit test targets included in your
    project. Select your target and add it to the Test action of your scheme.


    ![images](images/0807.jpg)


    **Figure 8–7.** *All unit testing targets for all projects in the workspace will
    be available here.*


    Once you have your target included in your scheme, you can do some more advanced
    configuration. The drop-down menus above the test target list allow you to choose
    the build configuration and debugger to use for the tests. These settings apply
    to all test targets in the current scheme. The target list allows you to modify
    configurations for the individual targets. If you expand a target, you''ll see
    a list of all the `SenTestCase` subclasses in the target. In your example, you''ll
    see a single list item, `SimpleCalculatorTests`. Expanding one of these test cases
    will expose the individual tests, listed by method name ([Figure 8–8](#Chapter08.html#fig_8_8)).
    Each of these items has a corresponding checkbox on the right, which allows you
    to toggle them on and off. Prior to Xcode 4, this would be done in code by configuring
    `SenTestSuite` objects.


    Also of note on this screen is the Test Location column, which allows you to specify
    the locale from which the test should be run. This allows you to test behaviors
    that depend on locale, including `CoreLocation`, `NSDate`, `NSCalendar`, etc.


    ![images](images/0808.jpg)


    **Figure 8–8.** *Once you have a fully baked test suite, the ability to select
    which tests to run will come in handy.*


    The Arguments pane ([Figure 8–9](#Chapter08.html#fig_8_9)) allows you to modify
    the action''s environment arguments. By default, the “Use the Run action''s options”
    checkbox is checked, which will be the preferred choice for most cases. As in
    any testing scenario, it''s important to keep the testing environment as similar
    to the running environment as possible.


    ![images](images/0809.jpg)


    **Figure 8–9.** *Modifying the arguments of the test action causes a divergence
    from the running environment.*'
  trans: "\n### 我应该何时开始测试？\n\n无论你是在实践 TDD，还是仅仅需要测试一个看似无法重现的 Bug，开始测试的唯一最佳时机就是现在。你越早开始，就越容易定义出能精确对应需求的测试，而不会被先入为主的观念或“但我已经用这种方式花了太多时间”的想法所干扰。\n\
    \n构建测试确实需要时间。然而，长远来看它也能节省时间。测试的益处之一在于它们运行速度极快。Xcode 执行一个测试套件只需片刻。这意味着你可以更频繁地运行测试，而无需牺牲太多时间。运行一个完整的测试套件几乎总是比在应用中重现一个\
    \ Bug 以便诊断要快得多。\n\n测试的另一个好处是，编写良好的测试只需编写一次。如果你编写的测试与需求相匹配，那么除非需求发生变化，否则你的测试就不需要改变。如果你正在添加新功能，你只需要添加新的测试。你之前编写的测试应该全部保持有效。拥有一个完整的测试套件的好处是，它能保护你的代码免受回归\
    \ Bug 的侵害。\n\n### Xcode 让测试变得简单\n\nXcode 做了很多让测试变得简单的事情，无论你想做多少测试。Xcode 帮助进行的两种主要测试类型是：单元测试和\
    \ UI 测试。\n\n单元测试是在 Xcode 内部使用一个名为 OCUnit 的框架完成的。不必担心需要学习一个新的框架。从接口的角度来看，OCUnit\
    \ 是你将使用的最简单的框架之一。此外，Xcode 通过提供目标和文件模板，为你完成了大量的设置和繁重工作。正如你马上就会看到的，在 Xcode 中启动一个启用了单元测试的新项目，简单到只需点击一个复选框。\n\
    \nUI 测试是通过在 Instruments 中使用 Automation 模板运行脚本来处理的。这个工具使用了一个自定义的 JavaScript 框架来遍历正在运行的应用程序的用户界面，让你无需实际触摸屏幕即可与应用程序进行交互。\n\
    \n#### 测试目标\n\n将单元测试目标添加到你的项目中，有两种方法。第一种也是最简单的方法，是在你设置项目时告诉 Xcode 包含该目标（参见 图 8–3）。在将单元测试集成到\
    \ Super Checkout 项目之前，先让我们在一个新的、独立的项目中熟悉它们的工作方式。在这个示例中，你将构建一个非常简单的计算器。\n\n![images](img/0803.jpg)\n\
    \n**图 8–3.** *在你的新项目中包含一个单元测试目标，简单到只需勾选一个复选框。*\n\n如果你要为现有项目添加测试，需要添加另一个测试目标，或者只是在设置时忘记勾选该复选框，你始终可以通过向你的项目添加一个新目标并选择单元测试模板来添加单元测试目标。从菜单栏选择\
    \ 文件 ![images](img/U001.jpg) 新建 ![images](img/U001.jpg) 新建目标（图 8–4）。\n\n![images](img/0804.jpg)\n\
    \n**图 8–4.** *你也可以从项目界面的“添加目标”按钮创建新目标。*\n\n这将弹出目标模板对话框（图 8–5）。你会在标有“其他”的部分找到“单元测试包”目标模板。\n\
    \n![images](img/0805.jpg)\n\n**图 8–5.** *你可以向你的项目添加多个单元测试包。*\n\n一旦你创建了测试目标，就可以开始编写测试了。在开始之前，让我们先看看新的测试目标的内容。如果你是作为新项目的一部分创建的测试目标，那么该目标的名称将与你的项目名称相同，并附加“Tests”一词。如果你是作为现有项目的一部分创建的目标，那么它将使用你选择的任何名称。遵循命名约定很重要，因此将测试目标命名为你的项目名称后附加“Tests”一词是明智的做法。\n\
    \n在项目导航器中，每个目标都会有一个组。在测试目标的组内，你会找到一个与你的目标同名的类，以及一个支持文件组，类似于你在任何其他目标组中找到的内容。\n\n\
    在 `SimpleCalculatorTests.m` 中，你应该看到以下内容：\n\n```\n@implementation SimpleCalculatorTests\n\
    \n- (void)setUp\n{\n    [super setUp];\n\n    // 在此处编写设置代码。\n}\n\n- (void)tearDown\n\
    {\n    // 在此处编写拆卸代码。\n\n    [super tearDown];\n}\n\n- (void)testExample\n{\n \
    \   STFail(@\"在 SimpleCalculatorTests 中尚未实现单元测试\");\n}\n\n@end\n```\n\n我们稍后会详细说明这些内容。目前，只需理解这设置了一个单一的、失败的测试就足够了。\n\
    \n现在你已经有了一个测试目标，你需要运行测试。在此之前，你需要熟悉测试配置并确保测试处于活动状态。Xcode 让控制哪些测试正在运行变得非常简单，并且还提供了修改部分测试环境变量的能力。\n\
    \n#### 设置测试\n\n要运行测试，你需要确保你的方案已为测试设置好。从菜单栏选择 `Product` ![images](img/U001.jpg)\
    \ `Edit Scheme` 以打开方案编辑器（图 8–6）。\n\n![images](img/0806.jpg)\n\n**图 8–6.** *如果你没有在方案中包含测试目标，“测试”操作将被禁用。*\n\
    \n从侧边栏中选择“测试”。如果你在项目设置期间选择了包含单元测试目标，你应该会在“信息”窗格中看到列出的测试目标。如果你是手动创建单元测试目标的，则需要手动将其添加到方案中。点击\
    \ + 按钮以调出项目中所有单元测试目标的列表。选择你的目标并将其添加到方案的“测试”操作中。\n\n![images](img/0807.jpg)\n\n\
    **图 8–7.** *工作空间中所有项目的所有单元测试目标都将在此处可用。*\n\n一旦你的目标被包含在方案中，你可以进行一些更高级的配置。测试目标列表上方的下拉菜单允许你选择用于测试的构建配置和调试器。这些设置适用于当前方案中的所有测试目标。目标列表允许你修改各个目标的配置。如果你展开一个目标，你会看到该目标中所有\
    \ `SenTestCase` 子类的列表。在你的例子中，你会看到一个列表项，`SimpleCalculatorTests`。展开这些测试用例之一，将显示各个测试，并按方法名称列出（图\
    \ 8–8）。这些项目中的每一项在右侧都有一个对应的复选框，允许你打开或关闭它们。在 Xcode 4 之前，这需要在代码中通过配置 `SenTestSuite`\
    \ 对象来完成。\n\n此界面上另一个值得注意的是“测试位置”列，它允许你指定测试应运行的区域设置。这使你能够测试依赖于区域设置的行为，包括 `CoreLocation`、`NSDate`、`NSCalendar`\
    \ 等。\n\n![images](img/0808.jpg)\n\n**图 8–8.** *一旦你有了一个完整的测试套件，能够选择运行哪些测试就会派上用场。*\n\
    \n“参数”窗格（图 8–9）允许你修改操作的环境参数。默认情况下，“使用运行操作的选项”复选框是勾选状态，这在大多数情况下是首选。就像在任何测试场景中一样，保持测试环境与运行环境尽可能相似非常重要。\n\
    \n![images](img/0809.jpg)\n\n**图 8–9.** *修改测试操作的参数会导致与运行环境产生差异。*\n"
- fmt: "##### Meet `OCUnit`\n\n`OCUnit` is an Objective-C unit test framework that\
    \ is bundled with Xcode and is used to write unit tests. `OCUnit` has been a part\
    \ of Xcode since 2005; it's a simple yet elegant interface to unit tests, similar\
    \ to Smalltalk's `SUnit` and Java's `JUnit`. It was previously developed as an\
    \ open source project by `Sente SA` under the name `SenTestingKit`, and as such,\
    \ many of the classes and macros included in the framework still maintain prefixes\
    \ like “`ST`” and “`Sen`,” and the framework linked to in your project is still\
    \ labeled “`SenTestingKit.framework`.”\n\nTo enable testing, you simply need a\
    \ subclass of `SenTestCase` in your testing target. `SenTestCase` is the base\
    \ class for test cases (also known as fixtures) and is the only class in `SenTestingKit`\
    \ that you are concerned with.\n\n`SenTestCase` follows the Convention over Configuration\
    \ philosophy. Within a `SenTestCase` subclass, you provide tests in the form of\
    \ methods whose selector begins with the word “test.” At runtime, `OCUnit` automatically\
    \ detects these subclasses, instantiates them, and calls each of the test methods\
    \ in succession. Each test invocation is preceded by a call to the test class's\
    \ `-setUp` method and is followed by the `-tearDown` method. Overriding these\
    \ methods allows you to set up and configure the environment that the tests require.\
    \ It's important to note that the order in which the tests are run is undefined,\
    \ and there is no means to know which test is about to be run from within `-setUp`\
    \ or `-tearDown`.\n\nA test wouldn't be a test without the ability to fail. In\
    \ a `SenTestCase`, raising an exception creates failure. If a test finishes executing\
    \ without any exceptions being raised or any other crashing conditions, it is\
    \ a success. Obviously there are things you want to test that are unrelated to\
    \ crashing. That is where assertions (also known as asserts) come in. If you're\
    \ not familiar with assertions, you will be once you finish writing your first\
    \ batch of test cases. An assertion is a function (typically defined as a macro)\
    \ that evaluates a condition and raises an exception if the condition proves false.\
    \ Typically, assert functions also provide a means to express details about the\
    \ exception by logging or producing an error message. The most common type of\
    \ assertion in Cocoa is the `NSAssert`, which simply evaluates a Boolean expression\
    \ and throws if it is false.\n\n```\nNSAssert((1+1 == 2), @”This assert will pass,\
    \ and this message will never be seen”);\n```\n\nThe `SenTestingKit` framework\
    \ provides many more types of asserts, which are useful for a variety of things.\
    \ There is even an assertion that tests to ensure a piece of code *will* raise\
    \ an exception (which, as you will learn, is much more useful than it sounds).\
    \ `SenTest` asserts start with the prefix `ST`. They are technically macro functions.\
    \ The benefit of this is that you can see most of their implementation in `SenTestCase_Macros.h`.\
    \ Below are a few important assertions that you should definitely get comfortable\
    \ using, along with a word on how to use them. The complete list can be found\
    \ in `SenTestCase.h`.\n\n- `STAssertNotNil(a1, description, …)` raises an exception\
    \ if object `a1` is nil. Useful when testing a method that should return an object.\
    \ Also see `STAssertNil()`, which does the exact opposite.\n- `STAssertTrue(expression,\
    \ description, …)` raises an exception if the expression evaluates to false. This\
    \ is essentially the same as using `NSAssert()`, except that it reports as a test\
    \ failure, where `NSAssert()` simply halts execution. This function's compliment\
    \ is `STAssertFalse()`.\n- `STAssertEquals(a1, a2, description, …)` raises if\
    \ values `a1` and `a2` are not equal. It's important to note that if two different\
    \ objects are passed with the same values (e.g. two different `NSStrings` with\
    \ the value “Hello World”), these will not evaluate as equal, as objects are unique.\
    \ If two pointers to the same object are passed in, this will evaluate as true.\
    \ To test the equality of different objects, use `STAssertEqualObjects()`.\n-\
    \ `STAssertNoThrow(expression, description, …)` raises if an expression (usually\
    \ a method call on an object) throws an exception. This function, along with its\
    \ counterpart `STAssertThrows()`, are possibly the most useful assertions available\
    \ when building any sort of framework for consumption by third parties. For example,\
    \ if a method in your framework requires a non-nil parameter, you might check\
    \ its value using `NSAssert()`. Two great unit tests would then be to use `STAssertNoThrow()`\
    \ with a valid call (with a non-nil parameter) to the method and to use `STAssertThrows()`\
    \ with an invalid call (passing a nil parameter). It's important to understand\
    \ `STAssertThrows()`, as it may feel backwards at first. Your test passes if the\
    \ method fails!\n- `STFail(description, …)` is not an assertion. It is a catchall\
    \ function that fails a test, no matter what. It can be used when none of the\
    \ assertion functions work. If, for example, you were writing a test to check\
    \ the values of error codes returned by a gracefully failing method, you could\
    \ use a switch-case block to execute appropriate tests based on the enumerated\
    \ error codes. In the default case of this block, you would probably want to call\
    \ `STFail()` to ensure un-recognized error codes weren't getting introduced into\
    \ your object.\n\n##### Buggy Code\n\nTo explain exactly how unit testing works,\
    \ let's start off with a simple example. Below is the `SimpleCalculator` class.\
    \ It has two methods. One simply adds two integers and returns the result, and\
    \ the other subtracts the two integers and returns the remainder. Or at least,\
    \ that is what is supposed to happen. For the sake of demonstration, I've introduced\
    \ a relatively obvious bug. Rather than subtracting the two parameters in the\
    \ second method, I'm adding them. It appears that someone has been doing some\
    \ copy-and-paste programming.\n\nHere is the header for the `SimpleCalculator`\
    \ class:\n\n```\n#import <Foundation/Foundation.h>\n\n@interface SimpleCalculator\
    \ : NSObject\n\n- (int)resultOfAdding:(int)foo to:(int)bar;\n- (int)resultOfSubtracting:(int)foo\
    \ from:(int)bar;\n\n@end\n```\n\nAnd here is the implementation:\n\n```\n#import\
    \ “SimpleCalculator.h”\n\n@implementation SimpleCalculator\n\n- (int)resultOfAdding:(int)foo\
    \ to:(int)bar {\n        return (foo + bar);\n}\n\n- (int)resultOfSubtracting:(int)foo\
    \ by:(int)bar {\n        return (foo + bar);\n}\n\n@end\n```"
  raw: '##### Meet OCUnit


    OCUnit is an Objective-C unit test framework that is bundled with Xcode and is
    used to write unit tests. OCUnit has been a part of Xcode since 2005; it''s a
    simple yet elegant interface to unit tests, similar to Smalltalk''s SUnit and
    Java''s JUnit. It was previously developed as an open source project by Sente
    SA under the name SenTestingKit, and as such, many of the classes and macros included
    in the framework still maintain prefixes like “ST” and “Sen,” and the framework
    linked to in your project is still labeled “`SenTestingKit.framework.`”


    To enable testing, you simply need a subclass of `SenTestCase` in your testing
    target. `SenTestCase` is the base class for test cases (also known as fixtures)
    and is the only class in SenTestingKit that you are concerned with.


    `SenTestCase` follows the Convention over Configuration philosophy. Within a `SenTestCase`
    subclass, you provide tests in the form of methods whose selector begins with
    the word “test.” At runtime, OCUnit automatically detects these subclasses, instantiates
    them, and calls each of the test methods in succession. Each test invocation is
    preceded by a call to the test class''s `-setUp` method and is followed by the
    `-tearDown` method. Overriding these methods allows you to set up and configure
    the environment that the tests require. It''s important to note that the order
    in which the tests are run is undefined, and there is no means to know which test
    is about to be run from within -`setUp` or -`tearDown`.


    A test wouldn''t be a test without the ability to fail. In a `SenTestCase`, raising
    an exception creates failure. If a test finishes executing without any exceptions
    being raised or any other crashing conditions, it is a success. Obviously there
    are things you want to test that are unrelated to crashing. That is where assertions
    (also known as asserts) come in. If you''re not familiar with assertions, you
    will be once you finish writing your first batch of test cases. An assertion is
    a function (typically defined as a macro) that evaluates a condition and raises
    an exception if the condition proves false. Typically, assert functions also provide
    a means to express details about the exception by logging or producing an error
    message. The most common type of assertion in Cocoa is the `NSAssert`, which simply
    evaluates a Boolean expression and throws if it is false.


    `NSAssert((1+1 == 2), @”This assert will pass, and this message will never be
    seen”);`


    The SenTestingKit framework provides many more types of asserts, which are useful
    for a variety of things. There is even an assertion that tests to ensure a piece
    of code *will* raise an exception (which, as you will learn, is much more useful
    than it sounds). SenTest asserts start with the prefix ST. They are technically
    macro functions. The benefit of this is that you can see most of their implementation
    in `SenTestCase_Macros.h`. Below are a few important assertions that you should
    definitely get comfortable using, along with a word on how to use them. The complete
    list can be found in `SenTestCase.h`.


    *   `STAssertNotNil(a1, description, …)` raises an exception if object a1 is nil.
    Useful when testing a method that should return an object. Also see `STAssertNil()`,
    which does the exact opposite.

    *   `STAssertTrue(expression, description, …)` raises an exception if the expression
    evaluates to false. This is essentially the same as using `NSAssert()`, except
    that it reports as a test failure, where `NSAssert()` simply halts execution.
    This function''s compliment is `STAssertFalse()`.

    *   `STAssertEquals(a1, a2, description, …)` raises if values a1 and a2 are not
    equal. It''s important to note that if two different objects are passed with the
    same values (e.g. two different `NSStrings` with the value “Hello World”), these
    will not evaluate as equal, as objects are unique. If two pointers to the same
    object are passed in, this will evaluate as true. To test the equality of different
    objects, use `STAssertEqualObjects()`.

    *   `STAssertNoThrow(expression, description, …)` raises if an expression (usually
    a method call on an object) throws an exception. This function, along with its
    counterpart `STAssertThrows()`, are possibly the most useful assertions available
    when building any sort of framework for consumption by third parties. For example,
    if a method in your framework requires a non-nil parameter, you might check its
    value using `NSAssert()`. Two great unit tests would then be to use `STAssertNoThrow()`
    with a valid call (with a non-nil parameter) to the method and to use `STAssertThrows()`
    with an invalid call (passing a nil parameter). It''s important to understand
    `STAssertThrows()`, as it may feel backwards at first. Your test passes if the
    method fails!

    *   `STFail(description, …)` is not an assertion. It is a catchall function that
    fails a test, no matter what. It can be used when none of the assertion functions
    work. If, for example, you were writing a test to check the values of error codes
    returned by a gracefully failing method, you could use a switch-case block to
    execute appropriate tests based on the enumerated error codes. In the default
    case of this block, you would probably want to call `STFail()` to ensure un-recognized
    error codes weren''t getting introduced into your object.


    ##### Buggy Code


    To explain exactly how unit testing works, let''s start off with a simple example.
    Below is the `SimpleCalculator` class. It has two methods. One simply adds two
    integers and returns the result, and the other subtracts the two integers and
    returns the remainder. Or at least, that is what is supposed to happen. For the
    sake of demonstration, I''ve introduced a relatively obvious bug. Rather than
    subtracting the two parameters in the second method, I''m adding them. It appears
    that someone has been doing some copy-and-paste programming.


    Here is the header for the `SimpleCalculator` class:


    `#import <Foundation/Foundation.h>`


    `@interface SimpleCalculator : NSObject`


    `- (int)resultOfAdding:(int)foo to:(int)bar;`

    `- (int)resultOfSubtracting:(int)foo from:(int)bar;`


    `@end`


    And here is the implementation:


    `#import “SimpleCalculator.h”`


    `@implementation SimpleCalculator`


    `- (int)resultOfAdding:(int)foo to:(int)bar {`

    `        return (foo + bar);`

    `}`


    `- (int)resultOfSubtracting:(int)foo by:(int)bar {`

    `        return (foo + bar);`

    `}`


    `@end`'
  trans: "\n##### 认识 `OCUnit`\n\n`OCUnit` 是一款与 Xcode 绑定的 Objective-C 单元测试框架，用于编写单元测试。自\
    \ 2005 年起，`OCUnit` 就成为 Xcode 的一部分；它提供了一个简洁优雅的单元测试接口，类似于 Smalltalk 的 `SUnit` 和\
    \ Java 的 `JUnit`。该框架最初由 `Sente SA` 作为开源项目以 `SenTestingKit` 为名开发，因此框架中的许多类和宏仍保留着如“`ST`”和“`Sen`”这样的前缀，并且项目中链接的框架依然标记为“`SenTestingKit.framework`”。\n\
    \n要启用测试，你只需在测试目标中创建一个 `SenTestCase` 的子类。`SenTestCase` 是测试用例（也称为测试夹具）的基类，也是 `SenTestingKit`\
    \ 中你需要关注的唯一类。\n\n`SenTestCase` 遵循“约定优于配置”的理念。在 `SenTestCase` 的子类中，你以方法的形式提供测试，这些方法的选择器必须以“test”开头。运行时，`OCUnit`\
    \ 会自动检测这些子类，实例化它们，并按顺序调用每个测试方法。每次测试调用前都会先调用测试类的 `-setUp` 方法，之后调用 `-tearDown` 方法。重写这些方法可以让你设置和配置测试所需的环境。需要注意的是，测试执行的顺序是未定义的，并且无法在\
    \ `-setUp` 或 `-tearDown` 中得知即将运行哪个测试。\n\n一个不能失败的测试就算不上测试。在 `SenTestCase` 中，抛出异常即表示测试失败。如果测试在执行结束时没有抛出任何异常或其他崩溃情况，则视为成功。显然，你想测试的内容并非都与崩溃相关。这时就需要断言（也称为\
    \ assert）登场了。如果你还不熟悉断言，写完第一批测试用例后你就会熟悉了。断言是一个函数（通常定义为宏），它评估一个条件，并在条件为假时抛出异常。通常，断言函数还提供通过日志或生成错误信息来表达异常细节的手段。Cocoa\
    \ 中最常见的断言类型是 `NSAssert`，它简单地评估一个布尔表达式，若为假则抛出异常。\n\n```\nNSAssert((1+1 == 2), @”这个断言会通过，这条消息永远不会被看到”);\n\
    ```\n\n`SenTestingKit` 框架提供了更多类型的断言，它们适用于各种场景。甚至有一种断言用于测试某段代码*确实*会抛出异常（正如你会了解到的，这比听起来有用得多）。`SenTest`\
    \ 断言以 `ST` 为前缀。从技术角度讲，它们是宏函数。这样做的好处是，你可以在 `SenTestCase_Macros.h` 中看到它们的大部分实现。下面列出了一些你应该熟练掌握的重要断言，以及它们的使用说明。完整列表可以在\
    \ `SenTestCase.h` 中找到。\n\n- `STAssertNotNil(a1, description, …)` 如果对象 `a1` 为 nil，则抛出异常。在测试应返回对象的方法时非常有用。另见\
    \ `STAssertNil()`，其作用完全相反。\n- `STAssertTrue(expression, description, …)` 如果表达式计算结果为\
    \ false，则抛出异常。这本质上与使用 `NSAssert()` 相同，区别在于它会报告为测试失败，而 `NSAssert()` 只会停止执行。该函数的互补函数是\
    \ `STAssertFalse()`。\n- `STAssertEquals(a1, a2, description, …)` 如果值 `a1` 和 `a2`\
    \ 不相等，则抛出异常。需要注意的是，如果传入两个值相同但不同的对象（例如两个值都为“Hello World”的不同 `NSString`），它们不会被判定为相等，因为对象是唯一的。如果传入指向同一对象的两个指针，则判定为真。要测试不同对象的相等性，请使用\
    \ `STAssertEqualObjects()`。\n- `STAssertNoThrow(expression, description, …)` 如果表达式（通常是对对象的方法调用）抛出异常，则会触发失败。此函数及其对应函数\
    \ `STAssertThrows()` 是构建任何供第三方使用的框架时可能最有用的断言。例如，如果你的框架中某个方法需要非 nil 参数，你可以使用 `NSAssert()`\
    \ 来检查其值。那么两个极佳的单元测试就是：使用 `STAssertNoThrow()` 进行有效调用（传入非 nil 参数），以及使用 `STAssertThrows()`\
    \ 进行无效调用（传入 nil 参数）。理解 `STAssertThrows()` 很重要，因为它一开始可能会让你觉得反直觉。当方法失败时，你的测试反而通过了！\n\
    - `STFail(description, …)` 不是断言。它是一个全能函数，无论什么情况都会导致测试失败。当所有断言函数都不适用时可以使用它。例如，如果你在编写一个测试来检查优雅失败方法返回的错误码值，你可以使用\
    \ switch-case 块根据枚举的错误码执行相应的测试。在该块的 default 情况下，你可能需要调用 `STFail()` 来确保未识别的错误码不会被引入你的对象。\n\
    \n##### 有 Bug 的代码\n\n为了准确解释单元测试的工作原理，让我们从一个简单的例子开始。下面是 `SimpleCalculator` 类。它有两个方法。一个方法将两个整数相加并返回结果，另一个方法将两个整数相减并返回差值。至少，这应该是它们的功能。为了演示目的，我引入了一个相对明显的错误。在第二个方法中，我不是对两个参数进行相减，而是将它们相加。看来有人一直在复制粘贴代码。\n\
    \n以下是 `SimpleCalculator` 类的头文件：\n\n```\n#import <Foundation/Foundation.h>\n\n\
    @interface SimpleCalculator : NSObject\n\n- (int)resultOfAdding:(int)foo to:(int)bar;\n\
    - (int)resultOfSubtracting:(int)foo from:(int)bar;\n\n@end\n```\n\n以下是实现文件：\n\n\
    ```\n#import “SimpleCalculator.h”\n\n@implementation SimpleCalculator\n\n- (int)resultOfAdding:(int)foo\
    \ to:(int)bar {\n        return (foo + bar);\n}\n\n- (int)resultOfSubtracting:(int)foo\
    \ by:(int)bar {\n        return (foo + bar);\n}\n\n@end\n```\n"
- fmt: "## Writing the Tests\n\nBefore writing tests, it's important to consider what\
    \ actually needs to be tested. For this overly simple class, it would seem that\
    \ I would have some fairly simple tests, but that's not necessarily the case.\
    \ I should probably test each of these methods, but with what data? Let's take\
    \ a look at some sample tests.\n\n**CAUTION:** It's important to remember that\
    \ test case targets *are* targets, and any required sources must be included in\
    \ the target in order to use them. As such, you must remember to include implementation\
    \ files (`SimpleCalculator.m`, for example) in the Compile Sources phase of your\
    \ test target.\n\nHere's the interface for my test case class. It's extremely\
    \ simple, with only one local variable, which will hold an instance of the calculator:\n\
    \n```\n#import <SenTestingKit/SenTestingKit.h>\n#import “SimpleCalculator.h”\n\
    \n@interface SimpleCalculatorTests : SenTestCase {\n        SimpleCalculator *myCalculator;\n\
    }\n\n@end\n```\n\nThe implementation is also simple. In `-setUp`, I create an\
    \ instance of the `SimpleCalculator` class. In `-tearDown`, I release that instance.\
    \ There are also two test methods, `-testAddition` and `-testSubtraction`, which\
    \ test their relative methods of `SimpleCalculator`. Each of these methods uses\
    \ the `STAssertEquals()` macro to test their results against the expected outcome.\n\
    \n**CAUTION:** It's incredibly important that you manage memory correctly when\
    \ writing tests. Introducing memory leaks in your unit tests can create bugs that\
    \ are a real headache to diagnose.\n\n```\n#import “SimpleCalculatorTests.h”\n\
    \n@implementation SimpleCalculatorTests\n\n- (void)setUp {\n        myCalculator\
    \ = [[SimpleCalculator alloc] init];\n}\n\n- (void)tearDown {\n        [myCalculator\
    \ release];\n}\n\n- (void)testAddition {\n        int result = [myCalculator resultOfAdding:2\
    \ to:3];\n        STAssertEquals(result, 5, @\"Addition of 2 and 3 failed. Expected\
    \ 5, received\n%i\", result);\n}\n\n- (void)testSubtraction {\n        int result\
    \ = [myCalculator resultOfSubtracting:2 from:3];\n        STAssertEquals(result,\
    \ 1, @\"Subtraction of 3 from 2 failed. Expected 1, received\n%i\", result);\n\
    }\n\n@end\n```\n\n**TIP:** `STAssert` functions, just like `NSAssert`, take test\
    \ condition as the first argument and subsequent arguments make up a formatted\
    \ string, similar to using `NSLog` or `--stringWithFormat`.\n\n## Running the\
    \ Tests\n\nNow that you've got your scheme in order, you can run the test. This\
    \ part's easy. First, it's important to note that the tests will be executed on\
    \ the device and using the SDK version selected in the scheme drop-down. Once\
    \ you've got your device and SDK selected, you're ready to go. From the menu bar,\
    \ simply select Product > Test.\n\nWhen you run a test, two things will start\
    \ to happen in Xcode. First, the simulator or device you have selected will launch\
    \ and display a black screen. That's all it will display throughout the testing\
    \ phase. Second, the debug pane will start displaying the output of the tests\
    \ ([Figure 8–10](#Chapter08.html#fig_8_10)).\n\n![images](images/0810.jpg)\n\n\
    **Figure 8–10.** *Success by failure!*\n\nThat's a lot of data. Let's break it\
    \ down a little.\n\n```\nTest Suite 'SimpleCalculatorTests' started at 2011-09-18\
    \ 02:54:40 +0000\nTest Case '-[SimpleCalculatorTests testAddition]' started.\n\
    Test Case '-[SimpleCalculatorTests testAddition]' passed (0.000 seconds).\n```\n\
    \nThe test suite has started, and the first test has run and passed. It also only\
    \ took 0 seconds.\n\n```\nTest Case '-[SimpleCalculatorTests testSubtraction]'\
    \ started.\n/Users/jbradforddillon/Projects/Scratch/SimpleCalculator/SimpleCalculatorTests/SimpleCal\n\
    culatorTests.m:28: error: -[SimpleCalculatorTests testSubtraction] : '5' should\
    \ be equal\nto '1': Subtraction of 3 from 2 failed. Expected 1, received 5\nTest\
    \ Case '-[SimpleCalculatorTests testSubtraction]' failed (0.000 seconds).\n```\n\
    \nThe second test wasn't quite as lucky as the first. It failed (as you expected),\
    \ and the message you included in your assertion has been included.\n\n```\nTest\
    \ Suite 'SimpleCalculatorTests' finished at 2011-09-18 02:54:40 +0000.\nExecuted\
    \ 2 tests, with 1 failure (0 unexpected) in 0.000 (0.000) seconds\nTest Suite\
    \ '/Users/jbradforddillon/Library/Developer/Xcode/DerivedData/SimpleCalculator-bwlxzmbadtykfsduvqohpzvqekjc/Build/Products/Debug-iphonesimulator/SimpleCalculatorTests.octest(Tests)'\
    \ finished at 2011-09-18 02:54:40 +0000.\nExecuted 2 tests, with 1 failure (0\
    \ unexpected) in 0.000 (0.025) seconds\nProgram ended with exit code: 1\n```\n\
    \nLastly, you get a summary of the test results. Your SimpleCalculator went 1\
    \ for 1, in 0.073 seconds flat. Thankfully, Xcode simplifies this output in the\
    \ Issue Navigator, showing the failed tests as errors with the description of\
    \ the test failure intact ([Figure 8–11](#Chapter08.html#fig_8_11)).\n\n![images](images/0811.jpg)\n\
    \n**Figure 8–11.** *All test failures will be displayed in the Issue Navigator,\
    \ along with the info that was logged by the assertion.*"
  raw: '##### Writing the Tests


    Before writing tests, it''s important to consider what actually needs to be tested.
    For this overly simple class, it would seem that I would have some fairly simple
    tests, but that''s not necessarily the case. I should probably test each of these
    methods, but with what data? Let''s take a look at some sample tests.


    **CAUTION:** It''s important to remember that test case targets *are* targets,
    and any required sources must be included in the target in order to use them.
    As such, you must remember to include implementation files (`SimpleCalculator.m`,
    for example) in the Compile Sources phase of your test target.


    Here''s the interface for my test case class. It''s extremely simple, with only
    one local variable, which will hold an instance of the calculator:


    `#import <SenTestingKit/SenTestingKit.h>`

    `#import “SimpleCalculator.h”`


    `@interface SimpleCalculatorTests : SenTestCase {`

    `        SimpleCalculator *myCalculator;`

    `}`


    `@end`


    The implementation is also simple. In `-setUp`, I create an instance of the `SimpleCalculator`
    class. In -`tearDown`, I release that instance. There are also two test methods,
    -`testAddition` and -`testSubtraction`, which test their relative methods of `SimpleCalculator`.
    Each of these methods uses the `STAssertEquals()` macro to test their results
    against the expected outcome.


    **CAUTION:** It''s incredibly important that you manage memory correctly when
    writing tests. Introducing memory leaks in your unit tests can create bugs that
    are a real headache to diagnose.


    `#import “SimpleCalculatorTests.h”`


    `@implementation SimpleCalculatorTests`


    `- (void)setUp {`

    `        myCalculator = [[SimpleCalculator alloc] init];`

    `}`


    `- (void)tearDown {`

    `        [myCalculator release];`

    `}`


    `- (void)testAddition {`

    `        int result = [myCalculator resultOfAdding:2 to:3];`

    `        STAssertEquals(result, 5, @"Addition of 2 and 3 failed. Expected 5, received`

    `%i", result);`

    `}`


    `- (void)testSubtraction {`

    `        int result = [myCalculator resultOfSubtracting:2 from:3];`

    `        STAssertEquals(result, 1, @"Subtraction of 3 from 2 failed. Expected
    1, received`

    `%i", result);`

    `}`


    `@end`


    **TIP:** `STAssert` functions, just like `NSAssert`, take test condition as the
    first argument and subsequent arguments make up a formatted string, similar to
    using `NSLog` or `--stringWithFormat.`


    ##### Running the Tests


    Now that you''ve got your scheme in order, you can run the test. This part''s
    easy. First, it''s important to note that the tests will be executed on the device
    and using the SDK version selected in the scheme drop-down. Once you''ve got your
    device and SDK selected, you''re ready to go. From the menu bar, simply select
    Product ![images](images/U001.jpg) Test.


    When you run a test, two things will start to happen in Xcode. First, the simulator
    or device you have selected will launch and display a black screen. That''s all
    it will display throughout the testing phase. Second, the debug pane will start
    displaying the output of the tests ([Figure 8–10](#Chapter08.html#fig_8_10)).


    ![images](images/0810.jpg)


    **Figure 8–10.** *Success by failure!*


    That''s a lot of data. Let''s break it down a little.


    `Test Suite ''SimpleCalculatorTests'' started at 2011-09-18 02:54:40 +0000`

    `Test Case ''-[SimpleCalculatorTests testAddition]'' started.`

    `Test Case ''-[SimpleCalculatorTests testAddition]'' passed (0.000 seconds).`


    The test suite has started, and the first test has run and passed. It also only
    took 0 seconds.


    `Test Case ''-[SimpleCalculatorTests testSubtraction]'' started.`

    `/Users/jbradforddillon/Projects/Scratch/SimpleCalculator/SimpleCalculatorTests/SimpleCal`

    `culatorTests.m:28: error: -[SimpleCalculatorTests testSubtraction] : ''5'' should
    be equal`

    `to ''1'': Subtraction of 3 from 2 failed. Expected 1, received 5`

    `Test Case ''-[SimpleCalculatorTests testSubtraction]'' failed (0.000 seconds).`


    The second test wasn''t quite as lucky as the first. It failed (as you expected),
    and the message you included in your assertion has been included.


    `Test Suite ''SimpleCalculatorTests'' finished at 2011-09-18 02:54:40 +0000.`

    `Executed 2 tests, with 1 failure (0 unexpected) in 0.000 (0.000) seconds`

    `Test Suite ''/Users/jbradforddillon/Library/Developer/Xcode/DerivedData/SimpleCalculator-bwlxzmbadtykfsduvqohpzvqekjc/Build/Products/Debug-iphonesimulator/SimpleCalculatorTests.octest(Tests)''
    finished at 2011-09-18 02:54:40 +0000.`

    `Executed 2 tests, with 1 failure (0 unexpected) in 0.000 (0.025) seconds`

    `Program ended with exit code: 1`


    Lastly, you get a summary of the test results. Your SimpleCalculator went 1 for
    1, in 0.073 seconds flat. Thankfully, Xcode simplifies this output in the Issue
    Navigator, showing the failed tests as errors with the description of the test
    failure intact ([Figure 8–11](#Chapter08.html#fig_8_11)).


    ![images](images/0811.jpg)


    **Figure 8–11.** *All test failures will be displayed in the Issue Navigator,
    along with the info that was logged by the assertion.*'
  trans: "\n## 编写测试\n\n在编写测试之前，重要的是要考虑实际需要测试什么。对于这个过于简单的类，似乎只需要一些非常简单的测试，但事实未必如此。我可能需要测试每个方法，但应该用哪些数据呢？让我们看几个示例测试。\n\
    \n**注意：** 务必牢记，测试用例目标本身也是目标，任何必需的源文件都必须包含在该目标中才能使用。因此，你必须记得在测试目标的“编译源文件”（Compile\
    \ Sources）阶段中包含实现文件（例如 `SimpleCalculator.m`）。\n\n以下是我的测试用例类的接口。它非常简单，只有一个局部变量，用于保存计算器实例：\n\
    \n```\n#import <SenTestingKit/SenTestingKit.h>\n#import “SimpleCalculator.h”\n\
    \n@interface SimpleCalculatorTests : SenTestCase {\n        SimpleCalculator *myCalculator;\n\
    }\n\n@end\n```\n\n其实现也同样简单。在 `-setUp` 中，我创建了一个 `SimpleCalculator` 类的实例。在 `-tearDown`\
    \ 中，我释放该实例。此外还有两个测试方法：`-testAddition` 和 `-testSubtraction`，分别测试 `SimpleCalculator`\
    \ 的相应方法。每个方法都使用 `STAssertEquals()` 宏来将测试结果与期望值进行比较。\n\n**注意：** 编写测试时，正确管理内存至关重要。在单元测试中引入内存泄漏可能会产生极难诊断的\
    \ bug。\n\n```\n#import “SimpleCalculatorTests.h”\n\n@implementation SimpleCalculatorTests\n\
    \n- (void)setUp {\n        myCalculator = [[SimpleCalculator alloc] init];\n}\n\
    \n- (void)tearDown {\n        [myCalculator release];\n}\n\n- (void)testAddition\
    \ {\n        int result = [myCalculator resultOfAdding:2 to:3];\n        STAssertEquals(result,\
    \ 5, @\"Addition of 2 and 3 failed. Expected 5, received\n%i\", result);\n}\n\n\
    - (void)testSubtraction {\n        int result = [myCalculator resultOfSubtracting:2\
    \ from:3];\n        STAssertEquals(result, 1, @\"Subtraction of 3 from 2 failed.\
    \ Expected 1, received\n%i\", result);\n}\n\n@end\n```\n\n**提示：** `STAssert` 函数与\
    \ `NSAssert` 类似，第一个参数接收测试条件，后续参数构成格式化字符串，用法类似于 `NSLog` 或 `--stringWithFormat`。\n\
    \n## 运行测试\n\n现在你已经把方案（scheme）配置好了，可以开始运行测试了。这部分很简单。首先，需要注意测试将在设备上执行，并使用方案下拉菜单中选定的\
    \ SDK 版本。一旦选定设备和 SDK，准备工作就完成了。在菜单栏中，只需选择“Product > Test”。\n\n运行测试时，Xcode 中会开始发生两件事。首先，你选定的模拟器或设备会启动并显示黑屏。在整个测试阶段，它只会显示黑屏。其次，调试面板会开始显示测试的输出（图\
    \ 8–10）。\n\n![images](img/0810.jpg)\n\n**图 8–10.** *失败也是一种成功！*\n\n这里数据很多。我们来稍微分析一下。\n\
    \n```\nTest Suite 'SimpleCalculatorTests' started at 2011-09-18 02:54:40 +0000\n\
    Test Case '-[SimpleCalculatorTests testAddition]' started.\nTest Case '-[SimpleCalculatorTests\
    \ testAddition]' passed (0.000 seconds).\n```\n\n测试套件已启动，第一个测试已运行并通过。它只用了 0 秒。\n\
    \n```\nTest Case '-[SimpleCalculatorTests testSubtraction]' started.\n/Users/jbradforddillon/Projects/Scratch/SimpleCalculator/SimpleCalculatorTests/SimpleCal\n\
    culatorTests.m:28: error: -[SimpleCalculatorTests testSubtraction] : '5' should\
    \ be equal\nto '1': Subtraction of 3 from 2 failed. Expected 1, received 5\nTest\
    \ Case '-[SimpleCalculatorTests testSubtraction]' failed (0.000 seconds).\n```\n\
    \n第二个测试可没有第一个那么幸运。它失败了（正如你所料），并且你在断言中包含的消息也被打印了出来。\n\n```\nTest Suite 'SimpleCalculatorTests'\
    \ finished at 2011-09-18 02:54:40 +0000.\nExecuted 2 tests, with 1 failure (0\
    \ unexpected) in 0.000 (0.000) seconds\nTest Suite '/Users/jbradforddillon/Library/Developer/Xcode/DerivedData/SimpleCalculator-bwlxzmbadtykfsduvqohpzvqekjc/Build/Products/Debug-iphonesimulator/SimpleCalculatorTests.octest(Tests)'\
    \ finished at 2011-09-18 02:54:40 +0000.\nExecuted 2 tests, with 1 failure (0\
    \ unexpected) in 0.000 (0.025) seconds\nProgram ended with exit code: 1\n```\n\
    \n最后，你会看到测试结果的摘要。你的 SimpleCalculator 在 0.073 秒内完成了 1 对 1 的测试。好在 Xcode 会在“问题导航器”（Issue\
    \ Navigator）中简化这些输出，将失败的测试显示为错误，并保留测试失败的描述（图 8–11）。\n\n![images](img/0811.jpg)\n\
    \n**图 8–11.** *所有测试失败信息都会显示在“问题导航器”中，同时包含断言记录的详细信息。*\n"
- fmt: "#### Refining the Tests\n\nThese tests work as expected. The addition test\
    \ passes, and the subtraction test fails. The subtraction result would evaluate\
    \ to 5, rather than 1, and the `STAssertEquals()` function would throw an exception.\
    \ These tests successfully uncovered a bug in your code. But is that enough? Not\
    \ quite. It's important to remember that the goal isn't just to pass tests, but\
    \ to write good code. Unit tests aren't just obstacles to overcome; they should\
    \ help clarify your problem and shape your solution so that you can write code\
    \ effectively and efficiently.\n\nSo why are these tests insufficient? Here is\
    \ an example of one way you might “fix” the bug these tests have uncovered:\n\n\
    ```\n- (int)resultOfSubtracting:(int)foo by:(int)bar {\n    return 1;\n}\n```\n\
    \nBoom! With a single keystroke, your class now passes all the tests! Mission\
    \ accomplished! Ship it!\n\nWhat you've done here is missed the forest for the\
    \ trees—or the algorithm for the tests, if you will. You need a better test. You\
    \ need a test that doesn't allow for false positives. When you wrote the test,\
    \ you had a preconceived notion of how the code worked. Writing tests before you\
    \ start writing code gives you the advantage of foresight without the encumbrance\
    \ of a pre-existing algorithm or design. When you're in the middle of trying to\
    \ solve a problem, you're invested in your solution so you are much more likely\
    \ to “hack something together” to pass the test. Taking the time to pause and\
    \ really think about all that could go wrong with a component or piece of code\
    \ will help you write better tests, which will help you write better code.\n\n\
    So what can you do to improve your test? How can you make it impossible to sidestep\
    \ the test? Take a look at this:\n\n```\n- (void)testSubtraction {\n    int foo\
    \ = arc4random();\n    int bar = arc4random();\n    int dif = bar - foo;\n   \
    \ int result = [myCalculator resultOfSubtracting:foo from:bar];\n    STAssertEquals(result,\
    \ dif, @\"Subtraction failed.\");\n}\n```\n\nBy introducing randomization by way\
    \ of the `arc4random()` function, you've made it impossible to predict the desired\
    \ result. The only way to pass the test is to subtract foo from bar, no matter\
    \ what their values are.\n\nLet's take a look at how you would write a test before\
    \ writing code. You're going to add a method to the `calculator` class that will\
    \ return the quotient of two numbers. First, you'll add it to the interface of\
    \ your `SimpleCalculator` class.\n\n```\n- (int)resultOfDividing:(int)foo by:(int)bar;\n\
    ```\n\nNext, you can start on your tests. Since the method is similar, a good\
    \ starting point would be to follow the same form you have for your addition and\
    \ subtraction methods.\n\n```\n- (void)testDivision {\n    int foo = arc4random();\n\
    \    int bar = arc4random();\n    int quot = foo / bar;\n    int result = [myCalculator\
    \ resultOfDividing:foo by:bar];\n    STAssertEquals(result, quot, @\"Division\
    \ failed.\");\n}\n```\n\nThis test will definitely ensure the accuracy of your\
    \ math. The random values ensure that you can't predict or cloud the results of\
    \ this test. But does it test all possible problems you could face when writing\
    \ this code? What if bar were a zero? What would you like the intended result\
    \ to be?\n\nThese are the types of questions you should be asking while writing\
    \ tests. Not only do they help to ensure all of your bases are covered, but they\
    \ help to define the problems you're trying to solve, both implicit and explicit.\
    \ When the problems are well defined and you've written tests against them, the\
    \ solutions are simpler and easier to identify.\n\nLet's write a test case for\
    \ division by zero. For simplicity sake, let's say that this use case should throw\
    \ an exception using an assertion. You may be asking why you would do this when\
    \ division by zero already throws an exception. Throwing your own exception gives\
    \ you control over how the app crashes and allows you to provide more information\
    \ to the developer about what exactly they've done wrong. This will also give\
    \ you an opportunity to try out another `STAssert` macro.\n\nYou want your test\
    \ to pass only if attempting to divide by zero throws an exception. Here's how\
    \ you can use `STAssertThrows()` to detect a valid exception:\n\n```\n- (void)testDivisionByZero\
    \ {\n    int foo = arc4random();\n    int bar = 0;\n    STAssertThrows([myCalculator\
    \ resultOfDividing:foo by:bar],\n        @\"Divide by zero should have thrown\"\
    );\n}\n```\n\n`STAssertThrows()` detects whether or not an exception is thrown\
    \ by a given expression. If no exception is thrown, the condition proves false,\
    \ and `STAssertThrows()` will throw its own exception, failing the test. In order\
    \ to pass this test, your code must throw an exception when the divisor is zero.\n\
    \nNow that you have a great (not merely “good”) understanding of what your code\
    \ must do, you can write it.\n\n```\n- (int)resultOfDividing:(int)foo by:(int)bar\
    \ {\n    NSAssert((bar != 0), @\"Attempt to divide by zero.\n    You are likely\
    \ to be eaten by a grue.\");\n    return (foo / bar);\n}\n```\n\nIf you run your\
    \ tests now, they should all pass, and you should feel pretty confident that the\
    \ new feature is well thought out and well tested.\n\n### Putting It to Use with\
    \ Your App\n\nNow that you're comfortable with OCUnit and have a decent understanding\
    \ of how to write good tests, you should start applying your new skills to the\
    \ Super Checkout app. To start off, write a test suite for the project's JSON\
    \ parser, `SCJSONParser`."
  raw: '#### Refining the Tests


    These tests work as expected. The addition test passes, and the subtraction test
    fails. The subtraction result would evaluate to 5, rather than 1, and the `STAssertEquals()`
    function would throw an exception. These tests successfully uncovered a bug in
    your code. But is that enough? Not quite. It''s important to remember that the
    goal isn''t just to pass tests, but to write good code. Unit tests aren''t just
    obstacles to overcome; they should help clarify your problem and shape your solution
    so that you can write code effectively and efficiently.


    So why are these tests insufficient? Here is an example of one way you might “fix”
    the bug these tests have uncovered:


    `- (int)resultOfSubtracting:(int)foo by:(int)bar {`

    `        return 1;`

    `}`


    Boom! With a single keystroke, your class now passes all the tests! Mission accomplished!
    Ship it!


    What you''ve done here is missed the forest for the trees—or the algorithm for
    the tests, if you will. You need a better test. You need a test that doesn''t
    allow for false positives. When you wrote the test, you had a preconceived notion
    of how the code worked. Writing tests before you start writing code gives you
    the advantage of foresight without the encumbrance of a pre-existing algorithm
    or design. When you''re in the middle of trying to solve a problem, you''re invested
    in your solution so you are much more likely to “hack something together” to pass
    the test. Taking the time to pause and really think about all that could go wrong
    with a component or piece of code will help you write better tests, which will
    help you write better code.


    So what can you do to improve your test? How can you make it impossible to sidestep
    the test? Take a look at this:


    `- (void)testSubtraction {`

    `        int foo = arc4random();`

    `        int bar = arc4random();`

    `        int dif = bar - foo;`

    `        int result = [myCalculator resultOfSubtracting:foo from:bar];`

    `        STAssertEquals(result, dif, @"Subtraction failed.");`

    `}`


    By introducing randomization by way of the `arc4random()` function, you''ve made
    it impossible to predict the desired result. The only way to pass the test is
    to subtract foo from bar, no matter what their values are.


    Let''s take a look at how you would write a test before writing code. You''re
    going to add a method to the `calculator` class that will return the quotient
    of two numbers. First, you''ll add it to the interface of your `SimpleCalculator`
    class.


    `- (int)resultOfDividing:(int)foo by:(int)bar;`


    Next, you can start on your tests. Since the method is similar, a good starting
    point would be to follow the same form you have for your addition and subtraction
    methods.


    `- (void)testDivision {`

    `        int foo = arc4random();`

    `        int bar = arc4random();`

    `        int quot = foo / bar;`

    `        int result = [myCalculator resultOfDividing:foo by:bar];`

    `        STAssertEquals(result, quot, @"Division failed.");`

    `}`


    This test will definitely ensure the accuracy of your math. The random values
    ensure that you can''t predict or cloud the results of this test. But does it
    test all possible problems you could face when writing this code? What if bar
    were a zero? What would you like the intended result to be?


    These are the types of questions you should be asking while writing tests. Not
    only do they help to ensure all of your bases are covered, but they help to define
    the problems you''re trying to solve, both implicit and explicit. When the problems
    are well defined and you''ve written tests against them, the solutions are simpler
    and easier to identify.


    Let''s write a test case for division by zero. For simplicity sake, let''s say
    that this use case should throw an exception using an assertion. You may be asking
    why you would do this when division by zero already throws an exception. Throwing
    your own exception gives you control over how the app crashes and allows you to
    provide more information to the developer about what exactly they''ve done wrong.
    This will also give you an opportunity to try out another `STAssert` macro.


    You want your test to pass only if attempting to divide by zero throws an exception.
    Here''s how you can use `STAssertThrows()` to detect a valid exception:


    `- (void)testDivisionByZero {`

    `        int foo = arc4random();`

    `        int bar = 0;`

    `        STAssertThrows([myCalculator resultOfDividing:foo by:bar],`

    `                @"Divide by zero should have thrown");`

    `}`


    `STAssertThrows()` detects whether or not an exception is thrown by a given expression.
    If no exception is thrown, the condition proves false, and `STAssertThrows()`
    will throw its own exception, failing the test. In order to pass this test, your
    code must throw an exception when the divisor is zero.


    Now that you have a great (not merely “good”) understanding of what your code
    must do, you can write it.


    `- (int)resultOfDividing:(int)foo by:(int)bar {`

    `        NSAssert((bar != 0), @"Attempt to divide by zero.`

    `                You are likely to be eaten by a grue.");`

    `        return (foo / bar);`

    `}`


    If you run your tests now, they should all pass, and you should feel pretty confident
    that the new feature is well thought out and well tested.


    ### Putting It to Use with Your App


    Now that you''re comfortable with OCUnit and have a decent understanding of how
    to write good tests, you should start applying your new skills to the Super Checkout
    app. To start off, write a test suite for the project''s JSON parser, `SCJSONParser`.'
  trans: "\n#### 完善测试用例\n\n这些测试用例能够如预期工作。加法测试通过，减法测试失败。减法结果会得到 5 而不是 1，并且 `STAssertEquals()`\
