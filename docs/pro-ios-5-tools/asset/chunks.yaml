    #### Core Graphics 简介


    每个 `UIView` 子类都具备绘制自身并控制其布局的机制。这些方法由 Cocoa Touch 按需调用，通常是在调用 `setNeedsDisplay`
    或 `setNeedsLayout` 之后触发。由于我们有这些方法，`drawRect:` 和 `layoutSubviews` 永远不应被直接调用。如果你想触发
    `drawRect:`，请调用 `setNeedsDisplay`，Cocoa 会决定调用 `drawRect:` 的最佳时机。`setNeedsLayout`
    和 `layoutSubviews` 也是如此。这确保了所有视图更新能够一次性完成，并且渲染会在 Cocoa 最方便的时间进行调度，以便高效绘制相关视图。


    那么，在你调度视图渲染之后会发生什么呢？如果你查看图 5–13，就能很好地了解 Cocoa 渲染视图时发生的事情。这一过程会应用到应用中的每一个 `UIView`，而这种一致性在后续会变得非常重要。


    ![图片说明](img/0513.jpg)


    **图 5–13.** *视图绘制周期概览*


    现在基础知识已经覆盖，让我们深入探究幕后发生的事情。每个渲染视图的核心元素是该视图的 `layer` 属性。这是由 Core Animation 渲染的图层。Core
    Animation 位于 iOS 架构的媒体层，直接位于 UIKit 所在的 Cocoa Touch 层下方（参见图 5–14）。Core Animation
    是 Core Graphics 框架的一部分。Core Graphics 也被称为 Quartz 2D，在绘图方面承担了所有繁重的工作。


    ![图片说明](img/0514.jpg)


    **图 5–14.** *这是 iOS 的基本架构，其中媒体层被突出显示；媒体层是我们大部分时间要关注的地方。*


    Core Graphics 的职责是渲染应用的整个屏幕。它还负责在不同视图之间进行过渡动画。这类动画的一个典型例子是将视图控制器推入 `UINavigationController`
    的视图栈。`UIScrollView` 实例也使用 Core Graphics 来动画化用户与之交互时视图的滚动。`UITableView` 是一个 `UIScrollView`，因此当用户上下滚动时，它需要动画化所有表格单元格。


    #### 回到 Instruments


    现在，Super Checkout 登场了。我们正在调优的视图是一个表格视图，我们的单元格可能因其设计方式而导致一些性能问题。为了诊断这个问题，我们需要使用
    Core Animation 工具对 Super Checkout 进行分析。


    ![图片说明](img/0515.jpg)


    **图 5–15.** *Core Animation 工具*


    Core Animation 工具为我们提供了一个模板，用于查看每秒渲染帧数的原始测量值以及 CPU 使用率图表。该工具还允许我们修改应用的渲染方式，从而获得关于
    Core Graphics 如何实际渲染每个视图的线索。图 5–16 展示了你可以开启哪些选项；每个选项都有其特定用途。我们目前只关心如何查看图层的混合方式。


    ![图片说明](img/0516.jpg)


    **图 5–16.** *用于深入了解 Core Graphics 如何渲染应用的调试选项*


    继续使用 Core Animation 工具对应用进行分析。在 Instruments 启动且应用运行后，在调试选项中开启“颜色混合图层”（Color Blended
    Layers）。如果你看不到这些选项，请点击 Core Animation 工具的图表，即可激活它们。当你开启混合图层后，屏幕会看起来非常怪异。查看图 5–17，我们将讨论这些信息告诉了我们什么。


    在图 5–17 中，我们看到的是 Core Graphics 如何查看我们的应用。还记得我之前提到合成器（compositor）之后会很重要吗？这就是我指的部分。这个视图向我们展示了
    Core Graphics 如何绘制以及它需要进行何种合成。


    **注意：** 合成是一种将分层片段相互叠加的复杂方式。有一些非常精妙的算法用于合成多个图层并创建单个图像。幸运的是，Core Graphics 背后的工程师已经为我们完成了所有繁重的工作，因此我们不必操心渲染每一个屏幕。


    ![图片说明](img/0517.jpg)


    **图 5–17.** *混合图层视图让我们得以一窥 Core Graphics 如何渲染每个屏幕。*


    再看一次图 5–16。每一种不同的色调代表一个独立的图层。实际上，每当创建一个新的 `UIView`（或 `UIView` 的子类）时，都会创建一个新的图层。这些图层属于
    `CALayer` 类型，实际上是视图绘制于其上的介质。然后这些图层被合成，形成最终在屏幕上渲染的图像。


    合成代价高昂，因此这可能成为性能瓶颈。查看每个单元格中的每个 `UILabel`。有相当多的空白区域需要渲染。如果视图被标记为不透明（opaque），合成器就不必计算不透明视图下方的视图在加上其上层任何内容后的样子。想象一下，在一个图像上方有三个或四个具有不同
    alpha 值的视图。合成器需要加班加点才能渲染出视图。如果再加上动画，结果看起来就会很不流畅，因为合成器需要花更长时间来渲染每一中间帧。


    然而，有一个好方法可以解决这个问题。与其在我们的表格单元格中管理众多子视图，我们可以直接将内容绘制到视图本身中，只渲染一个图层。图 5–18 展示了开启混合图层后，这种方案的效果。


    ![图片说明](img/0518.jpg)


    **图 5–18.** *我们新设计的、仅有一个混合图层的单元格*

    '
- fmt: "# 优化单元格绘制以使用单层绘制\n\n为了更新我们的单元格使其在一个图层上绘制，我们将使用Loren Brichter在Tweetie for iPhone和Twitter\
    \ for iPhone上使用的相同技术。该技术涉及创建一个覆盖整个单元格的不透明`UIView`，并在该视图的子类中创建绘制方法。为此，我们需要创建一个名为`SuperFastCell`的新`UITableViewCell`子类。请创建一个新的`UITableViewCell`子类，并将其命名为`SuperFastCell`。\n\
    \n打开`SuperFastCell.h`，将其修改为如下内容：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
    \ SuperFastCell : UITableViewCell {\n    UIView *contentView;\n}\n\n-(void) drawCellView:(CGRect)rect;\n\
    @end\n```\n\n现在，打开`SuperFastCell.m`，并将其修改为如下内容：\n\n```\n#import \"SuperFastCell.h\"\
    \n\n@class SuperFastCell;\n@interface SuperFastCellView : UIView\n@end\n\n@implementation\
    \ SuperFastCellView\n\n- (void)drawRect:(CGRect)r {\n        [(SuperFastCell *)[self\
    \ superview] drawCellView:r];\n}\n\n@end\n\n@implementation SuperFastCell\n\n\
    - (id)initWithStyle:(UITableViewCellStyle)style\n       reuseIdentifier:(NSString\
    \ *)reuseIdentifier {\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
    \    if (self) {\n        contentView = [[SuperFastCellView alloc] initWithFrame:CGRectZero];\n\
    \        contentView.opaque = YES;\n        contentView.backgroundColor = [UIColor\
    \ whiteColor];\n        [self addSubview:contentView];\n        [contentView release];\n\
    \    }\n    return self;\n}\n\n- (void) setFrame:(CGRect)frame {\n    [super setFrame:frame];\n\
    \    CGRect myBounds = [self bounds];\n    myBounds.size.height -= 1;\n    [contentView\
    \ setFrame:myBounds];\n}\n\n- (void) setNeedsDisplay {\n    [super setNeedsDisplay];\n\
    \    [contentView setNeedsDisplay];\n}\n\n-(void) drawCellView:(CGRect)rect {\n\
    \    //Subclasses will implement this\n}\n\n- (void)dealloc {\n    [super dealloc];\n\
    }\n\n@end\n```\n\n现在我们已经定义了基类，需要更新`ProductCell`类以使用这种新技术。打开`ProductCell.h`，并将其修改为如下内容：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"SuperFastCell.h\"\n@class Product;\n\
    \n@interface ProductCell : SuperFastCell {\n}\n+(NSString *) reuseIdentifier;\n\
    \n@property (nonatomic, retain) Product *productInformation;\n\n@end\n```\n\n\
    现在，打开`ProductCell.m`，并将其修改为如下内容：\n\n```\n#import \"ProductCell.h\"\n#import \"\
    Product.h\"\n\n@implementation ProductCell\n@synthesize productInformation;\n\n\
    +(NSString *)reuseIdentifier {\n    return @\"ProductCell\";\n}\n\n-(NSString\
    \ *)reuseIdentifier {\n    return [[self class] reuseIdentifier];\n}\n\n- (id)initWithStyle:(UITableViewCellStyle)style\n\
    \       reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithStyle:style\
    \ reuseIdentifier:reuseIdentifier];\n    if (self) {\n        // Initialization\
    \ code\n    }\n    return self;\n}\n\n-(void) setProductInformation:(Product *)newProductInformation\
    \ {\n    Product *oldInfo = productInformation;\n    [oldInfo removeObserver:self\
    \ forKeyPath:@\"productImage\"];\n\n    productInformation = [newProductInformation\
    \ retain];\n    [productInformation addObserver:self\n                       \
    \  forKeyPath:@\"productImage\"\n                            options:NSKeyValueObservingOptionNew\n\
    \                            context:NULL];\n\n    [oldInfo release];\n\n    [self\
    \ setNeedsDisplay];\n}\n\n- (void)setHighlighted:(BOOL)lit {\n    // If highlighted\
    \ state changes, need to redisplay.\n    if([self isHighlighted] != lit) {\n \
    \       [super setHighlighted:lit];\n        [self setNeedsDisplay];\n    }\n\
    }\n\n-(void) drawCellView:(CGRect)rect {\n    UIFont *font = [UIFont fontWithName:@\"\
    Helvetica\" size:17.0];\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
    \    CGContextSaveGState(context);\n\n    CGImageRef prodImage = [[productInformation\
    \ productImage] CGImage];\n    CGContextDrawImage(context, CGRectMake(12, 6, 64,\
    \ 64), prodImage);\n    //86, 6\n    //Helvetica 17 black\n    CGSize textSize;\n\
    \    textSize = [[productInformation name] sizeWithFont:font];\n\n    if([self\
    \ isHighlighted]) {\n        CGContextSetStrokeColorWithColor(context, [[UIColor\
    \ whiteColor] CGColor]);\n        CGContextSetFillColorWithColor(context, [[UIColor\
    \ whiteColor] CGColor]);\n    } else {\n        CGContextSetStrokeColorWithColor(context,\
    \ [[UIColor blackColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
    \ [[UIColor blackColor] CGColor]);\n    }\n\n    [[productInformation name] drawInRect:CGRectMake(86,\
    \ 6, textSize.width,\ntextSize.height)\n                                  withFont:font];\n\
    \n    //Helvetica 17 light gray\n    NSString *priceString = [NSString stringWithFormat:@\"\
    $%1.2f\",\n\n[[productInformation price] floatValue]];\n    textSize = [priceString\
    \ sizeWithFont:font];\n\n    if([self isHighlighted]) {\n        CGContextSetStrokeColorWithColor(context,\
    \ [[UIColor whiteColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
    \ [[UIColor whiteColor] CGColor]);\n    } else {\n        CGContextSetStrokeColorWithColor(context,\
    \ [[UIColor lightGrayColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
    \ [[UIColor lightGrayColor] CGColor]);\n    }\n    [priceString drawInRect:CGRectMake(86,\
    \ 35, textSize.width, textSize.height)\n                 withFont:font];\n   \
    \ CGContextRestoreGState(context);\n}\n\n- (void)observeValueForKeyPath:(NSString\
    \ *)keyPath\n                      ofObject:(id)object\n                     \
    \   change:(NSDictionary *)change\n                       context:(void *)context\
    \ {\n    if ([keyPath isEqual:@\"productImage\"]) {\n        [self setNeedsDisplay];\n\
    \    }\n}\n\n- (void)dealloc {\n    [super dealloc];\n}\n\n@end\n```\n\n在运行应用程序之前，需要注意这些自定义单元格的一个重要事项：需要处理高亮和选中状态。由于我们直接在显示的视图上绘制文本，因此无法获得`UILabel`中的优势。这是我们在视图中进行自定义绘制所付出的代价。\n\
    \n现在，使用Core Animation对应用程序进行分析，并启用混合图层选项。不再有多个图层视图让合成器超负荷工作。上下滚动并查看帧率。由于我们结合了从基本图像缓存到减少系统在动画中所需合成的数量等一系列性能改进，帧率持续提升。[Figure\
    \ 5–19](#Chapter05.html#fig_5_19)展示了在调试这些视图时，使用不同版本的Super Checkout在Core Animation工具上的几次运行结果。差异不大，但请注意，最上面的运行表现最佳。\n\
    \n![images](images/0519.jpg)\n\n**Figure 5–19.** *Different runs of Super Checkout\
    \ through the Core Animation instrument*\n\n**NOTE:** The table cells we are using\
    \ should be created by using a built-in cell type. The only thing that would still\
    \ need to be implemented is the code that loads the image and scales it down to\
    \ fit within cell's image view. This technique, however, is perfect for any complicated\
    \ cell that can't be accomplished by using a cell that Apple provides in UIKit."
