  trans: '

    #### 脚本化 Xcode


    Xcode 自带一个强大的命令行接口：`xcodebuild`。`xcodebuild` 工具会在当前路径下搜索 Xcode 项目文件，读取配置，然后编译项目。它还允许你通过命令行覆盖所有配置和编译器标志。本质上，只要是与代码编译相关的操作，你在
    Xcode 中能做的，都可以通过命令行使用 `xcodebuild` 来完成。由于 Jenkins 能很好地与 Shell 脚本配合，`xcodebuild`
    将在任务执行期间管理你的编译过程。


    在深入介绍 `xcodebuild` 之前，我们先看看它的实际应用。打开一个终端窗口，运行以下命令：


    `cd <PATH/TO/SUPER/CHECKOUT>`

    `xcodebuild -sdk iphonesimulator5.0 -configuration Debug`


    接下来，你会看到 `xcodebuild` 施展魔力时输出的原始编译器日志。它会类似这样：


    `Build settings from command line:`

    `    SDKROOT = iphonesimulator5.0`


    `=== BUILD NATIVE TARGET Super Checkout OF PROJECT Super Checkout WITH CONFIGURATION
    Debug ===`

    `Check dependencies`

    `<每个文件被编译和链接时的大量输出>`


    `** BUILD SUCCEEDED **`


    如果编译过程中出现任何错误，你会像在 Xcode 中一样在终端里看到它们。如果你的构建产生了任何警告，你也可以像在 Xcode 中一样通过滚动编译器输出来查找它们。


    `xcodebuild` 有几个选项标志，可以让你控制构建过程。以下是一些重要的标志：


    *   `-project`：此标志允许你指定相对于当前目录要构建的项目。具体来说，你需要提供 `xcodeproj` 文件的完整名称。如果不提供此标志，`xcodebuild`
    会在当前目录下寻找项目。如果找到多个项目（或工作区），则会失败并列出它们。

    *   `-target`：此标志允许你指定要构建的目标。在处理复杂项目或发布里程碑构建（例如，夜间构建）时，这个标志非常方便。

    *   `-workspace`：除了传统的项目文件外，`xcodebuild` 还会查找工作区文件并解析它们的模式和设置。使用此标志来指定要构建的工作区。

    *   `-scheme`：如果要构建工作区，此标志会指定一个模式。需要注意的是，目标和工作区不能混用，模式与项目也是如此。请使用正确的标志组合。

    *   `-sdk`：此标志允许你选择针对哪个 SDK 进行编译。通常，你使用它来区分模拟器构建和真机构建。

    *   `-configuration`：大多数目标至少有两个配置：Debug 和 Release。配置标志允许你通过名称选择要构建的配置。`xcodebuild`
    使用的默认配置可以在 Xcode 的项目详情视图的“信息”选项卡中指定。

    *   `-showsdks`：你可以使用此标志来了解哪些 SDK 可用，以及 `xcodebuild` 如何称呼它们。

    *   其他：还有一些其他标志和选项。你可以通过查看 `xcodebuild` 的主页来了解更多信息。


    除了这些标志，你还可以附加任何你想要的额外编译器标志或设置。以下是使用这些基本标志的示例：


    `$ xcodebuild -project MyAppProject -target MyApp -sdk iphone5.0 -configuration
    Release`


    此示例将针对 iOS 5.0 SDK（真机）构建 `MyAppProject` Xcode 项目的 `MyApp` 目标，并使用 Release 配置。Xcode
    项目中与 Release 配置相关的任何设置都将在编译期间应用于构建。如果你想添加一个编译器标志，只需像这样将其附加到命令中：


    `$ xcodebuild -target MyAppTarget -sdk iphone5.0 SOME_COMPILER_FLAG=1 ANOTHER_FLAG=0`


    `xcodebuild` 的功能不仅仅是构建项目（尽管这是默认行为）。它有几个功能，包括 `build`、`clean` 和 `archive`。要指定功能，只需将其包含在标志中。要清理你的项目，你可以直接调用：


    `$ xcodebuild -target MyAppTarget clean`


    它们也可以串联使用。因此，要清理项目然后归档它（这隐含了构建操作），你可以调用：


    `$ xcodebuild -target MyAppTarget clean archive`


    现在你对 `xcodebuild` 有了很好的理解。它是一个极其强大的工具，并且对于命令行界面来说，它出奇地易用。你已经准备好编写你的 Jenkins 构建步骤了。


    打开你的 Jenkins 构建任务配置页面，向下滚动到“构建”部分。这是你自定义构建过程的地方。你需要添加一个构建步骤，从 Shell 中运行 `xcodebuild`
    命令。只需点击“添加构建步骤”按钮，然后从下拉菜单中选择“执行 Shell”来插入一个新的 Shell 步骤。


    在“命令”文本区域中，输入一个适用于你项目的 `xcodebuild` 命令（图 9-12）。对于 Super Checkout，Shell 命令简单如下（注意使用你之前设置的环境变量）：


    `xcodebuild -sdk $IPHONE_DEVICE_SDK`

    ![图片](img/0912.jpg)


    **图 9-12.** *你可以通过点击文本区域下方的链接获取内置环境变量的完整列表。*


    这将使 `xcodebuild` 找到仓库中的唯一项目，选择项目中的唯一应用目标，并使用默认的命令行配置（Release）进行构建。你唯一需要指定的是要使用的
    SDK。如果你的项目更复杂，或者你的仓库包含多个项目，构建命令会稍微复杂一些。


    输入完 `xcodebuild` 命令后，滚动到页面底部并点击“保存”。在“任务详情”页面，点击“立即构建”来开始构建你的项目。Jenkins 会首先从仓库中检出或更新你的项目工作副本，然后运行你的
    `xcodebuild` 命令。如果一切正常，项目应该能成功构建，并且你的新构建旁边会有一个蓝色的指示图标。


    **注意：** 根据你系统的配置，首次使用 `xcodebuild` 针对真机 SDK 构建时，可能需要你授予 `xcodebuild` 和 `codesign`
    使用钥匙串的权限。如果是这种情况，你的构建会停滞。只需以你设置期间创建的 Jenkins 用户身份登录构建服务器并再次运行构建。你应该会看到一个权限对话框，其中包含“始终允许访问钥匙串”的选项。完成此操作后，你就可以顺利进行了。


    这太棒了！你已经实现了自动化构建，而且过程并不痛苦。但你目前做的只是构建源代码。这对于大型团队的集成很方便，但功能还不够强大。你真正需要的是获取关于代码质量的一些硬数据。你需要问责制。你需要失败通知和静态分析。'
- fmt: '# Who Broke the Build?


    Notifications are a simple way to ensure everyone is aware of the current state
    of the code. It''s also an effective means to ensure people aren''t checking in
    bad code. If Johnny Sigabort checks in a completed feature, `Jenkins` will kick
    off a build. If the build fails, a notification will go out to a predefined list
    of people (usually the whole development team) to announce that Johnny''s commit
    broke the build, along with a link to the detailed build results. After Johnny
    is shamed into cleaning up his own negligence, another notification can be sent
    out to let the team know that the build has been restored.


    Setting up notifications is dead simple and highly extensible. There are a variety
    of plug-ins available to broadcast build failure notifications over a wide range
    of mediums. You can even tweet build results if you want to be that transparent
    about your progress (or if you want to step up Johnny''s shame).


    The standard and built-in notification type is e-mail. To enable e-mail notifications,
    you first have to configure the mail server information. Head over to the System
    Configuration page in the Manage Jenkins section and scroll down to the E-mail
    Notification section ([Figure 9–13](#Chapter09.html#fig_9_13)). In the fields
    provided, you can specify you mail server''s settings.


    ![images](images/0913.jpg)


    **Figure 9–13.** *Your system may require a real account for Jenkins, lest all
    notifications go into a spam bin.*


    Once you''ve enabled e-mail, you can set up the notification. Go back to your
    Job Configuration page and scroll down to the Post-build actions section. Check
    the `E-mail Notification` box to reveal the notification settings form ([Figure
    9–14](#Chapter09.html#fig_9_14)). Enter your team''s e-mail addresses in the `Recipients`
    field, and check the `unstable build` checkbox. Click the `Save` button, and you''re
    done!


    ![images](images/0914.jpg)


    **Figure 9–14.** *You can configure e-mail notifications for individuals or mailing
    lists.*


    # Quality, Controlled


    As any good developer knows, a successful build doesn''t mean the code is good.
    That''s why there are tools like the static analyzer to find any gotchas for us.
    `Xcode` projects can be configured to run static analysis during compilation,
    which is fantastic when building within Xcode itself. However, in order to do
    something meaningful with the analysis findings, you need help from a couple of
    tools. First, you need to get your own copy of the LLVM foundation''s `scan-build`
    CLI, so that you can extract the results of the build and present them in a more
    human-friendly way. Second, you need to install the Clang Scan-Build plug-in in
    Jenkins, which will add a new type of build step to your jobs and manage the `scan-build`
    results for you.


    The Clang Static Analyzer tools are available from the LLVM foundation''s web
    site at [`http://clang-analyzer.llvm.org`](http://clang-analyzer.llvm.org) ([Figure
    9–15](#Chapter09.html#fig_9_15)). `Scan-build` is an extremely powerful command
    line tool that wraps around a call to `xcodebuild` and extracts static analysis
    results, generating reports in both `plist` and (using the included `scan-view`
    tool) HTML form. To use the tools, simply download and extract the latest tarball.
    They can be run from anywhere, but in order to be run within Jenkins, they need
    to be placed somewhere that your Jenkins user can access. For now, let''s place
    the extracted folder in the Jenkins user''s home directory and rename it `static-analyzer`.


    ![images](images/0915.jpg)


    **Figure 9–15.** *The LLVM site has a wealth of information on the compiler, analyzer,
    and associated tools.*


    The `scan-build` command itself is an extremely simple tool, similar to `xcodebuild`.
    It has a variety of flags to allow for deep customization and configuration, and
    it also requires an `xcodebuild` call as its input. To learn more about the flags
    you can use to customize the results, simply execute the `scan-build` script from
    the terminal to see the usage content. For your purposes within Jenkins, you don''t
    need to worry about these flags, as they''ll be handled by the build step plug-in.


    For now, to see the `scan-build` script in action, pop open terminal and navigate
    to directory containing an Xcode project (and an `xcodeproj` file). From there,
    simply execute an `xcodebuild` command, prepended by the path to `scan-build`,
    like so:


    ```

    /path/to/static-analyzer/scan-build xcodebuild -sdk iphonesimulator5.0

    ```


    You should see the normal `xcodebuild` output, followed by the output from `scan-build`.
    It should look something like this:


    ```

    scan-build: 2 bugs found.

    scan-build: Run ''scan-view /var/folders/pz/k88r03q535g2ztqwgb52bv4c0000gq/T/scan-build-2011-08-21-1''
    to examine bug reports.

    ```


    Executing the command in single quotes (starting with `scan-view`) will launch
    your web browser and point it at `127.0.0.1:8181`, which will serve up the static
    analysis results ([Figure 9–16](#Chapter09.html#fig_9_16)) until you stop `scan-view`
    by pressing `Ctrl+C` in the terminal window.


    ![images](images/0916.jpg)


    **Figure 9–16.** *The static analyzer''s results page provides a great summary
    of the findings.*


    Now that you''ve got your own static analyzer, let''s get the Jenkins plug-in
    set up. From the Jenkins Management page, open the Manage Plug-ins page. Open
    the `Available` tab, look for the Clang Scan-Build Plug-in. As with the Git plug-in,
    it''ll probably be easiest to hit `Command+F` and search the page for `Clang`.
    Check the plug-in''s checkbox and click the `Install` button at the bottom of
    the page. Make sure you remember to restart Jenkins after the plug-in is installed.'
