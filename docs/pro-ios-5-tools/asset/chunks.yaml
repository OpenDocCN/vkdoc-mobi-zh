    Giving the outlets loaded from the nib nil values and removing itself as an observer
    of the notification center undoes what occurs in the `viewDidLoad` method.  The
    next method that was updated was `shouldAutorotateToInterfaceOrientation:`, and
    it was updated to return `YES` when the device running the application is an iPad.


    The previous section was pretty simple stuff, the next (and final) set of changes
    for this file are


    `- (IBAction)cartButtonPressed:(id)sender {`

    `        ShoppingCartViewController *cartVC =`

    `            [[ShoppingCartViewController alloc] initWithNibName:@"ShoppingCartViewController"  `


    `bundle:nil];`

    `        [cartVC setDelegate:self];`

    `        UINavigationController *navController =`

    `            [[UINavigationController alloc] initWithRootViewController:cartVC];`


    `        [navController setModalPresentationStyle:UIModalPresentationFormSheet];`

    `        [self presentModalViewController:navController animated:YES];`


    `        [cartVC release];`

    `        [navController release];`

    `}`


    `#pragma mark - SCModalDelegate Methods`

    `-(void) viewController:(UIViewController *)vc didFinishWithData:(id) data {`

    `        [self dismissModalViewControllerAnimated:YES];`

    `}`


    `-(void) viewControllerDidCancel:(UIViewController *)vc {`

    `        [self dismissModalViewControllerAnimated:YES];`

    `}`


    The first piece is the action for the cart button that will be placed on the iPad
    version''s nib. Since it is iPad only, we can cater the implementation to the
    iPad. The final two methods are implementing the delegate methods for the modal
    view controller. This is a great example of a device-specific implementation where
    a different nib will be loaded for one view controller. These are the types of
    design decisions that need to be made when transitioning to or developing universal
    applications.


    The ultimate design is to have the same view controller for details that have
    different nib files that set the appropriate `IBOutlet`s. This outlines on of
    the strengths of the MVC design pattern. Maintaining this view controller will
    stay relatively simple and updating the user interface will be easy and won''t
    require controller changes.


    ##### Creating the Product Details Nib for the iPad Version


    The nib for the product details screen is iPad specific. It shares the same components
    as the iPhone/iPod Touch screen except it has a few minor modifications. [Figure
    10–13](#Chapter10.html#fig_10_13) shows the final nib that will be loaded by Super
    Checkout when it is launched on an iPad. Notice that it shares the same exact
    cells and other elements as the iPhone/iPod Touch nib with one slight difference—the
    header view. For the iPad, we need to wrap the image and labels into a view and
    wrap that with another view. This way, we can get each view centered to the table.


    ![images](images/1013.jpg)


    **Figure 10–13.** *The final Product Details nib for the iPad*


    The first thing we need to do to get the nib going is to create it. Go to File
    ä New ä New File, and in the sheet that is displayed, select User Interface under
    the iOS section, and select the Empty nib icon (see [Figure 10–14](#Chapter10.html#fig_10_14)).


    ![images](images/1014.jpg)


    **Figure 10–14.** *Selecting the type of nib to create*


    Click Next, and in the next screen, choose iPad for the Device Family (see [Figure
    10–15](#Chapter10.html#fig_10_15)).


    ![images](images/1015.jpg)


    **Figure 10–15.** *Selecting the Device Family for the nib*


    Click Next. Name the nib **ProductDetailsViewController_iPad.xib**, and make sure
    it is saved to the ViewControllers group. (see [Figure 10–16](#Chapter10.html#fig_10_16)).


    ![images](images/1016.jpg)


    **Figure 10–16.** *Saving the nib to the right group is important to keep your
    project organized.*


    The first thing we want to do for the new nib is to set the File''s Owner proxy.
    After selecting the nib, select File''s Owner so the Custom Class section is visible
    in the Identity Inspector of the Utility area (expand it if it isn''t visible).
    Change the class from NSObject to ProductDetailsViewController.


    Now, we want to set up the view for the view controller. In the Object Library
    section of the Utility area, select View (`UIView`), and drag an instance onto
    the nib''s preview area. Now, drag in a Toolbar (`UIToolbar`), and place it at
    the top of the view. Inside the toolbar, select and delete the button in the upper-left
    corner. Next, drag in a Flexible Space Button Bar Item, and to the right of that,
    drag in a Bar Button Item and set its title to **Cart** (edit it by double-clicking
    the Item text). The final piece of the view configuration is to drag in a Table
    View (`UITableView`) under the toolbar. In the attributes inspector for the table
    view, set the Style drop-down to Grouped to make it a grouped table. Last, resize
    the table view to fit the area under the toolbar. The final product should look
    like [Figure 10–17](#Chapter10.html#fig_10_17).


    ![images](images/1017.jpg)


    **Figure 10–17.** *The configured main view for the iPad*


    Since we are using the same interface elements from the iPhone/iPod Touch version,
    we can copy the elements we''re going to use from the iPhone/iPod Touch nib. The
    easiest way to do this is to use “Assistant editor” mode to open both nibs. With
    the `ProductDetailsViewController_iPad` nib editor open, click “Assistant editor”
    on the right side of the toolbar. Depending on your settings, the assistant editor
    will be to the right of the main editor or underneath the main editor. Either
    way, using the Jump Bar of the assistant editor you will be able to choose the
    appropriate file to view in the assistant editor (see [Figure 10–18](#Chapter10.html#fig_10_18)).


    ![images](images/1018.jpg)


    **Figure 10–18.** *Using the Jump Bar to select a different file in the assistant
    editor*


    Use the Jump Bar to open `ProductDetailsViewController.xib` and select all of
    the views except the table view. Drag those items over to the iPad version of
    the nib, and go back to the standard editor view. We''re pretty much done except
    for one piece.'
  trans: "好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n接下来的更新在 `viewDidUnload`\
    \ 方法中，这是非常标准的做法。将从 nib 加载的 outlets 设置为 nil，并将自身从通知中心移除为观察者，这撤销了在 `viewDidLoad`\
    \ 方法中发生的一切。接下来被更新的方法是 `shouldAutorotateToInterfaceOrientation:`，它被更新为当运行应用的设备是\
    \ iPad 时返回 `YES`。\n\n上一节的内容相当简单，对这个文件接下来的（也是最后的）一组修改是：\n\n```\n- (IBAction)cartButtonPressed:(id)sender\
    \ {\n        ShoppingCartViewController *cartVC =\n            [[ShoppingCartViewController\
    \ alloc] initWithNibName:@\"ShoppingCartViewController\" \n            bundle:nil];\n\
    \        [cartVC setDelegate:self];\n        UINavigationController *navController\
    \ =\n            [[UINavigationController alloc] initWithRootViewController:cartVC];\n\
    \n        [navController setModalPresentationStyle:UIModalPresentationFormSheet];\n\
    \        [self presentModalViewController:navController animated:YES];\n\n   \
    \     [cartVC release];\n        [navController release];\n}\n\n#pragma mark -\
    \ SCModalDelegate Methods\n-(void) viewController:(UIViewController *)vc didFinishWithData:(id)\
    \ data {\n        [self dismissModalViewControllerAnimated:YES];\n}\n\n-(void)\
    \ viewControllerDidCancel:(UIViewController *)vc {\n        [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\n第一部分是购物车按钮的操作，该按钮将放置在 iPad 版本的 nib 中。由于它仅适用于 iPad，我们可以针对 iPad 定制实现。最后两个方法实现了模态视图控制器的代理方法。这是一个很好的特定于设备实现的例子，其中为一个视图控制器加载了不同的\
    \ nib。在进行过渡或开发通用应用程序时，需要做出这类设计决策。\n\n最终的设计是让同一个视图控制器持有详细信息，这些详细信息有不同的 nib 文件来设置相应的\
    \ `IBOutlet`。这突显了 MVC 设计模式的优势之一。维护这个视图控制器将保持相对简单，更新用户界面也会很容易，并且不需要更改控制器。\n\n###\
    \ 为 iPad 版本创建产品详情 Nib\n\n产品详情界面的 nib 是 iPad 专用的。它与 iPhone/iPod Touch 界面共享相同的组件，但有一些细微的修改。图\
    \ 10–13 显示了 Super Checkout 在 iPad 上启动时将加载的最终 nib。注意，它与 iPhone/iPod Touch 的 nib\
    \ 共享完全相同的单元格和其他元素，只有一个细微的差别——头部视图。对于 iPad，我们需要将图像和标签封装到一个视图中，然后用另一个视图将其包裹起来。这样，我们就可以让每个视图在表格中居中显示。\n\
    \n![images](img/1013.jpg)\n\n**图 10–13.** *iPad 的最终产品详情 Nib*\n\n要开始创建 nib，首先需要创建它。前往\
    \ File → New → New File，在显示的对话框中，在 iOS 部分下选择 User Interface，然后选择 Empty nib 图标（参见\
    \ 图 10–14）。\n\n![images](img/1014.jpg)\n\n**图 10–14.** *选择要创建的 nib 类型*\n\n点击 Next，在下一个界面中，为\
    \ Device Family 选择 iPad（参见 图 10–15）。\n\n![images](img/1015.jpg)\n\n**图 10–15.**\
    \ *为 nib 选择设备系列*\n\n点击 Next。将 nib 命名为 `ProductDetailsViewController_iPad.xib`，并确保将其保存到\
    \ ViewControllers 组中（参见 图 10–16）。\n\n![images](img/1016.jpg)\n\n**图 10–16.** *将\
    \ nib 保存到正确的组对于保持项目组织有序很重要。*\n\n对于这个新 nib，我们要做的第一件事是设置 File's Owner 代理。选择 nib\
    \ 后，选择 File's Owner，以便在 Utility 区域的 Identity Inspector 中看到 Custom Class 部分（如果不可见，请展开它）。将类从\
    \ `NSObject` 更改为 `ProductDetailsViewController`。\n\n现在，我们要为视图控制器设置视图。在 Utility\
    \ 区域的 Object Library 部分，选择 View (`UIView`)，并将一个实例拖到 nib 的预览区域。然后，拖入一个 Toolbar\
    \ (`UIToolbar`)，并将其放置在视图的顶部。在工具栏内部，选择并删除左上角的按钮。接下来，拖入一个 Flexible Space Button\
    \ Bar Item，在其右侧，拖入一个 Bar Button Item 并将其标题设置为 **Cart**（通过双击 Item 文本进行编辑）。视图配置的最后一步是拖入一个\
    \ Table View (`UITableView`) 到工具栏下方。在表格视图的属性检查器中，将样式 (Style) 下拉菜单设置为 Grouped，使其成为分组表格。最后，调整表格视图的大小以适合工具栏下方的区域。最终产品应如\
    \ 图 10–17 所示。\n\n![images](img/1017.jpg)\n\n**图 10–17.** *为 iPad 配置好的主视图*\n\n\
    由于我们使用的是与 iPhone/iPod Touch 版本相同的界面元素，我们可以从 iPhone/iPod Touch 的 nib 中复制我们要使用的元素。最简单的方法是使用“助理编辑器\
    \ (Assistant editor)”模式同时打开两个 nib。在 `ProductDetailsViewController_iPad` nib 编辑器打开的情况下，点击工具栏右侧的“助理编辑器\
    \ (Assistant editor)”。根据您的设置，助理编辑器将位于主编辑器的右侧或下方。无论哪种方式，您都可以使用助理编辑器的跳转栏 (Jump Bar)\
    \ 来选择要在助理编辑器中查看的合适文件（参见 图 10–18）。\n\n![images](img/1018.jpg)\n\n**图 10–18.** *使用跳转栏在助理编辑器中选择不同的文件*\n\
    \n使用跳转栏打开 `ProductDetailsViewController.xib`，并选择除表格视图之外的所有视图。将这些项目拖到 iPad 版本的\
    \ nib 中，然后返回到标准编辑器视图。除了一个部分外，我们几乎完成了。\n"
- fmt: "从`Object`库（如果`Utility`区域不可见，请展开它）中拖动一个`UIView`对象。选择新的`UIView`实例，在`Attributes\
    \ Inspector`中，将背景颜色设置为`clear color`，并取消选中`opaque`复选框。在`Size Inspector`中，将宽度设置为`676`磅，高度设置为`160`磅。现在，让包含图像、产品名称和价格的视图成为新视图的子视图，并将其居中。使用自动吸附功能作为辅助。视图居中后，使用`springs\
    \ and struts`使其相对于父视图居中（参见[Figure 10–19](#Chapter10.html#fig_10_19)）。\n\n![images](images/1019.jpg)\n\
    \n**Figure 10–19.** *使用`springs and struts`对创建自动调整大小的视图非常有帮助。*\n\n**提示：** `Interface\
    \ Builder`中的`springs and struts`配置只是设置`UIView`上的位掩码属性`autoresizingMask`。默认配置是将视图的左上角固定在其frame的原点。通过仅选择顶部边距（或在代码中设置）并使其在父视图的frame中居中，我们就能有效地使其在任何宽度下都保持居中。\n\
    \n现在，我们已经在nib中拥有了界面元素，但仍然需要对其他视图进行一些配置。`Quantity Cell`需要将数量调整按钮和标签固定在右侧。通过仅选择`top\
    \ margin`和`right margin`选项，使用`springs and struts`来实现这一点。剩下的单元格，即带有`Add to Basket`标签的单元格，需要将其标签居中，并选择`top\
    \ margin`选项。\n\n界面元素配置完成后，我们可以将它们连接到视图控制器。[Figure 10–20](#Chapter10.html#fig_10_20)显示了`File's\
    \ Owner`在outlets和actions方面的最终配置。并非所有界面元素都会被连接。\n\n![images](images/1020.jpg)\n\
    \n**Figure 10–20.** *`File's Owner`的最终配置*\n\n准备好连接视图了吗？好的，开始吧。首先，让我们连接`File's\
    \ Owner`上的所有outlets，从顶部开始：\n\n*   `addToBasketCell`是通用的表格视图单元格。\n*   `productDetailsHeader`是包裹产品详情的大视图。\n\
    *   `productImage`是`productDetailsHeader`中的`UIImageView`。\n*   `productNameLabel`是`productDetailsHeader`中的名称标签。\n\
    *   `productPriceLabel`是`productDetailsHeader`中的价格标签。\n*   `quantityCell`是整个数量单元格。\n\
    *   `shoppingCartButton`是工具栏右侧显示“Cart”的按钮。\n*   `tableView`是nib中的主（也是唯一的）表格视图。\n\
    *   `toolbar`是主视图顶部的工具栏。\n*   `view`是包裹表格视图和工具栏的`UIView`。\n\n接下来，将表格视图上的`dataSource`和`delegate`\
    \ outlets连接到`File's Owner`。最后一步是将`shoppingCartButton`的`sent action`连接到`File's\
    \ Owner`上的`cartButtonPressed:`选择器。现在所有内容都已连接完毕，可以开始工作了。\n\n#### 修改购物车视图控制器\n\n\
    要修改的最后一个视图控制器是`ShoppingCartViewController`。我们需要进行的更改包括：更新“I'm done looking at\
    \ this”按钮，使其具有idiom感知能力，并更新结账按钮，确保其在视图中居中。\n\n我们需要做的第一件事是获取对结账按钮的引用。我们将在源文件中创建一个outlet，并将其连接到nib。为此，打开`ShoppingCartViewController.xib`，并启用助理编辑器。如果编辑器仍显示`Manual`选择，请转到`View`\
    \ ![images](images/U001.jpg) `Editor` ![images](images/U001.jpg) `Reset Editor`，将助理编辑器重置为`Automatic`选择。这将在助理编辑器中打开`ShoppingCartViewController.h`文件。\n\
    \n下一步是按住Control键将结账按钮拖拽到源文件中（参见[Figure 10–21](#Chapter10.html#fig_10_21)）。将新属性放在适当的位置，并使其成为一个名为`checkoutButton`的outlet。\n\
    \n![images](images/1021.jpg)\n\n**Figure 10–21.** *`Interface Builder`与`Xcode`的集成使得创建outlets变得容易。*\n\
    \n由于使用了这种集成，`Xcode`将自动插入实例变量、合成属性，并在`dealloc`和`viewDidUnload`中放置相应的代码。\n\n按`command+option+S`保存所有修改过的文件。接下来，打开`ShoppingCartViewController.m`，并在`viewDidLoad`中找到以下行：\n\
    \n```\nUIBarButtonItem *storeButton =\n    [[UIBarButtonItem alloc] initWithTitle:@\"\
    Store\"\nstyle:UIBarButtonItemStyleBordered\n                                \
    \                                target:self\naction:@selector(backToStorePressed:)];\n\
    ```\n\n删除该行，并替换为以下内容：\n\n```\nUIBarButtonItem *storeButton = nil;\nif(UI_USER_INTERFACE_IDIOM()\
    \ == UIUserInterfaceIdiomPad) {\n    storeButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
    Done\"\nstyle:UIBarButtonItemStyleDone\ntarget:self\naction:@selector(backToStorePressed:)];\n\
    } else {\n    storeButton = [[UIBarButtonItem alloc] initWithTitle:@\"Store\"\n\
    style:UIBarButtonItemStyleBordered\ntarget:self\naction:@selector(backToStorePressed:)];\n\
    }\n```\n\n此部分更新了作为模态窗口工具栏右侧按钮显示的按钮类型，该模态窗口用于呈现用户的购物车。\n\n下一个要进行的更新在`shouldAutorotateToInterfaceOrientation:`中。在现有的`return`语句之前添加以下代码：\n\
    \n```\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {\n    return\
    \ YES;\n}\n```\n\n最后一个更新在`tableView:viewForFooterInSection:`中。在`return`语句之前，添加以下代码：\n\
    \n```\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {\n    [checkoutButton\
    \ setAutoresizingMask:UIViewAutoresizingNone];\n    [checkoutButton setFrame:CGRectMake(30,\
    \ checkoutButton.frame.origin.y,\n        self.view.frame.size.width - 60, checkoutButton.frame.size.height)];\n\
    }\n```\n\n我们在这里所做的是将自动调整大小掩码设置为`none`，并重置按钮的frame，使其与周围单元格匹配。\n\n### 收尾工作\n\n\
    就这样！我们已经成功地将`Super Checkout`更新为通用二进制应用。我们几乎重用了所有应用代码，仅需创建一个针对iPad的nib文件。我们刚刚经历的过程是转换其他现有应用使其同时在iPad和iPhone/iPod\
    \ Touch上运行的良好开端。\n\n与任何新项目一样，关键步骤是第一步。设计应用并制定将现有应用转换为通用二进制应用的方案是最重要的阶段；剩下的只是实施和贯彻设计。\n\
    \n理想情况下，应用应作为通用应用进行设计和开发。这将减少需要实施的变通方案的数量。在开发应用时，脑海中应始终牢记“以通用为目标”这一要点。尽管你正在开发的应用可能仅运行在iPhone/iPod\
    \ Touch上，但未来可能会要求将其移植到iPad上。\n\n实现一个为通用过渡做好准备的设计的最佳方法是减少在代码中创建的视图数量。如果必须在代码中创建视图，请避免硬编码尺寸。使用idiom检测API也是将特定代码块专门化到iPad或iPhone/iPod\
    \ Touch的关键。在使用nib时，对于将在所有设备上使用的nib，使用`springs and struts`来实现自动调整大小的视图也是一个好方法。\n\
    \n现在，该应用已成为通用应用，我们可以将其部署给beta测试者，继续追求更大更好的目标。提交更改，将该分支合并回主分支，并向你的测试者发送一个beta版本。既然他们一直在要求一个iPad版本，我相信他们会很高兴你倾听了他们的声音并如此迅速地开发出了解决方案。"
  raw: 'Drag a `UIView` object from the Object library (expand the Utility area if
    it is not visible). Select the new `UIView` instance, and in the Attributes Inspector,
    make the background color the clear color and uncheck the opaque check box. In
    the size inspector, make the width 676 points and the height 160 points. Now,
    make the view that wraps the image, product name, and price a subview of the new
    view and center it in the view. Use the automatic snapping to guide you. Once
    the view is centered, use the springs and struts to make the view centered relative
    to its parent view (see [Figure 10–19](#Chapter10.html#fig_10_19)).


    ![images](images/1019.jpg)


    **Figure 10–19.** *Using springs and struts is a huge help to create views that
    autoresize.*


    **TIP:** The springs and struts configuration in Interface Builder simply sets
    the bitmask property `autoresizingMask` on `UIView`.  The default configuration
    is to have the top left of the view pinned to its frame''s origin. By having only
    the top margin selected (or set in code) and centered in its parent''s frame,
    we effectively make it centered no matter the width.


    Now that we have the interface elements in the nib, we still have some configuration
    to do to the other views. The Quantity Cell needs to have the quantity adjustment
    buttons and label pinned to the right. Use the springs and struts to accomplish
    this by selecting only the top margin and right margin options. The remaining
    cell, the one with the Add to Basket label, needs to have its label centered and
    the top margin option selected.


    Now that the interface elements are configured, we can wire them up to the view
    controller. [Figure 10–20](#Chapter10.html#fig_10_20) shows the final configuration
    of File''s Owner in terms of outlets and actions. Not every interface element
    will be wired up.


    ![images](images/1020.jpg)


    **Figure 10–20.** *The final configuration of File''s Owner*


    Ready to wire up the views? OK, here goes. First, let''s connect all of the outlets
    on File''s Owner, starting at the top:


    *   `addToBasketCell` is the generic table view cell.

    *   `productDetailsHeader` is the large view that wraps the product details.

    *   `productImage` is the `UIImageView` in the `productDetailsHeader`.

    *   `productNameLabel` is the name label in the `productDetailsHeader`.

    *   `productPriceLabel` is the price label in the `productDetailsHeader`.

    *   `quantityCell` is the entire quantity cell.

    *   `shoppingCartButton` is the button at the right of the toolbar that says “Cart.”

    *   `tableView` is the main (and only) table view in the nib.

    *   `toolbar` is the toolbar at the top of the main view.

    *   `view` is the `UIView` that wraps the table view and toolbar.


    Next, wire up the `dataSource` and delegate outlets on the table view to File''s
    Owner. The last part is to wire up the sent action from the `shoppingCartButton`
    to the `cartButtonPressed:` selector on File''s Owner. Everything is now wired
    up and ready to go.


    #### Modifying the Shopping Cart View Controller


    The final view controller to modify is the `ShoppingCartViewController`. The changes
    we need to make here are to update the “I''m done looking at this” button and
    make it idiom-aware and to update the checkout button and make sure it is centered
    in its view.


    The first thing we need to do is get a reference to the checkout button. We''re
    going to create an outlet in the source files and wire them up to the nib. To
    do this, open `ShoppingCartViewController.xib`, and enable the assistant view.
    If the editor is still showing the Manual selection, go to View ![images](images/U001.jpg)
    Editor ![images](images/U001.jpg) Reset Editor to reset the assistant editor to
    the Automatic selection. This will bring up the `ShoppingCartViewController.h`
    file in the assistant editor.


    The next step is to control-drag the checkout button into the source file (see
    [Figure 10–21](#Chapter10.html#fig_10_21)). Place the new property in the appropriate
    place, and make it an outlet called `checkoutButton`.


    ![images](images/1021.jpg)


    **Figure 10–21***. Interface Builder''s integration with Xcode makes creating
    outlets easy.*


    Because you''re using this integration, Xcode will automatically insert the instance
    variable, synthesize the property, and place the appropriate code in `dealloc`
    and `viewDidUnload`.


    Save all of the modified files by pressing command+option+S. Next, open `ShoppingCartViewController.m`,
    and look for the following line in `viewDidLoad`:


    `UIBarButtonItem *storeButton =`

    `    [[UIBarButtonItem alloc] initWithTitle:@"Store"`


    `style:UIBarButtonItemStyleBordered`


    `                                                                target:self`


    `action:@selector(backToStorePressed:)];`


    Remove that line and replace it with these:


    `UIBarButtonItem *storeButton = nil;`

    `if(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {`

    `    storeButton = [[UIBarButtonItem alloc] initWithTitle:@"Done"`


    `style:UIBarButtonItemStyleDone   `


    `target:self`


    `action:@selector(backToStorePressed:)];`

    `} else {`

    `    storeButton = [[UIBarButtonItem alloc] initWithTitle:@"Store"`


    `style:UIBarButtonItemStyleBordered`


    `target:self`


    `action:@selector(backToStorePressed:)];`

    `}`


    This section updates the type of button that is placed as the right button of
    the toolbar of the modal window that is displayed to present the user''s shopping
    cart.


    The next update to make is in `shouldAutorotateToInterfaceOrientation:`. Add the
    following code above the existing return statement:


    `if(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {`

    `    return YES;`

    `}`


    The last update to make is in `tableView:viewForFooterInSection:`. Before the
    return statement, add the following code:


    `if(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {`

    `    [checkoutButton setAutoresizingMask:UIViewAutoresizingNone];`

    `    [checkoutButton setFrame:CGRectMake(30, checkoutButton.frame.origin.y,  `

    `        self.view.frame.size.width - 60, checkoutButton.frame.size.height)];`

    `}`


    What we''re doing here is setting the autoresizing mask to none and resetting
    the frame of the button so it matches the surrounding cells.


    ### Finishing Up


    That''s it! We''ve successfully updated Super Checkout to be a universal binary.
    We were able to reuse almost all of the application and only had to create one
    iPad specific nib. The process we just went through is a great start with converting
    any other existing apps to run on both the iPad and iPhone/iPod Touch.


    The key step, as with any new project, was the first step. Designing the application
    and formulating the plan to convert the existing application to a universal binary
    was the most important phase; the rest was simply implementation and follow through
    of the design.


    Ideally, the application would be designed and developed as a universal application.
    This would reduce the number of workarounds that are implemented. A good thing
    to keep in the back of your mind while working on an application is to design
    with universal in mind. While the application you are working might run only on
    the iPhone/iPod Touch, a request to bring the application to the iPad might come
    later.


    The best way to accomplish a design that is ready for a univesal transition is
    to reduce the number of views that are created in code. If views must be created
    in code, avoid hard-coding sizes. Using an idiom-detecting APIs is also a key
    to specializing certain blocks of code to the iPad or the iPhone/iPod Touch. When
    using nibs, using the springs and struts to have automatically resizing views
    is also a good thing for nibs that will be used across all devices.


    Now that the application is a universal one, we can move on to bigger and better
    things as we deploy it to our beta testers. Commit the changes, and merge the
    branch back into the master branch and send out a beta version to your testers.
    Since they were asking for an iPad version, I''m sure they''ll be happy you listened
    and developed a solution fairly quickly.'
