  trans: '

    # 准备 Beta 版本！


    现在，我们有了一个自认为可以发布的应用。许多开发者都曾因自认为应用固若金汤，结果发布后却发现一堆 bug 而受挫。通常，作为开发者，你只会测试特定的应用路径或测试用例。有时，需要一双（和双手！）新人的眼睛才能真正让应用经受考验。


    这就是*Beta 测试*的用武之地。Beta 测试将应用发布给一小部分外部用户，他们被称为*测试人员*或*Beta 测试者*。目标是收集他们关于应用 Bug
    的反馈。你需要找到有耐心的用户，他们愿意忍受应用（可能）出现的异常甚至充满 Bug 的行为。你最不希望看到的，就是一个愤怒的测试者在应用尚未发布前就四处吐槽。


    当 Beta 测试人员使用应用时，如果应用崩溃，我们还需要捕获*崩溃报告*。如果你有精明的 Beta 测试者，当他们将设备同步到 `iTunes` 时，就能访问这些崩溃报告。还有其他几种选择，比如让应用通过电子邮件、发送到网络服务器，或发送到第三方服务（为我们分析崩溃报告）来传递崩溃数据。我们也会简要提及这些方法。


    要将应用分发给 Beta 测试者，你需要通过 iOS 配置门户使用一个临时配置描述文件。你可以通过 iOS 开发者中心访问该门户。这个流程可能比较复杂，但别担心，我们会一步步、一个屏幕一个屏幕地讲解。提醒一下，你需要成为
    iOS 开发者计划的成员（目前每年 99 美元）才能创建临时配置描述文件。我们会在本章稍后简要讨论该计划。如果你不是 iOS 开发者计划的成员，本章余下内容对你来说可能用途有限。


    ## 管理 Beta 测试


    我们认为我们的 Super Checkout 应用已经准备好接受外部测试了。但我们不能直接把应用扔到野外，指望有人会为我们测试它。这需要我们在前期做一些准备。我们可以将准备工作分解为五个步骤。在进入更详细的讨论之前，我们先简要描述一下这些步骤。


    首先，我们需要*定义* Beta 测试。我们想要什么样的测试者？我们想针对哪些设备进行测试？接下来，我们需要*获取* Beta 测试者。我们打算如何找到测试者？一旦测试者就位，我们必须*指导*他们。我们希望他们测试什么？他们应该如何提交反馈？


    现在我们已经说明了需要测试者做什么，接下来就可以*分发*应用并*整理*他们的反馈。准备应用分发的版本是一项艰巨的任务，所以我们将在“创建 Ad Hoc 构建”一节中讨论。之后，我们会简要讨论如何处理测试者的反馈。


    ### 定义 Beta 版本


    “定义 Beta 版本”是什么意思？意味着花一点时间规划 Beta 测试的目标。通常，如果这是你第一次将应用分发给测试者，你的目标可能是开放式的。你只是希望测试者让应用经受考验，发现所有
    Bug，并对通用可用性提出意见。随着测试的推进，你可能会发布解决特定问题的应用版本。这样一来，你可能希望用户专注于应用的特定部分。


    一旦确定了 Beta 测试的目标，我们就可以集中精力决定需要什么样的测试者。记住，找到认为你的应用有用的测试者至关重要。在我们的 Super Checkout
    案例中，如果有个测试者既不喜欢水果也不喜欢购物，他们可能就不是一个好的测试者。仅仅是因为他们觉得我们的应用没用，就不会去使用它。如果他们不使用，我们就得不到任何有意义的反馈，也发现不了任何
    Bug。


    最后，我们必须决定应用对设备的要求。你可能只针对最新、最强大的 iOS 设备和操作系统。或者，你可能针对某个特定设备上的多个操作系统版本。通常，你可能在开发应用之前就决定了这些，但这些标准可能会随着开发进展而改变。


    ### 获取 Beta 测试者


    我们如何找到 Beta 测试者？有几种方法可以尝试，但归根结底只有一个简单步骤：招募志愿者。任何你认为能最有效地找到应用目标用户的方法都可以。向朋友和家人求助是一种方法。或者你也可以通过各种网站、论坛或社交媒体来寻找愿意充当“小白鼠”的人。


    另一方面，成为 Beta 测试者也意味着需要承担一定的责任。应用开发者依赖你提供有意义的反馈。此外，提供崩溃报告和日志对于发现致命的应用 Bug 来说非常有帮助。我们稍后会展示如何查找崩溃报告。


    在发布消息之前，你可能需要考虑创建一个注册表格。如果你打算只组建一个小型测试组，这可能有点多余。但是，如果你预计会有大量响应（谁不想呢？），注册表格可能会有优势。它可以帮助你管理所有志愿者，以便你轮换测试者。如果你愿意，还可以获取关于测试者的特定信息。


    无论你如何追踪测试者，你都需要从他们那里获取一项关键信息：他们 iOS 设备的唯一设备标识符（UDID）。当设备连接到 `iTunes` 时，即可获取此信息。连接
    `iTunes` 后，在导航窗格中选择该设备。`iTunes` 将显示设备信息（参见 图 7–1）。


    ![images](img/0701.jpg)

    **图 7–1.** *iTunes 中的设备信息*


    点击“序列号”标签。该标签应变为显示“标识符 (UDID)”，后跟一个 40 字符的字符串（参见 图 7–2）。测试者需要将此字符串发送给你。


    ![images](img/0702.jpg)

    **图 7–2.** *iTunes 中的 UDID*

    '
- fmt: '### 向测试者提供说明


    至此，我们已经收到了大量希望参与我们应用 Beta 测试的申请。一旦选定了合适的用户，我们就可以向他们发送关于测试内容的说明。如前所述，如果这是第一轮测试，我们可能只需向用户提供如何使用该应用的说明。在后续版本发布时，我们再向用户提供具体的测试说明，指明需要测试应用的哪些部分，以及我们根据他们的反馈做了哪些修改。


    一项关键任务是指导测试人员如何提交 Bug。最简单的方法是让用户每次在应用中发现 Bug 时发送一封邮件。如果你的测试组规模非常小，这种方法可能可行。如果采用这种方式，定义一个标准的
    Bug 报告格式会是个好主意。但更好的方法是安装一个 Bug 跟踪系统。


    Bug 跟踪系统旨在帮助你跟踪 Bug（以及其他开发任务）。关于它们的工作原理以及如何帮助管理开发，我们可以长篇大论，但这超出了本书的范围。事实上，有人已经为此写了整本书。有几个可用的开源选项：


    *   Trac 项目 (`http://trac.edgewall.org`)

    *   Request Tracker (`http://bestpractical.com/rt/`)

    *   Bugzilla (`http://www.bugzilla.org/`)


    这绝非一个完整的列表，仅代表我们过去使用过的一些 Bug（和问题）跟踪系统。


    如果你确实设置了一个 Bug 跟踪系统，你可以指导你的 Beta 测试人员在那里提交报告。这将使你和他们的工作都更加轻松。


    最后，你可能需要指导测试人员如何提交崩溃报告。崩溃报告是在 iOS 设备上应用崩溃时生成的。当你将设备同步到 iTunes 时，崩溃报告会被传输到你的计算机上。崩溃报告位于`/Users/<USERNAME>/Library/Logs/CrashReporter/MobileDevice/<DEVICE_NAME>`。崩溃报告遵循的命名规范为`<APP_NAME>_YYYY-MM-DD-HHMMSS_<DEVICE_NAME>.crash`，其中`YYYY-MM-DD-HHMMSS`是崩溃发生的日期和时间。在提交应用崩溃报告时，要求用户附上崩溃报告，并说明应用崩溃时他们正在做什么。


    我们定义的下一步是应用分发。但在描述之前，我们需要知道如何为 Beta 测试者构建我们的应用。


    ### 创建 Ad Hoc 构建


    通常，你会通过 iTunes App Store 分发你的应用。这涉及到通过 iTunes Connect 上传你的应用，并等待 Apple 批准。但这不是分发应用进行
    Beta 测试的有效方式。首先，如果应用中有任何 Bug，Apple 会拒绝它。此外，Beta 测试的全部意义在于，在发布应用之前，从有限的用户群体中收集反馈。幸运的是，Apple
    提供了 Ad Hoc 分发方式，允许我们直接将应用分发给测试者。


    让我们开始创建我们的 Beta 应用。


    #### 证书、配置文件与分发，天哪！


    正如我之前提到的，创建 Beta 应用是一个复杂的过程。首先，我们需要创建一个证书签名请求。有了这个请求，我们再创建一个 iOS 分发证书。接下来，我们需要输入（或上传）Beta
    测试者设备的通用设备 ID（UDID）。然后，我们需要为我们的应用创建一个 App ID。最后，我们使用所有这些信息来创建我们的 Ad Hoc 分发配置文件。


    使用 iOS 分发证书和 Ad Hoc 分发配置文件，我们构建出 Beta 应用。然后我们将应用打包，连同配置文件一起分发给 Beta 测试者。之后，Beta
    测试者可以通过 iTunes 安装应用，并开始向我们发送反馈。


    ##### 创建证书签名请求


    证书签名请求是在你的计算机上使用“钥匙串访问”应用程序创建的。你可以在“应用程序”![images](images/U001.jpg) “实用工具”中找到“钥匙串访问”。启动“钥匙串访问”，你应该会看到如图
    7–3 所示的窗口。


    ![images](images/0703.jpg)


    **图 7–3.** *钥匙串访问应用程序窗口*


    通过“钥匙串访问”![images](images/U001.jpg) “偏好设置”打开偏好设置窗口，并选择“证书”标签页（见图 7–4）。将“在线证书状态协议
    (OCSP)”和“证书吊销列表 (CRL)”都设置为“关闭”。


    ![images](images/0704.jpg)


    **图 7–4.** *钥匙串访问偏好设置窗口的“证书”标签页*


    接下来，选择“钥匙串访问”![images](images/U001.jpg) “证书助理”![images](images/U001.jpg) “从证书颁发机构请求证书”（见图
    7–5）。应该会出现“证书助理”窗口（见图 7–6）。在“用户电子邮件地址”字段中填写你注册 iOS 开发者时使用的电子邮件地址。对于“常用名称”，填写你注册
    iOS 开发者时使用的公司/组织/部门名称。将“CA 电子邮件地址”字段留空。选择“存储到磁盘”，并勾选“让我指定密钥对信息”。点击“继续”。


    ![images](images/0705.jpg)


    **图 7–5.** *创建证书请求*


    ![images](images/0706.jpg)


    **图 7–6.** *证书助理窗口*


    系统会提示你保存一个名为`CertificateSigningRequest.certSigningRequest`的文件。如果需要，你可以更改文件位置，然后点击“存储”。证书助理窗口将发生变化，要求你提供密钥对信息（见图
    7–7）。将“密钥大小”设置为“2048 位”，并将“算法”设置为“RSA”（如果尚未设置）。点击“继续”。


    ![images](images/0707.jpg)


    **图 7–7.** *密钥对信息*


    证书助理应会创建证书请求并报告完成（见图 7–8）。你可以通过点击“在 Finder 中显示”来查看请求的位置。点击“完成”退出证书助理。


    ![images](images/0708.jpg)


    **图 7–8.** *证书助理，完成*


    现在我们已经创建了我们的证书请求，下一步就可以创建我们的 iOS 分发证书了。'
  raw: '#### Giving Instructions


    At this point, we''ve gotten a number people clamoring to beta test our application.
    Once we select the viable users, we can send them instructions on what we want
    tested. As mentioned earlier, if this is the first round of testing, we may simply
    provide users with instructions on how to use the application. As we send out
    subsequent builds, we provide users with specific instructions on which portions
    of the application to test and what changes we''ve made based on their input.


    One key task is to instruct our testers how to file bugs. The simplest approach
    would be to have users send an e-mail every time they encounter a bug in the application.
    This might work if you have a very small test group. If you do pursue this approach,
    it''s probably a good idea to define a standard bug reporting format. But a better
    approach would be to install a bug tracking system.


    Bug tracking systems are devised to help you keep track of bugs (and other development
    tasks). We could go on great length about how they work and how they help manage
    development, but that''s outside the scope of this book. In fact, people have
    written entire books about bug tracking systems. There are several open source
    options available:


    *   The Trac Project ([`http://trac.edgewall.org`](http://trac.edgewall.org))

    *   Request Tracker ([`http://bestpractical.com/rt/`](http://bestpractical.com/rt/))

    *   Bugzilla ([`http://www.bugzilla.org/`](http://www.bugzilla.org/))


    This is by no means a complete list, it just represents some the bug (and issue)
    tracking systems we''ve used in the past.


    If you do set up a bug tracking system, you can instruct your beta testers to
    file their reports there. It will make your life and theirs much easier.


    Finally, you may want instruct your testers how to submit crash reports. Crash
    reports are generated when an application crashes on your iOS device. The crash
    reports are then transferred to your computer whenever you synchronize your device
    to iTunes. The crash reports is located at `/Users/<USERNAME>/Library/Logs/CrashReporter/MobileDevice/<DEVICE_NAME>`.
    The crash reports follow a naming convention of `<APP_NAME>_YYYY-MM-DD-HHMMSS_<DEVICE_NAME>.crash`,
    where `YYYY-MM-DD-HHMMSS` is the date and time the crash occurred. When submitting
    an application crash report, ask the users to include the crash report along with
    a description of what they were doing when the application crashed.


    The next step we defined was application distribution. But before we can describe
    that, we need to know how to build our application for the beta testers.


    ### Creating Ad Hoc Builds


    Normally, you would distribute your application via the iTunes App Store. This
    involves uploading your application via iTunes Connect and waiting for your application
    to get approved by Apple. But that''s not an effective way to distribute an application
    for beta testing. First, if there are any bugs in your application, Apple will
    reject it. Additionally, the whole point of beta testing is to gather feedback
    from a limited set of users before releasing your application. Fortunately, Apple
    provides ad hoc distribution, which allows us to directly distribute our application
    to our testers.


    Let''s get started with creating our beta application.


    #### Certificates, Provisioning, and Distribution, Oh My!


    As I mentioned earlier, creating our beta application is a complicated process.
    First, we need to create a certificate request. Armed with this request, we then
    create an iOS distribution certificate. Next, we need to enter (or upload) the
    universal device IDs of our beta testers'' devices. Then, we need to create an
    App ID for our application. Finally, we use all that information to create our
    ad hoc distribution provisioning profile.


    Using with the iOS distribution certificate and the ad-hoc distribution provisioning
    profile, we build our beta application. We''ll package the application, and distribute
    it to our beta testers with the provisioning profile. From there, our beta testers
    can install the application via iTunes and start sending us feedback.


    ##### Creating a Certificate Request


    The certificate request is created on our computer, using the Keychain Access
    application. Keychain Access can be found in Applications ![images](images/U001.jpg)
    Utilities. Launch Keychain Access, and you should see a window like the one shown
    in [Figure 7–3](#Chapter07.html#fig_7_3).


    ![images](images/0703.jpg)


    **Figure 7–3.** *Keychain Access application window*


    Open the preferences window via Keychain Access ![images](images/U001.jpg) Preferences,
    and select the Certificates tab (see [Figure 7–4](#Chapter07.html#fig_7_4)). Set
    both Online Certificate Status Protocol (OCSP) and Certificate Revocation List
    (CRL) to Off.


    ![images](images/0704.jpg)


    **Figure 7–4.** *Certificates tab of Keychain Access Preferences window*


    Next choose Keychain Access ![images](images/U001.jpg) Certificate Assistant ![images](images/U001.jpg)
    Request Certificate From a Certificate Authority (see [Figure 7–5](#Chapter07.html#fig_7_5)).
    The Certificate Assistant window (see [Figure 7–6](#Chapter07.html#fig_7_6)) should
    appear. Fill in the User Email Address field with the email address used when
    you registered as an iOS developer. For Common Name, use the Company/Organization/Department
    name used when you registered as an iOS developer. Leave the CA Email Address
    field blank. Select “Saved to disk”, and check “Let me specify key pair information”.
    Click Continue.


    ![images](images/0705.jpg)


    **Figure 7–5.** *Creating a certificate request*


    ![images](images/0706.jpg)


    **Figure 7–6.** *Certificate Assistant window*


    You will be prompted to save a file named `CertificateSigningRequest.certSigningRequest`.
    You may change the file location if you wish, and click Save. The Certificate
    Assistant window will change to ask for key pair information (see [Figure 7–7](#Chapter07.html#fig_7_7)).
    Set Key Size to 2048 bits, and Algorithm to RSA, if it is not set to that already.
    Click Continue.


    ![images](images/0707.jpg)


    **Figure 7–7.** *Key pair information*


    The Certificate Assistant should create the certificate request and report back
    (see [Figure 7–8](#Chapter07.html#fig_7_8)). You may view the location of the
    request by clicking Show In Finder. Click Done to exit the Certificate Assistant.


    ![images](images/0708.jpg)


    **Figure 7–8.** *Certificate assistant, the conclusion*


    Now that we''ve created our certificate request, we can create our iOS distribution
    certificate.'
