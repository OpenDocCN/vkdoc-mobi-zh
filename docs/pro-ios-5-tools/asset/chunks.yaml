    ### UI Testing and the Automation Instrument


    Unit testing will help you break your application into smaller, independent, testable
    parts. Automated UI testing allows you to test the application as a whole. By
    scripting user journeys and testing expected outcomes, you can build a library
    of tests that will allow you to monitor changes in your application''s behavior
    and performance throughout the development cycle.


    In the development tools, automation is done in Instruments, using the Automation
    Instrument. The Automation Instrument simply allows you to record, edit, and run
    scripts on the simulator or device. The scripts are written in JavaScript using
    an API exposed by the UIAutomation framework. UIAutomation is a part of the Core
    Services Layer and uses UIKit''s accessibility features to traverse the hierarchy
    of visible elements.


    In order to get the most of UIAutomation, it''s a good idea to become really comfortable
    with UIAccessibility protocol and put it to use in your code. Interface Builder
    makes this extremely easy, providing direct access to the `accessibilityLabel`
    property and some of the `accessibilityTraits` data. If your application''s interface
    contains a lot of custom controls or gesture recognizers, it becomes incredibly
    important to use UIAccessibility to indicate to the scripting interface what roles
    your view objects are playing.


    **NOTE:** One of the added benefits of setting up automated testing is that it
    encourages you to make your interfaces accessible. This is one of the most overlooked,
    and most important, tasks when developing apps.


    The UIAutomation API''s root element is `UIAElement`. `UIAElement` provides the
    common interface for all interface elements. One of the most useful components
    of this object are its traversal methods. In addition to methods to access a given
    element''s parent or its children, `UIAElement` allows you to get a list of children
    of one of several different types. For example, if you have an element object
    that references a given `UIView`, you can get a list of all the buttons contained
    in that view like so:


    `var buttons = myViewElement.buttons();`


    This would return all subviews of the related view that report as buttons. That
    is, it would return all subviews that have an accessibilityTrait of `UIAccessibilityTraitButton`.
    `UIButton` has this set by default, but if you''ve made a `UIView` tappable using
    a gesture recognizer or the `UIResponder` methods, you''ll need to set this trait
    in order for UIAutomation to see it as a button.


    In addition to traversal, `UIAElement` provides methods to perform gestures and
    interactions on elements, inspect the element''s state, examine the accessibility
    details, and log the element to the Instrument''s logging interface. The gestural
    functionality of the element is perhaps the most interesting and useful for testing
    complex interfaces. For example, if your interface includes an element that can
    be dragged incrementally within a specified bounds, you could test this using
    the `dragInsideWithOptions` method. It might look something like this:


    `element.dragInsideWithOptions({`

    `        startOffset: { x: 0.0, y: 5.0 },`

    `        endOffset: { x: 24.0, y: 5.0 },`

    `        touchCount: 1,`

    `        duration: 1.5`

    `});`


    Beyond `UIAElement`, UIAutomation offers a library of objects that correspond
    to UIKit components plus several things that UIKit doesn''t give you direct access
    to, like the keys of the keyboard.


    In addition to the interface, UIAutomation offers a few objects to enable your
    scripts to interact with the device, the app, the instrument, and even the computer
    running the test.'
