    shown [Figure 4–27](#Chapter04.html#fig_4_27).


    ![images](images/0427.jpg)


    **Figure 4–27.** *GDB awaiting your command after breaking on a visual breakpoint*


    [Figure 4–27](#Chapter04.html#fig_4_27) shows the default prompt for the GDB debugger.
    Do not be afraid. It''s friendly. It knows how to add, multiply, and perform any
    C expression. Click next to the `(gdb)` prompt. We often use the `p` command followed
    by an expression for quick evaluations. Try typing `p 2+2` and pressing return.
    You should see the following output:


    `(gdb) p 2+2`

    `$1 = 4`


    You can build on the result. GDB sets dollar sign variables for expressions you
    enter. Let''s take our number and add 10:


    `(gdb) p $1+10`

    `$2 = 14`


    Play with it a bit. Soon, you may get bored. The real value in GDB is the ability
    to dynamically evaluate expressions, inspect variables, set breakpoints, and adjust
    variables'' values on the fly as you hunt down your memory bug.


    Remove the visual breakpoint by dragging the breakpoint out of the gutter into
    some other space. The breakpoint will then go “poof,” similar to the way an icon
    gets removed from the Dock in OS X. You can enable or disable breakpoints by selecting
    or deselecting the breakpoints button next to the scheme selector in the toolbar
    in Xcode.


    #### Determining Context—Where Am I?


    Now that you''re comfortable with typing some basic commands, let''s find a place
    where our application needs more debugging help. Run the application, and add
    a fruit to your cart. Move to the shopping cart view, and try to remove the item
    by touching the edit button or swiping the cell to delete it. The application
    blows up with an exception from the table view.  This is a great place to dive
    into GDB, since this is a runtime exception and not a memory issue. The exception
    occurs on line 170, so place a visual breakpoint on line 168, where we invoke
    `[tableView beginUpdates].`


    Stop the application, and rerun the application performing the same steps. This
    time the application halts at our breakpoint. Let''s see where our breakpoint
    has occurred in code. Click in the console panel, and enter the `l` command, for
    “listing,” and press return:


    `(gdb) l`

    `163        // Delete the row from the data source`

    `164        NSDictionary *item = [[shoppingCart objectForKey:@"items"] objectAtIndex:[indexPath
    row]];`

    `165`

    `166        [apiEngine removeProductFromCart:[item objectForKey:@"id"] withQuantity:[item
    objectForKey:@"quantity"]];`

    `167       `

    `168        [tableView beginUpdates];`

    `169        [tableView deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]
    withRowAnimation:UITableViewRowAnimationRight];`

    `170        [tableView endUpdates];`

    `171        `

    `172    }`

    `(gdb)`


    GDB shows a block of code that surrounds the current breakpoint. You can see more
    information about why GDB has stopped with the `backtrace` command, asking for
    the first item on the stack. That will be the most recent function call.


    `(gdb) bt 1`

    `#0  -[ShoppingCartViewController tableView:commitEditingStyle:forRowAtIndexPath:]`

    `(self=0x12e080, _cmd=0x31ab6e38, tableView=0x9c0c00,`

    `editingStyle=UITableViewCellEditingStyleDelete, indexPath=0x1b6750) at`

    `/Users/brandon/Development/iOS/Super Checkout/Super Checkout/../Super`

    `Checkout/ShoppingCartViewController.m:168`

    `(More stack frames follow...)`

    `(gdb)`


    We see that the debugger has stopped at line 168 of our source code. The listing
    showed us a visual context, a few lines before and after where it stopped. That''s
    the static part of your code. It gives you a sense of what your app is about to
    do. The debugger also shows the dynamic context, or the live stack of function
    calls that got you here in the first place.


    Let''s look a little deeper now. Type the command `bt 5`, which standards for
    “show me five function calls into the stack;” this command is called a backtrace:


    `(gdb) bt 5`

