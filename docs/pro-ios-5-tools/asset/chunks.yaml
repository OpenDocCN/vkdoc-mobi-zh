    \ Either way, you'll be presented with the view shown in [Figure 2–12](#Chapter02.html#fig_2_12).\n\
    \n![images](images/0212.jpg)\n\n**Figure 2–12.** *The commit sheet allows you\
    \ to inspect outgoing changes and enter a commit message.*\n\nSince we want all\
    \ of our changes to go into this commit, we won't deselect any of the files in\
    \ the Project view. Take a moment to look at the different views for the outgoing\
    \ changes: Project view, File view, and Flat view. The Project view shows your\
    \ changes in the context of how the project is structured in terms of the groups.\
    \ The File view shows the files as they exist on the file system. The Flat view\
    \ takes any structure out of the listing and lets you see a raw listing of files.\
    \ Now take a look at the built-in diff viewer, which shows the changes that will\
