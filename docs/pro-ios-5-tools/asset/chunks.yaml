  trans: "\n### 在超级结账中实现 ASI\n\n将 HTTP 请求代码抽象到其自身的类中的一个巨大好处是，能够更改请求代码的外观，而无需进行任何其他更改。我们将保持启动请求的模块与委托之间的契约不变，并彻底重构幕后代码。\n\
    \n准备好了吗？我们开始吧！\n\n打开 `SuperCheckoutAPIEngine.m`，并将 `#import` 部分更新为代码清单 6-1 所示的内容。\n\
