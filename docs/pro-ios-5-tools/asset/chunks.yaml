    \ release];\n[fetchRequest release];\n[sortDescriptor release];\n[sortDescriptors\
    \ release];\n\n    NSError *error = nil;\n    if (![self.fetchedResultsController\
    \ performFetch:&error])\n    {\n        /*\n         将此处实现替换为适当处理错误的代码。\n\n  \
    \       abort() 会导致应用程序生成崩溃日志并终止。在生产应用程序中不应使用此函数，尽管它在开发过程中可能有用。如果无法从错误中恢复，请显示一个警告面板，指导用户通过按下\
    \ Home 键退出应用程序。\n         */\n        NSLog(@\"未解决的错误 %@, %@\", error, [error\
    \ userInfo]);\n        abort();\n    }\n\nreturn __fetchedResultsController;\n\
    }\n```\n\n最后要做的一件事是在头文件导入语句下方添加 `#import \"Person.h\"`。到目前为止，我们只更新了 `RootViewController`\
    \ 来显示每个人的全名。我们还更新了它，以便在点击 Add 按钮时输入一个虚拟名称。既然我们已经做了一些更新并添加了一项功能，让我们将这些更改提交到 Git\
    \ 仓库。\n\n首先，看一下项目导航器。你应该会看到类似于图 2–11 的内容。\n\n![images](img/0211.jpg)\n\n**图 2–11.**\
    \ *项目导航器使用你的源代码控制系统来跟踪文件，并显示哪些文件已被修改、哪些是新文件。*\n\n现在，我们将所有修改过的文件作为一个 Git 提交（commit）的一部分进行提交。有多种方式可以实现此目的：选择\
    \ **文件 ![images](img/U001.jpg) 源代码控制 ![images](img/U001.jpg) 提交**，或者选择要添加到提交中的修改文件，右键单击，然后选择**源代码控制\
    \ ![images](img/U001.jpg) 提交所选文件...**。无论哪种方式，你都会看到如图 2–12 所示的视图。\n\n![images](img/0212.jpg)\n\
    \n**图 2–12.** *提交表单允许你检查待推送的更改并输入提交信息。*\n\n因为我们希望所有更改都进入此提交，所以不会取消选中项目视图中的任何文件。花点时间查看待推送更改的不同视图：项目视图、文件视图和平铺视图。项目视图按组结构显示项目中的更改上下文。文件视图按文件在文件系统中的实际存在方式显示文件。平铺视图则去掉列表中的任何结构，让你看到文件的原始列表。现在看一下内置的差异查看器，它会显示即将提交的更改。你可以通过右键单击任一编辑器视图来复制源代码更改，这样会以补丁格式的差异内容放入剪贴板。\n\
    \n作为优秀的开发者，我们将在提交信息中填写一些有意义的内容，比如：“changes”或“Continued development”。继续输入提交信息并点击提交。"
- fmt: "### Adding a New View Controller\n\nNow that our application has a modified\
    \ model and we're able to add some managed objects, let's create a modal view\
    \ controller to insert new objects that come from user input. Before we add the\
    \ files, create a new group called `NewPersonViewController` under the Super Hello\
    \ World group (by right-clicking Super Hello World and selecting `New Group`).\
    \ Next, add a new file to this group by right-clicking the group and selecting\
    \ `New File`. Select the `UIViewController` subclass, and click Next. Make it\
    \ a subclass of `UITableViewController`, and check \"With XIB for user interface.\"\
    \ Click Next, name the file `NewPersonViewController.m`, and click Save.\n\nLet's\
    \ add some custom cells. Open the `NewPersonViewController.xib` file, turn on\
    \ Assistant editor mode, and make sure the header file is open to the right of\
    \ the `.xib` file. We're going to add some custom table cells to our XIB and plug\
    \ them into our new view controller. The library of user interface (UI) elements\
    \ to drag into the XIB is located at the bottom of the Utilities pane. Click \"\
    Show the Object library\", and drag in two `UITableViewCell` items (shown as Table\
    \ View Cell in the list). Drag a `UITextField` (Text Field in the list) inside\
    \ each of those cells, and modify the border style to be invisible (by clicking\
    \ the \"Show the Attributes inspector\" button in the Utilities pane and selecting\
    \ the first button in the Border Style tab bar). Set the placeholder text to be\
    \ **First Name** and **Last Name** respectively. Close the Utilities pane, and\
    \ control-drag the First Name cell (`UITableViewCell`, not `UITextField`) to the\
    \ header file (open in the right editor pane), putting the cursor where you would\
    \ place properties—under the closing curly bracket of the interface declaration.\
    \ Name the property `firstName`. Do the same with the last name cell, naming it\
    \ `lastName`.\n\nYou have created the outlet properties for the cells; now, we're\
    \ going to create outlet properties for the text fields. Control-drag the text\
    \ fields themselves and name them: `firstNameInput` and `lastNameInput`. [Figure\
    \ 2–13](#Chapter02.html#fig_2_13) shows the final product.\n\nSo far, we've created\
    \ a new view controller, modified the XIB to include some new interface elements,\
    \ and tied the XIB to the class. Now, let's fill in the details. [Listing 2–2](#Chapter02.html#list_2_2)\
    \ shows the updates we're making to the header for the new person view controller.\n\
    \n**Listing 2–2.** *The modifications for NewPersonViewController.h*\n\n```\n\
    #import <UIKit/UIKit.h>\n\n#define kSectionCount    1\n#define kRowCount     \
    \     2\n\n@class Person;\n\n@class NewPersonViewController;\n\n@protocol NewPersonViewControllerDelegate\
    \ <NSObject>\n\n@required\n-(void) viewController:(NewPersonViewController *)vc\
    \ didSaveWithPerson:(Person *)p;\n-(void) viewControllerDidCancel:(NewPersonViewController\
    \ *)vc;\n\n@end\n\n@interface NewPersonViewController : UITableViewController\
    \ {\n    id<NewPersonViewControllerDelegate> delegate;\n    UITableViewCell *firstNameCell;\n\
    \    UITableViewCell *lastNameCell;\n    UITextField *firstNameInput;\n    UITextField\
    \ *lastNameInput;\n\n    NSManagedObjectContext *managedObjectContext;\n}\n@property\
    \ (nonatomic, assign) id<NewPersonViewControllerDelegate> delegate;\n@property\
    \ (nonatomic, retain) IBOutlet UITableViewCell *firstNameCell;\n@property (nonatomic,\
    \ retain) IBOutlet UITableViewCell *lastNameCell;\n@property (nonatomic, retain)\
    \ IBOutlet UITextField *firstNameInput;\n@property (nonatomic, retain) IBOutlet\
    \ UITextField *lastNameInput;\n@property (nonatomic, retain) NSManagedObjectContext\
    \ *managedObjectContext;\n\n@end\n```\n\n[Listing 2–3](#Chapter02.html#list_2_3)\
    \ shows the modified version of the implementation of the `NewPersonViewController`\
    \ class.\n\n**Listing 2–3.** *The updated NewPersonViewController.m*\n\n```\n\
    #import \"NewPersonViewController.h\"\n#import \"Person.h\"\n\n@implementation\
    \ NewPersonViewController\n@synthesize delegate;\n@synthesize firstNameCell;\n\
    @synthesize lastNameCell;\n@synthesize firstNameInput;\n@synthesize lastNameInput;\n\
    @synthesize managedObjectContext;\n\n- (void)dealloc\n{\n        delegate = nil;\n\
    \        [firstNameCell release], firstNameCell = nil;\n        [lastNameCell\
    \ release], lastNameCell = nil;\n        [firstNameInput release], firstNameInput\
    \ = nil;\n        [lastNameInput release], lastNameInput = nil;\n        [managedObjectContext\
    \ release], managedObjectContext = nil;\n        [super dealloc];\n}\n\n- (void)didReceiveMemoryWarning\n\
    {\n    // Releases the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
    \n    // Release any cached data, images, etc that aren't in use.\n}\n\n#pragma\
    \ mark - View lifecycle\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n\
    \    // Uncomment the following line to preserve selection between presentations.\n\
    \    // self.clearsSelectionOnViewWillAppear = NO;\n\n    // Uncomment the following\
    \ line to display an Edit button in the navigation bar for this view controller.\n\
    \    UIBarButtonItem *saveButton = [[UIBarButtonItem alloc]    \n        initWithBarButtonSystemItem:UIBarButtonSystemItemSave\
    \ target:self action:@selector(savePressed:)];\n    self.navigationItem.rightBarButtonItem\
    \ = saveButton;\n    [saveButton release];\n\n    UIBarButtonItem *cancelButton\
    \ = [[UIBarButtonItem alloc]\n        initWithBarButtonSystemItem:UIBarButtonSystemItemCancel\
    \ target:self\n        action:@selector(cancelPressed:)];\n    self.navigationItem.leftBarButtonItem\
    \ = cancelButton;\n    [cancelButton release];\n}\n\n- (void)viewDidUnload\n{\n\
    \    [self setFirstNameCell:nil];\n    [self setLastNameCell:nil];\n    [self\
    \ setFirstNameInput:nil];\n    [self setLastNameInput:nil];\n    [super viewDidUnload];\n\
    \    // Release any retained subviews of the main view.\n    // e.g. self.myOutlet\
    \ = nil;\n}\n\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    }\n\n- (void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear:animated];\n\
    }\n\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    }\n\n- (void)viewDidDisappear:(BOOL)animated\n{\n    [super viewDidDisappear:animated];\n\
    }\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
    \ == UIInterfaceOrientationPortrait);\n}\n\n#pragma mark - Table view data source\n\
    \n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n    //\
    \ Return the number of sections.\n    return kSectionCount;\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    // Return the number\
    \ of rows in the section.\n    return kRowCount;\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n        if([indexPath\
    \ row] == 0) {\n                return firstNameCell;\n        } else {\n    \
    \            return lastNameCell;\n        }\n}\n\n#pragma mark - Table view delegate\n\
    \n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    //Nothing to see here, move along\n}\n\n#pragma mark - Actions\
    \ received\n\n-(void) savePressed:(id)sender {\n    NSManagedObjectContext *context\
    \ = [self managedObjectContext];\n\n    Person *newPerson = (Person *)[NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Person\"   \n        inManagedObjectContext:context];\n\
    \n    [newPerson setFirstName:[firstNameInput text]];\n    [newPerson setLastName:[lastNameInput\
    \ text]];\n\n        NSError *error = nil;\n    if (![context save:&error])\n\
    \    {\n        /*\n         Replace this implementation with code to handle the\
