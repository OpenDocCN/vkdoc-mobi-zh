    \n**图 8–17.** *调用`logFail()`会自动截图。这对于调试失败非常有用。*\n"
- fmt: "# Introducing a Bug\n\nNow that you have a fully functional Automation test\
    \ script that tests a given user flow successfully, let's look at how this can\
    \ be useful. Unlike unit tests, it's extremely difficult, though not at all impossible,\
    \ to write Automation scripts before you've built your application. You should\
    \ definitely document and plan out your user journeys and interfaces, and you\
    \ could absolutely write scripts based on that documentation, but writing scripts\
    \ by hand can be tedious. The primary use cases for automated interface testing\
    \ are to maintain the integrity of user journeys, weeding out regression bugs\
    \ as development proceeds, and performance testing. Let's take a look at how your\
    \ test can accomplish this in your app.\n\nAs an example, imagine you've adopted\
    \ a new logging format and need to update the `NSLog` functions used throughout\
    \ your app. You're working on the `ProductDetailsViewController`. When the API\
    \ engine notifies you that it received your request to add a product to the cart,\
    \ you post a notification and make a log message. This needs to be re-worked,\
    \ and during the development process, you absent-mindedly make a few minor mistakes.\n\
    \nBefore your changes, the method looked like this:\n\n```\n-(void) cartContentsReceived:(NSDictionary\
    \ *)cart forRequest:(NSString *)connectionIdentifier {\n        NSLog(@\"Shopping\
    \ cart contents: %@\", cart);\n        NSNotification *note = [NSNotification\
    \ notificationWithName:@\"CartUpdated\" object:[NSNumber numberWithInt:[[cart\
    \ objectForKey:@\"items\"] count]]];\n\n        [[NSNotificationCenter defaultCenter]\
    \ postNotification:note];\n\n        [self.navigationController popViewControllerAnimated:YES];\n\
    }\n```\n\nThe new method, which was intended to simply add more logging, looks\
    \ like this:\n\n```\n-(void) cartContentsReceived:(NSDictionary *)cart forRequest:(NSString\
    \ *)connectionIdentifier {\n        NSLog(@\"%s Shopping cart contents: %@\",\
    \ __PRETTY_FUNCTION__, cart);\n        NSNotification *note = [NSNotification\
    \ notificationWithName:@\"CartUpdated\" object:[NSNumber numberWithInt:[[cart\
    \ objectForKey:@\"items\"] count]]];\n\n        [[NSNotificationCenter defaultCenter]\
    \ postNotification:note];\n\n        NSLog(@\"%s Notification posted: %@\", __PRETTY_FUNCTION__,\
    \ note);\n}\n```\n\nYou may notice that there is one major undesirable difference\
    \ between the old method and the new. In your overzealous logging efforts, you\
    \ accidentally removed the last line of the method, which popped the current view\
    \ controller off of the stack.\n\nThis kind of bug is particularly difficult to\
    \ detect with the naked eye, because it does not present itself as a bug. The\
    \ application does not crash, the item is still added to the user's cart, and\
    \ when the user taps the back button, the cart button has been updated to display\
    \ the new quantity. The only change has been to the user experience.\n\nNow, let's\
    \ run the script on the app to see if it can help you find this nasty interface/regression\
    \ bug. Hit Control+I to launch Instruments and set up an Automation tool. Run\
    \ the script you ran earlier. As soon as you get to the test in which the product\
    \ is added to the cart, the script looks for a button in the navigation bar with\
    \ a label that reflects the new number of cart items.\n\n```\nvar cartButton =\
    \ target.frontMostApp().mainWindow().navigationBar().rightButton();\nvar quantity\
    \ = i + 1;\n\nif(cartButton.label().search(\"(\"+quantity+\")\") == -1) {\n  \
    \      UIALogger.logFail(\"Expected cart button to display \"+quantity+\" items,\
    \ but found \"+cartButton.label());\n} else {\n        UIALogger.logPass();\n\
    }\n```\n\nSince you've accidentally modified the flow of the application, this\
    \ script will fail. Fortunately, you'll get a screenshot recorded of the moment\
    \ the script failed, along with a message indicating what went wrong. It shouldn't\
    \ be terribly difficult to isolate the section of code responsible and then examine\
    \ the revision history to find what changed.\n\n# The Power of Automation\n\n\
    In addition to finding bugs and ensuring user experience integrity, automation\
    \ can help you fine-tune your app's performance. By coupling it with other instruments,\
    \ you can get a detailed view of how your app is behaving under a variety of circumstances.\
    \ Writing scripts for all of your user flows and use cases is a great idea. When\
    \ all of these scripts have been written, you can run them in conjunction with\
    \ the CoreData instruments to find places where you might want to optimize your\
    \ fetching. You can add in the Allocations instrument to see how much memory your\
    \ app is using at any given time to find possible detrimental spikes to smooth\
    \ out ([Figure 8–18](#Chapter08.html#fig_8_18)).\n\n![images](images/0818.jpg)\n\
    \n**Figure 8–18.** *Using other instruments together with Automation lets you\
    \ to tie data back to user actions.*\n\nSetting up and using automation early\
    \ in your development cycle and scripting all of your user interactions will pay\
    \ off greatly in the long run, both in better performance and more sanity.\n\n\
    ## Test, One Way or Another\n\nThat's testing, in a nutshell. You've got the beginnings\
    \ of a unit test suite, your JSON parser-wrapper is a little better off than when\
    \ you started, and you've got most of your use cases scripted for the automation\
    \ instrument. Admittedly, this has all been very ad hoc. What you really need\
    \ is a testing strategy.\n\nYour testing strategy is what brings method to the\
    \ madness. As you saw, testing takes time to set up, regardless of how much time\
    \ it can save. It can do you a lot of good, and save you a lot of time, but if\
    \ it's always an afterthought, you won't get the most out of it.\n\nWhether you're\
    \ a TDD stickler or just need to figure out why your app is leaking memory left\
    \ and right, testing is an important skill to learn, and Xcode and the developer\
    \ tools well help you do it.\n\n# Chapter 9\n\n# Can We Automate Some of This?\n\
    \nNow that your app is being thoroughly tested and your beta is underway, you're\
    \ starting to get requests for some new features. You've decided to bring a couple\
    \ more people onto the project to help get it over the line. The new developers\
    \ are good, but they aren't as intimately familiar with the inner workings of\
    \ your lovely app as you are, so you're concerned that they might get in there\
    \ and accidentally wreck the place. You're very busy fixing bugs and adding features,\
    \ so you can't spare the time it takes to run all the tests and static analysis\
    \ every time one of the new developers pushes an update to the project. Not only\
    \ that, but adding developers always increases risk in integration bugs, especially\
    \ on small projects.\n\nFortunately, you're far from the first person to experience\
    \ this. In fact, this is such a common problem that there are entire methodologies,\
    \ processes, and enterprise-level applications in place to help manage development\
    \ teams. You're not going to implement a new methodology, but you are going to\
    \ introduce a process and some software that will help the team work better and\
    \ keep your app on the right path."
