  trans: '

    ### 确认


    输入或上传设备信息后，您应会返回“管理”选项卡下的“设备”页面。要确认设备已添加，请滚动到页面底部。在那里，您将看到所有已录入信息的设备列表。


    ### 创建我们的应用程序 ID


    现在，我们需要在配置门户中为我们的应用程序创建一个条目。这些信息将用于构建分发给 Beta 测试人员的应用程序。


    在 iOS 配置门户菜单中，点击 `App IDs`。与“设备”页面类似，“管理”选项卡应处于选中状态（参见图 7-23）。由于这是您的第一个应用程序，页面底部应没有列出任何
    `App IDs`。如果已列出了 `SuperCheckout` 应用程序，您可以跳到**临时分发配置描述文件**部分。否则，请点击标有 `New App
    ID` 的按钮。


    ![images](img/0723.jpg)


    **图 7-23.** *iOS 配置门户页面的 App IDs 页面*


    管理窗格应刷新并显示一个表单，用于输入您的应用程序信息（参见图 7-24）。`Description` 字段是用于标识应用程序的简单名称。（注意：`App
    IDs` 是永久的！请确保名称唯一！）输入 `SuperCheckout`。`Bundle Seed ID`（`App ID 前缀`）是一个唯一的十字符序列。将此选项保持为
    `Use Team ID`。`Bundle Identifier`（`App ID 后缀`）是您的应用程序的唯一标识符。惯例是使用反向 DNS 风格名称。使用值
    `com.whilethis.SuperCheckout`。点击 `Submit`。


    ![images](img/0724.jpg)


    **图 7-24.** *新建 App ID 表单*


    完成后，您应返回到“App IDs”页面的“管理”选项卡。新的 `App ID` 应出现在页面底部（参见图 7-25）。


    ![images](img/0725.jpg)


    **图 7-25.** *新建的 App ID 条目*


    快了。现在，我们需要创建一个临时分发配置描述文件。


    ### 临时分发配置描述文件


    在 iOS 配置门户菜单中，点击 `Provisioning`。进入配置页面后，选择 `Distribution` 选项卡（参见图 7-26）。点击 `New
    Profile` 按钮。


    ![images](img/0726.jpg)


    **图 7-26.** *配置页面的分发选项卡*


    分发窗格应刷新并显示一个表单（参见图 7-27）。首先，在 `Distribution` 标签下，选中 `Ad Hoc` 单选按钮。`Profile Name`
    字段用于输入描述性文本。我们将使用 `SuperCheckout AdHoc Provisioning Profile`。iOS 配置门户应已自动选择了我们之前创建的
    `Distribution Certificate`。对于 `App ID`，选择我们之前创建的 `SuperCheckout ID`。最后，选择您希望应用程序能在其上运行的设备。这应是您的
    Beta 测试人员的设备列表。选择所有设备后，点击 `Submit`。


    ![images](img/0727.jpg)


    **图 7-27.** *新建的分发配置描述文件条目*


    提交后，分发窗格应刷新，列出新的临时分发配置描述文件。其状态应显示为 `Pending`（参见图 7-28）。等待片刻，然后点击 `Distribution`
    选项卡刷新视图。状态应变为 `Active`（参见图 7-29）。


    ![images](img/0728.jpg)


    **图 7-28.** *临时分发配置描述文件待激活*


    ![images](img/0729.jpg)


    **图 7-29.** *临时分发配置描述文件已激活*


    点击新配置描述文件的 `Download` 按钮。这会将名为 `SuperCheckout_AdHoc_Provisioning_Profile.mobileprovision`
    的文件下载到您的电脑上。记下文件的位置，因为我们稍后会用到它。


    我们经历了不少步骤来创建临时分发配置描述文件（即刚下载的 `.mobileprofile` 文件）。现在，让我们构建 Super Checkout 的 Beta
    版本，以便分发给我们的 Beta 测试人员。


    ### 构建 Beta 版本


    如果尚未打开，请在 Xcode 中打开 Super Checkout 项目。我们要做的第一件事是安装刚创建的配置描述文件。打开 Finder，导航到 `SuperCheckout_AdHoc_Provisioning_Profile.mobileprovision`
    文件下载的位置。将该文件拖到 Dock 上的 Xcode 图标上。如果操作正确，Xcode Organizer 窗口应会打开，并列出该配置描述文件（参见图
    7-30）。


    ![images](img/0730.jpg)


    **图 7-30.** *新安装的配置描述文件*


    返回 Super Checkout 项目窗口。点击导航窗格顶部的项目名称，进入项目编辑器视图。在项目编辑器视图中选择目标 `Super Checkout`，然后选择
    `Build Settings` 选项卡。确保通过选择 `Build Settings` 选项卡下方一行中的 `All` 按钮来显示所有构建设置。向下滚动直到找到
    `Code Signing` 部分。找到标有 `Code Signing Identity` 的行并展开它。在 `Release` 字段下，将值更改为 `SuperCheckout_AdHoc_Provisioning_Profile`
    标题下的分发描述文件（参见图 7-31）。对标有 `Any iOS SDK` 的行下的 `Release` 行执行相同操作。


    ![images](img/0731.jpg)


    **图 7-31.** *更改发布版本的代码签名标识*


    现在，我们需要归档应用程序以便将其打包以进行分发。首先，在 Xcode 工具栏的方案弹出菜单中选择 `iOS Device`。然后选择 **项目** ![images](img/U001.jpg)
    **归档**。在应用程序构建过程中，可能会弹出一个窗口，显示“`codesign` 想要使用您钥匙串中的密钥“XXX”进行签名”（参见图 7-32）。点击
    `Allow`。此窗口可能会再次出现。如果出现，只需点击 `Allow`。`codesign` 是一个将 Super Checkout（或任何其他应用程序）与分发证书和配置描述文件打包在一起的应用程序。


    ![images](img/0732.jpg)


    **图 7-32.** *`codesign` 请求访问您的钥匙串*


    应用程序编译、签名和归档完成后，Xcode 应会打开 Organizer 窗口，显示归档视图（参见图 7-33）。新的 Super Checkout 归档应被列出。选择
    `Super Checkout`，然后点击上部窗格右侧的 `Share` 按钮。Xcode 将显示一个窗格，询问您希望如何共享归档（参见图 7-34）。


    ![images](img/0733.jpg)


    **图 7-33.** *Xcode Organizer 窗口，归档视图*


    ![images](img/0734.jpg)


    **图 7-34.** *共享配置窗格*


    在“内容”选项中，选择 `iOS App Store Package (.ipa)` 单选按钮。并为“标识”选择适当的分发描述文件。该分发描述文件应与您在
    Xcode 中为“代码签名标识”配置的匹配。系统可能会询问您是否允许 `codesign` 访问您的钥匙串。和之前一样，只需点击 `Allow`。最后，将出现一个文件对话框，用于保存文件
    `app.ipa`。选择一个位置，并将文件保存为 `SuperCheckout.ipa`。

    '
- fmt: '### Distributing the Beta


    Whew, that was a lot of work. Now we have two files: the application package,
    `SuperCheckout.ipa`; and the provisioning profile, `SuperCheckout_AdHoc_Provisioning_Profile.mobileprovision`.
    These are the two files you distribute to your beta testers. How you distribute
    these files is entirely your decision. With a small group of testers, it may be
    easier to email them. Remember that many email services limit the size of attachments
    (generally 10MB). So some users may not receive the larger application package.


    Generally, it''s a good idea to upload the files to a location where your testers
    can access them. If you wish to password protect it you may. You don''t need to
    worry extensively about non-testers downloading and running your application.
    The provisioning profile and codesigning will ensure that the application will
    only run on the devices you specified.


    Once your beta testers have received the files, they simply need to launch iTunes,
    then drag the two files to the iTunes icon on the dock. At that point, the application
    is available to install on their iOS device.


    ### Alpha, Beta, Gamma?


    Now you''ve built a beta version of your application and distributed it to your
    testers. That was the easy part. Beta testing is an iterative process. Soon your
    testers will be submitting bug and crash reports. You''ll have to analyze those
    reports and determine if a bug is really a bug, if the tester misunderstands the
    application, or if the application just needs to be redesigned.


    As an addendum, there are several tools that aid in the beta testing process.
    Several developers we know have used them. We mention them here just to make you
    aware of them.


    Several open source crash reporting frameworks have been developed; they aid in
    the automated delivery and interpretation of application crash reports:


    *   Plausible Labs'' CrashReporter (`http://code.google.com/p/plcrashreporter/`)

    *   ParveenKaler''s CrashKit (`https://github.com/kaler/CrashKit`)

    *   QuincyKit (`http://quincykit.net/`)

    *   Steve Streza''s CrashReporter (`https://github.com/amazingsyco/CrashReporter`)


    There are a number of services out there that aid in the management of beta distribution,
    bug reporting and crash reporting:


    *   Hockey App (`http://www.hockeyapp.net`) built on top of QuincyKit

    *   BugSense (`http://www.bugsense.com/`)

    *   TestFlight (`https://testflightapp.com/`)


    All three of these services offer crash report collection and analysis. They then
    collate the errors and attempt to assist with tracking down bugs. Hockey App and
    TestFlight also provide mechanisms for distributing applications to your beta
    testers.


    Evaluate these frameworks and services and see if they fit your needs.


    ### Summary


    We''ve described how you might manage your beta testing process, from determining
    your beta testing goals to finding developers. Most importantly, we explained
    how to instruct your beta testers to submit feedback and crash reports. To distribute
    our beta application, we covered how to create an ad hoc provisioning profile.
    It''s a complicated process that involves registering our application and our
    beta testers'' device IDs. Armed with the beta application and provisioning profile,
    we are able to send them to our testers for review.


    In the next chapter, we''ll cover testing our application in an automated fashion.
    You''ll learn how to convert our beta testers'' bug reports into a testing bundle.
    By creating this testing bundle, it will help prevent the same bugs from appearing
    in our application again and again (developers call this regression).


    ## Chapter 8


    ## Why Are Things Breaking?


    Development is over, the beta is out in the wild, and for the first time in weeks,
    you can sit back and relax. Right? Well, it''d be great if things were that easy,
    but they aren''t, and now you''re getting bug reports. Things are crashing, things
    are slow, and people are finding new and uncharted user journeys, which take them
    far away from the happy path you so carefully laid out before them.


    Don''t worry! There are many things you can do to find and fix these problems.
    The tools provided in the SDK make things much easier. But wouldn''t it be great
    if there was a way to prepare for these problems in advance? If only there were
    some sort of methodology that focused on finding issues during development, rather
    than waiting for the bug reports to come rolling in.


    ![images](images/square.jpg) **NOTE:** Before going on, I want to point out that
    this chapter isn''t solely devoted to any one process or methodology. Testing
    is important, no matter how you write your code. The important thing to learn
    here is how to test your app well, and how Xcode and the SDK tools make it easy
    to do so.


    ### Test Driven Development


    Test Driven Development (TDD) is a development methodology that places primary
    focus on (you guessed it) testing. In most development workflows or methodologies,
    testing is used as a means to measure the quality of code during, but usually
    after, development ([Figure 8–1](#Chapter08.html#fig_8_1)). TDD (see [Figure 8–2](#Chapter08.html#fig_8_2))
    goes a step further than this by using tests to help design and plan your codebase
    before you start writing code.


    ![images](images/0801.jpg)


    **Figure 8–1.** *A non-TDD workflow puts emphasis on writing code, rather than
    testing.*


    ![images](images/0802.jpg)


    **Figure 8–2.** *The TDD workflow places writing code at the end of the lifecycle.*


    You''ll notice that the TDD workflow ([Figure 8–2](#Chapter08.html#fig_8_2)) has
    the same steps in a very different order. In TDD, you build against your tests,
    rather than the requirements or specs. Theoretically, when all of your tests pass,
    you should have a finished product that matches your requirements (and is bug
    free).


    Notice the third and fourth steps in the TDD flow. When you''ve finished your
    test suite, you run the tests and catalog bugs. You do this before writing any
    code. If you find yourself thinking "But then all the tests will fail," you''re
    right. You could argue that the purest form of TDD views the application as a
    series of defects that need to be fixed. The application isn''t finished when
    it runs; it''s finished when all of the tests pass. Since the test suite was designed
    to ensure the requirements were met, the tests become the measure of completion,
    rather than simply a measure of quality.


    **DON''T BE AFRAID OF TDD. (YOU''RE PROBABLY DOING IT ALREADY.)**


    If you haven''t been exposed to it much, TDD (or testing, for that matter) can
    be a little daunting. The good news is, it''s a lot more natural than you might
    expect. The great news is, you''re probably already practicing it in a few ways
    you didn''t realize. For example, before you start building a user interface,
    you probably plan the user journey, sketch out the possible flows, and write down
    interaction steps and expected results. Believe it or not, that''s TDD. Test scripts,
    unit tests, automated user interface tests, manual user interface tests; these
    are all part of TDD.'
