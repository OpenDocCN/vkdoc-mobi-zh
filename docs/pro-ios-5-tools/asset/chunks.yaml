  trans: '

    ### 明智地选择许可证


    既然你已在 GitHub 上创建了一个项目，就需要为代码挑选一个许可证。由于你的仓库是公开的，你可能希望使用开源许可证。在开源社区中，对于什么才是“开源”项目，不同的人会有不同看法。一般来说，开源软件是指以源代码形式发布，并附带许可证的软件，该许可证允许用户使用、自由修改、并以原始或修改后的形式分发该软件。开源许可证的意图在于，允许软件的任何用户都能根据自身需求修改代码，并帮助社区修复错误和进行改进。


    可供选择的开源许可证种类繁多。在开源促进会（OSI）网站（[`http://opensource.org/`](http://opensource.org/)）上可以找到一个相当全面的列表。该网站提供了一个简单的十点检查清单，用以定义什么是开源许可证，以及一份满足这些标准的许可证完整列表。


    ### 本章小结


    本章我们涵盖了大量内容。我们从 Super Checkout 应用中提取了可复用的组件，并将它们放入静态库中。然后，我们使用子项目和工作区的方法，将这些代码重新集成到项目中。最后，我们通过
    GitHub 与世界分享了我们的项目，从而改善了全世界 iOS 开发者的生活。这样，即便 Super Checkout 没有成为 App Store 的畅销品（绝不可能！），我们仍能赢得其他
    iOS 黑客同行的喜爱和尊重。


    在合上本书继续前进之前，我还有“最后一件事”要与你分享。是什么呢？翻过这一页你就知道了。


    ## 第 12 章


    ## 最后一件事


    多么精彩的旅程！我们拥有一个稳定的应用程序，并且配备了良好的自动化测试设置和静态库。我们使用 Instruments 来帮助查找应用程序中的性能瓶颈。在这个过程中，我们介绍了
    Xcode 的一些优秀特性，并探索了如何在工具集中导航。不过，Xcode 还有很多我们尚未涵盖的功能。这正是本章要讲述的内容。尽管本章标题是“最后一件事”，但我们要讲的可不止这一件。


    在本章中，我们将介绍自定义 Xcode 以及常用的键盘快捷键，以帮助你从开始自己的项目时就能改进工作流程。你还会找到一个方便的快速参考指南，其中列出了 Xcode
    4.2 的一些常用键盘快捷键。随着时间的推移，你会将本书所学内容以及本章的要点融入到自己的工作流程中。


    ### 自定义 Xcode


    在本书中，我们一直使用 Xcode 的默认配置。现在，是时候根据你的喜好来自定义它了。你已经见识过 Xcode 的能力，那就让它成为你的得力助手吧。首先要看的是
    Xcode 的偏好设置（如果你还没探索过的话）。与任何 Mac OS X 应用程序一样，打开 Xcode 偏好设置的方法是点击 **Xcode** ![Image](img/U001.jpg)
    **偏好设置...** ，或者按下 ![Image](img/U002.jpg)（逗号键）。执行此操作后，将会弹出图 12-1 所示的对话框。


    ![images](img/1201.jpg)


    **图 12-1.** *这是 Xcode 的偏好设置窗口。我们将逐一讲解窗口中的每个标签页，讨论如何自定义每个部分。*


    通用标签页（参见图 12-1）是 Xcode 偏好设置的起点。在这里，我们可以设置 Xcode 的一些基本选项，例如自动保存（如果你运行在 Mac OS X
    Lion 上）以及如何从导航器中打开文件。屏幕底部的图例为你提供了在编辑代码时如何使用键盘修改点击操作的参考。


    #### 行为


    Xcode 4.2 中的行为设置是一项巨大的救星。图 12-2 展示了打开的行为标签页。


    ![images](img/1202.jpg)


    **图 12-2.** *“行为”标签页帮助你配置 Xcode 在特定事件发生时的表现方式和通知方式。*


    通过“行为”标签页，你可以配置 Xcode 在启动应用程序运行时改变其外观，或者在构建失败时播放提示音。


    点击底部的加号按钮，你可以添加一个新行为并将其绑定到一个键盘快捷键。你想快速切换到全屏模式并且只显示代码吗？你可以通过将它映射到任何你想要的键盘快捷键来实现。


    #### 字体与颜色


    图 12-3 显示了“字体与颜色”标签页。此标签页允许你配置源代码编辑器的外观。当你需要在投影仪上展示代码，以便向本地用户组介绍一些精彩主题时，这个功能非常有用，对吧？


    ![images](img/1203.jpg)


    **图 12-3.** *“字体与颜色”标签页让你可以配置编辑器的外观。*


    点击“控制台”按钮可以配置控制台的外观。


    如果提供的主题不合你的口味，而你有一个希望在 Xcode 4.2 中使用的主题，你可以将该 `.dvtcolortheme` 文件放到 `~/Library/Developer/Xcode/UserData/FontAndColorThemes`
    文件夹中。


    如果你只想微调现有主题，点击列表下方的添加按钮可以复制一个主题。复制后的主题将被放置在之前提到的文件夹中。


    #### 文本编辑


    下一个标签页是“文本编辑”（参见图 12-4）。这是配置 Xcode 如何处理代码编辑器功能的地方。在这里，你可以配置编辑器的行为，以及如何处理诸如代码折叠和代码补全等功能。


    ![images](img/1204.jpg)


    **图 12-4.** *“文本编辑”标签页允许你配置文本编辑器的行为，并控制代码的自动结构化方式。*


    图 12-5 显示了此标签页中的“缩进”部分。关于使用空格还是制表符的著名争论，就在这个标签页的这个部分进行。


    ![images](img/1205.jpg)


    **图 12-5.** *空格与制表符的永恒之战！你会选择哪一个？*


    #### 键绑定


    需要查看已设置的键盘快捷键或想要修改它们？“键绑定”标签页就是为你准备的！图 12-6 显示了默认配置。此标签页的行为与“字体与颜色”标签页类似。要创建你自己的自定义配置，请复制默认配置。一旦你进行了修改，一个新的配置文件就会被放置在
    `~/Library/Developer/Xcode/UserData/KeyBindings` 中。


    ![images](img/1206.jpg)


    **图 12-6.** *配置你的键盘快捷键就像打开这个标签页一样简单。*


    如果你想知道某个键盘快捷键为何不起作用，请查看“冲突”部分。看看图 12-7。目前，在安装了 Xcode 的这台电脑上存在 10 个冲突。


    ![images](img/1207.jpg)


    **图 12-7.** *键绑定冲突会阻止你最喜欢的快捷键生效。*


    黄色的警告三角形表示与系统存在冲突。由于系统在应用程序之前处理快捷键，Xcode 只是告诉你这个快捷键将不起作用。红色的错误表示 Xcode 内部的冲突。只要
    Xcode 内部存在冲突，该绑定就不会触发。


    #### 下载


    继续往下看，我们来到了“下载”标签页。在这个标签页中，我们可以看到两个不同的区域需要访问。第一个是“组件”标签页。这个标签页（见图 12-8）允许你向 Xcode
    下载额外的组件。这些组件包括对较旧设备的支持，以及更早版本的 iOS 系统以在模拟器中运行。


    ![images](img/1208.jpg)


    **图 12-8.** *Xcode 附带的是最新版本的 iOS。如果你需要“旧版”支持，请前往“下载”偏好设置，并在此处下载相应的支持文件。*

