- fmt: "#### Tabs, Tabs, and More Tabs\n\nLet's look at one last item before we head\
    \ back to our project: tabs. Xcode has tabs that allow you to have multiple editors\
    \ open at once in the same window. [Figure 2–9](#Chapter02.html#fig_2_9) shows\
    \ Xcode with three tabs open.\n\n![images](images/0209.jpg)\n\n**Figure 2–9.**\
    \ *Multiple tabs within Xcode*\n\nThese tabs bring more than just multiple editors.\
    \ You can pull the tabs out of the window and open a brand new window with that\
    \ configuration. This means you can have one window open for editing source code\
    \ and another for editing a nib file. Each tab can be configured and has its own\
    \ history management. If there is only one tab open, you can show or hide the\
    \ tab bar by going to **View ![images](images/U001.jpg) Show/Hide Tab bar**.\n\
    \nWhy don't you go ahead and navigate through the different views within Xcode?\
    \ I'll still be here when you get back.\n\n### Getting Back to the Code\n\nNow\
    \ that we've taken a more in-depth look at Xcode, let's do some basic modifications\
    \ to our project and start checking in changes to our local Git repository. In\
    \ this chapter, we're going to build a very simple data collection application.\
    \ We're going to modify the core data model, add a new view controller, and then\
    \ check all of the changes into source control.\n\nBefore we begin, build the\
    \ application to make sure it compiles. Go to **Product ![images](images/U001.jpg)\
    \ Build** or press ![images](images/U003.jpg)B. The project should compile with\
    \ no errors. Clean the project to purge any build artifacts by going to **Product\
    \ ![images](images/U001.jpg) Clean** or pressing ![images](images/U003.jpg) ![images](images/U004.jpg)K.\n\
    \n#### Updating the Core Data Model\n\nThe first thing we're going to do is modify\
    \ the core data model. Begin by opening the data model (click `Super_Hello_World.xcdatamodeld`\
    \ in the Project Manager pane) in Xcode, and update the model as shown in [Figure\
    \ 2–10](#Chapter02.html#fig_2_10).\n\n![images](images/0210.jpg)\n\n**Figure 2–10.**\
    \ *Our very simple model for Super Hello World*\n\nAs you can see, we replaced\
    \ the Event entity with the Person entity with two properties: `firstName` and\
    \ `lastName`. Once that is complete, we're going to create an `NSManagedObject`\
    \ subclass by selecting the Person entity and in the menu bar going to **Editor\
    \ ![images](images/U001.jpg)** **Create NSManagedObject Subclass…**. A sheet will\
    \ appear asking you where to save the model class, click Create, and you'll see\
    \ a brand new Person header and implementation in your Project navigator.\n\n\
    Our sample application is going to display a list of names, so let's modify our\
    \ `Person` class to have the following header:\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n@interface Person : NSManagedObject {\n@private\n\
    }\n@property (nonatomic, retain) NSString * firstName;\n@property (nonatomic,\
    \ retain) NSString * lastName;\n\n-(NSString *) fullName;\n\n@end\n```\n\nAnd\
    \ this is our implementation:\n\n```\n#import \"Person.h\"\n\n@implementation\
    \ Person\n@dynamic firstName;\n@dynamic lastName;\n\n-(NSString *) fullName {\n\
    \     return [NSString stringWithFormat:@\"%@ %@\", [self firstName], [self lastName]];\n\
    }\n\n@end\n```\n\nAll we're doing here is adding a `fullName` method to calculate\
    \ the person's full name.\n\nNow that we have modified the model, we need to update\
    \ the `RootViewController` with these changes and update what is displayed in\
    \ the table. We only need to update the class in a few places; [Listing 2–1](#Chapter02.html#list_2_1)\
    \ shows the affected methods.\n\n**Listing 2–1.** *Modifying the RootViewController\
    \ to Reflect the New Model*\n\n```\n- (void)configureCell:(UITableViewCell *)cell\
    \ atIndexPath:(NSIndexPath *)indexPath\n{\n    Person *person = (Person *)[self.fetchedResultsController\
    \ objectAtIndexPath:indexPath];\n    cell.textLabel.text = [person fullName];\n\
    }\n- (void)insertNewObject\n{\n    // Create a new instance of the entity managed\
    \ by the fetched results controller.\n    NSManagedObjectContext *context = [self.fetchedResultsController\
    \ managedObjectContext];\n    NSEntityDescription *entity = [[self.fetchedResultsController\
    \ fetchRequest] entity];\n    Person *newManagedObject = (Person *)[NSEntityDescription\
    \ insertNewObjectForEntityForName:\n    [entity name] inManagedObjectContext:context];\n\
    \n    // If appropriate, configure the new managed object.\n    // Normally you\
    \ should use accessor methods, but using KVC here avoids the need to add a custom\
    \ class to the template.\n    [newManagedObject setFirstName:@\"Jonny\"];\n  \
    \       [newManagedObject setLastName:@\"Appleseed\"];\n\n    // Save the context.\n\
    \    NSError *error = nil;\n    if (![context save:&error])\n    {\n        /*\n\
    \         Replace this implementation with code to handle the error appropriately.\n\
    \n         abort() causes the application to generate a crash log and terminate.\
    \ You should not use this function in a shipping application, although it may\
    \ be useful during development. If it is not possible to recover from the error,\
    \ display an alert panel that instructs the user to quit the application by pressing\
    \ the Home button.\n         */\n        NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n        abort();\n    }\n}\n\n- (NSFetchedResultsController\
    \ *)fetchedResultsController\n{\n    if (__fetchedResultsController != nil)\n\
    \    {\n        return __fetchedResultsController;\n    }\n```"
  raw: '#### Tabs, Tabs, and More Tabs


    Let''s look at one last item before we head back to our project: tabs. Xcode has
    tabs that allow you to have multiple editors open at once in the same window.
    [Figure 2–9](#Chapter02.html#fig_2_9) shows Xcode with three tabs open.


    ![images](images/0209.jpg)


    **Figure 2–9.** *Multiple tabs within Xcode*


    These tabs bring more than just multiple editors. You can pull the tabs out of
    the window and open a brand new window with that configuration. This means you
    can have one window open for editing source code and another for editing a nib
    file. Each tab can be configured and has its own history management. If there
    is only one tab open, you can show or hide the tab bar by going to **View ![images](images/U001.jpg)
    Show/Hide Tab bar**.


    Why don''t you go ahead and navigate through the different views within Xcode?
    I''ll still be here when you get back.


    ### Getting Back to the Code


    Now that we''ve taken a more in-depth look at Xcode, let''s do some basic modifications
    to our project and start checking in changes to our local Git repository. In this
    chapter, we''re going to build a very simple data collection application. We''re
    going to modify the core data model, add a new view controller, and then check
    all of the changes into source control.


    Before we begin, build the application to make sure it compiles. Go to **Product
    ![images](images/U001.jpg) Build** or press ![images](images/U003.jpg)B. The project
    should compile with no errors. Clean the project to purge any build artifacts
    by going to **Product ![images](images/U001.jpg) Clean** or pressing ![images](images/U003.jpg)
    ![images](images/U004.jpg)K.


    #### Updating the Core Data Model


    The first thing we''re going to do is modify the core data model. Begin by opening
    the data model (click `Super_Hello_World.xcdatamodeld` in the Project Manager
    pane) in Xcode, and update the model as shown in [Figure 2–10](#Chapter02.html#fig_2_10).


    ![images](images/0210.jpg)


    **Figure 2–10.** *Our very simple model for Super Hello World*


    As you can see, we replaced the Event entity with the Person entity with two properties:
    `firstName` and `lastName`. Once that is complete, we''re going to create an `NSManagedObject`
    subclass by selecting the Person entity and in the menu bar going to **Editor
    ![images](images/U001.jpg)** **Create NSManagedObject Subclass…**. A sheet will
    appear asking you where to save the model class, click Create, and you''ll see
    a brand new Person header and implementation in your Project navigator.


    Our sample application is going to display a list of names, so let''s modify our
    `Person` class to have the following header:


    `#import <Foundation/Foundation.h>`

    `#import <CoreData/CoreData.h>`

    `@interface Person : NSManagedObject {`

    `@private`

    `}`

    `@property (nonatomic, retain) NSString * firstName;`

    `@property (nonatomic, retain) NSString * lastName;`


    `-(NSString *) fullName;`


    `@end`


    And this is our implementation:


    `#import "Person.h"`


    `@implementation Person`

    `@dynamic firstName;`

    `@dynamic lastName;`


    `-(NSString *) fullName {`

    `     return [NSString stringWithFormat:@"%@ %@", [self firstName], [self lastName]];`

    `}`


    `@end`


    All we''re doing here is adding a `fullName` method to calculate the person''s
    full name.


    Now that we have modified the model, we need to update the `RootViewController`
    with these changes and update what is displayed in the table. We only need to
    update the class in a few places; [Listing 2–1](#Chapter02.html#list_2_1) shows
    the affected methods.


    **Listing 2–1.** *Modifying the RootViewController to Reflect the New Model*


    `- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath *)indexPath`

    `{`

    `    Person *person = (Person *)[self.fetchedResultsController objectAtIndexPath:indexPath];`

    `    cell.textLabel.text = [person fullName];`

    `}`

    `- (void)insertNewObject`

    `{`

    `    // Create a new instance of the entity managed by the fetched results controller.`

    `    NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];`

    `    NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest]
    entity];`

    `    Person *newManagedObject = (Person *)[NSEntityDescription insertNewObjectForEntityForName:`

    `    [entity name] inManagedObjectContext:context];`


    `    // If appropriate, configure the new managed object.`

    `    // Normally you should use accessor methods, but using KVC here avoids the
    need to add a custom class to the template.`

    `    [newManagedObject setFirstName:@"Jonny"];`

    `         [newManagedObject setLastName:@"Appleseed"];`


    `    // Save the context.`

    `    NSError *error = nil;`

    `    if (![context save:&error])`

    `    {`

    `        /*`

    `         Replace this implementation with code to handle the error appropriately.`


    `         abort() causes the application to generate a crash log and terminate.
    You should not use this function in a shipping application, although it may be
    useful during development. If it is not possible to recover from the error, display
    an alert panel that instructs the user to quit the application by pressing the
    Home button.`

    `         */`

    `        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `        abort();`

    `    }`

    `}`


    `- (NSFetchedResultsController *)fetchedResultsController`

    `{`

    `    if (__fetchedResultsController != nil)`

    `    {`

    `        return __fetchedResultsController;`

    `    }`'
  trans: "\n#### 标签页，标签页，更多的标签页\n\n在回到我们的项目之前，让我们先看看最后一个项目：标签页。Xcode 的标签页允许你在同一个窗口中同时打开多个编辑器。图\
    \ 2-9 展示了打开三个标签页的 Xcode。\n\n![images](img/0209.jpg)\n\n**图 2-9.** *Xcode 中的多个标签页*\n\
    \n这些标签页带来的不仅仅是多个编辑器。你可以将标签页从窗口中拖出，并以该配置打开一个全新的窗口。这意味着你可以有一个窗口用于编辑源代码，另一个窗口用于编辑\
    \ nib 文件。每个标签页都可以独立配置，并拥有自己的历史记录管理。如果只打开了一个标签页，你可以通过 **视图 ![images](img/U001.jpg)\
    \ 显示/隐藏标签页栏** 来显示或隐藏标签页栏。\n\n你不妨继续浏览 Xcode 中的不同视图？当你回来时，我还会在这里。\n\n### 回到代码\n\n\
    既然我们已经更深入地了解了 Xcode，现在就对我们的项目进行一些基本修改，并开始将更改提交到本地 Git 仓库。在本章中，我们将构建一个非常简单的数据收集应用程序。我们将修改核心数据模型，添加一个新的视图控制器，然后将所有更改检入源代码控制。\n\
    \n在开始之前，先构建应用程序以确保它能编译。转到 **产品 ![images](img/U001.jpg) 构建** 或按下 ![images](img/U003.jpg)B。项目应该能成功编译，没有错误。通过转到\
    \ **产品 ![images](img/U001.jpg) 清理** 或按下 ![images](img/U003.jpg) ![images](img/U004.jpg)K\
    \ 来清理项目，清除所有构建产物。\n\n#### 更新核心数据模型\n\n我们要做的第一件事是修改核心数据模型。首先在 Xcode 中打开数据模型（在项目管理器窗格中点击\
    \ `Super_Hello_World.xcdatamodeld`），然后更新模型，如图 2-10 所示。\n\n![images](img/0210.jpg)\n\
    \n**图 2-10.** *Super Hello World 的非常简单模型*\n\n如你所见，我们使用 Person 实体替换了 Event 实体，该实体包含两个属性：`firstName`\
    \ 和 `lastName`。完成后，我们将通过选择 Person 实体，然后在菜单栏中转到 **编辑器 ![images](img/U001.jpg)**\
    \ **创建 NSManagedObject 子类…** 来创建一个 `NSManagedObject` 子类。将出现一个工作表询问你保存模型类的位置，点击“创建”，你将在项目导航器中看到全新的\
    \ Person 头文件和实现文件。\n\n我们的示例应用程序将显示一个名称列表，因此让我们修改 `Person` 类，使其具有以下头文件：\n\n```\n\
    #import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n@interface Person\
    \ : NSManagedObject {\n@private\n}\n@property (nonatomic, retain) NSString * firstName;\n\
    @property (nonatomic, retain) NSString * lastName;\n\n-(NSString *) fullName;\n\
    \n@end\n```\n\n这是它的实现：\n\n```\n#import \"Person.h\"\n\n@implementation Person\n\
    @dynamic firstName;\n@dynamic lastName;\n\n-(NSString *) fullName {\n     return\
    \ [NSString stringWithFormat:@\"%@ %@\", [self firstName], [self lastName]];\n\
    }\n\n@end\n```\n\n我们在这里所做的只是添加一个 `fullName` 方法来计算人的全名。\n\n既然我们已经修改了模型，就需要用这些更改更新\
    \ `RootViewController`，并更新表格中显示的内容。我们只需要在几个地方更新该类；代码清单 2-1 展示了受影响的方法。\n\n**代码清单\
    \ 2-1.** *修改 RootViewController 以反映新模型*\n\n```\n- (void)configureCell:(UITableViewCell\
    \ *)cell atIndexPath:(NSIndexPath *)indexPath\n{\n    Person *person = (Person\
    \ *)[self.fetchedResultsController objectAtIndexPath:indexPath];\n    cell.textLabel.text\
    \ = [person fullName];\n}\n- (void)insertNewObject\n{\n    // 创建由抓取结果控制器管理的实体的新实例。\n\
    \    NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
    \    NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest]\
    \ entity];\n    Person *newManagedObject = (Person *)[NSEntityDescription insertNewObjectForEntityForName:\n\
    \    [entity name] inManagedObjectContext:context];\n\n    // 如果合适，配置新的托管对象。\n\
    \    // 通常你应该使用存取方法，但在这里使用 KVC 可以避免为模板添加自定义类。\n    [newManagedObject setFirstName:@\"\
    Jonny\"];\n         [newManagedObject setLastName:@\"Appleseed\"];\n\n    // 保存上下文。\n\
    \    NSError *error = nil;\n    if (![context save:&error])\n    {\n        /*\n\
    \         请用处理错误的代码替换此实现。\n\n         abort() 会导致应用程序生成崩溃日志并终止。你*不应该*在正式发布的应用程序中使用此函数，尽管它在开发过程中可能有用。如果无法从错误中恢复，请显示一个提示面板，指导用户通过按下\
    \ Home 按钮来退出应用程序。\n         */\n        NSLog(@\"未解决的错误 %@, %@\", error, [error\
    \ userInfo]);\n        abort();\n    }\n}\n\n- (NSFetchedResultsController *)fetchedResultsController\n\
    {\n    if (__fetchedResultsController != nil)\n    {\n        return __fetchedResultsController;\n\
    \    }\n```\n"
