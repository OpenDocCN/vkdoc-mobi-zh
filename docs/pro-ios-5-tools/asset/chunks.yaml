    \ 4-10 显示了在导航器区域的“问题”标签中静态分析运行的结果。\n\n![images](img/0410.jpg)\n\n**图 4-10.** *静态分析展示了不同类型的问题，从死代码到内存泄漏。*\n\
    \n在开发过程中经常运行静态分析器是一个好主意，可以防止代码中最常见的错误。这些结果为你提供了足够的信息来了解问题所在，以及如何着手修复它们。其中一些项目可能非常复杂。例如，在方法顶部声明的一个对象，经过一系列复杂的循环和条件判断后，可能会使该对象处于泄漏状态。另一个例子是过度释放一个对象。一个对象被实例化，然后被指示\
    \ `autorelease`，最后在方法内部被释放，这会触发静态分析错误。\n\n让我们来看 图 4-9 中的两个案例。\n\n图 4-9 列表中的第一项位于\
    \ `Super_CheckoutViewController.m` 的第 91 行。让我们看看有问题的那个方法：\n\n```\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    ProductDetailsViewController\
    \ *newVC = [[ProductDetailsViewController alloc]\n         initWithNibName:@\"\
    ProductDetailsViewController\" bundle:nil];\n\n    [newVC setSelectedProduct:[inventory\
    \ objectAtIndex:[indexPath row]]];\n\n    [self.navigationController pushViewController:newVC\
    \ animated:YES];\n}\n```\n\n静态分析器告诉我们，该方法退出时一个对象具有“+1 的保留计数”。你能找出有问题的代码吗？基于 NARC\
    \ 系统，我们有一个已分配的对象，现在缺少一个对应的释放。添加 `[newVC release];` 作为最后一行将解决这个问题。\n\n下一个例子是使用静态分析器来查找死代码。在\
    \ `SuperCheckoutAPIEngine.m` 中，我们可以看到分析器发现了一个“Dead store”问题。点击该问题，编辑器将向你展示代码中的错误位置。这是有问题的那个方法：\n\
    \n```\n- (NSMutableURLRequest *)_baseRequestWithMethod:(NSString *)method\n  \
    \                                         path:(NSString *)path\n            \
    \                        requestType:(SuperCheckoutRequestType)requestType\n \
    \                               queryParameters:(NSDictionary *)params\n{\n  \
    \  NSString *contentType = [params objectForKey:@\"Content-Type\"];\n    if(contentType){\n\
    \        params = [params MGTE_dictionaryByRemovingObjectForKey:@\"Content-Type\"\
    ];\n    }else{\n        contentType = @\"application/x-www-form-urlencoded\";\n\
    \    }\n\n    // Construct appropriate URL string.\n    NSString *fullPath = [path\n\
    \ stringByAddingPercentEscapesUsingEncoding:NSNonLossyASCIIStringEncoding];\n\
    \    if (params && ![method isEqualToString:HTTP_POST_METHOD]) {\n        fullPath\
    \ = [self _queryStringWithBase:fullPath parameters:params prefixed:YES];\n   \
    \ }\n\n    NSString *connectionType = @\"http\";\n```\n\n静态分析器将焦点放在了 `contentType`\
    \ 对象未被读取上。似乎分析器发现该方法后面某处的代码被移除了，但它的部分设置却没有被移除。移除包含 `contentType` 对象的代码块将满足静态分析器的要求。\n\
    \n你为什么不自己检查一下静态分析器的其余结果，并修复它发现的问题呢？\n"
- fmt: "# 排版后内容\n\n以消除编辑器中所有蓝色（静态分析器警告的颜色）为最终目标。总会有一些情况是静态分析器显示误报，但这种情况相当罕见。静态分析器可能显示误报的一个例子是常见的`init`方法形式：\n\
    \n```\nif(self = [super init]) {\n    //Do something\n}\n\nreturn self;\n```\n\
    \n静态分析器会注意到你在条件语句内进行了赋值。它并不真正喜欢这样，然而这段代码是完全有效的。我想花点时间提一个我们之前讨论过的话题。虽然这段代码是有效的，但它清晰吗？当然，你可以将赋值语句用括号括起来以满足分析器，但这并不一定能让代码更易读。我采用了以下`init`风格：\n\
    \n```\nself = [super init];\n\nif(self) {\n    //Do stuff\n}\n\nreturn self;\n\
    ```\n\n这不仅通过了静态分析，还清晰地展示了正在发生的事情。通篇修改整个代码库以采用这种新风格将花费很长时间，因此不推荐这样做。所以这里的教训是，一开始就要经常问自己：“这段代码清晰吗？”清晰性能够带来更好的代码和更少的问题，尤其是在维护和为现有应用添加新功能时。\n\
    \n通过这些主动预防内存泄漏的技术，大多数与内存泄漏相关的常见问题都将被避免。代码的清晰性是确保代码库保持整洁的关键，尤其是在团队环境中。通过偷工减料积累技术债务在短期内可能卓有成效，但在维护周期中，它可能是一个巨大的障碍。\n\
    \n归根结底，软件必须交付，所以学习如何在技术债务与完全正确的做事方式之间取得平衡是一生的课程。希望这些技术以及后续的技术能减少你在应用程序中调试和追踪这些问题所花费的时间。\n\
    \n## 僵尸——不，不是那种僵尸\n\n由于我们继承了一个已有的代码库，我们必须手动查找问题，以便移除所有内存泄漏并找到与内存管理直接相关的崩溃问题。为此，我们将启动`Instruments`并启用`NSZombie`检测。\n\
    \n僵尸？不，我们不是在寻找“我们要吃掉你的大脑”的僵尸。那是完全另一本书的内容。我们要找的那种僵尸是指向垃圾内存的指针。当一个对象被最终释放且其引用计数为零时，该对象被解除分配，内存会被系统迅速回收。但指向该内存块的指针仍然有效。\n\
    \n我们如何检测僵尸？首先，我们需要创建一个名为`NSZombieEnabled`的环境变量并将其设置为`YES`。我们可以通过打开方案编辑器来做到这一点。前往`Product`![image](images/U001.jpg)`Edit\
    \ Scheme`或按![image](images/U002.jpg)`+ <`。打开方案编辑器后，在左侧选择`Run Super Checkout`选项，然后选择`Arguments`标签页。添加一个名为`NSZombieEnabled`、值为`YES`的环境变量。你的方案应该看起来像[图4-11](#Chapter04.html#fig_4_11)所示的那样。\n\
    \n![images](images/0411.jpg)\n\n**图4-11.** *使用方案编辑器启用NSZombie检测*\n\n我们将使用`Profile`操作来运行我们的应用程序，因此点击`Profile\
    \ Super Checkout`。确保在`Arguments`标签页下勾选了“使用运行操作的选项”复选框。现在，你已经准备好对应用程序进行性能分析并查找一些僵尸了。\n\
    \n确保在方案选择器中将模拟器选为目标目标，点击`OK`，然后前往`Product`![image](images/U001.jpg)`Profile`来启动该过程。`Instruments`将启动并提供一个选择众多模板之一的选项。我们在寻找僵尸，所以选择`Zombies`选项，然后点击`Profile`（参见[图4-12](#Chapter04.html#fig_4_12)）。\n\
    \n![images](images/0412.jpg)\n\n**图4-12.** *iOS模拟器启动前的Instruments模板屏幕*\n\niOS模拟器将启动该应用程序，你会看到`Instruments`在后台运行，`Allocations`工具正在监视内存分配。该工具已经配置好用于检测`NSZombie`对象，因此我们现在需要做的就是与应用程序交互。让我们继续运行一个测试用例，看看是否能找到一个`NSZombie`。\n\
    \n我们要运行的测试用例是向购物车添加一种水果并查看购物车。继续选择一种水果，配置数量，然后点击`Add to Basket`。物品被添加到购物车后，库存列表会重新出现。点击右上角的`Cart`按钮，你会注意到应用程序崩溃了。如[图4-13](#Chapter04.html#fig_4_13)所示，`Instruments`检测到一条消息被传递给了`NSZombie`实例。\n\
    \n![images](images/0413.jpg)\n\n**图4-13.** *Instruments检测到一条消息被传递给了NSZombie实例。*\n\
    \n我们知道我们遇到了一个相当严重的错误，因为应用程序崩溃了。我们使用`Instruments`检测到了它，现在，我们需要修复它。点击弹出的消息旁边的箭头，会出现有关违规对象引用计数变化的详细信息。在这些细节中，我们可以看到发生了以下事件（参见[图4-14](#Chapter04.html#fig_4_14)）：\n\
    \n1. `malloc`方法在该对象上运行。\n2. 然后该对象被添加到自动释放池中。\n3. 该对象被保留。\n4. 该对象被释放，两次。\n\n![images](images/0414.jpg)\n\
    \n**图4-14.** *违规对象的引用计数历史*"
  raw: 'Aiming for removing all of the blue (the color of static analyzer warnings
    in the editor) should be the ultimate goal. There are always going to be instances
    where the static analyzer will show a false positive, but those are fairly rare.
    One instance where the analyzer will show a false positive is in a common `init`
    method form:


    `if(self = [super init]) {`

    `    //Do something`

    `}`


    `return self;`


    The static analyzer will notice that you are doing an assignment inside the conditional.
    It doesn''t really like this, yet the code is perfectly valid.I''d like to take
    a moment to bring up a topic  we previously discussed. While this code is valid,
    is it clear? Sure, you could wrap the assignment in parentheses and satisfy the
    analyzer, but this doesn''t necessarily make the code easier to read. I have adopted
    the following `init` style:


    `self = [super init];`


    `if(self) {`

    `    //Do stuff`

    `}`


    `return self;`


    Not only does this pass static analysis, it clearly shows what is going on. Going
    through and fixing an entire codebase to adopt this new style will take forever,
    so that isn''t recommended. So the lesson here is to initially always ask yourself,
    “Is this code clear?” Clarity makes for better code and fewer problems, especially
    during maintenance and adding new features to an existing application.


    With these techniques for being proactive against memory leaks, a majority of
    the common issues related to leaking memory will be prevented. Clarity of code
    is key to ensuring a codebase stays clean especially in a team environment. Building
    up technical debt by cutting corners can be fruitful in the short term, but in
    a maintenance cycle, it can be a huge detriment.


    In the end, software has to ship, so learning how to balance technical debt versus
    doing things absolutely the right way is a career-long lesson. Hopefully, these
    techniques and the ones that follow will decrease the amount of time you spend
    debugging and tracking down these issues in your application.


    ### Zombies—No Not Those Kind of Zombies


    Since we''ve inherited a preexisting codebase, we have to go through and manually
    find the issues so we can remove any memory leaks and find any crashers that are
    directly related to memory management. To do this, we''re going to fire up Instruments
    and enable `NSZombie` detection.


    Zombies? No, we''re not looking for “we want to eat your brain” zombies. That
    is an entirely different book. The kind of zombies we''re looking for are pointers
    to junk memory. When an object is released for the final time and its retain count
    is zero, the object is deallocated, and the memory is quickly reclaimed by the
    system. But the pointer to that block of memory is still valid.


    How do we detect zombies? First, we need to create an environment variable called
    `NSZombieEnabled` and set it to `YES`. We can do this by opening our scheme editor.
    Go to Product![image](images/U001.jpg)Edit Scheme or pressing ![image](images/U002.jpg)
    + <. With the scheme editor open, choose the Run Super Checkout option on the
    left, and select the Arguments tab. Add an environment variable with a name of
    `NSZombieEnabled` and a value of YES. Your scheme should look like the one shown
    in [Figure 4–11](#Chapter04.html#fig_4_11).


    ![images](images/0411.jpg)


    **Figure 4–11.** *Using the scheme editor to enable NSZombie detection*


    We''re about to run our application using the Profile action, so click Profile
    Super Checkout. Make sure the “Use the Run action''s options” check box is checked
    under the Arguments tab. Now, you''re ready to profile the application and find
    some zombies.


    Make sure that the simulator is chosen for the destination target in the scheme
    chooser, click OK, and go to Product![image](images/U001.jpg)Profile to start
    the process. Instruments will start up with an option to select one of many templates.
    We''re looking for zombies, so select the Zombies option, and click Profile (see
    [Figure 4–12](#Chapter04.html#fig_4_12)).


    ![images](images/0412.jpg)


    **Figure 4–12.** *The Instruments template screen before the iOS Simulator launches*


    The iOS Simulator will launch the application, and you''ll see Instruments in
    the background with the Allocations instrument watching memory allocations. This
    instrument is already configured to detect `NSZombie` objects, so all we need
    to do now is interact with the application. Let''s go ahead and run through a
    test case to see if we can find an `NSZombie`.


    The test case we''re going to run through is adding a fruit to our cart and viewing
    our cart. Go ahead and select a fruit, configure the quantity, and click Add to
    Basket. After the item is added to the basket, the inventory list comes back into
    view. Click the Cart button at the top right, and you''ll notice that the application
    crashes. As [Figure 4–13](#Chapter04.html#fig_4_13) shows, Instruments has detected
    a message passed to an instance of `NSZombie`.


    ![images](images/0413.jpg)


    **Figure 4–13.** *Instruments has detected a message being passed to an instance
    of NSZombie.*


    We know that we have a pretty serious bug on our hands, because the application
    crashes. We''ve used Instruments to detect it, and now, we need to fix it. Click
    the arrow next to the message that popped up, and the details of the changes to
    the retain count of the offending object come up. In these details, we can see
    the following events happen (see [Figure 4–14](#Chapter04.html#fig_4_14)):


    1.  The `malloc` method is run on the object.

    2.  The object is then added to the autorelease pool.

    3.  The object is retained.

    4.  The object is released, twice.


    ![images](images/0414.jpg)


    **Figure 4–14.** *The offending object''s retain count history*'
