    \ removeItemFromCart:] at\n/Users/brandon/Development/iOS/Super Checkout/Super\
    \ Checkout/../Super\nCheckout/ShoppingCartViewController.m:247\n(gdb)\n```\n\n\
    You may see other breakpoints listed. Look for the breakpoint corresponding to\
    \ the loop we want to break once in. I've excerpted it in the preceding code snippet.\
    \ We want the number in the leftmost column, 2\\. We want to stop this routine\
    \ only when the `id` value in a dictionary has reached a value of the `id` of\
    \ the item to be removed. Since we have that variable in scope, lets ask GDB what\
    \ the item variable looks like by typing `po item`. The output for this run follows:\n\
    \n```\n(gdb) po item\n{\n    id = 3;\n    name = \"Blood Orange\";\n    price\
    \ = 110;\n    quantity = 1;\n    subtotal = 110;\n}\n(gdb)\n```\n\nThe `id` we're\
    \ interested in is 3\\. The objective-c code for this would be\n\n```\n[[item\
    \ objectForKey: @\" id\"] intValue] == 3\n```\n\nThe compiler would normally parse\
    \ this statement, figure out the type of values for each message we send, and\
    \ compute the expression. GDB can help us evaluate this, too, on the fly. We have\
    \ to help it out a bit, though. Every single message must be strongly typed. All\
    \ ambiguities must be eliminated. We do this with typecasting.\n\nChange every\
    \ message passing call in the condition by casting its type. We do that here:\n\
    \n```\n((int) [[item objectForKey: @\"id\"] intValue] ==3)\n```\n\nLet's tell\
    \ GDB to make breakpoint 14 conditional, that is, GDB will stop only when this\
    \ condition becomes true. The syntax is `condition NN code`:\n\n```\n(gdb) condition\
