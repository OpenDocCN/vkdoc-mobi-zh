    Empty list\"].cells()[0].tap();\ntarget.frontMostApp().mainWindow().navigationBar().leftButton().tap();\n\
    ```\n\n**注意：** 务必注意，由于自动化仪器会记录每一个 UI 事件，因此您的结果可能因与模拟器的交互方式不同而略有差异。\n\n![images](img/0815.jpg)\n\
    \n**图 8–15.** *自动化脚本的令牌在创建迭代脚本时非常有用。*\n\n如果您回放此脚本，它将精确执行您录制的操作，仅此而已。实用性不强，但这是脚本的一个良好起点。每个表达式中的元素令牌（图\
    \ 8–15）功能极为强大。点击令牌右侧的箭头将显示该令牌的选项。每个选项都是指向同一界面元素的另一种方式。例如，`cells()[0]` 可能等同于 `cells()[\"\
    First Cell\"]`，这两个选项都会出现在令牌中。如果您双击某个令牌，它将被转换为纯文本，您可以根据需要进行修改。\n\n您的目标是遍历所有单元格，并对表格中的每个产品执行相同操作。首先，需要将单元格获取为数组，以便将其长度用作\
    \ `for` 循环的边界。让我们从录制的某一行代码中提取，仅保留单元格数组，并将其存储到一个变量中。\n\n```\nvar cells = target.frontMostApp().mainWindow().tableViews()[\"\
    Empty list\"].cells();\n```\n\n接下来，编写一个简单的 `for` 循环，遍历这些单元格并对每个单元格执行录制的操作。为此，只需双击\
    \ `cells()[0]` 令牌，并将 0 替换为循环索引。\n\n```\nfor(var i = 0; i < cells.length; i++)\
