  raw: '##### Updating the Product Details


    The `ProductDetailsViewController` class has to undergo a pretty large update.
    The iPhone/iPod Touch version of Super Checkout had the product details screen
    being pushed onto a navigation controller, and there is no navigation controller
    in the split view controller on the iPad. To accomplish this, we will be loading
    different nibs to the details controller based on the device we are running on.
    We will need to have the `ProductDetailsViewController` support both idioms, so
    we are going to change it to be a subclass of `UIViewController` instead of being
    a subclass of `UITableViewController`.


    The first thing we''ll do is update the `ProductDetailsViewController.h` file
    to look like [Listing 10–4](#Chapter10.html#list_10_4).


    **Listing 10–4.** *Updating the ProductDetailsViewController Class to Support
    the iPad Idiom*


    `#import <UIKit/UIKit.h>`

    `#import "SuperCheckoutAPIEngine.h"`

    `#import "SCModalDelegate.h"`

    `@class QuantityCell;`

    `@class Product;`


    `@interface ProductDetailsViewController :`

    `UIViewController<SuperCheckoutAPIEngineDelegate,`

    ` SCModalDelegate, UITableViewDelegate, UITableViewDataSource,`

    `UISplitViewControllerDelegate,`

    `UIPopoverControllerDelegate> {`

    `    Product *selectedProduct;`

    `    UIView *productDetailsHeader;`

    `    UIImageView *productImage;`

    `    UILabel *productNameLabel;`

    `    UILabel *productPriceLabel;`

    `    UITableViewCell *addToBasketCell;`

    `    QuantityCell *quantityCell;`


    `    SuperCheckoutAPIEngine *apiEngine;`


    `    UIToolbar *toolbar;`

    `    UITableView *tableView;`

    `    UIBarButtonItem *shoppingCartButton;`

    `}`


    `@property(retain, nonatomic) Product *selectedProduct;`

    `@property (nonatomic, retain) IBOutlet UIView *productDetailsHeader;`

    `@property (nonatomic, retain) IBOutlet UIImageView *productImage;`

    `@property (nonatomic, retain) IBOutlet UILabel *productNameLabel;`

    `@property (nonatomic, retain) IBOutlet UILabel *productPriceLabel;`

    `@property (nonatomic, retain) IBOutlet UITableViewCell *addToBasketCell;`

    `@property (nonatomic, retain) IBOutlet QuantityCell *quantityCell;`

    `@property (nonatomic, retain) IBOutlet UIToolbar *toolbar;`

    `@property (nonatomic, retain) IBOutlet UITableView *tableView;`

    `@property (nonatomic, retain) IBOutlet UIBarButtonItem *shoppingCartButton;`

    `- (IBAction)cartButtonPressed:(id)sender;`


    `@end`


    Lets walk through what we''ve changed.


    The class declaration before this update was


    `@interface ProductDetailsViewController :`

    `                                UITableViewController<SuperCheckoutAPIEngineDelegate>`


    With the older version, we are subclassing `UITableViewController` and conforming
    to the `SuperCheckoutAPIEngineDelegate` protocol. This gives us a basic view controller
    with a `UITableView` as the view and nothing else. Since this class needs to support
    both idioms, we need to design this class for the lowest common denominator. For
    this, we updated the class declaration to this:


    `@interface ProductDetailsViewController :`

    `UIViewController<SuperCheckoutAPIEngineDelegate, SCModalDelegate, UITableViewDelegate,`

    `UITableViewDataSource, UISplitViewControllerDelegate, UIPopoverControllerDelegate>`


    So the `ProductDetailsViewController` class now subclasses `UIViewController`
    and conforms to the `UITableViewDelegate` and `UITableViewDataSource` protocols.
    To support the `UISplitViewController` and its features, we need to add the protocols
    it conforms to. These protocols are the `UISplitViewControllerDelegate` and `UIPopoverControllerDelegate`
    protocols. There is one more protocol in that list—the `SCModalDelegate` protocol.
    This is to support the modal view controller that will be presented here for the
    iPad. We''re not there yet, so we won''t talk about that right now.


    The instance variables we added are:


    `    UIToolbar *toolbar;`

    `    UITableView *tableView;`

    `    UIBarButtonItem *shoppingCartButton;`


    The `toolbar` and `shoppingCartButton` objects are to support the iPad version.
    The `tableView` object is to support the table view that will be displayed in
    both the iPad and iPhone/iPod Touch versions of Super Checkout.


    Now we''re ready to update the implementation file. Like the header file, we have
    a lot of changes and you''ll find them in [Listing 10–5](#Chapter10.html#list_10_5).


    **Listing 10–5.** *The Full ProductDetailsViewController*


