    take a look around. If you are used to Xcode 3, you''ll notice Xcode 4 looks completely
    different. Don''t worry; we''ll step through the features as we make it through
    the chapters in this book. If you''re new to the platform, say hello to Xcode.
    I''m sure you''ll be friends in no time (don''t worry; friends have fights from
    time to time). Either way, we''re in for quite the journey as you learn how to
    get the most out of the toolbox Apple provides, as well as some great third-party
    tools.


