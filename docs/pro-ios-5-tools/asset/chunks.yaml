    \  CGContextDrawImage(context, CGRectMake(12, 6, 64, 64), prodImage);\n    //86,\
    \ 6\n    //Helvetica 17 黑色\n    CGSize textSize;\n    textSize = [[productInformation\
    \ name] sizeWithFont:font];\n\n    if([self isHighlighted]) {\n        CGContextSetStrokeColorWithColor(context,\
    \ [[UIColor whiteColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
    \ [[UIColor whiteColor] CGColor]);\n    } else {\n        CGContextSetStrokeColorWithColor(context,\
    \ [[UIColor blackColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
    \ [[UIColor blackColor] CGColor]);\n    }\n\n    [[productInformation name] drawInRect:CGRectMake(86,\
    \ 6, textSize.width,\ntextSize.height)\n                                  withFont:font];\n\
    \n    //Helvetica 17 浅灰色\n    NSString *priceString = [NSString stringWithFormat:@\"\
    $%1.2f\",\n\n[[productInformation price] floatValue]];\n    textSize = [priceString\
    \ sizeWithFont:font];\n\n    if([self isHighlighted]) {\n        CGContextSetStrokeColorWithColor(context,\
    \ [[UIColor whiteColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
    \ [[UIColor whiteColor] CGColor]);\n    } else {\n        CGContextSetStrokeColorWithColor(context,\
    \ [[UIColor lightGrayColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
    \ [[UIColor lightGrayColor] CGColor]);\n    }\n    [priceString drawInRect:CGRectMake(86,\
    \ 35, textSize.width, textSize.height)\n                 withFont:font];\n   \
    \ CGContextRestoreGState(context);\n}\n\n- (void)observeValueForKeyPath:(NSString\
    \ *)keyPath\n                      ofObject:(id)object\n                     \
    \   change:(NSDictionary *)change\n                       context:(void *)context\
    \ {\n    if ([keyPath isEqual:@\"productImage\"]) {\n        [self setNeedsDisplay];\n\
    \    }\n}\n\n- (void)dealloc {\n    [super dealloc];\n}\n\n@end\n```\n\n在运行应用程序之前，需要注意这些自定义单元格的一个重要事项：需要处理高亮和选中状态。由于我们直接在显示的视图上绘制文本，因此无法获得`UILabel`中的优势。这是我们在视图中进行自定义绘制所付出的代价。\n\
    \n现在，使用 Core Animation 对应用程序进行分析，并启用混合图层选项。不再有多个图层视图让合成器超负荷工作。上下滚动并查看帧率。由于我们结合了从基本图像缓存到减少系统在动画中所需合成的数量等一系列性能改进，帧率持续提升。Figure\
    \ 5–19 展示了在调试这些视图时，使用不同版本的 Super Checkout 在 Core Animation 工具上的几次运行结果。差异不大，但请注意，最上面的运行表现最佳。\n\
    \n![images](img/0519.jpg)\n\n**Figure 5–19.** *Super Checkout 在 Core Animation\
    \ 工具上的不同运行结果*\n\n**注意：** 我们使用的表格单元格本应通过内置单元格类型创建。唯一仍需实现的是加载图像并将其缩小以适配单元格图像视图的代码。然而，对于任何无法通过使用\
    \ Apple 在 UIKit 中提供的单元格来完成的复杂单元格来说，这种技术是完美的。\n"
- fmt: '# Learning from Apple


    The engineers at Apple have given us clues to how they make their apps perform
    so well. These engineers have an intimate knowledge of how these frameworks work,
    so let''s use the blended layers debug option to take a look at Springboard and
    a bundled app to see how Apple designs its applications.


    Let''s take a look at the Stocks application that ships with iOS (see [Figure
    5–20](#Chapter05.html#fig_5_20)). As you learned previously, compositing is expensive,
    and the most expensive part is drawing transparent views. So how would you implement
    rounded corners in a custom view? You could have an image that serves as a background
    image on a view and place transparent views on top of it. That would work out
    fine if the view didn''t have to animate around. If we used the full image and
    placed transparent views for animations, the compositor combined with Core Animation
    would make for a poorly performing animation.


    ![images](images/0520.jpg)


    **Figure 5–20.** *Stocks app with blended layers turned on*


    As [Figure 5–20](#Chapter05.html#fig_5_20) shows, the Stocks app uses rounded
    corners. To accomplish this effect, the app has small rounded corner images placed
    on each corner of the app. Because the app does not use one large image, the compositor
    has to composite the transparency only on each of the corners. This technique
    gives us rounded corners that are quick to draw and easy to implement. By implementing
    this idea, keeping views lightweight, and drawing custom views where it makes
    sense, we can create great-looking applications that animate and scroll like a
    dream.


    The main reason we''re looking at the Stocks app is to learn from Apple. The developers
    know the platform the best and have plenty of tricks up their sleeves on how to
    make applications appear to be smooth. Users expect this level of polish, and
    this attention to detail sets the bar pretty high for us as we implement our applications.


    ## Summary


    We covered a lot of ground in this chapter. We talked about how important it is
    to keep the run loop, well, running. We also talked a bit about compositing and
    how to implement the fancy designs handed to us by designers. Sadly, Super Checkout
    didn''t have a real designer to design it, but we were able to get a blazingly
    fast table cell thanks to an approach given to us by Loren Brichter.


    Now that we have our application rendering quickly, what do we do now? We''ll
    look at the networking stack of iOS and the tools at our disposal to detect strange
    network-related issues. We''re also going to talk about caching and power management.
    The next chapter is all about the radios inside an iOS device. No amateur radio
    license is required.


    # Chapter 6


    # Networking, Cache, and Power Management


    So far, we''ve looked at how to remove memory leaks and make our interfaces scroll
    and animate without much lag. The application is starting to perform and act like
    a polished app that is ready for prime time. What is the next step in our process?
    Networking is the next step.


    The problem that comes with developing these applications is that we have high-speed
    Internet connections most of the time while we''re developing and debugging our
    application. We''re going to look at tools to help mimic slow and unreliable networks
    so we can see how our application is going to perform in the field.


    Mobile devices communicate via a very unreliable and relatively slow network (when
    not connected on a Wi-Fi network). This makes our job as software developers very
    difficult because we need to use some very complicated techniques to hide this
    complexity from our users. A very common technique to do this is to implement
    a caching solution.


    Balancing live data with caching is a big problem in which Ph.D.s have been granted
    in the search of finding the perfect technique. Instead of looking at the theory
    of caching and tracking hits and misses, we''re going to look at how you might
    implement a simple cache and what kind of cache you would want to use in certain
    situations. We''ll also look at some APIs that give you caching to save some time
    in development.


    Finally, we''re going to look at how much power our application is using while
    in the field. Since our users are running their devices off of a battery, we need
    to be very cognizant of battery life and understand that our application needs
    to be a good citizen inside of the iOS system.


    Fortunately, Apple and other developers have provided us some great tools for
    accomplishing all of these tasks. This chapter will discuss how to balance live
    data with caching and how to squeeze the most out of the device''s battery. In
    the end, you''ll have a good caching solution for Super Checkout and a clearer
    understanding on how to determine how an application affects battery life.


    ## Understanding Networking and Cache Control


    Most applications written for the iOS platform have some sort of networked communication.
    Since this is the case, understanding how to design APIs on the server side and
    how to consume these services is vital. In Super Checkout, the API–consuming code
    was already developed. Since the API was developed already, we''re going to spend
    some time looking at some of the thoughts behind the design of the API.


    ### Exploring the Client API


    The client API of Super Checkout was based heavily on Matt Gemmel''s `MGTwitterEngine`
    ([`http://instinctivecode.com/`](http://instinctivecode.com/)). The idea behind
    the API design can be best described in [Figure 6–1](#Chapter06.html#fig_6_1).
    The basic architecture is to have all of your networking code flowing through
    one object. This object can live as a property on your controller or as a singleton,
    though I''d recommend having a discrete instance of the engine for each controller.


    ![images](images/0601.jpg)


    **Figure 6–1.** *The basic networking architecture for Super Checkout*


    Before we dive into what the API engine does, let''s consider what the application
    would look like without this design pattern. [Figure 6–2](#Chapter06.html#fig_6_2)
    shows what the application might look like.


    ![images](images/0602.jpg)


    **Figure 6–2.** *The application without an API engine*


    The difference between [Figures 6–1](#Chapter06.html#fig_6_1) and [6–2](#Chapter06.html#fig_6_2)
    is very subtle, yet it is important enough to spend time discussing.


    With the power and ease of use of `NSURLConnection` and `ASIHTTPRequest` (more
    on that one later), it is tempting to use those APIs in your controller logic.
    This introduces some coupling to a specific web service and your application.
    This is why the API engine was created and inserted between the controllers and
    the Internet.


    By decoupling the web service and abstracting it into its own class, we are able
    to react to changes in the services as they are invariably made. If the application''s
    architecture were implemented as in [Figure 6–2](#Chapter06.html#fig_6_2), each
    controller that was affected by the service change would have to be updated. Even
    in a small application like Super Checkout, this can be tedious and time consuming,
    especially if there was a model change.


    This idea is more of a guideline and won''t fit every situation. This type of
    software architecture is the hardest part of application development. The goal
    is to have a reusable, self-contained component that handles the networked communication,
    performs well, and can be used throughout the application.


    With the simplicity and single-service nature of Super Checkout, the decision
    to have a single engine that is included in each view controller was made. Your
    application will have some similarities and some differences. Analyze the problem,
    and architect based on that.'
