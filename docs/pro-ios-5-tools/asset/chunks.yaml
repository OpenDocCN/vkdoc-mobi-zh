  trans: "\n尽管您为 iOS 5.0 构建了应用，但 Instruments 仍可在不同 OS 版本下模拟该应用，并且根据您的设置，它可能默认使用旧版本。为确保配置正确，您需要更改启动选项。从目标下拉菜单中选择“选项”，然后在“模拟器配置”部分选择“iPhone\
