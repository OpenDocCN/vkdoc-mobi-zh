    \ Owner`上的`cartButtonPressed:`选择器。现在所有内容都已连接完毕，可以开始工作了。\n\n#### 修改购物车视图控制器\n\n\
    要修改的最后一个视图控制器是`ShoppingCartViewController`。我们需要进行的更改包括：更新“I'm done looking at\
    \ this”按钮，使其具有 idiom 感知能力，并更新结账按钮，确保其在视图中居中。\n\n我们需要做的第一件事是获取对结账按钮的引用。我们将在源文件中创建一个\
    \ outlet，并将其连接到 nib。为此，打开`ShoppingCartViewController.xib`，并启用助理编辑器。如果编辑器仍显示`Manual`选择，请转到`View`\
    \ ![images](img/U001.jpg) `Editor` ![images](img/U001.jpg) `Reset Editor`，将助理编辑器重置为`Automatic`选择。这将在助理编辑器中打开`ShoppingCartViewController.h`文件。\n\
    \n下一步是按住 Control 键将结账按钮拖拽到源文件中（参见图 10–21）。将新属性放在适当的位置，并使其成为一个名为`checkoutButton`的\
    \ outlet。\n\n![images](img/1021.jpg)\n\n**图 10–21.** *`Interface Builder`与`Xcode`的集成使得创建\
    \ outlets 变得容易。*\n\n由于使用了这种集成，`Xcode`将自动插入实例变量、合成属性，并在`dealloc`和`viewDidUnload`中放置相应的代码。\n\
    \n按`command+option+S`保存所有修改过的文件。接下来，打开`ShoppingCartViewController.m`，并在`viewDidLoad`中找到以下行：\n\
    \n```\nUIBarButtonItem *storeButton =\n    [[UIBarButtonItem alloc] initWithTitle:@\"\
    Store\"\nstyle:UIBarButtonItemStyleBordered\n                                \
    \                                target:self\naction:@selector(backToStorePressed:)];\n\
    ```\n\n删除该行，并替换为以下内容：\n\n```\nUIBarButtonItem *storeButton = nil;\nif(UI_USER_INTERFACE_IDIOM()\
    \ == UIUserInterfaceIdiomPad) {\n    storeButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
    Done\"\nstyle:UIBarButtonItemStyleDone\ntarget:self\naction:@selector(backToStorePressed:)];\n\
    } else {\n    storeButton = [[UIBarButtonItem alloc] initWithTitle:@\"Store\"\n\
    style:UIBarButtonItemStyleBordered\ntarget:self\naction:@selector(backToStorePressed:)];\n\
    }\n```\n\n此部分更新了作为模态窗口工具栏右侧按钮显示的按钮类型，该模态窗口用于呈现用户的购物车。\n\n下一个要进行的更新在`shouldAutorotateToInterfaceOrientation:`中。在现有的`return`语句之前添加以下代码：\n\
    \n```\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {\n    return\
    \ YES;\n}\n```\n\n最后一个更新在`tableView:viewForFooterInSection:`中。在`return`语句之前，添加以下代码：\n\
    \n```\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {\n    [checkoutButton\
    \ setAutoresizingMask:UIViewAutoresizingNone];\n    [checkoutButton setFrame:CGRectMake(30,\
    \ checkoutButton.frame.origin.y,\n        self.view.frame.size.width - 60, checkoutButton.frame.size.height)];\n\
    }\n```\n\n我们在这里所做的是将自动调整大小掩码设置为`none`，并重置按钮的 frame，使其与周围单元格匹配。\n\n### 收尾工作\n\n\
    就这样！我们已经成功地将`Super Checkout`更新为通用二进制应用。我们几乎重用了所有应用代码，仅需创建一个针对 iPad 的 nib 文件。我们刚刚经历的过程是转换其他现有应用使其同时在\
    \ iPad 和 iPhone/iPod Touch 上运行的良好开端。\n\n与任何新项目一样，关键步骤是第一步。设计应用并制定将现有应用转换为通用二进制应用的方案是最重要的阶段；剩下的只是实施和贯彻设计。\n\
    \n理想情况下，应用应作为通用应用进行设计和开发。这将减少需要实施的变通方案的数量。在开发应用时，脑海中应始终牢记“以通用为目标”这一要点。尽管你正在开发的应用可能仅运行在\
    \ iPhone/iPod Touch 上，但未来可能会要求将其移植到 iPad 上。\n\n实现一个为通用过渡做好准备的设计的最佳方法是减少在代码中创建的视图数量。如果必须在代码中创建视图，请避免硬编码尺寸。使用\
    \ idiom 检测 API 也是将特定代码块专门化到 iPad 或 iPhone/iPod Touch 的关键。在使用 nib 时，对于将在所有设备上使用的\
    \ nib，使用`springs and struts`来实现自动调整大小的视图也是一个好方法。\n\n现在，该应用已成为通用应用，我们可以将其部署给 beta\
    \ 测试者，继续追求更大更好的目标。提交更改，将该分支合并回主分支，并向你的测试者发送一个 beta 版本。既然他们一直在要求一个 iPad 版本，我相信他们会很高兴你倾听了他们的声音并如此迅速地开发出了解决方案。\n"
- fmt: '### Summary


    We now have a universal application that runs on both iPhone and iPad. Supporting
    both families of devices can be difficult, but with enough thought up front, the
    development of the application will be done quicker than if two separate applications
    were developed.


    So what''s next? We''ve covered almost all of the topics we need to in this book
    so far, but we have more surprises for you. In [Chapter 11](#Chapter11.html#ch11),
    we''ll explore how to share your masterpiece with the world. In [Chapter 12](#Chapter12.html#ch12),
    we''ll talk about navigating Xcode with your keyboard and the all-important developer
    workflow. Keyboard shortcuts and other ways to improve your workflow are included.
    I don''t know about you, but I''m a keyboard shortcut person. I love being able
    to hit a few keys and watch the application perform many tasks. I hope you''ll
    find the tips in [Chapter 12](#Chapter12.html#ch12) useful and will be able to
    incorporate these items in your workflow. But first, let''s share our app.


    ## Chapter 11


    ## How Do I Share Some of This?


    Now we''ve built a universal version of Super Checkout. We can package our application
    for submission to the App Store and watch the money and accolades roll in. Of
    course, we''ll have to deal with bug reports and adding new features, but we''ve
    covered how to handle that. What we really want to do is move on and create the
    next great iOS application.


    We could start from scratch, but that would probably entail duplicating a lot
    of work we''ve done for Super Checkout. A simple solution would be to copy the
    code we want to use from Super Checkout into our new project. As you''re probably
    aware, this approach has many problems.


    For example, suppose we receive a bug report from a Super Checkout user that involves
    some of the code we''ve duplicated into our new application. We have to fix two
    sets of identical code (and their associated tests). Of course, we could cut and
    paste the fixes. But while cutting and pasting, we could make a mistake.


    We need to figure out how to maximize our code reuse while minimizing the amount
    of redundant work. The iOS way of achieving this is with a static library. In
    this chapter, we''ll break out some of the Super Checkout code into a separate
    static library project in Xcode. Then, we''ll integrate the new static library
    project into Super Checkout.


    Selling lots of copies of Super Checkout may be great for our wallets, but it
    may not boost our programmer ego. One way to boost our geek credibility would
    be to release some of code as an open source project. Other programmers would
    then see how great our programming skills are. The real bonus is sharing our work
    and improving the quality of our code. In his essay, “The Cathedral and the Bazaar”
    ([`http://www.catb.org/~esr/writings/homesteading/cathedral-bazaar/`](http://www.catb.org/~esr/writings/homesteading/cathedral-bazaar/)),
    Eric Raymond stated “given enough eyeballs, all bugs are shallow,” which alludes
    to Linus''s Law, named after Linus Torvalds of the Linux project. He meant that
    the broader the source code distribution, the more rapidly bugs will be discovered
    and fixed. To distribute our new static library, we''ll share with the world via
    GitHub ([`http://www.github.com/`](http://www.github.com/)), a source code repository
    focused on simplifying code sharing.


    Finally, we''ll briefly cover a few open source software licenses that you may
    adopt for your new static library, including the pros and cons of each. There
    is no right or wrong choice. The license you choose is highly dependent on your
    goals and wishes.


    ### Breaking Out Code into a Static Library


    At its simplest, a static library is an archive of compiled files. These files
    are then linked to an application, making it appear as if the library source is
    part of your application. As I said before, its main goal is to break out application
    code into a reusable package that may be shared across many applications.


    Let''s take a look at our Super Checkout application. What code should be pulled
    out into a static library? Looking at the groups we''ve set up, it''s pretty clear
    that the files in the `ExternalLibraries` folder make good candidates: `ASIHTTPRequest`
    and `SBJSON` (see [Figure 11--1](#Chapter11.html#fig_11_1)).


    ![images](images/1101.jpg)


    **Figure 11–1.** *Super Checkout project groups*


    **NOTE:** OUR EXTERNAL LIBRARY codes bases already exist as static libraries and
    open source projects. You can read more about them at their corresponding home
    pages: [`http://allseeing-i.com/ASIHTTPRequest/`](http://allseeing-i.com/ASIHTTPRequest/)
    (`ASIHTTPRequest`) and [`http://stig.github.com/json-framework/`](http://stig.github.com/json-framework/)
    (`SBJSON`).'
