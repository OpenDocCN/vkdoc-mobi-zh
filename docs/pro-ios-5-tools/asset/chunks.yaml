    # 让构建流程面向未来


    你的 Jenkins 任务正在构建应用，Johnny 终于开始学习内存管理，你的测试版用户正在接收每日构建版本，一切进展顺利。这就像一台运转良好的机器，对吧？确实如此，直到苹果发布了一个测试版
    SDK。在你开始实现 keynote 上构思的那些超棒的新功能之前，你或许应该先创建一个新任务，让你的项目在新测试版 SDK 下进行构建。


    针对多个 SDK 运行 Jenkins 任务是个好主意。这能让你确保向后兼容性，并专注于新的测试版工具，让 Jenkins 来操心旧版本。


    然而，在你的构建服务器上运行两个版本的 Xcode 并非没有麻烦。首先，你将需要使用多个 `xcodebuild` 命令。此外，你还需要确保静态分析器使用正确的编译器。


    多个 `xcodebuild` 的问题很容易解决。Xcode 自带了一个名为 `xcode-select` 的工具，它允许你指定 `xcodebuild`
    应该使用的开发者工具路径。例如，要让 `xcodebuild` 指向 Xcode 测试版（位于 `/Developer Beta`），可以使用以下代码：


    ```

    sudo xcode-select -switch /Developer\ Beta/

    ```


    **注意：** 需要特别留意的是，`xcode-select` 的更改是系统全局的。这意味着，如果任务 A 切换到了测试版 SDK 但没有切回来，那么当任务
    B 启动时，它也会使用测试版 SDK，这可能不是我们想要的。可以考虑以下两种策略：在任务完成前撤销所有更改，或者在每个任务开始时重新设置你的环境。


    `scan-build` 脚本使得选择特定的 `clang` 编译器变得简单。你只需使用 `--use-cc` 标志指定 `clang` 的路径即可，如下所示：


    ```

    /path/to/static-analyzer/scan-build --use-cc /path/to/beta/clang xcodebuild -sdk
    iphonesimulator

    ```


    这相当简单，但有个陷阱。你并非自己执行 `scan-build` 脚本，而是依赖 Clang Scan-Build 插件来为你运行该命令。不幸的是，在撰写本文时，该插件不允许你指定
    `clang` 编译器的位置。不过，它允许你指定 `scan-build` 脚本的位置。这让你可以通过一点创意性的 shell 脚本来生成一个 `scan-build`
    “包装器”，并配置插件，使其在测试版中使用这个包装器代替原始脚本。


    你需要将你的包装器脚本命名为 `scan-build`，调用原始的 `scan-build`，添加自定义的编译器标志，然后传递所有传递给包装器的原始参数。脚本如下：


    ```

    #!/bin/bash

    /path/to/original/scan-build --use-cc /path/to/beta/clang $@

    ```


    这个脚本将自定义编译器标志放在调用者传递的参数之前。将此脚本保存为 `scan-build` 到一个自定义位置。你需要让它成为可执行文件。


    ```

    sudo chmod +x scan-build

    ```


    最后，转到 Jenkins 系统配置页面，为 Clang Static Analyzer 插件添加一个新的 `scan-build`（图 9–24）。保存后，你可以基于现有任务创建一个新的测试版任务，添加对
    `xcode-select` 的调用来切换到测试版工具集，并将 `scan-build` 选择改为使用包装器。搞定！


    ![images](img/0924.jpg)


    **图 9–24.** *请务必为你的各种分析器起个描述性名称。*


    ## 我们还能做什么？


    Jenkins shell 构建步骤与 Xcode 命令行工具的结合，为自动化创造了一些非常引人注目的机会。你已经看到你可以构建、扫描、归档和部署你的应用程序。除了这些非常有用的操作之外，近期的工具集版本还为命令行暴露了一些更有用的功能。例如，单元测试可以像其他目标一样进行构建。但它们在
    Xcode Workspace 上构建起来就没那么容易了。在撰写本文时，`xcodebuild` 工具还不支持它们。


    说到自动化测试，甚至还有一种方法可以运行无头（headless）的自动化工具脚本（Automation Instrument scripts）。在 iOS5
    中引入的 `instruments` 命令行接口提供了一种无需 GUI 即可启动 UIAutomation 测试的方法。示例如下：


    ```

    instruments -t /path/to/template.tracetemplate /path/to/SuperCheckout.app -e UIASCRIPT

    /path/to/TestScript.js -e UIARESULTSPATH /path/to/AutomationResults

    ```


    将你的测试步骤放在一个单独的任务中，并让该任务由主任务的完成来触发，这是一个好主意。为此，首先基于原始任务创建一个新任务。自定义你的构建步骤以包含测试，然后将构建触发器更改为“在其他项目构建完成后构建”，并输入你原始任务的名称。别忘了归档构建产物，这样你就可以从“任务详情”页面获取它们。


    就是这样！Jenkins 正在为你构建和部署项目，你终于可以专注于修复那些 bug 和添加新功能了。自动化是救命稻草，也能节省大量时间。另外，别忘了时常查看
    Jenkins 的插件目录，因为新功能一直在添加。


    # 第 10 章


    ## 现在，他们想要一个 iPad 版本


    自从本书开始以来，我们对 Super Checkout 进行了大量的改造。测试进展顺利，用户的反馈也源源不断，他们压倒性地希望有一个这个应用的 iPad 版本。那么我们现在该怎么做呢？我们是分离出一些公共代码，构建两个完全不同的应用，还是构建一个通用二进制文件（universal
    binary）？这个决定取决于你对应用的目标；它不是由技术决定的。这通常是一个商业决策，因为多个应用可能意味着更多的收入。另一方面，通用应用通常对最终用户更友好，他们可以购买一个应用，就能在
    iPhone、iPod Touch 和 iPad 上运行。


    对于 Super Checkout，我们将选择通用二进制文件这条路线。最终产品将是一个应用，它在 iPhone 和 iPod Touch 上提供与我们目前开发的相同的体验，同时也会提供原生的
    iPad 体验。苹果为检测应用正在运行的设备以及设备具备哪些功能提供了极好的支持。在我们开始之前，请创建并签出一个名为 `Universal_Binary`
    的新分支。


    ### 在我们开始编码之前


    在我们开始编码之前，我们需要经历一个简短的设计阶段，以便我们清楚如何解决这个问题。在本章中，我们将查看一些线框图（wireframes），并讨论如何修改应用以支持
    iPad。这些初始步骤至关重要，因为它们能让你在还为时未晚之前发现错误。在纸上设计有助于看清全局。让我们看看 iPad 能为我们提供什么，并尝试设计一个既能快速开发又能为用户提供价值的解决方案。这不是一本关于用户体验的书，所以我们将会略过所有用户体验细节，专注于
    iOS 开发的创意层面。


    在我们继续之前，关于设计和开发有一个简短说明。我们的首要目标是编写最稳定的应用程序。但同时，确保设计合理也是我们的责任。你非常了解这个平台，并且希望你已经阅读过《人机界面指南》。我们有责任学习一些设计知识，以便成为更好的开发者。设计一个通用应用是锻炼你创造力的绝佳方式。

    '
- fmt: '# Designing for the iPad


    The `iPad` SDK introduced some new user interface components that take advantage
    of the larger screen size. The iPad is also used in multiple orientations as compared
    to the iPhone. These factors weigh into how we make decisions on what the user
    interface looks like and how the user will interact with the application on either
    device. The paradigms used for each device will also need to be similar, so the
    user will have a similar experience when interacting with the application on each
    device.


    Currently, `Super Checkout` is designed to have two sides. The main side is the
    inventory list that drills down into the product details (see [Figure 10–1](#Chapter10.html#fig_10_1)).


    ![images](images/1001.jpg)


    **Figure 10–1.** *The front side of Super Checkout showing the inventory, product
    details, and one item in the shopping cart.*


    Touching the `Cart` button at the top of the `Inventory` screen will flip the
    screen over and show the user''s shopping cart (see [Figure 10–2](#Chapter10.html#fig_10_2)).


    ![images](images/1002.jpg)


    **Figure 10–2.** *The flipside view of the user''s shopping cart*


    For `Super Checkout`, converting the front view of the `iPhone/iPod Touch` version
    to split view makes perfect sense. [Figures 10–3](#Chapter10.html#fig_10_3) through
    [10–5](#Chapter10.html#fig_10_5) show examples of what the application will look
    like after converting the current user experience to the iPad. The specific table
    cells and details of the design will follow the `iPhone/iPod Touch` version. These
    wireframes are a basic idea of how the application will look after we''re done
    implementing the changes.


    ![images](images/1003.jpg)


    **Figure 10–3.** *The portrait orientation view of the iPad version of Super Checkout*


    ![images](images/1004.jpg)


    **Figure 10–4.** *The landscape orientation version of the user interface*


    ![images](images/1005.jpg)


    **Figure 10–5.** *The shopping cart screen shown as a modal view*


    These wireframes show two of the iPad-specific interface elements. The first is
    the split view that has a different view depending on the device''s orientation.
    The inventory view is shown in a popover view in portrait orientation or in the
    view on the left while the device is in landscape. The shopping cart is still
    displayed as a modal view, but it is presented over the interface rather than
    having the entire view flip over like on the `iPhone/iPod Touch` version.


    ## Implementing the iPad Version


    Now, it is time to implement the design. Let''s talk about what a universal application
    is before we start mucking around in the project. A universal binary supports
    multiple user interfaces based on the device. As a part of the implementation
    of the universal application, we will have some pieces that are iPad specific
    and some pieces that will be shared between the devices. From here on out, the
    word “idiom” will be used to refer to the specific device''s form factor. This
    term is used in the APIs revolving around determining which device the application
    is running on.


    ### Modifying the Target


    The first task in converting an application to a universal application is to update
    the project''s application target. Select the `Super Checkout` project in the
    `Project navigator` panel in `Xcode`, and select the `Super Checkout` target.
    Under the `Summary` tab, in the `iOS Application Target` section, there is a drop-down
    menu for selecting the devices the application supports (see [Figure 10–6](#Chapter10.html#fig_10_6)).
    Change the `Devices` configuration from `iPhone` to `Universal`.


    ![images](images/1006.jpg)


    **Figure 10–6.** *Change the Devices configuration from iPhone to Universal.*


    `Xcode` will then ask if you want a copy of the `MainWindow` nib to be the starting
    point for the iPad application (see [Figure 10–7](#Chapter10.html#fig_10_7)).
    Click `Yes`, and you''ll notice a new group under the `Super Checkout` group called
    `iPad`. This contains the `MainWindow-iPad.xib` that was created.


    ![images](images/1007.jpg)


    **Figure 10–7.** *Xcode will create a new MainWindow.xib file when transitioning
    to a universal application.*


    The other file that was touched by `Xcode` to create the universal target was
    the `Super_Checkout-Info.plist` file. The only change made to that file was to
    tell `Cocoa` about the supported orientations and the new nib file.'
