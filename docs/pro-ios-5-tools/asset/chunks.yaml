    `(gdb)`


    At least the exception is descriptive. It appears that we''re not updating the
    shopping cart appropriately. Let''s implement that now.


    We''re going to implement a private method in the `ShoppingCartViewController`
    class, and since we don''t like compiler warnings, we are going to create a category
    on the class. So at the top of `ShoppingCartViewController.m`, add the bold code:


    `#import "ShoppingCartViewController.h"`

    `#import "ProductCell.h"`


    **`@interface ShoppingCartViewController (PrivateMethods)`**

    **`-(void) removeItemFromCart:(NSDictionary *) item;`**

    **`@end`**


    `@implementation ShoppingCartViewController`


    Now add the implementation of the method. At the bottom of the file, add this:


    `#pragma mark - Private Methods`

    `-(void) removeItemFromCart:(NSDictionary *) itemToRemove {`

    `    NSMutableArray *newItemsArray = [NSMutableArray array];`


    `    for(NSDictionary *item in [shoppingCart objectForKey:@"items"]) {`

    `        if([item valueForKey:@"id"] == [itemToRemove valueForKey:@"id"]) {`

    `            continue;`

    `        }`


    `        [newItemsArray addObject:item];`

    `    }`

    `}`


    Let''s test our code now. Disable the breakpoint by either removing it from the
    editor or turn it off using the toggle button (I recommend turning breakpoints
    off for now; don''t remove the breakpoint because the code hasn''t been tested
    yet). Run the application, add an item to the cart, and remove it from the cart.


    That didn''t go well, did it? Go ahead and turn breakpoints back on (see why we
    didn''t remove them all?). Let''s investigate the issue by stepping through code.
    But we''re going to do it the smart way by making a conditional breakpoint.


    A conditional breakpoint only stops when certain values occur in the runtime of
    your program. This is very useful for values that change a lot, such as the position
    of a touch, values in long loops, or intermittent failures that seem to occur
    when certain values become null or reach a critical point.


    In this instance, we''re going to add several items to our cart and set a breakpoint
    in the looping code and see if it stops.'
