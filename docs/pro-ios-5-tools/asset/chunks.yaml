    ## 关于作者


    ![image](img/brandon_alexander.jpg) **布兰登·亚历山大**是一位 iOS 开发者、写作者和会议演讲者，与妻子和女儿居住在乔治亚州迪凯特。布兰登于
    2008 年开始 iOS 开发，并在多个会议上发表过演讲。作为一名开发者，他喜欢让技术对用户透明且优雅实用；作为演讲者和写作者，他乐于向他人传授技术知识，以便他们也能做到这一点。在不编写代码、写作或出席会议时，布兰登喜欢魔术和摄影。你可以在
    Twitter 上通过`@whilethis`找到他，或通过邮件联系[`brandon.alexander@gmail.com`](http://brandon.alexander@gmail.com)。


    ![image](img/brad_dillon.jpg) **布拉德·狄龙**自学成才，自学了其行业所需的技术，经历了 Web 开发、动画和其他基于桌面的交互式平台，最终在触屏界面开发中找到了归宿。自
    iPhone SDK 发布以来，布拉德一直全职为 iOS 设备构建应用。凭借对用户体验的热情和对相关技术的深刻理解，布拉德帮助构建了弥合设备、用户与全球品牌之间差距的解决方案。你可以在[`http://jbradforddillon.com`](http://jbradforddillon.com)找到他，并在
    Twitter 上关注`@jbradforddillon`。


    ![image](img/kevin_y_Kim.jpg) **凯文·Y·金**是 AppOrchard LLC 的创始合伙人，该公司是 Tipping Point
    Partners 旗下专注于可持续 iOS 开发的企业。他毕业于卡内基梅隆大学，在匹兹堡超级计算中心担任程序员时首次接触 NeXTStep 计算机（当今 iPhone
    的前身），并从此着迷。他的职业生涯跨越了金融、政府、生物技术和科技领域，包括在苹果公司任职，负责管理纽约大都会区的苹果企业服务团队。他与妻子以及一群获救的猫咪居住在纽约市字母城地区。


    ## 关于技术审校


    ![image](img/anselm_bradford.jpg) **安塞尔姆·布拉德福德**是新西兰奥克兰理工大学（AUT）的数字媒体讲师，研究方向包括交互式媒体、网络媒体和视觉传达。他与互联网相关的开发经验可以追溯到
    1996 年，当时他手动编写了第一个网站。他可以在 Twitter 上通过`@anselmbradford`找到，并偶尔在[`AnselmBradford.com`](http://AnselmBradford.com)上写博客。

