- fmt: '[Figure 4–14](#Chapter04.html#fig_4_14) also shows when these items occurred,
    the responsible library, and the responsible caller. We''re mostly interested
    in the responsible caller. Looking at the information Instruments gives us, we
    can see three calls into the `SBJsonParser` class, two `NSAutoreleasePool` drains,
    and the zombie call being made in `ShoppingCartViewController`. Look at the call
    stack for the call to the zombie object: open the right pane of the Instruments
    window (using the right button above View in the toolbar at the top of the window),
    and select the Zombie call in the event list.


    ![images](images/0415.jpg)


    **Figure 4–15.** *The call stack that led to a message being passed to a zombie
    reference.*


    [Figure 4–15](#Chapter04.html#fig_4_15) shows how to inspect the call stack that
    leads to the message being passed to a zombie and the ultimate reason the application
    crashed. The call stack we''re looking at shows some Objective-C runtime and framework
    calls being made. We''re not too interested in those, so double-click the `ShoppingCartViewController`
    call in the call stack. This will take us to the offending code. The offending
    line is right here:


    ```

    NSDictionary *cartItem = [[shoppingCart objectForKey:@"items"] objectAtIndex:[indexPath

    row]];

    ```


    The code looks simple enough. We''re grabbing an array from a dictionary and getting
    an item out of that array. Where is the zombie in this instance? The only object
    we''re working with is the `shoppingCart`, so that must be it. But why is it a
    zombie reference? A clue lies in the history of this object. The object begins
    in the `SBJsonParser` and winds up in the `ShoppingCartViewController`. Why is
    the view controller not retaining it? Good question! Let''s take a journey to
    one of the delegate callbacks, `cartContentsReceived:forRequest:` to be exact.
    Here is the method:


    ```

    -(void) cartContentsReceived:(NSDictionary *)cart forRequest:(NSString

    *)connectionIdentifier {

        shoppingCart = cart;


        NSNotification *note = [NSNotification notificationWithName:@"CartUpdated"

    object:[NSNumber

    numberWithInt:[[shoppingCart objectForKey:@"items"] count]]];


        [[NSNotificationCenter defaultCenter] postNotification:note];


        [self.tableView reloadData];


        if([[shoppingCart objectForKey:@"items"] count] == 0) {

            [self setEditing:NO];

        }

    }

    ```


    Can you spot the issue? Yes, the problem is the first line of the method. To fix
    it, all we need to do is update that line to be


    ```

    shoppingCart = [cart retain];

    ```


    Now, let''s run the application and perform the same steps. Does the application
    crash when you go to the shopping cart screen? No? Good. Congratulations! We have
    fixed our first glaring bug in the application.


    ### Zombies in Other Threads (Well Sort Of)


    So far, we''ve fixed a number of issues ranging from simple memory leaks found
    by the static analyzer to finding `NSZombie` instances. There are still more issues
    in this application. Let''s say, for this example, that the QA department has
    come back with a crashing bug with the following description: “Application crashes
    when the user views the detail screen and quickly navigates back to the product
    screen. Problem is more prevalent on an iPhone on a 3G connection than on a Wi-Fi
    connection.”


    The QA engineer sent a crash log with the bug report (the actual crash log is
    longer, but we''re interested in the main thread since that is where the crash
    happened):


    ```

    Thread 0 name:  Dispatch queue: com.apple.main-thread

    Thread 0 Crashed:

    0   libobjc.A.dylib               0x00002c9a objc_msgSend + 18

    1   Foundation                    0x000122ee -[NSURLConnection(NSURLConnectionReallyInternal)

     sendDidFinishLoading] + 62

    2   Foundation                    0x00012270 _NSURLConnectionDidFinishLoading
    + 72

    3   CFNetwork                     0x0000f40a URLConnectionClient::_clientDidFinishLoading(URLConnectionClient::ClientConnectionEventQueu

    e*) + 130

    4   CFNetwork                     0x00003f42

     URLConnectionClient::ClientConnectionEventQueue::processAllEventsAndConsumePayload(XCo

    nnectionEventInfo<XClientEvent, XClientEventParams>*, long) + 94

    5   CFNetwork                     0x00003e34 URLConnectionClient::processEvents()
    + 64

    6   CFNetwork                     0x00003de6

     URLConnection::multiplexerClientPerform(RunLoopMultiplexer*) + 30

    7   CFNetwork                     0x00003d58 MultiplexerSource::perform() + 120

    8   CFNetwork                     0x00003cd6 MultiplexerSource::_perform(void*)
    + 2

    9   CoreFoundation                0x00075a72

     __CFRUNLOOP_IS_CALLING_OUT_TO_A_SOURCE0_PERFORM_FUNCTION__ + 6

    10  CoreFoundation                0x00077758 __CFRunLoopDoSources0 + 376

    11  CoreFoundation                0x000784e4 __CFRunLoopRun + 224

    12  CoreFoundation                0x00008ebc CFRunLoopRunSpecific + 224

    13  CoreFoundation                0x00008dc4 CFRunLoopRunInMode + 52

    14  GraphicsServices              0x00004418 GSEventRunModal + 108

    15  GraphicsServices              0x000044c4 GSEventRun + 56

    16  UIKit                         0x0002ed62 -[UIApplication _run] + 398

    17  UIKit                         0x0002c800 UIApplicationMain + 664

    18  Super Checkout                0x00002648 0x1000 + 5704

    19  Super Checkout                0x00002608 0x1000 + 5640

    ```


    Not very helpful is it? Looking at the crash log, we can determine that the `objc_msgSend`
    call failed. Hmm, a message send failed. That is a pretty big hint; the most likely
    cause seems to be a message getting sent to a zombie. So what we''re going to
    do now is launch the application with the Zombie instrument. There''s a problem
    though. Based on the bug report, the problem is intermittent and more prevalent
    on a 3G connection. There is a way to slow your Internet connection, but we''ll
    get to that in a later chapter. For now, we''ll bypass using Instruments and attach
    a device to let Xcode break on the code that breaks.


    **NOTE:** If you don''t have a device to connect to your Mac, you can follow the
    steps for slowing down your connection found in [Chapter 6](#Chapter06.html#ch6).
    Since you are running in the simulator, you can run the app against the Zombies
    instrument and get the same result as we did with the shopping cart screen bug.'
