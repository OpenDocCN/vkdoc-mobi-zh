  trans: '

    #### 进入“ Instruments ”工具


    好吧，我知道，我们还没进入 Instruments 工具；我们正在靠近它。如果方案编辑器窗口还开着，请点击“好”。现在，通过依次选择 `Product ![images](img/U001.jpg)
    Profile` 来启动 Instruments，Xcode 会构建项目并启动 Instruments。启动后，您将看到如图 2–17 所示的启动界面。


    如果您是在 iOS 设备上启动，您会看到更多可用的工具。在本例中，我们将对模拟器使用 `Leaks` 工具。在对话框中选择 `Leaks`，然后点击 Profile。


    Instruments 将会启动，并运行 `Leaks` 和 `Allocations` 工具。应用程序启动后，您会看到 `Allocations` 工具中出现一些峰值，这是对象在内存中被分配的表现。我们暂时不深入探讨这意味着什么，但您现在知道了如何从
    Xcode 启动 Instruments。


    ![images](img/0217.jpg)


    **图 2–17.** *Instruments 的启动界面允许通过模拟器进行分析。在真实设备上进行分析将显示更多工具。*


    #### 众多的 Instruments 工具


    `Instruments` 是一个诊断应用程序问题的强大工具。然而，学会如何有效使用其各种工具，才是调优应用程序使其高效运行的关键。在深入后续章节的众多工具之前，让我们先简要了解一下
    `Instruments` 的用户界面，并对各种可用工具进行一个快速概览。


    图 2–18 展示了对本章应用程序的一次运行。顶部的工具栏让您可以开始或停止数据收集、连接到系统上运行的不同应用程序，以及执行其他高级任务来精简您收集的数据。“Instruments”部分显示了每个工具所收集数据的各种图表。在我们的示例中，检测到零泄漏，并且在应用程序启动初期内存分配有一个峰值。


    ![images](img/0218.jpg)


    **图 2–18.** *Instruments 对我们的“Super Hello World”应用程序运行了 `Allocations` 和 `Leaks`
    工具*


    Instruments 窗格下方的区域显示了当前活动的工具，右侧是跳转栏。跳转栏下方的详细信息是来自所选工具的具体数据。点击 Instruments 窗格中的工具或在活动工具下拉菜单中选择它，都会改变数据的视图。请自行尝试，看看
    `Leaks` 工具如果检测到泄漏会显示什么样的数据。


    我们已经了解了 `Allocations` 和 `Leaks` 工具。还有其他许多工具可供使用：


    - **Activity Monitor（活动监视器）**：此工具监视系统整体活动和统计信息。这些统计信息包括 CPU、内存、磁盘和网络使用情况。它还会监视其他进程，以了解整个系统在不同条件下的运行状况。

    - **Time Profiler（时间分析器）**：此工具以低开销的方式对系统在任意时刻运行的进程进行基于时间的采样。

    - **Automation（自动化）**：此工具执行一个脚本，模拟用户对从 `Instruments` 启动的 iOS 应用程序的交互。

    - **Energy Diagnostics（能耗诊断）**：此工具监视设备不同组件的开/关状态，并提供应用程序运行时的能耗使用情况。

    - **System Usage（系统使用情况）**：此工具记录单个进程与文件、套接字和共享内存相关的 I/O 系统活动。

    - **Core Animation（核心动画）**：此工具测量应用程序的图形性能以及进程的 CPU 使用率。

    - **OpenGL ES Driver（OpenGL ES 驱动）**：此工具测量 `OpenGL ES` 的性能。本书不会涵盖此工具。

    - **OpenGL ES Analysis（OpenGL ES 分析）**：此工具测量并分析 `OpenGL ES` 活动，以检测正确性和性能问题。本书不会涵盖此工具。


    ### 性能调优


    本书的其余部分将使用本节概述的流程来查找性能瓶颈。在诊断性能问题时，无论问题是什么，其过程基本上是相同的。遵循这些原则将避免很多麻烦，并减少您可能引入到应用程序中的错误数量。


    性能调优是一个相当科学的过程。首先，找出应用程序中您认为可能需要调优的部分，并围绕该部分收集数据。您的假设可能是正确的，您会找到瓶颈所在。然而，您正在测试的应用程序方面可能并非问题所在。请始终为此做好准备。始终准备好改变假设并适应您的数据。如果数据显示某个部分运行得并不差，那么它很可能就不是问题。


    当您找到瓶颈或性能低下之处时，找出一两个指标来衡量。调优的关键始终是度量指标。确保您所做的更改只调整了这一个指标，这将带来一次成功的调优会话。


    另一个经验法则是每次只更改一件事。同时更改多件事可能会引发问题，因为这两个更改可能会相互抵消，或引入未知的错误。我们通常处理的是具有许多活动部件的复杂系统，引入更改就可能引入错误。一个不错的做法是事先准备好单元测试，以确保您在提高性能的同时没有改变原有功能。我曾在一个高性能计算课程中遇到过这个问题。任务是编写一个进化算法来求解一个复杂的多变量代数方程。我有了一个可运行的算法，但我觉得它有点慢，于是开始调整。调整完成后，我进行了测试，结果它只有一半的时间能正常工作，而原始版本是
    100%可以工作的。我最终意识到我改动太多了，无法追踪到底是哪个改动破坏了算法。那时，我真切地感激版本控制的存在。


    当您阅读本书的剩余部分时，请记住，我们真正关心的是性能的大幅提升（但仍要努力实现零泄漏——用户讨厌有泄漏的应用程序）。您认为花几个小时去调整一项可能提升不到
    1%速度的改动值得吗？您的用户会注意到您每秒多压榨出两帧以达到每秒 80 帧吗？我不这么认为。我们关注的是用户能注意到的、大规模的性能改进。


    ### 本章小结


    本章我们涵盖了很多内容。我们从全新的项目开始，使用 Xcode 内置的新 Interface Builder 组件添加了一些新的类和用户界面。我们还修改了数据模型并生成了模型类，以创建一个稍微更复杂的应用程序。


    最后，我们查看了方案编辑器，以了解构建配置在 Xcode 中的存放位置。最后一步是启动 Instruments，并看到这些优秀工具之间的出色集成。本章涵盖的所有内容一开始可能让人应接不暇，但您会掌握它的。苹果公司确实为开发者提供了一些顶级的工具，它们不会妨碍我们将一些伟大的想法转化为为用户带来的精彩体验。


    现在是时候投入到本书剩余项目的开发中了。您已经了解了这些工具的作用；现在让我们使用它们吧。


    ## 第 3 章

    '
- fmt: '### Three Screens … and Well, It Runs


    In the previous chapter, we covered some highlights of how to use the new iOS
    developer tools. The chapters that follow will build on that base and show you
    some great techniques for turning your application into something that will bring
    your users back time and time again. In order to do this, we are going to spend
    the next several chapters walking through an application that has, shall we say,
    a few problems. Some will be obvious, and others will take some digging to find.
    The application we''re going to use is a virtual fruit stand. The requirements
    for the application are to display the product inventory including the product''s
    image, view a product''s details, add to a shopping cart, view the shopping cart,
    and check out. The application is in an alpha stage at this point; it has met
    the basic requirements but it needs some attention in regards to performance and
    has some crashing issues.


    ### Working with GitHub


    For this project, we''re going to pull the source code from an existing repository.
    The project is hosted up on a social coding web site called GitHub. Head over
    to [`www.github.com/signup/free`](http://www.github.com/signup/free) and create
    a free account. At the time of this writing, the registration form looks like
    the one shown in [Figure 3–1](#Chapter03.html#fig_3_1).


    ![images](images/0301.jpg)


    **Figure 3–1.** *The GitHub registration screen*


    GitHub offers a free account that gives you the ability to create unlimited (at
    the time of this writing) public Git repositories. Paid accounts are available
    that will let you invite other developers to contribute to private repositories.
    The application we''re going to follow throughout this book is hosted as a public
    repository.


    **NOTE:** Git is a distributed version control system. It is packaged with Xcode,
    so there isn''t anything more to install. We''re going to utilize Xcode''s built-in
    Git support to track our changes throughout this book. Git has a very powerful
    command-line interface, so picking up a little bit of Git command line kung fu
    will increase your productivity as a developer.


    The next step to getting code checked out from GitHub is setting up your SSH public
    keys. Head over to [`https://github.com/account/ssh`](https://github.com/account/ssh),
    and click “Add another public key” (see [Figure 3–2](#Chapter03.html#fig_3_2)).


    ![images](images/0302.jpg)


    **Figure 3–2.** *We''re about to add a public key, so we can check out our code
    securely over SSH.*


    Setting up a public SSH key is super simple. In fact, the fine folks at GitHub
    have published instructions on how to set up your SSH keys here: [`http://help.github.com/mac-set-up-git/`](http://help.github.com/mac-set-up-git/)
    (see [Figure 3–3](#Chapter03.html#fig_3_3)).


    ![images](images/0303.jpg)


    **Figure 3–3.** *Setting up SSH keys on OS X*


    Once Git is set up on your machine and the SSH keys are configured, you''re ready
    to move on to forking the project and navigating through the application.


    ### Connecting to Super Checkout


    Now, let''s fork the project so you can pull it down and start making your changes.
    The main project can be found at [`https://github.com/whilethis/Super-Checkout`](https://github.com/whilethis/Super-Checkout).
    When you fork the project, you''ll have your own personal copy of the repository
    to check out and push to or pull from. To create a fork, click the Fork button
    in the upper-right corner of the main project web page (see [Figure 3–4](#Chapter03.html#fig_3_4)).


    ![images](images/0304.jpg)


    **Figure 3–4.** *On the original project''s screen, clicking the Fork button will
    create your very own copy of the Git repository.*


    From the forked project''s site, copy the URL that looks like the one shown in
    [Figure 3–5](#Chapter03.html#fig_3_5).


    ![images](images/0305.jpg)


    **Figure 3–5.** *Your project will have your github.com username instead of whilethis
    in the URL*


    Now, fire up Xcode 4, and the Welcome to Xcode screen shown in [Figure 3–6](#Chapter03.html#fig_3_6)
    comes up. In the previous chapter, we created a new project from scratch. This
    time, we''re going to connect to a repository.


    ![images](images/0306.jpg)


    **Figure 3–6.** *The Welcome to Xcode screen lets you create a new project or
    connect to a source code repository.*


    Click the “Connect to a repository” button. You are prompted to enter the repository''s
    location, as shown in [Figure 3–7](#Chapter03.html#fig_3_7). Enter the repository
    URL copied from GitHub, and Xcode will automatically check to see if the host
    is reachable and allow you to continue. Click Next, and we''ll save the code on
    disk.


    If, for some reason, you try to connect to GitHub before configuring your SSH
    keys, you''ll be prompted to confirm the identity of the Git server and challenged
    for a username and password. The entire reason we set up the SSH keys is to prevent
    these issues from happening. If, however, you have set up the SSH keys and didn''t
    issue the `ssh -T` command, you''ll be presented with the identity confirmation
    screen shown in [Figure 3–8](#Chapter03.html#fig_3_8).


    ![images](images/0307.jpg)


    **Figure 3–7.** *Xcode 4 automatically detects the type of repository when checking
    out code from an existing repository.*


    **NOTE:** Make sure you choose the same repository type when connecting to a remote
    repository directly. Xcode will try to clone or check out the repository using
    the protocol of the type chosen in [Figure 3–8](#Chapter03.html#fig_3_8).


    Next, you tell Xcode the name of the project and what type of repository it is
    (see [Figure 3–8](#Chapter03.html#fig_3_8)). Name the project `Super Checkout`,
    and click Clone.


    ![images](images/0308.jpg)


    **Figure 3–8.** *Naming your project and choosing the repository type*


    The next screen asks you where to put your working copy. Choose a location on
    disk, and click Clone. If the clone operation is complete, you''ll be presented
    with the options Open Project and Don''t Open (see [Figure 3–9](#Chapter03.html#fig_3_9)).
    Click Open Project, and we''re off to the races. If you skip the public key creation
    we covered earlier, you will see some confirmation dialogue boxes and other authentication
    issues. If you run into any issues, head back to the public key creation step
    and try again.


    ![images](images/0309.jpg)


    **Figure 3–9.** *A successful clone of our Super Checkout project*


    ### Taking a Look Around


    The application is pretty simple. It consists of a navigation controller with
    a table view controller to display the product inventory, a product details view
    controller as a drill-down from the product inventory, a shopping cart controller
    that is presented as a flip-over modal view controller. The module that communicates
    with the service is a simple engine that uses the same approach that Matt Gemmell
    ([`http://instinctivecode.com/`](http://instinctivecode.com/)) took with his Twitter
    engine.


    The API engine handles the communication with the server and invokes the parser
    to parse the data coming from the server. The server speaks in JSON (JavaScript
    Object Notation), and the project is using the SBJSON library ([`https://github.com/stig/json-framework/`](https://github.com/stig/json-framework/))
    to parse the data into native Cocoa Touch classes. Each view controller gets its
    own instance of the engine and uses delegation to ensure the server communication
    is asynchronous.


    The user interface is mostly table views with some custom cells designed in Interface
    Builder.'
