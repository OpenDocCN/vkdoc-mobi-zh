- fmt: '#### A Brief look at Core Graphics


    Each `UIView` subclass has mechanisms for drawing itself and controlling its own
    layout. These methods are called on demand by Cocoa Touch and usually follow calls
    to either `setNeedsDisplay` or `setNeedsLayout`. Since we have those methods,
    `drawRect:` and `layoutSubviews` should never be called directly. If you want
    to trigger `drawRect:`, call `setNeedsDisplay`, and Cocoa will figure out the
    best time to call `drawRect:`. The same can be said for `setNeedsLayout` and `layoutSubviews`.
    This ensures that all updates to the view get made at once, and a render is scheduled
    at the most convenient time for Cocoa to efficiently draw the views in question.


    So what happens after you schedule a rendering of your view? Well, if you look
    at [Figure 5–13](#Chapter05.html#fig_5_13), you can get a good overview of what
    goes on when Cocoa is rendering your view. This occurs on each and every `UIView`
    in your application, and this consistency becomes very important later.


    ![images](images/0513.jpg)


    **Figure 5–13.** *An overview of the view drawing cycle*


    Now that the basics are covered, let''s dive into what goes on behind the scenes.
    The core element for each rendered view is the layer property on the view. This
    is the layer that is rendered by Core Animation. Core Animation resides in the
    media layer of the iOS architecture, directly underneath Cocoa Touch, where UIKit
    resides (see [Figure 5–14](#Chapter05.html#fig_5_14)). Core Animation is a part
    of the Core Graphics framework. Core Graphics is also referred to as Quartz 2D
    and does all of the heavy lifting in terms of drawing.


    ![images](images/0514.jpg)


    **Figure 5–14.** *This is the basic architecture of iOS with the media layer highlighted;
    the media layer is where we''ll spend most of our time.*


    It is Core Graphics''s job to render the entire screen of the application. It
    is also responsible for animating the transitions between different views. A great
    example of these kinds of animations is pushing a view controller on a `UINavigationController`''s
    view stack. `UIScrollView` instances also use Core Graphics to animate the scrolling
    of views as the user interacts with it. `UITableView` is a `UIScrollView`, so
    it needs to animate all of the table cells as the user scrolls up and down.


    #### Getting Back to Instruments


    Now, Super Checkout comes in the picture. The view that we are tuning is a table
    view, and our cells could be causing some of these performance issues based on
    how they are designed. To diagnose this, we need to profile Super Checkout with
    the Core Animation instrument.


    ![images](images/0515.jpg)


    **Figure 5–15.** *The Core Animation instrument*


    The Core Animation instrument gives us a template for viewing a raw measurement
    of rendered frames per second as well as a CPU usage graph. This instrument also
    allows us to modify the way the application is rendered so we can get clues as
    to how Core Graphics is really rendering each view. [Figure 5–16](#Chapter05.html#fig_5_16)
    gives you an idea of what options you can turn on; each one has its particular
    use. We''re only interested in seeing how the layers are blended right now.


    ![images](images/0516.jpg)


    **Figure 5–16.** *The Debug options for getting some insight on how Core Graphics
    is rendering your application*


    Go ahead and profile the application with the Core Animation instrument. After
    Instruments has launched and the application is going, turn on Color Blended Layers
    in the debug options. If you don''t see those options, click the graph for the
    Core Animation instrument, and it will activate them. When you turn on blended
    layers, your screen will look very funky. Check out [Figure 5–17](#Chapter05.html#fig_5_17),
    and we''ll discuss what this information tells us.


    In [Figure 5–17](#Chapter05.html#fig_5_17), we''re looking at a view of how Core
    Graphics sees our application. Remember how I mentioned that the compositor would
    be important later? This is the part I was referring to. This view shows us how
    Core Graphics draws and what kind of compositing it has to do.


    **NOTE:** Compositing is a fancy way of combining layered pieces on top of each
    other. There are some very sophisticated algorithms to composite multiple layers
    and create one image. Fortunately, the engineers behind Core Graphics have done
    all of the heavy lifting for us, so we don''t have to worry about rendering each
    and every screen.


    ![images](images/0517.jpg)


    **Figure 5–17.** *The blended layers view gives us a look into how Core Graphics
    renders each screen.*


    Take another look at [Figure 5–16](#Chapter05.html#fig_5_16). Each different shade
    is its own layer. In fact, every time a new `UIView` (or a subclass of `UIView`)
    is created a new layer is created. These layers are of type `CALayer` and are
    actually the medium in which the view is drawn on. These layers are then composited
    to create the final image that is rendered on screen.


    Compositing is expensive, so this is where the bottleneck can happen. Take a look
    at each `UILabel` for each cell. Quite a bit of empty space has to be rendered.
    If the view is marked as opaque, the compositor doesn''t have to calculate what
    the view underneath the opaque view looks like with whatever might be on top of
    it. Imagine having three or four views with differing levels of alpha sitting
    on top of an image. The compositor has to work overtime to render the view. Throw
    animation at the picture and you get something that looks very stuttery because
    the compositor has to take a bit longer to render each intermediate frame.


    There is a good way to fix this issue, however. Instead of managing numerous subviews
    in our table cell, we can draw our items directly in the view itself and render
    only one layer. [Figure 5–18](#Chapter05.html#fig_5_18) gives you a view of what
    this looks like with blended layers turned on.


    ![images](images/0518.jpg)


    **Figure 5–18.** *Our newly designed cell with only one blended layer*'
