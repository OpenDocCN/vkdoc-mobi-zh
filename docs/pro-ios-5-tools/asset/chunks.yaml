- fmt: '#### Documentation


    The second section in this table is the `Documentation` section. You can see it
    in [Figure 12–9](#Chapter12.html#fig_12_9). In this section, Xcode allows you
    to update your documentation for iOS, Mac, and Xcode, as well as third-party docsets
    that support the appropriate format.


    ![images](images/1209.jpg)


    **Figure 12–9.** *The `Documentation` tab not only manages iOS/Mac/Xcode documentation,
    it manages third-party library documentation from any atom feed.*


    The documentation sets are downloaded from an Atom feed. Select an entry in the
    list, and click the triangle button to the left of the `Add Feed` button, and
    you''ll see the properties of the feed selected ([Figure 12–9](#Chapter12.html#fig_12_9)
    again). Since the documentation sets are configured via an Atom feed, Xcode can
    be configured to automatically check for updates.


    #### Locations


    We''re almost finished with Xcode preferences. The next tab is `Locations` (see
    [Figure 12–10](#Chapter12.html#fig_12_10)). In this tab, you can define custom
    locations for items such as derived data, snapshots, and archived applications,
    as well as your source trees. Derived data are the actual build artifacts, intermediate
    build files, logs, and project indexes used by Xcode. Be careful not to place
    these files into source control, since they are changed a lot and can be regenerated
    from the project files.


    ![images](images/1210.jpg)


    **Figure 12–10.** *The `Locations` tab lets you configure the default locations
    for build artifacts.*


    Nine times out of ten, you''ll not touch this preference. It is always good to
    know it exists, though.


    ##### Source Trees


    The next section in the `Location` tab is the `Source Trees` section (see [Figure
    12–11](#Chapter12.html#fig_12_11)). This tab lets you define common locations
    for source that can be located outside of your project. The `Setting Name` is
    the name that identifies the source tree; it must be the same for every developer
    who is using the same Xcode project. The `Display Name` is the name that Xcode
    uses to display the source tree in the file inspector; it can be any name. The
    `Path` is the full path to the source tree on the file system; it will differ
    from computer to computer and user to user.


    ![images](images/1211.jpg)


    **Figure 12–11.** *This `Source Trees` tab displays an empty list. Put paths to
    common source files in this list to reference them in multiple projects.*


    `Source Trees` preferences are very useful because they let each developer have
    his or her own development configurations, and they make sharing code between
    projects super easy.


    #### Distributed Builds


    The final tab in Xcode''s preferences is `Distributed Builds` (see [Figure 12–12](#Chapter12.html#fig_12_12)).
    Distributed builds are useful when a project takes minutes to compile. When distributed
    builds are configured, you can either serve out or be served compilations units.
    For the former, shared resources on the network accessible via Bonjour will be
    used. You can also define multiple sets for sharing compilation units with.


    When you turn on the setting to share your machine, your machine will be available
    at any time for a distributed build. Xcode does not have to be running, and you
    do not have to be logged in to share your machine with the build cluster.


    ![images](images/1212.jpg)


    **Figure 12–12.** *Using distributed builds can speed up projects with a large
    number of source files.*


    ### Keyboard Shortcuts and More


    If you''re like me, you don''t use a mouse or a trackpad that often. I always
    keep one hand on the keyboard ready to hit some keyboard shortcut to perform a
    task. The common ones like cut ( ![Image](images/U002.jpg) +X), copy ( ![Image](images/U002.jpg)
    +C), and paste ( ![Image](images/U002.jpg) +V) are the easiest to call out because
    they are used in virtually every application.


    I remember when I stopped using the context menu and started using the keyboard
    for those operations. I felt more productive and was able to do even more with
    the saved time. That was the point where I started learning more shortcuts to
    streamline my workflow and become more efficient.


    In this section, we''re going to cover Xcode 4''s keyboard shortcuts and how they
    can improve your workflow.


    #### Migrating from Xcode 3 to Xcode 4


    When I started programming for iOS, Xcode 3 was the IDE. Xcode 3 was great, and
    its integration with Interface Builder was done fairly well. The fact that you
    had to open two separate applications was a bit annoying, but when you have an
    app to ship, you get over that pretty quickly. Getting used to navigating through
    Xcode 3 and learning those keyboard shortcuts didn''t take long, and I was able
    to move rapidly through all of my code.


    Then Apple announced static analysis and clang. I didn''t think things could get
    any better. I had a compiler that told me when I would have memory leaks and other
    things that could cause strange behavior in my application. There was even a new
    compiler that generated faster code! Xcode 3 started to look a bit outdated.


    Fast forward a bit, and we see Xcode 4 come out in a developer preview at WWDC.
    Interface Builder is integrated, and Xcode is just one big window. I dove in and
    started looking around and quickly missed Xcode 3. I went back and didn''t touch
    the new tools for a while.


    A few beta releases later, Apple had fixed some of the bugs, and I wanted to see
    what was new. As soon as I saw that I was able to have Interface Builder generate
    and wire up my actions and outlets directly in my source files, I was sold. There
    was no turning back, so I started really learning how to navigate such a foreign
    IDE.


    When I first started learning how to navigate through Xcode with the keyboard,
    I started noticing some patterns. For example, holding down option while interacting
    with files would open the selected file in an assistant editor. Adding shift to
    the mix would bring up a nice `Open In` dialog (see [Figure 12–13](#Chapter12.html#fig_12_13)).


    ![images](images/1213.jpg)


    **Figure 12–13.** *The `Open In` dialog is a lifesaver when you want to open something
    in a new tab, editor, or window.*


    Consistency like this has helped me find some really nice features in Xcode 4.
    I love knowing that holding option+shift while clicking something in the navigator
    area or command+option+shift when clicking a symbol in your editor (command adds
    the "click me" piece to the symbol) opens the ability to create a new tab or a
    new window. I can even use the same technique with the `Open Quickly` (command+shift+o)
    command and have a file open in a new tab in no time.


    #### Give Me the Shortcuts Already!


    I''ve teased you enough with the shortcuts, so let''s go through them by function.
    [Table 12–1](#Chapter12.html#tab_12_1) is all about navigating through Xcode.
    For example, opening and closing some of the areas interacting with Xcode''s different
    editor modes can all be done from the keyboard. [Table 12–2](#Chapter12.html#tab_12_2)
    is all about file/symbol manipulation and what you can do while editing a file
    and jumping around to make editing smooth and painless. [Table 12–3](#Chapter12.html#tab_12_3)
    is about schemes and performing scheme actions from the keyboard.


    ![Image](images/t1201.jpg)


    ![Image](images/t1202.jpg)


    ![Image](images/t1203.jpg)


    ![Image](images/t1203a.jpg)


    This is only a portion of all of the shortcuts available in Xcode 4. The rest
    can be found in Xcode''s preferences and in the menu bar. There is also an exhaustive
    list put together by Colin Wheeler at [`https://github.com/Machx/Xcode-Keyboard-Shortcuts`](https://github.com/Machx/Xcode-Keyboard-Shortcuts).'
  raw: '#### Documentation


    The second section in this table is the Documentation section. You can see it
    in [Figure 12–9](#Chapter12.html#fig_12_9). In this section Xcode allows you to
    update your documentation for iOS, Mac, and Xcode as well as third-party docsets
    that support the appropriate format.


    ![images](images/1209.jpg)


    **Figure 12–9.** *The Documentation tab not only manages iOS/Mac/Xcode documentation,
    it manages third-party library documentation from any atom feed.*


    The documentation sets are downloaded from an Atom feed. Select an entry in the
    list, and click the triangle button to the left of the Add Feed button, and you''ll
    see the properties of the feed selected ([Figure 12–9](#Chapter12.html#fig_12_9)
    again). Since the documentation sets are configured via an Atom feed, Xcode can
    be configured to automatically check for updates.


    #### Locations


    We''re almost finished with Xcode preferences. The next tab is Locations (see
    [Figure 12–10](#Chapter12.html#fig_12_10)). In this tab, you can define custom
    locations for items such as derived data, snapshots, and archived applications
    as well as your source trees. Derived data are the actual build artifacts, intermediate
    build files, logs, and project indexes used by Xcode. Be careful not to place
    these files into source control, since they are changed a lot and can be regenerated
    from the project files.


    ![images](images/1210.jpg)


    **Figure 12–10.** *The Locations tab lets you configure the default locations
    for build artifacts.*


    Nine times out of ten, you''ll not touch this preference. It is always good to
    know it exists though.


    ##### Source Trees


    The next section in the Location tab is the Source Trees section (see [Figure
    12–11](#Chapter12.html#fig_12_11)). This tab lets you define common locations
    for source that can be located outside of your project. The Setting Name is the
    name that identifies the source tree; it must be the same for every developer
    who is using the same Xcode project. The Display Name is the name that Xcode uses
    to display the source tree in the file inspector; it can be any name. The Path
    is the full path to the source tree on the file system; it will differ from computer
    to computer and user to user.


    ![images](images/1211.jpg)


    **Figure 12–11.** *This Source Trees tab displays an empty list. Put paths to
    common source files in this list to reference them in multiple projects.*


    Source Trees preferences are very useful because they let each developer have
    his or her own development configurations, and they make sharing code between
    projects super easy.


    #### Distributed Builds


    The final tab in the Xcode''s preferences is Distributed Builds (see [Figure 12–12](#Chapter12.html#fig_12_12)).
    Distributed builds are useful when a project takes minutes to compile. When distributed
    builds are configured, you can either serve out or be served compilations units.
    For the former, shared resources on the network accessible via Bonjour will be
    used. You can also define multiple sets for sharing compilation units with.


