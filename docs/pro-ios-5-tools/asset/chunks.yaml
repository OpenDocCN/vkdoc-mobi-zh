    ![images](images/0901.jpg)


    **Figure 9–1.** *Installation should be a familiar process. No surprises or gotchas.*


    Inside the Jenkins folder, you''ll find the Jenkins `.WAR` (Java Web Archive)
    file. If you''re not familiar with Java, this is the executable for the web application.
