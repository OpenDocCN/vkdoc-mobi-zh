    接下来，我们想为 `UIImage` 创建一个类别，添加一个返回自身缩放版本的方法。为此，转到 **File** ![images](img/U002.jpg)
    **New** ![images](img/U002.jpg) **New File**，在 Cocoa Touch 下选择 Objective-C category。将类别命名为
    **Resize**，并创建在 `UIImage` 上（参见图 6–15）。点击 Next，将文件保存在项目中，然后点击 Create。


    ![images](img/0615.jpg)


    **图 6–15.** *Xcode 使得创建类别变得超级简单！*


    创建新类别后，打开新创建的 `UIImage+Resize.h` 文件，并将此方法添加到头文件中：


    `- (UIImage*) resizedImageWithSize:(CGSize)size;`


