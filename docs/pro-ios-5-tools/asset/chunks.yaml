    Before we run the application, an important thing to note on these custom cells
    is the fact that the highlighted and selected states need to be handled. Since
    we are drawing our text on the view being displayed, we don''t get the benefits
    of being in a `UILabel`. This is the price we pay for doing our own custom drawing
    within our view.


    Now profile the application with the Core Animation and turn on the blended layers
    option. No more layered views sending the compositor into overtime. Scroll up
    and down, and take a look at the frame rate. The frame rate is consistently higher
    now that we''re combining a number of performance updates from basic image caching
    to reducing the amount of compositing the system has to do for animation. [Figure
    5–19](#Chapter05.html#fig_5_19) shows several runs of the Core Animation instrument
    with different versions of Super Checkout as these views were being debugged.
    There''s not much of a difference, but notice that the top run performed the best.


    ![images](images/0519.jpg)


    **Figure 5–19.** *Different runs of Super Checkout through the Core Animation
    instrument*


    **NOTE:** The table cells we are using should be created by using a built-in cell
    type. The only thing that would still need to be implemented is the code that
    loads the image and scales it down to fit within cell''s image view. This technique,
    however, is perfect for any complicated cell that can''t be accomplished by using
    a cell that Apple provides in UIKit.'
