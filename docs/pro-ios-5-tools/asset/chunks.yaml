    您的工作区现在应该有一个项目，Super Checkout（参见 Figure 11–29）。重复此过程以添加 ASIHTTPRequest 和 SBJSON
    项目。再次使用导航窗格中的上下文菜单，而不是文件菜单。完成后，您的工作区窗口应类似于 Figure 11–30。


