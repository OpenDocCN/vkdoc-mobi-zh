  trans: '

    #### 文档


    该表格中的第二部分是「文档」部分。你可以在图 12–9 中看到它。在此部分，Xcode 允许你更新 iOS、Mac 和 Xcode 的文档，以及支持相应格式的第三方文档集。


    ![images](img/1209.jpg)


    **图 12–9.** *「文档」标签页不仅管理 iOS/Mac/Xcode 文档，还管理来自任何 Atom feed 的第三方库文档。*


    这些文档集是通过 Atom feed 下载的。在列表中选择一个条目，并点击「添加 Feed」按钮左侧的三角形按钮，你将看到所选 feed 的属性（再次参见图
    12–9）。由于文档集是通过 Atom feed 配置的，Xcode 可以配置为自动检查更新。


    #### 位置


    我们快完成 Xcode 偏好设置了。下一个标签页是「位置」（参见图 12–10）。在此标签页中，你可以为派生数据、快照、归档的应用以及源码树等条目定义自定义位置。派生数据是指
    Xcode 使用的实际构建产物、中间构建文件、日志和项目索引。注意不要将这些文件放入源代码控制中，因为它们会频繁更改，并且可以从项目文件重新生成。


    ![images](img/1210.jpg)


    **图 12–10.** *「位置」标签页允许你配置构建产物的默认位置。*


    十有八九，你不会触碰这个偏好设置。不过，知道它的存在总是好的。


    ##### 源码树


    「位置」标签页中的下一个部分是「源码树」部分（参见图 12–11）。该标签页允许你为位于项目外部的源码定义公共位置。「设置名称」是标识源码树的名称；对于使用同一
    Xcode 项目的每个开发者来说，该名称必须相同。「显示名称」是 Xcode 在文件检查器中显示源码树所用的名称；它可以是任意名称。「路径」是源码树在文件系统中的完整路径；它会因计算机和用户的不同而不同。


    ![images](img/1211.jpg)


    **图 12–11.** *这个「源码树」标签页显示了一个空列表。将公共源文件的路径放入此列表，以便在多个项目中引用它们。*


    「源码树」偏好设置非常有用，因为它允许每个开发者拥有自己的开发配置，并且使项目间的代码共享变得极其简单。


    #### 分布式构建


    Xcode 偏好设置中的最后一个标签页是「分布式构建」（参见图 12–12）。当一个项目需要几分钟才能编译完成时，分布式构建非常有用。配置分布式构建后，你可以提供编译单元给他人，或者使用他人提供的编译单元。对于前者，将通过
    Bonjour 访问网络中共享的资源。你还可以定义多个集合来共享编译单元。


    当你开启共享你的机器的设置时，你的机器将随时可用于分布式构建。Xcode 不需要运行，你也不需要登录即可与构建集群共享你的机器。


    ![images](img/1212.jpg)


    **图 12–12.** *使用分布式构建可以加速包含大量源文件的项目。*


    ### 键盘快捷键及其他


    如果你和我一样，不经常使用鼠标或触控板。我总是将一只手放在键盘上，随时准备按下某个键盘快捷键来执行任务。常见的快捷键，如剪切（![Image](img/U002.jpg)
    +X）、复制（![Image](img/U002.jpg) +C）和粘贴（![Image](img/U002.jpg) +V）是最容易提到的，因为它们几乎在每一个应用程序中都会用到。


    我记得当我停止使用上下文菜单，开始使用键盘进行这些操作时，我感觉效率更高了，并且能够利用节省的时间做更多事情。正是从那时起，我开始学习更多的快捷键来简化我的工作流程并变得更有效率。


    在本节中，我们将介绍 Xcode 4 的键盘快捷键以及它们如何改进你的工作流程。


    #### 从 Xcode 3 迁移到 Xcode 4


    当我开始为 iOS 编程时，Xcode 3 是 IDE。Xcode 3 很棒，它与 Interface Builder 的集成也做得相当好。你必须打开两个独立的应用程序，这有点烦人，但当你有应用要发布时，很快就会克服这一点。适应
    Xcode 3 的导航并学习其键盘快捷键并不需要很长时间，我能够快速浏览所有代码。


    然后 Apple 推出了静态分析和 clang。我以为情况不会更好了。我有了一个编译器，它能告诉我何时会发生内存泄漏以及其他可能导致应用程序出现异常行为的问题。甚至还有一个能生成更快代码的新编译器！Xcode
    3 开始显得有些过时了。


    时间快进一点，我们看到 Xcode 4 在 WWDC 上以开发者预览版的形式出现。Interface Builder 被集成进来，Xcode 只是一个大的窗口。我深入其中开始四处查看，很快就怀念起了
    Xcode 3。我退出使用，有一段时间没有碰这些新工具。


    又经过几个测试版发布后，Apple 修复了一些 bug，我想看看有什么新东西。当我看到我能够让 Interface Builder 直接在源文件中生成并连接我的操作和输出口时，我就被说服了。没有回头路了，所以我开始真正学习如何在这个陌生的
    IDE 中导航。


    当我最初开始学习如何用键盘在 Xcode 中导航时，我开始注意到一些模式。例如，在与文件交互时按住 Option 键会在辅助编辑器中打开所选文件。再加上 Shift
    键会弹出一个方便的「在...中打开」对话框（参见图 12–13）。


    ![images](img/1213.jpg)


    **图 12–13.** *当你想在新标签页、编辑器或窗口中打开某些内容时，「在...中打开」对话框是一个救星。*


    像这样的一致性帮助我在 Xcode 4 中发现了一些非常好的功能。我很喜欢知道，在导航区域单击某物时按住 Option + Shift，或者在编辑器中单击某个符号时按住
    Command + Option + Shift（Command 为符号添加了「点击我」功能），可以打开创建新标签页或新窗口的功能。我甚至可以使用相同的技巧配合「快速打开」(Command
    + Shift + O) 命令，在短时间内就能在新标签页中打开一个文件。


    #### 快给我快捷键！


    我已经用快捷键吊足了你的胃口，那么让我们按功能来逐一了解它们。表 12–1 全部是关于在 Xcode 中导航的。例如，打开和关闭某些区域、与 Xcode 的不同编辑器模式交互，都可以通过键盘完成。表
    12–2 全部是关于文件/符号操作，以及你在编辑文件时能做什么，并通过跳转使编辑变得流畅和无痛。表 12–3 是关于方案以及从键盘执行方案操作的。


    ![Image](img/t1201.jpg)


    ![Image](img/t1202.jpg)


    ![Image](img/t1203.jpg)


    ![Image](img/t1203a.jpg)


    以上只是 Xcode 4 中所有可用快捷键的一部分。其余的可以在 Xcode 的偏好设置和菜单栏中找到。Colin Wheeler 还在 [`https://github.com/Machx/Xcode-Keyboard-Shortcuts`](https://github.com/Machx/Xcode-Keyboard-Shortcuts)
    整理了一份详尽的列表。

    '
- fmt: '### Viewing Documentation


    Now that you are a master at using `Xcode` directly from the keyboard, we can
    move on to one final item: viewing documentation. Reading documentation is at
    least half of our job as developers. Earlier in this chapter, you saw where we
    can configure custom documentation sets from atom feeds. That is only half of
    the story.


    Once the feed is downloaded (in the case of Apple''s provided documentation) or
    added, you will need to search the documentation and have a quick reference guide
    to the documentation. The first place we will look is in the main `Xcode` window.


    Open the `Super Checkout` project (if you don''t have it open already), and navigate
    to `Super_CheckoutAppDelegate.h`. Next, option-click the `UIApplicationDelegate`
    protocol symbol (notice the cursor will change styles, and the symbol will be
    underlined on hover). The resulting popover (shown in [Figure 12–14](#Chapter12.html#fig_12_14))
    shows a brief abstract for the selected symbol.


    ![images](images/1214.jpg)


    **Figure 12–14.** *The documentation popover gives you a brief abstract for the
    selected symbol.*


    From here, you can do many different things. Clicking the book at the upper right
    of the popover will bring up the Organizer with the appropriate documentation
    for the symbol. Clicking the file with the “h” in the middle of it will bring
    up the public header provided by the framework author (if one is provided). The
    rest of the links in the popover will open the Organizer or the header file. You
    can also see where other, related documents are available for viewing, which can
    be handy when you need to see sample code or a programming guide for a particular
    class.


    The second way to view documentation is to open the Utility area. Most things
    have a quick help lookup, and you don''t need to option-click the item. [Figure
    12–15](#Chapter12.html#fig_12_15) shows the same instance as [Figure 12–14](#Chapter12.html#fig_12_14)
    with the Utility pane open with the Quick Help Inspector selected.


    ![images](images/1215.jpg)


    **Figure 12–15.** *The Quick Help Inspector shows the same information as the
    help popover, but it will show help for more than just code.*


    Something nice about the Quick Help Inspector is its ability to show quick help
    for more than just code. In the Build Settings for a target, you can select any
    setting, and the Quick Help Inspector will show you which compiler flag that the
    setting will set and what that flag does.


    The final way to view documentation is through the Organizer. Open the Organizer
    by clicking the Organizer button at the top-right corner of the `Xcode 4` window.
    This will bring up the Organizer window. Click the Documentation tab, and type
    `NSObject` (see [Figure 12–16](#Chapter12.html#fig_12_16)).


    ![images](images/1216.jpg)


    **Figure 12–16.** *The Organizer''s documentation window is extremely useful when
    you need to search the body of documentation for your project.*


    By default, the Organizer will limit your results to the top results, and you
    can click the “Show … More Results” text under each section to see all of the
    results. It is also likely that you''ll see duplicated entries. To fix this, click
    the magnifying glass, and select Show Find Options to expand some options and
    narrow your search. It isn''t very often that you''ll be developing a Mac app
    and an iOS app at the same time.


    That''s about all there is for reading documentation. Being able to read the documentation
    and knowing exactly where to go to get the level of detail you need is important
    to stay as efficient as possible when developing your applications.


    ### Summary


    That''s it. We''re done here! I hope you have learned as much as I did when writing
    this book. There are many things that I didn''t get a chance to cover in this
    book, and my hope is that you now have enough background with the developer tools
    to venture out on your own and learn some of these things on your own. I''ve given
    you the knowledge of how to use the tools; it is up to you to use them for good.
    Now, go write some amazing apps!


