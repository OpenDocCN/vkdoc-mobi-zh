- fmt: "# 排版后内容\n\nWith the category complete, open `Super_CheckoutViewController.m`.\
    \ We need to modify only two methods in this file. In `tableView:cellForRowAtIndexPath:`,\
    \ update it to look like this:\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n               cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n\
    \    ProductCell *cell = (ProductCell *)[tableView dequeueReusableCellWithIdentifier:\n\
    \                                                               [ProductCell \
    \ reuseIdentifier]];\n\n    if(cell == nil) {\n        cell = [[[ProductCell alloc]\
    \ initWithStyle:UITableViewCellStyleDefault\n                                \
    \        reuseIdentifier:[ProductCell reuseIdentifier]] autorelease];\n    }\n\
    \    Product *item = (Product *)[inventory objectAtIndex:[indexPath row]];\n\n\
    \    [cell setProductInformation:item];\n    [cell setAccessoryType:UITableViewCellAccessoryDisclosureIndicator];\n\
    \n    //[self setProductCell:nil];\n\n    //Fetch image for the cell\n    UIImage\
    \ *image = [apiEngine cachedImageForProduct:[item thumb]];\n    if(image == nil)\
    \ {\n        if (self.tableView.dragging == NO && self.tableView.decelerating\
    \ == NO) {\n            NSString *requestId = [apiEngine getImageForProduct:[item\
    \ thumb]];\n\n            [imageIndexes setObject:[NSNumber numberWithInt:[indexPath\
    \ row]]\n                                               forKey:requestId];\n \
    \       }\n    } else {\n        [cell setProductImage:image];\n    }\n\n    return\
    \ cell;\n}\n```\n\nUpdate `imageReceived:forRequest:` to look like this:\n\n```\n\
    -(void) imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier\
    \ {\n    NSIndexPath *indexPath =\n              [NSIndexPath indexPathForRow:[[imageIndexes\
    \ objectForKey:connectionIdentifier] intValue]\n                             \
    \                              inSection:0];\n    ProductCell *prod = (ProductCell\
    \ *)[[self tableView] cellForRowAtIndexPath:indexPath];\n\n    [prod setProductImage:[image\
    \ resizedImageWithSize:CGSizeMake(64.0, 64.0)]];\n\n    [imageIndexes removeObjectForKey:connectionIdentifier];\n\
    }\n```\n\nFinally, in `didReceiveMemoryWarning`, add this line:\n\n`[apiEngine\
    \ clearCache];`\n\nNow the API engine creates a simple in-memory cache, and the\
    \ products list view takes full advantage of it. The product details view doesn't\
    \ need to change anything, however. This is because the API engine checks the\
    \ cache before making the request. Simple and intelligent caching solutions usually\
    \ hide the details of the cache from most view controllers.\n\nSince the first\
    \ level of our two-tier approach is complete, let's take a look at our disk caching\
    \ solution.\n\n## Implementing Our Disk Caching Solution\n\nThe `ASIHTTPRequest`\
    \ team members have given us the second tier of our caching solution. They have\
    \ created a class called `ASIDownloadCache`. This class is the default implementation\
    \ of the `ASICacheDelegate` protocol. If you have your own disk caching system,\
    \ conform to that protocol, and you can tie that implementation into `ASIHTTPRequest`.\n\
    \nFor Super Checkout, we'll be using the default implementation that comes with\
    \ the project. To implement these changes, we'll be editing only the `SuperCheckoutAPIEngine.m`\
    \ source file. Open it, and add `#import \"ASIDownloadCache.h\"` to the import\
    \ statements. Then, modify the class extension interface to look like [Listing\
    \ 6–9](#Chapter06.html#list_6_9).\n\n**Listing 6–9.** *Modifying the Class Extension\
    \ to Add Cache Control to It*\n\n```\n// Utility methods\n- (NSString *)_queryStringWithBase:(NSString\
    \ *)base\n                                               parameters:(NSDictionary\
    \ *)params\n                                                     prefixed:(BOOL)prefixed;\n\
    - (NSString *)_encodeString:(NSString *)string;\n\n// Connection/Request methods\n\
    \n- (NSString *)_sendRequest:(NSURL *)theURL\nwithRequestType:(SuperCheckoutRequestType)requestType\n\
    responseType:(SuperCheckoutResponseType)responseType\ncache:(BOOL)cache;\n- (NSString\
    \ *)_sendRequestWithMethod:(NSString *)method\n                              \
    \  path:(NSString *)path\n                     queryParameters:(NSDictionary *)params\n\
    \                                body:(NSString *)body\n                     \
    \    requestType:(SuperCheckoutRequestType)requestType\n                     \
    \   responseType:(SuperCheckoutResponseType)responseType;\n\n- (NSString *)_sendImageRequestWithURL:(NSString\
    \ *)imageURL;\n- (NSURL *)_baseURLWithMethod:(NSString *)method\n            \
    \             path:(NSString *)path\n                  requestType:(SuperCheckoutRequestType)requestType\n\
    \              queryParameters:(NSDictionary *)params;\n\n// Parsing methods\n\
    - (void)_parseDataForConnection:(ASIHTTPRequest *)connection;\n\n// Delegate methods\n\
    - (BOOL) _isValidDelegateForSelector:(SEL)selector;\n\n- (NSCache *) imageCache;\n\
    ```\n\nThis way, we can control what requests do or do not get cached.\n\nNow,\
    \ in the implementation, update the same signature we just modified to match the\
    \ declaration. Next, add the following block after `[request setDelegate:self]`:\n\
    \n```\n[request setDelegate:self];\n\nif(cache) {\n[request setDownloadCache:[ASIDownloadCache\
    \ sharedCache]];\n[request setCachePolicy:\nASIAskServerIfModifiedCachePolicy|ASIFallbackToCacheIfLoadFailsCachePolicy];\n\
    [request setCacheStoragePolicy:ASICachePermanentlyCacheStoragePolicy];\n}\nNSString\
    \ *requestIdentifier = [NSString stringWithNewUUID];    \n```\n\nThe next updates\
    \ are to change the calls to the updated method.\n\nIn `_sendRequestWithMethod:path:queryParameters:body:requestType:responseType:`\
    \ change the return to pass `NO` to the method, like this:\n\n```\nreturn [self\
    \ _sendRequest:theUrl\n                withRequestType:requestType\n         \
    \           responseType:responseType\n                                      \
    \  cache:NO];\n```\n\nAnd in `_sendImageRequestWithURL:` change the return line\
    \ to look like this:\n\n```\nreturn [self _sendRequest:theURL\n              \
    \  withRequestType:SuperCheckoutProductImage\n                    responseType:SuperCheckoutImage\n\
    \                                    cache:YES];\n```\n\nThe most important updates\
    \ for this tier of the cache are:\n\n`[request setDownloadCache:[ASIDownloadCache\
    \ sharedCache]];`\n`[request setCachePolicy:`\n`ASIAskServerIfModifiedCachePolicy|ASIFallbackToCacheIfLoadFailsCachePolicy];`\n\
    `[request setCacheStoragePolicy:ASICachePermanentlyCacheStoragePolicy];`\n\nWhat\
    \ we're doing here is setting the download cache for the request to the default\
    \ cache provided by the ASI team. Then, we're setting up the cache policy such\
    \ that the server is asked if the requested resource has changed. If the resource\
    \ has not changed, the request will use the cache. If the resource has changed,\
    \ a new resource will be loaded and cached. If the request fails, the cache will\
    \ be used (if one exists).\n\nThe final line is to tell the cache to store the\
    \ files permanently. By default, the cache is set to the cache directory on the\
    \ device. This folder is not synchronized to the computer when the device is plugged\
    \ in to iTunes and iOS will clear out the folder as necessary.\n\nNow that we\
    \ have a solid caching scheme in place, we can move on to the final level of testing—Battery\
    \ Life Management."
