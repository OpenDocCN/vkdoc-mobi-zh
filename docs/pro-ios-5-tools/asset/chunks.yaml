- fmt: "# Designing for Consumption\n\nDesigning a server-side API is a completely\
    \ different beast than designing an application on iOS. Many other considerations\
    \ need to be made, and thoughtfulness toward the consumer is central. For Super\
    \ Checkout, we decided on a very simple API that relied on `GET` requests and\
    \ query string parameters. The communication medium was JSON due to its lightweight\
    \ nature. The server manages a session and the current shopping cart.\n\nAs far\
    \ as the data model, the server always returns a wrapper object. [Figure 6–10](#Chapter06.html#fig_6_10)\
    \ shows what this wrapper object looks like.\n\n![images](images/0610.jpg)\n\n\
    **Figure 6–10.** *The definition of the response wrapper*\n\nThis object gives\
    \ us everything we need to know about the response. If the call succeeded (i.e.,\
    \ a 200 HTTP status code) and there was a problem with the data, we know what\
    \ happened. If you'll notice, Super Checkout assumes a successful call every time.\
    \ This is a problem with the application that could come back to haunt us later.\n\
    \nSo how do we handle these errors? Let's get back into the code, and check it\
    \ out.\n\nOpen `SuperCheckoutAPIEngine.m`, and navigate to the implementation\
    \ of `parsingSucceededForRequest:ofResponseType:parsedObjects:`. This method is\
    \ the callback from our parser. Since all of our responses have the same wrapper,\
    \ we'll handle the errors in here.\n\nFirst, we'll want to add some error constants\
    \ and an error domain for the `NSError` object we'll be creating. At the top of\
    \ the file, below the compiler macros, add the following lines:\n\n```\nNSString*\
    \ const APIErrorDomain = @\"SuperCheckoutAPIErrorDomain\";\n```\n\n```\ntypedef\
    \ enum SuperCheckoutAPIErrorType {\n    APIErrorType\n} SuperCheckoutAPIErrorType;\n\
    ```\n\nNow, navigate back to the `parsingSucceededForRequest:ofResponseType:parsedObjects:`\
    \ method, and add the following code above the `switch` statement:\n\n```\nif([[parsedObject\
    \ objectForKey:@\"status\"] intValue] != 0) {\n    NSError *error = [NSError errorWithDomain:APIErrorDomain\n\
    \                                        code:APIErrorType\n                 \
    \                   userInfo:\n                        [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \                        [parsedObject objectForKey:@\"message\"],\n         \
    \               NSLocalizedDescriptionKey,nil]];\n\n    if ([self _isValidDelegateForSelector:@selector(requestFailed:withError:)]){\n\
    \        [delegate requestFailed:identifier withError:error];\n    }\n\n    return;\n\
    }\n```\n\nNow that we have handled errors, we are sending errors to the view controller\
    \ with (hopefully) meaningful messages that come back from the server.\n\n# Using\
    \ Debugging Tools\n\nMany times when developing the client engine that consumes\
    \ the service, data coming back from the server wasn't what I expected. Instead\
    \ of littering the source with `NSLog` statements, I used some handy tools to\
    \ verify what was getting sent to the server and what was being returned. These\
    \ tools greatly sped up the debugging process when the server-side components\
    \ were in development and the client code was misbehaving.\n\nTwo different tools\
    \ were used to accomplish each task. The first one was used to test the inputs\
    \ and outputs from the service to check to see if the services were working. It\
    \ is called RESTClient and is a plug-in for Firefox. It can be found at [https://addons.mozilla.org/en-US/firefox/addon/restclient/](https://addons.mozilla.org/en-US/firefox/addon/restclient/).\
    \ [Figure 6–11](#Chapter06.html#fig_6_11) is a view of what the client looks like\
    \ after hitting on of the main services in Super Checkout.\n\n![images](images/0611.jpg)\n\
    \n**Figure 6–11.** *RESTClient for Firefox is a great utility to check service\
    \ responses*\n\nAs [Figure 6–11](#Chapter06.html#fig_6_11) shows, the interface\
    \ is pretty simple. It lets you select the request method, enter a base URL, input\
    \ request headers, and add a request body. Click Send, and the request is made\
    \ with the response header and body coming back. The tabs to the right of Response\
    \ Body will be tailored to the request type. In the example in [Figure 6–11](#Chapter06.html#fig_6_11),\
    \ RESTClient has formatted the JSON string returned from the service.\n\nThis\
    \ is a great utility when all you need is a quick tool to check the response of\
    \ a request or debug an issue with the server. Some other great tools that live\
    \ on the command line are more powerful, but this tool gets the job done. The\
    \ ultimate point is to find a reliable, quick tool to quickly exercise the end\
    \ services to make sure the services work as expected as you troubleshoot or test\
    \ the server component of your application.\n\nThe next tool is definitely the\
    \ more powerful of the two and deserves to be in any developer's toolbox. This\
    \ application is called Charles, and it is a web proxy. It can be found at [http://www.charlesproxy.com/](http://www.charlesproxy.com/).\
    \ Charles is a commercial application, but it does have a free trial. This application\
    \ watches all the web traffic on your machine and logs it (while the recorder\
    \ is turned on). [Figure 6–12](#Chapter06.html#fig_6_12) shows Charles logging\
    \ the traffic from getting products, adding a product to the cart, and checking\
    \ out.\n\n![images](images/0612.jpg)\n\n**Figure 6–12.** *Charles doing its traffic-logging\
    \ thing*\n\nCharles gives you way more information about the request and response.\
    \ It gives the same information as RESTClient, but the requests are coming from\
    \ the app. This information can be used to see what the requests look like coming\
    \ out of the device to make sure they are formatted properly and to make sure\
    \ the responses are formatted appropriately too.\n\n**NOTE:** Charles will not\
    \ act as a proxy for the device. Any tests that are run need to be run from the\
    \ iOS Simulator.\n\n## Slowing Things Down with the Network Link Conditioner\n\
    \nWhen testing in the simulator, you are usually testing on a pretty large and\
    \ mostly reliable Internet connection. The problem with this is that the device\
    \ communicates over a slower and extremely unreliable network. Replicating real-world\
    \ scenarios in a sterile development environment is a pretty tricky task to accomplish.\
    \ Fortunately, developers have solved this problem.\n\nThe tool to throttle bandwidth\
    \ is called the Network Link Conditioner and is bundled with Xcode 4.2 for OS\
    \ 10.7 (Lion). The preference pane can be found in `/Developer/Applications/Utilities/Network\\\
    \ Link\\ Conditioner`. Open it, and it will install it into System Preferences\
    \ for you. Network Link Conditioner is a preference pane that lets you enter the\
    \ ports to throttle, hosts to throttle, latency, and speed to throttle down to.\
    \ The values for throttling include common speeds for Edge and 3G. [Figure 6–13](#Chapter06.html#fig_6_13)\
    \ shows Network Link Conditioner in the process of throttling to our services.\n\
    \n![images](images/0613.jpg)\n\n**Figure 6–13.** *The Network Link in System Preferences\
    \ needs to be unlocked and enabled.*\n\nSince this chapter is all about networking\
    \ and most users' data packages for the device are no longer unlimited, testing\
    \ using the simulator makes a lot of sense. With Speedlimit, we can get a good\
    \ idea how an application is going to perform in the field. This is vitally important\
    \ for applications that perform a large number of requests. Understanding how\
    \ an application will perform on a poorly performing network will help in making\
    \ decisions on caching approaches.\n\nTo turn on the link conditioner, you'll\
    \ first need to unlock the keychain by clicking on the lock at the bottom of the\
    \ preference pane. Then you'll select the appropriate profile to mimic and turn\
    \ the switch to the on position. This will slow down the network for the entire\
    \ machine, so if you were doing something in another app, you will see a drop\
    \ in network performance."
