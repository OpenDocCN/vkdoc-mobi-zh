- fmt: "#### Exporting Beyond Jenkins\n\nHaving the IPA on the Job Details page is\
    \ useful, but it doesn't exactly solve the problem you set out with. You need\
    \ to enable over-the-air (OTA) distribution so that your beta testers can quickly\
    \ and easily get up and running with new updates without the hassle of dealing\
    \ with provisioning profiles, iTunes, iPhone Configuration Utility, etc.\n\nThe\
    \ ingredients for enabling OTA distribution are fairly simple to whip together.\
    \ You'll need a manifest property list and a link to the manifest that uses the\
    \ built in installation URL scheme. This prompts the system to read the manifest\
    \ and trigger the installation process.\n\nHere's a sample manifest:\n\n```\n\
    <?xml version=\"1.0\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\
    \n\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\"\
    >\n  <dict>\n    <!-- array of downloads. -->\n    <key>items</key>\n    <array>\n\
    \      <dict>\n        <!-- an array of assets to download -->\n        <key>assets</key>\n\
    \        <array>\n          <!-- software-package: the ipa to install. -->\n \
    \         <dict>\n            <!-- required.  the asset kind. -->\n          \
    \  <key>kind</key>\n            <string>software-package</string>\n          \
    \  <!-- optional.  md5 every n bytes.  will restart a chunk if md5 fails. -->\n\
    \            <key>md5-size</key>\n            <integer>10485760</integer>\n  \
    \          <!-- optional.  array of md5 hashes for each \"md5-size\" sized chunk.\
    \ -->\n            <key>md5s</key>\n            <array>\n              <string>41fa64bb7a7cae5a46bfb45821ac8bba</string>\n\
    \              <string>51fa64bb7a7cae5a46bfb45821ac8bba</string>\n           \
    \ </array>\n            <!-- required.  the URL of the file to download. -->\n\
    \            <key>url</key>\n            <string>http://www.example.com/apps/foo.ipa</string>\n\
    \          </dict>\n          <!-- display-image: the icon to display during download\
    \ .-->\n          <dict>\n            <key>kind</key>\n            <string>display-image</string>\n\
    \            <!-- optional.  indicates if icon needs shine effect applied. -->\n\
    \            <key>needs-shine</key>\n            <true/>\n            <key>url</key>\n\
    \            <string>http://www.example.com/image.57x57.png</string>\n       \
    \   </dict>\n          <!-- full-size-image: the large 512x512 icon used by iTunes.\
    \ -->\n          <dict>\n            <key>kind</key>\n            <string>full-size-image</string>\n\
    \            <!-- optional.  one md5 hash for the entire file. -->\n         \
    \   <key>md5</key>\n            <string>61fa64bb7a7cae5a46bfb45821ac8bba</string>\n\
    \            <key>needs-shine</key>\n            <true/>\n            <key>url</key>\n\
    \            <string>http://www.example.com/image.512x512.jpg</string>\n     \
    \     </dict>\n        </array>\n        <key>metadata</key>\n        <dict>\n\
    \          <!-- required -->\n          <key>bundle-identifier</key>\n       \
    \   <string>com.example.fooapp</string>\n          <!-- optional (software only)\
    \ -->\n          <key>bundle-version</key>\n          <string>1.0</string>\n \
    \         <!-- required.  the download kind. -->\n          <key>kind</key>\n\
    \          <string>software</string>\n          <!-- optional. displayed during\
    \ download; typically company name -->\n          <key>subtitle</key>\n      \
    \    <string>Apple</string>\n          <!-- required.  the title to display during\
    \ the download. -->\n          <key>title</key>\n          <string>Example Corporate\
    \ App</string>\n        </dict>\n      </dict>\n    </array>\n  </dict>\n</plist>\n\
    ```\n\nYou can find this manifest and more details in Apple's Enterprise Distribution\
    \ guide at [`http://developer.apple.com/library/ios/#featuredarticles/FA_Wireless_Enterprise_App_Distribution/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#featuredarticles/FA_Wireless_Enterprise_App_Distribution/Introduction/Introduction.html).\n\
    \nIf you take this property list format and modify it to reflect your app's specifics,\
    \ you can pass the manifest to the system using the built in URL scheme.\n\n```\n\
    itms-services://?action=download-manifest&url=http://example.com/manifest.plist\n\
    ```\n\nFor example, creating an HTML link that will install your app is as simple\
    \ as\n\n```\n<a href=\"itms-services://?action=download-manifest&url=http://example.com/manifest.plist\"\
    >\n  Install App\n</a>\n```\n\nAs you can see, once you've got a properly provisioned\
    \ archive, setting up OTA deployment is extremely simple. It would be fairly simple\
    \ to create a shell script (or any type of script) that generates the manifest\
    \ property list for you and publishes a link to install the app.\n\n#### Can't\
    \ Someone Else Handle All This?\n\nWhile Apple makes OTA deployment pretty easy\
    \ (once you feng shui the archiving), there's plenty of room for improving the\
    \ process. There are several great organizations out there providing systems to\
    \ manage the deployment process from simple beta testing to enterprise level distribution.\
    \ A great option for your Super Checkout beta is Test Flight ([`http://testflightapp.com`](http://testflightapp.com),\
    \ [Figure 9–23](#Chapter09.html#fig_9_23)). Test Flight offers fantastic beta\
    \ app deployment with a great web-based UI to manage your apps and track its installation.\n\
    \n![images](images/0923.jpg)\n\n**Figure 9–23.** *TestFlight has an extremely\
    \ simple and straightforward distribution method.*\n\nWhile Test Flight hangs\
    \ its hat on a simple and beautiful user experience (and rightly so!), it also\
    \ offers an extremely useful, and equally simple, API for posting new builds and\
    \ notifying your testers. Once you've set up an account with Test Flight, a Jenkins\
    \ build step could be created to execute the following shell script (note the\
    \ use of Jenkins environment variables to add some useful data to the release\
    \ notes):\n\n```\ncurl http://testflightapp.com/api/builds.json \\\n  -F file=@SuperCheckout.ipa\
    \ \\\n  -F api_token='<your_api_token>' \\\n  -F team_token='<your_team_token>'\
    \ \\\n  -F notes='$JOB_NAME, build number $BUILD_NUMBER: For release notes, visit\
    \ $BUILD_URL' \\\n  -F notify=True \\\n  -F distribution_lists='Internal, QA'\n\
    ```\n\n#### Creating Nightlies\n\nYou want to use your deployment build step,\
    \ but you don't want to inundate the beta testers with a new version after every\
    \ commit to your repo. It would be much better to deploy a single, nightly build.\
    \ You've spent so much time carefully crafting your build job, it would be a shame\
    \ to have to redo all of that. Fortunately, Jenkins allows you to duplicate jobs.\
    \ More specifically, it allows you to create new jobs using a previous job as\
    \ a template.\n\nFrom the Dashboard, click `New Job` in the sidebar. Give the\
    \ job a name like `SuperCheckoutNightly` (remember that some plug-ins don't like\
    \ white space), and select the `Copy existing job` radio button. As you start\
    \ typing the job name, Jenkins should make some suggestions. Select your existing\
    \ job and click `OK`.\n\nThe Job Configuration page for your new job should look\
    \ pretty familiar. To make it a nightly, you just need to change the Build Triggers.\
    \ Check the `Build periodically` checkbox, and uncheck any others. In the Schedule\
    \ text area, you can simply enter the keyword `@midnight`.\n\nOnce you've converted\
    \ your new job to a nightly build, you can add your deployment script as a build\
    \ step at the bottom. You can probably lighten the load on the system by turning\
    \ off steps like static analysis and post-build notifications."
  raw: '#### Exporting Beyond Jenkins


    Having the IPA on the Job Details page is useful, but it doesn''t exactly solve
    the problem you set out with. You need to enable over-the-air (OTA) distribution
    so that your beta testers can quickly and easily get up and running with new updates
    without the hassle of dealing with provisioning profiles, iTunes, iPhone Configuration
    Utility, etc.


    The ingredients for enabling OTA distribution are fairly simple to whip together.
    You''ll need a manifest property list and a link to the manifest that uses the
    built in installation URL scheme. This prompts the system to read the manifest
    and trigger the installation process.


    Here''s a sample manifest:


    `<?xml version="1.0"?>`

    `<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"`

    `"http://www.apple.com/DTDs/PropertyList-1.0.dtd">`

    `<plist version="1.0">`

    `  <dict>`

    `    <!-- array of downloads. -->`

    `    <key>items</key>`

    `    <array>`

    `      <dict>`

    `        <!-- an array of assets to download -->`

    `        <key>assets</key>`

    `        <array>`

    `          <!-- software-package: the ipa to install. -->`

    `          <dict>`

    `            <!-- required.  the asset kind. -->`

    `            <key>kind</key>`

    `            <string>software-package</string>`

    `            <!-- optional.  md5 every n bytes.  will restart a chunk if md5 fails.
    -->`

    `            <key>md5-size</key>`

    `            <integer>10485760</integer>`

    `            <!-- optional.  array of md5 hashes for each "md5-size" sized chunk.
    -->`

    `            <key>md5s</key>`

    `            <array>`

    `              <string>41fa64bb7a7cae5a46bfb45821ac8bba</string>`

    `              <string>51fa64bb7a7cae5a46bfb45821ac8bba</string>`

    `            </array>`

    `            <!-- required.  the URL of the file to download. -->`

    `            <key>url</key>`

    `            <string>http://www.example.com/apps/foo.ipa</string>`

    `          </dict>`

    `          <!-- display-image: the icon to display during download .-->`

    `          <dict>`

    `            <key>kind</key>`

    `            <string>display-image</string>`

    `            <!-- optional.  indicates if icon needs shine effect applied. -->`

    `            <key>needs-shine</key>`

    `            <true/>`

    `            <key>url</key>`

    `            <string>http://www.example.com/image.57x57.png</string>`

    `          </dict>`

    `          <!-- full-size-image: the large 512x512 icon used by iTunes. -->`

    `          <dict>`

    `            <key>kind</key>`

    `            <string>full-size-image</string>`

    `            <!-- optional.  one md5 hash for the entire file. -->`

    `            <key>md5</key>`

    `            <string>61fa64bb7a7cae5a46bfb45821ac8bba</string>`

    `            <key>needs-shine</key>`

    `            <true/>`

    `            <key>url</key>`

    `            <string>http://www.example.com/image.512x512.jpg</string>`

    `          </dict>`

    `        </array>`

    `        <key>metadata</key>`

    `        <dict>`

    `          <!-- required -->`

    `          <key>bundle-identifier</key>`

    `          <string>com.example.fooapp</string>`

    `          <!-- optional (software only) -->`

    `          <key>bundle-version</key>`

    `          <string>1.0</string>`

    `          <!-- required.  the download kind. -->`

    `          <key>kind</key>`

    `          <string>software</string>`

    `          <!-- optional. displayed during download; typically company name -->`

    `          <key>subtitle</key>`

    `          <string>Apple</string>`

    `          <!-- required.  the title to display during the download. -->`

    `          <key>title</key>`

    `          <string>Example Corporate App</string>`

    `        </dict>`

    `      </dict>`

    `    </array>`

    `  </dict>`

    `</plist>`


    You can find this manifest and more details in Apple''s Enterprise Distribution
    guide at [`http://developer.apple.com/library/ios/#featuredarticles/FA_Wireless_Enterprise_App_Distribution/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#featuredarticles/FA_Wireless_Enterprise_App_Distribution/Introduction/Introduction.html)`.`


    If you take this property list format and modify it to reflect your app''s specifics,
    you can pass the manifest to the system using the built in URL scheme.


    `itms-services://?action=download-manifest&url=http://example.com/manifest.plist`


    For example, creating an HTML link that will install your app is as simple as


    `<a href="itms-services://?action=download-manifest&url=http://example.com/manifest.plist">`

    `  Install App`

    `</a>`


    As you can see, once you''ve got a properly provisioned archive, setting up OTA
    deployment is extremely simple. It would be fairly simple to create a shell script
    (or any type of script) that generates the manifest property list for you and
    publishes a link to install the app.


    #### Can''t Someone Else Handle All This?


    While Apple makes OTA deployment pretty easy (once you feng shui the archiving),
    there''s plenty of room for improving the process. There are several great organizations
    out there providing systems to manage the deployment process from simple beta
    testing to enterprise level distribution. A great option for your Super Checkout
    beta is Test Flight ([`http://testflightapp.com`](http://testflightapp.com), [Figure
    9–23](#Chapter09.html#fig_9_23)). Test Flight offers fantastic beta app deployment
    with a great web-based UI to manage your apps and track its installation.


    ![images](images/0923.jpg)


    **Figure 9–23.** *TestFlight has an extremely simple and straightforward distribution
    method.*


    While Test Flight hangs its hat on a simple and beautiful user experience (and
    rightly so!), it also offers an extremely useful, and equally simple, API for
    posting new builds and notifying your testers. Once you''ve set up an account
    with Test Flight, a Jenkins build step could be created to execute the following
    shell script (note the use of Jenkins environment variables to add some useful
    data to the release notes):


    `curl http://testflightapp.com/api/builds.json`

    `  -F file=@SuperCheckout.ipa`

    `  -F api_token=''<your_api_token>''`

    `  -F team_token=''<your_team_token>''`

    `  -F notes=''$JOB_NAME, build number $BUILD_NUMBER: For release notes, visit
    $BUILD_URL''`

    `  -F notify=True`

    `  -F distribution_lists=''Internal, QA''`


    #### Creating Nightlies


    You want to use your deployment build step, but you don''t want to inundate the
    beta testers with a new version after every commit to your repo. It would be much
    better to deploy a single, nightly build. You''ve spent so much time carefully
    crafting your build job, it would be a shame to have to redo all of that. Fortunately,
    Jenkins allows you to duplicate jobs. More specifically, it allows you to create
    new jobs using a previous job as a template.


    From the Dashboard, click New Job in the sidebar. Give the job a name like “SuperCheckoutNightly”
    (remember that some plug-ins don''t like white space), and select the Copy existing
    job radio button. As you start typing the job name, Jenkins should make some suggestions.
    Select your existing job and click OK.


    The Job Configuration page for your new job should look pretty familiar. To make
    it a nightly, you just need to change the Build Triggers. Check the Build periodically
    checkbox, and uncheck any others. In the Schedule text area, you can simply enter
    the keyword @midnight.


    Once you''ve converted your new job to a nightly build, you can add your deployment
    script as a build step at the bottom. You can probably lighten the load on the
    system by turning off steps like static analysis and post-build notifications.'
  trans: "  \n#### 导出到 Jenkins 之外\n\n在任务详情页面上看到 IPA 文件固然有用，但这并不能完全解决你最初的问题。你需要启用无线（OTA）分发，以便测试人员能够快速轻松地获取并运行新版本，而无需处理配置文件、iTunes、iPhone\
    \ 配置实用工具等繁琐事项。\n\n启用 OTA 分发的要素相当简单。你需要一个清单属性列表，以及一个使用内置安装 URL 方案的指向该清单的链接。这将提示系统读取清单并触发安装流程。\n\
    \n以下是一个示例清单：\n\n```\n<?xml version=\"1.0\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
    \ PLIST 1.0//EN\"\n\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist\
    \ version=\"1.0\">\n  <dict>\n    <!-- 下载项的数组。 -->\n    <key>items</key>\n   \
    \ <array>\n      <dict>\n        <!-- 要下载的资源数组 -->\n        <key>assets</key>\n\
    \        <array>\n          <!-- software-package: 要安装的 IPA 文件。 -->\n        \
    \  <dict>\n            <!-- 必需。资源类型。 -->\n            <key>kind</key>\n      \
    \      <string>software-package</string>\n            <!-- 可选。每 n 字节进行 md5 校验。如果\
    \ md5 失败，将重新下载该块。 -->\n            <key>md5-size</key>\n            <integer>10485760</integer>\n\
    \            <!-- 可选。每个“md5-size”大小块的 md5 哈希值数组。 -->\n            <key>md5s</key>\n\
    \            <array>\n              <string>41fa64bb7a7cae5a46bfb45821ac8bba</string>\n\
    \              <string>51fa64bb7a7cae5a46bfb45821ac8bba</string>\n           \
    \ </array>\n            <!-- 必需。要下载文件的 URL。 -->\n            <key>url</key>\n\
    \            <string>http://www.example.com/apps/foo.ipa</string>\n          </dict>\n\
    \          <!-- display-image: 下载期间显示的图标。 -->\n          <dict>\n            <key>kind</key>\n\
    \            <string>display-image</string>\n            <!-- 可选。指示图标是否需要光泽效果。\
    \ -->\n            <key>needs-shine</key>\n            <true/>\n            <key>url</key>\n\
    \            <string>http://www.example.com/image.57x57.png</string>\n       \
    \   </dict>\n          <!-- full-size-image: iTunes 使用的大型 512x512 图标。 -->\n  \
    \        <dict>\n            <key>kind</key>\n            <string>full-size-image</string>\n\
    \            <!-- 可选。整个文件的一个 md5 哈希值。 -->\n            <key>md5</key>\n      \
    \      <string>61fa64bb7a7cae5a46bfb45821ac8bba</string>\n            <key>needs-shine</key>\n\
    \            <true/>\n            <key>url</key>\n            <string>http://www.example.com/image.512x512.jpg</string>\n\
    \          </dict>\n        </array>\n        <key>metadata</key>\n        <dict>\n\
    \          <!-- 必需 -->\n          <key>bundle-identifier</key>\n          <string>com.example.fooapp</string>\n\
    \          <!-- 可选（仅软件） -->\n          <key>bundle-version</key>\n          <string>1.0</string>\n\
    \          <!-- 必需。下载类型。 -->\n          <key>kind</key>\n          <string>software</string>\n\
    \          <!-- 可选。下载期间显示；通常为企业名称 -->\n          <key>subtitle</key>\n       \
    \   <string>Apple</string>\n          <!-- 必需。下载期间显示的标题。 -->\n          <key>title</key>\n\
    \          <string>Example Corporate App</string>\n        </dict>\n      </dict>\n\
    \    </array>\n  </dict>\n</plist>\n```\n\n你可以在 Apple 的企业分发指南中找到此清单及更多详细信息，网址为：[`http://developer.apple.com/library/ios/#featuredarticles/FA_Wireless_Enterprise_App_Distribution/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#featuredarticles/FA_Wireless_Enterprise_App_Distribution/Introduction/Introduction.html)。\n\
    \n如果你采用此属性列表格式并根据你的应用具体情况修改它，就可以使用内置的 URL 方案将清单传递给系统。\n\n```\nitms-services://?action=download-manifest&url=http://example.com/manifest.plist\n\
    ```\n\n例如，创建一条能够安装你的应用的 HTML 链接非常简单：\n\n```\n<a href=\"itms-services://?action=download-manifest&url=http://example.com/manifest.plist\"\
    >\n  Install App\n</a>\n```\n\n如你所见，一旦拥有了一个配置正确的归档文件，设置 OTA 部署就变得极其简单。编写一个 shell\
    \ 脚本（或任何类型的脚本）来生成清单属性列表，并发布安装应用的链接，也是相当容易的事情。\n\n#### 这些事不能交给别人处理吗？\n\n尽管 Apple\
    \ 让 OTA 部署变得相当简单（一旦你巧妙地处理了归档文件），但此过程仍有很大的改进空间。有一些出色的组织提供了系统来管理部署流程，从简单的 beta 测试到企业级分发。对于你的\
    \ Super Checkout beta 测试来说，Test Flight（[`http://testflightapp.com`](http://testflightapp.com)，图\
    \ 9–23）是一个很好的选择。Test Flight 提供了出色的 beta 应用部署功能，并配有强大的基于 Web 的 UI 来管理你的应用和跟踪其安装情况。\n\
    \n![images](img/0923.jpg)\n\n**图 9–23.** *TestFlight 拥有极其简单直接的分发方法。*\n\n虽然 TestFlight\
    \ 以其简洁美观的用户体验而自豪（也确实如此！），但它还提供了一个极其有用且同样简单的 API，用于发布新版本和通知测试人员。一旦你在 Test Flight\
    \ 上设置了账户，就可以创建一个 Jenkins 构建步骤来执行以下 shell 脚本（请注意使用 Jenkins 环境变量为发布说明添加一些有用数据）：\n\
    \n```\ncurl http://testflightapp.com/api/builds.json \\\n  -F file=@SuperCheckout.ipa\
    \ \\\n  -F api_token='<your_api_token>' \\\n  -F team_token='<your_team_token>'\
    \ \\\n  -F notes='$JOB_NAME, build number $BUILD_NUMBER: For release notes, visit\
    \ $BUILD_URL' \\\n  -F notify=True \\\n  -F distribution_lists='Internal, QA'\n\
    ```\n\n#### 创建每日构建\n\n你想要使用你的部署构建步骤，但又不希望每次提交代码到仓库后都给 beta 测试人员推送一个新版本。更好的做法是只部署一个单独的每日构建。你已经花费了大量精力精心打造构建任务，如果全部重做就太可惜了。幸运的是，Jenkins\
    \ 允许你复制任务。更具体地说，它允许你使用之前的任务作为模板来创建新任务。\n\n从 Dashboard 中，点击侧边栏的 `New Job`。为任务命名，例如\
    \ `SuperCheckoutNightly`（注意：某些插件不支持空格），然后选中 `Copy existing job` 单选框。开始输入任务名称时，Jenkins\
    \ 会给出一些建议。选择你现有的任务并点击 `OK`。\n\n新任务的“任务配置”页面看起来应该很熟悉。要将其变为每日构建，你只需更改“构建触发器”。选中\
    \ `Build periodically` 复选框，并取消勾选其他所有选项。在“计划”文本区域中，你可以直接输入关键字 `@midnight`。\n\n\
    将新任务转换为每日构建后，你可以在底部将你的部署脚本添加为一个构建步骤。你可能还可以通过关闭静态分析和构建后通知等步骤来减轻系统负载。\n"
- fmt: '# Futureproofing Your Build


    So your Jenkins job is building your app, Johnny is FINALLY learning to manage
    memory, your beta testers are receiving your nightlies, and everything is moving
    along swimmingly. It''s a well-oiled machine, right? Well, it is, until Apple
    releases a beta SDK. Before you start implementing all the awesome new features
    you thought of during the keynote, you should probably create a new job to build
    your project against the new beta.


    Running Jenkins jobs against multiple SDKs is a great idea. It allows you to ensure
    backwards compatibility and to focus on the new beta tools, letting Jenkins worry
    about the previous versions.


    However, running two versions of Xcode on your build server is not without complications.
    For one thing, you''re going to be using multiple `xcodebuild` commands. In addition,
    you need to ensure the static analyzer uses the right compiler.


    The multiple `xcodebuild` issue is easy to resolve. Xcode comes with a tool called
    `xcode-select`, which allows you to specify the location of the Developer tools
    that `xcodebuild` should use. For example, to point `xcodebuild` at the Xcode
    beta (located at `/Developer Beta`), use this code:


    ```

    sudo xcode-select -switch /Developer\ Beta/

    ```


    **NOTE:** It''s important to note that `xcode-select`''s changes are system-wide.
    This means that if job A switches to the beta SDK and doesn’t switch back, when
    job B kicks off, it’s going to be using the beta as well, which may be undesirable.
    Consider one of two strategies: reverse any changes before a job finishes, or
    set your environment up at the beginning of every job.


    The `scan-build` script makes choosing a specific `clang` compiler easy. You simply
    have to specify the path to `clang` with the `--use-cc` flag, like so:


    ```

    /path/to/static-analyzer/scan-build --use-cc /path/to/beta/clang xcodebuild -sdk
    iphonesimulator

    ```


    So that''s fairly easy, but there''s a catch. You don''t execute the `scan-build`
    script yourself; you rely on the Clang Scan-Build plug-in to run the command for
    you. Unfortunately, at the time of writing, the plug-in doesn''t allow you to
    specify the location of the `clang` compiler. It does, however, allow you to specify
    the location of the `scan-build` script. This allows you to do a little creative
    shell scripting to produce a `scan-build` “wrapper” and configure the plug-in
    to use it in place of the original for betas.


    You need your wrapper script to be named `scan-build`, call the original `scan-build`,
    add the custom compiler flag, and then pass along all the original arguments that
    were passed to the wrapper. Here''s the script:


    ```

    #!/bin/bash

    /path/to/original/scan-build --use-cc /path/to/beta/clang $@

    ```


    This script puts the custom compiler flag in front of the arguments passed by
    the caller. Save this script as `scan-build` in a custom location. You''ll need
    to make it executable.


    ```

    sudo chmod +x scan-build

    ```


    Lastly, go to the Jenkins System Configuration page and add a new `scan-build`
    to the Clang Static Analyzer plug-in ([Figure 9–24](#Chapter09.html#fig_9_24)).
    When you save, you can create a new Beta job, based off of your existing job,
    add a call to `xcode-select` to switch to the beta toolset, and change the `scan-build`
    selection to use the wrapper. Done!


    ![images](images/0924.jpg)


    **Figure 9–24.** *Be sure to give your various analyzers descriptive names.*


    ## What Else Can We Do?


    The combination of Jenkins shell build steps and the Xcode command line tools
    creates some very compelling opportunities for automation. You''ve already seen
    that you can build, scan, archive, and deploy your applications. In addition to
    these very useful actions, recent versions of the toolset have exposed some more
    useful capabilities to the command line. Unit tests, as an example, can be built
    as any other target. They can''t, however, be built as easily on Xcode Workspaces.
    The `xcodebuild` tool does not support them at the time of writing.


    Speaking of automated tests, there''s even a way to run headless Automation Instrument
    scripts. Introduced in iOS5, the `instruments` command line interface offers a
    way to start UIAutomation tests without a GUI. Here''s an example:


    ```

    instruments -t /path/to/template.tracetemplate /path/to/SuperCheckout.app -e UIASCRIPT

    /path/to/TestScript.js -e UIARESULTSPATH /path/to/AutomationResults

    ```


    It''s a great idea to put your test steps in their own job and to have that job
    triggered by the completion of your main job. To do this, start by creating a
    new job based on the original. Customize your build steps to include your testing,
    then change the Build Trigger to “Build after other projects are built” and enter
    your original job''s name. Don''t forget to archive the artifacts so that you
    can get them from the Job Details page.


    So that''s it! Jenkins is building and deploying your project for you, and you
    can finally get down to the business of fixing those bugs and adding new features.
    Automation is a life saver and an incredible time saver. Also, don''t forget to
    take a look at the plug-in directory in Jenkins from time to time because new
    features are added all the time.


    # Chapter 10


    ## Now, They Want an iPad Version


    We''ve taken Super Checkout a long way since the beginning of this book. Testing
    has gone well, the feedback from the users is coming in, and they overwhelmingly
    want an iPad version of this application. So what do we do now? Do we separate
    out some of the common code and build two completely different applications, or
    do we build a universal binary? That decision depends on your goals for the application;
    it isn''t dictated by technology. It is generally a business decision, because
    multiple applications can mean more revenue. A universal application, on the other
    hand, is generally better for the end user, who can purchase one application that
    will run on the iPhone, iPod Touch, and iPad.


    For Super Checkout, we''re going to go the universal binary route. The final product
    will be an application that has an experience that is the same for the iPhone
    and iPod Touch that we''ve developed to this point and will also have a native
    iPad experience. Apple has provided excellent support for detecting the device
    the application is running on and what features the device has. Before we get
    started, create and checkout a new branch called `Universal_Binary`.


    ### Before We Start Coding


    Before we start coding, we need to go through a short design phase, so we know
    how we are going to approach this problem. For this chapter, we''re going to look
    at some wireframes and discuss how we are going to modify the application to support
    the iPad. These initial steps are crucial, because they can allow you to find
    mistakes before it is too late. Designing on paper helps to show the big picture.
    Let''s take a look at what the iPad can offer us and see if we can design a solution
    that is quick to develop and provides value to our users. This isn''t a book about
    user experience, so we''re going to gloss over all the user experience details
    and deal with the creative side of iOS development.


    Before we move on, a quick note about design and development. Our first goal is
    to write the most stable application. But it is also our responsibility to make
    sure the design is sound. You know the platform well and have hopefully read the
    *Human Interface Guidelines*. It is up to us to learn a bit about design so we
    can be better developers. Designing a universal application is a great way to
    flex your creative muscles.'
