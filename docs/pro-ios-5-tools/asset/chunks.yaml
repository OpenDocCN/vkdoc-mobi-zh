    \nvar storeButton = target.frontMostApp().mainWindow().navigationBar().rightButton();\n\
    \nif(storeButton.label().search(\"Store\") == -1) {\n        UIALogger.logFail(\"\
    Expected to find Store button in navigation item\");\n} else {\n        UIALogger.logPass();\n\
    }\n\nUIALogger.logStart(\"Checkout\");\nvar cartTable = target.frontMostApp().mainWindow().tableViews()[\"\
    Empty list\"];\nvar checkoutButton = cartTable.groups()[\"Checkout\"].buttons()[\"\
    Checkout\"];\ncheckoutButton.scrollToVisible();\ncheckoutButton.tap();\n\ntarget.delay(2);\n\
    \nif(cartTable.cells().length > 1) {\n        UIALogger.logFail(\"Checkout should\
