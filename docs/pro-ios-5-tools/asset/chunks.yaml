    Let''s look at a little piece of the code we just implemented.


    In [Listing 6–5](#Chapter06.html#list_6_5), you''ll see we''re creating an `ASIHTTPRequest`,
    setting the delegate, and adding a dictionary that gets passed around with the
    request. This dictionary holds the request identifier (to hold backward compatibility
    with the previous API), the request type and response type. `ASIHTTPRequest` handles
    cookies automatically, so we don''t have to worry about dealing with them.


