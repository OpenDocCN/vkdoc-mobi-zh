    # Jenkins Job: 配置与执行


    任务是按步骤执行的，因此在开始配置之前，我们先考虑一下执行流程。首先，你需要从 Github 检出项目。当 Jenkins 获取到最新代码的副本后，你需要构建它。构建完成后，需要运行静态分析器并归档二进制文件。


    ## 配置源码检出


    假设你已经安装了 Git 插件，从 Github 检出代码的设置相当简单。只需向下滚动到配置页面的“源码管理”部分（图 9–8），然后选择 Git 单选按钮即可。如果你已经为
    Jenkins 配置了 SSH 密钥访问权限，可以使用来自 Github 的 SSH 仓库 URL，格式如下：


    `git@github.com:<username>/<ProjectName>.git`


    如果尚未配置或无法使用 SSH，可以使用带有基本身份验证的 HTTPS 仓库 URL，格式如下：


    `https://<username>:<password>@github.com/<username>/<ProjectName>.git`


    如果你对安全性有所了解，就会发现这种情况存在风险。Github 仓库的用户名和密码将以明文形式存储。这并非理想情况，这也是你应该采用 SSH 密钥方式的原因之一。


    ![images](img/0908.jpg)


    **图 9–8.** *幸运的是，一旦你设置好 Jenkins 用户，通过 SSH 配置 Git 就变得很简单了。*


    除了仓库 URL，Git 插件还允许你指定要检出的分支以及其他一些高级设置。


    当你配置好 Git 设置后，可以测试一下你的任务。滚动到页面底部并点击“保存”按钮。这将带你进入任务详情页面（图 9–9）。


    ![images](img/0909.jpg)


    **图 9–9.** *随着任务内容不断充实，任务详情页面将成为一个极为有用的工具。*


    ## 理解任务详情页


    任务详情页面让你能够鸟瞰任务的全局、其历史记录以及当前产物。它主要包含三个部分：侧边栏、构建历史模块和永久链接模块。侧边栏提供了与 Jenkins 其他位置类似的导航选项。位于侧边栏下方的构建历史模块提供了最近几次任务执行的链接。永久链接模块提供了一些极其便捷的链接，指向最近的成功构建、失败构建等。


    目前，详情页面可能看起来相当简洁。在侧边栏中，你应该能看到“立即构建”链接（图 9–10），它允许你手动启动任务执行。现在点击它，将你的任务添加到构建队列中。如果队列是空的（可以假设如此），任务将立即开始构建。当然，“构建”目前只是一个相对术语，因为你的任务目前只配置了检出项目的一个工作副本。


    ![images](img/0910.jpg)


    **图 9–10.** *构建历史侧边栏模块中的构建状态指示器会告诉你先前的构建是否成功。*


    构建完成后，点击“构建历史”侧边栏模块或“永久链接”模块中的链接。这将打开“构建详情”页面。与“任务详情”页面类似，“构建详情”页面会展示特定构建的详细信息。安装了
    Git 插件后，你会看到一些关于检出的数据。如果任务是由 SCM 轮询触发的，提交信息将显示在页面顶部附近。在侧边栏中，你会看到几个选项，包括编辑构建信息的能力。这对于标记里程碑构建非常有用。还有一个指向构建控制台输出的链接。点击该链接查看本次构建的输出。输出内容应该类似于：


    ```

    Started by user anonymous

    Checkout:workspace / /Users/Shared/Jenkins/Home/jobs/Super Checkout/workspace
    - hudson.remoting.LocalChannel@56de24c5

    Using strategy: Default

    Last Built Revision: Revision 6eaa5c595fa51a898434f5d300f4a49712f567b4 (origin/master)

    Checkout:workspace / /Users/Shared/Jenkins/Home/jobs/Super Checkout/workspace
    - hudson.remoting.LocalChannel@56de24c5

    Fetching changes from 1 remote Git repository

    Fetching upstream changes from git@github.com:jbradforddillon/Super-Checkout.git

    Commencing build of Revision 6eaa5c595fa51a898434f5d300f4a49712f567b4 (origin/master)

    Checking out Revision 6eaa5c595fa51a898434f5d300f4a49712f567b4 (origin/master)

    Finished: SUCCESS

    ```


    “控制台输出”页面对于调试任务非常有用。例如，如果你输入的 Git 仓库信息不正确，控制台会显示关于检出失败的信息，你就可以确定原因。


    ## 配置构建触发器


    现在你已经有了一个可以工作的 Github 检出功能，让我们来完成任务的配置。回到“任务详情”页面，点击“配置”链接。在任务配置页面上，向下滚动到“构建触发器”部分（图
    9–11）。


    基于你的 Github 项目，每当 `master` 分支有变更时，都应该构建此任务。因此，SCM 轮询触发器正是所需之物。点击“轮询 SCM”复选框，将显示“计划”文本框，你可以在其中告诉
    Jenkins 多久轮询一次仓库以检测变更。当在时间间隔内检测到变更时，将触发构建。


    轮询计划本质上是一个 CRON 表达式。输入包含五个字段：分钟、小时、一个月中的天、月份、一周中的天。星号是通配符，表示该字段的所有值都有效。你还可以使用几个有用的指令，包括
    `@hourly` 和 `@midnight`。你希望任务每五分钟轮询一次 Github，因此你的计划表达式将是 `5 * * * *`。


    ![images](img/0911.jpg)


    **图 9–11.** *CRON 表达式格式让你拥有很大的控制权。*


    触发器已设置好，现在可以设置构建步骤了。和往常一样，别忘了点击页面底部的“保存”。

    '
- fmt: '#### Scripting Xcode


    Xcode comes with a fantastic command line interface: `xcodebuild`. The `xcodebuild`
    tool searches the current path for an Xcode project file, reads the configuration,
    and compiles the project. It also allows you to override any and all configurations
    and compiler flags from the command line. Essentially, anything you can do in
    Xcode related to compiling code, you can do from the command line with `xcodebuild`.
    Since Jenkins works well with shell scripting, `xcodebuild` will manage your compilation
    during your job execution.


    Before going in depth on `xcodebuild`, let''s see it in action. Open up a terminal
    window and run the following commands:


    `cd <PATH/TO/SUPER/CHECKOUT>`

    `xcodebuild -sdk iphonesimulator5.0 -configuration Debug`


    Next, you should see the raw compiler output as `xcodebuild` works its magic.
    It should look something similar to this:


    `Build settings from command line:`

    `    SDKROOT = iphonesimulator5.0`


    `=== BUILD NATIVE TARGET Super Checkout OF PROJECT Super Checkout WITH CONFIGURATION
    Debug ===`

    `Check dependencies`

    `<LOTS OF OUTPUT WHILE EACH FILE IS COMPILED AND LINKED>`


    `** BUILD SUCCEEDED **`


    If there were any errors during compilation, you''d see them in the terminal,
    exactly like you would in Xcode. If your build resulted in any warnings, you could
    scroll through the compiler output and find them, exactly like you would in Xcode.


    `xcodebuild` has several option flags, which give you control over the build process.
    Here are a few of the important ones:


    *   `-project`: This flag allows you to specify the project to build, relative
    to the current directory. Specifically, you provide the full name of your `xcodeproj`
    file. If this flag is not provided, `xcodebuild` will look for a project in the
    current directory. If multiple projects (or workspaces) are found, it will fail
    and will list them for you.

    *   `-target`: This flag allows you to specify which target to build. This is
    extremely handy when working with complex projects or when publishing milestone
    builds (like a nightly, for example).

    *   `-workspace`: In addition to traditional project files, `xcodebuild` will
    look for workspace files and parse their schemes and settings. Use this flag to
    specify the workspace you want to build.

    *   `-scheme`: If building a workspace, this flag specifies a scheme. It''s important
    to note that targets and workspaces don''t mix, just as schemes and projects don''t.
    Use the right flag combination.

    *   `-sdk`: This flag allows you to choose which SDK to compile against. Typically,
    you use this to distinguish between a simulator build and a device build.

    *   `-configuration`: Most targets have at least two configurations: Debug and
    Release. The configuration flag lets you choose which configuration you want to
    build, by name. The default configuration to be used by `xcodebuild` can be specified
    in Xcode, under the Info tab of the Project Details view.

    *   `-showsdks`: You can find out what SDKs are available, as well as what `xcodebuild`
    calls them by using this flag.

    *   Others: There are several other flags and options. You can learn more about
    them by viewing the main page for `xcodebuild`.


    In addition to these flags, you can append any additional compiler flags or settings
    you want. Here''s an example of using these basic flags:


    `$ xcodebuild -project MyAppProject -target MyApp -sdk iphone5.0 -configuration
    Release`


    This example would build the `MyApp` target of the `MyAppProject` Xcode project
    against the iOS 5.0 SDK for device, using the Release configuration. Whatever
    settings relate to the Release configuration in the Xcode project will be applied
    to the build during compilation. If you wanted to add a compiler flag, you could
    simply append it to the command like this:


    `$ xcodebuild -target MyAppTarget -sdk iphone5.0 SOME_COMPILER_FLAG=1 ANOTHER_FLAG=0`


    `xcodebuild` can do more than simply build your project, though that is the default
    behavior. It has several functions, including `build`, `clean`, and `archive`.
    To specify the function, simply include it in the flags. In order to clean your
    project, you can simply call:


    `$ xcodebuild -target MyAppTarget clean`


    They can also be chained together. So, to clean a project and then archive it
    (which implies building it), you can call:


    `$ xcodebuild -target MyAppTarget clean archive`


    Now you''ve got a good understanding of `xcodebuild`. It''s an extremely powerful
    tool, and it''s unusually easy to use for a command line interface. You''re ready
    to write your Jenkins build step.


    Open up your Jenkins build job configuration page and scroll down to the Build
    section. This is where you customize the build process. You need to add a build
    step that runs the `xcodebuild` command from the shell. Simply click the Add build
    step button and select Execute shell from the drop-down to insert a new shell
    step.


    In the Command text area, enter an `xcodebuild` command suitable for your project
    ([Figure 9–12](Chapter09.html#fig_9_12)). For Super Checkout, the shell command
    is as simple as the following (note the use of the environment variable you set
    up earlier):


    `xcodebuild -sdk $IPHONE_DEVICE_SDK`

    ![images](images/0912.jpg)


    **Figure 9–12.** *You can get a full list of built-in environment variables by
    clicking the link below the text area.*


    This will cause `xcodebuild` to find the single project in your repository, select
    the single app target in the project, and use the default command-line configuration
    (Release) to build. The only thing you''re specifying is the SDK to be used. If
    your project were much more complex, or if your repository contained more than
    one project, the build command would be a bit more complex.


    After you''ve entered your `xcodebuild` command, scroll to the bottom of the page
    and click Save. From the Job Details page, click Build Now to start a build of
    your project. Jenkins will first checkout or update the working copy of your project
    from the repository, then run your `xcodebuild` command. If everything is as it
    should be, the project should build successfully, and your new build will have
    a blue indicator icon next to it.


    **NOTE:** Depending on your system''s configuration, your first build using `xcodebuild`
    against a device SDK may require you to give `xcodebuild` and `codesign` permission
    to use the keychain. If this is the case, your build will stall. Simply log into
    the build server as the Jenkins user you created during setup and run the build
    again. You should see a permission dialog with the option to always allow access
    to the keychain. Once you''ve done this, you''ll be good to go.


    This is great! You''ve automated builds, and it wasn''t that painful. But all
    you''re doing is building the source. This is handy for integration with large
    teams, but it isn''t all that powerful. What you really need is to get some hard
    data about the quality of the code. You need accountability. You need failure
    notifications and static analysis.'
