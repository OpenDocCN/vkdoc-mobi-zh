    \ @\"Attempt to divide by zero.\n    You are likely to be eaten by a grue.\");\n\
    \    return (foo / bar);\n}\n```\n\n如果你现在运行你的测试，它们应该都能通过，并且你应该相当确信这个新功能是经过深思熟虑且充分测试的。\n\
    \n### 在你的应用中付诸实践\n\n既然你已经熟悉了 OCUnit，并且对如何编写优秀的测试有了不错的理解，那么你应该开始将你的新技能应用到 Super\
    \ Checkout 应用中。首先，为项目的 JSON 解析器 `SCJSONParser` 编写一个测试套件。\n"
- fmt: "#### Testing `SCJSONParser`\n\nThe Super Checkout project already has a test\
    \ target with the default initial `SenTestCase` subclass, `Super_CheckoutTests`.\
    \ You could go ahead and start writing all of your tests in this class, but that\
    \ would get unruly and disorganized really quickly. It's a good idea to have a\
    \ one-to-one relationship between your test classes and test subjects. Since you're\
    \ going to be testing `SCJSONParser`, create a new test case class called `SCJSONParserTests`.\n\
    \nTo create a new OCUnit test case class, select the test case group and choose\
    \ `File` ![images](images/U001.jpg) `New` ![images](images/U001.jpg) `New File`\
    \ from the menu bar. From the file template dialog, choose the Objective-C test\
    \ case class template, and click Next. Name the file `SCJSONParserTests` and click\
    \ Next. Before clicking Create, you need to ensure the file is associated with\
    \ the right target. Check the test target box (`Super CheckoutTests`), and uncheck\
    \ the app target. The new test case class will contain stubbed out `-setUp` and\
    \ `-tearDown` methods, but no tests. Also, if you check your scheme settings,\
    \ you'll find that the new class has automatically been added to your test list.\n\
    \nSince you're going to be testing the `SCJSONParser` class, you need to make\
    \ sure the class is included in your test target. Select the class in the Project\
    \ Navigator, and check the `Super CheckoutTests` target in the Target Membership\
    \ section of the File Inspector Utility. Since the `SCJSONParser` class depends\
    \ on the `SBJSON` library, you'll need to include those classes as well. It's\
    \ important to remember this step. Xcode manages a lot of the target membership\
    \ stuff for you, so it's easy to forget when you need to manage it yourself.\n\
    \nNow you're ready to start writing tests for your JSON parser. `SCJSONParser`\
    \ has two methods. One is an initializer, and the other is a convenience method\
    \ that returns an autoreleased instance of the parser. Each of these methods takes\
    \ in six parameters. There are no public properties. The parser notifies a delegate\
    \ of completion using a method defined in the `SCJSONParserDelegate`. You need\
    \ to test both of the initialization methods as well as some JSON data. Since\
    \ `SCJSONParser` is a wrapper around `SBJSON`, and you're fairly comfortable with\
    \ the library, you're not going to be testing the parsing capabilities. You're\
    \ mainly focused on testing to ensure your wrapper is doing what you want it to\
    \ do: provide a delegated interface to the parser, maintaining context through\
    \ the provided request type and response type.\n\nThis test requires two objects:\
    \ the parser and a delegate object that conforms to the parser's protocol. One\
    \ solution would be to make your test case class act as the delegate for the parser.\
    \ This is a bad idea because it involves your test agent, the test case class,\
    \ in your test. In order to ensure you're getting accurate results, you need to\
    \ keep your test class as separate from the test subject as possible. What you\
    \ need is a simple object that conforms to the required protocol and reports results\
    \ back to the test case.\n\n#### Mock Objects\n\nMock objects are used when test\
    \ subjects are depended upon by, or were designed to be dependent on, other objects.\
    \ Composite objects, delegation pattern objects, and responder chain objects are\
    \ good examples of this. A mock object is an extremely simple object with limited\
    \ functionality. The purpose of a mock is only to confirm the functionality of\
    \ the test subject, not to provide any functionality of their own. You want your\
    \ mocks to be simple enough to avoid introducing any defects into the test.\n\n\
    An example of a good mock object is a simple echo object, also known as a recorder\
    \ object. An echo object simply waits for the output of your test subject and\
    \ stores it. You can then test the received output against the expected output\
    \ in your test case. You need to create a mock echo object to act as the delegate\
    \ for your JSON parser so that you can test the output.\n\nCreating an object\
    \ in a test target is the same as creating an object in any other target. You\
    \ just need to make sure it's associated with the test target and not your app\
    \ target. Here's the interface for your `MockJSONDelegate` object:\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"SCJSONParser.h\"\n#import \"SuperCheckoutRequestTypes.h\"\
    \n\n@interface MockJSONDelegate : NSObject <SCJSONParserDelegate>\n\n@property\
    \ (nonatomic, copy) NSString *identifier;\n@property (nonatomic, assign) SuperCheckoutResponseType\
    \ responseType;\n@property (nonatomic, copy) NSDictionary *parsedObject;\n\n@end\n\
    ```\n\nAs you can see, it's an extremely simple interface. The class extends `NSObject`\
    \ and conforms to the `SCJSONParserDelegate` protocol. It has three properties\
    \ to store the three outputs of the parser's delegate method, `-parsingSucceededForRequest:ofResponseType:parsedObjects:`.\
    \ The implementation is equally simple.\n\n```\n#import \"MockJSONDelegate.h\"\
    \n\n@implementation MockJSONDelegate\n@synthesize identifier;\n@synthesize responseType;\n\
    @synthesize parsedObject;\n\n-(void)parsingSucceededForRequest:(NSString *)anIdentifier\n\
    \                  ofResponseType:(SuperCheckoutResponseType)aResponseType\n \
    \                      parsedObjects:(NSDictionary *)aParsedObject {\n       \
    \ self.identifier = aIdentifier;\n        self.responseType = aResponseType;\n\
    \        self.parsedObject = aParsedObject;\n}\n\n@end\n```\n\nThe object is as\
    \ simple as possible. It conforms to the required protocol and simply stores the\
    \ values it is sent by the parser. In your tests, you can then check these values\
    \ against your expected output and evaluate the results.\n\nSince `SCJSONParser`\
    \ receives all required data during initialization, and you are going to want\
    \ to provide various data sets to see how it behaves, you probably shouldn't use\
    \ the `-setUp` or `-tearDown` methods. You're going to want to do all of your\
    \ instantiation within the tests themselves. As a result, your test class interface\
    \ is pretty vanilla.\n\n```\n#import <SenTestingKit/SenTestingKit.h>\n\n@interface\
    \ SCJSONParserTests : SenTestCase\n\n@end\n```\n\nSince you're not going to use\
    \ the `-setUp` or `-tearDown` methods, you can go ahead and remove them from the\
    \ class. Your first order of duty should be to test valid JSON input. It should\
    \ look something like this:\n\n```\n- (void)testParseWithValidJSON {\n\n     \
    \   MockJSONDelegate *mockDelegate = [[MockJSONDelegate alloc] init];\n\n    \
    \    NSString *testIdentifier = @\"testParseWithValidJSON\";\n        NSURL *testURL\
    \ = [NSURL URLWithString:@\"http://www.test.com\"];\n        NSString *jsonString\
    \ = @\"{ \\\"hello\\\" : \\\"world\\\" }\";\n        NSData *jsonData = [jsonString\
    \ dataUsingEncoding:NSUTF8StringEncoding];\n\n        SCJSONParser *parser = [[SCJSONParser\
    \ alloc] initWithJSON:jsonData\n                                delegate:mockDelegate\n\
    \                                connectionIdentifier:testIdentifier\n       \
    \                         requestType:SuperCheckoutCheckout\n                \
    \                responseType:SuperCheckoutCheckoutResponse\n                \
    \                URL:testURL];\n```"
