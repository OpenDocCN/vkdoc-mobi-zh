  raw: '#### Creating a Static Library


    If its not already running, launch Xcode. Create a new project (File ![images](images/U001.jpg)
    New ![images](images/U001.jpg) New Project). When the new project pane appears,
    choose Framework & Library under the iOS group, and choose the Cocoa Touch Static
    Library template (see [Figure 11–2](#Chapter11.html#fig_11_2)). Click Next.


    ![images](images/1102.jpg)


    **Figure 11–2.***Choose the Cocoa Touch Static Library template*


    When prompted for a Product Name, enter **SBJSON** (see [Figure 11–3](#Chapter11.html#fig_11_3)).
    Make sure the Include Unit Tests check box is checked, and the Use Automatic Reference
    Counting box is unchecked. Click Next.


    ![images](images/1103.jpg)


    **Figure 11–3.** *Name the static library*


    Save the project next to the `Super-Checkout` directory (see [Figure 11–4](#Chapter11.html#fig_11_4)).
    Check “Create local git repository for this project” (we will cover why we want
    this later). Click Create.


    ![images](images/1104.jpg)


    **Figure 11–4.** *Creating the static library project folder with a local Git
    repository*


    Now our new static library project window for SBJSON should appear (see [Figure
    11–5](#Chapter11.html#fig_11_5)). You should be in the SBJSON target Build Settings
    pane. If not, navigate to it. Make sure the All option is selected. Scroll down
    until you see the section with the heading Deployment. Look for the row titled
    Targeted Device Family, and change the value to iPhone/iPad (see [Figure 11–6](#Chapter11.html#fig_11_6)).


    ![images](images/1105.jpg)


    **Figure 11–5.** *Our SBJSON static library project window*


    ![images](images/1106.jpg)


    **Figure 11–6.** *Changing the target device of our library*


    In the Navigation pane, hold down the shift key, and select the two files `SBJSON.h`
    and `SBJSON.m`. We don''t need these two files, so delete them. A dialog should
    appear asking if you want remove the file references or really delete them (see
    [Figure 11–7](#Chapter11.html#fig_11_7)). We really want to delete them, so click
    Delete.


    ![images](images/1107.jpg)


    **Figure 11–7.** *Yes, we really want to delete the files.*


    Now, let''s copy the relevant files from Super Checkout. In the Navigation pane,
    select the SBJSON group. Either click the File menu or right-click the Navigation
    pane, and choose Add Files to SBJSON. When the file selection dialog opens, navigate
    to the `SBJSON` folder inside the Super Checkout project''s folder. Select all
    the files in this folder (see [Figure 11–8](#Chapter11.html#fig_11_8)). Next to
    the Destination label, check “Copy items into destination group''s folder (if
    needed)”. For the Folders option, select the “Create groups for any added folders”
    option. Finally, make sure only SBJSON is checked in the “Add to targets” list.
    Click Add. Now, the files should appear in the SBJSON group in the Navigation
    pane (see [Figure 11–9](#Chapter11.html#fig_11_9)).


    ![images](images/1108.jpg)


    **Figure 11–8.** *Copying the SBJSON files from Super Checkout*


    ![images](images/1109.jpg)


    **Figure 11–9.** *Source files in SBJSON*


    If you try to build the SBJSON static library, it will succeed. But we''re not
    finished yet. When you use a static library, you *link* it to your application.
    Remember, a static library is an archive of compiled object files. When you link
    it to your application, it''s the same as if you had compiled the code directly
    in your application (just like how we built Super Checkout to start). The problem
    is that we don''t really know what classes, methods, or functions live inside
    the static library. Generally, to tell one class how another class works, we include
    the header file, the file with the `.h` extension. To do this with a static library,
    we need to publish our header files.


    In the Navigation pane, select the SBJSON project to enter the project editor.
    Select the SBJSON target, and open the Build Phases view. Expand the build phase
    named “Copy Headers (6 items)” (see [Figure 11–10](#Chapter11.html#fig_11_10)).
    Drag the file `JSON.h` from Project to Public. Drag the remaining header files
    in Project to Private. Your screen should look like the one shown in [Figure 11–11](#Chapter11.html#fig_11_11).


    ![images](images/1110.jpg)


    **Figure 11–10.** *Copying the headers*


    ![images](images/1111.jpg)


    **Figure 11–11.** *Moving the header files from Public to Private*


    Why did we move only the `JSON.h` header file to Public and not the others? Don''t
    we need to know about all the classes and categories? Well, yes, we do, but if
    you look at `JSON.h`, you will notice that it imports (`#imports)` all the other
    header files. So by importing `JSON.h`, we will import all the other header files.


    Save your work, and build. It should succeed.


    **NOTE:** At this point, I suggest you add the unit tests for the SBJSON code.
    Testing a static library is very similar to testing an application, and adding
    these tests is optional. So I''ll leave this as an exercise in writing tests.


    Let''s repeat this process to create a static library for `ASIHTTPRequest`. There
    are a few differences, which I''ll highlight.


    Again, create a new Cocoa Touch static library. This time, we''ll name it **ASIHTTPRequest**.
    Make sure you included unit tests and disabled automatic reference counting. Save
    the project in the same location you saved the SBJSON project.


    Once the ASIHTTPRequest project is created and the project window opens, select
    Target ASIHTTPRequest. Navigate to Build Settings (making sure the All view option
    is selected), and change the Targeted Device Family in the Deployment section
    to iPhone/iPad.


    Delete the files `ASIHTTPRequest.h` and `ASIHTTPRequest.m`. When asked, make sure
    you really delete the files. Select the `ASIHTTPRequest` group in the Navigation
    pane, and either click the File menu or right-click the Navigation pane, and choose
    Add Files to “ASIHTTPRequest”. When the file selection dialog opens, navigate
    to the `ASIHTTPRequest` folder inside the Super Checkout project, select all the
    files in this folder, and copy the files into the ASIHTTPRequest project.


    Unlike when we built the SBJSON static library, we''re not finished adding files.
    Again, select Add Files to “ASIHTTPRequest”, and navigate to the Super Checkout
    project. Add the files `Reachability.h` and `Reachability.m` to the ASIHTTPRequest
    project. Remember to make sure you copy the files by checking the “Copy items
    into destination''s folder (if needed)” check box.


    Enter the project editor for ASIHTTPRequest, and select the ASIHTTPRequest target.
    Choose the Build Phases tab, and expand the “Copy Headers (13 items)” build phase.
    Drag `ASIHTTPRequest.h` and `ASIDownloadCache.h` to the Public section. Drag the
    remaining header files to the Private section. Build the library.


    At this point, we should have two static library projects: SBJSON and ASIHTTPRequest.
    Next, we''ll integrate those two projects into Super Checkout.'
  trans: '

    #### 创建静态库


    如果 Xcode 尚未运行，请启动它。创建一个新项目（依次选择 File ![images](img/U001.jpg) New ![images](img/U001.jpg)
    New Project）。当新项目面板出现时，在 iOS 分组下选择 Framework & Library，然后选择 Cocoa Touch Static
    Library 模板（参见图 11–2）。点击 Next。


    ![images](img/1102.jpg)


    **图 11–2.** *选择 Cocoa Touch Static Library 模板*


    当系统提示输入产品名称时，输入 **SBJSON**（参见图 11–3）。确保勾选“Include Unit Tests”复选框，并取消勾选“Use Automatic
    Reference Counting”复选框。点击 Next。


    ![images](img/1103.jpg)


    **图 11–3.** *命名静态库*


    将项目保存在 `Super-Checkout` 目录旁边（参见图 11–4）。勾选“Create local git repository for this
    project”（我们稍后会解释为什么要这么做）。点击 Create。


    ![images](img/1104.jpg)


    **图 11–4.** *使用本地 Git 仓库创建静态库项目文件夹*


    现在，SBJSON 的新静态库项目窗口应该会出现（参见图 11–5）。您应该位于 SBJSON 目标的 Build Settings 面板中。如果没有，请导航到那里。确保选中“All”选项。向下滚动，直到看到标题为“Deployment”的部分。找到名为“Targeted
    Device Family”的行，并将其值更改为 iPhone/iPad（参见图 11–6）。


    ![images](img/1105.jpg)


    **图 11–5.** *我们的 SBJSON 静态库项目窗口*


    ![images](img/1106.jpg)


    **图 11–6.** *更改库的目标设备*


    在导航窗格中，按住 Shift 键，选择 `SBJSON.h` 和 `SBJSON.m` 这两个文件。我们不需要这两个文件，所以删除它们。此时应出现一个对话框，询问您是要移除文件引用还是真正删除它们（参见图
    11–7）。我们确实想删除它们，所以点击 Delete。


    ![images](img/1107.jpg)


    **图 11–7.** *是的，我们确实想删除这些文件。*


    现在，从 Super Checkout 复制相关文件。在导航窗格中，选择 SBJSON 分组。点击 File 菜单或右键单击导航窗格，然后选择“Add Files
    to SBJSON”。当文件选择对话框打开时，导航到 Super Checkout 项目文件夹内的 `SBJSON` 文件夹。选择此文件夹中的所有文件（参见图
    11–8）。在“Destination”标签旁边，勾选“Copy items into destination group''s folder (if needed)”。对于“Folders”选项，选择“Create
    groups for any added folders”选项。最后，确保在“Add to targets”列表中只勾选了 SBJSON。点击 Add。现在，这些文件应该会出现在导航窗格的
    SBJSON 分组中（参见图 11–9）。


    ![images](img/1108.jpg)


    **图 11–8.** *从 Super Checkout 复制 SBJSON 文件*


    ![images](img/1109.jpg)


    **图 11–9.** *SBJSON 中的源文件*


    如果您尝试构建 SBJSON 静态库，将会成功。但我们还没有完成。当您使用静态库时，需要将其*链接*到您的应用程序。请记住，静态库是已编译目标文件的归档。当您将其链接到应用程序时，其效果与直接在应用程序中编译代码相同（就像我们最初构建
    Super Checkout 一样）。问题在于，我们并不真正了解静态库内部有哪些类、方法或函数。通常，为了让一个类了解另一个类的工作原理，我们会包含头文件，即扩展名为
    `.h` 的文件。为了对静态库执行此操作，我们需要发布我们的头文件。


    在导航窗格中，选择 SBJSON 项目以进入项目编辑器。选择 SBJSON 目标，并打开 Build Phases 视图。展开名为“Copy Headers
    (6 items)”的构建阶段（参见图 11–10）。将文件 `JSON.h` 从 Project 拖放到 Public。将其余的头文件从 Project
    拖放到 Private。您的屏幕应如图 图 11–11 所示。


    ![images](img/1110.jpg)


    **图 11–10.** *复制头文件*


    ![images](img/1111.jpg)


    **图 11–11.** *将头文件从 Public 移至 Private*


    为什么我们只将 `JSON.h` 头文件移到 Public，而其他头文件没有？难道我们不需要了解所有的类和类别吗？嗯，是的，我们需要，但如果您查看 `JSON.h`，您会注意到它导入了（`#imports`）所有其他头文件。因此，通过导入
    `JSON.h`，我们将导入所有其他头文件。


    保存您的工作并进行构建。应该会成功。


    **注意：** 此时，我建议您为 SBJSON 代码添加单元测试。测试静态库与测试应用程序非常相似，添加这些测试是可选的。因此，我将把这项任务留作编写测试的练习。


    让我们重复这个过程，为 `ASIHTTPRequest` 创建一个静态库。有一些差异，我将重点说明。


    再次创建一个新的 Cocoa Touch 静态库。这次，我们将其命名为 **ASIHTTPRequest**。确保包含了单元测试并禁用了自动引用计数。将项目保存在您保存
    SBJSON 项目的相同位置。


    一旦 ASIHTTPRequest 项目创建完成且项目窗口打开，选择 Target ASIHTTPRequest。导航到 Build Settings（确保选中了“All”视图选项），并将
    Deployment 部分中的“Targeted Device Family”更改为 iPhone/iPad。


    删除文件 `ASIHTTPRequest.h` 和 `ASIHTTPRequest.m`。当系统询问时，确保您真正删除了这些文件。在导航窗格中选择 `ASIHTTPRequest`
    分组，然后点击 File 菜单或右键单击导航窗格，并选择“Add Files to ASIHTTPRequest”。当文件选择对话框打开时，导航到 Super
    Checkout 项目内的 `ASIHTTPRequest` 文件夹，选择此文件夹中的所有文件，并将这些文件复制到 ASIHTTPRequest 项目中。


    与我们构建 SBJSON 静态库时不同，我们还没有完成文件的添加。再次选择“Add Files to ASIHTTPRequest”，并导航到 Super
    Checkout 项目。将文件 `Reachability.h` 和 `Reachability.m` 添加到 ASIHTTPRequest 项目中。请记住，通过勾选“Copy
    items into destination''s folder (if needed)”复选框来确保复制了文件。


    进入 ASIHTTPRequest 的项目编辑器，并选择 ASIHTTPRequest 目标。选择 Build Phases 选项卡，展开“Copy Headers
    (13 items)”构建阶段。将 `ASIHTTPRequest.h` 和 `ASIDownloadCache.h` 拖放到 Public 部分。将其余的头文件拖放到
    Private 部分。构建该库。


    至此，我们应该有了两个静态库项目：SBJSON 和 ASIHTTPRequest。接下来，我们将把这两个项目集成到 Super Checkout 中。

    '
- fmt: '# Using Static Libraries


    One purpose of breaking out some of the Super Checkout code into these two static
    libraries, `SBJSON` and `ASIHTTPRequest`, was to foster code reuse. What better
    place to start reusing than in the Super Checkout project. Before we get started,
    we should talk about how we can use these static libraries in Super Checkout.


    There are two different methods by which we can use the static library projects
    in the Super Checkout project: subprojects and workspaces.


    A subproject is one project embedded within another. This is accomplished fairly
    easily with Xcode. Logically, this approach makes sense: the Super Checkout project
    will depend on the `SBJSON` and `ASIHTTPRequest` projects. Embedding the two as
    subprojects of Super Checkout structurally creates some visual clarity. However,
    there are some configuration issues that need to be addressed when pursuing this
    method. We''ll address these issues when discussing the subproject approach.


    With the release of Xcode 4, Apple introduced the concept of workspaces. A workspace
    is a logical container for multiple projects. All the projects share the same
    build directory. By using a workspace, all the projects can use their products
    when building.


    Each approach, subprojects and workspaces, has its pros and cons. You should use
    the method that best suits your style. I''ll discuss both for completeness. Before
    we start, make a backup copy of all three projects (Super Checkout, SBJSON, and
    ASIHTTPRequest), so you can try both methods if you wish.


    ## Static Libraries As a Subproject


    Open the Super Checkout project in Xcode. Choose File ![image](images/U001.jpg)
    Add Files to “Super Checkout”. When the file dialog appears, navigate to the `SBJSON`
    folder, and select the file `SBJSON.xcodeproj` (see [Figure 11–12](#Chapter11.html#fig_11_12)).
    Make sure “Copy items into destination group''s folder (if needed)” is unchecked.
    Add it only to the Super Checkout target. Click Add.


    ![images](images/1112.jpg)


    **Figure 11–12.** *Adding the SBJSON project to Super Checkout*


    The `SBJSON` project should appear in the navigation pane, inside the Super Checkout
    project (see [Figure 11–13](#Chapter11.html#fig_11_13)).


    ![images](images/1113.jpg)


    **Figure 11–13.** *After adding SBJSON to Super Checkout*


    When we build Super Checkout, we want the `SBJSON` project to be built first.
    We''ll accomplish this by adding a Target Dependency to the Super Checkout Build
    Phases.


    In the navigation pane, click the Super Checkout project to open the Project Editor
    view. Under Targets, select Super Checkout and then the Build Phases tab. The
    first build phase should be “Target Dependencies (0 items)”. Click the disclosure
    triangle to the right to expand it (see [Figure 11–14](#Chapter11.html#fig_11_14)).


    ![images](images/1114.jpg)


    **Figure 11–14.** *Super Checkout with the Target Dependencies expanded*


    Click the plus sign at the bottom of the Target Dependencies build phase. A target
    selector pane should appear (see [Figure 11–15](#Chapter11.html#fig_11_15)). Select
    the `SBJSON` target under the `SBJSON` project, and click Add. The `SBJSON` target
    should appear in the dependency list (see [Figure 11–16](#Chapter11.html#fig_11_16)).


    ![images](images/1115.jpg)


    **Figure 11–15.** *Target selector pane*


    ![images](images/1116.jpg)


    **Figure 11–16.** *SBJSON in the Target Dependencies*


    Lower in the build phases list, there should be an item titled Link Binary with
    Libraries (7 items). Expand it (see [Figure 11–17](#Chapter11.html#fig_11_17)).
    Click the plus sign to expose the library selection pane (see [Figure 11–18](#Chapter11.html#fig_11_18)).
    At the top, there should be a folder titled `Workspace`, containing the item `libSBJSON.a`.
    Select `libSBJSON.a`, and click Add. The library, `libSBJSON.a`, should appear
    in red at the top of the Link Binary with Libraries list (see [Figure 11–19](#Chapter11.html#fig_11_19)).
    Don''t worry, the red color just means the library hasn''t been built for this
    project yet.


    ![images](images/1117.jpg)


    **Figure 11–17.** *Expanded link binary with the Libraries build phase*


    ![images](images/1118.jpg)


    **Figure 11–18.** *The library selection pane*


    ![images](images/1119.jpg)


    **Figure 11–19.** *libSBJSON.a added the link binary with libraries build phase.*


    Now, we''ve added the `SBJSON` static library to our project. However, we still
    have the original `SBJSON` code that was embedded in the Super Checkout project.
    Let''s delete those files.


    Expand the Super Checkout group in the navigation pane, and then expand the `ExternalLibraries`
    folder. Right-click the `SBJSON` group, and select Delete (see [Figure 11–20](#Chapter11.html#fig_11_20)).
    A dialog should appear asking if you wish to delete the files or simply remove
    the references to them (see [Figure 11–21](#Chapter11.html#fig_11_21)). We don''t
    need these files anymore, so click Delete.


    ![images](images/1120.jpg)


    **Figure 11–20.** *Deleting the Super Checkout group*


    ![images](images/1121.jpg)


    **Figure 11–21.** *Deletion dialog*


    Build the project. Whoa! What happened? The build failed.


    Click the Issue Navigator tab in the Navigation pane. The error is in `SCJSONParser.m`.
    The error says “Lexical or Preprocessor Issue ‘SBJSON/JSON.h’ not found.” If you
    click the error explanation, the Issue Navigator will show the offending line
    in the source code viewer (see [Figure 11–22](#Chapter11.html#fig_11_22)).


    ![images](images/1122.jpg)


    **Figure 11–22.** *The build error*'
