    with `NSLog` statements, I used some handy tools to verify what was getting sent
    to the server and what was being returned. These tools greatly sped up the debugging
    process when the server-side components were in development and the client code
    was misbehaving.


    Two different tools were used to accomplish each task. The first one was used
    to test the inputs and outputs from the service to check to see if the services
    were working. It is called RESTClient and is a plug-in for Firefox. It can be
    found at [`https://addons.mozilla.org/en-US/firefox/addon/restclient/`](https://addons.mozilla.org/en-US/firefox/addon/restclient/).
    [Figure 6–11](#Chapter06.html#fig_6_11) is a view of what the client looks like
    after hitting on of the main services in Super Checkout.


    ![images](images/0611.jpg)


    **Figure 6–11.** *RESTClient for Firefox is a great utility to check service responses*


    As [Figure 6–11](#Chapter06.html#fig_6_11) shows, the interface is pretty simple.
    It lets you select the request method, enter a base URL, input request headers,
    and add a request body. Click Send, and the request is made with the response
    header and body coming back. The tabs to the right of Response Body will be tailored
    to the request type. In the example in [Figure 6–11](#Chapter06.html#fig_6_11),
    RESTClient has formatted the JSON string returned from the service.


    This is a great utility when all you need is a quick tool to check the response
    of a request or debug an issue with the server. Some other great tools that live
    on the command line are more powerful, but this tool gets the job done. The ultimate
    point is to find a reliable, quick tool to quickly exercise the end services to
    make sure the services work as expected as you troubleshoot or test the server
    component of your application.


    The next tool is definitely the more powerful of the two and deserves to be in
    any developer''s toolbox. This application is called Charles, and it is a web
    proxy. It can be found at [`http://www.charlesproxy.com/`](http://www.charlesproxy.com/).
    Charles is a commercial application, but it does have a free trial. This application
    watches all the web traffic on your machine and logs it (while the recorder is
    turned on). [Figure 6–12](#Chapter06.html#fig_6_12) shows Charles logging the
    traffic from getting products, adding a product to the cart, and checking out.


    ![images](images/0612.jpg)


    **Figure 6–12.** *Charles doing its traffic-logging thing*


    Charles gives you way more information about the request and response. It gives
    the same information as RESTClient, but the requests are coming from the app.
    This information can be used to see what the requests look like coming out of
    the device to make sure they are formatted properly and to make sure the responses
    are formatted appropriately too.


    **NOTE:** Charles will not act as a proxy for the device. Any tests that are run
    need to be run from the iOS Simulator.


    #### Slowing Things Down with the Network Link Conditioner


    When testing in the simulator, you are usually testing on a pretty large and mostly
    reliable Internet connection. The problem with this is that the device communicates
    over a slower and extremely unreliable network. Replicating real-world scenarios
    in a sterile development environment is a pretty tricky task to accomplish. Fortunately,
    developers have solved this problem.


    The tool to throttle bandwidth is called the Network Link Conditioner and is bundled
    with Xcode 4.2 for OS 10.7 (Lion). The preference pane can be found in `/Developer/Applications/Utilities/Network\
    Link\ Conditioner`. Open it, and it will install it into System Preferences for
    you. Network Link Conditioner is a preference pane that lets you enter the ports
    to throttle, hosts to throttle, latency, and speed to throttle down to. The values
    for throttling include common speeds for Edge and 3G. [Figure 6–13](#Chapter06.html#fig_6_13)
    shows Network Link Conditioner in the process of throttling to our services.


    ![images](images/0613.jpg)


    **Figure 6–13.** *The Network Link in System Preferences needs to be unlocked
    and enabled.*


    Since this chapter is all about networking and most users'' data packages for
    the device are no longer unlimited, testing using the simulator makes a lot of
    sense. With Speedlimit, we can get a good idea how an application is going to
    perform in the field. This is vitally important for applications that perform
    a large number of requests. Understanding how an application will perform on a
    poorly performing network will help in making decisions on caching approaches.


    To turn on the link conditioner, you''ll first need to unlock the keychain by
    clicking on the lock at the bottom of the preference pane. Then you''ll select
    the appropriate profile to mimic and turn the switch to the on position. This
    will slow down the network for the entire machine, so if you were doing something
    in another app, you will see a drop in network performance.'
  trans: "\n# 为消费而设计\n\n设计服务端 API 与设计 iOS 应用完全不同，需要考虑更多因素，其中对消费者的关怀是核心。对于 Super Checkout，我们决定采用一个非常简洁的\
    \ API，它依赖 `GET` 请求和查询字符串参数。通信介质采用轻量级的 JSON。服务器管理着会话和当前购物车。\n\n就数据模型而言，服务器始终返回一个包装对象。图\
    \ 6-10 展示了这个包装对象的样子。\n\n![images](img/0610.jpg)\n\n**图 6-10.** *响应包装器的定义*\n\n\
    这个对象提供了我们了解响应所需的一切信息。如果调用成功（即 HTTP 状态码为 200）但数据存在问题，我们也能知道发生了什么。如果你留意到，Super Checkout\
    \ 假定每次调用都是成功的。这是应用程序的一个问题，日后可能会给我们带来麻烦。\n\n那么，我们如何处理这些错误呢？让我们回到代码中一探究竟。\n\n打开\
    \ `SuperCheckoutAPIEngine.m`，找到 `parsingSucceededForRequest:ofResponseType:parsedObjects:`\
    \ 方法的实现。这个方法是解析器的回调。由于所有响应都具有相同的包装器，我们将在此处处理错误。\n\n首先，我们需要添加一些错误常量和一个错误域，用于稍后创建的\
    \ `NSError` 对象。在文件顶部，编译器宏定义下方，添加以下代码：\n\n```\nNSString* const APIErrorDomain =\
    \ @\"SuperCheckoutAPIErrorDomain\";\n```\n\n```\ntypedef enum SuperCheckoutAPIErrorType\
    \ {\n    APIErrorType\n} SuperCheckoutAPIErrorType;\n```\n\n现在，回到 `parsingSucceededForRequest:ofResponseType:parsedObjects:`\
    \ 方法，在 `switch` 语句上方添加以下代码：\n\n```\nif([[parsedObject objectForKey:@\"status\"\
    ] intValue] != 0) {\n    NSError *error = [NSError errorWithDomain:APIErrorDomain\n\
    \                                        code:APIErrorType\n                 \
    \                   userInfo:\n                        [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \                        [parsedObject objectForKey:@\"message\"],\n         \
    \               NSLocalizedDescriptionKey,nil]];\n\n    if ([self _isValidDelegateForSelector:@selector(requestFailed:withError:)]){\n\
    \        [delegate requestFailed:identifier withError:error];\n    }\n\n    return;\n\
    }\n```\n\n现在我们已经处理了错误，将错误连同（希望是）服务器返回的有意义消息一起发送给视图控制器。\n\n# 使用调试工具\n\n许多次在开发消费服务的客户端引擎时，服务器返回的数据并非我所预期。我没有在源码中到处添加\
    \ `NSLog` 语句，而是使用了一些便捷工具来验证发送给服务器的内容和返回的内容。当服务端组件正在开发而客户端代码行为异常时，这些工具极大地加速了调试过程。\n\
    \n两个不同的工具分别用于完成不同的任务。第一个工具用于测试服务的输入和输出，以检查服务是否正常工作。它叫做 RESTClient，是 Firefox 的一个插件。可以在\
    \ [`addons.mozilla.org/en-US/firefox/addon/restclient/`](https://addons.mozilla.org/en-US/firefox/addon/restclient/)\
    \ 找到它。图 6-11 展示了在访问 Super Checkout 的主要服务之一后该客户端的视图。\n\n![images](img/0611.jpg)\n\
    \n**图 6-11.** *适用于 Firefox 的 RESTClient 是检查服务响应的优秀工具*\n\n如图 6-11 所示，界面相当简单。它允许你选择请求方法、输入基础\
    \ URL、填入请求头以及添加请求体。点击“发送”，请求便会被发出，并返回响应头和响应体。响应体右侧的标签会根据请求类型进行调整。在图 6-11 的示例中，RESTClient\
    \ 格式化了服务返回的 JSON 字符串。\n\n当你只需要一个快速工具来检查请求响应或调试服务器问题时，这是一个很棒的工具。另外一些运行在命令行中的强大工具虽然更强大，但此工具足以完成任务。关键在于找到一个可靠、快捷的工具，能够快速测试最终服务，确保在你排查问题或测试应用的服务器组件时，服务能按预期工作。\n\
    \n第二个工具无疑是两者中更强大的，它应当在每个开发者的工具箱中占有一席之地。这个应用程序叫做 Charles，是一个 Web 代理。可以在 [`www.charlesproxy.com/`](http://www.charlesproxy.com/)\
    \ 找到它。Charles 是一款商业应用，但提供免费试用。这个应用程序会监控你机器上的所有 Web 流量（在开启录制器时）并记录日志。图 6-12 展示了\
    \ Charles 记录获取产品、将产品添加到购物车以及结账时的流量。\n\n![images](img/0612.jpg)\n\n**图 6-12.**\
    \ *Charles 执行其流量记录功能*\n\nCharles 能提供关于请求和响应的更多信息。它提供的信息量与 RESTClient 相同，但这些请求来自应用程序本身。这些信息可用于查看从设备发出的请求的格式是否正确，并确保响应的格式也正确无误。\n\
    \n**注意：** Charles 不会作为设备的代理。任何需要运行的测试都必须通过 iOS 模拟器运行。\n\n## 使用网络链路调节器模拟慢速网络\n\n\
    在模拟器中进行测试时，通常使用的是一条相当大且大部分时间都可靠的网络连接。但问题在于，设备实际通信的网络通常速度较慢且极不可靠。在洁净的开发环境中复现真实场景是一项相当棘手的任务。幸运的是，开发者已经解决了这个问题。\n\
    \n用于限制带宽的工具叫做网络链路调节器，它随 Xcode 4.2 for OS 10.7 (Lion) 一起提供。其偏好设置面板可以在 `/Developer/Applications/Utilities/Network\\\
    \ Link\\ Conditioner` 中找到。打开它，它会自动安装到系统偏好设置中。网络链路调节器是一个偏好设置面板，允许你设置要限制的端口、要限制的主机、延迟以及限速上限。限制速度的预设值包括\
    \ Edge 和 3G 的常见速度。图 6-13 展示了网络链路调节器正在对我们的服务进行限速。\n\n![images](img/0613.jpg)\n\n\
    **图 6-13.** *系统偏好设置中的网络链路需要解锁并启用。*\n\n鉴于本章全部内容都与网络相关，并且大多数用户设备的数据套餐已不再无限量，使用模拟器进行测试就显得非常合理。通过\
    \ Speedlimit，我们可以很好地了解应用程序在实际环境中的性能表现。这对于执行大量请求的应用程序至关重要。理解应用程序在网络状况不佳时的表现，将有助于我们在缓存策略方面做出决策。\n\
    \n要开启链路调节器，首先需要点击偏好设置面板底部的锁图标解锁钥匙串。然后选择要模拟的适当配置文件，并将开关拨到“开”的位置。这将降低整个机器的网络速度，因此如果你正在其他应用中执行网络操作，你会看到网络性能下降。\n\
    \n"
- fmt: '#### Controlling the Cache


    What is the best way to give the illusion of a high-performing app that exists
    on a slow network is through storing responses for a request? Caching. Caching
    is great because the application gets the requested data quickly, and the user
    isn''t left waiting. If caching is so great, why do we not cache everything? The
    first reason is because most data on the Internet is real time. If everything
    was cached, the application would be severely behind on the latest information,
    and the user would be forced to refresh often.


    Given this conflict, you''re probably wondering, “What is the best approach for
    a caching solution?”


    Good question! The answer is extremely complicated. As I mentioned earlier, caching
    approaches have been the focus of dissertations. We''re not going to go in depth
    on how caching algorithms work or which one is the best to use in which situation.
    That would be an entirely different book altogether. Instead, we''re going to
    see what we can use in Cocoa or other frameworks to achieve the appropriate level
    of caching for Super Checkout and hopefully get you started on a good path to
    a caching approach for your app.


    ##### Before We Get Started


    Before we dive into the code, let''s spend some time talking about what cache
    really is and what kind of data is a good candidate for caching. In the context
    that we are using cache, cache is a temporary store that greatly improves the
    speed at which data can be retrieved. The idea is to store as much information
    locally and retrieve it from the server only when needed.


    The basic idea that we are using here is to develop the application without a
    cache. By avoiding premature optimization, we can ensure the application is feature
    complete and relatively bug free before we start optimizing the networking layer.
    This way any bugs that are introduced can be easily tracked down.


    ##### Deciding What to Cache


    How do we decide on what to cache? The answer to this question can be found by
    one of two basic methods. The first method is guess and test. This technique might
    have some positive results, but is not very scientific and could introduce some
    problems. The second method is basically a statistical analysis of the data that
    is requested. This involves collecting data from the application and analyzing
    the data.


    To capture the data, we can use Charles to collect the information, and either
    analyze the data directly in Charles or export the request information to a different
    format and analyze the data in an application of your choice. For this example,
    we''ll use a relatively small sample size and use a single run through the application
    from getting products, viewing a product, adding a product to the cart and finally
    checking out. [Figure 6–14](#Chapter06.html#fig_6_14) shows the data set we''re
    going to look at.


    ![images](images/0614.jpg)


    **Figure 6–14.** *Our data set from Charles*


    How did we get that data? Well, fire up Charles, and ensure that the Mac OS X
    Proxy is enabled by going to **Proxy** ![images](images/U002.jpg) **Mac OS X Proxy**
    and making sure it is the selected item. The next thing to do is click the record
    button in the toolbar and voilà, you are capturing HTTP data. You''ll likely notice
    other entries pop up during the data capture.


    Looking at the table, the first item that jumps out is that there are two types
    of data being requested. The first type of data is the JSON encoded data and the
    second type is images. The response size is also clearly different. Keeping this
    information in mind, we also need to look at the usage patterns for the requests.


    The products list response contains product information including the price. Since
    the price can fluctuate, this service call is one that is not a good candidate
    for caching. We don''t want to present the wrong price to the user. If the data
    set that was returned was much larger, however, we might want to modify the server
    code to return a paged data set and keep the size as low as possible.


    The best candidate for caching data in this case is to cache the images. When
    we optimized the scrolling performance of the product list, we implemented a very
    basic in-memory cache. This solution isn''t the best because the view controller
    handles the caching and doesn''t take into account memory usage and respond to
    memory warnings. The `APIEngine` should do the caching. We want to have a two
    tier approach for caching: in-memory and on disk. The in-memory cache can be cleared
    out when low memory situations occur and the disk cache will take over and cache
    the images for about a week or so.


    **NOTE:** These decisions are made based solely on how the application will be
    used. In a real world scenario, user testing would be performed and would help
    dictate the appropriate caching strategy.'
