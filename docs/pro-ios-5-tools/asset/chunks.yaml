    that the simulator isn''t being used by any other processes. If Xcode is currently
    debugging an app in the simulator, this can prevent Instruments from attaching
    correctly.


    Let''s write a useful script using the recorder and learn a little more about
    the UI Automation JavaScript library. From the sidebar, remove the script you
    just wrote, and create a new one called “Cycle Through Products.” Start recording
    your new script. First, select a product from the product table. From the product
    details view, click the Back button. Your script should look something like this:


    `var target = UIATarget.localTarget();`


    `target.frontMostApp().mainWindow().tableViews()["Empty list"].cells()[0].scrollToVisible();`

    `target.frontMostApp().mainWindow().tableViews()["Empty list"].cells()[0].tap();`

    `target.frontMostApp().mainWindow().navigationBar().leftButton().tap();`


