- fmt: '#### The Jenkins Interface


    The Jenkins dashboard ([Figure 9–2](#Chapter09.html#fig_9_2)) will be pretty stark
    at first. Once you set up a few jobs, it''ll give you a status summary of all
    projects currently being tracked. The sidebar on the left gives you navigation,
    a list of builds in the queue, and build execution status.


    ![images](images/0902.jpg)


    **Figure 9–2.** *The Jenkins dashboard will be extremely useful, once it''s full
    of data.*


    To get more familiar with Jenkins, let''s jump into the Management section. From
    the dashboard''s sidebar, click the `Manage Jenkins` link. The Management page
    ([Figure 9–3](#Chapter09.html#fig_9_3)) is the hub for configuring and monitoring
    the various aspects of your Jenkins instance. Let''s run down the Management menu.


    - **Configure system**: The System Configuration page allows you to change system
    paths, set the number of concurrent build executions, create environment variables,
    and perform setup on any plug-ins added to the system. It''s important to note
    that Jenkins was built to be platform and project agnostic, and as such, not all
    settings will be applicable or interesting to iOS developers.

    - **Reload configuration from disk**: The Jenkins configuration files exist on
    your filesystem and can be modified directly. If you choose to go this route,
    the reload option will force Jenkins to read these files and apply the new settings
    to the system.

    - **Manage plug-ins**: Jenkins'' extensibility is perhaps its most powerful aspect.
    There are many plug-ins available to add support for various platforms, languages,
    and version control systems. In addition, there are plug-ins that add new forms
    of notifications: Jabber, Skype, Twitter, etc. The Plug-in Management page allows
    you to update, find, install, and remove plug-ins. Make sure to check out the
    infamous Chuck Norris Plug-in.

    - **System information**: The System Information page lists basic system info,
    as well as installed plug-ins and environment variables.

    - **System Log**: You can configure the types of data that are logged in the System
    Log page. You can also group and filter log data in individual Loggers.

    - **Load statistics**: As the number of jobs increases, Jenkins'' load will increase
    as well, and monitoring performance will become more important. The Load Statistics
    page gives you a nice chart to see your system''s peaks and valleys.

    - **Jenkins CLI**: Yes, Jenkins can be operated from the command line. This is
    largely unnecessary but can be handy in more complex systems. This interface is
    also made available through several chat plug-ins (Jabber, Skype, etc).

    - **Script console**: Jenkins supports a scripting language called Groovy, and
    this console gives you access to the Groovy interface. You can learn more about
    Groovy at [`http://groovy.codehaus.org`](http://groovy.codehaus.org).

    - **Manage nodes**: Jenkins allows for distributed building through the use of
    nodes. If you have multiple Jenkins instances on your network, you can link them
    here.

    - **About Jenkins**: The About page provides information regarding all of the
    frameworks (and related licenses) used to build Jenkins.

    - **Prepare for shutdown**: Job builds can be triggered by a variety of events,
    so it can be difficult to predict when a job will begin. It''s important not to
    interrupt these jobs, so it''s highly recommended that you prepare Jenkins to
    shutdown before turning off the computer. This will prevent new jobs from beginning
    and allow you to shut down without risking damage to your project workspaces.


    ![images](images/0903.jpg)


    **Figure 9–3.** *The Management page is the hub for all things Jenkins configuration.*


    Before you set up your first job, you need to add a few convenient environment
    variables and plug-ins. Let''s start with the environment variables. Click on
    the `Configure System` link on the Management page. On the Configure System page,
    click the `Environment variables` checkbox under the `Global properties` heading
    ([Figure 9–4](#Chapter09.html#fig_9_4)). This will reveal a key-value pair list,
    which should be empty. Click the `Add` button to add a new key-value pair. The
    environment variables you set here (the keys) will be expanded (into their values)
    anywhere they''re used in your job configuration. This is a great place to put
    system-wide settings like a final publish directory, web server address, or SDK
    path. [Table 9–1](#Chapter09.html#tab_9_1) presents a list of environment variable
    suggestions.


    ![images](images/0904.jpg)


    **Figure 9–4.** *It''s a good idea to contain any SDK-related arguments in environment
    variables, so that you can change them all in one place.*


    ![images](images/t0901.jpg)


    For now, make sure you at least have the SDK variables set. You''ll be adding
    more later when you get to automated deployment. Click the `Save` button at the
    bottom of the page when you''re done to ensure that the changes stick.


    Next, you need to install a few important plug-ins to enable Jenkins to build
    your project. First, you''re going to need the Git plug-in. From the `Manage Jenkins`
    page, click on the `Manage Plug-ins` link. On the Plug-in Management page, jump
    to the `Available` tab. The easiest way to find specific plug-ins on this page
    is to use your browser''s `Find` function (`Control+F` in most browsers). Once
    you''ve found the Git plug-in, check the box on the left to mark it for installation.
    Note that there are several Git-related plug-ins, including a GitHub plug-in.
    These may be useful to you but are not required to get your job running. Make
    sure you''ve selected the Git plug-in before continuing.


    At the bottom of the page is the `Install` button. When you click this, you''ll
    be presented with the plug-in installation status page ([Figure 9–5](#Chapter09.html#fig_9_5)),
    which will notify you of the installation progress. You''ll need to restart Jenkins
    in order for the plug-ins to take effect, so check the “Restart Jenkins when installation
    is complete and no jobs are running” checkbox to ensure Jenkins restarts when
    they''re finished.


    ![images](images/0905.jpg)


    **Figure 9–5.** *Plug-in installation is easy, but make sure you restart Jenkins
    before configuring any plug-ins.*


    Once your plug-ins are installed and Jenkins is restarted, you''re ready to set
    up your first job. First, however, you need to ensure you have Jenkins running
    under the right user with the rights to check out from your repository.


    Whenever you install a new plug-in, the plug-in''s configuration options will
    be added to the `Configure System` page. Github requires that users identify themselves
    before using any repository, so you need to provide a name and e-mail address
    to the plug-in. From the Dashboard, click `Manage Jenkins` and then `Configure
    System`. Scroll down to the Git Plug-in section and add the name and e-mail address
    you''d like to be associated with Jenkins. Don''t forget to click the `Save` button
    at the bottom of the page.'
  raw: '#### The Jenkins Interface


    The Jenkins dashboard ([Figure 9–2](#Chapter09.html#fig_9_2)) will be pretty stark
    at first. Once you set up a few jobs, it''ll give you a status summary of all
    projects currently being tracked. The sidebar on the left gives you navigation,
    a list of builds in the queue, and build execution status.


    ![images](images/0902.jpg)


    **Figure 9–2.** *The Jenkins dashboard will be extremely useful, once it''s full
    of data.*


    To get more familiar with Jenkins, let''s jump into the Management section. From
    the dashboard''s sidebar, click the Manage Jenkins link. The Management page ([Figure
    9–3](#Chapter09.html#fig_9_3)) is the hub for configuring and monitoring the various
    aspects of your Jenkins instance. Lets run down the Management menu.


    *   *Configure system*: The System Configuration page allows you to change system
    paths, set the number of concurrent build executions, create environment variables,
    and perform setup on any plug-ins added to the system. It''s important to note
    that Jenkins was built to be platform and project agnostic, and as such, not all
    settings will be applicable or interesting to iOS developers.

    *   *Reload configuration from disk*: The Jenkins configuration files exist on
    your filesystem and can be modified directly. If you choose to go this route,
    the reload option will force Jenkins to read these files and apply the new settings
    to the system.

    *   *Manage plug-ins*: Jenkins'' extensibility is perhaps its most powerful aspect.
    There are many plug-ins available to add support for various platforms, languages,
    and version control systems. In addition, there are plug-ins that add new forms
    of notifications: Jabber, Skype, Twitter, etc. The Plug-in Management page allows
    you to update, find, install, and remove plug-ins. Make sure to check out the
    infamous Chuck Norris Plug-in.

    *   *System information*: The System Information page lists basic system info,
    as well as installed plug-ins and environment variables.

    *   *System Log*: You can configure the types of data that are logged in the System
    Log page. You can also group and filter log data in individual Loggers.

    *   *Load statistics*: As the number of jobs increases, Jenkins'' load will increase
    as well, and monitoring performance will become more important. The Load Statistics
    page gives you a nice chart to see your system''s peaks and valleys.

    *   *Jenkins CLI*: Yes, Jenkins can be operated from the command line. This is
    largely unnecessary but can be handy in more complex systems. This interface is
    also made available through several chat plug-ins (Jabber, Skype, etc).

    *   *Script console*: Jenkins supports a scripting language called Groovy, and
    this console gives you access to the Groovy interface. You can learn more about
    Groovy at [`http://groovy.codehaus.org`](http://groovy.codehaus.org)`.`

    *   *Manage nodes*: Jenkins allows for distributed building through the use of
    nodes. If you have multiple Jenkins instances on your network, you can link them
    here.

    *   *About Jenkins*: The About page provides information regarding all of the
    frameworks (and related licenses) used to build Jenkins.

    *   *Prepare for shutdown*: Job builds can be triggered by a variety of events,
    so it can be difficult to predict when a job will begin. It''s important not to
    interrupt these jobs, so it''s highly recommended that you prepare Jenkins to
    shutdown before turning off the computer. This will prevent new jobs from beginning
    and allow you to shut down without risking damage to your project workspaces.


    ![images](images/0903.jpg)


    **Figure 9–3.** *The Management page is the hub for all things Jenkins configuration.*


    Before you set up your first job, you need to add a few convenient environment
    variables and plug-ins. Let''s start with the environment variables. Click on
    the Configure System link on the Management page. On the Configure System page,
    click the Environment variables checkbox under the Global properties heading ([Figure
    9–4](#Chapter09.html#fig_9_4)). This will reveal a key-value pair list, which
    should be empty. Click the Add button to add a new key-value pair. The environment
    variables you set here (the keys) will be expanded (into their values) anywhere
    they''re used in your job configuration. This is a great place to put system-wide
    settings like a final publish directory, web server address, or SDK path. [Table
    9–1](#Chapter09.html#tab_9_1) presents a list of environment variable suggestions.


    ![images](images/0904.jpg)


    **Figure 9–4.** *It''s a good idea to contain any SDK-related arguments in environment
    variables, so that you can change them all in one place.*


    ![images](images/t0901.jpg)


    For now, make sure you at least have the SDK variables set. You''ll be adding
    more later when you get to automated deployment. Click the Save button at the
    bottom of the page when you''re done to ensure that the changes stick.


    Next, you need to install a few important plug-ins to enable Jenkins to build
    your project. First, you''re going to need the Git plug-in. From the Manage Jenkins
    page, click on the Manage Plug-ins link. On the Plug-in Management page, jump
    to the Available tab. The easiest way to find specific plug-ins on this page is
    to use your browser''s Find function (Control+F in most browsers). Once you''ve
    found the Git plug-in, check the box on the left to mark it for installation.
    Note that there are several Git-related plug-ins, including a GitHub plug-in.
    These may be useful to you but are not required to get your job running. Make
    sure you''ve selected the Git plug-in before continuing.


    At the bottom of the page is the Install button. When you click this, you''ll
    be presented with the plug-in installation status page ([Figure 9–5](#Chapter09.html#fig_9_5)),
    which will notify you of the installation progress. You''ll need to restart Jenkins
    in order for the plug-ins to take effect, so check the “Restart Jenkins when installation
    is complete and no jobs are running” checkbox to ensure Jenkins restarts when
    they''re finished.


    ![images](images/0905.jpg)


    **Figure 9–5.** *Plug-in installation is easy, but make sure you restart Jenkins
    before configuring any plug-ins.*


    Once your plug-ins are installed and Jenkins is restarted, you''re ready to set
    up your first job. First, however, you need to ensure you have Jenkins running
    under the right user with the rights to check out from your repository.


    Whenever you install a new plug-in, the plug-in''s configuration options will
    be added to the Configure System page. Github requires that users identify themselves
    before using any repository, so you need to provide a name and e-mail address
    to the plug-in. From the Dashboard, click Manage Jenkins and then Configure System.
    Scroll down to the Git Plug-in section and add the name and e-mail address you''d
    like to be associated with Jenkins. Don''t forget to click the Save button at
    the bottom of the page.'
  trans: '

    #### Jenkins 界面


    Jenkins 仪表板（图 9–2）起初会显得相当空旷。一旦你配置好一些任务，它就会显示所有当前被跟踪项目的状态摘要。左侧的侧边栏为你提供导航、队列中的构建列表以及构建执行状态。


    ![images](img/0902.jpg)


    **图 9–2.** *一旦充满数据，Jenkins 仪表板将变得极为实用。*


    为了更熟悉 Jenkins，让我们进入管理部分。从仪表板的侧边栏中，点击 `Manage Jenkins` 链接。管理页面（图 9–3）是配置和监控 Jenkins
    实例各个方面的中心枢纽。让我们逐一介绍管理菜单。


    -   **Configure system（配置系统）**：系统配置页面允许你更改系统路径、设置并发构建执行的数量、创建环境变量，并对添加到系统中的任何插件进行设置。需要注意的是，Jenkins
    设计为平台和项目无关，因此并非所有设置都适用于或对 iOS 开发者有意义。

    -   **Reload configuration from disk（从磁盘重新加载配置）**：Jenkins 配置文件存在于你的文件系统中，可以直接修改。如果你选择这种方式，重新加载选项将强制
    Jenkins 读取这些文件并将新设置应用到系统中。

    -   **Manage plug-ins（管理插件）**：Jenkins 的可扩展性或许是它最强大的方面。有许多可用的插件可以为各种平台、语言和版本控制系统添加支持。此外，还有添加新通知形式的插件：Jabber、Skype、Twitter
    等。插件管理页面允许你更新、查找、安装和移除插件。请务必查看臭名昭著的 Chuck Norris 插件。

    -   **System information（系统信息）**：系统信息页面列出了基本的系统信息，以及已安装的插件和环境变量。

    -   **System Log（系统日志）**：你可以在系统日志页面配置记录哪些类型的数据。你还可以在单独的日志记录器中分组和过滤日志数据。

    -   **Load statistics（负载统计）**：随着任务数量的增加，Jenkins 的负载也会增加，监控性能将变得更加重要。负载统计页面提供了一个漂亮的图表，让你了解系统的高峰和低谷。

    -   **Jenkins CLI**：是的，Jenkins 可以通过命令行操作。这在大多数情况下并非必要，但在更复杂的系统中可能会很方便。此接口也可以通过几个聊天插件（Jabber、Skype
    等）使用。

    -   **Script console（脚本控制台）**：Jenkins 支持一种名为 Groovy 的脚本语言，该控制台让你能够访问 Groovy 接口。你可以在
    [`http://groovy.codehaus.org`](http://groovy.codehaus.org) 了解更多关于 Groovy 的信息。

    -   **Manage nodes（管理节点）**：Jenkins 支持通过节点进行分布式构建。如果你的网络上有多个 Jenkins 实例，你可以在此处将它们链接起来。

    -   **About Jenkins（关于 Jenkins）**：关于页面提供了有关用于构建 Jenkins 的所有框架（及其相关许可证）的信息。

    -   **Prepare for shutdown（准备关机）**：任务构建可以由多种事件触发，因此很难预测任务何时开始。不中断这些任务很重要，因此强烈建议你在关闭计算机之前让
    Jenkins 做好关机准备。这将阻止新任务启动，并允许你在不冒损坏项目工作区风险的情况下关闭系统。


    ![images](img/0903.jpg)


    **图 9–3.** *管理页面是所有 Jenkins 配置的中心。*


    在设置你的第一个任务之前，你需要添加一些方便的环境变量和插件。让我们从环境变量开始。点击管理页面上的 `Configure System` 链接。在“配置系统”页面上，点击“**Global
    properties（全局属性）**”标题下的 `Environment variables` 复选框（图 9–4）。这将显示一个键值对列表，该列表应该是空的。点击
    `Add` 按钮添加一个新的键值对。你在此处设置的环境变量（键）将在任务配置中使用它们的任何地方被展开（成它们的值）。这是放置系统范围设置的绝佳位置，例如最终的发布目录、Web
    服务器地址或 SDK 路径。表 9–1 提供了一些环境变量建议列表。


    ![images](img/0904.jpg)


    **图 9–4.** *将所有与 SDK 相关的参数放在环境变量中是一个好主意，这样你就可以在一个地方更改它们。*


    ![images](img/t0901.jpg)


    目前，请确保你至少设置了 SDK 变量。稍后在进行自动部署时，你会添加更多变量。完成后，点击页面底部的 `Save` 按钮以确保更改生效。


    接下来，你需要安装一些重要的插件，以使 Jenkins 能够构建你的项目。首先，你需要 Git 插件。从 `Manage Jenkins` 页面，点击 `Manage
    Plug-ins` 链接。在“插件管理”页面上，切换到 `Available` 选项卡。在此页面上查找特定插件最简单的方法是使用浏览器的 `Find` 功能（在大多数浏览器中是
    `Control+F`）。找到 Git 插件后，勾选左侧的复选框以标记安装。请注意，有几个与 Git 相关的插件，包括一个 GitHub 插件。这些可能对你有用，但不是运行任务所必需的。在继续之前，请确保你已选择了
    Git 插件。


    页面底部是 `Install` 按钮。点击此按钮后，你会看到插件安装状态页面（图 9–5），该页面会通知你安装进度。你需要重启 Jenkins 才能使插件生效，因此请勾选“**安装完成且没有任务运行时重启
    Jenkins**”复选框，以确保 Jenkins 在安装完成后重启。


    ![images](img/0905.jpg)


    **图 9–5.** *插件安装很容易，但请确保在配置任何插件之前重启 Jenkins。*


    插件安装完毕且 Jenkins 重启后，你就可以设置你的第一个任务了。然而，首先需要确保 Jenkins 在正确的用户下运行，并且拥有从你的仓库检出代码的权限。


    每当你安装一个新插件时，该插件的配置选项都会添加到 `Configure System` 页面。Github 要求用户在使用任何仓库之前标识自己，因此你需要向插件提供一个名称和电子邮件地址。从仪表板中，点击
    `Manage Jenkins`，然后点击 `Configure System`。向下滚动到 Git 插件部分，添加你希望与 Jenkins 关联的名称和电子邮件地址。别忘了点击页面底部的
    `Save` 按钮。

