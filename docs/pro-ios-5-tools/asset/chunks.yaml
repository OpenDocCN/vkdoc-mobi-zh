    ### 在 GitHub 上共享


    让我们暂时离开我们的应用，思考一下如何共享代码。共享项目的方式有很多种。我们可以将源代码打包发布到博客或网站上，但更好的方案是使用公共源代码仓库（repo）。一个好的仓库应允许我们限制谁可以提交代码，同时允许任何人查看或下载代码。其他有益的功能应包括集成的
    Bug/问题追踪器和 Wiki 系统。


    有很多选择可以满足这些标准。一个流行的选择是 GitHub（[`http://www.github.com`](http://www.github.com)），参见
    [Figure 11–32](#Chapter11.html#fig_11_32)。GitHub 是一个基于 Git 分布式版本控制系统的网站，Git 强调速度，最初由
    Linus Torvalds（又是他！）开发，用于协助 Linux 内核的开发。Git 的一个特性是每个工作目录都是一个功能完整的仓库，具有完整的历史记录和完整的版本追踪能力。每个
    Git 仓库不依赖于网络访问或中央服务器。


    ![images](images/1132.jpg)


    **Figure 11–32.** *GitHub 主页*


    如果你还记得，我们在创建项目时勾选了“为此项目创建本地 git 仓库”的复选框。这会在我们的项目目录中创建一个本地 git 仓库。通常，这个仓库是隐藏的，但使用
    `Terminal.app`，我们可以通过命令行使用 `ls –aCF` 命令看到它（参见 [Figure 11–33](#Chapter11.html#fig_11_33)）。


    ![images](images/1133.jpg)


    **Figure 11–33.** *SBJSON 项目目录中名为 .git 的 Git 仓库*


    #### 登录 GitHub


    首先登录你的 GitHub 账户。如果你尚未创建账户，请立即创建一个。关于如何设置账户的信息，请参见 [Chapter 3](#Chapter03.html#ch3)。


    在您的 GitHub 仪表板中（参见 [Figure 11–34](#Chapter11.html#fig_11_34)），左侧是关于您可能正在关注的仓库的状态更新。右侧是您自己的仓库。在您的仓库下方是您正在关注的仓库。


    当您关注一个仓库时，您是在告诉 GitHub 您对跟踪一个项目感兴趣，但可能不想为其贡献代码。这是一个相当方便的功能，可让您轻松跟踪项目。如果您还不熟悉 GitHub，可以浏览该网站以了解更多类似的功能。


    ![images](images/1134.jpg)


    **Figure 11–34.** *一个示例 GitHub 仪表板*


    #### 创建一个共享仓库


    从您的 GitHub 仪表板，点击“Your Repositories”标签旁边的“New Repository”按钮。这将带您进入新仓库页面（[`https://github.com/repositories/new`](https://github.com/repositories/new)），参见
    [Figure 11–35](#Chapter11.html#fig_11_35)。


    ![images](images/1135.jpg)


    **Figure 11–35.** *GitHub 新仓库页面*


    在 Project Name 字段中输入 **SBJSON**。其余字段为可选，但在 Description 字段中输入 **SBJSON static library
    for Super Checkout**。此项目没有主页，因此将该字段留空。由于我们使用的是免费账户，并且计划与所有人共享此代码，请保持标签“Anyone
    (learn more about public repos)”旁边的单选按钮处于选中状态。点击 Create Repository 按钮。


    我们应该会被重定向到我们新的 GitHub 仓库（参见 [Figure 11–36](#Chapter11.html#fig_11_36)）。由于这是一个空仓库，GitHub
    已经贴心地给出了我们需要在计算机上执行的命令来设置我们的项目。


    ![images](images/1136.jpg)


    **Figure 11–36.** *我们的 GitHub 仓库主页*


    回到您的计算机，打开 `Terminal.app`。导航到 SBJSON 静态库项目的项目目录。在命令行中，输入 GitHub 项目页面上的全局设置命令：


    `> git config –global user.name "Your Name"`

    `> git config –global user.email your@email.com`


    将 `"Your Name"` 替换为您希望与 GitHub 一起使用的名称。`your@email.com` 应该是您在 GitHub 注册时使用的电子邮件地址。


    接下来，我们要告诉本地 Git 仓库关于 GitHub 上的仓库的信息。我们应该还在 SBJSON 目录中。该目录应该包含我们之前看到的 `.git` 目录。输入此命令：


    `> git remote add origin git@github.com:username/SBJSON.git`


    将 `username` 替换为您的 GitHub 用户名。在此命令中，`git@github.com:username/SBJSON.git` 是 GitHub
    上仓库的 URL。此命令表示我们想要添加一个远程仓库，并为其指定本地别名 `origin`。'
