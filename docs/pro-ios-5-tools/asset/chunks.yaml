    Quite a bit of code, huh? What we''ve accomplished with this major update is creating
    a new model object, telling the API engine to return a list of these new model
    objects, and updating the product list to handle these new objects. The performance
    piece of the update was completed in `Super_CheckoutViewController.m`. Let''s
    take a moment to look what we are doing in greater detail, and then we''ll see
    how it stacks up against our last run.


    In `tableView:cellForRowAtIndexPath:`, we updated it to use the product model,
    but the performance enhancement comes here:


    `   if([item productImage] == nil) {`

    `        if (self.tableView.dragging == NO && self.tableView.decelerating == NO)
    {`

    `            NSString *requestId = [apiEngine getImageForProduct:[item thumb]];`

    `            [imageIndexes setObject:[NSNumber numberWithInt:[indexPath row]]`

    `forKey:requestId];`

    `        }`

    `    } else {`

    `        [cell.productImage setImage:[item productImage]];`

    `    }`


    Here, we''re checking to see if the image has been downloaded. Previously, we
    were downloading a new image each time a cell was requested. We''re going to reduce
    the number of times the image is requested to reduce the number of times the problem
    method gets invoked. We''re also reducing the number of times the images are being
    loaded by detecting if the table view is scrolling and not decelerating. Basically,
    we''re only loading the images when the table is stationary and asking for cells.


    What about when the table is animating and then stops? Good question! We updated
    the `Super_CheckoutViewController` to conform to the `UIScrollViewDelegate` protocol
    and we added these methods:


    `- (void)scrollViewDidEndDragging:(UIScrollView *)scrollView`

    `                                       willDecelerate:(BOOL)decelerate {`

    `    if (!decelerate) {`

    `        [self loadImagesForOnscreenRows];`

    `    }`

    `}`


    `- (void)scrollViewDidEndDecelerating:(UIScrollView *)scrollView {`

    `    [self loadImagesForOnscreenRows];`

    `}`


    These methods tell us when the table view is finished scrolling and finished decelerating.
    When that occurs, we are loading the images for the onscreen rows. This reduces
    the number of times we make a request to the number of products that are stationary
    on the screen.


    Now that we have looked at the potential fix, let''s take a look at how it performs
    in Instruments. I''ve run the new version in the same session as the last run
    to illustrate the difference in terms of the graph. [Figure 5–11](#Chapter05.html#fig_5_11)
    shows the comparison, and we can tell the difference after the images are loaded
    in memory. We can see that imageReceived:forRequest: is still taking quite a bit
    of processing power though. Perhaps, the resizing code is a bit heavy for what
    we need.


    ![images](images/0511.jpg)


    **Figure 5–11.** *Once the images are loaded, things looked a lot better.*


    I''m still not happy with the way it is performing, so let''s remove the image
    resizing code. Update the `imageReceived:forRequest:` method in `Super_CheckoutViewController`
    to look like this:


    `-(void) imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier
    {`

    `    Product *prod = (Product *)[inventory objectAtIndex:[[imageIndexes`


    `objectForKey:connectionIdentifier] intValue]];`

    `    [prod setProductImage:image];`

    `    [imageIndexes removeObjectForKey:connectionIdentifier];`

    `}`


    Now, let''s compare how it performs without the resize. I''ve run the two in the
    same instruments session, so we can compare them (see [Figure 5–12](#Chapter05.html#fig_5_12)).
    As you can see, removing the resizing code didn''t really change the graph, but
    we did remove the poorly performing code. The problem is that scrolling is still
    not how I''d like it.


    ![images](images/0512.jpg)


    **Figure 5–12.** *Successfully removed some poorly performing code, but scrolling
    is still sluggish*


    ### Bad Scrolling No More


    We''ve hit the end of what the Time Profiler can give us, so it is time to pull
    out the big guns. We''re going to get down to measuring the frame rate and see
    what kind of bottlenecks we''re running into based on how Core Animation is performing.
    Before we get into using the Core Animation instrument, let''s spend a few moments
    talking about how rendering happens in iOS.'
