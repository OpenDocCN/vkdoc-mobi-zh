  trans: "\n### 重构库存列表\n\n我们进行修改的第一站是 `Super_CheckoutViewController` 类。该类负责显示库存列表并引导用户进入产品详情视图。目前，该类将\
    \ `ProductDetailsViewController` 推入导航控制器的堆栈中。我们需要对其进行更新，以支持我们添加到主窗口 nib 文件中的分屏视图控制器。\n\
    \n为此，请打开 `Super_CheckoutViewController.h`，并将其修改为如代码清单 10–3 所示。\n\n**代码清单 10–3.**\
    \ *更新主视图控制器以支持两种界面模式*\n\n```objc\n#import <UIKit/UIKit.h>\n#import \"SuperCheckoutAPIEngineDelegate.h\"\
    \n@class ProductDetailsViewController;\n@class SuperCheckoutAPIEngine;\n@class\
    \ ProductCell;\n\n@interface Super_CheckoutViewController : UITableViewController\n\
    \                                                      <SuperCheckoutAPIEngineDelegate,\
    \ UIScrollViewDelegate> {\n    NSArray *inventory;\n    SuperCheckoutAPIEngine\
    \ *apiEngine;\n\n    UINib *cellNib;\n    ProductCell *productCell;\n\n    NSMutableDictionary\
    \ *imageIndexes;\n    NSMutableDictionary *imageDownloadsInProgress;\n    ProductDetailsViewController\
    \ *detailsViewController;\n}\n\n@property (nonatomic, retain) IBOutlet ProductCell\
    \ *productCell;\n@property (nonatomic, retain) IBOutlet ProductDetailsViewController\n\
    *detailsViewController;\n\n@end\n```\n\n此处真正的区别在于我们添加了对 `ProductDetailsViewController`\
    \ 的引用。我们仍需要将其连接起来，但暂时还没准备好。打开 `Super_CheckoutViewController.m` 并做好准备；我们将进行一些更新。\n\
    \n首先，在实现文件的顶部合成 `detailsViewController` 属性。\n\n接下来，在 `dealloc` 方法中，在调用 `[super\
    \ dealloc]` 之前添加 `[detailsViewController release];` 来释放实例变量。\n\n下一次更新是在 `tableView:cellForRowAtIndexPath:`\
    \ 中，删除以下代码行：\n\n```objc\n[cell setAccessoryType:UITableViewCellAccessoryDisclosureIndicator];\n\
    ```\n\n并将其替换为：\n\n```objc\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPhone)\
    \ {\n    [cell setAccessoryType:UITableViewCellAccessoryDisclosureIndicator];\n\
    } else {\n    [cell setAccessoryType:UITableViewCellAccessoryNone];\n}\n```\n\n\
    这里我们通过调用 `UI_USER_INTERFACE_IDIOM()` 来识别当前的界面模式。如果我们在 iPhone/iPod Touch 上，则将展开指示符设置为附件视图。对于\
    \ iPad，我们不需要附件视图，因为产品详情屏幕已经存在。\n\n接下来的更新是替换整个选择产品的方法。找到 `tableView:didSelectRowAtIndexPath:`\
    \ 方法，并将整个实现替换为以下代码：\n\n```objc\n- (void)tableView:(UITableView *)tableView\n \
    \                          didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n\
    \    ProductDetailsViewController *newVC = [[ProductDetailsViewController alloc]\
    \ initWithNibName:@\"ProductDetailsViewController\" bundle:nil];\n\n    [newVC\
    \ setSelectedProduct:[inventory objectAtIndex:[indexPath row]]];\n\n    [self.navigationController\
    \ pushViewController:newVC animated:YES];\n    [newVC release];\n        if(detailsViewController\
    \ == nil) {\n                ProductDetailsViewController *newVC =\n         \
    \                     [[ProductDetailsViewController alloc]           \n     \
    \                             initWithNibName:@\"ProductDetailsViewController\"\
    \n                                                       bundle:nil];\n\n    \
    \            [newVC setSelectedProduct:[inventory objectAtIndex:[indexPath row]]];\n\
    \n                [self.navigationController pushViewController:newVC animated:YES];\n\
    \                [newVC release];\n        } else {\n                [detailsViewController\
    \ setSelectedProduct:\n                            [inventory objectAtIndex:[indexPath\
    \ row]]];\n        }\n}\n```\n\n在此修改中，我们检查产品详情视图控制器是否为空。由于我们在 iPad 上使用分屏视图控制器，详情视图控制器会被设置，因此我们可以通过检查它是否为空来检测应用程序运行在哪种设备上。\n\
    \n接下来要查找的方法是 `viewDidLoad:`。在此方法中，在设置视图控制器标题的 `[self setTitle:@\"Inventory\"]`\
    \ 下方添加以下代码块：\n\n```objc\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad)\
    \ {\n    [[self navigationItem] setRightBarButtonItem:nil];\n}\n```\n\n这里我们从导航栏中移除了右侧按钮，因为我们要将购物车按钮移动到产品详情屏幕的工具栏中。这个更新稍后才会进行；首先我们需要完成库存屏幕的更新。\n\
    \n我们快完成这个文件了，转到 `viewDidUnload` 方法，并在调用 `[super viewDidUnload]` 之前添加以下代码行：\n\n\
    ```objc\n[self setDetailsViewController:nil];\n```\n\n最后一项更新是在 `shouldAutorotateToInterfaceOrientation:`\
    \ 中。该方法告诉应用程序是否应自动旋转以适应设备的方向。对于 iPad，我们希望支持两个方向。对于 iPhone/iPod Touch，我们只希望支持竖屏模式。以下是该方法的更新内容：\n\
    \n```objc\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {\n    return\
    \ YES;\n}\n\nreturn (interfaceOrientation == UIInterfaceOrientationPortrait);\n\
    ```\n\n在此方法中，我们检查当前设备，并对 iPad 返回 `YES`。下面的代码行与 iPhone/iPod Touch 版本中的相同。\n\n现在库存列表的修改完成了。最后要做的是打开\
    \ `MainWindow-iPad.xib`，并将 Super Checkout 视图控制器上的 `detailsViewControllerIBOutlet`\
    \ 连接到产品详情视图控制器（参见图 10–12）。\n\n![images](img/1012.jpg)\n\n**图 10–12.** *分屏视图控制器库存屏幕的最终设置*\n\
    \n库存屏幕现已完成，但更新产品详情屏幕还有不少工作要做。\n"
- fmt: "### Updating the Product Details\n\n`ProductDetailsViewController`类需要进行较大的更新。iPhone/iPod\
    \ Touch版Super Checkout将产品详情屏幕推入导航控制器，而iPad的分屏视图控制器中没有导航控制器。为此，我们将根据运行的设备为详情控制器加载不同的nib文件。我们需要让`ProductDetailsViewController`同时支持两种设备类型（idiom），因此我们将其改为`UIViewController`的子类，而不是`UITableViewController`的子类。\n\
    \n我们首先更新`ProductDetailsViewController.h`文件，使其如[清单10–4](#Chapter10.html#list_10_4)所示。\n\
    \n**清单10–4.** *更新ProductDetailsViewController类以支持iPad设备类型*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"SuperCheckoutAPIEngine.h\"\n#import \"SCModalDelegate.h\"\n@class QuantityCell;\n\
    @class Product;\n\n@interface ProductDetailsViewController :\nUIViewController<SuperCheckoutAPIEngineDelegate,\n\
    \ SCModalDelegate, UITableViewDelegate, UITableViewDataSource,\nUISplitViewControllerDelegate,\n\
    UIPopoverControllerDelegate> {\n    Product *selectedProduct;\n    UIView *productDetailsHeader;\n\
    \    UIImageView *productImage;\n    UILabel *productNameLabel;\n    UILabel *productPriceLabel;\n\
    \    UITableViewCell *addToBasketCell;\n    QuantityCell *quantityCell;\n\n  \
    \  SuperCheckoutAPIEngine *apiEngine;\n\n    UIToolbar *toolbar;\n    UITableView\
    \ *tableView;\n    UIBarButtonItem *shoppingCartButton;\n}\n\n@property(retain,\
    \ nonatomic) Product *selectedProduct;\n@property (nonatomic, retain) IBOutlet\
    \ UIView *productDetailsHeader;\n@property (nonatomic, retain) IBOutlet UIImageView\
    \ *productImage;\n@property (nonatomic, retain) IBOutlet UILabel *productNameLabel;\n\
    @property (nonatomic, retain) IBOutlet UILabel *productPriceLabel;\n@property\
    \ (nonatomic, retain) IBOutlet UITableViewCell *addToBasketCell;\n@property (nonatomic,\
    \ retain) IBOutlet QuantityCell *quantityCell;\n@property (nonatomic, retain)\
    \ IBOutlet UIToolbar *toolbar;\n@property (nonatomic, retain) IBOutlet UITableView\
    \ *tableView;\n@property (nonatomic, retain) IBOutlet UIBarButtonItem *shoppingCartButton;\n\
    - (IBAction)cartButtonPressed:(id)sender;\n\n@end\n```\n\n我们来逐一分析所做的更改。\n\n在此次更新之前，类声明是这样的：\n\
    \n```\n@interface ProductDetailsViewController :\n                           \
    \     UITableViewController<SuperCheckoutAPIEngineDelegate>\n```\n\n在旧版本中，我们继承了`UITableViewController`，并遵循`SuperCheckoutAPIEngineDelegate`协议。这为我们提供了一个基本的视图控制器，其视图是一个`UITableView`，没有其他内容。由于这个类需要同时支持两种设备类型，我们需要以最低共同标准来设计它。因此，我们将类声明更新为：\n\
    \n```\n@interface ProductDetailsViewController :\nUIViewController<SuperCheckoutAPIEngineDelegate,\
