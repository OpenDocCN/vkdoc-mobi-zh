- fmt: '# Exorcising Jenkins’ Daemon


    You’re going to set up your Super Checkout job, which is hosted at Github. The
    Git plug-in adds support for Git as a version control system (VCS) in Jenkins,
    but since Github requires SSH auth keys, Jenkins isn’t going to be able to communicate
    with it just yet, as it’s run by a hidden user named `daemon`. In order to enable
    SSH keys, you’ll need to replace this user with your own (which you set up prior
    to installation). Alternatively, you could simply use Git over HTTPS, but that
    wouldn’t be as fast.


    Getting Jenkins to use your custom user is fairly easy. First, you need to shut
    Jenkins down. Even if you haven’t gotten any jobs set up, it’s a good idea to
    get in the habit of notifying Jenkins that it’s about to go down, so start by
    going to the Jenkins dashboard in your browser. From the sidebar, click **Manage
    Jenkins**, then click **Prepare for Shutdown** at the bottom of the page.


    With Jenkins ready to shutdown, open up the terminal. You need to shut down the
    Jenkins daemon entirely. The right way to do this is to unload it using `launchctl`,
    which can be used to load and unload daemons by specifying their configuration
    plist. The configuration plist contains information about how `launchctl` should
    run the daemon, including what user it should be spawned from. Once the Jenkins
    daemon is unloaded, you can tweak the plist to use your SSH-authorized-Apple-certified
    user, then restart the daemon.


    First, unload the Jenkins daemon, like so:


    ```

    sudo launchctl unload -w /Library/LaunchDaemons/org.jenkins-ci.plist

    ```


    Before you do anything to the plist itself, you need to save a backup of it.


    ```

    cp /Library/LaunchDaemons/org.jenkins-ci.plist ~/Desktop/org.jenkins-ci_backup.plist

    ```


    Next, open the plist in your terminal editor of choice. It’s a plist, so the format
    should look pretty familiar. This is a simple edit, but if you’re not too familiar
    with the terminal, it might make sense to use something like `nano` to do the
    editing.


    ```

    sudo nano /Library/LaunchDaemons/org.jenkins-ci.plist

    ```


    The key you’re interested in is `UserName`, which will be set to `daemon` by default.
    Simply change this value to `jenkins` (or whatever you named your user account).
    That segment of the plist should now look like this:


    ```

    <key>UserName</key>

    <string>jenkins</string>

    ```


    You can also modify the location in which Jenkins will store its files. It’s a
    great idea to put the Jenkins home directory in `/Users/Shared` (the default location)
    so that all users have access to it. The key for this setting is `JENKINS_HOME`.
    Whether you change it or not, make sure you note the location, as you’ll need
    to make sure your new user has read-write access to it in a moment. When you’re
    done, save your changes, and close the plist. If you’re using `nano`, this is
    done by pressing `ctrl+X`, and then `Y` at the confirmation dialog.


    The last step is to give your new user ownership of the Jenkins home directory
    (you may need modify this code if your user and Jenkins home directory are different):


    ```

    sudo chown -R jenkins /Users/Shared/Jenkins

    ```


    Now that the daemon’s configuration plist reflects your user, who has sufficient
    access to Github, you can re-launch the daemon.


    ```

    sudo launchctl load -w /Library/LaunchDaemons/org.jenkins-ci.plist

    ```


    Jump back to your browser and reload the Jenkins dashboard. Jenkins should be
    starting up. To confirm that it’s running under the right user, open the **Activity
    Monitor** utility ([Figure 9–6](#Chapter09.html#fig_9_6)), and search for a `java`
    process running under the `jenkins` user (or whatever name you chose to give Jenkins)
    under **All Processes**.


    ![images](images/0906.jpg)


    **Figure 9–6.** *You may have more than one process named java, but you should
    only have one owned by jenkins.*


    # Get a Job


    In Jenkins, as in many CI systems, a job (also referred to as a project) is a
    set of build instructions to be executed when a trigger event occurs. This set
    of instructions commonly includes a fresh checkout or update of the source code
    from the repository, a fresh build from source, unit testing, static analysis,
    documentation generation, and deployment. In short, jobs make project builds on
    triggers.


    Triggers are simply events that can be used to start a job. Jenkins supports three
    types of triggers.


    *   **Job dependency**: Jobs can be triggered when another job has finished. This
    is great for cascading a set of jobs when a dependent library is modified.

    *   **Interval**: Jobs can simply be triggered when a given amount of time has
    passed. This is great for nightly builds or projects that aren’t using source
    control. But you wouldn’t work on a project like that, would you?

    *   **SCM polling**: This is probably the most useful trigger. Essentially, Jenkins
    will poll a given repository for updates and trigger a build if any are found.
    This ensures the build is always made from the bleeding edge codebase and cuts
    down on the unnecessary builds that can result from using an interval trigger.


    So let’s get your job set up. First, click the **New Job** link in the Jenkins
    sidebar. The job creation page ([Figure 9–7](#Chapter09.html#fig_9_7)) allows
    you to give your job a name and select the starting point for the project. You’re
    going to focus on the free-style software project option. Once you’ve got a job
    in the system, another option will appear at the bottom of this list that will
    allow you to use an existing job as a template for new jobs.


    ![images](images/0907.jpg)


    **Figure 9–7.** *Make sure to give your job a unique and recognizable name, as
    you may find the dashboard gets cluttered quickly.*


    **CAUTION:** The name of your job will be used to create a directory in the Jenkins
    home directory, which will house all of the assets and metadata for the project.
    Due to the way that some plug-ins have been written, it’s advisable to avoid spaces
    or other non-filesystem-friendly characters in your job name.


    Once you’ve named your project, click **OK** to continue on to the Job Configuration
    page. The Configuration page lets you manage many aspects of your job, including
    version control info, triggers, build steps, and build options. Let’s go through
    each of the sections of the Configuration page at a high level.


    *   **Basic project info**: The topmost section of the page allows you to edit
    the name and description of the project, as well as some other basic configurations.
    The **Disable Build** option allows you to disable the job.

    *   **Advanced project options**: The advanced options are primarily used in more
    complex jobs or in jobs for projects that have large teams. The **Quiet Period**
    option allows you to prevent Jenkins from building for every VCS commit in a “commit
    burst,” which can often overload the system. It creates a grace period during
    which it will wait to see if any other commits are processing before building.

    *   **Source code management**: This is where you select and configure your repository.
    Out of the box, Jenkins supports a few SCMs, but as you add plug-ins to the system
    to enable others (Git, for example), they will be added to this list.

    *   **Build triggers**: As discussed, a job’s execution must be triggered by an
    event. The trigger section allows you to choose which events will execute the
    job.

    *   **Build**: This is the meat of the job configuration. It allows you to add
    build steps to the procedure, which can take many forms. The most common form,
    at least the form you’re going to be most interested in, is the **Execute shell**
    build step type (more on that in a moment).

    *   **Post-build actions**: Once you’ve got a successful (or unsuccessful) build,
    you should do something with it. The post-build actions allow you to notify users,
    publish the build results somewhere, or even kick off another job execution.'
