    ### 在 GitHub 上共享


    让我们暂时离开我们的应用，思考一下如何共享代码。共享项目的方式有很多种。我们可以将源代码打包发布到博客或网站上，但更好的方案是使用公共源代码仓库（repo）。一个好的仓库应允许我们限制谁可以提交代码，同时允许任何人查看或下载代码。其他有益的功能应包括集成的
    Bug/问题追踪器和 Wiki 系统。


    有很多选择可以满足这些标准。一个流行的选择是 GitHub（[`http://www.github.com`](http://www.github.com)），参见
    Figure 11–32。GitHub 是一个基于 Git 分布式版本控制系统的网站，Git 强调速度，最初由 Linus Torvalds（又是他！）开发，用于协助
    Linux 内核的开发。Git 的一个特性是每个工作目录都是一个功能完整的仓库，具有完整的历史记录和完整的版本追踪能力。每个 Git 仓库不依赖于网络访问或中央服务器。


    ![images](img/1132.jpg)


    **Figure 11–32.** *GitHub 主页*


    如果你还记得，我们在创建项目时勾选了“为此项目创建本地 git 仓库”的复选框。这会在我们的项目目录中创建一个本地 git 仓库。通常，这个仓库是隐藏的，但使用
    `Terminal.app`，我们可以通过命令行使用 `ls –aCF` 命令看到它（参见 Figure 11–33）。


    ![images](img/1133.jpg)


    **Figure 11–33.** *SBJSON 项目目录中名为 .git 的 Git 仓库*


    #### 登录 GitHub


    首先登录你的 GitHub 账户。如果你尚未创建账户，请立即创建一个。关于如何设置账户的信息，请参见 Chapter 3。


    在您的 GitHub 仪表板中（参见 Figure 11–34），左侧是关于您可能正在关注的仓库的状态更新。右侧是您自己的仓库。在您的仓库下方是您正在关注的仓库。


    当您关注一个仓库时，您是在告诉 GitHub 您对跟踪一个项目感兴趣，但可能不想为其贡献代码。这是一个相当方便的功能，可让您轻松跟踪项目。如果您还不熟悉 GitHub，可以浏览该网站以了解更多类似的功能。


    ![images](img/1134.jpg)


    **Figure 11–34.** *一个示例 GitHub 仪表板*


    #### 创建一个共享仓库


    从您的 GitHub 仪表板，点击“Your Repositories”标签旁边的“New Repository”按钮。这将带您进入新仓库页面（[`https://github.com/repositories/new`](https://github.com/repositories/new)），参见
    Figure 11–35。


    ![images](img/1135.jpg)


    **Figure 11–35.** *GitHub 新仓库页面*


    在 Project Name 字段中输入 **SBJSON**。其余字段为可选，但在 Description 字段中输入 **SBJSON static library
    for Super Checkout**。此项目没有主页，因此将该字段留空。由于我们使用的是免费账户，并且计划与所有人共享此代码，请保持标签“Anyone
    (learn more about public repos)”旁边的单选按钮处于选中状态。点击 Create Repository 按钮。


    我们应该会被重定向到我们新的 GitHub 仓库（参见 Figure 11–36）。由于这是一个空仓库，GitHub 已经贴心地给出了我们需要在计算机上执行的命令来设置我们的项目。


    ![images](img/1136.jpg)


    **Figure 11–36.** *我们的 GitHub 仓库主页*


    回到您的计算机，打开 `Terminal.app`。导航到 SBJSON 静态库项目的项目目录。在命令行中，输入 GitHub 项目页面上的全局设置命令：


    `> git config –global user.name "Your Name"`

    `> git config –global user.email your@email.com`


    将 `"Your Name"` 替换为您希望与 GitHub 一起使用的名称。`your@email.com` 应该是您在 GitHub 注册时使用的电子邮件地址。


    接下来，我们要告诉本地 Git 仓库关于 GitHub 上的仓库的信息。我们应该还在 SBJSON 目录中。该目录应该包含我们之前看到的 `.git` 目录。输入此命令：


    `> git remote add origin git@github.com:username/SBJSON.git`


    将 `username` 替换为您的 GitHub 用户名。在此命令中，`git@github.com:username/SBJSON.git` 是 GitHub
    上仓库的 URL。此命令表示我们想要添加一个远程仓库，并为其指定本地别名 `origin`。

    '
- fmt: '#### Committing Our Changes


    Before we can put our code into GitHub, we need to commit our changes locally.
    Remember, each Git repository is a full-fledged, independent repository. From
    Git''s perspective, the canonical copy of your code resides on your computer,
    and the repository on GitHub is a remote copy. Let''s save our work in the local
    repository.


    Open the `SBJSON` static library project in Xcode. Select File ![image](images/U001.jpg)
    Source Control ![image](images/U001.jpg) Commit. Xcode should expose the source
    control pane (see [Figure 11–37](#Chapter11.html#fig_11_37)). On the left side
    is a list of the SBJSON project files. Most of the file will be checked; some
    will not. You won''t need to change anything. The unchecked files represent files
    the Xcode has determined don''t need to be committed to the repository. Select
    the file `JSON.h`. In the file viewer pane, the contents of `JSON.h` should appear
    on the left. The right file viewer will read “File has no revisions”. Since this
    is the first commit, there is nothing to display. In a commit of an existing file,
    the left file viewer will display the current state of `JSON.h`, while the right
    file viewer will display the last version in the repository. Xcode will highlight
    the differences between the file versions, so you can see what you''ve changed.


    ![images](images/1137.jpg)


    **Figure 11–37.** *Xcode''s source control pane*


    Near the bottom, there is a text area with the words “Enter commit message here”.
    This area is for you to enter a comment about the changes going into the repository.
    You can be as descriptive or terse as you want. In this case, enter **Initial
    commit**. Click Commit.


    Once the changes are committed, the source control pane will disappear, revealing
    the project window. Now, we''re ready to push the changes to GitHub.


    This time, select File ![image](images/U001.jpg) Source Control ![image](images/U001.jpg)
    Push. A dialog should appear (see [Figure 11–38](#Chapter11.html#fig_11_38)).
    It may take a few moments for the Remote drop-down to populate itself. Give it
    time; Xcode is checking the existence and accessibility of the remote repository.
    Eventually, the drop-down should read “origin/master (Create)”. This is saying
    that GitHub is going to create the repository on origin (our alias for the remote
    GitHub repository) by sending it a copy of master (our local repository). Click
    Push.


    ![images](images/1138.jpg)


    **Figure 11–38.** *Xcode''s remote repository dialog*


    **NOTE:** If Xcode is unable to connect to the remote repository, the drop-down
    will continue to read “Loading Remotes.” Additionally, the green dot and “Repository
    is online” text will not appear. Click Cancel, and check your network connection.
    If the connection is good, check to make sure you successfully created the repository
    on GitHub. Finally, check that you correctly entered the GitHub URL when adding
    the remote repository as follows:


    Open a Terminal.app window and navigate to our project directory. Enter the command:


    ```

    > git config –-get remote.origin.url

    ```


    Make sure the returned URL matches the URL from GitHub. If the URL is wrong, you
    can fix it by unsetting it then reentering the URL:


    ```

    > git config –unset remote.origin.url

    > git remote add origin git@github.com:username/SBJSON.git

    ```


    Once the push is successful, the dialog should disappear. You can confirm the
    push was successful by logging into GitHub and checking the repository page (see
    [Figure 11–39](#Chapter11.html#fig_11_39)).


    ![images](images/1139.jpg)


    **Figure 11–39.** *The GitHub repository after the push*


    #### Using GitHub Features


    Before we move on, I want to briefly cover some of the features Git and GitHub
    offer: tagging, pull requests, and issue tracking.


    ##### Tagging


    The concept of tagging is common to revision control systems. The idea is that
    once the source code has reached a stable state or achieved a development milestone,
    we want to mark the source code in some way. Essentially, you''re creating a snapshot
    of the source code at a specific moment in time. This is achieved by tagging the
    release. With Git, tagging is very simple command line procedure. Once you have
    committed the changes to Git, simply enter this command:


    ```

    > git tag "tag-name"

    ```


    You can replace `tag-name` with any value you wish. It''s commonplace to tag with
    numbers separated by dots, signifying major and minor versions (e.g., `1.0`).
    To push the tags to GitHub, simply add the `–tags` flag to the push command:


    ```

    > git push –-tags origin remote

    ```


    ##### Pull Requests


    GitHub offers its users the ability to fork a repository on GitHub. When you fork
    a project, you make a copy of the repository for yourself, which allows you to
    make changes to code if you want to fix a bug or add a new feature.


    Once you''ve made some changes to your fork of a repository, you can offer those
    changes back to the original repository''s owner and the world at large. You accomplish
    this on GitHub via a pull request. A pull request is simply a message to the original
    repository''s maintainer that you have some changes you are offering to them.
    Creating a pull request is simple: simply click the pull request on your fork
    of the repository. You will be asked to comment on your pull request and then
    send it to the original repository''s maintainer.


    The converse is managing pull requests that have been sent to you by people who
    have forked your repository. You can review the pull requests, comment on them,
    reject them or merge them into your project.


    GitHub has done an excellent job detailing the pull request process. You can read
    more at `http://help.github.com/send-pull-requests/`.


    ##### Issue Tracking


    Issue tracking is a useful tool in gathering bug reports. It also allows people
    to comment on what new features they would like to see in an application or library.
    GitHub uses its issue tracker for every repository. It''s fairly straightforward
    to use. Just click the Issues link at the top of any repository.


    **NOTE:** If your project doesn''t show an Issues link in your repository, it''s
    been disabled. This happens when you fork a repository. You can reenable in the
    administration section of your repository. Click the Admin button of your repository.
    You should be in the Options administration page. Under Features, click the check
    box next to Issues. When you return to your repository page, the Issues link should
    be present.'
