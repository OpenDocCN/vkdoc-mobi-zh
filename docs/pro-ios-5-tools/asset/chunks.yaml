    to refer to the latest SDK by simply leaving off the version number, thus “iphoneos”
    and “iphonesimulator” will default to the latest version available on your system.
    However, when writing build scripts that will stand the test of time, it''s a
    good idea to be specific, using additional scripts to test against new or beta
    SDKs.


    #### Just Archive it, Already


    Now that you''ve got an easy way to get to PackageApplication, you need to learn
    to use it. PackageApplication takes the path to an application bundle (ending
    in .app), an output path, and an optional provisioning profile path. It can also
    re-codesign an application by passing an optional codesign identity flag.


    So let''s get this working in your Jenkins job. Back in the Job Configuration
    page, in your new, empty build step, execute this shell command. You''ll notice
    that you''ve taken the additional step of putting your JenkinsProducts path in
    an environment variable. Also, the output directory is relative to the job workspace
    (in an Archive directory that you''re creating). This makes publishing the finished
    product a bit easier and keeps all the files related to this job in one place.


    `mkdir -p $WORKSPACE/archive`

    `xcrun -sdk iphoneos5.0 PackageApplication -v $PRODUCTS/Applications/SuperCheckout.app
    -o $WORKSPACE/archive/SuperCheckout.ipa --embed /Users/jenkins/Provisioning\ Profiles/SuperCheckout.mobileprovision`


    Now that you''ve got your archive script in place, you can publish the IPA. This
    will place a link to the latest stable IPA to your Job Details page. Anyone who
    needs to grab the latest and greatest can simply open the job and click the link
    to download it. Scroll down to the Post-Build Actions section and check the box
    marked “Archive the artifacts.” Enter the path to the IPA file, relative to the
    workspace.


    `archive/SuperCheckout.ipa`


    **NOTE:** When entering paths to files in a job configurations, Jenkins will try
    to find the file or folder as you type. You may see warnings about a file or folder
    not existing. Simply double-check that your paths are correct, and ignore the
    warnings.


    Now save and build! When all is said and done, you should have a link to a successfully
    archived app in your Job Details page ([Figure 9–22](#Chapter09.html#fig_9_22)),
    along with the static analysis records. Jenkins is starting to pull its weight
    in your workflow!


    ![images](images/0922.jpg)


    **Figure 9–22.** *The IPA file here can be downloaded by anyone who has access
    to Jenkins.*'
  trans: '

    #### 你在何方，`PackageApplication`？


    `PackageApplication` 脚本与你构建所用的 SDK 是绑定的。因此，你需要确保使用的是正确的版本。如果你尝试从终端直接调用它，会发现它既不在环境变量路径中，也不在`/usr/bin`（其他
    Xcode 命令行工具所在位置）中。`PackageApplication` 存储在 SDK 内部。例如，当前 iOS 设备 SDK 版本的 `PackageApplication`
    位于：


    `/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin/PackageApplication`


    然而，如果你在现有工具集上使用测试版 SDK，它可能位于其他位置。此外，随着工具更新，它的位置也可能发生变化。因此，你需要一种方法，仅通过指定 SDK 就能使用
    `PackageApplication`。幸运的是，命令行接口也能解决这个问题！


    #### `xcrun`


    `xcrun` 命令位于 `/usr/bin` 中（因此应该已在你的环境变量路径中），用于查找并执行 Xcode 命令行工具集中的命令。你可以用它来查找 `xcodebuild`、`PackageApplication`
    以及许多其他工具。`xcrun` 的独特之处在于，它允许你指定所查找命令对应的 SDK 版本。同样值得注意的是，`xcrun` 不仅能告诉你命令的路径（通过
    `-find` 标志也能实现），还能直接调用该命令。以下是一个基本的 `xcrun` 命令示例：


    `xcrun -sdk iphoneos xcodebuild -target MyTarget -configuration Debug`


    该命令将查找与 iOS 5 兼容的 `xcodebuild` 命令，并使用指定的 `-target` 和 `-configuration` 标志来执行它。


    **注意：** 在较新版本的工具集中，省略版本号直接引用最新 SDK 已成为标准做法，因此 “iphoneos” 和 “iphonesimulator” 将默认指向你系统上可用的最新版本。然而，在编写能够经得起时间考验的构建脚本时，最好明确指定版本，并使用额外的脚本来针对新版本或测试版
    SDK 进行测试。


    #### 直接归档吧


    既然你已经找到了轻松使用 `PackageApplication` 的方法，接下来需要学习如何使用它。`PackageApplication` 接受应用程序包路径（以
    `.app` 结尾）、输出路径以及可选的配置文件路径。它还可以通过传递可选的代码签名标识来重新签名应用程序。


    那么，让我们在 Jenkins 任务中实现它。回到任务配置页面，在新的空构建步骤中，执行以下 Shell 命令。你会注意到，我们额外将 `JenkinsProducts`
    路径设置为了一个环境变量。此外，输出目录是相对于任务工作空间的（位于你正在创建的 Archive 目录中）。这样能使发布最终产品更简便，并将该任务相关的所有文件集中存放在一处。


    ```

    mkdir -p $WORKSPACE/archive

    xcrun -sdk iphoneos5.0 PackageApplication -v $PRODUCTS/Applications/SuperCheckout.app
    -o $WORKSPACE/archive/SuperCheckout.ipa --embed /Users/jenkins/Provisioning\ Profiles/SuperCheckout.mobileprovision

    ```


    现在，归档脚本已就位，你可以发布 IPA 文件了。这将在你的任务详情页面放置一个指向最新稳定版 IPA 的链接。任何需要获取最新版本的人只需打开任务，点击链接即可下载。向下滚动到“构建后操作”部分，勾选“归档成品”复选框。输入
    IPA 文件的路径（相对于工作空间）：


    `archive/SuperCheckout.ipa`


    **注意：** 在任务配置中输入文件路径时，Jenkins 会在你输入时尝试查找文件或文件夹。你可能会看到关于文件或文件夹不存在的警告。只需仔细检查路径是否正确，然后忽略这些警告。


    现在保存并构建！当一切完成后，你的任务详情页面应该会显示一个指向成功归档应用的链接（图 9–22），同时还有静态分析记录。Jenkins 已经在你的工作流程中发挥作用了！


    ![images](img/0922.jpg)


    **图 9–22.** *此处的 IPA 文件可供任何有 Jenkins 访问权限的人下载。*

