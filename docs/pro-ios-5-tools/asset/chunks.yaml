- fmt: '### Confirmation


    Once you have entered or uploaded the information for the device(s), you should
    be returned to the Devices page, under the Manage tab. To confirm your devices
    have been added, scroll to the bottom of the page. There you should see a list
    of all the devices you have information for.


    ### Creating Our App ID


    Now, we need to create an entry for our application in the provisioning portal.
    This information will be used to when we build our application for distribution
    among our beta testers.


    On the iOS Provisioning Portal menu, click `App IDs`. Like the Devices page, the
    Manage tab should be selected (see [Figure 7–23](#Chapter07.html#fig_7_23)). Since
    this is your first application, there should be no `App IDs` listed at the bottom
    of the page. If the `SuperCheckout` application is listed, you can skip ahead
    to the **Ad Hoc Distribution Provisioning Profile** section. Otherwise, click
    the button labelled `New App ID`.


    ![images](images/0723.jpg)


    **Figure 7–23.** *App IDs page of the iOS Provisioning Portal page*


    The Manage pane should refresh to display a form to enter your application information
    (see [Figure 7–24](#Chapter07.html#fig_7_24)). The `Description` field is a simple
    name to identify your application. (Note that `App IDs` never go away! Make sure
    the name is unique!) Enter `SuperCheckout`. The `Bundle Seed ID` (`App ID Prefix`)
    is a unique ten-character sequence. Leave this selection at `Use Team ID`. The
    `Bundle Identifier` (`App ID Suffix`) is a unique identifier for your application.
    The convention is to use reverse-DNS style name. Use the value `com.whilethis.SuperCheckout`.
    Click `Submit`.


    ![images](images/0724.jpg)


    **Figure 7–24.** *New App ID form*


    Once completed, you should be returned to the `App IDs` page, Manage tab. The
    new `App ID` should be present at the bottom of the page (see [Figure 7–25](#Chapter07.html#fig_7_25)).


    ![images](images/0725.jpg)


    **Figure 7–25.** *The new App ID entry*


    Almost there. Now, we need to create an ad hoc distribution provisioning profile.


    ### Ad Hoc Distribution Provisioning Profile


    From the iOS Provisioning Portal menu, click `Provisioning`. Once on the Provisioning
    page, choose the `Distribution` tab (see [Figure 7–26](#Chapter07.html#fig_7_26)).
    Click the `New Profile` button.


    ![images](images/0726.jpg)


    **Figure 7–26.** *Distribution tab of the Provisioning page*


    The Distribution pane should refresh to display a form (see [Figure 7–27](#Chapter07.html#fig_7_27)).
    First, for the `Distribution` label, select the `Ad Hoc` radio button. The `Profile
    Name` field is for you to enter descriptive text. We''ll use `SuperCheckout AdHoc
    Provisioning Profile`. The iOS Provisioning Portal should have automatically selected
    the `Distribution Certificate` we created earlier. For the `App ID`, select the
    `SuperCheckout ID` we created previously. Finally, select the devices you want
    the application to be able to run on. This should be the list of devices of your
    beta testers. Once you''ve selected all the devices, click `Submit`.


    ![images](images/0727.jpg)


    **Figure 7–27.** *New distribution provisioning profile entry*


    Once submitted, the Distribution pane should refresh, listing the new ad hoc distribution
    provisioning profile. Its status should read `Pending` (see [Figure 7–28](#Chapter07.html#fig_7_28)).
    Wait a few moments, and click the `Distribution` tab to refresh the view. The
    status should change to `Active` (see [Figure 7–29](#Chapter07.html#fig_7_29)).


    ![images](images/0728.jpg)


    **Figure 7–28.** *Ad hoc distribution provisioning profile pending activation*


    ![images](images/0729.jpg)


    **Figure 7–29.** *Ad hoc distribution provisioning profile active*


    Click the `Download` button for your new provisioning profile. This should download
    a file named `SuperCheckout_AdHoc_Provisioning_Profile.mobileprovision` onto your
    computer. Make a note of where the file is, as we''ll need it soon.


    We''ve gone through quite a few steps to create the ad hoc distribution provisioning
    profile (the `.mobileprofile` file we just downloaded). Now, let''s build the
    beta version of Super Checkout, so we can distribute it to our beta testers.


    ### Building the Beta


    If it''s not already open, open the Super Checkout project in Xcode. The first
    thing we want to do is install the new provisioning profile we just created. Open
    the Finder, and navigate to where the file `SuperCheckout_AdHoc_Provisioning_Profile.mobileprovision`
    was downloaded. Drag the file to the Xcode icon on the Dock. If you''ve done it
    right, the Xcode Organizer window should open, and the provisioning profile should
    be listed (see [Figure 7–30](#Chapter07.html#fig_7_30)).


    ![images](images/0730.jpg)


    **Figure 7–30.** *The new provisioning profile, installed*


    Return to the Super Checkout project window. Click the project name at the top
    of the Navigation pane, so that we enter the project editor view. Select the target
    `Super Checkout` in the project editor view, and select the `Build Settings` tab.
    Make sure you expose all build settings by selecting the `All` button in the row
    below the `Build Settings` tab. Scroll down until you find the `Code Signing`
    section. Find the row labelled `Code Signing Identity`, and expand it. Under the
    `Release` field, change the value to be the distribution profile, under the heading
    `SuperCheckout_AdHoc_Provisioning_Profile` (see [Figure 7–31](#Chapter07.html#fig_7_31)).
    Do the same for the row labeled `Any iOS SDK`, under the `Release` row.


    ![images](images/0731.jpg)


    **Figure 7–31.** *Changing the code signing identity for release*


    Now we need to archive our application in order to package it for distribution.
    First, select `iOS Device` in the Scheme pop-up menu on the Xcode Toolbar. Then
    select **Project** ![images](images/U001.jpg) **Archive**. While the application
    is building, a window may pop up stating “`codesign` wants to sign using key “XXX”
    in your keychain” (see [Figure 7–32](#Chapter07.html#fig_7_32)). Click `Allow`.
    This window may appear again. If so, just click `Allow`. `codesign` is an application
    that packages Super Checkout (or any other application) with the distribution
    certificate and provisioning profile.


    ![images](images/0732.jpg)


    **Figure 7–32.** *`codesign` asking for permission to access your keychain*


    Once your application is compiled, signed and archived, Xcode should open the
    Organizer window, displaying the Archive view (see [Figure 7–33](#Chapter07.html#fig_7_33)).
    The new Super Checkout archive should be listed. Select the `Super Checkout`,
    and click the `Share` button on the right side of the upper pane. Xcode will present
    a pane asking how you want to share the archive (see [Figure 7–34](#Chapter07.html#fig_7_34)).


    ![images](images/0733.jpg)


    **Figure 7–33.** *Xcode Organizer window, Archive view*


    ![images](images/0734.jpg)


    **Figure 7–34.** *Sharing configuration pane*


    Select the `iOS App Store Package (.ipa)` radio button for the `Contents`. And
    select the appropriate distribution profile for `Identity`. The distribution profile
    should match the one you configured in Xcode for the `Code Signing Identity`.
    You may be asked about allowing `codesign` access to your keychain. As before,
    just click `Allow`. Finally, you will be presented with a file dialog to save
    the file `app.ipa`. Choose a location, and save the file as `SuperCheckout.ipa`.'
  raw: '###### Confirmation


    Once you have entered or uploaded the information for the device(s), you should
    be returned to the Devices page, under the Manage tab. To confirm your devices
    have been added, scroll to the bottom of the page. There you should see a list
    of all the devices you have information for.


    ##### Creating Our App ID


    Now, we need to create an entry for our application in the provisioning portal.
    This information will be used to when we build our application for distribution
    among our beta testers.


    On the iOS Provisioning Portal menu, click App IDs. Like the Devices page, the
    Manage tab should be selected (see [Figure 7–23](#Chapter07.html#fig_7_23)). Since
    this is your first application, there should be no App IDs listed at the bottom
    of the page. If the SuperCheckout application is listed, you can skip ahead to
    the **Ad Hoc Distribution Provisioning Profile** section. Otherwise, click the
    button labelled New App ID.


    ![images](images/0723.jpg)


    **Figure 7–23.** *App IDs page of the iOS Provisioning Portal page*


    The Manage pane should refresh to display a form to enter your application information
    (see [Figure 7–24](#Chapter07.html#fig_7_24)). The Description field is a simple
    name to identify your application. (Note that App IDs never go away! Make sure
    the name is unique!) Enter **SuperCheckout**. The Bundle Seed ID (App ID Prefix)
    is a unique ten-character sequence. Leave this selection at Use Team ID. The Bundle
    Identifier (App ID Suffix)is a unique identifier for your application. The convention
    is to use reverse-DNS style name. Use the value `com.whilethis.SuperCheckout`.
    Click Submit.


    ![images](images/0724.jpg)


    **Figure 7–24.** *New App ID form*


    Once completed, you should be returned to the App IDs page, Manage tab. The new
    App ID should be present at the bottom of the page (see [Figure 7–25](#Chapter07.html#fig_7_25)).


    ![images](images/0725.jpg)


    **Figure 7–25.** *The new App ID entry*


    Almost there. Now, we need to create an ad hoc distribution provisioning profile.


    ##### Ad Hoc Distribution Provisioning Profile


    From the iOS Provisioning Portal menu, click Provisioning. Once on the Provisioning
    page, choose the Distribution tab (see [Figure 7–26](#Chapter07.html#fig_7_26)).
    Click the New Profile button.


    ![images](images/0726.jpg)


    **Figure 7–26.** *Distribution tab of the Provisioning page*


    The Distribution pane should refresh to display a form (see [Figure 7–27](#Chapter07.html#fig_7_27)).
    First, for the Distribution label, select the Ad Hoc radio button. The Profile
    Name field is for you to enter descriptive text. We''ll use SuperCheckout AdHoc
    Provisioning Profile. The iOS Provisioning Portal should have automatically selected
    the Distribution Certificate we created earlier. For the App ID, select the SuperCheckout
    ID we created previously. Finally, select the devices you want the application
    to be able to run on. This should be the list of devices of your beta testers.
    Once you''ve selected all the devices, click Submit.


    ![images](images/0727.jpg)


    **Figure 7–27.** *New distribution provisioning profile entry*


    Once submitted, the Distribution pane should refresh, listing the new ad hoc distribution
    provisioning profile. Its status should read Pending (see [Figure 7–28](#Chapter07.html#fig_7_28)).
    Wait a few moments, and click the Distribution tab to refresh the view. The status
    should change to Active(see [Figure 7–29](#Chapter07.html#fig_7_29)).


    ![images](images/0728.jpg)


    **Figure 7–28.** *Ad hoc distribution provisioning profile pending activation*


    ![images](images/0729.jpg)


    **Figure 7–29.** *Ad hoc distribution provisioning profile active*


    Click the Download button for your new provisioning profile. This should download
    a file named `SuperCheckout_AdHoc_Provisioning_Profile.mobileprovision` onto your
    computer. Make a note of where the file is, as we''ll need it soon.


    We''ve gone through quite a few steps to create the ad hoc distribution provisioning
    profile (the `.mobileprofile` file we just downloaded). Now, let''s build the
    beta version of Super Checkout, so we can distribute it to our beta testers.


    ##### Building the Beta


