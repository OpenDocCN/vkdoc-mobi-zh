  \ retain];`\n`    }`\n`    if(!apiEngine) {`\n`        apiEngine = [[SuperCheckoutAPIEngine\
  \ alloc] initWithDelegate:self];`\n`    }`\n\n`    [apiEngine getProducts];`\n`}`\n\
  \n`- (void)viewDidUnload{`\n`    [self setProductCell:nil];`\n`    [super viewDidUnload];`\n\
  `    // 释放主视图的任何保留子视图`\n`    // 例如：self.myOutlet = nil;`\n`}`\n\n`- (BOOL)shouldAutorotateToInterfaceOrientation:`\n\
  \n`(UIInterfaceOrientation)interfaceOrientation{`\n`    // 返回 YES 表示支持的朝向`\n`  \
  \  return (interfaceOrientation == UIInterfaceOrientationPortrait);`\n`}`\n`@end`\n\
  \n代码量不小，是吧？通过这次重大更新，我们创建了一个新的模型对象，让 API 引擎返回这些新模型对象的列表，并更新了产品列表来处理这些新对象。性能优化部分是在\
  \ `Super_CheckoutViewController.m` 中完成的。让我们花点时间仔细看看我们做了什么，然后再看看它对比上一次运行的表现如何。\n\n\
  在 `tableView:cellForRowAtIndexPath:` 中，我们对其进行了更新以使用产品模型，但性能提升的关键在这里：\n\n```\n  \
  \ if([item productImage] == nil) {\n        if (self.tableView.dragging == NO &&\
  \ self.tableView.decelerating == NO) {\n            NSString *requestId = [apiEngine\
  \ getImageForProduct:[item thumb]];\n            [imageIndexes setObject:[NSNumber\
  \ numberWithInt:[indexPath row]]\nforKey:requestId];\n        }\n    } else {\n\
  \        [cell.productImage setImage:[item productImage]];\n    }\n```\n\n在这里，我们检查图片是否已下载。之前，每次请求单元格时我们都会下载新的图片。现在，我们要减少请求图片的次数，从而降低问题方法被调用的次数。同时，我们通过检测表格视图是否在滚动且未减速，来减少图片加载的次数。基本上，我们只在表格静止且请求单元格时才加载图片。\n\
  \n那么，当表格动画中或停止后怎么办？问得好！我们更新了 `Super_CheckoutViewController` 以遵循 `UIScrollViewDelegate`\
  \ 协议，并添加了这些方法：\n\n```\n- (void)scrollViewDidEndDragging:(UIScrollView *)scrollView\n\
  \                                       willDecelerate:(BOOL)decelerate {\n    if\
  \ (!decelerate) {\n        [self loadImagesForOnscreenRows];\n    }\n}\n\n- (void)scrollViewDidEndDecelerating:(UIScrollView\
  \ *)scrollView {\n    [self loadImagesForOnscreenRows];\n}\n```\n\n这些方法会告诉我们表格视图何时停止滚动以及何时停止减速。当这些情况发生时，我们就会加载屏幕行的图片。这会将请求次数减少到屏幕上静止产品的数量。\n\
  \n既然我们已经了解了潜在的修复方法，那就来看看它在 Instruments 中的表现如何吧。我在与上次运行相同的会话中运行了新版本，以展示图表上的差异。图 5–11\
  \ 显示了对比结果，在图片加载到内存后，我们就能看出区别。不过，我们仍然可以看到 `imageReceived:forRequest:` 占用了相当多的处理能力。或许，调整尺寸的代码对我们来说有点过重了。\n\
  \n![images](img/0511.jpg)\n\n**图 5–11.** *图片加载后，情况看起来好了很多。*\n\n但我对它的表现仍不满意，所以我们移除图片尺寸调整的代码。将\
  \ `Super_CheckoutViewController` 中的 `imageReceived:forRequest:` 方法更新为如下所示：\n\n```\n\
  -(void) imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier\
  \ {\n    Product *prod = (Product *)[inventory objectAtIndex:[[imageIndexes\n\n\
  objectForKey:connectionIdentifier] intValue]];\n    [prod setProductImage:image];\n\
  \    [imageIndexes removeObjectForKey:connectionIdentifier];\n}\n```\n\n现在，我们来对比一下移除尺寸调整后的表现。我在同一个\
  \ Instruments 会话中运行了两次，以便进行对比（参见图 5–12）。正如你所见，移除尺寸调整的代码并没有真正改变图表，但我们确实移除了表现不佳的代码。问题在于，滚动表现仍然不尽如人意。\n\
  \n![images](img/0512.jpg)\n\n**图 5–12.** *成功移除了一些表现不佳的代码，但滚动仍然卡顿*\n\n### 告别卡顿滚动\n\
  \n我们已经用尽了 Time Profiler 能提供的信息，是时候拿出杀手锏了。我们要开始测量帧率，并根据 Core Animation 的性能表现来看看遇到了哪些瓶颈。在开始使用\
  \ Core Animation 工具之前，我们先花点时间聊聊渲染在 iOS 中是如何发生的。\n\n\n#### Core Graphics 简介\n\n每个\
  \ `UIView` 子类都具备绘制自身并控制其布局的机制。这些方法由 Cocoa Touch 按需调用，通常是在调用 `setNeedsDisplay` 或\
  \ `setNeedsLayout` 之后触发。由于我们有这些方法，`drawRect:` 和 `layoutSubviews` 永远不应被直接调用。如果你想触发\
  \ `drawRect:`，请调用 `setNeedsDisplay`，Cocoa 会决定调用 `drawRect:` 的最佳时机。`setNeedsLayout`\
  \ 和 `layoutSubviews` 也是如此。这确保了所有视图更新能够一次性完成，并且渲染会在 Cocoa 最方便的时间进行调度，以便高效绘制相关视图。\n\
  \n那么，在你调度视图渲染之后会发生什么呢？如果你查看图 5–13，就能很好地了解 Cocoa 渲染视图时发生的事情。这一过程会应用到应用中的每一个 `UIView`，而这种一致性在后续会变得非常重要。\n\
  \n![图片说明](img/0513.jpg)\n\n**图 5–13.** *视图绘制周期概览*\n\n现在基础知识已经覆盖，让我们深入探究幕后发生的事情。每个渲染视图的核心元素是该视图的\
  \ `layer` 属性。这是由 Core Animation 渲染的图层。Core Animation 位于 iOS 架构的媒体层，直接位于 UIKit 所在的\
  \ Cocoa Touch 层下方（参见图 5–14）。Core Animation 是 Core Graphics 框架的一部分。Core Graphics\
  \ 也被称为 Quartz 2D，在绘图方面承担了所有繁重的工作。\n\n![图片说明](img/0514.jpg)\n\n**图 5–14.** *这是 iOS\
  \ 的基本架构，其中媒体层被突出显示；媒体层是我们大部分时间要关注的地方。*\n\nCore Graphics 的职责是渲染应用的整个屏幕。它还负责在不同视图之间进行过渡动画。这类动画的一个典型例子是将视图控制器推入\
  \ `UINavigationController` 的视图栈。`UIScrollView` 实例也使用 Core Graphics 来动画化用户与之交互时视图的滚动。`UITableView`\
  \ 是一个 `UIScrollView`，因此当用户上下滚动时，它需要动画化所有表格单元格。\n\n#### 回到 Instruments\n\n现在，Super\
  \ Checkout 登场了。我们正在调优的视图是一个表格视图，我们的单元格可能因其设计方式而导致一些性能问题。为了诊断这个问题，我们需要使用 Core Animation\
  \ 工具对 Super Checkout 进行分析。\n\n![图片说明](img/0515.jpg)\n\n**图 5–15.** *Core Animation\
  \ 工具*\n\nCore Animation 工具为我们提供了一个模板，用于查看每秒渲染帧数的原始测量值以及 CPU 使用率图表。该工具还允许我们修改应用的渲染方式，从而获得关于\
  \ Core Graphics 如何实际渲染每个视图的线索。图 5–16 展示了你可以开启哪些选项；每个选项都有其特定用途。我们目前只关心如何查看图层的混合方式。\n\
  \n![图片说明](img/0516.jpg)\n\n**图 5–16.** *用于深入了解 Core Graphics 如何渲染应用的调试选项*\n\n继续使用\
  \ Core Animation 工具对应用进行分析。在 Instruments 启动且应用运行后，在调试选项中开启“颜色混合图层”（Color Blended\
  \ Layers）。如果你看不到这些选项，请点击 Core Animation 工具的图表，即可激活它们。当你开启混合图层后，屏幕会看起来非常怪异。查看图 5–17，我们将讨论这些信息告诉了我们什么。\n\
  \n在图 5–17 中，我们看到的是 Core Graphics 如何查看我们的应用。还记得我之前提到合成器（compositor）之后会很重要吗？这就是我指的部分。这个视图向我们展示了\
  \ Core Graphics 如何绘制以及它需要进行何种合成。\n\n**注意：** 合成是一种将分层片段相互叠加的复杂方式。有一些非常精妙的算法用于合成多个图层并创建单个图像。幸运的是，Core\
  \ Graphics 背后的工程师已经为我们完成了所有繁重的工作，因此我们不必操心渲染每一个屏幕。\n\n![图片说明](img/0517.jpg)\n\n**图\
  \ 5–17.** *混合图层视图让我们得以一窥 Core Graphics 如何渲染每个屏幕。*\n\n再看一次图 5–16。每一种不同的色调代表一个独立的图层。实际上，每当创建一个新的\
  \ `UIView`（或 `UIView` 的子类）时，都会创建一个新的图层。这些图层属于 `CALayer` 类型，实际上是视图绘制于其上的介质。然后这些图层被合成，形成最终在屏幕上渲染的图像。\n\
  \n合成代价高昂，因此这可能成为性能瓶颈。查看每个单元格中的每个 `UILabel`。有相当多的空白区域需要渲染。如果视图被标记为不透明（opaque），合成器就不必计算不透明视图下方的视图在加上其上层任何内容后的样子。想象一下，在一个图像上方有三个或四个具有不同\
  \ alpha 值的视图。合成器需要加班加点才能渲染出视图。如果再加上动画，结果看起来就会很不流畅，因为合成器需要花更长时间来渲染每一中间帧。\n\n然而，有一个好方法可以解决这个问题。与其在我们的表格单元格中管理众多子视图，我们可以直接将内容绘制到视图本身中，只渲染一个图层。图\
  \ 5–18 展示了开启混合图层后，这种方案的效果。\n\n![图片说明](img/0518.jpg)\n\n**图 5–18.** *我们新设计的、仅有一个混合图层的单元格*\n\
  \n\n\n### 优化单元格绘制以使用单层绘制\n\n为了更新我们的单元格使其在一个图层上绘制，我们将使用 Loren Brichter 在 Tweetie\
  \ for iPhone 和 Twitter for iPhone 上使用的相同技术。该技术涉及创建一个覆盖整个单元格的不透明`UIView`，并在该视图的子类中创建绘制方法。为此，我们需要创建一个名为`SuperFastCell`的新`UITableViewCell`子类。请创建一个新的`UITableViewCell`子类，并将其命名为`SuperFastCell`。\n\
  \n打开`SuperFastCell.h`，将其修改为如下内容：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface SuperFastCell\
  \ : UITableViewCell {\n    UIView *contentView;\n}\n\n-(void) drawCellView:(CGRect)rect;\n\
  @end\n```\n\n现在，打开`SuperFastCell.m`，并将其修改为如下内容：\n\n```\n#import \"SuperFastCell.h\"\
  \n\n@class SuperFastCell;\n@interface SuperFastCellView : UIView\n@end\n\n@implementation\
  \ SuperFastCellView\n\n- (void)drawRect:(CGRect)r {\n        [(SuperFastCell *)[self\
  \ superview] drawCellView:r];\n}\n\n@end\n\n@implementation SuperFastCell\n\n- (id)initWithStyle:(UITableViewCellStyle)style\n\
  \       reuseIdentifier:(NSString *)reuseIdentifier {\n    self = [super initWithStyle:style\
  \ reuseIdentifier:reuseIdentifier];\n    if (self) {\n        contentView = [[SuperFastCellView\
  \ alloc] initWithFrame:CGRectZero];\n        contentView.opaque = YES;\n       \
  \ contentView.backgroundColor = [UIColor whiteColor];\n        [self addSubview:contentView];\n\
  \        [contentView release];\n    }\n    return self;\n}\n\n- (void) setFrame:(CGRect)frame\
  \ {\n    [super setFrame:frame];\n    CGRect myBounds = [self bounds];\n    myBounds.size.height\
  \ -= 1;\n    [contentView setFrame:myBounds];\n}\n\n- (void) setNeedsDisplay {\n\
  \    [super setNeedsDisplay];\n    [contentView setNeedsDisplay];\n}\n\n-(void)\
  \ drawCellView:(CGRect)rect {\n    //子类将实现此方法\n}\n\n- (void)dealloc {\n    [super\
  \ dealloc];\n}\n\n@end\n```\n\n现在我们已经定义了基类，需要更新`ProductCell`类以使用这种新技术。打开`ProductCell.h`，并将其修改为如下内容：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"SuperFastCell.h\"\n@class Product;\n\n\
  @interface ProductCell : SuperFastCell {\n}\n+(NSString *) reuseIdentifier;\n\n\
  @property (nonatomic, retain) Product *productInformation;\n\n@end\n```\n\n现在，打开`ProductCell.m`，并将其修改为如下内容：\n\
  \n```\n#import \"ProductCell.h\"\n#import \"Product.h\"\n\n@implementation ProductCell\n\
  @synthesize productInformation;\n\n+(NSString *)reuseIdentifier {\n    return @\"\
  ProductCell\";\n}\n\n-(NSString *)reuseIdentifier {\n    return [[self class] reuseIdentifier];\n\
  }\n\n- (id)initWithStyle:(UITableViewCellStyle)style\n       reuseIdentifier:(NSString\
  \ *)reuseIdentifier\n{\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
  \    if (self) {\n        // 初始化代码\n    }\n    return self;\n}\n\n-(void) setProductInformation:(Product\
  \ *)newProductInformation {\n    Product *oldInfo = productInformation;\n    [oldInfo\
  \ removeObserver:self forKeyPath:@\"productImage\"];\n\n    productInformation =\
  \ [newProductInformation retain];\n    [productInformation addObserver:self\n  \
  \                       forKeyPath:@\"productImage\"\n                         \
  \   options:NSKeyValueObservingOptionNew\n                            context:NULL];\n\
  \n    [oldInfo release];\n\n    [self setNeedsDisplay];\n}\n\n- (void)setHighlighted:(BOOL)lit\
  \ {\n    // 如果高亮状态改变，则需要重绘。\n    if([self isHighlighted] != lit) {\n        [super\
  \ setHighlighted:lit];\n        [self setNeedsDisplay];\n    }\n}\n\n-(void) drawCellView:(CGRect)rect\
  \ {\n    UIFont *font = [UIFont fontWithName:@\"Helvetica\" size:17.0];\n    CGContextRef\
  \ context = UIGraphicsGetCurrentContext();\n    CGContextSaveGState(context);\n\n\
  \    CGImageRef prodImage = [[productInformation productImage] CGImage];\n    CGContextDrawImage(context,\
  \ CGRectMake(12, 6, 64, 64), prodImage);\n    //86, 6\n    //Helvetica 17 黑色\n \
  \   CGSize textSize;\n    textSize = [[productInformation name] sizeWithFont:font];\n\
  \n    if([self isHighlighted]) {\n        CGContextSetStrokeColorWithColor(context,\
  \ [[UIColor whiteColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
  \ [[UIColor whiteColor] CGColor]);\n    } else {\n        CGContextSetStrokeColorWithColor(context,\
  \ [[UIColor blackColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
  \ [[UIColor blackColor] CGColor]);\n    }\n\n    [[productInformation name] drawInRect:CGRectMake(86,\
  \ 6, textSize.width,\ntextSize.height)\n                                  withFont:font];\n\
  \n    //Helvetica 17 浅灰色\n    NSString *priceString = [NSString stringWithFormat:@\"\
  $%1.2f\",\n\n[[productInformation price] floatValue]];\n    textSize = [priceString\
  \ sizeWithFont:font];\n\n    if([self isHighlighted]) {\n        CGContextSetStrokeColorWithColor(context,\
  \ [[UIColor whiteColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
  \ [[UIColor whiteColor] CGColor]);\n    } else {\n        CGContextSetStrokeColorWithColor(context,\
  \ [[UIColor lightGrayColor] CGColor]);\n        CGContextSetFillColorWithColor(context,\
  \ [[UIColor lightGrayColor] CGColor]);\n    }\n    [priceString drawInRect:CGRectMake(86,\
  \ 35, textSize.width, textSize.height)\n                 withFont:font];\n    CGContextRestoreGState(context);\n\
  }\n\n- (void)observeValueForKeyPath:(NSString *)keyPath\n                      ofObject:(id)object\n\
  \                        change:(NSDictionary *)change\n                       context:(void\
  \ *)context {\n    if ([keyPath isEqual:@\"productImage\"]) {\n        [self setNeedsDisplay];\n\
  \    }\n}\n\n- (void)dealloc {\n    [super dealloc];\n}\n\n@end\n```\n\n在运行应用程序之前，需要注意这些自定义单元格的一个重要事项：需要处理高亮和选中状态。由于我们直接在显示的视图上绘制文本，因此无法获得`UILabel`中的优势。这是我们在视图中进行自定义绘制所付出的代价。\n\
  \n现在，使用 Core Animation 对应用程序进行分析，并启用混合图层选项。不再有多个图层视图让合成器超负荷工作。上下滚动并查看帧率。由于我们结合了从基本图像缓存到减少系统在动画中所需合成的数量等一系列性能改进，帧率持续提升。Figure\
  \ 5–19 展示了在调试这些视图时，使用不同版本的 Super Checkout 在 Core Animation 工具上的几次运行结果。差异不大，但请注意，最上面的运行表现最佳。\n\
  \n![images](img/0519.jpg)\n\n**Figure 5–19.** *Super Checkout 在 Core Animation 工具上的不同运行结果*\n\
  \n**注意：** 我们使用的表格单元格本应通过内置单元格类型创建。唯一仍需实现的是加载图像并将其缩小以适配单元格图像视图的代码。然而，对于任何无法通过使用 Apple\
  \ 在 UIKit 中提供的单元格来完成的复杂单元格来说，这种技术是完美的。\n\n\n\n### 向苹果学习\n\n苹果公司的工程师们为我们揭示了他们的应用为何能如此流畅运行的线索。这些工程师对框架的运作方式了如指掌，因此让我们使用“混合图层调试”选项来观察主屏幕和一款内置应用，看看苹果是如何设计其应用的。\n\
  \n我们来看看 iOS 自带的“股票”应用（见图 5–20）。如前所述，图层合成开销很大，而最耗性能的部分是绘制透明视图。那么，如何在自定义视图中实现圆角效果呢？你可以用一张图片作为视图的背景，然后在上面放置透明视图。如果视图不需要动画效果，这完全可行。但如果我们使用整张图片并在其上放置透明视图进行动画处理，那么合成器与\
  \ Core Animation 的结合将会导致动画性能低下。\n\n![images](img/0520.jpg)\n\n**图 5–20.** *开启了“混合图层”的股票应用*\n\
  \n如图 5–20 所示，“股票”应用使用了圆角效果。为了实现这一效果，该应用在每个角落放置了小的圆角图片。由于应用并未使用一整张大图，合成器只需处理每个角落的透明度合成。这种技术让我们能够快速绘制和轻松实现圆角效果。通过贯彻这一思想——保持视图轻量，并在合理之处绘制自定义视图——我们就能创建出外观精美、动画流畅、滚动如飞的应用程序。\n\
  \n我们审视“股票”应用的主要原因，是向苹果学习。开发者们最了解平台，并且有各种妙招让应用看起来丝滑流畅。用户期望达到这种精良程度，而这份对细节的关注，也为我们实现自己的应用设定了很高的标准。\n\
  \n### 本章小结\n\n本章我们涵盖了许多内容。我们讨论了保持运行循环（Run Loop）持续运行的重要性。我们还讨论了图层合成，以及如何实现设计师交给我们的那些精美设计。遗憾的是，Super\
  \ Checkout 并没有一位真正的设计师来设计它，但得益于 Loren Brichter 提供的方法，我们成功获得了一个极速流畅的表格单元格。\n\n现在，我们的应用渲染速度已经很快了，接下来该做什么呢？我们将研究\
  \ iOS 的网络栈以及我们可以使用的工具来检测与网络相关的异常问题。我们还将讨论缓存和电源管理。下一章将全部围绕 iOS 设备中的无线电模块展开——不需要业余无线电台执照。\n\
  \n"
