  \ 6 章中进一步讨论），因此我们将更改图片的加载方式。在此之前，我们需要更深入地了解 `UITableView` 和 `UIScrollView` 实例的工作原理。因此，在实施修复之前，我们先来谈谈用户滚动表格视图时\
  \ Cocoa Touch 框架做了什么。\n\n### 探究滚动视图的幕后机制\n\n当滚动视图正在滚动时，它会将当前运行循环置于一种特殊模式。这种模式会阻止几乎所有内容的执行，只留下绘制正在移动的滚动视图的相关部分。`NSURLConnection`\
  \ 就是一个很好的例子，它在滚动视图滚动时会被阻塞。当视图滚动时，从已打开的 socket 返回的任何数据都会被排队，直到运行循环从 `UITrackingRunLoopMode`\
  \ 切换到默认模式。\n\n了解这一点将有助于你设计一个解决方案，确保在视图滚动时不会发起请求。理想情况下，当滚动结束时，任何打开的 `NSURLConnection`\
  \ 排队的请求数据都不会涌入应用，并且对委托方法的多次调用可以在同一时间完成。这将需要一个相当大的更新。你准备好了吗？\n\n\n\n### 图片懒加载\n\n\
  以下更新将在滚动停止时触发相应的图片请求。为此，我们需要创建一个实际的模型对象，解析商品列表并保留已下载的图片。新建一个 `NSObject` 子类，命名为 `Product`。\n\
