  \n                    [prod release];\n                }\n\n                [delegate\
  \ productListReceived:[NSArray arrayWithArray:newResult]\n                     \
  \                                 forRequest:identifier];\n            }\n     \
  \       break;\n        case SuperCheckoutCartContents:\n            if([self\n\
  _isValidDelegateForSelector:@selector(cartContentsReceived:forRequest:)]) {\n  \
  \              id cart = [parsedObject objectForKey:@\"result\"];\n            \
  \    if([cart isKindOfClass:[NSNull class]]) {\n                    cart = nil;\n\
  \                }\n                [delegate cartContentsReceived:cart forRequest:identifier];\n\
  \            }\n\n        default:\n            break;\n    }\n}\n```\n\n我们现在已经成功地将网络代码替换为\
  \ `ASIHTTPRequest`。想想看，如果要去所有视图控制器中做这个更新，那会多么麻烦！\n\n让我们看一下刚刚实现的一小段代码。\n\n在**清单 6–5**\
  \ 中，你会看到我们创建了一个 `ASIHTTPRequest`，设置了代理，并添加了一个随请求传递的字典。这个字典包含了请求标识符（以保持与之前 API 的向后兼容性）、请求类型和响应类型。`ASIHTTPRequest`\
  \ 会自动处理 cookie，所以我们无需担心它们。\n\n关于线程方面，`ASIHTTPRequest` 是 `NSOperation` 的子类，`startAsynchronous`\
  \ 方法会将其添加到一个本地的 `NSOperationQueue` 中，该队列会创建新线程，而代理回调则在主线程上执行。这也意味着，如果发现有必要，我们的 `SuperCheckoutAPIEngine`\
  \ 类可以管理自己的 `NSOperationQueue`，以控制同时发生的请求数量。\n\n**清单 6–5.** *创建实际请求的代码*\n\n```\n\
  \   ASIHTTPRequest *request = [ASIHTTPRequest requestWithURL:theURL];\n    [request\
  \ setDelegate:self];\n    NSString *requestIdentifier = [NSString stringWithNewUUID];\n\
  \    [request setUserInfo:[NSDictionary dictionaryWithObjectsAndKeys:\n        \
  \                  [NSNumber numberWithInt:requestType], REQUEST_TYPE,\n       \
  \                   [NSNumber numberWithInt:responseType], RESPONSE_TYPE,\n    \
  \                      requestIdentifier, REQUEST_ID,\n                        \
  \  nil]];\n\n    if (request == nil) {\n        return nil;\n    }\n\n    if ([self\
  \ _isValidDelegateForSelector:@selector(connectionStarted:)])\n                [delegate\
  \ connectionStarted:[[request requestID] stringValue]];\n\n    [request startAsynchronous];\n\
  \    return requestIdentifier;\n```\n\n提交这些更改，然后我们将继续设计和调试服务端代码。\n\n在编写这段代码时，`ASIHTTPRequest`\
  \ 得到了良好的支持，但此后支持已经停止。由于我们将应用程序架构设计为具有清晰的责任分离，我们可以随意替换这些组件，而消费代码几乎无需更改。还有一些其他流行的网络库，并且我们刚刚实现的概念对于这些库来说都是相同的。这些库包括：\n\
  \n*   AFNetworking ([`https://github.com/gowalla/AFNetworking`](https://github.com/gowalla/AFNetworking))\n\
  *   LRResty ([`http://projects.lukeredpath.co.uk/resty/`](http://projects.lukeredpath.co.uk/resty/))\n\
  *   NSURLConnection（原始方法，且得到 Apple 的良好支持）\n\n### 探索服务器 API\n\n对于 Super Checkout，我们创建了自己的服务端\
  \ API。本书并非关于开发服务端 API，而是讨论设计服务端 API 时的一些良好实践，以便在使用这些服务时更轻松。我们还会介绍一些定位 bug 根源的技巧。\n\
  \n\n\n### 为消费而设计\n\n设计服务端 API 与设计 iOS 应用完全不同，需要考虑更多因素，其中对消费者的关怀是核心。对于 Super Checkout，我们决定采用一个非常简洁的\
  \ API，它依赖 `GET` 请求和查询字符串参数。通信介质采用轻量级的 JSON。服务器管理着会话和当前购物车。\n\n就数据模型而言，服务器始终返回一个包装对象。图\
  \ 6-10 展示了这个包装对象的样子。\n\n![images](img/0610.jpg)\n\n**图 6-10.** *响应包装器的定义*\n\n这个对象提供了我们了解响应所需的一切信息。如果调用成功（即\
  \ HTTP 状态码为 200）但数据存在问题，我们也能知道发生了什么。如果你留意到，Super Checkout 假定每次调用都是成功的。这是应用程序的一个问题，日后可能会给我们带来麻烦。\n\
  \n那么，我们如何处理这些错误呢？让我们回到代码中一探究竟。\n\n打开 `SuperCheckoutAPIEngine.m`，找到 `parsingSucceededForRequest:ofResponseType:parsedObjects:`\
  \ 方法的实现。这个方法是解析器的回调。由于所有响应都具有相同的包装器，我们将在此处处理错误。\n\n首先，我们需要添加一些错误常量和一个错误域，用于稍后创建的\
  \ `NSError` 对象。在文件顶部，编译器宏定义下方，添加以下代码：\n\n```\nNSString* const APIErrorDomain = @\"\
  SuperCheckoutAPIErrorDomain\";\n```\n\n```\ntypedef enum SuperCheckoutAPIErrorType\
  \ {\n    APIErrorType\n} SuperCheckoutAPIErrorType;\n```\n\n现在，回到 `parsingSucceededForRequest:ofResponseType:parsedObjects:`\
  \ 方法，在 `switch` 语句上方添加以下代码：\n\n```\nif([[parsedObject objectForKey:@\"status\"]\
  \ intValue] != 0) {\n    NSError *error = [NSError errorWithDomain:APIErrorDomain\n\
  \                                        code:APIErrorType\n                   \
  \                 userInfo:\n                        [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \                        [parsedObject objectForKey:@\"message\"],\n           \
  \             NSLocalizedDescriptionKey,nil]];\n\n    if ([self _isValidDelegateForSelector:@selector(requestFailed:withError:)]){\n\
  \        [delegate requestFailed:identifier withError:error];\n    }\n\n    return;\n\
  }\n```\n\n现在我们已经处理了错误，将错误连同（希望是）服务器返回的有意义消息一起发送给视图控制器。\n\n### 使用调试工具\n\n许多次在开发消费服务的客户端引擎时，服务器返回的数据并非我所预期。我没有在源码中到处添加\
  \ `NSLog` 语句，而是使用了一些便捷工具来验证发送给服务器的内容和返回的内容。当服务端组件正在开发而客户端代码行为异常时，这些工具极大地加速了调试过程。\n\
  \n两个不同的工具分别用于完成不同的任务。第一个工具用于测试服务的输入和输出，以检查服务是否正常工作。它叫做 RESTClient，是 Firefox 的一个插件。可以在\
  \ [`addons.mozilla.org/en-US/firefox/addon/restclient/`](https://addons.mozilla.org/en-US/firefox/addon/restclient/)\
  \ 找到它。图 6-11 展示了在访问 Super Checkout 的主要服务之一后该客户端的视图。\n\n![images](img/0611.jpg)\n\
  \n**图 6-11.** *适用于 Firefox 的 RESTClient 是检查服务响应的优秀工具*\n\n如图 6-11 所示，界面相当简单。它允许你选择请求方法、输入基础\
  \ URL、填入请求头以及添加请求体。点击“发送”，请求便会被发出，并返回响应头和响应体。响应体右侧的标签会根据请求类型进行调整。在图 6-11 的示例中，RESTClient\
  \ 格式化了服务返回的 JSON 字符串。\n\n当你只需要一个快速工具来检查请求响应或调试服务器问题时，这是一个很棒的工具。另外一些运行在命令行中的强大工具虽然更强大，但此工具足以完成任务。关键在于找到一个可靠、快捷的工具，能够快速测试最终服务，确保在你排查问题或测试应用的服务器组件时，服务能按预期工作。\n\
  \n第二个工具无疑是两者中更强大的，它应当在每个开发者的工具箱中占有一席之地。这个应用程序叫做 Charles，是一个 Web 代理。可以在 [`www.charlesproxy.com/`](http://www.charlesproxy.com/)\
  \ 找到它。Charles 是一款商业应用，但提供免费试用。这个应用程序会监控你机器上的所有 Web 流量（在开启录制器时）并记录日志。图 6-12 展示了 Charles\
  \ 记录获取产品、将产品添加到购物车以及结账时的流量。\n\n![images](img/0612.jpg)\n\n**图 6-12.** *Charles 执行其流量记录功能*\n\
  \nCharles 能提供关于请求和响应的更多信息。它提供的信息量与 RESTClient 相同，但这些请求来自应用程序本身。这些信息可用于查看从设备发出的请求的格式是否正确，并确保响应的格式也正确无误。\n\
  \n**注意：** Charles 不会作为设备的代理。任何需要运行的测试都必须通过 iOS 模拟器运行。\n\n#### 使用网络链路调节器模拟慢速网络\n\n\
  在模拟器中进行测试时，通常使用的是一条相当大且大部分时间都可靠的网络连接。但问题在于，设备实际通信的网络通常速度较慢且极不可靠。在洁净的开发环境中复现真实场景是一项相当棘手的任务。幸运的是，开发者已经解决了这个问题。\n\
  \n用于限制带宽的工具叫做网络链路调节器，它随 Xcode 4.2 for OS 10.7 (Lion) 一起提供。其偏好设置面板可以在 `/Developer/Applications/Utilities/Network\\\
  \ Link\\ Conditioner` 中找到。打开它，它会自动安装到系统偏好设置中。网络链路调节器是一个偏好设置面板，允许你设置要限制的端口、要限制的主机、延迟以及限速上限。限制速度的预设值包括\
  \ Edge 和 3G 的常见速度。图 6-13 展示了网络链路调节器正在对我们的服务进行限速。\n\n![images](img/0613.jpg)\n\n\
  **图 6-13.** *系统偏好设置中的网络链路需要解锁并启用。*\n\n鉴于本章全部内容都与网络相关，并且大多数用户设备的数据套餐已不再无限量，使用模拟器进行测试就显得非常合理。通过\
  \ Speedlimit，我们可以很好地了解应用程序在实际环境中的性能表现。这对于执行大量请求的应用程序至关重要。理解应用程序在网络状况不佳时的表现，将有助于我们在缓存策略方面做出决策。\n\
  \n要开启链路调节器，首先需要点击偏好设置面板底部的锁图标解锁钥匙串。然后选择要模拟的适当配置文件，并将开关拨到“开”的位置。这将降低整个机器的网络速度，因此如果你正在其他应用中执行网络操作，你会看到网络性能下降。\n\
  \n\n\n\n#### 控制缓存\n\n要让应用在慢速网络环境中表现出高性能，最好的方式是什么？那就是存储请求的响应结果。**缓存**。缓存之所以强大，是因为应用能快速获取所需数据，用户无需等待。既然缓存这么棒，为什么我们不把所有内容都缓存起来呢？第一个原因是互联网上大部分数据都是**实时**的。如果所有内容都被缓存，应用将严重滞后于最新信息，用户将被迫频繁刷新。\n\
  \n面对这种矛盾，你可能在想：“缓存方案的最佳方法是什么？”\n\n问得好！答案相当复杂。正如我之前提到的，缓存方法一直是学术论文的研究重点。我们不会深入探讨缓存算法的工作原理或哪种情况最适合使用哪种算法——那将是另一本书的内容。相反，我们将了解如何在\
  \ Cocoa 或其他框架中使用什么工具，来为 Super Checkout 实现合适的缓存级别，并希望以此为你应用的缓存方案开个好头。\n\n##### 开始之前\n\
  \n在深入代码之前，我们先花点时间讨论一下缓存的本质，以及什么样的数据适合缓存。在我们讨论的缓存语境中，缓存是一个能极大提高数据检索速度的临时存储。其核心理念是尽可能多地将信息存储在本地，只在需要时才从服务器获取。\n\
  \n我们这里的基本思路是先开发一个不带缓存的应用。通过避免过早优化，我们可以确保应用在开始优化网络层之前功能完备且相对无 Bug。这样一来，任何引入的 Bug\
  \ 都能被轻松追踪。\n\n##### 决定缓存什么\n\n我们如何决定缓存什么？答案可以通过两种基本方法之一找到。第一种方法是“猜测并测试”。这种方法可能会产生一些积极效果，但不够科学，也可能引入一些问题。第二种方法基本上是对所请求数据进行统计分析，包括从应用中收集数据并进行分析。\n\
  \n要捕获数据，我们可以使用 Charles 来收集信息，然后直接在 Charles 中分析数据，或将请求信息导出为其他格式在你选择的应用程序中分析。对于这个示例，我们将使用一个相对较小的样本量，并通过一次完整的应用操作流程——获取产品、查看产品、将产品加入购物车，最后完成结账——来生成数据。图\
  \ 6-14 显示了我们将要查看的数据集。\n\n![图片](img/0614.jpg)\n\n**图 6-14.** *来自 Charles 的数据集*\n\n\
  我们是如何获得这些数据的？启动 Charles，确保启用了 Mac OS X 代理：前往 **Proxy** ![图片](img/U002.jpg) **Mac\
  \ OS X Proxy**，并确认它处于选中状态。接下来点击工具栏中的录制按钮，瞧，你就在捕获 HTTP 数据了。在数据捕获过程中，你很可能会注意到有其他条目弹出。\n\
  \n查看表格，首先映入眼帘的是请求了两种类型的数据。第一类是 JSON 编码的数据，第二类是图片。响应大小也明显不同。记住这些信息，我们还需要查看请求的使用模式。\n\
  \n产品列表响应包含产品信息，包括价格。由于价格可能波动，这个服务调用并不适合缓存。我们不想向用户显示错误的价格。不过，如果返回的数据集很大，我们可能需要修改服务器代码，返回分页数据集，并尽量保持数据规模较小。\n\
  \n在这个案例中，最适合缓存的数据是图片。当我们优化产品列表的滚动性能时，我们实现了一个非常基础的内存缓存。这个方案并非最佳，因为视图控制器负责处理缓存，却没有考虑内存使用情况，也没有响应内存警告。`APIEngine`\
  \ 应该负责缓存。我们希望采用双层缓存策略：内存缓存和磁盘缓存。当内存不足时，可以清除内存缓存，磁盘缓存将接管并缓存图片约一周左右。\n\n**注意：** 这些决策完全基于应用的实际使用方式。在真实场景中，会进行用户测试，这有助于确定合适的缓存策略。\n\
  \n\n\n##### NSCache\n\n关于缓存我们已经讨论得够多了！现在让我们深入代码，了解有哪些缓存机制以及如何使用它们。\n\n我们将使用的第一个\
  \ API 是 `NSCache`。`NSCache` 内置于 Cocoa Touch 框架中，并在 iOS 4.0 中引入。`NSCache` 本质上是一个内存存储，类似于我们在\
  \ Super Checkout 中使用的机制。`NSCache` 是一个键值存储，并且内置了当缓存填满或系统需要更多内存时移除过期项目的机制。\n\n这将是我们缓存策略的第一道防线。作为本次重构的一部分，我们将把缓存逻辑从视图控制器中移出，交由\
  \ `APIEngine` 来处理。这将允许 `APIEngine` 在必要时缓存数据，而所有使用它的视图控制器都可以清理缓存。\n\n那么该如何实现呢？很简单！打开\
  \ `SuperCheckoutAPIEngine.m`，然后进行以下更改。\n\n在类扩展中，以粗体添加清单 6–6 中的方法声明。\n\n**清单 6–6.**\
  \ *向类扩展添加图片缓存方法*\n\n`- (BOOL) _isValidDelegateForSelector:(SEL)selector;`\n\n**`-\
  \ (NSCache *) imageCache;`**\n\n`@end`\n\n在实现文件中，在 `#pragma mark – API Methods`\
  \ 行的正上方添加清单 6–7。\n\n**清单 6–7.** *实现图片缓存*\n\n`- (NSCache *) imageCache {`\n`    static\
  \ NSCache *imageCache = nil;`\n\n`    if(imageCache == nil) {`\n`        imageCache\
  \ = [[NSCache alloc] init];`\n`    }`\n\n`    return imageCache;`\n`}`\n\n这为引擎添加了一个静态的\
  \ `NSCache` 对象。接下来，我们将添加代码来使用这个缓存。\n\n在 `SuperCheckoutAPIEngine.h` 中，添加以下两个方法声明：\n\
  \n`-(void) clearCache;`\n`-(UIImage *) cachedImageForProduct:(NSString *)stringURL;`\n\
  \n回到 `SuperCheckoutAPIEngine.m`，在 `checkout` 方法之后添加这些方法的实现：\n\n`-(void) clearCache\
  \ {`\n`    [[self imageCache] removeAllObjects];`\n`}`\n\n`-(UIImage *) cachedImageForProduct:(NSString\
  \ *)stringURL {`\n`    return [[self imageCache] objectForKey:stringURL];`\n`}`\n\
  \n下一步是使用这个缓存。有两个地方需要修改以启用缓存。第一个是在我们从请求获得响应，并准备将图片发送回委托时。在 `requestFinished:` 中找到以下这行代码，它解码数据并创建\
  \ `UIImage`：\n\n`UIImage *image = [[[UIImage alloc] initWithData:receivedData] autorelease];`\n\
  \n在这行代码下方，添加以下内容：\n\n`[[self imageCache] setObject:image forKey:[[request url] absoluteString]];`\n\
  \n现在还有一处需要修改引擎。在 `_sendImageRequestWithURL:` 中，用以下代码块替换其实现：\n\n`- (NSString *)_sendImageRequestWithURL:(NSString\
  \ *)imageURL {`\n`    NSURL *theURL = [NSURL URLWithString:imageURL];`\n\n`    UIImage\
  \ *image = [[self imageCache] objectForKey:[theURL absoluteString]];`\n\n`    if(image)\
  \ {`\n`        NSString *requestIdentifier = [NSString stringWithNewUUID];`\n\n\
  `        if ([self _isValidDelegateForSelector:@selector(imageReceived:forRequest:)])\
  \ {`\n`            dispatch_time_t popTime = dispatch_time(DISPATCH_TIME_NOW, 1ull);`\n\
  `            dispatch_after(popTime, dispatch_get_main_queue(), ^(void){`\n`   \
  \             [delegate imageReceived:image forRequest:requestIdentifier];`\n` \
  \           });`\n`        }`\n\n`        return requestIdentifier;`\n`    }`\n\n\
  `    return [self _sendRequest:theURL`\n`                    withRequestType:SuperCheckoutProductImage`\n\
  `                           responseType:SuperCheckoutImage];`\n`}`\n\n在继续进行其他修改之前，让我们快速回顾一下刚刚完成的工作。首先，我们创建了缓存对象。我们将缓存设为静态，因此引擎的所有实例将共享同一个缓存。由于\
  \ Super Checkout 是一个小型应用，并且我们只缓存产品图片，这种方法是可行的。如果需要处理更多内容，可能需要一个更健壮的、能管理不同级别内存缓存的系统，但目前我们只使用一个主缓存，并在需要时清空它。\n\
  \n接下来的修改是允许视图控制器请求缓存的图片。如果图片不在缓存中，此方法将返回 `nil`。由视图控制器自行判断这种情况并请求图片。\n\n最后，在 `_sendImageRequestWithURL:`\
  \ 中，我们检查缓存中是否有图片，并模拟一个完整的请求过程。为此，我们创建请求标识符，然后将一个延迟执行的 block 派发到 Grand Central Dispatch，然后方法返回。这使得委托回调几乎是即时发生的。\n\
  \n现在，我们准备好进行其余的修改。这些修改包括更新 `ProductCell`，让它自己管理图片，以及让 `Super_CheckoutViewController`\
  \ 利用 `APIEngine` 中的新 API。打开 `ProductCell.h`，添加以下实例变量和属性：\n\n`UIImage *productImage;`\n\
  `@property (nonatomic, retain) UIImage *productImage;`\n\n由于我们现在直接在单元格中处理图片，可以移除\
  \ `productInformation` 设置方法中的键值观察代码。打开 `ProductCell.m`，像这样添加新的设置方法：\n\n`-(void)\
  \ setProductInformation:(Product *)newProductInformation {`\n`    Product *oldInfo\
  \ = productInformation;`\n`    productInformation = [newProductInformation retain];`\n\
  `    [oldInfo release];`\n`    [self setNeedsDisplay];`\n`}`\n\n接下来，通过添加以下行来合成 `productImage`\
  \ 属性：\n\n`@synthesize productImage;`\n\n然后，添加以下代码：\n\n`- (void) setProductImage:(UIImage\
  \ *)theProductImage {`\n`    UIImage *oldImage = productImage;`\n`    productImage\
  \ = [theProductImage retain];`\n`    [oldImage release];`\n\n`    [self setNeedsDisplay];`\n\
  `}`\n\n`- (void) prepareForReuse {`\n`    [super prepareForReuse];`\n\n`    [self\
  \ setProductImage:nil];`\n`}`\n\n在 `drawCellView:` 中，修改这一行：\n\n`CGImageRef prodImage\
  \ = [[productInformation productImage] CGImage];`\n\n使其变成这样：\n\n`CGImageRef prodImage\
  \ = [[self productImage] CGImage];`\n\n最后，在 `dealloc` 方法中释放 `productImage` 实例变量，添加：\n\
  \n`[productImage release];`\n\n接下来，我们想为 `UIImage` 创建一个类别，添加一个返回自身缩放版本的方法。为此，转到 **File**\
  \ ![images](img/U002.jpg) **New** ![images](img/U002.jpg) **New File**，在 Cocoa Touch\
  \ 下选择 Objective-C category。将类别命名为 **Resize**，并创建在 `UIImage` 上（参见图 6–15）。点击 Next，将文件保存在项目中，然后点击\
  \ Create。\n\n![images](img/0615.jpg)\n\n**图 6–15.** *Xcode 使得创建类别变得超级简单！*\n\n创建新类别后，打开新创建的\
  \ `UIImage+Resize.h` 文件，并将此方法添加到头文件中：\n\n`- (UIImage*) resizedImageWithSize:(CGSize)size;`\n\
  \n接下来，切换到实现文件，并将清单 6–8 中的实现添加到类别中。创建缩放后的 UIImage 的实现非常实用。\n\n**清单 6–8.** *创建缩放后的\
  \ UIImage*\n\n`- (UIImage*) resizedImageWithSize:(CGSize)size {`\n`    UIGraphicsBeginImageContext(size);`\n\
  \n`    [self drawInRect:CGRectMake(0.0f, 0.0f, size.width, size.height)];`\n\n`\
  \    // An autoreleased image`\n`    UIImage *newImage = UIGraphicsGetImageFromCurrentImageContext();`\n\
  \n`    UIGraphicsEndImageContext();`\n\n`    return newImage;`\n`}`\n\n\n\n### 排版后内容\n\
  \n分类完成后，打开 `Super_CheckoutViewController.m`。我们只需要修改此文件中的两个方法。在 `tableView:cellForRowAtIndexPath:`\
  \ 中，将其更新为如下所示：\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n\
  \               cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    ProductCell\
  \ *cell = (ProductCell *)[tableView dequeueReusableCellWithIdentifier:\n       \
  \                                                        [ProductCell  reuseIdentifier]];\n\
  \n    if(cell == nil) {\n        cell = [[[ProductCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  \                                        reuseIdentifier:[ProductCell reuseIdentifier]]\
  \ autorelease];\n    }\n    Product *item = (Product *)[inventory objectAtIndex:[indexPath\
  \ row]];\n\n    [cell setProductInformation:item];\n    [cell setAccessoryType:UITableViewCellAccessoryDisclosureIndicator];\n\
  \n    //[self setProductCell:nil];\n\n    //向单元格获取图片\n    UIImage *image = [apiEngine\
  \ cachedImageForProduct:[item thumb]];\n    if(image == nil) {\n        if (self.tableView.dragging\
  \ == NO && self.tableView.decelerating == NO) {\n            NSString *requestId\
  \ = [apiEngine getImageForProduct:[item thumb]];\n\n            [imageIndexes setObject:[NSNumber\
  \ numberWithInt:[indexPath row]]\n                                             \
  \  forKey:requestId];\n        }\n    } else {\n        [cell setProductImage:image];\n\
  \    }\n\n    return cell;\n}\n```\n\n将 `imageReceived:forRequest:` 更新为如下所示：\n\n\
  ```\n-(void) imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier\
  \ {\n    NSIndexPath *indexPath =\n              [NSIndexPath indexPathForRow:[[imageIndexes\
  \ objectForKey:connectionIdentifier] intValue]\n                               \
  \                            inSection:0];\n    ProductCell *prod = (ProductCell\
  \ *)[[self tableView] cellForRowAtIndexPath:indexPath];\n\n    [prod setProductImage:[image\
  \ resizedImageWithSize:CGSizeMake(64.0, 64.0)]];\n\n    [imageIndexes removeObjectForKey:connectionIdentifier];\n\
  }\n```\n\n最后，在 `didReceiveMemoryWarning` 中添加以下这一行：\n\n`[apiEngine clearCache];`\n\
  \n现在，API 引擎创建了一个简单的内存缓存，产品列表视图充分利用了它。不过，产品详情视图无需做任何更改。这是因为 API 引擎在发出请求之前会先检查缓存。简单而智能的缓存解决方案通常会将缓存细节对大多数视图控制器隐藏起来。\n\
  \n由于我们两层方法的第一层已完成，接下来看看我们的磁盘缓存方案。\n\n### 实现我们的磁盘缓存方案\n\n`ASIHTTPRequest` 团队为我们提供了缓存方案的第二层。他们创建了一个名为\
  \ `ASIDownloadCache` 的类。这个类是 `ASICacheDelegate` 协议的默认实现。如果你有自己的磁盘缓存系统，只需遵循该协议，就能将该实现与\
  \ `ASIHTTPRequest` 关联起来。\n\n对于 Super Checkout，我们将使用项目中自带的默认实现。要实现这些更改，我们只需编辑 `SuperCheckoutAPIEngine.m`\
  \ 源文件。打开它，在导入语句中添加 `#import \"ASIDownloadCache.h\"`。然后，将类扩展接口修改为如清单 6–9 所示。\n\n\
  **清单 6–9.** *修改类扩展以向其添加缓存控制*\n\n```\n// Utility methods\n- (NSString *)_queryStringWithBase:(NSString\
  \ *)base\n                                               parameters:(NSDictionary\
  \ *)params\n                                                     prefixed:(BOOL)prefixed;\n\
  - (NSString *)_encodeString:(NSString *)string;\n\n// Connection/Request methods\n\
  \n- (NSString *)_sendRequest:(NSURL *)theURL\nwithRequestType:(SuperCheckoutRequestType)requestType\n\
  responseType:(SuperCheckoutResponseType)responseType\ncache:(BOOL)cache;\n- (NSString\
  \ *)_sendRequestWithMethod:(NSString *)method\n                                path:(NSString\
  \ *)path\n                     queryParameters:(NSDictionary *)params\n        \
  \                        body:(NSString *)body\n                         requestType:(SuperCheckoutRequestType)requestType\n\
  \                        responseType:(SuperCheckoutResponseType)responseType;\n\
  \n- (NSString *)_sendImageRequestWithURL:(NSString *)imageURL;\n- (NSURL *)_baseURLWithMethod:(NSString\
  \ *)method\n                         path:(NSString *)path\n                  requestType:(SuperCheckoutRequestType)requestType\n\
  \              queryParameters:(NSDictionary *)params;\n\n// Parsing methods\n-\
  \ (void)_parseDataForConnection:(ASIHTTPRequest *)connection;\n\n// Delegate methods\n\
  - (BOOL) _isValidDelegateForSelector:(SEL)selector;\n\n- (NSCache *) imageCache;\n\
  ```\n\n这样，我们就可以控制哪些请求会被缓存，哪些不会。\n\n现在，在实现部分，将我们刚修改的签名更新以匹配声明。接下来，在 `[request setDelegate:self]`\
  \ 之后添加以下代码块：\n\n```\n[request setDelegate:self];\n\nif(cache) {\n[request setDownloadCache:[ASIDownloadCache\
  \ sharedCache]];\n[request setCachePolicy:\nASIAskServerIfModifiedCachePolicy|ASIFallbackToCacheIfLoadFailsCachePolicy];\n\
  [request setCacheStoragePolicy:ASICachePermanentlyCacheStoragePolicy];\n}\nNSString\
  \ *requestIdentifier = [NSString stringWithNewUUID];    \n```\n\n接下来的更新是更改对更新后方法的调用。\n\
  \n在 `_sendRequestWithMethod:path:queryParameters:body:requestType:responseType:`\
  \ 中，将返回值修改为向该方法传递 `NO`，如下所示：\n\n```\nreturn [self _sendRequest:theUrl\n        \
  \        withRequestType:requestType\n                    responseType:responseType\n\
  \                                        cache:NO];\n```\n\n并在 `_sendImageRequestWithURL:`\
  \ 中将返回行修改为如下所示：\n\n```\nreturn [self _sendRequest:theURL\n                withRequestType:SuperCheckoutProductImage\n\
  \                    responseType:SuperCheckoutImage\n                         \
  \           cache:YES];\n```\n\n对于这一层缓存，最重要的更新是：\n\n`[request setDownloadCache:[ASIDownloadCache\
  \ sharedCache]];`\n`[request setCachePolicy:`\n`ASIAskServerIfModifiedCachePolicy|ASIFallbackToCacheIfLoadFailsCachePolicy];`\n\
  `[request setCacheStoragePolicy:ASICachePermanentlyCacheStoragePolicy];`\n\n我们这里所做的，是为请求设置下载缓存为\
  \ ASI 团队提供的默认缓存。然后，我们设置缓存策略，以便向服务器询问请求的资源是否已更改。如果资源未更改，请求将使用缓存。如果资源已更改，则加载新资源并缓存。如果请求失败，则会使用缓存（如果存在的话）。\n\
  \n最后一行是告诉缓存永久存储文件。默认情况下，缓存设置为设备上的缓存目录。当设备连接到 iTunes 时，此文件夹不会同步到电脑，并且 iOS 会在必要时清空该文件夹。\n\
  \n现在我们已经有了一个可靠的缓存方案，可以进入最终测试阶段——电池寿命管理。\n\n\n\n### 认识电源管理\n\n任何人在谈论移动设备时，最先问的问题之一就是：“电池续航怎么样？”作为移动开发者，我们有责任确保应用程序不仅节省内存，而且节省电量。这意味着我们必须编写高效的、没有内存泄漏的代码。\n\
  \n这种平衡很难实现，尤其是在设备功能更强大、内部集成的芯片类型更多的情况下。例如，iPhone 4 几乎为每个功能都配备了芯片：CPU、GPU、`802.11`、`GSM`/`CDMA`、加速度计、指南针和陀螺仪，这些主要芯片都集成在由电池供电的小巧机身内。由于我们可以访问各种不同类型的传感器和芯片，因此我们必须极其谨慎地选择使用哪些芯片以及使用多长时间。\n\
  \n#### 硬件部分\n\n每台 iOS 设备至少有一种无线芯片。它们都有 Wi-Fi 无线芯片，而 iPhone/iPad 3G 则有可以在 3G 或 2G\
  \ 网络上通信的`GSM`/`CDMA`无线芯片。这些无线芯片在通电时会消耗相当多的电量。操作系统会采用不同的技术在芯片不使用时将其关闭，因此，开发者有责任在绝对必要时才启动这些芯片。\n\
  \n使用 3G 芯片是耗尽设备电池最快的方式之一。而 3G 网络在数据传输完成后仍会让芯片保持满功率运行几秒钟，这更加剧了耗电问题。图 6–16 展示了应用程序在\
  \ 3G 网络上快速连续进行短时突发传输时的电量消耗情况。\n\n![images](img/0616.jpg)\n\n**图 6–16.** *在这个 3G\
  \ 无线芯片的功率图中，请注意芯片在数据发送后会保持高功率状态数秒。*\n\n另一种非 Wi-Fi 的无线芯片是 2G 无线芯片。这个芯片比 3G 芯片功耗低，但传输速度也更慢，因此在互联网上传输大块数据时可能效率较低。2G\
  \ 芯片与 3G 芯片的不同之处在于，一旦数据传输完成，它会立即进入低功耗状态。图 6–17 显示了其功耗随时间的变化。\n\n![images](img/0617.jpg)\n\
  \n**图 6–17.** *2G 无线芯片的功率图*\n\n最后，也是最高效的无线芯片是 Wi-Fi 无线芯片。与 2G 无线芯片类似，Wi-Fi 无线芯片在数据传输完成后会进入低功耗状态。由于\
  \ Wi-Fi 的数据传输速度极快，它是设备首选的无线数据传输方式。我们已经展示了 3G 和 2G 无线芯片的功耗随时间变化图，图 6–18 将完善这一系列图表。\n\
  \n![images](img/0618.jpg)\n\n**图 6–18.** *Wi-Fi 芯片是设备上最快、最高效的芯片。*\n\n管理数据通信对于保持良好的电池寿命至关重要。尽可能缩短传输会话时间，并让无线芯片尽可能多地处于空闲状态，可以减缓电池消耗，并让用户更满意。\n\
  \n设备上的其他芯片，包括 CPU、GPU、GPS 和运动传感器芯片，都有不同的功耗需求。CPU 和 GPU 分别负责运行代码和渲染屏幕内容。这意味着编写快速高效的代码可以降低\
  \ CPU 负载，而保持动画/视图相对简单则可以减少 GPU 的功耗。这些芯片始终处于活动状态，因此让它们保持空闲的唯一方式就是编写优秀的代码。而框架则会控制设备上的其他芯片。`Core\
  \ Location` 控制 GPS，`Core Motion` 控制加速度计和陀螺仪。当我们转向更多由软件控制的设备时，我们需要讨论代码如何影响这些芯片，并最终影响电池寿命。\n\
  \n#### 编码技巧\n\niOS 是一个非常复杂的操作系统。它专为移动设备设计，并针对最大化电池寿命进行了优化，同时还能提供足够的性能来运行出色的应用程序！为了让我们的应用程序在\
  \ iOS 环境中成为“好市民”，有一些技巧可以确保我们的应用程序表现出色，同时不会过度消耗电池。\n\n##### 网络通信\n\n正如我们在上一节讨论的，无线芯片会消耗相当多的电量。然而，我们可以通过智能地请求数据来减少维持这些芯片运行的间接开销。由于大多数网络通信是通过\
  \ HTTP 进行的，这里真正需要牢记的就是内容大小和内容压缩。如果数据以 JSON 格式编码并使用 gzip 压缩，那么内容体积会很小，无线芯片就不会那么活跃。\n\
  \n网络通信的另一个好方法是将请求分组在一起。这会使无线芯片活跃时间稍长一些，但最终比频繁的小网络请求或长时间保持套接字打开要好得多。轮询也是一个坏主意。与其轮询，不如利用推送通知。这可以让无线芯片保持静默并消耗更少的电量。\n\
  \n至于寻找真正的性能瓶颈，可以使用 `Activity Monitor` 工具来跟踪网络使用情况。要找到 `Activity Monitor` 工具中的网络选项可能有点棘手。因此，请启动带有\
  \ `Activity Monitor` 工具的 Instruments，然后点击工具区域中的信息“i”按钮。这将调出如图 图 6–19 所示的界面。\n\n\
  ![images](img/0619.jpg)\n\n**图 6–19.** *显示默认选项未选中的工具配置面板*\n\n请注意，在此示例中，复选框是未选中的。它们默认是选中的，但我们在查看处理器使用情况时不一定需要监视\
  \ CPU。在这个实例中我将它们取消了选中。要获取网络选项，请点击 `Configure` 按钮。配置面板会翻转过来，呈现出 图 6–20 所示的界面。\n\n\
  ![images](img/0620.jpg)\n\n**图 6–20.** *工具配置面板，允许您为工具选择可见的传感器。*\n\n选择与 图 6–20 中相同的复选框。点击\
  \ `Done`，并确保在信息面板中这些传感器已被勾选。点击原来显示“i”位置的“x”，然后从 `Target` 下拉菜单中选择 `Super Checkout`\
  \ 目标。点击录制按钮开始录制数据。应用程序将启动，当发起网络请求时，您会看到网络图表出现峰值。随着应用程序缓存更多数据，您会发现随着您在应用程序中导航，网络请求变得不那么频繁。图\
  \ 6–21 显示了所有图像被缓存后的一次运行结果。\n\n![images](img/0621.jpg)\n\n**图 6–21.** *将网络请求峰值保持在最低限度是保持无线芯片静默、节省更多电量的好方法。*\n\
  \n\n\n### 追踪用电量\n\n现代 iOS 设备能够记录功耗信息，而 `Instruments` 为您提供了一种绝佳方式，用于查看设备的耗电情况以及哪些芯片消耗了最多电力。要启用此功能，首先需要让设备激活开发者模式。这会在“设置”应用中启用“开发者”选项。图\
  \ 6–22 展示了这一部分。\n\n![images](img/0622.jpg)\n\n**图 6–22.** *“设置”应用中的“开发者”设置，此时电量记录功能已关闭*\n\
  \n开启电量记录将启动一个新的记录会话。此会话会按组件和应用分别追踪耗电量。会话结束后，数据可以导入到 `Instruments` 中进行分析。\n\n**注意：**\
  \ 每次关闭记录功能时，电量记录的诊断信息都会被重置。当设备关机或电池耗尽时，记录功能会自动关闭。\n\n为了全面了解您的应用在生态系统中的表现，以及它是否能与其他应用良好共存，一个不错的方法是开启电量记录，并正常使用设备一两个小时。之后回顾并查看各个进程在做什么，会非常有启发。\n\
  \n要导入收集到的数据，请创建一个新的 `Instruments` 会话，并选择“能耗诊断”（参见图 6–23）。\n\n![images](img/0623.jpg)\n\
  \n**图 6–23.** *选择“能耗诊断”工具模板*\n\n现在，连接设备，然后转到 **文件** ![images](img/U002.jpg) **导入来自设备的能耗诊断**。图\
  \ 6–24 展示了我运行了将近三小时的一个会话。\n\n![images](img/0624.jpg)\n\n**图 6–24.** *来自设备电池诊断的一些真实数据*\n\
  \n在这个视图中我们看到了什么？首先，查看时间线的顶部。您会看到代表重大事件的标志，例如睡眠/唤醒，或者应用进入后台或被挂起。在记录电量使用情况时，在心里或实际记下这些笔记，将有助于在开始分析时回忆当时发生了什么。\n\
  \n`Instruments` 窗口中的每个层级都提供了不同类型的信息。“能耗”条显示了特定时刻使用了多少电量。随着每个组件消耗更多电力，该条会变高；反之，当芯片关闭时，该条会变矮。\n\
  \n“CPU 活动”监视器能很好地让您了解各进程在做什么。在“跳转栏”中，您可以选择“应用活动”或“CPU 活动”。在“应用活动”中，您可以看到哪些应用正在运行，以及它们何时切换到后台或被挂起。“CPU\
  \ 活动”视图则让您了解处理器在哪些地方花费时间进行处理。您可以看到处理器的哪一部分在处理图形或音频。每个条代表一个刻度，范围从 1 到 20。图 6–25 展示了这种测量方式。这些数字实际上代表了一种计算，即：“如果\
  \ CPU 长时间保持这种状态，那么还剩多少电池续航。”\n\n![images](img/0625.jpg)\n\n**图 6–25.** *CPU 活动参考图表*\n\
  \n“显示亮度”告诉您设备显示屏的状态。背光是耗电的，因此了解特定场景下屏幕的亮度会很有用。当图表为 0 时，表示屏幕已关闭。\n\n“睡眠/唤醒”以开/关的视图形式向您展示设备何时被唤醒。当亮度为\
  \ 0 且设备处于唤醒状态时，说明有某个程序正在进行后台处理。这很可能是 `邮件` 正在接收新消息，或者您可能会在“CPU 活动”视图中看到一些音频处理。\n\n\
  最后三个图表显示了无线通信模块的状态。\n\n### 运用行业技巧\n\n在进行功耗测试时，有一些很好的实验控制措施需要牢记。可以开启或关闭这些设置，以观察设备在多种情况下的表现。这些设置包括关闭\
  \ iOS 4 的功能，如邮件获取、推送通知和自动调暗。另一个好主意是测试各种无线模块的开启/关闭状态。同样值得注意的是，温度较低的环境会缩短电池续航。\n\n\
  在收集数据方面，性能测试和调优更像是一门科学。设置合适的实验控制措施，将有助于您在分析数据时精确地隔离出实际发生的情况。例如，如果您注意到应用花费过多时间与服务器通信，导致电量消耗过大，您可以修改应用与服务器通信的方式。如果您的应用有后台任务，可以考虑更改后台任务的编写方式，以潜在地缩短任务所需的时间。这可能涉及更改与服务器通信时数据的结构，或者更新任务使其运行时间尽可能短。归根结底，您最了解自己的应用，而每个\
  \ `Instrument` 都会向您展示特定于该应用的信息。有时，您发现的数据可能会相当令人惊讶和具有启发性。\n\n### 总结\n\n我们现在都是通信专家了，对吧？实际上，我们只是触及了优化网络代码和正确缓存策略的皮毛。我们在本章中采用的方法相当常见，但也是比较直接的方法。如果您发现您的应用不适合这种方案，那么有很多非常聪明的人，他们的全部工作就是研究缓存方法并尽可能地从系统中榨取每一丝性能。\n\
  \n这总结了本书的性能调优部分。从现在开始，我们将致力于优化将构建版本分发给 Beta 测试人员的工作流程，并自动化工作流程中的其他部分。性能调优是项艰巨的工作，但看到应用性能的提升，之前所做的每一次调整和多次测试运行都是值得的。希望您到目前为止享受了这一过程；更多有趣的内容还在后面的章节等着您。\n\
  \n## 第 7 章\n\n\n\n"
- "# 准备 Beta 版本！\n\n现在，我们有了一个自认为可以发布的应用。许多开发者都曾因自认为应用固若金汤，结果发布后却发现一堆 bug 而受挫。通常，作为开发者，你只会测试特定的应用路径或测试用例。有时，需要一双（和双手！）新人的眼睛才能真正让应用经受考验。\n\
  \n这就是*Beta 测试*的用武之地。Beta 测试将应用发布给一小部分外部用户，他们被称为*测试人员*或*Beta 测试者*。目标是收集他们关于应用 Bug\
  \ 的反馈。你需要找到有耐心的用户，他们愿意忍受应用（可能）出现的异常甚至充满 Bug 的行为。你最不希望看到的，就是一个愤怒的测试者在应用尚未发布前就四处吐槽。\n\
  \n当 Beta 测试人员使用应用时，如果应用崩溃，我们还需要捕获*崩溃报告*。如果你有精明的 Beta 测试者，当他们将设备同步到 `iTunes` 时，就能访问这些崩溃报告。还有其他几种选择，比如让应用通过电子邮件、发送到网络服务器，或发送到第三方服务（为我们分析崩溃报告）来传递崩溃数据。我们也会简要提及这些方法。\n\
  \n要将应用分发给 Beta 测试者，你需要通过 iOS 配置门户使用一个临时配置描述文件。你可以通过 iOS 开发者中心访问该门户。这个流程可能比较复杂，但别担心，我们会一步步、一个屏幕一个屏幕地讲解。提醒一下，你需要成为\
  \ iOS 开发者计划的成员（目前每年 99 美元）才能创建临时配置描述文件。我们会在本章稍后简要讨论该计划。如果你不是 iOS 开发者计划的成员，本章余下内容对你来说可能用途有限。\n\
  \n### 管理 Beta 测试\n\n我们认为我们的 Super Checkout 应用已经准备好接受外部测试了。但我们不能直接把应用扔到野外，指望有人会为我们测试它。这需要我们在前期做一些准备。我们可以将准备工作分解为五个步骤。在进入更详细的讨论之前，我们先简要描述一下这些步骤。\n\
  \n首先，我们需要*定义* Beta 测试。我们想要什么样的测试者？我们想针对哪些设备进行测试？接下来，我们需要*获取* Beta 测试者。我们打算如何找到测试者？一旦测试者就位，我们必须*指导*他们。我们希望他们测试什么？他们应该如何提交反馈？\n\
  \n现在我们已经说明了需要测试者做什么，接下来就可以*分发*应用并*整理*他们的反馈。准备应用分发的版本是一项艰巨的任务，所以我们将在“创建 Ad Hoc 构建”一节中讨论。之后，我们会简要讨论如何处理测试者的反馈。\n\
  \n#### 定义 Beta 版本\n\n“定义 Beta 版本”是什么意思？意味着花一点时间规划 Beta 测试的目标。通常，如果这是你第一次将应用分发给测试者，你的目标可能是开放式的。你只是希望测试者让应用经受考验，发现所有\
  \ Bug，并对通用可用性提出意见。随着测试的推进，你可能会发布解决特定问题的应用版本。这样一来，你可能希望用户专注于应用的特定部分。\n\n一旦确定了 Beta\
  \ 测试的目标，我们就可以集中精力决定需要什么样的测试者。记住，找到认为你的应用有用的测试者至关重要。在我们的 Super Checkout 案例中，如果有个测试者既不喜欢水果也不喜欢购物，他们可能就不是一个好的测试者。仅仅是因为他们觉得我们的应用没用，就不会去使用它。如果他们不使用，我们就得不到任何有意义的反馈，也发现不了任何\
  \ Bug。\n\n最后，我们必须决定应用对设备的要求。你可能只针对最新、最强大的 iOS 设备和操作系统。或者，你可能针对某个特定设备上的多个操作系统版本。通常，你可能在开发应用之前就决定了这些，但这些标准可能会随着开发进展而改变。\n\
  \n#### 获取 Beta 测试者\n\n我们如何找到 Beta 测试者？有几种方法可以尝试，但归根结底只有一个简单步骤：招募志愿者。任何你认为能最有效地找到应用目标用户的方法都可以。向朋友和家人求助是一种方法。或者你也可以通过各种网站、论坛或社交媒体来寻找愿意充当“小白鼠”的人。\n\
  \n另一方面，成为 Beta 测试者也意味着需要承担一定的责任。应用开发者依赖你提供有意义的反馈。此外，提供崩溃报告和日志对于发现致命的应用 Bug 来说非常有帮助。我们稍后会展示如何查找崩溃报告。\n\
  \n在发布消息之前，你可能需要考虑创建一个注册表格。如果你打算只组建一个小型测试组，这可能有点多余。但是，如果你预计会有大量响应（谁不想呢？），注册表格可能会有优势。它可以帮助你管理所有志愿者，以便你轮换测试者。如果你愿意，还可以获取关于测试者的特定信息。\n\
  \n无论你如何追踪测试者，你都需要从他们那里获取一项关键信息：他们 iOS 设备的唯一设备标识符（UDID）。当设备连接到 `iTunes` 时，即可获取此信息。连接\
  \ `iTunes` 后，在导航窗格中选择该设备。`iTunes` 将显示设备信息（参见 图 7–1）。\n\n![images](img/0701.jpg)\n\
  **图 7–1.** *iTunes 中的设备信息*\n\n点击“序列号”标签。该标签应变为显示“标识符 (UDID)”，后跟一个 40 字符的字符串（参见 图\
  \ 7–2）。测试者需要将此字符串发送给你。\n\n![images](img/0702.jpg)\n**图 7–2.** *iTunes 中的 UDID*\n\
  \n\n\n#### 向测试者提供说明\n\n至此，我们已经收到了大量希望参与我们应用 Beta 测试的申请。一旦选定了合适的用户，我们就可以向他们发送关于测试内容的说明。如前所述，如果这是第一轮测试，我们可能只需向用户提供如何使用该应用的说明。在后续版本发布时，我们再向用户提供具体的测试说明，指明需要测试应用的哪些部分，以及我们根据他们的反馈做了哪些修改。\n\
  \n一项关键任务是指导测试人员如何提交 Bug。最简单的方法是让用户每次在应用中发现 Bug 时发送一封邮件。如果你的测试组规模非常小，这种方法可能可行。如果采用这种方式，定义一个标准的\
  \ Bug 报告格式会是个好主意。但更好的方法是安装一个 Bug 跟踪系统。\n\nBug 跟踪系统旨在帮助你跟踪 Bug（以及其他开发任务）。关于它们的工作原理以及如何帮助管理开发，我们可以长篇大论，但这超出了本书的范围。事实上，有人已经为此写了整本书。有几个可用的开源选项：\n\
  \n*   Trac 项目 (`http://trac.edgewall.org`)\n*   Request Tracker (`http://bestpractical.com/rt/`)\n\
  *   Bugzilla (`http://www.bugzilla.org/`)\n\n这绝非一个完整的列表，仅代表我们过去使用过的一些 Bug（和问题）跟踪系统。\n\
  \n如果你确实设置了一个 Bug 跟踪系统，你可以指导你的 Beta 测试人员在那里提交报告。这将使你和他们的工作都更加轻松。\n\n最后，你可能需要指导测试人员如何提交崩溃报告。崩溃报告是在\
  \ iOS 设备上应用崩溃时生成的。当你将设备同步到 iTunes 时，崩溃报告会被传输到你的计算机上。崩溃报告位于`/Users/<USERNAME>/Library/Logs/CrashReporter/MobileDevice/<DEVICE_NAME>`。崩溃报告遵循的命名规范为`<APP_NAME>_YYYY-MM-DD-HHMMSS_<DEVICE_NAME>.crash`，其中`YYYY-MM-DD-HHMMSS`是崩溃发生的日期和时间。在提交应用崩溃报告时，要求用户附上崩溃报告，并说明应用崩溃时他们正在做什么。\n\
  \n我们定义的下一步是应用分发。但在描述之前，我们需要知道如何为 Beta 测试者构建我们的应用。\n\n#### 创建 Ad Hoc 构建\n\n通常，你会通过\
  \ iTunes App Store 分发你的应用。这涉及到通过 iTunes Connect 上传你的应用，并等待 Apple 批准。但这不是分发应用进行 Beta\
  \ 测试的有效方式。首先，如果应用中有任何 Bug，Apple 会拒绝它。此外，Beta 测试的全部意义在于，在发布应用之前，从有限的用户群体中收集反馈。幸运的是，Apple\
  \ 提供了 Ad Hoc 分发方式，允许我们直接将应用分发给测试者。\n\n让我们开始创建我们的 Beta 应用。\n\n##### 证书、配置文件与分发，天哪！\n\
  \n正如我之前提到的，创建 Beta 应用是一个复杂的过程。首先，我们需要创建一个证书签名请求。有了这个请求，我们再创建一个 iOS 分发证书。接下来，我们需要输入（或上传）Beta\
  \ 测试者设备的通用设备 ID（UDID）。然后，我们需要为我们的应用创建一个 App ID。最后，我们使用所有这些信息来创建我们的 Ad Hoc 分发配置文件。\n\
  \n使用 iOS 分发证书和 Ad Hoc 分发配置文件，我们构建出 Beta 应用。然后我们将应用打包，连同配置文件一起分发给 Beta 测试者。之后，Beta\
  \ 测试者可以通过 iTunes 安装应用，并开始向我们发送反馈。\n\n###### 创建证书签名请求\n\n证书签名请求是在你的计算机上使用“钥匙串访问”应用程序创建的。你可以在“应用程序”![images](img/U001.jpg)\
  \ “实用工具”中找到“钥匙串访问”。启动“钥匙串访问”，你应该会看到如图 7–3 所示的窗口。\n\n![images](img/0703.jpg)\n\n\
  **图 7–3.** *钥匙串访问应用程序窗口*\n\n通过“钥匙串访问”![images](img/U001.jpg) “偏好设置”打开偏好设置窗口，并选择“证书”标签页（见图\
  \ 7–4）。将“在线证书状态协议 (OCSP)”和“证书吊销列表 (CRL)”都设置为“关闭”。\n\n![images](img/0704.jpg)\n\n\
  **图 7–4.** *钥匙串访问偏好设置窗口的“证书”标签页*\n\n接下来，选择“钥匙串访问”![images](img/U001.jpg) “证书助理”![images](img/U001.jpg)\
  \ “从证书颁发机构请求证书”（见图 7–5）。应该会出现“证书助理”窗口（见图 7–6）。在“用户电子邮件地址”字段中填写你注册 iOS 开发者时使用的电子邮件地址。对于“常用名称”，填写你注册\
  \ iOS 开发者时使用的公司/组织/部门名称。将“CA 电子邮件地址”字段留空。选择“存储到磁盘”，并勾选“让我指定密钥对信息”。点击“继续”。\n\n![images](img/0705.jpg)\n\
  \n**图 7–5.** *创建证书请求*\n\n![images](img/0706.jpg)\n\n**图 7–6.** *证书助理窗口*\n\n系统会提示你保存一个名为`CertificateSigningRequest.certSigningRequest`的文件。如果需要，你可以更改文件位置，然后点击“存储”。证书助理窗口将发生变化，要求你提供密钥对信息（见图\
  \ 7–7）。将“密钥大小”设置为“2048 位”，并将“算法”设置为“RSA”（如果尚未设置）。点击“继续”。\n\n![images](img/0707.jpg)\n\
  \n**图 7–7.** *密钥对信息*\n\n证书助理应会创建证书请求并报告完成（见图 7–8）。你可以通过点击“在 Finder 中显示”来查看请求的位置。点击“完成”退出证书助理。\n\
  \n![images](img/0708.jpg)\n\n**图 7–8.** *证书助理，完成*\n\n现在我们已经创建了我们的证书请求，下一步就可以创建我们的\
  \ iOS 分发证书了。\n\n\n\n##### 创建 iOS 发布证书\n\n要创建 iOS 发布证书，我们需要进入 iOS 预配门户。我们可以通过 iOS\
  \ 开发者中心访问预配门户（参见图 7–9）。只有以注册开发者身份登录后才能访问预配门户。此外，你还需要注册 iOS 开发者计划。该计划目前个人用户每年需花费\
  \ `$99`。除了注册开发者计划的权益外，你还可以访问预发布软件和工具、内部开发者论坛，并获得苹果的技术支持。此外，你可以在物理 iOS 设备（而不仅仅是模拟器）上测试应用。最重要的是，你可以通过临时分发或\
  \ App Store 来分发你的应用。如果你感兴趣，可以在 [`http://developer.apple.com/programs/ios/`](http://developer.apple.com/programs/ios/)\
  \ 了解更多信息。\n\n![images](img/0709.jpg)\n\n**图 7–9.** *以注册开发者身份登录 iOS 开发者中心*\n\n如果登录成功，你应该会在\
  \ iOS 开发者中心右侧的“iOS 开发者计划”标题下看到“iOS 预配门户”（参见图 7–10）。点击“iOS 预配门户”链接。\n\n![images](img/0710.jpg)\n\
  \n**图 7–10.** *iOS 开发者计划链接*\n\n进入 iOS 预配门户页面后（参见图 7–11），你应该会在左侧看到一个选项菜单（参见图 7–12）。“主页”下的第一个选项是“证书”。点击它。\n\
  \n![images](img/0711.jpg)\n\n**图 7–11.** *iOS 预配门户页面*\n\n![images](img/0712.jpg)\n\
  \n**图 7–12.** *预配门户菜单*\n\n进入“证书”页面后，点击顶部的“发布”标签页（注意不要点击图 7–12 中所示的“发布”链接！）以显示你的发布证书。可能\
  \ Xcode 已自动为你创建了一个证书，也可能没有证书显示（参见图 7–13）。无论如何，我们将创建一个新的。找到表格中末尾带有“请求证书”按钮的行。点击此按钮。\n\
  \n![images](img/0713.jpg)\n\n**图 7–13.** *证书页面的“发布”标签页*\n\n面板应会切换显示一组说明。这些是创建证书请求的说明，而我们刚刚完成了这一步。点击说明末尾的“选择文件”按钮。在文件选择器中，导航到保存\
  \ `CertificateSigningRequest.certSigningRequest` 的位置，并选择该文件。确认文件名出现在“选择文件”按钮旁边（参见图\
  \ 7–14），然后点击“提交”。\n\n![images](img/0714.jpg)\n\n**图 7–14.** *提交证书请求*\n\n提交后，“发布证书”窗格应会刷新，列出状态为“待签发”的证书（参见图\
  \ 7–15）。稍等片刻，然后点击“发布”标签页刷新窗格。证书状态应更新为“已签发”（参见图 7–16），并显示一年后的到期日期。点击证书行右侧的“下载”按钮。这将下载一个名为\
  \ `distribution_identity.cer` 的文件。同时下载 WWDR 中间证书。该文件应命名为 `AppleWWDRCA.cer`。\n\n\
  ![images](img/0715.jpg)\n\n**图 7–15.** *发布证书等待签发*\n\n![images](img/0716.jpg)\n\n\
  **图 7–16.** *发布证书已签发*\n\n在 Finder 中找到 `AppleWWDRCA.cer` 文件，然后双击它。这将启动“钥匙串访问”，并安装\
  \ Apple WWDR 中间证书。你可以通过在“钥匙串访问”窗口左下角窗格中选择“证书”，并搜索名称“Apple Worldwide Developer Relations\
  \ Certificate Authority”来确认是否已安装（参见图 7–17）。\n\n![images](img/0717.jpg)\n\n**图 7–17.**\
  \ *确认 Apple WWDR 中间证书已安装（高亮显示）*\n\n对 `distribution_identity.cer` 重复安装过程。\n\n#####\
  \ 上传 UDID\n\n返回 iOS 预配门户，点击左侧菜单中的“设备”。你应该会进入“设备”页面的“管理”标签页（参见图 7–18）。\n\n![images](img/0718.jpg)\n\
  \n**图 7–18.** *iOS 预配门户页面的“设备”页面*\n\n每年你最多可以添加 100 台设备用于开发和测试目的。虽然你可以移除设备，但即使被移除，这些设备仍会计入你每年的\
  \ 100 台配额中。因此添加设备时要小心。\n\n添加设备有两种方式：单个添加和批量添加。单个添加正如你所料，通过网页表单逐一输入设备信息。而批量添加则允许你一次性添加多台设备。这是通过上传文件来实现的。该文件采用简单的制表符分隔格式。\n\
  \n我们逐一介绍每个过程。\n\n###### 单个添加\n\n在“设备”页面中，进入“管理”标签页。在“管理”页面的右侧，点击标有“添加设备”的按钮。“管理”窗格应会刷新，提供一个可以添加设备名称和\
  \ ID 的表单（参见图 7–19）。\n\n![images](img/0719.jpg)\n\n**图 7–19.** *“添加设备”页面*\n\n“设备名称”可以是一个自由格式的字符串，用于标识设备。它可以是你的\
  \ Beta 测试者的姓名或电子邮件地址。也可以是分配给测试者的某个标识符。“设备 ID”是唯一的设备标识符。你需要从 Beta 测试者那里收集此信息。你可以通过启动\
  \ Xcode 并打开“管理器”窗口来查找 UDID。选择窗口顶部的“设备”图标。在左侧选择相关设备。你应该会看到显示的设备信息。在“标识符”标签旁边，应该是你设备的\
  \ 40 个字符的 UDID（参见图 7–20）。记住，我在本章前面已经向你展示了如何在 iTunes 中访问 UDID（参见图 7–1 和图 7–2）。\n\n\
  ![images](img/0720.jpg)\n\n**图 7–20.** *Xcode 管理器窗口，设备详细信息*\n\n通过网页表单可以输入多个设备名称和\
  \ ID。填写完名称和 ID 后，点击右侧的加号按钮。应会出现额外的一行（参见图 7–21），允许你输入另一台设备的名称和 ID。\n\n![images](img/0721.jpg)\n\
  \n**图 7–21.** *通过网页表单输入另一台设备*\n\n完成设备信息输入后，点击*提交*按钮。\n\n###### 批量添加\n\n在“设备”页面中，在“管理”标签页下，点击“上传设备”按钮。这将刷新“管理”窗格，允许你上传文件（参见图\
  \ 7–22）。正如我们之前所述，你可以上传一个制表符分隔的文件。\n\n![images](img/0722.jpg)\n\n**图 7–22.** *“上传设备”页面*\n\
  \n制表符分隔的文件遵循简单的格式。文件的每一行应包含一个设备 ID，后跟设备名称，两者用制表符分隔。文件的第一行将被视为标题行并被忽略。文件应以扩展名 `.txt`\
  \ 结尾。以下显示了一个示例设备文件：\n\n```\nDEVICE UDID                                DEVICE NAME\n\
  0aeb4240266f544ef8a4d0bb658a1fc6cf0a559a   iPhone 3GS\n1f01c47915477711d8bc700090272ff72528531e\
  \   iPhone 4\n3b02d9e6d59467382e8f9b9300a64ac3cd6c0e89   iPad 2\n```\n\n点击“选择文件”按钮，选择包含设备名称和\
  \ ID 列表的 `.txt` 文件。然后点击“提交”以上传文件并添加设备。\n\n\n\n##### 确认\n\n输入或上传设备信息后，您应会返回“管理”选项卡下的“设备”页面。要确认设备已添加，请滚动到页面底部。在那里，您将看到所有已录入信息的设备列表。\n\
  \n##### 创建我们的应用程序 ID\n\n现在，我们需要在配置门户中为我们的应用程序创建一个条目。这些信息将用于构建分发给 Beta 测试人员的应用程序。\n\
  \n在 iOS 配置门户菜单中，点击 `App IDs`。与“设备”页面类似，“管理”选项卡应处于选中状态（参见图 7-23）。由于这是您的第一个应用程序，页面底部应没有列出任何\
  \ `App IDs`。如果已列出了 `SuperCheckout` 应用程序，您可以跳到**临时分发配置描述文件**部分。否则，请点击标有 `New App\
  \ ID` 的按钮。\n\n![images](img/0723.jpg)\n\n**图 7-23.** *iOS 配置门户页面的 App IDs 页面*\n\n\
  管理窗格应刷新并显示一个表单，用于输入您的应用程序信息（参见图 7-24）。`Description` 字段是用于标识应用程序的简单名称。（注意：`App IDs`\
  \ 是永久的！请确保名称唯一！）输入 `SuperCheckout`。`Bundle Seed ID`（`App ID 前缀`）是一个唯一的十字符序列。将此选项保持为\
  \ `Use Team ID`。`Bundle Identifier`（`App ID 后缀`）是您的应用程序的唯一标识符。惯例是使用反向 DNS 风格名称。使用值\
  \ `com.whilethis.SuperCheckout`。点击 `Submit`。\n\n![images](img/0724.jpg)\n\n**图 7-24.**\
  \ *新建 App ID 表单*\n\n完成后，您应返回到“App IDs”页面的“管理”选项卡。新的 `App ID` 应出现在页面底部（参见图 7-25）。\n\
  \n![images](img/0725.jpg)\n\n**图 7-25.** *新建的 App ID 条目*\n\n快了。现在，我们需要创建一个临时分发配置描述文件。\n\
  \n##### 临时分发配置描述文件\n\n在 iOS 配置门户菜单中，点击 `Provisioning`。进入配置页面后，选择 `Distribution`\
  \ 选项卡（参见图 7-26）。点击 `New Profile` 按钮。\n\n![images](img/0726.jpg)\n\n**图 7-26.** *配置页面的分发选项卡*\n\
  \n分发窗格应刷新并显示一个表单（参见图 7-27）。首先，在 `Distribution` 标签下，选中 `Ad Hoc` 单选按钮。`Profile Name`\
  \ 字段用于输入描述性文本。我们将使用 `SuperCheckout AdHoc Provisioning Profile`。iOS 配置门户应已自动选择了我们之前创建的\
  \ `Distribution Certificate`。对于 `App ID`，选择我们之前创建的 `SuperCheckout ID`。最后，选择您希望应用程序能在其上运行的设备。这应是您的\
  \ Beta 测试人员的设备列表。选择所有设备后，点击 `Submit`。\n\n![images](img/0727.jpg)\n\n**图 7-27.**\
  \ *新建的分发配置描述文件条目*\n\n提交后，分发窗格应刷新，列出新的临时分发配置描述文件。其状态应显示为 `Pending`（参见图 7-28）。等待片刻，然后点击\
  \ `Distribution` 选项卡刷新视图。状态应变为 `Active`（参见图 7-29）。\n\n![images](img/0728.jpg)\n\n\
  **图 7-28.** *临时分发配置描述文件待激活*\n\n![images](img/0729.jpg)\n\n**图 7-29.** *临时分发配置描述文件已激活*\n\
  \n点击新配置描述文件的 `Download` 按钮。这会将名为 `SuperCheckout_AdHoc_Provisioning_Profile.mobileprovision`\
  \ 的文件下载到您的电脑上。记下文件的位置，因为我们稍后会用到它。\n\n我们经历了不少步骤来创建临时分发配置描述文件（即刚下载的 `.mobileprofile`\
  \ 文件）。现在，让我们构建 Super Checkout 的 Beta 版本，以便分发给我们的 Beta 测试人员。\n\n##### 构建 Beta 版本\n\
  \n如果尚未打开，请在 Xcode 中打开 Super Checkout 项目。我们要做的第一件事是安装刚创建的配置描述文件。打开 Finder，导航到 `SuperCheckout_AdHoc_Provisioning_Profile.mobileprovision`\
  \ 文件下载的位置。将该文件拖到 Dock 上的 Xcode 图标上。如果操作正确，Xcode Organizer 窗口应会打开，并列出该配置描述文件（参见图\
  \ 7-30）。\n\n![images](img/0730.jpg)\n\n**图 7-30.** *新安装的配置描述文件*\n\n返回 Super Checkout\
  \ 项目窗口。点击导航窗格顶部的项目名称，进入项目编辑器视图。在项目编辑器视图中选择目标 `Super Checkout`，然后选择 `Build Settings`\
  \ 选项卡。确保通过选择 `Build Settings` 选项卡下方一行中的 `All` 按钮来显示所有构建设置。向下滚动直到找到 `Code Signing`\
  \ 部分。找到标有 `Code Signing Identity` 的行并展开它。在 `Release` 字段下，将值更改为 `SuperCheckout_AdHoc_Provisioning_Profile`\
  \ 标题下的分发描述文件（参见图 7-31）。对标有 `Any iOS SDK` 的行下的 `Release` 行执行相同操作。\n\n![images](img/0731.jpg)\n\
  \n**图 7-31.** *更改发布版本的代码签名标识*\n\n现在，我们需要归档应用程序以便将其打包以进行分发。首先，在 Xcode 工具栏的方案弹出菜单中选择\
  \ `iOS Device`。然后选择 **项目** ![images](img/U001.jpg) **归档**。在应用程序构建过程中，可能会弹出一个窗口，显示“`codesign`\
  \ 想要使用您钥匙串中的密钥“XXX”进行签名”（参见图 7-32）。点击 `Allow`。此窗口可能会再次出现。如果出现，只需点击 `Allow`。`codesign`\
  \ 是一个将 Super Checkout（或任何其他应用程序）与分发证书和配置描述文件打包在一起的应用程序。\n\n![images](img/0732.jpg)\n\
  \n**图 7-32.** *`codesign` 请求访问您的钥匙串*\n\n应用程序编译、签名和归档完成后，Xcode 应会打开 Organizer 窗口，显示归档视图（参见图\
  \ 7-33）。新的 Super Checkout 归档应被列出。选择 `Super Checkout`，然后点击上部窗格右侧的 `Share` 按钮。Xcode\
  \ 将显示一个窗格，询问您希望如何共享归档（参见图 7-34）。\n\n![images](img/0733.jpg)\n\n**图 7-33.** *Xcode\
  \ Organizer 窗口，归档视图*\n\n![images](img/0734.jpg)\n\n**图 7-34.** *共享配置窗格*\n\n在“内容”选项中，选择\
  \ `iOS App Store Package (.ipa)` 单选按钮。并为“标识”选择适当的分发描述文件。该分发描述文件应与您在 Xcode 中为“代码签名标识”配置的匹配。系统可能会询问您是否允许\
  \ `codesign` 访问您的钥匙串。和之前一样，只需点击 `Allow`。最后，将出现一个文件对话框，用于保存文件 `app.ipa`。选择一个位置，并将文件保存为\
  \ `SuperCheckout.ipa`。\n\n\n\n##### 分发 Beta 版本\n\n呼，工作量不小。现在我们有了两个文件：应用程序包 `SuperCheckout.ipa`\
  \ 和配置文件 `SuperCheckout_AdHoc_Provisioning_Profile.mobileprovision`。这两个文件就是你要分发给\
  \ Beta 测试人员的内容。如何分发这些文件完全由你决定。如果测试人员数量较少，通过电子邮件发送可能更简单。请记住，许多电子邮件服务会限制附件大小（通常是 10MB）。因此，部分用户可能无法收到较大的应用程序包。\n\
  \n通常，更好的做法是将文件上传至测试人员可以访问的位置。如果你希望设置密码保护，也可以。你无需过分担心非测试人员下载并运行你的应用程序。配置文件与代码签名将确保该应用仅能在你指定的设备上运行。\n\
  \n一旦你的 Beta 测试人员收到这些文件，他们只需启动 iTunes，然后将这两个文件拖拽至 Dock 栏的 iTunes 图标上。此时，该应用即可在他们的\
  \ iOS 设备上进行安装。\n\n#### Alpha、Beta 还是 Gamma？\n\n现在你已经构建了应用的 Beta 版本并将其分发给了测试人员。这是比较简单的一步。Beta\
  \ 测试是一个迭代过程。很快，你的测试人员就会提交漏洞和崩溃报告。你需要分析这些报告，判断究竟是真正的程序错误，是测试人员对应用的理解有误，还是应用本身需要重新设计。\n\
  \n作为补充说明，有一些工具可以辅助 Beta 测试过程。我们所知的几位开发者都曾使用过它们。在此提及，旨在让你了解它们。\n\n一些开源的崩溃报告框架已经被开发出来，它们有助于自动化交付和解析应用程序的崩溃报告：\n\
  \n*   Plausible Labs 的 CrashReporter (`http://code.google.com/p/plcrashreporter/`)\n\
  *   ParveenKaler 的 CrashKit (`https://github.com/kaler/CrashKit`)\n*   QuincyKit\
  \ (`http://quincykit.net/`)\n*   Steve Streza 的 CrashReporter (`https://github.com/amazingsyco/CrashReporter`)\n\
  \n另外还有许多服务可以辅助管理 Beta 分发、漏洞报告和崩溃报告：\n\n*   Hockey App (`http://www.hockeyapp.net`)\
  \ 基于 QuincyKit 构建\n*   BugSense (`http://www.bugsense.com/`)\n*   TestFlight (`https://testflightapp.com/`)\n\
  \n这三项服务都提供了崩溃报告的收集与分析功能。它们会整理错误信息，并尝试帮助你追踪 Bug。Hockey App 和 TestFlight 还提供了向你的 Beta\
  \ 测试人员分发应用的机制。\n\n请评估这些框架和服务，看看它们是否符合你的需求。\n\n### 本章小结\n\n在本章中，我们描述了如何管理你的 Beta\
  \ 测试流程，从确定测试目标到寻找开发者。最重要的是，我们解释了如何指导你的 Beta 测试人员提交反馈和崩溃报告。为了分发我们的 Beta 应用，我们还介绍了如何创建\
  \ Ad Hoc 配置文件。这是一个复杂的过程，涉及注册应用程序以及 Beta 测试人员的设备 ID。拥有了 Beta 应用和配置文件后，我们就可以将它们发送给测试人员进行审查。\n\
  \n在下一章中，我们将介绍如何以自动化方式测试应用程序。你将学习如何将 Beta 测试人员提交的 Bug 报告转化为测试包。通过创建这个测试包，将有助于防止同样的\
  \ Bug 在应用程序中反复出现（开发者称之为回归）。\n\n## 第八章\n\n## 为什么出问题了？\n\n开发结束了，Beta 版已经发出去了，几周以来，你第一次可以坐下来放松一下了。对吧？好吧，如果事情能这么简单就好了，但事实并非如此，现在你开始收到\
  \ Bug 报告。应用崩溃了，运行缓慢了，用户还发现了前所未闻的、全新的使用路径，这些路径将他们远远带离了你精心铺设的“快乐路径”。\n\n别担心！有很多方法可以找到并解决这些问题。SDK\
  \ 提供的工具让这一切变得容易得多。但是，如果能提前为这些问题做好准备，那岂不是更好？要是存在某种方法论，能在开发过程中专注于发现问题，而不是坐等 Bug 报告蜂拥而至，那该多好。\n\
  \n![images](img/square.jpg) **注意：** 在继续之前，我想指出本章并非专门论述某一种流程或方法论。无论你如何编写代码，测试都很重要。这里要学习的重点是，如何很好地测试你的应用，以及\
  \ Xcode 和 SDK 工具如何让这一切变得简单。\n\n### 测试驱动开发\n\n测试驱动开发（TDD）是一种将重点放在（你猜对了）测试上的开发方法论。在大多数开发工作流程或方法论中，测试被视为衡量代码质量的一种手段，通常是在开发过程中（但往往是在开发之后）进行（图\
  \ 8-1）。而 TDD（参见图 8-2）则更进一步，在开始编写代码之前，就利用测试来帮助设计和规划你的代码库。\n\n![images](img/0801.jpg)\n\
  \n**图 8–1.** *非 TDD 工作流程侧重于编写代码，而非测试。*\n\n![images](img/0802.jpg)\n\n**图 8–2.**\
  \ *TDD 工作流程将编写代码置于生命周期的最末尾。*\n\n你会注意到，TDD 工作流程（图 8-2）中的步骤相同，但顺序大相径庭。在 TDD 中，你是围绕测试来构建代码，而不是围绕需求或规格说明。理论上，当所有测试都通过时，你应该得到了一个满足需求（且没有\
  \ Bug）的最终产品。\n\n注意 TDD 流程中的第三步和第四步。当你完成测试套件后，运行测试并列出 Bug 目录。这一切都在你编写任何代码之前完成。如果你心想“那岂不是所有测试都会失败”，你说得没错。你可以认为，最纯粹的\
  \ TDD 形式将应用程序视为一系列需要被修复的缺陷。应用程序不是在它可以运行时完成，而是在所有测试通过时才算完成。由于测试套件的设计是为了确保满足需求，因此测试成为衡量完成度的标准，而不仅仅是衡量质量的标准。\n\
  \n**不要害怕 TDD。（你可能已经在做了。）**\n\n如果你对它接触不多，TDD（或者说测试这件事）可能会让你有些望而生畏。好消息是，它比你想象的要自然得多。更好的消息是，你可能已经在以几种自己未曾意识到的方式实践它了。例如，在开始构建用户界面之前，你可能已经规划了用户旅程，勾勒了可能的流程，并写下了交互步骤和预期结果。信不信由你，这就是\
  \ TDD。测试脚本、单元测试、自动化用户界面测试、手动用户界面测试——这些都是 TDD 的一部分。\n\n\n\n### 我应该何时开始测试？\n\n无论你是在实践\
  \ TDD，还是仅仅需要测试一个看似无法重现的 Bug，开始测试的唯一最佳时机就是现在。你越早开始，就越容易定义出能精确对应需求的测试，而不会被先入为主的观念或“但我已经用这种方式花了太多时间”的想法所干扰。\n\
  \n构建测试确实需要时间。然而，长远来看它也能节省时间。测试的益处之一在于它们运行速度极快。Xcode 执行一个测试套件只需片刻。这意味着你可以更频繁地运行测试，而无需牺牲太多时间。运行一个完整的测试套件几乎总是比在应用中重现一个\
  \ Bug 以便诊断要快得多。\n\n测试的另一个好处是，编写良好的测试只需编写一次。如果你编写的测试与需求相匹配，那么除非需求发生变化，否则你的测试就不需要改变。如果你正在添加新功能，你只需要添加新的测试。你之前编写的测试应该全部保持有效。拥有一个完整的测试套件的好处是，它能保护你的代码免受回归\
  \ Bug 的侵害。\n\n### Xcode 让测试变得简单\n\nXcode 做了很多让测试变得简单的事情，无论你想做多少测试。Xcode 帮助进行的两种主要测试类型是：单元测试和\
  \ UI 测试。\n\n单元测试是在 Xcode 内部使用一个名为 OCUnit 的框架完成的。不必担心需要学习一个新的框架。从接口的角度来看，OCUnit 是你将使用的最简单的框架之一。此外，Xcode\
  \ 通过提供目标和文件模板，为你完成了大量的设置和繁重工作。正如你马上就会看到的，在 Xcode 中启动一个启用了单元测试的新项目，简单到只需点击一个复选框。\n\
  \nUI 测试是通过在 Instruments 中使用 Automation 模板运行脚本来处理的。这个工具使用了一个自定义的 JavaScript 框架来遍历正在运行的应用程序的用户界面，让你无需实际触摸屏幕即可与应用程序进行交互。\n\
  \n#### 测试目标\n\n将单元测试目标添加到你的项目中，有两种方法。第一种也是最简单的方法，是在你设置项目时告诉 Xcode 包含该目标（参见 图 8–3）。在将单元测试集成到\
  \ Super Checkout 项目之前，先让我们在一个新的、独立的项目中熟悉它们的工作方式。在这个示例中，你将构建一个非常简单的计算器。\n\n![images](img/0803.jpg)\n\
  \n**图 8–3.** *在你的新项目中包含一个单元测试目标，简单到只需勾选一个复选框。*\n\n如果你要为现有项目添加测试，需要添加另一个测试目标，或者只是在设置时忘记勾选该复选框，你始终可以通过向你的项目添加一个新目标并选择单元测试模板来添加单元测试目标。从菜单栏选择\
  \ 文件 ![images](img/U001.jpg) 新建 ![images](img/U001.jpg) 新建目标（图 8–4）。\n\n![images](img/0804.jpg)\n\
  \n**图 8–4.** *你也可以从项目界面的“添加目标”按钮创建新目标。*\n\n这将弹出目标模板对话框（图 8–5）。你会在标有“其他”的部分找到“单元测试包”目标模板。\n\
  \n![images](img/0805.jpg)\n\n**图 8–5.** *你可以向你的项目添加多个单元测试包。*\n\n一旦你创建了测试目标，就可以开始编写测试了。在开始之前，让我们先看看新的测试目标的内容。如果你是作为新项目的一部分创建的测试目标，那么该目标的名称将与你的项目名称相同，并附加“Tests”一词。如果你是作为现有项目的一部分创建的目标，那么它将使用你选择的任何名称。遵循命名约定很重要，因此将测试目标命名为你的项目名称后附加“Tests”一词是明智的做法。\n\
  \n在项目导航器中，每个目标都会有一个组。在测试目标的组内，你会找到一个与你的目标同名的类，以及一个支持文件组，类似于你在任何其他目标组中找到的内容。\n\n\
  在 `SimpleCalculatorTests.m` 中，你应该看到以下内容：\n\n```\n@implementation SimpleCalculatorTests\n\
  \n- (void)setUp\n{\n    [super setUp];\n\n    // 在此处编写设置代码。\n}\n\n- (void)tearDown\n\
  {\n    // 在此处编写拆卸代码。\n\n    [super tearDown];\n}\n\n- (void)testExample\n{\n   \
  \ STFail(@\"在 SimpleCalculatorTests 中尚未实现单元测试\");\n}\n\n@end\n```\n\n我们稍后会详细说明这些内容。目前，只需理解这设置了一个单一的、失败的测试就足够了。\n\
  \n现在你已经有了一个测试目标，你需要运行测试。在此之前，你需要熟悉测试配置并确保测试处于活动状态。Xcode 让控制哪些测试正在运行变得非常简单，并且还提供了修改部分测试环境变量的能力。\n\
  \n#### 设置测试\n\n要运行测试，你需要确保你的方案已为测试设置好。从菜单栏选择 `Product` ![images](img/U001.jpg) `Edit\
  \ Scheme` 以打开方案编辑器（图 8–6）。\n\n![images](img/0806.jpg)\n\n**图 8–6.** *如果你没有在方案中包含测试目标，“测试”操作将被禁用。*\n\
  \n从侧边栏中选择“测试”。如果你在项目设置期间选择了包含单元测试目标，你应该会在“信息”窗格中看到列出的测试目标。如果你是手动创建单元测试目标的，则需要手动将其添加到方案中。点击\
  \ + 按钮以调出项目中所有单元测试目标的列表。选择你的目标并将其添加到方案的“测试”操作中。\n\n![images](img/0807.jpg)\n\n**图\
  \ 8–7.** *工作空间中所有项目的所有单元测试目标都将在此处可用。*\n\n一旦你的目标被包含在方案中，你可以进行一些更高级的配置。测试目标列表上方的下拉菜单允许你选择用于测试的构建配置和调试器。这些设置适用于当前方案中的所有测试目标。目标列表允许你修改各个目标的配置。如果你展开一个目标，你会看到该目标中所有\
  \ `SenTestCase` 子类的列表。在你的例子中，你会看到一个列表项，`SimpleCalculatorTests`。展开这些测试用例之一，将显示各个测试，并按方法名称列出（图\
  \ 8–8）。这些项目中的每一项在右侧都有一个对应的复选框，允许你打开或关闭它们。在 Xcode 4 之前，这需要在代码中通过配置 `SenTestSuite`\
  \ 对象来完成。\n\n此界面上另一个值得注意的是“测试位置”列，它允许你指定测试应运行的区域设置。这使你能够测试依赖于区域设置的行为，包括 `CoreLocation`、`NSDate`、`NSCalendar`\
  \ 等。\n\n![images](img/0808.jpg)\n\n**图 8–8.** *一旦你有了一个完整的测试套件，能够选择运行哪些测试就会派上用场。*\n\
  \n“参数”窗格（图 8–9）允许你修改操作的环境参数。默认情况下，“使用运行操作的选项”复选框是勾选状态，这在大多数情况下是首选。就像在任何测试场景中一样，保持测试环境与运行环境尽可能相似非常重要。\n\
  \n![images](img/0809.jpg)\n\n**图 8–9.** *修改测试操作的参数会导致与运行环境产生差异。*\n\n\n\n##### 认识\
  \ `OCUnit`\n\n`OCUnit` 是一款与 Xcode 绑定的 Objective-C 单元测试框架，用于编写单元测试。自 2005 年起，`OCUnit`\
  \ 就成为 Xcode 的一部分；它提供了一个简洁优雅的单元测试接口，类似于 Smalltalk 的 `SUnit` 和 Java 的 `JUnit`。该框架最初由\
  \ `Sente SA` 作为开源项目以 `SenTestingKit` 为名开发，因此框架中的许多类和宏仍保留着如“`ST`”和“`Sen`”这样的前缀，并且项目中链接的框架依然标记为“`SenTestingKit.framework`”。\n\
  \n要启用测试，你只需在测试目标中创建一个 `SenTestCase` 的子类。`SenTestCase` 是测试用例（也称为测试夹具）的基类，也是 `SenTestingKit`\
  \ 中你需要关注的唯一类。\n\n`SenTestCase` 遵循“约定优于配置”的理念。在 `SenTestCase` 的子类中，你以方法的形式提供测试，这些方法的选择器必须以“test”开头。运行时，`OCUnit`\
  \ 会自动检测这些子类，实例化它们，并按顺序调用每个测试方法。每次测试调用前都会先调用测试类的 `-setUp` 方法，之后调用 `-tearDown` 方法。重写这些方法可以让你设置和配置测试所需的环境。需要注意的是，测试执行的顺序是未定义的，并且无法在\
  \ `-setUp` 或 `-tearDown` 中得知即将运行哪个测试。\n\n一个不能失败的测试就算不上测试。在 `SenTestCase` 中，抛出异常即表示测试失败。如果测试在执行结束时没有抛出任何异常或其他崩溃情况，则视为成功。显然，你想测试的内容并非都与崩溃相关。这时就需要断言（也称为\
  \ assert）登场了。如果你还不熟悉断言，写完第一批测试用例后你就会熟悉了。断言是一个函数（通常定义为宏），它评估一个条件，并在条件为假时抛出异常。通常，断言函数还提供通过日志或生成错误信息来表达异常细节的手段。Cocoa\
  \ 中最常见的断言类型是 `NSAssert`，它简单地评估一个布尔表达式，若为假则抛出异常。\n\n```\nNSAssert((1+1 == 2), @”这个断言会通过，这条消息永远不会被看到”);\n\
  ```\n\n`SenTestingKit` 框架提供了更多类型的断言，它们适用于各种场景。甚至有一种断言用于测试某段代码*确实*会抛出异常（正如你会了解到的，这比听起来有用得多）。`SenTest`\
  \ 断言以 `ST` 为前缀。从技术角度讲，它们是宏函数。这样做的好处是，你可以在 `SenTestCase_Macros.h` 中看到它们的大部分实现。下面列出了一些你应该熟练掌握的重要断言，以及它们的使用说明。完整列表可以在\
  \ `SenTestCase.h` 中找到。\n\n- `STAssertNotNil(a1, description, …)` 如果对象 `a1` 为 nil，则抛出异常。在测试应返回对象的方法时非常有用。另见\
  \ `STAssertNil()`，其作用完全相反。\n- `STAssertTrue(expression, description, …)` 如果表达式计算结果为\
  \ false，则抛出异常。这本质上与使用 `NSAssert()` 相同，区别在于它会报告为测试失败，而 `NSAssert()` 只会停止执行。该函数的互补函数是\
  \ `STAssertFalse()`。\n- `STAssertEquals(a1, a2, description, …)` 如果值 `a1` 和 `a2`\
  \ 不相等，则抛出异常。需要注意的是，如果传入两个值相同但不同的对象（例如两个值都为“Hello World”的不同 `NSString`），它们不会被判定为相等，因为对象是唯一的。如果传入指向同一对象的两个指针，则判定为真。要测试不同对象的相等性，请使用\
  \ `STAssertEqualObjects()`。\n- `STAssertNoThrow(expression, description, …)` 如果表达式（通常是对对象的方法调用）抛出异常，则会触发失败。此函数及其对应函数\
  \ `STAssertThrows()` 是构建任何供第三方使用的框架时可能最有用的断言。例如，如果你的框架中某个方法需要非 nil 参数，你可以使用 `NSAssert()`\
  \ 来检查其值。那么两个极佳的单元测试就是：使用 `STAssertNoThrow()` 进行有效调用（传入非 nil 参数），以及使用 `STAssertThrows()`\
  \ 进行无效调用（传入 nil 参数）。理解 `STAssertThrows()` 很重要，因为它一开始可能会让你觉得反直觉。当方法失败时，你的测试反而通过了！\n\
  - `STFail(description, …)` 不是断言。它是一个全能函数，无论什么情况都会导致测试失败。当所有断言函数都不适用时可以使用它。例如，如果你在编写一个测试来检查优雅失败方法返回的错误码值，你可以使用\
  \ switch-case 块根据枚举的错误码执行相应的测试。在该块的 default 情况下，你可能需要调用 `STFail()` 来确保未识别的错误码不会被引入你的对象。\n\
  \n##### 有 Bug 的代码\n\n为了准确解释单元测试的工作原理，让我们从一个简单的例子开始。下面是 `SimpleCalculator` 类。它有两个方法。一个方法将两个整数相加并返回结果，另一个方法将两个整数相减并返回差值。至少，这应该是它们的功能。为了演示目的，我引入了一个相对明显的错误。在第二个方法中，我不是对两个参数进行相减，而是将它们相加。看来有人一直在复制粘贴代码。\n\
  \n以下是 `SimpleCalculator` 类的头文件：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
  \ SimpleCalculator : NSObject\n\n- (int)resultOfAdding:(int)foo to:(int)bar;\n-\
  \ (int)resultOfSubtracting:(int)foo from:(int)bar;\n\n@end\n```\n\n以下是实现文件：\n\n\
  ```\n#import “SimpleCalculator.h”\n\n@implementation SimpleCalculator\n\n- (int)resultOfAdding:(int)foo\
  \ to:(int)bar {\n        return (foo + bar);\n}\n\n- (int)resultOfSubtracting:(int)foo\
  \ by:(int)bar {\n        return (foo + bar);\n}\n\n@end\n```\n\n\n\n#### 编写测试\n\n\
  在编写测试之前，重要的是要考虑实际需要测试什么。对于这个过于简单的类，似乎只需要一些非常简单的测试，但事实未必如此。我可能需要测试每个方法，但应该用哪些数据呢？让我们看几个示例测试。\n\
  \n**注意：** 务必牢记，测试用例目标本身也是目标，任何必需的源文件都必须包含在该目标中才能使用。因此，你必须记得在测试目标的“编译源文件”（Compile\
  \ Sources）阶段中包含实现文件（例如 `SimpleCalculator.m`）。\n\n以下是我的测试用例类的接口。它非常简单，只有一个局部变量，用于保存计算器实例：\n\
  \n```\n#import <SenTestingKit/SenTestingKit.h>\n#import “SimpleCalculator.h”\n\n\
  @interface SimpleCalculatorTests : SenTestCase {\n        SimpleCalculator *myCalculator;\n\
  }\n\n@end\n```\n\n其实现也同样简单。在 `-setUp` 中，我创建了一个 `SimpleCalculator` 类的实例。在 `-tearDown`\
  \ 中，我释放该实例。此外还有两个测试方法：`-testAddition` 和 `-testSubtraction`，分别测试 `SimpleCalculator`\
  \ 的相应方法。每个方法都使用 `STAssertEquals()` 宏来将测试结果与期望值进行比较。\n\n**注意：** 编写测试时，正确管理内存至关重要。在单元测试中引入内存泄漏可能会产生极难诊断的\
  \ bug。\n\n```\n#import “SimpleCalculatorTests.h”\n\n@implementation SimpleCalculatorTests\n\
  \n- (void)setUp {\n        myCalculator = [[SimpleCalculator alloc] init];\n}\n\n\
  - (void)tearDown {\n        [myCalculator release];\n}\n\n- (void)testAddition {\n\
  \        int result = [myCalculator resultOfAdding:2 to:3];\n        STAssertEquals(result,\
  \ 5, @\"Addition of 2 and 3 failed. Expected 5, received\n%i\", result);\n}\n\n\
  - (void)testSubtraction {\n        int result = [myCalculator resultOfSubtracting:2\
  \ from:3];\n        STAssertEquals(result, 1, @\"Subtraction of 3 from 2 failed.\
  \ Expected 1, received\n%i\", result);\n}\n\n@end\n```\n\n**提示：** `STAssert` 函数与\
  \ `NSAssert` 类似，第一个参数接收测试条件，后续参数构成格式化字符串，用法类似于 `NSLog` 或 `--stringWithFormat`。\n\
  \n#### 运行测试\n\n现在你已经把方案（scheme）配置好了，可以开始运行测试了。这部分很简单。首先，需要注意测试将在设备上执行，并使用方案下拉菜单中选定的\
  \ SDK 版本。一旦选定设备和 SDK，准备工作就完成了。在菜单栏中，只需选择“Product > Test”。\n\n运行测试时，Xcode 中会开始发生两件事。首先，你选定的模拟器或设备会启动并显示黑屏。在整个测试阶段，它只会显示黑屏。其次，调试面板会开始显示测试的输出（图\
  \ 8–10）。\n\n![images](img/0810.jpg)\n\n**图 8–10.** *失败也是一种成功！*\n\n这里数据很多。我们来稍微分析一下。\n\
  \n```\nTest Suite 'SimpleCalculatorTests' started at 2011-09-18 02:54:40 +0000\n\
  Test Case '-[SimpleCalculatorTests testAddition]' started.\nTest Case '-[SimpleCalculatorTests\
  \ testAddition]' passed (0.000 seconds).\n```\n\n测试套件已启动，第一个测试已运行并通过。它只用了 0 秒。\n\
  \n```\nTest Case '-[SimpleCalculatorTests testSubtraction]' started.\n/Users/jbradforddillon/Projects/Scratch/SimpleCalculator/SimpleCalculatorTests/SimpleCal\n\
  culatorTests.m:28: error: -[SimpleCalculatorTests testSubtraction] : '5' should\
  \ be equal\nto '1': Subtraction of 3 from 2 failed. Expected 1, received 5\nTest\
  \ Case '-[SimpleCalculatorTests testSubtraction]' failed (0.000 seconds).\n```\n\
  \n第二个测试可没有第一个那么幸运。它失败了（正如你所料），并且你在断言中包含的消息也被打印了出来。\n\n```\nTest Suite 'SimpleCalculatorTests'\
  \ finished at 2011-09-18 02:54:40 +0000.\nExecuted 2 tests, with 1 failure (0 unexpected)\
  \ in 0.000 (0.000) seconds\nTest Suite '/Users/jbradforddillon/Library/Developer/Xcode/DerivedData/SimpleCalculator-bwlxzmbadtykfsduvqohpzvqekjc/Build/Products/Debug-iphonesimulator/SimpleCalculatorTests.octest(Tests)'\
  \ finished at 2011-09-18 02:54:40 +0000.\nExecuted 2 tests, with 1 failure (0 unexpected)\
  \ in 0.000 (0.025) seconds\nProgram ended with exit code: 1\n```\n\n最后，你会看到测试结果的摘要。你的\
  \ SimpleCalculator 在 0.073 秒内完成了 1 对 1 的测试。好在 Xcode 会在“问题导航器”（Issue Navigator）中简化这些输出，将失败的测试显示为错误，并保留测试失败的描述（图\
  \ 8–11）。\n\n![images](img/0811.jpg)\n\n**图 8–11.** *所有测试失败信息都会显示在“问题导航器”中，同时包含断言记录的详细信息。*\n\
  \n\n\n#### 完善测试用例\n\n这些测试用例能够如预期工作。加法测试通过，减法测试失败。减法结果会得到 5 而不是 1，并且 `STAssertEquals()`\
  \ 函数会抛出异常。这些测试成功发现了你代码中的一个 bug。但这足够了吗？还远远不够。重要的是要记住，目标不仅仅是让测试通过，而是要编写优秀的代码。单元测试不应该只是需要克服的障碍；它们应该有助于厘清问题并塑造解决方案，从而使你能够高效且有效地编写代码。\n\
  \n那么，为什么这些测试用例还不够呢？以下是一种你可能会用来“修复”这些测试所发现 bug 的方法示例：\n\n```\n- (int)resultOfSubtracting:(int)foo\
  \ by:(int)bar {\n    return 1;\n}\n```\n\n搞定！只需一次按键，你的类就通过了所有测试！任务完成！可以发布了！\n\n\
  你在这里所做的，可以说是只见树木，不见森林——或者更确切地说，是为了测试而忽视算法。你需要更好的测试。你需要一个不会产生误报的测试。当你编写测试时，你对代码的工作原理已经有了先入为主的看法。在开始编写代码之前先编写测试，能让你在不被已有算法或设计束缚的情况下，拥有先见之明。当你正试图解决一个问题时，你会过于投入自己的解决方案，因此更有可能“东拼西凑”出一个能让测试通过的代码。花时间暂停一下，真正去思考一个组件或一段代码可能出错的所有情况，这将帮助你编写出更好的测试，从而帮助你编写出更好的代码。\n\
  \n那么，你可以如何改进你的测试呢？怎样才能让测试无法被绕过呢？看看这个：\n\n```\n- (void)testSubtraction {\n    int\
  \ foo = arc4random();\n    int bar = arc4random();\n    int dif = bar - foo;\n \
  \   int result = [myCalculator resultOfSubtracting:foo from:bar];\n    STAssertEquals(result,\
  \ dif, @\"Subtraction failed.\");\n}\n```\n\n通过使用 `arc4random()` 函数引入随机性，你使得预测预期结果变得不可能。通过这项测试的唯一方法，就是无论\
  \ foo 和 bar 的值是什么，都用 bar 减去 foo。\n\n让我们看看在编写代码之前如何编写测试。你将为 `calculator` 类添加一个方法，该方法将返回两个数字的商。首先，你将其添加到\
  \ `SimpleCalculator` 类的接口中。\n\n```\n- (int)resultOfDividing:(int)foo by:(int)bar;\n\
  ```\n\n接下来，你可以开始编写测试。由于该方法与加法和减法的方法类似，一个好的起点是遵循你为加法和减法方法采用的相同形式。\n\n```\n- (void)testDivision\
  \ {\n    int foo = arc4random();\n    int bar = arc4random();\n    int quot = foo\
  \ / bar;\n    int result = [myCalculator resultOfDividing:foo by:bar];\n    STAssertEquals(result,\
  \ quot, @\"Division failed.\");\n}\n```\n\n这个测试肯定能确保你数学运算的准确性。随机的值确保了你无法预测或干扰这个测试的结果。但它能测试你在编写这段代码时可能遇到的所有潜在问题吗？如果\
  \ bar 是 0 呢？你期望的结果应该是什么？\n\n这些就是你在编写测试时应该提出的问题类型。它们不仅有助于确保你覆盖了所有基础情况，还能帮助你明确那些或隐或现、你正试图解决的问题。当问题被清晰地定义，并且你针对它们编写了测试之后，解决方案就会变得更简单，也更容易识别。\n\
  \n让我们编写一个除以零的测试用例。为简单起见，假设这个用例应该通过断言抛出一个异常。你可能会问，当除以零本身已经会抛出异常时，为什么还要这样做。抛出你自己的异常能让你控制应用程序崩溃的方式，并允许你向开发者提供更多信息，告知他们究竟做错了什么。这也将给你一次机会来尝试另一个\
  \ `STAssert` 宏。\n\n你希望只有当尝试除以零抛出异常时，你的测试才通过。以下是使用 `STAssertThrows()` 来检测有效异常的方法：\n\
  \n```\n- (void)testDivisionByZero {\n    int foo = arc4random();\n    int bar =\
  \ 0;\n    STAssertThrows([myCalculator resultOfDividing:foo by:bar],\n        @\"\
  Divide by zero should have thrown\");\n}\n```\n\n`STAssertThrows()` 检测给定表达式是否抛出了异常。如果没有抛出异常，条件就为假，`STAssertThrows()`\
  \ 会抛出它自己的异常，导致测试失败。为了通过这个测试，你的代码必须在除数为零时抛出一个异常。\n\n既然你已经对你的代码必须做什么有了一个很好的（不仅仅是“不错的”）理解，你就可以开始编写代码了。\n\
  \n```\n- (int)resultOfDividing:(int)foo by:(int)bar {\n    NSAssert((bar != 0),\
  \ @\"Attempt to divide by zero.\n    You are likely to be eaten by a grue.\");\n\
  \    return (foo / bar);\n}\n```\n\n如果你现在运行你的测试，它们应该都能通过，并且你应该相当确信这个新功能是经过深思熟虑且充分测试的。\n\
  \n### 在你的应用中付诸实践\n\n既然你已经熟悉了 OCUnit，并且对如何编写优秀的测试有了不错的理解，那么你应该开始将你的新技能应用到 Super Checkout\
  \ 应用中。首先，为项目的 JSON 解析器 `SCJSONParser` 编写一个测试套件。\n\n\n\n#### 测试 `SCJSONParser`\n\n\
  Super Checkout 项目已经包含一个测试目标，其中带有默认初始化的 `SenTestCase` 子类 `Super_CheckoutTests`。你可以直接在这个类中编写所有测试，但这很快就会变得难以管理和混乱。较好的做法是让测试类与测试对象之间保持一一对应的关系。由于你即将测试\
  \ `SCJSONParser`，因此需要新建一个名为 `SCJSONParserTests` 的测试用例类。\n\n要创建新的 OCUnit 测试用例类，请选中测试用例组，然后从菜单栏中选择\
  \ `File` ![images](img/U001.jpg) `New` ![images](img/U001.jpg) `New File`。在文件模板对话框中，选择\
  \ Objective-C 测试用例类模板，然后点击 Next。将文件命名为 `SCJSONParserTests`，然后点击 Next。在点击 Create\
  \ 之前，请确保该文件关联到了正确的目标。勾选测试目标框（`Super CheckoutTests`），并取消勾选应用目标框。新的测试用例类将包含存根方法 `-setUp`\
  \ 和 `-tearDown`，但没有测试代码。此外，如果你检查 scheme 设置，会发现新类已被自动添加到测试列表中。\n\n由于你即将测试 `SCJSONParser`\
  \ 类，因此需要确保该类已包含在测试目标中。在项目导航器中选中该类，然后在文件检查器实用工具的 Target Membership 部分中勾选 `Super CheckoutTests`\
  \ 目标。由于 `SCJSONParser` 类依赖于 `SBJSON` 库，因此你还需要将这些类也包含进来。记住这一步很重要。Xcode 会为你管理大部分目标成员资格，因此当你需要自行管理时很容易忘记。\n\
  \n现在你可以开始为 JSON 解析器编写测试了。`SCJSONParser` 有两个方法：一个是初始化方法，另一个是便捷方法，用于返回解析器的自动释放实例。这两个方法都接收六个参数。该类没有公开属性。解析器通过\
  \ `SCJSONParserDelegate` 中定义的方法通知委托完成操作。你需要测试两个初始化方法以及一些 JSON 数据。由于 `SCJSONParser`\
  \ 是对 `SBJSON` 的封装，并且你对这个库相当熟悉，因此你不会测试解析功能本身。你主要关注的是测试以确保你的封装按预期工作：为解析器提供一个委托接口，并通过提供的请求类型和响应类型维护上下文。\n\
  \n此测试需要两个对象：解析器和一个符合解析器协议的对象作为委托。一种解决方案是让你的测试用例类充当解析器的委托。这不是一个好主意，因为这样做会让测试代理（即测试用例类）参与到测试中。为了确保获得准确的结果，你需要尽可能地将测试类与测试对象分开。你需要的只是一个简单的对象，它符合所需协议并将结果报告回测试用例。\n\
  \n#### 模拟对象\n\n当测试对象依赖于其他对象，或被设计为依赖于其他对象时，就会使用模拟对象。复合对象、委托模式对象和响应链对象都是很好的例子。模拟对象是一个极其简单、功能有限的对象。模拟对象的唯一目的是确认测试对象的功能，而不是提供自身的任何功能。你希望模拟对象足够简单，以避免在测试中引入任何缺陷。\n\
  \n一个好的模拟对象示例是简单的回显对象，也称为记录器对象。回显对象只需等待测试对象的输出并将其存储。然后你可以在测试用例中将接收到的输出与预期输出进行对比。你需要创建一个模拟回显对象来充当\
  \ JSON 解析器的委托，以便测试输出。\n\n在测试目标中创建对象与在其他目标中创建对象相同。你只需确保它关联到测试目标而不是应用目标。以下是 `MockJSONDelegate`\
  \ 对象的接口：\n\n```\n#import <Foundation/Foundation.h>\n#import \"SCJSONParser.h\"\n\
  #import \"SuperCheckoutRequestTypes.h\"\n\n@interface MockJSONDelegate : NSObject\
  \ <SCJSONParserDelegate>\n\n@property (nonatomic, copy) NSString *identifier;\n\
  @property (nonatomic, assign) SuperCheckoutResponseType responseType;\n@property\
  \ (nonatomic, copy) NSDictionary *parsedObject;\n\n@end\n```\n\n如你所见，这是一个非常简单的接口。该类继承自\
  \ `NSObject` 并遵循 `SCJSONParserDelegate` 协议。它有三个属性，用于存储解析器委托方法 `-parsingSucceededForRequest:ofResponseType:parsedObjects:`\
  \ 的三个输出值。其实现也同样简单。\n\n```\n#import \"MockJSONDelegate.h\"\n\n@implementation MockJSONDelegate\n\
  @synthesize identifier;\n@synthesize responseType;\n@synthesize parsedObject;\n\n\
  -(void)parsingSucceededForRequest:(NSString *)anIdentifier\n                  ofResponseType:(SuperCheckoutResponseType)aResponseType\n\
  \                       parsedObjects:(NSDictionary *)aParsedObject {\n        self.identifier\
  \ = aIdentifier;\n        self.responseType = aResponseType;\n        self.parsedObject\
  \ = aParsedObject;\n}\n\n@end\n```\n\n该对象尽可能简单。它遵循所需协议，并仅存储解析器发送给它的值。在你的测试中，你可以将这些值与预期输出进行核对，并评估结果。\n\
  \n由于 `SCJSONParser` 在初始化时接收所有必需的数据，并且你希望提供不同的数据集来观察其行为，因此你可能不应该使用 `-setUp` 或 `-tearDown`\
  \ 方法。你希望所有实例化工作都在测试本身中完成。因此，你的测试类接口相当普通。\n\n```\n#import <SenTestingKit/SenTestingKit.h>\n\
  \n@interface SCJSONParserTests : SenTestCase\n\n@end\n```\n\n由于你不会使用 `-setUp` 或\
  \ `-tearDown` 方法，可以直接将它们从类中移除。你的首要任务应该是测试有效的 JSON 输入。代码大致如下：\n\n```\n- (void)testParseWithValidJSON\
  \ {\n\n        MockJSONDelegate *mockDelegate = [[MockJSONDelegate alloc] init];\n\
  \n        NSString *testIdentifier = @\"testParseWithValidJSON\";\n        NSURL\
  \ *testURL = [NSURL URLWithString:@\"http://www.test.com\"];\n        NSString *jsonString\
  \ = @\"{ \\\"hello\\\" : \\\"world\\\" }\";\n        NSData *jsonData = [jsonString\
  \ dataUsingEncoding:NSUTF8StringEncoding];\n\n        SCJSONParser *parser = [[SCJSONParser\
  \ alloc] initWithJSON:jsonData\n                                delegate:mockDelegate\n\
  \                                connectionIdentifier:testIdentifier\n         \
  \                       requestType:SuperCheckoutCheckout\n                    \
  \            responseType:SuperCheckoutCheckoutResponse\n                      \
  \          URL:testURL];\n```\n\n\n\n`STAssertEqualObjects(mockDelegate.identifier,\
  \ testIdentifier,`\n`        @\"模拟委托未接收到传入的标识符\");`\n\n`STAssertEquals(mockDelegate.responseType,\
  \ SuperCheckoutCheckoutResponse,`\n`        @\"模拟委托未接收到传入的响应类型\");`\n\n`STAssertEqualObjects([mockDelegate.parsedObject\
  \ objectForKey:@\"hello\"],`\n`        @\"world\",`\n`        @\"JSON 解析不正确，或委托被赋予了错误的数据\"\
  );`\n\n`[parser release];`\n\n`}`\n\n让我们简要回顾一下。首先，你初始化了模拟委托对象。它无需任何配置，因为你只会在初始化期间将其传递给解析器。接着，你设置测试条件。你需要向解析器传入多个参数：一个标识符字符串、一个\
  \ URL 以及 JSON 数据。为简化起见，你提供了一个非常简单的 JSON 对象，其中只有一组键值对。最后，你用这些输入参数初始化 JSON 解析器。如果一切顺利，解析器应使用`SBJSON`解析传入的\
  \ JSON 数据，并将解析结果以及一些参考数据传递给模拟委托对象。\n\n你的断言会逐一测试模拟对象的属性是否与你传入的值匹配。如果输入与输出之间存在任何差异，则测试失败。对于\
  \ JSON 对象，你对结果数据做了一些假设。之所以能这样做，是因为你了解`SBJSON`的行为以及预期的结果。切记不要将问题复杂化，因为如前所述，你测试的是`SCJSONParser`，而非`SBJSON`库。\n\
  \n如果你运行这个测试，会发现它顺利通过。这完全在意料之中，因为你刚刚编写了一个测试用例来验证已有的功能。正如测试名称所示，该测试仅测试有效的 JSON 输入。你绝对应该包含一个针对无效输入的测试。\n\
  \n### 负面测试\n\n目前，你的`SCJSONParser`设计为直接传递`SBJSON`库的工作结果。因此，无效输入的结果是返回`nil`。针对无效输入的测试应验证模拟委托返回的是`nil`。其他参数应保持不变。这个测试与之前的测试非常相似，但有一些非常重要的变化。\n\
  \n```\n- (void)testParseWithInvalidJSON {\n\n    MockJSONDelegate *mockDelegate\
  \ = [[MockJSONDelegate alloc] init];\n\n    NSString *testIdentifier = @\"testParseWithInvalidJSON\"\
  ;\n    NSURL *testURL = [NSURL URLWithString:@\"http://www.test.com\"];\n    NSString\
  \ *invalidString = @\"Hello World\";\n    NSData *invalidData = [invalidString dataUsingEncoding:NSUTF8StringEncoding];\n\
  \n    SCJSONParser *parser = [[SCJSONParser alloc] initWithJSON:invalidData\n  \
  \                                                  delegate:mockDelegate\n     \
  \                                   connectionIdentifier:testIdentifier\n      \
  \                                           requestType:SuperCheckoutCheckout\n\
  \                                                responseType:SuperCheckoutCheckoutResponse\n\
  \                                                        URL:testURL];\n\n    STAssertEqualObjects(mockDelegate.identifier,\
  \ testIdentifier,\n                        @\"模拟委托未接收到传入的标识符\");\n\n    STAssertEquals(mockDelegate.responseType,\
  \ SuperCheckoutCheckoutResponse,\n                        @\"模拟委托未接收到传入的响应类型\");\n\
  \n    STAssertNil(mockDelegate.parsedObject,\n                        @\"JSON 解析器应因无效输入而返回\
  \ nil。\");\n\n    [parser release];\n}\n```\n\n如果你再次运行测试，会发现它们仍然通过。太棒了！你的代码完美无缺，对吧？\n\
  \n### 负面测试与有用的失败信息\n\n关于最后一个测试，有件事让我困扰：没有任何迹象告知委托 JSON 数据是无效的。即使输入一开始就是`nil`，你也会得到相同的结果。你真正需要的是一个错误状态。与其直接跳入代码实现，不如先编写一些测试来帮助你思考你希望解析器如何工作。\n\
  \n目前，`SCJSONParser`只有一个委托方法，用于指示成功。既然你使用了委托模式，也应利用它来指示错误。错误方法应传递相关的错误信息。`SBJSON`提供了一个方法，可以在必要时填充`NSError`实例，因此为了简单起见，你只需计划将其传递给委托。这可能有些超前，所以现在你只需在`SCJSONParser.h`中的委托协议里添加这个方法。\n\
  \n```\n-(void)parsingFailedForRequest:(NSString *)identifier\n        ofResponseType:(SuperCheckoutResponseType)responseType\n\
  \        error:(NSError *)error;\n```\n\n接下来，你需要修改`MockJSONDelegate`对象。首先，添加一个属性来存储`NSError`。\n\
  \n```\n// MockJSONDelegate.h\n@property (nonatomic, retain) NSError *error;\n\n\
  // MockJSONDelegate.m\n@synthesize error;\n```\n\n然后，实现新的委托方法。\n\n```\n- (void)parsingFailedForRequest:(NSString\
  \ *)aIdentifier\n        ofResponseType:(SuperCheckoutResponseType)aResponseType\n\
  \        error:(NSError *)aError {\n\n    self.identifier = aIdentifier;\n    self.responseType\
  \ = aResponseType;\n    self.error = aError;\n\n}\n```\n\n现在你的模拟委托已设置好，可以编写测试了。实际上，既然你已经有一个针对无效输入的测试，只需修改测试条件即可。让我们在`SCJSONParserTests.m`中为模拟委托的`error`属性添加一个检查。当输入无效时，`error`不应为`nil`。注意，不要移除任何其他断言。你仍需确保标识符和响应类型正确传递，而解析后的对象属性则必须为`nil`。\n\
  \n```\nSTAssertNotNil(mockDelegate.error,  @\"JSON 解析器应传递一个错误\");\n```\n\n就这样，你修改了模拟对象，并为错误情况添加了测试。下一步是运行测试并观察失败，以验证你的测试。控制台应显示类似如下的信息：\n\
  \n```\nTest Suite 'SCJSONParserTests' started at 2011-07-26 03:52:27 +0000\nTest\
  \ Case '-[SCJSONParserTests testParseWithInvalidJSON]' started.\n/Users/jbradforddillon/Projects/whilethis-Super-Checkout-a05a56c5c6396e8200a0bdf84a279406dc814ef0/Super\
  \ CheckoutTests/SCJSONParserTests.m:100: error: -[SCJSONParserTests testParseWithInvalidJSON]\
  \ : \"((mockDelegate.error) != nil)\" should be true. JSON parser should have passed\
  \ through an error\nTest Case '-[SCJSONParserTests testParseWithInvalidJSON]' failed\
  \ (0.001 seconds).\nTest Case '-[SCJSONParserTests testParseWithValidJSON]' started.\n\
  Test Case '-[SCJSONParserTests testParseWithValidJSON]' passed (0.000 seconds).\n\
  Test Suite 'SCJSONParserTests' finished at 2011-07-26 03:52:27 +0000.\nExecuted\
  \ 2 tests, with 1 failure (0 unexpected) in 0.001 (0.001) seconds\n```\n\n既然你有了一个失败的测试用例，就可以编写代码来满足它了。让我们看一下`SCJSONParser`当前的初始化方法：\n\
  \n```\n- (id)initWithJSON:(NSData *)jsonData\n                delegate:(id<SCJSONParserDelegate>)theDelegate\n\
  \                connectionIdentifier:(NSString *)requestIdentifier\n          \
  \      requestType:(SuperCheckoutRequestType)reqType\n                responseType:(SuperCheckoutResponseType)theResponseType\n\
  \                URL:(NSURL *)theURL {\n\n    self = [super init];\n```\n\n\n\n\
  ```objectivec\nif(self) {\n    //初始化内容\n    json = [jsonData retain];\n    identifier\
  \ = [requestIdentifier retain];\n    delegate = theDelegate;\n    requestType =\
  \ reqType;\n    responseType = theResponseType;\n    URL = [theURL retain];\n\n\
  \    //在此处执行 JSON 解析\n    SBJsonParser *parser = [[SBJsonParser alloc] init];\n\
  \    NSString *jsonString = [[[NSString alloc] initWithBytes:[json bytes]\n    \
  \                                length:[json length]\n                        \
  \            encoding:NSUTF8StringEncoding] autorelease];\n    parsedObject = (NSDictionary\
  \ *)[parser objectWithString:jsonString];\n    [parser release];\n\n    [delegate\
  \ parsingSucceededForRequest:requestIdentifier\n            ofResponseType:responseType\
  \ parsedObjects:parsedObject];\n}\n\nreturn self;\n}\n```\n\n正如前面所暗示的，您希望利用`SBJSON`库的错误处理机制，因此首先要做的便是将这一行调用\n\
  \n`parsedObject = (NSDictionary *)[parser objectWithString:jsonString];`\n\n替换为以下两行\n\
  \n`NSError *err = nil;`\n`parsedObject = (NSDictionary *)[parser objectWithString:jsonString\
  \ error:&err];`\n\n现在，如果在`SBJSON`内部解析失败，您已经捕获了该错误。接下来，您需要检查错误的状态，并向委托发送正确的消息。您将把委托回调包裹在`if…else`语句中，如下所示：\n\
  \n```objectivec\nif(err == nil) {\n    [delegate parsingSucceededForRequest:requestIdentifier\n\
  \            ofResponseType:responseType\n            parsedObjects:parsedObject];\n\
  } else {\n    [delegate parsingFailedForRequest:requestIdentifier\n            ofResponseType:responseType\n\
  \            error:err];\n}\n```\n\n再次运行测试，您会发现更改已生效，并且测试用例全部通过。太棒了！您刚刚升级了解析器对象，既没有破坏现有功能，也无需使用真实数据进行测试。\n\
  \n这里还可以编写更多测试。例如，当委托未完全实现委托协议时会发生什么？直接传递`SBJSON`的`NSError`可能会使您的代码与该库耦合过紧，因此您可能希望提供自己的错误数据。您可以针对所有这些情况编写测试，以推动开发走向更完整、设计更完善的解决方案。\n\
  \n单元测试是极具价值的工具，无论是作为 TDD 流程的一部分，还是仅用于在 QA 周期中帮助发现 Bug。开发一套优秀测试套件的显性成本，通常会被其在 Bug\
  \ 追踪和修复时间上带来的隐性节省所抵消。\n\n### UI 测试与自动化仪器\n\n单元测试能帮助您将应用程序分解为更小、独立且可测试的模块。而自动化 UI\
  \ 测试则允许您从整体上测试应用程序。通过编写用户操作脚本并验证预期结果，您可以构建一个测试库，从而在整个开发周期中监控应用程序行为和性能的变化。\n\n在开发工具中，自动化操作是通过\
  \ Instruments 中的自动化仪器（Automation Instrument）来完成的。自动化仪器允许您在模拟器或设备上录制、编辑和运行脚本。脚本使用\
  \ JavaScript 编写，并通过`UIAutomation`框架暴露的 API 进行调用。`UIAutomation`是核心服务层的一部分，它利用 UIKit\
  \ 的无障碍功能来遍历可见元素的层级结构。\n\n为了充分利用`UIAutomation`，建议您熟练掌握`UIAccessibility`协议，并在代码中加以运用。Interface\
  \ Builder 使这一过程变得极为简便，它提供了对`accessibilityLabel`属性及部分`accessibilityTraits`数据的直接访问。如果您的应用界面包含大量自定义控件或手势识别器，那么使用`UIAccessibility`向脚本接口指示视图对象所扮演的角色就显得至关重要。\n\
  \n**注意：** 设置自动化测试的一个额外好处是，它能促使您让界面更易于访问。这是开发应用中最容易被忽视，却又最重要的任务之一。\n\n`UIAutomation`\
  \ API 的根元素是`UIAElement`。`UIAElement`为所有界面元素提供了通用接口。该对象最实用的组件之一是其遍历方法。除了访问给定元素的父元素或子元素的方法外，`UIAElement`还允许您获取几种不同类型中的某一种子元素列表。例如，如果您有一个引用特定`UIView`的元素对象，您可以像这样获取该视图中包含的所有按钮：\n\
  \n`var buttons = myViewElement.buttons();`\n\n这会返回相关视图中所有被报告为按钮的子视图。也就是说，它会返回所有`accessibilityTrait`属性为`UIAccessibilityTraitButton`的子视图。`UIButton`默认设置了此属性，但如果您通过手势识别器或`UIResponder`方法使一个`UIView`可点击，则需要手动设置此特征，以便`UIAutomation`将其识别为按钮。\n\
  \n除了遍历功能，`UIAElement`还提供了在元素上执行手势和交互、检查元素状态、查看无障碍详情以及将元素记录到 Instruments 日志接口的方法。元素的交互功能对于测试复杂界面来说，也许是最有趣和最实用的。例如，如果您的界面包含一个可以在指定边界内增量拖动的元素，您可以使用`dragInsideWithOptions`方法进行测试。它可能看起来像这样：\n\
  \n```javascript\nelement.dragInsideWithOptions({\n    startOffset: { x: 0.0, y:\
  \ 5.0 },\n    endOffset: { x: 24.0, y: 5.0 },\n    touchCount: 1,\n    duration:\
  \ 1.5\n});\n```\n\n除了`UIAElement`，`UIAutomation`还提供了一个与 UIKit 组件相对应的对象库，以及一些 UIKit\
  \ 无法直接访问的内容，比如键盘的按键。\n\n除了界面交互，`UIAutomation`还提供了一些对象，使您的脚本能够与设备、应用、仪器，甚至运行测试的计算机进行交互。\n\
  \n\n\n`UIATarget` 让你能够访问当前正在交互的设备。该设备可能是模拟器，也可能是已连接的物理设备。通过此对象，你可以操作设备方向和加速计、模拟硬件按钮的按压、截取屏幕截图以及执行更多操作。\n\
  \n`UIAApplication` 会暴露正在运行的应用的相关信息，例如包标识符、版本、窗口等。此外，它还提供对应用级界面元素的访问权限。例如，`UIAlertViews`\
  \ 不会显示在视图层级中，而是显示在应用层级。你可以使用 `UIAApplication` 来响应弹窗、操作列表、状态栏等。\n\n`UIALogger` 是一个基础的日志记录对象，能够记录多种不同类型的消息，包括通过/失败、调试信息和错误信息。\n\
  \n`UIAHost` 允许你在 Instruments 环境中，从上下文对主机计算机执行命令。\n\n作为 JavaScript 接口，仅需几行代码就能极其轻松地遍历复杂的层级结构。例如，你可以使用一行代码深入定位到某个屏幕上的特定按钮。假设该按钮的无障碍标签设置为“Hello\
  \ World”。\n\n`var button = UIATarget.localTarget().frontMostApp().mainWindow().buttons()[\"\
  Hello World\"];`\n\n如果未设置无障碍标签，你将无法以这种方式引用它。相反，你必须获取 `mainWindow` 的所有按钮，然后要么通过其他方式识别该按钮，要么直接指定按钮的索引。这两种方法都不稳定且不理想。\n\
  \n从 iOS 5.0 开始，自动化工具包含了一项功能：只需与目标设备交互即可录制脚本。脚本会使用我们一直在讨论的相同 UIAutomation 元素进行实时录制。因此，脚本是完全人类可读且可编辑的。结合对脚本接口的深入理解，此功能极其强大，将为你节省大量脚本编写时间。\n\
  \n### 开始使用\n\n首先，你需要构建应用以供分析。要利用新的脚本录制功能，你需要为 iOS 5.0 构建应用。将方案设置为 iPhone 5.0 Simulator，然后进入\
  \ `Product`![images](img/U001.jpg)`Profile`（或者直接按 ![images](img/U003.jpg)+I）。Instruments\
  \ 启动后，系统会要求你选择一个工具模板（图 8–12）。选择“自动化”模板，然后点击“Profile”。\n\n![images](img/0812.jpg)\n\
  \n**图 8–12.** *自动化工具可以与其他多种工具组合使用。*\n\n当工具加载完成后，它通常会自动开始录制并启动模拟器。如果你已经有写好的脚本，这能省下不少时间；不过你还没到那一步，所以现在可以先停止分析。\n\
  \n让我们来看看自动化工具（图 8–13）。详情视图包含一个侧边栏、一个编辑器面板和一个扩展详情视图。编辑器面板的跳转栏允许你在“跟踪日志”、“编辑器日志”和“脚本”视图之间切换。“跟踪日志”显示你从脚本中发布的调试数据。“编辑器日志”显示脚本执行过程。“脚本”视图则是你编写和录制脚本的地方。\n\
  \n右侧的详情视图显示来自详情视图的特定输出的详细信息。你还可以在这里看到测试失败时界面的截图。\n\n在左侧侧边栏中，你可以看到该工具的各种设置。这些设置分为四个部分：状态、脚本、脚本选项和日志记录。我们逐一进行介绍。\n\
  \n- *“状态”部分* 仅告诉你脚本当前是否正在运行。仅此而已。不过，双击侧边栏的这部分会在当前视图和“脚本”视图之间切换编辑器面板。\n- *“脚本”部分*\
  \ 允许你向当前工具添加或移除脚本。点击“添加”按钮可以创建新脚本或导入现有脚本。\n- *“脚本选项”部分* 让你选择是在工具开始录制时立即运行脚本，还是等待你手动启动。还有一个“暂停”按钮用于暂时停止当前脚本。\n\
  - *“日志记录”部分* 允许你选择日志记录的位置、导出当前日志以及截取当前应用状态的截图。\n\n![images](img/0813.jpg)\n\n**图\
  \ 8–13.** *随着脚本库的扩展，侧边栏的脚本部分将帮助你进行管理。*\n\n现在创建一个脚本。从侧边栏的“脚本”部分，点击“添加”按钮并选择“创建”菜单项。你会注意到“脚本”部分出现了一个“新脚本”项，并且编辑器面板已切换到“脚本”视图。要重命名你的脚本，只需双击侧边栏中的脚本项即可。\n\
  \n**注意：** 如果你已有现有脚本，或者想创建一个独立于 Instruments 的脚本库，你可以在文件系统中创建脚本，然后选择“导入”菜单选项来定位该脚本。\n\
  \n在编辑器面板中，你的脚本应该已经包含了一些代码。\n\n`var target = UIATarget.localTarget();`\n\n在编辑器底部，你会看到“播放”、“录制”和“停止”按钮。这些按钮控制脚本本身，与位于窗口左上角的\
  \ Instruments 应用自身的控制按钮不同。为了快速上手这个脚本，你需要使用录制功能。脚本录制需要 iOS 5.0 中提供的 UIAutomation\
  \ 版本，因此在此之前，你需要确保 Instruments 设置为在 iOS 5.0 下运行你的应用。\n\n\n\n尽管您为 iOS 5.0 构建了应用，但\
  \ Instruments 仍可在不同 OS 版本下模拟该应用，并且根据您的设置，它可能默认使用旧版本。为确保配置正确，您需要更改启动选项。从目标下拉菜单中选择“选项”，然后在“模拟器配置”部分选择“iPhone\
  \ - 模拟器 - iOS 5.0”（图 8–14）。请注意，在更改此配置前，务必先停止仪器。\n\n![images](img/0814.jpg)\n\n**图\
  \ 8–14.** *在多个 iOS 版本下测试用户界面非常方便。*\n\n一切准备就绪后，点击“录制”按钮启动模拟器。应用应自动启动。Super Checkout\
  \ 启动后，您就可以开始与之交互。操作时，您会看到脚本编辑器中开始填充 JavaScript 操作。这些操作被分解为多个令牌。点击这些令牌右侧的展开箭头将显示其他选项。稍后这将派上用场。您可以随时点击“录制”按钮停止脚本录制会话。然后，点击窗口左上角的“仪器会话录制”按钮（而非“脚本录制”按钮），您的脚本应开始在设备上回放。\n\
  \n**注意：** 如果点击“录制”按钮后无法启动应用，请确保模拟器未被其他进程占用。如果 Xcode 正在模拟器中调试应用，这可能会阻止 Instruments\
  \ 正常连接。\n\n让我们使用录制器编写一个实用脚本，并进一步了解 UI Automation JavaScript 库。从侧边栏中删除刚编写的脚本，新建一个名为“循环浏览产品”的脚本。开始录制新脚本。首先，从产品表格中选择一个产品。在产品详情视图中，点击“返回”按钮。您的脚本应类似如下：\n\
  \n```\nvar target = UIATarget.localTarget();\n\ntarget.frontMostApp().mainWindow().tableViews()[\"\
  Empty list\"].cells()[0].scrollToVisible();\ntarget.frontMostApp().mainWindow().tableViews()[\"\
  Empty list\"].cells()[0].tap();\ntarget.frontMostApp().mainWindow().navigationBar().leftButton().tap();\n\
  ```\n\n**注意：** 务必注意，由于自动化仪器会记录每一个 UI 事件，因此您的结果可能因与模拟器的交互方式不同而略有差异。\n\n![images](img/0815.jpg)\n\
  \n**图 8–15.** *自动化脚本的令牌在创建迭代脚本时非常有用。*\n\n如果您回放此脚本，它将精确执行您录制的操作，仅此而已。实用性不强，但这是脚本的一个良好起点。每个表达式中的元素令牌（图\
  \ 8–15）功能极为强大。点击令牌右侧的箭头将显示该令牌的选项。每个选项都是指向同一界面元素的另一种方式。例如，`cells()[0]` 可能等同于 `cells()[\"\
  First Cell\"]`，这两个选项都会出现在令牌中。如果您双击某个令牌，它将被转换为纯文本，您可以根据需要进行修改。\n\n您的目标是遍历所有单元格，并对表格中的每个产品执行相同操作。首先，需要将单元格获取为数组，以便将其长度用作\
  \ `for` 循环的边界。让我们从录制的某一行代码中提取，仅保留单元格数组，并将其存储到一个变量中。\n\n```\nvar cells = target.frontMostApp().mainWindow().tableViews()[\"\
  Empty list\"].cells();\n```\n\n接下来，编写一个简单的 `for` 循环，遍历这些单元格并对每个单元格执行录制的操作。为此，只需双击\
  \ `cells()[0]` 令牌，并将 0 替换为循环索引。\n\n```\nfor(var i = 0; i < cells.length; i++) {\n\
  \        target.frontMostApp().mainWindow().tableViews()[\"Empty list\"].cells()[i].scrollToVisible();\n\
  \        target.frontMostApp().mainWindow().tableViews()[\"Empty list\"].cells()[i].tap();\n\
  \        target.frontMostApp().mainWindow().navigationBar().leftButton().tap();\n\
  }\n```\n\n如果运行此脚本，应用应会启动，并依次处理表格中的每个产品。现在您已经有一个相当不错的迭代脚本了，但它并没有执行任何实际有用的操作。请结合所学内容，退一步思考，编写一个实用脚本来测试完整的用户流程。\n\
  \n### 编写用户界面测试脚本\n\n您决定为一系列相互关联的用户流程编写一组测试。这些流程包括：将产品添加到购物车、从商店进入购物车、结账、以及返回商店。这四个操作将各自以预期的界面状态作为验证依据进行测试。同时，您还希望能够衡量应用的性能并自动化重复性操作，从而无需手动测试。\n\
  \n以下是实现这一目标的脚本：\n\n```\nvar target = UIATarget.localTarget();\n\nvar cells = target.frontMostApp().mainWindow().tableViews()[\"\
  Empty list\"].cells();\n\nfor(var i = 0; i < cells.length; i++) {\n        UIALogger.logStart(\"\
  Opening product \"+i);\n        cells[i].scrollToVisible();\n        cells[i].tap();\n\
  \n        var productDetailsTable = target.frontMostApp().mainWindow().tableViews()[\"\
  Empty list\"].cells()[\"Add To Basket\"];\n        if(productDetailsTable == UIAElementNil)\
  \ {\n                UIALogger.logFail();\n        } else {\n                UIALogger.logPass();\n\
  \        }\n\n        UIALogger.logStart(\"Adding product \"+i+\" to cart\");\n\
  \        productDetailsTable.tap();\n\n        var cartButton = target.frontMostApp().mainWindow().navigationBar().rightButton();\n\
  \        var quantity = i + 1;\n\n        if(cartButton.label().search(\"(\"+quantity+\"\
  )\") == -1) {\n                UIALogger.logFail(\"Expected cart button to display\
  \ \"+quantity+\" items, but found \"+cartButton.label());\n        } else {\n  \
  \              UIALogger.logPass();\n        }\n}\n\nUIALogger.logStart(\"Opening\
  \ the cart\");\ntarget.frontMostApp().mainWindow().navigationBar().rightButton().tap();\n\
  \nvar storeButton = target.frontMostApp().mainWindow().navigationBar().rightButton();\n\
  \nif(storeButton.label().search(\"Store\") == -1) {\n        UIALogger.logFail(\"\
  Expected to find Store button in navigation item\");\n} else {\n        UIALogger.logPass();\n\
  }\n\nUIALogger.logStart(\"Checkout\");\nvar cartTable = target.frontMostApp().mainWindow().tableViews()[\"\
  Empty list\"];\nvar checkoutButton = cartTable.groups()[\"Checkout\"].buttons()[\"\
  Checkout\"];\ncheckoutButton.scrollToVisible();\ncheckoutButton.tap();\n\ntarget.delay(2);\n\
  \nif(cartTable.cells().length > 1) {\n        UIALogger.logFail(\"Checkout should\
  \ have emptied the cart, but cart still holds \"+cartTable.cells().length+\" cells\"\
  );\n} else {\n        UIALogger.logPass();\n}\n\nUIALogger.logStart(\"Return to\
  \ catalog\");\ntarget.frontMostApp().mainWindow().navigationBar().rightButton().tap();\n\
  \nvar cartButton = target.frontMostApp().mainWindow().navigationBar().rightButton();\n\
  \nif(cartButton.label().search(\"Cart\") == -1) {\n        UIALogger.logFail(\"\
  Expected to find Cart button in navigation item\");\n} else {\n        UIALogger.logPass();\n\
  }\n```\n\n我们来分解一下这个脚本的各组成部分。首先，与之前的示例类似，您需要设置一个 `for` 循环来遍历产品目录表格中的每个单元格。`UIAElementArray`\
  \ 的行为类似于传统的 JavaScript 数组，但有一个额外优势：您可以使用元素的标签属性从数组中检索它。`length` 属性提供了访问数组中 `UIAElement`\
  \ 数量的途径。\n\n```\nfor(var i = 0; i < cells.length; i++) {\n```\n\n\n\n在`for`循环中，你将执行两个测试场景。第一个测试是打开产品详情界面，第二个测试是将该产品添加到购物车。为了创建一个测试场景，你需使用`UIALogger`函数`logStart()`。该函数向测试工具指示你已开始一个场景，并将记录作为参数传入的消息。要结束测试场景，则调用`logFail()`或`logPass()`函数。根据调用的是这两个函数中的哪一个，场景将显示为通过或失败。`logFail()`函数还有一个额外特性：调用时会自动截图。该截图以及任何关于失败的信息都将在测试工具中可用。在测试场景内（即从`logStart()`到传递或失败调用之间）发生的所有调试日志和元素日志，都会在日志中被该场景包裹。\n\
  \n**注意：** 除了记录成功和失败，`logStart()`及相关日志函数还会在测试工具时间线中分隔反馈，以便你轻松识别通过和失败。此外，在时间线上拖动播放头会在详情视图中显示相关的日志消息。这对于将操作与其他测试工具的数据关联起来非常有用。\n\
  \n第一个测试将简单地滚动到目标单元格，点击它，然后查找标签为“Add to Basket”的单元格。如果找到该单元格，则产品详情已成功显示，测试通过。如果未找到该单元格，则必须使测试失败。需要指出的是，当测试失败时，脚本不会停止。它将继续运行，并为后续测试记录通过和失败。\n\
  \n```\nUIALogger.logStart(\"Opening product \"+i);\ncells[i].scrollToVisible();\n\
  cells[i].tap();\n\nvar addToCartCell = target.frontMostApp().mainWindow().tableViews()[\"\
  Empty list\"].cells()[\"Add To Basket\"];\nif(addToCartCell == UIAElementNil) {\n\
  \    UIALogger.logFail();\n} else {\n    UIALogger.logPass();\n}\n```\n\n接下来，你要测试将产品添加到购物车。你将点击“Add\
  \ To Basket”单元格。这会导致详情视图控制器从导航栈中弹出，并且购物车按钮会更新以显示新的数量。你应该能够通过测试购物车按钮的标签是否显示预期数量来判断此测试是通过还是失败。\n\
  \n```\nUIALogger.logStart(\"Adding product \"+i+\" to cart\");\naddToCartCell.tap();\n\
  \nvar cartButton = target.frontMostApp().mainWindow().navigationBar().rightButton();\n\
  var quantity = i + 1;\n\nif(cartButton.label().search(\"(\"+quantity+\")\") == -1)\
  \ {\n    UIALogger.logFail(\"Expected cart button to display \"+quantity+\" items,\
  \ but found \"+cartButton.label());\n} else {\n    UIALogger.logPass();\n}\n```\n\
  \n现在，既然你已经将所有产品添加到购物车，就可以打开购物车了。购物车视图的右侧导航栏按钮标签为“Store”，因此你将查找该标签以指示你已成功移动到该视图。\n\
  \n```\nUIALogger.logStart(\"Opening the cart\");\ntarget.frontMostApp().mainWindow().navigationBar().rightButton().tap();\n\
  \nvar storeButton = target.frontMostApp().mainWindow().navigationBar().rightButton();\n\
  \nif(storeButton.label().search(\"Store\") == -1) {\n    UIALogger.logFail(\"Expected\
  \ to find Store button in navigation item\");\n} else {\n    UIALogger.logPass();\n\
  }\n```\n\n最后，你可以结账。你将找到标签为“Checkout”的按钮，滚动到它，然后点击它。这会导致表格以动画方式清空。一旦表格清空，你可以检查表格中单元格的数量。它应该只包含一个单元格，即标签为“Checkout”的那个。\n\
  \n你会注意到这里调用了`UIATarget`的`delay()`函数。该函数会将脚本暂停指定的秒数。因为你需要测试表格的单元格计数，而不是测试界面元素的存在或值，传统的超时方法无法生效。你需要给动画时间完成，然后再测试表格的单元格计数。如果单元格计数不符合预期，你需要记录一个失败（参见图\
  \ 8–16）。你无需记录表格单元格的内容，因为会自动截图供你稍后检查。每次记录失败时都会发生这种情况（参见图 8–17）。\n\n```\nUIALogger.logStart(\"\
  Checkout\");\nvar cartTable = target.frontMostApp().mainWindow().tableViews()[\"\
  Empty list\"];\nvar checkoutButton = cartTable.groups()[\"Checkout\"].buttons()[\"\
  Checkout\"];\ncheckoutButton.scrollToVisible();\ncheckoutButton.tap();\n\ntarget.delay(2);\n\
  \nif(cartTable.cells().length > 1) {\n    UIALogger.logFail(\"Checkout should have\
  \ emptied the cart, but cart still holds \"+cartTable.cells().length+\" cells\"\
  );\n} else {\n    UIALogger.logPass();\n}\n\nUIALogger.logStart(\"Return to catalog\"\
  );\ntarget.frontMostApp().mainWindow().navigationBar().rightButton().tap();\n\n\
  var cartButton = target.frontMostApp().mainWindow().navigationBar().rightButton();\n\
  \nif(cartButton.label().search(\"Cart\") == -1) {\n    UIALogger.logFail(\"Expected\
  \ to find Cart button in navigation item\");\n} else {\n    UIALogger.logPass();\n\
  }\n```\n\n![images](img/0816.jpg)\n\n**图 8–16.** *记住添加延迟以考虑自定义或非过渡动画。*\n\n![images](img/0817.jpg)\n\
  \n**图 8–17.** *调用`logFail()`会自动截图。这对于调试失败非常有用。*\n\n\n\n### 引入一个 Bug\n\n现在你已经拥有一个功能完备的自动化测试脚本，可以成功测试指定的用户流程，我们来看看它的价值所在。与单元测试不同，在应用程序构建完成之前编写自动化脚本虽然并非完全不可能，但极其困难。你确实应该记录并规划好用户旅程和界面，完全可以基于这些文档编写脚本，但手工编写脚本可能非常繁琐。自动化界面测试的主要用途是维护用户流程的完整性，在开发过程中剔除回归性错误，以及进行性能测试。让我们看看你的测试如何在应用中实现这一目标。\n\
  \n举个例子，假设你采用了一种新的日志格式，需要更新应用中所有使用的 `NSLog` 函数。你正在处理 `ProductDetailsViewController`。当\
  \ API 引擎通知你已收到将产品添加到购物车的请求时，你会发布一条通知并记录一条日志信息。这部分需要重新设计，而在开发过程中，你无意中犯了一些小错误。\n\n\
  在你修改之前，该方法看起来是这样的：\n\n```\n-(void) cartContentsReceived:(NSDictionary *)cart forRequest:(NSString\
  \ *)connectionIdentifier {\n        NSLog(@\"Shopping cart contents: %@\", cart);\n\
  \        NSNotification *note = [NSNotification notificationWithName:@\"CartUpdated\"\
  \ object:[NSNumber numberWithInt:[[cart objectForKey:@\"items\"] count]]];\n\n \
  \       [[NSNotificationCenter defaultCenter] postNotification:note];\n\n      \
  \  [self.navigationController popViewControllerAnimated:YES];\n}\n```\n\n新方法原本只是打算增加更多日志记录，现在看起来是这样的：\n\
  \n```\n-(void) cartContentsReceived:(NSDictionary *)cart forRequest:(NSString *)connectionIdentifier\
  \ {\n        NSLog(@\"%s Shopping cart contents: %@\", __PRETTY_FUNCTION__, cart);\n\
  \        NSNotification *note = [NSNotification notificationWithName:@\"CartUpdated\"\
  \ object:[NSNumber numberWithInt:[[cart objectForKey:@\"items\"] count]]];\n\n \
  \       [[NSNotificationCenter defaultCenter] postNotification:note];\n\n      \
  \  NSLog(@\"%s Notification posted: %@\", __PRETTY_FUNCTION__, note);\n}\n```\n\n\
  你可能会注意到，旧方法和新方法之间存在一个主要的、不符合预期的差异。在你过度热情的日志记录工作中，你意外删除了方法的最后一行，即将当前视图控制器从堆栈中弹出。\n\
  \n这种错误用肉眼特别难以发现，因为它并不会表现为一个明显的错误。应用程序不会崩溃，商品依然会被添加到用户的购物车中，当用户点击返回按钮时，购物车按钮也已更新显示新数量。唯一改变的是用户体验。\n\
  \n现在，让我们在应用上运行该脚本，看看它能否帮你找到这个棘手的界面/回归性错误。按 Control+I 启动 Instruments 并设置一个 Automation\
  \ 工具。运行你之前运行过的脚本。一旦到达将产品添加到购物车的测试部分，脚本就会在导航栏中查找一个标签反映了新购物车商品数量的按钮。\n\n```\nvar cartButton\
  \ = target.frontMostApp().mainWindow().navigationBar().rightButton();\nvar quantity\
  \ = i + 1;\n\nif(cartButton.label().search(\"(\"+quantity+\")\") == -1) {\n    \
  \    UIALogger.logFail(\"Expected cart button to display \"+quantity+\" items, but\
  \ found \"+cartButton.label());\n} else {\n        UIALogger.logPass();\n}\n```\n\
  \n由于你意外修改了应用的流程，这个脚本将会失败。幸运的是，你会获得脚本失败瞬间的截图记录，以及一条指示哪里出错的提示信息。隔离出负责这部分代码并检查修订历史以找出改变之处，应该不会太困难。\n\
  \n### 自动化的力量\n\n除了发现错误和确保用户体验的完整性外，自动化还可以帮助你微调应用的性能。通过将其与其他 Instruments 工具结合使用，你可以详细了解应用在各种情况下的行为表现。为所有用户流程和用例编写脚本是一个绝佳的主意。当所有这些脚本都编写完成后，你可以结合\
  \ CoreData instruments 工具运行它们，以找到可能需要优化数据获取的地方。你可以添加 Allocations 工具来查看应用在任何给定时刻使用了多少内存，从而找出需要消除的可能有害的内存峰值（图\
  \ 8-18）。\n\n![images](img/0818.jpg)\n\n**图 8-18.** *将其他 Instruments 工具与 Automation\
  \ 结合使用，可以将数据与用户操作关联起来。*\n\n在开发周期早期就设置并使用自动化，并为所有用户交互编写脚本，从长远来看将带来巨大的回报，无论是更好的性能还是更高的可控性。\n\
  \n### 无论如何都要测试\n\n简而言之，这就是测试。你已经有了单元测试套件的雏形，你的 JSON 解析器包装器比开始时要好一些，并且你已经为自动化工具编写了大部分用例的脚本。诚然，这一切都非常临时。你真正需要的是一个测试策略。\n\
  \n你的测试策略是用来为混乱局面带来条理性的。正如你所见，无论测试能节省多少时间，设置测试本身需要时间。它可以为你带来很多好处，节省大量时间，但如果它总是事后才被想起，你就无法充分利用它。\n\
  \n无论你是 TDD 的坚定拥护者，还是只需要弄清楚为什么你的应用左右不停地泄漏内存，测试都是一项需要学习的重要技能，而 Xcode 和开发者工具将帮助你做到这一点。\n\
  \n"
