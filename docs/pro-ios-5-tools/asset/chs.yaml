  \ *构建错误*\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项，对给定的英文文本进行翻译。\n\n\n### 技术文档排版\n\n\
  当我们最初构建 Super Checkout 时，我们将所有 SBJSON 代码放在一个名为`SBJSON`的文件夹中。在`SBJSON`文件夹中的文件包括头文件`JSON.h`。如果您还记得，我们删除了那个文件夹及其所有文件。那么如何解决这个问题呢？\n\
  \n首先，头文件`JSON.h`在哪里？它在 SBJSON 静态库项目中（参见 Figure 11–23）。`JSON.h`仍然位于名为`SBJSON`的文件夹中。因此`SCJSONParser.m`中的`#import\
  \ \"SBJSON/JSON.h\"`行在技术上是正确的。但 Xcode 似乎不知道如何找到它。请注意，`SBJSON`和`Super-Checkout`文件夹彼此相邻。回想一下，就\
  \ Xcode 而言，所有项目文件应该位于`Super-Checkout`文件夹中，因此我们需要告诉 Xcode 也查看`SBJSON`文件夹内部。\n\n![images](img/1123.jpg)\n\
  \n**Figure 11–23.** *`JSON.h`的当前位置*\n\n返回导航窗格中的项目导航器。单击 Super Checkout 项目以打开项目编辑器视图，然后选择\
  \ Super Checkout 目标。选择构建设置选项卡，并确保选中全部视图设置。接下来，向下滚动并搜索具有搜索路径标题的构建设置组。该组的第一行应该标题为始终搜索用户路径。将此值从否更改为是（参见\
  \ Figure 11–24）。\n\n![images](img/1124.jpg)\n\n**Figure 11–24.** *开启始终搜索用户路径构建设置*\n\
  \n搜索路径构建设置组的最后一行应该是用户头文件搜索路径。双击此行，位于文本用户头文件搜索路径的右侧。应出现一个窗格。单击左下角的加号按钮，并在出现的行中输入`../SBJSON`（参见\
  \ Figure 11–25）。单击完成。字符串`../SBJSON`应出现在用户头文件搜索路径行上。\n\n![images](img/1125.jpg)\n\
  \n**Figure 11–25.** *添加用户定义的搜索路径*\n\n保存您的工作，并尝试再次构建。成功！\n\n对 ASIHTTPRequest 库重复此过程。添加库后，您可以删除导航窗格中的`ASIHTTPRequest`组（如果需要，您也可以删除`ExternalLibraries`组，以整理项目）。在用户头文件搜索路径构建设置中，输入`../ASIHTTPRequest`。\n\
  \n构建项目。这次发生了什么？\n\n问题导航器显示问题出在`SuperCheckoutAPIEngine.m`中。错误是“词法或预处理器问题‘`ASIHTTPRequest.h`’未找到。”嗯，修复对`SBJSON/JSON.h`有效，为什么对`ASIHTTPRequest.h`无效？\n\
  \n原因很简单。我们只需要在导入的`ASIHTTPRequest.h`前面加上其父目录。因此编辑`SuperCheckoutAPIEngine.m`，内容如下：\n\
  \n```\n#import \"SuperCheckoutAPIEngine.h\"\n#import \"SuperCheckoutRequestTypes.h\"\
  \n#import \"SCJSONParser.h\"\n#import \"Product.h\"\n#import \"ASIHTTPRequest/ASIHTTPRequest.h\"\
  \n#import \"ASIHTTPRequest/ASIDownloadCache.h\"\n#import \"NSString+UUID.h\"\n```\n\
  \n为什么我们需要添加`ASIHTTPRequest/`？我们告诉 Xcode 在`Super-Checkout`目录旁边的目录`SBJSON`和`ASIHTTPRequest`中查找。但是当我们导入（`#import`）头文件时，我们正在做两件不同的事情。`#import\
  \ \"SBJSON/JSON.h\"`表示导入位于目录`SBJSON`内的文件`JSON.h`。如果您查看`SBJSON`项目文件夹内部，您会看到另一个`SBJSON`文件夹。文件`JSON.h`在那里。`#import\
  \ \"ASIHTTPRequest.h\"`表示导入位于某处的`ASIHTTPRequest.h`文件。如果您查看`ASIHTTPRequest`文件夹内部，有另一个`ASIHTTPRequest`文件夹，其中`ASIHTTPRequest.h`位于那里。\n\
  \nSuper Checkout 现在应该可以构建了。\n\n### 使用工作区\n\n如前所述，Apple 在 Xcode 4 中引入了工作区的概念。工作区是多个相关项目的通用逻辑容器。通过使用工作区，您让\
  \ Xcode 管理工作区项目之间的显式和隐式关系。在我们的案例中，Xcode 将在我们构建 Super Checkout 应用程序时构建静态库。\n\n**注意：**\
  \ 请记住，您需要从我们在创建子项目之前制作的副本开始工作。如果您的 Super Checkout 应用程序项目将静态库作为子项目，那么您正在使用错误的项目。\n\
