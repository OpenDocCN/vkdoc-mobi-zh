- "# 网络、缓存与电源管理\n\n到目前为止，我们已经学习了如何清除内存泄漏，以及如何让界面在滚动和动画时减少卡顿。应用开始展现出精良应用应有的性能和表现，为正式上线做好了准备。下一步是什么？接下来就是网络部分。\n\
  \n在开发这些应用时遇到的问题是：我们在开发和调试时，大部分时间都处于高速网络连接状态。我们将研究一些工具来模拟缓慢和不稳定的网络，以便看到我们的应用在实际使用环境中的表现。\n\
  \n移动设备通过一个非常不可靠且相对较慢的网络进行通信（未连接 Wi-Fi 网络时）。这让我们作为软件开发人员的工作变得非常困难，因为我们需要使用一些非常复杂的技术来对用户隐藏这种复杂性。实现缓存方案就是一种非常常见的技术。\n\
  \n平衡实时数据和缓存是一个重大问题，学术界为此授予了许多博士学位，以寻找完美的技术方案。我们不打算研究缓存命中与未命中的理论，而是要看如何实现一个简单的缓存，以及在特定情况下应该使用哪种缓存。我们还将介绍一些为你提供了缓存功能的\
  \ API，以节省开发时间。\n\n最后，我们将研究应用在实际使用中消耗了多少电量。由于用户的设备依靠电池供电，我们必须非常关注电池续航，并理解我们的应用需要在\
  \ iOS 系统中做一个“好公民”。\n\n幸运的是，苹果和其他开发者为我们提供了一些出色的工具来完成所有这些任务。本章将讨论如何平衡实时数据和缓存，以及如何最大限度地利用设备电池。最终，你将能为\
  \ Super Checkout 找到一个良好的缓存方案，并更清晰地理解如何判断一个应用对电池续航的影响。\n\n### 理解网络与缓存控制\n\n大多数为 iOS\
  \ 平台编写的应用都涉及某种形式的网络通信。正因如此，理解如何设计服务器端的 API 以及如何使用这些服务变得至关重要。在 Super Checkout 中，消费\
  \ API 的代码已经开发好了。既然 API 已经存在，我们将花一些时间来探讨 API 设计背后的一些思路。\n\n#### 探索客户端 API\n\nSuper\
  \ Checkout 的客户端 API 在很大程度上基于 Matt Gemmel 的 `MGTwitterEngine`（`http://instinctivecode.com/`）。该\
  \ API 设计背后的思想可以用图 6–1 来最好地描述。其基本架构是让所有网络代码都流经一个单一对象。这个对象可以作为控制器的一个属性存在，也可以作为单例存在，但我建议为每个控制器都创建一个独立的引擎实例。\n\
  \n![images](img/0601.jpg)\n\n**图 6–1.** *Super Checkout 的基本网络架构*\n\n在我们深入探讨 API\
  \ 引擎的功能之前，先考虑一下没有这种设计模式的应用会是什么样子。图 6–2 展示了这种可能性。\n\n![images](img/0602.jpg)\n\n\
  **图 6–2.** *没有 API 引擎的应用程序*\n\n图 6–1 和图 6–2 之间的差异非常细微，但重要到值得我们花时间讨论。\n\n由于 `NSURLConnection`\
  \ 和 `ASIHTTPRequest`（后面会详细介绍）功能强大且易于使用，很容易让人直接在控制器逻辑中使用这些 API。但这会在特定的 Web 服务和你的应用之间引入耦合。这正是\
  \ API 引擎被创建并插入到控制器和互联网之间的原因。\n\n通过解耦 Web 服务并将其抽象成独立的类，我们能够应对服务不可避免的变化。如果应用架构像图 6–2\
  \ 那样实现，那么每个受服务变更影响的控制器都需要更新。即使在像 Super Checkout 这样的小型应用中，这也可能变得繁琐且耗时，尤其是当模型发生改变时。\n\
  \n这个理念更像是一种指导原则，并非适用于所有情况。这种类型的软件架构是应用开发中最难的部分。目标是拥有一个可复用、自包含的组件，能够处理网络通信、性能良好，并且可以在整个应用中使用。\n\
  \n鉴于 Super Checkout 的简洁性和单一服务特性，我们决定采用一个包含在每个视图控制器中的单一引擎。你的应用会有些相似之处，也会有些不同。请分析具体问题，并基于此进行架构设计。\n\
  \n\n\n### 深入解析 Super Checkout 的 API 引擎设计\n\n与 Super Checkout 服务器端 API 通信的接口被设计为具有单一的网络组件接口。图\
  \ 6–3 展示了该 API 的公共接口。由于服务器接口简单，因此用一个类来处理与服务器的所有交互是合理的。如果服务更复杂，或者我们需要与更多服务通信，那么架构将完全不同。\n\
  \n![images](img/0603.jpg)\n\n**图 6–3.** *引擎的公共接口*\n\n`SuperCheckoutAPIEngine` 类的基本思路是发送请求并获取返回数据。因此，每个请求都遵循\
  \ 图 6–4 所示序列图中相同的路径。\n\n![images](img/0604.jpg)\n\n**图 6–4.** *从服务器检索产品列表的请求路径*\n\
  \n在后台，该引擎使用一个 `NSURLConnection` 子类（`SuperCheckoutHTTPURLConnection`）以及 `NSURLConnection`\
  \ 相关的类。引擎会持有每个连接，并将其与连接字典中的标识符关联起来。通过这种方式，我们可以同时发起多个请求，并能让委托回调引用到相应的请求。\n\n这是执行异步请求的基本公式，并消除了可能发生的任何阻塞。然而，这里有一个问题。`NSURLRequest`\
  \ 仍然在主线程上运行。它所做的只是将自身绑定到主线程的运行循环中，并在此运行循环处于默认运行模式时获取数据。这意味着当滚动视图正在滚动或任何其他操作将运行循环移出默认模式时，连接将无法接收数据。\n\
  \n如果你的应用程序需要接收正在传入的数据且不能等待，可以改而这样做：\n\n```\n//aRequest 已在上面分配和配置，someRunLoop 可以是主运行循环\n\
  //或另一个线程的运行循环\nNSURLConnection *connection = [[NSURLConnection alloc] initWithRequest:aRequest\n\
  \                                         delegate:self\n                      \
  \                   startImmediately:NO];\n[connection scheduleInRunLoop:someRunLoop\
  \ forMode:NSRunLoopCommonModes];\n[connection start];\n```\n\n然而，这种方法有不少注意事项。当在另一个运行循环上调度连接时，委托方法会在创建连接的同一线程上被调用。这导致使用\
  \ `NSURLConnection` 变得非常复杂，有时这种复杂性是不必要的。\n\n还有一个流行的网络库，它在后台使用 `CFNetwork` 层。这个库叫做\
  \ `ASIHTTPRequest`（[`http://allseeing-i.com/ASIHTTPRequest/`](http://allseeing-i.com/ASIHTTPRequest/)）。\n\
  \n#### 设置 `ASIHTTPRequest`\n\n在开始修改项目之前，创建一个新的 Git 分支，并将其命名为 `Networking_and_cache`。\n\
  \n设置 `ASIHTTPRequest` 很简单：下载源代码，将其导入项目，并添加一些库。要下载最新版本，请访问 [`http://allseeing-i.com/ASIHTTPRequest/`](http://allseeing-i.com/ASIHTTPRequest/)（撰写本文时的\
  \ URL 是 [`http://github.com/pokeb/asi-http-request/tarball/master`](http://github.com/pokeb/asi-http-request/tarball/master)）。\n\
  \n下载源代码后，解压 tar 文件，然后打开 Super Checkout 项目。在“External Libraries”组下，创建一个新组，并将其命名为\
  \ `ASIHTTPRequest`（参见图 6–5）。\n\n![images](img/0605.jpg)\n\n**图 6–5.** *为 `ASIHTTPRequest`\
  \ 创建组*\n\n接下来，我们要将该组与一个文件夹关联起来。展开工具区，然后选择新创建的组。在“文件检查器”选项卡（**View** ![images](img/U002.jpg)\
  \ **Utilities** ![images](img/U002.jpg) **File Inspector**）中，有一个按钮可以将此组与新文件夹关联起来（参见图\
  \ 6–6）。\n\n![images](img/0606.jpg)\n\n**图 6–6.** *调整组引用的路径*\n\n点击该按钮，将出现一个对话框，显示\
  \ `ExternalLibraries` 文件夹的内容。点击“New Folder”按钮，为 `ASIHTTPRequest` 代码创建一个新文件夹（参见图\
  \ 6–7），创建完成后，点击“Choose”将文件夹与组关联。\n\n![images](img/0607.jpg)\n\n**图 6–7.** *创建 `ASIHTTPRequest`\
  \ 组指向的新文件夹*\n\n现在我们已经将组与文件夹关联起来，可以导入源文件了。右键点击 `ASIHTTPRequest` 组，然后选择“Add Files\
  \ to Super Checkout”。这将弹出一个文件选择对话框。导航到你下载 `ASIHTTPRequest` 源代码的位置，然后进入 `Classes`\
  \ 文件夹。选择所有文件（使用 command-click 或 shift-click 选择文件），但不要选择目录中的文件夹。应选择以下文件：\n\n- `ASIAuthenticationDialog.h`\n\
  - `ASIAuthenticationDialog.m`\n- `ASICacheDelegate.h`\n- `ASIDataCompressor.h`\n\
  - `ASIDataCompressor.m`\n- `ASIDataDecompressor.h`\n- `ASIDataDecompressor.m`\n\
  - `ASIDownloadCache.h`\n- `ASIDownloadCache.m`\n- `ASIFormDataRequest.h`\n- `ASIFormDataRequest.m`\n\
  - `ASIHTTPRequest.h`\n- `ASIHTTPRequest.m`\n- `ASIHTTPRequestConfig.h`\n- `ASIHTTPRequestDelegate.h`\n\
  - `ASIInputStream.h`\n- `ASIInputStream.m`\n- `ASINetworkQueue.h`\n- `ASINetworkQueue.m`\n\
  - `ASIProgressDelegate.h`\n\n确保“将文件复制到目标位置”和“将文件添加到应用程序目标”的复选框都已勾选。点击“Add”按钮完成导入。\n\
  \n我们还没有完成文件添加。你需要包含位于 `External/Reachability` 文件夹中的可达性文件（`Reachability.h` 和 `Reachability.m`）。使用刚才执行的导入步骤，将它们导入到同一个组中。\n\
  \n接下来，将应用程序链接到以下框架：\n\n- `CFNetwork`\n- `SystemConfiguration`\n- `MobileCoreServices`\n\
  - `CoreGraphics`\n- `zlib`\n\n为此，在项目导航器中选择项目名称，然后在出现的面板的左窗格中选择应用程序的目标。在“Build Phases”选项卡中，我们将向“Link\
  \ Binaries With Libraries”阶段添加一些库。展开该部分，然后点击加号。将出现一个可用库列表（参见图 6–8）。选择前面列出的库（列表中的\
  \ `zlib` 对应 `libz.dylib`），然后点击“Add”。\n\n![images](img/0608.jpg)\n\n**图 6–8.** *向\
  \ Super Checkout 添加框架*\n\n链接构建阶段应如 图 6–9 所示。\n\n![images](img/0609.jpg)\n\n**图 6–9.**\
  \ *最终链接的库列表*\n\n现在，构建目标，并确保没有编译错误。\n\n\n\n#### 在超级结账中实现 ASI\n\n将 HTTP 请求代码抽象到其自身的类中的一个巨大好处是，能够更改请求代码的外观，而无需进行任何其他更改。我们将保持启动请求的模块与委托之间的契约不变，并彻底重构幕后代码。\n\
  \n准备好了吗？我们开始吧！\n\n打开 `SuperCheckoutAPIEngine.m`，并将 `#import` 部分更新为代码清单 6-1 所示的内容。\n\
  \n**代码清单 6-1.** *为我们的 API 引擎添加几个导入*\n\n```\n#import \"SuperCheckoutAPIEngine.h\"\
  \n#import \"SuperCheckoutRequestTypes.h\"\n#import \"SCJSONParser.h\"\n#import \"\
  Product.h\"\n#import \"ASIHTTPRequest.h\"\n#import \"NSString+UUID.h\"\n```\n\n\
  接下来，添加代码清单 6-2 中的宏。宏非常适合集中管理特定值，并且无需常量。\n\n**代码清单 6-2.** *为我们的 API 引擎添加宏*\n\n```\n\
  #define REQUEST_TYPE            @\"requestType\"\n#define RESPONSE_TYPE        \
  \   @\"responseType\"\n#define REQUEST_ID              @\"requestIdentifier\"\n\
  ```\n\n现在，我们将修改类扩展。类扩展是向类添加私有方法的好方法。将其修改为代码清单 6-3 所示的内容。\n\n**代码清单 6-3**. *我们修改后的类扩展*\n\
