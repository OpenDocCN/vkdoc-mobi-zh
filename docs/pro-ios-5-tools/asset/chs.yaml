  \                  0x318bb84b -[UITableView(UITableViewInternal)\nanimateDeletionOfRowWithCell:]\
  \ + 58\n        9   UIKit                        0x3193dfb5 -[UITableViewCell(UITableViewCellInternal)\
  \ deleteConfirmationControlWasClicked:] + 28\n        10  CoreFoundation       \
  \        0x330da571 -[NSObject(NSObject)\nperformSelector:withObject:withObject:]\
  \ + 24\n        11  UIKit                        0x31766ec9 -[UIApplication sendAction:to:from:forEvent:]\
