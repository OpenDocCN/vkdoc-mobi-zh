  \n### 总结\n\n本章我们涉及了大量内容！我们讨论了最新的编译器技术以及如何解决内存相关问题。现在，你可以把自己看作僵尸杀手和内存管工了。然而，这些成就只是解决\
  \ Super Checkout 问题的第一步。接下来要处理的是缓慢的用户界面，并优化我们的应用以实现流畅的转场和快速表格。是时候学习如何使用下一组可用的工具了。准备好了吗？很好，翻过这一页，开始吧！\n\
  \n## 第 5 章\n\n## 核心动画与平滑滚动\n\n没有什么比缓慢的用户界面更让人恼火的了。作为开发者，我们的职责是确保应用响应迅速且交互灵敏。这并非总是易事。算法可能变得复杂，运行时间超出预期。设计师会设计带有大量图形元素的复杂视图。两者结合，就很容易出现滚动时界面卡顿的情况。`UITableView`\
  \ 尤其容易出现这类问题。\n\n在本章中，你将学习如何设计高效运行的算法（或者说是模拟高效），以及如何设计视图以帮助设备自行计算动画，而非让视图本身承担计算负担。到本章结束时，Super\
  \ Checkout 的产品列表屏幕将滚动得飞快，而且你将掌握一些绝佳的视图设计技巧，避免图形处理器在渲染这些视图到屏幕时出现瓶颈。\n\n你即将踏上一段精彩的旅程。我们将涉及一些相当复杂的内容，所以请冲杯咖啡，准备出发。\n\
  \n\n### 利用主线程\n\n应用程序最重要的部分就是主线程，它是应用的心跳。了解主线程（也称为事件循环或运行循环）的工作方式及其在应用生命周期中的位置，是设计响应式应用的关键。为此，让我们看看应用是如何启动的，以及`UIApplication`实例创建和管理的运行循环。\n\
  \n我们首先要看的是`main.m`文件。在代码清单 1-1 中，你会看到 Super Checkout 中现有的`main.m`文件：\n\n**代码清单 5–1.**\
  \ *Super Checkout 的 main.m 文件*\n\n```\n#import <UIKit/UIKit.h>\n\nint main(int argc,\
  \ char *argv[]) {\n    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n\
  \    int retVal = UIApplicationMain(argc, argv, nil, nil);\n    [pool release];\n\
  \    return retVal;\n}\n```\n\n好吧，这个你已经见过很多次了。这是 Xcode 创建新项目时生成的默认代码。但它到底做了什么？我们逐行来看：\n\
  \n`NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];` 为应用创建了一个自动释放池。\n\
  \n`int retVal = UIApplicationMain(argc, argv, nil, nil);` 为应用创建了一个`UIApplication`的单例实例，加载`MainWindow`\
  \ nib 文件，最后启动主运行循环。加载 nib 文件会创建应用委托的实现实例，这样应用就能在生命周期中接收相应的通知。\n\n`[pool release];`\
  \ 释放自动释放池，以收回已分配并被自动释放的剩余内存。我们在第 4 章中讨论过这类自动释放池的相关问题。\n\n`return retVal;` 从函数返回，允许应用退出并向调用者发送返回码。\n\
  \n这些都是相当简单的内容，但我们的重点在于调用`UIApplicationMain()`。如前所述，这个方法创建了`UIApplication`单例实例，并连接好一切，使得应用委托被调用以设置初始视图，并将其添加到应用窗口中。之后，Cocoa\
  \ Touch 和 UIKit 接管，开始监听输入并绘制用户界面。\n\n![images](img/0501.jpg)\n\n**图 5–1.** *应用流程图，概述应用生命周期中的一些重要环节。*\n\
  \n#### 探索事件循环\n\n在开始查找性能不佳的代码之前，让我们详细看看事件循环。当你的应用启动时，会创建一个进程，并为该进程创建一个单线程。事件循环在这个线程中运行。如图\
  \ 5–1 所示，事件循环执行两项任务：响应输入和响应定时器。这个概念非常简单，但在实践中，当你想要创建一个保持响应性的应用时，事情就会变得复杂。定时器与输入源不同，它们基于时间计算触发，并由事件循环特殊处理。运行循环的第二个职责是响应输入源。像`NSURLConnection`这样的\
  \ API 在主线程上运行，并且在异步模式下运行时与事件循环关联。\n\n当某些事件发生时，比如调用`viewDidLoad:`或`touchesBegan:withEvent:`方法，你的代码会在主线程上执行，从而占用事件循环。通常，执行的代码很快，控制权会迅速交回它所属的地方。然而，有时这些代码可能需要相当长的时间来执行。\n\
  \n一直以来都有一条准则：“不要阻塞主线程。”在创建具有响应式用户界面的应用时，这绝对正确。但这种思维模式的一个注意事项是避免过早优化。唐纳德·克努斯曾说过：“我们应该忘记小的效率提升，大约\
  \ 97%的情况下都是如此：过早优化是万恶之源。”\n\n记住这一点，让我们深入看看 Super Checkout 出了什么问题。\n\n#### 优化代码执行\n\
  \n在本章的这部分，我们将深入探讨一些诊断（并希望修复）运行时间过长的代码的技术。为此，我们需要花点时间讨论如何解决这类问题。由于我们关注的是性能问题，我们需要在应用预期的运行环境中运行它。这意味着要在将要作为主要部署目标的设备上运行应用。\n\
  \n之后，我们需要编译应用并准备以发布配置运行。理想情况下，这意味着没有`NSLog`语句，并且是完全准备好发布的构建版本。获得这种受控环境是进行良好性能调优的关键。\n\
  \n那么如何设置呢？很高兴你问到！启动 Xcode，按照步骤创建一个名为 Performance Tuning 的新“主-从应用”项目。你不需要创建项目面板中的其他选项；我们只是将这个项目作为快速演示应用。\n\
  \n创建应用后，点击项目导航面板中的项目名称，在编辑器中打开项目设置。接着，点击这个新面板中的项目名称以显示项目设置。在“信息”标签页中，点击“配置”部分的加号，复制发布配置。将此配置命名为\
  \ Profile（见图 5–2）。\n\n![images](img/0502.jpg)\n\n**图 5–2.** *创建 Profile 配置*\n\n\
  我们这样做的目的是将 Release 配置（用于分发，如临时发布或 App Store 发布）与我们用于测试设备上运行的 Profile 配置分开。现在点击“构建设置”标签页。在“代码签名”部分，确保\
  \ Profile 条目设置了 iPhone Developer 设置。注意图 5–3 中，选择了“全部”项和“组合”项。\n\n![images](img/0503.jpg)\n\
  \n**图 5–3.** *为新 Profile 配置设置代码签名配置*\n\n**提示：** 为调试、性能分析、临时发布和分发发布设置不同的配置，确实有助于确保你使用的是合适的构建版本。调试配置可能定义了一些在发布配置中不需要使用的预处理器宏。此外，发布配置会设置一些编译器优化标志，从而生成运行更快的编译代码。通过复制发布配置来创建\
  \ Profile 配置，你可以确保编译器优化设置也被复制，从而能够看到你的代码在实际场景中的性能表现。\n\n\n\n##### 小插曲——关于目标（Targets）的一切\n\
  \n当我们在构建设置里摸索时，先简要聊聊项目设置、目标和方案之间的区别。在图 5-3 所示的构建设置中，你选择了“合并”选项。这将定义项目的构建配置。你可以在目标中覆盖这些设置。目标是构建的配置。它继承了项目级构建设置，你可以通过点击“构建设置”选项卡中的“层级”视图来查看。现在点击“性能调优”目标，然后点击“构建设置”选项卡。接着点击“层级”，并确保选中“全部”。在图\
  \ 5-4 中，你将看到生成的界面以及每个构建设置的继承关系。\n\n![images](img/0504.jpg)\n\n**图 5-4.** *目标直至最终解析（最终）设置的继承链*\n\
  \n你现在看到的是每个设置最终如何被 Xcode 解析。最右边是默认设置。当你向左扫描时，你会看到项目级设置，然后是带有最终解析值的目标设置。在这个视图中，项目和目标设置是可编辑的。\n\
  \n如前所述，我们简要地谈谈方案。我们之前打开过方案编辑器，即将再次打开它。我们还没有定义的是方案本身。方案是一个或多个目标如何组合在一起生成最终构建产物的方式。在这个层面上，关于方案需要了解的大致就是这些。\n\
  \n##### 回到性能分析\n\n继续下一步。现在，分析配置已经准备就绪，我们需要告诉分析方案使用这个配置。像我们在第 4 章中那样打开方案编辑器（通过**产品**\
  \ ![Images](img/U001.jpg) **编辑方案**）。点击“分析”操作，然后在“信息”选项卡中修改“构建配置”选项，使其使用我们刚刚创建的新配置（参见图\
  \ 5-5）。点击“确定”，我们就准备好开始了。\n\n**注意：** 在第 4 章中，我们通过 Instruments 运行了应用程序，但没有经历创建新构建配置的步骤。我们这样做是因为我们不是在设备上运行应用程序。所有测试都是通过模拟器进行的，所以不必担心代码签名问题。我们将要在设备上运行所有测试以获取真实的性能数据，因此需要担心在准备发布应用（ad\
  \ hoc 或上架 App Store）时会出现代码签名问题。这将会减少你遇到的麻烦。\n\n![images](img/0505.jpg)\n\n**图 5-5.**\
  \ *修改通过性能分析器运行应用程序的构建配置*\n\n现在配置问题已经解决，让我们实现一些代码来展示阻塞主线程的例子。打开 `MasterViewController.m`\
  \ 文件（由于 Xcode 的自动前缀功能，前缀可能有所不同），并将其修改为代码清单 5-2 所示。\n\n**代码清单 5-2.** *更新后的根视图控制器（用你的\
  \ MasterViewController 替换 RootViewController）*\n\n```\n#import \"RootViewController.h\"\
  \n\n@interface RootViewController()\n-(NSInteger) fibonacci:(NSInteger) term;\n\
  @end\n\n@implementation RootViewController\n\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n}\n\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  }\n\n- (void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear:animated];\n\
  }\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
  }\n\n- (void)viewDidDisappear:(BOOL)animated\n{\n    [super viewDidDisappear:animated];\n\
  }\n\n// 自定义表视图中的分区数量。\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
  {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return 35;\n}\n\n// 自定义表视图单元格的外观。\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n               cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n\
  \    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell =\
  \ [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell ==\
  \ nil) {\n        cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  reuseIdentifier:CellIdentifier] autorelease];\n    }\n\n    [[cell textLabel] setText:[NSString\
  \ stringWithFormat:@\"%i\", [self\nfibonacci:[indexPath row]]]];\n\n    // 配置单元格。\n\
  \    return cell;\n}\n\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\n\
  *)indexPath\n{\n}\n\n- (void)didReceiveMemoryWarning\n{\n    // 如果视图没有父视图，则释放它。\n\
  \    [super didReceiveMemoryWarning];\n\n    // 放弃对任何未使用缓存数据、图像等的所有权。\n}\n\n- (void)viewDidUnload\n\
  {\n    [super viewDidUnload];\n\n    // 放弃对任何可在 viewDidLoad 或按需重新创建的内容的所有权。\n  \
  \  // 例如：self.myOutlet = nil;\n}\n\n- (void)dealloc\n{\n    [super dealloc];\n}\n\
  \n#pragma mark - 私有方法\n-(NSInteger) fibonacci:(NSInteger) term {\n    if(term ==\
  \ 0) {\n        return 0;\n    } else if(term == 1) {\n        return 1;\n    }\
  \ else {\n        return [self fibonacci:term - 1] + [self fibonacci:term - 2];\n\
  \    }\n}\n\n@end\n```\n\n\n\n在运行应用之前，我们先简要了解一下当前的情况。简而言之，我们正在显示斐波那契数列的前 35 项。我选择斐波那契数列主要是因为前几项计算起来相对较快。随着项数增加，算法的递归性质会让表格变得有些迟缓。如果你的设备没有被选为部署目标，请在方案选择器中进行选择。试着在设备上运行该应用，并查看表格视图底部的性能表现。\n\
  \n底部的性能表现很糟糕，对吧？我们知道问题所在，现在来考虑如何使用 Instruments 诊断问题。在设备选中的情况下运行应用，然后像第 4 章那样，通过\
  \ **Product** ![Images](img/U001.jpg) **Profile** 或按下 ![Images](img/U002.jpg)I 附加\
  \ Instruments。另一种运行应用的方法是单击并按住窗口顶部的运行按钮，然后选择 Profile，如图 5-6 所示。\n\n![images](img/0506.jpg)\n\
  \n**图 5-6.** *当前方案可用的操作。*\n\n这将在应用启动前启动 Instruments，你会看到欢迎界面。选择 Time Profiler 模板，然后点击\
  \ Profile。应用在你的设备上启动后，向下滚动并观察 Instruments 窗口，它会显示一个直观的图表，展示正在发生的情况。查看图 5-7 以查看为我生成的图表。\n\
  \n![images](img/0507.jpg)\n\n**图 5-7.** *Time Profiler 显示每个方法所耗费的时间。*\n\n现在我们有了一个直观的图表，具体在看什么呢？Time\
  \ Profiler 工具会定时暂停你的应用，以记录每个线程的堆栈跟踪信息。这些收集到的信息能让你深入了解应用将大部分时间花在了哪些操作上，从而确定性能瓶颈。知道这一点后，我们再来看看图\
  \ 5-7 中呈现的信息。该表格显示了两列主要信息（请注意，右键单击表头可以启用其他列）。最左边一列显示了最右边一列中方法的运行时间。查看从上数起的第二项，我们可以看到大量时间花费在了\
  \ `fibonacci:` 方法上。\n\n我们预料到了这一点，收集到的数据也证实了这个假设。如果数据没有指示这一点，我们也可以解读数据来弄清楚具体情况。\n\
  \n那么，为什么 `fibonacci:` 方法会花费如此多的时间呢？按住 Option 键并单击 `[RootViewController fibonacci:]`\
  \ 左侧的展开指示器，查看递归的深度有多深。相当令人惊讶，不是吗？这让我们了解到该算法在此场景下的表现有多糟糕。那么，我们该如何修复呢？\n\n**提示：**\
  \ Option 单击展开三角形会展开该三角形的所有子项。这是一个操作系统级别的功能。\n\n解决这类问题有多种方法。问题可能纯粹是算法层面的，通过调整以改善运行时间或空间即可解决。也可能是方法层面的问题。如果算法无法改进且运行时间确实很糟糕，可将长时间运行的代码从主线程中分离出来（或交给\
  \ Grand Central Dispatch 处理），并显示加载指示器。你的用户会感谢你的。\n\n这不是一本关于算法和计算机科学的书，因此我们将跳过所有理论内容，直接给出答案，并附上简要的解释。首先，返回\
  \ Xcode，将 `fibonacci:` 方法更新为代码清单 5-3 所示。\n\n**代码清单 5-3.** *迭代式斐波那契实现不会产生递归实现中会遇到的堆栈问题*\n\
  \n```objc\n#pragma mark - 私有方法\n-(NSInteger) fibonacci:(NSInteger) term {\n    NSInteger\
  \ first = 0;\n    NSInteger second = 1;\n\n    if(term == 0) {\n        return first;\n\
  \    } else if(term == 1) {\n        return second;\n    } else {\n        NSInteger\
  \ actualTerm = 0;\n        for(int t = 1; t < term; t++) {\n            actualTerm\
  \ = first + second;\n\n            first = second;\n            second = actualTerm;\n\
  \        }\n\n        return actualTerm;\n    }\n}\n```\n\n我们在这里所做的，是将递归算法转换为迭代算法。这是解决该问题的一种纯算法方法。现在，既然我们有了一个潜在的解决方案，就再次通过\
  \ Time Profiler 分析应用。如果你仍然开着旧的 Instruments 会话，并且 Time Profiler 图标处于切换状态，请在 Instruments\
  \ 面板中打开，即可在当前运行的下方看到旧的运行记录。这样，你就可以执行相同的测试并查看最终结果。查看图 5-8 了解第二次运行的情况。\n\n![images](img/0508.jpg)\n\
  \n**图 5-8.** *这次运行看起来好多了。*\n\n从图 5-8 可以清楚地看到，`fibonacci:` 方法完全没有阻塞主线程。这验证了我们的解决方案，现在我们可以继续解决代码中的其他问题了。\n\
  \n\n\n### 改进产品屏幕\n\nSuper Checkout 中的产品屏幕滚动效果不佳。既然你之前已经学会了如何诊断类似问题，那我们不妨运行一下时间分析器，看看能否找出应用中的问题所在。\n\
  \n在此之前，我们需要在 `Memory_Fixes` 分支的基础上创建一个新分支，命名为 `Scrolling_Enhancements`。按照我们在第 4\
  \ 章中遵循的相同步骤操作，并确保你的工作副本位于新创建的分支上。Xcode 完成分支创建并且你可以编辑代码后，请确保设备已连接，并在方案选择器中将其选为部署目标。通过\
  \ Profile 操作运行应用，然后在 Instruments 中选择时间分析器工具。\n\n在 Instruments 中，上下滚动产品列表几次后看到的结果有点令人困惑（参见图\
  \ 5-9）。\n\n![images](img/0509.jpg)\n\n**图 5-9.** *我的代码在哪里被执行？*\n\n在斐波那契数列的例子中，我们的代码在哪里出了问题一目了然。但在图\
  \ 5-9 中，我们无法看到代码是在哪里执行的。为了排除所有后台运行的内容，请勾选调用树部分左侧的 `隐藏系统库` 复选框。这样你将看到一个类似于图 5-10\
  \ 所示的视图。\n\n![images](img/0510.jpg)\n\n**图 5-10.** *有问题的代码已被高亮显示。*\n\n通过选择 `隐藏系统库`\
  \ 复选框，我们过滤掉了所有干扰信息，从而能够发现哪一行代码行为异常。如图 5-10 所示，`imageReceived:forRequest:` 选择器存在问题。接下来，我们查看代码清单\
  \ 5-4 来分析该方法。\n\n**代码清单 5-4.** *你能在这个有问题的代码中找出瓶颈吗？*\n\n```\n-(void) imageReceived:(UIImage\
