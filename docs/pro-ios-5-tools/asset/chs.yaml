  ```objc\n@interface ProductDetailsViewController()\n@property (nonatomic, retain)\
  \ UIPopoverController *popoverController;\n@end\n```\n\n我们在这里所做的只是为来自 `UISplitViewController`\
  \ 的 `UIPopoverController` 创建一个本地属性。稍后我们会随其余合成的属性一起，使用 `@synthesize popoverController=_myPopoverController;`\
  \ 来合成它。我们也在合成新属性，但这并不太有趣，所以我只是在此提一下。\n\n下一个有趣的改动是：\n\n```objc\n- (id) initWithCoder:(NSCoder\
  \ *)aDecoder {\n        self = [super initWithCoder:aDecoder];\n        if(self)\
  \ {\n                apiEngine = [[SuperCheckoutAPIEngine alloc] initWithDelegate:self];\n\
  \        }\n        return self;\n}\n```\n\n这里，我们实现了 `initWithCoder:`，因为在 `MainWindow-iPad`\
  \ 的 nib 文件中，`ProductDetailsViewController` 是作为 nib 的一部分被加载的。由于我们受 nib 加载器的控制，因此必须实现\
  \ `initWithCoder:` 方法。该方法的其余部分与其他初始化方法基本相同。\n\n下一组改动位于 `dealloc` 方法中（请参见代码清单 10–6）。我们正在清理资源，并将对象从\
  \ `NSNotificationCenter` 的通知观察者中移除。这是因为稍后在该文件中，我们会开始监听 `NSNotificationCenter` 上的购物车更新。这些改动并不十分引人注目，但仍然值得一提。\n\
  \n**代码清单 10–6.** *非 ARC 项目中至关重要的 dealloc 方法。*\n\n```objc\n- (void)dealloc {\n  \
  \  apiEngine.delegate = nil;\n    [apiEngine release];\n    [selectedProduct release];\n\
  \    [productDetailsHeader release];\n    [productImage release];\n    [productNameLabel\
  \ release];\n    [productPriceLabel release];\n    [addToBasketCell release];\n\
  \    [quantityCell release];\n    [tableView release];\n    [_myPopoverController\
  \ release];\n\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\
  \    [shoppingCartButton release];\n    [super dealloc];\n}\n```\n\n接下来是选定产品的存取方法（请参见代码清单\
  \ 10–7）。由于我们现在需要处理 iPad 版本，并且控制器始终存在，因此我们更新了存取方法，以设置适当的视图属性，并让弹出视图控制器关闭。\n\n**代码清单\
  \ 10–7.** *选定产品的存取方法和更新的视图*\n\n```objc\n- (void) setSelectedProduct:(Product *)aProduct\
  \ {\n    [self willChangeValueForKey:@\"selectedProduct\"];\n    Product *oldProduct\
  \ = selectedProduct;\n    selectedProduct  = [aProduct retain];\n    [oldProduct\
  \ release];\n    [self didChangeValueForKey:@\"selectedProduct\"];\n    [[self tableView]\
  \ reloadData];\n    [apiEngine getImageForProduct:[selectedProduct image]];\n\n\
  \    [productNameLabel setText:[selectedProduct name]];\n    [productPriceLabel\
  \ setText:\n        [NSString stringWithFormat:@\"$%1.2f\", [[selectedProduct price]\
  \ floatValue]]];\n\n    [[self popoverController] dismissPopoverAnimated:YES];\n\
  }\n```\n\n在 `numberOfSectionsInTableView:` 方法中（请参见代码清单 10–8），当选定产品为 nil 时，我们返回 0。这是因为视图控制器将使用一个\
  \ nil 的选定产品来创建，而我们不希望在此显示任何 UI，因为没有什么可显示的内容。\n\n**代码清单 10–8.** *根据所选产品是否存在来改变表格的构建方式*\n\
  \n```objc\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {\n\
  \    if(selectedProduct == nil) {\n        return 0;\n    }\n    return 3;\n}\n\
  ```\n\n下一个重要的更新在代码清单 10–9 中；我们正在为类添加分屏视图支持，以确保我们的应用程序也能在 iPhone/iPod Touch 上正常运行。\n\
  \n**代码清单 10–9.** *向类添加分屏视图支持*\n\n```objc\n#pragma mark - 分屏视图支持\n\n- (void)splitViewController:(UISplitViewController\
  \ *)svc\n      willHideViewController:(UIViewController *)aViewController\n    \
  \          withBarButtonItem:(UIBarButtonItem *)barButtonItem\n          forPopoverController:\
  \ (UIPopoverController *)pc {\n    barButtonItem.title = @\"产品\";\n    NSMutableArray\
  \ *items = [[self.toolbar items] mutableCopy];\n    [items insertObject:barButtonItem\
  \ atIndex:0];\n    [self.toolbar setItems:items animated:YES];\n    [items release];\n\
  \    self.popoverController = pc;\n}\n\n// 当视图再次显示在分屏视图中时调用，使按钮和弹出视图控制器失效。\n- (void)splitViewController:(UISplitViewController\
  \ *)svc\n     willShowViewController:(UIViewController *)aViewController\ninvalidatingBarButtonItem:(UIBarButtonItem\
  \ *)barButtonItem {\n    NSMutableArray *items = [[self.toolbar items] mutableCopy];\n\
  \    [items removeObjectAtIndex:0];\n    [self.toolbar setItems:items animated:YES];\n\
  \    [items release];\n    self.popoverController = nil;\n}\n```\n\n这段代码为分屏视图控制器委托协议添加了支持。第一个方法在设备旋转为竖屏模式时被调用。它设置将要在\
  \ iPad nib 文件中使用的工具栏，并准备在竖屏方向显示的弹出视图控制器。第二个方法在设备旋转为横屏模式并即将显示完整的分屏视图控制器时被调用。它会移除按钮栏项，并禁用弹出视图控制器。\n\
  \n下一个重要的更新是在 `viewDidLoad` 方法中进行的。在此方法中，我们检查选定的产品是否为 nil，并用产品详情更新用户界面，并加载产品图片。方法的最后一部分是开始监听通知中心的购物车更新。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n接下来的更新在 `viewDidUnload` 方法中，这是非常标准的做法。将从\
  \ nib 加载的 outlets 设置为 nil，并将自身从通知中心移除为观察者，这撤销了在 `viewDidLoad` 方法中发生的一切。接下来被更新的方法是\
  \ `shouldAutorotateToInterfaceOrientation:`，它被更新为当运行应用的设备是 iPad 时返回 `YES`。\n\n上一节的内容相当简单，对这个文件接下来的（也是最后的）一组修改是：\n\
  \n```\n- (IBAction)cartButtonPressed:(id)sender {\n        ShoppingCartViewController\
  \ *cartVC =\n            [[ShoppingCartViewController alloc] initWithNibName:@\"\
  ShoppingCartViewController\" \n            bundle:nil];\n        [cartVC setDelegate:self];\n\
  \        UINavigationController *navController =\n            [[UINavigationController\
  \ alloc] initWithRootViewController:cartVC];\n\n        [navController setModalPresentationStyle:UIModalPresentationFormSheet];\n\
  \        [self presentModalViewController:navController animated:YES];\n\n     \
  \   [cartVC release];\n        [navController release];\n}\n\n#pragma mark - SCModalDelegate\
  \ Methods\n-(void) viewController:(UIViewController *)vc didFinishWithData:(id)\
  \ data {\n        [self dismissModalViewControllerAnimated:YES];\n}\n\n-(void) viewControllerDidCancel:(UIViewController\
  \ *)vc {\n        [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n第一部分是购物车按钮的操作，该按钮将放置在\
  \ iPad 版本的 nib 中。由于它仅适用于 iPad，我们可以针对 iPad 定制实现。最后两个方法实现了模态视图控制器的代理方法。这是一个很好的特定于设备实现的例子，其中为一个视图控制器加载了不同的\
  \ nib。在进行过渡或开发通用应用程序时，需要做出这类设计决策。\n\n最终的设计是让同一个视图控制器持有详细信息，这些详细信息有不同的 nib 文件来设置相应的\
  \ `IBOutlet`。这突显了 MVC 设计模式的优势之一。维护这个视图控制器将保持相对简单，更新用户界面也会很容易，并且不需要更改控制器。\n\n####\
  \ 为 iPad 版本创建产品详情 Nib\n\n产品详情界面的 nib 是 iPad 专用的。它与 iPhone/iPod Touch 界面共享相同的组件，但有一些细微的修改。图\
  \ 10–13 显示了 Super Checkout 在 iPad 上启动时将加载的最终 nib。注意，它与 iPhone/iPod Touch 的 nib 共享完全相同的单元格和其他元素，只有一个细微的差别——头部视图。对于\
  \ iPad，我们需要将图像和标签封装到一个视图中，然后用另一个视图将其包裹起来。这样，我们就可以让每个视图在表格中居中显示。\n\n![images](img/1013.jpg)\n\
  \n**图 10–13.** *iPad 的最终产品详情 Nib*\n\n要开始创建 nib，首先需要创建它。前往 File → New → New File，在显示的对话框中，在\
  \ iOS 部分下选择 User Interface，然后选择 Empty nib 图标（参见 图 10–14）。\n\n![images](img/1014.jpg)\n\
  \n**图 10–14.** *选择要创建的 nib 类型*\n\n点击 Next，在下一个界面中，为 Device Family 选择 iPad（参见 图 10–15）。\n\
  \n![images](img/1015.jpg)\n\n**图 10–15.** *为 nib 选择设备系列*\n\n点击 Next。将 nib 命名为 `ProductDetailsViewController_iPad.xib`，并确保将其保存到\
  \ ViewControllers 组中（参见 图 10–16）。\n\n![images](img/1016.jpg)\n\n**图 10–16.** *将\
  \ nib 保存到正确的组对于保持项目组织有序很重要。*\n\n对于这个新 nib，我们要做的第一件事是设置 File's Owner 代理。选择 nib 后，选择\
  \ File's Owner，以便在 Utility 区域的 Identity Inspector 中看到 Custom Class 部分（如果不可见，请展开它）。将类从\
  \ `NSObject` 更改为 `ProductDetailsViewController`。\n\n现在，我们要为视图控制器设置视图。在 Utility 区域的\
  \ Object Library 部分，选择 View (`UIView`)，并将一个实例拖到 nib 的预览区域。然后，拖入一个 Toolbar (`UIToolbar`)，并将其放置在视图的顶部。在工具栏内部，选择并删除左上角的按钮。接下来，拖入一个\
  \ Flexible Space Button Bar Item，在其右侧，拖入一个 Bar Button Item 并将其标题设置为 **Cart**（通过双击\
  \ Item 文本进行编辑）。视图配置的最后一步是拖入一个 Table View (`UITableView`) 到工具栏下方。在表格视图的属性检查器中，将样式\
  \ (Style) 下拉菜单设置为 Grouped，使其成为分组表格。最后，调整表格视图的大小以适合工具栏下方的区域。最终产品应如 图 10–17 所示。\n\n\
  ![images](img/1017.jpg)\n\n**图 10–17.** *为 iPad 配置好的主视图*\n\n由于我们使用的是与 iPhone/iPod\
  \ Touch 版本相同的界面元素，我们可以从 iPhone/iPod Touch 的 nib 中复制我们要使用的元素。最简单的方法是使用“助理编辑器 (Assistant\
  \ editor)”模式同时打开两个 nib。在 `ProductDetailsViewController_iPad` nib 编辑器打开的情况下，点击工具栏右侧的“助理编辑器\
  \ (Assistant editor)”。根据您的设置，助理编辑器将位于主编辑器的右侧或下方。无论哪种方式，您都可以使用助理编辑器的跳转栏 (Jump Bar)\
  \ 来选择要在助理编辑器中查看的合适文件（参见 图 10–18）。\n\n![images](img/1018.jpg)\n\n**图 10–18.** *使用跳转栏在助理编辑器中选择不同的文件*\n\
  \n使用跳转栏打开 `ProductDetailsViewController.xib`，并选择除表格视图之外的所有视图。将这些项目拖到 iPad 版本的 nib\
  \ 中，然后返回到标准编辑器视图。除了一个部分外，我们几乎完成了。\n\n\n\n从`Object`库（如果`Utility`区域不可见，请展开它）中拖动一个`UIView`对象。选择新的`UIView`实例，在`Attributes\
  \ Inspector`中，将背景颜色设置为`clear color`，并取消选中`opaque`复选框。在`Size Inspector`中，将宽度设置为`676`磅，高度设置为`160`磅。现在，让包含图像、产品名称和价格的视图成为新视图的子视图，并将其居中。使用自动吸附功能作为辅助。视图居中后，使用`springs\
  \ and struts`使其相对于父视图居中（参见图 10–19）。\n\n![images](img/1019.jpg)\n\n**图 10–19.** *使用`springs\
  \ and struts`对创建自动调整大小的视图非常有帮助。*\n\n**提示：** `Interface Builder`中的`springs and struts`配置只是设置`UIView`上的位掩码属性`autoresizingMask`。默认配置是将视图的左上角固定在其\
  \ frame 的原点。通过仅选择顶部边距（或在代码中设置）并使其在父视图的 frame 中居中，我们就能有效地使其在任何宽度下都保持居中。\n\n现在，我们已经在\
  \ nib 中拥有了界面元素，但仍然需要对其他视图进行一些配置。`Quantity Cell`需要将数量调整按钮和标签固定在右侧。通过仅选择`top margin`和`right\
  \ margin`选项，使用`springs and struts`来实现这一点。剩下的单元格，即带有`Add to Basket`标签的单元格，需要将其标签居中，并选择`top\
  \ margin`选项。\n\n界面元素配置完成后，我们可以将它们连接到视图控制器。图 10–20 显示了`File's Owner`在 outlets 和 actions\
  \ 方面的最终配置。并非所有界面元素都会被连接。\n\n![images](img/1020.jpg)\n\n**图 10–20.** *`File's Owner`的最终配置*\n\
  \n准备好连接视图了吗？好的，开始吧。首先，让我们连接`File's Owner`上的所有 outlets，从顶部开始：\n\n*   `addToBasketCell`是通用的表格视图单元格。\n\
  *   `productDetailsHeader`是包裹产品详情的大视图。\n*   `productImage`是`productDetailsHeader`中的`UIImageView`。\n\
  *   `productNameLabel`是`productDetailsHeader`中的名称标签。\n*   `productPriceLabel`是`productDetailsHeader`中的价格标签。\n\
  *   `quantityCell`是整个数量单元格。\n*   `shoppingCartButton`是工具栏右侧显示“Cart”的按钮。\n*   `tableView`是\
  \ nib 中的主（也是唯一的）表格视图。\n*   `toolbar`是主视图顶部的工具栏。\n*   `view`是包裹表格视图和工具栏的`UIView`。\n\
  \n接下来，将表格视图上的`dataSource`和`delegate` outlets 连接到`File's Owner`。最后一步是将`shoppingCartButton`的`sent\
  \ action`连接到`File's Owner`上的`cartButtonPressed:`选择器。现在所有内容都已连接完毕，可以开始工作了。\n\n####\
  \ 修改购物车视图控制器\n\n要修改的最后一个视图控制器是`ShoppingCartViewController`。我们需要进行的更改包括：更新“I'm done\
  \ looking at this”按钮，使其具有 idiom 感知能力，并更新结账按钮，确保其在视图中居中。\n\n我们需要做的第一件事是获取对结账按钮的引用。我们将在源文件中创建一个\
  \ outlet，并将其连接到 nib。为此，打开`ShoppingCartViewController.xib`，并启用助理编辑器。如果编辑器仍显示`Manual`选择，请转到`View`\
  \ ![images](img/U001.jpg) `Editor` ![images](img/U001.jpg) `Reset Editor`，将助理编辑器重置为`Automatic`选择。这将在助理编辑器中打开`ShoppingCartViewController.h`文件。\n\
  \n下一步是按住 Control 键将结账按钮拖拽到源文件中（参见图 10–21）。将新属性放在适当的位置，并使其成为一个名为`checkoutButton`的\
  \ outlet。\n\n![images](img/1021.jpg)\n\n**图 10–21.** *`Interface Builder`与`Xcode`的集成使得创建\
  \ outlets 变得容易。*\n\n由于使用了这种集成，`Xcode`将自动插入实例变量、合成属性，并在`dealloc`和`viewDidUnload`中放置相应的代码。\n\
  \n按`command+option+S`保存所有修改过的文件。接下来，打开`ShoppingCartViewController.m`，并在`viewDidLoad`中找到以下行：\n\
  \n```\nUIBarButtonItem *storeButton =\n    [[UIBarButtonItem alloc] initWithTitle:@\"\
  Store\"\nstyle:UIBarButtonItemStyleBordered\n                                  \
  \                              target:self\naction:@selector(backToStorePressed:)];\n\
  ```\n\n删除该行，并替换为以下内容：\n\n```\nUIBarButtonItem *storeButton = nil;\nif(UI_USER_INTERFACE_IDIOM()\
  \ == UIUserInterfaceIdiomPad) {\n    storeButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
  Done\"\nstyle:UIBarButtonItemStyleDone\ntarget:self\naction:@selector(backToStorePressed:)];\n\
  } else {\n    storeButton = [[UIBarButtonItem alloc] initWithTitle:@\"Store\"\n\
  style:UIBarButtonItemStyleBordered\ntarget:self\naction:@selector(backToStorePressed:)];\n\
  }\n```\n\n此部分更新了作为模态窗口工具栏右侧按钮显示的按钮类型，该模态窗口用于呈现用户的购物车。\n\n下一个要进行的更新在`shouldAutorotateToInterfaceOrientation:`中。在现有的`return`语句之前添加以下代码：\n\
  \n```\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {\n    return YES;\n\
  }\n```\n\n最后一个更新在`tableView:viewForFooterInSection:`中。在`return`语句之前，添加以下代码：\n\n\
  ```\nif(UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {\n    [checkoutButton\
  \ setAutoresizingMask:UIViewAutoresizingNone];\n    [checkoutButton setFrame:CGRectMake(30,\
  \ checkoutButton.frame.origin.y,\n        self.view.frame.size.width - 60, checkoutButton.frame.size.height)];\n\
  }\n```\n\n我们在这里所做的是将自动调整大小掩码设置为`none`，并重置按钮的 frame，使其与周围单元格匹配。\n\n### 收尾工作\n\n就这样！我们已经成功地将`Super\
  \ Checkout`更新为通用二进制应用。我们几乎重用了所有应用代码，仅需创建一个针对 iPad 的 nib 文件。我们刚刚经历的过程是转换其他现有应用使其同时在\
  \ iPad 和 iPhone/iPod Touch 上运行的良好开端。\n\n与任何新项目一样，关键步骤是第一步。设计应用并制定将现有应用转换为通用二进制应用的方案是最重要的阶段；剩下的只是实施和贯彻设计。\n\
  \n理想情况下，应用应作为通用应用进行设计和开发。这将减少需要实施的变通方案的数量。在开发应用时，脑海中应始终牢记“以通用为目标”这一要点。尽管你正在开发的应用可能仅运行在\
  \ iPhone/iPod Touch 上，但未来可能会要求将其移植到 iPad 上。\n\n实现一个为通用过渡做好准备的设计的最佳方法是减少在代码中创建的视图数量。如果必须在代码中创建视图，请避免硬编码尺寸。使用\
  \ idiom 检测 API 也是将特定代码块专门化到 iPad 或 iPhone/iPod Touch 的关键。在使用 nib 时，对于将在所有设备上使用的\
  \ nib，使用`springs and struts`来实现自动调整大小的视图也是一个好方法。\n\n现在，该应用已成为通用应用，我们可以将其部署给 beta\
  \ 测试者，继续追求更大更好的目标。提交更改，将该分支合并回主分支，并向你的测试者发送一个 beta 版本。既然他们一直在要求一个 iPad 版本，我相信他们会很高兴你倾听了他们的声音并如此迅速地开发出了解决方案。\n\
  \n\n\n### 总结\n\n现在，我们拥有了一款能够在 iPhone 和 iPad 上运行的通用应用程序。支持这两种设备系列可能会有些困难，但只要前期考虑周全，开发这款应用的速度会比开发两个独立的应用程序更快。\n\
  \n那么下一步是什么？到目前为止，本书已涵盖了几乎所有的必需主题，但我们还为你准备了更多惊喜。在第 11 章中，我们将探索如何与全世界分享你的杰作。在第 12\
  \ 章中，我们将讨论如何使用键盘在 Xcode 中导航以及至关重要的开发者工作流程。这些内容包含键盘快捷键以及其他改善工作流程的方法。我不知道你怎么样，但我是一个键盘快捷键爱好者。我喜欢只需按下几个键就能让应用执行许多任务。我希望你会发现第\
  \ 12 章中的技巧很有用，并且能够将这些内容融入到你的工作流程中。但首先，让我们先分享我们的应用。\n\n## 第 11 章\n\n## 我该如何分享这些内容？\n\
  \n现在，我们已经构建了 Super Checkout 的通用版本。我们可以打包我们的应用程序以提交到 App Store，然后看着金钱和赞誉滚滚而来。当然，我们还需要处理\
  \ bug 报告和添加新功能，但我们已经涵盖了如何处理这些问题。我们真正想做的是继续前进，创建下一个伟大的 iOS 应用程序。\n\n我们可以从头开始，但这很可能意味着要重复为\
  \ Super Checkout 所做的许多工作。一个简单的解决方案是将我们想从 Super Checkout 中使用的代码复制到新项目中。你可能已经意识到，这种方法存在许多问题。\n\
  \n例如，假设我们收到一个来自 Super Checkout 用户的 bug 报告，该 bug 涉及我们已复制到新应用程序中的部分代码。我们必须修复两套相同的代码（以及它们相关的测试）。当然，我们可以通过剪切和粘贴来修复。但在剪切和粘贴的过程中，我们可能会犯错。\n\
  \n我们需要弄清楚如何在最大化代码重用的同时，最小化冗余工作量。在 iOS 中实现这一目标的方法是使用静态库。在本章中，我们将把 Super Checkout\
  \ 的一些代码拆分到 Xcode 中的一个单独静态库项目中。然后，我们将把这个新的静态库项目集成到 Super Checkout 中。\n\n销售大量 Super\
  \ Checkout 副本可能对我们的钱包大有裨益，但这可能不会提升我们作为程序员的自我价值感。提升我们极客信誉的一种方法是将部分代码作为开源项目发布。这样，其他程序员就能看到我们的编程技能有多棒。真正的额外好处是分享我们的工作并提高代码质量。埃里克·雷蒙德在他的文章《大教堂与市集》（[`http://www.catb.org/~esr/writings/homesteading/cathedral-bazaar/`](http://www.catb.org/~esr/writings/homesteading/cathedral-bazaar/)）中提到：“足够多的眼睛，就可让所有问题浮出水面”，这暗示了以\
  \ Linux 项目创始人林纳斯·托瓦兹命名的林纳斯定律。他的意思是，源代码分发得越广泛，错误被发现和修复的速度就越快。为了分发我们的新静态库，我们将通过 GitHub（[`http://www.github.com/`](http://www.github.com/)）与世界分享，这是一个专注于简化代码共享的源代码仓库。\n\
  \n最后，我们将简要介绍几种你可以为新静态库采用的开源软件许可证，包括各自的优缺点。没有正确或错误的选择。你选择的许可证高度依赖于你的目标和意愿。\n\n###\
  \ 将代码拆分为静态库\n\n简单来说，静态库是编译后文件的存档。这些文件随后被链接到一个应用程序中，使其看起来像是库的源代码是应用程序的一部分。正如我之前所说，其主要目的是将应用程序代码拆分为可重用的包，以便在多个应用程序之间共享。\n\
  \n让我们来看看我们的 Super Checkout 应用程序。哪些代码应该被提取到静态库中？查看我们设置的分组，很明显，`ExternalLibraries`\
  \ 文件夹中的文件是很好的候选：`ASIHTTPRequest` 和 `SBJSON`（参见图 11--1）。\n\n![images](img/1101.jpg)\n\
  \n**图 11–1.** *Super Checkout 项目分组*\n\n**注意：** 我们的外部库代码库已经作为静态库和开源项目存在。你可以在它们对应的主页上阅读更多信息：[`http://allseeing-i.com/ASIHTTPRequest/`](http://allseeing-i.com/ASIHTTPRequest/)\
  \ (`ASIHTTPRequest`) 和 [`http://stig.github.com/json-framework/`](http://stig.github.com/json-framework/)\
  \ (`SBJSON`)。\n\n\n\n#### 创建静态库\n\n如果 Xcode 尚未运行，请启动它。创建一个新项目（依次选择 File ![images](img/U001.jpg)\
