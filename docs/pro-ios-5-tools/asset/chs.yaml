  \n\n### 使用静态库\n\n将部分 Super Checkout 代码拆分到 `SBJSON` 和 `ASIHTTPRequest` 这两个静态库中的目的之一，是为了促进代码复用。而开始复用的最佳场所莫过于\
  \ Super Checkout 项目本身。在开始之前，我们先讨论一下如何在 Super Checkout 中使用这些静态库。\n\n在 Super Checkout\
  \ 项目中使用静态库项目有两种不同的方法：子项目和工作区。\n\n子项目是嵌入到另一个项目中的项目。在 Xcode 中，这很容易实现。从逻辑上讲，这种方法很有道理：Super\
  \ Checkout 项目将依赖于 `SBJSON` 和 `ASIHTTPRequest` 项目。将这两个项目作为子项目嵌入 Super Checkout 中，在结构上会带来一些视觉上的清晰度。然而，采用这种方法时，需要解决一些配置问题。在讨论子项目方法时，我们会解决这些问题。\n\
  \n随着 Xcode 4 的发布，Apple 引入了工作区的概念。工作区是多个项目的逻辑容器。所有项目共享同一个构建目录。通过使用工作区，所有项目在构建时都可以使用彼此的构建产品。\n\
  \n子项目和工作区这两种方法各有优缺点。你应该选择最适合自己风格的方法。我会将两者都讨论一遍，以求全面。在开始之前，请备份所有三个项目（Super Checkout、SBJSON\
  \ 和 ASIHTTPRequest），这样如果你愿意，可以尝试这两种方法。\n\n### 将静态库作为子项目使用\n\n在 Xcode 中打开 Super Checkout\
  \ 项目。选择 File ![image](img/U001.jpg) Add Files to “Super Checkout”。当文件对话框出现时，导航到\
  \ `SBJSON` 文件夹，并选择文件 `SBJSON.xcodeproj`（参见 图 11–12）。确保“Copy items into destination\
  \ group's folder (if needed)”未被勾选。仅将其添加到 Super Checkout target。点击 Add。\n\n![images](img/1112.jpg)\n\
  \n**图 11–12.** *将 SBJSON 项目添加到 Super Checkout*\n\n`SBJSON` 项目应该会出现在导航窗格中的 Super\
