  \ 的最终产物。现在不再需要在代码中创建然后再通过 Interface Builder 进行连接——只需一步即可通过 Interface Builder 创建你的用户界面。\n\
  \n现在我们需要修改我们的 `RootViewController` 来启动新的视图控制器。如果你在头文件中注意到了，我们正在为委托声明一个协议。我们还需要告诉\
  \ `RootViewController` 它符合该协议，以便在模态视图控制器完成后能接收到相应的消息。\n\n让我们首先修改头文件以遵循该协议：\n\n`@interface\
  \ RootViewController : UITableViewController <NSFetchedResultsControllerDelegate,\
  \ NewPersonViewControllerDelegate>`\n\n现在我们将更新实现中的 `insertNewObject` 方法，如代码清单 2–4\
  \ 所示，以弹出新的视图控制器。我们不要忘记导入 `NewPersonViewController.h`。\n\n**代码清单 2–4.** 处理显示新创建的\
  \ `NewPersonViewController` 的 `insertNewObject` 选择器。\n\n```\n- (void)insertNewObject\n\
  {\n    NewPersonViewController *newPersonVC = [[NewPersonViewController alloc] initWithNibName:@\"\
  NewPersonViewController\" bundle:nil];\n    [newPersonVC setDelegate:self];\n  \
  \  [newPersonVC setManagedObjectContext:[self.fetchedResultsController managedObjectContext]];\n\
  \n    UINavigationController *navController = [[UINavigationController alloc] initWithRootViewController:newPersonVC];\n\
  \n    [self presentModalViewController:navController animated:YES];\n    [navController\
  \ release];\n    [newPersonVC release];\n}\n```\n\n最后一步是实现协议方法，如代码清单 2–5 所示。\n\n\
  **代码清单 2–5.** `NewPersonViewControllerDelegate` 协议实现\n\n```\n#pragma mark - NewPersonViewControllerDelegate\
  \ Methods\n-(void) viewController:(NewPersonViewController *)vc didSaveWithPerson:(Person\
  \ *)p {\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n-(void) viewControllerDidCancel:(NewPersonViewController\
  \ *)vc {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n我们已完成为该项目添加新的视图控制器。将更改提交到源代码控制，然后继续。\n\
  \n### 回顾我们目前的进展\n\n我们创建了一个超级简单的应用程序，它向 Core Data 存储中添加数据，并使用通过 Interface Builder\
  \ 构建的界面。大部分代码都是由系统为我们生成的，而且我们从未离开 Xcode。现在我们已经有了一个可以正常工作的应用程序和由源代码管理工具管理的源代码，让我们花点时间回顾一下我们所做的工作。\n\
  \n我们简要了解了新的开发工具，并且你已经看到了 Apple 为改进开发工作流程所做的一些增强。还有许多其他功能我们尚未触及，因此多花些时间熟悉环境并学习一些键盘快捷键。\n\
  \n我们在本章中创建的项目是一个极其简单的项目，不需要引用任何静态库。Xcode 4 支持一个工作区中的多个项目，而我们只使用了工作区中的一个项目。\n\n既然我们的应用程序可以工作了，让我们来看看如何启动我们的应用程序以使用\
  \ Instruments 进行分析。\n\n### Instruments 时间\n\n我们不会深入探讨 Instruments；那是本书剩余部分要讨论的主题。在本章中，我们将了解如何从\
  \ Xcode 启动 Instruments，以及有哪些不同的 Instruments 可用。\n\n你可以通过 **Product ![images](img/U001.jpg)\
  \ Profile** 来启动 Instruments，但我们将重点放在构建方案上，看看在构建应用程序时有哪些选项。图 2–13 显示了 Xcode 窗口中工具栏的左侧部分。在中间，你会看到用于启动应用程序的活动方案。如果单击下拉菜单，你会看到可用的方案，以及在每个方案内部的部署类型。目前，我们使用\
  \ iPhone 模拟器来运行所有内容。\n\n首先，一个方案是一个构建目标集合、一个要使用的配置以及一组要运行的测试的集合。方案可以在每个项目的基础上定义，也可以定义工作区范围的方案。如何设置这些取决于你的项目。在我们的\
  \ `Super Hello World` 项目中，我们有一个方案可以针对三个不同的目标运行。我们将在后面的章节中深入介绍方案。目标是指项目的构建和运行所针对的架构，图\
  \ 2–14 显示了在 iPhone 4 上构建的 `Super Hello World` 目标。\n\n![images](img/0214.jpg)\n\n\
  **图 2–14.** 方案下拉菜单指向项目可用的构建方案。\n\n继续在下拉菜单中点击 **Edit Schemes…**，查看运行应用程序的配置选项。可以对应用程序执行六种不同的操作：构建、运行、测试、分析、性能分析和归档。构建操作在你构建项目时执行。你可以根据方案修改构建的目标，并选择哪些其他操作可以在指定目标上运行。运行操作（参见图\
  \ 2–15）会将应用程序安装并运行在你选择的任何目标上。测试操作只是针对所选目标构建并执行单元测试目标。性能分析操作将在本节后面解释。分析操作会对你的代码运行静态分析器；我们将在后面的章节中介绍静态分析器。归档操作会构建适当的配置，打包构建产物以进行归档，并将其发送到\
  \ Organizer 的 Archives 部分以供进一步处理。\n\n![images](img/0215.jpg)\n\n**图 2–15.** 方案编辑器工作表显示在不同上下文中启动应用程序的不同选项。\n\
  \n现在，我们来处理性能分析操作。图 2–16 显示了展开性能分析操作后的方案编辑器。与所有其他操作一样，这里可以执行前置操作和后置操作；例如运行脚本或发送电子邮件。能够在性能分析操作前后执行操作在自动化构建过程中会非常有帮助。\n\
  \n看看图 2–16，它显示了用于性能分析而构建和运行应用程序的设置。在信息（Info）选项卡中，你可以更改使用的构建配置，使用不同的可执行文件，定义在成功构建后将启动的特定\
  \ Instruments，更改应用程序的工作目录，以及在应用程序运行期间更改 UI 分辨率。在参数（Arguments）选项卡中，你可以选择使用运行操作的参数，或者为性能分析定义特定的参数。\n\
  \n![images](img/0216.jpg)\n\n**图 2–16.** 方案编辑器中性能分析操作的配置工作表。\n\n\n\n#### 进入“ Instruments\
  \ ”工具\n\n好吧，我知道，我们还没进入 Instruments 工具；我们正在靠近它。如果方案编辑器窗口还开着，请点击“好”。现在，通过依次选择 `Product\
  \ ![images](img/U001.jpg) Profile` 来启动 Instruments，Xcode 会构建项目并启动 Instruments。启动后，您将看到如图\
  \ 2–17 所示的启动界面。\n\n如果您是在 iOS 设备上启动，您会看到更多可用的工具。在本例中，我们将对模拟器使用 `Leaks` 工具。在对话框中选择\
  \ `Leaks`，然后点击 Profile。\n\nInstruments 将会启动，并运行 `Leaks` 和 `Allocations` 工具。应用程序启动后，您会看到\
  \ `Allocations` 工具中出现一些峰值，这是对象在内存中被分配的表现。我们暂时不深入探讨这意味着什么，但您现在知道了如何从 Xcode 启动 Instruments。\n\
  \n![images](img/0217.jpg)\n\n**图 2–17.** *Instruments 的启动界面允许通过模拟器进行分析。在真实设备上进行分析将显示更多工具。*\n\
  \n#### 众多的 Instruments 工具\n\n`Instruments` 是一个诊断应用程序问题的强大工具。然而，学会如何有效使用其各种工具，才是调优应用程序使其高效运行的关键。在深入后续章节的众多工具之前，让我们先简要了解一下\
  \ `Instruments` 的用户界面，并对各种可用工具进行一个快速概览。\n\n图 2–18 展示了对本章应用程序的一次运行。顶部的工具栏让您可以开始或停止数据收集、连接到系统上运行的不同应用程序，以及执行其他高级任务来精简您收集的数据。“Instruments”部分显示了每个工具所收集数据的各种图表。在我们的示例中，检测到零泄漏，并且在应用程序启动初期内存分配有一个峰值。\n\
  \n![images](img/0218.jpg)\n\n**图 2–18.** *Instruments 对我们的“Super Hello World”应用程序运行了\
  \ `Allocations` 和 `Leaks` 工具*\n\nInstruments 窗格下方的区域显示了当前活动的工具，右侧是跳转栏。跳转栏下方的详细信息是来自所选工具的具体数据。点击\
  \ Instruments 窗格中的工具或在活动工具下拉菜单中选择它，都会改变数据的视图。请自行尝试，看看 `Leaks` 工具如果检测到泄漏会显示什么样的数据。\n\
  \n我们已经了解了 `Allocations` 和 `Leaks` 工具。还有其他许多工具可供使用：\n\n- **Activity Monitor（活动监视器）**：此工具监视系统整体活动和统计信息。这些统计信息包括\
  \ CPU、内存、磁盘和网络使用情况。它还会监视其他进程，以了解整个系统在不同条件下的运行状况。\n- **Time Profiler（时间分析器）**：此工具以低开销的方式对系统在任意时刻运行的进程进行基于时间的采样。\n\
  - **Automation（自动化）**：此工具执行一个脚本，模拟用户对从 `Instruments` 启动的 iOS 应用程序的交互。\n- **Energy\
  \ Diagnostics（能耗诊断）**：此工具监视设备不同组件的开/关状态，并提供应用程序运行时的能耗使用情况。\n- **System Usage（系统使用情况）**：此工具记录单个进程与文件、套接字和共享内存相关的\
  \ I/O 系统活动。\n- **Core Animation（核心动画）**：此工具测量应用程序的图形性能以及进程的 CPU 使用率。\n- **OpenGL\
  \ ES Driver（OpenGL ES 驱动）**：此工具测量 `OpenGL ES` 的性能。本书不会涵盖此工具。\n- **OpenGL ES Analysis（OpenGL\
  \ ES 分析）**：此工具测量并分析 `OpenGL ES` 活动，以检测正确性和性能问题。本书不会涵盖此工具。\n\n### 性能调优\n\n本书的其余部分将使用本节概述的流程来查找性能瓶颈。在诊断性能问题时，无论问题是什么，其过程基本上是相同的。遵循这些原则将避免很多麻烦，并减少您可能引入到应用程序中的错误数量。\n\
  \n性能调优是一个相当科学的过程。首先，找出应用程序中您认为可能需要调优的部分，并围绕该部分收集数据。您的假设可能是正确的，您会找到瓶颈所在。然而，您正在测试的应用程序方面可能并非问题所在。请始终为此做好准备。始终准备好改变假设并适应您的数据。如果数据显示某个部分运行得并不差，那么它很可能就不是问题。\n\
  \n当您找到瓶颈或性能低下之处时，找出一两个指标来衡量。调优的关键始终是度量指标。确保您所做的更改只调整了这一个指标，这将带来一次成功的调优会话。\n\n另一个经验法则是每次只更改一件事。同时更改多件事可能会引发问题，因为这两个更改可能会相互抵消，或引入未知的错误。我们通常处理的是具有许多活动部件的复杂系统，引入更改就可能引入错误。一个不错的做法是事先准备好单元测试，以确保您在提高性能的同时没有改变原有功能。我曾在一个高性能计算课程中遇到过这个问题。任务是编写一个进化算法来求解一个复杂的多变量代数方程。我有了一个可运行的算法，但我觉得它有点慢，于是开始调整。调整完成后，我进行了测试，结果它只有一半的时间能正常工作，而原始版本是\
  \ 100%可以工作的。我最终意识到我改动太多了，无法追踪到底是哪个改动破坏了算法。那时，我真切地感激版本控制的存在。\n\n当您阅读本书的剩余部分时，请记住，我们真正关心的是性能的大幅提升（但仍要努力实现零泄漏——用户讨厌有泄漏的应用程序）。您认为花几个小时去调整一项可能提升不到\
  \ 1%速度的改动值得吗？您的用户会注意到您每秒多压榨出两帧以达到每秒 80 帧吗？我不这么认为。我们关注的是用户能注意到的、大规模的性能改进。\n\n###\
  \ 本章小结\n\n本章我们涵盖了很多内容。我们从全新的项目开始，使用 Xcode 内置的新 Interface Builder 组件添加了一些新的类和用户界面。我们还修改了数据模型并生成了模型类，以创建一个稍微更复杂的应用程序。\n\
  \n最后，我们查看了方案编辑器，以了解构建配置在 Xcode 中的存放位置。最后一步是启动 Instruments，并看到这些优秀工具之间的出色集成。本章涵盖的所有内容一开始可能让人应接不暇，但您会掌握它的。苹果公司确实为开发者提供了一些顶级的工具，它们不会妨碍我们将一些伟大的想法转化为为用户带来的精彩体验。\n\
  \n现在是时候投入到本书剩余项目的开发中了。您已经了解了这些工具的作用；现在让我们使用它们吧。\n\n## 第 3 章\n\n\n\n### 三个屏幕……嗯，它能跑起来\n\
  \n上一章，我们介绍了如何使用新版 iOS 开发工具的一些亮点。接下来的章节将以此为基础，展示一些出色的技巧，让你的应用能够吸引用户反复使用。为此，我们将在接下来的几章中逐步剖析一个应用，这个应用嘛，可以说存在一些问题。有些问题显而易见，而另一些则需要深入挖掘才能发现。我们将要使用的应用是一个虚拟水果摊。该应用的需求包括：展示包含产品图片的产品库存、查看产品详情、添加到购物车、查看购物车以及结算。目前该应用处于\
  \ Alpha 阶段；它已满足基本需求，但在性能方面需要改进，并且存在一些崩溃问题。\n\n### 使用 GitHub\n\n对于这个项目，我们将从一个现有仓库中拉取源代码。该项目托管在一个名为\
  \ GitHub 的社交编程网站上。前往 [`www.github.com/signup/free`](http://www.github.com/signup/free)\
  \ 并创建一个免费账户。在撰写本文时，注册表单如图 3-1 所示。\n\n![images](img/0301.jpg)\n\n**图 3-1.** *GitHub\
  \ 注册界面*\n\nGitHub 提供的免费账户允许你创建无限数量（在撰写本文时）的公共 Git 仓库。付费账户则可以邀请其他开发者参与私有仓库的协作。本书中我们将要使用的应用托管在一个公共仓库中。\n\
  \n**注意：** Git 是一个分布式版本控制系统。它已随 Xcode 一同打包，因此无需额外安装。在本书中，我们将利用 Xcode 内置的 Git 支持来跟踪我们的更改。Git\
  \ 拥有非常强大的命令行界面，因此掌握一些 Git 命令行技巧将提升你作为开发者的生产力。\n\n从 GitHub 检出代码的下一步是设置你的 SSH 公钥。前往\
  \ [`https://github.com/account/ssh`](https://github.com/account/ssh)，点击“添加另一个公钥”（见图\
