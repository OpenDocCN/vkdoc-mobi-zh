  \ *)request {\n    NSString *requestIdentifier = [[request userInfo] objectForKey:REQUEST_ID];;\n\
  \n    // 通知代理。\n        if ([self _isValidDelegateForSelector:@selector(requestFailed:withError:)]){\n\
  \                [delegate requestFailed:requestIdentifier\n                   \
