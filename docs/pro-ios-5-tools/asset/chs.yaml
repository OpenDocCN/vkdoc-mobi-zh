  \n### 本章小结\n\n本章所展示的应用旨在模拟一个 Alpha 质量的应用，以便我们找到大量性能优化空间。最终产品将是一个不闪退、具备合理架构性能的应用。随着本书性能调优章节的推进，我们将对应用的不同方面进行分析、重构和重写。这将是一段精彩的旅程，现在翻页开始吧！\n\
  \n## 第 4 章\n\n## 内存管理与诊断\n\n上一章我们接触了一个功能基本完备但仍需大量优化的应用。我们已经建立了基于 Github 的源代码控制项目，并准备开始修复该应用使其达到\
  \ Beta 测试标准。有趣的内容将从本章开始。\n\n目前应用闪退的可能性极高。我们知道 App Store 拒绝应用的主要原因之一就是闪退。本章你将学习如何修复与内存相关的闪退问题，并在内存泄漏影响设备性能之前发现它们。我们将采用系统化的方法解决这些问题，以便你将来在其他项目中也能套用这些步骤。随着逐步深入硬件层面，每一步的技术含量都会递增。幸运的是，我们有强大工具可用，能够解决大量内存相关问题。\n\
  \n本章的应用采用手动引用计数开发。最新工具引入了名为自动引用计数（ARC）的新技术。我们首先会创建 ARC 分支来转换应用，之后讨论 ARC 可能引发的问题，并探究如何使用\
  \ Instruments 解决这些问题。不过本书后续内容将默认使用手动引用计数。\n\n本章剩余部分将聚焦于手动引用计数下的内存闪退修复与内存泄漏解决。首先我们会创建本地仓库分支来隔离修改，便于最终与主分支合并。接着讨论预防技术以避免问题发生。本章后半部分将从宏观层面切入，处理超级结账应用中的内存闪退问题。随着深入排查闪退原因，我们也会更深入地探讨如何诊断此类问题。\n\
  \n本章最后将重点讨论内存泄漏。你将学习如何使用 Instruments 检测和定位内存泄漏。完成这部分学习后，你将掌握在应用上架 App Store 前应对内存闪退和堵塞内存泄漏的工具与知识。\n\
  \n\n### 分支是我们的好帮手\n\n“尽早提交、频繁提交”是开发者应当奉行的准则。借助 Git 或 Mercurial 这类分布式版本控制系统，这一准则得以更好地实现。具体做法是：为某个功能创建一个本地分支，待功能完成后，再将这组变更合并到\
  \ `master` 分支。简而言之，这样我们就能拥有一个功能分支，从而可以快速切换回 `master` 分支处理其他任务，而不会丢失任何更改。由于我们使用的是\
  \ Git，可以利用它与 Xcode 的一些基本集成，同时将更强大的功能留给命令行（或你选择的 GUI 工具）来处理。那种因一次提交导致构建失败、惹怒团队并被迫买甜甜圈道歉的日子，已经一去不复返了。\n\
  \n**注意：** 我们也可以用 Subversion 为项目创建分支。区别在于，Subversion 的分支也会在服务器上创建。概念上与 Git 相同，但所有内容的存放位置略有不同。\n\
  \n在开始对应用程序进行改动之前，我们先创建一个分支，待本轮应用程序更新迭代完成后，再将其合并。要创建分支，请打开 Xcode 4，转到 `File` ![image](img/U001.jpg)\
  \ `Source Control` ![image](img/U001.jpg) `Repositories`，这将打开“Organizer”窗口。点击 `Repositories`\
  \ 标签页。在左侧列表中找到 `Super Checkout`，点击 `Branches`，列表中会显示一个分支。点击窗口底部的 `Add Branch` 按钮。此时会显示一个如\
  \ 图 4-1 所示的操作表，供您创建分支。在分支名称处输入 `ARC_Transition`，并将起始点设置为“master”，使其基于 `master` 分支。勾选自动切换到该分支的选项，这样分支创建完成后我们就可以立即开始修改。\n\
  \n![images](img/0401.jpg)\n\n**图 4-1.** *通过 Xcode 4 新的源代码管理 GUI 创建新分支非常容易。*\n\n\
  最后，点击 `Create`。现在，我们已经切换到了新创建的分支，可以开始在这个分支上进行重大改造，而不会影响其他内容（最多只影响当前分支）。我们已准备好开始将\
  \ `Super Checkout` 迁移到自动引用计数。每一章都会创建一个或多个分支，这样我们就可以将每一组更新都收集到仓库中。虽然这并不完全符合真实开发场景，但我们会尽可能贴近实际。\n\
  \n### 自动引用计数\n\n自动引用计数（ARC）是苹果在最新的 LLVM 编译器中提供的一项全新特性。当编译器启用了 ARC 标志后，所有内存管理代码都会自动为您生成。这意味着源代码中任何类型的内存管理代码都可以被移除。简单来说，所有对\
  \ `release`、`copy`、`retain` 或 `autorelease` 的调用都会被直接删除。\n\n然而，内存管理并非如此简单。必须引入一些新的生命周期限定符，为编译器提供关于内存管理方面所需操作的提示。这些限定符包括：\n\
  \n*   `__strong`：对于强引用（保留），编译器会生成对应的 release 或 autorelease 操作。\n*   `__weak`：对于弱引用，当所指对象被释放时，指针会自动被设置为\
  \ `nil`。\n*   `__unsafe_unretained`：这只是一个普通的引用。这个限定符很危险，因为仍然可能出现悬垂指针。\n*   `__autoreleasing`：该限定符告诉编译器，该参数将通过引用（`id\
  \ *`）传递，并在返回时自动释放。\n\n在声明属性时，有三个新的属性特性；其中两个可用于 iOS 4 及以上版本，一个仅可用于 iOS 5：\n\n*  \
  \ `strong`：这是一个强引用；其作用类似于 `__strong` 限定符，可用于 iOS 4 及以上版本。\n*   `weak`：一个自动置 nil\
  \ 的引用，类似于 `__weak` 限定符，仅可用于 iOS 5。\n*   `unsafe_unretained`：这只是一个普通的引用，类似于 `__unsafe_unretained`\
  \ 限定符，可用于 iOS 4 及以上版本。\n\n这份列表并不详尽，在启用 ARC 进行开发时，还有许多其他新事项需要注意。其中之一就是自动释放池。简而言之，使用\
  \ ARC 后，不再有 `NSAutoreleasePool` 对象。取而代之的是新的 `@autorelease` 块。效果如 代码清单 4-1 所示。\n\n\
  **代码清单 4-1.** *全新且改进的自动释放池*\n\n```\n@autoreleasepool {\n        // 长时间循环，创建并销毁大量对象\n\
  }\n```\n\n使用 ARC 编码时，另一个需要牢记的重点是：永远不要调用 `retain`、`release` 或 `autorelease`。永远不要。如果你调用了，编译器甚至会报错。ARC\
  \ 还强制执行其他一些规则，苹果开发者文档中的“Programming with ARC”一文是很好的入门资料。当我们将项目转换为 ARC 时，在转换过程中可能会遇到其中一些规则。如果遇到了，我们会进行讨论。\n\
  \n\n\n### 转换为 ARC\n\n现在我们要将 Super Checkout 转换为 ARC。这次转换需要对代码库进行一些重大修改，这也是我们创建分支的原因。那么，闲话少说，让我们开始转换吧。首先打开项目，进入\
  \ Edit → Refactor → Convert to Objective-C ARC。执行此操作后，会显示一个表单（参见图 4-2）。勾选两个复选框以转换单元测试和应用目标。如果任何目标当前使用的是旧版编译器，编译器版本将更新为\
  \ LLVM 3.0。\n\n![images](img/0402.jpg)\n\n**图 4-2.** *执行预检查前显示的目标选择表单。*\n\n点击 Precheck\
  \ 按钮将执行编译，并告知您项目是否可以转换。如图 4-3 所示，Super Checkout 尚未完全准备好进行 ARC 转换。我们需要先修复一些错误。\n\n\
  ![images](img/0403.jpg)\n\n**图 4-3.** *预检查运行返回的错误。*\n\n点击列表中的第一项，我们会跳转到 `SuperCheckoutAPIEngine.h`，您会发现该文件已被修改，属性声明中添加了\
  \ `__weak`。要修复此问题，请移除 `__weak`，并将 assign 替换为 `unsafe_unretained`。我们这样做是因为目标平台是 iOS\
  \ 4 及更高版本。如果目标平台是 iOS 5，我们会使用 `weak` 属性。现在这行代码应该如下所示：\n\n```\n@property (nonatomic,\
  \ unsafe_unretained) NSObject<SuperCheckoutAPIEngineDelegate> *delegate;\n```\n\n\
  在此实例中，之前还声明了一个 `ivar`。由于 `ivar` 已声明且属性已设置，我们有两个选择。第一个是将委托 `ivar` 标记为 `__unsafe_unretained`。第二个是直接删除该行，让编译器合成\
  \ `ivar`。既然我们采用现代方式，就完全删除该行。这样类的 `ivar` 块将如下所示：\n\n```\n@interface SuperCheckoutAPIEngine\
  \ : NSObject<SCJSONParserDelegate> {\n    NSMutableDictionary *connections;   //\
  \ MGTwitterHTTPURLConnection 对象\n    NSString *APIDomain;\n}\n```\n\n还有一些剩余的 `ivar`。由于\
  \ ARC 的默认行为是强引用，我们无需更新它们。现在，再次执行转换。这次，您遇到的错误是一个 `NSString` 被强制转换为 `CFStringRef`。我们知道可以进行此操作，因为\
  \ `NSString` 在 CF 对象和 Objective-C 对象之间是免费桥接的。如果您注意到，Xcode 会建议使用 Fix-It 功能在 `CFStringRef`\
  \ 强制转换前放置 `__bridge`。继续操作，让 Xcode 完成此操作。\n\n再次执行转换。这次会带来一组新的错误。这些错误存在于一些外部库代码中。由于我们在分支中，让我们继续修改代码。这些问题都不特别棘手。要么让\
  \ Fix-It 添加适当的代码，要么删除对内存管理代码的调用。完成这些编辑后，再次运行转换工具，如果所有问题都已解决，您将看到图 4-4 的界面。这个表单告诉您转换将成功。点击\
  \ Next 继续。\n\n![images](img/0404.jpg)\n\n**图 4-4.** *预检查已通过，现在，我们准备最终转换为 ARC。*\n\
  \n点击 Next 后，Xcode 会建议创建快照。快照非常适合快速保存当前配置的快照，以防转换过程中出现问题。点击 Enable，Xcode 将在创建新快照后继续转换。\n\
  \n转换完成后，Xcode 会显示更改内容，并允许您在某些更改看起来过于极端时撤销（参见图 4-5）。点击 Continue，然后使用有意义的提交信息提交您的代码。\n\
  \n![images](img/0405.jpg)\n\n**图 4-5.** *转换为 ARC 已完成，Xcode 向您展示其成果。*\n\n### 识别保留循环\n\
  \n尽管 ARC 非常出色，我们仍然需要关注应用程序内部的情况。您可能会说，“都 2011 年了，我还需要担心内存泄漏吗？”答案是肯定的。无论我们的工具变得多么复杂，它们也无法捕获所有问题。我们在使用\
  \ ARC 时最可能遇到的错误是保留循环。\n\n保留循环被定义为包含封闭循环保留引用的对象图。图 4-6 显示了一个典型的保留循环。如果我们释放对象 A 和\
  \ B，ARC 会认为其余对象仍在使用中，并且不会插入适当的释放语句。\n\n![images](img/0406.jpg)\n\n**图 4-6.** *在这个常见的保留循环中，数字显示了在释放\
  \ A 和 B 之前的保留计数。*\n\n那么我们如何修复保留循环呢？这取决于具体情况。如果目标平台是 iOS 5 及以上版本，将循环中的一个引用设为弱引用以打破循环。图\
  \ 4-7 显示了将适当引用设为弱引用后的对象图。\n\n![images](img/0407.jpg)\n\n**图 4-7.** *打破循环需要设置正确的引用。*\n\
  \n通过将对象图中的父节点引用设为弱引用，当 A 和 B 被释放时，该图会被回收。\n\n我们如何检测这些循环？幸运的是，Instruments 有一个新功能可以检测保留循环，并以可视化方式向您展示循环的样子。当我们介绍使用\
  \ Instruments 检测泄漏时，我们将通过一个非常简单的示例来看看 Instruments 如何向您展示这些循环。\n\n### 回到手动引用计数\n\n\
  我们将回到 `release`、`retain` 和 `autorelease` 的世界。ARC 很好，但通过手动引用计数可以学到很多东西。由于我们为 ARC\
  \ 转换创建了一个分支，我们可以做同样的事情，将我们在本章中修复的内存相关问题保存下来。将此新分支命名为 `Memory_Fixes`，基于主分支创建，并记得在创建后切换到新分支！\n\
  \n### 建立健康的编码实践\n\n本杰明·富兰克林曾说过：“一分预防胜于十分治疗。”因此，在我们深入修改代码之前，让我们花点时间讨论一些关于正确内存管理的最佳实践，以及您在开发应用程序时可以用来预防内存相关错误和崩溃的方法。这些实践涵盖了语言和运行时的工作原理、良好的编码实践以及通用准则。\n\
  \n关于内存管理，尤其是在 iOS 开发中，首先要了解的是保留计数。由于 iOS 平台没有垃圾回收机制，我们必须适当地手动管理内存。理解何时保留内存以及何时释放内存的概念，对于成为\
  \ iOS 设备上的良好公民是绝对必要的。我们不会花太多时间讨论保留计数的细微差别等内容，但有必要提一些要点。\n\n\n\n#### 保留还是释放，这是个问题\n\
  \n在 Objective-C 开发应用中，一个常见错误是没有释放已保留的内存。大多数情况下，未能释放内存是一个错误，因此养成一些好习惯总是有益的。未释放的内存会导致泄漏，简单明了。判断何时释放内存的一个好用经验法则是缩略词\
  \ NARC：\n\n- `New`\n- `Alloc`\n- `Retain`\n- `Copy`\n\n每当这些消息之一被发送给对象时，你就拥有了该对象，因此使用完后必须释放它。然而，这一规则总有例外。当一个方法需要返回对象时，必须向该对象发送\
  \ `autorelease` 消息。不过，使用 `autorelease` 时也有一些性能方面的考量。由于 `autorelease` 将对象放入当前作用域块的自动释放池中，因此将成千上万个对象送入这样一个池子将是个糟糕的主意，尤其是在较旧的\
  \ iOS 设备上。我们所说的一个典型例子就是创建一个快速循环来生成一百万个字符串（代码清单 4–2）。\n\n**代码清单 4–2.** *一百万个自动释放的字符串！*\n\
  \n```\nfor(int i = 0; i < 1000000; i++) {\n     string = [[[NSString alloc] initWithFormat:@\"\
  String %i\", i] autorelease];\n     //处理字符串并创建其他自动释放的对象….\n}\n```\n\n上面的代码创建了一百万个字符串并自动释放它们。针对此代码运行\
  \ Allocations 工具，你会得到如 图 4–7 所示的图表。\n\n解决此问题的合适方法见 代码清单 4–3。\n\n**代码清单 4–3.** *一百万个字符串各自拥有独立的自动释放池*\n\
  \n```\nfor(int i = 0; i < 1000000; i++) {\n     NSAutoreleasePool *pool = [[NSAutoreleasePool\
  \ alloc] init];\n     string = [[[NSString alloc] initWithFormat:@\"String %i\"\
  , i] autorelease];\n     //处理字符串并创建其他自动释放的对象….\n     [pool release];\n}\n```\n\n\
  对比 图 4–8 和 图 4–9 中的图表。这些图表没有显示的是比例尺。由于我们创建了一百万个字符串，每个字符串在运行循环的下一次迭代时被分配并自动释放。如 图\
  \ 4–8 所示，通过创建自动释放池，系统会更频繁地回收内存，从而更好地利用可用资源。\n\n![images](img/0408.jpg)\n\n**图 4–8.**\
  \ *一百万个字符串释放到同一个池中的内存分配图*\n\n![images](img/0409.jpg)\n\n**图 4–9.** *一百万个字符串在各自池中自动释放的内存分配图*\n\
  \n由于设备的内存有限，使用自动释放池对于防止应用触发内存警告、避免操作系统终止应用以及保持应用响应迅速是绝对必要的。在紧密循环中手动释放对象代价高昂。\n\n\
  在管理内存时保持记忆和自律是减少内存泄漏的关键。审视你的方法，决定哪种内存管理技术最适合你。如果你正在创建离散对象并对它们进行操作，使用完毕后立即释放它们。如果你正在创建大量对象，那么创建一个自动释放池并在使用完毕后排空它是最佳选择。执行后者操作的最佳时机是在进行大量字符串操作时，因为大多数字符串操作都会返回自动释放的字符串实例。\n\
  \n总体而言，记住何时释放或自动释放对象并不太难。只要在初次编写代码时就完成内存管理，内存泄漏就能被控制在最低限度，这样你就能腾出手来追踪其他类型的问题。\n\n\
  #### 连接属性与多态点语法\n\n接下来在我们关于内存管理的讨论中，需要谈谈 Objective-C 2.0 的属性。这个非常流行的特性随新的 Objective-C\
  \ 运行时而来，并为 Objective-C 语言带来了一个新概念——点语法。\n\n让我们快速了解一下属性为我们提供了什么，以及它们如何融入内存管理的范畴。为了便于讨论，我们来谈谈在代码清单\
  \ 4–4 和 4–5 中定义的一个对象。\n\n**代码清单 4–4.** *Foo 的头文件*\n\n```\n@interface Foo : NSObject\
  \ {\n     NSDictionary *bar;\n}\n\n@property (retain, nonatomic) NSDictionary *bar;\n\
  \n@end\n```\n\n**代码清单 4–5.** *Foo 的实现文件*\n\n```\n#import \"Foo.h\"\n@implementation\
  \ Foo\n@synthesize bar;\n\n- (id) init {\n    self = [super init];\n\n    if(self)\
  \ {\n        self.bar = [NSDictionary dictionary];\n    }\n\n    return self;\n\
  }\n\n-(void) setBar:(NSDictionary *)newBar {\n     NSDictionary *oldDictionary =\
  \ self.bar;\n     bar = [newBar retain];\n     [oldDictionary release];\n\n    \
  \ NSNotification *note = [NSNotification notificationWithName:@\"barUpdated\" object:self];\n\
  \     [[NSNotificationCenter defaultCenter] postNotification:note];\n}\n\n-(void)\
  \ dealloc {\n     self.bar = nil;\n     [super dealloc];\n}\n\n@end\n```\n\n`Foo`\
  \ 对象有一个属性，即名为 `bar` 的 `NSDictionary`。我们合成了访问器并提供了自己的设置器。该设置器的设计意图是在属性发生变化时发送一条通知。在\
  \ `init` 方法中，我们使用属性将 `bar` 初始化为 nil。还需注意，在 `dealloc` 方法中，该属性被设置为 nil。\n\n现在，让我们看看此代码执行时实际发生了什么。当代码被编译时，使用属性的代码基本上被转换成方法调用。发生以下转换：\n\
  \n`{symbol}.foo`\n\n被转换为\n\n`[{sybmol} foo]`\n\n类似地，下面这行代码\n\n`{symbol}.foo = {some\
  \ new object}`\n\n被转换为\n\n`[{symbol} setFoo:{some new object}]`\n\n很容易忘记这种转换的发生。因此，当调用\
  \ `init` 时，新实例实际上是在调用 `[self setFoo:[NSDictionary dictionary]]`。这意味着当对象被创建时会发送一条通知。`dealloc`\
  \ 方法做了同样的事情，因此当对象被释放时也会发送一条通知。后一种情况可能比前一种引起更多问题，因为通知携带了一个指向刚释放内存的指针。\n\n解决这些问题的一个简单方法是在\
  \ `init` 和 `dealloc` 方法中直接使用实例变量。这降低了在 `Foo` 实例上更新 `bar` 时引入 `EXEC_BAD_ACCESS` 错误的可能性。这也使得\
  \ `Foo` 的任何子类在重写 `setBar` 方法时可以自由地做它们想做的事情。\n\n关于内存管理和属性，一个非常微妙的话题是理解底层发生了什么。在上面的\
  \ `init` 方法中，编译后的代码是 `[self setBar:[NSDictionary dictionary]]`，因此该方法接收到的是一个自动释放的对象，然后由\
  \ `setBar` 方法将其保留。如果传入的是 `[[NSDictionary alloc] init]`，那么当 `bar` 被赋值为一个新对象或 `Foo`\
  \ 实例被释放时，该字典就会泄漏。这大概能节省一个小时调试某个泄漏问题的时间。\n\n这就引出了一个关于属性使用的有趣话题，主要是点语法的使用。虽然这未必是内存管理的话题，但此话题关于点语法的使用和良好的编码实践。属性是一个很棒的机制；它们使得访问器和设置器的生成快速且容易，因为大多数都是非常繁琐且耗时的基本样板代码。能够控制生成的代码类型（例如，保留、赋值或复制，原子性或非原子性，可读写或只读）也是一个很大的帮助。\n\
  \n\n\n当你在 Objective-C 的属性中混用 C 语言的 `struct` 时，问题就出现了。点语法在两者之间会很快变得令人困惑。一个使源代码意图清晰的好建议是：在你的\
  \ Objective-C 代码中不要使用点语法。这为多态的点赋予单一含义。请看以下示例：\n\n```\nUIView *newView = [[UIView\
  \ alloc] init];\nCGRect viewRect;\n\nviewRect.origin.x = 0;\nviewRect.origin.y =\
  \ 0;\nviewRect.size.height = 100;\nviewRect.size.width = 100;\n\nnewView.frame =\
  \ viewRect;\n\nUIColor *color = [[UIColor alloc] initWithPatternImage:{some image}];\n\
  newView.backgroundColor = color;\n[color release];\n\n[self.view addSubview:newView];\n\
  [newView release];\n```\n\n我们正在创建一个新视图，设置其 `frame`，并在将其添加到当前视图之前设置其背景颜色。这相当直接明了，但刚接触该平台的新手不会完全理解代码的意图。看看设置背景颜色的代码。在将其设置到新视图上后，很容易忘记释放正在设置的颜色，因为意图不够清晰。借鉴前面的建议，我们可以将代码重写为如下形式：\n\
  \n```\nUIView *newView = [[UIView alloc] init];\nCGRect viewRect;\n\nviewRect.origin.x\
  \ = 0;\nviewRect.origin.y = 0;\nviewRect.size.height = 100;\nviewRect.size.width\
  \ = 100;\n\n[newView setFrame:viewRect];\n\nUIColor *color = [[UIColor alloc] initWithPatternImage:image];\n\
  [newView setBackgroundColor:color];\n[color release];\n\n[self.view addSubview:newView];\n\
  [newView release];\n```\n\n完整的意图更容易理解了。创建并设置在所创建视图上的背景颜色，显然由该视图拥有，并在设置后被释放。操作视图\
  \ `frame` 的代码清楚地表明是在操作一个 C 语言的 `struct`，而其余代码则是 Objective-C。\n\n**注意**：讨论代码结构总是一个敏感话题，因此关于不使用点语法的想法仅仅是一个建议。这些并非硬性规定；可以把它们视为关于花括号位置以及使用空格而非制表符的规则。虽然就使用哪种方式的优点在喝咖啡时争论一番可能很有趣，但我们的目标是开发应用程序。用户并不关心源代码长什么样。\n\
  \n### 执行静态分析\n\n在应用程序运行之前，有一些方法可以发现常见的编码错误。新的 LLVM 编译器将这一能力带给了我们。经常对源码运行静态分析器总是一个好主意。它可以在应用程序实际运行之前就指出代码中的问题。\n\
  \nXcode 4 集成了静态分析器，允许你在问题出现之前分析代码并发现它们。要运行静态分析器，请转到 Product![image](img/U001.jpg)Analyze。这会构建应用程序，并将构建产物通过静态分析器运行，然后将结果返回给你。图\
  \ 4-10 显示了在导航器区域的“问题”标签中静态分析运行的结果。\n\n![images](img/0410.jpg)\n\n**图 4-10.** *静态分析展示了不同类型的问题，从死代码到内存泄漏。*\n\
  \n在开发过程中经常运行静态分析器是一个好主意，可以防止代码中最常见的错误。这些结果为你提供了足够的信息来了解问题所在，以及如何着手修复它们。其中一些项目可能非常复杂。例如，在方法顶部声明的一个对象，经过一系列复杂的循环和条件判断后，可能会使该对象处于泄漏状态。另一个例子是过度释放一个对象。一个对象被实例化，然后被指示\
  \ `autorelease`，最后在方法内部被释放，这会触发静态分析错误。\n\n让我们来看 图 4-9 中的两个案例。\n\n图 4-9 列表中的第一项位于\
  \ `Super_CheckoutViewController.m` 的第 91 行。让我们看看有问题的那个方法：\n\n```\n- (void)tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    ProductDetailsViewController\
  \ *newVC = [[ProductDetailsViewController alloc]\n         initWithNibName:@\"ProductDetailsViewController\"\
  \ bundle:nil];\n\n    [newVC setSelectedProduct:[inventory objectAtIndex:[indexPath\
  \ row]]];\n\n    [self.navigationController pushViewController:newVC animated:YES];\n\
  }\n```\n\n静态分析器告诉我们，该方法退出时一个对象具有“+1 的保留计数”。你能找出有问题的代码吗？基于 NARC 系统，我们有一个已分配的对象，现在缺少一个对应的释放。添加\
  \ `[newVC release];` 作为最后一行将解决这个问题。\n\n下一个例子是使用静态分析器来查找死代码。在 `SuperCheckoutAPIEngine.m`\
  \ 中，我们可以看到分析器发现了一个“Dead store”问题。点击该问题，编辑器将向你展示代码中的错误位置。这是有问题的那个方法：\n\n```\n- (NSMutableURLRequest\
  \ *)_baseRequestWithMethod:(NSString *)method\n                                \
  \           path:(NSString *)path\n                                    requestType:(SuperCheckoutRequestType)requestType\n\
  \                                queryParameters:(NSDictionary *)params\n{\n   \
  \ NSString *contentType = [params objectForKey:@\"Content-Type\"];\n    if(contentType){\n\
  \        params = [params MGTE_dictionaryByRemovingObjectForKey:@\"Content-Type\"\
  ];\n    }else{\n        contentType = @\"application/x-www-form-urlencoded\";\n\
  \    }\n\n    // Construct appropriate URL string.\n    NSString *fullPath = [path\n\
  \ stringByAddingPercentEscapesUsingEncoding:NSNonLossyASCIIStringEncoding];\n  \
  \  if (params && ![method isEqualToString:HTTP_POST_METHOD]) {\n        fullPath\
  \ = [self _queryStringWithBase:fullPath parameters:params prefixed:YES];\n    }\n\
  \n    NSString *connectionType = @\"http\";\n```\n\n静态分析器将焦点放在了 `contentType` 对象未被读取上。似乎分析器发现该方法后面某处的代码被移除了，但它的部分设置却没有被移除。移除包含\
  \ `contentType` 对象的代码块将满足静态分析器的要求。\n\n你为什么不自己检查一下静态分析器的其余结果，并修复它发现的问题呢？\n\n\n\n\
  ### 排版后内容\n\n以消除编辑器中所有蓝色（静态分析器警告的颜色）为最终目标。总会有一些情况是静态分析器显示误报，但这种情况相当罕见。静态分析器可能显示误报的一个例子是常见的`init`方法形式：\n\
  \n```\nif(self = [super init]) {\n    //Do something\n}\n\nreturn self;\n```\n\n\
  静态分析器会注意到你在条件语句内进行了赋值。它并不真正喜欢这样，然而这段代码是完全有效的。我想花点时间提一个我们之前讨论过的话题。虽然这段代码是有效的，但它清晰吗？当然，你可以将赋值语句用括号括起来以满足分析器，但这并不一定能让代码更易读。我采用了以下`init`风格：\n\
  \n```\nself = [super init];\n\nif(self) {\n    //Do stuff\n}\n\nreturn self;\n```\n\
  \n这不仅通过了静态分析，还清晰地展示了正在发生的事情。通篇修改整个代码库以采用这种新风格将花费很长时间，因此不推荐这样做。所以这里的教训是，一开始就要经常问自己：“这段代码清晰吗？”清晰性能够带来更好的代码和更少的问题，尤其是在维护和为现有应用添加新功能时。\n\
  \n通过这些主动预防内存泄漏的技术，大多数与内存泄漏相关的常见问题都将被避免。代码的清晰性是确保代码库保持整洁的关键，尤其是在团队环境中。通过偷工减料积累技术债务在短期内可能卓有成效，但在维护周期中，它可能是一个巨大的障碍。\n\
  \n归根结底，软件必须交付，所以学习如何在技术债务与完全正确的做事方式之间取得平衡是一生的课程。希望这些技术以及后续的技术能减少你在应用程序中调试和追踪这些问题所花费的时间。\n\
  \n### 僵尸——不，不是那种僵尸\n\n由于我们继承了一个已有的代码库，我们必须手动查找问题，以便移除所有内存泄漏并找到与内存管理直接相关的崩溃问题。为此，我们将启动`Instruments`并启用`NSZombie`检测。\n\
  \n僵尸？不，我们不是在寻找“我们要吃掉你的大脑”的僵尸。那是完全另一本书的内容。我们要找的那种僵尸是指向垃圾内存的指针。当一个对象被最终释放且其引用计数为零时，该对象被解除分配，内存会被系统迅速回收。但指向该内存块的指针仍然有效。\n\
  \n我们如何检测僵尸？首先，我们需要创建一个名为`NSZombieEnabled`的环境变量并将其设置为`YES`。我们可以通过打开方案编辑器来做到这一点。前往`Product`![image](img/U001.jpg)`Edit\
  \ Scheme`或按![image](img/U002.jpg)`+ <`。打开方案编辑器后，在左侧选择`Run Super Checkout`选项，然后选择`Arguments`标签页。添加一个名为`NSZombieEnabled`、值为`YES`的环境变量。你的方案应该看起来像图\
  \ 4-11 所示的那样。\n\n![images](img/0411.jpg)\n\n**图 4-11.** *使用方案编辑器启用 NSZombie 检测*\n\
  \n我们将使用`Profile`操作来运行我们的应用程序，因此点击`Profile Super Checkout`。确保在`Arguments`标签页下勾选了“使用运行操作的选项”复选框。现在，你已经准备好对应用程序进行性能分析并查找一些僵尸了。\n\
  \n确保在方案选择器中将模拟器选为目标目标，点击`OK`，然后前往`Product`![image](img/U001.jpg)`Profile`来启动该过程。`Instruments`将启动并提供一个选择众多模板之一的选项。我们在寻找僵尸，所以选择`Zombies`选项，然后点击`Profile`（参见图\
  \ 4-12）。\n\n![images](img/0412.jpg)\n\n**图 4-12.** *iOS 模拟器启动前的 Instruments 模板屏幕*\n\
  \niOS 模拟器将启动该应用程序，你会看到`Instruments`在后台运行，`Allocations`工具正在监视内存分配。该工具已经配置好用于检测`NSZombie`对象，因此我们现在需要做的就是与应用程序交互。让我们继续运行一个测试用例，看看是否能找到一个`NSZombie`。\n\
  \n我们要运行的测试用例是向购物车添加一种水果并查看购物车。继续选择一种水果，配置数量，然后点击`Add to Basket`。物品被添加到购物车后，库存列表会重新出现。点击右上角的`Cart`按钮，你会注意到应用程序崩溃了。如图\
  \ 4-13 所示，`Instruments`检测到一条消息被传递给了`NSZombie`实例。\n\n![images](img/0413.jpg)\n\n\
  **图 4-13.** *Instruments 检测到一条消息被传递给了 NSZombie 实例。*\n\n我们知道我们遇到了一个相当严重的错误，因为应用程序崩溃了。我们使用`Instruments`检测到了它，现在，我们需要修复它。点击弹出的消息旁边的箭头，会出现有关违规对象引用计数变化的详细信息。在这些细节中，我们可以看到发生了以下事件（参见图\
  \ 4-14）：\n\n1. `malloc`方法在该对象上运行。\n2. 然后该对象被添加到自动释放池中。\n3. 该对象被保留。\n4. 该对象被释放，两次。\n\
  \n![images](img/0414.jpg)\n\n**图 4-14.** *违规对象的引用计数历史*\n\n\n\n图 4–14 同时还展示了这些事件的发生时间、对应的库以及调用方。我们主要关注的是调用方。查看\
  \ Instruments 提供的信息，我们可以看到对 `SBJsonParser` 类的三次调用、两次 `NSAutoreleasePool` 的排空操作，以及在\
  \ `ShoppingCartViewController` 中发生的僵尸对象调用。查看僵尸对象调用的调用栈：打开 Instruments 窗口的右侧面板（使用窗口顶部工具栏“查看”上方的右侧按钮），然后在事件列表中选择\
  \ Zombie 调用。\n\n![images](img/0415.jpg)\n\n**图 4–15.** *导致消息被发送给僵尸引用的调用栈。*\n\n图\
  \ 4–15 展示了如何检查导致消息被发送给僵尸对象并最终导致应用崩溃的调用栈。我们看到的这个调用栈中包含了一些 Objective-C 运行时和框架的调用。我们对这些调用不太感兴趣，因此双击调用栈中的\
  \ `ShoppingCartViewController` 调用。这会带我们定位到有问题的代码。有问题的代码行就在这里：\n\n```\nNSDictionary\
  \ *cartItem = [[shoppingCart objectForKey:@\"items\"] objectAtIndex:[indexPath\n\
  row]];\n```\n\n这段代码看起来很简单。我们从一个字典中获取一个数组，然后从该数组中取出一项。那么这里的僵尸对象是什么呢？我们唯一操作的对象就是 `shoppingCart`，所以问题肯定出在它身上。但为什么它会成为僵尸引用呢？线索在于这个对象的历史。该对象始于\
  \ `SBJsonParser`，最终辗转到了 `ShoppingCartViewController`。为什么视图控制器没有对它进行持有（retain）呢？问得好！让我们看看其中一个委托回调方法，确切地说是\
  \ `cartContentsReceived:forRequest:`。方法如下：\n\n```\n-(void) cartContentsReceived:(NSDictionary\
  \ *)cart forRequest:(NSString\n*)connectionIdentifier {\n    shoppingCart = cart;\n\
  \n    NSNotification *note = [NSNotification notificationWithName:@\"CartUpdated\"\
  \nobject:[NSNumber\nnumberWithInt:[[shoppingCart objectForKey:@\"items\"] count]]];\n\
  \n    [[NSNotificationCenter defaultCenter] postNotification:note];\n\n    [self.tableView\
  \ reloadData];\n\n    if([[shoppingCart objectForKey:@\"items\"] count] == 0) {\n\
          [self setEditing:NO];\n    }\n}\n```\n\n你能发现问题所在吗？没错，问题就出在方法的第一行。要修复它，我们只需将该行代码改为：\n\
  \n```\nshoppingCart = [cart retain];\n```\n\n现在，让我们运行应用并重复之前的操作步骤。当你进入购物车界面时，应用还会崩溃吗？不崩溃了？很好。恭喜！我们已经修复了应用中第一个明显的\
  \ bug。\n\n#### 其他线程中的僵尸对象（大致如此）\n\n到目前为止，我们已经修复了一系列问题，从静态分析器发现的简单内存泄漏到查找 `NSZombie`\
  \ 实例。然而这个应用中还有更多问题。假设在这个例子中，质量保证（QA）部门反馈了一个崩溃 bug，描述如下：“当用户查看详情屏幕并快速导航回产品屏幕时，应用崩溃。该问题在通过\
  \ 3G 网络连接的 iPhone 上（比) 在 Wi-Fi 连接上更常见。”\n\nQA 工程师随 bug 报告发送了一个崩溃日志（实际的崩溃日志更长，但我们只关注主线程，因为崩溃就发生在这里）：\n\
  \n```\nThread 0 name:  Dispatch queue: com.apple.main-thread\nThread 0 Crashed:\n\
  0   libobjc.A.dylib               0x00002c9a objc_msgSend + 18\n1   Foundation \
  \                   0x000122ee -[NSURLConnection(NSURLConnectionReallyInternal)\n\
  \ sendDidFinishLoading] + 62\n2   Foundation                    0x00012270 _NSURLConnectionDidFinishLoading\
  \ + 72\n3   CFNetwork                     0x0000f40a URLConnectionClient::_clientDidFinishLoading(URLConnectionClient::ClientConnectionEventQueu\n\
  e*) + 130\n4   CFNetwork                     0x00003f42\n URLConnectionClient::ClientConnectionEventQueue::processAllEventsAndConsumePayload(XCo\n\
  nnectionEventInfo<XClientEvent, XClientEventParams>*, long) + 94\n5   CFNetwork\
  \                     0x00003e34 URLConnectionClient::processEvents() + 64\n6  \
  \ CFNetwork                     0x00003de6\n URLConnection::multiplexerClientPerform(RunLoopMultiplexer*)\
  \ + 30\n7   CFNetwork                     0x00003d58 MultiplexerSource::perform()\
  \ + 120\n8   CFNetwork                     0x00003cd6 MultiplexerSource::_perform(void*)\
  \ + 2\n9   CoreFoundation                0x00075a72\n __CFRUNLOOP_IS_CALLING_OUT_TO_A_SOURCE0_PERFORM_FUNCTION__\
  \ + 6\n10  CoreFoundation                0x00077758 __CFRunLoopDoSources0 + 376\n\
  11  CoreFoundation                0x000784e4 __CFRunLoopRun + 224\n12  CoreFoundation\
  \                0x00008ebc CFRunLoopRunSpecific + 224\n13  CoreFoundation     \
  \           0x00008dc4 CFRunLoopRunInMode + 52\n14  GraphicsServices           \
  \   0x00004418 GSEventRunModal + 108\n15  GraphicsServices              0x000044c4\
  \ GSEventRun + 56\n16  UIKit                         0x0002ed62 -[UIApplication\
  \ _run] + 398\n17  UIKit                         0x0002c800 UIApplicationMain +\
  \ 664\n18  Super Checkout                0x00002648 0x1000 + 5704\n19  Super Checkout\
  \                0x00002608 0x1000 + 5640\n```\n\n没什么帮助，对吧？查看崩溃日志，我们可以确定是 `objc_msgSend`\
  \ 调用失败了。嗯，消息发送失败，这是一个相当重要的线索；最可能的原因似乎是某条消息被发送给了僵尸对象。所以我们现在要做的就是使用 Zombie 仪器启动应用。但这里有个问题。根据\
  \ bug 报告，这个问题是间歇性的，并且在 3G 连接上更常见。有一种方法可以减慢你的网络连接速度，但我们将在后面章节中介绍。目前，我们将绕过使用 Instruments，而是连接一台设备，让\
  \ Xcode 在出问题的代码处中断。\n\n**注意：** 如果你没有可以连接到 Mac 的设备，你可以按照第 6 章中的步骤来减慢你的连接速度。由于你是在模拟器中运行，你可以使用\
  \ Zombies 仪器运行应用，并得到与我们修复购物车屏幕 bug 时相同的结果。\n\n\n\n设备是否已连接？请确保设备未连接 Wi-Fi（如果\n*是\
  \ iPhone）。现在，通过 **方案选择器（Scheme selector）** 选择设备部署目标，在设备上运行应用程序（参见图 4-16）。然后，通过转到\
  \ `Product` > `Run` 在设备上运行应用程序。当应用程序开始在单元格中加载图像时，开始快速选择一个产品并点击返回。在某个时刻，应用程序将会崩溃，Xcode\
  \ 将接管控制权，您会看到 GDB 提示符，并且应用程序停止在图 4-1 所示的位置。\n\n![images](img/0416.jpg)\n\n**图 4-16.**\
  \ *Xcode 会显示您的设备在 iTunes 中的名称。在此例中，设备名为 Communicator。*\n\n![images](img/0417.jpg)\n\
  \n**图 4-17.** *Super Checkout 已停止运行，调试器已接管控制权，并向您显示有问题的代码。*\n\n查看控制台，您会在 GDB 提示符前看到以下文本：\n\
  \n```\n2011-03-20 18:54:01.276 Super Checkout[2859:707] *** -[ProductDetailsViewController\n\
  \ respondsToSelector:]: message sent to deallocated instance 0x13a620\n```\n\n我们的猜测是正确的！我们正在向一个已释放的\
  \ `ProductDetailsViewController` 类型的对象发送消息。崩溃的代码位于 `SuperCheckoutAPIEngine.m` 中，我们可以看到断点停在了对该类委托（delegate）的调用之后。为了验证委托是否是罪魁祸首，请在控制台旁边的变量视图中展开\
  \ `self` 指针，如图 4-18 所示。如果看不到变量视图，请点击“清除”按钮上方、控制台右侧的按钮，该按钮可同时显示变量视图和控制台。\n\n![images](img/0418.jpg)\n\
  \n**图 4-18.** *Xcode 中的变量列表，显示委托是一个 NSZombie*\n\n通过展开 `self` 变量，我们可以看到委托是 `NSZombie`\
  \ 的一个实例。现在，让我们看看幕后发生了什么。通过快速选择一个产品并返回产品列表，我们每次都会分配一个新的视图控制器。由于产品详情屏幕会加载图像，它使用 API\
  \ 引擎来获取图像。打开 `ProductDetailsViewController.m` 文件查看 `dealloc` 方法：\n\n```\n- (void)dealloc\
  \ {\n    [apiEngine release];\n    [selectedProduct release];\n    [productDetailsHeader\
  \ release];\n    [productImage release];\n    [productNameLabel release];\n    [productPriceLabel\
  \ release];\n    [addToBasketCell release];\n    [quantityCell release];\n    [super\
  \ dealloc];\n}\n```\n\n缺少了一些东西。在释放 `apiEngine` 之前，我们没有清除其委托。继续操作，在释放 `apiEngine`\
  \ 之前添加 `[apiEngine setDelegate:nil];`。提交该更改后，我们又修复了一个崩溃错误。\n\n这个 Bug 更难发现和重现，因为它位于一些异步网络代码中——很容易看出这类问题变得多么复杂。这是针对内存相关\
  \ Bug 的第二道防线。\n\n#### 泄露（Leaks）\n\n现在，假设 QA 提交了一份报告，指出应用程序使用时间越长，运行越缓慢。在上下滚动几分钟后，应用程序最终崩溃。这个问题听起来像内存泄漏，所以让我们看看能发现什么。\n\
  \n请注意，这个问题是在一次部署后出现的，那次部署更新了一些其他代码，并对 `Super_CheckoutViewController.m` 中的 `imageReceived:forRequest:`\
  \ 方法做出了以下更改：\n\n```\n-(void) imageReceived:(UIImage *)image forRequest:(NSString\
  \ *)connectionIdentifier {\n    ProductCell *cell = (ProductCell *)[self.tableView\n\
  cellForRowAtIndexPath:[imageIndexPaths\n objectForKey:connectionIdentifier]];\n\n\
  \    CGFloat target = 64;\n\n    CGImageRef oldImage = [image CGImage];\n    CGFloat\
  \ imageWidth = (CGFloat)CGImageGetWidth(oldImage);\n    CGFloat imageHeight = (CGFloat)CGImageGetHeight(oldImage);\n\
  \n    CGFloat widthFactor = target / imageWidth;\n    CGFloat heightFactor = target\
  \ / imageHeight;\n    CGFloat factor = 1.0;\n\n    if (widthFactor > 1.0 && heightFactor\
  \ > 1.0) {\n        factor = 1.0;\n    } else {\n        if (widthFactor >= heightFactor)\
  \ {\n            factor = widthFactor;\n        } else {\n            factor = heightFactor;\n\
  \        }\n    }\n\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
  \    CGContextRef imageContext = CGBitmapContextCreate(NULL, imageWidth, imageHeight,\
  \ 8, 4\n * imageWidth, colorSpace, kCGImageAlphaPremultipliedFirst);\n    CGContextDrawImage(imageContext,\
  \ CGRectMake(0, 0, imageWidth, imageHeight), oldImage);\n    CGContextScaleCTM(imageContext,\
  \ imageWidth * factor, imageHeight * factor);\n    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);\n\
  \n    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];\n\n  \
  \  [cell.productImage setImage:resizedImage];\n\n    [imageIndexPaths removeObjectForKey:connectionIdentifier];\n\
  }\n```\n\n需求是将图像调整为与要显示的图像尺寸匹配。新代码有一些非常明显的问题，但我们将通过 Instruments 运行它并定位代码中的问题。\n\n\
  我们不需要在设备上运行应用程序，因此使用方案选择器切换到模拟器。对应用程序进行性能分析（Profile），这次在 Instruments 启动并询问您使用哪个模板时，选择“Leaks”（参见图\
  \ 4-19）。\n\n![images](img/0419.jpg)\n\n**图 4-19.** *使用 Leaks 模板启动 Instruments*\n\
  \n当应用程序在模拟器中启动后，在表视图中上下滚动几次，您会看到“Leaks”工具图表中出现一些泄漏。退出 iOS 模拟器，将 Instruments 置于前台以分析数据。点击“Leaks”图表，即可看到如图\
  \ 4-20 所示的视图。\n\n![images](img/0420.jpg)\n\n**图 4-20.** *Instruments 显示几处泄漏以及检测到泄漏的内存位置*\n\
  \n让我们花点时间看看这些数据。Instruments 告诉我们有几处内存泄漏。引入最新版本代码中的一些 Core Graphics 代码以及一些 `UIImage`\
  \ 实例似乎正在泄漏。Instruments 证实了怀疑，但我们不知道泄漏的细节。展开 `UIImage` 树，选择顶部的 `UIImage` 实例。接着，点击内存地址旁边的箭头以显示泄漏的详细信息。这类似于向僵尸对象发送消息时的分配工具。图\
  \ 4-21 展示了此示例。\n\n![images](img/0421.jpg)\n\n**图 4-21.** *在此 Instruments 单次泄漏的详细信息视图中，请注意引用计数视图及其计数剩余为\
  \ 1 的情况。*\n\n\n\n### 扩展详细窗格\n\n展开“扩展详细”窗格（点击工具栏中的右侧主视图按钮），然后根据泄漏历史记录中的任意一项查看调用堆栈。您之前已经见过此视图，因此双击出现在我们代码中的某个调用堆栈项。这将打开有问题的源代码文件，文件上带有一些注释，让您了解哪些变量正在泄漏以及泄漏了多少。图\
  \ 4–22 显示了相同的视图。\n\n![images](img/0422.jpg)\n\n**Figure 4–22.** *检查源代码可以找到一些可能的罪魁祸首*\n\
  \n我们已经能够通过变更追踪到哪些对象被泄漏了，所以让我们修复这些泄漏。点击编辑器中的 Xcode 图标，将打开 Xcode 并显示有问题的代码。由于部分代码使用了\
  \ C 语言 API，我们需要记住：几乎所有名称中包含“create”的 C 函数都会创建一个新的引用；我们需要通过释放操作来平衡它。\n\n在 Xcode 中打开该文件，并修改`if`语句下的代码段，使其与以下内容匹配：\n\
  \n```\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n    CGContextRef\
  \ imageContext = CGBitmapContextCreate(NULL, imageWidth, imageHeight, 8, 4\n* imageWidth,\
  \ colorSpace, kCGImageAlphaPremultipliedFirst);\n    CGContextDrawImage(imageContext,\
  \ CGRectMake(0, 0, imageWidth, imageHeight), oldImage);\n    CGContextScaleCTM(imageContext,\
  \ imageWidth * factor, imageHeight * factor);\n    CGImageRef newImage = CGBitmapContextCreateImage(imageContext);\n\
  \n    CGColorSpaceRelease(colorSpace);\n    CGContextRelease(imageContext);\n\n\
  \    UIImage *resizedImage = [[UIImage alloc] initWithCGImage:newImage];\n\n   \
  \ [cell.productImage setImage:resizedImage];\n\n    CGImageRelease(newImage);  \n\
  \    [resizedImage release];\n```\n\n现在，在泄漏检测工具中重新运行应用程序，并多滚动一些内容。这修复了问题吗？Instruments\
  \ 仍然检测到了一些泄漏。好吧，我们将深入探究这些泄漏。我们已经修复了最初的问题，但在所有泄漏都处理完毕之前，我不会感到满意。图 4–23 显示了 Instruments\
  \ 中一个它认为正在泄漏的项目：\n\n![images](img/0423.jpg)\n\n**Figure 4–23.** *在自动释放池中发现的一个泄漏示例*\n\
  \n图 4–23 显示了在自动释放池中检测到的一个泄漏示例（列表中的最后一个）。如果我们追踪该对象的内存历史记录，会看到以下内容：\n\n*   *Malloc*：引用计数为\
  \ 1\n*   *Autorelease*：添加到当前的自动释放池\n*   *Retain*：引用计数为 2\n*   *Release*：引用计数为 1\n\
  \n我们现在有一个位于自动释放池中、准备被释放的对象。那它为什么还没有被释放呢？答案在于我们的`main`函数。当应用程序启动时，会创建一个自动释放池。如果没有创建另一个自动释放池，并且代码在主线程上执行，那么这些对象会被添加到为应用程序创建的自动释放池中。这意味着这些内存会一直存在，直到应用程序终止，最顶层的自动释放池被清空。有关自动释放池的更多信息，请查看\
  \ Apple 开发者库中的“内存管理编程指南”。\n\n不过，不要觉得你可以随意在任何地方创建自动释放池。作为 iOS 开发者，我们生活在一个内存受限的世界中，需要做好本分，清理自己产生的垃圾。创建自动释放池可能会引起意外后果，所以只有在绝对必要时才使用自动释放池。一个使用自动释放池的好时机是在一个非常紧凑的循环中，这种循环很容易快速产生大量临时对象。\n\
  \n### 重新审视保留循环\n\n在本章前面部分，我们讨论了如何使用 Instruments 检测保留循环。由于 Super Checkout 没有任何保留循环，我们需要人为制造一个。我不需要引导您从头构建一个新项目并制造保留循环，而是已经为您完成了这些艰苦的工作。这个示例与在\
  \ Instruments 中使用泄漏检测工具的工作流程相同。\n\nInstruments 中显示保留循环的新功能可以在泄漏检测工具的跳转栏中找到。图 4–24\
  \ 显示了制造出来的保留循环，并在跳转栏中选中了相应的项目。\n\n![images](img/0424.jpg)\n\n**Figure 4–24.** *Instruments\
  \ 显示一个简单的保留循环*\n\n在图 4–17 中，首先要注意的是右侧的图表。它显示了内存中的确切循环以及引用之间的关系。所讨论的循环展示了一个典型的子对象持有父对象的情况。在左侧的列表中，您可以看到本次运行中的各种循环。在这个例子中它们都是相同的，并且工作流程是查找堆栈跟踪以确定循环是在哪里创建的。\n\
  \n在这个示例中，点击循环旁边的箭头将会调出图 4–25（右侧区域已展开以显示更多细节）。结果显示的视图能更好地展示保留循环以及导致该循环的堆栈跟踪。点击每个节点会显示不同的堆栈跟踪，因此您可以确定循环真正在代码中的哪个位置被创建并打破它。\n\
  \n![images](img/0425.jpg)\n\n**Figure 4–25.** *循环详情，堆栈跟踪显示了循环开始的位置*\n\n处理完循环问题后，我们就能够熟练地使用我们手中的工具来查找和修复与内存相关的问题了。\n\
  \n### GDB 功夫\n\n当其他方法都失败时，你遇到的就是一个非常有趣的 Bug。正如你在前面的示例中发现的那样，异步代码极难调试。再加上多线程代码会修改相同的对象（无论加锁与否），你就会创造出一些有趣的问题去解决。计算机科学中甚至有专门的分支来应对这些类型的问题。\n\
  \nSuper Checkout 是一个非常简单的应用程序。输入和输出定义明确，网络通信也相当简单。你的应用程序很可能不会这么简单。你可能会遇到死锁（两个线程相互等待对方完成对资源的操作）或竞态条件。如果不使用非常底层的工具进行介入，这两个问题很难诊断。\n\
  \n#### GDB，现在别让我失望\n\n我成长过程中最喜欢的歌曲之一是 Little Feat 的《Don't Fail Me Now》。这首歌发行的时候，差不多也是理查德·斯托曼开始推动他的\
  \ GNU 就是 Unix（GNU's Not Unix）自由软件运动的时候。那时，C 语言是任何 Unix 编程的事实标准。他的调试器是 GDB，即 GNU\
  \ 调试器。\n\nGDB 是 Xcode 和 Instruments 调试工具的核心与灵魂。许多漂亮的图表、直方图和菜单都是苹果在 GDB 的基础上应用其精美的设计和营销能力的结果。\n\
  \n然而，图形用户界面有时也会碍事。如果你读到了本章的这个阶段，仍然没有找到你的 Bug，那么真的是时候活动一下指关节，甩甩手，深入命令行 GDB 工具套件了。你可能会对自己哼唱：“GDB，现在别让我失望。”\n\
  \n\n\n##### GDB 入门指南\n\n为了让你熟悉 GDB，请在 `Super_CheckoutViewController.m` 文件的 `viewDidLoad:`\
  \ 方法中放置一个可视断点（参见 图 4–26）。要创建可视断点，只需点击编辑器装订线中的任意位置即可。\n\n![images](img/0426.jpg)\n\
  \n**图 4–26.** *在 `Super_CheckoutViewController.m` 文件的第 178 行放置的可视断点*\n\n运行应用，当应用中断时，按下\
  \ ![image](img/U002.jpg) + shift + Y 调出调试控制台（如果尚未显示）。你会看到三个不起眼的蓝色字母，它们被括在圆括号中，如\
  \ 图 4–27 所示。\n\n![images](img/0427.jpg)\n\n**图 4–27.** *GDB 在可视断点处中断后等待你的命令*\n\n\
  图 4–27 显示了 GDB 调试器的默认提示符。不必害怕，它很友好。它知道如何进行加法、乘法以及执行任何 C 表达式。点击 `(gdb)` 提示符旁边。我们经常使用\
  \ `p` 命令后跟一个表达式来进行快速求值。尝试输入 `p 2+2` 并按回车键。你应该会看到以下输出：\n\n```\n(gdb) p 2+2\n$1 =\
  \ 4\n```\n\n你可以基于结果继续构建。GDB 会为你输入的表达式设置美元符号变量。让我们用这个数字加上 10：\n\n```\n(gdb) p $1+10\n\
  $2 = 14\n```\n\n玩一下这个功能。很快你可能会觉得无聊。GDB 的真正价值在于能够动态评估表达式、检查变量、设置断点，以及在追踪内存错误时实时调整变量的值。\n\
  \n通过将断点从装订线拖到其他空间来移除可视断点。断点会像 OS X 中从 Dock 移除图标一样“噗”地消失。你可以通过在 Xcode 工具栏中选中或取消选中方案选择器旁边的断点按钮来启用或禁用断点。\n\
  \n##### 确定上下文——我在哪里？\n\n现在你已经熟悉了一些基本命令，让我们找一个需要更多调试帮助的地方。运行应用，并向购物车添加一个水果。进入购物车视图，尝试通过点击编辑按钮或滑动单元格来删除该商品。应用会因表视图的异常而崩溃。这是深入了解\
  \ GDB 的好时机，因为这是一个运行时异常，而不是内存问题。该异常发生在第 170 行，因此在第 168 行放置一个可视断点，即我们调用 `[tableView\
  \ beginUpdates]` 的地方。\n\n停止应用，然后重新运行并执行相同步骤。这次应用会在我们的断点处暂停。让我们看看断点在代码中的位置。点击控制台面板，输入\
  \ `l` 命令（即“列表”），然后按回车键：\n\n```\n(gdb) l\n163        // 从数据源中删除该行\n164        NSDictionary\
  \ *item = [[shoppingCart objectForKey:@\"items\"] objectAtIndex:[indexPath row]];\n\
  165\n166        [apiEngine removeProductFromCart:[item objectForKey:@\"id\"] withQuantity:[item\
  \ objectForKey:@\"quantity\"]];\n167       \n168        [tableView beginUpdates];\n\
  169        [tableView deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\
  \ withRowAnimation:UITableViewRowAnimationRight];\n170        [tableView endUpdates];\n\
  171       \n172    }\n(gdb)\n```\n\nGDB 显示了一段围绕当前断点的代码块。你可以使用 `backtrace` 命令了解更多关于\
  \ GDB 为何停止的信息，并请求查看堆栈中的第一个项目。那将是最近一次函数调用。\n\n```\n(gdb) bt 1\n#0  -[ShoppingCartViewController\
  \ tableView:commitEditingStyle:forRowAtIndexPath:]\n(self=0x12e080, _cmd=0x31ab6e38,\
  \ tableView=0x9c0c00,\neditingStyle=UITableViewCellEditingStyleDelete, indexPath=0x1b6750)\
  \ at\n/Users/brandon/Development/iOS/Super Checkout/Super Checkout/../Super\nCheckout/ShoppingCartViewController.m:168\n\
  (More stack frames follow...)\n(gdb)\n```\n\n我们看到调试器停在了源代码的第 168 行。列表显示了一个视觉上下文，即它停止位置的前后几行。这是代码的静态部分。它让你了解应用即将做什么。调试器还显示了动态上下文，即最初引导你到达这里的活动函数调用堆栈。\n\
  \n现在让我们深入一点。输入命令 `bt 5`，意思是“向我显示堆栈中的五个函数调用”；这个命令被称为反向跟踪：\n\n```\n(gdb) bt 5\n#0\
  \  -[ShoppingCartViewController tableView:commitEditingStyle:forRowAtIndexPath:]\n\
  (self=0x12e080, _cmd=0x31ab6e38, tableView=0x9c0c00, editingStyle=UITableViewCellEditingStyleDelete,\
  \ indexPath=0x1b6750) at /Users/brandon/Development/iOS/Super Checkout/Super Checkout/../Super\
  \ Checkout/ShoppingCartViewController.m:168\n#1  -[ShoppingCartViewController tableView:commitEditingStyle:forRowAtIndexPath:]\
  \ (self=0x1b6750, _cmd=0x318bb84b, tableView=0x2fdfdcac, editingStyle=10226688,\
  \ indexPath=0x12e080) at /Users/brandon/Development/iOS/Super Checkout/Super Checkout/../Super\
  \ Checkout/ShoppingCartViewController.m:168\n#2  0x3193dfb4 in -[UITableViewCell(UITableViewCellInternal)\
  \ deleteConfirmationControlWasClicked:] ()\n#3  0x330da570 in -[NSObject(NSObject)\
  \ performSelector:withObject:withObject:] ()\n#4  0x31766ec8 in -[UIApplication\
  \ sendAction:to:from:forEvent:] ()\n(More stack frames follow...)\n(gdb)\n```\n\n\
  这是一种手动显示 Xcode 在导航区域中的调试导航器中提供的相同信息的方式。你可以直观地浏览堆栈反向跟踪，如果代码是你自己的，你会看到代码变化为其他源代码，或者如果是进入框架代码，则会看到汇编代码（参见\
  \ 图 4–28）。\n\n![images](img/0428.jpg)\n\n**图 4–28.** *使用调试导航器直观地浏览堆栈反向跟踪*\n\n#####\
  \ 检查数据——我有什么？\n\n我们还应该看看运行时值，以了解发生了什么。GDB 提供了丰富的工具来检查值。使用 `info args` 检查方法的参数。使用\
  \ `info locals` 查看当前堆栈帧中的所有局部变量：\n\n```\n(gdb) info args\nself = (ShoppingCartViewController\
  \ *) 0x12e080\n_cmd = (SEL) 0x31ab6e38\ntableView = (UITableView *) 0x9c0c00\neditingStyle\
  \ = UITableViewCellEditingStyleDelete\nindexPath = (NSIndexPath *) 0x1b6750\n(gdb)\
  \ info locals\nitem = (NSDictionary *) 0x126f00\n(gdb)\n```\n\n这很不错。\n\n`whatis`\
  \ 命令检查参数的运行时类型，对于 `NSDictionary` 条目、委托（类型为 `id`）和多态参数非常有用。当出现类型不匹配时——也就是说，当你对错误类型执行你认为安全的操作时——可能会发生内存错误。这里我们检查\
  \ `item` 的类型：\n\n```\n(gdb) whatis item\ntype = NSDictionary *\n(gdb)\n```\n\n好的，这与预期一致。我们可以窥视结构内部。当你要求在你的控制台上打印一个参数时，Xcode\
  \ 就会使用这个命令。输入 `po` 后跟变量名；`po` 是“print object”（打印对象）的缩写：\n\n```\n(gdb) po item\n\
  {\n    id = 3;\n    name = \"Blood Orange\";\n    price = 110;\n    quantity = 1;\n\
  \    subtotal = 110;\n}\n(gdb)\n```\n\n在这里，我们可以在应用崩溃之前检查其状态。不过，我们还没有仔细查看之前遇到的错误。在\
  \ GDB 提示符下输入 `c` 以继续执行，并让应用再次崩溃。让我们更深入地检查这个问题。控制台显示如下：\n\n\n\n```\n(gdb) c\nContinuing.\n\
