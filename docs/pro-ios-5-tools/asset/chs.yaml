  \ `#import \"Person.h\"`。到目前为止，我们只更新了 `RootViewController` 来显示每个人的全名。我们还更新了它，以便在点击\
  \ Add 按钮时输入一个虚拟名称。既然我们已经做了一些更新并添加了一项功能，让我们将这些更改提交到 Git 仓库。\n\n首先，看一下项目导航器。你应该会看到类似于图\
  \ 2–11 的内容。\n\n![images](img/0211.jpg)\n\n**图 2–11.** *项目导航器使用你的源代码控制系统来跟踪文件，并显示哪些文件已被修改、哪些是新文件。*\n\
  \n现在，我们将所有修改过的文件作为一个 Git 提交（commit）的一部分进行提交。有多种方式可以实现此目的：选择 **文件 ![images](img/U001.jpg)\
  \ 源代码控制 ![images](img/U001.jpg) 提交**，或者选择要添加到提交中的修改文件，右键单击，然后选择**源代码控制 ![images](img/U001.jpg)\
  \ 提交所选文件...**。无论哪种方式，你都会看到如图 2–12 所示的视图。\n\n![images](img/0212.jpg)\n\n**图 2–12.**\
  \ *提交表单允许你检查待推送的更改并输入提交信息。*\n\n因为我们希望所有更改都进入此提交，所以不会取消选中项目视图中的任何文件。花点时间查看待推送更改的不同视图：项目视图、文件视图和平铺视图。项目视图按组结构显示项目中的更改上下文。文件视图按文件在文件系统中的实际存在方式显示文件。平铺视图则去掉列表中的任何结构，让你看到文件的原始列表。现在看一下内置的差异查看器，它会显示即将提交的更改。你可以通过右键单击任一编辑器视图来复制源代码更改，这样会以补丁格式的差异内容放入剪贴板。\n\
  \n作为优秀的开发者，我们将在提交信息中填写一些有意义的内容，比如：“changes”或“Continued development”。继续输入提交信息并点击提交。\n\
  \n\n### 添加一个新的视图控制器\n\n现在，我们的应用已经拥有了一个经过修改的模型，并且能够添加一些托管对象。接下来，让我们创建一个模态视图控制器，用于插入来自用户输入的新对象。在添加文件之前，请在\
  \ Super Hello World 组下创建一个名为 `NewPersonViewController` 的新组（通过右键点击 Super Hello World\
  \ 并选择 `New Group`）。接着，通过右键点击该组并选择 `New File`，向该组添加一个新文件。选择 `UIViewController` 子类，然后点击\
  \ Next。将其设置为 `UITableViewController` 的子类，并勾选“附带 XIB 用户界面”。点击 Next，将文件命名为 `NewPersonViewController.m`，然后点击\
  \ Save。\n\n让我们添加一些自定义单元格。打开 `NewPersonViewController.xib` 文件，开启辅助编辑器模式，并确保头文件打开在\
  \ `.xib` 文件的右侧。我们将为 XIB 添加一些自定义表格单元格，并将它们连接到新的视图控制器中。可拖入 XIB 的用户界面（UI）元素库位于工具面板的底部。点击“显示对象库”，拖入两个\
  \ `UITableViewCell` 元素（在列表中显示为 Table View Cell）。在每个单元格内拖入一个 `UITextField`（列表中的 Text\
  \ Field），并将其边框样式修改为不可见（通过点击工具面板中的“显示属性检查器”按钮，并在边框样式标签页中选择第一个按钮）。分别将占位文本设置为**名字**和**姓氏**。关闭工具面板，然后按住\
  \ Control 键将名字单元格（`UITableViewCell`，而非 `UITextField`）拖拽到头文件（在右侧编辑器面板中打开），将光标置于您通常会放置属性的位置——接口声明的闭合花括号下方。将该属性命名为\
  \ `firstName`。对姓氏单元格执行相同操作，将其命名为 `lastName`。\n\n您已经为这些单元格创建了输出口属性；现在，我们要为文本字段创建输出口属性。按住\
  \ Control 键拖拽文本字段本身，并分别命名为：`firstNameInput` 和 `lastNameInput`。图 2–13 展示了最终成果。\n\n\
  到目前为止，我们已经创建了一个新的视图控制器，修改了 XIB 以包含一些新的界面元素，并将 XIB 与类关联了起来。现在，让我们填充详细信息。代码清单 2–2\
