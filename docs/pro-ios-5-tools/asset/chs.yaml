  \ **布兰登·亚历山大**是一位 iOS 开发者、写作者和会议演讲者，与妻子和女儿居住在乔治亚州迪凯特。布兰登于 2008 年开始 iOS 开发，并在多个会议上发表过演讲。作为一名开发者，他喜欢让技术对用户透明且优雅实用；作为演讲者和写作者，他乐于向他人传授技术知识，以便他们也能做到这一点。在不编写代码、写作或出席会议时，布兰登喜欢魔术和摄影。你可以在\
  \ Twitter 上通过`@whilethis`找到他，或通过邮件联系[`brandon.alexander@gmail.com`](http://brandon.alexander@gmail.com)。\n\
  \n![image](img/brad_dillon.jpg) **布拉德·狄龙**自学成才，自学了其行业所需的技术，经历了 Web 开发、动画和其他基于桌面的交互式平台，最终在触屏界面开发中找到了归宿。自\
  \ iPhone SDK 发布以来，布拉德一直全职为 iOS 设备构建应用。凭借对用户体验的热情和对相关技术的深刻理解，布拉德帮助构建了弥合设备、用户与全球品牌之间差距的解决方案。你可以在[`http://jbradforddillon.com`](http://jbradforddillon.com)找到他，并在\
  \ Twitter 上关注`@jbradforddillon`。\n\n![image](img/kevin_y_Kim.jpg) **凯文·Y·金**是 AppOrchard\
  \ LLC 的创始合伙人，该公司是 Tipping Point Partners 旗下专注于可持续 iOS 开发的企业。他毕业于卡内基梅隆大学，在匹兹堡超级计算中心担任程序员时首次接触\
  \ NeXTStep 计算机（当今 iPhone 的前身），并从此着迷。他的职业生涯跨越了金融、政府、生物技术和科技领域，包括在苹果公司任职，负责管理纽约大都会区的苹果企业服务团队。他与妻子以及一群获救的猫咪居住在纽约市字母城地区。\n\
  \n## 关于技术审校\n\n![image](img/anselm_bradford.jpg) **安塞尔姆·布拉德福德**是新西兰奥克兰理工大学（AUT）的数字媒体讲师，研究方向包括交互式媒体、网络媒体和视觉传达。他与互联网相关的开发经验可以追溯到\
  \ 1996 年，当时他手动编写了第一个网站。他可以在 Twitter 上通过`@anselmbradford`找到，并偶尔在[`AnselmBradford.com`](http://AnselmBradford.com)上写博客。\n\
  \n\n\n## 简介\n\n近年来，iOS 平台人气飙升，并且丝毫没有放缓的迹象。应用市场竞争变得异常激烈，用户对优秀体验也习以为常。这使得我们作为应用开发者的工作变得非常困难。是什么让一款出色的应用从其他应用中脱颖而出？我们将通过本书来尝试回答这个问题。\n\
  \n### 为什么要写一本关于工具的书？\n\n常言道：“工匠的手艺好坏，取决于他/她的工具。”这对大多数行业来说基本都是如此。作为开发者，我们通常只需要一个文本编辑器和编译器。虽然这种配置也能完成工作，但一套优秀的工具——从\
  \ IDE（集成开发环境）到性能分析和调试工具——能极大地提升开发者在开发和调试过程中的效率。开发者面临的主要问题，尤其是在这些工具不断推出新版本的情况下，是如何有效地使用它们。这正是本书的定位所在。本书将全面介绍如何运用\
  \ Apple 提供的出色开发者工具，以及如何利用它们来打造卓越的应用。\n\n### 本书的组织结构\n\n本书的核心是流程。正如你将在第 1 章中读到的那样，无论你处于哪个阶段，本书都将帮助你在成为更优秀开发者的道路上不断前行。本书开头的几章主要涉及调试和性能调优。我们将把一个急需改进的项目推进到可以进入\
  \ Beta 测试的阶段。接着，我们会探讨如何提升开发者自身的效率，并让工具为我们完成大部分工作。我们甚至会将很多流程自动化，以便专注于更重要的问题。本书的最后部分将介绍如何与测试人员共享应用、如何回应反馈，以及最终如何在我们的应用之间共享代码。最后一章则聚焦于如何导航和自定义\
  \ Xcode，以适应我们自己的工作流程。\n\n### 支持与贡献\n\n如果你遇到任何问题，或者发现了对本书读者有帮助的实用技巧，请访问 [`http://proiostools.com/forum/`](http://proiostools.com/forum/)\
  \ 并参与讨论！我们的目标是建立一个出色的社区，并与已有的庞大 iOS 开发社区相互交融。我们在此提供帮助，也热切期待看到你在阅读本书过程中发现的各类技巧与诀窍。\n\
  \n## 第 1 章\n\n## 蜡上蜡，蜡下蜡\n\n到现在为止，你应该已经编写过一两个 iOS 应用了。你也懂得了打造一款出色的应用绝非易事。从突如其来的崩溃，到内存泄漏，再到引发其他\
  \ Bug 的 Bug，即使最简单的应用也可能迅速演变成一场噩梦。幸运的是，借助我们手中的工具，这些问题很容易诊断。\n\n这正是本书的主要内容。作为 iOS\
  \ 开发者，我们拥有一套工具箱。但随之而来的核心问题很快变成了：对于手头的任务，哪种工具是最佳选择？本书将为你的大部分情况解答这个问题。对于那些没有明确答案的情况，你也会学到一些能为你指明正确方向的方法和技巧。\n\
  \n### 本书面向哪些读者？\n\n在大多数技艺中，从完全新手到能够胜任的转变通常非常迅速。这一转变的目标仅仅是能够熟练使用工具，并理解工匠们的行话。这个转变过程也能建立新从业者的信心。在这个转变结束时，从业者已经能够完全胜任大部分任务，并解决大多数抛给他们的难题。\n\
  \n然而，大多数人停留在“熟练”这个阶段。作为一名魔术师，我相对较快地从一名艺术新手成长为一名熟练的业余爱好者。每当我学到一项新技术或一个新效果时，我都非常兴奋地练习。但随着技艺的提升，练习的欲望减弱了，甚至对反复排练同一个效果或技巧感到厌倦。我的技艺陷入了瓶颈。我知道要进入下一阶段需要做什么，但当下我不想去做。我觉得这样也挺好。\n\
  \n这与软件开发有何关联？首先，和任何技艺一样，一套特定的编程技能可以很快习得，包括学习语言语法、理解流程控制、使用基本的软件设计模式、通过标准输出进行调试以及基本使用提供的调试器。开发者在走向精通之路的下一阶段，是更深入地学习语言和平台的工作原理、更多的设计模式及其恰当用法，以及更深入地掌握调试器。最后的、永无止境的阶段，就是不断微调所有这些技能，为现有问题找到更优解，并学习如何更多地复用代码。这个学习路径并非对每个开发者都相同。有时，开发的某些部分会比另一些更容易掌握。\n\
  \n我要表达的重点是，当你没有像期望的那样快速进步时，我不希望你感到沮丧。软件开发很难。区分爱好者与专业人士的是投入程度。从一名熟练的爱好者转变为专业人士，通常会使你进入职业模式。这种投入程度需要的不仅仅是练习的时间。你必须开始审视其他软件是如何制作的。让自己身边围绕着为同一个平台进行开发的人，尤其是那些比你更优秀的人，这对成长至关重要。购买这本书，也说明你认同自己希望成为一名更优秀的开发者。我的目标是帮助你至少学会一项新技能。如果你做到了，我的任务就完成了；如果你学到的更多，那就更棒了！\n\
  \n那么，这本书是写给谁的呢？这本书是写给那些准备好迈向更高层次的读者的。无论你目前处于何种技能水平，本书都能让你有所收获。也许你已经精通面向对象编程，而性能调优是你想学习的方向。或者你想知道，如何在不重写一半应用代码的情况下，为\
  \ iOS 创建一个通用应用。唯一的先决条件是，你对 iOS 开发和 Objective-C 有一定了解。\n\n### 本书是什么\n\n本书是一本指南，它将带领你从一个\
  \ Alpha 质量的应用起步，最终打造出一个功能完备、经过测试、可提交至 App Store 的应用。本书包含了众多行业技巧，从诊断内存问题到调整滚动视图以榨取设备的最后一丝性能。最后，你会希望把这本书放在办公桌上，标记好相应的页面，以便快速查阅常见问题的解决方法。\n\
  \n这本书能解决你所有的问题吗？恐怕不能，但你将学到一些用非常系统化的方式解决问题的方法。从本质上讲，我们是科学家，而运用科学方法来解决软件问题，最终将帮助我们学会如何在下一次避免问题的发生。\n\
  \n本书还遵循一个真实的软件生命周期。我们将在开发接近尾声时接手一个项目，带领它经过 Beta 测试阶段，最终交付一个可以发布的产品。我们会遇到一些常见障碍，并探究\
  \ iOS 的工作方式；我们甚至会解决一些有趣的问题。我们还会发现一些由热心人编写的有用库，他们慷慨地分享了自己针对特定问题的解决方案。\n\n\n\n###\
  \ 开始前的准备工作\n\n要充分利用本书，你需要在 iOS 开发者中心拥有一个付费开发者账号。这样你才能在实际的 iOS 设备上进行测试，并针对设备运行性能分析工具。我们将在设备上完成多项操作，因此如果你还没有付费账号，最好立即注册一个。截至本书撰写时，iOS\
  \ 开发者项目的年费为 **99 美元**。\n\n如果无法创建账号，你也可以从 Mac App Store 下载 `Xcode 4`。安装后即可获得 Xcode\
  \ IDE 和 Instruments 工具。你将能够在 iOS 模拟器中开发和调试应用，并对其运行部分性能分析工具。但本书后续介绍的某些调试和性能测试将无法进行。\n\
  \n要配置 iOS 开发者中心，请访问 [`http://developer.apple.com/ios/`](http://developer.apple.com/ios/)。图\
  \ 1-1 展示了主页的样式。点击顶部的“注册”链接即可开始。如果你希望将应用部署到 iOS 设备，这是最佳途径。若你是企业开发者，请查阅企业开发者计划。\n\n\
  ![images](img/0101.jpg)\n\n**图 1-1.** *iOS 开发者中心主页*\n\n下载并安装最新开发工具后，启动 Xcode 并熟悉一下界面。如果你习惯使用\
  \ Xcode 3，会发现 Xcode 4 的界面完全不同。别担心，在阅读本书各章节时，我们会逐步介绍各项功能。如果你是 iOS 平台新手，不妨和 Xcode\
  \ 打个招呼。相信你们很快就能成为朋友（放心，朋友之间偶尔也会闹别扭）。无论如何，你将开启一段精彩的旅程，学习如何充分利用苹果提供的工具箱以及一些优秀的第三方工具。\n\
  \n### 本书内容概览\n\n本书将围绕一个项目展开。我们会从项目初期的 Alpha 阶段开始，准备进行 Beta 测试。接着，我们将经历 Beta 测试阶段，通过错误报告和功能请求收集测试者提供的宝贵反馈。你将学习如何通过自动化优化工作流程，并将项目迁移为通用应用。最后，我们将探讨如何与开发者社区共享代码，并介绍如何充分发挥\
  \ Xcode 4 及其他实用工具的作用。\n\n以下是各章节的快速概览：\n\n- *第 2 章，顶级的工具集（Xcode、Interface Builder\
  \ 与 Instruments）*：在本章中，你将认识 Xcode 4 以及 iOS 开发工具包中的其他工具。我们将讨论 Xcode 的新布局以及集成 Interface\
  \ Builder 带来的好处。我们还将打开 Instruments，让你熟悉这款用于性能测试和调试的工具。\n- *第 3 章，三个界面…嗯，它能运行了*：在这里，我们将深入检查一个现有项目，学习如何直接在\
  \ Xcode 中使用 Git 和 GitHub。我们还将完成本书项目的首次构建：Super Checkout。\n- *第 4 章，内存管理与诊断*：本章将诊断并解决应用崩溃的首要原因。我们会讨论\
  \ Objective-C 的内存管理及最佳实践，并首次使用 Instruments 来帮助诊断这些棘手的内存问题。\n- *第 5 章，核心动画与流畅滚动*：解决内存问题后，我们将深入优化核心动画，让表格的滚动丝般顺滑。你将学习第二款工具的使用，并了解\
  \ iOS 渲染模型的一些有趣特性。\n- *第 6 章，网络、缓存与电源管理*：在本章中，你将全面了解网络知识以及内置 iOS 网络 API 的工作原理。我们将考察一个流行的网络库，并替换现有的网络层以增强应用功能。我们还会探讨缓存技术及其利弊。本章最后将聚焦电源管理，介绍\
  \ iOS 设备上的不同无线模块、它们对电池消耗的影响以及如何检测问题。\n- *第 7 章，准备 Beta 测试！*：在解决 Super Checkout 的一些重大问题后，我们将为\
  \ Beta 测试做准备。我们会了解一些 Beta 分发技术和管理测试的思路。\n- *第 8 章，为什么总是出问题？*：我们收到了错误报告，服务器 API 发生了变化，各种问题层出不穷。本章将研究如何将应用分解为可测试的组件，以减少代码中的错误数量。你还将学习如何让\
  \ Instruments 自动驱动应用并报告错误。最后，我们将建立一套测试套件，确保应用稳定运行，并在后续修改中保持稳定。\n- *第 9 章，我们能实现自动化吗？*：距离实现完全自动化的构建系统只差一步，该系统能在每次向源代码仓库推送新代码时自动运行测试。我们将介绍选用的可靠构建管理工具，以及如何自动向测试者推送新版应用。\n\
  - *第 10 章，现在他们想要 iPad 版本*：随着功能请求逐渐减少，我们发现需要开发与 iPad 兼容的 Super Checkout 版本。在本章中，你将学习如何将\
  \ Super Checkout 迁移为通用二进制文件，以及在不同尺寸的 iOS 设备间共享代码的不同技术。\n- *第 11 章，如何分享部分代码？*：我们的应用已准备发布，但我们还创建了一些出色的功能，希望将其提取为静态库，以便在多个项目甚至整个开发者社区中共享代码。我们将探讨如何在\
  \ GitHub 上分享代码，并简要讨论开源许可证问题。\n- *第 12 章，还有一件事*：到现在为止，我们已经将一个充满崩溃和错误的应用打磨成了可以发布的产品。本章将介绍\
  \ Xcode 的其他功能，以及如何加速工作流程。我们还将了解一些出色的第三方工具，它们能提升开发效率并减少需要编写的样板代码。\n\n### 让我们开始吧\n\
  \n准备好开始了吗？很好！在翻页深入项目之前，先提醒一点：本书涵盖的信息量很大，试图一次性消化所有内容并非明智之举。建议一次只读一章，必要时可反复阅读相关章节。相信我，书中的某些主题在成文之前也经过多次反复推敲。\n\
  \n如果遇到困难或感到困倦，不妨暂时放下书本，甚至小睡片刻。这能让你头脑清醒，大脑会在你做其他事情时继续处理这些信息。重新阅读时，你会豁然开朗，发现自己对内容的理解更深入了。学习是一个主动的过程，正如\
  \ Aaron Hillegass 在《Cocoa Programming for Mac OS X》中所说：“咖啡因不能替代睡眠。”\n\n现在，启动 Xcode\
  \ 4，打开笔记本，翻页开始吧。让我们一起来享受这个过程。\n\n## 第 2 章\n\n\n\n## 一流工具\n\nXcode 经历了又一次重大更新。这一次，Xcode\
  \ 采用了一个带有标签页的巨大窗口。此版本中的大量新功能让开发者的工作更加轻松。其中一些新功能包括：\n\n- 单一、统一的窗口，将所有功能整合在一起。\n-\
  \ 跳转栏可以更快速地浏览项目以及单个源文件，且不会占用太多空间。\n- Interface Builder 完全集成到 Xcode 中，使 nib 文件和源代码之间的集成更加紧密。\n\
  - Xcode 助理是一个双窗格编辑器，启用后，它会为你当前编辑的文件在旁边选择一个合适的文件进行查看。\n- LLVM 3.0 完全集成到 Xcode 中，这意味着更好的语法高亮、代码补全以及\
  \ LLVM 提供的许多其他功能。\n- 修复工具利用 LLVM 的一些功能，不仅能显示编译错误，还能建议快速修复。\n- Xcode 与一些常见的版本控制系统集成得更好：Git\
  \ 和 Subversion (SVN)。\n- 全新的调试器：LLDB 之于 GDB 就如同 LLVM 之于 GCC。\n- Instruments 拥有一个采用跳转栏和从\
  \ Xcode 界面借鉴的其他功能的新界面。\n\n有了这些新功能和增强的工作流程，当你习惯了 Xcode 3 时，可能会感觉有些不知所措。本章的计划是了解 Xcode\
  \ 的一些新特性，并查看一些常见功能被移动到了哪里。\n\n### 环顾四周\n\n首先，我们创建一个简单的项目，并将其中一些功能付诸实践。我们现在还不会创建什么有意义的东西；精彩的内容将在下一章开始。我们将了解在\
  \ Xcode 4 中完成一些常见任务的位置，以及一些新的用户界面增强功能。\n\n首先，启动 Xcode 4。我们将创建一个新项目，因此单击图 2–1 中显示的\
  \ `Create a new Xcode project` 按钮。\n\n![images](img/0201.jpg)\n\n**图 2–1.** *启动\
  \ Xcode 时映入眼帘的熟悉画面*\n\n在本章中，我们将创建一个基于导航的应用程序。选择该选项，然后单击 `Next`。在下一个屏幕中，我们为项目命名，声明我们的公司标识符，并选择任何其他项目偏好设置。继续，将项目命名为\
  \ `Super Hello World`，并以反向 DNS 形式填写公司标识符。在本练习中，我们将使用 `com.example`。同时选中 `Use Core\
  \ Data` 和 `Include Unit Tests` 复选框。你的屏幕应类似于图 2–2 所示。\n\n![images](img/0202.jpg)\n\
  \n**图 2–2.** *项目命名屏幕现在包含了创建单元测试目标的功能。*\n\n单击 `Next` 将弹出一个工作表，询问我们将项目保存到哪里。继续为项目选择一个位置，并选中创建本地\
  \ Git 存储库的复选框。单击 `Create` 将创建项目，并直接将你带入 `Super Hello World` 的项目设置中。\n\n首先显示的是项目详细信息（参见图\
  \ 2–3）。中间列选中的项目是项目的默认目标。你还会注意到单元测试目标位于其下方。如果你想更改项目编译和打包的方式，请修改特定的目标。如果你习惯于在 Xcode\
  \ 3 中执行此操作的方式，你会注意到修改目标现在集中到这一个区域了；你不再需要像在 Xcode 3 中那样进入信息窗格来修改目标。\n\n![images](img/0203.jpg)\n\
  \n**图 2–3.** *现在 Xcode 有一个默认编辑器用于修改项目元数据和目标。*\n\n现在我们的项目已经创建好了，你可以看到一些在 Xcode 3\
  \ 中熟悉的视图——只是有一些新的项目。\n\n图 2–4 显示了应用程序的以下主要部分：\n\n- 顶部，工具栏\n- 左侧，导航器区域\n- 底部，调试器区域\n\
  - 右侧，实用工具区域\n- 中间，编辑器区域\n\n![images](img/0204.jpg)\n\n**图 2–4.** *所有窗格都打开的 Xcode\
  \ 工作区窗口*\n\n#### 这么多窗格！\n\n你首先注意到的可能是宝贵的编辑器空间很容易丢失。好消息是，我们可以关闭所有窗格，只专注于代码。在我们过于深入之前，要不要先看看\
  \ Xcode 的每个部分，看看它们为我们带来了什么？\n\n顶部是工具栏。在工具栏中，你可以选择活动的部署目标并运行你的应用程序。你也可以为你选择合适的编辑器，以及打开和关闭窗格。最右边的按钮启动\
  \ Organizer 窗口，允许你管理 iOS 设备和所有项目。\n\n左侧的窗格是导航器区域。在这个窗格中，你可以选择多个导航器之一进行交互。可用于你的导航器有\
  \ `Project`、`Symbol`、`Search`、`Issue`、`Debug`、`Breakpoint` 和 `Log`。`Project` 导航器是默认导航器，允许你浏览项目中的文件。`Symbol`\
  \ 导航器以层次结构或平面视图显示项目中的符号。`Search` 导航器允许你在项目中搜索文本，并在下方显示结果。`Issue` 导航器借助 Xcode 内置的新编译器技术，近乎实时地显示任何编译器错误或警告。\n\
  \n接下来的两个导航器用于调试。`Debug` 导航器仅在调试会话期间处于活动状态。你可以根据线程或队列查看信息。按队列查看可以让你深入了解不同的调度队列，并显示你正在查看的队列类型。`Breakpoint`\
  \ 窗格是你管理应用程序中断点的位置。与 Xcode 3 一样，你可以创建新的断点，移动它们，禁用它们，以及删除它们。\n\n最后一个导航器是 `Log` 导航器。你执行的任何通常会被记录的操作都将放在这里，包括构建、静态分析、源代码控制操作和调试会话。\n\
  \n\n\n### 编辑器及配套的实用工具\n\n你绝大部分时间都会在编辑器区域中度过。Xcode 提供了多种文件编辑器供你使用：\n\n- 源代码\n- 项目和构建设置\n\
  - 属性列表（`plist`）文件\n- 富文本文件\n- Core Data 数据模型\n- Core Data 映射模型\n- XIB（XML nib）文件\n\
  - AppleScript\n- 脚本字典文件\n\n此外，还包含一些文件查看器，可用于查看图形、视频以及其他多种文件。\n\n你还可以选择三种不同类型的编辑器。你可以从工具栏访问这些编辑器类型。**标准编辑器**\
  \ 是最基本的编辑器，你可以像往常一样编辑文件。**辅助编辑器**（参见图 2–5）是一种新型编辑器，它允许你在编辑源文件时，旁边会有一个辅助视图显示相关的文件。例如，当你编辑一个源文件并选择辅助编辑器时，头文件会显示在它的旁边。如果你打开一个\
  \ nib 文件，辅助编辑器允许你查看关联的头文件（来自 nib 的“文件所有者”属性）并与其交互。从这里，你实际上可以将 nib 中的元素通过 Control\
  \ 拖拽到源代码编辑器中，Xcode 会将相应的属性放入你放置的代码位置。\n\n![images](img/0205.jpg)\n\n**图 2–5.** *辅助编辑器显示一个\
  \ nib，旁边是与之对应的文件所有者头文件。*\n\n某些文件类型可能没有对应的文件可以通过辅助编辑器打开。如果出现这种情况，你可以手动选择要在所选文件旁边显示的编辑器。为此，你需要使用辅助编辑器中的**跳转栏**来选择要显示的文件。你可以通过前往**视图\
  \ ![images](img/U001.jpg) 辅助编辑器**来修改辅助编辑器的位置，并指定辅助编辑器是位于标准编辑器的右侧还是下方。\n\n另一种编辑器选项是**版本编辑器**。如果你开启了源代码控制，此编辑器将显示你对所选文件所做的更改。在撰写本书时，Xcode\
  \ 4 仅支持 Git 和 Subversion 作为源代码控制工具。通过版本编辑器，你可以点击差异查看器下方的时间按钮来查看文件的历史记录。在同一屏幕中，你还可以查看追溯历史以及带有日志注释的文件历史视图（参见图\
  \ 2–6）。\n\n![images](img/0206.jpg)\n\n**图 2–6.** *版本编辑器让你能够查看文件历史记录以及版本注释，俗称责备视图。*\n\
  \n在图 2–6 中，你还可以看到编辑器右侧的**实用工具**区域。这个面板会根据你的选择显示上下文相关的信息。在图 2–5 中，我们选择了 `RootViewController`\
  \ nib，你可以看到实用工具区域与旧版 Xcode 中 Interface Builder 的检查器窗口相似。如果你选择了一个源文件，你会看到与在 Xcode\
  \ 3 中点击“获取信息”时相同的信息。在该区域，你可以选择源文件所属的目标，以及关于该文件的许多其他细节信息。\n\n当你浏览源文件时，可以点击实用工具区域的**显示快速帮助**按钮，查看光标所在任意符号的简要信息。在该区域，你可以点击任何一个蓝色条目，根据点击的上下文，它可能会打开头文件、其他文档或示例代码。花点时间尝试不同的编辑器，熟悉新的界面。别担心，我在这儿等你回来。\n\
  \n### 跳转栏\n\n在你熟悉编辑器的过程中，有没有注意到顶部的栏？它叫做**跳转栏**，可以让你快速浏览文件。图 2–7 显示了我们创建的`项目`中 `RootViewController`\
  \ 文件的跳转栏。\n\n![images](img/0207.jpg)\n\n**图 2–7.** *跳转栏是一种导航工具，始终位于其对应的编辑器上方。它也出现在\
  \ Instruments 中，用于执行相同类型的任务。*\n\n使用跳转栏是在项目中快速导航的一种方式，无需使用项目导航栏查找文件。**相关文件按钮**（看起来像一个等号）会弹出一个列表，让你查看最近文件、未保存的文件，以及与当前查看文件相关的许多其他列表。\n\
  \n**后退**和**前进**按钮允许你在已打开的编辑器中的文件历史记录中导航。用双指左右滑动可以快速浏览文件，就像在 Lion 系统中的 Safari 浏览器中一样。\n\
  \n右侧其余部分是一个面包屑导航路径，从项目开始，显示如何到达你正在编辑的方法。在图 2–7 中，你可以看到我们从项目开始，在“Super Hello World”组中是文件\
  \ `RootViewController.m`，我们正在查看 `fetchedResultsController` 选择器。点击任何一项都会显示同级项列表，并允许你深入到每一个后续层级。\n\
  \n### 管理器\n\nXcode 4 引入了一个新管理器，它的功能名副其实：**管理**你的开发工作空间。你可以通过点击工具栏上的**管理器**按钮或按下\
  \ ![images](img/U004.jpg) ![images](img/U003.jpg)2 来打开它。图 2–8 显示了打开到“项目”选项卡的管理器。管理器有以下五项主要功能：\n\
  \n- 管理开发设备\n- 管理源代码控制仓库\n- 管理最近项目\n- 管理归档构建\n- 显示文档\n\n查看一下**设备**部分。如果你是注册开发者，你可以在此部分管理你的所有开发者配置文件、预置描述文件、旧的\
  \ iOS 软件镜像、设备日志和屏幕截图。你还可以查看 Xcode 在你连接每台设备时收集的特定设备信息。当连接设备时，你可以截取屏幕截图（用于 App Store\
  \ 提交），甚至可以将屏幕截图保存为启动图像。\n\n接下来要看的是**仓库**选项卡。它显示了已设置源代码控制的最近项目的仓库。如果有要签出的现有项目，你可以设置仓库链接并签出仓库的新工作副本。如前所述，Xcode\
  \ 仅支持 Git 和 Subversion。任何其他源代码控制都必须通过外部工具进行管理。\n\n图 2–8 显示了**项目**选项卡。此选项卡会显示 Xcode\
  \ 已知的项目。它显示了哪些项目当前处于打开状态，以及关于项目的其他基本信息。此视图还允许你管理项目快照。\n\n![images](img/0208.jpg)\n\
  \n**图 2–8.** *显示你曾处理过的项目列表的管理器*\n\n接下来的选项卡允许你管理已归档的应用程序。应用程序归档功能是在 Xcode 3 中引入的，旨在为\
  \ iOS 开发者提供一种简化的方式来提交应用进行审批。归档应用程序后，你可以验证二进制文件以检查是否有常见遗漏项，然后再将应用程序提交到商店、与测试人员共享临时构建版本，或者将应用程序提交到商店。\n\
  \n管理器中的最后一个选项卡是**文档**选项卡。这是你访问 iOS、Mac OS 和 Xcode 4 文档的门户。查看任何文档时，你都会在顶部找到一个跳转栏，它的工作方式与源代码编辑器中的跳转栏完全相同。\n\
  \n\n\n#### 标签页，标签页，更多的标签页\n\n在回到我们的项目之前，让我们先看看最后一个项目：标签页。Xcode 的标签页允许你在同一个窗口中同时打开多个编辑器。图\
  \ 2-9 展示了打开三个标签页的 Xcode。\n\n![images](img/0209.jpg)\n\n**图 2-9.** *Xcode 中的多个标签页*\n\
  \n这些标签页带来的不仅仅是多个编辑器。你可以将标签页从窗口中拖出，并以该配置打开一个全新的窗口。这意味着你可以有一个窗口用于编辑源代码，另一个窗口用于编辑 nib\
  \ 文件。每个标签页都可以独立配置，并拥有自己的历史记录管理。如果只打开了一个标签页，你可以通过 **视图 ![images](img/U001.jpg) 显示/隐藏标签页栏**\
  \ 来显示或隐藏标签页栏。\n\n你不妨继续浏览 Xcode 中的不同视图？当你回来时，我还会在这里。\n\n### 回到代码\n\n既然我们已经更深入地了解了\
  \ Xcode，现在就对我们的项目进行一些基本修改，并开始将更改提交到本地 Git 仓库。在本章中，我们将构建一个非常简单的数据收集应用程序。我们将修改核心数据模型，添加一个新的视图控制器，然后将所有更改检入源代码控制。\n\
  \n在开始之前，先构建应用程序以确保它能编译。转到 **产品 ![images](img/U001.jpg) 构建** 或按下 ![images](img/U003.jpg)B。项目应该能成功编译，没有错误。通过转到\
  \ **产品 ![images](img/U001.jpg) 清理** 或按下 ![images](img/U003.jpg) ![images](img/U004.jpg)K\
  \ 来清理项目，清除所有构建产物。\n\n#### 更新核心数据模型\n\n我们要做的第一件事是修改核心数据模型。首先在 Xcode 中打开数据模型（在项目管理器窗格中点击\
  \ `Super_Hello_World.xcdatamodeld`），然后更新模型，如图 2-10 所示。\n\n![images](img/0210.jpg)\n\
  \n**图 2-10.** *Super Hello World 的非常简单模型*\n\n如你所见，我们使用 Person 实体替换了 Event 实体，该实体包含两个属性：`firstName`\
  \ 和 `lastName`。完成后，我们将通过选择 Person 实体，然后在菜单栏中转到 **编辑器 ![images](img/U001.jpg)** **创建\
  \ NSManagedObject 子类…** 来创建一个 `NSManagedObject` 子类。将出现一个工作表询问你保存模型类的位置，点击“创建”，你将在项目导航器中看到全新的\
  \ Person 头文件和实现文件。\n\n我们的示例应用程序将显示一个名称列表，因此让我们修改 `Person` 类，使其具有以下头文件：\n\n```\n\
  #import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n@interface Person\
  \ : NSManagedObject {\n@private\n}\n@property (nonatomic, retain) NSString * firstName;\n\
  @property (nonatomic, retain) NSString * lastName;\n\n-(NSString *) fullName;\n\n\
  @end\n```\n\n这是它的实现：\n\n```\n#import \"Person.h\"\n\n@implementation Person\n@dynamic\
  \ firstName;\n@dynamic lastName;\n\n-(NSString *) fullName {\n     return [NSString\
  \ stringWithFormat:@\"%@ %@\", [self firstName], [self lastName]];\n}\n\n@end\n\
  ```\n\n我们在这里所做的只是添加一个 `fullName` 方法来计算人的全名。\n\n既然我们已经修改了模型，就需要用这些更改更新 `RootViewController`，并更新表格中显示的内容。我们只需要在几个地方更新该类；代码清单\
  \ 2-1 展示了受影响的方法。\n\n**代码清单 2-1.** *修改 RootViewController 以反映新模型*\n\n```\n- (void)configureCell:(UITableViewCell\
  \ *)cell atIndexPath:(NSIndexPath *)indexPath\n{\n    Person *person = (Person *)[self.fetchedResultsController\
  \ objectAtIndexPath:indexPath];\n    cell.textLabel.text = [person fullName];\n\
  }\n- (void)insertNewObject\n{\n    // 创建由抓取结果控制器管理的实体的新实例。\n    NSManagedObjectContext\
  \ *context = [self.fetchedResultsController managedObjectContext];\n    NSEntityDescription\
  \ *entity = [[self.fetchedResultsController fetchRequest] entity];\n    Person *newManagedObject\
  \ = (Person *)[NSEntityDescription insertNewObjectForEntityForName:\n    [entity\
  \ name] inManagedObjectContext:context];\n\n    // 如果合适，配置新的托管对象。\n    // 通常你应该使用存取方法，但在这里使用\
  \ KVC 可以避免为模板添加自定义类。\n    [newManagedObject setFirstName:@\"Jonny\"];\n        \
  \ [newManagedObject setLastName:@\"Appleseed\"];\n\n    // 保存上下文。\n    NSError *error\
  \ = nil;\n    if (![context save:&error])\n    {\n        /*\n         请用处理错误的代码替换此实现。\n\
  \n         abort() 会导致应用程序生成崩溃日志并终止。你*不应该*在正式发布的应用程序中使用此函数，尽管它在开发过程中可能有用。如果无法从错误中恢复，请显示一个提示面板，指导用户通过按下\
  \ Home 按钮来退出应用程序。\n         */\n        NSLog(@\"未解决的错误 %@, %@\", error, [error\
  \ userInfo]);\n        abort();\n    }\n}\n\n- (NSFetchedResultsController *)fetchedResultsController\n\
  {\n    if (__fetchedResultsController != nil)\n    {\n        return __fetchedResultsController;\n\
  \    }\n```\n\n\n```objective-c\n/*\n 设置抓取结果控制器。\n*/\n// 为实体创建抓取请求。\nNSFetchRequest\
  \ *fetchRequest = [[NSFetchRequest alloc] init];\n// 根据实际情况编辑实体名称。\nNSEntityDescription\
  \ *entity = [NSEntityDescription entityForName:@\"Person\"\n    inManagedObjectContext:self.managedObjectContext];\n\
  \n[fetchRequest setEntity:entity];\n\n// 将批量大小设置为合适的数值。\n[fetchRequest setFetchBatchSize:20];\n\
  \n// 根据实际情况编辑排序键。\nNSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc]\
  \ initWithKey:@\"lastName\" ascending:YES];\nNSArray *sortDescriptors = [[NSArray\
  \ alloc] initWithObjects:sortDescriptor, nil];\n\n[fetchRequest setSortDescriptors:sortDescriptors];\n\
  \n// 根据实际情况编辑分区名称键路径和缓存名称。\n// 分区名称键路径设为 nil 表示“无分区”。\nNSFetchedResultsController\
  \ *aFetchedResultsController = [[NSFetchedResultsController alloc]\n    initWithFetchRequest:fetchRequest\n\
  \     managedObjectContext:self.managedObjectContext\n         sectionNameKeyPath:nil\n\
  \                            cacheName:@\"Root\"];\naFetchedResultsController.delegate\
  \ = self;\nself.fetchedResultsController = aFetchedResultsController;\n\n[aFetchedResultsController\
  \ release];\n[fetchRequest release];\n[sortDescriptor release];\n[sortDescriptors\
  \ release];\n\n    NSError *error = nil;\n    if (![self.fetchedResultsController\
  \ performFetch:&error])\n    {\n        /*\n         将此处实现替换为适当处理错误的代码。\n\n    \
  \     abort() 会导致应用程序生成崩溃日志并终止。在生产应用程序中不应使用此函数，尽管它在开发过程中可能有用。如果无法从错误中恢复，请显示一个警告面板，指导用户通过按下\
  \ Home 键退出应用程序。\n         */\n        NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n\
