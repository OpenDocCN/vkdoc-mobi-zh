  \ + 38\n        14  UIKit                        0x31766b8d -[UIControl(Internal)\n\
  _sendActionsForEvents:withEvent:] + 356\n        15  UIKit                     \
  \   0x31767423 -[UIControl touchesEnded:withEvent:] + 342\n        16  UIKit   \
