  \n![images](img/1127.jpg)\n\n**Figure 11–27.** *将文件添加到工作区的上下文菜单*\n\n![images](img/1128.jpg)\n\
  \n**Figure 11–28.** *将 Super Checkout 应用程序添加到工作区*\n\n您的工作区现在应该有一个项目，Super Checkout（参见\
  \ Figure 11–29）。重复此过程以添加 ASIHTTPRequest 和 SBJSON 项目。再次使用导航窗格中的上下文菜单，而不是文件菜单。完成后，您的工作区窗口应类似于\
  \ Figure 11–30。\n\n![images](img/1129.jpg)\n\n**Figure 11–29.** *包含 Super Checkout\
  \ 应用程序的工作区*\n\n![images](img/1130.jpg)\n\n**Figure 11–30.** *包含所有项目的工作区*\n\n像我们之前所做的那样，将`libASIHTTPRequest.a`和`libSBJSON.a`库添加到\
  \ Super Checkout 应用程序。单击导航窗格中的 Super Checkout 项目以显示项目编辑器视图。选择构建阶段选项卡，并展开标题为“Link\
  \ Binary With Libraries (7 Items)”的构建阶段。单击加号，添加这两个静态库。\n\n此外，我们可以删除 Super Checkout\
  \ 应用程序中不需要的原始 ASIHTTPRequest 和 SBJSON 文件。单击导航窗格中 Super Checkout 项目旁边的展开三角形。打开 Super\
  \ Checkout 组，并删除名为外部库的组。当对话框出现时，真正删除这些文件。\n\n最后，我们需要调整源文件`SCJSONParser.m`。我们需要更正\
  \ SBJSON 头文件的`#import`指令。调整文件内容如下：\n\n```\n#import \"SCJSONParser.h\"\n#import \"\
  JSON.h\"\n```\n\n\n\n保存文件并构建 Super Checkout 应用程序。如果观察 Xcode 的 Activity Viewer，你会看到它首先构建了\
  \ `ASIHTTPRequest` 和 `SBJSON` 项目，即使我们没有将它们指定为 Super Checkout 的目标依赖项。Xcode 能够推断出我们需要先构建这些项目，因为我们将其产品\
  \ `libASIHTTPRequest.a` 和 `libSBJSON.a` 链接到了 Super Checkout 应用。\n\n然而，构建似乎因词法或预处理器问题而失败。你可能会看到\
  \ Xcode 无法找到以下三个文件之一：`ASIHTTPRequest.h`、`ASIDownloadCache.h` 或 `JSON.h`。我们之前将静态库作为子项目包含时曾遇到过此错误。问题类似，但这次的解决方案不同。\n\
  \n选择 Super Checkout 项目，展开项目视图。选择 Super Checkout 目标，然后选择 Build Settings 标签页。找到名为\
  \ Search Paths 的构建设置组。在其中找到标记为 Header Search Paths 的行。双击该行（行标签右侧），此时应会弹出一个窗口。点击左下角的加号添加一行。在\
  \ Path 列下输入值 `$(BUILT_PRODUCTS_DIR)`，然后点击 Done（参见 Figure 11–31）。\n\n**注意：** 我认为必须设置\
  \ Search Paths 构建设置是 Xcode 的一个 Bug。Xcode 知道要首先构建静态库项目，并将所有工作区项目构建到同一位置。按理说，Xcode\
  \ 应该自动将 `BUILT_PRODUCTS_DIR` 包含在其头文件搜索路径中。如果你也同意，请在 [`http://bugreporter.apple.com/`](http://bugreporter.apple.com/)\
  \ 提交错误报告。\n\n![images](img/1131.jpg)\n\n**Figure 11–31.** *设置头文件搜索路径*\n\n**注意：**\
  \ `BUILD_PRODUCTS_DIR` 是一个 Xcode 环境变量。实际值取决于构建环境。在这个例子中，`BUILT_PRODUCTS_DIR` 取决于构建配置。如果展开\
  \ Header Search Paths 行，你会看到它为 Debug 和 Release 配置解析成了两个不同的值。\n\n构建项目并运行它。再次成功！\n\
  \n我已经向您展示了两种将静态库添加到应用的方法。两种方法都可以，选择最适合您的一种。然而，自从 Xcode 4 引入工作区以来，很明显 Apple 可能会将此视为集成多个项目的首选方法。\n\
  \n### 在 GitHub 上共享\n\n让我们暂时离开我们的应用，思考一下如何共享代码。共享项目的方式有很多种。我们可以将源代码打包发布到博客或网站上，但更好的方案是使用公共源代码仓库（repo）。一个好的仓库应允许我们限制谁可以提交代码，同时允许任何人查看或下载代码。其他有益的功能应包括集成的\
  \ Bug/问题追踪器和 Wiki 系统。\n\n有很多选择可以满足这些标准。一个流行的选择是 GitHub（[`http://www.github.com`](http://www.github.com)），参见\
  \ Figure 11–32。GitHub 是一个基于 Git 分布式版本控制系统的网站，Git 强调速度，最初由 Linus Torvalds（又是他！）开发，用于协助\
  \ Linux 内核的开发。Git 的一个特性是每个工作目录都是一个功能完整的仓库，具有完整的历史记录和完整的版本追踪能力。每个 Git 仓库不依赖于网络访问或中央服务器。\n\
  \n![images](img/1132.jpg)\n\n**Figure 11–32.** *GitHub 主页*\n\n如果你还记得，我们在创建项目时勾选了“为此项目创建本地\
  \ git 仓库”的复选框。这会在我们的项目目录中创建一个本地 git 仓库。通常，这个仓库是隐藏的，但使用 `Terminal.app`，我们可以通过命令行使用\
  \ `ls –aCF` 命令看到它（参见 Figure 11–33）。\n\n![images](img/1133.jpg)\n\n**Figure 11–33.**\
  \ *SBJSON 项目目录中名为 .git 的 Git 仓库*\n\n#### 登录 GitHub\n\n首先登录你的 GitHub 账户。如果你尚未创建账户，请立即创建一个。关于如何设置账户的信息，请参见\
  \ Chapter 3。\n\n在您的 GitHub 仪表板中（参见 Figure 11–34），左侧是关于您可能正在关注的仓库的状态更新。右侧是您自己的仓库。在您的仓库下方是您正在关注的仓库。\n\
  \n当您关注一个仓库时，您是在告诉 GitHub 您对跟踪一个项目感兴趣，但可能不想为其贡献代码。这是一个相当方便的功能，可让您轻松跟踪项目。如果您还不熟悉 GitHub，可以浏览该网站以了解更多类似的功能。\n\
  \n![images](img/1134.jpg)\n\n**Figure 11–34.** *一个示例 GitHub 仪表板*\n\n#### 创建一个共享仓库\n\
  \n从您的 GitHub 仪表板，点击“Your Repositories”标签旁边的“New Repository”按钮。这将带您进入新仓库页面（[`https://github.com/repositories/new`](https://github.com/repositories/new)），参见\
  \ Figure 11–35。\n\n![images](img/1135.jpg)\n\n**Figure 11–35.** *GitHub 新仓库页面*\n\
  \n在 Project Name 字段中输入 **SBJSON**。其余字段为可选，但在 Description 字段中输入 **SBJSON static library\
  \ for Super Checkout**。此项目没有主页，因此将该字段留空。由于我们使用的是免费账户，并且计划与所有人共享此代码，请保持标签“Anyone\
  \ (learn more about public repos)”旁边的单选按钮处于选中状态。点击 Create Repository 按钮。\n\n我们应该会被重定向到我们新的\
  \ GitHub 仓库（参见 Figure 11–36）。由于这是一个空仓库，GitHub 已经贴心地给出了我们需要在计算机上执行的命令来设置我们的项目。\n\n\
  ![images](img/1136.jpg)\n\n**Figure 11–36.** *我们的 GitHub 仓库主页*\n\n回到您的计算机，打开 `Terminal.app`。导航到\
  \ SBJSON 静态库项目的项目目录。在命令行中，输入 GitHub 项目页面上的全局设置命令：\n\n`> git config –global user.name\
  \ \"Your Name\"`\n`> git config –global user.email your@email.com`\n\n将 `\"Your\
  \ Name\"` 替换为您希望与 GitHub 一起使用的名称。`your@email.com` 应该是您在 GitHub 注册时使用的电子邮件地址。\n\n\
  接下来，我们要告诉本地 Git 仓库关于 GitHub 上的仓库的信息。我们应该还在 SBJSON 目录中。该目录应该包含我们之前看到的 `.git` 目录。输入此命令：\n\
  \n`> git remote add origin git@github.com:username/SBJSON.git`\n\n将 `username` 替换为您的\
  \ GitHub 用户名。在此命令中，`git@github.com:username/SBJSON.git` 是 GitHub 上仓库的 URL。此命令表示我们想要添加一个远程仓库，并为其指定本地别名\
  \ `origin`。\n\n\n#### 提交我们的更改\n\n在将代码推送到 GitHub 之前，我们需要在本地提交更改。请记住，每个 Git 仓库都是一个功能完备的独立仓库。从\
  \ Git 的角度来看，代码的规范副本位于你的计算机上，而 GitHub 上的仓库只是一个远程副本。现在，让我们将工作保存到本地仓库中。\n\n在 Xcode\
  \ 中打开 `SBJSON` 静态库项目。选择 File ![image](img/U001.jpg) Source Control ![image](img/U001.jpg)\
  \ Commit。Xcode 会显示源代码控制面板（参见图 11–37）。左侧是 SBJSON 项目文件的列表。大多数文件会被勾选，有些则不会。你无需更改任何设置。未勾选的文件是\
  \ Xcode 认为无需提交到仓库的文件。选择 `JSON.h` 文件。在文件查看器面板中，`JSON.h` 的内容应显示在左侧。右侧的文件查看器会显示“File\
  \ has no revisions”。由于这是首次提交，因此没有内容可显示。在提交已有文件时，左侧文件查看器会显示 `JSON.h` 的当前状态，而右侧文件查看器会显示仓库中的上一个版本。Xcode\
  \ 会高亮显示文件版本之间的差异，以便你查看更改内容。\n\n![images](img/1137.jpg)\n\n**图 11–37.** *Xcode 的源代码控制面板*\n\
  \n在面板底部附近，有一个标有“Enter commit message here”的文本区域。你可以在该区域输入关于将要提交到仓库的更改的注释。描述可以详尽，也可以简洁，随你而定。在此例中，请输入\
  \ **Initial commit**。然后点击 Commit。\n\n提交完成后，源代码控制面板会消失，显示出项目窗口。现在，我们准备将更改推送到 GitHub。\n\
  \n这次，选择 File ![image](img/U001.jpg) Source Control ![image](img/U001.jpg) Push。此时会出现一个对话框（参见图\
  \ 11–38）。Remote 下拉菜单可能需要几秒钟才能填充。请稍候，Xcode 正在检查远程仓库的存在性和可访问性。最终，下拉菜单应显示“origin/master\
  \ (Create)”。这表示 GitHub 将通过向 origin（我们为远程 GitHub 仓库设置的别名）发送 master（我们的本地仓库）的副本来创建仓库。点击\
  \ Push。\n\n![images](img/1138.jpg)\n\n**图 11–38.** *Xcode 的远程仓库对话框*\n\n**注意：** 如果\
  \ Xcode 无法连接到远程仓库，下拉菜单将持续显示“Loading Remotes”。此外，绿色圆点和“Repository is online”文本也不会出现。点击\
  \ Cancel，并检查你的网络连接。如果连接正常，请检查你是否在 GitHub 上成功创建了仓库。最后，请检查你在添加远程仓库时是否正确输入了 GitHub\
  \ URL，方法如下：\n\n打开一个 Terminal.app 窗口，并导航到我们的项目目录。输入命令：\n\n```\n> git config –-get\
  \ remote.origin.url\n```\n\n确保返回的 URL 与 GitHub 上的 URL 匹配。如果 URL 错误，你可以通过先取消设置再重新输入\
  \ URL 来修复：\n\n```\n> git config –unset remote.origin.url\n> git remote add origin\
  \ git@github.com:username/SBJSON.git\n```\n\n推送成功后，对话框应消失。你可以通过登录 GitHub 并检查仓库页面来确认推送是否成功（参见图\
  \ 11–39）。\n\n![images](img/1139.jpg)\n\n**图 11–39.** *推送后的 GitHub 仓库*\n\n#### 使用\
  \ GitHub 功能\n\n在继续之前，我想简要介绍 Git 和 GitHub 提供的一些功能：标签、拉取请求和问题跟踪。\n\n##### 标签\n\n标签的概念在版本控制系统中很常见。其思想是，一旦源代码达到稳定状态或完成了一个开发里程碑，我们希望以某种方式标记源代码。本质上，你是在创建一个特定时间点的源代码快照。这通过为发布版本打标签来实现。使用\
  \ Git，标签是一个非常简单的命令行过程。一旦你将更改提交到 Git，只需输入以下命令：\n\n```\n> git tag \"tag-name\"\n```\n\
  \n你可以将 `tag-name` 替换为任何你想要的值。通常的做法是用点分隔的数字来打标签，表示主版本和次版本（例如 `1.0`）。要将标签推送到 GitHub，只需在\
  \ push 命令中添加 `–tags` 标志：\n\n```\n> git push –-tags origin remote\n```\n\n##### 拉取请求\n\
  \nGitHub 允许其用户派生 GitHub 上的一个仓库。当你派生一个项目时，你会为自己创建该仓库的一份副本，这样你就可以修改代码以修复错误或添加新功能。\n\
  \n一旦你对派生的仓库进行了一些更改，就可以将这些更改回馈给原始仓库的所有者以及整个社区。在 GitHub 上，你可以通过拉取请求来实现。拉取请求只是一个发送给原始仓库维护者的消息，表明你有一些更改要提供给他们。创建拉取请求很简单：只需在你派生的仓库上点击拉取请求按钮。系统会要求你为拉取请求添加评论，然后将其发送给原始仓库的维护者。\n\
  \n反之亦然，你需要管理那些由派生你仓库的人发送给你的拉取请求。你可以查看拉取请求、进行评论、拒绝它们，或将其合并到你的项目中。\n\nGitHub 对拉取请求流程做了详尽的说明。你可以在\
  \ `http://help.github.com/send-pull-requests/` 阅读更多信息。\n\n##### 问题跟踪\n\n问题跟踪是收集错误报告的一个有用工具。它还允许人们评论他们希望在应用程序或库中看到哪些新功能。GitHub\
  \ 为每个仓库都使用了问题跟踪器。它的使用相当简单。只需点击任何仓库顶部的 Issues 链接即可。\n\n**注意：** 如果你的项目在仓库中没有显示 Issues\
  \ 链接，说明它已被禁用。这通常发生在你派生一个仓库时。你可以在仓库的管理部分重新启用它。点击你仓库的 Admin 按钮。你应该会进入 Options 管理页面。在\
  \ Features 下，点击 Issues 旁边的复选框。当你返回仓库页面时，Issues 链接应该就会出现。\n\n\n### 明智地选择许可证\n\n既然你已在\
  \ GitHub 上创建了一个项目，就需要为代码挑选一个许可证。由于你的仓库是公开的，你可能希望使用开源许可证。在开源社区中，对于什么才是“开源”项目，不同的人会有不同看法。一般来说，开源软件是指以源代码形式发布，并附带许可证的软件，该许可证允许用户使用、自由修改、并以原始或修改后的形式分发该软件。开源许可证的意图在于，允许软件的任何用户都能根据自身需求修改代码，并帮助社区修复错误和进行改进。\n\
  \n可供选择的开源许可证种类繁多。在开源促进会（OSI）网站（[`http://opensource.org/`](http://opensource.org/)）上可以找到一个相当全面的列表。该网站提供了一个简单的十点检查清单，用以定义什么是开源许可证，以及一份满足这些标准的许可证完整列表。\n\
  \n### 本章小结\n\n本章我们涵盖了大量内容。我们从 Super Checkout 应用中提取了可复用的组件，并将它们放入静态库中。然后，我们使用子项目和工作区的方法，将这些代码重新集成到项目中。最后，我们通过\
  \ GitHub 与世界分享了我们的项目，从而改善了全世界 iOS 开发者的生活。这样，即便 Super Checkout 没有成为 App Store 的畅销品（绝不可能！），我们仍能赢得其他\
  \ iOS 黑客同行的喜爱和尊重。\n\n在合上本书继续前进之前，我还有“最后一件事”要与你分享。是什么呢？翻过这一页你就知道了。\n\n## 第 12 章\n\
  \n## 最后一件事\n\n多么精彩的旅程！我们拥有一个稳定的应用程序，并且配备了良好的自动化测试设置和静态库。我们使用 Instruments 来帮助查找应用程序中的性能瓶颈。在这个过程中，我们介绍了\
  \ Xcode 的一些优秀特性，并探索了如何在工具集中导航。不过，Xcode 还有很多我们尚未涵盖的功能。这正是本章要讲述的内容。尽管本章标题是“最后一件事”，但我们要讲的可不止这一件。\n\
  \n在本章中，我们将介绍自定义 Xcode 以及常用的键盘快捷键，以帮助你从开始自己的项目时就能改进工作流程。你还会找到一个方便的快速参考指南，其中列出了 Xcode\
  \ 4.2 的一些常用键盘快捷键。随着时间的推移，你会将本书所学内容以及本章的要点融入到自己的工作流程中。\n\n### 自定义 Xcode\n\n在本书中，我们一直使用\
  \ Xcode 的默认配置。现在，是时候根据你的喜好来自定义它了。你已经见识过 Xcode 的能力，那就让它成为你的得力助手吧。首先要看的是 Xcode 的偏好设置（如果你还没探索过的话）。与任何\
  \ Mac OS X 应用程序一样，打开 Xcode 偏好设置的方法是点击 **Xcode** ![Image](img/U001.jpg) **偏好设置...**\
  \ ，或者按下 ![Image](img/U002.jpg)（逗号键）。执行此操作后，将会弹出图 12-1 所示的对话框。\n\n![images](img/1201.jpg)\n\
  \n**图 12-1.** *这是 Xcode 的偏好设置窗口。我们将逐一讲解窗口中的每个标签页，讨论如何自定义每个部分。*\n\n通用标签页（参见图 12-1）是\
  \ Xcode 偏好设置的起点。在这里，我们可以设置 Xcode 的一些基本选项，例如自动保存（如果你运行在 Mac OS X Lion 上）以及如何从导航器中打开文件。屏幕底部的图例为你提供了在编辑代码时如何使用键盘修改点击操作的参考。\n\
  \n#### 行为\n\nXcode 4.2 中的行为设置是一项巨大的救星。图 12-2 展示了打开的行为标签页。\n\n![images](img/1202.jpg)\n\
  \n**图 12-2.** *“行为”标签页帮助你配置 Xcode 在特定事件发生时的表现方式和通知方式。*\n\n通过“行为”标签页，你可以配置 Xcode\
  \ 在启动应用程序运行时改变其外观，或者在构建失败时播放提示音。\n\n点击底部的加号按钮，你可以添加一个新行为并将其绑定到一个键盘快捷键。你想快速切换到全屏模式并且只显示代码吗？你可以通过将它映射到任何你想要的键盘快捷键来实现。\n\
  \n#### 字体与颜色\n\n图 12-3 显示了“字体与颜色”标签页。此标签页允许你配置源代码编辑器的外观。当你需要在投影仪上展示代码，以便向本地用户组介绍一些精彩主题时，这个功能非常有用，对吧？\n\
  \n![images](img/1203.jpg)\n\n**图 12-3.** *“字体与颜色”标签页让你可以配置编辑器的外观。*\n\n点击“控制台”按钮可以配置控制台的外观。\n\
  \n如果提供的主题不合你的口味，而你有一个希望在 Xcode 4.2 中使用的主题，你可以将该 `.dvtcolortheme` 文件放到 `~/Library/Developer/Xcode/UserData/FontAndColorThemes`\
  \ 文件夹中。\n\n如果你只想微调现有主题，点击列表下方的添加按钮可以复制一个主题。复制后的主题将被放置在之前提到的文件夹中。\n\n#### 文本编辑\n\n\
  下一个标签页是“文本编辑”（参见图 12-4）。这是配置 Xcode 如何处理代码编辑器功能的地方。在这里，你可以配置编辑器的行为，以及如何处理诸如代码折叠和代码补全等功能。\n\
  \n![images](img/1204.jpg)\n\n**图 12-4.** *“文本编辑”标签页允许你配置文本编辑器的行为，并控制代码的自动结构化方式。*\n\
  \n图 12-5 显示了此标签页中的“缩进”部分。关于使用空格还是制表符的著名争论，就在这个标签页的这个部分进行。\n\n![images](img/1205.jpg)\n\
  \n**图 12-5.** *空格与制表符的永恒之战！你会选择哪一个？*\n\n#### 键绑定\n\n需要查看已设置的键盘快捷键或想要修改它们？“键绑定”标签页就是为你准备的！图\
  \ 12-6 显示了默认配置。此标签页的行为与“字体与颜色”标签页类似。要创建你自己的自定义配置，请复制默认配置。一旦你进行了修改，一个新的配置文件就会被放置在\
  \ `~/Library/Developer/Xcode/UserData/KeyBindings` 中。\n\n![images](img/1206.jpg)\n\
  \n**图 12-6.** *配置你的键盘快捷键就像打开这个标签页一样简单。*\n\n如果你想知道某个键盘快捷键为何不起作用，请查看“冲突”部分。看看图 12-7。目前，在安装了\
  \ Xcode 的这台电脑上存在 10 个冲突。\n\n![images](img/1207.jpg)\n\n**图 12-7.** *键绑定冲突会阻止你最喜欢的快捷键生效。*\n\
  \n黄色的警告三角形表示与系统存在冲突。由于系统在应用程序之前处理快捷键，Xcode 只是告诉你这个快捷键将不起作用。红色的错误表示 Xcode 内部的冲突。只要\
  \ Xcode 内部存在冲突，该绑定就不会触发。\n\n#### 下载\n\n继续往下看，我们来到了“下载”标签页。在这个标签页中，我们可以看到两个不同的区域需要访问。第一个是“组件”标签页。这个标签页（见图\
  \ 12-8）允许你向 Xcode 下载额外的组件。这些组件包括对较旧设备的支持，以及更早版本的 iOS 系统以在模拟器中运行。\n\n![images](img/1208.jpg)\n\
  \n**图 12-8.** *Xcode 附带的是最新版本的 iOS。如果你需要“旧版”支持，请前往“下载”偏好设置，并在此处下载相应的支持文件。*\n\n\n\
  \n#### 文档\n\n该表格中的第二部分是「文档」部分。你可以在图 12–9 中看到它。在此部分，Xcode 允许你更新 iOS、Mac 和 Xcode 的文档，以及支持相应格式的第三方文档集。\n\
  \n![images](img/1209.jpg)\n\n**图 12–9.** *「文档」标签页不仅管理 iOS/Mac/Xcode 文档，还管理来自任何 Atom\
  \ feed 的第三方库文档。*\n\n这些文档集是通过 Atom feed 下载的。在列表中选择一个条目，并点击「添加 Feed」按钮左侧的三角形按钮，你将看到所选\
  \ feed 的属性（再次参见图 12–9）。由于文档集是通过 Atom feed 配置的，Xcode 可以配置为自动检查更新。\n\n#### 位置\n\n\
  我们快完成 Xcode 偏好设置了。下一个标签页是「位置」（参见图 12–10）。在此标签页中，你可以为派生数据、快照、归档的应用以及源码树等条目定义自定义位置。派生数据是指\
  \ Xcode 使用的实际构建产物、中间构建文件、日志和项目索引。注意不要将这些文件放入源代码控制中，因为它们会频繁更改，并且可以从项目文件重新生成。\n\n\
  ![images](img/1210.jpg)\n\n**图 12–10.** *「位置」标签页允许你配置构建产物的默认位置。*\n\n十有八九，你不会触碰这个偏好设置。不过，知道它的存在总是好的。\n\
  \n##### 源码树\n\n「位置」标签页中的下一个部分是「源码树」部分（参见图 12–11）。该标签页允许你为位于项目外部的源码定义公共位置。「设置名称」是标识源码树的名称；对于使用同一\
  \ Xcode 项目的每个开发者来说，该名称必须相同。「显示名称」是 Xcode 在文件检查器中显示源码树所用的名称；它可以是任意名称。「路径」是源码树在文件系统中的完整路径；它会因计算机和用户的不同而不同。\n\
  \n![images](img/1211.jpg)\n\n**图 12–11.** *这个「源码树」标签页显示了一个空列表。将公共源文件的路径放入此列表，以便在多个项目中引用它们。*\n\
  \n「源码树」偏好设置非常有用，因为它允许每个开发者拥有自己的开发配置，并且使项目间的代码共享变得极其简单。\n\n#### 分布式构建\n\nXcode 偏好设置中的最后一个标签页是「分布式构建」（参见图\
  \ 12–12）。当一个项目需要几分钟才能编译完成时，分布式构建非常有用。配置分布式构建后，你可以提供编译单元给他人，或者使用他人提供的编译单元。对于前者，将通过\
  \ Bonjour 访问网络中共享的资源。你还可以定义多个集合来共享编译单元。\n\n当你开启共享你的机器的设置时，你的机器将随时可用于分布式构建。Xcode\
  \ 不需要运行，你也不需要登录即可与构建集群共享你的机器。\n\n![images](img/1212.jpg)\n\n**图 12–12.** *使用分布式构建可以加速包含大量源文件的项目。*\n\
  \n### 键盘快捷键及其他\n\n如果你和我一样，不经常使用鼠标或触控板。我总是将一只手放在键盘上，随时准备按下某个键盘快捷键来执行任务。常见的快捷键，如剪切（![Image](img/U002.jpg)\
  \ +X）、复制（![Image](img/U002.jpg) +C）和粘贴（![Image](img/U002.jpg) +V）是最容易提到的，因为它们几乎在每一个应用程序中都会用到。\n\
  \n我记得当我停止使用上下文菜单，开始使用键盘进行这些操作时，我感觉效率更高了，并且能够利用节省的时间做更多事情。正是从那时起，我开始学习更多的快捷键来简化我的工作流程并变得更有效率。\n\
  \n在本节中，我们将介绍 Xcode 4 的键盘快捷键以及它们如何改进你的工作流程。\n\n#### 从 Xcode 3 迁移到 Xcode 4\n\n当我开始为\
  \ iOS 编程时，Xcode 3 是 IDE。Xcode 3 很棒，它与 Interface Builder 的集成也做得相当好。你必须打开两个独立的应用程序，这有点烦人，但当你有应用要发布时，很快就会克服这一点。适应\
  \ Xcode 3 的导航并学习其键盘快捷键并不需要很长时间，我能够快速浏览所有代码。\n\n然后 Apple 推出了静态分析和 clang。我以为情况不会更好了。我有了一个编译器，它能告诉我何时会发生内存泄漏以及其他可能导致应用程序出现异常行为的问题。甚至还有一个能生成更快代码的新编译器！Xcode\
  \ 3 开始显得有些过时了。\n\n时间快进一点，我们看到 Xcode 4 在 WWDC 上以开发者预览版的形式出现。Interface Builder 被集成进来，Xcode\
  \ 只是一个大的窗口。我深入其中开始四处查看，很快就怀念起了 Xcode 3。我退出使用，有一段时间没有碰这些新工具。\n\n又经过几个测试版发布后，Apple\
  \ 修复了一些 bug，我想看看有什么新东西。当我看到我能够让 Interface Builder 直接在源文件中生成并连接我的操作和输出口时，我就被说服了。没有回头路了，所以我开始真正学习如何在这个陌生的\
  \ IDE 中导航。\n\n当我最初开始学习如何用键盘在 Xcode 中导航时，我开始注意到一些模式。例如，在与文件交互时按住 Option 键会在辅助编辑器中打开所选文件。再加上\
  \ Shift 键会弹出一个方便的「在...中打开」对话框（参见图 12–13）。\n\n![images](img/1213.jpg)\n\n**图 12–13.**\
  \ *当你想在新标签页、编辑器或窗口中打开某些内容时，「在...中打开」对话框是一个救星。*\n\n像这样的一致性帮助我在 Xcode 4 中发现了一些非常好的功能。我很喜欢知道，在导航区域单击某物时按住\
  \ Option + Shift，或者在编辑器中单击某个符号时按住 Command + Option + Shift（Command 为符号添加了「点击我」功能），可以打开创建新标签页或新窗口的功能。我甚至可以使用相同的技巧配合「快速打开」(Command\
  \ + Shift + O) 命令，在短时间内就能在新标签页中打开一个文件。\n\n#### 快给我快捷键！\n\n我已经用快捷键吊足了你的胃口，那么让我们按功能来逐一了解它们。表\
  \ 12–1 全部是关于在 Xcode 中导航的。例如，打开和关闭某些区域、与 Xcode 的不同编辑器模式交互，都可以通过键盘完成。表 12–2 全部是关于文件/符号操作，以及你在编辑文件时能做什么，并通过跳转使编辑变得流畅和无痛。表\
  \ 12–3 是关于方案以及从键盘执行方案操作的。\n\n![Image](img/t1201.jpg)\n\n![Image](img/t1202.jpg)\n\
  \n![Image](img/t1203.jpg)\n\n![Image](img/t1203a.jpg)\n\n以上只是 Xcode 4 中所有可用快捷键的一部分。其余的可以在\
  \ Xcode 的偏好设置和菜单栏中找到。Colin Wheeler 还在 [`https://github.com/Machx/Xcode-Keyboard-Shortcuts`](https://github.com/Machx/Xcode-Keyboard-Shortcuts)\
  \ 整理了一份详尽的列表。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的格式要求，将以下英文文本翻译成中文。\n\n\n### 查看文档\n\
  \n既然您已经成为了直接从键盘使用 `Xcode` 的大师，我们可以继续探讨最后一个主题：查看文档。阅读文档至少占用了我们作为开发人员一半的工作时间。在本章前面部分，您已经了解到如何通过\
  \ atom feeds 配置自定义文档集。但这只是故事的一半。\n\n一旦 feed 被下载（如 Apple 提供的文档）或添加，您将需要搜索文档，并拥有一个快速的文档参考指南。我们首先要查看的地方是主\
  \ `Xcode` 窗口。\n\n打开 `Super Checkout` 项目（如果尚未打开），并导航到 `Super_CheckoutAppDelegate.h`。接下来，按住\
  \ Option 键并点击 `UIApplicationDelegate` 协议符号（注意光标会改变样式，悬停时符号会加下划线）。弹出的浮层（如图 12–14\
  \ 所示）会显示所选符号的简短摘要。\n\n![images](img/1214.jpg)\n\n**图 12–14.** *文档浮层为您提供所选符号的简短摘要。*\n\
  \n在此处，您可以执行许多不同的操作。点击浮层右上角的书本图标，将打开“管理器”并显示该符号的相应文档。点击中间带有“h”的文件图标，将打开框架作者提供的公共头文件（如果提供的话）。浮层中的其余链接将打开“管理器”或头文件。您还可以查看其他相关文档所在的位置，这在您需要查看特定类的示例代码或编程指南时会非常方便。\n\
  \n查看文档的第二种方法是打开“工具”区域。大多数内容都有快速帮助查找功能，您无需按住 Option 键点击项目。图 12–15 展示了与图 12–14 相同的实例，并打开了“工具”面板，且选中了“快速帮助检查器”。\n\
  \n![images](img/1215.jpg)\n\n**图 12–15.** *“快速帮助检查器”显示的信息与帮助浮层相同，但它显示的不只是代码的帮助。*\n\
  \n“快速帮助检查器”的一个优点是其能够显示不仅仅是代码的快速帮助。在目标（Target）的构建设置中，您可以选择任何设置，“快速帮助检查器”会显示该设置将设置哪个编译器标志以及该标志的作用。\n\
  \n查看文档的最后一种方法是通过“管理器”。点击 `Xcode 4` 窗口右上角的“管理器”按钮打开“管理器”。这会打开“管理器”窗口。点击“文档”标签页，然后输入\
  \ `NSObject`（参见图 12–16）。\n\n![images](img/1216.jpg)\n\n**图 12–16.** *当您需要搜索项目文档库时，“管理器”的文档窗口极其有用。*\n\
  \n默认情况下，“管理器”会将结果限制为最佳结果，您可以点击每个部分下方的“显示……更多结果”文本来查看所有结果。您也可能会看到重复的条目。要解决此问题，请点击放大镜，然后选择“显示查找选项”以展开一些选项并缩小搜索范围。您很少会同时开发\
  \ Mac 应用和 iOS 应用。\n\n关于阅读文档的内容大致就是这些。能够阅读文档并确切知道去哪里获取所需的详细程度，对于在开发应用程序时尽可能保持高效至关重要。\n\
  \n### 总结\n\n就是这样。我们完成了！我希望您学到的东西和我写这本书时一样多。在这本书中，有很多我未能有机会涵盖的内容，我希望您现在对开发者工具有了足够的背景知识，可以独立探索并自行学习其中的一些内容。我已经教给您如何使用这些工具的知识；如何使用好它们则取决于您。现在，去编写一些令人惊叹的应用吧！\n\
