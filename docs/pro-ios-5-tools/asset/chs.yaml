  \n![images](img/0309.jpg)\n\n**图 3-9.** *成功克隆我们的 Super Checkout 项目*\n\n### 四处看看\n\
  \n这个应用非常简单。它包含一个带有表格视图控制器的导航控制器，用于展示产品库存；一个产品详情视图控制器，作为产品库存的下钻视图；以及一个购物车控制器，以翻转模式视图控制器的形式呈现。与服务通信的模块是一个简单的引擎，采用了与\
  \ Matt Gemmell ([`http://instinctivecode.com/`](http://instinctivecode.com/)) 在其\
  \ Twitter 引擎中相同的思路。\n\nAPI 引擎负责处理与服务器的通信，并调用解析器来解析来自服务器的数据。服务器使用 JSON（JavaScript\
  \ 对象表示法）进行通信，该项目使用 SBJSON 库 ([`https://github.com/stig/json-framework/`](https://github.com/stig/json-framework/))\
  \ 将数据解析为原生的 Cocoa Touch 类。每个视图控制器都拥有该引擎的一个独立实例，并使用委托来确保服务器通信是异步的。\n\n用户界面主要由表格视图以及一些在\
  \ Interface Builder 中设计的自定义单元格组成。\n\n\n\n### 运行超级结账应用\n\n在模拟器或测试设备上运行该应用。你的屏幕应显示为图\
