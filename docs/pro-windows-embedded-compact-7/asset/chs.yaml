  \ `xFFFF FFFF` | 系统陷阱区域 | CPU 特定的 VM 系统调用陷阱区域 |\n| `xC000 0000` | `xEFFF FFFF` |\
  \ 内核 VM | 内核的虚拟内存，CPU 特定。用于实现地址空间布局随机化 |\n| `xA000 0000` | `xBFFF FFFF` | 静态映射非缓存地址空间\
  \ | 用于绕过 CPU 缓存访问物理内存。 |\n| `x8000 0000` | `x9FFF FFFF` | 静态映射缓存地址空间 | 用于通过 CPU\
