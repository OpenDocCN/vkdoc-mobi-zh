  //   其他特殊情况。\n\nTESTPROCAPI TestProc(UINT uMsg, TPPARAM tpParam,\n             \
  \        LPFUNCTION_TABLE_ENTRY lpFTE)\n{\n    INT TP_Status = TPR_FAIL;\n\n   \
