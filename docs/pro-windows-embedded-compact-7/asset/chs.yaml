  \n### CeDebugX\n\n`CeDebugX` 是内核调试器的扩展。它提供有关中断状态下系统状态的详细信息，并尝试诊断崩溃、挂起和死锁。映像中必须支持目标控制，并且调试器必须处于中断状态才能使用\
  \ `CeDebugX` 命令。本章稍后将详细介绍目标控制。要将目标控制集成到您的映像中，请在目录中找到 `Core OS>>Core OS Services>>Kernel\
  \ Functionality>>Target Control Support(Shell.exe)` 并勾选它。图 11-7 显示了在中断期间使用 `!module`\
  \ 命令获得的关于 Demodrvr 的信息。\n\n```\n!module demodrvr.dll\n```\n\n有关命令列表，请查阅文档。这些命令被分为十组相关命令：\n\
  \n- 诊断 CeDebugX 命令\n- 扩展帮助和控制 CeDebugX 命令\n- 常规系统信息 CeDebugX 命令\n- 线程信息 CeDebugX\
  \ 命令\n- 进程信息 CeDebugX 命令\n- 模块信息 CeDebugX 命令\n- 句柄 CeDebugX 命令\n- 代理 CeDebugX 命令\n\
  - 内存信息 CeDebugX 命令\n- GWES 信息 CeDebugX 命令\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-214_1.jpg)\n\n*图 11-7. 使用 CeDebugX 获取模块信息*\n\n### 硬件辅助调试\n\n使用硬件辅助调试器可以获得很多优势。第一个也是最重要的优势是，当您刚开始着手时，甚至还没有引导加载程序，更不用说操作系统了。硬件辅助调试器到底是什么意思？大多数\
  \ CPU 都提供片上调试支持。例如，ARM 调试架构使用现有的 JTAG 接口作为访问内核的方法。\n\n在生产测试中围绕内核的扫描链在调试状态下被重复使用，以从数据总线捕获信息，并将新信息插入到内核或内存中。内核周围有两个扫描链：\n\
  \n- 一个围绕整个内核外围的扫描链\n- 第一个扫描链的一个子集，仅覆盖数据总线和断点 203\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n\n"
- '# 数据总线上较短的扫描链允许指令和数据插入到内核中，而无需将数据围绕 ARM 处理器内核整个周边进行时钟传输的开销。更多信息请查阅与您的 CPU 相关的调试架构参考手册。片上调试系统将提供四个基本功能：


  - 读写内存

  - 读写 CPU 寄存器

  - 单步执行和实时执行

  - 硬件断点和触发功能


  > **注意：** `JTAG`（联合测试行动组）是 IEEE 1149.1 标准测试访问端口和边界扫描架构的通用名称。它最初设计用于通过边界扫描测试印刷电路板，并至今仍用于此应用。


  如今，`JTAG`被用于 IC 调试端口。在嵌入式处理器市场中，几乎所有现代处理器都支持`JTAG`。嵌入式系统开发依赖于调试器通过`JTAG`与芯片通信，以执行单步执行和设置断点等操作。


  ### TRACE 32


  `TRACE32`是硬件辅助调试工具的一个很好的例子。它为目标设备提供了一个`JTAG`接口，即在线调试器（`TRACE32 ICD`），并在开发工作站上提供一个
  IDE 来控制设备并执行调试过程。它支持使用高级语言代码、汇编器和混合反汇编代码进行调试。它提供片内断点和触发功能。当然，它还允许闪存编程，并提供 RTOS 感知能力，最新版本支持
  Windows Embedded Compact 7，包括调试多核系统的能力。对于设备驱动程序开发人员，它还能在逻辑层面显示内部和外部外设。


  为了帮助实现调试过程的自动化，脚本语言允许编写一系列命令的脚本，以将调试会话运行到您想要开始调试的点。


  在开发 BSP 时，硬件辅助调试是极其宝贵的。没有它，例如调试引导加载程序几乎是不可能的。“给我一个支点，我就能撬动地球”，据说是阿基米德对杠杆的评论。嗯，硬件辅助调试正是这个杠杆。


  当涉及到设备驱动程序时，能够以逻辑方式查看由寄存器（端口）表示的硬件是极其有帮助的。调试引导加载程序的以太网设备驱动程序只能使用像`TRACE32`这样的工具来完成，因为引导加载程序不提供
  NDIS 支持，您必须从头开始实现 NIC 接口。


  ### 自动化调试过程


  虽然可以使用`TRACE32` IDE 通过位于窗口底部的命令接口（如图 11-8 所示）单独设置命令，但创建一个由 IDE 运行的脚本批处理文件要高效得多，该文件可以按顺序执行所有必需的命令，而无需逐个输入每个命令。主窗口的底部有四行：最上面一行是命令行，下一行是消息栏，其下是充当命令快捷键的软键，这些命令输入到命令行中，最底部是状态栏。


  例如，如果需要设置 CPU 类型，您可以输入命令，在这种情况下，`TRACE32`会提供一个它所支持的参考 CPU 列表。


  ```

  SYStem.CPU DM3730

  ```


  然后继续设置其他命令以初始化调试器，您可以编写一个扩展名为`CMM`的批处理文件来按顺序运行它们。清单 11-6 是一个示例批处理文件，我根据从 Lauterbach
  收到的示例批处理文件进行了修改，以处理我使用的特定板卡。说实话，没有`TRACE32`，我永远无法将 Adeneo 为`OMAP3530`创建的 WinCE 6.0
  BSP 移植到适用于 Variscite 板卡的 Windows Embedded Compact 7 上。这个文件注释良好，可以作为创建类似批处理文件的参考。


