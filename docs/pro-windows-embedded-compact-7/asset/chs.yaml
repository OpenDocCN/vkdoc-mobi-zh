- "# 第 8 章 设备驱动 I/O 与中断\n\n为了兼顾优先级和执行速度，链中最高中断请求级别的可安装 ISR 应首先安装。\n\n### 嵌套 ISR\n\n\
  由于 Windows Embedded Compact 7 是一个 RTOS，它需要在最高中断请求级别的中断被触发后尽快为其提供服务，以防止丢失或延迟，因此内核采用中断嵌套。嵌套中断允许更高中断请求级别的中断抢占较低中断请求级别的\
  \ IRQ。内核采取以下步骤来处理嵌套中断：\n\n- 内核禁用与当前 ISR 调用所触发的 IRQ 相同或更低 IRQ 级别的所有其他 IRQ。\n- 如果在当前\
  \ ISR 完成处理之前到达了更高 IRQ 级别，内核会保存当前 ISR 的状态（状态仅包含 ISR 中支持使用的寄存器，以节省时间）。\n- 内核调用该 IRQ\
  \ 级别的 ISR 来处理新的请求。\n- 内核恢复原始 ISR 的状态并继续处理。\n\n### 中断服务线程 (IST)\n\nIST 是一个线程，当 ISR\
  \ 返回相关的`SYSINTR`时，该线程被调度。一旦完成中断处理，它会通知内核重新启用与该 IST 相关的 I/O 设备上的物理中断，并阻塞等待，直到需要处理下一个中断。\n\
  \n创建和启动 IST 的典型步骤如下：\n\n- 创建一个事件\n- 将事件与对应的`SYSINTR`关联\n- 创建 IST 本身\n- 设置 IST 的优先级\n\
  - 可选地设置 IST 的时间片\n\n清单 8-5 显示了由设备驱动向导生成的用于创建和启动中断服务线程的示例代码。\n\n*清单 8-5. 创建 IST 的示例实现*\n\
  \n```\nDWORD CreateInterruptServiceThread(PDMO_DEVCONTXT pDevCntxt)\n{\n    pDevCntxt->hIstEvent\
  \ = CreateEvent(NULL, FALSE, FALSE, NULL);\n    if (pDevCntxt->hIstEvent == NULL)\n\
  \    {\n        DEBUGMSG(ZONE_INIT,\n            (_T(\"DMO!IST Create: Event creation\
  \ failed\\r\\n\")));\n        return -1;\n    }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
