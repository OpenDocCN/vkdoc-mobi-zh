  ### 章节总结


  `Visual Studio 2008` 为 `Platform Builder IDE` 提供了基础，使您能够创建、构建和调试设备驱动程序。`Platform
  Builder` 包含故障排除工具、向导和构建工具，以指导您完成构建过程。`Windows Embedded Compact` 附带一个定义好的构建系统，该系统使用四个阶段：编译
  (compile)、系统生成 (sysgen)、发布复制 (release copy) 和生成运行时映像 (make run-time image)，并且 `Platform
  Builder` 工具在每个阶段都帮助您创建可工作的驱动程序。要排除故障和调试问题，并简化设备驱动程序开发，您可以使用 `Platform Builder` 中包含的工具，例如
  `设备驱动程序向导`，以及第三方工具，例如 `TRACE32-ICD`。我们议程上的下一步是设计我们的设备驱动程序，考虑其位置、模式、内核模式或用户模式，以及在真正投入开发之前必须决定的许多其他考虑因素。


