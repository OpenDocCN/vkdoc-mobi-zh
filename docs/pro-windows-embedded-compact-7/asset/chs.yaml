  \ ISR。如果 ISR 返回有效的`SYSINTR`，则`NKChainIntr`将立即返回，而不会调用列表上的任何其他 ISR。这提供了优先级排序。第一个加载的可安装\
  \ ISR 被最先加载到列表上，即最高中断请求级别，后续的可安装 ISR 随后被添加到列表的底部。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
