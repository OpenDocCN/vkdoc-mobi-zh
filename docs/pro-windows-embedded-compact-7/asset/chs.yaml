- "# 第 10 章 ■ 网络驱动程序接口规范与网络设备驱动程序\n\n##### `MiniportShutdownEx`\n\n系统关闭时会调用此函数。它负责禁用中断、使传输单元进入空闲状态，并尝试强制复位。清单\
  \ 10-9 展示了一个通过调用两个驱动程序本地函数来对 NIC 硬件执行上述操作的示例。\n\n*清单 10-9. `MiniportShutdownEx`\
  \ 函数实现示例*\n\n```c\nVOID MPShutdown(IN NDIS_HANDLE MiniportAdapterContext,\nIN NDIS_SHUTDOWN_ACTION\
  \ ShutdownAction)\n{\nPMP_ADAPTER Adapter = (PMP_ADAPTER)MiniportAdapterContext;\n\
  \n// 禁用中断并执行完全复位\nNICDisableInterrupt(Adapter);\nNICIssueFullReset(Adapter);\n}\n\
  ```\n\n##### `MiniportCheckForHangEx`\n\n此函数仅用于检查网络适配器的内部状态，并在检测到 NIC 适配器运行异常时返回\
  \ `TRUE` 。清单 10-10 展示了一个检查硬件错误或故障、发送挂起以及介质状态的示例。\n\n*清单 10-10. `MiniportCheckForHangEx`\
  \ 函数实现示例*\n\n```c\nBOOLEAN MPCheckForHang(IN NDIS_HANDLE MiniportAdapterContext)\n\
  {\nPMP_ADAPTER Adapter = (PMP_ADAPTER) MiniportAdapterContext;\nNDIS_MEDIA_CONNECT_STATE\
  \ CurrMediaState;\nPMP_TCB pMpTcb;\nBOOLEAN NeedReset = TRUE;\n\ndo\n{\n// 如果适配器正在进行链路检测，则跳过此代码块\n\
  if ((Adapter->Flags & F_MP_ADAPTER_LINK_DETECTION) != 0)\n{\nNeedReset = FALSE;\n\
  break;\n}\n\n// 发生任何不可恢复的硬件错误\nif ((Adapter->Flags & F_MP_ADAPTER_NON_RECOVER_ERROR)\n\
  != 0)\n{\nbreak;\n}\n\n// 发生任何硬件故障\nif ((Adapter->Flags & F_MP_ADAPTER_HARDWARE_ERROR)\n\
  != 0)\n{\nbreak;\n}\n\n// 发送挂起？\nNdisAcquireSpinLock(&Adapter->SendLock);\nif (Adapter->nBusySend\
  \ > 0)\n{\npMpTcb = Adapter->CurrSendHead;\npMpTcb->Count++;\nif (pMpTcb->Count\
  \ > NIC_SEND_HANG_THRESHOLD)\n{\nNdisReleaseSpinLock(&Adapter->SendLock);\nbreak;\n\
  }\n}\n\nNeedReset = FALSE;\n\nNdisReleaseSpinLock(&Adapter->SendLock);\nNdisAcquireSpinLock(&Adapter->RcvLock);\n\
  \n// 更新 RFD 缩减计数\nif (Adapter->CurrNumRfd > Adapter->NumRfd)\n{\nAdapter->RfdShrinkCount++;\n\
  }\n\nNdisReleaseSpinLock(&Adapter->RcvLock);\n\nNdisAcquireSpinLock(&Adapter->Lock);\n\
  CurrMediaState = NICGetMediaState(Adapter);\n\nif (CurrMediaState != Adapter->MediaState)\n\
  {\nAdapter->MediaState = CurrMediaState;\nMPIndicateLinkState(Adapter);\n}\n\nNdisReleaseSpinLock(&Adapter->Lock);\n\
  }\nwhile (FALSE); // do while 代码块结束\n\nreturn NeedReset;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n##### `MiniportResetEx`\n\n此函数用于复位 NIC 适配器硬件设备。它首先检查是否已有另一个复位操作正在进行或被挂起。然后它会终止所有待处理的请求，确保复位过程中不会意外唤醒。如果存在硬件错误或故障，则请求\
  \ `NDIS` 移除微型端口。禁用中断并复位硬件。释放发送缓冲区并重启接收单元。清单 10-11 展示了一个使用驱动程序本地辅助函数的复位函数示例。\n\n\
  *清单 10-11. `MiniportResetEx` 函数实现示例*\n\n```c\nNDIS_STATUS MPReset(IN NDIS_HANDLE\
  \ MiniportAdapterContext,\nOUT PBOOLEAN AddressingReset)\n{\nNDIS_STATUS Status;\n\
  PNDIS_OID_REQUEST PendingRequest;\nPMP_ADAPTER Adapter = (PMP_ADAPTER) MiniportAdapterContext;\n\
  \n*AddressingReset = TRUE;\n\nNdisAcquireSpinLock(&Adapter->Lock);\nNdisDprAcquireSpinLock(&Adapter->SendLock);\n\
  NdisDprAcquireSpinLock(&Adapter->RcvLock);\n\nASSERT(!(Adapter->Flags & F_MP_ADAPTER_HALT_IN_PROGRESS)\n\
  != 0));\n\n// 此适配器是否已在执行复位操作？\n}\n```\n\n\n\n```c\nif (Adapter->Flags & F_MP_ADAPTER_RESET_IN_PROGRESS)\
  \ != 0)\n{\n    Status = NDIS_STATUS_RESET_IN_PROGRESS;\n    goto exit;\n}\n\nAdapter->Flags\
  \ |= F_MP_ADAPTER_RESET_IN_PROGRESS;\n\n// 中止任何待处理请求\nif (Adapter->PendingRequest\
  \ != NULL)\n{\n    PendingRequest = Adapter->PendingRequest;\n    Adapter->PendingRequest\
  \ = NULL;\n    NdisDprReleaseSpinLock(&Adapter->RcvLock);\n    NdisDprReleaseSpinLock(&Adapter->SendLock);\n\
  \    NdisReleaseSpinLock(&Adapter->Lock);\n    NdisMOidRequestComplete(Adapter->AdapterHandle,\n\
  \                            PendingRequest,\n                            NDIS_STATUS_REQUEST_ABORTED);\n\
  \    NdisAcquireSpinLock(&Adapter->Lock);\n    NdisDprAcquireSpinLock(&Adapter->SendLock);\n\
  \    NdisDprAcquireSpinLock(&Adapter->RcvLock);\n}\n\nMPRemoveAllWakeUpPatterns(Adapter);\n\
  \n// 此适配器是否正在进行链路检测？\nif (Adapter->Flags & F_MP_ADAPTER_LINK_DETECTION) != 0)\n\
  {\n    DEBUGMSG(ZONE_WARN, (\"重置已挂起...\\n\"));\n    Status = NDIS_STATUS_PENDING;\n\
  \    Adapter->bResetPending = TRUE;\n    goto exit;\n}\n\n// 此适配器是否即将被移除？\nif (Adapter->Flags\
  \ & F_MP_ADAPTER_NON_RECOVER_ERROR) != 0)\n{\n    Status = NDIS_STATUS_HARD_ERRORS;\n\
  \    if (Adapter->Flags & F_MP_ADAPTER_REMOVE_IN_PROGRESS) != 0)\n    {\n      \
  \  goto exit;\n    }\n\n    // 这是不可恢复的硬件故障。\n    // 需要通知 NDIS 移除该微型端口\n    Adapter->Flags\
  \ |= F_MP_ADAPTER_REMOVE_IN_PROGRESS;\n    Adapter->Flags &= ~F_MP_ADAPTER_RESET_IN_PROGRESS;\n\
  \    NdisDprReleaseSpinLock(&Adapter->RcvLock);\n    NdisDprReleaseSpinLock(&Adapter->SendLock);\n\
  \    NdisReleaseSpinLock(&Adapter->Lock);\n    NdisWriteErrorLogEntry(Adapter->AdapterHandle,\n\
  \                           NDIS_ERROR_CODE_HARDWARE_FAILURE, 1, ERRLOG_REMOVE_MINIPORT);\n\
  \    NdisMRemoveMiniport(Adapter->AdapterHandle);\n    return Status;\n}\n\n// 禁用中断并向\
  \ NIC 发出重置命令\nNICDisableInterrupt(Adapter);\nNICIssueSelectiveReset(Adapter);\n\n\
  // 释放所有锁，然后重新获取发送锁，\n// 清理发送队列（涉及调用 Ndis 框架），\n// 释放所有锁后再获取发送锁以避免死锁\nNdisDprReleaseSpinLock(&Adapter->RcvLock);\n\
  NdisDprReleaseSpinLock(&Adapter->SendLock);\nNdisReleaseSpinLock(&Adapter->Lock);\n\
  NdisAcquireSpinLock(&Adapter->SendLock);\n\n// 释放 SendWaitList 上的数据包\nMpFreeQueuedSendNetBufferLists(Adapter);\n\
  \n// 释放正在主动发送和已停止的数据包\nMpFreeBusySendNetBufferLists(Adapter);\n\nNdisZeroMemory(Adapter->MpTcbMem,\n\
  \               Adapter->NumTcb * sizeof(MP_TCB));\n\n// 重新初始化发送结构\nNICInitSend(Adapter);\n\
  NdisReleaseSpinLock(&Adapter->SendLock);\n\n// 按正确顺序重新获取所有锁\nNdisAcquireSpinLock(&Adapter->Lock);\n\
  NdisDprAcquireSpinLock(&Adapter->SendLock);\nNdisDprAcquireSpinLock(&Adapter->RcvLock);\n\
  \n// 重置 RFD 列表并重新启动 RU\nNICResetRecv(Adapter);\nStatus = NICStartRecv(Adapter);\n\
  if (Status != NDIS_STATUS_SUCCESS)\n{\n    // 是否在连续几次重置中都出现故障？\n    if (Adapter->HwErrCount\
  \ < NIC_HARDWARE_ERROR_THRESHOLD)\n    {\n        // 尚未超过阈值，允许继续\n        Adapter->HwErrCount++;\n\
  \    }\n    else\n    {\n        // 这是不可恢复的硬件故障。\n        // 我们需要告知 NDIS 移除该微型端口\n\
  \        Adapter->Flags |= F_MP_ADAPTER_REMOVE_IN_PROGRESS;\n        Adapter->Flags\
  \ &= ~F_MP_ADAPTER_RESET_IN_PROGRESS;\n        NdisDprReleaseSpinLock(&Adapter->RcvLock);\n\
  \        NdisDprReleaseSpinLock(&Adapter->SendLock);\n        NdisReleaseSpinLock(&Adapter->Lock);\n\
  \        NdisWriteErrorLogEntry(Adapter->AdapterHandle,\n                      \
  \         NDIS_ERROR_CODE_HARDWARE_FAILURE, 1,\n                               ERRLOG_REMOVE_MINIPORT);\n\
  \        NdisMRemoveMiniport(Adapter->AdapterHandle);\n        return Status;\n\
  \    }\n    return Status;\n}\n\nAdapter->HwErrCount = 0;\nAdapter->Flags &= ~F_MP_ADAPTER_HARDWARE_ERROR;\n\
  NICEnableInterrupt(Adapter);\nAdapter->Flags &= ~F_MP_ADAPTER_RESET_IN_PROGRESS;\n\
  \nexit:\nNdisDprReleaseSpinLock(&Adapter->RcvLock);\nNdisDprReleaseSpinLock(&Adapter->SendLock);\n\
  NdisReleaseSpinLock(&Adapter->Lock);\nreturn(Status);\n```\n\n##### 物理数据传输\n\n在上述所有示例中，我抽象地使用了局部函数来处理各类硬件\
  \ I/O 接口。所描述的微型端口函数为上层 NDIS 驱动程序提供了一个上层边缘接口，以便从微型端口驱动程序获取服务。然而，微型端口驱动程序仍需完成其\"驱动\"\
  实际网络接口卡（NIC）的主要任务，即对硬件端口/寄存器进行数据读写和配置属性操作。它还需要处理用于事务数据的内存缓冲区。\n\nNDIS 框架为微型端口驱动程序提供了一个与硬件交互的下层边缘接口。它提供了一组函数，供微型端口网络适配器（NIC）驱动程序用于访问\
  \ I/O 端口。这些调用提供了一个标准的可移植接口，支持面向 NDIS 驱动程序的多种操作系统。\n\n框架提供了用于映射端口、申请 I/O 资源，以及对已映射和未映射的\
  \ I/O 端口进行读写操作的函数。如果你决定自行实现端口映射和资源管理，NDIS 框架提供了一组原始 I/O 端口接口函数，例如`NdisRawReadPortXxx`，其中`Xxx`表示端口的字节大小。但这些函数特定于基于端口\
  \ I/O 的体系结构。\n\n对于内存映射 I/O 体系结构，NDIS 框架提供了一组函数，用于将 NIC 寄存器映射到系统内存：`NdisMMapIoSpace`\
  \ 用于将给定的设备 RAM 或寄存器的物理范围映射到系统空间的虚拟范围；同时提供了一组函数，例如`NdisReadRegisterXxx`，其中`Xxx`表示寄存器的字节大小。\n\
  \n#### NDIS 内存管理辅助函数\n\n考虑到 NIC（网络接口卡）及其微型端口驱动程序的性能，我们必须意识到，当数据在 NIC 和计算机内存之间移动时会出现瓶颈。从网络接口卡将信息传输到计算机的两种最高效的方法是总线主控\
  \ DMA 和共享内存。提供总线主控 DMA 的 NIC 控制器会接管系统总线，将数据从 NIC 传输到内存位置，从而降低 CPU 负载。在共享内存方案中，要么\
  \ NIC 拥有自己的内存，系统处理器可以直接访问；要么 CPU 和 NIC 共享一块两者都可以直接访问的系统内存块。\n\n##### 共享内存\n\nNDIS\
  \ 框架为微型端口驱动程序开发者提供了一组函数来实现共享内存方案。核心函数是`NdisMAllocateSharedMemory`。该函数同时提供驱动程序用于访问共享内存块的映射虚拟地址范围，以及网络适配器使用的`NDIS_PHYSICAL_ADDRESS`类型范围。此函数只能从`MiniportInitializeEx`入口点调用。共享内存的最大问题在于其大小。一方面，在网络流量较高的情况下，如果微型端口驱动程序共享内存资源不足，则无法维持高\
  \ I/O 吞吐量。\n\n\n\n共享内存空间用于存放设备可访问的数据缓冲区。因此，您可以尝试预估一些最大传输需求并设置共享内存大小来满足这些需求。但这会导致驱动程序映像体积过大，且资源使用率在大多数情况下非常低效。另一个问题是，如果\
  \ `NdisMAllocateSharedMemory` 因系统内存不足而无法分配请求的大小，则会导致驱动程序初始化失败。请注意，尽管内核模式驱动程序通常使用非缓存内存，但在这种情况下您应考虑使用缓存内存，因为非缓存内存是稀缺的，因此较大的内存分配应来自缓存内存。\n\
  \n##### 散聚 DMA\n\n这是性能首选的内存方案。NDIS 在将数据缓冲区发送到微型端口驱动程序之前不会对其进行映射。相反，NDIS 为驱动程序提供了一个接口来映射网络数据。因此，微型端口驱动程序可以通过将小型或高度碎片化的数据包复制到具有已知物理地址的预分配缓冲区来优化其传输。这还避免了不必要的映射，从而提高了系统性能。NDIS\
  \ 可以安全地将多个缓冲区发送到微型端口驱动程序。这减少了对微型端口驱动程序的调用次数，从而提升了系统性能。最后，微型端口驱动程序可以将 SG 列表的内存作为传输描述符块的一部分进行预分配。因此，NDIS\
  \ 或微型端口驱动程序无需在运行时为 SG 列表分配内存。\n\nNDIS 框架提供了以下函数来处理散聚 DMA 事务：`NdisMAllocateNetBufferSGList`\n\
  \n总线主控微型端口驱动程序调用此函数以获取与 `NET_BUFFER` 结构关联的网络数据的散聚列表。\n\n`NdisMAllocateSharedMemoryAsyncEx`\n\
  \n微型端口驱动程序调用此函数来分配驱动程序与其总线主控 DMA NIC 之间共享的额外内存，通常是在微型端口驱动程序可用的 NIC 接收缓冲区不足时调用。\n\
  \n`NdisMRegisterScatterGatherDma`\n\n总线主控微型端口驱动程序从 `MiniportInitializeEx` 调用此函数以初始化散聚\
  \ DMA 通道。\n\n`NdisMDeregisterScatterGatherDma`\n\n总线主控微型端口驱动程序调用此函数以释放使用 `NdisMRegisterScatterGatherDma`\
  \ 函数分配的 DMA 资源。\n\n`NdisMFreeNetBufferSGList`\n\n总线主控微型端口驱动程序调用此函数以释放通过调用 `NdisMAllocateNetBufferSGList`\
  \ 函数分配的散聚列表资源。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 10 章\
  \ ■ 网络驱动程序接口规范与网络设备驱动程序\n\n### NDIS 协议驱动程序\n\n协议驱动程序实现了 OSI 模型（图 10-4）的网络层和传输层。因此，它确保消息无差错、按顺序、无丢失或无重复地传递。此外，它还根据以下因素确定数据应采用的物理路径：\n\
  \n- 网络状况\n- 服务优先级\n- 其他因素，例如路由、流量控制、帧分段与重组、逻辑地址到物理地址的映射以及使用计费\n\n协议驱动程序与 NDIS 通信以发送和接收网络数据。它在其下边缘实现并导出一组\
  \ `ProtocolXxx` 函数，并绑定到在其上边缘导出 `MiniportXxx` 接口的底层微型端口驱动程序。它必须在 `DriverEntry` 中分配驱动程序资源并注册所需的\
  \ `ProtocolXxx` 函数。要向 NDIS 框架注册 `ProtocolXxx` 函数和协议驱动程序，您必须设置 `NDIS_PROTOCOL_DRIVER_CHARACTERISTICS`\
  \ 结构并调用 `NdisRegisterProtocolDriver`。\n\nNDIS 协议驱动程序提供以下 `ProtocolXxx` 函数；最后两个函数用于发送和接收操作：\n\
  \n`ProtocolSetOptions`\n\n这是一个可选函数。它注册可选服务并可分配其他驱动程序资源。它调用 `NdisSetOptionalHandlers`\
  \ 来覆盖其默认入口点。它与之前描述的 `MiniportSetOptions` 函数非常相似，因此您目前完全可以不实现它。\n\n`ProtocolBindAdapterEx`\n\
  \n这是一个必需函数。NDIS 框架调用此函数以绑定到底层微型端口适配器。在其实现中，应使用 `NdisAllocateNetBufferListPool` 创建发送和接收缓冲区列表池，然后调用\
  \ `NdisOpenAdapterEx` 函数来建立协议驱动程序与底层驱动程序之间的绑定。如果对 `NdisOpenAdapterEx` 的调用返回 `NDIS_STATUS_PENDING`，您应等待来自\
  \ `ProtocolOpenAdapterCompleteEx` 的信号以指示完成。如果对 `NdisOpenAdapterEx` 的调用返回 `NDIS_STATUS_SUCCESS`，您可以继续调用\
  \ `NdisQueryAdapterInstanceName` 来检索调用协议所绑定的物理网络适配器（或虚拟适配器）的友好名称。使用 `NDIS_BIND_PARAMETERS`\
  \ 结构的 `CurrentMacAddress` 字段，您可以检索媒体连接状态和 MAC 选项。\n\n`ProtocolUnbindAdapterEx`\n\
  \n这是一个必需函数。它是 `ProtocolBindAdapterEx` 函数的镜像；NDIS 框架调用 `ProtocolUnbindAdapterEx`\
  \ 来释放驱动程序为特定绑定的网络 I/O 操作所分配的资源。此函数的实现必须调用 `NdisCloseAdapterEx` 函数来关闭与底层微型端口适配器的绑定。协议驱动程序不能使解绑定操作失败。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 10 章 ■ 网络驱动程序接口规范与网络设备驱动程序\n\
  \n`ProtocolOpenAdapterCompleteEx`\n\n这是一个必需函数。这是 `NdisOpenAdapterEx` 函数的完成例程。此函数的实现简单地通知进行打开适配器调用\
  \ `NdisOpenAdapterEx` 的线程，以指示操作完成。\n\n`ProtocolCloseAdapterCompleteEx`\n\n这是一个必需函数。与\
  \ `ProtocolOpenAdapterCompleteEx` 函数类似，这是一个完成例程，但用于 `NdisCloseAdapterEx` 函数。此函数的实现简单地通知进行关闭适配器调用\
  \ `NdisCloseAdapterEx` 的线程，以指示操作完成。\n\n`ProtocolNetPnPEvent`\n\n此函数对于支持即插即用和电源管理的协议驱动程序是必需的。实现根据通过\
  \ `NET_PNP_EVENT_NOTIFICATION` 结构传递的事件类型进行分支处理，并根据协议驱动程序的设计处理需要的内容。例如，它可以处理电源管理通知或重启通知。\n\
  \n`ProtocolUninstall`\n\n此函数是可选的。如果实现，此函数在协议驱动程序被卸载前执行清理工作。\n\n`ProtocolReceiveNetBufferLists`\n\
  \n如果为底层微型端口驱动程序实现了散聚 DMA，则此函数对于协议驱动程序是必需的。NDIS 框架在绑定的微型端口驱动程序调用 `NdisMIndicateReceiveNetBufferLists`\
  \ 函数后调用此函数。网络缓冲区列表仅适用于 NDIS 6.x 版本。如果 `ReceiveFlags` 参数中的 `NDIS_RECEIVE_FLAGS_RESOURCES`\
  \ 标志未设置，协议驱动程序将保留 `NET_BUFFER_LIST` 结构的所有权，直到它调用 `NdisReturnNetBufferLists` 函数。该函数的原型见清单\
  \ 10-12。\n\n*清单 10-12. `ProtocolReceiveNetBufferLists` 函数的原型*\n\n```\nVOID ProtocolReceiveNetBufferLists(\n\
  \    IN NDIS_HANDLE ProtocolBindingContext,\n    IN PNET_BUFFER_LIST pNetBufferLists,\n\
  \    IN NDIS_PORT_NUMBER PortNumber,\n    IN ULONG NumberOfNetBufferLists,\n   \
  \ IN ULONG ReceiveFlags)\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 10 章 ■ 网络驱动程序接口规范与网络设备驱动程序\n\n\n\n```c\nvoid ProtocolSendNetBufferListsComplete(\n\
  \    IN NDIS_HANDLE ProtocolBindingContext,\n    IN PNET_BUFFER_LIST pNetBufferLists,\n\
  \    IN ULONG SendCompleteFlags\n);\n```\n\n**`ProtocolSendNetBufferListsComplete`\
  \ 函数的原型：**\n\n```c\nVOID ProtocolSendNetBufferListsComplete(\n    IN NDIS_HANDLE\
  \ ProtocolBindingContext,\n    IN PNET_BUFFER_LIST pNetBufferLists,\n    IN ULONG\
  \ SendCompleteFlags\n);\n```\n\n其中传递给函数的参数为：\n\n- `ProtocolBindingContext` - 指向打开上下文的指针\n\
  - `pNetBufferLists` - 正在被向上指示的 `Net Buffer` 列表的链表。\n- `PortNumber` - 接收 NBL 的端口\n\
  - `NumberOfNetBufferLists` - 本次调用中包含的 `NetBufferLists` 数量\n- `ReceiveFlags` - 与接收操作相关的标志\n\
  \n`ProtocolSendNetBufferListsComplete`\n\n如果底层微型端口驱动程序实现了分散/聚合 DMA，则此函数是协议驱动程序所必需的。此函数执行完成发送操作所需的任何后处理。例如，协议驱动程序可以通知请求发送数据的客户端操作已完成。\n\
  \nNDIS 框架在底层微型端口驱动程序调用 `NdisMSendNetBufferListsComplete` 函数后调用此函数。发送操作的完成意味着底层微型端口驱动程序已传输了指定的网络数据。此函数的原型见列表\
  \ 10-13。\n\n*列表 10-13. `ProtocolSendNetBufferListsComplete` 函数的原型*\n\n```\nVOID\
  \ ProtocolSendNetBufferListsComplete(\n    IN NDIS_HANDLE ProtocolBindingContext,\n\
  \    IN PNET_BUFFER_LIST pNetBufferLists,\n    IN ULONG SendCompleteFlags\n);\n\
  ```\n\n其中传递给函数的参数为：\n\n- `ProtocolBindingContext` - 指向打开上下文的指针\n- `pNetBufferLists`\
  \ - 正在被向上指示的 `Net Buffer` 列表的链表\n- `SendCompleteFlags` - 可通过 OR 操作组合的 NDIS 标志\n\n\
  ### NDIS 中间层驱动程序\n\nNDIS 中间层驱动程序位于上层协议驱动程序和硬件级微型端口驱动程序之间。NDIS 中间层驱动程序应被视为一个分层微型端口驱动程序。分层微型端口驱动程序向上层协议驱动程序暴露微型端口接口，向下层\
  \ NIC 微型端口驱动程序暴露协议驱动程序接口。在分层微型端口驱动程序结构中，协议驱动程序与分层微型端口驱动程序底部的微型端口驱动程序进行通信。分层微型端口驱动程序在其上边缘导出\
  \ `MiniportXxx` 函数，在其下边缘导出 `ProtocolXxx` 函数。中间层驱动程序的微型端口接口可被称为虚拟微型端口。它是“虚拟”的，因为它不直接控制\
  \ NIC。相反，它依赖底层微型端口驱动程序与物理设备进行通信。图 10-5 说明了分层 NDIS 微型端口驱动程序架构。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-199_1.jpg)\n\n*图 10-5. 分层 NDIS 微型端口驱动程序与 NDIS 架构中其他驱动程序之间的关系*\n\n\
  以下示例说明了中间层驱动程序的各种用法：\n\n- 在旧版传输驱动程序与管理传输驱动程序未知媒体类型的微型端口驱动程序之间进行媒体转换\n- 用于安全或其他目的的数据过滤\n\
  - 负载均衡故障转移 (LBFO) 解决方案\n- 监控和收集网络数据统计信息\n\nNDIS 中间层驱动程序在其 `DriverEntry` 例程的上下文中注册其\
  \ `MiniportXxx` 函数和 `ProtocolXxx` 函数。要注册其微型端口函数，驱动程序必须将 `NDIS_MINIPORT_DRIVER_CHARACTERISTICS`\
  \ 结构中的 `Flags` 设置为 `NDIS_INTERMEDIATE_DRIVER` 标志，并调用 `NdisMRegisterMiniportDriver`\
  \ 函数。否则，设置 `NDIS_MINIPORT_DRIVER_CHARACTERISTICS` 的方式与任何其他微型端口驱动程序相同。要注册其 `ProtocolXxx`\
  \ 函数，中间层驱动程序必须调用 `NdisRegisterProtocolDriver` 函数。\n\n##### 注册表设置\n\nNDIS 网络驱动程序的注册表设置围绕由设备管理器加载的\
  \ NDIS 设备驱动程序展开。NDIS 反过来负责加载和运行网络驱动程序。注册表允许 NDIS 加载驱动程序，然后调用其 `DriverEntry` 例程，并继续驱动程序的初始化和运行。微型端口驱动程序和适配器实例的注册表信息必须在\
  \ `HKEY_LOCAL_MACHINE\\Comm\\` 中进行配置。列表 10-14 是此类注册表信息的通用模板。\n\n*列表 10-14. NDIS\
  \ 微型端口驱动程序的通用注册表信息*\n\n```\n[HKEY_LOCAL_MACHINE\\Comm\\<MiniportDriverName>]\n\"\
  Group\"=\"NDIS\"\n\"ImagePatch\"=\"<driver>.dll\"\n\n[HKEY_LOCAL_MACHINE\\Comm\\\
  <AdapterInstanceName>\\Parms]\n\"BusNumber\"=dword:<busnumber>\n\"BusType\"=dword:<bustype>\n\
  <其他微型端口驱动程序所需的参数，例如 IRQ、IOAddr、TcpIP 等>\n```\n\n一个能很好说明这一点的具体示例是任何 NE2000 兼容适配器的注册表项设置。列表\
  \ 10-15 摘自 `common.reg`。\n\n*列表 10-15. NE2000 网络适配器的注册表信息*\n\n```\n[HKEY_LOCAL_MACHINE\\\
  Comm\\NE20001]\n;LOC_FRIENDLYNE2000COMPAT\n\"DisplayName\"=mui_sz:\"netmui.dll,#9001\"\
  \n\"Group\"=\"NDIS\"\n\"ImagePath\"=\"ne2000.dll\"\n\n[HKEY_LOCAL_MACHINE\\Comm\\\
  NE20001\\Parms]\n\"BusNumber\"=dword:0\n\"BusType\"=dword:8\n\"InterruptNumber\"\
  =dword:03\n\"IoBaseAddress\"=dword:0300\n\"Transceiver\"=dword:3\n\"CardType\"=dword:1\n\
  \n[HKEY_LOCAL_MACHINE\\Comm\\NE20001\\Parms\\Tcpip]\n\"EnableWINS\"=dword:1\n```\n\
  \n如果 NE2000 适配器是 PCI 总线适配器，则它必须在 `HKLM\\Drivers\\BuiltIn\\PCI\\Template` 节点下拥有注册表信息条目。以下列表\
  \ (10-16) 是 NE2000 PCI NIC 的注册表信息：\n\n*列表 10-16. NE2000 兼容 PCI 适配器的注册表信息*\n\n```\n\
  [HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\PCI\\Template\\NE2000]\n\"Dll\"=\"NDIS.dll\"\
  \n\"Class\"=dword:02\n\"SubClass\"=dword:00\n\"ProgIF\"=dword:0\n\"VendorID\"=multi_sz:\"\
  10ec\",\"1050\"\n\"DeviceID\"=multi_sz:\"8029\",\"0940\"\n; \"Entry\"=\"NdisPCIBusDeviceInit\"\
  \n\"Prefix\"=\"NDS\"\n; Flags==2 是 DEVFLAGS_LOADLIBRARY\n\"Flags\"=dword:2\n\"Transceiver\"\
  =dword:3\n```\n\n值得记住的是，NE2000 不使用 `giisr.dll` 中的通用 ISR，而是加载自身的 `NE2000ISR.dll`\
  \ 中的 ISR 来处理中断。\n\n### 章节总结\n\n本章专门介绍网络驱动程序，重点放在网络适配器卡的驱动程序上。因此，对 NIC 微型端口驱动程序的强调多于对协议驱动程序或中间层驱动程序的强调。NIC\
  \ 微型端口驱动程序负责使用 NDIS 框架为开发人员提供的 API 来与硬件接口，以处理高性能网络硬件。它为驱动程序开发人员提供了使用分散/聚合 DMA 接收和发送大量数据、执行内存映射\
  \ I/O 或端口映射 I/O 操作的函数。它提供了处理硬件信息、内务处理、中断和同步的函数。所有这些 API 都使得设备驱动程序能够跨操作系统移植，并降低了开发网络适配器驱动程序的难度。最后关于\
  \ NIC 设备驱动程序的说明是，您不能在引导加载程序中使用 NDIS 驱动程序，因为 NDIS 不是引导加载程序的一部分。这意味着支持引导加载程序的网络设备驱动程序必须在驱动程序代码中实现所有硬件接口。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 11 章**\n\n**调试设备驱动程序**\n\
  \n\n\n"
- "# 调试设备驱动程序\n\n您能说出哪位开发者能编写出除了\"Hello World\"程序之外毫无缺陷的软件单元吗？我想不能。软件开发周期如此漫长的主要原因在于代码实现中的错误，即所谓的\"\
  bug\"（\"调试\"一词便用来描述从软件中筛除这些错误的过程）。软件中存在 bug 的最终结果是可执行文件迟早会运行失败。管理硬件的软件开发复杂性直接导致了更复杂且难以修复的多重\
  \ bug。最难修复的 bug 是那些偶发且难以重现的。这些通常是逻辑错误而非编码错误。内核模式设备驱动程序还存在一个额外风险：如果其代码发生故障，系统可能崩溃。\n\
  \n本章内容\n\n* 可用工具概述\n* 使用最简单的工具\n* 调试区域\n* 内核调试器\n* 硬件辅助调试\n* 事后调试\n\n### 调试工具与技术概述\n\
  \n编写健壮的代码是发现并修复 bug 的关键。在可能发生错误的地方添加错误处理代码不仅是良好的编码实践，更是编写设备驱动程序代码时必须遵守的准则。每当调用 API\
  \ 时，都要检查返回值并进行错误恢复处理。同样，操作内存和内存指针的代码，以及可能失败的算术运算（如经典的除零错误）也需如此。话虽如此，由于编码错误或逻辑错误仍会存在于代码中（至少在我的代码中是这样），因此有多种调试工具可用于调试设备驱动程序。\n\
  \nA. Kcholi  \n*《精通 Windows Embedded Compact 7》*  \n© Abraham Kcholi 2011\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 调试技术\n\n所有调试技术中最简单的是将调试消息输出到调试终端。这项技术对于调试设备驱动等软件极为有价值。该技术侵入性最小，因为它不会中断设备驱动程序的执行和流程。包括\
  \ Windows Embedded Compact 7 在内的所有 Windows CE 版本都提供了一个极其有用的工具，可通过调试区域有条件地输出调试消息。这很有帮助，因为它可以控制显示的大量消息，从而允许您仅查看与所调试代码特定区域相关的消息。例如，如果您正在调试设备驱动程序的\
  \ IST，可以将调试消息限制为仅在 IST 代码中触发的那些，这样就不会收到来自设备驱动程序每个函数的数百条消息。\n\n其他技术涉及软件和硬件调试器。虽然软件调试器（如内核调试器）在调试初始化、打开设备驱动程序实例以及反初始化和关闭设备驱动程序实例时非常有用，但在调试处理\
  \ I/O 数据事务的设备驱动程序代码时可能能力不足。这就需要利用芯片调试能力的硬件调试器。\n\n#### 调试工具\n\n这些工具包括 Platform Builder\
  \ 提供的工具，例如：\n\n* 调试区域\n* 内核调试器\n* 目标控制\n\nLauterbach 的 TRACE32 是一款第三方工具，可与 CPU 硬件内置的调试能力交互。\n\
  \n* TRACE32 调试器\n* Lauterbach 的 eXDI 硬件调试驱动程序\n\n### 简单高效的调试技术\n\n如上所述，调试技术种类繁多；然而，要实现有效且高效，明智的做法是将技术应用于我们正在调试的特定代码。设备驱动程序对调试技术尤其敏感，因为与硬件的紧密交互以及时序敏感性可能不允许始终使用断点来停止执行流程并检查代码以尝试隔离\
  \ bug。\n\n虽然可以合理地假设初始化和反初始化代码使用软件调试器（如内核调试器）并在`XXX_Init`入口点等函数中设置断点应该没有问题，但如果我们必须调试设备驱动程序的\
  \ IST，这很可能成为问题。要调试时序敏感代码和直接寻址硬件寄存器的代码，我们可能更倾向于使用不那么侵入性的技术，例如调试消息或硬件跟踪技术。\n\n在调试设备驱动程序时，最好手动加载设备驱动程序。这意味着，与其让设备管理器在系统启动时加载设备驱动程序，迫使您在系统加载设备驱动程序时执行调试，不如在您准备好调试时控制加载。要做到这一点，只需创建一个简单应用程序，调用`ActivateDeviceEx`来加载设备驱动程序即可。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### 调试消息\n\n调试消息是在执行单元执行时获取有意义信息的最不具侵入性的方法。调试消息不会停止执行，并且根据其格式化方式，可以提供丰富的信息。适当格式化的调试消息对于不熟悉您代码实现细节的其他开发者也很有用。以下一些指导原则应能帮助您为当前任务良好地格式化调试消息。\n\
  \n* 指定消息来源\n* 编写有意义的消息\n* 调试消息应易于不熟悉实现代码的人员（如测试人员）理解\n* 使用一致的符号突出显示重要类型的消息以帮助识别\n\
  * 使用调试区域过滤输出\n\n您可以添加消息来源的文件名和行号，以便快速定位。\n\n```\nDEBUGMSG(ZONE_INIT, (_T(\"DMO!Error\
  \ Getting window information\\r\\n\"), _T(__FILE__), _T(__LINE__)));\n```\n\n您可以通过在输出字符串中添加\"\
  **DMO!**\"来标识组件（例如设备驱动程序）的前缀，正如刚才的消息所示。您可以从 Platform Builder IDE 的`<Target>`菜单中打开\"\
  调试消息选项\"对话框，以在消息中包含时间戳、进程 ID 和线程 ID 信息。请参见图 11-1。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 11-1：调试消息选项设置](img/index-205_1.jpg)\n\n解释字符串应阐明消息旨在传达的内容，例如指示名为某某的 ISR 处理程序已为特定\
  \ IRQ 安装。\n\n```\nDEBUGMSG(ZONE_INIT, (_T(\"DMO!ISR handler installed , Dll: '%s',\
  \ Handler: '%s', Irq: %d\\r\\n\"), IsrInfo.szIsrDll, IsrInfo.szIsrHandler, IsrInfo.dwIrq));\n\
  ```\n\n例如，您可以通过在函数名前添加'+'和'-'符号来突出显示函数的进入和退出。\n\n```\nDEBUGMSG(ZONE_INIT, (_T(\"\
  DMO!+DMO_Init\\r\\n\")));\n```\n\n为了能够过滤并抑制可能干扰您或其他开发者/测试人员解决问题的消息洪流，请使用调试区域。\n\n\
  #### 调试区域\n\n调试区域是一种用于过滤调试消息并抑制过多消息输出的机制。该机制为开发者提供了一组可嵌入代码中的宏，用于有条件地输出可控的调试消息。这些宏最终归结为调用`NKOutputDebugString`，这是一个用于打印调试消息的高效内核函数。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n##### 调试区域宏\n\n总共有十一个调试区域宏。这些区域提供向调试系统注册调试区域、关联区域掩码、打印消息的功能，其中两个还提供了在\
  \ OEM 提供此类接口的情况下输出 LED 模式的能力。\n\n\n\n• `DEBUGREGISTER` - 此宏仅在调试（Debug）版本中注册区域。不影响零售版和正式版。\n\
  • `RETAILREGISTERZONES` - 此宏仅在调试版和零售版中注册区域。不影响正式版。\n• `DEBUGZONE` - 将一个掩码位与一个区域关联。\n\
  • `DEBUGMSG` - 有条件地输出格式化调试消息。不影响零售版和正式版。\n• `RETAILMSG` - 有条件地输出格式化调试消息。不影响正式版。\n\
  • `ERRORMSG` - 有条件地输出格式化错误消息，并附上发生错误的文件名和行号。不影响正式版。\n• `DEBUGCHK` - 断言一个表达式，如果表达式为\
  \ **FALSE**，则产生一个 `DebugBreak`。不影响零售版和正式版。\n• `ASSERT` - 断言一个表达式，如果表达式为 **FALSE**，则产生一个\
  \ `DebugBreak`。\n• `ASSERTMSG` - 断言一个表达式，如果表达式为 **FALSE**，则产生一条错误消息。不影响零售版和正式版。\n\
  • `DEBUGLED` - 有条件地输出一个 LED 模式。不影响零售版和正式版。对于无 LED 硬件的开发板，此选项不可用。量产版开发板通常不会提供 LED\
  \ 硬件。\n• `RETAILLED` - 有条件地输出一个 LED 模式。不影响正式版。\n\nWindows CE 中的术语有时会令人困惑；请注意有 `RETAILMSG`\
  \ 和 `DEBUGMSG` 之分。`DEBUGMSG` 宏仅用于调试版本中。因此，如果一个模块以零售版方式编译（即构建环境中设置了 `WINCEDEBUG=RETAIL`），它将不会输出任何\
  \ `DEBUGMSG` 语句。另一方面，`RETAILMSG` 在零售版和调试版中都会输出消息。如果构建以“正式版”方式编译（即构建环境中设置了 `WINCESHIP=1`），则不会输出任何消息。为什么术语会令人困惑？因为“零售”一词在英语里并不等同于人们通常理解的“正式发布”。\n\
  \n##### 注册调试区域\n\n在模块中使用调试区域之前，必须先在调试系统中注册这些区域。你需要完成几个准备步骤。首先是定义你的调试区域。需要记住的是，每个模块最多可以定义十六个区域。清单\
  \ 11-1 展示了一段定义五个区域的代码示例。\n\n*清单 11-1. 定义模块特定的调试区域*\n\n```\n#ifdef DEBUG\n\n#define\
  \ ZONE_INIT DEBUGZONE(0)\n#define ZONE_OPEN DEBUGZONE(1)\n#define ZONE_IOCTL DEBUGZONE(2)\n\
  #define ZONE_DEINIT DEBUGZONE(3)\n#define ZONE_ERROR DEBUGZONE(15)\n\n#endif //DEBUG\n\
  ```\n\n接下来，你需要将一个位掩码与区域 ID 关联起来。清单 11-2 展示了一种实现方法。这个掩码用于设置 `DBGPARAM` 结构中的 `ulZoneMask`\
  \ 字段，以指示哪些区域已启用。\n\n*清单 11-2. 将位掩码与区域 ID 关联*\n\n```\n#define DEBUGMASK(bit) (1 <<\
  \ (bit))\n\n#define MASK_INIT DEBUGMASK(0)\n#define MASK_OPEN DEBUGMASK(1)\n#define\
  \ MASK_IOCTL DEBUGMASK(2)\n#define MASK_DEINIT DEBUGMASK(3)\n#define MASK_ERROR\
  \ DEBUGMASK(15)\n```\n\n在注册之前，你必须声明一个特定于该模块的私有 `DBGPARAM` 结构。因为该结构实际上将你的区域 ID 与模块关联起来，注册后调试系统便能够管理你模块的特定区域。清单\
  \ 11-3 展示了声明该结构的一个示例。但请注意，分配的变量必须始终命名为 `dpCurSettings`。\n\n*清单 11-3. 声明 DBGPARAM*\n\
  \n```\nDBGPARAM dpCurSettings = {\n    _T(\"Demodrvr\"),\n    {\n        _T(\"Init\"\
  ), _T(\"Open\"), _T(\"Ioctl\"), _T(\"DeInit\"),\n        _T(\"\"), _T(\"\"), _T(\"\
  \"), _T(\"\"),\n        _T(\"\"),_T(\"\"),_T(\"\"),_T(\"\"),\n        _T(\"\"),_T(\"\
  \"),_T(\"\"),_T(\"Error\")\n    },\n    MASK_INIT | MASK_DEINIT\n};\n```\n\n关于这个结构体需要注意两点：第一，模块的名称被分配在结构的第一个字段中；最后一个字段\
  \ `ulZoneMask` 指示哪些区域已启用。\n\n```\ntypedef struct _DBGPARAM {\n    WCHAR lpszName[32];\n\
  ```\n\n\n\n`WCHAR rglpszZones[16][32];`\n\n`ULONG ulZoneMask;`\n\n`} DBGPARAM, *LPDBGPARAM;`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 11 章 ■ 调试设备驱动程序\n\n接下来，您必须向调试系统注册您的调试区域。由于设备驱动程序必须在 DLL 中实现，因此注册必须在 `DllEntry`\
  \ 函数中进行。清单 11-4 是注册设备驱动程序调试区域的示例代码。请注意对 `DisableThreadLibraryCalls` 的调用，它有效地禁用了\
  \ `DLL_THREAD_ATTACH` 和 `DLL_THREAD_DETACH` 通知。这有助于减少设备驱动程序 DLL 的初始化代码。\n\n*清单 11-4.\
  \ 注册设备驱动程序的调试区域*\n\n```\nBOOL WINAPI DllEntry(HANDLE hinstDLL, DWORD dwReason, LPVOID\
  \ lpvReserved)\n{\n    switch(dwReason)\n    {\n        case DLL_PROCESS_ATTACH:\n\
