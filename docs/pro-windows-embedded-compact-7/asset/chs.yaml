  \n第 7 章 ■ 流设备驱动精髓\n\n*图 7-5\\. 运行异步 IO 请求演示应用程序*\n\n### 内核模式设备驱动程序\n\n设备管理器将所有流设备驱动程序加载到内核空间，作为内核模式驱动程序运行，但那些在注册表中设置了\
  \ `DEVFLAGS_LOAD_AS_USERPROC` 标志的设备驱动程序除外。内核模式驱动程序提供最佳性能，因为它们可以使用 `coredll.dll`\
  \ 的内核版本（名为 `k.coredll.dll`）直接调用内核 API。\n\n内核模式设备驱动程序必须健壮，因为它们对内核数据结构和内核空间内存拥有无限制的访问权限。有缺陷的内核模式设备驱动程序可能会损坏内核内存，从而导致系统崩溃。内核模式设备驱动程序可以非常快速地同步访问用户缓冲区，因为用户内存是直接可用的。\n\
  \n#### 访问检查\n\n流设备驱动程序可以接受来自调用用户模式进程的输入和输出缓冲区，这就带来了一个问题：如何将这些用户模式虚拟内存指针映射到内核模式虚拟内存指针。在\
  \ Windows CE 6.0 及更高版本中，内核会对指针参数执行完整的访问检查，因此，驱动程序只需要访问检查嵌入式指针。嵌入式指针意味着用户模式进程在传递给设备驱动程序的缓冲区中嵌入了一个用户模式虚拟地址指针。列表\
  \ 7-13 是从设备驱动程序向导为 `XXX_IOControl` 函数生成的带注释代码中摘录的，用于演示如何访问嵌入式指针。图 7-6 以图示方式展示了访问检查过程。\n\
  \n*列表 7-13\\. 演示嵌入式指针访问的代码片段*\n\n```c\n// 以下代码应指导您处理对嵌入式指针的访问\n// 包含嵌入式指针的结构\ntypedef\
  \ struct _INPUT_tag\n{\nUCHAR *pEmbedded;\nDWORD dwSize;\n}INPUT, *PINPUT;\n\nPUCHAR\
  \ g_pMappedEmbedded\n\n// 代码实现\nHRESULT hr = E_WASNEVERSET;\nPINPUT pInput = pBufIn;\n\
  hr = CeOpenCallerBuffer((PVOID*)&g_pMappedEmbedded,\npInput->pEmbedded,\npInput->dwSize,\n\
  ARG_I_PTR,\nFALSE);\n// 如果 FAILED(hr) == true，则失败\n\n// 处理完嵌入式指针后\nhr = CeCloseCallerBuffer((PVOID)g_pMappedEmbedded,\n\
  pInput->pEmbedded,\npInput->dwSize,\nARG_I_PTR);\n```\n\n*图 7-6\\. 访问检查过程示意图*\n\n\
