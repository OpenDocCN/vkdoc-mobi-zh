  eXDI





  ### eXDI 概述


  `eXDI` 是 Extended Debugging Interface（扩展调试接口）的缩写。它允许 Platform Builder 通过在线调试器（如
  TRACE32）监控并控制目标设备的活动。本质上，它是 Platform Builder 与在线调试器之间的适配层。`eXDI` 作为核心连接服务实现，与操作系统访问服务协同工作，为
  Platform Builder 提供调试服务。


  操作系统访问服务为调试器提供操作系统感知能力。它充当 `eXDI` 服务与 Platform Builder 之间的中介。这使得第三方解决方案提供商能够开发出支持
  Windows Embedded Compact 7 的调试工具。图 11-10 展示了 Platform Builder 如何使用 Lauterbach `eXDI2`
  驱动程序在 TRACE32 ICD 之间建立接口，后者通过 `JTAG` 连接目标设备，用于硬件辅助调试。


