  \ 可安装 ISR\n\n顾名思义，可安装 ISR 可以在运行中的设备上安装，而无需在 OAL 中实现相关代码。这使得 ISV 无需与 OEM 协作即可将 ISR\
  \ 添加到系统中。此外，可安装 ISR 允许多个设备共享单个中断请求线上的中断。这意味着 OEM 必须在 OAL 代码中实现对 IRQ 的支持，使得可安装 ISR\
  \ 能够挂接到该 IRQ。\n\n清单 8-3 展示了设备驱动程序如何在其 `xxx_Init` 入口点中安装注册表设置中指定的 ISR。\n\n*清单 8-3.\
  \ 安装 ISR 示例代码*\n\n```c\n// 我们确保从 DDKReg_GetIsrInfo 获得了有效结果\nif (IsrInfo.szIsrDll[0]\
  \ != 0)\n{\n    if (IsrInfo.szIsrHandler[0] != 0 &&\n        IsrInfo.dwIrq == IRQ_UNSPECIFIED\
  \ &&\n        IsrInfo.dwSysintr == SYSINTR_UNDEFINED)\n    {\n        DEBUGMSG(ZONE_INIT,\n\
  \            (_T(\"TMP!可安装 ISR 设置损坏或丢失\\r\\n\")));\n        FreePhysMem(pDevContxt);\n\
  \        return dwRet;\n    }\n    else\n    {\n        pDevContxt->hInstISR =\n\
  \            LoadIntChainHandler(IsrInfo.szIsrDll,\n                           \
  \     IsrInfo.szIsrHandler,\n                                (BYTE)IsrInfo.dwIrq);\n\
  \        if (!pDevContxt->hInstISR)\n        {\n            DEBUGMSG(ZONE_INIT,\n\
  \                (_T(\"TMP!安装 ISR 处理程序失败\\r\\n\")));\n            FreePhysMem(pDevContxt);\n\
  \            return dwRet;\n        }\n        else\n        {\n            GIISR_INFO\
  \ Info;\n            PHYSICAL_ADDRESS PortAddress =\n                pDevContxt->ioPhysicalBase;\n\
  \            pDevContxt->dwSysIntr = IsrInfo.dwSysintr;\n\n            // 设置 ISR\
  \ 处理程序\n            Info.SysIntr = IsrInfo.dwSysintr;\n            Info.CheckPort\
  \ = TRUE;\n            Info.PortIsIO = pDevContxt->bIoMemMapped;\n            Info.UseMaskReg\
  \ = FALSE;\n            Info.PortAddr = pDevContxt->pIoAddr;\n            Info.PortSize\
  \ = sizeof(DWORD);\n            Info.MaskAddr = 0x0000;\n\n            if (!KernelLibIoControl(pDevContxt->hInstISR,\n\
  \                                    IOCTL_GIISR_INFO, &Info, sizeof(Info), NULL,\
  \ 0, NULL))\n            {\n                DEBUGMSG(ZONE_ERROR,\n             \
  \       (_T(\"TMP!KernelLibIoControl 调用失败\\r\\n\")));\n            }\n        }\n\
  \    }\n}\n```\n\n`LoadIntChainHandler` 主要负责加载 ISR 的 DLL，调用必需的 `CreateInstance`\
  \ 函数，并将该 ISR 添加到 ISR 列表的末尾。大多数情况下，`%WINCEROOT%\\public\\COMMON\\oak\\drivers\\giisr`\
