  ### 设备驱动程序位置


  在第二章讨论 `平台目录` 树时，我们注意到两个最相关的目录是 `PLATFORM` 和 `PUBLIC` 目录。在 `PLATFORM` 目录下是特定于 BSP
  的设备驱动程序，而在 `PUBLIC` 目录下是所有平台无关的设备驱动程序。


  当我们开发设备驱动程序时，必须考虑这个设备驱动程序属于谁。它是特定于您的操作系统映像的设备驱动程序吗？它是 BSP 的一部分吗？或者，我正在创建一个与架构无关的设备驱动程序，并希望将其与我的
  OEM 硬件一起推向市场。`图 3-1` 展示了如何创建设备驱动程序并将其添加到 BSP。


  *图 3-1. 将设备驱动程序添加到 BSP*


  生成的设备驱动程序位置如 `图 3-2` 所示；在这里，您可以看到位于 `DemoBSP` 设备驱动程序文件夹中的 `DemoDrvr` 设备驱动程序的文件夹层次结构。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-64_1.jpg)


  第三章 ■ 首先设计你的设备驱动程序！


  *图 3-2. BSP 驱动程序位置*


  #### BSP


  如果计划的设备驱动程序要处理作为目标板内置部分的外围 IO 设备，那么它应该位于该板的 BSP 目录中。这将确保任何基于该 BSP 的操作系统设计都能够访问该外围
  IO 设备。`生产质量 OAL` 倡议要求特定于板的设备驱动程序位于平台目录层次结构中的 `$(PLATFORMROOT)\<BSPName>\src\drivers`
  文件夹下。这个位置将确保您的设备驱动程序将成为您的 BSP 构建的一部分。


  #### 特定操作系统设计


  此位置允许开发者创建一个特殊的设备驱动程序，该驱动程序被放置在操作系统设计中并内置于映像中。先前版本的设备驱动程序开发文档建议您走这条路，在一个测试床操作系统设计中实现和测试您的设备驱动程序，并在测试和调试完成后将设备驱动程序移动到最终位置。但是，此版本在一个模板
  BSP 中提供了一个模板流设备驱动程序，其位置类似于上述位置。


  然而，如果某个设备驱动程序在任何其他目标设备中都不需要，那么将其放在操作系统设计中是很有用的。


  #### PUBLIC 树


  `PUBLIC` 树位置提供了所有与平台无关的设备驱动程序，包括 Microsoft 在 `$(PUBLICROOT) \COMMON\oak\drivers`
  文件夹下提供的开箱即用设备驱动程序。但是，这不是您应该放置设备驱动程序的位置，而是应该放在第三方文件夹下，例如 `$(PUBLICROOT)\ThirdParty\catalog\<CompanyName>\<DriverName>`。这不会破坏
  `PUBLIC` 树的完整性，并允许设备驱动程序在目录中平滑集成。


  ### 决定模式


  `Windows CE 6.0` 带来了 `Windows CE` 操作系统架构的变革。在此之前，所有设备驱动程序都是用户模式设备驱动程序；从此时开始，设备驱动程序既可以驻留在内核中，也可以位于用户模式。我们在第一章已经触及了这个主题，并将在后续章节中进一步讨论并深入探讨它。但对我们开发者而言，在实现之前就决定我们将要开发的设备驱动程序是驻留在内核中（即内核模式设备驱动程序）还是用户模式设备驱动程序仍然很重要。


  #### 内核模式





  #### 内核模式


  内核模式设备驱动程序驻留并在内核上下文中运行，因此拥有任何其他内核模式代码所具有的所有特权。它可以访问内核模式内存空间；它可以读取和写入内核结构，并使用内核特定的
  API。因此，内核模式设备驱动程序可以无限制地访问硬件。这些特权使得设备驱动程序对操作系统来说非常危险且具有风险。


  选择开发内核模式设备驱动程序会给开发者带来编写安全、健壮代码的负担。这进一步强调了规划与设计行为良好且无风险的设备驱动程序的重要性。


  -   设备驱动程序如何访问内存

  -   用户模式进程如何访问检索到的数据

  -   用户模式进程如何发送数据

  -   设备驱动程序如何通知用户模式进程已发生中断且检索到的数据已就绪


  本书将深入探讨所有这些主题。


  #### 用户模式


  用户模式设备驱动程序在旨在承载它并与设备管理器通信的用户模式进程中执行。你可能还记得，设备管理器在内核模式下执行，验证用户模式设备驱动程序的请求，并作为物理硬件与用户模式设备驱动程序之间的中介。这意味着用户模式设备驱动程序没有内核模式特权，并且对内核模式
  API 的访问受到严格限制。由于用户模式与内核模式之间发生多次转换，用户模式设备驱动程序会遭受明显的性能损失。


  它适用于处理连接到扩展总线（例如 USB 和安全数字总线）上的设备的可安装设备驱动程序。


  #### 注册表


  注册表在加载和初始化设备驱动程序方面起着重要作用，因为设备驱动程序是一个动态链接库。因此，它必须由一个宿主进程来承载。宿主进程需要知道在哪里找到可执行文件以加载它。有两个主要的内核组件承载和处理设备驱动程序：


  -   图形、窗口和事件系统 (GWES)

  -   设备管理器。


  在开发的规划和设计阶段，决定哪个组件承载设备驱动程序将决定其注册表设置。对于流设备驱动程序，它位于注册表项`HKEY_LOCAL_MACHINE\Drivers\BuiltIn`下。


  你应该规划的注册表项包括加载标志、内存配置和中断设置。


  这并不是说这些值是必需的或比其他值更重要，但在需要时提前规划这些是有用的。在第 5 章中，将全面讨论注册表，并应为流设备驱动程序设计注册表项提供所有工具。


  ### 设备驱动程序类型


  设备驱动程序属于几个设备驱动程序类别，由加载它们的组件区分。


  本机设备驱动程序由`GWES`加载，流设备驱动程序由设备管理器加载，文件系统驱动程序由`FSD Manager` ( `FSDMGR.DLL` ) 加载。除了显示和用户输入驱动程序（如键盘）等用户界面设备驱动程序或文件系统驱动程序之外，你将开发的大多数设备驱动程序都是流设备驱动程序。因此，选择类别应该很直接。然而，流设备驱动程序可以是内置驱动程序（如作为
  SoC 组成部分的`I2C`设备或总线驱动程序），甚至是与总线无关的驱动程序（如 PC 卡设备驱动程序）。


  ### 设备驱动程序特性


  规划设备驱动程序时需要考虑的非常重要的一点是内存管理、如何处理中断以及电源管理支持。这很重要，因为设备驱动程序的性能受数据存储方式及其中断处理方式的影响。


  对于电池供电的设备来说，电源管理极其重要。


  ### 直接内存访问


  在考虑设备驱动程序如何存储传入数据时，性能是最重要的。处理大量数据输入的设备需要以最小的延迟移动数据。考虑直接内存访问是可取的，因为它移动数据无需处理器参与。但是，你应该熟悉外围设备的`DMA`能力。第
  10 章将对内存处理进行深入讨论。


  ### 中断支持


  规划中断支持意味着你了解你的 IO 外围设备映射到的硬件中断请求级别。接下来，你必须映射一个逻辑系统中断 ID，它将把你的`ISR`与`IST`关联起来。另一个考虑因素是`ISR`本身，它在很大程度上取决于
  SoC 的架构以及你是否正在规划一个`ISR`将被链式连接的可安装设备驱动程序。


  ### 电源管理支持


  除了考虑是否提供电源管理之外，你可能还需要设计设备驱动程序需要实现哪些具体的电源管理支持。例如，设备驱动程序是否应提供唤醒能力？


  ### IO 控制代码


  IO 控制代码用于指定通过单个系统 API—— `DeviceIoControl`处理的设备特定系统调用。这允许应用程序向驱动程序请求执行常规文件系统 API
  不提供的功能。例如，假设设备驱动程序需要设置一些事件来通知某些 IO 完成。设备驱动程序可以为命名事件提供一个名称，应用程序可以通过调用特定的`IOCTL`来检索该事件。然后，应用程序将创建一个命名事件，设备驱动程序将设置该事件以触发唤醒应用程序的线程。第
  9 章专门讨论这个主题。然而，为设备特定的`IOCTL`进行规划以增强设备驱动程序的功能能力是一个好主意。图 3-3 显示了如何向设备驱动程序向导创建的设备驱动程序添加`IOCTL`。


  ![](img/index-68_1.jpg)


  *图 3-3. 向设备驱动程序添加 IOCTL*


  ### 设计物理设备驱动程序


  物理设备驱动程序是一组硬件接口函数，用于隔离硬件特定的代码。例如，当你初始化一个设备驱动程序并调用其`XXX_Init`函数（对于流设备驱动程序）时，你可能需要初始化设备的硬件，向它的命令寄存器发送一些命令字，重置中断等。你可以将此代码添加到`XXX_Init`函数中，但你可以实现一个针对该硬件特定的`PDD_Init`函数。这将有助于更好的代码维护和代码质量。规划与设计设备驱动程序的一部分可能是设计能够完成硬件接口的`PDD`函数。设备驱动程序向导提供了向设备驱动程序代码中添加`PDD`函数的功能，这意味着如果你提前规划，可以通过添加已设计的函数来节省大量时间。图
  3-4 显示了如何使用设备驱动程序向导添加`PDD`函数。


  ![](img/index-69_1.jpg)


  *图 3-4. 向设备驱动程序添加 PDD 函数*


  ### 为测试而设计




  #### 习惯上，这是开发中最容易被忽视的领域。


  开发者调试代码以消除错误，当开发过程似乎不再出现故障时，我们似乎就感到满意了，并将设备驱动程序交付给客户，结果却让客户感到沮丧。确保设备驱动程序按预期工作，可能不仅仅是修复那些显而易见的错误那么简单。它可能无法满足时序性能需求，从而导致丢失宝贵的数据；它可能表现不一致；还可能出现一个只在某些特定数据与时序的偶发组合下才会触发的错误。


  要测试这些缺陷，需要对设备驱动程序有最深了解的人来设计测试场景。微软提供了一个非常出色的工具来实现设备驱动程序的测试用例套件，即 Windows Embedded
  Compact 测试工具包 (CTK)。此工具是 Windows CE 测试工具包 (CETK) 的改进版本，但仍使用相同的 Tux 测试框架。第 15 章专门介绍如何开发用于测试设备驱动程序的
  TUX 测试模块。图 3-5 展示了最新的 CTK 集成开发环境。设备驱动程序向导提供了一个可用于定制和构建的测试模块框架实现。CTK 为各种驱动程序提供了一组预定义的测试，这些驱动程序实现了常见的设备，例如
  USB 主机控制器。


