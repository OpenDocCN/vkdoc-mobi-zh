  // 此变量用于设备信息的 IOCTL 处理器。\nLPCWSTR g_oalIoCtlPlatformType = L\"VDX\"; // 可通过 IOCTL\
  \ 更改\n\n// g_oalIoCtlPlatformOEM：必需\n// 平台/通用实现要求我们定义此变量，用于设备信息的 IOCTL 处理器。\nLPCWSTR\
