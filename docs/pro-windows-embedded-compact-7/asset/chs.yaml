  ### 设备驱动程序开发包


  Windows CE 的设备驱动程序开发包（DDK）主要由两个重要的辅助库和一组头文件组成。这些头文件提供了辅助库（CEDDK 库和注册表辅助库）中可用的结构和辅助函数的定义。包含
  DDK 文件的主目录位于 PUBLIC 树之下：


  - `%PUBLICROOT%\COMMON\oak\drivers\ceddk`

  - `%PUBLICROOT%\COMMON\ddk\inc`


  #### CEDDK 动态链接库


  CEDDK 库提供了驱动程序用于处理总线地址转换和总线访问、分配和映射设备内存、设置直接内存访问（DMA）缓冲区、执行 I/O、电源管理功能以及暂停计数器的函数、结构和
  IO 控制代码。


  ##### 注册表辅助库


  注册表辅助函数和结构为设备驱动程序开发者提供了一种一致的方法来从注册表读取资源配置。


  ### TRACE32-ICD


  TRACE32-ICD 由 Lauterbach Datentechnik GmbH 提供，是一款极其强大的调试工具，用于芯片级调试。它绝非唯一可用的第三方工具，但它是我在调试设备驱动程序、引导加载程序和
  OAL 代码时使用过的一款工具。


  #### 概述


  在线调试器是一种利用微处理器芯片上集成的调试和跟踪逻辑的工具。


  大多数微处理器都实现了片上调试系统。例如 ARM 微处理器系列的 JTAG 接口。调试接口需要一些微处理器引脚，用于片上调试系统和第三方开发工具之间的通信。片上调试系统提供以下基本功能：


  - 读/写内存

  - 读/写 CPU 寄存器

  - 单步执行和实时执行

  - 硬件断点和触发功能（并非所有微处理器都支持）


  TRACE32-ICD 利用片上调试系统的这些功能，提供了一个强大的调试工具，具备以下特性：


  - 简便的高级语言和汇编语言调试

  - 在逻辑层面上显示内部和外部外设

  - 支持片上断点和触发

  - RTOS 感知

  - Flash 编程

  - 强大的脚本语言

  - 多处理器调试


  TRACE32-ICD 支持广泛的片上调试接口。调试器的硬件是通用的，只需更换调试电缆和软件即可连接到不同的目标处理器。调试器硬件有三个版本，区别仅在于它们与开发工作站的通信方式。


  - Power Debug USB 2 通过 USB 2 端口通信

  - Power Debug Ethernet 通过 USB 2 和 100 MB 以太网接口通信

  - Power Debug II 通过 USB 或千兆以太网接口通信


  图 2-13 是 Power Debug USB 2 的图片。当然，三者之间存在明显的成本差异。除此之外，三者都提供相同的功能：


  - 支持广泛的片上调试接口

  - 简便的高级语言和汇编语言调试

  - 与所有编译器接口

  - 快速下载

  - RTOS 感知

  - 与所有主机接口

  - 在逻辑层面上显示内部和外部外设

  - Flash 编程

  - 硬件断点和触发（如果芯片支持）

  - 提供跟踪扩展

  - 多处理器/多核调试

  - 软件跟踪

  - 虚拟分析器


  TRACE32 系统包含一个可配置的多任务调试器，用于在实时操作系统中提供符号调试。它包含一个针对 Microsoft 提供的 Windows CE 实时内核的即用型配置。以下是特定于
  Windows CE 的功能。


  - 实时、非侵入式显示 Windows CE 系统资源

  - 调试 Windows CE 内核

  - 调试 Windows CE 设备驱动程序

  - 同时调试多个 Windows CE 应用程序

  - 动态线程性能测量

  - 针对 Windows CE 的实时跟踪列表评估

  - 用于操作系统数据的 PRACTICE 函数

  - 与 Windows CE 相关的下拉菜单


  *图 2-13. Power Debug USB 2*


  #### 如何准备您的 Trace 工具


  准备 TRACE32-ICD 环境意味着您需要连接目标设备硬件，并安装和准备您的 TRACE32 PowerView 软件工具。图 2-14 展示了如何通过在线调试器模块将目标设备连接到开发工作站。


  调试电缆是微处理器专用的，因此不可互换。


  使用安装程序安装 ICD（在线调试器）软件。安装完成后，您需要创建特定的命令批处理文件，因为这样可以避免每次从头开始配置会话。TRACE32 使用自己的命令语言来执行批处理任务。TRACE32
