  `XXX_Read` 函数从由打开上下文标识的设备读取数据。根据驱动程序所暴露的设备能力，此函数可能是必需的，也可能不是。请注意，该函数是三个支持异步 I/O
  请求的入口点之一。这是 Windows Embedded Compact 7 中引入的新功能，并通过一个新的输入参数（即一个 I/O 数据包的句柄）来实现。示例请参见代码清单
