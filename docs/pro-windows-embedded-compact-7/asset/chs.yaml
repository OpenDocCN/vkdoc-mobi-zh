  **第三章**


  ****首先设计你的设备驱动程序！**


  我知道大多数读者此时已经觉得指尖发痒，只想马上开始敲击键盘来实现一个设备驱动程序。与应用程序不同，设备驱动程序是相当直接的软件单元，那么为什么不直奔主题呢？我对这个合理问题的回答有两个方面；它可以消除代价高昂的错误并节省时间。消除错误是因为它迫使您研究和理解硬件。为您的设计选择正确的模型。规划设备驱动程序结构；仔细考虑设备驱动程序将如何访问内存。仔细考虑并规划设备驱动程序的中断处理。通过避免临时开发，您可以节省时间，并且即使使用像
  `设备驱动程序向导` 这样的第三方工具来更高效地生成快速启动设备驱动程序框架，您为设计收集的信息也会有所帮助。本章旨在强调您在规划和设计设备驱动程序时*应该考虑*的要点。


