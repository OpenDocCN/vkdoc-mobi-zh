  \n第 11 章 调试设备驱动程序\n\n*图 11-14. 已连接设备上的活动设备驱动程序列表*\n\n**实现说明：** 虽然可以开发原生的设备端远程工具，但用于创建远程工具项目的\
  \ Visual Studio 2008 向导仅支持过时的 SDK。因此，您需要调整设备端项目属性，才能构建可执行文件。请注意，您需要添加与设备处理器相对应的\
  \ `rtfhlp10.lib`，该库位于 `<安装磁盘>\\Program Files (x86)\\Microsoft Remote Framework Tools\\\
  1.10\\lib\\wce700` 路径下。另请注意，此路径适用于 64 位桌面系统。\n\n### 事后调试与 Dr. Watson\n\n人非圣贤，产品亦非完美。设备驱动程序开发者也不例外。开发周期从设计作为设备驱动程序的硬件和软件开始，到实现、调试和测试。一旦周期完成，产品便发布并投入使用。然而，不可预见的问题时有发生。为了智能地解决这些问题，事后诊断和调试方法应运而生。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 调试设备驱动程序\n\nWindows\
  \ Embedded Compact 为此提供了一套工具，用于捕获程序崩溃时机器的关键状态信息，并允许用户将收集到的信息报告给 OEM 厂商和 Microsoft。\n\
  \n标准错误报告包含崩溃时的有用信息，包括：\n\n- 堆栈详细信息\n- 系统信息\n- 已加载模块的列表\n- 异常类型\n- 全局和局部变量\n\n崩溃信息被压缩到\
  \ CAB 文件中，并在用户同意后发送到 Microsoft Watson 网站。\n\n#### 错误报告生成器\n\n错误报告生成器是负责使用注册表中配置的选项创建转储文件的组件。\n\
  \n要生成错误报告转储文件，必须预留至少 128 KB 的内存。OAL 开发者通过设置名为 `dwNKDrWatsonSize` 的变量来初始化需要预留的内存大小。这通常在\
  \ `OEMInit` 函数中完成，代码清单 11-12 展示了该函数的示例。\n\n*代码清单 11-12. 初始化错误报告转储文件的内存*\n\n```\n\
  // 为 Watson 转储保留 128kB 内存\ndwNKDrWatsonSize = 0;\nif (dwOEMDrWatsonSize != DR_WATSON_SIZE_NOT_FIXEDUP)\n\
  {\n    dwNKDrWatsonSize = dwOEMDrWatsonSize;\n}\n```\n\n内核将使用此大小在主内存末尾预留一个内存块。必须设置\
  \ Sysgen 变量 `SYSGEN_WATSON_DMPGEN`，以将错误报告生成器包含在映像中。\n\n`[HKLM\\System\\ErrorReporting\\\
  DumpSettings]` 注册表项保存了用于生成错误报告的注册表值。代码清单 11-13 是此类注册表设置的示例。\n\n*代码清单 11-13. 特定操作系统设计的错误报告注册表设置*\n\
  \n```\n;---------------------------- 开始 WATSON ----------------------\n;\n; @CESYSGEN\
  \ IF WCESHELLFE_MODULES_DWXFER\n;\n[HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\ErrorReporting]\n\
  \"Dll\"=\"DwXfer.dll\"\n\"FriendlyName\" = \"转储文件传输\"\n\"PollInterval\"=dword:493E0\n\
  ; @CESYSGEN IF WCESHELLFE_MODULES_DDXPROBE\n; @CESYSGEN ELSE\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 调试设备驱动程序\n\n```\n\"PollPriority256\"=dword:F9\n```\n\n```\n\n\n; @CESYSGEN\
  \ ENDIF WCESHELLFE_MODULES_DDXPROBE`\n\n`\"Index\"=dword:1`\n\n`\"Order\"=dword:0`\n\
  \n`\"Flags\"=dword:2`\n\n`[HKEY_LOCAL_MACHINE\\System\\ErrorReporting\\DumpSettings]`\n\
  \n`\"DumpDirectory\"=\"\\\\Windows\\\\DumpFiles\"`\n\n`\"ExtraFilesDirectory\"=\"\
  \\\\Windows\\\\ExtraDumpFiles\"`\n\n`\"CabDirectory\"=\"\\\\Windows\\\\DumpFiles\\\
  \\CabFiles\"`\n\n`\"UploadClient\"=\"\\\\Windows\\\\Dw.exe\"`\n\n`\"MaxDiskUsage\"\
  =dword:80000`\n\n`\"DumpEnabled\"= dword:1`\n\n`\"DumpType\"= dword:2`\n\n`;`\n\n\
  `; @CESYSGEN ENDIF WCESHELLFE_MODULES_DWXFER`\n\n`; @CESYSGEN IF WCESHELLFE_MODULES_DDXPROBE`\n\
  \n`; @CESYSGEN ELSE`\n\n`[HKEY_LOCAL_MACHINE\\System\\ErrorReporting\\DDxSettings]`\n\
  \n`\"DDxEnabled\"=dword:0`\n\n`;`\n\n`; @CESYSGEN ENDIF WCESHELLFE_MODULES_DDXPROBE`\n\
  \n`;`\n\n`;---------------------------- WATSON 结束 ------------------------`\n\n\
  错误报告传输驱动程序会将注册表设置值传输到前述预留内存中。然后，错误报告生成器从内存中检索这些设置，以便生成适当的转储文件。这些设置告知错误报告生成器在何处生成转储文件以及要创建何种类型的转储文件；在本例中，它指的是系统转储，并且使用的最大磁盘空间是预留内存大小的四倍。\n\
  \n在开发操作系统设计时，开发人员会设置要生成的故障转储类型，请注意清单 11-10 中注册表设置的`DumpType`键的值。每种转储类型都遵循相同的文件格式，其中三种类型可以生成：\n\
  \n- 上下文转储，4 KB 到 64 KB\n  - 关于崩溃系统的信息\n  - 引发崩溃的异常\n  - 出错线程的上下文记录\n  - 模块列表，仅限于拥有进程的出错线程\n\
  \  - 线程列表，仅限于拥有进程的出错线程\n  - 出错线程的调用堆栈\n  - 出错线程指令指针上下各 64 字节的内存\n  - 出错线程的堆栈内存转储，截断至\
  \ 64 KB 限制内\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n- 系统转储，64 KB\
  \ 到若干 MB\n  - 上下文转储中的所有信息\n  - 所有线程的调用栈和上下文记录\n  - 整个设备的完整模块、进程和线程列表\n  - 出错线程指令指针上下各\
  \ 2048 字节的内存\n  - 崩溃发生时正在运行的进程的全局变量\n\n- 完整转储，包括所有物理内存外加至少 64 KB\n  - 上下文转储中的所有信息\n\
  \  - 所有已使用内存的完整转储\n\n#### 错误报告传输驱动程序\n\n错误报告传输驱动程序将注册表值（错误报告生成器所需）从注册表移动到预留内存块，并将生成的文件从预留内存移动到持久化文件中。\n\
  \n将转储文件传输到持久化存储后，错误报告传输驱动程序会启动注册表中指定的报告上传客户端。\n\n必须设置系统生成变量 `SYSGEN_WATSON_XFER`，以将错误报告传输驱动程序包含在镜像中。`[HKLM\\\
  Drivers\\BuiltIn\\ErrorReporting]` 注册表键保存了错误报告传输驱动程序的注册表值。清单 11-10 展示了此类注册表设置的示例，其中传输轮询的时间间隔设置为\
  \ 5 分钟，轮询优先级设置为 249。\n\n#### 错误报告控制面板\n\n错误报告控制面板允许基于显示设备的用户通过控制面板小程序配置转储文件生成的选项。用户可以使用的选项包括：\n\
  \n- 启用/禁用错误报告——在基于显示设备上，错误报告默认启用。在无头设备上，错误报告默认禁用。\n- 控制分配给转储文件的存储空间量——控制面板对话框包含一组单选按钮，允许用户选择用于存储转储文件的存储空间大小，如图\
  \ 11-15 所示。\n- 启用用户通知对话框\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ![](img/index-235_1.png)\n\n*图 11-15. 基于显示设备的错误报告控制面板小程序*\n\n必须设置系统生成变量 `SYSGEN_WATSON_CTLPNL`，以将错误报告控制面板包含在镜像中。`[HKLM\\\
  System\\ErrorReporting\\DumpSettings]` 注册表键和 `[HKLM\\System\\ErrorReporting\\UploadSettings]`\
  \ 注册表键中包含的注册表设置被错误报告控制面板用来设置控制面板对话框中的初始值。\n\n#### 报告上传客户端\n\n上传客户端负责将生成并创建的转储文件上传到\
  \ `watson.microsoft.com` 错误报告网站。然而，也可以将此文件上传到另一个网站——但这涉及代码更改，例如更改 `FValidBucketResponseURL`\
  \ 函数，使其验证一个不同于上述提及并在 `(_PUBLICROOT)\\WCESHELLFE\\OAK\\WATSON\\DWUI\\DWUIDLGS.CPP`\
  \ 中实现的网站。\n\n您可能还想查看另一个文件 `(_PUBLICROOT)\\COMMON\\OAK\\INC\\DWPUBLIC.H`。在这里，您可以为您的服务器定义一个有效的响应服务器\
  \ (`VALID_RESPONSE_SERVER`)，当然，您还需要创建一个能够获取存储桶参数、将小型转储文件分组到存储桶中并响应上传客户端的上传网站。尽管这一切都是可行的，但可能不值得费此周折。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### 小型转储与存储桶\n\n小型转储是由 Dr.\
  \ Watson 在设备上生成的转储文件，包含崩溃应用程序的最重要部分。它之所以被称为“小型”，是因为它只包含识别和分析崩溃应用程序所需的内容。存储桶代表一个唯一的错误或问题，并标识导致该错误的组件。存储桶化帮助上传服务器组织上传的小型转储文件。所有这些都意味着描述同一问题的小型转储文件被分组在一起，称为一个存储桶。\n\
  \n`DMPFILEINFO` 结构包含将小型转储文件分组到存储桶所需的所有信息：\n\n```\n// 包含转储文件相关信息的结构\ntypedef struct\
  \ tagDMPFILEINFO\n{\n    WORD wBucketParams; // 正在使用的存储桶参数数量\n    LPWSTR rgwzBucketParams[MAX_BUCKETPARAMS];\
  \ // 通用模式的存储桶参数\n    LPWSTR pwzQueryString; // 额外的查询字符串\n    LPWSTR pwzAppName;\
  \ // 在 UI 中显示的名称\n    LPWSTR pwzFilesToKeep; // 要包含在日志中但不删除的文件\n    LPWSTR pwzFilesToDelete;\
  \ // 要包含在日志中但在完成时删除的文件\n    BOOL fGenericParams; // 为 True 表示存储桶参数是通用参数\n} DMPFILEINFO,\
  \ *PDMPFILEINFO;\n```\n\n### 章节总结\n\n调试过程是设备驱动程序开发周期中最耗时甚至可能是最重要的方面，任何软件也是如此。Platform\
  \ Builder 提供了一系列对调试过程非常有价值的工具。尽管如此，所有这些调试工具都是软件工具。从内核调试器和目标控制（同时也是调用调试扩展的主机）开始。Platform\
  \ Builder 提供了一个名为 `CeDebugX` 的全面调试扩展 DLL，以帮助高效诊断问题。\n\n然而，有时软件调试工具是不够的，尤其是当硬件与正在调试的软件相关时。这需要硬件辅助调试，而现代处理器在芯片上支持这一点。像\
  \ Lauterbach 的 TRACE32 ICD 这样的工具提供了一个接口和 IDE 来帮助开发人员。它提供芯片上的信息和实时跟踪能力。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 使用 CTK 开发测试代码\n\n\n\n"
- "# 使用 CTK 开发测试代码\n\n测试是发布任何产品（软件或硬件）之前开发周期的最后阶段。测试的目的是确保成品具有最高质量。在二十一世纪，当对高质量软件的依赖影响到我们生活的几乎每个方面时，高质量的软件产品是必不可少的。开发人员似乎对这一过程嗤之以鼻，而质量保证人员往往被视为次于设计师和编码人员。然而，ISO\
  \ 软件开发标准迫使软件供应商和原始设备制造商重视起来，并实施严格的测试以保证质量。\n\n### 本章内容\n\n- Windows Embedded Compact\
  \ 测试工具包\n- 设计测试\n- TUX 测试框架\n- 查看结果\n- 性能测试\n\n### Windows Embedded Compact 测试工具包\n\
  \n随 `Platform Builder 7` 提供的 `Windows Embedded Compact 测试工具包` 使开发人员和质量保证工程师能够测试\
  \ Windows Embedded Compact 设备的设备驱动程序及相关硬件的功能和性能是否失败。`CTK` 提供的功能可以反馈被测设备驱动程序功能成功或失败的信息，并提供对\
  \ `BSP` 的验证。\n\n#### 概述\n\n与之前的工具 `Windows Embedded CE 测试工具包` (`CETK`) 相比，`Windows\
  \ Embedded Compact 测试工具包` 在用户界面和整体功能集方面都做出了显著改进。`CTK` 是一个新的应用程序，具有以下主要功能：\n\n- 改进的用户界面\n\
  - 能够将用户选择的测试用例分组到测试过程中\n- 改进的测试结果查看器允许您按测试过程存储和查看测试结果\n- 连接到设备时，检测测试所需的*外设和驱动程序*\n\
  - 与新的 `Graph Tool` 集成，以绘制性能测试结果图表\n- 用户可以向 `CTK` 添加自定义的基于 `TUX` 测试框架（`TUX`）的测试\n\
  - 支持 `x86`、`MIPSII`、`MIPSII_FP`、`ARMv5`、`ARMv6`、`ARMv7` 处理器\n\n#### 用户界面\n\n图形用户界面与\
  \ `Visual Studio` 的 GUI 相似。它有一个用于基本入门选项的`“起始页”`选项卡。右上角是`“测试用例资源管理器”`窗口，包含三个选项卡：\n\
  \n- `“测试用例资源管理器”`选项卡以树状视图显示主测试目录。它默认包含 Windows Embedded 测试目录。您可以添加自己的自定义测试用例。将来可能会添加其他目录。\n\
  - `“测试过程模板视图”`选项卡显示用户创建和内置的测试过程模板。\n- `“连接视图”`选项卡显示 `CTK` 所连接的设备。\n\n右下角的`“属性”`窗口类似于\
  \ `Visual Studio` 中的`“属性”`窗口。它显示当前选定的测试用例、测试过程、模板或连接的属性。左下角的`“连接输出”`窗口显示来自 `CTK`\
  \ 以及正在运行的测试用例的调试消息。图 12-1 显示了未建立连接时打开的 `CTK`。\n\n此外，菜单和工具栏沿袭了 Windows GUI 应用程序的传统。它们直观且易于操作，并带有提示工具栏按钮含义的工具提示。\n\
  \n`Windows Embedded CTK` 引入了测试过程的概念，即一个测试集合，在设备上执行，其结果可以查看和保存。测试过程中的测试可以一次性全部运行，也可以选择性地运行。\n\
  \n![CTK GUI](img/index-239_1.jpg)\n\n*图 12-1. CTK 图形用户界面*\n\n##### CTK 使用的术语\n\n\
  - `TestCatalog` - 与特定产品关联的测试集合\n- `TestCategory` - `TestCatalog` 内测试的逻辑分组，通常基于特定的技术领域\n\
  - `TestCase` - 在设备/桌面上执行以获得通过/失败结果的测试\n- `TestCaseRun` - 在设备/桌面上执行测试用例的一个实例\n- `TestPass`\
  \ - 在设备上执行且其结果可查看和保存的测试集合\n- `TestPassTemplate` - 用作创建在设备上执行的 `TestPass` 模板的测试集合\n\
  \n### 创建测试过程\n\n在创建测试过程之前，您必须创建一个作为测试过程基础的模板。本节说明如何创建测试过程模板以及如何从此模板创建测试过程。\n\n####\
  \ 创建测试过程模板\n\n启动`“测试管理器”`最简单的方法是单击起始页上的“创建自定义测试过程模板”选项。`“测试管理器”`是用于管理测试用例的创建、编辑和删除的工具。\n\
  \n图 12-2 显示了`“测试管理器”`对话框和一个准备命名的新模板。\n\n![单击“新建”按钮后的测试管理器](img/index-240_1.jpg)\n\
  \n*图 12-2. 单击“新建”按钮后的测试管理器*\n\n#### 创建测试用例\n\n创建测试用例就是将您为测试设备驱动程序而开发的 `TUX` 测试 DLL\
  \ 关联起来。要将测试用例绑定到测试过程，您必须将此测试用例绑定到您已创建的测试过程模板。使用刚刚创建的测试过程模板 `DemoTest`，选择它并切换到“测试用例信息”选项卡。\n\
  \n在“Windows Embedded 测试目录”中创建一个新类别。在本例中，我沿用了 `Demo` 主题并将其命名为 `DemoCat`。在“测试用例信息”选项卡中，单击“新建”按钮并设置新的测试用例。图\
  \ 12-3 展示了此过程。\n\n![生成新的测试类别和测试用例](img/index-241_1.jpg)\n\n*图 12-3. 生成新的测试类别和测试用例*\n\
  \n您实际将 `TUX` 测试 DLL 连接到测试用例的步骤是选择支持的架构。图 12-4 显示了这个新创建的测试用例，它被命名为 `DemoDrvrAsynIOTest`，属于\
  \ `DemoCat` 类别，在这种情况下是完全自动化的，并使用 `TUX` 测试框架。一旦您尝试选择支持的架构，它需要架构特定的文件。在这种情况下，它是一个基于\
  \ `x86` 架构的设备，因此请注意，主二进制文件是 `TUX` 测试 DLL `Demodrvrtest.dll`，它位于：\n\n`WINCEROOT\\\
  OSDesigns\\DemoOSDesign\\DemoOSDesign\\RelDir\\DemoBSP_x86_Debug`\n\n当然，如果您要开发一个与\
  \ CPU 无关并将其放置在 `PUBLIC` 树下的设备驱动程序，您将创建一个特定的文件夹层次结构，其中包含一组位于 CPU 特定文件夹下的、依赖于 CPU\
  \ 的 `TUX` 测试 DLL，并为您测试的每个 CPU 架构引用这些 DLL。\n\n![创建新的测试用例并链接架构特定的 TUX 测试 DLL 文件](img/index-242_1.jpg)\n\
  \n*图 12-4. 创建新的测试用例并链接架构特定的 TUX 测试 DLL 文件*\n\n#### 从模板创建测试过程\n\n此时，您有了一个新的测试 `DemoDrvrAsynIOTest`，它包含在新的测试类别\
  \ `DemoCat` 中。这使您可以赋予测试过程模板 `DemoTest` 意义。切换回“测试过程模板”选项卡，并通过（选择测试用例并单击“添加”按钮）将新创建的测试用例添加到\
  \ `DemoTest` 过程模板中。您实际上可以使用此过程为测试过程添加来自`“测试用例资源管理器”`的任意多个测试用例。\n\n![将测试用例添加到测试过程](img/index-243_1.jpg)\n\
  \n*图 12-5. 将测试用例添加到测试过程*\n\n\n\n#### 为什么使用测试通行模板？\n\n为何要费心创建测试通行模板？主要是为了高效管理测试会话、控制测试时间以及日志文件的大小。在描述的示例中，测试仅限于设备驱动程序的异步\
  \ IO 支持。这表明你可以仅为单个设备驱动程序创建一次测试通行。这有助于缩短测试时间，而无需运行目录中的所有测试，并且最重要的是，如你在`Listing 12-2`中所见，日志文件的大小是可管理的。在`Figure\
  \ 12-6`中，你可以看到仅显示“DemoTest”通行的测试通行界面。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-244_1.jpg)\n\n**图 12-6.** *运行 DemoTest 通行*\n\n### 设计测试\n\n设计测试听起来有些夸张，但实际上比听起来要简单得多。测试设备驱动程序的目的在于确保其健壮性，并且在接收到错误输入时不会崩溃。\n\
  \n由于不可能测试所有可能的输入，因此需要识别测试对象中最薄弱的环节，并提供测试流程以最佳评估其脆弱性。\n\n质量保证和测试有一套需要衡量的既定指标体系。这些指标需要被鉴定合格才能通过测试。嵌入式设备的驱动程序需要的质量指标相对较少，因为嵌入式设备不同于通用计算机，特别是嵌入式设备驱动程序，不需要针对可安装性、可用性和文档等情形进行测试。嵌入式设备驱动程序需要测试的是可靠性和性能。\n\
  \n可靠性和性能都源于设备驱动程序的功能。在测试设备驱动程序之前，你需要完全明确设备驱动程序的功能。设备驱动程序的设计需求是一个很好的起点。\n\n那么什么是质量指标？我们首先来定义指标。指标是一种可验证的度量标准，可以用定量或定性术语表述。它根据事物相对于标准的执行方式来衡量性能。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n下面的例子将以一种非常简化的方式说明这一切的含义。在这个例子中，有一个非常简单的设备驱动程序，它支持异步\
  \ I/O 写入请求。测试应检查该驱动程序是否提供了它应该提供的功能，即异步 I/O 写入请求。测试被设计用于打开设备驱动程序，并使用设备`IOCTL`码请求一个写入操作。然后，如果对`DeviceIoControl`的调用立即返回，并且之后提供了\
  \ I/O 完成指示，则测试应返回通过结果。否则，应返回失败结果。\n\n除了功能测试之外，还添加了一项性能测试，它将完成 I/O 请求所需的时间与一个参考滴答计数进行比较。如果时间等于或小于参考滴答计数，则性能测试通过；否则失败。\n\
  \n### TUX 测试框架\n\nTUX 测试框架是一个设备端的客户端可执行程序，它加载以动态链接库形式实现的设备端测试，并且可以在设备上以独立模式运行，或者由之前描述的\
  \ CTK 服务器触发执行。`Tux.exe`是一个与体系结构相关的设备端可执行测试引擎，通过核心连接与开发工作站 CTK 测试服务器进行通信。这是一种典型的客户端/服务器架构，具有许多优点，包括将\
  \ GUI 与测试引擎分离到独立的地址空间中，以及一个占用空间小的设备端测试引擎。\n\n#### 实现一个 TUX 测试 DLL\n\n测试在动态链接库测试模块中实现，这些模块被加载到测试引擎中，并提供两个函数原型。`ShellProc`函数负责处理测试引擎与测试模块之间的通信。这个函数通常无需修改，因为确实没有必要修改它。第二个函数是实现测试本身的函数，它有一个必须遵守的特定原型：\n\
  \n```\nTESTPROCAPI TestProc(UINT uMsg, TPPARAM tpParam, LPFUNCTION_TABLE_ENTRY lpFTE)\n\
  ```\n\n你可以根据设计在一个模块中实现任意多个测试功能。Platform Builder 提供了一个应用程序向导，用于创建一个 TUX 测试 DLL 的骨架实现，这可以作为你测试模块的快速入门实现。设备驱动程序向导提供了类似的功能，但它会重命名模块名称并自定义初始的\
  \ TUX 函数表。`Figure 12-7`展示了设备驱动程序向导的 CTK 支持面板。\n\n测试的实现实际上类似于为你开发的应用程序实现，该应用程序打开设备驱动程序并请求驱动程序执行一个操作。`Listing\
  \ 12-1`中的例子就是如此。被测试的设备驱动程序提供了对异步写入请求的支持，就像第 7 章中的例子一样。测试函数代码与第 7 章中描述的示例演示程序非常相似。`TestProc`函数简单地调用另一个实现测试代码的函数，并返回一个布尔值指示成功或失败，使用\
  \ Kato 记录结果，并将测试状态返回给 CTK。\n\n**列表 12-1.** *测试过程的实现 (test.cpp)*\n\n```cpp\n#include\
  \ \"main.h\"\n#include \"globals.h\"\n#include \"..\\SDK\\DemodrvrSDK.h\"\n\nHANDLE\
