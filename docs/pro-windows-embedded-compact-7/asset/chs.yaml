  \ 写入请求时返回通过结果。将测试扩展为测量此请求的持续时间，并将其与特定的参考滴答计数进行比较，即为测试者提供了性能测试。\n\n### 添加第二个测试过程\n\
  \n向 `Demodrvrtest` TUX 测试 DLL 添加第二个测试过程，意味着在代码中添加了第二个测试过程。清单 12-3 展示了如何修改 `test.cpp`\
