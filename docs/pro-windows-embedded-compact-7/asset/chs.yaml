  ;\n\nstatic BOOL g_fPostInit;\n```\n\n### `OEMIoControl`：必需函数\n\n`OEMIoControl`\
  \ 提供通用的 I/O 控制码（IOCTL），用于 OEM 提供的信息。\n\n`OEMIoControl` 由平台/通用库提供，因此我们不应在 BSP 中实现它。\n\
  \n---\n\n### `g_oalIoCtlTable`：必需数组\n\n平台/通用实现要求我们定义此变量，描述我们支持的 IOCTL。\n\n```c\n\
  const OAL_IOCTL_HANDLER g_oalIoCtlTable[] = {\n    { IOCTL_HAL_REQUEST_SYSINTR,\
  \ 0, OALIoCtlHalRequestSysIntr},\n    { IOCTL_HAL_RELEASE_SYSINTR, 0, OALIoCtlHalReleaseSysIntr\
  \ },\n    { IOCTL_HAL_REQUEST_IRQ, 0, OALIoCtlHalRequestIrq},\n    { IOCTL_HAL_DDK_CALL,\
  \ 0, OALIoCtlHalDdkCall},\n    { IOCTL_HAL_DISABLE_WAKE, 0, x86PowerIoctl},\n  \
  \  { IOCTL_HAL_ENABLE_WAKE, 0, x86PowerIoctl},\n    { IOCTL_HAL_GET_WAKE_SOURCE,\
  \ 0, x86PowerIoctl},\n    { IOCTL_HAL_PRESUSPEND, 0, x86PowerIoctl},\n    { IOCTL_HAL_GET_POWER_DISPOSITION,\
  \ 0, x86IoCtlGetPowerDisposition},\n    { IOCTL_HAL_GET_CACHE_INFO, 0, BSPIoCtlHalGetCacheInfo},\n\
  \    { IOCTL_HAL_GET_DEVICEID, 0, OALIoCtlHalGetDeviceId},\n    { IOCTL_HAL_GET_DEVICE_INFO,\
  \ 0, OALIoCtlHalGetDeviceInfo},\n    { IOCTL_HAL_GET_UUID, 0, OALIoCtlHalGetUUID},\n\
  \    { IOCTL_HAL_GET_RANDOM_SEED, 0, OALIoCtlHalGetRandomSeed},\n    { IOCTL_PROCESSOR_INFORMATION,\
  \ 0, x86IoCtlProcessorInfo},\n    { IOCTL_HAL_INIT_RTC, 0, x86IoCtlHalInitRTC},\n\
  \    { IOCTL_HAL_REBOOT, 0, x86IoCtlHalReboot},\n    { IOCTL_HAL_ILTIMING, 0, x86IoCtllTiming},\n\
  \    { IOCTL_HAL_POSTINIT, 0, BSPIoCtlPostInit},\n    { IOCTL_HAL_INITREGISTRY,\
  \ 0, x86IoCtlHalInitRegistry},\n\n    // 必需的终止符\n    { 0, 0, NULL}\n};\n```\n\n\
  ### `BSPIoCtlPostInit`：自定义函数\n\n`IOCTL_HAL_POSTINIT` 由内核调用，在 OAL 中实现，为 OEM 在其他进程启动前提供最后一次执行操作的机会。\n\
  \n此处理程序在此处初始化 RTC 通用库的关键部分。\n\n```c\nBOOL BSPIoCtlPostInit (\n    UINT32 code, VOID\
  \ *lpInBuf, UINT32 nInBufSize,\n    VOID *lpOutBuf, UINT32 nOutBufSize, UINT32 *lpBytesReturned\n\
  )\n{\n    if (lpBytesReturned) {\n        *lpBytesReturned = 0;\n    }\n\n    RTCPostInit();\n\
  \n    g_fPostInit = TRUE;\n\n    return TRUE;\n}\n```\n\n---\n\n### 添加设备特定 IOCTL\n\
  \nDDK 为开发者提供宏 `CTL_CODE`，用于定义系统唯一的 IOCTL。所有开发者都应使用此宏定义 IOCTL，以避免不同开发者定义的值重叠。该宏将四个字段设置到一个\
  \ 32 位值中：\n\n```c\n#define CTL_CODE( DeviceType, Function, Method, Access) ( \\\n\
  \    ((DeviceType) << 16) | ((Access) << 14) | ((Function) << 2) | (Method))\n```\n\
  \n清单 9-4 是一个使用 `CTL_CODE` 为演示设备驱动程序定义 IOCTL 的示例。\n\n**清单 9-4. 定义 IOCTL**\n\n```c\n\
  #ifndef __DEMODRVRSDK_H__\n#define __DEMODRVRSDK_H__\n\n#ifdef __cplusplus\nextern\
  \ \"C\"\n{\n#endif\n\n#include <winioctl.h>\n\n//\n```\n\n\n```c\n// 设备 IO 控制码定义：我们定义\
  \ 2048 为基值，因为 0-2047 保留给微软使用\n//\n#define IOCTLDEVTYPE_DEVICE_DEMODRVR 2048\n/////////////////////////////////////////////////////////////////\n\
  //\n// 特定驱动程序 IO 控制码\n//\n//\n// IOCTL_DEMODRVR_FOO1\n//\n#define IOCTL_DEMODRVR_FOO1\
  \ \\\n    CTL_CODE(IOCTLDEVTYPE_DEVICE_DEMODRVR, 0x100, METHOD_BUFFERED, FILE_ANY_ACCESS)\n\
  \n//\n// IOCTL_DEMODRVR_FOO2\n//\n#define IOCTL_DEMODRVR_FOO2 \\\n    CTL_CODE(IOCTLDEVTYPE_DEVICE_DEMODRVR,\
  \ 0x101, METHOD_BUFFERED, FILE_ANY_ACCESS)\n\n#endif /* __DEMODRVRSDK_H__ */\n```\n\
  \n清单 9-4 中的文件示例由设备驱动程序向导生成，输入所需的`IOCTL`功能代码文本，并选择所需的访问权限，如图 9-1 所示。该头文件与设备驱动程序实现的其他文件分离，以便分发给应用程序开发人员，用于控制特定设备驱动程序的代码中。\n\
  \n*图 9-1. 定义 IOCTL 并将其添加到设备驱动程序定义中*\n\n### 处理设备特定的 IOCTL\n\n假设清单 9-4 中定义的`IOCTL_DEMODRVR_FOO1`处理某些异步\
  \ I/O 操作。实现此功能必须编码在流设备驱动程序的`xxx_IOControl`入口点内。清单 9-5 是由设备驱动程序向导生成的骨架代码；它允许开发人员向代码中添加特定于设备驱动程序的功能，以处理异步\
  \ I/O。\n\n*清单 9-5. xxx_IOControl 入口点的骨架实现*\n\n```c\nBOOL DMO_IOControl(DWORD hOpenContext,\
  \ DWORD dwCode, PBYTE pBufIn,\n    DWORD dwLenIn, PBYTE pBufOut, DWORD dwLenOut,\
  \ PDWORD pdwActualOut, HANDLE hAsyncRef)\n{\n    PDMO_DEVCONTXT pDevContxt = (PDMO_DEVCONTXT)hOpenContext;\n\
  \    BOOL bRet = TRUE;\n    DWORD dwErr = 0;\n\n    switch (dwCode)\n    {\n   \
  \ case IOCTL_DEMODRVR_FOO1:\n        // 如果需要则进入临界区，否则删除\n        // EnterCriticalSection(\n\
  \        // &pDevContxt->CriticalSection);\n        // 添加实现代码\n        bRet = Foo1(hAsyncRef,\
  \ pDevContxt);\n\n        if (!bRet)\n        {\n            // 处理错误\n        }\n\
  \n        // LeaveCriticalSection(\n        // &pDevContxt->CriticalSection);\n\
  \        break;\n\n    ...\n    ...\n    ...\n\n    default:\n        break;\n \
  \   }\n    return bRet;\n}\n```\n\n清单 9-5 中加粗并带下划线的代码行实际提供了所需功能。`Foo1`函数是一个内部函数，如清单\
  \ 9-6 所示。然而，您也可以直接将此函数中包含的代码插入到 IOCTL 的 case 处理中。但是，此`IOControl`入口点可能会变得难以跟踪和维护。\n\
  \n*清单 9-6. Foo1 的示例实现*\n\n```c\nBOOL Foo1(HANDLE _hAsyncRef, PDMO_DEVCONTXT _pDevContxt)\n\
  {\n    HANDLE hAsyncIO = NULL;\n\n    if (_hAsyncRef)\n    {\n        hAsyncIO =\
  \ CreateAsyncIoHandle(\n            hAsyncRef, (LPVOID*)pBufIn, 0);\n    }\n\n \
  \   CeOpenCallerBuffer(\n        (PVOID*)(&g_AsyncParams.pBufIn),\n        (PVOID)pBufIn,\n\
  \        dwLenIn, ARG_O_PTR, TRUE);\n\n    EnterCriticalSection(&_pDevContxt->CriticalSection);\n\
  \    g_AsyncParams.hAsyncIO = hAsyncIO;\n    g_AsyncParams.dwInLen = dwLenIn;\n\
  \    LeaveCriticalSection(&_pDevContxt->CriticalSection);\n\n    g_hAsyncThread\
  \ = CreateThread(NULL, 163840,\n        (LPTHREAD_START_ROUTINE)AsyncThread,\n \
  \       (LPVOID)&g_AsyncParams,\n        CREATE_SUSPENDED | STACK_SIZE_PARAM_IS_A_RESERVATION,\
  \ NULL);\n\n    if (g_hAsyncThread == NULL)\n    {\n        DEBUGMSG(ZONE_IOCTL,\n\
  \            (_T(\"DMO! AsyncThread: Failed to create thread\\r\\n\")));\n     \
  \   return FALSE;\n    }\n\n    ResumeThread(g_hAsyncThread);\n    return TRUE;\n\
  }\n```\n\n### 电源管理支持\n\n一个使用 IOCTL 提供自定义设备控制的好例子是支持电源管理的设备驱动程序处理的电源管理 I/O 控制。电源管理支持由特定\
  \ IOCTL 提供，电源管理器调用这些 IOCTL 来检索设备特定功能的信息——`IOCTL_POWER_CAPABILITIES`。电源管理器调用`IOCTL_POWER_GET`来检索设备电源状态。电源管理器调用`IOCTL_POWER_SET`来请求将设备电源状态从一种状态更改为另一种状态。早期版本的\
  \ Windows CE 还有一个 IOCTL，在 Windows Embedded Compact 7 中已弃用——`IOCTL_POWER_QUERY`。清单\
  \ 9-7 是前三个电源管理 IOCTL 的典型实现。\n\n*清单 9-7. 电源管理 IOCTL 实现*\n\n```c\ncase IOCTL_POWER_CAPABILITIES:\n\
  \    // 向电源管理器报告此信息。\n    if (pBufOut != NULL &&\n        dwLenOut >= sizeof(POWER_CAPABILITIES)\
  \ &&\n        pdwActualOut != NULL)\n    {\n        __try {\n            PPOWER_CAPABILITIES\
  \ ppc =\n                (PPOWER_CAPABILITIES) pBufOut;\n            memset(ppc,\
  \ 0, sizeof(POWER_CAPABILITIES));\n            ppc->DeviceDx = 0x11; // 支持 D0, D4\n\
  \            ppc->WakeFromDx = 0x00; // 无唤醒能力\n            ppc->InrushDx = 0x00;\
  \ // 无浪涌要求\n            ppc->Power[D0] = 600; // 0.6W\n            ppc->Power[D1]\
  \ = (DWORD) PwrDeviceUnspecified;\n            ppc->Power[D2] = (DWORD) PwrDeviceUnspecified;\n\
  \            ppc->Power[D3] = (DWORD) PwrDeviceUnspecified;\n            ppc->Power[D4]\
  \ = 0;\n            ppc->Latency[D0] = 0;\n            ppc->Latency[D1] = (DWORD)\
  \ PwrDeviceUnspecified;\n            ppc->Latency[D2] = (DWORD) PwrDeviceUnspecified;\n\
  \            ppc->Latency[D3] = (DWORD) PwrDeviceUnspecified;\n            ppc->Latency[D4]\
  \ = 0;\n            ppc->Flags = 0;\n            *pdwActualOut = sizeof(POWER_CAPABILITIES);\n\
  \            dwErr = ERROR_SUCCESS;\n        }\n        __except(EXCEPTION_EXECUTE_HANDLER)\n\
  \        {\n            DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!Exception\
  \ in ioctl.\\r\\n\")));\n        }\n    }\n    break;\n\ncase IOCTL_POWER_SET:\n\
  \    if (pBufOut != NULL &&\n        dwLenOut >= sizeof(POWER_CAPABILITIES) &&\n\
  \        pdwActualOut != NULL)\n    {\n        EnterCriticalSection(&pDevContxt->CriticalSection);\n\
  \        __try {\n            CEDEVICE_POWER_STATE NewDx =\n                *(PCEDEVICE_POWER_STATE)pBufOut;\n\
  \            if(VALID_DX(NewDx))\n            {\n                *(PCEDEVICE_POWER_STATE)\
  \ pBufOut = NewDx;\n                *pdwActualOut = sizeof(CEDEVICE_POWER_STATE);\n\
  \                pDevContxt->psPowerState = NewDx;\n                dwErr = ERROR_SUCCESS;\n\
  \            }\n            DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!IOCTL_POWER_SET\
  \ %u %s passing back %u\\r\\n\"),\n                NewDx, dwErr == ERROR_SUCCESS\
  \ ? _T(\"succeeded\") :\n                _T(\"failed\"), pDevContxt->psPowerState));\n\
  \        }\n        __except(EXCEPTION_EXECUTE_HANDLER)\n        {\n           \
  \ DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!Exception in ioctl.\\r\\n\")));\n\
  \        }\n        LeaveCriticalSection(&pDevContxt->CriticalSection);\n    }\n\
  \    break;\n\ncase IOCTL_POWER_GET:\n    if (pBufOut != NULL &&\n        dwLenOut\
  \ >= sizeof(POWER_CAPABILITIES) &&\n        pdwActualOut != NULL)\n    {\n     \
  \   EnterCriticalSection(&pDevContxt->CriticalSection);\n        __try {\n     \
  \       CEDEVICE_POWER_STATE NewDx =\n                *(PCEDEVICE_POWER_STATE) pBufOut;\n\
  \            *(PCEDEVICE_POWER_STATE) pBufOut =\n                pDevContxt->psPowerState;\n\
  \            *pdwActualOut = sizeof(CEDEVICE_POWER_STATE);\n            dwErr =\
  \ ERROR_SUCCESS;\n            DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!IOCTL_POWER_GET\
  \ %s passing back %u\\r\\n\"),\n                dwErr == ERROR_SUCCESS ? _T(\"succeeded\"\
  ) :\n                _T(\"failed\"), pDevContxt->psPowerState));\n        }\n  \
  \      __except(EXCEPTION_EXECUTE_HANDLER)\n        {\n            DEBUGMSG(ZONE_IOCTL,\n\
  \                (_T(\"DMO!Exception in ioctl.\\r\\n\")));\n        }\n        LeaveCriticalSection(&pDevContxt->CriticalSection);\n\
  \    }\n    break;\n```\n\n### 章节总结\n\n\nI/O 控制是一种允许用户模式应用程序向内核模式设备驱动程序发送自定义请求的机制。用户模式设备驱动程序也是如此。设备驱动程序的实现决定了它可以处理哪些\
  \ IOCTL。微软为各种设备驱动程序类别预定义了 IOCTL，因此如果您正在编写例如存储磁盘设备驱动程序这样的驱动程序，检查这些预定义的 IOCTL 是一个好习惯，因为您必须实现这些预定义的\
  \ IOCTL。您可以为您正在实现的设备驱动程序创建自定义的 I/O 控制代码，但请记住提供一个定义这些自定义 IOCTL 的头文件，以便应用程序开发者能够编译使用这些代码的程序。\n\
  \n`Device Manager` 公开了一个特殊函数 `DeviceIoControl`，供应用程序调用并传递 IOCTL 代码以及缓冲区，这些缓冲区可用于输入或输出，或者如果自定义\
  \ IOCTL 需要，也可以同时用于输入和输出。在 Windows Embedded Compact 7 中，此函数接受一个 `OVERLAPPED` 结构，以便您的设备驱动程序实现可以为这类\
  \ I/O 请求提供异步 I/O 支持。\n\n---\n\n## 第 10 章：网络驱动程序接口规范与网络设备驱动程序\n\n网络驱动程序接口规范（NDIS）是网络驱动程序架构的规范，它允许诸如\
  \ TCP/IP、Native ATM、IPX 和 NetBEUI 等传输协议与底层网络适配器进行通信。该规范的实现是一个用于开发网络设备驱动程序的应用程序框架。网络设备驱动程序为基于\
  \ Windows Embedded Compact 7 的设备提供对局域网和广域网的访问。基于 Windows Embedded Compact 的通信架构支持使用网络驱动程序接口规范（NDIS）框架实现的网络设备驱动程序，以及远程\
  \ NDIS（RNDIS）、NDISWAN、令牌环、Wi-Fi、IrDA 和蓝牙等技术。\n\n本章内容：\n- OSI 模型\n- NDIS 作为编程框架\n\
  - NDIS 微端口驱动程序\n\n#### 概述\n\n网络允许大量计算机通过某种物理通信线路相互传输数据，当然我也听说过无线通信。显然这会带来一些障碍，因为大量数据会造成通信拥堵。一台计算机如何筛选数据，使其只接收发送给它的数据呢？这些问题大多通过分组交换网络解决了，即把数据分成小块，称为数据包，然后单独发送。\n\
  \n历史上，最大的进展发生在 20 世纪 80 年代初期。由美国国防部高级研究计划局（ARPA）资助，ARPANET 不断发展，而更广为人知的 ARPA 互联网协议\
  \ TCP/IP 已成为标准。图 10-1 显示了 TCP/IP 协议流程，其中网络接口层负责与物理网络进行帧交互，互联网层将数据包封装成互联网数据报并处理路由。传输层提供计算机之间的通信会话，应用层提供\
  \ API 供应用程序连接到传输层。\n\n*图 10-1. TCP/IP*\n\n这仍然给顶层和底层带来了沉重的实现负担，这促使了 ISO 开放系统互连（OSI）模型的形成（与\
  \ TCP/IP 的对比见图 10-2）。\n\n*图 10-2. 与 TCP/IP 相关的 OSI 模型*\n\nOSI 模型是 Windows Embedded\
  \ Compact 7 网络架构的基础。\n\n### NDIS\n\n网络驱动程序接口规范（NDIS）框架将网络硬件从网络驱动程序中抽象出来。NDIS 还规定了分层网络驱动程序之间的标准接口，从而将管理硬件的底层驱动程序从上层驱动程序（如网络传输协议）中抽象出来。NDIS\
  \ 维护着网络驱动程序的状态信息和参数，包括指向函数的指针、句柄、用于链接的参数块以及各种系统值。图 10-3 展示了 NDIS 框架与使用它的网络驱动程序之间的关系。\n\
  \n*图 10-3. NDIS 框架与网络驱动程序*\n\n### 网络设备驱动程序的层次\n\n在所有 Windows 操作系统版本中，网络驱动程序实现了紧邻物理通信介质之上的四个层次，如图\
  \ 10-4 所示。\n\n*图 10-4. 与 OSI 模型相关的网络设备驱动程序*\n\n#### 物理层\n\n此层负责在物理介质上管理和接收、发送未经处理的原始比特流。物理层由网络接口卡（NIC）、其收发器以及\
  \ NIC 所连接的介质实现。\n\n#### 数据链路层\n\n数据链路层由两个子层组成：\n\n- **LLC** - 逻辑链路控制\n  - LLC 子层提供数据帧从一个节点到另一个节点的无差错传输。\n\
  - **MAC** - 介质访问控制\n  - MAC 子层管理对物理层的访问，检查帧错误，并管理接收帧的地址识别。\n\n#### 网络层\n\n此层根据以下因素确定数据应采用的物理路径：\n\
  - 网络状况\n- 服务优先级\n\n其他因素包括路由、流量控制、帧碎片整理与重组、逻辑地址到物理地址的映射以及使用计费。\n\n#### 传输层\n\n此层确保消息按顺序、无差错地传送，且无丢失或重复。\n\
  \n### NDIS 微端口驱动程序\n\n微端口驱动程序实现数据链路层的下边缘。它处理管理网络适配器所需的硬件特定操作。物理 NIC 类型会影响微端口驱动程序适配器。\n\
  \n- **总线主控 DMA NIC** - 微端口驱动程序通常支持多数据包发送和接收。\n- **从属 DMA NIC** - 微端口驱动程序使用系统 DMA\
  \ 控制器来管理数据包数据与网络之间的传输。\n- **编程 I/O NIC** - 微端口驱动程序使用 NDIS 函数逐字节地将传出帧移动到设备寄存器，或执行其他类型的操作，然后使设备发送数据。如今这种网卡已经非常罕见，您也极不可能实现此类驱动程序。\n\
  - **板载共享内存 NIC** - 微端口驱动程序必须将 NIC 的共享内存映射到主机内存，然后将传出数据包复制到 NIC 内存。它将传入帧从 NIC 内存复制到上层协议驱动程序提供的缓冲区中。\n\
  \nNDIS 微端口 NIC 驱动程序通过 NDIS 框架（参见图 10-3）与其 NIC 和更高级别的驱动程序通信。NDIS 框架函数导出一整套函数，通常以\
  \ `Ndis` 为前缀，这些函数封装了微端口需要调用的所有操作系统函数。反过来，NDIS 微端口驱动程序必须导出一系列入口点，NDIS 框架会调用这些入口点，用于其自身目的，或代表更高级别的驱动程序访问微端口。\n\
  \n微端口驱动程序维护有关其能力和状态的信息，以及它所控制的 NIC 的信息。对象标识符（OID）是系统定义的常量，用于标识每种信息类型。\n\n#### NDIS\
  \ 微端口驱动程序函数\n\n\n\n"
- "# 微型端口驱动程序入口点\n\n这是一组大多数由微型端口驱动程序要求实现的入口点，以便 NDIS 框架能够调用它们来执行框架本身或代表 NDIS 协议驱动程序所需的各种任务。\n\
  \n微型端口驱动程序必须实现这些入口点以确保稳定运行。\n\n##### `DriverEntry`\n\n这是 NDIS 设备驱动程序（`NDIS.DLL`）被设备管理器加载并初始化后，由\
  \ NDIS 调用的第一个函数。该函数至少必须设置微型端口驱动程序的特征结构 `NDIS_MINIPORT_DRIVER_CHARACTERISTICS`，然后通过调用\
  \ `NdisMRegisterMiniportDriver` 向 NDIS 注册驱动程序。实现 `DriverEntry` 的示例如清单 10-1 所示。\n\
  \n```\nNDIS_HANDLE g_NdisMiniportDriverHandle = NULL;\nNDIS_HANDLE g_MiniportDriverContext\
  \ = NULL;\n\nNDIS_STATUS DriverEntry(IN PDRIVER_OBJECT DriverObject, IN PUNICODE_STRING\
  \ RegistryPath)\n{\n    NDIS_STATUS Status;\n    NDIS_MINIPORT_DRIVER_CHARACTERISTICS\
  \ MPChar;\n\n    // 填写微型端口特征结构\n    NdisZeroMemory(&MPChar, sizeof(MPChar));\n\n\
  \    MPChar.Header.Type = NDIS_OBJECT_TYPE_MINIPORT_DRIVER_CHARACTERISTICS;\n  \
  \  MPChar.Header.Size = sizeof(NDIS_MINIPORT_DRIVER_CHARACTERISTICS);\n    MPChar.Header.Revision\
  \ = NDIS_MINIPORT_DRIVER_CHARACTERISTICS_REVISION_1;\n\n    MPChar.MajorNdisVersion\
