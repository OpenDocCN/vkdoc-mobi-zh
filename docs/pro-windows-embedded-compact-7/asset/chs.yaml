  \ (_T(\"UMD!not enough memory\\r\\n\")));\n        return dwRet;\n    }\n\n    //\
  \ Open active device registry key to retrieve activation\n    // info\n    DEBUGMSG(ZONE_INIT,\
  \ (_T(\"UMD!Starting UMD_Init\\r\\n\")));\n    if (hConfig = OpenDeviceKey(pContext))\n\
