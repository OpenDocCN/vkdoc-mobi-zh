- "# Windows Embedded Compact 7 内存架构  \n\nWindows CE 6.0 和 Windows Embedded Compact\
  \ 7 采用一种虚拟内存模型，该模型将地址空间划分为内核和用户模式进程的独立区域（见图 1-4）。这种虚拟内存模型主要为内核以及一个进程免受其他进程干扰提供保护。这一点与通用操作系统并无不同。然而，与通用操作系统不同的是，Windows\
  \ CE 6.0 和 Windows Embedded Compact 7 的虚拟内存模型不提供用于交换内存页面的后备存储。  \n\n图 1-4 展示了内核和应用程序的两个独立虚拟内存区域及其起始地址的总体视图。\
  \  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\n![](img/index-25_1.png)\
  \  \n\n第一章 ■ Windows Embedded Compact 设备驱动程序开发基础  \n\n*图 1-4. Windows CE 6.0 和 Windows\
  \ Embedded Compact 7 的虚拟内存模型*  \n\n## 内核空间虚拟内存  \n\nWindows CE 将内核虚拟内存空间划分为多个独立区域。图\
  \ 1-5 展示了内核虚拟内存空间的结构。Windows Embedded Compact 7 的新增功能是能够寻址超过 512 MB、高达 3 GB 的物理\
  \ RAM。但是，这需要 OEM 通过在 OAL 中实现此支持来启用。OEM 必须在`OEMRamTable`结构内描述扩展 RAM 区域，该结构定义了任何硬件平台可用的额外物理\
  \ RAM。OEM 需要提供`OEMRamTable`函数来访问`OEMRamTable`结构。  \n\n为了使`OEMRamTable`对内核和内核独立传输层\
  \ (KITL) 可用，OEM 必须将`OEMGLOBAL`的`pfnGetOEMRamTable`成员设置为指向`OEMGetOEMRamTable`函数。\
  \  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\n![](img/index-26_1.png)\
  \  \n\n第一章 ■ Windows Embedded Compact 设备驱动程序开发基础  \n\n*图 1-5. 内核空间虚拟内存结构*  \n\n\
  表 1-1 总结了内核空间虚拟内存中的区域并描述了它们的用途。  \n\n*表 1-1. 内核空间虚拟内存区域*  \n\n| 起始地址 | 结束地址 | 名称\
