  \ 消息*\n\n### 内核调试器\n\n内核调试器是平台生成器的一部分。如果为操作系统映像构建启用了内核调试，则内核调试器将作为一项服务使用核心连接基础架构运行。为了使内核调试器能够执行调试存根，`KdStub`\
  \ 必须包含在运行时映像中。请注意图 11-4 中的设备状态窗格（第 4 行），显示 `KdStub` 正在运行。\n\n要启用内核调试，您只需从“项目”菜单中打开操作系统设计属性页对话框，选择“生成选项”节点，将“启用内核调试器”字段设置为“是”。如果您愿意，在此同时也可以启用\
  \ KITL。使用内核调试器与使用 WinDbg 或集成在 Visual Studio 中的桌面调试器非常相似，因此我将省略如何使用内核调试器的操作细节，因为这些可以在产品文档中找到。图\
  \ 11-6 展示了 Demodrvr 驱动程序的一个调试会话，在第 70 行设置了一个断点，由棕色（至少在我看来是棕色）的圆点指示，黄色的箭头显示了下一条要执行的语句。右侧的“监视”窗格显示了\
  \ `pDevContext` 结构的内容，而左侧的“调用堆栈”窗格显示了包含下一条要执行语句的函数，以及导致到达此点的函数调用堆栈。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-212_1.jpg)\n\n*图 11-5. 配置内核调试器支持*\n\n> **注意：** 发布版本警告：您不应该在发布版本映像中启用内核调试器。如果您这样做，`KdStub`\
  \ 将等待内核调试器连接，因为运行发布版本的设备通常不会连接到运行内核调试器的开发工作站，设备将需要很长时间才能启动。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
