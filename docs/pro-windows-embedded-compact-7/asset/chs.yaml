  \ 函数，以停止硬件并释放资源。由于这可能在任意时刻发生，因此应考虑检查是否为意外硬件移除并相应处理。清单 10-3 展示了微端口驱动程序停止函数的一种可能实现示例。\n\
  \n*清单 10-3. MiniportHaltEx 函数实现示例*\n\n```c\nVOID MPHalt(IN NDIS_HANDLE MiniportAdapterContext,\n\
  \            IN NDIS_HALT_ACTION HaltAction)\n{\n    LONG Count;\n\n    PMP_ADAPTER\
  \ Adapter = (PMP_ADAPTER)MiniportAdapterContext;\n\n    if (HaltAction == NdisHaltDeviceSurpriseRemoved)\n\
  \    {\n        // 例如，您可能需要确保停止操作不会依赖硬件产生中断来完成挂起操作。\n    }\n\n    ASSERT(Adapter->AdapterState\
  \ == NicPaused);\n    Adapter->Flags |= F_MP_ADAPTER_HALT_IN_PROGRESS;\n\n    //\
  \ 调用关闭处理程序以禁用中断并关闭硬件\n    MPShutdown(MiniportAdapterContext, NdisShutdownPowerOff);\n\
  \n    // 注销中断，使中断不再被处理\n    if ((Adapter->Flags & F_MP_ADAPTER_INTERRUPT_IN_USE)\
  \ != 0)\n    {\n        NdisMDeregisterInterruptEx(Adapter->NdisInterruptHandle);\n\
  \        Adapter->Flags &= ~ F_MP_ADAPTER_INTERRUPT_IN_USE;\n    }\n\n    NdisCancelTimerObject(Adapter->LinkDetectionTimerHandle);\n\
  \n    // 递减在 MPInitialize 中递增的引用计数\n}\n```\n\n\n"
- "# `Count = NdisInterlockedDecrement(&(Adapter)->RefCount);`\n\n```c\n// 非零的引用计数可能意味着存在\n\
  // 未完成的异步共享内存分配，或者\n// MPHandleInterrupt 尚未完成\nif (Count)\n{\n    while (TRUE)\n\
  \    {\n        if (NdisWaitEvent(&Adapter->ExitEvent, 2000))\n        {\n     \
  \       break;\n        }\n    }\n}\n\n// 重置 PHY 收发器芯片。\nResetPHYceiver(Adapter);\n\
  \n// 释放整个适配器对象，包括共享内存\n// 结构。\nMpFreeAdapter(Adapter);\n}\n```\n\n##### `MiniportDriverUnload`\n\
  \n该函数的实现需要在系统完成驱动卸载操作前释放资源，如清单 10-4 所示，其逻辑极其简单。\n\n*清单 10-4. `MiniportDriverUnload`\
  \ 函数实现示例*\n\n```c\nVOID MPUnload(IN PDRIVER_OBJECT DriverObject)\n{\n    // 注销微端口驱动程序\n\
  \    NdisMDeregisterMiniportDriver(g_NdisMiniportDriverHandle);\n}\n```\n\n#####\
  \ `MiniportPause`\n\n该函数被调用来停止通过微端口适配器的网络数据流。它主要设置适配器的状态，释放并完成 `SendWaitQueue` 中待处理的发送数据包。随后递减接收计数，如果接收计数为零，则将适配器状态设置为已暂停并返回成功；否则返回\
  \ `STATUS_PENDING`，以通知框架仍有接收数据存在。\n\n清单 10-5 是一个暂停微端口适配器的示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ 网络驱动程序接口规范与网络设备驱动程序\n\n*清单 10-5. `MiniportPause` 函数实现示例*\n\n```c\nNDIS_STATUS\
  \ MPPause(IN NDIS_HANDLE MiniportAdapterContext,\n                    IN PNDIS_MINIPORT_PAUSE_PARAMETERS\
  \ MiniportPauseParameters)\n{\n    PMP_ADAPTER Adapter = (PMP_ADAPTER)MiniportAdapterContext;\n\
  \    NDIS_STATUS Status;\n    LONG Count;\n\n    ASSERT(Adapter->AdapterState ==\
  \ NicRunning);\n\n    NdisAcquireSpinLock(&Adapter->RcvLock);\n    Adapter->AdapterState\
  \ = NicPausing;\n    NdisReleaseSpinLock(&Adapter->RcvLock);\n\n    // 完成所有待处理的发送\n\
  \    NdisAcquireSpinLock(&Adapter->SendLock);\n    MpFreeQueuedSendNetBufferLists(Adapter);\n\
  \    NdisReleaseSpinLock(&Adapter->SendLock);\n\n    NdisAcquireSpinLock(&Adapter->RcvLock);\n\
  \    Count = --(Adapter->RcvRefCount);\n    if (Count == 0)\n    {\n        Adapter->AdapterState\
  \ = NicPaused;\n        Status = NDIS_STATUS_SUCCESS;\n    }\n    else\n    {\n\
  \        Status = NDIS_STATUS_PENDING;\n    }\n    NdisReleaseSpinLock(&Adapter->RcvLock);\n\
  \n    return Status;\n}\n```\n\n##### `MiniportRestart`\n\n该函数被调用来重新启动已暂停的微端口适配器。此函数非常简单，主要处理一些重启属性，递增接收计数并将状态设置为运行中。清单\
  \ 10-6 是一个重启已暂停微端口适配器的示例。\n\n*清单 10-6. `MiniportRestart` 函数实现示例*\n\n```c\nNDIS_STATUS\
