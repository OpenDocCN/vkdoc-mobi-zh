  \ info attributes.\n}\nNdisAcquireSpinLock(&Adapter->RcvLock);\nAdapter->RcvRefCount++;\n\
  Adapter->AdapterState = NicRunning;\nNdisReleaseSpinLock(&Adapter->RcvLock);\nreturn\
  \ NDIS_STATUS_SUCCESS;\n}\n```\n\n`MiniportOidRequest`\n\n该函数被调用，用于处理向无连接微型端口驱动程序查询或设置信息的\
  \ OID（NDIS 对象标识符）请求。唯一需要注意点是：处理 OID 请求时，应确保没有待处理请求，且适配器未被移除或重置。否则可以正常处理该请求。清单 10-7\
  \ 展示了如何处理 OID 请求的示例。请注意，`NDIS_REQUEST_TYPE` 枚举中关于请求类型的帮助信息，因为其中不少类型已被标记为过时。\n\n\
  *清单 10-7. MiniportOidRequest 函数实现示例*\n\n```c\nNDIS_STATUS MPOidRequest(IN NDIS_HANDLE\
