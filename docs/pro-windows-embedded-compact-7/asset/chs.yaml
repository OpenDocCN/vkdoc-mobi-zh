  \ long Amount, DWORD Type);\n    BOOL FilterCancelIo(DWORD dwOpenCont, HANDLE hAsyncHandle);\n\
  };\n```\n\n\n\n"
- "# 图 7-10. 使用 Windows CE 设备驱动程序向导创建筛选器驱动程序\n\n清单 7-17 展示了 `Init` 入口点的一个简化基本实现，该入口点是筛选器驱动程序公开的唯一函数。它所做的一切就是创建\
  \ `FIRFilter` 类的一个新实例，保存指向下一个筛选器（实际上是指向流设备驱动程序的一个指针）的指针，并返回指向筛选器驱动程序对象的指针。\n\n**清单\
  \ 7-17. 筛选器驱动程序的示例 Init 入口点。**\n\n```cpp\nextern \"C\" PDRIVER_FILTER FIRFilterInit(LPCTSTR\
  \ lpcFilterRegistryPath, LPCTSTR\nlpcDriverRegistryPath, PDRIVER_FILTER pNextFilter)\n\
  {\n    FIRFilter* pFIRFilter = NULL;\n    InitializeCriticalSection(&g_CriticalSection);\n\
