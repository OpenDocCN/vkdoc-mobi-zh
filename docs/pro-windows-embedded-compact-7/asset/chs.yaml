- "# 设备驱动注册表设置\n\n本章全部关于`Windows Embedded Compact 7`注册表及其与设备驱动的关联。\n\n首先对注册表及其在系统中的作用进行一般性讨论，然后深入讨论所有与设备驱动相关的注册表主题，包括：操作系统如何加载设备驱动；设备驱动的命名约定（以便应用程序可以通过文件系统与设备驱动交互）；哪些键是设备驱动开发者必须设置的，哪些是可选的；如何为用户模式设备驱动设置注册表项；以及如何在实际操作中将所有内容整合在一起。\n\
  \n本章内容：\n\n- 了解`Windows CE`操作系统如何加载设备驱动\n- 了解设备驱动的命名约定\n- 为特定设备驱动的注册表项创建必要的文件\n\n\
  ### 注册表概述\n\n`Windows Embedded Compact 7`注册表存储有关应用程序、驱动、用户偏好和其他配置设置的信息。注册表采用键和值的层次结构系统组织。这种层次结构与文件夹层次结构类似，一个键可以包含值项或其他键。值项以名称/值对的形式存储。在每个文件夹树层次结构的顶部是根，它使用一个众所周知的常量值或`HKEY`来标识。`Windows\
  \ CE`支持四个根键。\n\n与设备驱动开发者最相关的是`HKEY_LOCAL_MACHINE`根键，硬件和驱动配置数据位于此处。`Windows Embedded\
  \ Compact 7`注册表的结构与其他版本的 Windows 以及以前版本的`Windows CE`中的注册表类似。\n\n##### 注册表类型\n\n\
  `Windows Embedded Compact 7`支持两种不同的注册表类型：`基于 RAM 的注册表`和`基于配置单元的注册表`。`OEM`可以为其设备确定注册表类型，这对应用程序或用户而言是透明的。\n\
  \nA. Kcholi *P*, *ro Windows Embedded Compact 7* © Abraham Kcholi 2011\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n`Windows Embedded Compact 7`默认实现`基于配置单元的注册表`。应用程序不知道注册表类型，但它会影响持久性、启动顺序、速度、目标设备上的内存使用以及用户配置文件的行为。所有文件系统配置中都存在用户配置文件支持。\n\
  \n### 对象存储\n\n`Windows Embedded Compact 7`中的对象存储为应用程序和相关数据提供持久存储，即使主电源丢失，只要有备用电源，数据也能保留。一个或多个内存存储芯片（通常是**非易失性**`RAM`芯片）构成了物理对象存储。对象存储由三种类型的持久存储组成：\n\
  \n- 文件系统\n- 数据库\n- 系统注册表\n\n\n\n#### 存储机制\n\n对象存储中的数据存储机制基于事务处理。如果在向对象存储写入数据时电源中断，Windows\
  \ Embedded Compact 7 将确保存储不会损坏。它通过两种方式实现：要么在系统重启时完成操作，要么回滚到中断前最后一个已知的良好状态。对于系统文件（包括注册表设置），这意味着如果没有预定义保存当前设置的备份系统，则可以从\
  \ ROM 重新加载初始设置。\n\n#### 基于 RAM 的注册表\n\n基于 RAM 的注册表将所有注册表数据存储在对象存储中。对于配备电池供电 RAM\
  \ 的设备而言，这种方式在速度和占用空间方面非常高效。关机后无法为 RAM 供电的设备，必须在关机时备份注册表，并在恢复供电时还原注册表。基于 RAM 的注册表适用于经常进行热启动但极少或从未进行冷启动的设备。\n\
  \n#### 基于配置单元的注册表\n\n基于配置单元的注册表将所有注册表数据存储在称为配置单元的文件中，这些文件可以存放在任何文件系统上。因此，不再需要在关机/开机时进行备份和还原操作，从而加快了冷启动过程。基于配置单元的注册表分为两个配置单元：系统配置单元（包含所有系统数据）和用户配置单元（包含与特定用户相关的所有数据）。多用户系统将包含多个用户配置单元。用户配置单元会在登录时加载，在注销时卸载。基于配置单元的注册表适用于经常冷启动的设备，但对热启动没有影响。它同样适用于需要支持多用户的设备。\n\
  \n每个配置单元被视为一个整体单元，并以单个文件的形式进行保存和还原。系统配置单元包含不与任何特定用户相关的系统设置。OEM 选择系统配置单元的文件名和位置。系统配置单元文件通常命名为\
  \ `System.hv`，但位置可能有所不同。\n\n---\n\n### 摘要\n\nWindows Embedded Compact 7 注册表在功能结构上与桌面和服务器版\
  \ Windows 操作系统的注册表类似。但出于显而易见的原因，它在体积上更为紧凑。与其他 Windows 操作系统上的注册表实现不同，它支持两种类型：基于 RAM\
  \ 的注册表和基于配置单元的注册表。\n\n### 设备驱动程序文件名\n\n为了让用户模式应用程序与设备驱动程序交互，应用程序需要使用文件系统函数。应用程序首先要做的是获取设备驱动程序实例的句柄。它通过调用\
  \ `CreateFile()` 实现，并使用返回的句柄来调用其他函数，如 `ReadFile()` 或 `WriteFile()`，以及设备管理器函数，如 `DeviceIoControl()`。`CreateFile()`\
  \ 的第一个参数需要一个文件名，这意味着需要一套设备驱动程序的命名约定。该命名约定分为三个设备命名空间：\n\n- 三个字母的前缀，后跟 0 到 9 之间的一个数字，再跟一个冒号。\n\
  - `$device` 挂载点，后跟代表设备的三字母前缀，再跟一个数字。\n- `$bus` 挂载点，后跟总线名称、总线号、设备号和功能号。\n\n#### 设备文件命名空间——前缀与索引\n\
  \n前缀由三个大写字母组成，用于标识哪个设备文件名对应特定的流接口。前缀存储在名为 `Prefix` 的注册表值中，该值位于驱动程序的注册表项内。首先，前缀标识了所有可以访问该流接口驱动程序的设备文件名。其次，前缀告诉操作系统在流接口\
  \ DLL 中应期望哪些入口点文件名。例如，`DMO_Ini`、`DMO_Read` 或 `DMO_IOControl` 等入口点，其中指定的前缀为 `DMO`。索引是前缀后面的一个数字。索引用于区分流接口管理的相似设备。默认情况下，设备管理器逻辑上从\
  \ 1 到 9 进行索引，其中 1 对应于第一个设备文件名。当需要第十个设备文件名时，使用 0 作为索引。例如，通过设备文件名前缀打开设备驱动程序的典型代码应为：\n\
  \n```\nCreateFile(\"DMO1:\", ....\n```\n\n#### 设备文件命名空间——挂载点\n\n有两个挂载点命名空间：`$device`\
  \ 挂载点和 `$bus` 挂载点。这两个命名空间支持超过 10 个具有相同三字母前缀的设备实例。设备管理器使用 `RegisterAFSEx()` 向文件系统注册这些文件命名空间。这使得文件系统能够为设备驱动程序返回句柄。虽然前缀命名空间和设备命名空间返回相同的句柄，但总线命名空间返回的是总线、功能和设备的句柄，这意味着操作系统可能以不同的方式处理访问。\n\
  \n使用设备命名空间打开设备驱动程序实例时，设备名称是一个路径字符串，由反斜杠、`$device` 空间标识符、反斜杠以及设备前缀后跟索引组成。例如：\n\n\
  ```\nCreateFile(_T(\"\\\\$device\\\\DMO1)\", ....\n```\n\n使用总线命名空间打开设备驱动程序实例时，设备名称是一个路径字符串，由反斜杠、`$bus`\
  \ 空间标识符、反斜杠，后跟总线类型名称、下划线总线号、下划线设备号和下划线功能号组成。\n\n```\nCreateFile(_T(\"\\\\$bus\\\\\
  PCI_0_3_0)\", ....\n```\n\n### 加载顺序\n\n由于设备驱动程序实际上帮助操作系统与底层硬件平台交互，因此在系统启动过程中尽快加载它们至关重要。负责加载和管理流设备驱动程序的操作系统组件是设备管理器。如果\
  \ GWES 是操作系统的一部分，则它负责加载本机设备驱动程序，例如显示设备驱动程序、键盘驱动程序等。系统可能被设计为无头系统，从而省去 GWES 组件。然而，在任何有意义的操作系统设计中，设备管理器都是必需的。\n\
  \n#### 流设备驱动程序的加载顺序\n\n\n\n##### 操作系统启动时\n\n当系统硬件由 `OEMInit` 函数初始化完成后，操作系统启动，文件系统开始运行，`设备管理器`\
  \ 通过加载并执行位于 `HKLM\\Drivers\\BuiltIn` 根目录下的 `BusEnum.dll` 来枚举该注册表项下的条目。总线枚举器启动扫描注册表的过程，以查找\
  \ `HKLM\\Drivers\\BuiltIn` 子项下需要加载的其他总线和设备。总线枚举器根据 `Order` 注册表子项，检查传递给它的键下的第一级键。它对找到的每个子项调用\
  \ `ActivateDeviceEx`。每个子项可以包含由 `ActivateDeviceEx` 或已加载驱动程序在其初始化例程中解释的任何值。此外，驱动程序可以有一个介于\
  \ 0 到 255 之间的 `Order` 值，该值不必唯一。`Order` 值最小的驱动程序将首先被加载。如果没有 `Order` 值，则该驱动程序将在具有已定义\
  \ `Order` 值的驱动程序之后被加载。总线枚举器在加载设备驱动程序时，会逐个遍历 `HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn`\
  \ 的第一级键，为每个键初始化一个设备驱动程序。它加载由 `DLL` 值指定的 DLL，然后在 `HKEY_LOCAL_MACHINE\\Drivers\\Active`\
  \ 下为驱动程序创建一个子项。接着，它调用驱动程序的 `XXX_Init` 入口点，并传入一个包含指向该流接口驱动程序活动键的注册表路径的字符串。`XXX_Init`\
  \ 例程应使用返回的字符串调用 `RegOpenKeyEx` 以获取该键的句柄，然后调用 `RegQueryValueEx` 查找键值，该值包含与 `设备管理器`\
  \ 最初在 `HKLM\\Drivers\\BuiltIn` 下遇到的注册表键对应的字符串。通过读取这些值，设备驱动程序可以初始化 I/O 资源、中断处理程序等。图\
  \ 5-1 可视化地展示了流设备驱动程序的加载顺序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-88_1.png)\n\n## 第 5 章 ■ 设备驱动程序注册表设置\n\n*图 5-1. 流设备驱动程序加载顺序*\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章 ■ 设备驱动程序注册表设置\n\n###\
  \ 设备管理器注册表项\n\n`设备管理器` 使用 `HKLM\\Drivers` 注册表项下的 `Active` 和 `BuiltIn` 子项。`HKLM\\\
  Drivers\\Active` 注册表项包含用于跟踪 `设备管理器` 加载的当前活动驱动程序的子项。\n\n#### 活动注册表项\n\n以下列表显示了 `Active`\
  \ 注册表项中可用的子项：\n\n*   `BusDriver` – 驱动程序的总线名称。\n*   `BusName` - 设备的总线名称。\n*   总线驱动程序为其从属设备添加这些子项。\n\
  *   `DevID` - 由 `设备管理器` 添加的唯一设备标识符。\n*   `FullName` - 由 `设备管理器` 添加的名称，与 `$device`\
  \ 命名空间结合使用。\n*   `Name` - 设备驱动程序的设备文件名。此子项仅存在于指定了前缀的驱动程序中。\n*   `Order` - 总线枚举器根据\
  \ `Order` 值检查键。\n*   `Key` - 设备的注册表路径。\n*   `PnpId` - 即插即用标识符字符串。仅存在于 PC 卡驱动程序中。\n\
  *   `Sckt` - PC 卡的当前插槽和功能对。仅存在于 PC 卡驱动程序中。\n\n### 注册表条目\n\n设备驱动程序的注册表设置对于设备驱动程序的开发至关重要。注册表设置控制\
  \ `设备管理器` 如何加载设备驱动程序，允许开发者在驱动程序依赖于其他驱动程序并需要在其之前加载时，对驱动程序的加载顺序进行排序。注册表设置可以包含有助于初始化过程甚至实例创建的信息。例如，一个特定的自定义子项指示允许的实例数量。请记住，注册表是设备驱动程序包中极其重要的一个方面。\n\
  \n有一系列控制驱动程序加载方式的注册表设置。大多数是可选的，一个是必需的。`设备管理器` 使用几个注册表设置，所有驱动程序都可能用到。设备驱动程序开发者可以创建自定义的注册表条目，这些条目将在驱动程序加载后由其直接引用。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章 ■ 设备驱动程序注册表设置\n\n\
  #### 必需项\n\n唯一绝对必需的注册表子项值是 `DLL` 子项。没有它，`设备管理器` 将无法确定要加载哪个 DLL。此子项包含文件系统中设备驱动程序可执行文件的名称。\n\
  \n`\"DLL\"=\"Demodriver.DLL\"`\n\n即使严格来说，`Prefix` 子项不是必需的，也应该进行设置。`Prefix` 是一个由三个字符组成的字符串，构成驱动程序的名称。为了拥有基于文件句柄的驱动程序接口，必须存在此值。`Prefix`\
  \ 值必须与流驱动程序入口点中使用的值相同，除非设置了 `DEVFLAGS_NAKEDENTRIES` 标志。\n\n#### 可选项\n\n所有其他子项都是可选的，但某些子项几乎总是应该考虑的，尤其是\
  \ `Order` 子项。`Order` 子项是一个 `DWORD` 值，提供了一种支持加载顺序的机制。驱动程序将按照 `Order` 子项指定的顺序加载。如果此子项不存在，驱动程序将在最后加载。清单\
  \ 5-1 是设备驱动程序向导为演示设备驱动程序生成的注册表条目示例。\n\n*清单 5-1. 示例设备驱动程序的注册表条目*\n\n```\n; DemoDriver\
  \ 驱动程序\n[HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\Demodriver]\n\"Prefix\"=\"DMO\"\n\
  \"DLL\"=\"Demodriver.DLL\"\n\"SysIntr\"=dword:1A\n\"Irq\"=dword:8\n\"MemBase\"=dword:90001000\n\
  \"MemLen\"=dword:32\n\"Order\"=dword:0\n\"DisplayName\"=\"DemoDriver 驱动程序\"\n\"\
  IsrHandler\"=\"IsrHandler\"\n\"Flags\"=dword:0\n\"IClass\"=\"{A32942B7-920C-486b-B0E6-92A702A99B35}\"\
  \n```\n\n#### 设备驱动程序注册表子项\n\n设备驱动程序开发者可以创建设备驱动程序特定的注册表键。例如，RTL8139 以太网驱动程序的注册表条目中有一个用于早期传输阈值的子项值，该值指定了\
  \ Tx FIFO 中开始传输的阈值水平：`EarlyTxThreshold`。清单 5-2 列出了 RTL8139 注册表条目的一个示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 5 章 ■ 设备驱动程序注册表设置\n\n*清单 5-2. 自定义注册表子项条目示例*\n\n```\n\"Transceiver\"=dword:3\n\
  \"DuplexMode\"=dword:1\n\"EarlyTxThreshold\"=dword:10000\n\"IsrDll\"=\"giisr.dll\"\
  \n\"IsrHandler\"=\"ISRHandler\"\n\"PortIsIO\"=dword:1\n\"PortOffset\"=dword:3E\n\
  \"PortSize\"=dword:2\n\"PortMask\"=dword:C07F\n\"UseMaskReg\"=dword:1\n\"MaskOffset\"\
  =dword:3c\n```\n\n然而，大多数子项都是预设的通用值，如下表所述：\n\n*   `Dll` - 指定驱动程序 DLL 的名称\n*   `Prefix`\
  \ - 指定设备驱动程序的文件名\n*   `Order` - 指定驱动程序的加载顺序\n*   `Index` - 指定设备索引（例如 COMx 中的 x）\n\
  *   `IClass` - 为 PnP 通知系统指定设备类的 GUID\n    *   例如 – 对于电源管理的设备接口，值为 `A32942B7-920C-486b-B0E6-92A702A99B35`\n\
  *   `Flags` - 指定驱动程序的加载标志\n*   `IoBase` - 指定设备使用的 I/O 映射窗口的基址。端口 I/O 必须得到架构的支持，即用于访问\
  \ I/O 端口的特殊 CPU 指令。\n*   `IoLen` - 指定设备所需的每个 I/O 窗口的长度\n*   `MemBase` - 指定设备使用的内存映射窗口的总线相对基址。内存映射\
  \ I/O 将 I/O 寄存器映射到系统内存中的一个区域。\n*   `MemLen` - 指定设备所需的每个内存映射窗口的长度\n*   `IRQ` - 指定设备使用的物理\
  \ IRQ\n*   `SYSINTR` - 指定逻辑中断标识符。\n*   `IsrDll` - 指定包含可安装中断处理程序的 DLL\n\n\n\n"
- "# 排版后的内容\n\n`IsrHandler` - 指定 ISR DLL 中的 ISR 处理程序\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 5 章 ■ 设备驱动程序注册表设置\n\n### 用户模式驱动程序框架注册表设置\n\n用户模式设备驱动程序在实现上与内核模式驱动程序并无不同。毕竟，用户模式设备驱动程序需要执行与内核模式设备驱动程序相同的任务。尽管如此，用户模式设备驱动程序仍受到限制，必须加载到特殊的用户模式宿主中，并借助内核模式反射器来执行其任务。为了让设备管理器在加载驱动程序之前能够判断它是否属于用户模式驱动程序，特定的注册表项必须向设备管理器指明该驱动程序是一个用户模式设备驱动程序。两个子项起了关键作用：告诉设备管理器该驱动程序是用户模式驱动程序的子项是`Flags`子项，其值被赋为\
  \ 10。另一个子项则向设备管理器指明应在哪个用户模式宿主中加载该设备驱动程序，即`UserProcGroup`。如果设置了此子项，设备管理器会将驱动程序的 DLL\
  \ 加载到一个可加载多个驱动程序的用户模式宿主中。否则，设备管理器将在一个独立的用户模式宿主中启动该驱动程序，该宿主唯一的目的就是加载和管理这个特定的设备驱动程序。清单\
  \ 5-3 是一个加载在公共用户模式宿主中的用户模式设备驱动程序的示例。\n\n*清单 5-3. 用户模式设备驱动程序注册表项示例*\n\n```\n; SIP\n\
  [HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\SIP]\n\"Prefix\"=\"SIP\"\n\"Dll\"=\"softkb.DLL\"\
  \n\"Order\"=dword:1\n\"Index\"=dword:0\n;Flags==10 表示 DEVFLAGS_LOAD_AS_USERPROC\n\
  \"Flags\"=dword:10\n\"UserProcGroup\"=dword:3 ; // 默认为组 3\n```\n\n### 为设备驱动程序创建注册表项\n\
  \n为你的设备驱动程序创建注册表设置项并不复杂，但需要提前做一些思考。你必须考虑哪些信息是已知的。例如，关于 I/O 映射和地址、中断处理信息等。这些知识有助于在注册表设置中配置这些信息，并省去在设备驱动程序代码中设置它们的代码。这能使驱动程序更加健壮且易于维护，更少的代码意味着更少的潜在错误，而将设置放在外部文件中则意味着更容易进行变更或更新维护。\n\
  \n#### 创建注册表设置文件\n\n操作系统的注册表文件是二进制文件，由构建系统将具有`.REG`文件扩展名的简单结构化文本文件转换而成。`.REG`文件的结构能够反映其键层次结构所在的根键。例如，\n\
  \n```\n[HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\DemoDriver]\n```\n\n将`DemoDriver`注册表设置置于`HKEY_LOCAL_MACHINE`根键下的内置设备驱动程序中。\n\
  \n要创建一个注册表参数文件，例如针对名为`DemoDriver`的设备驱动程序，你需要创建一个简单的文本文件，并将其命名为`\"DEMODRIVER.REG\"\
  `。接下来，你可以使用任何文本编辑器来编辑它并创建你的注册表参数文件，或者你也可以使用 Visual Studio 内置的注册表编辑器。图 5-2 显示了在打开名为`\"\
  DEMODRIVER.REG\"`的空文本文件后，Visual Studio 中注册表编辑器的界面。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-93_1.jpg)\n\n## 第 5 章 ■ 设备驱动程序注册表设置\n\n#### 使用注册表编辑器\n\n使用它很简单，你可以通过\
  \ IDE 添加键和值。只需右键单击根键（本例中为`HKLM`），然后依次添加`Drivers`键、`BuiltIn`键等等。图 5-3 显示了生成的`DemoDriver`注册表设置，清单\
  \ 5-4 显示了生成的文本文件。使用此编辑器的一个注意事项是：生成的文本文件会为每个值重复键层次结构，因此可能需要对其进行“清理”以获得更简洁、更清晰易读的外观，清单\
  \ 5-5 展示了最终结果。\n\n*图 5-2. 在 Visual Studio 中使用注册表编辑器*\n\n*清单 5-4. 生成的源代码*\n\n```\n\
  [HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\DemoDriver]\n\"Dll\"=\"demodriver.dll\"\n\
  ```\n\n\n\n`[HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\DemoDriver]`\n\n`\"Prefix\"=\"\
  DMO\"`\n\n`[HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\DemoDriver]`\n\n`\"Order\"=dword:0`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-94_1.jpg)\n\n\
  ## 第 5 章 ■ 设备驱动程序注册表设置\n\n*清单 5-5. “清理过的”源代码*\n\n`[HKEY_LOCAL_MACHINE\\Drivers\\\
  BuiltIn\\DemoDriver]`\n\n`\"Dll\"=\"demodriver.dll\"`\n\n`\"Prefix\"=\"DMO\"`\n\n\
  `\"Order\"=dword:0`\n\n*图 5-3. 将“DemoDriver”添加到注册表*\n\n### 本章小结\n\n本章讨论了设备驱动程序的注册表设置。阐述了创建这些值的重要性，以避免硬编码设备驱动程序信息，例如\
  \ I/O 寄存器的基地址或逻辑中断标识符。全面的注册表设置能够提供灵活性、可维护性和健壮性。Windows 设备驱动程序向导的功能不仅有助于开发人员快速创建设备驱动程序代码，还能创建注册表设置文件。基本条目示例可参见图\
  \ 5-4。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-95_1.jpg)\n\
  \n## 第 5 章 ■ 设备驱动程序注册表设置\n\n*图 5-4. Windows CE 设备驱动程序向导的注册表参数页面* 在本章中，我们讨论了与注册表相关的主题。特别重要的内容如下：\n\
  \n• 总线枚举器\n\n• 设备管理器\n\n• Active 注册表键\n\n• 设备文件名\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 6 章\n\n## 理解设备驱动程序类型\n\n设备驱动程序类型实际上是一个模糊的术语。Windows Embedded Compact 7 将设备驱动程序视为两种基本类型：本机设备驱动程序和流设备驱动程序。第三种类型（实际上是前两者的结合）被称为混合设备驱动程序。本机驱动程序是一种内置设备驱动程序，在启动时由\
  \ GWES 加载和调用，并公开一组特定于该设备驱动程序类的自定义 API 集合。管理硬件平台内置 IO 设备、由设备管理器管理并公开流接口的设备驱动程序被视为流设备驱动程序。混合设备驱动程序同时向系统其余部分公开自定义用途接口和流接口。\n\
  \n本章内容包括：\n\n• 本机设备驱动程序\n\n• 流设备驱动程序\n\n• 混合设备驱动程序\n\n• 单片式与分层式\n\n• 解释设备接口类\n\n\
  • 如何实现设备接口通知\n\n### 本机设备驱动程序\n\n本机设备驱动程序通常是支持用户输入和输出外围设备的驱动程序，例如键盘、鼠标、触摸屏和显示器外围设备。期望图形窗口和事件子系统（GWES）处理这些设备似乎是合理的。GWES\
  \ 确实直接加载和管理这些设备驱动程序。本机设备驱动程序实现了与其功能目的相关的特定设备驱动程序接口（DDI）函数。本机设备驱动程序的注册表项位于 `HKEY_LOCAL_MACHINE\\\
  HARDWARE\\DEVICEMAP\\` 或 `HKEY_LOCAL_MACHINE\\Drivers\\Display\\` 注册表节点下。\n\nA.\
  \ Kcholi *著*，《*精通 Windows Embedded Compact 7*》\n\n© Abraham Kcholi 2011\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 6 章 ■ 理解设备驱动程序类型\n\n例如：\n\n`[HKEY_LOCAL_MACHINE\\HARDWARE\\DEVICEMAP\\TOUCH]`\n\
  \n`\"DriverName\"=\"touch.dll\"`\n\n`\"MaxCalError\"=dword:10`\n\n#### 流设备驱动程序\n\
  \n流设备驱动程序由设备管理器加载和管理。流设备驱动程序公开一组已定义的函数，以便设备管理器能够代表系统或用户模式应用程序与设备驱动程序交互。用户模式应用程序使用文件系统\
  \ API 访问流设备驱动程序，以打开设备驱动程序的实例并读取和写入设备数据。扩展操作通过设备管理器 API `DeviceIoControl` 访问，该 API\
  \ 可以容纳设备驱动程序允许的自定义操作。流设备驱动程序的注册表项位于 `HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn` 注册表节点下。\n\
  \n\n\n#### 流设备驱动程序\n\n**注意：** 流术语说明：术语`流设备驱动程序`意味着只有流内容由`流设备驱动程序`处理。但这种说法未必准确，因为`块`设备驱动程序（例如存储外设的`设备驱动程序`）也是`流设备驱动程序`。该术语特指由`设备管理器`加载和管理，并公开`流接口`的`设备驱动程序`。\n\
  \n### 混合设备驱动程序\n\n混合设备驱动程序同时公开`流接口`和特定 API。`USB`设备驱动程序便是典型示例，它公开部分`流接口`和`USB`特有\
  \ API。例如：**LIBRARY WAVEDEV**\n\n**导出函数**\n\n`WAV_Init`\n`WAV_Deinit`\n`WAV_Open`\n\
  `WAV_Close`\n`WAV_IOControl`\n`USBInstallDriver`\n`USBDeviceAttach`\n`USBUnInstallDriver`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![ ](img/index-98_1.png)\n\
  \n## 第 6 章：理解设备驱动程序类型\n\n### 单体式与分层式设备驱动程序\n\nWindows Embedded Compact 7 设备驱动程序可以采用单体式或分层式组织结构。`单体式设备驱动程序`基于单一代码块构建，直接向操作系统公开硬件设备的功能。`分层式设备驱动程序`由两层构成：\n\
  \n- `模型设备驱动程序`（MDD）层，即与操作系统交互的上层。\n  - 通过 PDD 层访问其设备。\n  - 实现`设备驱动程序接口`（DDI），这是一组由操作系统组件（如\
  \ GWES 或`设备管理器`）调用的函数。\n- `平台相关驱动程序`（PDD）层，即与底层硬件交互的下层。\n  - 与硬件相关；通常必须针对特定硬件进行定制。\n\
  \  - 将 MDD 层与硬件连接。\n  - 实现`设备驱动程序服务提供程序接口`（DDSI）\n  - 这是一组由 MDD 层调用的函数。\n\n图 6-1\
  \ 展示了分层式设备驱动程序模型与单体式模型之间的对比。\n\n但请注意，单体式设备驱动程序既可以是本机设备驱动程序，也可以是流设备驱动程序，尽管由于空间限制，图中仅描绘了单体式本机设备驱动程序。\n\
  \n**图 6-1.** 单体式与分层式设备驱动程序对比\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 6 章：理解设备驱动程序类型\n\n### 设备接口类\n\n设备驱动程序通过向操作系统公开的`设备接口类`来定义其特征。一个设备驱动程序可以拥有多个设备接口类，也可以没有。问题是，我为什么要在意设备驱动程序属于哪个接口类？基本上我并不在意。然而，如果某个设备驱动程序支持电源管理，你就需要将该驱动程序描述为支持通用电源管理类接口，以便电源管理器能够与该设备驱动程序交互。\n\
  \n但通常情况下，设备驱动程序公开接口类可以让`设备管理器`通知应用程序、服务或其他设备驱动程序该设备接口的出现和消失。\n\n这对于管理`即插即用`设备、`USB`设备或其他可移动介质的设备驱动程序非常重要。对于可挂载的存储设备而言，通知应用程序卷被挂载或卸载也同样重要。\n\
  \n需要接收设备接口出现和消失通知的应用程序、服务或设备驱动程序，必须向`设备管理器`注册才能获得通知。下一节将讨论设备接口通知。\n\n#### 设备接口 GUID\n\
  \n声明接口的头文件通常会定义与该接口关联的`GUID`。列表 6-1 展示了从`Storemgr.h`中提取的块存储设备接口示例。\n\n公开设备接口的方式包括：在注册表中设置`IClass`子项，或在设备驱动程序初始化期间调用`AdvertiseInterface`来发布关联的`GUID`。\n\
  \n**列表 6-1.** 定义块存储设备接口及其关联 GUID\n\n```c\n#define STORAGE_DEVICE_CLASS_BLOCK 0x1\n\
  .................\n.................\n```\n\n\n\n**// {A4E7EDDA-E575-4252-9D6B-4195D48BB865}**\n\
  \n`static const GUID BLOCK_DRIVER_GUID = { 0xa4e7edda, 0xe575, 0x4252, { 0x9d, 0x6b,\
  \ 0x41, 0x95, 0xd4, 0x8b, 0xb8, 0x65 } };`\n\n`#define BLOCK_DRIVER_GUID_STRING\
  \ L\"{A4E7EDDA-E575-4252-9D6B-4195D48BB865}\"`\n\n#### IClass 注册表子项\n\n`IClass`\
  \ 注册表子项通过其关联的 GUID 引用设备接口。清单 6-2 展示了如何公布 `DemoDriver` 支持通用电源管理类接口（`PMCLASS_GENERIC_DEVICE`）这一事实。\n\
  \n*清单 6-2. 将 IClass 子项值设置为 PMCLASS_GENERIC_DEVICE GUID*\n\n```\n; DemoDriver 驱动程序\n\
  [HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\Demodriver]\n\"Prefix\"=\"DMO\"\n\"DLL\"\
  =\"Demodriver.DLL\"\n\"SysIntr\"=dword:1A\n\"Irq\"=dword:8\n\"MemBase\"=dword:90001000\n\
  \"MemLen\"=dword:32\n\"Order\"=dword:0\n\"DisplayName\"=\"DemoDriver 驱动程序\"\n\"\
  IsrHandler\"=\"IsrHandler\"\n\"Flags\"=dword:0\n\"IClass\"=\"{A32942B7-920C-486b-B0E6-92A702A99B35}\"\
  \n```\n\n#### 公布接口\n\n另一种公开设备接口并公布关联 GUID 的方法是在初始化期间调用 `AdvertiseInterface` API。相比于设置\
  \ `IClass` 子项，这是一种不太理想的选择，因为 `IClass` 值会被传递给 `ActivateDeviceEx`，而后者会在设备管理器中分配资源。将\
  \ `AdvertiseInterface` 的 `fAdd` 参数设置为 false 并调用该函数，可公布接口的移除行为，且应在取消初始化设备驱动程序时调用。\n\
  \n设备接口类对于应用程序访问设备驱动程序的功能至关重要。它们通过通知向应用程序指示某个特定接口的存在。\n\n### 设备接口通知\n\n设备管理器的接口通知机制（适用于\
  \ Windows Embedded Compact 7 及更早版本）与桌面端的即插即用事件通知系统相对应。设备管理器会通知用户模式应用程序、服务以及设备驱动程序设备接口的出现与消失。设备管理器使用消息队列来传递这些通知，可以是\
  \ GWES 消息队列，也可以使用点到点消息队列。\n\n当设备管理器成功加载并初始化设备驱动程序时，它会检查设备键中是否存在 `IClass` 值。如果找到有效值，将启动一个线程，通过应用程序通知系统以及广播窗口消息来指示设备变化。图\
  \ 6-2 显示了设置为流接口类的注册表 `IClass` 值。\n\n#### 点到点消息队列通知\n\n应用程序甚至其他设备驱动程序都可以通过向设备管理器注册来接收通知。这包括设置并创建一个点到点消息队列，并通过调用\
  \ `RequestDeviceNotifications` API 将该消息队列的句柄提供给设备管理器，该 API 的实现已从设备管理器移至文件系统。以下代码是一个示例，展示了如何实现向设备管理器请求并接收通知的代码。\n\
  \n在清单 6-3 的示例中，GUID 是一个通用的流接口 GUID，这对于流设备驱动程序来说没有问题；但您只能从消息队列返回的 `DEVDETAIL` 结构中检索到接口名称的第一个字符。在应用程序中进行比较时，这可能会产生歧义；因此，您可能需要生成自己的类接口\
  \ GUID，以便通过验证 GUID 值本身来确保一致性。\n\n*清单 6-3. 通过点到点消息队列接收设备通知的示例代码*\n\n```\n#include\
  \ <pnp.h>\n#include <msgqueue.h>\n……\n……\n……\nGUID guid = DEVCLASS_STREAM_GUID;\
  \ // 或任何相关的设备接口 GUID\n```\n\n\n\n"
