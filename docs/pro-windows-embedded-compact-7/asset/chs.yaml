  \ 函数又如何呢？在此函数中，仅当启用了 `ZONE_OPEN` 区域时才会输出调试消息。如果您想更改在代码中创建的初始调试区域，该怎么办？一种方法是编辑代码，重新构建，并将其放入映像中。这确实是一个耗时且浪费的过程。您可以在调试会话期间使用\
  \ IDE 启动“调试区域”对话框，选择您的设备驱动程序模块，并勾选要启用的调试区域。图 11-2 展示了如何启用 `ZONE_OPEN` 区域。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
