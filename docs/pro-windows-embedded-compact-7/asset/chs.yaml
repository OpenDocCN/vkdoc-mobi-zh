  本章讨论了在开始实现设备驱动程序代码之前应考虑的事项。本书后续章节将讨论如何在各项考量之间做出选择。然而，在实现阶段之前就全面考虑设备驱动程序实现的各个方面，应该能够缩短开发时间，甚至很可能减少潜在的错误和缺陷。


