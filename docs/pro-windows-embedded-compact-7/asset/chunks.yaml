- fmt: "# Stream Device Drivers\n\n**Note:** Stream terminology: The term `stream\
    \ device driver` implies that only stream content is handled by the `stream device\
    \ driver`. This is not necessarily accurate since `block` device drivers such\
    \ as `device drivers` for storage peripherals are `stream device drivers`. The\
    \ term specifies `device drivers` loaded and managed by `Device Manager` and exposing\
    \ the `stream interface`.\n\n## Hybrid Device Drivers\n\nHybrid device drivers\
    \ expose both `stream interface` and a specific API. `USB` device drivers are\
    \ a typical example exposing a partial `stream interface` and a `USB` specific\
    \ API. For example: **LIBRARY WAVEDEV**\n\n**EXPORTS**\n\n`WAV_Init`\n`WAV_Deinit`\n\
    `WAV_Open`\n`WAV_Close`\n`WAV_IOControl`\n`USBInstallDriver`\n`USBDeviceAttach`\n\
    `USBUnInstallDriver`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![\
    \ ](index-98_1.png)\n\n# Chapter 6: Understanding Device Driver Types\n\n## Monolithic\
    \ vs. Layered Device Drivers\n\nWindows Embedded Compact 7 device drivers can\
    \ conform to either a monolithic or layered organizational model. A `monolithic\
    \ device driver` is based on a single piece of code that exposes the hardware\
    \ device's functionality directly to the operating system. A `layered device driver`\
    \ consists of two layers:\n\n- A `model device driver` (MDD) layer, which is the\
    \ upper layer interfacing to the OS.\n  - Accesses its devices through the PDD\
    \ layer.\n  - Implements a `Device Driver Interface` (DDI), a set of functions\
    \ called by the operating system components such as GWES or `Device Manager`.\n\
    - A `platform-dependent driver` (PDD) layer, which is the lower layer interfacing\
    \ to the underlying hardware.\n  - Hardware dependent; typically must be customized\
    \ to specific hardware.\n  - Links the MDD to the hardware.\n  - Implements a\
    \ `Device Driver Service Provider Interface` (DDSI)\n  - A set of functions called\
    \ by the MDD layer.\n\nFigure 6-1 shows a comparison between the layered device\
    \ driver model and the monolithic model.\n\nNote however that monolithic device\
    \ drivers can be either native or stream device drivers even though the figure\
    \ only depicts a native monolithic device driver because of lack of space.\n\n\
    **Figure 6-1.** Monolithic vs. Layered device drivers\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# Chapter 6: Understanding Device Driver Types\n\n## Device Interface Class\n\
    \nDevice drivers are characterized by the `device interface class` they expose\
    \ to operating system. A device driver may have multiple device interface classes,\
    \ or it can have none. Question is, why do I care what interface class does a\
    \ device driver belong to? Basically I don’t. However, if for example a device\
    \ driver supports power management, you want to characterize the driver as supporting\
    \ the generic power management class interface, so that power manager can interface\
    \ with the device driver.\n\nTypically, however exposing an interface class by\
    \ a device driver allows `Device Manager` to notify applications, services, or\
    \ other device drivers the appearance and disappearance of the device interface.\n\
    \nThis is important for device drivers managing `Plug and Play` devices, `USB`\
    \ devices, or other detachable media. It is also important for mountable storage\
    \ device notifying an application of a volume being mounted or dismounted.\n\n\
    Applications, services, or device drivers that need to be notified of the appearance\
    \ and disappearance of device interfaces need to register with `Device Manager`\
    \ in order to be notified. The next section deals with device interface notifications.\n\
    \n## Device Interface GUID\n\nThe header file that declares the interface typically\
    \ defines the `GUID` and to be associated with the interface. An example extracted\
    \ from `Storemgr.h` for a block storage device is listed in listing 6-1.\n\nExposing\
    \ the device interface is performed by publicizing the associated `GUID` by either\
    \ setting the `IClass` subkey in the registry or by calling `AdvertiseInterface`\
    \ during the device driver initialization.\n\n**Listing 6-1.** Defining a block\
    \ storage device interface and the associated GUID\n\n```c\n#define STORAGE_DEVICE_CLASS_BLOCK\
    \ 0x1\n.................\n.................\n```"
