    Physical Data Transactions


    Throughout the preceding examples I used local functions for various hardware
    I/O interfaces abstractly. The miniport functions described provide an upper edge
    interface for upper layer NDIS


    drivers to acquire services from the miniport driver. However the miniport driver
    is still left with its main task of “driving” the actual Network Interface Card
    (NIC). That is reading and writing data and configuration attributes to the hardware
    ports/registers. It still needs to handle memory buffers for the transacted data.


    The NDIS framework provides a lower edge for miniport driver to interface with
    the hardware. It provides a set of functions that a miniport network adapter (NIC)
    driver calls to access I/O ports. These calls provide a standard portable interface
    that supports the various operating systems for NDIS drivers.


    Functions are provided for mapping ports, for claiming I/O resources, and for
    reading from and writing to the mapped and unmapped I/O ports. If you decide to
    implement your own port mapping and resource management the NDIS framework provides
    a set of raw I/O port interface functions such as


    ***NdisRawReadPortXxx*** where Xxx indicates the byte size of the port. However
    these are specific for port I/O


    based architectures.


    For memory mapped I/O architectures the NDIS framework provides a set of functions
    to map the NIC’s registers to the system’s memory ***NdisMMapIoSpace*** to map
    a given physical range of device RAM or registers onto a system-space virtual
    range, and a set of functions such as ***NdisReadRegisterXxx*** where Xxx indicates
    the byte size of the register.


    NDIS Memory Management Helpers


    Considering the performance of the NIC (network interface card) and its miniport
    driver, we have to take into account the bottleneck occurs when moving data between
    the NIC and the memory of the computer. The two most efficient methods for moving
    information from the network interface card into the computer once it has been
    received would be bus master DMA and shared memory. NICs providing bus master
    DMA a controller take charge of the system bus and transfer data from the NIC
    to a memory location, thus reducing the CPU load. In the shared memory option,
    either NICs have their own memory that the system processor can access directly,
    or both the CPU and NIC share a block of system memory that both can directly
    access.


    Shared Memory


    NDIS framework provides the miniport driver developer with a set of functions
    to implement the shared memory scheme. The focal function is ***NdisMAllocateSharedMemory***.
    This function provides both the mapped virtual address range that the driver uses
    to access the shared memory block and the **NDIS_PHYSICAL_ADDRESS** type range
    that the network adapter uses. This function must be called from the


    ***MiniportInitializeEx*** entry point only. The biggest issue with shared memory
    is its size. On the one hand in high network traffic, a miniport driver cannot
    maintain high I/O throughput if it runs low on 182


