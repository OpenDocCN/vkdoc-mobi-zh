- fmt: '# An environment variable contains information about an aspect of the OS design
    and should not to be confused with System Variables, which help filter the selected
    functionality of an OS design. `_DEPTREES`


    which is the environment variable that controls pre-sysgen phase and depicts the
    OS dependency tree. It is used by `cebuild.bat` that performs pre-sysgen build
    and sysgen. It uses `_DEPTREES` environment variable to determine what to build/sysgen.
    You can add your own folder hierarchy to the `DEPTREES`


    environment variable for example this is how the PRIVATE folder is added to the
    `DEPTREES`:


    ```

    :AddDepTree

    if EXIST %_WINCEROOT%\private\%1 set _DEPTREES=%_DEPTREES% %1

    goto :EOF

    ```


    There are four groupings of environment variables


    - BSP Environment Variables - define the level of optional support available with
    a board support package.

    - BSP_NO Environment Variables - define the level of optional support available
    with a hardware platform.

    - IMG Environment Variables - remove modules from your OS design, but leave the
    associated registry entries in your design intact.

    - Miscellaneous Environment Variables


    ## The Master Build Tool


    The Master Build Tool (`Cebuild.bat`) builds the modules and functionality and
    generates the source code for an entire OS design. `Cebuild.bat` performs the
    following steps to create a run-time image: For each project specified by the
    `_DEPTREES` environment variable, `Cebuild.bat` runs `Build.exe` in the `%_WINCEROOT%\Public\Tree`
    directory, where Tree is a project specified by `_DEPTREES`. `Build.exe` compiles
    the source code in the project''s directories.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ THE TOOLS OF THE TRADE


    For each project specified by the `_DEPTREES` environment variable, `Cebuild.bat`
    runs `Sysgen.bat –p Tree`, where Tree is a project specified by `_DEPTREES`. `Sysgen.bat`
    builds the project''s modules, which are selected in `Cesysgen.bat`. `Sysgen.bat`
    builds the modules in the `%_PROJECTROOT%\Oak\Misc` directory.


    `Cebuild.bat` runs `Build.exe` in the `%_PLATFORMROOT%\%_TGTPLAT%` directory to
    compile the code for the hardware platform.


    ### How to Prepare Your Development Environment


    Windows Embedded Compact Build Environment tool `WINCE.BAT` is the tool that prepares
    the build environment. It uses three input parameters to set environment variables.
    The first parameter indicates the CPU architecture for the build and sets the
    `%_TGTCPU%` environment variable; the second parameter indicates the OSDesign
    directory name for the build and sets the `%_TGTPROJ%` environment variable and
    last parameter indicates the BSP being used for the build to set the `%_TGTPLAT%`


    environment variable. Once you have prepared the build environment, you are ready
    to build your device driver. You will use the build tool, `Build.exe` for the
    actual build.


    ### Build.exe


    For device driver developers the most significant procedure of the build process
    is building the source code of the device driver. `Build.exe` is the tool that
    performs this task. `Build.exe` activity is described in the diagram in Figure
    2-9 and the following steps:


    1. `Build.exe` looks for a DIRS file in the current directory; then, if the DIRS
    file exists, the file directs `Build.exe` to additional subdirectories that contain
    source code or additional DIRS files.

    2. If there is no DIRS file in the current directory, `Build.exe` searches for
    a SOURCES file.

    3. If `Build.exe` finds a SOURCES file in the current directory, it calls the
    Microsoft make utility -`Nmake.exe`, to compile the specified C/C++ or assembly
    source files or link an object module.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-52_1.png)


    CHAPTER 2 ■ THE TOOLS OF THE TRADE


    *Figure 2-9. `Build.exe` activity flow*


    ### DIRS Files


    A DIRS file is a text file that lists subdirectories containing other DIRS or
    SOURCES files. The following example shows a DIRS file that lists the device drivers
    to be built for to the VirtualPC BSP. When `build.exe` evaluates this file, it
    will traverse the ISR_VPCMOUSE, KEYBD, NDIS_DC21X4, and WAVEDEV2_SB16 directories
    looking for SOURCES file or another DIRS file. The DIRS directive orders the build
    sequence, so in the following example the `build.exe` will traverse the directory
    three starting with `wavedev2_sb16` and so on. It is possible to use the wild
    card sign `*` in a DIRS file to traverse the entire set of subdirectories but
    this would not be an ordered sequence.


    ```

    DIRS= \

    wavedev2_sb16 \

    ndis_dc21x4 \

    keybd \

    isr_vpcmouse \

    ```


    ### SOURCES Files


    The SOURCES file is a text file that contains the component specific directives
    needed by `build.exe` and `NMAKE` utility. The SOURCES file is included by the
    shared system wide makefile named `makefile.def`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-53_1.png)


    CHAPTER 2 ■ THE TOOLS OF THE TRADE


    This allows the component makefile to remain relatively simple. The shared system
    makefile is included by a simple one line makefile in the component subdirectory.


    ```

    !INCLUDE $(_MAKEENVROOT)\makefile.def

    ```


    `Makefile.def` provides default MAKE rules for most aspects of the build and provides
    standard rules for various types of targets thus reduces amount of MAKEFILE script
    needed for each project. Located in


    `%_WINCEROOT%\public\common\OAK\misc`. An example of a SOURCES file for the VirtualPC
    mouse ISR is a non-complicated example of the makefile macro definition directives
    involved. For example TARGETLIBS macro definition directive specifies additional
    library files that should be linked into the target executable. Platform Builder
    documentation is a good reference for the various macro definition directives
    that are used by `NMAKE` utility.


    ```

    TARGETNAME=isr_vpcmouse

    RELEASETYPE=PLATFORM

    TARGETTYPE=DYNLINK

    DLLENTRY=DllEntry

    TARGETLIBS= \

    $(_COMMONSDKROOT)\lib\$(_CPUINDPATH)\coredll.lib \

    SOURCES=isr_vpcmouse.c

    ```


    Figure 2-10 describes how the complete project makefile is composed using SOURCES
    file and the `makefile.def` file. The makefile is then processed by the `NMAKE`
    utility to compile and link the project’s source code files and dependent libraries
    into a target executable.


    *Figure 2-10. Inserting the project SOURCES file directives into a makefile*


    ### SOURCES.CMN


    `Sources.cmn` is a text file that provides a place to store common settings that
    apply to the entire source tree. It is located at the topmost directory of the
    sources directory tree where the topmost DIRS file is located. The following example
    is of the `Sources.cmn` file for the VirtualPC BSP.


    ```

    WINCEOEM=1

    IMGNODFLTDDK=1

    WARNISERROR=1

    RELEASETYPE=PLATFORM

    _COMMONPUBROOT=$(SG_OUTPUT_ROOT)

    __PROJROOT=$(_PROJECTROOT)

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-54_1.jpg)


    CHAPTER 2 ■ THE TOOLS OF THE TRADE


    ```

    _PLATCOMMONLIB=$(_COMMONPUBROOT)\platcomm\$(_TGTPLAT)\lib

    _PLATLIB=$(_COMMONPUBROOT)\platform\$(_TGTPLAT)\lib

    _OEMINCPATH=$(_WINCEROOT)\public\common\sdk\inc

    _OEMINCPATH=$(_OEMINCPATH);$(_WINCEROOT)\public\common\oak\inc

    _OEMINCPATH=$(_OEMINCPATH);$(_WINCEROOT)\public\common\ddk\inc

    _ISVINCPATH=$(_WINCEROOT)\public\common\sdk\inc

    INCLUDES=$(_TARGETPLATROOT)\src\inc

    INCLUDES=$(INCLUDES);$(_WINCEROOT)\platform\common\src\soc\x86_ms_v1\inc

    INCLUDES=$(INCLUDES);$(_PLATFORMROOT)\common\src\x86\inc

    INCLUDES=$(INCLUDES);$(_PLATFORMROOT)\common\src\inc

    ```


