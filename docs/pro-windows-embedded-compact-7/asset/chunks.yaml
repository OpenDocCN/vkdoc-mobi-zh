    test and determine the results. This function adds tick count measurements and
    then compares the tick count duration to a specific reference tick count value
    to provide a pass or fail result, while the functionality test remains basically
    the same. An argument passed to this function determines which test to perform.
    The second test procedure is named


    ***PerfomanceTestProc*** and must adhere to the **TESTPROCAPI** declaration.


