    purpose operating system, this book would be of interest only to device driver
    developers. However Windows Embedded Compact is anything but a general purpose
    OS. It is an embedded hard real-time operating system and therefore application
    developers of time critical software have to understand how to access I/O hardware.
    Understanding kernel mode device drivers and developing user mode interaction
    with these should benefit the application developers as much.


    Understanding the new filter driver model of Windows Embedded Compact 7 can help
    application developers move code of input data filtering algorithms such as Finite
    Impulse Response to Fast Fourier Transformations from the user mode process to
    the kernel for better performance and modularity.


    This book is not an introduction to Windows Embedded Compact and how to create
    Windows Embedded Compact 7 based operating system images. It assumes the reader
    already knows how to perform these tasks. Therefore it skims the surface when
    discussing Platform Builder and kernel debugger techniques.


    At the end of the book there is a bibliography list, divided by topics to help
    the reader find out more about topics that may need more clarification, such as
    JTAG and the related “scan chains.”


    xvi


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ■ INTRODUCTION


    Who This Book Is For


    This book is devoted to the development of device drivers, and as such is for
    experienced developers of Windows Embedded Compact 7 and previous versions of
    Windows CE. This book is not an introduction to Windows Embedded Compact and how
    to create Windows Embedded Compact 7 based operating system images. It assumes
    the reader already knows how to perform these tasks. Therefore it skims the surface
    when discussing Platform Builder and kernel debugger techniques.


    xvii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 1**


    ****The Foundation of Device Driver**


    **Development for Windows**


    **Embedded Compact**


    Any discussion about device drivers should provide some perspective of what device
    drivers are and why we need them. Practically, a device driver is an executable
    piece of software dedicated to access a specific peripheral hardware device in
    order to control it and to perform input/output (I/O) operations.


    Figuratively, you can think of a device driver as a negotiator between the operating
    system software and the hardware it uses. To understand this analogy we need to
    look at how multitasking operating systems, such as Windows Embedded Compact,
    handle peripheral hardware devices to provide a unified generic access method
    for their higher-level applications and processes.


    In this chapter:


    • Embedded Operating System Architectures


    • Windows CE System Architecture and I/O Handling


    Embedded Operating System Architectures


    The evolution of embedded operating systems architectures brought about the need
    for device drivers.


    This becomes clearer if you look back 30̽40 years when 4-bit microprocessors appeared.
    At that time, embedded operating systems were simple control loops that did not
    include any device drivers, yet Central Processing Units (CPUs) steadily advanced
    to the 32-bit and even 64-bit CPUs of today. With advanced processors came multitasking
    capabilities, and with multitasking came the need for centralized hardware control
    to avoid data conflicts and chaos. Without centralized control it is difficult
    to synchronize hardware access between the various concurrent tasks on a multitasking
    operating system.


    A. Kcholi *P*


    , *ro Windows Embedded Compact 7*


    © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED COMPACT


    Essentially, there are two ways to implement centralized hardware control: Either
    the operating system provides exclusive hardware access to only one application
    at a time or facilitates hardware access for all its applications and processes.
    Both approaches can rely on device drivers to establish a single point of hardware
    control, but exactly how these device drivers are implemented and how the hardware
    is accessed depends to a large degree on the operating system architecture itself
    and its device driver model.


    For embedded device driver developers, the two most relevant commercial operating
    system architectures are:


    • Microkernel Architecture – In this architecture device drivers run in user mode,
    so it is possible to embed I/O handling routines directly into user-mode applications.
    However, this means that sharing the same peripheral I/O device with other user
    mode applications needs a complicated mechanism of


    synchronizing access to this hardware.


    • Monolithic Kernel Architecture – In this architecture device drivers that directly
    access I/O hardware run in kernel mode, so user-mode applications must use device
    drivers to access the hardware devices. A device driver implementation can allow
    multiple user mode processes use the same device driver to share access to the
    I/O hardware.


    Microkernel Architecture


    In the microkernel architecture, the kernel process is the only process executing
    at the most privileged level provided by a CPU with multiple privilege levels.
    At this privileged level, usually referred to as kernel mode, code has access
    to the kernel address space and implements low-level address space management,
    thread management, and inter-process communication. All other operating system
    services, such as file systems, device drivers, protocol stacks, and user interface
    code run in user mode.


    User mode means that only user mode address space is available to user mode threads.
    User mode threads cannot perform any kernel mode calls or access kernel mode addresses.
    The system services must communicate with the kernel via inter-process communication
    mechanisms.


    Microkernel Architecture and Windows CE


    Windows CE up to and including version 5.0 was based on the microkernel architecture.
    Figure 1-1


    shows Windows CE 5.0 Microkernel architecture. What’s particularly important to
    note in this figure is that the device driver hosts (that is, GWES.exe and Device.exe)
    are user mode processes. Hence, all device drivers run in user mode.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-21_1.png)


    CHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED COMPACT


    *Figure 1-1\. Microkernel architecture of Windows CE 5.0*


    Microkernel Architecture and Time-Critical Systems


    In time-critical systems, it is sometimes worth implementing the code that accesses
    a peripheral device directly into the application. This method provides performance
    enhancements for time critical systems because I/O is handled directly by the
    application process. However this practice should be limited to I/O peripheral
    devices that are exclusively accessed by a one process and not shared with other
    processes. It is also important to point out that this technique is no longer
    valid for Windows CE


    developers because latest versions do not rely on the Microkernel architecture
    anymore.


    Monolithic Architecture


    In the monolithic architecture, the kernel is still the only process executing
    at the most privileged level provided by a CPU with multiple privilege levels.
    However, the system services that used to be implemented as user mode processes
    in the microkernel architecture now moved as dynamically linked libraries (DLLs)
    into the monolithic kernel. In other words, the system services now run within
    the kernel process, which means that most device drivers now run in kernel mode
    as the device driver server is now part of the kernel.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


