- fmt: '# When Developing Device Drivers


    When developing device drivers, using command line build is extremely quick and
    efficient. It is very easy to prepare batch files to set up the command line build
    environment and run the build from a command line prompt window. First you have
    to setup your environment, the following example sets up the build environment
    for building projects for x86 architecture, using the VirtualPC BSP. Because I
    may create various environment batch files, I would name this file `VPCENV.BAT`.


    ```

    echo on

    set _WINCEROOT=C:\wince700

    cd %_WINCEROOT%\public\common\oak\misc

    call Wince.bat x86 CEBASE VirtualPC

    set WINCEDEBUG=debug

    ```


    This batch file sets up everything we need to build a device driver that will
    be incorporated on an operating system running on a virtual PC device. Figure
    2-11 shows the result of running this environment batch file.


    *Figure 2-11. Running VPCENV.BAT in a command line prompt*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-55_1.jpg)


    # CHAPTER 2 ■ THE TOOLS OF THE TRADE


    The next step would be to create a batch file to perform the actual build. The
    following example shows a batch script to build the demo driver for the VirtualPC
    BSP.


    ```

    REM DEMODRIVER build

    echo on

    call VPCENV.bat

    REM build the DEMO DRIVER

    cd %_WINCEROOT%\platform\VirtualPC\src\drivers\DEMODRIVER

    %_WINCEROOT%\PUBLIC\COMMON\OAK\BIN\I386\build –c

    ```


    As before, you would be advised to give the file a meaningful name for example
    `demodriver_bld.bat`.


    Figure 2-12 shows the result of running this device driver build batch file.


    *Figure 2-12. Running DEMODRIVER_BLD.BAT in a command line prompt*


    # Device Driver Development Kit


    The Device Driver Development Kit or DDK for Windows CE amounts to two major helper
    libraries and a set of headers that provide definitions for structures and helper
    functions available in the helper libraries, the CEDDK library and the Registry
    Helper library. The main directories that contain the DDK files are under the
    PUBLIC tree:


    - `%PUBLICROOT%\COMMON\oak\drivers\ceddk`

    - `%PUBLICROOT%\COMMON\ddk\inc`


    ## CEDDK Dynamic-Link Library


    CEDDK library provides functions, structures, and IO Control codes used by drivers
    for handling bus address translations and bus access, allocating and mapping device
    memory, setting up direct memory access (DMA) buffers, performing I/O, power management
    functionality, and stall counter.


    ## Registry Helper Library


    The registry helper functions and structures provide device driver developers
    a consistent method to read resource configurations from the registry.


    # TRACE32-ICD


    TRACE32-ICD is offered by Lauterbach Datentechnik GmbH is an extremely powerful
    debugging tool that is used on chip debugging capabilities. It is by no means
    the only third-party tool that is available, but it is a tool I have used for
    debugging device drivers, boot loaders, and OAL code.


    ## Overview


    An In Circuit Debugger is a tool that uses debug and trace logic integrated on
    the microprocessor chip.


    Most microprocessors implement on chip debug systems. For example the JTAG interface
    for the ARM microprocessor families. The debug interface requires some microprocessor
    pins that are used for communication between the on-chip debug system and a third-party
    development tool. An on chip debug system provides the following basic features:


    - Read/write memory

    - Read/write CPU registers

    - Single step and real time execution

    - Hardware breakpoints and trigger features (this may not be supported by all
    microprocessors)


    TRACE32-ICD uses these features of the on chip debug system capabilities to provide
    a powerful debug tool that offers:


    - Easy high-level and assembler debugging

    - Display of internal and external peripherals on a logical level

    - On chip break and trigger support

    - RTOS awareness

    - Flash programming

    - Powerful script language

    - Multiprocessor debugging


    TRACE32-ICD supports a wide range of on-chip debug interfaces. The hardware for
    the debugger is universal and allows interfacing to different target processors
    by simply changing a debug cable and the software. The debugger hardware comes
    in three versions that differ only in the way they communicate with the development
    workstation.


    - Power Debug USB 2 communicates via a USB 2 port

    - Power Debug Ethernet communicates via USB 2 and 100 MB Ethernet Interface

    - Power Debug II communicates via USB or Gigabit Ethernet Interface


    Figure 2-13 is of the Power Debug USB 2. Of course there is a marked cost differential
    between the three. Otherwise all three provide the same capabilities:


    - Support for a wide range of on-chip debug interfaces

    - Easy high-level and assembler debugging

    - Interface to all compilers

    - Fast download

    - RTOS awareness

    - Interface to all hosts

    - Display of internal and external peripherals at a logical level

    - Flash programming

    - Hardware breakpoints and trigger (if supported by chip)

    - Trace extension available

    - Multiprocessor/multicore debugging

    - Software trace

    - Virtual analyzer


    The TRACE32 System includes a configurable multitask debugger to provide symbolic
    debugging in real-time operating systems. It contains a ready-to-run configuration
    for the Windows CE Real Time Kernel provided by Microsoft. The following are capabilities
    specific to Windows CE.


    - Real Time, non-intrusive Display of Windows CE System Resources

    - Debugging Windows CE Kernel

    - Debugging Windows CE Device Drivers

    - Debugging Several Windows CE Applications at Once

    - Dynamic Thread Performance Measurement

    - Windows CE Specific Evaluation of Real Time Trace Listing

    - PRACTICE Functions for OS Data

    - Windows CE related Pull-Down Menu


    *Figure 2-13. Power Debug USB 2*


    ## How to Prepare your Trace Tools


    Preparing your environment for TRACE32-ICD means that you have to connect you
    target device hardware and install and prepare your TRACE32 PowerView software
    tools. Figure 2-14 shows how to connect the target device to the development station
    with the In Circuit Debugger module in-between.


    The Debug Cable is microprocessor specific thus not interchangeable.


    Install the ICD – In Circuit Debugger software using the setup program. Once you
    have it installed you need to create your specific command batch file, because
    it will save you configuring the session each time from scratch. TRACE32 uses
    its own command language for batch jobs. All the commands of TRACE32 development
    tools, such as commands for program flow, conditional commands and I/O commands
    are allowed. The default extension for batch files is `.cmm`.


    We shall discuss this tool in-depth combined with hands-on experience in Chapter
    15. We will create a specific batch file to load and run kernel device drivers,
    measure performance, and debug a device driver.


    *Figure 2-14. Hardware setup for TRACE32 assisted debugging*


    *Figure 2-15. Installing TRACE32 software*


    # Device Driver Wizard


    ## Overview


    Developers learn by example. As much as we learn theory, still as human beings
    we learn by analyzing examples. This is how we learn as children how to do things
    and this is why books are littered with examples; this book is no exception.


    The Windows CE documentation offers a topic named "How to Create a Device Driver."
    In this topic in step 4 it tells you to "Copy the power management development
    sample driver to your OS design." It then goes on to instruct you what to do during
    the rest of the creation process.'
