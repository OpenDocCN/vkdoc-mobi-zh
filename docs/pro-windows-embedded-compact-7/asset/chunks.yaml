  raw: 'eXDI stands for Extended Debugging Interface. It allows Platform Builder to
    monitor and control activity of the target device via an In Circuit Debugger such
    as TRACE32\. It is essentially an adaptation layer between Platform Builder and
    the In Circuit Debugger. eXDI is implemented as a core connectivity service which
    cooperates with OS access service to provide debugging services to Platform Builder.
    OS


    access provides OS awareness to the debugger. It acts as a mediator between the
    eXDI service and Platform Builder. This allows third-party solution providers
    to provide debugging tools that are aware of Windows Embedded Compact 7\. Figure
    11-10 shows how Platform Builder uses the Lauterbach eXDI2


    driver to interface between the TRACE32 ICD connected to the target device using
    the JTAG connection for hardware assisted debugging.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-220_1.jpg)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    *Figure 11-10\. eXDI Architecture used to debug without KITL*


    Target Control


    Target control service provides a command line interface to perform debugging,
    profiling, and logging.


    Target control commands allow you to execute processes and kill them, dump memory,
    get information, and so on. However the most interesting capability of target
    control service is to execute commands for a debugger extension DLL. Microsoft
    provides such a debugger extension module CeDebugX which we discussed under the
    kernel debugger section. More than that you can create your own debugging commands
    customized to your needs.


    Creating Debug Extensions


    What Microsoft can do, you can do. If you want to customize specific commands
    it is quite straight forward to create your own debugger extension. While the
    documentation is very helpful guiding you through this process of creating a Win32
    DLL that runs on your development station, there are a few points to remember.
    Platform Builder is a 32 bit program, it is installed within the < InstallationDisk\Program
    Files (x86)\Microsoft Platform Builder> directory, so the DLL you create is a
    32


    bit DLL. You should configure the additional include directories to contain <
    \Program Files (x86)\Microsoft Platform Builder\7.00\cepb\SDK\Include>, this is
    where WDbgExts_CE.h is located.


    You should add the /FORCE:MULTIPLE to the linker command line. This is to avoid
    a build error that is related to multiple definitions for a symbol when you link
    your DLL. Add a module definition file to export the extension library functions.
    Listing 11-8 shows a sample module definition file. When you connect Platform
    Builder to the device in debug mode and download the OS image you launch Windows
    CE Debugger Extensions dialog box from the Debug menu. This is a common Open File
    dialog box that allows you to locate your extension DLL and load it. Once it is
    loaded you can use your extension commands. Listing 11-7 show the minimum code
    you need for an extension DLL. Figure 11-11 shows calling the **!demo** command
    in Target Control.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


