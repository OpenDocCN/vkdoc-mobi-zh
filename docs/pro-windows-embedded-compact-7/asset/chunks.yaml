    \ *)pOutSize);\n    }\n\ncleanUp:\n    OALMSG(OAL_IOCTL&&OAL_FUNC,\n         \
    \  (L\"-OEMIoControl(rc = %d)\\r\\n\", rc));\n    return rc;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
