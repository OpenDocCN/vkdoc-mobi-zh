    *Figure 1-7\. Interrupt Processing in Windows CE*


    As visualized in Figure 1-7, the process of handling an interrupt is handled in
    five steps: 1\. Device raises registered hardware interrupt


    2\. Kernel gets exception, calls associated Interrupt Service Routine (ISR) 3\.
    ISR quickly deals with pending interrupt


    4\. IST in driver is signaled to process interrupt


    5\. IST completes processing


    ISRs and ISTs


    ISRs and ISTs work together to perform the necessary Input/Output operations with
    minimal impact on other processing tasks and to prevent the loss and delay of
    high-priority interrupts. This interaction is mainly a task of coordinating thread
    execution between ISR and IST. ISRs and ISTs always work in pairs -


    the ISR identifies and masks interrupt quickly while the IST handles the bulk
    of the work and re-enables interrupts as soon as possible.


    The interaction between ISR and IST involves the following steps:


    1\. The IST creates an Event Object mapped to the related SYSINTR ID. The Event
    Object is a kernel resource on which a WaitForSingleObject function call can wait
    and exit after the Event Object becomes signaled. The SYSINTR ID


    identifies the Event Object.


    2\. The ISR returns the SYSINTR ID to the Kernel Interrupt Service Handler so
    that it can signal the Event Object when ready.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-30_1.png)


