    3\. The IST blocks on the event with a WaitForSingleObject function call until
    the Kernel Interrupt Service Handler sets the related event, thus unblocking the
    IST.


    4\. When unblocking the IST, if the IST is the highest priority runnable thread,
    it will be scheduled to run immediately.


    Installable ISRs and Interrupt Sharing


    Installable ISRs allow multiple devices to share interrupts and to share a single
    hardware platform interrupt request (IRQ). Essentially, shared interrupts trigger
    one interrupt line that is shared by more than one IRQ. For the operating system
    to handle these IRQs, there must be multiple ISRs chained to handle the shared
