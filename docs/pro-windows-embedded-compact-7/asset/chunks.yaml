    ## 公布接口


    另一种公开设备接口并公布关联 GUID 的方法是在初始化期间调用 `AdvertiseInterface` API。相比于设置 `IClass` 子项，这是一种不太理想的选择，因为
    `IClass` 值会被传递给 `ActivateDeviceEx`，而后者会在设备管理器中分配资源。将 `AdvertiseInterface` 的 `fAdd`
    参数设置为 false 并调用该函数，可公布接口的移除行为，且应在取消初始化设备驱动程序时调用。


    设备接口类对于应用程序访问设备驱动程序的功能至关重要。它们通过通知向应用程序指示某个特定接口的存在。


    ## 设备接口通知


    设备管理器的接口通知机制（适用于 Windows Embedded Compact 7 及更早版本）与桌面端的即插即用事件通知系统相对应。设备管理器会通知用户模式应用程序、服务以及设备驱动程序设备接口的出现与消失。设备管理器使用消息队列来传递这些通知，可以是
    GWES 消息队列，也可以使用点到点消息队列。


    当设备管理器成功加载并初始化设备驱动程序时，它会检查设备键中是否存在 `IClass` 值。如果找到有效值，将启动一个线程，通过应用程序通知系统以及广播窗口消息来指示设备变化。图
    6-2 显示了设置为流接口类的注册表 `IClass` 值。


