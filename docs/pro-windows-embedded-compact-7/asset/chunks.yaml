- fmt: 'Port-mapped I/O uses a special set of CPU instructions specifically for performing
    I/O. Typically found on x86 architecture, specifically the `IN` and `OUT` instructions
    which can read and write one to four bytes to a peripheral I/O device. Peripheral
    I/O devices have a separate address space from the systems memory space, which
    is accomplished by an extra pin on the CPU''s physical interface. Because the
    address space for I/O is isolated from the main memory, this is also referred
    to as isolated I/O.


    Kernel mode device driver developers should use a set of functions for reading
    from and writing to port mapped I/O ports declared in `ceddk.h` to read and write
    from and to these ports. An example of such a function is `READ_PORT_UCHAR` which
    reads a byte from a byte wide port on a peripheral device.


    Listing 8-9 is the declaration in `ceddk.h`. The implementation in `ddk_io` library
    is simple and demonstrates using the special instructions for port mapped I/O,
    see listing 8-10.


    *Listing 8-9. Declaration of READ_PORT_UCHAR*


    ```

    NTKERNELAPI

    UCHAR

    READ_PORT_UCHAR(

    __in volatile const UCHAR * const Port

    );

    ```


    *Listing 8-10. Implementation of READ_PORT_UCHAR in ddk_io library*


    ```

    UCHAR

    READ_PORT_UCHAR(

    volatile const UCHAR * const Port

    )

    {

    #if defined(x86)

    __asm {

    mov dx, word ptr Port

    in al, dx

    }

    #else

    return *(volatile UCHAR * const)Port;

    #endif

    }

    ```


    For an example of using these macros see listing 8-11 which is part of an implementation
    of a device driver that reads data from GPIO port 1 on an eBox3300 based device.


    *Listing 8-11. using WRITE_PORT_UCHAR and READ_PORT_UCHAR macros*


    ```

    UCHAR chVal = 0;


    // set GPIO port1 as input direction

    WRITE_PORT_UCHAR(0x2E, 0xF3);

    WRITE_PORT_UCHAR(0x2F, 0xFF);


    // read data from GPIO port1

    WRITE_PORT_UCHAR(0x2E, 0xF4);

    chVal = READ_PORT_UCHAR(0x2F);

    ```


    The following is a table of port mapped I/O port access support by the CEDDK:


    - `READ_PORT_BUFFER_UCHAR` - This function reads a number of bytes from the specified
    port I/O address into a buffer.

    - `READ_PORT_BUFFER_ULONG` - This function reads a number of `ULONG` values from
    the specified port address into a buffer.

    - `READ_PORT_BUFFER_USHORT` - This function reads a number of `USHORT` values
    from the specified port address into a buffer.

    - `READ_PORT_UCHAR` - This function reads a byte from the specified port address.

    - `READ_PORT_ULONG` - This function reads a `ULONG` value from the specified port
    address.

    - `READ_PORT_USHORT` - This function reads a `USHORT` value from the specified
    port address.

    - `WRITE_PORT_BUFFER_UCHAR` - This function writes a number of bytes from a buffer
    to the specified port.

    - `WRITE_PORT_BUFFER_ULONG` - This function writes a number of `ULONG` values
    from a buffer to the specified port address.

    - `WRITE_PORT_BUFFER_USHORT` - This function writes a number of `USHORT` values
    from a buffer to the specified port address.

    - `WRITE_PORT_UCHAR` - This function writes a byte to the specified port address.

    - `WRITE_PORT_ULONG` - This function writes a `ULONG` value to the specified port
    address.

    - `WRITE_PORT_USHORT` - This function writes a `USHORT` value to the specified
    port address.


    ## Memory-mapped I/O


    In memory-mapped I/O the peripheral devices registers are part of the system address
    space, accessed the same way that any memory location is accessed and become part
    of the virtual address space of the kernel. The base address for a set of registers
    for a peripheral device is denoted by the hardware mapping address. When developing
    we have to translate it to kernel space virtual memory base address.


    This is done by calling `MmMapIoSpace`. This function is called to map the physical
    base address of a register set to a non-paged, kernel virtual address space directly
    mapped, to the device.


    Device driver developers should call this function in the device driver initialization
    code to get a virtual address for the device driver''s memory range if a call
    to `HalTranslateBusAddress` indicates that the device memory range for the bus
    can map to a system memory address. Listing 8-12 demonstrates a code snippet from
    a device driver''s initialization code.


    Note the implementation in Listing 8-10, the implementation for non x86 platforms
    is simply reading a memory address. Reading and writing to memory mapped I/O registers
    is naturally served by using the `READ_REGISTER_UCHAR` instead as its implementation
    is straight forward and simple as can be seen in Listing 8-13.


    *Listing 8-12. Sample code mapping physical address space to virtual address space*


    ```

    ULONG unIoSpace = 1;


    // Obtain hardware I/O address - initialized to memory mapped IO space

    pDevContxt->ioPhysicalBase.LowPart = WinInfo.memWindows[0].dwBase;

    pDevContxt->ioPhysicalBase.HighPart = 0;


    pDevContxt->dwIoRange = WinInfo.memWindows[0].dwLen;


    if (HalTranslateBusAddress(

    (INTERFACE_TYPE)pDevContxt->dwInterfaceType,

    WinInfo.dwBusNumber,

    pDevContxt->ioPhysicalBase,

    &unIoSpace,

    &pDevContxt->ioPhysicalBase))

    {

    // Is it memory mapped IO or in IO space.

    if (!unIoSpace)

    {

    pDevContxt->bIoMemMapped = TRUE;

    if ((pDevContxt->dwIoAddr = (DWORD)MmMapIoSpace(

    pDevContxt->ioPhysicalBase,

    pDevContxt->dwIoRange, FALSE)) == NULL)

    {

    DEBUGMSG(ZONE_INIT,

    (_T("DMO!Error mapping IO Ports failure\r\n")));

    FreePhysMem(pDevContxt);

    // You may want to disable IO device here

    return dwRet;

    }

    }

    else

    {

    pDevContxt->bIoMemMapped = FALSE;

    pDevContxt->IoAddr = pDevContxt->ioPhysicalBase.LowPart;

    }

    }

    else

    {

    DEBUGMSG(ZONE_INIT,

    (_T("DMO!Error HalTranslateBusAddress call failure\r\n")));

    FreePhysMem(pDevContxt);

    // You may want to disable IO device here

    return dwRet;

    }

    ```


    *Listing 8-13. Implementation of READ_REGISTER_UCHAR in ddk_io library*


    ```

    UCHAR

    READ_REGISTER_UCHAR(

    volatile const UCHAR * const Register

    )

    {

    return (*(volatile UCHAR * const)Register);

    }

    ```


    A similar set of such functions is implemented by CEDDK and provides quick and
    efficient access to memory-mapped I/O registers.


    - `READ_REGISTER_BUFFER_UCHAR` - This function reads a number of bytes from the
    specified register memory address into a buffer.

    - `READ_REGISTER_BUFFER_ULONG` - This function reads a number of `ULONG` values
    from the specified register address into a buffer.

    - `READ_REGISTER_BUFFER_USHORT` - This function reads a number of `USHORT` values
    from the specified register address into a buffer.

    - `READ_REGISTER_UCHAR` - This function reads a byte from the specified register
    address.

    - `READ_REGISTER_ULONG` - This function reads a `ULONG` value from the specified
    register address.

    - `READ_REGISTER_USHORT` - This function reads a `USHORT` value from the specified
    register address.

    - `WRITE_REGISTER_BUFFER_UCHAR` - This function writes a number of bytes from
    a buffer to the specified register.

    - `WRITE_REGISTER_BUFFER_ULONG` - This function writes a number of `ULONG` values
    from a buffer to the specified register.

    - `WRITE_REGISTER_BUFFER_USHORT` - This function writes a number of `USHORT` values
    from a buffer to the specified register.

    - `WRITE_REGISTER_UCHAR` - This function writes a byte to the specified address.

    - `WRITE_REGISTER_ULONG` - This function writes a `ULONG` value to the specified
    address.

    - `WRITE_REGISTER_USHORT` - This function writes a `USHORT` value to the specified
    address.


