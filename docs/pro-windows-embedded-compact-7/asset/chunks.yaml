- fmt: "Device Manager 加载内核模式流设备驱动程序，并在加载后对其进行管理并管理其接口。`Device Manager`是一个系统服务器动态链接库，名为（`DEVMGR.DLL`），由内核在启动时加载。加载后，它会持续运行，加载内核模式流设备驱动程序，并在加载后对其进行管理并管理其接口。当`Device\
    \ Manager`加载时，它首先加载`I/O Resource Manager`，以从注册表中枚举可用资源列表。此外，`Device Manager`会跟踪驱动程序公布的接口，并支持基于全局唯一标识符（`GUID`）搜索驱动程序。`IClass`接口可以将接口`GUID`与驱动程序的旧名称、其`$device`名称或其`$bus`名称相关联。例如，`COM1:`、`$device\\\
    com1`或`$bus\\pci_0_3_0`。\n\n## Device Manager 架构\n\n`Device Manager`搜索`HKLM\\\
    Drivers\\Drivers\\BuiltIn`注册表项，以确定开始驱动程序加载过程的项。`Device Manager`调用`ActivateDeviceEx`API来加载由`Drivers\\\
    BuiltIn`值指定的项中找到的`Dll`子项值所指定的驱动程序。`Dll`子项值默认为`BusEnum.dll`，也称为总线枚举器。加载`BusEnum.dll`会导致加载所有设备驱动程序。由`ActivateDeviceEx`加载的设备可以从其`Active`注册表项读取其激活句柄。`Device\
    \ Manager`控制注册表中的`Active`项。只有`Device Manager`才能对`Active`项进行读取或写入访问。`Device Manager`使用`HKLM\\\
    Drivers`注册表项的`Active`和`BuiltIn`子项。设备驱动程序绝不应通过编程方式修改`Device Manager`放置在该注册表部分中的值。图\
    \ 1-11 描述了在启动时初始化设备驱动程序的过程。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-35_1.jpg)\n\n**图 1-11\\. 系统启动期间的设备驱动程序初始化**\n\n## Device Manager 注册表项\n\
    \n`HKLM\\Drivers\\Active`注册表项包含`Device Manager`已加载的当前活动设备驱动程序。设备驱动程序例程不应修改`Active`项，也不应依赖`Active`项中的任何特定值。当加载驱动程序时，`Device\
    \ Manager`通过`dwContext`参数将驱动程序`Active`项的路径传递给初始化例程。初始化例程可以在`Active`项中读取和创建新值；但是，在初始化函数返回后，不允许访问该项。\n\
    \n## 设备文件名称\n\n应用程序可以通过文件系统函数访问设备驱动程序，例如使用`CreateFile`获取设备驱动程序的句柄，并使用此句柄执行 I/O\
    \ 请求，如读取、写入或通过 I/O 控制请求执行更复杂的 I/O 操作。在调用诸如`CreateFile`之类的文件系统 API 时，其请求的第一个参数是文件名。此时，会使用设备驱动程序的命名空间来代替文件名。设备驱动程序的命名空间可以是以下格式之一：\n\
    \n-   三位字母前缀，后跟一个 0 到 9 之间的数字，再接一个冒号。\n    例如 `\"TST0:\"`\n-   `$bus`挂载点，后跟总线名称、总线编号、设备编号和功能号。\n\
    \    例如 `\"$bus\\PCMCIA_0_0_0\"`\n-   `$device`挂载点，后跟代表设备的三位字母前缀，再接一个数字，这允许同一设备前缀有超过\
    \ 10 个设备实例。\n    例如 `\"$device\\TST0\"`\n\n## 设备文件名称前缀\n\n前缀由三个大写字母组成，用于标识对应于特定流接口的设备文件名。该前缀存储在名为`Prefix`的注册表值中。在实现流接口时，通常会指定三位字母前缀。第\
    \ 3 章对此主题进行了深入讨论。\n\n首先，前缀标识了所有可以访问流接口驱动程序的可能的设备文件名。\n\n第二，前缀告诉操作系统在流接口 DLL 中应期望哪些入口点文件名。例如，要为\
    \ PC Card 寻呼机实现设备驱动程序，使用`PGR`表示`PAGER`作为三位字母前缀，这反过来会规定入口点名称，例如`PGR_Init`、`PGR_IOControl`等。\n\
    \n## 设备文件名称索引\n\n索引用于区分流接口管理的具有相同前缀的设备。索引是紧跟在前缀后面的数字。默认情况下，`Device Manager`从 1\
    \ 到 9 进行逻辑索引，其中`1`对应第一个设备文件名。如果需要第十个设备文件名，则使用索引`0`。\n\n如果设备文件名的起始索引需要不是`1`，则在注册表项中名为`Index`的注册表值中指定起始索引。当流接口驱动程序服务于使用通用前缀（如`COM`）的设备时，这通常是必要的。例如，`\"\
    COM1:\"`、`\"COM2:\"`和`\"COM3:\"`通常对应于内置串行端口硬件。然而，如果驱动程序用于串行设备（如分组无线调制解调器），它应该显示为`COM`端口，因为调制解调器软件通常假定调制解调器连接到`COM`端口。因此，指定`Index`值为`4`以将此分组无线调制解调器设备与内置串行设备区分开。\n\
    \n`Device Manager`只能注册一个设备文件名，因此如果指定了`Index`值，而不是让`Device Manager`分配索引，则该设备驱动程序仅支持一个设备。\n\
    \n## I/O 资源管理器\n\n当操作系统启动时，总线枚举器枚举注册表并根据注册表信息加载所有内置设备。然后，`I/O Resource Manager`跟踪系统中可用资源的当前状态，并管理总线驱动程序的所有进一步\
    \ I/O 资源请求和分配。因此，当总线驱动程序为可安装设备或其他类型的设备加载客户端驱动程序时，应向`I/O Resource Manager`请求 I/O\
    \ 资源。\n\n`I/O Resource Manager`是`Device Manager`的一个固有部分。`I/O Resource Manager`跟踪在加载任何设备之前从注册表初始化的可用系统资源。跟踪这些资源可防止在多个设备驱动程序尝试使用相同资源时发生意外冲突。\n\
    \n`OAL`和注册表用于预分配总线驱动程序请求的`IRQ`和 I/O 空间资源。但是，`I/O Resource Manager`并不局限于管理 I/O\
    \ 和 IRQ 空间。当总线驱动程序（如`PCI`总线驱动程序）加载其在注册表中找到的设备的设备驱动程序时，会从`I/O Resource Manager`请求`IRQ`和\
    \ I/O 空间资源。同样的情况也适用于`PC Card`总线驱动程序和`PC Card`客户端驱动程序所需的 I/O 资源。当用户从系统中移除`PC Card`时，`PC\
    \ Card`总线驱动程序会释放这些资源。\n\n每个硬件平台都有独特的`IRQ`和可用的 I/O 空间。内置和固定设备的`IRQ`在`OAL`中映射到中断标识符（`SYSINTRs`）。应将这些内置和固定设备的`IRQ`从可用资源中排除。与`PCI`总线一起使用的`IRQ`通常是共享的。\n\
    \n`IRQ`和 I/O 空间资源在`HKLM\\Drivers\\Resources\\IRQ`和`HKLM\\Drivers\\Resources\\\
    IO`注册表项中预先定义，这些注册表项提供了`I/O Resource Manager`的初始状态。\n\n## 章节摘要"
  raw: 'Device Manager loads kernel mode stream device drivers and manages them and
    their interfaces while loaded. The Device Manager is a system server dynamically
    linked library named (DEVMGR.DLL) and is loaded by the kernel at boot time. Once
    loaded it runs continuously and it loads kernel mode stream device drivers and
    manages them and their interfaces while loaded. When the Device Manager loads,
    it initially loads the I/O Resource Manager to enumerate a list of available resources
    from the registry. In addition Device Manager tracks interfaces advertised by
    drivers and supports searches for drivers based on a globally unique identifier
    (GUID). The IClass interface can associate an interface GUID with the driver''s
    legacy name, its $device name, or its $bus name. For example, COM1:, $device\com1,
    or $bus\pci_0_3_0.


    Device Manager Architecture


    Device Manager searches the **HKLM\Drivers\ Drivers\BuiltIn** registry key to
    determine the key to begin the driver loading process. Device Manager calls ActivateDeviceEx
    API to load the driver specified by the **Dll** subkey value found in the key
    specified by the **Drivers\BuiltIn** value. The **Dll** subkey value is by default
    **BusEnum.dll**, also referred to as the bus enumerator. Loading **BusEnum.dll**
    causes all device drivers to load. A device loaded by ActivateDeviceEx can read
    its activation handle from its **Active** registry key. Device Manager controls
    the **Active** key in the registry. Only Device Manager should access the **Active**
    key for read or write access. Device Manager uses the **Active** and **BuiltIn**
    subkeys of the **HKLM\Drivers** registry key. Device drivers should never modify
    programmatically the values placed in this part of the registry by Device Manager.
    Figure 1-11 depicts initializing a device driver at boot time.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-35_1.jpg)


    CHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED COMPACT


    *Figure 1-11\. Device Driver initialization during system boot*


    Device Manager Registry Keys


    The **HKLM\Drivers\Active** registry key contains currently active device drivers
    that Device Manager loaded. Device driver routines should not modify the **Active**
    key nor rely on any specific values within the **Active** key. When a driver is
    loaded, Device Manager passes the path to the driver''s **Active** key with the
    **dwContext** parameter to the initialization routine. The initialization routine
    may read and create new values in the **Active** key; however, it is not allowed
    to access the key after the initialization function returns.


    Device File Names


    Applications can access device drivers through file system functions, for example
    CreateFile to get a handle to a device driver, and using this handle to perform
    I/O requests such as read, write or perform more elaborate I/O operations via
    I/O control requests. When calling a file system API such as CreateFile the first
    parameter it requests is a file name. A device driver’s namespace is used instead
    of a file name as such. A device driver’s name space can be one of the following
    formats:


    • Three-letter prefix, followed by a number between 0 and 9, followed by a colon.


    For example “TST0:”


    • $bus mount point, followed by the bus name, bus number, device number, and function
    number. For example “\$bus\PCMCIA_0_0_0”


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED COMPACT


    • $device mount point, followed by a three-letter prefix representing the device,
    followed by a number, this allows for more than 10 device instances for the same
    device prefix. For example “\$device\TST0”


    Device File Name Prefixes


    The prefix consists of three uppercase letters that identify the device file name
    corresponding to a particular stream interface. The prefix is stored in a registry
    value called **Prefix**. When implementing the stream interface, typically the
    three-letter prefix is designated. Chapter 3 provides an incisive discussion on
    this subject.


    First, the prefix identifies all possible device file names that can access the
    stream interface driver.


    Second, the prefix tells the operating system what entry-point file names to expect
    in the stream interface DLL. For example, to implement a device driver for a PC
    Card pager, the PGR indicating PAGER


    as the three-letter prefix, which in turn would dictate entry-point names, such
    as PGR_Init, PGR_IOControl, and so on.


    Device File Name Indexes


    The index differentiates devices with the same prefix that the stream interface
    manages. The index is the digit that follows the prefix. By default, Device Manager
    indexes logically from 1 through 9, with 1


    corresponding to the first device file name. If a tenth device file name is required,
    the index 0 is used.


    If device file names starting index need to be other than 1, a starting index
    in a registry value called **Index** within the registry key is specified. This
    is often necessary if a stream interface driver serves a device that uses a common
    prefix, such as COM. For example, “COM1:”, “COM2:”, and “COM3:” usually correspond
    to built-in serial port hardware. However if a driver is for a serial device,
    such as a packet-radio modem, it should appear as a COM port because modem software
    often assumes that modems are connected to COM ports. Thus an Index value of 4
    is specified to differentiate this packet-radio modem device from the built-in
    serial devices.


    Device Manager can register only one device file name, so if the **Index** value
    is specified, rather than letting Device Manager assign indexes, this device driver
    will support only one device.


    I/O Resource Manager


    When the OS boots, the bus enumerator enumerates the registry and loads all the
    built-in devices based on registry information. The I/O Resource Manager then
    tracks the current state of resources available in the system and manages all
    further I/O resource requests and allocations by bus drivers. Therefore, bus drivers
    should request I/O resources from the I/O Resource Manager when they load a client
    driver for installable devices or other types of devices.


    The I/O Resource Manager is an intrinsic part of Device Manager. The I/O Resource
    Manager tracks the available system resources initialized from the registry before
    any devices are loaded. Tracking these resources prevents accidental collisions
    when more than one device driver attempts to employ the same resources.


    The OAL and the registry are used to pre-allocate IRQ and I/O space resources
    that bus drivers request. However, the I/O Resource Manager is not limited to
    managing I/O and IRQ spaces. Bus drivers, such as the PCI bus driver, request
    IRQ and I/O space resources from the I/O Resource Manager as it loads device drivers
    for the devices found in the registry. The same is true for the PC Card bus driver
    and I/O resources required by PC Card client drivers. When users remove PC Cards
    from the system PC


    Card bus driver releases these resources.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED COMPACT


    Every hardware platform has unique IRQs and I/O space available. IRQs for built-in
    and fixed devices are mapped to interrupt identifiers (SYSINTRs) in the OAL. The
    IRQs for built-in and fixed devices should be excluded from the available resources.
    IRQs used with the PCI bus are usually shared.


    IRQs and I/O space resources are predefined in **HKLM\Drivers\Resources\IRQ**
    and **HKLM\Drivers\Resources\IO** registry keys which provide the initial state
    of the I/O Resource Manager.


