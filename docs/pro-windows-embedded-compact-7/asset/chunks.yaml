    # Loading of Stream Interface Device Drivers


    Loading stream interface device drivers is wholly dependent on the registry. The
    device driver loading process starts with Device Manager reading the registry
    root key which is at `HKLM\Drivers\BuiltIn` to obtain the root path for driver
    loading. See Listing 7-11 for these registry entries. The driver located at this
    key is `BusEnum.dll` which is the Bus Enumerator implemented as a bus device driver.
    Device Manager then calls `ActivateDeviceEx` to activate the Bus Enumerator. Once
    the Bus Enumerator is activated it iterates on all the nodes directly under the
    RootKey will be automatically loaded at boot by the Bus Enumerator. See Listing
    7-12 for an example. These stream device drivers are typically referred to as
    “Built in” drivers. Built in drivers often include other bus drivers such as PCI,
    USB etc that each manage their own buses.


    *Listing 7-11\. Registry keys for Bus Enumerator*


    ```

    [HKEY_LOCAL_MACHINE\Drivers]

    "RootKey"="Drivers\\BuiltIn"

    "ProcName"="udevice.exe"

    "ProcVolPrefix"="$udevice"

