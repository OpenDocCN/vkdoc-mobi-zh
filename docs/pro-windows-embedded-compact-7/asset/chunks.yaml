    开发者通过示例学习。尽管我们学习理论，但作为人类，我们仍然通过分析示例来学习。这就是我们小时候学习做事的方式，这也是为什么书籍中充满了示例；本书也不例外。


    Windows CE 文档中提供了一个名为“如何创建设备驱动程序”的主题。在该主题的第 4 步中，它告诉您“将电源管理开发示例驱动程序复制到您的操作系统设计中”。然后，它会指导您在创建过程的其余步骤中该如何操作。

