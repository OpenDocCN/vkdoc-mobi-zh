    The ISR handler code uses a port I/O call to check the status of the device. You
    may have a scenario that requires a much more complex implementation. An example
    of such an ISR can be found in


    **%WINCEROOT%\public\COMMON\oak\drivers\serial\isr16550.** If the device is not
    the source of the interrupt, the return value will be **SYSINTR_CHAIN**. This
    return value tells the ***NKChainIntr*** function that our device was not the
    source of the interrupt and that other ISRs in the chain should be evaluated.
    If a valid **SYSINTR** is returned by the ISR, then ***NKChainIntr*** will immediately
    return and not call any other ISRs on the list. This provides a priority ordering.
    The first loaded installable ISR is loaded first on the list, or highest interrupt
    request level, subsequent installable ISRs are then added to the bottom of the
    list.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ DEVICE DRIVER I/O AND INTERRUPTS


    The highest interrupt request level installable ISR in the chain should be installed
    first for both priority and speed of execution.


    Nested ISRs


    Because Windows Embedded Compact 7 is an RTOS it needs to service highest interrupt
    request level interrupts as soon as these are triggered to prevent loss or delay,
    therefore the kernel employs nesting for interrupts. Nested interrupts allow interrupt
    requests of a higher interrupt request level to preempt IRQs of a lower interrupt
    request level. The following steps are taken by the kernel to handle nested interrupts:


    • The kernel disables all other IRQs with the same or lower IRQ level as the IRQ
    that invoked the current ISR call.


    • If a higher IRQ level arrives before the current ISR completes processing, the
    kernel saves the current ISR state (The state includes only those registers that
    are supported for use in an ISR to save time).


    • The kernel calls the IRQ level ISR to handle the new request.


    • The kernel restores the original ISR''s state and continues processing.


    The Interrupt Service Thread - IST


    The IST is a thread that is scheduled when the related **SYSINTR** is returned
    by the ISR. Once it completes its processing of the interrupt it signals the kernel
    to re-enable the physical interrupt on the I/O device related to this IST, and
    blocks until another interrupt needs to be processed.


    The following steps are typical in creating and launching an IST:


    • Create an event


    • Associate the event with the corresponding **SYSINTR**


    • Create the IST itself


    • Set the ISTs priority


    • Optionally set the ISTs quantum


    Listing 8-5 shows a sample code generated by the device driver wizard to create
    and launch an interrupt service thread.


