    CHAPTER 6 ■ UNDERSTANDING DEVICE DRIVER TYPES


    Monolithic vs. Layered Device Drivers


    Windows Embedded Compact 7 device drivers can conform to either a monolithic or
    layered organizational model. A monolithic device driver is based on a single
    piece of code that exposes the hardware device''s functionality directly to the
    operating system. A layered device driver consists of two layers:


    • A model device driver (MDD) layer, which is the upper layer interfacing to the
    OS.


    •


    Accesses its devices through the PDD layer.


    •


    Implements a Device Driver Interface (DDI), a set of functions called by the operating
    system components such as GWES or Device Manager.


    • A platform-dependent driver (PDD) layer, which is the lower layer interfacing
    to the underlying hardware.


    •


    Hardware dependent; typically must be customized to specific hardware.


    •


    Links the MDD to the hardware.


    •


    Implements a Device Driver Service Provider Interface (DDSI)


    •


    A set of functions called by the MDD layer.


    Figure 6-1 shows a comparison between the layered device driver model and the
    monolithic model.


    Note however that monolithic device drivers can be either native or stream device
    drivers even though the figure only depicts a native monolithic device driver
    because of lack of space.


    *Figure 6-1\. Monolithic vs. Layered device drivers*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ UNDERSTANDING DEVICE DRIVER TYPES


    Device Interface Class


    Device drivers are characterized by the device interface class they expose to
    operating system. A device driver may have multiple device interface classes,
    or it can have none. Question is, why do I care what interface class does a device
    driver belong to? Basically I don’t. However, if for example a device driver supports
    power management, you want to characterize the driver as supporting the generic
    power management class interface, so that power manager can interface with the
    device driver.


    Typically, however exposing an interface class by a device driver allows Device
    Manager to notify applications, services, or other device drivers the appearance
    and disappearance of the device interface.


    This is important for device drivers managing Plug and Play devices, USB devices,
    or other detachable media. It is also important for mountable storage device notifying
    an application of a volume being mounted or dismounted.


    Applications, services, or device drivers that need to be notified of the appearance
    and disappearance of device interfaces need to register with Device Manager in
    order to be notified. The next section deals with device interface notifications.


    Device Interface GUID


    The header file that declares the interface typically defines the GUID and to
    be associated with the interface. An example extracted from Storemgr.h for a block
    storage device is listed in listing 6-1.


    Exposing the device interface is performed by publicizing the associated GUID
    by either setting the **IClass** subkey in the registry or by calling **AdvertiseInterface
    during the device driver** **initialization**.


    *Listing 6-1\. Defining a block storage device interface and the associated GUID*


    **#define STORAGE_DEVICE_CLASS_BLOCK 0x1**


