    CHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS


    *Figure 7-13\. User mode device driver displaying a message box*


    Chapter Summary


    The stream device driver has been the mainstay of Windows CE throughout its existence.
    The main difference between earlier versions of Windows CE leading to Windows
    CE 6.0 and Windows CE 6.0 and its successor Windows Embedded Compact 7, is that
    in the older versions stream device drivers where user mode drivers because of
    the architecture. However in the last two versions stream device drivers reside
    either in kernel space or in user space, thus having kernel mode stream device
    drivers and user mode stream device drivers. The former providing better performance,
    and the latter providing robustness, especially for installable device drivers.
    This latest version of Windows CE Device Manager enables us to develop device
    drivers that support asynchronous I/O request handling. Device Manager allows
    creating filter drivers for various capabilities.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 8**


    ****Device Driver I/O and Interrupts**


    The essence of any computer system is to accept input data, process it, and produce
    output. How the system accepts input data is critical for real-time embedded systems.
    Because it needs to process the input data and output a response within a determined
    time interval. The most accurate way to achieve this would be to poll an input
    source constantly for data. This however puts a heavy burden on the CPU, limiting
    the system to just one task. Waiting for input data to arrive and react on it
    alleviates this burden and frees CPU resources. To be able to wait and react,
    we need hardware support for getting CPU


    attention away from its flow of processing.


    Hardware triggered interrupts cause the CPU to stop the flow of execution and
    jump to a specific entry in the code that handles the interrupt. The arrival of
    an interrupt is not predictable; therefore it can occur at any time even when
    another interrupt is being handled. Once the interrupt was processed the CPU resumes
    from the point it stopped.


    In this chapter


    • Interrupt model


    • Interrupt processing


    • I/O memory mapping


    Interrupt Model


    I/O hardware triggers an interrupt whenever it needs the CPU’s attention, because
    its I/O registers changed state. Interrupts may be categorized into maskable,
    non-maskable, inter-processor, and software interrupts.


    • Maskable interrupt – hardware interrupt that may be ignored if masked by setting
    a specific bit in the Interrupt Mask Register (IMR)


    • Non-Maskable interrupt (NMI) – hardware interrupt that cannot be ignored A.
    Kcholi *P*


    , *ro Windows Embedded Compact 7*


    © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ DEVICE DRIVER I/O AND INTERRUPTS


    • Inter-Processor interrupt (IPI) – an interrupt triggered by one processor to
    another in a multiprocessor environment. Mainly used to implement cache coherence.
    In Windows Embedded Compact 7 it has become relevant as it supports multicore
    processors.


    • Software interrupt – an exception triggered by some CPU instruction. Used as
    a trap to execute system calls since the CPU switches to kernel mode.'
