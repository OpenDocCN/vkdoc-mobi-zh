    ## `MiniportResetEx`


    This function is called to reset the NIC adapter hardware device. It first checks
    if another reset is already in progress or being halted. It then aborts any pending
    requests, makes certain it will not wakeup during the reset process. Ask `NDIS`
    to remove the miniport if there is a hardware error or failure. Disable interrupts
    and reset hardware. Free send buffers and restart the receive unit. Listing 10-11
    is an example reset function that uses driver local helper functions.


    *Listing 10-11. Example of `MiniportResetEx` function implementation*


    ```c

    NDIS_STATUS MPReset(IN NDIS_HANDLE MiniportAdapterContext,

    OUT PBOOLEAN AddressingReset)

    {

    NDIS_STATUS Status;

    PNDIS_OID_REQUEST PendingRequest;

    PMP_ADAPTER Adapter = (PMP_ADAPTER) MiniportAdapterContext;


    *AddressingReset = TRUE;


    NdisAcquireSpinLock(&Adapter->Lock);

    NdisDprAcquireSpinLock(&Adapter->SendLock);

    NdisDprAcquireSpinLock(&Adapter->RcvLock);


    ASSERT(!(Adapter->Flags & F_MP_ADAPTER_HALT_IN_PROGRESS)

    != 0));


    // Is this adapter already doing a reset?

    }

    ```'
