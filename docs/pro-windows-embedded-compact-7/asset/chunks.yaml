    Postmortem Debugging and Dr. Watson


    Human beings aren’t perfect, nor are their products. Device driver developers
    are no exception. The development cycle goes from designing the hardware and software
    that is the device driver, on to implementing, debugging, and testing. Once the
    cycle is completed the product is out of the door and is being used. Nevertheless
    from time to time unforeseen problems occur. To solve these problems intelligently,
    postmortem diagnosing and debugging methods have been developed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    Windows Embedded Compact provides for this purpose a set of tools that captures
    key information about the state of the machine at the time of a program crash
    and allows users to report the collected information to the OEMs and Microsoft.


    The standard error report includes helpful information at the time of the crash,
    including:


    • Stack details


    • System information


    • A list of loaded modules


    • Exception type


    • Global and local variables


    Crash information is compressed into a CAB file and, with user consent, sent to
    the Microsoft Watson web site.


    Error Report Generator


    The Error Report Generator is the component responsible for the creation of dump
    files using the configuration options set in the registry.


    To generate an error report dump file, at least 128KB of memory must be reserved.
    The OAL


    developer initializes the size of the memory to be reserved by setting a variable
    named


    ***dwNKDrWatsonSize***. This is done in the ***OEMInit*** function a sample of
    which is shown in Listing 11-12.


    *Listing 11-12\. Initializing memory for error report dump file*


    **// Reserve 128kB memory for Watson Dumps**


    **dwNKDrWatsonSize = 0;**


    **if (dwOEMDrWatsonSize != DR_WATSON_SIZE_NOT_FIXEDUP)**


    **{**


    **dwNKDrWatsonSize = dwOEMDrWatsonSize;**


    **}**


    The kernel will use this size to reserve a block of memory at the end of the main
    memory. The Sysgen variable **SYSGEN_WATSON_DMPGEN** must be set to include the
    Error Report Generator in the image.


    The **[HKLM\System\ErrorReporting\DumpSettings]** registry key holds the registry
    values for error report generation. Listing 11-13 is a sample of such registry
    setting.


    *Listing 11-13\. Registry settings for error reporting for a specific OS design*


    **;---------------------------- start WATSON ----------------------**


    **;**


    **; @CESYSGEN IF** WCESHELLFE_MODULES_DWXFER


    ****;**


    **[HKEY_LOCAL_MACHINE\Drivers\BuiltIn\ErrorReporting]**


    **"Dll"="DwXfer.dll"**


    **"FriendlyName" = "Dump File Transfer"**


    **"PollInterval"=dword:493E0**


    **; @CESYSGEN IF** WCESHELLFE_MODULES_DDXPROBE


    ****; @CESYSGEN ELSE**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


