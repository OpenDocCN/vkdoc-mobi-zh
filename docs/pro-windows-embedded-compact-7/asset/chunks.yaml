    ## 第 4 章 ■ 掌握硬件环境


    ### I/O 设备中断


    任何计算机（嵌入式系统也不例外）的基本概念是，输入某些数据，系统（这里指整个软件包：硬件、操作系统和应用程序）按照设计者的意图处理这些输入数据，并可能据此输出一些数据。获取输入数据的基本方式有两种：要么轮询
    I/O 设备的输入寄存器或端口，一旦数据出现在这些端口上，就取走数据并清除这些端口以接收下一个数据；要么等待 I/O 设备发出信号，告知系统有新数据到达。这两种方式各有优缺点，但现代系统主要依赖后者。I/O
    设备触发的信号使系统暂停当前操作，并获取新的输入数据，也就是说，系统被中断以接受新的数据输入。


    ### 中断优先级


    各种 I/O 外设对系统的重要性不同。尽管系统的实时时钟对操作系统进行时间管理至关重要，但其他设备的重要性可根据其在整个系统中的功能价值，以及可能的设备需求进行配置。例如，监控汽车发动机的
    I/O 设备远比播放多媒体的 I/O 设备重要。


    可编程中断控制器是一种帮助管理来自外设的中断请求的芯片。它判断哪个传入请求具有最高优先级，确定该传入请求的优先级是否高于当前正在服务的级别，并据此向 CPU
    发出中断。


    Windows CE 成为实时操作系统的特性之一，就是使用了嵌套中断。这允许高优先级中断中断对较低优先级中断的处理。


    使用嵌套中断可以防止高优先级中断的丢失和延迟。当更高优先级的中断发生时，内核负责保存 ISR 的状态，并在高优先级 ISR 完成后恢复该状态。在大多数情况下，被抢占的
    ISR 无法检测到它已被抢占。


    ### 中断向量


    中断向量是中断处理程序的内存地址。中断向量被放置在一个称为中断向量表的数组中。在 Windows CE 中，内核中会调用一个由硬件控制的向量函数，因此其实现依赖于
    CPU 家族。向量表由内核在启动时初始化。当你安装 Platform Builder 并接受安装 Windows CE 源代码的条款时，你可能希望查看 `C:\WINCE700\PRIVATE\WINCEOS\COREOS\CORE\DLL\exdsptch.c`
    中的代码，该文件实现了分发中断向量的函数。


    ### 信号机制


    硬件设计者设计了两种产生中断的方案。一种是中断信号线上的状态从 0 变为 1，或从 1 变为 0。这被称为上升沿检测或下降沿检测触发。这种方案存在一个问题：它对电气噪声敏感。即使没有新数据需要产生中断，一个随机的尖峰信号也可能触发中断。另一种方案是电平触发，即设备将中断线保持在一个稳定的电平上，直到中断服务程序解除该中断。这种方案对电气噪声的抵抗力更强。


    在本节中，我们只是浅尝辄止地介绍了硬件处理中断的方式以及它与 Windows CE 的关系。为了理解你所使用的处理器如何处理中断，你需要阅读与中断控制器相关的文档，例如《系统与定时器配置开发人员手册》的第
    9 章，该手册是 Marvell PXA3xx 处理器系列开发人员文档的第一卷。


    ### I/O 设备内存


    设备驱动程序必须在外部设备和系统内存之间移动数据。硬件采用三种机制来执行内存传输：


    - 程序化 I/O (PIO)

    - 设备专用内存

    - 直接内存访问 – DMA


    设备使用的内存传输机制取决于它需要移动的数据量大小、设备速度以及它可能所属设备类别的标准。


    #### 程序化 I/O (PIO)


    程序化输入/输出是一种在 CPU 和外设（如 ATA 存储设备）之间传输数据的方法。这种机制基本上是利用 CPU 来寻址内存并移动数据。


    PIO 设备通常在每次数据传输后产生一次中断。一些 PIO 硬件设备具有内部缓冲区或 FIFO 来减少中断频率。即便如此，大量的传输需要大量的 CPU 活动，并且仍然会产生大量的中断，从而导致系统性能下降。


    > **注意** 典型的 PIO：例如，如果你的设备使用 I/O 端口，那么它默认使用 PIO。但是，如果你使用内存操作指令从内存映射的数据寄存器中读取或写入数据，这同样被视为
    PIO。


    #### 设备专用内存


    有些设备需要物理内存中的专用地址范围。其原因可能是该设备使用一块内存作为数据传输的缓冲区，例如视频采集设备。另一个原因是该设备可能有一个内部 ROM，其中保存了某些启动代码，为了让
    CPU 执行它，它必须是内存地址空间的一部分。


    #### 直接内存访问 – DMA


    直接内存访问，简称 DMA，是一种无需 CPU 干预即可在 I/O 设备和内存之间移动数据的机制。DMA 有两种模式：系统 DMA 和更现代的**总线主控
    DMA**。DMA 提供高性能的数据传输。有几种 DMA 传输类型。


    - **公共缓冲区 DMA** - 在公共缓冲区 DMA 中，驱动程序和系统共享同一块内存区域用于数据传输。驱动程序负责同步对缓冲区的访问。该内存不被缓存，这使得驱动程序更容易进行同步。设置好公共缓冲区后，驱动程序和硬件都可以直接写入缓冲区中的地址。


    - **数据包 DMA** - 当存在一个单一的现有缓冲区，必须将其映射供硬件使用时执行。例如，在将文件从内存传输到磁盘时使用数据包 DMA。为此操作使用公共缓冲区
    DMA 将是一种浪费，因为文件必须先传输到公共缓冲区，然后硬件才能将其传输到磁盘。

