    *Figure 10-4\. Network device drivers as related to the OSI model*


    Physical Layer


    This layer manages the reception and transmission of the unstructured raw bit
    stream over a physical medium. The physical layer is implemented by the network
    interface card (NIC), its transceiver, and the medium to which the NIC is attached


    Data Link Layer


    The data link layer is composed of two sub layers:


    • LLC - Logical Link Control


    •


    The LLC sub-layer provides error-free transfer of data frames from one node to
    another


    • MAC - Media Access Control


    •


    The MAC sub-layer manages access to the physical layer, checks frame


    errors, and manages address recognition of received frames


    Network Layer


    This layer determines the physical path that the data should take, based on the
    following:


