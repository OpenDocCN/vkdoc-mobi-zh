    Kernel Mode Device Drivers


    The Device Manager loads all stream device drivers into kernel space as kernel
    mode drivers accept for device drivers that set the DEVFLAGS_LOAD_AS_USERPROC
    flag in the registry. Kernel mode drivers provide the best performance since they
    can call kernel APIs directly using the kernel version of coredll.dll named k.coredll.dll.


    Kernel mode device drivers must be robust because they have unlimited access to
    kernel data structures and kernel space memory. A faulty kernel mode device driver
    can corrupt kernel memory thus causing a system crash. Kernel mode device drivers
    can synchronously access user buffers very quickly because user memory is directly
    available.


    Access Checking


    A stream device driver can accept input and output buffers from a calling user
    mode process, which presents a problem mapping these user mode virtual memory
    pointers to kernel mode virtual memory pointers. In Windows CE 6.0 and later,
    the kernel performs a full access check on pointer parameters, 111


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-126_1.jpg)


