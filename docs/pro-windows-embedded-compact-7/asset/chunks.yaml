    \   DDKISRINFO IsrInfo;\n    PTST_DEVCONTXT pDevContxt = NULL;\n\n    // Allocate\
    \ device instance context structure\n    DWORD dwPhAdd;\n    pDevContxt = (PTST_DEVCONTXT)AllocPhysMem(sizeof(TST_DEVCONTXT),\n\
    \        PAGE_READWRITE, 0, 0, &dwPhAdd);\n    if (pDevContxt != NULL)\n    {\n\
    \        InitializeCriticalSection(&pDevContxt->CriticalSection);\n        pDevContxt->hDriverMan\
    \ = (HANDLE)GetCurrentProcessId();\n    }\n    else\n    {\n        DEBUGMSG(ZONE_INIT,\
    \ (_T(\"TST!not enough memory\\r\\n\")));\n        return dwRet;\n    }\n\n  \
    \  // Open active device registry key to retrieve activation\n    // info\n  \
    \  DEBUGMSG(ZONE_INIT, (_T(\"TST!Starting TST_Init\\r\\n\")));\n    if (hConfig\
    \ = OpenDeviceKey(pContext))\n    {\n        // Read window information\n    \
    \    WinInfo.cbSize = sizeof(WinInfo);\n        dwStatus = DDKReg_GetWindowInfo(hConfig,\
    \ &WinInfo);\n        if (dwStatus != ERROR_SUCCESS)\n        {\n            DEBUGMSG(ZONE_INIT,\
    \ (_T(\"TST!Error Getting window information\\r\\n\")));\n            FreePhysMem(pDevContxt);\n\
    \            return dwRet;\n        }\n        pDevContxt->dwBusNumber = WinInfo.dwBusNumber;\n\
    \        pDevContxt->dwInterfaceType = WinInfo.dwInterfaceType;\n\n        //\
    \ Read ISR information\n        IsrInfo.cbSize = sizeof(IsrInfo);\n        dwStatus\
    \ = DDKReg_GetIsrInfo(hConfig, &IsrInfo);\n        if (dwStatus != ERROR_SUCCESS)\n\
    \        {\n            DEBUGMSG(ZONE_INIT,\n                (_T(\"TST!Error Getting\
    \ ISR information\\r\\n\")));\n            FreePhysMem(pDevContxt);\n        \
    \    return dwRet;\n        }\n    }\n    else\n    {\n        DEBUGMSG(ZONE_INIT,\n\
    \            (_T(\"TST!Failed to open active device key\\r\\n\")));\n        FreePhysMem(pDevContxt);\n\
    \        return dwRet;\n    }\n\n    RegCloseKey(hConfig);\n\n    // Obtain hardware\
    \ I/O address - initialized to memory mapped\n    // IO space\n    pDevContxt->ioPhysicalBase.LowPart\
    \ = WinInfo.memWindows[0].dwBase;\n    pDevContxt->ioPhysicalBase.HighPart = 0;\n\
    \    pDevContxt->dwIoRange = WinInfo.memWindows[0].dwLen;\n    if (HalTranslateBusAddress(\n\
    \            (INTERFACE_TYPE)pDevContxt->dwInterfaceType,\n            WinInfo.dwBusNumber,\n\
    \            pDevContxt->ioPhysicalBase, &unIoSpace,\n            &pDevContxt->ioPhysicalBase))\n\
    \    {\n        // It is memory mapped IO and not in IO space.\n        if (!unIoSpace)\n\
    \        {\n            pDevContxt->bIoMemMapped = TRUE;\n            if ((pDevContxt->dwIoAddr\
    \ =\n                (DWORD)MmMapIoSpace(pDevContxt->ioPhysicalBase,\n       \
    \         pDevContxt->dwIoRange, FALSE)) == NULL)\n            {\n           \
    \     DEBUGMSG(ZONE_INIT,\n                    (_T(\"TST!Error mapping IO Ports\
    \ failure\\r\\n\")));\n                FreePhysMem(pDevContxt);\n            \
    \    // You may want to disable IO device here\n                return dwRet;\n\
    \            }\n            else\n            {\n                pDevContxt->bIoMemMapped\
    \ = FALSE;\n                pDevContxt->pIoAddr =\n                    (UCHAR)pDevContxt->ioPhysicalBase.LowPart;\n\
    \            }\n        }\n    }\n    else\n    {\n        DEBUGMSG(ZONE_INIT,\n\
    \            (_T(\"TST!Error HalTranslateBusAddress call failure\\r\\n\")));\n\
    \        FreePhysMem(pDevContxt);\n        // You may want to disable IO device\
    \ here\n        return dwRet;\n    }\n\n    bRc = DMAInitialize(0, pDevContxt);\
    \ // a device driver\n    // local function\n    if (!bRc)\n    {\n        FreePhysMem(pDevContxt);\n\
    \        return 0;\n    }\n}\n```"
