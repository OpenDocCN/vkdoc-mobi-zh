    \n//\n// IOCTL_DEMODRVR_FOO2\n//\n#define IOCTL_DEMODRVR_FOO2 \\\n    CTL_CODE(IOCTLDEVTYPE_DEVICE_DEMODRVR,\
    \ 0x101, METHOD_BUFFERED, FILE_ANY_ACCESS)\n\n#endif /* __DEMODRVRSDK_H__ */\n\
    ```\n\n清单 9-4 中的文件示例由设备驱动程序向导生成，输入所需的`IOCTL`功能代码文本，并选择所需的访问权限，如图 9-1 所示。该头文件与设备驱动程序实现的其他文件分离，以便分发给应用程序开发人员，用于控制特定设备驱动程序的代码中。\n\
    \n*图 9-1. 定义 IOCTL 并将其添加到设备驱动程序定义中*\n\n## 处理设备特定的 IOCTL\n\n假设清单 9-4 中定义的`IOCTL_DEMODRVR_FOO1`处理某些异步\
    \ I/O 操作。实现此功能必须编码在流设备驱动程序的`xxx_IOControl`入口点内。清单 9-5 是由设备驱动程序向导生成的骨架代码；它允许开发人员向代码中添加特定于设备驱动程序的功能，以处理异步\
    \ I/O。\n\n*清单 9-5. xxx_IOControl 入口点的骨架实现*\n\n```c\nBOOL DMO_IOControl(DWORD hOpenContext,\
    \ DWORD dwCode, PBYTE pBufIn,\n    DWORD dwLenIn, PBYTE pBufOut, DWORD dwLenOut,\
    \ PDWORD pdwActualOut, HANDLE hAsyncRef)\n{\n    PDMO_DEVCONTXT pDevContxt = (PDMO_DEVCONTXT)hOpenContext;\n\
    \    BOOL bRet = TRUE;\n    DWORD dwErr = 0;\n\n    switch (dwCode)\n    {\n \
    \   case IOCTL_DEMODRVR_FOO1:\n        // 如果需要则进入临界区，否则删除\n        // EnterCriticalSection(\n\
    \        // &pDevContxt->CriticalSection);\n        // 添加实现代码\n        bRet =\
    \ Foo1(hAsyncRef, pDevContxt);\n\n        if (!bRet)\n        {\n            //\
    \ 处理错误\n        }\n\n        // LeaveCriticalSection(\n        // &pDevContxt->CriticalSection);\n\
    \        break;\n\n    ...\n    ...\n    ...\n\n    default:\n        break;\n\
    \    }\n    return bRet;\n}\n```\n\n清单 9-5 中加粗并带下划线的代码行实际提供了所需功能。`Foo1`函数是一个内部函数，如清单\
    \ 9-6 所示。然而，您也可以直接将此函数中包含的代码插入到 IOCTL 的 case 处理中。但是，此`IOControl`入口点可能会变得难以跟踪和维护。\n\
    \n*清单 9-6. Foo1 的示例实现*\n\n```c\nBOOL Foo1(HANDLE _hAsyncRef, PDMO_DEVCONTXT _pDevContxt)\n\
    {\n    HANDLE hAsyncIO = NULL;\n\n    if (_hAsyncRef)\n    {\n        hAsyncIO\
    \ = CreateAsyncIoHandle(\n            hAsyncRef, (LPVOID*)pBufIn, 0);\n    }\n\
    \n    CeOpenCallerBuffer(\n        (PVOID*)(&g_AsyncParams.pBufIn),\n        (PVOID)pBufIn,\n\
    \        dwLenIn, ARG_O_PTR, TRUE);\n\n    EnterCriticalSection(&_pDevContxt->CriticalSection);\n\
    \    g_AsyncParams.hAsyncIO = hAsyncIO;\n    g_AsyncParams.dwInLen = dwLenIn;\n\
    \    LeaveCriticalSection(&_pDevContxt->CriticalSection);\n\n    g_hAsyncThread\
    \ = CreateThread(NULL, 163840,\n        (LPTHREAD_START_ROUTINE)AsyncThread,\n\
    \        (LPVOID)&g_AsyncParams,\n        CREATE_SUSPENDED | STACK_SIZE_PARAM_IS_A_RESERVATION,\
    \ NULL);\n\n    if (g_hAsyncThread == NULL)\n    {\n        DEBUGMSG(ZONE_IOCTL,\n\
    \            (_T(\"DMO! AsyncThread: Failed to create thread\\r\\n\")));\n   \
    \     return FALSE;\n    }\n\n    ResumeThread(g_hAsyncThread);\n    return TRUE;\n\
    }\n```\n\n## 电源管理支持\n\n一个使用 IOCTL 提供自定义设备控制的好例子是支持电源管理的设备驱动程序处理的电源管理 I/O 控制。电源管理支持由特定\
    \ IOCTL 提供，电源管理器调用这些 IOCTL 来检索设备特定功能的信息——`IOCTL_POWER_CAPABILITIES`。电源管理器调用`IOCTL_POWER_GET`来检索设备电源状态。电源管理器调用`IOCTL_POWER_SET`来请求将设备电源状态从一种状态更改为另一种状态。早期版本的\
    \ Windows CE 还有一个 IOCTL，在 Windows Embedded Compact 7 中已弃用——`IOCTL_POWER_QUERY`。清单\
    \ 9-7 是前三个电源管理 IOCTL 的典型实现。\n\n*清单 9-7. 电源管理 IOCTL 实现*\n\n```c\ncase IOCTL_POWER_CAPABILITIES:\n\
    \    // 向电源管理器报告此信息。\n    if (pBufOut != NULL &&\n        dwLenOut >= sizeof(POWER_CAPABILITIES)\
    \ &&\n        pdwActualOut != NULL)\n    {\n        __try {\n            PPOWER_CAPABILITIES\
    \ ppc =\n                (PPOWER_CAPABILITIES) pBufOut;\n            memset(ppc,\
    \ 0, sizeof(POWER_CAPABILITIES));\n            ppc->DeviceDx = 0x11; // 支持 D0,\
    \ D4\n            ppc->WakeFromDx = 0x00; // 无唤醒能力\n            ppc->InrushDx\
    \ = 0x00; // 无浪涌要求\n            ppc->Power[D0] = 600; // 0.6W\n            ppc->Power[D1]\
    \ = (DWORD) PwrDeviceUnspecified;\n            ppc->Power[D2] = (DWORD) PwrDeviceUnspecified;\n\
    \            ppc->Power[D3] = (DWORD) PwrDeviceUnspecified;\n            ppc->Power[D4]\
    \ = 0;\n            ppc->Latency[D0] = 0;\n            ppc->Latency[D1] = (DWORD)\
    \ PwrDeviceUnspecified;\n            ppc->Latency[D2] = (DWORD) PwrDeviceUnspecified;\n\
    \            ppc->Latency[D3] = (DWORD) PwrDeviceUnspecified;\n            ppc->Latency[D4]\
    \ = 0;\n            ppc->Flags = 0;\n            *pdwActualOut = sizeof(POWER_CAPABILITIES);\n\
    \            dwErr = ERROR_SUCCESS;\n        }\n        __except(EXCEPTION_EXECUTE_HANDLER)\n\
    \        {\n            DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!Exception\
    \ in ioctl.\\r\\n\")));\n        }\n    }\n    break;\n\ncase IOCTL_POWER_SET:\n\
    \    if (pBufOut != NULL &&\n        dwLenOut >= sizeof(POWER_CAPABILITIES) &&\n\
    \        pdwActualOut != NULL)\n    {\n        EnterCriticalSection(&pDevContxt->CriticalSection);\n\
    \        __try {\n            CEDEVICE_POWER_STATE NewDx =\n                *(PCEDEVICE_POWER_STATE)pBufOut;\n\
    \            if(VALID_DX(NewDx))\n            {\n                *(PCEDEVICE_POWER_STATE)\
    \ pBufOut = NewDx;\n                *pdwActualOut = sizeof(CEDEVICE_POWER_STATE);\n\
    \                pDevContxt->psPowerState = NewDx;\n                dwErr = ERROR_SUCCESS;\n\
    \            }\n            DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!IOCTL_POWER_SET\
    \ %u %s passing back %u\\r\\n\"),\n                NewDx, dwErr == ERROR_SUCCESS\
    \ ? _T(\"succeeded\") :\n                _T(\"failed\"), pDevContxt->psPowerState));\n\
    \        }\n        __except(EXCEPTION_EXECUTE_HANDLER)\n        {\n         \
    \   DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!Exception in ioctl.\\r\\n\"\
    )));\n        }\n        LeaveCriticalSection(&pDevContxt->CriticalSection);\n\
    \    }\n    break;\n\ncase IOCTL_POWER_GET:\n    if (pBufOut != NULL &&\n    \
    \    dwLenOut >= sizeof(POWER_CAPABILITIES) &&\n        pdwActualOut != NULL)\n\
    \    {\n        EnterCriticalSection(&pDevContxt->CriticalSection);\n        __try\
    \ {\n            CEDEVICE_POWER_STATE NewDx =\n                *(PCEDEVICE_POWER_STATE)\
    \ pBufOut;\n            *(PCEDEVICE_POWER_STATE) pBufOut =\n                pDevContxt->psPowerState;\n\
    \            *pdwActualOut = sizeof(CEDEVICE_POWER_STATE);\n            dwErr\
    \ = ERROR_SUCCESS;\n            DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!IOCTL_POWER_GET\
    \ %s passing back %u\\r\\n\"),\n                dwErr == ERROR_SUCCESS ? _T(\"\
    succeeded\") :\n                _T(\"failed\"), pDevContxt->psPowerState));\n\
    \        }\n        __except(EXCEPTION_EXECUTE_HANDLER)\n        {\n         \
    \   DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!Exception in ioctl.\\r\\n\"\
    )));\n        }\n        LeaveCriticalSection(&pDevContxt->CriticalSection);\n\
    \    }\n    break;\n```\n\n## 章节总结"
- fmt: "I/O control is a mechanism that allows user mode applications to communicate\
    \ custom requests to a kernel mode device driver. This is also true for user mode\
    \ device drivers. It is the device driver implementation that dictates which IOCTLs\
    \ can be handled by the device driver. There are Microsoft predefined IOCTLs for\
    \ various device driver classes, so it is good practice to check those if you\
    \ are writing a device driver such as a storage disk device driver for example,\
    \ because you will have to implement those predefined IOCTLs. You can create custom\
    \ I/O control codes for the device driver you are implementing but remember to\
    \ provide a header file that defines these custom IOCTLs so application developers\
    \ can compile the code that uses these.\n\n`Device Manager` exposes a special\
    \ function `DeviceIoControl` for applications to call and pass IOCTL codes and\
    \ buffers for either input or output or both if required by a custom IOCTL. This\
    \ function accepts an `OVERLAPPED` structure in Windows Embedded Compact 7 so\
    \ your device driver implementation can provide asynchronous I/O support for such\
    \ I/O requests.\n\n---\n\n## Chapter 10: Network Driver Interface Specification\
    \ and Network Device Drivers\n\nThe Network Driver Interface Specification (NDIS)\
    \ is the specification for network driver architecture that allows transport protocols\
    \ such as TCP/IP, Native ATM, IPX, and NetBEUI to communicate with an underlying\
    \ network adapter. The implementation of this specification is an applicative\
    \ framework for developing network device drivers. Network device drivers provide\
    \ access for Windows Embedded Compact 7 based devices to local and wide area networks.\
    \ The Windows Embedded Compact-based communications architecture supports network\
    \ device drivers’ implemented using Network Driver Interface Specification (NDIS)\
    \ framework as well as technologies such as Remote NDIS (RNDIS), NDISWAN, Token\
    \ Ring, Wi-Fi, IrDA, and Bluetooth.\n\nIn this chapter:\n- The OSI model\n- NDIS\
    \ as a programming framework\n- NDIS miniport drivers\n\n## Overview\n\nNetworks\
    \ allow a multitude of computers to communicate data between them over some physical\
    \ lines of communication, and yes I have heard of wireless communications too.\
    \ Obviously this presents some obstacles, as huge chunks of data will create traffic\
    \ jams. How does one computer weed out the data so it takes in only the data that\
    \ is directed to it? Most of these problems were solved by packet switching networking,\
    \ where data was broken up into small chunks, called packets, and sent individually.\n\
    \nHistorically, the biggest advance was made in the early 1980s. Funded by the\
    \ DoD’s Advanced Research Projects Agency (ARPA) the ARPANET has evolved and the\
    \ ARPA internetworking protocol better known as TCP/IP has become the standard.\
    \ Figure 10-1 shows the TCP/IP protocol flow, where the network interface layer\
    \ is responsible for transacting frames with the physical network, the Internet\
    \ layer encapsulate packets into Internet datagrams and deals with routing. The\
    \ transport layer provides communication sessions between computers, and the application\
    \ layer provides APIs for the application to connect to the transport layer.\n\
    \n*Figure 10-1. TCP/IP*\n\nThis still presented a heavy load of implementation\
    \ for both top and bottom layers, which motivated the formation of the ISO Open\
    \ Systems Interconnection (OSI) model (shown in comparison to TCP/IP in Figure\
    \ 10-2).\n\n*Figure 10-2. OSI model in relation to TCP/IP*\n\nThe OSI model is\
    \ the basis to the networking architecture of Windows Embedded Compact 7.\n\n\
    ## NDIS\n\nThe Network Driver Interface Specification (NDIS) framework abstracts\
    \ the network hardware from network drivers. NDIS also specifies a standard interface\
    \ between layered network drivers, thereby abstracting lower-level drivers that\
    \ manage hardware from upper-level drivers, such as network transports. NDIS maintains\
    \ state information and parameters for network drivers, including pointers to\
    \ functions, handles, and parameter blocks for linkage, and various system values.\
    \ Figure 10-3 demonstrates how the NDIS framework relates to network drivers using\
    \ it.\n\n*Figure 10-3. NDIS framework and network drivers*\n\n## The Network Device\
    \ Driver Layers\n\nIn all Windows OS versions the network drivers implement the\
    \ four layers just above the physical communication medium as can be seen in Figure\
    \ 10-4.\n\n*Figure 10-4. Network device drivers as related to the OSI model*\n\
    \n### Physical Layer\n\nThis layer manages the reception and transmission of the\
    \ unstructured raw bit stream over a physical medium. The physical layer is implemented\
    \ by the network interface card (NIC), its transceiver, and the medium to which\
    \ the NIC is attached.\n\n### Data Link Layer\n\nThe data link layer is composed\
    \ of two sub layers:\n\n- **LLC** - Logical Link Control\n  - The LLC sub-layer\
    \ provides error-free transfer of data frames from one node to another.\n- **MAC**\
    \ - Media Access Control\n  - The MAC sub-layer manages access to the physical\
    \ layer, checks frame errors, and manages address recognition of received frames.\n\
    \n### Network Layer\n\nThis layer determines the physical path that the data should\
    \ take, based on the following:\n- Network conditions\n- Priority of service\n\
    \nOther factors include routing, traffic control, frame fragmentation and reassembly,\
    \ logical-to-physical address mapping, and usage accounting.\n\n### Transport\
    \ Layer\n\nThis layer ensures that messages are delivered error-free, in sequence,\
    \ and with no loss or duplication.\n\n## NDIS Miniport Driver\n\nA miniport driver\
    \ implements the lower edge data link layer. It handles hardware-specific operations\
    \ necessary to manage a network adapter. The physical NIC type influences the\
    \ miniport driver adapter.\n\n- **Bus master DMA NIC** - The miniport driver typically\
    \ supports multi-packet sends and receives.\n- **Subordinate DMA NIC** - The miniport\
    \ driver uses the system DMA controller to manage the transfer of packet data\
    \ to and from the network.\n- **Programmed I/O NIC** - The miniport driver uses\
    \ NDIS functions to move outgoing frames byte by byte, or other types to device\
    \ registers and then causes the device to send the data. It is very rare these\
    \ days to find such network cards and highly unlikely that you will implement\
    \ such drivers.\n- **Onboard shared memory NIC** - The miniport driver must map\
    \ the NIC's shared memory to host memory and then copy outgoing packets to the\
    \ NIC memory. It copies incoming frames from NIC memory to buffers that upper\
    \ layer protocol drivers supply.\n\nNDIS miniport NIC driver communicates with\
    \ its NIC and with higher-level drivers through the NDIS framework see Figure\
    \ 10-3. NDIS framework functions export a full set of functions, typically prefixed\
    \ by `Ndis`, these functions encapsulate all the operating system functions that\
    \ a miniport needs to call. The NDIS miniport driver, in turn, must export a set\
    \ of entry points, that the NDIS framework calls for its own purposes or on behalf\
    \ of higher-level drivers to access the miniport.\n\nA miniport driver sustains\
    \ information about its capabilities and status, and information about the NIC\
    \ that it controls. An object identifier (OID) is system-defined constant and\
    \ identifies each information type.\n\n### NDIS Miniport Driver Functions"
