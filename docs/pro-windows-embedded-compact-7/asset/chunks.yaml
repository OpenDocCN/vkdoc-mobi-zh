    ## 章节总结


    测试是开发中至关重要的一环，如今已成为大多数供应商的必备实践。如果不对设备驱动程序进行测试和验证，就无法获得 ISO 9000 认证。微软要求对 Windows
    Embedded Compact 7 的设备驱动程序进行测试和认证。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 12 章：使用 CTK 开发测试代码


    在 Windows Embedded Compact 7 中，可通过 TUX 工具对设备驱动程序进行测试。虽然并非强制使用 TUX，但它是一个可用的选择，并且能与
    Windows Embedded Compact 测试工具包（CTK）服务器良好配合。它提供了丰富的功能和全面的图形用户界面。您可以在 TUX 中开发测试用例，并使用代码骨架
    DLL 作为开发起点来创建测试 DLL。CTK 生成的日志文件有助于分析结果，从而提供更可靠、性能更佳的设备驱动程序。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


