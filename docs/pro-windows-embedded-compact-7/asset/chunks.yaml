    Performance testing


    Testing for performance is really evaluating a reference yardstick to which results
    are compared. If the comparison result is better or equal to this reference then
    the test passes; if it is inferior to the reference value then the test fails.
    The functionality test returns a pass result if the device drivers provides asynchronous
    I/O write request. Extending the test to measure the duration of this request
    and comparing it to a specific reference tick count provides the testers a performance
    test.


    Adding a Second Test Procedure


    Adding a second test procedure to Demodrvrtest TUX test DLL means that a second
    test procedure is added to the code. Listing 12-3 shows how test.cpp was modified
    to provide two tests and Listing 12-4


    demonstrates how the second function was added to the TUX function table so that
    it can be registered by the ***ShellProc*** function. This implementation is a
