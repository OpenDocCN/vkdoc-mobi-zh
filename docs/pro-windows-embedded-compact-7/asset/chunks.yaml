    ## Chapter Summary


    Testing is a crucial part of development that is now a required practice by most
    vendors. You cannot receive ISO 9000 certification if you do not test your device
    drivers and verify them. Microsoft requires tests to verify and certify device
    drivers for Windows Embedded Compact 7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 12: Using CTK to Develop Test Code


    Testing device drivers in Windows Embedded Compact 7 is available through the
    TUX harness. You are not limited to using TUX but it is available and it combines
    well to operate with the Windows Embedded Compact Test Kit (CTK) server. It provides
    extensive capabilities and comprehensive graphic user interface. You develop test
    cases in TUX and test DLLs using a code skeleton DLL as a jumpstart for development.
    Analyzing results is aided by log files created by CTK for supplying more reliable
    and better performing device drivers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


