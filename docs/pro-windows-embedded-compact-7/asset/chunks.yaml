    Hardware Assisted Debugging


    The advantages that can be gained using hardware assisted debuggers are manifold.
    The first and most important is when you just start out and you don’t even have
    a bootloader, never mind an operating system. What does it really mean hardware
    assisted debugger? Most CPUs provide on-chip debug support. The ARM Debug Architecture
    for example uses the existing JTAG interface as a method of accessing the core.


    The scan chains that are around the core for production test are reused in debug
    state to capture information from the databus and to insert new information into
    the core or the memory. There are two scan chains around the core:


    • A scan chain around the whole periphery of the core


    • A subset of the first scan chain, covering only the databus and breakpoint 203


