    Only the low byte of this register is used as the data sent and received is byte
    size. This means that only bits 0-7 are bytes to read from and write to.


    I/O Port Registers


    Depending on the system’s CPU architecture, the peripheral device registers can
    be specific I/O space addresses. These addresses are not part of the memory space
    that the CPU can address. These addresses can only be accessed by special machine
    instructions. For example Intel’s x86 architecture provides an I/O address space
    that is separate and distinct from the physical-memory address space. The I/O


    address space consists of 216 (64KB) individually addressable 8-bit I/O ports,
    numbered 0 through FFFFH. Any two consecutive 8-bit ports can be treated as a
    16-bit port, and any four consecutive ports can be a 32-bit port. In this manner,
    the processor can transfer 8, 16, or 32 bits to or from a device in the I/O address
    space. However you should consult the Intel x86 developer’s documentation on the
    differences between various versions.


    Memory Mapped Registers


    Memory mapped I/O on the other hand means that a peripheral device’s registers
    are regarded as part of the physical memory of the system and are accessed as
    any other memory address. However you should note that caching of the address
    space mapped for I/O operations must be prevented. Preventing caching is CPU related
    and usually the BSP developers will see to provide the correct method.


    Furthermore, these registers become part of the virtual address space. Since Windows
    CE software, either user mode or kernel mode use virtual addresses in mapping
    I/O registers to memory it is preferred. Moreover performance of peripheral devices
    with large register sets is greatly improved by using memory mapping scheme even
    if the CPU architecture provides for specific I/O space. Typically I/O specific
    machine instructions are slower than using memory access instructions.


    Accessing Registers


    Whatever scheme of accessing I/O registers is employed, these must be accessed
    by the device driver in order to control the device, query its status and retrieve
    or dispatch data. To achieve this there are a few cardinal rules we have to follow
    when we embark on developing device drivers. The following is a list of the most
    important of these rules:


