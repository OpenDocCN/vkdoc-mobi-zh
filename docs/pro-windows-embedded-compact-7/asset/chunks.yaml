    # 分散/聚集 DMA


    `分散/聚集 DMA`是一种快捷方法，可以一次设置多个数据包`DMA`传输。例如，如果你要通过网络传输一个数据包，网络协议栈的每一层都会添加自己的头部（`TCP`、`IP`、`以太网`等等）。这些头部都从内存中的不同位置分配。


    # 系统 DMA


    `系统 DMA`是通过对系统主板上的系统`DMA 控制器`（`DMAC`）进行编程来直接执行传输的。`DMAC`充当一个非常简单的处理器，能够在**外设**和主内存之间移动指定数量的字节。在`I/O`操作开始时，设备驱动会将内存地址和传输计数加载到`DMAC`中，其余工作由`DMAC`完成。当`DMAC`完成数据移动后，它会生成一个中断来通知完成。在`DMAC`传输数据期间，驱动被挂起，`CPU`可以自由处理其他任务。这是`ISA`总线上典型的`DMA`操作。现代外设大多使用`总线主控
    DMA`。


    # 总线主控 DMA


    一个内置了自身`DMAC`的`I/O`设备可以接管数据总线并启动`DMA`操作。完全的总线主控能力意味着该`I/O`设备能够在无需`CPU`干预的情况下执行更复杂的操作序列。`总线主控
    DMA`设备的驱动可以使用以下类型的`DMA`支持：


    - `基于数据包的 DMA`：如果总线主控适配器允许驱动确定`DMA`传输操作何时完成和/或何时开始另一个传输操作。`基于数据包的 DMA`是`分散/聚集
    DMA`操作的基础。

    - `公共缓冲区 DMA`：如果总线主控适配器没有提供方式让驱动确定传输操作何时开始或完成，或者如果单个缓冲区区域被持续或重复用于`DMA`传输。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 4 章 ■ 掌握硬件环境


    **注意** 一个`DMAC`示例：*系统与定时器配置开发者手册*的第 8 章应该能让你对`DMA`控制器架构和操作有很好的了解。


    # PCI 总线


    `PCI`是`Peripheral Component Interconnect`（外设组件互连）的缩写，这是一种由英特尔开发的局部总线*标准*。`PCI`是一个
    64 位总线，尽管通常以 32 位总线实现。它可以在 33 或 66 MHz 的时钟速度下运行。在 32 位和 33 MHz 下，其吞吐率可达 133 MBps。`PCI`是一种同步总线架构，所有数据传输都相对于系统时钟（`CLK`）执行。虽然由英特尔开发，但`PCI`不特定于任何微处理器系列。


    `PCI`实现了一个 32 位的多路复用`地址`和`数据`总线。多路复用的`地址`和`数据`总线减少了`PCI`连接器上的引脚数量，从而降低了`PCI`组件的成本和封装尺寸。`PCI`总线周期通过在一个称为地址阶段的第一个时钟边沿将地址驱动到`AD[31:0]`信号上来启动。地址阶段由`FRAME#`信号的激活来指示。下一个时钟边沿开始第一个或多个数据阶段，在这些阶段中数据通过`AD[31:0]`信号进行传输。


    在`PCI`术语中，数据在作为总线主控的发起方和作为总线从属的目标之间传输。`PCI`的较高速度将单条总线上的扩展插槽数量限制为最多四个。为了允许具有超过
    3 或 4 个插槽的扩展总线，`PCI SIG`定义了一种`PCI 到 PCI 桥接`机制。`PCI 到 PCI 桥接器`是`ASIC`，它们在电气上隔离两条`PCI`总线，同时允许总线传输从一条总线转发到另一条总线。每个桥接设备都有一个“主”`PCI`总线和一条“从”`PCI`总线。多个桥接设备可以级联，以创建具有多条`PCI`总线的系统。


    **注意** `PCI 规范`：了解`PCI`的一个好资源是`PCI-SIG`网站[`www.pcisig.com/home`](http://www.pcisig.com/home)


    # 章节总结


    根据定义，设备驱动完全关乎它们负责与系统接口的硬件。在本章中，我们研究了设备驱动所针对的硬件。我们以`Marvell PXA3xx 处理器系列`的开发者文档为例，但这只是为了方便，绝无任何暗示。


    请阅读你正在开发的硬件文档。不理解硬件的工作原理，就无法开发和实现稳健的设备驱动。然而，仅仅阅读你为其开发设备驱动的**外设**的数据手册和软件开发者文档是不够的。你需要完全熟悉它连接的系统处理器或`SoC`。


