    # 理解设备驱动程序的操作系统架构


    理解操作系统架构对于编写健壮的设备驱动程序至关重要。内存架构决定了内存如何在内核模式组件（设备驱动程序实际上就属于此类）与用户模式进程之间进行分配和传递。理解`Windows
    Embedded Compact 7`所采用的虚拟内存方案有助于设计出行为规范的设备驱动程序。`设备管理器`是操作系统中负责加载、跟踪流式设备驱动程序并与之交互的组件，而流式设备驱动程序正是本书的主要主题。


    ## 开发工具


    “开发工具”这一术语源自破产法，用于界定一个人通常为谋生所使用哪些资产。作为设备驱动程序开发者为生，我们的“开发工具”包括`VS2008`、`平台构建器`（`PB`）以及第三方工具。


    支持智能设备的`Visual Studio`仅允许你为设备开发应用程序。对于`Windows Embedded Compact 7`（以及之前的版本）的设备驱动程序开发来说，`平台构建器`是必不可少的。`平台构建器`为你提供了设备驱动程序开发套件（`DDK`）以及构建用于测试设备驱动程序的操作系统映像的能力。此外，`平台构建器`还提供了为`Windows
    Embedded Compact 7`（`CE`）构建设备驱动程序所需的构建工具，例如设置构建环境变量，以及调试和测试工具，如内核调试器工具和一套全面的远程工具。


    `Visual Studio`和`平台构建器`为开发提供了坚实的基础，但仍有第三方工具可用来加速设备驱动程序的创建过程。设备驱动程序开发者会发现特别有用的两个工具是`TRACE32`
    JTAG 调试器和`Windows CE 设备驱动程序向导`。本章概述了这些工具，后续章节将深入讨论并提供如何使用这些工具的示例。


    本章内容：


    - `Visual Studio 2008`

    - `平台构建器`

    - `Windows CE 构建系统`

    - `设备驱动程序开发套件`

    - `TRACE32`

    - `Windows CE 设备驱动程序向导`


    ### Visual Studio 2008


    实际上，`Visual Studio 2008`是`平台构建器 2008` IDE（一个`Visual Studio 2008`插件向导）的主机，这意味着你必须在安装`平台构建器
    2008`之前先安装`Visual Studio 2008`。`Visual Studio 2008`与`平台构建器 2008`共同为你提供了一个全面的环境，用于开发操作系统映像、子项目、将操作系统映像下载到目标设备以及进行调试，所有这些功能都集成在一个开发工具中。对于`Windows
    Embedded Compact`开发人员和此操作系统的设备驱动程序开发者而言，他们更感兴趣的是将`平台构建器`集成到`Visual Studio 2008`中，而不是将`Visual
    Studio`作为通用的开发工具。


    ### Visual Studio 2008 与平台构建器 IDE


    用于`Windows Embedded Compact 7`的`平台构建器` IDE 已集成到`Visual Studio 2008`中。它为用户提供了一个图形用户界面，用于创建操作系统设计、连接目标设备并下载操作系统映像、为内核调试器提供图形界面、编辑源代码、构建子项目和`BSP`组件，以及更多功能。构建结果与使用命令行工具进行所有开发工作的结果相同；此外，结果是可互换的，这意味着你可以交替使用命令行开发和
    IDE 开发。


    安装`平台构建器`后，`Visual Studio`会具有特定的`Windows Embedded Compact`相关 UI 组件，包括一个名为“目标”的设备相关菜单、特定于操作系统设计的“构建”菜单选项，以及三个新的“工具”子菜单：“平台构建器”、“Windows
    Embedded Silverlight 工具”和“远程工具”。然而，主要功能是`平台构建器`向导，以及在“其他语言 ➤ Visual C#”项目类型下的“远程工具框架”向导。图
    2-1 展示了“项目类型”树中的`平台构建器`向导。


    *图 2-1. 使用平台构建器 IDE 向导创建操作系统设计*


    同时，新增了一个名为“目录项视图”的窗口，可以在“视图 ➤ 其他窗口”菜单下找到。操作系统设计向导会要求选择一个构建操作系统设计所基于的`BSP`，并提供一组快速启动的操作系统设计模板供选择。图
    2-2 和图 2-3 描述了这些步骤。在创建新的操作系统设计时，选择板级支持包（`BSP`）至关重要；但是，如果后面需要在使用不同架构的另一台设备上运行完全相同的操作系统映像，也可以轻松地向新创建的操作系统设计中添加另一个`BSP`。


    *图 2-2. 为新操作系统设计选择 BSP*


    创建操作系统设计后，你可以使用“目录项视图”向此操作系统设计添加或移除 OS 组件或`BSP`，如图 2-4 所示。解决方案资源管理器允许访问子项目、`BSP`源文件、Public
    和 Private 目录（用于打开项目和源文件），以及在构建中排除或包含组件。图 2-5 显示了解决方案资源管理器。


    *图 2-3. 选择快速启动设计模板*


    *图 2-4. 目录项视图*


    *图 2-5. 解决方案资源管理器*


    ### 远程工具


    选择智能设备开发选项后随`Visual Studio 2008`一起安装的远程工具主要旨在帮助进行应用程序开发。设备驱动程序开发者感兴趣的主要工具是`远程注册表编辑器`和`堆栈遍历显示器`。以下是`Visual
    Studio`附带的远程工具列表。


    - `远程文件查看器` - 查看和管理目标设备上的文件系统（包括导出和导入）

    - `堆栈遍历显示器` - 显示目标设备上运行的每个进程的堆标识符和标志信息

    - `远程进程查看器` - 显示目标设备上运行的每个进程的远程信息

    - `远程注册表编辑器` - 显示和管理目标设备的注册表

    - `远程 Spy` - 显示目标设备上运行的应用程序相关窗口收到的消息

    - `远程放大` - 从目标设备捕获位图（`.bmp`）文件格式的屏幕图像


    ### 远程工具框架


    远程工具框架随`平台构建器 2008`一起安装，是一个开发 SDK，它涵盖设备端和开发工作站插件库，用于创建自定义远程工具和一个用于托管自定义插件的远程工具外壳。开发远程工具包括创建一个设备端控制台应用程序，该应用程序可以向开发工作站上的自定义远程工具推送数据或响应其请求，当然还包括开发自定义远程工具插件。你可以选择使用原生
    API 或`.NET`紧凑框架托管 API 来开发设备端应用程序。虽然原生客户端远程工具应用程序非常适合需要实时确定性的设备（因此不支持`.NET`紧凑框架），但托管设备端应用程序具有快速开发的优势。插件端则是使用`.NET`框架开发的。

    '
- fmt: '# Framework and Installs into Visual Studio


    A remote tools frame wizard eases the development and installs into Visual Studio.
    An example of such a custom remote tool will be discussed later in the chapter
    dealing with debugging and testing.


    > **Note**: Previous versions of Windows CE: In the case of Windows CE 6.0 you
    have to install Visual Studio 2005 and then install Platform Builder 6.0. Prior
    to Windows CE 6.0, Platform Builder IDE was a standalone tool and did not require
    Visual Studio.


    ## Platform Builder


    `Platform Builder` is the tool you use to develop and build operating system designs
    based on your choice of hardware. An operating system design is composed of all
    the system components that the developer chooses out of the catalog to incorporate
    in his/her operating system. To allow this, `Platform Builder` has all the operating
    system components within `Platform Builder`’s directory structure.


    ### Platform Builder Directory Tree


    All the necessary files and tools that are needed to create a Windows CE operating
    system image are collected under a directory hierarchy located on the installation
    disk. For Windows CE 7.0, the OS installation root directory is `WINCE700`; this
    directory is referred to by the build environment variable `%_WINCEROOT%`. For
    example, it would typically be set to `C:\WINCE700` where `C:` is the installation
    disk.


    Under this folder you should find the following five folders:


    - Platform Directory

    - Public Directory

    - SDK Directory

    - Others Directory

    - Private Directory


    When a new OS design is created for the first time, a new folder will be created:
    `OSDesigns`. See Figure 2-6.


    *Figure 2-6. Platform Builder Folder Hierarchy*


    `Platform Builder` subdirectories that are most relevant to device driver developers
    are `PLATFORM` and `PUBLIC` subdirectories, because these contain device driver
    source code which is separated into specific board dependent drivers, system-on-chip
    (SOC) drivers, and common drivers.


    - Specific board (BSP) dependent device driver source code is located under `%_WINCEROOT%\PLATFORM\%_TGTPLAT%\SRC\DRIVERS`
    directory

    - System on Chip device driver source code is located under `%_WINCEROOT%\PLATFORM\COMMON\SRC\SOC`

    - SoC device drivers handle peripheral I/O devices that are integrated on the
    CPU chip to form the SoC.

    - Common source code for device drivers that is supplied by Microsoft is located
    under `%_WINCEROOT%\PLATFORM\COMMON\SRC\`

    - Source code for common drivers for non-native peripheral devices. The source
    code for these device drivers is platform-independent code and is not specific
    to a hardware platform or CPU architecture and is located under `%_WINCEROOT%\PUBLIC\COMMON\OAK\DRIVERS`


    ### PLATFORM Directory


    This directory is the root directory for the board support packages (BSPs) that
    were installed with Platform Builder. Each such BSP is located in its own directory
    hierarchy with the top folder named to reflect the hardware it supports. Another
    extremely important subdirectory within the `PLATFORM` directory tree is the `COMMON`
    subdirectory, which contains OEM adaptation layer source code, including routines
    that are generic to all BSPs and routines that are specific to certain architecture.


    ### PUBLIC Directory


    This directory contains a platform-independent set of components and configurations.
    The subdirectories in the `PUBLIC` directory that contain modules and components
    have the same name as Windows CE 7.0 modules. It contains three types of subdirectories:


    - Module and component subdirectories

    - Reference configuration subdirectories

    - Custom configuration subdirectories


    ## Platform Builder IDE


    `Platform Builder` Integrated Development Environment (IDE) is a graphical user
    interface contained within Visual Studio 2008 and consists of an integrated set
    of tools, context-sensitive menus, toolbars, and shortcut keys, that enable you
    to create, test, and refine OS designs and Catalog items.'
