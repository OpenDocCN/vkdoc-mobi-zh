- fmt: "# eXDI 概述\n\n`eXDI` 是 Extended Debugging Interface（扩展调试接口）的缩写。它允许 Platform\
    \ Builder 通过在线调试器（如 TRACE32）监控并控制目标设备的活动。本质上，它是 Platform Builder 与在线调试器之间的适配层。`eXDI`\
    \ 作为核心连接服务实现，与操作系统访问服务协同工作，为 Platform Builder 提供调试服务。\n\n操作系统访问服务为调试器提供操作系统感知能力。它充当\
    \ `eXDI` 服务与 Platform Builder 之间的中介。这使得第三方解决方案提供商能够开发出支持 Windows Embedded Compact\
    \ 7 的调试工具。图 11-10 展示了 Platform Builder 如何使用 Lauterbach `eXDI2` 驱动程序在 TRACE32 ICD\
    \ 之间建立接口，后者通过 `JTAG` 连接目标设备，用于硬件辅助调试。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-220_1.jpg)\n\n# 第 11 章 ■ 调试设备驱动程序\n\n*图 11-10. 用于无 KITL 调试的 eXDI 架构*\n\
    \n## 目标控制\n\n目标控制服务提供了一个命令行接口，用于执行调试、性能分析和日志记录。\n\n目标控制命令允许执行和终止进程、转储内存、获取信息等操作。然而，目标控制服务最有趣的功能是执行调试器扩展\
    \ DLL 的命令。Microsoft 提供了这样一个调试器扩展模块 `CeDebugX`，我们在内核调试器部分已经讨论过。不仅如此，您还可以创建自定义的调试命令来满足自身需求。\n\
    \n## 创建调试扩展\n\nMicrosoft 能做到的，您也能做到。如果您想定制特定命令，创建自己的调试器扩展相当直接。尽管相关文档在指导您创建在开发工作站上运行的\
    \ Win32 DLL 过程时非常有帮助，但还是有几点需要注意。Platform Builder 是一个 32 位程序，它安装在 `<InstallationDisk\\\
    Program Files (x86)\\Microsoft Platform Builder>` 目录下，因此您创建的 DLL 也必须是 32 位 DLL。您应该配置附加包含目录，使其包含\
