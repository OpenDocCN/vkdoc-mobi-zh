    are allowed. Remember that the registry is an extremely important facet of the
    device driver package.


    There is an array of registry settings that control how a driver loads. Most are
    optional, one is required. Several registry settings are used by the Device manager
    and may be used by all drivers. The device driver developer can create custom
    registry entries that will be referenced directly by the device driver after it
    has been loaded.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ DEVICE DRIVER REGISTRY SETTINGS


    Required


    The only required registry subkey value that is absolutely required is the **DLL**
    subkey. Without it Device Manager is not able to determine which DLL to load.
    This subkey holds the name of the device driver executable file within the file
    system.


    **"DLL"="Demodriver.DLL"**


    Even if, strictly speaking, the **Prefix** subkey is not a requirement it should
    be set. The **Prefix** is a three-character string that makes up the name of the
    driver. This value must be present in order to have a file handle based interface
    to the driver. The **Prefix** value is the same value that must be used in the
    stream driver entry points unless the **DEVFLAGS_NAKEDENTRIES** flag is set.


    Optional


    All other subkeys are optional, however some should nearly always be considered,
    especially the **Order** subkey. The **Order** subkey is a **DWORD** value that
    provides a mechanism supporting load order. Drivers will be loaded in the order
    specified by the **Order** subkey. If this subkey does not exist the driver will
    be loaded at the end. Listing 5-1 is an example of the registry entry generated
    by the device driver wizard for the demo device driver.


    *Listing 5-1\. Registry entries for a sample device driver*


    **; DemoDriver driver**


    **[HKEY_LOCAL_MACHINE\Drivers\BuiltIn\Demodriver]**


    **"Prefix"="DMO"**


    **"DLL"="Demodriver.DLL"**


    **"SysIntr"=dword:1A**


    **"Irq"=dword:8**


    **"MemBase"=dword:90001000**


    **"MemLen"=dword:32**


    **"Order"=dword:0**


    **"DisplayName"="DemoDriver driver"**


    **"IsrHandler"="IsrHandler"**


    **"Flags"=dword:0**


    **"IClass"="{A32942B7-920C-486b-B0E6-92A702A99B35}"**


    Device Driver Registry Subkeys


    A device driver developer can create device driver specific registry keys. For
    example, the registry entries for the RTL8139 Ethernet driver, has a subkey value
    for early transmission threshold which specifies the threshold level in the Tx
    FIFO to begin the transmission; **EarlyTxThreshold**. Listing 5-2 lists an example
    of the RTL8139 registry entries.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ DEVICE DRIVER REGISTRY SETTINGS


    *Listing 5-2\. Example of custom registry subkey entries*


    **"Transceiver"=dword:3**


    **"DuplexMode"=dword:1**


    **"EarlyTxThreshold"=dword:10000**


    **"IsrDll"="giisr.dll"**


    **"IsrHandler"="ISRHandler"**


    **"PortIsIO"=dword:1**


    **"PortOffset"=dword:3E**


    **"PortSize"=dword:2**


    **"PortMask"=dword:C07F**


    **"UseMaskReg"=dword:1**


    **"MaskOffset"=dword:3c**


    However most subkeys are preset common values as described by the following list:


    • Dll - Specifies the name of the driver DLL


    • Prefix - Specifies the file name for the device driver


    • Order - Specifies order to load driver


    • Index - Specifies the device index (x in COMx:)


    • IClass - Specifies GUID(s) for device class(es) for use by PnP notification
    system


    •


    For example – a value of A32942B7-920C-486b-B0E6-92A702A99B35 for


    power managed device interface


    • Flags - Specifies load flags for the driver


    • IoBase - Specifies the base of an I/O mapped window used by the device. Port
    I/O


    must be supported by the architecture, i.e., special CPU instructions to access
    I/O


    ports.


    • IoLen - Specifies the length of each I/O window needed by the device


    • MemBase - Specifies the bus relative base of a memory mapped window used by
    the device. Memory mapped I/O maps the I/O registers to a region in the system
    memory.


    • MemLen - Specifies the length of each memory mapped window needed by the device


    • IRQ - Specifies the physical IRQ used by the device


    • SYSINTR - Specifies the logical interrupt identifier.


    • IsrDll - Specifies a DLL to containing an installable interrupt handler'
  trans: "\n# 操作系统启动时\n\n当系统硬件由 `OEMInit` 函数初始化完成后，操作系统启动，文件系统开始运行，`设备管理器` 通过加载并执行位于\
    \ `HKLM\\Drivers\\BuiltIn` 根目录下的 `BusEnum.dll` 来枚举该注册表项下的条目。总线枚举器启动扫描注册表的过程，以查找\
    \ `HKLM\\Drivers\\BuiltIn` 子项下需要加载的其他总线和设备。总线枚举器根据 `Order` 注册表子项，检查传递给它的键下的第一级键。它对找到的每个子项调用\
    \ `ActivateDeviceEx`。每个子项可以包含由 `ActivateDeviceEx` 或已加载驱动程序在其初始化例程中解释的任何值。此外，驱动程序可以有一个介于\
    \ 0 到 255 之间的 `Order` 值，该值不必唯一。`Order` 值最小的驱动程序将首先被加载。如果没有 `Order` 值，则该驱动程序将在具有已定义\
    \ `Order` 值的驱动程序之后被加载。总线枚举器在加载设备驱动程序时，会逐个遍历 `HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn`\
    \ 的第一级键，为每个键初始化一个设备驱动程序。它加载由 `DLL` 值指定的 DLL，然后在 `HKEY_LOCAL_MACHINE\\Drivers\\\
    Active` 下为驱动程序创建一个子项。接着，它调用驱动程序的 `XXX_Init` 入口点，并传入一个包含指向该流接口驱动程序活动键的注册表路径的字符串。`XXX_Init`\
    \ 例程应使用返回的字符串调用 `RegOpenKeyEx` 以获取该键的句柄，然后调用 `RegQueryValueEx` 查找键值，该值包含与 `设备管理器`\
    \ 最初在 `HKLM\\Drivers\\BuiltIn` 下遇到的注册表键对应的字符串。通过读取这些值，设备驱动程序可以初始化 I/O 资源、中断处理程序等。图\
    \ 5-1 可视化地展示了流设备驱动程序的加载顺序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-88_1.png)\n\n## 第 5 章 ■ 设备驱动程序注册表设置\n\n*图 5-1. 流设备驱动程序加载顺序*\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章 ■ 设备驱动程序注册表设置\n\n\
    # 设备管理器注册表项\n\n`设备管理器` 使用 `HKLM\\Drivers` 注册表项下的 `Active` 和 `BuiltIn` 子项。`HKLM\\\
    Drivers\\Active` 注册表项包含用于跟踪 `设备管理器` 加载的当前活动驱动程序的子项。\n\n## 活动注册表项\n\n以下列表显示了 `Active`\
    \ 注册表项中可用的子项：\n\n*   `BusDriver` – 驱动程序的总线名称。\n*   `BusName` - 设备的总线名称。\n*   总线驱动程序为其从属设备添加这些子项。\n\
    *   `DevID` - 由 `设备管理器` 添加的唯一设备标识符。\n*   `FullName` - 由 `设备管理器` 添加的名称，与 `$device`\
    \ 命名空间结合使用。\n*   `Name` - 设备驱动程序的设备文件名。此子项仅存在于指定了前缀的驱动程序中。\n*   `Order` - 总线枚举器根据\
    \ `Order` 值检查键。\n*   `Key` - 设备的注册表路径。\n*   `PnpId` - 即插即用标识符字符串。仅存在于 PC 卡驱动程序中。\n\
    *   `Sckt` - PC 卡的当前插槽和功能对。仅存在于 PC 卡驱动程序中。\n\n## 注册表条目\n\n设备驱动程序的注册表设置对于设备驱动程序的开发至关重要。注册表设置控制\
    \ `设备管理器` 如何加载设备驱动程序，允许开发者在驱动程序依赖于其他驱动程序并需要在其之前加载时，对驱动程序的加载顺序进行排序。注册表设置可以包含有助于初始化过程甚至实例创建的信息。例如，一个特定的自定义子项指示允许的实例数量。请记住，注册表是设备驱动程序包中极其重要的一个方面。\n\
    \n有一系列控制驱动程序加载方式的注册表设置。大多数是可选的，一个是必需的。`设备管理器` 使用几个注册表设置，所有驱动程序都可能用到。设备驱动程序开发者可以创建自定义的注册表条目，这些条目将在驱动程序加载后由其直接引用。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章 ■ 设备驱动程序注册表设置\n\
    \n### 必需项\n\n唯一绝对必需的注册表子项值是 `DLL` 子项。没有它，`设备管理器` 将无法确定要加载哪个 DLL。此子项包含文件系统中设备驱动程序可执行文件的名称。\n\
    \n`\"DLL\"=\"Demodriver.DLL\"`\n\n即使严格来说，`Prefix` 子项不是必需的，也应该进行设置。`Prefix` 是一个由三个字符组成的字符串，构成驱动程序的名称。为了拥有基于文件句柄的驱动程序接口，必须存在此值。`Prefix`\
    \ 值必须与流驱动程序入口点中使用的值相同，除非设置了 `DEVFLAGS_NAKEDENTRIES` 标志。\n\n### 可选项\n\n所有其他子项都是可选的，但某些子项几乎总是应该考虑的，尤其是\
    \ `Order` 子项。`Order` 子项是一个 `DWORD` 值，提供了一种支持加载顺序的机制。驱动程序将按照 `Order` 子项指定的顺序加载。如果此子项不存在，驱动程序将在最后加载。清单\
    \ 5-1 是设备驱动程序向导为演示设备驱动程序生成的注册表条目示例。\n\n*清单 5-1. 示例设备驱动程序的注册表条目*\n\n```\n; DemoDriver\
    \ 驱动程序\n[HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\Demodriver]\n\"Prefix\"=\"DMO\"\
    \n\"DLL\"=\"Demodriver.DLL\"\n\"SysIntr\"=dword:1A\n\"Irq\"=dword:8\n\"MemBase\"\
    =dword:90001000\n\"MemLen\"=dword:32\n\"Order\"=dword:0\n\"DisplayName\"=\"DemoDriver\
    \ 驱动程序\"\n\"IsrHandler\"=\"IsrHandler\"\n\"Flags\"=dword:0\n\"IClass\"=\"{A32942B7-920C-486b-B0E6-92A702A99B35}\"\
    \n```\n\n## 设备驱动程序注册表子项\n\n设备驱动程序开发者可以创建设备驱动程序特定的注册表键。例如，RTL8139 以太网驱动程序的注册表条目中有一个用于早期传输阈值的子项值，该值指定了\
    \ Tx FIFO 中开始传输的阈值水平：`EarlyTxThreshold`。清单 5-2 列出了 RTL8139 注册表条目的一个示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 5 章 ■ 设备驱动程序注册表设置\n\n*清单 5-2. 自定义注册表子项条目示例*\n\n```\n\"Transceiver\"=dword:3\n\
    \"DuplexMode\"=dword:1\n\"EarlyTxThreshold\"=dword:10000\n\"IsrDll\"=\"giisr.dll\"\
    \n\"IsrHandler\"=\"ISRHandler\"\n\"PortIsIO\"=dword:1\n\"PortOffset\"=dword:3E\n\
    \"PortSize\"=dword:2\n\"PortMask\"=dword:C07F\n\"UseMaskReg\"=dword:1\n\"MaskOffset\"\
    =dword:3c\n```\n\n然而，大多数子项都是预设的通用值，如下表所述：\n\n*   `Dll` - 指定驱动程序 DLL 的名称\n*   `Prefix`\
    \ - 指定设备驱动程序的文件名\n*   `Order` - 指定驱动程序的加载顺序\n*   `Index` - 指定设备索引（例如 COMx 中的 x）\n\
    *   `IClass` - 为 PnP 通知系统指定设备类的 GUID\n    *   例如 – 对于电源管理的设备接口，值为 `A32942B7-920C-486b-B0E6-92A702A99B35`\n\
    *   `Flags` - 指定驱动程序的加载标志\n*   `IoBase` - 指定设备使用的 I/O 映射窗口的基址。端口 I/O 必须得到架构的支持，即用于访问\
    \ I/O 端口的特殊 CPU 指令。\n*   `IoLen` - 指定设备所需的每个 I/O 窗口的长度\n*   `MemBase` - 指定设备使用的内存映射窗口的总线相对基址。内存映射\
    \ I/O 将 I/O 寄存器映射到系统内存中的一个区域。\n*   `MemLen` - 指定设备所需的每个内存映射窗口的长度\n*   `IRQ` -\
    \ 指定设备使用的物理 IRQ\n*   `SYSINTR` - 指定逻辑中断标识符。\n*   `IsrDll` - 指定包含可安装中断处理程序的 DLL\n"
