    CHAPTER 3 ■ DESIGN YOUR DEVICE DRIVER FIRST!


    ## The Device Driver Location


    In Chapter 2 when we discussed the `Platform Directory` tree, it was noted that
    the two most relevant directories are `PLATFORM` and `PUBLIC` directories. Under
    the `PLATFORM` directory are BSP specific device drivers and under the `PUBLIC`
    directory are located all the platform-independent device drivers.


    When we develop a device driver we have to consider to what this device driver
    belongs. Is it a device driver that is specific to your OS image? Is it a device
    driver that is part of a BSP? Or maybe I am creating a device driver that is architecture
    agnostic and I want to market it with my OEM hardware. `Figure 3-1` shows how
    to create and add a device driver to a BSP.


    *Figure 3-1. Adding a device driver to a BSP*


    The resulting device driver location can be viewed in `Figure 3-2`; here you can
    see the folder hierarchy for the `DemoDrvr` device driver located in the `DemoBSP`
    device drivers’ folder.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-64_1.jpg)


    CHAPTER 3 ■ DESIGN YOUR DEVICE DRIVER FIRST!


    *Figure 3-2. A BSP driver location*


    ### BSP


    If the planed device driver is supposed to be handling a peripheral IO device
    that is a built-in part of your target board, then it should be located in the
    boards BSP directory. This will ensure that any OS design based on the BSP will
    be able to access the peripheral IO device. The `Production Quality OAL` initiative
    calls for board-specific device drivers to be located under `$(PLATFORMROOT)\<BSPName>\src\drivers`
    folder in the platform directory hierarchy. This location will ensure that your
    device driver will be part of your BSP build.


    ### Specific OS Design


    This location allows the developer to create a one of device driver that is placed
    within the OS design and is built into the image. Previous versions’ device driver
    development documentation suggested you take this path and implement and test
    your device driver within a test bed OS design and when test and when debugging
    and testing is done move the device driver to the final location. This version
    however 47


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ DESIGN YOUR DEVICE DRIVER FIRST!


    provides a template stream device driver within a template BSP, in a location
    similar to the location described above.


    It is useful however to locate a device driver in the OS design if this device
    driver is not needed in any other target device.


    ### PUBLIC Tree


    The `PUBLIC` tree location provides for all agnostic device drivers including
    out of box device drivers supplied by Microsoft under `$(PUBLICROOT) \COMMON\oak\drivers`
    folder. However this is not the location you want to locate your device driver
    but rather under a third-party folder such as `$(PUBLICROOT) \ThirdParty\catalog\<CompanyName>\<DriverName>`.
    This will not corrupt the integrity of the `PUBLIC` tree and will allow smooth
    integration of the device driver in the catalog.


    ## Deciding the Mode


    `Windows CE 6.0` brought about a change in the architecture of the `Windows CE`
    operating system. While before that all device drivers were user mode device drivers
    from this point onwards device driver can either reside in the kernel or in user
    mode. We have already touched on this subject in Chapter 1 and discuss it further
    and delve into it deeply in later chapters it is still important to us as developers
    to decide ahead of implementation if the device driver that we are going to develop
    will reside in the kernel that is a kernel mode device driver or it will be a
    user mode device driver.


    ### Kernel Mode

