    \ object of the test and provide testing procedures to best evaluate its vulnerability.\n\
    \nQuality assurance and testing have a defined set of metrics that need to be\
    \ measured. These metrics need to be qualified to pass the tests. Device drivers\
    \ for embedded devices need a relatively small set of quality metrics because\
    \ embedded devices, unlike general purpose computers and device drivers for embedded\
    \ devices in particular, do not need testing for such cases as install ability,\
