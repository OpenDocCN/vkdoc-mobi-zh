  trans: '

    # 框架及其安装到 Visual Studio 中


    远程工具框架向导简化了开发流程，并可安装到 Visual Studio 中。本章后续部分在讨论调试与测试时，将介绍此类自定义远程工具的一个示例。


    > **注意**：关于旧版 Windows CE：如果使用 Windows CE 6.0，你需要先安装 Visual Studio 2005，然后再安装 Platform
    Builder 6.0。在 Windows CE 6.0 之前，Platform Builder IDE 是一个独立工具，无需 Visual Studio。


    ## Platform Builder


    `Platform Builder` 是你用来根据所选硬件开发和构建操作系统设计的工具。一个操作系统设计由开发者从目录中选择并整合到其操作系统中的所有系统组件组成。为此，`Platform
    Builder` 在其目录结构中包含了所有操作系统组件。


    ### Platform Builder 目录树


    创建 Windows CE 操作系统映像所需的所有必要文件和工具都收集在安装磁盘上的一个目录层级结构中。对于 Windows CE 7.0，操作系统安装根目录为
    `WINCE700`；此目录由构建环境变量 `%_WINCEROOT%` 引用。例如，它通常设置为 `C:\WINCE700`，其中 `C:` 是安装磁盘。


    在此文件夹下，你应该能找到以下五个文件夹：


    - Platform 目录

    - Public 目录

    - SDK 目录

    - Others 目录

    - Private 目录


    当首次创建新的操作系统设计时，会创建一个新文件夹：`OSDesigns`。见图 2-6。


    *图 2-6. Platform Builder 文件夹层次结构*


    与设备驱动程序开发者最相关的 `Platform Builder` 子目录是 `PLATFORM` 和 `PUBLIC` 子目录，因为它们包含设备驱动程序源代码，这些代码分为特定于板的驱动程序、片上系统驱动程序以及通用驱动程序。


    - 特定板级支持包的设备驱动程序源代码位于 `%_WINCEROOT%\PLATFORM\%_TGTPLAT%\SRC\DRIVERS` 目录下

    - 片上系统设备驱动程序源代码位于 `%_WINCEROOT%\PLATFORM\COMMON\SRC\SOC` 目录下

    - SoC 设备驱动程序处理集成在 CPU 芯片上以构成 SoC 的外围 I/O 设备。

    - 由 Microsoft 提供的设备驱动程序通用源代码位于 `%_WINCEROOT%\PLATFORM\COMMON\SRC\` 目录下

    - 非本地外围设备的通用驱动程序源代码。这些设备驱动程序的源代码是平台无关的代码，不特定于某个硬件平台或 CPU 架构，位于 `%_WINCEROOT%\PUBLIC\COMMON\OAK\DRIVERS`
    目录下


    ### PLATFORM 目录


    此目录是随 Platform Builder 一同安装的板级支持包的根目录。每个 BSP 都位于其自身的目录层次结构中，顶层文件夹的名称反映了其所支持的硬件。`PLATFORM`
    目录树中另一个极其重要的子目录是 `COMMON` 子目录，其中包含 OEM 适配层源代码，包括所有 BSP 通用的例程以及特定于某些架构的例程。


    ### PUBLIC 目录


    此目录包含一组平台无关的组件和配置。`PUBLIC` 目录中包含模块和组件的子目录与 Windows CE 7.0 模块同名。它包含三种类型的子目录：


    - 模块和组件子目录

    - 参考配置子目录

    - 自定义配置子目录


    ## Platform Builder IDE


    `Platform Builder` 集成开发环境是 Visual Studio 2008 中包含的一个图形用户界面，由一组集成的工具、上下文菜单、工具栏和快捷键组成，使你能够创建、测试和优化操作系统设计以及目录项。

    '
- fmt: '# Platform Builder Wizards


    `Platform Builder` provides a set of wizards in the IDE that enable you to create
    OS designs and subprojects.


    ## Windows CE OS Design Wizard


    The `Windows CE OS Design Wizard` is an add-in wizard within `Visual Studio 2008`.
    It provides a set of templates that you can use to jumpstart creating and configuring
    an OS design. The `OS Design Wizard` guides you to select first a BSP for your
    OS design, then asks you to select a design template and completes the process
    by stepping through a set of components you can add or remove a selection of Catalog
    items, including various communication components.


    **Note** Design Templates: Design templates provide examples of how to develop
    an OS for a specific device category and can help reduce your overall OS development
    time. These are XML files that include the basic building blocks of the operating
    system with a variety of components that make up a device category, including
    an industrial controller.


    ## Windows CE Subproject Wizard


    The `Windows CE Subproject Wizard` will conduct you throughout the process of
    creating a subproject that you can use to develop items based on your OS design,
    including applications, dynamic-link libraries (DLLs), static libraries, and a
    `TUX` test harness. The resulting subproject is added to the currently active
    OS design. Because subprojects depend on the specific OS design that contains
    them, they are built only in the context of that specific OS design.


    ## Platform Builder Remote Tools


    The remote tools that are installed with `Platform Builder` are an invaluable
    set of software tools that help you as a device driver developer connect and remotely
    monitor information and test your creation.


    These tools are divided into two groups: tools for debugging and testing, and
    tools for information management. In the second group, the most relevant tool
    is the `Remote Registry Editor`. Checking the active device driver node in the
    registry is the surest way to ascertain that your device driver was loaded by
    `Device Manager`. In the first group the most helpful tools are the `Remote Kernel
    Tracker` and `Remote Call Profiler`. The first helps to track interrupts, and
    synchronizes object triggering and thread execution for your device and the second
    helps you create efficient code by detecting coding bottlenecks.


    ## Platform Builder Registry Editor


    The registry editor is valuable to you as a device driver developer because of
    its `RegEdit` view as well as the source view. The `RegEdit` view provides a precise
    visual view where the device driver registry entry is located, with the ability
    to edit single key values or add new keys. Figure 2-7 shows the `RegEdit` view
    of registry editor within `Visual Studio 2008`.


    *Figure 2-7. An example of a device driver registry entry in registry editor RegEdit
    view*


    ## The Build System


    Building software amounts to the process of going from source code to a binary
    executable so that this executable runs and performs its functionality. To accomplish
    these tasks a set of tools, executables, and scripts are provided to perform an
    automated build using one command. Understanding the build process is detrimental
    to the development of device drivers for `Windows CE`.


    ### Overview


    In `Windows CE` the build system process involves building operating system components,
    device drivers, applications, libraries, and configuration files such as registry
    entries and more into a single operating system image. The `Windows CE` build
    system is composed of a set of tools, such as specific architecture compilers,
    the `make` tool, and other command line executables and batch files to automate
    the build process.


    There are four phases to the build process:


    - **Compile phase** – source code and resource files are compiled and linked to
    generate executables, libraries, and binary resource files for the selected locales.
    It is seldom required to rebuild operating system components because binaries
    are already provided by Microsoft.

    - **Sysgen phase** – `SYSGEN` variables are set or cleared based on the catalog
    items and dependency trees included in the OS design. It then filters the header
    files and creates import libraries for the Software Development Kits (SDKs) defined
    in the OS design, creates a set of run-time image configuration files for the
    OS design, and builds the specific BSP.

    - **Release copy phase** – all files required to create the run-time image are
    copied to the OS design’s release directory.

    - **Make run-time image phase** – project-specific files such as `Project.bib`
    and `Project.reg` are copied to the release directory and based on environment
    variables specified in `.reg` and `.bib` files creates the final run-time image
    in the release directory. Configuration files are merged for example registry
    configuration files are merged into `reginit.ini` to be compiled into the image
    registry file. OS image localization is performed during this final phase of image
    creation.


    ### The Build Tools


    The launch of `Windows CE 5.0` introduced the `Platform Builder` IDE as a mere
    graphical user interface thin layer on top of the command line tools that compose
    the build system, this means that the command line build and IDE build are therefore
    interchangeable. The build tools are a bundle of command line executables and
    batch files that work together to build an OS image. Refer to Figure 2-8 that
    shows how the build tools are represented for each of the four phases. A color
    scheme is introduced in order to distinguish between the executable tools which
    are colored in blue and the batch tools which are colored in olive. Understanding
    the build tools goes a long way to ease the process of developing device drivers
    for `Windows CE`.


    *Figure 2-8. OS image build phases and corresponding build tools*


    ### Command line build


    The command line build uses the `build demo` tool to jumpstart the whole build
    process. `Build demo` tool is a batch file that calls the master build tool `cebuild.bat`
    and when the first two phases are done it calls `buildrel.bat` and `makeimage.exe`
    to complete the build. You should be aware that `Platform Builder` IDE calls `builddemo.bat`
    with arguments as designated by the menu items that are selected by the user.
    `Platform Builder` documentation does a good job detailing all the possible options.
    You should review `builddemo.bat` as it is self-documented with good comments.


    ### Understanding the SYSGEN process


    `SYSGEN` phase is, as its name suggests, a system generation process where components
    are filtered and some are built to form the collection of components that will
    comprise the image of the selected OS design. `SYSGEN.BAT` is the tool that is
    effectively an extensible component dependency database in `BAT` file “code”.
    It sets `xxx_MODULES` and `yyy_COMPONENTS` variables for filtering. Runs `NMAKE.EXE`
    on `MAKEFILE` in `CESYSGEN` folder in each `_DEPTREES` folder, where the components
    are linked to the targets.


    ### SYSGEN Filtering


    Filtering is done using `@CESYSGEN` comment tags to filter files based on component
    settings and is run from inside `%__PROJROOT%\CESYSGEN\MAKEFILE`. Filtering creates
    tag variables based on `xxx_MODULES` and `yyy_COMPONENTS` variables and generates
    `CECONFIG.H` for use with C pre-processor.


    For example:


    `EXAMPLE_MODULES=ExmpleDLL`


    `EXAMPLEDLL_COMPONENTS=Exmpl1 Exmpl2`


    generates:


    `EXAMPLE_MODULES_EXAMPLEDLL`


    `EXAMPLEDLL_EXMPL1`


    `EXAMPLEDLL_EXMPL2`


    ### Environment variables and DEPTREES'
