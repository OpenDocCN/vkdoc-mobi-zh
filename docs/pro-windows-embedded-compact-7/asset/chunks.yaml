  trans: "\n### 为什么使用测试通行模板？\n\n为何要费心创建测试通行模板？主要是为了高效管理测试会话、控制测试时间以及日志文件的大小。在描述的示例中，测试仅限于设备驱动程序的异步\
    \ IO 支持。这表明你可以仅为单个设备驱动程序创建一次测试通行。这有助于缩短测试时间，而无需运行目录中的所有测试，并且最重要的是，如你在`Listing\
