    ## 章节总结


    Windows Embedded Compact 7 中的设备驱动程序，与之前版本的 Windows CE 一样，可以通过多种方式进行分类。可以根据加载它们的系统组件、它们的用途、它们所在的内存空间或它们的实现方式进行分类。原生设备驱动程序由图形窗口和事件系统（GWES）加载，而所有其他设备驱动程序由设备管理器加载。原生设备驱动程序由
    GWES 访问，应用程序不能直接访问。


    此外，出于这些原因，原生设备驱动程序暴露一组 GWES 调用的函数。所有其他设备驱动程序必须统一暴露流设备接口，以便设备管理器可以代表需要其服务的应用程序访问它们。所有由
    GWES 加载的原生设备驱动程序因此驻留在内核中，而由设备管理器加载的流设备驱动程序既可以驻留在内核中，也可以驻留在由设备管理器启动的特殊用户模式宿主中。


    在本章中，我们讨论了与设备驱动程序类型和设备驱动程序通知相关的主题，包括：


    - 原生设备驱动程序

    - 流设备驱动程序

    - 单片式和分层式设备驱动程序实现

    - 设备接口类

    - 设备接口通知


    ---


    # 第 7 章

    ## 流设备驱动程序的精髓


    流接口设备驱动程序是 Windows Embedded Compact 7（以及早期版本的 Windows CE）中最常开发的设备驱动程序。流设备驱动程序由设备管理器加载和管理，并提供众所周知的统一接口。因此，它允许用户模式应用程序访问流接口设备驱动程序的服务。用户模式应用程序使用文件系统
    API（如`CreateFile`）打开流接口设备驱动程序的实例，并使用文件 I/O API 从设备读取或向设备写入数据。流接口可以存在于内核模式设备驱动程序以及用户模式设备驱动程序中，并且在此最新版本的操作系统中也存在于过滤器设备驱动程序中。


    ### 本章内容


    - 流接口设备驱动程序

    - 内核模式设备驱动程序

    - 过滤器设备驱动程序

    - 用户模式设备驱动程序


    ## 流接口设备驱动程序


    流接口驱动程序是任何暴露一组构成流接口函数的已知入口点的设备驱动程序。流接口并不意味着由此类设备驱动程序控制的硬件设备必须处理流数据（例如串行通信端口）。由于块设备（如存储磁盘）是使用流接口实现的，因此流接口函数被设计为与文件系统
    API（如`ReadFile`）的语义强匹配。因此，流接口设备驱动程序通过文件系统间接暴露给应用程序；应用程序通过将设备驱动程序作为文件系统中的特殊文件打开来与驱动程序交互。


    设备管理器通过文件系统 API 将应用程序请求转换为实际调用相关设备驱动程序入口点的命令。设备驱动程序封装了将所有必要信息转换为对它所控制的设备执行适当操作所需的全部内容。所有流接口驱动程序，无论是管理内置设备还是可安装设备，无论是在引导时加载还是动态加载，都与其他系统组件具有类似的交互。


