    # 存储机制


    对象存储中的数据存储机制基于事务处理。如果在向对象存储写入数据时电源中断，Windows Embedded Compact 7 将确保存储不会损坏。它通过两种方式实现：要么在系统重启时完成操作，要么回滚到中断前最后一个已知的良好状态。对于系统文件（包括注册表设置），这意味着如果没有预定义保存当前设置的备份系统，则可以从
    ROM 重新加载初始设置。


    ## 基于 RAM 的注册表


    基于 RAM 的注册表将所有注册表数据存储在对象存储中。对于配备电池供电 RAM 的设备而言，这种方式在速度和占用空间方面非常高效。关机后无法为 RAM 供电的设备，必须在关机时备份注册表，并在恢复供电时还原注册表。基于
    RAM 的注册表适用于经常进行热启动但极少或从未进行冷启动的设备。


    ## 基于配置单元的注册表


    基于配置单元的注册表将所有注册表数据存储在称为配置单元的文件中，这些文件可以存放在任何文件系统上。因此，不再需要在关机/开机时进行备份和还原操作，从而加快了冷启动过程。基于配置单元的注册表分为两个配置单元：系统配置单元（包含所有系统数据）和用户配置单元（包含与特定用户相关的所有数据）。多用户系统将包含多个用户配置单元。用户配置单元会在登录时加载，在注销时卸载。基于配置单元的注册表适用于经常冷启动的设备，但对热启动没有影响。它同样适用于需要支持多用户的设备。


    每个配置单元被视为一个整体单元，并以单个文件的形式进行保存和还原。系统配置单元包含不与任何特定用户相关的系统设置。OEM 选择系统配置单元的文件名和位置。系统配置单元文件通常命名为
    `System.hv`，但位置可能有所不同。


    ---


    ## 摘要


    Windows Embedded Compact 7 注册表在功能结构上与桌面和服务器版 Windows 操作系统的注册表类似。但出于显而易见的原因，它在体积上更为紧凑。与其他
    Windows 操作系统上的注册表实现不同，它支持两种类型：基于 RAM 的注册表和基于配置单元的注册表。


    # 设备驱动程序文件名


    为了让用户模式应用程序与设备驱动程序交互，应用程序需要使用文件系统函数。应用程序首先要做的是获取设备驱动程序实例的句柄。它通过调用 `CreateFile()`
    实现，并使用返回的句柄来调用其他函数，如 `ReadFile()` 或 `WriteFile()`，以及设备管理器函数，如 `DeviceIoControl()`。`CreateFile()`
    的第一个参数需要一个文件名，这意味着需要一套设备驱动程序的命名约定。该命名约定分为三个设备命名空间：


    - 三个字母的前缀，后跟 0 到 9 之间的一个数字，再跟一个冒号。

    - `$device` 挂载点，后跟代表设备的三字母前缀，再跟一个数字。

    - `$bus` 挂载点，后跟总线名称、总线号、设备号和功能号。


    ## 设备文件命名空间——前缀与索引


    前缀由三个大写字母组成，用于标识哪个设备文件名对应特定的流接口。前缀存储在名为 `Prefix` 的注册表值中，该值位于驱动程序的注册表项内。首先，前缀标识了所有可以访问该流接口驱动程序的设备文件名。其次，前缀告诉操作系统在流接口
    DLL 中应期望哪些入口点文件名。例如，`DMO_Ini`、`DMO_Read` 或 `DMO_IOControl` 等入口点，其中指定的前缀为 `DMO`。索引是前缀后面的一个数字。索引用于区分流接口管理的相似设备。默认情况下，设备管理器逻辑上从
    1 到 9 进行索引，其中 1 对应于第一个设备文件名。当需要第十个设备文件名时，使用 0 作为索引。例如，通过设备文件名前缀打开设备驱动程序的典型代码应为：


    ```

    CreateFile("DMO1:", ....

    ```


    ## 设备文件命名空间——挂载点


    有两个挂载点命名空间：`$device` 挂载点和 `$bus` 挂载点。这两个命名空间支持超过 10 个具有相同三字母前缀的设备实例。设备管理器使用 `RegisterAFSEx()`
    向文件系统注册这些文件命名空间。这使得文件系统能够为设备驱动程序返回句柄。虽然前缀命名空间和设备命名空间返回相同的句柄，但总线命名空间返回的是总线、功能和设备的句柄，这意味着操作系统可能以不同的方式处理访问。


    使用设备命名空间打开设备驱动程序实例时，设备名称是一个路径字符串，由反斜杠、`$device` 空间标识符、反斜杠以及设备前缀后跟索引组成。例如：


    ```

    CreateFile(_T("\\$device\\DMO1)", ....

    ```


    使用总线命名空间打开设备驱动程序实例时，设备名称是一个路径字符串，由反斜杠、`$bus` 空间标识符、反斜杠，后跟总线类型名称、下划线总线号、下划线设备号和下划线功能号组成。


    ```

    CreateFile(_T("\\$bus\\PCI_0_3_0)", ....

    ```


    # 加载顺序


    由于设备驱动程序实际上帮助操作系统与底层硬件平台交互，因此在系统启动过程中尽快加载它们至关重要。负责加载和管理流设备驱动程序的操作系统组件是设备管理器。如果
    GWES 是操作系统的一部分，则它负责加载本机设备驱动程序，例如显示设备驱动程序、键盘驱动程序等。系统可能被设计为无头系统，从而省去 GWES 组件。然而，在任何有意义的操作系统设计中，设备管理器都是必需的。


    ## 流设备驱动程序的加载顺序

