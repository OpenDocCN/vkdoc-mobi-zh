    The loading process is synchronous and therefore may take time since device drivers
    are loaded one after the other according to the device driver’s load order value.
    The bus enumerator iterates on the device driver nodes under the RootKey and loads
    first all the device driver with a load order of value 0, then it will iterate
    and load all the drivers with load order value 1 until it has loaded all the device
    driver that are marked for loading.


