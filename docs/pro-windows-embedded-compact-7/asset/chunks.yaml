- fmt: '# Modern Real-Time Systems and Interrupt Handling


    Modern real-time systems have switched from polling for input to waiting on input
    to arrive. This is possible because hardware has advanced so much and latencies
    for processing input from the point in time it arrives to the point in time it
    has been processed have been reduced by huge margins. Real-time systems these
    days are capable of minimal interrupt latencies, and more importantly, these systems
    keep jitter to an acceptable level.


    This chapter discussed the interrupt model for Windows Embedded Compact 7, which
    is very much the same as for Windows CE 6.0 and quite similar to previous versions
    such as Windows CE 5.0. A very minimally coded and fast ISR triggered by the kernel
    exception handler, deferred interrupt processing by a run of the mill thread that
    should release the interrupt once it has completed processing it. The fact that
    such a thread can be assigned a scheduling priority that correlates to the interrupt
    request level it is associated to, allows for consistent and good real-time performance.


    Additionally, to enhance real-time performance ISR execution can be preempted
    by the kernel to allow an ISR for a higher interrupt request level to execute
    before returning to complete its execution. This is called nested interrupt. This
    assures that interrupts for critical I/O devices are serviced ahead of less critical
    devices.


    I/O devices resources are accessed either by mapping these resources to the system
    memory or are accessed specifically by special CPU instructions if mapped to specific
    I/O memory range like the x86 architecture supports.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 9: Device I/O Control Handling


    Stream device drivers are accessed by applications using the file system API.
    This really limits the interface capabilities of device drivers. All that the
    file system interface allows the developer to perform are read, write, or seek
    operations. This is fine for real file I/O, but stream device drivers, though
    regarded as files are completely different. To allow the device driver to communicate
    custom operations it can perform on the peripheral device it controls, a special
    mode of operation was created. This method is not unique to Windows Embedded Compact
    7 or Windows CE, it is part of the Win32 API and it has been part of UNIX and
    UNIX like systems since 1979, and allows stream device drivers to communicate
    custom operations to an application by calling the `DeviceIoControl` function.
    This function is implemented by Device Manager and exposed by it so it can be
    called from within user mode applications.


    ## In This Chapter


    - What are IOCTLs

    - Adding Device IOCTLs

    - Processing Device IOCTLs


    ## What Is an IOCTL


    `IOCTL` literally means Input Output ConTroL. Stream device drivers can be regarded
    as device files which represent physical devices. Physical devices are used for
    input, output or both, so there has to be some mechanism for device drivers in
    the kernel to communicate with user mode processes. Since opening a stream device
    driver as a file using file system APIs means that we can use file system API
    `WriteFile` to send data from a user mode application to a peripheral device for
    output. However what happens if a user mode application needs to communicate with
    the same peripheral device not for sending data out but to get the device status
    for example? This is where the “control” part of the `IOCTL` comes in. It really
    gives user mode applications a way to directly control the peripheral device programmatically.


    So what is an `IOCTL` exactly from a technical aspect? `IOCTL` is a 32-bit value
    divided into four fields that becomes a unique system IOCTL:


    - **A. Kcholi** *P*, *ro Windows Embedded Compact 7* © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Device Type | Function Code | Require | Access | Method


    ```

    31                    16  14             2   0

    ```'
