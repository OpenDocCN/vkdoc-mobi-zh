    COMPACT


    Monolithic Architecture and Windows CE


    Windows Embedded CE 6.0 (henceforth Windows CE 6.0 for brevity) and later versions
    are based on the monolithic kernel architecture. Figure 1-2 shows the Windows
    CE 6.0 architecture and Windows Embedded Compact 7\. What’s particularly important
    to note in this figure is that the device driver hosts (that is, GWES.dll and
    DevMgr.dll) are dynamically linked libraries themselves. Componentization is still
    available to the designer who may add or remove system services as needed.


    *Figure 1-2\. Windows CE 6.0 and Windows Embedded Compact 7 System Architecture*
    User-Mode versus Kernel-Mode Drivers in the Monolithic Architecture


    Running in kernel mode implies that a malfunctioning device driver can jeopardize
    the entire system. In order to provide robustness installable device drivers can
    run in user mode hosted by the Udevice.exe process, thus protecting the kernel
    from rogue device drivers. The main disadvantage is a slower performance. From
    experience it seems that kernel mode device drivers in a monolithic kernel provide
    better performance then user mode device drivers in the microkernel architecture,
    while user mode device drivers in a monolithic kernel take a nose dive in performance.
    For more information, refer to the section “*Windows CE Device Drivers in Kernel
    or User Mode*” later in this chapter.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-23_1.jpg)


    CHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED COMPACT


    Windows CE System Architecture and I/O Handling


    Windows Embedded Compact 7, as its predecessors Windows CE 6.0, is a commercial
    embedded Real Time Operating System (RTOS) based on a monolithic kernel. The specific
    device driver model adopted by the operating system is simple and provides for
    uncomplicated device driver implementation.


    Device Driver-Related System Components


    Windows Embedded Compact, like any modern embedded operating system, consists
    of a variety of system components each with a specific purpose to form a platform
    with a wide-ranging set of functionality and features. The kernel provides the
    core operating system services additional services, such as GWES and Device Manager,
    provide further functionality and interfaces. Figure 1-3 highlights those system
    components that are particularly important for device driver developers.


    *Figure 1-3\. Device Driver-Related Windows CE System Components*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED COMPACT


    Windows CE relies on the following system components to implement a flexible device
    driver model:


    • GWES.DLL – This is the Graphic Windowing and Events Subsystem, which loads native
    device drivers and manages them and their interfaces while loaded. The section
    “*Windows Embedded Compact Device Driver Model*” later in this chapter introduces
    GWES in more detail.


    • DEVMGR.DLL – This is the Device Manager, which loads kernel mode stream interface
    device drivers. In addition Device Manager tracks interfaces advertised by drivers
    and supports searches for drivers based on a globally unique identifier (GUID).
    For details, see the section “*Windows Embedded Compact Device Driver* *Model*”
    later in this chapter.


    • I/O Resource Manager – Device Manager includes an I/O Resource Manager to enumerate
    a list of available resources from the registry.


    • FILESYS.DLL and FSDMGR.DLL – These are the Windows Embedded Compact


    file system manager and file system driver manager, which load partition drivers
    and file system drivers into the Windows CE Storage Manager. You learn more about
    these types of drivers in Chapter 6 “Understanding Device Driver Types.”


    • Networking DLLs – These DLLs enable networking functionality, such as TCP/IP.


    Chapter 10 “Network Driver Interface Specification” provides more details about
    network communication in Windows CE.'
