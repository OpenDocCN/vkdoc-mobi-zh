    Terminology in Windows CE is sometimes confusing; note that there are RETAILMSG
    and DEBUGMSG. The DEBUGMSG macro is used in debug builds only. So, if a module
    is compiled as retail, that is compiled with WINCEDEBUG=RETAIL set in the build
    environment it will not output any DEBUGMSG statements. RETAILMSG, on the other
    hand, outputs messages in both retail and debug builds. If the build is compiled
    as a “ship build” that is WINCESHIP=1 set in the build environment, no messages
    will be outputted. Why is the terminology confusing? Because the term “retail”
    does not mean


    “ship” as would be expected by the English language.


    Registering Debug Zones


    Before debug zones can be used in your module these zones have to be registered
    with the debug system. There are a few preparation steps you have to take. First
    is to define your debug zones. One thing to remember is that you can define at
    most sixteen zones per module. Listing 11-1 shows a sample of code defining five
    zones.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    *Listing 11-1\. Defining module specific debug zones*


    **#ifdef DEBUG**


    ****#define ZONE_INIT DEBUGZONE(0)**


    **#define ZONE_OPEN DEBUGZONE(1)**


    **#define ZONE_IOCTL DEBUGZONE(2)**


    **#define ZONE_DEINIT DEBUGZONE(3)**


    **#define ZONE_ERROR DEBUGZONE(15)**


    ****#endif //DEBUG**


    Next you have to associate a bitmask to a zone ID. Listing 11-2 presents a way
    of doing it. This mask is needed to set the **ulZoneMask** field in the **DBGPARAM**
    structure to indicate which zones are enabled.


    *Listing 11-2\. Associating a bitmask to a zone ID*


    **#define DEBUGMASK(bit) (1 << (bit))**


    ****#define MASK_INIT DEBUGMASK(0)**


    **#define MASK_OPEN DEBUGMASK(1)**


    **#define MASK_IOCTL DEBUGMASK(2)**


    **#define MASK_DEINIT DEBUGMASK(3)**


    **#define MASK_ERROR DEBUGMASK(15)**


    Before you can register you have to declare a **DBGPARAM** structure that is private
    for the specific module. Because this structure actually associates your zone
    IDs to your module and when registered the debug system is able to manage your
    module’s specific zones. Listing 11-3 shows an example of declaring this structure.
    Note, however, that the assigned variable has to always be named **dpCurSettings**.


    *Listing 11-3\. Declaring DBGPARAM*


    **DBGPARAM dpCurSettings = {**


    **_T("Demodrvr"),**


    **{**


    **_T("Init"), _T("Open"), _T("Ioctl"), _T("DeInit"),** **_T(""), _T(""), _T(""),
    _T(""),** **_T(""),_T(""),_T(""),_T(""),** **_T(""),_T(""),_T(""),_T("Error")**


    **},**


    **MASK_INIT | MASK_DEINIT**


    **};**


    Two things to note about this structure, the first is the name of the module is
    assigned in the first field of the structure, the last field, **ulZoneMask** indicates
    which zones are enabled.


