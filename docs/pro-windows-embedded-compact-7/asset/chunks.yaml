    \ driver you need to be absolutely clear of the device driver’s functionality.\
    \ The design requirements for the device driver are a good place to start.\n\n\
    So what are quality metrics? Let’s define a metric first. A metric is a verifiable\
    \ measure stated in either quantitative or qualitative terms. It captures performance\
    \ in terms of how something is being done relative to a standard.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nThe following example will demonstrate in a very simplified manner what this\
    \ all means. For this example a very simple device driver that supports asynchronous\
    \ I/O write request. The test should check that the driver provides what it is\
    \ supposed to provide, asynchronous I/O write request. The test is designed to\
    \ open the device driver and request a write operation using a device `IOCTL`\
    \ code. Then if the call to `DeviceIoControl` returned immediately and an I/O\
    \ completion indication was provided afterwards the test should return a pass\
    \ result. Otherwise it should return a fail result.\n\nIn addition to the functionality\
    \ test, a performance test is added and it compares the time it takes to complete\
    \ the I/O request to a reference tick count. If it is equal or less than the reference\
    \ tick count the performance test passes; otherwise it fails.\n\n### TUX Test\
    \ Harness\n\nThe TUX test harness is a device-side client executable that loads\
    \ device-side tests implemented as dynamic linked libraries and can perform tests\
    \ either in standalone mode on the device or triggered by the CTK server described\
    \ earlier. `Tux.exe` is an architecture-related device-side executable test engine\
    \ that communicates with the development workstation CTK test server via core\
    \ connectivity. This is a typical client/server architecture that provides many\
    \ advantages, including the separation of GUI from the test engine with separate\
    \ address spaces and a small footprint device side test engine.\n\n### Implementing\
    \ a TUX Test DLL\n\nTests are implemented in dynamic link libraries test modules\
    \ that are loaded into the test engine and provide two function prototypes, the\
    \ `ShellProc` function which is responsible for handling the communications between\
    \ the test engine and the test module. This function was left unmodified as there\
