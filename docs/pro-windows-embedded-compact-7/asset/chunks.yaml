    Input/Output Handling


    Windows Embedded Compact 7 as well as Windows CE 6.0 provides nested interrupts
    to provide low interrupt latencies and assure minimal latencies for top priority
    hardware device interrupts. The interrupt model is based on three elements:


    • Kernel Interrupt Service Handler – Can handle up to 64 separate hardware IRQ


    sources. It determines interrupt priority level and calls an ISR hooked to it
    and then sets event that is associated with the related Interrupt ID to schedule
    the associated IST.


    • Interrupt Service Routines (ISRs) – The ISR is hooked to a hardware interrupt
    request (IRQ) in kernel mode, it acknowledges hardware and determines Interrupt
    ID. The ISR can be static, that is, built into NK.EXE, or installable (chained
    in) via kernel call.


    • Interrupt Service Threads (ISTs) – The IST performs device-specific servicing
    for the specified Interrupt ID and must signal completion of interrupt processing
    to the hardware.


    Interrupt Processing


    Figure 1-7 shows how Windows Embedded Compact handles interrupts.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


