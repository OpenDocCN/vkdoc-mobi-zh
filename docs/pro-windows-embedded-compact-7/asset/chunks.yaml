    Adding Device Specific IOCTLs


    The DDK provides the developer with a macro **CTL_CODE** that defines a systemwide
    unique IOCTL. This macro should be used to define IOCTLs by all developers so
    that values do not overlap by different developers. This macro simply sets the
    four fields into a 32 bit value:


    **#define CTL_CODE( DeviceType, Function, Method, Access) (**


    **((DeviceType) << 16) | ((Access) << 14) | ((Function) << 2) | (Method))** Listing
    9-4 is an example of defining IOCTLs for a demo device driver using the **CTL_CODE**.


    *Listing 9-4\. Defining IOCTLs*


