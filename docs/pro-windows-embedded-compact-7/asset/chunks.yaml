    CHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS


    Loading and Initializing a User Mode Device Driver


    Loading user mode device drivers starts the same way as any stream device driver
    loading process.


    Figure 7-12 helps explain the process of loading a user mode device driver. It
    shows the loading process progression in the upper call stack including the creation
    of the reflector, in the lower call stack is the progression of the driver initialization
    process until the *xxx_Init* entry point of the user mode device driver is called.


    Note that the red squares in the figure actually start the process once BusEnum
    calls *ActivateDeviceEx* to load the device driver. The first step is calling
    *LoadLib* which triggers first either finding a running Udevice process if our
    device drivers is to run in a shared host or create a new Udevice host process.
    This process now creates a new reflector service for our device driver (This process
    occurred in the call to CreateReflector in line 5 of the top block in the figure).
    The reflector eventually loads the device driver DLL. If it loaded successfully
    the Init function for the reflector trigger a call to the device driver xxx_Init
    entry point. If the Init function of the device driver does not fail the device
    driver is active and running in the host Udevice process.


    *Figure 7-12\. Loading process of a user mode device driver*


