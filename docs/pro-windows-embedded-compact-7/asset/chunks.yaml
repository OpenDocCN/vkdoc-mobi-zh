  trans: '

    # 可安装的 ISR


    可安装的 ISR 实现在 DLL 中。设备驱动程序可以通过 `LoadIntChainHandler` 函数在运行时将 ISR 加载到内核中。中断处理程序则通过
    `FreeIntChainHandler` 函数卸载。第 8 章“*设备驱动程序的 I/O 与中断*”提供了关于在设备驱动程序中如何使用 `LoadIntChainHandler`
    和 `FreeIntChainHandler` 的更多详细信息。


    # Windows Embedded Compact 设备驱动程序模型


    Windows Embedded Compact 7 实现了一种区分本机驱动程序和流接口设备驱动程序的简单设备驱动程序模型。


    ## 本机 Windows CE 设备驱动程序


    本机驱动程序对应于加载到图形、窗口和事件系统 (GWES) 中的用户输入设备驱动程序和显示设备驱动程序。另一方面，流接口设备驱动程序遵循流接口，以便另一个内核服务器——设备管理器能够管理这些驱动程序。


    图 1-9 展示了本机设备驱动程序模型接口。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-31_1.jpg)


    *图 1-9. 本机设备驱动程序模型接口*


    ## Windows Embedded Compact 中的流接口设备驱动程序


    *流设备驱动程序*这个术语可能会引起误解，因为它通常用于处理数据流的外设 I/O 硬件，例如串行端口设备驱动程序。这可能意味着这种类型的设备驱动程序并不适合用于管理数据块（例如存储磁盘）的块设备。然而，Windows
    Embedded Compact 中的流接口设备驱动程序既可以处理流设备，也可以处理块设备。因此，我强烈建议使用*流接口*设备驱动程序这一术语，这意味着该设备驱动程序必须公开一组定义好的函数，允许应用程序通过文件系统
    API 与设备驱动程序通信。


    图 1-10 展示了流接口设备驱动程序模型接口。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-32_1.jpg)


    *图 1-10. 流接口设备驱动程序模型接口*


    设备管理器加载内核模式的流设备驱动程序，并在加载期间管理这些驱动程序及其接口。当设备管理器加载时，它首先加载 I/O 资源管理器，以从注册表中枚举可用资源列表。此外，设备管理器会跟踪驱动程序所通告的接口，并支持基于全局唯一标识符
    (GUID) 搜索驱动程序。本章后面的“加载和卸载设备驱动程序”一节提供了关于流接口设备驱动程序加载过程的更多详细信息。


    # 单体驱动与分层驱动


    如图 1-9 和 1-10 所示，本机驱动程序和流驱动程序都可以采用单体设计或分层设计。单体驱动程序依赖于单个 DLL 来实现操作系统和应用程序的接口以及硬件逻辑，而分层驱动程序架构则基于模型设备驱动程序
    (MDD) 和平台设备驱动程序 (PDD)。


    单体设备驱动程序和分层设备驱动程序具有以下优点和缺点：


    - **单体设备驱动程序** – 如果出于性能考虑希望避免 MDD 和 PDD 之间的额外函数调用，单体驱动程序可能是不错的选择。

    - **分层设备驱动程序** – 基于 MDD 和 PDD 的分层架构具有优势，因为它有利于代码复用和驱动程序更新的开发。因此，它是许多设备驱动程序开发人员的首选。


    # 内核模式或用户模式下的 Windows Embedded Compact 设备驱动程序


    由于 Windows Embedded Compact 现在是单内核架构，设备驱动程序现在既可以在内核模式下运行，也可以在用户模式下运行。在内核模式下，设备驱动程序可以访问内核资源。这带来了安全风险，并催生了一种新型的设备驱动程序——用户模式设备驱动程序。


    内核模式设备驱动程序由设备管理器服务器库 `DEVMGR.DLL` 管理，而用户模式设备驱动程序则各自驻留在一个名为 `UDEVICE.EXE` 的用户模式进程中，但仍由设备管理器管理。


    ## 内核模式设备驱动程序


    在 Windows Embedded Compact 中，内核模式意味着可以访问内核地址空间。但需要注意的是，当用户模式线程进行系统 API 调用时，由于几乎所有的系统
    API 都在内核模式下运行的服务器库中实现，因此该用户模式线程是在内核模式下运行的。


    这对内核模式设备驱动程序有一定影响。如果内核模式设备驱动程序接收了一个指向用户模式回调函数的指针，在没有适当预防措施的情况下，即使该回调函数在用户模式线程中运行，它也可能访问内核模式的调用和地址。关于适当的预防措施将在本书后面讨论。


    从实现角度来看，内核模式设备驱动程序实际上与以前版本的 OS 中的实现方式相同，但用户模式设备驱动程序无法访问内核数据结构或资源，它们被托管在特殊的用户模式进程中，该进程会创建并与一个内核反射器服务通信，以便为用户模式设备驱动程序提供一种安全的方式来执行其任务。


    内核模式设备驱动程序根据其接口，由设备管理器或 GWES 加载到内核中。流设备驱动程序由设备管理器 `DEVMGR.DLL` 加载并管理。本机设备驱动程序加载到图形、窗口和事件子系统
    `GWES.DLL` 中。内核模式设备驱动程序可以完全访问内核数据结构和内核内存。内核模式设备驱动程序链接到 `KCOREDLL`，这是 `COREDLL`
    的内核版本，用于提供对 API 的访问。


    ## 用户模式设备驱动程序


    用户模式意味着设备驱动程序只能访问用户模式地址空间，并且这意味着设备驱动程序不能直接执行任何内核模式调用或访问内核模式内存。


    用户模式设备驱动程序由设备管理器管理，但托管在特殊的用户模式进程 `udevice.exe` 中。用户模式设备驱动程序没有内核特权，无法访问内核结构或内存，也不能调用仅限内核的
    API，例如 `VirtualCopyEx`。用户模式设备驱动程序提高了稳定性，因为用户模式设备驱动程序彼此隔离，并且没有访问内核的特权。用户模式设备驱动程序提供了更高的安全性，因为受损的用户模式设备驱动程序无法使系统崩溃，因为用户模式特权限制了受损驱动程序的能力。用户模式设备驱动程序提供了更好的可恢复性，因此操作系统可以在驱动程序崩溃后恢复，并且可以在不重启的情况下重新启动驱动程序。


    # 加载和卸载设备驱动程序


    本机驱动程序和流驱动程序仅在它们公开的 API 方面有所不同。您可以在系统启动时或按需加载这两种类型的驱动程序。然而，Windows Embedded Compact
    加载设备驱动程序的具体方式取决于驱动程序类型。


    ## 加载流接口设备驱动程序

