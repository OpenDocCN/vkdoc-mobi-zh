    \            break;\n    }\n}\n```\n\n*清单 7-23. 调用用户模式设备驱动程序显示消息框的应用程序示例代码*\n\n\
    ```\nint _tmain(int argc, TCHAR *argv[], TCHAR *envp[])\n{\n    BOOL bRet = FALSE;\n\
    \    HANDLE hTstDrvr = INVALID_HANDLE_VALUE;\n\n    // Try open an instance of\
    \ TestDrvr\n    hTstDrvr = CreateFile(L\"UMD1:\",\n                          GENERIC_READ\
    \ | GENERIC_WRITE,0,\n                          NULL,OPEN_EXISTING,0,NULL);\n\
