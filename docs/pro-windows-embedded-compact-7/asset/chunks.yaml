    Developers debug their code to eliminate errors and when it seems that no more
    failures befall our development we seem to be happy and supply our device driver
    only to have our clients frustrated. There may be more to making sure that our
    device driver works as it is supposed to work than just the obvious bugs. It may
    not stand up to timing performance needs, thus dropping invaluable data, it may
    be inconsistent, and it may encounter a bug that only happens in some sporadic
    combination of specific data and timing.


    To test for such shortcomings, it is the person with the utmost knowledge of the
    device driver who has to design a testing scenario for testing the device driver.
    Microsoft provides a very nice tool for implementing test case suites for device
    drivers, the Windows Embedded Compact Test Kit (CTK). This tool as an improved
    version of the Windows CE Test Kit (CETK) tool however uses the same Tux test
    harness. Chapter 15 is dedicated to developing TUX test modules for testing device
    drivers. Figure 3-5 shows the latest CTK IDE. The device driver wizard offers
    a skeleton test module implementation ready for customization and build. CTK provides
    a set of predefined tests for various drivers implementing common device drivers
    such as USB host controllers.


