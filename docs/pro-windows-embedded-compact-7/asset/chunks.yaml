    *Figure 3-5\. The Windows Embedded Compact Test Kit IDE*


    ### Chapter Summary


    This chapter has discussed what you should consider before you start implementing
    device driver code. Later chapters in the book will discuss how to determine using
    the alternatives between these considerations. However taking all aspects of the
    device driver implementation into consideration ahead of the implementation phase
    should shorten the development period of time and most likely even cut on possible
    errors and bugs.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## **C H A P T E R 4**


    ## **Mastering the Hardware Environment**


    The device driver developer community is a mixed bag of either hardware-predominant
    developers or software-predominant developers. If you belong to the latter you
    need to keep it in mind that it is impossible to write device driver interface
    code for the hardware, without understanding the hardware.


    This chapter is beneficial to developers of both backgrounds as the former will
    find useful programming tips and the later useful hardware specification tips.


    In this chapter:


    - Understand I/O Device Registers

    - Understand I/O Device Interrupts

    - Understand I/O Device Memory

    - Understand DMA – Direct Memory Access


    ### Introduction


    As many experienced device driver developers know from their hard-earned experience,
    the first step of developing a device driver is to understand the underlying hardware.
    The device driver developer does not need to be a hardware developer, however
    understanding the functionality of the hardware and how to interface with it programmatically
    is of the utmost importance. Without a deep understanding of how the hardware
    works its magic, there is no hope for the device driver developer to achieve his
    or her goal of ever developing a solid device driver.


    To put it simply, I/O hardware peripherals are the lifeline to the world for an
    embedded device or for that matter, for any computer system, I/O devices are analogous
    to a human being’s eyes, ears, nose, or mouth to name but a few. Without the functional
    operation of I/O devices, a computer system would be rendered useless, unable
    to communicate with the surrounding world. The I/O peripheral is connected to
    some source or sink of data; it accepts data coming in or pushes data out.


    For example, suppose that you need to create a device driver for an analog input
    device that accepts data coming from some machine in a manufacturing plant. In
    order to develop your device driver you need to know of the range of analog signals
    that the device accepts from the machine, how it converts it, and how it is calibrated
    to have meaningful data that the device driver will pass on to the application
    that will process the data. Your hardware accepts some data in the form of an
    electric current, which is otherwise meaningless to the system, to have your device
    driver pass on meaningless information is really not what you want.


    As a programmer you surely know that such a peripheral device is a piece of microelectronics
    hardware that presents to the system a set of data ports and a way to control
    it, or retrieve status information. It is your responsibility as a device driver
    developer to write the unit of execution that will allow this peripheral device
    to connect with the operating system and offer applications the ability to get
    meaningful data from the machine on the shop floor. The device driver you develop
    has to map itself to the data ports and retrieve or write data to and from these
    ports, to perform this task, your code must setup the peripheral device for correct
    operation by sending specific commands to the device command ports, this is why
    it is so important for a device driver developer to understand the underlying
    hardware.


    You need to add code to recover status information so that the control code logic
    you design is coherent with the various states the device may be in.


    ### I/O Device Registers


    The mechanism by which a peripheral device passes data to the system is a set
    of data ports, however data ports are not the only registers a peripheral device
    presents to the platform. It becomes clear to the device driver developer that
    device driver code must manage the device so that the data has some coherent meaning
    to the applications that need the input data. Moreover, the developer needs to
    consider the state of the hardware, in order to manage the device appropriately,
    which means that any such device has to report its status to the system as well
    as allow the system to control it. For this reason any such hardware provides
    three basic groups of ports or registers:


    - **Status registers** – The combination of bits set or not in the status registers
    indicate the current state of the device.

    - **Control registers** – Setting or clearing bits in a control register create
    a command that the device will act upon.

    - **Data registers** – Depending on the direction in which these registers are
    configured to move data these will either transmit or receive bits of data.


    The best way to follow the discussion would be to look at a relatively simple
    peripheral device such as Two Wire Serial Interface bus (`TWSI`, formerly known
    as `I2C`). It is used for example, by power management ADC controllers, built-in
    cameras, and more. Imagine that you have the task of managing the battery of a
    mobile device and the design provides for example a single chip power management
    unit that provides a `TWSI` communication interface. The way to communicate with
    this chip that will provide information about the state of the battery is developing
    a device driver for a `TWSI` controller that resides on your target device `SoC`
    (System on Chip).


    © Abraham Kcholi 2011'
