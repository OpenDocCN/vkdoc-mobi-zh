    I/O Memory Mapping


    An important part of interrupt processing is retrieving the data that its arrival
    caused the interrupt to trigger. A peripheral I/O device provides a set of ports
    or registers via which data can be retrieved.


    Accessing these ports means that we need some way to address these ports or registers
    and read them, or write to them. Addressing these locations on peripheral I/O
    devices is the subject of this section. The two methods of performing I/O between
    the CPU and peripheral I/O devices depending on the architecture are memory-mapped
    I/O and port-mapped I/O.


    I/O base address and length information is cardinal to develop device drivers.
    I/O base address would be the address where the first register of the peripheral
    device is located, be it memory mapped or I/O space mapped. The length is better
    known as the range of registers the peripheral device occupies.


    So for example the classic example of COM1 port on a PC (remember it is I/O space)
    has a base address of 0x3F8 and length of 8 since its range is 0x3F8 to 0x3FF.
    Length is always denoted in bytes. So if a peripheral device can be described
    by the following structure in listing 8-7 it would have a length of 32


    bytes.


    *Listing 8-7\. A demo peripheral device ‘C’ structure description*


    **typedef struct**


    **{**


    **volatile UINT32 REG0; // offset 0x0000, REG0**


    **volatile UINT32 Reserved[3];**


    **volatile UINT32 REG1; // offset 0x0010, REG1**


    **volatile UINT32 REG2; // offset 0x0014, REG2**


    **volatile UINT32 REG3; // offset 0x0018, REG3**


    **volatile UINT32 REG4; // offset 0x001C, REG4**


    **} DEMO_REGS *PDEMO_REGS;**


