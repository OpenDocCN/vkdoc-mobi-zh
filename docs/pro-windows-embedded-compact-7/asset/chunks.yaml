    \ an intermediate driver must call the `NdisRegisterProtocolDriver` function.\n\
    \n## Registry Settings\n\nRegistry settings for NDIS network driver revolve around\
    \ the NDIS device driver being loaded by Device Manager. NDIS in turn is responsible\
