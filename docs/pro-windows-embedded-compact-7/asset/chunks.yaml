    The Error Report Transfer Driver transfers registry setting values to the aforementioned
    reserved memory. The Error Report Generator then retrieves these settings from
    memory, in order to generate the appropriate dump file. These inform the Error
    Report Generator where to generate the dump file and what type of dump to create;
    in this case it''s the system dump, and the maximum disk size to use is four times
    the size of the reserved memory.


    While developing an OS design, the developer sets the type of crash dump to be
    generated, note the value for **DumpType** key in the registry settings in Listing
    11-10\. Each type of dump follows the same file format, three of which can be
    generated:


    • Context dumps, 4 KB to 64 KB


    •


    Information about the crashing system


    •


    The exception that initiated the crash


    •


    The context record of the faulting thread


    •


    A module list, limited to the faulting threads of the owner process


    •


    A thread list, limited to the faulting threads of the owner process


    •


    The call stack of the faulting thread


    •


    64 bytes of memory above and below the instruction pointer of the faulting thread


    •


    Stack memory dump of the faulting thread, truncated to fit a 64 KB limit 222


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    • System dumps, 64 KB—several MB


    •


    All information in a Context dump


    •


    Calls tacks and context records for all threads


    •


    Complete module, process, and thread lists for the entire device


    •


    2048 bytes of memory above and below the instruction pointer of the


    faulting thread


    •


    Global variables for the process that was current at the time of the crash


    • Complete dumps, including all physical memory plus at least 64 KB


    •


    All information in a context dump


    •


    A complete dump of all used memory


    Error Report Transfer Driver


    The Error Report Transfer Driver moves the registry values (needed by the Error
    Report Generator) from the registry to the reserved memory block, and moves the
    generated files from reserved memory into persistent files.


    After transferring a dump file to persistent storage, the Error Report Transfer
    Driver launches the Report Upload Client specified in the registry.


    The Sysgen variable " **SYSGEN *_*WATSON *_*XFER**" must be set to include the
    Error Report Transfer Driver in the image. The **[HKLM\Drivers\BuiltIn\ErrorReporting]**
    registry key holds the registry values for Error Report Transfer Driver. Listing
    11-10 shows a sample of such a registry setting, in which the time interval for
    transfer polling is set to 5 minutes and the poll priority is set to 249.


    Error Report Control Panel


    The Error Reporting Control Panel allows the user of a display-based device to
    configure options for dump file generation by way of a Control Panel applet. The
    options available to the user are:


    • Enable/disable error reporting—on a display-based device, error reporting is
    enabled by default. On a headless device, error reporting is disabled by default.


    • Control the amount of storage space allocated for dump files—the control panel
    dialog box contains a set of radio buttons that allow the user to select the amount
    of storage space for storing dump files, as can be seen in Figure 11-15.


    • Enable user notification dialogs


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-235_1.png)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    *Figure 11-15\. Display based device’s error reporting control panel applet* The
    Sysgen variable " **SYSGEN_WATSON_CTLPNL**" must be set to include the Error Reporting
    Control Panel in the image. The registry settings contained in the **[HKLM\System\ErrorReporting\DumpSettings]**


    registry key and in the **[HKLM\System\ErrorReporting\UploadSettings]** registry
    key are used by the Error Reporting Control Panel to set the initial values in
    the control panel dialog.


    Report Upload Client


    The upload client is responsible for uploading the generated and created dump
    file to the watson.microsoft.com error reporting web site. It is, however, possible
    to upload this file to another web site—but that involves code changes, for example
    to the function **FValidBucketResponseURL**, so it validates a different website
    than the above mentioned and implemented in **(_PUBLICROOT)\WCESHELLFE\OAK\WATSON\DWUI\
    DWUIDLGS.CPP**.


    Another file you want to look at is **(_PUBLICROOT)\COMMON\OAK\INC\DWPUBLIC.H**.
    Here, you can define a valid response server (**VALID_RESPONSE_SERVER**) for your
    server, and, of course, you need to create an upload website capable getting bucket
    parameters, grouping minidumps into buckets, and responding to the upload client.
    While all this is possible, it might not be worth the trouble.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    Minidumps and Buckets


    A minidump is a dump file generated on the device by Dr. Watson, containing the
    most important parts of a crashed application. It''s "mini" name results from
    the fact that it contains only what is needed to identify and analyze the crashed
    application. A bucket represents a unique bug or problem and identifies the component
    responsible for the bug. Bucketing helps the upload server to organize uploaded
    minidumps. All of this means that minidumps describing the same problem are grouped
    together in what is termed a bucket.


    The structure **DMPFILEINFO** contains all the information needed to group a minidump
    file in a bucket:


    **// Structure to contain information regarding the dump file**


    **typedef struct tagDMPFILEINFO**


    **{**


    **WORD wBucketParams; // how many bucket parameters are**


    **// being used**


    **LPWSTR rgwzBucketParams[MAX_BUCKETPARAMS]; // bucket**


    **// parameters for generic mode**


    **LPWSTR pwzQueryString; // additional query string**


    **LPWSTR pwzAppName; // Name to display in the UI.**


    **LPWSTR pwzFilesToKeep; // files to include in log but not**


    **// delete**


    **LPWSTR pwzFilesToDelete; // files to include in log but**


    **// delete when**


    **// finished**


    **BOOL fGenericParams; // True indicates the bucket**


    **// parameters are**


    **// generic parameters**


    **} DMPFILEINFO, *PDMPFILEINFO;**


    Chapter Summary


    The debugging process is the lengthiest and maybe even the most important facet
    of the development cycle of a device driver as is of any piece of software. Platform
    Builder provides an array of tools that are invaluable to the debugging process.
    Nevertheless all these debugging tools are software tools. From kernel debugger
    and target control that is also host to calling debug extensions. Platform Builder
    provides a comprehensive debugging extension DLL named CeDebugX to help diagnose
    problems efficiently.


    Sometimes, however, software debugging tools are not enough, especially when hardware
    is related to the debugged software. This calls for hardware assisted debugging
    that in modern processors is supported on chip. Tools like the TRACE32 ICD from
    Lauterbach provide an interface and an IDE to assist the developer. It provides
    on chip information and real-time trace capabilities.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


