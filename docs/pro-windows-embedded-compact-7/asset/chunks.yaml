    Chapter Summary


    This chapter was devoted to network drivers with the focus on drivers for the
    network adapter card. As such, more emphasis was given to NIC miniport drivers
    than to protocol drivers or intermediate drivers.


    NIC miniport drivers are responsible for interfacing to the hardware using the
    API the NDIS framework provides the developers to handle high performance network
    hardware. It provides the driver developer functions to receive and send large
    data amounts using scatter/gather DMA, to perform either memory mapped I/O or
    port mapped I/O operations. It provides functions to handle hardware information,
    housekeeping, and interrupts and synchronization. All of these APIs make for portable
    device drivers across operating systems and lower the effort to develop network
    adapter drivers. One last note regarding NIC device drivers, is that you cannot
    use NDIS drivers for boot loaders, since NDIS is not part of boot loaders. This
    means that network device drivers that support boot loaders must implement all
    the hardware interface within the driver’s code.


