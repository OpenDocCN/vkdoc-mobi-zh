    \n## 第 12 章 ■ 使用 CTK 开发测试代码\n\n*图 12-7. 将 TUX 测试模块骨架添加到设备驱动程序目录层次结构中*\n\n### 运行测试\n\
    \n在开发完 TUX 测试 DLL 并实现了各种测试过程以执行设计好的测试之后，你可以运行 TUX 设备端控制台应用程序，并使用命令行以独立方式加载测试 DLL\
    \ 并运行测试，或者在开发工作站上运行 CTK 服务器来触发测试。在图 12-8 中，我们使用测试通过模板作为默认测试通过方案，直接运行特定测试。\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-249_1.jpg)\n\
    \n## 第 12 章 ■ 使用 CTK 开发测试代码\n\n*图 12-8. 从 Windows Embedded Compact 测试工具包运行测试*\n\
    \n一旦发出运行测试的请求，TUX 会加载 `Demodrvrtest.dll` 模块，运行 `ShellProc` 函数，该函数向 TUX 注册测试过程，以便能够运行。提醒一下，一个测试\
    \ DLL 中可以实现多个测试过程。测试运行后，会写入一个日志文件，可以通过左侧的“结果”选项卡访问，如图 12-10 所述。双击日志文件图标将在记事本中打开该文件。测试完成后，它会在左下角的连接输出中显示简洁的结果输出，如图\
    \ 12-9 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-250_1.jpg)\n\
    \n## 第 12 章 ■ 使用 CTK 开发测试代码\n\n*图 12-9. 测试运行后的连接输出*\n\n### 查看和分析测试结果\n\n简短的结果输出可以立即指示测试是通过还是失败。如果测试通过，你很可能就会结束会话。你可能希望创建更复杂的测试，这些测试会自动重复多次，或者使用不同的参数，或者重试几次，但这实际上是一种效率很低的测试方法。然而，如果测试失败，你肯定希望更详细地检查结果。如果使用图\
