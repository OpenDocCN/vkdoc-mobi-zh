    # CHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS


    ## CLOSING AND DEINTIALIZING DEVICE DRIVERS


    Device drivers may have threads blocking, these threads may not be able to release
    resources associated with the handle or device instance because they block. This
    creates race conditions while trying to close a context instance or unloading
    the device driver.


    A race condition may occur in between I/O operations going on in one thread and
    another thread calling `CloseHandle`. When Device Manager calls the `XXX_Close`
    entry point, drivers should resume threads blocked on a handle and free the associated
    resources with this handle. A device driver may crash should Device Manager call
    an I/O entry point, such as `XXX_IOControl`, after `XXX_Close` has been called
    from another thread.


    Another race condition may occur if Device Manager attempts to unload a device
    when the device driver''s `XXX_Deinit` function executes in one thread while another
    thread attempts to open a handle. In these cases, from the device driver''s standpoint,
    `XXX_Deinit` is called before `XXX_Open`. This may take place during lengthy and
    heavy CPU loads or when drivers are unloading and reloading frequently.


    ## `XXX_Read`


    The `XXX_Read` function reads data from the device identified by the open context.
    This function might or might not be required, depending on the device capabilities
    that the driver exposes. Note that this function is one of three entry points
    that can support asynchronous I/O requests. This is a new capability introduced
    in Windows Embedded Compact 7 and is facilitated by a new input argument which
    is a handle to an I/O packet. See Listing 7-5 for an example.


