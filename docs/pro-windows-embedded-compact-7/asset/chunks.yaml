    devices need a relatively small set of quality metrics because embedded devices,
    unlike general purpose computers and device drivers for embedded devices in particular,
    do not need testing for such cases as install ability, availability, and documentation.
    What embedded device drivers need to be tested for is reliability and performance.


    Both reliability and performance are derived from the functionality of the device
    driver. Before testing a device driver you need to be absolutely clear of the
    device driver’s functionality. The design requirements for the device driver are
    a good place to start.


    So what are quality metrics? Let’s define a metric first. A metric is a verifiable
    measure stated in either quantitative or qualitative terms. It captures performance
