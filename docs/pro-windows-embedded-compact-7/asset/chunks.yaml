    ## CHAPTER 6


    ## Understanding Device Driver Types


    Device driver type is really an ambiguous term. Windows Embedded Compact 7 views
    two basic types of device drivers; Native and Stream device drivers. A third (which
    is really a combination of the two) is called a hybrid device driver. A native
    device driver is a built-in device driver that is loaded and called by GWES at
    boot time and exposes a custom API set that is unique to the device driver class.
    A device driver that manages an IO device built into the hardware platform and
    is managed by Device Manager and exposes a stream interface is regarded as a stream
    device driver. Hybrid device drivers expose both a custom-purpose interface and
    a stream interface to the rest of the system.


    In this chapter:


    • Native device drivers


    • Stream device drivers


    • Hybrid device drivers


    • Monolithic vs. Layered


    • Explain device interface class


    • How to implement device interface notifications


    ### Native Device Drivers


    Native device drivers are typically device drivers that support user input and
    output peripheral devices such as keyboard, mouse, touch screen, and display peripherals.
    It seems reasonable to expect the Graphics Windowing and Events Subsystem (GWES)
    to handle these. GWES does indeed load and manage these device drivers directly.
    Native device drivers implement specific Device Driver Interface (DDI) functions
    relating to their functional purpose. Native device driver registry entries reside
    under `HKEY_LOCAL_MACHINE\HARDWARE\DEVICEMAP\` or under `HKEY_LOCAL_MACHINE\Drivers\Display\`
    registry nodes.


    A. Kcholi *P* , *ro Windows Embedded Compact 7*


    © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 6 ■ UNDERSTANDING DEVICE DRIVER TYPES


    For example:


    `[HKEY_LOCAL_MACHINE\HARDWARE\DEVICEMAP\TOUCH]`


    `"DriverName"="touch.dll"`


    `"MaxCalError"=dword:10`


    ### Stream Device Drivers


    Stream device drivers are loaded and managed by Device Manager. A stream device
    driver exposes a defined set of functions so Device Manager can interact with
    the device driver on behalf of the system or user mode applications. User mode
    applications access stream device drivers using the file system APIs to open an
    instance of the device driver and read and write device data. Extended operations
    are accessed by Device Manager API `DeviceIoControl` which can accommodate customized
    operations allowed by the device driver. Stream device driver registry entries
    reside under `HKEY_LOCAL_MACHINE\Drivers\BuiltIn` registry node.'
