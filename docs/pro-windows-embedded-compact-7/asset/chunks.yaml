- fmt: "# Device Type\n\n- **Device Type** - This is the type of device the IOCTL\
    \ belongs to. This can be user defined by setting the `Common` bit. This must\
    \ match the device type of the device object. Windows Embedded Compact specific\
    \ device types:\n  - `FILE_DEVICE_HAL`\n  - `FILE_DEVICE_CONSOLE`\n  - `FILE_DEVICE_PSL`\n\
    \  - `FILE_DEVICE_SERVICE`\n- **Required Access** - This is the required access\
    \ for the device such as `FILE_READ_DATA`, `FILE_WRITE_DATA`, etc.\n- **Function\
    \ Code** - This is the function code that the system or the user defined depending\
    \ on the custom bit.\n- **Method** - This is the data transfer method to be used\
    \ in Windows Embedded Compact only `METHOD_BUFFERED` should be used.\n\n# Kernel\
    \ IOCTLs\n\nThe kernel, like kernel mode device drivers offers a method to communicate\
    \ control requests from kernel mode components via the `KernelIoControl` kernel\
    \ API. Because I/O control means control over the hardware, this call basically\
    \ calls into an OEM supplied function `OEMIoControl` which is really the actual\
    \ function that implements these IOCTLs. Remember that this is founded on the\
    \ premise that a Windows Embedded Compact device is not generic and is based on,\
    \ mostly unique hardware combinations. Therefore only the OEM can provide coherent\
    \ I/O control over its hardware.\n\n`OEMIoControl` implements a number of standard\
    \ IOCTLs defined by Microsoft. These IOCTLs provide mechanisms for callbacks into\
    \ the OAL at strategic points in the boot process, retrieving system information\
    \ from the OAL, managing interrupt identifiers etc. The IOCTL interface may be\
    \ extended by the OEM to implement any other custom functionality the OEM sees\
    \ fit for advanced operation of the system. For example, the OAL is sometimes\
    \ used to manage access to shared systemwide resources such as GPIO.\n\nWindows\
    \ Embedded Compact 7 Platform Builder provides in it platform common sources the\
    \ implementation of `OEMIoControl`. Listing 9-1 shows the implementation of `OEMIoControl`\
    \ function provided in the platform common sources. The function is called by\
    \ a kernel device driver that calls `KernelIoControl`. This function’s sole purpose\
    \ is to allow an OEM device driver to communicate with kernel mode code.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 9 ■ DEVICE I/O CONTROL HANDLING\n\n*Listing 9-1. Common implementation\
    \ of **OEMIoControl***\n\n```\nBOOL OEMIoControl(DWORD code, VOID *pInBuffer,\
    \ DWORD inSize,\n                  VOID *pOutBuffer, DWORD outSize, DWORD *pOutSize)\n\
    {\n    BOOL rc = FALSE;\n    UINT32 i;\n\n    OALMSG(OAL_IOCTL&&OAL_FUNC,\n  \
    \         (L\"+OEMIoControl(0x%x, 0x%x, %d, 0x%x, %d, 0x%x)\\r\\n\", code, pInBuffer,\n\
    \            inSize, pOutBuffer, outSize, pOutSize));\n\n    //Initialize g_ioctlState.cs\
    \ when IOCTL_HAL_POSTINIT is\n    // called. By this time, the kernel is up and\
    \ ready to handle\n    // the critical section initialization.\n    if (!g_ioctlState.postInit\
    \ && code == IOCTL_HAL_POSTINIT)\n    {\n        // Initialize critical section\n\
    \        InitializeCriticalSection(&g_ioctlState.cs);\n        g_ioctlState.postInit\
    \ = TRUE;\n    }\n\n    // Search the IOCTL table for the requested code.\n  \
    \  for (i = 0; g_oalIoCtlTable[i].pfnHandler != NULL; i++)\n    {\n        if\
    \ (g_oalIoCtlTable[i].code == code) break;\n    }\n\n    // Indicate unsupported\
    \ code\n    if (g_oalIoCtlTable[i].pfnHandler == NULL)\n    {\n        NKSetLastError(ERROR_NOT_SUPPORTED);\n\
    \        OALMSG(OAL_IOCTL,\n               (L\"OEMIoControl: Unsupported Code\
    \ 0x%x – device 0x%04x func %d\\r\\n\",\n                code, code >> 16, (code\
    \ >> 2)&0x0FFF));\n        goto cleanUp;\n    }\n\n    // Take critical section\
    \ if required (after postinit & no flag)\n    if (g_ioctlState.postInit &&\n \
    \       (g_oalIoCtlTable[i].flags & OAL_IOCTL_FLAG_NOCS) == 0)\n    {\n      \
    \  rc = DoOEMIoControlWithCS(i, code, pInBuffer, inSize,\n                   \
    \               pOutBuffer, outSize, pOutSize);\n    }\n    else\n    {\n    \
    \    rc = g_oalIoCtlTable[i].pfnHandler(code, pInBuffer,\n                   \
    \                        inSize,\n                                           pOutBuffer,\
    \ outSize,\n                                           (UINT32 *)pOutSize);\n\
    \    }\n\ncleanUp:\n    OALMSG(OAL_IOCTL&&OAL_FUNC,\n           (L\"-OEMIoControl(rc\
    \ = %d)\\r\\n\", rc));\n    return rc;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
