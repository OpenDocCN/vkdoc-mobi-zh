    \ 11-8 展示了一个示例模块定义文件。当您以调试模式将 Platform Builder 连接到设备并下载操作系统映像后，可以从“调试”菜单中启动“Windows\
    \ CE 调试器扩展”对话框。这是一个标准的“打开文件”对话框，允许您定位并加载扩展 DLL。加载后，您就可以使用扩展命令。清单 11-7 展示了扩展 DLL\
    \ 所需的最低代码量。图 11-11 展示了在目标控制中调用 `!demo` 命令。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 11 章 ■ 调试设备驱动程序\n\n*清单 11-7. 扩展 DLL 实现的演示代码*\n\n```\n#include <intsafe.h>\n\
