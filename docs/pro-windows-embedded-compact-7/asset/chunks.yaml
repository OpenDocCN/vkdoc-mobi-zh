- fmt: "# `UDEVICE.EXE` – User Mode Process  \n\n`UDEVICE.EXE` – This is a user mode\
    \ process to run device drivers in user mode.  \n\nThe section “*Windows Embedded\
    \ Compact Device Drivers in Kernel or User Mode*” later in this chapter discusses\
    \ the advantages and disadvantages of running device drivers in user mode in more\
    \ detail.  \n\n# Windows Embedded Compact 7 Memory Architecture  \n\nWindows CE\
    \ 6.0 and Windows Embedded Compact 7 use a Virtual Memory model that divides the\
    \ address space into separate regions for kernel and user-mode processes (see\
    \ Figure 1-4). This Virtual Memory model predominantly provides protection to\
    \ the kernel and for one process from other processes. This is no different than\
    \ a general purpose OS. However, unlike general purpose OSs, the Virtual Memory\
    \ model of Windows CE 6.0 and Windows Embedded Compact 7 does not provide a backing\
    \ store to swap out memory pages.  \n\nFigure 1-4 provides a broad view of the\
    \ two separate virtual memory regions for the kernel and applications with their\
    \ starting addresses.  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\
    \n![](index-25_1.png)  \n\nCHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT\
    \ FOR WINDOWS EMBEDDED COMPACT  \n\n*Figure 1-4. Virtual Memory Model of Windows\
    \ CE 6.0 and Windows Embedded Compact 7*  \n\n## Kernel Space Virtual Memory \
    \ \n\nWindows CE separates the kernel virtual memory space into separate regions.\
    \ Figure 1-5 shows how the kernel virtual memory space is structured. New in Windows\
    \ Embedded Compact 7 is the ability to address physical RAM larger than 512 MBs,\
    \ up to 3 GBs. However this has to be enabled by the OEM by implementing this\
    \ support within the OAL. The OEM must describe the extended RAM region within\
    \ the `OEMRamTable` structure which defines the additional physical RAM available\
    \ for any hardware platform. The OEM needs to provide the `OEMRamTable` function\
    \ to access the `OEMRamTable` structure.  \n\nTo make `OEMRamTable` available\
    \ to the kernel and kernel independent transport layer (KITL), the OEM must set\
    \ the `pfnGetOEMRamTable` member of `OEMGLOBAL` to point to the `OEMGetOEMRamTable`\
    \ function.  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\n![](index-26_1.png)\
    \  \n\nCHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED\
    \ COMPACT  \n\n*Figure 1-5. Kernel Space Virtual Memory Structure*  \n\nTable\
    \ 1-1 summarizes the regions in kernel-space virtual memory and describes their\
    \ purpose.  \n\n*Table 1-1. Kernel-Space Virtual Memory Regions*  \n\n| Start\
    \ Address | End Address | Name | Description |\n|---------------|-------------|------|-------------|\n\
    | `xF000 0000` | `xFFFF FFFF` | System Trap Area | CPU specific VM System call\
    \ trap area |\n| `xC000 0000` | `xEFFF FFFF` | Kernel VM | Virtual memory for\
    \ the kernel, CPU-specific. To allow Address Space Layout Randomization |\n| `xA000\
    \ 0000` | `xBFFF FFFF` | Static Mapped Uncached Address Space | For access to\
    \ physical memory bypassing the CPU cache. |\n| `x8000 0000` | `x9FFF FFFF` |\
    \ Static Mapped Cached Address Space | For access to physical memory through the\
    \ CPU cache. |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\n![](index-27_1.png)\
    \  \n\nCHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED\
    \ COMPACT  \n\n## User Space Virtual Memory  \n\nWindows Embedded Compact separates\
    \ the user virtual memory space into two main regions for the user process and\
    \ shared DLLs and memory mapped files. Figure 1-6 shows a schematic structure\
    \ of the user virtual memory address space.  \n\n*Figure 1-6. User Space Virtual\
    \ Memory Structure*  \n\nTable 1-2 summarizes the regions in user-space virtual\
    \ memory and describes their purpose.  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n\nCHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT FOR WINDOWS EMBEDDED\
    \ COMPACT  \n\n*Table 1-2. User-Space Virtual Memory Regions*  \n\n| Start Address\
    \ | End Address | Name | Description |\n|---------------|-------------|------|-------------|\n\
    | `x7FF0 0000` | `x7FFF FFFF` | Reserved guard region | Buffer between user and\
    \ kernel spaces. |\n| `x7000 0000` | `x7FEF FFFF` | Shared system heap | Shared\
    \ heap between the kernel and processes. |\n| `x60000000` | `x6FFFFFFF` | Memory\
    \ mapped objects | RAM-backed map files for cross-process communication, expecting\
    \ all processes to map views at the same virtual address. This is Windows CE shared\
    \ memory space. |\n| `x4000 0000` | `x5FFF FFFF` | Shared user-mode DLLs | DLLs\
    \ are loaded starting at the bottom of the stack and moving up. |\n| `x0001 0000`\
    \ | `x3FFF FFFF` | Per-process VM | Executable code and data. |\n| `x0000 0000`\
    \ | `x0001 0000` | Reserved user data | Allocated block for user data |\n\n# Input/Output\
    \ Handling  \n\nWindows Embedded Compact 7 as well as Windows CE 6.0 provides\
    \ nested interrupts to provide low interrupt latencies and assure minimal latencies\
    \ for top priority hardware device interrupts. The interrupt model is based on\
    \ three elements:  \n\n- **Kernel Interrupt Service Handler** – Can handle up\
    \ to 64 separate hardware IRQ sources. It determines interrupt priority level\
    \ and calls an ISR hooked to it and then sets event that is associated with the\
    \ related Interrupt ID to schedule the associated IST.  \n- **Interrupt Service\
    \ Routines (ISRs)** – The ISR is hooked to a hardware interrupt request (IRQ)\
    \ in kernel mode, it acknowledges hardware and determines Interrupt ID. The ISR\
    \ can be static, that is, built into `NK.EXE`, or installable (chained in) via\
    \ kernel call.  \n- **Interrupt Service Threads (ISTs)** – The IST performs device-specific\
    \ servicing for the specified Interrupt ID and must signal completion of interrupt\
    \ processing to the hardware.  \n\n## Interrupt Processing  \n\nFigure 1-7 shows\
    \ how Windows Embedded Compact handles interrupts.  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n\n![](index-29_1.jpg)  \n\nCHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT\
    \ FOR WINDOWS EMBEDDED COMPACT  \n\n*Figure 1-7. Interrupt Processing in Windows\
    \ CE*  \n\nAs visualized in Figure 1-7, the process of handling an interrupt is\
    \ handled in five steps:  \n\n1. Device raises registered hardware interrupt \
    \ \n2. Kernel gets exception, calls associated Interrupt Service Routine (ISR)\
    \  \n3. ISR quickly deals with pending interrupt  \n4. IST in driver is signaled\
    \ to process interrupt  \n5. IST completes processing  \n\n## ISRs and ISTs  \n\
    \nISRs and ISTs work together to perform the necessary Input/Output operations\
    \ with minimal impact on other processing tasks and to prevent the loss and delay\
    \ of high-priority interrupts. This interaction is mainly a task of coordinating\
    \ thread execution between ISR and IST. ISRs and ISTs always work in pairs - the\
    \ ISR identifies and masks interrupt quickly while the IST handles the bulk of\
    \ the work and re-enables interrupts as soon as possible.  \n\nThe interaction\
    \ between ISR and IST involves the following steps:  \n\n1. The IST creates an\
    \ Event Object mapped to the related `SYSINTR ID`. The Event Object is a kernel\
    \ resource on which a `WaitForSingleObject` function call can wait and exit after\
    \ the Event Object becomes signaled. The `SYSINTR ID` identifies the Event Object.\
    \  \n2. The ISR returns the `SYSINTR ID` to the Kernel Interrupt Service Handler\
    \ so that it can signal the Event Object when ready.  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n\n![](index-30_1.png)  \n\nCHAPTER 1 ■ THE FOUNDATION OF DEVICE DRIVER DEVELOPMENT\
    \ FOR WINDOWS EMBEDDED COMPACT  \n\n3. The IST blocks on the event with a `WaitForSingleObject`\
    \ function call until the Kernel Interrupt Service Handler sets the related event,\
    \ thus unblocking the IST.  \n4. When unblocking the IST, if the IST is the highest\
    \ priority runnable thread, it will be scheduled to run immediately.  \n\n## Installable\
    \ ISRs and Interrupt Sharing  \n\nInstallable ISRs allow multiple devices to share\
    \ interrupts and to share a single hardware platform interrupt request (IRQ).\
    \ Essentially, shared interrupts trigger one interrupt line that is shared by\
    \ more than one IRQ. For the operating system to handle these IRQs, there must\
    \ be multiple ISRs chained to handle the shared interrupt. Each ISR, in turn,\
    \ determines if it owns the interrupt and if so returns the related `SYSINTR ID`\
    \ to unblock its associated IST.  \n\nFigure 1-8 illustrates how Installable ISRs\
    \ can share an interrupt to support multiple peripheral devices.  \n\n*Figure\
    \ 1-8. Shared Interrupts Using Chaining*"
