    \ the test itself and has a specific prototype that has to be adhered to:\n\n\
    ```\nTESTPROCAPI TestProc(UINT uMsg, TPPARAM tpParam, LPFUNCTION_TABLE_ENTRY lpFTE)\n\
    ```\n\nYou can implement as many test functions in a module as you designed for.\
