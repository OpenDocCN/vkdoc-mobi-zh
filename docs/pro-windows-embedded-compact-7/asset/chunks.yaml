  trans: "\n• `DEBUGREGISTER` - 此宏仅在调试（Debug）版本中注册区域。不影响零售版和正式版。\n• `RETAILREGISTERZONES`\
    \ - 此宏仅在调试版和零售版中注册区域。不影响正式版。\n• `DEBUGZONE` - 将一个掩码位与一个区域关联。\n• `DEBUGMSG` - 有条件地输出格式化调试消息。不影响零售版和正式版。\n\
    • `RETAILMSG` - 有条件地输出格式化调试消息。不影响正式版。\n• `ERRORMSG` - 有条件地输出格式化错误消息，并附上发生错误的文件名和行号。不影响正式版。\n\
    • `DEBUGCHK` - 断言一个表达式，如果表达式为 **FALSE**，则产生一个 `DebugBreak`。不影响零售版和正式版。\n• `ASSERT`\
    \ - 断言一个表达式，如果表达式为 **FALSE**，则产生一个 `DebugBreak`。\n• `ASSERTMSG` - 断言一个表达式，如果表达式为\
    \ **FALSE**，则产生一条错误消息。不影响零售版和正式版。\n• `DEBUGLED` - 有条件地输出一个 LED 模式。不影响零售版和正式版。对于无\
    \ LED 硬件的开发板，此选项不可用。量产版开发板通常不会提供 LED 硬件。\n• `RETAILLED` - 有条件地输出一个 LED 模式。不影响正式版。\n\
    \nWindows CE 中的术语有时会令人困惑；请注意有 `RETAILMSG` 和 `DEBUGMSG` 之分。`DEBUGMSG` 宏仅用于调试版本中。因此，如果一个模块以零售版方式编译（即构建环境中设置了\
    \ `WINCEDEBUG=RETAIL`），它将不会输出任何 `DEBUGMSG` 语句。另一方面，`RETAILMSG` 在零售版和调试版中都会输出消息。如果构建以“正式版”方式编译（即构建环境中设置了\
    \ `WINCESHIP=1`），则不会输出任何消息。为什么术语会令人困惑？因为“零售”一词在英语里并不等同于人们通常理解的“正式发布”。\n\n## 注册调试区域\n\
    \n在模块中使用调试区域之前，必须先在调试系统中注册这些区域。你需要完成几个准备步骤。首先是定义你的调试区域。需要记住的是，每个模块最多可以定义十六个区域。清单\
    \ 11-1 展示了一段定义五个区域的代码示例。\n\n*清单 11-1. 定义模块特定的调试区域*\n\n```\n#ifdef DEBUG\n\n#define\
    \ ZONE_INIT DEBUGZONE(0)\n#define ZONE_OPEN DEBUGZONE(1)\n#define ZONE_IOCTL DEBUGZONE(2)\n\
    #define ZONE_DEINIT DEBUGZONE(3)\n#define ZONE_ERROR DEBUGZONE(15)\n\n#endif //DEBUG\n\
    ```\n\n接下来，你需要将一个位掩码与区域 ID 关联起来。清单 11-2 展示了一种实现方法。这个掩码用于设置 `DBGPARAM` 结构中的 `ulZoneMask`\
    \ 字段，以指示哪些区域已启用。\n\n*清单 11-2. 将位掩码与区域 ID 关联*\n\n```\n#define DEBUGMASK(bit) (1\
    \ << (bit))\n\n#define MASK_INIT DEBUGMASK(0)\n#define MASK_OPEN DEBUGMASK(1)\n\
    #define MASK_IOCTL DEBUGMASK(2)\n#define MASK_DEINIT DEBUGMASK(3)\n#define MASK_ERROR\
    \ DEBUGMASK(15)\n```\n\n在注册之前，你必须声明一个特定于该模块的私有 `DBGPARAM` 结构。因为该结构实际上将你的区域 ID\
    \ 与模块关联起来，注册后调试系统便能够管理你模块的特定区域。清单 11-3 展示了声明该结构的一个示例。但请注意，分配的变量必须始终命名为 `dpCurSettings`。\n\
    \n*清单 11-3. 声明 DBGPARAM*\n\n```\nDBGPARAM dpCurSettings = {\n    _T(\"Demodrvr\"\
    ),\n    {\n        _T(\"Init\"), _T(\"Open\"), _T(\"Ioctl\"), _T(\"DeInit\"),\n\
    \        _T(\"\"), _T(\"\"), _T(\"\"), _T(\"\"),\n        _T(\"\"),_T(\"\"),_T(\"\
    \"),_T(\"\"),\n        _T(\"\"),_T(\"\"),_T(\"\"),_T(\"Error\")\n    },\n    MASK_INIT\
    \ | MASK_DEINIT\n};\n```\n\n关于这个结构体需要注意两点：第一，模块的名称被分配在结构的第一个字段中；最后一个字段 `ulZoneMask`\
    \ 指示哪些区域已启用。\n\n```\ntypedef struct _DBGPARAM {\n    WCHAR lpszName[32];\n```\n"
- fmt: "`WCHAR rglpszZones[16][32];`\n\n`ULONG ulZoneMask;`\n\n`} DBGPARAM, *LPDBGPARAM;`\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# CHAPTER 11 ■ DEBUGGING\
    \ DEVICE DRIVERS\n\nNext you must register your debug zones with the debug system.\
    \ Since device drivers must be implemented within DLLs the registration must take\
    \ place in the `DllEntry` function. Listing 11-4 is a sample code of registering\
    \ the device driver’s debug zones. Notice the call to `DisableThreadLibraryCalls`\
    \ that effectively disables `DLL_THREAD_ATTACH` and `DLL_THREAD_DETACH` notifications.\
    \ This helps reduce the initialization code of the device drivers’ DLL.\n\n*Listing\
    \ 11-4. Registering the device driver’s debug zones*\n\n```\nBOOL WINAPI DllEntry(HANDLE\
    \ hinstDLL, DWORD dwReason, LPVOID lpvReserved)\n{\n    switch(dwReason)\n   \
    \ {\n        case DLL_PROCESS_ATTACH:\n        {\n            g_hInstance = hinstDLL;\n\
    \            DEBUGREGISTER((HINSTANCE)hinstDLL);\n            DEBUGMSG(ZONE_INIT,(_T(\"\
    DMO!PROCESS_ATTACH: Process: 0x%x, ID: 0x%x \\r\\n\"),\n            GetCurrentProcess(),\
    \ GetCurrentProcessId()));\n            DisableThreadLibraryCalls ((HMODULE)hinstDLL);\n\
    \            return TRUE;\n        }\n        case DLL_PROCESS_DETACH:\n     \
    \   {\n            DEBUGMSG(ZONE_INIT,(_T(\"DMO!PROCESS_DETACH: Process: 0x%x,\
    \ ID: 0x%x \\r\\n\"),\n            GetCurrentProcess(), GetCurrentProcessId()));\n\
    \        }\n        break;\n    }\n    return TRUE;\n}\n```\n\n## Changing Debug\
    \ Zones\n\nFollowing the code samples just presented means that you can debug\
    \ code in the device driver that you assigned to initialization and de-initialization.\
    \ What about debugging for example the `DMO_Open` function? In this function debug\
    \ messages will be output only if `ZONE_OPEN` zone is enabled. What if you want\
    \ to change the initial debug zones that you created in code? One way would be\
    \ to edit the code rebuild and place it in the image. This really is a time-consuming\
    \ and wasteful procedure. You may use the IDE to launch the Debug Zones dialog\
    \ box during the debugging session and select your device driver module and check\
    \ the debug zones you want enabled. Figure 11-2 shows how to enable the `ZONE_OPEN`\
    \ zone.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-209_1.jpg)\n\
    \n*Figure 11-2. Enabling the `ZONE_OPEN` zone during OS runtime*\n\nAnother way\
    \ of enabling zones without disturbing code or OS image is to edit the registry\
    \ key `HKEY_CURRENT_USER\\Pegasus\\Zones` on the development workstation. To demonstrate\
    \ this I reset the `DBGPARAM` structure (see Listing 11-5), in the Demodrvr module\
    \ and rebuilt it.\n\n*Listing 11-5. `ulZoneMask` set to 0 so no zone is enabled*\n\
    \n```\nDBGPARAM dpCurSettings = {\n    _T(\"Demodrvr\"),\n    {\n        _T(\"\
    Init\"), _T(\"Open\"), _T(\"Ioctl\"), _T(\"DeInit\"),\n        _T(\"\"), _T(\"\
    \"), _T(\"\"), _T(\"\"),\n        _T(\"\"),_T(\"\"),_T(\"\"),_T(\"\"),\n     \
    \   _T(\"\"),_T(\"\"),_T(\"\"),_T(\"Error\")\n    },\n    0\n};\n```\n\nNext I\
    \ created an entry on my development workstation for Demodrvr and set the mask\
