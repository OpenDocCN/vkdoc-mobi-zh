    • Monitoring and collecting of network data statistics


    An NDIS intermediate driver registers both its ***MiniportXxx*** functions and
    its ***ProtocolXxx*** functions in the context of its ***DriverEntry*** routine.
    To register its miniport functions, the driver must set **NDIS_MINIPORT_DRIVER_CHARACTERISTICS**
    structure **Flags** to **NDIS_INTERMEDIATE_DRIVER** flag and call the


