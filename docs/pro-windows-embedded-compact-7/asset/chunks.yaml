- fmt: "# CHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS\n\n`Device Manager` exposes\
    \ three new functions that can be used by kernel mode device drivers to support\
    \ asynchronous I/O requests:\n\n- `CreateAsyncIoHandle` - This function is used\
    \ by a device driver to change `XXX_Read`, `XXX_Write` and `XXX_IOControl` entry\
    \ points implementations to support asynchronous I/O\n- `CompleteAsyncIo` - This\
    \ function signals completion of asynchronous I/O and updates the final count\
    \ of bytes that were completed by asynchronous I/O\n- `SetIoProgress` - This function\
    \ is used by an asynchronous device driver to update the status and progress on\
    \ an asynchronous I/O request\n\nThe following code example shows how to implement\
    \ an asynchronous I/O operation within a device driver and a possible processing\
    \ of such asynchronous I/O processing. In this example a device driver implements\
    \ a long write operation (not really that long in the example, still), within\
    \ the `XXX_IOControl` entry point. To perform the long write operation the device\
    \ driver creates a special thread that actually copies the input buffer to the\
    \ device driver’s local buffer. Not too smart, but really drives the point home.\
    \ The only code that distinguishes this device driver from any other kernel mode\
    \ stream device driver is this particular behavior. The following in **Listing\
    \ 7-1** is a snippet of code which demonstrates the implementation of the `XXX_IOControl`\
    \ entry point. The code marked in red signifies the special additions that `Device\
    \ Manager` provides for device drivers developers to support asynchronous I/O\
    \ handling. The first thing to notice is the new argument passed to the `XXX_IOControl`\
    \ entry point, the `hAsyncRef` handle that points to an IO packet object. The\
    \ next offering by `Device Manager` is the function `CreateAsyncIoHandle`. This\
    \ function connects the IO packet to an asynchronous buffer to allocate a copy\
    \ buffer, in this instance just the input buffer.\n\nIn **Listing 7-2** the code\
    \ sets up parameters to be passed on to thread that will process the I/O operation,\
    \ and create the thread and run it. The rest is up to the thread. The code here\
    \ is simple and leaves the thread at 251 priority level. When designing your driver\
    \ you may want to change the priority of this thread if the I/O operation is huge.\
    \ However you should remember the impact this will have on the system, and consider\
    \ the priority of the user mode caller thread.\n\nThe thread itself performs the\
