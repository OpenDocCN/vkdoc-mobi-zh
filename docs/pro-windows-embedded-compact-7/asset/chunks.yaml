    ## Chapter 4 ■ Mastering the Hardware Environment


    ### I/O Device Interrupts


    The basic concept behind any computer, and embedded systems are no different,
    is that some input data comes in, the system (and by system we mean the entire
    package, the hardware operating system and applications) takes this incoming data
    and manipulate it the way the designer intended to manipulate it, and as a result
    it may send out some data as output. There are basically two ways to get incoming
    data input; either polling the I/O device input registers or ports and once data
    appears in these ports, retrieve it and clear these ports for the next data to
    come in, alternatively, wait for some signal from the I/O device telling the system
    that new data has arrived. Both ways have strengths and weaknesses however modern
    systems rely on the latter. The signal that the I/O device has triggered causes
    the system to stop what it’s doing at that point, and retrieve the new input data,
    meaning the system was interrupted to accept new data input.


    ### Interrupt Priorities


    Various I/O peripheral devices have different importance to the system. Although
    the real-time clock of the system is of extreme importance to the operating system
    in order to time everything, other devices importance may be configured according
    to their function value for the entire system and possibly the device’s needs.
    For example an I/O device that monitors a car engine is by far more important
    than an I/O device that plays multimedia.


    A programmable interrupt controller is a chip that helps manage interrupt requests
    from peripheral devices, it determines which of the incoming requests is of the
    highest priority, ascertains whether the incoming request has a higher priority
    value than the level currently being serviced, and issues an interrupt to the
    CPU based on this examination.


    One of the attributes that make Windows CE a real-time operating system is the
    use of nested interrupts. This allows a high-priority interrupt to interrupt the
    handling of a lower priority interrupt.


    The use of nested interrupts prevents the loss and delay of high-priority interrupts.
    The kernel handles the details of saving the ISR''s state when a higher priority
    interrupt occurs and restoring it after the high priority ISR has completed. In
    most cases, the preempted ISR does not detect that it has been preempted.


    ### Interrupt Vectors


    An interrupt vector is a memory address of an interrupt handler, interrupt vectors
    are placed in an array called an interrupt vector table. In Windows CE a vectored
    function is called in the kernel which is controlled by hardware, so the implementation
    is CPU family dependent. The vector table is initialized by the kernel when it
    starts. When you install Platform Builder and accept the conditions for installing
    the source code for Windows CE, you may want to have a look at the code in `C:\WINCE700\PRIVATE\WINCEOS\COREOS\CORE\DLL\exdsptch.c`
    that implements the functions that dispatch the interrupt vectors.


    ### Signaling Mechanisms


    Hardware designers devised to schemes to generate interrupts. One is the change
    of state on the interrupt signal line from 0 to 1 or vice versa. This is termed
    rising edge detect or falling edge detect triggers. This scheme has a problem:
    it is sensitive to electrical noise. A random spike can trigger an interrupt even
    if there is no new data to merit it. The other scheme is level triggered where
    a device holds the interrupt line at a steady level until the interrupt service
    process dismisses the interrupt. This scheme is more robust against electrical
    noise.


    In this section we just skimmed the surface of interrupt handling by the hardware
    and how it relates to Windows CE. In order to understand how interrupts are handled
    by the processor that you work with you need to read the documentation related
    to the interrupt controller, such as Chapter 9 of *System and Timer Configuration
    Developers Manual* which is the first volume in the Marvell PXA3xx Processor Family
    developer’s documentation.


    ### I/O Device Memory


    Device drivers have to move data between the peripheral device and the system’s
    memory. There are three mechanisms employed by hardware to perform memory transfers:


    - Programmed I/O (PIO)

    - Device Dedicated Memory

    - Direct Memory Access – DMA


    The memory transfer mechanism used by your device is dependent on the magnitude
    of data that it needs to move, the speed of the device and standard for the class
    of devices it may belong to.


    #### Programmed I/O (PIO)


    Programmed input/output is a method of transferring data between the CPU and a
    peripheral such as an ATA storage device. This mechanism basically uses the CPU
    to address memory and move it around.


    PIO devices typically generate an interrupt after each data transfer. Some PIO
    hardware devices have internal buffers or FIFO to reduce interrupts frequency.
    Even so, extensive transfers need a lot of CPU activity and still produce a torrent
    of interrupts which leads to reduced system performance.


    > **Note** Typical PIO: If your device uses I/O ports for example then it by default
    uses PIO. However if you read or write data from a memory mapped data register
    using memory manipulation instructions it is considered PIO just the same.


    #### Device Dedicated Memory


    There are devices that call for a dedicated range of addresses in physical memory.
    The reasons for this could be that the device uses a block of memory as a buffer
    for data transfers, such as video capture devices. Another reason is that the
    device may have an internal ROM that holds some startup code and for the CPU to
    run it, it has to be part of the memory address space.


    #### Direct Memory Access – DMA


    Direct Memory Access or DMA for short is a mechanism that moves data between an
    I/O device and memory without the intervention of the CPU. DMA comes in two modes:
    System DMA and the more modern, Bus Master DMA. DMA provides high performance
    data transfers. There are several DMA transfer types.


    - **Common Buffer DMA** - In common-buffer DMA, the driver and the system share
    the same area of memory for data transfer. The driver is responsible for synchronizing
    access to the buffer. The memory is not cached, making this synchronization easier
    for the driver. After setting up a common buffer, both the driver and the hardware
    can write directly to the addresses in the buffer.


    - **Packet DMA** - Performed when there is a single existing buffer that must
    be mapped for use by the hardware. For example, using packet DMA in the transfer
    of a file from memory to a disk. Using common-buffer DMA for this action would
    be wasteful, because the file would have to be transferred to the common buffer
    before the hardware could transfer it to the disk.'
