    \ `FilterInit` 函数的示例，请参见清单 7-17。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-130_1.jpg)\n\n第 7 章 ■ 流设备驱动程序精髓\n\n*图 7-9. 流设备驱动程序加载及相关筛选驱动程序的加载与初始化*\n\
    \n筛选驱动程序提供了一个 FIR 筛选器（对于此示例来说确实非常初级），它将以处理来自流设备驱动程序的采样数据。筛选驱动程序实现为一个 C++ 类，派生自\
