    Intermediate Driver


    NDIS intermediate drivers are layered between upper-level protocol drivers and
    hardware level miniport drivers. A NDIS intermediate driver should be regarded
    as a layered miniport driver. A layered miniport driver exposes a miniport interface
    to the overlying protocol driver and a protocol driver interface to the underlying
    NIC miniport driver. In a layered miniport driver structure, the protocol driver
    communicates with a miniport driver at the bottom of the layered miniport driver.
    A layered miniport driver exports ***MiniportXxx*** functions at its upper edge
    and ***ProtocolXxx*** functions at its lower edge. The intermediate driver miniport
    interface may be referred to as a virtual miniport. It is “virtual” because it
    does not control the NIC directly. Instead, it relies on an underlying miniport
    driver to communicate with the physical device. Figure 10-5 is an illustration
    of the layered NDIS miniport driver architecture.


