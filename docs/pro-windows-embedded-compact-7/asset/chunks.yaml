    \ pBufOut = NewDx;\n                *pdwActualOut = sizeof(CEDEVICE_POWER_STATE);\n\
    \                pDevContxt->psPowerState = NewDx;\n                dwErr = ERROR_SUCCESS;\n\
    \            }\n            DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!IOCTL_POWER_SET\
    \ %u %s passing back %u\\r\\n\"),\n                NewDx, dwErr == ERROR_SUCCESS\
    \ ? _T(\"succeeded\") :\n                _T(\"failed\"), pDevContxt->psPowerState));\n\
    \        }\n        __except(EXCEPTION_EXECUTE_HANDLER)\n        {\n         \
    \   DEBUGMSG(ZONE_IOCTL,\n                (_T(\"DMO!Exception in ioctl.\\r\\n\"\
    )));\n        }\n        LeaveCriticalSection(&pDevContxt->CriticalSection);\n\
    \    }\n    break;\n\ncase IOCTL_POWER_GET:\n    if (pBufOut != NULL &&\n    \
