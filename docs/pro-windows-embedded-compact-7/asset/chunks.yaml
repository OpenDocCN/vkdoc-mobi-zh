    ## `XXX_PowerDown`


    Implementation of `XXX_PowerDown` is optional. This function ends power to the
    device. It is useful only with devices that can be shut off under software control.
    Non-power-managed drivers are suspended using the `XXX_PowerDown` entry point
    when the system has no support for API calls and running in single thread mode.
    Therefore this function should not call any functions and it should return as
    quickly as possible.


    ## `XXX_PowerUp`


    Implementation of `XXX_PowerUp` is optional. This function restores power to a
    device. This function is called on system resume when it is still running in single
    thread mode. The kernel resumes non-power-managed drivers using the `XXX_PowerUp`
    entry point.


    ## `XXX_PreClose`


    Implementation of `XXX_PreClose` is optional; however it is extremely important
    if lengthy asynchronous I/O is taking place in other threads. This function marks
    the closing handle as invalid and resumes any blocking threads. For an explanation
    see the note “Closing and deintializing device drivers.”


    ## `XXX_PreDeinit`


    The `XXX_PreDeinit` function prepares for unloading the device driver by resumes
    any blocking threads allowing the release of associated resources before final
    call to `XXX_Deinit`. This function is required if the `XXX_PreClose` function
    is implemented.


