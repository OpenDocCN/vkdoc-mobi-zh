- fmt: "# When the Operating System Boots\n\nWhen the operating system is booted after\
    \ the system hardware is initialized by the `OEMInit` function and the file system\
    \ is up and running, `Device Manager` enumerates the registry entries under `HKLM\\\
    Drivers\\BuiltIn` key by loading and executing `BusEnum.dll` that is located at\
    \ the root of `HKLM\\Drivers\\BuiltIn`. The bus enumerator initializes the process\
    \ of scanning the registry for additional buses and devices to be loaded for subkeys\
    \ of `HKLM\\Drivers\\BuiltIn`. The bus enumerator examines the first level of\
    \ keys just below the key passed to it, according to the `Order` registry subkey.\
    \ It invokes `ActivateDeviceEx` on each subkey it finds. Each subkey can have\
    \ any values interpreted by `ActivateDeviceEx` or by the loaded driver in its\
    \ initialization routine. Additionally, driver can have an `Order` value between\
    \ 0 and 255 which is not unique. The smallest `Order` value gets loaded first.\
    \ If there is no `Order` value, the driver gets loaded after drivers with defined\
    \ `Order` values. As the bus enumerator loads the device drivers, it traverses\
    \ the first level keys of `HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn`, one by one,\
    \ initializing a device driver for each key. It loads the DLL indicated by the\
    \ `DLL` value, and then creates a subkey for the driver under `HKEY_LOCAL_MACHINE\\\
    Drivers\\Active`. Then, it calls the driver’s `XXX_Init` entry point and passes\
    \ in a string containing the registry path to the active key for the stream interface\
    \ driver. Using the string it gets in return, the `XXX_Init` routine should call\
    \ `RegOpenKeyEx` to get a handle for this key, and then call `RegQueryValueEx`\
    \ to look up the key value, which contains the string corresponding to the registry\
    \ key that `Device Manager` originally encountered under `HKLM\\Drivers\\BuiltIn`.\
    \ Reading these values the device driver can initialize I/O resources, interrupt\
    \ handlers, and so on. Figure 5-1 visualizes the load sequence of a stream device\
    \ driver.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-88_1.png)\n\
    \n## Chapter 5 ■ Device Driver Registry Settings\n\n*Figure 5-1\\. Load sequence\
    \ for stream device drivers*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 5 ■ Device Driver Registry Settings\n\n# Device Manager Registry\
    \ Keys\n\n`Device Manager` uses the `Active` and `BuiltIn` subkeys of the `HKLM\\\
    Drivers` registry key. The `HKLM\\Drivers\\Active` registry key contains subkeys\
    \ that track currently active drivers that `Device Manager` loaded.\n\n## Active\
    \ Registry Key\n\nThe following list shows the subkeys available in the `Active`\
    \ registry key:\n\n*   `BusDriver` – Driver’s bus name.\n*   `BusName` - Device’s\
    \ bus name.\n*   The bus driver adds these subkeys for its subordinate devices.\n\
    *   `DevID` - Unique device identifier added by `Device Manager`.\n*   `FullName`\
    \ - Name added by `Device Manager` and used in conjunction with the `$device`\
    \ namespace.\n*   `Name` - Device driver’s device file name. This subkey is only\
    \ present for drivers that specify a prefix.\n*   `Order` - Bus enumerator examines\
    \ keys according to the `Order` value.\n*   `Key` - Registry path to the device.\n\
    *   `PnpId` - Plug and Play identifier string. Only present for PC Card drivers.\n\
    *   `Sckt` - Current socket and function pair of the PC Card. Only present for\
    \ PC Card drivers.\n\n## Registry Entries\n\nThe registry settings for a device\
    \ driver are crucial in the development of a device driver. The registry settings\
    \ govern how `Device Manager` loads the device driver, allowing the developer\
    \ to order the loading of the device driver if it depends on other device drivers\
    \ to be loaded ahead of it. The registry settings can contain information that\
    \ would help the initialization process, or even the creation of instances. For\
    \ example a specific custom subkey indicating how many instances are allowed.\
    \ Remember that the registry is an extremely important facet of the device driver\
    \ package.\n\nThere is an array of registry settings that control how a driver\
    \ loads. Most are optional, one is required. Several registry settings are used\
    \ by the `Device Manager` and may be used by all drivers. The device driver developer\
    \ can create custom registry entries that will be referenced directly by the device\
    \ driver after it has been loaded.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 5 ■ Device Driver Registry Settings\n\n### Required\n\nThe only required\
    \ registry subkey value that is absolutely required is the `DLL` subkey. Without\
    \ it `Device Manager` is not able to determine which DLL to load. This subkey\
    \ holds the name of the device driver executable file within the file system.\n\
    \n`\"DLL\"=\"Demodriver.DLL\"`\n\nEven if, strictly speaking, the `Prefix` subkey\
    \ is not a requirement it should be set. The `Prefix` is a three-character string\
    \ that makes up the name of the driver. This value must be present in order to\
    \ have a file handle based interface to the driver. The `Prefix` value is the\
    \ same value that must be used in the stream driver entry points unless the `DEVFLAGS_NAKEDENTRIES`\
    \ flag is set.\n\n### Optional\n\nAll other subkeys are optional, however some\
    \ should nearly always be considered, especially the `Order` subkey. The `Order`\
    \ subkey is a `DWORD` value that provides a mechanism supporting load order. Drivers\
    \ will be loaded in the order specified by the `Order` subkey. If this subkey\
    \ does not exist the driver will be loaded at the end. Listing 5-1 is an example\
    \ of the registry entry generated by the device driver wizard for the demo device\
    \ driver.\n\n*Listing 5-1\\. Registry entries for a sample device driver*\n\n\
    ```\n; DemoDriver driver\n[HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\Demodriver]\n\
    \"Prefix\"=\"DMO\"\n\"DLL\"=\"Demodriver.DLL\"\n\"SysIntr\"=dword:1A\n\"Irq\"\
    =dword:8\n\"MemBase\"=dword:90001000\n\"MemLen\"=dword:32\n\"Order\"=dword:0\n\
    \"DisplayName\"=\"DemoDriver driver\"\n\"IsrHandler\"=\"IsrHandler\"\n\"Flags\"\
    =dword:0\n\"IClass\"=\"{A32942B7-920C-486b-B0E6-92A702A99B35}\"\n```\n\n## Device\
    \ Driver Registry Subkeys\n\nA device driver developer can create device driver\
    \ specific registry keys. For example, the registry entries for the RTL8139 Ethernet\
    \ driver, has a subkey value for early transmission threshold which specifies\
    \ the threshold level in the Tx FIFO to begin the transmission; `EarlyTxThreshold`.\
    \ Listing 5-2 lists an example of the RTL8139 registry entries.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 5 ■ Device Driver Registry Settings\n\n*Listing 5-2\\. Example of\
    \ custom registry subkey entries*\n\n```\n\"Transceiver\"=dword:3\n\"DuplexMode\"\
    =dword:1\n\"EarlyTxThreshold\"=dword:10000\n\"IsrDll\"=\"giisr.dll\"\n\"IsrHandler\"\
    =\"ISRHandler\"\n\"PortIsIO\"=dword:1\n\"PortOffset\"=dword:3E\n\"PortSize\"=dword:2\n\
    \"PortMask\"=dword:C07F\n\"UseMaskReg\"=dword:1\n\"MaskOffset\"=dword:3c\n```\n\
    \nHowever most subkeys are preset common values as described by the following\
    \ list:\n\n*   `Dll` - Specifies the name of the driver DLL\n*   `Prefix` - Specifies\
    \ the file name for the device driver\n*   `Order` - Specifies order to load driver\n\
    *   `Index` - Specifies the device index (x in COMx:)\n*   `IClass` - Specifies\
    \ GUID(s) for device class(es) for use by PnP notification system\n    *   For\
    \ example – a value of `A32942B7-920C-486b-B0E6-92A702A99B35` for power managed\
    \ device interface\n*   `Flags` - Specifies load flags for the driver\n*   `IoBase`\
    \ - Specifies the base of an I/O mapped window used by the device. Port I/O must\
    \ be supported by the architecture, i.e., special CPU instructions to access I/O\
    \ ports.\n*   `IoLen` - Specifies the length of each I/O window needed by the\
    \ device\n*   `MemBase` - Specifies the bus relative base of a memory mapped window\
    \ used by the device. Memory mapped I/O maps the I/O registers to a region in\
    \ the system memory.\n*   `MemLen` - Specifies the length of each memory mapped\
    \ window needed by the device\n*   `IRQ` - Specifies the physical IRQ used by\
    \ the device\n*   `SYSINTR` - Specifies the logical interrupt identifier.\n* \
    \  `IsrDll` - Specifies a DLL containing an installable interrupt handler"
