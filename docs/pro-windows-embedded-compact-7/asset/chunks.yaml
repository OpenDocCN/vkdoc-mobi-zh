    ```\nint _tmain(int argc, TCHAR *argv[], TCHAR *envp[])\n{\n    BOOL bRet = FALSE;\n\
    \    HANDLE hTstDrvr = INVALID_HANDLE_VALUE;\n\n    // Try open an instance of\
    \ TestDrvr\n    hTstDrvr = CreateFile(L\"UMD1:\",\n                          GENERIC_READ\
    \ | GENERIC_WRITE,0,\n                          NULL,OPEN_EXISTING,0,NULL);\n\
    \    if (INVALID_HANDLE_VALUE == hTstDrvr) {\n        DWORD bdw = GetLastError();\n\
    \        return FALSE;\n    }\n\n    bRet = DeviceIoControl(hTstDrvr,IOCTL_UMDEMODRVR_FOO1,\n\
    \                           NULL, 0, NULL, 0, NULL, NULL);\n\n    return 0;\n\
    }\n```\n\n*图 7-13. 显示消息框的用户模式设备驱动程序*\n\n## Chapter Summary\n\n流设备驱动程序一直是 Windows\
    \ CE 在其存在期间的中流砥柱。早期版本的 Windows CE（直至 Windows CE 6.0）与 Windows CE 6.0 及其后继者 Windows\
    \ Embedded Compact 7 之间的主要区别在于，在旧版本中，由于架构原因，流设备驱动程序是用户模式驱动程序。然而，在最后两个版本中，流设备驱动程序可以驻留在内核空间或用户空间中，因此有了内核模式流设备驱动程序和用户模式流设备驱动程序。前者提供了更好的性能，后者则提供了健壮性，特别是对于可安装的设备驱动程序。最新版本的\
    \ Windows CE 设备管理器使我们能够开发支持异步 I/O 请求处理的设备驱动程序。设备管理器允许为各种功能创建筛选器驱动程序。\n\n# C H\
    \ A P T E R 8\n\n## Device Driver I/O and Interrupts\n\n任何计算机系统的本质都是接受输入数据、处理数据并产生输出。系统如何接受输入数据对于实时嵌入式系统至关重要。因为它需要在确定的时间间隔内处理输入数据并输出响应。实现这一点的最准确方法是持续轮询输入源以获取数据。然而，这给\
    \ CPU 带来了沉重的负担，将系统限制为仅执行一个任务。等待输入数据的到来并对其做出反应则可以减轻此负担并释放 CPU 资源。为了能够等待和响应，我们需要硬件支持，使\
    \ CPU 能够从正在执行的处理流程中转移注意力。\n\n硬件触发的中断会导致 CPU 停止执行流程，并跳转到处理中断的代码中的特定入口点。中断的到达是不可预测的，因此它可能在任何时间发生，甚至在处理另一个中断时也是如此。一旦中断被处理完毕，CPU\
    \ 将从其中断点恢复执行。\n\n在本章中：\n- 中断模型\n- 中断处理\n- I/O 内存映射\n\n### Interrupt Model\n\n\
    每当 I/O 硬件需要 CPU 的注意时（因为其 I/O 寄存器状态发生变化），它会触发一个中断。中断可以分为可屏蔽中断、不可屏蔽中断、处理器间中断和软件中断。\n\
    \n- **可屏蔽中断** – 可以通过在中断屏蔽寄存器（`IMR`）中设置特定位来忽略的硬件中断。\n- **不可屏蔽中断（NMI）** – 无法忽略的硬件中断。\n\
    - **处理器间中断（IPI）** – 在多处理器环境中，由一个处理器向另一个处理器触发的中断。主要用于实现缓存一致性。在 Windows Embedded\
    \ Compact 7 中，由于它支持多核处理器，这种中断变得相关。\n- **软件中断** – 由某些 CPU 指令触发的异常。用作执行系统调用的陷阱，因为\
    \ CPU 会切换到内核模式。"
