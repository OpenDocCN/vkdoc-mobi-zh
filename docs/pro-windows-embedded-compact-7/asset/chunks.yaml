    \ a miniport interface to the overlying protocol driver and a protocol driver\
    \ interface to the underlying NIC miniport driver. In a layered miniport driver\
    \ structure, the protocol driver communicates with a miniport driver at the bottom\
    \ of the layered miniport driver. A layered miniport driver exports `MiniportXxx`\
    \ functions at its upper edge and `ProtocolXxx` functions at its lower edge. The\
