    Designing Test


    Designing tests sounds a bit pompous, but it is way simpler than it sounds. The
    purpose of testing a device driver is to make sure that it is robust and does
    not fail when erroneous input comes its way.


    Since it is impossible to test for every possible input, there is a need to identify
    the most vulnerable areas in the object of the test and provide testing procedures
