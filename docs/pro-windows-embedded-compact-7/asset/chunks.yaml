    ## IClass Registry Subkey


    `IClass` registry subkeys reference device interfaces by their associated GUIDs.
    Listing 6-2 shows how to publicize the fact that `DemoDriver` supports the generic
    power management class interface - `PMCLASS_GENERIC_DEVICE`.


    *Listing 6-2. Setting the IClass subkey value to PMCLASS_GENERIC_DEVICE GUID*


    ```

    ; DemoDriver driver

    [HKEY_LOCAL_MACHINE\Drivers\BuiltIn\Demodriver]

    "Prefix"="DMO"

    "DLL"="Demodriver.DLL"

    "SysIntr"=dword:1A

    "Irq"=dword:8

    "MemBase"=dword:90001000

    "MemLen"=dword:32

    "Order"=dword:0

    "DisplayName"="DemoDriver driver"

    "IsrHandler"="IsrHandler"

    "Flags"=dword:0

    "IClass"="{A32942B7-920C-486b-B0E6-92A702A99B35}"

    ```


    ## Advertising the Interface


    Another method to expose a device interface and publicize the associated GUID
    is to call during initialization the `AdvertiseInterface` API. This is a less
    desirable alternative to setting the `IClass` subkey, because the `IClass` value
    is passed into `ActivateDeviceEx` which allocates resources within the Device
    Manager. Calling `AdvertiseInterface` with the `fAdd` argument set to false, advertises
    the removal of the interface and should be called when de-initializing the device
    driver.


    Device interface classes are essential for applications to access the capabilities
    of a device driver. They indicate to applications via notifications that a particular
    interface is present.


    ## Device Interface Notifications


    Device Manager’s interface notification mechanism is Windows Embedded Compact
    7 as well as previous versions, correspondent to the desktop Plug and Play event
    notification system. Device Manager notifies user mode applications and services,
    and device drivers to the appearance and disappearance of device interfaces. Device
    Manager uses message queues to deliver these notifications, either the GWES message
    queue or uses message queue point-to-point.


    When Device Manager successfully loads and initializes a device driver it checks
    to see if there is an `IClass` value in the device key. If it finds a valid value
    it will start a thread that signals a device change via the application notification
    system and via a broadcast windows message. Figure 6-2 shows the registry `IClass`
    value set to stream interface class.


    ### Message Queue Point to Point Notification


    An application or even other device drivers can receive notifications by registering
    with Device Manager. It involves setting up and creating a message queue point
    to point and providing the handle of this message queue to Device Manager by calling
    the function `RequestDeviceNotifications` API the implementation of which has
    been moved from Device Manager to File System. The following code is an example
    of how to implement the code to request and receive notifications from Device
    Manager.


    In the example in listing 6-3 the GUID is a generic stream interface GUID which
    is fine for stream device drivers; however you will be able to retrieve from the
    `DEVDETAIL` structure returned by the message queue only the first character of
    the interface name. This may provide an ambiguous result when compared in the
    application; therefore you may want to generate your own class interface GUID
    which will allow verifying the GUID value itself for consistency.


    *Listing 6-3. Sample code for receiving device notifications via message queue
    P2P*


    ```

    #include <pnp.h>

    #include <msgqueue.h>

    ……

    ……

    ……

    GUID guid = DEVCLASS_STREAM_GUID; // or any relevant device interface GUID

