    NDIS


    The Network Driver Interface Specification (NDIS) framework abstracts the network
    hardware from network drivers. NDIS also specifies a standard interface between
    layered network drivers, thereby abstracting lower-level drivers that manage hardware
    from upper-level drivers, such as network transports. NDIS maintains state information
    and parameters for network drivers, including pointers to functions, handles,
    and parameter blocks for linkage, and various system values. Figure 10-3


    demonstrates how the NDIS framework relates to network drivers using it.


