    ## 章节总结


    `Visual Studio 2008` 为 `Platform Builder IDE` 提供了基础，使您能够创建、构建和调试设备驱动程序。`Platform
    Builder` 包含故障排除工具、向导和构建工具，以指导您完成构建过程。`Windows Embedded Compact` 附带一个定义好的构建系统，该系统使用四个阶段：编译
    (compile)、系统生成 (sysgen)、发布复制 (release copy) 和生成运行时映像 (make run-time image)，并且
    `Platform Builder` 工具在每个阶段都帮助您创建可工作的驱动程序。要排除故障和调试问题，并简化设备驱动程序开发，您可以使用 `Platform
    Builder` 中包含的工具，例如 `设备驱动程序向导`，以及第三方工具，例如 `TRACE32-ICD`。我们议程上的下一步是设计我们的设备驱动程序，考虑其位置、模式、内核模式或用户模式，以及在真正投入开发之前必须决定的许多其他考虑因素。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第三章**


    ****首先设计你的设备驱动程序！**


    我知道大多数读者此时已经觉得指尖发痒，只想马上开始敲击键盘来实现一个设备驱动程序。与应用程序不同，设备驱动程序是相当直接的软件单元，那么为什么不直奔主题呢？我对这个合理问题的回答有两个方面；它可以消除代价高昂的错误并节省时间。消除错误是因为它迫使您研究和理解硬件。为您的设计选择正确的模型。规划设备驱动程序结构；仔细考虑设备驱动程序将如何访问内存。仔细考虑并规划设备驱动程序的中断处理。通过避免临时开发，您可以节省时间，并且即使使用像
    `设备驱动程序向导` 这样的第三方工具来更高效地生成快速启动设备驱动程序框架，您为设计收集的信息也会有所帮助。本章旨在强调您在规划和设计设备驱动程序时*应该考虑*的要点。


    ### 本章内容


    -   设备驱动程序位置考虑

    -   内核模式与用户模式之间的权衡

    -   注册表设置考虑

    -   设备驱动程序类型考虑

    -   内存访问方法考虑

    -   中断支持考虑

    -   电源管理支持考虑

    -   IO 控制代码考虑

    -   设计物理设备驱动程序 (PDD)

    -   为测试而设计


    A. Kcholi *P*, *ro Windows Embedded Compact 7* © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-63_1.jpg)


    第三章 ■ 首先设计你的设备驱动程序！


    ## 设备驱动程序位置


    在第二章讨论 `平台目录` 树时，我们注意到两个最相关的目录是 `PLATFORM` 和 `PUBLIC` 目录。在 `PLATFORM` 目录下是特定于
    BSP 的设备驱动程序，而在 `PUBLIC` 目录下是所有平台无关的设备驱动程序。


    当我们开发设备驱动程序时，必须考虑这个设备驱动程序属于谁。它是特定于您的操作系统映像的设备驱动程序吗？它是 BSP 的一部分吗？或者，我正在创建一个与架构无关的设备驱动程序，并希望将其与我的
    OEM 硬件一起推向市场。`图 3-1` 展示了如何创建设备驱动程序并将其添加到 BSP。


    *图 3-1. 将设备驱动程序添加到 BSP*


    生成的设备驱动程序位置如 `图 3-2` 所示；在这里，您可以看到位于 `DemoBSP` 设备驱动程序文件夹中的 `DemoDrvr` 设备驱动程序的文件夹层次结构。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-64_1.jpg)


    第三章 ■ 首先设计你的设备驱动程序！


    *图 3-2. BSP 驱动程序位置*


    ### BSP


    如果计划的设备驱动程序要处理作为目标板内置部分的外围 IO 设备，那么它应该位于该板的 BSP 目录中。这将确保任何基于该 BSP 的操作系统设计都能够访问该外围
    IO 设备。`生产质量 OAL` 倡议要求特定于板的设备驱动程序位于平台目录层次结构中的 `$(PLATFORMROOT)\<BSPName>\src\drivers`
    文件夹下。这个位置将确保您的设备驱动程序将成为您的 BSP 构建的一部分。


    ### 特定操作系统设计


    此位置允许开发者创建一个特殊的设备驱动程序，该驱动程序被放置在操作系统设计中并内置于映像中。先前版本的设备驱动程序开发文档建议您走这条路，在一个测试床操作系统设计中实现和测试您的设备驱动程序，并在测试和调试完成后将设备驱动程序移动到最终位置。但是，此版本在一个模板
    BSP 中提供了一个模板流设备驱动程序，其位置类似于上述位置。


    然而，如果某个设备驱动程序在任何其他目标设备中都不需要，那么将其放在操作系统设计中是很有用的。


    ### PUBLIC 树


    `PUBLIC` 树位置提供了所有与平台无关的设备驱动程序，包括 Microsoft 在 `$(PUBLICROOT) \COMMON\oak\drivers`
    文件夹下提供的开箱即用设备驱动程序。但是，这不是您应该放置设备驱动程序的位置，而是应该放在第三方文件夹下，例如 `$(PUBLICROOT)\ThirdParty\catalog\<CompanyName>\<DriverName>`。这不会破坏
    `PUBLIC` 树的完整性，并允许设备驱动程序在目录中平滑集成。


    ## 决定模式


    `Windows CE 6.0` 带来了 `Windows CE` 操作系统架构的变革。在此之前，所有设备驱动程序都是用户模式设备驱动程序；从此时开始，设备驱动程序既可以驻留在内核中，也可以位于用户模式。我们在第一章已经触及了这个主题，并将在后续章节中进一步讨论并深入探讨它。但对我们开发者而言，在实现之前就决定我们将要开发的设备驱动程序是驻留在内核中（即内核模式设备驱动程序）还是用户模式设备驱动程序仍然很重要。


    ### 内核模式


    '
- fmt: '## 内核模式


    内核模式设备驱动程序驻留并在内核上下文中运行，因此拥有任何其他内核模式代码所具有的所有特权。它可以访问内核模式内存空间；它可以读取和写入内核结构，并使用内核特定的
    API。因此，内核模式设备驱动程序可以无限制地访问硬件。这些特权使得设备驱动程序对操作系统来说非常危险且具有风险。


    选择开发内核模式设备驱动程序会给开发者带来编写安全、健壮代码的负担。这进一步强调了规划与设计行为良好且无风险的设备驱动程序的重要性。


    - 设备驱动程序如何访问内存

    - 用户模式进程如何访问检索到的数据

    - 用户模式进程如何发送数据

    - 设备驱动程序如何通知用户模式进程已发生中断且检索到的数据已就绪


    本书将深入探讨所有这些主题。


    ## 用户模式


    用户模式设备驱动程序在旨在承载它并与设备管理器通信的用户模式进程中执行。你可能还记得，设备管理器在内核模式下执行，验证用户模式设备驱动程序的请求，并作为物理硬件与用户模式设备驱动程序之间的中介。这意味着用户模式设备驱动程序没有内核模式特权，并且对内核模式
    API 的访问受到严格限制。由于用户模式与内核模式之间发生多次转换，用户模式设备驱动程序会遭受明显的性能损失。


    它适用于处理连接到扩展总线（例如 USB 和安全数字总线）上的设备的可安装设备驱动程序。


    ## 注册表


    注册表在加载和初始化设备驱动程序方面起着重要作用，因为设备驱动程序是一个动态链接库。因此，它必须由一个宿主进程来承载。宿主进程需要知道在哪里找到可执行文件以加载它。有两个主要的内核组件承载和处理设备驱动程序：


    - 图形、窗口和事件系统 (GWES)

    - 设备管理器。


    在开发的规划和设计阶段，决定哪个组件承载设备驱动程序将决定其注册表设置。对于流设备驱动程序，它位于注册表项`HKEY_LOCAL_MACHINE\Drivers\BuiltIn`下。


    你应该规划的注册表项包括加载标志、内存配置和中断设置。


    这并不是说这些值是必需的或比其他值更重要，但在需要时提前规划这些是有用的。在第 5 章中，将全面讨论注册表，并应为流设备驱动程序设计注册表项提供所有工具。


    ## 设备驱动程序类型


    设备驱动程序属于几个设备驱动程序类别，由加载它们的组件区分。


    本机设备驱动程序由`GWES`加载，流设备驱动程序由设备管理器加载，文件系统驱动程序由`FSD Manager` ( `FSDMGR.DLL` ) 加载。除了显示和用户输入驱动程序（如键盘）等用户界面设备驱动程序或文件系统驱动程序之外，你将开发的大多数设备驱动程序都是流设备驱动程序。因此，选择类别应该很直接。然而，流设备驱动程序可以是内置驱动程序（如作为SoC组成部分的`I2C`设备或总线驱动程序），甚至是与总线无关的驱动程序（如
    PC 卡设备驱动程序）。


    ## 设备驱动程序特性


    规划设备驱动程序时需要考虑的非常重要的一点是内存管理、如何处理中断以及电源管理支持。这很重要，因为设备驱动程序的性能受数据存储方式及其中断处理方式的影响。


    对于电池供电的设备来说，电源管理极其重要。


    ## 直接内存访问


    在考虑设备驱动程序如何存储传入数据时，性能是最重要的。处理大量数据输入的设备需要以最小的延迟移动数据。考虑直接内存访问是可取的，因为它移动数据无需处理器参与。但是，你应该熟悉外围设备的`DMA`能力。第
    10 章将对内存处理进行深入讨论。


    ## 中断支持


    规划中断支持意味着你了解你的 IO 外围设备映射到的硬件中断请求级别。接下来，你必须映射一个逻辑系统中断 ID，它将把你的`ISR`与`IST`关联起来。另一个考虑因素是`ISR`本身，它在很大程度上取决于
    SoC 的架构以及你是否正在规划一个`ISR`将被链式连接的可安装设备驱动程序。


    ## 电源管理支持


    除了考虑是否提供电源管理之外，你可能还需要设计设备驱动程序需要实现哪些具体的电源管理支持。例如，设备驱动程序是否应提供唤醒能力？


    ## IO 控制代码


    IO 控制代码用于指定通过单个系统 API—— `DeviceIoControl`处理的设备特定系统调用。这允许应用程序向驱动程序请求执行常规文件系统 API
    不提供的功能。例如，假设设备驱动程序需要设置一些事件来通知某些 IO 完成。设备驱动程序可以为命名事件提供一个名称，应用程序可以通过调用特定的`IOCTL`来检索该事件。然后，应用程序将创建一个命名事件，设备驱动程序将设置该事件以触发唤醒应用程序的线程。第
    9 章专门讨论这个主题。然而，为设备特定的`IOCTL`进行规划以增强设备驱动程序的功能能力是一个好主意。图 3-3 显示了如何向设备驱动程序向导创建的设备驱动程序添加`IOCTL`。


    ![](index-68_1.jpg)


    *图 3-3. 向设备驱动程序添加 IOCTL*


    ## 设计物理设备驱动程序


    物理设备驱动程序是一组硬件接口函数，用于隔离硬件特定的代码。例如，当你初始化一个设备驱动程序并调用其`XXX_Init`函数（对于流设备驱动程序）时，你可能需要初始化设备的硬件，向它的命令寄存器发送一些命令字，重置中断等。你可以将此代码添加到`XXX_Init`函数中，但你可以实现一个针对该硬件特定的`PDD_Init`函数。这将有助于更好的代码维护和代码质量。规划与设计设备驱动程序的一部分可能是设计能够完成硬件接口的`PDD`函数。设备驱动程序向导提供了向设备驱动程序代码中添加`PDD`函数的功能，这意味着如果你提前规划，可以通过添加已设计的函数来节省大量时间。图
    3-4 显示了如何使用设备驱动程序向导添加`PDD`函数。


    ![](index-69_1.jpg)


    *图 3-4. 向设备驱动程序添加 PDD 函数*


    ## 为测试而设计'
  raw: 'Kernel mode device drivers reside and run in the context of the kernel thus
    have all the privileges that any other kernel mode code has. It can access kernel
    mode memory space; it can read and write to kernel structures and use kernel specific
    APIs. Kernel mode device driver can therefore access hardware without any restrictions.
    These privileges make a device driver very dangerous and risky to the operating
    system.


    Choosing to develop a kernel mode device driver puts a burden on the developer
    to produce safe and robust code. This further emphasizes the importance of planning
    and designing a well-behaved and riskless device driver.


    • How the device driver will access memory


    • How user mode processes will access the retrieved data


    • How user mode processes will send data out


    • How the device driver will notify a user mode process that an interrupt has
    occurred and retrieved data is ready


    All through the book these subjects will be discussed in depth.


    User Mode


    A user mode device driver executes in a user mode process designed to host it
    and communicate with Device Manager. Device Manager you may recall executes in
    kernel mode and verifies requests made by 48


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ DESIGN YOUR DEVICE DRIVER FIRST!


    a user mode device driver and acts as a go-between the physical hardware and the
    user mode device driver. This means that a user mode device driver has no kernel
    mode privileges and kernel mode API access is very restricted. User mode device
    drivers take a marked performance hit because of the multiple transitions occurring
    between user mode and kernel mode.


    It is appropriate for installable device drivers that handle devices attached
    to extension buses such as USB and Secure Digital buses.


    The Registry


    The registry plays a major role in loading and initializing a device driver because
    a device driver is a dynamically linked library. As such it has to be hosted by
    a host process. The host process needs to know where to find the executable file
    in order to load it. There are two main kernel components that host and handle
    device drivers:


    • Graphics, Windowing and Events System (GWES)


    • Device Manager.


    During the planning and design phase of the development the decision which component
    hosts the device driver will determine the registry settings for it. For stream
    device drivers it is a registry node under HKEY_LOCAL_MACHINE\Drivers\BuiltIn.


    The registry entries one should plan for are load flags, memory configuration,
    and interrupt settings.


    This is not to say that these values are required or more important than others,
    but it is useful to plan ahead for these if needed. In Chapter 5 a comprehensive
    discussion of the registry and should provide all the tools to design for registry
    entries for a stream device driver.


    Device Driver Type


    Device drivers fall under a few device driver classes distinguished by the component
    that loads them.


    Native device drivers are loaded by GWES, stream device drivers are loaded by
    Device Manager and File System Drivers (FSDs) are loaded by FSD Manager (FSDMGR.DLL).
    Apart from user interface device drivers such as display and user input drivers
    such as keyboard, or file system drivers most of the device drivers you are going
    to develop are stream device drivers. So choosing the class should be straight
    forward. However stream device drivers can be either built-in drivers such as
    an I2C device that is an integral part of the SoC or bus drivers or even bus agnostic
    drivers such PC cards device drivers.


    Device Driver Features


    Very important points to consider when planning your device driver are memory
    management, how to handle interrupts, and power management support. It is important
    because the performance of the device driver is influenced by how data is stored
    by the device driver and how it handles interrupts.


    Power management is extremely important for battery-operated devices.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ DESIGN YOUR DEVICE DRIVER FIRST!


    Direct Memory Access


    When considering how your device driver stores incoming data performance is of
    the utmost importance. A device that handles large data input needs to move it
    with the least delay. Considering direct memory access (DMA) is advisable as it
    moves data without involving the processor. However you should be acquainted with
    the DMA capabilities of your peripheral device. A thorough discussion on memory
    handling is presented in Chapter 10.


    Interrupt Support


    Planning interrupt support means that you know the hardware interrupt request
    level that your IO


    peripheral device is mapped to. Next you have to map a logical system interrupt
    ID that will correlate your ISR to the IST. Another consideration is the ISR itself,
    it very much depends on the SoCs architecture and whether you are planning an
    installable device driver where the ISR will be chained.


    Power Management Support


    Besides the consideration of whether to provide power management or not, you may
    want to design what specific power management support the device driver needs
    to implement. For example should the device driver provide wake up capabilities
    or not?


    IO Control Codes


    IO Control codes (IOCTLs) are used to specify device specific system calls that
    are handled through a single system API - **DeviceIoControl**. This allows an
    application to request of the driver to perform functions that the regular file
    system APIs do not offer. For example, suppose the device driver needs some event
    that it would set to notify some IO completion. The device driver can provide
    a name for a named event that an application can retrieve calling a specific IOCTL.
    The application would then create a named event that the device driver would set
    to trigger waking an application̓s thread. Chapter 9 is dedicated to this subject.
    However, it is a good idea to plan for device specific IOCTLs to enhance your
    device driver’s functional capabilities. Figure 3-3 shows how to add IOCTLs to
    a device driver created by the device driver wizard.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-68_1.jpg)


    CHAPTER 3 ■ DESIGN YOUR DEVICE DRIVER FIRST!


    *Figure 3-3\. Adding an IOCTL to a device driver*


    Designing Physical Device Driver (PDD)


    The Physical Device Driver (PDD) is a set of hardware interface functions that
    allow isolating hardware-specific code. For example when you initialize a device
    driver and call into its **XXX_Init** function (for a stream device driver) you
    may need to initialize the devices hardware, sending some command words to it
    command register, reset interrupts, and so on. You could add this code to the
    **XXX_Init** function but you could implement a specific **PDD_Init** function
    specific to the hardware. This would allow for better code maintenance code quality.
    Part of planning and designing the device driver could be designing the PDD function
    that can do the hardware interface. The device driver wizard offers adding PDD
    functions to the device driver code, which means that if you plan ahead you can
    save a lot of time by adding the designed functions. Figure 3-4 shows how to PDD
    functions using the device driver wizard.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-69_1.jpg)


    CHAPTER 3 ■ DESIGN YOUR DEVICE DRIVER FIRST!


    *Figure 3-4\. Adding PDD functions to the device driver*


    Designing for Testing'
