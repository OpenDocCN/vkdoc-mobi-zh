  trans: "\n# 硬件中断\n\n硬件中断可分为边沿触发或电平触发。如同世间万物，每种方式各有利弊。边沿触发中断发生在中断请求线上出现脉冲电平跳变时：低电平（0）到高电平（1）的跳变称为上升沿触发，高电平（1）到低电平（0）的跳变则称为下降沿触发。边沿触发中断的主要缺陷在于，噪声可能被误判为中断，或中断完全被遗漏。现代硬件通过中断状态寄存器有效解决了这一问题。精心实现的设备驱动程序应扫描这些寄存器，以确认没有遗漏中断。电平触发中断会将中断请求线切换至有效状态（高电平或低电平），并保持该状态直至接收到切换为非活跃状态的指令。电平触发中断的主要缺陷在于共享中断请求线的处理：若一个低优先级请求持续保持电平有效，即使另一个\
    \ I/O 设备具有更高优先级，检测其请求也会变得困难。\n\nWindows Embedded Compact 7 及其前代系统需要提供操作系统服务来处理这些中断，从而使操作系统本身及其进程能够正常运行。物理中断是通过连接至\
    \ CPU 的硬件线路传输的信号，OEM 适配层（OAL）的实现会将硬件分配的中断映射为操作系统可理解的逻辑中断，以便中断处理代码正确服务于每个中断。\n\n\
    ## 中断架构\n\nWindows Embedded Compact 7 的中断模型将所有中断向量化到内核中。其中断架构通过将中断处理拆分为极快（且“轻量级”）的中断服务例程（ISR）和由设备驱动程序提供、负责处理大部分中断工作量的线程，在简洁性与性能之间寻求平衡。由于在\
    \ ISR 中执行扩展处理会延迟对其他中断的服务并可能导致抖动，ISR 仅做极少量工作——确认中断后，便将大部分中断处理工作交由 IST 执行。由于 IST\
    \ 的调度方式与系统中的其他线程相同，系统会为其分配与所服务中断优先级相匹配的调度优先级。这通过减少抖动的显著提升了实时性能，并简化了内核的锁机制和线程调度。\n\
    \n处理所有中断的内核组件是异常处理程序。当中断发生时，CPU 将控制权转交给内核异常处理程序。异常处理程序随即调用已注册用于处理当前中断的 ISR。ISR\
    \ 应返回中断的逻辑中断标识符，并将其作为返回值传递给内核。内核会设置与该逻辑中断关联的事件，从而触发中断服务线程（IST）被调度。IST 中的代码负责处理设备中断。IST\
    \ 在设备管理器的线程上下文中运行，本质上是一个以高优先级运行的普通线程。\n\n## 中断处理流程\n\n图 8-1 的示意图展示了从右向左的时间轴上状态转换的顺序。从硬件触发的中断到达开始，一直持续到中断处理完成并释放被阻塞的中断硬件以处理下一个传入中断。图中标注了以下\
    \ 5 个步骤：\n\n1. 设备触发已注册的硬件中断\n2. 内核捕获异常，调用关联的中断服务例程（ISR）\n3. 中断服务例程（ISR）快速处理等待中的中断\n\
    4. 驱动程序中的中断服务线程（IST）收到信号，开始处理中断\n5. 中断服务线程（IST）完成处理并……（原文此处不完整）\n\n*图 8-1. Windows\
    \ Embedded Compact 7 中的中断处理流程*\n\n## 中断服务例程 - ISR\n\nWEC 7 中的 ISR 必须短小精悍且执行迅速，因为\
    \ ISR 执行时所有中断都会被关闭，它们不能调用任何内核函数，不能使用任何栈内存，并且根据 CPU 架构的不同，甚至可能无法使用全部寄存器。更重要的是，ISR\
    \ 不能引发任何嵌套异常。ISR 可以向内核返回一个值，通过返回`SYSINTR_NOP`告知内核中断已处理完毕，或通过返回对应的`SYSINTR`来请求内核调度特定的\
    \ IST。\n\n基于 WEC 7 的设备可接受以下两类中断服务例程：\n\n- 硬件 OEM 在 OAL 中创建的中断处理程序，为 BSP 设备驱动程序提供中断服务。\n\
    - 由 ISV 等根据需要开发的可安装 ISR；但 OEM 必须在 OAL 中提供对链接可安装 ISR 的支持。\n\n## OAL 与中断处理\n\nOEM\
    \ 适配层（OAL）的实现使操作系统内核能够访问 OEM 的硬件。OAL 实现包含一组超过十几个的函数，用于初始化、映射、启用和禁用中断，并在中断请求值与逻辑\
    \ ID 之间进行转换。某些硬件架构（例如 ARM 架构）可能支持由单个 ISR 处理单个中断线，此时 OEM 负责实现名为`OEMInterruptHandler`的单个\
    \ ISR。该函数必须针对每个基于 ARM 的 SoC（片上系统）进行专门实现，因为每个 SoC 都拥有自己的一套控制寄存器。清单 8-1 展示了这样一个实现，其中重复的代码已用“......”字符串简写，并移除了性能分析支持。\n\
    \n其他硬件，例如 x86 架构（其中断由可编程中断控制器 PIC 处理），则为多个中断配备了多个 ISR。在这种情况下，OAL 不会实现`OALIntrMapInit`函数。不过，查看为\
    \ x86 平台提供的实际 ISR——`PeRPISR`（所有基于 x86 的设备通用）是很有意义的。清单 8-2 展示了移除了性能分析和 ILTiming\
    \ 支持后的 x86 ISR。\n\n*清单 8-1. OMAP 35xx 平台的 OEMInterruptHandler 实现*\n\n```\nUINT32\
    \ OEMInterruptHandler(UINT32 ra)\n{\n    UINT32 irq = OAL_INTR_IRQ_UNDEFINED;\n\
    \    UINT32 sysIntr = SYSINTR_NOP;\n    UINT32 mask,status;\n\n    if (g_oalILT.active)\
    \ g_oalILT.interrupts++;\n\n    // 获取等待处理的中断\n    irq = INREG32(&s_intr.pICLRegs->INTC_SIR_IRQ);\n\
    \n    if (irq == IRQ_GPIO1_MPU)\n    {\n        // 将状态与已启用中断的 GPIO 进行掩码操作，确保仅处理由新中断生成的中断\n\
    \        status = INREG32(&s_intr.pGPIORegs[0]->IRQSTATUS1);\n        status &=\
    \ INREG32(&s_intr.pGPIORegs[0]->IRQENABLE1);\n        for (irq = IRQ_GPIO_0, mask\
    \ = 1; mask != 0; mask <<= 1, irq++)\n        {\n            if ((mask & status)\
    \ != 0) break;\n        }\n        OUTPORT32(&s_intr.pGPIORegs[0]->IRQSTATUS1,\
    \ mask);\n        OUTPORT32(&s_intr.pGPIORegs[0]->IRQSTATUS2, mask);\n       \
    \ OUTPORT32(&s_intr.pGPIORegs[0]->CLEARIRQENABLE1, mask);\n        OUTPORT32(&s_intr.pGPIORegs[0]->CLEARWAKEUPENA,\
    \ mask);\n        OEMEnableIOPadWakeup((irq - IRQ_GPIO_0), FALSE);\n    }\n  \
    \  else if (irq == IRQ_GPIO2_MPU)\n    {\n        status = INREG32(&s_intr.pGPIORegs[1]->IRQSTATUS1);\n\
    \        status &= INREG32(&s_intr.pGPIORegs[1]->IRQENABLE1);\n        for (irq\
    \ = IRQ_GPIO_32, mask = 1; mask != 0; mask <<= 1, irq++)\n        {\n        \
    \    if ((mask & status) != 0) break;\n        }\n        OUTPORT32(&s_intr.pGPIORegs[1]->IRQSTATUS1,\
    \ mask);\n        OUTPORT32(&s_intr.pGPIORegs[1]->IRQSTATUS2, mask);\n    }\n\
    }\n```\n"
