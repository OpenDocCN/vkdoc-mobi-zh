    CHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS


    User Mode Device Drivers


    User mode device drivers run in the context of a user mode process and are therefore
    restricted from calling kernel only APIs. User mode device drivers are loaded
    into user mode device driver host process called udevice.exe. This isolates the
    driver from the system kernel increasing overall stability at the expense of performance.
    Basically user mode device drivers are ordinary stream device drivers that have
    **DEVFLAGS_LOAD_AS_USERMODE** flag value added to the flags registry settings.
    User mode device drivers do not have access to kernel mode memory and therefore
    have restrictions on the kinds of pointers and asynchronous memory accesses they
    can perform. Figure 7-11 shows a block diagram of how user mode device drivers
    interact with Device Manager.


    *Figure 7-11\. User mode device driver architecture*


    Restrictions on User Mode Device Drivers


    User mode device drivers should not use embedded pointers. The user mode device
    driver reflector will perform the marshalling necessary for pointer parameters
    in function calls to be dereferenced. However the reflector is not able to marshal
    embedded pointers in a data structure so the user mode driver has to perform the
    necessary marshalling which is tough. For example, if the driver is called by
    a kernel mode component the embedded pointer would point to a kernel address which
    the user mode driver can’t access. The portable solution to this problem is to
    ensure that all data is passed into the driver in a single flat structure that
    does not contain pointers.


    User mode drivers should not be designed to implement asynchronous memory accesses
    to client buffers. The reflector in the kernel will marshal the pointer parameter
    during the synchronous call but the buffer can’t be marshalled for asynchronous
    access. User mode drivers can marshal embedded pointers for asynchronous use themselves,
    but only if they point to user address space.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS


    Implementing a User Mode Device Driver


    Implementing a user mode device driver is no different from implementing a kernel
    mode stream device driver. The main concern is to remember the restrictions just
    discussed and deciding on the user mode host. A user mode device driver is hosted
    by a user mode process Udevice.exe, however you can decide if you want your device
    driver to be hosted by its own host, or be hosted by a host that contains a group
    of user mode device drivers. Once this decision was taken, the only way for Device
    Manager to treat your device driver as a user mode device driver, is setting the
    “Flags” key value to include the **DEVFLAGS_LOAD_AS_USERPROC**. The registry settings
    example in Listing 7-19 is for a user mode device driver that will be hosted in
    its own Udevice process. While the registry settings example in Listing 7-20 is
    for a user mode device driver that will be hosted in a shared Udevice process.
    The "ProcGroup" key in the latter signifies that it will be hosted by Udevice
    process registered as process group 3 which defined in the registry by Microsoft
