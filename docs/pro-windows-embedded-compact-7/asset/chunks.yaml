    developers and quality assurance engineers to test for failure the functionality
    and performance of device drivers and related hardware for a Windows Embedded
    Compact device. The features provided by the CTK offer feedback on the failure
    or success of functionality of tested device drivers, and provide verification
    of BSPs.


    Overview


    The Windows Embedded Compact Test Kit provides considerable improvements to the
    user interface and the overall feature set compared to the previous tool known
    as Windows Embedded CE Test Kit (CETK). CTK is a new application with the following
    major features:


    A. Kcholi *P*


    , *ro Windows Embedded Compact 7*


    © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ USING CTK TO DEVELOP TEST CODE


    • Improved user interface


    • Ability to group user-selected test cases into test passes


    • Improved test results viewer lets you store and review test results per test
    pass


    • Upon connection to a device, detection of peripherals and drivers needed for
    tests


    • Integration with the new Graph Tool to graph performance test results


    • Users can add custom Tux test harness (TUX)-based tests to the CTK


    • Support for x86, MIPSII, MIPSII_FP, ARMv5, ARMv6, ARMv7 processors


    User Interface


    The graphical user interface is reminiscent of the Visual Studio GUI. It has a
    Start Page tab for rudimentary getting started options. On the upper right is
    the Test Case Explorer window containing three tabs:


    • The TTest Case Explorer tab displays the master test catalog in a tree view.
    It contains the Windows Embedded test catalog by default. You can add your own
    custom test case. Other catalogs may be added in the future.


    • The TTest Pass Template View tab displays the user-created and built-in test
    pass templates.


    • The C


    Connection View tab displays the device the CTK is connected to.


    The P


    Properties window on the lower right is similar to the Properties windows in Visual
    Studio. It displays the properties of the currently selected test case, test pass,
    template, or connection. The Connection Output window on the lower left displays
    debug messages from the CTK and from a test case as it runs. Figure 12-1 shows
    CTK open without connection.


    Otherwise the menus and toolbar are in the tradition of Windows GUI application.
    They are straight forward and easy to manipulate, with tooltips showing what the
    toolbar buttons signify.


    The Windows Embedded CTK introduces the concept of a ttest pass as a collection
    of tests which is executed on a device and whose results can be viewed and saved..
    The tests in a test pass can be run all together in one pass or run selectively.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-239_1.jpg)


    CHAPTER 12 ■ USING CTK TO DEVELOP TEST CODE


    *Figure 12-1\. CTK GUI*


    The terminology used by CTK.


    TestCatalog - A collection of tests associated with a particular product TestCategory
    - A logical grouping of tests inside a TestCatalog, most often based on a particular
    technology area


    TestCase - A test that is executed for a pass/fail result on a device/desktop
    TestCaseRun - An instance of a test case being executed on a device/desktop TestPass
    - A collection of tests which is executed on a device and whose results can be
    viewed and saved


    TestPassTemplate - A collection of tests which serve as a template for creating
    a TestPass that is executed on a device


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-240_1.jpg)


