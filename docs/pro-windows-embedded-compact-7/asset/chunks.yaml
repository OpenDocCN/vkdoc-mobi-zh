    # 流接口设备驱动程序的加载


    流接口设备驱动程序的加载完全依赖于注册表。设备驱动程序的加载过程始于设备管理器读取位于 `HKLM\Drivers\BuiltIn` 的注册表根键，以获取驱动程序加载的根路径。这些注册表项请参见代码清单
    7-11。该键下的驱动程序是 `BusEnum.dll`，它是一个作为总线设备驱动程序实现的总线枚举器。然后，设备管理器调用 `ActivateDeviceEx`
    来激活总线枚举器。一旦总线枚举器被激活，它会遍历根键下的所有节点，这些节点将由总线枚举器在启动时自动加载。示例请参见代码清单 7-12。这些流设备驱动程序通常被称为“内置”驱动程序。内置驱动程序通常包括其他总线驱动程序，如
    PCI、USB 等，这些驱动程序各自管理自己的总线。


    *代码清单 7-11. 总线枚举器的注册表项*


    ```

