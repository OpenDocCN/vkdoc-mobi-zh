  trans: "\n# 设备类型\n\n-   **设备类型** - 这是 IOCTL 所属的设备类型。可通过设置 `Common` 位由用户自定义。此类型必须与设备对象的设备类型匹配。Windows\
    \ Embedded Compact 特定的设备类型包括：\n    - `FILE_DEVICE_HAL`\n    - `FILE_DEVICE_CONSOLE`\n\
    \    - `FILE_DEVICE_PSL`\n    - `FILE_DEVICE_SERVICE`\n-   **所需访问权限** - 这是设备所需的访问权限，例如\
    \ `FILE_READ_DATA`、`FILE_WRITE_DATA` 等。\n-   **功能代码** - 这是系统或用户根据自定义位定义的功能代码。\n\
    -   **方法** - 这是用于 Windows Embedded Compact 的数据传输方法，仅应使用 `METHOD_BUFFERED`。\n\n\
    # 内核 IOCTL\n\n内核，如同内核模式设备驱动程序一样，提供了一种通过内核 API `KernelIoControl` 从内核模式组件发起控制请求的方法。由于\
    \ I/O 控制意味着对硬件的控制，该调用实际上会调用一个由 OEM 提供的函数 `OEMIoControl`，该函数是实现这些 IOCTL 的真正函数。请记住，这是基于\
    \ Windows Embedded Compact 设备并非通用设备，而是基于大多是唯一的硬件组合这一前提。因此，只有 OEM 才能对其硬件提供一致的 I/O\
    \ 控制。\n\n`OEMIoControl` 实现了 Microsoft 定义的一系列标准 IOCTL。这些 IOCTL 提供了在启动过程的关键点回调 OAL、从\
    \ OAL 检索系统信息、管理中断标识符等机制。OEM 可以扩展 IOCTL 接口，以实现其认为适合系统高级操作的任何其他自定义功能。例如，OAL 有时用于管理对共享系统范围资源（如\
    \ GPIO）的访问。\n\nWindows Embedded Compact 7 平台生成器在其平台公共源码中提供了 `OEMIoControl` 的实现。清单\
    \ 9-1 展示了平台公共源码中提供的 `OEMIoControl` 函数的实现。该函数由调用 `KernelIoControl` 的内核设备驱动程序调用。此函数的唯一目的是允许\
    \ OEM 设备驱动程序与内核模式代码进行通信。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 9 章 ■ 设备 I/O 控制处理\n\n*清单 9-1. **OEMIoControl** 的通用实现*\n\n```\nBOOL OEMIoControl(DWORD\
    \ code, VOID *pInBuffer, DWORD inSize,\n                  VOID *pOutBuffer, DWORD\
    \ outSize, DWORD *pOutSize)\n{\n    BOOL rc = FALSE;\n    UINT32 i;\n\n    OALMSG(OAL_IOCTL&&OAL_FUNC,\n\
    \           (L\"+OEMIoControl(0x%x, 0x%x, %d, 0x%x, %d, 0x%x)\\r\\n\", code, pInBuffer,\n\
    \            inSize, pOutBuffer, outSize, pOutSize));\n\n    // 当调用 IOCTL_HAL_POSTINIT\
    \ 时\n    // 初始化 g_ioctlState.cs。\n    // 此时，内核已启动并已准备好处理\n    // 临界区初始化。\n   \
    \ if (!g_ioctlState.postInit && code == IOCTL_HAL_POSTINIT)\n    {\n        //\
    \ 初始化临界区\n        InitializeCriticalSection(&g_ioctlState.cs);\n        g_ioctlState.postInit\
    \ = TRUE;\n    }\n\n    // 在 IOCTL 表中搜索请求的代码。\n    for (i = 0; g_oalIoCtlTable[i].pfnHandler\
    \ != NULL; i++)\n    {\n        if (g_oalIoCtlTable[i].code == code) break;\n\
    \    }\n\n    // 指示不支持的代码\n    if (g_oalIoCtlTable[i].pfnHandler == NULL)\n  \
