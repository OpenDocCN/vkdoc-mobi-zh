    # 第 7 章 ■ 流设备驱动程序的本质


    ## 关闭和反初始化设备驱动程序


    设备驱动程序中可能存在阻塞的线程，这些线程可能因为阻塞而无法释放与句柄或设备实例相关的资源。这会在尝试关闭上下文实例或卸载设备驱动程序时导致竞争条件。


    当一个线程正在进行 I/O 操作，而另一个线程调用 `CloseHandle` 时，可能会发生竞争条件。当设备管理器调用 `XXX_Close` 入口点时，驱动程序应唤醒阻塞在句柄上的线程，并释放与该句柄相关的资源。如果设备管理器在另一个线程已调用
    `XXX_Close` 之后调用了 I/O 入口点（如 `XXX_IOControl`），设备驱动程序可能会崩溃。


    如果设备管理器在一个线程中执行设备驱动程序的 `XXX_Deinit` 函数以尝试卸载设备，而另一个线程同时尝试打开一个句柄，则可能发生另一种竞争条件。在这种情况下，从设备驱动程序的角度来看，`XXX_Deinit`
    可能在 `XXX_Open` 之前被调用。这种情况可能发生在长时间且 CPU 负载较高时，或者驱动程序频繁卸载和重新加载时。


