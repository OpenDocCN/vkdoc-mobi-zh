    \n![](img/index-35_1.jpg)\n\n**图 1-11\\. 系统启动期间的设备驱动程序初始化**\n\n## Device Manager\
    \ 注册表项\n\n`HKLM\\Drivers\\Active`注册表项包含`Device Manager`已加载的当前活动设备驱动程序。设备驱动程序例程不应修改`Active`项，也不应依赖`Active`项中的任何特定值。当加载驱动程序时，`Device\
    \ Manager`通过`dwContext`参数将驱动程序`Active`项的路径传递给初始化例程。初始化例程可以在`Active`项中读取和创建新值；但是，在初始化函数返回后，不允许访问该项。\n\
    \n## 设备文件名称\n\n应用程序可以通过文件系统函数访问设备驱动程序，例如使用`CreateFile`获取设备驱动程序的句柄，并使用此句柄执行 I/O\
    \ 请求，如读取、写入或通过 I/O 控制请求执行更复杂的 I/O 操作。在调用诸如`CreateFile`之类的文件系统 API 时，其请求的第一个参数是文件名。此时，会使用设备驱动程序的命名空间来代替文件名。设备驱动程序的命名空间可以是以下格式之一：\n\
    \n-   三位字母前缀，后跟一个 0 到 9 之间的数字，再接一个冒号。\n    例如 `\"TST0:\"`\n-   `$bus`挂载点，后跟总线名称、总线编号、设备编号和功能号。\n\
    \    例如 `\"$bus\\PCMCIA_0_0_0\"`\n-   `$device`挂载点，后跟代表设备的三位字母前缀，再接一个数字，这允许同一设备前缀有超过\
    \ 10 个设备实例。\n    例如 `\"$device\\TST0\"`\n\n## 设备文件名称前缀\n\n前缀由三个大写字母组成，用于标识对应于特定流接口的设备文件名。该前缀存储在名为`Prefix`的注册表值中。在实现流接口时，通常会指定三位字母前缀。第\
    \ 3 章对此主题进行了深入讨论。\n\n首先，前缀标识了所有可以访问流接口驱动程序的可能的设备文件名。\n\n第二，前缀告诉操作系统在流接口 DLL 中应期望哪些入口点文件名。例如，要为\
    \ PC Card 寻呼机实现设备驱动程序，使用`PGR`表示`PAGER`作为三位字母前缀，这反过来会规定入口点名称，例如`PGR_Init`、`PGR_IOControl`等。\n\
    \n## 设备文件名称索引\n\n索引用于区分流接口管理的具有相同前缀的设备。索引是紧跟在前缀后面的数字。默认情况下，`Device Manager`从 1\
    \ 到 9 进行逻辑索引，其中`1`对应第一个设备文件名。如果需要第十个设备文件名，则使用索引`0`。\n\n如果设备文件名的起始索引需要不是`1`，则在注册表项中名为`Index`的注册表值中指定起始索引。当流接口驱动程序服务于使用通用前缀（如`COM`）的设备时，这通常是必要的。例如，`\"\
    COM1:\"`、`\"COM2:\"`和`\"COM3:\"`通常对应于内置串行端口硬件。然而，如果驱动程序用于串行设备（如分组无线调制解调器），它应该显示为`COM`端口，因为调制解调器软件通常假定调制解调器连接到`COM`端口。因此，指定`Index`值为`4`以将此分组无线调制解调器设备与内置串行设备区分开。\n\
    \n`Device Manager`只能注册一个设备文件名，因此如果指定了`Index`值，而不是让`Device Manager`分配索引，则该设备驱动程序仅支持一个设备。\n\
    \n## I/O 资源管理器\n\n当操作系统启动时，总线枚举器枚举注册表并根据注册表信息加载所有内置设备。然后，`I/O Resource Manager`跟踪系统中可用资源的当前状态，并管理总线驱动程序的所有进一步\
    \ I/O 资源请求和分配。因此，当总线驱动程序为可安装设备或其他类型的设备加载客户端驱动程序时，应向`I/O Resource Manager`请求 I/O\
    \ 资源。\n\n`I/O Resource Manager`是`Device Manager`的一个固有部分。`I/O Resource Manager`跟踪在加载任何设备之前从注册表初始化的可用系统资源。跟踪这些资源可防止在多个设备驱动程序尝试使用相同资源时发生意外冲突。\n\
    \n`OAL`和注册表用于预分配总线驱动程序请求的`IRQ`和 I/O 空间资源。但是，`I/O Resource Manager`并不局限于管理 I/O\
    \ 和 IRQ 空间。当总线驱动程序（如`PCI`总线驱动程序）加载其在注册表中找到的设备的设备驱动程序时，会从`I/O Resource Manager`请求`IRQ`和\
    \ I/O 空间资源。同样的情况也适用于`PC Card`总线驱动程序和`PC Card`客户端驱动程序所需的 I/O 资源。当用户从系统中移除`PC Card`时，`PC\
    \ Card`总线驱动程序会释放这些资源。\n\n每个硬件平台都有独特的`IRQ`和可用的 I/O 空间。内置和固定设备的`IRQ`在`OAL`中映射到中断标识符（`SYSINTRs`）。应将这些内置和固定设备的`IRQ`从可用资源中排除。与`PCI`总线一起使用的`IRQ`通常是共享的。\n\
    \n`IRQ`和 I/O 空间资源在`HKLM\\Drivers\\Resources\\IRQ`和`HKLM\\Drivers\\Resources\\\
    IO`注册表项中预先定义，这些注册表项提供了`I/O Resource Manager`的初始状态。\n\n## 章节摘要\n"
- fmt: '# Understanding the Operating System Architecture for Device Drivers


    Understanding the operating system architecture is cardinal to writing robust
    device drivers. The memory architecture governs how memory is allocated and passed
    between kernel mode components, which kernel mode device drivers actually are,
    and user mode processes. Understanding the virtual memory scheme employed by `Windows
    Embedded Compact 7` helps in designing well-behaved device drivers. `Device Manager`
    is the operating system’s component that loads, tracks, and interacts with stream
    device drivers, which are the main topic of this book.


    ## The Tools of the Trade


    “Tools of trade” is a term utilized in bankruptcy law to establish what assets
    a person would commonly use for the purpose of making a living. To make a living
    as device driver developers, our “Tools of trade” are `VS2008`, `Platform Builder`
    (`PB`), and third-party tools.


    `Visual Studio` with Smart Device support only allows you to develop applications
    for devices. For `Windows Embedded Compact 7` (and previous versions) device driver
    development, `Platform Builder` is an absolute must. `Platform Builder` provides
    you with the device driver development kit (`DDK`) and the ability to build an
    operating system image for testing the device driver. Moreover `Platform Builder`
    provides you with the build tools necessary to build device drivers for `Windows
    Embedded Compact 7` (`CE`), such as setting the build environment variables and
    debugging and testing tools such as kernel debugger tool and an extensive set
    of remote tools.


    `Visual Studio` and `Platform Builder` provide a solid foundation for development,
    still third-party tools are available to speed up the process of creating a device
    driver. Two tools that device driver developers should find particularly useful
    are `TRACE32` JTAG debugger, and the `Windows CE Device Driver Wizard`. This chapter
    provides an overview of these tools and later chapters will provide in-depth discussion
    and examples how to use these tools.


    In this chapter:


    - `Visual Studio 2008`

    - `Platform Builder`

    - `Windows CE Build System`

    - `The Device Driver Development Kit`

    - `TRACE32`

    - `The Windows CE Device Driver Wizard`


    ### Visual Studio 2008


    `Visual Studio 2008` is in actual fact the host of `Platform Builder 2008` IDE
    which is a `Visual Studio 2008` plugin wizard, which means that you have to install
    `Visual Studio 2008` prior to installing `Platform Builder 2008`. `Visual Studio
    2008` together with `Platform Builder 2008` provides you with a comprehensive
    environment for developing OS images, subprojects, downloading the OS images to
    the target device and debugging capabilities all in one development tool. What
    is of interest to `Windows Embedded Compact` developers and device driver developers
    for this OS is the integration of `Platform Builder` into `Visual Studio 2008`
    and less `Visual Studio` as a general developer tool.


    ### Visual Studio 2008 and Platform Builder IDE


    `Platform Builder` for `Windows Embedded Compact 7` IDE is integrated into `Visual
    Studio 2008`. It provides the user a graphical user interface to create OS designs,
    connect and download OS images to target devices, a graphical interface to the
    kernel debugger, edit source code build subprojects, `BSP` components, and many
    more capabilities. The build results are the same results as if using command
    line tools to perform all development efforts, moreover results are interchangeable,
    meaning that you can interchange command line development and IDE development.


    After installing `Platform Builder`, `Visual Studio` has specific `Windows Embedded
    Compact` related UI components, including a specific device-related menu called
    the “Target” menu; OS design-specific “Build” menu options; and three new “Tools”
    sub menus “Platform Builder,” “Windows Embedded Silverlight Tools,” and “Remote
    Tools.” The main feature however is the `Platform Builder` wizard and under the
    “Other Languages ➤ Visual C#” project types the “Remote Tools Framework” wizard.
    Figure 2-1 shows the `Platform Builder` Wizard in the “Project Types” tree.


    *Figure 2-1. Creating an OS design using Platform Builder IDE wizard*


    At the same time the new window called “Catalog Items View” is added and can be
    found under the “View ➤ Other Windows” menu. The OS design wizard will ask for
    a `BSP` on which the OS design is built, and offer a set of jumpstart OS design
    templates from which to choose. Figures 2-2 and 2-3 describe these steps. Selecting
    a Board Support Package (`BSP`) is of the utmost importance when creating a new
    OS design; however, it is not difficult to add another `BSP` to the newly created
    OS design later if the need arises to run the exact same operating system image
    on another device using a different architecture.


    *Figure 2-2. BSP selection for the new OS design*


    Once the OS design is created you can add or remove OS components or `BSP`s from
    this OS design using the “Catalog Items View” as shown in Figure 2-4. The Solution
    Explorer allows access to subprojects. `BSP` source files the Public and Private
    directories for opening projects and source files, and excluding or including
    components in the build. Figure 2-5 shows the Solution Explorer.


    *Figure 2-3. Selecting a jumpstart design template*


    *Figure 2-4. The Catalog Items View*


    *Figure 2-5. The Solution Explorer*


    ### Remote Tools


    The remote tools that are installed with `Visual Studio 2008` with smart device
    development option selected are designed mainly to help with application development.
    The main tools of interest to the device driver developer are the `Remote Registry
    Editor` and `Heap Walker Display`. The following is a list of remote tools available
    with `Visual Studio`.


    - `Remote File Viewer` - View and manage the file system on a target device (including
    exporting and importing)

    - `Heap Walker Display` - Display information about heap identifiers and flags
    for each process running on a target device

    - `Remote Process Viewer` - Remote information about each process running on a
    target device

    - `Remote Registry Editor` - Display and manage the registry for a target device

    - `Remote Spy` - Display messages received by windows associated with applications
    running on a target device

    - `Remote Zoom-in` - Capture a screen image in bitmap (`.bmp`) file format from
    a target device


    ### Remote Tools Framework


    The remote tools framework is installed with `Platform Builder 2008` and is a
    development SDK that spans both device side and development workstation plug-in
    libraries to create a custom remote tool and a remote tool shell to host the custom
    plug-in. Developing a remote tool involves creating a device side console application
    that can either push data or respond to requests from the custom remote tool on
    the development workstation, and of course developing the custom remote tool plug-in.
    You have a choice to develop the device side application either using a native
    API, or a `.NET` compact framework managed API. Although a native client side
    remote tool application will serve well a device that needs real-time determinism
    and thus does not support the `.NET` compact framework, a managed device side
    application has the advantage of rapid development. The plug-in side is developed
    using the `.NET`'
