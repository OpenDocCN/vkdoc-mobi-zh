- fmt: "# Marshalling and Filter Device Drivers in Windows Embedded Compact\n\n##\
    \ Synchronous and Asynchronous Pointer Access\n\n`Marshalling` is the transformation\
    \ of data objects stored in one memory space into usable data object of another\
    \ memory space. In Windows CE 6.0 and later, this process of moving data objects\
    \ between user mode processes and kernel mode device drivers depends on whether\
    \ the pointers to these objects are used synchronously or asynchronously. This\
    \ should not be confused with the subject we discussed earlier on asynchronous\
    \ I/O request handling, but rather of the fact that synchronous means accessing\
    \ the caller’s buffer on the caller’s thread context. Asynchronous means that\
    \ either the device driver is processing the buffer in another thread or it continues\
    \ to process it after the call has returned to the user process. This really is\
    \ the foundation for asynchronous I/O request handling, but it was introduced\
    \ with the change of architecture that occurred in Windows CE 6.0. However, in\
    \ Windows Embedded Compact 7 (which is really Windows CE 7.0), additional capabilities\
    \ have been introduced to the Device Manager to enable user processes to be notified\
    \ of completion of I/O operations, monitor progress, and cancel such I/O processing\
    \ before it completes. Figures 7-7 and 7-8 show a visually diagrammatic scheme\
    \ of synchronous and asynchronous access.\n\n**Pointers are used synchronously:**\n\
    - The caller’s address space is accessible for the lifetime of the call\n- Eliminates\
    \ any marshalling needs for both embedded and pointer parameters\n- Employs Direct\
    \ Access Marshalling\n\n**Pointers are used asynchronously:**\n- It’s critical\
    \ that the caller buffer is accessible when the caller’s address space is unavailable\n\
    - Use the new OS marshalling helper APIs: `CeAllocAsynchronousBuffer` / `CeFreeAsynchronousBuffer`\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-128_1.jpg)\n![](index-128_2.jpg)\n\
    \nCHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS\n\n*Figure 7-7. Diagrammatic\
    \ of synchronous access*\n*Figure 7-8. Diagrammatic of asynchronous access*\n\n\
    ## Filter Device Drivers\n\nFilter device drivers are a new feature in Windows\
    \ Embedded Compact 7. Filter device drivers are optional and basically insert\
    \ themselves “in front” of a device driver to filter I/O requests to this device\
    \ driver. The documentation in Windows Embedded Compact resembles the Windows\
    \ Driver Model (WDM) documentation; however there is little comparison to the\
    \ desktop model. Filter device drivers can relate to bus device drivers, kernel\
    \ mode device drivers, user mode device drivers, or device drivers loaded by GWES.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nCHAPTER 7 ■ THE ESSENCE\
    \ OF STREAM DEVICE DRIVERS\n\nA useful example of such a filter device driver\
    \ would be a finite impulse response filter driver for some sampling low level\
    \ stream device driver. The best way to understand how to develop such a filter\
    \ device driver would be to understand how Device Manager handles its loading,\
    \ and how it relates to the device driver which I/O it filters.\n\nUnlike the\
    \ desktop where filter drivers are inserted into the driver stack, in Windows\
    \ Embedded Compact, Device Manager has a new component: Filter manager. Filter\
    \ manager handles a list of filter drivers chained together by registry settings.\
    \ When you want to relate a filter driver to some stream device driver, or any\
    \ device driver for that matter, you have to add a `Filter` key to the device\
    \ driver’s registry setting, and the value assigned to it is a GUID relating to\
    \ the filter driver. Listing 7-14 shows the registry settings for a device driver\
    \ that supports a filter driver. The filter driver registry settings entry for\
    \ the filter device driver for that device driver is shown in Listing 7-15.\n\n\
    *Listing 7-14. Registry settings entry for a sample stream device driver supporting\
    \ a filter driver*\n\n```\n; TesTdrvr driver\n[HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\\
    Testdrvr]\n\"Prefix\"=\"TST\"\n\"DLL\"=\"Testdrvr.DLL\"\n\"Order\"=dword:0\n\"\
    DisplayName\"=\"TesTdrvr driver\"\n\"Flags\"=dword:0\n\"Filter\"=\"{fbf9a438-f6c8-46dc-a278-df2900638f3f}\"\
    \n```\n\n*Listing 7-15. Registry settings entry for a sample filter driver*\n\n\
    ```\n[HKEY_LOCAL_MACHINE\\Drivers\\Filters\\\n{fbf9a438-f6c8-46dc-a278-df2900638f3f}\\\
    FIRFilter]\n\"DLL\"=\"Firfilterdrvr.dll\"\n\"InitEntry\"=\"FIRFilterInit\"\n;\
    \ You may want to change the loading order as this is a temporary\n; value\n\"\
    Order\"=dword:0\n; Add this line to the registry settings of device driver being\n\
    ; filtered\n;\"Filter\"=”{fbf9a438-f6c8-46dc-a278-df2900638f3f}”\n```\n\nThe stream\
    \ device driver is my faithful example used previously, with the addition of a\
    \ new IOCTL code to help demonstrate the filtering process. The filter driver\
    \ was created using the Windows CE Device Driver Wizard, hence the last two lines\
    \ of the listing. Figure 7-10 shows how to create a filter driver using the Windows\
    \ CE Device Driver Wizard.\n\nDevice Manager starts its device driver loading\
    \ process and BusEnum loads `Testdrvr.dll` by calling `ActivateDeviceEx`. In essence,\
    \ Device Manager starts the process of loading the stream device driver within\
    \ an internal function `LoadLib`. It loads first `Testdrvr.dll` and assigns all\
    \ of its entry points, and goes on to load the related filter driver. Once the\
    \ filter driver DLL is loaded, it calls the function pointed to by the `InitEntry`\
    \ key in the registry settings of the filter driver. And really both drivers are\
    \ initially loaded.\n\nFigure 7-9 shows the call stack of the loading process.\
    \ Now Device Manager calls the `Init` entry point, and this is where it becomes\
    \ interesting because both device drivers are chained and the filter driver `Init`\
    \ entry point is called first. If it does what it does to initialize the filter\
    \ driver and would not trigger the call to `TST_Init`, Device Manager will not\
    \ call it by itself. See Listing 7-17 for an example of a `FilterInit` function.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-130_1.jpg)\n\n\
    CHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS\n\n*Figure 7-9. Stream device\
    \ driver loading and the related filter driver loading and initializing*\n\nThe\
    \ filter driver provides a FIR filter (really very rudimentary for the example)\
    \ that will handle sampling data from the stream device driver. The filter driver\
    \ is implemented as a C++ class derived from the `DriverFilterBase` class, which\
    \ Microsoft provides in `C:\\WINCE700\\public\\common\\ddk\\inc\\drfilter.h`.\n\
    \nListing 7-16 shows a jumpstart filter driver generated by the device driver\
    \ wizard.\n\n*Listing 7-16. An example filter driver class*\n\n```\nclass FIRFilter\
    \ : public DriverFilterBase\n{\nprotected:\n    // Value returned from xxx_Init()\n\
    \    DWORD m_initReturn;\n    // The pointer to the device driver that this filters\n\
    \    PDRIVER_FILTER m_pNext;\n\npublic:\n    FIRFilter(LPCTSTR lpcFilterRegistryPath,\n\
    \              LPCTSTR lpcDriverRegistryPath,\n              PDRIVER_FILTER pNextFilterParam);\n\
    \    ~FIRFilter();\n\n    DWORD FilterInit(DWORD dwContext, LPVOID lpParam);\n\
    \    BOOL FilterPreDeinit(DWORD dwContext);\n    BOOL FilterDeinit(DWORD dwContext);\n\
    \    DWORD FilterOpen(DWORD dwContext, DWORD AccessCode,\n                   \
    \  DWORD ShareMode);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-131_1.jpg)\n\nCHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS\n\n\
    ```\n    BOOL FilterPreClose(DWORD dwOpenCont);\n    BOOL FilterClose(DWORD dwOpenCont);\n\
    \    BOOL FilterControl(DWORD dwOpenCont, DWORD dwCode,\n                    \
    \   PBYTE pBufIn,\n                       DWORD dwLenIn, PBYTE pBufOut, DWORD\
    \ dwLenOut,\n                       PDWORD pdwActualOut, HANDLE hAsyncRef);\n\
    \    void FilterPowerdn(DWORD dwConext);\n    void FilterPowerup(DWORD dwConext);\n\
    \    DWORD FilterRead(DWORD dwOpenCont, LPVOID pBuffer,\n                    \
    \ DWORD Count);\n    DWORD FilterWrite(DWORD dwOpenCont, LPCVOID pSourceBytes,\n\
    \                      DWORD NumberOfBytes);\n    DWORD FilterSeek(DWORD dwOpenCont,\
    \ long Amount, DWORD Type);\n    BOOL FilterCancelIo(DWORD dwOpenCont, HANDLE\
    \ hAsyncHandle);\n};\n```"
