    ## 第 6 章


    ## 理解设备驱动程序类型


    设备驱动程序类型实际上是一个模糊的术语。Windows Embedded Compact 7 将设备驱动程序视为两种基本类型：本机设备驱动程序和流设备驱动程序。第三种类型（实际上是前两者的结合）被称为混合设备驱动程序。本机驱动程序是一种内置设备驱动程序，在启动时由
    GWES 加载和调用，并公开一组特定于该设备驱动程序类的自定义 API 集合。管理硬件平台内置 IO 设备、由设备管理器管理并公开流接口的设备驱动程序被视为流设备驱动程序。混合设备驱动程序同时向系统其余部分公开自定义用途接口和流接口。


    本章内容包括：


    • 本机设备驱动程序


    • 流设备驱动程序


    • 混合设备驱动程序


    • 单片式与分层式


    • 解释设备接口类


    • 如何实现设备接口通知


    ### 本机设备驱动程序


    本机设备驱动程序通常是支持用户输入和输出外围设备的驱动程序，例如键盘、鼠标、触摸屏和显示器外围设备。期望图形窗口和事件子系统（GWES）处理这些设备似乎是合理的。GWES
    确实直接加载和管理这些设备驱动程序。本机设备驱动程序实现了与其功能目的相关的特定设备驱动程序接口（DDI）函数。本机设备驱动程序的注册表项位于 `HKEY_LOCAL_MACHINE\HARDWARE\DEVICEMAP\`
    或 `HKEY_LOCAL_MACHINE\Drivers\Display\` 注册表节点下。


    A. Kcholi *著*，《*精通 Windows Embedded Compact 7*》


    © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 6 章 ■ 理解设备驱动程序类型


    例如：


    `[HKEY_LOCAL_MACHINE\HARDWARE\DEVICEMAP\TOUCH]`


    `"DriverName"="touch.dll"`


    `"MaxCalError"=dword:10`


    ### 流设备驱动程序


    流设备驱动程序由设备管理器加载和管理。流设备驱动程序公开一组已定义的函数，以便设备管理器能够代表系统或用户模式应用程序与设备驱动程序交互。用户模式应用程序使用文件系统
    API 访问流设备驱动程序，以打开设备驱动程序的实例并读取和写入设备数据。扩展操作通过设备管理器 API `DeviceIoControl` 访问，该 API
    可以容纳设备驱动程序允许的自定义操作。流设备驱动程序的注册表项位于 `HKEY_LOCAL_MACHINE\Drivers\BuiltIn` 注册表节点下。

