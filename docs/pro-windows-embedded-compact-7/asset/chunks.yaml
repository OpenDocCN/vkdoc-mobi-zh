    \nCHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS\n\n*Figure 7-5\\. Running the\
    \ asynchronous IO request demo application*\n\n## Kernel Mode Device Drivers\n\
    \nThe Device Manager loads all stream device drivers into kernel space as kernel\
    \ mode drivers accept for device drivers that set the `DEVFLAGS_LOAD_AS_USERPROC`\
    \ flag in the registry. Kernel mode drivers provide the best performance since\
    \ they can call kernel APIs directly using the kernel version of `coredll.dll`\
    \ named `k.coredll.dll`.\n\nKernel mode device drivers must be robust because\
    \ they have unlimited access to kernel data structures and kernel space memory.\
    \ A faulty kernel mode device driver can corrupt kernel memory thus causing a\
    \ system crash. Kernel mode device drivers can synchronously access user buffers\
    \ very quickly because user memory is directly available.\n\n## Access Checking\n\
    \nA stream device driver can accept input and output buffers from a calling user\
    \ mode process, which presents a problem mapping these user mode virtual memory\
    \ pointers to kernel mode virtual memory pointers. In Windows CE 6.0 and later,\
    \ the kernel performs a full access check on pointer parameters, 111\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-126_1.jpg)\n\nCHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS\n\n\
    thus, drivers only need to access check embedded pointers. An embedded pointer,\
    \ means that a user mode process has embedded a user mode virtual address pointer\
    \ within the buffer it passes to the device driver. Listing 7-13 is an excerpt\
    \ from commented code generated by the device driver wizard for the `XXX_IOControl`\
    \ function to demonstrate accessing an embedded pointer. Figure 7-6 shows a visually\
    \ diagrammatic access check.\n\n*Listing 7-13\\. Code snippet demonstrating embedded\
    \ pointer access*\n\n```c\n// The following code should guide you to handle access\
    \ to\n// embedded pointers Structure with an embedded pointer\ntypedef struct\
    \ _INPUT_tag\n{\nUCHAR *pEmbedded;\nDWORD dwSize;\n}INPUT, *PINPUT;\n\nPUCHAR\
    \ g_pMappedEmbedded\n\n// Code implementation\nHRESULT hr = E_WASNEVERSET;\nPINPUT\
    \ pInput = pBufIn;\nhr = CeOpenCallerBuffer((PVOID*)&g_pMappedEmbedded,\npInput->pEmbedded,\n\
    pInput->dwSize,\nARG_I_PTR,\nFALSE);\n// Fail if FAILED(hr) == true\n\n// When\
    \ done processing using the embedded pointer\nhr = CeCloseCallerBuffer((PVOID)g_pMappedEmbedded,\n\
    pInput->pEmbedded,\npInput->dwSize,\nARG_I_PTR);\n```\n\n*Figure 7-6\\. Diagrammatic\
    \ of access check process*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS\n\n## Marshalling"
