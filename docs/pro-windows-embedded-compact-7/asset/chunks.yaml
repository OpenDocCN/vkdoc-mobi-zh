    \ is reserved for Microsoft\n//\n#define IOCTLDEVTYPE_DEVICE_DEMODRVR 2048\n/////////////////////////////////////////////////////////////////\n\
    //\n// Specific driver IOCTL codes\n//\n//\n// IOCTL_DEMODRVR_FOO1\n//\n#define\
    \ IOCTL_DEMODRVR_FOO1 \\\n    CTL_CODE(IOCTLDEVTYPE_DEVICE_DEMODRVR, 0x100, METHOD_BUFFERED,\
    \ FILE_ANY_ACCESS)\n\n//\n// IOCTL_DEMODRVR_FOO2\n//\n#define IOCTL_DEMODRVR_FOO2\
    \ \\\n    CTL_CODE(IOCTLDEVTYPE_DEVICE_DEMODRVR, 0x101, METHOD_BUFFERED, FILE_ANY_ACCESS)\n\
    \n#endif /* __DEMODRVRSDK_H__ */\n```\n\nThe file example in Listing 9-4 was generated\
    \ by the device driver wizard entering needed `IOCTL` function code text and selecting\
    \ the required access as can be seen in Figure 9-1. This header file is separated\
    \ from the other files of the device driver implementation so it can be distributed\
    \ to application developers to use in code controlling the specific device driver.\n\
    \n*Figure 9-1. Defining and adding IOCTLs to device driver definitions*\n\n##\
    \ Processing Device Specific IOCTLs\n\nSuppose `IOCTL_DEMODRVR_FOO1` defined in\
    \ Listing 9-4 handles some asynchronous I/O operation. Implementing this functionality\
    \ has to be coded within the `xxx_IOControl` entry point of your stream device\
    \ driver. Listing 9-5 is a skeleton generated by the device driver wizard; it\
    \ allows the developer to add device driver specific functionality to the code\
    \ to handle asynchronous I/O.\n\n*Listing 9-5. Skeleton implementation of xxx_IOControl\
    \ entry point*\n\n```c\nBOOL DMO_IOControl(DWORD hOpenContext, DWORD dwCode, PBYTE\
    \ pBufIn,\n    DWORD dwLenIn, PBYTE pBufOut, DWORD dwLenOut, PDWORD pdwActualOut,\
    \ HANDLE hAsyncRef)\n{\n    PDMO_DEVCONTXT pDevContxt = (PDMO_DEVCONTXT)hOpenContext;\n\
    \    BOOL bRet = TRUE;\n    DWORD dwErr = 0;\n\n    switch (dwCode)\n    {\n \
    \   case IOCTL_DEMODRVR_FOO1:\n        // Enter critical section if needed otherwise\
    \ erase\n        // EnterCriticalSection(\n        // &pDevContxt->CriticalSection);\n\
    \        // Add implementation code\n        bRet = Foo1(hAsyncRef, pDevContxt);\n\
    \n        if (!bRet)\n        {\n            // Handle error\n        }\n\n  \
    \      // LeaveCriticalSection(\n        // &pDevContxt->CriticalSection);\n \
    \       break;\n\n    ...\n    ...\n    ...\n\n    default:\n        break;\n\
    \    }\n    return bRet;\n}\n```\n\nThe bold, underlined lines of code in Listing\
    \ 9-5 actually provide the required functionality. The function `Foo1` is an internal\
    \ function shown in Listing 9-6. However you can just insert the code contained\
    \ in this function directly into the case handling of the IOCTL. However, this\
    \ `IOControl` entry point may become cumbersome to track and difficult to maintain.\n\
    \n*Listing 9-6. Sample implementation of Foo1*\n\n```c\nBOOL Foo1(HANDLE _hAsyncRef,\
    \ PDMO_DEVCONTXT _pDevContxt)\n{\n    HANDLE hAsyncIO = NULL;\n\n    if (_hAsyncRef)\n\
    \    {\n        hAsyncIO = CreateAsyncIoHandle(\n            hAsyncRef, (LPVOID*)pBufIn,\
    \ 0);\n    }\n\n    CeOpenCallerBuffer(\n        (PVOID*)(&g_AsyncParams.pBufIn),\n\
    \        (PVOID)pBufIn,\n        dwLenIn, ARG_O_PTR, TRUE);\n\n    EnterCriticalSection(&_pDevContxt->CriticalSection);\n\
    \    g_AsyncParams.hAsyncIO = hAsyncIO;\n    g_AsyncParams.dwInLen = dwLenIn;\n\
    \    LeaveCriticalSection(&_pDevContxt->CriticalSection);\n\n    g_hAsyncThread\
    \ = CreateThread(NULL, 163840,\n        (LPTHREAD_START_ROUTINE)AsyncThread,\n\
    \        (LPVOID)&g_AsyncParams,\n        CREATE_SUSPENDED | STACK_SIZE_PARAM_IS_A_RESERVATION,\
    \ NULL);\n\n    if (g_hAsyncThread == NULL)\n    {\n        DEBUGMSG(ZONE_IOCTL,\n\
    \            (_T(\"DMO! AsyncThread: Failed to create thread\\r\\n\")));\n   \
    \     return FALSE;\n    }\n\n    ResumeThread(g_hAsyncThread);\n    return TRUE;\n\
    }\n```\n\n## Power Management Support\n\nA good example of using IOCTLs to provide\
    \ custom device control is power management I/O control handling by device drivers\
    \ that support power management. Power management support is provided by specific\
    \ IOCTLs that Power Manager calls into to retrieve information about device specific\
    \ capabilities - `IOCTL_POWER_CAPABILITIES`. Power Manager calls into to retrieve\
    \ device power state - `IOCTL_POWER_GET`. Power Manager calls into to request\
    \ to change the device power state from one state to another - `IOCTL_POWER_SET`.\
    \ Previous versions of Windows CE had one more IOCTL that is deprecated for Windows\
    \ Embedded Compact 7 - `IOCTL_POWER_QUERY`. Listing 9-7 is a typical implementation\
    \ of the first three power management IOCTLs.\n\n*Listing 9-7. Power management\
    \ IOCTLs implementation*\n\n```c\ncase IOCTL_POWER_CAPABILITIES:\n    // Tell\
    \ power manager about this.\n    if (pBufOut != NULL &&\n        dwLenOut >= sizeof(POWER_CAPABILITIES)\
    \ &&\n        pdwActualOut != NULL)\n    {\n        __try {\n            PPOWER_CAPABILITIES\
    \ ppc =\n                (PPOWER_CAPABILITIES) pBufOut;\n            memset(ppc,\
    \ 0, sizeof(POWER_CAPABILITIES));\n            ppc->DeviceDx = 0x11; // support\
    \ D0, D4\n            ppc->WakeFromDx = 0x00; // No wake capability\n        \
