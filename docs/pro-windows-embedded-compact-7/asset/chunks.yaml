    `Wizards` are designed to take out the cumbersome work of copying a sample project,
    renaming it, and adapting it to create a new project. This is exactly what the
    `Windows CE Device Driver Wizard` is all about. It is designed to help device
    driver developers jump start the creation of stream device drivers for `Windows
    CE` of versions 5.0, 6.0, and 7. It helps create a buildable project skeleton
    and takes away a mountain of tedious work that is associated with copying a skeleton
    example and renaming it.


    ## Best Practice


    Before you start it you should consider the design of your device driver. This
    will help going through the creation steps the `Device Driver Wizard` provides
    to end up with a comprehensive jumpstart device driver project. You should plan
    for the following information:


    - A meaningful name for the device driver

    - If it is a kernel mode device driver or user mode

    - The location for the device driver

    - Is it a device driver that is part of a BSP?

    - Is it a device driver that is related to a single OS design?

    - Is it a device driver that can be used by any OS design?

    - Registry-related information

    - CPU architecture

    - DMA support

    - Interrupt support

    - Device specific IO control code support


    Planning for all the above and more will help you provide the `Device Driver Wizard`
    with information that will create all the needed source code, build support, and
    parameter files all ready to be built. Once you add your device specific code
    your device driver is ready for testing.


    `Figure 2-16` shows the starting page of the `Device Driver Wizard` allowing the
    developer to select the location for the device driver.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-61_1.jpg)


    CHAPTER 2 ■ THE TOOLS OF THE TRADE


    *Figure 2-16. Device Driver Wizard General Configuration Parameters Page*


    ## Chapter Summary


    `Visual Studio 2008` provides the foundation for the `Platform Builder IDE`, which
    enables you to create, build, and debug device drivers. `Platform builder` includes
    troubleshooting tools, wizards, and build tools to guide you through the build
    process. `Windows Embedded Compact` comes with a defined build system that uses
    four phases: compile, sysgen, release copy, and make run-time image, and the `Platform
    Builder` tools help you at each phase to create a working driver. To troubleshoot
    and debug issues, and simplify device driver development, you can use the tools
    included in `Platform Builder`, such as the `Device Driver Wizard`, as well as
    third-party tools such as `TRACE32-ICD`. Next on our agenda is designing our device
    driver, considering its location, mode, kernel mode, or user mode and many more
    considerations that have to be decided upon before diving into actual development.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 3**


    ****Design your Device Driver First!**


    I know that most readers at this point feel the itch at their fingertips to just
    start hitting the keyboard and implement a device driver. Device drivers, unlike
    applications, are fairly straightforward units of software so why not get to the
    point. My answer to this valid question is twofold; it eliminates costly mistakes
    and saves time. It eliminates mistakes because it forces you to research and understand
    the hardware. Select the right model for your design. Plan the device driver structure;
    think through how the device driver will access memory. Think through and plan
    the device driver interrupt handling. You save time by avoiding ad hoc development
    and the information you gather for the design helps even if using a third-party
    tool like the `device driver wizard` to generate a jumpstart device driver skeleton
    more efficient. This chapter is designed to highlight the points you should *consider*
    when planning and designing your device driver.


    ### In this chapter


    - Device driver location considerations

    - Considering between kernel mode and user mode

    - Considering registry settings

    - Considering device driver type

    - Considering memory access methods

    - Considering interrupt Support

    - Considering Power Management Support

    - Considering IO Control Codes

    - Designing Physical Device Driver (PDD)

    - Designing for Testing


