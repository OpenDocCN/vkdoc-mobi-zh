- fmt: '# Using CTK to Develop Test Code


    Testing is the final phase of the development cycle before being able to release
    any product, software or hardware. The aim of testing is to assure the finished
    product is of the highest quality. Quality software products are a must in the
    twenty-first century when reliance on high-quality software has bearing on almost
    any facet in our lives. Developers seem to sneer at this process and QA people
    are often regarded as second rate to the designers and coders. However the ISO
    standards of software development force software vendors and OEMs to take notice
    and enforce strict testing for quality assurance.


    ## In this chapter


    - Windows Embedded Compact Test Kit

    - Designing tests

    - TUX Test harness

    - Viewing results

    - Performance testing


    ## Windows Embedded Compact Test Kit


    The `Windows Embedded Compact Test Kit` provided with `Platform Builder 7` enables
    developers and quality assurance engineers to test for failure the functionality
    and performance of device drivers and related hardware for a Windows Embedded
    Compact device. The features provided by the `CTK` offer feedback on the failure
    or success of functionality of tested device drivers, and provide verification
    of `BSPs`.


    ### Overview


    The `Windows Embedded Compact Test Kit` provides considerable improvements to
    the user interface and the overall feature set compared to the previous tool known
    as `Windows Embedded CE Test Kit` (`CETK`). `CTK` is a new application with the
    following major features:


    - Improved user interface

    - Ability to group user-selected test cases into test passes

    - Improved test results viewer lets you store and review test results per test
    pass

    - Upon connection to a device, detection of peripherals and drivers needed for
    tests

    - Integration with the new `Graph Tool` to graph performance test results

    - Users can add custom `TUX` test harness (`TUX`)-based tests to the `CTK`

    - Support for `x86`, `MIPSII`, `MIPSII_FP`, `ARMv5`, `ARMv6`, `ARMv7` processors


    ### User Interface


    The graphical user interface is reminiscent of the `Visual Studio` GUI. It has
    a `Start Page` tab for rudimentary getting started options. On the upper right
    is the `Test Case Explorer` window containing three tabs:


    - The `Test Case Explorer` tab displays the master test catalog in a tree view.
    It contains the Windows Embedded test catalog by default. You can add your own
    custom test case. Other catalogs may be added in the future.

    - The `Test Pass Template View` tab displays the user-created and built-in test
    pass templates.

    - The `Connection View` tab displays the device the `CTK` is connected to.


    The `Properties` window on the lower right is similar to the `Properties` windows
    in `Visual Studio`. It displays the properties of the currently selected test
    case, test pass, template, or connection. The `Connection Output` window on the
    lower left displays debug messages from the `CTK` and from a test case as it runs.
    Figure 12-1 shows `CTK` open without connection.


    Otherwise the menus and toolbar are in the tradition of Windows GUI application.
    They are straightforward and easy to manipulate, with tooltips showing what the
    toolbar buttons signify.


    The `Windows Embedded CTK` introduces the concept of a test pass as a collection
    of tests which is executed on a device and whose results can be viewed and saved.
    The tests in a test pass can be run all together in one pass or run selectively.


    ![CTK GUI](index-239_1.jpg)


    *Figure 12-1. CTK GUI*


    #### The terminology used by CTK


    - `TestCatalog` - A collection of tests associated with a particular product

    - `TestCategory` - A logical grouping of tests inside a `TestCatalog`, most often
    based on a particular technology area

    - `TestCase` - A test that is executed for a pass/fail result on a device/desktop

    - `TestCaseRun` - An instance of a test case being executed on a device/desktop

    - `TestPass` - A collection of tests which is executed on a device and whose results
    can be viewed and saved

    - `TestPassTemplate` - A collection of tests which serve as a template for creating
    a `TestPass` that is executed on a device


    ## Creating a Test Pass


    Before you create a test pass, you must create a template on which to base your
    test pass. This section explains how to create a test pass template and how to
    create a test pass from this template.


    ### Creating a Test Pass Template


    The easiest way to launch the `Test Manager` is clicking the "Create a Custom
    Test Pass Template" option on the start page. The `Test Manager` is the tool to
    manage the creation, editing, and removal of test cases.


    Figure 12-2 shows the `Test Manager` dialog box and a new template ready to be
    named.


    ![Test Manager after the "New" button was clicked](index-240_1.jpg)


    *Figure 12-2. Test Manager after the "New" button was clicked*


    ### Creating a Test Case


    Creating a test case is relating a `TUX` test DLL that you develop to test your
    device driver. To bind the test case to a test pass you have to bind this test
    case to the test pass template you have created. Using the test pass template
    `DemoTest` just created, select it and switch to the "Test Case Information" tab.


    Create a new category in the "Windows Embedded Test Catalog." In this example
    I kept on the `Demo` theme and named it `DemoCat`. In the "Test Case Information"
    tab click on the "New" button and setup the new test case. Figure 12-3 is indicative
    of this process.


    ![Generating a new test category and test case](index-241_1.jpg)


    *Figure 12-3. Generating a new test category and test case*


    The step where you actually connect your `TUX` test DLL to the test case is when
    you select the supported architecture. Figure 12-4 displays the newly created
    test case which was named `DemoDrvrAsynIOTest` and is part of the `DemoCat` category,
    in this case fully automated and is using `TUX` test harness. Once you try to
    select the supported architecture it needs architecture specific files. In this
    case it is an `x86` architecture based device, so note that the main binary is
    the `TUX` test DLL `Demodrvrtest.dll` which is located in:


    `WINCEROOT\OSDesigns\DemoOSDesign\DemoOSDesign\RelDir\DemoBSP_x86_Debug`


    Of course if you are going to develop a CPU agnostic device driver that you''d
    locate under the `PUBLIC` tree, you would create a specific folder hierarchy that
    would hold a set of CPU dependent `TUX` test DLLs under CPU specific folders and
    reference these DLLs for each CPU architecture that you test.


    ![Creating a new test case and linking the architecture specific TUX test DLL
    files](index-242_1.jpg)


    *Figure 12-4. Creating a new test case and linking the architecture specific TUX
    test DLL files*


    ### Creating a Test Pass from a Template


    At this juncture you have a new test `DemoDrvrAsynIOTest` that is contained in
    the new test category `DemoCat`. This allows you to give meaning to the test pass
    template `DemoTest`. Switch back to the "Test Pass Template" tab and add (selecting
    the test case and clicking the "Add" button) the newly created test case to the
    `DemoTest` pass template. You can actually use this procedure to add as many test
    cases from the `Test Case Explorer` as you wish for a test pass.


    ![Adding a test case to a test pass](index-243_1.jpg)


    *Figure 12-5. Adding a test case to a test pass*'
