    \        return FALSE;\n    }\n\n    bRet = DeviceIoControl(hTstDrvr,IOCTL_UMDEMODRVR_FOO1,\n\
    \                           NULL, 0, NULL, 0, NULL, NULL);\n\n    return 0;\n\
    }\n```\n\n*图 7-13. 显示消息框的用户模式设备驱动程序*\n\n## 章节总结\n\n流设备驱动程序一直是 Windows CE 在其存在期间的中流砥柱。早期版本的\
    \ Windows CE（直至 Windows CE 6.0）与 Windows CE 6.0 及其后继者 Windows Embedded Compact\
    \ 7 之间的主要区别在于，在旧版本中，由于架构原因，流设备驱动程序是用户模式驱动程序。然而，在最后两个版本中，流设备驱动程序可以驻留在内核空间或用户空间中，因此有了内核模式流设备驱动程序和用户模式流设备驱动程序。前者提供了更好的性能，后者则提供了健壮性，特别是对于可安装的设备驱动程序。最新版本的\
    \ Windows CE 设备管理器使我们能够开发支持异步 I/O 请求处理的设备驱动程序。设备管理器允许为各种功能创建筛选器驱动程序。\n\n# 第 8\
    \ 章\n\n## 设备驱动 I/O 与中断\n\n任何计算机系统的本质都是接受输入数据、处理数据并产生输出。系统如何接受输入数据对于实时嵌入式系统至关重要。因为它需要在确定的时间间隔内处理输入数据并输出响应。实现这一点的最准确方法是持续轮询输入源以获取数据。然而，这给\
    \ CPU 带来了沉重的负担，将系统限制为仅执行一个任务。等待输入数据的到来并对其做出反应则可以减轻此负担并释放 CPU 资源。为了能够等待和响应，我们需要硬件支持，使\
    \ CPU 能够从正在执行的处理流程中转移注意力。\n\n硬件触发的中断会导致 CPU 停止执行流程，并跳转到处理中断的代码中的特定入口点。中断的到达是不可预测的，因此它可能在任何时间发生，甚至在处理另一个中断时也是如此。一旦中断被处理完毕，CPU\
    \ 将从其中断点恢复执行。\n\n在本章中：\n- 中断模型\n- 中断处理\n- I/O 内存映射\n\n### 中断模型\n\n每当 I/O 硬件需要\
    \ CPU 的注意时（因为其 I/O 寄存器状态发生变化），它会触发一个中断。中断可以分为可屏蔽中断、不可屏蔽中断、处理器间中断和软件中断。\n\n- **可屏蔽中断**\
    \ – 可以通过在中断屏蔽寄存器（`IMR`）中设置特定位来忽略的硬件中断。\n- **不可屏蔽中断（NMI）** – 无法忽略的硬件中断。\n- **处理器间中断（IPI）**\
    \ – 在多处理器环境中，由一个处理器向另一个处理器触发的中断。主要用于实现缓存一致性。在 Windows Embedded Compact 7 中，由于它支持多核处理器，这种中断变得相关。\n\
    - **软件中断** – 由某些 CPU 指令触发的异常。用作执行系统调用的陷阱，因为 CPU 会切换到内核模式。\n"
- fmt: "# Hardware Interrupts\n\nHardware interrupts may be edge triggered or level\
    \ triggered. As with everything in life there are pros and cons to each of these.\
    \ Edge triggered interrupts occur when there is a level transition of a pulse\
    \ on the interrupt request line, a rising edge trigger occurs when the transition\
    \ is from low (0) to high (1), and falling edge trigger occurs when the transition\
    \ is from high (1) to low (0). The major failing of edge triggered interrupts\
    \ is that noise may be misinterpreted or interrupts may be missed altogether.\
    \ Modern hardware really solves this problem using interrupt status registers.\
    \ These should be scanned by well-implemented device drivers to check that there\
    \ are no missed interrupts. Level triggered interrupts transition the interrupt\
    \ request line to an active state (maybe high or low) and keep it until it receives\
    \ a command to go inactive. The main failing for level triggered interrupts is\
    \ handling of shared interrupt request line. If a lower level request is kept\
    \ level active, it is a problem to detect a request from another I/O device even\
    \ if it has a higher request level.\n\nWindows Embedded Compact 7 and its predecessors\
    \ need to provide OS services to handle these interrupts to allow the operating\
    \ system itself and processes to perform their purpose. A physical interrupt is\
    \ a signal arriving over a hardware line connected to the CPU, and the OEM Adaptation\
    \ Layer (OAL) implementation maps hardware assigned interrupts to logical interrupts\
    \ understood by the operating system to allow interrupt handling code to service\
    \ correctly each interrupt.\n\n## Interrupt Architecture\n\nThe interrupt model\
    \ for Windows Embedded Compact 7 is that all interrupts get vectored into the\
    \ kernel. Windows Embedded Compact 7 interrupt architecture tries to balance simplicity\
    \ with performance by splitting the interrupt processing into an extremely fast\
    \ (and \"lightweight\") Interrupt Service Routine (ISR) and a device driver provided\
    \ thread that processes the bulk of the interrupt processing. Because extended\
    \ processing in an ISR delays the servicing of other interrupts and may result\
    \ in jitter the ISR does very little but acknowledges the interrupt and differs\
    \ most of the interrupt processing to the IST. Because the IST is scheduled like\
    \ any other thread in the system it is assigned a scheduling priority fitting\
    \ the priority of the interrupt that it serves. This greatly improves real-time\
    \ performance by reducing jitter and simplifies locking and scheduling by the\
    \ kernel.\n\nThe kernel component that handles all interrupts is the exception\
    \ handler. When an interrupt occurs, the CPU transfers control to the kernel exception\
    \ handler. The exception handler in turn calls the ISR which is registered to\
    \ handle the current interrupt. The ISR should return the interrupts logical interrupt\
    \ identifier, which it passes to the kernel as its return value. The kernel sets\
    \ an event associated with the logical interrupt, which causes an interrupt service\
    \ thread (IST) to be scheduled. Code in the IST is responsible for servicing the\
    \ device interrupt. The IST runs in the context of a thread in Device Manager\
    \ and is essentially a typical thread running at a high priority.\n\n## Interrupt\
    \ Processing\n\nThe diagram in Figure 8-1 shows the sequence of state transitions\
    \ on a timeline going from right to left. Starting with the arrival of the hardware\
    \ triggered interrupt all the way to completion of the interrupt processing and\
    \ releasing the blocked interrupt hardware to handle another incoming interrupt.\
    \ The following 5 steps are echoed in the diagram:\n\n1. Device raises registered\
    \ hardware interrupt\n2. Kernel gets exception, calls associated Interrupt Service\
    \ Routine (ISR)\n3. Interrupt Service Routine (ISR) quickly deals with pending\
    \ interrupt\n4. Interrupt Service Thread (IST) in driver is signaled to process\
    \ interrupt\n5. Interrupt Service Thread (IST) completes processing and\n\n*Figure\
    \ 8-1. Interrupt processing in Windows Embedded Compact 7*\n\n## The Interrupt\
    \ Service Routine - ISR\n\nISRs in WEC 7 must be small and fast because ISRs execute\
    \ with all interrupts turned off, they cannot call any kernel functions, they\
    \ cannot use any stack, and depending on the CPU architecture they may not even\
    \ use all of the registers. More than that, ISRs cannot cause any nested exception.\
    \ ISRs can return back to the kernel with a return value which either tells the\
    \ kernel that the interrupt has been handled so to speak by returning `SYSINTR_NOP`,\
    \ or asks it to schedule a specific IST by returning a `SYSINTR` corresponding\
    \ to it.\n\nThere two categories of Interrupt Service Routines acceptable for\
    \ WEC 7 based devices:\n\n- Interrupt handlers within the OAL created by the hardware\
    \ OEM that provide interrupt handlers for BSP device drivers.\n- Installable ISRs\
    \ developed if needed by ISVs for example; however the OEM has to provide support\
    \ within the OAL for chaining installable ISRs.\n\n## The OAL and Interrupt Handling\n\
    \nThe OEM Adaptation Layer (OAL) implementation provides the operating system's\
    \ kernel with access to the OEMs hardware. The OAL implementation contains a set\
    \ of more than a dozen functions to initialize, map, enable, and disable interrupts\
    \ and translate between interrupt request values and logical IDs. Hardware architectures\
    \ may support a single interrupt line handled by a single ISR for example the\
    \ ARM architecture where the OEM is responsible for implementing this single ISR\
    \ named `OEMInterruptHandler`. This function must be implemented specifically\
    \ for each ARM base SoC (System on Chip) as each such SoC has its own set of control\
    \ registers. Listing 8-1 shows such an implementation where repetitive code has\
    \ been shorthanded by \".....\" strings and profiling support has been removed.\n\
    \nOther hardware, exemplified by the x86 architecture where interrupts are handled\
    \ by a Programmable Interrupt Controller (PIC), have multiple ISRs for multiple\
    \ interrupts. In such cases the OAL does not implement the `OALIntrMapInit` function.\
    \ However, it is interesting to look at the actual ISR provided for the x86 platform\
    \ `PeRPISR` which is common for all x86 based devices. Listing 8-2 shows the x86\
    \ ISR where profiling and ILTiming support has been removed.\n\n*Listing 8-1.\
    \ OEMInterruptHandler implementation for the OMAP 35xx platform*\n\n```\nUINT32\
    \ OEMInterruptHandler(UINT32 ra)\n{\n    UINT32 irq = OAL_INTR_IRQ_UNDEFINED;\n\
    \    UINT32 sysIntr = SYSINTR_NOP;\n    UINT32 mask,status;\n\n    if (g_oalILT.active)\
    \ g_oalILT.interrupts++;\n\n    // Get pending interrupt\n    irq = INREG32(&s_intr.pICLRegs->INTC_SIR_IRQ);\n\
    \n    if (irq == IRQ_GPIO1_MPU)\n    {\n        // mask status with irq enabled\
    \ GPIO's to make sure only\n        // interrupts which generated by a new interrupt\
    \ is handled\n        status = INREG32(&s_intr.pGPIORegs[0]->IRQSTATUS1);\n  \
    \      status &= INREG32(&s_intr.pGPIORegs[0]->IRQENABLE1);\n        for (irq\
    \ = IRQ_GPIO_0, mask = 1; mask != 0; mask <<= 1, irq++)\n        {\n         \
    \   if ((mask & status) != 0) break;\n        }\n        OUTPORT32(&s_intr.pGPIORegs[0]->IRQSTATUS1,\
    \ mask);\n        OUTPORT32(&s_intr.pGPIORegs[0]->IRQSTATUS2, mask);\n       \
    \ OUTPORT32(&s_intr.pGPIORegs[0]->CLEARIRQENABLE1, mask);\n        OUTPORT32(&s_intr.pGPIORegs[0]->CLEARWAKEUPENA,\
    \ mask);\n        OEMEnableIOPadWakeup((irq - IRQ_GPIO_0), FALSE);\n    }\n  \
    \  else if (irq == IRQ_GPIO2_MPU)\n    {\n        status = INREG32(&s_intr.pGPIORegs[1]->IRQSTATUS1);\n\
    \        status &= INREG32(&s_intr.pGPIORegs[1]->IRQENABLE1);\n        for (irq\
    \ = IRQ_GPIO_32, mask = 1; mask != 0; mask <<= 1, irq++)\n        {\n        \
    \    if ((mask & status) != 0) break;\n        }\n        OUTPORT32(&s_intr.pGPIORegs[1]->IRQSTATUS1,\
    \ mask);\n        OUTPORT32(&s_intr.pGPIORegs[1]->IRQSTATUS2, mask);\n    }\n\
    }\n```"
