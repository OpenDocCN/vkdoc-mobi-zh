    \n**Figure 12-6.** *Running the DemoTest pass*\n\n### Designing Test\n\nDesigning\
    \ tests sounds a bit pompous, but it is way simpler than it sounds. The purpose\
    \ of testing a device driver is to make sure that it is robust and does not fail\
    \ when erroneous input comes its way.\n\nSince it is impossible to test for every\
