    \n第 7 章 ■ 流设备驱动精髓\n\n*图 7-5\\. 运行异步 IO 请求演示应用程序*\n\n## 内核模式设备驱动程序\n\n设备管理器将所有流设备驱动程序加载到内核空间，作为内核模式驱动程序运行，但那些在注册表中设置了\
    \ `DEVFLAGS_LOAD_AS_USERPROC` 标志的设备驱动程序除外。内核模式驱动程序提供最佳性能，因为它们可以使用 `coredll.dll`\
    \ 的内核版本（名为 `k.coredll.dll`）直接调用内核 API。\n\n内核模式设备驱动程序必须健壮，因为它们对内核数据结构和内核空间内存拥有无限制的访问权限。有缺陷的内核模式设备驱动程序可能会损坏内核内存，从而导致系统崩溃。内核模式设备驱动程序可以非常快速地同步访问用户缓冲区，因为用户内存是直接可用的。\n\
