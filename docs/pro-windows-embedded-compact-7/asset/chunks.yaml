  trans: "\n# `UDEVICE.EXE` – 用户模式进程  \n\n`UDEVICE.EXE` – 这是一个用于在用户模式下运行设备驱动程序的用户模式进程。\
    \  \n\n本章后面的“*Windows Embedded Compact 内核模式或用户模式下的设备驱动程序*”一节将更详细地讨论在用户模式下运行设备驱动程序的优缺点。\
    \  \n\n# Windows Embedded Compact 7 内存架构  \n\nWindows CE 6.0 和 Windows Embedded\
    \ Compact 7 采用一种虚拟内存模型，该模型将地址空间划分为内核和用户模式进程的独立区域（见图 1-4）。这种虚拟内存模型主要为内核以及一个进程免受其他进程干扰提供保护。这一点与通用操作系统并无不同。然而，与通用操作系统不同的是，Windows\
    \ CE 6.0 和 Windows Embedded Compact 7 的虚拟内存模型不提供用于交换内存页面的后备存储。  \n\n图 1-4 展示了内核和应用程序的两个独立虚拟内存区域及其起始地址的总体视图。\
    \  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\n![](img/index-25_1.png)\
    \  \n\n第一章 ■ Windows Embedded Compact 设备驱动程序开发基础  \n\n*图 1-4. Windows CE 6.0 和\
    \ Windows Embedded Compact 7 的虚拟内存模型*  \n\n## 内核空间虚拟内存  \n\nWindows CE 将内核虚拟内存空间划分为多个独立区域。图\
    \ 1-5 展示了内核虚拟内存空间的结构。Windows Embedded Compact 7 的新增功能是能够寻址超过 512 MB、高达 3 GB 的物理\
    \ RAM。但是，这需要 OEM 通过在 OAL 中实现此支持来启用。OEM 必须在`OEMRamTable`结构内描述扩展 RAM 区域，该结构定义了任何硬件平台可用的额外物理\
    \ RAM。OEM 需要提供`OEMRamTable`函数来访问`OEMRamTable`结构。  \n\n为了使`OEMRamTable`对内核和内核独立传输层\
    \ (KITL) 可用，OEM 必须将`OEMGLOBAL`的`pfnGetOEMRamTable`成员设置为指向`OEMGetOEMRamTable`函数。\
    \  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\n![](img/index-26_1.png)\
    \  \n\n第一章 ■ Windows Embedded Compact 设备驱动程序开发基础  \n\n*图 1-5. 内核空间虚拟内存结构*  \n\n\
    表 1-1 总结了内核空间虚拟内存中的区域并描述了它们的用途。  \n\n*表 1-1. 内核空间虚拟内存区域*  \n\n| 起始地址 | 结束地址 |\
    \ 名称 | 描述 |\n|---------------|-------------|------|-------------|\n| `xF000 0000`\
    \ | `xFFFF FFFF` | 系统陷阱区域 | CPU 特定的 VM 系统调用陷阱区域 |\n| `xC000 0000` | `xEFFF FFFF`\
    \ | 内核 VM | 内核的虚拟内存，CPU 特定。用于实现地址空间布局随机化 |\n| `xA000 0000` | `xBFFF FFFF` | 静态映射非缓存地址空间\
    \ | 用于绕过 CPU 缓存访问物理内存。 |\n| `x8000 0000` | `x9FFF FFFF` | 静态映射缓存地址空间 | 用于通过 CPU\
    \ 缓存访问物理内存。 |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\n![](img/index-27_1.png)\
    \  \n\n第一章 ■ Windows Embedded Compact 设备驱动程序开发基础  \n\n## 用户空间虚拟内存  \n\nWindows\
    \ Embedded Compact 将用户虚拟内存空间划分为两个主要区域，分别用于用户进程、共享 DLL 和内存映射文件。图 1-6 展示了用户虚拟内存地址空间的示意结构。\
    \  \n\n*图 1-6. 用户空间虚拟内存结构*  \n\n表 1-2 总结了用户空间虚拟内存中的区域并描述了它们的用途。  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n\n第一章 ■ Windows Embedded Compact 设备驱动程序开发基础  \n\n*表 1-2. 用户空间虚拟内存区域*  \n\n\
    | 起始地址 | 结束地址 | 名称 | 描述 |\n|---------------|-------------|------|-------------|\n\
    | `x7FF0 0000` | `x7FFF FFFF` | 保留保护区域 | 用户空间和内核空间之间的缓冲区。 |\n| `x7000 0000` |\
    \ `x7FEF FFFF` | 共享系统堆 | 内核与进程之间的共享堆。 |\n| `x60000000` | `x6FFFFFFF` | 内存映射对象\
    \ | 用于进程间通信的 RAM 支持映射文件，期望所有进程在同一虚拟地址映射视图。这是 Windows CE 共享内存空间。 |\n| `x4000 0000`\
    \ | `x5FFF FFFF` | 共享用户模式 DLL | DLL 从堆栈底部开始加载并向上移动。 |\n| `x0001 0000` | `x3FFF\
    \ FFFF` | 每个进程的 VM | 可执行代码和数据。 |\n| `x0000 0000` | `x0001 0000` | 保留用户数据 | 为用户数据分配的块\
    \ |\n\n# 输入/输出处理  \n\nWindows Embedded Compact 7 以及 Windows CE 6.0 提供嵌套中断，以提供低中断延迟并确保对最高优先级硬件设备中断的最小延迟。中断模型基于三个元素：\
    \  \n\n- **内核中断服务处理程序** – 最多可处理 64 个独立的硬件 IRQ 源。它确定中断优先级，调用挂钩到该中断的 ISR，然后设置与相关中断\
    \ ID 关联的事件，以调度关联的 IST。  \n- **中断服务例程 (ISR)** – ISR 在内核模式下挂钩到硬件中断请求 (IRQ)，它确认硬件并确定中断\
    \ ID。ISR 可以是静态的（即内置于`NK.EXE`中），也可以通过内核调用进行安装（链入）。  \n- **中断服务线程 (IST)** – IST\
    \ 为指定的中断 ID 执行设备特定服务，并且必须向硬件发出中断处理完成的信号。  \n\n## 中断处理  \n\n图 1-7 展示了 Windows Embedded\
    \ Compact 如何处理中断。  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\n\
    ![](img/index-29_1.jpg)  \n\n第一章 ■ Windows Embedded Compact 设备驱动程序开发基础  \n\n*图\
    \ 1-7. Windows CE 中的中断处理*  \n\n如图 1-7 所示，处理中断的过程分为五个步骤：  \n\n1. 设备触发注册的硬件中断  \n\
    2. 内核获取异常，调用关联的中断服务例程 (ISR)  \n3. ISR 快速处理待处理的中断  \n4. 驱动程序中的 IST 被触发以处理中断  \n\
    5. IST 完成处理  \n\n## ISR 和 IST  \n\nISR 和 IST 协同工作，以执行必要的输入/输出操作，同时最小化对其他处理任务的影响，并防止高优先级中断的丢失和延迟。这种交互主要是协调\
    \ ISR 和 IST 之间的线程执行。ISR 和 IST 总是成对工作——ISR 快速识别并屏蔽中断，而 IST 处理大部分工作并尽快重新启用中断。  \n\
    \nISR 和 IST 之间的交互涉及以下步骤：  \n\n1. IST 创建一个映射到相关`SYSINTR ID`的事件对象。事件对象是一种内核资源，`WaitForSingleObject`函数调用可以在其上等待，并在事件对象变为有信号状态后退出。`SYSINTR\
    \ ID`标识该事件对象。  \n2. ISR 将`SYSINTR ID`返回给内核中断服务处理程序，以便它在准备好时能够触发该事件对象。  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n\n![](img/index-30_1.png)  \n\n第一章 ■ Windows Embedded Compact 设备驱动程序开发基础\
    \  \n\n3. IST 通过`WaitForSingleObject`函数调用阻塞在该事件上，直到内核中断服务处理程序设置相关事件，从而解除 IST 的阻塞。\
    \  \n4. 解除 IST 阻塞时，如果该 IST 是优先级最高的可运行线程，它将立即被调度运行。  \n\n## 可安装 ISR 与中断共享  \n\n\
    可安装的 ISR 允许多个设备共享中断，并共享单个硬件平台中断请求 (IRQ)。本质上，共享中断触发一条由多个 IRQ 共享的中断线。为了操作系统能够处理这些\
    \ IRQ，必须链入多个 ISR 来处理共享中断。每个 ISR 依次确定它是否拥有该中断，如果是，则返回相关的`SYSINTR ID`以解除其关联 IST\
    \ 的阻塞。  \n\n图 1-8 说明了可安装的 ISR 如何共享一个中断以支持多个外围设备。  \n\n*图 1-8. 使用链入法实现共享中断*\n"
- fmt: '# An Installable ISR


    An Installable ISR is implemented in a DLL. A device driver can load the ISR into
    the kernel at runtime by using the `LoadIntChainHandler` function. The interrupt
    handler is unloaded by using the `FreeIntChainHandler` function. Chapter 8 “*Device
    Driver I/O and Interrupts*” provides more details about the use of `LoadIntChainHandler`
    and `FreeIntChainHandler` in a device driver.


    # Windows Embedded Compact Device Driver Model


    Windows Embedded Compact 7 implements a simple device driver model that distinguishes
    between native and stream interface device drivers.


    ## Native Windows CE Device Drivers


    Native drivers correspond to user input device drivers and display device drivers
    that are loaded into the Graphic, Windowing and Event System (GWES). Stream interface
    device drivers on the other hand adhere to the stream interface so that Device
    Manager, another kernel server, can manage these drivers.


    Figure 1-9 shows the Native Device Driver Model Interface.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-31_1.jpg)


    *Figure 1-9. Native Device Driver Model Interface*


    ## Stream Interface Device Drivers in Windows Embedded Compact


    The term *Stream Device Driver* can be misleading as it is often used for peripheral
    I/O hardware that processes a stream of data such as serial port device drivers.
    It might suggest that this type of device driver is not the right choice for block
    devices that refer to hardware managing chunks of data such as storage disks.
    However, stream interface device drivers in Windows Embedded Compact handle stream
    devices as well as block devices. For this reason, I strongly recommend using
    the term *stream interface* device driver, which means that the device driver
    has to expose a defined set of functions that allows applications to communicate
    with the device driver via the file system API.


    Figure 1-10 shows the Stream Interface Device Driver Model Interface.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-32_1.jpg)


    *Figure 1-10. Stream Interface Device Driver Model Interface*


    Device Manager loads kernel mode stream device drivers and manages them and their
    interfaces while loaded. When the Device Manager loads, it initially loads the
    I/O Resource Manager to enumerate a list of available resources from the registry.
    In addition Device Manager tracks interfaces advertised by drivers and supports
    searches for drivers based on a globally unique identifier (GUID). The section
    “Loading and Unloading Device Drivers” later in this chapter provides more details
    about the load process for stream interface device drivers.


    # Monolithic and Layered Device Drivers


    Both native and stream drivers can use either the monolithic or layered driver
    design as illustrated in Figures 1-9 and 1-10 in the previous sections. A monolithic
    driver relies on a single DLL to implement both the interface to the operating
    system and applications, and the logic to the hardware, while the layered driver
    architecture is based on model device driver (MDD) and platform device driver
    (PDD).


    Monolithic and layered device drivers have the following advantages and disadvantages:


    - **Monolithic device drivers** – Monolithic drivers might be the right choice
    if you want to avoid the additional function calls between MDD and PDD for performance
    reasons.

    - **Layered device drivers** – The layered architecture based on MDD and PDD is
    advantageous because it facilitates code reuse and the development of driver updates.
    It is therefore the preferred choice for many device driver developers.


    # Windows Embedded Compact Device Drivers in Kernel or User Mode


    Because Windows Embedded Compact is now a monolithic kernel architecture device
    drivers now can either be in kernel mode or in user mode. In kernel mode, device
    drivers have access to kernel resources. This presented security risks and has
    lead to a new type of device driver – user mode device drivers.


    Kernel mode device drivers are managed by Device Manager server library `DEVMGR.DLL`
    while user mode device drivers reside each in a user mode process named `UDEVICE.EXE`
    however still managed by Device Manager.


    ## Kernel Mode Device Drivers


    In Windows Embedded Compact kernel mode means access to kernel address space.
    However it has to be noted that when a user mode thread makes a system API call,
    since almost all system APIs are implemented in server libraries running in kernel
    mode thus the user mode thread runs in kernel mode.


    This has some bearing on kernel mode device drivers. If a kernel mode device driver
    receives a pointer to a user mode callback function, without the proper precaution
    such a callback function can access kernel mode calls and addresses even though
    it runs in a user mode thread. The proper precautions will be discussed later
    on in the book.


    Kernel mode device drivers are practically the same implementation wise as they
    were in previous versions of the OS, however the user mode device drivers do not
    have access to kernel data structures and resources and are hosted in special
    user mode processes that are created and communicate with a kernel reflector service
    to provide a secure method for the user mode device driver to perform their tasks.


    Kernel mode device driver are loaded into the kernel by either Device Manager
    or GWES, depending on their interface. Stream device drivers are loaded by Device
    Manager, `DEVMGR.DLL` and are managed by it. Native device drivers load into Graphic
    Windowing and Events subsystem, `GWES.DLL`. Kernel mode device drivers have full
    access to kernel data structures and kernel memory. Kernel mode device drivers
    link to `KCOREDLL` which is the kernel version of `COREDLL` to provide access
    to APIs.


    ## User Mode Device Drivers


    User mode means, that only user mode address space is available to the device
    driver, and this means that the device driver cannot directly perform any kernel
    mode calls or access kernel mode memory.


    User mode device drivers are managed by Device Manager however hosted in special
    user mode processes - `udevice.exe`. User mode device drivers have no kernel privileges
    and have no access to kernel structures or memory and cannot call kernel only
    APIs such as `VirtualCopyEx`. User mode device drivers improve stability because
    user mode device drivers are isolated from each other and have no access privileges
    to the kernel. User mode device drivers provide increased security because compromised
    user mode device drivers cannot crash the system because user mode privileges
    restrain a compromised driver. User mode device drivers offer better recoverability
    so the OS can recover after a driver crash and the driver can be restarted without
    rebooting.


    # Loading and Unloading Device Drivers


    Native and stream drivers only differ in terms of the APIs they expose. You can
    load both types of drivers during system startup or on demand. However, exactly
    how Windows Embedded Compact loads a device driver depends on the driver type.


    ## Loading Stream Interface Device Drivers'
