    \ 0;\nAdapter->Flags &= ~F_MP_ADAPTER_HARDWARE_ERROR;\nNICEnableInterrupt(Adapter);\n\
    Adapter->Flags &= ~F_MP_ADAPTER_RESET_IN_PROGRESS;\n\nexit:\nNdisDprReleaseSpinLock(&Adapter->RcvLock);\n\
    NdisDprReleaseSpinLock(&Adapter->SendLock);\nNdisReleaseSpinLock(&Adapter->Lock);\n\
    return(Status);\n```\n\n## 物理数据传输\n\n在上述所有示例中，我抽象地使用了局部函数来处理各类硬件 I/O 接口。所描述的微型端口函数为上层\
    \ NDIS 驱动程序提供了一个上层边缘接口，以便从微型端口驱动程序获取服务。然而，微型端口驱动程序仍需完成其\"驱动\"实际网络接口卡（NIC）的主要任务，即对硬件端口/寄存器进行数据读写和配置属性操作。它还需要处理用于事务数据的内存缓冲区。\n\
    \nNDIS 框架为微型端口驱动程序提供了一个与硬件交互的下层边缘接口。它提供了一组函数，供微型端口网络适配器（NIC）驱动程序用于访问 I/O 端口。这些调用提供了一个标准的可移植接口，支持面向\
    \ NDIS 驱动程序的多种操作系统。\n\n框架提供了用于映射端口、申请 I/O 资源，以及对已映射和未映射的 I/O 端口进行读写操作的函数。如果你决定自行实现端口映射和资源管理，NDIS\
    \ 框架提供了一组原始 I/O 端口接口函数，例如`NdisRawReadPortXxx`，其中`Xxx`表示端口的字节大小。但这些函数特定于基于端口 I/O\
    \ 的体系结构。\n\n对于内存映射 I/O 体系结构，NDIS 框架提供了一组函数，用于将 NIC 寄存器映射到系统内存：`NdisMMapIoSpace`\
    \ 用于将给定的设备 RAM 或寄存器的物理范围映射到系统空间的虚拟范围；同时提供了一组函数，例如`NdisReadRegisterXxx`，其中`Xxx`表示寄存器的字节大小。\n\
    \n## NDIS 内存管理辅助函数\n\n考虑到 NIC（网络接口卡）及其微型端口驱动程序的性能，我们必须意识到，当数据在 NIC 和计算机内存之间移动时会出现瓶颈。从网络接口卡将信息传输到计算机的两种最高效的方法是总线主控\
    \ DMA 和共享内存。提供总线主控 DMA 的 NIC 控制器会接管系统总线，将数据从 NIC 传输到内存位置，从而降低 CPU 负载。在共享内存方案中，要么\
    \ NIC 拥有自己的内存，系统处理器可以直接访问；要么 CPU 和 NIC 共享一块两者都可以直接访问的系统内存块。\n\n### 共享内存\n\nNDIS\
    \ 框架为微型端口驱动程序开发者提供了一组函数来实现共享内存方案。核心函数是`NdisMAllocateSharedMemory`。该函数同时提供驱动程序用于访问共享内存块的映射虚拟地址范围，以及网络适配器使用的`NDIS_PHYSICAL_ADDRESS`类型范围。此函数只能从`MiniportInitializeEx`入口点调用。共享内存的最大问题在于其大小。一方面，在网络流量较高的情况下，如果微型端口驱动程序共享内存资源不足，则无法维持高\
    \ I/O 吞吐量。\n"
- fmt: "共享内存空间用于存放设备可访问的数据缓冲区。因此，您可以尝试预估一些最大传输需求并设置共享内存大小来满足这些需求。但这会导致驱动程序映像体积过大，且资源使用率在大多数情况下非常低效。另一个问题是，如果\
    \ `NdisMAllocateSharedMemory` 因系统内存不足而无法分配请求的大小，则会导致驱动程序初始化失败。请注意，尽管内核模式驱动程序通常使用非缓存内存，但在这种情况下您应考虑使用缓存内存，因为非缓存内存是稀缺的，因此较大的内存分配应来自缓存内存。\n\
    \n## 散聚 DMA\n\n这是性能首选的内存方案。NDIS 在将数据缓冲区发送到微型端口驱动程序之前不会对其进行映射。相反，NDIS 为驱动程序提供了一个接口来映射网络数据。因此，微型端口驱动程序可以通过将小型或高度碎片化的数据包复制到具有已知物理地址的预分配缓冲区来优化其传输。这还避免了不必要的映射，从而提高了系统性能。NDIS\
    \ 可以安全地将多个缓冲区发送到微型端口驱动程序。这减少了对微型端口驱动程序的调用次数，从而提升了系统性能。最后，微型端口驱动程序可以将 SG 列表的内存作为传输描述符块的一部分进行预分配。因此，NDIS\
    \ 或微型端口驱动程序无需在运行时为 SG 列表分配内存。\n\nNDIS 框架提供了以下函数来处理散聚 DMA 事务：`NdisMAllocateNetBufferSGList`\n\
    \n总线主控微型端口驱动程序调用此函数以获取与 `NET_BUFFER` 结构关联的网络数据的散聚列表。\n\n`NdisMAllocateSharedMemoryAsyncEx`\n\
    \n微型端口驱动程序调用此函数来分配驱动程序与其总线主控 DMA NIC 之间共享的额外内存，通常是在微型端口驱动程序可用的 NIC 接收缓冲区不足时调用。\n\
    \n`NdisMRegisterScatterGatherDma`\n\n总线主控微型端口驱动程序从 `MiniportInitializeEx` 调用此函数以初始化散聚\
    \ DMA 通道。\n\n`NdisMDeregisterScatterGatherDma`\n\n总线主控微型端口驱动程序调用此函数以释放使用 `NdisMRegisterScatterGatherDma`\
    \ 函数分配的 DMA 资源。\n\n`NdisMFreeNetBufferSGList`\n\n总线主控微型端口驱动程序调用此函数以释放通过调用 `NdisMAllocateNetBufferSGList`\
    \ 函数分配的散聚列表资源。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 10\
    \ 章 ■ 网络驱动程序接口规范与网络设备驱动程序\n\n## NDIS 协议驱动程序\n\n协议驱动程序实现了 OSI 模型（图 10-4）的网络层和传输层。因此，它确保消息无差错、按顺序、无丢失或无重复地传递。此外，它还根据以下因素确定数据应采用的物理路径：\n\
    \n- 网络状况\n- 服务优先级\n- 其他因素，例如路由、流量控制、帧分段与重组、逻辑地址到物理地址的映射以及使用计费\n\n协议驱动程序与 NDIS\
    \ 通信以发送和接收网络数据。它在其下边缘实现并导出一组 `ProtocolXxx` 函数，并绑定到在其上边缘导出 `MiniportXxx` 接口的底层微型端口驱动程序。它必须在\
    \ `DriverEntry` 中分配驱动程序资源并注册所需的 `ProtocolXxx` 函数。要向 NDIS 框架注册 `ProtocolXxx` 函数和协议驱动程序，您必须设置\
    \ `NDIS_PROTOCOL_DRIVER_CHARACTERISTICS` 结构并调用 `NdisRegisterProtocolDriver`。\n\
    \nNDIS 协议驱动程序提供以下 `ProtocolXxx` 函数；最后两个函数用于发送和接收操作：\n\n`ProtocolSetOptions`\n\n\
    这是一个可选函数。它注册可选服务并可分配其他驱动程序资源。它调用 `NdisSetOptionalHandlers` 来覆盖其默认入口点。它与之前描述的 `MiniportSetOptions`\
    \ 函数非常相似，因此您目前完全可以不实现它。\n\n`ProtocolBindAdapterEx`\n\n这是一个必需函数。NDIS 框架调用此函数以绑定到底层微型端口适配器。在其实现中，应使用\
    \ `NdisAllocateNetBufferListPool` 创建发送和接收缓冲区列表池，然后调用 `NdisOpenAdapterEx` 函数来建立协议驱动程序与底层驱动程序之间的绑定。如果对\
    \ `NdisOpenAdapterEx` 的调用返回 `NDIS_STATUS_PENDING`，您应等待来自 `ProtocolOpenAdapterCompleteEx`\
    \ 的信号以指示完成。如果对 `NdisOpenAdapterEx` 的调用返回 `NDIS_STATUS_SUCCESS`，您可以继续调用 `NdisQueryAdapterInstanceName`\
    \ 来检索调用协议所绑定的物理网络适配器（或虚拟适配器）的友好名称。使用 `NDIS_BIND_PARAMETERS` 结构的 `CurrentMacAddress`\
    \ 字段，您可以检索媒体连接状态和 MAC 选项。\n\n`ProtocolUnbindAdapterEx`\n\n这是一个必需函数。它是 `ProtocolBindAdapterEx`\
    \ 函数的镜像；NDIS 框架调用 `ProtocolUnbindAdapterEx` 来释放驱动程序为特定绑定的网络 I/O 操作所分配的资源。此函数的实现必须调用\
    \ `NdisCloseAdapterEx` 函数来关闭与底层微型端口适配器的绑定。协议驱动程序不能使解绑定操作失败。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 10 章 ■ 网络驱动程序接口规范与网络设备驱动程序\n\n`ProtocolOpenAdapterCompleteEx`\n\n这是一个必需函数。这是\
    \ `NdisOpenAdapterEx` 函数的完成例程。此函数的实现简单地通知进行打开适配器调用 `NdisOpenAdapterEx` 的线程，以指示操作完成。\n\
    \n`ProtocolCloseAdapterCompleteEx`\n\n这是一个必需函数。与 `ProtocolOpenAdapterCompleteEx`\
    \ 函数类似，这是一个完成例程，但用于 `NdisCloseAdapterEx` 函数。此函数的实现简单地通知进行关闭适配器调用 `NdisCloseAdapterEx`\
    \ 的线程，以指示操作完成。\n\n`ProtocolNetPnPEvent`\n\n此函数对于支持即插即用和电源管理的协议驱动程序是必需的。实现根据通过\
    \ `NET_PNP_EVENT_NOTIFICATION` 结构传递的事件类型进行分支处理，并根据协议驱动程序的设计处理需要的内容。例如，它可以处理电源管理通知或重启通知。\n\
    \n`ProtocolUninstall`\n\n此函数是可选的。如果实现，此函数在协议驱动程序被卸载前执行清理工作。\n\n`ProtocolReceiveNetBufferLists`\n\
    \n如果为底层微型端口驱动程序实现了散聚 DMA，则此函数对于协议驱动程序是必需的。NDIS 框架在绑定的微型端口驱动程序调用 `NdisMIndicateReceiveNetBufferLists`\
    \ 函数后调用此函数。网络缓冲区列表仅适用于 NDIS 6.x 版本。如果 `ReceiveFlags` 参数中的 `NDIS_RECEIVE_FLAGS_RESOURCES`\
    \ 标志未设置，协议驱动程序将保留 `NET_BUFFER_LIST` 结构的所有权，直到它调用 `NdisReturnNetBufferLists` 函数。该函数的原型见清单\
    \ 10-12。\n\n*清单 10-12. `ProtocolReceiveNetBufferLists` 函数的原型*\n\n```\nVOID ProtocolReceiveNetBufferLists(\n\
    \    IN NDIS_HANDLE ProtocolBindingContext,\n    IN PNET_BUFFER_LIST pNetBufferLists,\n\
    \    IN NDIS_PORT_NUMBER PortNumber,\n    IN ULONG NumberOfNetBufferLists,\n \
    \   IN ULONG ReceiveFlags)\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 10 章 ■ 网络驱动程序接口规范与网络设备驱动程序"
  raw: 'shared memory space for device-accessible data buffers. So you may try to
    anticipate some maximum transfer demands and set the shared memory size to accommodate
    these. This would create a driver with a large image and a resource usage that
    is very inefficient most of the time. Another problem would be failure to initialize
    the driver, if ***NdisMAllocateSharedMemory*** fails to allocate the requested
    size due to insufficient system memory availability. Note that even though kernel
    mode drivers usually use uncached memory in this case you should consider cached
    memory because uncached memory is sparse and therefore larger allocations should
    be acquired from cached memory.


    Scatter Gather DMA


    This is the preferred memory scheme for performance. NDIS does not map the data
    buffer before sending it down to the miniport driver. Instead, NDIS provides an
    interface for the driver to map the network data. Because of this, miniport drivers
    can optimize the transmission of small or highly fragmented packets by copying
    them to a pre-allocated buffer with a known physical address. It also avoids mapping
    that is not required and therefore improves system performance. NDIS can send
    multiple buffers to the miniport driver safely. This results in fewer calls to
    miniport drivers and therefore improves system performance. Lastly, miniport drivers
    can pre-allocate the memory for an SG list as part of the transmit descriptor
    blocks. Therefore, NDIS or miniport drivers are not required to allocate memory
    for SG lists at run time.


    The NDIS framework provides the following functions to handle scatter gather DMA
    transactions: NdisMAllocateNetBufferSGList


    Bus-master miniport drivers call this function to obtain a scatter/gather list
    for the network data that is associated with a **NET_BUFFER** structure.


    NdisMAllocateSharedMemoryAsyncEx


    Miniport drivers call this function to allocate additional memory shared between
    the driver and its bus-master DMA NIC, usually when the miniport driver is running
    low on available NIC receive buffers.


    NdisMRegisterScatterGatherDma


    Bus master miniport drivers call this function from ***MiniportInitializeEx***
    to initialize a scatter/gather DMA channel.


    NdisMDeregisterScatterGatherDma


    Bus-master miniport drivers call this function to release DMA resources that were
    allocated with the


    ***NdisMRegisterScatterGatherDma*** function.


    NdisMFreeNetBufferSGList


    Bus-master miniport drivers call this function to free scatter/gather list resources
    that were allocated by calling the ***NdisMAllocateNetBufferSGList*** function.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ NETWORK DRIVER INTERFACE SPECIFICATION AND NETWORK DEVICE DRIVERS


    NDIS Protocol Driver


    A protocol driver implements the network and transport layers of the OSI model
    (Figure 10-4). As such it ensures that messages are delivered error-free, in sequence,
    and with no loss or duplication. In addition it determines the physical path that
    the data should take, based on the following:


    • Network conditions


    • Priority of service


    • Other factors, such as routing, traffic control, frame fragmentation and reassembly,
    logical-to-physical address mapping, and usage accounting


    A protocol driver communicates with NDIS to send and receive network data. It
    implements and exports a set of ***ProtocolXxx*** functions at its lower edge
    and binds to an underlying miniport driver that exports a ***MiniportXxx*** interface
    at its upper edge. It must allocate driver resources and register the required
    ***ProtocolXxx*** functions in ***DriverEntry***. To register the ***ProtocolXxx***
    functions and the protocol driver with the NDIS framework and you have to setup
    the **NDIS_PROTOCOL_DRIVER_CHARACTERISTICS**


    structure and call ***NdisRegisterProtocolDriver***.


    NDIS protocol drivers provide the following ProtocolXxx functions; the two last
    functions are for send and receive operations:


    ProtocolSetOptions


    This is an optional function. It registers optional services and can allocate
    other driver resources. It calls


    ***NdisSetOptionalHandlers*** to overwrite its default entry points. It is very
    much like the MiniportSetOptions function described previously so you may as well
    not implement it at all at present**.**


    ProtocolBindAdapterEx


    This function is a required function. The NDIS framework calls this function to
    bind to an underlying miniport adapter. In the implementation it should create
    send and receive buffer list pools using


    ***NdisAllocateNetBufferListPool*** and then call ***NdisOpenAdapterEx*** function
    to set up a binding between the protocol driver and an underlying driver. If the
    call to ***NdisOpenAdapterEx*** returns **NDIS_STATUS_PENDING** you should wait
    on a signal from ***ProtocolOpenAdapterCompleteEx*** that indicates completion.
    If the call to ***NdisOpenAdapterEx*** returns **NDIS_STATUS_SUCCESS** you may
    proceed by calling


    ***NdisQueryAdapterInstanceName*** to retrieve the friendly name of a physical
    network adapter (or a virtual adapter) to which the calling protocol is bound.
    Using the ***CurrentMacAddress*** field of **NDIS_BIND_PARAMETERS** structure
    you can retrieve media connect status and MAC options.


    ProtocolUnbindAdapterEx


    This is a required function. It is a mirror of the ***ProtocolBindAdapterEx***
    function; The NDIS framework calls ***ProtocolUnbindAdapterEx*** to release the
    resources that the driver allocated for network I/O


    operations that are specific to a binding. The implementation of this function
    must call the


    ***NdisCloseAdapterEx*** function to close the binding to the underlying miniport
    adapter. A protocol driver cannot fail an unbind operation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ NETWORK DRIVER INTERFACE SPECIFICATION AND NETWORK DEVICE DRIVERS


    ProtocolOpenAdapterCompleteEx


    This is a required function. This is a completion routine for ***NdisOpenAdapterEx***
    function. The implementation of this function simply signals the thread that made
    the call to open the adapter


    ***NdisOpenAdapterEx*** to indicate completion.


    ProtocolCloseAdapterCompleteEx


    This is a required function. Like the ***ProtocolOpenAdapterCompleteEx*** function
    this is a completion routine, but for ***NdisCloseAdapterEx*** function. The implementation
    of this function simply signals the thread that made the call to close the adapter
    ***NdisCloseAdapterEx*** to indicate completion.


    ProtocolNetPnPEvent


    This function is required in protocol drivers to support Plug and Play and Power
    Management.


    Implementation switches on the event type that is passed via the **NET_PNP_EVENT_NOTIFICATION**
    structure and processes what it needs by the design of the protocol driver. For
    example it can handle power management notifications or a restart notification.


    ProtocolUninstall


    This function is optional. If implemented this function performs cleanup before
    the protocol driver is 27.151 uninstalled.


    ProtocolReceiveNetBufferLists


    This is a required function for protocol drivers if scatter/gather DMA is implemented
    for the underlying miniport driver. The NDIS framework calls it after a bound
    miniport driver calls the


    ***NdisMIndicateReceiveNetBufferLists*** function. Net buffer list is only available
    for version 6.x of NDIS. If the **NDIS_RECEIVE_FLAGS_RESOURCES** flag in the ***ReceiveFlags***
    parameter is not set, the protocol driver retains ownership of the **NET_BUFFER_LIST**
    structures until it calls the ***NdisReturnNetBufferLists***


    function. The prototype for this function is in Listing 10-12.


    *Listing 10-12\. Prototype for ProtocolReceiveNetBufferLists function*


    **VOID ProtocolReceiveNetBufferLists(**


    **IN NDIS_HANDLE ProtocolBindingContext,**


    **IN PNET_BUFFER_LIST pNetBufferLists,**


    **IN NDIS_PORT_NUMBER PortNumber,**


    **IN ULONG NumberOfNetBufferLists,**


    **IN ULONG ReceiveFlags)**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ NETWORK DRIVER INTERFACE SPECIFICATION AND NETWORK DEVICE DRIVERS'
