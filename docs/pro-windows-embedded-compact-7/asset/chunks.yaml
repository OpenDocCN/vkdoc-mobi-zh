    ## About the Author


    Abraham (Avi) Kcholi holds a B.Sc. degree in Pure Mathematics from London School
    of Economics. He has developed time critical systems, GIS infrastructure components,
    and command and control systems for military and industrial automation based on
    Windows CE technologies since 1998 and Windows XP Embedded technologies since
    2004. Some of his projects include designing medical and GIS systems for military
    usage and creating the 2008 classroom materials for the SPARK initiative. Authored
    the preparation kit for MCTS examination 70-577 "Windows Embedded Standard 2009."


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## About the Technical Reviewer


    Valter Minute has been working on Windows CE since 1999 (version 2.12) and spends
    most of his time developing drivers and BSPs. He is a trainer for Windows CE 5,
    6 and 7. He also participated in the development of the official Windows Embedded
    Compact 7 training materials. Valter is a Windows Embedded MVP since 2009 and
    has a blog about embedded computing and Italian cooking at `http://geekswithblogs.net/WindowsEmbeddedCookbook`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Acknowledgments


    This book is dedicated to embedded developers, especially Windows Embedded Compact
    developers. I had so many developers asking me for recommended reading on this
    subject of development for Windows CE (Windows Embedded Compact) since I started
    developing for the system back in 1999.


    Having developed BSPs and device drivers for so long and developed my own tool
    to help me with the development process I set out to write this book about the
    development process of Windows Embedded Compact device drivers, it is finally
    ready with much inspiration, patience, and help from my family, friends, and colleagues.


    First and foremost I have to thank my wife for putting up with me while I was
    in the process of writing this book. Without Sondra Weber''s encouragement this
    might not have happened. Many thanks to Ewan Buckingham of Apress, without whom
    this book would not have been published. Jessica Belanger who coordinated everything
    and Nancy Wright, Jonathan Hassel, Lori Cavanaugh, and last but definitely not
    least my friend Valter Minute who reviewed the book and provided invaluable insight.
    A special thank you to Kay Unkroth of Microsoft, for unloading on me his know-how
    with regard to authoring a technical book.


    Many, many thanks to Stephan Lauterbach who loaned me the TRACE 32 ICD for the
    chapter on debugging, and Rudi Dienstback who helped me out so kindly to understand
    the nuances of working with it. Special thanks to Yannick Chammings and Nicolass
    Besson of Adeneo for their help in migrating the Adeneo BSP for the TI OMAP 3530
    to Windows Embedded Compact 7 for the development board I had on loan from Variscite.
    When I went through the effort of understanding the Variscite board, Ohad Yaniv
    and Oren Rokach of Variscite provided me with the development platform and helped
    me to work with it on Windows Embedded Compact 7. To anyone I''ve forgotten to
    list: my apologies. Thanks to everyone who made it possible!


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Introduction


    Windows Embedded Compact 7 is really the latest version of Windows CE. Books dedicated
    to this operating system are relatively scarce. Windows CE turned into a proper
    RTOS when Windows CE 3.0 was launched. A few books were published, most notably
    by Douglas Boling and James Wilson. The first book concentrated on application
    programming and was updated for new versions of the system as these appeared.
    The second book was a comprehensive tutorial on the creation of Windows CE based
    systems. Recently, books by Samuel Phung and others continue with this trend of
    introducing developers of embedded systems to Windows CE. However authoring a
    book that is dedicated to one aspect of the system wasn''t challenged. Device
    drivers are at the core of embedded system development.


    Every computer system, be it a general purpose computer or an embedded computer
    system time critical or not, has to address three phases: data input, data manipulation,
    and data output. Embedded systems commonly go through all three phases without
    human intervention. Data input and data output have to be handled via peripheral
    I/O devices.


    This book endeavors to usher the reader into the development process of stream
    interface device driver model used in Windows Embedded Compact 7 and previous
    versions of Windows CE. The stream interface device driver model is the most commonly
    used in the Windows Embedded Compact (Windows CE) operating system. There are
    native device drivers for user interface input and display device drivers but
    most device driver developers use the stream interface driver model for their
    development needs.'
