    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ USING CTK TO DEVELOP TEST CODE


    The following example will demonstrate in a very simplified manner what this all
    means. For this example a very simple device driver that supports asynchronous
    I/O write request. The test should check that the driver provides what it is supposed
    to provide, asynchronous I/O write request. The test is designed to open the device
    driver and request a write operation using a device IOCTL code. Then if the call
    to **DeviceIoControl** retuned immediately and an I/O completion indication was
    provided afterwards the test should return a pass result. Otherwise it should
    return a fail result.


    In addition to the functionality test, a performance test is added and it compares
    the time it takes to complete the I/O request to a reference tick count. If it
    is equal or less than the reference tick count the performance test passes; otherwise
    it fails.


    TUX Test Harness


    The TUX test harness is a device-side client executable that loads device-side
    tests implemented as dynamic linked libraries and can perform tests either in
    standalone mode on the device or triggered by the CTK server described earlier.
    Tux.exe is an architecture-related device-side executable test engine that communicates
    with the development workstation CTK test server via core connectivity. This is
    a typical client/server architecture that provides many advantages, including
    the separation of GUI from the test engine with separate address spaces and a
    small footprint device side test engine.


    Implementing a TUX Test DLL


    Tests are implemented in dynamic link libraries test modules that are loaded into
    the test engine and provide two function prototypes, the ***ShellProc*** function
    which is responsible for handling the communications between the test engine and
    the test module. This function was left unmodified as there is really no need
    to modify it. The second function is a function that implements the test itself
    and has a specific prototype that has to be adhered to:


    **TESTPROCAPI TestProc(UINT uMsg, TPPARAM tpParam, LPFUNCTION_TABLE_ENTRY lpFTE)**
    You can implement as many test functions in a module as you designed for. Platform
    Builder provides an application wizard to create a skeleton TUX test DLL implementation
    that can be regarded as a jumpstart implementation for your test module. The Device
    Driver Wizard provides a similar capability but it renames the module name and
    customizes the initial TUX function table. Figure 12-7


    shows the Device Driver Wizard’s CTK support panel.


    The implementation of a test is really an implementation that you would develop
    for an application that opens the device driver and requests the driver to perform
    an action. The example in Listing 12-1


    does just this. The device driver being tested provides support for asynchronous
    write request just like in the example in Chapter 7\. The test function code is
    very similar to the example demonstration application that was described in Chapter
    7\. The **TestProc** function simply calls another function that implements the
    test code and returns a Boolean indicating success or failure and logs results
    using Kato and returns test status to CTK.


