    \ can be undecorated; for example, `Open`, `Close`, etc. This does not preclude\
    \ a prefix entry in the device driver’s registry settings. For example, the battery\
    \ driver's registry settings still must include a prefix even if the entry point\
    \ names are undecorated.\n\nYour implementations of these entry points must be\
    \ declared for export from your DLL by providing a module definition file. If\
    \ you are developing in C++, your entry points must also be declared `extern \"\
    C\"` to prevent function name mangling by the C++ compiler. The following table\
    \ shows the entry points for the stream interface.\n\nThere are some notable changes\
    \ in Windows Embedded Compact 7, because Device Manager provides support for asynchronous\
    \ IO request. There is a new entry point that was not available before, and three\
    \ entry points accept a new parameter. This new parameter is a handle for an IO\
    \ request packet object.\n\n## `XXX_Cancel`\n\nThis function is new for Windows\
    \ Embedded Compact 7; it cancels all pending asynchronous I/O requests for the\
    \ specified device. In the above example the implementation is very simple. There\
    \ is not much cleaning up to do because when an application calls `CancelIo` or\
    \ `CancelIoEx`, Device Manager calls IO packet manager to clean everything up,\
    \ because it was IO packet manager that created IO packets, added them to a list\
    \ it manages, and all that is required of the device driver developer is to terminate\
    \ the I/O request handling thread and clean up the parameters structure for this\
    \ thread. Listing 7-4 shows an extremely simple implementation.\n\n**Listing 7-4.**\
