    Transport Layer


    This layer ensures that messages are delivered error-free, in sequence, and with
    no loss or duplication NDIS Miniport Driver


    A miniport driver implements the lower edge data link layer. It handles hardware-specific
    operations necessary to manage a network adapter. The physical NIC type influences
    the miniport driver adapter.


    • Bus master DMA NIC - The miniport driver typically supports multi-packet sends
    and receives.


    • Subordinate DMA NIC - The miniport driver uses the system DMA controller to
    manage the transfer of packet data to and from the network.


    • Programmed I/O NIC - The miniport driver uses NDIS functions to move outgoing
    frames byte by byte, or other types to device registers and then causes the device
    to send the data. It is very rare these days to find such network cards and highly
    unlikely that you will implement such drivers.


    • Onboard shared memory NIC - The miniport driver must map the NIC''s shared memory
    to host memory and then copy outgoing packets to the NIC memory. It copies incoming
    frames from NIC memory to buffers that upper layer protocol drivers supply.


    NDIS miniport NIC driver communicates with its NIC and with higher-level drivers
