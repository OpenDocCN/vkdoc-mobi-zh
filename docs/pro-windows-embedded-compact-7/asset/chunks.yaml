- fmt: '# Scatter/Gather DMA


    `Scatter/gather DMA` is a shortcut method that sets up several packet `DMA` transfers
    at once. If you are transferring a packet over the network, for example, each
    part of the network stack adds its own header (`TCP`, `IP`, `Ethernet`, and so
    forth). These headers are all allocated from different places in memory.


    # System DMA


    `System DMA` is performed by programming the system `DMA controller` (`DMAC`)
    on the system board to perform the transfer directly. The `DMAC` acts as a very
    simple processor that is capable of moving a specified number of bytes between
    a peripheral device and main memory. At the start of an `I/O` operation the device
    driver will load into the `DMAC` a memory address and transfer count and the `DMAC`
    does the rest. When the `DMAC` has finished moving the data, it generates an interrupt
    to signal completion. While the `DMAC` transfers the data, the driver is suspended
    and the `CPU` is free to attend to other tasks. This was typical `DMA` operation
    for the `ISA` bus. Modern peripheral devices mostly use `bus master DMA`.


    # Bus Master DMA


    An `I/O` device that has its own `DMAC` built in can take control of the data
    bus and initiate `DMA` operations. Full bus mastering implies that the `I/O` device
    is capable of performing more complex sequences of operations without `CPU` intervention.
    Drivers of `bus-master DMA` devices can use the following types of `DMA` support:


    - `Packet-based DMA` if the bus-master adapter allows the driver to determine
    when a `DMA` transfer operation is done and/or when to begin another transfer
    operation. `Packet-based DMA` is the basis for `Scatter/Gather DMA` operations.

    - `Common-buffer DMA` if the bus-master adapter does not provide a way for the
    driver to determine when a transfer operation will begin or complete, or if a
    single buffer area is used continuously or repeatedly for `DMA` transfers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 4 ■ MASTERING THE HARDWARE ENVIRONMENT


    **Note** A `DMAC` example: Chapter 8 of *System and Timer Configuration Developers
    Manual* should give you a good idea about the `DMA` controller architecture and
    operation.


    # PCI Bus


    `PCI` is the acronym for `Peripheral Component Interconnect`, which is a local
    bus *standard* developed by Intel. `PCI` is a 64-bit bus, though it is usually
    implemented as a 32-bit bus. It can run at clock speeds of 33 or 66 MHz. At 32
    bits and 33 MHz, it yields a throughput rate of 133 MBps. `PCI` is a synchronous
    bus architecture with all data transfers being performed relative to the system
    clock (`CLK`). Although it was developed by Intel, `PCI` is not related to any
    particular family of microprocessors.


    `PCI` implements a 32-bit multiplexed `Address` and `Data` bus. The multiplexed
    `Address` and `Data` bus allows a reduced pin count on the `PCI` connector that
    enables lower cost and smaller package size for `PCI` components. `PCI` bus cycles
    are initiated by driving an address onto the `AD[31:0]` signals during the first
    clock edge called the address phase. The address phase is signaled by the activation
    of the `FRAME#` signal. The next clock edge begins the first of one or more data
    phases in which data is transferred over the `AD[31:0]` signals.


    In `PCI` terminology, data is transferred between an initiator which is the bus
    master, and a target which is the bus slave. The higher speed of `PCI` limits
    the number of expansion slots on a single bus to at most four. To permit expansion
    buses with more than 3 or 4 slots, the `PCI SIG` has defined a `PCI-to-PCI Bridge`
    mechanism. `PCI-to-PCI Bridges` are `ASICs` that electrically isolate two `PCI`
    buses while allowing bus transfers to be forwarded from one bus to another. Each
    bridge device has a "primary" `PCI` bus and a "secondary" `PCI` bus. Multiple
    bridge devices may be cascaded to create a system with many `PCI` buses.


    **Note** `PCI Specifications`: A good source of understanding `PCI` is the `PCI-SIG`
    website [http://www.pcisig.com/home](http://www.pcisig.com/home)


