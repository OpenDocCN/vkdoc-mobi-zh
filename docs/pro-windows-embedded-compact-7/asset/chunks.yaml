    \ active device key\\r\\n\")));\n        VirtualFree(pDevContxt, sizeof(UMD_DEVCONTXT),\n\
    \                    MEM_DECOMMIT);\n        return dwRet;\n    }\n    RegCloseKey(hConfig);\n\
    \n    // We got here if all succeded so return the device context\n    // pointer\n\
    \    dwRet = (DWORD)pDevContxt;\n    return dwRet;\n}\n....\n....\nBOOL UMD_IOControl(DWORD\
    \ hOpenContext, DWORD dwCode,\n                   PBYTE pBufIn,\n            \
    \       DWORD dwLenIn, PBYTE pBufOut, DWORD dwLenOut,\n                   PDWORD\
    \ pdwActualOut, HANDLE hAsyncRef)\n{\n    PUMD_DEVCONTXT pDevContxt = (PUMD_DEVCONTXT)hOpenContext;\n\
    \    BOOL bRet = TRUE;\n    DWORD dwErr = 0;\n\n    // TODO: Add code to implement\
    \ IOCTL codes:\n    switch (dwCode)\n    {\n        case IOCTL_UMDEMODRVR_FOO1:\n\
    \            // Enter critical section if needed otherwise erase\n           \
