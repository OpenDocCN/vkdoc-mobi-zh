    ## 关于作者


    亚伯拉罕（阿维）·科霍利拥有伦敦政治经济学院纯数学理学学士学位。自 1998 年以来，他一直基于 Windows CE 技术，自 2004 年起基于 Windows
    XP Embedded 技术，为军事和工业自动化开发时间关键系统、GIS 基础设施组件以及指挥和控制系统。他参与的一些项目包括为军用设计医疗和 GIS 系统，以及为
    SPARK 计划创建 2008 年课堂教材。他还撰写了 MCTS 考试 70-577“Windows Embedded Standard 2009”的备考指南。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 关于技术审校


    瓦尔特·米纽特自 1999 年（版本 2.12）起便开始从事 Windows CE 相关工作，大部分时间用于开发驱动程序和 BSP。他是 Windows CE
    5、6 和 7 的培训师。他还参与了官方 Windows Embedded Compact 7 培训材料的开发。瓦尔特自 2009 年起成为 Windows
    Embedded MVP，并在`http://geekswithblogs.net/WindowsEmbeddedCookbook`上开设了一个关于嵌入式计算和意大利烹饪的博客。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 致谢


    本书献给嵌入式开发者，特别是 Windows Embedded Compact 开发者。自从我 1999 年开始为 Windows CE（Windows Embedded
    Compact）系统进行开发以来，有很多开发者向我询问关于这个开发主题的推荐读物。


    在长时间开发 BSP 和设备驱动程序，并创建了自己的工具来辅助开发过程之后，我着手撰写这本关于 Windows Embedded Compact 设备驱动程序开发过程的书籍，如今终于完成了。这离不开我的家人、朋友和同事给予的诸多灵感、耐心和帮助。


    首先也是最重要的，我要感谢我的妻子在我撰写本书期间对我的包容。没有 Sondra Weber 的鼓励，这本书可能无法完成。非常感谢 Apress 的 Ewan
    Buckingham，没有他这本书就无法出版。感谢协调一切的 Jessica Belanger，以及 Nancy Wright、Jonathan Hassel、Lori
    Cavanaugh，最后但同样重要的是我的朋友 Valter Minute，他审校了本书并提供了宝贵的见解。特别感谢微软的 Kay Unkroth，倾囊相授了撰写技术书籍的经验。


    非常感谢 Stephan Lauterbach 借给我 TRACE 32 ICD 用于调试章节，以及 Rudi Dienstback 如此热心地帮助我理解使用它的细微之处。特别感谢
    Adeneo 的 Yannick Chammings 和 Nicolass Besson，他们帮助将用于 Variscite 借给我的开发板的 Adeneo
    BSP 迁移到 Windows Embedded Compact 7。当我努力理解 Variscite 开发板时，Variscite 的 Ohad Yaniv
    和 Oren Rokach 提供了开发平台，并帮助我在 Windows Embedded Compact 7 上进行工作。对于任何我忘记提及的人：我深表歉意。感谢所有让这一切成为可能的人！


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 引言


    Windows Embedded Compact 7 实际上是 Windows CE 的最新版本。专门介绍此操作系统的书籍相对较少。当 Windows CE
    3.0 发布时，Windows CE 才真正成为一个合适的 RTOS。当时出版了几本书，其中最著名的是 Douglas Boling 和 James Wilson
    的著作。第一本书侧重于应用程序编程，并随着新版本系统的出现而更新。第二本书是关于创建基于 Windows CE 系统的全面教程。最近，Samuel Phung
    等人的书籍延续了这一趋势，向嵌入式系统开发者介绍 Windows CE。然而，撰写一本专门针对系统某个方面的书籍尚未有人尝试。设备驱动程序是嵌入式系统开发的核心。


    每个计算机系统，无论是通用计算机还是嵌入式计算机系统，无论是否时间关键，都必须处理三个阶段：数据输入、数据处理和数据输出。嵌入式系统通常无需人工干预即可完成这三个阶段。数据输入和数据输出必须通过外围
    I/O 设备来处理。


    本书旨在引导读者了解 Windows Embedded Compact 7 及之前版本的 Windows CE 中使用的流接口设备驱动程序模型的开发过程。流接口设备驱动程序模型是
    Windows Embedded Compact（Windows CE）操作系统中最常用的模型。存在用于用户界面输入的原生设备驱动程序和显示设备驱动程序，但大多数设备驱动程序开发人员使用流接口驱动程序模型来满足其开发需求。

