- fmt: '# Storage Mechanism


    The storage mechanism for data in the object store is transaction based. If power
    is interrupted while data is being written to the object store, Windows Embedded
    Compact 7 ensures that the store is not corrupted. It ensures this by either completing
    the operation when the system restarts or reverting to the last known good state
    before the interruption. For system files, including the registry settings, this
    can mean reloading the initial settings from ROM if a backup system for saving
    the current settings was not predefined.


    ## RAM-Based Registry


    The RAM-Based Registry stores all registry data within the object store. This
    is efficient in terms of speed and size in devices that have battery-backed RAM.
    Devices that do not power the RAM while turned off must back up the registry during
    power off and restore the registry when power is restored. The RAM-based registry
    is intended for use on devices that experience warm boot often, but rarely or
    never cold boot.


    ## Hive-Based Registry


    The Hive-Based Registry stores all registry data inside files, nicknamed hives,
    and these files can be stored on any file system. Consequently, the need for backup
    and restore operations on power off/on is removed, resulting in faster cold boot
    process. The hive-based registry is split into two hives: the system hive, which
    contains all system data, and the user hive, which contains all data pertinent
    to one particular user. A multi-user system will contain several user hives. A
    user’s hive will be mounted on logon and dismounted on logoff. The hive-based
    registry is intended for use on devices that cold boots often, but has no impact
    on warm boot. It is also useful on devices that require support for multiple users.


    A hive is treated as a single unit and is saved and restored as a single file.
    The system hive contains system settings that do not relate to any one user. The
    OEM selects the system hive file name and location. The system hive file is typically
    named `System.hv`, but location may vary.


    ---


    ## Summary


    The Windows Embedded Compact 7 registry is similar in its functional structure
    to the registry of the desktop and server Windows operating systems. However it
    is compact in comparison for obvious reasons. Unlike the registry implementation
    on other Windows OSs it supports two types; RAM-Based Registry and Hive-Based
    Registry.


    # Device Driver File Names


    In order for user mode applications to interact with device drivers, an application
    uses file system functions. The first thing an application has to perform is to
    get a handle to an instance of the device driver. It does this by calling `CreateFile()`
    and using the returned handle is then used by the application to call other functions
    such as `ReadFile()` or `WriteFile()` and Device Manager functions such as `DeviceIoControl()`.
    `CreateFile()` needs a file name for its first parameter, which means that a convention
    for device driver names is required. The naming convention falls under three device
    namespaces:


    - Three-letter prefix, followed by a number between 0 and 9, followed by a colon.

    - `$device` mount point, followed by a three-letter prefix representing the device,
    followed by a number.

    - `$bus` mount point, followed by the bus name, bus number, device number, and
    function number.


    ## Device File Namespace - Prefixes and Indexes


    The prefix consists of three uppercase letters that identify which device file
    name corresponds to a particular stream interface. The prefix is stored in a registry
    value called `Prefix`, which is located within the key for the driver. First,
    the prefix identifies all possible device file names that can access the stream
    interface driver. Second, the prefix tells the operating system what entry-point
    file names to expect in the stream interface DLL. For example, `DMO_Ini`, `DMO_Read`
    or `DMO_IOControl` entry points where the designated prefix is `DMO`. An index
    is a digit that follows the prefix. The index distinguishes between similar devices
    that the stream interface manages. By default, Device Manager indexes logically
    from 1 through 9, with 1 corresponding to the first device file name. When a tenth
    device file name is required, 0 is used as the index. For example, the typical
    code to open a device driver by the device file name prefix should be:


    ```

    CreateFile("DMO1:", ....

    ```


    ## Device File Namespace – Mount points


    There are two mount point namespaces; the `$device` mount point and the `$bus`
    mount point. These two namespaces support more than 10 instances of a device with
    the same three-letter prefix. Device Manager registers the file namespaces with
    the file system using `RegisterAFSEx()`. This allows file system to return handles
    for the device driver. While the prefix namespace and the device namespace return
    the same handle, the bus namespace returns a handle to the bus, function, and
    device, which means that access may be handled differently by the OS.


    Opening a device driver instance using the device namespace calls for the device
    name being a path string, composed of a backslash the `$device` space identifier
    backslash, and the device prefix followed by an index. For example:


    ```

    CreateFile(_T("\\$device\\DMO1)", ....

    ```


    Opening a device driver instance using the bus namespace calls for the device
    name being a path string, composed of a backslash the `$bus` space identifier
    backslash, followed by bus type name, underscore bus number, underscore device
    number and underscore function number.


    ```

    CreateFile(_T("\\$bus\\PCI_0_3_0)", ....

    ```


    # Load Sequence


    Since device drivers actually help the operating system interact with the underlying
    hardware platform, it is of the utmost importance that they will be loaded as
    soon as possible during the system boot process. The operating component that
    is responsible for loading and managing stream device drivers is Device Manager.
    If GWES is part of the operating system, it is responsible for loading native
    device drivers such as the display device driver, keyboard drivers, and so on.
    It is possible that a system may be designed to be headless and thus dispose of
    the GWES component. However Device Manager is required in any meaningful OS design.


    ## Loading Sequence of a Stream Device Driver'
  raw: 'The storage mechanism for data in the object store is transaction based. If
    power is interrupted while data is being written to the object store, Windows
    Embedded Compact 7 ensures that the store is not corrupted. It ensures this by
    either completing the operation when the system restarts or reverting to the last
    known good state before the interruption. For system files, including the registry
    settings, this can mean reloading the initial settings from ROM if a backup system
    for saving the current settings was not predefine.


    RAM-Based Registry


    The RAM-Based Registry stores all registry data within the object store. This
    is efficient in terms of speed and size in devices that have battery-backed RAM.
    Devices that do not power the RAM while turned off must back up the registry during
    power off and restore the registry when power is restored. The RAM-based registry
    is intended for use on devices that experience warm boot often, but rarely or
    never cold boot.


    Hive-Based Registry


    The Hive-Based Registry stores all registry data inside files, nicknamed hives,
    and these files can be stored on any file system. Consequently, the need for backup
    and restore operations on power off/on is removed, resulting in faster cold boot
    process. The hive-based registry is split into two hives: the system hive, which
    contains all system data, and the user hive, which contains all data pertinent
    to one particular user. A multi-user system will contain several user hives. A
    user’s hive will be mounted on logon and dismounted on logoff. The hive-based
    registry is intended for use on devices that cold boots often, but has no impact
    on warm boot. It is also useful on devices that require support for multiple users.


    A hive is treated as a single unit and is saved and restored as a single file.
    The system hive contains system settings that do not relate to any one user. The
    OEM selects the system hive file name and location. The system hive file is typically
    named System.hv, but location may vary.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ DEVICE DRIVER REGISTRY SETTINGS


    Summary


    The Windows Embedded Compact 7 registry is similar in its functional structure
    to the registry of the desktop and server Windows operating systems. However it
    is compact in comparison for obvious reasons. Unlike the registry implementation
    on other Windows OSs it supports two types; RAM-Based Registry and Hive-Based
    Registry.


    Device Driver File Names


    In order for user mode applications to interact with device drivers, an application
    uses file system functions. The first thing an application has to perform is to
    get a handle to an instance of the device driver. It does this by calling *CreateFile*
    and using the returned handle is then used by the application to call other functions
    such as *ReadFile* or *WriteFile* and Device Manager functions such as *DeviceIoControl*.
    *CreateFile* needs a file name for its first parameter, which means that a convention
    for device driver names is required. The naming convention falls under three device
    namespaces:


    • Three-letter prefix, followed by a number between 0 and 9, followed by a colon.


    • $device mount point, followed by a three-letter prefix representing the device,
    followed by a number.


    • $bus mount point, followed by the bus name, bus number, device number, and function
    number.


    Device File Namespace - Prefixes and Indexes


    The prefix consists of three uppercase letters that identify which device file
    name corresponds to a particular stream interface. The prefix is stored in a registry
    value called Prefix, which is located within the key for the driver. First, the
    prefix identifies all possible device file names that can access the stream interface
    driver. Second, the prefix tells the operating system what entry-point file names
    to expect in the stream interface DLL. For example, *DMO_Ini, DMO_Read* or *DMO_IOControl*
    entry points where the designated prefix is DMO. An index is a digit that follows
    the prefix. The index distinguishes between similar devices that the stream interface
    manages. By default, Device Manager indexes logically from 1


    through 9, with 1 corresponding to the first device file name. When a tenth device
    file name is required, 0


    is used as the index. For example, the typical code to open a device driver by
    the device file name prefix should be:


    **CreateFile("DMO1:", ....**


    Device File Namespace – Mount points


    There are two mount point namespaces; the $device mount point and the $bus mount
    point. These two namespaces support more than 10 instances of a device with the
    same three-letter prefix. Device Manager registers the file namespaces with the
    file system using *RegisterAFSEx*. This allows file system to return handles for
    the device driver. While the prefix namespace and the device namespace return
    the same handle, the bus namespace returns a handle to the bus, function, and
    device, which means that access may be handled differently by the OS.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ DEVICE DRIVER REGISTRY SETTINGS


    Opening a device driver instance using the device namespace, calls for the device
    name being a path string, composed of a backslash the $device space identifier
    backslash, and the device prefix followed by an index. For example:


    **CreateFile(_T("\\$device\\DMO1)", ....**


    Opening a device driver instance using the bus namespace, calls for the device
    name being a path string, composed of a backslash the $bus space identifier backslash,
    followed by bus type name, underscore bus number, underscore device number and
    underscore function number.


    **CreateFile(_T("\\$bus\\PCI_0_3_0)", ....**


    Load Sequence


    Since device drivers actually help the operating system interact with the underlying
    hardware platform, it is of the utmost importance that they will be loaded as
    soon as possible during the system boot process. The operating component that
    is responsible for loading and managing stream device drivers is Device Manager.
    If GWES is part of the operating system, it is responsible for loading native
    device drivers such as the display device driver, keyboard drivers, and so on.
    It is possible that a system may be designed to be headless and thus dispose of
    the GWES component. However Device Manager is required in any meaningful OS design.


    Loading Sequence of a Stream Device Driver'
