    # CHAPTER 5


    # Device Driver Registry Settings


    This chapter is all about the `Windows Embedded Compact 7` registry and how it
    relates to device drivers.


    A general discussion about the registry and its role in the system is followed
    by a thorough discussion of all device driver related registry topics, including
    how the OS loads device drivers; naming conventions of device drivers, so that
    applications can interact with device drivers via the file system; which keys
    are required to set by the developer of a device driver and which keys are optional;
    and how to setup registry entries for user mode device drivers, and how to put
    it all together in practical terms.


    In this chapter:


    - Understand how `Windows CE` OS loads device drivers

    - Understand the naming conventions for device drivers

    - Create the necessary files for the registry entries for a specific device driver


    ## Registry Overview


    The `Windows Embedded Compact 7` registry stores information about applications,
    drivers, user preferences, and other configuration settings. The registry is organized
    in a hierarchical system of keys and values. This hierarchy is similar to a folder
    hierarchy, and a key can contain values entries or other keys. Value entries are
    stored as name/value pairs. At the top of each folder tree hierarchy is the root,
    which is identified using a well-known constant value, or `HKEY`. `Windows CE`
    supports four root keys.


    The most relevant to the device driver developer is the `HKEY_LOCAL_MACHINE` root
    key where the hardware and driver configuration data is located. The structure
    of the `Windows Embedded Compact 7` registry is similar to the registries in other
    versions of Windows, and previous versions of `Windows CE`.


    ## Registry Types


    `Windows Embedded Compact 7` supports two different registry types: the `RAM-based
    registry` and the `hive-based registry`. `OEMs` can determine the registry type
    for their device, which will be transparent to either applications or users.


    A. Kcholi *P*, *ro Windows Embedded Compact 7* © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `Windows Embedded Compact 7` implements the `hive-based registry` by default.
    The applications is unaware of registry type, however it affects persistence,
    boot sequence, speed, memory usage on a target device, and the behavior of user
    profiles. User profile support is present in all file system configurations.


    ## The Object Store


    The object store in `Windows Embedded Compact 7` provides persistent storage for
    applications and related data even when the main power supply is lost, provided
    there is a backup power supply. One or more memory storage chips, which typically
    are nonvolatile `RAM` chips, compose the physical object store. The object store
    consists of three types of persistent storage:


    - File systems

    - Databases

    - A system registry'
