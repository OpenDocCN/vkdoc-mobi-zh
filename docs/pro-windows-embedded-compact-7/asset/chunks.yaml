    CHAPTER 2 ■ THE TOOLS OF THE TRADE


    *Figure 2-8\. OS image build phases and corresponding build tools*


    Command line build


    The command line build uses the build demo tool to jumpstart the whole build process.
    Build demo tool is a batch file that calls the master build tool cebuild.bat and
    when the first two phases are done it calls buildrel.bat and makeimage.exe to
    complete the build. You should be aware that Platform Builder IDE


    calls builddemo.bat with arguments as designated by the menu items that are selected
    by the user.


    Platform Builder documentation does a good job detailing all the possible options.
    You should review builddemo.bat as it is self-documented with good comments.


    Understanding the SYSGEN process


    SYSGEN phase is, as its name suggests, a system generation process where components
    are filtered and some are built to form the collection of components that will
    comprise the image of the selected OS


    design. SYSGEN.BAT is the tool that is effectively an extensible component dependency
    database in BAT


    file “code”. It sets xxx_MODULES and yyy_COMPONENTS variables for filtering. Runs
    NMAKE.EXE on MAKEFILE in CESYSGEN folder in each _DEPTREES folder, where the components
    are linked to the targets.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ THE TOOLS OF THE TRADE


    SYSGEN Filtering


    Filtering is done using @CESYSGEN comment tags to filter files based on component
    settings and is run from inside %__PROJROOT%\CESYSGEN\MAKEFILE. Filtering creates
    tag variables based on xxx_MODULES and yyy_COMPONENTS variables and generates
    CECONFIG.H for use with C pre-processor.


    For example:


    **EXAMPLE_MODULES=ExmpleDLL**


    **EXAMPLEDLL_COMPONENTS=Exmpl1 Exmpl2**


    generates:


    **EXAMPLE_MODULES_EXAMPLEDLL**


    **EXAMPLEDLL_EXMPL1**


    **EXAMPLEDLL_EXMPL2**


