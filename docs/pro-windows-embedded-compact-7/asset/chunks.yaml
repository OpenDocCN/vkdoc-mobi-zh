  raw: '• Use the volatile qualifier for registers - The volatile type qualifier declares
    an item whose value can be changed outside the control of the program in which
    it appears. The compiler disregards optimization settings and generates code for
    each assignment to, or reference of a volatile variable even if it appears to
    have no effect.


    • Use ‘C’ language structure overlays - This will enable access to all the device
    registers via a single pointer. This pointer is obtained by mapping the base physical
    address of the device to the virtual memory address space.


    • Use OS-defined macros for PORT and REGISTER access. For example


    READ_PORT_UCHAR or READ_REGISTER_UCHAR. There are similar macros for


    16- and 32-bit wide ports and registers.


    To understand it better let’s look at the TWSI example and use it. Table 2-1 tells
    us what registers TWSI employs and their system physical address offsets. As already
    mentioned I/O registers need to be mapped to the uncached memory. Because each
    architecture provides its own method to map uncached memory, Microsoft provides
    an architecture dependent OAL function for mapping physical address to uncached
    virtual memory; **OALPAtoUA**. To understand how it is implemented you can check
    the following files:


    • C:\WINCE700\PLATFORM\COMMON\SRC\INC\oal_memory.h


    • C:\WINCE700\PLATFORM\COMMON\SRC\ARM\COMMON\MEMORY\memory.c


    • C:\WINCE700\PLATFORM\COMMON\SRC\X86\COMMON\MEMORY\memory.c


    Having dealt with the technique of getting an uncached virtual pointer, let’s
    figure out what this pointer is supposed to point to. Remember the first rule?
    It is good practice to define some volatile types and use these to define our
    structure to define TWSI’s register set.


    **#define BASE_TWSI_REGS 0x40301680**


    ****typedef unsigned long UINT32, *PUINT32;**


    **typedef volatile UINT32 VUINT32, *PVUINT32;**


    ****typedef struct**


    **{**


    **VUINT32 IBMR; /* Bus monitor register */**


    **VUINT32 IDBR; /* Data buffer Register */**


    **VUINT32 ICR; /* Global Control Register */**


    **VUINT32 ISR; /* Status Register*/**


    **VUINT32 ISAR; /* Slave address register */**


    **} TWSI_REGS, *PTWSI_REGS;**


    Note that the base address offset of IBMR register, the first register of the
    TWSI device is 0x40301680


    as indicated in Table 2-1\. For example we can actually use it the following way:
    **PTWSI_REGS pTWSIRegs = (PTWSI_REGS)OALPAtoUA(BASE_TWSI_REGS);**


    ****// check if we are in read or write mode**


    **UINT32 status = pTWSIRegs->ISR & 0x00000001;**


    **……**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ MASTERING THE HARDWARE ENVIRONMENT


    There you have it, but wait, this is not right! We botched the address offset
    of ISR. Because as it stands ISR is the fourth register in a structure of long
    integers which means that it is offset by 12 bytes from IBMR (using for the sake
    of clarity the physical offsets) which is at 0x40301680 so it is pointed to 0x4030168C.


    However if we look at Table 2-1 again we notice that for some reason the hardware
    maker tells us that ISR address offset is at 0x40301698. Let’s look again at this
    table and fix the problem. The first thing we notice is that there is an offset
    of 8 bytes between each register of the TWSI device. So in order to create a structure
    that will allow us to overlay the memory mapped registers we need to add another
    long integer between each register. We add these and call them for clarity RESERVEx.
    Note however that because these are not really registers that we read from or
    write to, we need not qualify these as volatile.


    The following code example is now doing what it is supposed to do, and pTWSIRegs->ISR
    points to the ISR register correctly.


    **#define BASE_TWSI_REGS 0x40301680**


    ****typedef unsigned long UINT32, *PUINT32;**


    **typedef volatile UINT32 VUINT32, *PVUINT32;**


    ****typedef struct**


    **{**


    **VUINT32 IBMR; // Bus monitor register**


    **UINT32 RESERVED1; // addr. offset 0x84-0x88 no need for**


    **// volatile type**


    **VUINT32 IDBR; // Data buffer Register**


    **UINT32 RESERVED2; // addr. offset 0x8C-0x90 no need for**


    **// volatile type**'
