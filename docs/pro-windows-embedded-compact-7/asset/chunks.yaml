- fmt: "# Figure 7-10. Using Windows CE Device Driver Wizard to create a filter driver\n\
    \nA simplified basic implementation of the `Init` entry point, which is the only\
    \ function exposed by the filter driver, is seen in Listing 7-17. All it does\
    \ is create a new instance of the `FIRFilter` class, saves the pointer to the\
    \ next filter (which is really a pointer to our stream device driver), and returns\
    \ the pointer to the filter driver object.\n\n**Listing 7-17. A sample Init entry\
    \ to the filter driver.**\n\n```cpp\nextern \"C\" PDRIVER_FILTER FIRFilterInit(LPCTSTR\
    \ lpcFilterRegistryPath, LPCTSTR\nlpcDriverRegistryPath, PDRIVER_FILTER pNextFilter)\n\
    {\n    FIRFilter* pFIRFilter = NULL;\n    InitializeCriticalSection(&g_CriticalSection);\n\
    \    DEBUGMSG(ZONE_INIT,\n        (L\"FIRFilter: Creating new filter driver\n\
    for <%s>\\r\\n\",\n        lpcDriverRegistryPath));\n    EnterCriticalSection(&g_CriticalSection);\n\
    \    pFIRFilter = new FIRFilter(lpcFilterRegistryPath,\n        lpcDriverRegistryPath,pNextFilter);\n\
    \    if (!pFIRFilter)\n    {\n        DEBUGMSG(ZONE_ERROR,\n            (L\"FIRFilter:\
    \ Error, Unable to allocate memory. %s cannot be initialized\\r\\n\",\n      \
    \      lpcDriverRegistryPath));\n        goto done;\n    }\ndone:\n    pFIRFilter->pNextFilter\
    \ = pNextFilter;\n    LeaveCriticalSection(&g_CriticalSection);\n    return (PDRIVER_FILTER)pFIRFilter;\n\
    }\n```\n\nFollowing in Listing 7-18 is an example of `FIRFilter::FilterInit` entry\
    \ point implementation that uses the pointer to the stream device driver that\
    \ we saved to call into its `Init` entry point, in this case `TST_Init`.\n\nBe\
    \ careful not to implement a filter driver for a device driver that can have multiple\
    \ instances opened.\n\n**Listing 7-18. A sample FilterInit entry point**\n\n```cpp\n\
    DWORD FIRFilter::FilterInit(DWORD dwContext,LPVOID lpParam)\n{\n    DWORD dwRet\
    \ = 0;\n    m_initReturn = pNextFilter->fnInit(dwContext, lpParam,\n        this);\n\
    \    return m_initReturn;\n}\n```\n\n---\n\n# Chapter 7: The Essence of Stream\
    \ Device Drivers\n\n## User Mode Device Drivers\n\nUser mode device drivers run\
    \ in the context of a user mode process and are therefore restricted from calling\
    \ kernel-only APIs. User mode device drivers are loaded into a user mode device\
    \ driver host process called `udevice.exe`. This isolates the driver from the\
    \ system kernel, increasing overall stability at the expense of performance. Basically,\
    \ user mode device drivers are ordinary stream device drivers that have the `DEVFLAGS_LOAD_AS_USERMODE`\
    \ flag value added to the flags registry settings. User mode device drivers do\
    \ not have access to kernel mode memory and therefore have restrictions on the\
    \ kinds of pointers and asynchronous memory accesses they can perform.\n\nFigure\
    \ 7-11 shows a block diagram of how user mode device drivers interact with Device\
    \ Manager.\n\n*Figure 7-11. User mode device driver architecture*\n\n### Restrictions\
    \ on User Mode Device Drivers\n\nUser mode device drivers should not use embedded\
    \ pointers. The user mode device driver reflector will perform the marshalling\
    \ necessary for pointer parameters in function calls to be dereferenced. However,\
    \ the reflector is not able to marshal embedded pointers in a data structure,\
    \ so the user mode driver has to perform the necessary marshalling, which is tough.\
    \ For example, if the driver is called by a kernel mode component, the embedded\
    \ pointer would point to a kernel address which the user mode driver cannot access.\
    \ The portable solution to this problem is to ensure that all data is passed into\
    \ the driver in a single flat structure that does not contain pointers.\n\nUser\
    \ mode drivers should not be designed to implement asynchronous memory accesses\
    \ to client buffers. The reflector in the kernel will marshal the pointer parameter\
    \ during the synchronous call, but the buffer cannot be marshalled for asynchronous\
    \ access. User mode drivers can marshal embedded pointers for asynchronous use\
    \ themselves, but only if they point to user address space.\n\n## Implementing\
    \ a User Mode Device Driver\n\nImplementing a user mode device driver is no different\
    \ from implementing a kernel mode stream device driver. The main concern is to\
    \ remember the restrictions just discussed and deciding on the user mode host.\
    \ A user mode device driver is hosted by a user mode process `Udevice.exe`; however,\
    \ you can decide if you want your device driver to be hosted by its own host,\
    \ or be hosted by a host that contains a group of user mode device drivers. Once\
    \ this decision is taken, the only way for Device Manager to treat your device\
    \ driver as a user mode device driver is by setting the \"Flags\" key value to\
    \ include the `DEVFLAGS_LOAD_AS_USERPROC`. \n\nThe registry settings example in\
    \ Listing 7-19 is for a user mode device driver that will be hosted in its own\
    \ `Udevice` process. While the registry settings example in Listing 7-20 is for\
    \ a user mode device driver that will be hosted in a shared `Udevice` process.\
    \ The `\"ProcGroup\"` key in the latter signifies that it will be hosted by `Udevice`\
    \ process registered as process group 3, which is defined in the registry by Microsoft\
    \ (see Listing 7-21).\n\n**Listing 7-19. Registry settings for a user mode device\
    \ driver hosted by its own private Udevice process**\n\n```ini\n; Umdemodrvr driver\n\
    [HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\Umdemodrvr]\n\"Prefix\"=\"UMD\"\n\"DLL\"\
    =\"Umdemodrvr.DLL\"\n\"Order\"=dword:5\n\"DisplayName\"=\"Umdemodrvr driver\"\n\
    \"Flags\"=dword:10\n```\n\n**Listing 7-20. Registry settings for a user mode device\
    \ driver hosted by a shared Udevice process**\n\n```ini\n; Umdemodrvr2 driver\n\
    [HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\Umdemodrvr2]\n\"Prefix\"=\"UMD\"\n\"DLL\"\
    =\"Umdemodrvr2.DLL\"\n\"Order\"=dword:8\n\"DisplayName\"=\"Umdemodrvr2 driver\"\
    \n\"Flags\"=dword:10\n\"ProcGroup\"=dword:3\n```\n\n**Listing 7-21. Registry settings\
    \ for a shared Udevice process defined as process group 3**\n\n```ini\n; udevice.exe\
    \ running in default chamber, commonly elevated, for MS Drivers\n#define PROCGROUP_DRIVER_MSFT_DEFAULT\
    \ 3\n[HKEY_LOCAL_MACHINE\\Drivers\\ProcGroup_0003]\n\"ProcName\"=\"udevice.exe\"\
    \n\"ProcVolPrefix\"=\"$udevice\"\n```\n\nHowever, you can create your own process\
    \ group just as well, for example process group 4, the same way: `[HKEY_LOCAL_MACHINE\\\
    Drivers\\ProcGroup_0004]`.\n\n---\n\n## Loading and Initializing a User Mode Device\
    \ Driver\n\nLoading user mode device drivers starts the same way as any stream\
    \ device driver loading process.\n\nFigure 7-12 helps explain the process of loading\
    \ a user mode device driver. It shows the loading process progression in the upper\
    \ call stack, including the creation of the reflector; in the lower call stack\
    \ is the progression of the driver initialization process until the `xxx_Init`\
    \ entry point of the user mode device driver is called.\n\nNote that the red squares\
    \ in the figure actually start the process once `BusEnum` calls `ActivateDeviceEx`\
    \ to load the device driver. The first step is calling `LoadLib`, which triggers\
    \ either finding a running `Udevice` process (if our device driver is to run in\
    \ a shared host) or creating a new `Udevice` host process. This process now creates\
    \ a new reflector service for our device driver (this process occurs in the call\
    \ to `CreateReflector` in line 5 of the top block in the figure). The reflector\
    \ eventually loads the device driver DLL. If it loads successfully, the `Init`\
    \ function for the reflector triggers a call to the device driver `xxx_Init` entry\
    \ point. If the `Init` function of the device driver does not fail, the device\
    \ driver is active and running in the host `Udevice` process.\n\n*Figure 7-12.\
    \ Loading process of a user mode device driver*"
