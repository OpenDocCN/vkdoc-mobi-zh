    ## CHAPTER 5 ■ DEVICE DRIVER REGISTRY SETTINGS


    ### User Mode Driver Framework Registry Settings


    A user mode device driver is not different in its implementation than kernel mode
    drivers. After all a user mode device driver needs to perform the same task as
    a kernel mode device driver. Still, user mode device drivers are restricted and
    have to be loaded into special user mode hosts, and perform their tasks with the
    help of a kernel mode reflector. To allow Device Manager to figure out if a device
    driver is a user mode driver before it loads it, specific registry entries must
    indicate to Device Manager that a device driver is a user mode device driver.
    Two subkeys make the difference; the subkey telling Device Manager the driver
    is a user mode driver is the `Flags` subkey, assigned the value 10. The other
    subkey indicates to Device Manager in which user mode host to load the device
    driver, `UserProcGroup`. If this subkey is set, Device Manager will load the driver''s
    DLL into a user mode host that loads several drivers. Otherwise, Device Manager
    will launch the driver in a separate user mode host that its sole purpose is to
    load and manage this specific device driver. Listing 5-3 is an example of a user
    mode device driver that is loaded in a common user mode host.


    *Listing 5-3. Example of a user mode device driver registry entry*


    ```

    ; SIP

    [HKEY_LOCAL_MACHINE\Drivers\BuiltIn\SIP]

    "Prefix"="SIP"

    "Dll"="softkb.DLL"

    "Order"=dword:1

    "Index"=dword:0

    ;Flags==10 is DEVFLAGS_LOAD_AS_USERPROC

    "Flags"=dword:10

    "UserProcGroup"=dword:3 ; // default to group 3

    ```


    ### Creating a Registry Entry for a Device Driver


    Creating a registry settings entry for your device driver is not complicated,
    but needs some thought in advance. You must consider what is known in advance.
    For example information about I/O mapping and addresses, interrupt handling information,
    and so on. This knowledge assists in setting this information in the registry
    settings and saves code to set it up within the device driver code. This makes
    for robust and maintainable drivers, less code means less possible bugs, and having
    settings in an external file means easier maintenance for change or updating.


    ### Creating the Registry Settings File


    The registry files of the operating system are binary files that are created by
    the build system converting simple structured text files having the `.REG` file
    extension into OS registry files. The `.REG` files are structured to reflect the
    root key under which a key hierarchy is located. For example,


    ```

    [HKEY_LOCAL_MACHINE\Drivers\BuiltIn\DemoDriver]

    ```


    puts the `DemoDriver` registry settings under the `HKEY_LOCAL_MACHINE` root under
    built in device drivers.


    To create a registry parameter file for example for a device driver named `DemoDriver`,
    you need to create a simple text file and name it `"DEMODRIVER.REG"`. Next you
    can use any text editor to edit it and create your registry parameter file, or
    you can use the built in registry editor in Visual Studio. Figure 5-2 shows how
    the registry editor in Visual Studio looks after an empty text file named `"DEMODRIVER.REG"`
    is opened.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-93_1.jpg)


    ## CHAPTER 5 ■ DEVICE DRIVER REGISTRY SETTINGS


    ### Using the Registry Editor


    Using it is simple and you can add keys and values using the IDE. Just right-click
    on the root key, `HKLM` in this example and add the `Drivers` key go on to add
    the `BuiltIn` key and so on. Figure 5-3 shows the resulting `DemoDriver` registry
    settings and Listings 5-4 the resulting text file. One caveat with this editor
    is the resulting text file simply repeats the key hierarchy for each value so
    it may be "cleaned" for a streamlined look clarity of reading, and Listing 5-5
    the end result.


    *Figure 5-2. Using registry editor in Visual Studio*


    *Listing 5-4. Resulting source*


    ```

    [HKEY_LOCAL_MACHINE\Drivers\BuiltIn\DemoDriver]

    "Dll"="demodriver.dll"

    ```'
