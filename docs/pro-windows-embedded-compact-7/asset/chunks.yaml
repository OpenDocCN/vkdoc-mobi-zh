    # 现代实时系统与中断处理


    现代实时系统已从轮询输入转变为等待输入到达。这之所以成为可能，是因为硬件已大幅进步，从输入到达时刻到处理完成时刻之间的处理延迟已显著降低。如今的实时系统能够实现极小的中断延迟，更重要的是，这些系统能将抖动控制在可接受的水平。


    本章讨论了 Windows Embedded Compact 7 的中断模型，该模型与 Windows CE 6.0 基本相同，并且与 Windows CE
    5.0 等早期版本非常相似。一个由内核异常处理程序触发的、代码量极少的快速 ISR，以及由一个普通线程执行的延迟中断处理，该线程在处理完中断后应释放中断。这种线程可以被赋予与它所关联的中断请求级别相对应的调度优先级，从而实现一致且良好的实时性能。


    此外，为了增强实时性能，ISR 的执行可以被内核抢占，以允许更高中断请求级别的 ISR 在执行返回之前先执行完成。这被称为**嵌套中断**。这确保了关键 I/O
    设备的中断能够比非关键设备的中断得到更优先的服务。


    I/O 设备资源的访问方式有两种：要么将这些资源映射到系统内存，要么通过特殊的 CPU 指令进行访问（例如 x86 架构所支持的，将资源映射到特定的 I/O
    内存范围）。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 9 章：设备 I/O 控制处理


    应用程序通过文件系统 API 来访问流设备驱动程序。这实际上限制了设备驱动程序的接口能力。文件系统接口允许开发者执行的操作仅限于读取、写入或查找。这对于真正的文件
    I/O 来说是可行的，但流设备驱动程序虽然被视为文件，却截然不同。为了允许设备驱动程序传达其对其控制的外围设备执行的自定义操作，创建了一种特殊的操作模式。这种方法并非
    Windows Embedded Compact 7 或 Windows CE 所独有，它是 Win32 API 的一部分，并且自 1979 年以来一直是
    UNIX 及类 UNIX 系统的一部分。它允许流设备驱动程序通过调用 `DeviceIoControl` 函数来向应用程序传递自定义操作。该函数由设备管理器实现并公开，因此可以从用户模式应用程序内部调用。


    ## 本章内容


    - 什么是 IOCTL

    - 添加设备 IOCTL

    - 处理设备 IOCTL


    ## 什么是 IOCTL


    `IOCTL` 字面意思是输入输出控制。流设备驱动程序可以被视为代表物理设备的设备文件。物理设备用于输入、输出或两者兼有，因此内核中的设备驱动程序必须有一些机制来与用户模式进程进行通信。由于使用文件系统
    API 将流设备驱动程序作为文件打开，意味着我们可以使用文件系统 API `WriteFile` 将数据从用户模式应用程序发送到外围设备进行输出。然而，如果用户模式应用程序需要与同一个外围设备通信，目的不是为了发送数据，而是为了获取设备状态，会发生什么？这就是
    `IOCTL` 中“控制”部分的用武之地。它确实为用户模式应用程序提供了一种通过编程方式直接控制外围设备的方法。


    那么，从技术角度来看，`IOCTL` 到底是什么？`IOCTL` 是一个 32 位值，分为四个字段，构成一个唯一的系统 IOCTL：


    - **A. Kcholi** **P**，**《Windows Embedded Compact 7 专业版》** © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 设备类型 | 功能代码 | 请求 | 访问 | 方法


    ```

    31                    16  14             2   0

    ```

