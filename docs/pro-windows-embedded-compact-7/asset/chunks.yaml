  trans: "\n# 微型端口驱动程序入口点\n\n这是一组大多数由微型端口驱动程序要求实现的入口点，以便 NDIS 框架能够调用它们来执行框架本身或代表 NDIS\
    \ 协议驱动程序所需的各种任务。\n\n微型端口驱动程序必须实现这些入口点以确保稳定运行。\n\n## `DriverEntry`\n\n这是 NDIS 设备驱动程序（`NDIS.DLL`）被设备管理器加载并初始化后，由\
    \ NDIS 调用的第一个函数。该函数至少必须设置微型端口驱动程序的特征结构 `NDIS_MINIPORT_DRIVER_CHARACTERISTICS`，然后通过调用\
    \ `NdisMRegisterMiniportDriver` 向 NDIS 注册驱动程序。实现 `DriverEntry` 的示例如清单 10-1 所示。\n\
    \n```\nNDIS_HANDLE g_NdisMiniportDriverHandle = NULL;\nNDIS_HANDLE g_MiniportDriverContext\
    \ = NULL;\n\nNDIS_STATUS DriverEntry(IN PDRIVER_OBJECT DriverObject, IN PUNICODE_STRING\
    \ RegistryPath)\n{\n    NDIS_STATUS Status;\n    NDIS_MINIPORT_DRIVER_CHARACTERISTICS\
    \ MPChar;\n\n    // 填写微型端口特征结构\n    NdisZeroMemory(&MPChar, sizeof(MPChar));\n\
    \n    MPChar.Header.Type = NDIS_OBJECT_TYPE_MINIPORT_DRIVER_CHARACTERISTICS;\n\
    \    MPChar.Header.Size = sizeof(NDIS_MINIPORT_DRIVER_CHARACTERISTICS);\n    MPChar.Header.Revision\
    \ = NDIS_MINIPORT_DRIVER_CHARACTERISTICS_REVISION_1;\n\n    MPChar.MajorNdisVersion\
    \ = MP_NDIS_MAJOR_VERSION;\n    MPChar.MinorNdisVersion = MP_NDIS_MINOR_VERSION;\n\
    \    MPChar.MajorDriverVersion = NIC_MAJOR_DRIVER_VERSION;\n    MPChar.MinorDriverVersion\
    \ = NIC_MINOR_DRIVER_VERISON;\n\n    MPChar.SetOptionsHandler = MPSetOptions;\n\
    \    MPChar.InitializeHandlerEx = MPInitialize;\n    MPChar.HaltHandlerEx = MPHalt;\n\
    \    MPChar.UnloadHandler = MPUnload;\n    MPChar.PauseHandler = MPPause;\n  \
    \  MPChar.RestartHandler = MPRestart;\n    MPChar.OidRequestHandler = MPOidRequest;\n\
    \    MPChar.DevicePnPEventNotifyHandler = MPPnPEventNotify;\n    MPChar.ShutdownHandlerEx\
    \ = MPShutdown;\n    MPChar.CheckForHangHandlerEx = MPCheckForHang;\n    MPChar.ResetHandlerEx\
    \ = MPReset;\n\n    Status = NdisMRegisterMiniportDriver(DriverObject, RegistryPath,\n\
    \                                        (PNDIS_HANDLE)g_MiniportDriverContext,\n\
    \                                        &MPChar, &g_NdisMiniportDriverHandle);\n\
    \    return Status;\n}\n```\n\n## `MiniportSetOptions`\n\n目前，在 Windows Embedded\
    \ Compact 7 版本的 NDIS 中，不支持微型端口可选特征或烟囱卸载功能。因此，此函数的实现应不执行任何操作，仅返回 `NDIS_STATUS_SUCCESS`\
    \ 值。\n\n## `MiniportInitializeEx`\n\n在调用 `DriverEntry` 成功后，NDIS 框架会调用此函数。在清单 10-1\
    \ 的示例中，该入口点被命名为 `MPInitialize`，因此 NDIS 将调用此函数。\n\n此函数用于初始化硬件，并向 NDIS 框架注册微型端口适配器的属性和中断特征。清单\
    \ 10-2 是一个特定于 Windows Embedded Compact 7 的示例实现，已移除调试消息和其他调试处理。部分代码调用了初始化硬件和分配内存的本地函数。请注意，大多数代码用于设置\
    \ NDIS 框架结构，并调用 NDIS 函数来设置属性和中断等。\n\n> **实现说明** 采用 do-while 块是为了便于维护，因为跳出该块比从每个失败条件返回更容易。\n\
    \n```\nNDIS_STATUS MPInitialize(IN NDIS_HANDLE MiniportAdapterHandle,\n      \
    \                   IN NDIS_HANDLE MiniportDriverContext,\n                  \
    \       IN PNDIS_MINIPORT_INIT_PARAMETERS MiniportInitParameters)\n{\n    NDIS_STATUS\
    \ Status = NDIS_STATUS_SUCCESS;\n```\n"
