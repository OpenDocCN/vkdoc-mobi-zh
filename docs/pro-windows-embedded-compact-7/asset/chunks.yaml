  trans: "\nI/O 控制是一种允许用户模式应用程序向内核模式设备驱动程序发送自定义请求的机制。用户模式设备驱动程序也是如此。设备驱动程序的实现决定了它可以处理哪些\
    \ IOCTL。微软为各种设备驱动程序类别预定义了 IOCTL，因此如果您正在编写例如存储磁盘设备驱动程序这样的驱动程序，检查这些预定义的 IOCTL 是一个好习惯，因为您必须实现这些预定义的\
    \ IOCTL。您可以为您正在实现的设备驱动程序创建自定义的 I/O 控制代码，但请记住提供一个定义这些自定义 IOCTL 的头文件，以便应用程序开发者能够编译使用这些代码的程序。\n\
    \n`Device Manager` 公开了一个特殊函数 `DeviceIoControl`，供应用程序调用并传递 IOCTL 代码以及缓冲区，这些缓冲区可用于输入或输出，或者如果自定义\
    \ IOCTL 需要，也可以同时用于输入和输出。在 Windows Embedded Compact 7 中，此函数接受一个 `OVERLAPPED` 结构，以便您的设备驱动程序实现可以为这类\
    \ I/O 请求提供异步 I/O 支持。\n\n---\n\n## 第 10 章：网络驱动程序接口规范与网络设备驱动程序\n\n网络驱动程序接口规范（NDIS）是网络驱动程序架构的规范，它允许诸如\
    \ TCP/IP、Native ATM、IPX 和 NetBEUI 等传输协议与底层网络适配器进行通信。该规范的实现是一个用于开发网络设备驱动程序的应用程序框架。网络设备驱动程序为基于\
    \ Windows Embedded Compact 7 的设备提供对局域网和广域网的访问。基于 Windows Embedded Compact 的通信架构支持使用网络驱动程序接口规范（NDIS）框架实现的网络设备驱动程序，以及远程\
    \ NDIS（RNDIS）、NDISWAN、令牌环、Wi-Fi、IrDA 和蓝牙等技术。\n\n本章内容：\n- OSI 模型\n- NDIS 作为编程框架\n\
    - NDIS 微端口驱动程序\n\n## 概述\n\n网络允许大量计算机通过某种物理通信线路相互传输数据，当然我也听说过无线通信。显然这会带来一些障碍，因为大量数据会造成通信拥堵。一台计算机如何筛选数据，使其只接收发送给它的数据呢？这些问题大多通过分组交换网络解决了，即把数据分成小块，称为数据包，然后单独发送。\n\
    \n历史上，最大的进展发生在 20 世纪 80 年代初期。由美国国防部高级研究计划局（ARPA）资助，ARPANET 不断发展，而更广为人知的 ARPA 互联网协议\
    \ TCP/IP 已成为标准。图 10-1 显示了 TCP/IP 协议流程，其中网络接口层负责与物理网络进行帧交互，互联网层将数据包封装成互联网数据报并处理路由。传输层提供计算机之间的通信会话，应用层提供\
    \ API 供应用程序连接到传输层。\n\n*图 10-1. TCP/IP*\n\n这仍然给顶层和底层带来了沉重的实现负担，这促使了 ISO 开放系统互连（OSI）模型的形成（与\
    \ TCP/IP 的对比见图 10-2）。\n\n*图 10-2. 与 TCP/IP 相关的 OSI 模型*\n\nOSI 模型是 Windows Embedded\
    \ Compact 7 网络架构的基础。\n\n## NDIS\n\n网络驱动程序接口规范（NDIS）框架将网络硬件从网络驱动程序中抽象出来。NDIS 还规定了分层网络驱动程序之间的标准接口，从而将管理硬件的底层驱动程序从上层驱动程序（如网络传输协议）中抽象出来。NDIS\
    \ 维护着网络驱动程序的状态信息和参数，包括指向函数的指针、句柄、用于链接的参数块以及各种系统值。图 10-3 展示了 NDIS 框架与使用它的网络驱动程序之间的关系。\n\
    \n*图 10-3. NDIS 框架与网络驱动程序*\n\n## 网络设备驱动程序的层次\n\n在所有 Windows 操作系统版本中，网络驱动程序实现了紧邻物理通信介质之上的四个层次，如图\
    \ 10-4 所示。\n\n*图 10-4. 与 OSI 模型相关的网络设备驱动程序*\n\n### 物理层\n\n此层负责在物理介质上管理和接收、发送未经处理的原始比特流。物理层由网络接口卡（NIC）、其收发器以及\
    \ NIC 所连接的介质实现。\n\n### 数据链路层\n\n数据链路层由两个子层组成：\n\n- **LLC** - 逻辑链路控制\n  - LLC 子层提供数据帧从一个节点到另一个节点的无差错传输。\n\
    - **MAC** - 介质访问控制\n  - MAC 子层管理对物理层的访问，检查帧错误，并管理接收帧的地址识别。\n\n### 网络层\n\n此层根据以下因素确定数据应采用的物理路径：\n\
    - 网络状况\n- 服务优先级\n\n其他因素包括路由、流量控制、帧碎片整理与重组、逻辑地址到物理地址的映射以及使用计费。\n\n### 传输层\n\n此层确保消息按顺序、无差错地传送，且无丢失或重复。\n\
    \n## NDIS 微端口驱动程序\n\n微端口驱动程序实现数据链路层的下边缘。它处理管理网络适配器所需的硬件特定操作。物理 NIC 类型会影响微端口驱动程序适配器。\n\
    \n- **总线主控 DMA NIC** - 微端口驱动程序通常支持多数据包发送和接收。\n- **从属 DMA NIC** - 微端口驱动程序使用系统 DMA\
    \ 控制器来管理数据包数据与网络之间的传输。\n- **编程 I/O NIC** - 微端口驱动程序使用 NDIS 函数逐字节地将传出帧移动到设备寄存器，或执行其他类型的操作，然后使设备发送数据。如今这种网卡已经非常罕见，您也极不可能实现此类驱动程序。\n\
    - **板载共享内存 NIC** - 微端口驱动程序必须将 NIC 的共享内存映射到主机内存，然后将传出数据包复制到 NIC 内存。它将传入帧从 NIC 内存复制到上层协议驱动程序提供的缓冲区中。\n\
    \nNDIS 微端口 NIC 驱动程序通过 NDIS 框架（参见图 10-3）与其 NIC 和更高级别的驱动程序通信。NDIS 框架函数导出一整套函数，通常以\
    \ `Ndis` 为前缀，这些函数封装了微端口需要调用的所有操作系统函数。反过来，NDIS 微端口驱动程序必须导出一系列入口点，NDIS 框架会调用这些入口点，用于其自身目的，或代表更高级别的驱动程序访问微端口。\n\
    \n微端口驱动程序维护有关其能力和状态的信息，以及它所控制的 NIC 的信息。对象标识符（OID）是系统定义的常量，用于标识每种信息类型。\n\n### NDIS\
    \ 微端口驱动程序函数\n"
- fmt: "# Miniport Driver Entry Points\n\nThis is a set of entry points that are mostly\
    \ required by a miniport driver so that the NDIS framework can call into to perform\
    \ various tasks required by either the framework or on behalf of NDIS protocol\
    \ drivers.\n\nThe miniport driver is required to implement these entry points\
    \ for robust operation.\n\n## `DriverEntry`\n\nThis is the first function called\
    \ by NDIS after the NDIS device driver (`NDIS.DLL`) is loaded and initialized\
    \ by Device Manager. At the minimum this function must register the driver with\
    \ NDIS by calling `NdisMRegisterMiniportDriver` after setting the miniport driver’s\
    \ characteristic structure; `NDIS_MINIPORT_DRIVER_CHARACTERISTICS`. An example\
    \ for implementing `DriverEntry` is in Listing 10-1.\n\n```\nNDIS_HANDLE g_NdisMiniportDriverHandle\
    \ = NULL;\nNDIS_HANDLE g_MiniportDriverContext = NULL;\n\nNDIS_STATUS DriverEntry(IN\
    \ PDRIVER_OBJECT DriverObject, IN PUNICODE_STRING RegistryPath)\n{\n    NDIS_STATUS\
    \ Status;\n    NDIS_MINIPORT_DRIVER_CHARACTERISTICS MPChar;\n\n    // Fill in\
    \ the Miniport characteristics structure\n    NdisZeroMemory(&MPChar, sizeof(MPChar));\n\
    \n    MPChar.Header.Type = NDIS_OBJECT_TYPE_MINIPORT_DRIVER_CHARACTERISTICS;\n\
    \    MPChar.Header.Size = sizeof(NDIS_MINIPORT_DRIVER_CHARACTERISTICS);\n    MPChar.Header.Revision\
    \ = NDIS_MINIPORT_DRIVER_CHARACTERISTICS_REVISION_1;\n\n    MPChar.MajorNdisVersion\
    \ = MP_NDIS_MAJOR_VERSION;\n    MPChar.MinorNdisVersion = MP_NDIS_MINOR_VERSION;\n\
    \    MPChar.MajorDriverVersion = NIC_MAJOR_DRIVER_VERSION;\n    MPChar.MinorDriverVersion\
    \ = NIC_MINOR_DRIVER_VERISON;\n\n    MPChar.SetOptionsHandler = MPSetOptions;\n\
    \    MPChar.InitializeHandlerEx = MPInitialize;\n    MPChar.HaltHandlerEx = MPHalt;\n\
    \    MPChar.UnloadHandler = MPUnload;\n    MPChar.PauseHandler = MPPause;\n  \
    \  MPChar.RestartHandler = MPRestart;\n    MPChar.OidRequestHandler = MPOidRequest;\n\
    \    MPChar.DevicePnPEventNotifyHandler = MPPnPEventNotify;\n    MPChar.ShutdownHandlerEx\
    \ = MPShutdown;\n    MPChar.CheckForHangHandlerEx = MPCheckForHang;\n    MPChar.ResetHandlerEx\
    \ = MPReset;\n\n    Status = NdisMRegisterMiniportDriver(DriverObject, RegistryPath,\n\
    \                                        (PNDIS_HANDLE)g_MiniportDriverContext,\n\
    \                                        &MPChar, &g_NdisMiniportDriverHandle);\n\
    \    return Status;\n}\n```\n\n## `MiniportSetOptions`\n\nAt present there is\
    \ no NDIS support for miniport optional characteristic or chimney offload capabilities\
    \ in Windows Embedded Compact 7 version of NDIS. So the implementation of this\
    \ function should do nothing and just return a `NDIS_STATUS_SUCCESS` value.\n\n\
    ## `MiniportInitializeEx`\n\nThis function is called by the NDIS framework after\
    \ the call to `DriverEntry` returned successfully. In the example in Listing 10-1\
    \ this entry point is named `MPInitialize` therefore NDIS will call this function.\n\
    \nThis function initializes both hardware and registers the miniport adapter’s\
    \ attributes and interrupt characteristics with the NDIS framework. Listing 10-2\
    \ is an example of an implementation specific for Windows Embedded Compact 7 and\
    \ is stripped of debug messages and other debug handling. Some of the code calls\
    \ into local functions that initialize the hardware and allocate memory. Note\
    \ that most of the code sets up NDIS framework structures and calls into NDIS\
    \ functions to set attributes and interrupts and such.\n\n> **Implementation Note**\
    \ The do-while block is implemented for ease of maintenance because it is easier\
    \ to break out of the block than returning from each fail condition.\n\n```\n\
    NDIS_STATUS MPInitialize(IN NDIS_HANDLE MiniportAdapterHandle,\n             \
    \            IN NDIS_HANDLE MiniportDriverContext,\n                         IN\
    \ PNDIS_MINIPORT_INIT_PARAMETERS MiniportInitParameters)\n{\n    NDIS_STATUS Status\
    \ = NDIS_STATUS_SUCCESS;\n```"
