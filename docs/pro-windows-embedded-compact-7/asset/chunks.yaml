- fmt: '# Stream Device Drivers and Asynchronous I/O


    ## Overview


    Requests such as `ReadFile` were performed in a synchronous fashion. That is,
    an application called into `ReadFile` to read the device driver’s retrieved data,
    and waited until the read operation was completed before `ReadFile` returned.
    This also put extra difficulty on application developers porting applications
    from desktop Windows operating systems to Windows CE. Because the pointer to the
    `OVERLAPPED` structure was ignored, the developer had to set it to `NULL`. The
    `OVERLAPPED` structure in desktop Windows operating systems is used by developers
    to get I/O operation completion notification without having to wait for this operation
    to complete synchronously. This allows an application to continue its flow of
    logic, especially when there is a lengthy I/O operation. Figure 7-3 shows the
    difference between synchronous and asynchronous I/O request handling.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-118_1.png)


    CHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS


    *Figure 7-3. Asynchronous and synchronous I/O request handling*


    ## Motivation and Implementation Notes


    Not every device driver has to provide support for asynchronous I/O request handling.
    The only reason to add this capability to a device driver would be if the size
    of data transfers between the caller process and the device driver is so large
    that it would cause the caller process to be halted while a lengthy I/O request
    is being processed. This is the motivation you would have as a device driver designer
    to incorporate the extra complexity needed to support asynchronous I/O request
    handling.


    One of the said complexities is setting up threads to handle asynchronous I/O
    requests. Because such requests are initiated by the caller process, it passes
    an initialized `OVERLAPPED` structure to the device driver, which must respond
    correctly to multiple such requests, and therefore each such request needs to
    be handled separately. As tempting as it may be to use the IST as a handler for
    input requests, beware of this practice. The reason is that an IST is initialized
    during device driver initialization and has no information about the event object
    passed in the `OVERLAPPED` structure by the caller process. More than that, an
    IST is triggered by an interrupt caused by the peripheral hardware, and not as
    a result of a caller process request.


    The tasks of the IST are discussed in Chapter 8, and by no means take on the role
    of handling I/O requests by the caller process, because the caller process has
    no prior knowledge of hardware interaction with the device driver. Therefore,
    if the IST completed handling an interrupt request as initialized by the hardware,
    it is done. When a caller process requests to read this data, the device driver
    returns the data buffer to the caller. If the buffers are large enough to warrant
    asynchronous I/O request handling, the driver should create a dedicated thread
    for this request and terminate the thread on completion.


    The complexity of trying to avoid creating dedicated threads for asynchronous
    I/O requests outweighs the code required to implement these threads.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-119_1.png)


    CHAPTER 7 ■ THE ESSENCE OF STREAM DEVICE DRIVERS


    ## Implementing Asynchronous I/O Request Handling


    In Windows Embedded Compact 7, the Device Manager implementation has been extended
    to support this asynchronous mode of I/O handling. If a device driver is implemented
    to support it, an application can call `ReadFile` which will return immediately,
    while the device driver will launch the read I/O operation and Device Manager
    will set an event, created by the calling application and provided to the device
    driver by implementing the `OVERLAPPED` structure, to notify the application that
    the read operation has completed.


    The following flow diagram in Figure 7-4 shows how Device Manager processes the
    `OVERLAPPED` structure and passes the information to the device driver.


    *Figure 7-4. Asynchronous I/O call handling by Device Manager*'
