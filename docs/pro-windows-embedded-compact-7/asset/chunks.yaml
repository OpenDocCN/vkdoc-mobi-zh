- fmt: "### 文件头部注释与宏定义\n\n```c\n// this variable for device info ioctl handler.\n\
    LPCWSTR g_oalIoCtlPlatformType = L\"VDX\"; // changeable by\n// IOCTL\n\n// g_oalIoCtlPlatformOEM:\
    \ REQUIRED\n// The platform\\common implementation requires that we define\n//\
    \ this variable for device info ioctl handler.\nLPCWSTR g_oalIoCtlPlatformOEM\
    \ = L\"VDX\"; // constant, should've\n// never changed\n\n// g_pszDfltProcessorName:\
    \ REQUIRED\n// The platform\\common implementation requires that we define\n//\
    \ this variable for processor info ioctl handler.\nLPCWSTR g_pszDfltProcessorName\
    \ = L\"Vortex86DX\";\n\nstatic BOOL g_fPostInit;\n```\n\n### `OEMIoControl`：必需函数\n\
    \n`OEMIoControl` 提供通用的 I/O 控制码（IOCTL），用于 OEM 提供的信息。\n\n`OEMIoControl` 由平台/通用库提供，因此我们不应在\
    \ BSP 中实现它。\n\n---\n\n### `g_oalIoCtlTable`：必需数组\n\n平台/通用实现要求我们定义此变量，描述我们支持的 IOCTL。\n\
    \n```c\nconst OAL_IOCTL_HANDLER g_oalIoCtlTable[] = {\n    { IOCTL_HAL_REQUEST_SYSINTR,\
    \ 0, OALIoCtlHalRequestSysIntr},\n    { IOCTL_HAL_RELEASE_SYSINTR, 0, OALIoCtlHalReleaseSysIntr\
    \ },\n    { IOCTL_HAL_REQUEST_IRQ, 0, OALIoCtlHalRequestIrq},\n    { IOCTL_HAL_DDK_CALL,\
    \ 0, OALIoCtlHalDdkCall},\n    { IOCTL_HAL_DISABLE_WAKE, 0, x86PowerIoctl},\n\
    \    { IOCTL_HAL_ENABLE_WAKE, 0, x86PowerIoctl},\n    { IOCTL_HAL_GET_WAKE_SOURCE,\
    \ 0, x86PowerIoctl},\n    { IOCTL_HAL_PRESUSPEND, 0, x86PowerIoctl},\n    { IOCTL_HAL_GET_POWER_DISPOSITION,\
    \ 0, x86IoCtlGetPowerDisposition},\n    { IOCTL_HAL_GET_CACHE_INFO, 0, BSPIoCtlHalGetCacheInfo},\n\
    \    { IOCTL_HAL_GET_DEVICEID, 0, OALIoCtlHalGetDeviceId},\n    { IOCTL_HAL_GET_DEVICE_INFO,\
    \ 0, OALIoCtlHalGetDeviceInfo},\n    { IOCTL_HAL_GET_UUID, 0, OALIoCtlHalGetUUID},\n\
    \    { IOCTL_HAL_GET_RANDOM_SEED, 0, OALIoCtlHalGetRandomSeed},\n    { IOCTL_PROCESSOR_INFORMATION,\
    \ 0, x86IoCtlProcessorInfo},\n    { IOCTL_HAL_INIT_RTC, 0, x86IoCtlHalInitRTC},\n\
    \    { IOCTL_HAL_REBOOT, 0, x86IoCtlHalReboot},\n    { IOCTL_HAL_ILTIMING, 0,\
    \ x86IoCtllTiming},\n    { IOCTL_HAL_POSTINIT, 0, BSPIoCtlPostInit},\n    { IOCTL_HAL_INITREGISTRY,\
    \ 0, x86IoCtlHalInitRegistry},\n\n    // Required Termination\n    { 0, 0, NULL}\n\
    };\n```\n\n### `BSPIoCtlPostInit`：自定义函数\n\n`IOCTL_HAL_POSTINIT` 由内核调用，在 OAL 中实现，为\
    \ OEM 在其他进程启动前提供最后一次执行操作的机会。\n\n此处理程序在此处初始化 RTC 通用库的关键部分。\n\n```c\nBOOL BSPIoCtlPostInit\
    \ (\n    UINT32 code, VOID *lpInBuf, UINT32 nInBufSize,\n    VOID *lpOutBuf, UINT32\
    \ nOutBufSize, UINT32 *lpBytesReturned\n)\n{\n    if (lpBytesReturned) {\n   \
    \     *lpBytesReturned = 0;\n    }\n\n    RTCPostInit();\n\n    g_fPostInit =\
    \ TRUE;\n\n    return TRUE;\n}\n```\n\n---\n\n### 添加设备特定 IOCTL\n\nDDK 为开发者提供宏\
    \ `CTL_CODE`，用于定义系统唯一的 IOCTL。所有开发者都应使用此宏定义 IOCTL，以避免不同开发者定义的值重叠。该宏将四个字段设置到一个 32\
    \ 位值中：\n\n```c\n#define CTL_CODE( DeviceType, Function, Method, Access) ( \\\n\
    \    ((DeviceType) << 16) | ((Access) << 14) | ((Function) << 2) | (Method))\n\
    ```\n\n清单 9-4 是一个使用 `CTL_CODE` 为演示设备驱动程序定义 IOCTL 的示例。\n\n**Listing 9-4. Defining\
    \ IOCTLs**\n\n```c\n#ifndef __DEMODRVRSDK_H__\n#define __DEMODRVRSDK_H__\n\n#ifdef\
    \ __cplusplus\nextern \"C\"\n{\n#endif\n\n#include <winioctl.h>\n\n//\n```"
