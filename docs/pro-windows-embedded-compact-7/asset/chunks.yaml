    # The shorter scan chain on the databus allows instructions and data to be inserted
    into the core without the overhead of clocking the data around the entire periphery
    of the ARM processor core. For more information lookup the debug architecture
    reference books relevant to your CPU. The on-chip debug system will provide four
    basic features:


    - Read and write memory

    - Read and write the CPU registers

    - Single step and real time execution

    - Hardware breakpoints and trigger features


    > **Note:** `JTAG` (Joint Test Action Group) is the common name for the IEEE 1149.1
    Standard Test Access Port and Boundary-Scan Architecture. Initially devised for
    testing printed circuit boards using boundary scan and is still used for this
    application.


    Today `JTAG` is used for IC debug ports. In the embedded processor market, practically
    all modern processors support `JTAG`. Embedded systems development relies on debuggers
    talking to chips with `JTAG` to perform operations like single stepping and setting
    breakpoints.


    ## TRACE 32


    `TRACE32` is a good example of a hardware-assisted debugging tool. It provides
    a `JTAG` interface to the target device, namely the In Circuit Debugger (`TRACE32
    ICD`), and an IDE on the development workstation to control the device and perform
    debugging procedures. It provides debugging using high-level language code, assembler
    and mixed disassembled code. It provides on chip breakpoints and triggers. Of
    course it allows flash programming, and provides RTOS awareness, the latest support
    for Windows Embedded Compact 7 including the ability to debug multicore systems.
    For the device driver developer it provides display of internal and external peripheral
    on a logical level.


    To help make the debugging process automatic, a script language allows scripting
    a sequence of commands to run the debug session up to the point where you want
    to start your debugging.


    Hardware assisted debugging is invaluable when developing the BSP. Without it
    is practically impossible to debug a boot loader for example. “Give me a place
    to stand on, and I will move the Earth” Archimedes is said to have observed of
    the lever. Well, hardware assisted debugging is this lever.


    When it comes to device drivers, it is extremely helpful to have the ability to
    logically view the hardware, represented by its registers (ports). Debugging Ethernet
    device drivers for the bootloader can be performed only using tools like `TRACE32`,
    because the boot loader does not provide NDIS support and you have to implement
    the NIC interface from scratch.


    ## Automating the Debugging Procedure


    While it is possible to use the `TRACE32` IDE to set commands individually using
    the command interface which is located at the bottom of the window as seen in
    Figure 11-8, however it is far more efficient to create a scripted batch file
    that is run by the IDE to perform all of these required commands in sequence without
    the need to enter each command individually. The bottom part of the main window
    has four rows; the top row is a command line, the next is a message bar, below
    that are soft keys that act like shortcut buttons for commands that are entered
    into the command line, and the bottom one is a status bar.


    So for example if we need to set CPU type you would enter the command, in this
    case `TRACE32` provides a list of reference CPUs it supports.


    ```

    SYStem.CPU DM3730

    ```


    And then go on to set other commands in order to initialize the debugger you could
    write a batch file with the file extension `CMM` to run them in sequence. Listing
    11-6 is a sample batch file I modified from a sample batch file I received from
    Lauterbach to handle the specific board I was using. Truthfully, without `TRACE32`
    I would never have been able to migrate the WinCE 6.0 BSP created by Adeneo for
    the `OMAP3530` to Windows Embedded Compact 7 for the Variscite board. It is well
    commented and it can be used as a reference for creating similar batch files.


    *Listing 11-6. `Wince74SOM37.cmm` ICD script file*


    ```bash

    ;--------------------------------------------------------------------------

    ;

    ; Windows Embedded Compact 7 Demo for TRACE32 RTOS Debugger

    ;

    ; This batch file demonstrates the use of the RTOS Debugger for CE7

    ; The example is generated for an OMAP37xx Variscite board using an ICD.

    ; It will NOT run on any other board, but may be used as a template for others.

    ; The Windows CE image is downloaded via the ICD.

    ;

    ;--------------------------------------------------------------------------


    ; Starting WinCE example with TRACE32:

    ; - Start TRACE32

    ; - Power on the board

    ; - TRACE32: "do wince"

    ; - Start "application1.exe" on target via CMD


    ; For debugging with TRACE32 we recommend to disable demand paging

    ; by setting bit one of ROMFLAGS in PLATFORM\VAR_SOM37_EVM\FILES\config.bib


    &winceroot="C:\WINCE700" ; typically C:\WINCE700

    &reldir="&winceroot\OSDesigns\TinyOSDesign\TinyOSDesign\RelDir\VARSOM37_EVM__ARMv7_Debug"


    ; Debugger Reset

    winpage.reset

    area.reset

    WINPOS 55. 5. 120. 30.

    area

    print "resetting..."

    RESet


    ; Initializing Debugger

    print "initializing..."

    SYStem.CPU DM3730

    SYStem.JtagClock 5MHZ ; hardware dependent (see manual)

    SYStem.Option DACR ON ; give Debugger global write permissions

    TrOnchip.Set DABORT OFF ; used by OS for page miss!

    TrOnchip.Set PABORT OFF ; used by OS for page miss!

    TrOnchip.Set UNDEF OFF ; may be used by OS for FPU detection

    SYStem.Option MMUSPACES ON ; enable space ids to virtual addresses


    SYStem.Up

    SETUP.IMASKASM ON ; lock interrupts while single stepping

    ; start u-boot to initialize the board

    Go

    print "target setup..."

    wait 1.s

    Break


    ; load eboot

    ; for physical load address run viewbin -r ebootnand.bin to get everything you
    need

    ; see ROMOFFSET for offset to flash load address

    ; then load eboot to <phys. addr.> - <flash addr.>

    Register.RESet

    print "loading eboot..."

    Data.LOAD.EXE "&reldir\EBOOTNAND.bin" 0x87E00000-0x87E00000

    Register.Set PC 0x87E00000


    ; let eboot initialize everything

    Go

    print "running eboot..."

    wait 3.s

    Break


    ; Load the Windows CE image

    ; Use the next lines only to load the image into RAM using the debugger.


    print "loading Windows CE image..."

    ; Prepare for direct download: disable MMU!

    PER.Set C15:0x1 %Long data.long(c15:1)&~1 ; switch off MMU

    Register.Reset


    ; Download the image to physical address.

    Data.LOAD.EXE &reldir\nk.bin

    ; set PC to physical start address

    ; see config.bib NK RAMIMAGE or better still run viewbin -r nk.bin to get everything
    you need

    Register.Set pc 0x8C000000


    ; We''d like to see something, open a code window.

    WINPOS 0. 0. 77. 22.

    Data.List


    ; Declare the MMU format to the debugger

    ; table format is "WINCE6"

    ; skip root table (0)

    ; declare default translation for kernel

    MMU.FORMAT WINCE6 0 0x80000000--0x8fffffff 0x80000000

    ```


    Following are a few figures to demonstrate the debugging process initialized by
    this batch file.


    Figure 11-8 shows the flow of this batch file executing.


    *Figure 11-8. The area window displays the flow of execution of the batch file
    in Listing 11-6*


    *Figure 11-9. Window showing mixed code listing for OEMInit and breakpoints list*


