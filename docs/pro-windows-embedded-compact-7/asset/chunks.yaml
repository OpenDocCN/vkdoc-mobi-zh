    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    Next you must register your debug zones with the debug system. Since device drivers
    must be implemented within DLLs the registration must take place in the ***DllEntry***
    function. Listing 11-4 is a sample code of registering the device driver’s debug
    zones. Notice the call to DisableThreadLibraryCalls that effectively disables
    DLL_THREAD_ATTACH and DLL_THREAD_DETACH notifications. This helps reduce the initialization
    code of the device drivers’ DLL.


    *Listing 11-4\. Registering the device driver’s debug zones*


    **BOOL WINAPI DllEntry(HANDLE hinstDLL, DWORD dwReason, LPVOID lpvReserved)**


    **{**


    **switch(dwReason)**


    **{**


    **case DLL_PROCESS_ATTACH:**


    **{**


    **g_hInstance = hinstDLL;**


    **DEBUGREGISTER((HINSTANCE)hinstDLL);**


    **DEBUGMSG(ZONE_INIT,(_T("DMO!PROCESS_ATTACH: Process:** **0x%x, ID: 0x%x \r\n"),**


    **GetCurrentProcess(), GetCurrentProcessId()));**


    **DisableThreadLibraryCalls ((HMODULE)hinstDLL);**


    **return TRUE;**


    **}**


    **case DLL_PROCESS_DETACH:**


    **{**


    **DEBUGMSG(ZONE_INIT,(_T("DMO!PROCESS_DETACH: Process:** **0x%x, ID: 0x%x \r\n"),**


    **GetCurrentProcess(), GetCurrentProcessId()));**


    **}**


    **break;**


    **}**


    **return TRUE;**


    **}**


    Changing Debug Zones


    Following the code samples just presented means that you can debug code in the
    device driver that you assigned to initialization and de-initialization. What
    about debugging for example the ***DMO_Open***


    function? In this function debug messages will be output only if **ZONE_OPEN**
    zone is enabled. What if you want to change the initial debug zones that you created
    in code? One way would be to edit the code rebuild and place it in the image.
    This really is a time-consuming and wasteful procedure. You may use the IDE to
    launch the Debug Zones dialog box during the debugging session and select your
    device driver module and check the debug zones you want enabled. Figure 11-2 shows
    how to enable the **ZONE_OPEN** zone.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-209_1.jpg)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    *Figure 11-2\. Enabling the **ZONE_OPEN** zone during OS runtime*


