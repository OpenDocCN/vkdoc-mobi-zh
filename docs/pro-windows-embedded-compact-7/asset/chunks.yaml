    Chapter Summary


    Device driver in Windows Embedded Compact 7, as in previous versions of Windows
    CE, can be categorized in various ways. They can be categorized by the system
    component that loads them, by their use, by the memory space they reside in, or
    by how they are implemented. Native device drivers are loaded by the Graphics
    Windowing and Event System (GWES) while all other device drivers are loaded by
    Device Manager. Native device drivers are accessed by GWES and not by applications
    directly.


    Moreover native device drivers for these reasons expose a set of functions that
    GWES calls for. All other device drivers must uniformly expose a stream device
    interface so that Device Manager can access them on behalf of applications that
    require their services. All native device drivers being loaded by GWES


    therefore reside in the kernel, while stream device drivers loaded by Device Manager
    can either reside in the kernel or in special user mode hosts launched by Device
    Manager.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ UNDERSTANDING DEVICE DRIVER TYPES


    In this chapter we discussed topics related to device driver types and device
    driver notifications, including:


    • Native device drivers


    • Stream device drivers


    • Monolithic and layered device driver implementation


    • Device interface classes


    • Device interface notifications


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 7**


    ****The Essence of**


    **Stream Device Drivers**


    Stream interface device driver are the most frequently developed device drivers
    for Windows Embedded Compact 7 as it is for earlier versions of Windows CE. Stream
    device drivers are loaded and managed by Device Manager and provide a well-known
    unified interface. Therefore, it allows user mode applications to access stream
    interface device drivers’ services. User mode applications use file system APIs
    such as *CreateFile* to open an instance of a stream interface device driver and
    file I/O APIs to read or write data from and to the device. The stream interface
    can be found in kernel mode device drivers as well as user mode device drivers
    and in this latest version of the operating system in filter device drivers.


    In this chapter


    • Stream interface device drivers


    • Kernel mode device drivers


    • Filter device drivers


    • User mode device drivers


    Stream Interface Device Drivers


    A stream interface driver is any device driver that exposes a well-known set of
    entry points that compose the stream interface functions. The stream interface
    does not imply that the hardware device controlled by such a device driver has
    to handle stream data, such as a serial communication port. Because block devices,
    such as storage disks, are implemented using the stream interface, the stream
    interface functions are designed to strongly match the semantics of the file system
    APIs such as *ReadFile*. As a result, stream interface device drivers are indirectly
    exposed to applications through the file system; applications interact with the
    driver by opening device drivers as special files in the file system.


    Device Manager translates application requests via the file system API into commands
    that are really calls to the related device driver entry points. The device driver
    encapsulates all of the information that is necessary to translate those commands
    into appropriate actions on the devices that it controls. All stream interface
    drivers, whether they manage built-in devices or installable devices, or whether
    they are A. Kcholi *P*


