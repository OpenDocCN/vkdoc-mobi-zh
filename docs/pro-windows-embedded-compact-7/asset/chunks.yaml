    driver, in turn, must export a set of entry points, that the NDIS framework calls
    for its own purposes or on behalf of higher-level drivers to access the miniport.


    A miniport driver sustains information about its capabilities and status, and
    information about the NIC that it controls. An object identifier (OID) is system-defined
