    \ - 正在被向上指示的 `Net Buffer` 列表的链表\n- `SendCompleteFlags` - 可通过 OR 操作组合的 NDIS 标志\n\
    \n## NDIS 中间层驱动程序\n\nNDIS 中间层驱动程序位于上层协议驱动程序和硬件级微型端口驱动程序之间。NDIS 中间层驱动程序应被视为一个分层微型端口驱动程序。分层微型端口驱动程序向上层协议驱动程序暴露微型端口接口，向下层\
    \ NIC 微型端口驱动程序暴露协议驱动程序接口。在分层微型端口驱动程序结构中，协议驱动程序与分层微型端口驱动程序底部的微型端口驱动程序进行通信。分层微型端口驱动程序在其上边缘导出\
    \ `MiniportXxx` 函数，在其下边缘导出 `ProtocolXxx` 函数。中间层驱动程序的微型端口接口可被称为虚拟微型端口。它是“虚拟”的，因为它不直接控制\
    \ NIC。相反，它依赖底层微型端口驱动程序与物理设备进行通信。图 10-5 说明了分层 NDIS 微型端口驱动程序架构。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-199_1.jpg)\n\n*图 10-5. 分层 NDIS 微型端口驱动程序与 NDIS 架构中其他驱动程序之间的关系*\n\
    \n以下示例说明了中间层驱动程序的各种用法：\n\n- 在旧版传输驱动程序与管理传输驱动程序未知媒体类型的微型端口驱动程序之间进行媒体转换\n- 用于安全或其他目的的数据过滤\n\
    - 负载均衡故障转移 (LBFO) 解决方案\n- 监控和收集网络数据统计信息\n\nNDIS 中间层驱动程序在其 `DriverEntry` 例程的上下文中注册其\
    \ `MiniportXxx` 函数和 `ProtocolXxx` 函数。要注册其微型端口函数，驱动程序必须将 `NDIS_MINIPORT_DRIVER_CHARACTERISTICS`\
    \ 结构中的 `Flags` 设置为 `NDIS_INTERMEDIATE_DRIVER` 标志，并调用 `NdisMRegisterMiniportDriver`\
    \ 函数。否则，设置 `NDIS_MINIPORT_DRIVER_CHARACTERISTICS` 的方式与任何其他微型端口驱动程序相同。要注册其 `ProtocolXxx`\
    \ 函数，中间层驱动程序必须调用 `NdisRegisterProtocolDriver` 函数。\n\n## 注册表设置\n\nNDIS 网络驱动程序的注册表设置围绕由设备管理器加载的\
    \ NDIS 设备驱动程序展开。NDIS 反过来负责加载和运行网络驱动程序。注册表允许 NDIS 加载驱动程序，然后调用其 `DriverEntry` 例程，并继续驱动程序的初始化和运行。微型端口驱动程序和适配器实例的注册表信息必须在\
    \ `HKEY_LOCAL_MACHINE\\Comm\\` 中进行配置。列表 10-14 是此类注册表信息的通用模板。\n\n*列表 10-14. NDIS\
    \ 微型端口驱动程序的通用注册表信息*\n\n```\n[HKEY_LOCAL_MACHINE\\Comm\\<MiniportDriverName>]\n\
    \"Group\"=\"NDIS\"\n\"ImagePatch\"=\"<driver>.dll\"\n\n[HKEY_LOCAL_MACHINE\\Comm\\\
    <AdapterInstanceName>\\Parms]\n\"BusNumber\"=dword:<busnumber>\n\"BusType\"=dword:<bustype>\n\
    <其他微型端口驱动程序所需的参数，例如 IRQ、IOAddr、TcpIP 等>\n```\n\n一个能很好说明这一点的具体示例是任何 NE2000 兼容适配器的注册表项设置。列表\
    \ 10-15 摘自 `common.reg`。\n\n*列表 10-15. NE2000 网络适配器的注册表信息*\n\n```\n[HKEY_LOCAL_MACHINE\\\
    Comm\\NE20001]\n;LOC_FRIENDLYNE2000COMPAT\n\"DisplayName\"=mui_sz:\"netmui.dll,#9001\"\
    \n\"Group\"=\"NDIS\"\n\"ImagePath\"=\"ne2000.dll\"\n\n[HKEY_LOCAL_MACHINE\\Comm\\\
    NE20001\\Parms]\n\"BusNumber\"=dword:0\n\"BusType\"=dword:8\n\"InterruptNumber\"\
    =dword:03\n\"IoBaseAddress\"=dword:0300\n\"Transceiver\"=dword:3\n\"CardType\"\
    =dword:1\n\n[HKEY_LOCAL_MACHINE\\Comm\\NE20001\\Parms\\Tcpip]\n\"EnableWINS\"\
    =dword:1\n```\n\n如果 NE2000 适配器是 PCI 总线适配器，则它必须在 `HKLM\\Drivers\\BuiltIn\\PCI\\\
    Template` 节点下拥有注册表信息条目。以下列表 (10-16) 是 NE2000 PCI NIC 的注册表信息：\n\n*列表 10-16. NE2000\
    \ 兼容 PCI 适配器的注册表信息*\n\n```\n[HKEY_LOCAL_MACHINE\\Drivers\\BuiltIn\\PCI\\Template\\\
    NE2000]\n\"Dll\"=\"NDIS.dll\"\n\"Class\"=dword:02\n\"SubClass\"=dword:00\n\"ProgIF\"\
    =dword:0\n\"VendorID\"=multi_sz:\"10ec\",\"1050\"\n\"DeviceID\"=multi_sz:\"8029\"\
    ,\"0940\"\n; \"Entry\"=\"NdisPCIBusDeviceInit\"\n\"Prefix\"=\"NDS\"\n; Flags==2\
    \ 是 DEVFLAGS_LOADLIBRARY\n\"Flags\"=dword:2\n\"Transceiver\"=dword:3\n```\n\n\
    值得记住的是，NE2000 不使用 `giisr.dll` 中的通用 ISR，而是加载自身的 `NE2000ISR.dll` 中的 ISR 来处理中断。\n\
    \n## 章节总结\n\n本章专门介绍网络驱动程序，重点放在网络适配器卡的驱动程序上。因此，对 NIC 微型端口驱动程序的强调多于对协议驱动程序或中间层驱动程序的强调。NIC\
    \ 微型端口驱动程序负责使用 NDIS 框架为开发人员提供的 API 来与硬件接口，以处理高性能网络硬件。它为驱动程序开发人员提供了使用分散/聚合 DMA\
    \ 接收和发送大量数据、执行内存映射 I/O 或端口映射 I/O 操作的函数。它提供了处理硬件信息、内务处理、中断和同步的函数。所有这些 API 都使得设备驱动程序能够跨操作系统移植，并降低了开发网络适配器驱动程序的难度。最后关于\
    \ NIC 设备驱动程序的说明是，您不能在引导加载程序中使用 NDIS 驱动程序，因为 NDIS 不是引导加载程序的一部分。这意味着支持引导加载程序的网络设备驱动程序必须在驱动程序代码中实现所有硬件接口。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 11 章**\n\n**调试设备驱动程序**\n"
- fmt: "# Debugging Device Driver\n\nCan you name a developer that can develop a bug-free\
    \ software unit excluding “Hello World” program? I thought not. The main reason\
    \ that the development cycle of software is such a lengthy process is errors in\
    \ the code implementation, better known as “bugs” (with “debugging” becoming the\
    \ word to describe the process of sieving these bugs out of the software). The\
    \ end result of the existence of bugs in software is that the executable will\
    \ fail at one time or another. The complexity of developing software that manages\
    \ hardware is directly accountable for bugs that are manifold more complex and\
    \ hard to fix. The most difficult bugs to fix are bugs that occur infrequently\
    \ and cannot be easily reproduced. These are usually the logical bugs rather than\
    \ the coding bugs. Kernel mode device drivers present the added danger of crashing\
    \ the system if failure occurs in their code.\n\nIn this chapter\n\n* Overview\
    \ of the available tools\n* Using the simplest tools\n* Debug zones\n* Kernel\
    \ debugger\n* Hardware assisted debugging\n* Post mortem debugging\n\n## Overview\
    \ of Debugging Tools and Techniques\n\nWriting robust code is the key to catching\
    \ and fixing bugs. Adding error handling code whenever there is a possibility\
    \ of an error occurring is not just good coding practice but is a must while writing\
    \ device driver code. Whenever you call an API check the return values and handle\
    \ error recovery. The same applies to code that manipulates memory and memory\
    \ pointers, as well as arithmetic computations that may fail, like the divide\
    \ by zero classic. Having said that, a variety of debugging tools are available\
    \ to debug device drivers because either coding bugs or logical bugs will still\
    \ be in the code (at least in my code there are).\n\nA. Kcholi  \n*Pro Windows\
    \ Embedded Compact 7*  \n© Abraham Kcholi 2011\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Debugging Techniques\n\nThe simplest of all debugging techniques is outputting\
    \ debug messages to a debug shell. This technique is extremely valuable for debugging\
    \ software such as device drivers. This technique is least intrusive as it does\
    \ not stop the execution and flow of the device driver. All Windows CE versions\
    \ including Windows Embedded Compact 7 provide an extremely helpful tool to output\
    \ conditionally debug messages using debug zones. This is helpful because it curbs\
    \ the barrage of messages that are displayed and therefore allowing you to view\
    \ messages related only to a specific area of code you are debugging. So for example\
    \ if you are debugging a device driver’s IST, you can limit the debug messages\
    \ to just the ones that are triggered in the IST code so you don’t get hundreds\
    \ of messages from every function in the device driver.\n\nThe other techniques\
    \ involve software and hardware debuggers. While software debuggers such as kernel\
    \ debugger is very useful when debugging initialization, opening a device driver\
    \ instance and de-initializing and closing device driver instances, it may be\
    \ quite insufficiently capable to debug device driver code that handles I/O data\
    \ transactions. This would require hardware debuggers that take advantage of chip\
    \ debugging capabilities.\n\n### Debugging Tools\n\nThe tools range from tools\
    \ provided with Platform Builder such as\n\n* Debug Zones\n* kernel debugger\n\
    * Target control\n\nLauterbach’s TRACE32, is the third-party tool that interfaces\
    \ with the debugging capabilities built in the CPU hardware.\n\n* TRACE32 debugger\n\
    * eXDI hardware debugging driver by Lauterbach\n\n## Simple and Effective Debugging\
    \ Techniques\n\nAs mentioned above, there are quite a few debugging techniques;\
    \ however, to be effective and efficient it is wise to match the technique to\
    \ the specific code that we debug. Device drivers are especially sensitive to\
    \ debugging techniques because of the tight interaction with the hardware and\
    \ timing sensitivity may not always comply with stopping the flow of execution\
    \ using break points and examine the code trying to isolate bugs.\n\nWhile it\
    \ is fair to assume that initialization and de-initialization code should present\
    \ no problem using a software debugger such as kernel debugger and set breakpoints\
    \ within functions such as the `XXX_Init` entry point, it may very well be an\
    \ issue if we have to debug the device driver’s IST. To debug timing sensitive\
    \ code and code that directly addresses hardware registers we may prefer to resort\
    \ to less obtrusive techniques such as debug messages or hardware tracing techniques.\n\
    \nWhile debugging device drivers, it is best to load the device driver manually.\
    \ This means that instead of allowing Device Manager to load the device driver\
    \ while the system is booting, and forcing you to perform the debugging when the\
    \ system loads the device driver, you want to control loading when you are ready\
    \ to debug. To do this, simply create a small application that will call `ActivateDeviceEx`\
    \ which loads the device driver.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Debug Messages\n\nDebug messages are the least invasive method to get meaningful\
    \ information while a unit of execution is executing. Debug messages are not halting\
    \ execution and depending on how these are formatted can provide a wealth of information.\
    \ Formatted appropriately, debug messages are useful for other developers unfamiliar\
    \ with your code implementation details. Some of the following guidelines should\
    \ help you format debug messages well for the task at hand.\n\n* Specify the source\
    \ of the message\n* Write meaningful messages\n* Debug messages should be easily\
    \ understood by someone such as testers who is unfamiliar with the implementation\
    \ code\n* Highlight significant types of messages with consistent symbols that\
    \ help identify them\n* Use debug zones to filter output\n\nYou may add the source\
    \ file name and line where the message originates to help find it swiftly.\n\n\
    ```\nDEBUGMSG(ZONE_INIT, (_T(\"DMO!Error Getting window information\\r\\n\"),\
    \ _T(__FILE__), _T(__LINE__)));\n```\n\nYou can identify the component for example\
    \ a device driver by its prefix as just demonstrated in the message by adding\
    \ \"**DMO!**\" to the output string. You can open from `<Target>` menu of the\
    \ Platform Builder IDE the \"Debug Message Options\" dialog box to include time\
    \ stamp, process ID, and thread ID information in the message. See Figure 11-1.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Figure 11-1: Debug Message\
    \ Options setting](index-205_1.jpg)\n\nThe explanation string should clarify what\
    \ the message is designed to convey for example indicating an ISR handler named\
    \ so and so was installed for a specific IRQ.\n\n```\nDEBUGMSG(ZONE_INIT, (_T(\"\
    DMO!ISR handler installed , Dll: '%s', Handler: '%s', Irq: %d\\r\\n\"), IsrInfo.szIsrDll,\
    \ IsrInfo.szIsrHandler, IsrInfo.dwIrq));\n```\n\nFor example you may highlight\
    \ the entry to a function and exit from a function by adding '+' and '-' signs\
    \ to precede the name of the function.\n\n```\nDEBUGMSG(ZONE_INIT, (_T(\"DMO!+DMO_Init\\\
    r\\n\")));\n```\n\nAnd to be able to filter out and suppress the onslaught of\
    \ messages that can cloud perception of the problem that you or another developer\
    \ or tester try to solve use debug zones.\n\n## Debug Zones\n\nDebug zones are\
    \ a mechanism provided to filter debug messages and suppress excessive message\
    \ chatter. This mechanism supplies the developer with a set of macros that can\
    \ be embedded in the code to output conditionally controlled debug messages. These\
    \ macros boil down to calling `NKOutputDebugString` which is an efficient kernel\
    \ function for printing debug messages.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Debug Zones Macros\n\nThere are eleven debug zones macros in all. These\
    \ zones provide registering debug zones with the debug system, associating zone\
    \ masks, printing messages and two provide the ability to output a LED pattern\
    \ in the case that the OEM provides such an interface."
  raw: 'Can youname a developer that can develop a bug-free software unit excluding
    “Hello World” program? I thought not. The main reason that the development cycle
    of software is such a lengthy process is errors in the code implementation, better
    known as “bugs” (with “debugging” becoming the word to describe the process of
    sieving these bugs out of the software). The end result of the existence of bugs
    in software is that the executable will fail at one time or another. The complexity
    of developing software that manages hardware is directly accountable for bugs
    that are manifold more complex and hard to fix. The most difficult bugs to fix
    are bugs that occur infrequently and cannot be easily reproduced. These are usually
    the logical bugs rather than the coding bugs. Kernel mode device drivers present
    the added danger of crashing the system if failure occurs in their code.


    In this chapter


    • Overview of the available tools


    • Using the simplest tools


    • Debug zones


    • Kernel debugger


    • Hardware assisted debugging


    • Post mortem debugging


    Overview of Debugging Tools and Techniques


    Writing robust code is the key to catching and fixing bugs. Adding error handling
    code whenever there is a possibility of an error occurring is not just good coding
    practice but is a must while writing device driver code. Whenever you call an
    API check the return values and handle error recovery. The same applies to code
    that manipulates memory and memory pointers, as well as arithmetic computations
    that may fail, like the divide by zero classic. Having said that, a variety of
    debugging tools are available to debug device drivers because either coding bugs
    or logical bugs will still be in the code (at least in my code there are).


    A. Kcholi *P*


    , *ro Windows Embedded Compact 7*


    © Abraham Kcholi 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    Debugging Techniques


    The simplest of all debugging techniques is outputting debug messages to a debug
    shell. This technique is extremely valuable for debugging software such as device
    drivers. This technique is least intrusive as it does not stop the execution and
    flow of the device driver. All Windows CE versions including Windows Embedded
    Compact 7 provide an extremely helpful tool to output conditionally debug messages
    using debug zones. This is helpful because it curbs the barrage of messages that
    are displayed and therefore allowing you to view messages related only to a specific
    area of code you are debugging. So for example if you are debugging a device driver’s
    IST, you can limit the debug messages to just the ones that are triggered in the
    IST code so you don’t get hundreds of messages from every function in the device
    driver.


    The other techniques involve software and hardware debuggers. While software debuggers
    such as kernel debugger is very useful when debugging initialization, opening
    a device driver instance and de-initializing and closing device driver instances,
    it may be quite insufficiently capable to debug device driver code that handles
    I/O data transactions. This would require hardware debuggers that take advantage
    of chip debugging capabilities.


    Debugging Tools


    The tools range from tools provided with Platform Builder such as


    • Debug Zones


    • kernel debugger


    • Target control


    Lauterbach’s TRACE32, is the third-party tool that interfaces with the debugging
    capabilities built in the CPU hardware.


    • TRACE32 debugger


    • eXDI hardware debugging driver by Lauterbach


    Simple and Effective Debugging Techniques


    As mentioned above, there are quite a few debugging techniques; however, to be
    effective and efficient it is wise to match the technique to the specific code
    that we debug. Device drivers are especially sensitive to debugging techniques
    because of the tight interaction with the hardware and timing sensitivity may
    not always comply with stopping the flow of execution using break points and examine
    the code trying to isolate bugs.


    While it is fair to assume that initialization and de-initialization code should
    present no problem using a software debugger such as kernel debugger and set breakpoints
    within functions such as the


    ***XXX_Init*** entry point, it may very well be an issue if we have to debug the
    device driver’s IST. To debug timing sensitive code and code that directly addresses
    hardware registers we may prefer to resort to less obtrusive techniques such as
    debug messages or hardware tracing techniques.


    While debugging device drivers, it is best to load the device driver manually.
    This means that instead of allowing Device Manager to load the device driver while
    the system is booting, and forcing you to perform the debugging when the system
    loads the device driver, you want to control loading when you are ready to debug.
    To do this, simply create a small application that will call ***ActivateDeviceEx***
    which loads the device driver.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    Debug Messages


    Debug messages are the least invasive method to get meaningful information while
    a unit of execution is executing. Debug messages are not halting execution and
    depending on how these are formatted can provide a wealth of information. Formatted
    appropriately, debug messages are useful for other developers unfamiliar with
    your code implementation details. Some of the following guidelines should help
    you format debug messages well for the task at hand.


    • Specify the source of the message


    • Write meaningful messages.


    •


    Debug messages should be easily understood by someone such as testers


    who is unfamiliar with the implementation code


    • Highlight significant types of messages with consistent symbols that help identify
    them


    • Use debug zones to filter output


    You may add the source file name and line where the message originates to help
    find it swiftly.


    **DEBUGMSG(ZONE_INIT, (_T("DMO!Error Getting window**


    **information\r\n"),**


    **_T(__FILE__), _T(__LINE__)));**


    You can identify the component for example a device driver by its prefix as just
    demonstrated in the message by adding “**DMO!** ” to the output string. You can
    open from <Target> menu of the Platform Builder IDE the “Debug Message Options”
    dialog box to include time stamp, process ID, and thread ID


    information in the message. See Figure 11-1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-205_1.jpg)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    *Figure 11-1\. Debug Message Options setting*


    The explanation string should clarify what the message is designed to convey for
    example indicating an ISR handler named so and so was installed for a specific
    IRQ.


    **DEBUGMSG(ZONE_INIT, (_T("DMO!ISR handler installed ,**


    **Dll: ''%s'', Handler: ''%s'', Irq: %d\r\n"),**


    **IsrInfo.szIsrDll, IsrInfo.szIsrHandler,**


    **IsrInfo.dwIrq));**


    For example you may highlight the entry to a function and exit from a function
    by adding ‘+’ and ‘-’


    signs to precede the name of the function.


    **DEBUGMSG(ZONE_INIT, (_T("DMO!+DMO_Init\r\n")));**


    And to be able to filter out and suppress the onslaught of messages that can cloud
    perception of the problem that you or another developer or tester try to solve
    use debug zones.


    Debug Zones


    Debug zones are a mechanism provided to filter debug messages and suppress excessive
    message chatter. This mechanism supplies the developer with a set of macros that
    can be embedded in the code to output conditionally controlled debug messages.
    These macros boil down to calling


    ***NKOutputDebugString*** which is an efficient kernel function for printing debug
    messages.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ DEBUGGING DEVICE DRIVERS


    Debug Zones Macros


    There are eleven debug zones macros in all. These zones provide registering debug
    zones with the debug system, associating zone masks, printing messages and two
    provide the ability to output a LED pattern in the case that the OEM provides
    such an interface.'
  trans: "\n# 调试设备驱动程序\n\n您能说出哪位开发者能编写出除了\"Hello World\"程序之外毫无缺陷的软件单元吗？我想不能。软件开发周期如此漫长的主要原因在于代码实现中的错误，即所谓的\"\
    bug\"（\"调试\"一词便用来描述从软件中筛除这些错误的过程）。软件中存在 bug 的最终结果是可执行文件迟早会运行失败。管理硬件的软件开发复杂性直接导致了更复杂且难以修复的多重\
    \ bug。最难修复的 bug 是那些偶发且难以重现的。这些通常是逻辑错误而非编码错误。内核模式设备驱动程序还存在一个额外风险：如果其代码发生故障，系统可能崩溃。\n\
    \n本章内容\n\n* 可用工具概述\n* 使用最简单的工具\n* 调试区域\n* 内核调试器\n* 硬件辅助调试\n* 事后调试\n\n## 调试工具与技术概述\n\
    \n编写健壮的代码是发现并修复 bug 的关键。在可能发生错误的地方添加错误处理代码不仅是良好的编码实践，更是编写设备驱动程序代码时必须遵守的准则。每当调用\
    \ API 时，都要检查返回值并进行错误恢复处理。同样，操作内存和内存指针的代码，以及可能失败的算术运算（如经典的除零错误）也需如此。话虽如此，由于编码错误或逻辑错误仍会存在于代码中（至少在我的代码中是这样），因此有多种调试工具可用于调试设备驱动程序。\n\
    \nA. Kcholi  \n*《精通 Windows Embedded Compact 7》*  \n© Abraham Kcholi 2011\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 调试技术\n\n所有调试技术中最简单的是将调试消息输出到调试终端。这项技术对于调试设备驱动等软件极为有价值。该技术侵入性最小，因为它不会中断设备驱动程序的执行和流程。包括\
    \ Windows Embedded Compact 7 在内的所有 Windows CE 版本都提供了一个极其有用的工具，可通过调试区域有条件地输出调试消息。这很有帮助，因为它可以控制显示的大量消息，从而允许您仅查看与所调试代码特定区域相关的消息。例如，如果您正在调试设备驱动程序的\
    \ IST，可以将调试消息限制为仅在 IST 代码中触发的那些，这样就不会收到来自设备驱动程序每个函数的数百条消息。\n\n其他技术涉及软件和硬件调试器。虽然软件调试器（如内核调试器）在调试初始化、打开设备驱动程序实例以及反初始化和关闭设备驱动程序实例时非常有用，但在调试处理\
    \ I/O 数据事务的设备驱动程序代码时可能能力不足。这就需要利用芯片调试能力的硬件调试器。\n\n### 调试工具\n\n这些工具包括 Platform\
    \ Builder 提供的工具，例如：\n\n* 调试区域\n* 内核调试器\n* 目标控制\n\nLauterbach 的 TRACE32 是一款第三方工具，可与\
    \ CPU 硬件内置的调试能力交互。\n\n* TRACE32 调试器\n* Lauterbach 的 eXDI 硬件调试驱动程序\n\n## 简单高效的调试技术\n\
    \n如上所述，调试技术种类繁多；然而，要实现有效且高效，明智的做法是将技术应用于我们正在调试的特定代码。设备驱动程序对调试技术尤其敏感，因为与硬件的紧密交互以及时序敏感性可能不允许始终使用断点来停止执行流程并检查代码以尝试隔离\
    \ bug。\n\n虽然可以合理地假设初始化和反初始化代码使用软件调试器（如内核调试器）并在`XXX_Init`入口点等函数中设置断点应该没有问题，但如果我们必须调试设备驱动程序的\
    \ IST，这很可能成为问题。要调试时序敏感代码和直接寻址硬件寄存器的代码，我们可能更倾向于使用不那么侵入性的技术，例如调试消息或硬件跟踪技术。\n\n在调试设备驱动程序时，最好手动加载设备驱动程序。这意味着，与其让设备管理器在系统启动时加载设备驱动程序，迫使您在系统加载设备驱动程序时执行调试，不如在您准备好调试时控制加载。要做到这一点，只需创建一个简单应用程序，调用`ActivateDeviceEx`来加载设备驱动程序即可。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 调试消息\n\n调试消息是在执行单元执行时获取有意义信息的最不具侵入性的方法。调试消息不会停止执行，并且根据其格式化方式，可以提供丰富的信息。适当格式化的调试消息对于不熟悉您代码实现细节的其他开发者也很有用。以下一些指导原则应能帮助您为当前任务良好地格式化调试消息。\n\
    \n* 指定消息来源\n* 编写有意义的消息\n* 调试消息应易于不熟悉实现代码的人员（如测试人员）理解\n* 使用一致的符号突出显示重要类型的消息以帮助识别\n\
    * 使用调试区域过滤输出\n\n您可以添加消息来源的文件名和行号，以便快速定位。\n\n```\nDEBUGMSG(ZONE_INIT, (_T(\"DMO!Error\
    \ Getting window information\\r\\n\"), _T(__FILE__), _T(__LINE__)));\n```\n\n\
    您可以通过在输出字符串中添加\"**DMO!**\"来标识组件（例如设备驱动程序）的前缀，正如刚才的消息所示。您可以从 Platform Builder IDE\
    \ 的`<Target>`菜单中打开\"调试消息选项\"对话框，以在消息中包含时间戳、进程 ID 和线程 ID 信息。请参见图 11-1。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图 11-1：调试消息选项设置](img/index-205_1.jpg)\n\n解释字符串应阐明消息旨在传达的内容，例如指示名为某某的 ISR 处理程序已为特定\
    \ IRQ 安装。\n\n```\nDEBUGMSG(ZONE_INIT, (_T(\"DMO!ISR handler installed , Dll: '%s',\
    \ Handler: '%s', Irq: %d\\r\\n\"), IsrInfo.szIsrDll, IsrInfo.szIsrHandler, IsrInfo.dwIrq));\n\
    ```\n\n例如，您可以通过在函数名前添加'+'和'-'符号来突出显示函数的进入和退出。\n\n```\nDEBUGMSG(ZONE_INIT, (_T(\"\
    DMO!+DMO_Init\\r\\n\")));\n```\n\n为了能够过滤并抑制可能干扰您或其他开发者/测试人员解决问题的消息洪流，请使用调试区域。\n\
    \n## 调试区域\n\n调试区域是一种用于过滤调试消息并抑制过多消息输出的机制。该机制为开发者提供了一组可嵌入代码中的宏，用于有条件地输出可控的调试消息。这些宏最终归结为调用`NKOutputDebugString`，这是一个用于打印调试消息的高效内核函数。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 调试区域宏\n\n总共有十一个调试区域宏。这些区域提供向调试系统注册调试区域、关联区域掩码、打印消息的功能，其中两个还提供了在\
    \ OEM 提供此类接口的情况下输出 LED 模式的能力。\n"
- fmt: "• `DEBUGREGISTER` - This macro only registers zones on Debug builds. Does\
    \ not affect Retail and ship builds.\n\n• `RETAILREGISTERZONES` - This macro only\
    \ registers zones on Debug and Retail builds. Does not affect Ship builds.\n\n\
    • `DEBUGZONE` - Associates a mask bit with a zone.\n\n• `DEBUGMSG` - Conditionally\
    \ outputs a formatted debugging message. Does not affect Retail and ship builds.\n\
    \n• `RETAILMSG` - Conditionally outputs a formatted debugging message. Does not\
    \ affect ship builds.\n\n• `ERRORMSG` - Conditionally outputs a formatted error\
    \ message, adding the file name and line number where the error occurred. Does\
    \ not affect ship builds.\n\n• `DEBUGCHK` - Asserts an expression and produces\
    \ a `DebugBreak` if the expression is FALSE. Does not affect Retail and Ship builds.\n\
    \n• `ASSERT` - Asserts an expression and produces a `DebugBreak` if the expression\
    \ is FALSE.\n\n• `ASSERTMSG` - Asserts an expression, and if the expression is\
    \ FALSE, produces an error message. Does not affect Retail and Ship builds.\n\n\
    • `DEBUGLED` - Conditionally outputs a LED pattern. Does not affect Retail and\
    \ Ship builds. Not an option on boards without LED hardware. Production boards\
    \ are not likely to provide LED hardware.\n\n• `RETAILLED` - Conditionally outputs\
    \ a LED pattern. Does not affect Ship builds.\n\nTerminology in Windows CE is\
    \ sometimes confusing; note that there are `RETAILMSG` and `DEBUGMSG`. The `DEBUGMSG`\
    \ macro is used in debug builds only. So, if a module is compiled as retail, that\
    \ is compiled with `WINCEDEBUG=RETAIL` set in the build environment it will not\
    \ output any `DEBUGMSG` statements. `RETAILMSG`, on the other hand, outputs messages\
    \ in both retail and debug builds. If the build is compiled as a \"ship build\"\
    \ that is `WINCESHIP=1` set in the build environment, no messages will be outputted.\
    \ Why is the terminology confusing? Because the term \"retail\" does not mean\
    \ \"ship\" as would be expected by the English language.\n\n## Registering Debug\
    \ Zones\n\nBefore debug zones can be used in your module these zones have to be\
    \ registered with the debug system. There are a few preparation steps you have\
    \ to take. First is to define your debug zones. One thing to remember is that\
    \ you can define at most sixteen zones per module. Listing 11-1 shows a sample\
    \ of code defining five zones.\n\n*Listing 11-1. Defining module specific debug\
    \ zones*\n\n```\n#ifdef DEBUG\n\n#define ZONE_INIT DEBUGZONE(0)\n#define ZONE_OPEN\
    \ DEBUGZONE(1)\n#define ZONE_IOCTL DEBUGZONE(2)\n#define ZONE_DEINIT DEBUGZONE(3)\n\
    #define ZONE_ERROR DEBUGZONE(15)\n\n#endif //DEBUG\n```\n\nNext you have to associate\
    \ a bitmask to a zone ID. Listing 11-2 presents a way of doing it. This mask is\
    \ needed to set the `ulZoneMask` field in the `DBGPARAM` structure to indicate\
    \ which zones are enabled.\n\n*Listing 11-2. Associating a bitmask to a zone ID*\n\
    \n```\n#define DEBUGMASK(bit) (1 << (bit))\n\n#define MASK_INIT DEBUGMASK(0)\n\
    #define MASK_OPEN DEBUGMASK(1)\n#define MASK_IOCTL DEBUGMASK(2)\n#define MASK_DEINIT\
    \ DEBUGMASK(3)\n#define MASK_ERROR DEBUGMASK(15)\n```\n\nBefore you can register\
    \ you have to declare a `DBGPARAM` structure that is private for the specific\
    \ module. Because this structure actually associates your zone IDs to your module\
    \ and when registered the debug system is able to manage your module's specific\
    \ zones. Listing 11-3 shows an example of declaring this structure. Note, however,\
    \ that the assigned variable has to always be named `dpCurSettings`.\n\n*Listing\
    \ 11-3. Declaring DBGPARAM*\n\n```\nDBGPARAM dpCurSettings = {\n    _T(\"Demodrvr\"\
    ),\n    {\n        _T(\"Init\"), _T(\"Open\"), _T(\"Ioctl\"), _T(\"DeInit\"),\n\
    \        _T(\"\"), _T(\"\"), _T(\"\"), _T(\"\"),\n        _T(\"\"),_T(\"\"),_T(\"\
    \"),_T(\"\"),\n        _T(\"\"),_T(\"\"),_T(\"\"),_T(\"Error\")\n    },\n    MASK_INIT\
    \ | MASK_DEINIT\n};\n```\n\nTwo things to note about this structure, the first\
    \ is the name of the module is assigned in the first field of the structure, the\
    \ last field, `ulZoneMask` indicates which zones are enabled.\n\n```\ntypedef\
    \ struct _DBGPARAM {\n    WCHAR lpszName[32];\n```"
