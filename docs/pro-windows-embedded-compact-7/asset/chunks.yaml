    several packet DMA transfers at once. If you are transferring a packet over the
    network, for example, each part of the network stack adds its own header (TCP,
    IP, Ethernet, and so forth). These headers are all allocated from different places
    in memory.


    System DMA


    System DMA is performed by programming the system DMA controller (DMAC) on the
    system board to perform the transfer directly. The DMAC acts as a very simple
    processor that is capable of moving a specified number of bytes between a peripheral
    device and main memory. At the start of an I/O


    operation the device driver will load into the DMAC a memory address and transfer
    count and the DMAC does the rest. When the DMAC has finished moving the data,
    it generates an interrupt to signal completion. While the DMAC transfers the data,
    the driver is suspended and the CPU is free to attend to other tasks. This was
    typical DMA operation for the ISA bus. Modern peripheral devices mostly use bus
    master DMA.


    Bus Master DMA


    An I/O device that has its own DMAC built in can take control of the data bus
    and initiate DMA operations. Full bus mastering implies that the I/O device is
    capable of performing more complex sequences of operations without CPU intervention.
    Drivers of bus-master DMA devices can use the following types of DMA support:


    • Packet-based DMA if the bus-master adapter allows the driver to determine when
    a DMA transfer operation is done and/or when to begin another transfer


    operation. Packet-based DMA is the basis for Scatter/Gather DMA operations.


    • Common-buffer DMA if the bus-master adapter does not provide a way for the driver
    to determine when a transfer operation will begin or complete, or if a single
    buffer area is used continuously or repeatedly for DMA transfers.


