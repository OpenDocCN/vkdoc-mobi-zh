    \ Windows CE 设备驱动程序向导创建筛选驱动程序。\n\n设备管理器启动其设备驱动程序加载过程，BusEnum 通过调用 `ActivateDeviceEx`\
    \ 加载 `Testdrvr.dll`。本质上，设备管理器在内部函数 `LoadLib` 中启动加载流设备驱动程序的过程。它首先加载 `Testdrvr.dll`\
    \ 并分配其所有入口点，然后继续加载相关的筛选驱动程序。一旦筛选驱动程序 DLL 被加载，它会调用筛选驱动程序的注册表设置中 `InitEntry` 键所指向的函数。实际上，这两个驱动程序最初都被加载了。\n\
    \n图 7-9 展示了加载过程的调用堆栈。现在设备管理器调用 `Init` 入口点，这时情况变得有趣，因为两个设备驱动程序被链接在一起，并且筛选驱动程序的\
