  \nSwiftUI 声明式的 UI 构建方法，在程序化构建 UI 时，对代码结构有更明确的意见，这使得其他开发者更容易理解你的代码意图。\n\n而且，由于采用了基于函数式响应式编程的状态管理模型，SwiftUI\
