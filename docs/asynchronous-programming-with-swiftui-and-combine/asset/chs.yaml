  Text(\"Hello, Peter!\")\n.font(.title)\n.foregroundColor(Color.pink)\nButton(\"\
  Tap me\") {\nprint(\"Hello\")\n}\n}\n.padding()\n}\n}\n}\n```\n\n要实际查看你到目前为止的工作成果，我们需要在模拟器上运行该\
