- '# 7. 初识 Combine


  现在，我们在前几章中已经使用了一点 Combine，希望它们在结合 SwiftUI 用户界面的上下文中足够容易理解。但你可能想知道 Combine 究竟是如何工作的，以及
  SwiftUI 响应式状态管理系统幕后发生了什么。在本章中，我们将深入探讨 Combine，你将了解其基本原理，以及它为何能与 SwiftUI 如此完美地结合。


  > *本章代码片段对应的源代码可以在本书的 GitHub 仓库中找到。*^(⁵¹)




  ## 什么是函数式响应式编程？


  计算机中发生的所有事情都可以被视为事件——用户点击按钮、时间流逝、API 请求返回某个值、网络请求失败。大多数事件以异步方式发生，这使得处理它们变得具有挑战性。


  处理异步行为有几种方法。作为 iOS 开发者，我们非常熟悉使用委托和回调，但它们有几个缺点，会导致代码分散各处且难以推理。


  响应式编程是处理这种情况的另一种方法。响应式编程的基本思想是：一切都是事件，并且这些事件是异步发生的。事件由事件源发送，感兴趣的一方可以注册以接收特定事件。通常情况下，这些事件流需要进行转换，使其对相应的订阅者更有用。


  响应式编程有众多实现。最著名的可能是 Reactive Extensions（ReactiveX^(⁵²)），“一个用于异步编程的、带有可观察流的 API”。ReactiveX
  的优美之处在于它适用于多种平台和语言：Java、^(⁵³) JavaScript、^(⁵⁴) C#、^(⁵⁵) Kotlin、^(⁵⁶) Swift、^(⁵⁷)
  等等。^(⁵⁸)


  Apple 在 WWDC 2019 上推出了 Combine 作为他们对响应式编程的实现，它与`RxSwift`非常相似。使用 Combine 而非`RxSwift`的主要原因是它与
  Apple 平台的集成更深。它与`SwiftUI`配合得特别好，因此如果您以 iOS 13 或更高版本为目标（这是 Combine 和 SwiftUI 的最低目标平台），您应该仔细看看。


  > Combine 是一个统一的、声明式的 API，用于处理随时间变化的值。


  Combine 定义了三个主要概念来实现响应式编程的思想：


  1. 发布者

  2. 订阅者

  3. 操作符


  **发布者**随时间传递值，**订阅者**在接收这些值时对其执行操作。**操作符**位于发布者和订阅者之间，可用于操纵值流。


  让我们仔细看看。


  ## 发布者


  顾名思义，发布者随时间发出值。为了指示错误条件，发布者也可能发布错误。每个发布者定义它发布哪些类型的值和错误（如果有的话）。


  最基本的发布者是`Just`——它只发出一个值并且永远不会失败：


  ```

  Just(42)

  ```


  ![](img/509862_1_En_7_Fig1_HTML.jpg)


  一条线段，左侧圆圈内标有数字 42。右侧表格中的数据为输出类型 int，失败类型 never。


  **图 7-1** 发出单个值的发布者


  发送单个值在许多情况下确实很有用，但大多数时候我们需要发送多个值。Combine 使得几乎任何东西都可以转变为发布者。例如，下面是如何将十个最受欢迎^(⁵⁹)
  的披萨配料^(⁶⁰) 数组转变为发布者：


  ```

  ["意大利辣香肠", "蘑菇", "洋葱", "香肠", "培根", "额外奶酪", "黑橄榄", "青椒"].publisher

  ```


  ![](img/509862_1_En_7_Fig2_HTML.jpg)


  一条线段，三个块上分别标有意大利辣香肠、蘑菇、洋葱。右侧表格中的数据为输出类型 string，失败类型 never。


  **图 7-2** 发出一些披萨配料后终止的发布者


  使用简单的值或序列作为发布者可能看起来有点乏味，但当我们需要从多个 Combine 发布者组合管道时，这无疑会派上用场。


  是时候让它更有趣一点了！


  假设我们正在构建一个披萨订购应用。以下是一些创建订单并设置发布者的代码。这个特定的发布者会在`NotificationCenter`向`pizzaOrder`对象发送名为`.didUpdateOrderStatus`的通知时发出事件。


  ```

  // 创建订单

  let pizzaOrder = Order()

  let pizzaOrderPublisher = NotificationCenter

  .default

  .publisher(for: .didUpdateOrderStatus, object: pizzaOrder)

  ```


  当用户想要下订单时，应用的另一部分将使用`NotificationCenter`发送此通知。这可能在用户点击“下订单”按钮时被调用。


  ```

  // 一旦用户准备好下订单

  NotificationCenter

  .default

  .post(name: .didUpdateOrderStatus,

  object: pizzaOrderPublisher,

  userInfo: ["status": OrderStatus.processing])

  ```


  如果您运行这段代码，什么也不会发生——这是因为发布者只有在订阅者注册到发布者后才会开始发出事件。那么现在让我们看看订阅者。


  ## 订阅者


  订阅者从其订阅的上游发布者接收值。每个订阅者定义它愿意接收哪些类型的值和错误。


  Combine 框架提供了两个极其通用的主要订阅者——`sink`和`assign`。


  * `sink`是最通用的一个；您可以使用它来接收来自 Combine 发布者的值，然后在其闭包内执行您想要的任何代码。

  * `assign`允许您将任何接收到的值分配给一个属性或另一个`Publisher`。


  在前面的示例中，发布者并没有真正做任何事情。让我们使用`sink`来订阅最受欢迎披萨配料的列表，并将发出的值打印到控制台。


  ```

  ["意大利辣香肠", "蘑菇", "洋葱", "意大利腊肠", "培根", "额外奶酪", "黑橄榄", "青椒"]

  .publisher

  .sink { topping in

  print("\(topping) 是一种受欢迎的披萨配料")

  }

  ```


  您会注意到我擅自将*香肠*替换为*意大利腊肠*……


  回到我们的披萨订购示例，下面是如何订阅`pizzaOrderPublisher`并打印任何订单状态更新：


  ```

  // 创建订单

  let pizzaOrder = Order()

  let pizzaOrderPublisher = NotificationCenter

  .default.publisher(for: .didUpdateOrderStatus, object: pizzaOrder)

  pizzaOrderPublisher.sink { notification in

  print(notification)

  }

  // 一旦用户准备好下订单

  NotificationCenter

  .default

  .post(name: .didUpdateOrderStatus,

  object: pizzaOrder,

  userInfo: ["status": OrderStatus.processing])

  ```


  将值打印到控制台固然不错，但让我们更进一步，将订单状态分配给订单。为此，我们将使用`assign`订阅者。^(⁶¹)


  第一次尝试将订单状态分配给披萨订单上的状态字段可能如下所示：


  ```

  pizzaOrderPublisher

  .assign(to: \.status, on: pizzaOrder)

  ```


  然而，这段代码无法编译。相反，编译器会报错：`Key path value type ''OrderStatus'' cannot be converted to
  contextual type ''NotificationCenter.Publisher.Output'' (aka ''Notification'')`


  ![](img/509862_1_En_7_Fig3_HTML.png)


  输出屏幕显示 3 行代码和一个通知框，框内文字：键路径值类型 OrderStatus 无法转换为上下文类型 NotificationCenter.Publisher.Output。


  **图 7-3** `pizzaOrderPublisher`发出`Notification`，但期望的是`OrderStatus`


  这是因为`pizzaOrderPublisher`发出的是`Notification`值，但状态属性的类型是`OrderStatus`。我们总得想办法从`Notification`的`UserInfo`字典中提取出`OrderStatus`。


  为了转换来自上游发布者的值，Combine 提供了一个名为**操作符**的概念。




  ## 运算符


  通常，你需要在值被订阅者使用之前对其进行修改。这些操作可以是简单的转换，比如从更复杂的值中提取特定属性，或者过滤元素，以便订阅者只接收满足特定条件的元素。Combine
  提供了丰富的运算符，你可以将它们组合起来（请允许我在这里玩个文字游戏）形成强大的处理管线。


  许多运算符的名称对你来说可能并不陌生，因为 Combine 团队决定沿用 Swift 标准库其他部分中已有的操作名称来命名它们。


  其中一个运算符是 `map`——你可能已经在数组或其他序列中使用过它的同名兄弟^(⁶²)来转换元素。类似地，在 Combine 中，`map` 用于转换来自上游发布者的元素^(⁶³)。


  在我们的示例中，我们可以使用 `map` 将接收到的 `Notifications` 转换为想要赋值给 `status` 属性的 `OrderStatus` 值：


  ```

  pizzaOrderPublisher

  .map { notification in

  notification.userInfo?["status"] as? OrderStatus ?? OrderStatus.placing

  }

  .assign(to: \.status, on: pizzaOrder)

  ```


  在 `map` 的闭包中，我们从通知的 `UserInfo` 字典中提取出 `OrderStatus` 枚举。由于这是可选的，并且可能为 `nil`，我们需要执行这种略显笨拙的检查，并在没有
  `status` 时返回一个默认值。


  幸运的是，Combine 提供了一个运算符，让我们能够更优雅、更安全地处理这类情况：`.compactMap`。`CompactMap` *对每个接收到的元素调用一个闭包，并发布任意一个有值的可选类型*（苹果文档^(⁶⁴)）。这意味着两件事：


  1.  所有 `nil` 值都将从结果中移除。

  2.  结果将不再是可选类型。


  ```

  pizzaOrderPublisher

  .compactMap { notification in

  notification.userInfo?["status"] as? OrderStatus

  }

  .assign(to: \.status, on: pizzaOrder)

  ```


  最终的代码更加简洁，也更加……紧凑^(⁶⁵)。


  ### 组合运算符


  让我们更仔细地看看运算符，以更好地理解它们的工作原理。运算符之所以特别，是因为它们既可以订阅一个发布者，同时又可以充当发布者。例如，以下是 `CompactMap`
  的简化声明，以及 `Publisher` 协议的扩展，使我们能够使用流畅的语法组合 Combine 管线：^(⁶⁶)


  ```

  extension Publishers {

  public struct CompactMap : Publisher where Upstream : Publisher {

  public typealias Failure = Upstream.Failure

  public let upstream: Upstream

  public let transform: (Upstream.Output) -> Output?

  }

  }

  extension Publisher {

  public func compactMap(_ transform: @escaping (Self.Output) -> T?) -> Publishers.CompactMap

  }

  ```


  由于所有运算符都遵循这种模式，这意味着我们可以将多个运算符串联起来，创建更强大的管线。


  为了展示实际效果，让我们为披萨配送服务创建一个新的发布者。这次，我们想要实现为现有订单添加新配料的功能。


  让我们从一份简单的玛格丽特披萨开始：


  ```

  let margheritaOrder = Order(toppings: [

  Topping("tomatoes", isVegan: true),

  Topping("vegan mozarella", isVegan: true),

  Topping("basil", isVegan: true)

  ])

  ```


  现在，在 `NotificationCenter` 上创建一个发布者，用于发布所有包含名为 `.addTopping` 消息的 `Notifications`：


  ```

  let extraToppingPublisher = NotificationCenter

  .default

  .publisher(for: .addTopping,

  object: margheritaOrder)

  extraToppingPublisher

  .compactMap { notification in

  notification.userInfo?["extra"] as? Topping

  }

  .sink { value in

  if margheritaOrder.toppings != nil {

  margheritaOrder.toppings!.append(value)

  print("Adding \(value.name)")

  print("Your order now contains \(margheritaOrder.toppings!.count) toppings")

  }

  }

  // 发送一些通知来添加额外配料

  NotificationCenter

  .default

  .post(name: .addTopping,

  object: margheritaOrder,

  userInfo: ["extra": Topping("salami", isVegan: false)])

  NotificationCenter

  .default

  .post(name: .addTopping,

  object: margheritaOrder,

  userInfo: ["extra": Topping("olives", isVegan: true)])

  NotificationCenter

  .default

  .post(name: .addTopping,

  object: margheritaOrder,

  userInfo: ["extra": Topping("pepperoni", isVegan: true)])

  NotificationCenter

  .default

  .post(name: .addTopping,

  object: margheritaOrder,

  userInfo: ["extra": Topping("capers", isVegan: true)])

  ```


  就像我们之前的例子一样，我们使用 `.compactMap` 来提取 `Topping`。最后，我们使用 `sink` 订阅者来接收配料并将其添加到订单中。


  到目前为止，这与我们之前所做的非常相似。但最近，配送服务的老板决定转向纯素食。所以，让我们更新管线，确保只接受纯素配料。我们可以通过将 `filter` 运算符插入到管线中来实现这一点：


  ```

  let extraToppingPublisher = NotificationCenter

  .default

  .publisher(for: .addTopping,

  object: margheritaOrder)

  extraToppingPublisher

  .compactMap { notification in

  notification.userInfo?["extra"] as? Topping

  }

  .filter{ topping in

  return topping.isVegan

  }

  .sink { value in

  if margheritaOrder.toppings != nil {

  margheritaOrder.toppings!.append(value)

  print("Adding \(value.name)")

  print("Your order now contains \(margheritaOrder.toppings!.count) toppings")

  }

  }

  // 发送一些通知来添加额外配料

  NotificationCenter

  .default

  .post(name: .addTopping,

  object: margheritaOrder,

  userInfo: ["extra": Topping("salami", isVegan: false)])

  NotificationCenter

  .default

  .post(name: .addTopping,

  object: margheritaOrder,

  userInfo: ["extra": Topping("extra cheese", isVegan: true)])

  ```


  借助隐式参数和隐式返回，我们可以进一步简化它：


  ```

  extraToppingPublisher

  .compactMap { notification in

  // ...

  }

  .filter { $0.isVegan }

  .sink { value in

  // ...

  }

  ```


  那么，如何确保人们只能添加三种*额外*配料呢？使用 `.prefix` 运算符就很简单——该运算符只发布指定数量的值：


  ```

  extraToppingPublisher

  .compactMap { notification in

  // ...

  }

  .filter { $0.isVegan }

  .prefix(3)

  .sink { value in

  // ...

  }

  ```


  当然，确保只在披萨还没放进烤箱（或尚未送出）之前接受对配料列表的更改，也是个好主意：


  ```

  extraToppingPublisher

  .compactMap { notification in

  // ...

  }

  .filter { $0.isVegan }

  .prefix(3)

  .prefix(while: { topping in

  margheritaOrder.status == .placing

  })

  .sink { value in

  // ...

  }

  ```




  ## 组合发布者


  构建应用时，我们常常需要观察多个事件。以披萨配送服务为例，为了不让配送员久等，我们会要求他们在订单实际下达且地址验证通过后再开始准备。


  更新订单状态和验证地址是两个不同的流程，因此我们需要为它们分别设置两个发布者：


  ```

  let orderStatusPublisher = NotificationCenter

  .default

  .publisher(for: .didUpdateOrderStatus, object: margheritaOrder)

  .compactMap { notification in

  notification.userInfo?["status"] as? OrderStatus

  }

  .eraseToAnyPublisher()

  let shippingAddressValidPublisher = NotificationCenter

  .default

  .publisher(for: .didValidateAddress,

  object: margheritaOrder)

  .compactMap { notification in  notification.userInfo?["addressStatus"] as? AddressStatus

  }

  .eraseToAnyPublisher()

  ```


  通过在管道的末尾调用 `.eraseToAnyPublisher()` 操作符，管道的类型会被擦除为 `AnyPublisher<Output, Never>`。该发布者未擦除前的类型是
  `Publishers.CompactMap<NotificationCenter.Publisher, OrderStatus>`，可读性更差。对于想要传递给代码另一部分的任何管道结果类型（例如作为函数或属性的返回类型），进行类型擦除是一个好习惯。


  要判断是否可以发货，我们需要评估这两个管道的结果。只有订单已下达且地址有效时，我们才会分配配送员。


  为此，我们需要创建一个新的发布者，它会订阅 `orderStatusPublisher` 和 `shippingAddressValidPublisher`，并在订单状态为
  `.placed` 且地址状态为 `.valid` 时返回 `true`。在 Combine 中，将多个管道合并为一个是非常常见的任务，我们可以选择以下几种发布者：


  *   `Zip`

  *   `Merge`

  *   `CombineLatest`

  *   …以及其他


  最适用于我们场景的是 `CombineLatest`——它会从每个上游发布者中获取最新的值。


  ```

  let readyToProducePublisher = Publishers

  .CombineLatest(orderStatusPublisher,

  shippingAddressValidPublisher)

  readyToProducePublisher

  .print()

  .map { (orderStatus, addressStatus) in

  orderStatus == .placed && addressStatus == .valid

  }

  .sink {

  print("- 准备发货订单: \($0)")

  }

  ```


  为了更清晰地看到事件流，我在管道中加入了 `.print()` 操作符。让我们发送一些事件来模拟披萨的订购流程：


  ```

  NotificationCenter

  .default

  .post(name: .didValidateAddress,

  object: margheritaOrder,

  userInfo: ["addressStatus": AddressStatus.invalid])

  NotificationCenter

  .default

  .post(name: .didUpdateOrderStatus,

  object: margheritaOrder,

  userInfo: ["status": OrderStatus.placed])

  NotificationCenter

  .default

  .post(name: .didValidateAddress,

  object: margheritaOrder,

  userInfo: ["addressStatus": AddressStatus.valid])

  ```


  一开始，地址尚未验证通过，而订单在地址验证完成前就已下达（我们可能使用了需要一些时间进行验证的第三方服务）。


  以下是输出结果：


  ```

  receive subscription: (CombineLatest)

  request unlimited

  receive value: ((Combine_Playground_Sources.OrderStatus.placed, Combine_Playground_Sources.AddressStatus.invalid))

  - 准备发货订单: false

  receive value: ((Combine_Playground_Sources.OrderStatus.placed, Combine_Playground_Sources.AddressStatus.valid))

  - 准备发货订单: true

  receive cancel

  ```


  不以短横线开头的行是 `.print()` 操作符的调试输出。你可以看到，只有当我们同时收到 `OrderStatus` 为 `.placed` 和 `AddressStatus`
  为 `.valid` 时，订单才被视为可以发货。


  ## 总结


  在本章中，你学习了 Combine 的基础知识：


  *   发布者会随时间发出值（例如用户在文本输入框中输入的文本）。

  *   订阅者可以接收值，并将其分配给变量（使用 `.assign` 订阅者），或进行进一步处理（使用 `.sink` 订阅者）。

  *   通常，你需要对值进行转换以使其对订阅者有用，这就是操作符发挥作用的地方。


  你学习了如何使用 Combine 的操作符来转换从上游发布者接收到的事件，以及这如何让订阅者更容易地消费事件。应用通常需要观察多个事件流（例如配送表单上各字段的状态），你学习了如何使用
  Combine 的操作符将多个事件流合并为一个。


  Combine 几乎就像是用于描述应用中事件处理流程的领域特定语言（DSL）。这种声明式方法使其与 SwiftUI 非常相似，这也是它们能良好协同工作的原因之一。


  在下一章中，我们将深入探讨如何结合 SwiftUI 和 Combine，以及在你的 SwiftUI 应用中使用 Combine 如何使实现面向用户的应用程序逻辑变得更加容易。


  '
- "# 8. 使用 Combine 驱动 UI 状态\n\n现代用户界面必须同时响应多种输入信号：用户可以通过键盘输入、多点触控、物理手势乃至语音命令与应用交互。除此之外，应用还可能从远程服务器和本地\
  \ API 接收数据。\n\n对我们开发者而言，协调所有这些输入源及其发出的海量事件是一项具有挑战性的任务，因为我们经常需要组合多个输入源，并确保应用及其用户界面始终同步。\n\
  \n在本章及后续章节中，我们将探讨 Combine 如何帮助我们构建能够同时处理多个事件源的 UI，例如用户的输入以及来自本地和远程验证逻辑的结果，确保 UI\
  \ 始终反映应用的当前状态。\n\n在第六章的结尾，你已经看到如何使用 Combine 为输入表单上的单个输入字段实现输入验证。当时，我们使用 `onChange(of:)`\
  \ 和 Combine 为 ISBN 字段实现了验证逻辑。为了展示 Combine 的强大功能，我们将实现一个包含多个事件源的更复杂的示例。\n\n\n\n##\
  \ 使用 Combine 实现输入验证\n\n假设我们决定为图书追踪应用添加一些社交功能。为此，我们需要让用户注册并创建账户。注册时，用户需要选择用户名和密码：\n\
  \n![](img/509862_1_En_8_Fig1_HTML.png)\n\n一张移动设备屏幕的示意图，显示文本“注册”。下方字段依次为：用户名、密码、重复密码等。\n\
  \n图 8-1\n\n简单的注册表单\n\n为了保障用户数据的安全，我们需要满足以下几个前提条件：\n\n- `username` 至少包含三个字符。这一点可以在用户输入期望用户名时进行本地校验。\n\
  - 用户名必须唯一，我们需要确保所选用户名未被其他用户使用。这需要在后端进行校验——我们需要查询某个 API 端点来确认该用户名是否仍可用。\n- 用户密码必须满足一定的复杂程度要求（即，密码需要足够强健）。\n\
  - 为确保用户能记住密码，我们会要求用户在第二个密码输入字段中重复输入密码。\n\n只有当所有这些条件都满足时，我们才能创建新用户账户。创建新账户的按钮应保持禁用状态，直到所有条件都满足。\n\
  \n如你所见，我们需要处理多个事件：\n\n- 仅当表单有效时，*注册*按钮才可启用。\n- 如果用户名太短或不可用，*用户名*输入字段需要显示警告。\n- 如果密码不够强健或两次输入不匹配，*密码*字段需要显示警告。\n\
  \n### 注册表单视图\n\n在本章中，我们将使用 `Form` 来处理所有用户输入。为了显示任何错误消息或警告，我们将使用相应表单 `Section` 的页眉/页脚。在第十四章中，我们将更进一步，构建一个可复用且可配置的文本输入字段，该字段带有浮动标签，并可以内联显示错误信息。\n\
  \n> ***注*** *你可以在本书的 Git-Hub 仓库*^(⁶⁷)*中找到示例应用的代码，位于第 8 章——使用 Combine 驱动 UI 状态文件夹中。各个步骤可以在*\
  \ steps *文件夹中找到，最终版本位于* final *文件夹中。*\n\n```\nstruct SignUpForm: View {\n    @StateObject\
  \ var viewModel = SignUpFormViewModel()\n    var body: some View {\n        Form\
  \ {\n            // 用户名\n            Section {\n                TextField(\"用户名\"\
  , text: $viewModel.username)\n                    .autocapitalization(.none)\n \
  \                   .disableAutocorrection(true)\n            } footer: {\n    \
  \            Text(viewModel.usernameMessage)\n                    .foregroundColor(.red)\n\
  \            }\n            // 密码\n            Section {\n                SecureField(\"\
  密码\",\n                            text: $viewModel.password)\n                SecureField(\"\
  重复密码\",\n                            text: $viewModel.passwordConfirmation)\n  \
  \          } footer: {\n                Text(viewModel.passwordMessage)\n      \
  \              .foregroundColor(.red)\n            }\n            // 提交按钮\n    \
  \        Section {\n                Button(\"注册\") {\n                    print(\"\
  正在以用户名 \\(viewModel.username) 注册\")\n                }\n                .disabled(!viewModel.isValid)\n\
  \            }\n        }\n    }\n}\n```\n\n处理所有输入字段并确保所有表单元素针对表单的不同状态显示正确的信息（或警告）通常需要编写大量代码，并且很容易出错或遗漏重要条件——尤其是在需要处理像远程\
  \ API 这样的异步事件源时。\n\n通过使用 Combine 和函数式响应式编程，实现这个注册表单会变得容易得多。\n\n在本章中，我们将重点验证用户名的长度要求和密码强度要求。在下一章中，我们将探讨如何使用\
  \ Combine 进行网络请求，以及如何利用它连接服务器并检查用户选择的用户名是否仍然可用。\n\n### 视图模型\n\n为了执行输入验证，我们的代码需要响应用户对注册表单所做的任何更改。我们特别关注对\
  \ `username`、`password` 和 `passwordConfirmation` 文本输入字段的更改观察。正如我们在前几章中已经看到的，无法直接操作\
  \ SwiftUI 视图或通过访问其属性来获取其状态。相反，SwiftUI 在视图元素之外管理 UI 状态，这被称为*数据源*。\n\n为此，SwiftUI 提供了许多属性包装器，我们可以用它们将数据源连接到应用的视图。在第四章中，我们讨论了这些属性包装器的工作原理以及在何种情况下使用它们。\n\
  \n你可能还记得，我们可以使用 `@State` 来处理视图中的局部状态，因此你可能会想使用局部 `@State` 属性来保存注册表单的用户名、密码和密码确认。然而，`@State`\
  \ 并非发布者，因此我们无法用它来驱动任何 Combine 管道。\n\n相反，我们将创建一个视图模型，其中包含已发布属性 `username`、`password`\
  \ 和 `passwordConfirmation`，这些属性可以绑定到相应的 UI 视图。\n\n```\nclass SignUpFormViewModel:\
  \ ObservableObject {\n    // 输入\n    @Published var username: String = \"\"\n  \
  \  @Published var password: String = \"\"\n    @Published var passwordConfirmation:\
  \ String = \"\"\n    \n    // 输出\n    @Published var usernameMessage: String = \"\
  \"\n    @Published var passwordMessage: String = \"\"\n    @Published var isValid:\
  \ Bool = false\n}\n```\n\n将属性标记为 `@Published` 会将其转换为 Combine 发布者。这不仅允许我们将属性绑定到 UI\
  \ 元素，还可以将 Combine 管道附加到该属性，并在管道内部执行验证逻辑。然后，我们可以将管道的结果分配给另一个已发布属性，从而用结果驱动 UI。例如，只要表单输入无效，就可以禁用*提交*按钮。\n\
  \n通过使视图模型遵循 `ObservableObject` 协议，我们使其变得可观察。每当某个已发布属性发生变化时，视图模型将发出变化后的值，通知 SwiftUI\
  \ 更新所有受影响的视图。\n\n以这种方式使用 Combine 有助于我们以函数式的方式定义应用的行为，确保 UI 和应用状态始终保持同步。\n\n从高层次来看，信息流如下所示：\n\
  \n- 用户在用户名字段中输入偏好的用户名。\n- 每当用户键入一个字符，`TextField` 视图就会将当前输入的文本分配给 `SignUpFormViewModel`\
  \ 的已发布属性 `username`。\n- 由于 `username` 是一个发布者，它会对任何更改向其所有订阅者发送事件。\n- 其中一个订阅者是一个 Combine\
  \ 管道，用于检查 `username` 的长度是否大于三个字符。\n- 该管道的结果将与其他管道的结果结合使用，以确定输入表单的整体验证结果。\n\n视图模型的基本版本已经连接到注册表单的视图，因此现在让我们来看看如何使用\
  \ Combine 实现验证逻辑。\n\n\n\n#### 验证用户名\n\n首先进行一个简单的验证，检查用户名字符长度。我们可以使用 `$propertyName`\
  \ 语法来访问已发布属性的发布者。这样我们就能订阅该发布者发送的任何事件（例如，当用户开始输入用户名导致底层属性发生变化时）。\n\n我们管道的输入类型是 `String`，但我们需要返回一个\
  \ `Bool` 值来指示用户名长度是否有效。对于此类转换，我们可以使用 Combine 的 `map` 操作符。在其闭包内，我们可以对从上游发布者接收到的元素进行操作，并将其转换为所需的结果。\n\
  \n因此，要验证 `username` 是否至少包含三个字符，我们可以检查输入字符串的 `count` 属性是否大于等于三。此检查将返回 `true` 或 `false`：\n\
  \n```\n$username\n.map { username in\n    return username.count >= 3\n}\n```\n\n\
  由于此检查是我们在闭包中执行的唯一语句，我们可以使用隐式返回来简化代码：\n\n```\n$username\n.map { username in\n   \
  \ username.count >= 3\n}\n```\n\n或者，使用位置参数：\n\n```\n$username\n.map { $0.count >=\
  \ 3 }\n```\n\n最终，此管道（以及其他管道）的结果需要赋值给视图模型的 `isValid` 属性。由于目前这是我们唯一的管道，我们可以在视图模型的初始化器中完成此操作：\n\
  \n```\nclass SignUpFormViewModel: ObservableObject {\n    // 输入\n    @Published\
  \ var username: String = \"\"\n    @Published var password: String = \"\"\n    @Published\
  \ var passwordConfirmation: String = \"\"\n    // 输出\n    @Published var usernameMessage:\
  \ String = \"\"\n    @Published var passwordMessage: String = \"\"\n    @Published\
  \ var isValid: Bool = false\n\n    init() {\n        $username\n            .map\
  \ { $0.count >= 3 }\n            .assign(to: &$isValid)\n    }\n}\n```\n\n在管道的末尾，我们使用\
  \ `assign(to:)` 操作符将管道的结果赋值给 `isValid` 属性。\n\n**图 8-2** – 用于验证用户名长度的 Combine 管道\n\
  \n如果你现在运行应用，你会发现*提交*按钮将处于禁用状态，直到你输入至少包含三个字符的用户名。但是，用户没有任何反馈，他们可能会疑惑为什么按钮被禁用，或者想知道用户名的最大长度是多少。\n\
  \n#### 显示验证消息\n\n因此，在继续实现密码验证之前，让我们确保为用户提供一些指导，并显示合适的验证消息。视图模型中已经有一个 `usernameMessage`\
  \ 属性，它绑定到包含 `username` 输入字段的表单部分的页脚。我们需要做的只是实现 Combine 管道，根据 `username` 的长度计算验证消息。\n\
  \n一个初级的实现可能如下所示：\n\n```\nclass SignUpFormViewModel: ObservableObject {\n    // ...\n\
  \n    init() {\n        $username\n            .map { $0.count >= 3 }\n        \
  \    .assign(to: &$isValid)\n\n        $username\n            .map {\n         \
  \       $0.count >= 3\n                    ? \"\"\n                    : \"用户名必须至少包含三个字符！\"\
  \n            }\n            .assign(to: &$usernameMessage)\n    }\n}\n```\n\n虽然这个解决方案运行良好，但它有一些缺点：\n\
  \n1.  它包含了用于检查用户名的长度的重复逻辑。现在这可能不是问题，但一旦我们添加更多管道，其中包含硬编码的“用户名必须至少包含三个字符”的要求，这最终可能会成为维护负担。\n\
  2.  它不可扩展。目前只有一个规则，但如果添加另一个规则（例如用户名必须唯一），这需要与后端系统通信，会发生什么？使用这种方法，组合多个规则将非常复杂，甚至不可能。\n\
  \n为了解决这些问题，我们将通过将 Combine 管道封装在计算属性中，使其可重用。\n\n#### 将 Combine 管道封装在计算属性中\n\n使 Combine\
  \ 发布者可重用的一种简单方法是将它们封装在私有计算属性中。\n\n正如你在第 7 章中学到的，`Publisher` 是一个泛型类型，它有两个关联类型用于指定结果和错误情况。在我们的例子中，结果是\
  \ `Bool` 类型，管道永远不会失败，因此失败类型是 `Never`。\n\n在组装管道时，管道的类型将是一个嵌套的泛型类型，表示我们沿途组装的所有发布者和操作符的返回类型。在我们的例子中，这将是\
  \ `Publishers.Map<Published<String>.Publisher, Bool>`。为了避免处理如此复杂的类型，我们可以使用类型擦除。Combine\
  \ 提供了一个 `eraseToAnyPublisher` 操作符，它将管道的类型擦除为 `AnyPublisher`，这使我们能够像这样将管道包装在计算属性中：\n\
  \n```\nprivate var isUsernameLengthValidPublisher: AnyPublisher<Bool, Never> {\n\
  \    $username\n        .map { $0.count >= 3 }\n        .eraseToAnyPublisher()\n\
  }\n```\n\n将管道移入计算属性后，我们现在可以更新视图模型初始化器中的调用点：\n\n```\ninit() {\n    isUsernameLengthValidPublisher\n\
  \        .assign(to: &$isValid)\n}\n```\n\n下一步是重用该发布者来驱动用于计算验证消息的管道：\n\n```\ninit()\
  \ {\n    isUsernameLengthValidPublisher\n        .assign(to: &$isValid)\n\n    isUsernameLengthValidPublisher\n\
  \        .map {\n            $0 ? \"\"\n                : \"用户名太短。至少需要 3 个字符。\"\n\
  \        }\n        .assign(to: &$usernameMessage)\n}\n```\n\n通过像这样重构代码，我们将业务逻辑（“用户名必须至少包含三个字符”）移到了单个位置，从而更易于更新。这也使我们能够重用该发布者来组合更复杂的规则，我们稍后会看到。\n\
  \n但在那之前，我想提请您注意一个小但可能很严重的方面：我们移入 `isUsernameLengthValidPublisher` 属性的代码将在每次被调用时创建一个新的管道。当在多个上下文中使用此发布者时（就像我们刚做的那样），我们最终将得到同一个管道的多个实例，而不是一个实例。这不仅会浪费内存，而且一旦我们构建一个进行网络调用或访问数据库的管道，它就会成为一个更严重的问题。创建和使用管道的多个实例，每个实例在处理事件时都执行网络访问，将导致每个额外的管道实例产生重复的网络请求——这绝对不是我们想要的。\n\
  \n为了防止这种情况发生，我们需要将计算属性转换为惰性属性。惰性属性只计算一次，并且仅在第一次访问它们时计算。将计算属性转换为惰性属性只需要少量更改：\n\n\
  ```\nprivate lazy var isUsernameLengthValidPublisher: AnyPublisher<Bool, Never>\
  \ = {\n    $username\n        .map { $0.count >= 3 }\n        .eraseToAnyPublisher()\n\
  }()\n```\n\n好处在于，我们可以像使用任何其他属性一样使用惰性属性——无需更改调用点。通过这项更改，我们确保只在视图模型初始化时创建一次管道。\n\n\
  \n\n#### 密码验证\n\n有效的用户名只是能在我们应用中创建新用户账户的一个必要条件——提供密码则是另一个。在本节中，我们将基于上一节所学内容，构建一条\
  \ Combine 管道，以实现一种灵活且易于扩展的密码验证机制。\n\n第一步是确保密码不为空。我们可以使用一个简单的发布者来实现这一验证，类似于我们实现用户名长度检查的方式：\n\
  \n```\nprivate lazy var isPasswordEmptyPublisher:\nAnyPublisher =\n{\n$password\n\
  .map { $0.isEmpty }\n.eraseToAnyPublisher()\n}()\n```\n\n和之前一样，我们使用惰性计算属性来确保只创建管道的一个实例。\n\
  \n作为一项小优化，我们可以通过键路径来访问密码字符串的 `isEmpty` 属性。Combine 在 `Publisher` 上包含了一个扩展，提供了 `map`\
  \ 函数的重载版本，允许我们在 `map` 运算符中处理最多三个键路径。\n\n```\nprivate lazy var isPasswordEmptyPublisher:\n\
  AnyPublisher =\n{\n$password\n.map(\\.isEmpty)\n.eraseToAnyPublisher()\n}()\n```\n\
  \n接下来，我们将比较密码和密码确认字段，以确保用户两次输入的密码一致。`$password` 和 `$passwordConfirmation` 都是已发布的属性，因此我们可以订阅它们，以便在用户输入密码时接收事件。\n\
  \n但我们如何获取最新的密码和最新确认的密码呢？\n\nCombine 提供了许多运算符，允许我们在同一条管道中组合多个发布者。`Publishers.CombineLatest`\
  \ 允许我们使用两个上游发布者发送的最新事件。以下代码片段订阅了 `$password` 和 `$passwordConfirmation`，并使用相等运算符\
  \ `==` 比较它们的最新输出（即用户输入到密码字段中的文本）：\n\n```\nprivate lazy var isPasswordMatching:\n\
  AnyPublisher =\n{\nPublishers.CombineLatest($password, $passwordConfirmation)\n\
  .map(==)\n.eraseToAnyPublisher()\n}()\n```\n\n你会注意到我使用了 `map` 运算符的键路径版本——闭包版本看起来像这样：`map\
  \ { $0 == $1 }`。使用哪种主要取决于风格和个人偏好。\n\n现在我们已经能够判断密码是否为空，以及密码和确认密码是否匹配，接下来需要确定密码的总体有效性：如果密码不为空且与确认密码匹配，则密码有效。\n\
  \n你可能已经猜到了：我们将使用 `Publishers.CombineLatest` 将 `isPasswordEmptyPublisher` 和 `isPasswordMatchingPublisher`\
  \ 的最新状态组合成另一个发布者，命名为 `isPasswordValidPublisher`：\n\n```\nprivate lazy var isPasswordValidPublisher:\n\
  AnyPublisher =\n{\nPublishers.CombineLatest(\nisPasswordEmptyPublisher,\nisPasswordMatchingPublisher\n\
  )\n.map { !$0 && $1 }\n.eraseToAnyPublisher()\n}()\n```\n\n至此，这段代码应该看起来很熟悉了。为了显示有意义的验证消息，请将以下代码添加到视图模型的初始化器中：\n\
  \n```\nPublishers.CombineLatest(\nisPasswordEmptyPublisher,\nisPasswordMatchingPublisher\n\
  )\n.map { isPasswordEmpty, isPasswordMatching in\nif isPasswordEmpty {\nreturn \"\
  密码不能为空\"\n}\nelse if !isPasswordMatching {\nreturn \"两次输入的密码不匹配\"\n}\nreturn \"\"\
  \n}\n.assign(to: &$passwordMessage)\n```\n\n#### 综合应用\n\n作为最后一步，我们需要将用户名验证和密码验证结合起来，并将结果赋值给视图模型的\
  \ `isValid` 属性。这样，如果表单有效，提交按钮将被启用。\n\n类似于我们计算密码整体验证状态的方式，我们将使用 `Publishers.CombineLatest`\
  \ 基于 `isUsernameLengthValidPublisher` 和 `isPasswordValidPublisher` 来确定表单的整体状态：\n\
  \n```\nprivate lazy var isFormValidPublisher:\nAnyPublisher =\n{\nPublishers.CombineLatest(\n\
  isUsernameLengthValidPublisher,\nisPasswordValidPublisher\n)\n.map { $0 && $1 }\n\
  .eraseToAnyPublisher()\n}()\n```\n\n在视图模型的初始化器中，替换第一行（仅使用 `isUsernameLengthValidPublisher`\
  \ 的那行），改用 `isFormValidPublisher` 来驱动提交按钮的状态：\n\n```\ninit() {\nisFormValidPublisher\n\
  .assign(to: &$isValid)\nisUsernameLengthValidPublisher\n.map {\n$0 ? \"\"\n: \"\
  用户名太短。需要至少 3 个字符。\"\n}\n.assign(to: &$usernameMessage)\nPublishers.CombineLatest(\n\
  isPasswordEmptyPublisher,\nisPasswordMatchingPublisher\n)\n.map { isPasswordEmpty,\
  \ isPasswordMatching in\nif isPasswordEmpty {\nreturn \"密码不能为空\"\n}\nelse if !isPasswordMatching\
  \ {\nreturn \"两次输入的密码不匹配\"\n}\nreturn \"\"\n}\n.assign(to: &$passwordMessage)\n\
  }\n```\n\n## 练习^(⁷¹)\n\n选择一个强密码并不容易，许多注册表单会提供视觉提示来帮助用户选择强密码。我们的注册表单在这方面相当宽松，允许用户选择任何内容作为密码，这样并不安全。利用你目前学到的知识，鼓励用户选择强密码：\n\
  \n1.  实现密码长度要求：确保用户密码长度至少为 8 个字符。如果少于 8 个字符，在表单密码区域的底部显示警告信息。\n\n2.  验证密码强度，拒绝任何强度不足的密码。一个简单的方法是使用像\
  \ *Navajo-Swift*^(⁷²) 这样的库，它会按 `非常弱`、`弱`、`一般`、`强`、`非常强` 的等级计算强度。确保注册表单仅在用户选择至少达到\
  \ `一般` 强度的密码时才会变为有效。\n\n3.  在密码区域底部添加一个进度条，显示密码强度，并将进度条分别着色为红色、黄色和绿色以指示密码强度。\n\n\
  \n\n## 总结\n\n在本章中，你学会了如何使用 Combine 发布器来驱动具有复杂业务逻辑的 UI 状态，以及如何将应用逻辑分解为更小的 Combine\
  \ 管道，从而保持代码的可管理性。\n\n我们探讨了如何将业务逻辑从 UI 中分离出来，并将其迁移至视图模型中。这有助于保持视图简洁且易于阅读。\n\n接着，你学习了创建\
  \ Combine 管道的几种技巧，以及如何在视图模型中管理它们。对于简单的管道，可以在视图模型的初始化器中创建。当需要复用某个管道时，最好将其移至私有属性中。请记住，应使用惰性计算属性来确保不会创建同一管道的多个实例，从而避免内存浪费以及潜在的多余网络请求。\n\
  \nCombine 提供了丰富的运算符来转换来自上游发布器的输出。在本章中，我们使用了以下运算符：\n\n- `map` 允许我们将一个发布器的输入转换为不同的格式。你看到了如何通过闭包使用\
  \ `map` 来执行更复杂的转换逻辑，或者利用其键路径重载来创建简洁而强大的转换，直接访问输入的属性。\n- `Publishers.CombineLatest`\
  \ 是另一个你会频繁使用的运算符——它会合并多个上游发布器的最新事件，并将其提供给其闭包。你可以把它想象成一个 *Y* 形连接器，允许你连接多个事件流，并将它们转换为一个统一的输出流。\n\
  \n本章初步展示了 Combine 与 SwiftUI 结合的可能性，以及如何使用 Combine 简化 SwiftUI 应用的编写。\n\n在下一章中，我们将转换视角，看看如何利用\
  \ Combine 访问网络，并将远程 API 调用的结果与应用 UI 中的本地事件相结合。\n\n"
- "# 使用 Combine 进行网络请求\n\n我们生活在一个互联的世界里，大多数现代应用都需要访问网络来检索存储在互联网（或用户本地网络）服务器上的信息。\n\
  \n即使在超高速连接上，一个请求通常也需要几毫秒。在应用的前台线程中使用阻塞式 I/O 并等待响应是不可取的，因为这会导致应用冻结，从而带来极差的用户体验。用户可能会以为你的应用已崩溃而将其关闭。为防止这种行为，我们需要将异步工作卸载到后台线程，这样前台线程就能自由地执行\
  \ UI 更新并响应用户交互。这就是为什么现代网络 API 必须以异步方式调用的原因。\n\n在 Swift 中实现异步 API 最流行的方法是使用*回调*。这些通常以闭包的形式实现，得益于\
  \ Swift 的尾随闭包语法，一旦你理解了它们的工作原理，它们看起来相当优雅且易于使用。\n\n调用异步 API 的其他方式包括 *async/await*\
  \ 和 *Combine*。在本章中，我们将深入探讨如何使用 Combine 为你的应用实现网络层。我们首先会介绍使用 `URLSession` 从网络获取数据的传统回调驱动方式。然后，我们将重构这段代码，以利用\
  \ Combine 的 `DataTaskPublisher`。你将学习 Combine 如何使数据映射和错误处理变得更加容易，从而产生更易读且更少 bug 的代码。在第\
  \ 14 章和第 15 章中，你将学习如何使用 `async/await` 执行异步调用，并将探讨 Combine 与 `async/await` 之间的区别。\n\
  \n保持应用的用户界面与应用状态的同步一直是个难题，开发社区也提出了大量方法来解决这一挑战。\n\n响应式编程就是其中一种方法，而 SwiftUI 的响应式状态管理通过引入*数据源*（source\
  \ of truth）的概念使这一点变得容易得多。这个数据源可以使用 SwiftUI 的属性包装器（如 `@EnvironmentObject`、`@StateObject`\
  \ 和 `@ObservedObject`）在应用中共享。\n\n这个*数据源*通常就是你的内存数据模型，将本地数据源与网络结合起来听起来可能很复杂。在本章中，你将学习如何使用\
  \ Combine 来将本地数据源与远程服务的数据结合起来，这可能会比你想象的简单得多。\n\n你将首先学习如何将网络驱动的 Combine 管道连接到 SwiftUI\
  \ 用户界面。接着，我们将优化实现，以确保你的应用不会让你的后端服务器不堪重负。Combine 提供了一些运算符，能帮助我们显著减少应用发送到服务器的请求数量。这也会改善你应用的用户体验，让你不禁惊叹以往没有\
  \ Combine 的日子是怎么过来的。\n\n让我们开始吧，首先探讨如何使用 Combine 从服务器获取数据，并将结果映射到 Swift 的 `struct`。\n\
  \n\n\n## 使用 URLSession 获取数据\n\n我们将继续构建上一章开始设计的注册表单。假设其中一项需求是检查用户偏好的用户名是否仍然可用。\n\n\
  这要求我们与授权服务器通信，以确认所需的用户名是否已被他人占用。以下是一个请求示例，展示了我们如何尝试查询用户名 `sjobs` 是否可用：\n\n```\n\
  GET localhost:8080/isUserNameAvailable?userName=sjobs HTTP/1.1\n```\n\n服务器将回复一个简短的\
  \ JSON 文档，说明该用户名是否仍可用：\n\n```\nHTTP/1.1 200 OK\ncontent-type: application/json;\
  \ charset=utf-8\ncontent-length: 39\nconnection: close\ndate: Thu, 06 Jan 2022 16:09:08\
  \ GMT\n{\"isAvailable\":false, \"userName\":\"sjobs\"}\n```\n\n要在 Swift 中执行此请求，我们可以使用\
  \ `URLSession`。使用 `URLSession` 从网络获取数据的传统方式如下所示：\n\n```\nfunc checkUserNameAvailableOldSchool(userName:\
  \ String, completion: @escaping (Result) -> Void) {\n    guard let url = URL(string:\
  \ \"http://localhost:8080/isUserNameAvailable?userName=\\(userName)\") else {\n\
  \        completion(.failure(.invalidRequestError(\"URL invalid\")))\n        return\n\
  \    }\n    let task = URLSession.shared.dataTask(with: url) { data, response, error\
  \ in\n        if let error = error {\n            completion(.failure(.transportError(error)))\n\
  \            return\n        }\n        if let response = response as? HTTPURLResponse,\
  \ !(200...299).contains(response.statusCode) {\n            completion(.failure(.serverError(statusCode:\
  \ response.statusCode)))\n            return\n        }\n        guard let data\
  \ = data else {\n            completion(.failure(.noData))\n            return\n\
  \        }\n        do {\n            let decoder = JSONDecoder()\n            let\
  \ userAvailableMessage = try decoder.decode(UserNameAvailableMessage.self, from:\
  \ data)\n            completion(.success(userAvailableMessage.isAvailable))\n  \
  \      } catch {\n            completion(.failure(.decodingError(error)))\n    \
  \    }\n    }\n    task.resume()\n}\n```\n\n虽然这段代码运行良好，本身也没有什么问题，但它确实存在几个问题：\n\n\
  1.  成功路径并不一目了然——唯一返回成功结果的位置相当隐蔽。\n\n2.  对于不熟悉完成处理程序的开发者来说，成功路径甚至没有使用 `return` 语句将网络调用的结果返回给调用者，这可能会让人感到困惑。\n\
  \n3.  错误处理分散在各处。\n\n4.  存在多个出口点，很容易忘记在 `if let` 条件中写某个 `return` 语句。\n\n5.  总体而言，即使对于经验丰富的\
  \ Swift 开发者，这段代码也难以阅读和维护。\n\n6.  很容易忘记调用 `resume()` 来实际执行请求。我确信我们大多数人在使用 `URLSession`\
  \ 时都曾疯狂地寻找 bug，最后才发现忘了使用 `resume` 来启动请求。是的，我认为对于本应*发送*请求的 API 来说，`resume` 并非一个很合适的名称。\n\
  \n**运行代码示例**\n\n*你可以在随附的 GitHub 仓库中找到所有代码示例，位于* `Networking` *文件夹中。为了让你能更好地受益，我还在*\
  \ `server` *子文件夹中提供了一个演示服务器（使用 Vapor 构建）。要在你的机器上运行它，请执行以下操作：*\n\n```\n$ cd server\n\
  $ swift run\n```\n\n## 使用 Combine 获取数据\n\n在引入 Combine 时，Apple 为许多自己的异步 API 添加了发布者。开发者现在可以使用这些发布者来替换现有的、基于回调的代码。\n\
  \n重构后的代码具有更少的出口点，遵循线性流程，因此更易于阅读和维护。它也不太容易出现隐蔽的 bug。\n\n为了更好地理解这意味着什么，让我们看看之前的（基于回调的）代码片段在使用\
  \ Combine 重构后是什么样子：\n\n```\nfunc checkUserNameAvailableNaive(userName: String) ->\
  \ AnyPublisher {\n    guard let url = URL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
  (userName)\") else {\n        return Just(false).eraseToAnyPublisher()\n    }\n\
  \    return URLSession.shared.dataTaskPublisher(for: url)\n        .map { data,\
  \ response in\n            do {\n                let decoder = JSONDecoder()\n \
  \               let userAvailableMessage = try decoder.decode(UserNameAvailableMessage.self,\
  \ from: data)\n                return userAvailableMessage.isAvailable\n       \
  \     } catch {\n                return false\n            }\n        }\n      \
  \  .replaceError(with: false)\n        .eraseToAnyPublisher()\n}\n```\n\n让我们逐步分析这段代码：\n\
  \n1.  我们使用 `dataTaskPublisher` 来执行请求。这个发布者是一个一次性发布者，会在请求的数据到达后发出一个事件。值得记住的是，如果没有订阅者，Combine\
  \ 发布者不会执行任何工作。这意味着，在添加至少一个订阅者之前，该发布者不会对给定的 URL 执行任何调用。稍后我将向你展示如何将这个管道连接到 UI，并确保每次用户在用户名字段中输入文本时都会调用它。\n\
  \n2.  一旦请求返回，发布者会发出一个包含 `data` 和 `response` 的值。在这一行，我们使用 `map` 运算符来转换这个结果。如你所见，除了少数细微的变化外，我们可以复用之前版本代码中的大部分数据映射代码。\n\
  \n3.  我们不再调用 `completion` 闭包，而是返回一个 `Boolean` 值来指示用户名是否仍然可用。这个值将沿管道向下传递。\n\n4. \
  \ 如果数据映射失败，我们会捕获错误并返回 `false`，这似乎是一个不错的折中方案。\n\n5.  对于访问网络时可能发生的任何错误，我们也进行同样的处理。这是一个简化的做法，将来可能需要重新审视。\n\
  \n另外请注意，（除了确保我们拥有有效 URL 的 `guard` 语句外）这里只有*一个*出口点。\n\n这看起来比最初版本好多了，也更容易阅读。我们完全可以就此打住，在应用中使用这段代码。\n\
  \n但我们可以做得更好。在接下来的三个小节中，我们将探讨一些能使代码更加线性且更易于推理的改动。\n\n#### 使用键路径解构元组\n\n我们经常需要从变量中提取特定属性。在前面的代码中，`dataTaskPublisher`\
  \ 返回一个包含我们所发送 URL 请求的 `data` 和 `response` 的结果。从 `DataTaskPublisher` 的声明中可以看出，结果的类型是一个元组：\n\
  \n```\npublic struct DataTaskPublisher : Publisher {\n    /// 该发布者发布的值的类型。\n   \
  \ public typealias Output = (data: Data, response: URLResponse)\n    ...\n}\n```\n\
  \n从元组中提取各个元素称为*解构*。Combine 提供了一个重载版本的 `map` 运算符，允许我们解构元组并只访问我们关心的属性：\n\n```\nreturn\
  \ URLSession.shared.dataTaskPublisher(for: url)\n    .map(\\.data)\n```\n\n####\
  \ 映射数据\n\n由于映射数据是一项非常常见的任务，Combine 为此提供了一个专用的运算符 `decode(type:decoder:)`，使其更简单：\n\
  \n```\nreturn URLSession.shared.dataTaskPublisher(for: url)\n    .map(\\.data)\n\
  \    .decode(type: UserNameAvailableMessage.self, decoder: JSONDecoder())\n```\n\
  \n这将从上游发布者提取 `data` 值，并将其解码为 `UserNameAvailableMessage` 实例。\n\n最后，我们可以再次使用 `map`\
  \ 运算符来解构 `UserNameAvailableMessage` 并访问其 `isAvailable` 属性：\n\n```\nreturn URLSession.shared.dataTaskPublisher(for:\
  \ url)\n    .map(\\.data)\n    .decode(type: UserNameAvailableMessage.self, decoder:\
  \ JSONDecoder())\n    .map(\\.isAvailable)\n```\n\n\n\n#### 使用 Combine 简化数据获取\n\n\
  经过上述所有修改，我们现在拥有一个易于阅读且流程线性的管道版本：\n\n```\nclass AuthenticationService {\n    func\
  \ checkUserNameAvailable(userName: String) -> AnyPublisher<Bool, Never> {\n    \
  \    guard let url = URL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
  (userName)\") else {\n            return Just(false).eraseToAnyPublisher()\n   \
  \     }\n        return URLSession.shared.dataTaskPublisher(for: url)\n        \
  \    .map(\\.data)\n            .decode(type: UserNameAvailableMessage.self, decoder:\
  \ JSONDecoder())\n            .map(\\.isAvailable)\n            .replaceError(with:\
  \ false)\n            .eraseToAnyPublisher()\n    }\n}\n```\n\n最好将此代码与任何其他直接与身份验证服务器通信的代码一起保存在一个独立的类型中。像这样模块化代码有助于我们保持代码库的整洁有序。\n\
  \n#### 连接到 UI\n\n现在，让我们看看如何将这个新的 Combine 管道集成到我们在上一章开始的注册表单中。\n\n以下是注册表单的简化版本。我删除了一些代码，以免分散你在本章中的注意力。在本章的讨论中，我们只关心用户名字段、用于显示消息的\
  \ `Text` 标签以及一个注册按钮。我已注释掉上一章讨论的密码字段的代码。\n\n```\nstruct SignUpForm: View {\n    @StateObject\
  \ private var viewModel = SignUpFormViewModel()\n    var body: some View {\n   \
  \     Form {\n            // 用户名\n            Section {\n                TextField(\"\
  用户名\", text: $viewModel.username)\n                    .autocapitalization(.none)\n\
  \                    .disableAutocorrection(true)\n            } footer: {\n   \
  \             Text(viewModel.usernameMessage)\n                    .foregroundColor(.red)\n\
  \            }\n            // （为简洁起见，已移除密码字段的代码）\n            // 提交按钮\n       \
  \     Section {\n                Button(\"注册\") {\n                    print(\"\
  正在以 \\(viewModel.username) 注册\")\n                }\n                .disabled(!viewModel.isValid)\n\
  \            }\n        }\n    }\n}\n```\n\n以下是视图模型中与我们讨论相关的部分——同样，为简单起见，已删除了上一章中的部分代码。\n\
  \n```\nclass SignUpScreenViewModel: ObservableObject {\n    private var authenticationService\
  \ = AuthenticationService()\n    // MARK: 输入\n    @Published var username: String\
  \ = \"\"\n    // MARK: 输出\n    @Published var usernameMessage: String = \"\"\n \
  \   @Published var isValid: Bool = false\n    ...\n}\n```\n\n由于 `@Published` 属性是\
  \ Combine 发布者，我们可以订阅它们，以便在其值发生变化时接收更新。\n\n这将使我们能够获取用户的最新输入，并将其传递给 `checkUserNameAvailable`\
  \ 发布者，以查看该用户名是否仍然可用。\n\n为了将事件从一个发布者传递到另一个发布者，我们可以使用 `flatMap` 操作符：\n\n```\n$username\n\
  \    .flatMap { username -> AnyPublisher<Bool, Never> in\n        self.authenticationService.checkUserNameAvailable(userName:\
  \ username)\n    }\n```\n\n![](img/509862_1_En_9_Fig1_HTML.png)\n\n一个包含 3 个字段的注册表单截图链接到两个区块。一个区块中给出了表单模型模板和每个字段的字符类型。下一个区块中则展示了通过输出表和失败表检查用户名可用性的过程。\n\
  \n**图 9-1** 调用身份验证服务检查用户名是否可用的 Combine 管道\n\n此管道从 `username` 发布者获取输入事件（即用户在*用户名*文本输入字段中输入的内容），并将其发送到\
  \ `checkUserNameAvailable` 发布者。该发布者将为每个输入事件返回一个 `Bool` 值，指示相应的用户名是否仍然可用。这意味着订阅者将收到一个\
  \ `Bool` 值流。\n\n我们希望使用此管道的结果来驱动注册表单的状态：只要管道返回 `true` 表示所选用户名可用，我们就希望启用*提交*按钮。同时，一旦管道结果为\
  \ `false`，我们希望显示一条错误消息。\n\n这意味着我们需要向管道添加两个不同的订阅者：*提交*按钮的启用状态和错误消息标签的文本。\n\n为了节省内存并避免浪费\
  \ CPU 周期，让我们使管道可重用。实现此目的的一种方法是将其包装在惰性计算属性中。惰性计算属性只计算一次，并且仅在访问时计算。\n\n提醒一下，惰性计算属性的一般形式如下：\n\
  \n```\nlazy var propertyName: Type = {\n    // 在闭包内计算属性的值\n}() // <- 不要忘记括号\n```\n\
  \n使用惰性计算属性可确保管道只被实例化一次，从而确保我们为每个订阅者使用相同的实例。\n\n```\nprivate lazy var isUsernameAvailablePublisher:\n\
  \    Publishers.FlatMap<AnyPublisher<Bool, Never>, Published<String>.Publisher>\
  \ = {\n    $username\n        .flatMap { username in\n            self.authenticationService\n\
  \                .checkUserNameAvailable(userName: username)\n        }\n}()\n```\n\
  \n此时，管道的结果类型是 `Publishers.FlatMap<AnyPublisher<Bool, Never>, Published<String>.Publisher>`。这不仅难以阅读，而且在调用代码中使用也很困难。为了避免使用如此复杂的签名，Combine\
  \ 提供了 `eraseToAnyPublisher` 操作符，它允许我们将管道的类型擦除为 `AnyPublisher<Type, Error>`。通过将此操作符附加到管道的末尾，我们将管道的类型擦除为\
  \ `AnyPublisher<Bool, Never>`——使用起来更加方便。\n\n```\nprivate lazy var isUsernameAvailablePublisher:\n\
  \    AnyPublisher<Bool, Never> = {\n    $username\n        .flatMap { username in\n\
  \            self.authenticationService\n                .checkUserNameAvailable(userName:\
  \ username)\n        }\n        .eraseToAnyPublisher()\n}()\n```\n\n下一步，我们将把 `isUsernameAvailablePublisher`\
  \ 的结果连接到 UI。看一下视图模型：我们在视图模型的输出部分有两个属性——一个用于与用户名相关的任何消息，另一个保存表单的整体验证状态。\n\nCombine\
  \ 发布者可以连接到多个订阅者，因此我们可以将 `isValid` 和 `usernameMessage` 都连接到 `isUsernameAvailablePublisher`：\n\
  \n```\nclass SignUpScreenViewModel: ObservableObject {\n    ...\n    init() {\n\
  \        isUsernameAvailablePublisher\n            .assign(to: &$isValid)\n    \
  \    isUsernameAvailablePublisher\n            .map {\n                $0 ? \"\"\
  \ : \"用户名不可用。请尝试其他用户名。\"\n            }\n            .assign(to: &$usernameMessage)\n\
  \    }\n}\n```\n\n使用这种方法，我们可以重用 `isUsernameAvailablePublisher`，并用它来驱动表单的整体 `isValid`\
  \ 状态（这将启用/禁用*提交*按钮）和 `usernameMessage` 标签，该标签通知用户他们选择的用户名是否仍然可用。\n\n确保演示服务器正在运行，启动应用程序，并尝试输入几个不同的用户名。演示服务器有一个硬编码的用户名列表，它将这些用户名视为不可用，因此请尝试以下用户名，看看我们迄今为止开发的\
  \ Combine 管道如何驱动 UI：`peterfriese`、`johnnyappleseed`、`page`、`johndoe`。\n\n在输入时观察服务器的控制台输出，你会注意到一些事情：\n\
  \n1.  每输入一个字符，API 端点就会被调用多次。\n2.  Xcode 会提示你不应该在后台线程更新 UI。\n\n让我们看看这些问题，并尝试了解如何修复它们。\n\
  \n\n\n## 处理多线程\n\n在构建访问网络的 Combine 管道时，你可能会在 Xcode 的控制台输出中看到类似如下的错误信息：\n\n```\n\
  [SwiftUI] 不允许从后台线程发布更改；请确保在主线程上（通过诸如 receive(on:) 之类的操作符）发布模型更新。\n```\n\n有时候，^(⁷⁴)\
  \ Xcode 会在代码编辑器中显示紫色警告，从而更容易定位有问题的代码段。\n\n出现此错误信息的原因是 `URLSession` 会在后台线程执行网络请求。当请求完成后，`dataTaskPublisher`\
  \ 会将包含请求结果的事件发送到管道中。我们的代码会获取此结果，将其映射到 UI 所需的数据类型，并赋值给视图模型的某个已发布属性。这反过来会提示 SwiftUI\
  \ 用属性的新值更新 UI。\n\n所有这些操作都发生在同一个线程——一个后台线程上。然而，不推荐从后台线程访问 UI，这就是 SwiftUI 发出警告的原因。\n\
  \n要防止这种情况发生，我们需要指示 Combine 在收到网络请求结果后切换到前台线程。为了告诉 Combine 在特定线程上接收事件，我们可以使用 `receive(on:)`\
  \ 操作符：\n\n```\nprivate lazy var isUsernameAvailablePublisher:\nAnyPublisher =\n\
  {\n$username\n.flatMap { username -> AnyPublisher in\nself.authenticationService\n\
  .checkUserNameAvailable(userName: username)\n}\n.receive(on: DispatchQueue.main)\n\
  .eraseToAnyPublisher()\n}()\n```\n\n我们将在关于 Combine 调度器的章节中深入探讨线程问题，但目前，这行代码可以解决我们的线程问题。\n\
  \n## 优化网络访问\n\n由于大多数地方都提供了高速、低延迟的互联网，我们很容易忘记并非所有用户在使用我们的应用时都处于快速、低延迟的网络连接中。即使在汉堡或伦敦这样的城市，你也会发现一些网络信号不佳或完全没有连接的区域。\n\
  \n在构建访问互联网的应用时，我们应该注意到这一点，并确保不浪费带宽。\n\n当运行应用并检查测试服务器的日志时，你会看到，每输入一个字符，`isUserNameAvailable`\
  \ 端点就被调用多次。这显然不理想：不仅浪费了我们服务器上的 CPU 周期（如果你使用的是按调用次数或 CPU 运行时间收费的云服务提供商，这可能成为一个问题），还意味着我们为应用增加了额外的网络开销。\n\
  \n当你在本地运行测试服务器时可能几乎注意不到这一点，但当你通过 Edge 连接与远程服务器实例通信时，就一定会察觉。\n\n如果你的 API 端点不是**幂等**的，问题就会变得更糟：想象一下调用一个用于预订座位或购买音乐会门票的\
  \ API 端点。发送两个（或更多）请求而不是一个，会导致你预订了超出需求的座位，或者购买了超出想要的音乐会门票。\n\n### 查找根本原因\n\n首先，我们需要找出是什么导致了所有这些额外的请求。\n\
  \n了解 Combine 管道中发生了什么的一个简单方法是添加一些调试代码。让我们在管道中添加 `print()` 操作符：\n\n```\nprivate lazy\
  \ var isUsernameAvailablePublisher:\nAnyPublisher =\n{\n$username\n.print(\"username\"\
  )\n.flatMap { username -> AnyPublisher in\nself.authenticationService\n.checkUserNameAvailable(userName:\
  \ username)\n}\n.receive(on: DispatchQueue.main)\n.eraseToAnyPublisher()\n}()\n\
  ```\n\n此操作符会将一些有用的信息记录到控制台：\n\n1. 管道的任何生命周期事件（例如，添加订阅）\n2. 任何发送/接收的值\n\n我们可以指定一个前缀（`\"\
  username\"`）来使日志语句在控制台中更加突出。\n\n重新运行应用后，我们立即看到以下输出——即使在文本字段中未输入任何内容：\n\n```\nusername:\
  \ receive subscription: (PublishedSubject)\nusername: request unlimited\nusername:\
  \ receive value: ()\nusername: receive subscription: (PublishedSubject)\nusername:\
  \ request unlimited\nusername: receive value: ()\n```\n\n这表明我们的发布者有两个订阅者！\n\n查看我们的代码，可以在视图模型的初始化器中找到这些订阅者：\n\
  \n```\ninit() {\nisUsernameAvailablePublisher\n.assign(to: &$isValid)\nisUsernameAvailablePublisher\n\
  .map {\n$0 ? \"\"\n: \"用户名不可用。请尝试其他用户名。\"\n}\n.assign(to: &$usernameMessage)\n}\n\
  ```\n\n第一个订阅者是用于填充 `isValid` 属性的管道，我们最终用它来启用/禁用注册表单上的提交按钮。\n\n第二个订阅者是当所选用户名不可用时生成错误消息的管道。此管道的结果也会显示在注册表单上。\n\
  \n每当用户输入一个字符时，`isUsernameAvailablePublisher` 管道都需要处理 `username` 字段的当前值，以便最终将结果赋值给订阅者。\n\
  \n对于本地运行的管道来说，这没什么大不了的（尽管我们应该尽量减少 CPU 周期的浪费），但对于像我们这样访问网络的管道来说，这就成为了一个更大的问题。\n\n\
  现在我们已经确定了导致发布者有多个订阅的原因，让我们看看如何解决这个问题。\n\n\n\n### 使用 `share` 操作符共享发布者\n\n单个发布者拥有多个订阅者是常见的模式，尤其是在\
  \ UI 开发中，一个 UI 元素可能会影响多个其他视图。\n\n如果你需要与多个订阅者共享发布者的结果，可以使用 `share()` 操作符。根据苹果的文档：\n\
  \n> 此操作符返回的发布者支持多个订阅者，所有订阅者都会从上游发布者接收到未更改的元素和完成状态。\n\n这正是我们所需要的。通过在 `isUsernameAvailablePublisher`\
  \ 管道的末尾应用 `share` 操作符，我们将每个事件（即用户在用户名字段中输入的每个字符）的管道结果与发布者的所有订阅者共享：\n\n```\nprivate\
  \ lazy var isUsernameAvailablePublisher:\nAnyPublisher =\n{\n$username\n.print(\"\
  username\")\n.flatMap { username -> AnyPublisher in\nself.authenticationService\n\
  .checkUserNameAvailable(userName: username)\n}\n.receive(on: DispatchQueue.main)\n\
  .share()\n.eraseToAnyPublisher()\n}()\n```\n\n运行更新后的代码，我们可以看到 `$username` 发布者不再有两个订阅者，而只有一个：\n\
  \n```\nusername: receive subscription: (PublishedSubject)\nusername: request unlimited\n\
  username: receive value: ()\n```\n\n现在，你可能会好奇为什么只有一个订阅者，因为我们显然仍然有两个已发布的属性（`isValid`\
  \ 和 `usernameMessage`）订阅了该管道。\n\n答案很简单：`share` 操作符本质上就是这个唯一的订阅者，而 `isValid` 和 `isUsernameAvailablePublisher`\
  \ 则是订阅了它。为了证明这一点，让我们在管道中再添加一个 `print()` 操作符：\n\n```\nprivate lazy var isUsernameAvailablePublisher:\n\
  AnyPublisher =\n{\n$username\n.print(\"username\")\n.flatMap { username -> AnyPublisher\
  \ in\nself.authenticationService\n.checkUserNameAvailable(userName: username)\n\
  }\n.receive(on: DispatchQueue.main)\n.share()\n.print(\"share\")\n.eraseToAnyPublisher()\n\
  }()\n```\n\n在生成的输出中，我们可以看到 `share` 收到了两个订阅 (1, 2)，而 `username` 只收到了一个 (3)：\n\n```\n\
  share: receive subscription: (Multicast)           // (1)\nshare: request unlimited\n\
  username: receive subscription: (PublishedSubject) // (3)\nusername: request unlimited\n\
  username: receive value: ()\nshare: receive subscription: (Multicast)          \
  \ // (2)\nshare: request unlimited\nshare: receive value: (true)\nshare: receive\
  \ value: (true)\n```\n\n你可以将 `share()` 想象成一个分叉点，它从其上游发布者接收事件，然后将这些事件多播给它的所有订阅者。\n\
  \n**这是一个错误还是一个特性？**\n\n*继续在用户名字段中输入几个字符，你会发现每输入一个字符，仍然会向服务器发出两个请求。*\n\n*这可能是 iOS\
  \ 15 中的一个问题——我对此进行了一些调试，看起来 `TextField` 会重复发出每一次按键。在较早版本的 iOS 中，情况并非如此，我倾向于认为这是\
  \ iOS 15 中的一个错误，因此我创建了一个示例项目来重现此问题（参见 AppleFeedback/FB9826727 at main · peterfriese/AppleFeedback\
  \ (*[`github.com/peterfriese/AppleFeedback/tree/main/FB9826727`](https://github.com/peterfriese/AppleFeedback/tree/main/FB9826727)*)），并向\
  \ Apple 提交了一个反馈（FB9826727）。*\n\n*如果你也认为这是一个回归问题，请考虑也提交一个反馈——一个 bug 收到的重复报告越多，它就越有可能被解决。*\n\
  \n### 使用 `debounce` 进一步优化用户体验\n\n在构建与远程系统通信的 UI 时，我们需要记住，用户打字的速度通常比系统提供反馈的速度要快得多。\n\
  \n例如，在选择用户名时，我通常会一口气输入我最喜欢的用户名，而不会在中间停下来。我不关心这个用户名的前几个字母是否可用——我关心的是完整的名字。每按一次键就将不完整的用户名发送到服务器并没有太大意义，而且似乎非常浪费。\n\
  \n为了避免这种情况，我们可以使用 Combine 的 `debounce` 操作符：它会丢弃所有事件，直到出现一个暂停。然后它会将最近的事件传递给下游的发布者：\n\
  \n```\nprivate lazy var isUsernameAvailablePublisher:\nAnyPublisher =\n{\n$username\n\
  .debounce(for: 0.8, scheduler: DispatchQueue.main)\n.print(\"username\")\n.flatMap\
  \ { username -> AnyPublisher in\nself.authenticationService\n.checkUserNameAvailable(userName:\
  \ username)\n}\n.receive(on: DispatchQueue.main)\n.share()\n.print(\"share\")\n\
  .eraseToAnyPublisher()\n}()\n```\n\n通过这样做，我们告诉 Combine 忽略所有对 `username` 的更新，直到出现\
  \ 0.8 秒的暂停，然后将最新的 `username` 发送给管道上的下一个操作符（在本例中是 `print` 操作符，然后它会将事件传递给 `flatMap`\
  \ 操作符）。\n\n这更符合正常的用户输入行为，并将使应用程序向服务器发送更少的请求。\n\n### 使用 `removeDuplicates` 避免重复发送相同请求\n\
  \n你是否曾和某人说话，把同一个问题问了两遍？这会有点尴尬，对方可能会怀疑你是否在认真听他们说话。\n\n现在，尽管人工智能在进步，但我确信计算机没有情感，所以如果你两次发送相同的\
  \ API 请求，它们不会记仇。但为了给用户提供尽可能好的体验，我们应该尽可能避免发送重复的请求。\n\nCombine 为此提供了一个操作符：`removeDuplicates`——如果事件流中的事件是*连续*出现的，它将移除所有重复的事件。\n\
  \n这与 `debounce` 操作符配合得非常好，我们可以将这两个操作符结合使用（抱歉，我想你只能忍受这个双关语了），对我们的用户名可用性检查进行一些进一步的优化：\n\
  \n```\nprivate lazy var isUsernameAvailablePublisher:\nAnyPublisher =\n{\n$username\n\
  .debounce(for: 0.8, scheduler: DispatchQueue.main)\n.removeDuplicates()\n.print(\"\
  username\")\n.flatMap { username -> AnyPublisher in\nself.authenticationService\n\
  .checkUserNameAvailable(userName: username)\n}\n.receive(on: DispatchQueue.main)\n\
  .share()\n.print(\"share\")\n.eraseToAnyPublisher()\n}()\n```\n\n它们一起工作，可以进一步减少在用户输入错误然后更正拼写时，我们发送到服务器的请求数量。\n\
  \n让我们来看一个例子：\n\n```\njonyive [暂停] s [退格键]\n```\n\n这将发送以下请求：\n\n1.  `jonyive`\n\n\
  2.  不发送 `jonyives` 的请求（因为在去抖动超时之前，`s` 已经被删除了）\n\n3.  不发送第二个 `jonyive` 的请求，因为它被 `removeDuplicates`\
  \ 过滤掉了\n\n这只是一个微小的改变，影响可能不大——但积少成多。\n\n\n\n## 整合所有内容\n\n在上一章中，我们实现了一个检查，确保用户名至少包含三个字符。为了验证用户名长度是否达标且仍可使用，我们需要结合\
  \ `isUsernameLengthPublisher` 和 `isUsernameAvailablePublisher`。就像我们之前做的那样，可以使用 `Publishers.CombineLatest()`\
  \ 来实现这一点。\n\n让我们创建一个新的发布器 `isUsernameValidPublisher`，它用于合并 `isUsernameLengthValidPublisher`\
  \ 和 `isUsernameAvailablePublisher` 发送的事件：\n\n```swift\nenum UserNameValid {\n  \
  \  case valid\n    case tooShort\n    case notAvailable\n}\nprivate lazy var isUsernameValidPublisher:\n\
  \    AnyPublisher =\n{\n    Publishers.CombineLatest(\n        isUsernameLengthValidPublisher,\
  \ isUsernameAvailablePublisher\n    )\n    .map { longEnough, available in\n   \
  \     if !longEnough {\n            return .tooShort\n        }\n        if !available\
  \ {\n            return .notAvailable\n        }\n        return .valid\n    }\n\
  \    .share()\n    .eraseToAnyPublisher()\n}()\n```\n\n引入 `UserNameValid` 枚举有助于我们向管道的订阅者返回语义明确的结果。\n\
  \n为了使用这个新的发布器，我们需要相应地更新 `isFormValidPublisher`：\n\n```swift\nprivate lazy var isFormValidPublisher:\n\
  \    AnyPublisher =\n{\n    Publishers.CombineLatest(\n        isUsernameValidPublisher,\n\
  \        isPasswordValidPublisher\n    )\n    .map { ($0 == .valid) && $1 }\n  \
  \  .eraseToAnyPublisher()\n}()\n```\n\n## 练习\n\n1.  `isUsernameValidPublisher` 效率有些低下：即使用户名太短，它也会向服务器发送请求。尝试通过根据用户名长度来控制管道输出来改进这一点。\n\
  \n2.  改进错误处理。不要将服务器错误映射为用户名不可用，而是让 `checkUsernameAvailable` 返回一个 `Result`。如果成功，结果应包含\
  \ `UserAvailableMessage`，否则包含服务器错误。更新管道逻辑，以便告知用户：由于服务器不可用，我们无法确定用户名是否可用，暂时假定其可用，并在用户实际点击提交按钮时执行最终的可用性检查。\n\
  \n## 总结\n\n在本章中，我向您展示了如何使用 Combine 访问网络，以及如何借此编写相比传统回调驱动代码更易于阅读和维护的线性代码。\n\n我们还探讨了如何通过使用视图模型并将\
  \ Combine 管道附加到 `@Published` 属性上，将发出网络请求的 Combine 管道与 SwiftUI 连接起来。\n\n我们还讨论了 Combine\
  \ 如何能更高效地与远程服务器（或实际上任何异步 API）进行通信。\n\n通过使用 `share` 运算符，我们可以为同一个发布器/管道附加多个订阅者，并避免为每个订阅者都运行耗时/昂贵的处理过程。这在访问比进程内模块（如远程服务器或任何涉及\
  \ I/O 的操作）延迟更高的 API 时尤为有用。\n\n`debounce` 运算符允许我们更高效地处理短时间密集发生的事件，例如用户输入。我们不会处理管道中的每一个事件，而是等待输入暂停，然后仅对最新的事件进行操作。\n\
  \n我们可以使用 `removeDuplicates` 运算符来避免处理重复事件。顾名思义，它会移除任何直接相邻的重复事件，例如当用户添加字符后又删除字符时（这也适用于我们同时使用\
  \ `debounce` 运算符的情况）。\n\n总之，这些运算符可以帮助我们构建更高效的客户端，用于访问远程服务器和其他异步 API。\n\n我们需要花更多时间研究的事情是如何妥善处理错误和其他意外情况。在本章中，我们使用\
  \ `replaceError(with:)` 将所有错误替换为 `nil` 值。这帮助我们解决了燃眉之急，但在实际应用中，我们需要一种更灵活的方式来处理错误。在下一章中，我们将讨论几种实现方法。\n\
  \n脚注 1 2\n\n"
- "# 10. Combine 中的错误处理\n\n作为开发者，我们往往是一群相当乐观的人。至少从我们编写的代码中能看出这种倾向——我们大多数时候关注的是常规路径（happy\
  \ path），而在错误处理上花的时间和精力要少得多。\n\n即使在上一章中，我们也一直在忽略错误处理。事实上，我们基本上忽视了它：我们用默认值替换了所有错误，这对于应用的原型开发来说还可以，但对于任何投入生产的应用来说，这可能不是一个可靠的策略。\n\
  \n在本章中，让我们深入探讨一下如何恰当地处理错误！\n\n我们将继续处理前几章开始构建的注册表单。提醒一下，我们使用 Combine 来验证用户的输入，作为验证的一部分，应用还会调用认证服务器上的一个端点来检查用户选择的用户名是否仍然可用。该端点会根据名称是否仍然可用，返回\
  \ `true` 或 `false`。此外，如果验证用户名时出现任何问题，服务器将返回相应的 HTTP 状态码和一个错误负载。\n\n## 错误处理策略\n\n\
  在我们深入探讨如何处理错误之前，先来讨论几种错误处理策略，以及它们是否适用于我们的场景。\n\n### 忽略错误\n\n乍一听这似乎是个糟糕的主意，但在特定情况下处理某些类型的错误时，这实际上是一个可行的选择。以下是一些例子：\n\
  \n*   用户的设备*暂时*离线，或者有其他原因导致应用无法连接到服务器。\n*   服务器此刻宕机，但*很快*会恢复上线。\n\n在许多情况下，用户可以继续离线工作，一旦设备重新上线，应用就可以与服务器同步。当然，这需要某种支持离线的同步解决方案（如\
  \ Cloud Firestore）^( [75]^(#fn75) )。\n\n最佳实践是向用户提供一些反馈，确保他们理解自己的数据尚未同步。许多应用会显示一个图标（例如，带向上箭头的云朵）来表示同步过程仍在进行中，或者显示一个警告标志，提醒用户需要在上线后手动触发同步。\n\
  \n### 重试（带指数退避）\n\n在其他情况下，忽略错误是不可行的。想象一下热门活动的预订系统：服务器可能会被大量的请求压垮。在这种情况下，我们希望确保系统不会因为用户每隔几秒钟就点击“刷新”而崩溃。相反，我们希望分散重试之间的时间间隔。使用指数退避策略符合用户和系统运营者的最佳利益：运营者可以确保他们的服务器不会因为用户不断刷新页面试图通过而承受更多压力，而用户由于应用自动重试，最终应该能够成功预订。\n\
  \n### 显示错误消息\n\n某些错误需要用户采取行动——例如，如果文档保存失败。在这种情况下，显示一个模态对话框来吸引用户的注意力并询问他们如何进行下一步操作是合适的。对于不太严重的问题，显示一个弹出提示（一种短暂出现然后消失的覆盖层）可能就足够了。\n\
  \n\n\n### 使用错误视图替换整个界面\n\n在某些情况下，用错误 UI 替换整个 UI 可能是合适的。一个著名的例子是 Chrome——当设备离线时，它会显示\
  \ Chrome 小恐龙，让用户知道设备已离线，并通过一款有趣的跳跃奔跑游戏帮助他们度过等待网络恢复的时间。\n\n![](img/509862_1_En_10_Fig1_HTML.png)\n\
  \nChrome 小恐龙游戏的截图。画面中有一只恐龙和路径上的仙人掌，上方有一朵云。右上角的文字显示：H I 00047 00034。\n\n图 10-1\n\n\
  *Chrome 小恐龙游戏*\n\n### 显示内联错误消息\n\n当用户提供的数据无效时，这是一个不错的选择。并非所有输入错误都能通过本地表单验证检测到。例如，一家在线商店可能有一条业务规则，规定价值超过一定金额的货物必须使用特定的运输提供商运送。在客户端应用中实现所有这些业务规则并不总是可行的（可配置的规则引擎可能对此有所帮助），因此我们需要准备好处理这类语义错误。\n\
  \n理想情况下，我们应该在相应的输入字段旁边显示这类错误，以帮助用户提供正确的输入。\n\n## 典型错误条件及处理方法\n\n为了更好地理解如何在实际场景中应用这些方法，让我们为本系列之前创建的注册表单添加一些错误处理。具体来说，我们将处理以下错误条件：\n\
  \n- 设备/网络离线\n- 语义验证错误\n- 响应解析错误/无效 URL\n- 内部服务器错误\n\n> *如果你想跟着操作，可以在本书的 GitHub 仓库*^(⁷⁶)*中找到本章的代码，位于本章对应的文件夹中。*\
  \ *server* *子文件夹包含一个本地服务器，帮助我们模拟我们将覆盖的所有错误条件。*\n\n### 实现一个可能出错的网络 API\n\n在上一章中，我们实现了一个与认证服务器交互的\
  \ `AuthenticationService`。这有助于我们保持一切组织有序且职责分离：\n\n- 视图（`SignUpScreen`）显示状态并接收用户输入。\n\
  - 视图模型（`SignUpScreenViewModel`）持有视图显示的状态。反过来，它使用其他 API 来响应用户的操作。在这个特定应用中，视图模型使用\
  \ `AuthenticationService` 与认证服务器交互。\n- 服务（`AuthenticationService`）与认证服务器交互。其主要职责是将服务器的响应转换为客户端可用的格式。例如，它将\
  \ JSON 转换为 Swift 结构体，并且（与本文最相关的是）处理任何网络层错误，并将其转换为客户端能更好处理的 UI 级错误。\n\n下图概述了各个类型如何协同工作。\n\
  \n![](img/509862_1_En_10_Fig2_HTML.png)\n\n注册屏幕的流程图，随后通过用户名和 JSON 响应连接视图模型、认证服务和服务器。\n\
  \n图 10-2\n\n*构成注册表单的组件*\n\n如果你查看我们在上一章编写的代码，你会注意到 `checkUserNamerAvailablePublisher`\
  \ 的错误类型为 `Never`——这意味着它声称永远不会出现错误。\n\n```\nfunc checkUserNameAvailablePublisher(userName:\
  \ String) -> AnyPublisher { ... }\n```\n\n这是一个相当大胆的声明，尤其是考虑到网络错误非常常见！我们之所以能保证这一点，是因为我们将所有错误替换为返回值\
  \ `false`：\n\n```\nfunc checkUserNameAvailablePublisher(userName: String)\n-> AnyPublisher\
  \ {\nguard let url = URL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
  (userName)\") else {\nreturn Just(false).eraseToAnyPublisher()\n}\nreturn URLSession.shared.dataTaskPublisher(for:\
  \ url)\n.map(\\.data)\n.decode(type: UserNameAvailableMessage.self,\ndecoder: JSONDecoder())\n\
  .map(\\.isAvailable)\n.replaceError(with: false)\n.eraseToAnyPublisher()\n}\n```\n\
  \n要将这个相当宽松的实现转变为能向调用者返回有意义错误消息的形式，我们首先需要更改发布者的错误类型，并停止通过返回 `false` 来掩盖任何错误：\n\n\
  ```\nenum APIError: LocalizedError {\n/// 无效请求，例如无效的 URL\ncase invalidRequestError(String)\n\
  }\nstruct AuthenticationService {\nfunc checkUserNameAvailablePublisher(userName:\
  \ String)\n-> AnyPublisher {\nguard let url =\nURL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
  (userName)\") else {\nreturn Fail(error: APIError.invalidRequestError(\"URL invalid\"\
  ))\n.eraseToAnyPublisher()\n}\nreturn URLSession.shared.dataTaskPublisher(for: url)\n\
  .map(\\.data)\n.decode(type: UserNameAvailableMessage.self,\ndecoder: JSONDecoder())\n\
  .map(\\.isAvailable)\n//      .replaceError(with: false)\n.eraseToAnyPublisher()\n\
  }\n}\n```\n\n我们还引入了一个自定义错误类型 `APIError`。这将使我们能够将 API 内部可能发生的任何错误（无论是网络错误还是数据映射错误）转换为语义丰富的错误，从而在视图模型中更容易处理。\n\
  \n\n\n### 调用 API 并处理错误\n\n既然 API 已经有了失败类型，我们也需要更新调用方。一旦发布者发出失败信号，管线的运行就会终止——除非你捕获了该错误。在使用\
  \ `flatMap` 时，处理错误的典型做法是将其与 `catch` 操作符结合使用：\n\n```\nsomePublisher\n.flatMap { value\
  \ in\n    callSomePotentiallyFailingPublisher()\n        .catch { error in\n   \
  \         return Just(someDefaultValue)\n        }\n}\n.eraseToAnyPublisher()\n\
  ```\n\n将这一策略应用于我们视图模型中的代码，会得到如下代码：\n\n```\nprivate lazy var isUsernameAvailablePublisher:\n\
  \    AnyPublisher =\n{\n    $username\n        .debounce(for: 0.8, scheduler: DispatchQueue.main)\n\
  \        .removeDuplicates()\n        .flatMap { username -> AnyPublisher in\n \
  \           self.authenticationService\n                .checkUserNameAvailablePublisher(userName:\
  \ username)\n                .catch { error in // (1)\n                    return\
  \ Just(false) // (2)\n                }\n                .eraseToAnyPublisher()\n\
  \        }\n        .receive(on: DispatchQueue.main)\n        .share()\n       \
  \ .eraseToAnyPublisher()\n}()\n```\n\n就这样，我们又回到了原点！如果 API 发出失败信号（例如，用户名太短），我们会捕获该错误（1），并将其替换为\
  \ `false`（2）——这和我们之前的行为完全一样。只不过，我们写了更多的代码……\n\n这种方法似乎毫无进展，所以让我们退一步，重新审视一下我们对解决方案的需求：\n\
  \n- 我们希望使用管线发出的值来控制提交按钮的状态，并在所选用户名不可用时显示警告消息。\n- 如果管线发出失败信号，我们希望禁用提交按钮，并在用户名输入框下方的错误标签中显示错误消息。\n\
  - 错误的具体处理方式将取决于失败的类型，我们将在本章后面讨论。\n\n这意味着：\n- 我们需要确保既能接收失败信号，也能接收成功信号\n- 我们需要确保管线在接收到失败信号时不会终止\n\
  \n为了实现这一切，我们将把 `checkUserNameAvailablePublisher` 的结果映射为 `Result` 类型。`Result` 是一个枚举，可以同时捕获\
  \ `success` 和 `failure` 状态。将 `checkUserNameAvailablePublisher` 的结果映射为 `Result`，也意味着管线在发出失败信号时不会再终止。\n\
  \n我们先为 `Result` 类型定义一个类型别名，让生活更轻松一些：\n\n```\ntypealias Available = Result\n```\n\
  \n为了将发布者的结果转换为 `Result` 类型，我们可以使用 John Sundell 在其文章 “The power of extensions in\
  \ Swift”^((77)) 中实现的以下操作符：\n\n```\nextension Publisher {\n    func asResult() ->\n\
  \        AnyPublisher, Never>\n    {\n        self\n            .map(Result.success)\n\
  \            .catch { error in\n                Just(.failure(error))\n        \
  \    }\n            .eraseToAnyPublisher()\n    }\n}\n```\n\n这使得我们可以像这样更新视图模型中的\
  \ `isUsernameAvailablePublisher`：\n\n```\nprivate lazy var isUsernameAvailablePublisher:\n\
  \    AnyPublisher =\n{\n    $username\n        .debounce(for: 0.8, scheduler: DispatchQueue.main)\n\
  \        .removeDuplicates()\n        .flatMap { username -> AnyPublisher in\n \
  \           self.authenticationService\n                .checkUserNameAvailablePublisher(userName:\
  \ username)\n                .asResult()\n        }\n        .receive(on: DispatchQueue.main)\n\
  \        .share()\n        .eraseToAnyPublisher()\n}()\n```\n\n有了这些基本框架，让我们来看看如何处理我之前概述的不同错误场景。\n\
  \n### 处理设备/网络离线错误\n\n在移动设备上，连接不稳定是很常见的情况：尤其是当你移动时，可能会处于信号差或无信号的区域。\n\n是否应该显示错误消息取决于具体情况：\n\
  \n对于我们的用例，我们可以假设用户至少是间歇性联网的。在用户填写表单时，告诉他们无法连接到服务器可能会相当分散注意力。相反，对于表单验证，我们应该忽略任何连接错误（而是运行我们本地的表单验证逻辑）。\n\
  \n一旦用户输入了所有详细信息并提交表单，如果设备仍然离线，我们应该显示错误消息。\n\n捕获这种类型的错误需要我们在两个不同的地方进行修改。首先，在 `checkUserNameAvailablePublisher`\
  \ 中，我们使用 `mapError` 来捕获任何上游错误，并将其转换为 `APIError`：\n\n```\nenum APIError: LocalizedError\
  \ {\n    /// 无效请求，例如无效的 URL\n    case invalidRequestError(String)\n    /// 表示传输层错误，\n\
  \    /// 例如无法连接到服务器\n    case transportError(Error)\n}\n\nstruct AuthenticationService\
  \ {\n    func checkUserNameAvailablePublisher(userName: String)\n        -> AnyPublisher\n\
  \    {\n        guard let url = URL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
  (userName)\") else {\n            return Fail(error: APIError.invalidRequestError(\"\
  URL 无效\"))\n                .eraseToAnyPublisher()\n        }\n        return URLSession.shared.dataTaskPublisher(for:\
  \ url)\n            .mapError { error -> Error in\n                return APIError.transportError(error)\n\
  \            }\n            .map(\\.data)\n            .decode(type: UserNameAvailableMessage.self,\n\
  \                    decoder: JSONDecoder())\n            .map(\\.isAvailable)\n\
  \            .eraseToAnyPublisher()\n    }\n}\n```\n\n然后，在我们的视图模型中，我们映射结果以检测它是否为\
  \ `failure`（1, 2）。如果是，我们提取错误并检查它是否是网络传输错误。如果是这种情况，我们返回一个空字符串（3）来抑制错误消息：\n\n```\n\
  class SignUpScreenViewModel: ObservableObject {\n    // ...\n    init() {\n    \
  \    isUsernameAvailablePublisher\n            .map { result in\n              \
  \  switch result {\n                case .failure(let error): // (1)\n         \
  \           if case APIError.transportError(_) = error {\n                     \
  \   return \"\" // (3)\n                    }\n                    else {\n    \
  \                    return error.localizedDescription\n                    }\n\
  \                case .success(let isAvailable):\n                    return isAvailable\
  \ ? \"\"\n                        : \"此用户名不可用\"\n                }\n           \
  \ }\n            .assign(to: &$usernameMessage) // (4)\n\n        isUsernameAvailablePublisher\n\
  \            .map { result in\n                if case .failure(let error) = result\
  \ { // (2)\n                    if case APIError.transportError(_) = error {\n \
  \                       return true\n                    }\n                   \
  \ return false\n                }\n                if case .success(let isAvailable)\
  \ = result {\n                    return isAvailable\n                }\n      \
  \          return true\n            }\n            .assign(to: &$isValid) // (5)\n\
  \    }\n}\n```\n\n如果 `isUsernameAvailablePublisher` 返回了 `success`，我们提取出表示所需用户名是否可用的\
  \ `Bool` 值，并将其映射为适当的消息。\n\n最后，我们将管线的结果分配给 `usernameMessage`（4）和 `isValid`（5）这两个已发布的属性，它们驱动视图上的\
  \ UI。\n\n请记住，对于这类 UI，忽略网络错误是一个可行的选择——但对你的用例来说，情况可能完全不同，因此在应用此技术时请自行判断。\n\n到目前为止，我们还没有向用户暴露任何错误，所以让我们继续讨论一类我们实际希望让用户知道的错误。\n\
  \n\n\n### 处理验证错误\n\n大多数验证错误应在客户端本地处理，但有时我们无法避免在服务器上运行一些额外的验证步骤。理想情况下，服务器应返回`4xx`范围内的\
  \ HTTP 状态码，并可选择提供包含更多详细信息的有效负载。\n\n在我们的示例应用中，服务器要求用户名至少为四个字符，并且我们有一个禁止使用的用户名列表（例如\"\
  admin\"或\"superuser\"）。针对这些情况，我们希望显示警告消息并禁用提交按钮。\n\n我们的后端实现基于 Vapor，对于任何验证错误，它都会返回\
  \ HTTP 状态码`400`和一个错误有效负载。如果你对实现细节感兴趣，可以查看服务器实现中的`routes.swift`代码。\n\n处理这种错误场景需要在两个地方进行修改：服务实现和视图模型。我们先来看服务实现。\n\
  \n由于我们应在尝试从响应中提取有效负载之前处理任何错误，因此处理服务器错误的代码需要在检查`URLErrors`之后、映射数据之前运行：\n\n```\nstruct\
  \ APIErrorMessage: Decodable {\nvar error: Bool\nvar reason: String\n}\n// ...\n\
  struct AuthenticationService {\nfunc checkUserNameAvailablePublisher(userName: String)\
  \ -> AnyPublisher {\nguard let url = URL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
  (userName)\") else {\nreturn Fail(error: APIError.invalidRequestError(\"URL invalid\"\
  ))\n.eraseToAnyPublisher()\n}\nreturn URLSession.shared.dataTaskPublisher(for: url)\n\
  // 处理 URL 错误（很可能无法连接到服务器）\n.mapError { error -> Error in\nreturn APIError.transportError(error)\n\
  }\n// 处理所有其他错误\n.tryMap { (data, response) -> (data: Data, response: URLResponse)\
  \ in\nprint(\"已收到服务器响应，正在检查状态码\")\nguard let urlResponse = response as? HTTPURLResponse\
  \ else {\nthrow APIError.invalidResponse // (1)\n}\nif (200..<300) ~= urlResponse.statusCode\
  \ { // (2)\n}\nelse {\nlet decoder = JSONDecoder()\nlet apiError = try decoder.decode(APIErrorMessage.self,\n\
  from: data) // (3)\nif urlResponse.statusCode == 400 { // (4)\nthrow APIError.validationError(apiError.reason)\n\
  }\n}\nreturn (data, response)\n}\n.map(\\.data)\n.decode(type: UserNameAvailableMessage.self,\n\
  decoder: JSONDecoder())\n.map(\\.isAvailable)\n//      .replaceError(with: false)\n\
  .eraseToAnyPublisher()\n}\n}\n```\n\n我们来仔细分析这段代码的作用：\n\n1. 如果响应不是`HTTPURLResonse`，我们返回`APIError.invalidResponse`。\n\
  2. 我们使用 Swift 的模式匹配来检测请求是否成功执行，即 HTTP 状态码在`200`到`299`范围内。\n3. 否则，服务器上发生了某些错误。由于我们使用\
  \ Vapor，服务器会以 JSON 有效负载形式返回错误详情（`https://docs.vapor.codes/4.0/errors/`），因此我们现在可以将此信息映射到`APIErrorMessage`结构体，并在后续代码中用它来创建更有意义的错误消息。\n\
  4. 如果服务器返回 HTTP 状态码`400`，我们知道这是一个验证错误（详情参见服务器实现），并返回一个`APIError.validationError`，其中包含从服务器收到的详细错误消息。\n\
  \n在视图模型中，我们现在可以利用这些信息告诉用户所选用户名不符合要求：\n\n```\ninit() {\nisUsernameAvailablePublisher\n\
  .map { result in\nswitch result {\ncase .failure(let error):\nif case APIError.transportError(_)\
  \ = error {\nreturn \"\"\n}\nelse if case APIError.validationError(let reason) =\
  \ error {\nreturn reason\n}\nelse {\nreturn error.localizedDescription\n}\ncase\
  \ .success(let isAvailable):\nreturn isAvailable ? \"\" : \"此用户名不可用\"\n}\n}\n.assign(to:\
  \ &$usernameMessage)\n```\n\n没错——只需三行代码。我们已经完成了所有繁重的工作，现在是时候享受成果了。![](img/509862_1_En_10_Figa_HTML.gif)\
  \ 一个黑白像素艺术图案，呈现倒锥形，带有 3 个类似细丝的粗延伸物，周围散布着点状图案。\n\n### 处理响应解析错误\n\n在许多情况下，服务器发送的数据与客户端预期的数据不匹配：\n\
  \n* 响应中包含额外数据，或者某些字段被重命名。\n* 客户端通过强制门户（例如在酒店中）进行连接。\n\n在这些情况下，客户端接收到了数据，但格式不正确。为了帮助用户解决问题，我们需要分析响应并提供适当的指导，例如：\n\
  \n* 下载最新版本的应用。\n* 通过系统浏览器登录强制门户。\n\n当前实现使用`decode`运算符来解码响应有效负载，并在无法映射有效负载时抛出错误。这种方法效果很好，任何解码错误都会被捕获并显示在用户界面上。然而，像\"\
  无法读取数据，因为数据缺失\"这样的错误消息对用户并不友好。相反，我们尝试显示一个对用户更有意义的消息，并建议用户升级到最新版本的应用（假设服务器返回了额外数据，新版应用可以利用这些数据）。\n\
  \n为了能够提供关于解码错误的更精细信息，我们需要放弃`decode`运算符，回退到手动映射数据（别担心，借助`JSONDecoder`和 Swift 的`Codable`协议，这相当简单）：\n\
  \n```\n// ...\n.map(\\.data)\n// .decode(type: UserNameAvailableMessage.self,\n\
  //         decoder: JSONDecoder())\n.tryMap { data -> UserNameAvailableMessage in\n\
  let decoder = JSONDecoder()\ndo {\nreturn try decoder.decode(UserNameAvailableMessage.self,\n\
  from: data)\n}\ncatch {\nthrow APIError.decodingError(error)\n}\n}\n.map(\\.isAvailable)\n\
  // ...\n```\n\n通过让`APIError`遵循`LocalizedError`协议并实现`errorDescription`属性，我们可以提供更用户友好的错误消息（我也为其他错误情况添加了自定义消息）：\n\
  \n```\nenum APIError: LocalizedError {\n/// 无效请求，例如无效 URL\ncase invalidRequestError(String)\n\
  /// 传输层错误，例如无法连接到服务器\ncase transportError(Error)\n/// 收到无效响应，例如非 HTTP 结果\ncase invalidResponse\n\
  /// 服务器端验证错误\ncase validationError(String)\n/// 服务器发送了意外格式的数据\ncase decodingError(Error)\n\
  var errorDescription: String? {\nswitch self {\ncase .invalidRequestError(let message):\n\
  return \"无效请求：\\(message)\"\ncase .transportError(let error):\nreturn \"传输错误：\\\
  (error)\"\ncase .invalidResponse:\nreturn \"无效响应\"\ncase .validationError(let reason):\n\
  return \"验证错误：\\(reason)\"\ncase .decodingError:\nreturn \"服务器返回了意外格式的数据。请尝试更新应用。\"\
  \n}\n}\n}\n```\n\n现在，为了向用户清楚表明他们应该更新应用，我们还将显示一个弹窗。以下是弹窗的代码：\n\n```\nstruct SignUpScreen:\
  \ View {\n@StateObject private var viewModel = SignUpScreenViewModel()\nvar body:\
  \ some View {\nForm {\n// ...\n}\n// 显示更新对话框\n.alert(\"请更新\", isPresented: $viewModel.showUpdateDialog,\
  \ actions: {\nButton(\"升级\") {\n// 打开应用在 App Store 的详情页面\n}\nButton(\"稍后再说\", role:\
  \ .cancel) { }\n}, message: {\nText(\"您似乎正在使用此应用的旧版本。请更新您的应用。\")\n})\n}\n}\n```\n\
  \n你会注意到，这个弹窗的呈现状态由视图模型上的一个已发布属性`showUpdateDialog`驱动。让我们相应地更新视图模型 (1)，并添加将`isUsernameAvailablePublisher`的结果映射到此新属性的\
  \ Combine 管道。\n\n\n\n```swift\nclass SignUpScreenViewModel: ObservableObject {\n\
  \    // ...\n    @Published var showUpdateDialog: Bool = false // (1)\n    // ...\n\
  \    private lazy var isUsernameAvailablePublisher:\n        AnyPublisher =\n  \
  \      $username\n            .debounce(for: 0.8, scheduler: DispatchQueue.main)\n\
  \            .removeDuplicates()\n            .flatMap { username -> AnyPublisher\
  \ in\n                self.authenticationService\n                    .checkUserNameAvailablePublisher(userName:\
  \ username)\n                    .asResult()\n            }\n            .receive(on:\
  \ DispatchQueue.main)\n            .share() // (3)\n            .eraseToAnyPublisher()\n\
  \    }()\n    init() {\n        // ...\n        // 解码错误：显示错误信息\n        // 建议下载新版本\n\
  \        isUsernameAvailablePublisher\n            .map { result in\n          \
  \      if case .failure(let error) = result {\n                    if case APIError.decodingError\
  \ = error // (2) {\n                        return true\n                    }\n\
  \                }\n                return false\n            }\n            .assign(to:\
  \ &$showUpdateDialog)\n    }\n}\n```\n\n可以看到，这并不复杂——我们本质上是获取来自 `isUsernameAvailablePublisher`\
  \ 的所有事件，并将它们转换为 `Bool` 值，只有收到 `.decodingError` (2) 时该值才变为 `true`。\n\n现在我们使用 `isUsernameAvailablePublisher`\
  \ 来驱动三个不同的 Combine 管道，我想特别指出——由于 `isUsernameAvailablePublisher` 最终会触发网络请求——确保我们每次按键最多只发送*一个*网络请求非常重要。前一章详细解释了如何使用\
  \ `share()` 运算符 (3) 来实现这一点。\n\n## 处理内部服务器错误\n\n在极少数情况下，我们应用的后端可能会出现问题——可能是部分系统因维护而离线、某个进程崩溃，或者服务器过载。通常，服务器会返回\
  \ `5xx` 范围内的 HTTP 状态码来指示这种情况。\n\n模拟错误条件\n\n> *示例服务器包含模拟本文讨论的部分错误条件的代码。您可以通过发送特定的*\
  \ `username` *值来触发这些错误条件：*\n>\n> *   任何少于四个字符的用户名都将导致 `tooshort` 验证错误，通过 `HTTP 400`\
  \ 状态码和一个包含详细错误信息的 JSON 负载来指示。\n> *   空的用户名将导致 `emptyName` 错误信息，指示用户名不能为空。\n> * \
  \  某些用户名被禁止：“admin”或“superuser”将导致 `illegalName` 验证错误。\n> *   其他用户名如“peterfriese”、“johnnyappleseed”、“page”和“johndoe”已被占用，因此服务器会告知客户端这些用户名不再可用。\n\
  > *   发送“illegalresponse”作为用户名将返回一个字段过少的 JSON 响应，导致客户端出现解码错误。\n> *   发送“servererror”将模拟一个数据库问题（`databaseCorrupted`），并以\
  \ `HTTP 500` 状态码指示，不带重试提示（因为我们假设这不是临时情况，重试将是徒劳的）。\n> *   发送“maintenance”作为用户名将返回一个\
  \ `maintenance` 错误，同时带有一个 `retry-after` 头部，指示客户端可以在一段时间后重试此调用（这里的想法是服务器正在进行计划内维护，重启后会恢复运行）。\n\
  \n让我们添加处理服务器端错误所需的代码。与我们之前处理错误场景的方式类似，我们需要添加一些代码来将 HTTP 状态码映射到我们的 `APIError` 枚举：\n\
  \n```swift\nif (200..<300) ~= urlResponse.statusCode {\n}\nelse {\n    let decoder\
  \ = JSONDecoder()\n    let apiError = try decoder.decode(APIErrorMessage.self,\n\
  \                                      from: data)\n    if urlResponse.statusCode\
  \ == 400 {\n        throw APIError.validationError(apiError.reason)\n    }\n   \
  \ if (500..<600) ~= urlResponse.statusCode {\n        let retryAfter = urlResponse.value(\n\
  \            forHTTPHeaderField: \"Retry-After\")\n        throw APIError.serverError(\n\
  \            statusCode: urlResponse.statusCode,\n            reason: apiError.reason,\n\
  \            retryAfter: retryAfter)\n    }\n}\n```\n\n为了在我们的 UI 中显示用户友好的错误信息，我们只需要在视图模型中添加几行代码：\n\
  \n```swift\nisUsernameAvailablePublisher\n    .map { result in\n        switch result\
  \ {\n        case .failure(let error):\n            if case APIError.transportError(_)\
  \ = error {\n                return \"\"\n            }\n            else if case\
  \ APIError.validationError(let reason) = error {\n                return reason\n\
  \            }\n            else if case APIError.serverError(statusCode: _, reason:\
  \ let reason, retryAfter: _) = error {\n                return reason ?? \"服务器错误\"\
  \n            }\n            else {\n                return error.localizedDescription\n\
  \            }\n        case .success(let isAvailable):\n            return isAvailable\
  \ ? \"\" : \"此用户名不可用\"\n        }\n    }\n    .assign(to: &$usernameMessage)\n```\n\
  \n到目前为止，一切顺利。\n\n对于某些服务器端错误场景，稍等片刻后重试请求可能是值得的。例如，如果服务器正在进行维护，它可能在几秒钟后重新上线。\n\nCombine\
  \ 包含一个 `retry` 运算符，我们可以用它来自动重试任何失败的操作。将其添加到我们的代码中只需一行：\n\n```swift\nreturn URLSession.shared.dataTaskPublisher(for:\
  \ url)\n    .mapError { ... }\n    .tryMap { ... }\n    .retry(3)\n    .map(\\.data)\n\
  \    .tryMap { ... }\n    .map(\\.isAvailable)\n    .eraseToAnyPublisher()\n```\n\
  \n但是，当您运行应用时，您会发现这将导致*任何*失败的请求都被重试三次。这不是我们想要的——例如，我们希望任何验证错误都能向上传递到视图模型。而实际上，它们也会被\
  \ `retry` 运算符捕获。\n\n\n\n## 改进错误处理与实现自定义 Combine 运算符\n\n### 重试策略中的暂停问题\n\n更重要的是，重试之间没有暂停。如果我们的目标是减轻已经不堪重负的服务器的压力，那么发送四个请求（原始请求加上三次重试）反而会使情况变得更糟。\n\
  \n那么，我们如何确保：\n\n1. 只重试特定类型的失败？\n2. 在重试失败请求之前有一个暂停？\n\n我们的实现需要能够捕获任何上游错误，并将它们沿管道传播到下一个运算符。然而，当捕获到`serverError`时，我们希望暂停片刻，然后重新启动整个管道，以便重试\
  \ URL 请求。\n\n首先，确保我们能够：(1) 捕获所有错误，(2) 过滤出`serverError`，(3) 沿管道传播所有其他错误。`tryCatch`运算符“通过用另一个发布者替换上游发布者或抛出新错误来处理来自上游发布者的错误”。这正是我们需要的：\n\
  \n```swift\nreturn URLSession.shared.dataTaskPublisher(for: url)\n    .mapError\
  \ { ... }\n    .tryMap { ... }\n    .tryCatch { error -> AnyPublisher in // (1)\n\
  \        if case APIError.serverError(_, _, let retryAfter) = error { // (2)\n \
  \           // ...\n        }\n        throw error // (3)\n    }\n    .map(\\.data)\n\
  \    .tryMap { ... }\n    .map(\\.isAvailable)\n    .eraseToAnyPublisher()\n```\n\
  \n当捕获到`serverError`时，我们希望等待一小段时间，然后重新启动管道。\n\n我们可以通过触发一个新事件（使用`Just`发布者），用`delay`延迟几秒钟，然后使用`flatMap`启动一个新的`dataTaskPublisher`来实现这一点。我们不在`if`语句中粘贴管道的完整代码，而是将`dataTaskPublisher`赋值给一个局部变量：\n\
  \n```swift\nlet dataTaskPublisher = URLSession.shared.dataTaskPublisher(for: url)\n\
  \    .mapError { ... }\n    .tryMap { ... }\n\nreturn dataTaskPublisher\n    .tryCatch\
  \ { error -> AnyPublisher in\n        if case APIError.serverError = error {\n \
  \           return Just(()) // (1)\n                .delay(for: 3, scheduler: DispatchQueue.global())\n\
  \                .flatMap { _ in\n                    return dataTaskPublisher\n\
  \                }\n                .retry(10) // (2)\n                .eraseToAnyPublisher()\n\
  \        }\n        throw error\n    }\n    .map(\\.data)\n    .tryMap { ... }\n\
  \    .map(\\.isAvailable)\n    .eraseToAnyPublisher()\n```\n\n关于这段代码的几点说明：\n\n1.\
  \ `Just`发布者期望*某个*它可以发布的值。由于我们使用哪个值并不重要，我们可以发送任何想要的内容。我决定发送一个空元组，这通常用于表示“无意义”的情况。\n\
  2. 我们重试发送请求 10 次，这意味着总共最多发送 11 次（原始调用加上 10 次重试）。\n\n这个数字如此高的唯一原因是，当服务器返回成功结果时，更容易观察到管道的结束。当您发送`maintenance`作为用户名时，演示服务器可以模拟从计划维护中恢复：对于每一次和第二次请求，它会抛出`InternalServerError.maintenance`（映射为\
  \ HTTP `500`）。每次第三次请求，它会返回`success`（即 HTTP `200`）。查看这一效果的最佳方法是从 Xcode 内部运行服务器（打开`server`项目并按下*运行*按钮）。然后，为包含`throw\
  \ InternalServerError.maintenance`的行创建一个*声音*断点。\n\n![](img/509862_1_En_10_Fig3_HTML.png)\n\
  \n一段程序代码中，第 113 行被选中，下方有一个弹出对话框。该框已勾选启用断点复选框，并包含名称、条件、忽略、操作和选项的输入框和复选框。\n\n图 10-3\n\
  \n*设置声音断点*\n\n每次服务器收到`username=maintenance`的请求时，您都会听到声音。现在，运行示例应用程序并输入`maintenance`作为用户名。您会听到服务器响应错误两次，然后返回成功。\n\
  \n## 总结\n\n在上一章中使用相当宽松的方法处理错误之后，这一次我们更加认真地对待了错误处理。\n\n在本章中，我们使用了几种策略来处理错误并将其暴露给\
  \ UI。错误处理是开发高质量软件的重要方面，而且有很多相关资料。然而，如何将错误暴露给用户这一方面并不常被讨论，希望本文能让您更好地理解如何实现这一点。\n\n\
  与原始代码相比，代码变得稍微复杂了一些，这是我们将在下一章中解决的问题，届时我们将研究如何实现自己的 Combine 运算符。为了演示其工作原理，我们将实现一个运算符，使处理增量退避就像在\
  \ Combine 管道中添加一行代码一样简单！\n\n脚注 1 2 3\n\n"
- "# 11. 实现自定义 Combine 运算符\n\n在前面的章节中，您学习了如何使用 Combine 访问网络、处理错误，并以对应用程序用户有意义的方式暴露可能发生的错误。\n\
  \n毫不奇怪，我们最终得到的代码看起来比最初的要复杂一些。毕竟，正确处理错误所占用的代码行数比完全不处理错误（或直接忽略错误）要多。\n\n在本章中，我们将通过利用\
  \ Combine 最强大的工具之一：运算符，来改善这种情况。您已经在之前的章节中使用过运算符，在本章中，我们将更深入地了解它们是什么、如何工作，以及——最重要的是——将代码重构为自定义\
  \ Combine 运算符如何使其更易于推理和更易于复用。\n\n## 什么是 Combine 运算符？\n\nCombine 定义了三个主要概念来实现响应式编程的思想：\n\
  \n1. 发布者（`Publisher`）\n2. 订阅者（`Subscriber`）\n3. 运算符（`Operator`）\n\n**发布者**随时间传递值，**订阅者**在接收这些值时对其进行操作。**运算符**位于发布者和订阅者之间，可用于操纵值流。\n\
  \n需要运算符的原因有几个：\n\n* 发布者并不总是以订阅者所需的格式生成事件。例如，发布者可能发出 HTTP 网络请求的结果，但我们的订阅者需要的是自定义数据结构。在这种情况下，我们可以使用`map`或`decode`等运算符将发布者的输出转换为订阅者期望的数据结构。\n\
  \n* 发布者可能产生比订阅者感兴趣的事件更多的事件。例如，输入搜索词时，我们可能对每一次按键都不感兴趣，而只对最终的搜索词感兴趣。在这种情况下，我们可以使用`debounce`或`throttle`等运算符来减少订阅者必须处理的事件数量。\n\
  \n运算符帮助我们获取发布者产生的输出，并将其转换为订阅者可以消费的内容。在之前的章节中，我们已经使用了许多内置运算符，例如：\n\n* `map`（及其异常友好版本`tryMap`）用于转换元素\n\
  * `debounce`用于仅在两个事件之间存在暂停时发布元素\n* `removeDuplicates`用于删除重复事件\n* `flatMap`用于将元素转换为新的发布者\n\
  \n\n\n## 实现自定义操作符\n\n通常，在创建 Combine 管道时，我们会从一个发布者（publisher）开始，然后连接一系列 Combine 的内置操作符来处理该发布者发出的事件。在任何一个\
  \ Combine 管道的末端，都有一个接收事件的订阅者（subscriber）。正如你在第 10 章所见，管道很快就会变得相当复杂。\n\n从技术上讲，操作符只是创建其他发布者和订阅者的函数，这些发布者和订阅者处理它们从上游发布者接收到的*事件*。\n\
  \n这意味着我们可以通过扩展 `Publisher` 来创建我们自己的自定义操作符，扩展中是一个函数，该函数返回一个发布者（或订阅者），这个发布者（或订阅者）对我们使用它的发布者所接收到的事件进行操作。\n\
  \n让我们通过实现一个简单的操作符来看看这在实际中意味着什么，该操作符允许我们使用 Swift 的 `dump()` 函数来检查流经 Combine 管道的事件。这个函数会将变量的内容打印到控制台，并以嵌套树的形式显示变量的结构——类似于\
  \ Xcode 中的调试检查器。\n\n你可能知道 Combine 的 `print()` 操作符，它的工作方式非常相似。然而，它没有提供那么多细节，更重要的是，它不以嵌套结构显示结果。\n\
  \n要添加一个操作符，我们首先需要为 `Publisher` 类型添加一个扩展。由于我们不想操作此操作符接收到的事件，我们可以使用上游发布者的类型作为结果类型，并返回\
  \ `AnyPublisher<Self.Output, Self.Failure>` 作为结果类型：\n\n```\nextension Publisher\
  \ {\n    func dump() -> AnyPublisher<Self.Output, Self.Failure> {\n    }\n}\n```\n\
  \n在函数内部，我们可以使用 `handleEvents` 操作符来检查此管道处理的任何事件。`handleEvents` 有一系列可选的闭包，当发布者接收到新的订阅、新的输出值、取消事件、完成时，或者当订阅者请求更多元素时，这些闭包会被调用。由于我们只对新的\
  \ `Output` 值感兴趣，我们可以忽略大部分闭包，只实现 `receiveOutput` 闭包。\n\n每当我们收到一个值时，我们将使用 Swift 的\
  \ `dump()` 函数将值的内容打印到控制台：\n\n```\nextension Publisher {\n    func dump() -> AnyPublisher<Self.Output,\
  \ Self.Failure> {\n        handleEvents(receiveOutput:  { value in\n           \
  \ Swift.dump(value)\n        })\n        .eraseToAnyPublisher()\n    }\n}\n```\n\
  \n我们可以像使用 Combine 的任何内置操作符一样使用这个操作符。在下面的例子中，我们将新的操作符附加到一个发出当前日期的简单发布者上：\n\n```\n\
  Just(Date())\n    .dump()\n    // 打印：\n    // ▿ 2022-03-02 09:38:49 +0000\n    //\
  \   - timeIntervalSinceReferenceDate: 667906729.659255\n```\n\n## 实现带延迟的重试操作符\n\n\
  既然我们已经对如何实现一个简单的操作符有了基本的了解，让我们看看是否可以重构上一节中的代码。以下是相关部分：\n\n```\nreturn dataTaskPublisher\n\
  \    .tryCatch { error -> AnyPublisher<Data, Error> in\n        if case APIError.serverError\
  \ = error {\n            return Just(Void())\n                .delay(for: 3, scheduler:\
  \ DispatchQueue.global())\n                .flatMap { _ in\n                   \
  \ return dataTaskPublisher\n                }\n                .print(\"before retry\"\
  )\n                .retry(10)\n                .eraseToAnyPublisher()\n        }\n\
  \        throw error\n    }\n    .map(\\.data)\n```\n\n让我们首先为 `Publisher` 上的 `retry`\
  \ 操作符构建一个重载扩展：\n\n```\nextension Publisher {\n    func retry(_ retries: Int, withDelay\
  \ delay: Int)\n        -> Publishers.TryCatch<Self, Just<Void>.Delay<DispatchQueue>.FlatMap<Self,\
  \ AnyPublisher<Self.Output, Self.Failure>>>\n        where T == Self.Output, E ==\
  \ Self.Failure\n    {\n    }\n}\n```\n\n这定义了两个输入参数，`retries` 和 `withDelay`，我们可以用它们来指定应该重试上游发布者的次数以及每次重试之间应间隔的时间（以秒为单位）。\n\
  \n由于我们将在新的操作符内部使用 `tryCatch` 操作符，我们需要使用它的发布者类型 `Publishers.TryCatch` 作为返回类型。\n\n\
  有了这个，我们现在可以通过粘贴现有的实现来实现操作符的主体：\n\n```\nextension Publisher {\n    func retry(_ retries:\
  \ Int, withDelay delay: Int)\n        -> Publishers.TryCatch<Self, Just<Void>.Delay<DispatchQueue>.FlatMap<Self,\
  \ AnyPublisher<Self.Output, Self.Failure>>>\n        where T == Self.Output, E ==\
  \ Self.Failure\n    {\n        return self.tryCatch { error -> AnyPublisher<Self.Output,\
  \ Self.Failure> in\n            return Just(Void())\n                .delay(for:\
  \ .init(integerLiteral: delay),\n                       scheduler: DispatchQueue.global())\n\
  \                .flatMap { _ in\n                    return self\n            \
  \    }\n                .retry(retries)\n                .eraseToAnyPublisher()\n\
  \        }\n    }\n}\n```\n\n你可能已经注意到我们移除了错误检查。这是因为 `APIError` 是一个特定于我们应用程序的错误类型。由于我们希望使其成为一个可以在其他应用程序中也可以使用的实现，让我们看看如何使其更灵活。\n\
  \n## 条件性重试\n\n为了使这段代码在其他上下文中可重用，让我们添加一个尾随闭包的参数，调用者可以使用它来控制操作符是否应该重试。\n\n```\nfunc\
  \ retry(_ retries: Int, withDelay delay: Int, condition: ((E) -> Bool)? = nil) ->\
  \ Publishers.TryCatch<Self, Just<Void>.Delay<DispatchQueue>.FlatMap<Self, AnyPublisher<Self.Output,\
  \ Self.Failure>>> where T == Self.Output, E == Self.Failure {\n    return self.tryCatch\
  \ { error -> AnyPublisher<Self.Output, Self.Failure> in\n        if condition?(error)\
  \ == true {\n            return Just(Void())\n                .delay(for: .init(integerLiteral:\
  \ delay),\n                       scheduler: DispatchQueue.global())\n         \
  \       .flatMap { _ in\n                    return self\n                }\n  \
  \              .retry(retries)\n                .eraseToAnyPublisher()\n       \
  \ }\n        else {\n            throw error\n        }\n    }\n}\n```\n\n如果调用者没有提供该闭包，操作符将使用参数\
  \ `retries` 和 `delay` 进行重试。\n\n有了这个，我们可以简化原始调用：\n\n```\n// ...\nreturn dataTaskPublisher\n\
  \    .retry(10, withDelay: 3) { error in\n        if case APIError.serverError =\
  \ error {\n            return true\n        }\n        return false\n    }\n   \
  \ .map(\\.data)\n// ...\n```\n\n## 实现指数退避的重试操作符\n\n现在，让我们更进一步，实现一个带有指数退避的 `retry`\
  \ 操作符版本。\n\n> *指数退避通常作为计算机系统（如 Web 服务*^(⁷⁹)*）中速率限制*^(⁷⁸)*机制的一部分，用于帮助实施对资源的公平分配并防止网络拥塞*^(⁸⁰)*。（Wikipedia*^(⁸¹)*）\n\
  \n为了增加两次请求之间的延迟，我们引入一个局部变量来保存当前间隔，并在每次请求后将其加倍。为了实现这一点，我们需要将启动原始管道的内部管道包装在一个能够递增退避变量的管道中：\n\
  \n```\nfunc retry(_ retries: Int,\n           withBackoff initialBackoff: Int,\n\
  \           condition: ((E) -> Bool)? = nil)\n    -> Publishers.TryCatch<Self, Just<Void>.Delay<DispatchQueue>.FlatMap<Self,\
  \ AnyPublisher<Self.Output, Self.Failure>>>\n    where T == Self.Output, E == Self.Failure\n\
  {\n    return self.tryCatch { error -> AnyPublisher<Self.Output, Self.Failure> in\n\
  \        if condition?(error) ?? true {\n            var backOff = initialBackoff\n\
  \            return Just(Void())\n                .flatMap { _ -> AnyPublisher<Self.Output,\
  \ Self.Failure> in\n                    let result = Just(Void())\n            \
  \            .delay(for: .init(integerLiteral: backOff),\n                     \
  \          scheduler: DispatchQueue.global())\n                        .flatMap\
  \ { _ in\n                            return self\n                        }\n \
  \                   backOff = backOff * 2\n                    return result.eraseToAnyPublisher()\n\
  \                }\n                .retry(retries - 1)\n                .eraseToAnyPublisher()\n\
  \        }\n        else {\n            throw error\n        }\n    }\n}\n```\n\n\
  要仅对某些类型的错误使用指数退避，我们可以像之前一样实现闭包来检查错误。以下是一个代码片段，展示了如何对任何 `APIError.serverError` 使用初始间隔为\
  \ 3 秒的递增退避：\n\n```\nreturn dataTaskPublisher\n    .retry(2, withBackoff: 3) { error\
  \ in\n        if case APIError.serverError(_, _, _) = error {\n            return\
  \ true\n        }\n        else {\n            return false\n        }\n    }\n\
  // ...\n```\n\n要忽略错误类型而使用指数退避，代码会更加简洁：\n\n```\nreturn dataTaskPublisher\n    .retry(2,\
  \ withIncrementalBackoff: 3)\n// ...\n```\n\n## 总结\n\nCombine 是一个非常强大的框架，它允许我们为应用程序组合出非常高效的数据和事件处理管道。\n\
  \n在本章中，你学会了如何将现有的 Combine 管道重构为可重用的 Combine 操作符，从而使你的代码更具可读性。\n\n脚注 1 2 3 4\n\n\n\
  \n"
- "# 12. 在 Combine 中封装现有 API\n\nApple 为许多 API 提供了 Combine 发布者，这让我们可以轻松地将这些 API 集成到我们的\
  \ Combine 管道中。然而，还有许多 API 即使随时间产生事件，也并不支持 Combine。幸运的是，Apple 为我们提供了所需的工具，可以将 API\
  \ 封装到 Combine 发布者中，使其能够被 Combine 管道访问。\n\n在本章中，我将引导你完成使用 Combine 封装现有 API 的整个过程。\n\
  \n## 案例研究\n\n我们将以 Firebase API 作为案例研究。Firebase 是一种后端即服务（BaaS），它提供了一系列服务，使开发应用变得更加容易。例如，它提供了身份验证服务（Firebase\
  \ Authentication）、基于文档的 NoSQL 数据库（Cloud Firestore）、云端大文件存储服务（Cloud Storage）、崩溃报告服务（Crashlytics）等等。^(⁸²)\n\
  \nFirebase 的大部分 API 都是异步的，这意味着每当你发起调用时，它会被发送到某个 Firebase 后端服务进行处理。一旦结果准备好，它会被返回到客户端\
  \ SDK，你的代码将收到回调。调用 Firebase 服务有多种异步方式：完成处理器（completion handlers）、Combine 以及 async/await。我之前在\
  \ *从 Swift 调用异步 Firebase API - Callbacks, Combine, and async/await*^(⁸³) 中提到过这一点——并且还发布了关于此主题的视频^(⁸⁴)。\n\
  \n在本章中，我们将从 Cloud Firestore 中选取两个方法，并将它们转换为 Combine 发布者。Cloud Firestore 是云端的一种水平扩展的基于文档的\
  \ NoSQL 数据库。类似于 CloudKit，^(⁸⁵) 但它是一个真正的跨平台解决方案：你可以从 iOS、Android、Web 以及通过 REST API\
  \ 访问 Cloud Firestore。^(⁸⁶) 存储在 Firestore 中的数据被组织成文档——文档类似于 Swift 结构体：它可以具有任意数量的不同类型字段。文档被组织成集合，而文档可以包含子集合，这使你能够构建嵌套的数据结构。\n\
  \nFirestore SDK 提供了访问单个文档和集合中数据的方法。例如，以下代码片段展示了如何从 Firestore 文档集合中获取数据，并使用 Swift\
  \ 的 `Codable` API 将其映射到 Swift 结构体数组：\n\n```\ndb.collection(\"books\").getDocuments\
  \ { querySnapshot, error in\n    guard let documents = querySnapshot?.documents\
  \ else {\n        return\n    }\n    let books = documents.compactMap { [weak self]\
  \ queryDocumentSnapshot in\n        let result = Result {\n            try queryDocumentSnapshot.data(as:\
  \ Book.self)\n        }\n        switch result {\n        case .success(let book):\n\
  \            return book\n        case .failure(let error):\n            return\
  \ nil\n        }\n    }\n    print(books.count)\n}\n```\n\n除了能够按需获取数据之外，Firestore\
  \ 还支持实时同步。这意味着你的应用会实时接收它所订阅的任何文档或文档集合的更新。对于任何允许用户与其他用户共享数据（例如聊天应用），或与用户的其他设备共享数据（例如可在\
  \ iPhone、iPad、Mac 和 Web 应用上使用的待办事项列表应用）的应用来说，这都是一项很棒的功能。\n\n要接收更新，你需要为特定的文档或文档集合注册一个快照监听器。每当该文档或集合中的某个文档被更新或删除，或者有新文档被插入集合时，Firestore\
  \ 将触发快照监听器，你将在监听器的闭包中收到更新。以下代码片段展示了如何接收书籍集合的任何更改的更新：\n\n```\ndb.collection(\"books\"\
  )\n    .addSnapshotListener { [weak self] (querySnapshot, error) in\n        guard\
  \ let documents = querySnapshot?.documents else {\n            return\n        }\n\
  \        self?.books = documents.compactMap { queryDocumentSnapshot in\n       \
  \     let result = Result {\n                try queryDocumentSnapshot.data(as:\
  \ Book.self)\n            }\n            switch result {\n            case .success(let\
  \ book):\n                return book\n            case .failure(let error):\n \
  \               return nil\n            }\n        }\n    }\n```\n\n本章的示例代码是一个演示应用程序，展示了如何使用基于闭包的\
  \ API 以及我们在本章中构建的基于 Combine 的版本。请注意，适用于 Apple 平台的 Firebase SDK 包含对 Combine 的实验性支持——你可以通过导入相应模块在你的应用中使用它。本章旨在解释\
  \ Firebase 团队是如何实现这种 Combine 支持的。\n\n要运行示例应用程序，请遵循以下步骤：\n\n1.  通过 Firebase 控制台创建一个新的\
  \ Firebase 项目。^(⁸⁷)\n2.  将你的 Xcode 项目添加到 Firebase 项目。\n3.  下载 `GoogleService-Info.plist`\
  \ 文件并将其添加到你的项目中。\n4.  安装本地 Firebase 模拟器套件。^(⁸⁸)\n5.  通过在示例项目的根目录中执行 `start.sh` 来运行\
  \ Firebase 模拟器套件。\n6.  在模拟器上启动 iOS 应用（这样它才能连接到模拟器）。\n\n`start.sh` 脚本将确保向 Firebase\
  \ 模拟器中填充一些种子数据，以便你可以从 Firestore 获取数据。\n\n应用程序启动后，进入使用快照监听器进行实时同步的菜单项之一。然后，在浏览器中打开模拟器控制台\
  \ `http://localhost:4000/firestore`，并对 Firestore 文档进行更改。一旦你在模拟器 UI 中提交更改，观察数据如何立即在应用的\
  \ UI 中更新。\n\n![](img/509862_1_En_12_Fig1_HTML.png)\n\n一张 Firebase 模拟器套件的截图，底部的任务栏选中了\
  \ firestore。在 data 标签页下，有 root、books 和文件名的面板，以及 start collection 和 add field 选项。add\
  \ field 选项的值为 once upon a time，并且 save 选项被高亮显示，指向右侧的 iPhone 14 Pro 手机屏幕，屏幕上显示标题“fetch\
  \ live collection”和该值。\n\n图 12-1\n\n在 Firebase 模拟器 UI 中进行的更改，只要你点击 Save，就会立即反映在应用\
  \ UI 中\n\n## 使用 Combine 访问 Firestore\n\n现在让我们看看如何使我们从 Firestore 接收的数据能够被 Combine\
  \ 访问。这样做的一个常见原因是转换数据，并将其与我们从其他 Combine 发布者接收的事件（例如，搜索/筛选对话框中的过滤条件）结合起来。\n\n\n\n\
  ### 使用视图模型与已发布属性\n\n将数据输入 Combine 管道的一种简单且相当常见的方式是在视图模型中创建一个已发布属性。你可能在我的博客中的许多代码示例^(⁸⁹)或\
  \ Firebase 快速入门^(⁹⁰)中看到过这种方式。\n\n![](img/509862_1_En_12_Fig2_HTML.png)\n\n一个框图包含两个层级，分别标题为\
  \ firebase 后端和前端。前端包含图书列表视图和图书列表视图模型块，并通过视图模型连接了订阅与取消订阅选项。它通过快照监听器连接到 firebase 后端。firebase\
  \ 后端包含 firestore，firestore 连接到多个斜杠图书。\n\n图 12-2：应用程序架构的概念概览\n\n在代码中，这看起来如下所示：\n\n\
  ```\nprivate class BookListViewModel: ObservableObject {\n    @Published var books\
  \ = [Book]()\n    @Published var errorMessage: String?\n    private var db = Firestore.firestore()\n\
  \    private var listenerRegistration: ListenerRegistration?\n    \n    public func\
  \ unsubscribe() {\n        if listenerRegistration != nil {\n            listenerRegistration?.remove()\n\
  \            listenerRegistration = nil\n        }\n    }\n    \n    func subscribe()\
  \ {\n        if listenerRegistration == nil {\n            listenerRegistration\
  \ = db.collection(\"books\")\n                .addSnapshotListener { [weak self]\
  \ (querySnapshot, error) in\n                    guard let documents = querySnapshot?.documents\
  \ else {\n                        self?.errorMessage = \"No documents in 'books'\
  \ collection\"\n                        return\n                    }\n        \
  \            self?.books = documents.compactMap { queryDocumentSnapshot in\n   \
  \                     let result = Result {\n                            try queryDocumentSnapshot.data(as:\
  \ Book.self)\n                        }\n                        switch result {\n\
  \                        case .success(let book):\n                            self?.errorMessage\
  \ = nil\n                            return book\n                        case .failure(let\
  \ error):\n                            self?.errorMessage = \"\\(error.localizedDescription)\"\
  \n                            return nil\n                        }\n          \
  \          }\n                }\n        }\n    }\n}\n```\n\n通过让 `BookListViewModel`\
  \ 遵循 `ObservableObject` 协议，并使用 `@Published` 属性包装器标记 `books` 属性，我们可以将 SwiftUI 的 `List`\
  \ 视图连接到该属性，并确保每当收到更新时 UI 都会刷新。\n\n```\nstruct LiveBooksListViewWithClosures: View\
  \ {\n    @StateObject private var viewModel = BookListViewModel()\n    \n    var\
  \ body: some View {\n        List(viewModel.books) { book in\n            Text(book.title)\n\
  \        }\n        .onAppear {\n            viewModel.subscribe()\n        }\n\
  \        .onDisappear {\n            viewModel.unsubscribe()\n        }\n    }\n\
  }\n```\n\n仅用几行代码，我们就构建了一个 UI，当有人对数据进行更改时，它会自动刷新——无论这个更改发生在前端还是后端。\n\n但我们还能做更多！例如，假设我们想要显示图书数量，并确保当有人在\
  \ Cloud Firestore 中向 `books` 集合添加新书时，UI 上的这个数字能够更新。\n\n请记住，已发布属性会暴露一个 Combine 发布者。我们可以通过该属性的*投影值*（此处为\
  \ `$books`）访问这个发布者。这允许我们创建一个 Combine 管道来确定图书数量。使用 `assign(to:)` 订阅者，我们可以将结果分配给另一个发布者，然后将其连接到\
  \ UI 以显示一个始终最新的数字。设置此类 Combine 管道的合适位置是在视图模型的初始化器中。\n\n```\nprivate class BookListViewModel:\
  \ ObservableObject {\n    @Published var books = [Book]()\n    @Published var numberOfBooks\
  \ = 0\n    ...\n    init() {\n        $books.map { books in\n            books.count\n\
  \        }\n        .assign(to: &$numberOfBooks)\n    }\n    ...\n}\n```\n\n###\
  \ 使用 Combine 封装 API\n\n这是在结合使用 Combine 的 SwiftUI 应用中集成数据源最常用的方法，并且效果非常好。然而，它相当冗长，需要大量样板代码。\n\
  \n与其显式设置快照监听器，不如看看我们是否可以将代码封装到 Combine 发布者中，以便用更具声明性的方式调用它。\n\n回顾我们迄今讨论过的代码，可以看到我们有两种不同类型的调用：\n\
  \n-   获取单个文档、集合中的所有文档或查询结果属于所谓的单次调用：我们发起调用来获取一个文档（或集合/查询中的所有文档），然后使用回调处理程序接收调用的结果。\n\
  \n-   监听单个文档、集合或查询的更新则不同：我们不会只收到一次调用的结果，而是每次有更新时都会收到一个新的快照。我们接收到的是一个更新流。这听起来与 Combine\
  \ 的定义非常相似：\n\n> *Combine 框架提供了一个声明式 Swift API，用于处理随时间变化的值。*^(⁹¹)\n\n让我们看看能否实现我们自己的发布者来处理这些事件流！\n\
  \n然而，Apple 积极劝阻开发者不要使用 Combine 的低层级原语（例如 `Publisher`、`Subscription` 和 `Subscriber`）来实现自己的发布者。\n\
  \n## 创建你自己的发布者\n\n与其自己实现 `Publisher`^(⁹²) 协议，不如通过使用 Combine 框架提供的几种类型之一来创建你自己的发布者：\n\
  \n-   使用 `Subject`^(⁹³) 的具体子类，例如 `PassthroughSubject`^(⁹⁴)，通过调用其 `send(_:)`^(⁹⁵)\
  \ 方法按需发布值。\n\n-   使用 `CurrentValueSubject`^(⁹⁶)，在更新主体的底层值时进行发布。\n\n-   将 `@Published`\
  \ 注解添加到你自己的某个类型的属性上。这样做之后，该属性会获得一个发布者，每当属性值发生变化时，该发布者就会发出事件。参见 `Published`^(⁹⁷)\
  \ 类型以了解此方法的示例。\n\n因此，与其从头构建发布者，不如遵循 Apple 的建议，使用 Combine 更高级别的构建块（如 `PassthroughSubject`\
  \ 和 `Future`）来创建我们的自定义发布者。\n\n\n\n### 使用 `PassthroughSubject` 封装快照监听器\n\n为了使与现有代码的集成更简单，Combine\
  \ 包含了 `Subject` 协议。`Subject` 是一种特殊类型的发布者，允许外部调用方向 Combine 管道中注入事件。`Subject` 协议定义了一个\
  \ `send(_:)` 方法，可用于向管道发送特定值。\n\nCombine 中有两种内置的 `Subject` 类型：`CurrentValueSubject`\
  \ 和 `PassthroughSubject`。它们之间的主要区别在于，`CurrentValueSubject` 会记住最近发布的元素，而 `PassthroughSubject`\
  \ 则不会追踪它传递的值。\n\n`Subject` 对于将现有的命令式代码适配到 Combine 特别有用。在我们的案例中，我们不需要追踪最近发送的事件，因此可以使用\
  \ `PassthroughSubject` 为 Firebase API 创建自定义的发布者，这些 API 会发送连续的事件流，例如 Firestore 快照监听器。\n\
  \n让我们来看看为 Firestore 集合或 Firestore 查询上的快照监听器实现自定义 Combine 发布者所需的步骤。\n\n我们将把这个功能作为\
  \ `Query` 的一个扩展来实现。由于 `CollectionReference` 扩展了 `Query` 接口，该发布者将同样适用于 Firestore\
  \ 集合和查询：\n\n```\npublic extension Query {\nfunc snapshotPublisher(includeMetadataChanges:\
  \ Bool = false)\n-> AnyPublisher\n{\n...\naddSnapshotListener(includeMetadataChanges:\
  \ includeMetadataChanges) { snapshot, error in\n...\n}\n...\n}\n}\n```\n\n这段代码片段向\
  \ `Query` 接口添加了一个方法，该方法返回一个泛型为 `QuerySnapshot` 和 `Error` 类型的 `AnyPublisher`。在该方法内部，我们调用了原始的\
  \ `addSnapshotListener` 方法，该方法接受一个闭包，我们需要实现这个闭包来处理调用的结果。如前所述，当被观察的集合或查询发生更改（例如，通过添加、更改或删除文档）时，这个闭包就会被调用。闭包的\
  \ `snapshot` 参数将包含该集合或查询中所有文档的快照。如果发生错误，会通过 `error` 参数来传递。\n\n为了将闭包的结果注入 Combine\
  \ 管道，我们需要设置一个 `PassthroughSubject` 并将其返回给 `snapshotPublisher` 的调用者：\n\n```\npublic\
  \ extension Query {\nfunc snapshotPublisher(includeMetadataChanges: Bool = false)\n\
  -> AnyPublisher\n{\nlet subject = PassthroughSubject()\naddSnapshotListener(includeMetadataChanges:\
  \ includeMetadataChanges) { snapshot, error in\n...\n}\nreturn subject.eraseToAnyPublisher()\n\
  }\n}\n```\n\n通过擦除主题的具体类型，我们确保了 `snapshotPublisher` 方法的返回类型保持简洁。\n\n最后，在闭包内部，我们可以使用\
  \ `PassthroughSubject` 向我们的订阅者发送事件。我们需要处理两种情况：当收到快照时，我们可以将其 `send` 给 `subject`。如果出现\
  \ `error`，我们必须向 subject 发送一个 `failure`，以向 Combine 发出信号，表明管道应该被取消。\n\n```\npublic\
  \ extension Query {\nfunc snapshotPublisher(includeMetadataChanges: Bool = false)\n\
  -> AnyPublisher\n{\nlet subject = PassthroughSubject()\naddSnapshotListener(includeMetadataChanges:\
  \ includeMetadataChanges) { snapshot, error in\nif let error = error {\nsubject.send(completion:\
  \ .failure(error))\n} else if let snapshot = snapshot {\nsubject.send(snapshot)\n\
  }\n}\nreturn subject.eraseToAnyPublisher()\n}\n}\n```\n\n到目前为止看起来不错，但还有一个细节我们需要处理。当调用\
  \ `addSnapshotListener` 时，我们会收到一个句柄，之后可以使用它来移除快照监听器。当你不再关心某个查询或集合的监听时，应该移除所有 Firestore\
  \ 快照监听器。\n\n但是，我们如何在 `snapshotPublisher` 方法内部存储和管理这个快照监听器句柄呢？事实证明，我们可以利用 Combine\
  \ 的 `handleEvents` 操作符。这个操作符允许我们监听 Combine 管道的生命周期事件，例如，当管道被取消时。因此，我们可以将快照监听器句柄存储在一个局部变量中，随后在管道被取消时用它来移除快照监听器。\n\
  \n```\npublic extension Query {\nfunc snapshotPublisher(includeMetadataChanges:\
  \ Bool = false)\n-> AnyPublisher\n{\nlet subject = PassthroughSubject()\nlet listenerHandle\
  \ =\naddSnapshotListener(includeMetadataChanges: includeMetadataChanges) { snapshot,\
  \ error in\nif let error = error {\nsubject.send(completion: .failure(error))\n\
  } else if let snapshot = snapshot {\nsubject.send(snapshot)\n}\n}\nreturn\nsubject\n\
  .handleEvents(receiveCancel: listenerHandle.remove)\n.eraseToAnyPublisher()\n}\n\
  }\n```\n\n以上就是将现有 API 适配到 Combine 的方法！\n\n让我们更新之前的代码示例，以使用这个新的发布者：\n\n```\nprivate\
  \ class BookListViewModel: ObservableObject {\n@Published var books = [Book]()\n\
  @Published var errorMessage: String?\nprivate var db = Firestore.firestore()\nprivate\
  \ var cancellable: AnyCancellable?\nfunc subscribe() {\ncancellable = db.collection(\"\
  books\").snapshotPublisher()\n.tryMap { querySnapshot in\ntry querySnapshot.documents.compactMap\
  \ { documentSnapshot in\ntry documentSnapshot.data(as: Book.self)\n}\n}\n.replaceError(with:\
  \ [Book]())\n.handleEvents(receiveCancel: {\nprint(\"Cancelled\")\n})\n.assign(to:\
  \ \\.books, on: self)\n}\nfunc unsubscribe() {\ncancellable?.cancel()\n}\n}\n```\n\
  \n\n\n### 使用 `Future` 从 Firestore 实现一次性数据读取\n\n实时同步是 Firestore 的关键特性之一，但并非所有场景都需要或不适合采用实时更新。通常，按需获取数据就足够了。Firestore\
  \ 支持一次性读取数据（无论是单个文档、集合还是查询结果），本章开头部分已经展示了相关示例。\n\n如何在 Combine 中实现这一功能？本质上，我们需要发起一次请求，等待其完成，然后将结果发送到\
  \ Combine 管线中。\n\n这正是 `Future` 的用途。`Future` 是一种 `Publisher`，它能“最终生成单个值，然后正常结束或失败”。\n\
  \n让我们用 `Future` 创建一个一次性 Publisher 来从 Firestore 获取单个文档。这次，我们将为 `DocumentReference`\
  \ 创建一个扩展：\n\n```\nextension DocumentReference {\nfunc getDocument(source: FirestoreSource\
  \ = .default)\n-> Future<DocumentSnapshot, Error>\n{\n...\nself.getDocument(source:\
  \ source) { snapshot, error in\n...\n}\n...\n}\n}\n```\n\n与其他 Publisher 一样，`Future`\
  \ 也是泛型类型，包含值类型和错误类型。在我们的例子中，值类型是 `DocumentSnapshot`。你可能会疑惑为什么返回 `Future` 而不是 `AnyPublisher`。`Future`\
  \ 具有一些特殊属性，使其与其他 Publisher 不同。例如，`Future` 会立即触发执行。普通的 Publisher 只有在有订阅者时才会触发。为了对调用方透明，我们显式返回\
  \ `Future`，而不使用类型擦除将其转为 `AnyPublisher`。\n\n现在，我们将基于闭包的 `getDocument` 方法调用封装在 `Future`\
  \ 中：\n\n```\nextension DocumentReference {\nfunc getDocument(source: FirestoreSource\
  \ = .default)\n-> Future<DocumentSnapshot, Error>\n{\nFuture { promise in\nself.getDocument(source:\
  \ source) { snapshot, error in\n...\n}\n}\n}\n}\n```\n\n当 Firestore 返回错误或文档快照时，闭包内的代码将被调用。`Future`\
  \ 闭包的 `promise` 参数可用于与调用方通信：\n\n```\nextension DocumentReference {\nfunc getDocument(source:\
  \ FirestoreSource = .default)\n-> Future<DocumentSnapshot, Error>\n{\nFuture { promise\
  \ in\nself.getDocument(source: source) { snapshot, error in\nif let error = error\
  \ {\npromise(.failure(error))\n} else if let snapshot = snapshot {\npromise(.success(snapshot))\n\
  }\n}\n}\n}\n}\n```\n\n我们检查是否收到了快照或错误，并据此调用 promise。这段代码看起来很熟悉，因为它类似于我们之前为 `snapshotPublisher`\
  \ 编写的代码，但我需要指出的是，promise 期望接收一个 `Result` 类型，因此 `.failure` 和 `.success` 是 `Result`\
  \ 类型中的枚举值。\n\n至此，我们通过将基于闭包的 Firestore 单个文档获取 API 封装在 `Future` 中，成功将其适配到 Combine\
  \ 框架。\n\n以下是调用该新的一次性 Combine Publisher 来获取文档并将其映射到自定义 Swift 结构体的方式：\n\n```\nprivate\
  \ class BookListViewModel: ObservableObject {\n@Published var book = Book.empty\n\
  private var db = Firestore.firestore()\nfunc fetchBook() {\ndb.collection(\"books\"\
  ).document(\"hitchhiker\").getDocument()\n.tryMap { documentSnapshot in\ntry documentSnapshot.data(as:\
  \ Book.self)\n}\n.replaceError(with: Book.empty)\n.assign(to: &$book)\n}\n}\n```\n\
  \n## 总结\n\n苹果为自家许多 API 提供了优秀的 Combine Publisher，但对于第三方 API，我们可能需要自行完成这项工作。\n\n在本章中，我们讨论了几种将现有命令式代码适配到\
  \ Combine 的方法：\n\n-   你了解了如何实现一个带有 `@Published` 属性的 `ObservableObject`，从而通过 Publisher\
  \ 暴露数据。这不仅允许我们将 SwiftUI 视图连接到发布的属性，还使我们能够将 Combine 管线连接到该属性。\n-   也可以使用 Combine\
  \ 的低级原语（如 `Publisher`、`Subscription` 和 `Subscriber`）创建自定义 Publisher。然而，苹果明确不鼓励开发者这样做，因为这种方法需要我们自行管理背压。\n\
  -   相反，苹果推荐使用 `PassthroughSubject` 和 `Future` 这样的便捷 Publisher 来实现自定义 Publisher，并且我们深入研究了如何使用这种方法封装现有的基于闭包的\
  \ API。\n\n采用哪种方法取决于你的使用场景——在大多数情况下，使用视图模型可能是最实用、最高效的方式。但如果你是 SDK 提供者，则绝对应该考虑为你的\
  \ API 实现 Combine Publisher。这正是我们在 Firebase 所做的：我们使用 `PassthroughSubject` 和 `Future`\
  \ 为大多数异步 Firebase API 实现了 Combine Publisher。\n\n"
- "# 13. Combine 调度器与 SwiftUI\n\n默认情况下，SwiftUI 中响应 UI 事件运行的任何代码都会在主线程上执行。由于我们的大部分代码都涉及响应某些用户交互来更新其他\
  \ UI 元素，因此在大多数情况下这没有问题。例如，你可能需要验证用户的输入，以确保他们填写了多步骤表单中的所有必填字段。这是一个内存密集型过程，其运行速度足够在主线中执行，而不会引起任何问题。\n\
  \n然而，一旦你想执行更复杂的计算，或者需要访问本地存储、网络或任何访问延迟高于本地内存的 API，如果你在主线程上执行这些代码，就可能阻塞 UI。\n\n阻塞\
  \ UI 会导致各种问题：应用的 UI 变得无响应，动画开始出现卡顿，最终用户会感到不满，开始在 App Store 上留下负面评论，或在 Twitter 上抱怨。\n\
  \n这就是为什么你应该将任何长时间运行的代码卸载到后台线程。当你的代码在后台运行时，主线程可以自由处理 UI 事件。用户可以继续使用应用，直到后台进程最终完成。某些后台进程可能会产生需要在\
  \ UI 上显示的结果。然而，由于 UI 更新必须在主线程上进行，因此你需要先切换回主线程，才能用后台线程接收到的结果更新 UI。\n\nCombine 提供了一种优雅且声明式的机制，用于控制管线的各个部分在何处运行。这种机制基于调度器（Scheduler）的概念构建，帮助我们推理代码应该在何处执行，而无需直接处理线程的复杂性。\n\
  \n在本章中，你将学习如何有效使用这种机制，帮助你构建能更好利用系统资源的应用，从而保持应用 UI 的响应性。\n\n\n\n## 什么是调度器\n\nCombine\
  \ 使用 `Scheduler` 作为一种抽象机制，让我们可以指定代码运行的*时机*和*位置*，从而无需直接与线程打交道。根据苹果官方文档，`Scheduler`\
  \ 是*一个定义何时以及如何执行闭包的协议*^(⁹⁹)。\n\n`Scheduler` 协议本身定义了一系列方法，允许调用者立即或在未来的某个日期和时间执行代码：\n\
  \n```\npublic protocol Scheduler {\n    /// 为该调度器描述一个时间点。\n    associatedtype SchedulerTimeType\
  \ : Strideable where\n        Self.SchedulerTimeType.Stride : SchedulerTimeIntervalConvertible\n\
  \    /// 一种定义调度器所接受选项的类型。\n    ///\n    /// 该类型可由每个 `Scheduler` 自由定义。\n    /// 通常，接受\
  \ `Scheduler` 参数的操作\n    /// 也会接受 `SchedulerOptions`。\n    associatedtype SchedulerOptions\n\
  \    /// 该调度器对当前时刻的定义。\n    var now: Self.SchedulerTimeType { get }\n    /// 调度器允许的最小容差。\n\
  \    var minimumTolerance: Self.SchedulerTimeType.Stride { get }\n    /// 在下一个可能的机会执行该操作。\n\
  \    func schedule(options: Self.SchedulerOptions?,\n                  _ action:\
  \ @escaping () -> Void)\n    /// 在指定日期之后某个时间执行该操作。\n    func schedule(after date:\
  \ Self.SchedulerTimeType,\n                  tolerance: Self.SchedulerTimeType.Stride,\n\
  \                  options: Self.SchedulerOptions?,\n                  _ action:\
  \ @escaping () -> Void)\n    /// 在指定日期之后，以指定频率执行该操作，\n    /// 如果可能的话，可以选择考虑容差。\n\
  \    func schedule(after date: Self.SchedulerTimeType,\n                  interval:\
  \ Self.SchedulerTimeType.Stride,\n                  tolerance: Self.SchedulerTimeType.Stride,\n\
  \                  options: Self.SchedulerOptions?,\n                  _ action:\
  \ @escaping () -> Void) -> Cancellable\n}\n```\n\n不同的调度器通过使用关联类型 `SchedulerTimeType`\
  \ 来实现这种计时方面的功能。该关联类型需要遵循 `SchedulerTimeIntervalConvertible`，这是一种表示相对时间的方式。\n\n让我们看看在使用\
  \ Combine 时会遇到的一些调度器，并讨论何时使用它们。\n\n### 调度器类型\n\n以下是在使用 SwiftUI 时最相关的调度器：\n\n*  \
  \ `ImmediateScheduler` 是默认调度器，如果你没有显式指定其他调度器，就会使用它。它会在触发管道的同一线程上立即执行代码。我们将在下一节更详细地讨论这个调度器。\n\
  \n*   `RunLoop` 是一个你会经常看到的调度器。它在特定的运行循环上执行工作。\n\n*   `DispatchQueue` 允许我们在特定的调度队列上执行代码。最常用的是主调度队列和后台调度队列（你可以指定不同的服务质量等级，从\
  \ `background` 到 `userInteractive`），但你也可以创建自己的调度队列，并根据需要进行配置。\n\n那么，你应该使用哪个 `Scheduler`\
  \ 呢？\n\n在 SwiftUI 上下文中，最常用的调度器是 `RunLoop` 和 `DispatchQueue`。尽管它们看起来非常相似（参见 Philippe\
  \ Hausler 在 Swift 论坛上的回答^(¹⁰⁰)），但在任何需要调度运行在主线程上的代码以访问 UI 的 Combine 管道中，有一个区别是相关的。\n\
  \n正如这个 StackOverflow 回答^(¹⁰¹)中所解释的，当使用 `RunLoop` 时，如果用户在拖动或触摸 UI，Combine 管道将不会传递事件。然而，当使用\
  \ `DispatchQueue` 作为调度器时，管道会继续传递事件。\n\n因此，如果你希望确保即使在与应用 UI 交互（例如滚动列表、点击按钮或拖动屏幕上的元素）时，Combine\
  \ 管道仍能继续传递事件，那么你应该使用 `DispatchQueue`。\n\n### 默认行为\n\n如果你没有明确告诉 Combine 如何调度你的代码，它将默认在与触发管道的事件相同的线程上运行你的代码。在\
  \ SwiftUI 中使用 Combine 时，大多数管道会订阅某个视图模型上的已发布属性。SwiftUI 运行在主线程上，因此任何源自 UI 的事件都将从主线程发送。\n\
  \n在下面的示例中，我们通过响应按钮点击来更改已发布属性的值。处理按钮点击的闭包运行在主线程上，因此视图模型中的 Combine 管道也将在主线程上运行。\n\n\
  ```\nclass ViewModel: ObservableObject {\n    @Published var demo = false\n    private\
  \ var cancellables = Set<AnyCancellable>()\n\n    init() {\n        $demo\n    \
  \        .sink { value in\n                print(\"Main thread: \\(Thread.isMainThread)\"\
  )\n            }\n            .store(in: &cancellables)\n    }\n}\n\nstruct DemoView:\
  \ View {\n    @StateObject var viewModel = ViewModel()\n\n    var body: some View\
  \ {\n        Button(\"Toggle from main thread\") {\n            viewModel.demo.toggle()\n\
  \        }\n        .buttonStyle(.action)\n    }\n}\n```\n\n当你运行这段代码^(¹⁰²)并点击按钮时，你会看到以下输出，这证实了\
  \ SwiftUI 在主线程上发送事件：\n\n```\nMain thread: true\n```\n\n这种调度行为是由 Combine 的默认调度器 `ImmediateScheduler`\
  \ 引起的。它会在当前线程上立即执行代码。因此，如果你从后台线程发送事件，管道也会在该特定后台线程上运行。让我们对我们的示例稍作修改，将更改已发布属性的代码包装在\
  \ `DispatchQueue.global().async { }` 调用中。结果，Combine 管道将在同一个后台线程上运行。\n\n```\nclass\
  \ ViewModel: ObservableObject {\n    @Published var demo = false\n    private var\
  \ cancellables = Set<AnyCancellable>()\n\n    init() {\n        $demo\n        \
  \    .sink { value in\n                print(\"Main thread: \\(Thread.isMainThread)\"\
  )\n            }\n            .store(in: &cancellables)\n    }\n}\n\nstruct DemoView:\
  \ View {\n    @StateObject var viewModel = ViewModel()\n\n    var body: some View\
  \ {\n        Button(\"Toggle from main thread\") {\n            DispatchQueue.global().async\
  \ {\n                viewModel.demo.toggle()\n            }\n        }\n       \
  \ .buttonStyle(.action)\n    }\n}\n```\n\n运行这段代码并点击按钮，会得到以下输出：\n\n```\n2022-05-14\
  \ 12:19:32.093826+0200 SwiftUICombineSchedulers[41912:2513626] [SwiftUI] Publishing\
  \ changes from background threads is not allowed; make sure to publish values from\
  \ the main thread (via operators like receive(on:)) on model updates.\nMain thread:\
  \ false\n```\n\n这种默认行为在大多数情况下都适用。例如，如果你想验证用户输入，这通常可以在主线程上运行，因为你将把多个 UI 状态组合到输入表单的\
  \ `isValid` 状态中。\n\n然而，一旦你需要访问网络（或任何其他异步数据源），情况就变得复杂了，你会希望在回到主线程更新 UI 之前，先在后台线程上运行管道的部分内容。\n\
  \n一种切换线程的方法是显式使用 `DispatchQueue` 及其方法，在主队列（`DispatchQueue.main`）和全局后台队列之一（`DispatchQueue.global()`）或你自己创建和管理的队列之间进行切换。\n\
  \n\n\n## 切换调度器\n\n显式调用方法切换到最合适的`DispatchQueue`虽然可行，但这种方法会导致代码过于冗长。\n\n如果能有一种声明式的方法，确保管道的各个部分在适当的线程上运行，那岂不是更优雅？\n\
  \nCombine 提供了多个操作符，允许我们通过声明要使用的调度器来实现线程切换。\n\n其中最重要的是`receive(on:)`，你会发现自己经常使用它，尤其是在访问网络时：它允许我们告诉\
  \ Combine 在接收订阅者（例如`sink`或`assign`）发送的事件时使用哪个调度器。\n\n另一个关键的调度操作符是`subscribe(on:)`——我们可以用它来指定\
  \ Combine 在订阅上游发布者时应使用的调度器。\n\n影响管道中调度器使用的其他操作符还包括`debounce`、`throttle`和`delay`。\n\
  \n在接下来的章节中，我们将探讨这些操作符如何影响一个接收 SwiftUI 事件处理器事件的 Combine 管道的运行过程。我们将使用以下发布者来模拟一段执行长时间计算的代码^(¹⁰³)：\n\
  \n```swift\nfunc performWork() -> AnyPublisher {\n    print(\"[performWork:start]\
  \ isMainThread: \\(Thread.isMainThread)\")\n    return Deferred {\n        Future\
  \ { promise in\n            print(\"[performWork:Future:start] isMainThread: \\\
  (Thread.isMainThread)\")\n            sleep(5)\n            print(\"[performWork:Future:finished]\
  \ isMainThread: \\(Thread.isMainThread)\")\n            promise(.success(true))\n\
  \        }\n    }\n    .eraseToAnyPublisher()\n}\n```\n\n由于`Future`会在创建后立即执行其闭包，而不会等待订阅者连接，因此我们需要将其包装在`Deferred`发布者中。这样做可以确保闭包中的代码仅在连接订阅者后才会执行，从而使我们能够影响该发布者使用的调度器。\n\
  \n### 使用`subscribe(on:)`控制上游发布者\n\n通过使用`subscribe(on:)`操作符，你可以控制上游发布者运行在哪个调度队列上。\n\
  \n当你希望确保发布者在后台线程上运行时，这非常有用。与其将代码包裹在`DispatchQueue.global().async { }`调用中，不如添加一个`receive(on:)`调用。这种声明式方法将使你的代码更易于阅读和理解。\n\
  \n`subscribe(on:)`操作符指定了用于执行上游发布者的`subscribe`、`cancel`和`request`操作的调度器。\n\n在以下代码片段中^(¹⁰⁴)，我们通过在管道中添加`subscribe(on:\
  \ DispatchQueue.global(qos: .background)`调用，确保`performWork()`中的发布者在后台线程上运行：\n\n\
  ```swift\nfunc start() {\n    print(\"[start:at beginning] isMainThread: \\(Thread.isMainThread)\"\
  )\n    self.performWork()\n        .handleEvents(receiveSubscription: { sub in\n\
  \            print(\"[receiveSubscription] isMainThread: \\(Thread.isMainThread)\"\
  )\n        }, receiveOutput: { value in\n            print(\"[receiveOutput] isMainThread:\
  \ \\(Thread.isMainThread)\")\n        }, receiveCompletion: { completion in\n  \
  \          print(\"[receiveCompletion] isMainThread: \\(Thread.isMainThread)\")\n\
  \        }, receiveCancel: {\n            print(\"[receiveCancel] isMainThread:\
  \ \\(Thread.isMainThread)\")\n        }, receiveRequest: { demand in\n         \
  \   print(\"[receiveRequest] isMainThread: \\(Thread.isMainThread)\")\n        })\n\
  \        .map { value -> Bool in\n            print(\"[map 1] isMainThread: \\(Thread.isMainThread)\"\
  )\n            return value\n        }\n        .subscribe(on: DispatchQueue.global(qos:\
  \ .background))\n        .map { value -> Int in\n            print(\"[map 2] isMainThread:\
  \ \\(Thread.isMainThread)\")\n            return self.times + 1\n        }\n   \
  \     .sink { value in\n            print(\"[sink] isMainThread: \\(Thread.isMainThread)\"\
  )\n            self.times = value\n        }\n        .store(in: &self.cancellables)\n\
  \    print(\"[start:at end] isMainThread: \\(Thread.isMainThread)\")\n}\n```\n\n\
  当从主线程调用此代码时（例如，在`Button`的动作处理程序中），你将在控制台上看到以下输出：\n\n```\n[start:at beginning] isMainThread:\
  \ true\n[performWork:start] isMainThread: true\n[start:at end] isMainThread: true\n\
  [performWork:Future:start] isMainThread: false\n\n[performWork:Future:finished]\
  \ isMainThread: false\n[receiveSubscription] isMainThread: false\n[receiveRequest]\
  \ isMainThread: false\n[receiveOutput] isMainThread: false\n[map 1] isMainThread:\
  \ false\n[map 2] isMainThread: false\n[sink] isMainThread: false\n2022-05-10 09:59:07.514607+0200\
  \ SwiftUICombineSchedulers[80945:27603444] [SwiftUI] Publishing changes from background\
  \ threads is not allowed; make sure to publish values from the main thread (via\
  \ operators like receive(on:)) on model updates.\n[receiveCompletion] isMainThread:\
  \ false\n```\n\n如你所见，调用始于主线程，但随后执行切换到后台线程。因此，发布者将在后台线程上执行，从而释放主线程用于其他与 UI 相关的工作。\n\
  \n如前所述，调用`subscribe(on:)`会影响上游发布者。然而，管道的其余部分*也*会使用你指定的调度器执行，这就是为什么 SwiftUI 会发出运行时警告，说我们不应从后台线程更新\
  \ UI。请记住，所有 UI 更新都应从主线程执行。\n\n### 使用`receive(on:)`控制下游订阅者\n\n通过使用`receive(on:)`操作符，你可以影响\
  \ Combine 将为所有下游操作符和订阅者使用哪个调度器。\n\n这对于确保 Combine 管道的订阅者在主线程上运行非常有用——例如，当将值赋给与 SwiftUI\
  \ 视图关联的已发布属性时：对该属性进行的任何更改都将导致 UI 更新，因此必须在主线程上进行。\n\n让我们更新之前的代码片段，在`sink`操作符之前添加`.receive(on:\
  \ DispatchQueue.main)`调用：\n\n```swift\noverride func start() {\n    print(\"[start:at\
  \ beginning] isMainThread: \\(Thread.isMainThread)\")\n    self.performWork()\n\
  \        .handleEvents(receiveSubscription: { sub in\n            print(\"[receiveSubscription]\
  \ isMainThread: \\(Thread.isMainThread)\")\n        }, receiveOutput: { value in\n\
  \            print(\"[receiveOutput] isMainThread: \\(Thread.isMainThread)\")\n\
  \        }, receiveCompletion: { completion in\n            print(\"[receiveCompletion]\
  \ isMainThread: \\(Thread.isMainThread)\")\n        }, receiveCancel: {\n      \
  \      print(\"[receiveCancel] isMainThread: \\(Thread.isMainThread)\")\n      \
  \  }, receiveRequest: { demand in\n            print(\"[receiveRequest] isMainThread:\
  \ \\(Thread.isMainThread)\")\n        })\n        .map { value -> Bool in\n    \
  \        print(\"[map 1] isMainThread: \\(Thread.isMainThread)\")\n            return\
  \ value\n        }\n        .subscribe(on: DispatchQueue.global(qos: .background))\n\
  \        .map { value -> Int in\n            print(\"[map 2] isMainThread: \\(Thread.isMainThread)\"\
  )\n            return self.times + 1\n        }\n        .receive(on: DispatchQueue.main)\n\
  \        .sink { value in\n            print(\"[sink] isMainThread: \\(Thread.isMainThread)\"\
  )\n            self.times = value\n        }\n        .store(in: &self.cancellables)\n\
  \    print(\"[start:at end] isMainThread: \\(Thread.isMainThread)\")\n}\n```\n\n\
  这将告诉 Combine 为任何下游操作符和订阅者使用`main`调度队列。在我们的例子中，这意味着`sink`订阅者将在主线程上执行，如下面的控制台输出所示。你还会注意到\
  \ SwiftUI 不再发出关于从后台发布模型更改的警告：\n\n```\n[start:at beginning] isMainThread: true\n\
  [performWork:start] isMainThread: true\n[start:at end] isMainThread: true\n[performWork:Future:start]\
  \ isMainThread: false\n\n[performWork:Future:finished] isMainThread: false\n[receiveSubscription]\
  \ isMainThread: false\n[receiveRequest] isMainThread: false\n[receiveOutput] isMainThread:\
  \ false\n[map 1] isMainThread: false\n[map 2] isMainThread: false\n[receiveCompletion]\
  \ isMainThread: false\n[sink] isMainThread: true\n```\n\n\n\n### 影响调度编排的其他操作符\n\n\
  Combine 中包含多个会影响事件向下游管道传递时序的操作符：\n\n- `debounce` 仅在事件之间的指定时间间隔过后才发布元素。\n- `throttle`\
  \ 在指定时间间隔内发布上游发布者发布的最近元素或第一个元素。\n- `delay` 在特定调度器上将所有输出延迟指定的时间量后，再传递给下游接收者。\n\n\
  所有这些操作符都接受一个时间间隔参数和一个调度器参数，用于确定操作符在何时传递其输出元素。让我们通过一个快速示例来理解其中的含义。\n\n在 SwiftUI 中，一个常用的时序操作符是\
  \ `debounce`——它允许我们指定一个时间间隔，该间隔必须存在于操作符将发送给其下游订阅者的两个事件之间。这对于调用远程 API 根据用户输入执行搜索的搜索对话框特别有用。为了避免向远程\
  \ API 发送过多请求而造成过载，我们通常会在保存搜索词条的已发布属性上安装一个 `debounce` 操作符。\n\n让我们来看一下前面关于优化网络层的章节中使用的一段代码：\n\
  \n```\n$input\n.debounce(for: 0.8, scheduler: DispatchQueue.main)\n.handleEvents\
  \ { subscription in\nself.logEvent(tag: \"handleEvents\")\n} receiveOutput: { value\
  \ in\nself.logEvent(tag: \"receiveOutput - {\\(value)}\")\n} receiveCompletion:\
  \ { completion in\nself.logEvent(tag: \"receiveCompletion\")\n} receiveCancel: {\n\
  self.logEvent(tag: \"receiveCancel\")\n} receiveRequest: { demand in\nself.logEvent(tag:\
  \ \"receiveRequest\")\n}\n.sink { value in\nself.logEvent(tag: \"sink - {\\(value)}\"\
  )\nprint(\"Value: \\(value)\")\nself.output = value\n}\n.store(in: &cancellables)\n\
  ```\n\n这段代码获取用户在文本输入字段中输入的内容，然后使用 `debounce` 操作符来减少传递给下游订阅者的事件数量。这意味着下游订阅者只有在用户停止输入\
  \ 0.8 秒后，才会接收到 `input` 属性的当前值。\n\n如果改用 `DispatchQueue.global(qos: .background)`，则所有事件都会在后台线程上到达。\n\
  \n这意味着为某个调度操作符提供一个调度器，相当于添加了一个对 `subscribe(on:)` 的调用。\n\n## 执行异步工作\n\n在主线程上执行计算密集型工作并非良策——正如我们在前面的示例中看到的，在主线程上运行此类代码可能会导致\
  \ UI 卡顿，甚至完全阻塞 UI。\n\n就像访问异步 API（例如网络、像 Firebase 这样的云服务，甚至是异步处理事件的本地 API）一样，您应通过在后端调度器上订阅相应的发布者（或操作符）来将任何此类代码卸载到后台线程。当后台进程完成并且发布者发出事件时，您最终需要切换到主线程来更新\
  \ UI。\n\n以下是使用的一般模式：\n\n```\npublisher\n.subscribe(on: DispatchQueue.global())\n\
  .receive(on: DispatchQueue.main)\n.sink { }\n```\n\n您可以使用 `DispatchQueue.global(qos:)`\
  \ 的重载版本来指定您希望用于后台运行代码的服务质量：\n\n- `background`：后台任务在所有任务中优先级最低。将此类别分配给您的应用在后台运行时用于执行工作的任务或调度队列。\n\
  - `utility`：实用工具任务的优先级低于 default、userInitiated 和 userInteractive 任务，但高于 background\
  \ 任务。将此服务质量类别分配给不会阻止用户继续使用您的应用的任务。例如，您可以将其分配给用户不会主动跟踪其进度的长时间运行任务。\n- `default`：默认任务的优先级低于\
  \ userInitiated 和 userInteractive 任务，但高于 utility 和 background 任务。将此类别分配给您的应用代表用户启动或用于执行主动工作的任务或队列。\n\
  - `userInitiated`：用户发起任务在系统中的优先级仅次于用户交互任务。将此类别分配给为用户正在执行的操作提供即时结果，或阻止用户使用您的应用的任务。例如，您可以使用此服务质量类别来加载您想要显示给用户的电子邮件内容。\n\
  - `userInteractive`：用户交互任务在系统中具有最高优先级。将此类别用于与用户交互或主动更新您的应用用户界面的任务或队列。例如，将其用于动画或交互式跟踪事件。\n\
  \n要查看实际运行的示例，请参阅本章示例项目中的 `SchedulerDemoView.swift`。\n\n## 与其他 API 集成\n\n我们通常可以完全控制自己编写的代码，因此可以应用上一节概述的技术来控制管道的调度。但在使用他人编写的代码时，我们可能并不总能拥有这种便利。在本节中，我们将查看上游发布者控制调度的几个示例——以及我们如何影响管道其余部分的调度方式——这在将管道的结果分配给可能与\
  \ UI 连接的已发布属性时尤其重要。\n\n### URLSession\n\n首先看一下网络访问。我们在第 9 章中详细讨论了 `URLSession` 的使用，您可能还记得我们遇到了一些调度问题。下面是一个典型的代码片段，它从\
  \ URL 获取数据，然后将其分配给一个与 SwiftUI 视图连接的已发布属性：\n\n```\nURLSession.shared.dataTaskPublisher(for:\
  \ url)\n.map(\\.data)\n.decode(type: UserNameAvailableMessage.self,\ndecoder: JSONDecoder())\n\
  .map(\\.isAvailable)\n.replaceError(with: false)\n.assign(to: &$isUsernameAvailable)\n\
  ```\n\n运行此代码将产生一个警告：\n\n```\n[SwiftUI] Publishing changes from background threads\
  \ is not allowed; make sure to publish values from the main thread (via operators\
  \ like receive(on:)) on model updates.\n```\n\n此警告是由于 `URLSession` 在后台线程上执行，因此管道的其余部分（包括\
  \ `assign` 操作符）也将在同一线程上执行造成的。这意味着 UI 将从后台线程更新，从而触发了该警告。\n\n为避免这种情况，我们需要做的就是在 `assign`\
  \ 操作符之前添加一个 `receive(on:)` 操作符，以确保我们从主线程访问 UI：\n\n```\nURLSession.shared.dataTaskPublisher(for:\
  \ url)\n.map(\\.data)\n.decode(type: UserNameAvailableMessage.self,\ndecoder: JSONDecoder())\n\
  .map(\\.isAvailable)\n.replaceError(with: false)\n.receive(on: DispatchQueue.main)\n\
  .assign(to: &$isUsernameAvailable)\n```\n\n\n\n### Firebase\n\n另一个能够自主管理调度的 API\
  \ 示例是 Firebase，这是 Google 的应用开发平台。Firebase 的大部分服务（如 Cloud Firestore、Cloud Storage、Firebase\
  \ Authentication 等）都是异步的，这意味着对 Firebase 的所有调用都应在后台线程上执行。我们来看一个示例，并了解 Firestore 是如何管理这一点的。\n\
  \n以下代码片段展示了如何从 Firestore 获取单个文档：\n\n```swift\nlet docRef = Firestore.firestore()\n\
  .collection(\"books\")\n.document(documentId)\ndocRef.getDocument(as: Book.self)\
  \ { result in\nswitch result {\ncase .success(let book):\nself.book = book\nself.errorMessage\
  \ = nil\ncase .failure(let error):\nself.errorMessage = \"\\(error.localizedDescription)\"\
  \n}\n}\n```\n\nFirestore 会创建一个串行调度队列（参见 `executor_libdispatch.mm`，第 362 行^(¹⁰⁵)），并使用它来执行所有向\
  \ Cloud Firestore 后端发起远程调用的操作：\n\n```cpp\nstd::unique_ptr Executor::CreateSerial(const\
  \ char* label) {\ndispatch_queue_t queue =\ndispatch_queue_create(label,\nDISPATCH_QUEUE_SERIAL);\n\
  return absl::make_unique(queue);\n}\n```\n\n一旦此调用完成，Firestore 将使用主调度队列来调用完成处理程序。如果你希望使用不同的调度队列来返回结果，可以通过\
  \ `FirestoreSettings.dispatchQueue`^(¹⁰⁶) 来设置自定义调度队列：\n\n```swift\nlet settings\
  \ = Firestore.firestore().settings\nsettings.dispatchQueue = DispatchQueue.global(qos:\
  \ .background)\nFirestore.firestore().settings = settings\n```\n\n当你需要在后台线程上执行多个相互依赖的操作，然后再更新\
  \ UI 时，这会很有用。\n\n在前面的代码片段中，我们使用完成处理程序来处理对 `getDocument` 调用的结果。Firebase 也支持 Combine。以下是使用\
  \ Combine 时，之前代码片段的改写形式：\n\n```swift\ndb.collection(\"books\").document(\"hitchhiker\"\
  ).getDocument()\n.tryMap { documentSnapshot in\ntry documentSnapshot.data(as: Book.self)\n\
  }\n.replaceError(with: Book.empty)\n.assign(to: &$book)\n```\n\n由于 Firestore 负责将所有操作调度到最合适的调度队列（一个用于获取数据的串行后台队列，以及一个用于返回结果的主调度队列），因此通常无需切换调度队列。\n\
  \n## 总结\n\n传统上，开发者必须手动处理多线程，经常需要使用 `DispatchQueue` 和其他类似机制来切换线程。这不仅需要深入理解线程，还不可避免地导致代码冗长、难以阅读和维护。\n\
  \nCombine 将调度器作为声明式替代方案，帮助开发者避免手动将代码包装在 `DispatchQueue.main.async { }` 等调用中。相反，我们可以使用\
  \ `subscribe(on:)` 和 `receive(on:)` 等 Combine 操作符来声明 Combine 应使用的调度策略。\n\n本章的关键要点如下：\n\
  \n1.  如果你未指定调度器，Combine 将在你发起调用的同一线程上运行代码。\n2.  对于 SwiftUI，这很可能是主线程。\n3.  然而，`URLSession`\
  \ 等异步 API 可能会切换到后台线程。\n4.  在这种情况下，你应该在更新 UI 之前使用 `receive(on:)` 切换回主线程。\n5.  另一方面，某些\
  \ API（如 Firebase）可能会在返回结果之前切换回主线程。你需要意识到这一点，以避免不必要的线程跳转。\n6.  如果你想将长时间运行的任务卸载到后台，可以使用\
  \ `subscribe(on:)` 操作符。\n\n总的来说，Combine 的调度器让处理异步代码变得更加容易且不易出错。在编写 SwiftUI 代码时，Xcode\
  \ 的紫色警告信息特别有用。\n\n脚注 1 2 3 4 5 6 7 8\n\n"
