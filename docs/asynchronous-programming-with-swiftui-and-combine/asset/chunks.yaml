    #### Full Swipe


    By default, the first action for any given swipe direction can be invoked by using
    a full swipe. You can deactivate this behavior by setting the `allowsFullSwipe`
    parameter to `false`:


    ```

    .swipeActions(edge: .trailing, allowsFullSwipe: false) {

    Button(role: .destructive, action: { viewModel.deleteItem(item) } ) {

    Label("Delete", systemImage: "trash")

    }

    }

    ```


    #### Styling Your Swipe Actions


    As mentioned before, setting the `role` of a swipe action’s `Button` to `.destructive`
    will automatically tint the button red. If you don’t specify a `role`, the `Button`
    will be tinted in light gray. You can specify any other color by using the `tint`
    modifier on a swipe action’s `Button`—like so:


    ```

    .swipeActions(edge: .trailing) {

    Button (action: { selectedItem = item  } ) {

    Label("Tag", systemImage: "tag")

    }

    .tint(Color(UIColor.systemOrange))

    }

    ```


    Inside the `Button`, you can display both text labels and/or icons, using `Image`,
    `Text`, or `Label`.


    ## Managing Focus in Lists


    Managing focus is an important aspect for almost any sort of UI—getting this right
    helps your users to navigate your app faster and more efficiently. In desktop
    UIs, we have come to expect being able to navigate through the input fields on
    a form by pressing the Tab key, and on mobile it’s no less important. In Apple’s
    Reminders app, for example, the cursor will automatically be placed in any new
    reminder you create and will advance to the next row when you tap the Enter key.
    This way, you can add new elements very efficiently.


    Apple added support for focus management to SwiftUI in iOS 15—this includes both
    setting and observing focus.


    Most examples both in Apple’s own documentation and on other people’s blogs and
    videos only discuss how to use this in simple forms, such as a login form. Advanced
    use cases, such as managing focus in an editable list, aren’t covered.


    In the following, I will show you how to manage focus state in an app that allows
    users to edit elements in a list. As an example, I am going to use Make It So,
    a to-do list app I am working on. Make It So is a replica of Apple’s Reminders
    app, and the idea is to figure out how close we can get to the original using
    only SwiftUI and Firebase (for the backend services such as storage)^([^(49)](#fn49)).


    ### How to Manage Focus in SwiftUI


    At WWDC 2021, Apple introduced `@FocusState`, a property wrapper that can be used
    to track and modify focus within a scene.


    You can either use a `Bool` or an `enum` to track which element of your UI is
    focused.


    The following example makes use of an `enum` with two cases to track focus for
    a simple user profile form. As you can see in the `Button`’s closure, we can programmatically
    set the focus, for example, if the user forgot to fill out a mandatory field.


    ```

    enum FocusableField: Hashable {

    case firstName

    case lastName

    }

    struct FocusUsingEnumView: View {

    @FocusState private var focus: FocusableField?

    @State private var firstName = ""

    @State private var lastName = ""

    var body: some View {

    Form {

    TextField("First Name", text: $firstName)

    .focused($focus, equals: .firstName)

    TextField("Last Name", text: $lastName)

    .focused($focus, equals: .lastName)

    Button("Save") {

    if firstName.isEmpty {

    focus = .firstName

    }

    else if lastName.isEmpty {

    focus = .lastName

    }

    else {

    focus = nil

    }

    }

    }

    }

    }

    ```


    This approach works fine for simple input forms that have all but a few input
    elements, but it’s not feasible for `List` views or other dynamic views that display
    an unbounded number of elements.


    ### How to Manage Focus in Lists


    To manage focus in `List` views, we can make use of the fact that Swift `enum`s
    support associated values. This allows us to define an `enum` that can hold the
    `id` of a list element we want to focus:


    ```

    enum Focusable: Hashable {

    case none

    case row(id: String)

    }

    ```


    With this in place, we can define a local variable `focusedReminder` that is of
    this type and wrap it using `@FocusState`:


    ```

    struct Reminder: Identifiable {

    var id: String = UUID().uuidString

    var title: String

    }

    struct FocusableListView: View {

    @State var reminders: [Reminder] = Reminder.samples

    @FocusState var focusedReminder: Focusable?

    var body: some View {

    List {

    ForEach($reminders) { $reminder in

    TextField("", text: $reminder.title)

    .focused($focusedReminder, equals: .row(id: reminder.id))

    }

    }

    .toolbar {

    ToolbarItemGroup(placement: .bottomBar) {

    Button(action: { createNewReminder() }) {

    Text("New Reminder")

    }

    }

    }

    }

    // ...

    }

    ```


    When the user taps the *New Reminder* toolbar button, we add a new `Reminder`
    to the `reminders` array. To set the focus into the row for this newly created
    reminder, all we need to do is create an instance of the `Focusable` enum using
    the new reminder’s `id` as the associated value, and assign it to the `focusedReminder`
    property:


    ```

    struct FocusableListView: View {

    // ...

    func createNewReminder() {

    let newReminder = Reminder(title: "")

    reminders.append(newReminder)

    focusedReminder = .row(id: newReminder.id)

    }

    }

