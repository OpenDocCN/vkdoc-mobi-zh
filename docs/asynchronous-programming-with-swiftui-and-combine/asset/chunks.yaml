  trans: "\n## 设置数据绑定\n\n当然，我们想要达成的目标并不是显示五本完全相同的书。相反，让我们将视图与 `Book.swift` 中定义的示例书籍集合连接起来。\n\
    \nSwiftUI 的 `List` 视图能够显示来自 `RandomAccessCollection`（随机访问集合）的元素。很方便的是，Swift 数组符合该协议，这意味着我们可以向书籍列表视图提供一个\
    \ `Book` 数组。\n\n在将 `List` 视图与 `Book.swift` 中定义的示例书籍集合连接之前，我们需要在 `ContentView`\
    \ 上声明一个属性，用于持有对 `sampleBooks` 数组的引用。\n\n*   在 `ContentView` 顶部添加 `var books: [Book]`。\n\
    *   通过更新预览和 `BookShelfApp` 中对 `ContentView()` 的调用，将其改为 `ContentView(books: sampleBooks)`，来修复编译器错误。\n\
    \n现在我们可以将 `List` 视图与这个新属性连接起来。首先，让我们用对 `books` 属性的引用来替换封闭区间 `0..<5`。\n\n*   将\
    \ `List(1..<5)` 改为 `List(books)`。\n*   将闭包参数 `item` 重命名为 `book`。\n\n编译器会报错，提示\
    \ `Book` 不符合 `Identifiable`（可识别）协议。这是因为 `List` 需要能够识别其显示的元素，以便按确定顺序显示它们。如果元素没有唯一标识符，那么每当数据集合发生更新时，列表行就会到处跳动。\n\
    \n请按照以下步骤确保 `Book` 符合 `Identifiable` 协议：\n\n*   在 `Book.swift` 中，将 `struct Book\
    \ {` 改为 `struct Book: Identifiable {`。\n*   在 `Book` 的属性中添加 `var id = UUID().uuidString`。\n\
    \n这应该能修复编译错误。你可能需要重新编译代码（按下 `CMD+B`）。\n\n在下一步中，我们将把各个 UI 元素连接到 `Book` 结构体的相应属性上。\n\
    \n*   为了显示当前 `Book` 实例中指定的书籍封面，将 `Image(\"9781484285718-M\")` 改为 `Image(book.mediumCoverImageName)`。\n\
    *   对于标题，将硬编码的字符串改为 `book.title`。\n*   对于作者和页数，我们可以使用字符串插值。将 `\"by Peter Friese\"\
    ` 替换为 `\"by \\(book.author)\"`，将 `\"367 pages\"` 替换为 `\"\\(book.pages) pages\"\
    `。\n\n最后，让我们更改预览配置，以确保列表视图在设备框架中显示。为此，只需删除 `previewLayout(.sizeThatFits)` 这一行。\n\
    \n你的代码现在应该如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    var books:\
    \ [Book]\n    var body: some View {\n        List(books) { book in\n         \
    \   HStack(alignment: .top) {\n                Image(book.mediumCoverImageName)\n\
    \                    .resizable()\n                    .aspectRatio(contentMode:\
    \ .fit)\n                    .frame(height: 90)\n                VStack(alignment:\
    \ .leading) {\n                    Text(book.title)\n                        .font(.headline)\n\
    \                    Text(\"by \\(book.author)\")\n                        .font(.subheadline)\n\
    \                    Text(\"\\(book.pages) pages\")\n                        .font(.subheadline)\n\
    \                }\n                Spacer()\n            }\n            .listStyle(.plain)\n\
    \        }\n    }\n}\n```\n\n## 调整预览画布\n\n为了监测用户界面在浅色模式和深色模式下是否都显示良好，请使用预览画布工具栏中的*变体*按钮，并选择*配色方案变体*选项。预览画布现在将同时显示浅色和深色模式下的用户界面。\n\
    \n一张并排显示手机屏幕浅色和深色模式的截图，展示了书籍详情、作者和封面。1. 《Changer》，作者 Matt Gemmell，476 页。2. 《SwiftUI\
    \ for Absolute Beginners》，作者 Jayant Varma，200 页。3. 《Asynchronous Programming with\
    \ SwiftUI and Combine》，作者 Peter Friese，451 页。4. 《Modern Concurrency on Apple Platforms》，作者\
    \ Andy Ibanez，368 页。底部选择了“配色方案变体”选项。\n\n**图 2-12** 并排预览浅色和深色模式\n\n## 使代码可复用\n\n\
    在结束本章并进入下一个主题之前，我们需要讨论一个关键问题：*厄运金字塔*。\n\n以这种方式组合视图的便捷性很容易导致代码嵌套过深，难以导航——因此得名“厄运金字塔”。\n\
    \n好消息是 SwiftUI 提供了多种机制，允许我们将视图结构分解为更小的模块，使我们的代码更易于阅读和维护：\n\n*   提取子视图\n*   提取为方法\n\
    *   提取为属性\n\n在整本书中，我们将使用其中几种技术，但现在，我们将使用最流行的一种：*提取子视图*。\n"
- fmt: '### Refactoring the Code Using Extract Subview


    Probably the most important technique to manage complexity in SwiftUI views is
    to extract reusable parts of your view hierarchy into subviews.


    Obviously, the book view in our sample application is a prime candidate for this
    refactoring—if you recall, we even started out by building this as a separate
    view.


    Here’s how you apply the `Extract Subview` refactoring:


    - Make sure the *Preview Canvas* is visible. Otherwise, SwiftUI refactorings aren’t
    active.^([^(25)](#fn25))

    - In the code editor, `CMD + click` the `HStack` that contains the list row making
    up the book view.

    - In the context menu, select *Extract Subview.*


    ![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig13_HTML.png)


    A screenshot of the Bookshelf window has content view dot swift selected from
    the panel on the left. The content view dot swift tab has the option extract subview
    selected from a code on the left and a mobile screen with details on books, authors,
    and covers given on the right. It has options for horizontal stack, accessibility,
    padding, and frame given on the right.


    **Figure 2-13** — Using the Extract to Subview refactoring


    Xcode extracts the entire view structure into a new view at the bottom of the
    current source code file, naming it `ExtractedView`.


    You will notice that there is a compile error in the extracted view: *“Cannot
    find ‘book’ in scope”*—this is because the `Book` instance in this view displays
    isn’t in scope.


    To fix this, we’ll have to define a new property in the new view:


    - Inside `BookRowView`, declare a new property named `book` of type `Book`.


    ```

    struct BookRowView: View {

    var book: Book

    var body: some View {

    ...

    }

    }

    ```


    The compile error will disappear, but there will be a new one instead—at the call
    site, the compiler tells us that there is a missing argument for the `book` parameter.


    To fix this, add the current `book` instance to the `ExtractedView()` call.


    Since `ExtractedView` is not a great name for our view, let’s rename it to `BookRowView`.
    To do so, put the cursor somewhere inside the symbol name `ExtractedView`, and
    then bring up the *Code Actions* context menu using the `CMD + Shift + A` key
    binding.


    Once you choose the Rename refactoring, Xcode will show all occurrences of the
    selected symbol. Type the new name `(BookRowView)` and hit Enter to apply your
    changes.


    The code should now look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var books: [Book]

    var body: some View {

    List(books) { book in

    BookRowView(book: book)

    }

    .listStyle(.plain)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView(books: Book.sampleBooks)

    }

    }

    struct BookRowView: View {

    var book: Book

    var body: some View {

    HStack(alignment: .top) {

    Image(book.mediumCoverImageName)

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text(book.title)

    .font(.headline)

    Text("by \(book.author)")

    .font(.subheadline)

    Text("\(book.pages) pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    }

    ```


    With this, the `Extract Subview` refactoring is basically complete, but there
    are two optional steps you might want to consider:


    1.  Marking the extracted subview as `private`. This is useful if you’re not going
    to use this view in any other context.

    2.  If you *are* going to use the extract subview elsewhere, move it to a separate
    file. To do so, create a new *SwiftUI View* file using Xcode’s *New File* dialog,
    and then choose `BookRowView` as the file name. This makes sure that the new file
    contains a preview provider named `BookRowView_Previews`. It also contains a view
    name `BookRowView`, which you can just replace with the `BookRowView` implementation
    we extracted in the preceding steps^([^(26)](#fn26)).


    ### Renaming ContentView


    Once you start adding new features and screens to your app, it might feel a bit
    odd that one of your screens is still named `ContentView`, so you should rename
    this and choose a name that reflects the functionality of the screen more closely.


    To do so, place the cursor on the name `ContentView`, and choose *Refactor* ➤
    *Rename* from the editor context menu. Xcode will fold your code and show a preview
    of how the refactored code will look like. Just start typing the new name (e.g.,
    `BooksListView`), and hit *Enter* when you’re done.


    ### Keep Complexity in Check


    Decomposing nested view structures into smaller components is a SwiftUI best practice,
    and Apple themselves actively encourage this in their WWDC videos^([^(27)](#fn27))
    and developer documentation.^([^(28)](#fn28)) When building UIs with SwiftUI,
    keep the techniques I showed you in mind and remember to refactor your code as
    soon as you recognize it’s starting to get out of hand.


    ## Views and View Modifiers


    Let’s pause here for a moment and recap what we’ve just learned so far.


    **Views** are the core building blocks of SwiftUI—each view defines a piece of
    the UI.


    Views can be **composed** into new view, resulting in more feature-rich and complex
    UIs. A composition might be as simple as putting an image next to a text label,
    but things can easily become more complex.


    Instead of positioning UI elements using absolute coordinates, SwiftUI promotes
    using a system of vertical and horizontal **stacks and spacers** to lay out UI
    elements.


    Most views **hug** their content (e.g., `Text`), whereas others **push out** to
    consume all available space (such as `Spacer`).


    There are two main ways to **configure** views:


    1.  The main properties of a view can be configured using constructor arguments
    (e.g., the text displayed on a `Text` view, or the alignment of a `HStack`).

    2.  Secondary properties of a view are configured using *View Modifiers.*


    **View Modifiers** are functions that you call on SwiftUI views (e.g., `Text("hello").font(.headline)`).
    Most of these allow you to specify the look of a view (e.g., by setting the font,
    foreground and background colors, frame size, etc.). As we will see in the next
    chapters, there are also view modifiers that allow you to register closures that
    are called upon certain events (such as a button tap).


    ## Exercises


    1.  Add another `Text` view to display the ISBN of each book on the same line
    that displays the number of pages.

    2.  Align the page number text to the left, and the ISBN to the right of the view.


    ## Tips and Tricks


    If you’re not sure how a certain view works or how it can be configured, you can
    use the *Library* to learn how to use the view. Drag a view from the *Library*
    into the preview canvas (or the code editor) to get an initial implementation.
    Or, drag a modifier from the library and drop it onto a view to see how to use
    it. After you’ve done this a couple of times, you’ll understand how the individual
    views and view modifiers work, and can then use the code editor to enter the code
    manually (or using code completion).'
  raw: '### Refactoring the Code Using Extract Subview


    Probably the most important technique to manage complexity in SwiftUI views is
    to extract reusable parts of your view hierarchy into subviews.


    Obviously, the book view in our sample application is a prime candidate for this
    refactoring—if you recall, we even started out by building this as a separate
    view.


    Here’s how you apply the *Extract Subview* refactoring:


    *   Make sure the *Preview Canvas* is visible. Otherwise, SwiftUI refactorings
    aren’t active.^([^(25)](#fn25))


    *   In the code editor, `CMD + click` the `HStack` that contains the list row
    making up the book view.


    *   In the context menu, select *Extract Subview.*


    ![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig13_HTML.png)


    A screenshot of the Bookshelf window has content view dot swift selected from
    the panel on the left. The content view dot swift tab has the option extract subview
    selected from a code on the left and a mobile screen with details on books, authors,
    and covers given on the right. It has options for horizontal stack, accessibility,
    padding, and frame given on the right.


    Figure 2-13


    Using the Extract to Subview refactoring


    Xcode extracts the entire view structure into a new view at the bottom of the
    current source code file, naming it `ExtractedView`.


    You will notice that there is a compile error in the extracted view: *“Cannot
    find ‘book’ in scope”*—this is because the `Book` instance in this view displays
    isn’t in scope.


    To fix this, we’ll have to define a new property in the new view:


    *   Inside `BookRowView`, declare a new property named book of type `Book`.


    ```

    struct BookRowView: View {

    var book: Book

    var body: some View {

    ...

    }

    }

    ```


    The compile error will disappear, but there will be a new one instead—at the call
    site, the compiler tells us that there is a missing argument for the `book` parameter.


    To fix this, add the current `book` instance to the `ExtractedView()` call.


    Since `ExtractedView` is not a great name for our view, let’s rename it to `BookRowView`.
    To do so, put the cursor somewhere inside the symbol name ExtractedView, and then
    bring up the *Code Actions* context menu using the `CMD + Shift + A` key binding.


    Once you choose the Rename refactoring, Xcode will show all occurrences of the
    selected symbol. Type the new name `(BookRowView)` and hit Enter to apply your
    changes.


    The code should now look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var books: [Book]

    var body: some View {

    List(books) { book in

    BookRowView(book: book)

    }

    .listStyle(.plain)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView(books: Book.sampleBooks)

    }

    }

    struct BookRowView: View {

    var book: Book

    var body: some View {

    HStack(alignment: .top) {

    Image(book.mediumCoverImageName)

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text(book.title)

    .font(.headline)

    Text("by \(book.author)")

    .font(.subheadline)

    Text("\(book.pages) pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    }

    ```


    With this, the *Extract Subview* refactoring is basically complete, but there
    are two optional steps you might want to consider:


    1.  Marking the extracted subview as `private`. This is useful if you’re not going
    to use this view in any other context.


    2.  If you *are* going to use the extract subview elsewhere, move it to a separate
    file. To do so, create a new *SwiftUI View* file using Xcode’s *New File* dialog,
    and then choose `BookRowView` as the file name. This makes sure that the new file
    contains a preview provider named `BookRowView_Previews`. It also contains a view
    name `BookRowView`, which you can just replace with the `BookRowView` implementation
    we extracted in the preceding steps^([^(26)](#fn26)).


    ### Renaming ContentView


    Once you start adding new features and screens to your app, it might feel a bit
    odd that one of your screens is still named `ContentView`, so you should rename
    this and choose a name that reflects the functionality of the screen more closely.


    To do so, place the cursor on the name `ContentView`, and choose *Refactor* ➤
    *Rename* from the editor context menu. Xcode will fold your code and show a preview
    of how the refactored code will look like. Just start typing the new name (e.g.,
    `BooksListView`), and hit *Enter* when you’re done.


    ### Keep Complexity in Check


    Decomposing nested view structures into smaller components is a SwiftUI best practice,
    and Apple themselves actively encourage this in their WWDC videos^([^(27)](#fn27))
    and developer documentation.^([^(28)](#fn28)) When building UIs with SwiftUI,
    keep the techniques I showed you in mind and remember to refactor your code as
    soon as you recognize it’s starting to get out of hand.


    ## Views and View Modifiers


    Let’s pause here for a moment and recap what we’ve just learned so far.


    **Views** are the core building blocks of SwiftUI—each view defines a piece of
    the UI.


    Views can be **composed** into new view, resulting in more feature-rich and complex
    UIs. A composition might be as simple as putting an image next to a text label,
    but things can easily become more complex.


    Instead of positioning UI elements using absolute coordinates, SwiftUI promotes
    using a system of vertical and horizontal **stacks and spacers** to lay out UI
    elements.


    Most views **hug** their content (e.g., `Text`), whereas others **push out** to
    consume all available space (such as `Spacer`).


    There are two main ways to **configure** views:


    1.  The main properties of a view can be configured using constructor arguments
    (e.g., the text displayed on a `Text` view, or the alignment of a `HStack`).


    2.  Secondary properties of a view are configured using *View Modifiers.*


    **View Modifiers** are functions that you call on SwiftUI views (e.g., `Text("hello").font(.headline)`).
    Most of these allow you to specify the look of a view (e.g., by setting the font,
    foreground and background colors, frame size, etc.). As we will see in the next
    chapters, there are also view modifiers that allow you to register closures that
    are called upon certain events (such as a button tap).


    ## Exercises


    1.  Add another `Text` view to display the ISBN of each book on the same line
    that displays the number of pages.


    2.  Align the page number text to the left, and the ISBN to the right of the view.


    ## Tips and Tricks


    If you’re not sure how a certain view works or how it can be configured, you can
    use the *Library* to learn how to use the view. Drag a view from the *Library*
    into the preview canvas (or the code editor) to get an initial implementation.
    Or, drag a modifier from the library and drop it onto a view to see how to use
    it. After you’ve done this a couple of times, you’ll understand how the individual
    views and view modifiers work, and can then use the code editor to enter the code
    manually (or using code completion).'
  trans: '

    ### 使用提取子视图重构代码


    在 SwiftUI 视图中管理复杂性的最重要技术之一，可能是将视图层次结构中可重用的部分提取到子视图中。


    显然，我们示例应用中的图书视图就是这种重构的理想候选对象——回想一下，我们甚至一开始就是将其作为一个单独的视图来构建的。


    以下是应用“提取子视图”重构的方法：


    - 确保*预览画布*可见。否则，SwiftUI 的重构功能将无法激活。^(²⁵)

    - 在代码编辑器中，`CMD + 单击`构成图书视图的列表行中的`HStack`。

    - 在上下文菜单中，选择*提取子视图*。


    ![](img/509862_1_En_2_Fig13_HTML.png)


    Bookshelf 窗口的截图显示了从左侧面板选择的 `ContentView.swift`。`ContentView.swift` 标签页中，从左侧的代码中选择了“提取子视图”选项，右侧则显示了包含书籍、作者和封面详情的移动设备屏幕。右侧提供了水平堆栈、辅助功能、内边距和框架等选项。


    **图 2-13** — 使用“提取为子视图”重构


    Xcode 会将整个视图结构提取到当前源代码文件底部的一个新视图中，并将其命名为 `ExtractedView`。


    你会注意到提取后的视图中存在一个编译错误：*“Cannot find ‘book’ in scope”*——这是因为此视图中显示的 `Book` 实例不在作用域内。


    要修复此问题，我们需要在新视图中定义一个新属性：


    - 在 `BookRowView` 内部，声明一个名为 `book` 的新属性，类型为 `Book`。


    ```

    struct BookRowView: View {

    var book: Book

    var body: some View {

    ...

    }

    }

    ```


    编译错误将会消失，但会出现一个新的错误——在调用处，编译器告诉我们缺少 `book` 参数。


    要修复此问题，请将当前的 `book` 实例添加到 `ExtractedView()` 调用中。


    由于 `ExtractedView` 对于我们的视图来说不是一个好名字，让我们将其重命名为 `BookRowView`。为此，将光标放在符号名称 `ExtractedView`
    内的某个位置，然后使用快捷键 `CMD + Shift + A` 调出*代码操作*上下文菜单。


    选择“重命名”重构后，Xcode 会显示所选符号的所有出现位置。输入新名称 `(BookRowView)`，然后按 Enter 键应用更改。


    代码现在应如下所示：


    ```

    import SwiftUI

    struct ContentView: View {

    var books: [Book]

    var body: some View {

    List(books) { book in

    BookRowView(book: book)

    }

    .listStyle(.plain)

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView(books: Book.sampleBooks)

    }

    }

    struct BookRowView: View {

    var book: Book

    var body: some View {

    HStack(alignment: .top) {

    Image(book.mediumCoverImageName)

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text(book.title)

    .font(.headline)

    Text("by \(book.author)")

    .font(.subheadline)

    Text("\(book.pages) pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    }

    ```


    至此，“提取子视图”重构基本完成，但还有两个可选步骤你可能会考虑：


    1.  将提取的子视图标记为 `private`。如果你不打算在其他任何上下文中使用此视图，这将非常有用。

    2.  如果你*打算*在其他地方使用提取的子视图，请将其移动到一个单独的文件中。为此，使用 Xcode 的“新建文件”对话框创建一个新的 *SwiftUI
    View* 文件，然后选择 `BookRowView` 作为文件名。这可以确保新文件包含一个名为 `BookRowView_Previews` 的预览提供程序。它还包含一个名为
    `BookRowView` 的视图，你可以直接用我们在前面步骤中提取的 `BookRowView` 实现替换它^(²⁶)。


    ### 重命名 ContentView


    当你开始为应用添加新功能和屏幕时，如果你的某个屏幕仍然名为 `ContentView`，可能会感觉有点奇怪，因此你应该重命名它，并选择一个能更贴近屏幕功能的名称。


    为此，将光标放在名称 `ContentView` 上，然后从编辑器上下文菜单中选择*重构* ➤ *重命名*。Xcode 会折叠你的代码，并显示重构后代码的外观预览。只需开始输入新名称（例如
    `BooksListView`），完成后按 *Enter* 键。


    ### 控制复杂性


    将嵌套的视图结构分解为更小的组件是 SwiftUI 的最佳实践，Apple 本身也在其 WWDC 视频^(²⁷)和开发者文档^(²⁸)中积极鼓励这种做法。在使用
    SwiftUI 构建用户界面时，请牢记我向您展示的技术，并记得在发现代码开始变得失控时立即进行重构。


    ## 视图与视图修饰符


    让我们在此稍作停顿，回顾一下我们到目前为止学到的东西。


    **视图**是 SwiftUI 的核心构建块——每个视图都定义了用户界面的一部分。


    视图可以被**组合**成新的视图，从而产生功能更丰富、更复杂的用户界面。一个组合可能简单到将一张图片放在一个文本标签旁边，但事情很容易变得更复杂。


    SwiftUI 不主张使用绝对坐标来定位 UI 元素，而是推动使用垂直和水平的**堆栈和间隔器**系统来布局 UI 元素。


    大多数视图会**紧贴**其内容（例如 `Text`），而其他视图则会**向外扩展**以消耗所有可用空间（例如 `Spacer`）。


    **配置**视图主要有两种方式：


    1.  视图的主要属性可以使用构造器参数进行配置（例如，`Text` 视图上显示的文本，或 `HStack` 的对齐方式）。

    2.  视图的次要属性则使用*视图修饰符*进行配置。


    **视图修饰符**是你在 SwiftUI 视图上调用的函数（例如 `Text("hello").font(.headline)`）。其中大多数允许你指定视图的外观（例如，通过设置字体、前景色和背景色、框架大小等）。正如我们将在后续章节中看到的，还有一些视图修饰符允许你注册在某些事件（例如按钮点击）发生时调用的闭包。


    ## 练习


    1.  添加另一个 `Text` 视图，在显示页数的同一行显示每本书的 ISBN。

    2.  将页码文本左对齐，将 ISBN 右对齐。


    ## 技巧与窍门


    如果你不确定某个特定视图如何工作或如何配置，可以使用*库*来学习如何使用该视图。将某个视图从*库*拖入预览画布（或代码编辑器）以获取初始实现。或者，将某个修饰符从库中拖出并放到某个视图上，以了解如何使用它。这样重复操作几次后，你就会理解各个视图和视图修饰符的工作方式，然后就可以使用代码编辑器手动输入代码（或使用代码补全功能）。

    '
- fmt: '# Summary


    In this chapter, you learned how to use simple SwiftUI views to incrementally
    build an application for displaying information from a data model in a list view.


    We looked at composing a cell for displaying a book’s cover, title, and other
    details using `Image` and `Text` views, and you used `HStack`, `VStack`, and `Spacer`
    to lay out the UI elements.


    Using Xcode’s two-way tooling, you experienced firsthand how to quickly put together
    a UI by making use of the *Library*, the *Preview Canvas*, the code editor, and
    its context menus.


    Finally, you used Xcode’s refactorings to organize the code into reusable components,
    making it easier to read and maintain.


    If you’re coming from UIKit and are used to building your views programmatically,
    the ease with which you can build the equivalent of a `UITableView` with a custom
    cell should be a pleasant surprise. This is not all, though—as you will see in
    the next chapters, SwiftUI’s state handling makes it a lot easier to make sure
    all parts of your app reflect the current state of your data model—no more running
    out of sync!


    This chapter provided a good overview of how to build UIs with SwiftUI, but we’ve
    barely scratched the surface. In the next chapters, we will dive deeper into the
    individual topics to get a better understanding of how (and why) SwiftUI works
    and how to build better apps thanks to its reactive state management system.


    # 3. SwiftUI Building Blocks


    In the previous chapter, you learned how to use SwiftUI to build a simple UI and
    how to use Xcode’s refactoring tools to keep your code nicely organized and reusable.
    You also used SwiftUI’s state management system which keeps your app’s views and
    its data model in sync all the time.


    Now that you’ve used SwiftUI’s key components, like *views*, *view modifiers*,
    and *property wrappers*, let’s take a closer look and understand how they work.


    In this chapter, we will look at SwiftUI’s building blocks, learn how they work,
    and how they allow developers to efficiently build UIs. Specifically:


    - You will learn what views *really* are and how they help you describe your UI
    declaratively

    - We will talk about different kinds of views in SwiftUI—user interface views
    and container views

    - We will also look at view modifiers and their role in configuring views


    By the end of the chapter, you will have a more profound understanding of how
    SwiftUI works and how the individual concepts play together to make SwiftUI an
    easy-to-use DSL for building UIs.


    ## Views


    SwiftUI follows a declarative approach for describing UIs. Instead of manually
    instantiating the elements of your UI, such as buttons, labels, lists, and so
    on, you declare how you want your UI to look like. Views are the most basic components
    for building UIs in SwiftUI. To define the UI of your application, you create
    a lightweight description of your user interface, making use of SwiftUI’s built-in
    views. By doing so, you compose your own views, which you can then use in your
    app.


    In addition to using these views in your own app, you can make them reusable by
    extracting them into a Swift package. This enables you to use them in your other
    apps, or share them with other developers on your team. You can even make them
    available to other developers by uploading them to GitHub and registering them
    with the Swift Package Index.


    In Chapters 1 and 2, you have already used the following techniques for building
    reusable SwiftUI components:


    - You used some of SwiftUI’s built-in views (such as `Text` and `Image`) to create
    simple UIs (such as the *Hello World* sample in Chapter 1).

    - In Chapter 2, you created a reusable view (`BookRowView`) for displaying details
    about books, and then reused it inside a `List` view.


    Let’s look at the basic anatomy of a SwiftUI view. When you create a new SwiftUI
    file in Xcode, you will end up with a piece of code like the following:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    VStack {

    Image(systemName: "globe")

    .imageScale(.large)

    .foregroundColor(.accentColor)

    Text("Hello, world!")

    }

    .padding()

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    The `PreviewProvider` is responsible for displaying the view in Xcode’s preview
    canvas.


    **Figure 3-1** A simple view in Xcode’s preview canvas


    Leaving the `PreviewProvider` aside for a moment, let’s focus on a simplified
    version of `ContentView`:


    ```

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    }

    }

    ```


    This short snippet defines a simple view, named `ContentView`, that contains a
    `Text` view which displays *Hello World*.


    Despite being such a short code snippet, we can learn a lot about the power of
    SwiftUI from it.


    SwiftUI views are structs that need to conform to the `View` protocol. Looking
    at the source code for the `View` protocol, we can see that conformers need to
    implement a computed property named `body` that returns a *single* `View`:


    ```

    @available(iOS 13.0, macOS 10.15, tvOS 13.0, watchOS 6.0, *)

    public protocol View {

    associatedtype Body : View

    @ViewBuilder @MainActor var body: Self.Body { get }

    }

    ```


    Our simple Hello World snippet contains a computed `body` property that returns
    a simple `Text` view, so it meets the requirements of the `View` protocol.


    To implement more complex views, such as a label with a leading icon, we can make
    use of SwiftUI’s container views, such as `Group`, `HStack`, or `VStack`. Container
    views allow us to group child views and arrange them in a specific layout, for
    example, horizontally or vertically. The following code snippet uses a `VStack`
    to arrange an `Image` and a `Text` vertically:


    ```

    struct ContentView: View {

    var body: some View {

    VStack {

    Image(systemName: "globe")

    .imageScale(.large)

    .foregroundColor(.accentColor)

    Text("Hello, world!")

    }

    .padding()

    }

    }

    ```'
