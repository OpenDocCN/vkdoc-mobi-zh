- fmt: "# Connecting the UI…\n\nTo better understand this, let’s look at how to call\
    \ the earlier code snippets from SwiftUI. The following code shows a typical way\
    \ to implement a search screen—we’ve got a `List` view to display the results\
    \ and a `.searchable` view modifier to set up the search field and connect it\
    \ to the `searchTerm` published property on a view model:\n\n```\nstruct BookSearchCombineView:\
    \ View {\n    @StateObject var viewModel = ViewModel()\n    var body: some View\
    \ {\n        List(viewModel.result) { book in\n            BookSearchRowView(book:\
    \ book)\n        }\n        .searchable(text: $viewModel.searchTerm)\n    }\n\
    }\n```\n\n# …to a Combine Pipeline\n\nBy making the `searchTerm` a published property\
    \ on the view model, it becomes a Combine publisher, allowing us to use it as\
    \ a starting point for a Combine pipeline. The view model’s initializer is a good\
    \ place to set up this pipeline:\n\n```\nfileprivate class ViewModel: ObservableObject\
    \ {\n    @Published var searchTerm: String = \"\"\n    @Published private(set)\
    \ var result: [Book] = []\n    @Published var isSearching = false\n    private\
    \ var cancellables = Set<AnyCancellable>()\n\n    init() {\n        $searchTerm\n\
    \            .debounce(for: 0.8, scheduler: DispatchQueue.main) // (1)\n     \
    \       .map { searchTerm -> AnyPublisher<[Book], Never> in // (2)\n         \
    \       self.isSearching = true\n                return self.searchBooks(matching:\
    \ searchTerm)\n            }\n            .switchToLatest() // (3)\n         \
    \   .receive(on: DispatchQueue.main) // (4)\n            .sink(receiveValue: {\
    \ books in // (5)\n                self.result = books\n                self.isSearching\
    \ = false\n            })\n            .store(in: &cancellables) // (6)\n    }\n\
    \n    private func searchBooks(matching searchTerm: String) -> AnyPublisher<[Book],\
    \ Never> {\n        // ...\n    }\n}\n```\n\nHere, we subscribe to the `searchTerm`\
    \ publisher and then use a couple of Combine operators to take the user’s input,\
    \ call the remote API, receive the results, and assign them to a published property\
    \ that is connected to the UI:\n\n1.  The `debounce` operator will only pass on\
    \ events after there has been a 0.8s pause between event. This way, we will only\
    \ call the remote API when the user has finished typing or pauses for a brief\
    \ moment.\n\n2.  We use the `map` operator to call the `searchBooks` pipeline\
    \ (which itself is a publisher) and return its results into the pipeline.\n\n\
    3.  Even though we use the `debounce` operator to reduce the number of events,\
    \ we might run into a situation where multiple network requests are in flight\
    \ at the same time. As a consequence, the network responses might arrive out of\
    \ order. To prevent this, we use `switchToLatest()`—this will switch to the latest\
    \ output from the upstream publisher and discards any other previous events.\n\
    \n4.  To make sure we make changes to the UI only from the main thread, we call\
    \ `receive(on: DispatchQueue.main)`.\n\n5.  To assign the result of the pipeline\
    \ (an array of `Book` instances we receive from `searchBooks`) to the published\
    \ property `result`, we would normally use the `assign(to:)` subscriber, but as\
    \ we also want to set the `isSearching` property to `false` (to turn off the progress\
    \ view on our UI), we need to use the `sink` subscriber, as this will allow us\
    \ to perform multiple instructions.\n\n6.  Using the `sink` subscriber also usually\
    \ means we need to store the subscription in a `Cancellable` or a `Set` of `AnyCancellables`.\n\
    \nNotice how easy it is to handle challenging tasks like discarding out-of-order\
    \ events or reducing the number of requests being sent by only sending requests\
    \ when the user stops typing. As you will see in a moment, this is slightly more\
    \ complicated when using `async/await`.\n\n# …to an async/await Method\n\nHow\
    \ would the same code look like when using `async/await`?\n\nTo call the `async/await`–based\
    \ version of `searchBooks`, we need to choose a slightly different approach. Instead\
    \ of subscribing to the `$searchTerm` publisher, we create an `async` method named\
    \ `executeQuery` and create a `Task` that calls `searchBooks`:\n\n```\nfileprivate\
    \ class ViewModel: ObservableObject {\n    @Published var searchTerm: String =\
    \ \"\"\n    @Published private(set) var result: [Book] = []\n    @Published private(set)\
    \ var isSearching = false\n    private var searchTask: Task<Void, Never>? // (1)\n\
    \n    @MainActor // (7)\n    func executeQuery() async {\n        searchTask?.cancel()\
    \ // (2)\n        let currentSearchTerm = searchTerm.trimmingCharacters(in: .whitespaces)\n\
    \        if currentSearchTerm.isEmpty {\n            result = []\n           \
    \ isSearching = false\n        }\n        else {\n            searchTask = Task\
    \ { // (3)\n                isSearching = true // (4)\n                result\
    \ = await searchBooks(matching: searchTerm) // (5)\n                if !Task.isCancelled\
    \ {\n                    isSearching = false // (6)\n                }\n     \
    \       }\n        }\n    }\n\n    private func searchBooks(matching searchTerm:\
    \ String) async -> [Book] {\n        // ...\n    }\n}\n```\n\nInside the `Task`,\
    \ we also handle the progress view’s state by updating the view model’s `isSearching`\
    \ published property according to the current state of the process.\n\nIn the\
    \ Combine-based version of this part of the app, we used a combination of `map`\
    \ and `switchToLatest` to make sure we only receive results for the most recent\
    \ user input. This is particularly important for network requests, as they might\
    \ return out of order.\n\nTo achieve the same using `async/await`, we need to\
    \ use cooperative task cancellation^([^(127)](#fn127)): we keep a reference to\
    \ the task in `searchTask` (1) and cancel any potentially running task (2) before\
    \ starting a new one (3).\n\nSince `searchBooks` is marked as `async`, the Swift\
    \ runtime can decide to execute it on a non-main thread. However, in `executeQuery`,\
    \ we want to update the UI by setting published properties `result` (5) and `isSearching`\
    \ (4, 6). To ensure it runs on the main thread, we have to mark it using the `@MainActor`\
    \ attribute (7).\n\nAs a final step, we need to make a small but important change\
    \ to the UI: since we cannot subscribe an asynchronous method to a published property,\
    \ we need to find another way to call `executeQuery` for each character the user\
    \ types into the search field.\n\nIt turns out that Apple added a suitable view\
    \ modifier to the most recent version of SwiftUI—`onReceive(_ publisher:)`. This\
    \ view modifier allows us to register a closure that will be called whenever the\
    \ given publisher emits an event:\n\n```\nList(viewModel.result) { book in\n \
    \   BookSearchRowView(book: book)\n}\n.searchable(text: $viewModel.searchTerm)\n\
    .onReceive(viewModel.$searchTerm) { searchTerm in\n    Task {\n        await viewModel.executeQuery()\n\
    \    }\n}\n```\n\nOverall, using `async/await` requires more work on our part,\
    \ and it is easy to get things like cooperative task cancellation wrong or forget\
    \ an important step, like cancelling any tasks that might still be running. In\
    \ terms of developer experience, Combine follows a much more declarative approach\
    \ than `async/await`: you tell the framework *what* to do, not *how* to do it."
  raw: '## Connecting the UI…


    To better understand this, let’s look at how to call the earlier code snippets
    from SwiftUI. The following code shows a typical way to implement a search screen—we’ve
    got a `List` view to display the results and a `.searchable` view modifier to
    set up the search field and connect it to the `searchTerm` published property
    on a view model:


    ```

    struct BookSearchCombineView: View {

    @StateObject var viewModel = ViewModel()

    var body: some View {

    List(viewModel.result) { book in

    BookSearchRowView(book: book)

    }

    .searchable(text: $viewModel.searchTerm)

    }

    }

    ```


    ## …to a Combine Pipeline


    By making the `searchTerm` a published property on the view model, it becomes
    a Combine publisher, allowing us to use it as a starting point for a Combine pipeline.
    The view model’s initializer is a good place to set up this pipeline:


    ```

    fileprivate class ViewModel: ObservableObject {

    @Published var searchTerm: String = ""

    @Published private(set) var result: [Book] = []

    @Published var isSearching = false

    private var cancellables = Set()

    init() {

    $searchTerm

    .debounce(for: 0.8, scheduler: DispatchQueue.main) // (1)

    .map { searchTerm -> AnyPublisher in // (2)

    self.isSearching = true

    return self.searchBooks(matching: searchTerm)

    }

    .switchToLatest() // (3)

    .receive(on: DispatchQueue.main) // (4)

    .sink(receiveValue: { books in // (5)

    self.result = books

    self.isSearching = false

    })

    .store(in: &cancellables) // (6)

    }

    private func searchBooks(matching searchTerm: String)

    -> AnyPublisher

    {

    // ...

    }

    ```


    Here, we subscribe to the `searchTerm` publisher and then use a couple of Combine
    operators to take the user’s input, call the remote API, receive the results,
    and assign them to a published property that is connected to the UI:


    1.  The `debounce` operator will only pass on events after there has been a 0.8s
    pause between event. This way, we will only call the remote API when the user
    has finished typing or pauses for a brief moment.


    2.  We use the `map` operator to call the `searchBooks` pipeline (which itself
    is a publisher) and return its results into the pipeline.


    3.  Even though we use the `debounce` operator to reduce the number of events,
    we might run into a situation where multiple network requests are in flight at
    the same time. As a consequence, the network responses might arrive out of order.
    To prevent this, we use `switchToLatest()`—this will switch to the latest output
    from the upstream publisher and discards any other previous events.


    4.  To make sure we make changes to the UI only from the main thread, we call
    `receive(on: DispatchQueue.main)`.


    5.  To assign the result of the pipeline (an array of `Book` instances we receive
    from `searchBooks`) to the published property `result`, we would normally use
    the `assign(to:)` subscriber, but as we also want to set the `isSearching` property
    to `false` (to turn off the progress view on our UI), we need to use the `sink`
    subscriber, as this will allow us to perform multiple instructions.


    6.  Using the `sink` subscriber also usually means we need to store the subscription
    in a `Cancellable` or a `Set` of `AnyCancellables`.


    Notice how easy it is to handle challenging tasks like discarding out-of-order
    events or reducing the number of requests being sent by only sending requests
    when the user stops typing. As you will see in a moment, this is slightly more
    complicated when using `async/await`.


    ## …to an async/await Method


    How would the same code look like when using `async/await`?


    To call the `async/await`–based version of `searchBooks`, we need to choose a
    slightly different approach. Instead of subscribing to the `$searchTerm` publisher,
    we create an `async` method named `executeQuery` and create a `Task` that calls
    `searchBooks`:


    ```

    fileprivate class ViewModel: ObservableObject {

    @Published var searchTerm: String = ""

    @Published private(set) var result: [Book] = []

    @Published private(set) var isSearching = false

    private var searchTask: Task? // (1)

    @MainActor // (7)

    func executeQuery() async {

    searchTask?.cancel() // (2)

    let currentSearchTerm =

    searchTerm.trimmingCharacters(in: .whitespaces)

    if currentSearchTerm.isEmpty {

    result = []

    isSearching = false

    }

    else {

    searchTask = Task { // (3)

    isSearching = true // (4)

    result = await searchBooks(matching: searchTerm) // (5)

    if !Task.isCancelled {

    isSearching = false // (6)

    }

    }

    }

    }

    private func searchBooks(matching searchTerm: String) async -> [Book] {

    // ...

    }

    }

    ```


    Inside the `Task`, we also handle the progress view’s state by updating the view
    model’s `isSearching` published property according to the current state of the
    process.


    In the Combine-based version of this part of the app, we used a combination of
    `map` and `switchToLatest` to make sure we only receive results for the most recent
    user input. This is particularly important for network requests, as they might
    return out of order.


    To achieve the same using `async/await`, we need to use cooperative task cancellation^([^(127)](#fn127)):
    we keep a reference to the task in `searchTask` (1) and cancel any potentially
    running task (2) before starting a new one (3).


    Since `searchBooks` is marked as `async`, the Swift runtime can decide to execute
    it on a non-main thread. However, in `executeQuery`, we want to update the UI
    by setting published properties `result` (5) and `isSearching` (4, 6). To ensure
    it runs on the main thread, we have to mark it using the `@MainActor` attribute
    (7).


    As a final step, we need to make a small but important change to the UI: since
    we cannot subscribe an asynchronous method to a published property, we need to
    find another way to call `executeQuery` for each character the user types into
    the search field.


    It turns out that Apple added a suitable view modifier to the most recent version
    of SwiftUI—`onReceive(_ publisher:)`. This view modifier allows us to register
    a closure that will be called whenever the given publisher emits an event:


    ```

    List(viewModel.result) { book in

    BookSearchRowView(book: book)

    }

    .searchable(text: $viewModel.searchTerm)

    .onReceive(viewModel.$searchTerm) { searchTerm in

    Task {

    await viewModel.executeQuery()

    }

    }

    ```


    Overall, using `async/await` requires more work on our part, and it is easy to
    get things like cooperative task cancellation wrong or forget an important step,
    like cancelling any tasks that might still be running. In terms of developer experience,
    Combine follows a much more declarative approach than `async/await`: you tell
    the framework *what* to do, not *how* to do it.'
  trans: "\n# 连接 UI…\n\n为了更好地理解这一点，我们来看看如何从 SwiftUI 中调用之前的代码片段。以下代码展示了一种实现搜索屏幕的典型方式——我们使用了一个\
    \ `List` 视图来显示结果，并通过 `.searchable` 视图修饰符来设置搜索字段，并将其连接到视图模型上的 `searchTerm` 已发布属性：\n\
