    \                .resizable()\n                .aspectRatio(contentMode: .fit)\n\
    \                .frame(height: 90)\n            VStack(alignment: .leading) {\n\
    \                Text(book.title)\n                    .font(.headline)\n    \
    \            Text(\"作者：\\(book.author)\")\n                    .font(.subheadline)\n\
    \                Text(\"\\(book.pages) 页\")\n                    .font(.subheadline)\n\
    \            }\n            Spacer()\n        }\n    }\n}\n```\n\n该视图模型与我们之前使用的非常相似，但有一个重要的区别——书籍集合最初是空的：\n\
    \n```swift\nclass SearchableBooksViewModel: ObservableObject {\n    @Published\
    \ var books = [Book]()\n}\n```\n\n为了给`SearchableBooksListView`添加搜索 UI，我们应用`.searchable`视图修饰符，并将其`text`参数绑定到视图模型上的一个新属性`searchTerm`：\n\
    \n```swift\nclass SearchableBooksViewModel: ObservableObject {\n    @Published\
    \ var books = [Book]()\n    @Published var searchTerm: String = \"\"\n}\n\nstruct\
    \ SearchableBooksListView: View {\n    @StateObject var viewModel = SearchableBooksViewModel()\n\
    \    var body: some View {\n        List(viewModel.books) { book in\n        \
    \    SearchableBookRowView(book: book)\n        }\n        .searchable(text: $viewModel.searchTerm)\n\
    \    }\n}\n```\n\n这会在`List`视图中安装搜索 UI，但如果你运行此代码，什么也不会发生。实际上，你甚至不会在列表视图中看到任何书籍。\n\
    \n要改变这一点，我们将向视图模型添加一个新的私有属性，该属性保存原始的、未过滤的书籍列表。最后，我们将设置一个 Combine 管道，根据用户输入的搜索词过滤此列表：\n\
    \n```swift\nclass SearchableBooksViewModel: ObservableObject {\n    @Published\
    \ private var originalBooks = Book.samples\n    @Published var books = [Book]()\n\
    \    @Published var searchTerm: String = \"\"\n    init() {\n        Publishers.CombineLatest($originalBooks,\
    \ $searchTerm) // (1)\n            .map { books, searchTerm in // (2)\n      \
    \          books.filter { book in // (3)\n                    searchTerm.isEmpty\n\
    \                        ? true\n                        : (book.title.matches(searchTerm)\n\
    \                            || book.author.matches(searchTerm))\n           \
    \     }\n            }\n            .assign(to: &$books)\n    }\n}\n```\n\n这个\
    \ Combine 管道是如何工作的？\n\n1. 我们使用`Publishers.CombineLatest`来获取两个发布者（`$originalBooks`和`$searchTerm`）的最新状态。在真实的应用程序中，我们可能会在后台收到书籍集合的更新，并且我们希望这些更新也包含在搜索结果中。每当其中一个发布者发送新事件时，`CombineLatest`发布者都会发布一个新的元组，其中包含`originalBooks`和`searchTerm`的最新值。\n\
    \n2. 然后我们使用`.map`操作符将`(books, searchTerm)`元组转换成一个书籍数组，我们最终会将其赋值给已发布的`$books`属性，该属性连接到`SearchableBooksListView`。\n\
    \n3. 在`.map`闭包内部，我们使用`filter`仅返回那些标题或作者姓名中包含搜索词的书籍。这部分过程实际上并非 Combine 特有——`filter`是`Array`的一个方法。\n\
    \n如果你运行此代码，你会注意到你输入搜索字段的每个字符都会自动大写。为了防止这种情况，我们可以在`searchable`视图修饰符*之后*应用`.autocapitalization`视图修饰符：\n\
    \n```swift\nstruct SearchableBooksListView: View {\n    @StateObject var viewModel\
    \ = SearchableBooksViewModel()\n    var body: some View {\n        List(viewModel.books)\
    \ { book in\n            SearchableBookRowView(book: book)\n        }\n      \
    \  .searchable(text: $viewModel.searchTerm)\n        .autocapitalization(.none)\n\
    \    }\n}\n```\n\n## 样式设计\n\n列表提供了广泛的样式选项，随着 SwiftUI 3 的推出，现在几乎可以配置列表视图的所有方面：\n\
    \n* 列表本身的整体外观（即列表样式）\n* 列表单元格的外观\n* 分隔线（终于可以了！）\n* ……以及更多\n\n让我们来看看有哪些可能。\n\n\
    ### 列表样式\n\n列表视图的整体外观和感觉可以通过`.listStyle`视图修饰符来控制。SwiftUI 支持六种不同的外观：\n\n1. `.automatic`\n\
    2. `.grouped`\n3. `.inset`\n4. `.insetGrouped`\n5. `.plain`\n6. `.sidebar`\n\n\
    ```swift\nList(items) { item in\n    Text(\"\\(item.label)\")\n}\n.listStyle(.plain)\n\
    ```\n\n如果你不提供样式，SwiftUI 将假定为`.automatic`。在 iOS 上，`.automatic`和`.insetGrouped`的外观相同。\n\
    \n与其试图用文字描述每种样式的外观，不如用图片来展示每种样式。\n\n![](img/509862_1_En_5_Fig6_HTML.png)\n\n三张手机屏幕截图，分别标注为：a，列表样式\
    \ .inset — 列出 10 种水果；b，列表样式 .insetGrouped — 列出蔬菜和水果；c，列表样式 .grouped — 下方列出水果名称。箭头显示了不同的样式类型。\n\
    \n**图 5-6**：更多列表样式\n\n![](img/509862_1_En_5_Fig5_HTML.png)\n\n三张手机屏幕截图，分别标注为：a，列表样式\
    \ .automatic — 列出 10 种水果；b，列表样式 .sidebar — 蔬菜和水果隐藏在侧边栏下；c，列表样式 .plain — 列出水果。标签分别为\
    \ .automatic、.sidebar 和 .plain。\n\n**图 5-5**：列表样式\n"
- fmt: '### Headers and Footers


    All of the`List`view styles support headers and footers. To specify a header and/or
    footer for a section, use one of the constructors that take a`header`or`footer`parameter.


    It seems like my favorite way of creating headers and footers has been marked
    for deprecation:


    ```

    @available(iOS 13.0, macOS 10.15, tvOS 13.0, watchOS 6.0, *)

    extension Section where Parent : View, Content : View, Footer : View {

    /// Creates a section with a header, footer, and the provided section content.

    /// - Parameters:

    ///   - header: A view to use as the section''s header.

    ///   - footer: A view to use as the section''s footer.

    ///   - content: The section''s content.

    @available(iOS, deprecated: 100000.0, renamed: "Section(content:header:footer:)")

    @available(macOS, deprecated: 100000.0, renamed: "Section(content:header:footer:)")

    @available(tvOS, deprecated: 100000.0, renamed: "Section(content:header:footer:)")

    @available(watchOS, deprecated: 100000.0, renamed: "Section(content:header:footer:)")

    public init(header: Parent, footer: Footer, @ViewBuilder content: () -> Content)

    }

    ```


    Here is my preferred way of setting up header and footer for a section:


    ```

    List {

    Section(header: Text("Fruits"), footer: Text("\(fruits.count) fruits")) {

    ForEach(fruits, id: \.self) { fruit in

    Label(fruit, systemImage: "\(fruits.firstIndex(of: fruit) ?? 0).circle.fill" )

    }

    }

    }

    ```


    And here is the new way of doing the same:


    ```

    List {

    Section {

    ForEach(fruits, id: \.self) { fruit in

    Label(fruit, systemImage: "\(fruits.firstIndex(of: fruit) ?? 0).circle.fill" )

    }

    } header: {

    Text("Fruits")

    } footer: {

    Text("\(fruits.count) fruits")

    }

    }

    ```


    I leave it up to you to decide which one looks cleaner—when executed, they do
    exactly the same.


    ### List Cells


    Designing custom cells used to be a pretty complicated affair in the early days
    of`UITableViewController`, and thankfully, things have gotten a lot easier since
    then.


    In SwiftUI, designing custom`List`rows is easy to get started (just use a plain`Text`view
    to represent the current item), but the possibilities are endless, as you can
    make use of SwiftUI’s flexible stack-based layout system. For a general introduction
    to building custom`List`rows, check out the first part of this series, which covers
    some basic techniques.


    In addition, SwiftUI supports a number of ways for styling common aspects of`List`rows,
    such as their background, their inset, accent color, tint, and badges.


    Here is a code snippet that shows how you can configure a list row:


    ```

    List(items, id: \.title) { item in

    Label(item.title, systemImage: item.iconName)

    .badge(item.badge)

    // listItemTint and foregroundColor are mutually exclusive

    // .listItemTint(listItemTintColor)

    .foregroundColor(foregroundColor)

    .listRowSeparator(showSeparators == true ? .visible : .hidden)

    .listRowSeparatorTint(separatorTintColor)

    .listRowBackground(rowBackgroundColor)

    }

    }

    ```


    ![An illustration of the mobile phone screen. It reads styling with the row separators
    button enabled, foreground color, list item tint color, and row background color.
    Arrows mark dot ListRowSeparator, dot foregroundcolor, dot badge, etcetera.](images/509862_1_En_5_Chapter/509862_1_En_5_Fig7_HTML.png)


    **Figure 5-7** List Styles


    ### Separators


    As any designer will be able to tell you, the space between items is as important
    as the items themselves. With SwiftUI 3, it is now possible to influence the style
    of row separators and section separators: both the tint color and the visibility
    can be controlled. SwiftUI’s flexible DSL makes it easy to control this for an
    entire`List`view or for individual rows and sections.


    To control the appearance of row separators, you can use`.listRowSeparator()`and`.listRowSeparatorTint()`.
    You can specify which edges (`.top`or`.bottom`) you want to configure. If you
    don''t provide any value for the`edges`parameter, both top *and* bottom will be
    modified.


    ```

    List {

    Text("Row 1")

    Text("Row 2 (separators hidden)")

    .listRowSeparator(.hidden)

    Text("Row 3")

    Text("Row 4 (separators tinted red)")

    .listRowSeparatorTint(.red)

    Text("Row 5")

    Text("Row 6 (bottom separator hidden)")

    .listRowSeparator(.hidden, edges: .bottom)

    Text("Row 7")

    Text("Row 8 (top separator tinted blue)")

    .listRowSeparatorTint(.blue, edges: .top)

    Text("Row 9")

    Text("Row 10")

    }

    ```


    ![An illustration of a mobile phone screen with the title styling rows. Rows from
    1 to 10 with their assigned specification. Arrows mark dot ListRowSeperator for
    dot hidden, dot red, dot hidden, edges: dot bottom, etcetera.](images/509862_1_En_5_Chapter/509862_1_En_5_Fig8_HTML.png)


    **Figure 5-8** Styling List Rows


    To control the appearance of section separators, use`.listSectionSeparator()`and`.listSectionSeparatorTint()`.
    Just like the view modifiers for list rows, both of these view modifiers support
    specifying the edges you’d like to modify.


    ```

    List {

    Section(header: Text("Section 1"), footer: Text("Section 1 - no styling")) {

    Text("Row 1")

    }

    Section(header: Text("Section 2"), footer: Text("Section 2 - section separators
    hidden")) {

    Text("Row 1")

    }

    .listSectionSeparator(.hidden)

    Section(header: Text("Section 3"), footer: Text("Section 3 - section separator
    tinted red")) {

    Text("Row 1")

    }

    .listSectionSeparatorTint(.red)

    Section(header: Text("Section 4"), footer: Text("Section 4 - section separators
    tinted green")) {

    Text("Row 1")

    }

    .listSectionSeparatorTint(.green, edges: [.top, .bottom])

    Section(header: Text("Section 5"), footer: Text("Section 5 - section separator
    (bottom) hidden")) {

    Text("Row 1")

    }

    .listSectionSeparator(.hidden, edges: .bottom)

    Section("Section 6") {

    Text("Row 1")

    }

    }

    ```


    ![An illustration of a mobile phone screen with the title styling section from
    sections 1 to 4 and their corresponding rows with specifications. Arrows mark
    dot ListsectionSeperator, dot hidden, and dot ListsectionSeperator, dot red.](images/509862_1_En_5_Chapter/509862_1_En_5_Fig9_HTML.png)


    **Figure 5-9** Styling List Sections


    ## Actions


    Let’s now look at Swipe Actions. Swipe Actions are used in many apps, most prominently
    in Apple’s own Mail app. They provide a well-known and easy-to-use UI affordance
    to allow users to perform actions on list items.


    UIKit has supported Swipe Actions since iOS 11, but SwiftUI didn’t support Swipe
    Actions until WWDC 2021.


    In this post, we will look at the following features:


    * **Swipe-to-delete** using the`onDelete`modifier

    * **Deleting and moving items** using`EditButton`and the`.editMode`environmental
    value

    * Using **Swipe Actions** (this is the most flexible approach, which also gives
    us a wealth of styling options)'
