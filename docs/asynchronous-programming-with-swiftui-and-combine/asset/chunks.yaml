    init() {

    $searchTerm

    .debounce(for: 0.8, scheduler: DispatchQueue.main) // (1)

    .removeDuplicates()                                // (2)

    .handleEvents(receiveOutput: { output in           // (3)

    self.isSearching = true

    })

    .flatMap { value in

    Future { promise in

    Task {

    let result = await self.searchBooks(matching: value)

    promise(.success(result))

    }

    }

    }

    .receive(on: DispatchQueue.main)

    .eraseToAnyPublisher()

    .handleEvents(receiveOutput: { output in           // (4)

    self.isSearching = false

    })

    .assign(to: &$result)                              // (5)

    }

    private func searchBooks(matching searchTerm: String) async -> [Book] {

    let escapedSearchTerm = searchTerm

    .addingPercentEncoding(withAllowedCharacters: .urlHostAllowed) ?? ""

    let url =

    URL(string: "https://openlibrary.org/search.json?q=\(escapedSearchTerm)")!

    do {

    let (data, _) =

    try await URLSession.shared.data(from: url)

    let searchResult =

    try OpenLibrarySearchResult.init(data: data)

    guard let libraryBooks = searchResult.books else {

    return []

    }

    return libraryBooks.compactMap { Book(from: $0) }

    }

    catch {

    return []

    }

    }

    }

    ```


    This approach allows us to tap into the power of Combine to improve the user experience
    with just a few lines of code:


    *   By using the `debounce` operator (1), we can hold off on sending search requests
    over the network until the user has stopped typing for a second. This means we
    will consume less bandwidth (good for the user) and cause fewer API calls (good
    for us, esp. when calling APIs that might be billed).


    *   We can further reduce the number of requests by removing any duplicate API
    calls using the `removeDuplicates` operator (2).


    There are also some advantages on the code level:


    *   By using the `handleEvents` operator (3, 4), we can extract the code for handling
    the progress view from the `map` and `sink` operators. This also allows us to
    replace the `sink/store` combo by a much simpler and easier to use `assign` subscriber.


    *   There is only one place (5) in which we assign the result of the pipeline
    to the `result` property, reducing the chances to introduce subtle programming
    errors.


    At the same time, we can use the advantages of `async/await` when writing network
    access code: being able to read the code from top to bottom in a linear way makes
    it a lot easier to understand than code that makes use of callbacks or nested
    closures.


    Let’s take a closer look at the code that allows us to call an asynchronous method
    from a Combine pipeline:


    ```

    somePublisher

    .flatMap { value in

    Future { promise in

    Task {

    let result = await self.searchBooks(matching: value)

    promise(.success(result))

    }

    }

    }

    ```


    To call the asynchronous version of `searchBooks`, we need to establish an asynchronous
    context. This is why we wrap the call in a `Task`. Once `searchBook` returns,
    we resolve the promise by sending the result as a `.success` case value.


    We can simplify this code by extracting the relevant part into an extension on
    `Publisher`:


    ```

    extension Publisher {

    /// Executes an asynchronous call and returns its result to the downstream subscriber.

    ///

    /// - Parameter transform: A closure that takes an element as a parameter and
    returns a publisher that produces elements of that type.

    /// - Returns: A publisher that transforms elements from an upstream  publisher
    into a publisher of that element''s type.

    func `await`(_ transform: @escaping (Output) async -> T) -> AnyPublisher {

    flatMap { value -> Future in

    Future { promise in

    Task {

    let result = await transform(value)

    promise(.success(result))

    }

    }

    }

    .eraseToAnyPublisher()

    }

    }

    ```


    This allows us to call an asynchronous method using the following code:


    ```

    somePublisher

    .await { searchTerm in

    await self.searchBooks(matching: searchTerm)

    }

    ```


    ## Summary


    The seeming lack of attention Apple paid to Combine at WWDC 2021 resulted in a
    lot of confusion and uncertainty in the community—should you invest into learning
    Combine in the light of all the attention Apple put on `async/await`?


    To answer this question, we need to take a step back and understand the value
    propositions of Combine and `async/await`.


    At a cursory glance, they seem to address the same use case: asynchronously calling
    APIs. However, when looking closer, it becomes clear that they are very different
    indeed:


    Combine is a reactive framework, with the notion of a stream of events that you
    transform using operators before consuming them with a subscriber. This side-effect-free
    way of programming makes is easier to ensure your app is always in a consistent
    state. In fact, SwiftUI’s state management system makes heavy use of Combine—every
    `@Published` property is, as the name implies, a publisher, making it easy to
    connect a Combine pipeline.


    `Async/await`, on the other hand, aims at making asynchronous programming and
    handling concurrency easier to implement and reason about. While this makes it
    easier to create a linear control flow, it doesn’t offer the same guarantees about
    state as Combine does.


    My recommendation is to use whichever of the two makes the most sense in any given
    situation. For any UI-related task, I personally prefer using Combine, as it gives
    us unprecedented power and flexibility when implementing otherwise difficult-to-implement
    aspects like debouncing user input, combining multiple input streams into one,
    and efficiently handling out-of-order execution of network requests.


    Combine and async/await are two different kinds of tools in our tool belt, and
    it is our responsibility to use them wisely and according to their intended purpose.


    My recommendation is to use Combine for UI-related features in your app that needs
    to deal with handling input from a number of sources. Some examples are as follows:


    *   Input validation: Validating multiple input fields, making sure the user filled
    in all the mandatory fields, handling interfield dependencies (e.g., selecting
    credit card payment requires you to fill out the card number, but pay by invoice
    requires you to provide an additional address for the invoice)


    *   Searching and filtering: Making sure to search and filter based on the latest
    values the user entered in the search bar, along with any filter criteria they
    selected


    *   Cleaning up user input before it reaches your data layer: For example, making
    sure you don’t hit your API endpoint for every single character the user types,
    or to remove duplicate queries, to make your network layer more efficient (and
    consume less bandwidth)


    On the other hand, you might find using `async/await` easier to use than Combine
    when calling asynchronous APIs, making network requests, or interfacing with BaaS
    platforms like Firebase.


    And finally, as you saw in this chapter, combining async/await and Combine is
    possible, allowing you to mix and match the best aspects of both approaches.'
  trans: "\n# 从 Combine 调用异步代码\n\n在上一节中，我曾断言无法使用 `async/await` 订阅 Combine 发布者。但事实果真如此吗？让我们看看能否实现一种巧妙的方式，将\
    \ `async/await` 与 Combine 结合起来。\n\n以下代码片段展示了一个视图模型，它使用 Combine 管道来调用异步版本的 `searchBooks`\
    \ 方法：\n\n```\nfileprivate class ViewModel: ObservableObject {\n    // MARK: -\
    \ 输入\n    @Published var searchTerm: String = \"\"\n    // MARK: - 输出\n    @Published\
    \ private(set) var result: [Book] = []\n    @Published var isSearching = false\n\
    \    \n    init() {\n        $searchTerm\n            .debounce(for: 0.8, scheduler:\
    \ DispatchQueue.main) // (1)\n            .removeDuplicates()                \
    \                // (2)\n            .handleEvents(receiveOutput: { output in\
    \           // (3)\n                self.isSearching = true\n            })\n\
    \            .flatMap { value in\n                Future { promise in\n      \
    \              Task {\n                        let result = await self.searchBooks(matching:\
    \ value)\n                        promise(.success(result))\n                \
    \    }\n                }\n            }\n            .receive(on: DispatchQueue.main)\n\
    \            .eraseToAnyPublisher()\n            .handleEvents(receiveOutput:\
    \ { output in           // (4)\n                self.isSearching = false\n   \
    \         })\n            .assign(to: &$result)                              //\
    \ (5)\n    }\n    \n    private func searchBooks(matching searchTerm: String)\
    \ async -> [Book] {\n        let escapedSearchTerm = searchTerm\n            .addingPercentEncoding(withAllowedCharacters:\
    \ .urlHostAllowed) ?? \"\"\n        let url = \n            URL(string: \"https://openlibrary.org/search.json?q=\\\
    (escapedSearchTerm)\")!\n        do {\n            let (data, _) = \n        \
    \        try await URLSession.shared.data(from: url)\n            let searchResult\
    \ = \n                try OpenLibrarySearchResult.init(data: data)\n         \
    \   guard let libraryBooks = searchResult.books else {\n                return\
    \ []\n            }\n            return libraryBooks.compactMap { Book(from: $0)\
    \ }\n        } catch {\n            return []\n        }\n    }\n}\n```\n\n这种方法使我们能够利用\
    \ Combine 的强大功能，仅用几行代码就能改善用户体验：\n\n- 通过使用 `debounce` 操作符 (1)，我们可以推迟通过网络发送搜索请求，直到用户停止输入约一秒钟。这意味着我们将消耗更少的带宽（对用户有利），并减少\
    \ API 调用次数（对我们有利，尤其是在调用可能按次计费的 API 时）。\n- 我们还可以通过使用 `removeDuplicates` 操作符 (2)\
    \ 移除任何重复的 API 调用来进一步减少请求数量。\n\n在代码层面也有一些优势：\n\n- 通过使用 `handleEvents` 操作符 (3, 4)，我们可以将处理进度视图的代码从\
    \ `map` 和 `sink` 操作符中抽取出来。这也允许我们用一个更简单易用的 `assign` 订阅者替换 `sink`/`store` 组合。\n\
    - 只有一个地方 (5) 将管道的结果赋值给 `result` 属性，从而降低了引入细微编程错误的机会。\n\n与此同时，在编写网络访问代码时，我们可以利用\
    \ `async/await` 的优势：能够以线性方式自上而下地阅读代码，这比使用回调或嵌套闭包的代码更容易理解。\n\n让我们仔细看看允许我们从 Combine\
    \ 管道调用异步方法的代码：\n\n```\nsomePublisher\n    .flatMap { value in\n        Future\
    \ { promise in\n            Task {\n                let result = await self.searchBooks(matching:\
    \ value)\n                promise(.success(result))\n            }\n        }\n\
    \    }\n```\n\n要调用异步版本的 `searchBooks`，我们需要建立一个异步上下文。这就是我们将调用包装在 `Task` 中的原因。一旦\
    \ `searchBook` 返回，我们就通过将结果作为 `.success` 枚举值发送来兑现 promise。\n\n我们可以通过将相关部分抽取到 `Publisher`\
    \ 的扩展中来简化这段代码：\n\n```\nextension Publisher {\n    /// 执行异步调用并将其结果返回给下游订阅者。\n \
    \   ///\n    /// - Parameter transform: 一个闭包，它将一个元素作为参数，并返回一个产生该类型元素的发布者。\n  \
    \  /// - Returns: 一个发布者，它将来自上游发布者的元素转换为该元素类型的发布者。\n    func `await`(_ transform:\
    \ @escaping (Output) async -> T) -> AnyPublisher {\n        flatMap { value ->\
    \ Future in\n            Future { promise in\n                Task {\n       \
    \             let result = await transform(value)\n                    promise(.success(result))\n\
    \                }\n            }\n        }\n        .eraseToAnyPublisher()\n\
    \    }\n}\n```\n\n这允许我们使用以下代码调用异步方法：\n\n```\nsomePublisher\n    .await { searchTerm\
    \ in\n        await self.searchBooks(matching: searchTerm)\n    }\n```\n\n## 总结\n\
    \n苹果在 WWDC 2021 上似乎对 Combine 缺乏关注，这导致社区中出现了很多困惑和不确定性——考虑到苹果对 `async/await` 的重视程度，你是否还应该投入精力学习\
    \ Combine？\n\n要回答这个问题，我们需要退一步思考，理解 Combine 和 `async/await` 的价值主张。\n\n粗略一看，它们似乎解决的是同一个用例：异步调用\
    \ API。然而，仔细观察就会发现，它们实际上截然不同：\n\nCombine 是一个响应式框架，其核心概念是事件流，你可以通过操作符对其进行转换，然后使用订阅者进行消费。这种无副作用的编程方式更容易确保你的应用始终处于一致的状态。实际上，SwiftUI\
    \ 的状态管理系统大量使用了 Combine——每个 `@Published` 属性，顾名思义，都是一个发布者，这使连接 Combine 管道变得很容易。\n\
    \n另一方面，`Async/await` 旨在使异步编程和处理并发更容易实现和推理。虽然这使创建线性控制流变得更容易，但它不能像 Combine 那样对状态提供相同的保证。\n\
    \n我的建议是，在任何给定情况下，使用两者中更合理的那一个。对于任何与 UI 相关的任务，我个人更喜欢使用 Combine，因为它在实现诸如用户输入防抖、将多个输入流合并为一个，以及高效处理网络请求无序执行等原本难以实现的方面，提供了前所未有的能力和灵活性。\n\
    \nCombine 和 `async/await` 是我们工具箱中两种不同的工具，我们有责任明智地、按照它们预期的用途来使用它们。\n\n我的建议是，在应用中处理来自多个来源输入的\
    \ UI 相关功能时使用 Combine。一些示例如下：\n\n- 输入验证：验证多个输入字段，确保用户填写了所有必填字段，处理字段间依赖关系（例如，选择信用卡支付需要填写卡号，而选择发票支付则需要提供额外的发票地址）\n\
    - 搜索和过滤：确保基于用户在搜索栏中输入的最新值以及他们选择的任何过滤条件进行搜索和过滤\n- 在用户输入到达数据层之前对其进行清理：例如，确保不要因为用户输入的每一个字符都命中\
    \ API 端点，或者移除重复查询，以使网络层更高效（并消耗更少的带宽）\n\n另一方面，你可能会发现，在调用异步 API、发出网络请求或与 Firebase\
    \ 等 BaaS 平台交互时，使用 `async/await` 比使用 Combine 更容易。\n\n最后，正如你在本章中所见，将 `async/await`\
    \ 和 Combine 结合起来是可行的，这允许你混合并匹配这两种方法的最佳特性。\n"
