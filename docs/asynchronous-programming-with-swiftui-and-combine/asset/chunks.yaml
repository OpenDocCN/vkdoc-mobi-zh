    \                    .disableAutocorrection(true)\n            } footer: {\n \
    \               Text(viewModel.usernameMessage)\n                    .foregroundColor(.red)\n\
    \            }\n            // (code for password fields removed for brevity)\n\
    \            // Submit button\n            Section {\n                Button(\"\
    Sign up\") {\n                    print(\"Signing up as \\(viewModel.username)\"\
    )\n                }\n                .disabled(!viewModel.isValid)\n        \
    \    }\n        }\n    }\n}\n```\n\nHere are the parts of the view model that\
    \ are relevant for our discussion—again, some of the code from the previous chapter\
    \ is stripped out for simplicity.\n\n```\nclass SignUpScreenViewModel: ObservableObject\
    \ {\n    private var authenticationService = AuthenticationService()\n    // MARK:\
    \ Input\n    @Published var username: String = \"\"\n    // MARK: Output\n   \
    \ @Published var usernameMessage: String = \"\"\n    @Published var isValid: Bool\
    \ = false\n    ...\n}\n```\n\nSince `@Published` properties are Combine publishers,\
    \ we can subscribe to them to receive updates whenever their value changes.\n\n\
    This will allow us to take the user’s most recent input and pass it to the `checkUserNameAvailable`\
    \ publisher to see if this username is still available.\n\nTo pass events from\
    \ one publisher to another one, we can use the `flatMap` operator:\n\n```\n$username\n\
    \    .flatMap { username -> AnyPublisher<Bool, Never> in\n        self.authenticationService.checkUserNameAvailable(userName:\
    \ username)\n    }\n```\n\n![](images/509862_1_En_9_Chapter/509862_1_En_9_Fig1_HTML.png)\n\
    \nA screenshot of the Sign Up Form with 3 fields is linked to 2 blocks. The template\
    \ for the form model and character type of each field is given in one block. And\
    \ the process to check the username availability via output and failure tables\
    \ is in the next block.\n\n**Figure 9-1** Combine pipeline for calling the authentication\
    \ service to check if the username is available\n\nThis pipeline takes input events\
    \ from the `username` publisher (i.e., what the user types into the *username*\
    \ text input field) and sends them to the `checkUserNameAvailable` publisher.\
    \ This publisher will return a `Bool` for each input event, indicating whether\
    \ the respective username is still available. This means that subscribers will\
    \ receive a stream of `Bool`s.\n\nWe want to use the result of this pipeline to\
    \ drive the state of the sign-up form: as long as the pipeline returns `true`\
    \ to indicate that the chosen username is available, we want to enable the *Submit*\
