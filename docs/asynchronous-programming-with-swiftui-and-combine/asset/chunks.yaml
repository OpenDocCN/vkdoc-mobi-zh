    \ will no longer terminate in case it emits a failure.\n\nLet’s first define a\
    \ typealias for the `Result` type to make our life a little easier:\n\n```\ntypealias\
    \ Available = Result\n```\n\nTo turn the result of a publisher into a `Result`\
    \ type, we can use the following operator that John Sundell implemented in his\
    \ article “The power of extensions in Swift”^([(77)](#fn77)):\n\n```\nextension\
