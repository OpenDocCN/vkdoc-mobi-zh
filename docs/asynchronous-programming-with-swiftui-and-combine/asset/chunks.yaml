    \           .tint(Color(UIColor.systemOrange))\n        }\n}\n```\n\n如果在同一侧边缘添加了多个滑动操作，它们将从外侧开始排列，这意味着第一个按钮始终会最靠近对应的边缘。\n\
    \n> 请注意，虽然从理论上讲，在行任意一侧添加的滑动操作数量没有限制，但用户能够舒适使用的操作数量取决于他们的设备。例如，竖屏模式下的 iPhone 13\
    \ 列表行最多可以容纳五个滑动操作，但此时它们会完全填满整行，不仅看起来奇怪，而且在尝试点击正确按钮时也会出现问题。较小的设备（如 iPhone 6 甚至\
    \ iPhone 5）能容纳的滑动操作更少。三到四个滑动操作似乎是合理的上限，应当能在大多数设备上正常工作。\n\n#### 全滑动\n\n默认情况下，通过全滑动可以触发任意滑动方向上的第一个操作。你可以将\
    \ `allowsFullSwipe` 参数设置为 `false` 来禁用此行为：\n\n```\n.swipeActions(edge: .trailing,\
    \ allowsFullSwipe: false) {\n    Button(role: .destructive, action: { viewModel.deleteItem(item)\
    \ }) {\n        Label(\"删除\", systemImage: \"trash\")\n    }\n}\n```\n\n#### 美化滑动操作样式\n\
    \n如前所述，将滑动操作 `Button` 的 `role` 设置为 `.destructive` 会自动将按钮颜色变为红色。如果不指定 `role`，`Button`\
    \ 的颜色将是浅灰色。你可以通过对滑动操作的 `Button` 使用 `tint` 修饰符指定任何其他颜色——示例如下：\n\n```\n.swipeActions(edge:\
    \ .trailing) {\n    Button(action: { selectedItem = item }) {\n        Label(\"\
    标记\", systemImage: \"tag\")\n    }\n    .tint(Color(UIColor.systemOrange))\n}\n\
    ```\n\n在 `Button` 内部，你可以使用 `Image`、`Text` 或 `Label` 同时显示文本标签和/或图标。\n\n## 管理列表中的焦点\n\
    \n对于几乎任何类型的用户界面而言，焦点管理都是一个重要方面——处理好这一点有助于用户更快速、更高效地导航你的应用。在桌面界面中，我们通常期望能够通过按 Tab\
    \ 键在表单的输入字段间导航，而在移动设备上这一点同样重要。例如，在苹果的“提醒事项”应用中，当你创建新提醒时，光标会自动定位到该提醒处，并且当你按下 Enter\
    \ 键时，光标会移至下一行。这样，你就能非常高效地添加新元素。\n\n苹果在 iOS 15 中为 SwiftUI 添加了对焦点管理的支持——这包括设置和观察焦点。\n\
    \n无论是在苹果官方文档中，还是在其他开发者的博客和视频中，大部分示例仅讨论了如何在简单表单（如登录表单）中使用焦点管理。更高级的用例，例如在可编辑列表中管理焦点，则未被涵盖。\n\
    \n接下来，我将向你展示如何在一个允许用户编辑列表元素的应用中管理焦点状态。作为示例，我将使用我正在开发的一款待办事项应用 Make It So。Make\
    \ It So 是苹果“提醒事项”应用的复刻版本，其目标在于探索仅使用 SwiftUI 和 Firebase（用于存储等后端服务）能多大程度上还原原版应用^(⁴⁹)。\n\
    \n### 如何在 SwiftUI 中管理焦点\n\n在 WWDC 2021 上，苹果引入了 `@FocusState`，这是一个属性包装器，可用于跟踪和修改场景中的焦点。\n\
    \n你可以使用 `Bool` 或 `enum` 来跟踪用户界面中哪个元素获得了焦点。\n\n以下示例使用一个包含两个枚举值的 `enum` 来跟踪一个简单的用户资料表单的焦点。正如你在\
    \ `Button` 的闭包中所见，我们可以通过编程方式设置焦点，例如当用户忘记填写必填字段时。\n\n```\nenum FocusableField:\
    \ Hashable {\n    case firstName\n    case lastName\n}\n\nstruct FocusUsingEnumView:\
    \ View {\n    @FocusState private var focus: FocusableField?\n    @State private\
    \ var firstName = \"\"\n    @State private var lastName = \"\"\n\n    var body:\
    \ some View {\n        Form {\n            TextField(\"名字\", text: $firstName)\n\
    \                .focused($focus, equals: .firstName)\n            TextField(\"\
    姓氏\", text: $lastName)\n                .focused($focus, equals: .lastName)\n\
    \            Button(\"保存\") {\n                if firstName.isEmpty {\n      \
    \              focus = .firstName\n                } else if lastName.isEmpty\
    \ {\n                    focus = .lastName\n                } else {\n       \
    \             focus = nil\n                }\n            }\n        }\n    }\n\
    }\n```\n\n这种方法对于输入元素寥寥无几的简单输入表单效果很好，但对于显示不定量元素的 `List` 视图或其他动态视图而言并不可行。\n\n###\
    \ 如何在列表中管理焦点\n\n要在 `List` 视图中管理焦点，我们可以利用 Swift `enum` 支持关联值的特性。这使我们能够定义一个可以持有待焦点列表元素\
    \ `id` 的 `enum`：\n\n```\nenum Focusable: Hashable {\n    case none\n    case row(id:\
    \ String)\n}\n```\n\n有了这个基础，我们可以定义一个类型为 `Focusable` 的局部变量 `focusedReminder`，并使用\
    \ `@FocusState` 对其进行包装：\n\n```\nstruct Reminder: Identifiable {\n    var id: String\
    \ = UUID().uuidString\n    var title: String\n}\n\nstruct FocusableListView: View\
    \ {\n    @State var reminders: [Reminder] = Reminder.samples\n    @FocusState\
    \ var focusedReminder: Focusable?\n\n    var body: some View {\n        List {\n\
    \            ForEach($reminders) { $reminder in\n                TextField(\"\"\
    , text: $reminder.title)\n                    .focused($focusedReminder, equals:\
    \ .row(id: reminder.id))\n            }\n        }\n        .toolbar {\n     \
    \       ToolbarItemGroup(placement: .bottomBar) {\n                Button(action:\
    \ { createNewReminder() }) {\n                    Text(\"新建提醒\")\n           \
    \     }\n            }\n        }\n    }\n    // ...\n}\n```\n\n当用户点击“新建提醒”工具栏按钮时，我们会向\
    \ `reminders` 数组中添加一个新的 `Reminder`。要将焦点设置到这条新创建的提醒所在的行，我们只需使用新提醒的 `id` 作为关联值创建一个\
    \ `Focusable` 枚举实例，并将其赋值给 `focusedReminder` 属性即可：\n\n```\nstruct FocusableListView:\
    \ View {\n    // ...\n    func createNewReminder() {\n        let newReminder\
    \ = Reminder(title: \"\")\n        reminders.append(newReminder)\n        focusedReminder\
    \ = .row(id: newReminder.id)\n    }\n}\n```"
- fmt: '### Handling the Enter Key


    Let’s now turn our focus to another feature of Apple’s Reminder app that will
    improve the UX of our application: adding new elements (and focusing them) when
    the user hits the `Enter` key.


    We can use the `.onSubmit` view modifier to run code when the user submits a value
    to a view. By default, this will be triggered when the user taps the `Enter` key:


    ```

    ...

    TextField("", text: $reminder.title)

    .focused($focusedTask, equals: .row(id: reminder.id))

    .onSubmit {

    createNewTask()

    }

    ...

    ```


    This works fine, but all new elements will be added to the end of the list. This
    is a bit unexpected in case the user was just editing a to-do at the beginning
    or in the middle of the list.


    Let’s update our code for inserting new items and make sure new items are inserted
    directly after the currently focused element:


    ```

    ...

    func createNewTask() {

    let newReminder = Reminder(title: "")

    // if any row is focused, insert the new task after the focused row

    if case .row(let id) = focusedTask {

    if let index = reminders.firstIndex(where: { $0.id == id } ) {

    reminders.insert(newReminder, at: index + 1)

    }

    }

    // no row focused: append at the end of the list

    else {

    reminders.append(newReminder)

    }

    // focus the new task

    focusedTask = .row(id: newReminder.id)

    }

    ...

    ```


    This works great, but there is a small issue with this: if the user hits the `Enter`
    key several times in a row without entering any text, we will end up with a bunch
    of empty rows—not ideal. The Reminders app automatically removes empty rows, so
    let’s see if we can implement this as well.


    If you’ve followed along, you might notice another issue: the code for our view
    is getting more and more crowded, and we’re mixing declarative UI code with a
    lot of imperative code.


    ### What About MVVM?


    Now those of you who have been following my blog and my videos know that I am
    a fan of using the MVVM approach in SwiftUI, so let’s take a look at how we can
    introduce a view model to declutter the view code *and* implement a solution for
    removing empty rows at the same time.


    Ideally, the view model should contain the array of `Reminder`s, the focus state,
    and the code to create a new reminder:


    ```

    class ReminderListViewModel: ObservableObject {

    @Published var reminders: [Reminder] = Reminder.samples

    @FocusState

    var focusedReminder: Focusable?

    func createNewReminder() {

    let newReminder = Reminder(title: "")

    // if any row is focused, insert the new reminder after the focused row

    if case .row(let id) = focusedReminder {

    if let index = reminders.firstIndex(where: { $0.id == id } ) {

    reminders.insert(newReminder, at: index + 1)

    }

    }

    // no row focused: append at the end of the list

    else {

    reminders.append(newReminder)

    }

    // focus the new reminder

    focusedReminder = .row(id: newReminder.id)

    }

    }

    ```


    Notice how we’re accessing the `focusedReminder` focus state inside of `createNewReminder`
    to find out where to insert the new reminder, and then set the focus on the newly
    added/inserted reminder.


    Obviously, the `FocusableListView` view needs to be updated as well to reflect
    the fact that we’re no longer using a local `@State` variable, but an `@ObservableObject`
    instead:


    ```

    struct FocusableListView: View {

    @StateObject var viewModel = ReminderListViewModel().

    var body: some View {

    List {

    ForEach($viewModel.reminders) { $reminder in

    TextField("", text: $reminder.title)

    .focused(viewModel.$focusedReminder, equals: .row(id: reminder.id))

    .onSubmit {

    viewModel.createNewReminder()

    }

    }

    }

    .toolbar {

    ToolbarItem(placement: .bottomBar) {

    Button(action: { viewModel.createNewReminder() }) {

    Text("New Reminder")

    }

    }

    }

    }

    }

    ```


    This all looks great, but when running this code, you will notice the focus handling
    no longer works, and instead we receive a SwiftUI runtime warning that says *Accessing
    FocusState’s value outside of the body of a View. This will result in a constant
    Binding of the initial value and will not update*.


    ![](images/509862_1_En_5_Chapter/509862_1_En_5_Fig10_HTML.png)


    A window screen with a set of program codes. An alert message of accessing focus
    states value outside of the body of a view with constant binding.


    **Figure 5-10** Runtime warning when accessing `FocusState` outside the body of
    a view


    This is because `@FocusState` conforms to `DynamicProperty`, which can only be
    used inside views.


    So we need to find another way to synchronize the focus state between the view
    and the view model. One way to react to changes on properties of views is the
    `.onChange(of:)` view modifier.


    To synchronize the focus state between the view model and the view, we can:


    1. Add the `@FocusState` back to the view

    2. Mark `focusedReminder` as a `@Published` property on the view model

    3. And sync them using `onChange(of:)`


    Like this:


    > *Side note: this can be cleaned up even further by extracting the code for synching
    into an extension on* `View`.


    ```

    class ReminderListViewModel: ObservableObject {

    @Published var reminders: [Reminder] = Reminder.samples

    @Published var focusedReminder: Focusable?

    // ...

    }

    struct FocusableListView: View {

    @StateObject var viewModel = ReminderListViewModel()

    @FocusState var focusedReminder: Focusable?

    var body: some View {

    List {

    ForEach($viewModel.reminders) { $reminder in

    // ...

    }

    }

    .onChange(of: focusedReminder)  {

    viewModel.focusedReminder = $0

    }

    .onChange(of: viewModel.focusedReminder) {

    focusedReminder = $0

    }

    // ...

    }

    }

    ```


    And with this, we’ve cleaned up our implementation—the view focuses on the display
    aspects, whereas the view model handles updating the data model and translating
    between the view and the model.


    ### Eliminating Empty Elements


    Using a view model gives us another nice benefit—since the `focusedReminder` property
    on the view model is a published property, we can attach a Combine pipeline to
    it and react to changes of the property. This will allow us to detect when the
    previously focused element is an empty element and consequently remove it.


    To do this, we will need an additional property on the view model to keep track
    of the previously focused `Reminder` and then install a Combine pipeline that
    removes empty `Reminder`s once their row loses focus:


    ```

    class ReminderListViewModel: ObservableObject {

    @Published var reminders: [Reminder] = Reminder.samples

    @Published var focusedReminder: Focusable?

    var previousFocusedReminder: Focusable?

    private var cancellables = Set()

    init() {

    $focusedReminder

    .compactMap { focusedReminder -> Int? in

    defer { self.previousFocusedReminder = focusedReminder }

    guard focusedReminder != nil else { return nil }

    guard case .row(let previousId) = self.previousFocusedReminder else { return nil
    }

    guard let previousIndex = self.reminders.firstIndex(where: { $0.id == previousId
    } ) else { return nil }

    guard self.reminders[previousIndex].title.isEmpty else { return nil }

    return previousIndex

    }

    .delay(for: 0.01, scheduler: RunLoop.main)

    // <-- this helps reduce visual jank

    .sink { index in

    self.reminders.remove(at: index)

    }

    .store(in: &cancellables)

    }

    // ...

    }

    ```'
