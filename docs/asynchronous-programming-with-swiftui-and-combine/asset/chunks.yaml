- fmt: '### Firebase


    Another example for an API that manages scheduling on its own is Firebase, Google’s
    app development platform. Most of Firebase’s services (like Cloud Firestore, Cloud
    Storage, Firebase Authentication, etc.) are asynchronous, and that means any calls
    to Firebase should be executed on a background thread. Let’s look at an example
    and see how Firestore manages this.


    The following code snippet shows how you can fetch a single document from Firestore:


    ```swift

    let docRef = Firestore.firestore()

    .collection("books")

    .document(documentId)

    docRef.getDocument(as: Book.self) { result in

    switch result {

    case .success(let book):

    self.book = book

    self.errorMessage = nil

    case .failure(let error):

    self.errorMessage = "\(error.localizedDescription)"

    }

    }

    ```


    Firestore creates a serial dispatch queue (see `executor_libdispatch.mm`, line
    362^([^(105)](#fn105))) and uses it to perform all operations that make remote
    calls to the Cloud Firestore backend:


    ```cpp

    std::unique_ptr Executor::CreateSerial(const char* label) {

    dispatch_queue_t queue =

    dispatch_queue_create(label,

    DISPATCH_QUEUE_SERIAL);

    return absl::make_unique(queue);

    }

    ```


    Once this call finishes, Firestore will use the main dispatch queue for calling
    the completion handler. In case you would like to use a different dispatch queue
    for returning the result, you can use `FirestoreSettings.dispatchQueue`^([^(106)](#fn106))
    to set a custom dispatch queue:


    ```swift

    let settings = Firestore.firestore().settings

    settings.dispatchQueue = DispatchQueue.global(qos: .background)

    Firestore.firestore().settings = settings

    ```


    This might be useful when you need to perform several dependent operations on
    a background thread before updating the UI.


    In the previous code snippet, we used a completion handler to handle the result
    of the call to `getDocument`. Firebase also supports Combine. Here is how the
    code snippet earlier would look like when using Combine:


    ```swift

    db.collection("books").document("hitchhiker").getDocument()

    .tryMap { documentSnapshot in

    try documentSnapshot.data(as: Book.self)

    }

    .replaceError(with: Book.empty)

    .assign(to: &$book)

    ```


    Since Firestore takes care of dispatching all operations on the most appropriate
    dispatch queue (a serial background queue for fetching data and the main dispatch
    queue for returning results), there is usually no need to switch the dispatch
    queue.


    ## Summary


    Traditionally, developers had to handle multithreading manually, often requiring
    them to switch thread using `DispatchQueue` and other similar mechanisms. On top
    of requiring an in-depth understanding of thread, this inevitably leads to more
    verbose code that is difficult to read and maintain.


    Combine uses schedulers as a declarative alternative that helps developers abstract
    away from having to manually wrap your code in calls to `DispatchQueue.main.async
    { }` etc. Instead, we can use Combine operators like `subscribe(on:)` and `receive(on:)`
    to declare which scheduling strategy Combine should use.


    The key takeaways from this chapter are as follows:


    1.  If you don’t specify a scheduler, Combine will run your code on the same thread
    as the one you are calling from.

    2.  For SwiftUI, this will most likely be the main thread.

    3.  However, asynchronous APIs, such as `URLSession`, might switch to a background
    thread.

    4.  In this case, you should use `receive(on:)` to switch back to the main thread
    before making any updates to the UI.

    5.  On the other hand, some APIs (like Firebase) might switch back to the main
    thread before returning a result. You need to be aware of this so you can avoid
    excessive thread jumping.

    6.  If you want to offload a long-running process to the background, you can do
    so using the `subscribe(on:)` operator.


    Overall, Combine’s schedulers make working with asynchronous code easier and less
    error prone. Xcode’s purple warning messages turn out to be particularly helpful
    when writing code for SwiftUI.


