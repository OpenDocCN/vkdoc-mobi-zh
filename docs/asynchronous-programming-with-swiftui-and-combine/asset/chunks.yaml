    *For Anne*


    Foreword


    I’ve been developing iOS apps for a while and started learning SwiftUI almost
    as soon as it was released back in 2019\. I remember that I couldn’t wait to start
    using it because it just seemed so much more intuitive for me than UIKit.


    There wasn’t much SwiftUI documentation at first and those of us who jumped straight
    in had to figure out a lot of things for ourselves. So I started sharing what
    I learned while building apps with SwiftUI on a blog.


    Just a few months later, the SwiftUI team at Apple reached out to me to join them
    in working on the framework. It was an invaluable experience and it gave me a
    great perspective on the inner workings of SwiftUI and the decisions behind the
    APIs. Sure, SwiftUI is not perfect and still needs time to mature, but it’s already
    making many developers happier and more excited about building apps for Apple
    platforms. A lot of thought goes into making SwiftUI APIs as simple and as streamlined
    as they are, so that we can get the right behavior for the platform by default.


    I left Apple in April 2022 and joined Nil Coalescing as a cofounder and a software
    engineer. Though I’m a little sad that I don’t get to contribute to the SwiftUI
    framework directly anymore, I’m really happy that I’m now able to use the APIs
    I helped to develop and to share my SwiftUI knowledge with other iOS developers.


    Seeing how much Apple is betting on SwiftUI by introducing new frameworks that
    require using it like *WidgetKit* and *Swift Charts,* I believe it has a great
    potential. It’s also nice to see how many more developers are starting to use
    SwiftUI and how much more great SwiftUI-related content is now available both
    from Apple and from the community.


    I believe that *Asynchronous Programming with SwiftUI and Combine* is a valuable
    addition to your book collection if you are going to work with SwiftUI. I like
    its unique focus on calling asynchronous APIs from SwiftUI applications, since
    it’s usually a major part of a real-world project. And Peter Friese is certainly
    the right person to talk about it given his work as a Developer Advocate for Firebase
    where he gets to experiment a lot with the Firebase asynchronous APIs and teach
    how to use them with SwiftUI. This book is full of practical examples using both
    Combine and Swift async/await APIs and will serve as a great foundation for developing
    SwiftUI apps with networking or local asynchronous data processing.


    *Natalia Panferova*


    Author of *Integrating SwiftUI into UIKit Apps*


    and Founder of *Nil Coalescing* ( [`https://nilcoalescing.com/about/`](https://nilcoalescing.com/about/)
    )


    Preface


    I started developing for iPhone OS (as it was called back then) in 2009\. I had
    just upgraded from an iPhone 3 to an iPhone 3GS, and I was super excited to kick
    the tires and build my first app—using Xcode and Objective-C!


    I already had practice using a variety of other IDEs, languages, and operating
    systems: starting out with GW-BASIC on MS-DOS, to Visual Basic and Delphi on Windows,
    to Java with Jbuilder, Websphere Application Developer, and Eclipse (for building
    J2EE and Spring applications for enterprise customers).


    But using Xcode and Objective-C was a bit of a shock. All the other IDEs that
    I’d used before were a lot more powerful (e.g., they all offered refactoring support),
    and Objective-C with all its square brackets looked a bit strange to me.


    Looking back at all the years of building software, Delphi was one of the most
    productive environments I’ve used to build software. It combined a mature, object-oriented
    language (Object Pascal) and a powerful IDE that allowed developers to quickly
    put together UIs for Windows apps. Plus, the tagline “Rapid Application Development”
    certainly had a ring to it.


    But Xcode and Objective-C were the future, so I buckled up and continued my journey
    to learn how to use them.


    Fast forward ten years—I had just watched WWDC 2019 and was thrilled by SwiftUI
    and its ease of use. Building UIs with SwiftUI felt so snappy, and reminded me
    of Delphi in many ways. I started thinking about how amazing it would be to combine
    SwiftUI with a framework that makes building backend systems easier.


    When the Firebase team at Google was looking for a person to join their Developer
    Relations team to specifically focus on the iOS developer ecosystem, I realized
    the opportunity this meant for me: bring together a language I love (Swift), a
    UI toolkit that enables developers to quickly build great-looking UIs (SwiftUI),
    and an SDK that makes developers more efficient by removing the need to run and
    operate your own backend system (Firebase). With all these tools, I could help
    people build better apps, faster.


    On day one after joining the Firebase DevRel team as a Developer Advocate, I started
    building demos to showcase the features of the Firebase iOS SDK. And I quickly
    learned that writing demos using SwiftUI was so much easier than using UIKit.
    This ease of use meant that I could focus on what I actually wanted to teach:
    how to use the Firebase SDK and its APIs.


    SwiftUI’s declarative approach to building UIs is a lot more opinionated about
    how your code should be structured when building UIs programmatically, making
    it a lot easier for other developers to understand what your code is supposed
    to do.


    And thanks to using a state management model that is based on functional reactive
    programming, SwiftUI and Combine make it a lot easier to build UIs that are in
    sync with the underlying data model and other parts of your app all of the time.
    I’m pretty sure we all know of apps for which this is not the case and can attest
    to the terrible UX this means.'
