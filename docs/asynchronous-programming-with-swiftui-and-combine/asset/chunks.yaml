  trans: '

    ### 使用 `PassthroughSubject` 封装快照监听器


    为了使与现有代码的集成更简单，Combine 包含了 `Subject` 协议。`Subject` 是一种特殊类型的发布者，允许外部调用方向 Combine
    管道中注入事件。`Subject` 协议定义了一个 `send(_:)` 方法，可用于向管道发送特定值。


    Combine 中有两种内置的 `Subject` 类型：`CurrentValueSubject` 和 `PassthroughSubject`。它们之间的主要区别在于，`CurrentValueSubject`
    会记住最近发布的元素，而 `PassthroughSubject` 则不会追踪它传递的值。


    `Subject` 对于将现有的命令式代码适配到 Combine 特别有用。在我们的案例中，我们不需要追踪最近发送的事件，因此可以使用 `PassthroughSubject`
    为 Firebase API 创建自定义的发布者，这些 API 会发送连续的事件流，例如 Firestore 快照监听器。


    让我们来看看为 Firestore 集合或 Firestore 查询上的快照监听器实现自定义 Combine 发布者所需的步骤。


    我们将把这个功能作为 `Query` 的一个扩展来实现。由于 `CollectionReference` 扩展了 `Query` 接口，该发布者将同样适用于
    Firestore 集合和查询：


    ```

    public extension Query {

    func snapshotPublisher(includeMetadataChanges: Bool = false)

    -> AnyPublisher

    {

    ...

    addSnapshotListener(includeMetadataChanges: includeMetadataChanges) { snapshot,
    error in

    ...

    }

    ...

    }

    }

    ```


    这段代码片段向 `Query` 接口添加了一个方法，该方法返回一个泛型为 `QuerySnapshot` 和 `Error` 类型的 `AnyPublisher`。在该方法内部，我们调用了原始的
    `addSnapshotListener` 方法，该方法接受一个闭包，我们需要实现这个闭包来处理调用的结果。如前所述，当被观察的集合或查询发生更改（例如，通过添加、更改或删除文档）时，这个闭包就会被调用。闭包的
    `snapshot` 参数将包含该集合或查询中所有文档的快照。如果发生错误，会通过 `error` 参数来传递。


    为了将闭包的结果注入 Combine 管道，我们需要设置一个 `PassthroughSubject` 并将其返回给 `snapshotPublisher`
    的调用者：


    ```

    public extension Query {

    func snapshotPublisher(includeMetadataChanges: Bool = false)

    -> AnyPublisher

    {

    let subject = PassthroughSubject()

    addSnapshotListener(includeMetadataChanges: includeMetadataChanges) { snapshot,
    error in

    ...

    }

    return subject.eraseToAnyPublisher()

    }

    }

    ```


    通过擦除主题的具体类型，我们确保了 `snapshotPublisher` 方法的返回类型保持简洁。


    最后，在闭包内部，我们可以使用 `PassthroughSubject` 向我们的订阅者发送事件。我们需要处理两种情况：当收到快照时，我们可以将其 `send`
    给 `subject`。如果出现 `error`，我们必须向 subject 发送一个 `failure`，以向 Combine 发出信号，表明管道应该被取消。


    ```

    public extension Query {

    func snapshotPublisher(includeMetadataChanges: Bool = false)

    -> AnyPublisher

    {

    let subject = PassthroughSubject()

    addSnapshotListener(includeMetadataChanges: includeMetadataChanges) { snapshot,
    error in

    if let error = error {

    subject.send(completion: .failure(error))

    } else if let snapshot = snapshot {

    subject.send(snapshot)

    }

    }

    return subject.eraseToAnyPublisher()

    }

    }

    ```


    到目前为止看起来不错，但还有一个细节我们需要处理。当调用 `addSnapshotListener` 时，我们会收到一个句柄，之后可以使用它来移除快照监听器。当你不再关心某个查询或集合的监听时，应该移除所有
    Firestore 快照监听器。


    但是，我们如何在 `snapshotPublisher` 方法内部存储和管理这个快照监听器句柄呢？事实证明，我们可以利用 Combine 的 `handleEvents`
    操作符。这个操作符允许我们监听 Combine 管道的生命周期事件，例如，当管道被取消时。因此，我们可以将快照监听器句柄存储在一个局部变量中，随后在管道被取消时用它来移除快照监听器。


    ```

    public extension Query {

    func snapshotPublisher(includeMetadataChanges: Bool = false)

    -> AnyPublisher

    {

    let subject = PassthroughSubject()

    let listenerHandle =

    addSnapshotListener(includeMetadataChanges: includeMetadataChanges) { snapshot,
    error in

    if let error = error {

    subject.send(completion: .failure(error))

    } else if let snapshot = snapshot {

    subject.send(snapshot)

    }

    }

    return

    subject

    .handleEvents(receiveCancel: listenerHandle.remove)

    .eraseToAnyPublisher()

    }

    }

    ```


    以上就是将现有 API 适配到 Combine 的方法！


    让我们更新之前的代码示例，以使用这个新的发布者：


    ```

    private class BookListViewModel: ObservableObject {

    @Published var books = [Book]()

    @Published var errorMessage: String?

    private var db = Firestore.firestore()

    private var cancellable: AnyCancellable?

    func subscribe() {

    cancellable = db.collection("books").snapshotPublisher()

    .tryMap { querySnapshot in

    try querySnapshot.documents.compactMap { documentSnapshot in

    try documentSnapshot.data(as: Book.self)

    }

    }

    .replaceError(with: [Book]())

    .handleEvents(receiveCancel: {

    print("Cancelled")

    })

    .assign(to: \.books, on: self)

    }

    func unsubscribe() {

    cancellable?.cancel()

    }

    }

    ```

