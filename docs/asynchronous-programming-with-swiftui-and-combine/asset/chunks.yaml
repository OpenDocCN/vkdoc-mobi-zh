    \ String = \"\"\n    @Published private(set) var result: [Book] = []\n    @Published\
    \ private(set) var isSearching = false\n    private var searchTask: Task<Void,\
    \ Never>? // (1)\n\n    @MainActor // (7)\n    func executeQuery() async {\n \
