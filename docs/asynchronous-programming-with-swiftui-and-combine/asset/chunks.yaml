    # 15. Using `async/await` in SwiftUI


    Now that you''ve got a basic understanding of how Swift''s new concurrency model
    works, let''s look at how to use it in a SwiftUI application.


    The sample app we''re going to build in this chapter makes use of the WordsAPI.^([^(123)](#fn123))
    This is a fun little API that provides a ton of interesting information about
    words. You send it a word, such as "Swift", and it will return a bunch of information
    about this word—for example, "moving very fast," "a small bird that resembles
    a swallow," or "an English satirist born in Ireland."


    The sample app displays a list of suggested words the user can tap on to get more
    information about them. The app will then fetch the different meanings of the
    word from WordAPI.com and display them in a details screen.


    Throughout the chapter, we will look at how to call this asynchronous code from
    different situations in the app, for example, when the user taps a button, when
    they pull to refresh, etc.


    ## Fetching Data Asynchronously Using `URLSession`


    `URLSession` is among the many APIs Apple has upgraded to support `async/await`,
    so fetching data using `URLSession` is now a one liner:


    ```

    let (data, response) =

    try await URLSession.shared.data(for: urlRequest)

    ```


    With some minimal amount of error handling and JSON parsing (using `Codable`),
    the code for fetching the details about a word from WordsAPI.com looks like this:


    ```

    private func search(for searchTerm: String) async -> Word {

    // build the request

    let request = buildURLRequest(for: searchTerm)

    do {

    let (data, response) =

    try await URLSession.shared.data(for: request)

    guard let httpResponse = response as? HTTPURLResponse,

    httpResponse.statusCode == 200 else

    {

    throw WordsAPIError.invalidServerResponse

    }

    let word = try JSONDecoder().decode(Word.self, from: data)

    return word

    }

    catch {

    return Word.empty

    }

    }

    ```


    By adding the `async` keyword to the signature of the method, we declare that
    it is asynchronous. The compiler will use this information to make sure this method
    is called from an asynchronous context and issue compile-time errors if we forget
    to call the method using the `await` keyword.


    Calling an asynchronous method using `await` creates a so-called suspension point.
    While the function is suspended, the runtime can reuse the thread it was executing
    on to perform other code in your application.


    You can imagine this like being on a call with a call center agent, and being
    told to "hold the line": while you''re listening to some more or less entertaining
    elevator music, you can continue doing other business, such as drinking a tea,
    daydreaming about your next vacation, or chatting with other people in your room.
    Once the call center agent has finished looking up that important information,
    you''ll give them all your attention, essentially resuming the flow of conversation
    that was suspended when they told you to hang on for a second.


    ## Calling Asynchronous Code


    To call asynchronous code, we need to be in an asynchronous context. As we saw
    in the previous chapter, there are several ways to establish an asynchronous context.
    Creating a new `Task` is one of them:


    ```

    Task {

    let result = search(for: "Swift")

    }

    ```


    While this is easy enough, it would be tedious to have to write this again and
    again in our UI-facing code. Fortunately, Apple has updated SwiftUI to make calling
    asynchronous code from inside a UI context as easy as possible. In particular,
    they''ve added some APIs that allow us to call asynchronous code:


    - When a view appears (using the `.task` view modifier)

    - When the user pulls to refresh inside a `List` view


    For other situations, we will still need to create an asynchronous context ourselves,
    for example:


    - When the user taps on a `Button`

    - When the user types a search term inside the search bar of a `View`


    In the following sections, we will look at some scenarios to see each of these
    ways to call asynchronous code in action.


    ## The Task View Modifier


    One of the most common situations for fetching data is when a view appears on
    screen. Previously, you might have used the `.onAppear` view modifier to run code
    when your views appear. When you try to call asynchronous code from within `.onAppear`,
    the compiler will issue an error saying that it is not permitted to call asynchronous
    code from a nonasynchronous context:


    ![Figure 15-1](images/509862_1_En_15_Chapter/509862_1_En_15_Fig1_HTML.png)


    A snippet of a program code has the text Invalid conversion error from a sync
    function of type above the code.


    To fix this compile-time error, we could wrap the code in a new `Task`, like this:


    ```

    struct WordDetailsView: View {

    ...

    var body: some View {

    List {

    ...

    }

    .navigationTitle(word)

    .onAppear {

    Task {

    await viewModel.executeQuery(for: word)

    }

    }

    }

    }

    ```


    While this works well, it is a bit verbose, and there is actually a better solution:
    because fetching data when a view appears is such a common scenario, SwiftUI has
    a new view modifier that will automatically create a new `Task` *and* cancel it
    when the view disappears:


    ```

    struct WordDetailsView: View {

    ...

    var body: some View {

    List {

    ...

    }

    .navigationTitle(word)

    .task {

    await viewModel.executeQuery(for: word)

    }

    }

    }

    ```


    This makes our code much more concise and easier to read.'
