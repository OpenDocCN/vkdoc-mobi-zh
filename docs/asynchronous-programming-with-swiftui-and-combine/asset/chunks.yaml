- fmt: "# When calling functions on a slow resource, blocking the caller is not an\
    \ option in most cases\n\nOn most operating systems, the UI runs on the main thread,\
    \ and blocking a call will result in the UI to become unresponsive and freeze.\
    \ iOS might even terminate your app if it doesn’t respond within a certain amount\
