    \                }\n            }\n        }\n    }\n\n    private func searchBooks(matching\
    \ searchTerm: String) async -> [Book] {\n        // ...\n    }\n}\n```\n\n在 `Task`\
    \ 内部，我们还通过根据进程的当前状态更新视图模型的 `isSearching` 已发布属性来处理进度视图的状态。\n\n在应用的此部分基于 Combine\
    \ 的版本中，我们使用了 `map` 和 `switchToLatest` 的组合，以确保我们只接收最新用户输入的结果。这对于网络请求尤其重要，因为它们可能会乱序返回。\n\
    \n为了使用 `async/await` 实现相同的功能，我们需要使用协作式任务取消^(¹²⁷)：我们将对任务的引用保存在 `searchTask` (1)\
    \ 中，并在启动新任务 (3) 之前取消任何可能正在运行的任务 (2)。\n\n由于 `searchBooks` 被标记为 `async`，Swift 运行时可以决定在非主线程上执行它。然而，在\
    \ `executeQuery` 中，我们希望通过设置已发布的属性 `result` (5) 和 `isSearching` (4, 6) 来更新 UI。为了确保它运行在主线程上，我们必须使用\
    \ `@MainActor` 属性 (7) 来标记它。\n\n作为最后一步，我们需要对 UI 进行一个微小但重要的更改：由于我们无法将一个异步方法订阅到一个已发布的属性，我们需要找到另一种方法，以便在用户在搜索字段中输入每个字符时调用\
    \ `executeQuery`。\n\n事实证明，Apple 在最最新版本的 SwiftUI 中添加了一个合适的视图修饰符——`onReceive(_ publisher:)`。这个视图修饰符允许我们注册一个闭包，当给定的发布者发出事件时，该闭包将被调用：\n\
    \n```\nList(viewModel.result) { book in\n    BookSearchRowView(book: book)\n}\n\
    .searchable(text: $viewModel.searchTerm)\n.onReceive(viewModel.$searchTerm) {\
    \ searchTerm in\n    Task {\n        await viewModel.executeQuery()\n    }\n}\n\
    ```\n\n总的来说，使用 `async/await` 需要我们做更多的工作，而且很容易出错，比如搞错协作式任务取消，或者忘记一个重要步骤，比如取消任何可能仍在运行的任务。就开发者体验而言，Combine\
    \ 比 `async/await` 遵循更声明式的方法：你告诉框架要 *做什么*，而不是 *怎么做*。\n"
- fmt: "# Calling Asynchronous Code from Combine\n\nIn the previous section, I claimed\
    \ that we cannot subscribe to a Combine publisher using `async/await`. But is\
    \ this actually true? Let’s see if we can implement a smart way to combine `async/await`\
    \ and Combine.\n\nThe following snippet shows a view model that uses a Combine\
    \ pipeline that calls an asynchronous version of the `searchBooks` method:\n\n\
    ```\nfileprivate class ViewModel: ObservableObject {\n    // MARK: - Input\n \
    \   @Published var searchTerm: String = \"\"\n    // MARK: - Output\n    @Published\
    \ private(set) var result: [Book] = []\n    @Published var isSearching = false\n\
    \    \n    init() {\n        $searchTerm\n            .debounce(for: 0.8, scheduler:\
    \ DispatchQueue.main) // (1)\n            .removeDuplicates()                \
    \                // (2)\n            .handleEvents(receiveOutput: { output in\
    \           // (3)\n                self.isSearching = true\n            })\n\
    \            .flatMap { value in\n                Future { promise in\n      \
    \              Task {\n                        let result = await self.searchBooks(matching:\
    \ value)\n                        promise(.success(result))\n                \
    \    }\n                }\n            }\n            .receive(on: DispatchQueue.main)\n\
    \            .eraseToAnyPublisher()\n            .handleEvents(receiveOutput:\
    \ { output in           // (4)\n                self.isSearching = false\n   \
    \         })\n            .assign(to: &$result)                              //\
    \ (5)\n    }\n    \n    private func searchBooks(matching searchTerm: String)\
    \ async -> [Book] {\n        let escapedSearchTerm = searchTerm\n            .addingPercentEncoding(withAllowedCharacters:\
    \ .urlHostAllowed) ?? \"\"\n        let url = \n            URL(string: \"https://openlibrary.org/search.json?q=\\\
    (escapedSearchTerm)\")!\n        do {\n            let (data, _) = \n        \
    \        try await URLSession.shared.data(from: url)\n            let searchResult\
    \ = \n                try OpenLibrarySearchResult.init(data: data)\n         \
    \   guard let libraryBooks = searchResult.books else {\n                return\
    \ []\n            }\n            return libraryBooks.compactMap { Book(from: $0)\
    \ }\n        } catch {\n            return []\n        }\n    }\n}\n```\n\nThis\
    \ approach allows us to tap into the power of Combine to improve the user experience\
    \ with just a few lines of code:\n\n- By using the `debounce` operator (1), we\
    \ can hold off on sending search requests over the network until the user has\
    \ stopped typing for a second. This means we will consume less bandwidth (good\
    \ for the user) and cause fewer API calls (good for us, esp. when calling APIs\
    \ that might be billed).\n- We can further reduce the number of requests by removing\
    \ any duplicate API calls using the `removeDuplicates` operator (2).\n\nThere\
    \ are also some advantages on the code level:\n\n- By using the `handleEvents`\
    \ operator (3, 4), we can extract the code for handling the progress view from\
    \ the `map` and `sink` operators. This also allows us to replace the `sink`/`store`\
    \ combo by a much simpler and easier to use `assign` subscriber.\n- There is only\
    \ one place (5) in which we assign the result of the pipeline to the `result`\
    \ property, reducing the chances to introduce subtle programming errors.\n\nAt\
    \ the same time, we can use the advantages of `async/await` when writing network\
    \ access code: being able to read the code from top to bottom in a linear way\
    \ makes it a lot easier to understand than code that makes use of callbacks or\
    \ nested closures.\n\nLet’s take a closer look at the code that allows us to call\
    \ an asynchronous method from a Combine pipeline:\n\n```\nsomePublisher\n    .flatMap\
    \ { value in\n        Future { promise in\n            Task {\n              \
    \  let result = await self.searchBooks(matching: value)\n                promise(.success(result))\n\
    \            }\n        }\n    }\n```\n\nTo call the asynchronous version of `searchBooks`,\
    \ we need to establish an asynchronous context. This is why we wrap the call in\
    \ a `Task`. Once `searchBook` returns, we resolve the promise by sending the result\
    \ as a `.success` case value.\n\nWe can simplify this code by extracting the relevant\
    \ part into an extension on `Publisher`:\n\n```\nextension Publisher {\n    ///\
    \ Executes an asynchronous call and returns its result to the downstream subscriber.\n\
    \    ///\n    /// - Parameter transform: A closure that takes an element as a\
    \ parameter and returns a publisher that produces elements of that type.\n   \
    \ /// - Returns: A publisher that transforms elements from an upstream  publisher\
    \ into a publisher of that element's type.\n    func `await`(_ transform: @escaping\
    \ (Output) async -> T) -> AnyPublisher {\n        flatMap { value -> Future in\n\
    \            Future { promise in\n                Task {\n                   \
    \ let result = await transform(value)\n                    promise(.success(result))\n\
    \                }\n            }\n        }\n        .eraseToAnyPublisher()\n\
    \    }\n}\n```\n\nThis allows us to call an asynchronous method using the following\
    \ code:\n\n```\nsomePublisher\n    .await { searchTerm in\n        await self.searchBooks(matching:\
    \ searchTerm)\n    }\n```\n\n## Summary\n\nThe seeming lack of attention Apple\
    \ paid to Combine at WWDC 2021 resulted in a lot of confusion and uncertainty\
    \ in the community—should you invest into learning Combine in the light of all\
    \ the attention Apple put on `async/await`?\n\nTo answer this question, we need\
    \ to take a step back and understand the value propositions of Combine and `async/await`.\n\
    \nAt a cursory glance, they seem to address the same use case: asynchronously\
    \ calling APIs. However, when looking closer, it becomes clear that they are very\
    \ different indeed:\n\nCombine is a reactive framework, with the notion of a stream\
    \ of events that you transform using operators before consuming them with a subscriber.\
    \ This side-effect-free way of programming makes is easier to ensure your app\
    \ is always in a consistent state. In fact, SwiftUI’s state management system\
    \ makes heavy use of Combine—every `@Published` property is, as the name implies,\
    \ a publisher, making it easy to connect a Combine pipeline.\n\n`Async/await`,\
    \ on the other hand, aims at making asynchronous programming and handling concurrency\
    \ easier to implement and reason about. While this makes it easier to create a\
    \ linear control flow, it doesn’t offer the same guarantees about state as Combine\
    \ does.\n\nMy recommendation is to use whichever of the two makes the most sense\
    \ in any given situation. For any UI-related task, I personally prefer using Combine,\
    \ as it gives us unprecedented power and flexibility when implementing otherwise\
    \ difficult-to-implement aspects like debouncing user input, combining multiple\
    \ input streams into one, and efficiently handling out-of-order execution of network\
    \ requests.\n\nCombine and `async/await` are two different kinds of tools in our\
    \ tool belt, and it is our responsibility to use them wisely and according to\
    \ their intended purpose.\n\nMy recommendation is to use Combine for UI-related\
    \ features in your app that needs to deal with handling input from a number of\
    \ sources. Some examples are as follows:\n\n- Input validation: Validating multiple\
    \ input fields, making sure the user filled in all the mandatory fields, handling\
    \ interfield dependencies (e.g., selecting credit card payment requires you to\
    \ fill out the card number, but pay by invoice requires you to provide an additional\
    \ address for the invoice)\n- Searching and filtering: Making sure to search and\
    \ filter based on the latest values the user entered in the search bar, along\
    \ with any filter criteria they selected\n- Cleaning up user input before it reaches\
    \ your data layer: For example, making sure you don’t hit your API endpoint for\
    \ every single character the user types, or to remove duplicate queries, to make\
    \ your network layer more efficient (and consume less bandwidth)\n\nOn the other\
    \ hand, you might find using `async/await` easier to use than Combine when calling\
    \ asynchronous APIs, making network requests, or interfacing with BaaS platforms\
    \ like Firebase.\n\nAnd finally, as you saw in this chapter, combining `async/await`\
    \ and Combine is possible, allowing you to mix and match the best aspects of both\
    \ approaches."
  raw: '## Calling Asynchronous Code from Combine


    In the previous section, I claimed that we cannot subscribe to a Combine publisher
    using `async/await`. But is this actually true? Let’s see if we can implement
    a smart way to combine async/await and Combine.


    The following snippet shows a view model that uses a Combine pipeline that calls
    an asynchronous version of the `searchBooks` method:


    ```

    fileprivate class ViewModel: ObservableObject {

    // MARK: - Input

    @Published var searchTerm: String = ""

    // MARK: - Output

