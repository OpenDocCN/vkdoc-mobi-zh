  trans: "\n# 在慢速资源上调用函数时，大多数情况下阻塞调用方是不可行的\n\n在大多数操作系统中，用户界面运行在主线程上，阻塞调用会导致界面无响应和卡顿。如果应用在特定时间内没有响应，iOS\
    \ 甚至可能会终止你的应用。^(¹¹¹) 我们都经历过这种情况，这绝非良好的用户体验。在服务器上阻塞调用会导致生成更多线程来处理可能的其他请求，从而引发`线程爆炸`，^(¹¹²)\
    \ 并导致服务器资源迅速耗尽。同样，如果服务器无法生成更多线程，它将无法处理传入的请求，导致 HTTP `503`（*服务不可用*）错误消息。\n\n因此，我们需要一种在应用中处理异步操作的方法。接下来，我们将探讨如何使用不同的技术实现异步代码。我们将使用的示例是一个生产手工三明治的简易三明治店。^(¹¹³)\n\
    \n通用算法如下：\n\n* 烘烤面包。\n* 切片其他食材（黄瓜、洋葱、西红柿）。\n* 面包烤好后，\n  * 在面包上涂抹酱料。\n* 将食材堆叠在一片面包上。\n\
    * 在上面放上生菜。\n* 盖上另一片面包。\n* 将三明治包裹好，交给顾客。\n\n你会注意到，其中一些步骤需要顺序执行，而另一些则可以并行进行。例如，在烘烤面包时，我们无需干等——可以趁机切蔬菜。\n\
    \n*本章的代码可以在本书的 GitHub 仓库^(¹¹⁴) 中找到，位于第 14 章^(^(509862_1_En_14_Chapter.xhtml))\
    \ 的文件夹内。在该文件夹中，你会找到一个 `.playground` 文件。请在 Swift Playgrounds 应用^(¹¹⁵) 中打开此文件，并展开项目导航器（`CMD+1`）和调试控制台（`CMD+Shift+Y`），以便更轻松地在各个示例之间导航。*\n\
    \n![](img/509862_1_En_14_Fig1_HTML.png)\n\n一个软件页面的截图，展示了开始使用 async await playground\
    \ 的界面。左侧面板列出了页面和源代码。页面显示了笔记和目录。\n\n**图 14-1** Swift Playgrounds 应用中的 playground\n\
    \n## 使用函数的同步编程\n\n首先，让我们看看三明治制作算法的同步实现：\n\n```swift\npublic func customerSays(_\
    \ message: String) {\n    print(\"[Customer] \\(message)\")\n}\n\npublic func\
    \ sandwichMakerSays(_ message: String, waitFor time: UInt32 = 0) {\n    print(\"\
    [Sandwich maker] \\(message)\")\n    if time > 0 {\n        print(\"         \
    \        ... this will take \\(time)s\")\n        sleep(time)\n    }\n}\n\nfunc\
    \ makeSandwich(bread: String, ingredients: [String], condiments: [String]) ->\
    \ String {\n    sandwichMakerSays(\"Preparing your sandwich...\")\n    let toasted\
    \ = toastBread(bread)\n    let sliced = slice(ingredients)\n    sandwichMakerSays(\"\
    Spreading \\(condiments.joined(separator: \", and \")) on \\(toasted)\")\n   \
    \ sandwichMakerSays(\"Layering \\(sliced.joined(separator: \", \"))\")\n    sandwichMakerSays(\"\
    Putting lettuce on top\")\n    sandwichMakerSays(\"Putting another slice of bread\
    \ on top\")\n    return \"\\(ingredients.joined(separator: \", \")), \\(condiments.joined(separator:\
    \ \", \")) on \\(toasted)\"\n}\n\nfunc toastBread(_ bread: String) -> String {\n\
    \    sandwichMakerSays(\"Toasting the bread... Standing by...\", waitFor: 5)\n\
    \    return \"Crispy \\(bread)\"\n}\n\nfunc slice(_ ingredients: [String]) ->\
    \ [String] {\n    let result = ingredients.map { ingredient in\n        sandwichMakerSays(\"\
    Slicing \\(ingredient)\", waitFor: 1)\n        return \"sliced \\(ingredient)\"\
    \n    }\n    return result\n}\n\n//: The main program follows\nsandwichMakerSays(\"\
    Hello to Cafe Synchronous, where we execute your order serially.\")\nsandwichMakerSays(\"\
    Please place your order.\")\n\n// We're using a `ContinuousClock` to determine\
    \ how long it took to make the sandwich.\nlet clock = ContinuousClock()\nlet time\
    \ = clock.measure {\n    let sandwich = makeSandwich(bread: \"Rye\", ingredients:\
    \ [\"Cucumbers\", \"Tomatoes\"], condiments: [\"Mayo\", \"Mustard\"])\n    customerSays(\"\
    Hmmm.... this looks like a delicious \\(sandwich) sandwich!\")\n}\n\n// This should\
    \ be roughly 7 seconds (5 for toasting, and 1 for each ingredient we sliced)\n\
    print(\"Making this sandwich took \\(time)\")\n```\n\n主要工作^(¹¹⁶) 发生在 `makeSandwich`\
    \ 函数中，它接受一些参数，让顾客告诉我们面包类型、食材和酱料。\n\n所有步骤都是顺序执行的，即使是一些耗时步骤，例如烘烤面包。烘烤面包通过休眠几秒来模拟。这会有效地阻塞线程，`toastBread`\
    \ 函数只有在 5 秒过后才会返回调用方。\n\n该程序的输出如下：\n\n```\n[Sandwich maker] Hello to Cafe Synchronous,\
    \ where we execute your order serially.\n[Sandwich maker] Please place your order.\n\
    [Sandwich maker] Preparing your sandwich...\n[Sandwich maker] Toasting the bread...\
    \ Standing by...\n... this will take 5s\n[Sandwich maker] Slicing Cucumbers\n\
    ... this will take 1s\n[Sandwich maker] Slicing Tomatoes\n... this will take 1s\n\
    [Sandwich maker] Spreading Mayo, and Mustard on Crispy Rye\n[Sandwich maker] Layering\
    \ sliced Cucumbers, sliced Tomatoes\n[Sandwich maker] Putting lettuce on top\n\
    [Sandwich maker] Putting another slice of bread on top\n[Customer] Hmmm.... this\
    \ looks like a delicious Cucumbers, Tomatoes, Mayo, Mustard on Crispy Rye sandwich!\n\
    Making this sandwich took 7.00992275 seconds\n```\n\n由于我们串行执行了所有步骤，整个程序耗时约 7 秒（烘烤\
    \ 5 秒，切西红柿和黄瓜各 1 秒）。\n\n这个版本的算法易于编写和理解，因为它遵循线性流程——一条语句接一条语句。当我们调用一个函数时，我们知道程序只有在函数返回后才会继续主流程。\n\
    \n这对于我们编写的大部分代码来说都很好，但一旦我们需要处理异步 API，基于前面提到的原因，使用阻塞调用就不再可行了。\n"
- fmt: '# Asynchronous Programming with Closures


    The initial versions of Swift didn’t include any language-level, first-class concurrency
    features. This was in fact a conscious decision by the core team (see the Swift
    Concurrency Manifesto^([^(117)](#fn117))), so developers had to come up with other
    ways to deal with asynchronous code.


    A common way to implement code that needs to run asynchronously is to use GCD
    (Grand Central Dispatch) together with closures. *Closures* are self-contained
    blocks of functionality that can be passed around and used in your code.^([^(118)](#fn118))
    Closures are typically used to implement callbacks and completion handlers, and
    this makes them a great fit for handling asynchronous code: once a long-running
    process has finished, we can use the closure to pass the result back to the caller.


    When using a closure, the `toastBread` function from the previous section would
    like this:


    ```

    func toastBread(_ bread: String,

    completion: (String) -> Void) {

    sandwichMakerSays("Toasting the bread... Standing by...", waitFor: 5)

    completion("Crispy \(bread)")

    }

    ```


    To call this method, you’ll have to update the call site like this:


    ```

    toastBread(bread, completion: { toasted in

    print("\(bread) is now \(toasted)")

    // prints "Rye is now Crispy Rye"

    })

    ```


    When you compare this to the original version of the function, you will notice
    a couple of things:


    1.  The `toastBread` function no longer has a return value.

    2.  Instead, there is now an additional parameter `completion` with a somewhat
    more complicated looking signature.

    3.  `completion: (String) -> Void)` means that the completion parameter takes
    a function as an input value. This function expects one parameter of type `String`
    and does not return any value (i.e., `Void`).

    4.  When the `toastBread` function is ready to return the result of its operation
    to the caller, it invokes the closure by calling completion and passing in a `String`.

    5.  At the call site, we pass in a closure that has the signature expected by
    the `completion` parameter.


    When dealing with asynchronous code, closures are most commonly used as *trailing
    closures*. This is a Swift language feature which allows us to simplify the call
    site:


    ```

    toastBread(bread) { toasted in

    print("\(bread) is now \(toasted)")

    }

    ```


    So far, our code isn’t really asynchronous yet; the only thing that has changed
    is how we return the result to the caller.


    Let’s update the `toastBread` and `slice` functions to run asynchronously on the
    global dispatch queue by wrapping their body inside a call to `DispatchQueue.global().async
    { }`:


    ```

    func toastBread(_ bread: String,

    completion: @escaping (String) -> Void)

    {

    DispatchQueue.global().async {

    sandwichMakerSays("Toasting the bread... Standing by...",

    waitFor: 5)

    completion("Crispy \(bread)")

    }

    }

    func slice(_ ingredients: [String],

    completion: @escaping ([String]) -> Void)

    {

    DispatchQueue.global().async {

    let result = ingredients.map { ingredient in

    sandwichMakerSays("Slicing \(ingredient)", waitFor: 1)

    return "sliced \(ingredient)"

    }

    completion(result)

    }

    }

    ```


    At the call site, we can now use the completion handler semantics. Since we want
    to call `slice` only once the call to `toastBread` has finished, we need to nest
    them, like this:


    ```

    toastBread(bread) { toasted in

    slice(ingredients) { sliced in

    sandwichMakerSays("Spreading \(condiments.joined(separator: ", and ")) om \(toasted)")

    // ...

    }

    }

    print("This code will be executed *before* the bread is toasted and the ingredients
    are sliced.")

    ```


    One reason why we might want to run `toastBread` and `slice` asynchronously on
    the global thread might be that we’re calling separate subsystems of our app to
    perform those operations, or that we need to access a remote server to fulfill
    this functionality.


    Using closures for handling asynchronous code is a well-established practice,
    and both Apple’s own APIs and many third-party SDKs such as Firebase make use
    of this approach.


    That doesn’t mean that it is perfect. In fact, there are many problems with using
    closures for handling asynchronous behavior in our apps:


    **It is easy to end up in a pyramid of doom**. This refers to the fact that you
    have to nest any code that depends on the result of a call inside a closure. In
    our example, we only had to go two levels deep, but have a look at this example
    from the Swift Concurrency Manifesto^([^(119)](#fn119)):


    ```

    func processImageData1(completionBlock: (result: Image) -> Void) {

    loadWebResource("dataprofile.txt") { dataResource in

    loadWebResource("imagedata.dat") { imageResource in

    decodeImage(dataResource, imageResource) { imageTmp in

    dewarpAndCleanupImage(imageTmp) { imageResult in

    completionBlock(imageResult)

    }

    }

    }

    }

    }

    ```


    This is a typical example for code that needs to call several asynchronous APIs,
    passing the result from one call to the next.


    If you turn the code sideways, you will see why this is called *pyramid of doom*.
    Compare this with the linear code from our first example, and you will understand
    why this kind of code will be much harder to understand.


    **Error handling will make the code even harder to read**. Here is the same code
    snippet from the Swift Concurrency Manifesto, with error handling added:


    ```

    func processImageData2(completionBlock: (result: Image?, error: Error?) -> Void)
    {

    loadWebResource("dataprofile.txt") { dataResource, error in

    guard let dataResource = dataResource else {

    completionBlock(nil, error)

    return

    }

    loadWebResource("imagedata.dat") { imageResource, error in

    guard let imageResource = imageResource else {

    completionBlock(nil, error)

    return

    }

    decodeImage(dataResource, imageResource) { imageTmp, error in

    guard let imageTmp = imageTmp else {

    completionBlock(nil, error)

    return

    }

    dewarpAndCleanupImage(imageTmp) { imageResult in

    guard let imageResult = imageResult else {

    completionBlock(nil, error)

    return

    }

    completionBlock(imageResult)

    }

    }

    }

    }

    }

    ```


    Not only is this code a long more verbose, it also requires the caller to check
    if the callback returned a result or an error. This is easy to forget, and unfortunately,
    the compiler cannot enforce this kind of error handling at the call site.


    **It is not always clear which thread a callback is on**. Callers of `toastBread`
    and `slice` have no way of telling which thread they will be called back on—unless
    they have access to the source code, or the documentation of the functions specifically
    mentions the threading model being used. Callers can solve this by wrapping those
    invocations inside a call to `DispatchQueue.main.async { }`, but this might lead
    to thread hopping if you call several functions that run on different threads.


    **There is no way to enforce a completion handler be called**. This is particularly
    problematic for callers. Can they expect that the completion handler will be called
    at all? Will it be called more than once? How will errors be handled? Will the
    callback receive an error handle? Apple provides some guidelines in their documentation,^([^(120)](#fn120))
    but it is impossible for the compiler to make any guarantees about them. This
    makes building good APIs more difficult than it should be.


    Overall, using closures will inevitably result in code that is convoluted, hard
    to read, and error prone.


    ## Asynchronous Programming with async/await


    Swift’s new concurrency model, introduced with Swift 5.5, makes asynchronous programming
    a lot easier. It introduces a number of language-level concepts (most prominently
    the `async/await` keywords) that allow us to make the asynchronous nature of our
    code explicit. This allows the compiler to perform some compile-time checking,
    which helps us write better, more error-free programs.


    In the remainder of this chapter, we will take a look at some of the new concepts
    and refactor the closure-based code to an `async/await`–based implementation that
    is easier to read and maintain.'
