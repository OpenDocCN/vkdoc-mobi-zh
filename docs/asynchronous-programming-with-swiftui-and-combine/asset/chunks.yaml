    Putting another slice of bread on top\")\n    return \"\\(ingredients.joined(separator:\
    \ \", \")), \\(condiments.joined(separator: \", \")) on \\(toasted)\"\n}\n```\n\
    \nNotice how we can call `toastBread` and `slice` without having to use nested\
    \ closures. This results in straight-line code that almost reads like normal,\
