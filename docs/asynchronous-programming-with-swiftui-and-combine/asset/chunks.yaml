- fmt: '通过使用容器视图，我们可以满足`View`协议的要求，即从`body`计算属性返回*单个*`View`。我们将在本章后面进一步讨论容器视图。


    你可能好奇为什么返回类型是`some View`，而不是简单的`View`，以及为什么`body`的返回类型不能直接是`View`。


    在组合视图时（如前面的示例所示），具体的返回类型取决于各个视图的类型及其排列顺序。例如，在前面代码片段中，我们从`body`属性返回的视图类型是`HStack<TupleView<(Image,
    ModifiedContent<Text, _PaddingLayout>)>>`。更改视图的顺序将导致不同的类型：将`Image`放在`Text`之后会将结果类型更改为`HStack<TupleView<(ModifiedContent<Text,
    _PaddingLayout>, Image)>>`。


    显然，这有点冗长繁琐，而`some`关键字就派上了用场：它将类型转换为所谓的*不透明类型*。这意味着编译器仍然能够访问底层具体类型（例如`HStack<TupleView<(Image,
    ModifiedContent<Text, _PaddingLayout>)>>`），但模块的客户端看不到这一点^([^(31)](#fn31))——他们只能看到返回值的协议。


    这意味着：通过将视图的`body`结果作为`some View`返回，调用方只会看到一个视图，而不会了解该视图的具体结构。因此，我们可以使用常规类型名称来引用自定义类型（对于前面的代码片段：`ContentView`），而不必使用从`body`属性返回的视图结构的具体类型（对于前面的代码片段：`HStack<TupleView<(Image,
    ModifiedContent<Text, _PaddingLayout>)>>`）。


    ### 用户界面视图


    `SwiftUI`提供了广泛的视图，涵盖了iOS、iPadOS、macOS、watchOS和tvOS中常见的大部分UI元素，例如`Text`、`Image`、`Button`、`TextField`等。


    这些视图是构建应用程序UI的基本构建块。您还可以使用这些构建块创建自己的自定义组件，就像我们在第[2](#509862_1_En_2_Chapter.xhtml)章中创建的用于显示书籍封面和标题的`List`行一样。


