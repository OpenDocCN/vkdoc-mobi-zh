    \ BookEditViewModel\n    @Environment(\\.dismiss) var dismiss\n    // ...\n  \
    \  func cancel() {\n        dismiss()\n    }\n    func save() {\n        // (添加代码以更新绑定)\n\
    \        dismiss()\n    }\n    var body: some View {\n        NavigationStack\
    \ {\n            Form {\n                // ...\n            }\n            .navigationTitle(bookEditViewModel.book.title)\n\
    \            .toolbar {\n                ToolbarItem(placement: .navigationBarLeading)\
    \ {\n                    Button(action: cancel) {\n                        Text(\"\
    取消\")\n                    }\n                }\n                ToolbarItem(placement:\
    \ .navigationBarTrailing) {\n                    Button(action: save) {\n    \
    \                    Text(\"保存\")\n                    }\n                }\n\
    \            }\n        }\n    }\n}\n```\n\n通过从环境中引入 `dismiss` 操作，我们能够在用户点击任一按钮时以编程方式关闭\
    \ `BookEditView`。\n\n> *注意：如果你想阻止用户关闭对话框，可以使用* `interactiveDismissDisabled()`\
    \ *视图修饰符。*\n\n有了这个基础，我们现在可以实现对绑定的处理。为此，我们需要将绑定添加到视图中，然后在初始化器中使用它来创建视图模型：\n\n```swift\n\
    struct BookEditView: View {\n    @Binding var book: Book\n    @ObservedObject\
    \ var bookEditViewModel: BookEditViewModel\n    @Environment(\\.dismiss) var dismiss\n\
    \n    init(book: Binding<Book>) {\n        self._book = book\n        self.bookEditViewModel\
    \ = BookEditViewModel(book: book.wrappedValue)\n    }\n    // ...\n}\n```\n\n\
    通过使用下划线，我们可以将初始化器中接收到的绑定赋值给 `book` 属性（该属性本身是一个 `Binding<Book>`）。\n\n然后，通过使用绑定的\
    \ `wrappedValue` 创建视图模型，我们将底层值对象传递给视图模型，并在视图模型中使用 `@Published` 属性包装器将其转换为发布者。\n\
    \n将用户的任何更改发送回调用方（在本例中为 `BookDetailsView`）的缺失环节是更新 `save` 函数：\n\n```swift\nfunc\
    \ save() {\n    self.book = bookEditViewModel.book\n    dismiss()\n}\n```\n\n\
    这将从视图模型中获取更新后的 `Book` 并将其赋值回绑定。这会导致*数据源*被更新，并且该更新将反映在整个应用程序中。\n\n![](img/509862_1_En_6_Fig9_HTML.png)\
    \  \n一张图表展示了书架应用、书籍列表视图、书籍行视图、书籍详情视图和书籍编辑视图的流程。书籍视图模型通过一条带双向箭头的虚线连接到书籍编辑视图。\n\n\
    **图 6-9** 使用 `@ObservedObject` 和 `@Binding` 更新局部和全局数据源\n\n## 使用 Combine 执行表单验证\n\
    \n在最后一步中，我们将使用 Combine 来改进验证逻辑。\n\n目前，验证逻辑存在于视图模型中的一个计算属性中：\n\n```swift\nclass\
    \ BookEditViewModel: ObservableObject {\n    @Published var book: Book\n    var\
    \ isISBNValid: Bool {\n        checkISBN(isbn: book.isbn)\n    }\n\n    init(book:\
    \ Book) {\n        self.book = book\n    }\n}\n```\n\n虽然这确实有效，但不太理想：只有当 SwiftUI\
    \ 接收到视图所订阅的已发布属性的事件时，它才会更新视图。\n\n由于 `isISBNValid` 不是一个 `@Published` 属性，它在更新时不会发送任何通知。那么，视图为何仍然能更新并正确反映该属性的状态呢？事实上，这只是巧合：每当\
    \ `book`（或其任何属性）被更新时，视图模型都会发送一个更新事件。碰巧 ISBN 也是 `Book` 的一个属性，因此当你编辑书籍的 ISBN 时，`book`\
    \ 会发送一个事件，导致 SwiftUI 重新渲染。在此过程中，它还会重新渲染 `VStack`，该 `VStack` 会根据 `isISBNValid`\
    \ 属性的状态有条件地显示错误消息。\n\n为了使这一点更加可靠而非依赖巧合，让我们使用 Combine 来计算 `isISBNValid` 的状态。\n\n\
    首先，将 `isISBNValid` 变成一个已发布的属性：\n\n```swift\nclass BookEditViewModel: ObservableObject\
    \ {\n    @Published var book: Book\n    @Published var isISBNValid: Bool = true\n\
    \    // ...\n}\n```\n\n然后，在初始化器中，我们可以订阅 `book` 发布者发送的任何更改。这些事件将包含 `book` 属性的当前值。为了确定书籍当前的\
    \ ISBN 是否有效，我们将 `map` 作用于 `book` 值，验证其 ISBN，并将结果 `Bool` 值赋值给 `isISBNValid` 属性：\n\
    \n```swift\ninit(book: Book) {\n    self.book = book\n    self.$book\n       \
    \ .map { book in\n            return checkISBN(isbn: book.isbn)\n        }\n \
    \       .assign(to: &$isISBNValid)\n}\n```\n\n得益于隐式返回和隐式参数，我们可以进一步精简 `map` 闭包：\n\
    \n```swift\nself.$book\n    .map { checkISBN(isbn: $0.isbn) }\n    .assign(to:\
    \ &$isISBNValid)\n```\n\n至此，我们为数据驱动应用实现了一个功能完整的下钻导航，其中包含一个用于验证表单输入的简单 Combine\
    \ 管道。\n\n## 总结\n\n在本章中，你看到了在 SwiftUI 中构建基于表单的用户界面是多么容易。通过使用 `Form` 视图，SwiftUI\
    \ 会调整常规视图，使其匹配我们在 iOS 设置界面中熟悉的样式和感觉。SwiftUI 的 DSL 在此处真正发挥了其优势，你可以看到 SwiftUI 团队如何利用\
    \ DSL 的能力，让开发者能够快速构建灵活且功能丰富的用户界面。\n\n在研究了静态表单之后，我们深入探讨了如何使用 SwiftUI 的状态管理工具为数据驱动应用构建下钻导航——这是你在许多应用中都会找到的一种用户界面模式。\n\
    \n最后，我们实现了一个简单的业务逻辑来验证表单输入。通过使用视图模型，我们得以封装此逻辑并避免污染视图。使用视图模型为我们的下钻导航带来了一些挑战，但我们通过同时使用\
    \ `@Binding` 和 `@ObservableObject` 克服了这些挑战，从而允许用户编辑数据，同时赋予他们改变主意并取消所做更改的灵活性。得益于\
    \ Combine 的使用，我们能够以一种与 SwiftUI 兼容的方式实现这一点。\n\n虽然内容颇多，但这仅仅是个开始！在下一章中，我们将探讨函数式响应式编程，了解它为何如此出色，以及它与\
    \ Combine 的关系！\n\n脚注 1\n\n# 第二部分\n\n# 7. 初识 Combine\n\n现在，我们在前几章中已经使用了一点 Combine，希望它们在结合\
    \ SwiftUI 用户界面的上下文中足够容易理解。但你可能想知道 Combine 究竟是如何工作的，以及 SwiftUI 响应式状态管理系统幕后发生了什么。在本章中，我们将深入探讨\
    \ Combine，你将了解其基本原理，以及它为何能与 SwiftUI 如此完美地结合。\n\n> *本章代码片段对应的源代码可以在本书的 GitHub 仓库中找到。*^(⁵¹)\n"
- fmt: '# What Is Functional Reactive Programming?


    Everything that happens in our computers can be thought of as an event—users tapping
    on a button, time passing, an API request returning some value, a network request
    failing. Most of these events happen asynchronously, which makes dealing with
    them challenging.


    There are several ways to deal with asynchronous behavior. As iOS developers,
    we are well accustomed to using delegates and callbacks, but they have several
    drawbacks and result in code that is all over the place and hard to reason about.


    Reactive programming is another way to deal with this situation. The basic idea
    in reactive programming is that everything is an event, and these happen asynchronously.
    Events are sent by an event source, and interested parties can register to receive
    certain events. More often than not, these streams of events need to be transformed
    to make them more useful for the respective subscriber.


    There are numerous implementations of reactive programming. The most well known
    is probably Reactive Extensions (ReactiveX^([^(52)](#fn52))), “an API for asynchronous
    programming with observable streams.” The beauty of ReactiveX is that it is available
    for a wide range of platforms and languages: Java,^([^(53)](#fn53)) JavaScript,^([^(54)](#fn54))
    C#,^([^(55)](#fn55)) Kotlin,^([^(56)](#fn56)) Swift,^([^(57)](#fn57)) and more.^([^(58)](#fn58))


    Apple introduced Combine as their take on reactive programming at WWDC 2019, and
    it is pretty similar to `RxSwift`. The main reason to use Combine over `RxSwift`
    is that it is more deeply integrated into Apple’s platforms. It works especially
    well with `SwiftUI`, so if you’re targeting iOS 13 or higher (which is the minimum
    target platform for both Combine and SwiftUI), you should take a closer look.


    > Combine is a unified, declarative API for processing values over time.


    Combine defines three main concepts to implement the idea of reactive programming:


    1.  Publishers

    2.  Subscribers

    3.  Operators


    **Publishers** deliver values over time, and **subscribers** act on these values
    as they receive them. **Operators** sit in the middle between publishers and subscribers
    and can be used to manipulate the stream of values.


    Let’s take a closer look.


    # Publishers


    As the name suggests, publishers emit values over time. To signal error conditions,
    publishers may also publish errors. Each publisher defines which kinds of values
    and errors (if any) it publishes.


    The most basic publisher is `Just`—it emits just one value and never fails:


    ```

    Just(42)

    ```


    ![](images/509862_1_En_7_Chapter/509862_1_En_7_Fig1_HTML.jpg)


    A line segment has the number 42 entered inside a circle on the left of the line.
    A table on the right has data on output as i n t and failure as never.


    **Figure 7-1** A publisher that emits a single value


    Sending a single value is certainly useful in many situations, but most of the
    time, we’ll want to send several values. Combine makes it easy to turn almost
    anything into a publisher. For example, here is how you would turn an array of
    the ten most popular^([^(59)](#fn59)) pizza toppings^([^(60)](#fn60)) into a publisher:


    ```

    ["Pepperoni", "Mushrooms", "Onions", "Sausage", "Bacon", "Extra cheese", "Black
    olives", "Green peppers"].publisher

    ```


    ![](images/509862_1_En_7_Chapter/509862_1_En_7_Fig2_HTML.jpg)


    A line segment has elements labeled on 3 blocks as pepperoni, mushrooms, and onions.
    A table on the right has data on output as string and failure as never.


    **Figure 7-2** A publisher that emits a number of pizza toppings and then terminates


    Using simple values or sequences as publishers might seem a bit boring, but it
    is definitely something that comes in handy later when we need to compose pipelines
    from multiple Combine publishers.


    Time to spice it up a bit!


    Let’s imagine we’re building a pizza ordering app. Here is some code that creates
    an order and sets up a publisher. This particular publisher will emit events whenever
    `NotificationCenter` sends a notification named `.didUpdateOrderStatus` to the
    `pizzaOrder` object.


    ```

    // create the order

    let pizzaOrder = Order()

    let pizzaOrderPublisher = NotificationCenter

    .default

    .publisher(for: .didUpdateOrderStatus, object: pizzaOrder)

    ```


    When the user wants to place the order, a different part of the app will use `NotificationCenter`
    to send this notification. This might be called when the user taps on the *Place
    order* button.


    ```

    // once the user is ready to place the order

    NotificationCenter

    .default

    .post(name: .didUpdateOrderStatus,

    object: pizzaOrderPublisher,

    userInfo: ["status": OrderStatus.processing])

    ```


    If you run this code, nothing will happen—this is because publishers will only
    start to emit events once a subscriber has been registered with the publisher.
    So let’s now take a look at subscribers.


    # Subscribers


    Subscribers receive values from the upstream publisher they are subscribed to.
    Each subscriber defines which types of values and errors it is willing to receive.


    The Combine framework comes with two main subscribers that are extremely versatile—`sink`
    and `assign`.


    * `sink` is the most generic one; you can use it to receive values from a Combine
    publisher and then execute whatever code you like inside its closure.

    * `assign` lets you assign any received values to a property or to another `Publisher`.


    In the earlier examples, the publishers didn’t really do anything. Let’s use `sink`
    to subscribe to the list of most popular pizza toppings and print the emitted
    values to the console.


    ```

    ["Pepperoni", "Mushrooms", "Onions", "Salami", "Bacon", "Extra cheese", "Black
    olives", "Green peppers"]

    .publisher

    .sink { topping in

    print("\(topping) is a popular topping for pizza")

    }

    ```


    You will notice I’ve taken the liberty to replace *Sausage* with *Salami*…


    Coming back to our pizza ordering example, here is how you can subscribe to the
    `pizzaOrderPublisher` and print any order status updates:


    ```

    // create the order

    let pizzaOrder = Order()

    let pizzaOrderPublisher = NotificationCenter

    .default.publisher(for: .didUpdateOrderStatus, object: pizzaOrder)

    pizzaOrderPublisher.sink { notification in

    print(notification)

    }

    // once the user is ready to place the order

    NotificationCenter

    .default

    .post(name: .didUpdateOrderStatus,

    object: pizzaOrder,

    userInfo: ["status": OrderStatus.processing])

    ```


    Printing values to the console is all nice and dandy, but let’s take it one step
    further and assign the order status to the order. To do so, we will use the `assign`
    subscriber.^([^(61)](#fn61))


    A first attempt at assigning the order status to the status field on our pizza
    order might look like this:


    ```

    pizzaOrderPublisher

    .assign(to: \.status, on: pizzaOrder)

    ```


    However, this code doesn’t compile. Instead, the compiler issues an error: `Key
    path value type ''OrderStatus'' cannot be converted to contextual type ''NotificationCenter.Publisher.Output''
    (aka ''Notification'')`


    ![](images/509862_1_En_7_Chapter/509862_1_En_7_Fig3_HTML.png)


    An output screen has 3 lines of codes and a notification box with text that reads
    key path value type as order status that cannot be converted to contextual type
    as notification center dot publisher dot output.


    **Figure 7-3** `pizzaOrderPublisher` emits `Notification`, but `OrderStatus` was
    expected


    This is because `pizzaOrderPublisher` emits `Notification` values, but the property
    status is of type `OrderStatus`. We somehow need to extract the `OrderStatus`
    from the `UserInfo` dictionary on the `Notification`.


    To convert values from upstream publishers, Combine provides a concept named **Operators**.'
