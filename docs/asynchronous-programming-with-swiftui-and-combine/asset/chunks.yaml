    \ 5 codes selected with warnings under library view dot swift on the pane on the\
    \ right.](images/509862_1_En_15_Chapter/509862_1_En_15_Fig6_HTML.png)\n\n**Figure\
    \ 15-6.** Back in `refresh`, still on the background thread\n\nResume one more\
    \ time, until the debugger hits the second breakpoint in the closure of the `refreshable`\
    \ view modifier, and we’re back on the main thread!\n\n![A screenshot of the Word\
    \ Browser window has 0 closure hashtag 2 in library view dot body dot getter selected\
