- fmt: '# 2. Getting Started with SwiftUI


    In the previous chapter, you’ve learned about the basic principles of SwiftUI
    and some of the reasons why Apple implemented a new UI framework when they already
    had a number of UI toolkits that work perfectly fine. We also took a whirlwind
    tour of SwiftUI and the tooling Xcode provides for building SwiftUI apps.


    In this chapter, we’re going to dive deeper into using SwiftUI. The best way to
    learn is by doing, so we will be building a simple app that might turn out to
    be useful for you.


    We will look at using simple SwiftUI views such as `Text` and `Image` and how
    to use stacks to build both simple and more complex UIs by composing simple UI
    elements into reusable views.


    SwiftUI puts a strong focus^([^(20)](#fn20)) on building reusable UI components,
    so we will take some time to understand how this works and which tools Xcode provides
    to make this easy. Composing views and decomposing them into reusable components
    is a central concept of developing SwiftUI apps and will help you to write code
    that is easy to manage and maintain.


    Later in this chapter, we will start looking at how to build `List` views, which
    are a staple in many iOS apps.


    Throughout the chapter, we will be working with *Views*, *View Modifiers*, and
    *Property Wrappers*. At the end of the chapter, you will have learned what these
    are and how they work together to make SwiftUI a magical experience.


    ## What We’re Going to Build


    The sample app we’re going to build in this chapter will display a list of books,
    including their title, author name, and the book cover.


    To keep things simple, we will focus on the UI aspects and leave the data access
    layer for a later moment. So instead of fetching book data from a remote API,
    we’ll define a static array of books and retrieve the book covers from the app’s
    asset catalog.


    Drawing on what you’ve learned in Chapter [1](#509862_1_En_1_Chapter.xhtml), we’ll
    start by putting together a view for displaying a book’s cover, its title, author,
    and some other details.


    ![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig1_HTML.png)


    A screenshot has text that reads, Changer, by Matt Gemmell, 476 pages. A cover
    of the book is given on the left.


    Figure 2-1


    A view for displaying details about a book


    In the next step, we will use this custom view inside a list view to display multiple
    books as a list.


    ![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig2_HTML.png)


    A mobile screen displays the details of four books, their authors, and the covers.
    1. Changer, by Matt Gemmell, 476 pages. 2. SwiftUI for Absolute Beginners, by
    Jayant Varma, 200 pages. 3. Asynchronous Programming with SwiftUI and Combine,
    by Peter Friese, 367 pages. 4. Modern Concurrency on Apple Platforms, by Andy
    Ibanez, 368 pages.


    Figure 2-2


    The app we’re going to build in this chapter


    Finally, we will refactor the code to make it more reusable. In this step, you
    will learn about the *pyramid of doom* and how to avoid it by composing your UI
    of many small, use case–specific components.


    Let’s get started!


    ## Composing a View for Displaying a Book


    To help you get started, I’ve prepared a starter project for this chapter that
    already contains some book covers and a simple data model for books.


    Clone the GitHub repository that accompanies this book^([^(21)](#fn21))


    *   Navigate into the folder for the starter project for this chapter

    *   Open the project in Xcode.


    In the project’s `Model` folder, you will find `Book.swift`, which contains the
    `Book` struct that defines the data model for this app.


    ```

    struct Book {

    var title: String

    var author: String

    var isbn: String

    var pages: Int

    }

    ```


    The same file contains an extension on `Book` with a few computed properties that
    will make it easier to determine the names of the cover images for each book.


    ```

    extension Book {

    var smallCoverImageName: String { return "\(isbn)-S" }

    var mediumCoverImageName: String { return "\(isbn)-M" }

    var largeCoverImageName: String { return "\(isbn)-L" }

    }

    ```


    And finally, there is a global constant `sampleBooks` that contains a collection
    of sample books—this allows us to display some demo data without having to fetch
    data from an API.


    ```

    extension Book {

    static let sampleBooks = [

    Book(title: "Changer", author: "Matt Gemmell", isbn: "9781916265202", pages: 476),

    Book(title: "SwiftUI for Absolute Beginners", author: "Jayant Varma", isbn: "9781484255155",
    pages: 200),

    Book(title: "Asynchronous Programming with SwiftUI and Combine", author: "Peter
    Friese", isbn: "9781484285718", pages: 367),

    Book(title: "Modern Concurrency on Apple Platforms", author: "Andy Ibanez", isbn:
    "9781484286944", pages: 368)

    ]

    }

    ```


    The app’s asset catalog contains cover images for the books defined in `sampleBooks`—as
    you can see, they’re provided in three different sizes: small, medium, and large.


    ![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig3_HTML.png)


    A screenshot of the Bookshelf window has Assets.xcassets selected from the panel
    on the left. The Assets.xcassets tab has a cover selected for a book. And the
    options for the image set are given on the right.


    Figure 2-3


    The asset catalog contains cover images for the books in the sample array


    The app’s entry point is defined in `BookShelfApp.swift`—this is where you instantiate
    the main view your users will see when they launch the app.


    ```

    import SwiftUI

    @main

    struct BookShelfApp: App {

    var body: some Scene {

    WindowGroup {

    ContentView()

    }

    }

    }

    ```


    This main view, `ContentView`, can be found in `ContentView.swift`, and this is
    where we will spend most of our time for the rest of this chapter.


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    Whenever you create a new SwiftUI view using Xcode, it will create a file looking
    similar to this one, so it’s worth taking a closer look at the anatomy of a SwiftUI
    `View`.


    The preceding code snippet creates a new struct named `ContentView`, which conforms
    to the `View` protocol. The name of the view is `ContentView`, so it can be instantiated
    like this: `ContentView()`.


    Inside the view, you will notice one property, named `body`. The type of the property
    is `some View`. If you’ve developed in Swift before, you might be wondering what’s
    the meaning of `some`. The short answer is that this denotes a so-called *opaque
    return type*, which indicates that `body` returns a value of type `View`.


    `body` has a significant role in SwiftUI—inside, you will define how the view
    looks like. In this code snippet, the view contains just a simple `Text` view
    that displays “Hello, world”, but later in this chapter, you will learn how to
    compose more complex layouts by assembling several views inside the `body` property.


    The second structure in this source code file is named `ContentView_Previews`
    and conforms to `PreviewProvider`. This is a special construct SwiftUI uses to
    display a preview of your view in the Preview Canvas on the right side of the
    Xcode window. Later on in this chapter, you will learn how to modify the preview
    to display your view in light mode and dark mode.'
