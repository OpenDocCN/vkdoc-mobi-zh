    # 4. State Management


    SwiftUI is different from many other UI toolkits you might have worked with before:
    you cannot manipulate the UI views directly. Any changes you see on screen are
    determined by the state of the application’s data model and its transitions. You
    might have heard “in SwiftUI, the view is a function of the application’s state.”


    What does this mean, and why is this such a big deal?


    Imperative UI toolkits suffer from one very big flaw: they allow developers to
    update model and view independently. This often results in inconsistent states
    and partial updates. You’ve probably used apps before that exhibit this behavior.
    For example, you make a change in a details screen, but this change isn’t reflected
    on the main screen.^([^(36)](#fn36))


    The designers of SwiftUI decided to choose a different approach: a view in SwiftUI
    is either static, or it displays information that is driven by a model element.
    It is impossible to manipulate a SwiftUI view directly. The data that determines
    the state of the UI is called *Source of Truth* and there can only be one source
    of truth for each UI element.


    This results in deterministic states and consistent user interfaces.


    SwiftUI provides a number of ways to manage state in your application. In this
    chapter, we’re going to learn about the different techniques and discuss their
    benefits and when to use them.


    To give you a better understanding of this complex topic, we’re going to look
    at a few real-world scenarios and discuss the state management patterns you can
    use in each scenario.


    ## Managing State in SwiftUI


    SwiftUI views are structs, which means they are value types. One of the major
    reasons for choosing value types for defining the UI of your app is that when
    copying a value type, you can be sure no other part of the app is changing the
    data under the covers.^([^(37)](#fn37)) As we will later see, the body of a view
    is a computed property, making it impossible for developers to accidentally modify
    a view directly.


    However, updating the UI is a crucial feature for almost any app, so how can we
    build apps that dynamically update their UI?


    SwiftUI provides two complementary tools that ensure you can freely manage and
    update your data model, while making sure the UI is always in sync with the data
    model.


    Both mechanisms build upon *property wrappers*.


    The first one helps you to define your data model in such a way that it is capable
    of publishing its state.


    And secondly, SwiftUI manages the state of the UI for you in a memory area that
    only SwiftUI has control over.


    SwiftUI therefore allows you to define your data model in an easy-to-build and
    reusable way. By making UI updates *unidirectional*, SwiftUI relieves you from
    the burden of having to make sure to always update the view and the model at the
    same time.


    Let’s first look at the different ways on how you can connect your data model
    to your app’s user interface.


    SwiftUI provides several ways for storing and passing data around. Which one is
    most appropriate depends on which part of your app owns the data, whether you’re
    working with value types or objects, and whether the view requires read/write
    access or read-only access to the data.'
