    \ can be called on any SwiftUI `View`. They are implemented as extensions on the\
    \ `View` protocol, which means you can call them on any `View`—both built-in views\
    \ like `Text` or `Image` and also on your own custom views.\n\nLet’s take a closer\
    \ look to understand how they work.\n\n### Configuring Views\n\nTo modify the\
    \ appearance or behavior of a view, just call one of SwiftUI’s built-in view modifiers\
    \ on the view instance. For example, here is how you can change the foreground\
    \ color of a `Text` view to red:\n\n```\nText(\"Hello World\")\n    .foregroundColor(.red)\n\
    ```\n\nBy calling a modifier on a view, the modifier will create a new view that\
    \ wraps the original view, and replaces it in the view hierarchy. For example,\
    \ the type of the modified `Text` view will be `ModifiedContent<Text, _PaddingLayout>`.\n\
    \nYou can apply multiple view modifiers to the same view to change multiple aspects\
    \ of its appearance. For example, to change the font of the text in addition to\
    \ its foreground color, just call the `font` view modifier:\n\n```\nText(\"Hello,\
