  trans: "\n### 一切皆是视图——但并非如此\n\n一旦你开始用 SwiftUI 构建用户界面，你会很快注意到所有 UI 元素都被称为 `View`——甚至一个屏幕也被视为一个\
    \ `View`！人们很容易认为所有这些视图都等同于 `UIView`（或其相应的子类）。事实上，SwiftUI 可能会选择使用 `UIView` 的某个子类来渲染你\
    \ UI 的某些部分。但值得注意的是，当 SwiftUI 谈论 `View` 时，它并非指屏幕上 UI 元素的特定实例，而是指对该元素的*描述*。\n\n\
    实际上，如果 SwiftUI 团队决定说“一切皆是视图描述”，可能会更容易理解——当然，这样就不那么朗朗上口了。\n\n### UI 是状态的一种函数\n\n\
    构建 UI 时最大的挑战之一，是确保 UI 始终反映底层数据模型的状态。过去，开发者必须使用各种工具和机制来确保模型的任何变化都能反映到 UI 中，反之亦然。针对这一挑战，人们设计出了多种架构模式：MVC（模型-视图-控制器）、MVVM（模型-视图-视图模型）、MVP（模型-视图-展示器）、VIPER（视图-交互器-展示器-实体-路由）等。而\
    \ SwiftUI 则决定将状态管理直接内置到框架中。在 SwiftUI 中，UI 是模型状态的一种函数。这一点值得牢记。\n\n*在 SwiftUI 中，UI\
    \ 是模型状态的一种函数*\n\n要更新 UI，你不再需要直接操作单个 UI 组件。相反，你将 UI 元素绑定到底层模型。每次更改模型上的属性时，SwiftUI\
    \ 都会刷新绑定到该属性的 UI 元素，确保 UI 和模型始终同步。\n\n这也意味着，意外忘记更新 UI 的某些部分变得非常困难：所有绑定到底层模型的 UI\
    \ 部分都会由 SwiftUI 自动为你更新。\n\n## SwiftUI 快速入门\n\n为了更好地理解 SwiftUI 及其工作原理，让我们构建一个传统的“Hello\
    \ World”示例应用。但这一次，我们不只是显示“Hello World”，而是利用 SwiftUI 内置的状态管理功能，按你的名字来打招呼。\n\n通过这个简短教程，你将学会如何：\n\
    \n- 在 Xcode 中创建一个新的 SwiftUI 项目\n- 使用代码编辑器和`属性`检查器，对 UI 进行双向更改\n- 使用 SwiftUI 的简单状态管理功能，确保\
    \ UI 和模型保持同步\n\n### 先决条件\n\n要学习本教程（以及本书中的所有其他教程），你需要满足以下条件：\n\n- 最新版本的 Xcode（14\
    \ 或更高版本）\n- 一台运行 macOS Monterey 的 Mac 电脑\n\n### 创建一个新的 SwiftUI 应用\n\n1. 启动 Xcode，点击*创建新的\
    \ Xcode 项目*。\n\n![](img/509862_1_En_1_Fig1_HTML.png)\n\n*图 1-1. 在 Xcode 中创建新项目*\n\
    \n2. 确保选择了`iOS`部分，然后选择`App`模板。\n\n![](img/509862_1_En_1_Fig2_HTML.png)\n\n*图 1-2.\
    \ 选择 iOS App 模板*\n\n3. 为你的项目提供一个名称（我选择了`Hello SwiftUI`），并确保设置了以下选项：\n   - 界面：`SwiftUI`\n\
    \   - 生命周期：`SwiftUI App`\n   - 语言：`Swift`\n\n![](img/509862_1_En_1_Fig3_HTML.png)\n\
    \n*图 1-3. 设置项目名称和其他项目选项*\n\n目前，你可以保持*包含测试*选项未被选中。\n\n4. 点击“下一步”，选择保存项目的位置。你可以保留*在我的\
    \ Mac 上创建 Git 仓库*选项，如果愿意也可以取消勾选。\n\n![](img/509862_1_En_1_Fig4_HTML.png)\n\n*图\
    \ 1-4. 选择保存项目的文件夹*\n\nXcode 将为你创建项目，之后你会进入 `ContentView.swift` 的编辑界面：\n\n![](img/509862_1_En_1_Fig5_HTML.png)\n\
    \n*图 1-5. Xcode 源代码编辑器和预览画布*\n\n在编辑器的右侧，你会看到`画布`，它会显示你的 UI 预览。如果它显示“预览已暂停”的消息，请点击“恢复”按钮或按下\
    \ `Option + Command + P`。片刻之后，你将看到 UI 的预览：\n\n![](img/509862_1_En_1_Fig6_HTML.png)\n\
    \n*图 1-6. Xcode 编辑器和 UI 预览*\n\n让我们做一些更改，感受一下 SwiftUI 的双向工具：\n\n- 在代码编辑器中，将问候语文本中的\
    \ world 改为你的名字。例如，对我来说，`\"Hello, world!\"` 就变成了 `\"Hello Peter!\"`。\n- 观察一下，你每输入一个字符，预览都会立即更新——无需编译并重新在手机或模拟器上启动应用。\n\
    \n现在我们来改变文本的外观：\n\n- 确保光标仍在第 16 行（即 `Text(\"Hello, (你的名字)\")` 这一行）。\n- 在`属性`检查器（Xcode\
    \ 窗口的右侧）中，打开`颜色`下拉菜单，选择一种不同的颜色。\n- 观察一下，当你做出更改时，Xcode 会立即在预览画布和代码编辑器中反映出这一变化。\n\
    \n![](img/509862_1_En_1_Fig7_HTML.png)\n\n*图 1-7. 更新后的文本颜色同时反映在编辑器和预览画布中*\n"
- fmt: "Let’s make one more change before we move on:\n\n- In the source code editor,\
    \ `Command + Click` the `Text` view.\n- In the pop-up, choose *Show SwiftUI Inspector.*\n\
    - Xcode will display the inspector in a pop-up window.\n- Change the font from\
    \ *Inherited* to *Title.*\n- Observe how Xcode updates the source code and the\
    \ preview simultaneously.\n\n![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig8_HTML.png)\n\
    \n**Figure 1-8** — Updating the font using the SwiftUI Inspector\n\nCongrats,\
    \ you have just experienced Xcode’s two-way editing tools for SwiftUI! Note that\
    \ you can use any of them at any time. The SwiftUI Inspector is a great tool for\
    \ exploring the attributes and capabilities of SwiftUI’s views. Once you get more\
    \ acquainted with the individual SwiftUI views, you might find it more efficient\
    \ to use the source code editor and its code completion to modify the views directly.\n\
    \nThe modifications you’ve applied to the `Text` view are called *View Modifiers*,\
    \ and we’ll talk about them in more depth in Chapter 3.\n\n### Adding Some Interaction\
    \ to Your App\n\nLet’s add some interactivity to your app—and learn how to use\
    \ the *Xcode Library* along the way!\n\n- Make sure you’re still in the source\
    \ code editor and that the preview pane is still visible.\n- Make the elements\
    \ in the canvas selectable by clicking on the small icon with a mouse pointer\
