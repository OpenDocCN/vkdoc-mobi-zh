    ## 使用预览确保视图按预期工作


    到目前为止，预览窗口都在设备框架内显示视图，导致我们难以判断视图实际占用的空间大小。由于预览画布本身也是一个 SwiftUI 视图，我们可以轻松解决这个问题。


    -   在代码编辑器中，选中预览提供器中的 `ContentView()` 这一行（第 31 行）

    -   在属性检查器中，找到*预览*（Preview）部分的*布局*（Layout）属性，并将其设置为*适应大小*（Size that fits）


    设备框架将消失，预览现在会精确分配视图所需的空间。你会注意到，视图实际占用的空间比我们预期的要小：


    ![左侧显示书籍封面。右侧截图文字为：Asynchronous Programming with Swift U I and Combine, by Peter
    Friese, 451 pages。](img/509862_1_En_2_Fig9_HTML.png)


    **图 2-9** — 书籍详情视图预览过窄


    为了解决这个问题，我们需要在视图的右侧插入一个 `Spacer` 视图。这是一个透明视图，它会扩展以占用周围容器布局方向上的尽可能多的空间。你可以把它想象成一个弹簧，将你的视图推开。


    -   向布局中添加间隔器的最简单方法是使用代码编辑器，在包含 `Text` 视图的 `VStack` 的闭合大括号之后添加 `Spacer()`。


    现在的代码应该如下所示：


    ```swift

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    HStack(alignment: .top) {

    Image("9781484285718-M")

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text("Asynchronous Programming with SwiftUI and Combine")

    .font(.headline)

    Text("by Peter Friese")

    .font(.subheadline)

    Text("451 pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    .previewLayout(.sizeThatFits)

    }

    }

    ```


    在预览中，我们可以看出视图现在占据了`设备`((22))的整个宽度。


    ![左侧显示书籍封面。右侧截图文字为：Asynchronous Programming with Swift U I and Combine, by Peter
    Friese, 451 pages。](img/509862_1_En_2_Fig10_HTML.png)


    **图 2-10** — 书籍详情视图预览宽度正确


    ## 显示书籍列表


    既然我们已经有了显示书籍详情的视图，现在让我们把它变成一个书籍列表。稍后你会看到，这出奇地简单，而且 Xcode 为该过程提供了便利。


    -   在代码编辑器中，*Command+单击*书籍视图外层的 `HStack`。

    -   从弹出菜单中选择*嵌入到列表*（Embed in List）。


    Xcode 将视图包裹在一个列表中，该列表遍历从 0 到 5（不含）的半开区间，从而生成五个书籍视图实例，显示在一个垂直滚动的列表中。稍后，我们会将 `List`
    视图连接到我们的示例书籍数组，以显示比重复显示同一本书更有意义的内容。


    但在那之前，我想提请你注意文本视图的布局。正如你所看到的，书名不再与书籍封面顶部对齐。查看源代码，你可能会注意到，当我们要求 Xcode 将 `HStack`
    包裹在 `List` 中时，之前包裹 `Image` 视图和 `VStack` 的 `HStack` 消失了。虽然你可能会认为这是 Xcode 编辑器的一个错误，但这实际上是设计使然，因为
    `List` 视图包含一个隐式的 `HStack`。然而，由于我们无法修改这个隐式的 `HStack`，我们不得不手动重新插入之前使用的那个 `HStack`。


    ![手机屏幕显示一本书的详细信息、作者和封面为 Swift U I and Combine, by Peter Friese, 367 pages。下方重复显示了三次。](img/509862_1_En_2_Fig11_HTML.png)


    **图 2-11** — 将视图包裹在列表内后布局异常


    有三种方法可以解决这个问题：


    1.  在将额外的 `HStack` 包裹到 `List` 视图*之前*，先将原来的 `HStack(alignment: .top)` 包裹在另一个 `HStack`
    中。

    2.  手动将书籍视图的内部视图包裹在 `HStack(alignment: .top) { ... }` 中。

    3.  不借助 Xcode 的帮助，手动将书籍视图包裹在 `List` 视图中。


    选择哪种方法很大程度上取决于个人偏好，一旦你更熟悉 SwiftUI 的 API 和 Xcode 的特性，你就能很快熟练地选择最高效的方式来构建 UI。


    现在，让我们在 `List` 视图之后立即手动插入 `HStack(alignment: .top) {`，并在 `Spacer()` 之后的下一行插入闭合的
    `}`。


    我们还将在 `List` 视图的闭合大括号后附加 `.listStyle(.plain)`，以将列表显示为普通列表视图。


    你的代码现在应该如下所示：^((23))


    ```swift

    struct ContentView: View {

    var body: some View {

    List(0 ..< 5) { item in

    HStack(alignment: .top) {

    Image("9781484285718-M")

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text("Asynchronous Programming with SwiftUI and Combine")

    .font(.headline)

    Text("by Peter Friese")

    .font(.subheadline)

    Text("367 pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    .listStyle(.plain)

    }

    }

    ```

    '
- fmt: '## Setting Up Data Binding


    Of course, displaying five identical copies of the same book is not what we wanted
    to achieve. Instead, let’s connect the view to the collection of sample books
    defined in `Book.swift`.


    SwiftUI’s `List` view is capable of displaying elements from a `RandomAccessCollection`.
    Conveniently, Swift arrays conform to this protocol, which means we can provide
    an array of `Book` to the book list view.


    Before we can connect the `List` view to the collection of sample books defined
    in `Book.swift`, we need to declare a property on `ContentView` that holds a reference
    to the `sampleBooks` array.


    *   Add `var books: [Book]` to the top of `ContentView`.

    *   Fix the compiler errors by updating the call to `ContentView()` both in the
    preview and in `BookShelfApp` to `ContentView(books: sampleBooks)`.


    We can now connect the `List` view to this new property. First of all, let’s replace
    the closed range `0..<5` with a reference to the `books` property.


    *   Change `List(1..<5)` to `List(books)`.

    *   Rename the closure parameter `item` to `book`.


    The compiler will complain that `Book` is not `Identifiable`. This is because
    `List` needs to be able to identify the elements it displays in order to display
    them in a deterministic order. If the elements weren’t uniquely identifiable,
    the list rows would jump all over the place whenever there is an update to the
    data collection.


    Follow these steps to ensure `Book` conforms to the `Identifiable` protocol:


    *   In `Book.swift`, change `struct Book {` to `struct Book: Identifiable {`.

    *   Add `var id = UUID().uuidString` to the `Book`’s attributes.


    This should fix the compile errors. You might have to compile the code again (press
    `CMD+B`).


    In the next step, we’ll connect the individual UI elements to the respective attributes
    of the `Book` structure.


    *   To display the book cover specified in the current `Book` instance, change
    `Image("9781484285718-M")` to `Image(book.mediumCoverImageName)`.

    *   For the title change the hard-coded strings to `book.title`.

    *   For the author and number of pages, we can make use of string interpolation.
    Replace `"by Peter Friese"` with `"by \(book.author)"` and `"367 pages"` with
    `"\(book.pages) pages"`.


    Finally, let’s change the preview configuration to make sure the list view will
    be displayed in a device frame. To do so, just delete the line `previewLayout(.sizeThaFits)`.


    Your code should now look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    var books: [Book]

    var body: some View {

    List(books) { book in

    HStack(alignment: .top) {

    Image(book.mediumCoverImageName)

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text(book.title)

    .font(.headline)

    Text("by \(book.author)")

    .font(.subheadline)

    Text("\(book.pages) pages")

    .font(.subheadline)

    }

    Spacer()

    }

    .listStyle(.plain)

    }

    }

    }

    ```


    ## Adjusting the Preview Canvas


    To monitor whether the UI looks great in both light mode and dark mode, use the
    *Variants* button in the preview canvas toolbar, and select the *Color Scheme
    Variants* option. The preview canvas will now show the UI in both light and dark
    mode.


    A screenshot of the light and dark mode of a mobile screen side-by-side has the
    details of a book, its authors, and its covers. 1. Changer, by Matt Gemmell, 476
    pages. 2. Swift U I for Absolute Beginners, by Jayant Varma, 200 pages. 3. Asynchronous
    Programming with Swift U I and Combine, by Peter Friese, 451 pages. 4. Modern
    Concurrency on Apple Platforms, by Andy Ibanez, 368 pages. It has the options
    color scheme variants selected at the bottom.


    **Figure 2-12** previewing light and dark mode side by side


    ## Making the Code Reusable


    Before we can finish this chapter and move on to the next topic, we need to talk
    about a critical issue: the *pyramid of doom*.


    The ease with which views can be composed in this way can quickly lead to deeply
    nested code that’s difficult to navigate—hence the term “pyramid of doom.”


    The good news is that SwiftUI comes with a number of mechanisms that allow us
    to decompose view structures into smaller blocks, making our code easier to read
    and maintain:


    *   Extract Subview

    *   Extract to Method

    *   Extract to Property


    Throughout the book, we’ll use several of these techniques, but for now, we’ll
    use the most popular one, *Extract Subview*.'
