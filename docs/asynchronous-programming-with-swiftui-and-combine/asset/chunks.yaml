    \ in which case it runs on the concurrent thread pool.\n\nSo, to solve the issue\
    \ in our code, we can annotate the `refresh` function with `@MainActor`:"
  raw: '## Updating the UI from the Main Thread


    When you run the code we’ve developed so far, you might notice that Xcode issues
    runtime warnings for some parts of our code, for example, the following snippet:


    ![](images/509862_1_En_15_Chapter/509862_1_En_15_Fig2_HTML.png)


    A snippet of a program code has a warning text below that reads. Publishing changes
    from background threads is not allowed, make sure to publish values from the main
    thread on model updates.


    Figure 15-2


    Updating the UI from a background thread


    This code asynchronously fetches a random word from WordsAPI and then assigns
    it to a `@Published` property:


    ```

    class LibraryViewModel: ObservableObject {

    @Published var randomWord = "partially"

    ...

    private func fetchRandomWord() async -> Word {

    let request = buildURLRequest()

    do {

    let (data, response) =

    try await URLSession.shared.data(for: request)

    guard let httpResponse = response as? HTTPURLResponse,

    httpResponse.statusCode == 200 else

    {

    throw WordsAPIError.invalidServerResponse

    }

    let word = try JSONDecoder().decode(Word.self,

    from: data)

    return word

    }

    catch {

    return Word.empty

    }

    }

    func refresh() async {

    let result = await fetchRandomWord()

    randomWord = result.word

    }

    }

    ```


    Why is this a problem?


    To answer this question, let’s first look at the threads our code runs on. There
    are several ways to do this, and we will look at two:


    1.  Using the *Debug Inspector*


    2.  Logging information about the current thread using `Thread.isMainThread`


    Let’s first instrument the code to log information about the current thread it
    is executing on:


    ```

    struct LibraryView: View {

    @StateObject var viewModel = LibraryViewModel()

    // ...

    var body: some View {

    List {

    // ...

    }

    // ...

    .refreshable {

    print("\(#function) is on main thread BEFORE await: \(Thread.isMainThread)")

    await viewModel.refresh()

    print("\(#function) is on main thread AFTER await: \(Thread.isMainThread)")

    }

    // ...

    }

    }

    class LibraryViewModel: ObservableObject {

    // ...

    private func fetchRandomWord() async -> Word {

    print("\(#function) is on main thread: \(Thread.isMainThread)")

    ...

    }

    func refresh() async {

    print("\(#function) is on main thread BEFORE await: \(Thread.isMainThread)")

    let result = await fetchRandomWord()

    randomWord = result.word

    print("\(#function) is on main thread AFTER await: \(Thread.isMainThread)")

    }

    // ...

    }

    ```


    When running the app again, we can observe the following output in the console:


    ```

    body is on main thread BEFORE await: true

    refresh() is on main thread BEFORE await: false

    fetchRandomWord() is on main thread: false

    2022-10-01 16:43:10.043735+0200 WordBrowser[44309:2075098] [SwiftUI] Publishing
    changes from background threads is not allowed; make sure to publish values from
    the main thread (via operators like receive(on:)) on model updates.

    refresh() is on main thread AFTER await: false

    body is on main thread AFTER await: true

    ```


    So it seems like the code starts off on the main thread when the user pulls the
    view down to refresh (after all, this is a user-initiated interaction). However,
    as soon as `refresh()` is called, we’re no longer on the main thread. All non-UI
    code is executed on a background thread, and only once the flow of execution returns
    to the view, will the code resume executing on the main thread (see the last line
    of the log output).


    Let’s now use the *Debug Inspector* to take a closer look at this.


    Set a breakpoint on the five `print` statements and launch the app again. When
    the debugger hits the first breakpoint in the closure of the `refreshable` view
    modifier, you can see that this code is actually executed on the main thread:


    ![](images/509862_1_En_15_Chapter/509862_1_En_15_Fig3_HTML.png)


    A screenshot of the Word Browser window has 0 closure hashtag 2 in library view
    dot body dot getter selected from the panel on the left. It has 2 codes selected
    with warnings under library view dot swift on the pane on the right.


    Figure 15-3


    The closure of the refreshable view modifier is executed on the main thread


    Resume the app, and once it hits the second breakpoint (inside the `refresh()`
    method of the `LibraryViewModel`, the code now executes on a background thread:


    ![](images/509862_1_En_15_Chapter/509862_1_En_15_Fig4_HTML.png)


    A screenshot of the Word Browser window has 0 library view model dot refresh selected
    from the panel on the left. It has 3 codes selected with warnings under library
    view dot swift on the pane on the right.


    Figure 15-4


    The refresh method is executed on a background thread


    Resume again and continue execution until the debugger hits the first breakpoint
    inside `fetchRandomWord`, and observe that we’re still on a background thread.


    ![](images/509862_1_En_15_Chapter/509862_1_En_15_Fig5_HTML.png)


    A screenshot of the Word Browser window has 0 library view model dot fetch random
    word selected from the panel on the left. It has a code selected with 2 warnings
    under library view dot swift on the pane on the right.


    Figure 15-5


    Still executing on the background thread: fetchRandomWord


    Resume again, and after a short while, the third breakpoint is hit—in `refresh()`,
    just where we called out asynchronously to `fetchRandomWord`. The code still runs
    on a background thread.


    ![](images/509862_1_En_15_Chapter/509862_1_En_15_Fig6_HTML.png)


    A screenshot of the Word Browser window has 0 library view model dot refresh selected
    from the panel on the left. It has 5 codes selected with warnings under library
    view dot swift on the pane on the right.


    Figure 15-6


    Back in refresh, still on the background thread


    Resume one more time, until the debugger hits the second breakpoint in the closure
    of the `refreshable` view modifier, and we’re back on the main thread!


    ![](images/509862_1_En_15_Chapter/509862_1_En_15_Fig7_HTML.png)


    A screenshot of the Word Browser window has 0 closure hashtag 2 in library view
    dot body dot getter selected from the panel on the left. It has 3 codes selected
    with warnings on 2 codes under library view dot swift on the pane on the right.


    Figure 15-7


    Back in the closure of the refreshable view modifier, the code continues executing
    on the main thread


    If you compare the call stacks in Figure [15-3](#509862_1_En_15_Chapter.xhtml#Fig3)
    and Figure [15-7](#509862_1_En_15_Chapter.xhtml#Fig7), you will realize that both
    execute on the same thread (Thread 1), but all the other methods executed on different
    threads, so what happened here?


    As mentioned in the previous chapter, Swift’s new concurrency model will use as
    many threads as your computer/phone has cores, and it will execute your code on
    any thread from this pool. In particular, when calling await on the man thread,
    Swift will suspend the current function and continue executing other UI-related
    code on the main thread (to make sure the app feels responsive to the user). Once
    the code we’re awaiting on resumes, it will be running on a different, non-main,
    thread.


    To get your code back to the main thread, there are a couple of strategies:


    *   You can wrap any code that updates the UI in a call to `MainActor.run { }`.


    *   You can mark any functions that update the UI using the `@MainActor` property
    wrapper.


    *   You can mark the entire class that contains code updating the UI using the
    `@MainActor` property wrapper.


    Each one of these strategies is more coarse-grained than the previous one, so
    if you need fine-grained control over which parts of your code run on the main
    thread, use `MainActor.run { }`. On the other hand, by annotating your entire
    view model (which usually is a class conforming to `@ObservableObject`) with `@MainActor`,
    you make sure that all of the code inside runs on the main thread. Unless it is
    called using `await`, in which case it runs on the concurrent thread pool.


    So, to solve the issue in our code, we can annotate the refresh function with
    `@MainActor`:'
  trans: "\n## 从主线程更新 UI\n\n运行我们目前编写的代码时，你可能会发现 Xcode 对部分代码发出了运行时警告，例如以下代码片段：\n\n\
