    # 10. Error Handling in Combine


    As developers, we tend to be a rather optimistic bunch of people. At least that’s
    the impression you get when looking at the code we write—we mostly focus on the
    happy path and tend to spend a lot less time and effort on error handling.


    Even in the previous chapter, we’ve been neglecting error handling. In fact, we’ve
    mostly ignored it: we replaced any errors with a default value, which was OK for
    prototyping our app, but this probably isn’t a solid strategy for any app that
    goes into production.


    In this chapter, let’s take a closer look at how we can handle errors appropriately!


    We will continue working on the sign-up form we started working on in the previous
    chapters. As a reminder, we use Combine to validate the user’s input, and as part
    of this validation, the app also calls an endpoint on the app’s authentication
    server to check if the username the user chose is still available. The endpoint
    will return `true` or `false` depending on whether the name is still available.
    In addition, the server will return the appropriate HTTP status codes and an error
    payload in case anything goes wrong when validating the username.


    ## Error Handling Strategies


    Before we dive deeper into how to handle errors, let’s talk about a couple of
    error-handling strategies and whether they are appropriate in our scenario.


    ### Ignoring the Error


    This might sound like a terrible idea at first, but it’s actually a viable option
    when dealing with certain types of errors under specific circumstances. Here are
    some examples:


    *   The user’s device is *temporarily* offline or there is another reason why
    the app cannot reach the server.


    *   The server is down at the moment, but will be back up *soon*.


    In many cases, the user can continue working offline, and the app can sync with
    the server once the device comes back online. Of course, this requires some sort
    of offline capable sync solution (like Cloud Firestore)^([^(75)](#fn75)).


    It is good practice to provide some user feedback to make sure users understand
    their data hasn’t been synchronized yet. Many apps show an icon (e.g., a cloud
    with an upward pointing arrow) to indicate the sync process is still in progress,
    or a warning sign to alert the user they need to manually trigger the sync once
    they’re back online.


    ### Retrying (with Exponential Backoff)


    In other cases, ignoring the error is not an option. Imagine the booking system
    for a popular event: the server might be overwhelmed by the amount of requests.
    In this case, we want to make sure that the system will not be thrashed by the
    users hitting “refresh” every couple of seconds. Instead, we want to spread out
    the time between retries. Using an exponential backoff strategy is both in the
    user’s and the system’s operator’s best interest: the operator can be sure their
    server will not be overwhelmed even more by users trying to get through by constantly
    refreshing, and the users should eventually get their booking through thanks to
    the app automatically retrying.


    ### Showing an Error Message


    Some errors require the user’s action—for example, if saving a document failed.
    In this case, it is appropriate to show a model dialog to get the user’s attention
    and ask them how to proceed. For less severe errors, it might be sufficient to
    show a toast (an overlay that shows for a brief moment and then disappears).'
  trans: "\n# 整合所有内容\n\n在上一章中，我们实现了一个检查，确保用户名至少包含三个字符。为了验证用户名长度是否达标且仍可使用，我们需要结合 `isUsernameLengthPublisher`\
    \ 和 `isUsernameAvailablePublisher`。就像我们之前做的那样，可以使用 `Publishers.CombineLatest()`\
    \ 来实现这一点。\n\n让我们创建一个新的发布器 `isUsernameValidPublisher`，它用于合并 `isUsernameLengthValidPublisher`\
    \ 和 `isUsernameAvailablePublisher` 发送的事件：\n\n```swift\nenum UserNameValid {\n\
    \    case valid\n    case tooShort\n    case notAvailable\n}\nprivate lazy var\
    \ isUsernameValidPublisher:\n    AnyPublisher =\n{\n    Publishers.CombineLatest(\n\
    \        isUsernameLengthValidPublisher, isUsernameAvailablePublisher\n    )\n\
    \    .map { longEnough, available in\n        if !longEnough {\n            return\
    \ .tooShort\n        }\n        if !available {\n            return .notAvailable\n\
    \        }\n        return .valid\n    }\n    .share()\n    .eraseToAnyPublisher()\n\
    }()\n```\n\n引入 `UserNameValid` 枚举有助于我们向管道的订阅者返回语义明确的结果。\n\n为了使用这个新的发布器，我们需要相应地更新\
    \ `isFormValidPublisher`：\n\n```swift\nprivate lazy var isFormValidPublisher:\n\
    \    AnyPublisher =\n{\n    Publishers.CombineLatest(\n        isUsernameValidPublisher,\n\
    \        isPasswordValidPublisher\n    )\n    .map { ($0 == .valid) && $1 }\n\
    \    .eraseToAnyPublisher()\n}()\n```\n\n## 练习\n\n1.  `isUsernameValidPublisher`\
    \ 效率有些低下：即使用户名太短，它也会向服务器发送请求。尝试通过根据用户名长度来控制管道输出来改进这一点。\n\n2.  改进错误处理。不要将服务器错误映射为用户名不可用，而是让\
    \ `checkUsernameAvailable` 返回一个 `Result`。如果成功，结果应包含 `UserAvailableMessage`，否则包含服务器错误。更新管道逻辑，以便告知用户：由于服务器不可用，我们无法确定用户名是否可用，暂时假定其可用，并在用户实际点击提交按钮时执行最终的可用性检查。\n\
    \n## 总结\n\n在本章中，我向您展示了如何使用 Combine 访问网络，以及如何借此编写相比传统回调驱动代码更易于阅读和维护的线性代码。\n\n我们还探讨了如何通过使用视图模型并将\
    \ Combine 管道附加到 `@Published` 属性上，将发出网络请求的 Combine 管道与 SwiftUI 连接起来。\n\n我们还讨论了\
    \ Combine 如何能更高效地与远程服务器（或实际上任何异步 API）进行通信。\n\n通过使用 `share` 运算符，我们可以为同一个发布器/管道附加多个订阅者，并避免为每个订阅者都运行耗时/昂贵的处理过程。这在访问比进程内模块（如远程服务器或任何涉及\
    \ I/O 的操作）延迟更高的 API 时尤为有用。\n\n`debounce` 运算符允许我们更高效地处理短时间密集发生的事件，例如用户输入。我们不会处理管道中的每一个事件，而是等待输入暂停，然后仅对最新的事件进行操作。\n\
    \n我们可以使用 `removeDuplicates` 运算符来避免处理重复事件。顾名思义，它会移除任何直接相邻的重复事件，例如当用户添加字符后又删除字符时（这也适用于我们同时使用\
    \ `debounce` 运算符的情况）。\n\n总之，这些运算符可以帮助我们构建更高效的客户端，用于访问远程服务器和其他异步 API。\n\n我们需要花更多时间研究的事情是如何妥善处理错误和其他意外情况。在本章中，我们使用\
    \ `replaceError(with:)` 将所有错误替换为 `nil` 值。这帮助我们解决了燃眉之急，但在实际应用中，我们需要一种更灵活的方式来处理错误。在下一章中，我们将讨论几种实现方法。\n\
    \n脚注 1 2\n\n# 10. Combine 中的错误处理\n\n作为开发者，我们往往是一群相当乐观的人。至少从我们编写的代码中能看出这种倾向——我们大多数时候关注的是常规路径（happy\
    \ path），而在错误处理上花的时间和精力要少得多。\n\n即使在上一章中，我们也一直在忽略错误处理。事实上，我们基本上忽视了它：我们用默认值替换了所有错误，这对于应用的原型开发来说还可以，但对于任何投入生产的应用来说，这可能不是一个可靠的策略。\n\
    \n在本章中，让我们深入探讨一下如何恰当地处理错误！\n\n我们将继续处理前几章开始构建的注册表单。提醒一下，我们使用 Combine 来验证用户的输入，作为验证的一部分，应用还会调用认证服务器上的一个端点来检查用户选择的用户名是否仍然可用。该端点会根据名称是否仍然可用，返回\
    \ `true` 或 `false`。此外，如果验证用户名时出现任何问题，服务器将返回相应的 HTTP 状态码和一个错误负载。\n\n## 错误处理策略\n\
    \n在我们深入探讨如何处理错误之前，先来讨论几种错误处理策略，以及它们是否适用于我们的场景。\n\n### 忽略错误\n\n乍一听这似乎是个糟糕的主意，但在特定情况下处理某些类型的错误时，这实际上是一个可行的选择。以下是一些例子：\n\
    \n*   用户的设备*暂时*离线，或者有其他原因导致应用无法连接到服务器。\n*   服务器此刻宕机，但*很快*会恢复上线。\n\n在许多情况下，用户可以继续离线工作，一旦设备重新上线，应用就可以与服务器同步。当然，这需要某种支持离线的同步解决方案（如\
    \ Cloud Firestore）^( [75]^(#fn75) )。\n\n最佳实践是向用户提供一些反馈，确保他们理解自己的数据尚未同步。许多应用会显示一个图标（例如，带向上箭头的云朵）来表示同步过程仍在进行中，或者显示一个警告标志，提醒用户需要在上线后手动触发同步。\n\
    \n### 重试（带指数退避）\n\n在其他情况下，忽略错误是不可行的。想象一下热门活动的预订系统：服务器可能会被大量的请求压垮。在这种情况下，我们希望确保系统不会因为用户每隔几秒钟就点击“刷新”而崩溃。相反，我们希望分散重试之间的时间间隔。使用指数退避策略符合用户和系统运营者的最佳利益：运营者可以确保他们的服务器不会因为用户不断刷新页面试图通过而承受更多压力，而用户由于应用自动重试，最终应该能够成功预订。\n\
    \n### 显示错误消息\n\n某些错误需要用户采取行动——例如，如果文档保存失败。在这种情况下，显示一个模态对话框来吸引用户的注意力并询问他们如何进行下一步操作是合适的。对于不太严重的问题，显示一个弹出提示（一种短暂出现然后消失的覆盖层）可能就足够了。\n"
- fmt: '### Replacing the Entire View with an Error View


    Under some circumstances, it might even be appropriate to replace the entire UI
    with an error UI. A well-known example for this is Chrome—if the device is offline,
    it will display the Chrome Dino to let users know their device is offline, and
    to help them spend the time until their connection restores with a fun jump-and-run
    game.


    ![](images/509862_1_En_10_Chapter/509862_1_En_10_Fig1_HTML.png)


    A screenshot of the Chrome Dino game. It has a dinosaur and a cactus in the path
    with a cloud above. The text at the top right reads, H I 00047 00034.


    Figure 10-1


    *The Chrome Dino game*


    ### Showing an Inline Error Message


    This is a good option in case the data the user has provided isn''t valid. Not
    all input errors can be detected by a local form validation. For example, an online
    store might have a business rule that mandates shipments worth more than a certain
    amount must be shipped using a specific transport provider. It''s not always feasible
    to implement all of these business rules in the client app (a configurable rules
    engine definitely might help here), so we need to be prepared to handle these
    kinds of semantic errors.


    Ideally, we should show those kind of errors next to the respective input field
    to help the user provide the correct input.


    ## Typical Error Conditions and How to Handle Them


    To give you a better understanding of how to apply this in a real-world scenario,
    let''s add some error handling to the sign-up form we created earlier in this
    series. In particular, we''ll deal with the following error conditions:


    - Device/network offline

    - Semantic validation errors

    - Response parsing errors/invalid URL

    - Internal server errors


    > *If you want to follow along, you will find the code for this chapter in the
    GitHub repository*^([^(76)](#fn76)) *for the book, in the folder for this chapter.
    The* *server* *subfolder contains a local server that helps us simulate all the
    error conditions we will cover.*


    ### Implementing a Fallible Network API


    In the previous chapter, we implemented an `AuthenticationService` that interfaces
    with an authentication server. This helps us to keep everything neatly organized
    and separated by concerns:


    - The view (`SignUpScreen`) displays the state and takes the user''s input.

    - The view model (`SignUpScreenViewModel`) holds the state the view displays.
    In turn, it uses other APIs to react to the user''s actions. In this particular
    app, the view model uses the `AuthenticationService` to interact with the authentication
    server.

    - The service (`AuthenticationService`) interacts with the authentication server.
    Its main responsibilities are to bring the server''s responses into a format that
    the client can work with. For example, it converts JSON into Swift structs, and
    (most relevant for this post) it handles any network-layer errors and converts
    them into UI-level errors that the client can better work with.


    The following diagram provides an overview of how the individual types work together.


    ![](images/509862_1_En_10_Chapter/509862_1_En_10_Fig2_HTML.png)


    A flowchart of the sign-up screen followed by view model, authentication service
    and server through a user name and J S O N response.


    Figure 10-2


    *The components making up the sign-up form*


    If you take a look at the code we wrote in the previous chapter, you will notice
    that the `checkUserNamerAvailablePublisher` has a failure type of `Never`—that
    means it claims there is never going to be an error.


    ```

    func checkUserNameAvailablePublisher(userName: String) -> AnyPublisher { ... }

    ```


    That''s a pretty bold statement, especially given network errors are really common!
    We were only able to guarantee this because we replaced any errors with a return
    value of `false`:


    ```

    func checkUserNameAvailablePublisher(userName: String)

    -> AnyPublisher {

    guard let url = URL(string: "http://127.0.0.1:8080/isUserNameAvailable?userName=\(userName)")
    else {

    return Just(false).eraseToAnyPublisher()

    }

    return URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    .replaceError(with: false)

    .eraseToAnyPublisher()

    }

    ```


    To turn this rather lenient implementation into something that returns meaningful
    error messages to the caller, we first need to change the failure type of the
    publisher, and stop glossing over any errors by returning `false`:


    ```

    enum APIError: LocalizedError {

    /// Invalid request, e.g., invalid URL

    case invalidRequestError(String)

    }

    struct AuthenticationService {

    func checkUserNameAvailablePublisher(userName: String)

    -> AnyPublisher {

    guard let url =

    URL(string: "http://127.0.0.1:8080/isUserNameAvailable?userName=\(userName)")
    else {

    return Fail(error: APIError.invalidRequestError("URL invalid"))

    .eraseToAnyPublisher()

    }

    return URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    //      .replaceError(with: false)

    .eraseToAnyPublisher()

    }

    }

    ```


    We also introduced a custom error type, `APIError`. This will allow us to convert
    any errors that might occur inside our API (be it network errors or data mapping
    errors) into a semantically rich error that we can handle more easily in our view
    model.'
