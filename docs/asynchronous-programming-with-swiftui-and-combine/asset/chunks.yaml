    \ = \"\\(error.localizedDescription)\"\n                            return nil\n\
    \                        }\n                    }\n                }\n       \
    \ }\n    }\n}\n```\n\n通过让 `BookListViewModel` 遵循 `ObservableObject` 协议，并使用 `@Published`\
    \ 属性包装器标记 `books` 属性，我们可以将 SwiftUI 的 `List` 视图连接到该属性，并确保每当收到更新时 UI 都会刷新。\n\n```\n\
    struct LiveBooksListViewWithClosures: View {\n    @StateObject private var viewModel\
    \ = BookListViewModel()\n    \n    var body: some View {\n        List(viewModel.books)\
    \ { book in\n            Text(book.title)\n        }\n        .onAppear {\n  \
    \          viewModel.subscribe()\n        }\n        .onDisappear {\n        \
    \    viewModel.unsubscribe()\n        }\n    }\n}\n```\n\n仅用几行代码，我们就构建了一个 UI，当有人对数据进行更改时，它会自动刷新——无论这个更改发生在前端还是后端。\n\
    \n但我们还能做更多！例如，假设我们想要显示图书数量，并确保当有人在 Cloud Firestore 中向 `books` 集合添加新书时，UI 上的这个数字能够更新。\n\
    \n请记住，已发布属性会暴露一个 Combine 发布者。我们可以通过该属性的*投影值*（此处为 `$books`）访问这个发布者。这允许我们创建一个 Combine\
    \ 管道来确定图书数量。使用 `assign(to:)` 订阅者，我们可以将结果分配给另一个发布者，然后将其连接到 UI 以显示一个始终最新的数字。设置此类\
    \ Combine 管道的合适位置是在视图模型的初始化器中。\n\n```\nprivate class BookListViewModel: ObservableObject\
    \ {\n    @Published var books = [Book]()\n    @Published var numberOfBooks = 0\n\
    \    ...\n    init() {\n        $books.map { books in\n            books.count\n\
    \        }\n        .assign(to: &$numberOfBooks)\n    }\n    ...\n}\n```\n\n###\
    \ 使用 Combine 封装 API\n\n这是在结合使用 Combine 的 SwiftUI 应用中集成数据源最常用的方法，并且效果非常好。然而，它相当冗长，需要大量样板代码。\n\
    \n与其显式设置快照监听器，不如看看我们是否可以将代码封装到 Combine 发布者中，以便用更具声明性的方式调用它。\n\n回顾我们迄今讨论过的代码，可以看到我们有两种不同类型的调用：\n\
    \n-   获取单个文档、集合中的所有文档或查询结果属于所谓的单次调用：我们发起调用来获取一个文档（或集合/查询中的所有文档），然后使用回调处理程序接收调用的结果。\n\
    \n-   监听单个文档、集合或查询的更新则不同：我们不会只收到一次调用的结果，而是每次有更新时都会收到一个新的快照。我们接收到的是一个更新流。这听起来与\
    \ Combine 的定义非常相似：\n\n> *Combine 框架提供了一个声明式 Swift API，用于处理随时间变化的值。*^(⁹¹)\n\n让我们看看能否实现我们自己的发布者来处理这些事件流！\n\
    \n然而，Apple 积极劝阻开发者不要使用 Combine 的低层级原语（例如 `Publisher`、`Subscription` 和 `Subscriber`）来实现自己的发布者。\n\
    \n## 创建你自己的发布者\n\n与其自己实现 `Publisher`^(⁹²) 协议，不如通过使用 Combine 框架提供的几种类型之一来创建你自己的发布者：\n\
    \n-   使用 `Subject`^(⁹³) 的具体子类，例如 `PassthroughSubject`^(⁹⁴)，通过调用其 `send(_:)`^(⁹⁵)\
    \ 方法按需发布值。\n\n-   使用 `CurrentValueSubject`^(⁹⁶)，在更新主体的底层值时进行发布。\n\n-   将 `@Published`\
    \ 注解添加到你自己的某个类型的属性上。这样做之后，该属性会获得一个发布者，每当属性值发生变化时，该发布者就会发出事件。参见 `Published`^(⁹⁷)\
    \ 类型以了解此方法的示例。\n\n因此，与其从头构建发布者，不如遵循 Apple 的建议，使用 Combine 更高级别的构建块（如 `PassthroughSubject`\
    \ 和 `Future`）来创建我们的自定义发布者。\n"
- fmt: '### Using `PassthroughSubject` to Wrap Snapshot Listeners


    To make integrating with existing code easier, Combine includes the `Subject`
    protocol. `Subject`s are a special kind of publisher that allow outside callers
    to inject events into a Combine pipeline. The `Subject` protocol defines a `send(_:)`
    method that can be used to send specific values to the pipeline.


    There are two types of built-in `Subject`s in Combine: `CurrentValueSubject` and
    `PassthroughSubject`. The main difference between them is that `CurrentValueSubject`
    remembers the most recently published element, whereas `PassthroughSubject` doesn’t
    keep track of the values it passes on.


    `Subject`s are particularly useful for adapting existing imperative code to Combine.
    In our case, we don’t need to keep track of the most recently sent event, so we
    can use `PassthroughSubject` to create custom publishers for Firebase APIs that
    send a continuous stream of events, such as a Firestore snapshot listener.


    Let’s take a look at the steps required to implement a custom Combine publisher
    for a snapshot listener on a Firestore collection or a Firestore query.


    We will implement this as an extension on `Query`. Since `CollectionReference`
    extends the `Query` interface, the publisher will work for Firestore collections
    and queries alike:


    ```

    public extension Query {

    func snapshotPublisher(includeMetadataChanges: Bool = false)

    -> AnyPublisher

    {

    ...

    addSnapshotListener(includeMetadataChanges: includeMetadataChanges) { snapshot,
    error in

    ...

    }

    ...

    }

    }

    ```


    This code fragment adds a method to the `Query` interface, which returns an `AnyPublisher`
    that is generic over a `QuerySnapshot` and an `Error` type. Inside the method,
    we call the original `addSnapshotListener` method, which takes a closure that
    we need to implement in order to handle the result of the call. As discussed earlier,
    the closure will be called whenever the collection or query we’re observing is
    changed (e.g., by adding, changing, or deleting a document). The `snapshot` parameter
    of the closure will contain a snapshot of all the documents in the collection
    or the query. If an error occurs, this will be communicated via the `error` parameter.


    To inject the result of the closure into a Combine pipeline, we need to set up
    a `PassthroughSubject` and return it to the caller of `snapshotPublisher`:


    ```

    public extension Query {

    func snapshotPublisher(includeMetadataChanges: Bool = false)

    -> AnyPublisher

    {

    let subject = PassthroughSubject()

    addSnapshotListener(includeMetadataChanges: includeMetadataChanges) { snapshot,
    error in

    ...

    }

    return subject.eraseToAnyPublisher()

    }

    }

    ```


    By erasing the type of the subject, we make sure the return type of the `snapshotPublisher`
    method stays clean.


    Finally, inside the closure, we can use the `PassthroughSubject` to send events
    to our subscribers. There are two cases we need to cover: when receiving a snapshot,
    we can `send` this to the `subject`. Should there be an `error`, we’ll have to
    send a `failure` to the subject to signal to Combine that the pipeline should
    be cancelled.


    ```

    public extension Query {

    func snapshotPublisher(includeMetadataChanges: Bool = false)

    -> AnyPublisher

    {

    let subject = PassthroughSubject()

    addSnapshotListener(includeMetadataChanges: includeMetadataChanges) { snapshot,
    error in

    if let error = error {

    subject.send(completion: .failure(error))

    } else if let snapshot = snapshot {

    subject.send(snapshot)

    }

    }

    return subject.eraseToAnyPublisher()

    }

    }

    ```


    This is looking good so far, but there is one last detail we need to take care
    of. When calling `addSnapshotListener`, we receive a handle that we can later
    use to remove the snapshot listener. You should remove any Firestore snapshot
    listeners when you’re no longer interested in listening to a query or collection.


    But how can we store and manage the snapshot listener handle inside the `snapshotPublisher`
    method? It turns out, we can make use of Combine’s `handleEvents` operator. This
    operator allows us to listen to the life-cycle events of a Combine pipeline, for
    example, when the pipeline is cancelled. So we can store the snapshot listener
    handle in a local variable and later use it to remove the snapshot listener once
    the pipeline is cancelled.


    ```

    public extension Query {

    func snapshotPublisher(includeMetadataChanges: Bool = false)

    -> AnyPublisher

    {

    let subject = PassthroughSubject()

    let listenerHandle =

    addSnapshotListener(includeMetadataChanges: includeMetadataChanges) { snapshot,
    error in

    if let error = error {

    subject.send(completion: .failure(error))

    } else if let snapshot = snapshot {

    subject.send(snapshot)

    }

    }

    return

    subject

    .handleEvents(receiveCancel: listenerHandle.remove)

    .eraseToAnyPublisher()

    }

    }

    ```


    And this is how you can adapt an existing API to Combine!


    Let’s update the previous code sample to make use of the new publisher:


    ```

    private class BookListViewModel: ObservableObject {

    @Published var books = [Book]()

    @Published var errorMessage: String?

    private var db = Firestore.firestore()

    private var cancellable: AnyCancellable?

    func subscribe() {

    cancellable = db.collection("books").snapshotPublisher()

    .tryMap { querySnapshot in

    try querySnapshot.documents.compactMap { documentSnapshot in

    try documentSnapshot.data(as: Book.self)

    }

    }

    .replaceError(with: [Book]())

    .handleEvents(receiveCancel: {

    print("Cancelled")

    })

    .assign(to: \.books, on: self)

    }

    func unsubscribe() {

    cancellable?.cancel()

    }

    }

    ```'
