    ## Part 3


    # 14. Getting Started with async/await


    We live in an asynchronous world. As users, we have come to expect that interactions
    with our devices and apps yield almost instant results. But we are pretty much
    neglecting the fact that more often than not, the systems we interact with are
    distributed systems: liking a Tweet or an Instagram story, archiving an email,
    putting an item into your shopping basket—all these actions ultimately result
    in a network call, an update in a database table, and sometimes even running a
    piece of business logic on a server.


    When dealing with distributed, independently executing systems, asynchronous behavior
    is the norm, not the exception: anything involving I/O (be it disk or network
    bound), and even communicating with other processes on the local system happens
    asynchronously.


    The Cambridge Dictionary defines *asynchronous* as *not happening or done at the
    same time or speed*,^([^(107)](#fn107)) and we can observe this kind of behavior
    in many situations:


    - A server needs to handle many clients at the same time, but it might have fewer
    processors or processor cores than the number of clients it needs to deal with
    at the same time.

    - Multicore systems run multiple independently executing operations in parallel.

    - A client app receives results from a network call it made earlier.

    - A local app needs to handle the user’s input while at the same time rendering
    UI updates.


    As developers, we are used to most method and function calls to execute and return
    almost immediately, allowing us to write linear, straight-line code like this
    example taken from the Swift Programming Language Guide^([^(108)](#fn108)):


    ```swift

    func greet(person: String) -> String {

    let greeting = "Hello, " + person + "!"

    return greeting

    }

    print(greet(person: "Anna"))

    // Prints "Hello, Anna!"

    print(greet(person: "Brian"))

    // Prints "Hello, Brian!"

    ```


    The calls to the greet function return immediately, and the greetings to Anna
    and Brian are printed consecutively. Brian will always be greeted after Anna.


    The `greet` function in this example executes *synchronously*. This is possible
    because it doesn’t perform any complex work and doesn’t depend on any other (remote)
    subsystems.


    But there are functions that execute *asynchronously*. The most common reasons
    why functions execute asynchronously are that they require a response from a slow
    resource (e.g., a server that needs to be accessed via the network, or even a
    file on the local file system), or they perform expensive work (i.e., a long-running
    computation).


    Computing the thumbnail for an image is an operation that takes a little while—depending
    on the size of the original image. `UIImage` has two methods for doing this: the
    synchronous version (`preparingThumbnail(of:)`^([^(109)](#fn109))) will block
    the calling thread until the method returns. When using this method in a UI with
    many thumbnails (such as a collection view), this will inevitably lead to stuttering
    when the user scrolls quickly. To prevent this, `UIImage` has a second version
    of this method that allows developers to call this API asynchronously: `prepareThumbnail(of:completionHandler:)`^([^(110)](#fn110)).
    This method will not block the main thread, but instead execute asynchronously,
    so scrolling will be smooth even with a large number of thumbnails being computed
    in the background.'
