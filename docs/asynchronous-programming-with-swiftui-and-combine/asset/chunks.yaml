    \nSwiftUI 采用声明式方法来描述用户界面。你无需手动实例化 UI 元素（如按钮、标签、列表等），只需声明你希望 UI 呈现的样子。视图是 SwiftUI\
    \ 中构建用户界面最基本的组件。要定义应用的 UI，你可以利用 SwiftUI 的内置视图，创建你的用户界面的轻量级描述。如此，你便可以组合出自己的视图，然后在你的应用中使用它们。\n\
