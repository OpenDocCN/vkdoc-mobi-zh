    ## 总结


    在本章中，你学会了如何使用 Combine 发布器来驱动具有复杂业务逻辑的 UI 状态，以及如何将应用逻辑分解为更小的 Combine 管道，从而保持代码的可管理性。


    我们探讨了如何将业务逻辑从 UI 中分离出来，并将其迁移至视图模型中。这有助于保持视图简洁且易于阅读。


    接着，你学习了创建 Combine 管道的几种技巧，以及如何在视图模型中管理它们。对于简单的管道，可以在视图模型的初始化器中创建。当需要复用某个管道时，最好将其移至私有属性中。请记住，应使用惰性计算属性来确保不会创建同一管道的多个实例，从而避免内存浪费以及潜在的多余网络请求。


    Combine 提供了丰富的运算符来转换来自上游发布器的输出。在本章中，我们使用了以下运算符：


    - `map` 允许我们将一个发布器的输入转换为不同的格式。你看到了如何通过闭包使用 `map` 来执行更复杂的转换逻辑，或者利用其键路径重载来创建简洁而强大的转换，直接访问输入的属性。

    - `Publishers.CombineLatest` 是另一个你会频繁使用的运算符——它会合并多个上游发布器的最新事件，并将其提供给其闭包。你可以把它想象成一个
    *Y* 形连接器，允许你连接多个事件流，并将它们转换为一个统一的输出流。


    本章初步展示了 Combine 与 SwiftUI 结合的可能性，以及如何使用 Combine 简化 SwiftUI 应用的编写。


    在下一章中，我们将转换视角，看看如何利用 Combine 访问网络，并将远程 API 调用的结果与应用 UI 中的本地事件相结合。


    # 使用 Combine 进行网络请求


    我们生活在一个互联的世界里，大多数现代应用都需要访问网络来检索存储在互联网（或用户本地网络）服务器上的信息。


    即使在超高速连接上，一个请求通常也需要几毫秒。在应用的前台线程中使用阻塞式 I/O 并等待响应是不可取的，因为这会导致应用冻结，从而带来极差的用户体验。用户可能会以为你的应用已崩溃而将其关闭。为防止这种行为，我们需要将异步工作卸载到后台线程，这样前台线程就能自由地执行
    UI 更新并响应用户交互。这就是为什么现代网络 API 必须以异步方式调用的原因。


    在 Swift 中实现异步 API 最流行的方法是使用*回调*。这些通常以闭包的形式实现，得益于 Swift 的尾随闭包语法，一旦你理解了它们的工作原理，它们看起来相当优雅且易于使用。


    调用异步 API 的其他方式包括 *async/await* 和 *Combine*。在本章中，我们将深入探讨如何使用 Combine 为你的应用实现网络层。我们首先会介绍使用
    `URLSession` 从网络获取数据的传统回调驱动方式。然后，我们将重构这段代码，以利用 Combine 的 `DataTaskPublisher`。你将学习
    Combine 如何使数据映射和错误处理变得更加容易，从而产生更易读且更少 bug 的代码。在第 14 章和第 15 章中，你将学习如何使用 `async/await`
    执行异步调用，并将探讨 Combine 与 `async/await` 之间的区别。


    保持应用的用户界面与应用状态的同步一直是个难题，开发社区也提出了大量方法来解决这一挑战。


    响应式编程就是其中一种方法，而 SwiftUI 的响应式状态管理通过引入*数据源*（source of truth）的概念使这一点变得容易得多。这个数据源可以使用
    SwiftUI 的属性包装器（如 `@EnvironmentObject`、`@StateObject` 和 `@ObservedObject`）在应用中共享。


    这个*数据源*通常就是你的内存数据模型，将本地数据源与网络结合起来听起来可能很复杂。在本章中，你将学习如何使用 Combine 来将本地数据源与远程服务的数据结合起来，这可能会比你想象的简单得多。


    你将首先学习如何将网络驱动的 Combine 管道连接到 SwiftUI 用户界面。接着，我们将优化实现，以确保你的应用不会让你的后端服务器不堪重负。Combine
    提供了一些运算符，能帮助我们显著减少应用发送到服务器的请求数量。这也会改善你应用的用户体验，让你不禁惊叹以往没有 Combine 的日子是怎么过来的。


    让我们开始吧，首先探讨如何使用 Combine 从服务器获取数据，并将结果映射到 Swift 的 `struct`。

    '
- fmt: "# Fetching Data Using URLSession\n\nWe will continue working on the sign-up\
    \ form we started building in the previous chapter. Let’s assume one of the requirements\
    \ is to check if the user’s preferred username is still available.\n\nThis requires\
    \ us to communicate with our authorization server to check if the desired username\
    \ already is taken by someone else. Here is a request that shows how we might\
    \ try to find out if the username `sjobs` is still available:\n\n```\nGET localhost:8080/isUserNameAvailable?userName=sjobs\
    \ HTTP/1.1\n```\n\nThe server will reply with a short JSON document stating whether\
    \ the username is still available or not:\n\n```\nHTTP/1.1 200 OK\ncontent-type:\
    \ application/json; charset=utf-8\ncontent-length: 39\nconnection: close\ndate:\
    \ Thu, 06 Jan 2022 16:09:08 GMT\n{\"isAvailable\":false, \"userName\":\"sjobs\"\
    }\n```\n\nTo perform this request in Swift, we can use `URLSession`. The traditional\
    \ way to fetch data from the network using `URLSession` looks like this:\n\n```\n\
    func checkUserNameAvailableOldSchool(userName: String, completion: @escaping (Result)\
    \ -> Void) {\n    guard let url = URL(string: \"http://localhost:8080/isUserNameAvailable?userName=\\\
    (userName)\") else {\n        completion(.failure(.invalidRequestError(\"URL invalid\"\
    )))\n        return\n    }\n    let task = URLSession.shared.dataTask(with: url)\
    \ { data, response, error in\n        if let error = error {\n            completion(.failure(.transportError(error)))\n\
    \            return\n        }\n        if let response = response as? HTTPURLResponse,\
    \ !(200...299).contains(response.statusCode) {\n            completion(.failure(.serverError(statusCode:\
    \ response.statusCode)))\n            return\n        }\n        guard let data\
    \ = data else {\n            completion(.failure(.noData))\n            return\n\
    \        }\n        do {\n            let decoder = JSONDecoder()\n          \
    \  let userAvailableMessage = try decoder.decode(UserNameAvailableMessage.self,\
    \ from: data)\n            completion(.success(userAvailableMessage.isAvailable))\n\
    \        } catch {\n            completion(.failure(.decodingError(error)))\n\
    \        }\n    }\n    task.resume()\n}\n```\n\nAnd while this code works fine\
    \ and nothing is inherently wrong with it, it does have several issues:\n\n1.\
    \ It’s not immediately clear what the happy path is—the only location that returns\
    \ a successful result is pretty hidden.\n\n2. Developers who are new to using\
    \ completion handlers might be confused by the fact that the happy path doesn’t\
    \ even use a `return` statement to deliver the result of the network call to the\
    \ caller.\n\n3. Error handling is scattered all over the place.\n\n4. There are\
    \ several exit points, and it’s easy to forget one of the `return` statements\
    \ in the `if let` conditions.\n\n5. Overall, it is hard to read and maintain,\
    \ even if you’re an experienced Swift developer.\n\n6. It’s easy to forget you\
    \ have to call `resume()` to actually perform the request. I am pretty sure most\
    \ of us have been frantically looking for bugs when using `URLSession`, only to\
    \ find out we forgot to actually kick off the request using `resume`. And yes,\
    \ I think `resume` is not a great name for an API that is supposed to *send* the\
    \ request.\n\n**Running the code samples**\n\n*You will find all the code samples\
    \ in the accompanying GitHub repository, in the* `Networking` *folder. To be able\
    \ to benefit the most, I’ve also provided a demo server (built with Vapor) in\
    \ the* `server` *subfolder. To run it on your machine, do the following:*\n\n\
    ```\n$ cd server\n$ swift run\n```\n\n## Using Combine to Fetch Data\n\nWhen they\
    \ introduced Combine, Apple added publishers for many of their own asynchronous\
    \ APIs. Developers can now use these publishers to replace their existing, callback-driven\
    \ code.\n\nThe resulting code has fewer exit points, follows a straight line,\
    \ and thus is easier to read and maintain. It’s also less prone to subtle bugs.\n\
    \nTo get a better understanding of what this means, let’s look at how the previous\
    \ (callback-based) code snippet looks like after refactoring it to make use of\
    \ Combine:\n\n```\nfunc checkUserNameAvailableNaive(userName: String) -> AnyPublisher\
    \ {\n    guard let url = URL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
    (userName)\") else {\n        return Just(false).eraseToAnyPublisher()\n    }\n\
    \    return URLSession.shared.dataTaskPublisher(for: url)\n        .map { data,\
    \ response in\n            do {\n                let decoder = JSONDecoder()\n\
    \                let userAvailableMessage = try decoder.decode(UserNameAvailableMessage.self,\
    \ from: data)\n                return userAvailableMessage.isAvailable\n     \
    \       } catch {\n                return false\n            }\n        }\n  \
    \      .replaceError(with: false)\n        .eraseToAnyPublisher()\n}\n```\n\n\
    Let’s walk through the code step by step:\n\n1. We use `dataTaskPublisher` to\
    \ perform the request. This publisher is a one-shot publisher and will emit an\
    \ event once the requested data has arrived. It’s worth keeping in mind that Combine\
    \ publishers don’t perform any work if there is no subscriber. This means that\
    \ this publisher will not perform any call to the given URL until you add at least\
    \ one subscriber. I will later show you how to connect this pipeline to the UI\
    \ and make sure it gets called every time the user enters text into the username\
    \ field.\n\n2. Once the request returns, the publisher emits a value that contains\
    \ both the `data` and the `response`. In this line, we use the `map` operator\
    \ to transform this result. As you can see, we can reuse most of the data mapping\
    \ code from the previous version of the code, except for a couple of minor changes.\n\
    \n3. Instead of calling the `completion` closure, we can return a `Boolean` value\
    \ to indicate whether the username is still available or not. This value will\
    \ be passed down the pipeline.\n\n4. In case the data mapping fails, we catch\
    \ the error and return `false`, which seems to be a good compromise.\n\n5. We\
    \ do the same for any errors that might occur when accessing the network. This\
    \ is a simplification that we might need to revisit in the future.\n\nAlso note\
    \ that (except for the `guard` statement that makes sure we’ve got a valid URL)\
    \ there is just *one* exit point.\n\nThis looks a lot better and easier to read\
    \ than the initial version. We could leave it there and use this code in our app.\n\
    \nBut we can do better. In the following three sections, we will look at a few\
    \ changes that will make the code more linear and easier to reason about.\n\n\
    ### Destructuring Tuples Using Key Paths\n\nWe often find ourselves in a situation\
    \ where we need to extract a specific attribute from a variable. In the preceding\
    \ code, `dataTaskPublisher` returns a result containing the `data` and the `response`\
    \ for the URL request we sent. The type of the result is a tuple, as we can see\
    \ from `DataTaskPublisher`’s declaration:\n\n```\npublic struct DataTaskPublisher\
    \ : Publisher {\n    /// The kind of values published by this publisher.\n   \
    \ public typealias Output = (data: Data, response: URLResponse)\n    ...\n}\n\
    ```\n\nExtracting the individual elements from the tuple is called *destructuring*.\
    \ Combine provides an overloaded version of the `map` operator that allows us\
    \ to destructure the tuple and access just the attribute we care for:\n\n```\n\
    return URLSession.shared.dataTaskPublisher(for: url)\n    .map(\\.data)\n```\n\
    \n### Mapping Data\n\nSince mapping data is such a common task, Combine comes\
    \ with a dedicated operator to make this easier: `decode(type:decoder:)`.\n\n\
    ```\nreturn URLSession.shared.dataTaskPublisher(for: url)\n    .map(\\.data)\n\
    \    .decode(type: UserNameAvailableMessage.self, decoder: JSONDecoder())\n```\n\
    \nThis will extract the `data` value from the upstream publisher and decode it\
    \ into a `UserNameAvailableMessage` instance.\n\nAnd finally, we can use the `map`\
    \ operator again to destructure the `UserNameAvailableMessage` and access its\
    \ `isAvailable` attribute:\n\n```\nreturn URLSession.shared.dataTaskPublisher(for:\
    \ url)\n    .map(\\.data)\n    .decode(type: UserNameAvailableMessage.self, decoder:\
    \ JSONDecoder())\n    .map(\\.isAvailable)\n```"
