    is either static, or it displays information that is driven by a model element.
    It is impossible to manipulate a SwiftUI view directly. The data that determines
    the state of the UI is called *Source of* *Truth* and there can only be one source
    of truth for each UI element.


    This results in deterministic states and consistent user interfaces.


    SwiftUI provides a number of ways to manage state in your application. In this
    chapter, we’re going to learn about the different techniques and discuss their
    benefits and when to use them.


    To give you a better understanding of this complex topic, we’re going to look
    at a few real-world scenarios and discuss the state management patterns you can
    use in each scenario.


    ## Managing State in SwiftUI


    SwiftUI views are structs, which means they are value types. One of the major
    reasons for choosing value types for defining the UI of your app is that when
    copying a value type, you can be sure no other part of the app is changing the
    data under the covers.^([^(37)](#fn37)) As we will later see, the body of a view
    is a computed property, making it impossible for developers to accidentally modify
    a view directly.


    However, updating the UI is a crucial feature for almost any app, so how can we
    build apps that dynamically update their UI?


    SwiftUI provides two complementary tools that ensure you can freely manage and
    update your data model, while making sure the UI is always in sync with the data
    model.


    Both mechanisms build upon *property wrappers*.


    The first one helps you to define your data model in such a way that it is capable
    of publishing its state.


    And secondly, SwiftUI manages the state of the UI for you in a memory area that
    only SwiftUI has control over.


    SwiftUI therefore allows you to define your data model in an easy-to-build and
    reusable way. By making UI updates *unidirectional*, SwiftUI relieves you from
    the burden of having to make sure to always update the view and the model at the
    same time.


    Let’s first look at the different ways on how you can connect your data model
    to your app’s user interface.


    SwiftUI provides several ways for storing and passing data around. Which one is
    most appropriate depends on which part of your app owns the data, whether you’re
    working with value types or objects, and whether the view requires read/write
    access or read-only access to the data.'
  trans: '

    ### 使用视图修饰符注册操作处理程序


    到目前为止，我们接触的大多数视图修饰符都是修改视图的外观。这些视图修饰符通常接受 `String`、`Int`、`Color`、`Font` 或 Swift
    其他类型的参数。


    除了能够声明视图的外观，我们还需要能够指定用户点击按钮、在输入字段中输入文本或执行其他操作时会发生什么。为此，SwiftUI 还允许我们为特定事件注册闭包，例如视图出现或消失时、用户点击按钮或菜单项时、在
    `List` 视图中触发滑动手势时，等等。


    例如，以下是如何注册一个在用户每次点击按钮时被调用的闭包：


    ```

    Button("点我", action: {

    self.message = "你点了我！"

    })

    ```


    借助 Swift 的尾随闭包语法，我们可以进一步将其简化为：


    ```

    Button("点我") {

    self.message = "你点了我！"

    }

    ```


    与影响视图外观的视图修饰符类似，这些操作处理程序视图修饰符可以应用于容器视图，并随之应用于所有子视图。以下示例展示了一个包含两个 `TextField` 视图的输入表单，允许用户输入名字和姓氏。每当用户更改其中一个
    `TextField` 时，代码会更新 `dirty` 属性。我们通过将 `onChange(of:perform:)` 视图修饰符应用于相应的 `TextField`
    来实现这一点，该修饰符允许我们指定要监视哪个模型属性的变化。类似地，我们应用 `onSubmit` 视图修饰符并注册一个闭包来调用视图模型的 `save`
    方法，将数据保存到磁盘。


    ```

    import SwiftUI

    private class PersonViewModel: ObservableObject {

    @Published var firstName = ""

    @Published var lastName = ""

    func save() {

    print("保存到磁盘")

    }

    }

    struct ClosuresDemoView: View {

    @State var message = ""

    @State var dirty = false

    @StateObject private var viewModel = PersonViewModel()

    var body: some View {

    Form {

    Section("\(self.dirty ? "* " : "")输入字段") {

    TextField("名", text: $viewModel.firstName)

    .onChange(of: viewModel.firstName) { newValue in

    self.dirty = true

    }

    .onSubmit {

    viewModel.save()

    }

    TextField("姓", text: $viewModel.lastName)

    .onChange(of: viewModel.lastName) { newValue in

    self.dirty = true

    }

    .onSubmit {

    viewModel.save()

    }

    }

    }

    }

    }

    ```


    由于这两个 `onSubmit` 闭包执行相同的操作，我们可以重构之前的代码，将 `onSubmit` 视图修饰符移到外层的 `Section` 上：


    ```

    struct ClosuresDemoView: View {

    @State var message = ""

    @State var dirty = false

    @StateObject private var viewModel = PersonViewModel()

    var body: some View {

    Form {

    Section("\(self.dirty ? "* " : "")输入字段") {

    TextField("名", text: $viewModel.firstName)

    .onChange(of: viewModel.firstName) { newValue in

    self.dirty = true

    }

    TextField("姓", text: $viewModel.lastName)

    .onChange(of: viewModel.lastName) { newValue in

    self.dirty = true

    }

    }

    .onSubmit {

    viewModel.save()

    }

    }

    }

    }

    ```


    ## 总结


    SwiftUI 是一个用于构建用户界面的灵活的内部特定领域语言（DSL），在本章中，你学习了它的基本构建块：


    *   **SwiftUI 视图只是 UI 的描述**，因此我们可以自由地使用它们来构建 UI——只需记住，不要在 `View` 的初始化器中执行任何长时间运行或内存密集型操作。


    *   **视图可以组合以创建更复杂的视图**，并且我们了解了一些 SwiftUI 的容器视图，例如 `HStack`、`VStack` 和 `ZStack`，正是它们使这种组合成为可能。


    *   **视图修饰符可用于自定义视图**——我们可以使用它们来修改视图的外观和感觉，例如 `Label` 的前景色或字体。但我们也可以注册在特定事件发生时被调用的闭包（例如，当视图出现时，或用户按回车提交表单时）。


    掌握了这些知识后，现在是时候深入探讨状态管理这个重要话题了。在下一章中，你将学习 SwiftUI 如何利用函数式响应式方法来确保 UI 始终与底层数据模型保持同步。


    脚注 1   2   3   4   5   6   7


    # 4. 状态管理


    SwiftUI 与你以前可能使用过的许多其他 UI 工具包不同：你不能直接操纵 UI 视图。你在屏幕上看到的任何变化都是由应用程序数据模型的状态及其转换决定的。你可能听说过“在
    SwiftUI 中，视图是应用程序状态的函数”。


    这意味着什么？为什么它如此重要？


    命令式 UI 工具包有一个非常大的缺陷：它们允许开发者独立更新模型和视图。这常常导致状态不一致和部分更新。你可能曾经使用过表现出这种行为应用程序。例如，你在一个详情屏幕中进行了更改，但主屏幕上的更改却没有反映出来。^(³⁶)


    SwiftUI 的设计者选择了一种不同的方法：SwiftUI 中的视图要么是静态的，要么显示由模型元素驱动的信息。你无法直接操纵 SwiftUI 视图。决定
    UI 状态的数据被称为*数据源（Source of Truth）*，每个 UI 元素只能有一个数据源。


    这导致了确定性的状态和一致的用户界面。


    SwiftUI 提供了多种在你的应用程序中管理状态的方法。在本章中，我们将学习不同的技术，讨论它们的优点以及何时使用它们。


    为了更好地理解这个复杂的主题，我们将研究一些现实场景，并讨论你可以在每种场景中使用状态管理模式。


    ## 在 SwiftUI 中管理状态


    SwiftUI 视图是结构体，这意味着它们是值类型。选择值类型来定义应用程序 UI 的一个主要原因是，在复制值类型时，你可以确保应用程序的其他部分不会在背后更改数据。^(³⁷)
    正如我们稍后将看到的，视图的 `body` 是一个计算属性，这使得开发者无法意外地直接修改视图。


    然而，更新 UI 对于几乎任何应用程序都是一个关键特性，那么我们如何构建能够动态更新其 UI 的应用程序呢？


    SwiftUI 提供了两个互补的工具，确保你可以自由地管理和更新数据模型，同时保证 UI 始终与数据模型保持同步。


    这两种机制都建立在*属性包装器（property wrappers）*之上。


    第一个工具帮助你将数据模型定义为能够发布其状态的形式。


    其次，SwiftUI 在一个只有它自己能够控制的内存区域中为你管理 UI 的状态。


    因此，SwiftUI 允许你以一种易于构建和可复用的方式定义数据模型。通过使 UI 更新*单向化*，SwiftUI 让你摆脱了必须始终保持视图和模型同步更新的负担。


    让我们首先来看看将数据模型连接到应用程序用户界面的不同方式。


    SwiftUI 提供了几种存储和传递数据的方法。哪种方法最合适取决于你的应用程序的哪个部分拥有数据、你使用的是值类型还是对象，以及视图需要对数据具有读/写访问权限还是只读访问权限。

