    ## Summary


    In this chapter, you learned how to use Swift 5.5’s new structured concurrency
    model in SwiftUI. SwiftUI provides well thought-out mechanisms that make calling
    asynchronous code from the UI as natural as possible.


    For example, you can use the `.task` view modifier to run asynchronous code when
    a view appears. When using `.task` instead of `.onAppear`, SwiftUI will automatically
    take care of cancelling the task as soon as the view disappears.


    Searching and refreshing data are other common situations in which you often need
    to run asynchronous code. The .refreshable and `.searchable` view modifiers create
    an asynchronous context for their closures, so you can easily call asynchronous
    code inside.


    And if you need to call asynchronous code from a nonasynchronous context (such
    as the action handler of a `Button`), you can easily create an asynchronous context
    yourself by wrapping your code in a `Task { }` block.


    You also saw that it might sometimes be more appropriate to use Combine to drive
    some of the UI instead of using async/await. The `.searchable()` view modifier
    is a great example for an API that is more suitable for being used with Combine.


    Many of the examples made use of `List` views. Chapter [5](#509862_1_En_5_Chapter.xhtml)
    goes into more detail of how to build simple and advanced `List` views.


    Footnotes [1](#509862_1_En_15_Chapter.xhtml#Fn1_source)


    # 16. Bringing It All Together: SwiftUI, async/await, and Combine


    Mobile applications have to deal with a constant flow of events: user input, network
    traffic, and callbacks from the operating system are all vying for your app’s
    attention. Building apps that feel snappy is a challenging task, as you have to
    efficiently handle all those events.


    Combine and async/await are some fairly recent addition to the collection of frameworks
    and language features that aim at making this easier.


    In this chapter, we will explore commonalities and differences of Combine and
    async/await, and I will show you how you can efficiently use both to call asynchronous
    APIs in your SwiftUI apps.


    To better understand the respective characteristics, we will look at a couple
    of code snippets taken from a SwiftUI screen that allows users to search for books
    by title. You will find the source code for this sample app in this book’s GitHub
    repository.^([^(124)](#fn124))


    ## Fetching Data Using Combine


    Many of Apple’s APIs are Combine-enabled, and `URLSession` is one of them. To
    fetch data from a URL, we can call `dataTaskPublisher` and then use some of Combine’s
    operators to handle the response and transform it into a data model our application
    can work with. The following code snippet shows a typical Combine pipeline for
    fetching data from a remote API, mapping the result, extracting the information
    we need, and handling errors.


    > *Error handling in this code snippet is rather basic. For a more in-depth discussion
    of error handling in Combine and how to expose error messages to the user in a
    meaningful way in SwiftUI apps, have a look at Chapter* [*10*](#509862_1_En_10_Chapter.xhtml)*,
    in which this we take a closer look at this important topic.*


    ```

    private func searchBooks(matching searchTerm: String) ->

    AnyPublisher

    {

    let escapedSearchTerm =

    searchTerm

    .addingPercentEncoding(withAllowedCharacters: .urlHostAllowed) ?? ""

    let url =

    URL(string: "https://openlibrary.org/search.json?q=\(escapedSearchTerm)")!

    return URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: OpenLibrarySearchResult.self,

    decoder: JSONDecoder())

    .map(\.books)

    .compactMap { openLibraryBooks in

    openLibraryBooks?.map { Book(from: $0) }

    }

    .replaceError(with: [Book]())

    .eraseToAnyPublisher()

    }

    ```


    For someone who is not familiar with Combine, it might not be immediately obvious
    how this code works, let alone being able to put together a pipeline like this.
    Getting into a functional reactive mindset probably is one of the biggest hurdles
    when learning Combine.


    ## Fetching Data Using async/await


    Let’s now look at how to implement the same method using `async/await`. Apple
    has made sure that the most important asynchronous APIs can be called using `async/await`.
    To fetch data from a URL, we can asynchronously call `await URLSession.shared.data(from:
    url)`. By wrapping this call inside a `try catch` block, we can add the same kind
    of error handling we implemented in the previous code snippet and return an empty
    array in case an error occurred.


    To make it easier for them (and other SDK providers like Firebase), Apple implemented
    a concurrency interoperability with Objective-C.^([^(125)](#fn125)) In a nutshell,
    this ensures that the Swift compiler emits an async version of every Objective-C
    method that has a completion block. To learn more about how this works, check
    out my video “Using async/await with Firebase,”^([^(126)](#fn126)) in which I
    explain this in more detail.


    ```

    private func searchBooks(matching searchTerm: String) async

    -> [Book]

    {

    let escapedSearchTerm =

    searchTerm

    .addingPercentEncoding(withAllowedCharacters: .urlHostAllowed) ?? ""

    let url =

    URL(string: "https://openlibrary.org/search.json?q=\(escapedSearchTerm)")!

    do {

    let (data, _) = try await URLSession.shared.data(from: url)

    let searchResult =

    try OpenLibrarySearchResult.init(data: data)

    guard let libraryBooks = searchResult.books else {

    return []

    }

    return libraryBooks.compactMap { Book(from: $0) }

    }

    catch {

    return []

    }

    }

    ```


    If you’ve got some experience writing and reading Swift code, you will be able
    to understand what this code does—even if you’ve got no prior experience with
    `async/await`: all keywords related to `async/await` blend in with the rest of
    the code, making it rather natural to read and understand. This is not least due
    to the fact that the Swift language team modeled Swift’s concurrency features
    similar to how error handling works using `try/catch`.


    Of course, to *write* code like this, you need a basic understanding of Swift’s
    concurrency features, so there definitely is a learning curve.


    ## Is This the End of Combine?


    Looking at these two code snippets, you might argue that the one making use of
    `async/await` is easier to understand for developers who might not be familiar
    with neither Combine nor `async/wait`, mostly due to the fact you can read if
    from top to bottom in a linear way.


    On the contrary, to understand the Combine version of the code, you have to know
    what a publisher is, why some of the operations are nested (e.g., the code for
    mapping a book inside the `compactMap/map` structure), and why on earth you need
    to call `eraseToAnyPublisher`. This can look very confusing if you’re new to Combine.


    Add to that the lack of sessions about Combine at WWDC 2021—it really seemed like
    Apple lost their enthusiasm for functional reactive programming.


    So, given both code snippets seem to do the same, is this the end of Combine?


    Well, I don’t think so, and this has to do with the fact SwiftUI is tightly integrated
    with Combine. In fact, Combine makes a number of things in SwiftUI a lot easier
    with surprisingly little code.'
