- fmt: '### Other Operators That Influence Scheduling


    Combine has a number of operators that affect the timing with which events are
    passed on to the downstream pipeline:


    - `debounce` publishes elements only after a specified time interval elapses between
    events.

    - `throttle` publishes either the most recent or the first element published by
    the upstream publisher in the specified time interval.

    - `delay` delays delivery of all output to the downstream receiver by a specified
    amount of time on a particular scheduler.


    All of these take a time interval and a scheduler on which the operator delivers
    its output elements. Let’s look at a quick example to understand what this means.


    A commonly used timing operator in SwiftUI is `debounce`—it allows us to specify
    a time interval that needs to elapse between two events that the operator will
    send to its downstream subscribers. This is particularly useful for search dialogs
    that call remote APIs to perform a search based on the user’s input. To avoid
    overloading the remote API with too many requests, we typically install a `debounce`
    operator on the published property that holds the search term.


    Let’s look at the code we used in one of the previous chapters about optimizing
    your network layer:


    ```

    $input

    .debounce(for: 0.8, scheduler: DispatchQueue.main)

    .handleEvents { subscription in

    self.logEvent(tag: "handleEvents")

    } receiveOutput: { value in

    self.logEvent(tag: "receiveOutput - {\(value)}")

    } receiveCompletion: { completion in

    self.logEvent(tag: "receiveCompletion")

    } receiveCancel: {

    self.logEvent(tag: "receiveCancel")

    } receiveRequest: { demand in

    self.logEvent(tag: "receiveRequest")

    }

    .sink { value in

    self.logEvent(tag: "sink - {\(value)}")

    print("Value: \(value)")

    self.output = value

    }

    .store(in: &cancellables)

    ```


    This piece of code takes the input the user types into a text input field and
    then uses the `debounce` operator to reduce the number of events that are passed
    on to downstream subscribers. This means downstream subscribers will only receive
    the current value of the `input` property once the user stops typing for 0.8 seconds.


    Using `DispatchQueue.global(qos: .background)` instead will result in all events
    arriving on a background thread.


    This means providing a scheduler to one of the scheduling operators is equivalent
    to adding a call to `subscribe(on:)`.


    ## Performing Asynchronous Work


    Performing computationally intensive work on the main thread is not a good idea—as
    we saw in the previous examples, running such code on the main thread might result
    in a janky UI, or even completely blocking the UI.


    Just like accessing asynchronous APIs (like the network, a cloud service like
    Firebase, or even local APIs that process events asynchronously), you should offload
    any such code to a background thread by subscribing to the respective publisher
    (or operator) on a background scheduler. When the background process has finished,
    and the publisher emits an event, you will eventually want to switch to the main
    thread to update the UI.


    Here is the general pattern to use:


    ```

    publisher

    .subscribe(on: DispatchQueue.global())

    .receive(on: DispatchQueue.main)

    .sink { }

    ```


    You can use the overloaded version of `DispatchQueue.global(qos:)` to indicate
    the quality of service you would like to use for the code that’s run in the background:


    - `background`: Background tasks have the lowest priority of all tasks. Assign
    this class to tasks or dispatch queues that you use to perform work while your
    app is running in the background.

    - `utility`: Utility tasks have a lower priority than default, user-initiated,
    and user-interactive tasks, but a higher priority than background tasks. Assign
    this quality-of-service class to tasks that do not prevent the user from continuing
    to use your app. For example, you might assign this class to long-running tasks
    whose progress the user does not follow actively.

    - `default`: Default tasks have a lower priority than user-initiated and user-interactive
    tasks, but a higher priority than utility and background tasks. Assign this class
    to tasks or queues that your app initiates or uses to perform active work on the
    user’s behalf.

    - `userInitiated`: User-initiated tasks are second only to user-interactive tasks
    in their priority on the system. Assign this class to tasks that provide immediate
    results for something the user is doing, or that would prevent the user from using
    your app. For example, you might use this quality-of-service class to load the
    content of an email that you want to display to the user.

    - `userInteractive`: User-interactive tasks have the highest priority on the system.
    Use this class for tasks or queues that interact with the user or actively update
    your app’s user interface. For example, use this for class for animations or for
    tracking events interactively.


    For a sample showing this in action, see `SchedulerDemoView.swift` in the sample
    project for this chapter.


    ## Integrating with Other APIs


    We usually have full control over the code we write ourselves, so we can apply
    the technique outlined in the previous section to control the scheduling of a
    pipeline. When consuming code that someone else wrote, we might not always have
    that luxury. In this section, we will look at a number of examples in which the
    upstream publisher controls the scheduling—and how we can influence how the rest
    of the pipeline is scheduled—which is particularly important when assigning the
    result of a pipeline to a published property that might be connected to the UI.


    ### URLSession


    Let’s first take a look at accessing the network. We discussed using `URLSession`
    in detail in Chapter [9](#509862_1_En_9_Chapter.xhtml), and you might remember
    that we ran into some scheduling issues. Here is a typical code snippet that fetches
    data from a URL and then assigns it to a published property that is connected
    to a SwiftUI view:


    ```

    URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    .replaceError(with: false)

    .assign(to: &$isUsernameAvailable)

    ```


    Running this code will result in a warning:


    ```

    [SwiftUI] Publishing changes from background threads is not allowed; make sure
    to publish values from the main thread (via operators like receive(on:)) on model
    updates.

    ```


    This warning is caused by the fact that `URLSession` executes on a background
    thread, and so the rest of the pipeline, including the `assign` operator, will
    be executed on the same thread. This means that the UI will be updated from the
    background thread, which triggers the warning.


    To avoid this, all we need to do is add a `receive(on:)` operator before the `assign`
    operator, to make sure we access the UI from the main thread:


    ```

    URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    .replaceError(with: false)

    .receive(on: DispatchQueue.main)

    .assign(to: &$isUsernameAvailable)

    ```'
  raw: '### Other Operators That Influence Scheduling


    Combine has a number of operators that affect the timing with which events are
    passed on to the downstream pipeline:


    *   `debounce` publishes elements only after a specified time interval elapses
    between events.


    *   `throttle` publishes either the most recent or the first element published
    by the upstream publisher in the specified time interval.


    *   `delay` delays delivery of all output to the downstream receiver by a specified
    amount of time on a particular scheduler.


    All of these take a time interval and a scheduler on which the operator delivers
    its output elements. Let’s look at a quick example to understand what this means.


    A commonly used timing operator in SwiftUI is `debounce`—it allows us to specify
    a time interval that needs to elapse between two events that the operator will
    send to its downstream subscribers. This is particularly useful for search dialogs
    that call remote APIs to perform a search based on the user’s input. To avoid
    overloading the remote API with too many requests, we typically install a `debounce`
    operator on the published property that holds the search term.


    Let’s look at the code we used in one of the previous chapters about optimizing
    your network layer:


    ```

    $input

    .debounce(for: 0.8, scheduler: DispatchQueue.main)

    .handleEvents { subscription in

    self.logEvent(tag: "handleEvents")

    } receiveOutput: { value in

    self.logEvent(tag: "receiveOutput - {\(value)}")

    } receiveCompletion: { completion in

    self.logEvent(tag: "receiveCompletion")

    } receiveCancel: {

    self.logEvent(tag: "receiveCancel")

    } receiveRequest: { demand in

    self.logEvent(tag: "receiveRequest")

    }

    .sink { value in

    self.logEvent(tag: "sink - {\(value)}")

    print("Value: \(value)")

    self.output = value

    }

    .store(in: &cancellables)

    ```


    This piece of code takes the input the user types into a text input field and
    then uses the `debounce` operator to reduce the number of events that are passed
    on to downstream subscribers. This means downstream subscribers will only receive
    the current value of the `input` property once the user stops typing for 0.8 seconds.


    Using `DispatchQueue.global(qos: .background)` instead will result in all events
    arriving on a background thread.


    This means providing a scheduler to one of the scheduling operators is equivalent
    to adding a call to `subscribe(on:)`.


    ## Performing Asynchronous Work


    Performing computationally intensive work on the main thread is not a good idea—as
    we saw in the previous examples, running such code on the main thread might result
    in a janky UI, or even completely blocking the UI.


    Just like accessing asynchronous APIs (like the network, a cloud service like
    Firebase, or even local APIs that process events asynchronously), you should offload
    any such code to a background thread by subscribing to the respective publisher
    (or operator) on a background scheduler. When the background process has finished,
    and the publisher emits an event, you will eventually want to switch to the main
    thread to update the UI.


    Here is the general pattern to use:


    ```

    publisher

    .subscribe(on: DispatchQueue.global())

    .receive(on: DispatchQueue.main)

    .sink { }

    ```


    You can use the overloaded version of `DispatchQueue.global(qos:)` to indicate
    the quality of service you would like to use for the code that’s run in the background


    *   `background`: Background tasks have the lowest priority of all tasks. Assign
    this class to tasks or dispatch queues that you use to perform work while your
    app is running in the background.


    *   `utility`: Utility tasks have a lower priority than default, user-initiated,
    and user-interactive tasks, but a higher priority than background tasks. Assign
    this quality-of-service class to tasks that do not prevent the user from continuing
    to use your app. For example, you might assign this class to long-running tasks
    whose progress the user does not follow actively.


    *   `default`: Default tasks have a lower priority than user-initiated and user-interactive
    tasks, but a higher priority than utility and background tasks. Assign this class
    to tasks or queues that your app initiates or uses to perform active work on the
    user’s behalf.


    *   `userInitiated`: User-initiated tasks are second only to user-interactive
    tasks in their priority on the system. Assign this class to tasks that provide
    immediate results for something the user is doing, or that would prevent the user
    from using your app. For example, you might use this quality-of-service class
    to load the content of an email that you want to display to the user.


    *   `userInteractive`: User-interactive tasks have the highest priority on the
    system. Use this class for tasks or queues that interact with the user or actively
    update your app’s user interface. For example, use this for class for animations
    or for tracking events interactively.


    For a sample showing this in action, see `SchedulerDemoView.swift` in the sample
    project for this chapter.


    ## Integrating with Other APIs


    We usually have full control over the code we write ourselves, so we can apply
    the technique outlined in the previous section to control the scheduling of a
    pipeline. When consuming code that someone else wrote, we might not always have
    that luxury. In this section, we will look at a number of examples in which the
    upstream publisher controls the scheduling—and how we can influence how the rest
    of the pipeline is scheduled—which is particularly important when assigning the
    result of a pipeline to a published property that might be connected to the UI.


    ### URLSession


    Let’s first take a look at accessing the network. We discussed using `URLSession`
    in detail in Chapter [9](#509862_1_En_9_Chapter.xhtml), and you might remember
    that we ran into some scheduling issues. Here is a typical code snippet that fetches
    data from a URL and then assigns it to a published property that is connected
    to a SwiftUI view:


    ```

    URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    .replaceError(with: false)

    .assign(to: &$isUsernameAvailable)

    ```


    Running this code will result in a warning:


    ```

    [SwiftUI] Publishing changes from background threads is not allowed; make sure
    to publish values from the main thread (via operators like receive(on:)) on model
    updates.

    ```


    This warning is caused by the fact that `URLSession` executes on a background
    thread, and so the rest of the pipeline, including the `assign` operator, will
    be executed on the same thread. This means that the UI will be updated form the
    background thread, which triggers the warning.


    To avoid this, all we need to do is add a `receive(on:)` operator before the `assign`
    operator, to make sure we access the UI from the main thread:


    ```

    URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    .replaceError(with: false)

    .receive(on: DispatchQueue.main)

    .assign(to: &$isUsernameAvailable)

    ```'
