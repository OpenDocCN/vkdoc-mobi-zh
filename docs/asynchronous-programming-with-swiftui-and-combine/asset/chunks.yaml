    \  .background(.red)\n        }\n        .frame(maxHeight: 50)\n    }\n}\n```\n\
    \n![](images/509862_1_En_3_Chapter/509862_1_En_3_Fig4_HTML.png)\n\nA screenshot\
    \ has hello world written side by side in a text box in different color gradients.\
    \ The option titled content view is given on the top left. It has various options\
    \ for play, mouse pointer, toggle, and zoom below.\n\n**Figure 3-4** — The order\
    \ in which you apply view modifiers has an impact on the view’s appearance\n\n\
    In the first example, the background color is applied to the `Text` view before\
    \ applying the padding. This results in just the text being underlaid with the\
    \ red background.\n\nIn the second code snippet, the padding is applied first.\
