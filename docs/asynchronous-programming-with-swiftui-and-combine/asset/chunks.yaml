  trans: '

    ### 处理验证错误


    大多数验证错误应在客户端本地处理，但有时我们无法避免在服务器上运行一些额外的验证步骤。理想情况下，服务器应返回`4xx`范围内的 HTTP 状态码，并可选择提供包含更多详细信息的有效负载。


    在我们的示例应用中，服务器要求用户名至少为四个字符，并且我们有一个禁止使用的用户名列表（例如"admin"或"superuser"）。针对这些情况，我们希望显示警告消息并禁用提交按钮。


    我们的后端实现基于 Vapor，对于任何验证错误，它都会返回 HTTP 状态码`400`和一个错误有效负载。如果你对实现细节感兴趣，可以查看服务器实现中的`routes.swift`代码。


    处理这种错误场景需要在两个地方进行修改：服务实现和视图模型。我们先来看服务实现。


    由于我们应在尝试从响应中提取有效负载之前处理任何错误，因此处理服务器错误的代码需要在检查`URLErrors`之后、映射数据之前运行：


    ```

    struct APIErrorMessage: Decodable {

    var error: Bool

    var reason: String

    }

    // ...

    struct AuthenticationService {

    func checkUserNameAvailablePublisher(userName: String) -> AnyPublisher {

    guard let url = URL(string: "http://127.0.0.1:8080/isUserNameAvailable?userName=\(userName)")
    else {

    return Fail(error: APIError.invalidRequestError("URL invalid"))

    .eraseToAnyPublisher()

    }

    return URLSession.shared.dataTaskPublisher(for: url)

    // 处理 URL 错误（很可能无法连接到服务器）

    .mapError { error -> Error in

    return APIError.transportError(error)

    }

    // 处理所有其他错误

    .tryMap { (data, response) -> (data: Data, response: URLResponse) in

    print("已收到服务器响应，正在检查状态码")

    guard let urlResponse = response as? HTTPURLResponse else {

    throw APIError.invalidResponse // (1)

    }

    if (200..<300) ~= urlResponse.statusCode { // (2)

    }

    else {

    let decoder = JSONDecoder()

    let apiError = try decoder.decode(APIErrorMessage.self,

    from: data) // (3)

    if urlResponse.statusCode == 400 { // (4)

    throw APIError.validationError(apiError.reason)

    }

    }

    return (data, response)

    }

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    //      .replaceError(with: false)

    .eraseToAnyPublisher()

    }

    }

    ```


    我们来仔细分析这段代码的作用：


    1. 如果响应不是`HTTPURLResonse`，我们返回`APIError.invalidResponse`。

    2. 我们使用 Swift 的模式匹配来检测请求是否成功执行，即 HTTP 状态码在`200`到`299`范围内。

    3. 否则，服务器上发生了某些错误。由于我们使用 Vapor，服务器会以 JSON 有效负载形式返回错误详情（`https://docs.vapor.codes/4.0/errors/`），因此我们现在可以将此信息映射到`APIErrorMessage`结构体，并在后续代码中用它来创建更有意义的错误消息。

    4. 如果服务器返回 HTTP 状态码`400`，我们知道这是一个验证错误（详情参见服务器实现），并返回一个`APIError.validationError`，其中包含从服务器收到的详细错误消息。


    在视图模型中，我们现在可以利用这些信息告诉用户所选用户名不符合要求：


    ```

    init() {

    isUsernameAvailablePublisher

    .map { result in

    switch result {

    case .failure(let error):

    if case APIError.transportError(_) = error {

    return ""

    }

    else if case APIError.validationError(let reason) = error {

    return reason

    }

    else {

    return error.localizedDescription

    }

    case .success(let isAvailable):

    return isAvailable ? "" : "此用户名不可用"

    }

    }

    .assign(to: &$usernameMessage)

    ```


    没错——只需三行代码。我们已经完成了所有繁重的工作，现在是时候享受成果了。![](img/509862_1_En_10_Figa_HTML.gif) 一个黑白像素艺术图案，呈现倒锥形，带有
    3 个类似细丝的粗延伸物，周围散布着点状图案。


    ### 处理响应解析错误


    在许多情况下，服务器发送的数据与客户端预期的数据不匹配：


    * 响应中包含额外数据，或者某些字段被重命名。

    * 客户端通过强制门户（例如在酒店中）进行连接。


    在这些情况下，客户端接收到了数据，但格式不正确。为了帮助用户解决问题，我们需要分析响应并提供适当的指导，例如：


    * 下载最新版本的应用。

    * 通过系统浏览器登录强制门户。


    当前实现使用`decode`运算符来解码响应有效负载，并在无法映射有效负载时抛出错误。这种方法效果很好，任何解码错误都会被捕获并显示在用户界面上。然而，像"无法读取数据，因为数据缺失"这样的错误消息对用户并不友好。相反，我们尝试显示一个对用户更有意义的消息，并建议用户升级到最新版本的应用（假设服务器返回了额外数据，新版应用可以利用这些数据）。


    为了能够提供关于解码错误的更精细信息，我们需要放弃`decode`运算符，回退到手动映射数据（别担心，借助`JSONDecoder`和 Swift 的`Codable`协议，这相当简单）：


    ```

    // ...

    .map(\.data)

    // .decode(type: UserNameAvailableMessage.self,

    //         decoder: JSONDecoder())

    .tryMap { data -> UserNameAvailableMessage in

    let decoder = JSONDecoder()

    do {

    return try decoder.decode(UserNameAvailableMessage.self,

    from: data)

    }

    catch {

    throw APIError.decodingError(error)

    }

    }

    .map(\.isAvailable)

    // ...

    ```


    通过让`APIError`遵循`LocalizedError`协议并实现`errorDescription`属性，我们可以提供更用户友好的错误消息（我也为其他错误情况添加了自定义消息）：


    ```

    enum APIError: LocalizedError {

    /// 无效请求，例如无效 URL

    case invalidRequestError(String)

    /// 传输层错误，例如无法连接到服务器

    case transportError(Error)

    /// 收到无效响应，例如非 HTTP 结果

    case invalidResponse

    /// 服务器端验证错误

    case validationError(String)

    /// 服务器发送了意外格式的数据

    case decodingError(Error)

    var errorDescription: String? {

    switch self {

    case .invalidRequestError(let message):

    return "无效请求：\(message)"

    case .transportError(let error):

    return "传输错误：\(error)"

    case .invalidResponse:

    return "无效响应"

    case .validationError(let reason):

    return "验证错误：\(reason)"

    case .decodingError:

    return "服务器返回了意外格式的数据。请尝试更新应用。"

    }

    }

    }

    ```


    现在，为了向用户清楚表明他们应该更新应用，我们还将显示一个弹窗。以下是弹窗的代码：


    ```

    struct SignUpScreen: View {

    @StateObject private var viewModel = SignUpScreenViewModel()

    var body: some View {

    Form {

    // ...

    }

    // 显示更新对话框

    .alert("请更新", isPresented: $viewModel.showUpdateDialog, actions: {

    Button("升级") {

    // 打开应用在 App Store 的详情页面

    }

    Button("稍后再说", role: .cancel) { }

    }, message: {

    Text("您似乎正在使用此应用的旧版本。请更新您的应用。")

    })

    }

    }

    ```


    你会注意到，这个弹窗的呈现状态由视图模型上的一个已发布属性`showUpdateDialog`驱动。让我们相应地更新视图模型 (1)，并添加将`isUsernameAvailablePublisher`的结果映射到此新属性的
    Combine 管道。

    '
- fmt: "```swift\nclass SignUpScreenViewModel: ObservableObject {\n    // ...\n  \
    \  @Published var showUpdateDialog: Bool = false // (1)\n    // ...\n    private\
    \ lazy var isUsernameAvailablePublisher:\n        AnyPublisher =\n        $username\n\
    \            .debounce(for: 0.8, scheduler: DispatchQueue.main)\n            .removeDuplicates()\n\
    \            .flatMap { username -> AnyPublisher in\n                self.authenticationService\n\
    \                    .checkUserNameAvailablePublisher(userName: username)\n  \
    \                  .asResult()\n            }\n            .receive(on: DispatchQueue.main)\n\
    \            .share() // (3)\n            .eraseToAnyPublisher()\n    }()\n  \
    \  init() {\n        // ...\n        // decoding error: display an error message\n\
    \        // suggesting to download a newer version\n        isUsernameAvailablePublisher\n\
    \            .map { result in\n                if case .failure(let error) = result\
    \ {\n                    if case APIError.decodingError = error // (2) {\n   \
    \                     return true\n                    }\n                }\n\
    \                return false\n            }\n            .assign(to: &$showUpdateDialog)\n\
    \    }\n}\n```\n\nAs you can see, nothing too fancy—we essentially just take any\
    \ events coming in from the `isUsernameAvailablePublisher` and convert them into\
    \ a `Bool` that only becomes `true` if we receive a `.decodingError` (2).\n\n\
    We’re now using `isUsernameAvailablePublisher` to drive three different Combine\
    \ pipelines, and I would like to explicitly call out that—since `isUsernameAvailablePublisher`\
    \ eventually will cause a network request to be fired—it is important to make\
    \ sure we’re only sending *at most* one network request per keystroke. The previous\
    \ chapter explains how to do this in depth using the `share()` operator (3).\n\
    \n## Handling Internal Server Errors\n\nIn some rare cases, the backend of our\
    \ app might be having some issues—maybe part of the system is offline for maintenance,\
    \ some process died, or the server is overwhelmed. Usually, servers will return\
    \ a HTTP status code in the `5xx` range to indicate this.\n\nSimulating error\
    \ conditions\n\n> *The sample server includes code that simulates some of the\
