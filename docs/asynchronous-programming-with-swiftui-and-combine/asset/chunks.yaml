    \n这些策略的粒度依次递减。因此，如果你需要对主线程上运行的代码部分进行精细控制，请使用 `MainActor.run { }`。另一方面，通过用 `@MainActor`\
    \ 注解整个视图模型（通常是一个遵循 `@ObservableObject` 的类），你可以确保其内部的所有代码都在主线程上运行，除非是使用 `await`\
    \ 调用的，这种情况下它会在并发线程池上运行。\n\n因此，要解决我们代码中的问题，我们可以用 `@MainActor` 注解 `refresh` 函数：\n"
- fmt: "# 排版后的文档\n\n```swift\n@MainActor\nfunc refresh() async {\n    print(\"\\(#function)\
    \ is on main thread BEFORE await: \\(Thread.isMainThread)\")\n    let result =\
    \ await fetchRandomWord()\n    randomWord = result.word\n    print(\"\\(#function)\
    \ is on main thread AFTER await: \\(Thread.isMainThread)\")\n}\n```\n\nThis will\
    \ resolve any issues with accessing the UI from a background thread. Once we add\
    \ more functions that access the UI to our view model, it might be more efficient\
    \ to just annotate the entire class, like so:\n\n```swift\n@MainActor\nclass LibraryViewModel:\
    \ ObservableObject {\n    ...\n}\n```\n\n## Summary\n\nIn this chapter, you learned\
    \ how to use Swift 5.5’s new structured concurrency model in SwiftUI. SwiftUI\
    \ provides well thought-out mechanisms that make calling asynchronous code from\
    \ the UI as natural as possible.\n\nFor example, you can use the `.task` view\
    \ modifier to run asynchronous code when a view appears. When using `.task` instead\
    \ of `.onAppear`, SwiftUI will automatically take care of cancelling the task\
    \ as soon as the view disappears.\n\nSearching and refreshing data are other common\
    \ situations in which you often need to run asynchronous code. The `.refreshable`\
    \ and `.searchable` view modifiers create an asynchronous context for their closures,\
    \ so you can easily call asynchronous code inside.\n\nAnd if you need to call\
    \ asynchronous code from a nonasynchronous context (such as the action handler\
    \ of a `Button`), you can easily create an asynchronous context yourself by wrapping\
    \ your code in a `Task { }` block.\n\nYou also saw that it might sometimes be\
    \ more appropriate to use Combine to drive some of the UI instead of using `async/await`.\
    \ The `.searchable()` view modifier is a great example for an API that is more\
    \ suitable for being used with Combine.\n\nMany of the examples made use of `List`\
    \ views. Chapter 5 goes into more detail of how to build simple and advanced `List`\
    \ views.\n\nFootnotes [1](#509862_1_En_15_Chapter.xhtml#Fn1_source)\n\n# 16. Bringing\
    \ It All Together: SwiftUI, async/await, and Combine\n\nMobile applications have\
    \ to deal with a constant flow of events: user input, network traffic, and callbacks\
    \ from the operating system are all vying for your app’s attention. Building apps\
    \ that feel snappy is a challenging task, as you have to efficiently handle all\
    \ those events.\n\nCombine and `async/await` are some fairly recent addition to\
    \ the collection of frameworks and language features that aim at making this easier.\n\
    \nIn this chapter, we will explore commonalities and differences of Combine and\
    \ `async/await`, and I will show you how you can efficiently use both to call\
    \ asynchronous APIs in your SwiftUI apps.\n\nTo better understand the respective\
    \ characteristics, we will look at a couple of code snippets taken from a SwiftUI\
    \ screen that allows users to search for books by title. You will find the source\
    \ code for this sample app in this book’s GitHub repository.([124](#fn124))\n\n\
    ## Fetching Data Using Combine\n\nMany of Apple’s APIs are Combine-enabled, and\
    \ `URLSession` is one of them. To fetch data from a URL, we can call `dataTaskPublisher`\
    \ and then use some of Combine’s operators to handle the response and transform\
    \ it into a data model our application can work with. The following code snippet\
    \ shows a typical Combine pipeline for fetching data from a remote API, mapping\
    \ the result, extracting the information we need, and handling errors.\n\n> *Error\
    \ handling in this code snippet is rather basic. For a more in-depth discussion\
    \ of error handling in Combine and how to expose error messages to the user in\
    \ a meaningful way in SwiftUI apps, have a look at Chapter 10, in which this we\
    \ take a closer look at this important topic.*\n\n```swift\nprivate func searchBooks(matching\
    \ searchTerm: String) -> AnyPublisher<[Book], Never> {\n    let escapedSearchTerm\
    \ = searchTerm.addingPercentEncoding(withAllowedCharacters: .urlHostAllowed) ??\
    \ \"\"\n    let url = URL(string: \"https://openlibrary.org/search.json?q=\\(escapedSearchTerm)\"\
    )!\n    return URLSession.shared.dataTaskPublisher(for: url)\n        .map(\\\
    .data)\n        .decode(type: OpenLibrarySearchResult.self, decoder: JSONDecoder())\n\
    \        .map(\\.books)\n        .compactMap { openLibraryBooks in\n         \
    \   openLibraryBooks?.map { Book(from: $0) }\n        }\n        .replaceError(with:\
    \ [Book]())\n        .eraseToAnyPublisher()\n}\n```\n\nFor someone who is not\
    \ familiar with Combine, it might not be immediately obvious how this code works,\
    \ let alone being able to put together a pipeline like this. Getting into a functional\
    \ reactive mindset probably is one of the biggest hurdles when learning Combine.\n\
    \n## Fetching Data Using async/await\n\nLet’s now look at how to implement the\
    \ same method using `async/await`. Apple has made sure that the most important\
    \ asynchronous APIs can be called using `async/await`. To fetch data from a URL,\
    \ we can asynchronously call `await URLSession.shared.data(from: url)`. By wrapping\
    \ this call inside a `try catch` block, we can add the same kind of error handling\
    \ we implemented in the previous code snippet and return an empty array in case\
    \ an error occurred.\n\nTo make it easier for them (and other SDK providers like\
    \ Firebase), Apple implemented a concurrency interoperability with Objective-C.([125](#fn125))\
    \ In a nutshell, this ensures that the Swift compiler emits an async version of\
    \ every Objective-C method that has a completion block. To learn more about how\
    \ this works, check out my video “Using async/await with Firebase,”([126](#fn126))\
    \ in which I explain this in more detail.\n\n```swift\nprivate func searchBooks(matching\
