- fmt: '# Summary


    Congratulations, you made it until the end of one of the longest chapters in this
    book! Lists are not only one of the more frequently used UI patterns in SwiftUI;
    they also are very flexible and can be customized in many ways.


    In this chapter, you learned a lot about Lists and their look and feel; we talked
    about static and dynamic lists (and how to connect them to your app’s data model),
    how to style the lists themselves and their cells, and we talked about how to
    add interaction to lists by adding swipe actions.


    Finally, we brought together what you learned so far and dived into how to manage
    focus in dynamic list views.


    With this under your belt, you will be able to build even more sophisticated UIs.


    In the next chapter, we will take a look at `List` view’s cousin, Form, and you
    will learn how to build elegant input `forms` with surprisingly little effort.


    Footnotes [1](#509862_1_En_5_Chapter.xhtml#Fn1_source)   [2](#509862_1_En_5_Chapter.xhtml#Fn2_source)   [3](#509862_1_En_5_Chapter.xhtml#Fn3_source)   [4](#509862_1_En_5_Chapter.xhtml#Fn4_source)   [5](#509862_1_En_5_Chapter.xhtml#Fn5_source)   [6](#509862_1_En_5_Chapter.xhtml#Fn6_source)   [7](#509862_1_En_5_Chapter.xhtml#Fn7_source)   [8](#509862_1_En_5_Chapter.xhtml#Fn8_source)   [9](#509862_1_En_5_Chapter.xhtml#Fn9_source)   [10](#509862_1_En_5_Chapter.xhtml#Fn10_source)   [11](#509862_1_En_5_Chapter.xhtml#Fn11_source)   [12](#509862_1_En_5_Chapter.xhtml#Fn12_source)


    # 6. Building Input Forms


    When you hear the term “forms,” you probably don’t think your app needs many forms,
    and you most definitely won’t get excited (unless you’re a person who likes filling
    out forms). However, you might be surprised to hear that forms are an important
    way to build UIs, especially on Apple’s platforms.


    Just think about it: your app most likely has a setting screen—and that’s technically
    a form. Your app might also have a login screen—again, that’s a form! And if you
    have any sort of data entry—guess what, that’s a form too.


    When Apple first released the iPhone iOS SDK (as it was called back then), they
    didn’t provide a first-class way to build input forms. Developers quickly figured
    out that `UITableView`, originally built for tabular representations of data,
    could also be used to display input forms. However, as `UITableView`’s APIs (`UITableViewDataSource`
    and `UITableViewDelegate`) weren’t built with this use case in mind, it has always
    been a bit cumbersome to build forms based on these APIs—for example, you had
    to keep track of which row you’re currently on to decide which subclass of `UITableViewCell`
    to vend to display the correct form cell.


    SwiftUI gave Apple the opportunity to start from a clean slate and come up with
    concepts and APIs that better meet modern application’s needs and finally address
    what developers had been telling them for years.


    Being such an important part of many iOS apps, Apple added a dedicated API for
    building forms to SwiftUI.


    In this chapter, you will see that it is straightforward to build great-looking
    forms, and—who knows?—by the end of it maybe you’ll be really excited about forms
    too!


    ## Building Simple Forms


    We’ll first cover the basics and look at how to build a simple form for displaying
    static data. We will also learn how to bind a form’s UI elements to your data
    model. From there, it’s just a small step to learn how to use input elements like
    `TextField` or `Toggle` to edit form data. This will also give us the opportunity
    to discuss whether (or rather when) to use `@State` or `@StateObject`.


    Getting started with forms is remarkably simple—the SwiftUI team has designed
    the forms API so that you can continue using the UI elements you already know
    (such as `Text`, `Label`, `Button`, `Image`, etc.), and SwiftUI will take care
    of rendering them so that they look like the stock forms UI we all know from the
    iOS settings app.


    This is a recurring theme in SwiftUI—you as a developer/designer specify *what*
    you want to display, and SwiftUI will figure out *how* to best do this on the
    respective platform. In the end, it’s a mixture of both—you’ll end up tweaking
    your code quite a bit to make the UI look exactly as you’d like it to.


    The simplest form you can build in SwiftUI is to wrap the *Hello World* text from
    the SwiftUI application template in a `Form`, like this:


    ```

    struct ContentView: View {

    var body: some View {

    Form {

    Text("Hello, world!")

    }

    }

    }

    ```


    This turns the `Text` view into a simple tabular form.


    ![](images/509862_1_En_6_Chapter/509862_1_En_6_Fig1_HTML.png)


    > *If you’ve done any UIKit development before, this will look remarkably like
    a* `UITableView` *to you, and Apple might actually be using a* `UITableView` *under
    the hood to achieve this look and feel—but we shouldn’t make any assumptions,
    as Apple doesn’t make any guarantees about how they render SwiftUI views on screen.*


    Let’s build a simple form for displaying information about a book to get to know
    some additional form elements.


    We’ll start out by using static text, but as we progress, we will replace this
    with a data model to enable our users to actually edit the data on the form.


    You can use most SwiftUI view inside a `Form` view, and you already learned how
    to use a simple `Text` view in a form. We can also use view modifiers to style
    our views, so here’s a red headline text:


    ```

    struct ContentView: View {

    var body: some View {

    Form {

    Text("Asynchronous Programming with SwiftUI and Combine")

    .font(.headline).foregroundColor(.red)

    }

    }

    }

    ```


    Not everything that’s possible is also always a good idea, so please use good
    judgment when styling form elements.


    It’s also possible to use `Image`s inside a form, so let’s display the book cover,
    like this:


    ```

    struct ContentView: View {

    var body: some View {

    Form {

    Text("Asynchronous Programming with SwiftUI and Combine")

    .font(.headline).foregroundColor(.red)

    Image("book-cover-combine")

    }

    }

    }

    ```


    Now, we could display the book’s author and the number of pages using a `Text`
    view, but wouldn’t it be nice to display a little icon next to the text to make
    it easier for the user to quickly distinguish these fields at a glance? For this,
    we can use `Label`:


    ```

    struct ContentView: View {

    var body: some View {

    Form {

    Text("Asynchronous Programming with SwiftUI and Combine")

    .font(.headline).foregroundColor(.red)

    Image("book-cover-combine")

    Label("Peter Friese",

    systemImage: "person.crop.rectangle")

    Label("451 pages", systemImage: "book")

    }

    }

    }

    ```'
