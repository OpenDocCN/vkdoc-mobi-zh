    ### Synchronizing a Local Source of Truth with the Global Source of Truth by Using
    @Binding and @ObservableObject


    If you run this application now, you will notice something odd: the drill-down
    navigation works as expected, and you’re able to edit a book using the `BookEditView`.
    But any changes aren’t reflected in `BookDetailsView` or `BooksListView`.


    This is because we create a new `@ObservableObject` every time the `BookEditView`
    is displayed, effectively installing a new source of truth.


    To understand why this is the case, let’s take a closer look at the flow of information:


    *   `BookShelfApp` holds a reference to `BooksViewModel`. By using the `@StateObject`
    property wrapper, we make sure this `ObservableObject` is only instantiated once,
    effectively turning it into the root source of truth for the application.


    *   `BookShelfApp` then passes a reference to this source of truth to `BooksListView`,
    which stores it in a local property as an `@ObservedObject`. Since this is a reference
    to the root source of truth, all changes we make to it inside `BooksListView`
    will not only be reflected in `BooksListView` and its child views, but also on
    the app and any child view that is connected to the `@StateObject` in `BookShelfApp`.


    *   `BooksListView` uses list bindings to iterate over the individual books contained
    in the array of books on `BooksViewModel`, and instantiates a new `BookRowView`,
    passing a `Binding` to the book.


    *   `BookRowView` displays some of the properties of the book and passes the `Binding`
    to `BookDetailsView`.


    *   `BookDetailsView` passes this `Binding` to `BookEditView`.


    So far, the flow of information is still connected both ways: any changes to the
    source of truth in `BookShelfApp` will percolate down the view hierarchy and will
    be reflected on the respective views. Likewise, any changes to the `book` instance
    (which is a `@Binding` inside `BookEditView`) will be reflected on the source
    of truth in `BookShelfApp`.


    However, by instantiating a new `@ObservedObject` of `BookEditViewModel` in `BookEditView`,
    we establish a new source of truth. All UI elements in `BookEditView` are connected
    to this local source of truth, so all changes the user makes in the UI will only
    be reflected on this instance.


    ![](images/509862_1_En_6_Chapter/509862_1_En_6_Fig8_HTML.png)


    A flowchart depicts the flow of bookshelf app, books list view, book row view,
    book details view, and book edit view, with the books view model, and book edit
    view, model.


    Figure 6-8


    Using @Binding to update the source of truth


    There are a couple of ways to work around this:


    First, we could change the `book` property in `BookEditViewModel` to be a `@Binding`
    instead of an `@Published` property. However, this would prevent us from using
    this property as a Combine publisher (which we will get to in a minute).


    The second option is to add a completion handler to `BookEditViewModel`, which
    we can call once the user finished editing the book. When the completion handler
    is called, we can update the edited book on the original source of truth. This
    option doesn’t feel very SwiftUI-y, though. If you look at other SwiftUI components
    that are similar, such as `ColorPicker`, you will notice that they accept a `Binding`.


    So let’s look at another option: let’s try passing in a `Binding`, copy its value
    into an `@Published` property on a view model that is local to the `BookEditView`
    only, and, once the user finishes editing, assign it back to the `Binding`.


    To properly implement this functionality, let’s first add a *Cancel* and *Save*
    button to the `BookEditView` and add handlers for their *tap* events:'
