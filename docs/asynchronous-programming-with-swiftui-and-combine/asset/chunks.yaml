    \ under library view dot swift on the pane on the right.](images/509862_1_En_15_Chapter/509862_1_En_15_Fig7_HTML.png)\n\
    \n**Figure 15-7.** Back in the closure of the `refreshable` view modifier, the\
    \ code continues executing on the main thread\n\nIf you compare the call stacks\
    \ in Figure [15-3](#509862_1_En_15_Chapter.xhtml#Fig3) and Figure [15-7](#509862_1_En_15_Chapter.xhtml#Fig7),\
    \ you will realize that both execute on the same thread (Thread 1), but all the\
    \ other methods executed on different threads, so what happened here?\n\nAs mentioned\
    \ in the previous chapter, Swift’s new concurrency model will use as many threads\
