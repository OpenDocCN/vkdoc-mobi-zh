    # 3. SwiftUI Building Blocks


    In the previous chapter, you learned how to use SwiftUI to build a simple UI and
    how to use Xcode’s refactoring tools to keep your code nicely organized and reusable.
    You also used SwiftUI’s state management system which keeps your app’s views and
    its data model in sync all the time.


    Now that you’ve used SwiftUI’s key components, like *views*, *view modifiers*,
    and *property wrappers*, let’s take a closer look and understand how they work.


    In this chapter, we will look at SwiftUI’s building blocks, learn how they work,
    and how they allow developers to efficiently build UIs. Specifically,


    *   You will learn what views *really* are and how they help you describe your
    UI declaratively


    *   We will talk about different kinds of views in SwiftUI—user interface views
    and container views


    *   We will also look at view modifiers and their role in configuring views


    By the end of the chapter, you will have a more profound understanding of how
    SwiftUI works and how the individual concepts play together to make SwiftUI an
    easy-to-use DSL^([^(29)](#fn29)) for building UIs.


    ## Views


    SwiftUI follows a declarative approach for describing UIs. Instead of manually
    instantiating the elements of your UI, such as buttons, labels, lists, and so
    on, you declare how you want your UI to look like. Views are the most basic components
    for building UIs in SwiftUI. To define the UI of your application, you create
    a lightweight description of your user interface, making use of SwiftUI’s built-in
    views. By doing so, you compose your own views, which you can then use in your
    app.


    In addition to using these views in your own app, you can make them reusable by
    extracting them into s Swift package. This enables you to use them in your other
    apps, or share them with other developers on your team. You can even make them
    available to other developers by uploading them to GitHub and registering them
    with the Swift Package Index.^([^(30)](#fn30))


    In Chapters [1](#509862_1_En_1_Chapter.xhtml) and [2](#509862_1_En_2_Chapter.xhtml),
    you have already used the following techniques for building reusable SwiftUI components:


    *   You used some of SwiftUI’s built-in views (such as `Text` and `Image`) to
    create simple UIs (such as the *Hello World* sample in Chapter [1](#509862_1_En_1_Chapter.xhtml)).


    *   In Chapter [2](#509862_1_En_2_Chapter.xhtml), you created a reusable view
    (`BookRowView`) for displaying details about books, and then reused it inside
    a `List` view.


    Let’s look at the basic anatomy of a SwiftUI view. When you create a new SwiftUI
    file in Xcode, you will end up with a piece of code like the following:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    VStack {

    Image(systemName: "globe")

    .imageScale(.large)

    .foregroundColor(.accentColor)

    Text("Hello, world!")

    }

    .padding()

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    The `PreviewProvider` is responsible for displaying the view in Xcode’s preview
    canvas.


    ![](images/509862_1_En_3_Chapter/509862_1_En_3_Fig1_HTML.png)


    A screenshot of the Simple View window has content view dot swift selected from
    the panel on the left. The content view dot swift tab has a code selected from
    a pane on the left, and a mobile screen on the right has the text hello world.
    It has options for text, accessibility, font, padding, and frame on the right.


    Figure 3-1


    A simple view in Xcode’s preview canvas


    Leaving the `PreviewProvider` aside for a moment, let’s focus on a simplified
    version of `ContentView`:


    ```

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    }

    }

    ```


    This short snippet defines a simple view, named `ContentView`, that contains a
    `Text` view which displays *Hello World*.


    Despite being such a short code snippet, we can learn a lot about the power of
    SwiftUI from it.


    SwiftUI views are structs that need to conform to the `View` protocol. Looking
    at the source code for the `View` protocol, we can see that conformers need to
    implement a computed property named body that returns a *single* `View`:


    ```

    @available(iOS 13.0, macOS 10.15, tvOS 13.0, watchOS 6.0, *)

    public protocol View {

    associatedtype Body : View

    @ViewBuilder @MainActor var body: Self.Body { get }

    }

    ```


    Our simple Hello World snippet contains a computed `body` property that returns
    a simple `Text` view, so it meets the requirements of the `View` protocol.


    To implement more complex views, such as a label with a leading icon, we can make
    use of SwiftUI’s container views, such as `Group`, `HStack`, or `VStack`. Container
    views allow us to group child views and arrange them in a specific layout, for
    example, horizontally or vertically. The following code snippet uses a `VStack`
    to arrange an `Image` and a `Text` vertically:


    ```

    struct ContentView: View {

    var body: some View {

    VStack {

    Image(systemName: "globe")

    .imageScale(.large)

    .foregroundColor(.accentColor)

    Text("Hello, world!")

    }

    .padding()

    }

    }

    ```'
