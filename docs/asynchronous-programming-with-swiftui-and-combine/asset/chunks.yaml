- fmt: '# Combining Publishers


    When building applications, we find ourselves quite often in need of observing
    multiple events. In the pizza delivery service, we want to make sure to not keep
    our delivery couriers waiting. So, we will only ask them to get ready once the
    order has actually been placed and the address has been validated.


    Updating the order status and validating the address are two different processes,
    so we have two separate publishers for them:


    ```

    let orderStatusPublisher = NotificationCenter

    .default

    .publisher(for: .didUpdateOrderStatus, object: margheritaOrder)

    .compactMap { notification in

    notification.userInfo?["status"] as? OrderStatus

    }

    .eraseToAnyPublisher()

    let shippingAddressValidPublisher = NotificationCenter

    .default

    .publisher(for: .didValidateAddress,

    object: margheritaOrder)

    .compactMap { notification in  notification.userInfo?["addressStatus"] as? AddressStatus

    }

    .eraseToAnyPublisher()

    ```


    By calling the `.eraseToAnyPublisher()` operator at the end of a pipeline, the
    type of the pipeline gets erased to `AnyPublisher<Output, Never>`. The unerased
    type of this publisher is `Publishers.CompactMap<NotificationCenter.Publisher,
    OrderStatus>`, which is a lot harder to read. It is a good idea to type-erase
    the result type of any pipelines you want to pass on to a different part of your
    code, for example, as a return type of a function or a property.


    To determine whether we can ship the order, we need to evaluate the results of
    both of these pipelines. We only want to allocate a delivery courier if the order
    has been placed and the address is valid.


    To achieve this, we need to create a new publisher that subscribes to `orderStatusPublisher`
    and `shippingAddressValidPublisher` and returns `true` once the order is `.placed`
    and the address is `.valid`. Combining several pipelines into one is a task that
    is rather common in Combine, and there are several publishers that we can choose
    from:


    *   `Zip`

    *   `Merge`

    *   `CombineLatest`

    *   …and more


    The one that’s most suitable for our use case is `CombineLatest`—it takes the
    latest value from each of the upstream publishers.


    ```

    let readyToProducePublisher = Publishers

    .CombineLatest(orderStatusPublisher,

    shippingAddressValidPublisher)

    readyToProducePublisher

    .print()

    .map { (orderStatus, addressStatus) in

    orderStatus == .placed && addressStatus == .valid

    }

    .sink {

    print("- Ready to ship order: \($0)")

    }

    ```


    To make it easier to see the flow of events, I’ve added the `.print()` operator
    to the pipeline. Let’s send a couple of events to simulate a pizza ordering process:


    ```

    NotificationCenter

    .default

    .post(name: .didValidateAddress,

    object: margheritaOrder,

    userInfo: ["addressStatus": AddressStatus.invalid])

    NotificationCenter

    .default

    .post(name: .didUpdateOrderStatus,

    object: margheritaOrder,

    userInfo: ["status": OrderStatus.placed])

    NotificationCenter

    .default

    .post(name: .didValidateAddress,

    object: margheritaOrder,

    userInfo: ["addressStatus": AddressStatus.valid])

    ```


    In the beginning, the address isn’t valid yet, and the order is placed before
    we can verify the address (we might be using a third-party service that takes
    a moment to perform the check).


    Here is the output:


    ```

    receive subscription: (CombineLatest)

    request unlimited

    receive value: ((Combine_Playground_Sources.OrderStatus.placed, Combine_Playground_Sources.AddressStatus.invalid))

    - Ready to ship order: false

    receive value: ((Combine_Playground_Sources.OrderStatus.placed, Combine_Playground_Sources.AddressStatus.valid))

    - Ready to ship order: true

    receive cancel

    ```


    The lines not starting with a dash are the debug output of the `.print()` operator.
    You can see how the order is deemed ready for shipment only once we receive an
    `OrderStatus` of `.placed` and an `AddressStatus` of `.valid`.


    ## Summary


    In this chapter, you learned the basics of Combine:


    *   Publishers emit values (such as the text a user enters into a text input field)
    over time.

    *   Subscribers can receive values, and can either assign them to variables (using
    the `.assign` subscriber), or process them further (using the `.sink` subscriber).

    *   Often, you need to transform values to make them useful for subscribers, and
    this is where Operators come into play.


    You learned how to use Combine’s operators to transform events they receive from
    upstream publishers and how this makes consuming events easier for subscribers.
    Apps often need to observe multiple event streams (e.g., the state of the fields
    on a shipping form), and you learned how to use Combine’s operators to combine
    multiple event streams into one.


    Combine almost feels like a DSL (domain-specific language) for describing the
    processing of the events that occur in our apps. This declarative approach makes
    it very similar to SwiftUI, and that’s one of the reasons why they go together
    well.


    In the next chapter, we will dive deeper into how you can combine SwiftUI and
    Combine and how using Combine in your SwiftUI apps will make it easier to implement
    your user-facing application logic.


    # 8. Driving UI State with Combine


    Modern UIs have to respond to a multitude of input signals at the same time: users
    can communicate with an app using keyboard input, multitouch, physical gestures,
    and even voice commands. On top of this, applications might receive data from
    remote servers and local APIs.


    Juggling all these input sources and the plethora of events they’re sending is
    a challenging task for us developers, as we often find ourselves in situations
    that require us to combine several input sources, and making sure the app and
    its user interface always stay in sync.


    In this and the following chapters, we’re going to look at how Combine helps us
    build UIs that handle several event sources at the same time, such as the user’s
    input and results from local and remote validation logic, making sure the UI reflects
    the state of the app at all times.


    At the end of Chapter 6, you already saw how to use Combine to implement input
    validation for a single input field on an input form. Back then, we implemented
    validation logic for an ISBN field, both using `onChange(of:)` and Combine. To
    demonstrate the power of Combine, we are going to implement a more complex example
    with multiple event sources.'
