    \n### 何时使用\n\n在以下情况下使用`@StateObject`：\n\n- 当你需要监听`ObservableObject`中的更改或更新时\n\
    - 并且你希望监听的实例是在视图本身中创建的\n\n也就是说，当要使用该对象的视图是该数据的所有者时。\n\n# `@ObservedObject`\n\n\
    与`@StateObject`类似，`@ObservedObject`包装了一个`ObservableObject`，使其在视图中可用，以便视图（及其子视图）可以订阅该对象的已发布属性。\n\
    \n与`@StateObject`不同，由`@ObservedObject`包装的对象会在每次视图被重新创建时被重新创建。让我们沿用之前的代码片段，但这次使用`@ObservedObject`而不是`@StateObject`：\n\
    \n```\nclass Counter: ObservableObject {\n    @Published var count = 0\n}\n\n\
    struct ObservedStepper: View {\n    @ObservedObject var counter = Counter()\n\
    \    \n    var body: some View {\n        Section(header: Text(\"@ObservedObject\"\
    )) {\n            Stepper(\"Counter: \\(counter.count)\", value: $counter.count)\n\
    \        }\n    }\n}\n\nstruct ContentView: View {\n    @State var color: Color\
    \ = Color.accentColor\n    \n    var body: some View {\n        VStack(alignment:\
    \ .leading) {\n            ObservedStepper()\n            ColorPicker(\"Pick a\
    \ color\", selection: $color)\n        }\n        .foregroundColor(color)\n  \
    \  }\n}\n```\n\n运行这段代码时，每当用户选择一种颜色，`counter`都会被重新创建，导致`count`被重置为零。对用户来说，界面就像患了失忆症一样。\n\
    \n在 SwiftUI 的第一个版本中，`@ObservedObject`是在视图内创建和观察对象的唯一方式。现在你仍然可以这样做（至少编译器不会抛出警告，而且可能仍有不少\
    \ SwiftUI 应用在使用这种方法），但使用`@ObservedObject`来*创建*模型对象是一种应该避免的反模式。\n\n所以如果你看到这样的代码：`@ObservedObject\
    \ var foo = Bar()`，你应该重构代码并使用`@StateObject`。\n\n### 何时使用\n\n在以下情况下使用`@ObservedObject`：\n\
    \n- 当你需要监听`ObservedObject`中的更改和更新时\n- 并且你想要在视图中观察的对象*不是*由该视图创建的，而是由视图外部创建的（例如，在父视图或应用结构中）\n\
    \n# `@EnvironmentObject`\n\n理论上，`@StateObject`和`@ObservedObject`应该能为你提供足够的灵活性来构建任何需要访问共享状态的应用。在大多数情况下，你可以在应用的某个地方创建一个对象——例如，在应用对象本身中，或在某个顶级视图中，如主导航视图。然后，你可以通过将该对象注入到需要访问它的任何子视图的构造函数中，将其传递到视图层次结构中。\n\
    \n然而，并非所有视图都需要访问所有数据。例如，你的应用可能有一个表示已登录用户的共享状态。你可能想在主屏幕上显示用户的头像，也可能想在个人资料屏幕上显示他们的名字和姓氏，但要进入个人资料屏幕，用户可能需要先通过几个设置界面。而这些界面可能根本不需要访问用户对象。将用户对象拖过整个导航层次结构不仅没有必要，而且还会在不必要的地方在中间屏幕和用户对象之间创建紧密耦合。\n\
    \n对于这种情况，你可以使用`@EnvironmentObject`。顾名思义，它从环境中获取一个`ObservableObject`，并将其提供给视图。要注入一个对象到环境中，可以在任意视图上调用`.environmentObject(myObject)`。这将使`myObject`对所有子视图可用。要从环境中检索对象，可以在视图上声明一个属性，并将其标记为`@EnvironmentObject`。\n\
    \n```\nclass UserProfile: ObservableObject {\n    @Published var name: String\n\
    }\n\nstruct EnvironmentObjectSampleScreen: View {\n    @StateObject var profile\
    \ = UserProfile(name: \"Peter\")\n    @State var isSettingsShown = false\n   \
    \ \n    var body: some View {\n        VStack(alignment: .leading) {\n       \
    \     // ...\n        }\n        .sheet(isPresented: $isSettingsShown) {\n   \
    \         NavigationView {\n                SettingsScreen()\n            }\n\
    \            .environmentObject(profile) // 非常重要，必须放在这里，而不是 NavigationView 内部！参见\
    \ https://developer.apple.com/forums/thread/653367\n        }\n    }\n}\n\nstruct\
    \ SettingsScreen: View {\n    var body: some View {\n        VStack(alignment:\
    \ .leading) {\n            NavigationLink(destination: UserProfileScreen()) {\n\
    \                Text(\"User Profile\")\n            }\n        }\n    }\n}\n\n\
    struct UserProfileScreen: View {\n    @EnvironmentObject var profile: UserProfile\n\
    \    \n    var body: some View {\n        VStack(alignment: .leading) {\n    \
    \        Form {\n                Section(header: Text(\"User profile\")) {\n \
    \                   TextField(\"Name\", text: $profile.name)\n               \
    \ }\n            }\n        }\n    }\n}\n```\n\n虽然可能很想为所有状态对象使用`@EnvironmentObject`，但值得注意的是，这种方法有一个严重的缺点：编译器无法检查你在尝试使用`@EnvironmentObject`获取环境中的`ObservableObject`之前是否已经注入了它。当试图从环境中检索一个不存在的对象时，你的应用将因运行时错误而崩溃。\n\
    \nSwiftUI 环境是一个非常强大的机制，我们将在后续章节中深入探讨更多细节。\n\n### 何时使用\n\n在以下情况下使用`@EnvironmentObject`：\n\
    \n- 当你需要监听`ObservedObject`中的更改和更新时\n- 并且你不得不将一个`ObservedObject`通过几个不需要该对象的视图传递，然后才能到达需要访问该对象的视图\n"
- fmt: '# Summary


    In this chapter, you learned how SwiftUI handles state and makes sure that the
    user interface always stays in sync with application’s state.


    We briefly touched on SwiftUI’s relation to the Combine framework and learned
    that an `ObservableObject` really is a Combine publisher that communicates all
    updates to its published properties to the SwiftUI views that are subscribed to
    it.


    You learned about the three different property wrappers—`@StateObject`, `@ObservedObject`,
    and `@EnvironmentObject`—how they manage the life cycle of the observable objects
    they wrap, and when you should know which to connect your views to your application’s
    state.


    Congrats, you’ve mastered one of the key building blocks of SwiftUI apps!


    Footnotes [1](#509862_1_En_4_Chapter.xhtml#Fn1_source) [2](#509862_1_En_4_Chapter.xhtml#Fn2_source)


    # 5. Displaying Data in Lists


    List views are probably one of the most important UI structures in iOS apps, and
    you’ll be hard-pressed to find an app that doesn’t use some sort of list.


    SwiftUI makes it particularly easy to build list views: it just takes three lines
    of code to create a simple list! At the same time, SwiftUI’s `List` view is extremely
    powerful and versatile, so it pays off to get to know it in a little bit more
    detail.


    In this chapter, you will learn everything you need to know about `List` views,
    from simple lists, styling lists and their items, displaying collections of data
    in list views, implementing actions on lists and individual list items, iOS, iPadOS,
    and macOS.


    ## Getting Started with Lists in SwiftUI


    When you create a new SwiftUI view, Xcode will use a template that looks like
    this:


    ```

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    }

    }

    ```


    The simplest way to build a list is to create a new SwiftUI view and wrap the
    *Hello World* text in a `List`:


    ```

    struct StaticListView: View {

    var body: some View {

    List {

    Text("Hello, world!")

    }

    }

    }

    ```


    This will show a static text inside a list view.


    A screenshot of a window reads a set of program codes on the left side. A mobile
    phone screen with text reads a list with simple rows, hello world.


    Figure 5-1: A simple list view with one static text item


    To add more items to the list, we can just add another line:


    ```

    List {

    Text("Hello, world!")

    Text("Hello, SwiftUI!")

    }

    ```


    ### Using Other SwiftUI Views Inside List Rows


    The cool thing about the `List` view is that you can use any type of SwiftUI view
    as a list row, not just `Text`. `Labels`, `Sliders`, `Steppers`, `Toggles`, `TextFields`,
    `SecureFields` for entering passwords, `ProgressViews`, and `Pickers`—you name
    it.


    ```

    struct StaticListView2: View {

    @State var number: Int = 42

    @State var degrees: Double = 37.5

    @State var toggle = true

    @State var name = "Peter"

    @State var secret = "s3cr3t!"

    var fruits = ["Apples", "Bananas", "Mangoes"]

    @State var fruit = "Mangoes"

    var body: some View {

    List {

    Text("Hello, world!")

    Label("The answer", systemImage: "42.circle")

    Slider(value: $degrees, in: 0...50) {

    Text("\(degrees)")

    } minimumValueLabel: {

    Text("min")

    } maximumValueLabel: {

    Text("max")

    }

    Stepper(value: $number, in: 0...100) {

    Text("\(number)")

    }

    Toggle(isOn: $toggle) {

    Text("Checked")

    }

    TextField("Name", text: $name)

    SecureField("Secret", text: $secret)

    ProgressView(value: 0.3)

    Picker(selection: $fruit, label: Text("Pick your favourite fruit")) {

    ForEach(fruits, id: \.self) { fruit in

    Text(fruit)

    }

    }

    }

    }

    }

    ```


    A window screen reads a set of program codes on the left side. A mobile phone
    screen with text reads a list with multiple sims, the answer, and the checked
    option is enabled, and pick your favorite fruit is on the right.


    Figure 5-2: List with advanced SwiftUI views


    ### Building Custom List Rows


    And thanks to SwiftUI’s stack-based layout system, you can easily create custom
    rows as well. In this example, we’re using `VStack` to lay out two `Text` views
    on top of each other, replicating the typical title and details layout that is
    widely used in many iOS apps.


    ```

    struct StaticListWithSimpleCustomRowView: View {

    var body: some View {

    List {

    VStack(alignment: .leading) {

    Text("Apples")

    .font(.headline)

    Text("Eat one a day")

    .font(.subheadline)

    }

    VStack(alignment: .leading) {

    Text("Bananas")

    .font(.headline)

    Text("High in potassium")

    .font(.subheadline)

    }

    }

    }

    }

    ```


    Adding custom rows like this is quick and easy, but the code will grow rapidly
    as we add more rows, and this will make it harder to understand and update it
    when we need to make changes. To prevent this from happening, we can extract the
    code for the list rows into a separate view, making it reusable:


    ```

    struct StaticListWithSimpleCustomRowView: View {

    var body: some View {

    List {

    CustomRowView(title: "Apples", subtitle: "Eat one a day")

    CustomRowView(title: "Bananas", subtitle: "High in potassium")

    }

    }

    }

    private struct CustomRowView: View {

    var title: String

    var subtitle: String

    var body: some View {

    VStack(alignment: .leading) {

    Text(title)

    .font(.headline)

    Text(subtitle)

    .font(.subheadline)

    }

    }

    }

    ```


    A window screen reads a set of program codes on the left side. A mobile phone
    screen with text reads a list with custom row, apples eat one a day, bananas high
    in potassium.


    Figure 5-3: Custom List Rows


    To learn more about refactoring SwiftUI code, check out this video^([^(38)](#fn38)),
    in which I show the process of refactoring SwiftUI views in more detail.


    ### More Complex List Rows


    SwiftUI’s layout system is both flexible and easy to use and makes it easy to
    create even complex layouts using a combination of `HStack`, `VStack`, `ZStack`,
    and other SwiftUI views. Here is how you can create list rows with a title, a
    subtitle, a leading image, and a trailing number:


    A block of code with a list of apple, banana, and mango, with their respective
    descriptions of, eat one a day, high in potassium, and soft and sweet. The first
    line of code reads, struct static list with custom row view.


    ```

    private struct CustomRowView: View {

    var title: String

    var description: String?

    var titleIcon: String

    var count: Int

    init(_ title: String, description: String? = nil, titleIcon: String, count: Int
    = 1) {

    self.title = title

    self.description = description

    self.titleIcon = titleIcon

    self.count = count

    }

    var body: some View {

    HStack {

    Text(titleIcon)

    .font(.title)

    .padding(4)

    .background(Color(UIColor.tertiarySystemFill))

    .cornerRadius(10)

    VStack(alignment: .leading) {

    Text(title)

    .font(.headline)

    if let description = description {

    Text(description)

    .font(.subheadline)

    }

    }

    Spacer()

    Text("\(count)")

    .font(.title)

    }

    }

    }

    ```


    Notice how we made use of a custom initializer for `CustomRowView`, allowing us
    to get rid of the parameter name for the `title` property and to define defaults
    for some of the properties. As a result, it is now more convenient to use the
    custom row view.


    A window screen reads a set of program codes on the left side. A mobile phone
    screen with text reads a list with extracted row, apple 2, banana 3, and mango
    1.


    Figure 5-4: Complex List Rows


    ## Dynamic Lists


    So far, we looked at how to use `List` views to create *static* list views. Static
    list views are useful for creating menus or settings screens in iOS apps, but
    `List` views become a lot more useful when we connect them to a data source.


    Let’s now look at a couple of examples on how you can use `List` views to display
    a *dynamic* list of data, such as a list of books. We will also learn how to use
    some of the new features that Apple added to the latest version of SwiftUI in
    iOS 15, such as pull-to-refresh, a search UI, and an easy way to use async/await
    to fetch data from asynchronous APIs, such as remote services.'
