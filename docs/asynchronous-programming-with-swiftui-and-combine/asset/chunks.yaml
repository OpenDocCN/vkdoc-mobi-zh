    \n**图 15-2.** 从后台线程更新 UI\n\n这段代码异步地从 WordsAPI 获取一个随机单词，然后将其赋值给一个 `@Published`\
    \ 属性：\n\n```swift\nclass LibraryViewModel: ObservableObject {\n    @Published\
