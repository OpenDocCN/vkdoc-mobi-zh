    \ of the view taking the position of the original view. This means that the padded\
    \ version of the `Text` view is now taking the position of the original `Text`\
    \ view. Applying the `background` view modifier to this modified version of the\
    \ view results in the entire, padded, background being filled with the red background\
    \ color.\n\n### Applying View Modifiers to Child Views\n\nView modifiers work\
    \ on the view they are applied to. For example, in the previous code snippets,\
    \ we applied the `background` view modifier to a `Text` view.\n\nHowever, most\
    \ view modifiers also impact the children of the view they are applied to. Consider\
    \ the following code snippet, which applies the same monospace font to all labels\
    \ inside the `VStack`:\n\n```\nVStack(alignment: .leading) {\n    Text(\"Hello,\
    \ World!\")\n    Text(\"How are you today?\")\n}\n.font(.system(.body, design:\
    \ .monospaced))\n```\n\nThis is useful when you want to configure the appearance\
    \ of several views at once. By applying the respective view modifier to a shared\
    \ container view of the views you want to configure, you change the appearance\
    \ of all contained views at once.\n\nThere are also a few view modifiers that\
    \ propagate their value up the view hierarchy, for example, `navigationTitle`:\n\
    \n```\nNavigationStack {\n    HStack {\n        Text(\"Hello, World!\")\n    \
    \        .navigationTitle(\"Inner title\")\n    }\n    .navigationTitle(\"Outer\
    \ title\")\n}\n```\n\n![](images/509862_1_En_3_Chapter/509862_1_En_3_Fig5_HTML.png)\n\
    \nA screenshot of a mobile screen has the text inner title and hello world. The\
    \ option titled navigation title is given on the top left. It has various options\
    \ for play, mouse pointer, toggle, and zoom below.\n\n**Figure 3-5** — Setting\
    \ the navigation title on a child view\n\nIn this case, the inner `navigationTitle`\
    \ takes precedence—you can try this for yourself by commenting out the line that\
    \ says `.navigationTitle(\"Inner title\")`—as a result, the title of the screen\
    \ will change to “Outer title”."
  raw: '### Views Are Just Descriptions of the UI


    In the very first presentation of SwiftUI at WWDC 2019,^([^(33)](#fn33)) Apple
    put a lot of emphasis on the fact that SwiftUI views are cheap to create. In fact,
    they encouraged^([^(34)](#fn34)) developers to make liberal use of views and to
    decompose views into subviews to keep the code for individual screens and views
    easy to read and maintain.


    The reason for this is that SwiftUI views aren’t views—instead, they are just
    *descriptions* of views.


    Or, as Apple puts it in their SwiftUI documentation^([^(35)](#fn35)): “[…] *with
    a declarative approach, you create a lightweight description of your user interface
    by declaring views in a hierarchy that mirrors the desired layout of your interface.
    SwiftUI then manages drawing and updating these views in response to events like
    user input or state changes.*”


    To demonstrate this, let’s take a look at a simple view and the resulting view
    hierarchy that will be rendered on screen.


    ```

    struct ContentView: View {

    @State var text = ""

    var body: some View {

    List {

    Label("Hello World", systemImage: "globe")

    HStack {

    Image(systemName: "globe")

    .imageScale(.large)

    .foregroundColor(.accentColor)

    Text("Hello, world!")

    }

    TextField("TextField", text: $text)

    }

    }

    }

    ```


    ![](images/509862_1_En_3_Chapter/509862_1_En_3_Fig2_HTML.png)


    A screenshot of the View Hierarchy window on iPhone 14 Pro has highlighted codes
    from the panel on the left which points to hello world, a globe icon, and a text
    field on a screen on the right. It has options for the U I text field, appearance,
    clear button, autocorrelation, and auto-formatting on the right.


    Figure 3-2


    View hierarchy of the code snippet above running on iOS (using the Reveal app)


    Note how the `TextField` view is mapped to a `UITextField`, whereas the `Text`
    view is mapped to a `SwiftUI.DisplayList.ViewUpdater.Platform.CGDrawingView`.


    This is also one of the key reasons why SwiftUI can be used to define cross-platform
    UIs. As a view merely is a description of the UI, SwiftUI can use different primitives
    to render the UI on different platforms. Let’s look at another example to understand
    this. Here is the same code as earlier, but running on tvOS. Note how the view
    hierarchy shows UI controls native to tvOS.


    ![](images/509862_1_En_3_Chapter/509862_1_En_3_Fig3_HTML.png)


    A screenshot of the View Hierarchy T V window on the Apple T V has highlighted
    codes from the panel on the left which points to hello world, a globe icon, and
    a text field on a screen on the right. It has options for the U I text field,
    appearance, clear button, autocorrelation, auto-formatting, and keyboard on the
    right.


    Figure 3-3


    View hierarchy of the same code snippet running on tvOS (using the Reveal app)


    When creating UIs in SwiftUI, you should always keep in mind that views are just
    a description of the UI, not the actual UI elements themselves. Also keep in mind
    that SwiftUI may call your views several times throughout the rendering process—this
    is why you should not perform any expensive processing or computations inside
    the initializers of your views.


    ## View Modifiers


    View modifiers are another key concept in SwiftUI—they allow us to customize the
    appearance and behavior of our app’s views. For example, you can use view modifiers
    to


    *   Style your views


    *   Respond to events (like the user tapping on a button)


    *   Configure secondary views (like swipe actions, context menus, or toolbars)


    View modifiers are Swift methods that can be called on any SwiftUI `View`. They
    are implemented as extensions on the `View` protocol, which means you can call
    them on any `View`—both built-in views like `Text` or `Image` and also on your
    own custom views.


    Let’s take a closer look to understand how they work.


    ### Configuring Views


    To modify the appearance or behavior of a view, just call one of SwiftUI’s built-in
    view modifiers on the view instance. For example, here is how you can change the
    foreground color of a `Text` view to red:


    ```

    Text("Hello World")

    .foregroundColor(.red)

    ```


    By calling a modifier on a view, the modifier will create a new view that wraps
    the original view, and replaces it in the view hierarchy. For example, the type
    of the modified `Text` view will be `ModifiedContent<Text, _PaddingLayout>`.


    You can apply multiple view modifiers to the same view to change multiple aspects
    of its appearance. For example, to change the font of the text in addition to
    its foreground color, just call the `font` view modifier:


    ```

    Text("Hello, world!")

    .foregroundColor(.red)

    .font(.title)

    ```


    It is worth pointing out that the order in which view modifiers are added to a
    view is significant. In the following code snippet, the view modifiers on the
    `Text` view are applied in a different order, resulting in a different output:


    ```

    struct ContentView: View {

    var body: some View {

    HStack(spacing: 20) {

    // left

    Text("Hello, world!")

    .background(.red)

    .padding()

    Divider()

    // right

    Text("Hello, world!")

    .padding()

    .background(.red)

    }

    .frame(maxHeight: 50)

    }

    }

    ```


    ![](images/509862_1_En_3_Chapter/509862_1_En_3_Fig4_HTML.png)


    A screenshot has hello world written side by side in a text box in different color
    gradients. The option titled content view is given on the top left. It has various
    options for play, mouse pointer, toggle, and zoom below.


    Figure 3-4


    The order in which you apply view modifiers has an impact on the view’s appearance


    In the first example, the background color is applied to the `Text` view before
    applying the padding. This results in just the text being underlaid with the red
    background.


    In the second code snippet, the padding is applied first. As mentioned earlier,
    applying a view modifier results in an altered version of the view taking the
    position of the original view. This means that the padded version of the `Text`
    view is now taking the position of the original `Text` view. Applying the `background`
    view modifier to this modified version of the view results in the entire, padded,
    background being filled with the red background color.


    ### Applying View Modifiers to Child Views


    View modifiers work on the view they are applied to. For example, in the previous
    code snippets, we applied the `background` view modifier to a `Text` view.


    However, most view modifiers also impact the children of the view they are applied
    to. Consider the following code snippet, which applies the same monospace font
    to all labels inside the `VStack`:


    ```

    VStack(alignment: .leading) {

    Text("Hello, World!")

    Text("How are you today?")

    }

    .font(.system(.body, design: .monospaced))

    ```


    This is useful when you want to configure the appearance of several views at once.
    By applying the respective view modifier to a shared container view of the views
    you want to configure, you change the appearance of all contained views at once.


    There are also a few view modifiers that propagate their value up the view hierarchy,
    for example, `navigationTitle`:


    ```

    NavigationStack {

    HStack {

    Text("Hello, World!")

    .navigationTitle("Inner title")

    }

    .navigationTitle("Outer title")

    }

    ```


    ![](images/509862_1_En_3_Chapter/509862_1_En_3_Fig5_HTML.png)


    A screenshot of a mobile screen has the text inner title and hello world. The
    option titled navigation title is given on the top left. It has various options
    for play, mouse pointer, toggle, and zoom below.


    Figure 3-5


    Setting the navigation title on a child view


    In this case, the inner `navigationTitle` takes precedence—you can try this for
    yourself by commenting out the line that says `.navigationTitle("Inner title")`—as
    a result, the title of the screen will change to “Outer title”.'
  trans: "\n# 视图只是 UI 的描述\n\n在 2019 年 WWDC 上 SwiftUI 的首次演示中，^(³³)苹果公司极力强调 SwiftUI\
    \ 视图的创建成本很低。事实上，他们鼓励^(³⁴)开发者大量使用视图，并将视图分解为子视图，以便单个屏幕和视图的代码易于阅读和维护。\n\n这样做的原因是，SwiftUI\
    \ 视图并非真正的视图——而只是对视图的*描述*。\n\n或者，正如苹果在其 SwiftUI 文档^(³⁵)中所说：“[…] *通过声明式方法，你可以通过以反映所需界面布局的层级结构来声明视图，从而创建用户界面的轻量级描述。之后\
    \ SwiftUI 会负责绘制并更新这些视图，以响应用户输入或状态更改等事件。*”\n\n为了证明这一点，让我们来看一个简单的视图以及最终在屏幕上渲染出的视图层级。\n\
    \n```\nstruct ContentView: View {\n    @State var text = \"\"\n    var body: some\
    \ View {\n        List {\n            Label(\"Hello World\", systemImage: \"globe\"\
    )\n            HStack {\n                Image(systemName: \"globe\")\n      \
    \              .imageScale(.large)\n                    .foregroundColor(.accentColor)\n\
    \                Text(\"Hello, world!\")\n            }\n            TextField(\"\
    TextField\", text: $text)\n        }\n    }\n}\n```\n\n![](img/509862_1_En_3_Fig2_HTML.png)\n\
    \n在 iPhone 14 Pro 上视图层级窗口的截图中，左侧面板中高亮显示的代码指向右侧屏幕上的“Hello World”、一个地球图标和一个文本字段。右侧提供了用于\
    \ UI 文本字段、外观、清除按钮、自动关联和自动格式化等选项。\n\n**图 3-2** —— 上述代码片段在 iOS 上运行时的视图层级（使用 Reveal\
    \ 应用）\n\n请注意，`TextField`视图被映射为一个`UITextField`，而`Text`视图则被映射为一个`SwiftUI.DisplayList.ViewUpdater.Platform.CGDrawingView`。\n\
    \n这也是 SwiftUI 可用于定义跨平台 UI 的关键原因之一。由于视图只是 UI 的描述，SwiftUI 可以在不同平台上使用不同的原语来渲染 UI。让我们再看一个例子来理解这一点。以下是和前面相同的代码，但运行在\
    \ tvOS 上。请注意，视图层级显示的是 tvOS 原生的 UI 控件。\n\n![](img/509862_1_En_3_Fig3_HTML.png)\n\
    \n在 Apple TV 上 TV 视图层级窗口的截图中，左侧面板中高亮显示的代码指向右侧屏幕上的“Hello World”、一个地球图标和一个文本字段。右侧提供了用于\
    \ UI 文本字段、外观、清除按钮、自动关联、自动格式化和键盘的选项。\n\n**图 3-3** —— 相同代码片段在 tvOS 上运行时的视图层级（使用\
    \ Reveal 应用）\n\n在 SwiftUI 中创建 UI 时，你应始终牢记，视图只是 UI 的描述，而非实际的 UI 元素本身。同时也要记住，SwiftUI\
    \ 可能会在渲染过程中多次调用你的视图——这就是为什么你不应在视图的初始化器中执行任何开销巨大的处理或计算。\n\n## 视图修饰符\n\n视图修饰符是 SwiftUI\
    \ 中的另一个关键概念——它们允许我们自定义应用中视图的外观和行为。例如，你可以使用视图修饰符来：\n\n*   设置视图样式\n*   响应事件（例如用户点击按钮）\n\
    *   配置辅助视图（例如滑动操作、上下文菜单或工具栏）\n\n视图修饰符是可以在任何 SwiftUI `View`上调用的 Swift 方法。它们作为`View`协议的扩展实现，这意味着你可以在任何`View`上调用它们——无论是像`Text`或`Image`这样的内置视图，还是你自己的自定义视图。\n\
    \n让我们深入了解它们的工作原理。\n\n### 配置视图\n\n要修改视图的外观或行为，只需在视图实例上调用 SwiftUI 的内置视图修饰符之一即可。例如，下面是将`Text`视图的前景色更改为红色的方法：\n\
    \n```\nText(\"Hello World\")\n    .foregroundColor(.red)\n```\n\n通过在视图上调用修饰符，修饰符会创建一个包裹原始视图的新视图，并在视图层级中替换掉原始视图。例如，修改后的`Text`视图的类型将是`ModifiedContent<Text,\
    \ _PaddingLayout>`。\n\n你可以对同一个视图应用多个视图修饰符，以更改其外观的多个方面。例如，要在更改前景色的同时更改文本的字体，只需调用`font`视图修饰符：\n\
    \n```\nText(\"Hello, world!\")\n    .foregroundColor(.red)\n    .font(.title)\n\
    ```\n\n值得指出的是，视图修饰符添加到视图上的顺序至关重要。在以下代码片段中，对`Text`视图应用的视图修饰符顺序不同，导致输出结果也不同：\n\n\
    ```\nstruct ContentView: View {\n    var body: some View {\n        HStack(spacing:\
    \ 20) {\n            // 左侧\n            Text(\"Hello, world!\")\n            \
    \    .background(.red)\n                .padding()\n            Divider()\n  \
    \          // 右侧\n            Text(\"Hello, world!\")\n                .padding()\n\
    \                .background(.red)\n        }\n        .frame(maxHeight: 50)\n\
    \    }\n}\n```\n\n![](img/509862_1_En_3_Fig4_HTML.png)\n\n一张截图中，“hello world”并排写在文本框内，呈现不同的颜色渐变。左上角给出了“content\
    \ view”选项。下方提供了播放、鼠标指针、切换和缩放等选项。\n\n**图 3-4** —— 应用视图修饰符的顺序会影响视图的外观\n\n在第一个示例中，背景色是在添加内边距之前应用到`Text`视图上的。这导致只有文本本身被红色背景衬底。\n\
    \n在第二个代码片段中，首先应用了内边距。正如前面提到的，应用视图修饰符会导致视图的修改版本取代原始视图的位置。这意味着，内边距化后的`Text`视图如今取代了原始`Text`视图的位置。将此修改后的版本视为（应用了`background`视图修饰符的）目标视图，会导致整个带有内边距的背景区域被填满红色背景色。\n\
    \n### 将视图修饰符应用于子视图\n\n视图修饰符作用于其所应用的视图本身。例如，在前面的代码片段中，我们将`background`视图修饰符应用到了一个`Text`视图上。\n\
    \n然而，大多数视图修饰符也会影响其所应用的视图的子视图。考虑以下代码片段，它将相同的等宽字体应用于`VStack`内的所有标签：\n\n```\nVStack(alignment:\
    \ .leading) {\n    Text(\"Hello, World!\")\n    Text(\"How are you today?\")\n\
    }\n.font(.system(.body, design: .monospaced))\n```\n\n当你想要一次性配置多个视图的外观时，这非常有用。通过将相应的视图修饰符应用到你想配置的视图的共享容器视图上，你可以一次性更改所有包含在内视图的外观。\n\
    \n也有一些视图修饰符会将其值向上传播到视图层级，例如`navigationTitle`：\n\n```\nNavigationStack {\n    HStack\
    \ {\n        Text(\"Hello, World!\")\n            .navigationTitle(\"内部标题\")\n\
    \    }\n    .navigationTitle(\"外部标题\")\n}\n```\n\n![](img/509862_1_En_3_Fig5_HTML.png)\n\
    \n一张手机屏幕的截图中，显示了文本“内部标题”和“hello world”。左上角给出了“navigation title”选项。下方提供了播放、鼠标指针、切换和缩放等选项。\n\
    \n**图 3-5** —— 在子视图上设置导航标题\n\n在这种情况下，内部的`navigationTitle`优先级更高——你可以通过注释掉`.navigationTitle(\"\
    内部标题\")`这行代码来亲自验证——结果屏幕的标题会变为“外部标题”。\n"
- fmt: '### Using View Modifiers to Register Action Handlers


    So far, most of the view modifiers we’ve looked at modify how a view looks like.
    These view modifiers usually take parameters of type `String`, `Int`, `Color`,
    `Font`, or any of Swift’s other types.


    In addition to being able to declare the look of a view, we also need to be able
    to specify what happens when the user taps on a button, enters text into an input
    field, or performs other actions. To enable this, SwiftUI also allows us to register
    closures for specific events, such as when a view appears or disappears, when
    the user taps on a button or menu item, triggers a swipe action in a `List` view,
    and more.


    For example, here is how you can register a closure that gets called whenever
    the user taps a button:


    ```

    Button("Tap me", action: {

    self.message = "You tapped me!"

    })

    ```


    Thanks to Swift’s trailing closure syntax, we can further condense this to


    ```

    Button("Tap me") {

    self.message = "You tapped me!"

    }

    ```


    Similar to view modifiers that affect the look of a view, these action handler
    view modifiers can be applied to a container view and will consequently be applied
    to all child views. The following example shows an input form with two `TextField`
    views, allowing the user to enter their first and last name. Whenever the user
    makes a change to one of the `TextFields`, the code updates the `dirty` property.
    We achieve this by applying the `onChange(of:perform:)` view modifier to the respective
    `TextField`, which allows us to specify which model property to watch for changes.
    Similarly, we apply the `onSubmit` view modifier and register a closure to call
    the `save` method on the view model to save the data to disk.


    ```

    import SwiftUI

    private class PersonViewModel: ObservableObject {

    @Published var firstName = ""

    @Published var lastName = ""

    func save() {

    print("Save to disk")

    }

    }

    struct ClosuresDemoView: View {

    @State var message = ""

    @State var dirty = false

    @StateObject private var viewModel = PersonViewModel()

    var body: some View {

    Form {

    Section("\(self.dirty ? "* " : "")Input fields") {

    TextField("First name", text: $viewModel.firstName)

    .onChange(of: viewModel.firstName) { newValue in

    self.dirty = true

    }

    .onSubmit {

    viewModel.save()

    }

    TextField("Last name", text: $viewModel.lastName)

    .onChange(of: viewModel.lastName) { newValue in

    self.dirty = true

    }

    .onSubmit {

    viewModel.save()

    }

    }

    }

    }

    }

    ```


    Since both of these `onSubmit` closures do the same, we can refactor the previous
    code and move the `onSubmit` view modifiers to the enclosing `Section`:


    ```

    struct ClosuresDemoView: View {

    @State var message = ""

    @State var dirty = false

    @StateObject private var viewModel = PersonViewModel()

    var body: some View {

    Form {

    Section("\(self.dirty ? "* " : "")Input fields") {

    TextField("First name", text: $viewModel.firstName)

    .onChange(of: viewModel.firstName) { newValue in

    self.dirty = true

    }

    TextField("Last name", text: $viewModel.lastName)

    .onChange(of: viewModel.lastName) { newValue in

    self.dirty = true

    }

    }

    .onSubmit {

    viewModel.save()

    }

    }

    }

    }

    ```


    ## Summary


    SwiftUI is a flexible internal DSL for building UIs, and in this chapter, you
    learned more about its basic building blocks:


    * **SwiftUI views are just a description of the UI**, so we can make liberal use
    of them to construct our UI—just keep in mind to not perform any long-running
    or memory-intensive operations in a `View`’s initializer.


    * **Views can be composed to create more complex views**, and we looked at some
    of SwiftUI’s container views, such as `HStack`, `VStack`, and `ZStack`, that make
    this possible.


    * **View modifiers can be used to customize views**—we can use them to modify
    a view’s look and feel, such as the foreground color or the font of a `Label`.
    But we can also register closures that get called when certain events occur (e.g.,
    when a view appears, or the user hits enter to submit a form).


    With this knowledge under your belt, it is now time to dive into the important
    topic of state management. In the next chapter, you will learn how SwiftUI makes
    use of a functional reactive approach to ensure that the UI is always in sync
    with the underlying data model.


    Footnotes [1](#509862_1_En_3_Chapter.xhtml#Fn1_source)   [2](#509862_1_En_3_Chapter.xhtml#Fn2_source)
      [3](#509862_1_En_3_Chapter.xhtml#Fn3_source)   [4](#509862_1_En_3_Chapter.xhtml#Fn4_source)
      [5](#509862_1_En_3_Chapter.xhtml#Fn5_source)   [6](#509862_1_En_3_Chapter.xhtml#Fn6_source)
