  trans: '

    # 总结


    在本章中，你学习了 SwiftUI 如何处理状态，并确保用户界面始终与应用程序的状态保持同步。


    我们简要介绍了 SwiftUI 与 Combine 框架的关系，并了解到 `ObservableObject` 实际上是一个 Combine 发布者，它会将所有对其已发布属性的更新，传达给订阅了它的
    SwiftUI 视图。


    你学习了三种不同的属性包装器——`@StateObject`、`@ObservedObject` 和 `@EnvironmentObject`——它们如何管理所包装的可观察对象的生命周期，以及何时应该知道使用哪一种来将你的视图连接到应用程序的状态。


    恭喜，你已经掌握了 SwiftUI 应用程序的关键构建模块之一！


    脚注 1 2


    # 5. 在列表中显示数据


    列表视图可能是 iOS 应用中最重要的 UI 结构之一，你很难找到一个不使用某种列表的应用。


    SwiftUI 使得构建列表视图变得特别容易：只需三行代码就能创建一个简单的列表！同时，SwiftUI 的 `List` 视图非常强大且用途广泛，因此深入了解它将会物有所值。


    在本章中，你将学习关于 `List` 视图所需的一切知识，从简单的列表、样式化列表及其项目、在列表视图中显示数据集合、实现列表和单个列表项上的操作，涵盖 iOS、iPadOS
    和 macOS。


    ## SwiftUI 中的列表入门


    当你创建一个新的 SwiftUI 视图时，Xcode 会使用一个如下所示的模板：


    ```

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    }

    }

    ```


    构建列表最简单的方法是创建一个新的 SwiftUI 视图，并将 *Hello World* 文本包裹在 `List` 中：


    ```

    struct StaticListView: View {

    var body: some View {

    List {

    Text("Hello, world!")

    }

    }

    }

    ```


    这将在列表视图中显示一个静态文本。


    一个窗口截图的左侧显示一组程序代码。一个手机屏幕显示文本“a list with simple rows, hello world”。


    图 5-1：包含一个静态文本项的简单列表视图


    要向列表添加更多项，我们只需添加另一行代码：


    ```

    List {

    Text("Hello, world!")

    Text("Hello, SwiftUI!")

    }

    ```


    ### 在列表行内使用其他 SwiftUI 视图


    `List` 视图的酷炫之处在于，你可以使用任何类型的 SwiftUI 视图作为列表行，而不仅仅是 `Text`。`Label`、`Slider`、`Stepper`、`Toggle`、`TextField`、用于输入密码的
    `SecureField`、`ProgressView` 和 `Picker`——应有尽有。


    ```

    struct StaticListView2: View {

    @State var number: Int = 42

    @State var degrees: Double = 37.5

    @State var toggle = true

    @State var name = "Peter"

    @State var secret = "s3cr3t!"

    var fruits = ["Apples", "Bananas", "Mangoes"]

    @State var fruit = "Mangoes"

    var body: some View {

    List {

    Text("Hello, world!")

    Label("The answer", systemImage: "42.circle")

    Slider(value: $degrees, in: 0...50) {

    Text("\(degrees)")

    } minimumValueLabel: {

    Text("min")

    } maximumValueLabel: {

    Text("max")

    }

    Stepper(value: $number, in: 0...100) {

    Text("\(number)")

    }

    Toggle(isOn: $toggle) {

    Text("Checked")

    }

    TextField("Name", text: $name)

    SecureField("Secret", text: $secret)

    ProgressView(value: 0.3)

    Picker(selection: $fruit, label: Text("Pick your favourite fruit")) {

    ForEach(fruits, id: \.self) { fruit in

    Text(fruit)

    }

    }

    }

    }

    }

    ```


    一个窗口屏幕的左侧显示一组程序代码。一个手机屏幕显示文本“a list with multiple sims, the answer, and the checked
    option is enabled, and pick your favorite fruit is on the right”。


    图 5-2：包含高级 SwiftUI 视图的列表


    ### 构建自定义列表行


    得益于 SwiftUI 基于堆栈的布局系统，你也可以轻松创建自定义行。在这个例子中，我们使用 `VStack` 将两个 `Text` 视图上下堆叠，复制了在许多
    iOS 应用中广泛使用的典型标题和详情布局。


    ```

    struct StaticListWithSimpleCustomRowView: View {

    var body: some View {

    List {

    VStack(alignment: .leading) {

    Text("Apples")

    .font(.headline)

    Text("Eat one a day")

    .font(.subheadline)

    }

    VStack(alignment: .leading) {

    Text("Bananas")

    .font(.headline)

    Text("High in potassium")

    .font(.subheadline)

    }

    }

    }

    }

    ```


    像这样添加自定义行虽然快速简单，但随着我们添加更多行，代码会迅速膨胀，这使得在需要进行修改时更难理解和更新。为了防止这种情况发生，我们可以将列表行的代码提取到单独的视图中，使其可重用：


    ```

    struct StaticListWithSimpleCustomRowView: View {

    var body: some View {

    List {

    CustomRowView(title: "Apples", subtitle: "Eat one a day")

    CustomRowView(title: "Bananas", subtitle: "High in potassium")

    }

    }

    }

    private struct CustomRowView: View {

    var title: String

    var subtitle: String

    var body: some View {

    VStack(alignment: .leading) {

    Text(title)

    .font(.headline)

    Text(subtitle)

    .font(.subheadline)

    }

    }

    }

    ```


    一个窗口屏幕的左侧显示一组程序代码。一个手机屏幕显示文本“a list with custom row, apples eat one a day, bananas
    high in potassium”。


    图 5-3：自定义列表行


    要了解更多关于重构 SwiftUI 代码的信息，请观看此视频^(³⁸)，我在其中更详细地展示了重构 SwiftUI 视图的过程。


    ### 更复杂的列表行


    SwiftUI 的布局系统既灵活又易于使用，并且可以轻松地通过组合使用 `HStack`、`VStack`、`ZStack` 和其他 SwiftUI 视图来创建复杂的布局。以下是如何创建包含标题、副标题、前导图片和尾随数字的列表行：


    一段包含苹果、香蕉和芒果列表的代码块，以及它们各自的描述：每天吃一个、钾含量高、柔软香甜。第一行代码显示：“struct static list with
    custom row view”。


    ```

    private struct CustomRowView: View {

    var title: String

    var description: String?

    var titleIcon: String

    var count: Int

    init(_ title: String, description: String? = nil, titleIcon: String, count: Int
    = 1) {

    self.title = title

    self.description = description

    self.titleIcon = titleIcon

    self.count = count

    }

    var body: some View {

    HStack {

    Text(titleIcon)

    .font(.title)

    .padding(4)

    .background(Color(UIColor.tertiarySystemFill))

    .cornerRadius(10)

    VStack(alignment: .leading) {

    Text(title)

    .font(.headline)

    if let description = description {

    Text(description)

    .font(.subheadline)

    }

    }

    Spacer()

    Text("\(count)")

    .font(.title)

    }

    }

    }

    ```


    注意我们是如何为 `CustomRowView` 使用自定义初始化器的，这使我们能够省略 `title` 属性的参数名称，并为某些属性定义默认值。结果就是，现在使用这个自定义行视图更加方便了。


    一个窗口屏幕的左侧显示一组程序代码。一个手机屏幕显示文本“a list with extracted row, apple 2, banana 3, and
    mango 1”。


    图 5-4：复杂的列表行


    ## 动态列表


    到目前为止，我们研究了如何使用 `List` 视图创建*静态*列表视图。静态列表视图对于在 iOS 应用中创建菜单或设置屏幕很有用，但是当我们将 `List`
    视图连接到数据源时，它们会变得更加有用。


    现在让我们看几个示例，了解如何使用 `List` 视图显示数据的*动态*列表，例如书籍列表。我们还将学习如何使用 Apple 在 iOS 15 的最新版本
    SwiftUI 中添加的一些新功能，例如下拉刷新、搜索 UI，以及使用 async/await 从异步 API（如远程服务）获取数据的简便方法。

    '
- fmt: "### Displaying a List of Elements\n\nThere are a number of ways to create\
    \ lists, and you can create both *flat* lists as well as *hierarchical*, *nested*\
    \ lists. Since all list rows are computed on demand, `List` views perform well\
    \ even for collections with many items.\n\nThe easiest way to create a `List`\
    \ view based on a collection of elements is to use its constructor that takes\
    \ a `RandomAccessCollection` and a view builder for the row content:\n\n```\n\
    List(collection) { element in\n// use SwiftUI views to render an individual row\
    \ to display `element`\n}\n```\n\nInside the view builder, we get access to the\
    \ individual elements of the collection in a type-safe way. This means we can\
    \ access the properties of the collection elements and use SwiftUI views like\
    \ `Text` to render the individual rows, like in the following example:\n\n```\n\
    struct Book: Identifiable {\n    var id = UUID()\n    var title: String\n    var\
    \ author: String\n    var isbn: String\n    var pages: Int\n    var isRead: Bool\
    \ = false\n}\nextension Book {\n    static let samples = [\n        Book(title:\
    \ \"Changer\", author: \"Matt Gemmell\", isbn: \"9781916265202\", pages: 476),\n\
    \        Book(title: \"SwiftUI for Absolute Beginners\", author: \"Jayant Varma\"\
    , isbn: \"9781484255155\", pages: 200),\n        Book(title: \"Why we sleep\"\
    , author: \"Matthew Walker\", isbn: \"9780141983769\", pages: 368),\n        Book(title:\
    \ \"The Hitchhiker's Guide to the Galaxy\", author: \"Douglas Adams\", isbn: \"\
    9780671461492\", pages: 216)\n    ]\n}\nprivate class BooksViewModel: ObservableObject\
    \ {\n    @Published var books: [Book] = Book.samples\n}\nstruct BooksListView:\
    \ View {\n    @StateObject fileprivate var viewModel = BooksViewModel()\n    var\
    \ body: some View {\n        List(viewModel.books) { book in\n            Text(\"\
    \\(book.title) by \\(book.author)\")\n        }\n    }\n}\n```\n\nAs this view\
    \ acts as the owner of the data we want to display, we use a `@StateObject` to\
    \ hold the view model. The view model exposes a published property which holds\
    \ the list of `books`. In the interest of simplicity, this is a static list, but\
    \ in a real-world application, you would fetch this data from a remote API or\
    \ a local database.\n\nNotice how we can access the properties of the `Book` elements\
    \ inside the `List` by writing `book.title` or `book.author`. Here, we use a `Text`\
    \ view to display the title and the author of a book using string interpolation.\n\
    \nThanks to SwiftUI’s declarative syntax, we can easily build more complex custom\
    \ UIs to present data.\n\nLet’s replace the `Text` view in the preceding snippet\
    \ with a more elaborate row that displays the book cover, title, author, and number\
    \ of pages:\n\n```\n// ...\nList(viewModel.books) { book in\n    HStack(alignment:\
    \ .top) {\n        Image(book.mediumCoverImageName)\n            .resizable()\n\
    \            .aspectRatio(contentMode: .fit)\n            .frame(height: 90)\n\
    \        VStack(alignment: .leading) {\n            Text(book.title)\n       \
    \         .font(.headline)\n            Text(\"by \\(book.author)\")\n       \
    \         .font(.subheadline)\n            Text(\"\\(book.pages) pages\")\n  \
    \              .font(.subheadline)\n        }\n        Spacer()\n    }\n}\n//\
    \ ...\n```\n\nUsing Xcode’s refactoring tools for SwiftUI, we can extract this\
    \ code into a custom view, to make our code easier to read^([^(39)](#fn39)).\n\
    \n```\nprivate struct BookRowView: View {\n    var book: Book\n    var body: some\
    \ View {\n        HStack(alignment: .top) {\n            Image(book.mediumCoverImageName)\n\
    \                .resizable()\n                .aspectRatio(contentMode: .fit)\n\
    \                .frame(height: 90)\n            VStack(alignment: .leading) {\n\
    \                Text(book.title)\n                    .font(.headline)\n    \
    \            Text(\"by \\(book.author)\")\n                    .font(.subheadline)\n\
    \                Text(\"\\(book.pages) pages\")\n                    .font(.subheadline)\n\
    \            }\n            Spacer()\n        }\n    }\n}\n```\n\nSince we’re\
    \ not planning to modify the data inside the list row (or inside a details view),\
    \ we pass the list item to the row as a simple reference. If we wanted to modify\
    \ the data inside the list row (e.g., by marking a book as a favorite, or passing\
    \ it on to a child screen where the user can edit the book details), we’d have\
    \ to use a list binding.\n\n### Using List Bindings to Allow Modifying List Items\n\
    \nNormally, data inside a view is unmodifiable. To modify data, it needs to be\
    \ managed as a `@State` property or a `@ObservedObject` view model. To allow users\
    \ to modify data in a child view (e.g., a `TextField` or a details screen), we\
    \ need to use a binding to connect the data in the child view to the state in\
    \ the parent view.\n\nUntil SwiftUI 3, there wasn’t a direct way to get a binding\
    \ to the elements of the list, so people had to come up with their own solutions.\
    \ I’ve written about this before in this blog post^([^(40)](#fn40)), in which\
    \ I discuss incorrect and correct ways to do this.\n\nWith SwiftUI 3, Apple has\
    \ introduced a straightforward way to access list items as bindings, using the\
    \ following syntax:\n\n```\nList($collection) { $element in\n    TextField(\"\
    Name\", text: $element.name)\n}\n```\n\nTo allow users of our sample app to edit\
    \ the title of a book inline in the list view, all we have to do is to update\
    \ the book list view as follows:\n\n```\nList($viewModel.books) { $book in\n \
    \   TextField(\"Book title\",\n              text: $book.title,\n            \
    \  prompt: Text(\"Enter the book title\"))\n}\n```\n\nOf course, this also works\
    \ for custom views—here is how to update the `BookRowView` to make the book title\
    \ editable:\n\n```\nstruct EditableBooksListView: View {\n    // ...\n    var\
    \ body: some View {\n        List($viewModel.books) { $book in\n            EditableBookRowView(book:\
    \ $book)\n        }\n    }\n}\nprivate struct EditableBookRowView: View {\n  \
    \  @Binding var book: Book\n    var body: some View {\n        HStack(alignment:\
    \ .top) {\n            Image(book.mediumCoverImageName)\n                .resizable()\n\
    \                .aspectRatio(contentMode: .fit)\n                .frame(height:\
    \ 90)\n            VStack(alignment: .leading) {\n                TextField(\"\
    Book title\", text: $book.title, prompt: Text(\"Enter the book title\"))\n   \
    \                 .font(.headline)\n                Text(\"by \\(book.author)\"\
    )\n                    .font(.subheadline)\n                Text(\"\\(book.pages)\
    \ pages\")\n                    .font(.subheadline)\n            }\n         \
    \   Spacer()\n        }\n    }\n}\n```\n\nThe key point here is to use `@Binding`\
    \ in the child view. By doing so, the parent view retains ownership of the data\
    \ that you pass in to the child view while letting the child view modify the data.\
    \ The *source of truth* is the `@Published` property on the `ObservableObject`\
    \ in the parent view.\n\nTo read more about list bindings, and how this feature\
    \ works under the hood, check out my article SwiftUI List Bindings^([^(41)](#fn41))."
  raw: '### Displaying a List of Elements


    There are a number of ways to create lists, and you can create both *flat* lists
    as well as *hierarchical*, *nested* lists. Since all list rows are computed on
    demand, `List` views perform well even for collections with many items.


    The easiest way to create a `List` view based on a collection of elements is to
    use its constructor that takes a `RandomAccessCollection` and a view builder for
    the row content:


    ```

    List(collection) { element in

    // use SwiftUI views to render an individual row to display `element`

    }

    ```


    Inside the view builder, we get access to the individual elements of the collection
    in a type-safe way. This means we can access the properties of the collection
    elements and use SwiftUI views like `Text` to render the individual rows, like
    in the following example:


    ```

    struct Book: Identifiable {

    var id = UUID()

    var title: String

    var author: String

    var isbn: String

    var pages: Int

    var isRead: Bool = false

    }

    extension Book {

    static let samples = [

    Book(title: "Changer", author: "Matt Gemmell", isbn: "9781916265202", pages: 476),

    Book(title: "SwiftUI for Absolute Beginners", author: "Jayant Varma", isbn: "9781484255155",
    pages: 200),

    Book(title: "Why we sleep", author: "Matthew Walker", isbn: "9780141983769", pages:
    368),

    Book(title: "The Hitchhiker''s Guide to the Galaxy", author: "Douglas Adams",
    isbn: "9780671461492", pages: 216)

    ]

    }

    private class BooksViewModel: ObservableObject {

    @Published var books: [Book] = Book.samples

    }

    struct BooksListView: View {

    @StateObject fileprivate var viewModel = BooksViewModel()

    var body: some View {

    List(viewModel.books) { book in

    Text("\(book.title) by \(book.author)")

    }

    }

    }

    ```


    As this view acts as the owner of the data we want to display, we use a `@StateObject`
    to hold the view model. The view model exposes a published property which holds
    the list of `books`. In the interest of simplicity, this is a static list, but
    in a real-world application, you would fetch this data from a remote API or a
    local database.


    Notice how we can access the properties of the `Book` elements inside the `List`
    by writing `book.title` or `book.author`. Here, we use a `Text` view to display
    the title and the author of a book using string interpolation.


    Thanks to SwiftUI’s declarative syntax, we can easily build more complex custom
    UIs to present data.


    Let’s replace the `Text` view in the preceding snippet with a more elaborate row
    that displays the book cover, title, author, and number of pages:


    ```

    // ...

    List(viewModel.books) { book in

    HStack(alignment: .top) {

    Image(book.mediumCoverImageName)

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text(book.title)

    .font(.headline)

    Text("by \(book.author)")

    .font(.subheadline)

    Text("\(book.pages) pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    // ...

    ```


    Using Xcode’s refactoring tools for SwiftUI, we can extract this code into a custom
    view, to make our code easier to read^([^(39)](#fn39)).


    ```

    private struct BookRowView: View {

    var book: Book

    var body: some View {

    HStack(alignment: .top) {

    Image(book.mediumCoverImageName)

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text(book.title)

    .font(.headline)

    Text("by \(book.author)")

    .font(.subheadline)

    Text("\(book.pages) pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    }

    ```


    Since we’re not planning to modify the data inside the list row (or inside a details
    view), we pass the list item to the row as a simple reference. If we wanted to
    modify the data inside the list row (e.g., by marking a book as a favorite, or
    passing it on to a child screen where the user can edit the book details), we’d
    have to use a list binding.


    ### Using List Bindings to Allow Modifying List Items


    Normally, data inside a view is unmodifiable. To modify data, it needs to be managed
    as a `@State` property or a `@ObservedObject` view model. To allow users to modify
    data in a child view (e.g., a `TextField` or a details screen), we need to use
    a binding to connect the data in the child view to the state in the parent view.


    Until SwiftUI 3, there wasn’t a direct way to get a binding to the elements of
    the list, so people had to come up with their own solutions. I’ve written about
    this before in this blog post^([^(40)](#fn40)), in which I discuss incorrect and
    correct ways to do this.


    With SwiftUI 3, Apple has introduced a straightforward way to access list items
    as bindings, using the following syntax:


    ```

    List($collection) { $element in

    TextField("Name", text: $element.name)

    }

    ```


    To allow users of our sample app to edit the title of a book inline in the list
    view, all we have to do is to update the book list view as follows:


    ```

    List($viewModel.books) { $book in

    TextField("Book title",

    text: $book.title,

    prompt: Text("Enter the book title"))

    }

    ```


    Of course, this also works for custom views—here is how to update the `BookRowView`
    to make the book title editable:


    ```

    struct EditableBooksListView: View {

    // ...

    var body: some View {

    List($viewModel.books) { $book in

    EditableBookRowView(book: $book)

    }

    }

    }

    private struct EditableBookRowView: View {

    @Binding var book: Book

    var body: some View {

    HStack(alignment: .top) {

    Image(book.mediumCoverImageName)

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    TextField("Book title", text: $book.title, prompt: Text("Enter the book title"))

    .font(.headline)

    Text("by \(book.author)")

    .font(.subheadline)

    Text("\(book.pages) pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    }

    ```


    The key point here is to use `@Binding` in the child view. By doing so, the parent
    view retains ownership of the data that you pass in to the child view while letting
    the child view modify the data. The *source of truth* is the `@Published` property
    on the `ObservableObject` in the parent view.


    To read more about list bindings, and how this feature works under the hood, check
    out my article SwiftUI List Bindings^([^(41)](#fn41)).'
  trans: "\n### 显示元素列表\n\n创建列表有多种方式，你既可以创建*扁平*列表，也可以创建*分层*或*嵌套*列表。由于所有列表行都是按需计算的，因此即使集合包含大量项目，`List`\
    \ 视图也能保持良好的性能。\n\n基于元素集合创建 `List` 视图的最简单方法是使用其构造函数，该函数接受一个 `RandomAccessCollection`\
    \ 和一个用于行内容的视图构建器：\n\n```\nList(collection) { element in\n// 使用 SwiftUI 视图渲染单个显示\
    \ `element` 的行\n}\n```\n\n在视图构建器内部，我们可以以类型安全的方式访问集合中的单个元素。这意味着我们可以访问集合元素的属性，并使用\
    \ `Text` 等 SwiftUI 视图来渲染各个行，如下例所示：\n\n```\nstruct Book: Identifiable {\n    var\
    \ id = UUID()\n    var title: String\n    var author: String\n    var isbn: String\n\
    \    var pages: Int\n    var isRead: Bool = false\n}\nextension Book {\n    static\
    \ let samples = [\n        Book(title: \"Changer\", author: \"Matt Gemmell\",\
    \ isbn: \"9781916265202\", pages: 476),\n        Book(title: \"SwiftUI for Absolute\
    \ Beginners\", author: \"Jayant Varma\", isbn: \"9781484255155\", pages: 200),\n\
    \        Book(title: \"Why we sleep\", author: \"Matthew Walker\", isbn: \"9780141983769\"\
    , pages: 368),\n        Book(title: \"The Hitchhiker's Guide to the Galaxy\",\
    \ author: \"Douglas Adams\", isbn: \"9780671461492\", pages: 216)\n    ]\n}\n\
    private class BooksViewModel: ObservableObject {\n    @Published var books: [Book]\
    \ = Book.samples\n}\nstruct BooksListView: View {\n    @StateObject fileprivate\
    \ var viewModel = BooksViewModel()\n    var body: some View {\n        List(viewModel.books)\
    \ { book in\n            Text(\"\\(book.title) by \\(book.author)\")\n       \
    \ }\n    }\n}\n```\n\n由于这个视图充当我们要显示的数据的所有者，我们使用 `@StateObject` 来持有视图模型。视图模型暴露了一个已发布的属性，该属性持有\
    \ `books` 列表。为简单起见，这是一个静态列表，但在实际应用中，你会从远程 API 或本地数据库获取这些数据。\n\n请注意，我们如何在 `List`\
    \ 内部通过编写 `book.title` 或 `book.author` 来访问 `Book` 元素的属性。在这里，我们使用 `Text` 视图通过字符串插值来显示书籍的标题和作者。\n\
    \n得益于 SwiftUI 的声明式语法，我们可以轻松构建更复杂的自定义 UI 来呈现数据。\n\n让我们将前面代码片段中的 `Text` 视图替换为更精细的行，以显示书籍封面、标题、作者和页数：\n\
    \n```\n// ...\nList(viewModel.books) { book in\n    HStack(alignment: .top) {\n\
    \        Image(book.mediumCoverImageName)\n            .resizable()\n        \
    \    .aspectRatio(contentMode: .fit)\n            .frame(height: 90)\n       \
    \ VStack(alignment: .leading) {\n            Text(book.title)\n              \
    \  .font(.headline)\n            Text(\"by \\(book.author)\")\n              \
    \  .font(.subheadline)\n            Text(\"\\(book.pages) pages\")\n         \
    \       .font(.subheadline)\n        }\n        Spacer()\n    }\n}\n// ...\n```\n\
    \n使用 Xcode 针对 SwiftUI 的重构工具，我们可以将此代码提取到自定义视图中，以使代码更易于阅读^(³⁹)。\n\n```\nprivate\
    \ struct BookRowView: View {\n    var book: Book\n    var body: some View {\n\
    \        HStack(alignment: .top) {\n            Image(book.mediumCoverImageName)\n\
    \                .resizable()\n                .aspectRatio(contentMode: .fit)\n\
    \                .frame(height: 90)\n            VStack(alignment: .leading) {\n\
    \                Text(book.title)\n                    .font(.headline)\n    \
    \            Text(\"by \\(book.author)\")\n                    .font(.subheadline)\n\
    \                Text(\"\\(book.pages) pages\")\n                    .font(.subheadline)\n\
    \            }\n            Spacer()\n        }\n    }\n}\n```\n\n由于我们不打算在列表行（或详情视图）内部修改数据，我们将列表项作为简单引用传递给行。如果我们想修改列表行内的数据（例如，将一本书标记为收藏，或将其传递到用户可编辑书籍详情的子界面），则必须使用列表绑定。\n\
    \n### 使用列表绑定以允许修改列表项\n\n通常，视图内的数据是不可修改的。要修改数据，需要将其作为 `@State` 属性或 `@ObservedObject`\
    \ 视图模型进行管理。为了允许用户在子视图（例如 `TextField` 或详情界面）中修改数据，我们需要使用绑定将子视图中的数据连接到父视图中的状态。\n\
    \n在 SwiftUI 3 之前，没有直接的方法来获取列表元素的绑定，因此人们不得不提出自己的解决方案。我之前在这篇博客文章^(⁴⁰)中写过相关内容，其中讨论了实现此目的的正确与错误方法。\n\
    \n使用 SwiftUI 3，苹果引入了一种直接的方法，可以使用以下语法将列表项作为绑定进行访问：\n\n```\nList($collection) {\
    \ $element in\n    TextField(\"Name\", text: $element.name)\n}\n```\n\n为了允许我们的示例应用用户在列表视图中内联编辑书籍标题，我们只需按如下方式更新书籍列表视图：\n\
    \n```\nList($viewModel.books) { $book in\n    TextField(\"Book title\",\n    \
    \          text: $book.title,\n              prompt: Text(\"Enter the book title\"\
    ))\n}\n```\n\n当然，这也适用于自定义视图——以下是更新 `BookRowView` 以使书籍标题可编辑的方法：\n\n```\nstruct\
    \ EditableBooksListView: View {\n    // ...\n    var body: some View {\n     \
    \   List($viewModel.books) { $book in\n            EditableBookRowView(book: $book)\n\
    \        }\n    }\n}\nprivate struct EditableBookRowView: View {\n    @Binding\
    \ var book: Book\n    var body: some View {\n        HStack(alignment: .top) {\n\
    \            Image(book.mediumCoverImageName)\n                .resizable()\n\
    \                .aspectRatio(contentMode: .fit)\n                .frame(height:\
    \ 90)\n            VStack(alignment: .leading) {\n                TextField(\"\
    Book title\", text: $book.title, prompt: Text(\"Enter the book title\"))\n   \
    \                 .font(.headline)\n                Text(\"by \\(book.author)\"\
    )\n                    .font(.subheadline)\n                Text(\"\\(book.pages)\
    \ pages\")\n                    .font(.subheadline)\n            }\n         \
    \   Spacer()\n        }\n    }\n}\n```\n\n这里的关键点是在子视图中使用 `@Binding`。通过这样做，父视图保留了对你传递给子视图的数据的所有权，同时允许子视图修改数据。*数据源*是父视图中\
    \ `ObservableObject` 上的 `@Published` 属性。\n\n要了解更多关于列表绑定以及此功能在底层如何工作的信息，请查看我的文章\
    \ SwiftUI 列表绑定^(⁴¹)。\n"
- fmt: "### Asynchronously Fetching Data\n\nThe next sections of this chapter have\
    \ one thing in common—they’re all based on Apple’s new APIs for handling asynchronous\
    \ code.\n\nAt WWDC 21, Apple introduced Swift’s new concurrency model as part\
    \ of Swift 5.5.\n\nIn the previous examples, we used a static list of data. The\
    \ advantage of this approach is that we didn’t have to fetch (and wait for) this\
    \ data, as it was already in memory. This was fine for the examples, as it allowed\
    \ us to focus on what’s relevant, but it doesn’t reflect reality. In a real-world\
    \ application, we usually display data from remote APIs, and this usually means\
    \ performing asynchronous calls: while we’re waiting for the results to come in\
    \ from the remote API, the app needs to continue updating the UI. If it didn’t\
    \ do so, users might get the impression the app was hanging or even crashed.\n\
    \nSo in the next examples, I’m going to demonstrate how to make use of Swift’s\
    \ new concurrency model to handle asynchronous code.\n\nA good moment to fetch\
    \ data is when the user navigates to a new screen and the screen just appears.\
    \ In previous versions of SwiftUI, using the `.onAppear` view modifier was a good\
    \ place to request data. Starting with iOS 15, SwiftUI includes a new view modifier\
    \ that makes this even easier: `.task`. It will start an asynchronous `Task` when\
    \ the view appears and will cancel this task once the view disappears (if the\
    \ task is still running). This is useful if your task is a long-running download\
    \ that you automatically want to abort when the user leaves the screen.\n\nUsing\
    \ `.task` is as easy as applying it to your `List` view:\n\n```\nstruct AsyncFetchBooksListView:\
    \ View {\n    @StateObject fileprivate var viewModel = AsyncFetchBooksViewModel()\n\
    \    var body: some View {\n        List(viewModel.books) { book in\n        \
    \    AsyncFetchBookRowView(book: book)\n        }\n        .overlay {\n      \
    \      if viewModel.fetching {\n                ProgressView(\"Fetching data,\
    \ please wait...\")\n                    .progressViewStyle(CircularProgressViewStyle(tint:\
    \ .accentColor))\n            }\n        }\n        .animation(.default, value:\
    \ viewModel.books)\n        .task {\n            await viewModel.fetchData()\n\
    \        }\n    }\n}\n```\n\nIn the view model, you can then use asynchronous\
    \ APIs to fetch data. In this example, I’ve mocked the backend to make the code\
    \ a bit easier to read, and added an artificial delay:\n\n```\nprivate class AsyncFetchBooksViewModel:\
    \ ObservableObject {\n    @Published var books = [Book]()\n    @Published var\
    \ fetching = false\n    func fetchData() async {\n        fetching = true\n  \
    \      await Task.sleep(2_000_000_000)\n        books = Book.samples\n       \
    \ fetching = false\n    }\n}\n```\n\nIf you’d try and run the code like this,\
    \ you would end up with a runtime warning, saying that “Publishing changes from\
    \ background threads is not allowed; make sure to publish values from the main\
    \ thread (via operators like `receive(on:)`) on model updates.”\n\nThe reason\
    \ for this runtime error is that the code inside `fetchData` is not executed on\
    \ the main thread. However, UI updates *must* be executed on the main thread.\
    \ In the past, we would’ve had to use `DispatchQueue.main.async { ... }` to make\
    \ sure any UI updates are executed on the main thread. However, with Swift’s new\
    \ concurrency model, there is an easier way: all we have to do is to mark any\
    \ methods (or classes) that perform UI updates using the `@MainActor` property\
    \ wrapper. This instructs the compiler to switch to the main actor when executing\
    \ this code and thus make sure any UI updates run on the main thread. Here’s the\
    \ updated code:\n\n```\nprivate class AsyncFetchBooksViewModel: ObservableObject\
    \ {\n    @Published var books = [Book]()\n    @Published var fetching = false\n\
    \    @MainActor\n    func fetchData() async {\n        fetching = true\n     \
    \   await Task.sleep(2_000_000_000)\n        books = Book.samples\n        fetching\
    \ = false\n    }\n}\n```\n\nTo learn more about Swift’s new concurrency model,\
    \ check out my video series^([^(42)](#fn42)), as well as the following articles\
    \ on my blog:\n\n* Getting Started with `async/await` in SwiftUI^([^(43)](#fn43))\n\
    * Cooperative Task Cancellation - SwiftUI Concurrency Essentials^([^(44)](#fn44))\n\
    \n### Pull-to-Refresh\n\nUnless you use an SDK like Cloud Firestore^([^(45)](#fn45))\
    \ that allows you to listen to updates in your backend in real time, you will\
    \ want to add some UI affordances to your app that make it easy for your users\
    \ to request the latest data. One of the most common ways to let users refresh\
    \ data is *pull-to-refresh*, made popular in 2008 by Loren Brichter in the Tweetie\
    \ app^([^(46)](#fn46)) (later acquired by Twitter and relaunched as Twitter for\
    \ iOS).\n\nSwiftUI makes it easy to add this functionality to your app with just\
    \ a few lines of code, thanks to its declarative nature. And as mentioned earlier,\
    \ this feature also makes use of Swift’s new concurrency model to ensure that\
    \ your app’s UI remains responsive even while it needs to wait for any updates\
    \ to arrive.\n\nAdding the `refreshable` view modifier to your `List` view is\
    \ all it takes to add *pull-to-refresh* to your app:\n\n```\nstruct RefreshableBooksListView:\
    \ View {\n    @StateObject var viewModel = RefreshableBooksViewModel()\n    var\
    \ body: some View {\n        List(viewModel.books) { book in\n            RefreshableBookRowView(book:\
    \ book)\n        }\n        .refreshable {\n            await viewModel.refresh()\n\
    \        }\n    }\n}\n```\n\nAs indicated by the `await` keyword, `refreshable`\
    \ opens an asynchronous execution context. This requires that the code you’re\
    \ calling from within `refreshable` can execute asynchronously (if the code you’re\
    \ calling can execute nonasynchronously, because it returns immediately, that’s\
    \ fine as well, but more often than not you’ll want to communicate with a remote\
    \ API that requires being called asynchronously).\n\nTo give you an idea of how\
    \ this might look like, I’ve created a view model that simulates an asynchronous\
    \ remote API by adding some artificial wait time:\n\n```\nclass RefreshableBooksViewModel:\
    \ ObservableObject {\n    @Published var books: [Book] = Book.samples\n    private\
    \ func generateNewBook() -> Book {\n        let title = Lorem.sentence\n     \
    \   let author = Lorem.fullName\n        let pageCount = Int.random(in: 42...999)\n\
    \        return Book(title: title, author: author, isbn: \"9781234567890\", pages:\
    \ pageCount)\n    }\n    func refresh() async {\n        await Task.sleep(2_000_000_000)\n\
    \        let book = generateNewBook()\n        books.insert(book, at: 0)\n   \
    \ }\n}\n```\n\nLet’s take a look at this code to understand what’s going on.\n\
    \n1. As in the previous samples, `books` is a published property that the view\
    \ subscribes to.\n2. `generateNewBook` is a local function that produces a random\
    \ new `Book` instance using the excellent LoremSwiftum^([^(47)](#fn47)) library.\n\
    3. Inside `refresh`, we call `generateBook` to produce a new book and then insert\
    \ it into the published property `books`, but before we do so, we tell the app\
    \ to sleep for 2 seconds, using the `Task.sleep` call. This is an asynchronous\
    \ call, so we need to use `await` to call it.\n\nJust the same as in the previous\
    \ example, this code will produce a purple runtime warning: “Publishing changes\
    \ from background threads is not allowed; make sure to publish values from the\
    \ main thread (via operators like `receive(on:)`) on model updates,” so we need\
    \ to use `@MainActor` to ensure all updates happen on the main actor. This time,\
    \ instead of marking just the `refresh` method, we’re going to mark the entire\
    \ view model as `@MainActor`:\n\n```\n@MainActor\nclass RefreshableBooksViewModel:\
    \ ObservableObject {\n    // ...\n    func refresh() async {\n        // ...\n\
    \    }\n}\n```\n\nOne final adjustment before we can wrap up this section: you\
    \ will notice that when adding new items to the list by pulling to refresh, the\
    \ newly added items will appear instantly, without a smooth transition.\n\nThanks\
    \ to SwiftUI’s declarative syntax, adding animations to make this feel more natural\
    \ is super easy: all we need to do is adding an `animation` view modifier to the\
    \ `List` view:\n\n```\n// ...\nList(viewModel.books) { book in\n    RefreshableBookRowView(book:\
    \ book)\n}\n.animation(.default, value: viewModel.books)\n// ...\n```\n\nBy providing\
    \ the `value` parameter, we can make sure this animation is only run when the\
    \ contents of the list view change, for example, when new items are inserted or\
    \ removed."
  raw: '### Asynchronously Fetching Data


    The next sections of this chapter have one thing in common—they’re all based on
    Apple’s new APIs for handling asynchronous code.


    At WWDC 21, Apple introduced Swift’s new concurrency model as part of Swift 5.5.


    In the previous examples, we used a static list of data. The advantage of this
    approach is that we didn’t have to fetch (and wait for) this data, as it was already
    in memory. This was fine for the examples, as it allowed us to focus on what’s
    relevant, but it doesn’t reflect reality. In a real-world application, we usually
    display data from remote APIs, and this usually means performing asynchronous
    calls: while we’re waiting for the results to come in from the remote API, the
    app needs to continue updating the UI. If it didn’t do so, users might get the
    impression the app was hanging or even crashed.


    So in the next examples, I’m going to demonstrate how to make use of Swift’s new
    concurrency model to handle asynchronous code.


    A good moment to fetch data is when the user navigates to a new screen and the
    screen just appears. In previous versions of SwiftUI, using the `.onAppear` view
    modifier was a good place to request data. Starting with iOS 15, SwiftUI includes
    a new view modifier that makes this even easier: `.task`. It will start an asynchronous
    `Task` when the view appears and will cancel this task once the view disappears
    (if the task is still running). This is useful if your task is a long-running
    download that you automatically want to abort when the user leaves the screen.


    Using `.task` is as easy as applying it to your `List` view:


    ```

    struct AsyncFetchBooksListView: View {

    @StateObject fileprivate var viewModel = AsyncFetchBooksViewModel()

    var body: some View {

    List(viewModel.books) { book in

    AsyncFetchBookRowView(book: book)

    }

    .overlay {

    if viewModel.fetching {

    ProgressView("Fetching data, please wait...")

    .progressViewStyle(CircularProgressViewStyle(tint: .accentColor))

    }

    }

    .animation(.default, value: viewModel.books)

    .task {

    await viewModel.fetchData()

    }

    }

    }

    ```


    In the view model, you can then use asynchronous APIs to fetch data. In this example,
    I’ve mocked the backend to make the code a bit easier to read, and added an artificial
    delay:


    ```

    private class AsyncFetchBooksViewModel: ObservableObject {

    @Published var books = [Book]()

    @Published var fetching = false

    func fetchData() async {

    fetching = true

    await Task.sleep(2_000_000_000)

    books = Book.samples

    fetching = false

    }

    }

    ```


    If you’d try and run the code like this, you would end up with a runtime warning,
    saying that *“Publishing changes from background threads is not allowed; make
    sure to publish values from the main thread (via operators like receive(on:))
    on model updates.”*


    The reason for this runtime error is that the code inside `fetchData` is not executed
    on the main thread. However, UI updates *must* be executed on the main thread.
    In the past, we would’ve had to use `DispatchQueue.main.async { ... }` to make
    sure any UI updates are executed on the main thread. However, with Swift’s new
    concurrency model, there is an easier way: all we have to do is to mark any methods
    (or classes) that perform UI updates using the `@MainActor` property wrapper.
    This instructs the compiler to switch to the main actor when executing this code
    and thus make sure any UI updates run on the main thread. Here’s the updated code:


    ```

    private class AsyncFetchBooksViewModel: ObservableObject {

    @Published var books = [Book]()

    @Published var fetching = false

    @MainActor

    func fetchData() async {

    fetching = true

    await Task.sleep(2_000_000_000)

    books = Book.samples

    fetching = false

    }

    }

    ```


    To learn more about Swift’s new concurrency model, check out my video series^([^(42)](#fn42)),
    as well as the following articles on my blog:


    *   Getting Started with async/await in SwiftUI^([^(43)](#fn43))


    *   Cooperative Task Cancellation - SwiftUI Concurrency Essentials^([^(44)](#fn44))


    ### Pull-to-Refresh


    Unless you use an SDK like Cloud Firestore^([^(45)](#fn45)) that allows you to
    listen to updates in your backend in real time, you will want to add some UI affordances
    to your app that make it easy for your users to request the latest data. One of
    the most common ways to let users refresh data is *pull-to-refresh*, made popular
    in. 2008 by Loren Brichter in the Tweetie app^([^(46)](#fn46)) (later acquired
    by Twitter and relaunched as Twitter for iOS).


    SwiftUI makes it easy to add this functionality to your app with just a few lines
    of code, thanks to its declarative nature. And as mentioned earlier, this feature
    also makes use of Swift’s new concurrency model to ensure that your app’s UI remains
    responsive even while it needs to wait for any updates to arrive.


    Adding the `refreshable` view modifier to your `List` view is all it takes to
    add *pull-to-refresh* to your app:


    ```

    struct RefreshableBooksListView: View {

    @StateObject var viewModel = RefreshableBooksViewModel()

    var body: some View {

    List(viewModel.books) { book in

    RefreshableBookRowView(book: book)

    }

    .refreshable {

    await viewModel.refresh()

    }

    }

    }

    ```


    As indicated by the `await` keyword, `refreshable` opens an asynchronous execution
    context. This requires that the code you’re calling from within `refreshable`
    can execute asynchronously (if the code you’re calling can execute nonasynchronously,
    because it returns immediately, that’s fine as well, but more often than not you’ll
    want to communicate with a remote API that requires being called asynchronously).


    To give you an idea of how this might look like, I’ve created a view model that
    simulates an asynchronous remote API by adding some artificial wait time:


    ```

    class RefreshableBooksViewModel: ObservableObject {

    @Published var books: [Book] = Book.samples

    private func generateNewBook() -> Book {

    let title = Lorem.sentence

    let author = Lorem.fullName

    let pageCount = Int.random(in: 42...999)

    return Book(title: title, author: author, isbn: "9781234567890", pages: pageCount)

    }

    func refresh() async {

    await Task.sleep(2_000_000_000)

    let book = generateNewBook()

    books.insert(book, at: 0)

    }

    }

    ```


    Let’s take a look at this code to understand what’s going on.


    1.  As in the previous samples, `books` is a published property that the view
    subscribes to.


    2.  `generateNewBook` is a local function that produces a random new `Book` instance
    using the excellent LoremSwiftum^([^(47)](#fn47)) library.


    3.  Inside `refresh`, we call `generateBook` to produce a new book and then insert
    it into the published property `books`, but before we do so, we tell the app to
    sleep for 2 seconds, using the `Task.sleep` call. This is an asynchronous call,
    so we need to use `await` to call it.


    Just the same as in the previous example, this code will produce a purple runtime
    warning: *“Publishing changes from background threads is not allowed; make sure
    to publish values from the main thread (via operators like receive(on:)) on model
    updates”,* so we need to use `@MainActor` to ensure all updates happen on the
    main actor. This time, instead of marking just the `refresh` method, we’re going
    to mark the entire view model as `@MainActor`:


    ```

    @MainActor

    class RefreshableBooksViewModel: ObservableObject {

    // ...

    func refresh() async {

    // ...

    }

    }

    ```


    One final adjustment before we can wrap up this section: you will notice that
    when adding new items to the list by pulling to refresh, the newly added items
    will appear instantly, without a smooth transition.


    Thanks to SwiftUI’s declarative syntax, adding animations to make this feel more
    natural is super easy: all we need to do is adding an `animation` view modifier
    to the `List` view:


    ```

    // ...

    List(viewModel.books) { book in

    RefreshableBookRowView(book: book)

    }

    .animation(.default, value: viewModel.books)

    // ...

    ```


    By providing the `value` parameter, we can make sure this animation is only run
    when the contents of the list view change, for example, when new items are inserted
    or removed.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n以下是翻译后的内容：\n\n\n###\
    \ 异步获取数据\n\n本章接下来的部分有一个共同点——它们都基于 Apple 用于处理异步代码的新 API。\n\n在 WWDC 21 上，Apple 引入了\
    \ Swift 新的并发模型，作为 Swift 5.5 的一部分。\n\n在之前的例子中，我们使用了静态数据列表。这种方法的好处是我们不需要获取（并等待）这些数据，因为它们已经在内存中了。这对于示例来说没问题，因为它让我们能够专注于关键内容，但这并不反映现实情况。在实际应用中，我们通常会显示来自远程\
    \ API 的数据，这通常意味着要执行异步调用：在等待远程 API 返回结果的同时，应用程序需要继续更新 UI。如果不这样做，用户可能会觉得应用程序卡住了，甚至崩溃了。\n\
    \n因此，在接下来的示例中，我将演示如何利用 Swift 新的并发模型来处理异步代码。\n\n获取数据的一个好时机是当用户导航到一个新屏幕并且屏幕刚刚出现时。在早期版本的\
    \ SwiftUI 中，使用 `.onAppear` 视图修饰符是请求数据的好地方。从 iOS 15 开始，SwiftUI 包含了一个新的视图修饰符，使这变得更容易：`.task`。它会在视图出现时启动一个异步的\
    \ `Task`，并在视图消失时取消这个任务（如果任务仍在运行）。如果你的任务是长时间运行的下载，并且希望在用户离开屏幕时自动中止，这将非常有用。\n\n\
    使用 `.task` 就像将其应用于你的 `List` 视图一样简单：\n\n```\nstruct AsyncFetchBooksListView: View\
    \ {\n    @StateObject fileprivate var viewModel = AsyncFetchBooksViewModel()\n\
    \    var body: some View {\n        List(viewModel.books) { book in\n        \
    \    AsyncFetchBookRowView(book: book)\n        }\n        .overlay {\n      \
    \      if viewModel.fetching {\n                ProgressView(\"正在获取数据，请稍候...\"\
    )\n                    .progressViewStyle(CircularProgressViewStyle(tint: .accentColor))\n\
    \            }\n        }\n        .animation(.default, value: viewModel.books)\n\
    \        .task {\n            await viewModel.fetchData()\n        }\n    }\n\
    }\n```\n\n在视图模型中，你可以使用异步 API 来获取数据。在这个例子中，我模拟了后端以使代码更易于阅读，并添加了一个人为的延迟：\n\n```\n\
    private class AsyncFetchBooksViewModel: ObservableObject {\n    @Published var\
    \ books = [Book]()\n    @Published var fetching = false\n    func fetchData()\
    \ async {\n        fetching = true\n        await Task.sleep(2_000_000_000)\n\
    \        books = Book.samples\n        fetching = false\n    }\n}\n```\n\n如果你尝试这样运行代码，你会遇到一个运行时警告，提示“不允许从后台线程发布更改；确保在模型更新时从主线程（通过\
    \ `receive(on:)` 等操作符）发布值。”\n\n此运行时错误的原因是 `fetchData` 内部的代码未在主线程上执行。然而，UI 更新*必须*在主线程上执行。过去，我们必须使用\
    \ `DispatchQueue.main.async { ... }` 来确保任何 UI 更新都在主线程上执行。但是，使用 Swift 新的并发模型，有一个更简单的方法：我们只需要使用\
    \ `@MainActor` 属性包装器来标记任何执行 UI 更新的方法（或类）。这会指示编译器在执行此代码时切换到主参与者，从而确保所有 UI 更新都在主线程上运行。以下是更新后的代码：\n\
    \n```\nprivate class AsyncFetchBooksViewModel: ObservableObject {\n    @Published\
    \ var books = [Book]()\n    @Published var fetching = false\n    @MainActor\n\
    \    func fetchData() async {\n        fetching = true\n        await Task.sleep(2_000_000_000)\n\
    \        books = Book.samples\n        fetching = false\n    }\n}\n```\n\n要了解更多关于\
    \ Swift 新并发模型的信息，请查看我的视频系列^(⁴²)，以及我博客上的以下文章：\n\n* 在 SwiftUI 中开始使用 `async/await`^(⁴³)\n\
    * 协作式任务取消 - SwiftUI 并发性要点^(⁴⁴)\n\n### 下拉刷新\n\n除非你使用像 Cloud Firestore^(⁴⁵) 这样可以实时监听后端更新的\
    \ SDK，否则你会希望为你的应用添加一些 UI 元素，让用户能够轻松请求最新数据。最常见的让用户刷新数据的方式之一是*下拉刷新*，它在 2008 年由 Loren\
    \ Brichter 在 Tweetie 应用^(⁴⁶)中推广开来（后来被 Twitter 收购，并重新发布为 Twitter for iOS）。\n\n\
    SwiftUI 凭借其声明式特性，只需几行代码就能轻松地将此功能添加到你的应用程序中。正如前面提到的，此功能也利用了 Swift 新的并发模型，以确保即使在等待更新到达时，你的应用\
    \ UI 也能保持响应。\n\n只需将 `refreshable` 视图修饰符添加到你的 `List` 视图中，即可为你的应用添加*下拉刷新*功能：\n\n\
    ```\nstruct RefreshableBooksListView: View {\n    @StateObject var viewModel =\
    \ RefreshableBooksViewModel()\n    var body: some View {\n        List(viewModel.books)\
    \ { book in\n            RefreshableBookRowView(book: book)\n        }\n     \
    \   .refreshable {\n            await viewModel.refresh()\n        }\n    }\n\
    }\n```\n\n正如 `await` 关键字所示，`refreshable` 打开了一个异步执行上下文。这要求你在 `refreshable` 内部调用的代码能够异步执行（如果你调用的代码可以同步执行，因为它会立即返回，那也没问题，但通常情况下，你会希望与需要异步调用的远程\
    \ API 进行通信）。\n\n为了让您了解其可能的样子，我创建了一个视图模型，通过添加一些人为的等待时间来模拟异步远程 API：\n\n```\nclass\
    \ RefreshableBooksViewModel: ObservableObject {\n    @Published var books: [Book]\
    \ = Book.samples\n    private func generateNewBook() -> Book {\n        let title\
    \ = Lorem.sentence\n        let author = Lorem.fullName\n        let pageCount\
    \ = Int.random(in: 42...999)\n        return Book(title: title, author: author,\
    \ isbn: \"9781234567890\", pages: pageCount)\n    }\n    func refresh() async\
    \ {\n        await Task.sleep(2_000_000_000)\n        let book = generateNewBook()\n\
    \        books.insert(book, at: 0)\n    }\n}\n```\n\n让我们看看这段代码，了解发生了什么。\n\n1.\
    \ 与前面的示例一样，`books` 是一个发布属性，视图订阅了它。\n2. `generateNewBook` 是一个局部函数，它使用优秀的 LoremSwiftum^(⁴⁷)\
    \ 库生成一个随机的新的 `Book` 实例。\n3. 在 `refresh` 内部，我们调用 `generateBook` 生成一个新书，然后将其插入到发布属性\
    \ `books` 中，但在执行此操作之前，我们使用 `Task.sleep` 调用让应用程序休眠 2 秒。这是一个异步调用，因此我们需要使用 `await`\
    \ 来调用它。\n\n与前面的示例一样，此代码会产生一个紫色运行时警告：“不允许从后台线程发布更改；确保在模型更新时从主线程（通过 `receive(on:)`\
    \ 等操作符）发布值”，因此我们需要使用 `@MainActor` 来确保所有更新都发生在主参与者上。这次，我们不只标记 `refresh` 方法，而是要将整个视图模型标记为\
    \ `@MainActor`：\n\n```\n@MainActor\nclass RefreshableBooksViewModel: ObservableObject\
    \ {\n    // ...\n    func refresh() async {\n        // ...\n    }\n}\n```\n\n\
    在结束本节之前，还有最后一项调整：您会注意到，通过下拉刷新向列表添加新项目时，新添加的项目会立即出现，没有平滑的过渡。\n\n得益于 SwiftUI 的声明式语法，添加动画使其感觉更自然变得超级简单：我们只需要在\
    \ `List` 视图上添加一个 `animation` 视图修饰符即可：\n\n```\n// ...\nList(viewModel.books) {\
    \ book in\n    RefreshableBookRowView(book: book)\n}\n.animation(.default, value:\
    \ viewModel.books)\n// ...\n```\n\n通过提供 `value` 参数，我们可以确保仅当列表视图的内容发生变化时（例如，当插入或删除新项目时），才会运行动画。\n"
- fmt: "为了完善动画效果，我们还会在视图模型的`refresh`函数末尾添加一个短暂暂停——这能确保在进度旋转图标消失前，新行以平滑过渡的方式出现：\n\n\
    ```swift\nfunc refresh() async {\n    await Task.sleep(2_000_000_000)\n    let\
    \ book = generateNewBook()\n    books.insert(book, at: 0)\n    // 以下这一行与`.animation`修饰符结合，确保我们有平滑的动画效果\n\
    \    await Task.sleep(500_000_000)\n}\n```\n\n### 搜索\n\nSwiftUI 让在`List`视图中实现搜索变得轻而易举——你只需要对列表视图应用`.searchable`视图修饰符，SwiftUI\
    \ 就会自动为你处理所有 UI 方面的问题：它会显示一个搜索字段（并确保在首次显示列表视图时它位于屏幕外，就像你在原生应用中所期望的那样）。它还具有触发搜索和清除搜索字段的所有\
    \ UI 便利功能。\n\n剩下的唯一一件事就是实际执行搜索并提供适当的结果集。\n\n一般来说，搜索屏幕可以是在本地运行（即，过滤列表视图中显示的项），也可以是远程运行（即，对远程\
    \ API 执行查询并仅显示此调用的结果）。\n\n在本节中，我们将着眼于过滤列表视图中显示的元素。为此，我们将结合使用`async/await`和 Combine。\n\
    \n首先，我们将构建一个简单的`List`视图，该视图显示来自视图模型的书籍列表。这看起来应该非常熟悉，因为我们实际上重用了之前示例中的大量代码：\n\n\
    ```swift\nstruct SearchableBooksListView: View {\n    @StateObject var viewModel\
    \ = SearchableBooksViewModel()\n    var body: some View {\n        List(viewModel.books)\
    \ { book in\n            SearchableBookRowView(book: book)\n        }\n    }\n\
    }\n\nstruct SearchableBookRowView: View {\n    var book: Book\n    var body: some\
    \ View {\n        HStack(alignment: .top) {\n            Image(book.mediumCoverImageName)\n\
    \                .resizable()\n                .aspectRatio(contentMode: .fit)\n\
    \                .frame(height: 90)\n            VStack(alignment: .leading) {\n\
    \                Text(book.title)\n                    .font(.headline)\n    \
    \            Text(\"by \\(book.author)\")\n                    .font(.subheadline)\n\
    \                Text(\"\\(book.pages) pages\")\n                    .font(.subheadline)\n\
    \            }\n            Spacer()\n        }\n    }\n}\n```\n\n该视图模型与我们之前使用的非常相似，但有一个重要的区别——书籍集合最初是空的：\n\
    \n```swift\nclass SearchableBooksViewModel: ObservableObject {\n    @Published\
    \ var books = [Book]()\n}\n```\n\n为了给`SearchableBooksListView`添加搜索 UI，我们应用`.searchable`视图修饰符，并将其`text`参数绑定到视图模型上的一个新属性`searchTerm`：\n\
    \n```swift\nclass SearchableBooksViewModel: ObservableObject {\n    @Published\
    \ var books = [Book]()\n    @Published var searchTerm: String = \"\"\n}\n\nstruct\
    \ SearchableBooksListView: View {\n    @StateObject var viewModel = SearchableBooksViewModel()\n\
    \    var body: some View {\n        List(viewModel.books) { book in\n        \
    \    SearchableBookRowView(book: book)\n        }\n        .searchable(text: $viewModel.searchTerm)\n\
    \    }\n}\n```\n\n这会在`List`视图中安装搜索 UI，但如果你运行此代码，什么也不会发生。实际上，你甚至不会在列表视图中看到任何书籍。\n\
    \n要改变这一点，我们将向视图模型添加一个新的私有属性，该属性保存原始的、未过滤的书籍列表。最后，我们将设置一个 Combine 管道，根据用户输入的搜索词过滤此列表：\n\
    \n```swift\nclass SearchableBooksViewModel: ObservableObject {\n    @Published\
    \ private var originalBooks = Book.samples\n    @Published var books = [Book]()\n\
    \    @Published var searchTerm: String = \"\"\n    init() {\n        Publishers.CombineLatest($originalBooks,\
    \ $searchTerm) // (1)\n            .map { books, searchTerm in // (2)\n      \
    \          books.filter { book in // (3)\n                    searchTerm.isEmpty\n\
    \                        ? true\n                        : (book.title.matches(searchTerm)\n\
    \                            || book.author.matches(searchTerm))\n           \
    \     }\n            }\n            .assign(to: &$books)\n    }\n}\n```\n\n这个\
    \ Combine 管道是如何工作的？\n\n1. 我们使用`Publishers.CombineLatest`来获取两个发布者（`$originalBooks`和`$searchTerm`）的最新状态。在真实的应用程序中，我们可能会在后台收到书籍集合的更新，并且我们希望这些更新也包含在搜索结果中。每当其中一个发布者发送新事件时，`CombineLatest`发布者都会发布一个新的元组，其中包含`originalBooks`和`searchTerm`的最新值。\n\
    \n2. 然后我们使用`.map`操作符将`(books, searchTerm)`元组转换成一个书籍数组，我们最终会将其赋值给已发布的`$books`属性，该属性连接到`SearchableBooksListView`。\n\
    \n3. 在`.map`闭包内部，我们使用`filter`仅返回那些标题或作者姓名中包含搜索词的书籍。这部分过程实际上并非 Combine 特有——`filter`是`Array`的一个方法。\n\
    \n如果你运行此代码，你会注意到你输入搜索字段的每个字符都会自动大写。为了防止这种情况，我们可以在`searchable`视图修饰符*之后*应用`.autocapitalization`视图修饰符：\n\
    \n```swift\nstruct SearchableBooksListView: View {\n    @StateObject var viewModel\
    \ = SearchableBooksViewModel()\n    var body: some View {\n        List(viewModel.books)\
    \ { book in\n            SearchableBookRowView(book: book)\n        }\n      \
    \  .searchable(text: $viewModel.searchTerm)\n        .autocapitalization(.none)\n\
    \    }\n}\n```\n\n## 样式设计\n\n列表提供了广泛的样式选项，随着 SwiftUI 3 的推出，现在几乎可以配置列表视图的所有方面：\n\
    \n* 列表本身的整体外观（即列表样式）\n* 列表单元格的外观\n* 分隔线（终于可以了！）\n* ……以及更多\n\n让我们来看看有哪些可能。\n\n\
    ### 列表样式\n\n列表视图的整体外观和感觉可以通过`.listStyle`视图修饰符来控制。SwiftUI 支持六种不同的外观：\n\n1. `.automatic`\n\
    2. `.grouped`\n3. `.inset`\n4. `.insetGrouped`\n5. `.plain`\n6. `.sidebar`\n\n\
    ```swift\nList(items) { item in\n    Text(\"\\(item.label)\")\n}\n.listStyle(.plain)\n\
    ```\n\n如果你不提供样式，SwiftUI 将假定为`.automatic`。在 iOS 上，`.automatic`和`.insetGrouped`的外观相同。\n\
    \n与其试图用文字描述每种样式的外观，不如用图片来展示每种样式。\n\n![](images/509862_1_En_5_Chapter/509862_1_En_5_Fig6_HTML.png)\n\
    \n三张手机屏幕截图，分别标注为：a，列表样式 .inset — 列出 10 种水果；b，列表样式 .insetGrouped — 列出蔬菜和水果；c，列表样式\
    \ .grouped — 下方列出水果名称。箭头显示了不同的样式类型。\n\n**图 5-6**：更多列表样式\n\n![](images/509862_1_En_5_Chapter/509862_1_En_5_Fig5_HTML.png)\n\
    \n三张手机屏幕截图，分别标注为：a，列表样式 .automatic — 列出 10 种水果；b，列表样式 .sidebar — 蔬菜和水果隐藏在侧边栏下；c，列表样式\
    \ .plain — 列出水果。标签分别为 .automatic、.sidebar 和 .plain。\n\n**图 5-5**：列表样式"
  raw: 'To perfect the animations, we’ll also add a short pause to the end of the
    `refresh` function on the view model—this makes sure that the new rows appear
    with a smooth transition before the progress spinner disappears:


    ```

    func refresh() async {

    await Task.sleep(2_000_000_000)

    let book = generateNewBook()

    books.insert(book, at: 0)

    // the following line, in combination with the `.animation` modifier, makes sure
    we have a smooth animation

    await Task.sleep(500_000_000)

    }

    ```


    ### Searching


    SwiftUI makes it easy to implement search in `List` views—all you need to do is
    apply the `.searchable` view modifier to the list view, and SwiftUI will handle
    all the UI aspects for you automatically: it will display a search field (and
    make sure it is offscreen when you first display the list view, just like you’d
    expect from a native app). It also has all the UI affordances to trigger the search
    and clear the search field).


    The only thing that’s left to do is to actually perform the search and provide
    the appropriate result set.


    Generally speaking, a search screen can either act locally (i.e., filter the items
    being displayed in a list view) or remotely (i.e., perform a query against a remote
    API and only display the results of this call).


    For this section, we’re going to look at filtering the elements being displayed
    in the list view. To do so, we’ll be using a combination of async/await and Combine.


    To get started, we’ll build a simple `List` view that displays a list of books
    from a view model. This should look very familiar to you, as we’re in fact reusing
    much of the code we’ve used for the previous examples:


    ```

    struct SearchableBooksListView: View {

    @StateObject var viewModel = SearchableBooksViewModel()

    var body: some View {

    List(viewModel.books) { book in

    SearchableBookRowView(book: book)

    }

    }

    }

    struct SearchableBookRowView: View {

    var book: Book

    var body: some View {

    HStack(alignment: .top) {

    Image(book.mediumCoverImageName)

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text(book.title)

    .font(.headline)

    Text("by \(book.author)")

    .font(.subheadline)

    Text("\(book.pages) pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    }

    ```


    The view model is very similar to the ones we used previously, with one important
    difference—the collection of books is empty initially:


    ```

    class SearchableBooksViewModel: ObservableObject {

    @Published var books = [Book]()

    }

    ```


    To add a search UI to `SearchableBooksListView`, we apply the `.searchable` view
    modifier and bind its `text` parameter to a new `searchTerm` property on the view
    model:


    ```

    class SearchableBooksViewModel: ObservableObject {

    @Published var books = [Book]()

    @Published var searchTerm: String = ""

    }

    struct SearchableBooksListView: View {

    @StateObject var viewModel = SearchableBooksViewModel()

    var body: some View {

    List(viewModel.books) { book in

    SearchableBookRowView(book: book)

    }

    .searchable(text: $viewModel.searchTerm)

    }

    }

    ```


    This will install the search UI in the `List` view, but if you run this code,
    nothing will happen. In fact, you won’t even see any books in the list view.


    To change this, we will add a new private property to the view model which holds
    the original unfiltered list of books. And finally, we will set up a Combine pipeline
    that filters this list based on the search term entered by the user:


    ```

    class SearchableBooksViewModel: ObservableObject {

    @Published private var originalBooks = Book.samples

    @Published var books = [Book]()

    @Published var searchTerm: String = ""

    init() {

    Publishers.CombineLatest($originalBooks, $searchTerm) // (1)

    .map { books, searchTerm in // (2)

    books.filter { book in // (3)

    searchTerm.isEmpty

    ? true

    : (book.title.matches(searchTerm)

    || book.author.matches(searchTerm))

    }

    }

    .assign(to: &$books)

    }

    }

    ```


    How does this Combine pipeline work?


    1.  We use `Publishers.CombineLatest` to take the latest state of the two publishers,
    `$originalBooks` and `$searchTerm`. In a real-world application, we might receive
    updates to the collection of books in the background, and we’ll want these to
    be included in the search result as well. The `CombineLatest` publisher will publish
    a new tuple containing the latest value of `originalBooks` and `searchTerm` every
    time one of those publishers sends a new event.


    2.  We then use the `.map` operator to transform the `(books, searchTerm)` tuple
    into an array of books that we eventually assign to the published `$books` property,
    which is connected to the `SearchableBooksListView`.


    3.  Inside the `.map` closure, we use `filter` to return only the books that contain
    the search term either in their title or in the author’s name. This part of the
    process actually is not Combine-specific—`filter` is a method on `Array`.


    If you run this code, you will notice that everything you type into the search
    field will be autocapitalized. To prevent this, we can apply the `.``autocapitalization`
    view modifier—*after* the `searchable` view modifier:


    ```

    struct SearchableBooksListView: View {

    @StateObject var viewModel = SearchableBooksViewModel()

    var body: some View {

    List(viewModel.books) { book in

    SearchableBookRowView(book: book)

    }

    .searchable(text: $viewModel.searchTerm)

    .autocapitalization(.none)

    }

    }

    ```


    ## Styling


    Lists offer a wide range of styling options, and with SwiftUI 3, it is now possible
    to configure almost all aspects of list views:


    *   The overall appearance of the list itself (i.e., the list style)


    *   The look of the list cells


    *   The dividers (finally!)


    *   …and much more


    Let’s look at what’s possible.


    ### List Styles


    The overall look and feel of list views can be controlled with the `.listStyle`
    view modifier. SwiftUI supports six different looks:


    1.  `.automatic`


    2.  `.grouped`


    3.  `.inset`


    4.  `.insetGrouped`


    5.  `.plain`


    6.  `.sidebar`


    ```

    List(items) { item in

    Text("\(item.label)")

    }

    .listStyle(.plain)

    ```


    If you don’t provide a style, SwiftUI will assume `.automatic`. On iOS, `.automatic`
    and `.insetGrouped` have the same look.


    Instead of trying to describe in words how each of the styles looks like, here
    are the images that show each of the styles.


    ![](images/509862_1_En_5_Chapter/509862_1_En_5_Fig6_HTML.png)


    Three illustrations of mobile phone screens with the text, a, list style dot insert;
    list the 10 fruits, b, list style dot insert grouped; list the vegetables and
    fruits, and c, list style dot grouped with fruit names listed below. Arrows show
    the different style types.


