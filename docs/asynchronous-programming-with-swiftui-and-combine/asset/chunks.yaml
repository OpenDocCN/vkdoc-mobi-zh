- fmt: "### Everything Is a View—Except That It Isn’t\n\nOnce you start building UIs\
    \ in SwiftUI, you will quickly notice that all the UI elements are called `View`s—even\
    \ a screen is considered a `View`! It is tempting to think that all those views\
    \ are equivalent to `UIView` (or the respective subclass). SwiftUI might in fact\
    \ choose to render some parts of your UI using one of `UIView`'s subclasses. However,\
    \ it is worth noting that when SwiftUI talks about `View`s, it doesn’t refer to\
    \ the specific instances of a UI element on the screen, but rather a *description*\
    \ of that element.\n\nIn fact, it might have been easier if the SwiftUI team had\
    \ decided to say *“everything is a view description”*—but of course, that’s not\
    \ as catchy.\n\n### UIs Are a Function of Their State\n\nOne of the biggest challenges\
    \ in building UIs is making sure the UI reflects the state of the underlying data\
    \ model at all times. Previously, developers had to use a variety of tools and\
    \ mechanisms to ensure any changes to the model are reflected in the UI, and vice\
    \ versa. A variety of architectural patterns for dealing with this challenge have\
    \ been devised: MVC (Model View Controller), MVVM (Model, View, ViewModel), MVP\
    \ (Model View Presenter), VIPER (View, Interactor, Presenter, Entity, and Routing),\
    \ etc. With SwiftUI, Apple decided to bake state management right into the framework.\
    \ In SwiftUI, the UI is a function of the model’s state. This is worth keeping\
    \ in mind.\n\n*In SwiftUI, the UI is a function of the model’s state*\n\nTo update\
    \ the UI, you no longer directly manipulate the individual UI components. Instead,\
    \ you bind the UI elements to underlying models. Every time you change an attribute\
    \ on the model, SwiftUI will refresh the UI elements that are bound to this attribute,\
    \ making sure the UI and model are always in sync.\n\nThis also means it becomes\
    \ very difficult to accidentally forget to update parts of the UI: all parts of\
    \ the UI that are bound to an underlying model will be updated automatically by\
    \ SwiftUI for you.\n\n## A Quick Tour of SwiftUI\n\nTo get a better understanding\
    \ of SwiftUI and how it works, let’s build the traditional “Hello World” sample\
    \ application. But instead of just displaying “Hello World,” we will use SwiftUI’s\
    \ built-in state management capabilities to greet you by name.\n\nBy following\
    \ this little tutorial, you will learn how to:\n\n- Create a new SwiftUI project\
    \ in Xcode\n- Use the code editor and the `Attributes` inspector to make two-way\
    \ changes to the UI\n- Use SwiftUI’s simple state management capabilities to ensure\
    \ UI and model are kept in sync\n\n### Prerequisites\n\nTo follow this tutorial\
    \ (and all others in this book), you will need the following:\n\n- A recent version\
    \ of Xcode (14 or higher)\n- A Mac running macOS Monterey\n\n### Creating a New\
    \ SwiftUI App\n\n1. Launch Xcode and click *Create a new Xcode project*.\n\n![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig1_HTML.png)\n\
    \n*Figure 1-1. Creating a new project in Xcode*\n\n2. Make sure to select the\
    \ `iOS` section, and then choose the `App` template.\n\n![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig2_HTML.png)\n\
    \n*Figure 1-2. Choosing the iOS App template*\n\n3. Provide a name for your project\
    \ (I chose `Hello SwiftUI`), and make sure the following options are set:\n  \
    \ - Interface: `SwiftUI`\n   - Life Cycle: `SwiftUI App`\n   - Language: `Swift`\n\
    \n![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig3_HTML.png)\n\n*Figure 1-3.\
    \ Setting the project name and other project options*\n\nFor now, you can leave\
    \ the *Include Tests* option unchecked.\n\n4. Click Next and choose where to store\
    \ your project. You can leave the *Create Git repository on my Mac* option checked,\
    \ or turn it off if you like.\n\n![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig4_HTML.png)\n\
    \n*Figure 1-4. Choosing a folder to save the project to*\n\nXcode will create\
    \ the project for you, and you should find yourself in the editor for `ContentView.swift`:\n\
    \n![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig5_HTML.png)\n\n*Figure 1-5.\
    \ Xcode source editor and preview canvas*\n\nTo the right of the editor, you will\
    \ find the `Canvas`, which will display a preview of your UI. If it shows a message\
    \ saying “Preview paused”, click the Resume button or press `Option + Command\
    \ + P`. After a short moment, you will see a preview of your UI:\n\n![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig6_HTML.png)\n\
    \n*Figure 1-6. Xcode editor and UI preview*\n\nLet’s make a few changes to get\
    \ a feeling for SwiftUI’s two-way tooling:\n\n- In the code editor, update the\
    \ text of the greeting so it says your name instead of world. So for me, `\"Hello,\
    \ world!\"` becomes `\"Hello Peter!\"`.\n- Observe how the preview is updated\
    \ immediately with every single keystroke you make—without requiring you to compile\
    \ and relaunch the app on your phone or Simulator.\n\nLet’s now change how the\
    \ text looks:\n\n- Make sure the cursor is still on line 16 (the line that says\
    \ `Text(\"Hello, (your name)\")`).\n- In the `Attributes` inspector (on the right-hand\
    \ side of the Xcode window), open the `Color` drop-down menu and choose a different\
    \ color.\n- Observe how, as you make changes, Xcode immediately reflects this\
    \ change in both the preview canvas and the code editor.\n\n![](images/509862_1_En_1_Chapter/509862_1_En_1_Fig7_HTML.png)\n\
    \n*Figure 1-7. The updated text color is reflected in the editor as well as the\
    \ preview canvas*"
