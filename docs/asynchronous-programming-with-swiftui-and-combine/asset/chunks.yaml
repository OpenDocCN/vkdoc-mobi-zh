- fmt: "# 改进错误处理与实现自定义 Combine 运算符\n\n## 重试策略中的暂停问题\n\n更重要的是，重试之间没有暂停。如果我们的目标是减轻已经不堪重负的服务器的压力，那么发送四个请求（原始请求加上三次重试）反而会使情况变得更糟。\n\
    \n那么，我们如何确保：\n\n1. 只重试特定类型的失败？\n2. 在重试失败请求之前有一个暂停？\n\n我们的实现需要能够捕获任何上游错误，并将它们沿管道传播到下一个运算符。然而，当捕获到`serverError`时，我们希望暂停片刻，然后重新启动整个管道，以便重试\
    \ URL 请求。\n\n首先，确保我们能够：(1) 捕获所有错误，(2) 过滤出`serverError`，(3) 沿管道传播所有其他错误。`tryCatch`运算符“通过用另一个发布者替换上游发布者或抛出新错误来处理来自上游发布者的错误”。这正是我们需要的：\n\
    \n```swift\nreturn URLSession.shared.dataTaskPublisher(for: url)\n    .mapError\
    \ { ... }\n    .tryMap { ... }\n    .tryCatch { error -> AnyPublisher in // (1)\n\
    \        if case APIError.serverError(_, _, let retryAfter) = error { // (2)\n\
    \            // ...\n        }\n        throw error // (3)\n    }\n    .map(\\\
    .data)\n    .tryMap { ... }\n    .map(\\.isAvailable)\n    .eraseToAnyPublisher()\n\
    ```\n\n当捕获到`serverError`时，我们希望等待一小段时间，然后重新启动管道。\n\n我们可以通过触发一个新事件（使用`Just`发布者），用`delay`延迟几秒钟，然后使用`flatMap`启动一个新的`dataTaskPublisher`来实现这一点。我们不在`if`语句中粘贴管道的完整代码，而是将`dataTaskPublisher`赋值给一个局部变量：\n\
    \n```swift\nlet dataTaskPublisher = URLSession.shared.dataTaskPublisher(for: url)\n\
    \    .mapError { ... }\n    .tryMap { ... }\n\nreturn dataTaskPublisher\n    .tryCatch\
    \ { error -> AnyPublisher in\n        if case APIError.serverError = error {\n\
    \            return Just(()) // (1)\n                .delay(for: 3, scheduler:\
    \ DispatchQueue.global())\n                .flatMap { _ in\n                 \
    \   return dataTaskPublisher\n                }\n                .retry(10) //\
    \ (2)\n                .eraseToAnyPublisher()\n        }\n        throw error\n\
    \    }\n    .map(\\.data)\n    .tryMap { ... }\n    .map(\\.isAvailable)\n   \
    \ .eraseToAnyPublisher()\n```\n\n关于这段代码的几点说明：\n\n1. `Just`发布者期望*某个*它可以发布的值。由于我们使用哪个值并不重要，我们可以发送任何想要的内容。我决定发送一个空元组，这通常用于表示“无意义”的情况。\n\
    2. 我们重试发送请求10次，这意味着总共最多发送11次（原始调用加上10次重试）。\n\n这个数字如此高的唯一原因是，当服务器返回成功结果时，更容易观察到管道的结束。当您发送`maintenance`作为用户名时，演示服务器可以模拟从计划维护中恢复：对于每一次和第二次请求，它会抛出`InternalServerError.maintenance`（映射为\
    \ HTTP `500`）。每次第三次请求，它会返回`success`（即 HTTP `200`）。查看这一效果的最佳方法是从 Xcode 内部运行服务器（打开`server`项目并按下*运行*按钮）。然后，为包含`throw\
    \ InternalServerError.maintenance`的行创建一个*声音*断点。\n\n![](images/509862_1_En_10_Chapter/509862_1_En_10_Fig3_HTML.png)\n\
    \n一段程序代码中，第113行被选中，下方有一个弹出对话框。该框已勾选启用断点复选框，并包含名称、条件、忽略、操作和选项的输入框和复选框。\n\n图 10-3\n\
    \n*设置声音断点*\n\n每次服务器收到`username=maintenance`的请求时，您都会听到声音。现在，运行示例应用程序并输入`maintenance`作为用户名。您会听到服务器响应错误两次，然后返回成功。\n\
    \n## 总结\n\n在上一章中使用相当宽松的方法处理错误之后，这一次我们更加认真地对待了错误处理。\n\n在本章中，我们使用了几种策略来处理错误并将其暴露给\
    \ UI。错误处理是开发高质量软件的重要方面，而且有很多相关资料。然而，如何将错误暴露给用户这一方面并不常被讨论，希望本文能让您更好地理解如何实现这一点。\n\
    \n与原始代码相比，代码变得稍微复杂了一些，这是我们将在下一章中解决的问题，届时我们将研究如何实现自己的 Combine 运算符。为了演示其工作原理，我们将实现一个运算符，使处理增量退避就像在\
    \ Combine 管道中添加一行代码一样简单！\n\n脚注 [1](#509862_1_En_10_Chapter.xhtml#Fn1_source) [2](#509862_1_En_10_Chapter.xhtml#Fn2_source)\
    \ [3](#509862_1_En_10_Chapter.xhtml#Fn3_source)\n\n# 11. 实现自定义 Combine 运算符\n\n\
    在前面的章节中，您学习了如何使用 Combine 访问网络、处理错误，并以对应用程序用户有意义的方式暴露可能发生的错误。\n\n毫不奇怪，我们最终得到的代码看起来比最初的要复杂一些。毕竟，正确处理错误所占用的代码行数比完全不处理错误（或直接忽略错误）要多。\n\
    \n在本章中，我们将通过利用 Combine 最强大的工具之一：运算符，来改善这种情况。您已经在之前的章节中使用过运算符，在本章中，我们将更深入地了解它们是什么、如何工作，以及——最重要的是——将代码重构为自定义\
    \ Combine 运算符如何使其更易于推理和更易于复用。\n\n## 什么是 Combine 运算符？\n\nCombine 定义了三个主要概念来实现响应式编程的思想：\n\
    \n1. 发布者（`Publisher`）\n2. 订阅者（`Subscriber`）\n3. 运算符（`Operator`）\n\n**发布者**随时间传递值，**订阅者**在接收这些值时对其进行操作。**运算符**位于发布者和订阅者之间，可用于操纵值流。\n\
    \n需要运算符的原因有几个：\n\n* 发布者并不总是以订阅者所需的格式生成事件。例如，发布者可能发出 HTTP 网络请求的结果，但我们的订阅者需要的是自定义数据结构。在这种情况下，我们可以使用`map`或`decode`等运算符将发布者的输出转换为订阅者期望的数据结构。\n\
    \n* 发布者可能产生比订阅者感兴趣的事件更多的事件。例如，输入搜索词时，我们可能对每一次按键都不感兴趣，而只对最终的搜索词感兴趣。在这种情况下，我们可以使用`debounce`或`throttle`等运算符来减少订阅者必须处理的事件数量。\n\
    \n运算符帮助我们获取发布者产生的输出，并将其转换为订阅者可以消费的内容。在之前的章节中，我们已经使用了许多内置运算符，例如：\n\n* `map`（及其异常友好版本`tryMap`）用于转换元素\n\
    * `debounce`用于仅在两个事件之间存在暂停时发布元素\n* `removeDuplicates`用于删除重复事件\n* `flatMap`用于将元素转换为新的发布者"
  raw: 'What’s more, there is no pause between retries. If our goal was to reduce
    the pressure on a server that is already overwhelmed, we’ve made it even worse
    by sending not one, but four requests (the original request, plus three retries).


    So how can we make sure that


    1.  We only retry certain types of failures?


    2.  There is a pause before we retry a failed request?


    Our implementation needs to be able to catch any upstream errors and propagate
    them down the pipeline to the next operator. When we catch a `serverError`, however,
    we want to pause for a moment and them start the entire pipeline again so it can
    retry the URL request.


    Let’s first make sure we can (1) catch all errors, (2) filter out the `serverError`,
    and (3) propagate all other errors along the pipeline. The `tryCatch` operator
    “handles errors from an upstream publisher by either replacing it with another
    publisher or throwing a new error.” This is exactly what we need:


    ```

    return URLSession.shared.dataTaskPublisher(for: url)

    .mapError { ... }

    .tryMap { ... }

    .tryCatch { error -> AnyPublisher in // (1)

    if case APIError.serverError(_, _, let retryAfter) = error { // (2)

    // ...

    }

    throw error // (3)

    }

    .map(\.data)

    .tryMap { ... }

    .map(\.isAvailable)

    .eraseToAnyPublisher()

    ```


    When we catch a `serverError`, we want to wait for a short amount of time and
    then restart the pipeline.


    We can do this by firing off a new event (using the `Just` publisher), `delay`ing
    it for a few seconds, and then using `flatMap` to kick off a new `dataTaskPublisher`.
    Instead of pasting the entire code for the pipeline inside the `if` statement,
    we assign the `dataTaskPublisher` to a local variable:


    ```

    let dataTaskPublisher = URLSession.shared.dataTaskPublisher(for: url)

    .mapError { ... }

    .tryMap { ... }

    return dataTaskPublisher

    .tryCatch { error -> AnyPublisher in

    if case APIError.serverError = error {

    return Just(()) // (1)

    .delay(for: 3, scheduler: DispatchQueue.global())

    .flatMap { _ in

    return dataTaskPublisher

    }

    .retry(10) // (2)

    .eraseToAnyPublisher()

    }

    throw error

    }

    .map(\.data)

    .tryMap { ... }

    .map(\.isAvailable)

    .eraseToAnyPublisher()

    ```


    A couple of notes about this code:


    1.  The `Just` publisher expects *some* value it can publish. Since it really
    doesn’t matter which value we use, we can send anything we want. I decided to
    send an empty tuple, which is often used in situations when you mean “nothing”.


    2.  We retry sending the request 10 times, meaning it will be sent up to 11 times
    in total (the original call plus the 10 retries).


    The only reason why this number is so high is to make it easier to see that the
    pipeline comes to an end as soon as the server returns a successful result. The
    demo server can simulate recovering from scheduled maintenance when you send *maintenance*
    as the username: it will throw `InternalServerError.maintenance` (which is mapped
    to HTTP `500`) for every first and second request. Every third request, it will
    return a `success` (i.e., HTTP `200`). The best way to see this in action is to
    run the server from inside Xcode (run open the `server` project and press the
    *Run* button). Then, create a *Sound* breakpoint for the line that contains `throw
    InternalServerError.maintenance`.


    ![](images/509862_1_En_10_Chapter/509862_1_En_10_Fig3_HTML.png)


    A snippet of a program code has line 113 selected with a pop-up dialog box below.
    The box has the enable breakpoint checkbox ticked with input boxes and checkboxes
    for Name, Condition, Ignore, Action, and Options below.


    Figure 10-3


    *Setting up a* *sound breakpoint*


    Every time the server receives a request for `username=maintenance`, you will
    hear a sound. Now, run the sample app and enter *maintenance* as the username.
    You will hear the server responding with an error two times, before it will return
    a success.


    ## Summary


    After using a rather lenient approach to handle errors in the recent chapter,
    we took things a lot more serious this time around.


    In this chapter, we used a couple of strategies to handle errors and expose them
    to the UI. Error handling is an important aspect of developer quality software,
    and there is a lot of material out there. However, the aspect of how to expose
    errors to the user isn’t often discussed, and I hope this article provided you
    with a better understanding of how you can achieve this.


    In comparison to the original code, the code became a bit more complicated, and
    this is something we’re going to address in the next chapter when we will look
    at implementing your own Combine operators. To demonstrate how this works, we
    will implement an operator that makes handling incremental backoff as easy as
    adding one line to your Combine pipeline!


    Footnotes [1](#509862_1_En_10_Chapter.xhtml#Fn1_source)   [2](#509862_1_En_10_Chapter.xhtml#Fn2_source)
      [3](#509862_1_En_10_Chapter.xhtml#Fn3_source)


    # 11. Implementing Custom Combine Operators


    In the previous chapters, you learned how to use Combine to access the network,
    handle errors, and expose any errors that might occur in a way that’s meaningful
    for the users of your app.


    Not surprisingly, we ended up with code that looked a bit more complicated than
    what we had in the beginning. After all, properly handling errors will take up
    more lines of code than not handling errors at all (or just ignoring them).


    In this chapter, we are going to improve this situation by making use of one of
    Combine’s most powerful tools: operators. You’ve already used operators in the
    previous chapters, and in this chapter, we’re going to take a closer look at what
    they are, how they work, and—most importantly—how refactoring our code into a
    custom Combine operator will make it easier to reason about and more reusable
    at the same time.


    ## What Is a Combine Operator?


    Combine defines three main concepts to implement the idea of reactive programming:


    1.  Publishers


    2.  Subscribers


    3.  Operators


    **Publishers** deliver values over time, and **subscribers** act on these values
    as they receive them. **Operators** sit in the middle between publishers and subscribers
    and can be used to manipulate the stream of values.


    There are a few reasons why we need operators:


    *   Publishers don’t always produce events in the format that is required by the
    subscriber. For example, a publisher might emit the result of a HTTP network request,
    but our subscriber needs a custom data structure. In this situation, we can use
    an operator like `map` or `decode` to turn the output of the publisher into the
    data structure the subscriber expects.


    *   Publishers might produce more events than the subscriber is interested in.
    For example, when typing a search term, we might not be interested in every single
    keystroke but only the final search term. In this situation, we can use operators
    like `debounce` or `throttle` to reduce the number of events our subscriber has
    to handle.


    Operators help us to take the output produced by a publisher and turn it into
    something that the subscriber can consume. We’ve already used a number of built-in
    operators in previous chapters, for example:


    *   `map` (and its exceptional friend, `tryMap`) to transform elements


    *   `debounce` to publish elements only after a pause between two events


    *   `removeDuplicates` to remove duplicate events


    *   `flatMap` to transform elements into a new publisher'
  trans: "\n# 改进错误处理与实现自定义 Combine 运算符\n\n## 重试策略中的暂停问题\n\n更重要的是，重试之间没有暂停。如果我们的目标是减轻已经不堪重负的服务器的压力，那么发送四个请求（原始请求加上三次重试）反而会使情况变得更糟。\n\
    \n那么，我们如何确保：\n\n1. 只重试特定类型的失败？\n2. 在重试失败请求之前有一个暂停？\n\n我们的实现需要能够捕获任何上游错误，并将它们沿管道传播到下一个运算符。然而，当捕获到`serverError`时，我们希望暂停片刻，然后重新启动整个管道，以便重试\
    \ URL 请求。\n\n首先，确保我们能够：(1) 捕获所有错误，(2) 过滤出`serverError`，(3) 沿管道传播所有其他错误。`tryCatch`运算符“通过用另一个发布者替换上游发布者或抛出新错误来处理来自上游发布者的错误”。这正是我们需要的：\n\
    \n```swift\nreturn URLSession.shared.dataTaskPublisher(for: url)\n    .mapError\
    \ { ... }\n    .tryMap { ... }\n    .tryCatch { error -> AnyPublisher in // (1)\n\
    \        if case APIError.serverError(_, _, let retryAfter) = error { // (2)\n\
    \            // ...\n        }\n        throw error // (3)\n    }\n    .map(\\\
    .data)\n    .tryMap { ... }\n    .map(\\.isAvailable)\n    .eraseToAnyPublisher()\n\
    ```\n\n当捕获到`serverError`时，我们希望等待一小段时间，然后重新启动管道。\n\n我们可以通过触发一个新事件（使用`Just`发布者），用`delay`延迟几秒钟，然后使用`flatMap`启动一个新的`dataTaskPublisher`来实现这一点。我们不在`if`语句中粘贴管道的完整代码，而是将`dataTaskPublisher`赋值给一个局部变量：\n\
    \n```swift\nlet dataTaskPublisher = URLSession.shared.dataTaskPublisher(for: url)\n\
    \    .mapError { ... }\n    .tryMap { ... }\n\nreturn dataTaskPublisher\n    .tryCatch\
    \ { error -> AnyPublisher in\n        if case APIError.serverError = error {\n\
    \            return Just(()) // (1)\n                .delay(for: 3, scheduler:\
    \ DispatchQueue.global())\n                .flatMap { _ in\n                 \
    \   return dataTaskPublisher\n                }\n                .retry(10) //\
    \ (2)\n                .eraseToAnyPublisher()\n        }\n        throw error\n\
    \    }\n    .map(\\.data)\n    .tryMap { ... }\n    .map(\\.isAvailable)\n   \
    \ .eraseToAnyPublisher()\n```\n\n关于这段代码的几点说明：\n\n1. `Just`发布者期望*某个*它可以发布的值。由于我们使用哪个值并不重要，我们可以发送任何想要的内容。我决定发送一个空元组，这通常用于表示“无意义”的情况。\n\
    2. 我们重试发送请求 10 次，这意味着总共最多发送 11 次（原始调用加上 10 次重试）。\n\n这个数字如此高的唯一原因是，当服务器返回成功结果时，更容易观察到管道的结束。当您发送`maintenance`作为用户名时，演示服务器可以模拟从计划维护中恢复：对于每一次和第二次请求，它会抛出`InternalServerError.maintenance`（映射为\
    \ HTTP `500`）。每次第三次请求，它会返回`success`（即 HTTP `200`）。查看这一效果的最佳方法是从 Xcode 内部运行服务器（打开`server`项目并按下*运行*按钮）。然后，为包含`throw\
    \ InternalServerError.maintenance`的行创建一个*声音*断点。\n\n![](img/509862_1_En_10_Fig3_HTML.png)\n\
    \n一段程序代码中，第 113 行被选中，下方有一个弹出对话框。该框已勾选启用断点复选框，并包含名称、条件、忽略、操作和选项的输入框和复选框。\n\n图 10-3\n\
    \n*设置声音断点*\n\n每次服务器收到`username=maintenance`的请求时，您都会听到声音。现在，运行示例应用程序并输入`maintenance`作为用户名。您会听到服务器响应错误两次，然后返回成功。\n\
    \n## 总结\n\n在上一章中使用相当宽松的方法处理错误之后，这一次我们更加认真地对待了错误处理。\n\n在本章中，我们使用了几种策略来处理错误并将其暴露给\
    \ UI。错误处理是开发高质量软件的重要方面，而且有很多相关资料。然而，如何将错误暴露给用户这一方面并不常被讨论，希望本文能让您更好地理解如何实现这一点。\n\
    \n与原始代码相比，代码变得稍微复杂了一些，这是我们将在下一章中解决的问题，届时我们将研究如何实现自己的 Combine 运算符。为了演示其工作原理，我们将实现一个运算符，使处理增量退避就像在\
    \ Combine 管道中添加一行代码一样简单！\n\n脚注 1 2 3\n\n# 11. 实现自定义 Combine 运算符\n\n在前面的章节中，您学习了如何使用\
    \ Combine 访问网络、处理错误，并以对应用程序用户有意义的方式暴露可能发生的错误。\n\n毫不奇怪，我们最终得到的代码看起来比最初的要复杂一些。毕竟，正确处理错误所占用的代码行数比完全不处理错误（或直接忽略错误）要多。\n\
    \n在本章中，我们将通过利用 Combine 最强大的工具之一：运算符，来改善这种情况。您已经在之前的章节中使用过运算符，在本章中，我们将更深入地了解它们是什么、如何工作，以及——最重要的是——将代码重构为自定义\
    \ Combine 运算符如何使其更易于推理和更易于复用。\n\n## 什么是 Combine 运算符？\n\nCombine 定义了三个主要概念来实现响应式编程的思想：\n\
    \n1. 发布者（`Publisher`）\n2. 订阅者（`Subscriber`）\n3. 运算符（`Operator`）\n\n**发布者**随时间传递值，**订阅者**在接收这些值时对其进行操作。**运算符**位于发布者和订阅者之间，可用于操纵值流。\n\
    \n需要运算符的原因有几个：\n\n* 发布者并不总是以订阅者所需的格式生成事件。例如，发布者可能发出 HTTP 网络请求的结果，但我们的订阅者需要的是自定义数据结构。在这种情况下，我们可以使用`map`或`decode`等运算符将发布者的输出转换为订阅者期望的数据结构。\n\
    \n* 发布者可能产生比订阅者感兴趣的事件更多的事件。例如，输入搜索词时，我们可能对每一次按键都不感兴趣，而只对最终的搜索词感兴趣。在这种情况下，我们可以使用`debounce`或`throttle`等运算符来减少订阅者必须处理的事件数量。\n\
    \n运算符帮助我们获取发布者产生的输出，并将其转换为订阅者可以消费的内容。在之前的章节中，我们已经使用了许多内置运算符，例如：\n\n* `map`（及其异常友好版本`tryMap`）用于转换元素\n\
    * `debounce`用于仅在两个事件之间存在暂停时发布元素\n* `removeDuplicates`用于删除重复事件\n* `flatMap`用于将元素转换为新的发布者\n"
- fmt: "# Implementing Custom Operators\n\nUsually, when creating Combine pipelines,\
    \ we will start with a publisher and then connect a bunch of Combine’s built-in\
    \ operators to process the events emitted by the publisher. At the end of any\
    \ Combine pipeline is a subscriber that receives the events. As you saw in Chapter\
    \ [10](#509862_1_En_10_Chapter.xhtml), pipelines can become complicated quite\
    \ quickly.\n\nTechnically, operators are just functions that create other publishers\
    \ and subscribers which handle the events they receive from an upstream publisher.\n\
    \nThis means we can create our own custom operators by extending `Publisher` with\
    \ a function that returns a publisher (or subscriber) that operates on the events\
    \ it receives from the publisher we use it on.\n\nLet’s see what this means in\
    \ practice by implementing a simple operator that allows us to inspect events\
    \ coming down a Combine pipeline using Swift’s `dump()` function. This function\
    \ prints the contents of a variable to the console, showing the structure of the\
    \ variable as a nested tree—similar to the debug inspector in Xcode.\n\nYou might\
    \ be aware of Combine’s `print()` operator, which works very similarly. However,\
    \ it doesn’t provide as much detail and—more importantly—doesn’t show the result\
    \ as a nested structure.\n\nTo add an operator, we first need to add an extension\
    \ to the `Publisher` type. As we don’t want to manipulate the events this operator\
    \ receives, we can use the upstream publisher’s types as the result types as well\
    \ and return `AnyPublisher<Self.Output, Self.Failure>` as the result type:\n\n\
    ```\nextension Publisher {\n    func dump() -> AnyPublisher<Self.Output, Self.Failure>\
    \ {\n    }\n}\n```\n\nInside the function, we can then use the `handleEvents`\
    \ operator to examine any events this pipeline processes. `handleEvents` has a\
    \ bunch of optional closures that get called when the publisher receives new subscriptions,\
    \ new output values, a cancellation event, when it is finished, or when the subscriber\
    \ requests more elements. As we are only interested in new `Output` values, we\
    \ can ignore most of the closures and just implement the `receiveOutput` closure.\n\
    \nWhenever we receive a value, we will use Swift’s `dump()` function to print\
    \ the contents of the value to the console:\n\n```\nextension Publisher {\n  \
    \  func dump() -> AnyPublisher<Self.Output, Self.Failure> {\n        handleEvents(receiveOutput:\
    \  { value in\n            Swift.dump(value)\n        })\n        .eraseToAnyPublisher()\n\
    \    }\n}\n```\n\nWe can use this operator like any of Combine’s built-in operators.\
    \ In the following example, we attach our new operator to a simple publisher that\
    \ emits the current date:\n\n```\nJust(Date())\n    .dump()\n    // prints:\n\
    \    // ▿ 2022-03-02 09:38:49 +0000\n    //   - timeIntervalSinceReferenceDate:\
    \ 667906729.659255\n```\n\n# Implementing a Retry Operator with a Delay\n\nNow\
    \ that we’ve got a basic understanding of how to implement a simple operator,\
    \ let’s see if we can refactor the code from the previous episode. Here is the\
    \ relevant part:\n\n```\nreturn dataTaskPublisher\n    .tryCatch { error -> AnyPublisher<Data,\
    \ Error> in\n        if case APIError.serverError = error {\n            return\
    \ Just(Void())\n                .delay(for: 3, scheduler: DispatchQueue.global())\n\
    \                .flatMap { _ in\n                    return dataTaskPublisher\n\
    \                }\n                .print(\"before retry\")\n               \
    \ .retry(10)\n                .eraseToAnyPublisher()\n        }\n        throw\
    \ error\n    }\n    .map(\\.data)\n```\n\nLet’s begin by constructing an overloaded\
    \ extension for the `retry` operator on `Publisher`:\n\n```\nextension Publisher\
    \ {\n    func retry(_ retries: Int, withDelay delay: Int)\n        -> Publishers.TryCatch<Self,\
    \ Just<Void>.Delay<DispatchQueue>.FlatMap<Self, AnyPublisher<Self.Output, Self.Failure>>>\n\
    \        where T == Self.Output, E == Self.Failure\n    {\n    }\n}\n```\n\nThis\
    \ defines two input parameters, `retries` and `withDelay`, which we can use to\
    \ specify how many times the upstream publisher should be retried and how much\
    \ time (in seconds) should be left between each retry.\n\nSince we are going to\
    \ use the `tryCatch` operator inside our new operator, we need to use its publisher\
    \ type, `Publishers.TryCatch`, as the return type.\n\nWith this in place, we can\
    \ now implement the body of the operator by pasting the existing implementation:\n\
    \n```\nextension Publisher {\n    func retry(_ retries: Int, withDelay delay:\
    \ Int)\n        -> Publishers.TryCatch<Self, Just<Void>.Delay<DispatchQueue>.FlatMap<Self,\
    \ AnyPublisher<Self.Output, Self.Failure>>>\n        where T == Self.Output, E\
    \ == Self.Failure\n    {\n        return self.tryCatch { error -> AnyPublisher<Self.Output,\
    \ Self.Failure> in\n            return Just(Void())\n                .delay(for:\
    \ .init(integerLiteral: delay),\n                       scheduler: DispatchQueue.global())\n\
    \                .flatMap { _ in\n                    return self\n          \
    \      }\n                .retry(retries)\n                .eraseToAnyPublisher()\n\
    \        }\n    }\n}\n```\n\nYou might have noticed that we removed the error\
    \ check. This is because `APIError` is an error type that is specific to our application.\
    \ As we are interested in making this an implementation that can be used in other\
    \ apps as well, let’s see how we can make this more flexible.\n\n# Conditionally\
    \ Retrying\n\nTo make this code reusable in other contexts, let’s add a parameter\
    \ for a trailing closure that the caller can use to control whether the operator\
    \ should retry or not.\n\n```\nfunc retry(_ retries: Int, withDelay delay: Int,\
    \ condition: ((E) -> Bool)? = nil) -> Publishers.TryCatch<Self, Just<Void>.Delay<DispatchQueue>.FlatMap<Self,\
    \ AnyPublisher<Self.Output, Self.Failure>>> where T == Self.Output, E == Self.Failure\
    \ {\n    return self.tryCatch { error -> AnyPublisher<Self.Output, Self.Failure>\
    \ in\n        if condition?(error) == true {\n            return Just(Void())\n\
    \                .delay(for: .init(integerLiteral: delay),\n                 \
    \      scheduler: DispatchQueue.global())\n                .flatMap { _ in\n \
    \                   return self\n                }\n                .retry(retries)\n\
    \                .eraseToAnyPublisher()\n        }\n        else {\n         \
    \   throw error\n        }\n    }\n}\n```\n\nIf the caller doesn’t provide the\
    \ closure, the operator will retry using the parameters `retries` and `delay`.\n\
    \nWith this in place, we can simplify the original call:\n\n```\n// ...\nreturn\
    \ dataTaskPublisher\n    .retry(10, withDelay: 3) { error in\n        if case\
    \ APIError.serverError = error {\n            return true\n        }\n       \
    \ return false\n    }\n    .map(\\.data)\n// ...\n```\n\n# Implementing a Retry\
    \ Operator for Exponential Backoff\n\nNow, let’s take this one step further and\
    \ implement a version of the `retry` operator with exponential backoff.\n\n> *Exponential\
    \ backoff is commonly utilised as part of rate limiting*^([^(78)](#fn78)) *mechanisms\
    \ in computer systems such as web services*^([^(79)](#fn79)), *to help enforce\
    \ fair distribution of access to resources and prevent network congestion*^([^(80)](#fn80)).\
    \ (Wikipedia^([^(81)](#fn81)))\n\nTo increment the delay between two requests,\
    \ we introduce a local variable that holds the current interval and double it\
    \ after each request. To make this possible, we need to wrap the inner pipeline\
    \ that kicks off the original pipeline in a pipeline that increments the backoff\
    \ variable:\n\n```\nfunc retry(_ retries: Int,\n           withBackoff initialBackoff:\
    \ Int,\n           condition: ((E) -> Bool)? = nil)\n    -> Publishers.TryCatch<Self,\
    \ Just<Void>.Delay<DispatchQueue>.FlatMap<Self, AnyPublisher<Self.Output, Self.Failure>>>\n\
    \    where T == Self.Output, E == Self.Failure\n{\n    return self.tryCatch {\
    \ error -> AnyPublisher<Self.Output, Self.Failure> in\n        if condition?(error)\
    \ ?? true {\n            var backOff = initialBackoff\n            return Just(Void())\n\
    \                .flatMap { _ -> AnyPublisher<Self.Output, Self.Failure> in\n\
    \                    let result = Just(Void())\n                        .delay(for:\
    \ .init(integerLiteral: backOff),\n                               scheduler: DispatchQueue.global())\n\
    \                        .flatMap { _ in\n                            return self\n\
    \                        }\n                    backOff = backOff * 2\n      \
    \              return result.eraseToAnyPublisher()\n                }\n      \
    \          .retry(retries - 1)\n                .eraseToAnyPublisher()\n     \
    \   }\n        else {\n            throw error\n        }\n    }\n}\n```\n\nTo\
    \ use exponential backoff only for certain kinds of errors, we can implement the\
    \ closure to inspect the error, just like before. Here is a code snippet that\
    \ shows how to use incremental backoff with an initial interval of 3 seconds for\
    \ any `APIError.serverError`:\n\n```\nreturn dataTaskPublisher\n    .retry(2,\
    \ withBackoff: 3) { error in\n        if case APIError.serverError(_, _, _) =\
    \ error {\n            return true\n        }\n        else {\n            return\
    \ false\n        }\n    }\n// ...\n```\n\nTo use exponential backoff regardless\
    \ of the error, this becomes even more compact:\n\n```\nreturn dataTaskPublisher\n\
    \    .retry(2, withIncrementalBackoff: 3)\n// ...\n```\n\n# Summary\n\nCombine\
    \ is a very powerful framework that allows us to put together very efficient data\
    \ and event processing pipelines for our apps.\n\nIn this chapter, you learned\
    \ how to refactor your existing Combine pipelines into reusable Combine operators,\
    \ making your code more readable.\n\nFootnotes [1](#509862_1_En_11_Chapter.xhtml#Fn1_source)\
    \ [2](#509862_1_En_11_Chapter.xhtml#Fn2_source) [3](#509862_1_En_11_Chapter.xhtml#Fn3_source)\
    \ [4](#509862_1_En_11_Chapter.xhtml#Fn4_source)"
  raw: '## Implementing Custom Operators


    Usually, when creating Combine pipelines, we will start with a publisher and then
    connect a bunch of Combine’s built-in operators to process the events emitted
    by the publisher. At the end of any Combine pipeline is a subscriber that receives
    the events. As you saw in Chapter [10](#509862_1_En_10_Chapter.xhtml), pipelines
    can become complicated quite quickly.


    Technically, operators are just functions that create other publishers and subscribers
    which handle the events they receive from an upstream publisher.


    This means we can create our own custom operators by extending `Publisher` with
    a function that returns a publisher (or subscriber) that operates on the events
    it receives from the publisher we use it on.


    Let’s see what this means in practice by implementing a simple operator that allows
    us to inspect events coming down a Combine pipeline using Swift’s `dump()` function.
    This function prints the contents of a variable to the console, showing the structure
    of the variable as a nested tree—similar to the debug inspector in Xcode.


    You might be aware of Combine’s `print()` operator, which works very similarly.
    However, it doesn’t provide as much detail and—more importantly—doesn’t show the
    result as a nested structure.


    To add an operator, we first need to add an extension to the `Publisher` type.
    As we don’t want to manipulate the events this operator receives, we can use the
    upstream publisher’s types as the result types as well and return `AnypPublisher<Self.Output,
    Self.Failure>` as the result type:


    ```

    extension Publisher {

    func dump() -> AnyPublisher {

    }

    }

    ```


    Inside the function, we can then use the `handleEvents` operator to examine any
    events this pipeline processes. `handleEvents` has a bunch of optional closures
    that get called when the publisher receives new subscriptions, new output values,
    a cancellation event, when it is finished, or when the subscriber requests more
    elements. As we are only interested in new `Output` values, we can ignore most
    of the closures and just implement the `receiveOutput` closure.


    Whenever we receive a value, we will use Swift’s `dump()` function to print the
    contents of the value to the console:


    ```

    extension Publisher {

    func dump() -> AnyPublisher {

    handleEvents(receiveOutput:  { value in

    Swift.dump(value)

    })

    .eraseToAnyPublisher()

    }

    }

    ```


    We can use this operator like any of Combine’s built-in operators. In the following
    example, we attach our new operator to a simple publisher that emits the current
    date:


    ```

    Just(Date())

    .dump()

    // prints:

    ▿ 2022-03-02 09:38:49 +0000

    - timeIntervalSinceReferenceDate: 667906729.659255

    ```


    ## Implementing a Retry Operator with a Delay


    Now that we’ve got a basic understanding of how to implement a simple operator,
    let’s see if we can refactor the code from the previous episode. Here is the relevant
    part:


    ```

    return dataTaskPublisher

    .tryCatch { error -> AnyPublisher in

    if case APIError.serverError = error {

    return Just(Void())

    .delay(for: 3, scheduler: DispatchQueue.global())

    .flatMap { _ in

    return dataTaskPublisher

    }

    .print("before retry")

    .retry(10)

    .eraseToAnyPublisher()

    }

    throw error

    }

    .map(\.data)

    ```


    Let’s begin by constructing an overloaded extension for the `retry` operator on
    `Publisher`:


    ```

    extension Publisher {

    func retry(_ retries: Int, withDelay delay: Int)

    -> Publishers.TryCatch>

    where T == Self.Output, E == Self.Failure

    {

    }

    }

    ```


    This defines two input parameters, `retries` and `withDelay`, which we can use
    to specify how many times the upstream publisher should be retried and how much
    time (in seconds) should be left between each retry.


    Since we are going to use the `tryCatch` operator inside our new operator, we
    need to use its publisher type, `Publishers.TryCatch`, as the return type.


    With this in place, we can now implement the body of the operator by pasting the
    existing implementation:


    ```

    extension Publisher {

    func retry(_ retries: Int, withDelay delay: Int)

    -> Publishers.TryCatch>

    where T == Self.Output, E == Self.Failure

    {

    return self.tryCatch { error -> AnyPublisher in

    return Just(Void())

    .delay(for: .init(integerLiteral: delay),

    scheduler: DispatchQueue.global())

    .flatMap { _ in

    return self

    }

    .retry(retries)

    .eraseToAnyPublisher()

    }

    }

    }

    ```


    You might have noticed that we removed the error check. This is because `APIError`
    is an error type that is specific to our application. As we are interested in
    making this an implementation that can be used in other apps as well, let’s see
    how we can make this more flexible.


    ## Conditionally Retrying


    To make this code reusable in other contexts, let’s add a parameter for a trailing
    closure that the caller can use to control whether the operator should retry or
    not.


    ```

    func retry(_ retries: Int, withDelay delay: Int, condition: ((E) -> Bool)? = nil)
    -> Publishers.TryCatch> where T == Self.Output, E == Self.Failure {

    return self.tryCatch { error -> AnyPublisher in

    if condition?(error) == true {

    return Just(Void())

    .delay(for: .init(integerLiteral: delay),

    scheduler: DispatchQueue.global())

    .flatMap { _ in

    return self

    }

    .retry(retries)

    .eraseToAnyPublisher()

    }

    else {

    throw error

    }

    }

    }

    ```


    If the caller doesn’t provide the closure, the operator will retry using the parameters
    `retries` and `delay`.


    With this in place, we can simplify the original call:


    ```

    // ...

    return dataTaskPublisher

    .retry(10, withDelay: 3) { error in

    if case APIError.serverError = error {

    return true

    }

    return false

    }

    .map(\.data)

    // ...

    ```


    ## Implementing a Retry Operator for Exponential Backoff


    Now, let’s take this one step further and implement a version of the `retry` operator
    with exponential backoff.


    > *Exponential backoff is commonly utilised as part of rate limiting*^([^(78)](#fn78))
    *mechanisms in computer systems such as web services*^([^(79)](#fn79)), to help
    enforce fair distribution of access to resources and prevent network congestion^([^(80)](#fn80)).
    (Wikipedia^([^(81)](#fn81)))


    To increment the delay between two requests, we introduce a local variable that
    holds the current interval and double it after each request. To make this possible,
    we need to wrap the inner pipeline that kicks off the original pipeline in a pipeline
    that increments the backoff variable:


    ```

    func retry(_ retries: Int,

    withBackoff initialBackoff: Int,

    condition: ((E) -> Bool)? = nil)

    -> Publishers.TryCatch>

    where T == Self.Output, E == Self.Failure

    {

    return self.tryCatch { error -> AnyPublisher in

    if condition?(error) ?? true {

    var backOff = initialBackoff

    return Just(Void())

    .flatMap { _ -> AnyPublisher in

    let result = Just(Void())

    .delay(for: .init(integerLiteral: backOff),

    scheduler: DispatchQueue.global())

    .flatMap { _ in

    return self

    }

    backOff = backOff * 2

    return result.eraseToAnyPublisher()

    }

    .retry(retries - 1)

    .eraseToAnyPublisher()

    }

    else {

    throw error

    }

    }

    }

    ```


    To use exponential backoff only for certain kinds of errors, we can implement
    the closure to inspect the error, just like before. Here is a code snippet that
    shows how to use incremental backoff with an initial interval of 3 seconds for
    any `APIError.serverError`:


    ```

    return dataTaskPublisher

    .retry(2, withBackoff: 3) { error in

    if case APIError.serverError(_, _, _) = error {

    return true

    }

    else {

    return false

    }

    }

    // ...

    ```


    To use exponential backoff regardless of the error, this becomes even more compact:


    ```

    return dataTaskPublisher

    .retry(2, withIncrementalBackoff: 3)

    // ...

    ```


    ## Summary


    Combine is a very powerful framework that allows us to put together very efficient
    data and event processing pipelines for our apps.


    In this chapter, you learned how to refactor your existing Combine pipelines into
    reusable Combine operators, making your code more readable.


    Footnotes [1](#509862_1_En_11_Chapter.xhtml#Fn1_source)   [2](#509862_1_En_11_Chapter.xhtml#Fn2_source)
      [3](#509862_1_En_11_Chapter.xhtml#Fn3_source)   [4](#509862_1_En_11_Chapter.xhtml#Fn4_source)'
  trans: "\n# 实现自定义操作符\n\n通常，在创建 Combine 管道时，我们会从一个发布者（publisher）开始，然后连接一系列 Combine\
    \ 的内置操作符来处理该发布者发出的事件。在任何一个 Combine 管道的末端，都有一个接收事件的订阅者（subscriber）。正如你在第 10 章所见，管道很快就会变得相当复杂。\n\
    \n从技术上讲，操作符只是创建其他发布者和订阅者的函数，这些发布者和订阅者处理它们从上游发布者接收到的*事件*。\n\n这意味着我们可以通过扩展 `Publisher`\
    \ 来创建我们自己的自定义操作符，扩展中是一个函数，该函数返回一个发布者（或订阅者），这个发布者（或订阅者）对我们使用它的发布者所接收到的事件进行操作。\n\
    \n让我们通过实现一个简单的操作符来看看这在实际中意味着什么，该操作符允许我们使用 Swift 的 `dump()` 函数来检查流经 Combine 管道的事件。这个函数会将变量的内容打印到控制台，并以嵌套树的形式显示变量的结构——类似于\
    \ Xcode 中的调试检查器。\n\n你可能知道 Combine 的 `print()` 操作符，它的工作方式非常相似。然而，它没有提供那么多细节，更重要的是，它不以嵌套结构显示结果。\n\
    \n要添加一个操作符，我们首先需要为 `Publisher` 类型添加一个扩展。由于我们不想操作此操作符接收到的事件，我们可以使用上游发布者的类型作为结果类型，并返回\
    \ `AnyPublisher<Self.Output, Self.Failure>` 作为结果类型：\n\n```\nextension Publisher\
    \ {\n    func dump() -> AnyPublisher<Self.Output, Self.Failure> {\n    }\n}\n\
    ```\n\n在函数内部，我们可以使用 `handleEvents` 操作符来检查此管道处理的任何事件。`handleEvents` 有一系列可选的闭包，当发布者接收到新的订阅、新的输出值、取消事件、完成时，或者当订阅者请求更多元素时，这些闭包会被调用。由于我们只对新的\
    \ `Output` 值感兴趣，我们可以忽略大部分闭包，只实现 `receiveOutput` 闭包。\n\n每当我们收到一个值时，我们将使用 Swift\
    \ 的 `dump()` 函数将值的内容打印到控制台：\n\n```\nextension Publisher {\n    func dump() ->\
    \ AnyPublisher<Self.Output, Self.Failure> {\n        handleEvents(receiveOutput:\
    \  { value in\n            Swift.dump(value)\n        })\n        .eraseToAnyPublisher()\n\
    \    }\n}\n```\n\n我们可以像使用 Combine 的任何内置操作符一样使用这个操作符。在下面的例子中，我们将新的操作符附加到一个发出当前日期的简单发布者上：\n\
    \n```\nJust(Date())\n    .dump()\n    // 打印：\n    // ▿ 2022-03-02 09:38:49 +0000\n\
    \    //   - timeIntervalSinceReferenceDate: 667906729.659255\n```\n\n# 实现带延迟的重试操作符\n\
    \n既然我们已经对如何实现一个简单的操作符有了基本的了解，让我们看看是否可以重构上一节中的代码。以下是相关部分：\n\n```\nreturn dataTaskPublisher\n\
    \    .tryCatch { error -> AnyPublisher<Data, Error> in\n        if case APIError.serverError\
    \ = error {\n            return Just(Void())\n                .delay(for: 3, scheduler:\
    \ DispatchQueue.global())\n                .flatMap { _ in\n                 \
    \   return dataTaskPublisher\n                }\n                .print(\"before\
    \ retry\")\n                .retry(10)\n                .eraseToAnyPublisher()\n\
    \        }\n        throw error\n    }\n    .map(\\.data)\n```\n\n让我们首先为 `Publisher`\
    \ 上的 `retry` 操作符构建一个重载扩展：\n\n```\nextension Publisher {\n    func retry(_ retries:\
    \ Int, withDelay delay: Int)\n        -> Publishers.TryCatch<Self, Just<Void>.Delay<DispatchQueue>.FlatMap<Self,\
    \ AnyPublisher<Self.Output, Self.Failure>>>\n        where T == Self.Output, E\
    \ == Self.Failure\n    {\n    }\n}\n```\n\n这定义了两个输入参数，`retries` 和 `withDelay`，我们可以用它们来指定应该重试上游发布者的次数以及每次重试之间应间隔的时间（以秒为单位）。\n\
    \n由于我们将在新的操作符内部使用 `tryCatch` 操作符，我们需要使用它的发布者类型 `Publishers.TryCatch` 作为返回类型。\n\
    \n有了这个，我们现在可以通过粘贴现有的实现来实现操作符的主体：\n\n```\nextension Publisher {\n    func retry(_\
    \ retries: Int, withDelay delay: Int)\n        -> Publishers.TryCatch<Self, Just<Void>.Delay<DispatchQueue>.FlatMap<Self,\
    \ AnyPublisher<Self.Output, Self.Failure>>>\n        where T == Self.Output, E\
    \ == Self.Failure\n    {\n        return self.tryCatch { error -> AnyPublisher<Self.Output,\
    \ Self.Failure> in\n            return Just(Void())\n                .delay(for:\
    \ .init(integerLiteral: delay),\n                       scheduler: DispatchQueue.global())\n\
    \                .flatMap { _ in\n                    return self\n          \
    \      }\n                .retry(retries)\n                .eraseToAnyPublisher()\n\
    \        }\n    }\n}\n```\n\n你可能已经注意到我们移除了错误检查。这是因为 `APIError` 是一个特定于我们应用程序的错误类型。由于我们希望使其成为一个可以在其他应用程序中也可以使用的实现，让我们看看如何使其更灵活。\n\
    \n# 条件性重试\n\n为了使这段代码在其他上下文中可重用，让我们添加一个尾随闭包的参数，调用者可以使用它来控制操作符是否应该重试。\n\n```\nfunc\
    \ retry(_ retries: Int, withDelay delay: Int, condition: ((E) -> Bool)? = nil)\
    \ -> Publishers.TryCatch<Self, Just<Void>.Delay<DispatchQueue>.FlatMap<Self, AnyPublisher<Self.Output,\
    \ Self.Failure>>> where T == Self.Output, E == Self.Failure {\n    return self.tryCatch\
    \ { error -> AnyPublisher<Self.Output, Self.Failure> in\n        if condition?(error)\
    \ == true {\n            return Just(Void())\n                .delay(for: .init(integerLiteral:\
    \ delay),\n                       scheduler: DispatchQueue.global())\n       \
    \         .flatMap { _ in\n                    return self\n                }\n\
    \                .retry(retries)\n                .eraseToAnyPublisher()\n   \
    \     }\n        else {\n            throw error\n        }\n    }\n}\n```\n\n\
    如果调用者没有提供该闭包，操作符将使用参数 `retries` 和 `delay` 进行重试。\n\n有了这个，我们可以简化原始调用：\n\n```\n//\
    \ ...\nreturn dataTaskPublisher\n    .retry(10, withDelay: 3) { error in\n   \
    \     if case APIError.serverError = error {\n            return true\n      \
    \  }\n        return false\n    }\n    .map(\\.data)\n// ...\n```\n\n# 实现指数退避的重试操作符\n\
    \n现在，让我们更进一步，实现一个带有指数退避的 `retry` 操作符版本。\n\n> *指数退避通常作为计算机系统（如 Web 服务*^(⁷⁹)*）中速率限制*^(⁷⁸)*机制的一部分，用于帮助实施对资源的公平分配并防止网络拥塞*^(⁸⁰)*。（Wikipedia*^(⁸¹)*）\n\
    \n为了增加两次请求之间的延迟，我们引入一个局部变量来保存当前间隔，并在每次请求后将其加倍。为了实现这一点，我们需要将启动原始管道的内部管道包装在一个能够递增退避变量的管道中：\n\
    \n```\nfunc retry(_ retries: Int,\n           withBackoff initialBackoff: Int,\n\
    \           condition: ((E) -> Bool)? = nil)\n    -> Publishers.TryCatch<Self,\
    \ Just<Void>.Delay<DispatchQueue>.FlatMap<Self, AnyPublisher<Self.Output, Self.Failure>>>\n\
    \    where T == Self.Output, E == Self.Failure\n{\n    return self.tryCatch {\
    \ error -> AnyPublisher<Self.Output, Self.Failure> in\n        if condition?(error)\
    \ ?? true {\n            var backOff = initialBackoff\n            return Just(Void())\n\
    \                .flatMap { _ -> AnyPublisher<Self.Output, Self.Failure> in\n\
    \                    let result = Just(Void())\n                        .delay(for:\
    \ .init(integerLiteral: backOff),\n                               scheduler: DispatchQueue.global())\n\
    \                        .flatMap { _ in\n                            return self\n\
    \                        }\n                    backOff = backOff * 2\n      \
    \              return result.eraseToAnyPublisher()\n                }\n      \
    \          .retry(retries - 1)\n                .eraseToAnyPublisher()\n     \
    \   }\n        else {\n            throw error\n        }\n    }\n}\n```\n\n要仅对某些类型的错误使用指数退避，我们可以像之前一样实现闭包来检查错误。以下是一个代码片段，展示了如何对任何\
    \ `APIError.serverError` 使用初始间隔为 3 秒的递增退避：\n\n```\nreturn dataTaskPublisher\n\
    \    .retry(2, withBackoff: 3) { error in\n        if case APIError.serverError(_,\
    \ _, _) = error {\n            return true\n        }\n        else {\n      \
    \      return false\n        }\n    }\n// ...\n```\n\n要忽略错误类型而使用指数退避，代码会更加简洁：\n\
    \n```\nreturn dataTaskPublisher\n    .retry(2, withIncrementalBackoff: 3)\n//\
    \ ...\n```\n\n# 总结\n\nCombine 是一个非常强大的框架，它允许我们为应用程序组合出非常高效的数据和事件处理管道。\n\n在本章中，你学会了如何将现有的\
    \ Combine 管道重构为可重用的 Combine 操作符，从而使你的代码更具可读性。\n\n脚注 1 2 3 4\n"
- fmt: "# 12. Wrapping Existing APIs in Combine\n\nApple provides Combine publishers\
    \ for many of their APIs, making it easy for us to integrate those APIs in our\
    \ Combine pipelines. However, there are many APIs that don’t support Combine even\
    \ though they produce events over time. Thankfully, Apple gives us the tools we\
    \ need to wrap APIs in Combine publishers and make them accessible to Combine\
    \ pipelines.\n\nIn this chapter, I’m going to walk you through the process of\
    \ wrapping existing APIs using Combine.\n\n## A Case Study\n\nWe’re going to use\
    \ a Firebase API as a case study. Firebase is a backend as a service (BaaS) that\
    \ provides a whole range of services that make developing apps easier. For example,\
    \ it provides an authentication service (Firebase Authentication), a document-based\
    \ NoSQL database (Cloud Firestore), a service for storing large files in the cloud\
    \ (Cloud Storage), a crash reporting service (Crashlytics), and much more.^([^(82)](#fn82))\n\
    \nMost of Firebase’s APIs are asynchronous, meaning that whenever you make a call,\
    \ it will get sent to one of the Firebase backend services, where it will be processed.\
    \ Once the result is ready, it will be returned to the client SDK, and your code\
    \ will be called back. There are multiple ways to asynchronously call Firebase\
    \ services: completion handlers, Combine, and async/await. I’ve written about\
    \ this before in *Calling asynchronous Firebase APIs from Swift - Callbacks, Combine,\
    \ and async/await*^([^(83)](#fn83))—and also published a video about this topic^([^(84)](#fn84))\
    \ as well.\n\nFor this chapter, we will take two methods from Cloud Firestore\
    \ and turn them into Combine publishers. Cloud Firestore is a horizontally scaling\
    \ document-based NoSQL database in the cloud. Similar to CloudKit,^([^(85)](#fn85))\
    \ but as a truly cross-platform solution: you can access Cloud Firestore from\
    \ iOS, Android, the Web, and via a REST API.^([^(86)](#fn86)) Data stored in Firestore\
    \ is organized in documents—a document is like a Swift struct: it can have any\
    \ number of fields of different data types. Documents are organized in collections,\
    \ and documents can contain subcollections, allowing you to build nested data\
    \ structures.\n\nThe Firestore SDK provides methods to access data in single documents\
    \ and collections. For example, here is a code snippet that shows how to fetch\
    \ data from a collection of Firestore documents and map them to an array of Swift\
    \ structs using Swift’s `Codable` API:\n\n```\ndb.collection(\"books\").getDocuments\
    \ { querySnapshot, error in\n    guard let documents = querySnapshot?.documents\
    \ else {\n        return\n    }\n    let books = documents.compactMap { [weak\
    \ self] queryDocumentSnapshot in\n        let result = Result {\n            try\
    \ queryDocumentSnapshot.data(as: Book.self)\n        }\n        switch result\
    \ {\n        case .success(let book):\n            return book\n        case .failure(let\
    \ error):\n            return nil\n        }\n    }\n    print(books.count)\n\
    }\n```\n\nIn addition to being able to fetch data on demand, Firestore also supports\
    \ real-time live sync. This means your app will receive updates for any document\
    \ or collection of document it subscribes to in real time. This is a great feature\
    \ for any app that allows users to share data with other users (e.g., a chat app),\
    \ or with the user’s other devices (e.g., a to-do list app that you can use on\
    \ your iPhone, iPad, an Mac and in a web application).\n\nTo receive updates,\
    \ you register a snapshot listener for a specific document or collection of documents.\
    \ Whenever the document or one of the documents in the collection is updated or\
    \ deleted, or a document is inserted into the collection, Firestore will trigger\
    \ the snapshot listener, and you will receive the update in the closure of the\
    \ listener. The following code snippet shows how to receive updates for any changes\
    \ on a collection of books:\n\n```\ndb.collection(\"books\")\n    .addSnapshotListener\
    \ { [weak self] (querySnapshot, error) in\n        guard let documents = querySnapshot?.documents\
    \ else {\n            return\n        }\n        self?.books = documents.compactMap\
    \ { queryDocumentSnapshot in\n            let result = Result {\n            \
    \    try queryDocumentSnapshot.data(as: Book.self)\n            }\n          \
    \  switch result {\n            case .success(let book):\n                return\
    \ book\n            case .failure(let error):\n                return nil\n  \
    \          }\n        }\n    }\n```\n\nThe sample code for this chapter is an\
    \ application that demonstrates how to use both the closure-based APIs and the\
    \ Combine-based version that we build in this chapter. Note that the Firebase\
    \ SDK for Apple platforms includes experimental support for Combine—you can use\
    \ this in your own apps by importing the respective modules. This chapter is intended\
    \ to explain how the Firebase team implemented this Combine support.\n\nIn order\
    \ to run the sample application, follow these steps:\n\n1.  Create a new Firebase\
    \ projects via the Firebase console.^([^(87)](#fn87))\n2.  Add your Xcode project\
    \ to the Firebase project.\n3.  Download the `GoogleService-Info.plist` file and\
    \ add it to your project.\n4.  Install the local Firebase Emulator Suite.^([^(88)](#fn88))\n\
    5.  Run the Firebase Emulator Suite by executing `start.sh` in the root of the\
    \ sample project.\n6.  Launch the iOS app on a Simulator (so it can attach to\
    \ the Emulator).\n\nThe `start.sh` script will make sure to populate the Firebase\
    \ Emulator with some seed data so you can fetch data from Firestore.\n\nOnce the\
    \ application has started, go into one of the menu items that use a snapshot listener\
