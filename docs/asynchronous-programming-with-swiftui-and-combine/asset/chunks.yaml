    \ username)\n        }\n}()\n```\n\nAt this point, the result type of the pipeline\
    \ is `Publishers.FlatMap<AnyPublisher<Bool, Never>, Published<String>.Publisher>`.\
    \ Not only is this hard to read, but it’s also difficult to use in the calling\
    \ code. To prevent having to use a complicated signature like this, Combine provides\
    \ the `eraseToAnyPublisher` operator that allows us to erase the type of a pipeline\
    \ to `AnyPublisher<Type, Error>`. By appending this operator to the end of our\
    \ pipeline, we erase the pipeline’s type to `AnyPublisher<Bool, Never>`—much easier\
    \ to use.\n\n```\nprivate lazy var isUsernameAvailablePublisher:\n    AnyPublisher<Bool,\
    \ Never> = {\n    $username\n        .flatMap { username in\n            self.authenticationService\n\
    \                .checkUserNameAvailable(userName: username)\n        }\n    \
    \    .eraseToAnyPublisher()\n}()\n```\n\nIn the next step, we will connect the\
    \ result of the `isUsernameAvailablePublisher` to the UI. Take a look at the view\
    \ model: we’ve got two properties in the output section of the view model—one\
