    # 9. Networking with Combine


    We live in a networked world, and most modern applications need to access the
    network to retrieve information stored on a server running on the Internet (or
    on the user’s local network).


    Even on a superfast connection, a request usually takes several milliseconds.
    Using blocking I/O and waiting for a response on the foreground thread of the
    application is not an option, as it would freeze the app and result in a pretty
    terrible user experience. Users would probably assume your app has died, and kill
    it. To prevent this behavior, we need to offload asynchronous work to a background
    thread, so the foreground thread is free to perform UI updates and respond to
    user interactions. This is why modern networking APIs need to be called asynchronously.


    The most popular way to implement asynchronous APIs in Swift is to use *callbacks*.
    Usually, these are implemented as closures, and thanks to Swift’s trailing closure
    syntax, they look rather elegant and are easy to use once you understand how they
    work.


    Other ways to call asynchronous APIs are *async/await* and *Combine*. In this
    chapter, we will dive into how to use Combine to implement a networking layer
    for your app. We will first look at the traditional, callback-driven way to fetch
    data from the network using `URLSession`. Then, we will refactor this code to
    make use of Combine’s `DataTaskPublisher`. You will learn how Combine makes mapping
    data and handling errors easier that will result in more readable and more bug-free
    code. In Chapters [14](#509862_1_En_14_Chapter.xhtml) and [15](#509862_1_En_15_Chapter.xhtml),
    you will learn how to use `async/await` to perform asynchronous calls, and we
    will look at the differences between Combine and async/await.


    Keeping your application’s user interface in sync with the application’s state
    has always been difficult, and the development community has come up with a plethora
    of approaches to address this challenge.


    Reactive programming is one such approach, and SwiftUI’s reactive state management
    makes this a lot easier by introducing the notion of a *source of truth* that
    can be shared across your app using SwiftUI’s property wrappers such as `@EnvironmentObject`,
    `@StateObject`, and `@ObservedObject`.


    This *source of truth* is usually your in-memory data model, and combining your
    local source of truth to the network might sound complicated. In this chapter,
    you will learn how you can use Combine to make combining your local source of
    truth with data from a remote service a lot easier than you maybe think.


    You will first learn how to connect a network-driven Combine pipeline to a SwiftUI
    user interface. We will then optimize the implementation to ensure your app doesn’t
    overwhelm your backend server. Combine provides a couple of operators that will
    help us significantly reduce the number of requests your app sends to the server.
    This will also improve the user experience of your application, leaving you to
    wonder how you ever got by without using Combine.


    Let’s kick things off by looking into how to use Combine to fetch data from a
    server and map the result to a Swift `struct`.'
