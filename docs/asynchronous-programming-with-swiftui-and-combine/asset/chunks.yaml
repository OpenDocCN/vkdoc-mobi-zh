  trans: '

    ## 为什么需要一个新的 UI 框架？


    你可能会问，既然已经有了 `UIKit` 和 `AppKit`，为什么还要实现一个新的 UI 工具包？你有这种疑问情有可原。毕竟，实现一个 UI 工具包绝非易事，更不用说将其打磨到生产级品质、发布并让整个应用开发者社区采用它了。


    以下是可能影响苹果做出这一决定的一些驱动因素。


    首先也是最重要的一点，我们必须承认苹果将 `SwiftUI` 定位为一个跨平台 UI 工具包。`SwiftUI` 登陆页面上的介绍特别提到：“`SwiftUI`
    借助 `Swift` 的强大能力，帮助你用极少的代码，在所有苹果平台上构建出外观精美的应用。你只需使用一套工具和 API，就能在任意苹果设备上为每个人带来更好的体验。”
    苹果现在拥有不少于五个面向消费者的平台（`iOS`、`iPadOS`、`watchOS`、`tvOS` 和 `macOS`），任何尝试过确保跨平台功能一致性的人都会告诉你，对于开发者来说，支持多个平台正变得越来越繁重。通过提供一种统一的方式来思考并为尽可能多的这些平台构建
    UI，苹果正在减轻开发者的这一负担。但需要指出的是，`SwiftUI` 并不试图适应“一次编写，到处运行”的模式——相反，它确实包含平台特定的部分。但学习一个
    UI 工具包并在所有平台上使用它，要比为每个单独的平台学习一套新范式容易得多。


    其次，`SwiftUI` 与苹果帮助开发者编写更优质软件、减少 App Store 中应用潜在 bug 数量的投入方向一致。bug 更少的应用往往在 App
    Store 上获得更高的评分——从而带来更高的收入。`Swift` 语言包含许多有助于编写无 bug 软件的特性。其语言设计者和编译器工程师一直在努力消除潜在的
    bug 成因，例如：


    - 空指针解引用

    - 类型不匹配

    - 不完整的决策树

    - ……以及更多


    `SwiftUI` 有两个主要属性有助于提升软件质量：


    1.  它内置了状态管理，这是 UI 开发中一个出了名具有挑战性的方面。`SwiftUI` 的状态管理使得构建能够始终反映应用状态的 UI 变得更容易——即使跨多个屏幕也是如此。

    2.  它围绕一种领域特定语言（`DSL`）构建，使得描述 UI 更加容易，消除了因错误实例化和构建 UI 结构可能导致的任何问题，并使编写和理解 UI 变得更加简单。


    最后，`SwiftUI` 让软件开发变得更加平易近人。我们看到越来越多的 Web 开发者和设计师开始使用 `SwiftUI` 构建 UI，这并非没有原因。用
    `SwiftUI` 拼凑出一个可用的原型变得越来越可行，这有助于改善 UI 设计师和开发者之间的协作。Xcode 为 `SwiftUI` 提供的预览画布极大地缩短了周转时间，为开发者和设计师提供了对他们所做更改的即时反馈。这种即时反馈使得更多学生和初学者能够开始进行应用开发，并在几分钟内取得成果，而不是需要花费数小时甚至数天。


    ## SwiftUI 原则


    在我们迈出 `SwiftUI` 的第一步之前，值得先看看它的一些关键特性。


    ### 声明式 vs. 命令式


    传统上，开发者构建 UI 主要有两种方式：


    1.  使用可视化工具（例如 Interface Builder）布局 UI 元素，然后将应用的代码连接到 UI 元素

    2.  以编程方式布局 UI 元素


    在过去几年中，越来越多的 UI 工具包遵循声明式方法来构建 UI。这些工具包利用所谓的内部或外部领域特定语言（`DSL`）让开发者指定 UI 的结构。此类工具包的例子有
    `Angular`、`React` 和 `JetPack Compose`。


    在命令式世界中，你需要自己实现所有内容：布局、行为、数据绑定。相比之下，声明式方法允许你简单地告诉框架你想要做什么，它会为你处理具体的实现细节。这有点类似于自己做饭（命令式）与去餐厅点餐，然后获得一盘精心烹制的菜肴（声明式）。


    ### 状态管理


    管理状态是编写应用程序时的主要挑战之一。当你的应用只有一个屏幕时，这相当简单，但随着屏幕数量的增加，保持 UI 的所有部分和底层数据模型同步的复杂性也随之增加。


    在与后端共享数据并通过互联网同步数据的应用中，这变得更加具有挑战性。更不用说在编写需要确保同时处理同一份数据（例如，`Google Docs` 中的共享文档，或待办事项列表应用中的任务列表）的所有用户的数据都是最新且同步的多用户应用时，你将面临的挑战了。


    可能我们所有人都使用过这样的应用：尽管你在详情对话框中更新了地址，但购物车中并未反映地址的变更。真是令人抓狂！


    数据绑定在苹果平台上并非一个全新的概念——`macOS` 上的 `Cocoa Bindings` 已经存在多年，为开发者提供了在 UI 元素和底层数据模型之间映射数据的基本工具。尽管开发者一直呼吁为
    `iOS` 提供数据绑定框架，但苹果至今从未提供过。开发者只好自谋出路，提出自己的原生解决方案，没过多久社区就涌现出了 `iOS` 特定的函数式响应式框架实现，例如
    `RxSwift` 或 `ReactiveSwift`。


    通过 `SwiftUI`，苹果终于承认了需要一个原生框架来保持数据模型和 UI 的同步。`SwiftUI` 提供了许多工具来帮助你构建能够始终反映模型状态、并在整个应用中保持同步的
    UI。


    最重要的是，`SwiftUI` 可以与苹果自己的响应式框架实现 `Combine` 很好地结合，使得将应用中的数据流表达为一系列随时间变化的事件成为可能，这些事件通过业务规则和逻辑运算符进行转换，以满足应用的需求。


    ### 组合优于继承


    与 `UIKit` 和许多其他 UI 框架不同，`SwiftUI` 鼓励开发者通过将许多小 UI 组件拼凑在一起来组合他们的 UI。从 `UIKit` 转向
    `SwiftUI` 的开发者会发现这相当令人惊讶，因为他们之前学到的做法是尽量减少 UI 元素的数量——尤其是在滚动视图（如 `UITableView` 或
    `UICollectionView`）中，以优化应用的性能。


    这样做的原因是 `SwiftUI` 是一个用于描述 UI 外观的 `DSL`，而不是规定构成它的 UI 原语。`SwiftUI` 团队从一开始就鼓励开发者大量使用视图来组合他们的
    UI——在 `WWDC 2019` 舞台上首次公开演示 `SwiftUI` 时，SwiftUI 工程师 Jacob Xiao 就说道：“在 SwiftUI
    中，视图非常轻量级，所以你不用担心为了更好封装或分离逻辑而创建额外的视图。”

