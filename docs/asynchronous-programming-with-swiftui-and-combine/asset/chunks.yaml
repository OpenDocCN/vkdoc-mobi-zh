    # Part 1


    # 1. SwiftUI: A New Beginning


    Every year at the Worldwide Developers Conference (WWDC), Apple introduces new
    features and capabilities to their platforms and operating systems. The event
    is met with great anticipation, as it means developers will finally be able to
    get their hands on the new APIs and frameworks Apple engineers have been working
    on for the past year, and incorporate them into their own apps.


    To enable developers to make use of the new features, Apple provides new APIs,
    SDKs to use them, and often new tooling, such as Xcode.


    While all those new features Apple has launched at WWDC throughout the years have
    been exciting and often breathtaking, sometimes they ship an update of extraordinary
    significance.


    > Every once in a while, a revolutionary product comes along that changes everything.

    >

    > —Steve Jobs, 2007


    Obviously, the unveiling of the original iPhone in 2007 was such a moment.


    The release of the Swift programming language in 2014 was another moment of significance.
    Swift made software development much easier and a lot more approachable for developers
    who might have been scared away by Objective-C and its rather special syntax and
    Smalltalk-esque call semantics. It’s no exaggeration to say that Swift and Swift
    Playgrounds brought more developers to Apple’s platforms than ever before. Swift
    Playgrounds—an interactive programming environment geared toward explorative and
    playful interaction with Swift—has positioned Swift as a great language for anyone
    who is looking for a low-barrier way to explore and learn programming. Swift and
    Swift Playgrounds have democratized software development. And the results of this
    bold move are visible each year at WWDC, when Tim Cook takes the stage to announce
    how many apps are on the App Store and which percentage of those use Swift. At
    WWDC 2021, Susan Prescott (VP of Developer Relations) unveiled that “the majority
    of the top 1000 apps on the App Store are built using Swift.”^([⁵](#fn5))


    The release of SwiftUI in 2019 was another such moment. When Josh Shaffer stepped
    out onto the stage to announce SwiftUI,^([⁶](#fn6)) people were stunned by its
    ease of use and the speed at which it was possible to build UIs from scratch.
    But also, and maybe even more importantly, people were thrilled by the fact that
    SwiftUI included a native way to manage application state—something notoriously
    complicated. Apple even went so far as to implement their own version of RxSwift:
    Combine—a functional reactive framework centered around the idea that applications
    can be seen as a piece of software that transforms events over time.


    To better understand what all of this means and why exactly Apple chose to implement
    a new UI toolkit, let’s dive a little deeper.'
