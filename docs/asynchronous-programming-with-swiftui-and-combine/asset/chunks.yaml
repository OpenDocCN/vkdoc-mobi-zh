    \ whereas the `Text` view is mapped to a `SwiftUI.DisplayList.ViewUpdater.Platform.CGDrawingView`.\n\
    \nThis is also one of the key reasons why SwiftUI can be used to define cross-platform\
    \ UIs. As a view merely is a description of the UI, SwiftUI can use different\
