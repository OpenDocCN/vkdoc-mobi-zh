    ### 容器视图


    大多数用户界面比屏幕中央简单的`Text`或`Image`要复杂得多。实际上，绝大多数用户界面都由多个单独的视图构建而成。`SwiftUI`没有要求开发者在屏幕上的绝对或相对位置手动定位视图，而是使用视图容器^([^(32)](#fn32))，通过将多个视图组合在一起并在屏幕上排列，从而更轻松地创建复杂布局。


    `SwiftUI`有几种容器视图类别：


    *   布局容器，例如`HStack`、`VStack`或`ZStack`，允许我们水平、垂直或通过叠加方式布局其子视图。

    *   集合容器，例如`List`、`Form`、`Table`、`Group`或`ScrollView`，提供滚动、滑动、过滤等内置功能。

    *   展示容器（`NavigationView`、`NavigationStack`、`NavigationSplitView`、`TabView`、`Toolbar`等）旨在定义应用程序UI的结构。


    由于容器视图本身也是视图，我们可以嵌套它们，从而轻松构建复杂的用户界面。


    除此之外，每个视图还具有覆盖层和背景层，可以通过`overlay`和`background`视图修饰符（下一节将详细介绍视图修饰符）进行访问。这可用于创建一些高级布局。


    ### 布局行为


    你会注意到，某些视图的布局行为似乎与其他视图不同。


    从高层次来看，SwiftUI的布局过程如下：


    1.  父视图向其子视图提供一些尺寸。

    2.  子视图根据自身尺寸（内在尺寸）和父视图提供的尺寸（子视图可以完全忽略该尺寸）来决定需要多少空间。然后，它将此尺寸返回给父视图。

    3.  父视图使用子视图返回的尺寸，在步骤1提供的空间范围内将子视图放置在某个位置。它会尊重子视图为自己请求的尺寸。


    在确定子视图占用多少空间的步骤2中，SwiftUI使用了两种不同的策略：


    #### 紧缩


    视图选择最适合其内容的尺寸，而不考虑父视图提供的尺寸。`Text`是具有此行为的视图示例：即使容器提供更多空间，它也只消耗文本所需的那么多空间。


    #### 扩展


    视图尝试用尽父视图提供的尽可能多的空间。`Color`是具有此行为的视图示例：它会占据父视图提供的全部空间。'
  raw: 'By using container views, we can meet the `View` protocol’s requirement of
    returning a *single* `View` from the `body` computed property. We’ll talk more
    about container views later in this chapter.


    You might be wondering why the return type is `some View`, and not just `View`,
    and why the return type of body cannot be plainly `View`.


    When composing views, like in the preceding example, the concrete return type
    depends on the types of the individual views and in which order we put them together.
    For example, the type of the view that we return from the `body` property in the
    preceding code snippet is `HStack<TupleView<(Image, ModifiedContent<Text, _PaddingLayout>)>>`.
    Changing the order of the views will result in a different type: putting the Image
    after the `Text` will change the result type to `HStack<TupleView<(ModifiedContent<Text,
    _PaddingLayout>, Image)>>`.


    This obviously is a bit unwieldy, and this is where the `some` keyword comes in:
    it turns a type into a so-called *opaque type*. This means that the compiler still
    has access to the underlying concrete type (e.g., `HStack<TupleView<(Image, ModifiedContent<Text,
    _PaddingLayout>)>>`, but clients of the module don’t^([^(31)](#fn31))—they just
    see the protocol of the return value.


    This means: by returning the result of a view’s body as some `View`, the caller
    will only see a view and doesn’t get any insight into how this view is structured.
    Consequently, we can refer to custom types by their regular type name (for the
    earlier code snippet: `ContentView`), instead of the concrete type of the view
    structure being returned from the body property (for the earlier code snippet:
    `HStack<TupleView<(Image, ModifiedContent<Text, _PaddingLayout>)>>`).


    ### User Interface Views


    SwiftUI comes with a broad range of views for most of the UI elements that are
    common in iOS, iPadOS, macOS, watchOS, and tvOS, such as `Text`, `Image`, `Button`,
    `TextField`, and more.


    These views are the basic building blocks that you can use to compose the UI of
    your application. You can also use these building blocks to create your own custom
    components, just like the List row for displaying the cover and title of a book
    that we created in Chapter [2](#509862_1_En_2_Chapter.xhtml).


    Here is an overview of SwiftUI’s user interface elements:


    #### Text Input and Output


    **Text Output**


    | Name | Description |

    | --- | --- |

    | `Text` | Displays one or more lines of read-only text |

    | `Label` | Displays an image and read-only text |


    **Text Input**


    | Name | Description |

    | --- | --- |

    | `TextField` | Displays editable text |

    | `SecureField` | Lets the user securely enter text |

    | `TextEditor` | A control that can display and edit long-form text |


    #### Images


    **Images**


    | Name | Description |

    | --- | --- |

    | `Image` | Displays an image |

    | `AsyncImage` | Asynchronously downloads and displays an image |


    #### Controls and Indicators


    **Buttons**


    | Name | Description |

    | --- | --- |

    | `Button` | A control that initiates an action |

    | `EditButton` | A button that toggles the *edit mode* environment value |


    **Links**


    | Name | Description |

    | --- | --- |

    | `Link` | A control for navigating to a URL |


    **Menus**


    | Name | Description |

    | --- | --- |

    | `Menu` | A control for presenting a menu of actions |


    **Value Inputs**


    | Name | Description |

    | --- | --- |

    | `Slider` | A control for selecting a value from a bounded linear range of values
    |

    | `Stepper` | A control that performs increment and decrement actions |

    | `Toggle` | A control that toggles between on and off states |


    **Pickers**


    | Name | Description |

    | --- | --- |

    | `Picker` | A control for selecting from a set of mutually exclusive values |

    | `DatePicker` | A control for selecting an absolute date |

    | `ColorPicker` | A control used to select a color from the system color picker
    UI |


    **Indicators**


    | Name | Description |

    | --- | --- |

    | `Gauge` | A view that shows a value within a range |

    | `ProgressView` | A view that shows the progress toward completion of a task
    |


    #### Shapes


    **Shapes**


    | Name | Description |

    | --- | --- |

    | `Shape` | A 2D shape that you can use when drawing a view |

    | `InsettableShape` | A shape type that is able to inset itself to produce another
    shape |

    | `Rectangle` | A rectangular shape aligned inside the frame of the view containing
    it |

    | `RoundedRectangle` | A rectangular shape with rounded corners, aligned inside
    the frame of the view containing it |

    | `Circle` | A circle centered on the frame of the view containing it |

    | `Ellipse` | An ellipse aligned inside the frame of the view containing it |

    | `Capsule` | A capsule shape aligned inside the frame of the view containing
    it |

    | `Path` | The outline of a 2D shape |


    ### Container Views


    Most user interfaces are more complex than just a simple `Text` or `Image` in
    the center of a screen. In fact, the majority of user interfaces are constructed
    from several individual views. Instead of requiring developers to manually position
    views at an absolute or relative position on the screen, SwiftUI uses view containers^([^(32)](#fn32))
    to make it easier to create complex layouts by grouping multiple views together
    and arranging them on screen.


    SwiftUI has several categories of container views:


    *   Layout containers such as `HStack`, `VStack`, or `ZStack` allow us to lay
    out their child views horizontally, vertically, or by overlaying them on top of
    each other.


    *   Collection Containers, such as `List`, `Form`, `Table`, `Group`, or `ScrollView`
    provide built-in features like scrolling, swiping, filtering, and more.


    *   Presentation Containers (`NavigationView`, `NavigationStack`, `NavigationSplitView`,
    `TabView`, `Toolbar` and others) are intended to define the structure of your
    app’s UI.


    Since container views themselves are views, we can nest them, allowing us to build
    even complex user interfaces with ease.


    On top of that, each view also has an overlay and a background, which can be accessed
    using the `overlay` and `background` view modifiers (more about view modifiers
    in the next section). This can be used to create some advanced layouts.


    ### Layout Behavior


    You will notice that some views seem to have a different layout behavior than
    others.


    On a high level, the SwiftUI layout process works like this:


    1.  The parent view offers some size to its child view.


    2.  The child view then decides how much space it requires, taking into consideration
    its own size (the intrinsic size) and the space that the parent view offered (which
    the child view is free to ignore completely). It then returns this size to the
    parent view.


    3.  The parent view uses the size returned by the child to lay out the child view
    somewhere within the bound of the space it offered in step 1. It will respect
    the size that the child requested for itself.


    SwiftUI uses two different strategies in step 2 when determining how much space
    a child view consumes:


    #### Hugging


    The view chooses the best size to fit its content, without consulting the size
    offered by its parent view. `Text` is an example of a view with this behavior:
    it will consume just as much space as the text requires, even if the container
    offers more space.


    #### Expanding


    The view tries to use up as much space as offered by its parent view. `Color`
    is an example for a view with this behavior: it will take up the entire space
    offered by the parent view.'
