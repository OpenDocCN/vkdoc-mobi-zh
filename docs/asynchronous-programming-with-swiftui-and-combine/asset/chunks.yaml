    ## Showing Data in a Form


    Being able to display static data is useful for UIs that don’t require any dynamic
    updates, such as your app’s settings screen. However, most apps need to display
    data that is dynamically updating, so let’s look at binding a forms UI to a data
    model and—in a second step—make it editable as well.


    As the Forms API makes use of SwiftUI’s regular UI views, all of their features
    continue to work as expected—the only thing that the Forms API influences is how
    the UI elements look inside a form.


    Thanks to this, we can use all of SwiftUI’s state management tools to bind the
    UI elements such as `Text`, `Label`, and `Image` and even more complex ones such
    as the pickers to our data model.


    To continue with our example, let’s assume we’ve got the following data model
    to represent books:


    ```

    struct Book: Hashable, Identifiable {

    var id = UUID()

    var title: String

    var author: String

    var isbn: String

    var pages: Int

    var isRead: Bool = false

    }

    extension Book {

    var smallCoverImageName: String { return "\(isbn)-S" }

    var mediumCoverImageName: String { return "\(isbn)-M" }

    var largeCoverImageName: String { return "\(isbn)-L" }

    }

    ```


    To display data from a `Book` instance, we need to replace the static texts we
    used in the previous code snippets and access the model attributes instead. All
    of Swift’s string interpolation capabilities work in SwiftUI as well, so the following
    syntax: `"\(book.pages) pages"` will inject the current value of the `pages` property
    of the `Book` instance into the `Text`.


    There is one notable exception—`Toggle` expects a binding, so it can update the
    underlying property whenever the user flips the switch. Since we want to display
    all information on `BookDetailsView` in read-only mode, we will use `.constant()`
    to turn the binding into a constant value. This effectively prevents the user
    from making any changes to the `read` status of the model.


    Whenever the model (`book`) is updated, SwiftUI will rerender all UI elements
    that are bound to this model.


    ```

    struct BookDetailsView: View {

    @State var book: Book

    var body: some View {

    Form {

    Text(book.title)

    Image(book.largeCoverImageName)

    Label(book.author, systemImage: "person.crop.rectangle")

    Label("\(book.pages) pages", systemImage: "book")

    Toggle("Read", isOn: .constant(book.isRead))

    Button(action: { /* add code to display the edit screen */ }) {

    Label("Edit", systemImage: "pencil")

    }

    }

    .navigationTitle(book.title)

    }

    }

    ```


    As expected, the result looks exactly like our static example.


    ![](images/509862_1_En_6_Chapter/509862_1_En_6_Fig6_HTML.png)


