    \n函数可以被挂起的位置称为*挂起点*，当你调用异步函数或方法时，通过使用 `await` 关键字来标记它们：\n\n```\nlet result = await\
    \ someAsyncFunction()\n```\n\n要定义异步函数或方法，你需要使用 `async` 关键字：\n\n```\nfunc someAsyncFunction()\
    \ async -> String {\n    let result = // ... 此处为异步代码\n    return result\n}\n```\n\
    \n让我们来看看当我们使用 `async/await` 时，三明治制作器的代码会是什么样子。\n\n首先，我们来更新烤面包的代码。如果你还记得，我们假设我们将使用某个子系统来烤面包（例如，烤面包机），并且这个过程需要花费一些时间。在代码中，这通过休眠\
    \ 5 秒来表示：\n\n```\nfunc toastBread(_ bread: String) async -> String {\n    sandwichMakerSays(\"\
    正在烤面包... 请稍候...\")\n    await Task.sleep(5_000_000_000)\n    return \"脆皮 \\(bread)\"\
    \n}\n```\n\n当将这个代码与基于完成处理器的版本进行比较时，你会注意到几点变化：\n\n1.  我们不再需要为尾随闭包提供一个参数。相反，我们使用\
    \ `async` 关键字来表明这是一个异步函数。这使得函数签名更容易阅读。\n2.  我们现在可以指定这个函数的返回值。请记住，当使用完成处理器时，返回值必须是完成处理器签名的一部分。这使得方法签名更容易阅读，并且正如你稍后将看到的，它也使得调用点更简洁。\n\
    3.  不再需要使用 `DispatchQueue.global().async { }` —— SwiftUI 的新并发模型使用线程池，并会自动为我们管理线程。\n\
    \n更新后的 `slice` 函数的代码看起来非常相似：\n\n```\nfunc slice(_ ingredients: [String]) async\
    \ -> [String] {\n    var result = [String]()\n    for ingredient in ingredients\
    \ {\n        sandwichMakerSays(\"正在切 \\(ingredient)\")\n        await Task.sleep(1_000_000_000)\n\
    \        result.append(\"切好的 \\(ingredient)\")\n    }\n    return result\n}\n\
    ```\n\n现在让我们看看如何调用这两个更新后的函数。在调用点，我们需要使用 `await` 关键字来表明对 `toastBread` 和 `slice`\
    \ 的调用是潜在的挂起点：\n\n```\nfunc makeSandwich(bread: String, ingredients: [String],\
    \ condiments: [String]) async -> String {\n    sandwichMakerSays(\"正在准备您的三明治...\"\
    )\n    let toasted = await toastBread(bread)\n    let sliced = await slice(ingredients)\n\
    \    sandwichMakerSays(\"正在将 \\(condiments.joined(separator: \", 和 \")) 涂抹在 \\\
    (toasted) 上\")\n    sandwichMakerSays(\"正在分层摆放 \\(sliced.joined(separator: \"\
    , \"))\")\n    sandwichMakerSays(\"在上面放生菜\")\n    sandwichMakerSays(\"在上面再放一片面包\"\
    )\n    return \"在 \\(toasted) 上放有 \\(ingredients.joined(separator: \", \")), \\\
    (condiments.joined(separator: \", \"))\"\n}\n```\n\n注意，我们现在可以调用 `toastBread` 和\
    \ `slice`，而无需使用嵌套闭包。这产生了几乎是直线型的代码，读起来就像普通的、线性的代码，如同三明治制作算法的其余部分。\n\n由于 `makeSandwich`\
    \ 现在也是一个异步函数，就像 `toastBread` 和 `slice` 一样，我们也需要将其标记为 `async`。\n\n但是，我们如何从同步上下文中调用异步代码呢？\n\
    \nSwift 提供了 `Task` API，它代表一个异步工作单元。通过将对异步函数的调用封装在 `Task { }` 内部，你可以从同步上下文中调用它，例如在你的\
    \ UI 中的动作处理器或 Swift Playground 中。以下是调用 `makeSandwich` 的样子：\n\n```\nTask {\n  \
    \  let sandwich = await makeSandwich(bread: \"黑麦面包\", ingredients: [\"黄瓜\", \"\
    番茄\"], condiments: [\"蛋黄酱\", \"芥末酱\"])\n    customerSays(\"嗯.... 这看起来像一个美味的 \\\
    (sandwich) 三明治！\")\n    print(\"结束。\")\n}\n```\n\n由于 `makeSandwich` 现在是一个异步函数，我们需要使用\
    \ `await` 关键字来调用它。如果我们忘记这样做，编译器将会报错：\n\n### 并行调用异步函数\n\n你可能已经注意到，我们的三明治制作过程是可以优化的。\n\
    \n目前，我们首先调用 `toastBread` 并等待它完成。然后，我们调用 `slice` 来切食材并等待它完成，然后再继续组装三明治。这显然有优化的空间——在烤面包的同时，我们可以开始切食材，从而减少顾客的整体等待时间。\n\
    \nSwift 的新并发模型支持使用 `async let` 语法同时执行多个异步函数。要并行执行代码，可以在调用一个或多个异步函数时加上 `async let`\
    \ 前缀：\n\n```\nasync let x = someAsyncFunction()\nasync let y = someAsyncFunction()\n\
    async let z = someAsyncFunction()\nprint(\"这段代码会立即执行\")\n```\n\n只要有足够的资源可用，系统将同时、并行地运行这些函数。这些调用都不会创建挂起点，这意味着之后的任何代码都会立即执行——就像代码片段中的\
    \ `print` 语句一样。\n\n要创建一个挂起点，请对常量（此处为 `x`、`y` 和 `z`）使用 `await`：\n\n```\nlet result\
    \ = await [x, y, z]\nprint(\"结果是 \\(result)\")\n```\n\n让我们看看如何使用它来优化我们的三明治制作过程：\n\
    \n```\nfunc makeSandwich(bread: String, ingredients: [String], condiments: [String])\
    \ async -> String {\n    sandwichMakerSays(\"正在准备您的三明治...\")\n    async let toasted\
    \ = toastBread(bread)\n    async let sliced = slice(ingredients)\n    sandwichMakerSays(\"\
    正在将 \\(condiments.joined(separator: \", 和 \")) 涂抹在 \\(await toasted) 上\")\n  \
    \  sandwichMakerSays(\"正在分层摆放 \\(await sliced.joined(separator: \", \"))\")\n\
    \    sandwichMakerSays(\"在上面放生菜\")\n    sandwichMakerSays(\"在上面再放一片面包\")\n   \
    \ return \"在 \\(await toasted) 上放有 \\(ingredients.joined(separator: \", \")),\
    \ \\(condiments.joined(separator: \", \"))\"\n}\n```\n\n如你所见，可以在代码的任何位置使用 `await\
    \ <常量>`——甚至在字符串插值内部也可以。使用这种方法，`toastBread` 和 `slice` 现在将并行运行。通过在我们的代码中添加计时，我们可以看到这确实减少了顾客的等待时间：\n\
    \n```\nlet clock = ContinuousClock()\nTask {\n    let time = await clock.measure\
    \ {\n        let sandwich = await makeSandwich(bread: \"黑麦面包\", ingredients: [\"\
    黄瓜\", \"番茄\"], condiments: [\"蛋黄酱\", \"芥末酱\"])\n        customerSays(\"嗯.... 这看起来像一个美味的\
    \ \\(sandwich) 三明治！\")\n        print(\"结束。\")\n    }\n    print(\"制作这个三明治花了 \\\
    (time)\")\n}\n```\n\n顾客现在只需等待大约 5 秒，而不是 7 秒——这是一个很不错的改进！\n"
- fmt: '## Summary


    In this chapter, you learned about concurrency and how Swift''s new concurrency
    model improves the way how we write and consume asynchronous code.


    You learned how to use completion handlers to build asynchronous APIs and how
    to call them. Completion handlers and closures are a very common way to implement
    asynchronous behavior, and to this day, they are being used in many of Apple''s
    own APIs, and many third-party libraries. They have served the community well,
    but come with a number of drawbacks, such as the potential to end up in the pyramid
    of doom, and some uncertainty around which thread you will be called back on.
    The biggest drawback when using completion handlers for asynchronous code, however,
    is that they are harder to read than straight-line code, especially for developers
    new to the concept of asynchronous code.


    Swift''s new concurrency model (best known as `async/await`) makes both implementing
    and using asynchronous APIs much easier. In this chapter, you saw how you can
    use the `async` keyword to declare asynchronous functions and methods and how
    to use the `await` keyword to call those asynchronous functions. You learned what
    a suspension point is and that Swift uses a thread pool to manage execution of
    asynchronous code. We also looked at `async let`, which lets you run several asynchronous
    functions or methods in parallel, and how to create a suspension point (using
    `await <constant>` to wait for the result of the call(s).


    This was a quick introduction to Swift''s new concurrency model. To learn more,
    I recommend reading the Concurrency chapter in the Swift Programming Language
    Guide^([^(121)](#fn121)) or watching my video series.^([^(122)](#fn122)) In the
    next chapter, we will look at how to use Swift''s new concurrency model together
    with SwiftUI.


    Footnotes [1](#509862_1_En_14_Chapter.xhtml#Fn1_source) [2](#509862_1_En_14_Chapter.xhtml#Fn2_source)
    [3](#509862_1_En_14_Chapter.xhtml#Fn3_source) [4](#509862_1_En_14_Chapter.xhtml#Fn4_source)
