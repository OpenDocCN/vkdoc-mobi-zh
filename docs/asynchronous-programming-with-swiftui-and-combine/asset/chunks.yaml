    }\n```\n\n这段简短的代码片段定义了一个名为 `ContentView` 的简单视图，其中包含一个显示 *Hello World* 的 `Text`\
    \ 视图。\n\n尽管这只是一段很短的代码，但我们能从中了解到 SwiftUI 的强大之处。\n\nSwiftUI 视图是结构体，它们需要遵循 `View`\
    \ 协议。查看 `View` 协议的源代码，我们可以看到遵循者需要实现一个名为 `body` 的计算属性，该属性返回*一个* `View`：\n\n```\n\
    @available(iOS 13.0, macOS 10.15, tvOS 13.0, watchOS 6.0, *)\npublic protocol\
    \ View {\n    associatedtype Body : View\n    @ViewBuilder @MainActor var body:\
    \ Self.Body { get }\n}\n```\n\n我们简单的 Hello World 代码段包含一个计算属性 `body`，它返回一个简单的 `Text`\
    \ 视图，因此它满足了 `View` 协议的要求。\n\n为了实现更复杂的视图，比如带有前置图标的标签，我们可以使用 SwiftUI 的容器视图，例如 `Group`、`HStack`\
    \ 或 `VStack`。容器视图允许我们对子视图进行分组，并按照特定的布局（例如，水平或垂直）排列它们。以下代码片段使用 `VStack` 垂直排列了一个\
    \ `Image` 和一个 `Text`：\n\n```\nstruct ContentView: View {\n    var body: some View\
    \ {\n        VStack {\n            Image(systemName: \"globe\")\n            \
    \    .imageScale(.large)\n                .foregroundColor(.accentColor)\n   \
