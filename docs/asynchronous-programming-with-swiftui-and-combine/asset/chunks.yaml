    ### 影响调度编排的其他操作符


    Combine 中包含多个会影响事件向下游管道传递时序的操作符：


    - `debounce` 仅在事件之间的指定时间间隔过后才发布元素。

    - `throttle` 在指定时间间隔内发布上游发布者发布的最近元素或第一个元素。

    - `delay` 在特定调度器上将所有输出延迟指定的时间量后，再传递给下游接收者。


    所有这些操作符都接受一个时间间隔参数和一个调度器参数，用于确定操作符在何时传递其输出元素。让我们通过一个快速示例来理解其中的含义。


    在 SwiftUI 中，一个常用的时序操作符是 `debounce`——它允许我们指定一个时间间隔，该间隔必须存在于操作符将发送给其下游订阅者的两个事件之间。这对于调用远程
    API 根据用户输入执行搜索的搜索对话框特别有用。为了避免向远程 API 发送过多请求而造成过载，我们通常会在保存搜索词条的已发布属性上安装一个 `debounce`
    操作符。


    让我们来看一下前面关于优化网络层的章节中使用的一段代码：


    ```

    $input

    .debounce(for: 0.8, scheduler: DispatchQueue.main)

    .handleEvents { subscription in

    self.logEvent(tag: "handleEvents")

    } receiveOutput: { value in

    self.logEvent(tag: "receiveOutput - {\(value)}")

    } receiveCompletion: { completion in

    self.logEvent(tag: "receiveCompletion")

    } receiveCancel: {

    self.logEvent(tag: "receiveCancel")

    } receiveRequest: { demand in

    self.logEvent(tag: "receiveRequest")

    }

    .sink { value in

    self.logEvent(tag: "sink - {\(value)}")

    print("Value: \(value)")

    self.output = value

    }

    .store(in: &cancellables)

    ```


    这段代码获取用户在文本输入字段中输入的内容，然后使用 `debounce` 操作符来减少传递给下游订阅者的事件数量。这意味着下游订阅者只有在用户停止输入 0.8
    秒后，才会接收到 `input` 属性的当前值。


    如果改用 `DispatchQueue.global(qos: .background)`，则所有事件都会在后台线程上到达。


    这意味着为某个调度操作符提供一个调度器，相当于添加了一个对 `subscribe(on:)` 的调用。


    ## 执行异步工作


    在主线程上执行计算密集型工作并非良策——正如我们在前面的示例中看到的，在主线程上运行此类代码可能会导致 UI 卡顿，甚至完全阻塞 UI。


    就像访问异步 API（例如网络、像 Firebase 这样的云服务，甚至是异步处理事件的本地 API）一样，您应通过在后端调度器上订阅相应的发布者（或操作符）来将任何此类代码卸载到后台线程。当后台进程完成并且发布者发出事件时，您最终需要切换到主线程来更新
    UI。


    以下是使用的一般模式：


    ```

    publisher

    .subscribe(on: DispatchQueue.global())

    .receive(on: DispatchQueue.main)

    .sink { }

    ```


    您可以使用 `DispatchQueue.global(qos:)` 的重载版本来指定您希望用于后台运行代码的服务质量：


    - `background`：后台任务在所有任务中优先级最低。将此类别分配给您的应用在后台运行时用于执行工作的任务或调度队列。

    - `utility`：实用工具任务的优先级低于 default、userInitiated 和 userInteractive 任务，但高于 background
    任务。将此服务质量类别分配给不会阻止用户继续使用您的应用的任务。例如，您可以将其分配给用户不会主动跟踪其进度的长时间运行任务。

    - `default`：默认任务的优先级低于 userInitiated 和 userInteractive 任务，但高于 utility 和 background
    任务。将此类别分配给您的应用代表用户启动或用于执行主动工作的任务或队列。

    - `userInitiated`：用户发起任务在系统中的优先级仅次于用户交互任务。将此类别分配给为用户正在执行的操作提供即时结果，或阻止用户使用您的应用的任务。例如，您可以使用此服务质量类别来加载您想要显示给用户的电子邮件内容。

    - `userInteractive`：用户交互任务在系统中具有最高优先级。将此类别用于与用户交互或主动更新您的应用用户界面的任务或队列。例如，将其用于动画或交互式跟踪事件。


    要查看实际运行的示例，请参阅本章示例项目中的 `SchedulerDemoView.swift`。


    ## 与其他 API 集成


    我们通常可以完全控制自己编写的代码，因此可以应用上一节概述的技术来控制管道的调度。但在使用他人编写的代码时，我们可能并不总能拥有这种便利。在本节中，我们将查看上游发布者控制调度的几个示例——以及我们如何影响管道其余部分的调度方式——这在将管道的结果分配给可能与
    UI 连接的已发布属性时尤其重要。


    ### URLSession


    首先看一下网络访问。我们在第 9 章中详细讨论了 `URLSession` 的使用，您可能还记得我们遇到了一些调度问题。下面是一个典型的代码片段，它从 URL
    获取数据，然后将其分配给一个与 SwiftUI 视图连接的已发布属性：


    ```

    URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    .replaceError(with: false)

    .assign(to: &$isUsernameAvailable)

    ```


    运行此代码将产生一个警告：


    ```

    [SwiftUI] Publishing changes from background threads is not allowed; make sure
    to publish values from the main thread (via operators like receive(on:)) on model
    updates.

    ```


    此警告是由于 `URLSession` 在后台线程上执行，因此管道的其余部分（包括 `assign` 操作符）也将在同一线程上执行造成的。这意味着 UI 将从后台线程更新，从而触发了该警告。


    为避免这种情况，我们需要做的就是在 `assign` 操作符之前添加一个 `receive(on:)` 操作符，以确保我们从主线程访问 UI：


    ```

    URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    .replaceError(with: false)

    .receive(on: DispatchQueue.main)

    .assign(to: &$isUsernameAvailable)

    ```

