  raw: '### Defining and Calling Asynchronous Functions


    ![](images/509862_1_En_14_Chapter/509862_1_En_14_Fig2_HTML.png)


    A snippet of program codes from lines 63 through 70 has an error pop-up box on
    line 65 that reads. Expression is async but is not marked with await, insert await.
    The box has the fix option on the bottom right.


    Figure 14-2


    The compiler will issue an error when you call an asynchronous function without
    the await keyword


    In Swift, an asynchronous function (or an asynchronous method) can be suspended
    while it is executing. This is particularly useful when the function needs to
    wait for a slow resource, for example, a network call: instead of blocking the
    thread while it is waiting for the network call to return, the function can pause
    execution and give up the thread to other parts of the application. This allows
    for a better utilization of the system resources and allows for a stutter-free
    UI.


    The places where a function can be suspended are called *suspension points*, and
    you indicate them by using the `await` keyword when calling an asynchronous function
    or method:


    ```

    let result = await someAsyncFunction()

    ```


    To define an asynchronous function or method, you use the async keyword:


    ```

    func someAsyncFunction() async -> String {

    let result = // ... async code here

    return result

    }

    ```


    Let’s take a look at how the code for our sandwich maker would look like when
    using `async/await`.


    Let’s first update the code for toasting a bread. If you recall, we assume that
    we will be using some subsystem for toasting the bread (i.e., a toaster) and that
    this process will take some amount of time. In the code, this is represented by
    sleeping for 5 seconds:


    ```

    func toastBread(_ bread: String) async -> String {

    sandwichMakerSays("Toasting the bread... Standing by...")

    await Task.sleep(5_000_000_000)

    return "Crispy \(bread)"

    }

    ```


    When comparing this code with the completion handler–based version of the code,
    you will notice a couple of things:


    1.  We no longer have to provide a parameter for the trailing closure. Instead,
    we use the `async` keyword to indicate that this is an asynchronous function.
    This makes the function signature a lot easier to read.


    2.  We can now specify the return value of this function. Remember, when using
    the completion handler, the return value had to be part of the completion handler
    signature. This makes the method signature even easier to read, and as you will
    see in a minute, it makes the call site cleaner as well.


    3.  No need to use `DispatchQueue.global().async { }`—SwiftUI’s new concurrency
    model uses a thread pool and will automatically manage threads for us.


    The code for the updated `slice` function looks very similar:


    ```

    func slice(_ ingredients: [String]) async -> [String] {

    var result = [String]()

    for ingredient in ingredients {

    sandwichMakerSays("Slicing \(ingredient)")

    await Task.sleep(1_000_000_000)

    result.append("sliced \(ingredient)")

    }

    return result

    }

    ```


    Let’s now see how we can call those two updated functions. At the call site, we
    need to use the `await` keyword to indicate that the calls to `toastBread` and
    `slice` are potential suspension points:


    ```

    func makeSandwich(bread: String, ingredients: [String], condiments: [String])
    async -> String {

    sandwichMakerSays("Preparing your sandwich...")

    let toasted = await toastBread(bread)

    let sliced = await slice(ingredients)

    sandwichMakerSays("Spreading \(condiments.joined(separator: ", and ")) om \(toasted)")

    sandwichMakerSays("Layering \(sliced.joined(separator: ", "))")

    sandwichMakerSays("Putting lettuce on top")

    sandwichMakerSays("Putting another slice of bread on top")

    return "\(ingredients.joined(separator: ", ")), \(condiments.joined(separator:
    ", ")) on \(toasted)"

    }

    ```


    Notice how we can call `toastBread` and `slice` without having to use nested closures.
    This results in straight-line code that almost reads like normal, linear code
    such as the rest of the sandwich-making algorithm.


    Since `makeSandwich` is now an asynchronous function, just like `toastBread` and
    `slice`, we need to mark it as `async` as well.


    But how can we call asynchronous code from a synchronous context?


    Swift provides the `Task` API, which represents a unit of asynchronous work. By
    wrapping a call to an asynchronous function inside a `Task { }`, you can call
    it from a synchronous context, like an action handler in your UI, or a Swift Playground.
    Here is how the call to `makeSandwich` looks like:


    ```

    Task {

    let sandwich = await makeSandwich(bread: "Rye", ingredients: ["Cucumbers", "Tomatoes"],
    condiments: ["Mayo", "Mustard"])

    customerSays("Hmmm.... this looks like a delicious \(sandwich) sandwich!")

    print("The end.")

    }

    ```


    As `makeSandwich` is now an asynchronous function, we need to use the `await`
    keyword to call it. The compiler will issue an error if we forget to do so:


    ### Calling Asynchronous Functions in Parallel


    You might have noticed that our sandwich-making process can be optimized.


    At the moment, we first call `toastBread` and wait for it to finish. Then, we
    call slice to `slice` the ingredients and wait for it to finish before we move
    on to assemble the sandwich. There clearly is room for optimization—while the
    bread is being toasted, we can start slicing the ingredients, reducing the overall
    waiting time for our customer.


    Swift’s new concurrency model supports executing several asynchronous functions
    simultaneously using the `async let` syntax. To execute code in parallel, prefix
    a call to one or more asynchronous functions with `async let`:


    ```

    async let x = someAsyncFunction()

    async let y = someAsyncFunction()

    async let z = someAsyncFunction()

    print("This code will be executed immediately")

    ```


    As long as there are enough resources available, the system will run these at
    the same time, in parallel. None of these calls will create a suspension point,
    meaning that any code that comes after will be executed immediately—like the `print`
    statement in the code snippet.


    To create a suspension point, use `await` for the constants (`x`, `y`, and `z`
    in this case):


    ```

    let result = await [x, y, z]

    print("The result is \(result)"

    ```


    Let’s look at how we can use this to optimize our sandwich-making process:


    ```

    func makeSandwich(bread: String, ingredients: [String], condiments: [String])
    async -> String {

    sandwichMakerSays("Preparing your sandwich...")

    async let toasted = toastBread(bread)

    async let sliced = slice(ingredients)

    sandwichMakerSays("Spreading \(condiments.joined(separator: ", and ")) om \(await
    toasted)")

    sandwichMakerSays("Layering \(await sliced.joined(separator: ", "))")

    sandwichMakerSays("Putting lettuce on top")

    sandwichMakerSays("Putting another slice of bread on top")

    return "\(ingredients.joined(separator: ", ")), \(condiments.joined(separator:
    ", ")) on \(await toasted)"

    }

    ```


    As you can see, it is possible to use `await <constant>` at any place in our code—even
    inside a `String` interpolation. Using this approach, `toastBread` and `slice`
    will now run in parallel. By instrumenting our code, we can see that this does
    indeed reduce the waiting time for our customers:


    ```

    let clock = ContinuousClock()

    Task {

    let time = await clock.measure {

    let sandwich = await makeSandwich(bread: "Rye", ingredients: ["Cucumbers", "Tomatoes"],
    condiments: ["Mayo", "Mustard"])

    customerSays("Hmmm.... this looks like a delicious \(sandwich) sandwich!")

    print("The end.")

    }

    print("Making this sandwich took \(time)")

    }

    ```


    Instead of waiting 7 seconds, the customer now only has to wait about 5 seconds—that’s
    a nice improvement!'
