    , systemImage: \"pencil\")\n            }\n        }\n        .navigationTitle(book.title)\n\
    \    }\n}\n```\n\n正如预期，结果看起来与我们静态示例完全相同。\n\n![](img/509862_1_En_6_Fig6_HTML.png)\n\
