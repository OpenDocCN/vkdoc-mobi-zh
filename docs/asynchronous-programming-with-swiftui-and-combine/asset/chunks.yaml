  trans: '

    # 2. 初识 SwiftUI


    在上一章中，你已经了解了 SwiftUI 的基本原理，以及为什么苹果在已经拥有多个运行完美的 UI 工具包的情况下，还要实现一个新的 UI 框架。此外，我们还快速浏览了
    SwiftUI 以及 Xcode 为构建 SwiftUI 应用提供的工具。


    在本章中，我们将深入探讨如何使用 SwiftUI。学习的最好方法就是动手实践，因此我们将构建一个简单的应用，它最终可能会对你很有用。


    我们将学习使用简单的 SwiftUI 视图，例如 `Text` 和 `Image`，以及如何通过堆叠（stack）将简单的 UI 元素组合成可复用的视图，从而构建出既简单又复杂的用户界面。


    SwiftUI 非常注重^(²⁰)构建可复用的 UI 组件，因此我们将花些时间来理解其工作原理，以及 Xcode 提供了哪些工具来简化这一过程。组合视图并将它们分解为可复用的组件，是开发
    SwiftUI 应用的核心概念，这将帮助你编写易于管理和维护的代码。


    在本章后面，我们将开始学习如何构建 `List` 视图，这是许多 iOS 应用中的核心组件。


    整个章节中，我们将使用*视图*、*视图修饰符*和*属性包装器*。在本章结束时，你将了解这些概念是什么，以及它们如何协同工作，使 SwiftUI 成为一种神奇的体验。


    ## 我们将要构建的内容


    本章中我们要构建的示例应用将显示一个书籍列表，其中包括书名、作者姓名和书籍封面。


    为简单起见，我们将专注于 UI 方面，数据访问层则留待以后处理。因此，我们不会从远程 API 获取图书数据，而是定义一个静态的图书数组，并从应用的素材目录中获取书籍封面。


    基于你在第 1 章中学到的内容，我们将首先组合一个用于显示书籍封面、书名、作者和其他一些细节的视图。


    ![](img/509862_1_En_2_Fig1_HTML.png)


    一张截图显示文本：《Changer》，作者 Matt Gemmell，476 页。左侧显示该书封面。


    图 2-1


    用于显示书籍详细信息的视图


    下一步，我们将在一个列表视图中使用这个自定义视图，以列表形式显示多本书。


    ![](img/509862_1_En_2_Fig2_HTML.png)


    一个移动屏幕显示了四本书的详细信息、作者和封面。1. 《Changer》，作者 Matt Gemmell，476 页。2. 《SwiftUI for Absolute
    Beginners》，作者 Jayant Varma，200 页。3. 《Asynchronous Programming with SwiftUI and
    Combine》，作者 Peter Friese，367 页。4. 《Modern Concurrency on Apple Platforms》，作者 Andy
    Ibanez，368 页。


    图 2-2


    本章中我们要构建的应用


    最后，我们将重构代码以使其更具可复用性。在这一步，你将了解*末日金字塔*以及如何通过组合许多小的、特定用例的组件来避免它。


    让我们开始吧！


    ## 组合用于显示书籍的视图


    为了帮助你入门，我为本章准备了一个启动项目，其中已经包含了一些书籍封面和一个简单的书籍数据模型。


    克隆本书附带的 GitHub 仓库^(²¹)


    *   进入本章启动项目的文件夹

    *   在 Xcode 中打开该项目。


    在项目的 `Model` 文件夹中，你会找到 `Book.swift`，它包含了定义此应用数据模型的 `Book` 结构体。


    ```

    struct Book {

    var title: String

    var author: String

    var isbn: String

    var pages: Int

    }

    ```


    同一个文件中包含一个 `Book` 的扩展，其中带有几个计算属性，可以更方便地确定每本书的封面图片名称。


    ```

    extension Book {

    var smallCoverImageName: String { return "\(isbn)-S" }

    var mediumCoverImageName: String { return "\(isbn)-M" }

    var largeCoverImageName: String { return "\(isbn)-L" }

    }

    ```


    最后，还有一个全局常量 `sampleBooks`，它包含一组示例书籍——这使我们能够显示一些演示数据，而无需从 API 获取数据。


    ```

    extension Book {

    static let sampleBooks = [

    Book(title: "Changer", author: "Matt Gemmell", isbn: "9781916265202", pages: 476),

    Book(title: "SwiftUI for Absolute Beginners", author: "Jayant Varma", isbn: "9781484255155",
    pages: 200),

    Book(title: "Asynchronous Programming with SwiftUI and Combine", author: "Peter
    Friese", isbn: "9781484285718", pages: 367),

    Book(title: "Modern Concurrency on Apple Platforms", author: "Andy Ibanez", isbn:
    "9781484286944", pages: 368)

    ]

    }

    ```


    应用的素材目录包含了 `sampleBooks` 中定义的书籍的封面图片——如你所见，它们提供了三种不同的尺寸：小、中、大。


    ![](img/509862_1_En_2_Fig3_HTML.png)


    BookShelf 窗口的截图，左侧面板选中了 Assets.xcassets。Assets.xcassets 标签页中选中了一本书的封面。右侧显示该图片集的选项。


    图 2-3


    素材目录包含了示例数组中书籍的封面图片


    应用的入口点定义在 `BookShelfApp.swift` 中——在这里，你实例化用户启动应用时将看到的主视图。


    ```

    import SwiftUI

    @main

    struct BookShelfApp: App {

    var body: some Scene {

    WindowGroup {

    ContentView()

    }

    }

    }

    ```


    这个主视图 `ContentView` 可以在 `ContentView.swift` 中找到，本章剩余的大部分时间我们将在这里度过。


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    Text("Hello, world!")

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    每当你使用 Xcode 创建新的 SwiftUI 视图时，它都会创建一个类似于此的文件，因此值得仔细看看 SwiftUI `View` 的结构。


    前面的代码片段创建了一个名为 `ContentView` 的新结构体，它遵循 `View` 协议。该视图的名称是 `ContentView`，因此可以像这样实例化：`ContentView()`。


    在视图内部，你会注意到一个名为 `body` 的属性。该属性的类型是 `some View`。如果你之前使用 Swift 进行开发，可能会好奇 `some`
    的含义。简而言之，这表示所谓的*不透明返回类型*，它表明 `body` 返回一个类型为 `View` 的值。


    `body` 在 SwiftUI 中扮演着重要角色——你将在其中定义视图的外观。在这个代码片段中，视图仅包含一个显示 "Hello, world" 的简单
    `Text` 视图，但在本章后面，你将学习如何通过在 `body` 属性中组合多个视图来构建更复杂的布局。


    该源文件中的第二个结构体名为 `ContentView_Previews`，它遵循 `PreviewProvider`。这是 SwiftUI 用于在 Xcode
    窗口右侧的预览画布中显示视图预览的特殊构造。在本章后面，你将学习如何修改预览，以在浅色模式和深色模式下显示你的视图。

    '
- fmt: "# Build the View with Static Data\n\nNow that we’ve got a basic understanding\
    \ of what SwiftUI views are, it is time to look at another very important aspect\
    \ of views: composability.\n\nSwiftUI views can be made up of other views. It’s\
    \ hard to overstate this, but it essentially means that you can build arbitrarily\
    \ complex UIs from SwiftUI views, just by composing individual primitive views\
    \ into larger, more complex ones.\n\nSwiftUI makes this possible by providing\
    \ a handful of container components (`HStack`, `VStack`, and `ZStack`), a component\
    \ that dynamically takes up space between other components (`Spacer`), and an\
    \ easy and straightforward way to nest views inside other views.\n\nTo give you\
    \ a better idea of what this means and how it works in action, let’s take a look\
    \ at building a view for displaying book details.\n\n![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig4_HTML.png)\n\
    \nA screenshot has text that reads, Changer, by Matt Gemmell, 476 pages. A cover\
    \ of the book is given on the left.\n\n**Figure 2-4** — A view for displaying\
    \ book details\n\nAlong the way, you will learn several different ways for building\
    \ SwiftUI views using the tooling Xcode provides.\n\nLet’s first display the title\
    \ of a book by making the following changes in the code editor:\n\n* Change the\
    \ label of the `Text` view from `\"Hello world\"` to `\"Asynchronous Programming\
    \ with SwiftUI and Combine\"`.\n* Change the font of the text by adding `.font(.headline)`\
    \ to the `Text` view.\n\nThe code should now look like this:\n\n```\nstruct ContentView:\
    \ View {\n    var body: some View {\n        Text(\"Asynchronous Programming with\
    \ SwiftUI and Combine\")\n            .font(.headline)\n    }\n}\n```\n\nTo display\
    \ the author, add another `Text` view just beneath the book title. Instead of\
    \ coding this manually, let’s use Xcode’s graphical tooling to make sure we get\
    \ the layout right.\n\n* Make sure the preview is active. If the preview canvas\
    \ is not visible, select *Editor* ➤ *Canvas* from the main menu (or press `CMD\
    \ + Option + Enter`). In case Xcode has stopped the preview, you can restart it\
    \ by clicking on the *Resume preview* button or pressing `CMD + Option + P`.\n\
    * Make sure the canvas is in *selectable* mode by clicking on the mouse pointer\
    \ icon at the bottom of the preview canvas.\n\n![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig5_HTML.jpg)\n\
    \nA screenshot has icons for play, mouse pointer, menu, toggle on and off, and\
    \ power arranged horizontally from left to right. The mouse pointer icon is selected.\n\
    \n**Figure 2-5** — Canvas in selectable mode\n\n* Open Xcode’s *Library* by clicking\
    \ the *+* button in the toolbar (or by pressing `CMD+Shift+L`).\n* In the *Library*\
    \ window, type *text* to find the `Text` view.\n* Drag the `Text` view element\
    \ from the *Library* window into the preview canvas. *Don’t let go of the mouse\
    \ button yet!*\n* As you drag the `Text` view around the preview canvas, you will\
    \ notice Xcode highlights the current drop position to indicate where the element\
    \ will be placed if you let go.\n\n![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig6_HTML.png)\n\
    \nA screenshot has a mobile screen in the center that reads, Asynchronous Programming\
    \ with Swift U I and Combine. It has options for content view, insert text in\
    \ vertical slack, and others.\n\n**Figure 2-6** — Inserting a new Text view below\
    \ an existing view\n\n* Drop the new `Text` view just below the text *Asynchronous\
    \ Programming with SwiftUI and Combine*.\n* Notice how Xcode’s two-way tooling\
    \ automatically updates the source code.\n\n```\nstruct ContentView: View {\n\
    \    var body: some View {\n        VStack {\n            Text(\"Asynchronous\
    \ Programming with SwiftUI and Combine\")\n                .font(.headline)\n\
    \            Text(\"Placeholder\")\n        }\n    }\n}\n```\n\n* Replace the\
    \ placeholder text with `\"by Peter Friese\"`.\n* While the cursor is still on\
    \ the same line, use the *Attributes Inspector* to change the font of this `Text`\
    \ to *Subheadline.*\n\n![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig7_HTML.png)\n\
    \nA screenshot of the text properties window has accessibility, font, padding,\
    \ and frame options. An options menu has subheadline highlighted with the option\
    \ inherited ticked.\n\n**Figure 2-7** — Attribute Inspector\n\nXcode updates the\
    \ source code accordingly and refreshes the preview.\n\n![](images/509862_1_En_2_Chapter/509862_1_En_2_Fig8_HTML.png)\n\
    \nA screenshot of the Bookshelf window has content view dot swift selected from\
    \ the panel on the left. The content view dot swift tab has arrows pointed at\
    \ a code on the left and a text on a mobile screen on the right. It originates\
    \ from the subheadline option under Font on the right.\n\n**Figure 2-8** — Updated\
    \ UI\n\nIn case the preview doesn’t refresh, click the *Refresh* button at the\
    \ top of the preview pane, or press `CMD+Option+P`.\n\n```\nimport SwiftUI\n\n\
    struct ContentView: View {\n    var body: some View {\n        VStack {\n    \
    \        Text(\"Asynchronous Programming with SwiftUI and Combine\")\n       \
    \         .font(.headline)\n            Text(\"by Peter Friese\")\n          \
    \      .font(.subheadline)\n        }\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\nNotice how Xcode automatically inserted a `VStack` container\
    \ to nest the two `Text` views inside a vertical stack.\n\nUse the code editor\
    \ to insert another `Text` view to display the number of pages:\n\n```\nimport\
    \ SwiftUI\n\nstruct ContentView: View {\n    var body: some View {\n        VStack\
    \ {\n            Text(\"Asynchronous Programming with SwiftUI and Combine\")\n\
    \                .font(.headline)\n            Text(\"by Peter Friese\")\n   \
    \             .font(.subheadline)\n            Text(\"451 pages\")\n         \
    \       .font(.subheadline)\n        }\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\nTo match our desired layout, let’s update the alignment of the\
    \ text views inside the vertical stack.\n\n* In the code editor, select the `VStack`,\
    \ and then use the *Attributes Inspector* to left align the text views.\n* This\
    \ will change the `alignment` attribute of the `VStack` to `.leading`.\n\nTo insert\
    \ an image to the left of the two `Text` views, we’ll need to nest the `VStack`\
    \ and an `Image` view inside a horizontal stack. Instead of using drag’n’drop,\
    \ this time we’ll use the code editor.\n\n* In the code editor, `CMD+click` the\
    \ `VStack` and select *Embed in HStack*.\n* Inside the `HStack`, just before the\
    \ `VStack`, insert an `Image` view: `Image(\"9781484285718-M\")`. This will fetch\
    \ the image named *9781484285718-M* from the asset catalog.\n\nYour code should\
    \ now look like this:\n\n```\nstruct ContentView: View {\n    var body: some View\
    \ {\n        HStack(alignment: .top) {\n            Image(\"9781484285718-M\"\
    )\n            VStack(alignment: .leading) {\n                Text(\"Asynchronous\
    \ Programming with SwiftUI and Combine\")\n                    .font(.headline)\n\
    \                Text(\"by Peter Friese\")\n                    .font(.subheadline)\n\
    \                Text(\"451 pages\")\n                    .font(.subheadline)\n\
    \            }\n        }\n    }\n}\n```\n\nHowever, as you’ll notice, the image\
    \ is much too large, so we need to scale it down a bit.\n\n* Open the library\
    \ (by pressing the *+* button or hitting `CMD+Shift+L`), tap the dials icon to\
    \ switch to the *Modifiers* library, and type *resi* to find the *Image Resizable*\
    \ modifier.\n* Grab the modifier, drag it out of the library, and drop it on the\
    \ book cover in the preview. The image will now occupy the entire height of the\
    \ preview.\n* We’re not done yet. Open the library again, type *aspect*, and drag\
    \ the *Aspect Ratio* modifier onto the cover image.\n* In the code editor, change\
    \ the `contentMode` value from `.fill` to `.fit`.\n* Finally, find the *Frame*\
    \ modifier in the library and drag it onto the image.\n* Using the code editor,\
    \ remove the `width` attribute (up to and including the comma), and set the `height`\
    \ attribute to `90`.\n* Use the *Attribute Inspector* to set the alignment of\
    \ the `HStack` to `.top`, so that the image and the book title align nicely.\n\
    \nYour code should now look like this:"
