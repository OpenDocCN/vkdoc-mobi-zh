    2.  Xcode tells you that you shouldn’t update the UI from a background thread.\n\
    \nLet’s look at these and try to understand how we can fix them."
  raw: '### Fetching Data Using Combine, Simplified


    With all these changes in place, we now have a version of the pipeline that is
    easy to read and has a linear flow:


    ```

    class AuthenticationService {

    func checkUserNameAvailable(userName: String) ->

    AnyPublisher

    {

    guard let url = URL(string: "http://127.0.0.1:8080/isUserNameAvailable?userName=\(userName)")
    else {

    return Just(false).eraseToAnyPublisher()

    }

    return URLSession.shared.dataTaskPublisher(for: url)

    .map(\.data)

    .decode(type: UserNameAvailableMessage.self,

    decoder: JSONDecoder())

    .map(\.isAvailable)

    .replaceError(with: false)

    .eraseToAnyPublisher()

    }

    }

    ```


    It’s a good idea to keep this code in a separate type, together with any other
    further code that communicates directly with the authentication server. Modularizing
    our code like this helps us to keep our code base neatly organized.


    ## Connecting to the UI


    Let’s now look at how to integrate this new Combine pipeline in the sign-up form
    we started in the previous chapter.


    Here is a condensed version of the sign-up form. I’ve removed some of the code
    to avoid distracting you from what we want to focus on in this chapter. For the
    discussion in this chapter, we just care about the username field, the `Text`
    label to display a message, and a sign-up button. I’ve commented out the code
    for the password fields we discussed in the previous chapter.


    ```

    struct SignUpForm: View {

    @StateObject private var viewModel = SignUpFormViewModel()

    var body: some View {

    Form {

    // Username

    Section {

    TextField("Username", text: $viewModel.username)

    .autocapitalization(.none)

    .disableAutocorrection(true)

    } footer: {

    Text(viewModel.usernameMessage)

    .foregroundColor(.red)

    }

    // (code for password fields removed for brevity)

    // Submit button

    Section {

    Button("Sign up") {

    print("Signing up as \(viewModel.username)")

    }

    .disabled(!viewModel.isValid)

    }

    }

    }

    }

    ```


    Here are the parts of the view model that are relevant for our discussion—again,
    some of the code from the previous chapter is stripped out for simplicity.


    ```

    class SignUpScreenViewModel: ObservableObject {

    private var authenticationService = AuthenticationService()

    // MARK: Input

    @Published var username: String = ""

    // MARK: Output

    @Published var usernameMessage: String = ""

    @Published var isValid: Bool = false

    ...

    }

    ```


    Since `@Published` properties are Combine publishers, we can subscribe to them
    to receive updates whenever their value changes.


    This will allow us to take the user’s most recent input and pass it to the `checkUserNameAvailable`
    publisher to see if this username is still available.


    To pass events from one publisher to another one, we can use the `flatMap` operator:


    ```

    $username

    .flatMap { username -> AnyPublisher in

    self.authenticationService.checkUserNameAvailable(userName: username)

    }

    ```


    ![](images/509862_1_En_9_Chapter/509862_1_En_9_Fig1_HTML.png)


    A screenshot of the Sign Up Form with 3 fields is linked to 2 blocks. The template
    for the form model and character type of each field is given in one block. And
    the process to check the username availability via output and failure tables is
    in the next block.


    Figure 9-1


    Combine pipeline for calling the authentication service to check if the username
    is available


    This pipeline takes input events from the `username` publisher (i.e., what the
    user types into the *username* text input field) and sends them to the `checkUserNameAvailable`
    publisher. This publisher will return a `Bool` for each input event, indicating
    whether the respective username is still available. This means that subscribers
    will receive a stream of `Bool`s.


    We want to use the result of this pipeline to drive the state of the sign-up form:
    as long as the pipeline returns `true` to indicate that the chosen username is
    available, we want to enable the *Submit* button. At the same time, we want to
    display an error message as soon as the result of the pipeline is `false`.


    This means we need to add two different subscribers to the pipeline: the enabled
    state of the *Submit* button and the text of the error message label.


    To preserve memory and avoid wasting CPU cycles, let’s make the pipeline reusable.
    One way to do this to wrap it inside a lazy computed property. Lazy computed properties
    are computed only once, and only if they are accessed.


    As a reminder, the general form of a lazy computed property is as follows:


    ```

    lazy var propertyName: Type = {

    // compute the property''s value inside the closure

    }() // <- don''t forget the parentheses

    ```


    Using a lazy computed property ensures that the pipeline will only be instantiated
    once, making sure we’re using the same instance for every subscriber.


    ```

    private lazy var isUsernameAvailablePublisher:

    Publishers.FlatMap, Published.Publisher> = {

    $username

    .flatMap { username in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    }()

    ```


    At this point, the result type of the pipeline is `Publishers.FlatMap<AnyPublisher<Bool,
    Never>, Published<String>.Publisher>`. Not only is this hard to read, but it’s
    also difficult to use in the calling code. To prevent having to use a complicated
    signature like this, Combine provides the `eraseToAnyPublisher` operator that
    allows us to erase the type of a pipeline to `AnyPublisher<Type, Error>`. By appending
    this operator to the end of our pipeline, we erase the pipeline’s type to`AnyPublisher<Bool,
    Never>`—much easier to use.


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .flatMap { username in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    .eraseToAnyPublisher()

    }()

    ```


    In the next step, we will connect the result of the `isUsernameAvailablePublisher`
    to the UI. Take a look at the view model: we’ve got two properties in the output
    section of the view model—one for any message related to the username and another
    one that holds the overall validation state of the form.


    Combine publishers can be connected to more than one subscriber, so we can connect
    both `isValid` and `usernameMessage` to the `isUsernameAvailablePublisher`:


    ```

    class SignUpScreenViewModel: ObservableObject {

    ...

    init() {

    isUsernameAvailablePublisher

    .assign(to: &$isValid)

    isUsernameAvailablePublisher

    .map {

    $0 ? ""

    : "Username not available. Try a different one."

    }

    .assign(to: &$usernameMessage)

    }

    }

    ```


    Using this approach allows us to reuse the `isUsernameAvailablePublisher` and
    use it to drive both the overall `isValid` state of the form (which will enable/disable
    the *Submit* button) and the `usernameMessage` label, which informs the user whether
    their chosen username is still available or not.


    Ensure the demo server is running, launch the app, and try typing in a few different
    usernames. The demo server has a hard-coded list of usernames that it regards
    as unavailable, so try these to see how the Combine pipeline we developed so far
    drives the UI: `peterfriese`, `johnnyappleseed`, `page`, `johndoe`.


    Observe the server’s console output while typing, and you will notice a few things:


    1.  The API endpoint gets called several times for each character you type.


    2.  Xcode tells you that you shouldn’t update the UI from a background thread.


    Let’s look at these and try to understand how we can fix them.'
  trans: "\n### 使用 Combine 简化数据获取\n\n经过上述所有修改，我们现在拥有一个易于阅读且流程线性的管道版本：\n\n```\nclass\
    \ AuthenticationService {\n    func checkUserNameAvailable(userName: String) ->\
    \ AnyPublisher<Bool, Never> {\n        guard let url = URL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
    (userName)\") else {\n            return Just(false).eraseToAnyPublisher()\n \
    \       }\n        return URLSession.shared.dataTaskPublisher(for: url)\n    \
    \        .map(\\.data)\n            .decode(type: UserNameAvailableMessage.self,\
    \ decoder: JSONDecoder())\n            .map(\\.isAvailable)\n            .replaceError(with:\
    \ false)\n            .eraseToAnyPublisher()\n    }\n}\n```\n\n最好将此代码与任何其他直接与身份验证服务器通信的代码一起保存在一个独立的类型中。像这样模块化代码有助于我们保持代码库的整洁有序。\n\
    \n### 连接到 UI\n\n现在，让我们看看如何将这个新的 Combine 管道集成到我们在上一章开始的注册表单中。\n\n以下是注册表单的简化版本。我删除了一些代码，以免分散你在本章中的注意力。在本章的讨论中，我们只关心用户名字段、用于显示消息的\
    \ `Text` 标签以及一个注册按钮。我已注释掉上一章讨论的密码字段的代码。\n\n```\nstruct SignUpForm: View {\n  \
    \  @StateObject private var viewModel = SignUpFormViewModel()\n    var body: some\
    \ View {\n        Form {\n            // 用户名\n            Section {\n        \
    \        TextField(\"用户名\", text: $viewModel.username)\n                    .autocapitalization(.none)\n\
    \                    .disableAutocorrection(true)\n            } footer: {\n \
    \               Text(viewModel.usernameMessage)\n                    .foregroundColor(.red)\n\
    \            }\n            // （为简洁起见，已移除密码字段的代码）\n            // 提交按钮\n     \
    \       Section {\n                Button(\"注册\") {\n                    print(\"\
    正在以 \\(viewModel.username) 注册\")\n                }\n                .disabled(!viewModel.isValid)\n\
    \            }\n        }\n    }\n}\n```\n\n以下是视图模型中与我们讨论相关的部分——同样，为简单起见，已删除了上一章中的部分代码。\n\
    \n```\nclass SignUpScreenViewModel: ObservableObject {\n    private var authenticationService\
    \ = AuthenticationService()\n    // MARK: 输入\n    @Published var username: String\
    \ = \"\"\n    // MARK: 输出\n    @Published var usernameMessage: String = \"\"\n\
    \    @Published var isValid: Bool = false\n    ...\n}\n```\n\n由于 `@Published`\
    \ 属性是 Combine 发布者，我们可以订阅它们，以便在其值发生变化时接收更新。\n\n这将使我们能够获取用户的最新输入，并将其传递给 `checkUserNameAvailable`\
    \ 发布者，以查看该用户名是否仍然可用。\n\n为了将事件从一个发布者传递到另一个发布者，我们可以使用 `flatMap` 操作符：\n\n```\n$username\n\
    \    .flatMap { username -> AnyPublisher<Bool, Never> in\n        self.authenticationService.checkUserNameAvailable(userName:\
    \ username)\n    }\n```\n\n![](img/509862_1_En_9_Fig1_HTML.png)\n\n一个包含 3 个字段的注册表单截图链接到两个区块。一个区块中给出了表单模型模板和每个字段的字符类型。下一个区块中则展示了通过输出表和失败表检查用户名可用性的过程。\n\
    \n**图 9-1** 调用身份验证服务检查用户名是否可用的 Combine 管道\n\n此管道从 `username` 发布者获取输入事件（即用户在*用户名*文本输入字段中输入的内容），并将其发送到\
    \ `checkUserNameAvailable` 发布者。该发布者将为每个输入事件返回一个 `Bool` 值，指示相应的用户名是否仍然可用。这意味着订阅者将收到一个\
    \ `Bool` 值流。\n\n我们希望使用此管道的结果来驱动注册表单的状态：只要管道返回 `true` 表示所选用户名可用，我们就希望启用*提交*按钮。同时，一旦管道结果为\
    \ `false`，我们希望显示一条错误消息。\n\n这意味着我们需要向管道添加两个不同的订阅者：*提交*按钮的启用状态和错误消息标签的文本。\n\n为了节省内存并避免浪费\
    \ CPU 周期，让我们使管道可重用。实现此目的的一种方法是将其包装在惰性计算属性中。惰性计算属性只计算一次，并且仅在访问时计算。\n\n提醒一下，惰性计算属性的一般形式如下：\n\
    \n```\nlazy var propertyName: Type = {\n    // 在闭包内计算属性的值\n}() // <- 不要忘记括号\n\
    ```\n\n使用惰性计算属性可确保管道只被实例化一次，从而确保我们为每个订阅者使用相同的实例。\n\n```\nprivate lazy var isUsernameAvailablePublisher:\n\
    \    Publishers.FlatMap<AnyPublisher<Bool, Never>, Published<String>.Publisher>\
    \ = {\n    $username\n        .flatMap { username in\n            self.authenticationService\n\
    \                .checkUserNameAvailable(userName: username)\n        }\n}()\n\
    ```\n\n此时，管道的结果类型是 `Publishers.FlatMap<AnyPublisher<Bool, Never>, Published<String>.Publisher>`。这不仅难以阅读，而且在调用代码中使用也很困难。为了避免使用如此复杂的签名，Combine\
    \ 提供了 `eraseToAnyPublisher` 操作符，它允许我们将管道的类型擦除为 `AnyPublisher<Type, Error>`。通过将此操作符附加到管道的末尾，我们将管道的类型擦除为\
    \ `AnyPublisher<Bool, Never>`——使用起来更加方便。\n\n```\nprivate lazy var isUsernameAvailablePublisher:\n\
    \    AnyPublisher<Bool, Never> = {\n    $username\n        .flatMap { username\
    \ in\n            self.authenticationService\n                .checkUserNameAvailable(userName:\
    \ username)\n        }\n        .eraseToAnyPublisher()\n}()\n```\n\n下一步，我们将把 `isUsernameAvailablePublisher`\
    \ 的结果连接到 UI。看一下视图模型：我们在视图模型的输出部分有两个属性——一个用于与用户名相关的任何消息，另一个保存表单的整体验证状态。\n\nCombine\
    \ 发布者可以连接到多个订阅者，因此我们可以将 `isValid` 和 `usernameMessage` 都连接到 `isUsernameAvailablePublisher`：\n\
    \n```\nclass SignUpScreenViewModel: ObservableObject {\n    ...\n    init() {\n\
    \        isUsernameAvailablePublisher\n            .assign(to: &$isValid)\n  \
    \      isUsernameAvailablePublisher\n            .map {\n                $0 ?\
    \ \"\" : \"用户名不可用。请尝试其他用户名。\"\n            }\n            .assign(to: &$usernameMessage)\n\
    \    }\n}\n```\n\n使用这种方法，我们可以重用 `isUsernameAvailablePublisher`，并用它来驱动表单的整体 `isValid`\
    \ 状态（这将启用/禁用*提交*按钮）和 `usernameMessage` 标签，该标签通知用户他们选择的用户名是否仍然可用。\n\n确保演示服务器正在运行，启动应用程序，并尝试输入几个不同的用户名。演示服务器有一个硬编码的用户名列表，它将这些用户名视为不可用，因此请尝试以下用户名，看看我们迄今为止开发的\
    \ Combine 管道如何驱动 UI：`peterfriese`、`johnnyappleseed`、`page`、`johndoe`。\n\n在输入时观察服务器的控制台输出，你会注意到一些事情：\n\
    \n1.  每输入一个字符，API 端点就会被调用多次。\n2.  Xcode 会提示你不应该在后台线程更新 UI。\n\n让我们看看这些问题，并尝试了解如何修复它们。\n"
- fmt: '# Handling Multithreading


    When building Combine pipelines that access the network, you might end up seeing
    error messages like the following in Xcode’s console output:


    ```

    [SwiftUI] Publishing changes from background threads is not allowed; make sure
    to publish values from the main thread (via operators like receive(on:)) on model
    updates.

    ```


    Sometimes,^([^(74)](#fn74)) Xcode will display a purple warning in the code editor,
    making it easier to find the offending piece of code.


    The reason for this error message is that `URLSession` will execute the network
    request on a background thread. When the request is fulfilled, `dataTaskPublisher`
    will send an event with the result of the request onto the pipeline. Our code
    retrieves this result, maps it to the data type we need for our UI, and assigns
    it to one of the published properties of the view model. This, in turn, will prompt
    SwiftUI to update the UI with the new value of the property.


    All of this happens on the same thread—a background thread. However, accessing
    the UI from a background thread is discouraged, and this is why SwiftUI raises
    a warning.


    To prevent this from happening, we need to instruct Combine to switch to the foreground
    thread once it has received the result of the network request. To tell Combine
    to receive an event on a specific thread, we can use the `receive(on:)` operator:


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    .receive(on: DispatchQueue.main)

    .eraseToAnyPublisher()

    }()

    ```


    We will dive deeper into the topic of threading in the chapter about Combine schedulers,
    but for now, this line will fix our threading issues.


    # Optimizing Network Access


    With high-speed, low-latency Internet available in most places, it is easy to
    forget that not all of our users might be on a fast, low-latency uplink when using
    our apps. Even in cities like Hamburg or London, you will find areas with patchy
    or no connectivity at all.


    When building apps that access the Internet, we should be mindful of this and
    make sure we don’t waste bandwidth.


    When running the app and inspecting the logs of our test server, you saw that
    the `isUserNameAvailable` endpoint got called multiple times for each character
    typed. This is clearly not ideal: not only does it waste CPU cycles on our server
    (which might become an issue if you’re hosting your server with a cloud provider
    that charges you by the number of calls or CPU uptime), but it also means we’re
    adding extra network overhead to our application.


    You might barely notice this when running the test server locally, but you will
    definitely notice it when you’re on an Edge connection, talking to a remote instance
    of your server.


    The problem gets worse if your API endpoints aren’t *idempotent*: imagine calling
    an API endpoint for reserving a seat or buying a concert ticket. By sending two
    (or more) requests instead of one, you would end up reserving more seats than
    you require, or buying more concert tickets than you wanted.


    ## Finding the Root Cause


    First of all, we need to find out what’s causing all those extra requests.


    An easy way to figure out what’s going on with a Combine pipeline is to add some
    debugging code. Let’s add the `print()` operator to the pipeline:


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .print("username")

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    .receive(on: DispatchQueue.main)

    .eraseToAnyPublisher()

    }()

    ```


    This operator logs a couple of useful things to the console:


    1. Any life-cycle events of the pipeline (e.g., subscriptions being added)

    2. Any values being sent/received


    We can specify a prefix (`"username"`) to make the log statements stand out on
    the console.


    Rerunning the app, we immediately see the following output—even without typing
    anything into the text field:


    ```

    username: receive subscription: (PublishedSubject)

    username: request unlimited

    username: receive value: ()

    username: receive subscription: (PublishedSubject)

    username: request unlimited

    username: receive value: ()

    ```


    This indicates we’ve got *two* subscribers for our pipeline!


    Looking at our code, we can spot those subscribers in the initializer of the view
    model:


    ```

    init() {

    isUsernameAvailablePublisher

    .assign(to: &$isValid)

    isUsernameAvailablePublisher

    .map {

    $0 ? ""

    : "Username not available. Try a different one."

    }

    .assign(to: &$usernameMessage)

    }

    ```


    The first subscriber is the pipeline that feeds the `isValid` property, which
    we ultimately use to enable/disable the submit button on the sign-up form.


    The second subscriber is the pipeline that produces an error message in case the
    chosen username is not available. The result of this pipeline will be displayed
    on the sign-up form as well.


    Every time the user types a character, the `isUsernameAvailablePublisher` pipeline
    needs to process the current value of the `username` field, so the result can
    ultimately be assigned to the subscribers.


    No big deal for a pipeline that runs locally (although we should try to not waste
    CPU cycles), but this becomes a much bigger issue for pipelines that access the
    network, like ours does.


    Now that we’ve identified what’s causing multiple subscriptions to our publisher,
    let’s see what we can do to fix the problem.'
