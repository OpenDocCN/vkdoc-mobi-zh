    But how can we store and manage the snapshot listener handle inside the `snapshotPublisher`
    method? It turns out, we can make use of Combine’s `handleEvents` operator. This
    operator allows us to listen to the life-cycle events of a Combine pipeline, for
    example, when the pipeline is cancelled. So we can store the snapshot listener
