    ### 通过使用 `@Binding` 和 `@ObservableObject` 将本地数据源与全局数据源同步


    如果你现在运行这个应用程序，你会注意到一些奇怪的事情：向下钻取导航按预期工作，并且你可以使用 `BookEditView` 编辑书籍。但任何更改都不会反映在
    `BookDetailsView` 或 `BooksListView` 中。


    这是因为每次显示 `BookEditView` 时，我们都会创建一个新的 `@ObservableObject`，实际上就安装了一个新的数据源。


    为了理解为什么会这样，让我们仔细看看信息的流动：


    *   `BookShelfApp` 持有对 `BooksViewModel` 的引用。通过使用 `@StateObject` 属性包装器，我们确保这个 `ObservableObject`
    只被实例化一次，从而有效地将其转变为应用程序的根数据源。

    *   `BookShelfApp` 然后将这个数据源的引用传递给 `BooksListView`，后者将其作为 `@ObservedObject` 存储在一个本地属性中。由于这是对根数据源的引用，我们在
    `BooksListView` 内部对其所做的所有更改不仅会反映在 `BooksListView` 及其子视图中，还会反映在应用程序本身以及任何连接到 `BookShelfApp`
    中 `@StateObject` 的子视图上。

    *   `BooksListView` 使用列表绑定来遍历 `BooksViewModel` 上书籍数组中的各个书籍，并实例化一个新的 `BookRowView`，将一个
    `Binding` 传递给该书籍。

    *   `BookRowView` 显示书籍的一些属性，并将这个 `Binding` 传递给 `BookDetailsView`。

    *   `BookDetailsView` 将这个 `Binding` 传递给 `BookEditView`。


    到目前为止，信息的流动仍然是双向连接的：对 `BookShelfApp` 中根数据源的任何更改都会向下渗透到视图层次结构中，并反映在相应的视图上。同样，对
    `book` 实例（它是 `BookEditView` 中的一个 `@Binding`）的任何更改也会反映在 `BookShelfApp` 的根数据源上。


    然而，通过在 `BookEditView` 中实例化一个新的 `@ObservedObject`（即 `BookEditViewModel`），我们建立了一个新的数据源。`BookEditView`
    中的所有 UI 元素都连接到了这个本地数据源，因此用户在 UI 中做的所有更改只会反映在这个实例上。


