    on what you’ve learned in the previous section to implement a Combine pipeline
    that allows us to implement a flexible and easily enhanceable mechanism for validating
    passwords.


    The first step is to make sure the password is not empty. We can implement this
    verification using a simple publisher, similar to how we implemented the username
    length check:


    ```

    private lazy var isPasswordEmptyPublisher:

    AnyPublisher =

    {

    $password

    .map { $0.isEmpty }

    .eraseToAnyPublisher()

    }()

    ```


    Just like before, we’re using a lazy computed property to make sure we only create
    one instance of the pipeline.


    As a small optimization, we can access the isEmpty property of the password string
    using a key path. Combine includes an extension on `Publisher` with overloaded
    versions of the map function that allow us to address up to three key paths in
    the map operator.


    ```

    private lazy var isPasswordEmptyPublisher:

    AnyPublisher =

    {

    $password

    .map(\.isEmpty)

    .eraseToAnyPublisher()

    }()

    ```


    In the next step, we will compare the password and the password confirmation field
    to make sure the user enters the same password twice. Both `password` and `passwordConfirmation`
    are published properties, so we can subscribe to them to receive events whenever
    the user types in their password.


    But how can we consume the latest password and the latest password confirmation?


    Combine provides a number of operators that allow us to combine several publishers
    in the same pipeline. `Publishers.CombineLatest` allows us to use the latest events
    sent by two upstream publishers. The following code snippet subscribes to `$password`
    and `$passwordConfirmation` and compares their latest output (which is the text
    the user entered into the password fields) using the equality operator `==`:


    ```

    private lazy var isPasswordMatching:

    AnyPublisher =

    {

    Publishers.CombineLatest($password, $passwordConfirmation)

    .map(==)

    .eraseToAnyPublisher()

    }()

    ```


    You will notice I used the key path version of the map operator—the closure version
    would look like this: `map { $0 == $1 }`. Which one you use is largely a matter
    of style and personal preference.


    Now that we can determine if the password is not empty and that both password
    and its confirmation match, we need to determine the overall password validity:
    the password is valid if it is not empty and if it matches the password confirmation.


    You might have guessed it: we will use `Publishers.CombineLatest` to combine the
    latest state of the `isPasswordEmptyPublisher` and the `isPasswordMatching` publishers
    into yet another publisher that we’re going to name `isPasswordValidPublisher`:


    ```

    private lazy var isPasswordValidPublisher:

    AnyPublisher =

    {

    Publishers.CombineLatest(

    isPasswordEmptyPublisher,

    isPasswordMatchingPublisher

    )

    .map { !$0 && $1 }

    .eraseToAnyPublisher()

    }()

    ```


    By now, this code should look familiar to you. To display a meaningful validation
    message, add the following code to the initializer of your view model:


    ```

    Publishers.CombineLatest(

    isPasswordEmptyPublisher,

    isPasswordMatchingPublisher

    )

    .map { isPasswordEmpty, isPasswordMatching in

    if isPasswordEmpty {

    return "Password must not be empty"

    }

    else if !isPasswordMatching {

    return "Passwords do not match"

    }

    return ""

    }

    .assign(to: &$passwordMessage)

    ```


    ### Putting It All Together


    As a final step, we need to combine the username validation and password validation
    and assign the result to the `isValid` property of the view model. This will enable
    the submit button if the form is valid.


    Similar to how we computed the overall validation state of the password, we will
    use `Publishers.CombineLatest` to determine the overall state of the form based
    on the `isUsernameLengthValidPublisher` and the `isPasswordValidPublisher`:


    ```

    private lazy var isFormValidPublisher:

    AnyPublisher =

    {

    Publishers.CombineLatest(

    isUsernameLengthValidPublisher,

    isPasswordValidPublisher

    )

    .map { $0 && $1 }

    .eraseToAnyPublisher()

    }()

    ```


    In the initializer of the view model, replace the first line (which uses just
    the `isUsernameLengthValidPublisher`) and use `isFormValidPublisher` to drive
    the submit button state:


    ```

    init() {

    isFormValidPublisher

    .assign(to: &$isValid)

    isUsernameLengthValidPublisher

    .map {

    $0 ? ""

    : "Username too short. Needs to be at least 3 characters."

    }

    .assign(to: &$usernameMessage)

    Publishers.CombineLatest(

    isPasswordEmptyPublisher,

    isPasswordMatchingPublisher

    )

    .map { isPasswordEmpty, isPasswordMatching in

    if isPasswordEmpty {

    return "Password must not be empty"

    }

    else if !isPasswordMatching {

    return "Passwords do not match"

    }

    return ""

    }

    .assign(to: &$passwordMessage)

    }

    ```


    ## Exercises^([^(71)](#fn71))


    Choosing a strong password is not easy, and many sign-up forms provide a visual
    clue to help users pick a strong password. Our sign-up form is pretty lenient
    in this regard and allows users to pick anything as a password, which isn’t very
    secure. Use what you’ve learned so far to encourage users to pick a strong password:


    1.  Implement a password length requirement: make sure the user’s password has
    at least eight characters. If it has less than eight characters, display a warning
    in the footer of the password section of the form.


    2.  Verify the password strength and reject any passwords that aren’t strong enough.
    An easy way to do this is to use a library like *Navajo-Swift*,^([^(72)](#fn72))
    which computes the strength on a scale of `very weak, weak, reasonable, strong,
    very strong`. Make sure the sign-up form only becomes valid if the user picks
    password with at least `reasonable` strength.


    3.  Add a progress bar to the footer of the password section and display the password
    strength, coloring the progress bar in red, yellow, and green to indicate the
    password strength.'
  trans: '

    ### 密码验证


    有效的用户名只是能在我们应用中创建新用户账户的一个必要条件——提供密码则是另一个。在本节中，我们将基于上一节所学内容，构建一条 Combine 管道，以实现一种灵活且易于扩展的密码验证机制。


    第一步是确保密码不为空。我们可以使用一个简单的发布者来实现这一验证，类似于我们实现用户名长度检查的方式：


    ```

    private lazy var isPasswordEmptyPublisher:

    AnyPublisher =

    {

    $password

    .map { $0.isEmpty }

    .eraseToAnyPublisher()

    }()

    ```


    和之前一样，我们使用惰性计算属性来确保只创建管道的一个实例。


    作为一项小优化，我们可以通过键路径来访问密码字符串的 `isEmpty` 属性。Combine 在 `Publisher` 上包含了一个扩展，提供了 `map`
    函数的重载版本，允许我们在 `map` 运算符中处理最多三个键路径。


    ```

    private lazy var isPasswordEmptyPublisher:

    AnyPublisher =

    {

    $password

    .map(\.isEmpty)

    .eraseToAnyPublisher()

    }()

    ```


    接下来，我们将比较密码和密码确认字段，以确保用户两次输入的密码一致。`$password` 和 `$passwordConfirmation` 都是已发布的属性，因此我们可以订阅它们，以便在用户输入密码时接收事件。


    但我们如何获取最新的密码和最新确认的密码呢？


    Combine 提供了许多运算符，允许我们在同一条管道中组合多个发布者。`Publishers.CombineLatest` 允许我们使用两个上游发布者发送的最新事件。以下代码片段订阅了
    `$password` 和 `$passwordConfirmation`，并使用相等运算符 `==` 比较它们的最新输出（即用户输入到密码字段中的文本）：


    ```

    private lazy var isPasswordMatching:

    AnyPublisher =

    {

    Publishers.CombineLatest($password, $passwordConfirmation)

    .map(==)

    .eraseToAnyPublisher()

    }()

    ```


    你会注意到我使用了 `map` 运算符的键路径版本——闭包版本看起来像这样：`map { $0 == $1 }`。使用哪种主要取决于风格和个人偏好。


    现在我们已经能够判断密码是否为空，以及密码和确认密码是否匹配，接下来需要确定密码的总体有效性：如果密码不为空且与确认密码匹配，则密码有效。


    你可能已经猜到了：我们将使用 `Publishers.CombineLatest` 将 `isPasswordEmptyPublisher` 和 `isPasswordMatchingPublisher`
    的最新状态组合成另一个发布者，命名为 `isPasswordValidPublisher`：


    ```

    private lazy var isPasswordValidPublisher:

    AnyPublisher =

    {

    Publishers.CombineLatest(

    isPasswordEmptyPublisher,

    isPasswordMatchingPublisher

    )

    .map { !$0 && $1 }

    .eraseToAnyPublisher()

    }()

    ```


    至此，这段代码应该看起来很熟悉了。为了显示有意义的验证消息，请将以下代码添加到视图模型的初始化器中：


    ```

    Publishers.CombineLatest(

    isPasswordEmptyPublisher,

    isPasswordMatchingPublisher

    )

    .map { isPasswordEmpty, isPasswordMatching in

    if isPasswordEmpty {

    return "密码不能为空"

    }

    else if !isPasswordMatching {

    return "两次输入的密码不匹配"

    }

    return ""

    }

    .assign(to: &$passwordMessage)

    ```


    ### 综合应用


    作为最后一步，我们需要将用户名验证和密码验证结合起来，并将结果赋值给视图模型的 `isValid` 属性。这样，如果表单有效，提交按钮将被启用。


    类似于我们计算密码整体验证状态的方式，我们将使用 `Publishers.CombineLatest` 基于 `isUsernameLengthValidPublisher`
    和 `isPasswordValidPublisher` 来确定表单的整体状态：


    ```

    private lazy var isFormValidPublisher:

    AnyPublisher =

    {

    Publishers.CombineLatest(

    isUsernameLengthValidPublisher,

    isPasswordValidPublisher

    )

    .map { $0 && $1 }

    .eraseToAnyPublisher()

    }()

    ```


    在视图模型的初始化器中，替换第一行（仅使用 `isUsernameLengthValidPublisher` 的那行），改用 `isFormValidPublisher`
    来驱动提交按钮的状态：


    ```

    init() {

    isFormValidPublisher

    .assign(to: &$isValid)

    isUsernameLengthValidPublisher

    .map {

    $0 ? ""

    : "用户名太短。需要至少 3 个字符。"

    }

    .assign(to: &$usernameMessage)

    Publishers.CombineLatest(

    isPasswordEmptyPublisher,

    isPasswordMatchingPublisher

    )

    .map { isPasswordEmpty, isPasswordMatching in

    if isPasswordEmpty {

    return "密码不能为空"

    }

    else if !isPasswordMatching {

    return "两次输入的密码不匹配"

    }

    return ""

    }

    .assign(to: &$passwordMessage)

    }

    ```


    ## 练习^(⁷¹)


    选择一个强密码并不容易，许多注册表单会提供视觉提示来帮助用户选择强密码。我们的注册表单在这方面相当宽松，允许用户选择任何内容作为密码，这样并不安全。利用你目前学到的知识，鼓励用户选择强密码：


    1.  实现密码长度要求：确保用户密码长度至少为 8 个字符。如果少于 8 个字符，在表单密码区域的底部显示警告信息。


    2.  验证密码强度，拒绝任何强度不足的密码。一个简单的方法是使用像 *Navajo-Swift*^(⁷²) 这样的库，它会按 `非常弱`、`弱`、`一般`、`强`、`非常强`
    的等级计算强度。确保注册表单仅在用户选择至少达到 `一般` 强度的密码时才会变为有效。


    3.  在密码区域底部添加一个进度条，显示密码强度，并将进度条分别着色为红色、黄色和绿色以指示密码强度。

    '
- fmt: '## Summary


    In this chapter, you learned how to use Combine publishers to drive the state
    of a UI with complex business logic, and how breaking down the logic of your app
    into smaller Combine pipelines can help to keep your code manageable.


    We looked at separating the business logic from your UI by moving it into a view
    model. This helped us keep our view lean and easy to read.


    You then learned about several techniques for creating Combine pipelines and how
    to manage them in your view model. For simple pipelines, it is OK to create them
    in your view model’s initializer. Once you need to reuse pipelines, it’s a good
    idea to move them into private properties. Keep in mind that you should use lazy
    computed properties to make sure you don’t create multiple instances of the same
    pipeline, resulting in memory waste and potentially extra network calls.


    Combine offers a wide range of operators to transform the output you receive from
    upstream publishers. In this chapter, we used the following:


    - `map` allows us to transform input from one publisher into a different format.
    You saw how you can either use `map` with a closure to perform more complex transformation
    logic, or use its key path overload to create concise, yet powerful transformations
    that directly access attributes of the input.

    - `Publishers.CombineLatest` is another operator you will use frequently—it combines
    the latest events from several upstream publishers and makes them available to
    its closure. You can think of it as a sort of *Y*-shaped junction that allows
    you to join several streams of events, converting them into a single unified output
    stream.


    This chapter provided a first glimpse into what’s possible with Combine and SwiftUI
    and how using Combine will make it easier to write SwiftUI apps.


    In the next chapter, we will switch gears and look at how we can use Combine to
    access the network and combine the results of remote API calls with local events
    in your app’s UI.


    # Networking with Combine


    We live in a networked world, and most modern applications need to access the
    network to retrieve information stored on a server running on the Internet (or
    on the user’s local network).


    Even on a superfast connection, a request usually takes several milliseconds.
    Using blocking I/O and waiting for a response on the foreground thread of the
    application is not an option, as it would freeze the app and result in a pretty
    terrible user experience. Users would probably assume your app has died, and kill
    it. To prevent this behavior, we need to offload asynchronous work to a background
    thread, so the foreground thread is free to perform UI updates and respond to
    user interactions. This is why modern networking APIs need to be called asynchronously.


    The most popular way to implement asynchronous APIs in Swift is to use *callbacks*.
    Usually, these are implemented as closures, and thanks to Swift’s trailing closure
    syntax, they look rather elegant and are easy to use once you understand how they
    work.


    Other ways to call asynchronous APIs are *async/await* and *Combine*. In this
    chapter, we will dive into how to use Combine to implement a networking layer
    for your app. We will first look at the traditional, callback-driven way to fetch
    data from the network using `URLSession`. Then, we will refactor this code to
    make use of Combine’s `DataTaskPublisher`. You will learn how Combine makes mapping
    data and handling errors easier that will result in more readable and more bug-free
    code. In Chapters 14 and 15, you will learn how to use `async/await` to perform
    asynchronous calls, and we will look at the differences between Combine and `async/await`.


    Keeping your application’s user interface in sync with the application’s state
    has always been difficult, and the development community has come up with a plethora
    of approaches to address this challenge.


    Reactive programming is one such approach, and SwiftUI’s reactive state management
    makes this a lot easier by introducing the notion of a *source of truth* that
    can be shared across your app using SwiftUI’s property wrappers such as `@EnvironmentObject`,
    `@StateObject`, and `@ObservedObject`.


    This *source of truth* is usually your in-memory data model, and combining your
    local source of truth to the network might sound complicated. In this chapter,
    you will learn how you can use Combine to make combining your local source of
    truth with data from a remote service a lot easier than you maybe think.


    You will first learn how to connect a network-driven Combine pipeline to a SwiftUI
    user interface. We will then optimize the implementation to ensure your app doesn’t
    overwhelm your backend server. Combine provides a couple of operators that will
    help us significantly reduce the number of requests your app sends to the server.
    This will also improve the user experience of your application, leaving you to
    wonder how you ever got by without using Combine.


    Let’s kick things off by looking into how to use Combine to fetch data from a
    server and map the result to a Swift `struct`.'
