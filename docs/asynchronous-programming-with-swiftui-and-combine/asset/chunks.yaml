- fmt: "# Make It Editable\n\nDisplaying information is only part of the way to a\
    \ fully data-driven app, and in the next step, we’re going to create an editable\
    \ version of this form.\n\nPart of the iPhone’s success is due to its slick and\
    \ powerful UI, and most of its UI elements have been around since the unveiling\
    \ of the original iPhone in 2007. Just like UIKit, SwiftUI contains a core set\
    \ of input elements that allow developers to build easy-to-use, yet powerful and\
    \ flexible UIs for entering data on (relatively) small screens.\n\nWe’ll be using\
    \ just a few of these input elements to build a form for editing a book, but we’ll\
    \ cover the remaining ones at the end of this chapter.\n\nProbably the most versatile\
    \ (and most often used) input element is `TextField`—it accepts alphanumeric input\
    \ and can be customized to support a variety of data types such as email addresses,\
    \ phone numbers, URLs, and many more.\n\nTo create a `TextField` in SwiftUI, you\
    \ have to provide a title and a binding to a value to display and edit: `TextField(\"\
    title\", $model.property)`.\n\nHere is the basic version of a form to edit a book:\n\
    \n```\nstruct BookEditView: View {\n    @State var book: Book\n    var body: some\
    \ View {\n        Form {\n            TextField(\"Book title\", text: $book.title)\n\
    \            Image(book.largeCoverImageName)\n            TextField(\"Author\"\
    , text: $book.author)\n        }\n    }\n}\n```\n\nAs you can see, we’re using\
    \ `TextField`s to edit the `title` and `author` properties of the current `Book`\
    \ instance.\n\nBut what about the number of pages?\n\nIf you look at `TextField`s\
    \ API, you will notice it supports editing arbitrary data types—all you have to\
    \ do is provide a `Formatter` instance that translates between the data type and\
    \ its textual representation that the user edits.\n\nTo edit an `Int` property\
    \ like the number of pages, we can use a `NumberFormatter`, like so:\n\n```\n\
    struct BookEditView: View {\n    @State var book: Book\n    var body: some View\
    \ {\n        Form {\n            TextField(\"Book title\", text: $book.title)\n\
    \            Image(book.largeCoverImageName)\n            TextField(\"Author\"\
    , text: $book.author)\n            TextField(\"Pages\", value: $book.pages, formatter:\
    \ NumberFormatter())\n        }\n    }\n}\n```\n\nIf you recall, the book also\
    \ has a Boolean property, `isRead`, to track whether the user has read this book.\
    \ Previously, we used a constant to display the state of this property, but now\
    \ let’s make it editable:\n\n```\nstruct BookEditView: View {\n    @State var\
    \ book: Book\n    var body: some View {\n        Form {\n            TextField(\"\
    Book title\", text: $book.title)\n            Image(book.largeCoverImageName)\n\
    \            TextField(\"Author\", text: $book.author)\n            TextField(\"\
    Pages\", value: $book.pages, formatter: NumberFormatter())\n            Toggle(\"\
    Read\", isOn: $book.isRead)\n        }\n    }\n}\n```\n\nTo see this in action,\
    \ we’ll need to update the preview provider to inject one of the sample books\
    \ into the view:\n\n```\nstruct BookEditView_Previews: PreviewProvider {\n   \
    \ static var previews: some View {\n        BookEditView(book: Book.samples[0])\n\
    \    }\n}\n```\n\n## Drill-Down Navigation\n\nDrill-down navigation is a popular\
    \ UI pattern in iOS apps, probably best known from the built-in *Contacts* app:\
    \ starting from the list of all their contacts, users can navigate into individual\
    \ contacts to see their details and perform actions such as initiating a call\
    \ or face-timing them. The contact details screen also features an *Edit* button,\
    \ which will open the currently displayed contact in an editable form. Once the\
    \ user has finished editing the contact, the updated contact details will be updated\
    \ throughout the entire *Contacts* app.\n\nIn this section, we will take a quick\
    \ look on how to implement this pattern for our Book management app based on the\
    \ building blocks we’ve already got: the `BookDetailsView` and the `BookEditView`.\n\
    \nIn addition to the `Book` struct, which serves as the model for an individual\
    \ book, we need to establish a source of truth that contains a collection of all\
    \ the books in our app. As we haven’t implemented any data storage or backend\
    \ connector yet, we’re going to use a static list of books to initialize this\
    \ source of truth.\n\nAs discussed in Chapter 4, the best way to hold a collection\
    \ of elements and update any subscribers about changes to this list is to use\
    \ an `ObservableObject` with a property that is marked as `@Published`:\n\n```\n\
    class BooksViewModel: ObservableObject {\n    @Published var books: [Book] = Book.samples\n\
    }\n```\n\nAt a later stage, we might want to connect this view model to a database,\
    \ but for now, we’re assigning a static list of books, as defined here:\n\n```\n\
    extension Book {\n    static let sampleBooks = [\n        Book(title: \"Changer\"\
    , author: \"Matt Gemmell\", isbn: \"9781916265202\", pages: 476),\n        Book(title:\
    \ \"SwiftUI for Absolute Beginners\", author: \"Jayant Varma\", isbn: \"9781484255155\"\
    , pages: 200),\n        Book(title: \"Asynchronous Programming with SwiftUI and\
    \ Combine\", author: \"Peter Friese\", isbn: \"9781484285718\", pages: 451),\n\
    \        Book(title: \"Modern Concurrency on Apple Platforms\", author: \"Andy\
    \ Ibanez\", isbn: \"9781484286944\", pages: 368)\n    ]\n}\n```\n\nThis view model\
    \ now needs to be instantiated and passed around to the individual views in our\
    \ app. A good place to do this is in the main `App` struct—this makes sure our\
    \ source of truth is shared among all windows of our application. This becomes\
    \ important when your users run your application on a device that allows them\
    \ to show multiple windows of your application at once (such as an iPad): any\
    \ changes the user makes in one window of the app will be reflected in the other\
    \ window immediately.\n\nAs mentioned in Chapter 4, we need to use `@StateObject`\
    \ to tell SwiftUI that it needs to ensure to keep this instance of `BooksViewModel`\
    \ alive across any screen redraws.\n\nTo pass the view model down the view hierarchy,\
    \ we can either use the environment or inject the instance into a view’s initializer.\n\
    \nPersonally, I prefer using initializer injection, as it tends to be more explicit\
    \ than using the environment.\n\n```\nimport SwiftUI\n\n@main\nstruct BookShelfApp:\
    \ App {\n    @StateObject var booksViewModel = BooksViewModel()\n\n    var body:\
    \ some Scene {\n        WindowGroup {\n            NavigationStack {\n       \
    \         BooksListView(booksViewModel: booksViewModel)\n                    .navigationTitle(\"\
    Books\")\n            }\n        }\n    }\n}\n```\n\nThe root view of our navigation\
    \ hierarchy is `BooksListView`, which displays a list of books. As our app’s view\
    \ model is owned by `BookShelfApp`, we can refer to it here using `ObservableObject`:\n\
    \n```\nimport SwiftUI\n\nstruct BooksListView: View {\n    @ObservedObject var\
    \ booksViewModel: BooksViewModel\n\n    var body: some View {\n        List {\n\
    \            ForEach($booksViewModel.books) { $book in\n                BookRowView(book:\
    \ $book)\n            }\n            .onDelete { indexSet in\n               \
    \ booksViewModel.books.remove(atOffsets: indexSet)\n            }\n        }\n\
    \        .navigationTitle(\"Books\")\n    }\n}\n```\n\nYou will notice we’re using\
    \ `List` bindings to ensure the individual items of the list are editable. See\
    \ Chapter 5 if you need a refresher for how this works."
  raw: '## Make It Editable


    Displaying information is only part of the way to a fully data-driven app, and
    in the next step, we’re going to create an editable version of this form.


    Part of the iPhone’s success is due to its slick and powerful UI, and most of
    its UI elements have been around since the unveiling of the original iPhone in
    2007\. Just like UIKit, SwiftUI contains a core set of input elements that allow
    developers to build easy-to-use, yet powerful and flexible UIs for entering data
    on (relatively) small screens.


    We’ll be using just a few of these input elements to build a form for editing
    a book, but we’ll cover the remaining ones at the end of this chapter.


    Probably the most versatile (and most often used) input element is `TextField`—it
    accepts alphanumeric input and can be customized to support a variety of data
    types such as email addresses, phone numbers, URLs, and many more.


    To create a `TextField` in SwiftUI, you have to provide a title and a binding
    to a value to display and edit: `TextField("title", $model.property)`.


    Here is the basic version of a form to edit a book:


    ```

    struct BookEditView: View {

    @State var book: Book

    var body: some View {

    Form {

    TextField("Book title", text: $book.title)

    Image(book.largeCoverImageName)

    TextField("Author", text: $book.author)

    }

    }

    }

    ```


    As you can see, we’re using `TextField`s to edit the `title` and `author` properties
    of the current `Book` instance.


    But what about the number of pages?


    If you look at `TextField`s API, you will notice it supports editing arbitrary
    data types—all you have to do is provide a `Formatter` instance that translates
    between the data type and its textual representation that the user edits.


    To edit an `Int` property like the number of pages, we can use a `NumberFormatter`,
    like so:


    ```

    struct BookEditView: View {

    @State var book: Book

    var body: some View {

    Form {

    TextField("Book title", text: $book.title)

    Image(book.largeCoverImageName)

    TextField("Author", text: $book.author)

    TextField("Pages", value: $book.pages, formatter: NumberFormatter())

    }

    }

    }

    ```


    If you recall, the book also has a Boolean property, `isRead`, to track whether
    the user has read this book. Previously, we used a constant to display the state
    of this property, but now let’s make it editable:


    ```

    struct BookEditView: View {

    @State var book: Book

    var body: some View {

    Form {

    TextField("Book title", text: $book.title)

    Image(book.largeCoverImageName)

    TextField("Author", text: $book.author)

    TextField("Pages", value: $book.pages, formatter: NumberFormatter())

    Toggle("Read", isOn: $book.isRead)

    }

    }

    }

    ```


    To see this in action, we’ll need to update the preview provider to inject one
    of the sample books into the view:


    ```

    struct BookEditView_Previews: PreviewProvider {

    static var previews: some View {

    BookEditView(book: Book.samples[0])

    }

    }

    ```


    ## Drill-Down Navigation


    Drill-down navigation is a popular UI pattern in iOS apps, probably best known
    from the built-in *Contacts* app: starting from the list of all their contacts,
    users can navigate into individual contacts to see their details and perform actions
    such as initiating a call or face-timing them. The contact details screen also
    features an *Edit* button, which will open the currently displayed contact in
    an editable form. Once the user has finished editing the contact, the updated
    contact details will be updated throughout the entire *Contacts* app.


    In this section, we will take a quick look on how to implement this pattern for
    our Book management app based on the building blocks we’ve already got: the `BookDetailsView`
    and the `BookEditView`.


    In addition to the `Book` struct, which serves as the model for an individual
    book, we need to establish a source of truth that contains a collection of all
    the books in our app. As we haven’t implemented any data storage or backend connector
    yet, we’re going to use a static list of books to initialize this source of truth.


    As discussed in Chapter [4](#509862_1_En_4_Chapter.xhtml), the best way to hold
    a collection of elements and update any subscribers about changes to this list
    is to use an `ObservableObject` with a property that is marked as `@Published`:


    ```

    class BooksViewModel: ObservableObject {

    @Published var books: [Book] = Book.samples

    }

    ```


    At a later stage, we might want to connect this view model to a database, but
    for now, we’re assigning a static list of books, as defined here:


    ```

    extension Book {

    static let sampleBooks = [

    Book(title: "Changer", author: "Matt Gemmell", isbn: "9781916265202", pages: 476),

    Book(title: "SwiftUI for Absolute Beginners", author: "Jayant Varma", isbn: "9781484255155",
    pages: 200),

    Book(title: "Asynchronous Programming with SwiftUI and Combine", author: "Peter
    Friese", isbn: "9781484285718", pages: 451),

    Book(title: "Modern Concurrency on Apple Platforms", author: "Andy Ibanez", isbn:
    "9781484286944", pages: 368)

    ]

    }

    ```


    This view model now needs to be instantiated and passed around to the individual
    views in our app. A good place to do this is in the main `App` struct—this makes
    sure our source of truth is shared among all windows of our application. This
    becomes important when your users run your application on a device that allows
    them to show multiple windows of your application at once (such as an iPad): any
    changes the user makes in one window of the app will be reflected in the other
    window immediately.


    As mentioned in Chapter [4](#509862_1_En_4_Chapter.xhtml), we need to use `@StateObject`
    to tell SwiftUI that it needs to ensure to keep this instance of `BooksViewModel`
    alive across any screen redraws.


    To pass the view model down the view hierarchy, we can either use the environment
    or inject the instance into a view’s initializer.


    Personally, I prefer using initializer injection, as it tends to be more explicit
    than using the environment.


    ```

    import SwiftUI

    @main

    struct BookShelfApp: App {

    @StateObject var booksViewModel = BooksViewModel()

    var body: some Scene {

    WindowGroup {

    NavigationStack {

    BooksListView(booksViewModel: booksViewModel)

    .navigationTitle("Books")

    }

    }

    }

    }

    ```


    The root view of our navigation hierarchy is `BooksListView`, which displays a
    list of books. As our app’s view model is owned by `BookShelfApp`, we can refer
    to it here using `ObservableObject`:


    ```

    import SwiftUI

    struct BooksListView: View {

    @ObservedObject var booksViewModel: BooksViewModel

    var body: some View {

    List {

    ForEach($booksViewModel.books) { $book in

    BookRowView(book: $book)

    }

    .onDelete { indexSet in

    booksViewModel.books.remove(atOffsets: indexSet)

    }

    }

    .navigationTitle("Books")

    }

    }

    ```


    You will notice we’re using `List` bindings to ensure the individual items of
    the list are editable. See Chapter [5](#509862_1_En_5_Chapter.xhtml) if you need
    a refresher for how this works.'
  trans: "\n# 使其可编辑\n\n显示信息只是迈向完全数据驱动应用的一部分，下一步，我们将创建此表单的可编辑版本。\n\niPhone 的成功部分归功于其流畅且强大的用户界面，而它的大部分\
    \ UI 元素自 2007 年初代 iPhone 发布以来就一直存在。与 UIKit 一样，SwiftUI 包含一组核心的输入元素，使开发者能够在（相对）较小的屏幕上构建易于使用、强大且灵活的\
    \ UI 来输入数据。\n\n我们将仅使用其中几个输入元素来构建一个用于编辑图书的表单，但本章末尾会介绍其余元素。\n\n可能最通用（也是最常用）的输入元素是\
    \ `TextField`——它接受字母数字输入，并且可以自定义以支持多种数据类型，例如电子邮件地址、电话号码、URL 等。\n\n要在 SwiftUI 中创建\
    \ `TextField`，你必须提供标题以及一个用于显示和编辑值的绑定：`TextField(\"title\", $model.property)`。\n\
    \n以下是编辑图书表单的基础版本：\n\n```\nstruct BookEditView: View {\n    @State var book: Book\n\
    \    var body: some View {\n        Form {\n            TextField(\"Book title\"\
    , text: $book.title)\n            Image(book.largeCoverImageName)\n          \
    \  TextField(\"Author\", text: $book.author)\n        }\n    }\n}\n```\n\n如你所见，我们使用\
    \ `TextField` 来编辑当前 `Book` 实例的 `title` 和 `author` 属性。\n\n但是页数呢？\n\n如果你查看 `TextField`\
    \ 的 API，你会注意到它支持编辑任意数据类型——你只需提供一个 `Formatter` 实例，该实例负责在数据类型和用户编辑的文本表示之间进行转换。\n\
    \n要编辑像页数这样的 `Int` 属性，我们可以使用 `NumberFormatter`，如下所示：\n\n```\nstruct BookEditView:\
    \ View {\n    @State var book: Book\n    var body: some View {\n        Form {\n\
    \            TextField(\"Book title\", text: $book.title)\n            Image(book.largeCoverImageName)\n\
    \            TextField(\"Author\", text: $book.author)\n            TextField(\"\
    Pages\", value: $book.pages, formatter: NumberFormatter())\n        }\n    }\n\
    }\n```\n\n如果你还记得，图书还有一个布尔属性 `isRead`，用于追踪用户是否已阅读过这本书。之前，我们使用常量来显示此属性的状态，但现在我们让它可编辑：\n\
    \n```\nstruct BookEditView: View {\n    @State var book: Book\n    var body: some\
    \ View {\n        Form {\n            TextField(\"Book title\", text: $book.title)\n\
    \            Image(book.largeCoverImageName)\n            TextField(\"Author\"\
    , text: $book.author)\n            TextField(\"Pages\", value: $book.pages, formatter:\
    \ NumberFormatter())\n            Toggle(\"Read\", isOn: $book.isRead)\n     \
    \   }\n    }\n}\n```\n\n要查看效果，我们需要更新预览提供程序，将其中一本示例图书注入到视图中：\n\n```\nstruct BookEditView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        BookEditView(book:\
    \ Book.samples[0])\n    }\n}\n```\n\n## 钻取导航\n\n钻取导航是 iOS 应用中一种流行的 UI 模式，最著名的可能来自内置的\
    \ *通讯录* 应用：用户从所有联系人列表开始，可以导航进入单个联系人查看其详细信息并执行诸如拨打电话或进行 FaceTime 通话等操作。联系人详情屏幕还包含一个\
    \ *编辑* 按钮，该按钮会以可编辑表单的形式打开当前显示的联系人。用户完成编辑联系人后，更新后的联系人详情将在整个 *通讯录* 应用中更新。\n\n在本节中，我们将快速了解如何基于已有的构建块（`BookDetailsView`\
    \ 和 `BookEditView`）为我们的图书管理应用实现此模式。\n\n除了用作单个图书模型的 `Book` 结构体外，我们还需要建立一个包含应用中所有图书集合的**数据源**。由于我们尚未实现任何数据存储或后端连接器，我们将使用一个静态图书列表来初始化这个数据源。\n\
    \n如第 4 章所述，保存元素集合并向任何订阅者通知列表更改的最佳方法是使用带有标记为 `@Published` 的属性的 `ObservableObject`：\n\
    \n```\nclass BooksViewModel: ObservableObject {\n    @Published var books: [Book]\
    \ = Book.samples\n}\n```\n\n在后续阶段，我们可能希望将此视图模型连接到数据库，但目前，我们分配一个静态图书列表，如下所示：\n\n\
    ```\nextension Book {\n    static let sampleBooks = [\n        Book(title: \"\
    Changer\", author: \"Matt Gemmell\", isbn: \"9781916265202\", pages: 476),\n \
    \       Book(title: \"SwiftUI for Absolute Beginners\", author: \"Jayant Varma\"\
    , isbn: \"9781484255155\", pages: 200),\n        Book(title: \"Asynchronous Programming\
    \ with SwiftUI and Combine\", author: \"Peter Friese\", isbn: \"9781484285718\"\
    , pages: 451),\n        Book(title: \"Modern Concurrency on Apple Platforms\"\
    , author: \"Andy Ibanez\", isbn: \"9781484286944\", pages: 368)\n    ]\n}\n```\n\
    \n现在需要实例化此视图模型，并将其传递到应用中的各个视图。一个好的位置是在主 `App` 结构体中执行此操作——这可以确保我们的数据源在应用的所有窗口之间共享。当你的用户在允许同时显示应用多个窗口的设备（例如\
    \ iPad）上运行应用时，这一点变得很重要：用户在一个窗口中做出的任何更改都会立即反映在另一个窗口中。\n\n如第 4 章所述，我们需要使用 `@StateObject`\
    \ 来告诉 SwiftUI，它需要确保此 `BooksViewModel` 实例在任意屏幕重绘期间保持存活。\n\n要沿着视图层级向下传递视图模型，我们可以使用环境，或者将实例注入到视图的初始化器中。\n\
    \n就个人而言，我更喜欢使用初始化器注入，因为它往往比使用环境更明确。\n\n```\nimport SwiftUI\n\n@main\nstruct BookShelfApp:\
    \ App {\n    @StateObject var booksViewModel = BooksViewModel()\n\n    var body:\
    \ some Scene {\n        WindowGroup {\n            NavigationStack {\n       \
    \         BooksListView(booksViewModel: booksViewModel)\n                    .navigationTitle(\"\
    图书\")\n            }\n        }\n    }\n}\n```\n\n我们的导航层级的根视图是 `BooksListView`，它显示一个图书列表。由于我们应用的视图模型由\
    \ `BookShelfApp` 拥有，我们可以在此处使用 `ObservableObject` 来引用它：\n\n```\nimport SwiftUI\n\
    \nstruct BooksListView: View {\n    @ObservedObject var booksViewModel: BooksViewModel\n\
    \n    var body: some View {\n        List {\n            ForEach($booksViewModel.books)\
    \ { $book in\n                BookRowView(book: $book)\n            }\n      \
    \      .onDelete { indexSet in\n                booksViewModel.books.remove(atOffsets:\
    \ indexSet)\n            }\n        }\n        .navigationTitle(\"图书\")\n    }\n\
    }\n```\n\n你会注意到我们使用了 `List` 绑定来确保列表中的各个项目是可编辑的。如果你需要复习其工作原理，请参阅第 5 章。\n"
- fmt: "# 排版后的文档\n\n当前`Book`实例的绑定现在可以传递给`BookRowView`，它会在`BookListView`中显示书籍详细信息：\n\
    \n```swift\nstruct BookRowView: View {\n    @Binding var book: Book\n    var body:\
    \ some View {\n        NavigationLink(destination: BookDetailsView(book: $book))\
    \ {\n            HStack(alignment: .top) {\n                Image(book.mediumCoverImageName)\n\
    \                    .resizable()\n                    .aspectRatio(contentMode:\
    \ .fit)\n                    .frame(height: 90)\n                VStack(alignment:\
    \ .leading) {\n                    Text(book.title)\n                        .font(.headline)\n\
    \                    Text(\"by \\(book.author)\")\n                        .font(.subheadline)\n\
    \                    Text(\"\\(book.pages) pages\")\n                        .font(.subheadline)\n\
    \                }\n                Spacer()\n            }\n        }\n    }\n\
    }\n```\n\n你会注意到我们如何使用`NavigationLink`来指定用户点击列表中某一本书时的目标视图。为了传递绑定，我们使用了`$`语法：`NavigationLink(destination:\
    \ BookDetailsView(book: $book))`。\n\n在`BookDetailsView`中，我们需要将`@State`改为`@Binding`，以表示父视图拥有数据的所有权：\n\
    \n```swift\nstruct BookDetailsView: View {\n    @Binding var book: Book\n    @State\
    \ var showEditBookView = false\n    var body: some View {\n        Form {\n  \
    \          Text(book.title)\n            Image(book.largeCoverImageName)\n   \
    \             .resizable()\n                .scaledToFit()\n                .shadow(radius:\
    \ 10)\n                .padding()\n            Label(book.author, systemImage:\
    \ \"person.crop.rectangle\")\n            Label(\"ISBN: \\(book.isbn)\", systemImage:\
    \ \"number\")\n            Label(\"\\(book.pages) pages\", systemImage: \"book\"\
    )\n            Toggle(\"Read\", isOn: .constant(book.isRead))\n            Button(action:\
    \ { showEditBookView.toggle() }) {\n                Label(\"Edit\", systemImage:\
    \ \"pencil\")\n            }\n        }\n        .sheet(isPresented: $showEditBookView)\
    \ {\n            BookEditView(book: $book)\n        }\n        .navigationTitle(book.title)\n\
    \    }\n}\n```\n\n当用户点击`BookDetailsView`上的*Edit*按钮时，我们会打开一个模态表单来显示`BookEditView`。\n\
    \n为了将可修改的`Book`实例传递给`BookEditView`，我们使用了之前相同的模式：`BookEditView(book: $book)`。\n\
    \n最后，这是`BookEditView`的代码：\n\n```swift\nstruct BookEditView: View {\n    @Binding\
    \ var book: Book\n    var body: some View {\n        Form {\n            TextField(\"\
    Book title\", text: $book.title)\n            Image(book.largeCoverImageName)\n\
    \                .resizable()\n                .scaledToFit()\n              \
    \  .shadow(radius: 10)\n                .padding()\n            TextField(\"Author\"\
    , text: $book.author)\n            TextField(\"Pages\", value: $book.pages, formatter:\
    \ NumberFormatter())\n            Toggle(\"Read\", isOn: .constant(true))\n  \
    \      }\n        .navigationTitle(book.title)\n    }\n}\n```\n\n用户在此界面所做的任何更改都会立即反映在整个应用中。你可以通过在iPad模拟器上运行应用、并排打开两个应用窗口，然后更新书籍标题来亲自尝试：当你输入时，书籍标题会在详情视图和另一个窗口中同时更新。\n\
    \n**图6-7：** 并排编辑一本书，所有更新都会反映在应用的所有实例中\n\n一张12.9英寸iPad Pro的屏幕截图，显示Matt Gemmell所著《Changer》的封面，右侧是书籍面板。箭头指向高亮文本“123,476页”，该文本在所有窗格中均可见。\n\
    \n## 输入验证\n\n在输入表单中，我们经常需要一定程度的输入验证。一些众所周知的输入验证示例是注册表单中的密码字段，你需要确保用户输入的密码满足某些条件。其他应用则不强制进行输入验证——例如，你会发现iOS的*通讯录*应用根本不执行任何输入验证。\n\
    \n在我们的示例应用中，有一个字段可以从输入验证中受益：ISBN字段。ISBN（*国际标准书号*）遵循特定的方案，最后一位是校验码。确保用户输入有效的ISBN非常重要，因为我们使用ISBN来查找书籍封面，所以让我们添加一个简单的验证逻辑。\n\
    \n我们将分多个步骤进行：\n\n-   **第一步：** 我们直接将验证逻辑添加到`BookEditView`中。这是实现此功能最直接的方法，但也是可维护性和可扩展性最差的，正如我们将看到的那样。\n\
    \n-   **第二步：** 我们将验证逻辑提取到视图模型中。这看起来可能增加了很多额外工作，但你会看到这种方法更具可扩展性，并且使得为其他字段添加验证变得更加容易。\n\
    \n-   **最后一步：** 我们将在此第二种方法的基础上加入Combine。这允许我们将多个验证步骤组合成一个，这对于需要同时满足多个条件的表单非常有用（注册表单是一个众所周知的例子：密码需要满足某些条件，并且密码和密码确认需要匹配）。\n\
    \n### 使用 `.onChange(of:)`\n\n你可以在任何SwiftUI视图上调用`.onChange(of:)`，以便在属性发生变化时触发副作用。这可以是视图上的任何`Environment`键或`Binding`。\n\
    \n要观察当前编辑书籍的ISBN属性的变化，我们可以将`.onChange(of: book.isbn)`添加到`BookEditView`中的任何一个视图上。是将其添加到ISBN的`TextField`上，还是添加到`Form`本身，这取决于你。在闭包内部，你将接收到*新*的值：\n\
    \n```swift\nstruct BookEditView: View {\n    @Binding var book: Book\n    @State\
    \ var isISBNValid = false\n    var body: some View {\n        Form {\n       \
    \     // ...\n            VStack(alignment: .leading) {\n                if !isISBNValid\
    \ {\n                    Text(\"ISBN is invalid\")\n                        .font(.caption)\n\
    \                        .foregroundColor(.red)\n                }\n         \
    \       TextField(\"ISBN\", text: $book.isbn)\n            }\n            // ...\n\
    \        }\n        .onChange(of: book.isbn) { value in\n            self.isISBNValid\
    \ = checkISBN(isbn: book.isbn)\n        }\n        .navigationTitle(book.title)\n\
    \    }\n}\n```\n\n我们使用`checkISBN`（这是`Utils`文件夹中的一个函数）来验证ISBN，并将验证结果存储在状态属性`isISBNValid`中。该属性绑定到一个条件语句，该条件语句将根据需要显示或隐藏包含警告消息的`Text`。\n\
    \n虽然这种方法确实有效，但它的扩展性不佳。试想一下，如果你尝试为超过几个输入字段实现验证逻辑，情况会变得多么复杂——这很快就会变得难以管理。"
  raw: 'The binding to the current `Book` instance can now be passed down to the `BookRowView`,
    which displays the book details within the `BookListView`:


    ```

    struct BookRowView: View {

    @Binding var book: Book

    var body: some View {

    NavigationLink(destination: BookDetailsView(book: $book)) {

    HStack(alignment: .top) {

    Image(book.mediumCoverImageName)

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text(book.title)

    .font(.headline)

    Text("by \(book.author)")

    .font(.subheadline)

    Text("\(book.pages) pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    }

    }

    ```


    You’ll notice how we make use of `NavigationLink` to specify the destination view
    when the user taps on one of the books in the list. To pass on the binding, we
    make use of the `$` syntax: `NavigationLink(destination: BookDetailsView(book:
    $book))`.


    In the `BookDetailsView`, we need to change `@State` to `@Binding` to indicate
    that the parent view owns the data:


    ```

    struct BookDetailsView: View {

    @Binding var book: Book

    @State var showEditBookView = false

    var body: some View {

    Form {

    Text(book.title)

    Image(book.largeCoverImageName)

    .resizable()

    .scaledToFit()

    .shadow(radius: 10)

    .padding()

    Label(book.author, systemImage: "person.crop.rectangle")

    Label("ISBN: \(book.isbn)", systemImage: "number")

    Label("\(book.pages) pages", systemImage: "book")

    Toggle("Read", isOn: .constant(book.isRead))

    Button(action: { showEditBookView.toggle() }) {

    Label("Edit", systemImage: "pencil")

    }

    }

    .sheet(isPresented: $showEditBookView) {

    BookEditView(book: $book)

    }

    .navigationTitle(book.title)

    }

    }

    ```


    When the user taps on the *Edit* button on the `BookDetailsView`, we open a modal
    sheet to display `BookEditView`.


    To pass a modifiable `Book` instance to the `BookEditView`, we make use of the
    same pattern used previously: `BookEditView(book: $book)`.


    And finally, here is the code for `BookEditView`:


    ```

    struct BookEditView: View {

    @Binding var book: Book

    var body: some View {

    Form {

    TextField("Book title", text: $book.title)

    Image(book.largeCoverImageName)

    .resizable()

    .scaledToFit()

    .shadow(radius: 10)

    .padding()

    TextField("Author", text: $book.author)

    TextField("Pages", value: $book.pages, formatter: NumberFormatter())

    Toggle("Read", isOn: .constant(true))

    }

    .navigationTitle(book.title)

    }

    }

    ```


    Any changes the user makes in this screen will be reflected immediately in the
    entire app. You can try this yourself by running the app on an iPad Simulator,
    opening two windows of the app side-by-side, and then updating a book title: as
    you type, the book title will be updated in the details view and the other window
    as well.


    ![](images/509862_1_En_6_Chapter/509862_1_En_6_Fig7_HTML.png)


    A screenshot of the iPad Pro, 12.9 inches screen has the cover for Changer by
    Matt Gemmell with the books panel on the right. Arrows point to the highlighted
    text, 123,476 pages on all the panes.


    Figure 6-7


    Side-by-side editing a book, all updates are reflected in all instances of the
    app


    ## Input Validation


    Quite often, in our input forms, we need some level of input validation. Some
    well-known examples for validating input are password fields on sign-up forms,
    where you want to make sure that the password the user enters meets certain criteria.
    Other apps don’t enforce input validation—for example, you will find that the
    iOS *Contacts* app doesn’t perform any input validation at all.


    In our sample app, there is one field that would benefit from input validation:
    the ISBN field. ISBNs (short for *International Standard Book Number*) follow
    a specific scheme, with the last digit being the check number. Making sure the
    user enters a valid ISBN is important, as we use the ISBN to look up the cover
    for the book, so let’s add a simple validation routine.


    We’re going to do this in multiple steps:


    *   First, we’re going to add the validation directly to the `BookEditView`. This
    is the easiest and most straightforward way to implement this, but it is also
    the least maintainable and scalable, as we will see.


    *   Second, we’re going to extract the validation logic into a view model. This
    might look like a lot of extra work, but you will see that this approach is a
    lot more scalable and makes it much easier to add validation for additional fields.


    *   And lastly, we’re going to sprinkle some Combine over this second approach.
    This allows us to compose multiple validation steps into one, which is useful
    for forms that require several criteria to be met at once (sign-up forms are a
    well-known example: passwords need to meet certain criteria, and both the password
    and the password confirmation need to match).


    ### Using `.onChange(of:)`


    You can call `.onChange(of:)` on any SwiftUI view to trigger side effects whenever
    a property changes. This can be any `Environment` key or `Binding` on the view.


    To observe changes to the ISBN attribute of the currently edited book, we can
    add `.onChange(of: book.isbn)` to any of the views in `BookEditView`. It’s up
    to you whether you’d like to add it to the ISBN `TextField` or rather to the `Form`
    itself. Inside the closure, you will receive the *new* value:


    ```

    struct BookEditView: View {

    @Binding var book: Book

    @State var isISBNValid = false

    var body: some View {

    Form {

    // ...

    VStack(alignment: .leading) {

    if !isISBNValid {

    Text("ISBN is invalid")

    .font(.caption)

    .foregroundColor(.red)

    }

    TextField("ISBN", text: $book.isbn)

    }

    // ...

    }

    .onChange(of: book.isbn) { value in

    self.isISBNValid = checkISBN(isbn: book.isbn)

    }

    .navigationTitle(book.title)

    }

    }

    ```


    We use `checkISBN` (which is a function in the `Utils` folder) to verify the ISBN
    and store the result of the check in the state attribute `isISBNValid`. This is
    bound to a conditional which will show or hide a `Text` with a warning message
    as appropriate.


    While this approach does work, it doesn’t scale well. Just imagine what happens
    if you try to implement validation logic for more than a handful of input fields—this
    will quickly become unmanageable.'
