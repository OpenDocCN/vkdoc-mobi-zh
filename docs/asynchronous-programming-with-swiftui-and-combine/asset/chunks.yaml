- fmt: '# Binding Value Types


    If the data you want to display in a view is an enum, struct, or a simple type,
    you can use either `@State` or `@Binding` to wrap the variable or bind to the
    variable directly.


    If you just want to display the value of a variable, you can connect the variable
    to the view directly. For example:


    ```

    let name = "Peter"

    ...

    Text("Hello, \(name), how are you?")

    ```


    This also works for complex types, like an address:


    ```

    struct Address {

    let street: String

    let postCode: String

    let city: String

    let country: String

    }

    let appleHQ = Address(street: "One Infinite Loop",

    postCode: "CA 95014",

    city: "Cupertino",

    country: "United States")

    ...

    Text("Apple HQ: \(appleHQ.street)")

    ```


    This approach works great in many situations, such as displaying attributes of
    a complex object in list view rows. However, structs are immutable when they’re
    assigned to a `let` constant, so you cannot change their attributes after initialization.
    This means you cannot manipulate attributes of a struct from inside a SwiftUI
    view. In addition, plain structs and attributes do not offer a mechanism to publish
    changes, which means that SwiftUI cannot track any changes to simple variables
    or structs.


    If you want SwiftUI to manage updating the UI to reflect changes in the underlying
    data, you need to use its state management property wrappers.


    The first one we’ll look at is `@State` which is also the easiest to use. Applying
    `@State` to a property allows the SwiftUI framework to manage the state of the
    property and respond to updates by redrawing dependent views. Conversely, any
    changes the user makes in the UI (for example by dragging a slider or entering
    text in a `TextField`) will be applied to the property.


    The following code snippet shows a user interface for the infamous “Hello World”
    example: it defines a `name` variable that the user can change by typing in their
    name in the `TextField` view. As a result, the `Text` view will display a greeting
    with the user’s name.


    ```

    @State var name = "Peter"

    ...

    TextField("Enter your name", text: $title)

    Text("Hello \(title), nice to meet you!")

    ```


    By prefixing the `name` variable with `@State`, SwiftUI creates a `Binding` for
    that variable, which can be accessed using the *projected value* using the `$`-prefixed
    version of the variable, `$name`. We use this `Binding` in the `TextField` view
    to allow the user to manipulate the underlying value. In the line below, we directly
    access the `name` property to display the greeting in a `Text` view.


    We will take a closer look at how all of this works behind the scenes later in
    this chapter.


    If your view needs access to data that is defined elsewhere (e.g., in a parent
    view), it doesn’t own the data. In this case, you can use `@Binding` to connect
    the data to the view. This enables the view to read, write, and observe the data.
    We’ve already used bindings in the previous example: a `TextField` requires a
    `Binding` as its second parameter: `TextField(_ title: StringProtocol, text: Binding<String>)`.
    In the example, we used `@State` to create a binding for the `name` variable and
    passed it to the `TextField` view.


    A binding can refer to an `@State` variable or an `@Observable` object (more on
    this later).


    Bindings are especially useful when assembling a view from several smaller, specialized
    views. They are an important tool to help create reusable views.


    The following code sample shows how a parent view and a child view can share the
    same state by using `@State` in the parent view and `@Binding` in the child view:


    ```

    struct ParentView: View {

    @State var favouriteNumber: Int = 42

    var body: some View {

    VStack {

    Text("Your favourite number is \(favouriteNumber)")

    ChildView(number: $favouriteNumber)

    }

    }

    }

    struct ChildView: View {

    @Binding var number: Int

    var body: some View {

    Stepper("\(number)", value: $number, in: 0...100)

    }

    }

    ```


    Both `@State` and `@Binding` are best suited for managing local UI state. For
    example, you can use `@State` to manage a Boolean property that determines whether
    a modal sheet is shown. `@Binding` in particular can also be used to connect views
    to individual attributes of more complex objects, as we will see later in this
    chapter.


    However, you should avoid using `@State` or `@Binding` for complex objects that
    you want to persist on disk or send across the network. SwiftUI has more powerful
    tools to manage objects like these.


    Since properties marked as `@State` are commonly used for handling local UI state,
    you should make them `private` to make sure they cannot accidentally be modified
    from the outside.


    # Binding Objects


    If the data you want to use in a SwiftUI view lives in a reference type (i.e.,
    a `class`), you should use one of `@StateObject`, `@ObservedObject`, or `@EnvironmentObject`
    to manage its state. You also need to conform the class to `ObservableObject`.


    A class that conforms to `ObservableObject` acts as a publisher and notifies its
    subscribers about changes to its properties which are marked as `@Published`.


    From the perspective of the consumer (i.e., the view that subscribes to the updates
    an `ObservableObject` sends), all three of these property wrappers behave exactly
    the same: the view (and its subviews) can subscribe to individual properties of
    the `ObservableObject` (by either using direct property access or bindings) and
    receive updates whenever any of the published properties of the object changes.


    The only way `@StateObject`, `@ObservedObject`, and `@EnvironmentObject` differ
    from each other is how they manage data.


    Before we look at how exactly they manage data, we need to understand how `ObservableObject`
    works.


    # ObservableObject


    To turn a simple Swift class into an observable object, you need to conform it
    to the `ObservableObject` protocol. As this is a class protocol, you can only
    use it on classes, not on value types (such as structs or enums).


    It’s certainly no coincidence that SwiftUI doesn’t define `ObservableObject` itself,
    but instead imports it from the Combine framework. SwiftUI makes use of Combine’s
    publishers without requiring developers to have deep knowledge about the Combine
    framework and Functional Reactive Programming. It’s definitely possible to build
    SwiftUI apps without knowing anything about Combine or using any of its advanced
    features. That being said, Combine provides many useful features such as debouncing,
    error handling, retrying, and other useful features. Once you are past the initial
    learning curve, integrating features like these in your applications will be much
    easier using Combine than implementing them manually.


    Conforming a class to `ObservableObject` and marking some of its properties as
    `@Published` turns a class into a Combine Publisher that emits events whenever
    one of its published properties changes. Once you have declared a property on
    your view that is an `ObservableObject` and marked it as a `@StateObject`, `@ObservedObject`,
    or `@EnvironmentObject`, you can connect its properties to the view or its subviews.


    SwiftUI will start observing the objects and rerender the view as needed to keep
    it in sync with the state of the model.'
