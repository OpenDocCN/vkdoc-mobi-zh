    ### 使用 `Future` 从 Firestore 实现一次性数据读取


    实时同步是 Firestore 的关键特性之一，但并非所有场景都需要或不适合采用实时更新。通常，按需获取数据就足够了。Firestore 支持一次性读取数据（无论是单个文档、集合还是查询结果），本章开头部分已经展示了相关示例。


    如何在 Combine 中实现这一功能？本质上，我们需要发起一次请求，等待其完成，然后将结果发送到 Combine 管线中。


    这正是 `Future` 的用途。`Future` 是一种 `Publisher`，它能“最终生成单个值，然后正常结束或失败”。


    让我们用 `Future` 创建一个一次性 Publisher 来从 Firestore 获取单个文档。这次，我们将为 `DocumentReference`
    创建一个扩展：


    ```

    extension DocumentReference {

    func getDocument(source: FirestoreSource = .default)

    -> Future<DocumentSnapshot, Error>

    {

    ...

    self.getDocument(source: source) { snapshot, error in

    ...

    }

    ...

    }

    }

    ```


    与其他 Publisher 一样，`Future` 也是泛型类型，包含值类型和错误类型。在我们的例子中，值类型是 `DocumentSnapshot`。你可能会疑惑为什么返回
    `Future` 而不是 `AnyPublisher`。`Future` 具有一些特殊属性，使其与其他 Publisher 不同。例如，`Future` 会立即触发执行。普通的
    Publisher 只有在有订阅者时才会触发。为了对调用方透明，我们显式返回 `Future`，而不使用类型擦除将其转为 `AnyPublisher`。


    现在，我们将基于闭包的 `getDocument` 方法调用封装在 `Future` 中：


    ```

    extension DocumentReference {

    func getDocument(source: FirestoreSource = .default)

    -> Future<DocumentSnapshot, Error>

    {

    Future { promise in

    self.getDocument(source: source) { snapshot, error in

    ...

    }

    }

    }

    }

    ```


    当 Firestore 返回错误或文档快照时，闭包内的代码将被调用。`Future` 闭包的 `promise` 参数可用于与调用方通信：


    ```

    extension DocumentReference {

    func getDocument(source: FirestoreSource = .default)

    -> Future<DocumentSnapshot, Error>

    {

    Future { promise in

    self.getDocument(source: source) { snapshot, error in

    if let error = error {

    promise(.failure(error))

    } else if let snapshot = snapshot {

    promise(.success(snapshot))

    }

    }

    }

    }

    }

    ```


    我们检查是否收到了快照或错误，并据此调用 promise。这段代码看起来很熟悉，因为它类似于我们之前为 `snapshotPublisher` 编写的代码，但我需要指出的是，promise
    期望接收一个 `Result` 类型，因此 `.failure` 和 `.success` 是 `Result` 类型中的枚举值。


    至此，我们通过将基于闭包的 Firestore 单个文档获取 API 封装在 `Future` 中，成功将其适配到 Combine 框架。


    以下是调用该新的一次性 Combine Publisher 来获取文档并将其映射到自定义 Swift 结构体的方式：


    ```

    private class BookListViewModel: ObservableObject {

    @Published var book = Book.empty

    private var db = Firestore.firestore()

    func fetchBook() {

    db.collection("books").document("hitchhiker").getDocument()

    .tryMap { documentSnapshot in

    try documentSnapshot.data(as: Book.self)

    }

    .replaceError(with: Book.empty)

    .assign(to: &$book)

    }

    }

    ```


    ## 总结


    苹果为自家许多 API 提供了优秀的 Combine Publisher，但对于第三方 API，我们可能需要自行完成这项工作。


    在本章中，我们讨论了几种将现有命令式代码适配到 Combine 的方法：


    -   你了解了如何实现一个带有 `@Published` 属性的 `ObservableObject`，从而通过 Publisher 暴露数据。这不仅允许我们将
    SwiftUI 视图连接到发布的属性，还使我们能够将 Combine 管线连接到该属性。

    -   也可以使用 Combine 的低级原语（如 `Publisher`、`Subscription` 和 `Subscriber`）创建自定义 Publisher。然而，苹果明确不鼓励开发者这样做，因为这种方法需要我们自行管理背压。

    -   相反，苹果推荐使用 `PassthroughSubject` 和 `Future` 这样的便捷 Publisher 来实现自定义 Publisher，并且我们深入研究了如何使用这种方法封装现有的基于闭包的
    API。


    采用哪种方法取决于你的使用场景——在大多数情况下，使用视图模型可能是最实用、最高效的方式。但如果你是 SDK 提供者，则绝对应该考虑为你的 API 实现 Combine
    Publisher。这正是我们在 Firebase 所做的：我们使用 `PassthroughSubject` 和 `Future` 为大多数异步 Firebase
    API 实现了 Combine Publisher。


    # 13. Combine 调度器与 SwiftUI


    默认情况下，SwiftUI 中响应 UI 事件运行的任何代码都会在主线程上执行。由于我们的大部分代码都涉及响应某些用户交互来更新其他 UI 元素，因此在大多数情况下这没有问题。例如，你可能需要验证用户的输入，以确保他们填写了多步骤表单中的所有必填字段。这是一个内存密集型过程，其运行速度足够在主线中执行，而不会引起任何问题。


    然而，一旦你想执行更复杂的计算，或者需要访问本地存储、网络或任何访问延迟高于本地内存的 API，如果你在主线程上执行这些代码，就可能阻塞 UI。


    阻塞 UI 会导致各种问题：应用的 UI 变得无响应，动画开始出现卡顿，最终用户会感到不满，开始在 App Store 上留下负面评论，或在 Twitter
    上抱怨。


    这就是为什么你应该将任何长时间运行的代码卸载到后台线程。当你的代码在后台运行时，主线程可以自由处理 UI 事件。用户可以继续使用应用，直到后台进程最终完成。某些后台进程可能会产生需要在
    UI 上显示的结果。然而，由于 UI 更新必须在主线程上进行，因此你需要先切换回主线程，才能用后台线程接收到的结果更新 UI。


    Combine 提供了一种优雅且声明式的机制，用于控制管线的各个部分在何处运行。这种机制基于调度器（Scheduler）的概念构建，帮助我们推理代码应该在何处执行，而无需直接处理线程的复杂性。


    在本章中，你将学习如何有效使用这种机制，帮助你构建能更好利用系统资源的应用，从而保持应用 UI 的响应性。

    '
- fmt: "# What Is a Scheduler\n\nCombine uses `Scheduler` as an abstraction that allows\
    \ us to specify *when* and *where* our code is run, so we don’t have to work directly\
    \ with threads. According to Apple’s documentation, `Scheduler` is *a protocol\
    \ that defines when and how to execute a closure*^([^(99)](#fn99)).\n\nThe `Scheduler`\
    \ protocol itself defines a number of methods that allow callers to run code immediately,\
    \ or at a future date and time:\n\n```\npublic protocol Scheduler {\n    /// Describes\
    \ an instant in time for this scheduler.\n    associatedtype SchedulerTimeType\
    \ : Strideable where\n        Self.SchedulerTimeType.Stride : SchedulerTimeIntervalConvertible\n\
    \    /// A type that defines options accepted by the scheduler.\n    ///\n   \
    \ /// This type is freely definable by each `Scheduler`.\n    /// Typically, operations\
    \ that take a `Scheduler` parameter\n    /// will also take `SchedulerOptions`.\n\
    \    associatedtype SchedulerOptions\n    /// This scheduler’s definition of the\
    \ current\n    /// moment in time.\n    var now: Self.SchedulerTimeType { get\
    \ }\n    /// The minimum tolerance allowed by the scheduler.\n    var minimumTolerance:\
    \ Self.SchedulerTimeType.Stride { get }\n    /// Performs the action at the next\
    \ possible opportunity.\n    func schedule(options: Self.SchedulerOptions?,\n\
    \                  _ action: @escaping () -> Void)\n    /// Performs the action\
    \ at some time after the specified date.\n    func schedule(after date: Self.SchedulerTimeType,\n\
    \                  tolerance: Self.SchedulerTimeType.Stride,\n               \
    \   options: Self.SchedulerOptions?,\n                  _ action: @escaping ()\
    \ -> Void)\n    /// Performs the action at some time after the specified\n   \
    \ /// date, at the specified frequency, optionally taking into\n    /// account\
    \ tolerance if possible.\n    func schedule(after date: Self.SchedulerTimeType,\n\
    \                  interval: Self.SchedulerTimeType.Stride,\n                \
    \  tolerance: Self.SchedulerTimeType.Stride,\n                  options: Self.SchedulerOptions?,\n\
    \                  _ action: @escaping () -> Void) -> Cancellable\n}\n```\n\n\
    Different schedulers implement this time-keeping aspect differently, using the\
    \ associated type `SchedulerTimeType`. This associated type needs to conform to\
    \ `SchedulerTimeIntervalConvertible`, which is a means to express relative time.\n\
    \nLet’s look at some of the schedulers that you will run into when using Combine\
    \ and discuss when to use them.\n\n## Types of Schedulers\n\nHere are the schedulers\
    \ that are most relevant when working with SwiftUI:\n\n*   `ImmediateScheduler`\
    \ is the default scheduler which will be used if you don’t specify any other scheduler.\
    \ It will execute code immediately on the same thread that triggered the pipeline.\
    \ We will discuss this scheduler in more detail in the next section.\n\n*   `RunLoop`\
    \ is a scheduler which you will see being used quite often. It performs work on\
    \ a specific run loop.\n\n*   `DispatchQueue` allows us to execute code on specific\
    \ dispatch queues. The most commonly used ones are the main dispatch queue and\
    \ the background dispatch queues (you can specify different quality of service\
    \ classes, ranging from `background` to `userInteractive`), but you can create\
    \ your own dispatch queues as well, and configure them according to your needs.\n\
    \nSo which `Scheduler` should you be using?\n\nThe most commonly used schedulers\
    \ that are being used in the context of SwiftUI are `RunLoop` and `DispatchQueue`.\
    \ Although they seem to be very similar (see Philippe Hausler’s answer on the\
    \ Swift forums^([^(100)](#fn100))), there is one difference that is relevant for\
    \ any Combine pipeline that needs to schedule code that runs on the main thread\
    \ for accessing the UI.\n\nAs explained in this StackOverflow answer^([^(101)](#fn101)),\
    \ a Combine pipeline will not deliver events while the user is dragging or touching\
    \ the UI when using `RunLoop`. When using `DispatchQueue` as the scheduler, however,\
    \ the pipeline will deliver events.\n\nSo if you want to make sure your Combine\
    \ pipelines continue to deliver events even if the user is interacting with the\
    \ UI of your app (such as scrolling a list, tapping on buttons, or dragging elements\
    \ across the screen), you should use `DispatchQueue`.\n\n## Default Behavior\n\
    \nIf you don’t explicitly tell Combine how to schedule your code, it will default\
    \ to running your code on the same thread as the event that triggered the pipeline.\
    \ When using Combine in SwiftUI, most of your pipelines will subscribe to a published\
    \ property on one of your view models. SwiftUI runs on the main thread, so any\
    \ events that originate on the UI will be sent from the main thread.\n\nIn the\
    \ following example, we change the value of a published property in response to\
    \ a button click. The closure that handles the button click runs on the main thread,\
    \ so the Combine pipeline in the view model will run on the main thread as well.\n\
    \n```\nclass ViewModel: ObservableObject {\n    @Published var demo = false\n\
    \    private var cancellables = Set<AnyCancellable>()\n\n    init() {\n      \
    \  $demo\n            .sink { value in\n                print(\"Main thread: \\\
    (Thread.isMainThread)\")\n            }\n            .store(in: &cancellables)\n\
    \    }\n}\n\nstruct DemoView: View {\n    @StateObject var viewModel = ViewModel()\n\
    \n    var body: some View {\n        Button(\"Toggle from main thread\") {\n \
    \           viewModel.demo.toggle()\n        }\n        .buttonStyle(.action)\n\
    \    }\n}\n```\n\nWhen you run this code^([^(102)](#fn102)) and click the button,\
    \ you will see the following output, which confirms that SwiftUI sends events\
    \ on the main thread:\n\n```\nMain thread: true\n```\n\nThis scheduling behavior\
    \ is caused by Combine’s default scheduler, `ImmediateScheduler`. It will execute\
    \ code immediately on the current thread. So if you send an event from a background\
    \ thread, the pipeline will run on that specific background thread as well. Let’s\
    \ make a small change to our example and wrap the code that changes the published\
    \ property in a call to `DispatchQueue.global().async { }`. As a result, the Combine\
    \ pipeline will run on the same background thread.\n\n```\nclass ViewModel: ObservableObject\
    \ {\n    @Published var demo = false\n    private var cancellables = Set<AnyCancellable>()\n\
    \n    init() {\n        $demo\n            .sink { value in\n                print(\"\
    Main thread: \\(Thread.isMainThread)\")\n            }\n            .store(in:\
    \ &cancellables)\n    }\n}\n\nstruct DemoView: View {\n    @StateObject var viewModel\
    \ = ViewModel()\n\n    var body: some View {\n        Button(\"Toggle from main\
    \ thread\") {\n            DispatchQueue.global().async {\n                viewModel.demo.toggle()\n\
    \            }\n        }\n        .buttonStyle(.action)\n    }\n}\n```\n\nRunning\
    \ this code and clicking the button result in the following output:\n\n```\n2022-05-14\
    \ 12:19:32.093826+0200 SwiftUICombineSchedulers[41912:2513626] [SwiftUI] Publishing\
    \ changes from background threads is not allowed; make sure to publish values\
    \ from the main thread (via operators like receive(on:)) on model updates.\nMain\
    \ thread: false\n```\n\nThis default behavior works well for most cases. For example,\
    \ if you want to validate the user’s input, this can usually run on the main thread,\
    \ as you’ll be combining several pieces of UI state into the `isValid` state of\
    \ the input form.\n\nHowever, as soon as you need to access the network (or any\
    \ other asynchronous data source), things become more complicated, and you will\
    \ want to run parts of the pipeline on a background thread before coming back\
    \ to the main thread to update the UI.\n\nOne approach for switching threads is\
    \ to explicitly use `DispatchQueue` and its methods to switch between the main\
    \ queue (`DispatchQueue.main`) and one of the global background queues (`DispatchQueue.global()`)\
    \ or a queue you create and manage yourself."
  raw: '## What Is a Scheduler


    Combine uses `Scheduler` as an abstraction that allows us to specify *when* and
    *where* our code is run, so we don’t have to work directly with threads. According
    to Apple’s documentation, `Scheduler``,` is *a protocol that defines when and
    how to execute a closure*^([^(99)](#fn99)).


    The `Scheduler` protocol itself defines a number of methods that allow callers
    to run code immediately, or at a future date and time:


    ```

    public protocol Scheduler {

    /// Describes an instant in time for this scheduler.

    associatedtype SchedulerTimeType : Strideable where

    Self.SchedulerTimeType.Stride : SchedulerTimeIntervalConvertible

    /// A type that defines options accepted by the scheduler.

    ///

    /// This type is freely definable by each `Scheduler`.

    /// Typically, operations that take a `Scheduler` parameter

    /// will also take `SchedulerOptions`.

    associatedtype SchedulerOptions

    /// This scheduler’s definition of the current

    /// moment in time.

    var now: Self.SchedulerTimeType { get }

    /// The minimum tolerance allowed by the scheduler.

    var minimumTolerance: Self.SchedulerTimeType.Stride { get }

    /// Performs the action at the next possible opportunity.

    func schedule(options: Self.SchedulerOptions?,

    _ action: @escaping () -> Void)

    /// Performs the action at some time after the specified date.

    func schedule(after date: Self.SchedulerTimeType,

    tolerance: Self.SchedulerTimeType.Stride,

    options: Self.SchedulerOptions?,

    _ action: @escaping () -> Void)

    /// Performs the action at some time after the specified

    /// date, at the specified frequency, optionally taking into

    /// account tolerance if possible.

    func schedule(after date: Self.SchedulerTimeType,

    interval: Self.SchedulerTimeType.Stride,

    tolerance: Self.SchedulerTimeType.Stride,

    options: Self.SchedulerOptions?,

    _ action: @escaping () -> Void) -> Cancellable

    }

    ```


    Different schedulers implement this time-keeping aspect differently, using the
    associated type `SchedulerTimeType`. This associated type needs to conform to
    `SchedulerTimeIntervalConvertible`, which is a means to express relative time.


    Let’s look at some of the schedulers that you will run into when using Combine
    and discuss when to use them.


    ## Types of Schedulers


    Here are the schedulers that are most relevant when working with SwiftUI:


    *   `ImmediateScheduler` is the default scheduler which will be used if you don’t
    specify any other scheduler. It will execute code immediately on the same thread
    that triggered the pipeline. We will discuss this scheduler in more detail in
    the next section.


    *   `RunLoop` is a scheduler which you will see being used quite often. It performs
    work on a specific run loop.


    *   `DispatchQueue` allows us to execute code on specific dispatch queues. The
    most commonly used ones are the main dispatch queue and the background dispatch
    queues (you can specify different quality of service classes, ranging from `background`
    to `userInteractive`), but you can create your own dispatch queues as well, and
    configure them according to your needs.


    So which `Scheduler` should you be using?


    The most commonly used schedulers that are being used in the context of SwiftUI
    are `RunLoop` and `DispatchQueue`. Although they seem to be very similar (see
    Philippe Hausler’s answer on the Swift forums^([^(100)](#fn100))), there is one
    difference that is relevant for any Combine pipeline that needs to schedule code
    that runs on the main thread for accessing the UI.


    As explained in this StackOverflow answer^([^(101)](#fn101)), a Combine pipeline
    will not deliver events while the user is dragging or touching the UI when using
    `RunLoop`. When using `DispatchQueue` as the scheduler, however, the pipeline
    will deliver events.


    So if you want to make sure your Combine pipelines continue to deliver events
    even if the user is interacting with the UI of your app (such as scrolling a list,
    tapping on buttons, or dragging elements across the screen), you should use `DispatchQueue`.


    ## Default Behavior


    If you don’t explicitly tell Combine how to schedule your code, it will default
    to running your code on the same thread as the event that triggered the pipeline.
    When using Combine in SwiftUI, most of your pipelines will subscribe to a published
    property on one of your view models. SwiftUI runs on the main thread, so any events
    that originate on the UI will be sent from the main thread.


    In the following example, we change the value of a published property in response
    to a button click. The closure that handles the button click runs on the main
    thread, so the Combine pipeline in the view model will run on the main thread
    as well.


    ```

    class ViewModel: ObservableObject {

    @Published var demo = false

    private var cancellables = Set()

    init() {

    $demo

    .sink { value in

    print("Main thread: \(Thread.isMainThread)")

    }

    .store(in: &cancellables)

    }

    }

    struct DemoView: View {

    @StateObject var viewModel = ViewModel()

    var body: some View {

    Button("Toggle from main thread") {

    viewModel.demo.toggle()

    }

    .buttonStyle(.action)

    }

    }

    ```


    When you run this code^([^(102)](#fn102)) and click the button, you will see the
    following output, which confirms that SwiftUI sends events on the main thread:


    ```

    Main thread: true

    ```


    This scheduling behavior is caused by Combine’s default scheduler, `ImmediateScheduler`.
    It will execute code immediately on the current thread. So if you send an event
    from a background thread, the pipeline will run on that specific background thread
    as well. Let’s make a small change to our example and wrap the code that changes
    the published property in a call to `DispatchQueue.global().async { }`. As a result,
    the Combine pipeline will run on the same background thread.


    ```

    class ViewModel: ObservableObject {

    @Published var demo = false

    private var cancellables = Set()

    init() {

    $demo

    .sink { value in

    print("Main thread: \(Thread.isMainThread)")

    }

    .store(in: &cancellables)

    }

    }

    struct DemoView: View {

    @StateObject var viewModel = ViewModel()

    var body: some View {

    Button("Toggle from main thread") {

    DispatchQueue.global().async {

    viewModel.demo.toggle()

    }

    }

    .buttonStyle(.action)

    }

    }

    ```


    Running this code and clicking the button result in the following output:


    ```

    2022-05-14 12:19:32.093826+0200 SwiftUICombineSchedulers[41912:2513626] [SwiftUI]
    Publishing changes from background threads is not allowed; make sure to publish
    values from the main thread (via operators like receive(on:)) on model updates.

    Main thread: false

    ```


    This default behavior works well for most cases. For example, if you want to validate
    the user’s input, this can usually run on the main thread, as you’ll be combining
    several pieces of UI state into the `isValid` state of the input form.


    However, as soon as you need to access the network (or any other asynchronous
    data source), things become more complicated, and you will want to run parts of
    the pipeline on a background thread before coming back to the main thread to update
    the UI.


    One approach for switching threads is to explicitly use `DispatchQueue` and its
    methods to switch between the main queue (`DispatchQueue.main`) and one of the
    global background queues (`DispatchQueue.global()`) or a queue you create and
    manage yourself.'
  trans: "\n# 什么是调度器\n\nCombine 使用 `Scheduler` 作为一种抽象机制，让我们可以指定代码运行的*时机*和*位置*，从而无需直接与线程打交道。根据苹果官方文档，`Scheduler`\
    \ 是*一个定义何时以及如何执行闭包的协议*^(⁹⁹)。\n\n`Scheduler` 协议本身定义了一系列方法，允许调用者立即或在未来的某个日期和时间执行代码：\n\
    \n```\npublic protocol Scheduler {\n    /// 为该调度器描述一个时间点。\n    associatedtype\
    \ SchedulerTimeType : Strideable where\n        Self.SchedulerTimeType.Stride\
    \ : SchedulerTimeIntervalConvertible\n    /// 一种定义调度器所接受选项的类型。\n    ///\n    ///\
    \ 该类型可由每个 `Scheduler` 自由定义。\n    /// 通常，接受 `Scheduler` 参数的操作\n    /// 也会接受 `SchedulerOptions`。\n\
    \    associatedtype SchedulerOptions\n    /// 该调度器对当前时刻的定义。\n    var now: Self.SchedulerTimeType\
    \ { get }\n    /// 调度器允许的最小容差。\n    var minimumTolerance: Self.SchedulerTimeType.Stride\
    \ { get }\n    /// 在下一个可能的机会执行该操作。\n    func schedule(options: Self.SchedulerOptions?,\n\
    \                  _ action: @escaping () -> Void)\n    /// 在指定日期之后某个时间执行该操作。\n\
    \    func schedule(after date: Self.SchedulerTimeType,\n                  tolerance:\
    \ Self.SchedulerTimeType.Stride,\n                  options: Self.SchedulerOptions?,\n\
    \                  _ action: @escaping () -> Void)\n    /// 在指定日期之后，以指定频率执行该操作，\n\
    \    /// 如果可能的话，可以选择考虑容差。\n    func schedule(after date: Self.SchedulerTimeType,\n\
    \                  interval: Self.SchedulerTimeType.Stride,\n                \
    \  tolerance: Self.SchedulerTimeType.Stride,\n                  options: Self.SchedulerOptions?,\n\
    \                  _ action: @escaping () -> Void) -> Cancellable\n}\n```\n\n\
    不同的调度器通过使用关联类型 `SchedulerTimeType` 来实现这种计时方面的功能。该关联类型需要遵循 `SchedulerTimeIntervalConvertible`，这是一种表示相对时间的方式。\n\
    \n让我们看看在使用 Combine 时会遇到的一些调度器，并讨论何时使用它们。\n\n## 调度器类型\n\n以下是在使用 SwiftUI 时最相关的调度器：\n\
    \n*   `ImmediateScheduler` 是默认调度器，如果你没有显式指定其他调度器，就会使用它。它会在触发管道的同一线程上立即执行代码。我们将在下一节更详细地讨论这个调度器。\n\
    \n*   `RunLoop` 是一个你会经常看到的调度器。它在特定的运行循环上执行工作。\n\n*   `DispatchQueue` 允许我们在特定的调度队列上执行代码。最常用的是主调度队列和后台调度队列（你可以指定不同的服务质量等级，从\
    \ `background` 到 `userInteractive`），但你也可以创建自己的调度队列，并根据需要进行配置。\n\n那么，你应该使用哪个 `Scheduler`\
    \ 呢？\n\n在 SwiftUI 上下文中，最常用的调度器是 `RunLoop` 和 `DispatchQueue`。尽管它们看起来非常相似（参见 Philippe\
    \ Hausler 在 Swift 论坛上的回答^(¹⁰⁰)），但在任何需要调度运行在主线程上的代码以访问 UI 的 Combine 管道中，有一个区别是相关的。\n\
    \n正如这个 StackOverflow 回答^(¹⁰¹)中所解释的，当使用 `RunLoop` 时，如果用户在拖动或触摸 UI，Combine 管道将不会传递事件。然而，当使用\
    \ `DispatchQueue` 作为调度器时，管道会继续传递事件。\n\n因此，如果你希望确保即使在与应用 UI 交互（例如滚动列表、点击按钮或拖动屏幕上的元素）时，Combine\
    \ 管道仍能继续传递事件，那么你应该使用 `DispatchQueue`。\n\n## 默认行为\n\n如果你没有明确告诉 Combine 如何调度你的代码，它将默认在与触发管道的事件相同的线程上运行你的代码。在\
    \ SwiftUI 中使用 Combine 时，大多数管道会订阅某个视图模型上的已发布属性。SwiftUI 运行在主线程上，因此任何源自 UI 的事件都将从主线程发送。\n\
    \n在下面的示例中，我们通过响应按钮点击来更改已发布属性的值。处理按钮点击的闭包运行在主线程上，因此视图模型中的 Combine 管道也将在主线程上运行。\n\
    \n```\nclass ViewModel: ObservableObject {\n    @Published var demo = false\n\
    \    private var cancellables = Set<AnyCancellable>()\n\n    init() {\n      \
    \  $demo\n            .sink { value in\n                print(\"Main thread: \\\
    (Thread.isMainThread)\")\n            }\n            .store(in: &cancellables)\n\
    \    }\n}\n\nstruct DemoView: View {\n    @StateObject var viewModel = ViewModel()\n\
    \n    var body: some View {\n        Button(\"Toggle from main thread\") {\n \
    \           viewModel.demo.toggle()\n        }\n        .buttonStyle(.action)\n\
    \    }\n}\n```\n\n当你运行这段代码^(¹⁰²)并点击按钮时，你会看到以下输出，这证实了 SwiftUI 在主线程上发送事件：\n\n```\n\
    Main thread: true\n```\n\n这种调度行为是由 Combine 的默认调度器 `ImmediateScheduler` 引起的。它会在当前线程上立即执行代码。因此，如果你从后台线程发送事件，管道也会在该特定后台线程上运行。让我们对我们的示例稍作修改，将更改已发布属性的代码包装在\
    \ `DispatchQueue.global().async { }` 调用中。结果，Combine 管道将在同一个后台线程上运行。\n\n```\nclass\
    \ ViewModel: ObservableObject {\n    @Published var demo = false\n    private\
    \ var cancellables = Set<AnyCancellable>()\n\n    init() {\n        $demo\n  \
    \          .sink { value in\n                print(\"Main thread: \\(Thread.isMainThread)\"\
    )\n            }\n            .store(in: &cancellables)\n    }\n}\n\nstruct DemoView:\
    \ View {\n    @StateObject var viewModel = ViewModel()\n\n    var body: some View\
    \ {\n        Button(\"Toggle from main thread\") {\n            DispatchQueue.global().async\
    \ {\n                viewModel.demo.toggle()\n            }\n        }\n     \
    \   .buttonStyle(.action)\n    }\n}\n```\n\n运行这段代码并点击按钮，会得到以下输出：\n\n```\n2022-05-14\
    \ 12:19:32.093826+0200 SwiftUICombineSchedulers[41912:2513626] [SwiftUI] Publishing\
    \ changes from background threads is not allowed; make sure to publish values\
    \ from the main thread (via operators like receive(on:)) on model updates.\nMain\
    \ thread: false\n```\n\n这种默认行为在大多数情况下都适用。例如，如果你想验证用户输入，这通常可以在主线程上运行，因为你将把多个 UI\
    \ 状态组合到输入表单的 `isValid` 状态中。\n\n然而，一旦你需要访问网络（或任何其他异步数据源），情况就变得复杂了，你会希望在回到主线程更新\
    \ UI 之前，先在后台线程上运行管道的部分内容。\n\n一种切换线程的方法是显式使用 `DispatchQueue` 及其方法，在主队列（`DispatchQueue.main`）和全局后台队列之一（`DispatchQueue.global()`）或你自己创建和管理的队列之间进行切换。\n"
- fmt: "# Switching Schedulers\n\nUsing explicit calls to switch to the most appropriate\
    \ `DispatchQueue` certainly works, but this approach will lead to rather verbose\
    \ code.\n\nWouldn’t it be much nicer if there was a declarative way to make sure\
    \ the individual parts of your pipelines run on the appropriate thread?\n\nCombine\
    \ provides a number of operators that allows us to switch between threads by declaring\
    \ which scheduler to use.\n\nThe most important one is `receive(on:)`, which you\
    \ will find yourself using a lot, especially when accessing the network: it allows\
    \ us to tell Combine which scheduler to use when receiving events in our subscribers,\
    \ such as `sink` or `assign`.\n\nAnother key operator for scheduling is `subscribe(on:)`—we\
    \ can use it to specify which scheduler Combine should use when subscribing to\
    \ an upstream publisher.\n\nOther operators that affect which schedulers are used\
    \ in our pipelines include `debounce`, `throttle`, and `delay`.\n\nIn the following\
    \ sections, we’ll explore how those operators affect the progression of a Combine\
    \ pipeline that receives an event from a SwiftUI event handler. We’ll use the\
    \ following publisher to simulate a piece of code that performs a long-running\
    \ computation^([^(103)](#fn103)):\n\n```swift\nfunc performWork() -> AnyPublisher\
    \ {\n    print(\"[performWork:start] isMainThread: \\(Thread.isMainThread)\")\n\
    \    return Deferred {\n        Future { promise in\n            print(\"[performWork:Future:start]\
    \ isMainThread: \\(Thread.isMainThread)\")\n            sleep(5)\n           \
    \ print(\"[performWork:Future:finished] isMainThread: \\(Thread.isMainThread)\"\
    )\n            promise(.success(true))\n        }\n    }\n    .eraseToAnyPublisher()\n\
    }\n```\n\nSince `Future`s will run their closure immediately without waiting for\
    \ a subscriber to be attached, we need to wrap it inside a `Deferred` publisher.\
    \ Doing so ensures the code in the closure will only be executed once we connect\
    \ a subscriber, which allows us to influence which scheduler this publisher will\
    \ use.\n\n## Controlling Upstream Publishers Using `subscribe(on:)`\n\nBy using\
    \ the `subscribe(on:)` operator, you can control on which dispatch queue the upstream\
    \ publisher runs on.\n\nThis is useful if you want to make sure the publisher\
    \ runs on a background thread. Instead of wrapping your code in a call to `DispatchQueue.global().async\
    \ { }`, you can add a call to `receive(on:)`. This declarative approach will make\
    \ your code easier to read and reason about.\n\nThe `subscribe(on:)` operator\
    \ specifies the scheduler that is used to perform the `subscribe`, `cancel`, and\
    \ `request` operations of the upstream publisher.\n\nIn the following code snippet,^([^(104)](#fn104))\
    \ we make sure the publisher in `performWork()` runs on a background thread by\
    \ adding a call to `subscribe(on: DispatchQueue.global(qos: .background)` to the\
    \ pipeline:\n\n```swift\nfunc start() {\n    print(\"[start:at beginning] isMainThread:\
    \ \\(Thread.isMainThread)\")\n    self.performWork()\n        .handleEvents(receiveSubscription:\
    \ { sub in\n            print(\"[receiveSubscription] isMainThread: \\(Thread.isMainThread)\"\
    )\n        }, receiveOutput: { value in\n            print(\"[receiveOutput] isMainThread:\
    \ \\(Thread.isMainThread)\")\n        }, receiveCompletion: { completion in\n\
    \            print(\"[receiveCompletion] isMainThread: \\(Thread.isMainThread)\"\
    )\n        }, receiveCancel: {\n            print(\"[receiveCancel] isMainThread:\
    \ \\(Thread.isMainThread)\")\n        }, receiveRequest: { demand in\n       \
    \     print(\"[receiveRequest] isMainThread: \\(Thread.isMainThread)\")\n    \
    \    })\n        .map { value -> Bool in\n            print(\"[map 1] isMainThread:\
    \ \\(Thread.isMainThread)\")\n            return value\n        }\n        .subscribe(on:\
    \ DispatchQueue.global(qos: .background))\n        .map { value -> Int in\n  \
    \          print(\"[map 2] isMainThread: \\(Thread.isMainThread)\")\n        \
    \    return self.times + 1\n        }\n        .sink { value in\n            print(\"\
    [sink] isMainThread: \\(Thread.isMainThread)\")\n            self.times = value\n\
    \        }\n        .store(in: &self.cancellables)\n    print(\"[start:at end]\
    \ isMainThread: \\(Thread.isMainThread)\")\n}\n```\n\nWhen calling this code from\
    \ the main thread (e.g., from inside a `Button`’s action handler), you will see\
    \ the following output on the console:\n\n```\n[start:at beginning] isMainThread:\
    \ true\n[performWork:start] isMainThread: true\n[start:at end] isMainThread: true\n\
    [performWork:Future:start] isMainThread: false\n\n[performWork:Future:finished]\
    \ isMainThread: false\n[receiveSubscription] isMainThread: false\n[receiveRequest]\
    \ isMainThread: false\n[receiveOutput] isMainThread: false\n[map 1] isMainThread:\
    \ false\n[map 2] isMainThread: false\n[sink] isMainThread: false\n2022-05-10 09:59:07.514607+0200\
    \ SwiftUICombineSchedulers[80945:27603444] [SwiftUI] Publishing changes from background\
    \ threads is not allowed; make sure to publish values from the main thread (via\
    \ operators like receive(on:)) on model updates.\n[receiveCompletion] isMainThread:\
    \ false\n```\n\nAs you can see, the call originates on the main thread, but then\
    \ execution switches to a background thread. As a result, the publisher will be\
    \ executed on a background thread, freeing the main thread for other UI-related\
    \ work.\n\nAs mentioned before, calling `subscribe(on:)` will impact the upstream\
    \ publisher. However, the rest of the pipeline will *also* be executed using the\
    \ scheduler you specified, which is the reason why SwiftUI issues a runtime warning\
    \ saying we shouldn’t update the UI from a background thread. Remember, all UI\
    \ updates should be performed from the main thread.\n\n## Controlling Downstream\
    \ Subscribers Using `receive(on:)`\n\nBy using the `receive(on:)` operator, you\
    \ can influence which scheduler Combine will use for all downstream operators\
    \ and subscribers.\n\nThis is useful for making sure the subscribers of a Combine\
    \ pipeline run on the main thread—for example, when assigning values to a published\
    \ property that is connected to a SwiftUI view: making any changes to this property\
    \ will result in a UI update and thus needs to happen on the main thread.\n\n\
    Let’s update the previous code snippet by adding a call to `.receive(on: DispatchQueue.main)`\
    \ right before the `sink` operator:\n\n```swift\noverride func start() {\n   \
    \ print(\"[start:at beginning] isMainThread: \\(Thread.isMainThread)\")\n    self.performWork()\n\
