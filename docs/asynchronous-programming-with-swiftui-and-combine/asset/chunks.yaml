    \ 中，正是我们异步调用 `fetchRandomWord` 的位置。代码仍在后台线程上运行。\n\n![Word Browser 窗口的屏幕截图，左侧面板选中了“#0\
    \ LibraryViewModel.refresh()”。右侧面板的 LibraryView.swift 下有 5 段选中的代码和警告。](img/509862_1_En_15_Fig6_HTML.png)\n\
    \n**图 15-6.** 回到 `refresh`，仍在后台线程上\n\n再恢复一次运行，直到调试器命中 `refreshable` 视图修饰器闭包中的第二个断点，我们回到了主线程！\n\
