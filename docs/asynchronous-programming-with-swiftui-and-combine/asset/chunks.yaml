  trans: '

    ### 页眉与页脚


    所有`List`视图样式都支持页眉和页脚。要为某个分区指定页眉和/或页脚，请使用接受`header`或`footer`参数的构造器之一。


    不过，我偏爱的页眉页脚创建方式似乎已被标记为弃用：


    ```

    @available(iOS 13.0, macOS 10.15, tvOS 13.0, watchOS 6.0, *)

    extension Section where Parent : View, Content : View, Footer : View {

    /// 创建一个包含页眉、页脚和提供的内容的分区。

    /// - 参数:

    ///   - header: 用作分区页眉的视图。

    ///   - footer: 用作分区页脚的视图。

    ///   - content: 分区的内容。

    @available(iOS, deprecated: 100000.0, renamed: "Section(content:header:footer:)")

    @available(macOS, deprecated: 100000.0, renamed: "Section(content:header:footer:)")

    @available(tvOS, deprecated: 100000.0, renamed: "Section(content:header:footer:)")

    @available(watchOS, deprecated: 100000.0, renamed: "Section(content:header:footer:)")

    public init(header: Parent, footer: Footer, @ViewBuilder content: () -> Content)

    }

    ```


    以下是我偏好的为分区设置页眉和页脚的方式：


    ```

    List {

    Section(header: Text("水果"), footer: Text("共 \(fruits.count) 种水果")) {

    ForEach(fruits, id: \.self) { fruit in

    Label(fruit, systemImage: "\(fruits.firstIndex(of: fruit) ?? 0).circle.fill" )

    }

    }

    }

    ```


    以下是实现相同效果的新方式：


    ```

    List {

    Section {

    ForEach(fruits, id: \.self) { fruit in

    Label(fruit, systemImage: "\(fruits.firstIndex(of: fruit) ?? 0).circle.fill" )

    }

    } header: {

    Text("水果")

    } footer: {

    Text("共 \(fruits.count) 种水果")

    }

    }

    ```


    哪种写法更简洁，由你来判断——执行时，它们的效果完全相同。


    ### 列表单元格


    在`UITableViewController`的早期，设计自定义单元格曾是一件相当复杂的事情，值得庆幸的是，从那以后事情变得简单多了。


    在 SwiftUI 中，设计自定义的`List`行入门很容易（只需使用一个简单的`Text`视图来展示当前项目），但可能性是无限的，因为你可以利用 SwiftUI
    灵活的基于堆栈的布局系统。关于构建自定义`List`行的通用介绍，请查看本系列的第一部分，其中涵盖了一些基础技术。


    此外，SwiftUI 支持多种方式来样式化`List`行的常见方面，例如它们的背景、缩进、强调色、色调和徽章。


    以下是一个代码片段，展示了如何配置一个列表行：


    ```

    List(items, id: \.title) { item in

    Label(item.title, systemImage: item.iconName)

    .badge(item.badge)

    // listItemTint 和 foregroundColor 互斥

    // .listItemTint(listItemTintColor)

    .foregroundColor(foregroundColor)

    .listRowSeparator(showSeparators == true ? .visible : .hidden)

    .listRowSeparatorTint(separatorTintColor)

    .listRowBackground(rowBackgroundColor)

    }

    }

    ```


    ![手机屏幕示意图。图上显示：启用行分隔符按钮、前景色、列表项色调颜色以及行背景颜色。箭头标记了 dot ListRowSeparator、dot foregroundcolor、dot
    badge 等。](img/509862_1_En_5_Fig7_HTML.png)


    **图 5-7** 列表样式


    ### 分隔符


    任何设计师都会告诉你，项目之间的空间与项目本身同等重要。在 SwiftUI 3 中，现在可以影响行分隔符和分区分隔符的样式：色调颜色和可见性都可控。SwiftUI
    灵活的 DSL 使得为整个`List`视图或单个行和分区控制这些属性变得容易。


    要控制行分隔符的外观，可以使用`.listRowSeparator()`和`.listRowSeparatorTint()`。你可以指定要配置的边（`.top`或`.bottom`）。如果没有为`edges`参数提供任何值，则顶部*和*底部都将被修改。


    ```

    List {

    Text("第 1 行")

    Text("第 2 行（分隔符隐藏）")

    .listRowSeparator(.hidden)

    Text("第 3 行")

    Text("第 4 行（分隔符着色为红色）")

    .listRowSeparatorTint(.red)

    Text("第 5 行")

    Text("第 6 行（底部分隔符隐藏）")

    .listRowSeparator(.hidden, edges: .bottom)

    Text("第 7 行")

    Text("第 8 行（顶部分隔符着色为蓝色）")

    .listRowSeparatorTint(.blue, edges: .top)

    Text("第 9 行")

    Text("第 10 行")

    }

    ```


    ![手机屏幕示意图，标题为“样式化行”。显示第 1 行到第 10 行及其指定的属性。箭头标记了 dot ListRowSeperator 对应 dot hidden、dot
    red、dot hidden, edges: dot bottom 等。](img/509862_1_En_5_Fig8_HTML.png)


    **图 5-8** 样式化列表行


    要控制分区分隔符的外观，可以使用`.listSectionSeparator()`和`.listSectionSeparatorTint()`。就像列表行的视图修饰符一样，这两种视图修饰符都支持指定要修改的边。


    ```

    List {

    Section(header: Text("分区 1"), footer: Text("分区 1 - 无样式")) {

    Text("第 1 行")

    }

    Section(header: Text("分区 2"), footer: Text("分区 2 - 分区分隔符隐藏")) {

    Text("第 1 行")

    }

    .listSectionSeparator(.hidden)

    Section(header: Text("分区 3"), footer: Text("分区 3 - 分区分隔符着色为红色")) {

    Text("第 1 行")

    }

    .listSectionSeparatorTint(.red)

    Section(header: Text("分区 4"), footer: Text("分区 4 - 分区分隔符着色为绿色")) {

    Text("第 1 行")

    }

    .listSectionSeparatorTint(.green, edges: [.top, .bottom])

    Section(header: Text("分区 5"), footer: Text("分区 5 - 分区分隔符（底部）隐藏")) {

    Text("第 1 行")

    }

    .listSectionSeparator(.hidden, edges: .bottom)

    Section("分区 6") {

    Text("第 1 行")

    }

    }

    ```


    ![手机屏幕示意图，标题为“样式化分区”，显示分区 1 到 4 及其对应的行与属性。箭头标记了 dot ListsectionSeperator、dot hidden，以及
    dot ListsectionSeperator、dot red。](img/509862_1_En_5_Fig9_HTML.png)


    **图 5-9** 样式化列表分区


    ## 操作


    现在让我们来看看滑动操作。滑动操作被广泛应用于许多应用中，最突出的是苹果自家的邮件应用。它提供了一种广为人知且易于使用的界面交互方式，允许用户对列表项执行操作。


    UIKit 自 iOS 11 起就支持滑动操作，但 SwiftUI 直到 WWDC 2021 才支持滑动操作。


    在这篇文章中，我们将探讨以下功能：


    * **使用`onDelete`修饰器进行滑动删除**

    * **使用`EditButton`和`.editMode`环境值来删除和移动项目**

    * **使用滑动操作**（这是最灵活的方法，也为我们提供了丰富的样式选项）

    '
- fmt: "# Swipe-to-Delete\n\nThis feature was available in SwiftUI right from the\
    \ beginning. It is pretty straightforward to use, but also pretty basic (or rather\
    \ inflexible). To add swipe-to-delete to a `List` view, all you need to do is\
    \ apply the `onDelete` modifier to a `ForEach` loop inside a `List` view. This\
    \ modifier expects a closure with one parameter that contains an `IndexSet`, indicating\
    \ which rows to delete.\n\nHere is a code snippet that shows a simple `List` with\
    \ an `onDelete` modifier. When the user swipes to delete, the closure will be\
    \ called, which will consequently remove the respective row from the array of\
    \ items backing the `List` view:\n\n```swift\nstruct SwipeToDeleteListView: View\
    \ {\n    @State fileprivate var items = [\n        Item(title: \"Puzzle\", iconName:\
    \ \"puzzlepiece\", badge: \"Nice!\"),\n        Item(title: \"Controller\", iconName:\
    \ \"gamecontroller\", badge: \"Clicky!\"),\n        Item(title: \"Shopping cart\"\
    , iconName: \"cart\", badge: \"$$$\"),\n        Item(title: \"Gift\", iconName:\
    \ \"giftcard\", badge: \":-)\"),\n        Item(title: \"Clock\", iconName: \"\
    clock\", badge: \"Tick tock\"),\n        Item(title: \"People\", iconName: \"\
    person.2\", badge: \"2\"),\n        Item(title: \"T-Shirt\", iconName: \"tshirt\"\
    , badge: \"M\")\n    ]\n    var body: some View {\n        List {\n          \
    \  ForEach(items) { item in\n                Label(item.title, systemImage: item.iconName)\n\
    \            }\n            .onDelete { indexSet in\n                items.remove(atOffsets:\
    \ indexSet)\n            }\n        }\n    }\n}\n```\n\nIt’s actually quite convenient\
    \ that `onDelete` passes an `IndexSet` to indicate which item(s) should be deleted,\
    \ as `Array` provides a method `remove(atOffsets:)` that takes an `IndexSet`.\n\
    \nIt is worth noting that you cannot apply `onDelete` to `List` directly—you need\
    \ to use a `ForEach` loop instead and nest it inside a `List`^([^(48)](#fn48)).\n\
    \n# Moving and Deleting Items Using EditMode\n\nFor some applications, it makes\
    \ sense to let users rearrange items by dragging them across the list. SwiftUI\
    \ makes implementing this super easy—all you need to do is apply the `onMove`\
    \ view modifier to a `List` and then update the underlying data structure accordingly.\n\
    \nHere is a snippet that shows how to implement this for a simple array:\n\n```swift\n\
    List {\n    ForEach(items) { item in\n        Label(item.title, systemImage: item.iconName)\n\
    \    }\n    .onDelete { indexSet in\n        items.remove(atOffsets: indexSet)\n\
    \    }\n    .onMove { indexSet, index in\n        items.move(fromOffsets: indexSet,\
    \ toOffset: index)\n    }\n}\n```\n\nAgain, this is made easy thanks to `Array.move`,\
    \ which expects exactly the parameters that we receive in `onDelete`’s closure.\n\
    \nTo turn on edit mode for a `List`, there are two options:\n\n*   Using the `.editMode`\
    \ environment value\n*   Using the `EditButton` view\n\nUnder the hood, both approaches\
    \ make use of SwiftUI’s environment. The following snippet demonstrates how to\
    \ use the `EditButton` to allow the user to turn on edit mode for the list:\n\n\
    ```swift\nList {\n    ForEach(items) { item in\n        Label(item.title, systemImage:\
    \ item.iconName)\n    }\n    .onDelete { indexSet in\n        items.remove(atOffsets:\
    \ indexSet)\n    }\n    .onMove { indexSet, index in\n        items.move(fromOffsets:\
    \ indexSet, toOffset: index)\n    }\n}\n.toolbar {\n    EditButton()\n}\n```\n\
    \n# Swipe Actions\n\nFor anything that goes beyond swipe-to-delete and `EditMode`,\
    \ SwiftUI now supports Swipe Actions. This new API gives us a lot of control over\
    \ how to display swipe actions:\n\n*   We can define different swipe actions per\
    \ row.\n*   We can specify the text, icon, and tint color to use for each individual\
    \ action.\n*   We can add actions to the leading and trailing edge of a row.\n\
    *   We can enable or disable full swipe for the first action on either end of\
    \ the row, allowing users to trigger the action by completely swiping the row\
    \ to the respective edge.\n\n## Basic Swipe Actions\n\nLet’s look at a simple\
    \ example on how to use this new API. To register a Swipe Action for a `List`\
    \ row, we need to call the `swipeActions` view modifier. Inside the closure of\
    \ the view modifier, we can set up one (or more) `Button`s to implement the action\
    \ itself.\n\nThe following code snippet demonstrates how to add a simple swipe\
    \ action to a `List` view:\n\n```swift\nList(viewModel.items) { item in\n    Text(item.title)\n\
    \        .fontWeight(item.isRead ? .regular : .bold)\n        .swipeActions {\n\
    \            Button (action: { viewModel.markItemRead(item) }) {\n           \
    \     if let isRead = item.isRead, isRead == true {\n                    Label(\"\
    Read\", systemImage: \"envelope.badge.fill\")\n                }\n           \
    \     else {\n                    Label(\"Unread\", systemImage: \"envelope.open.fill\"\
    )\n                }\n            }\n            .tint(.blue)\n        }\n}\n\
    ```\n\nIt’s worth noting that the `swipeActions` modifier is invoked on the view\
    \ that represents the row. In this case, it is a simple `Text` view, but for more\
    \ advanced lists, this might as well be a `HStack` or `VStack`. This is different\
    \ from the `onDelete` modifier (which needs to be applied to a `ForEach` loop\
    \ inside a `List` view), and it gives us the flexibility to apply a different\
    \ set of actions depending on the row.\n\nAlso note that each swipe action is\
    \ represented by a `Button`. If you use any other view, SwiftUI will not register\
    \ it, and no action will be shown. Likewise, if you try to apply the `swipeActions`\
    \ modifier to the `List` or a `ForEach` loop, the modifier will be ignored.\n\n\
    ## Specifying the Edge\n\nBy default, swipe actions will be added to the trailing\
    \ edge of the row. This is why, in the previous example, the *mark as read/unread*\
    \ action was added to the trailing edge. To add the action to the leading edge\
    \ (just like in Apple’s Mail app), all we have to do is specify the `edge` parameter,\
    \ like so:\n\n```swift\nList(viewModel.items) { item in\n    Text(item.title)\n\
    \        .fontWeight(item.isRead ? .regular : .bold)\n        .swipeActions(edge:\
    \ .leading) {\n            Button (action: { viewModel.markItemRead(item) }) {\n\
    \                if let isRead = item.isRead, isRead == true {\n             \
    \       Label(\"Read\", systemImage: \"envelope.badge.fill\")\n              \
    \  }\n                else {\n                    Label(\"Unread\", systemImage:\
    \ \"envelope.open.fill\")\n                }\n            }\n            .tint(.blue)\n\
    \        }\n}\n```\n\nTo add actions to either edge, we can call the `swipeActions`\
    \ modifier multiple times, specifying the edge we want to add the actions to.\n\
    \nIf you add swipe actions to both the leading and trailing edge, it is a good\
    \ idea to be explicit about where you want to add the actions. In the following\
    \ code snippet, we add one action to the leading edge and another one to the trailing\
    \ edge:\n\n```swift\nList(viewModel.items) { item in\n    Text(item.title)\n \
    \       .fontWeight(item.isRead ? .regular : .bold)\n        .swipeActions(edge:\
    \ .leading) {\n            Button (action: { viewModel.markItemRead(item) }) {\n\
    \                if let isRead = item.isRead, isRead == true {\n             \
    \       Label(\"Read\", systemImage: \"envelope.badge.fill\")\n              \
    \  }\n                else {\n                    Label(\"Unread\", systemImage:\
    \ \"envelope.open.fill\")\n                }\n            }\n            .tint(.blue)\n\
    \        }\n        .swipeActions(edge: .trailing) {\n            Button(role:\
    \ .destructive, action: { viewModel.deleteItem(item) } ) {\n                Label(\"\
    Delete\", systemImage: \"trash\")\n            }\n        }\n}\n```\n\nYou might\
    \ notice that we used the `role` parameter on the `Button` to indicate it is `.destructive`—this\
    \ instructs SwiftUI to use a red background color for this button. We still have\
    \ to implement deleting the item ourselves, though. And since the `action` closure\
    \ of the `Button` is inside the scope of the current row, it is now much easier\
    \ to directly access the current list `item`—another advantage of this API design\
    \ over the previous design for `onDelete`.\n\n## Swipe Actions and onDelete\n\n\
    After reading the previous code snippet, you might be wondering why we didn’t\
    \ use the `onDelete` view modifier instead of implementing a delete action ourselves.\
    \ The answer is quite simple: as stated in the documentation, SwiftUI will stop\
    \ synthesizing the delete functionality once you use the `swipeActions` modifier."
  raw: '### Swipe-to-Delete


    This feature was available in SwiftUI right from the beginning. It is pretty straightforward
    to use, but also pretty basic (or rather inflexible). To add swipe-to-delete to
    a `List`view, all you need to do is apply the `onDelete` modifier to a `ForEach`
    loop inside a `List` view. This modifier expects a closure with one parameter
    that contains an `IndexSet`, indicating which rows to delete.


    Here is a code snippet that shows a simple `List` with an `onDelete` modifier.
    When the user swipes to delete, the closure will be called, which will consequently
    remove the respective row from the array of items backing the `List` view:


    ```

    struct SwipeToDeleteListView: View {

    @State fileprivate var items = [

    Item(title: "Puzzle", iconName: "puzzlepiece", badge: "Nice!"),

    Item(title: "Controller", iconName: "gamecontroller", badge: "Clicky!"),

    Item(title: "Shopping cart", iconName: "cart", badge: "$$$"),

    Item(title: "Gift", iconName: "giftcard", badge: ":-)"),

    Item(title: "Clock", iconName: "clock", badge: "Tick tock"),

    Item(title: "People", iconName: "person.2", badge: "2"),

    Item(title: "T-Shirt", iconName: "tshirt", badge: "M")

    ]

    var body: some View {

    List {

    ForEach(items) { item in

    Label(item.title, systemImage: item.iconName)

    }

    .onDelete { indexSet in

    items.remove(atOffsets: indexSet)

    }

    }

    }

    }

    ```


    It’s actually quite convenient that `onDelete` passes an `IndexSet` to indicate
    which item(s) should be deleted, as `Array` provides a method `remove(atOffsets:)`
    that takes an `IndexSet`.


    It is worth noting that you cannot apply `onDelete` to `List` directly—you need
    to use a `ForEach` loop instead and nest it inside a `List`^([^(48)](#fn48)).


    ### Moving and Deleting Items Using EditMode


    For some applications, it makes sense to let users rearrange items by dragging
    them across the list. SwiftUI makes implementing this super easy—all you need
    to do is apply the `onMove` view modifier to a `List` and then update the underlying
    data structure accordingly.


    Here is a snippet that shows how to implement this for a simple array:


    ```

    List {

    ForEach(items) { item in

    Label(item.title, systemImage: item.iconName)

    }

    .onDelete { indexSet in

    items.remove(atOffsets: indexSet)

    }

    .onMove { indexSet, index in

    items.move(fromOffsets: indexSet, toOffset: index)

    }

    }

    ```


    Again, this is made easy thanks to `Array.move`, which expects exactly the parameters
    that we receive in `onDelete`’s closure.


    To turn on edit mode for a `List`, there are two options:


    *   Using the `.editMode` environment value


    *   Using the `EditButton` view


    Under the hood, both approaches make use of SwiftUI’s environment. The following
    snippet demonstrates how to use the `EditButton` to allow the user to turn on
    edit mode for the list:


    ```

    List {

    ForEach(items) { item in

    Label(item.title, systemImage: item.iconName)

    }

    .onDelete { indexSet in

    items.remove(atOffsets: indexSet)

    }

    .onMove { indexSet, index in

    items.move(fromOffsets: indexSet, toOffset: index)

    }

    }

    .toolbar {

    EditButton()

    }

    ```


    ### Swipe Actions


    For anything that goes beyond swipe-to-delete and `EditMode`, SwiftUI now supports
    Swipe Actions. This new API gives us a lot of control over how to display swipe
    actions:


    *   We can define different swipe actions per row.


    *   We can specify the text, icon, and tint color to use for each individual action.


    *   We can add actions to the leading and trailing edge of a row.


    *   We can enable or disable full swipe for the first action on either end of
    the row, allowing users to trigger the action by completely swiping the row to
    the respective edge.


    #### Basic Swipe Actions


    Let’s look at a simple example on how to use this new API. To register a Swipe
    Action for a `List` row, we need to call the `swipeActions` view modifier. Inside
    the closure of the view modifier, we can set up one (or more) `Button`s to implement
    the action itself.


    The following code snippet demonstrates how to add a simple swipe action to a
    `List` view:


    ```

    List(viewModel.items) { item in

    Text(item.title)

    .fontWeight(item.isRead ? .regular : .bold)

    .swipeActions {

    Button (action: { viewModel.markItemRead(item) }) {

    if let isRead = item.isRead, isRead == true {

    Label("Read", systemImage: "envelope.badge.fill")

    }

    else {

    Label("Unread", systemImage: "envelope.open.fill")

    }

    }

    .tint(.blue)

    }

    }

    ```


    It’s worth noting that the `swipeActions` modifier is invoked on the view that
    represents the row. In this case, it is a simple `Text` view, but for more advanced
    lists, this might as well be a `HStack` or `VStack`. This is different from the
    `onDelete` modifier (which needs to be applied to a `ForEach` loop inside a `List`
    view), and it gives us the flexibility to apply a different set of actions depending
    on the row.


    Also note that each swipe action is represented by a `Button`. If you use any
    other view, SwiftUI will not register it, and no action will be shown. Likewise,
    if you try to apply the `swipeActions` modifier to the `List` or a `ForEach` loop,
    the modifier will be ignored.


    #### Specifying the Edge


    By default, swipe actions will be added to the trailing edge of the row. This
    is why, in the previous example, the *mark as read/unread* action was added to
    the trailing edge. To add the action to the leading edge (just like in Apple’s
    Mail app), all we have to do is specify the `edge` parameter, like so:


    ```

    List(viewModel.items) { item in

    Text(item.title)

    .fontWeight(item.isRead ? .regular : .bold)

    .swipeActions(edge: .leading) {

    Button (action: { viewModel.markItemRead(item) }) {

    if let isRead = item.isRead, isRead == true {

    Label("Read", systemImage: "envelope.badge.fill")

    }

    else {

    Label("Unread", systemImage: "envelope.open.fill")

    }

    }

    .tint(.blue)

    }

    ```


    To add actions to either edge, we can call the `swipeActions` modifier multiple
    times, specifying the edge we want to add the actions to.


    If you add swipe actions to both the leading and trailing edge, it is a good idea
    to be explicit about where you want to add the actions. In the following code
    snippet, we add one action to the leading edge and another one to the trailing
    edge:


    ```

    List(viewModel.items) { item in

    Text(item.title)

    .fontWeight(item.isRead ? .regular : .bold)

    .swipeActions(edge: .leading) {

    Button (action: { viewModel.markItemRead(item) }) {

    if let isRead = item.isRead, isRead == true {

    Label("Read", systemImage: "envelope.badge.fill")

    }

    else {

    Label("Unread", systemImage: "envelope.open.fill")

    }

    }

    .tint(.blue)

    }

    .swipeActions(edge: .trailing) {

    Button(role: .destructive, action: { viewModel.deleteItem(item) } ) {

    Label("Delete", systemImage: "trash")

    }

    }

    }

    ```


    You might notice that we used the `role` parameter on the `Button` to indicate
    it is `.destructive`—this instructs SwiftUI to use a red background color for
    this button. We still have to implement deleting the item ourselves, though. And
    since the `action` closure of the `Button` is inside the scope of the current
    row, it is now much easier to directly access the current list `item`—another
    advantage of this API design over the previous design for `onDelete`.


    #### Swipe Actions and onDelete


    After reading the previous code snippet, you might be wondering why we didn’t
    use the `onDelete` view modifier instead of implementing a delete action ourselves.
    The answer is quite simple: as stated in the documentation, SwiftUI will stop
    synthesizing the delete functionality once you use the `swipeActions` modifier.'
  trans: "\n# 滑动删除\n\n这个功能从 SwiftUI 诞生之初就存在了。它用起来非常直接，但也相当基础（或者说不够灵活）。要为 `List` 视图添加滑动删除功能，你只需要在\
    \ `List` 视图内的 `ForEach` 循环上应用 `onDelete` 修饰符即可。该修饰符需要一个带有一个参数的闭包，该参数包含一个 `IndexSet`，用于指示要删除哪些行。\n\
    \n以下代码片段展示了一个带有 `onDelete` 修饰符的简单 `List`。当用户滑动删除时，闭包会被调用，从而从支撑 `List` 视图的项目数组中移除相应的行：\n\
    \n```swift\nstruct SwipeToDeleteListView: View {\n    @State fileprivate var items\
    \ = [\n        Item(title: \"拼图\", iconName: \"puzzlepiece\", badge: \"不错！\"),\n\
    \        Item(title: \"手柄\", iconName: \"gamecontroller\", badge: \"咔哒响！\"),\n\
    \        Item(title: \"购物车\", iconName: \"cart\", badge: \"$$$\"),\n        Item(title:\
    \ \"礼物\", iconName: \"giftcard\", badge: \":-)\"),\n        Item(title: \"时钟\"\
    , iconName: \"clock\", badge: \"滴答\"),\n        Item(title: \"人群\", iconName:\
    \ \"person.2\", badge: \"2\"),\n        Item(title: \"T 恤\", iconName: \"tshirt\"\
    , badge: \"M\")\n    ]\n    var body: some View {\n        List {\n          \
    \  ForEach(items) { item in\n                Label(item.title, systemImage: item.iconName)\n\
    \            }\n            .onDelete { indexSet in\n                items.remove(atOffsets:\
    \ indexSet)\n            }\n        }\n    }\n}\n```\n\n实际上，`onDelete` 传递一个 `IndexSet`\
    \ 来指示哪些项目应被删除，这非常方便，因为 `Array` 提供了一个接收 `IndexSet` 的 `remove(atOffsets:)` 方法。\n\
    \n值得注意的是，你不能直接将 `onDelete` 应用于 `List`——你需要改用 `ForEach` 循环，并将其嵌套在 `List` 内部^(⁴⁸)。\n\
    \n# 使用编辑模式移动和删除项目\n\n对于某些应用来说，让用户通过拖动来重新排列列表中的项目是合理的。SwiftUI 让实现这一点变得极其简单——你只需在\
    \ `List` 上应用 `onMove` 视图修饰符，然后相应地更新底层数据结构即可。\n\n以下代码片段展示了如何为简单数组实现此功能：\n\n```swift\n\
    List {\n    ForEach(items) { item in\n        Label(item.title, systemImage: item.iconName)\n\
    \    }\n    .onDelete { indexSet in\n        items.remove(atOffsets: indexSet)\n\
    \    }\n    .onMove { indexSet, index in\n        items.move(fromOffsets: indexSet,\
    \ toOffset: index)\n    }\n}\n```\n\n这同样很简单，得益于 `Array.move`，它期望的参数与我们接收到的 `onDelete`\
    \ 闭包参数完全一致。\n\n要开启 `List` 的编辑模式，有两种选择：\n\n*   使用 `.editMode` 环境值\n*   使用 `EditButton`\
    \ 视图\n\n在底层，这两种方法都利用了 SwiftUI 的环境。以下代码片段演示了如何使用 `EditButton` 允许用户开启列表的编辑模式：\n\n\
    ```swift\nList {\n    ForEach(items) { item in\n        Label(item.title, systemImage:\
    \ item.iconName)\n    }\n    .onDelete { indexSet in\n        items.remove(atOffsets:\
    \ indexSet)\n    }\n    .onMove { indexSet, index in\n        items.move(fromOffsets:\
    \ indexSet, toOffset: index)\n    }\n}\n.toolbar {\n    EditButton()\n}\n```\n\
    \n# 滑动操作\n\n对于超出滑动删除和 `EditMode` 的功能，SwiftUI 现在支持滑动操作。这个新的 API 让我们对如何显示滑动操作有了很多控制：\n\
    \n*   我们可以为每行定义不同的滑动操作。\n*   我们可以为每个单独的操作指定文本、图标和色调颜色。\n*   我们可以在行的前缘和后缘添加操作。\n\
    *   我们可以启用或禁用行任一端第一个操作的完全滑动，允许用户通过将行完全滑动到相应边缘来触发该操作。\n\n## 基本滑动操作\n\n让我们看一个关于如何使用这个新\
    \ API 的简单示例。要为 `List` 行注册一个滑动操作，我们需要调用 `swipeActions` 视图修饰符。在此视图修饰符的闭包中，我们可以设置一个（或多个）`Button`\
    \ 来实现操作本身。\n\n以下代码演示了如何向 `List` 视图添加一个简单的滑动操作：\n\n```swift\nList(viewModel.items)\
    \ { item in\n    Text(item.title)\n        .fontWeight(item.isRead ? .regular\
    \ : .bold)\n        .swipeActions {\n            Button (action: { viewModel.markItemRead(item)\
    \ }) {\n                if let isRead = item.isRead, isRead == true {\n      \
    \              Label(\"已读\", systemImage: \"envelope.badge.fill\")\n         \
    \       }\n                else {\n                    Label(\"未读\", systemImage:\
    \ \"envelope.open.fill\")\n                }\n            }\n            .tint(.blue)\n\
    \        }\n}\n```\n\n值得注意的是，`swipeActions` 修饰符是在代表行的视图上调用的。在本例中，它是一个简单的 `Text`\
    \ 视图，但对于更复杂的列表，它也可能是一个 `HStack` 或 `VStack`。这与 `onDelete` 修饰符（需要应用于 `List` 视图内的\
    \ `ForEach` 循环）不同，它使我们能够根据不同的行灵活地应用不同的操作集。\n\n另请注意，每个滑动操作都由一个 `Button` 表示。如果你使用任何其他视图，SwiftUI\
    \ 将不会注册它，也不会显示任何操作。同样，如果你尝试将 `swipeActions` 修饰符应用于 `List` 或 `ForEach` 循环，该修饰符将被忽略。\n\
    \n## 指定边缘\n\n默认情况下，滑动操作将添加到行的后缘。这就是为什么在前面的例子中，*标记为已读/未读*操作被添加到了后缘。要将操作添加到前缘（就像\
    \ Apple 的邮件应用那样），我们只需要指定 `edge` 参数，如下所示：\n\n```swift\nList(viewModel.items) {\
    \ item in\n    Text(item.title)\n        .fontWeight(item.isRead ? .regular :\
    \ .bold)\n        .swipeActions(edge: .leading) {\n            Button (action:\
    \ { viewModel.markItemRead(item) }) {\n                if let isRead = item.isRead,\
    \ isRead == true {\n                    Label(\"已读\", systemImage: \"envelope.badge.fill\"\
    )\n                }\n                else {\n                    Label(\"未读\"\
    , systemImage: \"envelope.open.fill\")\n                }\n            }\n   \
    \         .tint(.blue)\n        }\n}\n```\n\n要在任一边缘添加操作，我们可以多次调用 `swipeActions`\
    \ 修饰符，指定要添加操作的边缘。\n\n如果你同时在前缘和后缘添加滑动操作，最好明确指定要在哪里添加操作。在以下代码片段中，我们向前缘添加了一个操作，向后缘添加了另一个操作：\n\
    \n```swift\nList(viewModel.items) { item in\n    Text(item.title)\n        .fontWeight(item.isRead\
    \ ? .regular : .bold)\n        .swipeActions(edge: .leading) {\n            Button\
    \ (action: { viewModel.markItemRead(item) }) {\n                if let isRead\
    \ = item.isRead, isRead == true {\n                    Label(\"已读\", systemImage:\
    \ \"envelope.badge.fill\")\n                }\n                else {\n      \
    \              Label(\"未读\", systemImage: \"envelope.open.fill\")\n          \
    \      }\n            }\n            .tint(.blue)\n        }\n        .swipeActions(edge:\
    \ .trailing) {\n            Button(role: .destructive, action: { viewModel.deleteItem(item)\
    \ } ) {\n                Label(\"删除\", systemImage: \"trash\")\n            }\n\
    \        }\n}\n```\n\n你可能注意到，我们在 `Button` 上使用了 `role` 参数来指示它是 `.destructive`——这指示\
    \ SwiftUI 为此按钮使用红色背景颜色。不过，我们仍然需要自己实现删除项目的逻辑。而且，由于 `Button` 的 `action` 闭包在当前行的作用域内，因此更容易直接访问当前列表的\
    \ `item`——这是此 API 设计相对于之前 `onDelete` 设计的另一个优势。\n\n## 滑动操作与 onDelete\n\n在阅读了前面的代码片段后，你可能想知道为什么我们不使用\
    \ `onDelete` 视图修饰符，而是自己实现删除操作。答案很简单：如文档所述，一旦你使用了 `swipeActions` 修饰符，SwiftUI 将停止合成删除功能。\n"
- fmt: "#### Adding More Swipe Actions\n\nTo add multiple swipe actions to either\
    \ edge, we can call the `swipeActions` modifier multiple times:\n\n```\nList(viewModel.items)\
    \ { item in\n    Text(item.title)\n        .fontWeight(item.isRead ? .regular\
    \ : .bold)\n        .swipeActions(edge: .leading) {\n            Button(action:\
    \ { viewModel.markItemRead(item) }) {\n                if let isRead = item.isRead,\
    \ isRead == true {\n                    Label(\"Read\", systemImage: \"envelope.badge.fill\"\
    )\n                } else {\n                    Label(\"Unread\", systemImage:\
    \ \"envelope.open.fill\")\n                }\n            }\n            .tint(.blue)\n\
    \        }\n        .swipeActions(edge: .trailing) {\n            Button(role:\
    \ .destructive, action: { viewModel.deleteItem(item) }) {\n                Label(\"\
    Delete\", systemImage: \"trash\")\n            }\n        }\n        .swipeActions(edge:\
    \ .trailing) {\n            Button(action: { selectedItem = item }) {\n      \
    \          Label(\"Tag\", systemImage: \"tag\")\n            }\n            .tint(Color(UIColor.systemOrange))\n\
    \        }\n}\n```\n\nIf this makes you feel uneasy, you can also add multiple\
    \ buttons to the same `swipeActions` modifier. The following code snippet results\
    \ in the same UI as the previous one:\n\n```\nList(viewModel.items) { item in\n\
    \    Text(item.title)\n        .fontWeight(item.isRead ? .regular : .bold)\n \
    \       .badge(item.badge)\n        .swipeActions(edge: .leading) {\n        \
    \    Button(action: { viewModel.markItemRead(item) }) {\n                if let\
    \ isRead = item.isRead, isRead == true {\n                    Label(\"Read\",\
    \ systemImage: \"envelope.badge.fill\")\n                } else {\n          \
    \          Label(\"Unread\", systemImage: \"envelope.open.fill\")\n          \
    \      }\n            }\n            .tint(.blue)\n        }\n        .swipeActions(edge:\
    \ .trailing) {\n            Button(role: .destructive, action: { viewModel.deleteItem(item)\
    \ }) {\n                Label(\"Delete\", systemImage: \"trash\")\n          \
    \  }\n            Button(action: { selectedItem = item }) {\n                Label(\"\
    Tag\", systemImage: \"tag\")\n            }\n            .tint(Color(UIColor.systemOrange))\n\
    \        }\n}\n```\n\nIf you add multiple swipe actions to the same edge, they\
    \ will be shown from the outside, that is, the first button will always appear\
    \ closest to the respective edge.\n\n> Please note that, although there doesn’t\
    \ seem to be any limit as to how many swipe actions you can add to either edge\
    \ of a row, the number of actions that a user can comfortably use depends on their\
    \ device. For example, a list row on an iPhone 13 in portrait orientation can\
    \ fit up to five swipe actions, but they completely fill up the entire row, which\
    \ not only looks strange but also leads to some issues when trying to tap the\
    \ right button. Smaller devices, like an iPhone 6 or even an iPhone 5, can fit\
    \ even fewer swipe actions. Three or four swipe actions seem to be a sensible\
    \ limit that should work on most devices.\n\n#### Full Swipe\n\nBy default, the\
    \ first action for any given swipe direction can be invoked by using a full swipe.\
    \ You can deactivate this behavior by setting the `allowsFullSwipe` parameter\
    \ to `false`:\n\n```\n.swipeActions(edge: .trailing, allowsFullSwipe: false) {\n\
    \    Button(role: .destructive, action: { viewModel.deleteItem(item) }) {\n  \
    \      Label(\"Delete\", systemImage: \"trash\")\n    }\n}\n```\n\n#### Styling\
    \ Your Swipe Actions\n\nAs mentioned before, setting the `role` of a swipe action's\
    \ `Button` to `.destructive` will automatically tint the button red. If you don't\
    \ specify a `role`, the `Button` will be tinted in light gray. You can specify\
    \ any other color by using the `tint` modifier on a swipe action's `Button`—like\
    \ so:\n\n```\n.swipeActions(edge: .trailing) {\n    Button(action: { selectedItem\
    \ = item }) {\n        Label(\"Tag\", systemImage: \"tag\")\n    }\n    .tint(Color(UIColor.systemOrange))\n\
    }\n```\n\nInside the `Button`, you can display both text labels and/or icons,\
    \ using `Image`, `Text`, or `Label`.\n\n## Managing Focus in Lists\n\nManaging\
    \ focus is an important aspect for almost any sort of UI—getting this right helps\
    \ your users to navigate your app faster and more efficiently. In desktop UIs,\
    \ we have come to expect being able to navigate through the input fields on a\
    \ form by pressing the Tab key, and on mobile it's no less important. In Apple's\
    \ Reminders app, for example, the cursor will automatically be placed in any new\
    \ reminder you create and will advance to the next row when you tap the Enter\
    \ key. This way, you can add new elements very efficiently.\n\nApple added support\
    \ for focus management to SwiftUI in iOS 15—this includes both setting and observing\
    \ focus.\n\nMost examples both in Apple's own documentation and on other people's\
    \ blogs and videos only discuss how to use this in simple forms, such as a login\
    \ form. Advanced use cases, such as managing focus in an editable list, aren't\
    \ covered.\n\nIn the following, I will show you how to manage focus state in an\
    \ app that allows users to edit elements in a list. As an example, I am going\
    \ to use Make It So, a to-do list app I am working on. Make It So is a replica\
    \ of Apple's Reminders app, and the idea is to figure out how close we can get\
    \ to the original using only SwiftUI and Firebase (for the backend services such\
    \ as storage)^([^(49)](#fn49)).\n\n### How to Manage Focus in SwiftUI\n\nAt WWDC\
    \ 2021, Apple introduced `@FocusState`, a property wrapper that can be used to\
    \ track and modify focus within a scene.\n\nYou can either use a `Bool` or an\
    \ `enum` to track which element of your UI is focused.\n\nThe following example\
    \ makes use of an `enum` with two cases to track focus for a simple user profile\
    \ form. As you can see in the `Button`'s closure, we can programmatically set\
    \ the focus, for example, if the user forgot to fill out a mandatory field.\n\n\
    ```\nenum FocusableField: Hashable {\n    case firstName\n    case lastName\n\
    }\n\nstruct FocusUsingEnumView: View {\n    @FocusState private var focus: FocusableField?\n\
    \    @State private var firstName = \"\"\n    @State private var lastName = \"\
    \"\n\n    var body: some View {\n        Form {\n            TextField(\"First\
    \ Name\", text: $firstName)\n                .focused($focus, equals: .firstName)\n\
    \            TextField(\"Last Name\", text: $lastName)\n                .focused($focus,\
    \ equals: .lastName)\n            Button(\"Save\") {\n                if firstName.isEmpty\
    \ {\n                    focus = .firstName\n                } else if lastName.isEmpty\
    \ {\n                    focus = .lastName\n                } else {\n       \
    \             focus = nil\n                }\n            }\n        }\n    }\n\
    }\n```\n\nThis approach works fine for simple input forms that have all but a\
    \ few input elements, but it's not feasible for `List` views or other dynamic\
    \ views that display an unbounded number of elements.\n\n### How to Manage Focus\
    \ in Lists\n\nTo manage focus in `List` views, we can make use of the fact that\
    \ Swift `enum`s support associated values. This allows us to define an `enum`\
    \ that can hold the `id` of a list element we want to focus:\n\n```\nenum Focusable:\
    \ Hashable {\n    case none\n    case row(id: String)\n}\n```\n\nWith this in\
    \ place, we can define a local variable `focusedReminder` that is of this type\
    \ and wrap it using `@FocusState`:\n\n```\nstruct Reminder: Identifiable {\n \
    \   var id: String = UUID().uuidString\n    var title: String\n}\n\nstruct FocusableListView:\
    \ View {\n    @State var reminders: [Reminder] = Reminder.samples\n    @FocusState\
    \ var focusedReminder: Focusable?\n\n    var body: some View {\n        List {\n\
    \            ForEach($reminders) { $reminder in\n                TextField(\"\"\
    , text: $reminder.title)\n                    .focused($focusedReminder, equals:\
    \ .row(id: reminder.id))\n            }\n        }\n        .toolbar {\n     \
    \       ToolbarItemGroup(placement: .bottomBar) {\n                Button(action:\
    \ { createNewReminder() }) {\n                    Text(\"New Reminder\")\n   \
    \             }\n            }\n        }\n    }\n    // ...\n}\n```\n\nWhen the\
    \ user taps the *New Reminder* toolbar button, we add a new `Reminder` to the\
    \ `reminders` array. To set the focus into the row for this newly created reminder,\
    \ all we need to do is create an instance of the `Focusable` enum using the new\
    \ reminder's `id` as the associated value, and assign it to the `focusedReminder`\
    \ property:\n\n```\nstruct FocusableListView: View {\n    // ...\n    func createNewReminder()\
    \ {\n        let newReminder = Reminder(title: \"\")\n        reminders.append(newReminder)\n\
    \        focusedReminder = .row(id: newReminder.id)\n    }\n}\n```"
