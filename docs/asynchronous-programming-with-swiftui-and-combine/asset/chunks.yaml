- fmt: '## Why a New UI Framework?


    Why implement a new UI toolkit, if there are already `UIKit` and `AppKit`, you
    might ask, and you’d be forgiven for doing so. After all, implementing a UI toolkit
    is no small feat, much less bringing it to production quality, shipping it, and
    asking an entire community of app developers to adopt it.


    Here are some of the driving factors that might have influenced Apple’s decision.


    First and foremost, we have to acknowledge that Apple positions `SwiftUI` as a
    cross-platform UI toolkit. The introduction on the `SwiftUI` landing page specifically
    mentions that "`SwiftUI` helps you build great looking apps across all Apple platforms
    with the power of `Swift` — and surprisingly little code. You can bring even better
    experiences to everyone, on any Apple device, using just one set of tools and
    APIs." Apple now has no less than five consumer-facing platforms (`iOS`, `iPadOS`,
    `watchOS`, `tvOS`, and `macOS`), and as anyone who has tried to ensure feature
    parity across platforms will be able to tell you, supporting more than just one
    platform is becoming increasingly burdensome for developers. By providing a unified
    way to reason about and build UIs for as many of these platforms as possible,
    Apple is relieving developers of this burden. It should be noted, however, that
    `SwiftUI` is not trying to fit a "write once, run everywhere" paradigm—on the
    contrary, it does have platform-specific parts. But it’s much easier to learn
    one UI toolkit and use it across all those platforms than having to learn a new
    paradigm for each individual platform.


    Secondly, `SwiftUI` aligns with Apple’s investment in helping developers to write
    better software and reduce the number of potential bugs in the apps on the App
    Store. Apps with fewer bugs tend to get better ratings on the App Store—and consequently
    return a higher revenue. The `Swift` language contains many features that make
    it easier to write bug-free software. Its language designers and compiler engineers
    have been working hard on eliminating potential causes for bugs, such as


    - Null dereferencing

    - Type mismatches

    - Incomplete decision trees

    - …and more


    `SwiftUI` has two major attributes that help increase software quality:


    1. It has built-in state management, an aspect of UI development that is notoriously
    challenging. `SwiftUI`’s state management makes it easier to build UIs that reflect
    the state of the app at all times—even across multiple screens.

    2. It is centered around a domain-specific language (`DSL`) that makes it easier
    to describe the UI, eliminating any issues that might be caused by incorrectly
    instantiating and structuring UIs, and making it easier to write and reason about
    UIs.


    And lastly, `SwiftUI` makes software development more approachable. It is not
    without reason that we’ve seen a lot more web developers and designers start building
    UIs in `SwiftUI`. Putting together a working prototype in `SwiftUI` has become
    increasingly feasible and has helped to improve the collaboration between UI designers
    and developers. Xcode’s preview canvas for `SwiftUI` has dramatically shortened
    turnaround times and provides developers and designers with instant feedback to
    the changes they make. This instant feedback has enabled more students and beginners
    to get started with app development and achieving results within minutes rather
    than hours or even days.


    ## SwiftUI Principles


    Before we take the first steps in `SwiftUI`, it is worth taking a look at some
    of its key properties.


    ### Declarative vs. Imperative


    Traditionally, there have been two main ways how developers build UIs:


    1. Using visual tools (such as Interface Builder) to lay out the UI elements,
    and then connecting their app’s code to the UI elements

    2. Programmatically laying out the UI elements


    In the past couple of years, there has been an increasing number of UI toolkits
    that follow a declarative approach to building UIs. These toolkits make use of
    so-called internal or external domain-specific languages (`DSL`s) to let developers
    specify the structure of the UI. Examples for such toolkits are `Angular`, `React`
    and `JetPack Compose`.


    In an imperative world, you need to implement everything yourself: layout, behavior,
    data binding. In contrast, a declarative approach allows you to simply tell the
    framework what to do, and it will take care of the specifics for you. It’s a bit
    like cooking a meal by yourself (imperative) or going to a restaurant, where you
    place your order and receive a nicely cooked meal in return (declarative).


    ### State Management


    Managing state is one of the major challenges when writing an application. It’s
    quite simple when your app only has one screen, but as the number of screens increases,
    so does the complexity of keeping all parts of the UI and the underlying data
    model in sync.


    It becomes even more of a challenge in apps that share data with a backend and
    synchronize data via the Internet. Not to mention the challenges you will face
    when writing a multiuser app that needs to ensure the data is up to date and in
    sync for all users who simultaneously work on the same piece of data (e.g., a
    shared document in `Google Docs`, or a task lists in a to-do list application).


    Probably all of us have used an app that, despite the fact you updated your address
    in a detail dialog, didn’t reflect that change of address in the shopping basket.
    Excruciating!


    Data binding is not an entirely new concept on Apple’s platforms—`Cocoa Bindings`
    on `macOS` has been around for a number of years now, providing developers with
    the basic tools to map data between UI elements and the underlying data model.
    Despite developers clamoring for a data-binding framework for `iOS`, Apple never
    provided one—so far. Left to their own devices, developers had to come up with
    their own, homegrown solutions, and it didn’t take long for the community to come
    up with `iOS`-specific implementations of functional reactive frameworks such
    as `RxSwift` or `ReactiveSwift`.


    With `SwiftUI`, Apple finally acknowledged the need for a native framework for
    keeping your data model and UI in sync. `SwiftUI` comes with a number of tools
    to help you build UIs that reflect the state of your model at all times, and keep
    in sync across your entire app.


    Most importantly, `SwiftUI` combines well with `Combine`, Apple’s own implementation
    of a reactive framework, making it possible to express the flow of data in your
    apps as a stream of events over time that are transformed by business rules and
    logic operators to meet the requirements of the app.


    ### Composition over Inheritance


    In contrast to `UIKit` and many other UI frameworks, `SwiftUI` encourages developers
    to compose their UIs by piecing together many small UI components. Developers
    who come to `SwiftUI` from `UIKit` will find this rather surprising, as they’ve
    learned to minimize the number of UI elements—in particular in scrolling views
    such as `UITableView` or `UICollectionView` to optimize their app’s performance.


    The reason for this is that `SwiftUI` is a `DSL` that describes the look of a
    UI, rather than prescribing the UI primitives it is made up of. The `SwiftUI`
    team has encouraged developers to make liberal use of views to compose their UIs
    right from the onset—in their first-ever public presentation of `SwiftUI` on the
    `WWDC 2019` stage, Jacob Xiao, SwiftUI Engineer, says "and with SwiftUI, views
    are really lightweight so you don’t have to worry about creating extra views to
    better encapsulate or separate your logic."'
