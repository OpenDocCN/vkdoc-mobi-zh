    ## Using the Preview to Make Sure Our View Works As Intended


    Until now, the preview window showed the view inside a device frame, which makes
    it hard to tell how much space it takes up. As the preview canvas is just a SwiftUI
    view, we can easily fix that.


    - In the code editor, select the `ContentView()` line in the preview provider
    (line 31)

    - In the Attribute Inspector, find the *Layout* attribute in the *Preview* section
    and set it to *Size that fits*


    The device frame will disappear, and the preview will now allocate the exact space
    required for the view. You’ll notice that the view actually consumes less space
    than we intended:


    ![A screenshot has text that reads, Asynchronous Programming with Swift U I and
    Combine, by Peter Friese, 451 pages. A cover of the book is given on the left.](images/509862_1_En_2_Chapter/509862_1_En_2_Fig9_HTML.png)


    **Figure 2-9** — Preview of the book details view being too narrow


    To fix this, we need to insert a `Spacer` view at the right of the view. This
    is a transparent view that expands to consume as much space as possible in the
    layout orientation of the surrounding container. You can think of it as a spring
    that pushes your view apart.


    - The easiest way to add a spacer to our layout is to use the code editor and
    add `Spacer()` after the closing brace of the `VStack` containing the `Text` views.


    The code should now look like this:


    ```swift

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    HStack(alignment: .top) {

    Image("9781484285718-M")

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text("Asynchronous Programming with SwiftUI and Combine")

    .font(.headline)

    Text("by Peter Friese")

    .font(.subheadline)

    Text("451 pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    .previewLayout(.sizeThatFits)

    }

    }

    ```


    In the preview, we can see the view now takes up the entire width of the `device`^([(22)](#fn22)).


    ![A screenshot has text that reads, Asynchronous Programming with Swift U I and
    Combine, by Peter Friese, 451 pages. A cover of the book is given on the left.](images/509862_1_En_2_Chapter/509862_1_En_2_Fig10_HTML.png)


    **Figure 2-10** — Preview of the book details view with the correct width


    ## Displaying a List of Books


    Now that we’ve got a view for displaying book details, let’s turn this into a
    list of books. As you will see in a moment, this turns out to be surprisingly
    simple, and Xcode facilitates the process of doing so.


    - In the code editor, *CMD+Click* the outer `HStack` of the book view.

    - Select *Embed in List* from the pop-up menu.


    Xcode wraps the view inside a list that iterates over a half open range from 0
    to 5 (excluding), which results in five instances of the book view displayed in
    a vertically scrolling list. In a moment, we will connect the `List` view to our
    array of sample books to display something more meaningful than the same book
    repeated over and over again.


    But before we do that, I’d like to draw your attention to the layout of the text
    views. As you can see, the book title is no longer top-aligned with the book cover.
    Looking at the source code, you might notice that the `HStack` that surrounded
    the `Image` view and the `VStack` disappeared when we asked Xcode to wrap the
    `HStack` in a `List`. While you might argue that this is a bug in Xcode’s editor,
    this is actually by design, as a `List` view contains an implicit `HStack`. However,
    as there is no way we can modify this implicit `HStack`, we’ll have to manually
    reinsert the same `HStack` we used before.


    ![A mobile screen displays the details of a book, its author, and the cover as
    Swift U I and Combine, by Peter Friese, 367 pages. It is repeated 3 times below
    it.](images/509862_1_En_2_Chapter/509862_1_En_2_Fig11_HTML.png)


    **Figure 2-11** — Broken layout after wrapping the view inside a List


    There are three ways to fix this:


    1.  Wrap the original `HStack(alignment: .top)` in another `HStack` **before**
    wrapping the additional `HStack` in a `List` view.

    2.  Manually wrap the inner views of the book view in `HStack(alignment: .top)
    { ... }`.

    3.  Instead of making use of Xcode’s help, wrap the book view in a `List` view
    manually.


    Which one you choose is largely a matter of personal preference, and you’ll quickly
    become well versed in choosing the most efficient way to building your UIs with
    SwiftUI once you become more familiar with the API and Xcode’s quirks.


    For now, let’s manually insert `HStack(alignment: .top) {` right after the `List`
    view, as well as a closing `}` in the line after the `Spacer()`.


    Let’s also append `.listStyle(.plain)` to the closing curly brace of the `List`
    view to display the list as a plain list view.


    Your code should now look like this:^([(23)](#fn23))


    ```swift

    struct ContentView: View {

    var body: some View {

    List(0 ..< 5) { item in

    HStack(alignment: .top) {

    Image("9781484285718-M")

    .resizable()

    .aspectRatio(contentMode: .fit)

    .frame(height: 90)

    VStack(alignment: .leading) {

    Text("Asynchronous Programming with SwiftUI and Combine")

    .font(.headline)

    Text("by Peter Friese")

    .font(.subheadline)

    Text("367 pages")

    .font(.subheadline)

    }

    Spacer()

    }

    }

    .listStyle(.plain)

    }

    }

    ```'
