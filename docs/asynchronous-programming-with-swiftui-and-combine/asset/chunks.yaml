    # 什么是函数式响应式编程？


    计算机中发生的所有事情都可以被视为事件——用户点击按钮、时间流逝、API 请求返回某个值、网络请求失败。大多数事件以异步方式发生，这使得处理它们变得具有挑战性。


    处理异步行为有几种方法。作为 iOS 开发者，我们非常熟悉使用委托和回调，但它们有几个缺点，会导致代码分散各处且难以推理。


    响应式编程是处理这种情况的另一种方法。响应式编程的基本思想是：一切都是事件，并且这些事件是异步发生的。事件由事件源发送，感兴趣的一方可以注册以接收特定事件。通常情况下，这些事件流需要进行转换，使其对相应的订阅者更有用。


    响应式编程有众多实现。最著名的可能是 Reactive Extensions（ReactiveX^(⁵²)），“一个用于异步编程的、带有可观察流的 API”。ReactiveX
    的优美之处在于它适用于多种平台和语言：Java、^(⁵³) JavaScript、^(⁵⁴) C#、^(⁵⁵) Kotlin、^(⁵⁶) Swift、^(⁵⁷)
    等等。^(⁵⁸)


    Apple 在 WWDC 2019 上推出了 Combine 作为他们对响应式编程的实现，它与`RxSwift`非常相似。使用 Combine 而非`RxSwift`的主要原因是它与
    Apple 平台的集成更深。它与`SwiftUI`配合得特别好，因此如果您以 iOS 13 或更高版本为目标（这是 Combine 和 SwiftUI 的最低目标平台），您应该仔细看看。


    > Combine 是一个统一的、声明式的 API，用于处理随时间变化的值。


    Combine 定义了三个主要概念来实现响应式编程的思想：


    1. 发布者

    2. 订阅者

    3. 操作符


    **发布者**随时间传递值，**订阅者**在接收这些值时对其执行操作。**操作符**位于发布者和订阅者之间，可用于操纵值流。


    让我们仔细看看。


    # 发布者


    顾名思义，发布者随时间发出值。为了指示错误条件，发布者也可能发布错误。每个发布者定义它发布哪些类型的值和错误（如果有的话）。


    最基本的发布者是`Just`——它只发出一个值并且永远不会失败：


    ```

    Just(42)

    ```


    ![](img/509862_1_En_7_Fig1_HTML.jpg)


    一条线段，左侧圆圈内标有数字 42。右侧表格中的数据为输出类型 int，失败类型 never。


    **图 7-1** 发出单个值的发布者


    发送单个值在许多情况下确实很有用，但大多数时候我们需要发送多个值。Combine 使得几乎任何东西都可以转变为发布者。例如，下面是如何将十个最受欢迎^(⁵⁹)
    的披萨配料^(⁶⁰) 数组转变为发布者：


    ```

    ["意大利辣香肠", "蘑菇", "洋葱", "香肠", "培根", "额外奶酪", "黑橄榄", "青椒"].publisher

    ```


    ![](img/509862_1_En_7_Fig2_HTML.jpg)


    一条线段，三个块上分别标有意大利辣香肠、蘑菇、洋葱。右侧表格中的数据为输出类型 string，失败类型 never。


    **图 7-2** 发出一些披萨配料后终止的发布者


    使用简单的值或序列作为发布者可能看起来有点乏味，但当我们需要从多个 Combine 发布者组合管道时，这无疑会派上用场。


    是时候让它更有趣一点了！


    假设我们正在构建一个披萨订购应用。以下是一些创建订单并设置发布者的代码。这个特定的发布者会在`NotificationCenter`向`pizzaOrder`对象发送名为`.didUpdateOrderStatus`的通知时发出事件。


    ```

    // 创建订单

    let pizzaOrder = Order()

    let pizzaOrderPublisher = NotificationCenter

    .default

    .publisher(for: .didUpdateOrderStatus, object: pizzaOrder)

    ```


    当用户想要下订单时，应用的另一部分将使用`NotificationCenter`发送此通知。这可能在用户点击“下订单”按钮时被调用。


    ```

    // 一旦用户准备好下订单

    NotificationCenter

    .default

    .post(name: .didUpdateOrderStatus,

    object: pizzaOrderPublisher,

    userInfo: ["status": OrderStatus.processing])

    ```


    如果您运行这段代码，什么也不会发生——这是因为发布者只有在订阅者注册到发布者后才会开始发出事件。那么现在让我们看看订阅者。


    # 订阅者


    订阅者从其订阅的上游发布者接收值。每个订阅者定义它愿意接收哪些类型的值和错误。


    Combine 框架提供了两个极其通用的主要订阅者——`sink`和`assign`。


    * `sink`是最通用的一个；您可以使用它来接收来自 Combine 发布者的值，然后在其闭包内执行您想要的任何代码。

    * `assign`允许您将任何接收到的值分配给一个属性或另一个`Publisher`。


    在前面的示例中，发布者并没有真正做任何事情。让我们使用`sink`来订阅最受欢迎披萨配料的列表，并将发出的值打印到控制台。


    ```

    ["意大利辣香肠", "蘑菇", "洋葱", "意大利腊肠", "培根", "额外奶酪", "黑橄榄", "青椒"]

    .publisher

    .sink { topping in

    print("\(topping) 是一种受欢迎的披萨配料")

    }

    ```


    您会注意到我擅自将*香肠*替换为*意大利腊肠*……


    回到我们的披萨订购示例，下面是如何订阅`pizzaOrderPublisher`并打印任何订单状态更新：


    ```

    // 创建订单

    let pizzaOrder = Order()

    let pizzaOrderPublisher = NotificationCenter

    .default.publisher(for: .didUpdateOrderStatus, object: pizzaOrder)

    pizzaOrderPublisher.sink { notification in

    print(notification)

    }

    // 一旦用户准备好下订单

    NotificationCenter

    .default

    .post(name: .didUpdateOrderStatus,

    object: pizzaOrder,

    userInfo: ["status": OrderStatus.processing])

    ```


    将值打印到控制台固然不错，但让我们更进一步，将订单状态分配给订单。为此，我们将使用`assign`订阅者。^(⁶¹)


    第一次尝试将订单状态分配给披萨订单上的状态字段可能如下所示：


    ```

    pizzaOrderPublisher

    .assign(to: \.status, on: pizzaOrder)

    ```


    然而，这段代码无法编译。相反，编译器会报错：`Key path value type ''OrderStatus'' cannot be converted
    to contextual type ''NotificationCenter.Publisher.Output'' (aka ''Notification'')`


    ![](img/509862_1_En_7_Fig3_HTML.png)


    输出屏幕显示 3 行代码和一个通知框，框内文字：键路径值类型 OrderStatus 无法转换为上下文类型 NotificationCenter.Publisher.Output。


    **图 7-3** `pizzaOrderPublisher`发出`Notification`，但期望的是`OrderStatus`


    这是因为`pizzaOrderPublisher`发出的是`Notification`值，但状态属性的类型是`OrderStatus`。我们总得想办法从`Notification`的`UserInfo`字典中提取出`OrderStatus`。


    为了转换来自上游发布者的值，Combine 提供了一个名为**操作符**的概念。

    '
- fmt: '# Operators


    Often, you will need to modify the values before they can be used by the subscriber.
    These can be simple transformations, such as extracting a specific property from
    a more complex value, or filtering elements, so the subscriber only receives elements
    that meet a certain condition. Combine has a wide range of operators that can
    be combined (excuse the pun) to form powerful pipelines.


    The names of many of the operators will sound familiar to you, as the Combine
    team decided to name them after existing operations in other parts of the Swift
    Standard Library.


    One such operator is `map`—you might have already used its namesake sibling^([^(62)](#fn62))
    to transform elements of an array or some other sequence. Similarly, in Combine,
    `map` is used to transform elements^([^(63)](#fn63)) from upstream publishers.


    In our example, we can use `map` to transform the `Notifications` we receive to
    the `OrderStatus` values we want to assign to the `status` property:


    ```

    pizzaOrderPublisher

    .map { notification in

    notification.userInfo?["status"] as? OrderStatus ?? OrderStatus.placing

    }

    .assign(to: \.status, on: pizzaOrder)

    ```


    Inside the `map` closure, we extract the `OrderStatus` enum from the `UserInfo`
    dictionary of the notification. Since this is optional and might be `nil`, we
    need to perform this rather clumsy-looking check and return a default value in
    case there is no `status`.


    Fortunately, Combine has an operator that allows us to handle situations like
    these much more elegantly and safer: `.compactMap`. `CompactMap` *calls a closure
    with each received element and publishes any returned optional that has a value*
    (Apple docs^([^(64)](#fn64))). This means two things:


    1.  All `nil` values will be removed from the result.

    2.  The result will no longer be optional.


    ```

    pizzaOrderPublisher

    .compactMap { notification in

    notification.userInfo?["status"] as? OrderStatus

    }

    .assign(to: \.status, on: pizzaOrder)

    ```


    The resulting code is much more concise and … compact^([^(65)](#fn65)).


    ## Composing Operators


    Let’s take a closer look at operators to better understand how they work. Operators
    are so special because they can subscribe to a publisher and act as a publisher
    at the same time. For example, here is the simplified declaration of `CompactMap`,
    and the extension to the `Publisher` protocol that enables us to compose Combine
    pipelines using a fluent syntax:^([^(66)](#fn66))


    ```

    extension Publishers {

    public struct CompactMap : Publisher where Upstream : Publisher {

    public typealias Failure = Upstream.Failure

    public let upstream: Upstream

    public let transform: (Upstream.Output) -> Output?

    }

    }

    extension Publisher {

    public func compactMap(_ transform: @escaping (Self.Output) -> T?) -> Publishers.CompactMap

    }

    ```


    And since all operators follow this pattern, this means we can chain several operators
    to create more powerful pipelines.


    To show this in action, let’s create a new publisher for our pizza delivery service.
    This time, we want to implement adding new toppings to an existing order.


    Let’s start with a plain Margherita:


    ```

    let margheritaOrder = Order(toppings: [

    Topping("tomatoes", isVegan: true),

    Topping("vegan mozarella", isVegan: true),

    Topping("basil", isVegan: true)

    ])

    ```


    Now, let’s create a publisher on `NotificationCenter` that publishes all `Notifications`
    that contain a message named `.addTopping`:


    ```

    let extraToppingPublisher = NotificationCenter

    .default

    .publisher(for: .addTopping,

    object: margheritaOrder)

    extraToppingPublisher

    .compactMap { notification in

    notification.userInfo?["extra"] as? Topping

    }

    .sink { value in

    if margheritaOrder.toppings != nil {

    margheritaOrder.toppings!.append(value)

    print("Adding \(value.name)")

    print("Your order now contains \(margheritaOrder.toppings!.count) toppings")

    }

    }

    // send some notifications to add extra toppings

    NotificationCenter

    .default

    .post(name: .addTopping,

    object: margheritaOrder,

    userInfo: ["extra": Topping("salami", isVegan: false)])

    NotificationCenter

    .default

    .post(name: .addTopping,

    object: margheritaOrder,

    userInfo: ["extra": Topping("olives", isVegan: true)])

    NotificationCenter

    .default

    .post(name: .addTopping,

    object: margheritaOrder,

    userInfo: ["extra": Topping("pepperoni", isVegan: true)])

    NotificationCenter

    .default

    .post(name: .addTopping,

    object: margheritaOrder,

    userInfo: ["extra": Topping("capers", isVegan: true)])

    ```


    Just like in our previous example, we use `.compactMap` to extract the `Topping`.
    Eventually, we use a `sink` subscriber to receive the topping and add it to the
    order.


    So far, this is pretty similar to what we’ve done before. But recently, the owners
    of the delivery service decided to go vegan. So let’s update our pipeline to make
    sure we only accept vegan toppings. We can do so by inserting the `filter` operator
    into our pipeline:


    ```

    let extraToppingPublisher = NotificationCenter

    .default

    .publisher(for: .addTopping,

    object: margheritaOrder)

    extraToppingPublisher

    .compactMap { notification in

    notification.userInfo?["extra"] as? Topping

    }

    .filter{ topping in

    return topping.isVegan

    }

    .sink { value in

    if margheritaOrder.toppings != nil {

    margheritaOrder.toppings!.append(value)

    print("Adding \(value.name)")

    print("Your order now contains \(margheritaOrder.toppings!.count) toppings")

    }

    }

    // send some notifications to add extra toppings

    NotificationCenter

    .default

    .post(name: .addTopping,

    object: margheritaOrder,

    userInfo: ["extra": Topping("salami", isVegan: false)])

    NotificationCenter

    .default

    .post(name: .addTopping,

    object: margheritaOrder,

    userInfo: ["extra": Topping("extra cheese", isVegan: true)])

    ```


    And thanks to implicit parameters and implicit returns, we can simplify this even
    further:


    ```

    extraToppingPublisher

    .compactMap { notification in

    // ...

    }

    .filter { $0.isVegan }

    .sink { value in

    // ...

    }

    ```


    How about making sure people can only add three *extra* toppings? That’s easy
    enough by using the `.prefix` operator—this operator only publishes up to a certain
    number of values:


    ```

    extraToppingPublisher

    .compactMap { notification in

    // ...

    }

    .filter { $0.isVegan }

    .prefix(3)

    .sink { value in

    // ...

    }

    ```


    And of course, it’d be a good idea to make sure to only accept changes to the
    list of toppings as long as the pizza isn’t in the oven (or out for delivery)
    yet:


    ```

    extraToppingPublisher

    .compactMap { notification in

    // ...

    }

    .filter { $0.isVegan }

    .prefix(3)

    .prefix(while: { topping in

    margheritaOrder.status == .placing

    })

    .sink { value in

    // ...

    }

    ```'
