    More List Styles


    ![](images/509862_1_En_5_Chapter/509862_1_En_5_Fig5_HTML.png)


    Three illustrations of mobile phone screens with the text, a, lifestyle dot automatic-list
    the 10 fruits, b, lifestyle dot sidebar-list the vegetables and fruits hidden
    under the sidebar, and c, lifestyle dot plain with fruits. Labels are dot automatic,
    dot sidebar, and dot plain.


