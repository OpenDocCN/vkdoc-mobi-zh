    \ their own apps.\n\nTo enable developers to make use of the new features, Apple\
    \ provides new APIs, SDKs to use them, and often new tooling, such as Xcode.\n\
    \nWhile all those new features Apple has launched at WWDC throughout the years\
    \ have been exciting and often breathtaking, sometimes they ship an update of\
    \ extraordinary significance.\n\n> *Every once in a while, a revolutionary product\
    \ comes along that changes everything.*\n> \n> *—Steve Jobs, 2007*\n\nObviously,\
    \ the unveiling of the original iPhone in 2007 was such a moment.\n\nThe release\
    \ of the Swift programming language in 2014 was another moment of significance.\
    \ Swift made software development much easier and a lot more approachable for\
    \ developers who might have been scared away by Objective-C and its rather special\
    \ syntax and Smalltalk-esque call semantics. It’s no exaggeration to say that\
    \ Swift and Swift Playgrounds brought more developers to Apple’s platforms than\
    \ ever before. Swift Playgrounds—an interactive programming environment geared\
    \ toward explorative and playful interaction with Swift—has positioned Swift as\
    \ a great language for anyone who is looking for a low-barrier way to explore\
    \ and learn programming. Swift and Swift Playgrounds have democratized software\
    \ development. And the results of this bold move are visible each year at WWDC,\
    \ when Tim Cook takes the stage to announce how many apps are on the App Store\
    \ and which percentage of those use Swift. At WWDC 2021, Susan Prescott (VP of\
    \ Developer Relations) unveiled that “the majority of the top 1000 apps on the\
    \ App Store are built using Swift.”^([⁵](#fn5))\n\nThe release of SwiftUI in 2019\
    \ was another such moment. When Josh Shaffer stepped out onto the stage to announce\
    \ SwiftUI,^([⁶](#fn6)) people were stunned by its ease of use and the speed at\
    \ which it was possible to build UIs from scratch. But also, and maybe even more\
    \ importantly, people were thrilled by the fact that SwiftUI included a native\
    \ way to manage application state—something notoriously complicated. Apple even\
    \ went so far as to implement their own version of RxSwift: Combine—a functional\
    \ reactive framework centered around the idea that applications can be seen as\
    \ a piece of software that transforms events over time.\n\nTo better understand\
    \ what all of this means and why exactly Apple chose to implement a new UI toolkit,\
    \ let’s dive a little deeper."
  trans: '

    *   第 15 章 介绍了如何将 Swift 的新并发 API 与 SwiftUI 结合使用，特别涵盖了为此任务新增的自定义视图修饰符（例如 `task`、`refreshable`
    和 `searchable`）。^(³)

    *   当 Apple 发布 Swift 新的结构化并发模型时，人们对于是应该继续在应用中使用 Combine，还是转而使用 async/await 感到困惑。第
    16 章 重点讨论了这个问题，并就何时使用哪种技术提供了一些指导（剧透：这取决于你的具体用例）。


    ## 关于代码


    本书的代码可在其 GitHub 仓库中找到，地址为 [`https://github.com/peterfriese/Asynchronous-Programming-with-SwiftUI-and-Combine`](https://github.com/peterfriese/Asynchronous-Programming-with-SwiftUI-and-Combine)。


    所有示例项目均可使用最新稳定版本的 Xcode（撰写本文时为 Xcode 14 版本）进行编译，并在最新发布的 iOS 版本（撰写本文时为 iOS 16）上运行。


    我们已尽力确保示例代码能与最新版本的 Xcode 和 iOS 完美编译。如果您遇到任何问题或发现任何错误，请在本书仓库的问题追踪器^(⁴) 中提交问题：


    *   对于本书本身的任何拼写错误或内容错误，请使用 *typos* 问题模板。

    *   对于代码的任何问题，请使用 *code* 问题模板。


    我们也非常欢迎您发送 PR 来修复代码中的任何问题。如果您这样做了，我将确保在本书的未来任何版本中提及您。


    关于作者脚注 1 2 3 4


    # 第一部分


    # 1. SwiftUI：新的开端


    每年在全球开发者大会 (WWDC) 上，Apple 都会为其平台和操作系统推出新功能和新特性。这场盛会备受期待，因为这意味着开发者们终于能够亲身体验 Apple
    工程师在过去一年里一直致力于开发的新 API 和框架，并将它们整合到自己的应用中。


    为了让开发者能够利用这些新功能，Apple 提供了新的 API、用于使用它们的 SDK，以及通常是新的工具，例如 Xcode。


    虽然 Apple 多年来在 WWDC 上推出的所有这些新功能都令人兴奋、有时甚至令人叹为观止，但有时他们也会发布具有非凡重要性的更新。


    > 每隔一段时间，就会有一款革命性的产品出现，改变一切。

    >

    > —史蒂夫·乔布斯，2007 年


    显然，2007 年第一代 iPhone 的发布就是这样一个时刻。


    2014 年 Swift 编程语言的发布是另一个重要时刻。Swift 使软件开发变得比以往任何时候都更加容易和易于上手，对于可能被 Objective-C
    及其相当特殊的语法和类似 Smalltalk 的调用语义所吓跑的开发者来说尤其如此。可以毫不夸张地说，Swift 和 Swift Playgrounds 为
    Apple 平台带来的开发者数量比以往任何时期都多。Swift Playgrounds——一个旨在探索性和趣味性地与 Swift 互动的交互式编程环境——使
    Swift 成为任何希望以低门槛探索和学习编程的人的绝佳语言。Swift 和 Swift Playgrounds 让软件开发变得大众化。这一大胆举措的成果每年在
    WWDC 上都清晰可见，当 Tim Cook 登台宣布 App Store 上有多少应用以及其中使用 Swift 的百分比时。在 WWDC 2021 上，Susan
    Prescott（开发者关系副总裁）透露，“App Store 上排名前 1000 的应用中，大多数都是使用 Swift 构建的。”^(⁵)


    2019 年 SwiftUI 的发布是又一个这样的时刻。当 Josh Shaffer 走上舞台宣布 SwiftUI 时，^(⁶) 人们为其易用性以及从零开始构建
    UI 的速度之快感到震惊。但同样，可能更重要的是，人们对 SwiftUI 包含了一种管理应用程序状态的原生方式感到兴奋——这通常是出了名的复杂。Apple
    甚至更进一步，实现了他们自己版本的 RxSwift：Combine——一个以“应用程序可被视为随时间转换事件的软件”这一思想为核心的功能响应式框架。


    为了更好地理解这一切意味着什么，以及为什么 Apple 选择实现一个新的 UI 工具包，让我们深入探讨一下。

