  trans: '

    # 处理多线程


    在构建访问网络的 Combine 管道时，你可能会在 Xcode 的控制台输出中看到类似如下的错误信息：


    ```

    [SwiftUI] 不允许从后台线程发布更改；请确保在主线程上（通过诸如 receive(on:) 之类的操作符）发布模型更新。

    ```


    有时候，^(⁷⁴) Xcode 会在代码编辑器中显示紫色警告，从而更容易定位有问题的代码段。


    出现此错误信息的原因是 `URLSession` 会在后台线程执行网络请求。当请求完成后，`dataTaskPublisher` 会将包含请求结果的事件发送到管道中。我们的代码会获取此结果，将其映射到
    UI 所需的数据类型，并赋值给视图模型的某个已发布属性。这反过来会提示 SwiftUI 用属性的新值更新 UI。


    所有这些操作都发生在同一个线程——一个后台线程上。然而，不推荐从后台线程访问 UI，这就是 SwiftUI 发出警告的原因。


    要防止这种情况发生，我们需要指示 Combine 在收到网络请求结果后切换到前台线程。为了告诉 Combine 在特定线程上接收事件，我们可以使用 `receive(on:)`
    操作符：


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    .receive(on: DispatchQueue.main)

    .eraseToAnyPublisher()

    }()

    ```


    我们将在关于 Combine 调度器的章节中深入探讨线程问题，但目前，这行代码可以解决我们的线程问题。


    # 优化网络访问


    由于大多数地方都提供了高速、低延迟的互联网，我们很容易忘记并非所有用户在使用我们的应用时都处于快速、低延迟的网络连接中。即使在汉堡或伦敦这样的城市，你也会发现一些网络信号不佳或完全没有连接的区域。


    在构建访问互联网的应用时，我们应该注意到这一点，并确保不浪费带宽。


    当运行应用并检查测试服务器的日志时，你会看到，每输入一个字符，`isUserNameAvailable` 端点就被调用多次。这显然不理想：不仅浪费了我们服务器上的
    CPU 周期（如果你使用的是按调用次数或 CPU 运行时间收费的云服务提供商，这可能成为一个问题），还意味着我们为应用增加了额外的网络开销。


    当你在本地运行测试服务器时可能几乎注意不到这一点，但当你通过 Edge 连接与远程服务器实例通信时，就一定会察觉。


    如果你的 API 端点不是**幂等**的，问题就会变得更糟：想象一下调用一个用于预订座位或购买音乐会门票的 API 端点。发送两个（或更多）请求而不是一个，会导致你预订了超出需求的座位，或者购买了超出想要的音乐会门票。


    ## 查找根本原因


    首先，我们需要找出是什么导致了所有这些额外的请求。


    了解 Combine 管道中发生了什么的一个简单方法是添加一些调试代码。让我们在管道中添加 `print()` 操作符：


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .print("username")

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    .receive(on: DispatchQueue.main)

    .eraseToAnyPublisher()

    }()

    ```


    此操作符会将一些有用的信息记录到控制台：


    1. 管道的任何生命周期事件（例如，添加订阅）

    2. 任何发送/接收的值


    我们可以指定一个前缀（`"username"`）来使日志语句在控制台中更加突出。


    重新运行应用后，我们立即看到以下输出——即使在文本字段中未输入任何内容：


    ```

    username: receive subscription: (PublishedSubject)

    username: request unlimited

    username: receive value: ()

    username: receive subscription: (PublishedSubject)

    username: request unlimited

    username: receive value: ()

    ```


    这表明我们的发布者有两个订阅者！


    查看我们的代码，可以在视图模型的初始化器中找到这些订阅者：


    ```

    init() {

    isUsernameAvailablePublisher

    .assign(to: &$isValid)

    isUsernameAvailablePublisher

    .map {

    $0 ? ""

    : "用户名不可用。请尝试其他用户名。"

    }

    .assign(to: &$usernameMessage)

    }

    ```


    第一个订阅者是用于填充 `isValid` 属性的管道，我们最终用它来启用/禁用注册表单上的提交按钮。


    第二个订阅者是当所选用户名不可用时生成错误消息的管道。此管道的结果也会显示在注册表单上。


    每当用户输入一个字符时，`isUsernameAvailablePublisher` 管道都需要处理 `username` 字段的当前值，以便最终将结果赋值给订阅者。


    对于本地运行的管道来说，这没什么大不了的（尽管我们应该尽量减少 CPU 周期的浪费），但对于像我们这样访问网络的管道来说，这就成为了一个更大的问题。


    现在我们已经确定了导致发布者有多个订阅的原因，让我们看看如何解决这个问题。

    '
- fmt: '### Using the `share` Operator to Share a Publisher


    Having multiple subscribers for a single publisher is a common pattern, especially
    in UIs, where a single UI element might have an impact on multiple other views.


    If you need to share the results of a publisher with multiple subscribers, you
    can use the `share()` operator. According to Apple''s documentation:


    > The publisher returned by this operator supports multiple subscribers, all of
    whom receive unchanged elements and completion states from the upstream publisher.


    This is exactly what we need. By applying the `share` operator to the end of the
    pipeline in `isUsernameAvailablePublisher`, we share the result of the pipeline
    for each event (i.e., each character the user enters in the username input field)
    with all subscribers of the publisher:


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .print("username")

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    .receive(on: DispatchQueue.main)

    .share()

    .eraseToAnyPublisher()

    }()

    ```


    When running the updated code, we can see that the `$username` publisher no longer
    has two subscribers, but instead just one:


    ```

    username: receive subscription: (PublishedSubject)

    username: request unlimited

    username: receive value: ()

    ```


    Now, you might be wondering why it''s only one subscriber, since we clearly still
    have two published properties (`isValid` and `usernameMessage`) subscribed to
    the pipeline.


    Well, the answer is simple: the `share` operator ultimately is this one subscriber,
    and it in turn is being subscribed to by `isValid` and `isUsernameAvailablePublisher`.
    To prove this, let''s add another `print()` operator to the pipeline:


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .print("username")

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    .receive(on: DispatchQueue.main)

    .share()

    .print("share")

    .eraseToAnyPublisher()

    }()

    ```


    In the resulting output, we can see that `share` receives two subscriptions (1,
    2) and `username` just one (3):


    ```

    share: receive subscription: (Multicast)           // (1)

    share: request unlimited

    username: receive subscription: (PublishedSubject) // (3)

    username: request unlimited

    username: receive value: ()

    share: receive subscription: (Multicast)           // (2)

    share: request unlimited

    share: receive value: (true)

    share: receive value: (true)

    ```


    You can think of `share()` as a fork that receives events from its upstream publisher
    and multicasts them to all of its subscribers.


    **Is it a bug or a feature?**


    *Go ahead and type a few characters into the username field, and you will find
    that for every character you type, you will still see two requests being made
    to the server.*


    *This might be an issue in iOS 15—I debugged into this a bit, and it seems like
    `TextField` emits every keystroke twice. In prior versions of iOS, this wasn''t
    the case, and I am inclined to think this is a bug in iOS 15, so I created a sample
    project to reproduce this issue (see AppleFeedback/FB9826727 at main · peterfriese/AppleFeedback
    (*[https://github.com/peterfriese/AppleFeedback/tree/main/FB9826727](https://github.com/peterfriese/AppleFeedback/tree/main/FB9826727)*)),
    and filed a Feedback (FB9826727) with Apple.*


    *If you agree with me that this is a regression, consider filing a feedback as
    well—the more duplicates a bug receives, the more likely it will be addressed.*


    ### Using `debounce` to Further Optimize the UX


    When building UIs that communicate with a remote system, we need to keep in mind
    that the user usually types a lot faster than the system can deliver feedback.


    For example, when picking a username, I usually type my favorite username without
    stopping to type in the middle of the word. I don''t care if the first few letters
    of this username are available—I am interested in the full name. Sending the incomplete
    username over to the server after every single keystroke doesn''t make a lot of
    sense and seems like a lot of waste.


    To avoid this, we can use Combine''s `debounce` operator: it will drop all events
    until there is a pause. It will then pass on the most recent event to the downstream
    publisher:


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .debounce(for: 0.8, scheduler: DispatchQueue.main)

    .print("username")

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    .receive(on: DispatchQueue.main)

    .share()

    .print("share")

    .eraseToAnyPublisher()

    }()

    ```


    By doing so, we tell Combine to disregard all updates to `username` until there
    is a pause of 0.8 seconds and then send the most recent `username` on to the next
    operator on the pipeline (in this case, the `print` operator, which will then
    pass the event on to the `flatMap` operator).


    This suits a normal user input behavior much more and will result in the app sending
    fewer requests to the server.


    ### Using `removeDuplicates` to Avoid Sending the Same Request Twice


    Have you ever spoken to a person and asked them the same question twice? It''s
    a bit of an awkward situation, and the other person probably wonders if you''ve
    been paying attention to them at all.


    Now, even though AI is making advances, I am sure that computers don''t have emotions,
    so they won''t hold a grudge if you send the same API request twice. But to give
    our users the best experience possible, we should try to eliminate sending duplicate
    requests if we can.


    Combine has an operator for this: `removeDuplicates`—it will remove any duplicate
    events from the stream of events if they follow each other *subsequently*.


    This works really well in conjunction with the `debounce` operator, and we can
    use those two operators combined (sorry, I guess you''ll have to live with the
    puns) for a little further optimization of our username availability check:


    ```

    private lazy var isUsernameAvailablePublisher:

    AnyPublisher =

    {

    $username

    .debounce(for: 0.8, scheduler: DispatchQueue.main)

    .removeDuplicates()

    .print("username")

    .flatMap { username -> AnyPublisher in

    self.authenticationService

    .checkUserNameAvailable(userName: username)

    }

    .receive(on: DispatchQueue.main)

    .share()

    .print("share")

    .eraseToAnyPublisher()

    }()

    ```


    Together, they will further reduce the number of requests we send to our server
    in case the user mistypes and then corrects their spelling.


    Let''s look at an example:


    ```

    jonyive [pause] s [backspace]

    ```


    This will send the following requests:


    1.  `jonyive`


    2.  No request for `jonyives` (as the `s` got deleted before the debounce timed
    out)


    3.  No second request for `jonyive`, as this got filtered by `removeDuplicates`


    It''s just a tiny change, and the impact might not be huge—but every little helps.'
