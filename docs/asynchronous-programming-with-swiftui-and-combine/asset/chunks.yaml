    \ 回到 `refreshable` 视图修饰器的闭包中，代码继续在主线程上执行\n\n如果比较图 15-3 和图 15-7 中的调用栈，你会发现它们都在同一个线程（线程\
    \ 1）上执行，但所有其他方法都是在不同的线程上执行的，那么这里到底发生了什么？\n\n如前一章所述，Swift 的新并发模型会使用与电脑/手机核心数一样多的线程，并从该线程池中选取任意线程来执行代码。特别是，在主线程上调用\
    \ `await` 时，Swift 会挂起当前函数，并继续在主线程上执行其他与 UI 相关的代码（以确保应用对用户保持响应）。一旦我们等待的代码恢复执行，它将在另一个非主线程上运行。\n\
    \n要将代码带回主线程，有几种策略：\n\n-   你可以将任何更新 UI 的代码包裹在 `MainActor.run { }` 的调用中。\n-   你可以使用\
