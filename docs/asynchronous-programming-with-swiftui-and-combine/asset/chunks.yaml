    \ 电子版 ISBN 978-1-4842-8572-5 [`doi.org/10.1007/978-1-4842-8572-5`](https://doi.org/10.1007/978-1-4842-8572-5)\
    \ © Peter Friese 2023\n\n本作品受版权保护。所有权利，无论是全部还是部分材料，均独家授权给出版商，具体包括翻译、重印、再利用插图、朗诵、广播、微缩胶片复制或其他任何物理形式的复制，以及信息存储与检索的传输、电子改编、计算机软件，或目前已知或未来开发的类似或不同方法的权利。本出版物中使用通用描述性名称、注册商标名称、商标、服务标志等，即便没有明确声明，也不意味着这些名称不受相关保护法律和法规的约束，因此可自由用于一般用途。出版商、作者和编辑可安全地假设本书中的建议和信息在出版日期时是真实准确的。出版商、作者或编辑均不对本书所含材料或可能存在的任何错误或遗漏提供明示或暗示的担保。对于已出版地图中的管辖权主张和机构归属，出版商保持中立。\n\
    \n本 Apress 印记由注册公司 APress Media, LLC（Springer Nature 的一部分）出版。注册公司地址为：美国纽约州纽约市纽约广场\
    \ 1 号，邮编 10004。\n\n*献给安妮*\n\n## 序言\n\n我开发 iOS 应用已经有一段时间了，并在 2019 年 SwiftUI 发布后几乎立刻就开始学习它。我记得自己迫不及待地想开始使用它，因为它对我来说似乎比\
    \ UIKit 直观得多。\n\n起初 SwiftUI 的文档并不多，我们这些直接投入其中的人不得不自己摸索很多问题。于是我开始在博客上分享使用 SwiftUI\
    \ 构建应用时学到的东西。\n\n仅仅几个月后，苹果公司的 SwiftUI 团队就联系我，邀请我加入他们一起开发这个框架。这是一段无比宝贵的经历，让我对 SwiftUI\
    \ 的内部机制以及 API 背后的决策有了深刻的理解。当然，SwiftUI 并不完美，还需要时间成熟，但它已经让许多开发者更快乐、更热衷于为苹果平台构建应用。为了使\
    \ SwiftUI API 如此简洁高效，团队投入了大量思考，以便我们能够默认获得平台正确的行为。\n\n我于 2022 年 4 月离开苹果公司，作为联合创始人和软件工程师加入了\
    \ Nil Coalescing。虽然不能再直接为 SwiftUI 框架做贡献让我有点遗憾，但我非常高兴现在能够使用自己参与开发的 API，并与其他 iOS\
    \ 开发者分享我的 SwiftUI 知识。\n\n看到苹果公司通过推出像 *WidgetKit* 和 *Swift Charts* 这样要求使用 SwiftUI\
    \ 的新框架来大力押注它，我相信它潜力巨大。同样令人欣慰的是，越来越多的开发者开始使用 SwiftUI，并且来自苹果和社区的优质 SwiftUI 相关内容也越来越多。\n\
    \n我相信，如果你打算使用 SwiftUI，*《使用 SwiftUI 和 Combine 进行异步编程》* 将是你藏书中的宝贵补充。我喜欢它独特地专注于从\
    \ SwiftUI 应用调用异步 API，因为这通常是实际项目中的主要组成部分。鉴于 Peter Friese 作为 Firebase 开发者倡导者的工作，他经常大量实验\
    \ Firebase 的异步 API 并教授如何将它们与 SwiftUI 结合使用，因此他无疑是谈论这个话题的最佳人选。本书充满了使用 Combine 和\
    \ Swift async/await API 的实用示例，将为开发具有网络功能或本地异步数据处理功能的 SwiftUI 应用奠定坚实的基础。\n\n*娜塔莉亚·潘费罗娃*\
    \  \n《将 SwiftUI 集成到 UIKit 应用》作者  \n及 Nil Coalescing 创始人 ([`nilcoalescing.com/about/`](https://nilcoalescing.com/about/))\n\
    \n## 前言\n\n我在 2009 年开始为 iPhone OS（当时是这么叫的）开发应用。我当时刚从 iPhone 3 升级到 iPhone 3GS，非常兴奋地想要尝试新功能，并用\
    \ `Xcode` 和 `Objective-C` 构建我的第一个应用！\n\n我之前已经练习使用过各种其他的 IDE、语言和操作系统：从 `MS-DOS`\
    \ 上的 `GW-BASIC`，到 `Windows` 上的 `Visual Basic` 和 `Delphi`，再到用于企业客户的 `Java`（与 `Jbuilder`、`Websphere\
    \ Application Developer` 和 `Eclipse` 一起使用，用于构建 `J2EE` 和 `Spring` 应用）。\n\n但使用 `Xcode`\
    \ 和 `Objective-C` 有点令人震惊。我之前用过的所有其他 IDE 都强大得多（例如，它们都提供重构支持），而带有诸多方括号的 `Objective-C`\
    \ 在我看来有点奇怪。\n\n回顾多年构建软件的经历，`Delphi` 是我用过最高效的开发环境之一。它将成熟的面向对象语言（`Object Pascal`）与强大的\
    \ IDE 结合在一起，允许开发者快速构建 Windows 应用的 UI。此外，“快速应用开发”这个口号也确实很吸引人。\n\n但 `Xcode` 和 `Objective-C`\
    \ 是未来的方向，所以我振作精神，继续学习如何使用它们。\n\n光阴似箭，十年过去了——我刚刚看完 WWDC 2019，为 SwiftUI 及其易用性感到兴奋。用\
    \ SwiftUI 构建 UI 感觉非常敏捷，在许多方面让我想起了 `Delphi`。我开始思考，如果能将 SwiftUI 与一个使构建后端系统更简单的框架结合起来，那该有多棒。\n\
    \n当谷歌 Firebase 团队寻找一位加入其开发者关系团队，专门关注 iOS 开发者生态系统的人时，我意识到这对我的意义：将我所热爱的语言（`Swift`）、一个能让开发者快速构建出色\
    \ UI 的 UI 工具包（SwiftUI），以及一个通过免除运行和维护自有后端系统需求来提高开发者效率的 SDK（Firebase）结合在一起。借助这些工具，我可以帮助人们更快地构建更好的应用。\n\
    \n在加入 Firebase DevRel 团队担任开发者倡导者的第一天，我就开始构建演示，以展示 Firebase iOS SDK 的功能。我很快发现，使用\
    \ SwiftUI 编写演示比使用 UIKit 容易得多。这种易用性意味着我可以专注于我真正想教授的内容：如何使用 Firebase SDK 及其 API。\n\
    \nSwiftUI 声明式的 UI 构建方法，在程序化构建 UI 时，对代码结构有更明确的意见，这使得其他开发者更容易理解你的代码意图。\n\n而且，由于采用了基于函数式响应式编程的状态管理模型，SwiftUI\
    \ 和 Combine 使得构建与底层数据模型和应用的其它部分始终保持同步的 UI 变得更加容易。我相信我们都遇到过并非如此的应用，并且可以证明这意味着糟糕的用户体验。"
- fmt: '# The Goal of This Book


    The goal of this book is to introduce you to building applications with `SwiftUI`,
    `Combine`, and `async/await`. I also aim to provide some guidance that helps you
    architect apps that reap the benefits of using declarative and functional reactive
    approaches for building UI-heavy applications that interface with asynchronous
    backend systems, such as `Firebase`.


    Thanks for buying this book! I hope it turns out to be useful for you, and I would
    love to hear from you. You can tweet me (I am `@peterfriese` on Twitter), or leave
    a comment on the GitHub repo^([¹](#fn1)) of this book.


    ## Acknowledgments


    Writing a book is a cross-functional effort, and the result of contributions from
    many different people, and this book is no different.


    First and foremost, I must thank Todd Kerpelman for believing in me and giving
    me the opportunity to join the Firebase Developer Relations team and become the
    resident iOS expert.


    Additionally, I’d like to thank the many people who provided feedback, encouragement,
    guidance, and technical expertise for the topics covered in this book, including
    Heiko Behrens, Paul Beusterien, Bas Broek, Marina Coelho, David East, Rosário
    Fernandes, Todd Kerpelman, Shai Mishali, Rachel Myers, Laurence Moroney, Natalia
    Panferova, Donny Wals, and Ryan Wilson. The conversations with you were invaluable
    input to this book and helped inform my thinking about `SwiftUI`, `Combine`, asynchronous
    programming, and how to present these topics in a written form.


    This book simply wouldn’t have been possible without the various teams at Apress/Springer
    who guided me through the process and helped shape this book into what it is now.
    I am particularly grateful to Aaron Schwarz for convincing me to write this book
    in the first place, Clement Wilson for helping me stay on track, and Jessica Vakili
    for shaping the content into great teaching material.


    I also owe a huge debt of gratitude to all the reviewers who provided feedback
    along the way, including Tunde Adegoroye, Paul Beusterien, Marcus Ficner, Adam
    Fordyce, Dominik Hauser, Rachel Saunders, Florian Schweizer, and Ryan Wilson.
    They did an amazing job at finding inconsistencies, typos, grammatical issues,
    and coding errors that the compiler didn’t spot. Any remaining errors and mistakes
    are entirely mine. If you spot any, I would be grateful if you filed an issue^([²](#fn2))
    on this book’s GitHub repository, so I can fix them for any future editions.


    Finally, my deepest thanks go to my wife Anne and my sons Sören, Lennart, and
    Jonas. You endured the time I put into creating this book and its companion code,
    and my focus when writing it. Your encouragement and company is what kept me going—I
    couldn’t have done this without you!


    ## About This Book


    *Asynchronous Programming with SwiftUI and Combine* was written to provide a practical
    guide to building UIs using the latest APIs and toolkits available from Apple.
    It begins by introducing `SwiftUI` as a modern and easy-to-use framework for building
    reactive UIs in a declarative way. After covering the basic concepts you need
    to understand to build efficient user interfaces in `SwiftUI`, it then dives into
    functional reactive programming and how you can use `Combine` to solve many of
    the challenges developers face when building UI-heavy applications that interact
    with asynchronous backend services. Finally, the book covers Swift’s new structured
    concurrency features, how they relate to `Combine`, and when you should use one
    or the other.


    ## Who Should Read This Book


    *Asynchronous Programming with SwiftUI and Combine* is for anyone who builds applications
    with `SwiftUI`.


    If you have some `SwiftUI` experience, and would like to better understand how
    its state management works, and how you can build your apps more efficiently using
    view models and `Combine`, then this book is probably for you.


    ## How This Book Is Organized


    This book is organized into three main parts, each covering a different aspect
    of building reactive UIs on Apple’s platforms.


    ### Part 1


    Part 1 covers `SwiftUI` and its state management. You will learn how to build
    user interfaces with `SwiftUI`’s declarative approach, and how `SwiftUI`’s reactive
    state management makes it easier to write apps that keep their application state
    in sync even across multiple screens.


    - **Chapter 1** explains why `SwiftUI` is an important building block in Apple’s
    strategy for making app development easier. It also provides a quick introduction
    of some of the key concepts this book will cover in more detail in the following
    chapters.


    - **Chapter 2** walks you through building a simple application from scratch.
    In this chapter, you will learn some key `SwiftUI` concepts, as well as some useful
    techniques for keeping your code maintainable.


    - **Chapter 3** dives deeper into key `SwiftUI` concepts such as views, view modifiers,
    and layout behavior.


    - **Chapter 4** covers one of the center pieces of `SwiftUI`: state management.
    It explains the different ways for managing state in `SwiftUI` apps and provides
    practical examples for when to use which approach.


    - **Chapter 5** provides an in-depth look at one of the most common types of UI:
    lists. `SwiftUI` provides a very flexible and powerful API for building `List`
    views, and this chapter will be your guide for navigating it.


    - **Chapter 6** explains how to build another very popular type of UI: (input)
    forms.


    ### Part 2


    Part 2 focuses on `Combine`, Apple’s reactive framework. You will learn how `Combine`
    works and how to use it for both UIs and code that interfaces with the backend.


    - **Chapter 7** provides an introduction to functional reactive programming and
    `Combine`’s key concepts. You will lean what publishers, subscribers, and operators
    are, and how you can use them to process events over time.


    - **Chapter 8** explains how to use `Combine` to implement complex UIs. You will
    learn how to use multiple `Combine` pipelines to drive the UI state of an input
    form with several input fields.


    - **Chapter 9** shows you how to use `Combine` to access the network. You will
    then learn how to integrate this with the pipelines you built in the previous
    chapters to build a more complex input validation pipeline.


    - **Chapter 10** covers the important topic of error handling and will equip you
    with a number of progressively more powerful strategies for handling errors and
    looping in the user for error mitigation in a meaningful way.


    - **Chapter 11** picks up where Chapter 10 left off and will demonstrate how to
    build a custom `Combine` operator for implementing incremental backoff—an error-handling
    strategy that is useful especially for accessing networked resources.


    - **Chapter 12** teaches you how to wrap existing APIs in `Combine` so you can
    use them in `Combine` pipelines. As a case study, this chapter will wrap some
    of Firebase’s asynchronous APIs to demonstrate two common strategies for wrapping
    APIs in `Combine`.


    - **Chapter 13** explains what schedulers are and how they will help you write
    multithreaded code in a declarative way.


    ### Part 3


    The third and final part covers Swift’s new structured concurrency (better known
    as `async/await`), how it relates to `Combine`, and how you can use it to build
    apps that feel snappy but are able to interface with asynchronous APIs such as
    `URLSession` and other asynchronous APIs such as `Firebase`.


    - **Chapter 14** provides an introduction to asynchronous programming, covering
    traditional ways (using closures) and `async/await`.'
  raw: 'The goal of this book is to introduce you to building applications with SwiftUI,
    Combine, and async/await. I also aim to provide some guidance that helps you architect
    apps that reap the benefits of using declarative and functional reactive approaches
    for building UI-heavy applications that interface with asynchronous backend systems,
    such as Firebase.


    Thanks for buying this book! I hope it turns out to be useful for you, and I would
    love to hear from you. You can tweet me (I am @peterfriese on Twitter), or leave
    a comment on the GitHub repo^([¹](#fn1)) of this book.


    Acknowledgments


    Writing a book is a cross-functional effort, and the result of contributions from
    many different people, and this book is no different.


    First and foremost, I must thank Todd Kerpelman for believing in me and giving
    me the opportunity to join the Firebase Developer Relations team and become the
    resident iOS expert.


    Additionally, I’d like to thank the many people who provided feedback, encouragement,
    guidance, and technical expertise for the topics covered in this book, including
    Heiko Behrens, Paul Beusterien, Bas Broek, Marina Coelho, David East, Rosário
    Fernandes, Todd Kerpelman, Shai Mishali, Rachel Myers, Laurence Moroney, Natalia
    Panferova, Donny Wals, and Ryan Wilson. The conversations with you were invaluable
    input to this book and helped inform my thinking about SwiftUI, Combine, asynchronous
    programming, and how to present these topics in a written form.


    This book simply wouldn’t have been possible without the various teams at Apress/Springer
    who guided me through the process and helped shape this book into what it is now.
    I am particularly grateful to Aaron Schwarz for convincing me to write this book
    in the first place, Clement Wilson for helping me stay on track, and Jessica Vakili
    for shaping the content into great teaching material.


    I also owe a huge debt of gratitude to all the reviewers who provided feedback
    along the way, including Tunde Adegoroye, Paul Beusterien, Marcus Ficner, Adam
    Fordyce, Dominik Hauser, Rachel Saunders, Florian Schweizer, and Ryan Wilson.
    They did an amazing job at finding inconsistencies, typos, grammatical issues,
    and coding errors that the compiler didn’t spot. Any remaining errors and mistakes
    are entirely mine. If you spot any, I would be grateful if you filed an issue^([²](#fn2))
    on this book’s GitHub repository, so I can fix them for any future editions.


    Finally, my deepest thanks go to my wife Anne and my sons Sören, Lennart, and
    Jonas. You endured the time I put into creating this book and its companion code,
    and my focus when writing it. Your encouragement and company is what kept me going—I
    couldn’t have done this without you!


    About This Book


    *Asynchronous Programming with SwiftUI and Combine* was written to provide a practical
    guide to building UIs using the latest APIs and toolkits available from Apple.
    It begins by introducing SwiftUI as a modern and easy-to-use framework for building
    reactive UIs in a declarative way. After covering the basic concepts you need
    to understand to build efficient user interfaces in SwiftUI, it then dives into
    functional reactive programming and how you can use Combine to solve many of the
    challenges developers face when building UI-heavy applications that interact with
    asynchronous backend services. Finally, the book covers Swift’s new structured
    concurrency features, how they relate to Combine, and when you should use one
    or the other.


    ## Who Should Read This Book


    *Asynchronous Programming with SwiftUI and Combine* is for anyone who builds applications
    with SwiftUI.


    If you have some SwiftUI experience, and would like to better understand how its
    state management works, and how you can build your apps more efficiently using
    view models and Combine, then this book is probably for you.


    ## How This Book Is Organized


    This book is organized into three main parts, each covering a different aspect
    of building reactive UIs on Apple’s platforms.


    Part 1 covers SwiftUI and its state management. You will learn how to build user
    interfaces with SwiftUI’s declarative approach, and how SwiftUI’s reactive state
    management makes it easier to write apps that keep their application state in
    sync even across multiple screens.


