    # 本书目标


    本书的目标是向您介绍如何使用`SwiftUI`、`Combine`和`async/await`构建应用程序。我还旨在提供一些指导，帮助您设计应用程序架构，从而充分利用声明式和函数响应式方法来构建与`Firebase`等异步后端系统交互的、以
    UI 为主的应用程序。


    感谢您购买本书！希望本书对您有所帮助，我期待听到您的反馈。您可以在推特上联系我（我的推特账号是`@peterfriese`），或者在本书的 GitHub 仓库^(¹)中留言。


    ## 致谢


    写一本书是一项跨职能的工作，是许多不同人贡献的成果，本书也不例外。


    首先，我必须感谢托德·克尔佩尔曼，他信任我并给了我加入 Firebase 开发者关系团队、成为常驻 iOS 专家的机会。


    此外，我还要感谢许多为本书涵盖的主题提供反馈、鼓励、指导和技术专业知识的人，包括海科·贝伦斯、保罗·博伊斯特林、巴斯·布罗克、玛丽娜·科埃略、大卫·伊斯特、罗萨里奥·费尔南德斯、托德·克尔佩尔曼、沙伊·米沙利、雷切尔·迈尔斯、劳伦斯·莫罗尼、娜塔莉亚·潘费罗娃、唐尼·沃尔斯和瑞安·威尔逊。与你们的交流是本书的宝贵输入，帮助我形成了关于`SwiftUI`、`Combine`、异步编程以及如何以书面形式呈现这些主题的思考。


    如果没有 Apress/Springer 各个团队的指导，并帮助将本书塑造成现在的样子，本书根本不可能完成。我特别感谢亚伦·施瓦茨最初说服我写这本书，感谢克莱门特·威尔逊帮助我保持正轨，感谢杰西卡·瓦基利将内容打造成优秀的教学材料。


    我还要深深感谢沿途提供反馈的所有审阅者，包括通德·阿德戈罗耶、保罗·博伊斯特林、马库斯·菲克纳、亚当·福代斯、多米尼克·豪泽、雷切尔·桑德斯、弗洛里安·施韦泽和瑞安·威尔逊。他们在发现编译器未能识别的矛盾、拼写错误、语法问题和编码错误方面做得非常出色。任何残留的错误和失误完全由我负责。如果您发现任何问题，我将不胜感激，请在本书的
    GitHub 仓库中提交问题^(²)，以便我能在未来版本中修复。


    最后，我最深的感谢献给我的妻子安妮和我的儿子索伦、伦纳特和乔纳斯。你们忍受了我为创作本书及其配套代码所付出的时间，以及我在写作时的专注。你们的鼓励和陪伴是支撑我走下去的动力——没有你们，我无法完成这一切！


    ## 关于本书


    《SwiftUI 和 Combine 异步编程》旨在提供一个实用指南，用于使用苹果提供的最新 API 和工具包构建 UI。它首先介绍`SwiftUI`作为一个现代化且易于使用的框架，用于以声明式方式构建响应式
    UI。在涵盖了您在`SwiftUI`中构建高效用户界面需要理解的基本概念之后，本书深入探讨了函数响应式编程，以及如何使用`Combine`解决开发者在构建与异步后端服务交互的、以
    UI 为主的应用程序时面临的许多挑战。最后，本书介绍了 Swift 新的结构化并发特性、它们与`Combine`的关系，以及何时应该使用其中之一。


    ## 谁应该阅读本书


    《SwiftUI 和 Combine 异步编程》面向所有使用`SwiftUI`构建应用程序的人。


    如果您有一些`SwiftUI`的经验，并希望更好地理解其状态管理是如何工作的，以及如何通过使用视图模型和`Combine`更高效地构建应用程序，那么本书可能适合您。


    ## 本书的组织结构


    本书分为三个主要部分，每部分涵盖在苹果平台上构建响应式 UI 的不同方面。


    ### 第 1 部分


    第 1 部分涵盖`SwiftUI`及其状态管理。您将学习如何使用`SwiftUI`的声明式方法构建用户界面，以及`SwiftUI`的响应式状态管理如何使编写即使在多个屏幕之间也能保持应用程序状态同步的应用变得更加容易。


    - **第 1 章** 解释了为什么`SwiftUI`是苹果公司简化应用开发战略中的一个重要构建块。它还对本书后续章节将详细介绍的一些关键概念进行了快速介绍。


    - **第 2 章** 引导您从头开始构建一个简单的应用程序。在本章中，您将学习一些关键的`SwiftUI`概念，以及一些保持代码可维护性的有用技巧。


    - **第 3 章** 深入探讨了`SwiftUI`的关键概念，如视图、视图修饰符和布局行为。


    - **第 4 章** 涵盖了`SwiftUI`的核心内容之一：状态管理。它解释了在`SwiftUI`应用中管理状态的不同方式，并提供了何时使用哪种方法的实际示例。


    - **第 5 章** 深入探讨了最常见的 UI 类型之一：列表。`SwiftUI`为构建`List`视图提供了一个非常灵活和强大的 API，本章将为您指导如何使用它。


    - **第 6 章** 解释了如何构建另一种非常流行的 UI 类型：（输入）表单。


    ### 第 2 部分


    第 2 部分重点介绍`Combine`，苹果的响应式框架。您将学习`Combine`的工作原理，以及如何将其用于 UI 和与后端交互的代码。


    - **第 7 章** 介绍了函数响应式编程和`Combine`的关键概念。您将了解什么是发布者、订阅者和操作符，以及如何使用它们随时间处理事件。


    - **第 8 章** 解释了如何使用`Combine`实现复杂的 UI。您将学习如何使用多个`Combine`管道来驱动具有多个输入字段的输入表单的 UI
    状态。


    - **第 9 章** 展示了如何使用`Combine`访问网络。然后，您将学习如何将其与前面章节构建的管道集成，以构建更复杂的输入验证管道。


    - **第 10 章** 涵盖了错误处理这一重要主题，并将为您提供一系列逐步更强大的策略，用于处理错误并以有意义的方式引导用户进行错误缓解。


    - **第 11 章** 延续第 10 章的内容，将演示如何构建一个自定义的`Combine`操作符来实现增量退避——一种特别适用于访问网络资源的错误处理策略。


    - **第 12 章** 教您如何将现有 API 封装到`Combine`中，以便在`Combine`管道中使用它们。作为一个案例研究，本章将封装一些 Firebase
    的异步 API，以演示两种在`Combine`中封装 API 的常见策略。


    - **第 13 章** 解释了什么是调度器，以及它们如何帮助您以声明式方式编写多线程代码。


    ### 第 3 部分


    第三部分也是最后一部分，涵盖了 Swift 新的结构化并发（更广为人知的是`async/await`）、它与`Combine`的关系，以及如何使用它来构建感觉流畅且能够与`URLSession`等异步
    API 以及其他诸如`Firebase`的异步 API 交互的应用。


    - **第 14 章** 介绍了异步编程，涵盖了传统方式（使用闭包）和`async/await`。

