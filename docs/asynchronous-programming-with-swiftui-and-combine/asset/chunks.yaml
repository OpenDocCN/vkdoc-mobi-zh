  trans: "\n# 使用 URLSession 获取数据\n\n我们将继续构建上一章开始设计的注册表单。假设其中一项需求是检查用户偏好的用户名是否仍然可用。\n\
    \n这要求我们与授权服务器通信，以确认所需的用户名是否已被他人占用。以下是一个请求示例，展示了我们如何尝试查询用户名 `sjobs` 是否可用：\n\n```\n\
    GET localhost:8080/isUserNameAvailable?userName=sjobs HTTP/1.1\n```\n\n服务器将回复一个简短的\
    \ JSON 文档，说明该用户名是否仍可用：\n\n```\nHTTP/1.1 200 OK\ncontent-type: application/json;\
    \ charset=utf-8\ncontent-length: 39\nconnection: close\ndate: Thu, 06 Jan 2022\
    \ 16:09:08 GMT\n{\"isAvailable\":false, \"userName\":\"sjobs\"}\n```\n\n要在 Swift\
    \ 中执行此请求，我们可以使用 `URLSession`。使用 `URLSession` 从网络获取数据的传统方式如下所示：\n\n```\nfunc checkUserNameAvailableOldSchool(userName:\
    \ String, completion: @escaping (Result) -> Void) {\n    guard let url = URL(string:\
    \ \"http://localhost:8080/isUserNameAvailable?userName=\\(userName)\") else {\n\
    \        completion(.failure(.invalidRequestError(\"URL invalid\")))\n       \
    \ return\n    }\n    let task = URLSession.shared.dataTask(with: url) { data,\
    \ response, error in\n        if let error = error {\n            completion(.failure(.transportError(error)))\n\
    \            return\n        }\n        if let response = response as? HTTPURLResponse,\
    \ !(200...299).contains(response.statusCode) {\n            completion(.failure(.serverError(statusCode:\
    \ response.statusCode)))\n            return\n        }\n        guard let data\
    \ = data else {\n            completion(.failure(.noData))\n            return\n\
    \        }\n        do {\n            let decoder = JSONDecoder()\n          \
    \  let userAvailableMessage = try decoder.decode(UserNameAvailableMessage.self,\
    \ from: data)\n            completion(.success(userAvailableMessage.isAvailable))\n\
    \        } catch {\n            completion(.failure(.decodingError(error)))\n\
    \        }\n    }\n    task.resume()\n}\n```\n\n虽然这段代码运行良好，本身也没有什么问题，但它确实存在几个问题：\n\
    \n1.  成功路径并不一目了然——唯一返回成功结果的位置相当隐蔽。\n\n2.  对于不熟悉完成处理程序的开发者来说，成功路径甚至没有使用 `return`\
    \ 语句将网络调用的结果返回给调用者，这可能会让人感到困惑。\n\n3.  错误处理分散在各处。\n\n4.  存在多个出口点，很容易忘记在 `if let`\
    \ 条件中写某个 `return` 语句。\n\n5.  总体而言，即使对于经验丰富的 Swift 开发者，这段代码也难以阅读和维护。\n\n6.  很容易忘记调用\
    \ `resume()` 来实际执行请求。我确信我们大多数人在使用 `URLSession` 时都曾疯狂地寻找 bug，最后才发现忘了使用 `resume`\
    \ 来启动请求。是的，我认为对于本应*发送*请求的 API 来说，`resume` 并非一个很合适的名称。\n\n**运行代码示例**\n\n*你可以在随附的\
    \ GitHub 仓库中找到所有代码示例，位于* `Networking` *文件夹中。为了让你能更好地受益，我还在* `server` *子文件夹中提供了一个演示服务器（使用\
    \ Vapor 构建）。要在你的机器上运行它，请执行以下操作：*\n\n```\n$ cd server\n$ swift run\n```\n\n## 使用\
    \ Combine 获取数据\n\n在引入 Combine 时，Apple 为许多自己的异步 API 添加了发布者。开发者现在可以使用这些发布者来替换现有的、基于回调的代码。\n\
    \n重构后的代码具有更少的出口点，遵循线性流程，因此更易于阅读和维护。它也不太容易出现隐蔽的 bug。\n\n为了更好地理解这意味着什么，让我们看看之前的（基于回调的）代码片段在使用\
    \ Combine 重构后是什么样子：\n\n```\nfunc checkUserNameAvailableNaive(userName: String)\
    \ -> AnyPublisher {\n    guard let url = URL(string: \"http://127.0.0.1:8080/isUserNameAvailable?userName=\\\
    (userName)\") else {\n        return Just(false).eraseToAnyPublisher()\n    }\n\
    \    return URLSession.shared.dataTaskPublisher(for: url)\n        .map { data,\
    \ response in\n            do {\n                let decoder = JSONDecoder()\n\
    \                let userAvailableMessage = try decoder.decode(UserNameAvailableMessage.self,\
    \ from: data)\n                return userAvailableMessage.isAvailable\n     \
    \       } catch {\n                return false\n            }\n        }\n  \
    \      .replaceError(with: false)\n        .eraseToAnyPublisher()\n}\n```\n\n\
    让我们逐步分析这段代码：\n\n1.  我们使用 `dataTaskPublisher` 来执行请求。这个发布者是一个一次性发布者，会在请求的数据到达后发出一个事件。值得记住的是，如果没有订阅者，Combine\
    \ 发布者不会执行任何工作。这意味着，在添加至少一个订阅者之前，该发布者不会对给定的 URL 执行任何调用。稍后我将向你展示如何将这个管道连接到 UI，并确保每次用户在用户名字段中输入文本时都会调用它。\n\
    \n2.  一旦请求返回，发布者会发出一个包含 `data` 和 `response` 的值。在这一行，我们使用 `map` 运算符来转换这个结果。如你所见，除了少数细微的变化外，我们可以复用之前版本代码中的大部分数据映射代码。\n\
    \n3.  我们不再调用 `completion` 闭包，而是返回一个 `Boolean` 值来指示用户名是否仍然可用。这个值将沿管道向下传递。\n\n4.\
    \  如果数据映射失败，我们会捕获错误并返回 `false`，这似乎是一个不错的折中方案。\n\n5.  对于访问网络时可能发生的任何错误，我们也进行同样的处理。这是一个简化的做法，将来可能需要重新审视。\n\
    \n另外请注意，（除了确保我们拥有有效 URL 的 `guard` 语句外）这里只有*一个*出口点。\n\n这看起来比最初版本好多了，也更容易阅读。我们完全可以就此打住，在应用中使用这段代码。\n\
    \n但我们可以做得更好。在接下来的三个小节中，我们将探讨一些能使代码更加线性且更易于推理的改动。\n\n### 使用键路径解构元组\n\n我们经常需要从变量中提取特定属性。在前面的代码中，`dataTaskPublisher`\
    \ 返回一个包含我们所发送 URL 请求的 `data` 和 `response` 的结果。从 `DataTaskPublisher` 的声明中可以看出，结果的类型是一个元组：\n\
    \n```\npublic struct DataTaskPublisher : Publisher {\n    /// 该发布者发布的值的类型。\n \
    \   public typealias Output = (data: Data, response: URLResponse)\n    ...\n}\n\
    ```\n\n从元组中提取各个元素称为*解构*。Combine 提供了一个重载版本的 `map` 运算符，允许我们解构元组并只访问我们关心的属性：\n\n\
    ```\nreturn URLSession.shared.dataTaskPublisher(for: url)\n    .map(\\.data)\n\
    ```\n\n### 映射数据\n\n由于映射数据是一项非常常见的任务，Combine 为此提供了一个专用的运算符 `decode(type:decoder:)`，使其更简单：\n\
    \n```\nreturn URLSession.shared.dataTaskPublisher(for: url)\n    .map(\\.data)\n\
    \    .decode(type: UserNameAvailableMessage.self, decoder: JSONDecoder())\n```\n\
    \n这将从上游发布者提取 `data` 值，并将其解码为 `UserNameAvailableMessage` 实例。\n\n最后，我们可以再次使用 `map`\
    \ 运算符来解构 `UserNameAvailableMessage` 并访问其 `isAvailable` 属性：\n\n```\nreturn URLSession.shared.dataTaskPublisher(for:\
    \ url)\n    .map(\\.data)\n    .decode(type: UserNameAvailableMessage.self, decoder:\
    \ JSONDecoder())\n    .map(\\.isAvailable)\n```\n"
